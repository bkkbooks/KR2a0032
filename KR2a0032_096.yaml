body:
  text: 宋史卷九十六志第四十九河渠六東南諸水上開寶間議征江南詔用京西轉運使李符之策發和州丁夫及鄉兵凡數萬人鑿橫江渠於歷陽令符督其役渠成以通漕運而軍用無闕八年知瓊州李易上言州南五里有度靈塘開修渠堰溉水田三百餘頃居民賴之初楚州北山陽灣尤迅急多有沈溺之患雍熙中轉運使劉蟠議開沙河以避淮水之險未克而受代喬維嶽繼之開河自楚州至淮陰凡六十里舟行便之天禧元年知升州丁謂言城北有後湖往時歲旱水竭給為民田凡七十六頃出租錢數百萬蔭溉之利遂廢令欲改田除租迹舊制復治岸畔疏為塘陂以畜水使負郭無旱歲廣植蒲芡養魚鱉縱貧民漁采又明州請免濠池及慈溪鄞縣陂湖年課許民射利詔並從之二年江淮發運使賈宗言諸路歲漕自真揚入淮汴歷堰者五糧載煩於剝卸民力罷於牽挽官私船艦由此速壞今議開揚州古河繚城南接運渠毀龍舟新興茱萸三堰鑿近堰漕路以均水勢歲省官費十數萬功利甚厚詔屯田郎中梁楚閣門祇候李居中按視以為當然明年役既成而水注新河與三堰平漕船無阻公私大便四年淮南勸農使王貫之導海州石闥堰水入漣水軍溉民田知定遠縣江澤知江陰軍崔立率民修廢塘濬古港以灌高仰之地並賜詔奬焉神宗熙寧元年十月詔杭之長安秀之杉青常之望亭三堰監護使臣並以管幹河塘繫銜常同所屬令佐巡視修固以時啓閉從提舉兩浙開修河渠胡淮之請也二年三月甲申先是凌民瞻建議廢呂城堰又即望亭堰置閘而不用及因濬河隳敗古涇函石閘石河流益阻百姓勞弊至是民瞻等貶降有差六年五月杭州於潛縣令郟亶言蘇州環湖地卑多水沿海地高多旱故古人治水之迹縱則有浦橫則有塘又有門堰涇瀝而布之今總二百六十餘所欲略循古人之法七里為一縱浦十里為一橫塘又因出土以為堤岸度用夫二十萬水治高田旱治下澤不過三年蘇之田畢治矣十一月命亶興修水利然措置乖方民多愁怨僅及一年遂罷兩浙工役又數月中書檢正沈括復言浙西涇濱淺涸當濬浙東堤防川瀆堙沒當修請下司農貸緡募役從之仍命括相度兩浙水利九年正月壬午劉瑾言揚州江都縣古鹽河高郵縣陳公塘等湖天長縣白馬塘沛塘楚州寶應縣泥港射馬港山陽縣渡塘溝龍興浦淮陰縣青州澗宿州虹縣萬安湖小河壽州安豐縣芍陂等可興置欲令逐路轉運司選官覆按從之元豐五年九月淮南監司言舒州近城有大澤出山注北門外比者暴水漂居民知州楊希元築捍水堤千一百五十丈置泄水斗門二遂免淫潦入城之患並璽書奬諭六年正月戊辰開龜山運河二月乙未告成長五十七里闊十五丈深一丈五尺初發運使許元自淮陰開新河屬之洪澤避長淮之險凡四十九里久而淺澀熙寧四年皮公弼請復濬治起十一月壬寅盡明年正月丁酉而畢人便之至是發運使羅拯復欲自洪澤而上鑿龜山𩹉河以達于淮帝深然之會發運使蔣之奇入對建言上有清汴下有洪澤而風浪之險止百里淮邇歲溺公私之載不可計凡諸道轉輸涉湖行江已數千里而覆敗於此百里間良為可惜宜自龜山蛇浦下屬洪澤鑿左肋為復河取淮為源不置堰閘可免風濤覆溺之患帝遣都水監丞陳祐甫經度祐甫言往年田棐任淮南提刑嘗言開河之利其後淮陰至洪澤竟開新河獨洪澤以上未克興役今既不用閘蓄水惟隨淮面高下開深河底引淮通流形勢為便但工費浩大帝曰費雖大利亦博矣祐甫曰異時淮中歲失百七十艘若捐數年所損之費足濟此役帝曰損費尚小如人命何乃調夫十萬開治既成命之奇撰記刻石龜山後至建中靖國初之奇同知樞密院奏淮水浸淫衝刷堤岸漸成墊缺請下發運司及時修築自是歲以為常是年將作監主簿李湜言鼎澧等州宜開溝洫置斗門以便民田詔措置以聞七年十月濬真楚運河哲宗元祐四年知潤州林希奏復呂城堰置上下閘以時啓閉其後京口瓜洲奔牛皆置閘是歲知杭州蘇軾濬茆山鹽橋二河分受江潮及西湖水造堰閘以時啓閉初杭近海患水泉鹹苦唐刺史李泌始導西湖作六井民以足用及白居易復濬西湖引水入運河復引溉田千頃湖水多葑自唐及錢氏後廢而不理至是葑積二十五萬餘丈而水無幾運河失湖水之利取給於江潮潮水淤河泛溢闤闠三年一濬為市井大患故六井亦幾廢軾既濬二河復以餘力全六井民獲其利十二月京東轉運司言清河與江浙淮南諸路相通因徐州呂梁百步兩洪湍淺險惡多壞舟楫由是水手牛驢撁戶盤剝人等邀阻百端商賈不行朝廷已委齊州通判滕希靖知常州晉陵縣趙竦度地勢穿鑿今若開修月河石堤上下置閘以時開閉通放舟船實為長利乞遣使監督興修從之紹聖二年詔武進丹陽丹徒縣界沿河堤岸及石石木溝並委令佐檢察修護勸誘食利人戶修葺任滿稽其勤惰而賞罰之從工部之請也四年四月水部員外郎趙竦請濬十八里河令賈種民相度呂梁百步洪添移水磨詔發運並轉運司同視利害以聞元符元年正月知潤州王悆建言呂城閘常宜車水入澳灌注閘身以濟舟若舟沓至而力不給許量差牽駕兵卒併力為之監官任滿水無走泄者賞水未應而輒開閘者罰守二令佐常覺察之詔可三月甲寅工部言淮南開河所開修楚州支家河導漣水與淮通賜名通漣河二年閏九月潤州京口常州奔牛澳閘畢工先是兩浙轉運判官曾孝蘊獻澳閘利害因命孝蘊提舉興修仍相度立啓閉日限之法三年二月詔蘇湖秀州凡開治運河港浦溝瀆修疊堤岸開置斗門水堰等許役開江兵卒徽宗崇寧元年十二月置提舉淮浙澳閘司官一員掌杭州至揚州瓜洲澳閘凡常潤杭秀揚州新舊等閘通治之崇寧二年初通直郎陳仲方別議濬吳松江自大通浦入海計工二百二十二萬七千有奇為緡錢糧斛十八萬三千六百乞置幹當官十員朝廷下兩浙監司詳議監司以為可行時又開青龍江役夫不勝其勞而提舉常平徐確謂三州開江兵卒千四百人使臣二人請就令護察已開之江遇潮沙淤澱隨即開淘若他役者以違制論確與監司往往被賞人以為濫十二月詔淮南開修遇明河自真州宣化鎮江口至泗州淮河口五年畢工明年三月詔曰昨二浙水災委官調夫開江而總領無法役人暴露飲食失所疾病死亡者衆水仍為害未嘗究實按罪反蒙推賞何以厭塞百姓怨咨乃下本路提刑司體量提刑司言開濬吳松青龍江役夫五萬死者千一百六十二人費錢米十六萬九千三百四十一貫石積水至今未退於是元相度官轉運副使劉何等皆坐貶降四年正月以倉部員外郎沈延嗣提舉開修青草洞庭直河大觀元年五月中書舍人許光凝奏臣向在姑蘇遍詢民吏皆謂欲去水患莫若開江濬浦蓋太湖在諸郡間必導之海然後水有所歸自太湖距海有三江有諸浦能疏滌江浦除水患猶反掌耳今境內積水視去歲損二尺視前歲損四尺良由初開吳松江繼濬八浦之力也吳人謂開一江有一江之利濬一浦有一浦之利願委本路監司與諳曉水勢精強之吏遍詣江浦詳究利害假以歲月先為之備然後興夫調役可使公無費財而歲供常足人不告勞而民食不匱是一舉而獲萬世之利也詔吳擇仁相度以聞開江之議復興矣十一月詔曰禹貢三江既導震澤底定今三江之名既失其所水不趨海故蘇湖被患其委本路監司選擇能臣檢按古迹循導使之趨下並相度墟岸以聞於是復詔陳仲方為發運司屬官再相度蘇州積水二年八月詔常潤歲旱河淺留滯運船監司督責濬治三年兩浙監司言承詔案古迹導積水今請開淘吳松江復置十二閘其餘浦閘溝港運河之類以次增修若田被水圍勸民自行修治章下工部工部謂今所具三江或非禹迹又吳松江散漫不可開淘泄水遂命諸司再相度以聞四年八月臣僚言有司以練湖賜茅山道觀緣潤州田多高仰及運渠夾岡水淺易涸賴湖以濟請別用天荒江漲沙田賜之仍令提舉常平官考求前人規畫修築從之十月戶部言乞如兩浙常平司奏專委守令籍古瀦水之地立堤防之限俾公私毋得侵占凡民田不近水者略倣周官遂人稻人溝防之制使合衆力而為之詔可政和元年知陳州霍端友言陳地汙下久雨則積潦害稼比疏新河八百里而去淮尚遠水不時泄請益開二百里起西華循宛丘入項城以達于淮從之政和元年十月詔蘇湖秀三州治水創立墟岸其工費許給越州鑑湖租賦已而升蘇州為平江府潤州為鎮江府二年七月兵部尚書張閣言臣昨守杭州聞錢塘江自元豐六年泛溢之後潮汛往來率無寧歲而比年水勢稍改自海門過赭山即回薄巖門白石一帶北岸壞民田及鹽亭監地東西三十餘里南北二十餘里江東距仁和監止及三里北趣赤岸口二十里運河正出臨平下塘西入蘇秀若失障禦恐他日數十里膏腴平陸皆潰于江下塘田廬莫能自保運河中絶有害漕運詔亟修築之四年二月工部言前太平州判官盧宗原請開修自江州至真州古來河道湮塞者凡七處以成運河入浙西一百五十里可避一千六百里大江風濤之患又可就土興築自古江水浸沒膏腴田自三百頃至萬頃者凡九所計四萬二千餘頃其三百頃以下者又過之乞依宗原任太平州判官日已興政和墟田例召人戶自備財力興修詔沈鏻等相度措置六年閏正月知杭州李偃言湯村巖門白石等處並錢塘江通大海日受兩潮漸致侵囓乞依六和寺岸用石砌疊乃命劉既濟修治八月詔鎮江府傍臨大江無港澳以容舟楫三年間覆溺五百餘艘聞西有舊河可避風濤歲久湮廢宜令發運司濬治是年詔曰聞平江三十六浦內自昔置閘隨潮啓閉歲久堙塞致積水為患其令守臣莊徽專委戶曹趙霖講究利害導歸江海依舊置閘於是發運副使應安道言凡港浦非要切者皆可徐議惟當先開崑山縣界茜涇塘等六所秀之華亭縣欲並循古法盡去諸堰各置小斗門常州鎮江府望亭鎮仍舊置閘八月詔戶曹趙霖相度役興而兩浙擾甚七年四月己未尚書省言盧宗原濬江慮成搔擾詔權罷其役趙霖別與差遣重和元年二月前發運副使柳庭俊言真揚楚泗高郵運河堤岸舊有斗門水閘等七十九座限則水勢常得其平比多損壞詔檢計修復六月詔兩浙霖雨積水多浸民田平江尤甚由未濬港浦故也其復以趙霖為提舉常平措置救護民田振恤人戶毋令流移失所八月詔加霖直祕閣宣和元年二月臣僚言江淮荊漢間荒瘠彌望率古人一畝十鍾之地其堤閼水門溝澮之迹猶存近絳州民呂平等詣御史臺訴乞開濬熙寧舊渠以廣浸灌願加稅一等則是近世陂池之利且廢矣何暇復古哉願詔常平官有興修水利功效明白者亟以名聞特與褒除以勵能者從之八月提舉專切措置水利農田所奏浙西諸縣各有陂湖溝港涇濱湖濼自來蓄水灌溉及通舟楫望令打量官按其地名丈尺四至並鐫之石從之三月趙霖坐增修水利不當降兩官六月詔曰趙霖興修水利能募被水艱食之民凡役工二百七十八萬二千四百有奇開一江一港四浦五十八瀆已見成績進直徽猷閣仍復所降兩官宣和二年九月以真揚等州運河淺澀委陳亨伯措置三年春詔發運副使趙億以車畎水運河限三月中三十綱到京宦者李琮言真州乃外江綱運會集要口以運河淺澀故不能速發按南岸有泄水斗門八去江不滿一里欲開斗門河身去江十丈築軟壩引江潮入河然後倍用人工車畎以助運水從之四月詔曰江淮漕運尚矣春秋時吳穿邗溝東北通射陽湖西北至末口漢吳王濞開邗溝通運海陵隋開邗溝自山陽至揚子入江雍熙中轉運使劉蟠以山陽灣迅急始開沙河以避險阻天禧中發運使賈宗始開揚州古河繚城南接運渠毀三堰以均水勢今運河歲淺澀當詢訪故道及今河形勢與陂塘瀦水之地講究措置悠久之利以濟不通可令發運使陳亨伯內侍談稹條具措置以聞六月臣僚言比緣淮南運河水澀逾半歲禁綱舟篙工附載私物今河水增漲其令如舊初淮南連歲旱漕運不通揚州尤甚詔中使按視欲濬運河與江淮平會兩浙有方臘之亂內侍童貫為宣撫使談稹為制置使貫欲海運陸輦稹欲開一河自盱眙出宣化朝廷下發運司相度陳亨伯遣其屬向子諲視之子諲曰運河高江淮數丈自江至淮凡數百里人力難濬昔唐李吉甫廢閘置堰治陂塘泄有餘防不足漕運通流發運使曾孝蘊嚴三日一啓之制復作歸水澳惜水如金比年行直達之法走茶鹽之利且應奉權幸朝夕經由或啓或閉不暇歸水又頃毀朝宗閘自洪澤至召伯數百里不為之節故山陽上下不通欲救其弊宜於真州太子港作一壩以復懷子河故道於瓜洲河口作一壩以復龍舟堰於海陵河口作一壩以復茱萸待賢堰使諸塘水不為瓜洲真泰三河所分於北神相近作一壩權閉滿浦閘復朝宗閘則上下無壅矣亨伯用其言是後滯舟皆通利云三年二月詔越之鑑湖明之廣德湖自措置為田下流堙塞有妨灌溉致失常賦又多為權勢所占兩州被害民以流徙宜令陳亨伯究實如租稅過重即裁為中制應妨下流灌溉者並弛以豫民五年三月詔呂城至鎮江運河淺澀狹隘監司坐視無所施設兩浙專委王復淮南專委向子諲同發運使呂淙措置車水通濟舟運四月又命王仲閎同廉訪劉仲元漕臣孟庾專往來措置常潤運河又詔東南六路諸閘啓閉有時比聞綱舟及命官妄稱專承指揮抑令非時啓版走泄河水妨滯綱運誤中都歲計其禁止之五月詔以運河淺涸官吏互執所見州縣莫知所從其令發運司提舉等官同廉訪使者參訂經久利便列奏是月臣僚言鎮江府練湖與新豐塘地理相接八百餘頃灌溉四縣民田又湖水一寸益漕河一尺其來久矣今堤岸損缺不能貯水乞候農隙次第補葺詔本路漕臣並本州縣官詳度利害檢計工料以聞六年九月盧宗原復言池州大江乃上流綱運所經其東岸皆暗石多至二十餘處西岸則沙洲廣二百餘里諺云拆船灣言舟至此必毀拆也今東岸有車軸河口沙地四百餘里若開通入杜湖使舟經平水徑池口可避二百里風濤拆船之險請措置開修從之七年九月丙子又詔宗原措置開濬江東古河自蕪湖由宣溪溧水至鎮江渡揚子趨淮汴免六百里江行之險並從之靖康元年三月丁卯臣僚言東南瀕江海水易泄而多旱歷代皆有陂湖蓄水祥符慶曆間民始盜陂湖為田後復田為湖近年以來復廢為田雨則潦旱則涸民久承佃所收租稅無計可脫悉歸御前而漕司之常賦有虧民之失業無算可乞盡括東南廢湖為田者復以為湖庶幾凋瘵之民稍復故業詔相度利害聞奏八月辛丑戶部言命官在任興修農田水利依元豐賞格千頃以上該第一等轉一官下至百頃皆等第酬奬紹聖亦如之緣政和續附常平格千頃增立轉兩官減磨勘三年實為太優詔依元豐紹聖舊格
