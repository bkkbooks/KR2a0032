body:
  text: 宋史卷一百六志第五十九禮九吉禮九宗廟之制宗廟之制建隆元年有司請立宗廟詔下其議兵部尚書張昭等奏謹案堯舜禹皆立五廟蓋二昭二穆與其始祖也有商建國改立六廟蓋昭穆之外祀契與湯也周立七廟蓋親廟之外祀太祖與文王武王也漢初立廟悉不如禮魏晉始復七廟之制江左相承不改然七廟之室隋文但立高曾祖禰四廟而已唐因立親廟梁氏而下不易其法稽古之道斯為折衷伏請追尊高曾四代崇建廟室於是判太常寺竇儼奏上皇高祖文安府君曰文獻皇帝廟號僖祖皇曾祖中丞府君曰惠元皇帝廟號順祖皇祖驍衞府君曰簡恭皇帝廟號翼祖皇考武清府君曰昭武皇帝廟號宣祖皇高祖妣崔氏曰文懿皇后皇曾祖妣桑氏曰惠明皇后皇祖妣京兆郡太夫人劉氏曰簡穆皇后太祖御崇元殿備禮冊四親廟奉安神主行上諡之禮二年十月祔明憲皇后杜氏於宣祖室太平興國二年有司言唐制長安太廟凡九廟同殿異室其制二十一間皆四柱東西夾室各一前後面各三階東西各二側階本朝太廟四室室三間今太祖升祔共成五室請依長安之制東西留夾室外餘十間分為五室室二間從之四月己卯奉神主祔廟以孝明皇后王氏配至道三年十一月甲子奉太宗神主祔廟以懿德皇后符氏配咸平元年判太常禮院李宗訥等言僖祖稱曾高祖太祖稱伯文懿惠明簡穆昭憲皇后並稱祖妣孝明孝惠孝章皇后並稱伯妣按爾雅有考妣王父母曾祖王父母高祖王父母及世父之別以此觀之唯父母得稱考妣今請僖祖止稱廟號順祖而下即依爾雅之文事下尚書省議戶部尚書張齊賢等言王制天子七廟謂三昭三穆與太祖之廟而七前代或有兄弟繼及亦移昭穆之列是以漢書為人後者為之子所以尊本祖而重正統也又禮云天子絕朞喪安得宗廟中有伯氏之稱乎其唐及五代有所稱者蓋禮官之失非正典也請自今有事於太廟則太祖幷諸祖室稱孝孫孝曾孫嗣皇帝太宗室稱孝子嗣皇帝其爾雅考妣王父之文本不為宗廟言也歷代既無所取於今亦不可行詔下禮官議議曰按春秋正義躋魯僖公云禮父子異昭穆兄弟昭穆同此明兄弟繼統同為一代又魯隱桓繼及皆當穆位又尚書盤庚有商及王史記云陽甲至小乙兄弟四人相承故不稱嗣子而曰及王明不繼兄之統也又唐中睿皆處昭位敬文武昭穆同為一世伏請僖祖室止稱廟號后曰祖妣順祖室曰高祖后曰高祖妣翼祖室曰曾祖后曰曾祖妣祝文皆稱孝曾孫宣祖室曰皇祖考后曰皇祖妣祝文稱孝孫太祖室曰皇伯考妣太宗室曰皇考妣每大祭太祖太宗昭穆同位祝文並稱孝子其別廟稱謂亦請依此詔都省復集議曰古者祖有功宗有德皆先有其實而後正其名今太祖受命開基太宗纘承大寶則百世不祧之廟矣豈有祖宗之廟已分二世昭穆之位翻為一代如臣等議禮為人後者為之子以正父子之道以定昭穆之義則無疑也必若同為一代則太宗不得自為世數而何以得為宗乎不得為宗又何以得為百世不祧之主乎春秋正義亦不言昭穆不可異此又不可以為證也今若序為六世以一昭一穆言之則上無毀廟之嫌下有善繼之美於禮為大順於時為合宜何嫌而謂不可乎翰林學士宋湜言三代而下兄弟相繼則多昭穆異位未之見也今詳都省所議皇帝於太祖室稱孫竊有疑焉詔令禮官再議禮官言按祭統曰祭有昭穆者所以別父子遠近長幼親疎之序而無亂也公羊傳公孫嬰齊為兄歸父之後春秋謂之仲嬰齊何休云弟無後兄之義為亂昭穆之序失父子之親故不言仲孫明不以子為父孫晉賀循議兄弟不合繼位昭穆云商人六廟親廟四幷契湯而六比有兄弟四人相襲為君者便當上毀四廟乎如此四世之親盡無復祖禰之神矣溫嶠議兄弟相繼藏主夾室之事云若以一帝為一世則當不得祭於禰乃不及庶人之祭也夫兄弟同世於恩既順於義無否玄宗朝禘祫皇伯考中宗皇考睿宗同列於穆位德宗亦以中宗為高伯祖晉王導荀崧議大宗無子則立支子又曰為人後者為之子無兄弟相為之文所以舍至親取遠屬者蓋以兄弟一體無父子之道故也竊以七廟之制百王是尊至於祖有功宗有德則百世不遷之廟也父為昭子為穆則千古不刊之典也今議者引漢書曰為人後者為之子殊不知弟不為兄後子不為父孫春秋之深旨父謂之昭子謂之穆禮記之明文也又按太宗享祀太祖二十有二載稱曰孝弟此不易之制又安可追改乎唐玄宗謂中宗為皇伯考德宗謂中宗為高伯祖則伯氏之稱復何不可臣等參議自今合祭日太祖太宗依典禮同位異坐皇帝於太祖仍稱孝子餘並遵舊制景德元年有司詳定明德皇太后李氏升祔之禮按唐睿宗昭成肅明二后先天初以昭成配開元末以肅明祔此時儒官名臣步武相接宗廟重事必有據依推之閨門亦可擬議晉驃騎將軍溫嶠有三夫人嶠薨詔問學官陳舒舒謂秦漢之後廢一娶九女之制妻卒更娶無復繼室生既加禮亡不應貶朝旨以李氏卒於嶠之微時不霑贈典王何二氏追加章綬唐太子少傅鄭餘慶將立家廟祖有二夫人禮官韋公肅議與舒同略稽禮文參諸故事二夫人並祔於理為宜恭惟懿德皇后久從升祔雖先後有殊在尊親則一請同列太宗室以先後次之詔尚書省集議咸如禮官之請祔神主於太廟乾興元年十月奉真宗神主祔廟以章穆皇后郭氏配康定元年直秘閣趙希言奏太廟自來有寢無廟因堂為室東西十六間內十四間為七室兩首各一夾室按禮天子七廟親廟五祧廟二據古則僖順二祖當遷國家道觀佛寺並建別殿奉安神御豈若每主為一廟一寢或前立一廟以今十六間為寢更立一祧廟逐室各題廟號釦寶神御物宜銷毀之同判太常寺宋祁言周制有廟有寢以象人君前有朝後有寢也廟藏木主寢藏衣冠至秦乃出寢於墓側故陵上更稱寢殿後世因之今宗廟無寢蓋本於茲鄭康成謂周制立二昭二穆與太祖文武共為七廟此一家之說未足援正自荀卿王肅等皆云天子七廟諸侯五大夫三士一降殺以兩則國家七世之數不用康成之說也僖祖至真宗方及六世不應便立祧廟自周漢每帝各立廟晉宋以來多同殿異室國朝以七室代七廟相承已久不可輕改周禮天府掌祖廟之守藏寶物世傳者皆在焉其神御法物寶盝釦床請別為庫藏之自是室題廟號而建神御庫焉嘉祐年仁宗將祔廟脩奉太廟使蔡襄上八室圖為十八間初禮院請增廟室孫抃等以為七世之廟據父子而言兄弟則昭穆同不得以世數之廟有始祖有太祖有太宗有中宗若以一君為一世則小乙之祭不及其父故晉之廟十一室而六世唐之廟十一室而九世國朝太祖之室太宗稱孝弟真宗稱孝子大行稱孝孫而禘祫圖太祖太宗同居昭位南向真宗居穆位北向蓋先朝稽用古禮著之祀典大行神主祔廟請增為八室以備天子事七世之禮盧士宗司馬光以為太祖已上之主雖屬尊於太祖親盡則遷故漢元之世太上廟主瘞於寢園魏明之世處士廟主遷於園邑晉武祔廟遷征西府君惠帝祔廟遷豫章府君自是以下大抵過六世則遷蓋太祖未正東向故上祀三昭三穆巳正東向則幷昭穆為七世唐初祀四世太宗增祀六世及太宗祔廟則遷弘農府君高宗祔廟又遷宣帝皆祀六世前世成法也玄宗立九室祀八世事不經見若以太祖太宗為一世則大行祔廟僖祖親盡當遷夾室祀三昭三穆於先王典禮及近世之制無不符合抃等復議曰自唐至周廟制不同而皆七世自周以上所謂太祖非始受命之主特始封之君而已今僖祖雖非始封之君要為立廟之祖方廟數未過七世遂毀其廟遷其主攷之三代禮未有此漢魏及唐一時之議恐未合先王制禮之意乃存僖祖室以備七室治平四年英宗將祔廟太常禮院請以神主祔第八室祧藏僖祖及文懿皇后神主於西夾室自仁宗而上以次遞遷翰林承旨張方平等議同堂八室廟制已定僖祖當祧合於典禮乃於九月奉安八室神主祧僖祖及后祔英宗罷僖祖諱及文懿皇后忌日熙寧五年中書門下言僖祖以上世次不可得而知則僖祖有廟與商周契稷疑無以異今毀其廟而藏主夾室替祖考之尊而下祔于子孫殆非所以順祖宗孝心事亡如存之義請以所奏付兩制議取其當者時王安石為相不主祧遷之說故復有是請翰林學士元絳等上議曰自古受命之王既以功德享有天下皆推其本統以尊事其祖故商周以契稷有功於唐虞之際故謂之祖有功若必以有功而為祖則夏后氏不郊鯀矣今太祖受命之初立親廟自僖祖以上世次既不可知則僖祖之為始祖無疑矣儻謂僖祖不當比契稷為始祖是使天下之人不復知尊祖而子孫得以有功加其祖考也傳曰毀廟之主陳于太祖未毀廟之主皆升合食于太祖今遷僖祖之主藏于太祖之室則是四祖祫祭之日皆降而合食也請以僖祖之廟為太祖則合於先王禮意翰林學士韓維議曰昔先王有天下迹其基業之所起奉以為太祖故子夏序詩稱文武之功起於后稷後世有天下者特起無所因故遂為一代太祖太祖皇帝功德卓然為宋太祖無少議者僖祖雖為高祖然仰跡功業未見所因上尋世系又不知所以始若以所事契稷奉之竊恐於古無攷而於今亦所未安今之廟室與古殊制古者每廟異宮今祖宗同處一室而西夾室在順祖之右攷之尊卑之次似亦無嫌天章閣待制孫固請特為僖祖立室由太祖而上親盡迭毀之主皆藏之當禘祫時以僖祖權居東向之位太祖順昭穆之列而從之取毀廟之主而合食則僖祖之尊自有所申以僖祖立廟為非則周人別廟姜嫄不可謂非禮祕閣校理王介請依周官守祧之制剏祧廟以奉僖祖庶不下祔子孫夾室以替遠祖之尊帝以維之說近是而安石以維言夾室在右為尊為非理帝亦然之又安石以尊僖祖為始祖則郊祀當以配天若宗祀明堂則太祖太宗當迭配帝又疑明堂以英宗配天與僖祖為非始祖之說遂下禮官詳定同判太常寺兼禮儀事張師顏等議昔商周之興本於契稷故奉之為太祖後世受命之君功業特起不因先代則親廟迭毀身自為祖鄭玄云夏五廟無太祖禹與二昭二穆而已張薦云夏后以禹始封遂為不遷之祖是也若始封世近上有親廟則擬祖上遷而太祖不毀魏祖武帝則處士迭毀唐祖景帝則弘農迭毀此前世祖其始封之君以法契稷之明例也唐韓愈有言事異商周禮從而變晉琅邪王德文曰七廟之義自由德厚流光享祀及遠非是為太祖申尊祖之祀其說是也禮天子七廟而太祖之遠近不可以必但云三昭三穆與太祖之廟而七未嘗言親廟之首必為始祖也國家以僖祖親盡而祧之奉景祐之詔以太祖為帝者之祖是合於禮矣張昭任徹之徒不能遠推隆極之制因緣近比請建四廟遂使天子之禮下同諸侯若使廟數備六則更當上推兩世而僖祖次在第三亦未可謂之始祖也謹按建隆四年親郊崇配不及僖祖開國以來大祭虛其東向斯乃祖宗已行之意請略倣周官守祧之制築別廟以藏僖祖神主大祭之歲祀於其室太廟則一依舊制虛東向之位郊配之禮則仍其舊同知太常禮院蘇梲請即景靈宮祔僖祖即與唐祔獻懿二祖於興聖明德廟禮意無異同判禮院周孟陽等言自僖祖而上世次莫知則僖祖為始祖無疑宜以僖祖配感生帝章衡請尊僖祖為始祖而次祧順祖以合子為父屈之義推僖祖侑感生之祀而罷宣祖配位以合祖以孫尊之義餘且如舊制而馮京欲以太祖正東向之位安石力主元絳初議遂從之帝問配天孰始安石曰宣祖見配感生帝欲改以僖祖配帝然之於是請奉僖祖神主為始祖遷順祖神主夾室以僖祖配感生帝祀詔下太常禮院詳定儀注安石本議以僖祖配天帝不許故更以配感生帝焉元豐元年詳定郊廟禮文所圖上八廟異宮之制以始祖居中分昭穆為左右自北而南僖祖為始祖翼祖太祖太宗仁宗為穆在右宣祖真宗英宗為昭在左皆南面北上陸佃言太祖之廟百世不遷三昭三穆親盡則迭毀如周以后稷為太祖王季為昭文王為穆武王為昭成王為穆康王為昭昭王為穆其後穆王入廟王季親盡而遷則文王宜居昭位武王宜居穆位成王昭王宜居昭位康王穆王宜居穆位所謂父昭子穆是也說者以昭常為昭穆常為穆則尊卑失序復圖上八廟昭穆之制以翼祖太祖太宗仁宗為昭在左宣祖真宗英宗為穆在右皆南面北上何洵直圖上八廟異宮引熙寧儀僖祖正東向之位順祖宣祖真宗英宗南面為昭翼祖太祖太宗仁宗北面為穆正得祖宗繼序德厚流光之本意又以晉孫毓唐賈公彥言始祖居中三昭在左南面西上三穆在右南面東上為兩圖上之又援祭法言翼祖宣祖在二祧之位猶同祖禰之廟皆月祭之與親廟一等無親疏遠近之殺順祖實去祧之主若有四時祈禱猶當就壇受祭請自今二祧神主殺於親廟四時之祭享嘗乃止不及大烝不薦新物去祧神主有禱則為壇而祭庶合典禮又請建新廟於始祖之西略如古方明壇制有詔俟廟制成日取旨三年禮文所言古者宗廟為石室以藏主謂之宗祏夫婦一體同几共牢一室之中有左主右主之別正廟之主各藏廟室西壁之中遷廟之主藏於太祖太室北壁之中其埳去地六尺一寸今太廟藏主之室帝后異處遷主仍藏西夾室求之於禮有所未合請新廟成並遵古制從之二月慈聖光獻皇后祔廟前二日告天地社稷太廟皇后廟如故事至日奉神主先詣僖祖室次翼祖室次宣祖室次太祖室次太宗室次太宗與懿德皇后明德皇后同一祝次享元德皇后慈聖光獻皇后異饌位異祝行祔謁禮次真宗室次仁宗室次英宗室禮畢奉神主歸仁宗室元豐六年六月孝惠孝章淑德章懷四后升祔準章獻明肅章懿二后升祔禮畢遍享太廟止行升祔享禮及祭七祀權罷孟冬薦享仍以配繼先後為序八年禮部太常寺言詔書定七世八室之制今神宗皇帝崇祔翼祖在七世之外與簡穆皇后祧藏於西夾室置石室中十一月丁酉祔神宗神主于第八室自英宗上至宣祖以次升遷紹聖元年二月祔宣仁聖烈皇后于太廟元符三年禮部太常寺言哲宗升祔宜如晉成帝故事於太廟殿增一室候祔廟日神主祔第九室詔下侍從官議皆如所言蔡京議以哲宗嗣神宗大統父子相承自當為世今若不祧遠祖不以哲宗為世則三昭四穆與太祖之廟而八宜深攷載籍遷祔如禮陸佃曾肇等議國朝自僖祖而下始備七廟故英宗祔廟則遷順祖神宗祔廟則遷翼祖今哲宗於神宗父子也如禮官議則廟中當有八世況唐文宗即位則遷肅宗以敬宗為一世故事不遠哲宗祔廟當以神宗為昭上遷宣祖以合古三昭三穆之義先是李清臣為禮部尚書首建增室之議侍郎趙挺之等和之會清臣為門下侍郎論者多從其議惟京佃等議異二議既上清臣辯說甚力帝迄從焉六月禮部請用太廟東夾室奉安哲宗神主太常少卿孫傑言先帝神主錯之夾室即是不得祔於正廟與前詔增建一室之議不同昨用嘉祐故事專置使脩奉請以夾室奉安神主亦與元置使之意相違請如太常前議增建一室尚書省以廟室未備行禮有期權宜升祔隨即增脩比之前代設幄行事者不為不至詔依初旨行之迺祔哲宗神主于夾室崇寧二年祧宣祖與昭憲皇后神主藏西夾室居翼祖簡穆皇后石室之次五年詔曰去古既遠諸儒之說不同鄭氏謂太祖及文武不祧之廟與親廟四為七是不祧之宗在七廟之內王氏謂非太祖而不毀不為常數是不祧之宗在七廟之外本朝今已五宗則七廟當祧者二宗而已遷毀之禮近及祖考殆非先王尊祖之意宜令有司復議禮官言先王之制廟止於七後王以義起禮乃有增置九廟者禮部尚書徐鐸又言唐之獻祖中宗代宗與本朝僖祖皆嘗祧而復今存宣祖於當祧之際復翼祖於已祧之後以備九廟禮無不稱乃命鐸為脩奉使增太廟殿為十室四年十二月復翼祖宣祖廟行奉安禮惟不用前期誓戒及亞終獻之樂舞焉高宗建炎二年奉太廟神主于揚州壽寧寺三年幸杭州奉安于溫州紹興五年司封郎中林待聘言太廟神主宜在國都今新邑未奠當如古行師載主之義遷之行闕以彰聖孝於是始建太廟于臨安奉迎安置
