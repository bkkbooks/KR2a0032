body:
  text: 宋史卷六十四志第十七五行二下火乾德二年十月眉州獻禾生九穗圖四年四月府州尉氏縣雲陽縣並有麥兩歧五月魚臺縣麥秀三歧六月南充縣民何約田禾一莖十三穗一莖十一穗七月又生一莖九穗開寶二年五月梓蜀二州六年四月東明縣八年五月鄭州梓州合州巴州縣並獻瑞麥太平興國元年九月隰州獻合穗禾長尺餘十月渝州獻九穗禾三年四月夏縣五月舒州六月閬州麥並秀兩歧四年七月洺州獻嘉禾邛資二州禾並九穗八月涇州民田並有嘉禾九月知溫州何士宗獻嘉禾九穗圖五年七月蓬萊縣民王明田穀隔壠合穗相去一尺許八月知慈州張愈獻合穗禾九月流溪縣六年五月汝陰縣九年五月施州麥並秀兩歧端拱元年五月陳州淳化元年四月魏城縣七月閬州二年四月蔡州五月陳州陵州仁壽縣四年五月達州五年四月永城縣並獻瑞麥至道元年六月嘉禾生眉山縣蕭德純田一本二十四穗七月金水縣胥羅翊田禾生九穗舒州監軍吳光謙廨粟畦兩本歧分十穗臨渙縣民侯正家二禾合成一穗八月綿竹縣禾生九穗夏州團練使趙光嗣獻嘉禾一函十月濠州獻瑞穀圖二年五月泗州獻瑞麥三年二月洋州嘉禾合穗知州施翊以聞四月唐州遂州磐石縣並獻瑞麥五月黃州建昌軍麥秀二三穟八月雅州禾一莖十四穗雄州嘉禾生九月知代州李允正獻嘉禾穗一匣咸平元年五月曲水縣麥秀二三穗七月嘉禾生後苑一莖二十四穗百丈縣民李文寶禾生一莖十七穗八月蘇州廨後園邠州民田並禾生合穗平夷縣民王義田禾兩穗合為一化城縣民張美田禾九穗二年五月華州麥秀二三穗七月資官縣吏董昭美禾一莖九穗者各一棣洺二州嘉禾合穗彭城縣民張福先田粟一莖分四穗八月郪縣趙範粟一莖九穗玄武縣民李知進田粟一莖上分五苗成二十一穗榆次縣民周貴田禾三莖共穗三年五月酇縣海陵縣並麥秀二三穗七月真定府禾三莖一穗達州民李國清田禾一苗九穗八月辰州公田禾生一莖三穗者四隰州嘉禾合穗圖以獻四年八月舒州嘉禾生九月知河中府郭堯卿獻嘉禾合穗圖五年八月臨汾縣民吉遇洪洞縣民范思安田並禾生隔二隴上合為一六年七月涉縣民連罕田隔四壠同穎銅梁縣民楊彥魯禾一莖九穗景德元年正月寧晉縣民耿待問田禾合穗者三本知州王用和圖以獻二年七月獲鹿縣禾合穗八月滎陽縣及相州嘉禾異畝同穎九月並州貢嘉禾圖三年八月大名府滄州並嘉禾生真定府禾異畝同穎九月榮州禾一莖十八穗四年六月南雄州保昌民田禾一本九穗以圖來獻七月神泉縣民張篆田禾一苗九穗貝兗二州嘉禾合穗九月衛德二州廣安軍並上嘉禾圖大中祥符元年曲水縣南鄭縣並麥秀二三螳封縣奉高鄉民田禾異壠同穎判州王欽若以聞八月鄆州獻嘉禾淳化縣民賀行滿田禾隔四壠相去四尺許合為一穗新平縣民尹遇田禾合穗者二本真定府粟生二穗九月澧州嘉禾一莖十穗虢州團練使綦興獻合穗禾嘉州民潘德麟田禾二莖各九穗麟州嘉禾生二年六月簡州民集若寧家禾九穗七月黔州嘉禾異畝合穗八月嘉州廨有一莖十四穗生庭中岐山縣禾異畝同穎知州施護以聞三年四月同州麥秀二三穗七月冀淄昭三州嘉禾多穗異畝同穎八月寧化軍嘉禾合穗寶鼎縣民張知友田禾隔四壠相去二尺許合穗判府陳堯叟以聞樓煩縣民田禾異本同穎劍州嘉禾生一莖九穗四年三月辛巳帝至西京福昌縣民朱懿文嘉禾一本七穗昌元縣民舒元晃田禾一莖九穗知州柴德方以聞金水縣民田禾一莖三十六穗四月六安縣麥秀二三穗五月唐汝廬宿泗濠州麥自生八月蜀州禾一莖九穗長壽縣民常自天田禾合穗者二蒲縣禾異畝同穎九月知虢州李昭獻合穗禾五年四月遂州麥秀兩穗或三穗七月華州禾一莖兩穗真定府四縣嘉禾合穗八月京兆府嘉禾生九月巴州禾一莖二十二穗一莖十七穗六年三月雍州麥秀兩穗或三穗七月益州嘉禾九穗至十穗朝邑縣民田禾八莖同穎己未召近臣觀嘉穀于後苑有七穗至四十八穗繪以示百官八月龍門縣永寧軍博野縣民田並嘉禾生合穗瀛州嘉禾生知州馮守信以聞欣州秀容定襄二縣民田禾合穗保定軍公田大通監並嘉禾生九月京兆府獻長安縣嘉禾圖一枝雙穗七年通泉縣尉劉定辭官廨禾一本六穗邯鄲縣民馬乂田禾隔壠合穗者二本滁州榷酒署內禾一莖二穗晉原平原二縣民田禾並一本十二穗三月郾城縣麥秀兩穗三穗八月知亳州李迪獻禾一莖三穗至十穗府谷縣民劉善田禾隔三壠合成一穗嵐州牙吏燕清田禾一莖八穗一莖五穗遼州平城民田禾隔二壠合穗有十三本或二十一本合為一者九月施州禾一莖九穗至十二穗真定貝州並嘉禾合穗八年湖陽縣麥秀兩穗三穗四月旭川縣民任慶和田禾一莖九穗閏六月眉山縣民楊文繼邛州李義田禾並一莖九穗七月永靜軍禾隔壠合穗者二軍使仲甫以聞八月桂陽監民何文勝田粟一本二穗九年四月建初縣麥秀兩穗或三穗八月判大名府魏咸信獻合穗禾永靜軍阜城縣民田穀隔三壠合穗者二本廣州嘉禾生安化縣民吳景延田禾穗長尺五寸九月知鳳翔府趙湘知邠州王守斌並獻嘉禾圖天禧元年七月流江縣禾一莖九穗二年九月河北安撫副使張昭遠獻穀穗三各長尺餘資州禾一莖九穗三年七月饒陽縣民楊宣田禾二壠相去二尺許合為一穗益州嘉禾一莖九穗四年八月內出玉宸殿瑞穀圖示近臣每本有九穗十穗者九月郪縣民岑貫田禾一莖九穗知州蘇維甫以聞五年四月河南府民田嘉禾合穗知府王欽若以聞七月導江縣民趙元賞青城縣民王偉田禾並一莖九穗乾興元年五月南劍州麥一本五穗綿州麥秀兩歧八月洋州嘉禾合穗十一月高陵縣嘉禾合穗天聖二年八月乙酉寧化軍嘉禾異畝同穎四年九月榮州禾一本九穗五年資州禾一本九穗六年欣州禾異本同穎五月乙未陳州瑞麥一莖二十穗六月陳州獻瑞麥圖七年七月河南府嘉禾合穗八年八月壬午召近臣觀瑞穀於元真殿九年膚施縣禾異畝同穎景祐元年七月磁州嘉禾合穗八月大名府嘉禾合穗九月涇州磁州保德軍並嘉禾合穗十月孝感應城二縣稻再熟成德軍禾一本九穗三年九月榮州禾一莖九穗四年七月己巳臨清縣穀異畝同穎者六十本康定元年六月蜀州懷安軍並禾九穗慶曆二年壽安縣嘉禾合穗六年五月昭化縣禾一莖兩歧八月趙州懷州並嘉禾異畝同穎九月定襄縣嘉禾隔二壟合穗長江縣禾一莖十穗十二月石照諸縣野穀穭生七年九月邠州榮州德州並嘉禾合穗皇祐元年密州禾合穗者五本永康軍禾一莖九穗二年九月延州石州並嘉禾異畝合穗永康軍嘉禾一莖九穗十二月密州禾十莖合一穗石州四莖合一穗三年五月彭山縣上瑞麥圖凡一莖五穗者數本帝曰朕嘗禁四方獻瑞今得西川麥秀圖可謂真瑞矣其賜田夫束帛以勸之是月滁州麥一莖五穗四年八月嘉州蜀州並嘉禾一莖九穗九月南劍州有禾一本雙莖二十穗五年三月資州嘉禾一莖九穗閏六月資州麥秀兩歧七月鄆州祁州禾異畝同穎九月成德軍嘉禾異畝同穎綿州禾一莖九穗至和元年十二月蜀州嘉禾一莖九穗二年五月亳州麥秀兩歧六月應天府貢大麥一本七十穗小麥一本二百穗八月邛州嘉禾一莖九穗嘉祐三年六月綿州麥一穗兩歧七月泰山上瑞麥圖凡五本五百一穗四年六月彰明縣有麥兩歧百餘本五年三月崇安縣嘉禾一本九十莖七年陵州禾一莖九穗九月平遙縣禾異畝合穗熙寧元年永興軍禾一莖四穗眉州禾一莖九穗四年乾寧軍禾合穗成德軍晉州汾州禾異壟同穗六年南溪縣禾一苗九穗八年懷安軍瀘州渠州各麥秀兩歧安喜縣禾二本間五壟合穗平山縣禾合穗者二保塞縣禾七本間一壟或兩壟合穗潞城縣禾合穗者二九年火山軍禾間五壟束鹿秀容二縣間四壟渤海縣皆異壟同穎流江縣禾一苗九穗譙縣麥一本三穗尉氏縣湖陽縣彭城縣麥一本兩穗渠州大麥一穗兩歧或三歧四歧者陽翟縣麥秀兩歧天興寶雞二縣皆麥秀兩歧仍一本有三四穗或六穗者石州安州麥秀兩歧十年磁州禾合穗眉州禾生九穗亳州禾生二穗元豐元年武康軍禾一莖十一穗汝州禾合穗寧江軍禾一莖十穗邢州麥秀兩歧夔州麥一本三穗二年簡州安德軍麥秀兩歧曹州生瑞禾北京安武軍懷州鎮戎軍禾合穗鎮戎軍懷州禾皆異畝同穎袁州禾一莖八穗至十一穗皆層出長者尺餘府州禾異畝同穗三年眉州禾一本九穗齊州禾一莖五穗趙州禾二本合穗安州麥一本三穗至五穗凡十四莖深州麥秀兩歧或三四穗凡四十畝眉州麥秀兩歧四年徐州麥一本百七十二穗代州禾合穗襄邑縣禾一本九穗五年高邑縣禾一莖五穗青州安肅軍憲州禾皆異畝同穎六年洪州七縣稻已穫再生皆實威勝軍武鄉縣禾二本間五壟合穗歷城縣禾二本合穗趙州禾間三壟合穗唐州禾二穗者四瀘州禾九穗懷青濰三州禾皆異壟同穗府州陝州保平軍禾皆合穗七年蜀州禾生九穗青州禾異畝同穎者十一同州禾異畝同穎合州麥秀兩歧八年亳州麥一莖二穗一莖三穗一莖四穗鎮潼軍秫禾苗異壟同穗岷州禾皆四穗泰寧軍禾異本同穎者三是歲秋冬保澤趙鄂隰滄濰密簡饒諸州威勝軍禾合穗或異畝同穎元祐元年簡州禾合穗石州禾異畝同穎二年欣隰磁濰懷州禾異畝同穎趙欣州禾合穗三年祁保彭州禾異畝同穎瀛磁代豐州安國軍禾合穗劍州安國軍麥秀兩歧夔州麥一本十二穗四年泰寧軍麥異畝同穎流江縣禾一本二穗榮德縣禾一本九穗青鄭濟趙州禾合穗及有一本三穗峨嵋縣禾異畝同穎又禾登一百五十三穗五年冀州安武軍大名府成德軍禾合穗永寧軍禾二本隔五壟合穗平定軍禾異畝同穗汀州禾生三十六穗劍州禾一本八穗普州麥一莖雙穗夔州麥秀五岐六年汝陽縣美原縣兗州鄒縣麥一莖數穗南劍州粟一本三十九穗瀛定懷汝晉昌州平定永康軍禾合穗七年均兗祁滄資華柳州禾合穗鄂州禾一本一枝兩穗三本三枝兩穗仙源縣禾異壟合穗耀州粟二莖隔兩壟合為一穗梁山軍禾一莖九穗固始縣麥有雙穗定陶縣丹陽縣麥秀兩歧紹聖元年博野縣麥一本五穗漢陽軍麥秀兩歧樂壽縣麥一本兩穗或三穗懷安軍禾一本九穗二年青濰果冀德濱嵐濮達州禾合穗三年安武軍禾合穗嵐州禾兩根合穗者二普相青齊嵐州永康軍禾異畝同穎合秀至九穗泉州粟二本五穗八穗瑕丘縣武陟縣陝城小溪四縣麥合穗良原縣沈丘縣長子縣麥秀兩歧四年河中府麥秀三穗虹縣雲安縣麥秀兩歧茂州一枝兩穗汶山縣一枝三穗至六穗西京鄆齊隰州禾合穗穎昌府禾一莖四穗至五穗元符元年慶州禾異本同穎青晉潞州荊南府永寧鎮戎軍等一十一處禾合穗邢州禾異壟合穗南劍州嘉州禾一莖九穗內鄉縣麥一莖兩穗符離靈壁臨渙蘄虹五縣麥秀兩穗兩當縣麥秀三穗安平縣生瑞麥二年漣水軍麥合穗鄧岷州鎮戎軍禾合穗十一月岷州宕昌寨生瑞麥建中靖國元年沛縣晉州禾合穗崇寧元年淄州禾合穗二年晉寧軍欣州禾合穗五年河南府保德軍慶蘭潭冀府州岢嵐軍禾合穗淮西路民田既刈復生實大觀元年蜀州粟一莖九穗二年鞏州粟一莖六穗鎮潼軍隆德府保德軍慶蘭州禾合穗武信軍禾一莖九穗簡州麥秀兩歧三年武信軍瀘遂普州麥秀兩歧四年蔡州麥一莖兩歧至七八歧者九十畝九月