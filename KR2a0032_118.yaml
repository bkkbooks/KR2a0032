body:
  text: 宋史卷一百一十八志第七十一禮二十一賓禮三朝儀班序百官轉對百官相見儀制朝儀班序太祖建隆三年三月有司上合班儀太師太傅太保太尉司徒司空太子太師太傅太保嗣王郡王左右僕射太子少師少傅少保三京牧大都督大都護御史大夫六尚書常侍門下中書侍郎太子賓客太常宗正卿御史中丞左右諫議大夫給事中中書舍人左右丞諸行侍郎祕書監光祿衛尉太僕大理鴻臚司農太府卿國子祭酒殿中少府將作監前任節度使開封河南太原尹太子詹事諸王傅司天監五府尹國公郡公中都督上都護下都督太子左右庶子五大都督府長史中都護下都護太常宗正少卿祕書少監光祿等七寺少卿司業三少監三少尹少詹事左右諭德家令率更令僕諸王府長史司馬司天少監起居舍人侍御史殿中侍御史左右補闕拾遺監察御史郎中員外郎太常博士五府少尹五大都督府司馬通事舍人國子博士五經博士都水使者四赤令太常宗正祕書丞著作郎殿中丞尚食尚藥尚舍尚乘尚輦奉御大理正太子中允贊善中舍洗馬諸王友咨議參軍司天五官正凡雜坐者以此為準詔曰尚書中臺萬事之本而班位率次兩省官節度使出總方面古諸侯也又其檢校兼守官多至師傅三公而位居九寺卿監之下甚無謂也其給事諫議舍人宜降於六曹侍郎之下補闕次郎中拾遺監察次員外郎節度使升於六曹侍郎之上中書侍郎之下餘悉如故乾德元年閏十二月詔自今一品致仕官曾帶平章事者朝會宜綴中書門下班二年二月詔重定內外官儀制有司請令上將軍在中書侍郎之下大將軍在少卿監之下諸衛率副率在東宮五品之下內客省使視大卿客省使視大監引進使視庶子判四方館事視少卿閣門使視少監諸司使視郎中客省引進閣門副使視員外郎諸司副使視太常博士通事舍人從本品供奉官視諸衛率殿直視副率樞密承旨視四品朝官兼南班官諸司使者從本品副承旨視寺監丞諸房副承旨視南省都事凡視朝官者本品下視京官在其上開寶六年九月詔曰周之宗盟異姓為後此先王所以睦九族而和萬邦也晉王親賢莫二位望俱崇方資夾輔之功俾先三事之列宜位宰相上九年十一月詔齊王廷美武功郡王德昭位在宰相上大中祥符元年正月有司上酺宴班位駙馬都尉宮僚員僚皇親大將軍已下行門宰臣樞密使已下潁王皇親郡王侍衛馬軍都指揮使已下皇親使相皇親節度使皇親觀察留後已下皇親防禦團練刺史三班合為一節度使觀察留後已下防禦團練刺史三班合為一並重行異位詔依所定既而武康軍節度使李端願言使相亦當合為一班不當獨行尊異詔令閣門再定而閣門引儀制及以前議為是端願復伸其議自劾妄言乃詔太常禮院與御史臺同詳定禮院言常朝起居班次緣祖宗舊制不宜併合從之四年閏三月太常禮院閣門言準詔同詳定閣門使李端賣心所奏閣門儀制宰臣與親王立班坐位分左右各為班首宰臣樞密使帶使相或帶郡王並使相作一行總為中書門下班其親王獨行一班者準封爵令兄弟皇子皆封國謂之親王所以他官不可參綴檢會坐次圖直將宗室使相輒綴親王蓋更張之時未見親王遂致失於講求近見朝拜景靈宮東陽郡王皓亦綴親王班竊恐未安今取到閣門儀制其合班宰臣使相在東親王在西分班立又祥符元年宴坐次圖宰臣王旦與使相石保吉在東寧王元偓舒王元稱廣陵郡王元儼節度使惟吉在西分班坐其元儼惟吉是郡王與節度使許綴親王班竊慮當時出自特旨今來檢尋元初文字不見在先朝只依祥符元年宴坐次圖子親王及帶使相郡王在西為一班臣等參詳請依閣門儀制親王在西獨為一班宗室郡王帶使相許綴親王立班坐次即係臨時特旨從之熙寧二年四月國信所言大遼賀同天節左番使耶律奭赴文德殿拜表言南使到北朝綴翰林學士班今來却在節度使之下館伴者諭之始就班時下御史臺閣門同詳定奏稱人使不知本朝翰林學士班自在節度使之下如遇合班即節度使在翰林學士之西差前別為一班立俱不相壓欲且依久來儀制體例詔依所定是月編修閣門儀制所言慶曆中改文明殿學士為觀文殿學士又置大學士按文明殿即今文德殿乃正衙前殿也後唐始置學士序位樞密副使之下每遇紫宸殿坐朝則升殿侍立蓋文德紫宸通謂之前殿故學士侍立為宜其觀文殿深在禁中乃與資政端明殿相類而資政端明學士並不侍立竊詳慶曆所改職名雖用舊之班著而殿之次序與舊義理不同其觀文殿大學士自今遇紫宸殿坐朝請更不升殿侍立從之元祐元年五月詔太師平章軍國重事文彥博已降旨令獨班起居自今赴經筵都堂同三省樞密院奏事並序位在宰臣之上百官轉對自建隆詔內殿起居日令百官以次轉對限以二人其封章於閣門通進復鞠躬自奏宣徽使承旨宣答拜舞而出著為閣門儀制淳化二年詔自今內殿起居日復令常參官二人次對閣門受其章大中祥符末罷不復行景德三年復詔羣臣轉對其在外京官內殿崇班以上候得替先具民間利害實封於閣門上進方得朝見治平中命御史臺每遇起居日令百官轉對御史臺言舊制起居日輪兩省及文班秩高者二員轉對若兩省官有充學士待制則綴樞密班起居內朝臣僚不與尋詔遇轉對日增二員熙寧初閣門言舊制中書省樞密院奏事退再引三班假日則兩班或再御後殿引對多及午刻遇開經筵即至申末恐久勞聖躬請遇經筵日自二府奏事外止引一班或有急奏及言事官請對即取旨俟罷經筵日仍舊又言假日御崇政殿每遇辰時則隔班過延和殿再引不待進食至巳刻隔班取旨尚許引對請自今隔班過延和殿俟已進食再引遇寒暑大風雨雪即令次日引對詔自今授外任者許令轉對訖朝辭監察御史𩹉行張戩程皓言每欲奏事必俟朝旨或朝政有闕及聞外事而機速後時則已無所及況往復俟報必由中書萬一事干政府則或致阻格請依諫官例牒閣門求對或有急奏即許越次登對庶幾遇事入告無憂失時又以編修閣門儀制所言三衙有急奏許於後殿登對若別有奏陳則報閣門如常制或假日御崇政殿則於已得旨對班後續引且許兩制以上同班奏事元豐中詔尚書侍郎同郎官一員奏事郎中員外郎番次隨之不許獨留身侍郎以下亦不許獨請奏事其左右選非尚書通領者聽侍郎以上郎官自隨祕書殿中省諸寺監長官視尚書二丞以下視侍郎又詔三省樞密院獨班奏事日無得過三班若三省俱獨班則樞密院當請奏事其見任官召對訖次日即朝辭回任聽旨元祐中宰臣呂大防言昨垂簾聽政惟許臺諫以二人同對故不正之言無得以入今陛下初見羣臣請對者必衆既人人得進則善惡相雜故於釆納尤難帝曰人君以納諫為上然邪正則不可不辨遂詔上殿班當直牒及帥臣國信使副許依元豐八年以前儀制紹聖初臣僚言文德殿視朝輪官轉對蓋襲唐制故祖宗以來每遇轉對侍從之臣亦皆與焉元祐間因言者免侍從官轉對續詔職事官權侍郎以上並免自此轉對止於卿監郎官而已請自今視朝轉對依元豐以前條制又詔自今三省樞密院進擬在京文臣開封府推判官武臣橫行使副在外文臣諸路監司藩郡知州武臣知州軍已上取旨召對臣僚言每緣職事請對待次旬日遇有急奏深恐失事請自今後許依六曹開封例先次挑班上殿仍不隔班又言諸路監司朝廷所選以推行法令省問風俗朝辭之日當令上殿六曹尚書如有職事奏陳許獨員上殿其羣臣請對雖遇休假特御便殿聽納既又詔應節鎮郡守往令陛辭歸許登對不特審觀人材亦所以重外任也可於監司不許免對條下增入節鎮郡守依此重和元年臣僚言比年以來二三大臣奏對留身讒疏善良請求相繼甚非至公之體詔自今惟蔡京五日一朝許留身餘非除拜遷秩因謝及陳乞免罷並不許獨班奏事令閣門報御史臺彈劾又詔寺監職事上部部上省故得上下維持綱紀所出今後雖係兩制職司寺監不許獨對臣僚言祖宗舊制有五日一轉對者今惟月朔行之有許朝官轉對者今惟待制以上預焉自明堂行視朔禮歲不過一再則是畢歲而論思者無幾請遇不視朔即令具章投進以備覽觀又諸路監司未經上殿者雖從外移先赴闕引對方得之官並從其議百官相見儀制乾德二年詔曰國家職位肇分軌儀有序冀等威之斯辨在品式之惟明矧著位之庶官及內司之諸使以至軒墀引籍州縣命官凡進見於宰相或參候於長吏既為總攝合異禮容稽於舊儀且無定法或傳晉天福周顯德中以廷臣內職賓從將校比其品數著為綱條載於刑統未為詳悉宜令尚書省集臺省官翰林祕書國子司業太常博士等詳定內外羣臣相見之儀翰林學士承旨陶穀等奏兩省官除授假使出入並參宰相起居郎以下參同舍人五品以上官遇於塗斂馬側立須其過常侍以下遇三公三師尚書令引避其值僕射斂馬側立御史大夫中丞皆分路行起居郎以下避僕射遇大夫斂馬側立中丞分路尚書丞郎郎中員外並參三師三公令僕郎中員外兼參左右丞本行尚書侍郎及本轄左右司郎中員外御史大夫以下參三師三公尚書令中丞兼參大夫知雜事參中丞三院御史兼參知雜及本院之長大夫避尚書令以上遇僕射斂馬側立而避大夫遇尚書丞郎兩省官諸司三品以上金吾大將軍統軍上將軍皆分路餘官遇中丞悉引避知雜兼避中丞遇左右丞斂馬側立餘皆分路郎中及少卿監大將軍以下皆避知雜三院同行如知雜之例少卿監並參本司長官丞參少卿諸司三品遇僕射於途皆引避諸衛大將軍參本衛上將軍東宮官參隔品凡參者若遇於途皆避公參之禮列拜堂上位高受參者答焉四赤縣令初見尹趨庭受拜後升廳如客禮內客省使謁宰相樞密使以客禮閣門使以上列拜皆答客省副使至通事舍人諸司使樞密承旨不答焉自樞密使副宣徽使皆差降其禮供奉官殿直教坊使副辭令官伎術官並趨庭倨受諸司副使參大使通事舍人參閣門使防禦團練刺史謁本道節帥節度防禦團練副使謁本使並具軍容趨庭延以客禮少尹幕府於本院長官悉拜防禦團練判官謁本道節帥並趨庭上佐州縣官見宰相樞密使及本屬長官並拜於庭天長雄武等軍使見宰相樞密亦如之參本府賓幕官及曹掾縣簿尉參令皆拜王府官見親王如賓職見使長府縣官兼三館職者見大尹同赤縣令六品以下未嘗參官見宰相樞密及本司長官並拜階上流外見流內品官並趨庭諸司非相統攝皆稱移牒分路者不得籠街及占中道依秩序以分左右遇於驛舍非相統攝及名位縣隔先至者居之臺省官當通官呵止者如舊式文武官不得假借呼稱以紊朝制當避路者若被宣召及有所捕逐許橫度焉又令諸司使副使通事舍人見宰相樞密使升階連姓通名展拜不答拜其見樞密副使參知政事宣徽使以客禮展拜太平興國以後又制京朝官知令録者見本州長吏以客禮三司判官推官主判官見本使如郎中員外見尚書丞郎之儀咸平中又詔開封府左右軍巡使京官知司録及諸曹參軍到畿縣見京尹並趨庭設拜六年命翰林學士梁皓等詳定閣門儀制成六卷因上言三司副使序班朝服比品素無定列至道中筵會在知制誥後郎中前今請同諸司少卿監班位在上如官至給諫卿監者自如本品朝會大宴隨判使赴長春殿起居引駕其朝會引駕至前殿與諸司使同退大中祥符五年復命翰林學士李宗諤等詳定儀制文武百官遇宰相樞密使參知政事並避起居郎以下遇給舍以上斂馬御史大夫遇東宮三師尚書丞郎兩省侍郎分路而行中丞遇三師三少太常卿金吾上將軍並分路而行知雜御史遇尚書侍郎諸司三品金吾大將軍統軍諸衛上將軍分路而行三院同行如知雜例不同行遇左右丞則避尚書丞郎郎中員外遇三師三公尚書令則避郎中員外遇丞郎則避太常博士以下朝官遇本司長官三師三公僕射尚書丞郎大夫中丞知雜御史並避權知判者不避遇兩省給舍以上斂馬京官遇丞郎給舍大卿監祭酒以上及本寺少監卿司業並避諸軍衛大將軍以下遇上將軍統軍亦避詹事遇上臺官如卿監之例庶子少詹事至太子僕遇東宮三師三少並避遇上臺官如少卿監例中允以下遇東宮三師三少並避遇賓客詹事斂馬遇上臺官如太常博士例應合避尚書者並避三司使其權知開封府如本官品避其臺省官雖不合避而職在統臨者並避武班內職並依此品大觀二年定王嘉王府侍講沈錫等奏二王出就外學其初見及侍王禮儀講説疏數之節請如故事手詔按祥符故事記室翊善見諸王皆下拜真宗特以張士遜為王友命王答拜以示賓禮今講讀輔翊之官職在訓道亦王友傅也可如例令王答拜羣臣赴臺參謝辭者新授加恩出使者尚書侍郎則三院御史各一員中丞大夫皆對拜三院仍班迎不坐班即不赴節度使賓客太常宗正卿則御史一員中丞大夫皆對拜兩使留後至刺史祕書監至五官正上將軍至郎將四廂都指揮使及內職軍校遙郡以上樞密都承旨及內職帶正員官者四赤縣令三京司録節度行軍至團練副使幕職官任憲銜者皆御史一員對拜中丞大夫對揖亦令揖訖進言得參風憲再揖而退若曾任中書門下及左右丞皆不赴加階勳食邑章服館閣三司開封府職事及內職轉使額軍額亦不赴臺謝僕射過正衙日臺官大夫以下與百官並詣幕次致賀文官一品二品曾任中書樞密院者不赴大夫中丞則郎中少卿監大將軍以下亦然本官約止則不赴僕射赴上都省者罷此儀
