body:
  text: 宋史卷九十八志第五十一禮一吉禮一五代之衰亂甚矣其禮文儀注往往多草創不能備一代之典宋太祖興兵間受周禪收攬權綱一以法度振起故弊即位之明年因太常博士聶崇義上重集三禮圖詔太子詹事尹拙集儒學之士詳定之開寶中四方漸平民稍休息乃命御史中丞劉溫叟中書舍人李昉兵部員外郎知制誥盧多遜左司員外郎知制誥扈蒙太子詹事楊昭儉左補闕賈黃中司勳員外郎和峴太子中舍陳鄂撰開寶通禮二百卷本唐開元禮而損益之既又定通禮義纂一百卷太宗尚儒雅勤於治政修明典章大抵曠廢舉矣真宗承重熙之後契丹既通好天下無事於是封泰山祀汾陰天書聖祖崇奉迭興專置詳定所命執政翰林禮官參領之尋改為禮儀院仍歲增修纖微委曲緣情稱宜蓋一時彌文之制也自通禮之後其制度儀注傳於有司者殆數百篇先是天禧中陳寬編次禮院所承新舊詔敕不就天聖初王始類成書盡乾興為禮閣新編大率吏文無著述體而本末完具有司便之景祐四年賈昌朝撰太常新禮及祀儀止於慶曆三年皇祐中文彥博又撰大享明堂記二十卷至嘉祐中歐陽修纂集散失命官設局主通禮而記其變及新禮以類相從為一百卷賜名太常因革禮異於舊者蓋十三四焉熙寧十年禮院取慶曆以後奉祀制度別定祀儀其一留中其二付有司知諫院黃履言郊祀禮樂未合古制請命有司考正羣祀詔履與禮官講求以聞元豐元年始命太常寺置局以樞密直學士陳襄等為詳定官太常博士楊完等為檢討官襄等言國朝大率皆循唐故至於壇壝神位法駕輿輦仗衛儀物亦兼用歷代之制其間情文訛舛多戾於古蓋有規摹苟略因仍既久而重於改作者有出於一時之儀而不足以為法者請先條奏候訓敕以為禮式未幾又命龍圖直學士宋敏求同御史臺閣門禮院詳定朝會儀注總四十六卷曰閣門儀曰朝會禮文曰儀注曰徽號寶冊儀祭祀總百九十一卷曰祀儀曰南郊式曰大禮式曰郊廟奉祀禮文曰明堂祫享令式曰天興殿儀曰四孟朝獻儀曰景靈宮供奉敕令格式曰儀禮敕令格式祈禳總四十卷曰祀賽式曰齊醮式曰金籙儀蕃國總七十一卷曰大遼令式曰高麗入貢儀曰女真排辦儀曰諸蕃進貢令式喪葬總百六十三卷曰葬式曰宗室外臣葬敕令格式曰孝贈式其損益之制視前多矣紹聖而後纍詔續編起治平訖政和凡五十一年為書三百卷今皆不傳而大觀初置議禮局於尚書省命詳議檢討官具禮制本末議定請旨三年書成為吉禮二百三十一卷祭服制度十六卷頒焉議禮局請分秩五禮詔依開寶通禮之序政和元年續修成四百七十七卷且命倣是修定儀注三年五禮新儀成凡二百二十卷增置禮直官許士庶就問新儀而詔開封尹王革編類通行者刊本給天下使悉知禮意其不奉行者論罪宣和初有言其煩擾者遂罷之初議禮局之置也詔求天下古器更制尊爵鼎彝之屬其後又置禮制局於編類御筆所於是郊廟禋祀之器多更其舊既有詔討論冠服遂廢鞾用履其他無所改議而禮制局亦罷大抵纍朝典禮講議最詳祀禮修於元豐而成於元祐至崇寧復有所增損其存於有司者惟元豐郊廟禮文及政和五禮新儀而已乃若圜丘之罷合祭天地明堂專以英宗配帝悉罷從祀羣神大蠟分四郊壽星改祀老人禧祖已祧而復遂為始祖即景靈宮建諸神御殿以四孟薦享虛禘祭去牙槃食卻尊號罷入閣儀並常朝及正衙橫行此熙寧元豐變禮之最大者也元祐冊后政和冠皇子元符創景靈西宮崇寧親祀方澤作明堂立九廟鑄九鼎祀熒惑大觀受八寶大祀皆前期十日而戒凡此蓋治平以前所未嘗行者欽宗即位嘗詔春秋釋奠改從元豐儀罷新儀不用而未暇也靖康之厄蕩析無餘南渡中興鋭意修復高宗嘗謂輔臣曰晉武平吳之後上下不知有禮旋致禍亂周禮不秉其何能國孝宗繼志典章文物有可稱述治平日久經學大明諸儒如王普董弅等多以禮名家當時嘗續編太常因革禮矣淳熙復有編輯之旨其後朱熹講明詳備嘗欲取儀禮周官二戴記為本編次朝廷公卿大夫士民之禮盡取漢晉而下及唐諸儒之說考訂辨正以為當代之典未及成書而沒理宗四十年間屢有意乎禮文之事雖曰崇尚理學所謂禮云禮云玉帛云乎哉蓋可三歎咸淳以降無足言者今因前史之舊芟其繁亂彙為五禮以備一代之制使後之觀者有足徵焉五禮之序以吉禮為首主邦國神祇祭祀之事凡祀典皆領於太常歲之大祀三十正月上辛祈穀孟夏雩祀季秋大享明堂冬至圜丘祭昊天上帝正月上辛又祀感生帝四立及土王日祀五方帝春分朝日秋分夕月東西太一臘日大蠟祭百神夏至祭皇地祇孟冬祭神州地祇四孟季冬薦享太廟后廟春秋二仲及臘日祭太社太稷二仲九宮貴神中祀九仲春祭五龍立春後丑日祀風師亥日享先農季春巳日享先蠶立夏後申日祀雨師春秋二仲上丁釋奠文宣王上戊釋奠武成王小祀九仲春祀馬祖仲夏享先牧仲秋祭馬社仲冬祭馬步季夏土王日祀中霤立秋後辰日祀靈星秋分享壽星立冬後亥日祠司中司命司人司祿孟冬祭司寒其諸州奉祀則五郊迎氣日祭嶽鎮海瀆春秋二仲享先代帝王及周六廟並如中祀州縣祭社稷奠文宣王祀風雨並如小祀凡有大赦則令諸州祭嶽瀆名山大川在境內者及歷代帝王忠臣烈士載祀典者仍禁近祠廟咸加祭有不剋定時日者太卜署預擇一季祠祭之日謂之畫日凡壇壝牲器玉帛饌具齊戒之制皆具通禮後復有高禖大小酺神之屬增大祀為四十二焉其後神宗詔改定大祀太一東以春西以秋中以夏冬增大蠟為四東西蠟主日配月太廟月祭朔而中祀四望南北蠟小祀以四立祭司命戶竈中霤門厲行以藏冰出冰祭司寒及月薦新太廟歲通舊祀凡九十二惟五享后廟焉政和中定五禮新儀以熒惑陽德觀帝鼐州朝獻聖祖應天府祀大火為大祀雷神歷代帝王寶鼎牡鼎蒼鼎岡鼎彤鼎阜鼎皛鼎魁鼎會應廟慶成軍祭后土為中祀山林川澤之屬州縣祭社稷祀風伯雨師雷神為小祀餘悉如故建炎四年十一月權工部尚書韓肖胄言祖宗以來每歲大中小祀百有餘所罔敢廢闕自車駕巡幸惟存宗廟之祭至天地諸神之祀則廢而不舉今國步尚艱天未悔禍正宜齊明恭肅通于神明而忽大事𠫓廾重禮恐非所以消弭天災導迎景貺雖小祀未可遍舉如天地五帝日月星辰社稷欲詔有司以時舉行所有器服並牲牢禮料恐國用未充難如舊制乞下太常寺相度裁定省繁就簡庶幾神不乏祀仰副陛下昭事懷柔為民求福之意尋命禮部太常裁定每歲以立春上辛祈穀孟夏雩祀季秋及冬至日四祀天夏至日一祀地立春上辛日祀感生帝立冬後祀神州地祇春秋二社及臘前一日祭太社太稷免牲玉權用酒脯仍依方色奠幣以輔臣為初獻禮官為亞終獻紹興三年復大火祀配以閼伯以辰戌出納之月祀之二十七年禮部太常寺言每歲大祀三十六除天地宗廟社稷感生帝九宮貴神高禖文宣王等已行外其餘並乞寓祠齊宮自紹興以來大祀所行二十有三而已至是乃悉復之舊制郊廟祝文稱嗣皇帝諸祭稱皇帝著作局準開元禮全稱帝號真宗以兼祕書監李至請改從舊制又諸祭祝辭皆臨事撰進多違典禮乃命至增撰舊辭八十四首為正辭録三卷既復命知制誥李宗諤楊億直史館陳彭年詳定之以為永式祝版當進署者並命祕閣吏書上親署訖御寶封給之凡先代帝王祝文止稱廟號凡親行大祀則皇子弟為亞獻終獻五代以來宰相為大禮使太常卿為禮儀使御史中丞為儀仗使兵部尚書為鹵簿使京府尹為橋道頓遞使至是大禮使或用親王禮儀使專命翰林學士儀杖鹵簿使亦或以他官太平興國九年始鑄五使印太宗將封泰山以儀仗使兼判橋道頓遞事大中祥符後凡有大禮以中書樞密分為五使仍特鑄印景祐二年詔有司皇地祇神州舊常參官攝事非所以尊神自今命兩省歲九大祠宰臣攝事者參知政事尚書丞郎學士奉祠於是參知政事盛度享太廟已受誓戒除知樞密院乃不奉祠又故事三歲一親郊不郊輒代以他禮慶賞與郊同而五使皆以輔臣不以官之高下天聖中乃以翰林學士領儀仗御史中丞領鹵簿始用官次又每歲大祀皆遣臺省近臣攝太尉其後或委他官大中祥符始復舊制又國朝沿唐制以太尉掌誓戒今議太尉三公非其所任請以吏部尚書掌誓戒詔用左僕射闕則用右僕射刑部尚書一員蒞之熙寧四年參知政事王圭言南郊乘輿所過必勘箭然後出入此師行之法不可施於郊祀禮院亦言於是凡車駕出入門皆罷之六年以詳定所請又罷太廟及宣德朱雀南薰諸門勘契又皇帝自大次至版位內臣二人執翟羽前導號曰拂翟失禮尤甚請除之凡郊壇值雨雪即齊宮門望祭殿望拜祭日不設登歌祀官以公服行事中祀以上皆給明衣開寶元年十一月郊以燎壇稍遠不聞告燎之聲始用爟火令光明遠照通於祀所又太廟初獻依開寶例以玉斝玉瓚亞獻以金斝終獻以瓢斝外壇器亦如之慶曆中太常請皇帝獻天地配帝以匏爵亞獻以木爵親祠太廟酌以玉斝亞獻以金斝郊廟飲福皇帝皆以玉斝詔飲福唯用金斝亞終獻酌以銀斝至飲福尚食奉御酌上尊酒投溫器以進凡常祀天地宗廟皆內降御封香仍製漆匱付光祿司農寺每祠祭命判寺官緘署禮料送祀所凡祈告亦內出香遂為定制嘉祐中裴煜請大祠悉降御封香中小祠供太府香中祠減大祠之半小祠減中祠之半東西太一宮係大祠歲太府供香非時祈請降御封香準大祠例及皇地祇五方帝百神文宣武成從配神位牲牢寡薄呂公著亦論廟牲未備悉加其數元符元年左司員外郎曾旻言周人以氣臭事神近世易之以香按何佟之議以為南郊明堂用沉香本天之質陽所宜也北郊用上和香以地於人親宜加雜馥今令文北極天皇而下皆用濕香至於衆星之位香不復設恐於義未盡於是每陛各設香又言先儒以為實柴所祀者無玉槱燎所祀者無幣今太常令式衆星皆不用幣蓋出於此然考典瑞玉人之官皆曰圭璧以祀日月星辰則實柴所祀非無玉矣槱燎無幣恐或未然至是遂命衆星隨其方色用幣慶曆三年禮官余靖言祈穀祀感生帝同日其禮當異不可皆用四圭有邸色尚赤乃定祈穀明堂蒼璧尺二寸感生帝四圭有邸朝日日圭夕月月圭皆五寸從祀神州無玉報社稷兩圭有邸祈不用玉明年祀儀成比通禮多所更定云嘉祐中集賢校理江休復言六典大祀養牲在滌三月祫享日近已踰其期而牲牢未供乞依漢唐置廩犧局下禮院議歲大小祀幾百數而牲盛之事儲養無素宜如休復言乃置廩犧局設牢預養籍田舊地種植粢盛納于神倉以待祭祀之用元豐六年詳定禮文所言本朝昊天上帝皇地祇太祖位各設三牲非尚質貴誠之義請親祠圜丘方澤正配位皆用犢不設羊豕俎及鼎七有司攝事亦如之又簠簋尊豆皆非陶器及用龍杓請改用陶以樿為杓又請南北郊先行升煙瘞血之禮至薦奠畢即如舊儀於壇坎燔瘞牲幣又北郊皇地祇及神州地祇當為坎瘞今乃建壇燔燎非是請今祭地祝版牲幣並瘞於坎又祀儀惟昊天上帝皇地祇高禖燔瘞犢首自感生帝神州地祇而下皆不燔瘞牲體殊不應典禮請自今昊天上帝感生帝皆燔牲首以報陽皇地祇神州太社太稷凡地之祭皆瘞牲之左髀以報陰薦享太廟亦皆升首於室又言古者祭祀用牲有豚解有體解薦腥則解為十一體今親祠南郊正配位之俎不殊左右胖不分貴賤無豚解體解之別請郊廟薦腥解其牲兩髀兩肩兩脅並脊為七體左右胖俱用其載于俎以兩髀在端兩肩兩脅次之脊居中皆進末至薦熟沉肉於湯止用右胖髀不升俎前後肱骨離為三曰肩臂臑後髀股骨去體離為二曰肫胳前脊謂之正脊次直謂之脡脊闊於脡脊謂之橫脊皆二骨脅骨最後二為短脅旁中二為正脅最前二為代脅若升俎則肩臂臑在上端膊胳在下端脊脅在中央其俎之序則肩臂臑正脊脡脊橫脊代脅長脅短脅膊胳凡十一體而骨體升俎進神坐前如少牢禮皆進下其牲體各預以半為腥俎半為熟俎腸胃膚俎亦然又請親祠飲福酒訖倣儀禮佐食摶之說命太官令取于簋摶以授祝祝受以豆以嘏乎皇帝而無嘏辭又本朝親祠南郊習儀於壇所明堂習儀於大慶殿皆近於瀆伏請南郊習儀於青城明堂習儀於尚書省以遠神為恭又賜胙三師三公侍中中書令門下中書侍郎尚書左右丞知樞密同知院事禮儀儀仗鹵簿頓遞使牛羊豕肩臂臑各五太子三師三少特進觀文大學士學士御史大夫六尚書金紫銀青光祿大夫節度使資政殿大學士觀文翰林資政端明龍圖天章寶文承旨侍講侍讀學士左右散騎常侍尚書列曹侍郎龍圖天章寶文直學士光祿正議通議大夫御史中丞太子賓客詹事給事中中書舍人節度觀察留後左右諫議龍圖天章寶文待制太中中大夫祕書殿中丞太常宗正卿牛豕肩臂臑各三入內內侍省押班副都知光祿卿監禮官博士牛羊脊脅各三太祝奉禮司尊彝郊社太廟宮闈令監牲牢供應祠事內官羊髀膊胳三應執事職掌樂工門幹宰手馭馬馭車人並均給脾肫胳觳及腸胃膚之類慶曆元年判太常寺呂公綽言舊禮郊廟尊罍數皆準古而不實三酒五齊明水明酒有司相承名為看器郊廟配位惟用祠祭酒分大中祠位二升小祠位一升止一尊酌獻一尊飲福宜詔酒官依法制齊酒分實之壇殿上下尊罍有司毋設空器並如唐制以井水代明水明酒正配位酌獻飲福酒用酒二升者各增二升從祀神位用舊升數
