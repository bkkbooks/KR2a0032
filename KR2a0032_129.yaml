body:
  text: 宋史卷一百二十九志第八十二樂四崇寧四年七月鑄帝鼐八鼎成八月大司樂劉昺言大朝會宮架舊用十二熊羆按金錞簫鼓觱篥等與大樂合奏今所造大樂遠稽古制不應雜以鄭衞詔罷之又依昺改定二舞各九成每三成為一變執籥秉翟揚戈持盾威儀之節以象治功庚寅樂成列于崇政殿有旨先奏舊樂三闋曲未終帝曰舊樂如泣聲揮止之既奏新樂天顏和豫百僚稱頌九月朔以鼎樂成帝御大慶殿受賀是日初用新樂太尉率百僚奉觴稱壽有數鶴從東北來飛度黃庭回翔鳴唳乃下詔曰禮樂之興百年於此然去聖愈遠遺聲弗存迺者得隱逸之士於草茅之賤獲英莖之器於受命之邦適時之宜以身為度鑄鼎以起律因律以制器按協於庭八音克諧昔堯有大章舜有大韶三代之王亦各異名今追千載而成一代之制宜賜新樂之名曰大晟朕將薦郊廟享鬼神和萬邦與天下共之其舊樂勿用先是端州上古銅器有樂鐘驗其窾識乃宋成公時帝以端王繼大統故詔言受命之邦而隱逸之士謂漢津也朝廷舊以禮樂掌于太常至是專置大晟府大司樂一員典樂二員並為長貳大樂令一員協律郎四員又有製撰官為制甚備於是禮樂始分為二五年九月詔曰樂不作久矣朕承先志述而作之以追先王之緒建官分屬設府庀徒以成一代之制二月嘗詔省內外冗官大晟府亦倂之禮官夫舜命夔典樂命伯夷典禮禮樂異道各分所守豈可同職其大晟府名可復仍舊又詔曰樂作已久方薦之郊廟施於朝廷而未及頒之天下宜令大晟府議頒新樂使雅正之聲被於四海先降三京四輔次帥府大觀二年詔曰自唐以來正聲全失無徵角之音五聲不備豈足以道和而化俗哉劉詵所上徵聲可令大晟府同教坊依譜按習仍增徵角二譜候習熟來上初進士彭几進樂書論五音言本朝以火德王而羽音不禁徵調尚闕禮部員外郎吳時善其說建言乞召几至樂府朝廷從之至是詵亦上徵聲乃降是詔三年五月詔今學校所用不過春秋釋奠如賜宴辟廱乃用鄭衞之音雜以俳優之戲非所以示多士其自今用雅樂四年四月議禮局言國家崇奉感生帝神州地祇為大祠以僖祖太祖配侑而有司行事不設宮架二舞殊失所以尊祖侑神作主之意乞皆用宮架二舞詔可六月詔近選國子生教習二舞以備祠祀先聖本周官教國子之制然士子肄業上庠頗聞恥於樂舞與樂工為伍坐作進退蓋今古異時致於古雖有其迹施於今未適其宜其罷習二舞願習雅樂者聽八月帝親製大晟樂記命太中大夫劉昺編修樂書為八論其一曰樂由陽來陽之數極於九聖人攝其數於九鼎寓其聲於九成陽之數復而為一則寶鼎之卦為坎極而為九則彤鼎之卦為離離南方之卦也聖人以光明盛大之業如日方中嚮明而治故極九之數則曰景鐘大樂之名則曰大晟日王於午火明於南乘火德之運當豐大之時恢擴規模增光前烈明盛之業永觀厥成樂名大晟不亦宜乎其二曰後世以黍定律其失樂之本也遠矣以黍定尺起於西漢蓋承六經散亡之後聞古人之緒餘而執以為法聲既未協乃屢變其法而求之此古今之尺所以至於數十等而至和之聲愈求而不可得也傳曰萬物皆備於我矣反身而誠樂莫大焉秬黍云乎哉其三曰焦急之聲不可用於隆盛之世昔李照欲下其律乃曰異日聽吾樂當令人物舒長照之樂固未足以感動和氣如此然亦不可謂無其意矣自藝祖御極和樂之聲高歷一百五十餘年而後中正之聲乃定蓋奕世修德和氣薰蒸一代之樂理若有待其四曰盛古帝王皆以明堂為先務後世知為崇配布政之宮然要妙之旨祕而不傳徒區區於形制之末流而不知帝王之所以用心也且盛德在木則居青陽角聲乃作盛德在火則居明堂徵聲乃作盛德在金則居總章商聲乃作盛德在水則居玄堂羽聲乃作盛德在土則居中央宮聲乃作其應時之妙不可勝言一歲之中兼總五運凡麗於五行者以聲召氣無不總攝鼓宮宮動鼓角角應彼亦莫知所以使之者則永膺壽考曆數過期不亦宜乎其五曰魏漢津以太極元氣函三為一九寸之律三數退藏故八寸七分為中聲正聲得正氣則用之中聲得中氣則用之宮架環列以應十二辰中正之聲以應二十四氣加四清聲以應二十八宿氣不頓進八音乃諧若立春在歲元之後則迎其氣而用之餘悉隨氣用律使無過不及之差則所以感召陰陽之和其法不亦密乎其六曰乾坤交於亥而子生於黃鐘之宮故稟於乾交於亥任於壬生於子自乾至子凡四位而清聲具焉漢津以四清為至陽之氣在二十八宿為虛昴星房四者居四方之正位以統十二律每清聲皆有三統申子辰屬於虛而統於子巳酉丑屬於昴而統於丑寅午戌屬於星而統於寅亥卯未屬於房而統於卯中正之聲分為二十四宿統於四清焉其七曰昔人以樂之器有時而弊故律失則求之於鐘鐘失則求之於鼎得一鼎之龠則權衡度量可考而知故鼎以全渾淪之體律呂以達陰陽之情天地之間無不統攝機緘運用萬物振作則樂之感人豈無所自而然邪其八曰聖上稽帝王之制而成一代之樂以謂帝舜之樂以教冑子乃頒之於宗學成周之樂掌於成均乃頒之府學辟廱太學而三京藩邸凡祭祀之用樂者皆賜之於是中正之聲被天下矣漢施鄭聲於朝廷唐升夷部於堂上至於房中之樂唯恐淫哇之聲變態之不新也聖上樂聞平淡之音而特詔有司制為宮架施之於禁庭房中用雅樂自今朝始云又為圖十二一曰五聲二曰八音三曰十二律應二十八宿四曰七均應二十八宿五曰八十四調六曰十二律所生七曰十二律應二十四氣八曰十二律鐘正聲九曰堂上樂十曰金鐘玉磬十一曰宮架十二曰二舞圖雖不能具載觀其所序亦可以知其旨意矣天地相合五數乃備不動者為五位常動者為五行五行發而為五聲律呂相生五聲乃備布於十二律之間猶五緯往還於十有二次五運斡旋於十有二時其圖五聲以此兩儀既判八卦肇分氣盈而動八風行焉顓帝乃令飛龍效八風之音命之曰承雲方是時金石絲竹匏土革木之音未備後聖有作以八方之物全五聲者制而為八音以聲召氣八風從律其圖八音以此上象著明器形而下以聲召氣脗合元精其圖十二律應二十八宿以此斗在天中周制四方猶宮聲處中為四聲之綱二十八舍列在四方用之於合樂者蓋東方七角屬木南方七徵屬火西方七商屬金北方七羽屬水四方之宿各有所屬而每方之中七均備足中央七宮管攝四氣故二十八舍應中正之聲者制器之法也二十八舍應七均之聲者和聲之術也其圖七均應二十八宿以此合陰陽之聲而文之以五聲則九六相交均聲乃備黃鐘為宮是謂天統林鐘為徵是謂地統太簇為商是謂人統南呂為羽於時屬秋姑洗為角於時屬春應鐘為變宮於時屬冬蕤賓為變徵於時屬夏旋相為宮而每律皆具七聲而八十四調備焉其圖八十四調以此自黃鐘至仲呂則陽數極而為乾故其位在左蕤賓至應鐘則陰數極而為坤故其位在右陰窮則歸本故應鐘自生陰律陽窮則歸本故仲呂自歸陽位律呂相生起於復而成於乾終始皆本於陽故曰樂由陽來六呂則同之而已相生之位分則為乾坤之爻合則為既濟未濟之卦自黃鐘至仲呂為既濟故屬陽而居左自蕤賓至應鐘為未濟故屬陰而居右易始於乾坤而終於既濟未濟天地辨位而水火之氣交際於其中造化之原皆自此出其圖十二律所生以此二十四氣差之毫釐則或先天而太過或後天而不及在律為聲在曆為氣若氣方得節乃用中聲氣已及中猶用正律其圖十二律應二十四氣以此漢津曰黃帝夏禹之法簡捷徑直得於自然故善作樂者以聲為本若得其聲則形數制度當自我出今以帝指為律正聲之律十二中聲之律十二清聲凡四共二十有八云其圖十二律鐘正聲以此堂上之樂以人聲為貴歌鐘居左歌磬居右近世之樂曲不協律歌不擇人有先製譜而後命辭奉常舊工村野癃老者斥之升歌之工選擇惟艱故堂上之樂鏗然特異焉其圖堂上樂以此金玉之精稟氣於乾故堂上之樂鐘必以金磬必以玉歷代樂儀曰歌磬次歌鐘之西以節登歌之句即周官頌磬也神考肇造玉磬聖上紹述先志而堂上之樂方備非聖智兼全金聲而玉振之者安能與於天道哉其圖金鐘玉磬以此大晟之制天子親祀圓丘則用景鐘為君圍鎛鐘特磬為臣圍編鐘編磬為民圍非親祀則不用君圍漢津以謂宮架總攝四方之氣故大晟之制羽在上而以四方之禽虡在下而以四方之獸以象鳳儀獸舞之狀龍簨崇牙制作華煥其圖宮架以此新樂肇興法夏籥九成之數文舞九成終於垂衣拱手無為而治武舞九成終於偃武修文投戈講藝每成進退疾徐抑揚顧揖皆各象方今之勳烈文舞八佾左執籥右秉翟蓋籥為聲之中翟為文之華秉中聲而昌文德武舞八佾執干戈而進以金鼓為節其圖二舞以此又列八音之器金部有七曰景鐘曰鎛鐘曰編鐘曰金錞曰金鐲曰金鐃曰金鐸其說以謂景鐘乃樂之祖而非常用之樂也黃帝五鐘一曰景鐘景大也鐘四方之聲以象厥成惟功大者其鐘大世莫識其義久矣其聲則黃鐘之正而律呂由是生焉平時弗考風至則鳴鎛鐘形聲宏大各司其辰以管攝四方之氣編鐘隨月用律雜比成文聲韻清越錞鐲鐃鐸古謂之四金鼓屬乎陽金屬乎陰陽造始而為之倡故以金錞和鼓陽動而不知已故以金鐲節鼓陽之用事有時而終故以金鐃止鼓時止則止時行則行天之道也故以金鐸通鼓金乃兌音兌為口舌故金之屬皆象之石部有二曰特磬曰編磬其說以謂依我磬聲以石有一定之聲衆樂依焉則鐘磬未嘗不相須也往者國朝祀天地宗廟及大朝會宮架內止設鎛鐘惟后廟乃用特磬若已升祔后廟遂置而不用如此則金石之聲小大不侔大晟之制金石並用以諧陰陽漢津之法以聲為主必用泗濱之石故禹貢必曰浮磬者遠土而近於水取之實難昔奉常所用乃以白石為之其聲沉下製作簡質理宜改造焉絲部有五曰一弦琴曰三弦琴曰五弦琴曰七弦琴曰九弦琴曰瑟其說以謂漢津誦其師之說曰古者聖人作五等之琴琴主陽一三五七九生成之數也師延拊一弦之琴昔人作三弦琴蓋陽之數成於三伏羲作琴有五弦神農氏為琴七弦琴書以九弦象九星五等之琴額長二寸四分以象二十四氣嶽闊三分以象三才嶽內取聲三尺六寸以象期三百六十日龍齗及折勢四分以象四時共長三尺九寸一分成於三極於九九者究也復變而為一之義也大晟之瑟長七尺二寸陰爻之數二十有四極三才之陰數而七十有二以象一歲之候既罷箏筑阮絲聲稍下乃增瑟之數為六十有四則八八之數法乎陰琴之數則九十有九而法乎陽竹部有三曰長篴曰箎曰簫其說以謂篴以一管而兼律呂衆樂由焉三竅成籥三才之和寓焉六竅為篴六律之聲備焉箎之制採竹竅厚均者用兩節開六孔以備十二律之聲則箎之樂生於律樂始於律而成於簫律準鳳鳴以一管為一聲簫集衆律編而為器參差其管以象鳳翼簫然清亮以象鳳鳴匏部有六曰竽笙曰巢笙曰和笙曰閏餘匏曰九星匏曰七星匏其說以謂列其管為簫聚其管為笙鳳凰于飛簫則象之鳳凰戾止笙則象之故內皆用簧皆施匏於下前古以三十六簧為竽十九簧為巢十三簧為和皆用十九數而以管之長短聲之大小為別八音之中匏音廢絕久矣後世以木代匏乃更其制下皆用匏而幷造十三簧者以象閏餘十者土之成數三者木之生數木得土而能生也九簧者以象九星物得陽而生九者陽數之極也七簧者以象七星笙之形若鳥斂翼鳥火禽火數七也土部有一曰壎其說以謂釋詩者以壎箎異器而同聲然八音孰不同聲必以壎箎為况嘗博詢其旨蓋八音取聲相同者惟壎箎為然壎箎皆六孔而以五竅取聲十二律始於黃鐘終於應鐘二者其竅盡合則為黃鐘其竅盡開則為應鐘餘樂不然故惟壎箎相應革部十有二曰晉鼓曰建鼓曰鼗鼓曰靁鼓曰靁鼗曰靈鼓曰靈鼗曰路鼓曰路鼗曰雅鼓曰相鼓曰搏拊其說以謂凡言樂者必曰鐘鼓蓋鐘為秋分之音而屬陰鼓為春分之音而屬陽金奏待鼓而後進者雷發聲而後羣物皆鳴也鼓復用金以節樂者雷收聲而後蟄蟲坯戶也周官以晉鼓鼓金奏陽為陰唱也建鼓少昊氏所造以節衆樂夏加四足謂之足鼓商貫之以柱謂之楹鼓周縣而擊之謂之縣鼓鼗者鼓之兆也天子錫諸侯樂以柷將之賜伯子男樂以鼗將之柷先衆樂鼗則先鼓而已以靁鼓鼓天神因天聲以祀天也以靈鼓鼓社祭以天為神則地為靈也以路鼓鼓鬼享人道之大也以舞者迅疾以雅節之故曰雅鼓相所以輔相於樂今用節舞者之步故曰相鼓登歌今奏擊拊以革為之實之以糠升歌之鼓節也木部有二曰柷曰敔其說以謂柷之作樂敔之止樂漢津嘗問於李良良曰聖人制作之旨皆在易中易曰震起也艮止也柷敔之義如斯而已柷以木為底下實而上虛震一陽在二陰之下象其卦之形也擊其中聲出虛為衆樂倡震為雷雷出地奮為春分之音故為衆樂之倡而外飾以山林物生之狀艮位寅為虎虎伏則以象止樂背有二十七刻三九陽數之窮戞之以竹裂而為十古或用十寸或裂而為十二陰數十二者二六之數陽窮而以陰止之又有度量權衡四法候氣運律教樂運譜四議與律曆運氣或相表𩹉甚精微矣茲獨採其言樂事顯明者凡為書二十卷說者以謂蔡京使昺為緣飾之以布告天下云政和二年賜貢士聞喜宴于辟廱仍用雅樂罷瓊林苑宴兵部侍郎劉煥言州郡歲貢士例有宴設名曰鹿鳴乞於斯時許用雅樂易去倡優淫哇之聲八月太常言宗廟太社太稷並為大祠今太社太稷登歌而不設宮架樂舞獨為未備請迎神送神詣罍洗歸復位奉俎退文舞迎武舞亞終獻望燎樂曲並用宮架樂設於北墉之北詔皆從之三年四月議禮局上親祠登歌之制大朝會同金鐘一在東玉磬一在西俱北向柷一在金鐘北稍西敔一在玉磬北稍東搏拊二一在柷北一在敔北東西相向一弦三弦五弦七弦九弦琴各一瑟四在金鐘之南西上玉磬之南亦如之東上又於午階之東太廟則於泰階之東宗祀則於東階之西大朝會則於丹墀香案之東設篴二箎一巢笙二和笙二為一列西上大朝會和笙在篴南塤一在篴南大朝會在箎南閏餘匏一簫一各在巢笙南又於午階之西太廟則於泰階之西宗祀則於西階之東大朝會則於丹墀香案之西設篴二箎一巢笙二和笙二為一列東上塤一在篴南七星匏一九星匏一在巢笙南簫一在九星匏西鐘磬柷敔搏拊琴瑟工各坐於壇上太廟宗祀大朝會則於殿上塤箎笙篴簫匏工並立於午階之東西太廟則於泰階之東西宗祀則於兩階之間大朝會則於丹墀香案之東西樂正二人在鐘磬南歌工四人在敔東俱東西相向執麾挾仗色掌事一名在樂虡之西東向樂正紫公服大朝會服絳朝服方心曲領緋白大帶金銅革帶烏皮履樂工黑介幘執麾人平巾幘並緋繡鸞衫白絹夾袴抹帶大朝會同又上親祠宮架之制景靈宮宣德門大朝會附四方各設編鐘三編磬三東方編鐘起北編磬間之東向西方編磬起北編鐘間之西向南方編磬起西編鐘間之北方編鐘起西編磬間之俱北向設十二鎛鐘特磬於編架內各依月律四方各鎛鐘三特磬三東方鎛鐘起北特磬間之東向西方特磬起北鎛鐘間之西向南方特磬起西鎛鐘間之北方鎛鐘起西特磬間之皆北向景靈宮天興殿鎛鐘編鐘編磬如每歲大祠宮架陳設植建鼓鞞鼓應鼓於四隅建鼓在中鞞鼓在左應鼓在右設柷敔於北架內柷一在道東敔一在道西設瑟五十二朝會五十六宣德門五十四列為四行二行在柷東二行在敔西次一弦琴七左四右三次三弦琴一十有八宣德門二十次五弦琴一十有八宣德門二十並分左右次七弦琴二十有三次九弦琴二十有三並左各十有二右各十有一宣德門七弦九弦各二十五並左十有三右十有二次巢笙二十有八分左右宣德門三十二次匏笙三在巢笙之間左二右一次簫二十有八宣德門大朝會三十次竽二十次箎二十有八宣德門三十六朝會箎三十三左十有七右十有六次塤一十有八宣德門朝會二十次篴二十有八並分左右宣德門篴三十六朝會三十三左十有七右十有六雷鼓雷鼗各一在左又雷鼓雷鼗各一在右地祇靈鼓靈鼗各二太廟路鼓路鼗各二大朝會晉鼓二宣德門不設並在三弦五弦琴之間東西相向晉鼓一在匏笙間少南北向副樂正二人在柷敔之前北向歌工三十有二宣德門四十朝會三十有六次柷敔東西相向列為四行左右各二行樂師四人在歌工之南北東西相向運譜二人在晉鼓之左右北向執麾挾仗色掌事一名在樂虡之右東向副樂正同樂正服大朝會同樂正朝服樂師緋公服運譜綠公服大朝會介幘絳韝衣白絹抹帶樂工執麾人並同登歌執麾人服朝會同又上親祠二舞之制大朝會同文舞六十四人執籥翟武舞六十四人執干戚俱為八佾文舞分立於表之左右各四佾引文舞二人執纛在前東西相向舞色長二人在執纛之前分東西若武舞則在執旌之前引武舞執旌二人鼗二人雙鐸二人單鐸二人鐃二人持金錞四人奏金錞二人鉦二人相二人雅二人各立於宮架之東西北向北上武舞在其後舞色長幞頭抹額紫繡袍引二舞頭及二舞郎並紫平冕皁繡鸞衫金銅革帶烏皮履大朝會引文舞頭及文舞郎並進賢冠黃鸞衫銀褐裙綠襠革帶烏皮履引武舞頭及武舞郎並平巾幘緋鸞衫黃畫甲身紫襠豹文大口袴起梁帶烏皮鞾引武舞人武弁緋繡鸞衫抹額紅錦臂韝白絹袴金銅革帶烏皮履大朝會同又上大祠中祠登歌之制編鐘一在東編磬一在西俱北向柷一在編鐘之北稍西敔一在編磬之北稍東搏拊二一在柷北一在敔北俱東西相向一弦三弦五弦七弦九弦琴各一瑟一在編鐘之南西上編磬之南亦如之東上壇下午階之東太廟別廟則於殿下泰階之東明堂祠廟則於東階之西設篴一箎一塤一為一列西上和笙一在篴南巢笙一在箎南簫一在塤南午階之西亦如之東上太廟別廟則於泰階之西明堂祠廟則於西階之東鐘磬柷敔搏拊琴瑟工各坐於壇上明堂太廟別廟於殿上祠廟於堂上塤箎笙篴簫工並立於午階東西太廟別廟於太階之東西明堂祠廟於兩階之間若不用宮架即登歌工人並坐樂正二人在鐘磬南歌工四人在敔東俱東西相向執麾挾仗色掌事一名在樂虡之西東向樂正公服執麾挾仗色掌事平巾幘樂工黑介幘並緋繡鸞衫白絹抹帶三京帥府等每歲祭社稷祀風師雨師雷神釋奠文宣王用登歌樂陳設樂器並同每歲大中祠登歌又上大祠宮架二舞之制四方各設鎛鐘三各依月律編鐘一編磬一北方應鐘起西編鐘次之黃鐘次之編磬次之大呂次之皆北向東方太簇起北編鐘次之夾鐘次之編磬次之姑洗次之皆東向南方仲呂起東編鐘次之蕤賓次之編磬次之林鐘次之皆北向西方夷則起南編鐘次之南呂次之編磬次之無射次之皆西向設十二特磬各在鎛鐘之內植建鼓鞞鼓應鼓於四隅設柷敔於北架內柷在左敔在右雷鼓雷鼗各二地祇以靈鼓靈鼗太廟別廟以路鼓路鼗分東西在歌工之側瑟二在柷東次一絃三絃五絃七絃九絃琴各二各為一列敔西亦如之巢笙簫竽箎塤篴各四為四列在雷鼓之後若地祇即在靈鼓後太廟別廟在路鼓後晉鼓一在篴之後俱北向副樂正二人在柷敔之北歌工八人左右各四在柷敔之南東西相向執麾挾仗色掌事一名在宮架西北向副樂正本色公服執麾挾仗色掌事及樂正平巾幘服同登歌樂工凡軒架之樂三面其制去宮架之南面判架之樂二面其制又去軒架之北面特架之樂一面文武二舞並同親祠惟二舞郎並紫平冕皂繡袍銀褐裙白絹抹帶與親祠稍異詔並頒行五月帝御崇政殿親按宴樂召侍從以上侍立詔曰大晟之樂已薦之郊廟而未施於宴饗比詔有司以大晟樂播之教坊試於殿庭五聲既具無惉懘焦急之聲嘉與天下共之可以所進樂頒之天下其舊樂悉禁於是令尚書省立法新徵角二調曲譜已經按試者並令大晟府刊行後續有譜依此其宮商羽調曲譜自從舊新樂器五聲八音方全塤箎匏笙石磬之類已經按試者大晟府畫圖疏說頒行教坊鈞容直開封府各頒降二副開封府用所頒樂器明示依式造粥教坊鈞容直及中外不得違今輒高下其聲或別為他聲或移改增損樂器舊來淫哇之聲如打斷哨笛呀鼓十般舞小鼓腔小笛之類與其曲名悉行禁止違者與聽者悉坐罪八月大晟府奏以雅樂中聲播於宴樂舊闕徵角二調及無土石匏三音今樂並已增入詔頒降天下九月詔大晟樂頒於太學辟廱諸生習學所服冠以弁袍以素紗皂緣紳帶佩玉從劉昺製也昺又上言曰五行之氣有生有剋四時之禁不可不頒示天下盛德在木角聲乃作得羽而生以徵為相若用商則刑用宮則戰故春禁宮商盛德在火徵聲乃作得角而生以宮為相若用羽則刑用商則戰故夏禁商羽盛德在土宮聲乃作得徵而生以商為相若用角則刑用羽則戰故季夏土王宜禁角羽盛德在金商聲乃作得宮而生以羽為相若用徵則刑用角則戰故秋禁徵角盛德在水羽聲乃作得商而生以角為相若用宮則刑用徵則戰故冬禁宮徵此三代之所共行月令所載深切著明者也作樂本以導和用失其宜則反傷和氣夫淫哇殽雜干犯四時之氣久矣陛下親灑宸翰發為詔旨淫哇之聲轉為雅正四時之禁亦右所頒協氣則粹美繹如以成詔令大晟府置圖頒降四年正月大晟府言宴樂諸宮調多不正如以無射為黃鐘宮以夾鐘為中呂宮以夷則為仙呂宮之類又加越調雙調大食小食皆俚俗所傳今依月律改定詔可六年詔先帝嘗命儒臣肇造玉磬藏之樂府久不施用其令略加磨礱俾與律合幷造金鐘專用於明堂又詔大晟雅樂頃歲已命儒臣著樂書獨宴樂未有紀述其令大晟府編集八十四調幷圖譜令劉昺撰以為宴樂新書十月臣僚乞以崇寧大觀政和所得珍瑞名數分命儒臣作為頌詩協以新律薦之郊廟以告成功詔送禮制局七年二月典樂裴宗元言乞按習虞書賡載之歌夏五子之歌商之那周之關雎麟趾騶虞鵲巢鹿鳴文王清廟之詩詔可中書省言高麗賜雅樂乞習教聲律大晟府撰樂譜辭詔許教習仍賜樂譜三月議禮局言先王之制舞有小大文舞之大用羽籥文舞之小則有羽無籥謂之羽舞武舞之大用干戚武舞之小則有干無戚謂之干舞武舞又有戈舞焉而戈不用於大舞近世武舞以戈配干未嘗用戚乞武舞以戚配干置戈不用庶協古制又言伶州鳩曰大鈞有鎛無鐘鳴其細也細鈞有鐘無鎛昭其大也然則鐘大器也鎛小鐘也以宮商為鈞則謂之大鈞其聲大故用鎛以鳴其細而不用鐘以角徵羽為鈞則謂之小鈞其聲細故用鐘以昭其大而不用鎛然後細大不踰聲應相保和平出焉是鎛鐘兩器其用不同故周人各立其官後世之鎛鐘非特不分大小又混為一器復於樂架編鐘編磬之外設鎛鐘十二配十二辰皆非是蓋鎛鐘猶之特磬與編鐘編磬相須為用者也編鐘編磬其陽聲六以應律其陰聲六以應呂既應十二辰矣復為鎛鐘十二以配之則於義重複乞宮架樂去十二鎛鐘止設一大鐘為鐘一小鐘為鎛一大磬為特磬以為衆聲所依詔可四月禮制局言尊祖配天者郊祀也嚴父配天者明堂也所以來天神而禮之其義一也則明堂宜同郊祀用禮天神六變之樂其宮架赤紫用雷鼓雷鼗又圜丘方澤各有大樂宮架自來明堂就用大慶殿大朝會宮架今明堂肇建欲行剏置十月皇帝御明堂平朔左个始以天運政治頒于天下是月也凡樂之聲以應鐘為宮南呂為商林鐘為角仲呂為閏徵姑洗為徵太簇為羽黃鐘為閏宮既而中書省言五聲六律十二管還相為宮若以左旋取之如十月以應鐘為宮則南呂為商林鐘為角仲呂為閏徵姑洗為徵太簇為羽黃鐘為閏宮若以右旋七均之法如十月以應鐘為宮則當用大呂為商夾鐘為角仲呂為閏徵蕤賓為徵夷則為羽無射為閏宮明堂頒朔用左旋取之非是欲以本月律為宮右旋取七均之法從之仍改正詔書行下自是而後樂律隨月右旋仲冬之月皇帝御明堂南面以朝百辟退坐于平朔授民時樂以黃鐘為宮太簇為商姑洗為角蕤賓為閏徵林鐘為徵南呂為羽應鐘為閏宮調以羽使氣適平季冬之月御明堂平朔右个樂以大呂為宮夾鐘為商仲呂為角林鐘為閏徵夷則為徵無射為羽黃鐘為閏宮客氣少陰火調以羽尚羽而抑徵孟春之月御明堂青陽左个樂以太簇為宮姑洗為商蕤賓為角夷則為閏徵南呂為徵應鐘為羽大呂為閏宮客氣少陽相火與歲運同火氣太過調宜羽致其和仲春之月御明堂青陽樂以夾鐘為宮仲呂為商林鐘為角南呂為閏徵無射為徵黃鐘為羽太簇為閏宮調以羽季春之月御明堂青陽右个樂以姑洗為宮蕤賓為商夷則為角無射為閏徵應鐘為徵大呂為羽夾鐘為閏宮客氣陽明尚徵以抑金孟夏之月御明堂左个樂以仲呂為宮林鐘為商南呂為角應鐘為閏徵黃鐘為徵太簇為羽姑洗為閏宮調宜尚徵仲夏之月御明堂樂以蕤賓為宮夷則為商無射為角黃鐘為閏徵大呂為徵夾鐘為羽仲呂為閏宮客氣寒水調宜尚宮以抑之季夏之月御明堂右个樂以林鐘為宮南呂為商應鐘為角大呂為閏徵太簇為徵姑洗為羽蕤賓為閏宮調宜尚宮以致其和孟秋之月御明堂總章左个樂以夷則為宮無射為商黃鐘為角太簇為閏徵夾鐘為徵仲呂為羽林鐘為閏宮調宜尚商仲秋之月御明堂總章樂以南呂為宮應鐘為商大呂為角夾鐘為閏徵姑洗為徵蕤賓為羽夷則為閏宮調宜尚商季秋之月御明堂總章右个樂以無射為宮黃鐘為商太簇為角姑洗為閏徵仲呂為徵林鐘為羽南呂為閏宮調宜尚羽以致其平閏月御明堂闔左扉樂以其月之律十一月知永興軍席旦言太學辟廱士人作樂皆服士服而外路諸生尚衣襴幞望下有司考議為圖式以頒外郡八年八月宣和殿大學士蔡攸言九月二日皇帝躬祀明堂合用大樂按樂書正聲得正氣則用之中聲得中氣則用之自八月二十八日已得秋分中氣大饗之日當用中聲樂今看詳古之神瞽考中聲以定律中聲謂黃鐘也黃鐘即中聲非別有一中氣之中聲也考閱前古初無中正兩樂若以一黃鐘為正聲又以一黃鐘為中聲則黃鐘君聲不當有二况帝指起律均法一定大呂居黃鐘之次陰呂也臣聲也今減黃鐘三分則入大呂律矣易其名為黃鐘中聲不唯紛更帝律又以陰呂臣聲僭竊黃鐘之名若依樂書正聲得正氣則用之中聲得中氣則用之是冬至祀天夏至祭地常不用正聲而用中聲也以黃鐘為正聲易大呂為中聲之黃鐘是帝律所起黃鐘常不用而大呂常用也抑陽扶陰退律進呂為害斯大無甚於此今來宗祀明堂緣八月中氣未過而用中聲樂南呂為宮則本律正聲皆不得預欲乞廢中聲之樂一遵帝律止用正聲協和天人刊正訛謬著於樂書詔可攸又乞取已頒中聲樂在天下者宣和元年四月攸上書奉詔製造太少二音登歌宮架用於明堂漸見就緒乞報大晟府者凡八條一太正少鐘三等舊制編鐘編磬各一十六枚應鐘之外增黃鐘大呂太簇夾鐘四清聲今既分太少則四清聲不當兼用止以十二律正聲各為一架其二太正少琴三等舊制一三五七九弦凡五等今來討論並依律書所載止用五弦弦大者為宮而居中央君也商張右傍其餘大小相次不失其序以為太正少之制而十二律舉無遺音其一三五七九弦太少樂內更不製造其三太正少籥三等謹按周官籥章之職龡以迎寒暑王安石曰籥三孔律呂於是乎生而其器不行於世久矣近得古籥嘗以頒行今如爾雅所載製造太正少三等用為樂本設於衆管之前其四太正少篴塤箎簫各三等舊制簫一十六管如鐘磬之制有四清聲今既分太少其四清聲亦不合兼用止用十二管其五大晟匏有三色一曰七星二曰九星三曰閏餘莫見古制匏備八音不可闕數今已各分太正少三等而閏餘尤無經見唯大晟樂書稱匏造十三簧者以象閏餘十者土之成數三者木之生數木得土而能生也故獨用黃鐘一清聲黃鐘清聲無應閏之理今去閏餘一匏止用兩色仍改避七星九星之名止曰七管九管其六舊制有巢笙竽笙和笙巢笙自黃鐘而下十九管非古制度其竽笙和笙並以正律林鐘為宮三笙合奏曲用兩調和笙奏黃鐘曲則巢笙奏林鐘曲以應之宮徵相雜器本宴樂今依鐘磬法裁十二管以應十二律為太正少三等其舊笙更不用其七柷敔晉鼓鎛鐘特磬雖無太少係作止和樂合行備設其八登歌宮架有搏拊二器按虞書戞擊鳴球搏拊琴瑟王安石解曰或戞或擊或搏或拊與虞書所載乖戾今欲乞罷而不用詔悉從之攸之弟絛曰初漢津獻說請帝三指之三寸三合而為九為黃鐘之律又以中指之徑圍為容盛度量權衡皆自是而出又謂有太聲有少聲太者清聲陽也天道也少者濁聲陰也地道也中聲其間人道也合三才之道備陰陽之奇偶然後四序可得而調萬物可得而理當時以為迂怪劉昺之兄煒以曉樂律進未幾而卒昺始主樂事乃建白謂太少不合儒書以太史公書黃鐘八寸七分琯為中聲奏之於初氣班固書黃鐘九寸琯為正聲奏之於中氣因請帝指時止用中指又不得徑圍為容盛故後凡制器不能成劑量工人但隨律調之大率有非漢津之本說者及政和末明堂成議欲為布政調燮事乃召武臣前知憲州任宗堯換朝奉大夫為大晟府典樂宗堯至則言太少之說本出於古人雖王朴猶知之而劉昺不用乃自剏黃鐘為兩律黃鐘君也不宜有兩蔡攸方提舉大晟府不喜佗人預樂有士人田為者善琵琶無行攸乃奏為大晟府典樂遂不用中聲八寸七分琯而但用九寸琯又為一律長尺有八寸曰太聲一律長四寸有半曰少聲是為三黃鐘律矣律與容盛又不翅數倍黃鐘既四寸有半則圜鐘幾不及二寸諸器大小皆隨律蓋但以器大者為太小者為少樂始成試之于政事堂執政心知其非然不敢言因用之於明堂布政望鶴愈不至絛又曰宴樂本雜用唐聲調樂器多夷部亦唐律徵角二調其均自隋唐間已亡政和初命大晟府改用大晟律其聲下唐樂已兩律然劉昺止用所謂中聲八寸七分琯為之又作匏笙塤箎皆入夷部至於徵招角招終不得其本均大率皆假之以見徵音然其曲譜頗和美故一時盛行於天下然教坊樂工嫉之如讎其後蔡攸復與教坊用事樂工附會又上唐譜徵角二聲遂再命教坊制曲譜既成亦不克行而止然政和徵招角招遂傳於世矣二年八月罷大晟府製造所幷協律官四年十月洪州奏豐城縣民鋤地得古鐘大小九具狀制奇異各有篆文驗之考工記其制正與古合令樂工擊之其聲中律之無射繪圖以聞七年十二月金人敗盟分兵兩道入詔革弊事廢諸局於大晟府及教樂所教坊額外人並罷靖康二年金人取汴凡大樂軒架樂舞圖舜文二琴教坊樂器樂書樂章明堂布政閏月體式景陽鐘幷虡九鼎皆亡矣
