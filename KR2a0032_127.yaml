body:
  text: 宋史卷一百二十七志第八十樂二景祐三年七月馮元等上新修景祐廣樂記八十一卷詔翰林學士丁度知制誥胥偃直史館高若訥直集賢院韓琦取鄧保信阮逸胡瑗等鍾律詳定得失可否以聞九月阮逸言臣等所造鍾磬皆稟於馮元宋祁其分方定律又出於胡瑗算術而臣獨執周禮嘉量聲中黃鍾之法及國語鈞鍾絃準之制皆抑而不用臣前蒙召對言王朴律高而李照鍾下竊覩御製樂髓新經歷代度量衡篇言隋書依漢志黍尺制管或不容千二百或不啻九寸之長此則明班志已後歷代無有符合者惟蔡雍銅籥本得於周禮遺範雍自知音所以只傳銅籥積成嘉量則是聲中黃鍾而律本定矣謂管有大小長短者蓋嘉量既成即以量聲定尺明矣今議者但爭漢志黍尺無準之法殊不知鍾有鈞石量衡之制況周禮國語姬代聖經翻謂無憑孰為稽古有唐張文收定樂亦鑄銅甌此足驗周之嘉量以聲定律明矣臣所以獨執周禮鑄嘉量者以其方尺深尺則度可見也其容一釜則量可見也其重鈞則衡可見也聲中黃鍾之宮則律可見也既律度量衡如此符合則制管歌聲其中必矣臣昧死欲乞將臣見鑄成銅甌再限半月內更鑄嘉量以其聲中黃鍾之宮乃取李照新鍾就加修整務合周制鍾量法度文字已編寫次未敢具進詔送度等並定以聞十月度等言據鄧保信黍尺二其一稱用上黨秬黍圓者一黍之長纍百成尺與蔡雍合臣等檢詳前代造尺皆以一黍之廣為分唯後魏公孫崇以一黍之長纍為寸法太常劉芳以秬黍中者一黍之廣即為一分中尉元匡以一黍之廣度黍二縫以取一分三家競不能決而蔡雍銅籥本志中亦不明言用黍長廣纍尺今將保信黃鍾管內秬黍二百粒以黍長為分再纍至尺二條比保信元尺一長五黍一長七黍又律管黃鍾籥一枚容秬黍千二百粒以元尺比量分寸略同復將實籥秬黍再纍者校之即又不同其籥合升斗亦皆類此又阮逸胡瑗鍾律法黍尺其一稱用上黨羊頭山秬黍中者纍廣求尺制黃鍾之聲臣等以其大黍百粒纍廣成尺復將管內二百粒以黍廣為分再纍至尺二條比逸等元尺一短七黍一短三黍蓋逸等元尺並用一等大黍其實管之黍大小不均遂致差異又其銅律管十二枚臣等據楚衍等圍九方分之法與逸等元尺及所實籥秬黍再纍成尺者校之又各不同又所製銅稱二量亦皆類此臣等看詳其鍾磬各一架雖合典故而黍尺一差難以定奪又言太祖皇帝嘗詔和峴等用景表尺典修金石七十年間薦之郊廟稽合唐制以示詒謀則可且依景表舊尺俟天下有妙達鍾律之學者俾考正之以從周漢之制其阮逸胡瑗鄧保信並李照所用太府寺等尺及阮逸狀進周禮度量法其說疏舛不可依用五年五月右司諫韓琦言臣前奉詔詳定鍾律嘗覽景祐廣樂記覩照所造樂不依古法皆率己意別為律度朝廷因而施用識者非之今將親祀南郊不可重以違古之樂上薦天地宗廟竊聞太常舊樂見有存者郊廟大禮請復用之詔資政殿大學士宋綬三司使晏殊同兩制官詳定以聞七月綬等言李照新樂比舊樂下三律衆論以為無所考據願如琦請郊廟復用和峴所定舊樂鍾磬不經鐫磨者猶存三縣奇七虡郊廟殿庭可以更用太常亦言舊樂宮縣用龍鳳散鼓四面以應樂節李照廢而不用止以晉鼓一面應節舊樂建鼓四並鞞應共十二面備而不擊李照以四隅建鼓與鎛鍾相應擊之舊樂雷鼓兩架各八面止用一人考擊李照別造雷鼓每面各用一人椎鼓順天左旋三步一止又令二人搖鞉以應之又所造大竽大笙雙鳳管兩儀琴十二絃琴並行今既復用舊樂未審照所作樂器制度合改與否詔悉仍舊制其李照所作勿復施用康定元年阮逸上鍾律制議並圖三卷皇祐二年五月明堂禮儀使言明堂所用樂皆當隨月用律九月以無射為均五天帝各用本音之樂於是內出明堂樂曲及二舞名迎神曰誠安皇帝升降行止曰儀安昊天上帝皇地祇神州地祇位奠玉幣曰鎮安酌獻曰慶安太祖太宗真宗位奠幣曰信安酌獻曰孝安司徒奉俎曰饎安五帝位奠玉幣曰鎮安酌獻曰精安皇帝飲福曰胙安退文舞迎武舞亞獻終獻皆曰穆安徹豆曰歆安送神曰誠安歸大次曰憩安文舞曰右文化俗武舞曰威功睿德又出御撰樂章鎮安慶安信安孝安四曲餘詔輔臣分撰庚戌詔御所撰樂曲名與常祀同者更之遂更常所用圜丘寓祭明堂誠安之曲曰宗安祀感生帝慶安之曲曰光安奉慈廟信安之曲曰慈安六月內出御撰明堂樂八曲以君臣民事物配屬五音凡二十聲為一曲用宮變徵變者天地人四時為七音凡三十聲為一曲以子母相生凡二十八聲為一曲皆黃鍾為均又明堂月律五十七聲為二曲皆無射為均又以二十聲二十八聲三十聲為三曲亦無射為均皆自黃鍾宮入無射如合用四十八或五十七聲即依前譜次第成曲其徹聲自同本律及御撰鼓吹警嚴曲合宮歌並肄于太常是月翰林學士承旨王堯臣等言奉詔與參議阮逸所上編鍾四清聲譜法請用之於明堂者竊以律呂旋宮之法既定以管又制十二鍾準為十二正聲以律計自倍半說者云半者準正聲之半以為十二子聲之鍾故有正聲子聲各十二子聲即清聲也其正管長者為均自用正聲正管短者為均則通用子聲而成五音然求聲之法本之於鍾故國語所謂度律均鍾者也其編金石之法則歷代不同或以十九為一虡者蓋取十二鍾當一月之辰又加七律焉或以二十一為一虡者以一均聲更加濁倍或以十六為一虡者以一均清正為十四宮商各置一是謂縣八用七也或以二十四為一虡則清正之聲備故唐制以十六數為小架二十四為大架天地宗廟朝會各有所施今太常鍾縣十六者舊傳正聲之有黃鍾至夾鍾四清聲雖於圖典未明所出然考之實有義趣蓋自夷則至應鍾四律為均之時若盡用正聲則宮輕而商重緣宮聲以下不容更有濁聲一均之中宮弱商彊是謂陵僭故須用子聲乃得長短相自角而下亦循茲法故夷則為宮則黃鍾為角南呂為宮則大呂為角無射為宮則黃鍾為商太簇為角應鍾為宮則大呂為商夾鍾為角蓋黃鍾大呂太簇夾鍾正律俱長並當用清聲如此則音律相諧而無所抗此四清聲可用之驗也至他律為宮其長短尊卑自序者不當更以清聲間之自唐末世樂文墜缺考擊之法久已不傳今若使匏土絲竹諸器盡求清聲即未見其法又據大樂諸工所陳自磬簫琴和巢笙五器本有清聲塤箎竽筑瑟五器本無清聲五絃阮九絃琴則有太宗皇帝聖制譜法至歌工引音極唱止及黃鍾清聲臣等參議其清正二聲既有典據理當施用自今大樂奏夷則以下四均正律為宮之時商角依次並用清聲自餘八均盡如常法至於絲竹等諸器舊有清聲者令隨鍾石教習本無清聲者未可創意求法且當如舊惟歌者本用中聲故夏禹以聲為律明人皆可及若彊所不至足纍至和請止以正聲作歌應合諸器亦自是一音別無差戾其阮逸所上聲譜以清濁相應先後互擊取音靡曼近於鄭聲不可用詔可七月御撰明堂無射宮樂曲譜三皆五十七字五音一曲奉俎用之二變七律一曲飲福用之七律相生一曲退文舞迎武舞及亞獻終獻徹豆用之是月上封事者言明堂酌獻五帝精安之曲並用黃鍾一均聲此乃國朝常祀五時迎氣所用舊法若於親行大饗即所未安且明堂之位木室在寅火室在巳金室在申水室在亥蓋木火金水之始也土室在西南蓋土王之次也既皆用五行本始所王之次則獻神之樂亦當用五行本始月律各從其音以為曲其精安五曲宜以無射之均太簇為角獻青帝仲呂為徵獻赤帝林鍾為宮獻黃帝夷則為商獻白帝應鍾為羽獻黑帝詔兩制官同太常議而堯臣等言大饗日迫事難猝更詔俟過大禮詳定以聞九月帝服鞾袍御崇政殿召近臣宗室館閣臺諫官閲雅樂自宮架登歌舞佾之奏凡九十一曲遍作之因出太宗琴阮譜及御撰明堂樂曲音譜並按習大樂新録賜羣臣又出新製頌塤匏笙洞簫仍令登歌以八音諸器各奏一曲遂召鼓吹局按警場賜大樂鼓吹令丞至樂工徒吏緡錢有差帝既閲雅樂謂輔臣曰作樂崇德薦之上帝以配祖考今將有事于明堂然世鮮知音其令太常並加講求時言者以為鎛鍾特磬未協音律詔令鄧保信阮逸盧昭序同太常檢詳典禮別行鑄造太常薦太子中舍致仕胡瑗曉音詔同定鍾磬制度閏十一月詔曰朕聞古者作樂本以薦上帝配祖考三五之盛不相沿襲然必太平始克明備周武受命至成王時始大合樂漢初亦沿舊樂至武帝時始定泰一后土樂詩光武中興至明帝時始改大豫之名唐高祖造邦至太宗時孝孫文收始定鍾律明皇方成唐樂是知經啓善述禮樂重事須三四世聲文乃定國初亦循用王朴竇儼所定周樂太祖患其聲高遂令和峴減一律真宗始議隨月轉律之法屢加按核然念樂經久墜學者罕傳歷古研覃亦未究緒頃雖博加訪求終未有知聲知經可信之人嘗為改更未適茲意中書門下其集兩制及太常禮樂官以天地五方神州日月宗廟社蠟祭享所用登歌宮縣審定聲律是非按古合今調諧中和使經久可用以發揚祖宗之功德朕何憚改為但審聲驗書二學鮮並互詆胸臆無所援據慨然希古靡忘于懷於是中書門下集兩制太常官置局於祕閣詳定大樂王堯臣等言天章閣待制趙師民博通今古願同詳定及乞借參知政事高若訥所校十五等古尺並從之三年正月詔徐宿泗耀江鄭淮陽七州軍采磬石仍令諸路轉運司訪民間有藏古尺律者上之二月詔兩制及禮官參稽典制議定國朝大樂名中書門下審加詳閲以聞初胡瑗請太祖廟舞用干戚太宗廟兼用干羽真宗廟用羽籥以象三聖功德然議者謂國朝七廟之舞名雖不同而干羽並用又廟制與古異及瑗建言止降詔定樂名而已七月堯臣等言按太常天地宗廟四時之祀樂章凡八十九曲自景安而下七十五章率以安名曲豈特本道德政教嘉靖之美亦緣神靈祖考安樂之故臣等謹上議國朝樂宜名大安詔曰朕惟古先格王隨代之樂亦既制作必有稱謂緣名以討義繇義以知德蓋名者德之所載有行遠垂久之效焉故韶以紹堯夏以承舜濩以救民武以象伐傳之不朽用此道也國家舉墜正失典章交備獨斯體大而有司莫敢易言之朕憫然念茲大懼列聖之休未能昭揭於天下之聽是用申敕執事遠求博講而考定其衷今禮官學士逮三有事之臣同寅一辭以大安之議來復且謂藝祖之戡暴亂也安天下之未安其功大二宗之致太平也安天下之既安其德盛洎朕之承聖烈也安祖宗之所安其仁厚祗覽所議熟復于懷恭惟神德之造基神功之戢武章聖恢清淨之治沖人蒙成定之業雖因世之迹各異而靖民之道同歸以之播鍾球文羽籥用諸郊廟告於神明曰大且安誠得其正十二月召兩府及侍臣觀新樂于紫宸殿凡鎛鍾十二黃鍾高二尺二寸半于廣一尺二寸鼓六鉦四舞六甬衡並旋蟲高八寸四分遂徑二寸二分深一寸二釐篆帶每面縱者四橫者四枚景挾鼓與舞四處各有九每面共三十六兩欒間一尺四寸容九斗九升五合重一百六斤大呂以下十一鍾並與黃鍾同制而兩欒間遞減半分至應鍾容九斗三升五合而其重加至應鍾重一百四十八斤並中新律本律特磬十二黃鍾大呂股長二尺博一尺鼓三尺博六寸九分寸之六絃三尺七寸五分太簇以下股長尺八寸博九寸鼓二尺七寸博六寸絃三尺三寸七分半其聲各中本律黃鍾厚二寸一分大呂以下遞加其厚至應鍾厚三寸五分詔以其圖送中書議者以為周禮大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚則是大鍾宜厚小鍾宜薄今大鍾重一百六斤小鍾乃重一百四十八斤則小鍾厚非也又磬氏為磬倨句一矩有半博為一股為二鼓為三參分其股博去其一以為鼓博三分其鼓博以其一為之厚今磬無博厚無長短亦非也五年四月命參知政事劉沆梁適監議大樂是月知制誥王洙奏黃鍾為宮最尊者但聲有尊卑耳不必在其形體也言鍾磬依律數為大小之制者經典無正文惟鄭康成立意言之亦自云假設之法孔穎達作疏因而述之據歷代史籍亦無鍾磬依律數大小之說其康成穎達等即非身曾制作樂器至如言磬前長三律二尺七寸後長二律一尺八寸是磬有大小之制者據此以黃鍾為律臣曾依此法造黃鍾特磬者止得林鍾律聲若隨律長短為鍾磬大小之制則黃鍾長二尺二寸半減至應鍾則形制大小比黃鍾才四分之一又九月十月以無射應鍾為宮即黃鍾大呂反為商聲宮小而商大是君弱臣彊之象今參酌其鎛鍾特磬制度欲且各依律數算定長短大小容受之數仍以皇祐中黍尺為法鑄大呂應鍾鍾磬各一即見形制聲韻所歸奏可五月翰林學士承旨王拱辰言奉詔詳定大樂比臣至局鍾磬已成竊緣律有長短磬有大小黃鍾九寸最長其氣陽其象土其正聲為宮為諸律之首蓋君德之象不可並也今十二鍾磬一以黃鍾為率與古為異臣等亦嘗詢逸瑗等皆言依律大小則聲不能諧故臣竊有疑請下詳定大樂所更稽古義參定之是月知諫院李兌言曩者紫宸殿閲太常新樂議者以鍾之形制未中律度遂斥而不用復詔近臣詳定竊聞崇文院聚議而王拱辰欲更前史之義王洙不從議論喧嘖夫樂之道廣大微妙非知音入神豈可輕議西漢去聖尚近有制氏世典大樂但能紀其鏗鏘而不能言其義况今又千餘年而欲求三代之音不亦難乎且阮逸罪廢之人安能通聖明述作之事務為異說欲規恩賞朝廷制樂數年當國財匱乏之時煩費甚廣器既成矣又欲改為雖命兩府大臣監議然未能裁定其當請以新成鍾磬與祖宗舊樂參校其聲但取諧和近雅者合用之六月帝御紫宸殿奏太常新定大安之樂召輔臣至省府館閣預觀焉賜詳定官器幣有差八月詔南郊姑用舊樂其新定大安之樂常祀及朝會用之翰林學士胡宿上言自古無並用二樂之理今舊樂高新樂下相去一律難並用且新樂未施郊廟先用之朝會非先王薦上帝配祖考之意帝以為然九月御崇政殿召近臣宗室臺諫省府推判官觀新樂並新作晉鼓乃以瑗為大理寺丞逸復尚書屯田員外郎保信領榮州防禦使入內東頭供奉官賈宣吉為內殿承制並以制鍾律成特遷之至和元年言者多以陰陽不和由大樂未定帝曰樂之不合於古久矣水旱之來繫時政得失豈樂所召哉二年潭州上瀏陽縣所得古鍾送太常初李照斥王朴樂音高乃作新樂下其聲太常歌工病其太濁歌不成聲私賂鑄工使減銅齊而聲稍清歌乃協然照卒莫之辨又朴所制編鍾皆側垂照瑗皆非之及照將鑄鍾給銅於鑄瀉務得古編鍾一工人不敢毀乃藏於太常鍾不知何代所作其銘云粵朕皇祖寶和鍾粵斯萬年子子孫孫永寶用叩其聲與朴鍾夷則清聲合而其形側垂瑗後改鑄正其鈕使下垂叩之弇鬱而不揚其鎛鍾又長甬而震掉聲不和著作佐郎劉羲叟謂人曰此與周景王無射鍾無異上將有眩惑之疾嘉祐元年正月帝御大慶殿受朝前一夕殿庭設仗衛既具而大雨雪至壓宮架折帝於禁中跣而告天遂暴感風眩人以羲叟之言為驗八月御製恭謝樂章是月詔恭謝用舊樂四年九月御製夾享樂舞名僖祖奏大基順祖奏大祚翼祖奏大熙宣祖奏大光太祖奏大統太宗奏大昌真宗奏大治孝惠皇后奏淑安孝章皇后奏靜安淑德皇后奏柔安章懷皇后奏和安迎神送神奏懷安皇帝升降奏肅安奠瓚奏顧安奉俎徹豆奏充安飲福奏禧安亞獻終獻奏祐安退文舞迎武舞奏顯安皇帝歸大次奏定安登樓禮成奏聖安駕回奏采茨文舞曰化成治定武舞曰崇功昭德帝自製迎神送神樂章詔宰臣富弼等撰大祚至采茨曲詞十八七年八月御製明堂迎神樂章皆肄于太常翰林學士王圭言昔之作樂以五聲播於八音調和諧合而與治道通先王用於天地宗廟社稷事于山川鬼神使鳥獸盡感况於人乎然則樂雖盛而音虧未知其所以為樂也今郊廟升歌之樂有金石絲竹匏土革而無木音夫所謂柷敔者聖人用以著樂之始終顧豈容有缺耶且樂莫隆於韶書曰戞擊是柷敔之用既云下而擊鼗知鳴球與柷敔之在堂故傳曰堂上堂下各有柷敔也今陛下躬祠明堂宜詔有司考樂之失而合八音之和於是下禮官議而堂上始置柷敔又祕閣校理裴煜奏大祠與國忌同者有司援舊制禮樂備而不作忌日必哀志有所至其不有樂宜也然樂所以降格神祇非以適一己之私也謹案開元中禮部建言忌日享廟應用樂裴寬立議廟尊忌卑則作樂廟卑忌尊則備而不奏中書令張說以寬議為是宗廟如此則天地日月社稷之祠用樂明矣臣以為凡大祠天地日月社稷與忌日同者伏請用樂其在廟則如寬之議所冀略輕存重不失其稱下其章禮官議曰傳稱祭天以煙為歆神之始以血為陳饌之始祭地以埋為歆神之始以血為陳饌之始宗廟以灌為歆神之始以腥為陳饌之始然則天地宗廟皆以樂為致神之始故曰大祭有三始謂此也天地之間虛豁而不見其形者陽也鬼神居天地之間不可以人道接也聲屬於陽故樂之音聲號呼召於天地之間庶幾神明聞之因而來格故祭必求諸陽商人之祭先奏樂以求神先求於陽也次灌地求神於陰達于淵泉也周人尚臭四時之祭先灌地以求神先求諸陰也然則天神地祇人鬼之祀不可去樂明矣今七廟連室難分廟忌之尊卑欲依唐制及國朝故事廟祭與忌同日並縣而不作其與別廟諸后忌同者作之若祠天地日月九宮太一及蠟百神並請作樂社稷以下諸祠既卑於廟則樂可不作翰林學士王圭等以為社稷國之所尊其祠日若與別廟諸后忌同者伏請亦不去樂詔可英宗治平元年六月太常寺奏仁宗配饗明堂奠幣歌誠安酌獻歌德安二年九月禮官李育上言南郊太廟二舞郎總六十八文舞罷舍羽籥執干戚就為武舞臣謹按舊典文武二舞各用八佾凡祀圜丘祀宗廟太樂令率工人以入就位文舞入陳於架北武舞立於架南又文舞出武舞入有送迎之曲名曰舒和亦曰同和凡三十一章止用一曲是進退同時行綴先定步武容體各應樂節夫玄德升聞之舞象揖讓天下大定之舞象征伐柔毅舒急不侔而所法所習亦異不當中易也竊惟天神皆降地祇皆出八音克諧祖考來格天子親執圭幣相維辟公嚴恭寅畏可謂極矣而舞者紛然縱橫於下進退取舍蹙迫如是豈明有德象有功之誼哉國家三年而躬一郊同殿而享八室而舞者闕如名曰二舞實一舞也且如大朝會所以宴臣下而舞者備其數郊廟所以事天地祖考而舞者減其半殊未為稱事有近而不可迹禮有繁而不可省所繫者大而有司之職不敢廢也伏請南郊太廟文武二舞各用六十四人以備帝王之禮樂以明祖宗之功德奏可四年八月學士院建言國朝宗廟之樂各以功德名舞洪惟英宗繼天遵業欽明勤儉不自暇逸踐祚未幾而恩行威立固已超軼百王之上今厚陵復土祔廟有期而樂名未立亡以詔萬世請上樂章及名廟所用舞曰大英之舞自後禮官御史有所建明而詳定朝會及郊廟禮文官於樂節有議論率以時考正之神宗熙寧九年禮官以宗廟樂節而有請者三其一今祠太廟興安之曲舉柷而聲已過舉敔而聲不止則始終之節未明請祠祭用樂一奏將終則戞敔而聲少止擊柷則樂復作以盡合止之義其二大樂降神之樂均聲未齊短長不協故舞行疾徐亦不能一請以一曲為一變六變用六九變用九則樂舞始終莫不應節其三周人尚臭蓋先灌而後作樂本朝宗廟之禮多從周請先灌而後作樂元豐二年詳定所以朝會樂而有請者十其一唐元正冬至大朝會迎送王公用舒和開元禮以初入門舒和之樂作至位樂止蓋作樂所以待王公今中書門下親王使相先於丹墀上東西立皇帝升御坐乃奏樂引三品以上官未為得禮請侍從及應赴官先就立位中書門下親王使相諸司三品尚書省四品及宗室將軍以上班分東西入正安之樂作至位樂止其二今朝會儀舉第一爵宮縣奏和安之曲第二第三第四登歌作慶雲嘉禾靈芝之曲則是合樂在前登歌在後有違古義請第一爵登歌奏和安之曲堂上之樂隨歌而發第二爵笙入奏慶雲之曲止吹笙餘樂不作第三爵堂上歌嘉禾之曲堂下吹笙瑞木成文之曲一歌一吹相間第四爵合樂奏靈芝之曲堂上下之樂交作其三定文舞武舞各為四表表距四步為酇綴各六十四文舞者服進賢冠左執籥右秉翟分八佾二工執纛引前衣冠同之舞者進蹈安徐進一步則兩兩相顧揖三步三揖四步為三辭之容是為一成餘成如之自南第一表至第二表為第一成至第三表為再成至北第一表為三成覆身卻行至第三表為四成至第二表為五成復至南第一表為六成而武舞入今文舞所秉翟羽則集雉尾置於髹漆之柄求之古制實無所本聶崇義圖羽舞所執類羽葆幢析羽四重以結綬系於柄此纛翳之謂也請按圖以翟羽為之其四武舞服平巾幘左執干右執戈二工執旌居前執鼗執鐸各二工金錞二四工舉二工執鐲執鐃執相在左執雅在右亦各二工夾引舞者衣冠同之分八佾於南表前先振鐸以通鼓乃擊鼓以警戒舞工聞鼓聲則各依酇綴總干正立定位堂上長歌以咏嘆之於是播鼗以導舞舞者進步自南而北至最南表以見舞漸然後左右夾振鐸次擊鼓以金錞和之以金鐲節之以相而輔樂以雅而陔步舞者發揚蹈厲為猛賁趫速之狀每步一進則兩兩以戈盾相嚮一擊一刺為一伐四伐為一成成謂之變至第二表為一變至第三表為二變至北第一表為三變舞者覆身嚮堂卻行而南至第三表為四變乃擊刺而前至第二表回易行列舂雅節步分左右而跪以右膝至地左足仰起象以文止武為五變舞蹈而進為兵還振旅之狀振鐸搖鼗擊鼓和以金錞廢鐲鳴鐃復至南第一表為六變而舞畢古者人君自舞大武故服冕執干戚若用八佾而為擊刺之容則舞者執干戈說者謂武舞戰象樂六奏每一奏之中率以戈矛四擊刺戈則擊兵矛則刺兵玉戚非可施於擊刺今舞執干戚蓋沿襲之誤請左執干右執戈其五古之鄉射禮三笙一和而成聲謂三人吹笙一人吹和今朝會作樂丹墀之上巢笙和笙各二人其數相敵非也蓋鄉射乃列國大夫士之禮請增倍為八人丹墀東西各三巢一和其六今宮縣四隅雖有建鼓鞞應相傳不擊乾德中詔四建鼓並左右鞞應合十有二依李照所奏以月建為均與鎛鍾相應鞞應在建鼓旁是亦朔鼙應鼙之類請將作樂之時先擊鼙次擊應然後擊建鼓其七今樂縣四隅設建鼓不擊別施散鼓於樂縣內代之乾德中尹拙奏宜去散鼓詔可而樂工積習亦不能廢李照議作晉鼓以為樂節請樂縣內去散鼓設晉鼓以鼓金奏其八古者瞽矇瞭皆掌播鼗所以節一唱之終請宮縣設鼗以為樂節其九以天子禮求之凡樂事播鼗擊頌磬笙磬以鍾鼓奏九夏是皆在庭之樂戞擊則柷敔球則玉磬搏拊所以節樂琴瑟所以詠詩皆堂上樂也磬本在堂下尊玉磬故進之使在上若擊石拊石則當在庭後世不原於此以春秋鄭人賂晉侯歌鍾二肆遂於堂上設歌鍾歌磬蓋歌鍾則堂上歌之堂下以鼓應之耳歌必金奏相和名曰歌鍾則以節歌是已豈堂上有鍾邪歌磬之名本無所出晉賀循奏置登歌簨虡采玉造小磬蓋取舜廟鳴球之制後周登歌備録鍾磬隋唐迄今因襲行之皆不應禮請正至朝會堂上之樂不設鍾磬其十古者歌工之數大射工六人四瑟則是諸侯鼓瑟以四人歌以二人天子八人則瑟與歌皆四人矣魏晉以來登歌五人隋唐四人本朝因之是循用周制也禮登歌下管貴人聲也故儀禮瑟與歌工皆席于西階上隋唐相承庭中磬虡之下繫以偶歌琴瑟非所謂升歌貴人聲之義今堂上琴瑟比之周制不啻倍蓰而歌工止四人音高下不相權蓋樂有八音所以行八風是以舞佾與鍾磬俱用八為數請罷庭中歌者堂上歌為八琴瑟之數放此其箏阮筑悉廢太常以謂堂上鍾磬去之則歌聲與宮縣遠漢唐以來宮室之制寖廣堂上益遠庭中其上下樂節苟不相應則繁亂而無序況朝會之禮起於西漢則後世難以純用三代之制其堂上鍾磬庭中歌工與箏筑之器從舊儀便遂如太常議
