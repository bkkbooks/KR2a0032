body:
  text: 宋史卷十五本紀第十五神宗二三年春正月癸丑録唐李氏周柴氏後乙卯詔諸路散青苗錢禁抑配戊午判尚書省張方平罷知陳州二月壬申以翰林學士司馬光為樞密副使凡九辭詔收還敕誥甲戌以河州刺史瞎欺丁木征為金紫光祿大夫檢校刑部尚書乙酉韓琦罷河北安撫使為大名府路安撫使三月丙申孫覺呂公著張戩程皓李常上疏極言新法不聽己亥始策進士罷詩賦論三題戊申李常言青苗斂散不實有旨具析翰林學士兼知通進銀臺司范鎮封還詔書以為不當坐罷職守本官壬子賜禮部奏名進士明經及第八百二十九人乙卯詔諸路毋有留獄丙辰立試刑法及詳刑官右正言孫覺以奉詔反覆貶知廣德軍夏四月癸亥幸金明池觀水嬉宴射瓊林苑丙寅遼遣耶律寬來賀同天節丁卯給兩浙轉運司度僧牒募民入粟戊辰御史中丞呂公著貶知潁州己卯趙抃罷知杭州以韓絳參知政事監察御史𩹉行程皓罷為京西路同提點刑獄壬午右正言李常貶通判滑州監察御史𩹉行張戩貶知公安縣王子韶貶知上元縣癸未侍御史知雜事陳襄罷為同修起居注程皓簽書鎮寧軍節度判官公事前秀州軍事判官李定為太子中允監察御史𩹉行五月癸巳詔並邊州郡毋給青苗錢太白晝見壬寅詔令司馬光詳定轉對封事甲辰詔罷制置三司條例歸中書辛亥賜進士蘇丕號安退處士壬子罷入閣儀丁巳詔以審官院為東院別置西院六月癸酉日有五色雲丁丑封宗室秦魯蔡魏燕陳越七王後為公戊寅詔修武成王廟丙戌知諫院胡宗愈貶通判真州秋七月辛卯歐陽修徙知蔡州壬辰呂公弼罷樞密使以知太原府馮京為樞密副使罷潞州交子務戊戌雨雹癸丑詳定宗室襲封制度甲寅置三班院主簿八月戊午罷看詳銀臺司文字所丙寅以旱慮囚死罪以下遞減一等杖笞者釋之以衛州旱令轉運司振恤仍蠲租賦戊寅詔川峽福建廣南七路官令轉運司立格就注具為令遣張景憲等賀遼主生辰正旦己卯夏人犯大順城知慶州李復圭以方略授環慶路鈐轄李信慶州東路都巡檢劉甫監押种詠出戰兵少取敗復圭誣信等違其節制斬信及劉甫种詠死於獄是月慶州巡檢姚兕敗夏人於荔原堡鈐轄郭慶都監高敏死之九月戊子朔中書置檢正官乙未韓絳罷為陝西宣撫使己亥始試法官庚子曾公亮罷為司空兼侍中河陽三城節度使辛丑以馮京參知政事翰林學士吳充為樞密副使乙巳親策賢良方正及武舉壬子太白晝見癸丑作東西府以居執政司馬光罷知永興軍詔環慶陳亡義勇餘丁當刺者悉免之冬十月辛酉詔延州毋納夏使甲子雨木冰壬申朝謁神御殿丙子知慶州李復圭擅興兵敗績誣裨將李信劉甫种詠以死御史劾之貶保靜軍節度副使戊寅陳升之以母憂去位乙酉詔罷諸場務內侍監當十一月戊子振河北饑民徙京西者己丑官節行之士二十一人壬辰蠲陝西蕃部貸糧癸卯授布衣王存下班殿侍三班差使宣撫司指揮使甲辰夏人寇大順城都監燕達等擊走之庚戌詔升朝官除南郊赦封贈父母外不得以加恩轉官乙卯以韓絳兼河東宣撫使梓州路轉運使韓璹等以能興利除害賜帛有差十二月己未詔立諸路更戍法舊以他路兵雜戍者遣還乙丑立保甲法丁卯以韓絳王安石並同中書門下平章事王圭參知政事賜布衣陳知彥進士出身知縣王輔同進士出身庚午夏人寇鎮戎軍三川寨巡檢趙普伏兵邀擊敗之丁丑增廣南攝官奉戊寅初行免役法賜西蕃董詔並衣帶鞍馬庚辰命王安石提舉編修三司令式壬午遼遣蕭遵道等來賀正旦癸未命宋敏求詳定命官使臣過犯是歲振河北陝西旱饑除民租交址入貢廣源下溪州蠻來附四年春正月丁亥朔不視朝己丑种諤襲夏兵于囉兀北大敗之遂城囉兀自是夏人日聚兵為報復計言者以諤為稔邊患不便壬辰王安石請鬻天下廣惠倉田為三路及京東常平倉本從之乙未渝州夷賊李光吉叛巡檢李宗閔等戰死命夔州路轉運使孫構討平之詔詳定大辟覆讞法丁酉朝謁太祖太宗神御殿庚子幸集禧觀宴從臣又幸大相國寺御宣德門觀燈韓絳等言种諤領兵入西界斬獲甚衆詔遣使撫問乙巳停括牧地丁未立京東河北賊盜重法庚戌罷永興軍買鹽鈔場甲寅定文德殿朔望視朝儀二月丁巳朔罷詩賦及明經諸科以經義論策試進士置京東西陝西河東河北路學官使之教導辛酉詔治吏沮青苗法者戊辰詔振河北民乏食者賻恤西界戰死軍人庚午于闐國來貢壬申進封高密郡王頵為嘉王癸酉詔審官院所定人赴中書察堪任者引見甲戌賜討渝州夷賊兵特支錢丁丑禱雨詔增漳河等役兵三月丁亥夏人陷撫寧堡戊子慶州廣鋭卒叛尋討平之庚寅詔給諸路學田增教官員辛卯遣使察奉行新法不職者癸卯減河東陝西路囚罪一等徒以下釋之民緣軍事科役者蠲其租賦丙午种諤坐陷撫寧堡責授汝州團練副使潭州安置丁未韓絳坐興師敗衄罷以本官知鄧州辛亥録唐李氏後夏四月丙辰朔恤刑辛酉遼遣蕭廣等來賀同天節壬戌遣環慶都鈐轄幵贇以兵屯邠涇河中以備西夏癸亥罷陝西交子法癸酉司馬光權判西京留臺种諤再貶賀州別駕甲戌詔司農寺月進諸路所上雨雪狀丙子遣使按視宿亳等州災傷仍令修飭武備壬午定進士考轉官五月甲午右諫議大夫呂晦卒壬寅詔許富弼養疾西京丙午高麗國來貢辛亥詔宗室率府副率以上遭父母喪及嫡孫承重並解官行服壬子詔恩冀等州災傷遣使振恤蠲其稅六月丁巳河北饑民為盜者減死刺配庚申羣臣三上尊號曰紹天法古文武仁孝皇帝不許甲子歐陽修以太子少師致仕丙寅慮囚甲戌富弼坐格青苗法徙判汝州秋七月戊子層檀國來貢甲午振恤兩浙水災乙未録死事將校崔達子遇為三班奉職丁酉監察御史𩹉行劉摯罷監衡州鹽倉御史中丞楊繪貶知鄭州庚子詔宗室不得祀祖宗神御丁未詔唐鄧給流民田八月癸丑朔高麗來貢遣官體量陝西差役新法及民間利害甲寅詔郡縣保甲與賊鬬死傷者給錢有差庚申復春秋三傳明經取士癸酉遣楚建中等賀遼主生辰正旦置洮河安撫司命王韶主之九月丙戌河決鄆州辛卯大饗明堂以英宗配赦天下內外官進秩有差庚子夏人入貢癸卯增選人奉冬十月壬子朔罷差役法使民出錢募役立選人及任子出官試法丙辰置樞密院檢詳官戊辰立太學生內外上舍法丙子詔罪人配流遇冬者至中春乃遣十一月壬午朔詔凡賞功罰罪事可懲勸者月頒之天下甲申詔蠲逋租丁亥作中太一宮壬寅開洪澤河達于淮十二月辛亥朔詔增賜國子監錢四千緡戊午歸夏俘己未安定郡王從式薨甲子封越國公世清為會稽郡王丙寅省諸路廂軍乙亥崇義公柴詠致仕子若訥襲封丙子遼遣耶律紀等來賀正旦五年春正月己丑詔聽降羌歸國己亥詔太廟時饗以宗室使相已上攝事置京城邏卒察謗議時政者收罪之二月壬子龜茲來貢以兩浙水賜穀十萬石振之仍募民興水利壬戌詔罷陝西遞運銅錫癸亥太白晝見丙寅以知鄭州呂公弼為宣徽南院使判秦州龍圖閣直學士蔡挺為樞密副使三月甲午李日尊卒子乾德嗣遣使弔贈戊戌富弼以司空致仕進封韓國公立文武換官法丙午以內藏庫錢置市易務夏四月庚戌朔立殿前馬步軍春秋校試殿最法乙卯遼遣耶律適等來賀同天節己未括間田置弓箭手辛未塞北京決河五月辛巳詔以古渭寨為通遠軍命王韶兼知軍行教閲法宗室非袒免親者許應舉庚寅以青唐大首領俞龍珂為西頭供奉官賜姓名包順壬辰以趙尚寬等前守唐州辟田疏水有功增秩以勸天下丙午太白晝見行保馬法六月壬子曾公亮以太傅致仕癸亥詔以四場試進士丙寅作京城門銅魚符乙亥置武學秋七月壬寅初以文臣兼樞密都承旨閏月庚戌遣中書檢正官章惇察訪荊湖北路詔入內供奉官以下已有養子更養次子為內侍者斬八月甲申太子少師致仕歐陽修薨秦鳳路沿邊安撫王韶復武勝軍丁亥詔求歐陽修所撰五代史壬辰以武勝軍為鎮洮軍癸巳遣崔台符等賀遼主生辰正旦乙未詔侍從及諸路監司各舉有才行者一人甲辰王韶破木征于鞏令城頒方田均稅法九月癸丑許宗室試換文資癸亥始御便殿旬校諸軍武技丙寅少華山崩詔壓死者賜錢貧者官為葬祭淮南分東西路冬十月戊戌升鎮洮軍為熙州鎮洮軍節度置熙河路減秦鳳囚罪一等十一月癸丑河州首領瞎藥等來降以為內殿崇班賜姓名包約丁卯貶權監察御史𩹉行張商英監荊南稅壬申分陝西為永興秦鳳路仍置六路經略司章惇開梅山置安化縣十二月丙子赦亡命荊湖溪洞者丁丑詔太原置弓箭手戊寅詔寺觀奉聖祖及祖宗陵寢神御者免役錢改溫成廟為祠壬午陳升之為樞密使癸未雨土乙未築熙州南北關及諸堡寨己亥遼遣蕭瑜等來賀正旦六年春正月辛亥復僖祖為太廟始祖以配感生帝祧順祖于夾室二月辛卯夏人寇秦州都巡檢使劉惟吉敗之丙申永昌陵上宮東門火王韶復河州獲木征妻子壬寅以韓絳知大名府三月己酉詔贈熙河死事將田瓊禮賓使録其子三人孫一人庚戌親策進士置經局命王安石提舉辛亥試明經諸科丙辰以四月朔日當食自丁巳避殿減膳降天下囚罪一等流以下釋之己未置諸路學官壬戌賜奏名進士諸科及第出身五百九十六人甲子交州來貢丁卯宰相上表請復膳不許詔進士諸科並試明法注官戊辰置刑獄檢法官庚午封李日尊子乾德為交址郡王夏四月甲戌朔日食不見乙亥御殿復膳西南龍蕃諸夷來貢置律學丁丑遼遣耶律寧等來賀同天節甲午定齊徐等州保甲戊戌裁定在京吏祿五月癸卯朔播州楊貴遷遣子光震來貢以光震為三班奉職戊申禱雨乙丑詔京東路察士人有行義者以聞遣中書檢正官熊本措置瀘夷西京左藏庫副使景思忠等攻燒遂州夷囤戰歿録其子昌符等七人軍士死者賜其家錢帛有差辛未西南龍蕃來貢六月己亥置軍器監秋七月乙巳詔京西淮南兩浙江西荊湖等六路各置鑄錢監丙午大食陀婆離來貢己酉禱雨甲寅録在京囚死罪以下降一等杖罪釋之丁巳詔沿邊吏殺熟戶以邀賞者戮之乙丑分河北為東西路丙寅夜西北有聲如磑八月壬申朔遣賈昌衡等賀遼主生辰正旦甲申罷簡州歲貢綿紬甲午賜熙河涇原軍士特支錢戊戌復比閭族黨之法九月壬寅置兩浙和糴倉立斂散法戊申詔興水利辛亥策武舉戊午岷州首領本令征以其城降王韶入岷州丙寅太白犯斗戊辰詔禱雨決獄冬十月辛未章惇平懿洽州蠻辛巳以復熙河洮岷疊宕等州御紫宸殿受羣臣賀解所服玉帶賜安石甲申朝獻景靈宮丙戌振兩浙江淮饑壬辰行折二錢丁酉遣使瘞熙河戰骨十一月癸丑中太一宮成減天下囚罪一等流以下釋之乙卯親祀太一宮丙寅大雪詔京畿收養老弱凍餒者十二月戊子詔決開封府囚丙申遼遣耶律洞等來賀正旦七年春正月辛亥賞復岷洮等州功西京左藏庫使桑湜等遷官有差壬子幸中太一宮宴從臣又幸大相國寺御宣德門觀燈乙卯封皇子俊為永國公甲子熊本平瀘夷二月辛未于闐來貢發常平米振河陽饑民癸未詔三司歲會天下財用出入之數以聞己丑禱雨辛卯置客省引進四方館閣門使副等員乙未知河州景思立等與青宜結鬼章戰于踏白城敗死廢遼州三月壬寅木征鬼章寇岷州高遵裕遣包順等擊走之慮囚減死罪一等杖以下釋之癸卯以旱避殿減膳乙巳白虹貫日丙午遣使分行諸路募武士赴熙河庚戌詔熙河死事者家給錢有差罷兩浙增額預買紬絹令諸路監司察留獄癸丑羣臣表請復膳不許丙辰遼遣林牙蕭禧來言河東疆界命太常少卿劉忱議之己未行方田法甲子遣使報聘于遼乙丑詔以災異求直言夏四月癸酉以旱罷方田是日雨遼遣耶律永寧等來賀同天節乙亥王詔破西蕃於結河川丙子御殿復膳己卯以高遵裕為岷州團練使甲申詔邊兵死事無子孫者廩其親屬終身乙酉王韶進築珂諾城與蕃兵連戰破之斬首七千餘級焚三萬餘帳木征率酋長八十餘人詣軍門降雨雹丙戌王安石罷知江寧府以韓絳同中書門下平章事監修國史翰林學士呂惠卿參知政事置沅州丁酉詔王韶發木征及其家赴闕遼遣樞密副使蕭素議疆界于代州境上五月戊戌朔減熙河路囚罪一等流以下釋之辛丑詔河州瘞蕃部暴骸壬寅雨雹癸卯大雨雹辛亥罷賢良方正等科乙丑大雨水壞陝平陸二縣六月戊寅賜討洮州將士特支錢丁亥作渾儀浮漏廣州鳳凰見以木征為榮州團練使賜姓名趙思忠秋七月癸卯羣臣五上尊號曰紹天憲古文武仁孝皇帝不許癸亥詔河北兩路捕蝗又詔開封淮南提點提舉司檢覆蝗旱以米十五萬石振河北西路災傷八月丁丑賜環慶安撫司度僧牒以募粟振漢蕃饑民遣張芻等賀遼主生辰正旦辛卯詔免淮南開封府來年春夫除放邢洺等州秋稅癸巳置場於南薰安上門給流民米集賢院學士宋敏求上編修閣門儀制九月戊戌以時雨降詔河北京西陝西淮南等路勸民趨耕有因事拘繫者釋之壬子三司火癸丑置京畿河北京東西路三十七將甲寅詔樞密院議邊防冬十月壬申詔韓琦富弼文彥博曾公亮條代北事宜以聞戊寅詔浙西路提舉司出米振常潤州饑庚辰置三司會計司以韓絳提舉辛巳以河北災傷減州軍文武官員癸巳以常平米於淮南西路易饑民所掘蝗種又振河北東路流民十一月己未祀天地于圜丘赦天下十二月丙寅省熙河岷三州官百四十一員丁卯文武官加恩己丑遼遣耶律寧等來賀正旦是歲高麗入貢淯井長寧夷十郡及武都夷內附八年春正月庚子蔡挺罷判南京留司御史臺馮京罷知亳州丙午分京東為東西路輟江南東路上供米均給災傷州軍丁未御宣德門觀燈乙卯詔出使廷臣所至采吏治能否以聞雨木冰戊午詔所在流民願歸業者州縣齎遣之己未洮西安撫司以歲旱請為粥以食羌戶饑者二月甲子增陝西錢監改鑄大錢癸酉以王安石同中書門下平章事戊寅詔樞密副都承旨張誠一等以李靖營陳法教殿前馬步軍乙酉初行河北戶馬法丙戌停京畿土功七年三月丁酉振潤州饑戊戌知河州鮮于師中乞置蕃學教蕃酋子弟賜田十頃歲給錢千緡增解進士二人從之庚子遼蕭禧再來遣韓縝往河東會議癸丑知制誥沈括報聘復振常潤饑民戊午太白晝見夏四月乙丑詔減將作監冗官丁卯遼遣耶律景熙等來賀同天節乙亥正僖祖禘祫東嚮位戊寅以吳充為樞密使壬午湖南江水溢閏月乙未陳升之罷為鎮江軍節度使判揚州廣源州劉紀寇雍州歸化州儂智會敗之壬寅沈括上奉元曆癸卯以宣徽北院使張方平判永興軍分秦鳳路兵為四將壬子沂州民朱唐告前餘姚縣主簿李逢謀反辭連右羽林大將軍世居及河中府觀察推官徐革命御史中丞鄧綰知諫院范百祿御史徐禧雜治之獄具世居賜死逢革等伏誅甲寅録趙普後乙卯詔西南蕃五姓蠻五年一入貢五月辛酉朔慮囚降死罪一等杖以下釋之甲子分環慶兵為四將丁丑雨土及黃毛甲申熙河路蕃官殿直頓埋謀叛伏誅己丑遣使振鄜延環慶饑六月乙未日上有五色雲丙午釃汴水入蔡河以通漕己酉頒王安石詩書周禮義于學官辛亥以安石為尚書左僕射兼門下侍郎戊午太師魏國公韓琦薨己未以琦配饗英宗廟庭秋七月甲子虔州江水溢戊寅太白晝見戊子分涇原兵為五將命韓縝如河東割地八月庚寅朔日當食雲陰不見癸巳募民捕蝗易粟苗損者償之仍復其賦丙申遣謝景溫等賀遼主生辰正旦減官戶役錢之半詔發運司體實淮南江東兩浙米價州縣所存上供米毋過百萬石減直豫民斗錢勿過八十庚戌韓絳罷發河北京東兵及監牧卒修都城丁巳大閲九月庚申朔王安石兼修國史立武舉絶倫法冬十月庚寅呂惠卿罷知陳州乙未彗出軫己亥詔以災異數見不御前殿減常膳求直言壬寅赦天下罷手實法丁未彗不見丙辰御殿復膳十一月戊寅交址陷欽州壬午立陝西蕃丁法甲申交址陷廉州丙戌渝州改南平軍十二月丙申濬河壬寅以翰林學士元絳參知政事龍圖閣直學士曾孝寬簽書樞密院事辛亥天章閣待制趙𪅂為安南道招討使嘉州防禦使李憲副之以討交址癸丑遼遣耶律世通等來賀正旦甲寅熙河路木宗城首領結彪謀叛熟羌日腳族青廝扒斬其首來獻補下班殿侍九年春正月乙丑雨木冰戊辰交址陷雍州知州蘇緘死之己卯下溪州刺史彭師晏及天賜州降庚辰遣使祭南嶽南海告以南伐辛巳贈蘇緘奉國軍節度使諡忠勇以其子子元為西頭供奉官閣門祗候二月戊子宣徽南院使郭逵為安南道招討使罷李憲以趙𪅂副之詔占城占臘合擊交址己丑宗哥首領鬼章寇五牟谷蕃官藺訥支等邀擊大破之己亥以出師罷春宴乙卯雨雹三月丙辰朔進仁宗婉容周氏為賢妃辛酉御集英殿策進士恤欽廉雍三州死事家瘞戰亡士賊所蹂踐除其田征甲戌賜進士諸科及第出身五百九十六人丁丑以廣西進士徐伯祥為右侍禁欽廉白州巡檢宗哥首領鬼章寇五牟谷熙河鈐轄韓存寶敗之庚辰以种諤知岷州夏四月辛卯遼遣耶律庶幾等來賀同天節乙未以遼主母喪罷同天節上壽戊戌復廣濟河漕癸卯詔廣南亡沒士卒及百姓為賊殘破者轉運安撫司具實並議振恤以聞甲辰給空名告身付安南以招降賞功詔諸路募武勇赴廣西贈廣西死事將士官有差丙午遣王克臣等弔慰于遼辛亥茂州夷寇邊遣內侍押班王中正經制甲寅遼遣耶律孝淳以國母喪來告帝發哀成服輟視朝七日五月丙辰朔詔雍州沿邊州峒首領來降者周惠之癸亥詔試醫學生丙寅分兩浙為東西路丁卯城茂州壬申詔安南諸軍過嶺有疾者所至護治丙子大理國來貢庚辰靜州下首領董整白等來降六月丁亥詔安南將吏視軍士有疾者月以數聞己丑綿州都監王慶崔昭用劉圭左侍禁張乂援戰茂州死之詔慶等子與借職女出嫁夫與奉職白丁王禹錫等二人賜錢其家辛卯詔濱海富民得養蛋戶毋致為外夷所誘己亥慮囚降死罪一等杖以下釋之癸卯以水源等洞蠻主儂賀等七人為定遠寧遠將軍秋七月丙辰朱崖軍黎賊黃嬰入寇詔廣南西路嚴兵備之庚申關以西蝗蝻刟繕生壬戌築下溪州改名會溪城癸亥靜州將楊文緒結蕃部謀叛王中正斬之以徇詔廣西死事官無子孫者許立後乙丑詔自今遇大禮推恩官昭憲太后族一人是月安南行營次桂州郭逵遣鈐轄和斌等督水軍涉海自廣東入諸軍自廣南入八月甲申朔齊州監務左班殿直孫紀死賊録其一子為三班借職戊子以文彥博守太保兼侍中行太原尹己丑遣程師孟等賀遼主生辰正旦罷鬻祠廟錢丁酉禁北邊民闌出穀粟庚子占城來貢九月戊午濬汴河丙寅詔罷都大制置河北河防水利司己卯遼遣使回謝詔恤嶺南死事家表將士墓冬十月乙酉太白晝見乙未詔東南諸路教閲新軍丙午王安石罷判江寧府以吳充監修國史王圭為集賢殿大學士並同中書門下平章事資政殿學士馮京知樞密院辛亥除放沅州歸明人戶去年倚閣秋稅十一月乙卯賜廣南東路空名告敕募入錢助軍辛酉録唐相魏徵後同州司士參軍道嚴流內銓特免試注官乙亥以安南行營將士疾疫遣同知太常禮院王存禱南嶽遣中使建祈福道場己卯洮東安撫司言包順等破鬼章兵於多移谷壬午鬼章寇岷州知州种諤等敗之鐵城十二月丙戌安南僞觀察使劉紀降置司農丞庚寅子傭生丁酉詔岷州界經鬼章兵燹者賜錢脅從來歸者釋其罪癸卯郭逵敗交址於富良江獲其僞太子洪真李乾德遣人奉表詣軍門降逵遂班師丁未遼遣耶律運等來賀正旦庚戌詔有得鬼章冷雞朴首者賞之置威戎軍十年春正月乙丑御宣德門觀燈戊辰仙韶院火不視朝己巳白虹貫日二月甲申以崇信軍節度使宗旦同中書門下平章事戊子以鬼章敗种諤等賞官有差辛卯日中有黑子甲午詔宗室使相雖及十年更不取旨磨勘丁酉詔諸州歲以十一月給老疾貧乏者粟盡三月乃止己亥以王韶知洪州丙午以復廣源蘇茂等州羣臣表賀赦廣州囚罪一等徒以下釋之賜行營諸軍錢民緣征役者恤其家以廣源州為順州赦李乾德罪以郭逵判潭州趙𪅂知桂州己酉以交址降赦廣南東路荊湖南路繫囚餘各降一等徒以下釋之三月辛未慮囚降死罪一等杖以下釋之壬申詔州縣捕蝗夏四月辛巳復置憲州乙酉遼遣蕭儀等來賀同天節癸巳文州蕃賊寇邊州兵擊走之丁酉賜熙河路兵特支錢戰死者賜帛免夏秋稅五月戊午詔修仁宗英宗史甲戌太白晝見六月壬午注輦國朝貢癸巳王安石以使相為集禧觀使丁未置岷州鐵城堡秋七月甲寅禱雨丁巳令諸路歲上縣令課績辛酉羣臣五上尊號曰奉天憲古文武仁孝皇帝不許乙亥郭逵以安南失律貶為左衛將軍丙子河決澶州曹村掃八月壬寅詔潭州置將及增武臣一員遣蘇頌等賀遼主生辰正旦甲辰詔侍從臺諫監司各舉文臣有才行者一人九月庚戌詔河決害民田所屬州縣疏瀹仍蠲其稅老幼疾病者振之乙卯詔諸傳宣內批面諭事無法守並從中書樞密覆奏其祈恩澤規免罪者劾之辛酉詔鎮戎德順軍各置都監一員癸酉立義倉甲戌宗朴兼侍中封濮陽郡王冬十月戊寅朔宗朴薨癸巳昭化軍節度使宗誼封濮國公詔濮王子以次襲封奉祀戊戌太子太師張卒十一月庚午以西蕃邈川首領董都首領青宜結鬼章為廓州刺史阿令骨為松州刺史甲戌祀天地于圜丘赦天下十二月丁丑朔占城國獻馴象壬午詔改明年為元豐甲申以郊祀文武官加恩丁亥封子傭為均國公辛丑遼遣耶律孝淳等來賀正旦元豐元年春正月乙卯以王安石為尚書左僕射舒國公集禧觀使戊午命詳定郊廟禮儀詔減陳留捧日天武等軍剩員庚申御宣德門召從臣觀燈乙丑以太皇太后疾驛召天下醫者閏月辛巳以翰林侍讀學士寶文閣學士提點中太一宮呂公著兼端明殿學士己丑詔贈尚書令韓琦依趙普故事壬辰樞密直學士孫固同知樞密院事己亥太傅兼侍中曾公亮薨庚子日中有黑子癸卯以公亮配饗英宗廟庭二月庚戌濮國公宗誼薨甲寅以雍州觀察使宗暉為淮康軍節度使封濮國公戊辰詔赦安南戰棹都監楊從先等仍論功行賞三月辛巳慮囚降死罪一等杖以下釋之御邇英閣沈季長進講周禮八法癸未詔內外文武官各舉堪應武舉一人廣南西路經略司乞教閲峒丁從之乙未御崇政殿閲諸軍辰沅徭賊寇邊州兵擊走之夏四月己酉遼遣耶律永寧等來賀同天節丙辰詔增置兩浙路提舉官庚申詔除九經外餘書不得出界癸亥太白晝見乙丑封虢國公宗諤為豫章郡王戊辰塞曹村決河名其掃曰靈平五月甲戌朔賜塞河役死家錢乙亥詔試中刑法官以次推恩六月癸卯朔日有食之乙巳詔以靈平功遷太常博士苗師中等各一官秋七月癸酉朔命西上閣門使忠州團練使韓存寶經制瀘州納溪夷己亥詔齊州預備水災辛丑夔州言甘露降八月癸卯西邊將訥兒溫祿尊謀反伏誅丁未詔河北被水者蠲其租甲寅遣黃履等賀遼主生辰正旦戊午以韓絳為建雄軍節度使己巳詔濱棣滄三州被水民以常平糧貸之庚午詔青齊淄三州給流民食九月癸酉交址來貢癸未李乾德表乞還廣源等州詔不許乙酉以端明殿學士呂公著樞密直學士薛向並同知樞密院事詔祀天地及配帝並用特牲是月武康軍嘉禾生河中府甘露降冬十月庚戌定秋試諸軍賞格侍禁仵全死事録其弟宣為三班借職辛亥韓存寶破瀘夷後城十有三囤癸亥于闐來貢十一月己丑命龍圖閣直學士宋敏求等詳定正旦御殿儀注癸巳辰州徭賊叛詔沅州兵討之己亥罷文武臣號是月梁縣嘉禾生十二月丙午日中有黑子凡十二日辛亥録囚降死罪一等杖以下釋之丙辰詔青州民王贇以復父讎免死刺配鄰州戊午置大理寺獄己未詔罷都大提舉在京諸司庫務司甲子以婉儀邢氏為賢妃詔罷三司推勘公事官減軍器監勾當公事審官東院流內銓及將作監三班院主簿左右軍巡判官丙寅遼遣耶律隆等來賀正旦二年春正月乙亥罷岢嵐火山軍市馬丙子詔立高麗交易法壬午以容州管內觀察使上柱國南陽郡開國公楊遂為寧遠軍節度使癸未詔知沅州謝麟督捕徭賊甲申御宣德門觀燈丁亥詔以經義論試宗室甲午京兆府學教授蔣夔乞以十哲從祀孔子從之詔辰州浦縣置龍潭堡是月潁州壽州甘露降二月甲寅詔瘞漢州暴骸日中有黑子乙卯以瀘州夷乞弟犯邊詔王光祖等討之丙辰詔定解鹽歲額乙丑滄州饑發倉粟振之三月庚午朔董遣使來貢辛未詔給地葬畿內寄菆之喪無所歸者官瘞之庚辰親試禮部進士壬午試特奏名進士及武舉癸未試諸科明法賜董緡錢銀帛對衣金帶等物丙戌詔雄州兩輸戶南徙者諭令復業庚寅疏汴洛夏四月辛丑幸金明池觀水嬉宴射瓊林苑甲辰遼遣蕭晟等來賀同天節丁巳陳升之以檢校太尉依前同中書門下平章事鎮江軍節度使上柱國秀國公致仕己未陳升之卒癸亥定正旦御殿儀甲子詔增審刑院詳議詳斷官罷刑部檢法官是月南康軍甘露降眉州生瑞竹五月丙子順州蠻叛峒兵討平之庚辰詔以濮安懿王三夫人並稱王夫人祔濮園辛巳太子太師致仕趙概上所集諫林甲申元絳罷知亳州乙酉詔安南軍死事孤寡廩給之戊子御史中丞蔡確參知政事六月甲辰廣西捕斬儂智春執其妻子以獻戊申命蔡確參定編修傳法寶録癸丑詔五路帥臣副總管軍臣僚各舉任將領及大使臣者二人甲寅清汴成辛酉詔鎮寧軍節度使魏國公宗懿追封舒王是月南康軍甘露降忠州雨豆秋七月甲戌張方平以太子少師致仕戊寅詳定朝會儀己卯命中書句考四方詔獄庚辰以淮康軍節度使宗暉同中書門下平章事丁亥詳定郊廟禮儀是月陳州芝草生南賓縣雨豆瓊州甘露降八月丙申朔夏人寇綏德城都監李浦敗之辛丑分涇原路兵為十一將壬寅復八作司為東西兩司各置監官文臣一員武臣二員遣李清臣等賀遼主生辰正旦甲寅詔增太學生舍為八十齊齊三十人外舍生二千人內舍生三百人月一私試歲一公試補內舍生間歲一舍試補上舍生以潁州為順昌軍節度是月曹州生瑞穀河陽生芝草九月癸未降順昌軍囚罪一等徒以下釋之甲申西南龍蕃來貢丁亥大宴集英殿己丑進婕妤朱氏為昭容壬辰出馬步射格鬬法頒諸軍甲午西南羅蕃方蕃來貢冬十月丙申西南石蕃來貢癸卯置籍田令詔立水居船戶五戶至十戶為一甲戊申交址歸所掠民詔以順州賜之己酉太皇太后疾上不視事庚戌罷朝謁景靈宮命輔臣禱于天地宗廟社稷減天下囚死罪一等流以下釋之乙卯太皇太后崩戊午詔易太皇太后園陵曰山陵辛酉以羣臣七上表始聽政命王圭為山陵使十一月癸未始御崇政殿丁亥雨土十二月乙巳御史中丞李定上國子監敕式令並學令凡百四十條丙午復置御史六察庚申遼遣蕭寧等來賀正旦是月全州芝草生桂州甘露降
