body:
  text: 宋史卷二百志第一百五十三刑法二律令者有司之所守也太祖以來其所自斷則輕重取舍有法外之意焉然其末流之弊專用己私以亂祖宗之成憲者多矣乾德伐蜀之役有軍大校割民妻乳而殺之太祖召至闕數其罪近臣營求頗切帝曰朕興師伐罪婦人何辜而殘忍至此遂斬之時郡縣吏承五季之習黷貨厲民故尤嚴貪墨之罪開寶四年王元吉守英州月餘受贓七十餘萬帝以嶺表初平欲懲掊克之吏特詔棄市陝州民范義超周顯德中以私怨殺同里常古真家十二口古真小子留留幸脫走至是擒義超訴有司陝州奏引赦當原帝曰豈有殺一家十二人可以赦論邪命正其罪八年有司言自三年至今詔所貸死罪凡四千一百八人帝注意刑辟哀矜無辜嘗嘆曰堯舜之時四凶之罪止於投竄先王用刑蓋不獲已何近代憲網之密耶故自開寶以來犯大辟非情理深害者多得貸死太平興國六年自春涉夏不雨太宗意獄訟寃濫會歸德節度推官李承信因市蔥笞園戶病創死帝聞之坐承信棄市初太祖嘗決繫囚多得寬貸而開封婦人殺其夫前室子當徒二年帝以其凶虐殘忍特處死至是有涇州安定婦人怒夫前妻之子婦絶其吭而殺之乃下詔曰自今繼母殺傷夫前妻子及姑殺婦者同凡人論雍熙元年開封寡婦劉使婢詣府訴其夫前室子王元吉毒己將死右軍巡推不得實移左軍巡掠治元吉自誣伏俄劉死及府中慮囚移司録司案問頗得其侵誣之狀纍月未決府白于上以其毒無顯狀令免死決徒元吉妻張擊登聞鼓稱寃帝召問張盡得其狀立遣中使捕元推官吏御史鞫問乃劉有姦狀慚悸成疾懼其子發覺而誣之推官及左右軍巡使等削任降秩醫工詐稱被毒劉母弟欺隱王氏財物及推吏受贓者並流海島餘決罰有差司録主吏賞緡錢賜束帛初元吉之繫左軍巡卒繫縛搒治謂之鼠彈箏極其慘毒帝令以其法縛獄卒宛轉號叫求速死及解縛兩手良久不能動帝謂宰相曰京邑之內乃復寃酷如此况四方乎端拱間虜犯邊郡北面部署言文安大城二縣監軍段重誨等棄城遁請論以軍法帝遣中使就斬之既行謂曰此得非所管州軍召之邪往訊之乃決使至果訊得乾寧牒令部送民入居城非擅離所部遽釋之咸平間有三司軍將趙永昌者素凶暴督運江南多為姦贓知饒州韓昌齡廉得其狀乃移轉運使馮亮坐決杖停職遂撾登聞鼓訟昌齡與亮訕謗朝政仍偽刻印作亮等求解之狀真宗察其詐於便殿自臨訊永昌屈伏遂斬之釋亮不問而昌齡以他事貶郢州團練副使曹州民蘇莊蓄兵器匿亡命豪奪民産積贓計四十萬御史臺請籍其家帝曰暴橫之民國有常法籍之斯過也論如律其縱捨輕重必當於義多類此凡歲飢強民相率持杖劫人倉廩法應棄市每具獄上聞輒貸其死真宗時蔡州民三百一十八人有罪皆當死知州張榮推官江嗣宗議取為首者杖脊餘悉論杖罪帝下詔褒之遣使巡撫諸道因諭之曰平民艱食強取餱糧以圖活命爾不可從盜法科之天聖初有司嘗奏盜劫米傷主仁宗曰飢劫米可哀盜傷主可疾雖然無知迫於食不足耳命貸之五年陝西旱因詔民劫倉廩非傷主者減死刺隸他州非首謀又減一等自是諸路災傷即降敕飢民為盜多蒙矜減賴以全活者甚衆司馬光時知諫院言曰臣聞敕下京東西災傷州軍如貧戶以飢偷盜斛斗因而盜財者與減等斷放臣竊以為非便周禮荒政十有二散利薄征緩刑薥力舍禁去幾率皆推寬大之恩以利於民獨於盜賊愈更嚴急蓋以飢饉之歲盜賊必多殘害良民不可不除頃年嘗見州縣官吏有不知治體務為小仁遇凶年劫盜斛斗輒寬縱之則盜賊公行更相劫奪鄉村大擾不免廣有收捕重加刑辟或死或流然後稍定今若朝廷明降敕文豫言與減等斷放是勸民為盜也百姓乏食當輕徭薄賦開倉振貸以救其死不當使之自相劫奪今歲府界京東京西水災極多嚴刑峻法以除盜賊猶恐春冬之交飢民嘯聚不可禁禦又况降敕以勸之臣恐國家始於寬仁而終於酷暴意在活人而殺人更多也事報聞帝嘗御邇英閣經筵講周禮大荒大札薄征緩刑楊安國曰緩刑者乃過誤之民耳當歲歉則赦之憫其窮也今衆持兵杖劫糧廩一切寬之恐不足以禁姦帝曰不然天下皆吾赤子也一遇飢饉州縣不能振恤飢莩所迫遂至為盜又捕而殺之不亦甚乎仁宗聽斷尤以忠厚為主隴安縣民誣平民五人為劫盜尉悉執之一人掠死四人遂引服其家辨于州州不為理悉論死未幾秦州捕得真盜隴州吏當坐法而會赦帝怒特貶知州孫濟為雷州參軍餘皆除名流嶺南賜錢粟五家復其役三年因下詔戒敕州縣廣州司理參軍陳仲約誤入人死有司當仲約公罪應贖帝謂審刑院張揆曰死者不可復生而獄吏雖廢復得官命特治之會赦勿用尚書比部員外郎師仲説請老自言恩得任子帝以仲説嘗失入人死罪不與其重人命如此時近臣有罪多不下吏劾實不付有司議法諫官王贄言情有輕重理分故失而一切出於聖斷前後差異有傷政體刑法之官安所用哉請自今悉付有司正以法詔可近臣間有干請輒為言官所斥諫官陳升之嘗言有司斷獄或事連權幸多以中旨釋之請有緣中旨得釋者劾其干請之罪以違制論許之仁宗於賞罰無所私尤不以貴近廢法屢戒有司被內降者執奏毋輒行未嘗屈法以自徇也知虢州周日宣詭奏水災有司論請如上書不實法帝曰州郡多言符瑞至水旱之災或抑而不聞今守臣自陳墊溺官私廬舍意實在民何可加罪英宗在位日淺於政令未及有所更制然以吏習平安慢於奉法稍欲振起其怠惰三班奉職和欽貸所部綱錢至絞帝命貸死免杖刺隸福建路牢城知審刑院盧士宗請稍寬其罪帝曰刑故而得寬則死者滋衆非刑期無刑之道俟有過誤貸無傷也富國倉監官受米濕惡壞十八萬石會恩當減帝特命奪官停之熙寧二年內殿崇班鄭從易母兄俱亡於嶺外歲餘方知請行服神宗曰父母在遠當朝夕為念經時無安否之問以至踰年不知存亡邪特除名勒停四年王存立言嘉祐中同學究出身為碭山縣尉嘗納官贖父配隸罪請同舉人法得免丁徭帝憫之復賜出身仍與注官九年知桂州沈起欲經略交趾取其慈恩州交人遂破欽犯雍管詔邊人橫遭屠戮職其致寇罪悉在起特削官爵編置遠惡州復讎後世無法仁宗時單州民劉玉父為王德毆死德更赦玉私殺德以復父讎帝義之決杖編管元豐元年青州民王贇父為人毆死贇幼未能復讎幾冠刺讎斷支首祭父墓自首論當斬帝以殺讎祭父又自歸罪其情可矜詔貸死刺配鄰州宣州民葉元有同居兄亂其妻縊殺之又殺兄子強其父與嫂為約契不訟鄰里發其事州為上請帝曰罪人以死姦亂之事特出葉元之口不足以定罪且下民雖無知固宜哀矜然以妻子之愛既罔其父又殺其兄戕其姪逆理敗倫宜以毆兄至死律論紹聖以來連起黨獄忠良屏斥國以空虛徽宗嗣位外事耳目之玩內窮聲色之欲徵發亡度號令靡常於是蔡京王黼之屬得以誣上行私變亂法制崇寧五年詔曰出令制法重輕豫奪在上比降特旨處分而三省引用敕令以為妨礙沮抑不行是以有司之常守格人主之威福夫擅殺生之謂王能利害之謂王何格令之有臣強之漸不可不戒自今應有特旨處分間有利害明具論奏虛心以聽如或以常法沮格不行以大不恭論明年詔凡御筆斷罪不許詣尚書省陳訴如違並以違御筆論又定令凡應承受御筆官府稽滯一時杖一百一日徒二年二日加一等罪止流三千里三日以大不恭論由是吏因緣為姦用法巧文寖深無復祖宗忠厚之志窮極奢侈以竭民力自速禍機靖康雖知悔悟稍誅姦惡而謀國匪人終亦末如之何矣高宗性仁柔其於用法每從寬厚罪有過貸而未嘗過殺知常州周嵵擅殺人帝曰朕日親聽斷豈不能任情誅僇顧非理耳即命削嵵籍大理率以儒臣用法平允者為之獄官入對即以慘酷為戒臺臣士曹有所平反輒與之轉官每臨軒慮囚未嘗有送下者曰吾恐有司觀望鍛鍊以為重輕也吏部員外郎劉大中奉使江南回遷左司諫帝尋以為祕書少監謂宰臣朱勝非曰大中奉使頗多興獄今使為諫官恐四方觀望耳其用心忠厚如此後詔用刑慘酷責降之人勿堂除及親民止與遠小監當差遣當建紹間天下盜起往往攻城屠邑至興師以討之然得貸亦衆同知樞密院事李回嘗奏強盜之數帝曰皆吾赤子也豈可一一誅之誅其渠魁三兩人足矣至待貪吏則極嚴應受贓者不許堂除及親民犯枉法自盜者籍其名中書罪至徒即不至死者籍其資諸文臣寄祿官並帶左右字贓罪人則去之是年申嚴真決贓吏法令三省取具祖宗故事有以舊法棄市事上者帝曰何至爾耶但斷遣之足矣貪吏害民雜用刑威有不得已然豈忍置縉紳於死地邪在徽宗時刑法已峻雖嘗裁定笞杖之制而有司猶從重比中興之初詔用政和遞減法自是迄嘉定不易自蔡京當國凡所請御筆以壞正法者悉釐正之諸獄具令當職官依式檢校枷以乾木為之輕重長短刻識其上笞杖不得留節目亦不得釘飾及加筋膠之類仍用官給火印暑月每五日一洗濯枷杻刑寺輪官一員躬親監視諸獄司並旬申禁狀品官命婦在禁別具單狀合奏案者具情款招伏奏聞法司朱書檢坐條例推司録問檢法官吏姓名于後各州每年開收編配羈管奴婢人及斷過編配之數各置籍各路提點刑獄司歲具本路州軍斷過大辟申刑部諸州申提刑司其應書禁曆而不書應申所屬而不申奏案不依式檢坐開具違令回報不圓致妨詳覆與提刑司詳覆大辟而稽留失覆大辟致罪有出入者各抵罪知州兼統兵者非出師臨陳毋用重刑州縣月具繫囚存亡之數申提刑司歲終比較死囚最多者當職官黜責其最少者褒賞之舊以絹計贓者千三百為一匹竊盜至二貫者徒至是又加優減以二千為一匹盜至三貫者徒一年三年復詔以三千為一匹竊盜及凡以錢定罪遞增五分四年又詔特旨處死情法不當者許大理寺奏審五年歲終比較宣州衢州福州無病死囚當職官各轉一官舒州病死及一分惠州二分六釐當職官各降一官六年令刑部體量公事邵州廣州高州勘命官淹係至久不報詔知州降一官當職官展二年磨勘當行吏永不收德慶府勘封川縣令事七月不報詔知州勘官各抵罪九年大理寺朱伯文廣西催斷刑獄還言雷州海賊兩獄並係平人七人內五人已死帝惻然詔本路提刑以下重致罰十二年御史臺點檢錢塘仁和縣獄具錢塘大杖一多五錢半仁和枷一多一斤一輕半斤詔縣官各降一官十三年詔禁囚無供飯者臨安日支錢二十文外路十五文十六年詔諸鞫獄追到干證人無罪遣還者每程給米一升半錢十五文二十一年詔官支病囚藥物錢舊法刑部郎官四人分左右廳或以詳覆或以雪同僚而異事有防間考覆之意南渡以來務從簡省大理少卿止一員刑部郎中初無分異獄有不得其情法有不當於理者無所平反追改二十六年右司郎中汪應辰言之詔刑部郎官依元豐法分左右廳治事二十七年詔四川以錢引科罪者準銅錢孝宗究心庶獄每歲臨軒慮囚率先數日令有司進款案披閲然後決遣法司更定律令必親為訂正之丞相趙雄上淳熙條法事類帝讀至收騾馬舟船契書稅曰恐後世有算及舟車之譏戶令戶絶之家許給其家三千貫及二萬貫者取旨帝曰其家不幸而絶及二萬貫乃取之是有心利其財也又捕亡律公人不獲盜者罰金帝曰罰金而不加罪是使之受財縱盜也又監司知州無額上供者賞帝曰上供既無額是白取於民也可賞以誘之乎並令削去之其明審如此且於用刑未嘗以私廢法鎮江都統戚方以刻剝被罪宰臣陳俊卿言內臣有主之者帝曰朕亦聞之乃以內侍陳瑜李宗回等付大理獄究其賂狀獄成決配之乾道二年下詔曰獄重事也用法一傾則民無所措手足比年以來治獄之吏巧持多端隨意輕重之朕甚患焉其自今革玩習之弊明審克之公使姦不容情罰必當罪用迪於刑之中勉之哉毋忽三年詔曰獄重事也稽者有律當者有比疑者有讞比年顧以獄情白於執政探取旨意以為輕重甚亡謂也自今其祗乃心敬於刑惟當為貴毋習前非不如吾詔吾將大置於罰罔攸赦六年詔以絹計贓者更增一貫以四千為一匹議者又言犯盜以敕計錢定罪以律計絹今律以絹定罪者遞增一千敕內以錢定罪亦合例增一千從之臨安府左右司理府院三獄杖直獄子以無所給至為無籍七年詔人月給錢十貫米六斗每院止許置一十二人時州縣獄禁淹延八年詔徒以上罪入禁三月者提刑司類申刑部置籍立限以督之其後又詔中書置禁奏取會籍大臣按閲以察刑寺稽違與夫不應問難而問難不應會而會者淳熙初浙西提刑鄭興裔上檢驗格目詔頒之諸路提刑司凡檢覆必給三本一申所屬一申本司一給被害之家紹興法鞫獄官推勘不得實故有不當者一案坐之乾道法又恐有移替事故者即致淹延乃令先決罪人不當官吏案後收坐至是所司請更定死罪依紹興法餘依乾道施行從之其後有司以覆勘不同則前官有失入之罪往往雷同前勘帝知其弊十四年詔特免一案推結一次於是小大之獄多得其情二廣州軍獄吏畏憲司點檢送勘之害凡有重囚多斃於獄臣僚以為請乃詔二廣提刑司詳覆公事若小節不完不須追逮獄吏委本州究實保明遇有死者必根究其所以致死三衙及江上諸軍各有推獄謂之後司獄成決于主帥不經屬官故軍吏多受財為姦光宗時乃詔通曉條制屬官兼管之廣東路瘴癘惟英德府為最甚謂之人間生地獄諸司公事欲速成者多送之自非死罪至即誣伏亟就刑責以出五年臣僚言之詔本路諸司公事應送別州者無送英德府至寧宗時刑獄滋濫嘉泰初天下上死案一全年千八百一十一人而斷死者才一百八十一人餘皆貸之乃詔諸憲臺歲終檢舉州軍有獄空並禁人少者申省取旨嘉定四年詔以絹計贓定罪者江北鐵錢依四川法二當銅錢一江西提刑徐似道言檢驗官指輕作重以有為無差訛交互以故吏姦出入人罪乞以湖南正背人形隨格目給下令於傷損去處依樣朱紅書畫唱喝傷痕衆無異詞然後署押詔從之頒之天下五年詔三衙及江上四川諸軍以武舉人主管後司公事理宗起自民間具知刑獄之弊初即位即詔天下恤刑又親制審刑銘以警有位每歲大暑必臨軒慮囚自謀殺故殺鬥殺已殺人者偽造符印會子放火官員犯入己贓將校軍人犯枉法外自餘死罪情輕者降從流流降從徒徒從杖杖已下釋之大寒慮囚及祈晴祈雪及災祥亦如之有一歲凡數疏決者後以建康亦先朝駐蹕之地罪人亦得視臨安減降之法帝之用刑可謂極厚矣而天下之獄不勝其酷每歲冬夏詔提刑行郡決囚提刑憚行悉委倅二倅二不行復委幕屬所委之人類皆肆行威福以要餽遺監司郡守擅作威福意所欲黥則令入其當黥之由意所欲殺則令證其當死之罪呼喝吏卒嚴限日時監勒招承催促結款而又擅置獄具非法殘民或斷薪為杖掊擊手足名曰掉柴或木索並施夾兩脰名曰夾幫或纏繩於首加以木楔名曰腦箍或反縛跪地短豎堅木交辮兩股令獄卒跳躍於上謂之超棍痛深骨髓幾於殞命富貴之家稍有動籍其資又以趁辦月樁及添助版帳為名不問罪之輕重並從科罰大率官取其十吏漁其百諸重刑皆申提刑司詳覆或具案奏裁即無州縣專殺之理往往殺之而待罪法無拘鎖之條特州縣一時彈壓盜賊姦暴罪不至配者故拘鎖之俾之省愆或一月兩月或一季半年雖永鎖者亦有期限有口食是時州縣殘忍拘鎖者竟無限日不支口食淹滯囚係死而後已又以己私摧折手足拘鎖尉寨亦有豪強賂吏羅織平民而囚殺之甚至戶婚詞訟亦皆收禁有飲食不充飢餓而死者有無力請求吏卒凌虐而死者有為兩詞賂遺苦楚而死者懼其發覺先以病申名曰監醫實則已死名曰病死實則殺之至度宗時雖纍詔切責而禁止之終莫能勝而國亡矣詔獄本以糾大姦慝故其事不常見初羣臣犯法體大者多下御史臺獄小則開封府大理寺鞫治焉神宗以來凡一時承詔置推者謂之制勘院事出中書則曰推勘院獄已乃罷熙寧二年命尚書都官郎中沈衡鞫前知杭州祖無擇于秀州內侍乘驛追逮御史張戩等言無擇三朝近侍而驟繫囹圄非朝廷以廉恥風厲臣下之意請免其就獄止就審問不從又命崇文院校書張載鞫前知明州光祿卿苗振于越州獄成無擇坐貸官錢及借公使酒謫忠正軍節度副使振坐故入裴士堯罪及所為不法謫復州團練副使獄半年乃決辭所連逮官吏坐勒停衝替編管又十餘人皆御史王子韶啓其事自是詔獄屢興其悖于法及國體所繫者著之其餘不足紀也八年沂州民朱唐告前餘姚主簿李逢謀反提點刑獄王庭筠言其無迹但謗讟語涉指斥及妄説休咎請編配帝疑之遣御史臺推直官蹇周輔劾治中書以庭筠所奏不當並劾之庭筠懼自縊死逢辭連宗室秀州團練使世居醫官劉育等河中府觀察推官徐革詔捕繫臺獄命中丞鄧綰同知諫院范百祿與御史徐禧雜治獄具賜世居死李逢劉育及徐革並凌遲處死將作監主簿張靖武進士郝士宣皆腰斬司天監學生秦彪百姓李士寧杖脊並湖南編管餘連逮者追官落職世居子孫貸死除名削屬籍舊勘鞫官吏並劾罪李士寧者挾術出入貴人門常見世居母康以仁宗御製詩上之百祿謂士寧熒惑世居致不軌且疑知其逆謀推問不服禧乃奏士寧贈詩實仁宗御製今獄官以為反因臣不敢同百祿以士寧嘗與王安石善欲鍛鍊附致妖言死罪卒論士寧徒罪而奏禧故出之以媚大臣詔詳劾理曲者以聞百祿坐報上不實落職若凌遲腰斬之法熙寧以前未嘗用於元凶巨𢀿而自是以口語狂悖致罪者麗于極法矣蓋詔獄之興始由柄國之臣藉此以威縉紳逞其私憾朋黨之禍遂起流毒不已紹聖間章惇蔡卞用事既再追貶呂公著司馬光及謫呂大防等嶺外意猶未快仍用黃履疏高士京狀追貶王圭皆誣以圖危上躬其言寖及宣仁上頗惑之最後起同文館獄將悉誅元祐舊臣時太府寺主簿蔡渭奏臣叔父碩嘗於邢恕處見文及甫元祐中所寄恕書具述姦臣大逆不道之謀及甫彥博子也必知姦狀詔翰林承旨蔡京吏部侍郎安惇同究問初及甫與恕書自謂畢禫當求外入朝之計未可必聞已逆為機穽以榛塞其塗又謂司馬昭之心路人所知又云濟之以粉昆朋類錯立欲以眇躬為甘心快意之地及甫嘗語蔡碩謂司馬昭指劉摯粉昆指韓忠彥眇躬及甫自謂蓋俗稱駙馬都尉為粉侯人以王師約故呼其父克臣為粉父忠彥乃嘉彥之兄也及甫除都司為劉摯論列又摯嘗論彥博不可除三省長官故止為平章重事及彥博致仕及甫自權侍郎以修撰守郡母喪除與恕書請補外因為躁忿詆毀之辭及置對則以昭比摯如舊眇躬乃以指上而粉昆乃謂指王巖叟面如傅粉故曰粉梁燾字况之以况為兄故曰昆斥摯將謀廢立不利於上躬京惇言事涉不順及甫止聞其父言無他證佐望別差官審問乃詔中書舍人蹇序辰審問仍差內侍一員同往蔡京安惇等共治之將大有所誅戮然卒不得其要領會星變上怒稍息然京惇極力鍛鍊不少置既而梁燾卒於化州劉摯卒於新州衆皆疑二人不得其死明年五月詔摯燾據文及甫等所供言語偶逐人皆亡不及考驗明正典刑摯燾諸子並勒停永不收先時三省進呈帝曰摯等已謫遐方朕遵祖宗遺志未嘗殺戮大臣其釋勿治初元祐更政嘗置訴理所申理寃濫元符元年中丞安惇言神宗厲精圖治明審庶獄而陛下未親政時姦臣置訴理所凡得罪熙寧元豐之間者咸為除雪歸怨先朝收恩私室乞取公案看詳從初加罪之意復依元斷施行時章惇猶豫未應蔡卞即以相公二心之言迫之惇懼即日置局命蹇序辰同安惇看詳案內文狀陳述及訴理所看詳於先朝言語不順者具名以聞自是以伸雪復改正重得罪者八百三十家及徽宗即位改正元祐訴理之人右正言陳瓘言訴理得罪自語言不順之外改正者七百餘人無罪者既蒙昭雪則看詳之官如蹇序辰安惇者安可以不加罪乎序辰與惇受大臣諷諭迎合紹述之意因謂訴理之事形迹先朝遂使紛紛不已考之公議宜正典刑會中書省亦請治惇序辰罪詔蹇序辰安惇並除名放歸田里靖康初元既戮梁方平太傅王黼責授崇信軍節度副使永州安置言者論黼欺君罔上專權怙寵𢀿財害民壞法敗國朔方之釁黼主其謀遣吏追至雍丘殺之取其首以獻仍籍其家又詔賜拱衛大夫安德軍承宣使李彥死彥根括民田奪民常産重斂租課百姓失業愁怨溢路官吏稍忤意捃托送獄多至憤死故特誅之暴少保梁師成朋比王黼之罪責彰化軍節度副使行一日追殺之臺諫極論朱勔肆行姦惡起花石綱竭百姓膏血罄州縣帑藏子姪承宣觀察者數人廝役為橫行媵妾有封號園第器用悉擬宮禁三月竄勔廣南尋賜死趙良嗣者本燕人馬植政和初童貫使遼國植邀於路説以覆宗國之策貫挾之以歸卒用其計以基南北之禍至是伏誅七月暴童貫十罪遣人即所至斬之九月言者論蔡攸興燕山之役禍及天下驕奢淫佚載籍所無詔誅攸並弟翛高宗承大亂之後治王時雍等賣國之罪洪芻余大均陳沖張卿才李彝王及之周懿文胡思文並下御史臺獄獄具刑寺論芻納景王寵姬大均納喬貴妃侍兒及之苦辱寧德皇后女弟當流沖括金銀自盜與宮人飲當絞懿文卿才彝與宮人飲卿才彝當徒懿文當杖思文於推擇張邦昌狀內添諂奉之詞罰銅十斤並該赦上閲狀大怒李綱等共解之上亦新政重於殺士大夫乃詔芻大均沖各特貸命流沙門島永不放還卿才彝及之懿文思文並以別駕安置邊郡宋齊愈下臺獄法寺以犯在五月一日赦前奏裁詔齊愈謀立異姓以危宗社非受偽命臣僚之比特不赦腰斬都市詔東京及行在官擅離任者並就本處根勘之淮寧守趙子嵩靖康末傳檄四方語頗不遜二年詔御史置獄京口鞫之情得帝不欲暴其罪以棄鎮江罪貶南雄州建炎三年四月苗傅等疾閹宦恣橫及聞王淵為樞密愈不平乃與王世修謀逆詔御史捕世修鞫之斬於市七月韓世忠執苗傅等磔之建康統制王德擅殺軍將陳彥章臺鞫當死帝以其有戰功特貸之慶遠軍節度使范瓊領兵入見面對不遜知樞密院張浚奏瓊大逆不道付大理寺鞫之獄具賜死越州守郭仲荀寇至棄城遁過行在不朝付御史臺大理寺雜治貶廣州神武軍統制魯王玉坐賊殺不辜掠良家子女帝以其有戰功貸之貶瑞州紹興元年監察御史婁寅亮陳宗社大計奏檜惡之十一月使言者論其父死匿不舉哀下大理寺劾治迄無所得詔免所居官十一年樞密使張俊使人誣張憲謂收嶽飛文字謀為變秦檜欲乘此誅飛命万俟鍛鍊成之飛賜死誅其子雲及憲于市汾州進士智浹上書訟飛寃決杖編管袁州廣西帥胡舜陟與轉運使呂源有隙源奏舜陟贓污僭擬又以書抵檜言舜陟訕笑朝政檜素惡舜陟遣大理官往治之十三年六月舜陟不服死於獄飛與舜陟死檜權愈熾屢興大獄以中異己者名曰詔獄實非詔旨也其後所謂詔獄紛紛類此故不備録云
