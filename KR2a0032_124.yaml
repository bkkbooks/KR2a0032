body:
  text: 宋史卷一百二十四志第七十七禮二十七凶禮三外國喪禮及入弔儀諸臣喪葬等儀凡外國喪告哀使至有司擇日設次於內東門之北隅命官攝太常卿及博士贊禮俟太常卿奏請即向其國而哭之五舉音而止皇帝未釋素服人使朝見不宣班不舞蹈不謝面天顏引當殿喝拜兩拜奏聖躬萬福又喝拜兩拜隨拜萬歲或增賜茶藥及傳宣撫問即出班致詞訖歸位又喝拜兩拜隨拜萬歲喝袛候退大中祥符二年十二月北朝皇太后凶訃遣使來告哀詔遣官迓之廢朝七日擇日備禮舉哀成服禮官詳定儀注以聞其日皇帝常服乘輿詣幕殿俟時釋常服服素服白羅衫黑銀帶素紗軟腳幞頭太常卿跪奏請皇帝為北朝皇太后凶訃至挂服又奏請五舉音文武百僚進名奉慰退幕殿仍遣使祭奠弔慰三年正月契丹賀正使為本國皇太后成服所司設幕次香酒及衰服絰杖等禮直官引使副已下詣位北向再拜班首詣前執盞跪奠俯伏興歸位皆再拜俟使已下俱衰服絰杖成服訖禮直官再引各依位北向舉哭盡哀班首少前去杖跪奠酒訖執杖俯伏興歸位焚紙馬皆舉哭再拜畢各還次服吉服歸驛天聖九年六月契丹使來告哀禮官詳定北朝凶訃宜於西上閣門引來使奉書令閣門使一員跪受承進宰臣樞密使已下待制已上並就都亭驛弔慰七月一日使者耶律乞石至帝與皇太后發哀苑中使者自驛赴左掖門入至左升龍門下馬入北偏門階下行至右升龍北偏門入朝堂西偏門至文德殿門上奉書太常博士二員與禮直官贊引入文德殿西偏門階下行至西上閣門外階下面北跪進書閣門使跪受承進太常博士禮直官退使者入西上閣門殿後偏門入宣祐西偏門行赴內東門柱廊中間過幕次祗候朝見訖赴崇政殿門幕次祗候朝見皇太后訖出三日近臣慰乞石于驛嘉祐三年正月契丹告國母哀使人到闕入見皇帝問云卿離北朝日姪皇帝悲苦之中聖躬萬福朝辭日即云皇帝傳語北朝姪皇帝嬸太皇太后上仙遠勞人使訃告春寒善保聖躬中書樞密以下待制已上赴驛弔慰云竊審北朝太皇太后上仙伏惟悲苦五月獻遺留物明道元年十一月二十四日敕夏王趙德明薨特輟朝三日令司天監定舉哀挂服日辰其日乘輿至幕殿服素服太常博士引太常卿當御坐前跪奏請皇帝為夏王趙德明薨舉哀又奏請十五舉音又奏請可止文武百僚進名奉慰告哀使副已下朝見首領並從人作兩班見先首領見兩拜後班首奏聖躬萬福又兩拜隨拜萬歲喝賜例物酒食跪受起又兩拜隨拜萬歲喝各袛候退從人儀同是日皇太后至幕殿釋常服白羅大袖白羅大帶舉哀如皇帝儀其遣使致祭弔慰如契丹其入弔奠之儀乾興元年真宗之喪契丹遣殿前都點檢崇義軍節度使耶律三隱翰林學士工部侍郎知制誥馬貽謀充大行皇帝祭奠使副左林牙左金吾衛上將軍蕭日新利州觀察使馮延休充皇太后弔慰使副右金吾衛上將軍耶律寧引進使姚居信充皇帝弔慰使副所司預於滋福殿設大行皇帝神御坐又於稍東設御坐祭奠弔慰使副並素服由西上閣門入陳禮物於庭中書門下樞密院並立於殿下再拜訖升殿分東西立禮直官閣門舍人贊引耶律三隱等詣神御坐前階下俟殿上簾捲使副等並舉哭殿上皆哭再拜訖引升殿西階詣神御坐前上香奠茶酒貽謀跪讀祭文畢降階復位又舉哭再拜訖稍東立俟皇太后升坐中書樞密院起居畢簾外侍立舍人引弔慰祭奠使副朝見殿上舉哭左右皆哭弔慰使副蕭日新等升殿進書訖降坐俟皇帝升坐中書樞密院起居畢升殿侍立舍人引弔慰祭奠使副朝見皇帝舉哭左右皆哭弔慰使副耶律寧等升殿進書訖賜三隱等襲衣冠帶器幣鞍馬隨行舍利牙校等衣服銀帶器幣有差弔慰使副蕭日新等復詣承明殿俟皇太后升坐中書樞密院侍立如儀舍人引蕭日新等升殿進問聖候書畢賜銀器衣著有差仍就客省賜三隱等茶酒又令樞密副使張士遜別會三隱等伴宴於都亭驛英宗即位契丹使來賀乾元節命先進書奠梓宮見于東階放夏國使人見客省以書幣入後弔慰使見殿門外契丹祭奠使見于皇儀殿東廂羣臣慰于門外使人辭于紫宸殿命坐賜茶故事賜酒五行自是終諒暗皆賜茶神宗之喪夏國陳慰使丁努嵬名謨鐸副使呂則陳聿精等進慰表于皇儀門外退赴紫宸殿門賜帛有差元祐初高麗入貢有太皇太后表及進奉物樞密院請遵故事惟答以皇帝回諭敕書已而宣仁聖烈太后崩禮部太常閣門同詳定高麗奉慰使人於小祥前後到闕令於紫宸殿門見客省受表以進賜器物酒饌退並常服黑帶不佩魚候見罷純吉服淳熙十四年金國弔祭使到闕惟皇帝先詣梓宮行燒香禮及使入門祭訖皆就幄舉哭外陳設行事並如先朝舊儀其奉辭日有司亦先設神御坐及設香案茶酒果食盤臺於几筵殿上宰執升殿分東西立侍從官於殿下西面立使副入門殿上下皆哭使副升殿哭止使副詣神坐前一拜上香奠茶三奠酒畢拜興讀祭文官跪讀祭文一拜興殿上下皆哭使副俱降歸位立又再拜訖退諸臣之喪國制諸王公主宗室將軍以上有疾皆乘輿臨問如小疾在家或幸其第有至三四者其宮邸在禁中多不時而往惟宰相使相駙馬都尉疾亟幸其第或賜勞加禮焉建隆元年七月宰相范質有疾太祖親幸其第賜黃金銀絹有差開寶二年趙普有疾帝再往視賜銀器絹甚厚太平興國中鎮寧軍節度楊信久病瘖忽能言帝異之遽幸其第加賜賚大中祥符三年三月鎮安軍節度使駙馬都尉石保吉疾亟帝將臨視之其日大忌宰相言於禮非便遂遣內侍以諭保吉明日始臨省焉六月幸翰林侍講學士邢昺第視疾賜白金千兩衣著千匹名藥一奩熙寧七年十二月詔頒新式凡臨幸問疾者賜銀絹宰臣及樞密使帶使相者二千五百兩匹樞密使使相二千兩匹知樞密院事參知政事樞密副使同知樞密院事一千五百兩匹簽書樞密院事同簽書樞密院事宣徽使七百五十兩匹殿前都指揮使一千五百兩匹駙馬都尉任使相以下者二千五百兩匹任節度觀察留後以下者一千五百兩匹並入內內侍省取賜車駕臨奠太常新禮宰相樞密宣徽使參知政事樞密副使駙馬都尉薨皆臨幸奠酹及發引乘輿或再往咸平二年工部侍郎樞密副使楊礪卒即日冒雨臨其喪大中祥符元年殿前都虞候端州防禦使李繼和卒真宗將臨其喪以問宰臣對曰繼和以品秩實無此禮陛下敦序外族先朝亦嘗臨杜審瓊之喪於禮無嫌帝然之即日幸其第康定二年右正言知制誥吳育奏臣竊見車駕每有臨奠臣僚宗戚之家皆即時出幸道路不戒羽衛不全從官奔馳衆目驚異萬乘法駕豈慎重之意乎雖震悼方切於皇慈而舉動貴合乎經禮臣竊詳通禮舊儀蓋俟喪家成服然後臨奠於事不迫在禮亦宜臣愚欲乞今後車駕如有臨奠去處乞俟本家既斂成服然後出幸則恩意容典詳而得中警蹕羽儀備之有素事下禮官議遭喪之家有出殯日乃成服者恐至時難行臨奠請自今聖駕臨奠臣僚宗戚之家若奏訃在交未前即傳宣閣門只於當日令所屬候儀衛備奏請車駕出幸若奏訃在交未後即次日臨奠庶使羽衛整肅於事為宜詔可其儀乘輿自內出千牛將軍四人執戈一人執桃一人執茢前導車駕將至所幸之第贊禮者引喪主哭於大門內望見乘輿止哭再拜立於庭皇帝至幕殿改素服就臨喪主內外再拜皇帝哭十五舉音喪主內外皆哭皇帝詣祭所三奠酒喪主已下再拜皇帝退止哭從官進名奉慰皇帝改常服還內通禮著皇帝臨諸王妃主外祖父母皇后父母宗戚貴臣等喪出宮服常服至所臨處變服素服天聖喪葬令皇帝臨臣之喪一品服錫衰三品已上緦衰四品已下疑衰皇太子臨弔三師三少則錫衰宮臣四品已下緦衰五品已下疑衰輟朝之制禮院例册文武官一品二品喪輟視朝二日於便殿舉哀挂服文武官三品喪輟視朝一日不舉哀挂服然其車駕臨問並特輟朝日數各繫聖恩一品二品喪皆以翰林學士已下為監護葬事以內侍都知已下為同監護葬事葬日輟視朝一日皆取旨後行慶曆五年四月禮院奏準度支員外郎集賢校理知院曾公亮奏朝廷行輟朝禮並乞以聞哀之明日輟朝其假日便以充數仍為永例如值其日前殿須坐則禮有重輕自可略輕而為重更不行輟朝之禮臣今看詳公亮所奏誠於輟朝之間適宜順變然慮君臣恩禮之情有所未盡欲乞除人使見辭春秋二宴合當舉樂即於次日輟朝餘乞依公亮所奏詔可太平興國六年守司空兼門下侍郎平章事薛居正薨準禮一品喪合輟二日詔特輟三日其後鄧王錢俶太師趙普右僕射李沆薨皆一品合輟二日詔並特輟五日二品三品者亦有特輟焉太平興國九年右諫議大夫參知政事李穆卒準禮諫議大夫不合輟朝特輟一日開寶二年羅彥瓌魏仁浦薨以郊祀及軍事不輟朝景德四年同平章事王顯薨以皇帝朝拜諸陵吉凶難於相干更不輟朝康定元年光祿卿鄭立卒禮官舉故事輟朝臺官言卿監職任疏遠恩禮不稱自後遂不輟朝孝宗乾道三年四月一日太常寺言皇伯母秀王夫人薨輟朝五日內二日不視事乞自今月二日為始輟朝至六日止其二日三日並不視事從之舉哀挂服尚舍設次於廣德殿或講武殿大明殿其後皆於後苑壬地前一日所司預設舉哀所幕殿周以簾帷色用青素其日皇帝常服乘輿詣幕殿侍臣奏請降輿俟時釋常服服素服白羅衫黑銀腰帶素紗軟腳幞頭太常博士引太常卿當御坐前跪奏請皇帝為某官薨舉哀又請舉哭十五舉音又奏請可止中書門下文武百官進名於崇政殿門外奉慰皇帝釋素服服常服乘輿還內建隆四年山南東道節度使慕容延釗卒太祖素服發哀其後趙普薨太宗亦如之景德元年李沆薨禮官言哀品秩雖載禮典伏緣國朝惟趙普曹彬曾行茲禮今望裁自聖恩詔特擇日舉哀自後宰臣薨皆用此禮真宗乳母秦國延壽保聖夫人卒以太宗喪始期疑舉哀禮官言通禮皇帝為乳母緦麻按喪葬令皇帝為緦一舉哀止秦國夫人保傅聖躬宜備哀榮况太宗之喪已終易月之制今為乳母發哀合於禮典從之鄭國長公主薨禮官言降服大功擇日成服緣居大行皇太后大祥之內衰服未除典禮舊章以輕包重酌情順變禮當厭降望不成服皇親諸親亦不制服帝曰宗室諸王皆不制服情所未忍至期當遣諸王就其第成服及令皇后臨奠餘如所請皇從弟右監門衛大將軍德鈞卒以皇帝恭謁陵寢罷舉哀成服天禧元年太尉王旦薨時季秋大享明堂其日發哀真宗疑之禮官言祠事在質明之前成服於既祠之後於禮無嫌詔可康定二年皇子壽國公昕薨年二歲禮官言已有爵命宜同成人遂發哀成服熙寧十年永國公薨係無服之殤詔特舉哀成服元祐元年王安石薨在神宗大祥之內司馬光薨亦在諒暗中皆不舉哀成服高宗於劉光世張俊秦檜之喪皆為臨奠然設幄舉哀成服之禮未之行也孝宗乾道三年始為皇伯母秀王夫人薨設幕殿後苑壬地舉哀成服復舉行焉皇太后皇后為本族之喪孝明皇后姊太原郡君王氏卒中書門下據太常禮院狀準禮例皇后合出就故彰德軍節度使王饒第發哀成服文武百僚詣其第進名奉慰從之章穆太后母楚國太夫人吳氏薨太常禮院言皇帝為外祖母本服小功詳開寶通禮即有舉哀成服之文又緣近儀大功以上方成服今請皇太后擇日就本宮挂服雍王以下為外祖母給假其後太后嫡母韓國太夫人薨亦用此制焉章獻明肅皇后改葬父母前一日皇后詣欑所俟時詣成服所改服緦尚儀奏請詣靈柩發哭奠酒退六宮內人立班奉慰掩壙畢皇后詣墳奠獻再拜釋服還宮外命婦進箋奉慰如儀輟樂太平興國七年十月中書言今月七日乾明節選定二十二日大宴二十日參知政事竇稱卒明日皇帝親幸其第臨喪慟哭設奠還宮即令罷宴有司奏伏以百司告備六樂在庭睿聖至仁聞哀而罷是以顯君父愛慈之道勵臣子忠孝之心伏請宣付史館傳録美實詔可天禧二年九月十一日宴近臣于長春殿餞河陽三城節度使張旻赴任以王旦在殯不舉樂嘉祐六年三月五日宰臣富弼母秦國太夫人薨十七日春宴禮院上言君臣父子家國均同元首股肱相濟成體貴賤雖異哀樂則同一人向隅滿堂嗟戚今宰臣新在苫塊欲乞罷春宴聲樂以表聖人憂恤大臣之意詔下並春宴寢罷賻贈凡近臣及帶職事官薨非詔葬者如有喪訃及遷葬皆賜賻贈鴻臚寺與入內內侍省以舊例取旨其嘗踐兩府或任近侍者多增其數絹自五百匹至五十匹錢自五十萬至五萬又賜羊酒有差其優者仍給米麥香燭自中書樞密而下至兩省五品三司三館職事內職軍校並執事禁近者亡歿及父母近親喪皆有贈賜宗室期功袒免乳母殤子及女出適者各有常數其特恩加賜者各以輕重為隆殺焉建隆元年十月詔有死于矢石者人給絹三匹仍復其家三年長吏存撫之慶曆二年詔陳亡軍校無子孫者賜其家錢指揮使七萬副指揮使六萬軍使都頭副兵馬使副都頭五萬熙寧七年參酌舊制著為新式諸臣喪兩人以上各該支賜孝贈只就數多者給官與職各該賻贈者從多給差遣權並同權發遣並與正同諸兩府使相宣徽使並前任宰臣問疾或澆奠已賜不願敕葬者並宗室不經澆奠支賜雖不係敕葬並支賻贈餘但經問疾或澆奠支賜或敕葬者更不支賻贈前兩府如澆奠只支賻贈仍加絹一百布一百羊酒米麵各一十諸支賜孝贈在京羊每口支錢一貫以折第二等絹充每匹折錢一貫三百文餘支本色在外米支白粳米麵每石支小麥五斗酒支細色餘依價錢諸文臣卿監以上武臣元係諸司使以上分司致仕身亡者其賻贈並依見任官三分中給二限百日內經所在官司投狀召命官保關申限外不給待制觀察使以上更不召保元豐五年詔鄜延路沒於王事有家屬見今在本路欲歸鄉者給賻外其大使臣以上更支行李錢百千小使臣五十千差使殿侍三十千其餘比類支給紹興二十六年詔今後命官實因幹辦公事邂逅非理致死者並遵依舊法所有李光申請於紹興條內添注日限指揮更不施行舊法非理致死者謂焚溺墜壓之類通判以上賜銀五百兩餘三百兩職司已上取旨初紹興二年五月吏部侍郎李光申明立定折跌骨五十餘日三十日內身亡之人並支前項銀數至是戶部侍郎宋貺言自立定日限後來多是因他病身故之人子孫規圖賞給計會所屬旋作差出名目陳乞保奏誠為欺罔故有是命詔葬禮院例册諸一品二品喪敕備本品鹵簿送葬者以少牢贈祭於都城外加璧束帛深青三纁二諸重一品柱鬲六五品已上四六品已下二諸銘旌三品已上長九尺五品已上八尺六品已上七尺皆書某官封姓之柩諸輀車三品已上油幰朱絲絡網施襈兩廂畫龍幰竿諸末垂六旒蘇七品已上油幰施襈兩廂畫雲氣垂四旒蘇九品已上無旒蘇庶人鱉甲車無幰襈畫飾諸引披鐸翣挽歌三品已上四引四披六鐸六翣挽歌六行三十六人四品二引二披四鐸四翣挽歌者四行十六人五品六品挽歌八人七品八品挽歌六人六品九品謂非升朝者挽歌四人其持引披者皆布幘布深衣挽歌白練幘白練衣皆執鐸綍並㙐襪諸四品已上用方相七品已上用魌頭諸纛五品已上其竿長九尺已下五尺已上諸葬不得以石為棺槨及石室其棺槨皆不得雕鏤彩畫施方牖檻棺內不得藏金寶珠玉又按會要勳戚大臣薨卒多命詔葬遣中使監護官給其費以表一時之恩凡凶儀皆有買道方相引魂車香蓋紙錢鵝毛影輿錦繡虛車大輿銘旌儀棺行幕各一挽歌十六其明器牀帳衣輿結綵牀皆不定數墳所有石羊虎望柱各二三品以上加石人二人入墳有當壙當野祖思祖明地軸十二時神志石券石鐵券各一殯前一日對靈柩及至墳所下事時皆設敕祭監葬官行禮熙寧初又著新式頒于有司乾德三年六月中書令秦國公孟昶薨其母李氏繼亡命鴻臚卿范禹稱監護喪事仍詔禮官議定吉凶儀仗禮例以聞太常禮院言檢詳故事晉天福十二年葬故魏王周廣順元年葬故樞密使楊邠侍衛使史弘肇三司使王章例並用一品禮墓方圓九十步墳高一丈八尺明器九十事石作六事音身隊二十人當壙當野祖明祖思地軸十二時神蚊廚帳暖帳各一車一挽歌三十六人拂一纛一翣六輴車魂車儀槨車買道車志石車各一方相氏鵝毛纛銘旌香輿影輿蓋輿錢輿五穀輿酒醢輿衣物輿庖牲輿各一黃白紙帳園宅象生什物行幕並志文挽歌詞啓攢啓奠祝文並請下有司修製其儀太僕寺革輅兵部本品鹵簿儀仗太常寺本品鼓吹儀仗殿中省繖一曲蓋二朱漆團扇四自第導引出城量遠近各還贈玉一纁二贈祭少牢禮料亦請下光祿太府寺少府監諸司依禮供應又楚王母依子官一品例準令文外命婦一品侍近二人青衣六人偏扇方扇各十六行鄣三坐鄣二白銅飾犢車駕牛馭人四從人十六夾車從車六繖一大扇一團扇二戟六十伏緣久不施用如特賜施行即合於孟昶吉凶仗內相參排列詔並令排列祗應仍俟導引至城外分半導至西京墳下及葬命供奉官周貽慶押奉議軍士二指揮防護至洛陽又賜子玄哲墳莊一區開寶四年建武軍節度使何繼筠卒詔遣中使護葬仍賜寶劍甲胄同葬咸平元年護國軍節度使駙馬都尉王承衍葬鹵簿鼓吹備而不作以在太宗大祥忌禁內也元豐五年崇信軍節度使華陰郡王宗旦薨聽以旌節牌印葬尋又詔不即隨葬者徒二年因而行用者罪之紹興二十四年太師清河郡王張俊葬上曰張俊極宣力與他將不同恩數務從優厚仍賜七梁額花冠貂蟬籠巾朝服一襲水銀二百兩龍腦一百五十兩其後楊存中薨孝宗令諸寺院聲鐘仍賜水銀龍腦以斂熙寧新式先是知制誥曾布言竊以朝廷親睦九族故於死喪之際臨弔賻恤至於窀穸之具皆給於縣官又擇近臣專董其事所以深致其哀榮而盡其送終之禮近世使臣沿襲故常過取饋遺故私家之費往往倍於公上祥符中患其無節嘗詔有司定其數皇祐中又著之編敕令使臣所受無過五百朝臣無過三百有違之者御史奏劾伏見比歲以來不復循守其取之者不啻十倍於著令乞取舊例裁定酌中之數以為永式詔令太常禮院詳定令布裁定以聞嘉祐七年詔大宗正自今皇親之喪五年以上未葬者不以有無尊親新喪並擇日葬之初龍圖閣直學士向傳式言故事皇親係節度使以上方許承凶營葬並卑幼喪皆隨葬之自慶曆八年後積十二年未葬者幾四百餘喪官司難於卒辦致濮王薨百日不及葬請自今兩宅遇有尊屬之喪不以官品為限而葬之下判大宗正司太常禮儀院司天監議而有是詔元祐中又詔御史臺臣僚父母無故十年不葬即依條彈奏及令吏部候限滿檢察尚有不葬父母即未得與關升磨勘如失檢察亦許彈奏追封册命通禮策贈貴臣守宮於主人大門外設使副位使人公服從朝堂受策載於犢車各備鹵簿至主人之門降車使者稱有制主人降階稽顙內外皆哭讀册訖主人拜送之國朝之制有於私第册之者有於本道册之者私第册之者乾德三年正衙命使册贈孟昶尚書令追封楚王是也本道册者建隆元年故特進檢校太師南平王高保融奉敕贈太尉端拱元年故守太師尚書令鄧王錢俶特追封秦王是也其儀與通禮大略相類不復録定諡王公及職事官三品以上薨贈官同本家録行狀上尚書省考功移太常禮院議定博士撰議考功審覆判都省集合省官參議具上中書門下宰臣判準始録奏聞敕付所司即考功録牒以未葬前賜其家省官有異議者聽具議聞蘊德丘園聲實明著雖無官爵亦奏賜諡曰先生太平興國八年詔增周公諡法五十五字美諡七十一字為一百字平諡七字為二十字惡諡十七字為三十字其沈約賀琛續廣諡盡廢後以直史館胡旦言舊制文武官臣僚皆以功行上下各賜諡法近朝以來遂成闕典建隆以來臣僚三品以上合賜諡者百餘人望令史館編録行狀送禮官定諡付館修入國史詔今後並令禮官取行狀定諡送考功詳覆關送史館永為定式直集賢院王皞言諡者行之表也善行有善諡惡行有惡諡蓋聞諡知行以為勸戒六典太常博士掌王公以下擬諡皆迹其功德為之褒貶近者臣僚薨卒雖官該擬諡其家自知父祖別無善政慮定諡之際斥其繆戾皆不請諡竊惟諡法自周公以來垂為不刊之典蓋以彰善疸惡激濁揚清使其身沒之後是非較然用為勸懲今若任其遷避則為惡者肆志而不悛乞自今後不必候其請諡並令有司舉行如此則隱慝無行之人有所沮勸若須行狀申乞方行擬諡考諸方册別無明證惟衛公叔文子卒其子戍請諡臣謂春秋之時禮壞樂闕公叔之卒有司不能明舉舊典故至將葬始請諡於君且周制太史掌小喪賜諡小史掌卿大夫之家賜諡請誄以此知有司之職自當舉行明矣詔下有司詳定如皞請焉禮院更議贈安遠軍節度使馬懷德已葬請諡乃言自古作諡皆在葬前唐開元三品以上將葬既啓殯告贈諡於柩前無贈者設啓奠即告諡既葬加諡出於唐時如顏杲卿盧奕盡忠王室當時置而不議至郭知運死五十餘年乃始請諡右司員外郎崔原以為非旌善之禮而太常博士獨孤及謂新制死不必有諡又謂有故闕禮追遠請諡順也及長於開元之世親聞啓奠告諡而謂新制不必有諡豈非誣哉又有故闕禮追遠請諡皆違禮經何順之有國家給諡一用唐令然請諡之家例供尚書省官酒食撰議官又當有所贈遺故或闕而不請景祐四年宋綬建議令官給酒食其後又罷贈遺自此既葬請諡者甚衆歲月浸久官閥行迹士大夫所不能知子孫與其門生故吏志在虛美隱惡而有司據以加諡是廢聖人之法而徇唐庸有司之議也詔自今得諡者令葬前奏請或其家不請則尚書太常合議定諡前葬牒史館及付其家即徇私諡不以實論如選舉不以實法既葬請諡者不定諡
