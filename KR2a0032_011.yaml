body:
  text: 宋史卷十一本紀第十一仁宗三慶曆元年春正月辛亥朔御大慶殿受朝己未加唃廝囉河西節度使壬申詔歲以春分祠高禖是月元昊請和二月己亥壽國公昕薨辛亥罷大宴京東西淮浙江南荊湖置宣毅軍甲辰詔臣僚受外任者毋得因臨遣祈恩丙午京師雨藥是月元昊寇渭州環慶路馬步軍副總管任福敗于好水川福及將佐軍士死者六千餘人三月庚戌朔修金隄乙卯詔止郡國舉人勿以邊機為名希求恩澤夏四月甲申以資政殿學士陳執中同陝西馬步軍都總管兼經略安撫沿邊招討等使知永興軍詔夏竦仍判永興軍乙巳下德音降陝西囚死罪一等流以下釋之特支軍士緡錢振撫邊民被鈔略者親屬五月丁巳録繫囚甲子出內藏緡錢一百萬助軍費乙丑追封皇長子為褒王賜名昉丁卯罷陝西經略安撫沿邊招討都監辛未宋庠鄭戩罷以王舉正參知政事任中師任布為樞密副使詔夏竦屯軍鄜州陳執中屯軍涇州癸酉閲試衛士六月壬辰詔陝西諸路總管司嚴邊備毋輒入賊界賊至則禦之乙巳詔近臣舉河北陝西河東知州通判縣令秋七月丙辰月掩心後星戊午月掩南斗壬戌置萬勝軍凡二十指揮是月元昊寇麟府州八月戊寅詔鄜延部署以兵援麟府甲申河北置場括市戰馬緣邊七州軍免括乙未毀潼關新置樓櫓庚子月掩歲星乙巳募民間材勇者補神捷指揮是月元昊寇金明寨破寧遠寨寨主王世亶兵馬監押王顯死之陷豐州知州王餘慶兵馬監押孫吉死之九月壬子命河東鑄大鐵錢乙亥復置義倉冬十月甲午詔罷陝西都部署分四路置使置陝西營田務己亥罷銅符木契是月修河北城池十一月壬子置涇原路強壯弓箭手丙辰發廩粟減價以濟京城民甲子朝饗景靈宮乙丑饗太廟奉慈廟丙寅祀天地于圜丘大赦改元蠲陝西來年夏稅十之二及麟府民二年賦租臣僚許立家廟功臣不限品數賜戟增天下解額弛京東八州鹽禁是月令江饒池三州鑄鐵錢十二月丙子加恩百官丁丑司天監上崇天萬年曆戊寅詔陝西四路總管及轉運使兼營田甲午置陝西護塞軍是歲湖南洞蠻知徽州楊通漢貢方物二年春正月丁巳復京師榷鹽法壬戌詔以京西間田處內附蕃族無親屬者遣使河北募兵及萬人者賞之癸亥詔磨勘院考提點刑獄功罪為三等以待黜陟二月乙未詔河北強壯刺手背為義勇軍三月甲辰朔詔殿前指揮使兩省都知舉武臣才堪為將者丁巳杜衍宣撫河東辛酉朝宗賣心罷己巳契丹遣蕭英劉六符來致書求割地是月賜禮部奏名進士諸科及第出身八百三十九人夏四月戊寅命御史中丞諫官同較三司用度罷其不急者庚辰知制誥富弼報使契丹五月辛亥録繫囚壬子減皇后及宗室婦郊賜之半甲寅詔三館臣僚上封事及聽請對丙辰詔醫官毋得換右職戊午建大名府為北京降河北州軍繫囚罪一等杖笞以下釋之乙丑罷左藏庫月進錢戊辰禁銷金為服飾是月契丹集兵幽州聲言來侵河北京東皆為邊備六月甲戌出內藏銀紬絹三百萬助邊費癸未以特奏名武藝人補三班丙戌置北平軍丙申閲蕃落將士騎射戊戌詔減省南郊臣僚賜與秋七月丙午任布罷丁未詔軍校戰沒無子孫者賜其家緡錢戊午大雨雹以呂夷簡兼判樞密院事章得象兼樞密使晏殊加平章事癸亥富弼再使契丹詔京官告病者一年方聽朝參八月丁丑策制舉人戊寅策武舉人試騎射甲申白氣貫北斗戊子出內藏庫緡錢十萬修北京行宮己亥遣使安撫京東督捕盜賊九月丙午呂夷簡改兼樞密使乙丑契丹遣耶律仁先劉六符持誓書來閏月戊戌罷河北民間科徭是月元昊寇定川寨涇原路馬步軍副都總管葛懷敏戰沒諸將死者十四人元昊大掠渭州而去冬十月庚戌刺陝西保捷軍甲寅遣使安撫涇原路丙辰知制誥梁適報使契丹戊午發定州禁軍二萬二千人屯涇原庚申詔恤將校陳亡其妻女無依者養之宮中丙寅契丹遣使來再致誓書報徹兵十一月壬申黑氣貫北斗柄辛巳復都部署兼招討等使命韓琦范仲淹龐籍分領之甲申以泰山處士孫復為國子監直講是歲占城獻馴象三三年春正月庚午朔封皇子曦為鄂王辛未曦薨丙子減陝西歲市木三之一辛巳詔輔臣議蠲減天下賦役戊子詔録將校死王事而無子孫者親屬辛卯置德順軍壬辰録唐狄仁傑後癸巳元昊自名曩霄遣人來納款稱夏國二月丙午賜陝西招討韓琦范仲淹龐籍錢各百萬辛酉立四門學三月壬申閲衛士武技戊子呂夷簡罷為司徒監修國史與議軍國大事以章得象為昭文館大學士晏殊為集賢殿大學士並兼樞密使夏竦為樞密使賈昌朝參知政事夏四月戊戌朔幸瓊林苑閲騎士癸卯遣保安軍判官邵良佐使元昊許封册為夏國主歲賜絹十萬匹茶三萬斤甲辰以韓琦范仲淹為樞密副使乙巳詔夏竦還本鎮以杜衍為樞密使丙辰以春夏不雨遣使祠禱于嶽瀆甲子呂夷簡罷議軍國大事五月丁卯朔日有食之庚午録繫囚戊寅詔諸路轉運使並兼按察使歲具官吏能否以聞庚辰祈雨于相國寺會靈觀癸未置御史六員罷推直官丁亥置武學戊子雨己丑謝雨辛卯築欽天壇于禁中乙未近臣薦試方略者六人授官有差是月欣州地大震虎翼卒王倫叛于沂州六月甲辰詔諸路漕臣令所部官吏條茶鹽礬及坑冶利害以聞秋七月辛未詔許二府不限奏事常制得敷陳留對丙子王舉正罷壬午罷陝西管內營田甲申命任中師宣撫河東范仲淹宣撫陝西乙酉獲王倫八月乙未朔命官詳定編敕戊戌詔諫官日赴內朝丁未以范仲淹參知政事富弼為樞密副使壬子白氣貫北斗魁癸丑韓琦代范仲淹宣撫陝西甲寅太白晝見戊午罷武學九月丁卯詔輔臣對天章閣戊辰呂夷簡以太尉致仕乙亥任中師罷丁丑詔執政大臣非假休不許私第受謁是月桂陽洞蠻寇邊湖南提刑募兵討平之冬十月丙午詔中書樞密同選諸路轉運使丁未詔縣令佐能根括編戶隱偽以增賦入者量其數賞之戊申詔二府同選諸路提刑甲寅復諸路轉運判官乙卯詔修兵書壬戌詔二府頒新定磨勘式甲子築水洛城是月光化軍亂討平之十一月丙寅上清宮火癸未詔館職有闕以兩府兩省保舉然後召試補用丁亥更蔭補法壬辰限職田是月五星皆在東方十二月乙巳桂陽監徭賊復寇邊丁巳大雨雪木冰河北雨赤雪交址獻馴象五安化州蠻來貢四年春正月庚午京城雪寒詔三司減價出薪米以濟之壬申西蕃磨角入貢乙亥荊王元儼薨辛卯太常禮儀院上新修禮書及慶曆祀儀二月丙申出奉宸庫銀三萬兩振陝西飢民己酉白虹貫日甲寅罷陝西四路馬步軍都總管經略安撫招討使復置隨路都總管經略安撫招討使三月癸亥朔以旱遣內侍祈雨辛未省廣濟河歲漕軍儲二十萬石乙亥詔天下州縣立學更定科舉法語在選舉志己卯出御書治道三十五事賜講讀官庚辰録唐郭子儀後甲申免衡道州桂陽監民經徭賊劫略者賦役一年夏四月丙申詔湖南民誤為征徭軍所殺者賜帛存撫其家丁酉宜州蠻區希範叛詔廣西轉運鈐轄司發兵討捕壬子以錫慶院為太學五月庚午録繫囚壬申幸國子監謁孔子有司言舊儀止肅揖帝特再拜賜直講孫復五品服遂幸武成王廟又幸玉津園觀種稻乙亥撫州獻生金山丙子詔西川知州軍監罷任未出界而卒者録其子孫一人戊寅詔募人納粟振淮南飢乙酉欣州言地震有聲如雷丙戌曩霄遣人來復稱臣六月壬子降天下繫囚流徒罪一等杖笞釋之范仲淹宣撫陝西河東癸丑詔諸軍因戰傷廢停不能自存及死事之家孤老月給米人三斗秋七月戊寅封宗室德文等十人為郡王國公壬午月犯熒惑癸未契丹遣使來告伐夏國甲申夷人寇三江寨淯井監官兵擊走之丙戌詔諸路轉運提刑察守令有治狀者八月辛卯命賈昌朝領天下農田范仲淹領刑法事甲午富弼宣撫河北戊戌命右正言余靖報使契丹保州雲翼軍殺官吏據城叛庚子命右正言田況度視保州仍聽便宜行事丙午進宗室官有差戊午詔輔臣所薦官毋以為諫官御史九月辛酉保州平壬戌詔保州官吏死亂兵而無親屬者官為殯斂兵官被害及戰沒並優賜其家民田遭蹂踐者蠲其租癸亥以真宗賢妃沈氏為德妃婉儀杜氏為賢妃戊辰呂夷簡薨庚午晏殊罷乙亥遣使安撫湖南甲申以杜衍同中書門下平章事兼樞密使集賢殿大學士賈昌朝為樞密使陳執中參知政事丁亥宴宗室太清樓射于苑中冬十月庚寅賜曩霄誓詔歲賜銀絹茶綵凡二十五萬五千陳堯佐薨丙申命范仲淹提舉三館祕閣繕校書籍癸丑桂陽蠻降授蠻酋三人奉職十一月壬戌以西界內附香布為團練使己巳詔戒朋黨相訐及按察恣為苛刻文人肆言行怪者己卯改上莊穆皇后諡曰章穆莊獻明肅皇太后曰章獻明肅莊懿皇太后曰章懿莊懷皇后曰章懷莊惠皇太后曰章惠庚辰朝饗景靈宮辛巳饗太廟奉慈廟壬午冬至祀天地于圜丘大赦十二月壬辰加恩百官乙未封曩霄為夏國主丁酉詔州縣以先帝所賜七條相誨敕辛亥置保安鎮戎軍榷場是歲黎州邛部川山前山後百蠻都鬼主牟黑來貢五年春正月甲戌罷河東陝西諸路招討使乙亥復置言事御史丙子契丹遣使來告伐夏國還庚辰命知制誥余靖報使契丹癸未詔京朝官因被彈奏雖不曾責罰但有改移差遣並四周年磨勘乙酉范仲淹富弼罷丙戌杜衍罷以賈昌朝同中書門下平章事兼樞密使集賢殿大學士王貽永為樞密使宋庠參知政事吳育龐籍並為樞密副使二月辛卯詔罷京朝官用保任遷法又罷蔭補限年法壬辰曩霄初遣人來賀正旦癸卯以久旱詔州縣毋得淹繫刑獄辛亥祈雨于相國天清寺會靈祥源觀癸丑桂陽監言唐和等復內寇乙卯謝雨三月己未詔大宗正勵諸宗子授經務學辛酉韓琦罷癸亥詔禮部貢舉甲子宜州蠻賊區希範平庚午東方有黃氣如虹貫月甲戌詔監司按察屬吏毋得差官體量甲申詔陝西以曩霄稱臣降繫囚罪一等笞釋之邊兵第賜緡錢民去年逋負皆勿責蠲其租稅之半麟府州嘗為羌所掠除逋負租稅如之丙戌罷入粟補官夏四月丁亥朔司天言日當食陰晦不見録繫囚遣官録三京囚辛卯曩霄初遣人來賀乾元節戊申章得象罷以賈昌朝為昭文館大學士陳執中同中書門下平章事集賢殿大學士兼樞密使庚戌以吳育參知政事丁度為樞密副使五月己巳罷諸路轉運判官閏月丙午曩霄遣人來謝册命六月丁卯減益梓州上供絹歲三之一紅錦鹿胎半之秋七月戊申廣州地震八月庚午荊南府嶽州地震九月庚寅詔文武官己致仕而舉官犯罪當連坐者除之辛卯以重陽曲宴近臣宗室于太清樓遂射苑中冬十月乙卯契丹遣使來獻九龍車及所獲夏國羊馬辛酉祔章獻明肅皇后章懿皇后神主于太廟大赦罷轉運使兼按察庚午幸瓊林苑遂畋楊村遣使以所獲馳薦太廟召父老賜以飲食茶帛辛未頒曆于夏國庚辰罷宰臣兼樞密使十一月丁亥冬至宴宗室于崇政殿己酉詔河北長吏舉殿直供奉官有武才者是歲施州溪洞蠻西南夷龍以特來貢六年春正月戊申徙廣南戍兵善地以避瘴毒二月戊寅青州地震詔陝西經略安撫及轉運司議裁節諸費及所置官員無用者以聞三月辛巳朔日有食之録繫囚庚寅登州地震岠嵎山摧自是屢震輒海底有聲如雷甲午月犯歲星是月賜禮部奏名進士諸科及第出身八百五十三人夏四月甲寅遣使賜湖南戍兵方藥五月甲申京師雨雹地震丙戌録繫囚戊子減邛州鹽井歲課緡錢一百萬丙申詔陝西市蕃部馬丁酉京東人劉卺劉沔胡信謀反伏誅六月庚戌朔詔夏竦與河北監司察帥臣長吏之不職者丁巳有流星出營室南其光燭地隱然有聲丙寅以久旱民多暍死命京城增鑿井三百九十丁丑詔制科隨禮部貢舉秋七月丁亥月犯南斗庚寅河東經略司言雨壞欣代等州城壁八月癸亥策試賢良方正能直言極諫並試武舉人癸酉以吳育為樞密副使丁度參知政事九月甲辰登州言有巨木三千餘浮海而出冬十月辛未詔發兵討湖南徭賊十一月己卯遣官議夏國公封界癸未湖南徭賊寇英韶州界辛丑畋東韓村乘輿所過及圍內田蠲其租一年是歲邈川首領唃廝囉西蕃瞎磨角安化州蠻蒙光速等來貢交趾獻馴象十道州部瀧酋李石壁等降七年春正月丙子朔御大慶殿受朝丁亥詔河北所括馬死者限二年償之己亥頒慶曆編敕壬寅詔減連州民被徭者來年夏租二月己酉詔取益州交子三十萬於秦州募人入中糧丙辰令內侍二人提舉月給軍糧三月壬午録繫囚癸未詔天下有能言寬恤民力之事者有司驛置以聞以其副上之轉運司詳其可行者輒行之毀後苑龍船丁亥以旱罷大宴癸巳詔避正殿減常膳許中外臣僚實封條上三事乙未賈昌朝罷以陳執中為昭文館大學士夏竦同中書門下平章事集賢殿大學士吳育為給事中歸班文彥博為樞密副使罷出獵丁酉以夏竦為樞密使文彥博參知政事高若訥為樞密副使辛丑祈雨于西太一宮及還遂雨壬寅陳執中宋庠丁度以旱降官一等夏四月丁未謝雨己酉詔前京東轉運使薛紳專任文吏伺察郡縣細過江東轉運使楊紘判官王綽提點刑獄王鼎苛刻相尚並削職知州自今毋復用為部使者壬子御正殿復常膳乙卯復執中庠度官己巳詔諫官非公事毋得私謁五月戊寅詔武臣非歷知州軍無過者毋授同提點刑獄己丑補降徭唐和等為洞主己亥命翰林學士楊察蠲放天下逋負辛丑詔西北二邊有大事二府與兩制以上雜議之六月乙巳詔禁畜猛獸害人者辛酉詔天下知縣非鞫獄毋得差遣壬戌詔臣僚朝見者留京毋過十日秋七月癸未奉安太祖太宗真宗御容于南京鴻慶宮甲申德音降南京畿內囚罪一等徒以下釋之賜民夏稅之半除災傷倚閣稅及欠折官物非侵盜者辛丑禁貢餘物饋近臣八月乙丑析河北為四路各置都總管九月丁酉詔刪定一州一縣敕冬十月壬子李迪薨甲子幸廣親宅謁太祖太宗神御殿宴宗室賜器幣有差乙丑河陽許州地震十一月乙未加上真宗諡丙申朝饗景靈宮丁酉饗太廟奉慈廟戊戌冬至祀天地于圜丘大赦貝州宣毅卒王則據城反十二月戊申加恩百官庚戌樞密直學士明鎬體量安撫河北癸丑詔貝州有能引致官兵獲賊者授諸衛上將軍甲寅遣內侍以敕榜招安貝賊是歲西蕃磨角來貢八年春正月丁丑文彥博宣撫河北明鎬副之壬午江寧府火乙未日赤無光閏月辛丑貝州平甲辰曲赦河北賜平貝州將士緡錢戰沒者官為葬祭兵所踐民田蠲其稅改貝州為恩州戊申文彥博同中書門下平章事集賢殿大學士官吏將士有功者遷擢有差辛酉親從官顏秀等四人夜入禁中謀為變宿衛兵捕殺之丙寅磔王則于都市丁卯知貝州張得一坐降賊伏誅二月癸酉頒慶曆善救方夏國來告曩霄卒己卯賜瀛莫恩冀州緡錢二萬贖還飢民鬻子丁酉奉安宣祖太祖太宗御容于睦親宅三月甲辰詔禮部貢舉辛亥遣使體量安撫陝西甲寅幸龍圖天章閣詔輔臣曰西陲備禦兵冗賞濫罔知所從卿等各以所見條奏又詔翰林學士三司使知開封府御史中丞曰朕躬闕失左右朋邪中外險詐州郡暴虐法令有不便於民者朕欲聞之其悉以陳壬戌以霖雨録繫囚癸亥以朝政得失兵農要務邊防備豫將帥能否財賦利害錢法是非與夫讒人害政姦盜亂俗及防微杜漸之策召知制誥諫官御史等諭之使悉對于篇夏四月己巳朔封曩霄子諒祚為夏國主壬申丁度罷明鎬參知政事五月辛酉夏竦罷宋庠為樞密使龐籍參知政事六月戊辰朔詔近臣舉文武官材堪將帥者丙子河決澶州商胡掃壬辰以久雨齋禱甲午明鎬卒乙未詔館閣官須親民一任方許入省府及轉運提點刑獄差遣丙申章得象薨秋七月戊戌以河北水令州縣募飢民為軍辛丑罷鑄鐵錢八月己丑以河北京東西水災罷秋宴九月戊午詔三司以今年江淮漕米轉給河北州軍冬十一月己亥作皇帝欽崇國祀之寶壬戌出廩米減價以濟畿內貧民十二月乙丑朔以霖雨為災頒德音改明年元減天下囚罪一等徒以下釋之出內藏錢帛賜三司貿粟以濟河北流民所過官為舍止之所齎物毋收算丁卯册美人張氏為貴妃戊子遣使體量安撫利州路是歲廬州合肥縣稻再實交州來貢皇祐元年春正月甲戌朔日有食之以河北水災罷上元張燈停作樂庚戌張士遜薨己未詔以緡錢二十萬市穀種分給河北貧民辛酉詔臺諫非朝廷得失民間利病毋風聞彈奏二月戊辰以河北疫遣使頒藥辛未發禁軍十指揮赴京東西路備盜三月丁巳録繫囚己未契丹遣使來告伐夏國庚申翰林院學士錢明逸報使契丹是月賜禮部奏名進士諸科及第出身千三百九人四月癸未梓州轉運司言淯井監夷人平六月甲子蠲河北復業民租賦二年甲戌始置觀文殿大學士戊寅詔中書樞密非聚議毋通賓客戊子詔轉運使提點刑獄所部官吏受贓失覺察者降黜秋七月丁酉詔臣僚毋得保薦要近內臣己未詔諸州歲市藥以療民疾八月壬戌陳執中罷以文彥博為昭文館大學士宋庠同中書門下平章事集賢殿大學士龐籍為樞密使高若訥參知政事梁適為樞密副使甲申策制舉武舉人九月乙巳廣源州蠻儂智高寇雍州詔江南福建等路發兵以備戊午太白犯南斗己未罷武舉冬十一月丙申詔河北被災民八十以上及篤疾不能自存者人賜米一石酒一斗辛丑詔民有冤貧不能詣闕者聽訴於監司以聞十二月甲子遣入內供奉高懷政督捕雍州盜賊是歲大留國來貢
