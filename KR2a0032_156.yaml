body:
  text: 宋史卷一百五十六志第一百九選舉二科目下舉遺逸附高宗建炎初駐蹕揚州時方用武念士人不能至行在下詔諸道提刑司選官即轉運置司州軍引試使副或判官一人董之河東路附京西轉運司國子監開封府人就試於留守司命御史一人董之國之監人願就本路試者聽二年定詩賦經義取士第一場詩賦各一首習經義者本經義三道語孟義各一道第二場並論一道第三場並策三道殿試策如之自紹聖後舉人不習詩賦至是始復遂除政和令命官私相傳習詩賦之禁又詔下第進士年四十以上六舉經御試八舉經省試五十以上四舉經御試五舉經省試者河北河東陝西特各減一舉元符以前到省兩舉者不限年一舉年五十五已上者諸道轉運司開封府悉以名聞許直赴廷試是秋四方士集行在帝親策于集英殿第為五等賜正奏名李易以下四百五十一人進士及第進士出身同學究出身同出身第一人為左宣教郎第二第三人左宣義郎第四第五人左儒林郎第一甲第六名以下並左文林郎第二甲並左從事郎第三甲以下並左迪功郎特奏名第一人附第二甲賜進士及第第二第三人賜同進士出身餘賜同學究出身登仕郎京府助教上下州文學諸州助教入五等者亦與調官川陝河北京東正奏名不赴者一百三人以龍飛特恩即家賜第故事廷試上十名內侍先以卷奏定高下帝曰取士當務至公豈容以己意升降自今勿先進卷三年詔過省進士赴御試不及者令漕臣據元舉送狀申省給敕賜同進士出身其計舉者賜下州文學並釋褐焉左司諫唐輝言舊制省試用六曹尚書翰林學士知貢舉侍郎給事中同知貢舉卿監郎官參詳館職學官點檢御史監視故能至公厭人心今諸道類試顓委憲臣姦弊滋生才否貿亂士論囂然甚不稱更制設科之意請並還禮部遂罷諸道類試四年復川陝試如故紹興元年當祀明堂復詔諸道類試擇憲漕或帥守中文學之人總其事使精選考官於是四川宣撫處置使張浚始以便宜令川陝舉人即置司州試之會侯延慶言兵興太學既罷諸生解散行在職事及釐務官隨行有服親及門客往往鄉貢隔絶請立應舉法以國子監進士為名令轉運司附試又詔京畿京東西河北陝西淮南士人轉徙東南者令於寓戶州軍附試別號取放時諸道貢籍多燬於兵乃詔轉運司令舉人具元符以後得解升貢戶貫三代治經置籍于禮部以稽考焉應該恩免解舉人值兵燬失公據者召京官二員委保所在州軍給據仍申部注籍侍御史曾統請取士止用詞賦未須兼經高宗亦以古今治亂多載于史經義登科者類不通史將從其議左僕射呂頤浩曰經義詞賦均以言取人宜如舊遂止二年廷試手詔諭考官當崇直言抑諛佞得張九成以下二百五十九人凌景夏第二呂頤浩言景夏詞勝九成請更置第一帝曰士人初進便須別其忠佞九成所對無所畏避宜擢首選九成以類試廷策俱第一命特進一官時進士卷有犯御名者帝曰豈以朕名妨人進取邪令置本等又命應及第人各進一秩舊制潛藩州郡舉人必曾請舉兩到省已上乃得試帝嘗封蜀國公是年蜀州舉人以帝登極恩徑赴類省試自是為例五年初試進士于南省戒飭有司商榷去取毋以絺繪章句為工當以淵源學問為尚事關教化有益治體者毋以切直為嫌言無根柢肆為蔓衍者不在採録舉人程文許通用古今諸儒之説及出己意文理優長為合格三月御試奏名汪應辰第一初考官以有官人黃中第一帝訪諸沈應求應求以沈遘與馮京故事對乃更擢應辰為魁遂為定制舊制御試初考既分等第印封送覆考定之詳定所或從初或從覆不許別自立等嘉祐中廢至是知制誥孫近奏若遵舊制則高下升黜盡出詳定官初覆考為虛設請自今初覆考皆未當始許奏稟別置等第諫議大夫趙霈請用崇寧令凡隔二等纍及五人許行奏稟從之是年川陝進士止試宣撫司特奏名則置院差官試時務策一道禮部具取放分數推恩等第頒示之舊法隨侍見任守倅等官在本貫二千里外曰滿里子弟試官內外有服親及婚姻家曰避親館于見任門下曰門客是三等許牒試否則不預間有背本宗而竄他譜飛賕而移試他道者議者病之六年詔牒試應避者令本司長官州守倅縣令委保詭冒者連坐七年命行在職事釐務官並宗子應舉取應及有官人並於行在赴國子監試始命各差詞賦經義考官八年以平江府四經巡幸其得解舉人援臨安建康駐蹕例各免文解一次時聞徽宗崩未及大祥禮部言故事因諒暗罷殿試則省試第一人為榜首補兩使職官帝特命為左承事郎自此率以為常九年以陝西舉人久蹈北境理宜優異非四川比令禮部別號取放川陝分類試額自此始是歲以科試明堂同在嗣歲省司財計艱於辦給又患初仕待闕率四五年若使進士蔭人同時差注俱為不便增展一年則合舊制十年遂詔諸州依條發解十二年正月省試三月御試後皆準此十三年國子司業高閌言取士當先經術請參合三場以本經語孟義各一道為首詩賦各一首次之子史論一道時務策一道又次之庶幾如古試法又春秋義當於正經出題並從之初立同文館試凡居行在去本貫及千里已上者許附試于國子監十五年凡特奏名賜同學究出身者舊京府助教今改將仕郎是歲始定依汴京舊制正奏及特恩分兩日唱名十七年申禁程文全用本朝人文集或歌頌及佛書全句者皆不考十八年以浙漕舉人有勢家行賂假手濫名者諭有司立賞格聽人捕告十九年詔自今鄉貢前一歲州軍屬縣長吏籍定合應舉人以次年春縣上之州州下之學核實引保赴鄉飲酒然後送試院及期投狀射保者勿受自神宗朝程皓程頤以道學倡于洛四方師之中興盛于東南科舉之文稍用頤説諫官陳公輔上疏詆頤學乞加禁絶秦檜入相甚至指頤為專門侍御史汪勃請戒飭攸司凡專門曲説必加黜落中丞曹筠亦請選汰用程説者並從之二十一年御試得正奏名四百人特奏名五百三十一人中興以來得人始盛二十二年以士習周禮禮記較他經十無一二恐其學寖廢遂命州郡招延明於二禮者俾立講説以表學校及令考官優加誘進舊諸州皆以八月選日試舉人有趁數州取解者二十四年始定試期並用中秋日四川則用季春而仲秋類省初秦檜專國其子熺廷試第一檜陽引降第二名是歲檜孫塤舉進士省試廷對皆首選姻黨曹冠等皆居高甲後降塤第三二十五年檜死帝懲其弊遂命貢院遵故事凡合格舉人有權要親族並令覆試仍奪塤出身改冠等七人階官並帶右字餘悉駁放程王之學數年以來宰相執論不一趙鼎主程頤秦檜主王安石至是詔自今毋拘一家之説務求至當之論道學之禁稍解矣自經賦分科聲律日盛帝嘗曰向為士不讀史遂用詩賦今則不讀經不出數年經學廢矣二十七年詔復行兼經如十三年之制內第一場大小經義各減一道如治二禮文義優長許侵用諸經分數時號為四科舊蜀士赴廷試不及者皆賜同進士出身帝念其中有俊秀能取高第者不宜例置下列至是遂諭都省寬展試期以待之及唱名閻安中第二梁介第三皆蜀士也帝大悅二十九年孫道夫在經筵極論四川類試請託之弊請盡令赴禮部帝曰後舉但當遣御史監之道夫持益堅事下國子監祭酒楊椿曰蜀去行在萬里可使士子涉三峽冒重湖邪欲革其弊一監試得人足矣遂詔監司守倅賓客力可行者赴省餘不在遣中是歲四川類省試始從朝廷差官初類試第一人恩數優厚視殿試第三人賜進士及第後以何耕對策忤秦檜乃改禮部類試蜀士第一等人並賜進士出身自是無有不赴御試者惟遇不親策則類省試第一人恩數如舊第二第三人皆附第一甲九名以上附第二甲焉是年詔四川等處進士路遠歸鄉試不及者特就運司附試一次仍別行考校取旨立額三十一年禮部侍郎金安節言熙寧元豐以來經義詩賦廢興離合隨時更革初無定制近合科以來通經者苦賦體雕刻習賦者病經旨淵微心有弗精智難兼濟又其甚者論既並場策問太寡議論器識無以盡人士守傳注史學盡廢此後進往往得志而老生宿儒多困也請復立兩科永為成憲從之於是士始有定嚮而得專所習矣既而建議者以為兩科既分解額未定宜以國學及諸州解額三分為率二取經義一取詩賦若省試則以纍舉過省中數立為定額而分之詔下其議然竟不果行孝宗初詔川廣進士之在行都者令附試兩浙轉運司隆興元年御試第一人承事郎簽書諸州節度判官第二第三人文林郎兩使職官第四第五人從事郎初等職官第六人至第四甲並迪功郎諸州司戶簿尉第五甲守選乾道元年詔四川特奏名第一等第一名賜同學究出身第二名至本等末補將仕郎第二等至第四等賜下州文學等五等諸州助教二年御試始推登極恩第一名宣義郎第二名與第一名恩例第三名承事郎第一甲賜進士及第並文林郎第二甲賜進士及第並從事郎第三第四甲進士出身第五甲同進士出身特奏名第一名賜進士出身第二第三名賜同進士出身四年裁定牒試法文武臣添差官除親子孫外並罷其行在職事官除監察御史以上餘並不許牒試六年詔諸道試官皆隔一郡選差後又令歷三郡合符乃聽入院防私弊也帝欲令文士能射御武臣知詩書命討論殿最之法淳熙二年御試唱第後二日御殿引按文士詹騤以下一百三十九人射藝翌日又引文士第五甲及特奏名一百五十二人其日進士具襴笏入殿起居易戎服各給箭六弓不限斗力射者莫不振厲自獻多命中焉天子甚悅凡三箭中帖為上等正奏第一人轉一官與通判餘循一資二箭中為中等減二年磨勘一箭中帖及一箭上𣛀為下等一任回不依次注官上四甲能全中者取旨第五甲射入上等注黃甲餘升名次而已特奏名五等人射藝合格與文學不中者亦賜帛四年罷同文館試又命省試簾外官同姓異姓親若門客亦依簾內官避親法牒送別院五年以階成西和鳳州正奏名比附特奏名五路人例特升一甲六年詔特奏名自今三名取一置第四等以前餘並入第五等其末等納敕者止許一次潛藩及五路舊升甲者今但升名其後又許納敕三次為定制焉十一年進士廷試不許見燭其納卷最後者降黜之舊制廷試至暮許賜燭然殿深易暗日昃已燭出矣凡賜燭正奏名降一甲第五甲降充本甲末名特奏名降一等第五等與攝助教凡試藝于省闈及國子監兩浙轉運司者皆禁燭其他郡國率達旦乃出十月太常博士倪思言舉人輕視史學今之論史者獨取漢唐混一之事三國六朝五代為非盛世而恥談之然其進取之得失守禦之當否籌策之疏密區處兵民之方形勢成敗之迹俾加討究有補國家請諭春官凡課試命題雜出諸史無所拘忌考核之際稍以論策為重毋止以初場定去留從之十四年御試正奏名王容第一時帝策士不盡由有司是舉容本第三親擢為榜首翰林學士洪邁言貢舉令賦限三百六十字論限五百字今經義論策一道有至三千言賦一篇幾六百言寸晷之下唯務貪多纍牘連篇何由精妙宜俾各遵體格以返渾淳時朱熹嘗欲罷詩賦而分諸經子史時務之年其私議曰古者大學之教以格物致知為先而其考校之法又以九年知類通達強立不反為大成今樂經亡而禮經闕二戴之禮已非正經而又廢其一經之為教已不能備而治經者類皆捨其所難而就其易僅窺其一而不及其餘若諸子之學同出於聖人諸史則該古今興亡治亂得失之變皆不可闕者而學者一旦豈能盡通若合所當讀之書而分之以年使之各以三年而共通其三四之一凡易詩書為一科而子年午年試之周禮儀禮及二戴記為一科而卯年試之春秋及三傳為一科而酉年試之義各二道諸經皆兼大學論語中庸孟子義一道論則分諸子為四科而分年以附焉諸史則左傳國語史記兩漢為一科三國晉書南北史為一科新舊唐書五代史為一科時務則律歷地理為一科以次分年如經子之法試策各二道又使治經者各守家法答義者必通貫經文條舉衆説而斷以己意有司命題必依章句如是則士無不通之經史而皆可用於世矣其議雖未上而天下誦之光宗初以省試春淺天尚寒遂展至二月朔卜日殿試于四月上旬紹熙元年仍按射不合格者罷賜帛舊命官鎖廳及避親舉人同試三年始令分場以革假人試藝者於是四蜀皆然寧宗慶元二年韓托胄襲秦檜餘論指道學為偽學臺臣附和之上章論列劉德秀在省闈奏請毀除語録既而知貢舉吏部尚書葉翥上言士狃於偽學專習語録詭誕之説中庸大學之書以文其非有葉適進卷陳傅良待遇集士人傳誦其文每用輒效請令太學及州軍學各以月試合格前三名程文上御史臺考察太學以月諸路以季其有舊習不改則坐學官提學司之罪是舉語涉道學者皆不預選四年以經義多用套類父子兄弟相授致天下士子不務實學遂命有司六經出題各於本經摘出兩段文意相類者合為一題以杜挾册讎偽之計嘉泰元年起居舍人章良能陳主司三弊一曰沮抑詞賦太甚既暗削分數又多置下陳二曰假借春秋太過諸處解榜多置首選三曰國史實録等書禁民私藏惟公卿子弟因父兄得以竊窺冒禁傳寫而有司乃取本朝故事藏匿本末發為策問寒士無繇盡知命自今詩賦純正者置之前列春秋唯卓異者置高等餘當雜定策題則必明白指問四年詔自今礙格不礙格人試于漕司者分院異題永為定制開禧元年詔禮部考試以三場俱優為上二場優次之一場優又次之俱劣為下毋以片言隻字取人編排既定從知舉審定高下永為通考之法二年以舉人姦弊滋多命諸道漕司州府軍監凡發解舉人合格試卷姓名類申禮部候省試中牒發御史臺同禮部長二參對字畫關御藥院內侍照應廷試字畫不同者別榜駁放舊制秋貢春試皆置別頭場以待舉人之避親者自緦麻以上親及大功以上婚姻之家皆牒送惟臨軒親試謂之天子門生雖父兄為考官亦不避嘉定元年始因議臣有請命朝官有親屬赴廷對者免差充考校十二年命國子牒試禁假託宗枝遷就服屬犯者必置于罰十五年祕書郎何淡言有司出題強裂句讀專務斷章離絶旨意破碎經文望令革去舊習使士子考注疏而辨異同明綱領而識體要從之至理宗朝姦弊愈滋有司命題苟簡或執偏見臆説互相背馳或發策用事訛舛故士子眩惑莫知適從才者或反見遺所取之士既不精數年之後復俾之主文是非顛倒逾甚時謂之繆種流傳容情任意不學之流往往中第而舉人之弊凡五曰傳義曰換卷曰易號曰卷子出外曰謄録滅裂逮寶慶二年左諫議大夫朱端常奏防戢之策謂試院監大門中門官乃一院襟喉切要乞差有風力者入試日一切不許傳遞門禁既嚴則數弊自清士人暮夜納卷易於散失宜令封彌官躬親封鐍卷匱士人親書幕曆投匱中俟舉人盡出院然後啓封分類抄上即付謄録所明旦申逐場名數于御史臺檢核其撰號法上一字許同下二字各異以杜訛易之弊謄録人選擇書手充不許代名具姓名字樣申院覆寫檢實傳義置窠之人委臨安府嚴捕其考官容情任意者許臺諫風聞彈奏重置典憲及出官錢立賞格許告捉懷挾傳題傳稿全身代名入試之人帝悉從之且命精擇考官毋仍舊習舊制凡即位一降科詔及大比之歲二月一日一降詔許發解然後禮部遍牒諸路及四川州軍至是以四川鎖院改用二月二十一日與降詔日相逼遂改用正月十五日奏裁降詔紹定元年有言舉人程文雷同或一字不差其弊有二一則考官受賂或授暗記或與全篇一家分傳謄寫一則老儒賣文場屋一人傳十十人傳百考官不暇參稽於是命禮部戒飭前申號三日監試會聚考官將合取卷參驗互考稍涉雷同即與黜落或仍前弊以致覺察則考官監試一例黜退初省試奉敕差知貢舉一員同知二員內差臺諫官一員參詳官若干員內差監察御史一員俾會聚考校微寓彈壓糾察之意韓侘胄用事將鈐制士人遂於三知舉外別差同知一員以諫官為之專董試事不復干預考校參詳官亦不差察官於是約束峻切氣焰薰灼嘉泰間更名監試其失愈甚製造簿曆嚴立程限至是復舊制三知舉內差一臺諫十參詳內差一御史仍戒飭試官精加考校如日力不給即展期限二年臣僚言考官之弊詞賦命題不明致士子上請煩亂經義不分房別考致士子多悖經旨遂飭考官明示詞賦題意各房分經考校凡廷試唯蜀士到杭最遲每展日以待會有言蜀士嗜利多引商貨押船致留滯關津自是定以四月上旬廷試更不移展三年臣僚請學校場屋並禁斷章截句破壞義理及春秋經越年牽合其程文本古注用先儒説者取之穿鑿撰説者黜落四年臣僚甚言科場之弊乞戒飭漕臣嚴選考官地多經學則博選通經者地多賦學則廣致能賦者主文必兼經賦乃可充其職監試或倅二不勝任必別擇人仍令有司量展揭封之期庶考校詳悉不致失士於是命遍諭國子監及諸郡恪意推行約束違戾者彈劾治罪初四川類試其事雖隸制司而監試考官共十員唯大院別院監試主文各一員從朝命餘聽制司選差自安丙差四員之外權委成都帥守臨期從近取具是歲始仍舊朝命四員餘從制司分選時場屋士子日盛卷軸如山有司不能遍覩迫於日限去取不能皆當蓋士人既以本名納卷或別為名或易以字一人而納二三卷不禁挾書又許見燭閩浙諸郡又間日引試中有一日之暇甚至次日午方出於是經義可作二三道詩賦可成五六篇舉人文章不精考官困於披閲幸皆中選乃以兄弟承之或轉售同族姦詐百端真偽莫辨乃命諸郡關防於投卷之初責鄉鄰核實嚴治虛偽之罪縱容之罰其弊稍息命官鎖廳及避親舉人自紹熙分場各試寒士憚之緣避親人七人取一其額太窄咸以為窘而朝士之被差為大院考官者恐多妨其親亦不願差寒士於鄉舉千百取一之中得預秋薦以數千里之遠辛勤赴省而省闈差官乃當相避遂有隱身匿名不認親戚以求免者憤悶憂沮狼狽旅邸者彼此交怨相視為讎至是言者謂除大院收試外以漕舉及待補國子生到省者與避親人同試於別院亦將不下數百人數既多其額自寬寒士可不怨其親戚朝士可不憚於被差從之既而以諸路轉運司牒試多營求偽冒之弊遂罷之其實有妨嫌者收試每百人終場取一人於各路州軍解額窄者量與均添庶士子各安鄉里無復詐競於是臨安紹興溫台福婺慶元處池袁潮興化及四川諸州府共增解額一百七十名未幾又命止許牒滿里親子孫及門客召見任官二員委保與有官礙格人各處收試五十人取放一人合牒親子孫別項隔截收試不及五十人亦取一人凡涉詐冒並坐牒官保官初唐鄧二州嘗陷于金金滅復得其地命仍舊類試于襄陽但別號考校以優新附士子舊制光州解額七名渡江後為極邊士子稀少權赴試鄰州淳熙間本州自置科場權放三名至是已五六十年舉人十倍于前遂命復還舊額端平元年以牒試已罷解額既增命增額州郡措置關防每人止納一卷及開貢院添差考官時有言門客及隨侍親子孫五十人取一臨安府學三年類申人漕試七十取一又令別試院分項異處收試已為煩碎兼兩項士人習賦習書之外習他經者差少難於取放遂命將兩項混同收試考校均作六十取一京學見行食職事生員二百二十四名別項發號考校不限經賦取放一名侍御史李鳴復等條列建言謂臺諫充知舉參詳既留心考校不能檢柅姦弊欲乞仍舊差臺諫為監試懷挾之禁不嚴皆為具文欲乞懸賞募人告捉精選強敏巡按官及八廂等人謹切巡邏有犯則鐫黜官員考校不精多緣點檢官不時供卷及開院日迫試卷沓至知舉倉卒不及遂致遺才欲乞試院隨房置曆程督點檢官書所供卷數逐日押曆考校試卷不遵舊式務從簡便點檢參詳穿聯為一欲乞必如舊制三場試卷分送三點檢三參詳三知舉庶得詳審試官互考經賦未必精熟欲乞前期約度試卷經賦凡若干則各差試官若干不至偏重並從之嘉熙元年罷諸牒試應郎官以上監司守倅之門客及姑姨同宗之子弟與遊士之不便於歸鄉就試者並混同試于轉運司各從所寓縣給據徑赴司納卷一如鄉舉之法家狀各書本貫不問其所從來而定其名寓試以四十名為額就試如滿五十人則臨時取旨增放又罷諸路轉運司及諸州軍府所取待補國子生自明年並許赴國子監混試以士子數多命於禮部及臨安轉運司兩試院外紹興安吉各置一院從朝廷差官前詣同日引試分各路士人就試焉同在京不許見燭是年已失京西諸州軍士多徙寓江陵鄂州命京湖制置司於江陵別立貢院取德安府荊門軍歸峽復三州及隨郢均房等京西七郡士人別差官混試用十二郡元額混取以優之牒試既罷又復冒求國子士大夫為子弟計者輒牒外方他族利為場屋相資或公然受價以鬻命遍諭百官司知雜司等如已準朝廷辨驗批書印紙批下國子監收試即報赴試人躬赴監一姓結為一保每保不過十人責立罪罰當官書押遞相委保各給告示方許投納試卷冒牒官降官罷任或一時失於參照誤牒他族許自陳悔牒一次冒牒中選之人限主保官舉人一月自首舉人駁放主保官免罪出限不首者仍照前條罪之凡類試卷封彌作弊不一至是命前期於兩浙轉運司臨安府選見役吏胥共三十人差近上一名部轄入院十名專管詩賦餘分管諸經各隨所管號於引試之夕分尋試卷各置簿封彌不許混亂却別差一吏將號置曆發過謄録所書寫其簿曆封彌官收掌不經吏手不許謄録人干預以革其弊二年省試下第及遊學人並就臨安府給據赴兩浙轉運司混試待補太學生臣僚言國子牒試之弊冒濫滋甚在朝之士有強認疏遠之親為近屬者有各私親故換易而互牒者有為權勢所軋人情所牽應命而泛及者有自揆子弟非才牒同姓之雋茂利其假手者有文藝素乏執格法以求牒轉售同姓以謀利者今後令牒官各從本職長官具朝典狀保明先期取本官知委狀仍立賞格許人指實陳首冒牒之官按劾鐫秩受牒之人駁放殿舉保官亦與連坐專令御史臺覺察都省勘會類申門客滿里子孫仍前漕試六十人取一較之他處雖甚優而取無定額士有疑心就試者少宜令額寬而試者衆塗一而取之精遂依前例放行寓試以四十名為定額仍前待補其類申門客滿里子孫及附試並罷淳祐元年臣僚言既復諸路漕試合國子試兩項科舉及免舉人不下千數宜復撥漕舉胄舉同避親人並就別院引試使大院無卷冗之患小院無額窄之弊從之時淮南諸州郡歲有兵禍士子不得以時赴鄉試且漕司分差試官路梗不可徑達三年命淮東州郡附鎮江府秋試淮西州郡附建康試蘄黃光三州安慶府附江州試三試所各增差試官二員別項考校照各州元額取放是歲兩浙轉運司寓試終場滿五千人特命增放二名後雖多不增如不及五千人止依元額別院之試大率士子與試官實有親嫌者紹定間以漕試胄試無親可避者亦許試或謂時相徇於勢要子弟故也端平初撥歸大院寒雋便之淳祐元年又復赴別院是使不應避親之人抑而就此使天下士子無故析而為二殊失別試之初意至是依端平釐正之復歸大院九年以臣僚言士子又有免解偽冒入試者或父兄沒而竊代其名或同族物故而填其籍於是令自本貫保明給據類其姓名先申禮部各州揭以示衆犯者許告捉依鬻舉法治罪十二年廣南西路言所部二十五郡科選於春官者僅一二蓋山林質朴不能與中土士子同工請授兩淮荊襄例別考朝廷從其請自是廣南分東西兩路寶祐二年監察御史陳大方言士風日薄文場多弊乞將發解士人初請舉者從所司給帖赴省別給一曆如命官印紙之法批書發解之年及本名年貫保官姓名執赴禮部又批赴省之年長二印署赴監試者同如將來免解免省到殿批書亦如之如無曆則不收試候出官日赴吏部繳納換給印紙應合免解免省人亦從先發解處照此給曆如省殿中選將元曆發下御史臺考察以憑注闕給告士子得曆可為據證有司因曆可加稽驗日前偽冒之人可不却而自遁遂自明年始行之鄉貢監補省試皆有覆試然銓擇猶未精其間濫名充貢者不可欺同舉之人冒選橋門者不逃於本齋之職事遂命今後本州審察必責同舉之聯保監學簾引必責長諭之證實並使結罪方與放行中書覆試凡涉再引非繫雜犯並先劄報各處漕司每遇詔舉必加稽驗凡覆試令宰執出題不許都司干預仍日輪臺諫一員簾外監試四年命在朝之臣除宰執侍從臺諫外自卿監郎官以下至釐務官各具三代宗支圖三本結立罪狀申尚書省御史臺及禮部所屬各置簿籍存留照應遇屬子孫登科發解入學奏補事故並具申入鑿後由外任登朝亦於供職日後具圖籍記如上法遇胄試之年照朝廷限員於內牒能應舉人就試以革胄牒冒濫之弊景定二年胄子牒試員宰執牒緦麻以上親增作四十人侍從臺諫給事中舍人小功以上親增作二十七人卿監郎官祕書省官四總領小功以上親增作二十人寺監丞簿學官二令大功以上親增作十五人六院四轄省部門史館校勘檢閲大功以上親增作十人臨安府通判牒大功以上親增作八人餘應牒親子孫者一仍舊制度宗初以雷同假手之弊多由於州郡試院繼燭達旦或至次日辰巳猶未出院其所以間日者不惟止可以惠不能文之人適足以害能文之士遂一遵舊制連試三日時諸州郡以鄉貢終場人衆而元額少自咸淳九年為始視終場人多寡每二百人取放一名以士子數多增參詳官二員點檢試卷官六員又以臣僚條上科場之弊以大院別院參詳官點檢試卷官兼考雷同又監試兼專一詳定雷同試卷不預考校遂罷簾外點檢雷同官國子監解試雷同官亦罷先是州郡鄉貢未有覆試會言者謂冒濫之弊惟在鄉貢遂命漕臣及帥守於解試揭曉之前點差有出身倅二或幕官專充覆試盡一日命題考校解名多者斟酌分日但能行文不繆説理優通覺非假手即取非才不通就與駁放如將來省覆不通罪及元覆試漕守之臣及考校官十年省試命大院別院監試官於坐圖未定之先親監分布坐次嚴禁書鋪等人不許縱容士子拋離座案過越廊分為傳義假手之地時成都已歸附我朝殿試擬五月五日以蜀士至者絶少展至末旬又因覆試特奏名至部猶少展作六月七日近臣以隆暑為請復命立秋後擇日七月八日度宗崩竟不畢試嗣君即位下禮部討論援引皆未當既不可謂之亮陰又不可不赴廷對乃倣召試館職之制而行之新進士舊有期集渡江後置局於禮部貢院特旨賜餐錢唱第之三日赴焉上三人得自擇同升之彥分職有差朝謝後拜黃甲其儀設褥于堂上東西相向皆再拜拜已擇榜中年長者一人狀元拜之復擇最少者一人拜狀元所以侈寵靈重年好明長少也制舉無常科所以待天下之才傑天子每親策之然宋之得才多由進士而以是科應詔者少惟召試館職及後來博學宏詞而得忠鯁文學之士或起之山林或取之朝著召之州縣多至大用焉太祖始置賢良方正能直言極諫經學優深可為師法詳間吏理達於教化凡三科不限前資見任職官黃衣草澤悉許應詔對策三千言詞理俱優則中選乾德初以郡縣亡應令者慮有司舉賢之道或未至也乃詔許士子詣闕自薦四年有司僅舉直言極諫一人堪為師法一人召陶穀等發策帝親御殿臨視之給硯席坐于殿之西隅及對策詞理疏闊不應所問賜酒饌宴勞而遣之開寶八年詔諸州察民有孝弟力田奇才異行或文武材幹年二十至五十可任使者具送闕下如無人塞詔亦以實聞九年諸道舉孝弟力田及有才武者凡七百四十人詔翰林學士李昉等於禮部試其業一無可采而濮州以孝悌薦名者三百七十人帝駭其多召對講武殿率不如詔猶自陳素習武事復試以騎射輒顛隕失次帝紿曰是宜隸兵籍皆號呼乞免乃悉罷去詔劾本部濫舉之罪咸平四年詔學士兩省御史臺五品尚書省諸司四品以上於內外京朝幕府州縣官草澤中各舉賢良方正一人不得以見任轉運使及館閣職事人應詔是年策祕書丞查道等七人皆入第四等景德二年增置博通墳典達於教化才識兼茂明於體用武足安邊洞明韜略運籌決勝軍謀宏遠材任邊寄等料詔中書門下試察其才具名聞奏將臨軒親策之自是應令者寖廣而得中高等亦少太宗以來凡特旨召試者於中書學士舍人院或特遣官專試所試詩賦論頌策制誥或三篇或一篇中格則授以館職景德後惟將命為知制誥者乃試制誥三道每道百五十字東封及祀汾陰時獻文者多試業得官蓋特恩也時言者以為兩漢舉賢良多因兵荒災變所以詢訪闕政今國家受瑞登封無闕政也安取此乃罷其科惟吏部設宏詞拔萃平判等科如舊制仁宗初詔曰朕開數路以詳延天下之士而制舉獨久不設意者吾豪傑或以故見遺也其復置此科於是增其名曰賢良方正能直言極諫科博通墳典明於教化科才識兼茂明於體用科詳明吏理可使從政科識洞韜略運籌帷幄科軍謀宏遠材任邊寄科凡六以待京朝之被舉及起應選者又置書判拔萃科以待選人又置高蹈丘園科沉淪草澤科茂材異等科以待布衣之被舉者其法先上藝業于有司有司較之然後試祕閣中格然後天子親策之治平三年命宰執舉館職各五人先是英宗謂中書曰水潦為災言事者云咎在不能進賢何也歐陽修曰近年進賢路狹往時入館有三路今塞其二矣進士高科一路也大臣薦舉一路也因差遣例除一路也往年進士五人以上皆得試第一人及第不十年有至輔相者今第一人兩任方得試而第二人以下不復試是高科路塞矣往時大臣薦舉即召試今只令上簿候缺人乃試是薦舉路塞矣惟有因差遣例除者半是年勞老病之人此臣所謂薦舉路狹也帝納之故有是命韓琦曾公亮趙概等舉蔡延慶以下凡二十人皆令召試宰臣以人多難之帝曰既委公等舉之苟賢豈患多也先召試蔡延慶等十人餘須後時神宗以進士試策與制科無異遂詔罷之試館職則罷詩賦更以策論元祐二年復制科凡廷試前一年舉奏官具所舉者策論五十首奏上而次年試論六首御試策一道召試除官推恩略如舊制右正言劉安世建言祖宗之待館職也儲之英傑之地以飭其名節觀以古今之書而開益其聰明稍優其廩不責以吏事所以滋長德器養成名卿賢相也近歲其選寖輕或緣世賞或以軍功或酬聚斂之能或徇權貴之薦未嘗較試遂獲貼職多開幸門恐非祖宗德意望明詔執政詳求文學行誼審其果可長育然後召試非試毋得輒命庶名器重而賢能進三年乃詔大臣奏舉館職並如舊召試除授惟朝廷特除不用此令安世復奏曰祖宗時入館鮮不由試惟其望實素著治狀顯白或纍持使節或移鎮大藩欲示優恩方令貼職今既過聽臣言追復舊制又謂朝廷特除不在此限則是人材高下資歷深淺但非奏舉皆可直除名為更張弊源尚在願倣故事資序及轉運使方可以特命除授庶塞僥幸以重館職之選紹聖初哲宗謂制科試策對時政得失進士策亦可言因詔罷制科既而三省言今進士純用經術如詔誥章表針銘賦頌赦敕檄書露布誡諭其文皆朝廷官守日用不可闕且無以兼收文學博異之士遂改置宏詞科歲許進士及第者詣禮部請試如見守官則受代乃請率以春試上舍生附試不自立院也試章表露布檄書用駢儷體頌針銘誡諭序記用古體或駢儷惟詔誥赦敕不以為題凡試二日四題試者雖多取毋過五人中程則上之三省覆試之分上中二等推恩有差詞藝超異者奏取旨命官大觀四年詔宏詞科格法未詳不足以致文學之士改立詞學兼茂科歲附貢士院試取毋過三人政和增為五人不試檄書增制誥以歷代史事借擬為之中格則授館職宰臣執政親屬毋得試宣和罷試上舍乃隨進士試于禮部紹興元年初復館職試凡預召者學士院試時務策一道天子親覽焉然是時校書多不試而正字或試或否二年詔舉賢良方正能直言極諫科一遵舊制自尚書兩省諫議大夫以上御史中丞學士待制各舉一人凡應詔者先具所著策論五十篇繳進兩省侍從參考之分為三等次優以上召赴祕閣試論六首於九經十七史七書國語荀揚管子文中子內出題學士兩省官考校御史監之四通以上為合格仍分五等入四等以上者天子親策之第三等為上恩數視廷試第一人第四等為中視廷試第三人皆賜制科出身第五等為下視廷試第四人賜進士出身不入等者與簿尉差遣已仕者則進官與升擢七年以太陽有異令中外侍從各舉能直言極諫一人是冬呂祉舉選人胡銓汪藻舉布衣劉度即除銓樞密院編修官而度不果召自是詔書數下未有應者孝宗乾道二年苗昌言奏國初嘗立三科真宗增至六科仁宗時並許布衣應詔於是名賢出焉請參稽前制間歲下詔權於正文出題不得用僻書注疏追復天聖十科開廣薦揚之路振起多士積年委靡之氣遂詔禮部集館職學官雜議皆曰注疏誠可略科目不必廣天下之士屏處山林滯迹遐遠侍從之臣豈能盡知遂如國初之制止令監司守臣解送七年詔舉制科以六論增至五通為合格始命官糊名謄録如故事試院言文卷多不知題目所出有僅及二通者帝命賜束帛罷之舉官皆放罪舊試六題一明一暗時考官命題多暗僻失求言之意臣僚請遵天聖元祐故事以經題為第一篇然後雜出九經語孟內注疏或子史正文以見尊經之意從之初制科取士必以三年十一年詔自今有合召試者舉官即以名聞明年春李巘言賢良之舉本求讜言以裨闕政未聞責以記誦之學使才行學識如朝董之倫雖注疏未能盡記於治道何損帝以為然乃復罷注疏高宗立博學宏詞科凡十二題制誥詔表露布檄針銘記贊頌序內雜出六題分為三場每場體製一古一今遇科場年應命官除歸明流外入資及犯贓人外公卿子弟之秀者皆得試先投所業三卷學士院考之拔其尤者召試定為三等上等轉一官選人改秩無出身人賜進士及第並免召試除館職中等減三年磨勘與堂除無出身人賜進士出身下等減二年磨勘無出身人賜同進士出身並許召試館職南渡以來所得之士多至卿相翰苑者理宗嘉熙三年臣僚奏詞科實代王言久不取人日就廢弛蓋試之太嚴故習之者少今欲除博學宏詞科從舊三歲一試外更降等立科止試文辭不貴記問命題止分兩場引試須有出身人就禮部投狀獻所業如試教官例每一歲附銓闈引試惟取合格不必拘額中選者與堂除教授已係教官資序及京官不願就教授者京官減磨勘選人循一資他時北門西掖南宮舍人之任則擇文墨超卓者用之其科目則去宏博二字止稱詞學科從之淳祐初罷景定二年復嘉熙之制初內外學官多朝廷特注後稍令國子監取其舊試藝等格優者用之熙寧八年始立教授試法即舍人院召試大義五道元豐七年令諸州無教官則長吏選在任官上其名而監學審其可者使兼之元祐中罷試法已而論薦益衆乃詔須命舉乃得奏紹聖初三省立格中制科及進士甲第禮部奏名在上三人府監廣文館第一人從太學上舍得第皆不待試餘召試兩經大義各一道合格則授教官元符中增試三經政和二年臣僚言元豐召試學官六十人而所取四人皆知名之士故學者厭服近試率三人取一今欲十人始取一人以重其選從之自是或如舊法中書選注又嘗員外添置八行應格人為大藩教官不以涖職隨廢或用元豐試法更革無常高宗初年復教官試紹興中議者謂欲為人師而自獻以求進非禮也乃罷試而自朝廷選差已而又復之凡有出身者許應先具經義詩賦各三首赴禮部乃下省闈分兩場試之初任為諸州教官由是為兩學之選十五年從國子監丞文浩所言於六經中取二經各出兩題毋拘義式以貫穿該贍為合格其後四川制置司遇類省試年亦倣禮部附試自嘉泰元年始凡童子十五歲以下能通經作詩賦州升諸朝而天子親試之其命官免舉無常格真宗景德二年撫州晏殊大名府薑蓋始以童子召試詩賦賜殊進士出身蓋同學究出身尋復召殊試賦論帝嘉其敏贍授祕書正字後或罷或復自仁宗即位至大觀末賜出身者僅二十人建炎二年用舊制親試童子召見朱虎臣授官賜金帶以寵之後至者或誦經史子集或誦御製詩文或誦兵書習步射其命官免舉皆臨期取旨無常格淳熙中王克勤始以程文求試內殿引見孝宗嘉其警敏補從事郎令祕閣讀書會禮部言本朝童子以文稱者楊億宋綬晏殊李淑後皆為賢宰相名侍從今郡國舉貢問其所能不過記誦宜稍艱其選八年始分為三等凡全誦六經孝經語孟及能文如六經義三道語孟義各一道或賦一道詩一首為上等與推恩誦書外能通一經為中等免文解兩次止能誦六經語孟為下等免文解一次覆試不合格者與賜帛寧宗嘉定十四年命歲取三人期以季春集闕下先試于國子監而中書覆試之為永制焉理宗後罷此科須卓絶能文者許諸郡薦舉科目既設猶慮不能盡致天下之才或韜晦而不屑就也往往命州郡搜羅而公卿得以薦言若治平之黃君俞熙寧之王安國元豐則程頤元祐則陳師道元符則徐積皆卓然較著者也熙寧三年諸路搜訪行義為鄉里推重者凡二十有九人至則館之太學而劉蒙以下二十二人試舍人院賜官有差亦足以見幽隱必達治世之盛也其後應詔者多失實而朝廷亦厭薄之高宗垂意遺逸首召布衣譙定而尹焞以處士入講筵其後束帛之聘若王忠民之忠節張志行之高尚劉勉之胡憲之力學則賜出身俾教授本郡或賜處士號以寵之所以振清節厲頽俗如徐庭筠之不出蘇雲卿之晦迹世尤稱焉寧宗慶元間蔡元定以高明之資講明一代正學以尤袤楊萬里之薦召之固以疾辭竟以偽學貶死衆咸惜之理度以後國勢日迫賢者肥遁迄無聞焉
