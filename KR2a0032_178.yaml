body:
  text: 宋史卷一百七十八志第一百三十一食貨上六役法下振恤役法中書舍人蘇軾在詳定役法所極言役法可雇不可差第不當於雇役實費之外多取民錢若量入為出不至多取則自足以利民司馬光不然之光言差役已行續聞有命雇募不足方許定差屢有更張號令不一又轉運使欲合一路共為一法不令州縣各從其宜或已受差却釋役使去或已辭雇却復拘之入役或仍舊用錢招雇或不用錢白招紛紜不定寖違本意遂條舉始奏之文嘗許州縣監司陳列宜否自今外官苟見利否縣許直上轉運司州許直奏使下情無壅詳定所第當稽閲監司州縣所陳詳定可否非其任職而務出奇論不切事情者勿用亦不可以一路一州一縣土風利害概行天下從之未幾詔諸路坊郭五等以上及單丁女戶官戶寺觀第三等以上舊輸免役錢者並減五分餘戶等下此者悉免輸仍自元祐二年始凡支酬衙前重難及綱運公皂迓送𧹞錢用坊場河渡錢給賦不足方得於此六色錢助用而有餘封樁以備不時之須臣僚上言朝廷雖立差法而明許民戶雇代州縣多已施行近命弓手須正身恐公私未便詔不願身自任役許募嘗為弓手而有勞效者雇直雖多毋踰元募之數御史中丞劉摯言弓手不可不用差法者蓋鄉人在役則不獨有家丁子弟之助至於族姻鄉黨莫不與為耳目有捕輒獲又土著自重無逃亡之患自行雇募盜寇充斥蓋浮惰不能任責故也如五路弓手熙寧未變法前身自執役最號彊徑其材藝捕緝勝於他路近日復差不聞有不樂而願出錢雇人惟是川蜀江浙等路昨升差上一等戶皆習於驕脆不肯任察捕之責欲乞五路必差正身餘路即用新敕釐為三色舊有戶等已嘗受差者曾有戰鬥勞效應留者願雇人代己者立此三色所冀新舊相兼漸習禦捕侍御史王巖叟亦言雇代恐不能任事略與摯同監察御史上官均言役之最重莫如衙前其次弓手今東南長名衙前招募既足所差不及上戶上戶必差弓手則是以上戶就中戶之役實為優幸上戶産厚而役輕下戶産薄而無役然則所當補恤正在中戶今若增上戶役年使中戶番休稍久則補除相均矣又言近許當差弓手戶役得雇人為代此法最便議者謂身任其役則自愛而重犯法熙寧募法久行何嘗聞盜賊充斥彼自愛之民承符帖追逮則可俾之與賊角死豈其能哉兩浙諸路以法案差弓手必責正身至有涕泣辭免者此豈可恃以為用哉今既立法許雇嘗為弓手而有勞效之人比之泛募宜有間矣殿中侍御史呂陶謁告歸成都因令與轉運司議定役法後議立增減役年之法曰戶多之鄉以十二年戶少以九年而應差之戶通輪一周以一周月日而參之戶等戶稅多者占役之日多少者以率減下則均適無頗矣雖以等周差皆許募人為代如此則四等往往少差而五等差所不及矣衙前悉令招募以坊場錢支酬重難此法為允當是時議役法者皆下之詳定所久不能決於是文彥博言差役之法置局衆議命令雜下致久不決於是詔罷詳定局役法專隸戶部諫議大夫鮮于侁言開封府多官戶祥符縣至闔鄉止有一戶應差請裁其濫凡保甲之授班行者如進納人例須至升朝方免色役舊法戶賦免役錢及三百緡者令仍輸錢免役侍御史王巖叟謂此法不見其利借如兩戶其一輸錢及三百千其一及二百八九十千相去幾何而應差者三年五年即得休息其應輸助者畢世入錢無有已時非至破家終不得免此其勢必巧為免計有弟兄則析居不則減賣其業但少降三百千之數則遂可免不出二三年高彊戶皆成中戶其後又詔舊輸免役錢戶及百千以上令如六色戶輸錢助役蓋欲以其錢廣雇使番休優久凡戶少之鄉應差不及三番者許以六色錢募州役尚不及兩番則申戶部移用他州錢以紓差期鄉戶衙前受役當休無代即如募法給雇食之直若願就投募者仍免本戶身役不願者速募人代之元祐三年翰林學士兼侍讀蘇軾言差役之法天下皆云未便昔日雇役中戶歲出幾何今者差役中戶歲費幾何更以幾年一役較之約見其數則利害灼然而况農民在官官吏百端蠶食比之雇人苦樂十倍五路百姓朴拙間遇差為胥吏又須轉雇慣習之人尤為患苦尋詔郡縣各具差役法利害條析以聞四年右正言劉安世言御史中丞李常請復雇募懷姦害政先是常言差法詔下民知更不輸錢嘗歡呼相慶行之既久始覺不輸錢為害何也差法廢久版籍不明重輕無準鄉寬戶多者僅得更休鄉狹戶窄者頻年在役上戶極等昔有歲輸百千至三百千者今止差為弓手雇人代役歲不過用錢三四十千中下戶舊輸錢不過三二千而今所雇承符散從之類不下三十千然則今法徒能優便上戶而三等四等戶困苦日甚望詔一二練事臣僚使與賦臣取差雇二法便於百姓者行之無牽新書無執舊說民以為善斯善矣而安世則以責民出錢為非乞固守差役初議故以常為罪知杭州蘇軾亦言改行差法則上戶之害皆去獨有三等人戶方雇役時戶歲出錢極不過三四千而今一役二年當費七十餘千休間不過六年則是八年之中昔者徐出三十餘千而今者併出七十餘千苦樂可知朝廷既取六色錢許用雇役以代中戶頗除一害以全二利今惟狹鄉戶少役者替間不及三番方得用六色錢募人以代州役此法未允何者百姓出錢本為免役今乃限以番次不許盡用留錢在官其名不正又所雇者少未足以紓中戶之勞又投名衙前不足元額而鄉差衙前又當更代即又別差更不支錢若願就長名則支酬重難盡以給之仍計日月除其戶役及免助役錢二十千及州役惟吏人衙前得皆雇募此外悉用差法如休役未及三年即以助役錢支募此法尤為未通自元豐前不聞天下有闕額衙前者豈嘗抑勒直以重難月給可以足用故也當時奉使如李承之之徒所至已輒減刻元祐改法又行減削既多不支月給如何肯就招募今不循其本乃欲重困鄉差全不支錢而應募之人盡數支給又放免役錢二十貫欲以誘脅盡令應募何如直添重難月給令招募得行乞促招闕額長名衙前刻期須足如合增錢雇募上之監司議定即行役率以二年為一番向來尚許一戶歇役不及三番則令雇募是欲百姓空間六年今忽減作三年幸六色錢足用有餘正可加添番數而乃減番添役農民皆紛然妄謂朝廷移此錢他之雖云量留一分備用若有餘剩數却量減下無丁戶及女戶所敷役錢此乃空言無實丁口産稅開收增減年年不同如何前知來年應用而預為樁科若亟行減下臨期不足又須增取吏緣為姦不可勝防矣大抵六色錢以免役取當於雇役乎盡之然後名正而人服惟有一事不得不慮州縣六色錢多少不同若各隨多少以為之用則敷錢多處役戶優間太久六色人戶反覺敷錢數多欲乞今後六色錢常存一年備用之數而會計歲所當用以贏餘而通一路酌人戶貧富色役多少預行品配以一路六色錢通融分給令州縣盡用雇人以本處色役輕重為先後如此則錢均而無弊雇人稍廣中戶漸蘇則差役良法可以久行而不變矣是時論役法未便者甚衆五年再詔中書舍人王巖叟樞密都承旨韓川諫議大夫點檢戶曹文字劉安世同看詳利害戶部請河北河東陝西鄉差衙前以投募人所得雇直為則而減半給之投名衙前惟差耆長他役皆免六年三省援三路投募衙前役例概行他路詔凡投募人免其戶二等已下色役鄉差人戶悉用投名人代之願長投募者聽又詔諸州衙前已許量支雇直餐錢慮費廣難支轉運提刑司其隨土俗參酌立定優重分數及月給餐錢用支酬額錢給之不得過舊法元數州役之應鄉差者若一鄉人戶終役皆未及四年許以助役錢募人為之總計一州雇直其助役錢不足用即於戶狹役煩鄉分先與雇代一役役竟按籍復差如初諸州歲計助役錢常留一分外以雇直對計或闕或剩提刑司通一路移用應差諸縣手力合一鄉休役皆不及三年者亦許用助役錢雇募既終一役別有間及三年者復行差法諸州縣置差役都鼠尾簿取民戶稅産物力高下差取分五等排定而疏其色役年月及其更代人姓名於逐戶之下每遇差役即按籍自上而下吏毋得移竄先後坊場河渡錢以雇衙前而有寬剩亦令補助其餘役人三省言朝廷審定民役差募兼行斟酌補除極為詳備而州縣不盡用助役錢募人以補頻役之地今括具綱目下之州縣使恪承之其一曰應差之戶三等以上許休役四年四等以下許休役六年若戶少無與更代卸役不及應間年數即用助役錢募人代役以足之其二曰狹鄉之縣役人除衙前州胥許雇壯丁直差不雇外凡州縣役人皆許招募以就募月日補除應差而間不及四年六年之人使及年數每縣通計應差應募役數若干立定二額差者訖役以應差人承之雇者有闕別募人充數二額悉已立定如戶力應升應降須俟三年造簿日按籍別定未應造簿止憑定額為準若本等戶少不充州縣合役之數即用次等戶之物力及本等七分者為之其三曰寬鄉之縣除已雇衙前州胥外餘役皆以序按差其四曰官雇弓手先雇嘗充弓手之人如不足以武勇有雇籍者充他役人願就雇其選受亦如之其五曰壯丁皆按戶版簿名次實輪充役半年而更其六曰一州一路有狹鄉役頻縣分募錢不足提刑司以一路助役寬剩錢通融移用又不足以坊場河渡寬剩錢給之仍通紐一歲應用支酬衙前之類費錢若干而十分率之每年於寬剩數內更留二分以備支酬衙前之類樁留至五年通迭一全年寬剩總額即止不樁又不足戶部以別路逐色寬剩錢移用以補足之其七曰助錢歲歲樁留一分每及五分止或時支用即隨撥補使常足五分之數其八曰軍人應差迓送者本以代有雇錢役人其沿迓送軍人有費提刑司計數歸之轉運司其九曰重役人應替而願仍就募者許給雇錢受役其十曰役人須有稅産乃得就募其有蔭應贖及曾犯徒刑雖願募不雇若工藝人須有資産人二戶任之雇直雖多皆不得加于舊法已募之數其十一曰陝西鎮戎德順軍熙州衙前皆受田于官以當募直內地戶願如其法應田募者聽之仍以坊場河渡錢補還轉運司合輸租課凡縣歲具色役輕重鄉分寬狹凡役雇直有無餘缺各以其實枚別而上之州州上監司監司聚議連書上戶部仍別具一路移用及寬剩縣分錢數致之戶部先是收到官田嘗令田已籍于官及見佃人逃亡悉拘入之留充雇募衙前至是遂參行田募之法八年詔耆長壯丁役期已足不許連續為之蓋知其利於賕請不願更罷故也民有執父母喪而應在役者三等以下戶除之二等以上戶令量納役錢在戶錢十分止責輸三分服除日仍舊哲宗始親政三省言役法尚未就緒帝曰第行元豐舊法而減去寬剩錢百姓何有不便范純仁曰四方異宜須因民立法乃可久也遂令戶部議之右司諫朱勃言輸錢免役有過數多敷者用錢雇役有立直太重者役色之內又有優便而願自投募不必給雇者請詳為裁省中書言自行差法十年民間苦於差擾前後議者紛紜更變不一未有底止於是詔復免役法凡條約悉用元豐八年見制鄉差役人有應募者可以更代即罷遣之許借坊場河渡及封樁錢以為雇直須有役錢日補足其數所輸免役錢自今年七月始耆戶長壯丁召雇不得已保正保長保丁充代其他役色應雇者放此所敷寬剩錢不得過一分昔常過數今應減下者先自下五等人戶始路置提舉官一員視提刑置司之州為治如方俗利害不同事有未盡未便而應更改增損舊法者畫一條疏與轉運提刑司連奏又詔用舊法取量添酒錢贏數給推法司吏餐錢不足則抵當息錢亦許貼用先嘗以七月起輸其後又自來年始土俗差雇不一姑仍其舊俟起輸至五月盡行雇法凡因差在役者悉罷遣之舊免役法行壯丁間有差而不募者其毋敷役錢如故凡錢額所敷取三年雇直實支而酌一年中數立為歲額以均敷取此外所取寬餘不得過通額十分之一免役錢方復未輸且以助役錢給雇直不足雖免役寬剩錢亦許給用七月戶部看詳役法所言幕職監當官之官罷官依元豐制悉用雇役人迓送而差定其數凡元祐溢額所添廂軍皆罷減其有抑鄉差之人仍舊在役或改易名字就便應募悉計其在役月日應得更代者以次蠲遣之諸路舊立出等高彊戶戶力轉高敷取難勝應出免役錢百千以上每纍及百千悉與減免三分凡人戶匿寄財産假借戶貫冒名官戶苟可避免等第科配者各以違制論許人陳告以其半給之元豐令在籍宗子及太皇太后皇后緦麻親得免役皇太妃宜亦如之詔皆如請舊戶等簿如略可憑即用之若漫滅等第即雖未及應造之年亦令改造戶部舉行元豐條制以保正長代耆長甲頭代戶長承帖人代壯丁二年申詔諸路役人額數雇直並依元豐舊制仍依已命寬剩錢不得過一分常平免役元豐止用提舉官專領轉運提刑司自今毋預其事舊置重修編敕所看詳中外文字本以去年所差鄉役未盡善遂入議曰都副保正比耆長事責已輕又有承帖人受行文書即大保長苦無公事元豐本制一都之內役者十人副正之外八保各差一大長今若常輪二大長分催十保稅租常平錢物一稅一替則自不必更輪保丁充甲頭矣凡都保所雇承帖人必選家於本保者而雇直皆從官給一年一替則自無浮浪稽留符移之弊承帖雇直固有舊數其今所雇保正之直視耆長保長之直則視戶長若應此三役不願替代者自從其願壯丁元不敷雇直處聽如其舊承帖雇錢許以舊寬剩錢通融支募如土俗有不願就保正長雇役者許募本土有産稅戶使為耆長壯丁以代之其所雇耆戶長已立法不得抑勒矣若保正長不願就雇而輒差雇者從徒二年坐罪詔皆從之三年左正言孫諤言役法之行在官之數元豐多元祐省雖省未嘗廢事則多不若省雇役之直元豐重元祐輕雖輕未嘗不應募則重不若輕今役法優下戶使弗輸而盡取諸上戶意則美矣而法未善也夫先帝建免役之法而熙寧元豐有異論元祐有更變正惟不能無弊爾願無以元豐元祐為間期至於均平便民而止則善矣翰林學士蔡京言諤之論多省輕重明有抑揚謂元豐不若元祐明矣諤於陛下追紹之日敢為此言臣竊駭之免役法復行將及一年天下吏習而民安之而諤指以為弊則所詆者熙寧元豐也且元豐雇法也元祐差法也雇與差不可並行元祐固嘗兼雇已紛然無紀矣而諤欲不間熙祐是欲伸元祐之姦惑天下之聽詔罷諤正言黜知廣德軍後又詔諸縣無得以催稅比磨追甲頭保長無得以雜事追保正副在任官以承帖為名占破當直者坐贓論所管催督租賦州縣官輒令陪備輸物者以違制論是歲以常平免役農田水利保甲類著其法總為一書名常平免役敕令頒之天下詔翰林學士承旨兼詳定役法蔡京依舊詳定重修敕令侍御史董敦逸言京在元祐初知開封府附司馬光行差法祥符一縣數日間差至一千一百人乞以役法專委戶部詔令疏析京奏上復令敦逸自辨京無責焉元符二年以蕭世京張行為郎二人在元祐中皆嘗言免役法為是帝出其疏擢之既而詔河北東西淮南運司府界提點司如人戶已嘗差充正夫其免夫錢皆罷催後又詔雖因邊事起差夫丁須以應差雇實數上之朝廷未得輒差其河防並溝河歲合用一十六萬八千餘夫聽人戶納錢以免建中靖國元年戶部奏京西北路鄉書手雜職斗子所由庫稱揀搯之類土人願就募不須給之雇直他路亦須詳度施行詔從之知延安府范純粹言比年衙前公盜官錢事發即逃乞許輪差上等鄉戶使供衙役殿中侍御史彭汝霖劾純粹所言有害良法宜加黜責詔純粹所乞不行其後知襄州俞石函以襄州總受他州布綱而轉致他州是衙前重役併在一州事理不均臣僚謂石函輒毀紹聖成法請重黜石函坐責授散官安置太平州崇寧元年尚書省言前令大保長催稅而不給雇直是為差役非免役也詔提舉司以元輸雇錢如舊法均給永興軍路州縣官乞復行差役湖南江西提舉司以物賤乞減吏胥雇直罷給役人雇錢皆害法意應改從其舊詔戶部並遵奉紹聖常平免役敕令格式及先降紹聖簽貼役法行之天下二年臣僚言常平之息歲取二分則五年有一倍之數免役剩錢歲取一分則十年有一年之備故紹聖立法常平息及一倍免役寬剩及三料取旨蠲免以明朝廷取於民者非以為利也而集賢殿修撰知鄧州呂仲甫前為戶部侍郎輒以狀申都省乞刪去上條詔黜仲甫落職知海州後又詔常平司候豐衍有餘日具此制奏蠲之大觀元年詔諸州縣召募吏人如有非四等以上戶及在州縣五犯杖罪悉從罷遣不得再占諸處名役別募三等以上人充於是舊胥既盡罷而弊根未革老姦巨猾匿身州縣舞法擾民蓋甚前日其後又不許上三等人戶投充弓手所募皆浮浪無所顧藉盜賊公行為害四方至是復詔州縣募役依元豐舊法政和元年臣僚言元豐中鞏州歲敷役錢止四百千今纍敷至緡錢近三萬又元豐八年命存留寬剩錢毋得過二分紹聖再加裁定止許存留一分此時考詳法意非取寬剩遂改名準備錢而嚴立禁約若擅增敷歲額及樁留準備過數者並以違制論今乞飭提舉常平官檢察及核究鞏州取贏之因以聞從之宣和元年言者謂役錢一事神宗首防官戶免多特責半輸今比戶稱官州縣募役之類既不可減顧令官戶所減之數均入下戶下戶於常賦之外又代官戶減半之輸豈不重困詔自今二等以上戶因直降指揮非泛補官者輸賦差料免役並不得視官戶法減免已免者改之進納人自如本法保長月給雇錢督催稅賦比年諸縣或每稅戶一二十家又差一人充甲頭及催稅人十日一進赴官比磨求取決責有害良民詔禁之七年詔州縣昨因警察私鑄令五家為保城郭亦差坊正副領受文書由此追呼陪費或析居逃移以避差使其所置坊正副可罷自紹聖復雇役而建炎初罷之已而討論其法之不可廢也參政李回言於高宗曰常平法本於漢耿壽昌豈可以王安石而廢之且當時招射士無以供庸直詔官戶役錢勿減半民戶役錢概增三分後復減之兼官舊給庸錢以募戶長及立保甲則儲庸錢以助經費未幾廢保甲復戶長而庸錢不復給遂為總制窠名焉然役起於物力物力升降不殽則役法公是以紹興以來講究推割推排之制凡百姓典賣産業稅賦與物力一併推割至於推排則因其資産之進退為之升降三歲而一行之然當時之弊或以小民粗有米粟僅存室廬凡耕耨刀斧之器雞豚犬彘之畜纖微細瑣皆得而籍之吏視賂之多寡為物力之低昂上之人憂之於是又為之限制除質庫房廊停塌店鋪租牛賃船等外不得以猪羊雜色估計其後並耕牛租牛以免之若江之東西以畝頭計稅亦有不待推排者保正長之立也五家相比五五為保十大保為都保有保長有都副保正餘及三保亦置長五大保亦置都保正其不及三保五大保者或為之附庸或為之均並不一也戶則以物力之高下為役次之久近若夫品官之田則有限制死亡子孫減半蔭盡差役同編戶一品五十頃二品四十五頃三品四十頃四品三十五頃五品三十頃六品二十五頃七品二十頃八品十頃九品五頃封贈官子孫差役亦同編戶謂父母生前無官因伯叔或兄弟封贈者凡非泛及七色補官不在限田免役之數其奏薦弟姪子孫原自非泛七色而來者仍同差役進納軍功捕盜宰執給使減年補授轉至升朝官即為官戶身亡子孫並同編戶太學生及得解及經省試者雖無限田許募人充役單丁女戶及孤幼戶並免差役凡無夫無子則為女戶女適人以奩錢置産仍以夫為戶其合差保正長以家業錢數多寡為限以限外之數與官編戶輪差總首部將免保正長差役文州義士已免之田不許典賣老疾身亡許承襲凡募人充役並募土著之人其放停兵及嘗為公人者並不許募既有募人官不得復追正身募人憑藉官勢姦害善人斷罪外坐募之者高宗在河朔親見閭閻之苦嘗歎知縣不得人一充役次即便破家是以講究役法甚備乾道五年處州松陽縣倡為義役衆出田穀助役戶輪充自是所在推行十一年御史謝諤言義役之行當從民便其不願者乃行差役上然之朱熹謂義役有未盡善者四事蓋始倡義役者惟恐議之未詳慮之未周而踵之者不能皆善人於是其弊日開其流日甚或以材智把握而專義役之利或以氣力凌駕而私差役之權是以虐貧優富凌寡暴孤義役之名立而役戶不得以安其業雇役之法行而役戶不得以安其居信乎所謂未盡善之弊也淳熙五年臣僚奏令提舉官歲考屬邑差役當否以詞訟多寡為殿最令役戶輪管以提其役置募人以奉官之行移則公私便而義役立矣慶元二年吏部尚書許及之因淳熙陳居仁所奏取祖宗免役舊法及紹興十七年以後續降旨符修為一書名曰役法撮要五年書成左丞相京鏜上之其法可以悠久其或未久而輒弊者人也振恤水旱蝗螟饑疫之災治世所不能免然必有以待之周官以荒政十有二聚萬民是也宋之為治一本於仁厚凡振貧恤患之意視前代尤為切至諸州歲歉必發常平惠民諸倉粟或平價以糶或貸以種食或直以振給之無分於主客戶不足則遣使馳傳發省倉或轉漕粟於他路或募富民出錢粟酬以官爵勸諭官吏許書曆為課若舉放以濟貧乏者秋成官為理償又不足則出內藏或奉宸庫金帛鬻祠部度僧牒東南則留發運司歲漕米或數十萬石或百萬石濟之賦租之未入入未備者或縱不取或寡取之或倚閣以須豐年寬逋負休力役賦入之有支移折變者省之應給蠶鹽若和糴及科率追呼不急妨農者罷之薄關市之征鬻牛者免算運米舟車除沿路力勝錢利有可與民共者不禁水鄉則蠲蒲魚果蓏之稅選官分路巡撫緩囚繫省刑罰飢民劫囷窖者薄其罪民之流亡者關津毋責渡錢道京師者諸城門振以米所至舍以官第或寺觀為淖糜食之或人日給糧可歸業者計日併給遣歸無可歸者或賦以間田或聽隸軍籍或募少壯興修工役老疾幼弱不能存者聽官司收養水災州縣具船拯民置之水不到之地運薪糧給之因饑疫若厭溺死者官為埋祭厭溺死者加賜其家錢粟京師苦寒或物價翔踊置場出米及薪炭裁其價豫民前後率以為常蝗為害又募民撲捕易以錢粟蝗子一升至易菽粟三升或五升詔州郡長吏優恤其民間遣內侍存問戒監司俾察官吏之老疾罷磱不任職者初建隆三年戶部郎中沈義倫使吳越還言揚泗飢民多死郡中軍儲尚百餘萬斛宜以貸民有司沮之曰若來歲不稔誰任其咎義倫曰國家以廩粟濟民自當召和氣致豐年寧憂水旱耶太祖悅而從之四年詔州縣興復義倉歲收二稅石別收一斗貯以備凶歉平廣南江南輒詔振其饑其勤恤遠人德意深厚太宗恭儉仁愛諄諄勸民務農重穀毋或妄費是時惠民所積不為無備又置常平倉乘時增糴唯恐其不足真宗繼之益務行養民之政於是推廣淳化之制而常平惠民倉殆遍天下矣仁宗英宗一遇災變則避朝變服損膳徹樂恐懼修省見於顏色惻怛哀矜形於詔旨慶曆初詔天下復立義倉嘉祐二年又詔天下置廣惠倉使老幼貧疾者皆有所養纍朝相承其慮於民也既周其施於民也益厚而又一時牧守亦多得人如張詠之治蜀歲糶米六萬石著之皇祐甲令富弼之移青州擇公私廬舍十餘萬區散處流民以廩之凡活五十餘萬人募而為兵者又萬餘人天下傳以為法知鄆州劉夔發廩振飢民賴全活者甚衆盜賊衰止賜詔褒美知越州趙抃揭榜於通衢令民有米增價以糶於是米商輻湊越之米價頓減民無飢死若是之政不可悉書故於先王救荒之法為略具焉神宗即位以來河北諸路水旱荐臻兼發糴便司廣惠倉粟以振民熙寧二年賜判北京韓琦詔曰河北歲比不登水溢地震方春東作民攜老幼棄田廬日流徙于道中夜以興慘怛不安其經制之方聽便宜從事有可以左右吾民者宜為朕撫輯而振全之毋使後時以重民困而王安石秉政改貸糧法而為借助移常平廣惠倉錢斛而為青苗皆令民出息言不便者輒得罪而民遂不聊生又詔賣天下廣惠倉田自是先朝良法美意所存無幾哲宗雖詔復廣惠倉既而章惇用事又罷之賣其田如熙寧法常平量留錢斛不足以供振給義倉不足又令通一路兌撥於是紹聖大觀之間直給空名告敕補牒賜諸路政日以隳民日以困而宋業遂衰先是仁宗在位哀病者乏方藥為頒慶曆善救方知雲安軍王端請官為給錢和藥豫民遂行於天下嘗因京師大疫命太醫和藥內出犀角二本析而視之其一通天犀內侍李舜舉請留供帝服御帝曰吾豈貴異物而賤百姓竟碎之又蠲公私僦舍錢十日令太醫擇善察脈者即縣官授藥審處其疾狀豫之無使貧民為庸醫所誤夭閼其生天禧中於京畿近郊佛寺買地以瘞死之無主者瘞尸一棺給錢六百幼者半之後不復給死者暴露於道嘉祐末復詔給焉京師舊置東西福田院以廩老疾孤窮丐者其後給錢粟者才二十四人英宗命增置南北福田院並東西各廣官舍日廩三百人歲出內藏錢五百萬給其費後易以泗州施利錢增為八百萬又詔州縣長吏遇大雨雪蠲僦舍錢三日歲毋過九日著為令熙寧二年京師雪寒詔老幼貧疾無依丏者聽於四福田院額外給錢收養至春稍暖則止九年知太原韓絳言在法諸老疾自十一月一日州給米豆至次年三月終河東地寒乞自十月一日起支至次年二月終止如有餘即至三月終從之凡魚衆寡孤獨癃老疾廢貧乏不能自存應居養者以戶絶屋居之無則居以官屋以戶絶財産充其費不限月依乞丏法給米豆不足則給以常平息錢崇寧初蔡京當國置居養院安濟坊給常平米厚至數倍差官卒充使令置火頭具飲膳給以衲衣絮被州縣奉行過當或具帷帳雇乳母女使糜費無藝不免率斂貧者樂而富者擾矣三年又置漏澤園初神宗詔開封府界僧寺旅寄棺柩貧不能葬令畿縣各度官不毛地三五頃聽人安厝命僧主之葬及三千人以上度僧一人三年與紫衣有紫衣與師號更使領事三年願復領者聽之至是蔡京推廣為園置籍瘞人並深三尺毋令暴露監司巡歷檢察安濟坊亦募僧主之三年醫愈千人賜紫衣祠部牒各一道醫者人給手曆以書所治痊失歲終考其數為殿最諸城寨鎮市戶及千以上有知監者依各縣增置居養院安濟坊漏澤園道路遇寒僵仆之人及無衣丏者許送近便居養院給錢米救濟孤貧小兒可教者令入小學聽讀其衣襴於常平頭子錢內給造仍免入齊之用遺棄小兒雇人乳養仍聽宮觀寺院養為童行宣和二年詔居養安濟漏澤可參考元豐舊法裁立中制應居養人日給粳米或粟米一升錢十文省十一月至正月加柴炭五文省小兒減半安濟坊錢米依居養法醫藥如舊制漏澤園除葬埋依見行條法外應資給若齊醮等事悉罷高宗南渡民之從者如歸市既為之衣食以振其飢寒又為之醫藥以救其疾病其有隕於戈甲斃於道路者則給度牒瘞埋之若丏者育之於居養院其病也療之於安濟坊其死也葬之於漏澤園歲以為常紹興以來歲有水旱發常平義倉或濟或糶或貸如恐不及然當艱難之際兵食方急儲蓄有限而振給無窮復以爵賞誘富人相與補助亦權宜不得已之策也元年詔出粟濟糶者賞各有差糶及三千石以上與守闕進義副尉一萬五千石以上與進武校尉二萬石以上取旨優賞已有官蔭不願補授者比類施行六年湖廣江西旱詔撥上供米振之婺民有遏糶致盜者詔閉糶者斷遣殿中侍御史周祕言發廩勸分古之道也許以斷遣恐貪吏懷私善良被害望戒守令多方勸諭務令樂從或有擾害提舉司劾奏從之是歲潼川守臣景興宗廣安軍守臣李瞻果州守臣王騭漢州守臣王梅活飢民甚衆前吏部郎中馮楫亦出米以助振給興宗升一職瞻騭梅楫各轉一官十年通判婺州陳正同振濟有方窮谷深山之民無不霑惠以其法下諸路二十八年夏浙東西田損於風水在法水旱及七分以上者振濟詔自今及五分處亦振之二十九年詔諸處守臣撥常平義倉米二分振糶臨安府撥樁積之米三十一年正月雪寒民多艱食詔臨安府並屬縣以常平米減時價之半振糶十日臨安府城內外貧乏之家人給錢二百米一斗及柴炭錢並於內藏給之凡遇寒遇暑遇雨遇火遇赦及祈禱即位生辰上尊號生皇子晏駕大祥之類臨安之民暨三衙諸軍時有振恤及放商稅公私房賃輔郡之民令諸州以常平錢依臨安府振之孝宗隆興二年秋霖雨害稼出內帑銀四十萬兩變糴以濟民乾道六年夏振浙西被水貧民七年八月湖南江西旱立賞格以勸積粟之家無官人一千五百石補進義校尉願補不理選限將仕郎者聽二千石補進武校尉進士與免文解一次四千石補承信郎進士與補上州文學五千石補承節郎進士補迪功郎文臣一千石減二年磨勘選人轉一官二千石減三年磨勘選人循一資各與占射差遣一次三千石轉一官選人循兩資各與占射差遣一次武臣一千石減二年磨勘選人轉一資二千石減三年磨勘選人循一資各與占射差遣一次三千石轉一官選人循兩資各與占射差遣一次五千石以上文武臣並取旨優與推恩九月臣僚言諸路旱傷請以檢放展閣責之運司糶給借貸責之常平覺察妄濫責之提刑體量措置責之安撫上諭宰執曰轉運司止令檢放恐他日振濟不肯任責虞允文奏曰轉運司主一路財賦謂之省計凡州郡有餘不足通融相補正其責也淳熙八年詔去歲江浙湖北淮西旱傷處已行振糶其魚衆寡孤獨貧不自存無錢收糴者濟以義米寧宗慶元元年以兩浙轉運副使沈詵言米價翔踴凡商販之家盡令出糶而告藏之令設矣嘉定十六年詔於楚州所儲米撥二萬石濟山東西淳熙八年浙東提舉朱熹言乾道四年民艱食熹請於府得常平米六百石振貸夏受粟於倉冬則加息計米以償自後隨年斂散歉蠲其息之半大饑即盡蠲之凡十有四年得息米造倉三間及以元數六百石還府見儲米三千一百石以為社倉不復收息每石只收耗米三升以故一鄉四五十里間雖遇凶年人不闕食請以是行於倉司時陸九淵在敕令局見之歎曰社倉幾年矣有司不復舉行所以遠方無知者遂編入振恤凡借貸者十家為甲甲推其人為之首五十家則擇一通曉者為社首每年正月告示社首下都結甲其有逃軍及無行之人與有稅錢衣食不闕者並不得入甲其應入甲者又問其願與不願願者開具一家大小口若干大口一石小口減半五歲以下不預請甲首加請一倍社首審訂虛實取人人手書持赴本倉再審無弊然後排定甲首附都簿載某人借若干石依正簿分兩時給初當下田時次當耘耨時秋成還穀不過八月三十日足濕惡不實者罰嘉定末真德秀帥長沙行之凶年饑歲人多賴之然事久而弊或移用而無可給或拘催無異正賦良法美意胥此焉失寶慶三年監察御史汪剛中言豐穰之地穀賤傷農凶歉之地濟糶無策惟以其所有餘濟其所不足則飢者不至於貴糴而農民亦可以得利乞申嚴遏糴之禁凡兩浙江東西湖南北州縣有米處並聽販鬻流通違許被害者越訴官按劾吏決配庶幾令出惟行不致文具從之端平元年六月臣僚奏建陽邵武羣盜嘯聚變起於上戶閉糴若專倚兵威以圖殄滅固無不可然振救之政一切不講饑饉所迫恐人懷等死之心附之者日衆欲望朝廷厲兵選士蕩定已竊發之寇發粟振饑懷來未從賊者之心庶人知避害賊勢自孤可一舉而滅矣此成周荒政散利除盜之說也八月以河南州軍新復令江淮制置大使司科降米麥一百萬石振濟淳熙十一年福建諸郡旱錫米二十五萬石振糶一萬石振貧乏細民景定元年臨安府平糴倉舊貯米數十萬石糶補循環其後用而不補所存無幾有旨令臨安府收糴米四十萬石用平糴倉錢三百四萬七千八百五十九貫封樁庫十七界會子一千九十五萬二千一百餘貫共湊十七界一千四百萬貫充糴本錢二年以都城全仰浙西米斛誘人入京販糶賞格比乾道七年加優咸淳元年有旨豐儲倉撥公田米五十萬石付平糴倉遇米貴平價出糶二年監察御史趙順孫言今日急務莫過於平糴乾道間郡有米斗直五六百錢者孝宗聞之即罷其守更用賢守此今日所當法者今粒食翔踴未知所屆市井之間見楮而不見米推原其由實富家大姓所至閉廩所以糴價愈高而楮價陰減陛下念小民之艱食為之發常平義倉然為數有限安得人人而濟之願陛下課官吏使之任牛羊芻牧之責勸富民使之無秦越肥瘠之視糴價一平則楮價不因之而輕物價不因之而重矣七年以咸淳三年以前諸路義米一百一十二萬九千餘石減價發糶薄收郡縣聽民不拘關會見錢收糴
