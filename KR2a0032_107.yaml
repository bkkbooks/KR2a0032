body:
  text: 宋史卷一百七志第六十禮十吉禮十禘祫宗廟之禮每歲以四孟月及季冬凡五享朔望則上食薦新三年一祫以孟冬五年一禘以孟夏唯親郊封祀又有朝享告謝及新主祔謁皆大祀也二薦則行一獻禮其祔祭春祀司命及戶夏祀竈季夏祀中霤秋祀門及厲冬祀行惟臘享禘祫則遍祀焉禘祫之禮真宗咸平二年八月太常禮院言今年冬祭畫日以十月六日薦享太廟按禮三年一祫以孟冬又疑義云三年喪畢遭禘則禘遭祫則祫宜改孟冬薦享為祫享仁宗天聖元年禮官言真宗神主祔廟已行吉祭三年之制又從易月之文自天禧二年四月禘享至今已及五年合行禘禮遂以孟夏薦享為禘享八年九月太常禮院言自天聖六年夏行禘享之禮至此年十月請以孟冬薦享為祫享詔恭依嘉祐四年十月仁宗親詣太廟行祫享禮以宰臣富弼為祫享大禮使韓琦為禮儀使樞密使宋庠為儀仗使參知政事曾公亮為橋道頓遞使樞密副使程戡為鹵簿使同判宗正寺趙良規請正太祖東向位禮官不敢決觀文殿學士王舉正等議曰大祫之禮所以合昭穆辨尊卑必以受命之祖居東向之位本朝以太祖為受命之君然僖祖以降四廟在上故每遇大祫止列昭穆而虛東向魏晉以來亦用此禮今親享之盛宜如舊便禮官張洞韓維言國朝每遇禘祫奉別廟四后之主合食太廟唐郊祀志載禘祫祝文自獻祖至肅宗所配皆一后惟睿宗二后蓋昭成明皇母也續曲臺禮有別廟皇后合食之文蓋未有本室遇祫享即祔祖姑下所以大順中三太后配列禘祭議者議其非禮臣謂每室既有定配則餘后不當參列義當革正學士孫抃等議春秋傳曰大祫者何合祭也未毀廟之主皆升合食于太祖是以國朝事宗廟百有餘年至祫之日別廟后主皆升合食非無典據大中祥符中已曾定議禮官著酌中之論先帝有恭依之詔他年有司攝事四后皆預今甫欲親祫而四后見黜不亦疑於以禮之煩故邪宗廟之禮至尊至重苟未能盡祖宗之意則莫若守舊禮臣等愚以謂如故便學士歐陽修等曰古者宗廟之制皆一帝一后後世有以子貴者始著並祔之文其不當祔者則有別廟之祭本朝禘祫乃以別廟之后列于配后之下非惟於古無文於今又四不可淑德太宗之元配列于元德之下章懷真宗之元配列于章懿之下一也升祔之后統以帝樂別廟之后則以本室樂章自隨二也升祔之后同牢而祭牲器祝册亦統于帝別廟諸后乃從專享三也升祔之后聯席而坐別廟之后位乃相絶四也章獻章懿在奉慈廟每遇禘祫本廟致享最為得禮若四后各祭于廟則其尊自申而於禮無失以為行之已久重於改作則是失禮之舉無復是正也請從禮官詔四后祫享依舊須大禮畢別加討論仍詔祫享前一日皇帝詣景靈宮如南郊禮衛士毋得迎駕呼萬歲有司言諸司奉禮攝廩犧令省牲依通禮改正祀儀散齋四日於別殿致齋二日於大慶殿一日於太廟尚舍直殿下設小次御坐不設黃道褥位七室各用一太牢每坐簠簋二鉶三籩豆為後無黼扆席几出三閣瑞石篆書玉璽印青玉環金山陳于庭別廟四后合食牲樂奠拜無異儀故事七祀功臣無牲止於廟牲肉分割知廟卿行事請依續曲臺禮共料一羊而獻官三員功臣單席如大中祥符加褥十月二日命樞密副使張望告昊天上帝皇地祇帝齋大慶殿十一日服通天冠絳紗袍執圭乘輿至大慶殿門外降輿乘大輦至天興殿薦享畢齋於太廟明日帝常服至大次改袞冕行禮畢質明乘大輦還宮更服鞾袍御紫宸殿宰臣百官賀升宣德門肆赦二十一日詣諸觀寺行恭謝禮二十六日御集英殿為飲福宴治平元年有司準畫日孟冬薦享改為祫祭按春秋閔公喪未除而行吉禘三傳譏之真宗以咸平二年六月喪除至十月乃祫祭天聖元年在諒陰有司誤通天禧舊禘之數在再期內按行禘祭以理推之是二年冬應祫而誤禘於元年夏故四十九年間九禘八祫例皆太速事失於始則歲月相乘不得而正今在大祥內禮未應祫明年未禫亦未應禘至六月即吉十月合行祫祭乞依舊時享庶合典禮二年二月翰林學士王圭等上議曰同知太常禮院呂夏卿狀古者新君踐阼之三年先君之喪二十七月為禫祭然後新主祔廟特行禘祭謂之始禘是冬十月行祫祭明年又行禘祭自此五年再為禘祫喪除必有禘祫者為再大祭之本也今當祫祭緣陛下未終三年之制納有司之説十月依舊時享然享廟祫祭其禮不同故事郊享之年遇祫未嘗權罷唯罷臘祭是則孟享與享廟嘗併行於季冬矣其禘祫年數乞一依太常禮院請今年十月行祫祭明年四月行禘祭仍如夏卿議權罷今年臘享熙寧八年有司言已尊僖祖為太廟始祖孟夏禘祭當正東向之位又言太廟禘祭神位已尊始祖居東向之位自順祖而下昭穆各以南北為序自今禘祫著為定禮元豐四年詳定郊廟禮文所言禘祫之義存於周禮春秋而不著其名行禮之年經皆無文唯公羊傳曰五年而再盛祭禮緯曰三年一祫五年一禘而又分為二説鄭氏則曰前三後二謂禘後四十二月而祫祫後十八月而禘徐邈則曰前二後三謂二祭相去各三十月以二説考之惟鄭氏曰魯禮三年喪畢祫於太廟明年禘于羣廟自後五年而再盛祭一祫一禘實為有據本朝慶曆初用徐邈説每三十月一祭熙寧八年既禘而祫此有司之失也請今十八月而禘禘四十二月而祫庶幾舉禮不煩事神不瀆太常禮院言本朝自慶曆以來皆三十月而一祭至熙寧五年後始不通計遂至八年禘祫併在一歲昨元豐三年四月已行禘禮今年若依舊例十月行祫享即比年頻祫復踵前失請依慶曆以來之制通計年數皆三十月而祭詔如見行典禮詳定所又言古者祼獻饋食禴祠蒸嘗並為先王之享未嘗廢一時之祭故孔氏正義以為天子夏為大祭之禘不廢時之礿秋為大祭之祫不廢時祭之嘗則王禮三年一祫與禘享更為時祭本朝沿襲故常久未釐正請每禘祫之月雖已大祭仍行時享以嚴天子備禮所以丕崇祖宗之義其郊禮親祠準此又言禮不王不禘虞夏商周四代所禘皆以帝有天下其世系所出者明故追祭所及者遠也太祖受命祭四親廟推僖祖而上所自出者譜失其傳有司因仍舊説禘祫皆合羣廟之主綴食於始祖失禮莫甚今國家世系與四代不同既求其祖之所自出而不得則禘禮當闕必推見祖系乃可以行神宗謂輔臣曰禘者本以審禘祖之所自出故禮不王不禘秦漢以後譜牒不明莫知其祖之所自出則禘禮可廢也已而詳定所言古者天子祭宗廟有堂事焉有室事焉按禮祝延尸入奧灌後乃出延牲延尸主出于室坐于堂上始祖南面昭在東穆在西乃行朝踐之禮是堂事也設饌于堂復延主入室始祖東面昭南穆北徙堂上之饌于室中乃行饋食之禮是室事也請每行大祫堂上設南面之位室中設東面之位禮部言合食之禮始祖東面昭南穆北者本室中之位也今設位戶外祖宗昭穆別為幄次殆非合食之義請自今祫享即前楹通設帳幕以應室中之位大觀四年議禮局請每大祫堂上設南面之位室中設東面之位始祖南面則昭穆東西相向始祖東面則昭穆南北相向以應古義又請陳瑞物及代國之寶與貢物可出而陳者並令有司依嘉祐元豐詔旨凡親祠太廟準此從之南渡之後有祫而無禘高宗建炎二年祫享于洪州紹興二年祫享于溫州時儀文草創奉遷祖宗及祧廟神主別廟神主各設幄合食于太廟始祖東向昭穆以次南北相向五年吏部員外郎董弅言臣聞戎祀國之大事而宗廟之祭又祀之大者也大祀禘祫為重祫大禘小則祫為莫大焉今戎事方殷祭祀之禮未暇遍舉然事有違經戾古上不當天地神祇之意下未合億兆黎庶之心特出於一時大臣好勝之臆説而行之六十年未有知其非者顧雖治兵禦戎之際正厥違誤宜不可緩仰惟太祖受天明命混一區宇即其功德所起宜祫享以正東向之尊逮至仁宗親行祫享嘗議太祖東向用昭正統之緒當時在廷之臣僉謂自古必以受命之祖乃居東向之位本朝太祖乃受命之君若論七廟之次有僖祖以降四廟在上當時大祫止列昭穆而虛東向蓋終不敢以非受命之祖而居之也暨熙寧之初僖祖以世次當祧禮官韓維等據經有請適王安石用事奮其臆説乃俾章衡建議尊僖祖為始祖肇居東向馮京奏謂士大夫以太祖不得東向為恨安石肆言以折之已而又欲罷太祖郊配神宗以太祖開基受命不許安石終不以為然元祐之初翼祖既祧正合典禮至於崇寧宣祖當祧適蔡京用事一遵安石之術乃建言請立九廟自我作古其已祧翼祖宣祖並即依舊循沿至今太祖尚居第四室遇大祫處昭穆之列今若正太祖東向之尊委合禮經太常寺丞王普又言弅所奏深得禮意而其言尚有未盡臣竊以古者廟制異宮則太祖居中而羣廟列其左右後世廟制同堂則太祖居右而諸室皆列其左古者祫享朝踐于堂則太祖南向而昭穆位于東西饋食于室則太祖東向而昭穆位于南北後世祫享一于堂上而用室中之位故唯以東向為太祖之尊焉若夫羣廟迭毀而太祖不遷則其禮尚矣臣故知太祖即廟之始祖是為廟號非諡號也惟我太宗嗣服之初太祖廟號已定雖更纍朝世次猶近每於祫享必虛東向之位以其非太祖必不可居也逮至熙寧又尊僖祖為廟之始祖百世不遷祫享東向而太祖常居穆位則名實舛矣儻以熙寧之禮為是僖祖當稱太祖而太祖當改廟號然則太祖之名不正前日之失大矣今宜奉太祖神主居第一室永為廟之始祖每歲五享告朔薦新止於七廟三年一祫則太祖正東向之位太宗仁宗神宗南向為昭真宗英宗哲宗北向為穆五年一禘則迎宣祖神主享于太廟而以太祖配焉如是則宗廟之事盡合禮經無復前日之失矣上曰太祖皇帝開基創業始受天命祫享宜居東向之位宰相趙鼎等奏曰三昭三穆與太祖之廟而七載在禮經無可疑者紹熙五年九月太常少卿曾三復亦言請祧宣祖就正太祖東向之位其言甚切既而吏部尚書鄭僑等亦乞因大行祔廟之際定宗廟萬世之禮慰太祖在天之靈破熙寧不經之論今太祖為始祖則太宗為昭真宗為穆自是而下以至孝宗四昭四穆與太祖之廟而九上參古禮而不廢崇寧九廟之制於義為允又言治平四年僖祖祧遷藏在西夾室至熙寧五年王安石以私意使章衡等議乃復祔僖祖以為始祖又將推以配天欲罷太祖郊配韓維司馬光等力爭而安石主其説愈堅孫固慮其罷太祖配天建議以僖祖權居東向之位既曰權居則當釐正明矣詔從之閏十月權禮部侍郎許及之言僖順翼宣四祖為太祖之祖考所遷之主恐不得藏于子孫之廟今順翼二祖藏于西夾室實居太廟太祖之右遇祫享則於夾室之前設位以昭穆焉於是詔有司集議吏部尚書兼侍讀鄭僑等言僖祖當用唐興聖之制立為別廟順祖翼祖宣祖之主皆祔藏焉如此則僖祖自居別廟之尊三祖不祔子孫之廟自漢魏以來太祖而上毀廟之主皆不合食今遇祫則即廟而享於禮尤稱諸儒如樓鑰陳傅良皆以為可詔從之時朱熹在講筵獨入議狀條其不可者四大略云準尚書吏部牒集議四祖祧主宜有所歸今詳羣議雖多而皆有可疑若曰藏之夾室則是以祖宗之主下藏於子孫之夾室至於祫祭設幄於夾室之前則亦不得謂之祫欲別立一廟則喪事即遠有毀無立欲藏之天興殿則宗廟原廟不可相雜議者皆知其不安特以其心欲尊奉太祖三年一祫時暫東向之故其實無益於太祖之尊而徒使僖祖太祖兩朝威靈相與校強弱于冥冥之中今但以太祖當日追尊帝號之令而默推之則知今日太祖在天之靈必有所不忍而不敢當矣又況僖祖祧主遷於治平不過數年神宗復奉以為始祖已為得禮之正而合於人心所謂有其舉之莫敢廢者又言當以僖祖為始祖如周之后稷太祖如周之文王太宗如周之武王與仁宗之廟皆萬世不祧昭穆而次以至高宗之廟亦萬世不祧又言元祐大儒程頤以為王安石言僖祖不當祧復立廟為得禮竊詳頤之議論與安石不同至論此事則深服之足以見義理人心之所同固有不約而合者特以司馬光韓維之徒皆是大賢人所敬信其議偶不出此而安石乃以變亂穿鑿得罪於公議故欲堅守二賢之説並安石所當取者而盡廢之今以程頤之説考之則是非可判矣議既上召對令細陳其説熹先以所論畫為圖本貼説詳盡至是出以奏陳久之上再三稱善且曰僖祖自不當祧高宗即位時不曾祧壽皇即位太上即位亦不曾祧今日豈可容易可於榻前撰數語徑自批出熹方懲內批之弊因乞降出劄子再令臣僚集議上亦然之熹既退即進擬詔意以上意諭廟堂則聞已毀四祖廟而遷之矣時宰臣趙汝愚既以安石之論為非異議者懼其軋己藉以求勝事竟不行熹時以得罪遺汝愚書曰相公以宗子入輔王室而無故輕納妄議拆祖宗之廟以快其私欲望神靈降歆垂休錫羡以永國祚於無窮其可得乎時太廟殿已為十二室故孝宗升祔而東室尚虛熹以為非所以祝延壽康之意深不然之因自劾不堪言語侍從之選乞追奪待制不許及光宗祔廟遂復為九世十二室蓋自昌陵祔廟踰二百年而後正太祖之位慶元二年四月禮部太常寺言已於太廟之西別建僖祖廟及告遷僖順翼宣帝后神主詣僖祖廟奉安所有今年孟冬祫享先詣四祖廟室行禮次詣太廟逐幄次行禮理宗紹定四年九月丙戌京師大火延及太廟太常少卿度正言伏見近世大儒侍講朱熹詳考古禮尚論宗廟之制畫而為圖其説甚備然其為制務效於古而頗更本朝之制故學士大夫皆有異論遂不能行今天降災異火發民家延及宗廟舉而行之莫此時為宜臣於向來備聞其説今備員禮寺適當此變若遂隱默則為有負謹為二説以獻其一純用朱熹之説謂本朝廟制未合於古因畫為圖謂僖祖如周后稷當為本朝始祖夫尊僖祖以為始祖是乃順太祖皇帝之孝心也始祖之廟居于中左昭右穆各為一廟門皆南向位皆東向祧廟之主藏于始祖之廟夾室昭常為昭穆常為穆自不相亂三年合食則併出祧廟之主合享於始祖之廟始祖東向羣昭之主皆位北而南向羣穆之主皆位南而北向昭穆既分尊卑以定其説合于古而宜于今盡美盡善舉而行之祖宗在天之靈必歆享于此而垂祐于無窮也其一説則因本朝之制而參以朱熹之説蓋本朝廟制神宗嘗命禮官陸佃討論欲復古制未及施行渡江以來稽古禮文之事多所未暇今欲驟行更革恐未足以成其事而徒為紛紛或且仍遵本朝之制自西徂東並為一列惟於每室之後量展一間以藏祧廟之主每室之前量展二間遇三年祫享則以帷幄幕之通為一室盡出諸廟主及祧廟主並為一列合食其上前乎此廟為一室凡遇祫享合祭於其室名為祫享而實未嘗合今量展此三間後有藏祧主之所前有祖宗合食之地於本朝之制初無大段更革而頗已得三年大祫之義今來朝廷若能舉行朱熹前議固無以加如其不然姑從後説亦為允當不失禮意然宗廟之禮儻無其故何敢妄議今因大火之後若加損益亦惟其時乞賜詳議有旨令侍從禮部太常集議後竟不行
