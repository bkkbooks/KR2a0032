body:
  text: 宋史卷一百八十志第一百三十三食貨下二錢幣錢幣錢有銅鐵二等而折二折三當五折十則隨時立制行之久者唯小平錢夾錫錢最後出宋之錢法至是而壞蓋自五代以來相承用唐舊錢其別鑄者殊鮮太祖初鑄錢文曰宋通元寶凡諸州輕小惡錢及鐵鑞錢悉禁之詔到限一月送官限滿不送官者罪有差其私鑄者皆棄市銅錢闌出江南塞外及南蕃諸國差定其法至二貫者徒一年五貫以上棄市募告者賞之江南錢不得至江北蜀平聽仍用鐵錢開寶中詔雅州百丈縣置監冶鑄禁銅錢入兩川太平興國四年始開其禁而鐵錢不出境令民輸租及榷利鐵錢十納銅錢一時銅錢已竭民甚苦之商賈爭以銅錢入川界與民互市銅錢一得鐵錢十四明年轉運副使張諤言川峽鐵錢十直銅錢一輸租即十取二舊用鐵錢千易銅錢四百自平蜀沈倫等悉取銅錢上供及增鑄鐵錢易民銅錢益買金銀裝發頗失裁制物價滋長鐵錢彌賤請市夷人銅斤給鐵錢千可以大獲銅鑄錢民租當輸錢者許且輸銀絹候銅錢多即漸令輸之詔令市夷人銅斤給鐵錢五百餘皆從之然銅卒難得而轉運副使聶詠轉運判官范祥皆言民樂輸銅錢請歲遞增一分後十歲則全取銅錢詔如所請詠祥等因以月俸所得銅錢市與民厚取其直於是增及三分民益以為苦或發古冢毀佛像器用才得銅錢四五坐罪者甚衆知益州辛仲甫具言其弊詔使臣吳承勳馳傳審度仲甫集諸縣令佐問之多潛持兩端莫敢正言仲甫以大誼責之乃皆言其不便承勳復命七年遂令川峽輸租榷利勿復徵銅錢詠祥等皆坐罪免既而又從西川轉運使劉度之請官以鐵錢四百易銅錢一百後竟罷之平廣南江南亦聽權用舊錢如川蜀法初南唐李氏鑄錢一工為錢千五百得三十萬貫太宗即位詔升州置監鑄錢令轉運使按行所部凡山川之出銅者悉禁民采並以給官鑄焉太平興國二年樊若水言江南舊用鐵錢於民非便今諸州銅錢尚六七十萬緡虔吉等州未有銅錢各發六七萬緡俾市金帛輕貨上供及博糴穀麥於升鄂饒等州産銅之地大鑄銅錢銅錢既不渡江益以新錢則民間錢愈多鐵錢自當不用悉鎔鑄為農器什物以給江北流民之歸附者除銅錢渡江之禁從之自唐天祐中兵亂窘乏以八十五錢為百後唐天成中減五錢漢乾祐初復減三錢宋初凡輸官者亦用八十或八十五為百然諸州私用則各隨其俗至有以四十八錢為百者至是詔所在用七十七錢為百西北邊內屬戎人多齎貨帛於秦階州易銅錢出塞銷鑄為器乃詔吏民闌出銅錢百已上論罪至五貫以上送闕下舊饒州永平監歲鑄錢六萬貫平江南增為七萬貫而銅鉛錫常不給轉運使張齊賢訪求得南唐承旨丁釗能知饒信等州山谷産銅鉛錫乃便宜調民采取且詢舊鑄法惟永平用唐開元錢料最善即詣闕面陳八年詔增市鉛錫炭價於是得銅八十一萬斤鉛三十六萬斤錫十六萬斤歲鑄錢三十萬貫補釗殿前承旨領三州銅山然民間猶雜用舊大小錢是時以福建銅錢數少令建州鑄大鐵錢並行尋罷鑄而官私所有鐵錢十萬貫不出州境每千錢與銅錢七百七十等外邑鄰兩浙者亦不用雍熙初令江南諸州官庫所貯雜錢每貫及四斤半者送闕下不及者銷毀民間惡錢尚多復申乾德之禁稍峻其法京城居民蓄銅器者限兩月悉送官端拱元年內侍蕭延皓使嶺南還以民間私鑄三等錢來上且言多與蠻人貿易侵敗禁法因詔察民私鑄及銷鎔好錢作薄惡錢者並棄市輒以新惡錢與蠻人博易者抵罪江北諸州所用錢非甚薄惡者新舊大小兼用江南雖用舊大錢淳化四年乃詔每貫及前詔斤數有官監字號者皆許用不分新舊先是淳化二年宗正少卿趙安易言嘗使蜀見所用鐵錢至輕市羅一匹為錢二萬堅請改鑄一當十大錢御書錢式遣詣川峽路諸州冶鑄所在並為御書錢監諸州舊貯小鐵錢悉輦送官民間小錢許送監計數給以大錢若改鑄未集許民大小兼用既而一歲才成三千餘貫衆皆以為不便會安易入奏事因留不遣遂罷冶鑄五年安易復請不許第令川峽仍以銅錢一當鐵錢十荊湖嶺南民輸稅須大錢民以小錢二或三易大錢一官屬以奉錢易於民以規利詔自今吏受民輸但常所通行錢勿却官吏毋得以奉錢換易至道二年始禁道賀州錫官益其價市之以給諸路鑄錢咸平初又申新小錢之禁令官置場盡市之舊犯銅禁七斤以上處死奏裁多蒙減斷然待報常淹緩四年詔滿五十斤以上取裁餘從第減景德四年詔曰鼓鑄錢刀素有程限憫其勞苦特示矜寬自今五月一日至八月一日止收半功本司每歲量支率分錢以備醫藥十二月令鑄匠每旬停作一日天禧三年詔犯銅鍮石悉免極刑時銅錢有四監饒州曰永平池州曰永豐江州曰廣寧建州曰豐國京師升鄂杭州南安軍舊皆有監後廢之凡鑄錢用銅三斤十兩鉛一斤八兩錫八兩得錢千重五斤唯建州增銅五兩減鉛如其數至道中歲鑄八十萬貫景德中增至一百八十三萬貫大中祥符後銅坑多不發天禧末鑄一百五萬貫鐵錢有三監邛州曰惠民嘉州曰豐遠興州曰濟衆益州雅州舊亦有監後並廢大錢貫十二斤十兩以準銅錢嘉邛二州所鑄錢貫二十五斤八兩銅錢一當小鐵錢十兼用後以鐵重多盜鎔為器每二十五斤鬻之直二千大中祥符七年知益州凌策言錢輕則易齎鐵少則鎔者鮮利於是詔減景德之制其見使舊錢仍用如故歲鑄總二十一萬貫諸路錢歲輸京師四方由此錢重而貨輕景祐初詔三司以江東福建廣南歲輸緡錢合三十餘萬易為金帛錢流民間許申為三司度支判官建議以藥化鐵與銅雜鑄輕重如銅錢法銅居三分鐵六分皆有奇贏亦得錢千費省而利厚詔申用其法鑄於京師大率鑄錢雜鉛錫則其液流速而易成申雜以鐵流澀而多不就工人苦之初命申鑄萬緡逾月裁得萬錢申性詭譎少成事自度言無效乃求為江東轉運使欲用其法於江州朝廷從之因詔申即江州鑄百萬緡毋漏其法中外知其非是而宰相主之卒無成功初太宗改元太平興國更鑄太平通寶淳化改鑄又親書淳化元寶作真行草三體後改元更鑄皆曰元寶而冠以年號至是改元寶元文當曰寶元元寶仁宗特命以皇宋通寶為文慶曆以後復冠以年號如舊自天聖以來毀錢鑄鍾及為銅器皆有禁慶曆初闌出銅錢視舊法第加其罪錢千為首者抵死五年泉州青陽鐵冶大發轉運使高易簡不俟詔置鐵錢務于泉欲移銅錢于內地梓州路轉運使崔輔判官張固亦請即廣安軍魚子鐵山采礦炭置監於合州並銷舊小錢以鑄減輕大錢未得報先移合州相地置監州以上聞朝廷以易簡輔固為擅鑄錢皆坐貶軍興陝西移用不足始用知商州皮仲容議采洛南縣紅崖山虢州青水冶青銅置阜民朱陽二監鑄錢既而陝西都轉運使張奎知永興軍范雍請鑄大銅錢與小錢兼行大錢一當小錢十又請因晉州積鐵鑄小錢及奎徙河東又鑄大鐵錢於晉澤二州亦以一當十助關中軍費未幾三司奏罷河東鑄大鐵錢而陝西復采儀州竹尖嶺黃銅置博濟監鑄大錢因敕江南鑄大銅錢而江池饒儀虢又鑄小鐵錢悉輦致關中數州錢雜行大約小銅錢三可鑄當十大銅錢一以故民間盜鑄者衆錢文大亂物價翔踴公私患之於是奎復奏晉澤石三州及威勝軍日鑄小鐵錢獨留用河東河東鐵錢既行盜鑄獲利什六錢輕貨重患如陝西知並州鄭戩請河東鐵錢以二當銅錢一行之一年又以三當一或以五當一罷官爐日鑄且行舊錢而契丹亦鑄鐵錢易並邊銅錢慶曆末葉清臣為三司使與學士張方平等上陝西錢議曰關中用大錢本以縣官取利太多致姦人盜鑄其用日輕比年以來皆虛高物估始增直於下終取償於上縣官雖有折當之虛名乃受虧損之實害救弊不先自損則法未易行請以江南儀商等州大銅錢一當小錢三小鐵錢三當銅錢一河東小鐵錢如陝西亦以三當一且罷官所置爐自是姦人稍無利猶未能絶濫錢其後詔商州罷鑄青黃銅錢又令陝西大銅錢大鐵錢皆以一當二盜鑄乃止然令數變兵民耗于資用類多咨怨久之始定方大錢之行有劉羲叟者語人曰是於周景王所鑄無異上其感心腹之疾乎已而果然語在本傳時興元府西縣增置濟遠監而韶州天興銅大發歲采二十五萬斤詔即其州置永通監後濟遠監廢儀州博濟監既廢復置皇祐中饒池江建韶五州鑄錢百四十六萬緡嘉邛興三州鑄大鐵錢二十七萬緡至治平中饒池江建韶儀六州鑄錢百七十萬緡而嘉邛以率買鐵炭為擾自嘉祐四年停鑄十年以休民力至是獨興州鑄錢三萬緡熙寧初同華二州積小鐵錢凡四十萬緡詔賜河東以鐵償之四年陝西轉運副使皮公弼奏自行當二錢銅費相當盜鑄衰息請以舊銅鉛盡鑄詔聽之自是折二錢遂行於天下京西轉運使吳幾復建議郢唐均房金五州多林木而銅鉛積於淮南若由襄郢轉致郢唐等州置監鑄錢可以紓錢重之弊神宗是之而王安石沮之其議遂寢後乃詔京西淮南兩浙江西荊湖五路各置鑄錢監江西湖南十五萬緡餘路十萬緡為額仍申熟錢斤重之限又以興國軍睦衡舒鄂惠州既置監六通舊十六監水陸回遠增提點之官時諸路大率務於增額韶惠州永通阜民監舊額八十萬至七年增三十萬及折二凡五十萬後衛州黎陽監歲增折二凡五萬緡西京阜財監歲增市易本錢凡十萬緡興州濟衆監歲增七萬二千餘緡陝西三銅錢監各歲增五萬緡而睦州則置神泉徐州則置寶豐梧州以鉛錫易得萬州以多鐵礦皆置監又詔秦鳳等路即鳳翔府斜谷置監已而所鑄錢青銅夾錫脆惡易毀罷之然私錢往往雜用不能禁至是法弊乃詔禁私錢在官惡錢不堪用者別為模以鑄商虢洛南增三監耀鄜權置兩監通永興華河中陝舊監為九以給改鑄永興鄜耀河中陝去鐵冶遠聽改鑄一年罷商洛南華虢最近鐵冶聽久置鄜州等五監候罷改鑄並其工作歸永興等四監專鑄大錢所鑄大鐵錢約補及所廢偽錢及可以待交子所用而止八年詔河東鑄錢七十萬緡外增鑄小錢三十萬緡於是知太原韓絳請倣陝西令本重模精以息私鑄之弊初薛向鑄鐵錢於陝西後許彥先鑄於廣南既而民不便用神宗欲遂罷之王安石固爭乃詔京師畿內並罷其行於四方蓋如故元豐以後西師大舉邊用匱闕徐州置寶豐下監歲鑄折二錢二十萬緡轉移陝府于時同渭秦隴等州錢監廢置移徙不一銅鐵官多建言鑄錢事不盡行而又自弛錢禁民之銷毀與夫闌出境外者為多張方平嘗極諫曰禁銅造幣盜鑄者抵罪至死示不與天下共其利也故事諸監所鑄錢悉入于王府歲出其奇羡給之三司方流布于天下然自太祖平江南江池饒建置爐歲鼓鑄至百萬緡積百年所入宜乎貫朽於中藏充足於民間矣比年公私上下並苦乏錢百貨不通人情窘迫謂之錢荒不知歲所鑄錢今將安在夫鑄錢禁銅之法舊矣令敕具載而自熙寧七年頒行新敕刪去舊條削除錢禁以此邊關重車而出海舶飽載而回聞沿邊州軍錢出外界但每貫收稅錢而已錢本中國寶貨今乃與四夷共用又自廢罷銅禁民間銷毀無復可辦銷鎔十錢得精銅一兩造作器用獲利五倍如此則逐州置爐每爐增數是猶畎澮之益而供尾閭之泄也元豐八年哲宗嗣位復申錢幣闌出之禁如嘉祐編敕罷徐州寶豐鼓鑄詔戶部條諸監之可減者凡增置鑄錢監十四皆罷之陝西行鐵錢至陝府以東即銅錢地民以鐵錢換易有輕重不等之患元祐六年乃議限東行有稅物者以十分率之止許易二分人毋得過五千八年命公私給納貿易並專用鐵錢而官帑銅錢以時計置運致內郡商旅願於陝西內郡入便銅錢給據請於別路者聽仍定加饒之數每百緡河東京西加饒三千在京餘路四千先是太祖時取唐飛錢故事許民入錢京師於諸州便換其法商人入錢左藏庫先經三司投牒乃輸於庫開寶三年置便錢務令商人入錢詣務陳牒即輦致左藏庫給以券仍敕諸州凡商人齎券至當日給付違者科罰至道末商人入便錢一百七十餘萬貫天禧末增一百一十三萬貫至是乃復增定加饒之數行焉折二銅錢又定鈎致之法初欲復舊止行於本路議者謂關東諸路既已通行奪彼豫此理亦非便且陝石所用折二鐵錢止當一小銅錢即折二銅錢盡歸陝西不直般運費廣猝難鈎致且與鐵錢一等慮鐵錢轉更加輕乃令折二銅錢寬所行地聽行於陝西一路及河東晉絳石慈隰州京西西京河陽許汝鄭金房均鄧等州餘路則禁仍限二年毋更用在民間者聽以輸買納在官帑者以輸上供即非沿流地或素無上供者所隸運司移發輸京師尋詔更鑄小銅錢河東安撫提刑司言頃絳州垣曲縣置監鼓鑄銅錢費且不給今已廢監又禁折二銅錢不通行非便乃聽行使如舊供備庫使鄭價使契丹還言其給輿箱者錢皆中國所鑄乃增嚴三路闌出之法熙豐間銅鐵錢嘗並行銅錢千易鐵錢千五百未聞輕重之弊及後銅錢日少鐵錢滋多紹聖初銅錢千遂易鐵錢二千五百鐵錢寖輕元符二年下陝西諸路安撫司博究利害於是詔陝西悉禁銅錢在民間者令盡送官而官銅悉取就京西置監永興帥臣陸師閔言既揀毀私錢禁銅罷冶則物價當減願下陝西州縣凡有市買並準度銅錢之直以平其價詔用其言而豪賈蓄家多不便徽宗嗣位通判鳳州馬景夷言陝西自去年罷使銅錢續遣官措置錢法未聞有深究錢幣輕重灼見利害者銅錢流注天下雖千百年未嘗有輕重之患獨鐵錢局於一路所可通交易有無者限以十州之地欲無滯礙安可得乎又諸州錢監鼓鑄不已歲月增多以鼓鑄無窮之錢而供流轉有限之用更數十年積滯一隅暴如丘山公私為害又倍於今日矣謂宜弛其禁界許鄰近陝西河東等路特不入京城外凡解鹽地州縣並許通行折二鐵錢如此則流注無窮久遠自無輕重之患繼而言者謂鐵錢重滯難以齎遠民間皆願復用銅錢當公私匱乏之時諸路州縣官私銅錢積貯萬數反無所用乃詔銅鐵錢聽民間通行而銅錢止用糴買建中靖國元年陝西轉運副使孫傑以鐵錢多而銅錢少請復鑄銅錢候銅鐵錢輕重稍均即聽兼鑄崇寧元年前陝西轉運判官都貺復請權罷陝西鑄鐵錢戶部尚書吳居厚言江池饒建錢額不敷議減銅增鉛錫歲可省銅五十餘萬斤計增鑄錢十五萬九千餘緡所鑄光明堅韌與見行錢不異詔可然課猶不登二年居厚乃請檢用前後上供鑄錢條約視其登耗之數別定勸沮之法會蔡京當政將以利惑人主託假紹述肆為紛更有許天啓者京之黨也時為陝西轉運副使迎合京意請鑄當十錢五月始令陝西及江池饒建州以歲所鑄小平錢增料改鑄當五大銅錢以聖宋通寶為文繼而並令舒睦衡鄂錢監用陝西式鑄折十錢限今歲鑄三十萬緡鐵錢二百萬緡募私鑄人丁為官匠並其家設營以居之號鑄錢院謂得昔人招天下亡命即山鑄錢之意所鑄銅錢通行諸路而陝西河東四川係鐵錢地者禁之第鑄於陝西鐵錢地而已自熙寧以來折二錢雖行民間法不許運致京師故諸州所積甚多至是發運司因請以官帑所有折二錢改鑄折十錢三年遂罷鑄小平錢及折五錢置監於京城所復徐州寶豐衛州黎陽監並改鑄折二錢為折十舊折二錢期一歲勿用大嚴私鑄之令民間所用鍮石器物並官造鬻之輒鑄者依私有法加二等命諸路轉運司於沿流順便地隨宜增置錢監俾民以所有折二錢換納於官運致所增監改鑄折十錢二廣産鐵令鼓鑄小鐵錢止行於兩路其公私銅錢兌換運輸元豐庫仍於潯州置鐵錢監依陝西料例鑄當二錢四年立錢綱驗樣法崇寧監以所鑄御書當十錢來上緡用銅九斤七兩有奇鉛半之錫居三之一詔頒其式於諸路令赤仄烏背書畫分明時趙挺之為門下侍郎繼拜右僕射與蔡京議多不合因極言當十錢不便私鑄寖廣乃令提刑司歲較巡捕官一路所獲多寡繼令福建廣南毋行用第鑄以上供及給他路凡為人附帶若封識影庇私鑄錢者悉論以法毋得廕贖其置鑄錢院蓋將以盡收所在亡命盜鑄之人然犯法者不為止乃命荊湖南北江南東西兩浙並以折十錢為折五舊折二錢仍舊慮冒法入東北也令以江為界淮南重寶錢亦作當五用焉五年兩浙盜鑄尤甚小平錢益少市易濡滯遂命以折五折十上供小平錢留本路江池饒建韶州錢監歲課以八分鑄小平錢二分鑄當十錢俄詔廣南江南福建兩浙荊湖淮南用折二錢改鑄折十錢皆罷其創置鑄錢院及招置錢戶並停繼復罷鑄當十二分之令盡鑄小平錢荊湖江南兩浙淮南重寶錢作當三在京京畿京東西河東河北陝西熙河作當五通寶錢所鑄未多在官者悉封樁在民間者以小平錢納換旋復詔京畿京東西河北河東陝西熙河當十錢仍舊兩浙作當三江南淮南荊湖作當五時錢幣苦重條序不一私鑄日甚御史沈畸奏曰小錢便民久矣古者軍興錫賞不繼或以一當百或以一當千此權時之宜豈可行於太平無事之日哉當十鼓鑄有數倍之息雖日斬之其勢不可遏未幾詔當十錢止行於京師陝西河東河北俄並畿內用之餘路悉禁期一季送官償以小錢換納到者輸於元豐崇寧庫而私錢亦限一季自致計銅直增二分償以小錢隱藏者論如法尋詔鄭州西京亦聽用折十錢禁貿易為二價者東南諸監增鑄小平錢以待償錢而私錢亦改鑄焉折十錢為幣既重一旦更令則民驟失厚利又諸路或用或否往往不盡輸於官冒法私販始令四輔畿內開封府許搜索舟車賞視舊法增倍水陸所由官司失察者皆停替而受納不揀選容私錢其間者以差定罪法又以私錢猥多不能悉禁乃令外路每一私錢計小平錢三以小錢易於官在京以四小平錢易之京師出納及民間貿易並大小錢參用而私鑄小平錢輒行用立搜索告捕罪賞越江淮入汴錢至京者一依當十錢法御史張茂直請嚴私販當十之令綱舟載卸皆選官監索保無藏匿舟車兜擔即疑慮私販者並聽搜索而福建民或私鑄轉入淮浙京東等路者所由州縣官司皆治漏逸之罪不以赦免法滋密矣大觀元年張茂直復言州縣督捕加峻私小黃錢投委江河不敢復出請令東南州縣置木匱封鍵於闤闠中聽民以私錢自投如自首法當三當五錢舟船附帶者亦多棄之江河請下諸路撈漉時蔡京復相再主用折十錢二月首鑄御書當十錢以京畿錢監所得私錢改鑄尋興復京畿兩監以轉運使宋喬年領之用提舉京畿鑄錢司為名喬年鑄烏背漉銅錢來上詔以漉銅式頒行諸路京之初為折十錢人不以為便帝亦知之故崇寧四年以後稍更其法及京去位遂詔諭中外京再得政復行之知盜鑄者必衆將威以刑會有告蘇州章綖盜鑄數千萬緡遂興大獄初遣李孝壽又遣沈畸蕭服末以命知蘇州孫傑發運副使吳擇仁綖坐刺流海島連坐者十餘人時皆寃之於是頒行大觀新修錢法於天下申命開封府尹少外路監司各分州郡舉行按舉能否月檢會法令使民知禁用孫傑言盜鑄依淮東重法地囊橐強盜之家籍其財以待賞居停鄰保並均備告驗私錢依私茶法給隨行物州常樁盜鑄賞錢五千緡州縣稽於施行監司失察不以赦原是歲京畿既置錢監乃專鑄當十大錢而小平錢則鑄於諸路既而當十錢少復置真州鑄錢監以本路所換錢不依式者及諸司當二見緡用舊式改鑄當十錢明年令江池饒建州錢監自來歲以鑄當十五分鑄小平錢申嚴私鑄之法即託權要事勢度越關津拒捍搜索者雖輕以違制論載御物者同之初崇寧五年始禁陝西鐵錢行於興元府等界至是又以鐵錢猥多禁陝西鐵錢入蜀有董奎者為走馬承受遂令以鐵錢三折銅錢一事聞責奎以妄肆胸臆致幣輕物重奎遂即罪三年申當十錢行使之令益以京東京西而河北並邊州縣鎮寨四榷場及登萊密州緣海縣鎮等皆禁時蔡京復罷政矣四年詔鼓鑄當十錢多慮法隨以弊其止鑄舊額小平錢張商英為相奏言當十錢為害久矣舊小平錢有出門之禁故四方客旅之貨交易得錢必太半入中末鹽鈔收買告牒而餘錢又流布在市井此上下內外交相養自當十錢行以一夫而負八十千小車載四百千錢既為輕齎之物則告牒為滯貨鹽鈔非得虛撎之息則不行臣今欲借內庫並密院諸司封樁紬絹金銀並鹽鈔下令折十錢限民半年所在送官十千給銀絹各一匹兩限竟毋更用俟錢入官擇其惡者鑄小平錢存其好者折三行用如此則錢法鈔法不相低昂可以復舊利州路提刑司言舊銅鐵錢輕重相尋以大鐵錢一折小銅錢二今大鐵錢五止當一銅錢比舊輕十倍又流入川界錢輕物重頗類陝西欲將折二大鐵錢以一折一雖稍減錢數錢必稍重詔許陝西鐵錢入蜀仍舊盡釋其禁且命以今物價量宜裁之政和元年詔錢重則物輕錢輕則物重其勢然也今諸路所鑄小平錢行之久而無弊多而不壅為利博矣往歲圖利之臣鼓鑄當十錢苟濟目前不究悠久公私為害用之幾十年其法日弊而不勝姦猾之民規利冒法銷毀當二小平錢所在盜鑄濫錢益多百物增價若不早革即弊無已時其官私見在當十錢可並作當三以為定制尚慮豪猾憚於折閲胥動浮言可內自京尹外逮監司郡縣悉心開諭自當十錢行抵冒者多大觀四年星變赦天下凡以私錢得罪有司上名數亡慮十餘萬人蔡京罔上毒民可謂烈矣時御府之用日廣東南錢額不敷宣和以後尤甚乃令饒贛錢監鑄小平錢每緡用鐵三兩而倍損其銅稍損其鉛繼又令江池饒錢監盡以小平錢改鑄當二錢以紓用度然有司猶數告乏靖康元年罷政和敕陝西路用銅錢斷徒二年配千里法初蔡京主行夾錫錢詔鑄於陝西亦命轉運副使許天啓推行其法以夾錫錢一折銅錢二每緡用銅八斤黑錫半之白錫又半之既而河東轉運使洪中孚請通行於天下京欲用其言會罷政大觀元年京復相遂降錢式及錫母於鑄錢之路鑄錢院專用鼓鑄若産銅地始聽兼鑄小平錢復命轉運司及提刑司參領其事衡州熙寧鄂州寶泉舒州同安監暨廣南皆鑄焉二年江南東西福建兩浙許鑄使鐵錢三年京復政詔以兩浙鑄夾錫錢擾民凡東南所鑄皆罷明年並河北河東京東等路罷之所在監院皆廢唯河東三路聽存舊監以鑄銅鐵錢産銅郡縣聽存用改鑄小平錢政和元年錢輕物重細民艱食詔應陝西舊行使鐵錢地並依元豐年大鐵錢折二公私通行夾錫錢同之毋得分別見存鐵錢毋改更鑄夾錫河東官私折二夾錫錢同之童貫宣撫陝西以詔亟平物價帥臣徐處仁切責其非坐貶錢即經略鄜延抗疏言詳考詔旨謂鐵錢復行與夾錫並用慮姦民妄作輕重欲維持推行俾錢物相直非欲以威力脅制百姓頓減物價於一兩月之間今宣撫司裁損米穀布帛金銀之價殆非人情徐處仁言雖未盡所見為長望速詢其實如臣言乖謬願同處仁貶詔即妄有建明毀辱使命謫置偏州尋亦罷行夾錫錢且禁裁物價民商貿易各從其便繼而童貫復請與舊法鐵錢並折二通行知閿鄉縣論九齡俄坐以銅錢一估夾錫錢七八並知州王寀轉運副使張深俱被劾時關中錢甚輕夾錫欲以重之其實與鐵錢等物價日增患甚於當十二年蔡京復得政條奏廣惠康賀衡鄂舒州昨鑄夾錫錢精善請復鑄如故廣西湖北淮東如之且命諸路以銅錢監復改鑄夾錫遂以政和錢頒式焉夾錫錢既復推行錢輕不與銅等而法必欲其重乃嚴擅易撎減之令凡以金銀絲帛等物貿易有弗受夾錫須要銅錢者聽人告論以法懲治市井細民朝夕鬻餅餌熟食以自給者或不免於告罰未幾以夾錫錢不以何路所鑄並聽通行陝西用政和通寶舊大鐵錢與夾錫錢雜慮流轉諸路四年詔毋更行用致令諸監改鑄夾錫錢在民間者赴官換納鄭居中劉正夫為相以為不便令淮南夾錫錢期三日官私俱禁不用仍罷鼓鑄夾錫錢悉輦樁關中尋詔河東陝西外餘路並罷俄詔並河東罷鑄夾錫錢止用舊法鼓鑄重和元年權罷京西鑄夾錫錢繼以關中糴買用之通流復命鼓鑄專給關中夾錫行小民往往以藥點染與銅錢相亂河北漕臣張翬等嘗坐貶焉先是江池饒州建寧府四監歲鑄錢百三十四萬緡充上供衡舒嚴鄂韶梧州六監歲鑄錢百五十六萬緡充逐路支用建炎經兵鼓鑄皆廢紹興初併廣寧監於虔州併永豐監於饒州歲鑄才及八萬緡以銅鐵鉛錫之入不及於舊而官吏稍廩工作之費視前日自若也每鑄錢一千率用本錢二千四百文時范汝為作亂權罷建州鼓鑄尋復舊泉司供給銅錫六十五萬餘斤六年斂民間銅器詔民私鑄銅器者徒二年贛饒二監新額錢四十萬緡提點官趙伯瑜以為得不償費罷鼓鑄盡取木炭銅鉛本錢及官吏闕額衣糧水腳之屬湊為年計十三年韓球為使復鑄新錢興廢坑冶至於發冢墓壞廬舍籍冶戶姓名以膽水盛時浸銅之數為額浸銅之法以生鐵鍛成薄片排置膽水槽中浸漬數日鐵片為膽水所薄上生赤煤取刮鐵煤入爐三煉成銅大率用鐵二斤四兩得銅一斤饒州興利場信州鉛山場各有歲額所謂膽銅也無銅可輸者至鎔錢為銅然所鑄亦才及十萬緡二十四年罷鑄錢司歸之漕司二十七年出版曹錢八萬緡為鑄本歲權以十五萬緡為額復饒贛韶鑄錢監以漕臣往來措置通判主之殿中侍御史王圭言泉司不可廢復以戶部侍郎榮薿提領許置官屬二員二十八年出御府銅器千五百事付泉司大索民間銅器得銅二百餘萬斤寺觀鐘磬鐃鈸既籍定投稅外不得添鑄二十九年令命官之家留見錢二萬貫民庶半之餘限二年聽轉易金銀算請茶鹽香礬鈔引之類越數寄隱許人告以李植提點鑄錢公事植言歲額內藏庫二十三萬緡右藏庫七十餘萬緡皆至道以後數也紹興以來歲收銅二十四萬斤鉛二十萬斤錫五萬斤僅可鑄錢一十萬緡諸道拘到銅器二百萬斤附以鉛錫可鑄六十萬緡然拘者不可以常唯當據坑冶所産下工部權以五十萬緡為額又明年才鑄及十萬緡今泉司歲額增至十五萬緡小平錢一萬八千緡折二錢六萬六千緡歲費鑄本及起綱糜費約二十六萬緡司屬之費又約二萬緡東南十一路一百一十八州之所供有坑冶課利錢木炭錢錫本錢約二十一萬緡比歲所收不過十五六萬緡耳歲額金一百二十八兩銀無額以七分入內庫三分歸本司銅三十九萬五千八百斤鉛三十七萬七千九百斤錫一萬九千八百七十五斤鐵二百三十二萬八千斤比歲所榷十無二三每當二錢千重四斤五兩小平錢千重四斤十三兩視舊制銅少鉛多錢愈鍥薄矣孝宗隆興元年詔鑄當二小平錢如紹興之初乾淳迄于嘉泰開禧皆如之乾道六年併鑄錢司歸發運司尋復置八年饒州贛州復各置提點官以新鑄錢殽雜提點鑄錢及永平監官左藏西庫監官戶部工部長二官責降有差九年大江之西及湖廣間多毀錢夾以沙泥重鑄號沙毛錢詔嚴禁之淳熙二年併贛司歸饒州慶元三年復禁銅器期兩月鬻于官每兩三十湖州舊鬻監至是官自鑄之二年禁銷錢為銅器者以違制論爐戶決配海外復神泉監以所括銅器鑄當三大錢隸工部舊額內帑歲收新錢一百五萬江池饒建四監而每年退卻六十萬三年一郊又以一百萬輸三司是內帑年才得十一萬六千餘緡而左藏得九十三萬三千餘緡今歲額止十五萬而隸封樁者半內藏者半左藏咸無焉又自置市舶于浙于閩于廣舶商往來錢寶所由以泄是以自臨安出門下江海皆有禁淳熙九年詔廣泉明秀漏泄銅錢坐其守臣嘉定元年三省言自來有市舶處不許私發番船紹興末臣僚言泉廣二舶司及西南二泉司遣舟回易悉載金錢四司既自犯法郡縣巡尉其能誰何至於淮楚屯兵月費五十萬見緡居其半南北貿易緡錢之入敵境者不知其幾於是沿邊皆用鐵錢矣淮南舊鑄銅錢乾道初詔兩淮京西悉用鐵錢荊門隸湖北以地接襄峴亦用鐵錢六年先是以和州舊有錢監舒州山口鎮亦有古監詔司農丞許子中往淮西措置於是子中以舒蘄黃皆産鐵請各置監舒州同安監蘄州蘄春監黃州齊安監且鑄折二錢以發運司通領四監江之廣寧監興國之大冶監臨江之豐餘監撫之裕國監子中所領三監歲各認三十萬貫其大小鐵錢令兩淮通行七年舒蘄守臣皆以鑄錢增羡遷官然淮民為之大擾八年以江州興國軍鐵冶額虧守二及大冶知縣各降一官淳熙五年詔舒州歲增鑄十萬貫以三十萬貫為額蘄州增鑄五萬貫以十五萬貫為額如更增鑄優與推賞御史黃洽言興天下之利者不窮天下之力舒蘄歲鑄四十五萬不易為也又有增鑄之賞恐其難繼詔除之八年以舒州水遠薪炭不便減額五萬貫明年又減十萬貫與蘄州並以十五萬貫為額十年併舒州之宿城監入同安監十二年詔舒蘄鑄鐵錢並增五萬貫以淳熙通寶為文光宗紹熙二年減蘄春同安兩監歲鑄各十萬貫嘉泰三年罷舒蘄鼓鑄開禧三年復之嘉定五年臣僚言江北以銅錢一折鐵錢四禁之時銅錢之在江北者自乾道以來悉以鐵錢易之或以會子一貫易銅錢一貫其銅錢輸送行在及建康鎮江府凡沿江私渡及邊徑嚴禁漏泄及於邊界三里內立堠如出界法其易京西銅錢如兩淮例京西湖北之鐵錢則取給於漢陽監及興國富民監後併富民監於漢陽監以二十萬為額前宋時川陝皆行鐵錢益利夔皆即山冶鑄紹興九年詔陝西諸路復行鐵錢十五年置利州紹興監歲鑄錢十萬緡以救錢引二十二年復嘉之豐遠邛之惠民二監鑄小平錢二十三年詔利州並鑄折二錢後又鑄折三錢淳熙十五年四川餉臣言諸州行使兩界錢引全籍鐵錢稱提止有利州紹興監歲鑄折三錢三萬四千五百貫有奇邛州惠民監歲鑄折三錢一萬二千五百貫今大安軍淳熙新興迎恩三爐出生鐵四十九萬五千斤利之昭化嘉川縣亦有爐新産鐵三十餘萬斤乞從鼓鑄嘉定元年即利州鑄當五大錢三年制司欲盡收舊引又於紹興惠民二監歲鑄三十萬貫其料並同當三錢若四川銅錢淳熙間易送湖廣總所儲之後又交卸於江陵寶慶元年新錢以大宋元寶為文端平元年以膽銅所鑄之錢不耐久舊錢之精緻者泄於海舶申嚴下海之禁嘉熙元年新錢當二並小平錢並以嘉熙通寶為文當三錢以嘉熙重寶為文淳祐四年右諫議大夫劉晉之言巨家停積猶可以發泄銅器鉟銷猶可以止遏唯一入海舟往而不返於是復申嚴漏泄之禁八年監察御史陳求魯言議者謂楮便於運轉故錢廢於蟄藏自稱提之屢更故圜法為無用急於扶楮者至嗾盜賊以窺人之閫奧峻刑法以發人之窖藏然不思患在於錢之荒而不在於錢之積夫錢貴則物宜賤今物與錢俱重此一世之所共憂也蕃舶巨艘形若山嶽乘風駕浪深入遐陬販於中國者皆浮靡無用之異物而泄於外夷者乃國家富貴之操柄所得幾何所失者不可勝計矣京城之銷金衢信之鍮器醴泉之樂具皆出於錢臨川隆興桂林之銅工尤多於諸郡姑以長沙一郡言之烏山銅爐之所六十有四麻潭鵝羊山銅戶數百餘家錢之不壞於器物者無幾今京邑鍮銅器用之類鬻賣公行於都市畿甸之近一繩以法由內及外觀聽聿新則鉟銷之姦知畏矣香藥象犀之類異物之珍奇可悅者本無適用之實服御之間昭示儉德自上化下風俗丕變則漏泄之弊少息矣此端本澄原之道也有旨從之十年以會價低減復申嚴下海之禁十二年申嚴鉟銷之禁及偽造之法咸淳元年復申嚴鉟銷漏泄之禁寶祐元年新錢以皇宋元寶為文
