body:
  text: 宋史卷一百九十三志第一百四十六兵七召募之制召募之制起於府衛之廢唐末士卒疲於征役多亡命者梁祖令諸軍悉黵面為字以識軍號是為長征之兵方其募時先度人材次閲走躍試瞻視然後黵面賜以緡錢衣履而隸諸籍國初因之或募土人就所在團立或取營伍子弟聽從本軍或募饑民以補本城或以有罪配隸給役取之雖非一塗而伉健者遷禁衛短弱者為廂軍制以隊伍束以法令當其無事時雖不無爵賞衣廩之費一有征討則以之力戰鬥給漕挽而天下獷悍失職之徒皆為良民之衛矣初太祖揀軍中彊勇者號兵樣分送諸道令如樣招募後更為木梃差以尺寸高下謂之等長杖委長吏都監度人材取之當部送闕者軍頭司覆驗引對便坐分隸諸軍真宗祥符中重定等杖自五尺八寸至五尺五寸為五等諸州部送闕下及等者隸次軍仁宗天聖元年詔京東西河北河東淮南陝西路募兵當部送者刺指揮二字家屬給口糧兵官代還以所募多寡為賞罰又詔益利梓夔路歲募民充軍士及數即部送分隸奉節川效忠川忠節於是遠方健勇失業之民悉有所歸慶曆七年諸路募廂軍及五尺七寸已上者部送闕下試補禁衛至和元年河北河東陝西募就糧兵騎以四百人步以五百人為一營嘉祐二年復定等杖自上四軍至武肅忠靖皆五尺已上差以寸分而視其奉錢一千者以五尺八寸七寸三寸為三等奉錢七百者以五尺七寸六寸五寸為三等奉錢五百者以五尺六寸五寸五分為三等奉錢四百者以五尺五寸四寸五分為二等奉錢三百者以五尺五寸四寸五分四寸三寸二寸為六等奉錢二百者以五尺四寸三寸五分三寸二寸為四等不給奉錢者以五尺二寸或下五寸七指八指為等唯武嚴御營喝探以藝精者充諸司管庫執技者不設等杖七年御史唐介言比歲等募禁軍多小弱不勝鎧甲請以初創尺寸為定敢議減縮者論以違制詔禁軍備戰者宜著此令其備役雄武宣敕六軍搭材之類如軍馬敕治平二年募陝西土民營伍子弟隸禁軍一營填止八分又遣使畿縣南京曹濮單陳許蔡亳州募民補虎翼廣勇人加賜絹布各一治平四年詔延州募保捷五營以備更戍熙寧元年詔諸州募饑民補廂軍二年樞密院言國初邊州無警則罷兵今既講和而屯兵至多徒耗金帛若於近𩹉糧賤處增募營兵但令往戍極邊甚為便計帝與文彥博及韓絳陳升之呂公弼等議之或以為自古皆募營兵遇事息即罷或以為緣邊之兵不可多減乃命彥博等詳議以聞三年七月詔京西路於有糧草州軍招廂軍共三萬人為額十一月知定州滕甫乞下本路依舊制募弓箭社以為邊備從之四年十二月樞密院言在京係役兵士舊額一萬八千二百五十九人見闕六千三百九十二人若招揀得足即不須外路勾抽以免不習水土凍餒道斃之患欲於在京及府界京東西河北招少壯兵止供在京功役不許臣僚占差不過期年可使充足却對減在外招募之數樁管所減糧賜上供以給有司之用從之五年權發遣延州趙離招到漢蕃弓箭手人騎四千九百八十四為八指揮遂擢吏部員外郎加賜銀絹二百七年分遣使臣諸路選募熙河效用先以名聞河北河東所募兵悉罷八年詔軍士祖父母父母老疾無侍丁而應募在他處者聽徙九年詔選補捧日天武以下諸軍闕馬軍三分補一步軍十分補五元豐二年二月經制熙河路邊防財用司言岷州川荔川閭川寨通遠軍熟羊寨乞置牧養十監募兵為監牧指揮其營田乞依官莊例募永濟卒二百人其永濟卒通以千人為額從之七月沿邊安撫司言北邊州軍主管刺事人乞給錢三千選募使臣職員或百姓為之以鈎致敵情仍選通判及監官考其虛實以行賞罰從之是年以兗鄆齊濟濱棣德博民饑募為兵以補開封府界京東西將兵之闕三年又詔府界諸路將下闕禁軍萬數有司其速募之又詔河北水災闕食民甚衆宜寄招補軍四年京東西路以調發兵將纍請增戍朝廷以兵員有數多寢其章然州郡實有負山帶海姦盜所窺亦當過為之慮其令益廣應募者與免貼軍及他役一年六月詔在京奉錢七百以下選募馬步軍萬五千人開封府界及本路共選募義兵保甲萬人如涇原五千人不足於秦鳳路選募五年五月同提舉成都府等路茶場蒲宗閔乞自秦州至熙州量地里遠近險易置車鋪二十八招刺兵士從之八月詔開封府界京西招軍依式賜外仍增錢千十二月詔京城四面巡檢募士於四門取民年三十五以下者又詔河北立額步軍各於逐指揮額外招百人五年詔一歲內能募及百人者加秩一等四月河東路經略司請以麟州飛騎府州威遠子弟二十五以下刺為兵七年廣西都鈐轄司言本路土兵闕額數多乞選使臣往福建江南廣東招簡投換兵四千人詔於江南福建路委官招換八年四月河東路安撫使呂惠卿言河東敢勇以三百人為額請給微薄應募者少臣頃在鄜延路日奏請增三等請給借支省馬給七分草料置營教習自後應募者衆願依陝西路已得指揮從之哲宗元祐元年三月詔河北保甲願投軍人及得上四軍等杖事藝者特許招填合給例物外更增錢五千中軍以下三千比等杖短一指射保甲第一等弓弩並許招刺從右司諫蘇轍請也六月門下侍郎司馬光言諸州軍兵馬全缺不足守禦之處量與立額招添八年樞密院言今新招兵士多是饑民未諳教閲乞自今住營州軍差官訓練候半年發遣赴軍前紹聖元年樞密院乞立招禁軍官員賞格如不及數罰亦隨之四年熙河蘭岷路都總管提點熙河蘭岷等路漢蕃弓箭手司言蘭州金城關欲招置步軍保捷四指揮馬軍蕃落一指揮從之詔陝西路添置蕃落軍十指揮各以五百人為額於永興軍河中鳳翔同華州各置兩指揮並隸住營州軍將下統制訓諫委逐路所屬都總管司選官招人初三省密院欲以牧地募民牧養馬久而未集曾布以謂不若增騎兵為簡便兼土兵乃徑兵又諸路出戍者已竭及建此議衆翕然皆以為允帝亦樂從之蓋牧租見存者七百萬歲額一百七十萬而十指揮之費二十五萬而已故可與募人養馬之法兼行也徽宗崇寧元年湖北都鈐轄舒亶奉旨相度召募施黔州土丁致討辰沅山猺每州無過七百人緣猺賊深在溪洞險阻不通正軍故也三年京東等路招軍五萬馬軍以崇捷崇鋭名步軍以崇武崇威名四年七月熙河蘭湟路轉運使洪中孚自河東入覲帝問崇威崇鋭新兵教閲就緒否中孚曰教閲易事也臣不知藝祖取天下之兵與神考所分將兵曾無減損若未嘗減損似不須增蓋兵貴簡練不貴多今遽增二軍所費至廣臣不知獻議者於經費之外別有措置或只仰給朝廷也帝愕然曰初議增兵未嘗議費可即罷去中孚曰惰游之卒不復安於南畝今一旦罷遣強者聚而為盜弱者轉徙則重為朝廷憂不若使填諸營闕無闕聽於額外收管不一二年盡矣帝稱善九月詔近降指揮在京諸路招崇捷崇武等指揮十萬人又招效忠蕃落指揮及額內不足人數慮卒難敷額可先招崇捷崇武十萬人候人數稍見次第即具申取旨五年詔抑勒諸色人投軍者並許自身及親屬越訴其已刺字仍並改正政和二年廣西都鈐司奏廣西兩將額一萬三百餘人事故逃亡於荊湖南北江南東西寄招緣諸路以非本職多不用心今兵闕六分欲乞本路鄰路有犯徒並杖以下情重之人除配沙門島廣南遠惡並犯強盜凶惡殺人放火事干化外並依法外餘並免決刺填從之四年中衛大夫童師敏言東南州郡例闕廂軍凡有役使並是和雇若令諸郡守臣並提刑司措置招填庶可省費從之宣和元年高陽關路安撫使吳玠奉手詔招填諸路禁軍闕額以十分為率招及四分以下遞展磨勘年七分以上遞減磨勘年高陽關路河間府滄霸恩州信安軍招填數足乞行推賞從之二年手詔比聞諸路州軍招置廂軍河清壯城等往往怯懦幼小不及等樣虛費廩食不堪驅使今後並仰遵著令招填如違戾以違制論四年正月兩浙東路鈐轄司奏乞將溫處衢婺州元管不係將禁軍六指揮更招置增為十指揮並以五百人為額凡五千人庶成全將及更於台州招置不係將禁軍一指揮以四百人為額從之三月臣僚言竊聞道路洶洶相怖云諸軍捉人刺以補闕額率數人驅一壯夫且曳且毆百姓叫呼或齧指求免日者金明池人大和會忽遮門大索但長身少年牽之而去云充軍致賣蔬茹者不敢入城行旅市人下逮奴隸皆避藏恐懼事駭見聞今國家閒暇必欲招填禁旅當明示法令賚以金帛捐財百萬則十萬人應募矣捉人於途實虧國體流聞四方傳播遠邇殊為未便伏望亟行禁止以弭疑畏時寶籙宮道士張繼滋因往尉氏亦被刺事聞手詔提刑司根治四月臣僚因言招刺闕額禁軍樞密院立限太遽諸營弗戢人用大駭幸不旋踵德音禁止羣情悅服其已被刺而非願者頗亦改正尚有經官求免而未得者輦轂若此况其遠乎竊聞小人假借聲勢因緣奪攘所在多有若或哀鳴得脫其家已空今往來猶懷畏避伏望聖明特賜戒敕應在外招軍去處毋得橫濫從之七年減掖庭用度減侍從官以上月廩罷諸兼局有司據所得數撥充諸路糴本及募兵賞軍之用欽宗即位詔守令募州縣鄉村土豪為隊長各自募其親識鄉里以行及五十人以上先與進義副尉三百人以上與承信郎募文武官習武勇者為統領行日所發州軍授以器甲人給糧半月地里遠者所至州縣接續批支京畿輔郡兵馬制置使司言諸路召募敢勇效用每名先給錢三千赴本司試驗給據訖支散銀絹激賞若監司知通令佐並應有官人能召到敢勇效用事藝高強及二百人以上者乞與轉一官每加二百人依此或監司郡守州縣官以下應緣軍期事件稍有稽緩並依軍法從之靖康元年春正月臣僚言諸路見招募人兵緣逐處漕計闕乏乞於近州應奉司及延福宮西城錢帛並許請用庶得速辦從之又詔龍猛龍騎歸遠壯勇諸軍闕額可行下諸路揀選配填又詔已降指揮逐處各以召募效用敢勇武藝人數多寡等第推賞又詔聞希賞之人抑勒強募自今並取情願敢有違戾當議重罰毋得將羸弱不堪出戰及已有係軍籍者一例充募及詔募武舉及第有材武方略或有戰功曾經戰陳及經邊任大小使臣不以罪犯已發未及武學有方略智謀及曾充弓馬所子弟及諸色有膽勇敢戰之人並許赴親征行營司又詔募陝西土人為兵並使臣效用等赴姚平仲軍使喚其應募人修武郎已上二十貫進義副尉以上十五貫軍人百姓十貫並於開封府應管官錢內支四月詔已降指揮發還歸朝人往大金軍前如不願往所在量給口券津遣元有官守人並不釐務支奉給之半其願效力軍前者許自陳五月河北河東路宣撫司奏河北諸州軍所管正兵絶少又陝西游手惰民願充軍者亦衆祗緣招刺闕乏例物是致軍額常闕今若給一色銀絹折充例物犒設起發召募人作義勇止於右臂上刺字依禁軍例物支衣糧料錢陝西五路共可得二萬人比之淮浙等路所得將兵實可使喚從之詔遣文武官各一員前去陝西路募兵二萬人赴闕遂命趙鼎特除開封府曹官种湘差宣撫司準備將領並充陝西路幹當公事專一募兵是月遣戶部員外郎陳師尹往福建路募槍杖手都水使者陳求道言朝廷差官往陝西招軍適當歲豐恐未易招填若就委監司招募保甲啖以例物與免科差以作其氣可得徑兵五萬從之六月樞密都承旨折彥實奏西人結連女真為日甚久豈無覬覦關中之志即今諸路人馬皆空萬一敵人長驅何以枝梧言之可為寒心朝廷似未深慮也河東河朔之患已形人故憂之陝西之患未作人故忽之若每路先與十萬緡令帥臣招募土人為保護之計責以控扼不得放令侵入仍須朝廷應副漕司乘時廣行儲蓄以為急務又開封府尹聶山奏招兵者今日之急務近緣京畿諸邑例各招刺至於無人就募則強捕村民及往來行人為之遂致里氓奔駭商旅不行殊失朝廷愛民之意檢準政和令諸盜再犯杖以上情理不可決放而堪充軍者給例物刺充廂軍今京城𩹉外間有盜賊皆是豪猾無所畏憚雖經斷罪頑惡弗悛若依上條刺充廂軍不惟得強壯之用又且收集姦黠不復為盜如允所請則自內及外皆可見之施行從之七月陝西五路制置使錢蓋言都水使者陳求道請招刺保甲五萬充軍緣比來陝右正兵數少全籍保甲守禦及運糧諸役差使外所餘無幾若更招刺五萬充軍則是正丁占使殆遍不唯難以選擇兼慮民情驚疑別致生事欲乞令州縣曉諭保甲取其情願如未有情願之人即乞令保甲司於正丁餘數內選擇通赴闕人共成七萬可以足用從之是月錢蓋奏陝西募土人充軍多是市井烏合不堪臨敵今折彥實支陝西六路銅錢各十萬緡每名添錢十千自可精擇少壯及等杖人可得正軍一萬六路共得六萬人從之十月樞密院奏召募有材武勇鋭及膽勇人并射獵射生戶從之又奏福建路有忠義武勇立功自效取仕之人理宜召募除保甲正兵外弓手百姓僧行有罪軍人並聽應募如有武藝高強實有膽勇衆所推服願應募為部領人者依逐項名目權攝部領各以所募人數借補官資從之十一月京城四壁共十萬人黃人黃旗滿市時應募者多庸丐殊無鬥志閏十一月何石函用王健募奇兵雖操瓢行乞之人亦皆應募倉卒未就紀律奇兵亂毆王健殺使臣數十人內前大擾王宗濋斬渠魁數人乃定及出戰為鐵騎所衝望風奔潰殲焉十二月詔諸軍詐效蕃裝焚劫財物限十日齎贓自首與免罪仍召募潰兵收管給口食焉逃亡之法國初以來各有增損熙寧五年詔禁軍奉錢至五百而亡滿七日者斬舊制三日者死初執政議更法請滿十日帝曰臨陳而亡過十日而首得不長姦乎安石曰臨陳而亡法不計日即入斬刑今當立在軍興所亡滿三日論如對寇賊律樞密使蔡挺請沿邊而亡滿三日者斬安石曰沿邊有非軍興之所不可一概坐以重刑本立重法以禁避寇賊及軍興而已帝曰然文彥博固言軍法臣等所當總領不宜輕改如前代銷兵乃生變安石曰前代如杜元穎等銷兵乃其措置失當非兵不可銷也且當蕭俯時天下兵至多民力不給安得不減方幽州以朱克融等送京師請毋遣克融還幽州煽衆為亂而朝廷乃令克融等飄泊京師久之不調復遣歸北克融所以復亂亦何預銷兵事彥博曰國初禁軍逃亡滿一日者斬仁宗改滿三日當時議者已慮壞軍法安石曰仁宗改法以來活人命至多然於軍人逃亡比舊不聞加多仁宗改法不為不善帝乃詔增為七日元豐元年知鄂州王韶言乞自今逃亡配軍為盜聽捕斬賞錢詔坐條劄韶照會如所犯情重罪不至死奏裁三年六月詔軍士民兵逃亡隨軍效用若首獲並械送所屬論如法雖立戰功不賞仍不許以功贖過令隨軍榜諭四年詔沈括奏以軍前士卒逃亡潰散在路本非得已須當急且招安卿可速具朝旨出榜云聞戰士止是不禁饑寒逃歸其家可各隨所在城寨權送納器甲請給糧食聽歸所屬節次具招撫數以聞崇寧四年九月樞密院言熙河都總管司舊無兵籍乞令諸將各置籍日具有無開收旬具元額見管及逃亡事故細目申總管司本司揭貼都簿委機宜一員逐時抽摘點檢從之十月尚書省言今所在逃軍聚集至以千數小則驚動鄉邑大則公為劫盜纍降指揮許以首身或令投換終未革絶昔神宗以將不知兵兵不知將故分兵領將統兵官司凡兵之事無所不統則其逃亡走死豈得不任其責檢會將敕與見行敕令皆未有將官與人員任責之法致今來兵將不加存恤勞役其身至於逃避而任職之人悉不加罪近日熙河一路逃者幾四萬將副坐視而不禁人員將校故縱而不問至逃亡軍人所在皆有蓋自來立法未詳兼軍中長行節級人員將校什長相統同營相依上下相制豈得致其逃亡漫不省察况招軍既立賞格則逃走安可無禁今參詳修立賞罰十數條並從之五年樞密院備童貫所言陝西等處差官招諭逃亡軍人並許所在首身更不會問便支口券令歸本營邊上軍人憚於戍守之勞往往逃竄於內郡首身遂得口券歸營恐相習成風有害軍政乞自今應軍人首身並須會問逃亡赦限依今來招諭指揮若係赦後逃亡即乞依條施行從之大觀三年樞密院備臣僚言云自陝西路提點刑獄吳安憲始陳招誘逃亡廂禁軍之法乃著許令投換改刺之令自此諸弊寖生軍律不肅朝廷洞見其弊已嚴立法然尚有冒名一節其弊未除請如主兵官舊曾占使書札作匠雜技手業之徒或與統轄軍員素有嫌忌意欲舍此而就彼或所部逃亡數多欲避譴責輒將逃軍承逃亡之名便與請給既避譴責又冒請受上下相蒙莫之能革致使軍士多懷擅去之心者良以易得擅住之地也若加重賞申以嚴刑庶革斯弊有裨成法從之四年樞密院言諸路及京畿逃亡軍數居多雖赦敕立限許首終懷畏避若諸路專委知州通判或職官一員京畿委知縣若招誘纍及三百人以上與減一年磨勘五百人以上一年半千人以上取旨推恩於理為便政和二年臣僚言祖宗軍政大備無可議者比多逃亡者緣所在推行未至及主兵司官遵奉未嚴故也其弊有六一曰上下率斂二曰舉放營債三曰聚集賭博四曰差使不均五曰防送過遠六曰單身無火聚似此雖具有條禁而犯者極多欲乞下有司推究除兵將官歲終立定賞罰條格外詔諸路提刑司每歲終將本路州軍不係將禁軍見管及逃亡人數參互比較具最多最少處各一州知通職位姓名申樞密院從之三年十一月開封少尹陳彥修言諸廂收到寒凍赤露共五千七百餘人其間逃軍數多合行措置今欲依押送逃軍格每二十人各差使臣一員付與係押送人各踏逐穩便官屋安泊依居養法關請錢米存養候晴和管押前去所有沿路支破口券並依本府押送逃軍法請於合破口券等外更量支盤纏詔每人支盤纏錢三百衲襖一領候二月晴暖即行發遣四年尚書省著令諸禁軍差發出戍未到軍前或已到而代去半年以上逃亡首獲雖會恩配如捕獲法上軍首身或捕獲會恩配依七日內法下軍本名應配者配千里若本管輒停留與同罪雖該赦仍依配法從之五年立錢監兵匠逃走刺手背法宣和二年手詔逃卒頗多仰宣撫司措置以聞童貫言凡逃卒冬祀大赦已有百日首身免罪之文緣內有元犯雖首身於常法尚合移降移配者即未敢赴官自陳欲乞在京并京畿京西陝西河東路逃軍自今指揮到日通未滿赦限共一百日許令首身免罪依舊軍分職次收管仍免本司本營問儅及放免官逋如本犯經冬祀赦後猶有移降移配特與原免若限滿不首則依常法科罪凡逃軍係在京住營依限於在京首身者令所隸軍司當日押赴本營若見出戍者即破口券轉押赴本路駐泊州軍並依前項指揮免罪依舊收管凡逃軍在外依限首身者並於所在日破米二升其縣鎮寨並限當日解本州軍每二十人作一番差職員管押仍沿路給破口食交付前路州軍轉送住營去處如見出戍即轉駐泊州軍收管凡首身軍人並不許投換他軍凡所在當職官如能於限內用心招收逃軍措置轉送住營或出戍處收管候滿在外委提刑司在京委開封府取索到營出戍處公文驗人數最優者申宣撫司取旨推恩並從之三年詔江浙軍前等處應逃竄軍兵並特放罪許於本將見出軍路分州縣首身依舊給請隨處權行收管若走往他處或於住營去處首獲即令所在官司逐旋發遣赴本將應副使喚仍委逐路安撫鈐轄提刑司覺察如所在輒敢隱芘或逐司不行覺察並論違制四年臣僚言中外士卒無故逃亡所在有之祖宗治軍紀律甚嚴若在戍者還家當役者避事必有轅門之戮今既宥其罪且許投換不制於什伍之長既立赦限又特展日以寬其自首之期臣恐逃亡得計其弊益滋乞除恩赦外不輕與限使知限之不可為常庶有畏懼從之五年臣僚言今諸軍逃亡者不以實聞諸處冒名請給至於揀閲差役則巧為占破甚不獲已則雇募逋逃以充名數旋即遁去無復實用平居難於供億緩急無以應用而姦人攘臂其間坐費財賦雖開收勘斂法制滋詳而共利之人一體傅會望賜處分先令當職官核見實數保明申達轉運司期日委諸郡守二點閲仍關掌兵官司照會行下不可勾押至州者差官就閲期以同日究見的實稍涉欺罔根治不赦監司使者分郡覆實具數申達于朝以待差官分按必行罪賞使官無虛費而軍有實用則紀律可明國用可省詔送樞密院條畫措置七年二月尚書省言開封府狀乞應在京犯盜配降出外之人復走入京投換者許人告捕科以逃亡捕獲之罪酌情增配其官司及本營典首人員曹級容庇收留各杖一百因致為盜者依差使配軍入京作過法與犯人同罪罪止徒二年不以去官赦原減及在京犯罪編管出外逃亡入京之人雖有斷罪增加地里條法緣止是募告賞格太輕是致往往復走入京欲乞元犯杖罪賞錢十貫徒罪二十貫流罪三十貫並以犯事人家財充從之十二月詔應諸路逃竄軍人或已該赦恩出首避免却歸出戍去處再行逃竄之人令於所在去處首身並特與免罪於一般軍分安排支破請給發赴軍前使喚靖康元年三月詔隨從行宮禁衛軍兵等有逃亡者並依法施行五月臣僚言泗州頃遣勤王之師管押者不善統制類多遁歸既而畏法不敢出本州遂開閣請受在外無以給養竊慮因聚為盜恐他州亦多如此乞敕應勤王兵有遁歸已經赦宥者並令首身從之六月詔應河東潰散諸路將佐並仰逐路帥守發遣赴河東河北制置司以功贖過河北路制置司都統制王淵言被旨差充招集种師道等下潰散人馬應援太原限滿不首即寄禁家屬許人收捕赴軍前重行處置從之仍自指揮到日限以十日河北路制使劉韐奏近制置使种師中領軍到於榆次失利潰散師中不知存在奉旨師中下應統制將佐使臣等並與放罪臣按用兵失主將統制將佐並合行軍法軍法行則人以主將為重緩急必須護救若不行軍法緩急之際爭先逃遁視主將如路人略不顧恤近年以來高永年陷歿一行將佐及中軍將提轄等未嘗罪以軍法繼而劉法陷歿今种師中又死王事若兩軍相遇勢力不加血戰而敗或失主將亦無可言榆次之戰頃刻而潰統制將佐使臣走者十已八九軍士中傷十無一二獨師中不出若謂師中撫御少恩紀律不嚴而其受命即行奮不顧身初聞右軍戰却即遣應援比時諸將已無在者至賊兵犯營師中猶未肯上馬使師中有偷生之心聞敗即行亦必得出一時將佐若能戮力相救或可破敵今一軍才却諸將不有主帥相繼而遁其初猶有懼色既聞放罪遂皆釋然朝廷以太原之圍未解未欲窮治今師旅方興深恐無所懲艾遇敵必不用命欲乞指揮應种師中下統制將佐並依聖旨處分仍令軍前自效如能用命立功與免前罪今後非立戰功雖該恩赦不得叙復仍乞優詔褒贈師中以為忠義之勸詔种師中下統制將佐並降五官仍開具職位姓名申尚書省餘依劉韐所奏八月河北河東路宣撫司奏近據都統制王淵捉獲潰敗使臣已管押赴宣撫副使劉韐軍前交割依軍法施行外訪聞尚有未曾出首將佐使臣詔限今指揮到日更與展限十日許令於所在州軍出首仍依元降指揮免罪特與支破遞馬驛券疾速發赴軍前自效候立功日優加推賞如再限滿日更不首身當取見職名重賞購捕定行軍法仍多出榜示諭二年四月詔訪聞諸處潰散軍人嘯聚作過將百姓強刺充軍驅虜隨行使喚遇敵使前害枉良民其令有司榜諭被虜強刺之人許以自陳給據各令歸業願充軍者隨等杖刺填禁廂軍依條支給例物又詔昨逃亡班直諸軍雖已降指揮撫諭並與免罪發歸元處其管押兵官未有指揮可候指揮到許於所在官司自陳亦與免罪建炎初招募多西北之人其後令諸路州軍寨或三衙招募或選刺三衙軍中子弟或從諸郡選刺中軍子弟解發復詔滄濱及江淮沿流州軍募善沒水經時伏藏者以五千為額神武右軍統制張俊言牙軍多招集烏合之衆擬上等改刺勝捷次等刺振華振武庶得部分歸一訓練為便詔兩浙江東除江陰軍各募水軍二百人紹興元年廣東帥臣言本路將兵元五千二百見千三百十九今擬將官駐劄諸軍洎本路州軍以十分為率各招其半二年纍降令行在諸軍毋互相招收及將別軍人拘執違者行軍法四年詔所招河北人充河北振武餘人刺陝西振華指揮沿江招置水軍備戰艦募東南諳水者充每指揮以五百為額十年詔三京路招撫處置使司招效用軍兵萬人內招使臣二千員十五年福建安撫莫將言汀漳泉建四州與廣東江西接壤比年寇盜剽劫居民土豪備私錢集社戶防捍有勞有司不為上聞推恩破家無所依歸勢必從賊官軍不習山嶮且瘴癘侵加不能窮追管屬良民悉轉為盜請委四州守臣募此游手無歸勇健之人各收千人仍以效用為名足可備用實永久利詔令張淵同措置二十四年殿前都指揮使楊存中言舊制在京所管捧日天武拱聖驍騎驍勝寧朔神騎神勇宣武虎翼廣勇諸指揮禁軍內捧日天武依條升揀扈衛諸班直拱聖神勇以下升揀捧日天武除逃亡有故僅千九百人請於今年分定月內招千人二十七年楊存中奉旨三衙所招效用兵令住招今闕六千七百二十六人若不招填兵數日損詔本司來年正月為始依舊招募隆興元年步軍司郭振言本司在京日軍額三萬九千五百今行在僅千二百一十九詔招填千七百八十一人以三千為額刺充神衛虎翼飛山床子弩雄武等指揮乾道七年馬軍司王友直言見管戰馬二千七百餘止有傔馬六百餘人請招傔兵千五百並充雄威詔招千人刺步傔二字步軍司吳挺言步司五軍額二萬五千見闕三千六百詔令招填淳熙十六年殿前副都指揮郭鈞言淳熙五年住招兵今踰十載戰隊合用火分傔兵闕詔招千人紹熙二年詔步軍司招軍千人慶元元年詔楚州招到二百六十一人補弩手效用五年詔給降度牒付金州都統招填闕額并揀汰兵照紹熙初年令自五尺四寸至五尺六寸三等招收開禧元年興元都統秦世輔言本司軍多闕額紹興之末管二萬九千餘人乾道三年立額二萬七千今二萬五千四百差戍官占實萬一百四十三人點閲所部堪披帶人僅六百二十七請從本司酌紹興額招刺參知政事蔣芾言在內諸軍每月逃亡不下四百人若權住招一年半俟財用稍足招強壯不惟省費又得兵精且南渡以來兵籍之數紹興十二年二十一萬四千五百餘人二十三年二十五萬四千五百四十人三十年三十一萬八千一百三十八人乾道三年三十二萬三千三百一人只比二十三年已增六萬九千六十一人如此何緣財用有餘寶慶二年知武岡軍吳愈言禁衛兵所以重根本威外夷太祖聚天下精兵在京者十餘萬州郡亦十餘萬嘉定十五年三衙馬步諸軍凡七萬餘闕舊額三萬若以川蜀荊襄兩淮屯戍較之奚啻數倍於禁衛宜遵舊制擇州郡禁兵補禁衛闕州郡闕額帥守招填紹定四年臣僚言州郡有禁卒有壯城有廂軍有土兵一州之財自足以給一州之兵比年尺籍多虛月招歲補悉成文具蓋州郡吝養兵之費所招無二三逃亡已六七宜申嚴帥臣應郡守到罷具兵額若干逃故若干招填若干考其數而黜陟之寶祐間州郡闕守承攝者遣令招刺不詢材武務盜帑儲咸淳季年邊報日聞召募尤急官降錢甚優厚強刺平民非無法禁所司莫能體上意執民為兵或甘言誑誘或詐名賈舟候負販者羣至輒載之去或購航船人全船疾趨所隸或令軍婦冶容誘于路盡涅刺之由是野無耕人途無商旅往往聚丁壯數十而后敢入市民有被執而赴水火者有自斷指臂以求免者有與軍人抗而殺傷者無賴乘機假名為擾九年賈似道疏云景定元年迄今節次招軍凡二十三萬三千有奇除填額創招者九萬五千近又招五萬謂之無兵不可十年汪立信書抵賈似道陳三策一謂內地何用多兵宜悉抽以過江可得六十萬矣蓋兵不貴多貴乎訓練之有素苟不堪受甲徒取充數將焉用之考之舊制凡軍有闕額即招填熙寧元豐講求民兵之政於是募兵浸減而三衙多虛籍至于靖康禁衛弱矣中興復用招募立等杖選勇壯核人才驗虛實審刺之法雖在諸屯而已招者兵籍悉總于樞府云
