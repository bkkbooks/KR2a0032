body:
  text: 宋史卷六十六志第十九五行四金從革金性也金失其性則為變怪舊説以僭咎恆暘詩妖民訛毛蟲之孽白眚白祥之類皆屬之金今從之建隆二年七月晉州神山縣北谷中有鐵隨水流出方二丈三尺其重七千斤太平興國四年九月夾江縣民王詣得黑石二皆丹文其一云君王萬歲其二云趙二十一帝緘其石來獻至道二年二月桂陽監鎔銀自涌成山峯狀咸平四年十二月颶州太清宮鍾自鳴乾興元年四月甲戌修奉山陵總管言皇堂隧道穿得銅鍋有兩耳又於寢宮三門下穿得銅盂一鐵甕一鐵甲葉三天聖元年三月庚辰涪陵縣相思寺夜有光出阿育王塔之舊址發之得金銅像三百二十七五年七月壬寅遼山縣舊河凌地摧塔獲古錢一百四十六千五百四十三文明道元年五月壬午漢州江岸獲古鍾一慶曆四年五月乙亥金溪縣得生金山重三百二十四兩皇祐四年乾寧軍漁人得小鍾二於河濱五年二月己亥乾寧軍又進古鍾一至和二年四月甲午瀏陽縣得古鍾一熙寧元年至元豐元年橫州共獲古銅鼓一十七元豐三年八月嶽州永慶寺獲銅鍾一銅磬二六年南溪縣穿土得銅錢五萬四千有奇七年三月筠州獲古銅鍾一十一月賓州獲銅鼓一八年昌元縣通鹽井得銅鍋九銅盆一銅盤一崇寧五年十月荊南獲古銅鼎政和二年玄圭始出晉州上一石緑色方三尺餘當中有文曰堯天正其字如掌大而端楷類手畫者堯字居右天正字綴行于左都堂驗視礱石三分而字畫愈明又於堯字之下隱約出一瑞字位置始均蓋曰天正堯瑞云或謂晉陽堯都也方玄圭出乃有此瑞四年府畿汝蔡之間連山大小石皆變為瑪瑙尚方取為寶帶器玩甚富五年正月湖南提舉常平劉欽言蘆荻衝出生金重九斤八兩狀類靈芝祥雲又淘得碎金四百七兩有奇十一月越州民拾生金湟州丁羊谷金坑僅千餘眼得礦成金共四等計一百三十四兩有奇重和元年十二月孝感縣楚令尹子文廟獲周鼎六宣和四年後御府所藏往往復變為石而色類白骨此與周寶圭占略同五年滎陽縣賈谷山麒麟谷采石修明堂得一石有文曰明百官表賀五年四月又獲甗鼎三崇寧四年三月鑄九鼎用金甚厚取九州水土內鼎中既奉安於九成宮車駕臨幸遍禮焉至北方之寶鼎忽漏水溢于外劉炳謬曰正北在燕山今寶鼎但取水土於雄州境宜不可用其後竟以北方致亂建炎元年南京留守朱勝非夜防城見南門外火光燭地掘之得銅印有文曰朱勝私印火鑠金金所畏也後拜相有明受之變卒坐貶三年吉州修城役夫得髑髏棄水中俄浮一鍾有銘五十六字大略云唐興元吾子沒瘞廬陵西壘後當火德五九之際世衰道敗浙梁相繼喪亂章貢康昌之日吾亦復出是邦東平鳩工復使吾子同河伯聽命水官郡守命録其辭録畢而鍾自碎紹興十一年三月庚申長安兵刃皆生火光二十六年郫縣地出銅馬高三尺制作精好風雨夜嘶紹興中耕者得金甕重二十四鈞於秦檜別業乾道二年三月丙午夜福清縣石竹山大石自移聲如雷石方可九丈所過成蹊才四尺而山之木石如故慶元二年十二月吳縣金鵝鄉銅錢萬百自飛建隆二年京師夏旱冬又旱三年京師春夏旱河北大旱霸州苗皆焦仆又河南河中府孟澤濮鄆齊濟滑延隰宿等州並春夏不雨四年京師夏秋旱又懷州旱乾德元年冬京師旱二年正月京師旱夏不雨是歲河南府陝虢麟博靈州旱河中府旱甚四年春京師不雨江陵府華州漣水軍旱五年正月京師旱秋復旱開寶二年夏至七月京師不雨三年春夏京師旱邠州夏旱五年春京師旱冬又旱六年冬京師旱七年京師春夏旱冬又旱河南府晉解州夏旱滑州秋旱八年春京師旱是歲關中飢旱甚太平興國二年正月京師旱三年春夏京師旱四年冬京師旱五年夏京師旱秋又旱六年春夏京師旱七年春京師旱孟虢絳密瀛衛曹淄州旱九年夏京師旱秋江南大旱雍熙二年冬京師旱三年冬京師旱四年冬京師旱端拱二年五月京師旱秋七月至十一月旱上憂形於色蔬食致禱是歲河南萊登深冀旱甚民多飢死詔發倉粟貸之淳化元年正月至四月不雨帝蔬食祈雨河南鳳翔大名京兆府許滄單汝乾鄭同等州旱二年春京師大旱三年春京師大旱冬復大旱是歲河南府京東西河北河東陝西及亳建淮陽等三十六州軍旱四年夏京師不雨河南府許汝亳滑商州旱五年六月京師旱至道元年京師春旱二年春夏京師旱咸平元年春夏京畿旱又江浙淮南荊湖四十六軍州旱二年春京師旱甚又廣南西路江浙荊湖及曹單嵐州淮陽軍旱三年春京師旱江南頻年旱四年京畿正月至四月不雨景德元年京師夏旱人多暍死三年夏京師旱大中祥符二年春夏京師旱河南府及陝西路潭邢州旱三年夏京師旱江南諸路宿州潤州旱八年京師旱九年秋京師旱大名府澶州相州旱天禧元年京師春旱秋又旱夏陝西旱四年春利州路旱夏京師旱五年冬京師旱天聖二年春不雨五年夏秋大旱六年四月不雨明道元年五月畿縣久旱傷苗二年南方大旱景祐三年六月河北久旱遣使詣北嶽祈雨慶曆元年九月丁未朔遣官祈雨二年六月戊寅祈雨三年遣使詣嶽瀆祈雨四年三月丙寅遣內侍兩浙淮南江南祠廟祈雨五年二月詔天久不雨令州縣決淹獄又幸大相國寺會靈觀天清寺祥源觀祈雨六年四月壬申遣使祈雨七年正月京師不雨二月丙寅遣官嶽瀆祈雨三月辛丑西太乙宮祈雨皇祐元年五月丁未遣官祈雨三年恩冀諸州旱三月分遣朝臣詣天下名山大川祠廟祈雨至和二年四月甲午遣官祈雨嘉祐五年梓州路夏秋不雨七年三月甲子罷春燕以久旱故也辛丑西太乙宮祈雨治平元年春京師踰時不雨鄭滑蔡汝潁曹濮洺磁晉耀登等州河中府慶成軍旱二年春不雨熙寧二年三月旱甚三年諸路旱六月畿內旱八月衛州旱五年五月北京自春至夏不雨七年自春及夏河北河東陝西京東西淮南諸路久旱九月諸路復旱時新復洮河亦旱羌戶多殍死八年四月真定府大旱八月淮南兩浙江南荊湖等路旱九年八月河北京東京西河東陝西旱十年春諸路旱元豐二年春河北陝西京東西諸郡旱三年春西北諸路旱五年亢旱六年夏畿內旱元祐元年春諸路旱正月帝及太皇太后車駕分日詣寺觀禱雨是冬復旱二年春旱三年秋諸路旱京西陝西尤甚四年春京師及東北旱罷春燕八年秋旱紹聖元年春旱疏決四京畿縣囚三年江東大旱溪河涸竭四年夏兩浙旱元符元年東南旱二年春京畿旱建中靖國元年衢信等州旱大觀二年淮南江東西諸路大旱自六月不雨至于十月政和元年淮南旱三年江東旱四年旱詔振德州流民宣和元年二月詔汝潁陳蔡州飢民流移常平官勒停秋淮南旱四年東平府旱五年夏秦鳳路旱是歲燕山府路旱建炎二年夏旱紹興二年常州大旱帝問致旱之由中書舍人胡交修奏守臣周祀殘酷所致尋以屬吏坐贓及殺不辜竄嶺南三年四月旱至于七月帝蔬食露禱乃雨五年五月浙東西旱五十餘日六月江東湖南旱秋四川郡國旱甚六年夔潼成都郡縣及湖南衡州皆旱七年春旱七十餘日時帝將如建業隨所在分遣從臣有事于名山大川六月又旱江南尤甚八年冬不雨九年六月旱六十餘日有事于山川十一年七月旱戊申有事于嶽瀆乙卯禱雨于圜丘方澤宗廟十二年三月旱六十餘日秋京西淮東旱十二月陝西旱十八年浙東西旱紹興府大旱十九年常州鎮江府旱二十四年浙東西旱二十九年二月旱七十餘日秋江浙郡國旱三十年春階成鳳西和州旱秋江浙郡國旱浙東尤甚隆興元年江浙郡國旱京西大旱二年台州春旱興化軍漳福州大旱首種不入自春至于八月乾道三年春四川郡縣旱至于秋七月綿劍漢州石泉軍尤甚四年夏六月旱帝將撤蓋親禱于太乙宮而雨時襄陽隆興建寧亦旱八月詔頒皇祐祀龍法于郡縣五年夏秋淮東旱盱眙淮陰為甚六年夏浙東福建路旱溫台福漳建為甚七年春江西東湖南北淮南浙婺秀州皆旱夏秋江洪筠潭饒州南康興國臨江軍尤甚首種不入冬不雨九年婺處溫台吉贛州臨江南安諸軍江陵府皆久旱無麥苗淳熙元年浙東湖南郡國旱台處郴桂為甚蜀關外四州旱二年秋江淮浙皆旱紹興鎮江寧國建康府常和滁真揚州盱眙廣德軍為甚三年夏常昭復隨郢金洋州江陵德安興元府荊門漢陽軍皆旱四年春襄陽府旱首種不入五年常綿州鎮江府及淮南江東西郡國旱有事于山川羣望六年衡永楚州高郵軍旱七年湖南春旱諸道自四月不雨行都自七月不雨皆至于九月紹興隆興建康江陵府台婺常潤江筠撫吉饒信徽池舒蘄黃和潯衡永州興國臨江南康無為軍皆大旱江筠徽婺州廣德軍無錫縣尤甚禱雨于天地宗廟社稷山川羣望八年正月甲戌積旱始雨七月不雨至于十一月臨安鎮江建康江陵德安府越婺衢嚴湖常饒信徽楚鄂復昌州江陰南康廣德興國漢陽信陽荊門長寧軍及京西淮郡皆旱九年夏五月不雨至于秋七月江陵德安襄陽府潤婺溫處洪吉撫筠袁潭鄂復恭合昌普資渠利閬忠涪萬州臨江建昌漢陽荊門信陽南平廣安梁山軍江山定海象山上虞嵊縣皆旱十年六月旱至于七月江淮建康府和州興國軍恭涪瀘合金州南平軍旱十一年四月不雨至于八月興元府吉贛福泉汀漳潮梅循雍賓象金洋西和州建昌軍皆旱興元吉尤甚冬不雨至于明年二月十四年五月旱六月戊寅有事于山川羣望甲申帝親禱于太乙宮七月己酉大雩于圜丘望于北郊有事于嶽瀆海凡山川之神時臨安鎮江紹興隆興府嚴常湖秀衢婺處明台饒信江吉撫筠袁州臨江興國建昌軍皆旱越婺台處江州興國軍尤甚至于九月乃雨十五年舒州旱紹熙元年重慶府蘄池州旱二年五月真揚通泰楚滁和普隆涪渝遂高郵盱眙軍富順監皆旱簡資榮州大旱三年夏郢揚和州大旱秋簡資普榮隆富順監亦大旱四年綿州大旱亡麥簡資普渠合州廣安軍旱江浙自六月不雨至于八月鎮江江陵府婺台信州江西淮東旱五年春浙東西自去冬不雨至于夏秋鎮江府常秀州江陰軍大旱廬和濠楚州為甚江西七郡亦旱慶元二年五月不雨三年潼利夔路十五郡旱自四月至于九月金蓬普州大旱四月壬子禱于天地宗廟社稷六年四月旱五月辛未禱于郊丘宗社鎮江府常州大旱水竭淮郡自春無雨首種不入及京襄皆旱嘉泰元年五月旱丙辰禱于郊丘宗社戊辰大雩于圜丘浙西郡縣及蜀十五郡皆大旱二年春旱至于夏秋七月庚午大雩于圜丘祈于宗社浙西湖南江東旱鎮江建康府常秀潭永州為甚四年五月不雨至于七月浙東西江西郡國旱開禧元年夏浙東西不雨百餘日衢婺嚴越鼎澧忠涪州大旱二年南康軍江西湖南北郡縣旱三年二月不雨五月己丑禱于郊丘宗社嘉定元年夏旱閏月辛卯禱于郊丘宗社二年夏四月旱首種不入庚申禱于郊丘宗社六月乙酉又禱至于七月乃雨浙西大旱常潤為甚淮東西江東湖北皆旱四年資普昌合州旱六年五月不雨至于七月江陵德安漢陽軍旱八年春旱首種不入四月乙未禱于太乙宮庚子命輔臣分禱郊丘宗社五月庚申大雩于圜丘有事于嶽瀆海至于八月乃雨江浙淮閩皆旱建康寧國府衢婺溫台明徽池真太平州廣德興國南康盱眙安豐軍為甚行都百泉皆竭淮甸亦然十年七月不雨帝日午曝立禱于宮中十一年秋不雨至于冬淮郡及鎮江建寧府常州江陰廣德軍旱十四年浙閩廣江西旱明台衢婺溫福贛吉州建昌軍為甚十五年五月不雨嶽州旱嘉熙元年夏建康府旱三年旱四年江浙福建旱淳祐七年旱十一年閩廣及饒州旱咸淳六年江南大旱十年廬州旱長樂福清二縣大旱建隆中京師士庶及樂工少年競唱歌曰五來子自建隆開寶凡平荊湖川廣江南五國皆來朝時西川孟昶賦斂無度射利之家配率尤甚既乏緡錢唯仰在質物乃競書簡札揭於門曰今召主收贖又每歲除日命翰林為詞題桃符正旦置寢門左右末年學士幸寅遜撰詞昶以其非工自命筆題云新年納餘慶嘉節號長春昶以其年正月降王師即命呂餘慶知成都府而長春乃太祖誕聖節名也召與趙贖與蜀同音開寶初廣南劉鋹令民家置貯水桶號防火大桶又鋹末年童謠曰羊頭二四白天雨至後王師以辛未年二月四日擒鋹識者以為國家以火德王房為宋分羊未神也雨者王師如時雨之義也防與房桶與宋同音周廣順初江南伏龜山圮得石函長二尺廣八寸中有鐵銘云維天監十四年秋八月葬寶公于是銘有引曰寶公嘗為偈大事書于版帛冪之人欲讀之者必施數錢乃得讀訖即冪之是時名士陸倕王筠姚察而下皆莫知其旨或問之云在五百年後至卒乃歸其銘同葬焉銘曰莫問江南事江南自有馮乘雞登寶位跨犬出金陵子建司南位安仁秉夜燈東鄰家道闕隨虎遇明興其字皆小篆體勢完具徐鉉徐鍇韓熙載皆不能解及煜歸朝好事者云煜丁酉年襲位即乘雞也開寶八年甲戌江南國滅是跨犬也當王師圍其城而曹彬營其南是子建司南位潘美營其北是安仁秉夜燈也其後太平興國三年淮海王錢俶舉國入覲即東鄰也家道闕意無錢也隨虎遇戊寅年也皇祐五年正月戊午狄青敗儂智高于歸仁鋪初謠言農家種糴家收至是智高果為青所破建炎三年四月鼎州桃源洞大水巨石隨流而下有文曰無為大道天知人情無為窈冥神見人形心言意語鬼聞人聲犯禁滿盈地收人魂金石同類類金為變怪者也紹興二年李綱帥長沙道過建寧僧宗本題邑治之壁曰東燒西燒日月七七後數日江西盜李敦仁入境焚其邑七月七日也淳熙中淮西競歌汪秀才曲曰騎驢度江過江不得又為舞以和之後舒城狂生汪格謀不軌州兵入其家縛之其子拒殺聚惡少數千為亂聲言渡江事平格亦伏誅七年正月餘杭門外牆壁有詩其言頗涉怪後廉得主名杖遣之主管城北廂劉君暨以失察異言坐削秩其詩不録十四年都城市井歌曰汝亦不來我家我亦不來汝家至紹熙二三年其事始應于兩宮嘉定三年都城市井作歌詞末句皆曰東君去後花無主朝廷惡而禁之未幾太子詢薨慶元四年三月甲辰有郵筒置詩達御前者詔宰臣究其詩不録嘉泰四年越人盛歌鐵彈子白塔湖曲俄有盜金十一者自號鐵彈子繆傳其鬥死于白塔湖中後獲於諸暨縣漢乾祐中荊南高從誨鑿池於山亭下得石匣長尺餘扃鐍甚固從誨神之屏左右焚香以啓匣中得石有文云此去遇龍即歇及建隆中從誨孫繼沖入朝改鎮徐州龍隆音相近音相太平興國中京師兒童以木雕合子中有竅藏腋下有聲號云腋底鬧後盧多遜投荒人以為讖其在肘腋而司國典也天禧二年五月西京訛言有物如烏帽夜飛入人家又變為犬狼狀人民多恐駭每夕重閉深處至持兵器驅逐者六月乙巳傳及京師云能食人里巷聚族環坐叫譟達曙軍營中尤甚而實無狀意其妖人所為有詔嚴捕得數輩訊之皆非政和七年詔修神保觀俗所謂二郎神者京師人素畏之自春及夏傾城男女負土以獻揭榜通衢云某人獻土又有飾形作鬼使巡門催納土者或以為不祥禁絶之後金人斡離不圍京師其國謂之二郎君云紹興元年十二月越州連火民訛言相驚月幾望當再火樞密院以軍法禁之乃定嘉泰二年六月故循王張俊家火後旬日市井訛言相驚絳衣婦人為火殃下墜都民徙避晝夜弗寧禁之後亦不火慶元六年十月瓊州訛言妖星流墮民郭七家聲如雷通判曾丰暨瓊山縣令移文驚擾後皆坐絀簽書樞密院事林存為似道所擯道死于漳漳有富民蓄油煔木甚佳林氏子弟求之價高不可得因撫其木曰收取收取待賈丞相用德祐元年似道謫死郡守與之經營竟得此木以殮宋初陳摶有紙錢使不行之説時天下惟用銅錢莫喻此旨其後用交子會子其後會價愈低故有使到十八九紙錢飛上天之謠似道惡十九界之名乃名關子然終為十九界矣而關子價益低是紙錢使不行也宋以周顯德七年庚申得天下圖讖謂過唐不及漢一汴二杭三閩四廣又有寒在五更頭之謠故宮漏有六更按漢四百二十餘年唐二百八十九年開慶元年宋祚過唐十一年滿五庚申之數至德祐二年正月降附得三百一十七年而見六庚申如宮漏之數建隆三年有象至黃陂縣匿林中食民苗稼又至安復襄唐州踐民田遣使捕之明年十二月於南陽縣獲之獻其齒革乾德二年五月有象至澧陽安鄉等縣又有象涉江入華容縣直過闤闠門又有象至澧州澧陽縣城北乾德四年八月普州兔食禾五年有象自至京師雍熙四年有犀自黔南入萬州民捕殺之獲其皮角開寶八年四月平陸縣鷙獸傷人遣使捕之生獻十頭十月江陵府白晝虎入市傷二人太平興國三年果閬蓬集諸州虎為害遣殿直張延鈞捕之獲百獸俄而七盤縣虎傷人延鈞又殺虎七以為獻七年虎入蕭山縣民趙馴家害八口淳化元年十月桂州虎傷人詔遣使捕之至道元年六月梁泉縣虎傷人二年九月蘇州虎夜入福山寨食卒四人咸平二年十二月黃州長析村二虎夜鬥一死食之殆半占云守臣災明年知州王禹稱卒咸平六年十月乙酉有狐出皇城東北角樓歷軍器庫至夾道獲之大中祥符九年三月杭州浙江側晝有虎入稅場巡檢俞仁祐揮戈殺之天聖九年五月宿州獲白兔六月廬州獲白兔明道二年六月唐州獲白兔皇祐三年十二月泰州獲白兔嘉祐三年六月丁卯交址貢異獸二初本國稱貢騏驎狀如牛身被肉甲鼻端有角食生芻果必先以杖擊其角然後食既至而樞密使田況辨其非麟詔止稱異獸熙寧元年九月撫州獲白兔十二月嵐州獲白鹿四年九月廬州獲白兔政和五年十二月安化軍獲白兔六月泰州軍獲白兔七年二月達州獲白兔宣和元年十月淄州獲黑兔宣和七年秋有狐由艮嶽直入禁中據御榻而坐詔毀狐王廟紹興十一年海州屬金悉空其民安江後二十年有二虎入城人射殺之虎亦搏人明年魏勝舉州來歸亦空其民漢龔遂曰野獸入宮室宮室將空虎豕皆毛孽也十三年南康縣雷雨羣狸震死于巖穴中巖石皆為碎二十二年劉彭老家貓産數子皆三足乾道七年潮州野象數百食稼農設穽田間象不得食率其羣圍行道車馬斂穀食之乃去淳熙二年江州馬當山羣狐掠人十年滁州有熊虎同入樵民舍夜自相搏死紹熙元年三月臨安府民家貓生子一有八足二尾四年鄂州武昌縣虎為人患五年八月揚州獻白兔侍御史章穎劾守臣錢之望以孽為瑞占曰國有憂白喪祥也是歲光宗崩慶元三年德興縣羣狐入民舍咸淳九年十一月辛卯黎明有虎出于揚州市毛色微黑都撥發官曹安國率良家子數十人射之制置使李庭芝占曰千日之內殺一大將於是臠其肉於城外而厭之紹興六年四月中京大雪雷震犬數十爭赴土河而死可救者才二三淳熙元年六月饒州大雷震犬于市之旅舍慶元二年撫州有犬若人坐于郡守之坐未幾郡守林廷彥卒于官德祐元年五月壬申揚州禁軍民毋得蓄犬城中殺犬數萬輸皮納官乾德三年七月己卯夜西方起蒼白氣長五十尺貫天船五車亙井宿占曰主兵動六年十月己未旦西北起蒼白氣三道長二十尺趨東散占曰遊兵之象太平興國四年四月己未夜西北有白氣壓北斗雍熙四年正月癸酉白氣起角亢經太微垣歷軒轅大星至月傍散至道二年二月丙子夜西方有蒼白氣長短八道如彗掃稍經天漢參錯如交蛇占曰所見之方主兵勝咸平四年三月丙申白氣二亙天五年正月白氣如虹貫日久而散七月戊戌白氣如陳貫東井六年四月己巳白氣東西亙天丁丑白氣貫日五月辛亥白氣出昴至壁沒六月丙子白氣出河鼓左右旗分為數道沒七月癸卯白氣如彗起西南方占曰有兵喪景德元年五月白氣貫軒轅蒼白氣十餘如布亙天二年二月丁亥白氣五道貫北斗占為大風幸臣憂十月丙子白氣出閣道西孛孛有光占曰宮中憂三年三月白氣貫月四年三月己未白氣東西亙天庚申白氣出南方長二丈許久而不散四月庚午白氣貫北斗長十丈占為大風庚寅白氣如布襲月三丈許大中祥符元年正月丁丑白氣二東西亙天五年二月壬寅白氣長五丈出東井貫北斗魁及軒轅占為兵為雷雨明道元年十二月壬戌西北有蒼白氣亙天康定二年八月庚辰夜東方有白氣長十尺許在星宿度中至十日長丈餘衝天相九十餘日沒慶曆八年甲申白氣貫北斗三年正月戊戌中天有白氣長二十尺向西南行貫日占曰邊兵憂四月癸卯白氣二生西北隅上中天首尾至濁東南行良久散占曰其下有兵寇八月壬子夜白氣貫北斗魁九月辛巳夜中天有白氣長二丈許貫卷宿南河東北行少頃散占曰風雨之候皇祐四年十一月辛酉夜白氣起北方近濁長五丈許歷北斗久之散占曰多大風嘉祐七年三月彭城縣白鶴鄉地生占曰地生民將飢五月鍾離縣地生治平二年四月丙午夜西北方有白氣漸東南行首尾至濁貫角宿移西北久方散占曰有兵戰疾疫事熙寧九年四月庚寅夜白氣長丈起東北方天市垣元祐三年七月戊辰夜西北有白氣經天主兵宜防西北二鄙元符二年九月戊辰夜有白氣十道各長五尺主兵及大臣黜崇寧二年五月戊子夜蒼白氣起東南方長三丈貫尾箕斗主蠻夷入貢舊臣來歸宣和三年九月壬午夜蒼白氣長三丈貫月主其下有亂者靖康元年十二月丙辰白氣出太微垣二年二月壬午夜白氣如虹自南亙北須臾移西南至東北天明而沒三月戊子白氣貫斗建炎二年杜充為北京留守天雨紙錢于營中厚盈寸明日與金人戰城下敗績紙白祥也三年三月白氣貫日四年五月壬子夜北方有白氣十餘道如練二十六年七月辛酉夜天雨水銀紹興元年潭州得白玉于州城蓮花池中孔彥舟以獻詔却之前史以為玉變近白祥後彥舟為劇盜二月己巳夜東南有白氣十一年三月庚申金人居長安油酒皆變白色三十年十一月甲午夜西南有白氣出危入昴十二月戊申白氣出尾入軫貫天市垣三十一年十二月辛丑白氣如帶東西亙天出斗歷牛隆興元年十二月壬午夜白氣見西南方出危入昴二年正月甲寅夜西南有白氣亙天如帶乾道元年正月庚午白氣見西北方出奎入參三月戊辰白氣如帶自參及角東西亙天四月丁酉夜白氣見西北方入天市垣辛丑夜白氣入北斗乙巳夜白氣入紫微垣十月己丑夜蒼白氣見南方入翼十一月丙寅白氣如帶出女入昴東西亙天十二月庚午夜白氣如帶東西亙天出女入昴淳熙十年正月戊子夜西南有白氣如天漢而明南北廣可六丈東西亙天歷壁至畢紹熙五年六月壬寅夜白氣亙天自紫微至亢角己酉日入後白氣亙天頃刻而散慶元四年八月庚辰白氣亙天五年二月癸酉夜東北方白氣如帶自角至參八月癸亥東北方有白氣如帶亙天嘉泰四年十一月辛未晝有白氣分數道亙天嘉熙四年二月丙辰白氣亙天淳祐二年四月甲寅白氣亙天景定三年七月甲申白氣如匹布亙天咸淳九年襄陽城中白氣自西而出紹興二年宣州有鐵佛象坐高丈餘自動迭前迭卻若傴而就人者數日既而郡有火火氣盛金失其性而為變怪也七月天雨錢或從石甃中涌出有輪郭肉好不分明穿之碎若沙土二月溫州戒福寺銅佛象頂珠自動光彩激射經日不少停數日火作寺焚淳熙九年春德興縣民家鏡自飛舞與日光相射慶元二年正月泰寧縣耕夫得鏡厚三寸徑尺有二寸照見水底與日爭輝病熱者對之心骨生寒後為雷震而碎
