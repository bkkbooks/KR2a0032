body:
  text: 宋史卷一百三志第五十六禮六吉禮六朝日夕月九宮貴神高禖大火壽星靈星風伯雨師司寒蜡七祀馬祖酺神朝日夕月慶曆用羊豕各二籩豆十二簠簋俎二天禧初太常禮院以監察御史王博文言詳定準禮春分朝日於東郊秋分夕月於西郊國語太采朝日少采夕月又曰春朝朝日秋夕夕月唐柳宗元論云夕之名者朝拜之偶也古者旦見曰朝暮見曰夕按禮秋分夕月蓋其時晝夜平分太陽當午而陰魄已生遂行夕拜之祭以祀月未前十刻太官令率宰人割牲未後三刻行禮蓋是古禮以夕行朝祭之儀又按禮云從子至巳為陽從午至亥為陰參詳典禮合於未後三刻行禮皇祐五年定朝日壇舊高七尺東西六步一尺五寸增為八尺廣四丈如唐郊祀錄夕月壇與隋唐制度不合從舊則壇小如唐則坎深今定坎深三尺廣四丈壇高一尺廣二丈四方為陛降入坎深然後升壇壇皆兩壝壝皆二十五步增大明夜明壇山罍二籩豆十二禮生引司天監官分獻上香奠幣爵再拜嘉祐加羊豕各五五禮新儀定二壇高廣坎深如皇祐無所改中興同太一九宮神位在國門之東郊壇之制四陛外西南又為一陛曰坤道俾行事者升降由之其九宮神壇再成第一成東西南北各百二十尺再成東西南北各一百尺俱高三尺壇上置小壇九每壇高一尺五寸縱廣八尺各相去一丈六尺初用中祀咸平中改為大祀壇增兩壝玉用兩圭有邸藉用秸加褥如幣色其御書祝禮如社稷尋以封禪別建九宮壇泰山下行宮之東壇二成成一尺面各長五丈二尺四陛及坤道各廣五丈上九小壇相去各八尺四隅各留五尺壇下兩壝依大祠禮及祀汾陰亦遣使祀焉自後親郊恭謝皆遣官於本壇別祭景祐二年學士章得象等定司天監生于淵役人單訓所請祀九宮太一依逐年飛移位次之法案郄良遇九宮法有飛棋立成圖每歲一移推九州所主災福事又唐術士蘇嘉慶始置九宮神壇一成高三尺四陛上依位次置九小壇東南曰招搖正東曰軒轅東北曰太陰正南曰天一中央曰天符北曰太一西南曰攝提正西曰咸池西北曰青龍五數為中戴九履一左三右七二四為上六八為下符於遁甲此則九宮定位歲祭以四孟隨歲改位行棋謂之飛位自乾元以後止依本位祭之遂不飛易仍減冬夏二祭國朝因之今于淵等所請合天寶初祭之理又合良遇飛棋之圖然其法本術家時祭之文經禮不載議者或謂不必飛宮若日月星辰躔次周流而祭有常所此則定位之祀所當從也若其推數於回復候神於恍忽因方弭沴隨氣考祥則飛位之文固可遵用請依唐禮遇祭九宮之時遣司天監一員詣祠所隨每年貴神飛棋之方旋定祭位仍自天聖己巳入曆太一在一宮歲進一位飛棋巡行周而復始詔可慶曆儀每坐籩豆十二簠簋俎二皇祐增壇三成又禮官言歲雩祀外水旱稍久皆遣官告天地宗廟社稷及諸寺觀宮廟九宮貴神今列大祀亦宜準此熙寧四年司天中官正周琮言太一經推算七年甲寅歲太一陽九百六之數復元之初故經言太歲有陽九之災太一有百六之厄皆在入元之初終今陽九百六當癸丑甲寅歲為災厄之會然五福太一移入中都可以消異為祥竊詳五福太一自國朝雍熙元年甲申歲入東南巽宮時修東太一宮天聖七年己巳歲五福太一入西南坤位修西太一宮請稽詳故事崇建祠宇迎之京師詔建中太一宮於集禧觀十太一神並用通天冠絳紗袍元豐中太常博士何洵直言熙寧祀儀九宮貴神祝文稱嗣天子臣某以禮秩論之當與社稷為比請依祀儀為大祠其祝版即依會昌故事及開寶通禮書御名不稱臣又近制諸祠祭牲數正配以全體解割各用一牢貴神九位悉是正坐異壇別祝尊為大祠而共用二少牢於腥熟之俎骨體不備謂宜每位一牢凡九少牢詔下太常修入祀儀元祐七年監察御史安鼎言按漢武帝始祠太一一位唐天寶初兼祀八宮謂之九宮貴神漢祀太一日用一犢凡七日而止唐祀類於天地今春秋祀九宮太一用羊豕其四立祭太一宮十神皆無牲以素饌加酒焉再詳星經太一一星在紫宮門右天一之南號曰天之貴神其佐曰五帝飛行諸方躡三能以上下以天極星其一明者為常居主使十六神知風雨水旱兵革饑饉疫疾災害之事唐書曰九宮貴神實司水旱太一掌十六神之法度以輔人極國朝會要亦云天之尊神及十精十六度並主風雨由是觀之十神太一九宮太一與漢所祀太一共是一神今十神皆用素饌而九宮並薦羊豕似非禮意詔禮官詳定十神九宮太一各有所主即非一神故自唐迄今皆用牲牢別無祠壇用素食禮遂依舊制崇寧三年太常博士羅畸言九宮諸神位無禮神玉惟有燔玉竊謂宜用禮神玉少倣其幣之色薦於神坐議禮局言先王制禮用圭璧以祀日月星辰所謂圭璧者圭其邸為璧以取殺於上帝也今九宮神皆星名而其玉用兩圭有邸夫兩圭有邸祀地之玉以祀星辰非周禮也乞改用圭璧以應古制政和新儀立春日祀東太一宮立夏季夏土王日祀中太一宮立秋日祀西太一宮立冬日祀中太一宮宮之真室殿五福太一在中君基太一在東大游太一在西俱南向延休殿四神太一承釐殿臣基太一在東西向北上凝祐殿直符太一臻福殿民基太一在西東向北上膺慶殿小游太一在中天一太一在東地一太一在西靈貺殿太歲在中太陰在西俱南向三皇五方帝日月五星二十八宿十日十二辰天地水三官五行九宮八卦五嶽四海四瀆十二山神等並為從祀東西太一宮準此東太一宮大殿五福太一在東君基太一在西俱南向大游太一殿在大殿之北南向臣基太一殿在南北向小游太一直符太一四神太一殿在大殿之東西向北上天一太一民基太一地一太一在大殿之西東向北上西太一宮黃庭殿五福在中君基在東大游在西均福殿小游在中俱南向延貺殿天一在中四神在南臣基在北俱西向資祐殿地一在中四神在南臣基在北俱西向資祐殿地一在中民基在南直符在東北俱東向九宮貴神壇三成一成縱廣十四丈再成縱廣十二丈三成縱廣十丈各高三尺上依方位置小壇九各高一尺五寸縱廣八尺四陛坤道兩壝每壝二十五步如舊制紹興十一年太常丞朱輅言九宮貴神所主風雨霜雪雹疫所係甚重請舉行祀典太常寺主簿林大鼐亦言十神太一九宮太一皆天之貴神國朝分為二並為大祀比一新太一宮而九宮貴神尚寓屋而不壇乃詔臨安府於國城之東建築九宮壇壝其儀如祀上帝其太一宮初議者請即行宮之北隅建祠後命禮官考典故擇地建宮十八年宮成御書其榜十太一位於殿上南面西上從祀東廡九十有八西廡九十有七皆北上孝宗受禪又建本命殿名曰崇禧光宗又遷介福殿像於挾室而名新殿曰崇福高禖初仁宗未有嗣景祐四年二月以殿中侍御史張奎言詔有司詳定禮官以為月令雖可據然周官闕其文漢志郊祀不及禖祠獨枚臯傳言皇子禖祝而已後漢至江左概見其事而儀典委曲不可周知惟高齊禖祀最顯妃嬪參享黷而不蠲恐不足為後世法唐明皇因舊月令特存其事開元定禮已復不著朝廷必欲行之當築壇於南郊春分之日以祀青帝本詩克禋以祓之義也配以伏羲帝嚳伏羲本始嚳著祥也以禖從祀報古為禖之先也以石為主牲用太牢樂以升歌儀視先蠶有司攝事祝版所載具言天子求嗣之意乃以弓矢弓韣致神前祀已與胙酒進內以禮所御使齋戒受之仍歲令有司申請俟旨命曰特祀即用其年春分遣官致祭為圜壇高九尺廣二丈六尺四陛三壝陛廣五尺壝各二十五步主用青石長三尺八寸用木生成之數形準廟社主植壇上稍北露其首三寸青玉青幣牲用牛一羊一豕一如盧植之說樂章祀儀並準青帝尊器神坐如勾芒唯受福不飲回授中人為異祀前一日內侍請皇后宿齋於別寢內臣引近侍宮嬪從是日量地設香案褥位各二重行南向於所齋之庭以望禖壇又設褥位於香案北重行皇后服褘衣褥位以緋宮嬪服朝賀衣服褥位以紫祀日有司行禮以福酒胙肉弓矢弓韣授內臣奉至齋所置弓矢等於箱在香案東福酒於坫胙肉於俎在香案西內臣引宮嬪詣褥位東上南向乃請皇后行禮導至褥位皆再拜導皇后詣香案位上香三請帶弓韣受弓矢轉授內臣置於箱又再拜內臣進胙皇后受訖轉授內臣次進福酒內臣曰請飲福飲訖請再拜乃解弓韣內臣跪受置於箱導皇后歸東向褥位又引宮嬪最高一人詣香案上香二帶弓韣受弓矢轉授左右及飲福解弓韣如皇后儀唯不進胙又引以次宮嬪行禮亦然俟俱復位內侍請皇后詣南向褥位皆再拜退是歲宮中又置赤帝像以祈皇嗣寶元二年皇子生遣參知政事王鬷以太牢報祠準春分儀惟不設弓矢弓韣著為常祀遣兩制官攝事慶曆三年太常博士余靖言皇帝嗣續未廣不設弓矢弓韣非是詔仍如景祐之制熙寧二年皇子生以太牢報祀高禖惟不設弓矢弓韣既又從禮官言按祀儀青帝壇廣四丈高八尺今祠高禖既以青帝為主其壇高廣請如青帝之制又祀天以高禖配今郊禖壇祀青帝於南郊以伏羲高辛配復於壇下設高禖位殊為爽誤請準古郊禖改祀上帝以高禖配改伏羲高辛位為高禖而徹壇下位詔高禖典禮仍舊壇制如所議改犢為角握牛高禖祝版與配位並進書焉又言伏羲高辛配祝文並云作主配神神無二主伏羲既為主其高辛祝文請改云配食于神元祐三年太常寺言祀儀高禖壇上正位設青帝席配位設伏羲高辛氏席壇下東南設高禖從祀席正配位各六俎實以羊豕腥熟高禖位四俎實以牛腥熟祀日兵部工部郎中奉羊豕俎升壇詣正配位高禖位俎則執事人奉焉竊以青帝為所祀之主而牲用羊豕禖神因其嘉祥從祀而牲反用牛又牛俎執事者陳之而羊豕俎皆奉以郎官輕重失當請以三牲通行解割正配從祀位並用皆以六曹郎官奉俎今羊俎以兵部豕俎以工部牛俎請以戶部郎官政和新儀春分祀高禖以簡狄姜嫄從祀皇帝親祠並如祈穀祀上帝儀惟配位作承安之樂而增簡狄姜嫄位牛羊豕各一紹興元年太常少卿趙子畫言自車駕南巡雖多故之餘禮文難備至於祓無子祝多男所以係萬方之心蓋不可闕乞自來歲之春復行高禖之祀十七年車駕親祀高禖如政和之儀大火之祀康定初南京鴻慶宮災集賢校理胡宿請修其祀而以閼伯配焉禮官議閼伯為高辛火正實居商丘主祀大火後世因之祀為貴神配火侑食如周棄配稷后土配社之比下歷千載遂為重祀祖宗以來郊祀上帝而大辰已在從祀閼伯之廟每因赦文及春秋委京司長吏致奠咸秩之典未始云闕然國家有天下之號實本於宋五運之次又感火德宜因興王之地商丘之舊為壇兆祀大火以閼伯配建辰建戌出內之月內降祝版留司長吏奉祭行事乃上壇制高五尺廣二丈四陛陛廣五尺一壝四面距壇各二十五步位牌以黑漆朱書曰大火位配位曰閼伯位牲用羊豕一器準中祠歲以三月九月擇日令南京長吏以下分三獻州縣官攝太祝奉禮慶曆獻官有祭服建中靖國元年又建陽德觀以祀熒惑因翰林學士張康國言天下崇寧觀並建火德真君殿仍詔正殿以離明為名太常博士羅畸請宜倣太一宮遣官薦獻或立壇於南郊如祀靈星壽星之儀有司請以閼伯從祀離明殿又請增閼伯位按春秋傳曰五行之官封為上公祀為貴神祝融高辛氏之火正也閼伯陶唐氏之火正也祝融既為上公則閼伯亦當服上公袞冕九章之服既又建熒惑壇於南郊赤帝壇壝外令有司以時致祭增用圭璧火德熒惑以閼伯配俱南向五方火精神等為從祀壇廣四丈高七尺四陛兩壝壝二十五步從新儀所定紹興三年詔祀大火太常寺言應天府祀大火今道路未通宜於行在春秋設位乾道五年太常少卿林栗等言本寺已擇九月十四日依旨設位望祭應天府大火以商丘宣明王配二十一日內火祀大辰以閼伯配大辰即大火閼伯即商丘宣明王也緣國朝以宋建號以火紀德推原發祥之所自崇建商丘之祠府曰應天廟曰光德加封王爵錫謚宣明所以追嚴者備矣今有司旬日之間舉行二祭一稱其號一斥其名義所未安乞自今祀熒惑大辰其配位稱閼伯祝文位板並依應天府大火禮例改稱宣明王以稱國家崇奉火正之意諸星祠有壽星周伯靈星之祭大中祥符二年翰林天文邢中和言景德中周伯星出亢宿下按天文志角亢為太山之根果符上封之應望於親郊日特置周伯星位於亢宿間詔禮官與司天監定議且言周伯星出氐三度然亢氐相去不遠並鄭分兗州壽星之次宜如中和奏設位氐宿之間以為永式景德三年詔定壽星之祀太常禮院言按月令八月命有司享壽星於南郊注云秋分日祭壽星於南郊壽星南極老人星也爾雅云壽星角亢也注云數起角亢列宿之長故云壽星唐開元中特置壽星壇常以千秋節日祭老人星及角亢七宿請用祀靈星小祠禮其壇亦如靈星壇制築於南郊以秋分日祭之元豐中禮文所言時令秋分享壽星于南郊熙寧祀儀於壇上設壽星一位南向又於壇下卯陛之南設角亢氐房心尾箕七位東向按爾雅所謂壽星角亢非此所謂秋分所享壽星也今於壇下設角亢位以氐房心尾箕同祀尤為無名又按晉天文志老人一星在弧南一曰南極常以秋分之旦見于丙春分之夕沒于丁見則治平主壽昌常以秋分候之南郊後漢於國都南郊立老人星廟常以仲秋祀之則壽星謂老人矣請依後漢於壇上設壽星一位南向祀老人星其壇下七宿位不宜復設慶曆以立秋後辰日祀靈星其壇東西丈三尺南北丈二尺壽星壇方丈八尺皇祐定如唐制二壇皆周八步四尺其享禮籩八豆八在神位前左右重三行俎二在籩豆外簠簋一在二俎間象尊二在壇上東南隅北向西上七宿位各設籩一豆一在神位前左右俎一在籩豆外中設簠一簋一在俎左右爵一在神位正前壺尊二在神位右光祿實以法酒政和新儀改定壇高三尺東西袤丈三尺南北袤丈二尺四出陛一壝二十五步初乾興祀靈星值屠牲有禁乃屠於城外至是敕有司凡祭祀牲牢無避禁日著為令南渡後靈星壽星風師雨師雷師及七祀司寒馬祖並仍舊制風伯雨師諸州亦致祭大中祥符初詔惟邊地要劇者令通判致祭餘皆長吏親享未幾澤州請立風伯雨師廟乃令禮官考儀式頒之有司言唐制諸郡置風伯壇社壇之東雨師壇于西各稍北數十步卑下於社壇祠用羊一籩豆各八簠簋各二元豐詳定局言周禮小宗伯之職兆五帝於四郊四類亦如之鄭氏曰兆為壇之營域四類日月星辰運行無常以氣類為之位兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊各以氣類祭之謂之四類漢儀縣邑常以丙戌日祠風伯於戌地以己丑日祀雨師於丑地亦從其類故也熙寧祀儀兆日東郊兆月西郊是以氣類為之位至於兆風師於國城東北兆雨師於國城西北司中司命於國城西北亥地則是各從其星位而不以氣類也請稽舊禮兆風師於西郊祠以立春後丑日兆雨師於北郊祠以立夏後申日兆司中司命司祿於南郊祠以立冬後亥日其壇兆則從其氣類其祭辰則從其星位仍依熙寧儀以雷師從雨師之位以司民從司中司命司祿之位舊制風師壇高四尺東西四步三尺南北減一尺皇祐定高三尺周三十三步雨師壇雷師壇高三尺方一丈九尺皇祐定周六步政和之制風壇廣二十三步雨雷壇廣十五步皆高三尺四陛並一壝二十五步其雨師雷師二壇同壝司中司命司民司祿為四壇各廣二十五步同壝又言周禮大宗伯以槱燎祀司中司命風師雨師所謂周人尚臭升煙以報陽也今天神之祀皆燔牲首風師雨師請用柏柴升煙以為歆神之始又言周禮樂師之職曰凡國之小事用樂者令奏鐘鼓說者曰小祀也小師職注小祭祀謂司中司命風師是也既已有鐘鼓則是有樂明矣請有司祀司中司命風師雨師用樂仍製樂章以為降神之節又言周禮小司徒之職凡小祭祀奉牛牲羞其肆又肆師云小祭祀用牲所謂小祭祀即司中司命司民司祿宮中七祀之類是也後世以有司攝事難於純用太牢猶宜下同大夫禮用羊豕可也今祀儀馬祖先牧司中司命司民司祿司寒歲用羊豕一祠令小祠牲入滌一月所以備潔養之法今每位肉以豕又取諸市與令文相戾請諸小祠祭以少牢仍用體解又言社稷五祀先薦爓次薦熟至於羣小祀薦熟而已請四方百物宮中七祀司中司命風師雨師止薦熟並從之司寒之祭常以四月命官率太祝用牲幣及黑牡秬黍祭玄冥之神乃開冰以薦太廟建隆二年置藏冰署而修其祀焉祕書監李至言案詩豳七月曰四之日獻羔祭韭蓋謂周以十一月為正其四月即今之二月也春秋傳曰日在北陸而藏冰謂夏十二月日在危也獻羔而啟之謂二月春分獻羔祭韭始開冰室也火出而畢賦火星昏見謂四月中也又案月令天子獻羔開冰先薦寢廟詳其開冰之祭當在春分乃有司之失也帝覽奏曰今四月韭可苫屋矣何謂薦新遂正其禮天聖新令春分開冰祭司寒於冰井務卜日薦冰於太廟季冬藏冰設祭亦如之元豐詳定所言熙寧祀儀孟冬選吉日祀司寒按古享司寒惟以藏冰啟冰之日孟冬非有事於冰則不應祭享今請惟季冬藏冰則享司寒牲用黑牡羊穀用黑秬黍仲春開冰則但用羔孔穎達注月令曰藏冰則用牡黍啟唯告而已祭禮大告禮小故也且開冰將以御至尊當有桃弧棘矢以禳除凶邪設於神坐則非禮也當從孔氏說出冰之時置弓矢於凌室之戶大觀禮局言春秋左氏傳以少昊有四叔其二為玄冥杜預鄭玄皆以玄冥為水官故歷代祀為司寒則玄冥非天神矣今儀注禮畢有司取祝幣瘞坎贊者贊幣燔燎是以祀天神之禮享人鬼也請罷燔燎而埋祝幣詔從其請大蜡之禮自魏以來始定議王者各隨其行社以其盛臘以其終建隆初以有司言周木德木生火宜以火德王色尚赤遂以戌日為臘三年戊戌臘有司畫日以七日辛卯和峴奏議曰按蜡始於伊耆後歷三代及漢其名雖改而其實一也漢火行用戌臘臘者接也新故相接畋獵禽獸以享百神報終成之功也王者因之上享宗廟旁及五祀展其孝心盡物示恭也魏晉以降悉沿其制唐乘土德貞觀之際以前寅日蜡百神卯日祭社宮辰日享宗廟開元定禮三祭皆於臘辰以應土德今以戌日為臘而以前七日辛卯行蜡禮恐未為宜况宗廟社稷並遵臘享獨蜡不以臘請下禮官議議如峴言今後蜡百神祀社稷享宗廟皆用戌臘一日天聖三年同知禮院陳詁言蜡祭一百九十二位祝文內載一百八十二位唯五方田畯五方郵表畷一十位不載祝文又郊祀錄正辭錄司天監神位圖皆以虎為於菟乃避唐諱請仍為虎五方祝文衆族之下增入田畯郵表畷云元豐詳定所言記曰八蜡以祀四方年不順成八蜡不通歷代蜡祭獨在南郊為一壇惟周隋四郊之兆乃合禮意又禮記月令以蜡與息民為二祭故隋唐息民祭在蜡之後日請蜡祭四郊各為一壇以祀其方之神有不順成之方則不修報其息民祭仍在蜡祭之後先是太常寺言四郊蜡祭宜依百神制度築壇其東西有不順成之方即祭日月其神農以下更不設祭又舊儀神農后稷並設位壇下當移壇上按禮記正義伊耆氏神農也今壇下更設伊耆氏位合除去之政和新儀臘前一日蜡百神四方蜡壇廣四丈高八尺四出陛兩壝每壝二十五步東方設大明位西方設夜明位以神農氏后稷氏配配位以北為上南北壇設神農位以后稷配五星二十八宿十二辰五官五嶽五鎮四海四瀆及五方山林川澤丘陵墳衍原隰井泉田畯倉龍朱鳥麒麟白虎玄武五水庸五坊五虎五鱗五羽五介五毛五郵表畷五臝五猫五昆蟲從祀各依其方設位中方鎮星后土田畯設於南方蜡壇酉階之西中方嶽鎮以下設於南方蜡壇午階之西伊耆設於北方蜡壇卯階之南其位次於辰星紹興十九年有司檢會五禮新儀臘前一日蜡東方西方為大祀蜡南方北方為中祀並用牲牢乾道四年太常少卿王瀹又請於四郊各為一壇以祀其方之神東西以日月為主各以神農后稷配南北皆以神農為主以后稷配自五帝星辰嶽鎮海瀆以至猫虎昆蟲各隨其方分為從祀其後南蜡仍於圓壇望祭殿北蜡於餘杭門外精進寺行禮太廟司命戶竈中霤門厲行七祀熙寧八年始置位版太常禮院請褅享祭七祀祥定所言周禮天子六服自鷩冕而下各隨所祭而服今既不親祀則諸臣攝事日當從王所祭之服其攝事之臣不繫其官又言禮祭法曰王自為立七祀曰司命曰中霤曰國行曰泰厲曰門曰戶曰竈孟春祀戶祭先脾孟夏祀竈祭先肺中央土祀中霤祭先心孟秋祀門祭先肝孟冬祀行祭先腎又傳曰春祀司命秋祠厲此所祀之位所祀之時所用之俎也周禮司服掌王之吉服祭羣小祀則服玄冕注謂宮中七祀之屬禮記曰一獻熟注謂宮中羣小神七祀之等周禮大宗伯若王不與祭祀則攝位此所祀之服所獻之禮所攝之官也近世因禘祫則徧祭七祀其四時則隨時享分祭攝事以廟卿行禮而服七旒之冕分太廟牲以為俎一獻而不薦熟皆非禮制請以立春祭戶於廟室戶外之西祭司命於廟門之西制脾於俎立夏祭竈於廟門之東制肺於俎季夏土王日祭中霤於廟庭之中制心於俎立秋祭門及厲於廟門外之西制肝於俎立冬祭司命及行於廟門外之西制腎於俎皆用特牲更不隨時享分祭有司攝事以太廟令攝禮官服必玄冕獻必薦熟親祀及臘享即依舊禮徧祭之政和新儀定太廟七祀四時分祭如元豐儀臘享祫享則徧祭設位於殿下橫街之北道西東向北上馬祖祀典仲春祀馬祖仲夏享先牧仲秋祭馬社仲冬祭馬步並擇日壇壝之制三壇各廣九步高三尺四陛一壝又有酺神之祀慶曆中上封事者言螟蝗為害乞內外並修祭酺禮院言按周禮族師春秋祭酺酺為人物災害之神鄭玄云校人職有冬祭馬步則未知此酺者蝝螟之酺歟人鬼之步歟蓋亦為壇位如雩禜云然則校人職有冬步是與馬為害者此酺蓋人物之害也漢有蝝螟之酺神又有人鬼之步神歷代書史悉無祭酺儀式欲準祭馬步儀壇在國城西北差官就馬壇致祭稱為酺神若外州者即略依禜禮其儀注先擇便方除地設營纘為位營纘謂立表施繩以代壇其致齋行禮器物並如小祠先祭一日致齋祭日設神坐內向用尊及籩一豆一實以酒酺設於神坐左又設罍洗及篚於酒尊之左俱內向執事者位於其後皆以近神為上薦神用白幣一丈八尺在篚將祭贊祀官拜就盥洗訖進至神坐前上香尊幣退詣罍盥洗實以酒再詣神坐前奠爵讀祝再拜退而瘞幣其酺神祝文曰維年歲次月朔某日州縣具官某敢昭告于酺神蝗蝝荐生害於嘉穀惟神降祐應時消殄請以清酒制幣嘉薦昭告于神尚享紹興祀令蟲蝗為害則祭酺神嘉定八年六月以飛蝗入臨安界詔差官祭告又詔兩浙淮東西路州縣遇有蝗入境守臣祭告酺神
