臣帶歸峽州兵馬司元豐戶一萬一千二百一十三貢蜜蠟縣二奉節中巫山中下紹慶府下本黔州黔中郡軍事武泰軍節度紹定元年升府紹熙三年移巡檢治增潭元豐戶二千八百四十八貢朱砂蠟縣二彭水中嘉祐八年廢洪杜洋水都濡信寧四縣入焉有洪杜小洞界山難溪四寨紹興二年以元隸珍州戶四十九還隸黔江下有白石門闌佐水永安安樂雙洪射營右水蠻冢浴水潛平鹿角萬就六堡白水土溪小溪石柱高望木孔東流李昌僕射相陽小村石門茆田木柵虎眼二十九寨羈縻州四十九南寧州遠州犍州清州蔣州知州蠻州襲州州邦州鶴州勞州義州福州儒州令州郝州普寧州緣州那州鸞州絲州邛州敷州晃州侯州焚州添州瑤州雙城州訓州鄉州茂龍州整州樂善州撫水州思元州逸州思州南平州勳州薑州稜州鴻州和武州暉州毫州鼓州懸州南渡後羈縻州五十六施州下清江郡軍事元豐戶一萬九千八百四貢黃連木藥子縣二清江中下有歌羅永寧細沙寧邊尖木夷平六寨熙寧六年五月省施州永興寨置夷平寨元豐三年七月廢永寧寨置行廊安確二寨建始中下有連天一寨監一廣積紹聖三年置鑄鐵錢咸淳府下本忠州南賓郡軍事咸淳元年以度宗潛邸升府元豐戶三萬五千九百五十貢綿紬縣三臨江中下墊江中下熙寧五年省桂溪縣入焉南賓下南渡後增縣二豐都下龍渠下萬州下南浦郡軍事開寶三年以梁山為軍元豐戶二萬五百五十五貢金木藥子縣二南浦下有平雲寨武寧下開州下盛山郡軍事崇寧戶二萬五千貢白紵車前子縣二開江上慶曆四年廢新浦縣入焉清水中舊名萬歲縣後改達州上通川郡軍事本通州乾德三年改乾德五年廢閬英宣漢二縣熙寧六年省三岡縣七年省石鼓縣分隸通川新寧永睦三縣元豐戶四萬六百四十貢紬縣五通川中巴渠中永睦下隋永穆縣今改新寧下東鄉下南渡後增縣一通明下舊通明院涪州下涪陵郡軍事熙寧三年廢溫山縣為鎮大觀四年廢白馬寨咸淳二年移治三台山元豐戶一萬八千四百四十八貢絹縣三涪陵下有白馬鹽場樂溫下武龍下宣和元年改武龍縣為枳縣紹興元年依舊重慶府下本恭州巴郡軍事舊為渝州崇寧元年改恭州後以高宗潛藩升為府舊領萬壽縣乾德五年廢雍熙中又廢南平縣慶曆八年以黔州羈縻南溱二州來隸皇祐五年以南州置南川縣熙寧七年以南川縣隸南平軍元豐戶四萬二千八十貢葛布牡丹皮縣三巴中有石英峯玉藍溪新興四鎮江津中下乾德五年移治馬騣鎮壁山下羈縻州一溱州領榮懿扶歡二縣以酋首領之後隸南平軍雲安車同下州開寶六年以夔州雲安縣建為軍建炎三年為軍使元豐戶一萬一千七十五貢絹縣一雲安望有思問捍技平南三寨玉井鹽場團雲鹽井監一雲安熙寧四年以雲安監戶口析置安義縣八年戶還隸雲安縣復為監梁山軍同下州高梁郡開寶三年以萬州石氏屯田務置軍撥梁山縣來隸熙寧五年又析忠州桂溪地益軍元祐元年還隸萬州尋復故元豐戶一萬二千二百七十七貢綿縣一梁山中下南平軍同下州熙寧八年收西番部以恭州南川縣銅佛埧地置軍領縣二南川中下熙寧八年省入隆化元豐元年復置有榮懿開邊通安安穩歸正五寨溱川堡隆化下熙寧八年自涪州來隸有七渡水寨大觀四年寨廢溱溪寨本羈縻溱州領榮懿扶歡二縣熙寧七年招納置榮懿等寨隸恭州後隸南平軍大觀二年別置溱州及溱溪夜郎兩縣宣和二年廢州及縣以溱溪寨為名隸南平軍大寧監同下州開寶六年以夔州大昌縣鹽泉所建為監元豐戶六千六百三十一貢蠟縣一大昌中下端拱元年自夔州來隸舊在監南六十里嘉定八年徙治水口監珍州唐貞觀中開山洞置唐末沒於夷大觀二年大駱解上下族帥獻其地復建為珍州宣和三年承州廢以綏陽縣來隸縣二樂源綏陽本羈縻夷州大觀三年酋長獻其地建為承州領綏陽都上義泉寧夷洋川五縣宣和三年廢州及都上等縣以綏陽隸珍州遵義寨大觀二年播州楊文貴獻其地建遵義軍及遵義縣宣和三年廢軍及縣以遵義寨為名隸珍州思州政和八年建領務川邛水安夷三縣宣和四年廢州為城及務川縣以務川城為名邛水安夷二縣皆作堡並隸黔州紹興元年復為思州縣三務川安夷邛水宣和四年並廢隸黔州紹興二年復播州樂源郡大觀二年南平夷人楊文貴等獻其地建為川領播州琅川帶水三縣宣和三年廢為城隸南平軍端平三年復以白綿堡為播州三縣仍廢嘉熙三年復設播州充安撫使咸淳末以珍州來屬縣一樂源中有遵義寨開禧三年升軍嘉定十一年復為寨川峽四路蓋禹貢梁雍荊三州之地而梁州為多天文與秦同分南至荊峽北控劍棧西南接蠻夷土植宜柘繭絲織文畕麗者窮於天下地狹而腴民勤耕作無寸土之曠歲三四收其所獲多為遨遊之費踏青藥市之集尤盛焉動至連月好音樂少愁苦尚奢靡性輕揚喜虛稱庠孰聚學者衆然懷土罕趨仕進涪陵之民尤尚鬼俗有父母疾病多不省視醫藥及親在多別籍異財漢中巴東俗尚頗同淪於偏方殆將百年孟氏既平聲教攸暨文學之士彬彬輩出焉
