body:
  text: 宋史卷八十九志第四十二地理五福建路成都府路潼川府路利州路夔州路福建路州六福建泉南劍漳汀軍二邵武興化縣四十七南渡後升建州為府紹興三十二年戶一百三十九萬五百六十五口二百八十二萬八千八百五十二福州大都督府長樂郡威武軍節度舊領福建路鈐轄建炎三年升帥府崇寧戶二十一萬一千五百五十二貢荔枝鹿角菜紫菜元豐貢紅花蕉布縣十二閩望侯官望福清望古田望唐縣有寶興銀場古田金坑永福望有黃洋保德二銀場長溪望有玉林銀場及鹽場長樂緊有海壇山鹽場羅源中舊永正縣閩清中寧德中王審知時置懷安望太平興國五年析閩縣置連江望建寧府上本建州建安郡舊軍事端拱元年升為建寧軍節度紹興三十二年以孝宗舊邸升府崇寧戶一十九萬六千五百六十六貢火箭石乳龍茶元豐貢龍鳳等茶綀縣七建安望漢縣有北苑茶焙龍焙監庫及石舍永興丁地三銀場浦城望有余生蕉溪斤竹三銀場嘉禾望本建陽縣有瞿嶺四銀場景定元年改今名松溪緊崇安望淳化五年升崇安場為縣政和緊咸平三年升關隸鎮為縣政和五年改關隸為政和縣有天受銀場甌寧望熙寧三年廢元祐四年復監一豐國咸平二年置鑄銅錢泉州望清源郡太平興國初改平海軍節度本上郡大觀元年升為望郡崇寧戶二十萬一千四百六貢松子元豐貢綿蕉葛縣七晉江望有鹽亭一百六十一南安中同安中有安仁上下馬欄莊坂四鹽場惠安望太平興國六年析晉江置縣有鹽亭一百二十九永春中閩桃源縣有倚洋一鐵場安溪下有青陽鐵場德化下有赤水鐵場南劍州上劍浦郡軍事太平興國四年加南字崇寧戶一十一萬九千五百六十一貢土茴香元豐貢茶縣五劍浦緊舊龍津縣南唐改有大演石城二銀場雷大熟等五茶焙將樂上太平興國四年自建州來隸有石牌安福二銀場順昌上南唐升永順場為縣沙中有龍泉銀場尤溪上有尤溪寶應等九銀場漳州下漳浦郡軍事崇寧戶一十萬四百六十九貢甲香鮫魚皮縣四龍溪望有吳慣沐犢中柵三鹽場漳浦望有黃敦鹽場龍巖望有大濟寶興二銀場長泰望太平興國五年自泉州來隸汀州下臨汀郡軍事淳化五年以上杭武平二場並為縣元符元年析長汀寧化置清流縣崇寧戶八萬一千四百五十四貢蠟燭縣五長汀望有上寶錫場歸禾拔口二銀務莒溪鐵務寧化望有龍門新舊二銀坑上杭上有鍾寮金場天聖二年徙治鍾寮場東乾道四年徙治郭下武平上清流南渡後增縣一蓮城本長汀蓮城堡紹興三年升縣邵武軍同下州太平興國五年以建州邵武縣建為軍仍以歸化建寧二縣來屬崇寧戶八萬七千五百九十四貢紵縣四邵武望有黃土等三鹽場龍須銅場寶積等三鐵場光澤望太平興國六年析邵武置縣有太平銀場新安鐵場泰寧望南唐歸化縣元祐元年改為泰寧有磊金場江源銀場建寧望有龍門等三銀場興化軍同下州太平興國四年以泉州遊洋百丈二鎮地置太平軍尋改戶六萬三千一百五十七貢綿葛布縣三莆田望自泉州與仙遊同來隸仙遊望興化中太平興國四年析莆田置縣福建路蓋古閩越之地其地東南際海西北多峻嶺抵江王氏竊據垂五十年三分其地宋初盡復之有銀銅葛越之産茶鹽海物之饒民安土樂業川源浸灌田疇膏沃無凶年之憂而土地迫生籍繁夥雖磽確之地耕耨殆盡畝直寖貴故多田訟其俗信鬼尚祀重浮屠之教與江南二浙略同然多嚮學喜講誦好為文辭登科第者尤多成都府路府一成都州十二眉蜀彭綿漢嘉邛簡黎雅茂威軍二永康石泉監一仙井縣五十八南渡後府三成都崇慶嘉定州十一眉彭綿漢邛黎雅茂簡威隆軍二永康石泉淳熙二年戶二百五十八萬口七百四十二萬成都府次府本益州蜀郡劍南西川節度太平興國六年降為州端拱元年復為劍南西川成都府淳化五年降為益州罷節度嘉祐五年復為府六年復節度舊領成都府路兵馬鈐轄建炎三年罷兼利州路紹興元年領成都路安撫使五年兼西路安撫制置大使十年置宣撫罷制置司知府帶本路安撫使十八年罷宣撫復制置司乾道六年又罷併歸安撫司知府仍帶本路安撫使淳熙二年復制置司罷宣撫司開禧元年置宣撫罷制置司未幾兩司並置後罷宣撫仍置制置大使嘉定七年去大字崇寧戶一十八萬二千九十口五十八萬九千九百三十貢花羅錦高紵布箋紙縣九成都次赤華陽次赤新都次畿郫次畿熙寧五年省犀浦為鎮入焉雙流次畿溫江次畿新繁次畿漢繁縣前蜀改廣都次畿熙寧五年廢陵州以貴平籍二縣為鎮入焉靈泉次畿舊名靈池天聖四年改眉州上通義郡至道二年升為防禦崇寧戶七萬二千八百九口一十九萬二千三百八十四貢麩金巴豆縣四眉山望隋通義縣太平興國初改彭山望丹稜望青神緊崇慶府緊本蜀州唐安郡軍事紹興十四年以高宗潛藩升崇慶軍節度淳熙四年升府崇寧戶六萬七千八百三十五口二十七萬三千五十貢春羅單絲羅縣四晉源望新津望江原望唐唐安縣開寶四年改永康望蜀析青城地置縣彭州緊濛陽郡軍事崇寧戶五萬七千五百二十四貢羅縣三九隴望唐縣熙寧二年置堋口縣四年省為鎮入焉有鹿角寨堋口木頭二茶場崇寧望唐昌縣崇寧元年改濛陽望綿州上巴西郡軍事紹興三年以知州事兼綿威茂州石泉軍沿邊安撫使節制屯戍軍馬五年川陝宣撫副使移司綿州六年罷二十一年罷沿邊安撫使嘉熙元年為四川制置副使治所崇寧戶一十二萬二千九百一十五口二十三萬四百九貢綾紵布縣五巴西望彰明望魏城緊羅江緊鹽泉中漢州上德陽郡軍事戶一十二萬九百口五十二萬七千二百五十二貢紵布縣四望什邡望綿竹望德陽望嘉定府上本嘉州犍為郡軍事乾德四年廢綏山羅目玉津三縣慶元二年以寧宗潛邸升府開禧元年升嘉慶軍節度崇寧戶七萬一千六百五十二口二十一萬四百七十二貢麩金縣五龍遊上宣和元年改曰嘉祥後復故熙寧五年省平羌縣入焉洪雅上淳化四年自眉州來隸夾江中峨眉中犍為下大中祥符四年移治懲非鎮監一豐遠鑄鐵錢邛州上臨邛郡軍事崇寧戶七萬九千二百七十九口一十九萬三千三十二貢絲布縣六臨邛望熙寧五年省臨溪縣為鎮入焉併入依政蒲江火井依政望安仁望有延貢寨大邑望有思安寨蒲江上有鹽井監鹽井寨火井中開寶三年移治平樂鎮至道三年復舊監一惠民鑄鐵錢建炎三年罷簡州下陽安郡軍事崇寧戶四萬一千八百八十八口九萬五千六百一十九貢綿紬麩金縣二陽安上平泉中黎州上漢源郡軍事崇寧戶二千七百二十二口九千八十貢紅椒縣一漢源下慶曆六年廢通望縣入焉舊廢飛越縣有博易務領羈縻州五十四羅巖州索古州秦上州合欽州劇川州輒榮州蓬口州柏坡州博盧州明川州胣州蓬矢州大渡州米川州木屬州河東州諾筰州甫嵐州昌化州歸化州粟川州叢夏州和良州和都州附木州東川州上貴州滑川州北川州吉川州甫萼州北地州蒼榮州野川州邛陳州貴林州護川州牒琮州浪瀰州郎郭州上欽州時蓬州儼馬州橛查州邛川州護邛州腳川州開望州上蓬州比蓬州剝重州久護州瑤劍州明昌州雅州上盧山郡軍事崇寧戶二萬七千四百六十四口六萬二千三百七十八貢麩金縣五嚴道中有碉門寨盧山上有靈關寨名山中熙寧五年省百丈縣為鎮入焉元祐二年復榮經中下百丈中下州城內一茶場熙寧九年置領羈縻州四十四當馬州三井州來鋒州名配州鉗泰州隸恭州畫重州羅林州籠羊州林波州林燒州龍蓬州敢川州驚川州禍眉州木燭州百坡州當品州嚴城州中川州鉗矣州昌磊州鉗並州百頗州會野州當仁州推梅州作重州禍林州金林州諾祚州三恭州布嵐州欠馬州羅蓬州論川州讓川州遠南州卑盧州夔龍州輝川州金川州東嘉梁州西嘉梁州茂州上通化郡軍事熙寧九年即汶川縣置威戎軍使以石泉縣隸綿州崇寧戶五百六十八口一千三百七十七貢麝香縣一汶山下寨一鎮羌熙寧九年置關一雞宗熙寧九年置南渡後增縣一汶川下有博馬場領羈縻州十璫州直州時州塗州遠州飛州乾州可州向州居州春祺城本羈縻保州政和四年建為祺州縣曰春祺宣和三年廢為城隸茂州壽寧寨本羈縻直州政和六年建壽寧軍在大皂江外距茂州五里八年廢為寨宣和三年廢寨為堡又廢敷文關為敷文堡延寧寨本威戎軍熙寧間所建政和六年湯延俊等納土重築軍城改名延寧宣和三年廢為寨隸茂州四年又廢寨及壽寧堡入汶川縣威州下維川郡軍事本維州景祐三年以與濰州聲相亂改今名崇寧戶二千二十口三千一十三貢當歸羌活縣二保寧下唐薛城縣南唐改通化下天聖元年改金川景祐四年復治平三年省通化軍隸縣有博易場領羈縻州二保州霸州嘉會寨本羈縻霸州政和四年建為亨州縣曰嘉會宣和三年廢州以縣為寨隸威州通化軍熙寧間所建在保霸二州之間政和三年董舜咨納土因舊名重築軍城宣和三年省軍使為監押隸威州永康軍同下州本彭州導江縣灌口鎮唐置鎮靜軍乾德四年改為永安軍以蜀州之青城及導江縣來隸太平興國三年改為永康軍熙寧五年廢為寨九年復即導江縣治置永康軍使隸彭州元祐初復故縣二導江望乾德中自彭州來隸熙寧五年軍廢復隸彭州後復於此置軍有博馬場青城望乾德中自蜀州來隸熙寧五年軍廢還隸蜀州不知何年復來隸仙井監同下州本陵州至道三年升為團練咸平四年廢始建縣熙寧五年廢為陵井監宣和四年改為仙井監隆興元年改為隆州崇寧戶三萬二千八百五十三口一十萬四千五百四十五貢苦藥子續隨子縣二仁壽中井研中下南渡後增縣二貴平中下熙寧五年廢入廣都乾道六年復籍中下廢復同上鎮一大安舊永安鎮崇寧二年改鹽井一石泉軍本綿州石泉縣政和七年建為軍割蜀之永康綿之龍安神泉來隸宣和三年降為軍使縣皆還舊隸宣和七年復為軍額縣三石泉下神泉上有石關寨龍安上有三盤寨及茶場宣和元年改龍安曰安昌後復故寶祐後為軍治所堡九重和元年置會同靖安嘉平通津橫望平隴凌霄聳翠連雲潼川府路府二潼川遂寧州九果資普昌瀘合榮渠軍三長寧懷安廣安監一富順紹興三十二年戶八十萬五千三百六十四口二百六十三萬六千四百七十六潼川府緊梓潼郡劍南東川節度本梓州乾德四年改靜戎軍置東關縣太平興國中改安靜軍端拱二年為東川元豐三年復加劍南二字重和元年升為府舊兼提舉梓州果渠懷安廣安軍兵馬巡檢盜賊公事乾道六年升瀘南為潼川府路安撫使崇寧戶一十萬九千六百九口四十四萬七千五百六十五貢綾曾青空青縣十郪望有三十四鹽井中江望隋玄武縣大中祥符五年改有鹽井涪城望有四鎮二十七鹽井射洪緊有鹽井鹽亭緊熙寧五年省永泰縣為鎮入焉有六鹽井通泉上有三鐵冶飛烏中有五鹽井銅山中有銅冶東關中下有四鹽井永泰中下本尉司南渡後為縣遂寧府都督府遂寧郡武信軍節度本遂州政和五年升為府宣和五年升大藩端平三年兵亂權治蓬溪寨崇寧戶四萬九千一百三十二口一十萬二千五百五十五貢樗蒲綾縣五小溪望隋方義縣太平興國初改蓬溪望長江緊端平三年以下三縣俱廢青石緊遂寧中唐縣熙寧六年省青石縣入焉七年復置順慶府中本果州南充郡團練寶慶三年以理宗初潛之地升府隸劍南東路端平三年兵亂淳祐九年徙治