body:
  text: 宋史卷四十六本紀第四十六度宗度宗端文明武景孝皇帝諱太祖十一世孫父嗣榮王與芮理宗母弟也嘉熙四年四月九日生于紹興府榮邸初榮文恭王夫人全氏夢神言帝命汝孫然非汝家所有嗣榮王夫人錢氏夢日光照東室是夕齊國夫人黃氏亦夢神人采衣擁一龍納懷中已而有娠及生室有赤光資識內慧七歲始言言必合度理宗奇之及在位歲久無子乃屬意託神器焉淳祐六年十月己丑賜名孟啓以皇姪授貴州刺史入內小學七年正月乙卯授宜州觀察使就王邸訓習九年正月乙巳授慶遠軍節度使封益國公十一年正月壬戌改賜名孜進封建安郡王寶祐元年正月庚辰詔立為皇子改賜今名癸未授崇慶軍節度使開府儀同三司進封永嘉郡王二年七月以宗正少卿蔡抗兼翊善時資善堂初建理宗製堂記書以賜王十月癸酉進封忠王十一月壬寅加元服賜字邦壽五年十月庚子授鎮南遂安軍節度使景定元年六月壬寅立為皇太子賜字長源命楊棟葉夢鼎為太子詹事七月丁卯太子入東宮癸未行冊禮時理宗家教甚嚴雞初鳴問安再鳴回宮三鳴往會議所參决庶事退入講堂講官講經次講史終日手不釋卷將晡復至榻前起居率為常理宗問今日講何經答之是則賜坐賜茶否則為之反覆剖析又不通則繼以怒明日須更覆講二年正月丁丑謁孔子于太學請以張栻呂祖謙列從祀十二月癸卯冊永嘉郡夫人全氏為皇太子妃五年十月丁卯理宗崩受遺詔太子即皇帝位戊辰尊皇后謝氏曰皇太后生日為壽崇節庚午宰執文武百官詣祥曦殿表請聽政不允辛未大赦十一月壬申宰執以下日表請視朝不允丁丑凡七表始從丙戌帝初聽政御後殿命馬廷鸞留夢炎兼侍讀李伯玉陳宗禮范東叟兼侍講何基徐幾兼崇政殿說書詔求直言又詔先朝舊臣趙葵謝方叔程元鳳馬光祖李曾伯各上言以匡不逮召江萬里王爚洪天錫湯漢等赴闕詔躬行三年喪復濟王竑元贈少師節度使追封鎮王諡昭肅有司討論墳制增修之加封嗣榮王與芮武康寧江軍節度使依前太師判宗正事詔撫勞邊防將士監察御史劾宦官李忠輔何舜卿等贓罪並竄遠方戊戌詔儒臣日侍經筵輔臣觀講乙未命洪天錫以侍御史兼侍讀十二月辛丑詔改明年為咸淳元年行銅錢關子率貫以七百七十文足壬寅戒贓吏絶貢羡餘甲辰詔以生日為乾會節初開經筵講殿以熙明為名禮部尚書馬廷鸞進讀大學衍義序陳心法之要是歲兩浙江東西湖南北廣東西福建成都京西潼川夔利路戶五百六十九萬六千九百八十九口一千三百二萬六千五百三十二大理寺奏大辟三十三人咸淳元年春正月辛未朔日有食之丞相賈似道請為總護山陵使不允尋下詔奬諭癸酉直學士院留夢炎疏留似道甲戌諫議大夫朱貔孫等亦請改命不報詔臨安免征商三月丙子京湖制置使呂文德辭免不允二月庚申置籍中書記諫官御史言事歲終以考成績三月癸酉似道乞解機政不允壬午京湖制司創招鎮邊軍甲申葬理宗于永穆陵夏四月壬寅賞四川都統咱萬壽雲頂山金堂峽之功及其將士丁未壽崇節免徵臨安官私房僦地錢戊申乾會節如上免徵再免在京征商三月自是祥慶災異寒暑皆免戊午賈似道特授太師己未幸景靈宮發米八萬石贍京城民夔路都統王勝以李市沙平之戰獲功轉官兩資將士效力者上其名推賞五月己巳追命史彌遠為公忠翊運定策元勳閏月乙巳久雨京城減直糶米三萬石自是米價高即發釰平糶以為常丁未發錢二十萬贍在京小民錢二十萬賜殿步馬司軍人錢二萬三千賜宿衛自是行慶恤災或遇霪兩雪寒咸賜如上數以江萬里參知政事王爚同知樞密院事權參知政事馬廷鸞端明殿學士簽書樞密院事丁巳以錢三十萬命臨安府通變平物賈丁卯故成都馬步軍總管張順歿于王事詔特贈官五轉其子與八官恩澤六月乙酉名理宗御製之閣曰顯文置學士直學士待制直閣等官戊子沿海制置使葉夢鼎三辭免不允己丑名理宗原廟殿曰章熙秋七月丁酉太白晝見初命迪功郎鄧道為韶州相江書院山長主祀先儒周惇頤壬寅參知政事江萬里乞歸田里不允戊申夔路安撫徐宗武城開達石城乞推恩從之壬戌督州縣嚴錢法禁民間用牌帖癸亥以諒陰命宰執類試阮登炳以下依廷試例出身禁在京置窠柵私繫囚八月庚辰命陳奕沿江按閲軍防賜錢二十萬給用丁亥詔有司收民田租或掊克無藝監司其嚴禁戢違者有刑甲午大元元帥阿朮帥大軍至廬州及安慶諸路統制范勝統領張林正將高興副將孟興逆戰沒于陳詔勝等各官其一子進勇副尉九月己酉以洪天錫為工部侍郎兼侍讀壬子命宰執訪司馬光蘇軾朱熹後人賢者能者各上其名録用癸丑呂文德言京湖制帥策應三司官屬乞推恩詔各進一秩庚申吏部侍郎李常上七事曰崇廉恥嚴鄉舉擇守令黜貪樜讞疑獄任儒師修役法冬十月壬申減四川州縣鹽酒課始自景定四年正月一日再免徵三年乙亥減田契稅錢什四庚辰江安州潼川安撫司以攻懷簡小富寨戰圖來上詔優答以賞十一月乙未兄少保保寧軍節度使致仕乃裕薨贈少傅追封臨川郡王二年春正月癸丑江萬里四請歸田乞祠祿不允以為湖南安撫使兼知潭州二月乙巳侍講范東叟奏正心之要有三曰進德曰立政曰事天上喜納焉戊寅詔免湖南漕司積年運上峽米耗折逋直辛卯詔左右史循舊制立侍御坐前三月庚子賞夔路總管張喜等防護開達軍功將士進官有差乙巳詔郡守兩年為任方別授官戊申賜敕書奬諭呂文德夏四月乙丑洪天錫三請祠不允以顯文閣待制知潭州兼湖南安撫使甲申侍御史程元嶽上言帝王致壽之道在修德後世怵邪說以求之往轍可鑒修德之目有三曰清心曰寡欲曰崇儉皆致壽之原上嘉納之丁亥授信州布衣徐直方史館編校五月癸丑詔諸節制將帥討軍實節浮費毋占役兵士致妨訓練六月丁丑給羅鬼國化州印壬午以衢州饑命守令勸分諸藩邸發釰助之秋七月壬辰祈雨詔以來年正月一日郊壬寅禮部侍郎李伯玉言人材貴乎善養不貴速成請罷童子科息奔競以保幼稚良心詔自咸淳三年為始罷之八月甲申安南國遣使賀登位獻方物九月丙辰浙西安撫使李芾以臺臣黃萬石等言削兩秩免冬十一月辛丑兩淮制置使李庭芝立城屯駐武鋭一軍以工役費用及圖來上詔奬勞之乙卯少師致仕趙葵薨贈太傅賜諡忠靖丁巳利東安撫使知合州張王玉調統制史照監軍王世昌等復廣安大梁城詔推爵賞有差十二月丁丑申嚴戢貪之令甲申以請先帝諡祭告天地宗廟社稷丙戌奉冊寶請于南郊上諡曰建道備德大功復興烈文仁武聖明安孝皇帝廟號理宗大理寺奏歲終大辟三十五人三年春正月己丑朔郊大赦丁酉奉皇太后寶上尊號曰壽和辛丑壽和太后冊寶禮成謝堂等二十七人各進一秩高平郡夫人謝氏等二十二人各進封特封有差癸卯冊命妃全氏為皇后戊申帝詣太學謁孔子行舍菜禮以顏淵曾參孔伋孟軻配享顓孫師升十哲邵雍司馬光升列從祀雍封新安伯禮部尚書陳宗禮國子祭酒陳宜中進讀中庸己酉執經官宗禮講經官宜中各進一秩宜中賜紫章服太學武學宗學國子學宗正寺官若醫官監書庫門庖等各進一秩諸齊長諭及起居學生推恩有差乙卯壽和太后親屬謝奕修郭自中黃興在等二十八人各升補一秩二月己未克復廣安軍詔改為寧西軍庚申馬光祖再乞致仕不允乙丑詔賈似道太師平章軍國重事一月三赴經筵三日一朝治事都堂丙子樞密院言知夔州夔路安撫徐宗武創立臥龍山堡囿詔宗武帶行遙郡團練使以旌其勞三月癸卯知房州李鑑及將校杜汝隆夏喜以戰龍光寨有功優與旌賞夏四月庚申壽和太后兩次冊寶族兄弟謝奕實等十五人族姪謝在達等四十七人族姪孫謝鏞等十四人各錫銀十兩帛十匹詔太中大夫全清夫儒科發身懇陳換班靖退可尚特授清遠軍承宣使提舉佑神觀仍奉朝請乙酉張王玉護合州春耕戰款龍溪以狀言功詔趣上立功將士姓名五月丁亥朔日有食之戊申詔曰比嘗命有司按月給百官奉惟官愈卑去民愈親仍聞過期弗豫是吏奉吾命不虔也諸路監司其嚴糾劾六月壬戌加授呂文德少傅馬光祖參知政事李庭芝兵部尚書並職任仍舊皇后受冊推恩弟全清夫以下十五人官一轉全必槱以下十七人補承信郎癸酉美人楊氏進封淑妃戊寅詔榮王族姻與萊等三十四人各轉官有差秋七月丁亥張王玉授正任團練使帶行左領軍衛大將軍賜金帶壬辰樞密院言右武大夫權鄂州都統汪政鄂城戰禦又焚光化城外積聚及攻真陽城皆有功該轉十二官詔轉橫行遙郡甲午四川都統咱萬壽調統制趙寶楊立等率舟師護糧達渠城以功推賞己酉權黎州張午招諭大青羌主歸義乞用兩林西蕃瑜林例賜豫加優從之八月辛酉遣步帥陳奕率馬軍舟師巡邏江防壬戌邊報警急詔諭呂文德等申嚴防遏乙丑太師武康寧江軍節度使判大宗正事嗣榮王與芮進封福王主榮王祀事壬申久雨命在京三獄赤縣直司簽廳擇官審决獄訟毋滯九月乙未詔郡縣折收民田租毋厚直取贏違者論罪癸卯知雍州總統談淵李旺周勝等繇特磨行大理界率兵攻建水州禽其知州阿孱以下三百餘人獲馬二百餘焚穀米器甲廬舍師還論功各轉官三資軍校補轉有差冬十月庚申復開州賜四川策應司錢百萬勞軍甲戌大雷電十一月丙申故左丞相吳潛追復光祿大夫壬寅賞知房州李鑑調遣路將夏喜統領馮興等均州武陽壩戰功十二月丙辰呂文煥依舊帶行御器械改知襄陽府兼京西安撫副使丁卯臺臣言復元官觀文殿學士提舉洞霄宮皮龍榮貪私傾險嘗朋附丁大全乞寢新命詔豫祠祿四年春正月癸未賜呂師夔紫章服金帶己丑呂文德言知襄陽府兼京西安撫副使呂文煥荊鄂都統制唐永堅蠟書報白河口萬山鹿門山北帥興築城堡檄知郢州翟貴兩淮都統張世傑申嚴備禦癸巳故守合州王堅賜廟額曰報忠癸卯沔州駐劄潼川安撫副使咱萬壽特升右武大夫帶行左驍衛大將軍賜金帶己酉印應雷改知慶元府兼沿海制置使庚戌詔曰邇年近臣無謂引去以為高勉留再三弗近益遠往往相尚不知其非義也亦由一二大臣嘗勇去以為衆望相踵至今孟子於齊王不遇故去是未嘗有君臣之情也然猶三宿出晝庶幾改之儒者家法無亦取此乎朕於諸賢允謂無負其弗高尚使人疑於負朕閏月庚午賜夏貴金帶夏四月壬午湯漢三辭免刑部侍郎福建安撫使庚寅乾會節帝御紫宸殿羣臣稱賀上曰謝方叔託名進香擅進金器諸物且以先帝手澤每繫之跋率多包藏至以先帝行事為己功殊失大臣體宜鐫一秩於是盧鉞等相繼論列方叔昨蜀廣敗事誤國殄民今又違制擅進削一秩罰輕詔削四秩奪觀文殿大學士惠國公罷宰臣恩數仍追寶奎録並繫跋真本來上丙申右正言黃鏞言今守邊急務非兵農合一不可一曰屯田二曰民兵川蜀屯田為先民兵次之淮襄民兵為先屯田次之此足食足兵良策也不報丁酉詔故修武郎姚濟死節立廟賜額曰忠壯五月辛酉樞密都承旨高達再辭侍衛都虞候乞歸田里命孫虎臣代之壬申賜陳文龍以下六百六十四人進士及第出身丙子賈似道乞骸骨不允六月辛巳葉夢鼎再乞歸田里不允詔罷浙西諸州公田莊官募民自耕輸租租減什三毋私相易田違制以盜賣官田論秋七月戊午有星出氐宿西北急流入騎官星沒己未淑妃楊氏親屬楊幼節以下百三十四人推恩進秩八月壬寅奉安寧宗實録理宗實録御集日曆會要玉牒經武要略咸淳日曆玉牒賈似道葉夢鼎馬廷鸞各轉兩官諸局官若吏推恩有差九月癸未太白晝見大元兵築白河城始圍襄樊冬十月戊寅朔日有食之子憲生參知政事常挺六乞歸田里詔豫郡己亥已減四川州縣鹽酒課詔自咸淳四年始再免徵三年十一月癸丑樞密院言南平紹慶六郡鎮撫使韓宣城渝嘉開達常武諸州有勞繇峽州至江陵水陸措置盡瘁以死宜視沒於王事加恩詔宣守本官致仕任一子承節郎仍贈正任承宣使丁巳詔知江陵府陳奕裨將周全王德等戰西山南谷口田家山有功各以等第推賞戊午子鍠生丙寅福建安撫使湯漢再辭免乞祠祿詔別授職辛未以文武官在選困於部吏隆寒旅瑣可閔詔吏部長二郎官日趣銓注小有未備特與放行違者有刑自是隆寒盛暑申嚴誡飭常挺卒贈少保壬申行義役法十二月辛卯以夏貴為沿江制置副使兼知黃州癸巳史館狀理宗實録接續起修張九成孫象先力學飭行不墜家聲其免一解示表厲命建康府建南軒書院祠先儒張栻戊戌汪立信知潭州兼湖南安撫使職任依舊乙巳詔賞京湖總管張喜趙萬等石門坂堰戰功五年春正月丁未以李庭芝為兩淮安撫制置大使兼知揚州壬子京湖策應司參謀呼延德領諸將張喜等遇北兵戰于蠻河癸亥葉夢鼎纍章請老留之固辭依前少保判福州福建安撫使封信國公以馬廷鸞參知政事兼同知樞密院事甲戌以江萬里參知政事二月戊子江萬里辭免參知政事不允三月丙午北帥阿朮自白河以兵圍樊城甲寅葉夢鼎辭免判福州福建安撫使詔不允乙卯皇后歸寧族姻推恩保信軍節度使全清夫以下五十六人各進一秩咸安郡夫人全氏以下三十二人各特封有差大元兵城鹿門己未詔浙西六郡公田設官督租有差辛酉京湖都統張世傑率馬步舟師援襄樊戰于赤灘圃戊辰以江萬里為左丞相馬廷鸞為右丞相兼樞密使己巳以馬光祖知樞密院事兼參知政事吳革沿江制置使夏四月丙子賞張世傑戰功辛巳江萬里馬廷鸞辭免詔不允壬午知渠州張資上蓬州界白土神山蒲渡等處今年春戰功丙戌以安西都統張朝寶利東路安撫張王玉領兵護錢粟餉寧西軍還至水磑頭戰有功詔推賞己丑劉雄飛依舊樞密都承旨知沅州兼常德澧辰沅靖五郡鎮撫使癸巳李庭芝特進一秩高郵縣夏世賢七世義居詔署其門五月己酉馬光祖依舊觀文殿學士提舉洞霄宮乙卯程元鳳薨贈少師庚申有星自斗宿距星東北急流向牛宿至濁沒壬戌詔信陽諸將婁安邦朱興戰千石畈呂文煥呼延德戰福山楊青李忠戰石湫俱有勞效推賞有差壬申京湖制司言故夔路安撫徐宗武沒于王事乞優加贈恤詔致仕恩外特官其一子承節郎六月庚辰以呂文福為復州團練使知濠州兼淮西安撫副使甲申皇子是生辛卯家鉉翁辭免新命詔別授職庚子李庭芝辭免兼淮東提舉不允秋七月己酉觀文殿學士馬光祖乞守本官致仕詔允所請庚申祈雨壬戌東南有星自河鼓距星西北急流至濁沒八月戊寅詔郡縣收民田租毋巧計取贏毋厚直折納轉運司申嚴按劾詔襄樊將士戰禦宣力以錢二百萬犒師趣上其立功姓名補轉官資九月丙午祈晴辛酉祀明堂大赦丙寅明堂禮成加上壽和聖福皇太后尊號冊寶太師判大宗正事福王主榮王祀事與芮加食邑一千戶冬十月甲申子憲授檢校太尉武安軍節度使封益國公己丑呂文德進封崇國公加食邑七百戶以湯漢為顯文閣直學士提舉玉隆萬壽宮兼象山書院山長十一月戊辰少傅文德乞致仕詔特授少師進封衛國公依所請致仕十二月癸酉文德卒贈太傅賜諡武忠己卯以范文虎為殿前副都指揮使壽和聖福皇太后尊號冊寶禮成姪謝堂姪孫光孫等二十八人各轉一官餘姻推恩有差甲申以錢二百萬命京湖帥臣給犒襄郢等處水陸戍士戊子詔安南國王父陳日煚國王陳威晃竝加食邑一千戶大元兵築南新城六年春正月壬寅以李庭芝為京湖安撫制置使兼夔路策應使印應雷兩淮安撫制置使己酉以錢二百萬賜夔路策應司備禦賞給庚戌以高達為湖北安撫使知鄂州孫虎臣起復淮東安撫副使知淮安州辛酉行成天曆丁卯上製字民牧民二訓以戒百官戊辰以江萬里為福建安撫使二月辛未檢校少保安德軍節度使與萊加食邑五百戶丁亥陳宜中經筵進講春秋終篇賜象簡金御仙花帶鞍馬丁酉以呂文福為淮西安撫副使兼知廬州己亥朱祀孫權兵部尚書仍四川安撫制置總領夔路轉運知重慶府三月庚子朔日有食之癸丑詔曰吏以廉稱自古有之今絶不聞豈不自章顯而壅於上聞歟其令侍從卿監郎官各舉廉吏將顯擢焉癸亥詔贛吉南安境數被寇雖有寨卒寇出沒無時莫能相救宜即要衝立四寨寨屯兵百使地勢聯絡禦寇為便從三郡擇將官領之夏四月戊寅以文天祥兼崇政殿說書五月辛丑以吳革為沿江制置宣撫使六月庚午詔太極圖說西銘易傳序春秋傳序天下士子宜肄其文戊寅賈似道託疾辭退疏十數上上留益堅禮異之曰師相而不名馬廷鸞洎省部臺諫學館諸司連章請留似道庚辰子憲薨庚寅詔以襄郢水陸屯戍將士隆暑露處出錢二百萬命京湖制司給賜秋七月復開州己亥更鑄印給之八月甲申瑞安府樂清縣嘉禾生詔薦士增四名壬辰詔郡縣行推排法虛加寡弱戶田租害民為甚其令各路監司詢訪亟除其弊詔精擇監司守令監司察郡守郡守察縣令置籍考核歲終第其治狀來上癸巳以夏貴能舉職事進一秩詔似道十日一朝九月庚戌以黃萬石為沿海制置使壬子台州大水冬十月丁丑遣范文虎總統殿司兩淮諸軍往襄樊會合備禦賜錢百五十萬犒師己卯詔台州發義倉米四千石並發豐儲倉米三萬石振遭水家甲申以陳宗禮趙順孫兼權參知政事依舊同提舉編修敕令經武要略閏十月己酉安吉州水免公田租四萬四千八十石戊午詔殿步馬諸軍貧乏陳沒孤遺者多方此隆寒其賜錢二十萬米萬石振之十一月丁丑嘉興華亭兩縣水免公田租五萬一千石民田租四千八百一十石庚辰詔襄郢屯戍將士隆寒可閔其賜錢二百萬犒師己丑都統張世傑領兵江防乙未詔陳宗禮進一秩為資政殿學士依所請守兼參知政事致仕十二月戊戌陳宗禮卒贈七秩己亥詔唐全張興祖等齎蠟書入襄陽往復甚艱各補轉三官賜錢二千緡大元兵築萬山城七年春正月乙丑子是授左衛上將軍進封建國公詔湯漢洪天錫赴闕詔戒貪吏辛未紹興府諸暨縣湖田水免租二千八百石有奇三月戊寅發屯田租穀十萬石振和州無為鎮巢安慶諸州饑辛巳日暈赤黃周匝乙酉平江府饑發官倉米六萬石吉州饑發和糴米十萬石皆減直振糶丙戌詔減內外百司吏額戊子發米一萬石往建德府濟糶詔臨江軍宣聖四十七代孫延之子孫與放國子監試夏四月辛亥免廣東提舉司鹽籮銀叁萬兩甲寅禮部侍郎陳宜中再乞補外以顯文閣待制出知福州兼福建路安撫使五月乙酉賜禮部進士張鎮孫以下五百二人及第出身壬辰發米二萬石詣衢州振糶六月癸巳以錢百萬銀五千兩命知嘉定府咱萬壽修城浚壕繕甲兵備禦遏以韓震帶行御器械知江安州兼潼川東路安撫副使馬坤帶行御器械知咸淳府節制涪萬州臺臣劾朱善孫督綱運受贓四萬五千詔特貸死配三千里禁錮不赦乙未詔以蜀閫調度浩繁賜錢二百萬給用丙申諸暨縣大雨暴風雷電發米振遭水家瑞州民及流徙者飢乏食發義倉米一萬八千石減直振糶己亥詔以陸九淵孫溥補上州文學己酉鎮江府轉輸米十萬石於五河新城積貯癸丑以隆暑給錢二百萬賜襄郢屯戍將士丙辰撫州黃震言本州振荒勸分前穀城縣尉饒立積米二百萬靳不發廩雖嘗監貸宜正遏糴之罪詔饒立削兩秩武岡軍居住洪天錫三辭召命詔守臣勉諭赴闕戊午紹興府饑振糧萬石己未兩淮五河築城具完賜名安淮軍大元會兵圍襄陽秋七月辛未樞密院言吳信周旺齎蠟書入襄城往復效勞詔各補官三轉丁丑湖南轉運司訪求先儒張栻後人義倫以聞詔補將仕郎壬午四川制置使朱祀孫言夏五以來江水凡三泛溢自嘉而渝漂蕩城壁樓櫓圮壞又嘉定地震者再被災害為甚乞賜黜罷上答天譴詔不允癸未詔城五河淮東制置印應雷具有勞績進一秩宣勞官屬將士皆推恩八月壬辰朔日有食之甲午以錢三百萬遣京湖制置李庭芝詣郢州調遣犒師丁未命沿江制置副使夏貴會合策應以錢二百萬隨軍給用九月乙亥顯文閣直學士湯漢顯文閣直學士洪天錫各五辭召命詔並升華文閣學士仍豫祠祿己丑子生冬十月丙申少傅嗣秀王與澤薨詔贈少師追封臨海郡王癸丑從政郎朱鑒孫進羣經要略己未詔殿步馬諸軍貧乏陳沒孤遺者方此隆寒其賜錢二十萬米萬石振之十一月癸亥詔民有以孝弟聞于鄉者守令其具名上聞將旌異勞賜焉己巳詔湯漢官一轉端明殿學士依所請致仕十二月甲午詔諸路監司循按刑獄傔從擾民御史臺申嚴覺察丙午以錢三十萬命四川制司下渠洋開州寧西鎮撫使張朝寶創司犒師己亥淮東統領兼知鎮江府趙溍乞祠祿不允謝方叔特復元官職惠國公致仕辛亥初置士籍戊午詔舉廉能材堪縣令者侍從臺諫給舍各舉十人卿監郎官各舉五人制帥監司各舉六人知州軍監各舉二人八年春正月庚申詔朕惟崇儉必自宮禁始自今宮禁敢以珠翠銷金為首飾服用必罰無貸臣庶之家咸宜體悉工匠犯者亦如景祐制必從重典又詔有虞之世三載考績三考黜陟幽明漢之為吏者長子孫則其遺意也比年吏習偷薄人懷一切計日待遷事未克究又望而之他吏胥狎玩竊弄官政吾民奚賴焉繼自今內之郎曹外之牧守以上更不數易其有治狀昭著自宜奬異辛未子昺生己丑湯漢卒賜諡文清二月癸巳謝方叔卒贈少師前知台州趙子寅歿無所歸特贈直祕閣給沒官宅一區田三百畝養其孤遺以旌廉吏丙午以錢二百萬給犒襄郢水陸戰戍將士三月丙子同知樞密院事兼權參知政事趙順孫授中大夫夏四月戊子知合州利路安撫張王玉創築宜勝山城五月己巳王爚除觀文殿學士提舉萬壽觀兼侍讀大元兵久圍襄樊援兵厄關險不克進詔荊襄將帥移駐新郢遣部轄張順張貴將死士三千人自上流夜半輕舟轉戰比明達襄城收軍閲視失張順六月丙申皮龍榮徙衡州丁酉以章鑑為端明殿學士同簽書樞密院事同提舉經武要略以錢千萬命京湖制司糴米百萬石轉輸襄陽府積貯乙巳以家鉉翁兼權知紹興府浙東安撫提舉司事以唐震為浙西提點刑獄王爚乞寢新命不允勉諭赴闕辛亥臺臣言江西推排田結局已久舊設都官團長等虛名尚在占口六常役為害無窮又言廣東運司銀場病民詔俱罷之癸丑以錢五百萬緡命四川制司詣湖北糴運上峽入夔米五十萬石秋七月辛未知靜江府廣西經略安撫使兼計度轉運使胡頴乞祠祿詔勳一轉依所乞宮觀八月丙戌朔日有食之辛丑詔家鉉翁赴闕丁未紹興府六邑水發米振遭水家壬子王爚辭免明堂大禮陪祠乙卯詔福建安撫陳宜中克舉厥職升寶謨閣待制九月丁卯詔洪天錫轉端明殿學士允所請致仕辛未明堂禮成祀景靈宮還遇大雨改乘逍遙輦入和寧門肆赦庚辰詔以朱祀孫兼四川屯田使乙酉洪天錫卒贈五官諡文毅冬十月己亥紹興府言八月一日會稽餘姚上虞諸暨蕭山五縣大水詔減田租有差丁未以章鑑兼權參知政事右丞相馬廷鸞十疏乞骸骨詔不允庚戌以秋雨水溢詔減錢塘仁和兩縣民田租什二會稽湖田租什三諸暨湖田租盡除之辛亥陳宜中兼給事中十一月乙卯右丞相馬廷鸞纍疏乞骸骨授觀文殿學士知饒州詔以隆寒殿步馬司諸軍貧窶並陳沒孤遺者振以錢粟丙辰陳奕以殿前都指揮使攝侍衛步軍司馬軍司己未馬廷鸞辭免知饒州乞祠祿詔允所請以觀文殿大學士鄱陽郡公提舉洞霄宮壬戌命阮思聰赴樞密院稟議己巳詔明堂禮成安南國王陳日煚陳威晃各加食邑一千戶賜鞭鞍馬等物十二月甲寅以葉夢鼎為少傅右丞相兼樞密使九年春正月乙丑樊城破范天順牛富死之癸未詔定安豐統制金文彪朱文廣王文顯盛全河古河泉河珉河等處戰功行賞二月甲申詔鄂州左水軍統制張順沒身戰陳贈寧遠軍承宣使官其二子承信郎立廟京湖賜額曰忠顯甲午朱祀孫撫綏備禦義不辭難敕書奬諭丁未以夏貴檢校少保庚戌呂文煥以襄陽府歸大元癸丑以朱澗寺戰功推賞來歸人馬宣沿江都統王喜等將士千五百七十餘人三月庚申賈似道言邊遽日聞請身督師以勵將帥詔不允四川制司言近出師成都劉整故吏羅鑑自北復還上整書一帙有取江南二策其一曰先取全蜀蜀平江南可定其二曰清口桃源河淮要衝宜先城其地屯山東軍以圖進取帝覽奏亟詔淮東制司往清口擇利城築以備之葉夢鼎辭免右丞相詔不允庚午遣金吾衛上將軍阮思聰由平江鎮江及黃州行視城池凡合繕修增易者亟條奏丙子來歸人方德秀補成忠郎栗勇楊林胡巨川補保義郎劉全補承信郎戊寅賈似道始奏李庭芝表言襄帥呂文煥以城降大元己卯加咱萬壽寧遠軍承宣使職任仍舊庚辰夏貴辭免檢校少保不允壬午詔建機速房以革樞密院漏泄兵事稽違邊報之弊賈似道纍疏請身督師詔勉留夏四月詔褒襄城死節右領衛將軍范天順贈靜江軍承宣使右武大夫馬司統制牛富贈金州觀察使各官其二子承信郎賜土田金幣恤其家甲申汪立信權兵部尚書京湖安撫制置使知江陵府夔路策應使湖廣總領不許辭免以錢二百萬給立信開閫犒師葉夢鼎乞致仕遣官勉諭赴都堂治事辛卯以趙溍為淮西總領兼沿江制置建康留守詔黃萬石赴闕壬辰詔襄陽六年之守一旦而失軍民離散痛切朕心今年乾會節其免集英殿宴以錢六十萬給沿江制置趙溍江防捍禦癸巳知招信軍陳巖乞祠祿詔曰乃者邊吏弗戒致有襄難將士頻歲暴露邊民蕩析離居衋傷朕心爾閫臣專征方面宜身率諸將宣揚國威以賞戮用命不用命爾守臣有土有民宜申警國人保固封守爾諸將尚迪果毅一乃心力各以其兵敵王所愾今朕多誥爾其悉聽明訓毋懈毋磱習于故常功多有厚賞爾不克用勸罰固不得私也又如中外小大臣僚有材識超卓明控御之宜懷攻守之略者密具以聞一如端拱二年制書朕當虛心以聽李庭芝乞解罷詔赴闕壬寅詔復置樞密院都統制副都統制各一員丁未以高達為寧江軍節度使湖北安撫使知峽州詔忠州潛藩已升咸淳府刺史王達改授高州刺史李庭芝辭召赴闕詔與祠己酉詔南歸人復有戰功者豫優賞楊春薛聚成陳君謨周海周興各補成忠郎蕭成侯喜丁甫劉鑄鄭歸各補承信郎以夏貴兼侍衛馬軍都指揮使庚戌詔汪立信賞罰調用悉聽便宜行事辛亥呂師夔言比賈似道得李庭芝書報臣叔父文煥以襄城降臣聞之隕越無地不能頃刻自安請以經略安撫轉運靜江府印委次官護之席藁俟命容臣歸省偏親誓當趨事赴功毀家紓難以贖門戶之愆以報君父之造詔不允五月乙卯以黃萬石權戶部尚書兼知臨安府浙西安撫使四川制司朱祀孫言所部諸縣除正辟文臣外諸郡屬邑許令本司不拘外縣一體選辟文臣以幸蜀之士民奏可丙辰知廬州呂文福言從兄文煥以襄陽降為其玷辱何顏以任邊寄乞放罷歸田里詔不允呂師夔五疏乞罷任詔赴闕丁卯申禁奸民妄立經會私創庵舍以避征徭保伍容芘不覺察坐之辛未劉雄飛乞致仕戊寅孝感縣丞關應庚上書言邊防二十事詔授武當軍節度推官兼司法京湖制司量材任使庚辰馬軍司統制王仙昔在襄樊緣戰陷陳今復來歸特與官五轉充殿前司正額統制賜錢一萬布衣林椿年等上書言邊防十數事詔諸人上書凡言請以丞相似道督視者不允餘付機速房六月刑部尚書兼給事中陳宜中言樊城之潰牛富死節尤著以職卑贈恤下范天順一階未愜輿情詔加贈富寧遠軍承宣使仍賜土田金幣恤其家前四川宣撫司參議官張夢發詣賈似道上書陳危急三策曰鎮漢江口岸曰城荊門軍當陽界之玉泉山曰峽州宜都而下聯置堡寨以保聚流民且守且耕并圖上城築形勢賈似道不以上聞下京湖制司審度可否事竟不行成都安撫使咱萬壽去冬調將士攻毀成都大城今春戰碉門五月遣統制楊國寶領兵至雅州統領趙忠領兵至眉州兩路捍禦有勞詔具將士宣力等第姓名以聞呂文福言文煥為人扶擁以襄陽降非由己心詔與李庭芝元陳異同其審核以聞庭芝表向在京湖來歸人吳旺等備言文煥父子降狀先納管鑰旋獻襄城且陳策政郢州請自為先鋒言人人同制司案辭可徵非敢加誣人罪詔文福勉力捍禦毋墜家聲京湖制司言去年冬間探司總管劉儀盛聰總制趙鐸領精鋭至均州文龍崖立寨呂文煥既降均城受敵知郡劉懋偕劉儀等扞禦宣勞詔懋升右武大夫帶行左衛大將軍仍舊職儀添差荊湖北路兵馬鈐轄聰添差鄂州兵馬鈐轄各官三轉將士官兩轉左藏東庫蹇材望上書言邊事大可憂者七急當為者五不報丙戌劉雄飛卒特贈一官戊子京湖制司請給器械詔內軍器庫選犀利者賜之仍贈錢百萬備修繕四川制置朱祀孫言月奉銀計萬兩願以犒師向後月免請詔常祿勿辭己丑給事中陳宜中言乞正范文虎不力援襄之罰詔文虎降一官依舊知安慶府安南國進方物特賜金五百兩帛百匹癸卯汪立信言臣奉命分閫延見吏民皆痛哭流涕而言襄樊之禍皆由范文虎及俞興父子文虎以三衙長聞難怯戰僅從薄罰猶子天順守節不屈猶或可以少贖其愆興奴僕庸材器量褊淺務復私讎激成劉整之禍流毒至今其子大忠挾多資為父行賄且自希榮進今雖寸斬未足以快天下之忿乞置重典則人心興起事功可圖詔俞大忠追毀出身文字除名循州拘管又言守闕進義副尉童明襄陽破拔身來歸且嘗立功開州乞補轉四官詔特與官兩轉閏月辛亥命殿前指揮使陳奕總統舟師備鄂州黃州江防癸丑來歸人郭珍補成忠郎張進張春張德林向德成王全婁德王興各補承信郎丙辰朝散郎師顯行進注皇朝文鑑前臨安府司法梁炎午陳攻守之要五事不報命大理寺丞鍾蜚英點視沿江堡隘兵船戊辰知州郭漢傑言馬湖蠻王汝作鹿巫蠻王沐丘帥蠻兵五百餘助官軍民義阻險馬湖捍禦有功詔賞汝作沐丘金帛及其部兵有差州總管曹順一軍凡在戰陳者趣具立功等第來上秋七月丁亥權紹興府節制紫城軍義文榮鼎及將校趙居敬丁福孟青蒲祥白貴史用羅宜王繁等九人成都之役沒于兵各追贈官秩仍官其子癸巳知達州趙章知開州鮮汝忠知渠州張資等復洋州戊戌張王玉等復馬騣山八月癸丑權知均州徐鼎總管盛聰戰房州胡師峪板倉乙卯知房州李鑑調權竹山縣王國材統制熊權總轄馬宗明戰落馬坪白羊山詔有司各以勞效論賞九月辛巳以章鑑簽書樞密院事兼參知政事陳宜中同簽書樞密院事成都安撫使咱萬壽城嘉定烏尤山乙未以洪燾為浙東安撫使丙申以黃萬石為湖南安撫使冬十月己酉來歸人汪福許文政各官五轉癸丑鎮巢軍和州太平州諸將查文李文用孟浩等十一人以射湖岡萬歲嶺後港及焦湖北岸戰功咸賜爵賞癸亥雷四川制司言何炎向失洋州調知達州趙章等率諸部軍義復之七月又復洋州吳勝堡兩城權檄統轄謝益知洋州總制趙桂楫知巴州俾任責吳勝堡戰守之事至是以功來上且以二州攝事守臣請命于朝詔與正授丁丑兩淮制置使印應雷告老進二秩致仕李庭芝兩淮安撫制置使賜錢二百萬激犒備禦十一月壬午子授左衛上將軍封嘉國公戊子知泰州龔遣其將王大顯等捍禦水寨有功又獲俘民以還詔水步兩軍將校凡用命者賞激有差甲午以夏貴為淮西制置使兼知廬州陳奕沿江制置使兼知黃州呂文福知閣門事詔從李庭芝請分淮東西制置為兩司就命庭芝交割淮東仍兼淮西策應使乙未以夏貴為淮西安撫制置使賜錢百萬激犒備禦李庭芝辭免淮西策應使不允知安豐軍陳萬以舟師自城西大澗口抵正陽城遇北兵力戰詔旌其勞十二月甲子以馬廷鸞為浙東安撫使知紹興府丙寅權參知政事章鑑再乞解機政不允丁丑沿江制置使所轄四郡夏秋旱潦免屯田租二十五萬石十年春正月壬午城鄂州漢口堡權總制施忠部將熊伯明知泰州龔以天長縣東橫山秦潼湖青蒲口等處戰功推賞戊子江萬里以疾辭職任詔依舊觀文殿大學士提舉洞霄宮乙丑以留夢炎知潭州兼湖南安撫使庚寅城鄂州沌口西岸堡京湖制司言襄陽勇信中軍鈐轄吳信隨呂文煥北往今並妻子冒險來歸詔吳信赴闕制司仍存恤其家丙申江東沙墟租米以咸淳九年水災詔減什四乙巳雨土二月己酉以趙順孫為福建安撫使辛酉詔諸制閫就任升除恩數其告命衣帶鞍馬閣門勿差人給賜往要厚賂以失優寵制臣之意違者有刑三月己卯免郡縣侵負義倉米七十四萬八千餘石夏四月乙卯子昺授左衛上將軍進封永國公詔賞沿江都統王達黃俁戰黃連寺之功戊午以呂文福為常德辰沅澧靖五郡鎮撫使知沅州辛酉詔賞光州守陳岩路分李全許彥德總管何成路鈐仰子虎等牛市畈丁家莊戰功烏蘇蠻王詣雲南軍前納款大元五月丁亥以高世傑為湖北安撫副使兼知嶽州總統出戍軍馬辛丑馬廷鸞辭免觀文殿大學士知紹興府浙東安撫使詔不允壬寅張王玉表請城馬騣虎頭兩山或先築其一以據險要六月戊午以銀二萬兩命壽春府措置邊防秋七月壬午汪立信乞致仕不允癸未帝崩于福寧殿遺詔太子即皇帝位甲申臺臣劾內醫蔡幼習詔奪五秩送五百里州軍居住二子並罷閣門職八月己酉上大行皇帝諡曰端文明武景孝皇帝廟號度宗德祐元年正月壬午葬于永紹陵贊曰宋至理宗疆宇日蹙賈似道執國命度宗繼統雖無大失德而拱手權奸衰敝寖甚考其當時事勢非有雄才睿略之主豈能振起其墜緒哉曆數有歸宋祚尋訖亡國不于其身幸矣
