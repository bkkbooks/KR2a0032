body:
  text: 宋史卷四十三本紀第四十三理宗三四年春正月壬寅朔詔邊將毋擅興暴掠虐殺無辜以慰中原遺黎之望帝製訓廉謹刑二銘戒飭中外以李鳴復參知政事杜範同知樞密院事劉伯正簽書樞密院事余玠華文閣待制依舊四川安撫制置使知重慶府兼四川總領財賦李曾伯寶章閣直學士依舊淮東安撫制置使知揚州兼淮西制置使戊午樞密院言四川帥臣余玠大小三十六戰多有勞效宜第功行賞詔玠趣上立功將士姓名等第即與推恩庚申以余玠兼四川屯田使二月癸酉出封樁庫緡錢各十萬命兩淮京湖四川制司收瘞頻年交兵遺骸立為義冢夏四月丁丑有流星大如太白出于尾癸未填星守太微垣乙未祈雨五月庚戌余玠言利閬城大獲山蓬州城營山渠州城大良平嘉定城舊治瀘州城神臂山諸城工役次第就緒神臂山城成知瀘州曹致大厥功可嘉乞推賞以勵其餘詔致大帶行遙郡刺史丁巳武功大夫雄威軍都統制楊價世守南邊連年調戍播州捍禦勤瘁詔價轉右武大夫文州刺史戊午大元兵圍壽春府呂文德節制水陸諸軍解圍有功詔赴樞密院禀議發緡錢百萬詣兩淮制司犒師庚申守闕進勇副尉桂虎進義副尉楚富吐渾將虞候鄭蔡捍禦壽春俱有勞效詔各官資兩轉給緡錢千乙丑前簽書樞密院事鄒應龍薨贈少保監察御史胡清獻劾淮西提刑徐敏子三罪詔削兩秩送江州居住六月庚午朔呂文德依舊侍衛馬軍副都指揮使兼淮西招撫使知濠州乙亥賜禮部進士留夢炎以下四百二十四人及第出身有差壬午詔安豐軍策應解壽春圍將士補轉官資有差詔壽春一軍先涉大海搗山東膠密諸州有功今大元兵圍城能守城不隳其立功將士皆補轉有差乙未有流星大如太白出于畢丙申吳潛提舉隆興府玉隆萬壽宮任便居住秋七月己亥朔祈雨乙卯招收沿淮失業壯丁為武勝軍以五千人為額辛酉盜發永州東安縣飛虎軍正將吳龍統制鄭存等討捕有功詔補轉官資有差甲子詔故直龍圖閣項安世正學直節先朝名儒可特贈集英殿修撰八月壬辰太白晝見九月癸卯右丞相史嵩之以父病謁告許之詔范鍾劉伯正暫領相事甲辰史彌忠卒贈少師封鄭國公賜諡文靖詔史嵩之起復右丞相兼樞密使癸丑熒惑填星合于軫甲寅京湖制司言諸將李福等破申州蔡州西平縣城壁及馬家等寨詔將士各補官推賞有差己未將作監徐元杰上疏論史嵩之起復宜許其舉執政自代帝不允遂求去帝曰經筵賴卿規益何事引去耶癸亥太白犯斗宿距星乙丑雷丁卯雷臺臣言嚴州及紹興蕭山等縣征商煩苛詔亟罷之冬十月甲戌詔慶元府守臣敦諭史嵩之赴闕嵩之控辭不允壬辰杜範游提舉萬壽觀兼侍讀十一月辛丑詔趣游杜範赴闕戊申雷庚戌詔陳韡李性傳赴闕十二月庚午以范鍾為左丞相兼樞密使杜範為右丞相兼樞密使游知樞密院事劉伯正參知政事兼簽書樞密院事詔戒飭百官許右丞相史嵩之終喪甲戌以趙葵同知樞密院事乙亥鄭清之授少保依舊觀文殿大學士醴泉觀使兼侍讀仍奉朝請進封衛國公五年春正月丁酉朔詔更新庶政綏撫中原遺民丙午杜範辭免右丞相不允己酉雷乙卯以李性傳簽書樞密院事兼權參知政事二月丙寅朔雨土甲戌復五河詔呂文德進三秩羊洪進二秩餘有戰功者推賞其陳沒人具姓名贈恤丁丑范鍾等上玉牒日曆及孝宗光宗御集經武要略寧宗實録壬辰太白晝見經天三月庚子詔嚴贓吏法仍命有司舉行彭大雅程以升吳淇徐敏子納賄之罪準淳熙故事戒吏貪虐預借抑配重催取贏以緡錢百萬犒淮東師夏四月甲申填星犯上相星丙戌杜範薨贈少傅諡清獻戊子余玠言權巴州何震之守城死於兵詔進贈官三秩一子與下州文學京湖制司言鈐轄王雲等襲鄧州鎮平縣靈山戰順陽鐵撅峪皆有勞效野戰數十合雲等六人被重創死路鈐于江一軍力戰詔王雲贈三秩仍官其二子為承信郎王寬王立田秀董亮董玉各加贈恤于江等各轉一官資詔李曾伯余玠董槐孟珙王鑑職事修舉曾伯玠升閣職槐珙鑑轉官並因其任五月丁酉呂文福夏貴上戰功詔貴官兩轉文福帶行閣職丁未詔沿江湖南江西湖廣兩浙制帥漕司及許浦水軍司共造輕捷戰船千艘置遊擊軍壯士三萬人分備捍禦戊申日生赤黃背氣辛亥詔董槐赴闕丁巳淮東制置使李曾伯辭免煥章閣學士從之六月甲申祈雨丙戌工部侍郎徐元杰暴卒贈四秩置詔獄秋七月癸巳朔日有食之旱辛丑鎮江常州亢旱詔監司守臣及沿江諸郡安集流民甲辰祈雨乙卯詔給徐元杰劉漢弼官田五百畝緡線五千恤其家丁巳京湖制司言總制亢國用師衆戰裕州拐河戰黑山戰大神山皆有勞效詔國用官兩轉李山等四十七人官一轉呂文德言與大元兵戰五河隘口又戰于濠州大元兵還詔文德屯駐諸軍戰守將士推恩有差八月庚辰范鍾再乞歸田不允九月甲辰京湖制置司言劉整等率精鋭以雲梯四面登鎮平縣城入城巷戰焚城中倉庫糗糧器甲路將武勝等四人死之略廣陽焚列屯寨柵廬舍凡二十餘所還抵靈山又力戰有功詔整官兩轉同行蔡貴等二百二十人各官一轉辛亥祀明堂奉太祖太宗寧宗並侑大赦冬十一月乙未鄭清之乞歸田不允丙申詔師彌典司屬籍職事修舉授太傅加食邑依前判大宗正事嗣秀王壬子詔大元兵入蜀權成都府馮有碩權漢州王驤權成都縣楊兌權資州劉永權潼川府魏靄死于官守其各贈官三轉仍官其一子癸丑詔將領關貴統制白傅才率衆復洋州還遇大元兵交戰將士百五十三人皆陳沒已祔饗閔忠廟贍恤其家關貴白傅才各贈承節郎官其一子進勇副尉十二月甲戌詔壽春守臣劉雄飛等以大元兵圍城捍禦有功雄飛及呂文福林子䥩等十一人各官三轉劉用等補轉官資有差己卯以游為右丞相兼樞密使鄭清之為少師奉國軍節度使依前醴泉觀使兼侍讀仍奉朝請賜玉帶及賜第行在兄與歡換授安德軍節度使開府儀同三司萬壽觀使仍奉朝請弟嗣沂王貴謙嗣榮王與芮並加授少保以趙葵知樞密院事兼參知政事李性傳同知樞密院事陳韡兼參知政事壬午太史奏來歲正旦日當食詔以是月二十一日避殿減膳命百司講行闕政凡可以消弭災變者直言毋隱六年春正月辛卯朔日有食之置國用所命趙與為提領官二月戊辰范鍾再乞歸田里詔官三轉觀文殿大學士醴泉觀使兼侍讀己巳范鍾再辭詔提舉洞霄宮任便居住庚午以劉雄飛知壽春府節制屯田軍馬三月癸巳日暈周匝珥氣夏四月辛酉太白晝見壬戌太陰犯太白甲戌以丘嶽兼兩淮屯田副使賈似道兼蘄黃屯田副使丁丑日暈周匝戊寅詔朱熹門人胡安之呂燾蔡模並迪功郎本州州學教授給札録其著述並條具所欲言者以聞閏四月辛卯李曾伯以臺諫論詔落職豫祠尋罷祠祿戊戌呂文德言今春北兵攻兩淮統制汪懷忠等逆戰趙家園拔還俘獲人民路鈐夏貴知州王成倪政等帥舟師援安豐軍所至數戰將士陳亡者衆詔倪政贈官三轉官一子承信郎許通夏圭孫才江德仙各贈官兩轉官其一子下班祗應給緡錢恤其家餘立功將士恩賞有差辛丑月暈五重癸卯余玠言北兵分四道入蜀將士捍禦有功者輒以便宜推賞具立功等第補轉官資以聞詔從之五月庚申詔賈似道措置淮西山寨城築壬戌太白犯權星己卯詔諸鎮募兵造舟置馬帥臣其務獎激將士以嚴邊防六月甲午保信軍節度使希丞薨丙午祈雨壬子以陳韡參知政事兼同知樞密院事乙卯臺臣言李鳴復劉伯正進則害善類退則𢀿州里詔鳴復落職罷宮觀伯正削一秩秋七月壬戌泉州歲饑其民謝應瑞非因有司勸分自出私錢四十餘萬糴米以振鄉井所全活甚衆詔補進義校尉丁卯太陰犯斗己巳呂文德言北兵圍壽春城州師至黃家穴總管孫琦呂文信夏貴等戰龍堽有功詔文德官一轉餘依等第轉補其陳沒董先等二十二人傷者四百三十七人贈恤恩賞有差癸酉有流星出自室大如太白八月辛卯太陰犯房己酉賜文士劉克莊進士出身以為祕書少監兼國史院編修官實録院檢討官壬子太白晝見癸丑以劉克莊兼崇政殿說書樞密院言前知普州何叔丁簽書判官楊仁舉淳祐元年冬北兵攻城兩家二十餘人死于難叔丁孫嗣祖仁舉幼子肖翁被俘逃歸詔叔丁等贈官恤後有差九月甲子有流星出于斗大如太白戊辰以賈似道為敷文閣直學士京湖制置使知江陵府兼夔路策應使太白晝見癸酉孟珙薨贈少師冬十月己丑少保嗣榮王與芮之子賜名孟啓授貴州刺史乙未填星歲星熒惑合于亢己酉太白入氐十一月癸亥歲星入氐甲戌右丞相游五請歸田里詔不允辛巳詔北兵入蜀前四川制置使陳隆之闔家數百口罹害死不易節其特賜徽猷閣待制官其二子賜諡立廟死事史季儉楊戡子各賜官兩轉官一子十二月乙未詔史嵩之依所乞守金紫光祿大夫觀文殿大學士永國公致仕臺諫論史嵩之無父無君醜聲穢行律以無將之法罪有餘誅乞寢宮祠削官遠竄七年春正月乙卯朔詔間者絀逐非才收召衆正史嵩之已令致事示不復用咨爾二三大臣其一乃心務舉實政以輯寧我邦家若辭浮于寶玩愒歲月朕何賴焉建資善堂授孟啓宜州觀察使就內小學二月庚寅詔淮安主簿周子鎔久俘于北數遣蠟書諜報邊事今遂生還可改朝奉郎優與升擢己亥貴妃賈氏薨戊申日暈周匝壬子詔改潛邸為龍翔宮三月庚午祈雨夏四月丁亥填星犯亢庚子以王伯大簽書樞密院事吳潛同簽書樞密院事辛丑以鄭清之為太傅右丞相兼樞密使封越國公游罷為觀文殿大學士醴泉觀使兼侍讀趙葵為樞密使兼參知政事督視江淮京西湖北軍馬陳韡知樞密院事湖南安撫大使知潭州甲辰趙葵兼知建康府行宮留守江東安撫使應軍行調度並聽便宜行事趙希塈禮部尚書督視行府參贊軍事庚戌出緡錢千萬銀十五萬兩祠牒千絹萬並戶部銀五千萬兩付督視行府趙葵調用五月甲寅寧淮軍統制張忠戍浮山手搏北將俱溺水死贈武略大夫官一子承信郎緡錢五千給其家祈雨壬申以吳潛兼權參知政事乙亥御集英殿策士詔求直言弭旱六月癸巳賜禮部進士張淵微以下五百二十七人及第出身有差丙申以旱避殿減膳詔中外臣僚士民直陳過失毋有所諱戊申詔旱勢未釋兩淮襄蜀及江閩內地曾經兵州縣遺骼暴露感傷和氣所屬有司收瘞之秋七月己未太陰犯心乙丑吳潛罷丁卯以別之傑參知政事鄭寀同簽書樞密院事己卯吳潛依舊端明殿學士知福州福建安撫使八月甲申鄭寀罷辛卯雨辛丑前彭州守臣宇文景訥死事詔贈官進三秩官一子下州文學壬寅詔監司守臣議荒政以振乏絶租稅合蠲減者具實來上甲辰高定子薨贈少保丙午蔡抗進其父沈尚書解九月丙辰有流星出于室癸酉雷冬十月辛巳太白晝見己酉臺臣言添差抽差攝局須入奏辟改任薦舉借補曠職匿過十弊十一月丁巳詔茶陵知縣事黃端卿為郴寇所害進官三秩官一子將仕郎立廟衡州十二月辛巳李鳴復卒壬辰詔太學生程九萬自北脫身來歸且條上邊事賜迪功郎八年春二月丁亥趙葵言呂文德洎諸將解泗州之圍有功詔補轉推賞有差戊子太陰生黃白暈癸巳雨雹乙未福州福安縣民羅母年過百歲特封孺人復其家敕有司歲時存問以厚風化辛丑趙葵表招泗斷橋將士用命兵退陳奕談涓玉王成等戰渦河龜山有勞聞其步兵多山東人遂調史用政等襲膠州復襲高密縣以牽制侵淮之師詔趣上立功將士等第姓名推賞乙丑雨雹甲戌詔先鋒軍統制田智潤泗州潮河壩之戰父子俱死於兵贈智潤修武郎子承節郎更官其一子承信郎給緡錢五千恤其家夏四月庚辰詔淮東制置司於泗州立廟祠夏皋及張忠田智潤父子賜額以旌忠節丁亥贈朝奉郎程克己妻王氏同沒王事進贈安人五月癸亥趙葵進三秩六月乙酉日生赤黃暈周匝戊戌以徐鹿卿為樞密使兼參知政事兼侍講甲辰有流星出河鼓大如太白秋七月戊申太白入井辛亥以王伯大參知政事應同知樞密院事謝方叔簽書樞密院事史宅之同簽書樞密院事趙與資政殿學士依舊知臨安府浙西安撫使癸酉王伯大罷為資政殿學士知建寧府九月辛酉祀明堂大赦雷冬十月甲戌朔別之傑三疏乞歸田里詔以資政殿大學士知紹興府乙亥應謝方叔並兼參知政事己卯余玠言都統制張實等以戰功承制便宜與官三轉給刺史象符金銀器二百兩銀三百兩緡錢一萬餘將士依等第轉官給金銀符錢帛有差詔命詞給告身付之九年春正月乙巳孟啓授慶遠軍節度使進封益國公庚申詔周世宗八世孫柴彥穎補承務郎襲封崇義公辛酉詔兩淮京湖沿江曠土軍民從便耕種秋成日官不分收制帥嚴勸諭覺察癸亥詔給官田五百畝命臨安府創慈幼局收養道路遺棄初生嬰兒仍置藥局療貧民疾病乙丑雨雹丁卯許應龍薨己巳范鍾薨贈少保諡文肅辛未詔以官田三百畝給表忠觀旌錢氏功德仍禁樵採閏二月甲辰以鄭清之為太師左丞相兼樞密使進封魏國公趙葵為右丞相兼樞密使應謝方叔並參知政事史宅之同知樞密院事乙卯鄭清之五辭免太師許之三月癸未以賈似道為寶文閣學士京湖安撫制置大使乙酉程元鳳江淮等路都大提點坑冶鑄錢公事兼知饒州丁亥詔以四月朔日食自二十一日避殿減膳徹樂夏四月壬寅朔日有食之庚戌趙葵四辭免右丞相兼樞密使詔不允五月己丑趙葵乞歸田里又不允甲午鄭寀薨六月壬戌晝南方有星急流至濁沒大如太白丙寅詔邊郡各立廟一賜額曰褒忠凡沒于王事忠節顯著者並祠焉守臣春秋致祀秋七月壬辰詔知吉州李義山更削三秩監贓錢銀納安邊所癸酉太白犯進賢星八月己酉以吳潛為資政殿學士知紹興府浙東安撫使辛亥詔趣趙葵治事命吳淵宣諭赴闕九月丙子詔趙與提領戶部財用置新倉積貯百二十萬名淳祐倉許辟官四人乙未冊命婉容閻氏為貴妃冬十月辛丑太白入氐丁卯諫臣周坦言知建寧府楊棟任成都制幕時盡載激賞庫珍寶先遁陷丁黼于死致全蜀生靈塗炭詔褫棟閣職罷新任十一月辛未太白入氐壬申有流星出自織女星丙子趙與資政殿學士提領國用浙西安撫使癸未應乞歸田里詔以資政殿學士知平江府十二月己亥以董槐兼侍讀乙巳以吳潛同知樞密院事兼參知政事徐清叟簽書樞密院事戊申太白晝見戊午史宅之薨贈少師十年春正月甲午應三乞歸田里與祠祿二月乙卯雨土三月癸未趙葵辭以為觀文殿大學士醴泉觀使兼侍讀奉朝請庚寅以賈似道為端明殿學士兩淮制置大使淮東安撫使知揚州余玠龍圖閣學士職任依舊李曾伯徽猷閣學士京湖安撫制置使知江陵府丙申有流星夕隕夏四月己酉幸龍翔宮五月丙寅朔以福州觀察使提舉佑神觀善珘為保康軍節度使提舉萬壽觀嗣濮王吳淵資政殿學士依舊職任與執政恩數癸未賈似道言王登浚築江陵城濠有勞詔登初官選人減舉主三員八月甲寅台州大水九月甲子朔賈似道兼淮西安撫使己巳賜禮部進士方夢魁以下五百一十三人及第出身有差甲戌進士第一名方夢魁改賜名逢辰戊寅以嚴州水復民田租冬十月丁酉詔郡邑間有水患其被災細民隨處發義倉振之辛酉詔諸主兵官今後行罰毋杖脊以傷人命十一月壬申趙葵授特進依舊觀文殿大學士判潭州湖南安撫大使壬午雷癸未以雷震非時自二十四日避殿減膳詔公卿大夫百執事各揚乃職裨朕不逮參知政事謝方叔吳潛簽書樞密院事徐清叟並乞解機政詔不允十二月壬辰朔鄭清之乞歸田里詔不允戊戌太白歲星合于危丁巳虹見十一年春正月丁卯詔孟啓改賜名孜依前慶遠軍節度使進封建安郡王己丑詔沿海沿江州郡申嚴水軍之制監察御史程元鳳言資善堂宜選用重厚篤實之士上嘉納之二月乙未左丞相鄭清之等上玉牒日曆會要及光宗寧宗寶訓寧宗經武要略丁酉詔清之等各進秩有差庚子游乞致仕詔依舊觀文殿大學士進二秩甲寅太白犯昴乙卯太白晝見三月丁卯少保保寧軍節度使嗣濮王不擅薨贈少師追封新興郡王乙亥雨土戊寅以謝方叔知樞密院參知政事吳潛參知政事徐清叟同知樞密院事辛巳城寶應詔移一軍戍守李庭芝進一秩將士推恩有差俞興升成都安撫副使知嘉定府任責威茂黎雅邊防夏四月戊戌潭州民林符三世孝行一門義居福州陳氏笄年守志壽逾九袠詔皆旌表其門丁未進淳祐條法事類凡四百三十篇鄭清之等各進二秩六月甲午四川余玠奏進北馬五百詔立功將士趣上姓名推恩丙申高達帶行遙郡刺史權知襄陽府管內安撫節制屯戍軍馬乙巳詔求遺書並山林之士有著述者許上進秋七月癸亥太白晝見丙寅太陰入氐壬申太白入井丁丑有流星出于畢大如太白庚辰前簽書樞密院事陳卓薨贈少師八月己丑朔流星夕隕癸巳太陰入氐丁酉熒惑入井丁未命呂文福廬州駐劄御前諸軍都統制庚戌詔以故直龍圖閣樓昉所著中興小傳百篇宋十朝綱目並撮要二書付史館謄寫昉追贈龍圖閣待制辛亥詔比覽林光世易範明易推星配象演義有司其以禮津遣赴闕九月辛未祀明堂大赦閏十月癸亥太白入氐癸酉吳潛五疏乞罷機政不允十一月丙申京湖制司表都統高達等復襄樊詔立功將士三萬二千七百有二人各官一轉以緡錢三百五十萬犒師甲辰鄭清之乞解機政詔依前太傅保寧軍節度使充醴泉觀使封齊國公仍奉朝請己酉詔承信郎陳思獻書籍賜官一轉庚戌太師鄭清之薨贈尚書令追封魏郡王諡忠定甲寅以謝方叔為左丞相吳潛為右丞相乙卯以徐清叟參知政事兼同知樞密院事董槐端明殿學士簽書樞密院事十二月戊辰詔以八事訓飭在廷曰肅紀綱用正人救楮幣固邊陲清吏道淑士氣定軍制結人心己卯游薨贈少師諡清獻十二年春正月癸巳武功大夫王堅以復興元功轉遙郡團練使辛丑太學録楊懋卿以孝行卓異詔表其門以其事宣付史館癸丑詔宰執議立方田開溝澮自近圻始創置遊擊軍水步各半二月乙卯朔日有食之己未詔陳顯伯資善堂翊善蔡抗資善堂贊讀翁甫資善堂直講壬午詔襄郢新復州縣賦稅復三年大元兵數萬攻隨郢安復京西馬步軍副總管馬榮率將士戰嚴竇山癸未再戰銅冶坪三月丁亥又戰子陵大脊山詔榮兵不滿千能禦大難賞官兩轉進州鈐帶行閣門祗候賜金帶諸將王成楊進各官兩轉升遷餘推恩有差丁未守三義口諸將焚北屯積蓄斷其浮梁夏四月庚申有流星出自角亢大如太白戊辰詔襄郢新復州郡耕屯為急以緡錢百萬命京閫措置給種與牛壬申熒惑犯權星乙亥蔡抗兼侍立修注官丙子置池州遊擊水軍五月甲申朔祈雨壬辰詔申警江防每歲以葺戰艦練舟師勤惰為殿最賞罰乙巳盜起信州玉山縣罷諸郡經界戊申太陰犯畢六月癸亥發米三萬石振衢信飢玉山寇平丙寅嚴衢婺台處上饒建寧南劍邵武大水遣使分行振恤存問除今年田租秋七月庚寅太白熒惑合于軫八月己未詔來年省試仍舊用二月一日殿試用四月十五日以前庶免滯留遠方士子己巳詔以緡錢四十萬振恤在京軍民丁丑詔行會天曆辛巳詔改明年為寶祐元年九月丁亥少師保康軍節度使嗣沂王貴謙薨贈太傅追封申王戊戌太白填星合于箕丙午太白犯斗冬十月癸丑以徐清叟參知政事董槐同知樞密院事嗣濮王善珘薨贈少師追封咸寧郡王戊午濮安懿王長孫善奐授福州觀察使提舉佑神觀嗣濮王壬申詔襄樊已復其務措置屯田修渠堰十一月庚寅吳潛罷丙申夜臨安火丁酉夜火乃熄戊戌詔避殿減膳壬寅詔求直言十二月乙卯以吳潛為觀文殿大學士提舉江州太平興國宮己未詔追録彭大雅創城渝州功復承議郎官其子癸亥詔海神為大祀春秋遣從臣奉命往祠奉常其條具典禮來上壬申太陰入氐丁丑立春雷寶祐元年春正月庚寅朔詔以藝祖嫡系十一世孫嗣榮王與芮之子建安郡王孜為皇子改賜名授崇慶軍節度使進封永嘉郡王製資善堂記賜皇子戊戌日生戴氣癸卯大元兵渡漢江屯萬州入西柳關高達調將士扼河關上山大戰至鱉坑石碑港而還詔高達程大元李和各官兩轉餘恩賞有差二月己酉朔日有食之戊辰陳垓貪贓不法竄潮州辛未罷尚書省創置呈白房三月戊子與芮授少師加食邑七百戶希邐檢校少傅加食邑五百戶與歡授少保加食邑七百戶乃裕保康軍節度使加食邑五百戶丙申別之傑薨贈少師夏四月丁巳有流星大如太白五月甲午詔余玠赴闕乙未詔侍從臺諫給舍制司各舉帥才二人丁酉熒惑歲星合在昴己亥賜禮部進士姚勉以下及第出身有差六月戊申朔江湖閩廣旱庚戌四川制司言余玠疾革詔玠資政殿學士與執政恩數辛亥以賈似道為資政殿大學士李曾伯端明殿學士職任依舊庚申以余晦為司農卿四川宣諭使祈雨秋七月壬午王伯大薨丙戌蔡抗兼資善堂翊善施退翁兼資善堂直講庚寅溫台處三郡大水詔發豐儲倉米並各州義廩振之癸巳詔余玠以興元歸附之兵分隸本路諸州都統務撫存之仍各給良田制司濟以錢粟甲午余玠卒贈官五轉庚子以董槐兼參知政事癸卯詔撫諭四川官吏軍民八月丁未朔以馬光祖為司農卿淮西總領財賦甲寅起居郎蕭泰來出知隆興府先是起居舍人牟子才與泰來並除子才四疏辭極陳泰來姦險汙穢與為伍泰來不得已請祠遂豫郡丙辰以余晦權刑部侍郎四川安撫制置使知重慶府兼四川總領財賦乙丑行皇宋元寶錢九月壬午程元鳳升兼侍讀牟子才升兼侍講壬辰城夔門太陰入畢冬十月丙午朔詔出緡錢二百萬振恤京城軍民十一月丙子朔詔奬諭襄陽守臣高達己丑賈似道獻所獲良馬賜詔褒嘉其將士增秩賞賚有差十二月乙卯冊瑞國公主庚申劉伯正薨贈五秩
