body:
  text: 宋史卷五十九志第十二天文十二流隕三元豐元年正月丁卯星出天紀向南速行至天社北沒赤黃庚午星出天紀南如太白西南慢行至天社沒赤黃有尾跡閏正月壬寅星出紫微垣內鈎陳北如杯北慢行至濁沒青白有尾跡甲辰星出柳北如杯西急行至天廩沒赤黃有尾跡照地明二月己酉星出太微垣內如杯西南急行至翼沒有尾跡照地明癸亥星出角南如杯西南急行至土司空沒青白三月丁酉星出箕東如杯西南急行至濁沒赤黃有尾跡照地明四月丙寅星出閣道東如杯北急行入濁沒赤黃有尾跡照地明六月甲辰東南方光燭地有星如盂出瓠瓜至內階沒分裂有聲如雷己巳星出左攝提西如太白西南急行至太微垣內五諸侯沒赤黃有尾跡照地明辛未星出外屏北如太白東北慢行至濁沒青白有尾跡七月甲申夕星出大角南如太白北慢行至北斗沒赤黃有尾跡庚子星出天市垣內列肆東如杯西慢行至亢沒青白有尾跡八月己酉星出紫微垣內陰德南如杯北急行至濁沒赤黃有尾跡照地明乙卯星出營室北如盂西北慢行至濁沒赤黃有尾跡照地明丙辰星出貫索西北如太白西慢行至濁沒青白有尾跡甲子星隔雲照地明東北急行至濁沒九月庚辰星出鈎陳北如杯西北急行至濁沒赤黃有尾跡甲申星出七公北如太白西北慢行至濁沒青白有尾跡己亥星出天囷南如杯東南慢行至濁沒青白有尾跡照地明又星出東井西如杯東北急行至濁沒赤黃有尾跡照地明十月乙巳星出天津北如太白西北急行至天棓沒赤黃有尾跡照地明十二月丙寅星出北河北如杯東南急行至弧矢沒赤黃有尾跡照地明二年三月戊子星出氐內如太白東北緩行至天市垣內候星沒赤黃有尾跡照地明五月戊辰星出軫中如太白西速行至濁沒赤黃有尾跡照地明庚午星出天廚東如太白東北速行至天津沒赤黃有尾跡照地明甲午星出氐南如太白南速行至濁沒青白丙申星出織女北如杯北速行至紫微垣內太子沒赤黃有尾跡照地明丁酉星出紫微垣上宰北如杯北速行至右樞沒青白照地明六月戊戌星出尾東如杯南速行至濁沒青白照地明庚子星出危東如杯東緩行至濁沒青白有尾跡照地明七月乙巳星出雷電北如太白東速行至霹靂赤黃有尾跡庚子星出氐北如杯西速行至濁沒青白照地明庚寅星出天津西如杯南急行至河鼓沒赤黃有尾跡照地明八月癸卯星出天囷西如太白東南速行至濁沒赤黃有尾跡九月戊辰星出天辨如太白西南速行至天市垣沒青白有尾跡照地明十月丁未星出天船北如太白西南速行至營室沒青白有尾跡乙卯星出北斗西如太白東北速行至濁沒赤黃有尾跡十二月壬子星出輿鬼東如太白東北速行至軒轅沒赤黃有尾跡照地明三年正月癸未星出右攝提西如太白青白色東北速行至濁沒有尾跡二月辛丑星出弧矢南如太白東南速行至濁沒青白有尾跡五月庚午星出尾南如太白南速行至濁沒青白有尾跡辛未星出中台北如太白東南緩行至天江沒赤黃丁丑星出織女西如杯東北速行至濁沒青白有尾跡六月己亥星出南斗南如杯南速行至鱉星沒青白有尾跡照地明壬子星出天津東如杯東速行至濁沒青白有尾跡照地明七月甲子星出天棓如杯北急行至濁沒赤黃有尾跡丙寅星出天棓北如杯西南急流至濁沒赤黃有尾跡照地明己丑星出北斗西如太白東北急流至濁沒赤黃有尾跡照地明八月乙卯星出天囷北如太白東南慢流至弧矢沒赤黃有尾跡照地明戊午星出紫微垣內大理西如太白北慢流至濁沒青白有尾跡閏九月辛卯星出輿鬼南如杯急流至軒轅沒赤黃有尾跡照地明庚戌星出紫微垣內鈎陳北如太白北急流至天棓沒青白照地明十月庚申星出狼東如太白東南急流至濁沒青白有尾跡照地明十一月丙辰星出廁星東如太白東南慢流至濁沒青白四年正月戊戌星出五車北如杯西南急流至天囷沒赤黃有尾跡分裂六月戊寅星出紫微垣內廚南如太白南慢流至大角沒赤黃有尾跡八月丁巳星出壁壘陳南如杯西南慢流至濁沒青白有尾跡照地明癸亥星出文昌北如太白東北慢流至濁沒青白有尾跡癸酉星出貫索南如太白東南至天市垣秦星沒赤黃色有尾跡照地明戊寅星出婁大如太白東急流至濁沒青白己卯星出文昌西如太白北慢流至紫微垣內鈎陳沒赤黃有尾跡九月己酉星出天街如杯北急行穿五車北沒赤黃有尾跡照地明庚戌星出天倉南如太白南急行至濁沒赤黃有尾跡照地明十一月己丑星出紫微垣內六甲如太白東北慢行入濁沒赤黃有尾跡照地明乙未星出鈎陳北如太白東北慢行至濁沒赤黃有尾跡照地明五年四月庚申星出角東如太白東南急行至濁沒赤黃辛未星出紫微垣內鈎陳北如太白急行至濁沒青白五月己丑星出天津西如太白西北急行至紫微垣內鈎陳沒赤黃有尾跡六月丁卯星出天槍東如太白西急行至天樽沒赤黃有尾跡照地明己卯星出郎位如太白東南急行至濁沒赤黃有尾跡照地明七月辛巳星出天市垣內列肆西北如杯西急行至濁沒赤黃有尾跡照地明十月庚戌星出參南如太白東南急行至濁沒青白辛亥星出參旗南如杯東急行至軍井沒青白有尾跡甲寅星出騰蛇西如太白南速行入虛沒赤黃有尾跡照地明甲子星出中台南如太白東北速行至濁沒赤黃有尾跡十一月辛巳星出五車西南如太白西北速行入雲沒赤黃有尾跡照地明甲申星出天津北如太白東北速行至紫微垣內鈎陳沒赤黃有尾跡十二月庚申星出東壁西如太白西南速行至濁沒赤黃有尾跡戊辰星出畢南如太白西南速行至濁沒赤黃壬申星出中台北如太白東北速行至濁沒赤黃六