body:
  text: 宋史卷一百五志第五十八禮八吉禮八文宣王廟武成王廟先代陵廟諸神祠至聖文宣王唐開元末升為中祠設從祀禮令攝三公行事朱梁喪亂從祀遂廢後唐長興二年仍復從祀周顯德二年別營國子監置學舍宋因增修之塑先聖亞聖十哲像畫七十二賢及先儒二十一人像于東西廡之木壁太祖親撰先聖亞聖贊十哲以下命文臣分贊之建隆中凡三幸國子監謁文宣王廟太宗亦三謁廟詔繪三禮器物制度于國學講論堂木壁又命河南府建國子監文宣王廟置官講説及賜九經書真宗大中祥符元年封泰山詔以十一月一日幸曲阜備禮謁文宣王廟內外設黃麾仗孔氏宗屬並陪位帝服鞾袍行酌獻禮又幸叔梁紇堂命官分奠七十二弟子先儒洎叔梁紇顏氏初有司定儀肅揖帝特展拜以表嚴師崇儒之意親製贊刻石廟中復幸孔林以樹擁道降輿乘馬至文宣王墓設奠再拜詔追諡曰玄聖文宣王祝文進署祭以太牢修飾祠宇給便近十戶奉塋廟仍追封叔梁紇為齊國公顏氏魯國太夫人伯魚母𠾱官氏鄆國夫人二年五月乙卯詔追封十哲為公七十二弟子為侯先儒為伯或贈官親製玄聖文宣王贊命宰相等撰顏子以下贊留親奠祭器於廟中從官立石刻名既以國諱改諡至聖文宣王賜孔氏錢帛録親屬五人並賜出身又賜太宗御製御書一百五十卷銀器八百兩詔太常禮院定州縣釋奠器數先聖先師每坐酒尊二籩豆八簋二簠二俎三罍一洗一篚一尊皆加勺冪各置於坫巾共二燭二爵共四坫有從祀之處諸坐各籩二豆二簋一簠一俎一燭一爵一仁宗再幸國子監謁文宣王廟皆再拜焉熙寧七年判國子監常秩等請立孟軻揚雄像於廟廷仍賜爵號又請追尊孔子以帝號下兩制禮官詳定以為非是而止京兆府學教授蔣夔請以顏回為兗國公毋稱先師而祭不讀祝儀物一切降殺而進閔子騫九人亦在祀典禮官以孔子顏子稱號歷代各有據依難輒更改儀物祝獻亦難降殺所請九人已在祀典熙寧祀儀十哲皆為從祀惟州縣釋奠未載請自今三京及諸州春秋釋奠並準熙寧祀儀詔封孟軻鄒國公晉州州學教授陸長愈請春秋釋奠孟子宜與顏子並配議者以謂凡配享從祀皆孔子同時之人今以孟軻並配非是禮官言唐貞觀以漢伏勝高堂生晉杜預范寧之徒與顏子俱配享至今從祀豈必同時孟子於孔門當在顏子之列至於荀況揚雄韓愈皆發明先聖之道有益學者久未配食誠闕典也請自今春秋釋奠以孟子配食荀況揚雄韓愈並加封爵以世次先後從祀於左丘明二十一賢之間自國子監及天下學廟皆塑鄒國公像冠服同兗國公仍繪荀況等像於從祀荀況左丘明下揚雄劉向下韓愈范寧下冠服各從封爵詔如禮部議荀況封蘭陵伯揚雄封成都伯韓愈封昌黎伯令學士院撰贊文又詔太常寺修四孟釋菜儀元祐六年幸太學先詣國子監至聖文宣王殿行釋奠禮一獻再拜崇寧初封孔鯉為泗水侯孔伋為沂水侯詔古者學必祭先師況都城近郊大闢黌舍聚四方之士多且數千宜建文宣王廟以便薦獻又詔王安石可配享孔子廟位於鄒國公之次國子監丞趙子櫟言唐封孔子為文宣王其廟像內出王者袞冕衣之今乃循五代故制服上公之服七十二子皆周人而衣冠率用漢制非是詔孔子仍舊七十二子易以周之冕服又詔辟雍文宣王殿以大成為名帝幸國子監謁文宣王殿皆再拜行酌獻禮遣官分奠兗國公而下國子司業蔣靜言先聖與門人通被冕服無別配享從祀之人當從所封之爵服周之服公之袞冕九章侯伯之鷩冕七章袞公服也達於上鄭氏謂公袞無升龍誤矣考周官司服所掌則公之冕與王同辨師所掌則公之冕與王異今既考正配享從祀之服亦宜考正先聖之冕服於是增文宣王冕為十有二旒大觀二年從通仕郎侯孟請繪子思像從祀於左丘明二十四賢之間議禮局言建隆三年詔國子監廟門立戟十六用正一品禮大中祥符二年賜曲阜廟桓圭從上公之制又史記弟子傳曰受業身通六藝者七十有七人自顏回至公孫龍三十五人頗有年名及受業見於書傳四十二人姓名僅存家語曰七十二弟子皆升堂入室者按唐會要七十七人而開元禮止七十二人又復去取不一本朝議臣斷以七十二子之説取琴張等五人而去公夏首等十人今以家語史記參定公夏首后處公肩定顏祖鄡單罕父黑秦商原抗樂咳廉潔唐會要開元禮亦互見之皆有伯爵載於祀典請追贈侯爵使預祭享詔封公夏首巨平侯后處膠東侯公肩定梁父侯顏祖富陽侯鄡單聊城侯罕父黑祈鄉侯秦商馮翊侯原抗樂平侯樂咳建成侯廉潔胙城侯又詔改封曾參武城侯顓孫師潁川侯南宮縚汶陽侯司馬耕睢陽侯琴張陽平侯左丘明中都伯穀梁赤睢陵伯戴聖考城伯以所封犯先聖諱也政和三年詔封王安石舒王配享安石子雱臨川伯從祀新儀成以孟春元日釋菜仲春仲秋上丁日釋奠以兗國公顏回鄒國公孟軻舒王王安石配享殿上琅邪公閔損東平公冉耕下邳公冉雍臨淄公宰豫黎陽公端木賜並西向彭城公冉求河內公仲由丹陽公言偃河東公卜商武城侯曾參並東向東廡潁川侯顓孫師以下至成都伯揚雄四十九人並西向西廡長山侯林放以下至臨川伯王雱四十八人並東向頒辟雍大成殿名於諸路州學五年太常寺言兗州鄒縣孟子廟詔以樂正子配享公孫丑以下從祀皆擬定其封爵樂正子克利國侯公孫丑壽光伯萬章博興伯告子不害東阿伯孟仲子新泰伯陳臻蓬萊伯充虞昌樂伯屋廬連奉符伯徐辟仙源伯陳代沂水伯彭更雷澤伯公都子平陰伯咸丘蒙須城伯高子泗水伯桃應膠水伯盆成括萊陽伯季孫豐城伯子叔承陽伯大晟樂成詔下國子學選諸生肄習上丁釋奠奏于堂上以祀先聖靖康元年右諫議大夫楊時言王安石學術之謬請追奪王爵明詔中外毀去配享之像使邪説淫辭不為學者之惑詔降王安石從祀廟廷尚書傅墨卿言釋奠禮饌宜依元豐祀儀陳設其五禮新儀勿復遵用時又有算學大觀三年禮部太常寺請以文宣王為先師兗鄒荊三國公配享十哲從祀自昔著名算數者畫像兩廡請加賜五等爵隨所封以定其服於是中書舍人張邦昌定算學封風后上谷公箕子遼東公周大夫商高郁夷公大撓涿鹿公隸首陽周公容成平都公常儀原都公鬼俞區宜都公商巫咸河東公晉史蘇晉陽伯秦卜徒父潁陽伯晉卜偃平陽伯魯梓慎汝陽伯晉史趙高都伯魯卜楚丘昌衍伯鄭裨竈滎陽伯趙史墨易陽伯周榮方美陽伯齊甘德災川伯魏石申隆慮伯漢鮮于妄人清泉伯耿壽昌安定伯夏侯勝任城伯京房樂平伯翼奉良成伯李尋平陵伯張衡西鄂伯周興慎陽伯單揚湖陸伯樊英魯陽伯晉郭璞聞喜伯宋何承天昌盧伯北齊宋景業廣宗伯隋蕭吉臨湘伯臨孝恭新豐伯張胄玄東光伯周王朴東平伯漢鄧平新野子劉洪蒙陰子魏管輅平原子吳趙達穀城子宋祖沖之范陽子後魏商紹長樂子北齊信都芳樂城子北齊許遵高陽子隋耿詢湖熟子劉焯昌亭子劉炫景城子唐傅仁均博平子王孝通介休子瞿曇羅居延子李淳風昌樂子王希明琅琊子李鼎祚贊皇子邊岡成安子漢都顗觀陽子襄楷隰陰子司馬季主夏陽男落下閎閬中男嚴君平廣都男魏劉徽淄鄉男晉薑岌成紀男張丘建信成男夏侯陽平陸男後周甄鸞無極男隋盧大翼成平男尋詔以黃帝為先師禮部員外郎吳時言書畫之學教養生徒使知以孔子為師此道德之所以一也若每學建立殿宇則配食從祀難於其人請春秋釋奠止令書畫博士量率職事生員陪預執事庶使知所宗師醫學亦準此詔皆從之其釋奠之禮景德四年同判太常禮院李維言按開寶通禮諸州釋奠並刺史致齋三日從祭之官齋於公館祭日刺史為初獻上佐為亞獻博士為終獻今諸州長吏不親行祀非尊師重教之道詔太常禮院檢討以聞按五禮精義州縣釋奠刺史縣令初獻上佐縣丞亞獻州博士縣主簿終獻有故以次官攝之大中祥符三年判國子監孫奭言上丁釋奠舊禮以祭酒司業博士充三獻官新禮以三公行事近歲止命獻官兩員臨時通攝未副崇祀向學之意望自今備差太尉太常光祿卿以充三獻又命崇文院刊釋奠儀注及祭器圖頒之諸路熙寧五年國子監言舊例遇貢舉歲禮部貢院集諸州府所貢第一人謁奠先聖如春秋釋奠儀況春秋自有釋奠禮請罷貢舉人謁奠崇寧議禮局言太學獻官太祝奉禮皆以法服至於郡邑則用常服望命有司降祭服于州縣凡獻官祝禮各服其服以盡事神之儀詔以衣服制度攽使州縣自造焉其謁先師之禮建隆二年禮院準禮部貢院移按禮閣新儀云舊儀無貢舉人謁先師之文開元二十六年詔諸州貢舉人見訖就國子監謁先師官為開講質問疑義所司設食昭文崇文兩館學士及監內諸舉人亦準此自後諸州府貢舉人十一月朔日正衙見訖擇日謁先師遂為常禮大觀初大司成強淵明言考之禮經士始入學有釋菜之儀請自今每歲貢士始入辟雍並以元日釋菜于先聖其儀獻官一員以丞或博士分奠官八員以博士正録大祝一員以正録應祀官前釋菜一日赴學各宿其次至日詣文宣王殿常服行禮貢士初入學者陪位于庭其他亦略倣釋奠之儀紹興十年詔與大社大稷並為大祀淳熙四年去王雱畫像淳祐元年正月理宗幸太學詔以周敦頤張載程皓程頤朱熹從祀黜王安石景定二年皇太子詣學請以張栻呂祖謙從祀從之咸淳三年詔封曾參郕國公孔伋沂國公配享先聖封顓孫師陳國公升十哲位復以邵雍司馬光列從祀其序兗國公郕國公沂國公鄒國公居正位之東面西向北上為配位費公閔損薛公冉雍黎公端木賜衛公仲由魏公卜商居殿上東面西向北上鄆公冉耕齊公宰豫徐公冉求吳公言偃陳公顓孫師居殿上西面東向北上為從祀東廡金鄉侯淡臺滅明任城侯原憲汝陽侯南宮適萊蕪侯曾點須昌侯商瞿平輿侯漆雕開睢陽侯司馬耕平陰侯有若東阿侯巫馬施陽穀侯顏辛上蔡侯曹枝江侯公孫龍馮翊侯秦祖雷澤侯顏高上邽侯壤駟赤成邑侯石作蜀巨平侯公夏首膠東侯后處濟陽侯奚容點富陽侯顏祖滏陽侯句井疆鄄城侯秦商即墨侯公祖句茲武城侯縣成汧源侯燕伋宛句侯顏之僕建成侯樂咳堂邑侯顏何林慮侯狄黑鄆城侯孔忠徐城侯公西點臨濮侯施之常華亭侯秦非文登侯申棖濟陰侯顏噲泗水侯孔鯉蘭陵伯荀況睢陵伯穀梁赤萊蕪伯高堂生樂壽伯毛萇彭城伯劉向中矣伯鄭衆緱氏伯杜子春良鄉伯盧植滎陽伯服虔司空王肅司徒杜預昌黎伯韓愈河南伯程皓新安伯邵雍溫國公司馬光華陽伯張栻凡五十二人並西向西廡單父侯宓不齊高密侯公冶長北海侯公哀曲阜侯顏無繇共城侯高柴壽張侯公伯寮益都侯樊須巨野侯公西赤千乘侯梁鱣臨沂侯冉孺沐陽侯伯虔諸城侯冉季濮陽侯漆雕哆高苑侯漆雕徒父鄒平侯商澤當陽侯任不齊牟平侯公良孺新息侯秦冉梁父侯公肩定聊城侯鄡單祁鄉侯罕父黑淄川侯申黨厭次侯榮旗南華侯左人郢朐山侯鄭國樂平侯原亢胙城侯廉潔博平侯叔仲會高堂侯邽巽臨朐侯公西輿如內黃侯蘧瑗長山侯林放南頓侯陳亢陽平侯琴張博昌侯步叔乘中都伯左丘明臨淄伯公羊高乘氏伯伏勝考城伯戴聖曲阜伯孔安國成都伯揚雄歧陽伯賈逵扶風伯馬融高密伯鄭玄任城伯何休偃師伯王弼新野伯范寧汝南伯周敦頤伊陽伯程頤郿伯張載徽國公朱熹開封伯呂祖謙凡五十二人並東向昭烈武成王自唐立太公廟春秋仲月上戊日行祭禮上元初封為武成王始置亞聖十哲等後又加七十二弟子梁廢從祀之祭後唐復之太祖建隆三年詔修武成王廟與國學相對命左諫議大夫崔頌董其役仍令頌檢閲唐末以來謀臣名將勳績尤著者以聞四年四月帝幸廟歷觀圖壁指白起曰此人殺已降不武之甚何受享於此命去之景德四年詔西京擇地建廟如東京制大中祥符元年加諡昭烈初建隆議升歷代功臣二十三人舊配享者退二十二人慶曆儀自張良管仲而下依舊配享不用建隆升降之次元豐中國子司業朱服言釋奠文宣王以國子祭酒司業為初獻丞為亞獻博士為終獻太祝奉禮並以監學官充及上戊釋奠武成王以祭酒司業為初獻其亞獻終獻及讀祝捧幣令三班院差使臣充之官制未行武學隸樞密院學官員數少故差右選今武學隸國子監長二丞簿官屬已多請並以本監官充攝行事仍令太常寺修入祀儀政和二年武學諭張滋言詩云赫赫南仲維師尚父文武吉甫顯允方叔王命召虎程伯休父是均為周將功著聲詩今昔所尊惟一尚父而南仲吉甫之徒不預配食餘如郤縠之閲禮樂敦詩書尉繚以言為學者師法不當棄而不録請並配食博士孫宗鑑亦請以黃石公配後有司討論不定國子監丞趙子嵩復言之宣和五年禮部言武成王廟從祀除本傳已有封爵者其未經封爵之人齊相管仲擬封涿水侯大司馬田穰苴橫山侯吳大將軍孫武滬瀆侯越相范蠡遂武侯燕將樂毅平虜侯蜀丞相諸葛亮順興侯魏西河守吳起封廣宗伯齊將孫臏武清伯田單昌平伯趙將廉頗臨城伯秦將王翦鎮山伯漢前將軍李廣懷柔伯吳將軍周瑜平虜伯於是釋奠日以張良配享殿上管仲孫武樂毅諸葛亮李績並西向田穰苴范蠡韓信李靖郭子儀並東向東廡白起孫臏廉頗李牧曹參周勃李廣霍去病鄧禹馮異吳漢馬援皇甫嵩鄧艾張飛呂蒙陸抗杜預陶侃慕容恪宇文憲韋孝寬楊素賀若弼李孝恭蘇定方王孝傑王晙李光弼並西向西廡吳起田單趙奢王翦彭越周亞夫衛青趙充國寇恂賈復耿弇段熲張遼關羽周瑜陸遜羊祜王濬謝玄王猛王鎮惡斛律光王僧辨于謹吳明徹韓擒虎史萬歲尉遲敬德裴行儉張仁亶郭元振李晟並東向凡七十二將云紹興七年五月太常博士黃積厚乞以仲春仲秋上戊日行禮十一年五月國子監丞林保奏竊見昭烈武成王享以酒脯而不用牲牢雖曰時方多事禮用綿蕝然非所以右武而勵將士也乞今後上戊釋奠用牲牢以管仲至郭子儀十八人祀於殿上從之乾道六年詔武成王廟升李晟於堂上降李績於李晟位次仍以曹彬從祀先是紹興間右正言都民望言李績邪説誤國唐祀幾滅李晟有再造王室之勳宜升李晟于堂上置李績於河間王孝恭之下至是著作郎傅伯壽言武成廟從祀出於唐開元間一時銓次失於太雜如尹吉甫之伐玁狁召虎之平淮夷實亞鷹揚之烈陳湯傅介子馮奉世班超之流皆為有漢之雋功在晉則謝安祖逖在唐則王忠嗣張巡輩皆不得預從祀之列竊聞邇日議臣請以本朝名將從祀謂宜併詔有司討論歷代諸將為之去取然後與本朝名將繪於殿廡亦乞取建隆建炎以來驍俊忠概之臣功烈暴于天下者參陪廟祀故有是命先代陵廟及録名臣後建隆元年詔前代帝王陵寢忠臣賢士丘壠或樵采不禁風雨不芘宜以郡國置戶以守隳毀者修葺之乾德初詔歷代帝王國有常享著于甲令可舉而行自五代亂離百司廢墜匱神乏祀闕孰甚焉按祠令先代帝王每三年一享以仲春之月牲用太牢祀官以本州長官有故則上佐行事官造祭器送諸陵廟又詔先代帝王載在祀典或廟貌猶在久廢牲牢或陵墓雖存不禁樵采其太昊炎帝黃帝高辛唐堯虞舜夏禹成湯周文王武王漢高帝光武唐高祖太宗各置守陵五戶歲春秋祠以太牢商中宗太戊高宗武丁周成王康王漢文帝宣帝魏太祖晉武帝後周太祖隋高祖各置三戶歲一享以太牢秦始皇帝漢景帝武帝明帝章帝魏文帝後魏孝文帝唐玄宗憲宗肅宗宣宗梁太祖後唐莊宗明宗晉高祖各置守陵兩戶三年一祭以太牢周桓王景王威烈王漢元帝成帝哀帝平帝和帝殤帝安帝順帝沖帝質帝獻帝魏明帝高貴鄉公陳留王晉惠帝懷帝愍帝西魏文帝東魏孝靜帝唐高宗中宗睿宗德宗順宗穆宗代宗敬宗文宗武宗懿宗僖宗昭宗梁少帝後唐末帝諸陵常禁樵采尋又禁河南府民耕晉漢廟壖地凡諸陵有經開發者有司造袞冕服常服各一襲具棺槨以葬掩坎日所在長吏致祭又詔前代功臣烈士詳其勳業優劣以聞有司言齊孫臏晏嬰晉程嬰公孫杵臼燕樂毅漢曹參陳平韓信周亞夫衛青霍去病霍光蜀昭烈帝關羽張飛諸葛亮唐房玄齡長孫無忌魏徵李靖李績尉遲恭渾瑊段秀實等皆勳德高邁為當時之冠晉趙簡子齊孟嘗君趙趙奢漢邴吉唐高士廉唐儉岑文本馬周為之次南燕慕容德唐裴寂元稹又次之詔孫臏等各置守冢三戶趙簡子等各二戶慕容德等禁樵采其有開毀者皆具棺槨朝服以葬掩坎日致祭長吏奉行其事景德元帝詔前代帝王陵寢名臣賢士義夫節婦墳壟並禁樵采摧毀者官為修築無主者碑碣石獸之類敢有壞者論如律仍每歲首所在舉行此令鄭州給唐相裴度守墳三戶賜秦國忠懿王錢俶守墳三戶加諡太公望昭烈武成王建廟青州周公旦追封文憲王建廟兗州春秋委長吏致祭熙寧元年從知濮州韓鐸請堯陵在雷澤縣東穀林山陵南有堯母慶都靈臺廟請敕本州春秋致祭置守陵五戶免其租奉灑掃又以中丞鄧潤甫言唐諸陵除已定頃畝外其餘許耕佃為守陵戶餘並禁止先是仁宗嘗録唐張九齡九代孫錫狄仁傑裔孫國寶郭子儀孫元亨長孫無忌孫宏皆命以官神宗又録魏徵孫道嚴段秀寶十二世孫昊八世孫文酉仍復其家元祐六年詔相州商王河亶甲冢沂州費縣顏真卿墓並載祀典先是乾德中定先代帝王配享儀下諸州以時薦祭牲用羊豕政和議禮局遂為定制紹興元年命祠禹於越州及祠越王句踐以范蠡配淳熙四年靜江守臣張栻奏所領州有唐帝祠其山曰堯山有虞帝祠其山曰虞山請著之祀典十四年衡州守臣劉清之奏史載炎帝陵在長沙茶陵祖宗時給近陵七戶守視禁其樵牧宜復建廟給戶如故事淳祐八年湖南安撫大使知潭州陳韡再言從之初紹興二年駕部員外郎李願奏程嬰公孫杵臼於趙最為功臣神宗皇嗣未建封嬰為成信侯杵臼為忠智侯命絳州立廟歲時奉祀其後皇嗣衆多今廟宇隔絶祭亦弗舉宜於行在所設位望祭從之十一年中書舍人朱翌言謹按晉國屠岸賈之亂韓厥正言以拒之而嬰杵臼皆以死匿其孤卒立趙武而趙祀不絶厥之功也宜載之祀典與嬰杵臼並享春秋之祀亦足為忠義無窮之勸禮寺亦言崇寧間已封厥義成侯今宜依舊立祚德廟致祭十六年加嬰忠節成信侯杵臼通勇忠智侯厥忠定義成侯後改封嬰疆濟公杵臼英略公厥啓侑公升為中祀諸祠廟自開寶皇祐以來凡天下名在地志功及生民宮觀陵廟名山大川能興雲雨者並加崇飾增入祀典熙寧復詔應祠廟祈禱靈驗而未有爵號並以名聞於是太常博士王古請自今諸神祠無爵號者賜廟額已賜額者加封爵初封侯再封公次封王生有爵位者從其本封婦人之神封夫人再封妃其封號者初二字再加四字如此則錫命馭神恩禮有序欲更增神仙封號初真人次真君大觀中尚書省言神祠加封爵等未有定制乃並給告賜額降敕已而詔開封府毀神祠一千三十八區遷其像入寺觀及本廟仍禁軍民擅立大小祠祕書監何志同言諸州祠廟多有封爵未正之處如屈原廟在歸州者封清烈公在潭州者封忠潔侯永康軍李冰廟已封廣濟王近乃封靈應公如此之類皆未有祀典致前後差誤宜加稽考取一高爵為定悉改正之他皆倣此故凡祠廟賜額封號多在熙寧元祐崇寧宣和之時其新立廟若何承矩李允則守雄州曹瑋帥秦州李繼和節度鎮戎軍則以有功一方者也韓琦在中山范仲淹在慶州孫冕在海州則以政有威惠者也王承偉築祁州河隄工部員外郎張夏築錢塘江岸則以為人除患者也封州曹覲德慶府趙師旦雍州蘇緘恩州通判董元亨指揮使馬遂則死於亂賊者也若王韶於熙河李憲於蘭州劉滬於水洛城郭成於懷慶軍折御卿於嵐州作坊使王吉於麟州神堂寨各以功業建廟寇準死雷州人憐其忠而趙普祠中山韓琦祠相州則以鄉里皆載祀典焉其他州縣嶽瀆城隍仙佛山神龍神水泉江河之神及諸小祠皆由禱祈感應而封賜之多不能盡録云
