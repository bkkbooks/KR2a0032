body:
  text: 宋史卷七十四志第二十七律曆七明天曆崇天曆行之至于嘉祐之末英宗即位命殿中丞判司天監周琮及司天冬官正王炳丞王棟主簿周應祥周安世馬傑靈臺郎楊得言作新曆三年而成琮言舊曆氣節加時後天半日五星之行差半次日食之候差十刻既而司天中官正舒易簡與監生石道李遘更陳家學於是詔翰林學士范鎮諸王府侍講孫思恭國子監直講劉攽考定是非上推尚書辰弗集于房與春秋之日食參今曆之所候而易簡道遘等所學疏闊不可用新書為密遂賜名明天曆詔翰林學士王圭序之而琮亦為義略冠其首今紀其曆法于後調日法朔餘周天分斗分歲差日度母附造曆之法必先立元元正然後定日法法定然後度周天以定分至三者有程則曆可成矣日者積餘成之度者積分成之蓋日月始離初行生分積分成日自四分曆洎古之六曆皆以九百四十為日法率由日行一度經三百六十五日四分之一是為周天月行十三度十九分之七經二十九日有餘與日相會是為朔策史官當會集日月之行以求合朔自漢太初至于今冬至差十日如劉歆三統復強於古故先儒謂之最疏後漢劉洪考驗四分於天不合乃減朔餘苟合時用自是已降率意加減以造日法宋世何承天更以四十九分之二十六為強率十七分之九為弱率於強弱之際以求日法承天日法七百五十二得一十五強一弱自後治曆者莫不因承天法纍強弱之數皆不悟日月有自然合會之數今稍悟其失定新曆以三萬九千為日法六百二十四萬為度母九千五百為斗分二萬六百九十三為朔餘可以上稽於古下驗於今反覆推求若應繩準又以二百三十萬一千為月行之餘月行十三度之餘以一百六十萬四百四十七為日行之餘日行周天之餘乃會日月之行以盈不足平之並盈不足是為一朔之法日法也名元法今乃以大月乘不足之數以小月乘盈行之分平而並之是為一朔之實周天分也以法約實得日月相會之數皆以等數約之悉得今有之數盈為朔虛不足為朔餘又二法相乘為本母各母互乘以減周天餘則歲差生焉亦以等數約之即得歲差度母周天實用之數此之一法理極幽眇所謂反覆相求潛遁相通數有冥符法有偶會古曆家皆所未達以等數約之得三萬九千為元法九千五百為斗分二萬六百九十三為朔餘六百二十四萬為日度母二十二億七千九百二十萬四百四十七為周天分八萬四百四十七為歲差歲餘九千五百古曆曰斗分古者以周天三百六十五度四分度之一是為斗分夫舉正於中上稽往古下驗當時反覆參求合符應準然後施行于百代為不易之術自後治曆者測今冬至日晷用校古法過盈以萬為母課諸氣分率二千五百以下二千四百二十八已上為中平之率新曆斗分九千五百以萬平之得二千四百二十五半盈得中平之數也而三萬九千年冬至小餘成九千五百日滿朔實一百一十五萬一千六百九十三年齊于日分而氣朔相會歲周一千四百二十四萬四千五百以元法乘三百六十五度內斗分九千五百得之即為一歲之日分故曰歲周若以二十四均之得一十五餘八千五百二十秒一十五為一氣之策也朔實一百一十五萬一千六百九十三本會日月之行以盈不足平而得二萬六百九十三是為朔餘備在調日法術中是則四象全策之餘也今以元法乘四象全策二十九總而並之是為一朔之實也古曆以一百萬平朔餘之分得五十三萬六百以下五百七十已上是為中平之率新曆以一百萬平之得五十三萬五百八十九得中平之數也若以四象均之得七日餘一萬四千九百二十三秒是為弦策也中盈朔虛分閏餘附日月以會朔為正氣序以斗建為中是故氣進而盈分存焉置中節兩氣之策以一月之全策三十減之每至中氣即一萬七千四十秒十二是為中盈分朔退而虛分列焉置一月之全策三十以朔策及餘減之餘一萬八千三百七是為朔虛分綜中盈朔虛分而閏餘章焉閏餘三萬五千三百四十五秒一十三從消息而自致以盈虛名焉紀法六十易乾象之爻九坤象之爻六震坎艮象之爻皆七巽離兌象之爻皆八綜八卦之數凡六十又六旬之數也紀者終也數終八卦故以紀名焉天正冬至大餘五十七小餘一萬七千先測立冬晷景次取測立春晷景取近者通計半之為距至泛日乃以晷數相減餘者以法乘之滿其日晷差而一為差刻乃以差刻求冬至視其前晷多則為減少則為加求夏至者反之加減距至泛日為定日仍加半日之刻命從前距日辰算外即二至加時日辰及刻分所在如此推求則加時與日晷相協今須積歲四百一年治平元年甲辰歲氣積年也則冬至大小餘與今適會天正經朔大餘三十四小餘三萬一千閏餘八十八萬三千九百九十此乃檢括日月交食加時早晚而定之損益在夜半後得戊戌之日以方程約而齊之今須積歲七十一萬一千七百六十一治平元年甲辰歲朔積年也則經朔大小餘與今有之數偕閏餘而相會日度歲差八萬四百四十七書舉正南之星以正四方蓋先王以明時授人奉天育物然先儒所述互有同異虞喜云堯時冬至日短星昴今二千七百餘年乃東壁中則知每歲漸差之所至又何承天云堯典日永星火以正仲夏宵中星虛以正仲秋今以中星校之所差二十七八度即堯時冬至日在須女十度故祖沖之修大明曆始立歲差率四十五年九月却一度虞鄺劉孝孫等因之各有增損以創新法若從虞喜之驗昴中則五十餘年日退一度若依承天之驗火中又不及百年日退一度後皇極綜兩曆之率而要取其中故七十五年而退一度此乃通其意未盡其微今則別調新率改立歲差大率七十七年七月日退一度上元命於虛九可以上覆往古下逮於今自帝堯以來循環考驗新曆歲差皆得其中最為親近周天分二十二億七千九百二十萬四百四十七本齊日月之行會合朔而得之在調日法使上考仲康房宿之交下驗薑岌月食之衝三十年間若應準繩則新曆周天有自然冥符之數最為密近日躔盈縮定差張胄玄名損益率曰盈縮數劉孝孫以盈縮數為朏朒積皇極有陟降率遲疾數麟德曰先後盈縮數大衍曰損益朏朒積崇天曰損益盈縮積所謂古曆平朔之日而月或朝覿東方夕見西方則史官謂之朏朒今以日行之所盈縮月行之所遲疾皆損益之或進退其日以為定朔則舒亟之度乃勢數使然非失政之致也新曆以七千一為盈縮之極其數與月離相錯而損益盈縮為名則文約而義見升降分皇極躔衰有陟降率麟德以日景差陟降率日晷景消息為之義通軌漏夫南至之後日行漸升去極近故晷短而萬物皆盛北至之後日行漸降去極遠故晷長而萬物寖衰自大衍以下皆從麟德今曆消息日行之升降積而為盈縮焉赤道宿漢百二年議造曆乃定東西立晷儀下漏刻以追二十八宿相距於四方赤道宿度則其法也其赤道斗二十六度及分牛八度女十二度虛十度危十七度室十六度壁九度奎十六度婁十二度胃十四度昴十一度畢十六度觜二度參九度井三十三度鬼四度柳十五度星七度張十八度翼十八度軫十七度角十二度亢九度氐十五度房五度心五度尾十八度箕十一度自後相承用之至唐初李淳風造渾儀亦無所改開元中浮屠一行作大衍曆詔梁令瓚作黃道遊儀測知畢觜參及輿鬼四宿赤道宿度與舊不同畢十七度觜一度參十度鬼三度自一行之後因相沿襲下更五代無所增損至仁宗皇祐初始有詔造黃道渾儀鑄銅為之自後測驗赤道宿度又一十四宿與一行所測不同斗二十五度牛七度女十一度危十六度室十七度胃十五度畢十八度井三十四度鬼二度柳十四度氐十六度心六度尾十九度箕十度蓋古今之人以八尺圓器欲以盡天體決知其難矣又况圖本所指距星傳習有差故今赤道宿度與古不同自漢太初後至唐開元治曆之初凡八百年間悉無更易今雖測驗與舊不同亦歲月未久新曆兩備其數如淳風從舊之意月度轉分洪範傳曰晦而月見西方謂之朏月未合朔在日後今在日前太疾也朏者人君舒緩臣下驕盈專權之象朔而月見東方謂之側匿合朔則月與日合今在日後太遲也側匿者人君嚴急臣下危殆恐懼之象盈則進縮則退躔離九道周合三旬考其變行自有常數傳稱人君有舒疾之變未達月有遲速之常也後漢劉洪粗通其旨爾後治曆者多循舊法皆考遲疾之分增損平會之朔得月後定追及日之際而生定朔焉至於加時早晚或速或遲皆由轉分強弱所致舊曆課轉分以九分之五為強率一百一分之五十六為弱率乃於強弱之際而求秒焉新曆轉分二百九十八億八千二百二十四萬二千二百五十一以一百萬平之得二十七日五十五萬四千六百二十六最得中平之數舊曆置日餘而求朏朒之數衰次不倫今從其度而遲疾有漸用之課驗稍符天度轉度母轉法會周附本以朔分並周天是為會周一朔之月常度也各用本母去其朔差為轉終朔差乃終外之數也各以等數約之即得實用之數乃以等數約本母為轉度母齊數也又以等數約月分為轉法亦名轉日法也以轉法約轉終得轉日及餘本曆創立此數皆古曆所未有約得八千一百一十二萬為轉度母二百九十八億八千二百二十四萬二千二百五十一為轉終分三百二十億二千五百一十二萬九千二百五十一為會周一十億八千四百四十七萬三千為轉法二十一億四千二百八十八萬七千為朔差月離遲疾定差皇極有加減限朏朒積麟德曰增減率遲疾積大衍曰損益率朏朒積崇天亦曰損益率朏朒積所謂日不及平行則損之過平行則益之從陽之義也月不及平行則益之過平行則損之御陰之道也陰陽相錯而以損益遲疾為名新曆以一萬四千八百一十九為遲疾之極而得五度八分其數與躔相錯可以知合食加時之早晚也進朔進朔之法興于麟德自後諸曆因而立法互有不同假令仲夏月朔月行極疾之時合朔當於亥正若不進朔則晨而月見東方若從大衍當戌初進朔則朔日之夕月生於西方新曆察朔日之餘驗月行徐疾變立法率參驗加時常視定朔小餘秋分後四分法之三已上者進一日春分後定朔晨分差如春分之日者三約之以減四分之二定朔小餘如此數已上者亦進以來日為朔俾循環合度月不見於朔晨交會無差明必藏於朔夕加時在於午中則晦日之晨同二日之夕皆合月見加時在於酉中則晦日之晨尚見二日之夕未生加時在於子中則晦日之晨不見二日之夕以生定晦朔乃月見之晨夕可知課小餘則加時之早晏無失使坦然不惑觸類而明之消息數因漏刻立名義通晷景麟德曆差曰屈伸率天晝夜者易進退之象也冬至一陽爻生而晷道漸升夜漏益減象君子之道長故曰息夏至一陰爻生而晷道漸降夜漏益增象君子之道消故曰消表景與陽為衝從晦者也故與夜漏長短今以屈伸象太陰之行而刻差曰消息數黃道去極日行有南北故晷漏有長短然景差徐疾不同者句股使之然也景直晷中則差遲與句股數齊則差急隨北極高下所遇不同其黃道去極度數與日景漏刻昏晚中星反覆相求消息用率步日景而稽黃道因黃道而生漏刻而正中星四術旋相為中以合九服之變約而易知簡而易從六十四卦十二月卦出於孟氏七十二候原於周書後宋景業因劉洪傳卦李淳風據舊曆元圖皆未覩陰陽之賾至開元中浮屠一行考揚子雲太玄經錯綜其數索隱周公三統糾正時訓參其變通著在爻象非深達易象孰能造於此乎今之所修循一行舊義至於周策分率隨數遷變夫六十卦直常度全次之交者諸侯卦也竟六日三千四百八十六秒而大夫受之次九卿受之次三公受之次天子受之五六相錯復協常月之次凡九三應上九則天微然以靜六三應上六則地鬱然而定九三應上六即溫六三應上九即寒上爻陽者風陰者雨各視所直之爻察不刊之象而知五等與君辟之得失過與不及焉七十二候李業興以來迄于麟德凡七家曆皆以雞始乳為立春初候東風解凍為次候其餘以次承之與周書相校二十餘日舛訛益甚而一行改從古義今亦以周書為正嶽臺日晷嶽臺者今京師嶽臺坊地曰浚儀近古候景之所尚書洛誥稱東土是也禮玉人職土圭長尺有五寸以致日此即日有常數也司徒職以圭正日晷日至之景尺有五寸謂之地中此即是地土中致日景與土圭等然表長八尺見於周髀夫天有常運地有常中曆有正象表有定數言日至者明其日至此也景尺有五寸與圭等者是其景晷之真效然夏至之日尺有五寸之景不因八尺之表將何以得故經見夏至日景者明表有定數也新曆周歲中晷長短皆以八尺之表測候所得名中晷常數交會日月成象於天以辨尊卑之序日君道也月臣道也謫食之變皆與人事相應若人君修德以禳之則或當食而不食故太陰有變行以避日則不食五星潛在日下為太陰禦侮而扶救則不食涉交數淺或在陽曆日光著盛陰氣衰微則不食德之休明而有小眚焉天為之隱是以光微蔽之雖交而不見食此四者皆德感之所繇致也按大衍曆議開元十二年七月戊午朔當食時自交址至朔方同日度景測候之際晶明無雲而不食以曆推之其日入交七百八十四分當食八分半十三年天正南至東封禮畢還次梁宋史官言十二月庚戌朔當食帝曰豫方修先后之職謫見于天是朕之不敏無以對揚上帝之休也於是徹膳素服以俟之而卒不食在位之臣莫不稱慶以謂德之動天不俟終日以曆推之是月入交二度弱當食十五分之十三而陽光自若無纖毫之變雖算術乖舛不宜若是凡治曆之道定分最微故損益毫釐未得其正則上考春秋以來日月交食之載必有所差假令治曆者因開元二食變交限以從之則所協甚少而差失過多由此明之詩云此日而微乃非天之常數也舊曆直求月行入交今則先課交初所在然後與月行更相表𩹉務通精數四正食差正交如纍璧漸減則有差在內食分多在外食分少交淺則間遙交深則相薄所觀之地又偏所食之時亦別苟非地中皆隨所在而漸異縱交分正等同在南方冬食則多夏食乃少假均冬夏早晚又殊處南北則高居東西則下視有斜正理不可均月在陽曆校驗古今交食所虧不過其半合置四正食差則斜正於卯酉之間損益於子午之位務從親密以考精微五星立率五星之行亦因日而立率以示尊卑之義日周四時無所不照君道也星分行列宿臣道也陰陽進退于此取儀刑焉是以當陽而進當陰而退皆得其常故加減之古之推步悉皆順行至秦方有金火逆數大衍曰木星之行與諸星稍異商周之際率一百二十年而超一次至戰國之時其行寖急逮中平之後八十四年而超一次自此之後以為常率其行也初與日合一十八日行四度乃晨見東方而順行一百八日計行二十二度強而留二十七日乃退行四十六日半退行五度強與日相望旋日而退又四十六日半退五度強復留二十七日而順行一百八日行十八度強乃夕伏西方又十八日行四度復與日合火星之行初與日合七十日行五十二度乃晨見東方而順行二百八十日計行二百一十六度半弱而留十一日乃退行二十九日退九度與日相望旋日而退又二十九日退九度復留十一日而順行二百八十日行一百六十四度半弱而夕伏西方又七十日行五十二度復與日合土星之行初與日合二十一日行二度半乃晨見東方順行八十四日計行九度半強而留三十五日乃退行四十九日退三度半與日相望乃旋日而退又四十九日退三度少復留三十五日又順行八十四日行七度強而夕伏西方又二十一日行二度半復與日合金星之行初與日合三十八日半行四十九度太而夕見西方乃順行二百三十一日計行二百五十一度半而留七日乃退行九日退四度半而夕伏西方又六日半退四度太與日再合又六日半退四度太而晨見東方又退九日逆行四度半而復留七日而復順行二百三十一日行二百五十一度半乃晨伏東方又三十八日半行四十九度太復與日會水星之行初與日合十五日行三十三度乃夕見西方而順行三十日計行六十六度而留三日乃夕伏西方而退十日退八度與日再合又退十日退八度乃晨見東方而復留三日又順行三十三日行三十三度而晨伏東方又十五日行三十三度與日復會一行云五星伏見留逆之效表𩹉盈縮之行皆係之於時驗之於政小失則小變大失則大變事微而象微事章而象章蓋皇天降譴以警悟人主又或算者昧於象占者迷於數覩五星失行悉謂之曆舛以數象相參兩喪其實大凡校驗之道必稽古今注記使上下相距反覆相求苟獨異常則失行可知矣星行盈縮五星差行惟火尤甚乃有南侵狼坐北入匏瓜變化超越獨異於常是以日行之分自有盈縮此乃天度廣狹不等氣序升降有差考今升降之分積為盈縮之數凡五星入氣加減興于張子信以後方士各自增損以求親密而開元曆別為四象六爻均以進退今則別立盈縮與舊異五星見伏五星見伏皆以日度為規日度之運既進退不常星行之差亦隨而增損是以五星見伏先考日度之行今則審日行盈縮究星躔進退五星見伏率皆密近舊説水星晨應見不見在雨水後穀雨前夕應見不見在處暑後霜降前又云五星在卯酉南則見遲伏早在卯酉北則見早伏遲蓋天勢使之然也步氣朔術演紀上元甲子歲距治平元年甲辰歲積七十一萬一千七百六十算外上驗往古每年減一算下算將來每年加一算元法三萬九千歲周一千四百二十四萬四千五百朔實一百一十五萬一千六百九十三歲周三百六十五日餘九千五百朔策二十九餘二萬六百九十三望策一十四餘二萬九千八百四十六半弦策七餘一萬四千九百二十三秒四半氣策一十五餘八千五百二十秒一十五中盈分一萬七千四十一秒一十二朔虛分一萬八千三百七閏限一百一十一萬六千三百四十四秒六歲閏四十二萬四千一百八十四月閏三萬五千三百四十八秒一十二沒限三萬四百七十九秒三紀法六十秒母一十八求天正冬至置所求積年以歲周乘之為天正冬至氣積分滿元法除之為積日不滿為小餘日盈紀法去之不盡命甲子算外即得所求年前天正冬至日辰及餘求次氣置天正冬至大小餘以氣策加之即得次氣大小餘若秒盈秒母從小餘小餘滿元法從大餘大餘滿紀法即去之命大餘甲子算外即次氣日辰及餘餘氣纍而求之求天正經朔置天正冬至氣積分滿朔實去之為積月不盡為閏餘盈元法為日不盈為餘以減天正冬至大小餘為天正經朔大小餘大餘不足減加紀法小餘不足減退大餘加元法以減之命大餘甲子算外即得所求年前天正經朔日辰及餘求弦望及次朔經日置天正經朔大小餘以弦策纍加之命如前即得弦望及次朔經日日辰及餘求沒日置有沒之氣小餘二十四氣小餘在沒限已上者為有沒之氣以秒母乘之其秒從之用減七十一萬二千二百二十五餘以一萬二百二十五除之為沒日不滿為餘以沒日加其氣大餘命甲子算外即其氣沒日日辰求減日置有減經朔小餘經朔小餘不滿朔虛分者為有減之朔以三十乘之滿朔虛分為減日不滿為餘以減日加經朔大餘命甲子算外即其月減日日辰步發斂術候策五餘二千八百四十秒五卦策六餘三千四百八秒六土王策三餘一千七百四秒三辰法三千二百五十刻法三百九十半辰法一千六百二十五秒母一十八求七十二候各置中節大小餘命之為初候以候策加之為次候又加之為末候各命甲子算外即得其候日辰求六十四卦各因中氣大小餘命之為公卦用事日以卦策加之即次卦用事日以土王策加諸侯之卦得十有二節之初外卦用事日求五行用事日各因四立之節大小餘命之即春木夏火秋金冬水首用事日以土王策減四季中氣大小餘命甲子算外即其月土始用事日也求發斂加時各置小餘滿辰法除之為辰數不滿者刻法而一為刻又不滿為分命辰數從子正算外即得所求加時辰時若以半辰之數加而命之即得辰初後所入刻數求發斂去經朔置天正經朔閏餘以月閏纍加之即每月閏餘滿元法除之為閏日不盡為小餘即得其月中氣去經朔日及餘秒其閏餘滿閏限即為置閏以月內無中氣為定求卦候去經朔各以卦候策及餘秒纍加減之中氣前減中氣後加即各得卦候去經朔日及餘秒步日躔術日度母六百二十四萬周天分二十二億七千九百二十萬四百四十七周天三百六十五度餘一百六十四萬四百四十七約分二千五百六十四秒八十二歲差八萬四百四十七二至限一百八十二度餘二萬四千二百五十約分六千二百一十八一象度九十一餘一萬二千一百二十五約分三千一百九求朔弦望入盈縮度置二至限度及餘以天正閏日及餘減之餘為天正經朔入縮度及餘以弦策纍加之滿二至限度及餘去之則盈入縮縮入盈而互得之即得弦望及次經朔日所入盈縮度及餘其餘以一萬乘之元法除之即得約分求朔弦望盈縮差及定差各置朔弦望所入盈縮度及約分如在象度分以下者為在初已上者覆減二至限餘為在末置初末度分於上列二至於下以上減下餘以下乘上為積數滿四千一百三十五除之為度不滿退除為分命曰盈縮差度及分若以四百乘積數滿五百六十七除之為盈縮定差若用立成者以其度損益率乘度除滿元法而一所得以損益其度下盈縮積為定差度其損益初末分為二日者各隨其初末以乘除其後皆如此例求定氣日冬夏二至盈縮之端以常為定餘者以其氣所得盈縮差度及分盈減縮加常氣日及約分即為其氣定日及分赤道宿度斗二十六牛八女十二虛十及分危十七室十六壁九北方七宿九十八度餘一百六十萬四百四十七約分二千五百六十四奎十六婁十二胃十四昴十一畢十七觜一參十西方七宿八十一度井三十三鬼三柳十五星七張十八翼十八軫十七南方七宿一百一十一度角十二亢九氐十五房五心五尾十八箕十一東方七宿七十五度前皆赤道度自大衍以下以儀測定用為常數赤道者常道也紘於天半以格黃道求天正冬至赤道日度以歲差乘所求積年滿周天分去之不盡用減周天分餘以度母除之一度為度不滿為餘餘以一萬乘之度母退除為約分命起赤道虛宿六度去之至不滿宿即所求年天正冬至加時赤道日躔所在宿度及分求夏至赤道加時日度置天正冬至加時赤道日度以二至限度及分加之滿赤道宿度去之即得夏至加時赤道日度若求二至昏後夜半赤道日度者各以二至之日約餘減一萬分餘以加二至加時赤道日度即為二至初日昏後夜半赤道日度每日加一度滿赤道宿度去之即得每日昏後夜半赤道日度求赤道宿積度置冬至加時赤道宿全度以冬至赤道加時日度減之餘為距後度及分以赤道宿度纍加之即各得赤道其宿積度及分求赤道宿積度入初末限各置赤道宿積度及分滿九十一度三十一分去之餘在四十五度六十五分半以下分以日為母為在初限以上者用減九十一度三十一分餘為入末限度及分求二十八宿黃道度各置赤道宿入初末限度及分用減一百一十一度三十七分餘以乘初末限度及分進一位以一萬約之所得命曰黃赤道差度及分在至後分前減在分後至前加皆加減赤道宿積度及分為其宿黃道積度及分以前宿黃道積度減其宿黃道積度為其宿黃道度及分其分就近為太半少黃道宿度斗二十三半牛七半女十一半虛十少秒六十四危十七太室十七少壁九太北方七宿九十七度半秒六十四奎十七太婁十二太胃十四半昴十太畢十六觜一參九少西方七宿八十二度井三十鬼二太柳十四少星七張十八太翼十九半軫十八太南方七宿一百一十一度角十三亢九半氐十五半房五心四尾十七箕十東方七宿七十四度太七曜循此黃道宿度準今曆變定若上考往古下驗將來當據歲差每移一度乃依法變從當時宿度然後可步日月五星知其守犯求天正冬至加時黃道日度以冬至加時赤道日度及分減一百一十一度三十七分餘以冬至加時赤道日度及分乘之進一位滿一萬約之為度不滿為分命曰黃赤道差用減冬至赤道日度及分即為所求年天正冬至加時黃道日度及分求冬至之日晨前夜半日度置一萬分以其日升分加之以乘冬至約餘以一萬約之所得以減冬至加時黃道日度即為冬至之日晨前夜半黃道日度及分求逐月定朔之日晨前夜半黃道日度置其朔距冬至日數以其度下盈縮積度盈加縮減之餘以加天正冬至晨前夜半日度命之即其月定朔之日晨前夜半日躔所在宿次求每日晨前夜半黃道日度各置其定朔之日晨前夜半黃道日度每日加一度以其日升降分升加降減之滿黃道宿度去之即各得每日晨前夜半黃道日躔所在宿度及分若次年冬至小餘滿法者以升分極數加之
