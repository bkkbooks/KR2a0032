body:
  text: 宋史卷一百九十五志第一百四十八兵九訓練之制訓練之制禁軍月奉五百以上皆日習武技三百以下或給役或習技其後別募廂兵亦閲習武技號教閲廂軍戍川廣者舊不訓練嘉祐以後稍習焉凡諸日習之法以鼓聲為節騎兵五習步兵四習以其坐作進退非施於兩軍相當者然自宋初以來中外諸軍皆用之明道二年樞密使王曙言天下廂軍止給役而未嘗習武技宜取材勇者訓肄升補禁軍上可其奏康定元年帝御便殿閲諸軍陳法議者謂諸軍止教坐作進退雖整肅可觀然臨敵難用請自今遣官閲陳畢令解鐙以弓弩射營置弓三等自一石至八斗弩四等自二石八斗至二石五斗以次閲習詔行之陝西河東河北路是歲詔教士不袵帶金革緩急不足以應敵自今諸軍各豫鎧甲十馬甲五令迭披帶又命諸軍班聽習雜武技勿輒禁止慶曆元年徙邊兵不教者于內郡俟習武技即遣戍邊二年諸軍以射親疏為賞罰中的者免是月諸役仍籍其名闕校長則按籍取中多者補樞密直學士楊偕請教騎兵止射九斗至七斗三等弓畫的為五暈去的二十步引滿即發射中者視暈數給錢為賞騎兵佩劈陳刀訓肄時以木桿代之奏可四年詔騎兵帶甲射不能發矢者奪所乘馬與本營藝優士卒韓琦言教射唯事體容及彊弓不習射親不可以臨陳臣至邊嘗定弓弩挽彊跖硬射親格願行諸軍立賞肄習歲以春秋二時各一閲諸營先上射親吏卒之數命近臣與殿前馬步軍司閲之其射親入第四至第七等量先給賜入第三等已上及挽彊跖硬中格悉引對親閲等數多者其正副指揮使亦第賜金帛詔以所定格班教諸軍四年遣官以陝西陳法分教河北軍士五年密詔益利梓夔路鈐轄司以弓弩習士卒候民間觀聽寖熟即便以短兵日教三十人十日一易知并州明鎬言臣近籍諸營武藝之卒使帶甲試充奇兵外為三等庶幾主將悉知軍中武技強弱臨敵可用詔頒其法三路范仲淹請以帶甲射一石充奇兵餘自九斗至七斗第為三等射力及等即升之詔著為令六年詔諸軍夏三月毋教弓弩止習短兵又詔以春秋大教弓射一石四斗弩彍三石八斗槍刀手勝三人者立為武藝出衆格中者本營闕階級即以次補至和元年詔諸軍選將校武藝鈞以射親為上韓琦又言奉詔軍士弩彍四石二斗并弓箭槍手應舊規選中者即給挺補守闕押官然則排連舊制為虛文矣請三路兵遇春秋大教武技出衆者優給賞物免本營他役候階級闕如舊制選補奏可治平二年詔河北戰卒三十萬一千陝西四十五萬九百并義勇等委總管司訓練毋得冗占熙寧元年詔曰國家置兵以備戰守而主兵之官冗占者衆肄習弗時或誤軍事帥臣安撫監司其察所部有占兵不如令者以聞十月樞密院請陝西河東選三班使臣及士人任殿侍者以為河北諸路指使教習騎軍或言河朔兵有教閲之名而無其實請班教法於其軍久而弗能者罷為廂軍奏可二年帝常語執政並邊訓練士卒何以得其精熟安石對曰京東所教兵已精強願陛下推此法以責邊將間詔其兵親臨閲試訓練簡閲有不如詔者罰之而賞其能者賞不遺賤罰不避貴則法行而將吏加勸士卒無不奮勵矣九月選置指使巡教諸軍殿前司四人馬步軍司各三人三年帝親閲河東所教排手進退輕捷不畏矢石遂詔殿前司步軍指揮當出戍者內擇槍刀手伉健者百人教如河東法藝精者免役使以優奬之五年四月詔在京殿前馬步諸軍巡教使臣並以春秋分行校試射命中者第賜銀楪兵房置籍考校以多少定殿最五月詔以涇原路蔡挺衙教陳隊於崇政殿引見仍頒諸路其法五伍為隊五隊為陳陳橫列騎兵二隊亦五伍列之其出皆以鼓為節束草象人而射焉中者有賞馬步皆前三行槍刀後二行弓弩附隊以虎蹲弩床子弩各一射與擊刺迭出皆聞金即退預籍人馬之彊者隱於隊中遇可用則別出為奇帝以其點閲周悉常有出野之備故令頒行六年詔河北四路承平日久重於改作苟遂因循益隳軍制其以京東武衛等六十二營隸屬諸路分番教習餘軍並分遣主兵官訓練九月詔自今巡教使臣校殿最雖以十分為率其事藝第一等及九分已上或射親及四分雖殿除其罰第二等事藝及八分或射親不及三分雖最削其賞十月選涇原土兵之善射者以教河朔騎軍馳驟野戰帝曰裁併軍營凡省軍員四千餘人此十萬軍之資也儻訓練精勇人得其用不惟勝敵亦以省財安石等曰陛下頻年選擇使臣專務訓練間御便殿躬親試閲賞罰既明士卒皆奮觀其技藝之精一人為數夫之敵此實國家安危所繫也是時帝初置內教法旬一御便殿閲武校程其能否而勸沮之士無不爭勸者七年詔教閲戰法主將度地之形隨宜施行二月詔自今歲一遣使按視五路安撫使以下及提舉教閲諸軍義勇保甲官課其優劣以聞而誅賞之八年詔在京諸軍營屯迫隘馬無所調習比創四教場益寬大可以馳騁其令騎軍就教者日輪一營以馬走驟閲習五月臧景陳馬射六事一順騣直射二背射三盤馬射四射親五野戰六輪弄各為說以曉射者詔依此教習八月帝令曾孝寬視教營陳大閲八軍陳於荊家陂訖事大賞元豐元年十月詔立在京校試諸軍技藝格第為上中下三等步射六發而三中為一等二中為二等一中為三等馬射五發驟馬直射三矢背射二矢中數等如步射法弩射自六中至二中床子弩及炮自三中至一中為及等並賞銀有差槍刀并標排手角勝負計所勝第賞其弓弩墜落或縱矢不及堋或挽弓破體或局而不張或矢不滿或弩跖不上牙或擭不發或身倒足落並為不合格即射已中賞餘箭不合格者降一等無可降者罷之是月賈逵燕達等言近者增損東南排弩隊法與東南所用兵械不同請止依東南隊法以弩手代小排若去敵稍遠則施箭近則左手持弩如小排架隔右手執刀以備斬伐與長兵相參為用詔可其槍手仍以標兼習十一月京西將劉元言馬軍教習不成請降步軍又不成降廂軍乃下令諸軍約一季不能學者如所請降之十二月詔開封府界京東西將兵十人以一人習馬射受教於中都所遣教頭在京步軍諸營弓箭手亦十人以一人習馬射受教於教習馬軍所藝成則展轉分教于其軍二年四月遣內侍石得一閲視京西第五將所教馬軍五月得一言其教習無狀詔本將陳宗等具析宗等引罪帝責曰朝廷比以四方驕悍為可虞選置將臣分總禁旅俾時訓肄以待非常至於部勒規模悉經朕慮前後告戒已極周詳使宗等稍異木石亦宜略知人意尸祿日久既頑且慵苟遂矜寬實難勵衆可並勒停是月詔殿前步軍司兵各置都教頭掌隸教習之事弩手五營弓箭手十營槍刀標排手五營各選一人武藝優者奏補逐司各舉散直二人為指使罷巡教使臣是日詔河東陝西諸路舊制馬軍自十月一日馳射野戰至穀雨日止塞上地涼自今教起八月止五月一日七月詔諸路教閲禁軍毋過兩時九月內出教法格并圖象頒行之步射執弓發矢運手舉足移步及馬射馬使蕃槍馬上野戰格鬥步用標排皆有法象凡千餘言使軍士誦習焉四年五月詔東南諸路轉運提點刑獄司體量將兵自降教閲新法之後軍士有所倍費以聞蓋自團立將兵以來軍人日新教閲舊資技藝以給私費者悉無暇為故也六年從郭忠紹之請步軍弩手第一等者令兼習神臂弓七年八月詔開封府界京東西路專選監司提舉教閲神宗留心武備既命立武學校七書以訓武舉之士又頒兵法以肄軍旅微妙淵通取成于心羣臣莫望焉元祐元年四月右司諫蘇轍上言諸道禁軍自置將以來日夜按習武藝將兵皆蚤晚兩教新募之士或終日不得休息今平居無事朝夕虐之以教閲使無遺力以治生事衣食殫盡憔悴無聊緩急安得其死力請使禁軍除新募未習之人其餘日止一教是月朝請郎任公裕言軍中誦習新法愚懵者頗以為苦夫射志於中而擊刺格鬥期於勝豈必盡能如法樞密院亦以為元降教閲新法自合教者指授不當令兵衆例誦詔從之九月樞密院奏異時馬軍教御陳外更教馬射其法全隊馳馬皆重行為之字透空發矢可迭出最便利近歲專用順鬃直射抹鞦背射法止可輕騎挑戰即用衆乃不能重列非便請自今營閲排日馬軍之字射與立背射隔日互教詔可三年五月罷提舉教習馬軍所六年六月三衙申樞密院乞近伏七十日依令式放諸軍教王嚴叟白韓忠彥曰景德故事皆內侍省檢舉傳宣今但歲舉為常則不復見朝廷恩意忠彥以為然又開陳太皇太后曰如此則為常事待處分內侍省遂詔今後入伏遣中侍傳宣諸軍住教紹聖元年三月樞密院言禁軍春秋大教賞法每千人增取二百一十人給賞有差從之二年二月樞密院言馬軍自九月至三月每十日一次出城渲教習回答野戰走驟向背施放遇風雪假故權住從之三年五月詔在京府界諸路禁軍格鬥法自今並依元豐條法教習七月詔選弩手兼習神臂弓八月詔殿前馬步軍司見管教頭別選事藝精強通曉教像體法者展轉教習其弓箭手馬步射射親用點藥包指及第二指知鏃並如元豐格法是月又詔復神臂弓射法為百二十步元符元年十月曾布既上巡教使臣罰格因言祖宗以來御將士常使恩歸人主而威令在管軍凡申嚴軍政豈待朝廷立法而後施行耶是管軍失職矣帝深以為然政和元年二月詔春秋大教諸軍弓弩斗力並依元豐舊制四年五月臣僚上言神臂弓垛遠百二十步給箭十隻取五中為合格軍中少得該賞恐惰於習射送殿前馬步軍司勘會將中貼箭數並改為上垛其一中貼此兩上垛從之五年三月詔自今敢占留將兵不赴教閲並以違御筆論不按舉者如其罪十一月臣僚言春秋大教諸軍弓弩上取斗力高強其射親中多者激賞太薄無以為勸詔依元豐法八年詔州郡禁軍出戍外常留五分在州教閲從毛友之請也重和元年正月而兵部侍郎宇文粹中進對論禁軍訓練不精多充雜役帝曰祖宗軍旅之法最為密緻神考尤加意訓習近來兵官寖以弛慢古者春振旅夏茇舍秋治兵冬大閲皆於農隙以講事大司馬教戰之法大宗伯大田之禮細論周制大抵軍旅之政六卿無有不總之者今士人作守倅任勸農事不以勸耕稼為職管軍府事不以督訓練為意自今如役使班直及禁衛者當差人捉探懲戒更候日長即親御教閲激賞尋以粹中所奏參照條令行之宣和三年四月立騎射賞法其背射上垛中貼者依步射法推賞靖康元年二月詔軍兵久失教習當汰冗濫今三衙與諸將招軍惟務增數希賞但及等杖不問勇怯招收既不精當教習又不以時雜色占破十居三四今宜招兵之際精加揀擇既係軍籍專使教習不得以雜色拘占又神臂弓馬黃弩弓乃中國長技宜多行教習以扞邊騎仍令間用衣甲教閲庶使習熟四月詔復置教場春秋大閲及復內教法以激賞之陳法熙寧二年十一月趙乞講求諸葛亮八陳法以授邊將使之應變詔郭逵同講求相度地形定為陳圖聞奏五年四月詔蔡挺先進教閲陳圖帝嘗謂今之邊臣無知奇正之體者况奇正之變乎且天地五行之數不過五五陳之變出於自然非強為之宰相韓絳因請諸帥臣各具戰陳之法來上取其所長立以為法從之帝患諸將軍行無行陳之法嘗曰李靖結三人為隊必有意星書羽林皆以三人為隊靖深曉此非無據也乃令賈逵郭固試之十二月知通遠軍王韶請降合行條約詔賜御製攻守圖行軍環珠武經總要神武祕略風角集占四路戰守約束各一部餘令關秦鳳路經略司抄録六年詔諸路經略司結隊並依李靖法三人為一小隊九人為一中隊賞罰俟成序日取裁其隊伍及器甲之數依涇原路牙教法九月趙言欲自今大閲漢蕃陳隊且以萬二千五百人為法旌旗麾幟各隨方色戰國時大將之旗以龜為飾蓋取前列先知之義令中軍亦宜以龜為號其八隊旗別繪天地風雲龍虎鳥蛇天地則象其方圓風雲則狀其飛揚龍虎則狀其猛厲鳥蛇則狀其翔盤之勢以備大閲樞密院以為陳隊旗號若繪八物應士衆難辨且其間亦有無形可繪者遂詔止依方色仍異其形制令勿雜而已七年又命呂惠卿曾孝寬比校三五結隊法十月以新定結隊法并賞罰格及置陳形勢等遣近侍李憲付趙曰陳法之詳已令憲面諭今所圖止是一小陳卿其從容析問憲必一一有說然置陳法度久失其傳今朕一旦據意所得率爾為法恐有未盡宜無避忌但具奏來繼又詔曰近令李憲齎新定結隊法并賞罰格付卿同議可否因以團立將官更置陳法卿必深悉朝廷經畫之意如日近可了宜令李憲齎赴闕奏曰置陳之法以結隊為先李靖以五十人為一隊每三人自相得者結為一小隊合三小隊為一中隊合五中隊為一大隊餘押官隊頭副隊頭左右傔旗五人即充五十並相依附今聖制每一大隊合五中隊五十人為之中隊合三小隊九人為之小隊合三人為之亦擇心意相得者又選壯勇善槍者一人為旗頭令自擇如己藝心相得者二人為左右傔次選勇悍者一人為引戰又選軍校一人執刀在後為擁隊凡隊內一人用命二人應援小隊用命中隊應援中隊用命大隊應援大隊用命小隊應援如逗撓觀望不即赴救致有陷失者本隊委擁隊軍校次隊委本轄隊將審觀不救所由斬之其有不可救或赴救不及或身自受敵體被重創但非可救者皆不坐其說雖與古同而用法尤為精密此蓋陛下天錫勇者不學而能也然議者謂四十五人而一長不若五人而一長之密且以五人而一長即五十人而十長也推之於百千萬則為長者多而統制不一也至如周制五人為伍屬之比長五伍為兩屬之閭胥四兩為卒屬之族師五卒為旅屬之黨正五旅為師屬之州長五師為軍屬之命卿此猶今之軍制百人為都五都為營五營為軍十軍為廂自廂都指揮使而下各有節級有員品亦昔之比長閭胥族師黨正之任也議者謂什伍之制於都法為便然都法恐非臨陳對敵決勝之術也况八陳之法久失其傳聖制一新稽之前聞若合符節夫法一定易以致人敵好擊虛吾以虛形之敵好背實吾以實形之然而所擊者非其虛所背者非其實故逸能勞之飽能飢之此所謂致人而不致於人也七年七月詔諸路安撫使各具可用陳隊法及訪求知陳隊法者以聞九月崇儀使郭固以同詳定古今陳法賜對於是內出攻守圖二十五部付河北八年二月帝批見校試七軍營陳以分數不齊前後抵牾難為施用可令見校試官托其可取者草定八軍法以聞初詔樞密院曰唐李靖兵法世無全書雜見通典離析訛舛又官號物名與今稱謂不同武人將佐多不能通其意令樞密院檢詳官與王震曾收王白郭逢原等校正分類解釋令今可行又命樞密院副都承旨張誠一入內押班李憲與震逢原行視寬廣處用馬步軍二千八百人教李靖營陳法以步軍副都指揮使楊遂為都大提舉誠一憲為同提舉震逢原參議公事夏元象臧景等為將副部隊將幹當公事凡三十九人誠一等初用李靖六花陳法約受兵二萬人為率為七軍內虞候軍各二千八百人取戰兵千九百人為七十六隊戰兵內每軍弩手三百弓手三百馬軍五百跳蕩四百奇兵四百輜重每軍九百是為二千八百人帝諭近臣曰黃帝始置八陳法敗蚩尤於涿鹿諸葛亮造八陳圖於魚復平沙之上壘石為八行晉桓溫見之曰常山蛇勢此即九軍陳法也至隋韓擒虎深明其法以授其甥李靖靖以時遇久亂將臣通曉者頗多故造六花陳以變九軍之法使世人不能曉之大抵八陳即九軍九軍者方陳也六花陳即七軍七軍者圓陳也蓋陳以圓為體方陳者內圓而外方圓陳即內外俱圓矣故以方圓物驗之則方以八包一圓以六包一此九軍六花陳之大體也六軍者左右虞候軍各一為二虞候軍左右廂各二為四廂軍與中軍共為七軍八陳者加前後二軍共為九軍開國以來置殿前馬步軍三帥即中軍前後軍帥之別名而馬步軍都虞候是為二虞候軍天武捧日龍神衛四廂是為四廂軍也中軍帥總制九軍即殿前都虞候專總中軍一軍之事務是其名實與古九軍及六花陳相符而不少差也今論兵者俱以唐李筌太白陰經中陳圖為法失之遠矣朕嘗覽近日臣僚所獻陳圖皆妄相眩惑無一可取果如其說則兩敵相遇必須遣使豫約戰日擇寬平之地夷阜塞壑誅草伐木如射圃教場方可盡其法爾以理推之其不可用决矣今可約李靖法為九軍營陳之制然李筌圖乃營法非陳法也朕採古之法酌今之宜曰營曰陳本出于一法特止曰營行曰陳在奇正言之則營為正陳為奇也於是以八月大閲八軍陳於城南荊家陂已事賜遂而下至指使馬步軍銀絹有差八年詔諸路權住教五軍陳止教四御陳九年四月帝與輔臣論營陳法謂為將者少知將兵之理且八軍六軍皆大將居中大將譬則心也諸軍四體也運其心智以身使臂以臂使指攻左則右救攻右則左救前後亦然則軍何由敗也元豐四年以九軍法一軍營陳按閲於城南好草陂已事奬諭七年詔已降五陳法令諸將教習其舊教陳法並罷蓋九軍營陳為方圓曲直鋭凡五變是為五陳元祐元年高翔言乞以御陳與新陳法相兼教閲從之蓋元豐七年詔專用五陳法而舊教御陳遂廢至是復令互教紹聖三年復罷教御陳大觀二年詔以五陳法頒行諸路靖康元年監察御史胡舜陟奏通直郎秦元所著兵書陳圖師律三策大八陳圖一小圖二皆酌古之法參今之宜博而知要實為可用詔令賜對當時君臣雖無雄謀遠略然猶切切焉以經武為心高宗建炎元年始頒樞密院教閲法專習制禦摧鋒破敵之藝全副執帶出入短樁神臂弓長柄刀馬射穿甲木挺每歲擬春秋教閲法立新格神臂弓日給箭二十射親去垛百二十步刀長丈二尺以上皮裹之引鬥五十二次不令刀頭至地每營選二十人閲習經兩閲者五十人為一隊教習分合隨隊多少分隸五軍每軍各置旗號前軍緋旗飛鳥為號後軍皂旗龜為號左軍青旗蛟為號右軍白旗虎為號中軍黃旗神人為號又別以五色物號制招旗分旗舉招旗則五軍以旗相應合而成陳舉分旗則五軍以旗相應分而成隊左右前却或分藏為伏或分出為奇皆舉旗為號更鳴小金應鼓備瞻望不及者豫約伏藏之所緩鳴小金即止急鳴應鼓即奇兵出陳趍戰急鳴小金即伏兵出其春秋大教推賞依海行格法李綱言水戰之利南方所宜沿河淮海江帥府要郡宜效古制造戰船以運轉輕捷安穩為良又習火攻以焚敵舟詔命楊觀復往江浙措置河淮別委官三年親閲水軍于鎮江登雲門外紹興四年詔內殿按閲神武中軍官兵推賞二十四年臣僚言州郡禁卒遠方縱弛多不訓練春秋教閲臨時備數乞申嚴舊制三十一年詔比聞諸路州廂禁軍土軍有司擅私役妨教閲帥府其嚴責守兵勤兵歸營訓練精熟以備點視孝宗乾道二年幸候潮門外次幸白石閲兵三衙率將佐道駕射生官兵就御輦下獻所獲是日有數將獨手運大刀上曰刀重幾何李舜舉奏刀皆重數十斤有旨卿等教閲精明又諭陳敏曰軍馬衣裝整肅如此特錫賚鞍馬金帶士卒推賞有差四年幸茅灘教閲舉黃旗連三鼓變方陳五鼓舉白旗變圓陳次二鼓舉赤旗變鋭陳青旗變直陳畢事上大悅賞賚加倍兵分東西呈大刀火炮上問李舜舉按閲比曩時如何舜舉奏今日之兵陛下親訓練撫以深恩錫以重賞忠勇倍常乾道中詔弓箭手元射一石四斗力升加三斗元射一石力升加五斗弩手元射四石力升加五斗元射兩石七斗力升加八斗進秩推賞有差宰執進射親賞格虞允文曰拍試以斗力升請給今用射親定賞恐不加意斗力上曰然他日雖強弓弩可以取勝若止習射親則斗力不進此賞格不須行淳熙間立槍手及射鐵簾格上謂輔臣曰聞射鐵簾諸軍鼓躍奮厲周必大曰兵久不用此輩無進取自然氣惰今陛下激勸告戒人人皆勝兵於是殿前步軍司諸軍及馬軍舊司弓弩手射鐵簾合格兵共一千八百四十餘詔中垛簾弓箭手一石二斗力十箭弩手四石力八箭依格進兩秩各賜錢百緡弓箭手一石力十箭以上弩手三石力八箭各進兩秩詔中外諸軍賞格亦如之紹熙元年詔殿司許浦水軍並江上水軍歲春秋兩教外每月輪閲習沿海水軍準是知徽州徐誼言諸路禁軍近法以十分為率二分習弓六分習弩餘二分習槍牌習弓者聽兼習弩斗力可以觀其進退射親可以察其能否勤惰之實人有稽考詔下諸路遵守之執政胡晉臣言比年用射鐵簾推賞往往獲遷秩是亦足以作成人才上曰射鐵簾不難此賞格太濫其專以武藝精熟為尚二年樞密院言殿步司諸軍弓箭手帶甲六十步射一石二斗力箭十二六箭中垛為本等弩手帶甲百步射四石力箭十二五箭中垛為本等槍手駐足舉手攛刺以四十攛為本等主帥委統制統領較其藝本等外取升加多者每軍五千五百人以上弓弩槍手各十五人詣主帥審實上樞密院覆試各擇優等二人升轉兩秩餘人給錢五緡俟將來再試慶元二年幸候潮門外大閲嘉泰二年詔將按閲諸軍賞賚依慶元二年增給寶慶二年莫澤言州郡禁軍平時則以防寇盜有事則以備戎行實録於朝廷非州郡可得私役比年州郡軍政隳廢吝於廩給闕額恆多郡官主兵官有窠占寓公有借事存留者不什一當教閲時鈐總路分雖號主兵僅守虛籍莫敢號召入教之次坐作進退殆同兒戲守臣利虛券不招填主兵受厚賂改年甲且一兵請給歲不下百緡以小計之一郡占三百人是虛費三萬緡也私役禁軍素有常憲守帥闢園池建第宅不給餐錢寓公去城遼絶類得借兵擾害鄉閭近而輔郡至有寓公占四五百兵者良由兵官之權輕而私占之禁弛也乞嚴戒監司守倅等止許借廂軍仍不得妨教閲餘官雖廂軍亦勿借淳祐十一年臺臣條陳軍匠不間閲習之弊按舊制禁兵毋私役比歲凡州軍屯營駐劄之處多循舊習每一州軍匠無慮數百官無小大各占破而雕鏤組繡攻金設色之事靡所不有工藝雖精擊刺不習設有小警何能授甲乞申嚴帥守及統兵官應軍匠聽歸營伍間習訓練勿競作無益虛糜廩稍以妨軍實咸淳初臣僚言諸軍統領統制正將副將正欲在軍訓練間於武事一有調用令下即行士悉將智將悉士勇所向無敵今江南州郡沿江制閫置帳前官專任營運不為軍計實為家謀絶無戰陳新功率從帳前升差大略一軍僅二三千而使臣至五六百以供雜役九年臣僚言比者招募軍兵一時徒取充數以覬賞格涅刺之後更不教閲主兵官苦以勞役日夜罔休一或少違即罹囹圄榜掠之酷兵不堪命而死者逃者接踵也今請以新招軍分隸諸隊使之熟紀律習事藝或旬或月上各郡閲試蓋弊至於此而訓練之制大壞矣
