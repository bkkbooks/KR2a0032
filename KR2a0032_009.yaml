body:
  text: 宋史卷九本紀第九仁宗一仁宗體天法道極功全德神文聖武睿哲明孝皇帝諱禎初名受益真宗第六子母李宸妃也大中祥符三年四月十四日生章獻皇后無子取為己子養之天性仁孝寬裕喜慍不形於色七年封慶國公八年封壽春郡王講學于資善堂天禧元年兼中書令明年進封升王九月丁卯册為皇太子以參知政事李迪兼太子賓客癸酉謁太廟四年詔五日一開資善堂太子秉笏南鄉立聽輔臣參決諸司事乾興元年二月戊午真宗崩遺詔太子即皇帝位尊皇后為皇太后權處分軍國事遣使告哀契丹己未大赦除常赦所不原者百官進官一等優賞諸軍山陵諸費毋賦於民庚申命丁謂為山陵使出遺留物賜近臣宗室主兵官甲子聽政于崇政殿西廡乙丑以生日為乾元節丙寅遺使以先帝遺留物遺契丹進封涇王元儼為定王賜贊拜不名以丁謂為司徒兼侍中尚書左僕射馮拯為司空兼侍中樞密使尚書右僕射曹利用為尚書左僕射兼侍中戊辰貶道州司馬寇準為雷州司戶參軍尚書戶部侍郎李迪為衡州團練副使宣徽南院使曹瑋為左衛大將軍三月乙酉作受命寶庚寅初御崇德殿太后設幄次于承明殿垂簾以見輔臣夏四月壬子遣使以即位告契丹丙寅交州來貢五月乙亥録繫囚雜犯死罪遞降一等杖以下釋之六月己酉命參知政事王曾按視山陵皇堂丁巳契丹使來祭奠弔慰庚申入內內侍省押班雷允恭坐擅移皇堂伏誅丁謂罷為太子少保分司西京甲子改命馮拯為山陵使丙寅降參知政事任中正為太子賓客秋七月辛未馮拯加昭文館大學士王曾為中書侍郎同中書門下平章事集賢殿大學士呂夷簡魯宗道參知政事乙亥遣使報謝契丹丙子樞密副使錢惟演為樞密使戊寅改翼祖定陵為靖陵辛卯貶丁謂為崖州司戶參軍八月壬寅遣使賀契丹主及其妻生日正旦乙巳皇太后同御承明殿垂簾決事九月壬申告大行皇帝諡于天地宗廟社稷癸酉上諡册于延慶殿己卯命以天書從葬冬十月壬寅契丹使來賀即位己酉葬真宗皇帝于永定陵詔中外避皇太后父諱己未祔真宗神主于太廟廟樂曰大明之舞以莊穆皇后配辛酉降東西京囚罪一等杖以下釋之蠲山陵役戶及靈駕所過民田租十一月丁卯朔錢惟演罷甲戌唃廝囉立遵求內附乙亥以皇太后生日為長寧節辛巳初御崇政殿西閣講筵命侍講孫奭馮元講論語壬午以張知白為樞密副使十二月壬戌契丹使來賀明年正旦是歲蘇州水滄州海潮溢詔振恤被水及溺死之家南平王李公蘊遣使進貢天聖元年春正月丙寅朔改元庚午契丹使初來賀長寧節癸未命三司節浮費遂立計置司戊子以京東淮南水災遣使安撫辛卯發卒增築京城二月戊戌許唃廝囉歲一入貢丁巳奉安太祖太宗御容于南京鴻慶宮壬戌減諸節齋醮道場三月甲戌奉安真宗御容于西京應天院丙子詔減西京囚罪一等徒以下釋之賜城中民八十以上者茶帛仍復其家甲申詔自今營造三司度實給用辛卯司天監上崇天曆行淮南十三山場貼射茶法夏四月辛丑罷禮儀院丁未乾元節百官及契丹使初上壽于崇德殿癸丑詔文武官奏蔭親屬從本資丁巳詔近臣舉諫官御史各一人五月甲子行陝西河北入中芻糧見錢法庚午詔禮部貢舉辛未録繫囚甲戌命魯宗道按視滑州決河庚寅議皇太后儀衛制同乘輿六月甲辰罷江寧府溧水縣采丹砂乙卯禁毀錢鑄鐘秋七月壬申除戎瀘州虛估稅錢詔職田遇水旱蠲租如例辛巳蠲天下逋負八月乙未募民輸芟塞滑州決河丙申下德音減天下囚罪一等杖以下釋之廢鄆州東平馬監以牧地賦民甲寅芝生天安殿柱九月丙寅馮拯罷以王欽若為門下侍郎同中書門下平章事昭文館大學士辛巳詔凡舉官未改轉而坐贓者舉主免劾庚寅宴崇德殿閏月甲午詔裁造院女工及營婦配南北作坊者並釋之戊戌寇準卒於雷州己亥馮拯卒丁未禁彭州九隴縣采金丁巳禁伎術官求輔臣宗室薦舉冬十月辛酉朔徙陝西緣邊軍馬屯內地十一月丁酉詔諸州配囚録具獄與地里上尚書刑部詳覆禁兩浙江南荊湖福建廣南路巫覡挾邪術害人者戊午置益州交子務是歲甘沙州來貢涇原咩迷卞杏家族納質內附二年春二月庚午遣內臣收瘞汴口流尸仍祭奠之三月丁酉奉安真宗御容于景靈宮奉真殿癸卯王欽若上真宗實録是月賜禮部奏名進士諸科及第出身四百八十五人夏四月辛酉詔三司歲市紬絹非土産者罷之乙酉録晉石氏後五月乙未録繫囚六月壬申罷天慶天祺天貺先天降聖節宮觀然燈秋七月癸丑奉安真宗御容于玉清昭應宮安聖殿八月丙辰朔宴崇德殿初用樂之半詔舉官已遷改而貪汙者舉主以狀聞聞而不以實者坐之己卯幸國子監謁孔子遂幸武成王廟甲申太白入太微垣九月辛卯祠太一宮賜道左耕者茶帛冬十月丙辰奉安真宗御容于洪福院十一月甲午加上真宗諡乙未朝饗玉清昭應景靈宮丙申饗太廟丁酉祀天地于圜丘大赦百官上尊號曰聖文睿武仁明孝德皇帝上皇太后尊號曰應元崇德仁壽慈聖皇太后賜百官諸軍加等乙巳立皇后郭氏辛亥加恩百官十二月庚午詔開封府每歲正旦冬至禁刑三日是歲龜茲甘肅來貢三年春正月辛卯長寧節近臣及契丹使初上皇太后壽于崇政殿二月戊寅詔陝西災傷州軍盜廩穀非傷主者刺配鄰州牢城徒減一等夏四月丁丑詔三館繕書藏太清樓五月庚寅録繫囚癸巳幸御莊觀刈麥聞民舍機杼聲賜織婦茶帛己亥賜隱士林逋粟帛己酉禁臣僚奏薦無服子弟六月壬戌太白晝見癸酉環原州屬羌叛寇邊環慶都監趙士隆等死之遣使者安撫陝西秋七月戊子詔諸路轉運使察舉知州通判不任事者丙午詔邊戶為羌所擾者蠲租復役二年八月戊午以忠州鹽井歲增課夔州奉節巫山縣舊籍民為營田萬州戶有稅者歲糴其穀皆為民害詔悉除之辛未蠲陝西州軍旱災租賦九月乙巳詔司天監奏災異據占書以聞冬十月乙卯太白犯南斗辛酉晏殊為樞密副使十一月己卯朔罷貼射茶法辛卯以襄州水蠲民租晉絳陝解州飢發粟振之戊申王欽若卒十二月癸丑王曾為門下侍郎昭文館大學士張知白同中書門下平章事集賢殿大學士乙丑張旻為樞密使戊寅太白晝見是歲龜茲甘州于闐來貢環慶蕃部嵬逋等內附補涇原降羌首領潘征為本族軍主四年春正月己亥命章得象與流內銓同試百司人庚子涇原兵破康奴族二月甲寅詔吏犯贓至流按察官失舉者併劾之庚午置西界和市場三月甲申詔轉運使提點刑獄罷勸農司己亥鄜延蕃部首領曹守貴等內附夏四月壬子詔京東西河北淮南平穀價五月己卯詔禮部貢舉壬午詔大辟疑者奏讞有司毋輒舉駁戊子録繫囚己亥詔士有文而行不副者州郡毋得薦送閏月戊申減江淮歲漕米五十萬石除舒州太湖等九茶場民逋錢十三萬緡己酉詔補太廟室長齋郎辛亥復陝西永豐渠以通解鹽六月丁亥建劍邵武等州軍大水詔賜被災家米二石溺死者官瘞之庚寅大雨震電京師平地水數尺辛卯避正殿減常膳丁酉降天下囚罪一等徒以下釋之畿內京東西淮南河北被水民田蠲其租癸卯詔官物漂失主典免償流徙者所在撫存之秋七月戊申御長春殿復常膳辛未減兩川歲輸錦綺易綾紗為絹以給邊費壬申詔諸路轉運使舉所部官通經術者八月丁亥築泰州捍海堰己丑詔施州溪洞首領三年一至京師九月乙卯詔孫奭馮元舉京朝官通經術者庚申詔禮部貢院諸科通三經者薦擢之録周世宗從孫柴元亨為三班奉職辛未廢襄唐州營田務以田賦民冬十月甲戌朔日有食之壬辰詔郎中以上致仕賜一子官甲午昏霧四塞丙申奉安真宗御容于鴻慶宮十二月丁丑發米六十萬斛貸畿內飢丁亥帝白太后欲元日先上太后壽乃受朝太后不可王曾奏曰陛下以孝奉母儀太后以謙全國體請如太后令五年春正月壬寅朔初率百官上皇太后壽于會慶殿遂御天安殿受朝己未晏殊罷戊辰以夏竦為樞密副使二月癸酉命呂夷簡夏竦修先朝國史王曾提舉丙子詔振京東流民丁丑西域僧法吉祥等來獻梵書三月戊申賜禮部奏名進士諸科及第出身一千七十六人秦州地震罷瓊州歲貢瑁鼊皮紫貝夏四月壬辰壽寧觀火五月庚子朔詔武臣子孫習文藝者聽奏文資壬寅太白晝見丙午閲諸班騎射辛亥録繫囚辛酉命呂夷簡等詳定編敕癸亥楚王元佐薨是月京畿旱磁州蟲食桑六月甲戌祈雨于玉清昭應宮開寶寺丙子詔決畿內繫囚丁丑雨癸未罷諸營造之不急者秋七月己亥朔振秦州水災賜被溺家錢米丙辰發丁夫三萬八千卒二萬一千緡錢五十萬塞滑州決河詔察京東被災縣吏不職者以聞九月庚戌閲龍衛神勇軍習戰冬十月辛未罷陝西青苗錢癸酉奉安真宗御容于慈孝寺崇真殿己丑頒新定五服敕甲午同皇太后幸御書院觀太宗真宗御書乙未詔西川廣南在官物故者遣人護送其家屬還鄉官為給食丙申滑州言河平十一月丁酉朔以陝西旱蝗減其民租賦庚子遣使河北體量安撫壬寅復作指南車辛亥朝饗景靈宮壬子饗太廟癸丑祀天地于圜丘大赦賀皇太后于會慶殿丁巳恭謝玉清昭應宮十二月辛未加恩百官甲戌詔輔臣南郊恩例外更改一子官丁亥詔百官宗室受賂冒為親屬奏官者毋赦是歲甘州及南平國王李公蘊遣人來貢京兆府邢洺州蝗華州旱刟繕蟲食苗六年春正月己酉罷兩川乾元節歲貢織佛戊午罷提點刑獄二月庚辰大風晝晦壬午張知白薨三月丙申朔日有食之壬子以張士遜同中書門下平章事集賢殿大學士癸丑以薑遵為樞密副使己未以范雍為樞密副使壬戌作西太一宮夏四月戊辰詔審官三班院吏部流內銓軍頭司各引對所理公事自帝為皇太子輔臣參決諸司事于資善堂至是始還有司丁丑貸河北流民復業者種食復是年租賦癸未命官減三司歲調上供物甲申旦有星大如斗自北流至西南光燭地有聲如雷庚寅下德音以星變齋居不視事五日降畿內囚死罪流以下釋之罷諸土木工振河北流民過京師者五月乙未朔交址寇邊六月丙寅罷戎瀘諸州穀稅錢秋七月壬子江寧府揚真潤州江水溢壞官民廬舍遣使安撫振恤八月乙丑詔免河北水災州軍秋稅乙亥河決澶州王楚掃丙戌録唐張九齡後九月己亥詔京朝官任內五人同罪奏舉者減一任癸卯祠西太一宮甲辰詔河北災傷民質桑土與人者悉歸之候歲豐償所貸乙巳遣使修諸路兵械冬十月甲申除福州民逋官莊錢十二萬八千緡十一月戊午京西言穀斗十錢十二月癸亥祠西太一宮是歲甘州三佛齊來貢七年春正月癸卯曹利用罷丙辰降利用為左千牛衛上將軍二月庚申朔魯宗道卒甲子詔文臣歷邊有材勇武臣之子有節義者與換官三路任使丙寅張士遜罷以呂夷簡同中書門下平章事集賢殿大學士丁卯以夏竦薛奎參知政事陳堯佐為樞密副使癸酉貶曹利用為崇信軍節度副使房州安置未至自殺乙酉以河北水災委轉運使察官吏不任職者易之閏月癸巳募民入粟以振河北戊申禁京城創造寺觀壬子復制舉六科增高蹈丘園沉淪草澤茂才異等科置書判拔萃科及試武舉癸酉置理檢使以御史中丞為之三月乙丑詔吏胥受賕毋用蔭辛巳詔契丹飢民所過給米分送唐鄧等州以間田處之癸未詔百官轉對極言時政闕失在外者實封以聞夏四月庚寅赦天下免河北被水民租賦辛卯南平王李公蘊卒其子德政遣人來告以為交址郡王五月乙未朔詔禮部貢舉庚申詔戒文弊己巳頒新令庚午詔先朝文武官自刺史少卿監以上並録其後癸酉録繫囚庚辰御承明殿臣僚請對者十九人日昃乃罷六月壬辰置益梓廣南路轉運判官丁未大雷雨玉清昭應宮災甲寅王曾罷秋七月癸亥以玉清昭應宮災遣官告諸陵詔天下不復繕修乙亥詔殿直以上毋得換文資乙酉罷諸宮觀使八月丁亥朔日有食之詔罷天下職田官收其入以所直均給之己丑以呂夷簡為昭文館大學士辛卯夏竦復為樞密副使陳堯佐王曙並參知政事己亥詔命官犯正入贓毋使親民冬十月壬寅閲虎翼武騎卒習戰丙午京師地震詔知州軍歲舉判司簿尉可縣令者一人十一月癸亥冬至率百官上皇太后壽于會慶殿遂御天安殿受朝庚午詔天下孤獨疾病者致醫藥存視詔周世宗後凡經郊祀録其子孫一人是歲河北水遣使決囚振貧瘞溺死者給其家緡錢察官吏貪暴不恤民者龜茲下溪州黔州蠻來貢八年春正月甲戌曹瑋卒辛巳作會聖宮于西京永安縣二月戊子詔五代時官三品以上告身存者子孫聽用蔭三月壬申幸後苑遂宴太清樓乙亥禁以財冒士族娶宗室女者詔河北被水州縣毋稅牛是月賜禮部奏名進士諸科及第出身八百二十二人五月甲寅賜信州龍虎山張乾曜號澄素先生丙辰大雨雹辛酉録繫囚六月癸巳呂夷簡上新修國史己亥詔御史臺獄勿關糾察司乙巳親試書判拔萃科及武舉人秋七月丙子策制舉人八月丙戌詔詳定鹽法丁亥詔近臣宗室觀祖宗御書于龍圖天章閣又觀瑞穀于元真殿遂宴蘂珠殿戊子詔流配人道死者其妻子給食送還鄉里九月癸丑復置諸路提點刑獄官丙辰罷轉對乙丑薑遵卒己巳以趙稹為樞密副使冬十月壬辰奉安太祖御容于太平興國寺開先殿丙申弛三京河中府潁許汝鄭鄆濟衛晉絳虢亳宿等二十八州軍鹽禁壬寅置天章閣待制十一月丙寅朝饗景靈宮丁卯饗太廟戊辰祀天地于圜丘大赦賀皇太后于會慶殿十二月癸未加恩百官辛丑西平王趙德明交址王李德政並加賜功臣是歲高麗占城邛部川蠻來貢九年春正月辛亥詔諸路轉運判官員外郎以上遇郊聽任子弟丙辰長寧節百官初上皇太后壽于會慶殿辛未減畿內民租二月癸巳詔復郡縣職田三月甲寅奉安太祖太宗真宗御容于會聖宮夏四月戊寅詔以隴州論平民五人為劫盜抵死主者雖更赦並從重罰乙巳閲大樂五月乙丑録繫囚六月庚辰宋綬上皇太后儀制秋七月丙午朔契丹使來告其主隆緒殂遣使祭奠弔慰及賀宗真立九月癸亥祠西太一宮賜道左耕者茶帛冬十月丙戌詔公卿大夫勵名節乙未詔常參官已授外任毋得奏舉選人辛丑罷益梓廣南路轉運判官閏月戊辰翰林侍讀學士孫奭請老命知兗州曲宴太清樓送之十一月丁亥弛兩川礬禁己丑祈雪于會靈觀丁酉出知雜御史曹修古御史郭勸楊偕推直官段少連十二月甲寅詔吏部銓選人父母年八十以上者權注近官辛酉大風三日是歲契丹主及其國母遣使來致遺留物及謝弔祭南平王李德政遣人謝加恩龜茲沙州來貢女真晏端等百八十四人內附
