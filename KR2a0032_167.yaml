body:
  text: 宋史卷一百六十七志第一百二十職官七大都督府制置使宣諭使宣撫使總領留守經略安撫使發運使都轉運使招討使招撫使撫諭使鎮撫使提點刑獄提舉常平茶馬市舶等職提舉學事提點開封府界公事提舉河北糴便司經制邊防財用提舉解鹽保甲三白渠弓箭手等職府州軍監諸軍通判幕職諸曹等官諸縣令丞簿尉鎮寨官廟令丞簿總管鈐轄路分都監諸軍都統制巡檢司監當官大都督府都督府長史左右司馬録事參軍司戶司法司士司理文學參軍助教大都督及長史掌同牧尹親王為節度則大都督領之庶姓為節度則長史領之端拱初越王為威武軍節度福州大都督府長史淳化五年吳王為淮南節度揚州大都督府長史翰林學士張洎草制再表援引典故宰相言越王已為長史上曰業已差誤異日有除并改正之至道後因移鎮遂為大都督闕則置知府事一人同次府通判一人京朝官充司馬不釐務舊制凡都督州建官如上南渡後以見任宰相充都督次有同都督有督視軍馬多執政為之雖名稱略同然掌總諸路軍馬督護諸將非舊制比也初紹興二年呂頤浩首以左僕射出都督江淮兩浙荊湖諸軍事置司鎮江其後趙鼎張浚湯思退皆以宰相兼之頤浩還朝孟庾始以參知政事為權同都督代後落權字趙鼎先以知樞密院事為都督川陝荊襄諸軍事其後與浚並相並帶兼都督諸路軍馬入銜未幾浚獨被旨江上視師置都督行府行移文字並依三省體式其召赴行在以其事分隸三省樞密院思退初以左相出都督時楊存中即以太傅寧遠軍節度使同都督思退不行就以楊存中充都督非宰執而為都督自存中始三十一年葉義問以知樞密院事督視江淮荊襄軍馬明年汪徹以參知政事湖北京西路督視軍馬執政為督視於是見焉王之望辭同都督有曰朝廷於兩淮前以二大將為招撫使後以二從臣為宣諭使憂其不相統攝則以宰相為都督欲事權歸一也此可以見朝廷開府之意凡簽廳文字並依尚書左右司樞密院檢詳房體式設屬咨議軍事參謀參議並以從官充書寫機宜文字幹辦官準備差遣前後員數不一開禧用兵或以簽樞督視或以元樞代之或以參知政事督視四川軍馬然皆未有底績而罷制置使不常置掌經畫邊鄙軍旅之事政和中熙秦用兵以內侍童貫為之仍兼經略使靖康初會諸路兵解太原之圍姚古解潛相繼為河東河北制置使皆無功而罷中興以後置使掌本路諸州軍馬屯防扞禦多以安撫大使兼之亦以統兵馬官充地重秩高者加制置大使位宣撫副使上紹興三年趙鼎始為江西制置大使其後席益帥潭李綱帥江西呂頤浩帥湖南皆領制置大使開禧丘䥩何淡亦然或置副使以二之呂頤浩充江浙制置使陳彥文程千秋副使胡舜陟除沿江都制置使王羲叔副使趙鼎為江西制置大使嶽飛為制置使每事會議或急速則施行許報大使照應初建炎元年詔令安撫使發運監司州軍官並聽制置司節制其後議者以守臣既帶安撫又兼制置及許便宜權之要重擬於朝廷於是詔止許便宜制置軍事其他刑獄財賦付提刑轉運後又詔諸路帥臣並罷制置使之名惟統兵官如故隆興以後或置或省開禧間江淮四川並置大使休兵後獨成都守臣帶四川安撫制置使掌節制御前軍馬官員升改放散類省試舉人銓量郡守舉辟邊州守二其權略視宣撫司惟財計茶馬不預又有沿海制置使以明州守臣領之然其職止肅清海道節制水軍非四川比大使置屬參謀參議主管機宜書寫文字各一員幹辦公事三員準備將領差遣差使各五員餘隨時勢輕重而增損焉宣諭使掌宣諭德意不預他事歸即結罷紹興元年詔祕書少監傅嵩卿充淮南東路宣諭使此其始也二年分遣御史五人宣諭東南諸路戒其興獄責其不當督捕盜賊皆欲專一布惠以為民其後右司范直方宣諭川陝察院方庭實宣諭三京均此意及新復陝西樓照以簽書樞密院事往永興宣諭就令招撫盜賊鄭剛中為川陝宣諭使許按察官吏汪徹為湖北京西宣諭使仍節制兩路軍馬自是使權益重而使事始不專三十二年虞允文王之望相繼充川陝宣諭使皆預軍政其權任殆亞於宣撫其後錢端禮吳芾皆以侍從出膺斯寄事畢結局官屬軍兵視其所任事之輕重為賞之厚薄焉開禧間薛叔似鄧友龍吳獵皆因饑荒盜賊及平逆亂後往敷德意亦並以從官行宣撫使不常置掌宣布威靈撫綏邊境及統護將帥督視軍旅之事以二府大臣充治平末命同簽書樞密院郭逵宣撫陝西三年夏兵犯順以參知政事韓絳為陝西宣撫使繼即軍中拜相仍舊領使政和中遣內侍童貫為陝西河東宣撫使又兼河北宣和三年睦寇方臘作亂移貫宣撫淮浙賊平依舊靖康初种師道提兵入衛京城為京畿河東北宣撫使凡勤王之師屬焉及會諸道兵救太原又以知樞密院李綱宣撫河東北兩路中興初張浚以知樞密院事孟庾以參知政事李綱以前宰相皆出宣撫浚又加處置二字入銜時為川陝京西湖北路紹興元年詔以淮南守臣多闕百姓未能復業分命呂頤浩朱勝非劉光世皆以安撫大使兼宣撫使武臣非執政而為宣撫使實自光世始二年李光又以吏部尚書加端明殿學士為壽春等州宣撫使自是韓世忠張俊吳玠嶽飛吳璘皆以武臣充使王似亦以從官由副使而升正使焉三十二年張浚復以少傅依前觀文殿大學士充江淮東西路宣撫使乾道三年虞允文依舊知樞密院事充四川宣撫使五年王炎除四川宣撫使依舊參知政事開禧間以從官出宣撫江淮湖北京西等處不一其屬有參謀官係知州資序人與提刑官參議官係知州資序人與轉運判官官機宜幹辦公事並依發運司主管文字官凡宰執帶三省樞密院事出使行移文字劄六部六部行移即具申狀如從官任使副合申六部六部行移即用公牒宣撫副使不常置掌二使事宣和末王師伐燕命少保蔡攸充靖康初會兵救太原又以資政殿學士劉韐為之建炎三年周望宣撫兩浙以太尉郭仲荀副之其後福建韓世忠川陝吳玠皆有此授紹興間張浚宣撫川陝將召歸命從臣王似盧法原為之副王似除使盧法原仍副之亦有不置使而置副如胡世將之於川陝嶽飛之於荊襄楊沂中之於淮北皆止以副使為名飛後以功始落副字亦有身為正使兼領副使如開禧三年安丙充利州西路宣撫使兼四川宣撫副使宣撫判官不常置掌贊使務熙寧中命直舍人呂大防為之實上幕也紹興中張浚初以便宜命劉子羽為副其後張宗元呂祉亦為之十年楊沂中以太尉為淮北宣撫副使劉琦以節度使為判官禮抗權均猶轉運使副判官之比詔行移文字同其繫銜宣判之名同而先後輕重異焉總領四人掌措置移運應辦諸軍錢糧以朝臣充仍帶幹階戶部等官朝廷科撥州軍上供錢米則以時拘催歲較諸州所納之盈虧以聞于上而賞罰之初建炎間張浚出使川陝用趙開總領四川財賦置所繫銜總領名官自此始其後大軍在江上間遣版曹或太府司農卿少卿調其錢糧皆以總領為名紹興十一年收諸帥之兵改為御前軍分屯諸處乃置三總領以朝臣為之仍帶專一報發御前軍馬文字蓋又使之預聞軍政不獨職餉餽而已其序位在轉運副使之上鎮江諸軍錢糧淮東總領掌之鄂州荊南江州諸軍錢糧湖廣總領掌之建康池州諸軍錢糧淮西總領掌之十五年復置四川總領凡興元興州金州諸軍錢糧四川總領掌之其官屬有幹辦公事準備差遣四川又有主管文字二員淮東西有分差糧料院審計司審計以通判權榷貨務都茶場御前封樁甲仗庫大軍倉大軍庫贍軍酒庫市易抵當庫惠民藥局湖廣有給納場屬官兼分差糧料院審計院通判兼御前封樁甲仗庫大軍倉庫贍軍酒庫四川有分差糧料院審計院屬官兼大軍倉庫撥發船運官贖藥庫糴買場淳熙元年詔委諸路州軍通判專一主管拘催逐州錢米起發赴所本所每半年比較以行賞罰紹熙二年以淮西總領所言定知州通判展減磨勘法十分缺二展二年數足減二年吏額淮東九人淮西湖廣十人四川二十人留守副留守舊制天子巡守親征則命親王或大臣總留守事建隆元年親征澤潞以樞密使吳廷祚為東京留守其西南北京留守各一人以知府兼之西京河南南京應天北京大名留司管掌宮鑰及京城守衛修葺彈壓之事畿內錢穀兵民之政皆屬焉政和三年資政殿大學士鄧洵武言河南應天大名府號陪京乞依開封制正尹少之名從之宣和三年詔河南大名少尹依熙寧舊制分左右廳治事應天少尹一員及三京司録通管府事南渡初其東京北京並置留守以開封大名知府兼又以掌兵官為副留守其後河南復南京西京置留守紹興四年帝將親征以參知政事孟庾為行宮留守奏差主管書寫機宜文字官一員幹辦官二員準備差遣差使各三員使臣五十員又置留司臺官一員五年罷局其後秦檜為行宮留守援例置官經略安撫司經略安撫使一人以直祕閣以上充掌一路兵民之事皆帥其屬而聽其獄訟頒其禁令定其賞罰稽其錢穀甲械出納之名籍而行以法若事難專決則具可否具奏即干機速邊防及士卒抵罪者聽以便宜裁斷帥臣任河東陝西嶺南路職在綏御戎夷則為經略安撫使兼都總管以統制軍旅有屬官典領要密文書奏達機事河北及近地則使事止於安撫而已其屬有幹當公事主管機宜文字準備將領準備差使元祐元年詔陝西河東經略安撫都總管司自元豐四年後應緣軍興添置官屬並罷又詔罷經略安撫司幹當官二年詔沿邊臣僚奏請事並先赴經略司詳度以聞元符元年詔經略司遇軍興差發軍馬具數關報走馬承受崇寧二年熙河蘭會經略王厚奏溪哥城乃古積石軍今當為州乞以李忠為守置河南安撫司從之四年置河東陝西諸路招納司並隸經略司五年詔河東同管幹沿邊安撫司公事許歲赴闕奏事一次政和四年詔移京西路安撫於河南府京東路安撫於應天府宣和二年詔瀘州守臣帶潼川府䕫州路兵馬都鈐轄瀘南沿邊路兵馬都鈐轄瀘南沿邊安撫使又詔罷置輔郡內潁昌府帶京西路安撫使三年詔杭越州江寧府洪州守臣並帶安撫使六年詔瀘州止帶主管瀘南沿邊安撫司公事仍差守臣七年詔河陽開德守臣並帶管內安撫使舊制安撫總一路兵政以知州兼充太中大夫以上或曾歷侍從乃得之品卑者止稱主管某路安撫司公事中興以後職名稍高者出守皆可兼使如係二品以上即稱安撫大使廣東西荊南襄陽仍舊制加經略二字凡帥府皆帶馬步軍都總管建炎初李綱請於沿河沿淮沿江置帥府以文臣為安撫使帶馬步軍都總管武臣一員為之副許便宜行事辟置僚屬將佐措置調發惟轉輸屬之漕使其後沿江三大使司辟置過多邊報稍寧詔加裁定參謀參議官主管機宜文字主管書寫機宜文字各一員幹辦公事二員文臣準備差遣武臣準備差使準備將領各以五員為額其餘諸路或隨地輕重而損益焉餘從省罷後以諸路申請或置或省不一淳熙二年詔揚州廬州荊南襄陽金州興元興州分為七路每路委文臣一員充安撫使以治民武臣一人充都總管以治兵其逐路都總管職事且令帥臣依舊帶行候正官到日交割慶元二年詔利州西路安撫司於興州置司令都統制兼五年臣僚言遴選帥才除嘗任執政外兩制從官必曾經作郡庶官必曾任憲漕實有治績者從之惟廣南東西兩路則帶經略安撫使紹興五年令襄陽守臣湖北帥司各帶經略安撫使後罷惟二廣如故走馬承受諸路各一員隸經略安撫總管司無事歲一入奏有邊警則不時馳驛上聞然居是職者惡有所隸乃潛去總管司字冀以擅權熙寧五年帝命正其名鑄銅記給之仍收還所用奉使印崇寧中始詔不隸帥司而輒預邊事則論以違制大觀中詔許風聞言事政和五年詔諸路走馬承受體均使華邇來皆貪賄賂類不舉職是豈設官之意其各自勵以稱任使或蹈前失罰不汝赦明年七月改為廉訪使者宣和五年詔近者諸路廉訪官循習違越附下罔上凡邊機皆先申後奏且侵監司凌州縣而預軍旅刑獄之事復彊買民物不償其直招權怙勢至與監司表𩹉為惡自今猶爾必加貶竄靖康初罷之依祖宗舊制復為走馬承受發運使副判官掌經度山澤財貨之源漕淮浙江湖六路儲廩以輸中都而兼制茶鹽泉寶之政及專舉刺官吏之事熙寧初輔臣陳升之王安石領制置三司條例建言發運使實總六路之出入宜假以錢貨繼其用之不給使周知六路之有無而移用之凡上供之物皆得徙貴就賤用近易遠令預知在京倉庫之數所當辦者得以便宜蓄買以待上令稍收輕重斂散之權歸於公上則國用可足民財不匱矣從之既又詔六路轉運使弗協力者宜改擇且許發運使薛向自辟其屬又令舉真楚泗守臣及兼提舉九路坑冶市舶之事元祐中詔發運使兼制置茶事至崇寧三年始別差官提舉茶鹽政和二年罷轉般倉六路上供米徑從本路直達中都以發運司所拘綱船均給六路宣和初詔發運司視六路豐歉和糴上供乃祖宗舊制曩緣姦吏侵用糴本遂壞良法自今每歲加糴一百萬石同年額輸京三年方臘初平江浙諸郡皆未有常賦乃詔陳亨伯以大漕之職經制七路財賦許得移用監司聽其按察於是亨伯收民間印契及鬻糟醋之類為錢凡七色是後州縣有所謂經制錢自亨伯始六年詔復轉般倉命發運判官盧宗原措置尋以靖康之難迄不能復渡江後惟領給降糴本收糴米斛廣行儲積以備國用紹興二年用臣僚言省罷以其職事分委漕臣八年戶部復言廣糴儲積之便再置經制發運使併理經制司財賦故名以徽猷閣待制程邁充使專掌糴事邁上疏以租庸常平鹽鐵鼓鑄各分于諸司而總於戶部發運使無所用之固辭不行九年遂廢發運司以戶部侍郎梁汝嘉為經制使檢察中外失陷錢物與催未到綱運措置糴買總領常平為職未幾復以臣僚言分其責於逐路監司乾道六年復置以戶部侍郎史正志為兩浙京湖淮廣福建等路都大發運使是冬以奏課誕謾貶併廢其職都轉運使轉運使副使判官掌經度一路財賦而察其登耗有無以足上供及郡縣之費歲行所部檢察儲積稽考帳籍凡吏蠹民瘼悉條以上達及專舉刺官吏之事熙寧初詔河東河北陝西三路漕臣許乘傳赴闕留毋過浹日既又詔三路漕臣令自辟屬各二員以京朝官曾歷知縣者為之二年詔川陝閩廣七路除堂選守臣外委轉運司依四選例立格就注免赴選具為令元豐初詔河北淮南京東京西及陝右雖各析為兩路許依未析時通治兩路之事錢穀聽其移用元祐初司馬光請漕臣除三路外餘路毋得過二員其屬官溢員亦省之紹聖中詔淮浙江湖六路上供米計其近遠分三限自季冬至明年八月以次輸足大觀中陝西漕臣以四員為額政和中又詔陝西以三員熙秦兩路各二員宣和初又詔陝西以都漕兩員總治于長安而漕臣三員分領六路中興後置官掌一路財賦之入按歲額錢物斛斗之多寡而察其稽違督其缺負以供于上間詣所部則財用之豐缺民情之休戚官吏之勤惰皆訪問而奏陳之有軍旅之事則供餽錢糧或令本官隨軍移運或別置隨軍轉運使一員或諸路事體當合一則置都轉運使以總之江東西路分置三帥置都轉運使一員張公濟為江浙荊湖廣南福建都運趙開為四川都運隨軍及都運廢置不常而正使不廢若副使若判官皆隨資之淺深稱焉其屬有主管文字幹辦官各一員文臣準備差遣武臣準備差使員多寡不一招討使掌收招討殺盜賊之事不常置建炎四年以檢校少保定江昭慶軍節度使張俊充江南路招討使定位在宣撫使之下制置使之上著為定制軍中急速事宜待報不及許以便宜行事差隨軍轉運使一員參議官一員幹辦官三員隨軍幹辦官四員書寫機宜文字一員並聽奏紹興五年嶽飛為湖北襄陽招討使請州縣不法害民者許一面對移或放罷以聞從之十年金人犯三京以韓世忠嶽飛張俊並兼河南北招討使以禦之三十一年陝西河東北京東西等路皆置招討使蓋又特遙領其地而已招撫使不常置建炎初李綱秉政以張所為河北招撫使未及出師而廢紹興十年劉光世為三京招撫使踰年而罷三十二年孝宗即位以成閔張子蓋李顯忠三大將為湖北京西淮東西招撫使子蓋死劉寶代之未幾結局官吏並罷開禧二年山東及京東西北路並置使招撫後皆罷之撫諭使掌慰安存問採民之利病條奏而罷行之亦不常置建炎元年帝謂輔臣曰京城士庶自金人退師人情未安可差官撫諭於是以路允迪耿延禧為京城撫諭使此置使初意也是年八月又令學士院降詔且命江端友等奉詔撫諭諸路其後李正民以中書舍人為江浙湖南撫諭使且令按察官吏伸民寃抑傅嵩卿以吏部侍郎為淮東撫諭使採訪民間利病及措置營田等事或不以使名則稱撫諭官所至以某州撫諭司為名具宣恩言俾民知德意初無二致乾道元年知閣門事龍大淵差充兩淮撫諭軍馬回日結局是又特為軍馬出云鎮撫使舊所無有中興假權宜以收羣盜初建炎四年范宗尹為參知政事議羣盜併力以拒官軍莫若析地以處之盜有所歸則可漸制乃請稍復藩鎮之制是年五月宗尹為右僕射於是請以淮南京東西湖南北諸路並分為鎮除茶鹽之利仍歸朝廷置官提舉外他監司並罷上供財賦權免三年餘聽帥臣移用更不從朝廷應副軍興聽從便宜時劇盜李成在舒蘄桑仲在襄鄧郭仲威在揚州薛慶在高郵皆即以為鎮撫使其餘或以處歸朝之人分畫不一許以能扞禦外寇顯立大功特與世襲官屬有參議官書寫機宜文字各一員幹辦公事二員並聽奏辟久之諸鎮或戰死或北降但餘荊南解潛及趙鼎為相召潛主管馬軍遂罷弗置焉提點刑獄公事掌察所部之獄訟而平其曲直所至審問囚徒詳覆案牘凡禁繫淹延而不決盜竊逋竄而不獲皆劾以聞及舉刺官吏之事舊制參用武臣熙寧初神宗以武臣不足以察所部人材罷之六年置諸路提刑司檢法官紹聖初以提刑兼坑冶事宣和初詔江西廣東增置武提刑一員然遇闕帥不許武憲兼攝中興以盜賊未衰諸路無武臣提刑處權添置一員建炎四年罷紹興初兩浙路以疆封闊遠差提刑二員淮南東路罷提刑令提舉茶鹽官兼領蓋因事之煩簡而損益焉乾道六年詔諸路分置武臣提刑一員須選差公廉曉習法令民事之人如無聽闕其後稍橫遂不復除八年用臣僚言諸路經總制錢併委提點刑獄官督責嘉定十五年臣僚言廣西所部州軍最多提刑合照元降指揮分上下半年就鬱林州與靜江府兩處置司無使僻地貧民有寃莫吐從之其屬有檢法官幹辦官提舉常平司掌常平義倉免役市易坊場河渡水利之法視歲之豐歉而為之斂散以惠農民凡役錢産有厚薄則輸有多寡及給吏祿亦視其執役之重輕難易以為之等商有滯貨則官為斂之復售於民以平物價皆總其政令仍專舉刺官吏之事熙寧初先遣官提舉河北陝西路常平未幾諸路悉置提舉官元祐初罷之併其職于提點刑獄司紹聖初復置元符以後因之提舉茶鹽司掌摘山煮海之利以佐國用皆有鈔法視其歲額之登損以詔賞罰凡給之不如期鬻之不如式與州縣之不加恤者皆劾以聞政和改元詔江淮荊浙六路共置一員既而諸路皆置中興後通置提舉常平茶鹽司掌常平義倉免役之政令凡官田産及坊場河渡之人按額拘納收糴儲積時其斂散以便民視産高下以平其役建炎元年常平職事併歸提刑司錢歸行在二年始復置常平官還其糴本未幾復罷紹興二年復置主管係提刑司委通判或幕職官充其後置經制司改常平官為經制某路幹辦常平等公事未幾經制司罷復為常平官十五年戶部侍郎王鈇言常平之設科條實繁其利不一豈一主管官能勝其任乃詔諸路提舉茶鹽官改充提舉常平茶鹽公事如四川無茶鹽去處仍以提刑兼充主管官改充常平司幹辦公事是年冬詔提舉官依舊法為監司與轉運判官官歲舉升改官員有不職則按以聞其後常平錢多取以贍軍所掌特義倉水利役法振濟之事茶鹽司置官提舉本以給賣鈔引通商阜財時詣所部州縣巡歷覺察禁止私販按劾不法其屬有幹辦官既與常平合一遂並行兩司之事焉都大提舉茶馬司掌榷茶之利以佐邦用凡市馬於四夷率以茶易之應産茶及市馬之處官屬許自辟置視其數之登耗以詔賞罰舊制於原渭德順三郡市馬熙寧七年初復熙河經略使王韶言西人頗以善馬至邊其所嗜唯茶而乏茶與之為市請趣買茶司買之乃命三司幹當公事李嵵運蜀茶至熙河置買馬場六而原渭德順更不買馬於是嵵言買茶買馬一事也乞同提舉買馬嵵遂兼馬政然分合不常至元豐六年羣牧判官提舉買馬郭茂恂又言茶司既不兼買馬遂立法以害馬政恐誤國事乞併茶場買馬為一司從之先是市馬于邊有司幸賞率以駑充數紹聖中都大茶馬程之邵始精揀汰仍以八月至四月為限又以羡茶轉入熙秦市戰騎故馬多而茶息厚二法著為令元符末程之邵召對徽宗詢以馬政之邵言戎俗食肉飲酪故貴茶而病於難得願禁沿邊鬻茶專以蜀産易上乘詔可未幾獲馬萬匹宣和中以茶馬兩司吏員猥衆於是朝奉大夫何漸請遵豐熙成憲稱其事之繁簡而定以員數從之紹興四年初命四川宣撫司支茶博馬七年復置茶馬官凡買馬州縣黎文長寧南平珍皆與知州通判同措置任責通判許茶馬司辟置視買馬額數之盈虧而賞罰之歲發馬綱應副屯駐諸軍及三衙之用舊有主管茶馬同提舉茶馬都大提舉茶馬皆考其資歷授之乾道初用臣僚言省罷委各郡知州通判監押任責尋復置紹熙三年茶馬司拖缺馬數過多詔將本年分馬綱錢價責茶馬司撥付湖廣總領所勞付軍官自買土馬嘉泰三年以所發綱馬不及格式詔茶馬官各差一員遂分為兩司文臣成都主茶武臣興元主馬其屬共有幹辦公事四員準備差使二員提舉坑冶司掌收山澤之所産及鑄泉貨以給邦國之用歲有定數視其登耗而賞罰之舊制一員元豐初以其通領九路歲不能周歷所部始增為二員分置兩司在饒者領江東淮浙福建等路在虔者領江西湖廣等路至元祐復併為一員紹興五年以責任不專職任廢弛詔將饒州司官吏除留屬官一員外並減罷併歸虔州司又加都大二字於提點之上或病其事權太重省併歸逐路轉運司措置仍置提領諸路鑄錢官一員於行在以侍從官充自此或復或罷不一乾道六年併歸發運司發運司罷復置提點兩司如初淳熙二年併贛歸饒復加都大二字與提刑序官其屬有幹辦公事二員檢踏官六員稱銅官催綱官各一員提舉市舶司掌蕃貨海舶征榷貿易之事以來遠人通遠物元祐初詔福建路於泉州置司大觀元年復置浙廣福建三路市舶提舉官明年御史中丞石公弼請以諸路提舉市舶歸之轉運司不報建炎初罷閩浙市舶司歸轉運司未幾復置紹興二十九年臣僚言福建廣南各置務於一州兩浙市舶乃分建於五所乾道初臣僚又言兩浙提舉市舶一司抽解搔擾之弊且言福建廣南皆有市舶物貨浩瀚置官提舉實宜惟兩浙冗蠹可罷從之仍委逐處知州通判知縣監官同檢視而轉運司總之提舉學事司掌一路州縣學政歲巡所部以察師儒之優劣生員之勤惰而專舉刺之事崇寧二年置宣和三年罷提點開封府界諸縣鎮公事掌察畿內縣鎮刑獄盜賊場務河渠之事提舉河北糴便司糴便芻糧以供邊儲之用提舉制置解鹽司掌鹽澤之禁令使民入粟塞下豫鈔給鹽以足民用而實邊備凡鹽價高下及文鈔出納多寡之數皆掌之經制邊防財用司掌經畫錢帛芻糧以供邊費凡榷易貨物根括耕地及邊部弓箭手等事皆奏而行之熙寧末以熙河連歲用兵仰給支度費用不資始置是司元祐初罷崇寧中復置提舉兵馬提轄兵甲皆守臣兼之掌按練軍旅督捕盜賊以清境內凡諸營之名籍較其壯怯而賞罰之提舉保甲司掌什伍其民教之武藝視其優劣而進退之元豐初置于開封府界遂下其法河北河東陝西三路既而悉置提舉官如府界焉提舉三白渠公事掌瀦泄三白渠以給關中灌溉之利撥發司輦運司掌以時起發綱運而督其滯留以供京師之用提舉弓箭手掌沿邊郡縣射地弓箭手之籍及團結訓練賞罰之事政和五年復以所招弓箭手之數為殿最府州軍監宋初革五季之患召諸鎮節度會于京師賜第以留之分命朝臣出守列郡號權知軍州事軍謂兵州謂民政焉其後文武官參為知州軍事二品以上及帶中書樞密院宣徽使職事稱判某府州軍監諸府置知府事一人州軍監亦如之掌總理郡政宣布條教導民以善而糾其姦慝歲時勸課農桑旌別孝悌其賦役錢穀獄訟之事兵民之政皆總焉凡法令條制悉意奉行以率所屬有赦宥則以時宣讀而班告于治境舉行祀典察郡吏德義材能而保任之若疲軟不任事或姦貪冒法則按劾以聞遇水旱以法振濟安集流亡無使失所若河南應天大名府則兼留守司公事太原府延安府慶州渭州熙州秦州則兼經略安撫使馬步軍都總管定州真定府瀛州大名府京兆府則兼安撫使馬步軍都總管瀘州潭州廣州桂州雄州則兼安撫使兵馬鈐轄潁昌府青州鄆州許州鄧州則兼安撫使兵馬巡檢其餘大藩府或沿邊州郡或當一道衝要者並兼兵馬鈐轄巡檢或帶沿邊安撫提轄兵甲沿邊溪洞都巡檢餘州軍則別其地望之高下與職務之繁簡而置之分曹以理之而總其綱要凡屬縣之事皆統焉建炎初詔河北京東西路除帥司外舊差文臣知州去處許通差武臣一次又要郡文臣一員帶本路兵馬鈐轄武臣一員充副鈐轄次要郡文臣一員帶本路兵馬都監武臣一員充副都監紹興三年詔守臣帶路分鈐轄都監去處並罷五年帝以守令皆帶勸農公事多不奉職自今有治效顯著者可令中書省籍記姓名特加擢用凡從官出知郡者特許不避本貫初除授見闕及自外罷任赴闕並令引見上殿九年詔應守臣以二年為任又以武臣作郡往往不曉民事且多恣橫詔新復州郡只差文臣續因臣僚言極邊控扼去處仍差武臣其不係極邊文武臣通差詔守臣到任半年以上具民間利病或邊防五條聞奏委都司看詳有便於民者即與施行續又詔不拘五條之數十三年詔依舊制帶提舉或主管學事從官以上稱提舉餘知通主管淳熙中罷乾道二年令非曾任守臣不得為郎官諸郡合文武臣通差去處並依舊制通判宋初懲五代藩鎮之弊乾德初下湖南始置諸州通判命刑部郎中賈玭等充建隆四年詔知府公事並須長吏通判簽議連書方許行下時大郡置二員餘置一員州不及萬戶不置武臣知州小郡亦特置焉其廣南小州有試秩通判兼知州者職掌倅二郡政凡兵民錢穀戶口賦役獄訟聽斷之事可否裁決與守臣通簽書施行所部官有善否及職事修廢得刺舉以聞元祐元年詔知州係帥臣其將下公事不許通判同管元符元年詔通判幕職官令日赴長官廳議事及都廳簽書文檄南渡後設官如舊入則二政出則按縣有軍旅之事則專任錢糧之責經制總制錢額與本郡協力拘催以入于戶部既而諸州通判有兩員處減一員凡軍監之小者不置又詔更不添差其後或以廢事請或以控扼去處請紹興五年以後旋添置之除潭廣洪州鎮江建康成都府見係兩員外凡帥府通判並以兩員為額餘置一員乾道元年詔買馬州軍通判令茶馬司依舊法奏辟餘堂除差人淳熙十四年利州路提刑言關外四州通判乞自制置司奏辟所有金洋興利文龍等州通判乞送轉運司擬差並從之幕職官簽書判官廳公事兩使防團軍事推判官節度掌書記觀察支使掌裨贊郡政總理諸案文移斟酌可否以白于其長而罷行之凡員數多寡視郡小大及職務之煩簡初政和改簽書判官廳公事為司録建炎初復舊凡節度推判官從軍額察推及支使從州府名凡諸州減罷通判處則升判官為簽判以兼之小郡推判官不並置或以判官兼司法或以推官兼支使亦有併判官窠闕省罷則令録參兼管凡要郡簽判及推官皆堂除餘吏部使闕二廣間許監司辟差紹熙元年臣僚言廣西奏擬簽判多恩科癃老乞行下轉運司不許差年六十以上昏眊之人嘉定二年臣僚言監司有幹官州郡有職官以供簽廳之職或非才不勝任則按刺易置可也今乃差兼簽廳者動輒三兩員或四五員其為冗費與添差何異乞將諸州郡所差兼簽廳官並行住罷從之諸曹官舊制録事參軍掌州院庶務糾諸曹稽違戶曹參軍掌戶籍賦稅倉庫受納司法參軍掌議法斷刑司理參軍掌訟獄勘鞫之事中興詔曹掾官依舊惟司理司法並注經任及試中刑法人乾道以來間以司戶兼司法知録亦或兼職六年汪大猷言司戶初官令專主倉庫知録依司理例以獄事為重不兼他職從之仍依知縣格法銓量如有老疾昏眊難任事者即從本州知通於判司簿尉內選經一考以上無罪犯曉法人對換紹熙元年詔不曾銓試人不許注授司法慶元五年臣僚言司理獄事煩重宜優其舉主照提刑司合舉主三員以上許間歲舉獄官一員嘉定中申明年滿六十不許為獄官之令仍不許恩科人注授教授景祐四年詔藩鎮始立學他州勿聽慶曆四年詔諸路州軍監各令立學學者二百人以上許更置縣學自是州郡無不有學始置教授以經術行義訓導諸生掌其課試之事而糾正不如規者委運司及長史於幕職州縣內薦或本處舉人有德藝者充熙寧六年詔諸路學官委中書門下選差至是始命于朝廷元豐元年州府學官共五十三員諸路惟大郡有之軍監未盡置元祐元年詔齊廬宿常等州各置教授一員自是列郡各置教官建炎三年教授並罷紹興三年復置四十二州十二年詔無教授官州軍令吏部申尚書省選差二十六年詔並不許兼他職令提舉司常切遵守若試教官則始於元豐添差教授則始於政和縣令建隆元年令天下諸縣除赤畿外有望緊上中下掌總治民政勸課農桑平決獄訟有德澤禁令則宣布于治境凡戶口賦役錢穀振濟給納之事皆掌之以時造戶版及催理二稅有水旱則有災傷之訴以分數蠲免民以水旱流亡則撫存安集之無使失業有孝悌行義聞于鄉閭者具事實上于州激勸以勵風俗若京朝幕官則為知縣事有戍兵則兼兵馬都監或監押宣教郎以下帶監押初建炎多差武臣紹興詔專用文臣然沿邊溪洞處仍許武臣指射邑大事煩則堂除仍借緋章服嚴差出之禁任滿有政績則與升擢乾道以後定以三年為任仍非兩任不除監察御史初改官人必作縣謂之須入十六年詔知縣在任不成兩考即不合理為實歷嘉定十二年詔兩經作令滿替者實歷九考有政聲無過犯舉員及格改官人特免再作知縣許受簽判或幹官以當知縣履歷縣丞初不置天聖中因蘇耆請開封兩縣始各置丞一員在簿尉之上仍於有出身幕職令録內選充皇祐中詔赤縣丞並除新改官人熙寧四年編修條例所言諸路州軍繁劇縣令戶二萬已上增置丞一員以幕職官或縣令人充元祐元年詔應因給納常平免役置丞並行省罷如委事務繁劇難以省罷處令轉運司存留崇寧二年宰相蔡京言熙寧之初修水土之政行市易之法興山澤之利皆王政之大請縣並置丞一員以掌其事大觀三年詔昨增置縣丞內除舊額及萬戶以上縣事務繁冗及雖非萬戶實有山澤坑冶之利可以修興去處依舊存留外餘皆減罷建炎元年詔縣丞係嘉祐以前員闕并萬戶處存留一員餘並罷紹興三年以淮東纍經兵火權罷縣丞十八年置海陵丞一員嘉定後小邑不置丞以簿兼主簿開寶三年詔諸縣千戶以上置令簿尉四百戶以上置令尉令知主簿事四百戶以下置簿尉以主簿兼知縣事咸平四年王欽若言川峽縣五千戶以上請並置簿自餘仍以尉兼從之自後川蜀及江南諸縣各增置主簿中興後置簿掌出納官物銷注簿書凡縣不置丞則簿兼丞之事凡批銷必親書押不許用手記仍不許差出以防銷注尉建隆三年每縣置尉一員在主簿之下奉賜並同至和二年開封祥符兩縣各增置一員掌閲習弓手戢姦禁暴凡縣不置簿則尉兼之中興沿邊諸縣間以武臣為尉並帶兼巡捉私茶鹽礬亦或文武通差隆興詔不許差癃老疾病年六十以上之人邑大事煩則置二尉紹熙中詔恩科人年及六十不差嘉定十三年詔極邊縣尉獲盜酬賞班改歲以二員為額鎮寨官諸鎮置於管下人煙繁盛處設監官管火禁或兼酒稅之事寨置於險扼控禦去處設寨官招收土軍閲習武藝以防盜賊凡杖罪以上並解本縣餘聽決遣廟令丞主簿舊制五嶽四瀆東海南海諸廟各置令丞廟之政令多統於本縣令京朝知縣者稱管勾廟事或以令録老耄不治者為廟令判司簿尉為廟簿掌葺治修飾之事凡以財施於廟者籍其名數而掌之總管鈐轄司掌總治軍旅屯戍營防守禦之政令凡將兵隸屬官訓練教閲賞罰之事皆掌之守臣帶提舉兵馬巡檢都監及提轄兵甲者掌統治軍旅訓練教閲以督捕盜賊而肅清治境凡諸營名籍賞罰之事皆掌之崇寧四年蔡京奏京畿四輔置輔郡屏衛京師以潁昌府為南輔襄邑縣升為拱州為東輔鄭州為西輔澶州為北輔以太中大夫以上知州置副總管鈐轄各一員知州為都總管餘依三路帥臣法從之大觀三年詔東南帥府總管依三路都總管法靖康元年詔四道副總管並通差文武臣其諸路將官掌統所隸禁旅以行陳隊伍金鼓旗幟弓矢擊刺之法而教習訓練之別其武藝強者待次遷補以激勸士卒凡兵仗器甲之數廩祿犒設賞罰約束之禁令皆掌焉副將為之二若屯戍防邊則受帥司節制遇寇敵則審其戰守應援之事若師有功則具馘數籍用命而旌賞之路分都監掌本路禁旅屯戍邊防訓練之政令以肅清所部州府以下都監皆掌其本城屯駐兵甲訓練差使之事資淺者為監押紹聖三年詔諸路將副序位在路分都監之下大觀三年詔帥府無路分鈐轄望郡無路分都監者許置一員其餘添置處任滿不差人宣和二年虔州添置都監一員建炎初分置帥府以諸路帥臣兼要郡守臣帶兵馬鈐轄次要郡帶兵馬都監並以武臣為之副稱副總管副鈐轄副都監許以便宜行軍馬事辟置僚屬依帥臣法屯兵皆有等差遇朝廷起兵則副總管為帥副鈐轄都監各以兵從聽其節制其後益瀘夔廣桂五州牧又皆以都鈐轄為稱四年詔建康府江州路又置副都總管一員於見置帥司處駐劄紹興三年詔要郡次要郡守臣罷帶兵職其逐路副總管依舊格改充路分都監為一路掌兵之官其各州鈐轄或省或置不一又有逐路兵馬都監兵馬監押掌煙火公事捉捕盜賊淳熙十六年詔諸路訓練鈐轄並須年六十以下曾經從軍有才武人充紹熙元年指揮雜流出身之人不得過路分州鈐諸州軍兵馬都監獨員處專注才武及曾任主兵官之人慶元中詔總管下至將副等年七十以上許自陳與宮觀差遣初守臣罷帶兵職惟江西贛州以多盜仍帶江西兵馬鈐轄其後武臣為路鈐者亦無尺籍伍符每歲諸州按閲特存故事間有得旨葺治軍器或訓練禁軍則仍帶入銜諸軍都統制副都統制統制統領舊制出師征討諸將不相統一則拔一人為都統制以總之未為官稱也建炎初置御營司擢王淵為都統制名官自此始其後神武五軍及川陝宣撫司都督府樞密院皆置紹興十一年三大將兵罷諸軍皆冠以御前二字擢其偏裨為御前統領官以統制御前軍馬入銜秩高者為御前諸軍都統制且令仍舊駐劄以屯駐州名冠軍額之上其後興元江陵建康鎮江府興金鄂江池州及平江許浦水軍皆除都統制恩數略視三衙權任在帥臣右官卑者稱副都統制設屬有計議機宜幹辦公事準備差遣省置不一次有副都統制乾道三年帝諭輔臣欲今後江上諸軍各置副都統一員兼領軍事豈惟儲帥亦使主將顧忌不敢專擅因言都副統制禮有隆殺且為條約上曰如此他日不致爭權越禮遂行之然其後都副鮮有並除者初渡江後大軍又有統制同統制副統制統領同統領副統領其下有正將準備將訓練官部將隊將等名皆偏裨也舊制準備將而上皆主帥升差仍先申樞密院審察乾道七年詔訓練官部隊將而下許軍中徑差申朝廷照會紹熙間詔諸軍升差統制至準備將者主帥解發三人赴總領所選一名諸將不以為便慶元三年詔主帥選擇總領所或屯軍處守臣審核保明申樞密院巡檢司有沿邊溪峒都巡檢或蕃漢都巡檢或數州數縣管界或一州一縣巡檢掌訓治甲兵巡邏州邑擒捕盜賊事又有刀魚船戰棹巡檢江河淮海置捉賊巡檢及巡馬遞鋪巡河巡捉私茶鹽等各視其名以修舉職業皆掌巡邏幾察之事中興以後分置都巡檢使都巡檢巡檢州縣巡檢掌土軍禁軍招填教習之政令以巡防扞禦盜賊凡沿江沿海招集水軍控扼要害及地分闊遠處皆置巡檢一員往來接連合相應援處則置都巡檢以總之皆以材武大小使臣充各隨所在聽州縣守令節制本寨事並申取州縣指揮若海南瓊管及歸峽荊門等處跨連數郡控制溪峒又置水陸都巡檢使或三州都巡檢使以增重之監當官掌茶鹽酒稅場務征輸及冶鑄之事諸州軍隨事置官其征榷場務歲有定額歲終課其額之登耗以為舉刺凡課利所入日具數以申于州建炎初詔監當官闕許轉運司具名奏辟一次以二年為任實有六考方許關升煩劇去處許添差一員凡交割必置曆以稽其剩缺合選差文臣處更不差武臣淳熙二年詔二萬貫以下庫分選有才幹存留一員指揮諸班直親從親事官保義郎以下差充建炎四年詔每州每以五員為額
