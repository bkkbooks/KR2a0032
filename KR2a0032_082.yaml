body:
  text: 宋史卷八十二志第三十五律曆十五乾道四年禮部員外郎李燾言統元曆行之既久與天不合固宜大衍曆最號精微用之亦不過三十餘年後之欲行遠也難矣抑曆未差無以知其失未驗無以知其是仁宗用崇天曆天聖至皇祐四年十一月日食二曆不效詔以唐八曆及宋四曆參定皆以景福為密遂欲改作而劉羲叟謂崇天曆頒行逾三十年所差無幾詎可偶緣天變輕議改移又謂古聖人曆象之意止於敬授人時雖則預考交會不必吻合辰刻或有遲速未必獨是曆差乃從羲叟言復用崇天曆羲叟曆學為宋第一歐陽修司馬光輩皆遵用之崇天曆既復用又十三年治平二年始改用明天曆曆官周琮皆遷官後三年驗熙寧三年七月月食不效乃詔復用崇天曆奪琮等所遷官熙寧八年始更用奉元曆沈括實主其議明年正月月食遽不效詔問修曆推恩者姓名括具奏辨得不廢識者謂括強辨不許其深於曆也然後知羲叟之言然願申飭曆官加意精思勿執今是益募能者熟復討論更造密度補治新曆緣燾嘗承詔監視測驗值新曆太陰熒惑之差恐書成所差或多見譏能者乃詔諸道訪通曆者久之福州布衣阮興祖上言新曆差謬荊大聲不以白部即補興祖為局生初新曆之成也大聲孝榮共為之至是大聲乃以太陰九道變赤道別演一法與孝榮立異于後祕書少監崇政殿説書兼權刑部侍郎汪大猷等言承詔於御史臺監集局官參算明年太陰宿度箋注御覽詣實今大聲等推算明年正月至月終九道太陰變赤道限十二月十五日以前具稿成至正月內臣等召曆官上臺用渾儀監驗疏密從之五年國子司業兼權禮部侍郎程大昌侍御史單時祕書丞唐孚祕書郎李木言都省下靈臺郎充曆算官蓋堯臣皇甫繼明宋允恭等言厥今更造乾道新曆朝廷纍委官定驗得見日月交食密近天道五星行度允協躔次惟九道太陰間有未密搜訪能曆之人補治新曆半年未有應詔者獨荊大聲別演一法與劉孝榮乾道曆定驗正月內九道太陰行度今來二法皆未能密於天道乾道太陰一法與諸曆比較皆未盡善今撮其精微撰成一法其先推步到正月內九道太陰正對在赤道宿度願委官與孝榮大聲驗之如或精密即以所修九道經法請得與定驗官更集孝榮大聲等同赴臺推步明年九道太陰正對在赤道宿度點定月分定驗從其善者用之大昌等從大聲孝榮所供正月內太陰九道宿度已赴太史局測驗上中旬畢及取大聲孝榮堯臣等三家所供正月下旬太陰宿度參照覽視測驗疏密堯臣繼明允恭請具今年太陰九道宿度欲依逐人所請限一月各具今年太陰九道變黃道正對赤道其宿某度依經具稿送御史臺測驗官不時視驗然後見其疏密裴伯壽上書言孝榮自陳預定丁亥歲四月朔日食八月望月食俱不驗又定去年二月望夜二更五點月食九分以上出地復滿臣嘗言於宰相是月之食當食既出地紀元曆亦食既出地生光在戌初二刻復滿在戌正三刻是夕月出地時有微雲至昏時見月已食既至戌初三刻果生光即食既出地可知復滿在戌正三刻時二更二點臣所言卒驗孝榮言見行曆交食先天六刻今所定月食復滿乃後天四刻新曆謬誤為甚其一曰步氣朔孝榮先言氣差一日觀景表方知其失此不知驗氣者也臣之驗氣差一二刻亦能知之紀元節氣自崇寧間測驗逮今六十餘載不無少差苟非測驗安知其失凡日月合朔以交食為驗今交食既差朔亦弗合矣其二曰步發斂止言卦候而已其三曰步日躔新曆乃用紀元二十八宿赤道度暨至分宮遽減紀元過宮三十餘刻殊無理據而又赤道變黃道宿度婁胃二宿頓減紀元半度在術則婁胃二宿合二十八度婁當十二度太今新曆婁作十二度半乃棄四分度之一室軫二宿虛收復多少數變宿分宮既訛是以乾道己丑歲太陽過宮差誤其四曰步晷漏新曆不合前史唐開元十二年測景于天下安南測夏至午中晷在表南三寸三分新曆算在表北七寸其鐵勒測冬至午中晷長一丈九尺二寸六分新曆算晷長一丈四尺九寸九分乃差四尺二寸七分其謬蓋若此其五曰步月離諸曆遲疾朏朒極數一同新曆朏之極數少朒之極數四百九十三分疾之極數少遲之極數二十分不合曆法其六曰步交會新曆妄設陽準陰準等差蓋欲苟合已往交食其間復有不合者則遷就天道所以預定丁亥戊子二歲日月之食便見差違其七曰步五星以渾儀測驗新曆星度與天不合蓋孝榮與同造曆人皆不能探端知緒乃先造曆後方測驗前後倒置遂多差失夫立表驗氣窺測七政然後作曆豈容掇拾緒餘超接舊曆以為新術可乎新曆出於五代民間萬分曆其數朔餘太強明曆之士往往鄙之今孝榮乃三因萬分小曆作三萬分為日法以隱萬分之名三萬分曆即萬分曆也緣朔餘太強孝榮遂減其分乃增立秒不入曆格前古至于宋諸曆朔餘並皆無秒且孝榮不知王處訥於萬分增二為應天曆日法朔餘五千三百七自然無秒而去王朴用秒之曆臣與造統元曆之後潛心探討復三十餘年考之諸曆得失曉然誠假臣演撰之職當與太史官立表驗氣窺測七政運算立法當遠過前曆詔送監視測驗官詳之達于尚書省時談天者各以技術相高互相詆毀諫議大夫單時祕書少監汪大猷國子司業權禮部侍郎程大昌祕書丞唐孚祕書郎李木言乾道新曆荊大聲劉孝榮同主一法自初測驗以至權行施用二人無異議後緣新曆不密詔訪求通曆者孝榮乃訟阮興祖緣大聲補局生自是紛紛不已大聲官以判局提點曆書為名乃言不當責以立法起算不知起曆授時何所憑據且正月內五夜比較孝榮所定五日並差大聲所定五日內三日的中兩日稍疏繼伯壽進狀獻術時等將求其曆書上臺測驗務求至當而大聲等正居其官乃飾辭避事測驗弗精且大聲孝榮同立新法今猶反覆苟非各具所見他日曆成大聲妄有動搖即前功盡廢請令孝榮大聲堯臣伯壽各具乾道五年五月已後至年終太陰五星排日正對赤道躔度上之御史臺令測驗官參考詔從之六年日官言比詔權用乾道曆推算今歲頒曆于天下明年用何曆推算詔亦權用乾道曆一年秋成都曆學進士賈復自言詔求推明熒惑太陰二事轉運使資遣至臨安願造新曆畢還蜀仍進曆法九議孝宗嘉其志館于京學賜廩給太史局李繼宗等言十二月望月食大分七小分九十三賈復劉大中等各虧初食甚分夜不同詔禮部侍郎鄭聞監李繼宗等測驗是夜食八分祕書省言靈臺郎宋允恭國學生林永叔草澤祝斌黃夢得吳時舉陳彥健等各推算日食時刻分數異同乃詔諫議大夫姚憲監繼宗等測驗五月朔日食憲奏時刻分數皆差舛繼宗澤大聲削降有差太史局春官正判太史局吳澤等言乾道十年頒賜曆日其中十二月已定作小盡乾道十一年正月一日注癸未朔畢乾道十一年正月一日崇天統元二曆算得甲申朔紀元乾道二曆算得癸未朔今乾道曆正朔小餘約得不及進限四十二分是為疑朔更考日月之行以定月朔大小以此推之則當是甲申朔今曆官弗加精究直以癸未注正朔竊恐差誤請再推步於是俾繼宗監視皆以是年正月朔當用甲申兼今歲五月朔太陽交食本局官生瞻視到天道日食四分半虧初西北午時五刻半食甚正北未初二刻復滿東北申初一刻後令永叔等五人各言五月朔日食分數並虧初食甚復滿時刻皆不同並見行乾道曆比之五月朔天道日食多算二分少強虧初少算四刻半食甚少算三刻復滿少算二刻已上又考乾道曆比之崇天紀元統元三曆日食虧初時刻為近較之乾道日食虧初時刻為不及繼宗等參考來年十二月係大盡及十一年正月朔當用甲申而太史局丞同判太史局荊大聲言乾道曆加時係不及進限四十二分定今年五月朔日食虧初在午時一刻今測驗五月朔日食虧初在午時五刻半乾道曆加時弱四百五十分苟以天道時刻預定乾道十二年正月朔已過甲申日四百五十分大聲今再指定乾道十一年正月合作甲申朔十年十二月合作大盡請依太史局詳定行之五月詔曆官詳定淳熙元年禮部言今歲頒賜曆書權用乾道新曆推算明年復欲權用乾道曆詔從之十一月詔太史局春官正吳澤推算太陽交食不同令祕書省敕責之並罰造曆者三年判太史局李繼宗等奏令集在局通算曆人重造新曆今撰成新曆七卷推算備草二卷校之紀元統元乾道諸曆新曆為密願賜曆名於是詔名淳熙曆四年頒行令禮部祕書省參詳以聞淳熙四年正月太史局言三年九月望太陰交食以紀元統元乾道三曆推之初虧在攢點九刻食二分及三分已上以新曆推之在明刻內食大分空止在小分百分中二十七是夜瞻候月體盛明雖有雲而不翳至旦不見虧食於是可見紀元統元乾道三曆不逮新曆之密今當預期推算淳熙五年曆蓋舊曆疏遠新曆未行請賜新曆名付下推步禮部驗得孟邦傑李繼宗等所定五星行度分數各有異同繼宗云六月癸酉木星在氐宿三度一十九分邦傑言夜昏度瞻測得木星在氐宿三度半半係五十分雖見月體而西南方有雲翳之繼宗云是月戊寅木星在氐宿三度四十一分邦傑言四望有雲雖雲間時露月體所可測者木星在氐宿三度太太係七十五分繼宗云庚辰土星在畢宿三度二十四分金星在參宿五度六十五分火星在井宿七度二十七分邦傑言五更五點後測見土星入畢宿二度半半係五十分金星入參宿六度半火星入井宿八度多三分繼宗云七月辛丑太陰在角宿初度七十一分木星在氐宿五度七十六分邦傑言測見昏度太陰入軫宿十六度太太係七十五分木星入氐宿六度少少係二十五分孝宗曰自古曆無不差者况近世此學不傳求之草澤亦難其人詔以淳熙曆權行頒用一年五年金遣使來朝賀會慶節妄稱其國曆九月庚寅晦為己丑晦接伴使檢詳丘䥩辨之使者辭窮於是朝廷益重曆事李繼宗吳澤言今年九月大盡係三十日於二十八日早晨度瞻見太陰離東濁高六十餘度則是太陰東行未到太陽之數然太陰一晝夜東行十三度餘以太陰行度較之又減去二十九日早晨度太陰所行十三度餘則太陰尚有四十六度以上未行到太陽之數九月大盡明矣其金國九月作小盡不當見月體今既見月體不為晦日乞九月三十日十月一日差官驗之詔遣禮部郎官呂祖謙祖謙言本朝十月小盡一日辛卯朔夜昏度太陰躔在尾宿七度七十分以太陰一晝夜平行十三度三十一分至八日上弦日太陰計行九十一度餘按曆法朔至上弦太陰平行九十一度三十一分當在室宿一度太金國十月大盡一日庚寅朔夜昏度太陰約在心宿初度三十一分太陰一晝夜亦平行十三度三十一分自朔至本朝八日為金國九日太陰已行一百四度六十二分比之本朝十月八日上弦太陰多行一晝夜之數今測見太陰在室宿二度計行九十二度餘始知本朝十月八日上弦密於天道詔祖謙復測驗是夜邦傑用渾天儀法物測驗太陰在室宿四度其八日上弦夜所測太陰在室宿二度按曆法太陰平行十三度餘行遲行十二度今所測太陰比之八日夜又東行十二度信合天道十年十月詔甲辰歲曆字誤令禮部更印造頒諸安南國繼宗澤及荊大聲削降有差十二年九月成忠郎楊忠輔言淳熙曆簡陋於天道不合今歲三月望月食三更二點而曆在二更二點數虧四分而曆虧幾五分四月二十三日水星據曆當夕伏而水星方與太白同行東井間昏見之時去濁猶十五餘度七月望前土星已伏而曆猶注見八月未弦金已過氐矣而曆猶在亢此類甚多而朔差者八年矣夫守疏敝之曆不能革舊其可哉忠輔於易粗窺大衍之旨創立日法撰演新曆不敢以言者誠懼太史順過飾非恃刻漏則水有增損遲疾恃渾儀則度有廣狹斜正所賴今歲九月之交食在晝而淳熙曆法當在夜以晝夜辨之不待紛爭而決矣輒以忠輔新曆推算淳熙十二年九月定望日辰退乙未太陰交食大分四小分八十五晨度帶入漸進大分一小分七虧初在東北卯正一刻一十一分係日出前食甚在正北辰初一刻一十分復滿在西北辰正初刻並日出後其日日出卯正二刻後與虧初相去不滿一刻以地形論之臨安在嶽臺之南秋分後晝刻比嶽臺差長日當先曆而出故知月起虧時日光已盛必不見食以淳熙曆推之九月望夜月食大分五小分二十六帶入漸進大分三小分四十七虧初在東北卯初三刻係攢點九刻後食甚在正北卯正三刻後復滿在西北辰正初刻後並在晝禮部乃考其異同孝宗曰日月之行有疏數故曆久不能無差大抵月之行速多是不及無有過者可遣臺官禮部官同驗之詔遣禮部侍郎顏師魯其夜戌正二刻陰雲蔽月不辨虧食師魯請詔精於曆學者與太史定曆孝宗曰曆久必差聞來年月食者二可俟驗否十三年右諫議大夫蔣繼周言試用民間有知星曆者遴選提領官以重其事如祖宗之制孝宗曰朝士鮮知星曆者不必專領乃詔有通天文曆算者所在州軍以聞八月布衣皇甫繼明等陳今歲九月望以淳熙曆推之當在十七日實曆敝也太史乃注於十六日之下徇私遷就以掩其過請造新曆而忠輔乞與曆官劉孝榮及繼明等各具己見合用曆法指定今年八月十六日太陰虧食加時早晚有無帶出所見分數及節次生光復滿方面辰刻更點同驗之仰合乾象折衷疏密再請今年八月二十九日驗月見東方一事苟見月餘光則其日不當以為晦也又今年九月十六日驗月未盈一事苟見月體東向之光猶薄則其日不當為望也知晦望之差則朔之差明矣必使氣之與朔無毫髮之差始可演造新曆付禮部議各具先見指定太陰虧食分數方面辰刻定驗折衷詔師魯繼周監之既而孝榮差一點繼明等差二點忠輔差三點乃罷遣之十四年國學進士會稽石萬言淳熙曆立元非是氣朔多差不與天合按淳熙十四年曆清明夏至處暑立秋四氣及正月望二月十二月下弦六月八月上弦十月朔並差一日如卦候盈虛沒滅五行用事亦各隨氣朔而差南渡以來渾儀草創不合制度無圭表以測日景長短無機漏以定交食加時設欲考正其差而太史局官尚如去年測驗太陰虧食自一更一點還光一分之後或一點還光二分或一點還光三分以上或一點還光三分以下使更點乍疾乍徐隨景走弄以肆欺蔽若依晉泰始隋開皇唐開元課曆故事取淳熙曆與萬所造之曆各推而上之於千百世之上以求交食與夫歲月日星辰之著見於經史者為合與否然後推而下之以定氣朔則與前古不合者為差合者為不差甚易見也然其差謬非獨此耳冬至日行極南黃道出赤道二十四度晝極短故四十刻夜極長故六十刻夏至日行極北黃道入赤道二十四度晝極長故六十刻夜極短故四十刻春秋二分黃赤二道平而晝夜等故各五十刻此地中古今不易之法至王普重定刻漏又有南北分野冬夏晝夜長短三刻之差今淳熙曆皆不然冬至晝四十刻極短夜六十刻極長乃在大雪前二日所差一氣以上自冬至之後晝當漸長夜當漸短今過小寒晝猶四十刻夜猶六十刻所差七日有餘夏至晝六十刻極長夜四十刻極短乃在芒種前一日所差亦一氣以上自夏至之後晝當漸短夜當漸長今過小暑晝猶六十刻夜猶四十刻所差亦七日有餘及晝夜各五十刻又不在春分秋分之下至於日之出入人視之以為晝夜有長短有漸不可得而急與遲也急與遲則為變今日之出入增減一刻近或五日遠或三四十日而一急一遲與日行常度無一合者請考正淳熙曆法之差俾之上不違於天時下不乖於人事送祕書省禮部詳之皇甫繼明史元實皇甫逮龐元亨等言石萬所撰五星再聚曆乃用一萬三千五百為日法特竊取唐末崇元舊曆而婉其名爾淳熙曆立法乖疏丙午歲定望則在十七日太史知其不可遂注望於十六日下以掩其過臣等嘗陳請於太史局官對辨置局更曆迄今未行今考淳熙曆經則又差於將來戊申歲十一月下弦則在二十四日太史局官必俟頒曆之際又將妄退於二十三日矣法不足恃必假遷就而朔望二弦曆法綱紀苟失其一則五星盈縮日月交會與夫昏旦之中星晝夜之晷刻皆不可得而正也渾儀景表壺漏之器臣等私家無之是以曆之成書猶有所待國朝以來必假創局而曆始成請依改造大曆故事置局更曆以祛太史局之敝事上聞宰相王淮奏免送後省看詳孝宗曰使祕書省各司同察之亦免有異同之論六月給事中兼修玉牒官王信亦言更曆事以為曆法深奧若非詳加測驗無以見其疏密乞令繼明與萬各造來年一歲之曆取其無差者詔從之十二月進所造曆淮等奏萬等曆日與淳熙十五年曆差二朔淳熙曆十一月下弦在二十四日恐曆法有差孝宗曰朔豈可差朔差則所失多矣乃命吏部侍郎章森祕書丞宋伯嘉參定以聞十五年禮部言萬等所造曆與淳熙曆法不同當以其年六月二日十月晦日月不應見而見為驗兼論淳熙曆下弦不合在十一月二十四日是日請遣官監視詔禮部侍郎尤袤與森監之六月二日森奏是夜月明至一更二點入濁十月晦袤奏晨前月見東方孝宗問諸家孰為疏密周必大等奏三人各定二十九日早月體尚存一分獨忠輔萬謂既有月體不應小盡孝宗曰十一月合朔在申時是以二十九日尚存月體耳十六年承節郎趙渙言曆象大法及淳熙曆今歲冬至並十二月望月食皆後天一辰請遣官測驗詔禮部侍郎李巘祕書省鄧馹等視之巘等請用太史局渾儀測驗如乾道故事差祕書省提舉一員專監之詔差祕書丞黃艾校書郎王叔簡紹熙元年八月詔太史局更造新曆頒之二年正月進立成二卷紹熙二年七曜細行曆一卷賜名會元詔巘序之紹熙四年布衣王孝禮言今年十一月冬至日景表當在十九日壬午會元曆注乃在二十日癸未係差一日崇天曆癸未日冬至加時在酉初七十六分紀元曆在丑初一刻六十七分統元曆在丑初二刻二分會元曆在丑初一刻三百四十分逮今八十有七年常在丑初一刻不減而反增崇天曆實天聖二年造紀元曆崇寧五年造計八十二年是時測景驗氣知冬至後天乃減六十七刻半方與天道協其後陳得一造統元曆劉孝榮造乾道淳熙會元三曆未嘗測景苟弗立表測景莫識其差乞遣官令太史局以銅表同孝禮測驗朝廷雖從之未暇改作慶元四年會元曆占候多差日官草澤互有異同詔禮部侍郎胡紘充提領官正字馮履充參定官監楊忠輔造新曆右諫議大夫兼侍講姚愈言太史局文籍散逸測驗之器又復不備幾何而不疏略哉漢元鳳間言曆者十有一家議久不決考之經籍驗之帝王録然後是非洞見元和間以太初違天益遠晦朔失實使治曆者修之以無文證驗雜議𧔧起越三年始定此無他不得儒者以總其綱故至于此也周官馮相氏保章氏志日月星辰之運動而冢宰實總之漢初曆官猶宰屬也熙寧間司馬光沈括皆嘗提舉司天監故當是時曆數明審法度嚴密乞命儒臣常兼提舉以專其責五年監察御史張巖論馮履唱為詖辭罷去詔通曆算者所在具名來上及忠輔曆成宰臣京鏜上進賜名統天頒之凡曆經三卷八曆冬至考一卷三曆交食考三卷晷景考一卷考古今交食細草八卷盈縮分損益率立成二卷日出入晨昏分立成一卷嶽臺日出入晝夜刻一卷赤道內外去極度一卷臨安午中晷景常數一卷禁漏街鼓更點辰刻一卷禁漏五更攢點昏曉中星一卷將來十年氣朔二卷己未庚申二年細行二卷總三十二卷慶元五年七月辛卯朔統天曆推日食雲陰不見六年六月乙酉朔推日食不驗嘉泰二年五月甲辰朔日有食之詔太史與草澤聚驗於朝太陽午初一刻起虧未初刻復滿統天曆先天一辰有半乃罷楊忠輔詔草澤通曉曆者應聘修治開禧三年大理評事鮑浣之言曆者天地之大紀聖人所以觀象明時倚數立法以前民用而詔方來者自黃帝以來至於秦漢六曆具存其法簡易同出一術既久而與天道不相符合於是太初三統之法相繼改作而推步之術愈見闊疏是以劉洪祖沖之之減破斗分追求月道而推測之法始加詳焉至于李淳風一行而後總氣朔而合法效乾坤而擬數演算之法始加備焉故後世之論曆轉為精密非過於古人也蓋積習考驗而得之者審也試以近法言之自唐麟德開元而至於五代所作者國初應天而至於紹熙會元所更者十二書無非推求上元開闢為演紀之首氣朔同元而七政會於初度從此推步以為曆本未嘗敢輒為截法而立加減數於其間也獨石晉天福間馬重績更造調元曆不復推古上元甲子七曜之會施於當時五年輒差遂不可用識者咎之今朝廷自慶元三年以來測驗氣景見舊曆後天十一刻改造新曆賜名統天進曆未幾而推測日食已不驗此猶可也但其曆書演紀之始起於唐堯二百餘年非開闢之端也氣朔五星皆立虛加虛減之數氣朔積分乃有泛積定積之繁以外算而加朔餘以距算而減轉率無復強弱之法盡廢方程之舊其餘差漏不可備言以是而為術乃民間之小曆而非朝廷頒正朔授民時之書也漢人以謂曆元不正故盜賊相續言雖迂誕然而曆紀不治實國家之重事願詔有司選演撰之官募通曆之士置局討論更造新曆庶幾並智合議調治日法追迎天道可以行遠浣之又言當楊忠輔演造統天曆之時每與議論曆事今見統天曆舛近亦私成新曆誠改新曆容臣投進與太史草澤諸人所著之曆參考之七月浣之又言統天曆來年閏差願以諸人所進曆令祕書省參考頒用祕書監兼國史院編修官實録院檢討官曾漸言改曆重事也昔之主其事者無非道術精微之人如太史公洛下閎劉歆張衡杜預劉焯李淳風一行王朴等然猶久之不能無差其餘不過遞相祖述依約乘除捨短取長移疏就密而已非有卓然特達之見也一時偶中即復舛戾宋朝敝在數改曆法統天曆頒用之初即已測日食不驗因仍至今置閏遂差一月其為當改無疑然朝廷以一代巨典責之專司必其人確然著論破見行之非服衆多之口庶幾可見按乾道淳熙慶元凡三改曆皆出劉孝榮一人之手其後遂為楊忠輔所勝久之忠輔曆亦不驗故孝榮安職至今紹熙以來王孝禮者數以自陳每預測驗或中或不中李孝節陳伯祥本皆忠輔之徒趙達卜筮之流石如愚獻其父書不就測驗晷景止定月食分數其術最疏陳光則並與交食不論愈無憑依此數人者未知孰為可付故鮑浣之屢以為請今若降旨開局不過收聚此數人者和會其説使之無爭來年閏差其事至重今年八月便當頒曆外國而三數月之間急遽成書結局推賞討論未盡必生詆訾今劉孝榮王孝禮李孝節陳伯祥所擬改曆及浣之所進曆皆已成書願以衆曆參考擇其與天道最近且密者頒用庶幾來年置閏不差請如先朝故事搜訪天下精通曆書之人用沈括所議以渾儀浮漏圭表測驗每日記録積三五年前後參較庶幾可傳永久漸又言慶元三年以後氣景比舊曆有差至四年改造新曆未成時當頒五年曆乃差官以測算晷景氣朔加時辰刻附會元曆頒賜今若頒來年氣朔既有去年十月以後今年正月以前所測晷景已見天道冬至加時分數來年置閏比之統天曆亦已不同兼諸所進曆並可參考請速下本省集判局官於本省參考使浣之覆考以最近之曆推算氣朔頒用於是詔漸充提領官浣之充參定官草澤精算造者嘗獻曆者與造統天曆者皆延之於是開禧新曆議論始定詔以戊辰年權附統天曆頒之既而婺州布衣阮泰發獻渾儀十論且言統天開禧曆皆差朝廷令造木渾儀賜文解罷遣之嘉定三年鄒淮言曆書差忒當改造試太子詹事兼同修國史實録院同修撰兼祕書監戴溪等言請詢漸浣之造曆故事詔溪充提領官浣之充參定官鄒淮演撰王孝禮劉孝榮提督推算官生十有四人日法用三萬五千四百四年春曆成未及頒行溪等去國曆亦隨寢韓托胄當國或謂非所急無復敢言曆差者於是開禧曆附統天曆行於世四十五年嘉泰元年中奉大夫守祕書監俞豐等請改造新曆監察御史施康年劾太史局官吳澤荊大聲周端友循默尸祿言災異不及時詔各降一官臣僚言頒正朔所以前民用也比曆書一日之間吉凶並出異端並用如土鬼暗金兀之類則添注於凶神之上猶可也而其首則揭九良之名其末則出九曜吉凶之法勘昏行嫁之法至於周公出行一百二十歲宮宿圖凡閭閻鄙俚之説無所不有是豈正風俗示四夷之道哉願削不經之論從之二年五月朔日食太史以為午正草澤趙大猷言午初三刻半日食三分詔著作郎張嗣古監視測驗大猷言然曆官乃抵罪嘉定四年祕書省著作郎兼權尚左郎丁端祖請考試司天生十三年監察御史羅相言太史局推測七月朔太陽交食至是不食願令與草澤新曆精加討論於是澤等各降一官淳祐四年兼崇政殿説書韓祥請召山林布衣造新曆從之五年降算造成永祥一官以元算日食未初三刻今未正四刻元算虧八分今止六分故也八年朝奉大夫太府少卿兼尚書左司郎中兼敕令所刪修官尹渙言曆者所以統天地侔造化自昔皆擇聖智典司其事後世急其所當緩緩其所當急以為利吾國者惟錢穀之務固吾圉者惟甲兵是圖至於天文曆數一切付之太史局荒疏乖謬安心為欺朝士大夫莫有能詰之者請召四方之通曆算者至都使曆官學焉十一年殿中侍御史陳垓言曆者天地之大紀國家之重事今淳祐十年冬所頒十一年曆稱成永祥等依開禧新曆推算辛亥歲十二月十七日立春在酉正一刻今所頒曆乃相師堯等依淳祐新曆推算到壬子歲立春日在申正三刻質諸前曆乃差六刻以此頒行天下豈不貽笑四方且許時演撰新曆將以革舊曆之失又考驗所食分數開禧舊曆僅差一二刻而李德卿新曆差六刻二分有奇與今頒行前後兩曆所載立春氣候分數亦差六刻則同由此觀之舊曆差少未可遽廢新曆差多未可輕用一旦廢舊曆而用新曆不知何所憑據請參考推算頒行十二年祕書省言太府寺丞張湜同李德卿算造曆書與談玉續進曆書頗有抵牾省官參訂兩曆得失疏密以聞其一曰玉訟德卿竊用崇天曆日法三約用之考之崇天曆用一萬五百九十為日法德卿用三千五百三十為日法玉之言然其二曰玉訟積年一億二千二十六萬七千六百四十六不合曆法今考之德卿用積年一億以上其三曰玉訟壬子年六月癸丑年二月六月九月丙辰年七月置閏皆差一日今祕書省檢閲林光世用二家曆法各為推算其四曰德卿曆與玉曆壬子年立春立夏以下十五節氣時刻皆同雨水驚蟄以下九節氣各差一刻其五曰德卿推壬子年二月乙卯朔日食帶出已退所見大分八玉推日食帶出已退所見大分七辰當壁宿六度同其六曰德卿曆斗分作三百六十五日二十四分二十八秒玉曆斗分作三百六十五日二十四分二十九秒二曆斗分僅差一秒惟二十八秒之法起於齊祖沖之而德卿用之使沖之之法可久何以歷代增之玉既指其謬又多一秒豈能必其天道合哉請得商確推算合衆長而為一然後賜名頒行十二年曆成賜名會元寶祐元年行之史闕其法咸淳六年十一月三十日冬至至後為閏十一月既已頒曆浙西安撫司準備差遣臧元震言曆法以章法為重章法以章歲為重蓋曆數起於冬至卦氣起於中孚十九年謂之一章一章必置七閏必第七閏在冬至之前必章歲至朔同日故前漢志云朔旦冬至是謂章月後漢志云至朔同日謂之章月積分成閏閏七而盡其歲十九名之曰章唐志曰天數終於九地數終於十合二終以紀閏餘章法之不可廢也若此今所頒庚午歲曆乃以前十一月三十日為冬至又以冬至後為閏十一月莫知其故蓋庚午之閏與每歲閏月不同庚午之冬至與每歲之冬至又不同蓋自淳祐壬子數至咸淳庚午凡十九年是為章歲其十一月是為章月以十九年七閏推之則閏月當在冬至之前不當在冬至之後以至朔同日論之則冬至當在十一月初一日不當在三十日今以冬至在前十一月三十日則是章歲至朔不同日矣若以閏月在冬至後則是十九年之內止有六閏又欠一閏且一章計六千八百四十日於內加七閏月除小盡積日六千九百四十日或六千九百三十九日約止有一日今自淳祐十一年辛亥章歲十一月初一日章月冬至後起算十九年至咸淳六年庚午章歲十一月初一日當為冬至方管六千八百四十日今算造官以閏月在十一月三十日冬至之後則此一章止有六閏更加六閏除小盡外實積止六千九百十二日比之前後章歲之數實欠二十八日曆法之差莫甚於此况天正冬至乃曆之始必自冬至後積三年餘分而後可以置第一閏今庚午年章歲丙寅日申初三刻冬至去第二日丁卯僅有四分日之一且未正日安得遽有餘分未有餘分安得遽有閏月則是後一章之始不可推算其謬可知矣今欲改之有簡而易行之説蓋曆法有平朔有經朔有定朔一大一小此平朔也兩大兩小此經朔也三大三小此定朔也今正以定朔之説則當以前十一月大為閏十月小以閏十一月小為十一月大則丙寅日冬至即可為十一月初一以閏十一月初一之丁卯為十一月初二日庶幾遞趲下一日置閏十一月二十九日丁未始為大盡然則冬至既在十一月初一則至朔同日矣閏月既在至節前則十九年七閏矣此昔人所謂晦節無定由時消息上合履端之始下得歸餘於終正謂此也夫曆久未有不差差則未有不改者後漢元和初曆差亦是十九年不得七閏曆雖已頒亦改正之顧今何靳於改之哉元震謂某儒者豈欲與曆官較勝負既知其失安得默而不言邪於是朝廷下之有司遣官偕元震與太史局辨正而太史之詞窮元震轉一官判太史局鄧宗文談玉等各降官有差因更造曆六年曆成詔試禮部尚書馮夢得序之七年頒行即成天曆也德祐之後陸秀夫等擁立益王走海上命禮部侍郎鄧光薦與蜀人楊某等作曆賜名本天曆今亡
