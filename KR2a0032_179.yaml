body:
  text: 宋史卷一百七十九志第一百三十二食貨下一會計宋貨財之制多因於唐自天寶以後天下多事戶口凋耗租稅日削法既變而用不給故興利者進而征斂名額繁矣方鎮握重兵皆留財賦自贍其上供殊鮮五代疆境逼蹙藩鎮益彊率令部曲主場院其屬三司者補大吏以臨之輸額之外亦私有焉太祖周知其弊及受命務恢遠略修建法程示之以漸建隆中牧守來朝猶不貢奉以助軍實乾德三年始詔諸州支度經費外凡金帛悉送闕下毋或占留時藩郡有闕稍命文臣權知所在場務或遣京朝官廷臣監臨於是外權始削而利歸公上條禁文簿漸為精密諸州通判官到任皆須躬閲帳籍所列官物吏不得以售其姦主庫吏三年一易市征地課鹽麴之類通判官兵馬都監縣令等並親臨之見月籍供三司秩滿較其殿最欺隱者置於法募告者賞錢三十萬而小民求財報怨訴訟煩擾未幾除募告之禁先是茶鹽榷酤課額少者募豪民主之民多增額求利歲更荒儉商旅不行至虧常課乃籍其資産以償太宗始詔以開寶八年為額既又慮其未均乃遣使分詣諸州同長吏裁定凡左藏及諸庫受納諸州上供均輸金銀絲帛暨他物令監臨官謹視之欺而多取主稱藏吏皆斬監臨官亦重置其罪罷三司大將及軍將主諸州榷課命使臣分掌掌務官吏虧課當罰長吏以下分等連坐雍熙二年令三司勾院糾本部陷失官錢及百千賞以十之一至五千貫者遷其職淳化元年詔曰周設司會之職以一歲為準漢制上計之法以三年為期所以詳知國用之盈虛大行羣吏之誅賞斯乃舊典其可廢乎三司自今每歲具見管金銀錢帛軍儲等簿以聞四年改三司為總計司左右大計分掌十道財賦令京東西南北各以五十州為率每州軍歲計金銀錢繒帛芻粟等費逐路關報總計司總計司置簿左右計使通計置裁給餘州亦如之未幾復為三部宋聚兵京師外州無留財天下支用悉出三司故其費寖多太宗孜孜庶務或親為裁決有司嘗言油衣帟幕損破者數萬段帝令之染以雜色制旗幟數千調退材給窰務為薪俾擇其可用者造什物數千事其愛民惜費類此真宗嗣位詔三司經度茶鹽酒稅以充歲用勿增賦斂以困黎元是時條禁愈密較課以祖額前界遞年相參景德初榷務連歲增羡三司即取多收者為額帝慮或致掊克詔凡增額比奏上封者言諸路歲課增羡知州通判皆書曆為課最有虧者則無罰乃令諸路茶鹽酒稅及諸場務自今總一歲之課合為一以額較之有虧則計分數知州通判減監官一等科罰州司典吏減專典一等論大臣及武臣知州軍者止罰通判以下至道末天下總入緡錢二千二百二十四萬五千八百三歲一親祀郊丘計緡錢常五百餘萬大半以金銀綾綺絁紬平其直給之天禧末上供惟錢帛增多餘以移用頗減舊數而天下總入一萬五千八十五萬一百出一萬二千六百七十七萬五千二百而贏數不預焉景德郊祀七百餘萬東封八百餘萬祀汾陰上寶冊又增二十萬丁謂為三司使著景德會計録以獻林特領使亦繼為之凡舉大禮有司皆籍當時所費以聞必優詔奬之初吳蜀江南荊湖南粵皆號富強相繼降附太祖太宗因其蓄藏守以恭儉簡易天下生齒尚寡而養兵未甚蕃任官未甚冗佛老之徒未甚熾外無金繒之遺百姓亦各安其生不為巧僞放侈故上下給足府庫羡溢承平既久戶口歲增兵籍益廣吏員益衆佛老外國耗𢀿中土縣官之費數倍於昔百姓亦稍縱侈而上下始困於財矣仁宗承之經費寖廣天聖初首命有司取景德一歲用度較天禧所出省其不急者自祥符天書一出齊醮糜費甚衆京城之內一夕數處至是始大裁損京師營造多內侍傳旨呼索費無藝極帝與太后知其弊詔自今營造所須先下三司度功費然後給又減內外宮觀清衛卒及工匠分隸諸軍八作司舊殿直已上雖幼未任朝謁遇乾元長寧節皆賜服至是亦罷給故事上尊號諡號隨冊寶物並用黃金帝曰先帝太后用黃金若朕所御止用塗金時洞真宮壽寧觀相繼災宰相張知白請罷不急營造以答天戒及滑州塞決河御史知雜王鬷復以為言既而玉清昭應宮災遂詔諭中外不復繕修自是道家之奉有節土木之費省矣帝天資恭儉尤務約己以先天下有司言利者多擯不取聞民之有疾苦雖厚利舍之無所愛貢獻珍異故事有者或罷之山林川澤陂池之利久與民共者屢敕有司毋輒禁止至於州縣征取苛細蠲減蓋不可勝數至寶元中陝西用兵調度百出縣官之費益廣天章閣侍講賈昌朝言臣嘗治畿邑邑有禁兵三千而留萬戶賦輸僅能取足郊祀慶賞乃出自內府計江淮歲運糧六百餘萬石以一歲之入僅能充期月之用三分二在軍旅一在冗食先所蓄聚不盈數載天下久無事而財不藏於國又不在民儻有水旱軍戎之急計將安出於是議省冗費右司諫韓琦言省費當自掖庭始請詔三司取先朝及近歲賜豫支費之數裁為中制無名者一切罷之乃令入內內侍省御藥院內東門司裁定有司不預焉議者或欲損吏兵奉賜帝謂祿廩皆有定制毋遽變更以搖人心尹洙在陝西請為鬻爵之法亦不果行其後西兵久不解財用益屈內出詔書減皇后至宗室婦郊祠半賜著為式皇后嬪御進奉乾元節回賜物皆減半宗室外命婦回賜權罷於是皇后嬪御各上奉錢五月以助軍費宗室刺史已上亦納公使錢之半荊王元儼盡納公使錢詔給其半後以元儼叔父全給如故帝亦命罷左藏庫月進錢一千二百緡公卿近臣以次減郊祠所賜銀絹舊四千三千者損一千千損三百三百損百百損二十皆著為式三司使王堯臣取陝西河北河東三路未用兵及用兵後歲出入財用之數會計以聞寶元元年未用兵三路出入錢帛糧草陝西入一千九百七十八萬出二千一百五十一萬河北入二千一十四萬出一千八百二十三萬河東入一千三十八萬出八百五十九萬用兵後陝西入三千三百九十萬出三千三百六十三萬蓋視河東北尤劇以兵屯陝西特多故也又計京師出入金帛寶元元年入一千九百五十萬出二千一百八十五萬是歲郊祠故出入之數視常歲為多慶曆二年入二千九百二十九萬出二千六百一十七萬而奇數皆不預焉會元昊請臣朝廷亦已厭兵屈意撫納歲賜繒茶增至二十五萬而契丹邀割地復增歲遺至五十萬自是歲費彌有所加西兵既罷而調用無所減乃下詔切責邊臣及轉運司趣議裁節稍徙戍兵還內地命三司戶部副使包拯行河北與邊臣轉運司議罷省冗官汰軍士之不任役者詔翰林學士承旨王堯臣等較近歲天下財賦出入之數相參耗登皇祐元年入一億二千六百二十五萬一千九百六十四而所出無餘堯臣等為書七卷上之送三司取一歲中數以為定式初真宗時內外兵九十一萬二千宗室吏員受祿者九千七百八十五寶元以後募兵益廣宗室蕃衍吏員歲增至是兵一百二十五萬九千宗室吏員受祿者萬五千四百四十三祿廩奉賜從而增廣又景德中祀南郊內外賞賚金帛緡錢總六百一萬至是饗明堂增至一千二百餘萬故用度不得不屈至和中諫官范鎮上疏曰陛下每遇水旱之災必露立仰天痛自刻責而吏不稱職陛下憂勤于上人民愁嘆于下今歲無麥朝廷為放稅免役及發倉廩拯貸存恤之恩不為不至然人民流離父母妻子不相保者平居無事時不少寬其力役輕其租賦歲大熟民不得終歲之飽及有小歉雖加重放已不及事此無他重斂之政在前也國家自陝西用兵以來賦役煩重及近年轉運使復於常賦外進羡錢以助南郊其餘無名斂率不可勝計又言古者冢宰制國用今中書主民樞密主兵三司主財各不相知故財已匱而樞密院益兵不已民已困而三司取財不已中書視民之困而不知使樞密減兵三司寬財者制國用之職不在中書也願使中書樞密通知兵民財利大計與三司量其出入制為國用則天下民力庶幾少寬然自天聖以來帝以經費為慮屢命官裁節而有司不能承上之意卒無所建明治平中兵數少損隸籍者猶百十六萬二千宗室吏員視皇祐無慮增十之三英宗以勤儉自飭然享國日淺於經紀法度所未暇焉治平二年內外入一億一千六百十三萬八千四百五出一億二千三十四萬三千一百七十四非常出者又一千一百五十二萬一千二百七十八是歲諸路積一億六千二十九萬二千九十三而京師不預焉神宗嗣位尤先理財熙寧初命翰林學士司馬光等置局看詳裁減國用制度仍取慶曆二年數比今支費不同者開析以聞後數日光登對言國用不足在用度大奢賞賜不節宗室繁多官職冗濫軍旅不精必須陛下與兩府大臣及三司官吏深思救弊之術磨以歲月庶幾有效非愚臣一朝一夕所能裁減帝遂罷裁減局但下三司共析王安石執政議置三司條例司講修錢穀之法帝因論措置之宜言今財賦非不多但用不節何由給足宮中一私身之奉有及八十千者嫁一公主至費七十萬緡沈貴妃料錢月八百緡聞太宗時宮人惟繫皂紬襜元德皇后嘗用金線緣襜太宗怒其奢仁宗初定公主奉料以問獻穆再三始言初僅得五貫爾異時中宮月有止七百錢者時天下承平帝方經略四夷故每以財用不給為憂日與大臣講求其故命官考三司簿籍商量經久廢置之宜凡一歲用度及郊祀大費皆編著定式有司請造龍圖天章閣覆闌檻青氈四百九十帝謂禁中諸殿闌檻率故弊不必覆也既而並延福宮覆檻氈罷之後呂嘉問復建議省儀鸞司供禁中綵帛是歲詔內外勿給土木工作非兩宮倉廩武庫皆罷省三年儀鸞司闕氈三千三司請命河東製之帝曰牛羊司積毛數萬斤皆同糞壤三司不取於此而欲勤遠民乎全州歲貢班竹簾簡州歲貢綿紬安州市紅花萬斤梓州市碌二千斤帝皆以道遠擾民亟命停罷制置司言諸路科買上供羊民費錢幾倍而河北榷場博買契丹羊歲數萬路遠抵京皆瘦惡耗死公私費錢四十餘萬緡詔著作佐郎程博文訪利害博文募民有保任者以産為抵官預給錢約期限口數斤重以輸民多樂從歲計充足凡供御膳及祀祭與泛用者皆別其牢棧以三千為額所裁省冗費十之四其後又用呂嘉問劉永淵之言治竈藏冰以省工費帝嘗患增置官司費財王安石謂增置官司所以省費帝曰古者什一而稅今取財百端安石謂古非特什一而已帝又以倉吏給軍食多侵盜詔足其概量嚴立諸倉丐取法中書因請增諸倉主典役人祿至一萬八千九百緡且盡增選人之祿均其多寡令録增至十五千司理至簿尉防團軍監推判官增至十二千其後又增中書審官東西三班院樞密院三司吏部流內銓南曹開封府吏祿受財者以倉法論安石蓋欲盡祿天下之吏帝以役法未就緩其議三司上新增吏祿數京師歲增四十一萬三千四百餘緡監司諸州六十八萬九千八百餘緡時主新法者皆謂吏祿既厚則人知自重不敢冒法可以省刑然良吏實寡賕取如故往往陷重辟議者不以為善初陝西用兵凡費緡錢七百餘萬帝以問王安石安石曰楚建中考沈起簿書計一道半歲費錢銀紬絹千二百萬貫匹兩帝因欲知陝西歲用錢穀金帛及增虧凡數乃詔薛向條上王安石以為擾力請罷之止詔三司帳司會計熙寧六年天下財用出入之數以聞韓絳既相建言三司總天下財賦請選官置司以天下戶口人丁稅賦場務坑冶河渡房園之類租額年課及一路錢穀出入之數去其重復歲比較增虧廢置及羡餘橫費計贏闕之處使有無相通而以任職能否為黜陟則國計大綱可以省察三司使章惇亦以為言乃詔置三司會計司以絳提舉其後一州一路會計式成上之餘未就緒未幾遂罷元豐官制既行三司所掌職務散於六曹諸寺監元祐初司馬光言今戶部尚書舊三司使之任左曹隸尚書右曹不隸焉天下之財分而為二視彼有餘視此不足不得移用宜令尚書兼領左右曹侍郎分職而治舊三司所掌錢穀財用事有散於五曹及諸寺監者並歸戶部遂詔尚書省立法有司請以府界諸路在京庫務及常平等文帳悉歸戶部初熙寧五年患天下文帳之繁命曾布刪定法式布因請選吏於三司顓為一司帳司之置始此至元豐三年首尾七八年所設官吏僅六百人費錢三十九萬緡而勾磨出失陷錢止萬緡朝廷知其無益遂罷帳司使州郡應上省帳皆歸轉運司惟錢帛糧草酒麴商稅等別為計帳上戶部至是令戶部盡收諸路文帳蘇轍時為諫官謂徒益紛紛請如舊為便不行三年戶部尚書韓忠彥侍郎蘇轍韓宗道言文武百官宗室之蕃一倍皇祐四倍景德班行選人胥吏率皆增益而兩稅征榷山澤之利與舊無以相過治平熙寧之間因時立政凡改官者自三歲而為四歲任子者自一歲一人而為三歲一人自三歲一人而為六歲一人宗室自袒免以上漸殺恩禮此則今日之成法乞檢會寶元慶曆嘉祐故事置司選官共議詔戶部取應干財用除諸班諸軍料錢衣賜賞給特支如舊外餘費並裁省又詔方將裁損入流以清取士之路命今後遇聖節大禮生辰太皇太后皇太后皇太妃所得恩澤並四分減一於是上自宗室貴近下至官曹胥吏旁及宮室械器皆命裁損久之事未就議者謂裁減浮費所細碎苛急甚損國體於是已議未行者一切寢之後乃詔元祐裁損除授正任以下奉祿失朝廷優禮見條悉除之循元豐舊制元豐鈎考隱漏官錢督及一分者賞三釐自元祐改法賞薄而吏怠遂復其舊時議裁損吏祿隸省曹寺監者止以元豐三年錢數為額而吏三省者凡兼領因事別給並舊請並罷劉摯遂乞悉罷創增吏祿詔韓維等究度然不果罷其後有司計中都吏祿歲費緡錢三十二萬詔以坊場稅錢給之於是吏祿之冗濫者率多革去矣然三省吏猶有人受三奉而不改者故孫升傅堯俞皆以為言至紹聖元符務反元祐之政下至六曹吏亦詔皆給見緡如元豐之制先是既罷導洛堆𣛀等局又罷熙河蘭會經制財用司減放市易缺負及積缺租輸選官體量茶鹽之法使者之刻剝害民如吳居厚呂孝廉王子京李琮內臣之生事斂怨如李憲宋用臣等皆相繼正其罪既而稍復講修財利李清臣因白帝今中外錢穀艱窘戶部給百官奉常無數月之備章惇遂以財用匱乏專指為司馬光呂公著呂大防蘇轍諸人之罪左司諫翟思亦奏疏詆元祐以理財為諱利入名額類多廢罷督責之法不加於在職之臣財利既多散失且借貸百出而熙豐餘積用之幾盡方今內外財用月計歲會所入不足給所出願下諸路會元祐以前所儲金穀及異時財利名額歲入經數著為成式建中靖國元年詔諸路轉運司以歲入財用置都籍定諸州祖額且計一路凡數即有贏縮書其籍崇寧元年又令歲以錢穀出入名數報提刑司保驗以上戶部戶部歲條諸路轉運使財賦虧贏以行賞罰諸路無額錢物立式下提刑司括三年外未發數期以一季聞奏二年官吏違負上供錢物以分數為科罪之等不及九分者罪以徒多者更加之歲首則列次年之數聞於漕司考實申部又以督限未嚴更一季為一月然國之經費往往不給五年詔省罷官局命戶部侍郎許幾專切提舉措置裁罷開封府重祿通引官客司並街道司額外兵士及罷在京料次錢三十八處大觀三年罷諸路州軍見貢六尚局供奉物名件四百四十餘存者才十一二減數十二停貢六戶部侍郎范坦言戶部歲入有限支用無窮一歲之入僅了三季餘仰朝廷應付今歲支遣較之去年又費百萬有詔鐫減財賦命御史中丞張克公與吳居厚許幾等置局論議克公抗言官冗者汰奉厚者減今官較之元祐已多十倍國用安得不乏乞將節度使下至遙郡刺史除軍功轉授者各減奉半然後間慢局務工伎末作亦宜減省自貴及賤自近及遠行之公當人自無詞時論韙之時諸路轉運司類以乏告詔戶部編次一歲財用出納之數諸路州縣各為都籍以待考較工部金銀銅鉛水銀朱砂等亦嚴帳籍之法令諸路各條三十年以還一歲出入及泛用之數初比部掌勾稽天下文帳吏習偷惰自崇寧至政和稽違積數凡二千六百七十有餘於是申敕六曹以拘督一歲多寡為寺監賞罰政和七年命戶部參稽熙豐及今財用有餘不足之數又立旁通格令諸路漕司各條元豐紹聖崇寧政和一歲財用出入多寡來上淮南漕臣張根言天下之費莫大於土木之功其次如人臣賜第一第無慮數十萬緡稍增雄麗非百萬不可佐命如趙普定策如韓琦不聞峻宇雕牆僭擬宮省奈何剝民膚髓為廝役之奉乎其次如田産房廊雖不若賜第之多然日削月朘所在無幾又如金帛以供一時之好賜有不可已者而亦不可不節至如賜帶其直雖不過數百緡然天下金寶糜費日久夫豈易得今乃賚及僕隸使混淆公卿間貴賤賢不肖莫之辨也如以為左右趨走之人不欲其墨綬當別為制度以示等威疏奏不省重和初罷講畫經費局有司議勾收白地禁榷鐵貨方田增稅榷酤增價量收醋息河北添折稅米等俄慮騷擾悉罷之併焚其條約未幾又置裕民局命蔡京提舉徐處仁詳定京大不悅尋亦罷宣和元年以左藏庫虧沒一百七十九萬有奇乃別造都籍催轄司太府寺左藏庫互相鈎考以絶姦弊帝初即位思節冗費中都吏重復增給及泛濫員額並詔裁損後苑嘗計增葺殿宇計用金箔五十六萬七千帝曰用金為箔以飾土木一壞不可復收甚亡謂也令內侍省罰請者及蔡京為相增修財利之政務以侈靡惑人主動以周官惟王不會為說每及前朝惜財省費者必以為陋至於土木營造率欲度前規而侈後觀元豐改官制在京官司供給之數皆併為職錢視嘉祐治平時賦祿優矣京更增供給食料等錢於是宰執皆然京既罷相帝惡其變亂法度將盡更革命戶部侍郎許幾裁損浮費及百官濫祿悉循元豐之舊宰執亦聽辭所增奉京不便與其黨倡言減奉非治世事司馬光請聽宰臣辭南郊給賜神宗卒不允且增選人及庶人在官者之奉帝以繼述為事當奉承神宗由是官吏奉給並仍舊而宰執亦增如故初宰執堂食亦皆有常數至是品目猥多有公使泛支之別臺省寺監又增廚錢侍御史毛注嘗奏論之不行蔡京復得政言者遂以裁損祿廩為幾罪幾坐奪職于時天下久平吏員冗溢節度使至八十餘員留後觀察下及遙郡刺史多至數千員學士待制中外百五十員京又專用豐亨豫大之說諛悅帝意始廣茶利歲以一百萬緡進御以京城所主之其後又有應奉司御前生活所營繕所蘇杭造作局御前人船所其名雜出大率爭以奇侈為功歲運花石綱一石之費民間至用三十萬緡姦吏旁緣牟取無藝民不勝弊用度日繁左藏庫異時月費緡錢三十六萬至是衍為一百二十萬又三省密院吏員猥雜有官至中大夫一身而兼十餘奉故當時議者有奉入超越從班品秩幾於執政之言又增置兼局禮制明堂詳定國朝會要九域圖志一司敕令之類職秩繁委廩給無度侍御史黃葆光論其弊帝善之而未行俄而詔云當豐亨豫大之時為衰亂減損之計自是罕敢言者然吏祿泛冒已極以史院言之供檢吏三省幾千人蔡京又動以筆帖於榷貨務支賞給有一紙至萬緡者京所侵私以千萬計朝論喧然乃詔三省樞密院吏額用元豐法其歲賜悉裁之時翕然以為快臣僚上言諸州遇天寧節除公使外別給係省錢充錫宴之用獨諸路監司許支逐司錢物一筵之饌有及數百千者浮侈相誇無有藝極自是詔遇天寧節宴舊應給錢者發運監司每司不得過三百貫餘每司不得過二百貫以上舊給數少者止依舊自崇寧以來言利之臣殆析秋毫沿汴州縣創增鎮柵以牟稅利官賣石炭增二十餘場而天下市易務炭皆官自賣名品瑣碎則有四腳鋪牀榨磨水磨廟圖淘沙金等錢不得而盡記也宣和以後王黼專主應奉掊剝橫賦以羡為功嶺南川蜀農民陂罰錢罷學制學事司贍學錢皆歸應奉司所入雖多國用日匱六年尚書左丞宇文粹中言近歲南伐蠻獠北贍幽燕關陝綿茂邊事日起山東河北寇盜竊發賦斂歲入有限支梧繁夥一切取足於民陝西上戶多棄産而居京師河東富人多棄産而入川蜀河北衣被天下而蠶織皆廢山東頻遭大水而耕稼失時他路取辦目前不務存恤穀麥未登已先俵糴歲賦已納復理缺負託應奉而買珍異奇寶缺民積者一路至數十萬計假上供而織文繡錦綺役工女者一郡至百餘人陛下勤恤民隱詔令數下悉為虛文民不聊生不惟寇盜繁滋竊恐災異數起祖宗之時國計所仰皆有實數有額上供四百萬無額上供二百萬京師商稅店宅務抵當所諸處雜收錢一百餘萬三司以七百萬之入供一年之費而儲其餘以待不測之用又有解池鹽鈔晉礬市舶遺利內贍京師外實邊鄙間遇水旱隨以振濟蓋量入為出沛然有餘近年諸局務應奉等司截撥上供而繁富路分一歲所入亦不敷額然創置書局者比職事官之數為多檢計修造者比實用之物增倍其他妄耗百出不可勝數若非痛行裁減慮智者無以善其後久之乃詔蔡攸等就尚書省置講議財利司除茶法已有定制餘並講究條上攸請內侍職掌事干宮禁應裁省者委童貫取旨時貫以廣陽郡王領右府故也於是不急之務無名之費悉議裁省帝亦自罷諸路應奉官吏省六尚歲貢七年詔諸路帥臣監司各條所部當裁省凡目以聞後苑書藝局等月省十九萬緡歲可省二百二十萬應奉司所管諸色窠名錢數內兩浙路鈔旁定帖息錢湖常溫秀州無額上供錢淮南路添酒錢等並行截節更不充應奉支用十二月詔曰比年寬大之詔數下裁省之令屢行有司便文而實惠不至蓋緣任用非人興作事端𢀿耗邦財假享上之名濟營私之欲漁奪百姓無所不至朕夙夜痛悼思有以撫循慰安之應茶鹽立額結絶應奉司兩浙諸路置局及花石綱等諸路非泛上供拋降物色延福宮西城所租課內外修造諸處採斫木植製造局所並罷諸局及西城所見管錢物並付有司其拘收到百姓地土並給還舊佃人減掖庭用度減侍從官以上月廩及罷諸兼局以上並令有司據所得數撥充諸路糴本及樁充募兵賞軍之用應齊醮道場除舊法合有外並罷道官及撥賜宮觀等房錢田土之類六尚並依祖宗法罷大晟府罷教樂所罷教坊額外人罷行幸局罷採石所罷待詔額外人罷都茶場依舊歸朝廷河坊非危急泛科免夫錢並罷是時天下財用歲入有御前錢物朝廷錢物戶部錢物其措置裒斂取索支用各不相知天下財賦多為禁中私財上溢下漏而民重困言者請令戶部周知大數而不失盈虛緩急之宜上至宮禁所須下逮吏卒廩餼一切付之有司格以法度示天下以至公詔可戶部尚書聶山亦請以熙豐後增置添給如額外醫官內中諸閣分位次主管文字等使臣福源靈應諸觀清衛卒后妃戚里及文武臣僚之家母妻封國太夫人郡太夫人等請給並添給食料茶湯等錢四十萬八千九百餘緡凡熙豐無法該載者罷之靖康元年詔日朕託於兆庶之上永念民惟邦本思所以閔恤安定之乃者減乘輿服御放宮女罷苑囿焚玩好之物務以率先天下減冗官澄濫賞汰貪吏為民除害方詔減上供收買之額蠲有司煩苛之令輕刑薄賦務安元元而田里之間愁痛未蘇儻不蠲革何以靖民今詣酌庶言疏剔衆弊舉其綱目以授四方詔到監司郡守其悉力奉行應民所疾苦不在此詔許推類聞奏於是凡當時苛刻煩細一切不便於民者皆罷高宗建炎元年詔諸路無額上供錢依舊法更不立額三年二月減婺州上供額羅二萬八千匹著為定制閏八月減福建廣南路歲買上供銀三分之一紹興二年罷鎮江府御服羅省錢七萬緡助劉光世軍四年二月詔諸路州縣天申節禮物並置場和買毋得抑配於民十有一月免淮南州軍大禮絹五年以四川上供錢帛依舊留以贍軍十一年始命四川上供羅復輸內藏其後綾紗絹悉如之四路天申節大禮絹及上供紬綾錦綺共九萬五千八百匹淳熙五年湖北漕臣劉焞言鄂嶽漢陽自紹興九年所收賦財十分為率儲一分充上供始十三年年增二分鄂州元儲一分錢一萬九千五百七十緡今已增至一十二萬九千餘緡嶽州五千八百餘緡今增至四萬二千一百餘緡漢陽三千七百緡今增至二萬二千三百餘緡民力凋弊無所從出於是以見增錢數立額已後權免遞增詔夔州路九州百姓科買上供金銀絹自淳熙六年為始盡免十六年蠲兩淮州軍合發上供諸窠名錢物極邊全免次邊展免一年紹定元年江浙諸州軍折輸上供物帛錢數除合起輕貨並用錢會中半路不通水願以銀折輸者聽兩不過三貫三百文兩浙江東共四百一十三萬八千六百一十二貫有奇並輸送左藏西庫咸淳六年都省言南渡以來諸路上供數重自嘉定至嘉熙起截之數雖減而州縣猶以大數拘催害及百姓有旨自咸淳七年為始銀錢關會用咸淳三年起截中數拘催紬絹絲綿綾羅用咸淳二年起截中數拘催錢關會子二千四百九十五萬八千七百四十八貫銀一十六萬九千六百四十三兩紬四萬一千四百三十八匹絹七十三萬七千八百六十匹絲九萬五千三百三十三兩綿一百五萬七千九百二十五兩綾五千一百七十九匹羅七千三百五十五匹戶部遍牒諸路視今所減定額起催所謂經總制錢者宣和末陳亨伯以發運兼經制使因以為名建炎二年高宗在揚州四方貢賦不以期至戶部尚書呂頤浩翰林學士葉夢得等言亨伯以東南用兵嘗設經制司取量添酒錢及增一分稅錢頭子賣契等錢斂之於細而積之甚衆及為河北轉運使又行於京東西河北路一歲得錢近二百萬緡所補不細今若行於諸路州軍歲入無慮數百萬計邊事未寧苟不出此緩急必致暴斂與其斂於倉卒曷若積於細微於是以添酒錢添賣糟錢典賣田宅增牙稅錢官員等請給頭子錢樓店務增三分房錢令兩浙江東西荊湖南北福建二廣收充經制錢以憲臣領之通判斂之季終輸送紹興五年參政孟庾提領措置財用請以總制司為名又因經制之額增析而為總制錢而總制錢自此始矣財用司言諸路州縣出納係省錢所收頭子錢貫收錢二十三文省內一十文省作經制起發上供餘一十三文充本路郡縣並漕司用今欲令諸路州縣雜稅出納錢貫收頭子錢上量增作二十三文足除漕司及州舊合得一十三文省餘盡入經制窠名帳內起發助軍江西提舉司言常平錢物舊法貫收頭子錢五文足今當依諸色錢例增作二十三文足除五文依舊法支用餘增到錢與經制司別作窠名輸送九年諫議大夫曾統上疏言經制使本戶部之職更置一司無益於事如創供給酒庫亦是陰奪省司之利若謂監司郡縣違法廢令別建此司按之則又不然夫朝廷置監司以轄州郡立省部以轄監司祖宗制也稅賦失實當問轉運司常平錢穀失陷當問提舉司若使經制司能事事檢察則雖戶部版曹亦可廢矣且自置司以來漕司之移用憲司之贓罰監司之妄支固未嘗少革其弊罷之便疏奏不省十六年以諸路歲取經總制錢本路提刑並檢法幹辦官拘催歲終通紐以課殿最二十一年以守倅同檢察二十九年詔專以通判主之乾道元年詔諸路州縣出納貫添收錢一十三文省充經總制錢以所增錢別輸左藏西庫補助經費自是經總制錢每千收五十六文矣然遇兵凶亦時有蠲免三年復以守倅共掌之淳熙十六年光宗即位減江東西福建淮東浙西經總制錢一十七萬一千緡紹熙二年詔平江府合發經總制錢歲減二萬緡嘉定十七年詔蠲嘉定十五年終以前所虧錢數端平三年詔諸路州軍因災傷檢放苗米毋收經總制頭子勘合朱墨等錢自今已放苗米隨苗帶納錢並與除放所謂月樁錢者始於紹興之二年時韓世忠駐軍建康宰相呂頤浩朱勝非議令江東漕臣月樁發大軍錢十萬緡以朝廷上供經制及漕司移用等錢供億當時漕司不量州軍之力一例均科既有偏重之弊上供經制無額添酒錢並淨利錢贍軍酒息錢常平錢及諸司封樁不封樁係省不係省錢皆是朝廷窠名也於是郡縣橫斂銖蹟絲纍江東西之害尤甚十七年詔州郡以寬剩錢充月樁以寬民力遂減江東西之錢二十七萬七千緡有奇又有所謂板帳錢者亦軍興後所創也如輸米則增收耗剩交錢帛則多收糜費幸富人之犯法而重其恣胥吏之受賕而課其入索盜贓則不償失主檢財産則不及卑幼亡僧絶戶不俟核實而入官逃産廢田不與消除而抑納他如此類不可遍舉州縣之吏固知其非法然以版帳錢額太重雖欲不橫取於民不可得已凡貨財不領於有司者則有內藏庫蓋天子之別藏也縣官有巨費左藏之積不足給則發內藏佐之宋初諸州貢賦皆輸左藏庫及取荊湖定巴蜀平嶺南江南諸國珍寶金帛盡入內府初太祖以帑藏盈溢又於講武殿後別為內庫嘗謂軍旅饑饉當預為之備不可臨事厚斂於民太宗嗣位漳泉吳越相次獻地又下太原儲積益厚分左藏庫為內藏庫令內藏庫使翟裔等於左藏庫擇上綾羅等物別造帳籍月申樞密院改講武殿後庫為景福殿庫俾隸內藏其後乃令揀納諸州上供物具月帳於內東門進入外庭不得預其事帝因謂左右曰此蓋慮司計之臣不能節約異時用度有闕復賦率於民朕不以此自供嗜好也自乾德開寶以來用兵及水旱振給慶澤賜賚有司計度之所闕者必籍其數以貸於內藏候課賦有餘即償之淳化後二十五年間歲貸百萬有至三百萬者纍歲不能償則除其籍景德四年又以新衣庫為內藏西庫初劉承圭嘗掌庫經制多其所置又推究置庫以來出納造都帳及須知屢加賞焉真宗再臨幸作銘刻石大中祥符五年重修庫屋增廣其地既而又以香藥庫儀鸞司屋益之分為四庫金銀一庫珠玉香藥一庫錦帛一庫錢一庫金銀珠寶有十色錢有新舊二色錦帛十三色香藥七色天禧二年又出內藏緡錢二百萬給三司天聖以後兵師水旱費無常數三歲一賚軍士出錢百萬緡紬絹百萬匹銀三十萬兩錦綺鹿胎透背綾羅紗縠合五十萬匹以佐三司又歲入饒池江建新鑄緡錢一百七萬而斥舊蓄緡錢六十萬於左藏庫率以為常異時三司用度不足必請貸於內藏輒得之其名為貸實罕能償景祐中內藏庫主者言歲斥緡錢六十萬助三司自天禧三年始計明道二年距今才四年而所貸錢帛九百一十七萬在太宗時三司所貸甚衆久不能償至慶曆中詔悉蠲之蓋內藏歲入金帛皇祐中二百六十五萬七千一十一治平一百九十三萬三千五百五十四其出以助經費前後不可勝數至於儲積贏縮則有司莫得詳焉神宗臨御之初詔立歲輸內藏錢帛之額視慶曆上供為數嘗謂輔臣曰比閲內藏庫籍文具而已財貨出入初無關防舊以龍腦珍珠鬻於榷貨務數年不輸直亦不鈎考嘗聞太宗時內藏財庫每千計用一牙錢記之凡名物不同所用錢色亦異他人莫能曉匣而置之御閣以參驗帳籍中定數晚年出其錢示真宗曰善保此足矣今守藏內臣皆不曉帳籍關防之法即命幹當御藥李舜舉領其事繼詔諸路金銀輸內藏庫者歲以帳上三司拘催元豐以來又詔諸路金帛緡錢輸內庫者委提點刑獄司督趣若三司發運司擅留者坐之起發坊場錢勿寄市易務直赴內藏庫寄帳封樁當輸內庫金帛緡錢踰期或他用者如擅用封樁錢法初藝祖嘗欲積縑帛二百萬易敵人首又別儲於景福殿元豐初乃更景福殿庫名自製詩以揭之曰五季失圖玁狁孔熾藝祖造邦思有懲艾爰設內府基以募士曾孫保之敢忘厥志一字一庫以號之凡三十二庫後積羡贏為二十庫又揭詩曰每虔夕惕心妄意遵遺業顧豫不武姿何日成戎捷元祐元年監察御史上官均言自新官制蓋有意合理財之局總于一司故以金部右曹主行內藏受納而奉宸內藏庫受納又隸太府寺然按其所領不過關通所入名數為之拘催而已支用多寡不得轉質總領之者止中官數十人彼惟知謹扃鑰塗窗牖以為固密爾又安能鈎考其出入多少與夫所蓄之數哉宜因官制之意令戶部太府寺於內藏諸庫皆得檢察明年詔內藏庫物聽以多寡相除置庫百餘年至是始編閲云崇寧元年詔祖宗置內藏庫貯經費餘財所以募士威敵振乏固本皆有成法比歲官司懈弛侵𢀿耗減務在協力遵守無令偏廢於是命倉部郎中丘括行諸路驅磨三年中書奏熙寧之制江南諸路金銀課利並輸內帑元祐中戶部尚書李常於中以三分助轉運司致內帑漸以虧減乃詔諸路新舊坑冶所收課利金銀並輸內帑如熙寧之舊後又入於大觀東庫尋命仍舊以七分輸內帑餘給轉運司宣和六年申截留借兌內帑錢物之制時又有元豐庫則雜儲諸司羡餘錢諸道榷酤場舊以酬衙前之陪備官費者熙寧役法行乃聽民增直以售取其價給衙前久之坊場錢益多司農請歲發百萬緡輸中都元豐三年遂於司農寺南作元豐庫貯之以待非常之用元祐元年右司諫蘇轍論河北保甲之害因言元豐及內庫財物山委皆先帝多方蓄藏以備緩急若積而不用與東漢西園錢唐之瓊林大盈二庫何異願以三十萬緡募保甲為軍尋用其議元祐三年改封樁錢物庫為元祐庫未幾分元豐庫為元豐南北庫數月以北庫為司空呂公著廨封樁並附南庫仍舊元豐六年詔歲以內藏庫緡錢五十萬樁元豐庫補助軍費崇寧以後諸路封樁禁軍闕額給三路外與常平坊場免役紬絹貼輸東北鹽錢及鬻賣在官田屋錢應前收樁管封樁權添酒錢侵占房廊白地錢公使庫遺利等錢並輸元豐庫別又置大觀庫制同元豐但分東西之別最後建宣和庫有泉貨幣餘服御玉食器貢等名蓋蔡絛欲效王黼以應奉司貢獻要寵事不足紀靖康元年詔諸路公使庫及神霄宮金銀器皿所在盡輸元豐庫戶部尚書聶山輒取元豐庫北珠宰相吳敏白帝言朝廷有元豐大觀庫猶陛下有內藏庫朝廷有闕用需於內藏必得旨然後敢取戶部豈可擅取朝廷庫務物哉若人人得擅取庫物則綱紀亂矣欽宗然之南渡內藏諸庫貨財之數雖不及前然兵興用乏亦時取以為助其籍帳之詳莫得而考則以後宋史多闕云
