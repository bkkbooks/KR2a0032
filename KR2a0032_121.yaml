body:
  text: 宋史卷一百二十一志第七十四禮二十四軍禮禡祭閲武受降獻俘田獵打毬救日伐鼓禡師祭也宜居軍禮之首講武次之受降獻俘又次之田獵以下亦各以類附焉軍前大旗曰牙師出必祭謂之禡後魏出師又建纛頭旗上太宗征河東出京前一日遣右贊善大夫潘慎修出郊用少牢一祭蚩尤禡牙遣著作佐郎李巨源即北郊望氣壇用香柳枝燈油乳粥酥蜜餅果祭北方天王咸平中詔太常禮院定禡儀所司除地為壇兩壝繞以青繩張幄帟置軍牙六纛位版版方七寸厚三分祭用剛日具饌牲用太牢以羊豕代其幣長一丈八尺軍牙以白六纛以皂都部署初獻副都部署亞獻部署三獻皆戎服清齋一宿將校陪位禮畢焚幣釁鼓以一牢又擇日祭馬祖馬社閲武仍前代制太祖太宗征伐四方親講武事故不盡用定儀亦不常其處鑿講武池朱明門外以習水戰復築講武臺城西楊村秋九月大閲與從臣登臺觀焉真宗詔有司擇地含輝門外之東武村為廣場馮高為臺臺上設屋構行宮其夜三鼓殿前侍衛馬步諸軍分出諸門詰旦帝乘馬從官並戎服賜以窄袍至行宮諸軍陳臺前左右相向步騎交屬亘二十里諸班衛士翼從于後有司奏成列帝升臺東向御戎帳召從臣坐觀之殿前都指揮使王超執五方旗以節進退又於兩陳中起候臺相望使人執旗如臺上之數以相應初舉黃旗諸軍旅拜舉赤旗則騎進舉青旗則步進每旗動則鼓駴士譟聲震百里外皆三挑乃退次舉白旗諸軍復再拜呼萬歲有司奏陳堅而整士勇而厲欲再舉詔止之遂舉黑旗以振旅軍於左者略右陳以還由臺前出西北隅軍於右者略左陳以還由臺前出西南隅並凱旋以退乃召從臣宴教坊奏樂回御東華門閲諸軍還營鈞容奏樂於樓下復召從臣坐賜飲明日又賜近臣飲於中書諸軍將校飲於營中內職飲於軍器庫諸班衛士飲於殿門外神宗閲左藏庫副使並斌所教牌手於崇政殿乃命殿前步軍司擇驍健者依法教習自是營屯及更戍諸軍畿甸三路民兵皆隨伎藝召見親閲焉凡閲試禁衛戍軍民兵總率第其精粗賜以金帛而超等高者至命為吏選官其典領者優加職秩涇原經略蔡挺肄習諸將軍馬點閲周悉隊伍有法入為樞密副使因言於上而引試之舊以七軍營陳校試而分數不齊前後抵牾命校試官采掇定為八軍法及軍法成頒行諸路既又定九軍法以一軍營陳即城南好草陂閲之皆有賞賚其按閲炮場連弩及便坐日閲召募新軍時令習戰如故事建炎三年六月高宗諭輔臣曰朕欲親閲武宰臣呂頤浩曰方右武之時理當如此祖宗時不忘武備如鑿金明池益欲習水戰張浚曰祖宗每上巳遊幸必命衛士馳射因而激賞亦所以講武也帝曰朕非久命諸將各閲所部人馬當召卿等共觀足以知諸將能否後以巡幸不果行紹興五年正月始御射殿閲諸班直殿前司諸軍指教使臣親從宿衛親兵並提轄部押親兵使臣射射共一千二百六十人每六十人作一撥遂詔戶部支金千兩付樞密院激賞庫充犒用三月御射殿閲等子趙青等五十人角力轉資支賜錢銀有差八月御射殿閲廣東路經略司解發到韶州士庶子弟陳裕試神臂弓特補進武校尉賜紫羅窄衫銀束帶差充本路經略司指使十四年十一月閲殿前馬步軍將士藝精者賞有差自是歲以冬月行之號曰冬教三十年十月御射殿引三衙統制同統制統領同統領入內射射詔餘合赴內殿教人依年例支降例物令逐司自行按試等第給散舊例每歲引三衙官兵教是日止引統制統領故有是詔三十二年四月二十五日御射殿隔門特坐引呈新舊行門射射乾道二年十一月幸候潮門外大教場次幸白石教場應從駕臣僚自祥曦殿並戎服起居從駕往回內管軍御帶環衛官從駕宰執以下免從就逐幕次賜食俟進晚膳畢免奏萬福並免茶從駕還內二十四日幸候潮門外大教場進早膳次幸白石教場閲兵三衙率將佐等導駕詣白石皇帝登臺三衙統制統領官等起居畢舉黃旗諸軍皆三呼萬歲拜訖三衙管軍奏報取旨馬軍上馬打圍教場舉白旗三司馬軍首尾相接舉紅旗向臺合圍聽一金止軍馬各就圍地作圓形排立射生官兵隨鼓聲出馬射獐兔一金止疊金射生官兵各歸陳隊舉黃旗射生官兵就御臺下獻所獲帝遂慰勞賜賚諸將鞍馬金帶以及士卒諸軍歡騰鼓舞就列百姓觀者如山時久陰曀暨帝出郊雲霧解駁風日開霽帝遣諭主管殿前司王琪等曰前日之教師律整嚴人無譁囂分合應度朕甚悅之皆卿等力也琪等曰此陛下神武之化六軍恭謹所致臣願得以此為陛下勦絶姦宄四年十月殿前司言相視龍王堂北江岸以東茅灘一帶平地可作教場已修築將壇將來三司馬步軍並各全裝披帶衣甲執色器械至日先赴教場下方營排辦俟駕登臺聽金鼓起居畢依資次變陳教閲所有聖駕出郊除禁衛外欲於本司入陳馬軍內摘差護聖馬軍八百人騎弓箭器械作十六隊於儀衛前後引從各分八隊隊各五十人往回沿路各奏隨軍鼓笛大樂及摘差本司入教陳隊內諸軍步親隨一千人並統領將官三員至日先赴將臺下各分左右於後壁周圍留空地三十步以容禁衛外作三重環立十六日車駕至灘上諸軍人馬前一日於教場東列幕宿營是日三衙管軍與各軍統領將佐導駕乘馬至護聖步軍大教場亭更御甲胄至灘上皇帝登臺三衙起居畢權主管殿前司王逵奏三司人馬齊舉黃旗諸軍呼拜者三逵奏請從頭教中軍鳴角倒門角旗出營馬步軍簇隊成收鼓訖連三鼓馬軍上馬步人撮起旗槍四鼓舉白旗中軍鼓聲旗應變方陳為備敵之形別高一鼓步軍四向作禦敵之勢且戰且前馬軍出陳作戰鬪之勢別高一鼓各分歸地分五鼓舉黃旗變圓陳為自環內固之形如前節次訖三鼓舉赤旗變鋭陳諸軍相屬魚貫斜列前利後張為衝敵之形亦依前節次訖王逵奏人馬教絶取旨舉青旗變放教直陳收鼓訖一金止重鼓三馬軍下馬步人齪落旗槍皆應規矩帝大悅犒賞倍之士卒歡呼謝恩如儀鳴角聲簇隊訖放教拽隊步人分東西引拽馬軍交頭於御臺下隨隊呈試驍鋭大刀武藝繼而進呈車炮火炮煙槍及赭山打圍射生馬步軍統制官蕭鷓巴以所獲獐鹿等就御臺下進獻人馬拽絶皇帝復御常服乘馬至車子院宣喚殿前司撥發官馬定遠侯彥昌各賜馬一匹彥昌仍自準備將特升副將進御酒上謂王逵曰今日教閲進止分合軍律整肅皆卿之力也逵奏陛下神武四海共知六師軍容孰敢不肅時賜酒俱以十分逵奏以軍馬事不敢飲帝曰少飲之親減太半飲畢謝恩退又宣問主管侍衛馬軍司李舜舉今日按閲之兵比向時所用之師何如舜舉奏曰今日所治之兵皆陛下平時躬親訓練撫以深恩賜之重賞忠勇百倍非昔日可比其儀皇帝至祥曦殿行門禁衛等並戎服迎駕常起居皇帝至知閣門官以下並戎服常起居訖皇帝乘馬出從駕官從駕至候潮門外大教場御幄殿下馬入幄更衣訖皇帝被金甲出幄行門禁衛等迎駕奏萬福皇帝乘馬至教場臺下馬升臺入幄從駕官宰執親王使相正任知閣御帶環衛官升臺於幄殿分東西相向立管軍並令全裝衣甲帶御器械執骨朵升臺於幄殿指南面西立俟入內官喝排立皇帝出幄行門禁衛等迎駕奏萬福皇帝出閣門分引殿前馬步三司統制統領官常起居訖次三司將佐以下聽鼓聲常起居次殿帥執骨朵赴御坐前奏教直陳俟教閲畢再赴御坐前奏教圓陳俟教閲畢再赴御坐前奏教鋭陳俟教閲畢再赴御坐前奏教閲畢歸侍立內侍傳旨與殿前太尉某諸軍謝恩承旨訖轉與撥發官引三司統制統領將佐再拜謝恩訖各歸本軍皇帝起入幄更衣訖皇帝出幄皇帝坐舍人引宰執後立俟進御茶床舍人贊就坐宰執躬身應喏訖直身立就坐進第一盞酒起立後俟皇帝飲酒訖舍人贊就坐躬身應喏訖直身立俟宰執酒至接盞飲酒訖盞付殿侍次舍人贊食並如儀至第四盞傳旨宣勸訖御藥傳旨不拜舍人承旨贊不拜贊就坐第五盞宣勸如第四盞儀酒食畢舉御茶床舍人分引宰執於幄殿重行立御藥傳旨不拜舍人承旨訖揖宰執躬身贊不拜各祗候直身立降踏道歸幕次皇帝起乘馬至車子院下馬皇帝出幄至車子院門樓上出賜親王酒再拜謝訖次賜使相正任並管軍知閣御帶環衛官酒訖逐班再拜謝訖依舊相向立次親王執盞進皇帝酒皇帝飲酒訖一班再拜謝訖俟皇帝觀畢起降車子院門樓歸幄親王以下退皇帝乘馬出車子院門行門禁衛等迎駕奏萬福皇帝乘馬至候潮門外大教場應從駕官並戎服乘馬從駕回皇帝乘馬入和寧門至祥曦殿上下馬還宮餘倣此淳熙四年十二月大閲于茅灘十年十一月大閲于龍山十六年十月大閲于城南大教場並如上儀慶元元年十月以在諒暗令宰執於大教場教閲二年十月大閲于茅灘嘉泰二年十二月幸候潮門外教場大閲端平二年四月大閲以時暑不及行受降獻俘太祖平蜀孟昶降詔有司約前代儀制為受降禮昶至前一日設御坐仗衛于崇元殿如元會儀至日大陳馬步諸軍于天街左右設昶及其官屬素案席褥于明德門外表案于橫街北通事舍人引昶及其官屬素服紗帽北向序立昶跪奉表授閣門使復位待命表至御前侍臣讀訖閣門使承旨出昶等俯伏通事舍人掖昶起官屬亦起宣制釋罪昶等再拜呼萬歲衣庫使導所賜襲衣冠帶陳於前昶等又再拜跪受改服乘馬至升龍門下馬官屬至啓運門下馬就次帝常服升坐百官先入起居班立閣門使引昶等入舞蹈拜謝召昶升殿閣門使引自東階升宣撫使承旨安撫之昶至御坐前躬承問訖還位與官屬舞蹈出中書率百官稱賀遂宴近臣及昶于大明殿嶺南平劉鋹就擒詔有司撰獻俘禮鋹至上御明德門列仗衛諸軍百官常服班樓前別設獻俘位于東西街之南北向其將校位於獻俘位前北上西向有司率武士係鋹等白練露布前引至太廟西南門鋹等並下馬入南神門北向西上立監將校官次南立俟告禮畢於西南門出乘馬押至太社如上儀乃押至樓南御路之西下馬立俟獻俘將校戎服帶刀攝侍中版奏中嚴百官班定版奏外辦帝常服御坐百官舞蹈起居畢通事舍人引鋹就獻俘位將校等詣樓前舞蹈訖次引露布案詣樓前北向宣付中書門下如宣制儀通事舍人跪受露布轉授中書門下轉授攝兵部尚書次攝刑部尚書詣樓前跪奏以所獻俘付有司上召鋹詰責鋹伏地待罪詔誅其臣龔澄樞等特釋鋹縛與其弟保興等罪仍賜襲衣冠帶鞾笏器幣鞍馬各服其服列謝樓下百官稱賀畢放仗如儀南唐平帝御明德門露布引李煜及其子弟官屬素服待罪初有司請如獻劉鋹帝以煜奉正朔非若鋹拒命寢露布弗宣遣閣門使承制釋之太宗征太原劉繼元降帝幸城北陳兵衛張樂宴從臣于城臺繼元帥官屬素服臺下遣閣門使宣制釋罪召繼元親勞之從臣詣行宮稱賀時以在軍中故不備禮繼元至京師詔告獻太廟前一日所司陳設如常告廟儀告日黎明博士引太尉就位通事舍人引繼元西階下東向立其官屬重行立贊者贊太尉再拜訖博士引就盥爵如常儀詣東階解劍脫舄升第一室進奠再拜太祝跪讀祝文訖又再拜通事舍人引繼元及官屬詣室前西階下北向立舍人贊云皇帝親征收復河東偽主劉繼元及偽命官見贊者曰再拜拜訖退位次至第二第三第四第五室皆如第一室博士引太尉降階佩劍納履復位贊者曰再拜太尉與繼元等皆再拜退焚祝版於齋坊繼元既命以官故不稱俘焉元符二年西蕃王攏拶足蘭川首領瞎征等降詔具儀注以受降日御宣德門設諸班直上四軍仗衛諸軍素服陳列降者各服蕃服以見審問訖有旨放罪各等第賜首服袍帶百官稱賀而再御紫宸殿賜宴會哲宗崩樞密院留攏拶等西京聽旨詔罷御樓立仗但引見于後殿攏拶一班契丹公主一班夏國回鶻公主次之瞎征一班邊厮波結並族屬次之應族屬首領各從其長以次起居僧尼公主皆蕃服蕃拜並賜冠服謝訖賜酒饌橫門外政和初議禮局上受降儀皇帝乘輿升宣德門樓降輿坐御幄百官與降王蕃官各班樓下如大禮肆赦儀東上閣門以紅絛袋班齊牌引升樓樓上東上閣門官附內侍承旨索扇扇合帝即御坐簾卷內侍又贊扇開侍衛如常儀諸班親從並𩹉圍降王人等迎駕自贊常起居次舍人贊執儀將士常起居次管幹降王使臣並隨行舊蕃官常起居次禮直官舍人引百官橫行北向贊者曰拜在位官皆再拜舞蹈三稱萬歲又再拜班首奏聖躬萬福又再拜退百官各就東西位舍人引降王服本國衣冠詣樓前北向女婦少西立僧又少西尼立於後入內省官詣御坐前承旨傳樓上東上閣門官承旨録訖以紅絛袋降制樓下東上閣門官承旨退降王以下俯伏東上閣門官至令通事舍人掖之起首領以下皆起鞠躬閣門宣有敕降王以下再拜僧尼止躬呼萬歲閣門録敕旨付管幹官降王等躬聽詰問如有復奏閣門録訖仍以紅絛袋引升樓如無復奏入內省官詣御坐承旨傳樓上閣門官稱有敕放罪訖舍人贊謝恩降王以下再拜稱萬歲復序立入內省官詣御坐承旨傳樓上閣門官稱有敕各賜首服袍帶樓下閣門官承旨引所賜簷床陳于西舍人宣曰有敕降王以下再拜鞠躬舍人稱各賜某物賜物畢又再拜稱萬歲若賜官即贊謝再拜並歸次易所賜服舍人先引降王以下至授遙郡以上當樓前北向東上立贊再拜稱萬歲又再拜次贊服冠帔婦女再拜僧尼別謝引還次贊樓上侍立官稱賀再拜禮直官舍人分引百官橫行北向立贊拜訖班首少前俯伏跪稱賀其詞中書隨事撰述賀訖復位在位者又再拜舞蹈三稱萬歲又再拜東上閣門官進詣樓前承旨就班首宣曰有制贊者曰拜在位官皆再拜宣答其詞學士院隨事撰述又贊再拜三稱萬歲又再拜樓上樞密院前跪奏稱某官臣某言禮畢內侍索扇扇合簾垂帝降坐內侍贊扇開所司承旨放仗樓下鞭鳴百官再拜退開禧三年三月四川宣撫副使安丙函逆臣吳曦首並違制創造法物所受金國加封蜀王詔及金印來獻四月三日禮部太常寺條具獻馘典故俟逆曦首函至日臨安府差人防守殿前司差甲士二百人同大理寺官監引赴都堂審驗奏獻太廟別廟差近上宗室南班奏獻太社太稷差侍從官各前一日赴祠所致齋至日行奏獻之禮大理寺殿前司計會行禮時刻監引首函設置以俟奏獻禮畢梟於市三日付大理寺藏於庫端平元年金亡四月京湖制置司以完顏守緒函骨來上差官奏告宗廟社稷如儀田獵太祖建隆二年始校獵于近郊先出禁軍為圍場五坊以鷙禽細犬從帝親射走兔三從官貢馬稱賀其後多以秋冬或正月田於四郊從官或賜窄袍鞾親王以下射中者賜以馬太宗將北征因閲武獵近郊以多盜獵狐兔者命禁之有衛士奪人獐當死帝曰若殺之後世必謂我重獸而輕人特貰其罪帝常以臘日校獵諭從臣曰臘日出狩以順時令緩轡從禽是非荒也回幸講武臺張樂賜羣臣飲其後獵西郊親射走兔五詔以古者搜狩以所獲之禽薦享宗廟而其禮久廢今可復之遂為定式帝雅不好弋獵詔除有司行禮外罷近甸遊畋五坊所畜鷹犬並放之諸州不得以鷹犬來獻已而定難軍節度使趙保忠獻鶻一號海東青詔還賜之臘日但命諸王略畋近郊而五坊之職廢矣真宗復詔教駿所養鷹鶻量留十餘以備諸王從時展禮禁圍草地許民耕牧至仁宗時言者言校獵之制所以順時令訓戎事請修此禮於是詔樞密院奏定制度獵日五鼓帝御內東門賜從官酒三行奏鈞容樂幸瓊林苑門賜從官食遂獵于楊村宴于幄殿奏教坊樂遣使以所獲馳薦太廟既而召父老臨問賜以飲食茶絹及五坊軍士銀絹有差宰相賈昌朝等曰陛下暫幸近郊順時田獵取鮮殺而登廟俎所以昭孝德也即高原而閲軍實所以講武事也問耆老而秩飫所以養老也勞田夫而賜惠所以勸農也乘輿一出而四美皆具伏望宣付史館從之明年復獵於城南東韓村自玉津園去輦乘馬分騎士數千為左右翼節以鼓旗合圍場徑十餘里部隊相應帝按轡中道親挾弓失屢獲禽焉是時道傍居人或畜狐兔鳧雉驅場中帝謂田獵以訓武事非專所獲也悉縱之免圍內民田一歲租仍召父老勞問其後以諫者多罷獵近甸自是終靖康不復講打毬本軍中戲太宗令有司詳定其儀三月會鞠大明殿有司除地豎木東西為毬門高丈餘首刻金龍下施石蓮華坐加以采繢左右分朋主之以承旨二人守門衛士二人持小紅旗唱籌御龍官錦繡衣持哥舒棒周衛毬場殿階下東西建日月旗教坊設龜茲部鼓樂於兩廊鼓各五又於東西毬門旗下各設鼓五閣門豫定分朋狀取裁親王近臣節度觀察防禦團練使刺史駙馬都尉諸司使副使供奉官殿直悉預其兩朋官宗室節度以下服異色繡衣左朋黃襴右朋紫襴打毬供奉官左朋服紫繡右朋服緋繡烏皮鞾冠以華插腳折上巾天院供馴習馬並鞍勒帝乘馬出教坊大合涼州曲諸司使以下前導從臣奉迎既御殿羣臣謝宣召以次上馬馬皆結尾分朋自兩廂入序立於西廂帝乘馬當庭西南駐內侍發金合出朱漆毬擲殿前通事舍人奏云御朋打東門帝擊毬教坊作樂奏鼓毬既度颭旗鳴鉦止鼓帝回馬從臣奉觴上壽貢物以賀賜酒即列拜飲畢上馬帝再擊之始命諸王大臣馳馬爭擊旗下鼓將及門逐廂急鼓毬度殺鼓三通毬門兩旁置繡旗二十四而設虛架於殿東西階下每朋得籌即插一旗架上以識之帝得籌樂少止從官呼萬歲羣臣得籌則唱好得籌者下馬稱謝凡三籌畢仍御殿召從臣飲又有步擊者乘驢騾擊者時令供奉者朋戲以為樂云救日伐鼓建隆元年司天監言日食五月朔請掩藏戈兵鎧胄事下有司有司請皇帝避正殿素服百官各守本司遣官用牲太社如故事景德四年五月朔日食上避正殿不視事至和元年四月朔日食既內降德音改元易服避正殿減膳百官詣東上閣門拜表請御正殿復常膳三表乃從至日遣官祀太社而陰雨以雷至申乃見食九分之餘百官稱賀先是皇祐初以日食三朝不受賀百官拜表嘉祐四年詔正旦日食毋拜表自十二月二十一日不御前殿減常膳宴遼使罷作樂至日仍遣官祀太社百官三表乃御正殿復膳六年六月朔日食詔禮官驗詳典故皇帝素服不御正殿毋視事百官廢務守司合朔前二日郊社令及門僕守四門巡門監察鼓吹令率工人如方色執麾斿分置四門屋下龍蛇鼓隨設於左東門者立北孰南面南門者立東孰西面西門者立南墊北面北門者立西孰東面隊正一人執刀率衛士五人執五兵之器立鼓外矛處東戟處南斧鉞在西矟在北郊社令立於壇四隅縈朱絲繩三匝又於北設黃麾龍蛇鼓一次之弓一矢四次之諸兵鼓俱靜立俟司天監告日有變工舉麾乃伐鼓祭告官行事太祝讀文其詞以責陰助陽之意司天官稱止乃罷鼓如霿晦不見即不伐鼓自是日有食之皆如其制治平四年詔古者日食百司守職蓋所以祗天戒而備非常今獨闕之甚非王者小心寅畏之道可令中書議舉行熙寧六年四月朔日食詔易服避殿減膳如故事降天下死刑釋流以下罪政和上合朔伐鼓儀有司陳設太社玉幣籩豆如儀社之四門及壇下近北各置鼓一並植麾斿各依其方色壇下立黃麾麾杠十尺斿八尺祭告日於時前太官令帥其屬實饌具畢光祿卿點視次引監察御史奉禮郎太祝太官令先入就位次引告官就位皆再拜次引御史奉禮郎太祝升就位太官令就酌尊所告官盥洗詣太社三上香奠幣玉再拜復位少頃引告官再盥洗執爵三祭酒奠爵俯伏興少立引太祝詣神位前跪讀祝文告官再拜退伐鼓其日時前太史官一員立壇下視日鼓吹令率工十人如色服分立鼓左右以俟太史稱日有變工齊伐鼓明復太史稱止乃罷鼓其日廢務而百司各守其職如舊儀
