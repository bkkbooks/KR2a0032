body:
  text: 宋史卷一百三十六志第八十九樂十一樂章五祀嶽鎮海瀆祀大火祀大辰大中祥符五嶽加帝號祭告八首迎神靜安鍾石既作俎豆在前雲旗飛揚神光肅然當駕飈欻來乎青圓言備縟禮享茲吉蠲冊入門正安節彼喬嶽神明之府秩秩威儀肅肅靈宇懿號克崇庶物咸覩帝籍升名式綏九土酌獻東嶽嘉安節彼岱宗有嚴廟貌惟辟奉天依神設教帝典焜煌嘉薦普淖至靈格思殊祥是效南嶽作鎮炎夏畜茲靈光敷與萬物既阜既昌爰刻溫玉式薦徽章昭嘏神意福熙穰穰西嶽瞻言太華奠方作鎮典冊是膺等威以峻上公奉儀祀宗薦信介祉萬邦永配坤順北嶽仰止靈嶽鎮于朔方增崇懿號度越彝章祗薦嘉樂式陳令芳永資純佑國祚蕃昌中嶽巖巖神嶽作鎮中央肅奉徽冊尊名孔章聿降飈駕載獻蘭觴熙事允洽寶祚彌昌送神靜安祗薦鴻名寅威明祀有楚之儀如在之祭奠獻既終禮容克備神鑒孔昭福禧來暨天安殿冊封五嶽帝一首冊出入正安名嶽奠方帝儀克舉吉日惟良九賓咸旅溫玉鏤文纁裳正寧禮備樂成篤神之祜熙寧望祭嶽鎮鋂瀆十七首東望迎神凝安盛德惟木勾芒御神沂岱淮海厥功在民爰熙壇坎裒對庶神于以歆格靈貽具臻升降同安紳襜兮玉珮蕊兮于我將事神燕喜兮帝命望祀敢有不共往返于位肅肅雍雍奠玉幣明安祀以崇德幣則有儀肅我將事登降孔時精明純潔罔有弗祗史辭無愧神用來娭酌獻成安肇茲東土含潤無疆維時發春嘉薦令芳祭用薶沈順性含藏不涸不童誕降祺祥送神凝安神之至止熙壇為春神之將歸旗服振振欻兮回飈窅兮旋雲祐于東方永施厥仁南望迎神凝安嵩嵇衡霍暨厥海江時維長養惠我南邦肆嚴牲幣神式來降以侑以妥百福是龐酌獻成安景風應律朱鳥開辰肅肅明祀嘉籩列陳牲用牷物樂奏蕤賓克綏永福祐此下民送神凝安鼓鍾云云吹管伊伊神既醉飽曰送言歸山有厚藏水有靈德物其永依往奠炎宅中望迎神凝安維土作德維帝御行含養載育萬物以成有嚴祀典薦我德馨神其歆止永用億寧酌獻成安高廣融結實維中央宣氣報功利彼一方坎壇以祀六樂鏘鏘靈其有喜酌以大璋送神凝安言旋其處以奠中域無替厥靈四方是則神永不息祀永不愆以享以報于萬斯年西望迎神凝安品物順說時司金行于郊迎氣以望庶靈雅歌維樂圭薦惟牲作民之祉永相厥成酌獻成安西皓沆碭執矩司秋諏言協靈時祀孔修禮有薦獻爰視公侯秩而祭之百福是遒送神凝安我樂我神簋俎腥饔曰神之還西土是宮于蕃禽魚于衍草木富我藪隰滋我高陸北望迎神凝安帝德乘坎時御閉藏爰潔牲醴兆茲北方海山攸宅神施無疆具享蠲吉降福孔穰酌獻成安淒寒凝陰隕籜滌場百物順成黍稷馨香款于北郊爰因其方何以侑神薦此嘉觴送神凝安維山及川奠宅幽方我度其靈降止靡常肅肅坎壇既迎既將促樂徹俎是送是望紹興祀嶽鎮海瀆四十三首東方迎神凝安帝奠九孰匪我疆繄我東土山川相望祀事孔時肅雍不忘嶪濛鴻郁哉洋洋初獻盥洗同安青陽肇開祀事孔飭鬱人贊溉其馨苾苾敬爾威儀亦孔之則神之格思無我有斁奠玉幣明安司曆告時惟孟之春爰舉時祀旅于有神鼓鍾既設圭帛具陳阜蕃庶物以福我民東嶽位酌獻成安巖巖天齊自古在昔膚寸之雲四方其澤惟時東作祀事乃飭惠我無疆恩霑動植東鎮位惟山有鎮雄於其方東孰為雄于沂之疆祀事有時爰舉舊章我望匪遙庶幾燕饗東海位澒洞鴻濛天與無極導納江漢節宣南北順助其功善下惟德我祀孔時以介景福東瀆位我祀伊何于彼長淮導源桐柏委注蓬萊扞齊護楚宣威示懷豆籩列陳亦孔之偕亞終獻酌獻四位並同我祀孔肅神其安留容與裴回若止若浮洽此重觴申以百羞無我斁遺萬邦之休送神凝安蹇兮紛紛神實戾止以飲以食以享以祀兮冥冥神亦歸止以醉以飽以錫爾祉南方迎神凝安朱明盛長我祀用飭厥祀伊何山川咸秩如將見之繩繩齊栗神哉沛兮消搖來格初獻盥洗升降同安爰熙嘉壇揭虔毖祀鬱人沃盥贊我祼事于降于登以作以止莫不肅雍告靈饗矣奠玉幣明安我祀我享儀物孔周一純斯舉二精聿修璞兮其溫絲兮其紑是薦潔蠲神兮安留南嶽位酌獻成安神曰司天居南之衡位焉則帝于以奠方南訛秩事望禮有常庶幾嘉虞介福無疆南鎮位維南有山于彼會稽作鎮在昔神則司之厥有舊典以祀以時百味維旨靈其燕娭南海位維水善下利物曰功逶迤百川誰歟朝宗蕩蕩大受於焉會同膋蕭列陳以答鴻濛南瀆位四瀆之利經營中國南曰大江險兮天設維爾有神隃其廟食望秩孔時我心翼翼亞終獻酌獻神之游兮洋洋對越淡乎容與肸蠁斯答乃奏既備八音攸節重觴申陳百禮以洽送神曲同迎神薦徹豆籩熙事備成靈兮將歸羽旄紛紜飄其逝矣浮空薾雲悵然顧瞻有撫懷心中央迎神凝安天作高山屹然中峙經營厥宇萬億咸遂火熙土王爰舉時祀繩繩宣延倣佛來止初獻盥洗升降同安思來感格肅雍不忘禮儀既備濟濟蹌蹌潔蠲致敬往薦其芳交若有承神兮孔饗奠玉幣明安練日有望高靈來下何以告誠心惟物假有篚斯實有寶斯籍于以奠之神光燭夜中嶽位酌獻成安與天齊極伊嵩之高顯靈效異神休孔昭飭我祀事實俎鸞膋以侑旨酒其馨有椒中鎮位禹畫九州河內曰冀霍山崇崇作鎮積勢我祀如何百末旨味承神燕娭諸神畢至亞終獻酌獻禮樂既成肅容有常奄留消搖申畢重觴仰臚所求降福滂洋師象山則以況皇章送神曲同迎神虞至旦兮靈亦有喜蹇欲驤兮象輿已轙粥音送兮靈聿歸矣長無極兮錫我以祉西方迎神凝安有岌斯安有涵斯洽聿相厥成允祀是答爰飭乃奏乃奏既協於昭降止是遵是接初獻盥洗升降同安靡實不新靡陳不濯人之弗蠲矧敢將酌載晞之帨載濡之勺洗儀告備陟降時若奠玉幣明安彼林有庪彼澤有沈猗與西望弗菲弗淫乃追斯邸乃斯尋卬禮既卒是用是歆西嶽位酌獻成安屹削厥方風雲斯所陰邑有宮侐侐俁俁清酤在尊靈在下于俎獻兮則莫我吐西鎮位維吳崇崇于之西瞻彼有隴赫赫不迷克裨于嶽我酌俶齊於凡有旅公維躋西海位奄浸坤軸滋殖其濊而典斯稽有陛有壝弗替時舉元斝斯酹胡先于河實委之會西瀆位自彼昆虛于以潛流念茲誕潤豈侯不猶在昔中府暨海聿修迄既望止神保先卣亞終獻肅肅其乂既旨既溢逮其畢酌偏茲博碩祀事既遂不敢誶射神或醉止我心斯懌送神曲同迎神乃羞既徹乃奏及闋無餕斯俎式聽致謁不蹇不蹶不沸不決厲魃其祛永庇有截北方迎神凝安我土綿綿孰匪疆理惟時幽都匪曰隃只滌哉艮月朔風其同曷阻曷深其亦來降初獻盥洗升降同安壽宮輝煌聿修時祀繽其臨矣吉蠲以俟居乎昂昂行乎遂遂敬爾攸司展采錯事奠玉幣明安相豫陰威厥功浩浩一歲之功何以為報府有圭幣我其敢私肅肅孔懷于以將之北嶽位酌獻成安瞻彼芒芒曰北之常既高既厚乃紀乃綱薦鬯伊始靈示孔將玄服鐵駕覽此下方北鎮位赫赫作鎮幽朔之垂兼福我民食哉具宜克配彼嶽有嚴等衰蠲我灌禮其敢不祗北海位八裔皆水此一會同沄沄天墟洞蕩洪濛至哉維坎不有斯功所秩伊何黃流在中北瀆位水星之精播液發靈不脅于河既介以清翼翼盥薦椒糈芬馨載止載留爰弭翠旌亞終獻俎豆紛披金石繁會侑以二尊匪瀆匪怠我儀既周我心孔戒憺兮容與倣佛如在送神曲同迎神靈既醉飽禮斯徹兮靈亦樂康樂斯闋兮雲征飈舉不可尼兮薦福錫祉曷有極兮淳祐祭海神十六首迎神延安宮一曲堪輿之間最巨惟瀛包乾括坤吐日滔星祀典載新禮樂孔明鑒吾嘉賴來燕來寧角一曲四溟廣矣八紘是紀我宅東南回復萬里洪濤飄風安危所倚祀事特隆神其戾止徵一曲若稽有唐克致崇極祝號既升爰增祭式從享于郊神斯受職我祀肇新式祈陰騭羽一曲猗與祀禮四海會同靈之來沛鞭霆馭風肸蠁倣佛在位肅雍佑我蒸民式徼神功升降欽安靈之來至垂慶陰陰靈之已坐飭茲五音壇殿聿嚴陟降孔欽靈宜安留鑒我德心東海位奠玉幣德安百川所歸天地之左澒洞鴻濛功高善下行都攸依百祿是荷制幣嘉玉以侑以妥南海位奠玉幣瀛安祝融之位貴乎三神吞納江漢廣大無垠長為委輸祐我黎民敬陳明享允鑒恭勤西海位奠玉幣潤安蒲昌之澤派引天潢羲娥出入浩渺微茫蓋高斯覆猶隔封疆我思六合肇正吉昌北海位奠玉幣瀚安瀚海重潤地紀亦歸吞受百瀆限制北陲一視同仁我心則怡嘉薦玉幣神其格思捧俎豐安昭格靈貺祀典肇升牲牷告充雕俎是承薦虔效物省德惟馨靈其有喜萬宇肅澄東海位奠酌獻熙安滄溟之德東南具依熬波出素國計攸資石臼却敵濟我王師神其享錫益畀燕綏南海位酌獻貴安南溟浮天旁通百蠻風檣迅疾琛舶來還民商永賴坐消寇姦薦茲嘉觴弭矣驚瀾西海位酌獻類安積流疏派被于流沙布潤施澤功均邇遐我秩祀典四海一家祗薦令芳靈其享嘉北海位酌獻溥安倏忽會同裴回安留牲肥酒香晨事聿修惟德之涼曷奄九州帝命是祗多福自求亞終獻饗安籩豆有楚二觴斯旅神其醉飽式燕以序百靈祕怪蜿蜒飛舞錫我祺祥有永終古送神成安告靈饗矣錫我嘉祚乾端坤倪開豁呈露玄雲聿收羣龍咸騖滅除凶災六幕清豫紹興祀大火十二首降神高安圜鍾為宮五緯相天各率其職司禮與視則維熒惑至陽之精屆我長嬴于以求之祀事孔明黃鍾為角有出有藏伏見靡常相我國家鑒觀四方視罔不正終然允臧神其來格明德馨香太簇為徵小大率禮不愆于儀展采錯事秩祀孔時維今之故閲我數度修厥典常神其來顧姑洗為羽於赫我宋以火德王永永丕圖繄神之相神之來矣維其時矣禮備樂奏神其知矣升殿正安有儼其容有潔其衷屹屹崇壇伊神與通神肯降格嘉神之休虔恭降登神乎安留熒惑位奠玉幣嘉安馨香接神肸蠁恍惚求神以誠薦誠以物有藉斯玉有篚斯幣是用薦陳昭茲精意商丘宣明王位奠幣嘉安熒惑在天惟火與合繄神主火純一不雜作配熒惑祀功則然不腆之幣于以告虔捧俎豐安火遵其令無物不長視此牲牢務得其養豢以祀神有腯其肥非神之宜其將曷歸熒惑位酌獻祐安皇念有神介我戩穀登時休明有此美祿酌言獻之有飶其香神兮燕娭醉此嘉觴宣明王位酌獻祐安誰其祀神知神嗜好閼伯祀火為神所勞眷言配食既與火俱於樂旨酒承神嘉虞亞終獻文安神既貺施嗜我飲食申以纍獻以承靈億神方常羊咸畢我觴于再于三于誠之將送神用理安登降上下奠璧獻斝音送粥粥禮無違者已虞至旦神其將歸顧我國家遺以繁釐出火祀大辰十二首降神高安圜鍾為宮燁燁我宋火德所畀用火紀時允惟象類神以類歆誠繇類至有感斯通孚我陽燧黃鍾為角樂音上達粵惟出虛火性炎上亦生於無我鏞我磬我笙我竽氣同聲應昭哉合符太簇為徵火在六氣獨處其兩感生維君繄辰克相何以驗之占茲垂象騰駕蒼虯欻其來饗姑洗為羽星入於戌與火俱詘火出於辰與星俱伸一伸一詘孰操縱之利用出入民咸用之升殿正安屹彼嘉壇赤伏始屆掞光耀明洋乎如在俯仰重離默與精會隨我降升肅聽環珮大辰位奠玉幣嘉安維莫之春五陽發舒日之夕矣三星在隅莫量匪幣莫嘉匪玉明薦孔時神光下矚商丘宣明王奠幣嘉安二七儲神與天地並孰儷厥德聿惟南正功楙陶唐澤流億姓作配嚴禋贄列惟稱捧俎豐安有嚴在滌陳彼牲牢孔碩其俎薦此血毛厥初生民飲茹則然以燔以炙伊誰云先大辰位酌獻祐安孰為大辰維北有斗曾是彗星斯名孔有幽榮報功潔齊敢後容與嘉觴式歆旨酒宣明王位酌獻祐安周設司爟雖列夏官仍襲孔易闓端實難相彼商丘永懷初造不腆桂椒匪以為報亞終獻文安潛之伏矣柞槱既休有俶其來榆柳是求靈駕紛羽尚其安留飲我三爵言言油油送神理安五運惟火實宗衆陽宿壯用明千載愈光神保聿歸安處火房鬱攸不作炎圖永昌納火祀大辰十二首降神高安圜鍾為宮赫赫皇圖炎炎火德侈神之賜奄有方國粢盛既豐俎豆有飶於萬斯年報祀無斁黃鍾為角火星之躔有燁其光表于辰位伏于戌方時和歲稔仁顯用藏告爾萬民出納有常太簇為徵季秋之月律中無射農事備收火功告畢克禋克祀有嚴有翼風馬雲車尚其來格姑洗為羽明明我后重祭欽祠有司肅事式薦晨儀禮惟其稱物惟其時神之聽之福祿來為升殿正安猗與明壇右平左墄冕服斯皇玉珮有節陟降惟寅匪徐匪疾式崇大祀禮文咸秩大辰位奠玉幣嘉安金行序晚玉露晨清齊戒豐潔肅恭神明嘉幣惟量嘉玉惟精于以奠之庶幾來聽商丘宣明王位奠幣嘉安恭惟火正自陶唐氏邑于商丘配食辰祀有功在民有德在位敢替典常惟恭奉幣捧俎豐安萬彙攸成四方寧謐工祝致告普存民力乃薦斯牲為俎孔碩介以繁祉式和民則大辰位酌獻祐安庶功備矣休德昭明天地釀和鬱鬯斯清玉瓚以酌瑤觴載盈周流常羊來燕來寧宣明王位酌獻祐安廣大建祀式崇其配馨香在茲清酒既載穆穆有暉洋洋如在聿懷嘉慶繄神之賚亞終獻文安幣玉肅陳笙簧具舉桂醑浮觴瓊羞溢俎禮有三獻式和且序神具醉止慶流寰宇送神理安神靈降鑒天地回旋惟馨薦矣既醉歆焉諸宰斯徹式禮莫愆隤祉降祥天子萬年
