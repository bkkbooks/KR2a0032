body:
  text: 宋史卷八十八志第四十一地理四兩浙淮南東路淮南西路江南東路江南西路荊湖南路荊湖北路兩浙路熙寧七年分為兩路尋合為一九年復分十年復合府二平江鎮江州十二杭越湖婺明常溫台處衢嚴秀縣七十九南渡後復分臨安平江鎮江嘉興四府安吉常嚴三州江陰一軍為西路紹興慶元瑞安三府婺台衢處四州為東路紹興三十二年戶二百二十四萬三千五百四十八口四百三十二萬七千三百二十二臨安府大都督府本杭州餘杭郡淳化五年改寧海軍節度大觀元年升為帥府舊領兩浙西路兵馬鈐轄建炎元年帶本路安撫使領杭湖嚴秀四州三年升為府帶兵馬鈐轄紹興五年兼浙西安撫使崇寧戶二十萬三千五百七十四口二十九萬六千六百一十五貢綾藤紙縣九錢塘望有鹽監仁和望梁錢江縣太平興國四年改紹興中與錢塘並升赤餘杭望臨安望錢鏐奏改衣錦軍太平興國四年改順化軍縣復舊名五年軍廢富陽緊於潛緊新城上梁改新登太平興國四年復淳化五年升南新場為縣熙寧五年省南新縣為鎮入焉鹽官上昌化中唐唐山縣太平興國四年改有紫溪鹽場紹興中七縣並升畿紹興府本越州大都督府會稽郡鎮東軍節度大觀元年升為帥府舊領兩浙東路兵馬鈐轄紹興元年升為府崇寧戶二十七萬九千三百六口三十六萬七千三百九十貢越綾輕庸紗紙縣八會稽望山陰望嵊望舊剡縣宣和三年改諸暨望有龍泉一銀坑餘姚望上虞望蕭山緊新昌緊乾道八年以楓橋鎮置義安縣淳熙元年省平江府望吳郡太平興國三年改平江軍節度本蘇州政和三年升為府紹興初節制許浦軍崇寧戶一十五萬二千八百二十一口四十四萬八千三百一十二貢葛蛇床子白石脂花席縣六吳望長洲望崑山望常熟望吳江緊嘉定上嘉定十五年析崑山縣置以年為名鎮江府望丹陽郡鎮江軍節度開寶八年改本潤州政和三年升為府建炎三年置帥四年加大使兼沿江安撫以浙西安撫復還臨安崇寧戶六萬三千六百五十七口一十六萬四千五百六十六貢羅綾縣三丹徒緊有圌山寨丹陽緊熙寧五年省延陵縣為鎮入焉金壇緊湖州上吳興郡景祐元年升昭慶軍節度寶慶元年改安吉州崇寧戶一十六萬二千三百三十五口三十六萬一千六百九十八貢白紵漆器縣六烏程望歸安望太平興國七年析烏程地置縣安吉望長興望德清緊武康上太平興國三年自杭州來隸婺州上東陽郡淳化元年改保寧軍節度崇寧戶一十三萬四千八十口二十六萬一千六百七十八貢綿藤紙縣七金華望義烏望永康緊武義上浦江上唐浦陽縣梁錢鏐奏改蘭溪望東陽望慶元府本明州奉化郡建隆元年升奉國軍節度本上州大觀元年升為望紹興初置沿海制置使八年以浙東安撫使兼制司十一年罷隆興元年復置淳熙元年魏惠憲王自宣州移鎮置長史司馬紹熙五年以寧宗潛邸升為府崇寧戶一十一萬六千一百四十口二十二萬一十七貢綾乾山蕷烏魚骨縣六鄞望奉化望慈溪上定海上象山下昌國下熙寧六年析鄞縣地置有鹽監紹興間升望常州望毗陵郡軍事崇寧戶一十六萬五千一百一十六口二十四萬六千九百九貢白紵紗席縣四晉陵望武進望宜興望唐義興縣太平興國初改無錫望江陰軍同下州熙寧四年廢江陰軍為縣隸常州建炎初以江陰縣復置軍紹興二十七年廢三十一年復置縣一江陰下瑞安府本溫州永嘉郡太平興國三年降為軍事政和七年升應道軍節度建炎三年罷軍額咸淳元年以度宗潛邸升府崇寧戶一十一萬九千六百四十口二十六萬二千七百一十貢鮫魚皮蠲糨紙縣四永嘉緊有永嘉鹽場平陽望有天富鹽場瑞安緊有雙穗鹽場樂清上唐樂成縣梁錢鏐改台州上臨海郡軍事崇寧戶一十五萬六千七百九十二口三十五萬一千九百五十五貢甲香金漆鮫魚皮縣五臨海望黃巖望有于浦杜瀆二鹽場寧海緊天台上仙居上唐樂安縣梁錢鏐改永安景德四年改今名處州上縉雲郡軍事崇寧戶一十萬八千五百二十三口一十六萬五百三十六貢綿黃連縣六麗水望龍泉望宣和三年改為劍川縣紹興元年復故有高亭一銀場松陽上梁錢鏐奏改長松錢元瓘奏改白龍咸平二年復故遂昌上有永豐銀場縉雲上青田中南渡後增縣一慶元中慶元三年分龍泉松源鄉置縣因以年紀名衢州上信安郡軍事崇寧戶一十萬七千九百三口二十八萬八千八百五十八貢綿藤紙縣五西安望禮賢緊本江山縣南渡後改龍遊上唐龍丘縣宣和三年改為盈川縣紹興初復改信安中本常山縣咸淳三年改開化中太平興國六年升開化場為縣建德府本嚴州新定郡遂安軍節度本睦州軍事宣和元年升建德軍節度三年改州名軍額咸淳元年升府崇寧戶八萬二千三百四十一口一十萬七千五百二十一貢白紵簟縣六建德望淳安望舊青溪縣宣和初改淳化南渡改今名桐廬上太平興國三年自杭州來隸分水中遂安中壽昌中監一神泉熙寧七年置鑄銅錢尋罷慶元三年復嘉興府本秀州軍事政和七年賜郡名曰嘉禾慶元元年以孝宗所生之地升府嘉定元年升嘉興軍節度崇寧戶一十二萬二千八百一十三口二十二萬八千六百七十六貢綾縣四嘉興望華亭緊海鹽上有鹽監沙腰蘆瀝二鹽場崇德中兩浙路蓋禹貢揚州之域當南斗須女之分東南際海西控震澤北又濱于海有魚鹽布帛粳稻之産人性柔慧尚浮屠之教俗奢靡而無積聚厚於滋味善進取急圖利而奇技之巧出焉餘杭四明通蕃互市珠貝外國之物頗充於中藏云淮南路舊為一路熙寧五年分為東西兩路東路州十揚亳宿楚海泰泗滁真通軍二高郵漣水縣三十八南渡後州九揚楚海泰泗滁淮安真通軍四高郵招信淮安清河為淮東路宿亳不與焉紹興三十二年戶一十一萬八百九十七口二十七萬八千九百五十四揚州大都督府廣陵郡淮南節度熙寧五年廢高郵軍並以縣隸州元祐元年復高郵軍舊領淮南東路兵馬鈐轄建炎元年升帥府二年高宗駐蹕四年為真揚鎮撫使尋罷嘉定中淮東制置開幕府於楚州仍兼安撫崇寧戶五萬六千四百八十五口十萬七千五百七十九貢白苧布莞席銅鏡縣一江都緊熙寧五年省廣陵縣入焉南渡後增縣二廣陵緊泰興中舊隸泰州紹興五年來屬十年又屬泰州十二年又來隸以柴墟鎮延冷村隸海陵二十九年盡仍舊亳州望譙郡本防禦大中祥符七年建為集慶軍節度南渡後沒于金崇寧戶一十三萬一百一十九口一十八萬三千五百八十一貢皺紗絹縣七譙望城父望酇望永城望衛真望唐真源縣大中祥符七年改鹿邑緊蒙城望宿州上符離郡建隆元年升防禦開寶五年建為保靜軍節度元領五縣紹興中割虹縣隸楚州後沒于金崇寧戶九萬一千四百八十三口一十六萬七千三百七十九貢絹縣四符離望蘄望臨渙緊大中祥符七年割隸亳州天禧元年來隸靈壁元祐元年以虹之零壁鎮為縣七月復為鎮七年二月零壁復為縣政和七年改零壁為靈壁楚州緊山陽郡團練乾德初以盱眙屬泗州開寶七年以鹽城還隸太平興國二年又以鹽城監來隸熙寧五年廢漣水軍以漣水縣隸州元祐二年復為漣水軍建炎四年置楚泗承州漣水軍鎮撫使淮東安撫制置使京東河北鎮撫大使紹興五年權廢承州兩縣和廬濠黃滁楚州各一縣置鎮官三十二年漣水復來屬嘉定初節制本路沿邊軍馬十年制置安撫司公事寶慶三年升寶應縣為州紹定元年升山陽縣為淮安軍端平元年改軍為淮安州崇寧戶七萬八千五百四十九口二十萬七千二百二貢苧布縣四山陽望建炎間沒于金紹興元年收復紹定元年升淮安軍改縣為淮安鹽城上有九鹽場建炎間入于金紹興元年隸漣水三年又來屬淮陰中紹興五年廢為鎮六年復嘉定七年徙治八里莊寶應緊寶慶三年升為寶應州而縣如故海州上東海郡團練建炎間入于金紹興七年復隆興初割以畀金隸山東路以漣水縣來屬嘉定十二年復寶慶末李全據之紹定四年全死又復端平二年徙治東海縣淳祐十二年全子瑹又據之治朐山景定二年瑹降置西海州崇寧戶五萬四千八百三十口九萬九千七百五十貢絹獐皮鹿皮縣四朐山緊懷仁中沭陽中東海中泰州上海陵郡本團練乾德五年降為軍事建炎三年入于金尋復四年置通泰鎮撫使紹興十年移治泰興沙上時泰興隸海陵復舊治元領四縣紹興十二年割泰興隸揚州建炎四年又以興化隸高郵軍崇寧戶五萬六千九百七十二口一十一萬七千二百七十四貢隔織縣二海陵望如皋中下開寶七年以海陵監移治泗州上臨淮郡建隆二年廢徐城縣乾德元年以楚州之盱眙濠州之招信來屬建炎四年復屬濠州紹興十二年入金後復崇寧戶六萬三千六百三十二口一十五萬七千三百五十一貢絹縣三臨淮上虹中紹興九年自宿州來隸淮平上紹興二十一年地入于金析臨淮地置今縣南渡後有淮平無盱眙蓋盱眙縣即招信軍也滁州上永陽郡軍事建炎間置滁濠鎮撫使尋廢嘉熙中移治王家沙景定五年復舊治崇寧戶四萬二十六口九萬七千八十九貢絹縣三清流望全椒緊來安望唐永陽縣南唐改紹興五年廢入清流十八年復乾道九年廢為鎮淳熙二年復真州望軍事本上州乾德三年升為建安軍至道二年以揚州之六合來屬大中祥符六年為真州大觀元年升為望政和七年賜郡名曰儀真建炎三年入于金尋復崇寧戶二萬四千二百四十二口八萬二千四十三貢麻紙縣二揚子中本揚州永正縣之白沙鎮南唐改為迎鑾鎮建炎元年升軍四年廢為縣紹興十一年復升軍十二年復為縣六合望通州中軍事政和七年賜郡名曰靜海建炎四年入于金尋復崇寧戶二萬七千五百二十七口四萬三千一百八十九貢獐皮鹿皮鰾膠縣二靜海望周屬揚州析其地為縣與海門同來隸海門望監一利豐掌煎鹽太平興國八年移治於州西南四里高郵軍同下州高沙郡軍事開寶四年以揚州高郵縣為軍熙寧五年廢為縣隸揚州元祐元年復為軍建炎四年升承州割泰州興化縣來屬置鎮撫使紹興五年廢為縣復隸揚州以知縣兼軍使三十一年復為軍仍以興化來屬崇寧戶二萬八百一十三口三萬八千七百五十一縣一今縣二高郵望興化緊舊隸揚州改隸泰州建炎四年來隸紹興五年廢為鎮十九年復縣隸泰州乾道二年還隸尋又隸泰州淳熙四年復舊安東州本漣水軍太平興國三年以泗州漣水縣置軍熙寧五年廢為縣隸楚州元祐二年復為軍紹興五年廢為縣三十二年復為軍紹定元年屬寶應州端平元年復為軍景定初升安東州崇寧戶一萬九千五百七十九口四萬七百八十五縣一漣水望招信軍本泗州盱眙縣建炎三年升軍四年為縣隸濠州紹興二年復隸泗州七年仍舊隸京東十一年隸天長軍十二年復升軍以天長來屬寶慶三年入于金紹定四年復仍為招信軍縣二天長望舊天長軍至道二年軍廢復為縣隸揚州建炎元年升軍紹興元年為縣十一年復升軍十三年復為縣隸招信建炎四年隸濠州紹興四年復十一年隸天長軍十二年復來隸淮安軍本泗州五河口端平二年金亡遺民來歸置隘使屯田咸淳七年六月置軍縣一五河咸淳七年置有澮涇沱漴淮五河故名清河軍咸淳九年置縣一清河西路府壽春州七廬蘄和舒濠光黃軍二六安無為縣三十三南渡後府二安慶壽春州六廬蘄和濠光黃軍四安豐鎮巢懷遠六安為淮西路壽春府壽春郡緊忠正軍節度本壽州開寶中廢霍山盛唐二縣政和六年升為