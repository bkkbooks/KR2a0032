body:
  text: 宋史卷二十八本紀第二十八高宗五五年春正月乙巳朔日有食之帝在平江府金人去濠州丁未戒諸軍戰陳毋殺中原民籍充金兵者命鬻官田宅輸錢專充軍費戊申進廬泰二州守禦官屬各一官己酉詔前宰執呂頤浩等十九人及行在職事官各條上攻戰備禦措置綏懷之策免淮南官吏去職之罪仍令還任承州水寨統領仲諒復入楚州庚戌張俊遣統領楊忠閔王進夾擊金人于淮南岸敗之降其將程師回張延壽辛亥淮東統制崔德明襲敗金兵于盱眙召張浚赴行在乙卯浚入見賞沿江監司帥臣供億之勞各進官一等戊午趣修建康行宮己未詔減淮南諸州雜犯死罪釋流以下囚庚申置諸州軍教場選兵專習弓弩立格按試辛酉贈殿中侍御史馬伸左諫議大夫韓世忠劉光世張俊入見壬戌以世忠為少保淮東宣撫使駐鎮江光世少保淮西宣撫使駐太平俊開府儀同三司江東宣撫使駐建康甲子酈瓊復光州降其守許約乙丑罷淮南茶鹽提刑司置提點兩路公事官一員兼領刑獄茶鹽漕運市易事淮西要會州軍並置市易務戊辰詔川陝宣撫司招諭陷賊官民庚午命王進合江西廣東諸將兵討周十隆海賊朱聰犯廣州又犯泉州壬申劉光世韓世忠張俊入辭命升殿以光世世忠有隙賜酒諭釋之皆感激奉詔癸酉偽齊知亳州馬秦犯光州權州事王萃率兵拒之是月金主晟殂旻之孫亶立嶽飛自池州入朝二月丙子以飛為鎮寧崇信軍節度使命常州布衣陳得一造新曆丁丑帝發平江戊寅遣權太常少卿張銖奉迎太廟神主于溫州壬午帝至臨安進扈從官吏秩一等丙戌以趙鼎為左僕射張浚右僕射並同中書門下平章事兼知樞密院事都督諸路軍馬嶽飛為荊湖南北襄陽府路制置使將兵平湖賊楊太丁亥吳璘楊政攻拔秦州執偽齊守胡宣金帥撒離曷來援政復擊敗之己丑詔建太廟壬辰命張浚詣江上措置邊防詔諭諸路宣撫制置司示以專任之旨以右司諫趙霈論奏得體賜三品服丁酉進執政官秩一等以賞防秋之功戊戌詔淮南宣撫司撫存淮北來歸官吏軍民己亥直史館范沖上神宗實録考異庚子詔翰林學士孫近胡交修類編臣僚條具利害章疏以聞甲辰蠲湖南路上供三年是月偽齊商元寇信陽軍守臣舒繼明被禽死之閏月乙巳朔雨雹丁未胡松年罷戊申雪己酉留四川上供銀帛就充軍費乙卯以孟庾沈與求並兼權樞密院事丙辰併諸路提舉常平入茶鹽司罷褔建鑄錢令轉運坑冶司辦集丁巳撒離曷欲犯秦州吳玠遣部將牛皓伺之遇于瓦吾谷戰死癸亥海賊陳感犯雷州官軍屢敗丁卯王罷命戶部尚書章誼措置財用孟庾提領號總制司命川陝宣撫司幕僚攝司事仍權節制軍馬戊辰置路分總管以處間退武臣辛未復置宗正丞掌修屬籍再蠲荊南府歸峽二州荊門公安二軍歲貢上供二年三月甲戌朔以王貪縱不武敗師誤國責授濠州團練使丙子遣樞密計議官呂用中等分使兩浙江東西路檢察經總制司財用丁丑詔侍從至監察御史館職已上在內館職在外侍從官監司帥守各舉所知充監司守令尋命館職專舉縣令己卯以韓世忠兼鎮江府宣撫使劉光世兼太平州宣撫使壬午以都督府參議軍事邵溥兼權川陝宣撫副使罷御前軍器所提舉官併隸工部壬辰命廣東褔建路招捕朱聰乙未初榷鉛錫張浚親討湖賊丁酉復移浙西安撫司于臨安府庚子罷饒州牧馬監夏四月丙午貴池縣丞黃大本坐枉法贓杖脊刺配南雄州丁未遣司農丞蓋諒持詔撫諭川陝召解潛赴行在王彥知荊南府諸鎮撫使至是盡罷戊申太廟神主至自溫州己酉以審量濫賞追左銀青光祿大夫王序八官及職名仍改正出身庚戌詔內侍遇特恩轉官止武功郎壬子訪得周後柴叔夏襲封崇義公戊午奉安太廟神主己未更免役保正長法甲子太上皇帝崩于五國城丙寅帝即射殿行朝獻景靈宮之禮始以惠恭皇后祔祭募民耕營田官給牛種庚午省四川添差官辛未以諸路稅賦畸零增收錢專充上供是月龍圖閣直學士致仕楊時卒五月乙亥初謁太廟庚辰命邵溥吳玠裁省四川冗官浮費辛巳名行宮新作書院為資善堂遣何蘚等奉使金國通問二帝中書舍人胡寅言國家與金世讎無通使之義張浚奏使事兵家機權後將闢地復土終歸於和未可遽絶乃遣行丁亥立殘破州縣守令勸民墾田及拋荒殿最格己丑以孟庾知樞密院事壬辰召張浚還行在丁酉詔浚提舉詳定一司敕令戊戌以貴州防禦使瑗為保慶軍節度使封建國公徽猷閣待制范沖兼資善堂翊善起居郎朱震兼讚讀以盛暑命監司行部慮囚己亥嶽飛軍次鼎州庚子周十隆降辛丑命川陝訪求元祐黨人子孫六月甲辰封武經大夫令矼為安定郡王湖賊楊欽全琮劉詵相繼率衆詣嶽飛降乙巳名新曆曰統元丁未併饒州鑄錢司虔州己酉命建國公瑗出就資善堂聽讀拜范沖朱震出內帑錢賜宗室貧者壬子復省淮南州縣冗官癸丑以久旱減膳祈禱禁諸路科率自租稅和市軍須外皆罷嶽飛急攻湖賊水寨賊將陳䣄降楊太赴水死餘黨劉衡等皆降飛急擊夏誠斬之丁巳湖賊黃誠斬楊太首挾鍾子儀周倫詣都督府降湖湘悉平得戶二萬七千悉遣歸業戊午減褔建貢茶歲額之半庚申以旱罷諸路檢察財用官丁卯以賊平免沿湖民前二年逋租己巳罷褔建諸州槍仗手秋七月壬申朔以仇悆為沿海制置使甲戌免蘄州上供及租稅三年戊寅奬諭嶽飛撫勞將士趣張浚還朝己卯孟庾罷以沈與求兼權樞密院事及措置財用壬午以金均房州隸襄陽府路偽齊兵寇湖陽縣執唐州守臣高青復釋之丁亥賜宇文虛中家福建田十頃甲午詔殘破州縣親民官計到罷之日戶口考殿最韓世忠復鎮淮軍禽偽齊守王拱丙申蠲湖南路上供米三年及秋租之半丁酉置高峯王口二寨都巡檢使益兵戍之八月壬寅朔罷荊南營田司令安撫司措置官兵耕種甲辰定館職額為十八員壬子詔淮南山水寨都巡檢各聽守令節制癸丑蠲褔建州軍借撥常平錢米己未下詔示章惇蔡卞詆誣宣仁聖烈皇后之罪追貶惇昭化軍節度副使卞單州團練副使子孫不許在朝命廣宮學教內外宗子辛酉詔淮南襄陽府等路團結民社丙寅以諸盜平減湖廣江西二十二州雜犯死罪釋徒杖以下囚海賊朱聰降命補水軍統領是月偽齊陷光州九月辛未朔罷總制司所增收頭子等諸色錢乙亥賜禮部進士汪洋以下二百二十人及第出身唱名始遵故典令館職侍立殿上壬午加嶽飛檢校少保偽齊兵寇固始縣統領華旺拒戰卻之尋復光州甲申命沿海州軍籍海舶分守要害乙酉趙鼎上重修神宗實録壬辰詔元符上書邪等范柔中等二十七人各官一子以解潛部兵三千隸馬軍司甲午周十隆復叛犯汀州戊戌遣統領王進李貴討之冬十月庚戌張浚入見乙卯以席益為四川制置大使位宣撫副使上州軍兵馬並隸大使司邊防重事仍令宣撫司處置李綱為江西制置大使呂頤浩為湖南制置大使戊午詔川陝類試合格第一人依殿試第三人例推恩餘並同賜進士出身特奏名進士命宣撫選官試時務策澧州賊雷德進降乙丑偽齊兵寇漣水軍韓世忠遣統制呼延通等逆擊敗之十一月庚午朔初置節度使以下金字牙符命都督府掌之給將帥立戰功者命州縣賣戶帖以助軍費癸酉詔守臣死節昭著者毋限品秩並賜諡乙亥徵和靖處士尹焞于涪州命為崇政殿説書戊寅郊辛巳復置淮南提舉鹽事官壬午出宮女三十人甲申權減宰執及行在官吏奉乙酉以趙開為四川都轉運使丙戌命張浚視師荊襄川陝戊子知衡州裴廩坐調夫築城凍死二千餘人除名嶺南高州編管乙未出內帑綿絹賜宗室丁酉罷催稅戶長十二月己亥朔以嶽飛為荊湖南北襄陽府路蘄黃州招討使楊沂中權主管殿前司併統神武中軍庚子改神武四軍及巡衛軍號行營五護軍辛丑以都督府兵隸三衙命左右司樞密院檢詳官參考中興已行條例修為定法乙巳禁服用翠羽己酉免侍從官輪對庚戌汰橫江水軍三之一癸丑命兩淮川陝荊襄荊南諸帥府參謀官各一員提點屯田癸亥禁川陝州縣官悉用川陝人丙寅都督府遣參議軍事劉子羽主管機宜文字熊彥詩撫諭川陝且察邊備虛實戊辰夜雨雹六年春正月辛未蠲貧民戶帖錢之半無物産者悉除之癸酉命給事中中書舍人甄別元祐黨籍乙亥以內重外輕命省臺寺監及監司守令居職及二年者許更迭出入除擢丁丑詔凡入粟補官者毋授親民刑法之職壬午賜宗子伯玖名璩為和州防禦使罷綿州宣撫副使命吳玠專治兵事罷御史平反刑獄賞丙戌張浚視師荊襄入辭己丑安定郡王令矼薨庚寅還預借坊場錢辛卯詔監司帥臣慢令失職者令張浚黜陟以聞甲午振江湖褔建浙東飢民命監司帥臣分選僚屬及提舉常平官躬行檢察戊戌命鬻通直郎閣門宣贊舍人以下官二月庚子以諸路宣撫制置大使並兼營田大使宣撫副使招討安撫使並兼營田使壬寅雨雪改江淮屯田為營田甲辰置行在交子務印交子錢引給諸路令公私同見錢行用戊申嶽飛入見復以襄陽府路為京西南路辛亥詔張浚暫赴行在奏事甲寅以兵部尚書都督府參謀折彥質簽書樞密院事乙卯韓世忠引兵攻宿遷縣統制呼延通與金兵戰敗之禽其將孛堇牙合澧州賊徒伍俊殺雷德進持其首詣鼎州降丙辰韓世忠圍淮陽軍復置諸路市易務戊午命楊沂中以兵萬人聽都督行府調遣己未遣戶部侍郎劉寧止如鎮江府總領三宣撫司錢糧辛酉兀朮救淮陽韓世忠引兵歸楚州壬戌以折彥質兼權參知政事癸亥沈與求罷李綱入見是月張浚至江上會諸將議事命張俊進屯盱眙三月戊辰朔初收官告綾紙錢名金均房州民兵曰保勝又命招刺三千人賜名必勝軍己巳以韓世忠為京東淮東路宣撫處置使嶽飛為京西湖北路宣撫副使辛未蠲旱傷州縣民積欠錢帛租稅己卯趣嶽飛如鄂州措置軍事辛巳以樞密副都承旨馬擴為沿海制置副使壬午金齊兵犯漣水軍韓世忠擊敗之壬辰寬四川災傷州縣戶帖錢之半夏四月戊戌朔湖南賊黃旺犯桂陽監甲辰偽齊兵陷唐州團練判官扈舉臣推官張從之等皆死嶽飛以母喪去官丙午詔飛起復己酉詔文武臣僚能決勝強敵恢復境土者賜功臣號庚戌始訓諸宗子名甲寅賞淮陽功呼延通等進官有差餘受賞者凡萬七千人劉光世遣副統制王師晟酈瓊襲偽齊兵于劉龍城破之禽其統制華知剛己未命褔建安撫司發水軍討海賊鄭慶辛酉禁四川伐並邊山林甲子以韓世忠為橫海武寧安化軍節度使號揚武翊運功臣除商旅緡錢稅丙寅復行在官吏奉蠲東京民渡淮南商販之稅五月戊辰朔禁以鹿胎為冠癸酉詔未經上殿臣僚先令三省審察然後引對戊寅以四川監司地遠玩法應有違戾令制置大使按劾壬午詔大理寺議獄不合即詣刑部關決刑部不能定同赴都堂稟議賜吳玠四川戶帖錢十萬緡犒軍癸未禁淮南州縣收額外雜色租乙酉改交子為關子罷交子務庚寅以劉光世為保靜寧武寧國軍節度使壬辰以張俊進屯盱眙改崇信奉寧軍節度使甲午禁銷錢及私鑄銅器丙申詔監司慮囚不能遍及者聽遣官著為令六月乙巳夜地震己酉求直言甲寅張浚渡江撫淮上諸屯命劉光世自當塗進屯廬州嶽飛自九江進屯襄陽楊沂中屯泗州戊午詔兩淮沿江守臣並以三年為任辛酉封集英殿修撰令為安定郡王秋七月壬申以司農少卿樊賓提領營田公事癸未詔張浚暫赴行在癸巳罷川陝便宜差遣監司守二以金州隸川陝路均房二州隸京西南路郭浩為永興軍路經略安撫使兼知金州閣門宣贊舍人邵隆知商州聽浩節制經理商虢是月劉光世復壽春府八月己亥范宗尹薨庚子賜左司諫陳公輔三品服癸卯以徽猷閣直學士李逮為四川都轉運使甲辰詔諭將士將親征嶽飛遣統制牛皋破偽齊鎮汝軍禽其守薛亨乙巳命權殿前司解潛等帥精兵扈從主管步軍司邊順留兵守臨安知臨安府梁汝嘉為巡幸隨軍都轉運使丁未以秦檜為醴泉觀使兼侍讀行宮留守孟庾提舉萬壽觀兼侍讀同留守戊申嶽飛遣將楊再興復西京長水縣己酉命秦檜孟庾權參決尚書省樞密院事庚戌蠲虔州殘破諸縣逋負梅州夏秋兩稅聽廣東經略安撫司便宜措置盜賊辛亥奉神主發臨安丁巳權罷經筵進講己未預借江浙民來年夏稅絁帛折米輸官庚申增給職事官米月三斛是月張俊城盱眙進屯泗州嶽飛及偽齊李成孔彥舟連戰至蔡州克之偽守劉永壽舉城降九月丙寅朔帝發臨安嶽飛遣統制王貴郝晸董先復虢州盧氏縣癸酉帝次平江戊寅命職事官日一員輪對壬午嶽飛以孤軍無援復還鄂州癸未權奉安神主于平江能仁寺戊子以戶部郎官霍蠡總領嶽飛軍錢糧庚寅張浚入奏復如鎮江辛卯立賊徒相招首罪賞格賞鎮淮軍功進統制王德等官是月劉豫聞親征告急于金主亶求援亶不許豫自起兵三十萬命子麟趣合肥姪猊出渦口引兵分道入寇冬十月丙申招西北流寓人補闕額禁軍丁酉裁定淮南路租額劉麟寇淮西張俊遣楊沂中張宗顏等分兵禦之戊戌沂中至濠州劉光世已棄廬州而南浚遣人督還光世不得已駐兵應沂中遣統制王德酈瓊及賊將崔皋賈澤王遇戰皆敗之賊兵攻壽春府芍陂寨守臣孫暉拒戰又敗之辛丑罷四川監酒官百餘員壬寅以梁汝嘉兼浙西淮東沿海制置使前護副軍都統制王彥副之癸卯趙鼎請降敕諭張浚令光世沂中及張俊全軍引還為防江之計甲辰又詔浚督將士僇力破賊皆未達劉猊犯定遠縣沂中進戰大敗之于藕塘猊挺身遁麟在順昌聞之拔寨去劉光世遣王德及沂中追麟至南壽春而還孔彥舟亦解光州圍而去戊申命解潛遣兵千人守青龍港口癸丑張俊楊沂中引兵攻壽春府不克而還乙卯詔諸軍所俘人民給錢米遣歸丁巳惠州軍賊曾衮作亂庚申摧鋒軍統制韓京募敢死士夜襲破之衮尋出降壬戌日中有黑子沒十二月甲午朔詔降廬光濠等州死罪釋流以下囚召秦檜赴行在張浚入見請幸建康趙鼎請還臨安戊戌韓世忠攻淮陽軍及金人戰敗之辛丑城南壽春府壬寅趙鼎罷遣右司員外郎范直方宣諭川陝撫問吳玠將士甲辰命都督府參議軍事呂祉如建康措置移蹕丙午折彥質罷丁未賞淮西功加張俊少保改鎮洮崇信奉寧軍節度使楊沂中保成軍節度使殿前都虞候戊申命秦檜赴講筵供職孟庾為行宮留守辛亥以資政殿學士張守參知政事兼權樞密院事丙辰以呂頤浩為浙西安撫制置大使判臨安府丁巳以劉光世為護國鎮安保靜軍節度使戊午詔凡因民事被罪者不許親民己未命辰沅靖澧四州以間田募刀弩手三千五百人為額右司諫陳公輔乞禁程氏學詔士大夫之學宜以孔孟為師庶幾言行相稱可濟時用庚申以安化郡王王稟死節太原賜其家田十頃辛酉以山陰諸暨等四十縣為大邑並命堂除七年春正月癸亥朔帝在平江下詔移蹕建康蠲無為軍稅役一年置建康御前軍器局丁卯賞張浚以破敵功遷特進己巳發米萬石濟京東陝西來歸之民張浚入見甲戌罷都督府諸州市易官丁丑解潛罷以劉錡權主管馬軍司並殿前步軍司公事庚辰築采石宣化渡二城癸未以翰林學士陳與義參知政事資政殿學士沈與求同知樞密院事詔廣西帥臣訓練土丁保丁乙酉復置樞密使副知院以下仍舊張浚改兼樞密使丙戌禁諸軍互納亡卒西蕃三十八族首領趙繼忠等來歸丁亥以秦檜為樞密使何蘚范寧之至自金國始聞上皇及寧德皇后崩己丑帝成服下詔降徒囚釋杖以下辛卯夜東北有赤氣如火二月癸巳朔日有食之百官七上表請遵以日易月之制徽猷閣待制知嚴州胡寅請服喪三年衣墨臨戎以化天下帝欲遂終服而張浚連疏論喪服不可即戎遂詔外朝勉從所請宮中仍行三年之喪丙申太平州火丁酉鎮江府火庚子遣王倫等使金國迎奉梓宮嶽飛入見辛丑以日食求直言以久旱命諸州慮囚乙巳詔凡辟舉官犯贓罪罪及所舉官丙午吳玠置銀會子于河池丁未詔席益募陝西河東河北兵二千部送行在充扈衛癸丑雨雹丙辰始御便殿果州守臣宇文彬等進禾登九穗圖俱奪一官罷之丁巳以嶽飛為太尉湖北京西宣撫使己未帝發平江三月癸亥朔次丹陽韓世忠入見命世忠扈從嶽飛次之甲子次鎮江楊沂中入見命沂中總領彈壓巡幸事務乙丑蠲駐蹕及經從州縣積年逋賦丁卯以吏部侍郎呂祉為兵部尚書都督府參謀軍事辛未帝至建康壬申詔尚書省常程事從參知政事分治癸酉減建康流罪以下囚蠲建康府太平宣州逋賦及下戶今年身丁錢嶽飛乞併統淮西兵以復京畿陝右許之命飛盡護王德等諸將軍既而秦檜等以合兵為疑事遂寢戊寅手詔撫勞將士進沈與求知樞密院事己卯尊宣和皇后為皇太后庚辰以王彥兵隸侍衛馬軍司呂頤浩為少保兼行宮留守孟庾罷甲申以劉光世為少師萬壽觀使以其兵隸都督府張浚因分為六軍命呂祉節制乙酉賜光世第于建康府丁亥命虔吉南安軍諸縣各募土兵百人責知縣訓練防禦盜賊是春廣西大飢李實變為桃夏四月癸巳築太廟于建康以臨安府太廟為聖祖殿戊戌修濬建康城池丁未嶽飛乞解官持餘服遂棄軍去詔不許戊申日中有黑子庚戌以張浚纍陳嶽飛積慮專在併兵奏牘求去意在要君遂命兵部侍郎兼都督府參議軍事張宗元權湖北京西宣撫判官實監其軍壬子張浚如太平州淮西視師庚申以信陽軍隸京西路罷淮南提點司東西兩路各置轉運兼提點刑獄提舉茶鹽常平事五月丁卯詔李綱趣捕虔吉諸盜壬申命禮官舉文宣王武成王熒惑壽星嶽鎮海瀆農蠶風雷雨師之祀甲戌以胡安國提舉萬壽觀兼侍讀趣赴行在未至而罷癸未以酈瓊為行營左護軍副都統制甲申初試樞密院都督府效士乙酉命侍從官通舉材堪知縣者二十人丙戌偽齊陷隨州己丑禁四川增印錢引六月辛卯朔改上惠恭皇后諡曰顯恭皇后嶽飛入見壬辰命歲辰戌月祀大火配以閼伯乙未罷江淮營田司令諸路安撫轉運司兼領其事丙申以重修神宗實録去取未當命史館復加考訂丁酉嶽飛引過自劾詔放罪慰諭之戊戌命劉錡兼都督府咨議軍事率兵戍廬州乙巳沈與求薨召王德以所部兵赴行在遣呂祉如淮西撫諭諸軍丙辰詔吳玠李逮共議四川經費贍軍恤民嶽飛復職秋七月戊辰詔侍從各舉可任監司郡守者一二人癸酉以旱禱於天地宗廟社稷甲戌嗣濮王仲湜薨癸未以久旱命中外臣庶實封言事甲申蠲諸路民積年逋租以建康疫盛遣醫行視貧民給錢葬其死者命疏決滯獄乙酉詔即建康權正社稷之位戊子詔戶部長二迭出巡按諸路考究財賦利病違者劾之己丑詔諸路歸業民墾田及八年始輸全稅八月乙未以張俊為淮西宣撫使駐盱眙楊沂中為淮西制置使主管侍衛馬軍司劉錡副之並駐廬州命酈瓊率兵赴行在戊戌瓊叛殺中軍統制張景等執呂祉及趙康直趙不羣以兵四萬人奔劉豫辛丑手詔赦廬州屯駐行營左護軍壬寅酈瓊引兵至淮殺祉及康直釋不羣使還劉錡吳錫至廬州以兵追之不及命張宗元往招之張浚乞去位甲辰以趙鼎為萬壽觀使兼侍讀甲寅詔命官犯贓刑部不得擅黥配聽朝廷裁斷乙卯賜嶽飛軍錢十萬緡招歸正業人耕湖北京西間田九月甲子上太上皇帝諡曰聖文仁德顯孝皇帝廟號徽宗皇后曰顯肅皇后丁卯韓世忠張俊入見乃命俊自盱眙移屯廬州壬申張浚罷癸酉命參知政事輪日當筆權三省事更不分治常程罷都督府甲戌以臺諫纍疏落張浚觀文殿大學士仍領宮祠丙子復以趙鼎為尚書左僕射同中書門下平章事兼樞密使戊寅以廬州壽春府民遭酈瓊虜掠蠲租稅一年己卯朝獻聖祖于常朝殿庚辰朝饗太廟辛巳合祭天地于明堂大赦召劉光世赴行在戊子禁諸路進羡餘以劉錡知廬州兼淮西制置副使冬十月庚寅朔詔仍舊開經筵辛卯命後省官看詳上書有可采者條上行之丁酉夜敕張浚安置嶺表戊戌趙鼎纍請浚母老改永州居住偽齊犯泗州守臣劉綱擊走之丙午命戶部郎官薛弼霍蠡同總領江西湖廣五路財賦壬子統制呼延通王權等襲擊金人于淮陽軍敗之丁巳詔六參日輪行在百官一員轉對閏月癸亥贈趙康直徽猷閣待制乙丑蠲江東路月樁錢萬緡發米二萬石振京西湖北飢民丙寅尹焞入見命為祕書郎兼崇政殿説書甲戌始作徽宗皇帝顯肅皇后神主庚辰韓世忠引兵渡淮逆擊金人于劉冷莊敗之辛巳李綱罷癸未復漢陽軍是月張俊棄盱眙引兵還建康十一月丙申賜吳玠犒軍錢百五十萬緡丁酉以知溫州李光為江西安撫制置大使丁未金帥撻懶兀朮入汴京執偽齊劉豫廢為蜀王癸丑詔來春復幸浙西是月偽齊知臨汝軍崔虎詣嶽飛降十二月庚辰復置都大提舉四川茶馬監牧官丁卯祔徽宗皇帝顯肅皇后神主于太廟庚午以解潛權主管馬步軍司命韓世忠留屯楚州屏蔽江淮己卯詔內外大將及侍從官舉武臣智略器局堪帥守謀議官者癸未王倫等使還入見言金國許還梓宮及皇太后又許還河南諸州甲申城泗州丁亥復遣王倫等奉迎梓宮是冬吳玠遣裨將馬希仲攻熙州鄭宗李進攻鞏州不克宗死于城下希仲遁還玠斬以徇
