body:
  text: 宋史卷六十八志第二十一律曆一應天乾元儀天曆古者帝王之治天下以律曆為先儒者之通天人至律曆而止曆以數始數自律生故律曆既正寒暑以節歲功以成民事以序庶績以凝萬事根本由茲立焉古人自入小學知樂知數已曉其原後世老師宿儒猶或弗習律曆而律曆之家未必知道各師其師岐而二之雖有巧思豈能究造化之統會以識天人之蘊奧哉是以審律造曆更易不常卒無一定之說治效之不古若亦此之由而世豈察及是乎宋初承五代之季王朴制律曆作律準以宣其聲太祖以雅樂聲高詔有司考正和峴等以影表銅臬暨羊頭秬黍纍尺制律而度量權衡因以取正然纍代尺度與望臬殊黍有巨細縱橫容積諸儒異議卒無成說至崇寧中徽宗任蔡京信方士聲為律身為度之說始大盩乎古矣顯德欽天曆亦朴所制也宋初用之建隆二年以推驗稍疏詔王處訥等別造新曆四年曆成賜名應天未幾氣候漸差太平興國四年行乾元曆未幾氣候又差繼作者曰儀天曰崇天曰明天曰奉元曰觀天曰紀元逮靖康丙午百六十餘年而八改曆南渡之後曰統元曰乾道曰淳熙曰會元曰統天曰開禧曰會天曰成天至德祐丙子又百五十年復八改曆使其初而立法吻合天道則千歲日至可坐而致奚必數數更法以求幸合玄象哉蓋必有任其責者矣雖然天步惟艱古今通患天運日行左右既分不能無忒謂七十九年差一度雖視古差密亦僅得其概耳又况黃赤道度有斜正闊狹之殊日月運行有盈縮朏朒表𩹉之異測北極者率以千里差三度有奇晷景稱是古今測驗止於嶽臺而嶽臺豈必天地之中餘杭則東南相距二千餘里華夏幅員東西萬里發斂晷刻豈能盡諧又造曆者追求曆元踰越曠古抑不知二帝授時齊政之法畢殫於是否乎是亦儒者所當討論之大者諉曰星翁曆生之責可哉至於儀象推測之具雖亦數改若熙寧沈括之議宣和璣衡之制其詳密精緻有出於淳風令瓚之表者蓋亦未始乏人也今其遺法具在方冊惟奉元會天二法不存舊史以乾元儀天附應天今亦以乾道淳熙會元附統元開禧成天附統天大抵數異術同因仍增損以追合乾象俱無以大相過備載其法俾來者有考焉昔黃帝作律呂以調陰陽之聲以候天地之氣堯則欽若曆象以授人時以成歲功用能綜三才之道極萬物之情以成其政化者也至司馬遷班固其指要著之簡策自漢至隋歷代祖述益加詳悉暨唐貞觀迄周顯德五代隆替踰三百年博達之士頗亦詳緝廢墜而律志皆闕宋初混一𧜛內能士畢舉國經王制悉復古道漢志有備數和聲審度嘉量權衡之目後代因之今亦用次序以志于篇曰備數周禮保氏教國子以六藝其六曰九數謂方田粟米差分少廣商功均輸方程贏朒旁要是為九章其後又有海島孫子五曹張丘建夏侯陽周髀綴術緝古等法相因而起歷代傳習謂之小學唐試右千牛衛胄曹參軍陳從運著得一算經其術以因折而成取損益之道且變而通之皆合於數復有徐仁美者作增成玄一法設九十三問以立新術大則測於天地細則極於微妙雖粗述其事亦適用於時古者命官屬於太史漢魏之世皆在史官隋氏始置算學博士於國庠唐增其員宋因而不改曰和聲周禮典同掌六律六同之和凡為樂器以十有二律為之數度古之聖人推律以制器因器以宣聲和聲以成音比音而為樂然則律呂之用其樂之本歟以其相生損益數極精微非聰明博達則罕能詳究故歷代而下其法或存或闕前史言之備矣周顯德中王朴始依周法以秬黍校正尺度長九寸虛徑三分為黃鐘之管作律準以宣其聲宋乾德中太祖以雅樂聲高詔有司重加考正時判太常寺和峴上言曰古聖設法先立尺寸作為律呂三分損益上下相生取合真音謂之形器但以尺寸長短非書可傳故纍秬黍求為準的後代試之或不符會西京銅望臬可校古法即今司天臺影表銅臬下石尺是也及以朴所定尺比校短於石尺四分則聲樂之高蓋由於此况影表測於天地則管律可以準繩上乃令依古法以造新尺並黃鐘九寸之管命工人校其聲果下於朴所定管一律又內出上黨羊頭山秬黍纍尺校律亦相符合遂下尚書省集官詳定衆議僉同由是重造十二律管自此雅音和暢曰審度者本起於黃鐘之律以秬黍中者度之九十黍為黃鐘之長而分寸尺丈引之制生焉宋既平定四方凡新邦悉頒度量於其境其僞俗尺度踰於法制者去之乾德中又禁民間造者由是尺度之制盡復古焉曰嘉量周禮石函氏為量漢志云物有多少受以量本起於黃鐘之管容秬黍千二百而籥合升斗斛五量之法備矣太祖受禪詔有司精考古式作為嘉量以頒天下其後定西蜀平嶺南復江表泉浙納土並汾歸命凡四方斗斛不中式者皆去之嘉量之器悉復升平之制焉曰權衡之用所以平物一民知輕重也權有五曰銖兩斤鈞石前史言之詳矣建隆元年八月詔有司按前代舊式作新權衡以頒天下禁私造者及平荊湖即頒量衡於其境淳化三年三月三日詔曰書云協時月正日同律度量衡所以建國經而立民極也國家萬邦咸乂九賦是均顧出納於有司繫權衡之定式如聞秬黍之制或差毫釐錘鈎為姦害及黎庶宜令詳定稱法著為通規事下有司監內藏庫崇儀使劉承圭言太府寺舊銅式自一錢至十斤凡五十一輕重無準外府歲受黃金必自毫釐計之式自錢始則傷於重遂尋究本末別制法物至景德中承圭重加參定而權衡之制益為精備其法蓋取漢志子穀秬黍為則廣十黍以為寸從其大樂之尺秬黍黑黍也樂尺自黃鐘之管而生也謂以秬黍中者為分寸輕重之制就成二術二術謂以尺黍而求氂絫因度尺而求氂度者丈尺之總名焉因樂尺之源起於黍而成於寸析寸為分析分為氂析氂為毫析毫為絲析絲為忽十忽為絲十絲為毫十毫為氂十氂為分自積黍而取絫從積黍而取絫則十黍為絫十絫為銖二十四銖為兩錘皆以銅為之以氂絫造一錢半及一兩等二稱各懸三毫以星準之等一錢半者以取一稱之法其衡合樂尺一尺二寸重一錢錘重六分盤重五分初毫星準半錢至稍總一錢半析成十五分分列十氂第一毫下等半錢當五十氂若十五斤稱等五斤也中毫至稍一錢析成十分分列十氂末毫至稍半錢析成五分分列十氂等一兩者亦為一稱之則其衡合樂分尺一尺四寸重一錢半錘重六錢盤重四錢初毫至稍布二十四銖下別出一星等五絫每銖之下復出一星等五絫則四十八星等二百四十絫計二千四百絫為十兩中毫至稍五錢布十二銖列五星星等二絫布十二銖為五錢之數則一銖等十絫都等一百二十絫為半兩末毫至稍六銖銖列十星星等絫每星等一絫都等六十絫為二錢半以御書真草行三體淳化錢較定實重二銖四絫為一錢者以二千四百得十有五斤為一稱之則其法初以積黍為準然後以分而推忽為定數之端故自忽絲毫氂黍絫銖各定一錢之則謂皆定一錢之則然後制取等稱也忽萬為分以一萬忽為一分之則以十萬忽定為一錢之則忽者吐絲為忽分者始微而著言可分別也絲則千一千絲為一分以一萬絲定為一錢之則毫則百一百毫為一分以一千毫定為一錢之則毫者毫毛也自忽絲毫三者皆斷驥尾為之氂則十一十氂為一分以一百氂定為一錢之則氂者氂牛尾毛也曳赤金成絲為之也轉以十倍倍之則為一錢轉以十倍謂自一萬忽至十萬忽之類定為則也黍以二千四百枚為一兩一籥容千二百黍為十二銖則以二千四百黍定為一兩之則兩者以二籥為兩絫以二百四十謂以二百四十絫定為一兩之則銖以二十四轉相因成絫為銖則以二百四十絫定成二十四銖為一兩之則銖者言殊異遂成其稱稱合黍數則一錢半者計三百六十黍之重列為五分則每分計二十四黍又每分析為一十氂則每氂計二黍十分黍之四以十氂分二十四黍則每氂先得二黍都分成四十分則一氂又得四分是每氂得二黍十分黍之四每四毫一絲六忽有差為一黍則氂絫之數極矣一兩者合二十四銖為二千四百黍之重每百黍為銖二百四十黍為絫二銖四絫為錢二絫四黍為分一絫二黍重五釐六黍重二釐五毫三黍重一氂二毫五絲則黍絫之數成矣其則用銅而鏤文以識其輕重新法既成詔以新式留禁中取太府舊稱四十舊式六十以新式校之乃見舊式所謂一斤而輕者有十謂五斤而重者有一式既若是權衡可知矣又比用大稱如百斤者皆懸鈞於架植鐶於衡鐶或偃手或抑按則輕重之際殊為懸絶至是更鑄新式悉由黍絫而齊其斤石不可得而增損也又令每用大稱必懸以絲繩既置其物則却立以視不可得而抑按復鑄銅式以御書淳化三體錢二千四百暨新式三十有三銅牌二十授於太府又置新式於內府外府復頒于四方大都凡十有一副先是守藏吏受天下歲貢金帛而太府權衡舊式失準得因之為姦故諸道主者坐逋負而破産者甚衆又守藏更代校計爭訟動必數載至是新制既定奸弊無所指中外以為便度量權衡皆太府掌造以給內外官司及民間之用凡遇改元即差變法各以年號印而識之其印面有方印長印八角印明制度而防僞濫也宋初用周顯德欽天曆建隆二年五月以其曆推驗稍疏乃詔司天少監王處訥等別造曆法四年四月新法成賜號應天曆太平興國間有上言應天曆氣候漸差詔處訥等重加詳定六年表上新曆詔付本監集官詳定會冬官正吳昭素徐瑩董昭吉等各獻新曆處訥所上曆遂不行詔以昭素瑩昭吉所獻新曆遣內臣沈元應集本監官屬學生參校測驗考其疏密秋官正史端等言昭吉曆差昭素瑩二曆以建隆癸亥以來二十四年氣朔驗之頗為切準復對驗二曆唯昭素曆氣朔稍均可以行用又詔衛尉少卿元象宗與元應等再集明曆術吳昭素劉內真苗守信徐瑩王熙元董昭吉魏序及在監官屬史端等精加詳定象宗等言昭素曆法考驗無差可以施之永久遂賜號為乾元曆應天乾元二曆皆御製序焉真宗嗣位命判司天監史序等考驗前法研核舊文取其樞要編為新曆至咸平四年三月曆成來上賜號儀天曆凡天道運行皆有常度曆象之術古今所同蓋變法以從天隨時而推數故法有疏密數有繁簡雖條例稍殊而綱目一也今以三曆參相考校以應天為本乾元儀天附而注之法同者不復重出法殊者備列于後建隆應天曆演紀上元木星甲子距建隆三年壬戌歲積四百八十二萬五千五百五十八乾元上元甲子距太平興國六年辛巳積三千五十四萬三千九百七十七儀天自上元土星甲子至咸平四年辛丑積七十一萬六千四百九十七步氣朔元法一萬二乾元元率九百四十儀天宗法一萬一百又總謂之日法歲盈二十六萬九千三百六十五乾元歲周二十一萬四千七百六十四儀天歲周三十六萬八千八百九十七儀天有周天三百六十五餘二千四百七十約餘二千四百四十五歲餘五萬二千九百七十餘二千四百七十應天乾元無此法後皆倣此月率五萬九千七十三乾元不置此法儀天合率二十九萬八千二百五十九又儀天有歲閏一萬九千八百六十二月閏九千一百一十五秒六會日二十九小餘五千三百七乾元朔策二十九小餘一千五百六十儀天會日二十九小餘五千三百五十七弦策七小餘三千八百二十七秒六乾元小餘一千一百二十五儀天小餘三千八百六十四秒二十七策並同望策十四小餘七千六百五十四秒一十二乾元小餘二千二百五十七儀天小餘七千七百二十七秒一十八策並同氣策十五小餘二千一百八十