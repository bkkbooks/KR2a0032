body:
  text: 宋史卷五十二志第五天文五七曜景星彗孛客星流星妖星星變雲氣日食日變日輝氣月食月變月輝氣七曜日為太陽之精君之象日行一度一年一周天日月行有道之國則光明君道至大則日色光明動不失時則日揚光至德之萌日月如連璧君臣有道則日含王字君亮天工則日備五色有聖人起則日再中人君有德日有四彗光芒四出日有二彗一年再赦周禮視祲掌十輝之法一曰祲陰陽五色之氣浸淫相侵二曰象雲氣成形象三曰日旁氣刺日四曰監雲氣臨日上五曰暗謂蝕及日光脫六曰不光明七曰彌白虹貫日八曰序謂氣若山而在日上及冠珥背璚重疊次序在于日旁九曰隮謂暈及虹也十曰想五色有形想凡黃氣環在日左右為抱氣居日上為戴氣為冠氣居日下為承氣為履氣居日下左右為紐氣為纓氣抱氣則輔臣忠餘皆為喜為得地吉一珥在日西則西軍勝在東則東軍勝南北亦然無兵亦有拜將兩珥氣圜而小在日左右主民壽考三珥色黃白女主喜純白為喪赤為兵青為疾黑為水四珥主立侯王有子孫喜日有黃芒君福昌多黃輝王政太平日無光為兵喪又為臣有陰謀日旁雲氣白如席兵衆戰死黑有叛臣如蛇貫之而青穀多傷白為兵赤其下有叛黃臣下交兵黑為水日始出黑雲氣貫之三日有暴雨青雲在上下可出兵有赤氣如死蛇為饑為疫雜氣刺日皆為兵日暈七日內無風雨亦為兵甲乙憂火丙丁臣下忠戊己后族盛庚辛將利壬癸臣專政半暈相有謀黃則吉黑為災暈再重歲豐色青為兵穀貴赤蝗為災三重兵起四重臣叛五重兵饑六重兵喪七重天下亡日並出諸侯有謀無道用兵者亡日闢為兵寇日隕下失政日中見飛燕下有廢主日中黑子臣蔽主明日晝昏臣蔽君之明有篡弒赤如血君喪臣叛日夜出兵起下陵上大水日光四散君失明白虹貫日近臣亂諸侯叛日赤如火君亡日生牙下有賊臣日食為陰蔽陽食既則大臣憂臣叛主兵起日食在正旦王者惡之日珥甲乙日有二珥四珥而食白雲中出主兵丙丁黑雲天下疫戊己青雲兵喪庚辛赤雲天下有少主壬癸黃雲有土功日食在甲乙日主四海之外不占丙丁江淮海岱也戊己中州河濟也庚辛華山以西壬癸常山以北各以其下所主當之寅卯辰木招謀者司徒也巳午未火招謀者太子也申酉戌金司馬也亥子丑水司空也月為太陰之精女主之象一月一周天君明則依度臣專則失道或大臣用事兵刑失理則乍南乍北或女主外戚專權則或進或退月變色為殃青饑赤兵旱黃喜黑水晝明則姦邪作月旁瑞氣一珥五穀登兩珥外兵勝四珥及生戴氣君喜國安終歲不暈天下偃兵晦而明見西方日朏朔而明見東方日仄匿朏則政緩仄匿則政急六日而弦臣專政七日而弦主勝客八日而弦天下安十日不弦將死戰不勝兩月並見兵起國亂水溢星入月中亡國破將白暈貫之下有廢主白虹貫之為大兵起生齒則下有叛臣生足則后族專政月珥背璚暈而珥六十日兵起珥青憂赤兵白喪黑國亡黃喜有背璚臣下薥縱欲相殘賊不和之氣暈三重兵起四重國亡五重女主憂六重國失政七重下易主八重亡國九重兵起亡地十重天下更始月食從上始則君失道從旁始為相失令從下始為將失法歲星犯之兵饑民流熒惑犯之大將死有叛臣民饑填星犯之人臣弒主合國饑月食填星民流一曰月犯填女主憂民流太白犯出月右為陰國有謀左為陽國有謀出月下君死民流月戴太白起兵入月將死與太白會太子危辰星犯之天下水月食辰水饑辰入月臣叛主彗星入或犯之兵期十二年大饑貫月臣叛主流星犯之有兵入無光有亡國在月上下國將亂月犯列星其國受兵星食月國相死星見月中主憂凡月之行歷二十有九日五十三分而與日相會是謂合朔當朔日之交月行黃道而日為月所掩則日食是為陰勝陽其變重自古聖人畏之若日月同度于朔月行不入黃道則雖會而不食月之行在望與日對衝月入于暗虛之內則月為之食是為陽勝陰其變輕昔朱熹謂月食終亦為災陰若退避則不至相敵而食所謂暗虛蓋日火外明其對必有暗氣大小與日體同此日月交會薄食之大略也日食修德月食修刑自昔人主遇災而懼側身修行者此也歲星為東方為春為木於人五常仁也五事貌也超舍而前為贏退舍為縮色光明潤君壽民富又主福主大司農主五穀石申曰歲星所在國不可伐如歲在卯不可東征甘德曰所去國凶所之國吉退行為凶災主泰山徐青兗及角亢氐房心尾箕君令不順則歲星退行入陰為內事入陽為外事行陰道為水行陽道為旱星大則喜小則牛馬多死疾疫初見小而日益大所居國利初出大而日小國耗荊州占歲星色黑為喪黃則歲豐白為兵青多獄君暴則色赤熒惑相犯為大戰相去方寸為犯戰客勝食火國亡邊侵曰食守之為賊居之不去為守觸火則國亂兩體俱動而直曰觸合鬬為饑旱離復合合復離曰鬬填星相犯退犯填太子叛當東反西曰退與填星合為內亂民饑芒角相及同光曰合守填星其下城敗太白相犯大臣黜女主喪觸太白則四邊來侵守太白為四序不調合鬬則大將死辰星相犯太子憂觸辰主憂守憂賊合則君臣和晝見則臣強他星犯之主不安客星犯守主憂流星犯之色蒼黑大農死赤為饑疫黃則歲豐抵之臣叛主熒惑為南方為夏為火於人五常禮也五事視也晉灼曰常以十月入太微受制而出行列宿司無道出入無常二歲一周天出則有兵入則兵散逆行一舍二舍為不祥所舍國為亂賊疾喪饑兵或環繞勾巳芒角動搖變色乍前乍後為殃愈甚退行一舍天下有火災五舍大臣叛星經曰主霍山揚荊交州又主輿鬼柳七星又主大鴻臚又曰主司空為司馬主楚吳越以南司天下羣臣之過失東行則兵聚東方西行則兵聚西方天下安則行疾與歲星相犯主冊太子有赦觸歲星有子守之太子危填星相犯兵大起入填星將為亂觸之有刀兵守之有內賊太子危與太白相犯主亡兵起守北太子憂南庶子憂環繞偏將死與辰星相犯兵敗與辰星相會為旱秋為兵冬為喪守之太子憂有赦他星相犯兵起祅星犯之為兵為火填星為中央為季夏為土於人五常信也五事思也常以甲辰元始之歲填行一宿二十八歲而一周天四星皆失填為之動所居國吉女子有福不可伐去之失地天子失信則填大動盈則超舍以德盈則加福刑盈則不復縮則退舍不及常德縮則迫戚刑縮則不育星經曰主嵩山豫州又主東井行中道則陰陽和調退行一舍為水二舍海溢河決經天退行天下更政地動巫咸曰光明歲熟大明主昌小暗主憂春青夏赤女主喜春色蒼歲大熟色赤饑有芒兵與歲星相犯相鬬為內亂合則野有兵熒惑相犯為兵喪合則為兵為內亂大人忌之太白相犯為內兵有大戰一曰王者失地合於太微國有大兵一曰國亡辰星犯為兵為旱祅星犯下臣謀上流星犯則民多事與月相犯有兵太白為西方為秋為金於人五常義也五事言也常以正月甲寅與火晨出東方二百四十日而入入四十日又出西方二百四十日而入入三十五日而復出東方出以寅戌入以丑未也一年一周天日方南太白居其南日方北太白居其北為贏侯王不寧用兵進吉退凶日方南太白居其北日方北太白居其南為縮侯王有憂用兵退吉進凶星經曰主華陰山梁雍益州又主奎婁胃昴畢觜參出西方失行外國敗出東方失行中國敗若經天天下革民更主是謂亂紀人衆流亡晝見與日爭明強國弱女主昌又曰主大臣巫咸曰光明見影戰勝歲熟狀炎然而上兵起光如張蓋下有立王凡與歲星相犯兵敗失地犯熒惑客敗主勝犯填星太子不安失地犯辰星主兵入月主死其下兵犯月角兵起在左則中國勝在右則外國勝當見不見失地破軍他星犯其事急祅星犯邊城有戰客星犯主兵將死凡太白至午位避日而伏若行至未即為經天其災異重也辰星為北方為冬為水於人五常智也五事聽也常以二月春分見奎婁五月夏至見東井八月秋分見角亢十一月冬至見牽牛出以辰戌入以丑未二旬而入晨候之東方夕候之西方也一年一周天出早為月食晚為彗星及天祅一時不出其時不和四時不出天下大饑星經曰主常山冀並幽州又主斗牛女虛危室壁又曰主燕趙代主廷尉以比宰相之象石申曰色黃五穀熟黑為水蒼白為喪凡與歲星相犯皇后有謀熒惑犯妨太子填星犯兵敗太白亦然芒角相及同光曰合他星光曜相逮為害客星太陰流星相犯主內患凡五星歲星色青比參左肩熒惑色赤比心大星填星色黃比參右肩太白色白比狼星辰星色黑比奎大星得其常色而應四時則吉變常為凶木與土合為內亂饑與水合為變謀而更事與火合為饑為旱與金合為白衣之會合鬬國有內亂野有破軍為水太白在南歲星在北名曰牝牡年穀大熟太白在北歲星在南其年或有或無火與金合為爍為喪不可舉事用兵從軍為軍憂離之軍却出太白陰分地出其陽偏將戰與土合為憂主孽卿與水合為北軍用兵舉事大敗一曰火與水合為焠不可舉事用兵土與水合為壅沮不可舉事用兵有覆軍一曰為變謀更事必為旱與金合為疾為白衣會為內兵國亡地與木合國饑水與金合為變謀為兵憂木火土金與水鬬皆為戰兵不在外皆為內亂三星合是謂驚立絶行其國外內有兵與喪百姓饑乏改立侯王四星合是謂大湯其國兵喪並起君子憂小人流五星若合是謂易行有德受慶改立王者奄有四方子孫蕃昌亡德受殃離其國家滅其宗廟百姓離去被滿四方五星皆大其事亦大皆小事亦小五星俱見其年必惡凡五星與列宿相去方寸為犯居之不去為守兩體俱動而直曰觸離復合合復離曰鬬當東反西曰退芒角相及同舍曰合凡五星東行為順西行曰逆順則疾逆則遲通而率之終於東行不東不西曰留與日相近而不見曰伏伏與日同度曰合凡金水二星行速而不經天自始與日合後行速而先日夕見西方去日前稍遠夕時欲近南方則漸遲遲極則留留而近日則逆行而合日在于日後晨見東方逆極則留留而後遲遲極去日稍遠旦時欲近南方則速行以追日晨伏于東方復與日合度此五星合見遲疾順逆留行之大端也凡五星之行古法周天之數如歲星謂十二年一周天乃約數耳晉灼謂太歲在四仲則行三宿在四孟四季則行二宿故十二年而行周二十八宿其說亦非夫二十八宿度有廣狹而歲星之行自有盈縮豈得以十二年一周無差忒乎唐一行始言歲星自商周迄春秋季年率百二十餘年而超一次因以為常以春秋亂世則其行速時平則其行遲其說尤迂既乃為後率前率之術以求之則其說自悖矣今紹興曆法歲星每年行一百四十五分是每年行一次之外有餘一分積一百四十四年剩一次矣然則先儒之說安可信乎餘四星之行固無逆順中間亦豈無差忒一行不復詳言蓋亦知之矣景星景星德星也一曰瑞星如半月生於晦朔大而中空其名各異曰周伯其色黃煌煌然所見之國大昌曰含譽光耀似彗喜則含譽射曰格澤狀如炎火下大上鋭色黃白起地上見則不種而穫曰歸邪兩赤彗向上有蓋曰天保星有音如炬火下地野雞鳴皆五行冲和之氣所生也其王蓬芮玄保昭明昏昌旬始司危菟昌地維臧光之類亦皆為瑞星然前志以王蓬芮已下星為妖星又奇星古無所考見於仁宗英宗之時故附於景星之末云彗孛彗星小者數寸長者或竟天見則兵起大水除舊布新之兆也其體無光傅日而為光故夕見則東指晨見則西指光芒所及則為災有五色各依五行本精所生孛星彗屬偏指曰彗芒氣四出曰孛孛者孛孛然非常惡氣之所生也主大亂主大兵災甚於彗旄頭星玉冊云亦彗屬也客星客星有五周伯老子王蓬絮國皇溫星是也周伯大而黃煌煌然所見之國兵喪饑饉民庶流亡老子明大純白出則為饑為凶為善為惡為喜為怒王蓬絮狀如粉絮拂拂然見則其國兵起有白衣之會國皇大而黃白有芒角主兵起水災人主惡之溫星色白狀如風動搖常出四隅皆主兵此五星錯出乎五緯之間其見無期其行無度各以其所在分野而占之又四隅各有三星東南曰盜星主大盜西南曰種陵出則穀貴西北曰天狗見則天下大饑東北曰女帛主有大喪流星流星天使也自上而降曰流東西橫行亦曰流流星有八曰天使曰天暉曰天鴈曰天保曰地鴈曰梁星曰營頭曰天狗流星之為天使者有祥有妖為天暉天鴈夜隕而為天保則祥若夜隕而為地鴈梁星晝隕而為營頭則妖流星之大者為奔星夜隕而為天狗厥妖大自下而升曰飛飛星有五亦有妖祥之分飛星化而為天刑則祥為降石為頓頑為解銜為大滑則為妖妖星妖星五行乖戾之氣也五星之精散而為妖星形狀不同為殃則一各以其所見日期分野形色占為兵饑水旱亂亡星長三尺至五尺期百日等而上之至一丈期一年三丈期三年五丈期五年十丈期七年十丈已上不出九年蓋妖星長大則期遠而殃深短小則期近而殃淺天棓星乃歲之精主奮爭天槍如彗出西方長二三尺名天槍主破國天猾主招亂天欃出西方長數丈主國亂蚩尤旗類彗而後曲主兵天衝狀如人蒼衣赤首不動主下謀上滅國國皇大而赤去地三丈如炬火主內寇及登主夷分主恣虐旦見則主弱昭明如太白光芒不行主兵喪司危天官書如太白有目去地可六丈大而白其下有兵主擊強五殘如辰星去地六七丈其下有兵主奔亡六賊去地六丈大而赤有光出非其方下有兵喪獄漢青中赤表下有三彗去地可六丈大而赤數動大賁主滅邪暴兵燭星主滅邪絀流主伏逃茀星昴孛星主災旬始出北斗旁如雄雞見則更主擊咎主大兵有反者大亂天杵主羊天柎主擊殃伏靈見則世亂天敗主鬬衝司姦主見怪天狗有毛旁有短彗下如狗形見則兵饑天殘主貪殘卒起有謀反主驚亡枉矢色黑蛇行望之如有毛目長數匹者見則兵起破女君臣憂上下亂拂樞主制時滅寶主伐亂繞綎主亂孳驚理主相屠大奮祀主招邪天鋒彗象形似矛鋒見則兵起有亂臣昭星有三彗兵出有大盜不成又主滅邪蓬星大如二斗器色白出東南方東北主旱或大水長庚星如一匹布著天見則兵起四填大而赤可二丈為兵地維臧光星如月始出大而赤去地二丈東南旱西北兵出東北大水老子星色白為善為惡為饑為凶為喜為怒營頭星有雲如壞山墜所墜下有覆軍流血積陵出西南長三丈主兵小饑昏昌出西北氣青赤色中赤外青主國易政莘星出西北狀如環大則諸侯失地白星如削瓜主男喪菟昌有赤青環之主水天下改易濛星赤如牙旗長短四面西南最多亂之象長星出西方歲星之精化為天棓天槍天滑天衝國皇及登蒼彗火星之精化為昭旦蚩尤之旗昭明司危天欃赤彗土星之精化為五殘六賊獄漢大賁昭星絀流茀星旬始蚩尤虹霓擊咎黃彗太白之精化為天杵天柎伏靈天敗司姦天狗天殘卒起白彗辰星之精化為枉矢破女拂樞滅寶繞綎驚理大奮祀黑彗而月旁祅星亦各有所生天槍天荊真若天天樓天垣歲星所生也見以甲寅日有兩青方在其旁天陰晉若官張天惑天雀赤若蚩尤熒惑所生也出在丙寅日有兩赤方在其旁天上天伐從星天樞天翟天沸荊彗填星所生也出在戊寅日有兩黃方在其旁若星帚星若彗竹彗牆星權星白雚太白所生也出在庚寅日有兩白方在其旁天美天毚天社天林天庥天蒿端下辰星所生也出以壬寅日有兩黑方在其旁見則為水旱兵喪饑亂雲氣周禮保章氏以五雲之物辨吉凶水旱降豐荒之祲象故魯僖公日南至登觀臺以望漢明帝升靈臺以望元氣吹時律觀物變蓋古者分至啓閉必書雲物為備故也逮乎後世其法寖備瑞氣則有慶雲昌光之屬妖氣則有虹霓雲之類以候天子之符應驗歲事之豐凶明賢者之出處占戰陳之勝負焉日食建隆元年五月己亥朔日有食之二年四月癸巳朔日有食之乾德三年二月壬寅朔日當食不食五年六月戊午朔日有食之開寶元年十二月己酉朔日有食之三年四月辛酉朔日有食之四年十月癸亥朔日有食之五年九月丁巳朔日有食之七年二月庚辰朔日有食之八年七月辛未朔日有食之太平興國二年十一月丁亥朔日有食之既六年九月乙未朔日有食之七年三月癸巳朔日有食之八年二月戊子朔日有食之雍熙二年十二月庚子朔日有食之三年六月戊戌朔日有食之淳化二年閏二月辛未朔日有食之三年二月乙丑朔日有食之四年二月己未朔日有食之八月丙辰朔日有食之五年十二月戊寅朔日有食之雲陰不見咸平元年五月戊午朔日有食之十月丙戌朔日有食之二年九月庚辰朔日有食之三年三月戊寅朔日有食之五年七月甲午朔日有食之景德元年十二月庚辰朔日有食之三年五月壬寅朔日有食之雲陰不見四年五月丙申朔日有食之陰雨不見大中祥符二年三月丙辰朔日有食之陰雨不見五年八月丙申朔日有食之六年十二月戊午朔日有食之七年十二月癸丑朔日當食不食八年六月己酉朔日有食之天禧三年三月戊午朔日有食之五年七月甲戌朔日有食之乾興元年七月甲子朔日食幾盡天聖二年五月丁亥朔日當食不食四年十月甲戌朔日有食之六年三月丙申朔日有食之七年八月丁亥朔日有食之明道二年六月甲午朔日有食之景祐三年四月己酉朔日當食不食寶元元年正月戊戌朔日有食