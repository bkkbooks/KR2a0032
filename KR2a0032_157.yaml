body:
  text: 宋史卷一百五十七志第一百一十選舉三學校試律學等試附凡學皆隸國子監國子生以京朝七品以上子孫為之初無定員後以二百人為額太學生以八品以下子弟若庶人之俊異者為之及三舍法行則太學始定置外舍生二千人內舍生三百人上舍生百人始入學驗所隸州公據試補外舍齊長諭月書其行藝于籍行謂率教不戾規矩藝謂治經程文季終考于學諭次學録次正次博士後考于長二歲終會其高下書於籍以俟覆試參驗而序進之凡私試孟月經義仲月論季月策凡公試初場經義次場論策試上舍如省試法凡內舍行藝與所試之業俱優為上舍上等取旨授官一優一平為中等以俟殿試俱平若一優一否為下等以俟省試元祐間置廣文館生二千四百人以待四方游士試京師者律學生無定員他雜學廢置無常崇寧建辟雍於郊以處貢士而三舍考選法乃遍天下於是由州郡貢之辟雍由辟雍升之太學而學校之制益詳凡國子以奏蔭恩廣故學校不預考選其得入官賜出身者多由銓試初國子監因周舊制頗增學舍以應蔭子孫隸學受業開寶八年國子監上言生徒舊數七十人奉詔分習五經然繫籍者或久不至而在京進士諸科常赴講席肄業請以補監生之闕詔從之景德間許文武升朝官嫡親附國學取解而遠鄉久寓京師其文藝可稱有本鄉命官保任監官驗之亦聽附學充貢仁宗時士之服儒術者不可勝數即位初賜兗州學田已而命藩輔皆得立學慶曆四年詔曰儒者通天地人之理明古今治亂之原可謂博矣然學者不得騁其說而有司務先聲病章句以拘牽之則吾豪雋奇偉之士何以奮焉士有純明朴茂之美而無學養成之法使與不肖並進則夫懿德敏行何以見焉此取士之甚敝而學者自以為患夫遇人以薄者不可責其厚也今朕建學興善以尊子大夫之行更制革敝以盡學者之才有司其務嚴訓導精察舉以稱朕意學者其進德修業無失其時其令州若縣皆立學本道使者選部屬官為教授員不足取於鄉里宿學有道業者由是州郡奉詔興學而士有所勸矣天章閣侍講王洙言國子監每科場詔下許品官子役然試藝給牒充廣文太學律學三館學生多致千餘就試試已則生徒散歸講官倚席但為游寓之所殊無肄習之法居常聽講者一二十人爾乃限在學滿五百日舊已嘗充貢者止百日本授官會其實京朝官保任始預秋試每十人與解三人凡入學授業月旦即親書到曆如遇私故或疾告歸寧皆給假違程及期月不來參者去其籍後諫官余靖極言非便遂罷聽讀日限初立四門學自八品至庶人子弟充學生歲一試補差學官鎖宿彌封校其藝疏名上聞而後給牒不中式者仍聽讀若三試不中則出之未幾學廢時太學之法寬簡而上之人必求天下賢士使專教導規矩之事安定胡瑗設教蘇湖間二十餘年世方尚詞賦湖學獨立經義治事齊以敦實學皇祐末召瑗為國子監直講數年進天章閣侍講猶兼學正其初人未信服謗議蜂起瑗強力不倦卒以有立每公私試罷掌儀率諸生會于首善雅樂歌詩乙夜乃散士或不遠數千里來就師之皆中心悅服有司請下湖學取其法以教太學神宗尤垂意儒學自京師至郡縣既皆有學歲時月各有試程其藝能以差次升舍其最優者為上舍免發解及禮部試而特賜之第遂顓以此取士太學生員慶曆嘗置內舍生二百人熙寧初又增百人尋詔通額為九百人四年盡以錫慶院及朝集院西廡建講書堂四諸生齊舍掌事者直廬始僅足用自主判官外增置直講為十員率二員共講一經令中書遴選或主判官奏舉生員釐為三等始入學為外舍初不限員後定額七百人外舍升內舍員二百內舍升上舍員百各執一經從所講官受學月考試其業優等上之中書其正録學諭以上舍生為之經各二員學行卓異者主判直講復薦之中書奏除官始命諸州置學官率給田十頃贍士初置小學教授帝嘗謂王安石曰今談經者人人殊何以一道德卿所著經其以頒行使學者歸一八年頒王安石書詩周禮義于學官是名三經新義元豐二年頒學令太學置八十齊齊各五楹容三十人外舍生二千人內舍生三百人上舍生百人月一私試歲一公試補內舍生間歲一舍試補上舍生彌封謄録如貢舉法而上舍試則學官不預考校公試外舍生入第一第二等升內舍內舍生試入優平二等升上舍皆參考所書行藝乃升上舍分三等學正增為五人學録增為十人學録參以學生為之歲賜緡錢至二萬五千又取郡縣田租屋課息錢之類增為學費初以國子名監而實未嘗教養國子詔許清要官親戚入監聽讀額二百人仍盡以開封府解額歸太學其國子生解額以太學分數取之毋過四十人哲宗時初置在京小學曰就傅初筮凡兩齊復取太學額百人還開封府先是開封解額稍優四方士子多冒畿縣戶又隸太學不及一年不該解試者亦往往冒戶禮部按舊制凡試國子監者先補中廣文館生乃投牒求試元祐七年遂依倣其法立廣文館生惟開封府元解百人許自試其嘗取諸科二百國子額四十者皆以為本館解額遇貢舉年試補館生中者執牒詣國子監驗試凡試者十人取一開封考取亦如之紹聖元年罷廣文館其額悉復還之開封府國子監元祐新令罷推恩之制紹聖初監察御史郭知章言先帝立三舍法以歲月稽其行實故入上舍而中上等者得不經禮部試特命以官責備而持久故其得也難誘掖激勸莫善於此宜復元豐法以廣樂育之德又請三學補外舍生依元豐令一歲四試於是詔太學生悉用元豐制推恩上等即注官者歲毋過二人免禮部試者每舉五人而止免解試者二十人而止仍計數對除省試發解額其元祐法勿用諸三舍升補等法悉推行舊制三年三省言元祐試補太學生不嚴苟務多取後試者無闕可撥宜遵元豐初制雖在籍生亦重試乃詔在籍生再試許取三分創求補者半之惟上舍生及是年充貢員內舍外舍先自元豐補入者免再試餘非再試而中者皆降舍蔡京上所修內外學制始頒諸天下元符元年詔許命官補國子生毋過四十人凡太學試令優取二禮許占全額之半而以其半及他經復置春秋博士二年初令諸州行三舍法考選升補悉如太學州許補上舍一人內舍二人歲貢之其上舍附太學外舍試中補內舍生三試不升舍遣還其州其內舍免試至則補為外舍生諸路選監司一員提舉學校守二董幹其事遇補試上內舍生選有出身官一人同教授考選須彌封謄録三年太學試補外舍改用四季學官自考不謄録仍添試論一場崇寧元年宰臣請天下州縣並置學州置教授二員縣亦置小學縣學生選考升諸州學州學生每三年貢太學至則附試別立號考分三等入上等補上舍入中等補下等上舍入下等補內舍餘居外舍諸州軍解額各以三分之一充貢士開封府留五十五額解土人之不入學者餘盡均給諸州以為貢額外官子弟親戚許入學一年給牒至太學用國子生額解試州給常平或係省田宅充養士費縣用地利所出及非係省錢三年始定諸路增養縣學弟子員大縣五十人中縣四十人小縣三十人凡州縣學生曾經公私試者復其身內舍免戶役上舍仍免借借如官戶法命將作少監李誡即城南門外相地營建外學是為辟雍蔡京又奏古者國內外皆有學周成均蓋在邦中而黨庠遂序則在國外臣親承聖詔天下皆興學貢士即國南郊建外學以受之俟其行藝中率然後升諸太學凡此聖意悉與古合今上其所當行者太學專處上舍內舍生而外學則處外舍生今貢士盛集欲增太學上舍至二百人內舍六百人外舍三千人外學為四講堂百齊齊列五楹一齊可容三十人士初貢至皆入外學經試補入上舍內舍始得進處太學太學外舍亦令出居外學其敕令格式悉用太學見制國子祭酒總治學事外學官屬司業丞各一人稍減太學博士正録員歸外學仍增博士為十員正録為五員學生充學諭者十人直學二人三舍生皆繇升貢遂罷國子監補試又置諸王宮大小學教授立考選法凡奉祠及仕而解官或需次者悉許入內外學任子不係州土隨所寓入學仍別齊居處別號試考曾升補三舍生後從獻助得官其入學視任子法凡任子不問文武須隸學滿一年始得求試乃詔取士悉由學校升貢其州郡發解及試禮部並罷自是歲試上舍悉差知舉如禮部試五年著令凡縣學生隸學已及三月不犯上二等罰聽次年試補州學外舍是名歲升開封祥符生員即辟雍別為齊教養升進如縣學法願入鄰縣學者聽惟赤縣校試主以博士每歲正月州以公試上舍及歲升員一院鎖宿分為三試其公試上舍率十取其六為中格中格已以其名第自上而下參考察之籍既在籍又中選即六人之中取其四以差升舍其歲升中選者得補外舍生開封屬縣附辟雍別試中者入辟雍充外舍隸學三年經兩試不預升貢即除其籍法涉太嚴今令三年內三經公試不預選兩經補內舍貢上舍不及格且曾犯三等以上罰若外舍即除籍罷歸縣內舍降外舍已嘗降而私試不入等若曾犯罰亦除籍再赴歲升試凡州學上舍生升舍以其秋即貢入辟雍長吏集闔郡官及提學官具宴設以禮敦遣限歲終悉集闕下自川廣福建入貢者給借職券過二千里給大將券續其路食皆以學錢給之如有孝弟睦姻任恤忠和若行能尤異為鄉里所推縣上之州免試入學州守二若教授詢審無謬即保任入貢具實以聞不實者坐罪有差太學試上舍生本慮與科舉相並試以間歲今既罷科舉又諸州歲貢士其改用歲試每春季太學辟雍生悉公試同院混取總五百七十四人以四十七人為上等即推恩釋褐一百四十人為中等遇親策士許入試一百八十七人為下等補內舍生凡上等上舍生暨特舉孝弟行能之士不待廷試推恩者許即引見釋褐上舍仍先以試文卷進入得可乃引賜若上舍已該釋褐恩而貢入在廷試前一年者須在學又及半年不犯上二等罰乃得注官凡貢士入辟雍外舍三經試不與升補兩經試不入等仍犯上三等罰者削籍再赴本州歲升試是名退送即內舍已降舍而又一試不與或兩犯上四等罰者亦如外舍法退送太學外舍生已預考察者許再經一試以中否為留遣餘升降退送悉如辟雍法凡有官人不入學而願試貢士者不以文武雜出身悉許之惟贓私罪廢人則否應試者隨內外附貢士公試皆別考率以七人取一人即預貢者與雍春試貢士通考中選入上等者升差遣兩等賜上舍出身文行優者奏聞而殊擢之中等俟殿試下等補內舍不隸學需再試已仕在官而願試者悉準此制凡在外官同居小功以上親及其親姊妹女之夫皆得為隨行親免試入所任鄰州郡學其有官人願學於本州者亦免試升補悉如諸生法混試同考惟升舍不侵諸生額自用七人取一若中者多即以溢額名次理為考察若所親移替願改籍他州學者聽太學上內舍既由辟雍升入又已罷科舉則國子監解額無所用盡均撥諸府諸州解額三分之以為三歲貢額並令有司均定以聞太學舊制止分立優平二等自今欲令辟雍太學試上舍中程者皆參用察考以差升補其考察試格悉分上中下三等貢士則以本州升貢等第太學內舍則以校定等第每上舍試考已定知舉及學官以中試之等參驗于籍通定升絀高下兩上為上一上一中及兩中為中一上一下及一中下兩下為下若兩格名次等第適皆齊同即以試等壓考察之格餘率以是為差仍推其法達之諸州凡內外私試始改用仲月並試三場試論日仍添律義凡考察悉準在學人數每內舍十人取五外舍十人取六自上而下分為三等籍以俟上舍考定而參用之是歲貢士至辟雍不如令者凡三十有八人皆罷歸而提學官皆罰金建州浦城縣學生隸籍者至千餘人為一路最縣丞徐秉哲特遷一官初立八行科詔曰學以善風俗明人倫而人材所自出也今法制未立殆無以厲天下成周以六行賓興萬民否則威之以不孝不弟之刑近因稽周法立八行八刑頒之學校兼行懲勸庶幾於古士有善父母為孝善兄弟為悌善內親為睦善外親為姻信於朋友為任仁於州里為恤知君臣之義為忠達義利之分為和凡有八行實狀鄉上之縣縣延入學審考無僞上其名於州州第其等孝悌忠和為上睦姻為中任恤為下苟備八行不俟中歲即奏貢入太學免試補為上舍司成以下審考不誣申省釋褐優命之官不能全備者為州學上等上舍餘有差八刑則反八行而麗於罪各以其罪名之縣上其名於州州稽於學毋得補弟子員然品目既立有司必求其迹以應令遂有牽合瑣細者自元祐創經明行修科主德行而略辭藝間取禮部試黜之士附置恩科當時固已咎其無所甄別及八行科立則三舍皆不試而補往往設為形迹求與名格相應於是兩科相望幾數十年乃無一人卓然能自著見者而八行又有甚敝蓋後世欲追古制而不知風俗教化之所從出其難固如此夫開封始建府學立貢士額凡五十而士子不及三百盡額而取則涉太優欲稍裁之詔王畿立學若不優誘使進何以首善其常解五十勿闕大觀元年詔願兼他經者量立升進之法大抵用本經決去取而兼經所中等第特為升貢每歲附公試院而別異其號每十五人取一人分上中下等別榜示之唱名日甄別奏聞與升甲皆優於專經者異時內外學官闕皆得在選縣學生三不赴歲升試及三赴歲升試而不能升州學者皆除其籍諸路賓興會試辟雍獨常州中選者多州守若教授俱遷一官政和四年小學生近一千人分十齊以處之自八歲至十二歲率以誦經書字多少差次補內舍若能文從博士試本經小經義各一道稍通補內舍優補上舍又詔學校教養額少則野有遺士應諸路學校及百人以上者三分增一七年試高麗進士權適等四人皆賜上舍及第遣歸其國時宰臣留意學校因事究敝有司考閲防間益密先是禮部上雜修御試貢士敕令格式又取舊制凡關學政者分敕令格式成書以上用給事中毛友言初試補入縣學生並簾試以別僞冒徽宗崇尚老氏之學知兗州王純乞於御注道德經注中出論題范致虛亦乞用聖濟經出題宣和元年帝親取貢士卷考定能深通內經者升之以為第一三年詔罷天下州縣學三舍法惟太學用之課試開封府及諸路並以科舉取士太學官吏及州縣嘗置學官凡元豐舊制所有者皆如故其辟雍官屬及宗學並諸路提舉學事官屬並罷內外學悉遵元豐成憲七年詔政和中嘗命學校分治黃老莊列之書實失專經之旨其內經等書並罷治崇寧以來士子各徇其黨習經義則詆元祐之非尚詞賦則誚新經之失互相排斥羣論紛紛欽宗即位臣僚言科舉取士要當質以史學詢以時政今之策問虛無不根古今治亂悉所不曉詩賦設科所得名臣不可勝紀專試經義亦已五紀救之之術莫若遵用祖宗成憲王安石解經有不背聖人旨意亦許采用至於老莊之書及字說並應禁止詔禮部詳議諫議大夫兼祭酒楊時言王安石著為邪說以塗學者耳目使蔡京之徒得以輕費妄用極侈靡以奉上幾危社稷乞奪安石配饗使邪說不能為學者惑御史中丞陳過庭言五經義微諸家異見以所是者為正所否者為邪此一偏之大失也頃者指蘇軾為邪學而加禁甚切今已薥其禁許采其長實為通論而祭酒楊時矯枉太過復詆王氏以為邪說此又非也諸生習用王學聞時之言羣起而詆詈之時引避不出齊生始散詔罷時祭酒而諫議大夫馮澥崔鶠等復更相辨論會國事危而貢舉不及行矣建炎初即行在置國子監立博士二員以隨幸之士三十六人為監生紹興八年葉綝上書請建學而廷臣皆以兵興餽運為辭十三年兵事稍寧始建太學置祭酒司業各一員博士三員正録各一員養士七百人上舍生三十員內舍生百員外舍生五百七十員凡諸道住本州學滿一年三試中選不犯第三等以上罰或不住學而曾兩預釋奠及齒于鄉飲酒者聽充弟子員每歲春秋兩試之旋命一歲一補於是多士雲集至分場試之俄又詔三年一試增至千員中選者皆給綾紙贊詞以寵之每科場四取其一自外舍有月校而公試入等曰內舍自內舍有月校而舍試入等曰上舍凡升上舍者皆直赴廷對二十七年立定制春季放補遇省試年改用孟夏舊太學遇覃恩無免解法孝宗始創行之在朝清要官許牒期親子弟作待補國子別號考校如太學生遇有期親任清要官更為國子生不預校定升補及差職事惟得赴公私試科舉則混試焉淳熙中命諸生暇日習射以斗力為等差比類公私試別理分數自中興以來四方之士有本貫在學公據皆得就補帝始加限節命諸路州軍以解試終場人數為準其薦貢不盡者令百取六人赴太學謂之待補生其住本學及游學之類一切禁止元豐舊制內舍生校定分優平二等優等再赴舍試又入優則謂之兩優釋褐中選者即命以京秩除學官至是始令先注職官代還注職事官恩例視進士第二人舊校定歲額五六分為優選者增為十分矣光宗初公試始令附省場別院紹熙三年禮部侍郎倪思請復混補法命兩省臺諫雜議可否於是吏部尚書趙汝愚等合奏曰國家恢儒右文京師郡縣皆有學慶曆以後文物彬彬中興以來建太學于行都行貢舉於諸郡然奔競之風勝而忠信之俗微亦惟榮辱升沉不由學校德行道藝取决糊名工雕篆之文無進修之志視庠序如傳舍目師儒如路人季考月書盡成文具今請重教官之選假守二之權倣舍法以育材因大比以取士考終場之數定所貢之員期以次年試于太學其諸州教養課試升貢之法下有司條上思議遂寢四年詔國子監試中上等小學生比類諸州待補中選之額放補一次寧宗慶元嘉定中始兩行混補於是增外舍生為千四百員內舍校定不係上舍試年分以八分為優等又以國子生員多僞濫命行在職事官期親釐務官子孫乃得試補嘉定十四年詔自今待補百人取三人舊法自外舍升內舍雖有校試必公試合格乃許升補蓋私試皆學官自考而公試則降敕差官至是歲終許取外舍生校最優者一人升內舍理宗復百取六人之制紹定二年以待補生自外方來參齊者間有鬻帖僞冒之弊遂命中選之人召升朝保官二員批書印紙仍命州郡守倅結罪保明比照字跡無僞方許簾引注籍犯者治罪罰及保官五年以省試下第及待補生之羣試于有司者有請託賄求之弊學官考文有親故交通之私命今後兩學補試並從廟堂臨時選差即令入院凡用度則用國子監供給學官事例未幾監察御史何處久又言宜遵舊制以武學宗學補試並就兩學於大院排日引試有親嫌人依避房法且士子試卷頗多考官頗少期日既迫費用不敷乃增給用度仍添差考官五員寶祐元年復命分路取放補試員數以免遠方士子道路往來之費及都城壅並之患三年復試於京師度宗咸淳二年正月幸太學謁先聖禮成推恩三學前廊與免省試內舍上舍及已免省試者與升甲起居學生與泛免一次內該曾經兩幸人與補上州文學如願在學者聽其在籍諸生地遠不及趁赴起居者三學申請乞並行泛免一次命特從之凡諸生升舍在幸學之前者方許陳乞恩例七年正月以壽和聖福皇太后兩上尊號推恩三學在齊生員並特與免解赴省一次九年外舍生晏泰亨以七分三氂乞理為第三優朝命不許遂申嚴學法今後及八分者方許歲校三名如八分者止有一人而援次優三優之例者亦須止少三二氂方可陳乞特放庶不盡廢學法當亦不過一人而止律學國初置博士掌授法律熙寧六年始即國子監設學置教授四員凡命官舉人皆得入學各處一齊舉人須得命官二人保任先入學聽讀而後試補習斷按則試按一道每道列刑名五事或七事習律令則試大義五道中格乃得給食各以所習月一公試三私試略如補試法凡朝廷有新頒條令刑部即送學其犯降舍殿試者薄罰金以示辱餘用太學規矩而命官聽出宿尋又置學正一員有明法應格而守選者特免試注官使兼之月奉視所授官後以教授一員兼管幹本學規矩仍從太學例給晚食元豐六年用國子司業朱服言命官在學如公試律義斷案俱優準吏部試法授官太學生能兼習律學中公試第一比私試第二等政和間詔博士學正依大理寺官除授不許用無出身人及以恩例陳請生徒犯罰者依學規仍犯不改書其印曆或補牒參選則理為闕失建炎三年復明法新科進士預薦者聽試紹興元年復刑法科凡問題號為假案其合格分數以五十五通分作十分以所通定分數以分數定等級五分以上入第二等下四分半以上入第三等上四分以上入第三等中以曾經試法人為考官五年以李洪嘗中刑法入第二等命與改秩中書駮之趙鼎謂古者以刑弼教所宜崇奬高宗曰刑名之學久廢不有以優之則其學絶矣卒如前詔後議者謂得解人取應更不兼經白身得官反易於有官試法乃命所試斷案刑名全通及粗通以十分為率斷及五分刑統義文理全通為合格及雖全通而斷案不及分數者勿取仍自後舉兼經十五年罷明法科以其額歸進士惟刑法科如舊二十五年四川類省始附試刑法淳熙七年祕書郎李巘言漢世儀律令同藏于理官而決疑獄者必傅以古義本朝命學究兼習律令而廢明法科後復明法而以三小經附蓋欲使經生明法法吏通經今所試止於斷案律義斷案稍通律義雖不成文亦得中選故法官罕能知書宜令習大法者兼習經義參考優劣帝曰古之儒者以儒術決獄若用俗吏必流於刻乃從其奏詔自今第一第二第三場試斷案每場各三道第四場大經義一道小經義二道第五場刑統律義五道明年命斷案三場每場止試一道每道刑名十件與經義通取四十分以上為合格經義定去留律義定高下寧宗慶元三年以議臣言罷經義五年又復嘉定二年臣僚上言試法設科本以六場引試後始增經義一場而止試五場律義又居其一斷案止三場而已殊失設科之初意且考試類多文士輕視法家惟以經義定去留其弊一也法科欲明憲章習法令察舉明比附之精微識比折出入之錯綜酌情法於數字之內決是非於片言之間比年案題字多專尚困人一日之內僅能謄寫題目豈暇深究法意其弊二也刑法考官不過曾中法科丞評數人由是請託之風盛換易之弊興其弊三也今請罷去經義仍分六場以五場斷案一場律義為定問題稍減字數而求精於法律者為試官各供五六題納監試或主文臨時點定如是讞議得人矣從之六年以議者言法科止試刑統是盡廢理義而專事法律遂命復用經義一場以尚書語孟題各一篇及刑統大義通為五場所出經題不必拘刑名倫類以防預備以斷案定去留經義為高下仍禁雜流入資人收試八年罷四川類試刑法科初凡試法科者皆取撰成見義挾入試場理宗淳祐三年令刑部措置關防其考試則選差大理丞正歷任中外有聲望者不許止用新科評事未經作縣之人逮其試中又當倣省試中書覆試之法質以疑獄觀其讞筆明允始與差除時所立等第文法俱通者為上徑除評事文法粗通者為次與檢法不通者駮放度宗咸淳元年申嚴選試之法凡引試刑法官命題一如紹興式八年以試法科者少特命考試命題務在簡嚴毋用長語有過而願試者照見行條法除私罪應徒或入己贓失入死罪並停替外餘犯輕罪者與放行收試或已經三試終場之人已歷三考赴部參注命本部考核元試果有所批分數不須舉狀與注外郡刑法獄官差使一次庶可激厲誘掖格法試法科者批及八分方在取放之數咸淳末有僅及二分以上者亦特取一名授提刑司檢法官寬以勸之也初宗學廢置無常凡諸王屬尊者立小學于其宮其子孫自八歲至十四歲皆入學日誦二十字其已授環衛官有學藝得召試遷轉者每有之然非有司常試乃特恩也熙寧十年始立宗子試法凡祖宗袒免親已受命者附鎖廳試自袒免以外得試于國子監禮部別異其卷而校之十取其五舉者雖多解毋過五十人廷試亦不與進士同考年及四十嘗纍舉不中疏其名以聞而録用之其官于外而不願附各路鎖試許謁告試國子監崇寧初疏屬年二十五以經義律義試禮部合格分二等附進士榜與三班奉職文優者奏裁其不能試及試而黜者讀律於禮部推恩與三班借職勿著為令及兩京皆置敦宗院院皆置大小學教授立考選法如熙寧格出官所涖長二或監司有二人任之乃注授後又許見在任者於本任附貢士試大觀三年宗子釋褐者十二人宗學官須宗子中上舍第且有行者方始為之四年詔宗子之升上舍不經殿試遽命之官熙寧法不如是其依貢士法俟殿試補入上中等者唱名日取裁後又定上等賜上舍及第中等賜出身授官有差凡隸學有篤疾若親老無兼侍者大宗正察其實罷歸宣和二年詔罷量試出官之法紹興二年帝初策士及宗子于集英殿五年初復南省試十四年始建宗學于臨安生員額百人大學生五十人小學生四十人職事各五人置諸王宮大小學教授一員在學者皆南宮北宅子孫若親賢宅近屬則別選館職教授初行在宗室試國子監者有官鎖廳七取其三無官應舉七取其四無官袒免親取應文理通為合格不限其數而外任主宮觀嶽廟試于轉運司者取放之額同進士十五年命諸路宗室願赴行在試者依熙寧舊制並國子監請解不願者依崇寧通用貢舉法所以優國族也孝宗登極凡宗子不以服屬遠近人數多寡其曾獲文解兩次者並直赴廷試略通文墨者量試推恩習經人本經義二道習賦人詩賦各一首試論人論一首仍限二十五歲以上合格第一名承節郎餘並承信郎曾經下省人免量試推恩四川則附試于安撫制置司於是入仕者驟踰千人隆興元年詔量試不中年四十以上補承信郎展三年出官餘並於後舉再試四月御射殿引見取應省試第一人賜同進士出身第二第三人補保義郎餘四十人承節郎七人承信郎凡宗室鎖廳得出身者京官進一秩選人比類循資無官應舉得出身者補修職郎濮秀二王下子孫中進士舉者更特轉一秩乾道五年命宗室職事隨侍子弟許赴國子監補六年臣僚上言神宗朝始立教養選舉宗子之法保義至秉義鎖試則與京秩在末科則升甲取應不過量試注官所以寵異同姓不與寒畯等也然曩時向學者少比年雋異者多或冠多士或登詞科幾與寒士齊驅而入仕寖繁未知裁抑非所以示至公也於是禮部請鎖廳登第者舊於元官上轉行兩官自今止依元資改授餘准舊制十二年右正言胡衛請自今宗室監試無官應舉照鎖廳例七取其二省試則三舉所放人數如取應例立為定額從之寧宗嘉定四年詔鎖廳應舉省試第一名殿試唱名授官日於應得恩例外更遷一秩九年以宮學並歸宗庠教授改為博士宗諭十四年命前隸宮學近屬令附宗學公私試中選者與正補宗學生近屬子孫年十五以下者許試小學生復置諸王宮大小學教授一員宗學解試依太學例取放每舉附國子監發解所異題別考理宗寶慶二年以鎖廳宗子第一名若搢學深春秋秀出譜籍與補保義郎特賜同進士出身仍換修職郎端平元年命宗子鎖廳應舉解試凡在外州軍或寄居或見任隨侍及見寓行在就試者各召知識官委保正身國子監取其宗子出身訓名生長左驗以憑保收試仍於試卷家狀內具保官職位姓名以防欺詐淳祐二年建內小學置教授二員選宗子就學寶祐元年五月特正奏名進士宗子必咣等二人特授保義郎若瑰等二十九人承節郎敕略曰必咣等取應及選咸補右階蓋欲誘之進學而教以入仕也其毋以是自畫焉度宗咸淳元年以鎖廳應舉宗子兩請舉人遇即位赦恩並赴類試其曾經覆試文理通者照例升等文理不通及未經覆試者則否第五等人特與免銓出官九年凡無官宗子應舉初生則用乳名給據既長則用訓名其赴諸路漕司之試有一人前後用兩據印二卷者至是命漕司並索乳名訓名各項公據方許收試以杜姦弊武舉武選咸平時令兩制館閣詳定入官資序故事而未及行仁宗時嘗置武學既而中輟天聖八年親試武舉十二人先閲其騎射而試之以策為去留弓馬為高下神宗熙寧五年樞密請建武學於武成王廟以尚書兵部郎中韓縝判學內藏庫副使郭固同判賜食本錢萬緡生員以百人為額選文武官知兵者為教授使臣未參班與門蔭草澤人召京官保任人材弓馬應格聽入學習諸家兵法教授纂次歷代用兵成敗前世忠義之節足以訓者講釋之願試陳隊者量給兵伍在學三年具藝業考試等第推恩未及格者逾年再試凡試中三班使臣與三路巡檢寨主未有官人與經略司教隊差使三年無過則升至大使臣有兩省待制或本路鈐轄以上三人保舉堪將領者並兼諸衛將軍外任回歸環衛班科場前一年武臣路分都監文官轉運判官以上各奏舉一人聽免試入學生員及應舉者不過二百人春秋各一試步射以一石三斗馬射以八斗矢五發中的或習武伎副之策略雖弓力不及學業卓然並為優等補上舍生毋過三十人試馬射以六斗步射以九斗策一道孫吳六韜義十道五運補內舍生馬步射馬戰應格對策精通士行可稱者上樞密院審察試用雖不應格而曉術數知陳法智略可用或纍試策優等悉取旨補上舍武藝策略纍居下等復降外舍先是樞密院修武舉試法不能答策者答兵書墨義王安石奏曰三路義勇藝入三等以上皆有旨録用陛下又欲推府界保甲法於三路則武力之人已多近以學究一科從誦書不曉理廢之而武舉復試墨義則亦學究之流無補於事先王收勇力之士皆屬於車右者欲以備禦侮之用則記誦何所施於是悉從中書所定凡武舉始試義策於祕閣武藝則試于殿前司及殿試則又試騎射及策于庭策武藝俱優為右班殿直武藝次優為三班奉職又次借職末等三班差使減磨勘年策入平等而武藝優者除奉職次優借職又次三班差使減磨勘年武藝末等者三班差使八年詔武舉與文舉進士同時鎖試於貢院以防進士之被黜而改習者遂罷祕閣試又以六韜本非全書止以孫吳書為題元豐元年立大小使臣試弓馬藝業出官法第一等步射一石矢十發三中馬射七斗馬上武藝五種孫吳義十通七時務邊防策五道文理優長律令義十通七中五事以上免短使減一任監當三事以上免短使升半年名次兩事升半年一事升一季第二等步射八斗矢十發二中馬射六斗馬上武藝三種孫吳義十通五策三道成文理律令義十通五中五事免短使升半年三事升半年兩事升一季一事與出官第三等步射六斗矢十發一中馬射五斗馬上武藝兩種孫吳義十通三策三道成文理律令義十通三計算錢穀文書五通三中五事升半年三事升一季兩事與出官其步射並發兩矢馬射發三矢皆著為格四年罷試律義七年止試孫吳書大義一場第一等取四通次二等三通三等二通為中格元祐四年詔解試省試增策一道崇寧間諸州置武學立考選升貢法倣儒學制其武藝絶倫文又優特者用文士上舍上等法歲貢釋褐中等仍隸學俟殿試凡試出官使臣仍赴殿前司呈試諸州武士試補不得文士同一場馬射三上𣛀九斗為五分八斗為四分七斗為三分九斗八斗七斗再上𣛀及一上𣛀視此為差理為分數馬射一中帖當兩上𣛀一中的當兩中帖舊制武舉三年一試命官不過三十餘人後增額以每貢者三人即取一以升上舍積迭增展遂至百人入流比文額太優四年詔自今貢試上舍者取十人入上等四十人入中等五十人入下等皆補充武學內舍人材不足聽闕之餘不入等者處之外舍大抵以弓馬程文兩上一上兩中一中兩下一下相參以為第凡州教諭須州都監乃得兼吏部取武舉武士上舍出身者政和三年以隸學者衆凡經三歲校試而不得一與者除其籍宣和二年尚書省言州縣武學既罷有願隸京城武學者請用元豐法補試舊制不入學而從保舉以試者附試武學外舍通取一百人偕上舍生發解今既罷科舉請依元豐法奏舉歲終集闕下免試補外舍生赴次年公試其春選升補推恩依大觀法靖康元年詔諸路有習武藝知兵書者州長二以禮遣送詣闕毋限數將親策而用之建炎三年詔武舉人先經兵部驗視弓馬殿前司仍權就淮南轉運司別場附試七書義五道兵機策二首紹興五年帝御集英殿策武舉進士翌日閲試騎射策入優等與保義承節郎平等承信郎其武藝不合格者與進義校尉川陝宣撫司類省試武藝合格人並補官十二年御試正奏名策入優等承節郎平等承信郎進義校尉特奏名平等進義校尉各展磨勘有差十六年始建武學兵部上武士弓馬及選試去留格凡初補入學步射弓一石若公私試步騎射不中即不許試程文其射格自一石五斗以下至九斗凡五等二十六年帝見武學頽弊因諭輔臣曰文武一道也今太學就緒而武學幾廢恐有遺才詔兵部討論典故參立新制凡武學生習七書兵法步騎射分上內外三舍學生額百人置博士一員以文臣有出身或武舉高選人為之學諭一員以武舉補官人為之凡補外舍先類聚五人以上附私試先試步射一石弓不合格不得試程文中格者依文士例試七書義一道其內舍生私試程文三在優等弓馬兩在次優公試入等具名奏補試上舍者以就試人三取其一以十分為率上等一分中等二分下等七分仍以三年與發解同試凡內舍補上舍以上舍試合格入等與行藝相參兩上者為上等一上一中或兩中及一上一下為中等一中一下或兩下一上一否為下等仍不犯第三等罰士行可稱者具名奏補二十七年御試第一名趙應熊武藝絶倫又省試第一特與保義郎閣門祗候二十九年修立武舉入官資格命武舉人自今依府監年數免解孝宗隆興元年御試得正奏名三十七人殿中侍御史胡沂言唐郭子儀以武舉異等初補右衛長史歷振遠橫塞天德軍使國初試中武藝人並赴陝西任使又武舉中選者或除京東捉賊或三路沿邊試其效用或經略司教押軍隊準備差使今率授以榷酤之事是所取非所用所用非所學也請取近歲中選人數量其材品考任授以軍職使之習練邊事諳曉軍旅實選用之初意也乾道二年中書舍人蔣芾亦以為言請以武舉登第者悉處之軍中帝以問洪適適對曰武舉人以文墨進雜於卒伍非便也帝曰纍經任者可以將佐處之是歲以登極推恩武舉進士比文科正奏名例第一名升一秩為成忠郎第二第三名依第一名恩例五年兵部請外舍有校定人參考榜上等者候滿一年私試四入等及不犯三等以上罰或有校定而參考在中下等候再試參考入中等聽升補外舍生赴公試舊除射親許試五等弓外步射馬射止許試第三等以下弓程文雖優而參考弓馬分數難以對入優等自今許比上舍法不以馬步射親並通試五等吏部言武舉比試發解省試三場依條以策義考定等第具字號會封彌所以武藝並策義參考今比試自依舊法其解省兩場請依文士例考定字號先具奏聞拆號放榜從之初命武學生該遇登極覃恩曾升補內舍或在學及五年曾經公私試中人並令赴省是歲廷試始依文科給黃牒榜首賜武舉及第餘並賜武舉出身其年頒武舉之法令四川帥臣憲漕知州軍監及寄居侍從以上各舉武士一員興元府利閬金洋階成西和鳳州各三員拔其尤者送四川安撫司解試類省並如文科淳熙元年議者請武學外舍生有校定公試合格令試五等弓馬與程文五等相參入中上等者據闕升補餘俟再試入等升補從之帝御幄殿引見正奏名呈試武藝二年以武科授官與文士不類詔自今第一人補秉義郎堂除諸司計議官序位在機宜之上第二第三人保義郎諸路帥司準備將領代還轉忠翊郎第四第五人承節郎諸路兵馬監押代還轉保義郎皆倣進士甲科恩例四年以文科狀元代還例除館職亦召武舉榜首為閣門舍人五年始立武學國子額收補武臣親屬其文臣親屬願附補者亦聽七年初立武舉絶倫並從軍法凡願從軍者殿試第一人與同正將第二第三名同副將五名以上省試第一名六名以下並同準備將從軍以後立軍功及人材出衆者特旨擢用帝曰武舉本求將帥之材今前名皆從軍以七年為限則久在軍中諳練軍政他日可備委任八年命特奏名補官展減磨勘有差九年議者以為從軍之人率多養望不屑軍旅詔自今職事勤恪者從主帥保奏升差懈惰者按劾光宗紹熙元年武臣試換文資南渡以前許從官三人薦舉紹興令敦武郎以下聽召保官二人以經義詩賦求試其後太學諸生久不第者多去從武舉已乃鎖廳應進士第凡以秉義或忠翊皆換京秩恩數與第一人等後以林穎秀言武士舍棄弓矢更習程文褒衣大袖專做舉子夫科以武名不得雄健喜功之士徒啓其僥幸名爵之心於是詔罷鎖廳換試寧宗即位復其制慶元五年命兩淮京西湖北諸郡倣兵部及四川法於本道安撫司試武士合格者赴行在解試別立字號分項考校撥十名為解額五名省額理宗紹定元年命武舉進士避親及所舉之人止避本廳令無妨嫌官引試若合格則朝廷別遣官覆試淳祐九年以北兵屢至命極邊次邊一體收試仍量增解額五名省額二名是歲武舉正奏名王時發已係從軍之人充殿前司左軍統領既登第換授特命就本職上與帶同字以示優厚勸奬度宗咸淳六年命禮部貢院於武舉進士平等每百人內取放待補十人絶倫每百人內取待補十三人算學崇寧三年始建學生員以二百一十人為額許命官及庶人為之其業以九章周髀及假設疑數為算問仍兼海島孫子五曹張丘建夏侯陽算法並曆算三式天文書為本科本科外人占一小經願占大經者聽公私試三舍法略如太學上舍三等推恩以通仕登仕將仕郎為次大觀四年以算學生歸之太史局並書學生入翰林書藝局畫學生入翰林圖畫局醫學生入太醫局紹興初命太史局試補並募草澤人淳熙元年春聚局生子弟試曆算崇天宣明大衍曆三經取其通習者五年以紀元曆試九年以統元曆試十四年用崇天紀元統元曆三歲一試紹熙二年命今歲春銓太史局試應三全通一粗通合格者並特收取時局生多闕故也嘉定四年命局生必俟試中方許轉補理宗淳祐十二年祕書省言舊典以太史局隸祕省今引試局生不經祕書非也稽之於令諸局官應試曆算天文三式官每歲附試通等則以精熟為上精熟等則以習他書多為上習書等則以占事有驗為上諸局生補及二年以上者並許就試一年試曆算一科一年試天文三式兩科每科取一人諸同知算造官闕有試翰林天文官闕有試諸靈臺郎有應試補直長者諸正名學生有試問景祐新書者諸判局闕而合差諸稱漏官五年而轉資者無不屬於祕書而局官等人各置腳色遇有差遣改補功過之類並申祕書今乃一切自行陳請殊乖初意自今有違令補差及不經祕書公試補中者中書執奏改正仍從舊制申嚴試法從之書學生習篆隸草三體明說文字說爾雅博雅方言兼通論語孟子義願占大經者聽篆以古文大小二篆為法隸以二王歐虞顏柳真行為法草以章草張芝九體為法考書之等以方圓肥瘦適中鋒藏畫徑氣清韻古老而不俗為上方而有圓筆圓而有方意瘦而不枯肥而不濁各得一體者為中方而不能圓肥而不能瘦模倣古人筆畫不得其意而均齊可觀為下其三舍補試升降略同算學法惟推恩降一等自初置及並罷年數悉同算學畫學之業曰佛道曰人物曰山水曰鳥獸曰花竹曰屋木以說文爾雅方言釋名教授說文則令書篆字著音訓餘書皆設問答以所解義觀其能通畫意與否仍分士流雜流別其齊以居之士流兼習一大經或一小經雜流則誦小經或讀律考畫之等以不倣前人而物之情態形色俱若自然筆韻高簡為工三舍試補升降以及推恩如前法惟雜流授官止自三班借職以下三等醫學初隸太常寺神宗時始置提舉判局官及教授一人學生三百人設三科以教之曰方脈科針科瘍科凡方脈以素問難經脈經為大經以巢氏病源龍樹論千金翼方為小經針瘍科則去脈經而增三部針灸經常以春試三學生願與者聽崇寧間改隸國子監置博士正録各四員分科教導糾行規矩立上舍四十人內舍六十外舍二百齊各置長諭一人其考試第一場問三經大義五道次場方脈試脈證運氣大義各二道針瘍試小經大義三道運義大義二道三場假令治病法三道中格高等為尚藥局醫師以下職餘各以等補官為本學博士正録及外州醫學教授紹興中復置醫學以醫師主之翰林局醫生並奏試人並試經義一十二道取六通為合格乾道三年罷局而存御醫諸科後更不置局而存留醫學科令每舉附省闈別試所解發太常寺掌行其事淳熙十五年命內外白身醫士經禮部先附銓闈試脈義一場三道取其二通者赴次年省試經義三場一十二道以五通為合格五取其一補醫生俟再赴省試升補八通翰林醫學六通祗候其特補薦補並停紹熙二年復置太醫局銓試依舊格其省試三場以第一場定去留墨義大義等題倣此補道職舊無試元豐三年始差官考試以道德經靈寶度人經南華真經等命題仍試齊醮科儀祝讀政和間即州縣學別置齊授道徒蔡攸上諸州選試道職法其業以黃帝內經道德經為大經莊子列子為小經提學司訪求精通道經者不問已命未仕皆審驗以聞其業儒而能慕從道教者聽每路於見任官內選有學術者二人為幹官分詣諸州檢察教習內經道德經置博士聖濟經兼講道徒升貢悉如文士初入官補志士道職賜褐服藝能高出其徒者得推恩道徒術業精退州守二有考課殿最罪法陳州學生慕從道教踰月而道徒換籍殆與儒生相半有宋瑀者願改道徒內舍獻神霄玉清萬壽宮雅一篇特換志士俟殿試由是長倅以下受賞有差其誘勸之重如此宣和二年學罷
