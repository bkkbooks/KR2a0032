body:
  text: 宋史卷一百五十二志第一百五輿服四諸臣服上諸臣祭服唐制有衮冕九旒鷩冕八旒毳冕七旒絺冕六旒玄冕五旒宋初省八旒六旒冕九旒冕塗金銀花額犀玳瑁簪導青羅衣繡山龍雉火虎蜼五章緋羅裳繡藻粉米黼黻四章緋蔽膝繡山火二章白花羅中單玉裝劍佩革帶暈錦綬二玉環緋白羅大帶緋羅襪履親王中書門下奉祀則服之其冕無額花者玄衣纁裳悉畫小白綾中單師子綿綬二銀環餘同上三公奉祀則服之七旒冕犀角簪導衣畫虎蜼藻粉米三章裳畫黼黻二章銀裝佩劍革帶餘同九旒冕九卿奉祀則服之五旒冕青羅衣裳無章銅裝佩劍革帶餘同七旒冕四品五品為獻官則服之六品以下無劍佩綬紫檀衣朱裳羅為之皂大綾綬銅裝劍佩御史博士服之平冕無旒青衣纁裳無劍佩綬餘同五旒冕大祝奉禮服之慶曆三年太常博士余靖言周禮司服之職掌王之吉服大裘而冕無旒以祀昊天上帝祀五帝亦如之衮冕十有二旒其服十有二章以享先王鷩冕八旒其服七章以享先公亦以饗射毳冕七旒其服五章以祀四望山川絺冕六旒其服三章以祭社稷五祀玄冕五旒其服無章以祭小祀此皆天子親行祠事所服冕服悉因所祀大小神鬼以為制度今大祠中祠所遣獻官並用上公九旒九章冕服以為初獻其餘公卿亦皆七旒冕服全無等降小祠則公服行事乖戾舊典宜詳周禮因所祭鬼神以為獻官冕服之制詔下禮官儀奏曰聖朝之制唯皇帝親祠郊廟及朝會大禮服衮冕外餘冕皆不設其每歲常祀遣官行事攝公則服一品九旒冕攝卿則服三品七旒冕自從品制為服不以祠之大小為差至于小祠獻官舊以公服行事則有違典禮案衣服令五旒冕衣裳無章皂綾綬銅裝劍佩四品以下為獻官則服之今小祠獻官既不攝公卿則盡屬四品以下當有祭服請除公卿祭服仍舊從本品外小祠所遣獻官並依令文祭服行事若非時告祭用香幣禮器行事之處亦皆準此詔施行焉皇祐四年同知太常禮院邵必言伏見監祭使監禮各冠五旒冕衣裳無章色以紫檀案周禮六冕之制凡有旒者衣裳皆有章惟大裘冕無旒衣裳無章一命大夫之冕無旒衣裳亦無章今監祭監禮所服冕五旒侯伯之冕也而衣無章深所不稱色以紫檀又無經據竊詳監祭監禮既非祠官則御史博士冖小而服用五等蓋非所宜而且有旒無章况國家南郊大禮太常卿止服朝服前導皇帝明非祠官也今後監祭者請冠獬豸監禮者冠進賢為稱詔不允元豐元年詳定禮文所言國家服章視唐尤為不備於令文祀儀有九旒冕七旒冕五旒冕今既無冕名而有司仍不制七旒冕乃有四旒冕其非禮尤甚又服之者不以官秩上下故分獻四品官皆服四旒冕博士御史則冕五旒而衣紫檀太祝奉禮則服平冕而無佩玉此因循不講之失也且古者朝祭異服所以別事神與事君之禮今皇帝冬至及正旦御殿服通天冠絳紗袍則百官皆服朝服乃禮之稱至親祠郊廟皇帝嚴裘冕以事神而侍祠之官止以朝服豈禮之稱哉至於景靈宮分獻官皆服朝服尤為失禮伏請親祠郊廟景靈宮除導駕贊引扶侍宿衛之官其侍祠及分獻者並服祭服如所考制度修製五冕及爵辨服各正冕辨之名又國朝祀儀祭社稷朝日夕月風師雨師皆服衮冕其蠟祭先蠶五龍亦如之祭司命戶竈門厲行皆服鷩冕壽星靈星司中司寒中霤馬祭皆服毳冕皆非是今天子六服自鷩冕而下既不親祠廢而不用則諸臣攝事自當從王所祭之服伏請依周禮凡祀四望山川則以毳冕祭社稷五祀則以絺冕朝夕日月風師雨師司命司中則以玄冕若七祀蠟祭百神先蠶五龍靈星壽星司寒馬祭蓋皆羣小祀之比當服玄冕從之哲宗元祐元年太常寺言舊制大禮行事執事官並服祭服餘服朝服至元豐七年呂升卿始有行事及陪祠官並服祭服之議今欲令行事執事官並服祭服其贊引行事禮儀使太常卿太常博士閣門使樞密院官進接圭殿中監止供奉皇帝其陪位官止導駕押宿及主管事務並他處行事官仍服朝服從之徽宗大觀元年議禮局言太社太學獻官祝禮皆以法服奉祠至郡邑則用常服乞降祭服詔頒制度於州郡然未明使製造後政和間始詔州縣冠服形制詭異令禮制局造樣頒下轉運司轉運司製以給州縣焉二年議禮局檢討官俞石函言玄以象道纁以象事故凡冕皆玄衣纁裳今太常寺祭服則衣色青矣前三幅以象陽後四幅以象陰故裳制不相連屬今之裳則為六幅而不殊矣冕玄表而朱𩹉今乃青羅為覆以金銀飾之佩用綬以貫玉今既有玉佩矣又有錦綬以銀銅二環飾之以玉宗彝宗廟之彝也乃為虎蜼之狀而不作虎彝蜼彝粉米散利以養人也乃分為二章而以五色圓花為藉其餘不合古者甚多乞下禮局博考古制畫太常寺及古者祭服樣二本以進至於損益裁成斷自聖學詔令議禮局詳議四年議禮局官宇文粹中議改衣服制度曰凡冕皆玄衣纁裳衣則繪而章數皆奇裳則繡而章數皆偶陰陽之義也今衣用深青非是欲乞視冕之等衣色用玄裳色用纁以應典禮古者蔽前而已芾存此象以韋為之今蔽膝自一品以下並以緋羅為表緣緋絹為𩹉無復上下廣狹及會紕純紃之制又有山火龍章案明堂位有虞氏服韍夏后氏山商火周龍章韍者乃黻冕之黻非赤芾之芾也且芾在下體與裳同用而山龍火者衣之章也周既繢於上衣不應又繢於芾請改芾制去山龍火章以破諸儒之惑又祭服有革帶今不用皮革而通裹以緋羅又以銅為飾其綬或錦或皂環或銀或銅尤無經據宜依古制除去至佩玉中單赤舄之制則全取元豐中詳定官所議行之粹中又上所編祭服制度曰古者冕以木版為中廣八寸長尺六寸後方前圓後仰前低染三十升之布玄表朱𩹉後方者不變之體前圓者無方之用仰而玄者升而辨於物俯而朱者降而與萬物相見後世以繒易布故純儉今羣臣冕版長一尺二寸闊六寸二分非古廣尺之制以青羅為覆以金塗銀稜為飾非古玄表朱𩹉之制乞下有司改正古者冕之名雖有五而繅就旒玉則視其命數以為等差合綵絲為繩用以貫玉謂之繅以一玉為一成結之使不相並謂之就就間相去一寸則九玉者九寸七玉者七寸各以旒數長短為差今羣臣之冕用藥玉青珠五色茸線非藻玉三采二采之義每旒之長各八寸非旒數長短為差之義又獻官冕服雜以諸侯之制而一品服衮冕臣竊以為非宜元豐中禮官建言請資政殿大學士以上侍祠服鷩冕觀察使以上服毳冕監察御史以上服絺冕朝官以上服玄冕選人以上爵辨詔許之而不用爵辨供奉官以下至選人盡服玄冕無旒臣竊謂依此參定乃合禮制古者三公一命衮則三公在朝其服當鷩冕蓋出封則遠君而伸在朝則近君而屈今之攝事及侍祠皆在朝之臣也在朝之臣及與古之出封者同命數非先王之意乞下有司制鷩冕八旒毳冕六旒絺冕四旒玄冕三旒其次二旒又其次無旒依元豐詔旨參酌等降為侍祠及攝祭之服長短之度采色之別皆乞依古制施行又案周禮諸侯爵有五等而服則三所謂公之服自衮冕而下侯伯自鷩冕而下子男自毳冕而下是也古者諸侯有君之道故其服以五七九為節今之郡守雖曰猶古之侯伯其實皆王臣也欲乞只用羣臣之服自鷩冕而下分為三等三都四輔為一等初獻鷩冕八旒經略安撫鈐轄為一等初獻毳冕六旒亞獻並玄冕二旒終獻無旒節鎮防團軍事為一等初獻絺冕四旒亞終獻並玄冕無旒其衣服之制則各從其冕之等又曰今之紘組仍綴兩繒帶而結於頤冕旁仍垂青纊而不以瑱以犀為簪而不以玉筓象筓並非古制乞下有司改正從之政和議禮局言大觀中所上羣臣祭服制度已依所奏修定乞付有司依圖畫製造既又上羣臣祭服之制正一品九旒冕金塗銀稜有額花犀簪青衣畫降龍朱裳蔽膝白羅中單大帶革帶玉佩錦綬青絲網玉環朱履革帶以金塗銀玉佩以金塗銀裝綬以天下樂暈親祠大禮使亞獻終獻太宰少宰左丞每歲大祠宰臣親王執政官郡王充初獻服之奏告官並依本品服已下準此從一品九旒冕無額花白綾中單紅錦綬銀環金塗銀佩餘如正一品服親祠吏部戶部禮部兵部工部尚書太廟進受幣爵奉幣爵宗室每歲大祠捧俎官大祠中祠初獻官服之二品七旒冕角簪青衣無降龍餘如從一品服親祠吏部侍郎殿中監大司樂光祿卿讀册官太廟薦俎贊進飲福宗室七祀配享功臣分獻官每歲大祀謂用宮架者大司樂大祠中祠亞終獻大祠禮官小祠獻官朔祭太常卿服之三品五旒冕皂綾綬銅環金塗銅革帶佩餘如二品服親祠舉册官大樂令光祿丞奉俎饌籩豆簠簋官分獻官分獻壇壝從祀太廟奉瓚盤薦香燈安奉神主奉毛血槃蕭蒿篚肝膋豆宗室每歲祭祠大樂令大中祠分獻官服之無旒冕素青衣朱裳蔽膝無佩綬餘如三品服奉禮協律郎郊社令太祝太官令親祠撎鼎官進摶黍官太廟供亞終獻金斝供七祀獻官執爵官服之五旒冕紫檀絁衣餘如三品服監察御史服之州郡祭服三都初獻八旒冕經略安撫鈐轄初獻六旒冕亞獻並二旒冕終獻無旒節鎮防團軍事初獻四旒冕亞終獻並無旒冕中興之後省九旒七旒五旒冕定為四等一曰鷩冕八旒二曰毳冕六旒三曰絺冕四旒四曰玄冕無旒其義以公卿大夫士皆北面為臣又近尊者而屈故其節以八以六以四從陰數也先是紹興四年五月國子監丞王普奏言臣嘗考諸經傳具得冕服之制蓋王之三公八命鷩冕八旒衣裳七章其章各八孤卿六命毳冕六旒衣裳五章其章各六大夫四命絺冕四旒衣裳三章其章各四上士三命玄冕三旒中士再命玄冕二旒下士一命玄冕無旒衣皆無章裳韍視其命數自三而下其繅至筓衡紘紞瑱纊帶佩芾舄中衣皆有等差近世冕服制度沿襲失真多不如古夫後方而前圓後昂而前俯玄表而朱𩹉此冕之制也今則方圓俯仰幾於無辨且以青為表而飾以金銀矣其衣皆玄其裳皆纁裳前三而後四幅此衣裳之制也今則衣色以青裳色以緋且以六幅而不殊矣山以章也今則以嶞火以圜也今則以鋭宗彝宗廟虎蜼之彝也乃畫虎蜼之狀而不為虎蜼彝粉米米而粉之者也乃分為二章而以五色圓花為藉佩有衡璜琚瑀衝牙而已乃加以雙滴而重設二衡綬以貫佩玉而已乃別為錦綬而間以雙環以至帶無紐約芾無肩頸舄無絇繶中衣無連裳臣伏讀國朝會要郊廟奉祀禮文祖宗以來屢嘗講究第以舊服無有存者欲乞因茲改作是正訛繆一從周制以合先聖之言尋禮部契勘奏言衣服之制或因時王而為之損益事雖變古要皆一時制作不無因革或考之先王而有繆戾者雖行之已久不應承誤襲非憚於改正案周官自上公服衮王之三公服鷩以至士服玄冕凡五等唐制自一品服衮冕九旒至五品服玄冕無旒亦五等國家承唐之舊初有五旒之名其後去三公衮冕及絺冕但存七旒鷩冕五旒毳冕與無旒玄冕凡三等而已衮服非三公所服去之可也乃併絺冕去之自尚書服毳冕以至光祿丞亦服焉貴賤幾無差等此皆一時制作不無因革今合增鷩冕為八旒增毳冕為六旒復置絺冕為四旒並及無旒玄冕共四等庶幾稍合周制若冕之方圓低昂至於無辨則制造之差也以青為表非不用玄也為玄而不至者也以緋為裳非不用纁也為纁而太過者也山止而靜者也今象其嶞是得山之勢而不知其性火圜而神者也今象其鋭是得火之形而不得其神也至於宗彝粉米佩綬帶紐芾屨之屬皆宜改正施行是時諸臣奏請討論雖詳然終以承襲之久未能盡革也鷩冕八旒每旒八玉三采朱白蒼角筓青纊以三色紞垂之紘以紫羅屬於武衣以青黑羅三章華蟲火虎蜼彝裳以纁表羅𩹉繒七幅繡四章藻粉黼黻大帶中單佩以珉貫以藥珠綬以絳錦銀環韍上紕下純繪二章山火革帶緋羅表金塗銀裝襪舄並如舊制宰相亞終獻大禮使服之前期景靈宮太廟亞終獻明堂滌濯進玉爵酒官亦如之毳冕六玉三采衣三章繪虎蜼彝藻粉米裳二章繡黼黻佩藥珠衡璜等以金塗銅帶韍繪以山革帶以金塗銅餘如鷩冕六部侍郎以上服之前期景靈宮太廟進爵酒幣官奉幣官受爵酒幣官薦俎官明堂受玉爵受玉幣奉徹籩豆進飲福酒徹俎祝腥贊引亞終獻禮儀使亞終獻爵並盥洗官四員並如之前二日奏告初獻社壇九宮壇分祭初獻亞獻亦如之絺冕四玉二采朱緑衣一章繪粉米裳二章繡黼黻綬以皂綾銅環餘如毳冕光祿卿監察御史讀册官舉册官分獻官以上服之前期景靈宮太廟奏奉神主官明堂太府卿光祿卿沃水舉册官讀册官押樂太常卿東朵殿三員西朵殿二員東廊二十八員西廊二十五員南廊二十七員軷門祭獻官前二日奏告亞獻終獻官監察御史並如之社壇九宮壇分祭終獻官監察御史兵工部光祿卿丞亦如之玄冕無旒無佩綬衣純黑無章裳刺黼而已韍無刺繡餘如絺冕光祿丞奉禮郎協律郎進摶黍官太社令良醞令太官令奉俎饌等官供祠執事官內侍以下服之明堂光祿丞奉禮郎良醞令太祝摶黍官宮架協律郎登歌協律郎奉御官內侍供祠執事官武臣奉俎官軷門祭奉禮郎太祝令太官令社壇九宮壇分祭太社太祝太官令奉禮郎並如之紫檀冕四旒服紫檀衣博士御史服之外州軍祭服鷩冕八旒三都初獻服之毳冕六旒經略安撫鈐轄初獻服之絺冕四旒經略安撫鈐轄亞獻服之節鎮防團軍事初獻亦如之玄冕無旒節鎮防團軍事亞終獻服之朝服一曰進賢冠二曰貂蟬冠三曰獬豸冠皆朱衣朱裳宋初之制進賢五梁冠塗金銀花額犀玳瑁簪導立筆緋羅袍白花羅中單緋羅裙緋羅蔽膝並皂縹襈白羅大帶白羅方心曲領玉劍佩銀革帶暈錦綬二玉環白綾襪皂皮履一品二品侍祠朝會則服之中書門下則冠加籠巾貂蟬三梁冠犀角簪導無中單銀劍佩師子錦綬銀環餘同五梁冠諸司三品御史臺四品兩省五品侍祠朝會則服之御史大夫中丞則冠有獬豸角衣有中單兩梁冠犀角簪導銅劍佩練鵲錦綬銅環餘同三梁冠四品五品侍祠朝會則服之六品以下無中單無劍佩綬御史則冠有獬豸角衣有中單袴褶紫緋緑各從本服色白綾中單白綾袴白羅方心曲領本品官導駕則騎而服之袴褶之制建隆四年范質與禮官議袴褶制度先儒無説惟開元雜禮有五品以上用細綾及羅六品以下用小綾之制注褶衣復衣也又案令文武辨金飾平巾幘簪導紫褶白袴玉梁珠寶鈿帶鞾騎馬服之金飾即附蟬也詳此即是二品三品所配辨之制也附蟬之數蓋一品九二品八三品七四品六五品五又侍中中書令散騎加貂蟬侍左者左珥侍右者右珥又開元禮導駕官並朱衣冠履依本品朱衣今朝服也故令文三品以上紫褶五品以上緋褶七品以上緑褶九品以上碧褶並白大口袴起梁帶烏皮鞾今請造袴褶如令文之制其起梁帶形制檢尋未是望以革帶代之奏可是歲造成而未用乾德六年郊禋始服而冠未造乃取朝服進賢冠帶襪履參用焉康定二年少府監言每大禮法物庫定百官品位給朝服今兩班內有官卑品高官高品卑者難以裁定願敕禮院詳其等第詔下禮院參酌舊制以聞奏曰準衣服令五梁冠一品二品侍祠大朝會則服之中書門下則加籠巾貂蟬準官品令一品尚書令太師太傅太保太尉司徒司空太子太師太傅太保二品中書令侍中左右僕射太子少師少傅少保諸州府牧左右金吾衛上將軍又準閣門儀制以中書令侍中同中書門下平章事為宰臣親王樞密使留守節度使京尹兼中書令侍中同中書門下平章事為使相樞密使知樞密院事參知政事樞密副使同知樞密院事宣徽南北院使僉書樞密院事並在東宮三司之上以上品位職事宜準前法給朝服宰臣使相則加籠巾貂蟬其散官勳爵不繫品位止從正官為之服三梁冠諸司三品御史臺四品兩省五品侍祠大朝會則服之御史中丞則冠獬豸準官品令諸司三品諸衛上將軍六軍統軍諸衛大將軍神武龍武大將軍太常宗正卿祕書監光祿衛尉太僕大理鴻臚司農太府卿國子祭酒殿中少府將作司天監諸衛將軍神武龍武將軍下都督三京府尹五大都督府長史親王傅御史臺三品四品御史大夫中丞兩省三品四品五品左右散騎常侍門下中書侍郎諫議大夫給事中中書舍人尚書省三品四品六尚書左右丞諸行侍郎東宮三品四品賓客詹事左右庶子少詹事左右諭德節度使文明殿學士資政殿大學士三司使翰林學士承旨翰林學士資政殿學士端明殿學士翰林侍讀侍講學士龍圖閣學士樞密直學士龍圖天章閣直學士次中書侍郎節度觀察留後次六尚書侍郎知制誥龍圖天章閣待制觀察使次中書舍人內客省使次太府卿客省使次將作監引進使防禦團練三司副使次左右庶子以上品位職事宜準前法給朝服兩梁冠四品五品侍祠大朝會則服之六品則去劍佩綬御史則冠獬豸準官品令諸司四品太常宗正少卿祕書少監光祿等七寺少卿國子司業殿中少府將作司天少監三京府少尹太子率更令家令僕諸衛率府率副率諸軍衛中郎將諸王府長史司馬大都督府左右司馬內侍尚書省五品左右司諸行郎中諸司五品國子博士經筵博士太子中允左右贊善大夫都水使者開封祥符河南洛陽宋城縣令太子中舍洗馬內常侍太常宗正祕書殿中丞著作郎殿中省五尚奉御大理正諸王友諸軍衛郎將諸王府咨議參軍司天五官正太史令內給事諸升朝官六品以下起居郎起居舍人侍御史尚書省諸行員外郎殿中侍御史左右司諫左右正言監察御史太常博士通事舍人四方館使次七寺少卿諸州刺史次太子僕謂正任不帶使職者東西上閣門使次司天少監客省引進閣門副使次諸行員外郎已上品位職事據令文但言四品五品亦不分班上下今請自尚書省五品以上及諸州刺史已上準前法給朝服其諸司五品已上實有官高品卑及品高官卑者宜自諸司五品國子博士至內給事並依六品以下例去劍佩綬御史則冠獬豸衣有中單其諸司使副使以下至閣門祗候如有攝事合請朝服者並同六品詔從所謂元豐二年詳定朝會儀注所言古者制禮上物不過十二天之數也自上而下降殺以兩畿外諸侯遠於尊者而伸則以九以七以五從陽奇之數王朝公卿大夫近於尊者而屈則以八以六以四從陰偶之數本朝衣服令通天冠二十四梁為乘輿服以應冕旒前後之數若人臣之冠則自五梁而下與漢唐少異矣至於綬則乘輿及皇太子以織成諸臣用錦為之一品二品冠五梁中書門下加籠巾貂蟬諸司三品三梁四品五品二梁御史臺四品兩省五品亦三梁而綬有暈錦黃獅子方勝練鵲四等之殊六品則去劍佩綬隋唐冠服皆以品為定蓋其時官與品輕重相準故也今之令式尚或用品雖因襲舊文然以官言之頗為舛謬概舉一二則太子中允贊善大夫與御史中丞同品太常博士品卑於諸寺丞太子中舍品高於起居郎內常侍才比內殿崇班而在尚書諸司郎中之上是品不可用也若以差遣則有官卑而任要劇者有官品高而處之冗散者有一官而兼領數局者有徒以官奉朝請者有分局蒞職特出於一時隨事立名者是差遣又不可用也以此言之用品及差遣定冠綬之制則未為允當伏請以官為定庶名實相副輕重有準仍乞分官為七等冠綬亦如之貂蟬籠巾七梁冠天下樂暈錦綬為第一等蟬舊以玳瑁為蝴蝶狀今請改為黃金附蟬宰相親王使相三師三公服之七梁冠雜花暈錦綬為第二等樞密使知樞密院至太子太保服之六梁冠方勝宜男錦綬為第三等左右僕射至龍圖天章寶文閣直學士服之五梁冠翠毛錦綬為第四等左右散騎常侍至殿中少府將作監服之四梁冠簇四雕錦綬為第五等客省使至諸行郎中服之三梁冠黃獅子錦綬為第六等皇城以下諸司使至諸衛率府率服之內臣自內常侍以上及入內省內侍省內東西頭供奉官殿頭前班東西頭供奉官左右侍禁左右班殿直京官祕書郎至諸寺監主簿既預朝會亦宜朝服從事今參酌自內常侍以上冠服各從本等寄資者如本官入內內侍省內東西頭供奉官殿頭三班使臣陪位京官為第七等皆二梁冠方勝練鵲錦綬高品以下服色依古者韍舄履並從裳色今制朝服用絳衣而錦有十九等其七等綬謂宜純用紅錦以文采高下為差別惟法官綬用青地荷蓮錦以別諸臣後漢志法冠一曰柱後執法者服之侍御史廷尉正監平也或謂之獬豸冠南齊志亦曰法冠廷尉等諸執法者冠之今御史臺自中丞而下至監察御史大理卿少卿丞審刑院刑部主判官既正定厥官真行執法之事則宜冠法冠改服青荷蓮錦綬其梁數與佩準本品從之其後又詔冬正朝會諸軍所服衣冠廂都軍都指揮使都虞候領團練使刺史服第五等軍都指揮使都虞候服第六等指揮使副指揮使服第七等並班於庭副都頭以上常服班殿門外其朝會執事高品以下並服介幘絳服大帶革帶襪履方心曲領政和議禮局更上羣臣朝服之制七梁冠金塗銀稜貂蟬籠巾犀簪導銀立筆朱衣裳白羅中單並皂褾襈蔽膝隨裳色方心曲領緋白羅大帶金塗銀革帶金塗銀裝玉佩天下樂暈錦綬青絲網間施三玉環白襪黑履三公左輔右弼三少太宰少宰親王開府儀同三司服之七梁冠無貂蟬籠巾銀裝玉佩雜花暈錦綬餘同三公以下服執政官東宮三師服之六梁冠白紗中單銀革帶佩方勝宜男錦綬銀環餘同七梁冠服大學士學士直學士東宮三少御史大夫中丞六曹尚書侍郎殿中監大司成散騎常侍特進金紫銀青光祿大夫光祿大夫太尉節度使左右金吾衛左右衛上將軍服之五梁冠翠毛錦綬餘同六梁冠服太子賓客詹事給事中中書舍人諫議大夫待制九寺卿大司樂祕書監殿中少監國子祭酒宣奉正奉通奉通議太中中大夫中中散大夫上將軍節度觀察留後觀察使通侍大夫樞密都承旨服之四梁冠簇四盤雕錦綬餘同五梁冠服九寺少卿大晟典樂祕書少監國子辟雍司業少府將作軍器監都水使者起居舍人侍御史太子左右庶子少詹事諭德尚書左右司郎中員外六曹諸司郎中朝議奉直朝請朝散朝奉大夫防禦團練使刺史大將軍正侍中侍中亮中衛拱衛左武右武大夫駙馬都尉帶遙郡武功大夫以下樞密副都承旨服之三梁冠金塗銅革帶佩黃獅子錦綬鍮石環餘同四梁冠服殿中侍御史監察御史司諫正言尚書六曹員外郎外符寶郎少府將作軍器少監太子侍讀侍講中書舍人親王府翊善侍讀侍講九寺祕書殿中監辟雍丞大晟樂令兩赤縣令大理正司直評事著作郎祕書郎著作佐郎太常宗學國子辟雍博士太史局令正丞五官正朝請朝散朝奉承議奉議通直郎中亮中衛拱衛左武右武郎諸衛將軍衛率府率武功武德武顯武節武略武經武義武翼大夫郎醫職翰林醫正以下內符寶郎閣門通事舍人敦武郎修武郎服之二梁冠角簪方勝練鵲錦綬餘同三梁冠服在京職事官閣門祗候看班祗候率府副率升輦輅立侍內臣服之御史大夫中丞刑部尚書侍郎大理卿少卿侍御史刑部郎中大理寺正丞司直評事並冠獬豸冠服青荷蓮綬詔悉頒行六年詔導駕官朝服結佩七年詔夏祭百官朝祭服用紗中興仍舊制行事執事官則服祭服導引陪祠官則服朝服從紹興三年太常寺請也祠畢駕回若服通天絳紗袍乘大輦則百官從駕服朝服或服履袍乘平輦則百官從駕服常服自隆興二年洪適請始也進賢冠以漆布為之上縷紙為額花金塗銀銅飾後有納言以梁數為差凡七等以羅為纓結之第一等七梁加貂蟬籠巾貂鼠尾立筆第二等無貂蟬籠巾第三等六梁第四等五梁第五等四梁第六等三梁第七等二梁並如舊制服同貂蟬冠一名籠巾織藤漆之形正方如平巾幘飾以銀前有銀花上綴玳瑁蟬左右為三小蟬玉鼻左插貂尾三公親王侍祠大朝會則加于進賢冠而服之獬豸冠即進賢冠其梁上刻木為獬豸角碧粉塗之梁數從本品立筆古人臣簪筆之遺象其制削竹為幹裹以緋羅以黃絲為毫拓以銀縷葉插於冠後舊令文官七品以上服朝服者簪白筆武官則今文武皆簪焉
