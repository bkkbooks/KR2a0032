並加恩如占城國王淳熙元年賜安南國王印銅鑄塗以金紹興七年三佛齊國乞進章奏赴闕朝見詔許之令廣東經略司斟量只許四十人到闕進貢南珠象齒龍涎珊瑚琉璃香藥詔補保順慕化大將軍三佛齊國王給賜鞍馬衣帶銀器賜使人宴于懷遠驛淳熙五年再入貢計其直二萬五千緡回賜綾錦羅絹等物銀二千五百兩紹興三十一年正月安南獻馴象帝曰蠻夷貢方物乃其職但朕不欲以異獸勞遠人其令帥臣告諭自今不必以馴象入貢三十二年孝宗登極詔曰比年以來累有外國入貢太上皇帝沖謙弗受況朕涼菲又何以堪自今諸國有欲朝貢者令所在州軍以理諭遣毋得以聞淳祐三年安南國主陳日煚來貢加賜功臣號十一年再來貢景定三年六月日煚上表貢獻乞授其位於其子陳威晃咸淳元年二月加安南大國王陳日煚功臣增安善二字安南國王陳威晃功臣增守義二字各賜金帶鞍馬衣服二年復上表進貢禮物賜金五百兩賜帛一百匹降詔嘉奬
