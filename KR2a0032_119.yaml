body:
  text: 宋史卷一百一十九志第七十二禮二十二賓禮四錄周後錄先聖後羣臣朝使宴餞朝臣時節餽釰外國君長來朝契丹夏國使副見辭儀高麗附金國使副見辭儀諸國朝貢昔周滅殷封微子為殷後俾修其禮物作賓于王家與國咸休宋以柴周之後為二恪又錄孔子之後亦先王崇德象賢之意也故皆為賓禮其餘則有朝使之宴餞歲時之廩餽及外國之使聘遠方之朝貢著其迓餞宴賚之式登降揖遜之儀備一代之制焉太祖建隆元年正月四日詔曰封二王之後備三恪之賓所以示子傳孫興滅繼絕夏商之居嵵宋周隋之啟介酅古先哲王實用茲道矧予涼德歷試前朝雖周德下衰勉從於禪讓而虞賓在位豈忘於烝嘗其封周帝為鄭王以奉周嗣正朔服色一如舊制又詔曰矧惟眇躬逮事周室謳歌獄訟雖歸新造之邦廟貌園陵豈忘舊君之禮其周朝嵩慶二陵及六廟宜令有司以時差官朝拜祭饗永為定式仍命周宗正卿郭行禮乾德六年八月詔於周太祖世宗陵寢側各設廟宇塑像命右贊善大夫王碩管勾修蓋開寶六年三月周鄭王殂詔輟朝十日帝素服發哀於便殿十月四日葬周恭帝於順陵詔特輟四日五日朝參仁宗天聖六年錄故虢州防禦使柴貴子肅為三班奉職七年錄故太子少傅柴守禮孫詠為三班奉職其後又錄柴氏之後曰熙曰愈曰若拙曰上善並為三班奉職曰餘慶曰織為州長史助教曰貽廓等十一人復其身仍各賜錢一萬又錄世宗曾孫揆柔及貴曾孫日宣守禮曾孫若訥皆為三班奉職嘉祐四年著作郎何鬲言昔舜受堯禹受舜之天下而封丹朱商均以為國賓周漢以降以及於唐莫不崇奉先代延及苗裔本朝受周天下而近代之盛莫如唐自梁以下皆不足以崇襲臣願考求唐周之裔以備二王之後授以爵命封縣立廟世世承襲永為國賓事下太常議曰古者立二王後不惟繼絕兼取其明德可法五代草創載祀不永文章制度一無可考上取唐室世數已遠於經不合惟周則我受禪之所自義不可廢宜訪求子孫如孔子後衍聖公授一京官爵以公號使專奉廟饗歲時存問賜之粟帛牲器祭服每遇時祀並從官給其廟宇亦加嚴飾如此則上不失繼絕之義度之於今亦簡而易行從之四月詔曰先王推紹天之序尚尊賢之義褒其後嗣賓以殊禮豈非聖人稽古報功之大典哉國家受命之元繼周而王雖民靈欣戴曆數允集而虞賓將遜德美丕顯頃者推命本始褒及支庶每遇南郊許奏白身一名充班行恩則厚矣而義未稱將上采姚姒之舊略循周漢之典詳其世嫡優以公爵異其仕進之路申以土田之錫俾廟寢有奉饗祀不輟庶幾乎春秋通三統厚先代之制矣宜令有司取柴氏譜系於諸房中推最長一人令歲時親奉周室祀事如白身即與京主簿如為班行者即比類換文資仍封崇義公與河南府鄭州合入差遣給公田十頃專管勾陵廟應緣祭饗禮料所須皆從官給如至知州資序即別與差遣却取以次近親令襲爵授官永為定式八月太常禮院定到內殿崇班相州兵馬都監柴詠於柴氏諸族最長詔換殿中丞封崇義公簽書奉寧軍節度判官事以奉周祀又以六廟在西京而歲時祭饗無器服之數令有司以三品服一四品服二及所當用祭器給之熙寧四年西京留司御史臺司馬光言崇義公柴詠祭祀不以儀式周本郭姓世宗后姪為郭氏後今存周後則宜封郭氏子孫以奉周祀帝閱奏問王安石安石曰宋受天下於世宗柴氏也帝曰為人後者為之子安石曰為人後於異姓非禮也雖受天下於郭氏豈可以天下之故而易其姓氏所出帝然之五年正月柴詠致仕詠長子早亡嫡孫夷簡當襲太常禮院言夷簡有過合以次子西頭供奉官若訥承襲詔以若訥為衞尉寺丞襲封崇義公簽書河南府判官廳公事政和八年徽宗詔曰昔我藝祖受禪于周嘉祐中擇柴氏旁支一名封崇義公議者謂不當封周然禪國者周而三恪之封不及禮蓋未盡除崇義公依舊外擇柴氏最長見在者以其祖父為周恭帝後以其孫世世為宣義郎監周陵廟與知縣請給以示繼絕之仁為國二恪永為定制紹興五年詔周世宗玄孫柴叔夏為右承奉郎襲封崇義公奉周後二十六年叔夏升知州資序別與差遣以子國器襲封令居衢州朝廷有大禮則入侍祠如故事其柴大有柴安宅亦各補官淳祐九年又以世宗八世孫柴彥穎特補承務郎襲封崇義公時又求隋唐及朱氏李氏石氏劉氏郭氏之後及吳越荊南湖南蜀漢諸國之子孫皆命以官使守其祀具見本紀世家錄先聖後仁宗景祐二年詔以孔子四十六世孫北海尉宗愿為國子監主簿襲封文宣公皇祐三年七月詔曰國朝以來世以孔氏子孫知仙源縣使奉承廟祀近歲廢而不行非所以尊先聖也宜以孔氏子孫知仙源縣事至和初太常博士祖無擇言按前史孔子後襲封者在漢魏曰褒成褒尊宗聖在晉宋曰奉聖後魏曰崇聖北齊曰恭聖後周隋並封鄒國唐初曰褒聖開元中始追謚孔子為文宣王又以其後為文宣公不可以祖謚而加後嗣遂詔有司定封宗愿衍聖公令世襲焉治平初用京東提點王綱言自今勿以孔氏子弟知仙源縣其襲封人如無親屬在鄉里令常任近便官不得去家廟熙寧中以四十八代孫若蒙為沂州新泰縣主簿襲封元祐初朝議大夫孔宗翰辭司農少卿請依家世例知兗州以奉祀又言孔子後襲封疏爵本為侍祠今乃兼領他官不在故郡請自今襲封者無兼他職終身使在鄉里朝議依所請命官以司其用度立學以訓其子孫襲封者專主祠事增賜田百頃共祭祀之餘許均贍族人其差墓戶並如舊法賜書置教授一員教諭其家子弟鄉鄰或願學者聽改衍聖公為奉聖公及刪定家祭冕服等制度頒賜之其後通直郎孔宗壽等舉若蒙弟若虛襲封仍請自今衆議擇承襲之人不必子繼庶幾留意祖廟惇睦族人宣和三年詔宣議郎孔端友襲封衍聖公為通直郎直秘閣仍許就任關升以示崇奬端友言詔敕文宣王後與親屬一人判司簿尉今孔若采當承繼推恩詔補迪功郎高宗紹興二年以四十九代孫孔玠襲封衍聖公其後以搢以文遠以萬春以洙終宋世皆襲封主祀事羣臣朝覲出使宴餞之儀太祖太宗朝藩鎮牧伯沿五代舊制入覲及被召使回客省齎籤賜酒食節度使十日留後七日觀察使五日代還節度使五日留後三日觀察一日防禦使團練使刺史並賜生料節度使以私故到闕下及步軍都虞候以上出使回者亦賜酒食熟羊羣臣出使回朝見日面賜酒食中書樞密宣徽使使相並樞密使伴三司使學士東宮三師僕射御史大夫節度使並宣徽使伴兩省五品以上侍御史中丞三司副使東宮三少尚書丞郎卿監上將軍留後觀察防禦團練使刺史宣慶宣政昭宣使並客省使伴少卿監大將軍諸司使以下任發運轉運提點刑獄知軍州通判都監巡檢回者即賜並通事舍人伴客省引進四方館閤門使並本廳就食羣臣賀賜衣奉慰並特賜茶酒或賜食外任遣人進奉亦賜酒食或生料自十月一日後盡正月每五日起居百官皆賜茶酒諸軍分校三日一賜冬至二社重陽寒食樞密近臣禁軍大校或賜宴其第及府署中率以為常大中祥符五年詔自今兩省五品尚書省四品諸司三品以上官同列出使並許醵錢餞飲仍休假一日餘官有親屬僚友出行任以休務日餞送故事樞密節度使使相還朝咸賜宴於外苑見辭日長春殿賜酒五行仍設食當直翰林龍圖閣學士以上皇親觀察使預坐八年四月侍衞步軍副都指揮使王能自鎮定來朝宴於長春殿閤門言舊制節度使掌兵無此禮例既赴坐則殿前馬軍都校當侍立於品秩非便遂令皆預位中興仍舊制凡宰相樞密執政使相節度外國使見辭及來朝皆賜宴內殿或都亭驛或賜茶酒並如儀時節餽廩大中祥符五年十一月以宰相王旦生日詔賜羊三十口酒五十壺米麵各二十斛令諸司供帳京府具衙前樂許宴其親友旦遂會近列及丞郎給諫修史屬官俄又賜樞密使副參知政事羊三十口酒三十壺米麵各三十斛其後以廢務非便奏罷會而賜如故又制僕射御史大夫中丞節度留後觀察內客省使權知開封府正至寒食並客省齎籤賜羊酒米麵立春賜春盤寒食神餤粥端午粽子伏日蜜沙冰重陽糕並有酒三伏日又五日一賜冰四廂及廂都指揮使中書舍人統軍防禦團練使刺史客省使樞密都承旨知銀臺司審刑院三司三司勾院諸司使禁軍校忠佐海外諸蕃進奉領刺史以上至寒食並賜節料立春奉內朝者皆賜幡勝元祐二年十一月冬至詔賜御筵於呂公著私第遣中使賜上尊酒香藥果實縷金花等以御飲器勸酒遣教坊樂工給內帑錢賜之及暮賜燭傳宣令繼燭皆異恩也紹興十三年十二月二十三日高宗賜宰臣秦檜詔曰省所奏辭免生日賜宴朕聞賢聖之興必五百歲君臣之遇蓋亦千載夫以不世之英值難逢之會則其始生之日可不為天下慶乎式燕樂衎所以示慶也非喬嶽之神無以生申甫非宣王之能任賢無以致中興今日之事不亦臣主俱榮哉宜服異恩毋守沖節所請宜不允宋朝之制凡外國使至及其君長來朝皆宴于內殿近臣及刺史正郎都虞候以上皆預太祖建隆元年八月三日宴近臣於廣政殿江南吳越朝貢使皆預乾德三年五月十六日宴近臣及孟昶于大明殿開寶四年五月七日宴近臣及劉鋹于崇德殿十一月五日江南李煜吳越錢俶各遣子弟來朝宴于崇德殿八年三月晦宴契丹使于長春殿太平興國二年二月十一日宴兩浙進奉使契丹國信使及李煜劉鋹禁軍都指揮使以上于崇德殿不舉樂酒七行而罷契丹遣使賀登極也五月十一日再宴契丹使于崇德殿酒九行而罷以其貢助山陵也三年正月十六日宴劉鋹李煜契丹使諸國蕃客于崇德殿以契丹使來賀正故也三月二十五日吳越錢俶來朝宴于長春殿親王宰相節度使劉鋹李煜皆預十月十六日宴宰相親王以下及契丹使高麗使諸州進奉使於崇德殿以乾明節罷大宴故也是後宴外國使為常其君長來朝先遣使迎勞於候館使者朝服稱制曰奉制勞某主國主迎於門外與使者俱入升階使者執束帛稱有制國主北面再拜稽首受幣又再拜稽首以土物儐使者再拜受國主送使者出鴻臚引詣朝堂所司奏聞通事舍人承敕宣勞再拜就館翌日遣使戒見日如儀又次日奉見于乾元殿設黃麾仗及宮縣大樂典儀設國主位於縣南道西北向又設其國諸官之位於其後所司迎引國主服其國服至明德門外通事舍人引就位侍中奏中嚴皇帝服通天冠絳紗袍出自西房即御位典儀贊拜國主再拜稽首侍中承制降勞皆再拜稽首敕升坐又再拜稽首至坐俛伏避席侍中承制曰無下拜國主復位次引其國諸官以次入就位再拜並如上儀侍中又承制勞還館通事舍人引國主降復位再拜稽首出其國諸官皆再拜以次出侍中奏禮畢皇帝降坐其錫宴與受諸國使表及幣皆有儀具載開寶通禮契丹國使入聘見辭儀自景德澶淵會盟之後始有契丹國信使副元正聖節朝見大中祥符九年有司遂定儀注前一日習儀于驛見日皇帝御崇德殿宰臣樞密使以下大班起居訖至員僚起居後館伴使副一班入就位東面立次接書匣閤門使升殿立次通事入不通喝拜兩拜奏聖躬萬福又喝兩拜隨呼萬歲喝祗候赴東西接引使副位舍人引契丹使副自外捧書匣入當殿前立天武官撎禮物分東西面入列於殿下以東為上舍人喝天武官起居兩拜隨呼萬歲奏聖躬萬福喝各祗候閤門從東階降至契丹使位北舍人揖使跪進書匣閤門側身搢笏跪接舍人受之契丹使立閤門執笏捧書匣升殿當御前進呈訖授內侍都知都知