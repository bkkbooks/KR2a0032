body:
  text: 宋史卷一百七十五志第一百二十八食貨上三布帛和糴漕運布帛宋承前代之制調絹紬布絲綿以供軍須又就所産折科和市其纖麗之物則在京有綾錦院西京真定青益梓州場院主織錦綺鹿胎透背江寧府潤州有織羅務梓州有綾綺場亳州市皺紗大名府織皺縠青齊鄆濮淄濰沂密登萊衡永全州市平絁東京榷貨務歲入中平羅小綾各萬匹以供服用及歲時賜與諸州折科和市皆無常數唯內庫所須則有司下其數供足自周顯德中令公私織造並須幅廣二尺五分民所輸絹匹重十二兩疏薄短狹塗粉入藥者禁之河北諸州軍重十兩各長四十二尺宋因其舊開寶三年令天下諸州凡絲綿紬絹麻布等物所在約支二年之用不得廣科市以煩民初蓬州請以租絲配民織綾給其工直太祖不許太宗太平興國中停湖州織綾務女工五十八人悉縱之詔川峽市買場織造院自今非供軍布帛其錦綺鹿胎透背六銖欹正龜殼等段匹不須買織民間有織賣者勿禁馬元方為三司判官建言方春乏絶時預給庫錢貸民至夏秋令輸絹於官大中祥符三年河北轉運使李士衡又言本路歲給諸軍帛七十萬民間罕有緡錢常預假於豪民出倍稱之息至期則輸賦之外先償逋缺以是工機之利愈薄請預給帛錢俾及時輸送則民獲利而官亦足用詔優豫其直自是諸路亦如之或蠶事不登許以大小麥折納仍免倉耗及頭子錢天聖中詔減兩蜀歲輸錦綺鹿胎透背欹正之半罷作綾花紗明道中又減兩蜀歲輸錦綺綾羅透背花紗三之二命改織紬絹以助軍景祐初遂詔罷輸錦背繡背遍地密花透背段自掖庭以及閭巷皆禁用其後歲輒增益梓路紅錦鹿胎慶曆四年復減半既而又減梓路歲輸絹三之一紅錦鹿胎半之先是咸平初廣南西路轉運使陳堯叟言準詔課植桑棗嶺外唯産苧麻許令折數仍聽織布赴官場博市匹為錢百五十至二百至是三司請以布償芻直登萊端布為錢千三百六十沂布千一百仁宗以取直過厚命差減其數自西邊用兵軍須紬絹多出益梓利三路歲增所輸之數兵罷其費乃減嘉祐三年始詔寬三路所輸數治平中歲織十五萬三千五百餘匹神宗即位京師米有餘蓄命發運司損和糴數五十萬石市金帛上京儲之榷貨務備三路軍須京東轉運司請以錢三十萬二千二百貫給貸於民令次年輸絹匹為錢千隨夏稅初限督之詔運其錢于河北聽商人入中熙寧三年御史程皓言京東轉運司和買紬絹增數抑配率千錢課絹一匹其後和買并稅絹匹皆輸錢千五百時王廣淵為轉運使謂和買如舊無抑配皓言其迎合朝廷意王安石謂廣淵在京東盡力以赴事功不宜罪以迎合乃詔所給內帑別額紬絹錢五十萬緡收其本儲之北京息歸之內帑右正言李常亦言廣淵以陳汝羲所進羡餘錢五十萬緡隨和買絹錢分配於常稅折科放買外更取二十五萬緡請以皓言付有司定州安撫司又言轉運司配紬絹綿布於州鎮軍寨等坊郭戶易錢數多乞憫其災傷又居極邊特蠲損之詔提刑司別估民不願市令官自賣已給而抑配者正之自王安石秉政專以取息為富國之務故當時言利小人如王廣淵輩假和買紬絹之名配以錢而取其五分之息其刻又甚於青苗然安石右廣淵皓常言卒不行二月詔移巴蜀羡財市布帛儲於陝西以備邊省蜀人輸送及中都漕挽之費七年兩浙察訪沈括言本路歲上供帛九十八萬民苦備償而發運司復以移用財貨為名增預買紬絹十二萬詔罷其所增之數八年韓琦奏倚閣預買紬絹等雖稍豐稔猶當五七歲帶輸安石以為不然言於神宗曰預買紬絹祖宗以來未嘗倚閣往歲李稷有請因從之近方鎮監司爭以寬恤為事不計有無異日國用闕當復刻剝於民爾元豐以來諸路預買紬絹許假封樁錢或坊場錢少者數萬緡多者至數十萬緡其假提舉司寬剩錢者又或令以絹帛入常平庫俟轉運司以價錢易取三年京東轉運司請增預買數三十萬即本路移易從之四年遣李元輔變運川峽四路司農物帛中書言物帛至陝西擇省樣不合者貿易糴糧儲於邊期以一年畢五年戶部上其數凡八百十六萬一千七百八十匹兩三百四十六萬二千緡有奇紹聖元年兩浙絲蠶薄收和買并稅紬絹令四等下戶輸錢易左帑紬絹又令轉運司以所輸錢市金銀遇蠶絲多兼市紗羅紬絹上供元符元年雄州榷場輸布不如樣監司通判貶秩展磨勘年有差令損其直後似此者勿受尚書省言民多願請預買錢宜視歲例增給來歲市紬絹計綱赴京左司員外郎陳瓘言預買之息重於常平數倍人皆以為苦何謂願請今復創增雖名濟乏實聚斂之術提點京東刑獄程堂亦言京東河北災民流未復今轉運司東西路歲額無慮二百萬匹兩又於例外增買請罷之乃詔諸路提舉司勿更給錢俟蠶麥多選官置場崇寧中諸路預買令所産州縣鄉民及城郭戶並準資力高下差等均給川峽路取元豐數最多一年為額舊不給者如故江西和買紬絹歲五十萬匹舊以錢鹽三七分預給自鹽鈔法行不復給鹽令轉運司盡給以錢而卒無有逮今五年循以為常民重傷困大觀初詔假本路諸司封樁錢及鄰路所掌封樁鹽各十萬緡給之其後提舉常平張根復言本路和買未嘗給錢請盡給一歲蠶鹽許轉運司移運或民戶至場自請而江西十郡和買數多法一匹給鹽二十斤比錢九百歲預於十二月前給之轉運司得鹽不足更下發運司會積歲所負給償尚書省言大觀庫物帛不足令兩浙京東淮南江東西成都梓州福建路市羅綾紗一千至三萬匹各有差二年又令京東淮南兩浙市絹帛五萬及三萬匹並輸大觀庫又四川各二萬輸元豐庫江東西如四川之數輸崇寧庫而州縣和買有以鹽一席折錢六千令民至期輸紬絹六匹又前期督促致多逃徙詔遞加其罪坊郭戶預買有家至四五百匹興仁府萬延嗣戶業錢十四萬二千緡歲均千餘匹乃令減半均之兩浙和買并稅紬絹布帛頭子錢外又收市例錢四十例外約增數萬緡以分給人吏政和初詔罷市例錢諸路紬絹布帛比價高數倍而給直猶用舊法言者請稍增之度支以元豐例定沮抑不行令如期給散而已江東和買弊如江西比年才給二百轉運司又以重十三兩為則不及則準絲價補納以錢兩率二百有餘宣和三年詔提刑司釐正以聞先是成都河北預買官戶許減半四年令舊嘗全科者如舊既又以兩浙多官戶令預買通敷七年冬郊祀河北京東和買科取物帛絲綿等數並免以供奉物給降其所蠲貸幾數百萬初預買紬絹務優直以利民然猶未免煩民後或令民折輸錢或物重而價輕民力寖困其終也官不給直而賦取益甚矣十二月詔令轉運司各會一路之數分下州縣經畫不以錢以他物不以正月以他月給者並論以違制然有司鮮能承順焉靖康元年命轉運司以常平錢前一季預備如正月之期給之毋貸以他物而損其數京東州縣勿以逃移戶舊數科著業人仍先除其數俟流民歸業均敷餘路亦如之建炎三年春高宗初至杭州朱勝非為相兩浙轉運副使王琮言本路上供和買夏稅紬絹歲為匹一百一十七萬七千八百每匹折輸錢二千以助用詔許之東南折帛錢自此始五月詔每歲預買綿絹令登時給其直又詔江浙和預買絹減四分之一仍給見錢違者置之法紹興元年初賦鼎州和買折帛錢六萬緡以贍蔡兵以兩浙夏稅及和買紬絹一百六十餘萬匹半令輸錢匹二千二年以諸路上供絲帛並半折錢如兩浙例江淮閩廣荊湖折帛錢自此始時江浙湖北夔路歲額紬三十九萬匹江南川廣湖南兩浙絹二百七十三萬匹東川湖南綾羅絁七萬匹西川廣西布七十七萬匹成都綿綺千八百餘匹皆有奇三年三月以兩浙和買物帛下戶艱於得錢聽以七分輸正色三分折見緡初洪州和買八分輸正色二分折省錢匹三千四年帥臣胡世將請以三分匹折六千省又言絹直踴貴請匹增為五千足戶部定為六千足殿中侍御史張致遠言江西殘破之餘和預買絹請折輸錢朝廷從之是欲少寬民力匹輸錢五千省比舊直已增其半較之兩浙時直匹多一千五百戶部又令折六貫文足是欲乘民之急而倍其斂也物不常貴則絹有時而易辦錢額既定則價無時而可減於是詔江西和買絹匹折輸錢六千省願輸正色者聽是冬初令江浙民戶悉輸折帛錢當是時行都月費錢百餘萬緡重以征戍之費令民輸紬者全折輸絹者半折匹五千二百省折帛錢由此愈重九年正月復河南減折帛錢匹一千未幾又增之十七年減折帛錢江南匹為六千兩浙七千和買六千五百綿江南兩為三百兩浙四百二十年詔廣西折布錢因張浚增至兩倍以上今減作一貫文折輸二十九年中書省奏江浙四路所起折帛錢地里遙遠宜就近儲之詔除徽處廣德舊折輕貨餘州當折銀者輸錢願輸銀者聽浙西提刑司三總領所主之先是江浙路折帛錢歲為錢五百七十三萬餘緡並輸行都至是始外儲之以備軍用乾道四年減兩浙江東西路乾道五年夏稅和買折帛錢之半六年知徽州郟升卿代還奏州自五代時陶雅守郡妄增民賦至今二百餘年比鄰境諸縣之稅獨重數倍而雜錢之稅科折尤重請賜蠲免九年詔徽州額外創科雜錢一萬二千一百八十餘緡及元認江東兩浙運司諸處絹一萬六千六百餘匹並蠲之紹熙五年詔兩浙江東西和買紬絹折帛錢太重可自來年匹減錢一貫五百文三年後別聽旨所減之錢令內藏封樁兩庫撥還慶元元年戶部侍郎袁說友言臨安餘杭二縣和買科取之弊乞將餘杭縣經界元科之額配以絹數不分等則以二十四貫定敷一匹衮科而下足額而止捐其餘以惠末産之民如此則吏不得而制民民無資於詭戶救弊之良策也說友又奏貫頭均科之法行則縣邑無由多取鄉司無所走弄而詭挾者不能以幸免是以姦民頑吏立為異論以搖之詔令集議二年吏部尚書葉翥等議請如帥漕所奏推行之詔可建炎元年知越州翟汝文奏浙東和預買絹歲九十七萬六千匹而越乃六十萬五百匹以一路計之當十之三望將三等以上戶減半四等以下戶權罷尋以杭之和買絹偏重均十二萬匹於兩浙乾道九年祕書郎趙粹中言兩浙和買莫重於紹興而會稽為最重緣田薄稅重詭名隱寄多分子戶自經界後至乾道五年纍經推排減落物力走失愈重民力困竭若據畝均輸可絶詭戶之弊淳熙八年詔兩淮漕臣吳琚與帥臣張子顏措置子顏等言勢家豪民分析版籍以自託於下戶是不可不抑然弊必有原謂如浙東七州和買凡二十八萬一千七百三十有八溫州本無科額合台明衢處婺之數不滿一十三萬而紹興一郡獨當一十四萬六千九百三十有八則是以一郡視五郡之輸而又贏一萬有奇此重額之弊也又如賃牛物力以其有資民用不忍科配酒坊鹽亭戶以其嘗趁官課難令再敷至於坍江落海之田壤地漂沒僧道寺觀之産或奉詔蠲免而省額未除不免陰配民戶此暗科之弊也二弊相乘民不堪命於是規避之心生而詭戶之患起舊例物力三十八貫五百為第四等降一文以下即為第五等為詭戶者志於規避往往止就二三十貫之間立為砧基今若自有産有丁係真五等依舊不科其有産無丁之戶將實管田産錢一十五貫以上並科和買其一十五貫以下則存而不敷庶幾僞五等不可逃真五等不受困於是詔詔興府欑宮田園諸寺觀延祥莊并租牛耕牛合蠲和買並於省額除之坊場鹽亭戶見敷和買物力及坍江田放生池合減租稅物力並核實取旨十一年臣僚言兩浙江東西四路和買不均之弊送戶部給舍等官詳議鄭丙丘䥩議畝頭均科之說至公至平詔施行之十六年知紹興府王希呂言均敷和買曩者亟於集事不暇核實一切以為詭戶而科之於是物力自百文以上皆不免於和買貧民始不勝其困乞將創科和買二萬五十七匹有奇盡放則民被實惠矣於是詔下戶和買二萬五十餘匹住催一年又減元額四萬四千匹有奇均敷一節令知紹興府洪邁從長施行紹熙元年邁定其法上之詔依所措置推行於是紹興貧民下戶稍寬矣和糴宋歲漕以廣軍儲實京邑河北河東陝西三路及內郡又自糴買以息邊民飛挽之勞其名不一建隆初河北連歲大稔命使置場增價市糴自是率以為常咸平中嘗出內府綾羅錦綺計直緡錢百八十萬銀三十萬兩付河北轉運使糴粟實邊繼而詔凡邊州積穀可給三歲即止大中祥符初三路歲豐仍令增糴廣蓄靡限常數後又時出內庫緡錢或數十萬或百萬別遣官經畫市糴中等戶以下免之初河東既下減其租賦有司言其地沃民勤頗多積穀請每歲和市隨常賦輸送其直多折色給之京東西陝西河北闕兵食州縣括民家所積糧市之謂之推置取上戶版籍酌所輸租而均糴之謂之對糴皆非常制麟府州以轉餉道遠遣常參官就置場和糴河北又募商人輸芻粟於邊以要券取鹽及緡錢香藥寶貨於京師或東南州軍陝西則受鹽於兩池謂之入中陝西糴穀又歲預給青苗錢天聖以來罷不復給然發內藏金帛以助糴者前後不可勝數寶元中出內庫珠直緡錢三十萬付三司售之收其直以助邊費歐陽修奉使河東還言河東禁並邊地不許人耕而私糴北界粟麥為兵儲最為大患遂詔岢嵐火山軍間田並邊壕十里外者聽人耕然竟無益邊備歲糴如故大抵入中利厚而商賈趨之罷三路入中悉以見錢和糴縣官之費省矣熙寧五年詔以銀絹各二十萬賜河東經略安撫司聽人賒買收本息封樁備邊自是三路封樁所給甚廣或取之三司或取之市易務或取之他路轉運司或賜常平錢或鬻爵給度牒而出內藏錢帛不與焉七年以岷州入中者寡令三司具東南及西鹽鈔法經久通行利病以聞知熙州王韶建議依沿邊和糴例以一分見緡九分西鈔別約價募入中者凡邊部入中有闕則多出京鈔或饒益誘之以紓用度是歲河東並邊大稔詔都轉運使李師中與劉庠廣糴積五年之蓄復命輔臣議更以陝西並塞芻糧之法令轉運司增舊糴三分以所糴虧羡為賞罰仍遣吏按視而陝西和糴或以錢茶銀紬絹糴於弓箭手八年河東察訪使李承之言太原路二稅外有和糴糧草官雖量豫錢布而所得細微民無所濟遇歲凶不蠲最為弊法繼而知太原韓絳復請和糴於元數省三分罷支錢布乞精選才臣講求利害詔委陳安石元豐元年安石奏河東十三州二稅以石計凡三十九萬二千有餘而和糴數八十二萬四千有餘所以歲凶仍輸者以稅輕軍儲不可闕故也舊支錢布相半數既奇零以鈔貿易略不收半公家實費百姓乃得虛名欲自今罷支糴錢歲以其錢令並邊州郡和市封樁即歲災以填所蠲數年豐則三歲一免其輸朝廷以為然始詔河東歲給和糴錢八萬餘緡並罷以其錢付漕司如安石議因用安石為河東轉運使其後經略使呂惠卿復請別議立法除河外三州理為邊郡宜免餘十一州可概均糴下有司議以歲和糴見數十分之裁其二用八分為額隨戶色高下裁定毋更給錢歲災同秋稅蠲放以轉運司應給錢補之災不及五分聽以久例支移遂易和糴之名為助軍糧草元豐四年以度支副使蹇周輔兼措置河北糴便司明年詔以開封府界諸路闕額禁軍及淮浙福建等路剩鹽息錢並輸糴便司為本令瀛定澶等州各置倉凡封樁三司毋關預委周輔專其任司農寺市易淤田水利等司所計置封樁糧草並歸之六年詔提點河北西路王子淵兼同措置未幾手詔周輔今河朔豐成宜廣收糴是歲大名東西濟勝二倉定州衍積寶盈二倉與瀛之州倉皆成周輔召拜戶部侍郎以左司郎中吳雍代之明年雍言河北倉廩皆充實見儲糧料總千一百七十六萬石詔賜同措置王子淵三品服宣和中罷畿內和糴自熙寧以來和糴入中之外又有坐倉博糴結糴俵糴兌糴寄糴括糴勸糴均糴等名其曰坐倉熙寧二年令諸軍餘糧願糴入官者計價支錢復儲其米於倉王圭奏曰外郡用錢四十可致斗米於京師今京師乏錢反用錢百坐倉糴斗米此極非計司馬光曰坐倉之法蓋因小郡乏米而庫有餘錢故反就軍人糴米以給次月之糧出於一時急計耳今京師有七年之儲而府庫無錢更糴軍人之米使積久陳腐其為利害非臣所知呂惠卿曰今坐倉得米百萬石則減東南歲漕百萬石轉易為錢以供京師何患無錢光曰臣聞江淮之南民間乏錢謂之錢荒而土宜粳稻彼人食之不盡若官不糴取以供京師則無所發泄必甚賤傷農矣且民有米而官不用米民無錢而官必使之出錢豈通財利民之道乎不從明年又慮元價賤神龍衛及諸司每石等第增錢收糴仍聽行於河北河東陝西諸路元符以後有低價抑糴之弊詔禁止之其曰博糴熙寧七年詔河北轉運提舉司置場以常平及省倉歲用餘糧減直聽民以絲綿綾絹增價博買俟秋成博糴崇寧五年又詔陝西錢重物輕委轉運司措置以銀絹絲紬之類博糴斛斗以平物價其曰結糴熙寧八年劉佐體量川茶因便結糴熙河路軍儲得七萬餘石詔運給焉未幾商人王震言結糴多散官或浮浪之人有經年方輸者詔措置熙河財用孫迥究治以聞迥奏總管王君萬負熙河兩州結糴錢十四萬六百三十餘緡銀三百餘兩乃遣蔡確馳往本路劾之君萬及高遵裕皆坐借結糴違法市易降黜有差崇寧初蔡京行於陝西盡括民財以充數五年以星變講修闕政罷陝西河東結糴對糴其曰俵糴熙寧八年令中書計運米百萬石費約三十七萬緡帝怪其多王安石因言俵糴非特省六七十萬緡歲漕之費且河北入中之價權之在我遇斗斛貴住糴即百姓米無所糶自然價損非惟實邊亦免傷農乃詔歲以末鹽錢鈔在京粳米六十萬貫石付都提舉市易司貿易度民田入多寡預給錢物秋成於澶州北京及緣邊入米麥粟封樁即物價踴權止入中聽糴便司兌用須歲豐補償紹聖三年呂大忠之言召農民相保豫貸官錢之半循稅限催科餘錢至夏秋用時價隨所輸貼納崇寧中蔡京令坊郭鄉村以等第給錢俟收以時價入粟邊郡弓箭手青唐蕃部皆然用俵多寡為官吏賞罰其曰兌糴熙寧九年詔淮南常平司於麥熟州郡及時兌糴元祐二年嘗以麥熟下諸路廣糴詔後價若與本相當即許變轉兌糴其曰寄糴元豐二年糴便糧草王子淵論綱舟利害因言商人入中歲小不登必邀厚價故設內郡寄糴之法以權輕重七年詔河北瀛定二州所糴數以巨萬而散於諸郡寄糴恐緩急不相及不若致商人自運李南公王子淵俱言寄糴法行已久且近都倉緩急運致非難於是寄糴卒不罷其曰括糴元符元年涇原經略使章楶請並邊糴買豫榜諭民毋得與公家爭糴即官儲有乏括索贏糧之家量存其所用盡糴入官其曰勸糴均糴政和元年童貫宣撫陝西議行之鄜延經略使錢即言勸糴非可以久行均糴先入其斛斗乃給其直於有斛斗之家未有害也坊郭之人素無斛斗必須外糴轉有煩費疏奏坐貶時又詔河北河東倣陝西均糴知定州王漢之坐沮格奪職罷未幾遂立均糴法三年以歲稔諸路推行均糴五年言者謂均糴法嚴然已糴而不償其直或不度州縣之力敷數過多有一戶而糴數百石者乃詔諸路毋輒均糴既而州縣以和糴為名低裁其價轉運司程督愈峻科率倍於均糴詔約止之宣和三年方臘平兩浙亦量官戶輕重均糴明年荊湖南北均糴以家業為差勸糴之法其後寖及於新邊鄯廓州積石軍蕃部患之自熙寧以來王韶開熙河章惇營溪洞沈起劉彝啓交址之隙韓存寶林廣窮乞弟之役費用科調益繁陝西宿兵既多元豐四年六路大舉西討軍費最甚於他路帝先慮科役擾民令趙廉問頗得其事又以糧餉粗惡欲械斬河東涇原漕臣以厲其餘卒以師興役衆鮮克辦給又李稷為鄜延漕臣督運詔許斬知州以下乏軍興者民苦摺運多散走所殺至數千人道斃者不在焉於是文彥博奏言關陝人戶昨經調發不遺餘力死亡之餘疲瘵已甚為今之計正當勞來將士安撫百姓全其瘡痍使得蘇息明年優詔嘉答初西師無功議者慮朝廷再舉自是帝大感悟申飭邊臣固境息兵關中以蘇哲宗即位諸老大臣維持初政益務綏靜邊郡類無調發第令諸路廣糴以備蓄積及詔陝西麟府州計五歲之糧而已紹聖初乃詔河北鎮定瀛州糴十年之儲餘州七年其後陝西諸路又連歲興師及進築鄯湟等州費資糧不可勝計元符二年涇原經略使章楶諫曰伏見興師以來陝西府庫倉廩儲蓄內外一空前後資貸內藏金帛不知其幾千萬數即今所在糧草盡乏漕臣計無所出文移指空而已今者正休兵息民清心省事之時唯深察臣言裁決斯事若更詢主議大臣竊恐專務興師上誤聖聽主議大臣指章惇也時內藏空乏陝西諸路以軍賞銀絹數寡請給於內藏庫詔以絹五十萬匹豫之帝謂近臣曰內庫絹才百萬已輟其半矣蔡京用事復務拓土勸徽宗招納青唐用王厚經置費錢億萬用大兵凡再始克之而湟州戍兵費錢一千二十四萬九千餘緡五年熙河蘭湟運使洪中孚言本道青稞畝收五石粒當大麥之三異時人糧給精米馬料給青稞率皆八折不惟人馬之食自足而價亦相當今邊臣不燭事情精米青稞與糙米大麥一例抵斗給散即公有一分之耗私有一分之贏會計一路歲費斛斗一百八十萬雜色五十萬外青稞一百三十萬抵斗歲費二十六萬石石三十緡計七百八十萬帝慮其米仍粗將士或有饑色乃命九折明年復令計斗給散竟罷九折又於陝西建四都倉平夏城曰裕財鎮戎軍曰裕國通峽寨曰裕民西安州曰裕邊自夏人叛命諸路皆謀進築陝以西保甲皆運糧後童貫又自將兵築靖夏制戎伏羌等城窮討深入凡六七年至宣和末饋餉空乏鄜延至不能支旬月時邊臣爭務開邊夔峽嶺南不毛之地草創郡邑調取於民費出於縣官不可勝計最後有燕山之役雄霸等州倉廩皆竭兵士饑忿有擲瓦石擊守二刃將官者燕山郭藥師所將常勝一軍計口給錢廩月費米三十萬石錢一百萬緡河北之民力不能給於是免夫之議興初黃河歲調夫修築掃岸其不即役者輸免夫錢熙豐間淮南科黃河夫夫錢十千富戶有及六十夫者劉誼蓋嘗論之及元祐中呂大防等主回河之議力役既大因配夫出錢大觀中修滑州魚池掃始盡令輸錢帝謂事易集而民不煩乃詔凡河隄合調春夫盡輸免夫之直定為永法及是王黼建議乃下詔曰大兵之後非假諸路民力其克有濟諭民國事所當竭力天下並輸免夫錢夫二十千淮浙江湖嶺蜀夫三十千凡得一千七百餘萬緡河北羣盜因是大起南渡三邊饋餉糴事所不容已紹興間於江浙湖南博糴多者給官告少者給度牒或以鈔引類多不售而吏緣為姦人情大擾於是減其價以誘積粟之家初不拘於官編之戶凡降金銀錢帛而州縣阻節不即還者官吏並徒二年廣東轉運判官周綱糴米十五萬石無擾及無陳腐撫州守臣劉汝翼餉兵不匱及勸誘賑糶流離皆轉一官七年以饒州之糴石取耗四斗罪其郡守自是和糴者計剩科罪十三年荊湖歲稔米斗六七錢乃就糴以寬江浙之民十八年免和糴命三總領所置場糴之舊制兩浙江湖歲當發米四百六十九萬斛兩浙一百五十萬江東九十三萬江西百二十六萬湖南六十五萬湖北三十五萬至是缺百萬斛有奇乃詔臨安平江府及淮東西湖廣三計司歲糴米百二十萬斛浙西凡糴七十六萬淮西十六萬五千湖廣淮東皆十五萬二十八年除二浙以三十五萬斛折錢諸路綱米及糴場歲收四百五十二萬斛二十九年糴二百三十萬石以備振貸石降錢二千以關子茶引及銀充其數孝宗乾道三年秋江浙淮閩淫雨詔州縣以本錢坐倉收糴毋強配於民四年糴本給會子及錢銀石錢二貫五百文淳熙三年詔廣西運司糴錢以歲豐歉市直高下增減給之寶慶三年監察御史汪剛中言和糴之弊其來非一日矣欲得其要而革之非禁科抑不可夫禁科抑莫如增米價此已試而有驗者望飭所司奉行有旨從之紹定元年錫銀會度牒於湖廣總所令和糴米七十萬石餉軍五年臣僚言若將民間合輸緡錢使輸斛斗免令賤糶輸錢在農人亦甚有利此廣糴之良法也從之開慶元年沿江制置司招糴米五十萬石湖南安撫司糴米五十萬石兩浙轉運司五十萬石淮浙發運司二百萬石江東提舉司三十萬石江西轉運司五十萬石湖南轉運司二十萬石太平州一十萬石淮安州三十萬石高郵軍五十萬石漣水軍一十萬石廬州一十萬石並視時以一色會子發下收糴以供軍餉咸淳六年都省言咸淳五年和糴米除浙西永遠住糴及四川制司就糴二十萬石樁充軍餉外京湖制司湖南江西廣西共糴一百四十八萬石凡遇和糴年分皆然漕運宋都大梁有四河以通漕運曰汴河曰黃河曰惠民河曰廣濟河而汴河所漕為多太祖起兵間有天下懲唐季五代藩鎮之禍蓄兵京師以成彊幹弱支之勢故於兵食為重建隆以來首浚三河令自今諸州歲受稅租及管榷貨利上供物帛悉官給舟車輸送京師毋役民妨農開寶五年率汴蔡兩河公私船運江淮米數十萬石以給兵食是時京師歲費有限漕事尚簡至太平興國初兩浙既獻地歲運米四百萬石所在雇民挽舟吏並緣為姦運舟或附載錢帛雜物輸京師又回綱轉輸外州主藏吏給納邀滯於是擅貿易官物者有之八年乃擇幹彊之臣在京分掌水陸路發運事凡一綱計其舟車役人之直給付主綱吏雇募舟車到發財貨出納並關報而催督之自是調發邀滯之弊遂革初荊湖江浙淮南諸州擇部民高資者部送上供物民多質魯不能檢御舟人舟人侵盜官物民破産不能償乃詔牙吏部送勿復擾民大通監輸鐵尚方鑄兵器鍛練用之十裁得四五廣南貢藤去其粗者斤僅得三兩遂令鐵就冶即淬治之藤取堪用者無使負重致遠以勞民力汴河挽舟卒多饑凍太宗令中黃門求得百許人藍縷枯瘠詢其故乃主糧吏率取其口食帝怒捕鞫得實斷腕徇河上三日而後斬之押運者仗配商州雍熙四年併水陸路發運為一司主綱吏卒盜用官物及用水土雜糅官米故毀敗舟船致沈溺者棄市募告者厚賞之山河平河實因灘磧風水所敗以收救分數差定其罪端拱元年罷京城水陸發運以其事分隸排岸司及下卸司先是四河所運未有定制太平興國六年汴河歲運江淮米三百萬石菽一百萬石黃河粟五十萬石菽三十萬石惠民河粟四十萬石菽二十萬石廣濟河粟十二萬石凡五百五十萬石非水旱蠲放民租未嘗不及其數至道初汴河運米五百八十萬石大中祥符初至七百萬石江南淮南兩浙荊湖路租糴於真揚楚泗州置倉受納分調舟船泝流入汴以達京師置發運使領之諸州錢帛雜物軍器上供亦如之陝西諸州菽粟自黃河三門沿流入汴以達京師亦置發運司領之粟帛自廣濟河而至京師者京東之十七州由石塘惠民河而至京師者陳潁許蔡光壽六州皆有京朝官廷臣督之河北衛州東北有御河達乾寧軍其運物亦廷臣主之廣南金銀香藥犀象百貨陸運至虔州而後水運川益諸州金帛及租市之布自劍門列傳置分輦負檐至嘉州水運達荊南自荊南遣綱吏運送京師咸平中定歲運六十六萬匹分為十綱天禧末水陸運上供金帛緡錢二十三萬一千餘貫兩端匹珠寶香藥二十七萬五千餘斤諸州歲造運船至道末三千二百三十七艘天禧末減四百二十一先是諸河漕數歲久益增景德四年定汴河歲額六百萬石天聖四年荊湖江淮州縣和糴上供小民闕食自五年後權減五十萬石慶曆中又減廣濟河二十萬石後黃河歲漕益減耗才運菽三十萬石歲創漕船市材木役牙前勞費甚廣嘉祐四年罷所運菽減漕船三百艘自是歲漕三河而已江湖上供米舊轉運使以本路綱輸真楚泗州轉般倉載鹽以歸舟還其郡卒還其家汴舟詣轉般倉運米輸京師歲摺運者四河冬涸舟卒亦還營至春復集名曰放凍卒得番休逃亡者少汴船不涉江路無風波沉溺之患後發運使權益重六路上供米團綱發船不復委本路獨專其任文移坌併事目繁夥不能檢察操舟者賕諸吏得詣富饒郡市賤貿貴以趨京師自是江汴之舟混轉無辨挽舟卒有終身不還其家老死河路者籍多空名漕事大弊皇祐中發運使許元奏近歲諸路因循糧綱法壞遂令汴綱至冬出江為他路轉漕兵不得息宜敕諸路增船載米輸轉般倉充歲計如故事於是牟利者多以元說為然詔如元奏久之諸路綱不集嘉祐三年下詔切責有司以格詔不行及發運使不能總綱條轉運使不能斡歲入預敕江湖兩浙轉運司期以朞年各造船補卒團本路綱自嘉祐五年汴船不得復出江至期諸路船猶不足汴船既不至江外江外船不得至京師失商販之利而汴船工卒訖冬坐食恆苦不足皆盜毀船材易錢自給船愈壞而漕額愈不及矣論者初欲漕卒得歸息而近歲汴船多傭丁夫每船卒不過一二人至冬當留守船實無得歸息者時元罷已久後至者數奏請出汴船執政不許治平三年始詔出汴船七十綱未幾皆出江復故治平二年漕粟至京師汴河五百七十五萬五千石惠民河二十六萬七千石廣濟河七十四萬石又漕金帛緡錢入左藏內藏庫者總其數一千一百七十三萬而諸路轉移相給者不預焉繇京西陝西河東運薪炭至京師薪以斤計一千七百一十三萬炭以稱計一百萬是歲諸路創漕船二千五百四十艘治平四年京師粳米支五歲餘是時漕運吏卒上下共為侵盜貿易甚則託風水沉沒以滅迹官物陷折歲不減二十萬斛熙寧二年薛向為江淮等路發運使始募客舟與官舟分運互相檢察舊弊乃去歲漕常數既足募商舟運至京師者又二十六萬餘石而未已請充明年歲計之數三司使吳充言宜自明年減江淮漕米二百萬石令發運司易輕貨二百萬緡計五年所得無慮緡錢千萬轉儲三路平糴備邊王安石謂驟變米二百萬石米必陡賤驟致輕貨二百萬貫貨必陡貴當令發運司度米貴州郡折錢變為輕貨儲之河東陝西要便州軍用常平法糶糴為便詔如安石議七年京東路察訪鄧潤甫等言山東沿海州郡地廣豐歲則穀賤募人為海運山東之粟可轉之河朔以助軍食詔京東河北路轉運司相度卒不果行是歲江淮上供穀至京師者三分不及一令督發運使張頡亟辦來歲漕計宣徽南院使張方平言今之京師古所謂陳留天下四衝八達之地利漕運而贍師旅國初浚河渠三道以通漕運立上供年額汴河六百萬石廣濟河六十二萬石惠民河六十萬石廣濟河所運止給太康咸平尉氏等縣軍糧唯汴河運米麥乃太倉蓄積之實近罷廣濟河而惠民河斛斗不入太倉大衆所賴者汴河議者屢作改更必致汴河日失其舊十二月詔濬廣濟河增置漕舟其後河成歲漕京東穀六十萬石東南諸路上供雜物舊陸運者增舟水運押汴河江南荊湖綱運七分差三班使臣三分軍大將殿侍又令真楚泗州各造淺底舟百艘分為十綱入汴元豐五年罷廣濟河輦運司及京北排岸司移上供物於淮陽計置入汴以清河輦運司為名御史言廣濟安流而上與清河泝流入汴遠近險易不同詔轉運提點刑獄比較利害以聞江淮等路發運副使蔣之奇都水監丞陳祐甫開龜山運河漕運往來免風濤百年沉溺之患詔各遷兩官餘官減年循資有差八年罷歲運百萬石赴西京先是導洛入汴運東南粟實洛下至是戶部奏罷之是年立汴河糧綱賞罰歲終檢察紹聖二年置汴綱通作二百綱在部進納官銓試不中者注押上供糧斛不用衙前土人軍將未幾復募土人押諸路綱如故政和七年立東南六路州軍知州通判裝發上供糧斛任滿賞格自一萬石至四十萬石升名次減年有差張根為江南西路轉運副使歲漕米百二十萬石給中都江南州郡僻遠官吏艱於督趣根常存三十萬石為轉運之本以寬諸郡時甚稱之宣和二年詔六路米麥綱運依法募官先募未到部小使臣及非泛補授校尉以上未許參部人并進納人管押淮南以五運兩浙及江東二千里內以四運江東二千里外及江西三運湖南北二運各缺不及五釐依格推賞外仍許在外指射合入差遣一次召募土人並罷七年詔結絶應奉司江淮諸局所及罷花石綱令逐路漕臣速拘舟船裝發綱運備邊靖康初汴河決口有至百步者塞之工久未訖乾涸月餘綱運不通南京及京師皆乏糧責都水使者陳求道等命提舉京師所陳良弼同措置越兩旬水復舊綱運沓至兩京糧乃足河北河東陝西三路租稅薄不足以供兵費屯田營田歲入無幾糴買入中之外歲出內藏庫金帛及上京榷貨務緡錢皆不翅數百萬選使臣軍大將河北船運至乾寧軍河東陝西船運至河陽措置陸運或用鋪兵廂軍或發義勇保甲或差雇夫力車載馱行隨道路所宜河北地里差近西路回遠又涉磧險運致甚艱熙寧六年詔鄜延路經略司支封樁錢於河東買橐駝三百運沿邊糧草元豐四年河東轉運司調夫萬一千人隨軍坊郭上戶有差夫四百人者其次一二百人願出驢者三驢當五夫五驢別差一夫驅喝一夫雇直約三十千以上一驢約八千加之期會迫趣民力不能勝軍須調發煩擾又多不急之務如絳州運棗千石往麟府每石止直四百而雇直乃約費三十緡涇原路轉運判官張大寧言餽運之策莫若車便自熙寧寨至磨示里口皆大川通車無礙自磨示里至兜嶺下道路亦然嶺以北即山險少水車乘難行可就嶺南相地利建一城寨使大車自鎮戎軍載糧草至彼隨軍馬所在以軍前夫畜往來短運更於中路量度遠近以遣回空夫築立小堡應接如此則省民力之半神宗嘉之京西轉運司調均鄧州夫三萬每五百人差一官部押赴鄜延饋運其本路程塗日支錢米外轉運司計自入陝西界至延州程數日支米錢三十柴菜錢十文並先併給陝西都轉運司於諸州差雇車乘人夫所過州交替人日支米二升錢五十至沿邊止運糧出界止差廂軍六年詔熙河蘭會經略制置司計置蘭州人萬馬二千糧草於次路州軍剗刮官私橐駝二千與經制司自熙河摺運事力不足發義勇保甲給河東陝西邊用非機速者並作小綱數排日遞送大觀二年京畿都轉運使吳擇仁言西輔軍糧發運司歲撥八萬石貼助於滎澤下卸至州尚四五十里擺置車三鋪每鋪七十人月可運八千四百石所運漸多據數增添鋪兵靖康元年十月詔曰一方用師數路調發軍功未成民力先困京西運糧每名六斗用錢四十貫陝西運糧民間倍費百餘萬緡聞之駭異今歲四方豐稔粒米狼戾但可逐處增價收糴不得輕議般運以稱恤民之意若般綱水運及諸州支移之類仍舊三路陸運以給兵費大略如此其他州縣運送或軍興調發以給一時之用此皆不著轉般自熙寧以來其法始變歲運六百萬石給京師外諸倉常有餘蓄州郡告歉則折收上價謂之額斛計本州歲額以倉儲代輸京師謂之代發復於豐熟以中價收糴穀賤則官糴不至傷農饑歉則納錢民以為便本錢歲增兵食有餘崇寧初蔡京為相始求羡財以供侈費用所親胡師文為發運使以糴本數百萬緡充貢入為戶部侍郎來者效尤時有進獻而本錢竭矣本錢既竭不能增糴而儲積空矣儲積既空無可代發而轉般之法壞矣崇寧三年戶部尚書曾孝廣言往年南自真州江岸北至楚州淮堤以堰瀦水不通重船般剝勞費遂於堰旁置轉般倉受逐州所輸更用運河船載之入汴以達京師雖免推舟過堰之勞然侵盜之弊由此而起天聖中發運使方仲荀奏請度真楚州堰為水閘自是東南金帛茶布之類直至京師惟六路上供斛斗猶循用轉般法吏卒糜費與在路折閲動以萬數欲將六路上供斛斗並依東南雜運直至京師或南京府界卸納庶免侵盜乞貸之弊自是六路郡縣各認歲額雖湖南北至遠處亦直抵京師號直達綱豐不加糴歉不代發方綱米之來立法峻甚船有損壞所至修整不得踰時州縣欲其速過但令供狀以錢給之沿流鄉保悉致騷擾公私橫費百出又鹽法已壞回舟無所得舟人逃散船亦隨壞本法盡廢大觀三年詔直達綱自來年並依舊法復行轉般令發運司督修倉敖荊湖北路提舉常平王璹措置諸路運糧舟船政和二年復行直達綱毀拆轉般諸倉談稹上言祖宗建立真楚泗州轉般倉一以備中都緩急二以防漕渠阻節三則綱船裝發資次運行更無虛日自其法廢河道日益淺澀遂致中都糧儲不繼淮南三轉般倉不可不復乞自泗州為始次及真楚既有瓦木順流而下不甚勞費俟歲豐計置儲蓄立法轉般淮南路轉運判官向子諲奏轉般之法寓平糴之意江湖有米可糴於真兩浙有米可糴於揚宿亳有麥可糴於泗坐視六路豐歉有不登處則以錢折斛發運司得以斡旋之不獨無歲額不足之憂因可以寬民力運渠旱乾則有汴口倉今所患者向來糴本歲五百萬緡支移殆盡宣和五年乃降度牒及香鹽鈔各一百萬貫令呂淙盧宗原均糴斛斗專備轉般江西轉運判官蕭序辰言轉般道里不加遠而人力不勞卸納年豐可以廣糴厚積以待中都之用自行直達道里既遠情弊尤多如大江東西荊湖南北有終歲不能行一運者有押米萬石缺七八千石有拋失舟船兵梢逃散十不存一二者折缺之弊生於稽留而沿路官司多端阻節至有一路漕司不自置舟船截留他路回綱尤為不便詔發運司措置六年以無額上供錢物并六路舊缺發斛斗錢貯為糴本別降三百萬貫付盧宗原將湖南所起年額並隨正額預起拋缺斛斗於轉般倉下卸卻將已卸均糴斗斛轉運上京所有直達候轉般斛斗有次第日罷之靖康元年令東南六路上供額斛除淮南兩浙依舊直達外江湖四路並措置轉般高宗建炎元年詔諸路綱米以三分之一輸送行在餘輸京師二年詔二廣湖南北江東西綱運輸送江寧府福建兩浙路輸送平江府京畿淮南京東西河北陝西及川綱輸送行在又詔二廣湖南北綱運如過兩浙許輸送平江府福建綱運過江東西亦許輸送江寧府三年又詔諸路綱運見錢並糧輸送建康府戶部其金銀絹帛並輸送行在紹興初因地之宜以兩浙之粟供行在以江東之粟餉淮東以江西之粟餉淮西荊湖之粟餉鄂嶽荊南量所用之數責漕臣將輸而歸其餘於行在錢帛亦然雇舟差夫不勝其弊民間有自毀其舟自廢其田者紹興四年川陝宣撫吳玠調兩川夫運米一十五萬斛至利州率四十餘千致一斛饑病相仍道死者衆蜀人病之漕臣趙開聽民以粟輸內郡募舟挽之人以為便總領所遣官就糴於沿流諸郡復就興利閬州置場聽商人入中然猶慮民之勞且憊也又減成都水運對糴米紹興十六年三十年科撥諸路上供米鄂兵歲用米四十五萬餘石於全永郴邵道衡潭鄂鼎科撥荊南兵歲用米九萬六千石於德安荊南澧純潭復荊門漢陽科撥池州兵歲用米十四萬四千石於吉信南安科撥建康兵歲用米五十五萬石於洪江池宣太平臨江興國南康廣德科撥行在合用米一百十二萬石就用兩浙米外於建康太平宣科撥其宣州見屯殿前司牧馬歲用米并折輸馬料三萬石於本州科撥並諸路轉運司樁發時內外諸軍歲費米三百萬斛而四川不預焉嘉定兵興揚楚間轉輸不絶濠廬安豐舟楫之通亦便矣而浮光之屯仰饋於齊安舒蘄之民遠者千里近者亦數百里至於京西之儲襄郢猶可徑達獨棗陽陸運夫皆調於湖北鼎澧等處道路遼邈夫運不過八斗而資糧屝屨與夫所在邀求費常十倍中産之家雇替一夫為錢四五十千單弱之人一夫受役則一家離散至有斃於道路者至於部送綱運並差見任官闕則選募得替待闕及寄居官有材幹者其責繁難人以為憚故自紹興以來優立賞格其有缺者亦多方而憫之乾道初蠲缺五十石以下者三年蠲缺百石以下者九年初綱運缺及一分者送有司究弊至是臣僚申明綱運缺及一分者亦許其補足淳熙元年詔不以所缺多寡並與除放其有因綱缺追降官資者如本非侵盜且補輸已足許復自是綱運缺失雖責償於官吏然以其山川隃遠非一人所能究亦時寓於蠲放焉
