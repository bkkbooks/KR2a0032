body:
  text: 宋史卷一百六十一志第一百一十四職官一三師三公宰執門下省中書省尚書省昔武王克商史臣紀其成功有曰列爵惟五分土惟三建官惟賢位事惟能後世曰爵曰官曰職分而任之其原蓋始乎此然周初之制已不可考周公作六典自天官冢宰而下小大高下各帥其屬以任其事未聞建官而不任以事位事而不命以官者至於列爵分土此封建諸侯之制也亦未聞以爵以土如後世虛稱以備恩數者也秦漢及魏晉南北朝官制沿革不常不可殫舉後周復周禮六典官稱而參用秦漢隋文帝廢周禮之制惟用近代之法唐承隋制至天授中始有試官之格又有員外之置尋為檢校試攝判知之名其初立法之意未嘗不善蓋欲以名器事功甄別能否又使不肖者絶年勞序遷之覬覦而世戚勳舊之家寵之以祿而不責以猷為其居位任事者不限資格使得自竭其所長以為治效且黜陟進退之際權歸於上而有司若不得預殊不知名實混殽品秩貿亂之弊亦起於是矣宋承唐制抑又甚焉三師三公不常置宰相不專任三省長官尚書門下並列于外又別置中書禁中是為政事堂與樞密對掌大政天下財賦內庭諸司中外管庫悉隸三司中書省但掌冊文覆奏考帳門下省主乘輿八寶朝會板位流外考較諸司附奏挾名而已臺省寺監官無定員無專職悉皆出入分涖庶務故三省六曹二十四司類以他官主判雖有正官非別敕不治本司事事之所寄十亡二三故中書令侍中尚書令不預朝政侍郎給事不領省職諫議無言責起居不記注中書常闕舍人門下罕除常侍司諫正言非特旨供職亦不任諫諍至於僕射尚書丞郎員外居其官不知其職者十常八九其官人受授之別則有官有職有差遣官以寓祿秩位著職以待文學之選而別為差遣以治內外之事其次又有階有勳有爵故仕人以登臺閣升禁從為顯宦而不以官之遲速為榮滯以差遣要劇為貴途而不以階勳爵邑有無為輕重時人語曰寧登瀛不為卿寧抱槧不為監虛名不足以砥礪天下若此外官則懲五代藩鎮專恣頗用文臣知州復設通判以二之階官未行之先州縣守令多帶中朝職事官外補階官既行之後或帶或否視是為優劣大凡一品以下謂之文武官未常參者謂之京官樞密宣徽三司使副學士諸司而下謂之內職殿前都校以下謂之軍職外官則有親民釐務二等而監軍巡警亦比親民此其概也故自真宗仁宗以來議者多以正名為請咸平中楊億首言文昌會府有名無實宜復其舊既而言者相繼乞復二十四司之制至和中吳育亦言尚書省天下之大有司而廢為間所當漸復之然朝論異同未遑釐正神宗即位慨然欲更其制熙寧末始命館閣校唐六典元豐三年以摹本賜羣臣乃置局中書命翰林學士張璪等詳定八月下詔肇新官制省臺寺監領空名者一切罷去而易之以階九月詳定所上寄祿格會明堂禮成近臣遷秩即用新制而省臺寺監之官各還所職矣五年省臺寺監法成六年尚書新省成帝親臨幸召六曹長二以下詢以職事因誡敕焉初新階尚少而轉行者易以混雜及元祐初於朝議大夫六階以上始分左右既又以流品無別乃詔寄祿官悉分左右詞人為左餘人為右紹聖中罷之崇寧初以議者有請自承直至將仕郎凡換選人七階大觀初又增宣奉至奉直大夫四階政和末自從政至迪功郎又改選人三階於是文階始備而武階亦詔易以新名正使為大夫副使為郎而橫班十二階使副亦然故有郎居大夫之上者繼以新名未具增置宣正履正大夫郎凡十階通為橫班而文武官制益加詳矣大抵自元祐以後漸更元豐之制二府不分班奏事樞密加置簽書戶部則不令右曹專典常平而總於其長起居郎舍人則通記起居而不分言動館職則增置校勘黃本凡此皆與元豐稍異也其後蔡京當國率意自用然動以繼志為言首更開封守臣為尹牧由是府分六曹縣分六案又內侍省職悉倣機廷之號已而修六尚局建三衛郎又更兩省之長為左輔右弼易端揆之稱為太宰少宰是時員既濫冗名且紊雜甚者走馬承受升擁使華黃冠道流亦濫朝品元豐之制至此大壞及宣和末王黼用事方且追咎元祐紛更乃請設局以修官制格目為正名亦何補矣建炎中興參酌潤色因呂頤浩之請左右僕射並同中書門下平章事兩省侍郎改為參知政事三省之政合乎一乾道八年又改左右僕射為左右丞相刪去三省長官虛稱道揆之名遂定然維時多艱政尚權宜御營置使國用置使修政局置提舉軍馬置都督並以宰相兼之總制司理財同都督督視理兵並以執政兼之因事創名殊非經久惟樞密本兵與中書對掌機務號東西二府命宰相兼知院事建炎四年實用慶曆故典其後兵興則兼樞密使兵罷則免至開禧初始以宰臣兼樞密為永制當多事時諸部或長二不並置或並郎曹使相兼之惟吏部戶部不省不並兵休稍稍增置其後詔非曾任監司守臣不除郎官著為令又增館閣員廣環衛官然紹興務行元祐故事以左右二字分別流品其後以人言省去寧清濁相涵無絶人遷善之路橫班以郎居大夫之上既釐而正之矣而介胄之士與縉紳同稱寧名號未正毋示人以好武之機陳傅良欲定史官遷次之序衆論韙之而未及行洪邁欲改三衙軍官稱謂當時嘉之卒未暇講考古之制量今之宜蓋自元祐以逮政和已未嘗拘乎元豐之舊中興若稽成憲二者並行而不悖故凡大而分政任事之臣微而管庫監局之官沿襲不革者皆先後所同便也或始創而終罷或欲革而猶因則有各當其可者焉類而書之先後互見作職官志以至廩給傔從雖微必録並從舊述云三師三公宋承唐制以太師太傅太保為三師太尉司徒司空為三公為宰相親王使相加官其特拜者不預政事皆赴上於尚書省凡除授則自司徒遷太保自太傅遷太尉檢校官亦如之太尉舊在三師下由唐至宋加重遂以太尉居太傅之上若宰臣官至僕射致仕者以在位久近或已任司空司徒則拜太尉太傅等官若太師則為異數自趙普以開國元勳文彥博以纍朝耆德方特拜焉雖太傅王旦司徒呂夷簡各任宰相二十年止以太尉致仕熙寧二年富弼除守司空兼侍中平章事辭司空侍中三年曾公亮除守司空檢校太師兼侍中以兩朝定策之功辭相位也六年文彥博除守司徒兼侍中九年彥博除守太保兼侍中辭太保元豐三年以曹佾檢校太師守司徒兼中書令九月詔檢校官除三公三師外並罷又以文彥博落兼侍中除守太尉富弼守司徒皆録定策之功也六年彥博守太師致仕八年王安石守司空曹佾守太保元祐元年文彥博落致仕太師平章軍國重事呂公著守司空同平章軍國重事崇寧三年蔡京授司空行尚書左僕射大觀元年京為太尉二年為太師政和二年京落致仕依前太師三日一至都堂治事九月詔以太師太傅太保古三公之官今為三師古無此稱合依三代為三公為真相之任司徒司空周六卿之官太尉秦主兵之任皆非三公並宜罷之仍考周制立三孤少師少傅少保亦稱三少為三次相之任至是京始以三公任真相三公自國初以來未嘗備官獨宣和末三公至十八人三少不計也太師三人蔡京童貫鄭紳太傅四人王黼燕王俁越王偲鄆王楷太保十一人蔡攸肅王樞至儀王㮙渡江後秦檜為太師張俊韓世忠為太傅劉光世為太保乾道初楊沂中吳璘並為太傅紹熙初史浩為太師嗣秀王為太保自紹熙後三公未嘗備官其後韓托胄史彌遠賈似道專政皆至太師焉宰相之職佐天子總百官平庶政事無不統宋承唐制以同平章事為真相之任無常員有二人則分日知印以丞郎以上至三師為之其上相為昭文館大學士監修國史其次為集賢殿大學士或置三相則昭文集賢二學士併監修國史各除唐以來三大館皆宰臣兼故仍其制國初范質昭文學士王溥監修國史魏仁浦集賢學士此為三相例也神宗新官制於三省置侍中中書令尚書令以官高不除人而以尚書令之二左右僕射為宰相左僕射兼門下侍郎以行侍中之職右僕射兼中書侍郎以行中書令之職政和中改左右僕射為太宰少宰仍兼兩省侍郎靖康中復改為左右僕射建炎三年呂頤浩請參酌三省之制左右僕射並加同中書門下平章事門下中書二侍郎並改為參知政事廢尚書左右丞從之乾道八年詔尚書左右僕射可依漢制改為左右丞相詳定敕令所言近承詔旨改左右僕射為左右丞相令刪去侍中中書尚書令以左右丞相充緣舊左右僕射非三省長官故為從一品今左右丞相係充侍中中書尚書令之位即合為正一品從之丞相官以太中大夫以上充平章軍國重事元祐中置以文彥博太師呂公著守司空相繼為之序宰臣上所以處老臣碩德特命以寵之也故或稱平章軍國重事或稱同平章軍國事五日或兩日一朝非朝日不至都堂其後蔡京王黼以太師總三省事三日一朝赴都堂治事開禧元年韓托胄拜平章討論典禮乃以平章軍國事為名蓋省重字則所預者廣去同字則所任者專邊事起乃命一日一朝省印亦歸其第宰相不復知印其後賈似道專權竊位日久尊寵日隆位皆在丞相上使相親王樞密使留守節度使兼侍中中書令同平章事者皆謂之使相不預政事不書敕惟宣敕除授者敕尾存其銜而已乾德二年范質等三相皆罷以趙普同平章事李崇矩樞密使命下無宰相書敕使問翰林陶穀穀謂自昔輔相未嘗虛位惟唐太和中甘露事數日無宰相時左僕射令狐楚等奉行制書今尚書亦南省長官可以書敕竇儀曰穀之所陳非承平令典今皇弟開封尹同平章事即宰相之任也可書敕從之參知政事掌副宰相毗大政參庶務乾德二年置以樞密直學士薛居正兵部侍郎呂餘慶並本官參知政事先是已命趙普為相欲置之副而難其名稱以問翰林學士陶穀曰下宰相一等有何官對曰唐有參知機務參知政事故以命之仍令不押班不知印不升政事堂殿廷別設磚位敕尾著銜降宰相月奉雜給半之未欲與普齊也開寶六年始詔居正餘慶於都堂與宰相同議政事至道元年詔宰相與參政輪班知印同升政事堂押敕齊銜行則並馬自寇準始以後不易元豐新官制廢參知政事置門下中書二侍郎尚書左右丞以代其任建炎三年復以門下中書侍郎為參知政事而省左右丞乾道八年改左右僕射為左右丞相其參知政事如故以中大夫以上充常除二員或一員嘉泰三年始除三員故事丞相謁告參預不得進擬惟丞相未除則輪日當筆然多不踰年少僅旬月淳熙初葉衡罷相龔茂良行相事近三年亦創見也門下省受天下之成事審命令駮正違失受發通進奏狀進請寶印凡中書省畫黃録黃樞密院録白畫旨則留為底及尚書省六部所上有法式事皆奏覆審駮之給事中讀侍郎省侍中審進入被旨畫聞則授之尚書省樞密院即有舛誤應舉駮者大則論列小則改正凡文書自內降者著之籍章奏至則受而通進俟頒降分送所隸官司凡吏部擬六品以下職事官則給事中校其仕歷功狀侍郎侍中引驗審察非其人則論奏凡遷改爵秩加勳封四選擬注奏鈔之事有舛誤退送尚書省覆刑部大理寺所斷獄審其輕重枉直不當罪則以法駮正之國初循舊制以中書門下平章事為宰相之職復用兩制官一員判門下省事官制行始釐正焉凡官十有一侍中侍郎左散騎常侍各一人給事中四人左諫議大夫起居郎左司諫左正言各一人先是中書人吏分掌五房曰孔目房吏房戶房兵禮房刑房又有主事勾銷二房至是釐中書為三省分兵與禮為六房各因其省之事而增益之門下凡分房十曰吏房曰戶房曰禮房曰兵房曰刑房曰工房皆視其房之名而主行尚書省六曹二十四司所上之事曰開拆房曰章奏房曰制敕庫房亦皆視其名而受遣文書表狀與供閲敕令格式擬官爵封勳之類惟班簿本省雜務則歸吏房吏四十有九録事主事各三人令史六人書令史十有八人守當官十有九人而外省吏十有九人令史一人書令史二人守當官六人守闕守當官十人元豐八年以門下中書外省為後省門下外省復置催驅房元祐三年詔吏部注通判赴門下引驗應省臺寺監諸司人吏四分減一復置點檢房四年又別立吏額紹聖三年守闕守當官門下中書省各以百人尚書省百五十人為額四年三省吏員並依元豐七年額侍中掌佐天子議大政審中外出納之事大祭祀則版奏中嚴外辦導輿輅詔升降之節皇帝齊則請就齊室大朝會則承旨宣制告成禮祭祀亦如之冊后則奉寶以授司徒國朝以秩高罕除自建隆至熙寧真拜侍中才五人雖有用他官兼領而實不任其事官制行以左僕射兼門下侍郎行侍中職別置侍郎以佐之南渡後置左右丞相省侍中不置侍郎掌二侍中之職省中外出納之事大祭祀則前導輿輅詔進止大朝賀則授表以奏祥瑞冊后則奉節及寶位與知樞密院同知樞密院中書侍郎尚書左右丞為執政官南渡後復置參知政事省門下侍郎不置左散騎常侍左諫議大夫左司諫左正言同掌規諫諷諭凡朝政闕失大臣至百官任非其人三省至百司事有違失皆得諫正國初雖置諫院知院官凡六人以司諫正言充職而他官領者謂之知諫院正言司諫亦有領他職而不預諫諍者官制行始皆正名元豐八年諫議大夫孫覺言據官制格目諫官之職凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則以事狀論薦乞依此以修舉職事八月門下省言諫議大夫司諫正言合通為一詔並從之十月詔倣六典置諫官員元祐元年二月詔諫官雖不同省許二人同上殿後又從司諫虞策之請如獨員許與臺官同對九月左右正言久闕侍御史王巖叟言國家倣近古之制諫官六員方之先王已自為少望詔補足無令久空職十月司諫王覿言自今中書舍人闕勿以諫官兼權從之十一月巖叟又言近降聖旨兩省諫官各令出入異戶勿與給事中中書舍人通實欲限隔諫官不使在政事之地恐知本末數論列爾尋詔諫官直舍仍舊八年詔執政親戚不除諫官建中靖國元年言者謂諫官論事惟憑詢訪而百司之事六曹所報外皆不得其詳遂詔諫官案許關臺察給事中四人分治六房掌讀中外出納及判後省之事若政令有失當除授非其人則論奏而駮正之凡章奏日録目以進考其稽違而糾治之故事詔旨皆付銀臺司封駮官制行給事中始正其職而封駮司歸門下元豐五年五月詔給事中許書畫黃不書草著為令六月給事中陸佃言三省密院文字已讀者尚令封駮慮失之重復詔罷封駮房六年詔駮正事赴執政稟議七年有旨舉駮事依中書舍人封還詞頭例既而令稟議如初給事中韓忠彥言給舍職位頗均一則不稟白而聽封還一則許舉駮而先稟議於理未允且朝廷之事執政所行職當封駮則已與執政異自當求決於上尚何稟議之有詔從之紹聖四年葉祖洽言兩省置給舍使之互察今中書舍人兼權封駮則給事中之職遂廢詔特旨書讀不回避餘互書判元符三年翰林學士曾肇言門下之職所以駮正中書違失近日給事封駮中書録黃乃令舍人書讀行下隳壞官制有損治體願正紀綱為天下後世法重和元年給事中張叔夜言凡命令之出中書宣奉門下審讀然後付尚書頒行而密院被旨者亦録付門下此神宗官制也今急速文字不經三省而諸房以空黃先次書讀則審讀殆成虛設矣乞立法禁從之凡分案五曰上案主寶禮及朝會所行事曰下案主受發文書曰封駮案主封駮及試吏校其功過曰諫官案主關報文書曰記注案主録起居注其雜務則所分案掌焉紹興以後止除二人或一人起居郎一人掌記天子言動御殿則侍立行幸則從大朝會則與起居舍人對立於殿下螭首之側凡朝廷命令赦宥禮樂法度損益因革賞罰勸懲羣臣進對文武臣除授及祭祀宴享臨幸引見之事四時氣候四方符瑞戶口增減州縣廢置皆書以授著作官國朝舊置起居院命三館校理以上修起居注熙寧四年詔諫官兼修注者因後殿侍立許奏事元豐二年兼修注王存乞復起居郎舍人之職使得盡聞明天子德音退而書之神宗亦謂人臣奏對有頗僻讒慝者若左右有史官書之則無所肆其奸矣然未果行故事左右史雖日侍立而欲奏事必稟中書俟旨存因對及之八月乃詔雖不兼諫職許直前奏事蓋存發之也官制行改修注為郎舍人六年詔左右史分記言動元祐元年仍詔不分七年詔邇英閣講讀罷有留身奏事者許侍立紹聖元年中丞黃履言所奏或干機密難令旁立仍依先朝故事先是御後殿則左右史分日侍立崇寧三年詔如前殿之儀更不分日大觀元年詔事有足以勸善懲惡者雖秩卑亦書之紹興二十八年用起居郎洪遵言起居郎舍人自今後許依講讀官奏事隆興元年用起居郎兼侍講胡銓言前殿依後殿輪左右史侍立符寶郎二人掌外廷符寶之事禁中別有內符寶郎官制行未嘗除大觀初八寶成詔依唐六典增置靖康罷之通進司隸給事中掌受三省樞密院六曹寺監百司奏牘文武近臣表疏及章奏房所領天下章奏案牘具事目進呈而頒布於中外進奏院隸給事中掌受詔敕及三省樞密院宣劄六曹寺監百司符牒頒于諸路凡章奏至則具事目上門下省若案牘及申稟文書則分納諸官司凡奏牘違戾法式者貼說以進熙寧四年詔應朝廷擢用材能賞功罰罪事可懲勸者中書檢正樞密院檢詳官月以事狀録付院謄報天下元祐初罷之紹聖元年詔如熙寧舊條靖康元年二月詔諸道監司帥守文字應邊防機密急切事許進奏院直赴通進司投進舊制通進銀臺司知司官二人兩制以上充通進司掌受銀臺司所領天下章奏案牘及閣門在京百司奏牘文武近臣表疏以進御然後頒布于外銀臺司掌受天下奏狀案牘抄録其目進御發付勾檢糾其違失而督其淹緩發敕司掌受中書樞密院宣敕著籍以頒下之登聞檢院隸諫議大夫登聞鼓院隸司諫正言掌受文武官及士民章奏表疏凡言朝政得失公私利害軍期機密陳乞恩賞理雪寃濫及奇方異術改換文資改正過名無例通進者先經鼓院進狀或為所抑則詣檢院並置局于闕門之前中興後檢鼓糧審計官告進奏謂之六院例以京官知縣有政績者充亦有自郡守除者繼即除郎恩數略視職事官而不入雜壓紹興十一年胡汝明以料院除監察御史遂遷侍御史乾道後相繼入臺者數人六院彌重為察官之儲淳熙初班寺監丞之上紹熙二年詔六院官復入雜壓在九寺簿之下六院各隨所隸中書省掌進擬庶務宣奉命令行臺諫章疏羣臣奏請興創改革及中外無法式事應取旨事凡除省臺寺監長二以下及侍從職事官外任監司節鎮知州軍通判武臣遙郡橫行以上除授皆掌之凡命令之體有七曰冊書立后妃封親王皇子大長公主拜三師三公三省長官則用之曰制書處分軍國大事頒赦宥德音命尚書左右僕射開府儀同三司節度使凡告廷除授則用之曰誥命應文武官遷改職秩內外命婦除授及封贈典應合命詞則用之曰詔書賜待制大卿監中大夫觀察使以上則用之曰敕書賜少卿監中散大夫防禦使以下則用之曰御札布告登封郊祀宗祀及大號令則用之曰敕榜賜酺及戒勵百官曉諭軍民則用之皆承制畫旨以授門下省令宣之侍郎奉之舍人行之留其所得旨為底大事奏稟得旨者為畫黃小事擬進得旨者為録黃凡事干因革損益而非法式所載者論定而上之諸司傳宣特旨承報審覆然後行下設官十有一令侍郎右散騎常侍各一人舍人四人右諫議大夫起居舍人右司諫右正言各一人分房八曰吏房曰戶房曰兵禮房曰刑房曰工房曰主事房曰班簿房曰制敕庫房元祐以後析兵禮為二增催驅點檢分房十有一後又改主事房為開拆凡吏房掌行除授考察升黜賞罰廢置薦舉假故一時差官文書曰戶房掌行廢置升降郡縣調發邊防軍須給貸錢物曰禮房掌行郊祀陵廟典禮后妃皇子公主大臣封冊科舉考官外夷書詔曰兵房掌行除授諸蕃國王爵官封曰刑房掌行赦宥及貶降復曰工房掌行營造計度及河防修閉凡尚書省所上奏請臺諫所陳章疏內外臣僚官司申請無法式應取旨者六房各視其名而行之曰主事房掌行受發文書曰班簿房掌百官名籍具員曰制敕庫房掌編録供檢敕令格式及架閣庫曰催驅房督趣稽違曰點檢房省察差失吏四十有五録事三人主事四人令史七人書令史十有四人守當官十有七人而外省吏十有九人令史一人書令史二人守當官六人守闕守當官十人元豐八年詔待制以上磨勘本省進擬元祐三年詔應除授從中批付中書省者並三省行紹聖五年詔臣僚上殿劄子中書省進呈取旨其承受傳宣內降非有司所可行者申中書省或樞密院奏審令掌佐天子議大政授所行命令而宣之祀大神祇則升壇享宗廟則升阼階而相其禮臨軒冊命則讀冊建儲則升殿宣制持冊及璽綬以授太子大朝會則詣御坐前奏方鎮表及祥瑞國朝未嘗真拜以他官兼領者不預政事然止曹佾一人餘皆贈官官制行以右僕射兼中書侍郎行令之職別置侍郎以佐之中興後置左右丞相省令不置侍郎掌二令之職參議大政授所宣詔旨而奉之凡大朝會則押表及祥瑞案臨軒冊命則押冊引案以所奏文及冊書授令四夷來朝則奏其表疏以贄幣付有司南渡後復置參知政事省中書侍郎不置舍人四人舊六人掌行命令為制詞分治六房隨房當制事有失當及除授非其人則論奏封還詞頭國初為所遷官實不任職復置知制誥及直舍人院主行詞命與學士對掌內外制凡有除拜中書吏赴院納詞頭其大除拜亦有宰相召舍人面授詞頭者若大誥命中書並敕進入從中而下餘則發敕官受而出之及修官制遂以實正名而判後省之事分案五曰上案掌冊禮及朝會所行事曰下案掌受付文書曰制誥案掌書録制詞及試吏校其功過曰諫官案掌受諸司關報文書曰記注案掌録記注其雜務則隨所分案掌之元豐六年詔中書省置點檢房令舍人通領元祐元年詔舍人各簽諸房文字其命詞則輪日分草九月詔時暫闕官依門下尚書省例送本省官兼權紹聖四年蹇序辰請自今命詞以元行遣文書同檢送當制舍人從之建炎後同他官兼攝者則稱權舍人資淺者為直舍人院起居舍人一人掌同門下省起居郎侍立修注官元豐前以起居郎舍人寄祿而更命他官領其事謂之同修起居注官制行以郎舍人為職任淳熙十五年羅點自戶部員外郎為起居舍人避其祖諱乃以為太常少卿兼侍立修注官其後兩史或闕而用資淺者則降旨以某人權侍立修注官右散騎常侍右諫議大夫右司諫右正言與門下省同但左屬門下右屬中書皆附兩省班籍通謂之兩省官元豐既新官制職事官未有不經除授者惟御史大夫左右散騎常侍始終未嘗一除人蓋兩官為臺諫之長無有啓之者中興初詔諫院不隸兩省紹興二年詔並依舊赴三省元置局處淳熙十五年用林栗言置左右補闕拾遺專任諫正不任糾劾之事踰年減罷法司令史書令史守當官各一人守闕守當官三人乾道六年減二人檢正官五房各一人掌糾正省務熙寧三年置以京朝官充選人即為習學公事官制行罷之而其職歸左右司建炎三年中書門下省言軍興以來天下多事中書別無屬官元豐以前有檢正官後因置左右司遂不差致朝廷及應報四方行移稽留無檢舉催促今欲差官兩員充中書門下省檢正諸房公事內一員檢正吏禮兵房一員檢正戶刑工房從之至次年詔並罷紹興二年詔中書門下省復置檢正官一員建炎三年指揮中書門下省並為一中書省録事主事令史書令史守當官共四十三人門下省録事主事令史書令史守當官共四十六人依祖額以八十九人為額守闕守當官兩省各一百人共存留一百五十人中書省六分門下省四分尚書省掌施行制命舉省內綱紀程式受付六曹文書聽內外辭訴奏御史失職考百官庶府之治否以詔廢置賞罰曰吏部曰戶部曰禮部曰兵部曰刑部曰工部皆隸焉凡天下之務六曹所不能與奪者總決之應取裁者隨所隸送中書省樞密院事有成法則六曹準式具鈔令僕射丞檢察簽書送門下省畫聞審察吏部注擬文武官及封爵承襲賜勳定賞之事朝廷有疑事則集百官議其可否凡更改申明敕令格式一司條法則議定以奏覆太常考功諡議亦如之季終具賞罰勸懲事付進奏院頒行于天下大祭祀則誓戒執事官設官九尚書令左右僕射左右丞左右司郎中員外郎各一人分房十曰吏房曰戶房曰禮房曰兵房曰刑房曰工房各視其名而行六曹諸司所上之事曰開拆房主受遣文書曰都知雜房主行進制敕目班簿具員考察都事以下功過遷補曰催驅房主考督文牘稽違曰制敕庫房主編檢敕令格式簡納架閣文書置吏六十有四都事三人主事六人令史十有四人書令史三十有五人守當官六人元豐四年詔尚書都省及六曹各輪郎官一員宿直五年詔得旨行下並用劄子紹聖元年詔在京官司所受傳宣內降隨事申尚書省或樞密院覆奏二月詔尚書都省彈奏六察御史糾不當者令掌佐天子議大政奉所出命令而行之其屬有六曹凡庶務皆會而決之凡官府之紀綱程式無不總焉大事三省通議則同執政官合班小事尚書省獨議則同僕射丞分班論奏若事由中書門下而有失當應奏者亦如之與三師三公侍中中書令俱以冊拜自建隆以來不除惟親王元佐元儼以使相兼領不與政事政和二年詔尚書令太宗皇帝曾任今宰相之官已多不須置然是時說者以謂為令者唐太宗也熙陵未嘗任此蓋時相蔡京不學之過宣和七年詔復置令亦虛設其名無有除者南渡後並省不置左僕射右僕射掌佐天子議大政二令之職與三省長官皆為宰相之任大祭祀則掌百官之誓戒視滌濯告潔贊玉幣爵玷之事自官制行不置侍中中書令以左僕射兼門下侍郎右僕射兼中書侍郎行侍中中書令職事政和中詔曰昔我神考訓迪厥官有司不能奉承仰惟前代以僕臣之賤充宰相之任可改左僕射為太宰右僕射為少宰靖康元年詔依元豐舊制復為左右僕射南渡後置左右丞相省僕射不置左丞右丞掌參議大政通治省事以二令僕射之職僕射輪日當筆遇假故則以丞權當筆知印大祭祀酌獻薦饌進熟則受爵酒以授僕射舊班六曹尚書下官制行升其秩為執政元豐五年五月詔左右僕射丞合治省事是月御史言左右丞蒲宗孟王安禮於都堂下馬違法犯分安禮爭論帝前神宗是之今左右丞於都堂上下馬自此始南渡後復置參知政事省左右丞不置左司郎中右司郎中左司員外郎右司員外郎各一人掌受付六曹之事而舉正文書之稽失分治省事左司治吏戶禮奏鈔班簿房右司治兵刑工案鈔房而開拆制敕御史元豐六年都司置御史房主行彈糾御史案察失職催驅封樁印房則通治之有稽滯則以期限舉催初於都司置吏設案而議者謂臺郎宰掾不當自為官司遂隨省房分治所領之事惟置手分書奏各四人主行校定省吏都事以下功過及遷補之事元豐七年都司御史房置簿以書御史六曹官糾察之多寡當否為殿最歲終取旨升黜紹聖元年詔都司以歲終點檢六曹稽違最多者具郎官姓名上省取旨二年詔御史臺察六曹稽緩違失者送左司籍記宣和二年左司員外郎王蕃奏都司以彌綸省闥為職事無不預今宰丞入省諸房文字填委次第呈覆自朝至于日中或昏暮僅絶其勢不𦖲一一檢閲細故而省吏徑稟宰丞請筆以草檢令承從官齎赴郎官廳落日押字謂宜遵守元豐及崇寧舊法諸房各具簽帖先都事自點檢次郎官押訖赴宰丞請筆行下於是詔曰先帝肇正三省詔給舍都司以贊省務今都司寖以曠官緣省吏強悍敢肆侵侮自今違法事其左右司官尚書具事舉劾建炎三年詔減左右司郎官兩員置中書門下省檢正諸房公事二員至次年檢正省罷其左右司郎官依舊四員紹興三十二年詔尚書省吏房兵房三省樞密院機速房尚書省刑房戶房工房三省樞密院看詳賞功房尚書省禮房令左右司郎官四員從上分房書擬隆興元年詔左右司郎官各差一員乾道六年詔榷貨務都茶場依建炎三年指揮委都司官提領措置乾道七年復添置右司郎官二人榷貨務都茶場都司提領提轄官一員京朝官充監場官二員京選通差掌鹺茗香礬鈔引之政令以通商賈佐國用舊制置務以通榷易建炎中興又置都茶場給賣茶引隨行在所榷貨務置場雖分兩司而提轄官監官並通銜管幹外置建康鎮江務場並冠以行在為名以都司提領不係戶部經費建康鎮江續分隸總領所開禧初以總領所侵用儲積錢令徑隸提領所乾道七年提領所置幹辦官一員右提轄官與雜買務雜賣場文思院左藏東西庫提轄並稱四轄外補則為州內遷則為寺監丞簿亦有徑為雜監司或入三館乾道間榷務王禋除市舶左藏王揖除坑冶鑄錢司淳熙間熊克自文思除校書郎紹熙以後往往更遷六院官或出為添倅有先後輕重之異焉左藏封樁庫都司提領監官一員監門官一員淳熙九年以都司提領初創非奉親與軍須不支後或撥入內庫或以供宮廷諸費亦以備振恤之用提舉修敕令自熙寧初編修三司令式命宰臣王安石提舉是後皆以宰執為之詳定官以侍從之通法令者充舊制二員宣和中增至七員靖康初減為三員刪定官無常員先是嘗別修一司敕命大觀三年詔六曹刪定官並入詳定一司敕令所為一局制置三司條例司掌經畫邦計議變舊法以通天下之利熙寧二年置以知樞密院陳升之參知政事王安石為之而蘇轍程皓等亦皆為屬官未幾升之相乃言條例者有司事爾非宰相之職宜罷之帝欲並歸中書安石請以樞密副使韓絳代升之焉三年判大名府韓琦言條例司雖大臣所領然止是定奪之所今不關中書而徑自行下則是中書之外又有一中書也五月罷歸中書三司會計司熙寧七年置於中書以宰相韓絳提舉先是絳言總天下財賦而無考較盈虛之法乃置是司既而事多濡滯八年絳坐此罷相局亦尋廢編修條例司熙寧初置八年罷經撫房專治邊事宣和四年宰臣王黼主伐燕之議置于三省不復以關樞密院六年罷提舉講議司崇寧元年七月詔如熙寧條例司故事都省置講議司以宰相蔡京提舉侍從為詳定官卿監為參詳官又置檢討官凡宗室冗官國用商旅鹽鐵賦調尹牧每一事各三人主之時又分武備一房別為樞密院講議司三年三月知樞密院事蔡卞奏罷三年四月結局宣和六年又於尚書省置講議司十二月命太師致仕蔡京兼領聽就私第裁處仍免簽書議禮局大觀元年詔於尚書省置以執政兼領詳議官二員以兩制充應凡禮制本末皆議定取旨政和三年五禮儀注成罷局禮制局討論古今宮室車服器用冠昏喪祭沿革制度政和二年置於編類御筆所有詳議同詳議官宣和二年詔與大晟府製造所協聲律官並罷
