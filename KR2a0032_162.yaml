body:
  text: 宋史卷一百六十二志第一百一十五職官二樞密院宣徽院三司使翰林學士院侍讀侍講崇政殿説書諸殿學士諸閣學士諸修撰直閣東宮官王府官樞密院掌軍國機務兵防邊備戎馬之政令出納密命以佐邦治凡侍衛諸班直內外禁兵招募閲試遷補屯戍賞罰之事皆掌之以升揀廢置揭帖兵籍有調發更戍則遣使給降兵符除授內侍省官及武選官將領路分都監緣邊都巡檢使以上大事則稟奏其付授者用宣小事則擬進其付授者用劄先具所得旨關門下省審覆面得旨者為録白批奏得畫者為畫旨並留為底惟以白紙録送皆候報施行其被御寶批旨者即送門下省繳覆應給誥者關中書省命詞即事干大計造作支移軍器及除都副承旨三衙管軍三路沿邊帥臣太僕寺官文臣換右職仍同三省取旨宋初循唐五代之制置樞密院與中書對持文武二柄號為二府院在中書之北印有東院西院之文共為一院但行東院印而職事條目頗多神宗初政乃省其務之細者歸之有司而增置審官西院專領閣門祗候以上至諸司使差遣官制行隨事分隸六曹專以本兵為職而國信民兵牧馬總領仍舊隸焉舊分四房曰兵曰吏曰戶曰禮至是釐正凡分房十其後又增支馬小吏二房凡房十有二曰北面房掌行河北河東路吏卒北界邊防國信事曰河西房掌行陝西路麟府豐嵐石隰州保德軍吏卒西界邊防蕃官曰支差房掌行調發軍湖北路邊防及京東京西江淮廣南東路吏卒遷補殿侍選親事官曰在京房掌行殿前步軍司事支移兵器川陝路邊防及畿內福建路吏卒軍頭皇城司衛兵曰教閲房掌行中外校習封椿闕額請給催督驛遞及湖南路邊防曰廣西房掌行招軍捕盜賞罰廣南西路邊防及兩浙路吏卒而禁軍轉員則各隨其房之所領兵額治之曰兵籍房掌行諸路將官差發禁兵選補衛軍文書曰民兵房掌行三路保甲弓箭手曰吏房掌行差將領武臣知州軍路分都監以上及差內侍官文書曰知雜房掌行雜務曰支馬房掌行內外馬政并坊院監牧吏卒牧馬租課曰小吏房掌行兩省內臣磨勘功過用大使臣已上歷任事狀及校尉以上改轉遷遣吏三十有八逐房副承旨三人主事五人守闕主事二人令史十三人書令史十五人元祐既創支馬小吏二房增令史為十四人書令史十九人創正名貼房十八人大觀增逐房副承旨為五人創守闕書令史三人增正名二十八人中書密院既稱二府每朝奏事與中書先後上殿慶曆中二邊用兵知制誥富弼建言邊事係國安危不當專委樞密仁宗以為然即詔中書同議諫官張方平亦言中書宜知兵事乃以宰相呂夷簡章得象並兼樞密使熙寧初滕甫言中書密院議邊事多不合趙明與西人戰中書賞功而密院降約束郭逵修堡柵密院方詰之而中書以下褒詔願大臣凡戰守除帥議同而後下神宗善之元祐四年知樞密院安燾以母憂去職樞密院官偶獨員諫議大夫梁燾司諫劉安世言國朝革五代之弊文武二柄未嘗專付一人乞依故事命大臣兼領靖康元年知樞密院事李綱言在祖宗之時樞密掌兵籍虎符三衙管諸軍率臣主兵柄各有分守所以維持軍政萬世不易之法自童貫以領樞密院事為宣撫使既主兵權又掌兵籍虎符今日不可不戒乞將團結到勤王正兵並付制置使行營司兵付三衙從之樞密使知院事同知院事樞密副使簽書院事同簽書院事樞密使知院事佐天子執兵政而同知副使簽書為之二凡邊防軍旅之常務與三省分班稟奏事干國體則宰相執政官合奏大祭祀則迭為獻官國初官無定制有使則置副有知院則置同知院資淺則用直學士簽書院事熙寧元年文彥博呂公弼為使韓維邵亢為副使時陳升之三至樞府神宗欲稍異其禮乃以為知院事於是知院與使副並置元豐五年將改官制議者欲廢密院歸兵部帝曰祖宗不以兵柄歸有司故專命官以統之互相維制何可廢也於是得不廢帝又以樞密聯職輔弼非出使之官乃定置知院同知院二人使副悉罷元祐初復置簽書院事仍以樞密直學士充同簽書樞密院事治平末以殿前都虞候郭逵為之又以逵判渭州帝初即位中丞王陶御史呂景等皆言之逵歸改除宣徽南院使知鄆州自是不復置政和六年以內侍童貫權簽書樞密院河西北面房事七年貫宣撫陝西河東北三路帶同簽書樞密院既而詔元豐官制即無同簽書樞密院事改為權領樞密院然簽書院事元豐亦未嘗置宣和元年詔童貫領樞密院事後復以鄭居中為之建炎初置御營司以宰相為之使四年罷以其事歸樞密院機速房命宰相范宗尹兼知樞密院紹興七年詔樞密本兵之地事權宜重可依故事置樞密使以宰相張浚兼之又詔立班序立依宰相例其後或兼或否至開禧以宰臣兼使遂為永制使與知院同知副使亦或並除其簽書同簽書並為端明殿學士恩數特依執政或以武臣為之亦異典也都承旨副都承旨掌承宣旨命通領院務若便殿侍立閲試禁衛兵校則隨事敷奏承所得旨以授有司蕃國入見亦如之檢察主事以下功過及遷補之事都承旨舊用院吏遞遷熙寧三年始以東上閣門使李評為之又以皇城使李綬為之副更用士人自評綬始是月詔都承旨副都承旨見樞密使副如閣門使禮五年以同修起居注曾孝寬兼都承旨參用儒臣自孝寬始元豐四年客省使張誠一為都承旨都承旨復用武臣自誠一始元祐初復以文臣為都承旨其後以待制充元符三年王師約為都承旨左司諫陳瓘言神考以文臣為都承旨其副則參求外戚武臣之可用者今師約未歷邊任擢置樞屬掾文臣之位甚非神考設官之意至崇寧以後專用武臣建炎四年高宗在會稽以武臣辛道宗為都承旨頗用事紹興元年道宗既免乃詔依元祐職制都承旨以兩制為之如未曾任侍從之人即依權侍郎法又或加學士待制修撰貼職乾道初再用武臣自張説始淳熙九年都承旨復用士人自蕭燧始副都承旨文武通除檢詳官熙寧四年置視中書檢正官元豐初定以三員及改官制罷之建炎三年復置檢詳兩員位在左右司之下紹興二年減一員計議官四員建炎四年罷御營使司並歸樞密院為機速房隨司減罷屬官置幹辦官四員並改為計議官至紹興十一年減罷編修官隨事置無定員以本院官兼者不入銜熙寧三年以王存顧臨等同編修經武要略兼刪定諸房例册初擬都副承旨提舉神宗謂存等皆館職不欲令承旨提舉詔改為管幹紹聖四年編修刑部軍馬司事令都副承旨兼領政和七年編修北邊條例又別置詳覆官講議司崇寧元年以尚書省講議武備房歸樞密院置以知院蔡卞提舉三年卞奏武備本院諸房可行不必專局乃罷之紹興置編修官二員監三省樞密院門舊係差小使臣及內侍官充嘉定六年詔以曾經作縣通判資序人充小使臣省罷內侍官改以三省樞密院門機察官繫銜主管三省樞密院架閣文字一員嘉定八年置以選人京朝官通差三省樞密院激賞庫三省樞密院激賞酒庫監官各二人初以武臣嘉泰末始易以選人二庫並因紹興用兵創以備邊後兵罷專以備堂東兩廚應干宰執支遣若朝廷軍期急速錢物金帶以備激犒諸軍將帥告命綾紙以備科撥調遣等用省院府吏胥之給亦取具焉御營使提舉修政局制國用使都督諸路軍馬中興多以宰相兼領兵政財用之事而執政同預焉因事創名未久遄罷可以不書以其關宰相設施因記其名稱本末附見焉建炎元年置御營司以宰相為之使仍以執政官兼副使其屬有參贊軍事以侍從官兼提舉一行事務以大將兼其將佐有都統制及五軍統制以下官初以總齊行在軍中之政三年詔御營使司止管行在五軍營寨事務其餘應干邊防措置等事釐正歸三省樞密院四年詔自今宰相兼知樞密院事罷御營使時臣僚言宰相之職無所不統本朝沿五代之制政事分為兩府兵權付於樞密比年又置御營使是政出於三也請罷御營司以兵權付之密院而以宰相兼知庶幾可以漸議兵政故罷使及官屬以其事歸密院為機速房至紹興二十九年九月詔祖宗舊制樞密院即無機速房合行減罷紹興三十一年金主亮來攻帝將臨江視師其冬以和義郡王楊存中為御營宿衛使兵罷復免明年孝宗即位又以御營使命之然但自名一司掌殿前忠勇等軍非復建炎之比未幾而罷存中非宰執附見于此紹興二年詔置修政局令百官條具修車馬備器械命右相秦檜提舉參知政事同領之其下有參詳官一人侍從為之參議官二人檢討官四人卿郎為之如講議司故事三月而罷局乾道二年詔理財之要裕財為重自今宰相可帶兼制國用使參政可同知國用事先是臣僚言近以宰相兼樞密使蓋欲使宰相知兵也宰相今雖知兵而財谷出入之原宰相猶未知也望法李唐之制委宰相兼領三司使職事財谷出納之大綱宰相領之於上而戶部治其凡故有是命五年二月罷國用司八年詔官制已定丞相事無不統所有國用一司與參知政事並不兼帶嘉泰四年詔遵孝宗典故宰相兼國用使參知政事同知國用事仍於侍從卿監中擇二人充屬官右丞相陳自強兼國用使參知政事兼知樞密院事費士寅參知政事張巖兼同知國用事以兵部侍郎薛叔似兼參計官太府卿陳景思同參計官先是臣僚言今日財計非錢穀不足可憂而滲漏日滋之為可慮者周家以冢宰制國用而唐亦以宰相兼領度支是知財賦國家之大計其出入之數有餘不足為大臣者皆所當知庶可節以制度關防欺隱宜略倣祖宗遺意命大臣兼提領天下財賦從之陳自強罷亦廢紹興五年制以左通議大夫尚書左僕射同中書門下平章事兼知樞密院事趙鼎左政奉大夫尚書右僕射同中書門下平章事兼知樞密院事張浚都督諸路軍馬未幾浚暫往江上措置邊防至七年秋廢罷其餘宰臣執政開府于外者別載于篇編修敕令所提舉宰相兼同提舉執政兼詳定侍從官兼刪定官就職事官內差兼掌裒集詔旨纂類成書紹興十二年罷乾道六年復置詳定一司敕令所以右丞相虞允文提舉參知政事梁克家同提舉淳熙十五年省罷紹熙二年復置局慶元二年復置提舉以右丞相余端禮兼同提舉以參知政事京鏜兼仍以編修敕令所為名宣徽院宣徽南院使北院使掌總領內諸司及三班內侍之籍郊祀朝會宴饗供帳之儀應內外進奉悉檢視其名物舊制以檢校為使或領節度及兩使留後闕則樞密副使一人兼領二使亦有兼樞密副使簽書樞密院者南院資望比北院頗優然皆通掌止用南院印二使共院而各設廳事其吏史則有都勾押官勾押官各一人前行三人後行十二人分掌四案一曰兵案二曰騎案主賜羣臣新史及掌諸司使至崇班內侍供奉官諸司工匠兵卒之名籍及三班而下遷補假故鞫劾之事三曰倉案掌春秋及聖節大宴節度使迎授恩賜上元張燈四時祠祭及契丹朝貢內廷學士赴上並督其供帳內外進奉視其名物教坊伶人歲給衣帶專其奏覆四曰胄案掌郊祀御殿朝謁聖容賜酺國忌供帳之事諸司使副三班使臣別籍分産司其條制頒諸司工匠休假之囗故事與參知政事樞密副使同知樞密院事以先後入位熙寧四年詔位參政樞副同知下著為令九年詔今後遇以職事侍殿上或中書樞密院合班問聖體及非次慶賀並特序二府班官制行罷宣徽院以職事分隸省寺而使號猶存初吏部尚書王拱辰治平中知大名府神宗即位拜太子少保明年檢校太傅改宣徽北院使尋遷南院立班序位視簽樞元豐六年拱辰除武安軍節度使再任自此遂罷使名不復除獨太子少師張方平許依舊領南院使致仕哲宗即位始遷太子太保而罷使名元祐三年復置南北院使儀品恩數如舊制六年以馮京為南院使而方平亦復使名中書舍人韓川言祖宗設此官禮均二府以待勳舊未嘗帶以致仕且宣徽武官也宮保文官也不宜混並不聽方平亦固辭不拜七年馮京亦以使致仕紹聖三年議者言官名雖復而無所治之事乃罷之南渡以後不復再置三司使使副使判官鹽鐵使度支使戶部使三部副使三部判官三司之職國初沿五代之制置使以總國計應四方貢賦之入朝廷不預一歸三司通管鹽鐵度支戶部號曰計省位亞執政目為計相其恩數廩祿與參樞同太平興國八年分置三使淳化四年復置使一員總領三部又分天下為十道曰河南河東關西劍南淮南江南東西兩浙廣南在京東曰左計京西曰右計置使二員分掌俄又置總計使判左右計事左右計使判十道事凡干涉計度者三使通議之五年罷十道左右計使復置三部使咸平六年罷三部使復置三司一員闕正使則以給諫以上權使事使一人以兩省五品以上及知制誥雜學士學士充亦有輔臣罷政出外召還充使者使闕則有權使事又闕則有權發遣公事掌邦國財用之大計總鹽鐵度支戶部之事以經天下財賦而均其出入焉凡奏事及大事悉置案奏牒常事止署案太平興國初以賈琰為三司副使七年以侯陟王明同判三司遂省副使鹽鐵掌天下山澤之貨關市河渠軍器之事以資邦國之用度支掌天下財賦之數每歲均其有無制其出入以計邦國之用戶部掌天下戶口稅賦之籍榷酒工作衣儲之事以供邦國之用副使以員郎以上歷三路轉運及六路發運使充判官以朝官以上曾歷諸路轉運使提點刑獄充三部副使各一人通簽逐部之事舊以員外郎以上充端拱初省淳化三年復置又省至道初又置真宗即位副使遷官遂罷之咸平六年復置三部判官各三人分掌逐案之事舊以朝官充國初承舊制每部判官一人乾德四年三部各置推官一人太平興國三年諸案置推官或巡官以朝官充四年三司止置判官一人推官三人及分十道二計各置判官一人五年廢十道三部各置判官二人三部各有孔目官一人都勾押官一人勾覆官四人鹽鐵分掌七案一曰兵案掌衙司軍將大將四排岸司兵卒之名籍及庫務月帳吉凶儀制官吏宿直諸州衙吏胥史之遷補本司官吏功過三部胥吏之名帳及刑獄造船捕盜亡逃絶戶資産禁錢景德二年併度支案為刑案二曰胄案掌修護河渠給造軍器之名物及軍器作坊弓弩院諸務諸季料籍三曰商稅案四曰都鹽案五曰茶案六曰鐵案掌金銀銅鐵朱砂白礬緑礬石炭錫鼓鑄七曰設案掌旬設節料齋錢餐錢羊豕米薪炭陶器等物度支分掌八案一曰賞給案掌諸給賜賻贈例物口食內外春冬衣時服綾羅紗縠綿布鞋席紙染料市舶權物務三府公吏二曰錢帛案掌軍中春冬衣百官奉祿左藏錢帛香藥榷易三曰糧料案掌三軍糧料諸州芻粟給受諸軍校口食御河漕運商人飛錢四曰常平案掌諸州平糴大中祥符七年置主吏七人五曰發運案掌汴河廣濟蔡河漕運橋梁折斛三稅六曰騎案掌諸坊監院務飼養牛羊馬畜及市馬等七曰斛斗案掌兩京倉廩廥積計度東京糧料百官祿粟廚料八曰百官案掌京朝幕職官奉料祠祭禮物諸州驛料戶部分掌五案一曰戶稅案掌夏稅二曰上供案掌諸州上供錢帛三曰修造案掌京城工作及陶瓦八作排岸作坊諸庫簿帳勾校諸州營壘官廨橋梁竹木簰符四曰麴案掌榷酤官麴五曰衣糧案掌勾校百官諸軍諸司奉料春冬衣祿粟茶鹽㙐醬傔糧等三部諸案並與本部都孔目官以下分掌三部勾院判官各一人以朝官充掌勾稽天下所申三部金穀百物出納帳籍以察其差殊而關防之鹽鐵院度支院戶部院勾覆官各一人都磨勘司端拱九年置判司官一人以朝官充掌覆勾三部帳籍以驗出入之數都主轄支收司淳化三年置判司官以判磨勘司官兼掌官物已支未除之數候至所受之處附籍報所由司而對除之天下上供物至京即日奏之納畢取其鈔以還本州拘收司咸平四年置以判磨勘司兼掌凡支收財利未結絶者籍其名件而督之都理欠司雍熙二年三部各置理欠有勾簿司景德四年廢判司官一人以朝官充掌理在京及天下欠負官物之籍皆立限以促之都憑由司以判都理欠司官兼掌在京官物支破之事凡部支官物皆覆視無虛謬則印署而還之支訖復據數送勾而銷破之開拆司判司官一人以朝官充掌受宣敕及諸州申牒之籍發放以付三部兼掌發放勾鑿催驅受事發放司掌受三司帖牒而下之太平興國年中置勾鑿司掌勾校三部公事簿帳催驅司掌督京城諸司庫務末帳京畿倉場庫務月帳憑由送勾及三部支訖內外奉祿之事受事司掌諸處解送諸色名籍以發付三部衙司管轄官二人以判開拆司官及內侍都知押班充掌大將軍將名籍第其勞而均其役使勾當公事官二員以朝官充掌分左右廂檢計定奪點檢覆驗估剝之事三司推勘公事一人以京朝官充掌推劾諸部公事勾當諸司馬步軍糧料院官各一人以京朝官充掌文武官諸司諸軍給受奉料批書券曆諸倉庫案驗而廩賦之勾當馬步軍專勾司官一人以京朝官充舊以三班掌諸軍兵馬逃亡收並之籍諸司庫務給受之數審校其欺詐批曆以送糧料院以上並屬三司使元豐官制行罷三司使並歸戶部翰林學士院翰林學士承旨翰林學士知制誥直學士院翰林權直學士院權直掌制誥詔令撰述之事凡立后妃封親王拜宰相樞密使三公三少除開府儀同三司節度使加封加檢校官並用制賜大臣太中大夫觀察使以上用批答及詔書餘官用敕書布大號令用御札戒勵百官曉諭軍民用敕榜遣使勞問臣下口宣凡降大赦曲赦德音則先進草大詔命及外國書則具本取旨得畫亦如之凡拜宰相及事重者晚漏上天子御內東門小殿宣召面諭給筆札書所得旨稟奏歸院內侍鎖院門禁止出入夜漏盡具詞進入遲明白麻出閣門使引授中書中書授舍人宣讀其餘除授並御札但用御寶封遣內侍送學士院鎖門而已至於赦書德音則中書遣吏持送本院內侍鎖院如除授焉凡撰述皆寫畫進入請印署而出中書省熟狀亦如之若已畫旨而未盡及舛誤則論奏貼正凡宮禁所用文詞皆掌之乘輿行幸則侍從以備顧問有獻納則請對仍不隔班凡奏事用榜子關白三省樞密院用咨報不名凡初命為學士皆遣使就第宣詔旨召入院上日敕設會從官宥以樂元豐中始命佩魚自蒲宗孟始見執政議事則繫㙐蓋與侍從異禮也政和三年強淵明請以前後所被旨及案例修為本院敕令格式五年御書摛文堂榜賜學士院靖康元年吳等奏大禮鎖院麻三道以上係雙學士宿直分撰乞依故事從之承旨不常置以學士久次者為之凡他官入院未除學士謂之直院學士俱闕他官暫行院中文書謂之權直自國初至元豐官制行百司事失其實多所釐正獨學士院承唐舊典不改乾道九年崔敦詩初以祕書省正字兼翰林權直淳熙五年敦詩再入院議者以翰林乃應奉之所非專掌制誥之地更為學士院權直後復稱翰林權直然亦互除不廢權正或至三人翰林侍讀學士太宗初以著作佐郎呂文仲為侍讀真宗咸平二年以楊徽之夏侯嶠並為翰林侍讀學士始建學士之職其後馮元為翰林侍讀不帶學士又以高若訥為侍讀不加別名但供職而已天禧三年張知白為刑部侍郎充翰林侍讀學士知天雄軍府侍讀學士外使自知白始元豐官制廢翰林侍讀侍講學士不置但以為兼官然必侍從以上乃得兼之其秩卑資淺則為説書歲春二月至端午日秋八月至長至日遇隻日入侍邇英閣輪官講讀元祐七年復增學士之號元符元年省去建炎元年詔可特差侍從官四員充講讀官遇萬機之暇令三省取旨就內殿講讀充宮觀兼侍讀元豐八年五月資政殿大學士呂公著兼侍讀提舉中太乙宮兼集禧觀公事七月韓維兼侍讀提舉中太乙宮元祐元年端明殿學士范鎮致仕提舉中太乙宮兼集禧觀公事兼侍讀不赴六年馮京兼侍讀充太乙宮使未幾乞致仕不允仍免經筵進讀中興以來如朱勝非張浚謝克家趙鼎万俟𪅂並以萬壽觀使兼侍讀隆興元年張燾以萬壽觀湯思退以醴泉觀並侍讀乾道五年劉章以佑神觀兼焉臺諫兼侍讀自慶曆以來臺丞多兼侍讀諫長未有兼者紹興十二年春万俟𪅂以中丞羅汝楫以諫議始兼侍讀自後每除言路必兼經筵矣翰林侍講學士咸平二年國子祭酒邢昺為侍講學士其後又以馬宗元為侍講不加別名但供職而已景德四年以翰林侍講學士邢昺知曹州侍講學士外使自昺始故事自兩省臺端以上兼侍講元祐中司馬康以著作佐郎兼侍講時朝議以文正公之賢故特有是命紹興五年范沖以宗卿朱震以祕少並兼蓋殊命也乾道六年張栻始以吏部員外郎兼蓋中興後庶官兼侍講者惟此三人若紹興二十五年張扶以祭酒隆興二年王佐以檢正乾道七年林憲以宗卿入經筵亦兼侍講者蓋扶本以言路兼説書就升其秩佐時攝版曹憲嘗為右史且有舊例故稍優之臺諫兼侍講慶曆二年召御史中丞賈昌朝侍講邇英閣故事臺丞無在經筵者仁宗以昌朝長於講説特召之神宗用呂正獻亦止命時赴講筵去學士職中興後王賓為御史中丞見請復開經筵遂命兼講自後十五年間繼之者惟王唐徐俯二人皆出上意紹興十二年則万俟𪅂羅汝楫紹興二十五年則正言王珉殿中侍御史董德元並兼侍講非臺丞諫長而以侍講為稱又自此始其後猶或兼説書臺官自尹穡隆興二年五月諫官自詹元宗乾道九年十二月後並以侍講為稱不復兼説書矣宮觀兼侍講國初自元豐以來多以宮觀兼侍讀乾道七年寶文待制胡銓除提舉佑神觀兼侍講是日以宰執進呈虞允文奏曰胡銓早歲一節甚高不宜令其遽去朝廷帝曰銓固非他人比且除在京宮觀留侍經筵故有是命崇政殿説書掌進讀書史講釋經義備顧問應對學士侍從有學術者為侍講侍讀其秩卑資淺而可備講説者則為説書仁宗景祐元年正月命賈昌朝趙希言王宗道楊安國並為崇政殿説書日輪二員祗候初侍講學士孫奭年老乞外因薦昌朝等至是特置此職以命之慶曆二年以趙師民預講官復為崇政殿説書不兼侍講元祐間程頤以布衣為之然范祖禹乃以著作佐郎兼侍講司馬康又嘗以著作佐郎兼侍講前此未有也崇寧中初除説書二人皆以隱逸起蔡䥩呂瓘仍遂其性詔以士服隨班朝謁入侍渡江後尹焞初以祕書兼之中間王十朋范成大皆以郎官兼亦殊命也近事侍從以上兼經筵則曰侍講庶官則曰崇政殿説書故左史兼亦曰侍講紹興十二年万俟𪅂羅汝楫並兼講讀蓋秦梓時已兼説書便於傳道秦熺復繼之每除言路必預經筵檜死始罷慶元後臺丞諫長暨副端正言司諫以上無不預經筵者正言兼説書自端明巫伋始副端兼説書自端明余堯弼始察官兼説書自少卿陳夔始修注兼説書自朱震始修注官多得兼侍講開禧三年十一月王簡卿知諫院為左史仍兼崇政殿説書言者以為不可罷之觀文殿大學士學士之職資望極峻無吏守無職掌惟出入侍從備顧問而已觀文殿即舊延恩殿慶曆七年更名皇祐元年詔置觀文殿大學士寵待舊相今後須曾任宰相乃得除授時賈昌朝由使相右僕射觀文殿大學士判尚書都省觀文殿置大學士自昌朝始三年詔班在觀文殿學士之前六尚書之上自是曾任宰相者出必為大學士熙寧中韓絳宣撫陝西河東得罪罷守本官四年用明堂赦授觀文殿學士宰相不為大學士自絳始中興後非宰相而除者自紹興二十年秦熺始熺知樞密院郊祀大禮使禮成以學士遷且視儀揆路非典故也乾道四年汪徹舊以樞密使為學士遷九年王炎以樞密使為西川安撫使除至慶元間趙彥逾自工部尚書為端明殿學士直以序遷至焉曾為宰相而不為大學士者自紹興元年范宗尹始觀文殿學士觀文殿本隋煬帝殿名國初為文明殿學士慶曆七年宋庠言文明殿學士稱呼正同真宗諡號兼禁中無此殿額其學士理自當罷乞擇見今正朝或祕殿以名學士易之乃詔改為紫宸殿學士以參知政事丁度為之時學士多以殿名為官稱丁遂稱曰丁紫宸八年御史何郯以為紫宸不可為官稱於是改延恩殿為觀文殿即殿名置學士仍以度為之自後非曾任執政者弗除熙寧中王韶以熙河功元豐中王陶以宮僚雖未歷二府亦除是職蓋異恩也然韶猶兼端明殿龍圖學士云資政殿大學士資政殿在龍圖閣之東序景德二年王欽若罷參政真宗特置資政殿學士以寵之在翰林學士下十二月復以欽若為資政殿大學士班文明殿學士之下翰林學士承旨之上資政殿置大學士自欽若始自欽若班翰林承旨上一時以為殊寵祥符初向敏中以前宰相再入為東京留守復加此職自是訖天聖末二十餘年不以除人明道元年李迪知河陽召還始再命之景祐四年王曾罷相復除三十年間除三人皆前宰相也宋庠罷參知政事仁宗眷之厚因加此職自欽若後非宰相而除者惟庠一人康定二年右正言梁適請遵先朝故事定以員數於是詔大學士置二員學士三員紹興十年鄭億年歸自偽齊除資政殿二年加大學士許出入如二府儀億年未嘗秉政十五年秦熺自翰林學士承旨為資政詔立班恩數同執政十六年秦檜弟梓以端明卒于湖州進大資致仕恤典同參政是後從臣自端明視政府而序進者遂為常矣端明殿學士端明殿即西京正衙殿也後唐天成元年明宗即位之初四方書奏命樞密使安重誨進讀懵於文義孔循獻議始置端明殿學士命馮道趙鳳俱以翰林學士充班在翰林學士上後有轉改止於翰林學士內選任初如三館例職在官下趙鳳轉侍郎諷任圜特移職在官上後遂為故事宋太宗初以程羽為之後隨殿名改為文明殿學士慶曆中改為紫宸後又改為觀文明道二年改承明殿為端明殿復置端明殿學士以翰林侍讀學士宋綬為之在翰林學士之下自明道訖元豐無前執政為之者僅以待學士之久次者元豐中以前執政為之自曾孝寬始以見任執政為之自王安禮始政和中嘗改為延康殿建炎二年都省言延康殿學士舊係端明殿學士詔依舊後拜簽樞者多領焉總閣學士直學士宋朝庶官之外別加職名所以厲行義文學之士高以備顧問其次與論議典校讎得之為榮選擇尤精元豐中修三省寺監之制其職並罷滿歲補外然後加恩兼職直龍圖閣省寺監掌二補外或領監司帥臣則除之待制雜學士給諫以上補外則除之係一時恩旨非有必得之理元祐二年詔復增館職及職事官並許帶職尚待二年加直學士中丞侍郎給舍諫議通及一年加待制紹聖三年詔職事官罷帶職非職事之官仍舊中興後學士率以授中司列曹尚書翰林學士之補外者權尚書給諫侍郎則帶直學士待制焉龍圖閣學士直學士待制大中祥符中建在會慶殿西偏北連禁中閣東曰資政殿西曰述古殿閣上以奉太宗御書御製文集及典籍圖畫寶瑞之物及宗正寺所進屬籍世譜有學士直學士待制直閣等官學士大中祥符三年置以杜鎬為之班在樞密直學士上六年詔結銜在本官之上直學士景德四年置以杜鎬為之班在樞密直學士下祥符六年詔結銜在本官之上待制景德元年置以杜鎬戚綸為之並依舊充職四年詔班在知制誥下並赴內殿起居自改官制為學士初復之職或知制誥平出除之天章閣學士直學士待制天禧四年建在會慶殿之西龍圖閣之北明年仁宗即位修天章閣畢以奉安真宗御製東曰羣玉殿西曰蘂珠殿北曰壽昌殿南曰延康殿內以桃花文石為流杯之所以在位受天書祥符改曰天章取為章于天之義天聖八年置待制慶曆七年又置學士直學士又有侍講學士慶曆七年初置在龍圖閣學士之下學士罕以命人迄仁宗世才王贄一人秦堪自顯謨閣進直天章閣以稱呼非便辭詔改龍圖自是天章不為帶職直學士慶曆七年初置天章閣直學士在龍圖閣直學士之下待制天聖八年初置寓直於祕閣與龍圖遞宿尋命范諷鞠詠充職中興後圖籍符瑞寶玩之物若國史宗正寺所進屬籍獨藏于天章閣祖宗御容潛邸旌節亦安奉焉寶文閣學士直學士待制閣在天章閣之東西序羣玉蘂珠殿之北即舊壽昌閣慶曆改曰寶文嘉祐八年英宗即位詔以仁宗御書御集藏于閣命王圭撰記立石治平四年神宗即位始置學士直學士待制恩賜如龍圖英宗御書附于閣學士治平四年初置以呂公著兼直學士治平四年初置以邵必為之待制治平四年初置顯謨閣學士直學士待制元符元年曾布鄧洵仁各申請建閣詔翰林學士中書舍人撰閣名五以聞遂建閣藏神宗御集以顯謨為名徽宗建中靖國元年詔以顯謨閣為熙明閣仍置學士直學士待制續奉旨仍以顯謨為額崇寧元年詔顯謨閣學士直學士待制如三閣故事序位在寶文閣學士直學士待制之下學士直學士待制並建中靖國元年置徽猷閣學士直學士待制大觀二年初建徽猷閣以藏哲宗御集置學士直學士待制等官敷文閣學士直學士待制紹興十年置藏徽宗聖製置學士等官煥章閣學士直學士待制淳熙初建藏高宗御製十五年置學士等官華文閣學士直學士待制慶元二年置藏孝宗御製置學士等官寶謨閣學士直學士待制嘉泰二年置藏光宗御製置學士等官寶章閣學士直學士待制寶慶二年置藏寧宗御製置學士等官顯文閣學士直學士待制咸淳元年置藏理宗御製置學士等官集英殿修撰國初有集賢殿修撰直龍圖閣直祕閣三等政和六年始置集英殿修撰右文殿修撰祕閣修撰舊制貼職無雜壓至是因增置乃定為雜壓其集英修撰中興後以寵六曹權侍郎之補外者下待制一等右文殿修撰元祐元年許內外官帶貼職紹聖二年詔職事官罷帶職易集賢殿學士為修撰政和六年以集賢院無此名其見任集賢院修撰並改為右文殿修撰次於集英殿修撰為貼職之高等祕閣修撰政和六年置以待館閣之資深者仍多由直龍圖閣遷焉直龍圖閣祥符九年以馮元為太子中允直龍圖閣直閣之名始此凡館閣之久次者必選直龍圖閣皆為擢待制之基也中興後凡直閣為庶官任藩閫監司者貼職各隨高下而等差之直天章閣至直顯文閣並同直祕閣國初以史館昭文館集賢院為三館皆寓崇文院太宗端拱元年詔就崇文院中堂建祕閣擇三館真本書籍萬餘卷及內出古畫墨迹藏其中以右司諫直史館宋泌為直祕閣直館直院則謂之館職以他官兼者謂之貼職元豐以前凡狀元制科一任還即試詩賦各一而入否則用大臣薦而試謂之入館官制行廢崇文院為祕書監建祕閣於中自監少至正字列為職事官罷直館直院之名獨以直祕閣為貼職皆不試而除蓋特以為恩數而已故事外官除館職如祕閣校理直祕閣者必先移書在省執事同僚之好乃即館設盛會宴之自崇寧以來外官除館職既多此禮寖廢東宮官太子太師太傅太保太子少師少傅少保國初師傅不常設仁宗升儲置三少各一人參政李昉兼掌賓客及升首相遂進少傅此宰相兼宮僚之始也丁謂兼少師馮拯兼少傅曹利用兼少保是時實為東宮官餘多以前宰執為致仕官若太子太師太傅太保以待宰相官未至僕射者及樞密使致仕亦隨本官高下除授太子少師少傅少保以待前執政惟少師非經顧命不除若因遷轉則遞進一官至太師即遷司空天禧末皇太子同聽政乃以首相兼少師自後神宗欽宗孝宗光宗在東宮皆不置開禧三年史彌遠自詹事入樞府乃進兼賓客已而太子侍立遂以丞相錢象祖兼太子少傅明年景獻太子立象祖兼少師彌遠以右相兼少傅未幾彌遠丁內艱象祖亦去位又明年彌遠起復遂兼進少師景定元年度宗升儲以賈似道為少師太子賓客至道元年建儲初置賓客二人以他官兼天禧四年參政任中正樞副錢惟演參政王曾並兼太子賓客執政兼東宮官始此中興後不置開禧三年景獻太子立始以執政兼賓客後復省景定元年度宗升儲以朱熠皮龍榮沈炎並兼賓客太子詹事仁宗升儲置詹事二人神宗欽宗升儲並置二人皆以他官兼登位後省乾道元年莊文太子立置詹事二人踰月詔太子詹事遇東宮講讀日並往陪侍七年光宗正儲位以敷文閣直學士王十朋敷文閣待制陳良翰為太子詹事不兼他官非常制也景定元年度宗升儲以楊棟兼詹事太子左庶子右庶子左諭德右諭德舊制不常設儲闈之建隨宜制官以備僚寀多以他官兼領仁宗神宗升儲庶子諭德各置二人欽宗升儲置一人紹興三十二年孝宗以建王立為皇太子置庶子諭德各一人除右虛左乾道元年及七年各置一人開禧三年景獻太子立初除左虛右明年左右始並置太子侍讀侍講神宗升儲始置各一人乾道淳熙開禧各依故事並置乾道七年禮部太常寺言討論東宮開講並節朔賀慶辭謝禮儀宮僚講讀無已行故事當依放講筵少殺其禮每遇講讀詹事以下至講讀官上堂並用賓禮參見依官職序坐皇太子正席講讀官迭起如延英儀講罷復位節朔不受宮僚參賀元日冬至詹事以下箋賀謝辭初如常見之禮後離位致詞復位就坐茶湯罷詹事初上參見皇太子拜皇太子答拜庶子等初上參見皇太子受拜庶子諭德及講讀官雖有坐受之禮止是五禮新儀所載兼逐日致拜之禮近例皆已不行或遇合致拜日更合參酌天禧至道故事施行按天禧二年九月五日左庶子張士遜等言臣等日詣資善堂參見皇太子得令升階列拜然後跪受望令皇太子坐受參見詔不許至道元年皇太子每見太子賓客必先拜迎送常降階及門並從之太子中舍人舍人至道天禧各置一人神宗欽宗升儲並如舊置嘉定初除二人慶元以中舍人在舍人上資善堂翊善贊讀直講説書皇太子宮小學教授資善堂小學教授翊善贊讀直講皆舊制説書而下中興以後增置資善堂自仁宗為皇子時為肄業之所每皇子出就外傅選官兼領元豐八年哲宗初開講筵詔講讀官日赴資善堂以雙日講讀仍輪一員宿直又詔三省樞密院講讀修注官錫宴於資善堂政和元年定王嘉王出就資善堂聽讀詔宰執就見靖康元年詔皇太子出就外傅就資善堂置學舍令國子監供監書紹興五人孝宗封建國公出就資善堂聽講先是宰臣趙鼎得旨於宮門內造書院至是始成以為資善堂命儒臣為直講翊善悉如資善故事尋用趙鼎言以左史范沖充翊善右史朱震充贊讀時稱極選帝曰朕令國公見沖震必設拜蓋尊重師傅不得不如此紹興十二年建國公出就外第及紹興三十年由普安郡王為皇子進封建王時皇孫皆就傅以校書郎王十朋為小學教授紹興三十二年孝宗即位詔三皇子位各置説書官一員又置贊讀直講一員淳熙七年皇孫英國公始就傅詔置皇太子宮小學教授一員十六年光宗即位皇子進封嘉王置王府贊讀翊善直講各一員慶元六年景獻太子為福州觀察使詔令資善堂授書置小學教授二員開禧元年進封榮王仍開資善堂置贊讀直講説書官各一員又置翊善一員度宗升儲並置翊善贊讀等官主管左右春坊事二人以內臣兼同主管左右春坊事二人以武臣兼承受官一人以內侍充仁宗神宗升儲並置中興後置官並同太子左右衛率府率副率左右司禦率府率副率左右清道率府率副率左右監門率府率副率左右內率府率副率官存而無職司至道元年東宮置左清道率府率副率兼左春坊謁者主贊引三年真宗即位而省天禧二年又以左清道率郭承慶左右監門副率夏元亨兼左右春坊謁者仁宗即位復省中興後不置惟以監門率府副率為環衛階官親王府傅長史司馬咨議參軍友記室參軍王府教授小學教授傅及長史司馬有其官而未嘗除太平興國八年諸王出閣楚王府置咨議參軍二員翊善一員陳王府置咨議翊善各一員韓王冀王益王置翊善各一員後又置記室及諸王府侍講一員並以常參官兼充其後多不置咨議翊善記室或止一員大中祥符九年仁宗初封壽春郡王置友二員亦以常參官兼充天禧二年進封升王友遷咨議仍置記室一員又皇姪皇孫侍教南北伴讀無定數至道初太宗以皇親子孫就講學欲置侍講之職中書言按唐太宗改諸王侍讀為奉諸王講讀今皇孫皇姪皆環衛之職請以教授為名從之選京朝官通經者充其後又令王府記室翊善侍講分兼南北宅教授大中祥符二年又有侍教之名自是南北院或有伴讀凡諸宮皆有教授初無定員是年英宗以宗室自率府副率已上八百餘人奉朝請者四百餘人而教官才六員乃詔增置教授官凡皇族年三十已上者百一十三人置講書四員年十五以上者百十三人置講書四員年十五已上者三百九人增置教授五員年十四已下者別置小學教授十二員並舊六為二十七員以分教之其子弟不率教俾教授官本位尊長具名申大宗正司量行戒責教授官不職大宗正司密訪以聞舊制親賢宅置講書紹興十二年改為府教授掌教親賢宅南班宗子淳熙十二年詔建魏惠憲王府置小學教授二員以館職兼充掌訓皇孫既長趨朝謁則不以小學名而講習如故自後皇姪皇孫皆置教授
