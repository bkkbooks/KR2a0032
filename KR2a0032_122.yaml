body:
  text: 宋史卷一百二十二志第七十五禮二十五凶禮一山陵山陵諡祔服紀葬儀與士庶之喪制為凶禮其上陵忌日漢儀如吉祭宋制是日禁屠殺設素饌輟樂舉哭素服行事因以類附焉太祖建國號僖祖曰欽陵順祖曰康陵翼祖曰定陵宣祖曰安陵安陵在京城東南隅乾德初改卜河南府鞏縣西南四十里訾鄉鄧封村以司徒范質為改卜安陵使學士竇儀禮儀使中丞劉溫叟儀仗使樞密直學士薛居正鹵簿使太宗時尹開封為橋道頓遞使質尋免相以太宗兼轄五使事修奉新陵皇堂下深五十七尺高三十九尺陵臺三層正方下層每面長九十尺南神門至乳臺乳臺至鵲臺皆九十五步乳臺高二十五尺鵲臺增四尺神牆高九尺五寸環四百六十步各置神門角闕有司言改卜陵寢宣祖合用哀册及文班官各撰歌辭二首吉仗用大駕鹵簿凶仗用大升輿龍輴鵝茸纛魂車香輿銘旌哀諡册寶車方相買道車白幰弩素信幡錢山輿黃白紙帳暖帳夏帳千味臺盤衣輿拂纛明器輿漆梓宮夷衾儀椁素翣包牲倉瓶五穀輿瓷甒瓦甒辟惡車進玄宮有鐵帳覆梓宮籍以棕櫚褥鐵盆鐵山用然漆燈宣祖兗冕昭憲皇后花叉翬衣贈玉十二神當壙當野祖明祖思地軸及留陵刻漏等並制如儀有司又言按儀禮改葬緦注云臣為君子為父妻為夫也必服緦者親見尸柩不可以無服緦三月而除之又五禮精義云改葬無祖奠蓋祖奠設於柩車之前以為行始至於改葬告遷而已今請皇帝服緦皇親及文武官護送靈駕者亦服緦既葬而除不設祖奠止於陵所行一虞之祭宣祖諡册諡寶舊藏廟室合遷置陵內改葬之禮與始葬同几筵宜新明器壞者改作凡斂衣斂物並易之其皇堂贈玉鎮圭劍佩旒冕玉寶並以珉玉藥玉綬以青錦安陵中玉圭劍佩玉寶等皆用于闐玉孝明孝惠陵內用珉玉藥玉啓故安陵奉安宣祖昭憲孝惠二后梓宮于幄殿靈駕發引所過州府縣鎮長吏令佐素服出城奉迎並辭皆哭自發引至掩皇堂皆廢朝禁京城音樂順祖翼祖皆葬幽州至真宗始命營奉二陵遂以一品禮葬河南縣制度比安陵減五分之一石作減三分之一尋改上定陵名曰靖陵開寶九年十月二十日太祖崩遺詔以日易月皇帝三日而聽政十三日小祥二十七日大祥諸道節度防禦團練使刺史知州等不得輒離任赴闕諸州軍府臨三日釋服羣臣班殿庭宰臣宣制發哀畢太宗即位號哭見羣臣羣臣稱賀復奉慰盡哀而退禮官言羣臣當服布斜巾四腳直領布襴腰絰命婦布帕首裙帔皇弟皇子文武二品以上加布冠斜巾帽首絰大袖裙袴竹杖士民縞素婦人素縵諸軍就屯營三日哭羣臣屢請聽政始御長春殿羣臣喪服就列帝去杖絰服斜巾垂帽卷簾視事小祥改服布四腳直領布襴腰絰布袴二品以上官亦如之大祥帝服素紗軟腳折上巾淺黃衫緅皮黑銀帶羣臣及軍校以上皆本色慘服鐵帶鞾笏諸王入內服衰出則服慘又成服後羣臣朝晡臨三日大小祥禫除朔望皆入臨奉慰內出遺留物頒賜諸臣親王遣使賫賜方鎮二十七日命宰臣撰陵名哀册文明年三月十七日羣臣奉諡號册寶告于南郊明日讀于靈坐前四月十日啓欑宮帝與羣臣皆服如初喪羣臣朝晡臨殿中退易常服出宮城十三日發引帝衰服啓奠哭羣臣入臨升梓宮于龍輴祖奠徹設次明德門外行遣奠禮讀哀册帝哭盡哀再拜辭釋衰還宮百官辭於都城外二十五日掩皇堂二十九日虞主至奉安于大明殿五月十九日祔廟之第五室以孝明皇后王氏升配禮畢羣臣奉慰其吉凶仗如安陵惟增轀輬車神帛肩輿鹵簿三千五百三十九人陵在鞏縣祔宣祖曰永昌至道三年三月二十九日太宗崩于萬歲殿真宗散髮號劈奉遺詔即位於殿之東楹制永熙陵皇堂深百尺方廣八十尺陵臺方二百五十尺大駕鹵簿用玉輅一革車五外凡用九千四百六十八人有司定散髮之禮皇帝皇后諸王公主縣主諸王夫人六宮內人並左被髮皇太后全被髮帝服布斜巾四腳大袖裙袴帽竹杖腰絰首絰直領布襴衫白綾襯服諸王皇親以下如之加布頭冠絹襯服皇太后皇后內外命婦布裙衫帔帕頭首絰絹襯服宮人無帔文武二品以上布斜巾四腳頭冠大袖襴衫裙袴腰絰竹杖絹襯服自餘百官並布幞頭襴衫腰絰兩省五品御史臺尚書省四品諸司三品以上見任前任防禦團練刺史內客省閣門入內都知押班等布頭冠幞頭大袖襴衫裙袴腰絰諸軍庶民白衫紙帽婦人素縵不花叉三日哭而止山陵前朔望不視事六月詔翰林寫先帝常服及絳紗袍通天冠御容二奉帳坐列于大升輿之前仍以太宗玩好弓劍筆硯琴棋之屬蒙組繡置輿中陳於仗內十月三日靈駕發引其凶仗法物擎舁牽駕兵士力士凡用萬一千一百九十三人挽郎服白練寬衫練裙勒帛絹幘餘並如昌陵制十一月二日有司奉神主至太廟近臣題諡號祔於第六室以懿德皇后符氏升配置衛士五百人于陵所作殿以安御容朝暮上食四時致祭焉乾興元年二月十九日真宗崩仁宗即位二十日禮儀院言準禮例差官奏告天地社稷太廟諸陵應祠祭惟天地社稷五方帝諸大祠宗廟及諸中小祠並權停俟祔廟禮畢仍舊是日命閣門使薛貽廓告哀于契丹宣慶使韓守英為大內都巡檢內侍分領宮殿門衛士屯護閣門使王遵度為皇城四面巡檢新舊城巡檢各權添差益以禁兵器仗城門亦設器甲以辨姦詐二十一日羣臣入臨見帝于東序閣門使宣口敕曰先皇帝奄棄萬國凡在臣僚畢同號慕及中外將校並加存撫羣臣拜舞稱萬歲復哭盡哀退是日上表請聽政凡三上始允二十三日陳先帝服玩及珠襦玉匣含襚應入梓宮之物於延慶殿召輔臣通觀明日大斂成服二十五日有司設御坐垂簾崇政殿之西廡簾幕皆縞素羣臣班殿門外帝衰服去杖絰侍臣扶升坐通事舍人引羣臣入殿庭西向合班俟簾捲羣臣再拜班首奏聖躬萬福隨班三呼萬歲退宰臣升殿奏事如儀三月一日小祥帝行奠釋衰服羣臣入臨退赴內東門進名奉慰自是每七日皆臨至四十九日止十三日大祥帝釋服服慘十四日司天監言山陵斬草用四月一日丙時吉十六日山陵按行使藍繼宗言據司天監定永安縣東北六里曰臥龍岡堪充山陵詔雷允恭覆按以聞皇堂之制深八十一尺方百四十尺制陵名曰永定九月十一日召輔臣赴會慶殿觀入皇堂物皆生平服御玩好之具帝與輔臣議及天書皆先帝尊道膺受靈貺殊尤之瑞屬于元聖不可留于人間宜於永定陵奉安二十三日奉導天書至長春殿帝上香再拜奉辭二十四日天書先發帝啓奠梓宮讀哀册禮畢具吉凶儀仗百官素服赴順天門外至板橋立班奉辭還詣西上閣門進名奉慰十月十三日掩皇堂十八日虞主至京十九日羣臣詣會慶殿行九虞祭二十三日祔太廟第七室嘉祐八年三月晦日仁宗崩英宗立喪服制度及修奉永昭陵並用定陵故事發諸路卒四萬六千七百人治之宣慶使石全彬提舉制梓宮畫樣以進命務堅完毋過華飾三司請內藏錢百五十萬貫紬絹二百五十萬匹銀五十萬兩助山陵及賞賚遣使告哀遼夏及賜遺留物又遣使告諭諸路又以聽政奠告大行近臣告升遐於天地社稷宗廟宮觀又告嗣位賜兩府宗室近臣遺留物五月翰林學士王圭言天子之諡當集中書門下御史臺五以上尚書省四品以上諸司三品以上於南郊告天議定然後連奏近制唯詞臣撰議即降詔命庶僚不得參聞頗違稱天之義臣擬上先帝尊諡望詔有司稽詳舊典先之郊而後下臣之議七月宰臣以下宿尚書省宗室團練使以上宿都亭驛請諡于南郊八月告于福寧殿天地宗社宮觀九月二十八日啓菆宮以初喪服日一臨易常服出十月六日靈駕發引天子啓奠梓宮升龍輴祖奠徹與皇太后步出宣德門羣臣辭于板橋十五日奉安梓宮陵側十七日開皇堂十一月二日虞主至皇太后奠于瓊林苑天子步出集英殿門奉迎奠于幄七日祭虞主二十九日祔太廟主如漢制不題諡號及終虞而行卒哭之祭禮院言故事大祥變除服制以三月二十九日大祥至五月二十九日禫六月二十九日禫除至七月一日從吉已蒙降敕謹按禮學王肅以二十五月為畢喪而鄭康成以二十七月通典用其説又加至二十七月終則是二十八月畢喪而二十九月始吉蓋失之也天聖中更定五服年月敕斷以二十七月今士庶所同遵用夫三年之喪自天子達不宜有異請以三月二十九日為大祥五月擇日而為禫六月一日而從吉於是大祥日不御前後殿開封府停決大辟及禁屠至四月五日待制觀察使以上及宗室管軍官日一奠二十八日而羣臣俱入奠二十九日禫除羣臣皆奉慰焉治平四年正月八日英宗崩神宗即位十一日大斂二月三日殯四月三日請諡十八日奏告及讀諡册于福寧殿七月二十五日啓菆八月八日靈駕發引二十七日葬永厚陵禮院準禮羣臣成服後乘布裹鞍韉小祥臨訖除頭冠方裙大袖大祥臨訖裹素紗軟腳幞頭慘公服乘皂鞍韉禫除訖素紗幞頭常服黑帶二日改吉服去佩魚虞主至自掩壙五虞皆在途四虞於集英殿曲赦兩京畿內鄭孟等州如故事元豐八年三月五日神宗崩十三日大斂帝成服十七日小祥四月一日禫除七月五日請諡于南郊九月八日讀諡寶册于福寧殿二十三日啓菆十月一日靈駕發引二十一日葬永裕陵二十九日虞主至十一月一日虞祭于集英殿自復土六虞在途太常卿攝事三虞行禮于殿四日卒哭五日祔廟祕書正字范祖禹言先王制禮以君服同于父皆斬衰三年蓋恐為人臣者不以父事其君此所以管乎人情也自漢以來不惟人臣無服而人君遂亦不為三年之喪唯國朝自祖宗以來外廷雖用易月之制而宮中實行三年之喪且易月之制前世所以難改者以人君自不為服也今羣臣易月而人主實行三年之喪故十二日而小祥期而又小祥二十四日大祥再期而又大祥夫練祥不可以有二也既以日為之又以月為之此禮之無據者再期而大祥中月而禫禫者祭之名非服之色也今乃為之慘服三日然後禫此禮之不經者也既除服至葬而又服之蓋不可以無服也祔廟而後即吉財八月矣而遽純吉無所不佩此又禮之無漸也易月之制因襲已久既不可追宜令羣臣朝服止如今日而未除衰至期而服之漸除其重者再期而又服之乃釋衰其餘則君服斯服可也至於禫不必為之服惟未純吉以至於祥然後無所不佩則三年之制略如古矣詔禮官詳議禮部尚書韓忠彥等議朝廷典禮時世異宜不必循古若先王之制不可盡用則當以祖宗故事為法今言者欲令羣臣服喪三年民間禁樂如之雖過山陵不去衰服庶協古制緣先王恤典節文甚多必欲循古又非特如所言而已今既不能盡用則當循祖宗故事及先帝遺制詔從其議神主祔廟是月冬至百官表賀崇政殿説書程頤言神宗喪未除節序變遷時思方切恐失居喪之禮無以風化天下乞改賀為慰不從紹聖四年太史請遷去永裕陵禁山民一千三百餘以便國音帝曰遷墓得無擾乎若無所害則令勿遷果不便國音當給官錢以資葬費元符三年正月十二日哲宗崩徽宗即位詔山陵制度並如元豐七月十一日啓菆二十日靈駕發引八月八日葬永泰陵九月一日以升祔畢羣臣吉服如故事太常寺言太宗皇帝上繼太祖兄弟相及雖行易月之制實斬衰三年以重君臣之義公除已後庶事相稱具載國史今皇帝嗣位哲宗實承神考之世已用開寶故事為哲宗服衰重今神主已祔百官之服並用純吉皇帝服御宜如太平興國二年故事禮部言太平興國中宰臣薛居正表稱公除以來庶事相稱獨命徹樂誠未得宜即是公除後除不舉樂外釋衰從吉事理甚明今皇帝當御常服素紗展腳幞頭淡黃衫黑犀帶請下有司裁制宰臣請從禮官議乃詔候周期服吉時詔不由門下徑付有司給事中龔原言喪制乃朝廷大事今行不由門下是廢法也臣為君服斬衰三年古未嘗改且陛下前此議服禮官持兩可之論陛下既察見其姦其服遂正今乃不得已從之臣竊為陛下惜開寶時並汾未下兵革未弭祖宗櫛風沐雨之不暇其服制權宜一時非故事也原坐黜知南康軍於是詔依元降服喪三年之制其元符三年九月自小祥從吉指揮改正紹興五年四月甲子徽宗崩于五國城七年正月問安使何蘚等還以聞宰執入見帝號慟劈踊終日不食宰臣張浚等力請始進麋粥成服于几筵殿文武百僚朝晡臨於行宮自聞喪至小祥百官朝晡臨自小祥至禫祭朝一臨太常等言舊制沿邊州軍不許舉哀緣諸大帥皆國家腹心爪牙之臣休戚一體至於將佐皆懷忠憤宜就所屯自副將而上成服日朝晡臨故校哭於本營命徽猷閣待制王倫等為奉迎梓宮使時知邵州胡寅上疏略曰三年之喪自天子至於庶人一也及漢孝文自執謙德用日易月至今行之子以便身忘其親臣以便身忘其君心知其非而不肯改自常禮言之猶且不可況變故特異如今日者又當如何恭惟大行太上皇帝大行寧德皇后蒙塵北狩永訣不復實繇粘罕是有不共戴天之讎考之於禮讎不復則服不除寢苫枕戈無時而終所以然者天下雖大萬事雖衆皆無以加於父子之恩君臣之義也伏覩某月某日聖旨緣國朝故典以日易月臣切以為非矣自常禮言之猶須大行有遺詔然後遵承今也大行詔旨不聞而陛下降旨行之是以日易月出陛下意也大行幽厄之中服御飲食人所不堪疾病粥藥必無供億崩殂之後衣衾斂藏豈得周備正棺卜兆知在何所茫茫沙漠瞻守為誰伏惟陛下一念及此荼毒摧割備難堪忍縱未能遵春秋復讎之義俟讎殄而後除服猶當革漢景之薄喪紀以三年為斷不然以終身不可除之服二十七日而除之是薄之中又加薄焉必非聖人之所安也又曰雖宅憂三祀而軍旅之事皆當決於聖裁則諒暗之典有不可舉蓋非枕塊無聞之日是乃枕戈有事之辰故魯侯有周公之喪而徐夷並興東郊不開則是墨衰即戎孔子取其誓命今六師戒嚴方將北討萬幾之衆孰非軍務陛下聽斷平決得禮之變卒哭之後以墨衰臨朝合於孔子所取其可行無疑也如合聖意便乞直降詔旨云恭惟太上皇帝寧德皇后誕育眇躬大恩難報欲酬罔極百未一伸鑾輿遠征遂至大故訃音所至痛貫五情想慕慈顏杳不復見怨讎有在朕敢忘之雖軍國多虞難以諒暗然衰麻枕戈非異人任以日易月情所不安興自朕躬致喪三年即戎衣墨況有權制布告中外昭示至懷其合行典禮令有司集議來上如敢沮格是使朕為人子而忘孝之道當以大不恭論其罪陛下親御翰墨自中降出一新四方耳目以化天下天地神明亦必有以佑助臣不勝大願六月張浚請諡于南郊戶部尚書章誼等言梓宮未還久廢諡册之禮請依景德元年明德皇后故事行埋重虞祭祔廟之禮及依嘉祐八年治平四年虞祭畢而後卒哭卒哭而後祔廟仍於小祥前卜日行之異時梓宮之至宜遵用安陵故事行改葬之禮更不立虞主從之九月甲子上廟號曰徽宗九年正月太常寺言徽宗及顯肅皇后將及大祥雖皇堂未置若不先建陵名則春秋二仲有妨薦獻請先上陵名宰臣秦檜等請上陵名曰永固徽宗與顯肅初葬五國城十二年金人以梓宮來還將至帝服黃袍乘輦詣臨平奉迎登舟易緦服百官皆如之既至行在安奉于龍德別宮帝后異殿禮官請用安陵故事梓宮入境即承之以槨有司預備兗冕翬衣以往至則納之槨中不復改斂秦檜白令侍從臺諫禮官集議靈駕既還當崇奉陵寢或稱欑宮禮部員外郎程敦厚希檜意獨上奏言仍欑宮之舊稱則莫能示通和之大信而用因山之正典則若亡存本之後圖臣以為宜勿徇虛名當示大信於是議者工部尚書莫將等乃言太史稱歲中不利大葬請用明德皇后故事權欑從之以八月奉迎九月發引十月掩欑在昭慈欑宮西北五十步用地二百五十畝十三年改陵名曰永祐紹興三十一年五月金國使至以欽宗訃聞詔朕當持斬衰三年之服以申哀慕是日文武百僚並常服黑帶去魚詣天章閣南空地立班聽詔旨舉哭畢次赴後殿門外進名奉慰次詣几筵殿焚香舉哭六月權禮部侍郎金安節等請依典故以日易月自五月二十二日立重安奉几筵至六月十七日大祥所有衰服權留以待梓宮之還從之七月宰臣陳康伯等率百官詣南郊請諡廟號欽宗遙上陵名曰永獻其餘並如徽宗典禮淳熙十四年十月八日高宗崩孝宗號慟劈踊踰二日不進膳尋諭宰執王淮欲不用易月之制如晉武魏孝文實行三年之喪自不妨聽政淮等奏通鑑載晉武帝雖有此意後來只是宮中深衣練冠帝曰當時羣臣不能將順其美司馬光所以譏之後來武帝竟欲行之淮曰記得亦不能行帝曰自我作古何害淮曰御殿之時人主衰絰羣臣吉服可乎帝曰自有等降乃出內批朕當衰絰三年羣臣自行易月之令其合行儀制令有司討論詔百官於以日易月之內衰服治事二十日丁亥小祥帝未改服王淮等乞俯從禮制上流涕曰大恩難報情所未忍二十一日車駕還內帝衰絰御輦設素仗軍民見者往往感泣詔自今五日一詣梓宮前焚香帝欲衰服素幄引輔臣及班次而禮官奏謂苴麻三年難行於外庭奏入不出十一月戊戌朔禮官顏師魯尤袤等奏乞禮畢改服小祥之服去杖絰禫祭禮畢改服素紗軟腳折上巾淡黃袍黑銀帶神主祔廟畢改服皂幞頭黑犀帶遇過宮燒香則於宮中衰絰行禮二十五月而除帝批淡黃袍改服白袍二日己亥大祥四日辛丑禫祭禮畢五日壬寅百官請聽政不允八日百官三上表引康誥被冕服出應門等語以證九日詔可十五年正月十八日甲寅百日帝過宮行焚香禮二十一日丁巳諭輔臣曰昨內引洪邁見朕已過百日猶服衰粗因奏事應以漸今宜服如古人墨衰之義而巾則用繒或羅朕以羅絹非是若用細布則可王淮等言尋常士大夫丁憂過百日巾衫皆用細布出而見客則以黲布今陛下舉曠古不能行之禮足為萬世法帝又曰晚間引宿直官之類如何淮曰布巾布背子便是常服上不以為然自是每御延和殿止服白布折上巾布衫過宮則衰絰而杖三月壬子啓欑帝服初喪之服甲寅發引丙寅掩欑甲戌親行第七虞祭大臣言虞祭乃吉禮合用鞾袍上曰只用布折上巾黑帶布袍可也二十日丙戌神主祔廟是日詔曰朕昨降指揮欲衰絰三年緣羣臣屢請御殿易服故以布素視事內殿雖有俟過祔廟勉從所請之詔稽諸典禮心實未安行之終制乃為近古宜體至意勿復有請於是大臣乃不敢言蓋三年之制斷自帝心執政近臣皆主易月之説諫官謝鍔禮官尤袤心知其不可而不敢盡言惟敕令所刪定官沈清臣再上書願堅主聽大事於內殿之旨將來祔廟畢日預降御筆截然示以終喪之志杜絶輔臣方來之章勿令再有奏請力全聖孝以示百官以刑四海帝納用焉仍詔欑宮遵遺誥務從儉約凡修營百費並從內庫毋侵有司經常之費諸路監司州軍府監止進慰表其餘禮並免不得以進奉欑宮為名有所貢獻上陵名曰永思紹熙五年六月九日孝宗崩太皇太后有旨皇帝以疾聽在內成服太皇太后代皇帝行禮慶元二年六月九日大祥八月十六日禫祭時光宗不能執喪寧宗嗣服欲大祥畢更服兩月曰但欲禮制全盡不較此兩月於是監察御史胡紘言孫為祖服已過期矣議者欲更持禫兩月不知用何典禮若曰嫡孫承重則太上聖躬亦已康復於宮中自行二十七月之重服而陛下又行之是喪有二孤也自古孫為祖服何嘗有此禮詔侍從臺諫給舍集議吏部尚書葉翥等言孝宗升遐之初太上聖體違豫就宮中行三年之喪皇帝受禪正宜倣古方喪之服以為服昨來有司失於討論今胡紘所奏引古據經別嫌明微委為允當欲從所請參以典故六月六日大祥禮畢皇帝及百官並純吉服七月一日皇帝御正殿饗祖廟將來禫祭令禮官檢照纍朝禮例施行四月庚戌詔羣臣所議雖合禮經然於朕追慕之意有所未安早來奏知太皇太后面奉聖旨以太上皇帝雖未康愈宮中亦行三年之制宜從所議朕躬奉慈訓敢不遵依初高宗之喪孝宗為三年服及孝宗之喪有司請於易月之外用漆紗淺黃之制蓋循紹興以前之舊朱熹初至不以為然奏言今已往之失不及追改惟有將來啓欑發引禮當復用初喪之服則其變除之節尚有可議望明詔禮官稽考禮律豫行指定其官吏軍民方喪之服亦宜稍為之制勿使肆為華靡其後詔中外百官皆以涼衫視事蓋用此也方朱熹上議時門人有疑者未有以折之後讀禮記正義喪服小記為祖後者條因自識於本議之末其略云準五服年月格斬衰三年嫡孫為祖謂承重者法意甚明而禮經無文但傳云父沒而為祖後者服斬然而不見本經未詳何據但小記云祖父沒而為祖母後者三年可以傍照至為祖後者條下疏中所引鄭志乃有諸侯父有廢疾不任國政不任喪事之問而鄭答以天子諸侯之服皆斬之文方見父在而承國於祖服向來上此奏時無文字可檢又無朋友可問故大約且以禮律言之亦有疑父在不當承重者時無明白證驗但以禮律人情大意答之心常不安歸來稽考始見此説方得無疑乃知學之不講其害如此而禮經之文誠有闕略不無待於後人向使無鄭康成則此事終未有所斷決不可直謂古經定制一字不可增損也已而詔于永思陵下宮之西修奉欑宮上陵名曰永阜慶元六年光宗崩上陵名曰永崇嘉定十七年寧宗崩上陵名曰永茂景定五年理宗崩上陵名曰永穆咸淳十年度宗崩上陵名曰永紹自孝宗以降外庭雖用易月之制而宮中實行三年之喪云
