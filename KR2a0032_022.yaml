body:
  text: 宋史卷二十二本紀第二十二徽宗四宣和元年春正月戊申朔日下有五色雲壬子進建安郡王樞為肅王文安郡王嵵為景王並為太保乙卯詔佛改號大覺金仙餘為仙人大士僧為德士易服飾稱姓氏寺為宮院為觀改女冠為女道尼為女德丁巳金人使李善慶來遣趙有開報聘至登州而還戊午以余深為太宰兼門下侍郎王黼為特進少宰兼中書侍郎乙丑改湟州為樂州癸酉封子棟為溫國公姪有恭為永寧郡王乙亥躬耕籍田罷裕民局二月庚辰改元易宣和殿為保和殿戊戌以鄧洵武為少保三月庚戌蔡京等進安州所得商六鼎己未以馮熙載為中書侍郎范致虛為尚書左丞翰林學士張邦昌為尚書右丞詔天下知宮觀道士與監司郡縣官以客禮相見童貫遣知熙州劉法出師攻統安城夏人伏兵擊之法敗歿震武軍受圍甲子知登州宗澤坐建神霄宮不虔除名編管辛未賜上舍生五十四人及第甲戌皇后親蠶夏四月丙子朔日有食之庚寅童貫以鄜延環慶兵大破夏人平其三城己亥曲赦陝西河東路辛丑進輔臣官一等五月丙午朔有物如龍形見京師民家丁未詔德士並許入道學依道士法丙辰敗夏人于震武壬申班御製九星二十八宿朝元冠服圖甲戌慮囚是月大水犯都城西北有赤氣亙天六月壬午詔西邊武臣為經略使者改用文臣甲申詔封莊周為微妙元通真君列禦寇為致虛觀妙真君仍行冊命配享混元皇帝己亥夏國遣使納款詔六路罷兵秋七月甲寅以童貫為太傅八月戊寅詔諸路未方田處並令方量均定租課丁酉以神霄宮成降德音于天下范致虛以母憂去位九月甲辰朔燕蔡京於保和新殿辛亥大饗明堂癸亥幸道德院觀金芝遂幸蔡京第丁卯以淮康軍節度使蔡攸為開府儀同三司冬十月甲戌朔以紹述熙豐政事書布告天下十一月癸丑朝獻景靈宮甲寅饗太廟乙卯祀昊天上帝于圜丘赦天下甲子詔東南諸路水災令監司郡守悉心振救戊辰以淮甸旱飢民失業遣監察御史察訪張邦昌為尚書左丞翰林學士王安中為尚書右丞時朱勔以花石綱媚上東南騷動太學生鄧肅進詩諷諫詔放歸田里十二月甲戌詔京東東路盜賊竊發令東西路提刑督捕之辛卯大雨雹丙申帝數微行正字曹輔上書極論之編管郴州是歲京西饑淮東大旱遣官振濟嵐州黃河清升邢州為信德陳州為淮寧襄州為襄陽慶州為慶陽安州為德安鄆州為東平趙州為慶源府瀘州為瀘川睦州為建德嶽州為嶽陽寧州為興寧宜州為慶遠光州為光山均州為武當軍二年春正月癸亥追封蔡確為汝南郡王甲子罷道學二月乙亥遣趙良嗣使金國唐恪罷庚辰以寧遠軍節度使梁子美為開府儀同三司戊子令所在贍給淮南流民諭還之甲午詔別修哲宗史三月壬寅賜上舍生二十一人及第乙卯改熙河蘭湟路為熙河蘭廓路夏四月丙子詔江西廣東兩界羣盜嘯聚添置武臣提刑路分都監各一員五月庚子朔以淑妃劉氏為貴妃己酉日中有黑子丁巳祭地于方澤降德音于諸路布衣朱夢說上書論宦寺權太重編管池州戊辰詔宗室有文行才術者令大宗正司以聞六月癸酉詔開封府振濟飢民丁丑太白晝見戊寅蔡京致仕仍朝朔望辛巳詔自今衝改元豐法制論以大不恭丙戌詔三省樞密院額外吏職並從裁汰及有妄言惑衆稽違詔令者重論之詔諸司總轄提點之類非元豐法並罷丁亥復寺院額甲午罷禮制局並修書五十八所秋七月壬子罷文臣起復己未罷醫算學丙寅封子橞為英國公八月庚辰詔減定醫官額乙未詔監司所舉守令非其人或廢法不舉令廉訪使者劾之九月壬寅金人遣勃堇等來乙巳復德士為僧辛亥大饗明堂丙辰遣馬政使金國癸亥余深加少傅宴童貫第冬十月戊辰朔日有食之以河東節度使梁師成為太尉建德軍青溪妖賊方臘反命談稹討之十一月己亥余深罷仍少傅授鎮西軍節度使知福州庚戌以王黼為少保太宰兼門下侍郎己未兩浙都監蔡遵顏坦擊方臘死之十二月丁亥改談稹為兩浙制置使以童貫為江淮荊浙宣撫使討方臘己丑以少傅鄭居中權領樞密院庚寅詔訪兩浙民疾苦是月方臘陷建德又陷歙州東南將郭師中戰死陷杭州知州趙霆遁廉訪使者趙約詬賊死是歲淮南旱夏國真臘入貢三年春正月壬寅鄧洵武卒戊午以安康郡王栩為太保進封濟王鎮國公模為開府儀同三司進封樂安郡王己未詔淮南江東福建各權添置武臣提刑一員辛酉罷蘇杭州造作局及御前綱運乙丑罷西北兵更戍罷木石彩色等場務是月方臘陷婺州又陷衢州守臣彭汝方死之二月庚午趙霆坐棄杭州貶吉陽軍罷方田甲戌降詔招撫方臘乙酉罷天下三舍及宗學辟雍諸路提舉學事官癸巳赦天下是月方臘陷處州淮南盜宋江等犯淮陽軍遣將討捕又犯京東河北入楚海州界命知州張叔夜招降之三月丁未御集英殿策進士庚申賜禮部奏名進士及第出身六百三十人夏四月丙寅貴妃劉氏薨甲戌青溪令陳光以盜發縣內棄城伏誅庚寅忠州防禦使辛興宗擒方臘于青溪詔二浙江東被賊州縣給復三年癸巳汝州牛生麒麟五月戊戌以鄭居中領樞密院己亥詔杭越江寧守臣並帶安撫使甲辰追冊貴妃劉氏為皇后諡曰明節改睦州建德軍為嚴州遂安軍歙州為徽州丙午金人再遣曷魯等來戊申以興寧軍節度使劉宗元為開府儀同三司癸亥詔三省覺察臺諫罔上背公者取旨譴責陳過庭張汝霖以乞罷御前使喚及歲進花果為王黼所劾並竄貶閏月丙寅減諸州曹掾官辛未立醫官額甲戌復應奉司命王黼及內侍梁師成領之戊寅慮囚六月河決恩州清河掃秋七月丁卯振溫處等八州丁亥廢純滋等十二州戊子童貫等俘方臘以獻是月洛陽京畿訛言有黑眚如人或如犬夜出掠小兒食之二歲乃息八月甲辰曲赦兩浙江東福建淮南路乙巳以童貫為太師談稹加節度丁未祔明節皇后神主于別廟丙辰方臘伏誅九月丙寅以王黼為少傅鄭居中為少師庚午進執政官一等辛未大饗明堂冬十月甲寅詔自今贓吏獄具論決勿貸童貫復領陝西兩河宣撫十一月丁丑馮熙載罷以張邦昌為中書侍郎王安中為尚書左丞翰林學士承旨李邦彥為尚書右丞辛巳封子桐為儀國公壬午張商英卒十二月辛卯朔日中有黑子壬子進封廣平郡王構為康王樂安郡王模為祁王並為太保是歲諸路蝗四年春正月丁卯以蔡攸為少保梁師成為開府儀同三司癸酉金人破遼中京遼主北走二月丙申以旱禱于廣聖宮即日雨癸卯雨雹丙午以吳國公植為開府儀同三司進封信都郡王三月辛酉幸祕書省遂幸太學賜祕書少監翁彥深王時雍國子祭酒韋壽隆司業權邦彥章服館職學官諸生恩錫有差丙子遼人立燕王淳為帝金人來約夾攻命童貫為河北河東路宣撫使屯兵于邊以應之且招諭幽燕夏四月丙午詔置補完校正文籍局録三館書置宣和殿及太清樓祕閣又令郡縣訪遺書五月壬戌以高俅為開府儀同三司丁卯封子柄為昌國公甲戌嗣濮王仲御薨乙亥以蔡攸為河北河東宣撫副使庚辰以常德軍節度使談稹為太尉童貫至雄州令都統制种師道等分道進兵癸未遼人擊敗前軍統制楊可世于蘭溝甸乙酉封開府儀同三司江夏郡王仲爰為嗣濮王丙戌慮囚楊可世與遼將蕭幹戰于白溝敗績丁亥辛興宗敗于范村六月己丑种師道退保雄州遼人追擊至城下帝聞兵敗懼甚遂詔班師壬寅以王黼為少師是月遼燕王淳死蕭幹等立其妻蕭氏秋七月己未廢貴妃崔氏為庶人壬午王黼以耶律淳死復命童貫蔡攸治兵以河陽三城節度使劉延慶為都統制甲申种師道責授右衛將軍致仕和詵散官安置九月戊午朝散郎宋昭上書諫北伐王黼大惡之詔除名勒停廣南編管己未金人遣徒孤且烏歇等來議師期辛酉大饗明堂己巳高麗國王王俁薨遣路允迪弔祭甲戌遣趙良嗣報聘于金國己卯遼將郭藥師等以涿易二州來降冬十月庚寅改燕京為燕山府涿易八州並賜名癸巳劉延慶與郭藥師等統兵出雄州戊戌曲赦所復州縣己亥耶律淳妻蕭氏上表稱臣納款甲辰師次涿州己酉郭藥師與高世宣楊可世等襲燕蕭幹以兵入援戰于城中藥師等屢敗皆棄馬縋城而出死傷過半癸丑以蔡攸為少傅判燕山府甲寅劉延慶自盧溝河燒營夜遁衆軍遂潰蕭幹追至涿水上乃還十一月丙辰朔行新璽戊辰朝獻景靈宮己巳饗太廟庚午祀昊天上帝于圜丘赦天下東南官吏昨緣寇盜貶責者並次第移放上書邪上等人特與磨勘戊寅金人遣李靖等來許山前六州以彰德軍節度使鄭詳為太尉十二月丁亥郭藥師敗蕭幹于永清縣戊子遣趙良嗣報聘于金國庚寅以郭藥師為武泰軍節度使辛卯金人入燕蕭氏出奔壬辰使來獻捷乙未詔監司未經陛對毋得之任丙申貶劉延慶為率府率安置筠州壬寅進封植為莘王五年春正月戊午金人遣李靖來議所許六州代租錢己未遣趙良嗣報聘求西京等州辛酉以王安中為慶遠軍節度使河北河東燕山府路宣撫使知燕山府甲申録富弼後二月乙酉朔以李邦彥為尚書左丞翰林學士趙野為尚書右丞丙戌金人以議未合斷橋梁焚次舍丁酉進封雍國公朴為華原郡王徐國公棣為高平郡王並為開府儀同三司三月乙卯金人再遣寧朮割等來己未遣盧益報聘皆如其約夏四月癸巳金人遣楊璞以誓書及燕京涿易檀順景薊州來歸庚子童貫蔡攸入燕時燕之職官富民金帛子女先為金人盡掠而去乙巳童貫表奏撫定燕城庚戌曲赦河北河東燕雲路是日班師五月己未以收復燕雲賜王黼玉帶庚申以王黼為太傅鄭居中為太保進宰執官二等辛酉王黼總治三省事癸亥童貫落節鉞進封徐豫國公蔡攸為少師乙丑詔正位三公立本班帶節鉞若領他職者仍舊班著為令癸酉祭地于方澤是月金人許朔武蔚三州金主阿骨打殂弟吳乞買立六月乙酉郭藥師加檢校少傅丙戌遼人張覺以平州來附己丑仲爰薨乙未詔今後內外宗室並不稱姓丁酉以安國軍節度使仲理為開府儀同三司進封嗣濮王己亥慮囚戊申鄭居中卒辛亥以蔡攸領樞密院秋七月戊午以梁師成為少保己未童貫致仕起復談稹為河北河東燕山府路宣撫使庚午太傅楚國公王黼等上尊號曰繼天興道敷文成武睿明皇帝不允禁元祐學術八月辛巳朔日當食不見辛丑命王安中作復燕雲碑壬寅太白晝見是月蕭幹破景州薊州寇掠燕山郭藥師敗之幹尋為其下所殺傳首京師九月辛酉大饗明堂冬十月乙酉雨木冰壬寅罷諸路提舉常平之不職者十一月乙卯以鄭紳為太師丙寅幸王黼第觀芝諸路漕臣坐上供錢物不足貶秩者二十二人丁卯王安中談稹並加檢校少傅郭藥師為太尉華原郡王朴薨壬申王黼子弟親屬推恩有差是月金人取平州張覺走燕山金人索之甚急命王安中縊殺函其首送之十二月乙巳金人遣高居慶等來賀正旦戊申以高平郡王棣為太保進封徐王是歲秦鳳旱河北京東淮南饑遣官振濟六年春正月乙卯為金主輟朝戊午置書藝所癸亥藏蕭幹首于大社戊寅遣連南夫弔祭金國二月丁亥以冀國公㮙為開府儀同三司進封河間郡王韶州防禦使令蕩為婺州觀察使封安定郡王己亥躬耕藉田丙午詔自今非歷臺閣寺監監司郡守開封府曹官者不得為郎官卿監著為令李邦彥以父憂去位三月己酉朔以錢景臻為少師金人來丐糧不與閏月辛巳皇后親蠶庚子御集英殿策進士夏四月癸丑賜禮部奏名進士及第出身八百五人丁巳李邦彥起復五月壬寅慮囚癸卯金人遣使來告嗣位六月壬子詔以收復燕雲以來京東兩河之民困於調度令京西淮浙江湖四川閩廣並納免夫錢期以兩月納足違者從軍法秋七月戊子遣許亢宗賀金國嗣位丁酉詔應係御筆斷罪不許詣尚書省陳訴改正壬寅詔宗室后妃戚里宰執之家概敷免夫錢甲辰置璣衡所八月乙卯談稹落太尉罷宣撫使童貫落致仕領樞密院代之丁巳以溢機堡為安羌城壬戌以復燕雲赦天下九月乙亥以白時中為特進太兼門下侍郎李邦彥為少宰兼中書侍郎蔡攸落節鉞辛巳大饗明堂丁亥以趙野為尚書左丞翰林學士承旨宇文粹中為尚書右丞開封尹蔡懋同知樞密院庚寅以金芝産于艮嶽萬壽峯改名壽嶽庚子金人遣富謨弼等以遺留物來獻冬十月庚午詔有收藏習用蘇黃之文者並令焚毀犯者以大不恭論癸酉詔內外官並以三年為任治績著聞者再任永為式十一月丙子王黼致仕太白晝見乙酉罷應奉司丙戌令尚書省置講議司壬辰詔監司擇縣令有治績者保奏召赴都堂審察録用毋過三人十二月甲辰朔蔡京領講議司詔百官遵行元豐法制丁未詔內外侍從以上各舉所知二人癸亥蔡京落致仕領三省事是歲河北山東盜起命內侍梁方平討之京師河東陝西地大震兩河京東西浙西水環慶邠寧涇原流徙令所在振恤夏國高麗于闐羅殿入貢七年春正月癸酉朔詔赦兩河京西流民為盜者仍給復一年癸巳詔罷諸路提舉常平官屬有罪當黜者以名聞仍令三省修已廢之法二月甲辰復置鑄錢監詔御史察贓吏己酉雨木冰庚戌詔京師運米五十萬斛至燕山令工部侍郎孟揆親往措置己巳進封廣國公栻為南康郡王福國公榛為平陽郡王並開府儀同三司壬申京東轉運副使李孝昌言招安羣盜張萬仙等五萬餘人詔補官犒賜有差三月癸酉朔雨雹甲申知海州錢伯言奏招降山東寇賈進等十萬人詔補官有差丙戌以惠國公楧為開府儀同三司進封建安郡王夏四月丙辰降德音于京東河北路庚申蔡京復致仕復州縣免行錢戊辰詔行元豐官制復尚書令之名虛而勿授三公但為階官毋領三省事五月壬午封子樅為潤國公丁亥詔諸路帥臣舉將校有才略者監司舉守令有政績者歲各三人六月辛丑朔詔宗室復著姓丙午封童貫為廣陽郡王戊申詔臣僚輒與內侍來往者論罪辛亥慮囚己未以蔡攸為太保癸亥詔吏職雜流出身人毋得陳請改換乙丑罷減六尚歲貢物秋七月庚午朔詔士庶毋以天王君聖為名字及以壬戌日輔臣焚香甲戌以河間郡王㮙為太保進封沂王是月河東義勝軍叛熙河河東路地震九月辛巳大饗明堂壬辰金人以擒遼主遣李孝和等來告慶是月河東言粘罕至雲中詔童貫復宣撫有狐升御榻而坐冬十月辛亥賜曾布諡曰文肅戊午罷京畿和糴十一月庚午詔無出身待制以上年及三十通歷任滿十歲乃許任子乙亥遣使回慶金國甲申朝獻景靈宮乙酉饗太廟丙戌祀昊天上帝于圜丘赦天下庚寅以保靜軍節度使种師道為河東河北路制置使十二月乙巳童貫自太原遁歸京師己酉中山奏金人斡離不粘罕分兩道入攻郭藥師以燕山叛北邊諸郡皆陷又陷欣代等州圍太原府太常少卿傅察奉使不屈死之丙辰罷浙江諸路花石綱延福宮西城租課及內外製造局金兵犯中山府詹度禦之戊午皇太子桓為開封牧罷修蕃衍北宅今諸皇子分居十位己未下詔罪己令中外直言極諫郡邑率師勤王募草澤異才有能出奇計及使疆外者罷道官罷大晟府行幸局西城及諸局所管緡錢盡付有司以保和殿大學士宇文虛中為河北河東路宣諭使庚申詔內禪皇太子即皇帝位尊帝為教主道君太上皇帝居于龍德宮尊皇后為太上皇后靖康元年正月己巳詣亳州太清宮行恭謝禮遂幸鎮江府四月己亥還京師明年二月丁卯金人脅帝北行紹興五年四月甲子崩于五國城年五十有四七年九月甲子凶問至江南遙上尊諡曰聖文仁德顯孝皇帝廟號徽宗十二年八月乙酉梓宮還臨安十月丙寅權欑于永祐陵十二月丁卯祔太廟第十一室十三年正月己亥加上尊諡曰體神合道駿烈遜功聖文仁德憲慈顯孝皇帝贊曰宋中葉之禍章蔡首惡趙良嗣厲階然哲宗之崩徽宗未立惇謂其輕佻不可以君天下遼天祚之亡張覺舉平州來歸良嗣以為納之失信於金必啓外侮使二人之計行宋不立徽宗不納張覺金雖強何釁以伐宋哉以是知事變之來雖小人亦能知之而君子有所不能制也跡徽宗失國之由非若晉惠之愚孫皓之暴亦非有曹馬之篡奪特恃其私智小慧用心一偏疏斥正士狎近姦諛於是蔡京以狷薄巧佞之資濟其驕奢淫佚之志溺信虛無崇飾游觀困竭民力君臣逸豫相為誕謾怠棄國政日行無稽及童貫用事又佳兵勤遠稔禍速亂他日國破身辱遂與石晉重貴同科豈得諉諸數哉昔西周新造之邦召公猶告武王以不作無益害有益不貴異物賤用物況宣政之為宋承熙豐紹聖椓喪之餘而徽宗又躬蹈二事之弊乎自古人君玩物而喪志縱欲而敗度鮮不亡者徽宗甚焉故特著以為戒
