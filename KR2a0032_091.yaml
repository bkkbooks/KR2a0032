body:
  text: 宋史卷九十一志第四十四河渠一黃河上黃河自昔為中國患河渠書述之詳矣探厥本源則博望之説猶為未也大元至元二十七年我世祖皇帝命學士蒲察篤實西窮河源始得其詳今西蕃𩽆甘思南鄙曰星宿海者其源也四山之間有泉近百泓匯而為海登高望之若星宿布列故名流出復瀦曰哈剌海東出曰赤賓河合忽闌也里朮二河東北流為九渡河其水猶清騎可涉也貫山中行出西戎之都會曰闊即曰闊提者合納憐河所謂細黃河也水流已濁繞昆侖之南折而東注合乞里馬出河復繞昆侖之北自貴德西寧之境至積石經河州過臨洮合洮河東北流至蘭州始入中國北繞朔方北地上郡而東經三受降城豐東勝州折而南出龍門過河中抵潼關東出三門集津為孟津過虎牢而後奔放平壤吞納小水以百數勢益雄放無崇山巨磯以防間之旁激奔潰不遵禹迹故虎牢迤東距海口三二千里恆被其害宋為特甚始自滑臺大伾嘗兩經泛溢復禹迹矣一時姦臣建議必欲回之俾復故流竭天下之力以塞之屢塞屢決至南渡而後貽其禍於金源氏由不能順其就下之性以導之故也若江若淮若洛汴衡漳暨江淮以南諸水皆有舟楫溉灌之利者歷其事而分紀之為河渠志河入中國行太行西曲折山間不能為大患既出大岯東走赴海更平地二千餘里禹迹既湮河並為一特以隄防為之限夏秋霖潦百川衆流所會不免決溢之憂然有司所以備河者亦益工矣自周顯德初大決東平之楊劉宰相李穀監治隄自陽穀抵張秋口以遏之水患少息然決河不復故道離而為赤河太祖乾德二年遣使案行將治古隄議者以舊河不可卒復力役且大遂止但詔民治遙隄以禦衝注之患其後赤河決東平之竹村七州之地復罹水災三年秋大雨霖開封府河決陽武又孟州水漲壞中灘橋梁澶鄆亦言河決詔發州兵治之四年八月滑州河決壞靈河縣大隄詔殿前都指揮使韓重贇馬步軍都軍頭王廷義等督士卒丁夫數萬人治之被泛者蠲其秋租五年正月帝以河堤屢決分遣使行視發畿甸丁夫繕治自是歲以為常皆以正月首事季春而畢是月詔開封大名府鄆澶滑孟濮齊淄滄棣濱德博懷衛鄭等州長吏並兼本州河隄使蓋以謹力役而重水患也開寶四年十一月河決澶淵泛數州官守不時上言通判司封郎中姚恕棄市知州杜審肇坐免五年正月詔曰應緣黃汴清御等河州縣除準舊制種藝桑棗外委長吏課民別樹榆柳及土地所宜之木仍案戶籍高下定為五等第一等歲樹五十本第二等以下遞減十本民欲廣樹藝者聽其孤寡惸獨者免是月澶州修河卒賜以錢㙐役夫給以茶三月詔曰朕每念河渠潰決頗為民患故署使職以總領焉宜委官聯佐治其事自今開封等十七州府各置河堤判官一員以本州通判充如通判闕員即以本州判官充五月河大決濮陽又決陽武詔發諸州兵及丁夫凡五萬人遣潁州團練使曹翰護其役翰辭太祖謂曰霖雨不止又聞河決朕信宿以來焚香上禱于天若天災流行願在朕躬勿延于民也翰頓首對曰昔宋景公諸侯耳一發善言災星退舍今陛下憂及兆庶懇禱如是固當上感天心必不為災六月下詔曰近者澶濮等數州霖雨荐降洪河為患朕以屢經決溢重困黎元每閲前書詳究經瀆至若夏后所載但言導河至海隨山濬川未聞力制湍流廣營高岸自戰國專利堙塞故道小以妨大私而害公九河之制遂隳歷代之患弗弭凡搢紳多士草澤之倫有素習河渠之書深知疏導之策若為經久可免重勞並許詣闕上書附驛條奏朕當親覽用其所長勉副詢求當示甄奬時東魯逸人田告者纂禹元經十二篇帝聞之召至闕下詢以治水之道善其言將授以官以親老固辭歸養從之翰至河上親督工徒未幾決河皆塞太宗太平興國二年秋七月河決孟州之溫縣鄭州之滎澤澶州之頓丘皆發緣河諸州丁夫塞之又遣左衛大將軍李崇矩騎置自陝西至滄棣案行水勢視隄岸之缺亟繕治之民被水災者悉蠲其租三年正月命使十七人分治黃河隄以備水患滑州靈河縣河塞復決命西上閣門使郭守文率卒塞之七年河大漲蹙清河凌鄆州城將陷塞其門急奏以聞詔殿前承旨劉吉馳往固之八年五月河大決滑州韓村泛澶濮曹濟諸州民田壞居人廬舍東南流至彭城界入于淮詔發丁夫塞之隄久不成乃命使者按視遙堤舊址使回條奏以為治遙堤不如分水勢自孟抵鄆雖有隄防唯滑與澶最為隘狹於此二州之地可立分水之制宜於南北岸各開其一北入王莽河以通于海南入靈河以通于淮節減暴流一如汴口之法其分水河量其遠邇作為斗門啓閉隨時務乎均濟通舟運溉農田此富庶之資也不報時多陰雨河未塞帝憂之遣樞密直學士張齊賢乘傳詣白馬津用太牢加璧以祭十二月滑州言決河塞羣臣稱賀九年春滑州復言房村河決帝曰近以河決韓村發民治隄不成安可重困吾民當以諸軍代之乃發卒五萬以侍衛步軍都指揮使田重進領其役又命翰林學士宋白祭白馬津沈以太牢加璧未幾役成淳化二年三月詔長吏以下及巡河主掃使臣經度行視河堤勿致壞隳違者當置于法四年十月河決澶州陷北城壞廬舍七千餘區詔發卒代民治之是歲巡河供奉官梁睿上言滑州土脈疏岸善隤每歲河決南岸害民田請於迎陽鑿渠引水凡四十里至黎陽合大河以防暴漲帝許之五年正月滑州言新渠成帝又案圖命昭宣使羅州刺史杜彥鈞率兵夫計功十七萬鑿河開渠自韓村掃至州西鐵狗廟凡十五餘里復合于河以分水勢真宗咸平三年五月河決鄆州王陵掃浮巨野入淮泗水勢悍激侵迫州城命使率諸州丁男二萬人塞之踰月而畢始赤河決擁濟泗鄆州城中常苦水患至是霖雨彌月積潦益甚乃遣工部郎中陳若拙經度徙城若拙請徙於東南十五里陽鄉之高原詔可是年詔緣河官吏雖秩滿須水落受代知州通判兩月一巡隄縣令佐迭巡隄防轉運使勿委以他職又申嚴盜伐河上榆柳之禁景德元年九月澶州言河決橫壠掃四年又壞王八掃並詔發兵夫完治之大中祥符三年十月判河中府陳堯叟言白浮圖村河水決溢為南風激還故道明年遣使滑州經度西岸開減水河九月棣州河決聶家口五年正月本州請徙城帝曰城去決河尚十數里居民重遷命使完塞既成又決於州東南李民灣環城數十里民舍多壞又請徙於商河役興踰年雖扞護完築裁免決溢而湍流益暴壖地益削河勢高民屋殆踰丈矣民苦久役而終憂水患八年乃詔徙州於陽信之八方寺著作佐郎李垂上導河形勝書三篇並圖其略曰臣請自汲郡東推禹故道挾御河較其水勢出大伾上陽太行三山之間復西河故瀆北注大名西館陶南東北合赤河而至于海因於魏縣北析一渠正北稍西徑衡漳直北下出邢洺如夏書過洚水稍東注易水合百濟會朝河而至于海大伾而下黃御混流薄山障隄勢不能遠如是則載之高地而北行百姓獲利而契丹不能南侵矣禹貢所謂夾右碣石入于海孔安國曰河逆上此州界其始作自大伾西八十里曹公所開運渠東五里引河水正北稍東十里破伯禹古隄徑牧馬陂從禹故道又東三十里轉大伾西通利軍北挾白溝復西大河北徑清豐大名西歷洹水魏縣東暨館陶南入屯氏故瀆合赤河而北至于海既而自大伾西新發故瀆西岸析一渠正北稍西五里廣深與汴等合御河道逼大伾北即堅壤析一渠東西二十里廣深與汴等復東大河兩渠分流則三四分水猶得注澶淵舊渠矣大都河水從西大河故瀆東北合赤河而達于海然後於魏縣北發御河西岸析一渠正北稍西六十里廣深與御河等合衡漳水又冀州北界深州西南三十里決衡漳西岸限水為門西北注滹沱潦則塞之使東漸渤海旱則決之使西灌屯田此中國禦邊之利也兩漢而下言水利者屢欲求九河故道而疏之今考圖志九河並在平原而北且河壞澶滑未至平原而上已決矣則九河奚利哉漢武捨大伾之故道發頓丘之暴衝則濫兗泛齊流患中土使河朔平田膏腴千里縱容邊寇劫掠其間今大河盡東全燕陷北而禦邊之計莫大於河不然則趙魏百城富庶萬億所謂誨盜而招寇矣一日伺我飢饉乘虛入寇臨時用計者實難不如因人足財豐之時成之為易詔樞密直學士任中正龍圖閣直學士陳彭年知制誥王曾詳定中正等上言詳垂所述頗為周悉所言起滑臺而下派之為六則緣流就下湍急難制恐水勢聚而為一不能各依所導設或必成六派則是更增六處河口悠久難於隄防亦慮入滹沱漳河漸至二水淤塞益為民患又築堤七百里役夫二十一萬七千工至四十日侵占民田頗為煩費其議遂寢七年詔罷葺遙堤以養民力八月河決澶州大吳掃役徒數千築新隄亙二百四十步水乃順道八年京西轉運使陳堯佐議開滑州小河分水勢遣使視利害以聞及還請規度自三迎陽村北治之復開汊河於上遊以泄其壅溢詔可天禧三年六月乙未夜滑州河溢城西北天臺山旁俄復潰于城西南岸摧七百步漫溢州城歷澶濮曹鄆注梁山泊又合清水古汴渠東入于淮州邑罹患者三十二即遣使賦諸州薪石楗橛芟竹之數千六百萬發兵夫九萬人治之四年二月河塞羣臣入賀上親為文刻石紀功是年祠部員外郎李垂又言疏河利害命垂至大名府滑衛德貝州通利軍與長吏計度垂上言臣所至並稱黃河水入王莽沙河與西河故瀆注金赤河必慮水勢浩大蕩浸民田難於隄備臣亦以為河水所經不無為害今者決河而南為害既多而又陽武掃東石堰掃西地形汙下東河泄水又艱或者云今決處漕底坑深舊渠逆上若塞之旁必復壞如是則議塞河者誠以為難若決河而北為害雖少一旦河水注御河蕩易水徑乾寧軍入獨流口遂及契丹之境或者云因此搖動邊鄙如是則議疏河者又益為難臣於兩難之間輒畫一計請自上流引北載之高地東至大伾瀉復於澶淵舊道使南不至滑州北不出通利軍界何以計之臣請自衛州東界曹公所開運渠東五里河北岸凸處就岸實土堅引之正北稍東十三里破伯禹古隄注裴家潭徑牧馬陂又正東稍北四十里鑿大伾西山釃為二渠一逼大伾南足決古隄正東八里復澶淵舊道一逼通利軍城北曲河口至大禹所導西河故瀆正北稍東五里開南北大隄又東七里入澶淵舊道與南渠合夫如是則北載之高地大伾二山脽股之間分酌其勢浚瀉兩渠匯注東北不遠三十里復合于澶淵舊道而滑州不治自涸矣臣請以兵夫二萬自來歲二月興作除三伏半功外至十月而成其均厚埤薄俟次年可也疏奏朝議慮其煩擾罷之初滑州以天臺決口去水稍遠聊興葺之及西南堤成乃於天臺口旁築月隄六月望河復決天臺下走衛南浮徐濟害如三年而益甚帝以新經賦率慮殫困民力即詔京東西河北路經水災州軍勿復科調丁夫其守扞隄防役兵仍令長吏存恤而番休之五年正月知滑州陳堯佐以西北水壞城無外禦築大隄又疊掃於城北護州中居民復就鑿橫木下垂木數條置水旁以護岸謂之木龍當時賴焉復並舊河開枝流以分導水勢有詔嘉奬説者以黃河隨時漲落故舉物候為水勢之名自立春之後東風解凍河邊人候水初至凡一寸則夏秋當至一尺頗為信驗故謂之信水二月三月桃華始開冰泮雨積川流猥集波瀾盛長謂之桃華水春末蕪菁華開謂之菜華水四月末壟麥結秀擢芒變色謂之麥黃水五月瓜實延蔓謂之瓜蔓水朔野之地深山窮谷固陰沍寒冰堅晚泮逮乎盛夏消釋方盡而沃蕩山石水帶礬腥併流于河故六月中旬後謂之礬山水七月菽豆方秀謂之豆華水八月菼薍華謂之荻苗水九月以重陽紀節謂之登高水十月水落安流復其故道謂之復槽水十一月十二月斷冰雜流乘寒復結謂之蹙凌水水信有常率以為準非時暴漲謂之客水其水勢凡移谼橫注岸如刺毀謂之劄岸漲溢踰防謂之抹岸掃岸故朽潛流漱其下謂之塌岸浪勢旋激岸土上隤謂之淪捲水侵岸逆漲謂之上展順漲謂之下展或水乍落直流之中忽屈曲橫射謂之徑水猛驟移其將澄處望之明白謂之拽白亦謂之明灘湍怒略渟勢稍汨起行舟值之多溺謂之薦浪水水退淤澱夏則膠土肥腴初秋則黃滅土頗為疏壤深秋則白滅土霜降後皆沙也舊制歲虞河決有司常以孟秋預調塞治之物梢芟薪柴楗橛竹石茭索竹索凡千餘萬謂之春料詔下瀕河諸州所産之地仍遣使會河渠官吏乘農隙率丁夫水工收采備用凡伐蘆荻謂之芟伐山木榆柳枝葉謂之梢辮竹糾芟為索以竹為巨索長十尺至百尺有數等先擇寬平之所為掃場掃之制密布芟索鋪梢梢芟相重壓之以土雜以碎石以巨竹索橫貫其中謂之心索卷而束之復以大芟索繫其兩端別以竹索自內旁出其高至數丈其長倍之凡用丁夫數百或千人雜唱齊挽積置於卑薄之處謂之掃岸既下以橛臬閡之復以長木貫之其竹索皆埋巨木於岸以維之遇河之橫決則復增之以補其缺凡掃下非積數疊亦不能遏其迅湍又有馬頭鋸牙木岸者以蹙水勢護隄焉凡緣河諸州孟州有河南北凡二掃開封府有陽武掃滑州有韓房二村憑管石堰州西魚池迎陽凡七掃舊有七里曲掃後廢通利軍有齊賈蘇村凡二掃澶州有濮陽大韓大吳商胡王楚橫隴曹村依仁大北岡孫陳固明公王八凡十三掃大名府有孫杜侯村二掃濮州有任村東西北凡四掃鄆州有博陵張秋關山子路王陵竹口凡六掃齊州有采金山史家渦二掃濱州有平河安定二掃棣州有聶家梭堤鋸牙陽成四掃所費皆有司歲計而無闕焉仁宗天聖元年以滑州決河未塞詔募京東河北陝西淮南民輸薪芻調兵伐瀕河榆柳賙溺死之家二年遣使詣滑衛行視河勢五年發丁夫三萬八千卒二萬一千緡錢五十萬塞決河轉運使五日一奏河事十月丙申塞河成以其近天臺山麓名曰天臺掃宰臣王曾率百官入賀十二月濬魚池掃減水河六年八月河決于澶州之王楚掃凡三十步八年始詔河北轉運司計塞河之備良山令陳曜請疏鄆滑界糜丘河以分水勢遂遣使行視遙隄明道二年徙大名之朝城縣于杜婆村廢鄆州之王橋渡淄州之臨河鎮以避水景祐元年七月河決澶州橫隴掃慶曆元年詔權停修決河自此久不復塞而議開分水河以殺其暴未興工而河流自分有司以聞遣使特祠之三月命築隄于澶以扞城八年六月癸酉河決商胡掃決口廣五百五十七步乃命使行視河隄皇祐元年三月河合永濟渠注乾寧軍二年七月辛酉河復決大名府館陶縣之郭固四年正月乙亥塞郭固而河勢猶壅議者請開六塔以披其勢至和元年遣使行度故道且詣銅城鎮海口約古道高下之勢二年翰林學士歐陽修奏疏曰朝廷欲俟秋興大役塞商胡開橫隴回大河於古道夫動大衆必順天時量人力謀於其始而審於其終然後必行計其所利者多乃可無悔比年以來興役動衆勞民費財不精謀慮於厥初輕信利害之偏説舉事之始既已蒼皇羣議一搖尋復悔罷不敢遠引他事且如河決商胡是時執政之臣不慎計慮遽謀修塞凡科配梢芟一千八百萬騷動六路一百餘軍州官吏催驅急若星火民庶愁苦盈於道塗或物已輸官或人方在路未及興役尋已罷修虛費民財為國斂怨舉事輕脫為害若斯今又聞復有修河之役三十萬人之衆開一千餘里之長河計其所用物力數倍往年當此天災歲旱民困國貧之際不量人力不順天時知其有大不可者五蓋自去秋至春半天下苦旱京東尤甚河北次之國家常務安靜振恤之猶恐民起為盜況於兩路聚大衆興大役乎此其必不可者一也河北自恩州用兵之後繼以凶年人戶流亡十失八九數年以來人稍歸復然死亡之餘所存者幾瘡痍未斂物力未完又京東自去冬無雨雪麥不生苗將踰暮春粟未布種農心焦勞所向無望若別路差夫又遠者難為赴役一出諸路則兩路力所不任此其必不可者二也往年議塞滑州決河時公私之力未若今日之貧虛然猶儲積物料誘率民財數年之間始能興役今國用方乏民力方疲且合商胡塞大決之洪流此一大役也鑿橫隴開久廢之故道又一大役也自橫隴至海千餘里掃岸久已廢頓須興緝又一大役也往年公私有力之時興一大役尚須數年今猝興三大役於災旱貧虛之際此其必不可者三也就令商胡可塞故道未必可開鯀障洪水九年無功禹得洪範五行之書知水潤下之性乃因水之流疏而就下水患乃息然則以大禹之功不能障塞但能因勢而疏決爾今欲逆水之性障而塞之奪洪河之正流使人力斡而回注此大禹之所不能此其必不可者四也橫隴湮塞已二十年商胡決又數歲故道已平而難鑿安流已久而難回此其必不可者五也臣伏思國家纍歲災譴甚多其於京東變異尤大地貴安靜而有聲巨嵎山摧海水搖蕩如此不止者僅十年天地警戒宜不虛發臣謂變異所起之方尤當過慮防懼今乃欲於凶艱之年聚三十萬之大衆於變異最大之方臣恐災禍自茲而發也況京東赤地千里飢饉之民正苦天災又聞河役將動往往伐桑毀屋無復生計流亡盜賊之患不可不虞宜速止罷用安人心九月詔自商胡之決大河注金堤寖為河北患其故道又以河北京東飢故未興役今河渠司李仲昌議欲納水入六塔河使歸橫隴舊河舒一時之急其令兩制至待制以上臺諫官與河渠司同詳定修又上疏曰伏見學士院集議修河未有定論豈由賈昌朝欲復故道李仲昌請開六塔互執一説莫知孰是臣愚皆謂不然言故道者未詳利害之原述六塔者近乎欺罔之繆今謂故道可復者但見河北水患而欲還之京東然不思天禧以來河水屢決之因所以未知故道有不可復之勢臣故謂未詳利害之原也若言六塔之利者則不待攻而自破矣今六塔既已開而恩冀之患何為尚告奔騰之急此則減水未見其利也又開六塔者云可以全回大河使復橫隴故道今六塔止是別河下流已為濱棣德博之患若全回大河顧其害如何此臣故謂近乎欺罔之繆也且河本泥沙無不淤之理淤常先下流下流淤高水行漸壅乃決上流之低處此勢之常也然避高就下水之本性故河流已棄之道自古難復臣不敢廣述河源且以今所欲復之故道言天禧以來屢決之因初天禧中河出京東水行於今所謂故道者水既淤澀乃決天臺掃尋塞而復故道未幾又決於滑州南鐵狗廟今所謂龍門掃者其後數年又塞而復故道已而又決王楚掃所決差小與故道分流然而故道之水終以壅淤故又於橫隴大決是則決河非不能力塞故道非不能力復所復不久終必決於上流者由故道淤而水不能行故也及橫隴既決水流就下所以十餘年間河未為患至慶曆三四年橫隴之水又自海口先淤凡一百四十餘里其後遊金赤三河相次又淤下流既梗乃決於上流之商胡口然則京東橫隴兩河故道皆下流淤塞河水已棄之高地京東故道屢復屢決理不可復不待言而易知也昨議者度京東故道功料但云銅城已上乃特高爾其東比銅城以上則稍低比商胡已上則實高也若云銅城以東地勢斗下則當日水流宜決銅城已上何緣而頓淤橫隴之口亦何緣而大決也然則兩河故道既皆不可為則河北水患何為而可去臣聞智者之於事有所不能必則較其利害之輕重擇其害少者而為之猶愈害多而利少何況有害而無利此三者可較而擇也又商胡初決之時欲議修塞計用梢芟一千八百萬科配六路一百餘州軍今欲塞者乃往年之商胡則必用往年之物數至於開鑿故道張奎所計工費甚大其後李參減損猶用三十萬人然欲以五十步之狹容大河之水此可笑者又欲增一夫所開三尺之方倍為六尺且闊厚三尺而長六尺自一倍之功在於人力已為勞苦云六尺之方以開方法算之乃八倍之功此豈人力之所勝是則前功既大而難興後功雖小而不實大抵塞商胡開故道凡二大役皆困國勞人所舉如此而欲開難復屢決已驗之故道使其虛費而商胡不可塞故道不可復此所謂有害而無利者也就使幸而暫塞以紓目前之患而終於上流必決如龍門橫隴之比此所謂利少而害多也若六塔者於大河有減水之名而無減患之實今下流所散為患已多若全回大河以注之則濱棣德博河北所仰之州不勝其患而又故道淤澀上流必有他決之虞此直有害而無利耳是皆智者之不為也今若因水所在增治隄防疏其下流浚以入海則可無決溢散漫之虞今河所歷數州之地誠為患矣隄防歲用之夫誠為勞矣與其虛費天下之財虛舉大衆之役而不能成功終不免為數州之患勞歲用之夫則此所謂害少者乃智者之所宜擇也大約今河之勢負三決之虞復故道上流必決開六塔上流亦決河之下流若不浚使入海則上流亦決臣請選知水利之臣就其下流求入海路而浚之不然下流梗澀則終虞上決為患無涯臣非知水者但以今事可驗者較之耳願下臣議裁取其當焉預議官翰林學士承旨孫抃等言開故道誠久利然功大難成六塔下流可導而東去以紓恩冀金堤之患十二月中書上奏曰自商胡決為大名恩冀患先議開銅城道塞商胡以功大難卒就緩之而憂金堤泛溢不能捍也願備工費因六塔水勢入橫隴宜令河北京東預完堤掃上河水所居民田數詔下中書奏以知澶州事李璋為總管轉運使周沆權同知潭州內侍都知鄧保吉為鈐轄殿中丞李仲昌提舉河渠內殿承制張懷恩為都監而保吉不行以內侍押班王從善代之以龍圖閣直學士施昌言總領其事提點開封府界縣鎮事蔡挺勾當河渠事楊緯同修河決修又奏請罷六塔之役時宰相富弼尤主仲昌議疏奏亦不省嘉祐元年四月壬子朔塞商胡北流入六塔河不能容是夕復決溺兵夫漂芻藁不可勝計命三司鹽鐵判官沈立往行視而修河官皆謫宦者劉恢奏六塔之役水死者數千萬人穿土干禁忌且河口乃趙征村於國姓御名有嫌而大興臿斸非便詔御史吳中復內侍鄧守恭置獄于澶劾仲昌等違詔旨不俟秋冬塞北流而擅進約以致決潰懷恩仲昌仍坐取河材為器懷恩流潭州仲昌流英州施昌言李璋以下再謫蔡挺奪官勒停仲昌垂子也由是議者久不復論河事五年河流派別于魏之第六掃曰二股河其廣二百尺自二股河行一百三十里至魏恩德博之境曰四界首河七月都轉運使韓贄言四界首古大河所經即溝洫志所謂平原金堤開通大河入篤馬河至海五百餘里者也自春以丁壯三千浚之可一月而畢支分河流入金赤河使其深六尺為利可必商胡決河自魏至于恩冀乾寧入于海今二股河自魏恩東至于德滄入于海分而為二則上流不壅可以無決溢之患乃上四界首二股河圖七年七月戊辰河決大名第五掃英宗治平元年始命都水監浚二股五股河以紓恩冀之患初都水監言商胡堙塞冀州界河淺房家武邑二掃由此潰慮一旦大決則甚於商胡之患乃遣判都水監張鞏戶部副使張燾等行視遂興工役卒塞之神宗熙寧元年六月河溢恩州烏欄堤又決冀州棗強掃北注瀛七月又溢瀛州樂壽掃帝憂之顧問近臣司馬光等都水監丞李立之請於恩冀深瀛等州創生堤三百六十七里以禦河而河北都轉運司言當用夫八萬三千餘人役一月成今方災傷願徐之都水監丞宋昌言謂今二股河門變移請迎河港進約簽入河身以紓四州水患遂與屯田都監內侍程昉獻議開二股以導東流於是都水監奏慶曆八年商胡北流于今二十餘年自澶州下至乾寧軍創堤千有餘里公私勞擾近歲冀州而下河道梗澀致上下掃岸屢危今棗強抹岸衝奪故道雖創新堤終非久計願相六塔舊口並二股河導使東流徐塞北流而提舉河渠王亞等謂黃御河帶北行入獨流東寨經乾寧軍滄州等八寨邊界直入大海其近海口闊六七百步深八九丈三女寨以西闊三四百步深五六丈其勢愈深其流愈猛天所以限契丹議者欲再開二股漸閉北流此乃未嘗覩黃河在界河內東流之利也十一月詔翰林學士司馬光入內內侍省副都知張茂則乘傳相度四州生堤回日兼視六塔二股利害二年正月光入對請如宋昌言策於二股之西置上約劈水令東俟東流漸深北流淤淺即塞北流放出御河胡盧河下紓恩冀深瀛以西之患初商胡決河自魏之北至恩冀乾寧入于海是謂北流嘉祐五年河流派于魏之第六掃遂為二股自魏恩東至于德滄入于海是謂東流時議者多不同李立之力主生堤帝不聽卒用昌言説置上約三月光奏治河當因地形水勢若強用人力引使就高橫立堤防則逆激旁潰不惟無成仍敗舊績臣慮官吏見東流已及四分急於見功遽塞北流而不知二股分流十里之內相去尚近地勢復東高西下若河流併東一遇盛漲水勢西合入北流則東流遂絶或於滄德堤掃未成之處決溢橫流雖除西路之患而害及東路非策也宜專護上約及二股堤岸若今歲東流止添二分則此去河勢自東近者二三年遠者四五年候及八分以上河流衝刷已闊滄德堤掃已固自然北流日減可以閉塞兩路俱無害矣會北京留守韓琦言今歲兵夫數少而金堤兩掃修上下約甚急深進馬頭欲奪大河緣二股及嫩灘舊闊千一百步是以可容漲水今截去八百步有餘則將束大河於二百餘步之間下流既壅上流蹙遏湍怒又無兵夫修護堤岸其衝決必矣況自德至滄皆二股下流既無堤防必侵民田設若河門束狹不能容納漲水上下約隨流而脫則二股與北流為一其患愈大又恩深州所創生堤其東則大河西來其西則西山諸水東注腹背受水兩難扞禦望選近臣速至河所與在外官合議帝在經筵以琦奏諭光命同茂則再往四月光與張鞏李立之宋昌言張問呂大防程昉行視上約及方鋸牙濟河集議於下約光等奏二股河上約並在灘上不礙河行但所進方鋸牙已深致北流河門稍狹乞減折二十步令近後仍作蛾眉掃裹護其滄德界有古遙堤當加葺治所修二股本欲疏導河水東去生堤本欲捍禦河水西來相為表𩹉未可偏廢帝因謂二府曰韓琦頗疑修二股趙抃曰人多以六塔為戒王安石曰異議者皆不考事實故也帝又問程昉宋昌言同修二股如何安石以為可治帝曰欲作簽河甚善安石曰誠然若及時作之往往河可東北流可閉因言李立之所築生堤去河遠者至八九十里本計以禦漫水而不可禦河南之向著臣恐漫水亦不可禦也帝以為然五月丙寅乃詔立之乘驛赴闕議之六月戊申命司馬光都大提舉修二股工役呂公著言朝廷遣光相視董役非所以褒崇近職待遇儒臣也乃罷光行七月二股河通快北流稍自閉戊子張鞏奏上約纍經泛漲並下約各已無虞東流勢漸順快宜塞北流除恩冀深瀛永靜乾寧等州軍水患又使御河胡盧河下流各還故道則漕運無壅遏郵傳無滯留塘泊無淤淺復於邊防大計不失南北之限歲減費不可勝數亦使流移歸復實無窮之利且黃河所至古今未嘗無患較利害輕重而取舍之可也惟是東流南北隄防未立閉口修堤工費甚夥所當預備望選習知河事者與臣等講求具圖以聞乃復詔光茂則及都水監官河北轉運使同相度閉塞北流利害有所不同各以議上八月己亥光入辭言鞏等欲塞二股河北流臣恐勞費未易或幸而可塞則東流淺狹隄防未全必致決溢是移恩冀深瀛之患於滄德等州也不若俟三二年東流益深闊堤防稍固北流漸淺薪芻有備塞之便帝曰東流北流之患孰輕重光曰兩地皆王民無輕重然北流已殘破東流尚全帝曰今不俟東流順快而塞北流他日河勢改移奈何光曰上約固則東流日增北流日減何憂改移若上約流失其事不可知惟當併力護上約耳帝曰上約安可保光曰今歲創修誠為難保然昨經大水而無虞來歲地腳已牢復何慮且上約居河之側聽河北流猶懼不保今欲橫截使不行庸可保乎帝曰若河水常分二流何時當有成功光曰上約苟存東流必增北流必減借使分為二流於張鞏等不見成功於國家亦無所害何則西北之水併於山東故為害大分則害小矣鞏等亟欲塞北流皆為身謀不顧國力與民患也帝曰防捍兩河何以供億光曰併為一則勞費自倍分二流則勞費減半今減北流財力之半以備東流不亦可乎帝曰卿等至彼視之時二股河東流及六分鞏等因欲閉斷北流帝意嚮之光以為須及八分乃可仍待其自然不可施功王安石曰光議事屢不合今令視河後必不從其議是重使不安職也庚子乃獨遣茂則茂則奏二股河東傾已及八分北流止二分張鞏等亦奏丙午大河東徙北流淺小戊申北流閉詔奬諭司馬光等仍賜衣帶馬時北流既塞而河自其南四十里許家港東決泛濫大名恩德滄永靜五州軍境三年二月命茂則鞏相度澶滑州以下至東流河勢隄防利害時方濬御河韓琦言事有緩急工有後先今御河漕運通駛未至有害不宜減大河之役乃詔輟河夫卒三萬三千專治東流
