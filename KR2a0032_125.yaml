body:
  text: 宋史卷一百二十五志第七十八禮二十八凶禮四士庶人喪禮服紀士庶人喪禮開寶三年十月詔開封府禁喪葬之家不得用道釋威儀及裝束異色人物前引太平興國七年正月命翰林學士李昉等重定士庶喪葬制度昉等奏議曰唐大曆七年詔喪葬之家送葬祭盤只得於喪家及塋所置祭不得於街衢張設又長慶三年令百姓喪葬祭奠不得以金銀錦繡為飾及陳設音樂葬物稍涉僭越並勒毀除臣等參詳子孫之葬父祖卑幼之葬尊親全尚朴素即有傷孝道其所用錦繡伏請不加禁斷其用音樂及欄街設祭身無官而葬用方相者望嚴禁之其詔葬設祭者不在此限又準後唐長興二年詔五品六品常參官喪輿舁者二十人挽歌八人明器三十事共置八牀七品常參官舁者十六人挽歌六人明器二十事置六牀六品以下京官及檢校試官等舁者十二人挽歌四人明器十五事置五牀並許設紗籠二庶人舁者八人明器十二事置兩牀悉用香輿魂車其品官葬祖父母父母品卑者聽以子品葬妻子者遞降一等其四品以上依令式施行望令御史臺街司頒行限百日率從新制限滿違者以違禁之物給巡司為賞喪家輒舉樂者譴伶人他不如制者但罪下里工作從之九年詔曰訪聞喪葬之家有舉樂及令章者蓋聞鄰里之內喪不相舂苴麻之旁食未嘗飽此聖王教化之道治世不刊之言何乃匪人親罹釁酷或則舉奠之際歌吹為娛靈柩之前令章為戲甚傷風教實紊人倫今後有犯此者並以不孝論預坐人等第科斷所在官吏常加覺察如不用心並當連坐景德二年開封府言文武官亡歿諸寺擊鐘未有定制欲望自今大卿監大將軍觀察使命婦郡夫人已上即據狀聞奏許於天清開寶二寺擊鐘其聲數旋俟進止自餘悉禁從之紹興二十七年監登聞鼓院范同言今民俗有所謂火化者生則奉養之具唯恐不至死則燔而棄捐之何獨厚於生而薄於死乎甚者焚而置之水中識者見之動心國朝著令貧無葬地者許以係官之地安葬河東地狹人衆雖至親之喪悉皆焚棄韓琦鎮并州以官錢市田數頃給民安葬至今為美談然則承流宣化使民不畔於禮法正守臣之職也方今火葬之慘日益熾甚事關風化理宜禁止仍飭守臣措置荒間之地使貧民得以收葬少裨風化之美從之二十八年戶部侍郎榮薿言比因臣僚陳請禁火葬令州郡置荒間之地使貧民得以收葬誠為善政臣聞吳越之俗葬送費廣必積纍而後辦至於貧下之家送終之具唯務從簡是以從來率以火化為便相習成風勢難遽革况州縣休息之久生聚日繁所用之地必須寬廣仍附郭近便處官司以艱得之故有未行摽撥者既葬埋未有處所而行火化之禁恐非人情所安欲乞除豪富士族申嚴禁止外貧下之民并客旅遠方之人若有死亡姑從其便候將來州縣摽撥到荒間之地別行取旨詔依仍令諸州依已降指揮措置摽撥服紀宋天子及諸臣服制前史皆散記諸禮中未嘗特録之也後史則表而出之高宗於外廷以日易月於內廷則行三年之禮御朝則淺素淺黃孝宗又力持三年之制皇帝未成服則素紗軟腳幞頭白羅袍黑銀帶絲鞋成服日布梁冠朱熹云當用十二梁首絰直領布大袖衫朱熹云不當用襴蓋下已有裙布裙袴腰絰竹杖白綾襯衫或斜巾帽子視事日去杖首絰小祥日改服布幞頭襴衫腰絰布袴大祥畢服素紗軟腳幞頭白羅袍素履黑銀帶禫祭畢素紗軟腳幞頭淺色黃羅袍黑銀帶祔廟日服履黃袍紅帶御正殿視事則皂幞頭淡黃袍黑犀帶素絲鞋此中興後制也孝宗居憂再定三年之制其服布冠直領大袖衫布裙首絰腰絰竹杖小祥不易服大祥禮畢始去杖去絰禫祭畢始服素紗軟腳幞頭白袍黑銀帶祔廟畢服皂幞頭黑犀帶每遇過宮廟謁則衰絰行禮二十五月而除三年之內禁中常服布巾布衫布背子視事則御內殿服白布幞頭白布袍黑銀帶殿設素幄每五日一次過宮則衰絰而杖虞祭則布折上巾黑帶布袍受金使弔則衰絰御德壽殿東廊之素幄受賀節使則御垂拱殿東楹之素幄是時宰執近臣皆不肯行惟斷自上心堅不可奪大臣乃不敢言贊其決者惟敕局下僚沈清臣一人而已臣為君服宋制有三等中書門下樞密使副尚書翰林學士節度使金吾上將軍文武二品以上布梁冠直領大袖衫布裙袴腰絰竹杖或布幞頭襴衫布斜巾絹襯服文武五品以上並職事官監察御史以上內客省宣政昭宣知閣門事前殿都知押班布梁冠直領大袖衫裙袴腰絰或幞頭襴衫自餘文武百官布幞頭襴衫腰絰而已入局治事並不易服宰執奏事去杖小祥去冠餘官奏事如之大祥素紗軟腳折上巾黲公服白錫帶禫除畢去黲服常服仍黑帶皂鞍韉祔廟畢始純吉服宗室出則常服居則衰麻以終制光宗居孝宗之憂趙汝愚當國始令羣臣服白涼衫皂帶治事逮終制乃止寧宗居光宗之憂復令百官以日易月禫除畢服紫衫皂帶以治事從禮部侍郎陳宗召請也諸路監司州軍縣鎮長吏以下服布四腳直領布襴衫麻腰絰朝晡臨三日除之內外命婦當入臨者布裙衫帔首絰絹襯衫帕首士庶於本家素服三日而除婚嫁服除外不禁文武臣僚之家至山陵祔畢乃許嫁娶仍不用花綵及樂淳熙十四年十月以將作監韋璞充金國告哀使閣門舍人薑特立副之禮部太常寺言告哀使副並三節人從禮例如在大祥內合服布幞頭襴衫布袴腰絰布涼繖鞍韉在禫服內合服素紗軟腳幞頭黲色公服黑犀帶青繖皂鞍韉俟禫除即從吉服仍繫黑帶去魚涼繖韉並從禫制並去狨座三節人衣紫衫黑帶並不聽樂不射弓弩候過界聽使副審度隨宜改易服用從之或遣留遺信物使同上服喪服雜議慶曆七年侍御史吳鼎臣言武班及諸職司人吏曾因親喪出入禁門甚有裹素紗幞頭者殊失肅下尊上之禮欲乞文武兩班除以官品起復許裹素紗外其餘臣僚並諸職司人吏雖有親喪服未除並須光紗加首不得更裹素紗詔送太常禮院禮官言準令文凶服不入公門其遭喪被起在朝參處常服各依品服惟色以淺無金玉飾在家依其服制其被起者及期喪以下居式假者衣冠朝集皆聽不預今鼎臣所奏有礙令文詔依所定如遇筵宴其服淺色素紗人更不令祗應丁父母憂淳化五年八月詔曰孝為百行之本喪有三年之制著于典禮以厚人倫中外文武官子弟或父兄之淪亡蒙朝廷之齒未及卒哭已聞蒞官遽忘哀戚頗玷風教自今文武官子弟有因父亡兄歿特被用未經百日不得趣赴公參御史臺專加糾察並有冒哀求仕釋服從吉者並以名聞咸平元年詔任三司館閣職事者丁憂並令持服又詔川峽廣南褔建路官丁憂不得離任既受代而喪制未畢者許其終制尋令川峽官除州軍長吏奏裁餘並許解官大中祥符九年殿中侍御史張廓言京朝官丁父母憂者多因陳乞與免持服且忠孝恩義士所執守一悖于禮其何能立今執事盈庭各務簡易况無金革之事中外之官不闕不可習以為例望自後並依典禮三年服滿得赴朝請天禧四年御史臺言文武官並丁憂者相承服五十四月別無條例下太常禮官議曰按禮喪服小記云父母之喪偕先葬者不虞祔待後事其葬服斬衰注謂同月若同日死也先葬者母也其葬服斬衰者喪之隆哀宜從重也假令父死在前月而同月葬猶服斬衰不葬不變服也言其葬服斬衰則虞祔各以其服矣及練祥皆然卒事反服重雜記云有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服注云沒猶終也除服謂祥祭之服卒事既祭反喪服服後死者之服又杜預云若父母同日卒其葬先母後父皆服斬衰其虞祔先父後母各服其服卒事反服父服若父已葬而母卒則服母之服虞訖反服父之服既除練則服母之服喪可除則服父之服以除之訖則服母之服賀循云父之喪未終又遭母喪當父服應終之月皆服祥祭之服如除喪之禮卒事反母之服臣等參考典故則是隨其先後而除之無通服五十四月之文請依舊禮改正慶曆三年太常禮院議禮記父母之喪無貴賤一也又曰三年之喪人道之至大也請不以文武品秩高下並聽終喪時以武臣入流者雜難盡解官詔自今三司副使已上非領邊寄並聽終制仍續月奉武臣非在邊而願解官者聽凡奪情之制文臣諫舍以上牧伯刺史以上皆卒哭後恩制起復其在切要者不候卒哭內職遭喪但給假而已願終喪者亦聽惟京朝幕職州縣官皆解官行服亦有特追出者凡公除與祭景祐二年禮儀使言天聖五年太常禮院言自來宗廟祠祭皆宰臣參知政事行事每有服制旋復改差多致妨闕檢會唐會要貞元六年詔百官有私喪公除者聽赴宗廟之祭監祭御史以禮有緦麻已上喪不得饗廟移牒吏部詰之吏部奏準禮諸侯絶周大夫絶緦者所以殺旁親不敢廢大宗之祭事則緦不祭者謂同宮未葬欲人吉凶不相黷也魏晉已降變而從權緦已上喪服假滿即吉謂之公除凡既葬公除則無事不可故於祭無妨乞今凡有慘服既葬公除及聞哀假滿許吉服赴祭同宮未葬雖公除依前禁之詔從又王涇郊祀録緦麻已上喪不行宗廟之祭者以明吉凶不相干也貞元吏部奏請得許權改吉服以從宗廟之祭此一時之事非舊典也今本院看詳律稱如有緦麻已上喪遣充掌事者笞五十此唐初所定吏部起請皆援引典故奉詔百官有私喪公除者聽赴宗廟之祭後雖王涇著郊祀録稱是一時之事非舊典也又別無詔敕改更是以歷代止依貞元詔命施行至大中祥符中詳定官請依郊祀録緦麻以上喪不預宗廟之祭今詳貞元起請證據分明王涇所説別無典故望自今後有私喪公除者聽赴宗廟之祭免致廢闕慶曆七年禮官邵必言古之臣子未有居父母喪而輒與國家大祭者今但不許入宗廟至於南郊壇景靈宮皆許行事按唐吏部所請慘服既葬公除者謂周以下也前後相承誤以為三年之喪得吉服從祭失之甚也又據律文諸廟享有緦麻以上喪不許執事祭天地社稷不禁此唐之定律者不詳經典意也王制曰喪三年不祭惟天地社稷為越紼而行事注云不敢以卑廢尊也是指王者不敢以私親之喪廢天地社稷之祭非謂臣下有父母喪而得從天子祭天地社稷也兼律文所以不禁者亦止謂緦麻以上周以下故也南郊太廟俱為吉祀奉承之意無容異禮今居父母喪不得入太廟至南郊則為愈重朝廷每因大禮侍祠之官普有霑賚使居喪之人得預祠事是不欲慶澤之行有所不被奈何以小惠而傷大禮近歲兩制以上並許終喪惟於武臣尚仍舊制是亦取古之墨縗從事金革無避之義也然於郊祀吉禮則為不可下禮院議曰郊祀大禮國之重事百司聯職僅取齊集若居喪被起之官悉不與事則或有妨闕但不以慘粗之容接於祭次則亦可行請依太常新禮宗室及文武官有遭喪被起及卒哭赴朝參者遇大朝會聽不入若緣郊廟大禮惟不入宗廟其郊壇景靈宮得權從吉服陪位或差攝行事詔可天聖五年侍講學士孫奭言伏見禮院及刑法司外州執守服制詞旨俚淺如外祖卑於舅姨大功加於嫂叔顛倒謬妄難可遽言臣於開寶正禮録出五服年月並見行喪服制度編祔假寧令請下兩制禮院詳定翰林學士承旨劉筠等言奭所上五服制度皆應禮經然其義簡奧世俗不能盡通今解之以就平易若兩相為服無所降殺舊皆言服者具載所為服之人其言周者本避唐諱合復為期又節取假寧令附五服敕後以便有司仍板印頒行而喪服親疏隆殺之紀始有定制矣子為嫁母景祐二年禮官宋祁言前祠部員外郎集賢校理郭稹幼孤母邊更嫁有子稹無伯叔兄弟獨承郭氏之祭今邊不幸而稹解官行服按五服制度敕齊衰杖期降服之條曰父卒母嫁及出妻之子為母其左方注謂不為父後者若為父後者則為嫁母無服詔議之侍御史劉夔曰按天聖六年敕開元五服制度開寶正禮並載齊衰降服條例雖與祁言不異然假寧令諸喪斬齊三年並解官齊衰杖期及為人後者為其父母若庶子為後為其母亦解官申心喪母出及嫁為父後者雖不服亦申心喪注云皆為生己者律疏云心喪者為妾子及出妻之子合降其服二十五月內為心喪再詳格令子為嫁母雖為父後者不服亦當申心喪又稱居心喪者釋服從吉及忘哀作樂冒哀求仕者並同父母正服今龍圖閣學士王博文御史中丞杜衍嘗為出嫁母解官行喪若使生為母子沒同路人則必虧損名教上玷孝治且杖期降服之制本出開元禮文逮乎天寶降敕俾終三年然則當時已悟失禮晉袁準謂為人後猶服嫁母據外祖異族猶廢祭行服知父後應服嫁母劉智釋云雖為父後猶為嫁母齊衰譙周云非父所絶為之服周可也昔孔鯉之妻為子思之母鯉卒而嫁於衛故檀弓曰子思之母死柳若謂子思曰子聖人之後也四方於子乎觀禮子盍慎諸子思曰吾何慎哉喪之禮如子云子聖人之後即父後也石苞問淳于睿為父後者不為出母服嫁母猶出母也或者以為嫁與出不異不達禮意雖執從重之義而以廢祭見譏君為詳正睿引子思之義為答且言聖人之後服嫁母明矣稹之行服是不為過詔兩制御史臺禮院再議曰按儀禮父卒繼母嫁為之服期謂非生己者故父卒改嫁降不為己母唐上元元年敕父在為母尚許服三年今母嫁既是父終得申本服唐紹議曰為父後者為嫁母杖周不為父後者請不降服至天寶六載敕五服之紀所宜企及三年之數以報免懷其嫁母亡宜終三年又唐八坐議吉凶加減禮云凡父卒親母嫁齊衰杖期為父後者亦不服不以私親廢祭祀惟素服居堊室心喪三年免役解官母亦心服之母子無絶道也按通禮五服制度父卒母嫁及出妻之子為母及為祖後祖在為祖母雖周除仍心喪三年侍講學士馮元言儀禮禮記正義古之正禮開寶通禮五服年月敕國朝見行典制為父後者為出母無服惟通禮義纂引唐天寶六年制出母嫁母並終服三年又引劉智釋議雖為父後猶為出母嫁母齊衰卒哭乃除蓋天寶之制言諸子為出母嫁母故云並終服三年劉智言為父後者為出母嫁母故云猶為齊衰卒哭乃除各有所謂固無疑也况天聖五服年月敕父卒母嫁及出妻之子為母降杖期則天寶之制已不可行又但言母出及嫁為父後者雖不服亦申心喪即不言解官若專用禮經則是全無服式若俯同諸子杖期又於條制相戾請凡子為父後無人可奉祭祀者依通禮義纂劉智釋議服齊衰卒哭乃除踰月乃祭仍申心喪則與儀禮禮記正義通典通禮五服年月敕為父後為出母嫁母無服之言不遠如諸子非為父後者為出母嫁母依五服年月敕降服齊衰杖期亦解官申心喪則與通禮五服制度言雖周除仍心喪三年及刑統言出妻之子合降其服皆二十五月內為心喪其義一也郭稹應得子為父後之條緣其解官行服已過期年難於追改後當依此施行詔自今並聽解官以申心喪子為生母大中祥符八年樞密使王欽若言編修册府元龜官太常博士祕閣校理聶震丁所生母憂嫡母尚在望特免持服禮官言按周制庶子在父之室則為其母不禫晉解遂問蔡謨曰庶子喪所生嫡母尚存不知制服輕重答云士之妾子服其母與凡人喪母同鍾陵胡淡所生母喪自有嫡兄承統而嫡母存疑不得三年問范宣答曰為慈母且猶三年况親所生乎嫡母雖尊然厭降之制父所不及婦人無專制之事豈得引父為比而屈降支子也南齊褚淵遭庶母郭氏喪葬畢起為中軍將軍後嫡母吳郡公主薨葬畢令攝職則震當解官行服心喪三年若特有奪情之命望不以追出為名自今顯官有類此者亦請不稱起復第遣釐職熙寧三年詔御史臺審決秀州軍事判官李定追服所生母喪御史臺言在法庶子為父後如嫡母存為所生母服緦三月仍解官申心喪若不為父後為所生母持齊衰三年正服而禫今定所生仇氏亡日定未嘗請解官持心喪止以父老乞還侍養宜依禮制追服緦麻而解官心喪三年時王安石芘定擢為太子中允而言者俱罷免婦為舅姑乾德三年判大理寺尹拙言按律及儀禮喪服傳開元禮儀纂五禮精義三禮圖等書所載婦為舅姑服周近代時俗多為重服劉嶽書儀有奏請之文禮圖刑統乃邦家之典豈可守書儀小説而為國章邪判少卿事薛允中等言戶婚律居父母及夫喪而嫁娶者徒三年各離之若居周喪而嫁娶者杖一百又書儀舅姑之服斬衰三年亦準敕行用律敕有差望加裁定右僕射魏仁浦等二十一人奏議曰謹按禮內則云婦事舅姑如事父母則舅姑與父母一也而古禮有期年之説至於後唐始定三年之喪在理為當况五服制度前代增益甚多按唐會要嫂叔無服太宗令服小功曾祖父母舊服三月增為五月嫡子婦大功增為期衆子婦小功增為大功父在為母服期高宗增為三年婦為夫之姨舅無服玄宗令從夫服又增姨舅同服緦麻及堂姨舅袒免至今遵行况三年之內几筵尚存豈可夫處苫塊之中婦被綺紈之飾夫婦齊體哀樂不同求之人情實傷理本况婦為夫有三年之服於舅姑止服期年乃是尊夫而卑舅姑也况孝明皇后為昭憲太后服喪三年足以為萬世法欲望自今婦為舅姑服並如後唐之制其三年齊斬一從其夫嫡孫承重天聖四年大理評事杜杞言祖母潁川郡君鍾歿並無服重子婦餘孤孫七人臣最居長今己服斬衰即未審解官以否禮院言按禮喪服小記曰祖父卒而後為祖母後者三年正義曰此論適孫承重之服祖父卒者謂適孫無父而為祖後祖父已卒今遭祖母喪故云為祖母後也若父卒為母故三年若祖父卒時父已先亡亦為祖父三年若祖卒時父在己雖為祖期今父歿祖母亡時己亦為祖母三年也又按令文為祖後者祖卒為祖母祖父歿嫡孫為祖母承重者齊衰三年並解官合依禮令寶元二年度支判官集賢校理薛紳言祖母萬壽縣太君王氏卒是先臣所生母服紀之制罔知所適乞降條制庶知遵守詔送太常禮院詳定禮官言五服年月敕齊衰三年為祖後者祖卒則為祖母又曰齊衰不杖期為祖父母注云父之所生庶母亦同惟為祖後者不服又按通禮義纂為祖後者父所生庶母亡合三年否記云為祖母也為後三年不言嫡庶然奉宗廟當以貴賤為差庶祖母不祔於皇姑已受重於祖當為祭主不得申於私恩若受重於父代而養為後可也又曰庶祖母合從何服禮無服庶祖母之文有為祖庶母後者之服晉王廙議曰受命為後則服之無嫌婦人無子託後族人猶為之服况其子孫乎人莫敢卑其祖也且妾子父歿為母得申三年孫無由獨屈當服之也看詳五服年月敕不載持重之文於義纂即有所據今薛紳不為祖後受重於父合申三年之制史館檢討同知太常禮院王洙言五服年月敕與新定令文及通禮正文內五服制度皆聖朝典法此三處並無為父所生庶母服三年之文唯義纂者是唐世蕭嵩王仲丘等撰集非創修之書未可據以決事且所引兩條皆近世諸儒之説不出於六經臣已別狀奏駮今薛紳為映之孫耀卿為別子始祖紳繼別之後為大宗所守至重非如次庶子等承傳其重者也不可輒服父所生庶母三年之喪以廢始祖之祭也臣謹按禮經所謂重者皆承後之文據義纂稱重於父亦有二説一者嫡長子自為正體受重可知二者或嫡長亡取嫡或庶次承傳父重亦名為受重也若繼別子之後自為大宗所承至重不得更遠係庶祖母為之服三年惟其父以生己之故為之三年可也詳義纂所謂受重於父者指嫡長子亡次子承傳父重者也但其文不同耳詔太常禮院與御史臺詳定聞奏衆官參詳耀卿王氏子紳王氏孫尤親於慈母庶母祖母庶祖母也耀卿既亡紳受重代養當服之也又薛紳頃因籍田覃恩乞將封母氏恩澤回授與故父所生母王氏其薛紳官爵未合封祖母蓋朝廷以耀卿已亡紳是長孫敦以孝道特許封邑豈可王氏生則輒邀國恩歿則不受重服况紳被王氏鞠育之恩體尊義重合令解官持齊衰三年之服詔從之皇祐元年大理評事石祖仁奏叔從簡為祖父中立服後四十日亡乞下禮院定承祖父重服禮官宋敏求議曰自開元禮以前嫡孫卒則次孫承重况從簡為中子已卒而祖仁為嫡孫乎古者重嫡正貴所傳其為後者皆服三年以主虞練祥禫之祭且三年之喪必以日月之久而服之者有變也今中立未及卒哭從簡已卒是日月未久而服未經變也或謂已服期不當改服斬而更為重制按儀禮子嫁反在父之室為父三年鄭氏注謂遭喪而出者始服齊衰期出而虞則以三年之喪是服可再制明矣今祖仁宜解官因其葬而制斬衰三年後有如其類而已葬者用再喪制服遂著為定式熙寧八年禮院請為祖承重者依封爵令立嫡孫以次立嫡子同母弟無母弟立庶子無庶子立嫡孫同母弟如又無之即立庶長孫行斬衰服於是禮房詳定古者封建國邑而立宗子故周禮適子死雖有諸子猶令嫡孫傳重所以一本統明尊尊之義也至於商禮則嫡子死立衆子然後立孫今既不立宗子又未嘗封建國邑則嫡孫喪祖不宜純用周禮若嫡子死無衆子然後嫡孫承重即嫡孫傳襲封爵者雖有衆子猶承重時知廬州孫覺以嫡孫解官持祖母服覺叔父在有司以新令乃改知潤州元豐三年太常丞劉次莊祖母亡有嫡曾孫次莊為嫡孫同母弟在法未有庶孫承重之文詔下禮官立法自今承重者嫡子死無諸子即嫡孫承重無嫡孫嫡孫同母弟承重無母弟庶孫長者承重曾孫以下準此其傳襲封爵自依禮令雜議大中祥符八年廣平公德彝聘王顯孫女將大歸而德彝卒疑其禮制禮官言按禮曾子問曰娶女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之注云謂無期三年之恩也女服斬衰又刑統云依禮有三月廟見有未廟見就婚等三種之文妻並同夫法其有克吉日及定婚夫等惟不得違約改嫁自餘相犯並同凡人今詳女合服斬衰於室既葬而除或未葬但出欑即除之天聖七年興化軍進士陳可言臣昨與本軍進士黃價同保臣預解送之後本軍言黃價昨赴舉時有叔為僧喪服未滿臣例當駮放竊思出家制服禮律俱無明文况僧犯大罪並無緣坐犯事還俗準敕不得均分父母田園又釋門儀式見父母不拜居父母喪不絰死則法門弟子為之制服其於本族並無服式望下禮官詳議許其赴試太常禮院言檢會敕文期周尊長服不得取應又禮為叔父齊衰期外繼者降服大功九月其黃價為叔僧合比外繼降服大功皇祐四年吉州司理參軍祝紳幼孤鞠於兄嫂已嘗為嫂持服兄喪又請解官持喪有司以為言仁宗曰近世蓋有匿親喪而干進者紳雖所服非禮然不忘鞠養恩亦可勸也候服闋日與幕職知縣繼絶熙寧二年同修起居注直史館蔡延慶父褒故太尉齊之弟也齊初無子子延慶後齊有子而褒絶請復本宗禮官以請許之紹聖元年尚書省言元祐南郊赦文戶絶之家近親不為立繼者官為施行今戶絶家許近親尊長命繼已有著令即不當官為施行四年右武衛大將軍克務乞故登州防禦使東牟侯克端子叔博為嗣請赴期朝參起居而不為克端服大宗正司以聞下禮官議宜終喪三年遂詔宗室居父母喪者毋得乞為繼嗣大觀四年詔曰孔子謂興滅繼絶天下之民歸心王安石子雱無嗣有族子棣已嘗用安石孫恩例官可以棣為雱後以稱朕善善之意先是元豐國子博士孟開請以姪孫宗顏為孫據晉侍中荀顗無子以兄之孫為孫其後王彥林請以弟彥通為叔母宋繼絶孫詔皆如所請淳熙四年十月二十七日戶部言知蜀州吳擴申明乞自今養同宗昭穆相當之子夫死之後不許其妻非理遣還若所養子破蕩家産不能侍養實有顯過即聽所養母訴官近親尊長證驗得實依條遣還仍公共繼嗣
