七寸五分強折取其中則中天冬至應在十一月三日求其早晚令後二日景相減則一日差率也倍之為法前二日減以百刻乘之為實以法除實得冬至加時在夜半後三十一刻在元嘉曆後一日天數之正也量檢彌年則加減均同異歲相課則遠近應率觀二家之說略而未通熹平乃要取其中而失於至前至後之餘大明則左右率而失於為實為法之數若夫較景定氣曆家最為急務觀古較驗止以冬至前後數日之間以定加時早晚且景之差行當二至前後進退在微芒之間又日有變行盈縮稍異若以為準則加時相背又晉漢曆術多以前後所測晷要取其中此亦差過半日今比歲較驗在立冬立春景移過寸若較取加時則宜以其相近者通計半之為距至泛日乃以其晷數相減餘者以法乘之滿其日晷差而一為刻乃以差刻求冬至視其前晷多則為減少則為加求夏至返之加減距至泛日為定日仍加半日之刻命從前距日辰算外即二至加時日辰及刻分如此推求則二至加時早晚可驗矣皇祐嶽臺晷景法按大衍載日及崇天定差之率雖號通密然未能盡上下交應之理則晷度無由合契今立新法使上符盈縮之行下參句股之數所算尺寸與天測驗無有先後其術曰計二至後日數乃減去二至約餘仍加半日之分即所求日午中積數而置之以求進退差分求進退差分者置中積之數如一象九十一日三十一分以下為在前如一象以上返減二至限一百八十二日六十二分餘為在後置前後度於上列二百於下以上減下餘以下乘上滿四千一百三十五除之為分不滿退除為小分在冬至後即為進差在夏至後即為退差仍列初末二限求入初末限者置所求日午中積數日在冬至後初限夏至後末限之數四十五日六十二分以下即為所求在初限如在已上者乃返減二至限餘即為所求入末限其冬至後末限夏至後初限以一百三十七日為率用求午中晷數求午中晷數者視所求如入冬至後初限夏至後末限者以入限日減一千九百三十七半餘為泛差仍以限日分乘其進退差五因百約之用減泛差為定差乃以入限日分自相乘以乘定差滿一百萬為尺不滿為寸為分及小分以減冬至常晷一丈二尺八寸五分餘為其日午中晷數若所求入冬至後末限夏至後初限者乃三約入限日分以減四百八十五少餘為泛差仍以進退差減極數餘者若在春分後秋分前者直以四約之以加泛差為定差若在春分前秋分後者乃以去二分日數及分乘之滿六百而一以減泛差餘為定差乃以入限日分自相乘以乘定差滿一百萬為尺不滿為寸為分及小分以加夏至常晷一尺五寸七分即為其日午中晷數若用周歲曆直以其日晷景損益差分乘其日午中之餘滿法約之乃損益其下晷數即其日午中定晷如此推求則上下通應之理句股斜射之原皆可視驗乃具嶽臺晷景周歲算數冬至後每日損差每日午中晷景常數初日空分小分一十九一丈二尺八寸五分一日空分小分五十八一丈二尺八寸四分小分八十一二日空分小分九十六一丈二尺八寸四分小分二十三三日一分小分三十五一丈二尺八寸三分小分二十七四日一分小分七十二一丈二尺八寸一分小分九十二五日二分小分一十一一丈二尺八寸小分一十九六日二分小分四十八一丈二尺七寸八分小分八七日二分小分八十五一丈二尺七寸五分小分六十八日三分小分二十一一丈二尺七寸七分小分七十五九日三分小分五十八一丈二尺六寸九分小分五十四十日三分小分九十二一丈二尺六寸五分小分九十六十一日四分小分二十八一丈二尺六寸二分小分三十二日四分小分六十二一丈二尺五寸七分小分七十五十三日四分小分九十六一丈二尺五寸三分小分一十三十四日五分小分二十九一丈二尺四寸八分小分一十七十五日五分小分六十一一丈二尺四寸二分小分八十八十六日五分小分九十一一丈二尺三寸七分小分二十七十七日六分小分二十三一丈二尺三寸一分小分三十五十八日六分小分五十二一丈二尺二寸五分小分一十二十九日六分小分八十一一丈二尺一寸八分小分六十二十日七分小分九一丈二尺一寸一分小分七十九二十一日七分小分三十六一丈二尺四分小分七十二十二日七分小分六十二一丈一尺九寸七分小分三十四二十三日七分小分八十七一丈一尺八寸九分小分七十二二十四日八分小分一十一一丈一尺八寸一分小分八十五二十五日八分小分三十四一丈一尺七寸三分小分七十四二十六日八分小分五十五一丈一尺六寸五分小分四十二十七日八分小分七十三一丈一尺五寸六分小分八十五二十八日九分小分空一丈一尺四寸八分小分一十三二十九日九分小分一十四一丈一尺三寸九分小分一十二三十日九分小分三十二一丈一尺二寸九分小分九十八三十一日九分小分四十八一丈一尺二寸小分六十六三十二日九分小分六十二一丈一尺一寸一分小分一十八三十三日九分小分七十六一丈一尺一分小分五十五三十四日九分小分八十九一丈九寸一分小分七十八三十五日一寸小分一一丈八尺一寸小分六十九三十六日一寸小分一十二一丈七寸一分小分八十八三十七日一寸小分二十一丈六寸一分小分七十六三十八日一寸小分二十八一丈五寸一分小分五十六三十九日一寸小分三十五一丈四寸一分小分二十八四十日一寸小分四十一丈三寸小分九十三四十一日一寸小分四十四一丈二寸小分五十三四十二日一寸小分四十八一丈一寸小分九四十三日一寸小分四十九九尺九寸九分小分六十一四十四日一寸小分五十九尺八寸九分小分一十二四十五日