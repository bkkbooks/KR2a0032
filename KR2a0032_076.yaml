body:
  text: 宋史卷七十六志第二十九律曆九皇祐渾儀堯敕羲和制橫簫以考察星度其機衡用玉欲其燥濕不變運動有常堅久而不能廢也至于後世鑄銅為圓儀以法天體自洛下閎造太初曆用渾儀及東漢孝和帝時太史惟有赤道儀歲時測候頗有進退帝以問典星待詔姚崇等皆曰星圖有規法日月實從黃道今無其器是以失之至永元十五年賈逵始設黃道儀桓帝延熹七年張衡更制之以四分為度其後陸績王蕃孔挺斛蘭梁令瓚李淳風並嘗制作五代亂亡遺法蕩然矣真宗祥符初韓顯符作渾儀但遊儀雙環夾望筒旋轉而黃赤道相固不動皇祐初又命日官舒易簡于淵周琮等參用淳風令瓚之制改鑄黃道渾儀又為漏刻圭表詔翰林學士錢明逸詳其法內侍麥允言總其工既成置渾儀於翰林天文院之候臺漏刻於文德殿之鐘鼓樓圭表於司天監帝為製渾儀總要十卷論前代得失已而留中不出今具黃道遊儀之法著于此焉第一重名六合儀陽經雙環外圍二丈三尺二寸八分直徑七尺七寸六分闊六寸厚六分南北並立兩面各列周天三百六十五度少強北極出地三十五度少強陰緯單環外圍徑闊與陽經雙環等外厚二寸五分內厚一寸九分上列十幹十二支八卦方位以正地形上有池沿環流轉以定平準天常單環外圍二丈四寸六分直徑六尺八寸二分闊厚一寸二分上列十幹十二支四維時刻之數以測辰刻與陽經陰緯環相固如卵之殼幕然第二重名三辰儀璇璣雙環外圍一丈九尺五寸六分直徑六尺五寸二分闊一寸四分厚一寸兩面各均周天三百六十五度少強作二樞對兩極赤道單環外圍一丈九尺六寸八分直徑六尺五寸六分闊一寸一分厚六分上列二十八宿距度周天三百六十五度少強附於璇璣之上黃道單環外圍一丈九尺二分直徑六尺三寸四分闊一寸二分厚一寸上列周天三百六十五度少強均分二十四氣七十二候六十四卦三百六十策出入赤道二十四度與赤道相交每歲退差一分有餘白道單環外圍一丈八尺六寸三分直徑六尺二寸一分闊一寸一分厚五分上列交度置於黃道環中入黃道六度每一交終退行黃道一度半弱皆旋轉於六合之內第三重名四遊儀璇樞雙環外圍一丈八尺二寸一分直徑六尺七分闊二寸厚七分兩面各列周天三百六十五度少強挾直距以對樞軸東西運轉於三辰儀內以格星度橫簫望筒長五尺七寸外方內圓中通望孔其徑六分周於日輪在璇樞直距之中使南北遊仰以窺辰宿無所不至十字水平槽長九尺四寸八分首闊一尺二寸七分身闊九寸二分高七尺水槽闊一寸深八分四柱各長六尺七寸八分植於水槽之末以輔天體皆以銅為之乃格七曜遠近盈縮以知晝夜長短之效其所測二十八舍距度著于後其周天星入宿去極所主吉凶則具在天文志角十二度亢九度氐十六度房五度心四度尾十九度箕十度斗二十五度牛七度女十一度虛十度危十六度室十七度壁九度奎十六度婁十二度胃十五度昴十一度畢十八度觜一度參十度井三十四度鬼二度柳十四度星七度張十八度翼十八度軫十七度皇祐漏刻自黃帝觀漏水制器取則三代因以命官則挈壺氏其職也後之作者或下漏或浮漏或輪漏或權衡制作不一宋舊有刻漏及以水為權衡置文德殿之東廡景祐三年再加考定而水有遲疾用有司之請增平水壺一渴烏二晝夜箭二十一然常以四時日出傳卯正一刻又每時正已傳一刻至八刻已傳次時即二時初末相侵殆半皇祐初詔舒易簡于淵周琮更造其法用平水重壺均調水勢使無遲疾分百刻於晝夜冬至晝漏四十刻夜漏六十刻夏至晝漏六十刻夜漏四十刻春秋二分晝夜各五十刻日未出前二刻半為曉日沒後二刻半為昏減夜五刻以益晝漏謂之昏旦漏刻皆隨氣增損焉冬至夏至之間晝夜長短凡差二十刻每差一刻別為一箭冬至互起其首凡有四十一箭晝有朝有禺有中有晡有夕夜有甲乙丙丁戊昏旦有星中每箭各異其數凡黃道升降差二度四十分則隨曆增減改箭每時初行一刻至四刻六分之一為時正終八刻六分之二則交次時今列二十四氣晝夜日出入辰刻昏曉中星以備參合晝四十刻分空日出卯正五刻分空昏中星壁初度冬至夜六十刻分空日入申正三刻二十分曉中星角初度晝四十刻一十九分三日後晝四十一刻日出卯正四刻五十分昏中星奎六度小寒夜五十九刻四十一分日入申正三刻三十分曉中星亢二度晝四十一刻十九分二日後晝四十二刻日出卯正四刻二十分昏中星婁八度大寒夜五十八刻四十一分十一日後晝四十三日入申正四刻分空曉中星氐七度刻晝四十二刻五十四分三日後晝四十四刻日出卯正三刻二十二分昏中星昴初度立春夜五十七刻六分十一日後晝四十五日入申正四刻四十八分曉中星房四度刻晝四十四刻五十八分昏中星畢八度日出卯正二刻三十分昏中星畢八度雨水夜五十五刻五十分曉中星尾五度日入申正五刻五十分曉中星尾五度晝四十七刻二十四分五日後晝四十九刻日出卯正一刻十七分昏中星參九度驚蟄夜五十二刻三十六分十一日後晝五十刻日入申正七刻三分曉中星尾十六度晝五十刻分空三日後晝五十一刻日出卯正初刻分空昏中星井十九度春分九日後晝五十二刻夜五十刻分空十五日後晝五十三日入酉正初刻分空曉中星箕九度刻晝五十二刻三十五分六日後晝五十四刻日出寅正七刻三分昏中星柳三度清明夜四十七刻二十五分十二日後晝五十五日入酉正一刻十七分曉中星斗八度刻晝五十五刻三分四日後晝五十六刻日出寅正五刻五十分昏中星張一度穀雨夜四十四刻五十七分十一日後晝五十七日入酉正二刻二十分曉中星斗一十九度刻晝五十七刻五分四日後晝五十八刻日出寅正四刻四十八分昏中星翼二度立夏夜四十二刻五十五分十四日後晝五十九日入酉正三刻三十二分曉中星牛四度刻晝五十八刻四十分十四日後晝六十刻日出寅正四刻分空昏中星軫二度小滿夜四十一刻二十分日入酉正四刻二十分曉中星女九度晝五十九刻四十分日出寅正三刻三十分昏中星角二度芒種夜四十刻二十分日入酉正四刻五十分曉中星危初度晝六十刻分空日出寅正三刻二十分昏中星亢六度夏至夜四十刻分空日入酉正五刻分空曉中星危十四度晝五十九刻四十分日出寅正三刻三十分昏中星氐十二度小暑夜四十刻二十分日入酉正四刻五十分曉中星室十三度晝五十八刻四十分四日後晝五十八刻日出寅正四刻分空昏中星尾初度大暑夜四十一刻二十分十一日後晝五十七日入酉正四刻二十分曉中星奎五度刻晝五十七刻五分八日後晝五十六刻日出寅正四刻四十分昏中星尾十二度立秋夜四十二刻五十五分十五日後晝五十五日入酉正三刻三十六分曉中星婁七度刻晝五十五刻三分七日後晝五十四刻日出寅正五刻五十分昏中星箕六度處暑夜四十四刻五十七分十三日後晝五十三日入酉正二刻三十分曉中星昴初度刻晝五十二刻三十五分五日後晝五十二刻日出寅正七刻三分昏中星斗五度白露夜四十七刻二十五分十一日後晝五十一日入酉正一刻十七分曉中星畢九度刻晝五十刻分空初日後晝五十刻日出卯正初刻分空昏中星斗六度秋分七日後晝四十九刻夜五十刻分空十三日後晝四十八日入酉正初刻分空曉中星井一度刻晝四十七刻二十四分四日後晝四十七刻日出卯正一刻十七分昏中星牛初度寒露夜五十二刻三十六分十日後晝四十六刻日入申正七刻三分曉中星井二十一度晝四十四刻五十八分初日後晝四十五刻日出卯正二刻三十分昏中星女三度霜降八日後晝四十四刻夜五十五刻二分十四日後晝四十三日入申正五刻五十分曉中星柳五度刻晝四十二刻五十四分八日後晝四十二刻日出卯正三刻三十二分昏中星虛三度立冬夜五十七刻六分日入申正四刻四十八分曉中星張二度晝四十一刻十九分三日後晝四十一刻日出卯正四刻二十分昏中星危五度小雪夜五十八刻四十八分十五日後晝四十刻日入申正四刻分空曉中星翼二度晝四十刻十九分日出卯正四刻五十分昏中星室一度大雪夜五十九刻四十一分日入申正三刻三十分曉中星軫一度皇祐圭表觀天地陰陽之體以正位辨方定時考閏莫近乎圭表宋何承天始立表候日景十年間知冬至比舊用景初曆常後天三日又唐一行造大衍曆用圭表測知舊曆氣節常後天一日今司天監圭表乃石晉時天文參謀趙延乂所建表既欹傾圭亦墊陷其於天度無所取正皇祐初詔周琮于淵舒易簡改製之乃考古法立八尺銅表厚二寸博四寸下連石圭一丈三尺以盡冬至景長之數面有雙水溝為平準於溝雙刻尺寸分數又刻二十四氣嶽臺晷景所得尺寸置於司天監候之三年知氣節比舊曆後天半日因而成書三卷命曰嶽臺晷景新書論前代測候是非步算之法頗詳既上奏詔翰林學士范鎮為序以識琮以謂二十四氣所得尺寸比顯德欽天曆王朴算為密今載氣之盈縮備採用焉小雪皇祐元年己丑十月十九日戊寅新表測景長一丈一尺三寸五分王朴算景長一丈一尺三寸九分新法算景長一丈一尺三寸四分小分四十八二年庚寅十月二十九日癸未雲霠不測三年辛卯十月十日戊子新表測景長一丈一尺三寸王朴算景長一丈一尺四寸七分新法算景長一丈一尺二寸九分小分九十八大雪元年己丑十一月四日癸巳雲霠不測二年庚寅十一月十五日戊戌新表測景長一丈二尺四寸五分半王朴算景長一丈二尺四寸五分新法算景長一丈二尺四寸四分小分二十五冬至元年己丑十一月十九日戊申新表測景長一丈二尺八寸五分王朴算景長一丈二尺八寸六分新法算景長一丈二尺八寸五分二年庚寅十一月三十日癸丑新表測景長一丈二尺八寸四分王朴算景長一丈二尺八寸六分新法算景長一丈二尺八寸五分三年辛卯十一月十二日己未雲霠不測小寒元年己丑十二月四日癸亥新表測景長一丈二尺四寸王朴算景長一丈二尺四寸八分新法算景長一丈二尺四寸小分十五二年庚寅閏十一月十五日戊辰雲霠不測三年辛卯十一月二十七日甲戌新表測景長一丈二尺三寸七分王朴算景長一丈二尺四寸八分小分二十六大寒元年己丑十二月十九日戊寅雲霠不測二年庚寅十二月一日甲申新表測景長一丈一尺一寸七分王朴算景長一丈一尺四寸四分新法算景長一丈一尺一寸八分小分四十三年辛卯十二月十二日己丑雲霠不測立春二年庚寅正月六日甲午雲霠不測二年庚寅十二月十六日己亥雲霠不測三年辛卯十二月二十七日甲辰新表測景長九尺六寸七分半王朴算景長一丈一寸五分新法算景長一丈六寸八分小分七雨水二年庚寅正月二十一日己酉雲霠不測三年辛卯正月二日甲寅新表測景長八尺一寸半分王朴算景長八尺五寸新法算景長八尺九寸小分七十六四年壬辰正月十二日己未新表測景長八尺一寸二分半王朴算景長八尺六寸一分新法算景長八尺一寸二分小分一十八驚蟄二年庚寅二月七日甲子新表測景長六尺六寸三分王朴算景長六尺八寸五分新法算景長六尺六寸三分小分三十九三年辛卯正月十七日己巳新表測景長六尺六寸五分王朴算景長六尺八寸五分新法算景長六