為我用矣樞密院乃會河東路蕃部承襲不降資秦鳳路降兩資涇原路蕃官告老以門內人承代亦不降資鄜延環慶路蕃官使臣比類授職蕃官副兵馬使以上元無奏到之人詔鄜延環慶路蕃官本族首領子孫當繼襲者若都軍主以下之子孫勿降殿侍并差使殿侍之子孫充都軍主借職奉職之子孫充殿侍侍禁殿直之子孫充差使殿使供奉官之子孫補借職承制以下子孫補奉職其諸司副使以上子孫合繼襲者視漢官遣表加恩二等奏可二月知青澗城劉怤言所隸歸明號箭手八指揮凡三千四百餘人馬九百匹連歲不登願以丹州儲糧振恤詔下其章轉運司行之二年郭逵奏蕃兵必得人以統領之若專迫以嚴刑彼必散走山谷正兵反受其弊當設六術以用之曰遠斥堠曰擇地利曰從其所長曰捨其所短曰利誘其心曰戰助其力此用蕃兵法也詔從之三年宣撫使韓絳言親奉德音以蕃部子孫承襲者多幼弱不能統衆宜選其族人為衆信伏者代領其事聖算深遠真得禦邊之要請下諸路帥臣以詔從事四年詔蕃官殿侍三班差使補職或繇殿侍遷差使及十二年嘗充巡檢或管幹本族公事或為蕃官指揮或嘗備守禦之任者總管司以聞特與遷改五年王韶招納沿邊蕃部自洮河武勝軍以西至蘭州馬銜山洮岷宕疊等州凡補蕃官首領九百三十二人首領給𧹞錢蕃官給奉者四百七十二人月計費錢四百八十餘緡得正兵三萬族帳數千六年帝謂輔臣曰洮西香子城之戰官軍貪功有斬巴角部蕃兵以效級者人極嗟憤昔李靖分漢蕃兵各為一隊無用衆於紛亂王安石進曰李靖非素拊循蕃部者也故其教兵當如此今熙河蕃部既為我用則當稍以漢法治之使久而與漢兵如一武王用微盧彭濮人但為一法今宜令蕃兵稍與漢同與蕃賊異必先録用其豪傑漸以化之此用夏變夷之術也帝乃詔王韶議其法帝曰岷河蕃部族帳甚衆儻撫御咸得其用可以坐制西夏亦所謂以蠻夷攻蠻夷者也陝西極塞儻會合訓練為用兵之勢以愾敵人彼必隨而聚兵以應我頻年如此自致困弊兵法所謂佚能勞之者也安石對曰朝廷當先為不可勝聚糧積財選兵而已新附之羌厚以爵賞收其豪傑賜之堅甲利兵以激其氣使人人皆有趨赴之志待我體強力充鼓行而西將無不可者馮京王圭曰儻如聖策多方以誤之彼既疲於點集而我無攻取之實久之必不我應因爾舉兵若蹈無人之境矣帝曰此正晉人取吳之策也夫欲經營四夷宜無先於此矣帝嘗謂蕃部未嘗用兵恐以虛名內附臨事不可使安石對曰剛克柔克所用有宜王韶以為先以恩信結納其人有強梗不服者乃以殺伐加之大抵蕃部之情視西夏與中國強弱為向背若中國形勢強附中國為利即不假殺伐自當堅附矧蕃部之俗既宗貴種又附強國今用木征貴種等三人又稍以恩信收蕃部則中國形勢愈強恐不假殺伐而所附蕃部自可制使帝以為然是時王韶拓熙河地千二百里招附三十餘萬口安石奏曰今以三十萬之衆漸推文法當即變其夷俗然韶所募勇敢士九百餘人耕田百頃坊三十餘所蕃部既得為漢而其俗又賤土貴貨漢人得以貨與蕃部易田蕃人得貨兩得所欲而田疇墾貨殖通蕃漢為一其勢易以調御請令韶如諸路以錢借助收息又捐百餘萬緡養馬於蕃部且什伍其人奬勸以武藝使其人民富足士馬強盛奮而使之則所嚮可以有功今蕃部初附如洪荒之人唯我所御而已七年韶言討平河州叛蕃闢土甚廣已置弓箭手又以其餘地募蕃兵弓箭手每寨三指揮或至五指揮每指揮二百五十人人給田百畝以次蕃官二百畝大蕃官三百畝仍募漢弓箭手為隊長稍衆則補將校暨蕃官同主部族之事其蕃弓箭手並刺蕃兵字於左耳以防漢兵之盜殺而效首者詔如其請十一月王中正團結熙河界洮河以西蕃部得正兵三千八十六人正副隊將六十人供贍一萬五千四百三十人八年五月詔李承之參定蕃兵法十一月詔選陝西蕃兵丁壯戶九丁以上取五六取四五取三三取二二取一並年二十以上手背毋過五丁每十人置十將一五十人置副兵馬使一百人置軍使一副兵馬使一二百人置軍使一副兵馬使三四百人加軍使一副兵馬使一五百人又加指揮使一副兵馬使一過五百人每百人加軍使一副兵馬使一即一族三十人已上亦置副兵馬使一不及二十人止置十將月受奉仍增給錢指揮使一千五百至十將有差十年樞密院言陝西河東議立團結蕃部法欲如所奏上手詔曰夏人所恃以強國者山界部落數萬之衆爾按其地志朝廷已據有其半彼用之則并小凌大所向如欲在我則徒能含撫豢養未嘗得其死力豈惟不能用之又恐其為患也故小有悖戾有司惟能以利說解之上下相習畏憚任其縱散久失部勒其近降之法固未可信其必行然以理言之彼此均有其人而利害遼遠今苟循邊人衆知其說止於舊法聊改一二則收功疑亦不異往日徒為紛紛無補於事可再下呂惠卿參詳以聞元豐六年詔蕃官雖至大使臣猶處漢官小使臣之下朝廷賞功增秩以為激勸乃爾卑抑則孰知遷官之榮宜定蕃漢官序位後河東經略司言蕃官部堡塞兵出戰嘗以漢官驅策恐不當與漢官序位而兵部請蕃漢非統轄者乃令序官奏可熙河蘭會路經略制置使李憲言治蕃兵置將領法貴簡而易行詳而難犯臣今酌蕃情立法凡熙河蘭會五郡各置都同總領蕃兵將二人本州諸部族出戰蕃兵及供贍人馬各置管押蕃兵使臣十人五郡蕃兵自為一將出戰則以正兵繼之旗幟同色蕃兵以技藝功勞第為四等蕃官首領推遷如之八月憲又言漢蕃兵騎雜為一軍語言不通居處飲食悉不便利昔李靖以蕃落自為一法臣近以蕃兵自為一將釐漢蕃為兩軍相參號令軍事惟所使焉七年瀘南緣邊安撫司言羅始党生界八姓各願依七姓十九姓刺充義軍團結為三十一指揮凡一萬五千六百六十人從之元祐元年臣僚言涇原路蕃兵人馬凡衆遇臨敵與正兵錯雜非便詔下其章四路都總管詳議環慶范純粹言漢蕃兵馬誠不可雜用宜於逐將各選廉勇曉蕃情者一員專充蕃將令於平日鈐束訓練遇有調發即令部領為便又言頃兵部議乞蕃漢官非相統轄者並依官序相壓其城寨等管轄蕃官即依舊在本轄漢官之下詔從其請且諸路蕃官不問官職高卑例在漢官之下所以尊中國制遠人也行之既久忽然更制便與不相統轄之官依品序位即邊上使臣及京職官當在蕃官之下十有八九非人情所能堪蕃部凶驕豈可輒啓宜悉依舊制並序漢官之下從之元符二年三月涇原經略司言乞將東西路蕃兵將廢罷仍於順便城寨隸屬逐將統領與漢兵相兼差使秦鳳路如之四月環慶路經略安撫司言新築定邊城有西夏來投蕃部甚衆欲自今將歸順之人就新城收管給田仍乞選置總領蕃兵正副二員從之
