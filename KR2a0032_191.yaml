body:
  text: 宋史卷一百九十一志第一百四十四兵五鄉兵二河北河東陝西義勇陝西護塞川峽土丁荊湖義軍土丁弩手䕫施黔思等處義軍土丁廣南西路土丁廣南東路槍手雍欽溪洞壯丁福建路槍仗手江南西路槍仗手蕃兵河北河東陝西義勇慶曆二年選河北河東強壯并抄民丁涅手背為之戶三等以上置弩一當稅錢二千三等以下官給各營於其州歲分兩番訓練上番給奉廩犯罪斷比廂軍下番比強壯治平元年詔陝西除商虢二州餘悉籍義勇凡主戶三丁選一六丁選二九丁選三年二十至三十材勇者充止涅手背以五百人為指揮置指揮使副二人正都頭三人十將虞候承局押官各五人歲以十月番上閲教一月而罷又詔秦州成紀等六縣有稅戶弓箭手寨戶及四路正充保毅者家六丁刺一九丁刺二有買保毅田承名額者三丁刺一六丁刺二九丁刺三悉以為義勇是歲詔秦隴儀渭涇原邠寧環慶鄜延十二州義勇遇召集防守日給米二升月給醬菜錢三百蓋慶曆初河北路總十八萬九千三十一人河東路總七萬七千七十九人陝西路治平初總十五萬六千八百七十三人熙寧初樞密使呂公弼請以河北義勇每指揮揀少壯藝精者百人為上等手背添刺上等字旌別教閲及數外藝優者亦籍之俟有闕則補從之十二月詔河北義勇縣以歲閲當閲于州者宜分番歲以一番災傷當罷者聽旨其以指揮分番者大名府五十三為四番真定瀛洺邢滄定冀恩趙深磁相博自三十九以及十二並為三番德祁澶棣霸濱永靜永寧懷衛乾寧莫保通利自十一以及四並為二番九指揮已上者再分本番為三教始十月止十二月六指揮已上者再分本番為二教始十月止十一月終滿一月罷遣帝嘗問陳升之曰侯叔獻言義勇上番何如王安石曰此事似可為但少須年歲間議之升之曰今募兵未已且養上番義勇則調度尤不易安石曰言募兵之害雖多及用則患少以民與兵為兩途故也十二月帝言義勇可使分為四番出戍呂公弼曰須先省得募兵乃可議此安石曰計每歲募兵死亡之數乃以義勇補之可也陳升之欲令義勇以漸戍近州安石曰陛下若欲變數百年募兵之弊則宜果斷詳立法制不然無補也帝以為然曰須豫立定條法不要宣布以漸推行可也兩府議上番或以為一月或以為一季且令近戍文彥博等又言難使遠戍安石辨之甚力是月兵部上陝西河北河東義勇數陝西路二十六郡舊籍十五萬三千四百益以環慶延州保毅弓箭手三千八百總十五萬六千八百為指揮三百二十一河北三十三郡舊籍十八萬九千二百今籍十八萬六千四百為指揮四百三十而河東二十郡自慶曆後總七萬七千為指揮一百五十九凡三路義勇之兵總四十二萬三千五百人三年七月王安石進呈蔡挺乞以義勇為五番教閲事帝患密院不肯措置安石曰陛下誠欲行則孰能禦此在陛下也涇渭儀原四州義勇萬五千人舊止戍守經略使蔡挺始令遇上番依諸軍結隊分隸諸將選藝精者遷補給官馬月廩時帛郊賞與正兵同遂與正兵相參戰守時土兵有闕召募三千人挺奏以義勇點刺纍年雖訓肄以時而未施於征防意可以案府兵遺法俾之番戍以補土兵闕詔復問以措置遠近番之法挺即條上以四州義勇分五番番三千人防秋以八月十五日上十月罷防春以正月十五日上三月罷周而復始詔從之行之諸路九月秦鳳經略安撫司言保毅人數不曾揀充義勇而其子孫轉易田土分煙析姓少有正身乞令保毅軍已於丁數內揀刺充義勇者與免承認保毅從之十月韓絳乞差著作佐郎呂大忠等赴宣撫司以備提舉義勇從之是月韓絳言今將義勇分為七路延丹坊為一路邠寧環慶為一路涇原儀渭為一路秦隴為一路陝解同河中府為一路階成鳳州鳳翔府為一路乾耀華永興軍為一路逐年將一州之數分為四番緣邊四路十四州每年秋冬合用一番屯戍近𩹉三路十二州軍即令依此立定番次未得逐年差發遇本處闕少正兵即得勾抽或那往次邊守戍從之十一月判延州郭逵言陝西起發義勇赴緣邊戰守今後並令自齎一月糗糧折本戶稅賦若不能自備則就所發州軍預請口食一月從之十二月司馬光上疏曰臣以不才兼領長安一路十州兵民大柄到官以來伏見朝廷及宣撫等司指揮分義勇作四番欲令以次於緣邊戍守選諸軍驍鋭及募閭里惡少以為奇兵造乾糧炒飯布囊力車以備餽運悉取歲賜趙秉常之物散給緣邊諸路又竭內地府庫甲兵財物以助之且以永興一路言之所發人馬甲八千副錢九萬貫銀二萬三千兩銀碗六千枚其餘細瑣之物不可勝數動皆迫以軍期上下相驅急於星火官吏狼狽下民驚疑皆云國家將以來春大舉六師長驅深入以討秉常之罪臣以疏賤不得預聞廟堂之議未知茲事為虛為實昨者親承德音以為方今邊計惟宜謹嚴守備其入寇則堅壁清野使之來無所得兵疲食盡可以坐收其弊臣退而思念聖謀高遠深得王者懷柔遠人之道實天下之福及到關中及見凡百處置皆為出征調度臣不知有司在外不諭聖意以致有此張皇將陛下默運神算不令愚賤之臣得聞其實也臣不勝惶惑竊為陛下危之况關中饑饉十室九空為賊盜者紛紛已多縣官倉庫之積所餘無幾乃欲輕動大衆橫挑猛獸此臣之所大懼也伏望陛下深鑒安危之機消之於未萌杜之於未形速下明詔撫諭關中之民以朝廷不為出征之計其義勇更不分番於緣邊戍守亦下選募奇兵凡諸調發為饋運之具者悉令停罷愛惜內地倉庫之儲以備春深賙救饑窮之人如此豈惟生民之幸亦社稷之福也惟陛下裁察再言之甚力於是永興一路獨得免四年詔罷陝西路義勇差役又詔罷陝西諸路提舉義勇官委本屬州縣依舊分番教閲五年七月命崇文院校書王安禮專一編修三路義勇條貫是月帝問王安石義勇事如何安石曰宜先了河東一路河東舊制每年教一月今令上番巡檢下半月或十日人情無不悅又以東兵萬人所費錢糧且取一半或三分之二依保甲養恤其人即人情無不欣願者閏七月執政同進呈河東保甲事樞密院但欲為義勇強壯不別名保甲王安石曰此非王安禮初議也帝曰今以三丁為義勇兩丁為強壯三丁遠戍兩丁本州縣巡檢上番此即王安禮所奏但易保丁為強壯人習強壯久恐別名或致不安也安石曰義勇非單丁不替強壯則皆第五等戶為之又自置弓弩及箭寄官庫須上教乃給今以府界保甲法推之河東蓋寬利之非苦之也帝曰河東義勇強壯已成次第今欲遣官修義勇強壯法又別令人團集保甲如何安石曰義勇要見丁數即須隱括因團集保甲即一動而兩業就今既差官隱括義勇又別差官團集保甲即一事分為兩事恐民不能無擾帝卒從安石議彥博請令安石就中書一面施行此事安石曰本為保甲故中書預議若止欲作義勇強壯即合令樞密院取旨施行帝曰此大事須共議乃可是月秦鳳路經略呂公弼乞從本司選差官自十月初擇諸州上番義勇材武者以為上義勇免齎送芻糧之役募養馬者為有馬上義勇并免其本戶支移從之六年九月詔義勇人員節級名闕須因教閲排連遷補十月熙河路經略司言乞許人投換義勇以地給之起立稅額詔以官地招弓箭手仍許近𩹉百姓壯勇者占射依內地起稅排保甲即義勇願投充及民戶願受蕃部地者聽之其頃畝令經略司以肥瘠定數十一月詔永興軍河中府陝解同華鄜延丹坊邠寧環慶耀十五州軍各依元刺義勇外商虢州保安軍並止團成保甲七年詔義勇正身不許應募充刺已應募者召人對替八年四月詔韓琦等曰河朔義勇民兵置之歲久耳目已熟將校甚整教習亦良然團結保甲一道紛然義勇舊人十去其七或撥入保甲或放而歸農得增數之虛名破可用之成法此又徒起契丹之疑也七月詔應義勇家人投軍後本戶餘丁數少合免義勇並許投軍十月詔五路義勇每年赴州教保甲赴縣教並自十月至次年正月終義勇不及十指揮保甲不及十都者自十二月起教各據人數分定番次教閲一月不許拆破指揮都保其人數少處只作一番兩番不須滿所教月分其年已上番者止教半月十二月詔五路義勇並與保丁輪充及檢察盜賊有違犯依保丁法九年正月詔義勇保甲逐年遇閲日比試所習武藝五路每州以二十分為率取一分為五等第一等解發四月詔河北西路義勇保甲分三十六番隨便近村分於巡檢縣尉下上番半月一替歲於農間月并下番人並令所轄巡檢縣尉擇寬廣處聚教五日是月兵部言舊條義勇保甲所習事藝以十分為率弓不得過二分槍刀共不得過二分餘並習弓弩詔槍手依舊專習外刀牌手令兼習弓弩仍頒樣下五路施行九月詔永興秦鳳等路義勇以主戶三丁以上充不拘戶等是年諸路所管義勇河北東路三萬六千二百一十八人河北西路四萬五千七百六十六人永興軍路八萬七千九百七十八人秦鳳路三萬九千九百八十人河東路三千五百九十五人總二十四萬七千五百三十七人元豐二年中書樞密院請河北陝西義勇保甲皆如諸軍誦教閲法從之三年詔五路轉運提舉官巡歷所至按閲見教義勇保甲不如法者牒提點刑獄司施行四年蒲宗孟言乞開封府五路義勇並改為保甲自此以次行於諸路矣此後義勇改為義勇保甲載保甲篇陝西護塞慶曆元年募土人熟山川道路蕃情善騎射者涅臂充二百人為指揮自備戎械就鄉閭習武技季一集州閲教無事放營農月給鹽茗有警召集防守即廩給之無出本路川峽土丁熙寧七年經制瀘州夷事熊本募土丁五千人入夷界捕戮水路大小四十六村蕩平其地二百四十里募民墾耕聯其夷屬以為保甲元祐二年瀘南沿邊安撫使司言請應瀘人因邊事補授班行自備土丁子弟在本家地分防拓之人更無廩給酬賞若遇賊臨時取旨其敢邀功生事重置于法從之政和六年瀘南安撫使孫羲叟奏邊民冒法買夷人田依法盡拘入官招置土丁子弟見招到二千四百餘人欲令番上從之宣和四年詔茂州石泉軍舊管土丁子弟番上守把不諳射藝其選施黔兵善射者各五十人分任教習候精熟日遣回荊湖路義軍土丁弩手不見創置之始北路辰澧二州南路全邵道永四州皆置蓋溪洞諸蠻保據巖險叛服不常其控制須土人故置是軍皆選自戶籍蠲免徭賦番戍寨柵大率安其風土則罕嬰瘴毒知其區落則可制狡獪其校長則有都指揮使副都指揮使指揮使副指揮使都頭副都頭軍頭頭首採斫招安頭首十將節級皆功遷補使相綜領施之西南實代王師有禦侮之備而無饋餉之勞其後荊南歸峽鼎郴衡桂陽亦置慶曆二年北路總一萬九千四百人南路總五千一百五十人番戍諸寨或以歲或以季或以月上番人給口糧有功遷補自都副指揮使歲給綿袍月給食錢指揮使給食錢副指揮使給紫大綾綿袍都頭已上率有廩給熙寧元年籍荊湖南北路義軍凡一萬五千人軍政如舊制六年諸路行保甲司農寺請令全邵二州土丁弩手弩團與本村土人共為保甲以正副指揮使兼充都副保正以都頭將虞候頭首都甲頭兼充保長以左右節級甲頭兼充小保長番上則本鋪土丁弩手弩團等同為一保其隔山嶺不及五大保者亦各置都保正一人元祐七年選差邵州邵陽武岡新化等縣中等以下戶充土丁弩手與免科役七年一替排補將級不拘替放年分作兩番邊寨防拓不得募人凡上番依禁軍例教閲武藝及專習木弩如有私役並論如私役禁軍敕紹聖二年樞密院言荊湖南路安撫轉運提刑常平司奏請邵州管下緣邊堡寨置弩手一千四百人乞依元豐六年詔於五等戶輪差並半年一替其上番人如有故許家人少壯有武藝者代充從之崇寧二年荊湖南路安撫鈐轄李閎言收復綏寧縣上堡里臨口寨合用防拓弩手千人乞於邵州邵陽武岡兩縣中等以下戶選差半年一替遇上番月支錢米排補階級自正副使而下至左右甲頭依舊為七階分兩番部轄令邵州給帖從之政和七年以辰沅澧等州更戍土丁與營田土丁名稱重疊將兵馬都鈐轄司招填土丁改為鼎澧路營田刀弩手重和元年辰州招到刀弩手二千一百人其官吏各轉官減磨勘年有差宣和四年靖州通道縣有邊警詔添置刀弩手二千人䕫州路義軍土丁壯丁州縣籍稅戶充或自溪洞歸投分隸邊寨習山川道路遇蠻入寇遣使襲討官軍但據險策應之其校長之名隨州縣補置所在不一職級已上冬賜綿袍月給食鹽米麥鐵錢其次紫綾綿袍月給鹽米其次月給米鹽而已有功者以次遷施黔思三州義軍土丁總隸都巡檢司施州諸寨有義軍指揮使把截將寨將并土丁總一千二百八十一人壯丁六百六十九人又有西路巡防殿侍兼義軍都指揮使指揮使都頭十將押番寨將黔州諸寨有義軍正副指揮使兵馬使都頭寨將把截將并壯丁總千六百二十五人思州洪杜彭水縣有義軍指揮使巡檢將寨將科理旁頭把截部轄將并壯丁總千四百二十二人渝州懷化軍溱州江津巴縣巡遏將皆州縣調補其戶下率有子弟客丁遇有寇警一切責辦主戶巡遏把截將歲支料鹽襖子須三年其地內無寇警乃給有勞者增之州縣籍土丁子弟并器械之數使分地戍守嘉祐中補涪州賓化縣夷人為義軍正都頭副都頭把截將十將小節級月給鹽有功以次遷及三年無夷賊警擾即給正副都頭紫小綾綿旋襴一涪陵武龍二縣巡遏將寨一人以物力戶充免其役其義軍土丁歲以籍上樞密院廣南西路土丁嘉祐七年籍稅戶應常役外五丁點一為之凡得三萬九千八百人分隊伍行陳習槍鏢排冬初集州按閲後遞歲州縣迭教察視兵械以防收刈改用十一月教一月罷熙寧七年知桂州劉彝言舊制宜融桂雍欽五郡土丁成丁已上者皆籍之既接蠻徼自懼寇掠守禦應援不待驅策而近制主戶自第四等以上三取一以為土丁而旁塞多非四等以上若三丁籍一則減舊丁十之七餘三分以為保丁保丁多處內地又俟其益習武事則當蠲土丁之籍恐邊備有闕請如舊制便奏可元豐六年廣西經略使熊本言宜州土丁七千餘人緩急可用欲令所屬編排分作都分除防盜外緣邊有警聽會合掩捕從之元符二年廣西察訪司言桂宜融等用土丁緣邊防拓差及單丁乞差兩丁以上之家從之廣南東路槍手嘉祐六年廣惠梅潮循五州以戶籍置三等已上免身役四等以下免戶役歲以十月一日集縣閲教治平元年詔所在遣官按閲一月罷有闕即招補不足選本鄉有武技者充熙寧元年詔廣州槍手十之三教弓弩手是歲會六郡槍手為指揮四十一總一萬四千七百有奇三年知廣州王靖言東路槍手自至和初立為土丁之額農隙肄業一月乃古者寓兵於農之策也然訓練勸奬之制未備請比三路義勇軍政教法條上約束四年知封州鄧中立請以本路未置槍手州縣如廣惠等五郡例置奏可六年廣東駐泊楊從先言本路槍手萬四千今為保甲兩丁取一得丁二十五萬三丁取一得丁十三萬以少計之猶十倍於槍手願委路分都監二員分提舉教閲詔司農寺定法以聞其後戶四等以上有三丁者以一為之每百人為一都五都為一指揮自十一月至二月月輪一番閲習凡三日一試擇其技優者先遣之七年詔廣南東西路舊槍手土丁戶依河北陝西義勇法三丁選一餘州無槍手土丁者勿置九年兵部言廣惠循潮南恩五郡槍手請籍主戶第四等以上壯丁毋過舊額一萬四千餘以為保甲奏可元豐二年詔廣惠潮封康端南恩七州皆並邊外接蠻徼宜依西路保甲教習武藝時又詔虔州槍仗手以千五百撫州建昌軍鄉丁關軍槍仗手各以千七百為額監司以農隙按閲武藝如廣東制雍欽溪洞壯丁治平二年廣南西路安撫司集左右兩江四十五溪洞知州洞將各占鄰迭為救應仍籍壯丁補校長給以旗號峒以三十人為一甲置節級五甲置都頭十甲置指揮使五十甲置都指揮使總四萬四千五百人以為定額各置戎械遇有寇警召集之二年一閲察視戎械有老病并物故名闕選少壯者填三歲一上熙寧中王安石言募兵未可全罷民兵則可漸復至於二廣尤不可緩今中國募禁軍往戍南方多死害於仁政陛下誠移軍職所得官十二三鼓舞百姓豪傑使趨為兵則事甚易成於是蘇緘請訓練二廣洞丁舊制一歲教兩月安石曰訓練之法當什伍其人拔其材武之士以為什百之長自首領以下各以祿利勸奬使自勤於閲習即事藝可成部分可立緩急可用六年廣南西路經略沈起言雍州五十一郡峒丁凡四萬五千二百請行保甲給戎械教陳隊藝出衆者依府界推恩補授奏可九年趙離征交址入辭帝諭以用峒丁之法當先誘以實利然後可以使人甘言虛辭豈能責其效命比鄜延集教蕃兵賴卿有以制之使輕罪可決重罪可誅違西夏則其禍遠違帥臣則其禍速合於兵法畏我不畏敵之義故能責其效命王師之南卿宜選募徑兵數千擇梟將領之以脅諸峒諭以大兵將至從我者有賞其不從者按族誅之兵威既振先脅右江右江既附復脅左江兩江附則諸蠻無不附者然後以攻交人劉紀巢穴甚非難也郭逵性吝嗇卿宜諭以朝廷兵費無所惜逵復事崖岸不通下情將佐莫敢言者卿至彼以朕語詔之十年樞密院請雍欽峒丁委經略司提舉同巡檢總涖訓練之事一委分接歲終上藝優者與其酋首第受賞五人為保五保為隊第為三等軍功武藝出衆為上蠲其徭役人材矯捷為中蠲其科配餘為下邊盜發則酋長相報率族衆以捍寇十二月詔雍欽丁壯自備戎械貧者假以官錢金鼓旗幟官給間歲大閲畢則斂藏之元豐元年經略司請集兩江峒丁為指揮權補將校奏可二年廣西經略司言團結雍欽峒丁為指揮一百七十五籍武藝上等一萬三千六百七人詔下諸臣獻議措置峒丁事付曾布參酌損益創為規畫務令詳盡便於施行布乃請令鎮寨監押寨主同管轄兵甲使臣與巡檢等分定州峒總制立賞罰懲勸增置都巡檢使兩員分提舉及增首領丁壯歲閲之以武藝絶倫者聞量材補授詔增都巡檢使二員餘下熊本擇其可者施行之五年詔廣南保甲如戎瀘故事自置裹頭無刃槍竹標棑木弓刀蒿矢等習武技遇捕盜則官給器械六年詔樞密承旨司講議廣西峒丁如開封府界保甲集教團教法是年提點廣西路刑獄彭次雲言雍苦瘴癘請量留兵更戍餘用峒丁以季月番上給禁軍錢糧詔許彥先度之彥先等言若盡以代正兵恐妨農請計戍兵三之一代以峒丁季輪二千赴雍州肄習武事從之大觀二年詔熙寧團集左右江峒丁十餘萬衆自廣以西賴以防守今又二十萬衆來歸已令張莊依左右江例相度聞奏尚慮有司不知先務措置滅裂今條畫行下其所修法入熙河蘭湟秦鳳路敕遵行之福建路槍仗手元豐元年轉運使蹇周輔言廖恩為盜以槍仗手捕殺乃有冒槍仗手之名乘賊勢驚擾村落患有甚於廖恩者詔犯者特加刺配周輔請額定槍仗手人數歲集閲之下其章兵部兵部請依保甲法編排罷舊法以隸提刑司居相近者五人為小保保有長五小保為一大保長十大保為一都副保正具教閲捕盜賊食直等令頒焉總一萬二百人有奇以歲之農隙部使者分閲依弓手法賞之二年立法聽自置兵械寄於官遇捕盜乃給數外置者從私有法元祐元年御史上官均言福建路往年因寇盜召募槍手多至數百人少不下一二百人每歲監司親至按試犒賞比至閲視其老弱不間武技者十七八監司所至多先期呼集既至往往代名充數冒受支賞徒有呼集之勞而無校試之實欲乞重行考核不必充滿舊數庶幾得實靖康元年臣僚言天下步兵之精無如福建路槍仗手出入輕捷馭得其術一可當十乞選官前去召募從之江南西路槍仗手熙寧七年詔籍虔汀漳三州鄉丁槍手等以制置盜賊司言三州壤界嶺外民喜販鹽且為盜非土人不能制故也元豐二年詔虔州槍仗手千五百三十六人撫州建昌軍鄉丁關軍槍仗手各千七百七十八人為定額每歲農隙輪監司提舉司官案閲武藝以備姦盜從前江西轉運副使蔣之奇請也宣和三年兵部言近因江西漕臣謂本路槍仗手元豐七年以八千三十五人為額至元祐中減罷七千一百四十二人元符間雖嘗增立人數比之元額猶減其七乞詔諸路監司帥臣並遵熙寧舊制補足元額從之蕃兵者具籍塞下內屬諸部落團結以為藩籬之兵也西北邊羌戎種落不相統一保塞者謂之熟戶餘謂之生戶陝西則秦鳳涇原環慶鄜延河東則石隰麟府其大首領為都軍主百帳以上為軍主其次為副軍主都虞候指揮使副兵馬使以功次補者為刺史諸衛將軍諸司使副使承制崇班供奉官至殿侍其充本族巡檢者奉同正員月添支錢十五千米麥丏傔馬有差刺史諸衛將軍請給同蕃官例首領補軍職者月奉錢自三千至三百又歲給冬服綿袍凡七種紫綾三種十將而下皆給田土康定初趙元昊反先破金明寨殺李士彬父子蕃部既潰乃破塞門安遠寨圍延州二年陝西體量安撫使王堯臣言涇原路熟戶萬四百七十餘帳之首領各有職名曹瑋帥本路威令明著嘗用之以平西羌其後守將失於撫馭寖成驕黠自元昊反鎮戎軍及渭州山外皆被侵擾近界熟戶亦遭殺虜蕃族之情最重酬賽因其隙而激怒之可復得其用請遣人募首領願效用者籍姓名及士馬之數數及千人聽自推有謀勇者授班行及巡檢職名使將領出境破蕩生戶所獲財畜官勿檢核得首級及傷者給賞仍依本族職名遷補增奉詔如所請慶曆二年知青澗城种世衡奏募蕃兵五千涅右手虎口為忠勇字隸折馬山族言者因請募熟戶給以禁軍廩賜使戍邊悉罷正兵下四路安撫使議環慶路范仲淹言熟戶戀土田護老弱牛羊遇賊力戰可以藩蔽漢戶而不可倚為正兵大率蕃情黠詐畏強凌弱常有以制之則服從可用如倚為正兵必至驕蹇又今蕃部都虞候至副兵馬使奉錢止七百悉無衣廩若長行遽得禁兵奉給則蕃官必生徼望况歲罕見敵何用長與廩給且錢入熟戶蕃部資市羊馬青鹽轉入河西亦非策也若遇有警旋以金帛募勇猛為便議遂格治平二年詔陝西四路駐泊鈐轄秦鳳梁實涇原李若愚環慶王昭明鄜延韓則順各管勾本路蕃部團結強人壯馬預為經畫寇至則老弱各有保存之所仍諭實等往來蕃帳受其牒訴伸其屈抑察其反側者羈縻之勿令猜阻以萌釁隙實等至蕃部召首領稱詔犒勞齎以金帛籍城寨兵馬計族望大小分隊伍給旗幟使各繕堡壘人置器甲以備調發仍約如令下不集押隊首領以軍法從事自治平四年以後蕃部族帳益多而撫御團結之制益密故別附于其後云秦鳳路寨十三強人四萬一千一百九十四壯馬七千九百九十一三陽寨十八門三十四大部族四十三姓一百八十族總兵馬三千四百六十七隴城寨五門五大部族三十四小族三十四姓總兵馬二千五十四弓門寨二大門十七部族十七姓十七小族總兵馬一千七百四冶坊寨二大門二大部族九姓九小部族總兵馬三百六十穰寨二大門二大部族十一姓十一小族總兵馬一千八十靜戎寨門三計大部族十六姓十六小族總兵馬六百二十五定西寨四門四大部族十六姓二十八族總兵馬六百伏羌寨二門二大部族三