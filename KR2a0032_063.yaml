三莖九月江陵府永泰寺竹出地七節分為兩莖長丈餘知府陳堯咨以聞華州敷水民侯元則入華陽川石罅得芝一本知州顧端以獻十月內侍任文慶詣茅山設醮洞中獲芝草二十八本有如人手者十一月安鄉縣謝山獲芝二十二本其七狀如珊瑚而色紫十二月神泉縣獲芝四本四年正月知華州崔端獻芝草狀如仙人掌須城縣民李道安於黃仙公洞臺上得芝草一本以獻二月崔端又獻芝草十本知益州任中正獻芝草二十二本知遂州毋賓古獻芝草四月古田縣僧舍竹一本上分三莖端昌縣民李讓家筀竹一本去地五尺許分為二莖知州范應辰以聞六月夔州芝草生廩舍中七月知亳州徐泌知江州王文震並獻芝草知郴州袁延慶獻芝草十本八月邕州雲封寺柏樹生芝五本知州劉知詰以獻西充縣廣川王廟生芝十本其三連理八月知信州李放獻瑞竹圖三本十一月河中府獻芝草真源縣民王順慈司徒揵家生芝各一本岳州道州並獻芝草南嶽奉冊使薛映副使錢惟演過荊門軍神林石上獲芝草以獻十二月鉛山縣仁壽僧舍生芝草一本雙枝長尺八寸五年六月潯州六祖院法堂紫芝雙秀知州高志寧以聞八月亳州獻芝草十月澤州廳事梁上生白莖紫蓋芝二十四本閏十月常州芝草生又蕭山縣芝生李樹上十一本十一月廣州獻芝草二百三十七本晉原縣僧舍芝草一本十二月隨州芝草生亳州獻鹿邑縣民所獲芝草四本候官縣山上生芝草五十四本閩縣望泉寺生芝草十本寧德縣支提山石上生芝草十五本六年二月江州廬山崇聖院生芝九本知州王文震以獻四月饒州承天院東山生芝四本連葉六月壽丘縣獲紫莖金芝一本景陵縣管陽山林中獲芝三十本七月內侍石延福登兗州壽丘獲芝一本貫草而生又旁得三十本亳州團練使高漢英獻芝八本鼎州城門柱下生芝一本八月繼照堂生芝一本紫莖黃蓋奉祀經度制置使丁謂至真源縣太清宮道士瀨陽鄉民繼獲芝八十本以獻乙丑又獲二百五十本有一本三莖一莖如雲氣佛像者九月又得宋城縣民所獲芝五十本獻之十月丁謂來朝獻芝草三萬七千一百八本飾以仙人寶禽異獸之狀十一月又獻九萬五千一百本明年車駕至真源民有詣行闕獻者又一萬八千本是冬兗州景靈宮芝草生慶成軍大寧廟聖製碑閣生金芝二本昭州龍嶽山資壽寺芝草生潯州廳廨柱芝生一本上分為二其上又生二本凡三重無錫縣民曹詵家食案生芝赤黃有光長尺許又知南安軍章得一獻芝草七年正月明州獻茹侯山石上芝草一本四莖二月知信州歐陽陟獻芝草七本忠州獻芝五本四月福州獻芝草二本五月郪縣西上石崖生紫芝十五本七月華州民入華山得白石上芝草雙莖連蓋八月均州獻州獻芝千二百二十七本十月慶成軍大寧廟石雙莖芝生其上合幹明英二州芝草生十一月蜀州芝草二本生竹根八年二月青州武成王廟柱生芝一本知州張知白以圖獻三月榮州應靈縣彌陀佛舍生紫芝三本其一雙幹上如蓋四月昌州有芝生石上一本四莖其色黃白四月彰明縣民家竹一根上分二本十三節又開元寺桃竹一莖上分十八節皆相對五月道州舜祠旁生芝二十一本六月盩厔縣民家芝草三莖共成一葉又石芝一本十月晉原縣民柏扆家生芝三根合為一本九年七月知信州董溫獻芝十二本八月知廬州余獻卿獻芝二本九月涪城縣石壁生芝二本十一月武岡縣民何文化園竹生兩株同本上分四莖十二月晉原縣民李彥滔家竹一本雙莖對節知州王世昌圖以獻天禧元年三月新津縣平蓋下玉皇案下芝草生鄂州天慶觀聖祖殿芝草生四月邵陽等縣竹生穗如米民饑食之又浮梁縣竹生穗如米七月漢陽軍太平興國寺異竹一本生二莖節皆相對十二月庚午內出芝草如真武像二年正月庚子內出真遊崇徽二殿梁上芝草圖示宰相五月兗州景靈宮昭慶殿生金芝二本三年六月漢陽軍芝草生一百五十餘本七月嵩山崇福宮獲芝草一百本有重臺連理貫草者知河南府馮拯以獻四年四月梁山軍民王崇扆竹園生金暈紫芝五本十一月上饒縣民王壽園中生芝草三本皆金暈其二連理乾興元年六月蘇秀二州湖田生聖米居民取以食興州竹有實如大麥民取以食占曰大饑八月洋州民李永負土成母墳芝生墳上天聖元年五月興州竹有實如大麥民取以食之占曰竹有實大饑八月甲寅有芝生于天安殿柱召輔臣觀之九月戊午城西下木場芝草生三年七月梓州城門生芝二本四年正月梓州民家生芝四本九月榮州芝生明道元年七月榮州連州並芝生景祐二年九月嘉州芝草生四年五月丙寅有芝生于化成殿楹慶曆元年二月丙午京師雨藥二年八月梓州芝草生五年八月洪州章江禪院堂柱芝草生高一尺三寸葉二十一層色白黃有紫暈旁生小芝葉九層上有氣如煙皇祐元年七月福州生芝一十二本十月湖州芝草生三年六月丁亥無為軍獻芝草凡三百五十本上曰朕以豐年為上瑞賢臣為寶至於草木魚蟲之異焉足尚哉五年閏七月榮州芝草生嘉祐三年十一月河南府芝草生六年正月清川縣漢光武祠生芝草一本三岐八月施州歌羅砦生芝四本十月汝州新砦巡檢廨舍生芝五本熙寧元年益陽縣雷震山裂出米可數十萬斛賫至京師信米也但色黑如炭八年七月鼎州產芝三本其一類珊瑚枝葉摎結鹽官縣自三月地產物如珠可食水產菜如菌可為葅饑民賴之九年五月流江縣產芝二十一本元豐二年四月眉州生瑞竹六月忠州雨豆七月甲午南賓縣雨豆十一月全州芝生十二本三年六月安州芝生二十九本其一連理臨江軍芝生四十三本四年十月郪縣天慶觀生瑞竹一本自第九節分莖雙起五年七月永康縣生紫芝九本十一月閬中縣生紫芝六金芝七永康縣生紫芝九六年八月吉州芝生三十三本十二月滕縣官舍生異草經月不腐七年四月景靈宮芝生六本於天元殿門五月開化縣芝生九本黃白紫色八月永安陵下宮芝生一本十月青州芝生二十一本元祐元年七月武安軍言前祕書省正字鄧忠臣母墳前生芝草一本紫莖黃蓋三年六月臨江縣塗井鎮雨白忝七月又雨黑忝四年九月江津縣石上生芝草二本六莖五年二月晉原縣生芝草四十二本七年十一月滁州生芝二百餘本紹聖三年九月淄川縣生芝草有穀十科穿芝草生二枝十月河南府大內地生芝草元符二年正月處州民田生瑞竹二月瀘州生芝草一本同根駢幹至蓋復合為一又衡州郡廳生紫芝一根十六葉崇寧元年八月盤石縣芝草連理三年十月復州澤州芝草生四年正月戎州宿州芝草生七月瀘州芝草瑞竹生五年冬澶州安州芝草生大觀元年三月宣鄆湖潤州皆芝草生廬州雨大豆九月崇天臺及兗州孔林芝草生二年陳兗筠州廣德軍芝草生三年秋西京湖海普渠州南安軍芝草生政和元年正月萊州芝草生十一月虔州聖祖殿芝草生二年二月戊子河南府新安縣蟾蜍背生芝草自是而後祥瑞日聞玉芝產禁中殆無虛歲凡殿宇園苑及妃嬪位皆有之外則中書尚書二省太學醫學亦產紫芝四年八月建州境內竹生米數千萬石五年十一月癸酉越州承天寺瑞竹一竿七枝幹相似其葉圓細生花結實詔送祕書省仍拜表賀五年五月禁中芭蕉連理八月甲子蘄州進芝草一萬一千六百枝內一枝紫色九幹十二月己未汝州進六萬本其間連理雙枝者一千八百八十有司不勝其紀初猶表賀後以為常不皆賀也時朱勝非為京東提舉學事行部至密州界見縣令部數百夫入山採芝彌漫山谷皆芝菌也或附木石或出平地有一本數十葉層疊高大衆色咸備郡守李文仲採及三十萬本每萬本作一綱入貢文仲尋進職授本道轉運使建炎二年九月癸卯權知密州杜彥獻芝草五葉如人指掌色赤而澤宰臣黃潛善奏色符火德形像股肱之瑞高宗不啟視却之紹興元年七月乙未浙西安撫大使劉光世以枯秸生穗奏瑞高宗曰朕在潛邸梁間生芝草官僚皆欲上聞朕手碎之不欲寶此奇怪乃却之十六年正月辛未瀘州天雨豆近草妖也十六年梅州孔子廟生芝二十一年紹興府學御書下生芝番陽縣石門民家籬竹生重萼牡丹又民家竈鼎生金色蓮華房州治所綵山下生萬州虔州放生池生蓮皆同蔕異萼二十三年六月汀州生蓮同蔕異萼者十有二二十五年五月太室楹生芝九莖秦檜帥百官觀之稱賀勾龍廉沈中立以獻頌遷擢周麟之請繪之鹵簿行旗檜孫禮部侍郎塤請以黎州甘露降草木道州連理木鎮江府瑞瓜南安軍瑞蓮嚴信州瑞芝悉圖之旗是冬檜薨高宗曰比年四方奏瑞文飾取悅若信州林機奏秦檜父祠堂生芝佞諛尤甚明年四月甲午詔郡國無獻瑞乾道元年七月池州竹生穗實如米飢民采之以食守臣魯詧為野穀生竹圖以獻御史劾詧不以民食草木為病坐佞免官慶元五年八月太室西北夾室楹生白芝四葉前史以白芝為喪祥明年八月國連有大喪嘉泰二年十一月祕書省右文殿楹生芝二莖
