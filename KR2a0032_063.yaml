body:
  text: 宋史卷六十三志第十六五行二上火炎上火之性也火失其性則為災眚舊說以恆燠草妖羽蟲之孽羊禍赤眚赤祥之類皆屬之火今從之建隆元年宿州火燔民舍萬餘區二年三月內酒坊火燔舍百八十區酒工死者三十餘三年正月滑州甲仗庫火燔儀門及軍資庫一百九十區兵器錢帛並盡開封府通許鎮民家火燔廬舍三百四十餘區二月安州牙吏施延業家火燔民舍幷顯義軍營六百餘區五月京師相國寺火燔舍數百區海州火燔數百家死者十八人乾德四年二月岳州衙署廩庫火燔市肆民舍殆盡官吏踰城僅免三月陳州火燔民舍數十區潭州火燔民舍五百餘區踰月民周澤家火又燔倉廩民舍數百區死者三十六人是春諸州言火者甚衆八月衡州火燔公署倉庫民舍僅千餘區五年京師建隆觀火開寶三年八月辰州廨火燔軍資庫五年七月忠州火倉庫殆盡七年九月永城縣火燔民舍一千八百餘區八年四月洋州火燔州廨民舍千七百區永城縣火燔軍營民舍千九百八十區死者九人太平興國七年八月益州西倉災雍熙元年五月丁丑乾元文明二殿災初夕陰雲雷震火起月華門翌日辰巳方止二年九月庚寅夜楚王元佐宮火燔舍數百區王自是以疾廢于家三年光化軍民卻勳家火延燔軍廨舍庫端拱元年二月雲安軍威棹營火二年三月衡州火燔州縣官舍倉庫軍營三百餘區又崇賢坊有鳥燔數十處七日不滅淳化三年十月蔡州懷慶軍營火燔汝河橋民居官舍三千餘區死者數人十二月建安軍城西火燔民舍官廨等殆盡四年二月永州保安津舍火飛焰過江燒州門及民屋三百餘家咸平二年四月池州倉火燔米八萬七千斛景德元年正月平虜軍營火焚民居廬舍甚衆四年十一月郢州火燔倉庫並盡大中祥符元年正月桂州甲仗庫災二年四月昇州火燔軍營民舍殆盡四年八月徐州草場火十月鎮州城樓戰棚火七月雄州甲仗庫火八年二月甲寅宗正寺火四月壬申夜榮王元儼宮火自三鼓北風甚癸酉亭午乃嚳宗延燔左承天祥符門內藏庫朝元殿乾元門崇文院祕閣天書法物內香藏庫九年五月甲子左天坊草場火天禧二年二月戊寅北宅蔡州團練使德雍院火延燔數百區三年春京師多火六月永州軍營火延民舍數百餘區五年四月丁巳事材場火天聖三年二月丁卯蘄州榷貨務火五年四月壬辰壽寧觀火七年六月丁未玉清昭應宮災初大中祥符元年詔建宮以藏天書七年宮始成凡二千六百一十楹至是火發夜中大雷雨至曉而盡明道元年八月壬戌修文德殿成是夜禁中火延燔崇德長春滋福會慶延慶崇徽天和承明八殿景祐三年七月庚子太平興國寺火起閣中延燔開先殿及寺舍數百楹是夕大雨雹十月己酉澶州橫龍水口西岸料物場火焚薪芻一百九十餘萬寶元二年六月丁丑益州火焚民廬舍二千餘區康定元年六月乙未南京鴻慶宮神御殿火慶曆元年五月癸亥慶州草場火延燔州城樓櫓三年十一月丙寅上清宮火四年三月丙戌夜代州五臺山寺火六月丁未開寶寺靈感塔災七月甲子燕王宮火六年七月辛丑洪福禪院火八年正月壬午江寧府火初李景江南大建宮室府寺其制多倣帝室至是一夕而焚唯玉燭殿獨存皇祐五年正月丁巳會靈觀火至和元年四月辛丑祥元觀火二年幷州太宗神御殿火嘉祐三年正月溫州火燔屋萬四千間死者五十人治平四年十二月壬子夜睦親宮火焚九百餘間甲寅廣親宮又火熙寧六年二月丙申永昌陵上宮火燔東城門七年九月壬子三司火自巳至戌焚屋千八百楹案牘殆盡十一月洞真宮火九年十月魯王濮王宮火十年正月仙韶院火撤屋二百五十楹三月丙子開封府火元豐元年八月邕州火焚官舍千三百四十六區諸軍衣萬餘襲穀帛軍器百五十萬四年六月衡州火燒官舍民居七千二百楹欽州大雷震火焚城屋五年二月洞真宮火八年二月辛巳開寶寺火時寓禮部貢院於寺點校試卷官翟曼陳之方馬希孟焚死吏卒死者十四人元祐元年三月宗室宮院火六年十二月開封府火紹聖三年三月七日內尚書省火尋撲滅上諭執政禁中屢火方醮禳已罷春宴仍不御垂拱殿三日四年七月甲子禁中火元符元年四月宗室宮院火建中靖國元年六月壬寅集禧觀火大雨中久而後滅崇寧二年六月中太乙宮火三年三月辛丑大內火政和三年四月蘇州火延燒公私屋一百七十餘間五月封州火延燒公私屋六百八十二間五月辛丑京師大盈倉火是歲成都府大慈寺溫州絳州皆火重和元年九月掖庭大火自甲夜達曉大雨如傾火益熾凡五千餘間後苑廣聖宮及宮人所居幾盡焚死者甚衆靖庚元年十二月丙子夜尚書省火延燒禮祠工刑吏部拆尚書省牌擲火中禳之乃息二年三月戊戌天漢橋火焚百餘家頃之都亭驛又火己酉保康門火紹興元年十月乙酉臨安府越州大火民多露處十二月辛未越州火焚吏部文書乙酉移蹕錢塘二年正月丁巳宣州火燔民居幾半五月庚辰臨安府大火亙六七里燔萬數千家十二月甲午行都大火燔吏刑工部御史臺官府民居軍壘盡乙未旦乃熄三年九月庚申行都闕門外火多燔民居四年正月戊寅行都火燔數千家六年二月行都屢火燔千餘家十二月行都大火燔萬餘家人有死者時高宗親征劉豫都民之暴露者多凍死七年正月辛未平江府火二月辛丑鎮江府楚真揚太平州火是歲臨安府火八年二月丁酉太平州大火宣撫司及官舍民居帑藏文書皆盡死者甚衆錄事參軍呂應中當塗縣丞李致虛死焉九年二月己卯行都火七月壬寅又火十年十月行都火燔民居延及省部十一月丁巳溫州大火燔州學酤征舶等務永嘉縣治及民居千餘十一年七月癸亥婺州大火燔州獄倉場寺觀暨民居幾半九月甲寅建康府火燔府治三十餘區民居三千餘家十二年二月辛巳鎮江府火燔倉米數萬石芻六萬束民居尤衆是月太平池州及蕪湖縣皆火三月丙申行都火四月行都又火十四年正月甲子行都火十五年大寧監火燔官舍帑藏文書九月甲子行都火經夕漸近太室而滅十七年八月建康府火十二月辛亥靜江府火燔民舍甚衆二十年正月壬午行都火燔吏部文書皆盡二十五年汴京宮室悉焚二十六年潭州南嶽廟火二十九年四月鎮江府火焚軍壘民居十二月丙子夔州大火燔官舍民居寺觀人有死者乾道元年正月泰州火燔民舍幾盡是年春德安府應城縣驛火二年冬真州六合縣武鋒軍壘火十二月婺州火自是火患不息人火之也三年五月泉州火五年十二月壬申太室東北垣外民舍火七年十一月丁亥禁垣外閹人私舍火延及民居九年九月台州火經夕至于翌日晝漏半燔州獄縣治酒務及居民七千餘家淳熙元年十二月丁巳泉州火燔城樓及五十餘家二年六月戊午潭州南嶽廟火八月嚴州火十一月癸亥麗正門內東廡災是歲瀘州火坐上焚民居不實守臣貶秩三年九月大內射殿災延及東宮門四年十一月辛酉鄂州南市火暴風通夕燔千餘家五年四月庚寅興州沙市火燔三百四十餘家有死者十一月和州牧營火燔一百六十區七年二月江陵府沙市大火燔數千家延及船艦死者甚衆八月溫州試士火作于貢闈八年正月揚州火九月乙亥行都火九年九月合州大火燔民居幾盡官舍僅有存者十一年二月辛酉興元府義勝軍壘舍火十二年八月溫州火燔城樓及四百餘家十月鄂州大火燔萬餘家江風暴作結廬隄上泊舟岸下者焚溺無遺十四年五月大內武庫災戎器不害六月庚寅行都寶蓮山民居火延燒七百餘家救焚將校有死者五月成都府市火燔萬餘家十六年九月南劍州大火民居存者無幾紹熙元年八月壬寅處州火燔數百家十二月戊申建寧府浦城縣火時查洞寇張海作亂焚五百餘家二年四月行都傳法寺火延及民居言者以戚里土木為孽火數起之應是月徽州大火夜燔州治譙樓官舍獄宇錢帑庫務凡十有九所五百二十餘區延燒千五百家自庚子至于壬寅乃熄五月己巳金州火燔州治官舍帑藏保勝軍器庫城內外民居甚衆三年正月己巳行都火通夕至于翌日闤闠焚者半十一月又火燔五百餘家十二月甲辰鄂州火至于翌日燔八百家慶元二年八月己酉永州火燔三百家三年閏月甲申金州都統司中軍壘舍火焚千三百餘區閱六月乙酉又火燔二千餘區是冬紹興府僧寺火延燒數百家六年八月戊戌徽州火燔州獄官舍延及八百餘家嘉定元年三月戊寅行都大火至于四月辛巳燔御史臺司農寺將作軍器監進奏文思御輦院太史局軍頭皇城司法物庫御廚班直諸軍壘延燒五萬八千九十七家城內外亙十餘里死者五十有九人踐死者不可計城中廬舍九燬其七百官多僦舟以居火作於寶蓮山御史臺胥楊浩家諫議大夫程松請戮浩以謝都民疏再上始黥配萬安軍猶免決自是民訛言相驚亡賴因縱火為姦利二年六月己卯臨安府火三年正月丁酉襄陽府火作而風暴選鋒軍校于友直死於救焚止延燒六十餘家帥漕臣上其功贈二秩官其子二十一月甲午福州火燔四百餘家四年三月丁卯行都大火燔尚書中書省樞密院六部右丞相府制勑粮料院親兵營修內司延及學士院內酒庫內宮門廡夜召禁旅救撲太室撤廟廡遷神主幷冊寶於壽慈宮翼日戊辰旦火及和寧門鴟吻禁卒張隆飛梯斧之門以不焚火作時分數道燔二千七十餘家又翌日己巳神主還太室時省部皆寓治驛寺四月丙申臨安府梵天寺火六月盱眙軍天長縣禁軍營火鎧械為盡八月壬辰鄂州外南市火燔五百餘家開禧二年二月癸丑壽慈宮災四月壬子行都火燔數百家嘉定二年八月己巳信州火燔二百家九月丁酉吉州火燔五百餘家是歲瀘州火燔千餘家十一月丁亥建寧府政和縣火燔百餘家四年閏二月己卯紹興府嵊縣浦橋火燔百餘家三月滁州火燔民居甚多十月撫州火辛卯福州一夕再火燔城門僧寺延燒千餘家死者數人五年五月己未和州火燔二千家八年八月辛丑湖州火燔寺觀延燒三百家九年七月甲戌南劍州沙縣火燔縣門官舍及千一百餘家民有死者十一年二月行都火燔數百家九月己巳禁垣外萬松嶺民舍火燔四百八十餘家十三年二月庚寅安豐軍故步鎮火燔千餘家死者五十餘人八月庚午慶元府火燔官舍第宅寺觀民居甚衆十一月壬子行都火燔城內外數萬家禁壘百二十區十七年四月丁卯西和州焚軍壘及居民二千餘家人火之也守臣尚震午誤以為金人至而遁六月丁亥岳州火燔岳陽樓州獄帑庫延及八十家己丑又火燔百餘家紹定元年三月行都火燔六百餘家嘉熙元年六月臨安府火燔三萬家淳祐元年徽州火十二年十一月丙申行都火至丁酉夜始熄景定四年紹興火五年臨安府大火德祐元年玉牒所災乾德二年冬無雪五年冬無雪開寶元年冬京師無雪二年冬無雪淳化二年冬京師無冰至道元年冬無雪二年冬無雪大中祥符二年京師冬溫無冰天聖五年夏秋大暑毒氣中人嘉祐六年冬京師無冰治平四年冬無雪元豐八年冬無雪元祐元年冬無雪四年冬京師無雪五年冬無冰雪紹興五年五月大燠四十餘日草木焦槁山石灼人暍死者甚衆三十一年冬無雪乾道三年冬溫少雪無冰五年冬溫無雪六年冬溫無雪冰紹熙三年冬潼川路不雨氣燠如仲夏日月皆赤榮州尤甚慶元元年冬無雪二年冬無雪四年冬無雪越歲春燠而雷六年冬燠無雪桃李華蟲不蟄開禧三年冬少雪嘉定元年春燠如夏六年冬燠而雷無冰蟲不蟄八年夏五月大