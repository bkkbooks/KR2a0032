body:
  text: 宋史卷一百七十四志第一百二十七食貨上二方田賦稅方田神宗患田賦不均熙寧五年重修定方田法詔司農以方田均稅條約並式頒之天下以東西南北各千步當四十一頃六十六畝一百六十步為一方歲以九月縣委令佐分地計量隨陂原平澤而定其地因赤淤黑壚而辨其色方量畢以地及色參定肥瘠而分五等以定稅則至明年三月畢揭以示民一季無訟即書戶帖連莊帳付之以為地符均稅之法縣各以其租額稅數為限舊嘗收蹙奇零如米不及十合而收為升絹不滿十分而收為寸之類今不得用其數均攤增展致溢舊額凡越額增數皆禁若瘠鹵不毛及衆所食利山林陂塘溝路墳墓皆不立稅凡田方之角立土為埄植其野之所宜木以封表之有方帳有莊帳有甲帖有戶帖其分煙析産典賣割移官給契縣置簿皆以今所方之田為正令既具乃以濟州巨野尉王曼為指教官先自京東路行之諸路倣焉六年詔土色分五等疑未盡下郡縣物其土宜多為等以期均當勿拘以五七年京東十七州選官四員各主其方分行郡縣以三年為任每方差大甲頭二人小甲頭三人同集方戶令各認步畝方田官驗地色更勒甲頭方戶同定諸路及開封府界秋田災傷三分以上縣權罷餘候農隙河北西路提舉司乞通一縣災傷不及一分勿罷元豐五年開封府言方田法取稅之最不均縣先行即一州而及五縣歲不過兩縣今府界十九縣准此行之十年乃定請歲方五縣從之其後歲稔農隙乃行而縣多山林者或行或否八年帝知官吏擾民詔罷之天下之田已方而見於籍者至是二百四十八萬四千三百四十有九頃云崇寧三年宰臣蔡京等言自開阡陌使民得以田私相貿易富者恃其有餘厚立價以規利貧者迫於不足薄移稅以速售而天下之賦調不平久矣神宗講究方田利害作法而推行之方為之帳而步畝高下丈尺不可隱戶給之帖而升合尺寸無所遺以賣買則民不能容其巧以推收則吏不能措其姦今文籍具在可舉而行詔諸路提舉常平官選官習熟其法諭州縣官吏各以豐稔日推行自京西河北兩路始四年指教官每三縣加一員點檢官每路二員未幾詔諸路添置指教官不得過三員又不專差點檢官從提舉司於本路見任人內選差五年詔罷方田大觀二年復詔行之四年罷其稅賦依未方舊則輸納十一月詔方田官吏非特妄增田稅又兼不食之山方之俾出芻草之直民戶因時廢業失所監司其悉改正毋失其舊政和三年河北西路提舉常平司奏所在地色極多不下百數及至均稅不過十等第一等雖出十分之稅地土肥沃尚以為輕第十等只均一分多是瘠鹵出稅雖少猶以為重若不入等則積多而至一頃止以柴蒿之直為錢自一百而至五百比次十等全不受稅既收入等但可耕之地便有一分之稅其間下色之地與柴蒿之地不相遠乃一例每畝均稅一分上輕下重欲乞土色十等如故外即十等之地再分上中下三等折畝均數謂如第十等地每十畝合折第一等一畝即十等之上受稅十一不改元則十等之中數及十五畝十等之下數及二十畝方比上等受一畝之稅庶幾上下輕重皆均詔諸路概行其法五年福建利路茶戶山園如鹽田例免方量均稅宣和元年臣僚言方量官憚於跋履並不躬親行繵拍埄驗定土色一付之胥吏致御史臺受訴有二百餘畝方為二十畝者有二頃九十六畝方為一十七畝者虔之瑞金縣是也有租稅十有三錢而增至二貫二百者有租稅二十七錢則增至一貫四百五十者虔之會昌縣者是也望詔常平使者檢察二年遂詔罷之民因方量流徙者守令招誘歸業荒間田土召人請佃自今諸司毋得起請方田諸路已方量者賦稅不以有無訴論悉如舊額輸納民逃移歸業已前逋缺稅租並與除放賦稅自唐建中初變租庸調法作年支兩稅夏輸毋過六月秋輸毋過十一月遣使分道按率其弊也先期而苛斂增額而繁征至于五代極矣宋制歲賦其類有五曰公田之賦凡田之在官賦民耕而收其租者是也曰民田之賦百姓各得專之者是也曰城郭之賦宅稅地稅之類是也曰丁口之賦百姓歲輸身丁錢米是也曰雜變之賦牛革蠶鹽之類隨其所出變而輸之是也歲賦之物其類有四曰穀曰帛曰金鐵曰物産是也穀之品七一曰粟二曰稻三曰麥四曰黍五曰穄六曰菽七曰雜子帛之品十一曰羅二曰綾三曰絹四曰紗五曰絁六曰紬七曰雜折八曰絲線九曰綿十曰布葛金鐵之品四一曰金二曰銀三曰鐵鑞四曰銅鐵錢物産之品六一曰六畜二曰齒革翎毛三曰茶鹽四曰竹木麻草芻萊五曰果藥油紙薪炭漆蠟六曰雜物其輸有常處而以有餘補不足則移此輸彼移近輸遠謂之支移其入有常物而一時所須則變而取之使其直輕重相當謂之折變其輸之遲速視收成早暮而寬為之期所以紓民力諸州歲奏戶帳具載其丁口男夫二十為丁六十為老兩稅折科物非土地所宜而抑配者禁之五代以來常檢視見墾田以定歲租吏緣為姦稅不均適繇是百姓失業田多荒蕪太祖即位詔許民闢土州縣毋得檢括止以見佃為額選官分涖京畿倉庾及詣諸道受民租調有增羡者輒得罪多入民租者或至棄市舊諸州收稅畢符屬縣追吏會鈔縣吏厚斂里胥以賂州之吏里胥復率於民民甚苦之建隆四年乃下詔禁止令諸州受租籍不得稱分毫合籥銖釐絲忽錢必成文絹帛成尺粟成升絲綿成兩薪蒿成束金銀成錢紬不滿半匹絹不滿一匹者許計丈尺輸直無得三戶五戶聚合成匹送納煩擾民輸夏稅所在遣縣尉部弓手於要路巡護後聞擾民罷之止令鄉耆壯丁防援諸州稅籍録事參軍按視判官振舉形勢戶立別籍通判專掌督之二稅須於三限前半月畢輸歲起納二稅前期令縣各造稅籍具一縣戶數夏秋稅苗畝桑功及緣科物為帳一送州覆校定用州印藏長吏廳縣籍亦用州印給付令佐造夏稅籍以正月一日秋稅籍以四月一日並限四十五日畢開封府等七十州夏稅舊以五月十五日起納七月三十日畢河北河東諸州氣候差晚五月十五日起納八月五日畢潁州等一十三州及淮南江南兩浙福建廣南荊湖川峽五月一日起納七月十五日畢秋稅自九月一日起納十二月十五日畢後又並加一月或值閏月其田蠶亦有早晚不同有司臨時奏裁繼而以河北河東諸州秋稅多輸邊郡常限外更加一月江南兩浙荊湖廣南福建土多粳稻須霜降成實自十月一日始收租掌納官吏以限外缺數差定其罰限前畢減選升資民逋租踰限取保歸辦毋得禁繫中國租二十石輸牛革一準錢千川蜀尚循舊制牛驢死革盡入官乃詔蠲之定民租二百石輸牛革一準錢千五百太平興國二年江西轉運使言本路蠶桑數少而金價頗低今折徵絹估少而傷民金估多而傷官金上等舊估兩十千今請估八千絹上等舊估匹一千今請估一千三百餘以次增損從之咸平三年以刑部員外直史館陳靖為京畿均田使聽自擇京朝官分縣據元額定稅不得增收剩數逃戶別立籍令本府招誘歸業桑功更不均檢民戶廣令種植尋聞居民弗諭朝旨翦伐桑柘即詔罷之六年廣南西路轉運使馮漣上言廉橫賓白州民雖墾田未嘗輸送已命官檢括令盡出常租帝曰遠方之民宜省徭賦亟命停罷知袁州何蒙請以金折本州二稅真宗曰若是將盡廢耕農矣不許大中祥符初連歲豐稔邊儲有備河北諸路稅賦並聽於本州軍輸納二年頒幕職州縣官招徠戶口旌賞條制舊制縣吏能招增戶口者縣即升等乃加其奉至有析客戶為主戶者雖登于籍而賦稅無所增四年詔禁之雍熙初嘗詔荊湖等路民輸丁錢未成丁已入老並身有廢疾者免之至是又除兩浙福建荊湖廣南舊輸身丁錢歲凡四十五萬四百貫九年詔諸路支移稅賦勿至兩次仍許以粟麥蕎菽互相折輸凡歲賦穀以石計錢以緡計帛以匹計金銀絲綿以兩計藁秸薪蒸以圍計他物各以其數計至道末總七千八十九萬三千天禧五年視至道之數有增有減總六千四百五十三萬其折變及移輸比壤者則視當時所須焉宋克平諸國每以恤民為先務纍朝相承凡無名苛細之斂常加剗革尺縑斗粟未聞有所增益一遇水旱徭役則蠲除倚格殆無虛歲倚格者後或凶歉亦輒蠲之而又田制不立甽畝轉易丁口隱漏兼並冒僞未嘗考按故賦入之利視前代為薄丁謂嘗言二十而稅一者有之三十而稅一者有之仁宗嗣位首寬畿縣田賦詔三等以下戶毋遠輸河中府同華州請免支移帝以問輔臣對曰西鄙宿兵非移用民賦則軍食不足特詔量減支移福州王氏時有田千餘頃謂之官莊自太平興國中授券豫民耕歲使輸賦至是發運使方仲荀言此公田也鬻之可得厚利遣尚書屯田員外郎幸惟慶領其事凡售錢三十五萬餘緡詔減緡錢三之一期三年畢償監察御史朱諫以為傷民不可既而期盡未償者猶十二萬八千餘緡詔悉蠲之後又詔公田重復取賦者皆罷天聖時貝州言民析居者例加稅謂之罰稅他州無此比詔除之自是州縣有言稅之苛細無名者蠲損甚衆自唐以來民計田輸賦外增取他物復折為賦謂之雜變亦謂之沿納而名品煩細其類不一官司歲附帳籍並緣侵擾民以為患明道中帝躬耕籍田因詔三司以類併合於是悉除諸名品併為一物夏秋歲入第分粗細二色百姓便之州縣賦入有籍歲一置謂之空行簿以待歲中催科閏年別置謂之實行簿以藏有司天聖初或言實行簿無用而率民錢為擾罷之景祐元年侍御史韓瀆言天下賦入之繁但存催科一簿一有散亡則耗登之數無從鉤考請復置實行簿詔再閏一造至慶曆中復故時患州縣賦役之煩詔諸路上其數俾二府大臣合議蠲減又詔曰稅籍有僞書逃徙或因推割用幸走移若請占公田而不輸稅如此之類縣令佐能究見其弊以增賦入量數議賞既而諫官王素言天下田賦輕重不等請均定而歐陽修亦言祕書丞孫琳嘗往洺州肥鄉縣與大理寺丞郭咨以千步方田法括定民田願詔二人者任之三司亦以為然且請於亳壽蔡汝四州擇尤不均者均之於是遣咨蔡州咨首括一縣得田二萬六千九百三十餘頃均其賦於民既而咨言州縣多逃田未可盡括朝廷亦重勞人遂罷陝西河東用兵民賦率多支移因增取地里腳錢民不能堪五年詔陝西特蠲之且令後勿復取既而詔河東亦然又令諸路轉運司支移折變前期半歲書于榜以諭民有未便者聽自言主者裁之皇祐中詔廣西賦布匹為錢二百如聞有司擅損其價重困遠人宜令復故州郡歲常先奏雨足歲豐後雖災害不敢上聞故民賦罕得蠲者乃下詔申飭之又損開封諸縣田賦視舊額十之三命著于法支移折變貧弱者尤以為患景祐初嘗詔戶在第九等免之後孤獨戶亦皆免至是因下赦書責轉運司裁損歲終條上其後赦書數以為言又令折科為平估毋得害農久之復詔曰如聞諸路比言折科民賦多以所折復變他物或增取其直重困良農雖屢戒敕莫能奉宣詔令自今有此州長吏即時上聞然有司規聚斂罕能承帝意焉初湖廣閩浙因舊制歲斂丁身錢米大中祥符間詔除丁錢而米輸如故至天聖中始並除婺秀二州丁錢後龐籍請罷漳泉興化軍丁米有司持不可皇祐三年帝命三司首減郴永州桂陽監丁米以最下數一歲為準歲減十餘萬石既而漳泉興化亦第損之嘉祐四年復命轉運司裁定郴永桂陽衡道州所輸丁米及錢絹雜物無業者弛之有業者減半後雖進丁勿復增取時廣南猶或輸丁錢亦命轉運司條上自是所輸無幾矣自郭咨均稅之法罷論者謂朝廷徒恤一時之勞而失經遠之慮至皇祐中天下墾田視景德增四十一萬七千餘頃而歲入九穀乃減七十一萬八千餘石蓋田賦不均其弊如此後田京知滄州均無棣田蔡挺知博州均聊城高唐田歲增賦穀帛之類無棣總一千一百五十二聊城高唐總萬四千八百四十七而滄州之民不以為便詔輸如舊嘉祐五年復詔均定遣官分行諸路而祕書丞高本在遣中獨以為不可均才均數郡田而止景德中賦入之數總四千九百一十六萬九千九百至皇祐中增四百四十一萬八千六百六十五治平中又增一千四百一十七萬九千三百六十四其以赦令蠲除以便於民若逃移戶絶不追者景德中總六百八十二萬九千七百皇祐中三十三萬八千四百五十七治平中一千二百二十九萬八千七百每歲以災害蠲除者又不在是焉神宗留意農賦湖廣之民舊歲輸丁米大中祥符以後屢裁損猶不均熙寧四年乃遣屯田員外郎周之純往廣東相度均之元豐三年詔諸路支移折稅並具所行月日上之中書初熙寧八年詔支移二稅於起納前半歲諭民使民宿辦無倉卒勞費時有司往往緩期故申約之州縣又或令民輸錢謂之折斛錢而糴賤頗用傷農海南四州軍稅籍殘缺吏多增損輒移稅入他戶代輸者類不能自明瓊州昌化軍丁稅米歲移輸朱崖軍道遠民以為苦至是用體量安撫朱初平等議根括四州軍稅賦舊額存其正數二州丁稅米止令輸錢於朱崖自糴以便民權發遣三司戶部判官李琮根究逃絶稅役江浙所得逃戶凡四十萬一千三百有奇為書上之明年除琮淮南轉運副使兩路凡得逃絶詭名挾佃簿籍不載並闕丁凡四十七萬五千九百有奇正稅並積負凡九十二萬二千二百貫石匹兩有奇琮蓋用貫石萬數立賞以誘所委之吏增加浩大三路之民大被其害而唐州亦增民賦人情騷然六年御史翟思言始趙尚寬為唐守勸民墾田高賦繼之流民自占者衆凡百畝起稅四畝而已稅輕而民樂輸境內殆無曠土近聞轉運司闢土百畝增至二十畝恐其勢再致轉徙望戒飭使者量加以寬民帝每遇水旱輒輕薥賦租或因赦宥又蠲放倚閣未嘗絶賦輸遠方不均皆遣使按之率以為常哲宗嗣位宣仁太后同聽政務行裕民之政凡民有負多所寬減患天下積缺名目煩多法令不一王巖叟為開封請隨等第立貫百為催法兗州鄒令張文仲議其不便遂令十分為率歲隨夏秋料帶納一分是為五年十料之法陝西轉運使呂大忠令農戶支移斗輸腳錢十八御史劾之下提刑司體量均其輕重之等以稅賦戶籍在第一等第二等者支移三百里三等四等者二百里五等一百里不願支移而願輸道里腳價者亦酌度分為三等以從其便河東助軍糧草支移毋得踰三百里災傷五分以上者免折變折變皆循舊法紹聖中嘗詔郡縣貨物用足錢省陌不等折變宜用中等俄以所在時估實值多寡不齊難概立法命仍舊焉言者謂欲民不流不若多積穀欲多積穀不若推行折納糶糴之法今常平雖有折納之法止用中價故民不樂輸若依和糴以實價折之則無損於民崇寧二年諸路歲稔遂行增價折納之法支移折變科率配買皆以熙寧法從事民以穀菽物帛輸積負零稅者聽之大觀二年詔天下租賦科撥支折當先富後貧自近及遠乃者漕臣失職有不均之患民或受害其定為令支移本以便邊餉內郡罕用焉間有移用則任民以所費多寡自擇故或輸本色於支移之地或輸腳費於所居之邑而折變之法以納月初旬估中價準折仍視歲之豐歉以定物之低昂俾官吏毋得私其輕重七月詔曰比聞慢吏廢期凡輸官之物違期促限蠶者未絲農者未穫追胥旁午民無所措自今前期督輸者加一等坐之致民逃徙者論更加等舊凡以赦令蠲賦雖多不過三分四年乃詔天下逋賦五年外戶口不存者悉蠲之京西舊不支移崇寧中將漕者忽令民曰支移所宜同今特免若地里腳費則宜輸自是歲以為常腳費斗為錢五十六比元豐既當正稅之數而反覆紐折數倍於昔民至鬻牛易産猶不能繼轉運司乃用是以取辦理之譽言者極論其害政和元年遂詔應支移而所輸地里腳錢不及斗者免之尋詔五等戶稅不及斗者支移皆免時天下戶口類多不實雖嘗立法比較鈎考歲終會其數按籍櫽括脫漏定賞罰之格然蔡攸等計德霸二州戶口之數率三戶四口則戶版訛隱不待校而知乃詔諸路凡奏戶口令提刑司及提舉常平司參考保奏而終莫能拯其弊故租稅亦不得而均焉是時內外之費浸以不給中官楊戩主後苑作有言汝州地可為稻田者因用其言置務掌之號稻田務復行於府畿易名公田南暨襄唐西及澠池北踰大河民田有溢於初券步畝者輒使輸公田錢政和末又置營繕所亦為公田久之後苑營繕所公田皆併於西城所盡山東河朔天荒逃田與河堤退灘租稅舉入焉皆內侍主其事所括為田三萬四千三百餘頃民輸公田錢外正稅不復能輸重和元年獻言者曰物有豐匱價有低昂估豐賤之物俾民輸送折價既賤輸官必多則公私之利也而州縣之吏但計一方所乏不計物之有無責民所無其費無量至於支移徙豐就歉理則宜然豪民賕吏故徙歉以就豐齎挾輕貨以賤價輸官其利自倍而貧下戶各免支移估直既高更益腳費視富戶反重因之逋負困於追胥詔申戒焉宣和初州縣主吏催科失職逋租數廣令轉運司察守二勤惰聽專達於內侍省浙西逃田天荒草田葑茭蕩湖濼退灘等地皆計籍召佃立租以供應奉置局命官有措置水利農田之名部使者且自督御前租課三年言者論西蜀折科之弊其略謂西蜀初稅錢三百折絹一匹草十圍計錢二十今本路絹不用本色匹折草百五十圍圍估錢百五十稅錢三百輸至二十三千東蜀如之仍支移新邊謂之遠倉民破産者衆七年言者又論非法折變既以絹折錢又以錢折麥以絹較錢錢倍於絹以錢較麥麥倍於錢展轉增加民無所訴唐鄧襄汝等州自治平後開墾歲增然未定稅額元豐中以所墾新田差為五等輸稅元祐元年罷之大觀三年用轉運副使張徽言之請復元豐舊制俄又以訴者而罷政和三年轉運使王璹復言官失租賦詔依元豐法第折以見錢凡得三十萬緡欽宗立詔蠲焉舊稅租加耗轉運司有拋樁明耗州縣有暗樁暗耗之名諸倉場受納又令民輸頭子錢熙寧以後給納並收其數益增焉至是悉罷高宗建炎元年五月庚寅詔二稅並依舊法凡百姓缺租閣賦及應天府夏稅悉蠲之庚子詔被虜之家蠲夏秋租稅及科配紹興元年五月詔民力久困州縣因緣為姦今頒式諸路凡因軍期不得已而貸於民者並許計所用之多寡度物力之輕重依式開具使民通知毋得過數科率八月減大觀稅額三分之一十有一月言者論浙西科斂之害農末殆不聊生鬻田而償則無受者棄之而遁則質其妻孥上下相蒙民無所措手足利歸貪吏而怨歸陛下願重科敷之罪嚴貪墨之刑詔漕司究實以聞二年正月知紹興府陳汝錫違詔科率謫漳州四月建盜范汝為平詔蠲本路今年二稅及夏料役錢既而手詔訪聞州縣以為著令不過三分甚非所以稱朕惠恤之意可以赦並免十有一月焚州縣已蠲稅簿示民以不疑也五年二月詔諸路轉運司以增收租數上戶部課賞罰六年八月預借江浙來年夏稅紬絹之半盡令折米兩浙紬絹各折七千江南六千有半每匹折米二石九月右司諫王縉言諸寺院之多産者類請求貴臣改為墳院冀免科敷則所科歸之下戶詔戶部申嚴禁之十有二月詔淮西殘破州縣更免租稅二年是月戊申詔曰朕惟養兵之費皆取於民吾民甚苦而吏莫之恤夤緣軍須掊斂無藝朕甚悼之監司郡守朕所委寄以惠養元元者也今漫不加省復何賴焉其各勤乃職察吏之侵漁納賄者按劾以聞苟庇覆弗治朕不汝貸是歲兩浙轉運李逮取婺秀湖州平江府歲計寬剩錢二十二萬八千緡有奇依折帛錢限起發自是以為例七年三月詔駐蹕及所過州縣缺紹興五年以前稅賦並蠲之七月詔新復州軍請佃官田輸租外免輸正稅己田謂之稅佃田謂之租舊不併納劉豫嘗並取之至是乃從舊法九年蠲新復州軍稅租及土貢大禮銀絹三年差徭五年初劉豫之僭凡民間蔬圃皆令三季輸稅宣諭官方庭實言其不便起居舍人程克俊言河南父老苦豫煩苛久矣賦斂及於絮縷割剝至於果蔬於是詔新復州縣取劉豫重斂之法焚之通衢十三年淮東宣撫使韓世忠請以賜田及私産自昔未輸之稅併歸之官詔奬諭而可之初神武右軍都統制張俊乞蠲所置産凡和買科敷詔特從之後三省言國家兵革未息用度至廣陛下哀憫元元俾士大夫及勳戚之家與編戶等敷蓋欲寬民力均有無今俊獨得免則當均在餘戶是使民為俊代輸也方今大將不止俊一人使各援例求免何以拒之望收還前詔詔從之越數年間俊復乞免歲輸和買絹三省擬歲賜俊絹五千匹庶免起例上以示俊因諭之曰朕固不惜但恐公議不可俊惶悚力辭賜絹十五年戶部議准法輸官物用四鈔曰戶鈔付民執憑曰縣鈔關縣司銷簿曰監鈔納官掌之曰住鈔倉庫藏之所以防僞冒備毀失也毀失縣鈔者以監住鈔銷鑿若輒取戶鈔或追驗於人戶者科杖二十三年知池州黃子游言青陽縣苗稅七八倍於諸縣因南唐嘗以縣為宋齊丘食邑畝輸三斗後遂為額詔減苗稅二分有半租米二分是時兩浙州縣合輸綿紬稅絹茶絹雜錢米六色皆以市價折錢却別科米麥有畝輸四五斗者京西括田租加於舊湖南有土戶錢折絁錢醋息錢麥曲引錢名色不一荊南戶口十萬寇亂以來幾無人跡議者希朝廷意謂流民已復可使歲輸十二頻歲復增積逋至二十餘萬緡曹泳為戶部侍郎責償甚急蓋自檜再相密諭諸路暗增民稅七八故民力重困餓死者衆皆檜之為也二十六年先是右承議郎魯沖上書論郡邑之弊以臣前任宜興一縣言之漕計合收窠名有丁鹽坊場課利錢租地錢租絲租紵錢歲入不過一萬五千餘緡其發納之數有大軍錢上供錢糴本錢造船錢軍器物料錢天申節銀絹錢之類歲支不啻三萬四千餘緡又有見任寄居官請奉過往官兵批券與非泛州郡督索拖缺略無虛日今之為令者苟以寬恤為意而拙於催科旋踵以不職罷能迎合上司慘刻聚斂則以稱職聞是使為令者惴惴惟財賦是念朝不謀夕亦何暇為陛下奉行寬恤詔書承流宣化者哉吏部侍郎許興古議今銓曹有知縣令二百餘闕無願就者正緣財賦督迫被罪所以畏避如此若罷獻羡餘蠲民積缺謹擇守臣戒飭監司則吏稱民安矣乃詔行之二十九年上聞江西盜賊謂輔臣曰輕徭薄賦所以息盜歲之水旱所不能免儻不寬恤而惟務科督豈使民不為盜之意哉於是詔諸路州縣紹興二十七年以前積缺官錢三鄈鳳皇及四等以下戶官缺悉除之九月詔兩浙江東西水浙東江東西螟其租稅盡蠲之自是水旱經兵時有蠲減不盡書也三十二年六月戊寅孝宗受禪赦凡官司債負房賃租賦和買役錢及坊場河渡等錢自紹興三十年以前並除之諸路或假貢奉為名漁奪民利使所在居民以土物為苦太上皇帝已嘗降詔禁約自今州軍條上土貢之物當議參酌天地祖宗陵寢薦獻及德壽宮甘旨之奉止許長吏修貢其餘並罷州縣因緣多取以違制坐之七月諸縣受民已輸稅租等鈔不即銷簿者當職官吏並科罪民齎戶鈔不為使而抑令重輸者以違制論不以赦免著為令八月詔州縣受納秋苗官吏多收加耗肆為姦欺方時艱虞用度未足欲減常賦而未能豈忍使貪贓之徒重為民蠹自今違犯官吏並置重典仍沒其家此孝宗初詔也先是常州宜興縣無稅産百姓丁輸鹽錢二百文下戶有墓地者謂之墓戶經界之時均紐正稅又令帶輸丁鹽絹作折帛錢至隆興元年始用知縣姜詔言令與晉陵武進無錫三縣一例隨産均輸二年四月知贛州趙公稱以寬剩錢十萬緡為民代輸夏稅是後守臣時有代輸者五月詔溫台處徽不通水路其二稅物帛許依折法以銀折輸數外妄有科折計贓定罪乾道元年蠲興化軍猶剩米之半以知軍張允蹈言自建炎三年本軍秋稅歲餘軍儲外猶剩米二萬四千四百餘石供給福州謂之猶剩米四十年間水旱相仍不復減損故有是命至八年乃并其半蠲之三年六月減臨安府新城縣進際稅賦之半以知縣耿秉言曩錢氏以進際為名虛額太重故也十有一月蠲臨安府屬縣缺乾道元年二稅坊場課利折帛免丁等錢七年敕令所修輸苗乞取法受納官比犯人減一等州縣長官不覺察與同罪暨上三等及形勢戶逋賦雖遇赦不除八年蠲紹興府增起苗米四萬九千餘石淳熙三年臣僚言湖北百姓廣占官田量輸常賦似為過優比議者欲從實起稅而開陳首之門殊不思朝廷往年經界獨兩淮京西湖北依舊蓋以四路被邊土廣人稀誘之使耕猶懼不至若履畝而稅孰肯遠徙力耕以供公上之賦哉今湖北惟鼎澧地接湖南墾田稍多自荊南安復嶽鄂漢沔汙萊彌望戶口稀少且皆江南狹鄉百姓扶老攜幼遠來請佃以田畝寬而稅賦輕也若從議者之言恐於公家無一毫之益而良民有無窮之擾矣如臣所見且當誘以開耕不宜恐以增稅使田疇盡闢歲收滋廣一遇豐稔平糴以實邊則所省漕運亦博望且依紹興十六年詔旨以十分為率年增輸一分不願開墾者即許退田別佃期限稍寬取之有漸遠民安業一路幸甚詔戶部議之四年臣僚言屢赦蠲積缺以蘇疲民州縣不能仰承德意至變易名色以取之宜下漕司如合除者毋更取之於州州毋取之於縣縣銷民缺籍書其名數諭民通知詔可五年八月詔曰比年以來五穀屢登蠶絲盈箱嘉與海內共享阜康之樂尚念耕夫蠶婦終歲勤動價賤不足以償其勞郡邑兩稅除折帛折變自有常制當輸正色者毋以重價強之折錢若有故違重置于法臨安府刻石遍賜諸路六年以諫議大夫謝廓然言州縣違法科斂侵漁日甚其咎雖在縣令而督迫實由郡守縣令按劾而郡守自如詔自今凡有過需橫取監司悉行按劾無詳於小而略於大七年夏大旱知南康軍朱熹應詔上封事言今民間二稅之入朝廷盡取以供軍州縣無復贏餘於是別立名色巧取今民貧賦重惟有核兵籍廣屯田練民兵可以漸省列屯坐食之兵稍損州郡供軍之數使州縣之力寖紓然後禁其苛斂責其寬恤庶幾窮困之民得保生業無流移漂蕩之患八年詔監司太守察所部催科不擾者薦之煩擾害民者劾之十一年戶部奏諸路州軍檢放旱傷米數近六十萬石上諭王淮曰若盡令核實恐他年郡縣懷疑不復檢放惟寧國數最多可令漕司核實而蠲之紹熙元年臣僚言古者賦租出於民之所有不強其所無今之為絹者一倍折而為錢再倍折而為銀銀愈貴錢愈艱得穀愈不可售使民賤糶而貴折則大熟之歲反為民害願詔州郡凡多取而多折者重置于罰民有糶不售者令常平就糴異時歲歉平價以糶庶於民無傷於國有補詔從之祕書監楊萬里奏民輸粟於官謂之苗舊以一斛輸一斛今以二斛輸一斛矣輸帛於官謂之稅舊以正絹為稅絹今正絹外有和買矣舊和買官給其直或以錢或以鹽今皆無之又以絹估直而倍折其錢矣舊稅畝一錢輸免役一錢今歲增其額不知所止矣既一倍其粟數倍其帛又數倍其錢而又有月樁錢版帳錢不知幾倍於祖宗之舊又幾倍於漢唐之制乎此猶東南之賦可知也至於蜀賦之額外無名者不可得而知也陛下欲薄賦斂當節用度用節而後財可積財積而後國可足國足而後賦可減賦減而後民可富民富而後邦可寧不然日復日歲復歲臣未知其所終也時金主璟新立萬里迓使客于淮聞其蠲民間房園地基錢罷鄉村官酒坊減鹽價除田租使虛譽達於吾境故因轉對而有是言也二年詔曰朕惟為政之道莫先於養民故自即位以來蠲除甚賦頒宣寬條嘉與四方臻於安富郡守縣令最近民者也誠能拊循惠愛以承休德庶幾政平訟理之效今采之人言乃聞科斂先期競務辦集而民之虛實不問追呼相繼敢為椎剝而民之安否不恤財計之外治理蔑聞甚不稱朕委屬之意國用有常固在經理而非掊克督趣以為能也知本末先後之誼此朕所貴於守令者繼自今以軫恤為心以牧養為務俾民安業時豫汝嘉慶元二年詔浙江東西夏稅和買紬絹並依紹興十六年詔旨折納紹興十六年詔旨絹三分折錢七分本色紬八分折錢二分本色嘉熙二年臣僚言陛下自登大寶以來蠲賦之詔無歲無之而百姓未霑實惠蓋民輸率先期歸於吏胥攬戶及遇詔下則所放者吏胥之物所倚閣者攬戶之錢是以寬恤之詔雖頒愁歎之聲如故嘗觀漢史恤民之詔多減明年田租今宜倣漢故事如遇朝廷行大惠則以今年下詔明年減租示民先知減數則吏難為欺民拜實賜矣從之淳祐八年監察御史兼崇政殿說書陳求魯奏本朝仁政有餘而王制未備今之兩稅本大曆之弊法也常賦之入尚為病况預借乎預借一歲未已也至于再至于三預借三歲未已也至于四至于五竊聞今之州縣有借淳祐十四年者矣以百畝之家計之罄其永業豈足支數年之借乎操縱出於權宜官吏得以簸弄上下為姦公私俱困臣愚謂今日救弊之策其大端有四焉宜採夏侯太初併省州郡之議俾縣令得以直達於朝廷用宋元嘉六年為斷之法俾縣令得以究心於撫字法藝祖出朝紳為令之典以重其權遵光武擢卓茂為三公之意以激其氣然後為之正其經界明其版籍約其妄費裁其橫斂則預借可革民瘼有瘳矣咸淳十年侍御史陳堅殿中侍御史陳過等奏今東南之民力竭矣西北之邊患棘矣諸葛亮所謂危急存亡之時也而邸第戚畹御前寺觀田連阡陌亡慮數千萬計皆巧立名色盡蠲二稅州縣乏興鞭撻黎庶鬻妻賣子而鐘鳴鼎食之家蒼頭廬兒漿酒藿肉琳宮梵宇之流安居暇食優游死生安平無事之時尤且不可而況艱難多事之際乎今欲寬邊患當紓民力欲紓民力當紓州縣則邸第寺觀之常賦不可姑息而不加釐正也望與二三大臣亟議行之詔可建炎二年初復鈔旁定帖錢命諸路提刑司掌之紹興二年詔僞造券旁者並依軍法五年三月詔諸州勘合錢貫收十文足勘合錢即所謂鈔旁定帖錢也初令諸州通判印賣田宅契紙自今民間爭田執白契者勿用十有一月以調度不足詔諸路州縣出賣戶帖令民具田宅之數而輸其直既而以苛擾稽緩乃立價凡坊郭鄉村出等戶皆三十千鄉村五等坊郭九等戶皆一千凡六等惟閩廣下戶差減期三月足輸送行在旱傷及四分以上者聽旨三十一年先是諸州人戶典賣田宅契稅錢所收窠名七分隸經總制三分屬係省至是總領四川財賦王之望言請從本所措置拘收以供軍用詔從之凡嫁資遺囑及民間葬地皆令投契納稅一歲中得錢四百六十七萬餘引而極邊所捐八郡及瀘夔等未輸者十九郡不與焉乾道五年戶部尚書曾懷言四川立限拘錢數百萬緡婺州亦得錢三十餘萬緡他路恬不加意詔百姓白契期三月自陳再期百日輸稅通判拘入總制帳輸送及十一萬緡者知通推賞違期不首及輸錢違期者許人告論如律淳熙六年敕令所進重修淳熙法有收舟驢駝馬契書之稅帝命刪之曰恐後世有算及舟車之言建炎三年張浚節制川陝承制以同主管川秦茶馬趙開為隨軍轉運使總領四川財賦自蜀有西師益利諸司已用便宜截三路上供錢川峽布絹之給陝西河東京西者四年秋遂盡起元豐以來諸路常平司坊場錢元豐以來封樁者次科激賞絹是年初科三十三萬匹俟邊事寧即罷紹興十六年減利夔三萬匹惟東西川三十萬匹至今不減次奇零絹估錢即上三路綱也歲三十萬匹西川匹理十一引東川十引自紹興二十五年至慶元初兩川並減至六引次布估錢成都崇慶府彭漢邛州永康六郡自天聖間官以三百錢市布一匹民甚便之後不復豫錢至是宣撫司又令民匹輸估錢三引歲七十餘萬匹為錢二百餘萬引慶元初纍減至一百三十餘萬引次常平司積年本息此熙豐以來所謂青苗錢者建炎元年遣駕部員外郎喻汝礪括得八百餘萬緡至是取以贍軍矣次對糴米謂如戶當輸稅百石則又科糴百石故謂之對糴及他名色錢如酒鹽等大抵於先朝常賦外歲增錢二千六十八萬緡而茶不預焉自是軍儲稍充而蜀民始困矣紹興五年浚召拜尚書右僕射以席益為四川安撫制置大使趙開為四川都轉運使益頗侵用軍期錢開訴于朝又數增錢引而軍計猶不給六年以龍圖閣直學士李逮代開為都轉運使都官員外郎馮康國言四川地狹民貧祖宗時正稅重者折科稍輕正稅輕者折科稍重二者平準所以無偏重偏輕之患百有餘年民甚安之近年漕總二司輒更舊法反覆紐折取數務多致民棄業逃移望並罷之一遵舊制紹如所請令憲臣察其不如法者七年三月逮以贍軍錢糧令四路漕臣分認而榷茶錢不用蜀人不以為是九月浚罷趙鼎為尚書左僕射十有一月以直祕閣張深主管四川茶馬逮請祠八年二月命深及宣撫司參議官陳遠猷並兼四川轉運副使席益以憂去樞密直學士胡世將代之十月鼎罷奏檜獨相九年和議成簽書樞密院事樓照宣諭陝西還以金四千兩銀二十萬兩輸激賞庫皆取諸蜀者會吳玠卒以世將為宣撫副使以吏部尚書張燾知成都府兼本路安撫使上諭輔臣曰燾可付以便宜如四川前日橫斂宜令減以紓民成都帥行民事自燾始世將奏以宣撫司參議官井度兼四川轉運副使十一年正月趙開卒自金人犯陝蜀開職饋餉者十年軍用無乏一時賴之其後計臣屢易於開經畫無敢變更然茶鹽榷酤奇零絹布之征自是為蜀之常賦雖屢經蠲減而害不去議者不能無咎開之作俑焉十月以鄭剛中為川陝宣諭使十二年世將卒改宣撫使十三年剛中獻黃金萬兩十五年正月剛中奏減成都路對糴米三之一四月省四川都轉運使以其事歸宣撫司剛中尋以事忤秦檜於是置四川總領所錢糧官以太府少卿趙不棄為之又改命不棄總領四川宣撫司錢糧十六年剛中奏減兩川米腳錢三十二萬緡激賞絹二萬匹免創增酒錢三萬四千緡以四川總制錢五十萬緡充邊費十七年以戶部員外郎符行中總領四川宣撫司錢糧召剛中赴行在不棄權工部侍郎知成都府李璆權四川宣撫司事先是剛中奏本司舊貯備邊歲入錢引五百八十一萬五千道如撥供歲計即可對減增添寬省民力詔李璆符行中參酌減放於是減四川科敷虛額錢歲二百八十五萬緡兩川布估錢三十六萬五千緡夔路鹽錢七萬六千緡坊場河渡淨利抽貫稅錢四萬六千餘緡又減兩川米腳錢四十二萬緡時宣撫司降賜庫貯米一百萬石乃命行中酌度對糴分數均減十八年罷四川宣撫司以璆為四川安撫制置使兼知成都府太府少卿汪召嗣總領四川財賦軍馬錢糧宣撫司降賜庫錢除制置司取撥二十萬緡餘令總領所貯之二十二年總領所奏蠲諸路缺紹興十七年以前折估糴本等錢一百二十九萬餘緡米九萬八千七百餘石綾絹一萬四千餘匹先是自講和後歲減錢四百六十二萬緡有奇朝廷猶以為重二十四年遣戶部員外郎鍾世明同四川制總兩司措置裕民二十五年以符行中等言減兩川絹估錢二十八萬緡潼川府秋稅腳錢四萬緡利路科斛腳錢十二萬緡兩川米腳錢四十萬緡鹽酒重額錢七十四萬緡激賞絹九千餘匹合一百六十餘萬緡蠲州縣紹興十九年至二十三年折估糴本等逋缺二百九十二萬緡是時朝廷雖蠲民舊逋而符行中督責猶崚蜀人怨之於是以蕭振為四川安撫制置使兼知成都府行中提舉江州太平興國宮二十六年上以蜀民久困供億詔制置蕭振總領湯允恭主管茶馬李澗成都轉運判官許尹潼川轉運判官王之望措置寬恤於是之望奏減四川上供之半二十七年用蕭振等言減三川對糴米十六萬九千餘石夔路激賞絹五萬匹兩川絹估錢二十八萬緡有奇潼川成都奇零折帛匹一千又減韓球所增茶額四百六十二萬餘斤茶司引息虛額錢歲九十五萬餘緡初利州舊宣撫司有積緡二百萬守者密獻之朝下制置司取撥振曰此所以備水旱軍旅也一旦有急又將取諸民乎請留其半是歲振卒李文會代之二十八年文會卒中書舍人王剛中代之二十九年蠲四川折估糴本積缺錢三百四十萬緡乾道二年蠲奇缺白契稅錢三十七萬餘緡三年蠲川秦茶馬兩司紹興十九年至三十二年州縣侵用及民積缺六十六萬四千九百餘緡四年又詔四川諸州缺紹興三十一年至隆興二年贍軍諸窠名錢物暨退剝虧分之數及漏底折缺等錢並蠲之蠲成都人戶理運對糴米腳錢三十五萬緡淳熙十六年詔四川歲發湖廣總領所綱運百三十五萬六千餘貫自明年始與免三年當議對減鹽酒之額制置總領同諸路轉運提刑司條上其湖廣歲計朝廷當自給之紹熙三年蠲潼川府去年被水州縣租稅資普榮州富順監凡夏輸亦如之尋又詔本路旱傷州縣租稅官為代輸及民已輸者悉理今年之數四年蠲紹熙三年成都潼川兩路奇零絹估錢引四十七萬一千四百五十餘道潼川府激賞絹一十六萬六千九百七十五匹又詔四川州縣鹽酒課額自明年更放三年嘉定七年再蠲四川州縣鹽酒課額三年其合輸湖廣總領所綱運亦免三年十一年蠲天水軍今年租役差科西和州蠲十之七成州蠲十之六將利河池兩縣各蠲十之五以經兵也
