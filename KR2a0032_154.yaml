body:
  text: 宋史卷一百五十四志第一百七輿服六寶印符券宮室制度臣庶室屋制度寶秦制天子有六璽又有傳國璽歷代因之唐改為寶其制有八五代亂離或多亡失周廣順中始造二寶其一曰皇帝承天受命之寶一曰皇帝神寶太祖受禪傳此二寶又製大宋受命之寶至太宗又別製承天受命之寶是後諸帝嗣服皆自為一寶以皇帝恭膺天命之寶為文凡上尊號有司製玉寶則以所上尊號為文寶用玉篆文廣四寸九分厚一寸二分填以金盤龍鈕係以暈錦大綬赤小綬連玉環玉檢高七寸廣二寸四分厚四分玉斗方二寸四分厚一寸二分皆飾以紅錦金裝裹以紅綿加紅羅泥金夾帊納於小盝盝以金裝內設金牀暈錦褥飾以雜色玻黎碧石珊瑚金精石瑪瑙又盝二重皆裝以金覆以紅羅繡帊載以腰輿及行馬並飾以金又有香爐寶子香匙灰匙火箸燭臺燭刀皆以金為之是所謂緣寶法物也別有三印一曰天下合同之印中書奏覆狀流內銓歷任三代狀用之二曰御前之印樞密院宣命及諸司奏狀內用之三曰書詔之印翰林詔敕用之皆鑄以金又以鍮石各鑄其一雍熙三年並改為寶別鑄以金舊六印皆毀之真宗即位作皇帝受命寶文曰皇帝恭膺天命之寶大中祥符元年五月詳定所言按玉牒玉册用皇帝受命寶印之納玉匱於石叟以天下同文之印封之今封禪泰山請依舊制別造玉寶一枚方寸二分文同受命寶其封石叟用天下同文之印舊史元無制度今請用金鑄大小同御前之寶以天下同文之寶為文所有緣寶法物亦請依式製造從之天禧元年十二月召輔臣於滋福殿觀新刻五嶽聖帝玉寶及皇帝昭受乾符之寶命擇日迎導赴會靈觀奉安其寶並金柙玉鈕製作精妙真宗以奏章上帝承前皆用御前之寶以理未順故改用昭受乾符之寶乾興元年仁宗即位作受命寶文同真宗天聖元年詔以宮城火重製受命寶及尊號册寶慶曆八年十一月詔刻皇帝欽崇國祀之寶先是天禧中真宗刻昭受乾符之寶而於醮祠表章用之後經大內火寶焚乃用御前之寶至是下學士院定其文命宰臣陳執中書之皇祐五年七月詔作鎮國神寶先是奉宸庫有良玉廣尺厚半之仁宗以為希代之珍不欲為服玩因作是寶命宰臣龐籍篆文寶成太常禮院引唐六典次序曰一神寶二受命寶冬至祀南郊大駕儀仗請以鎮國神寶先受命寶為前導自是為定式至和二年初太宗以玉寶二鈕賜太祖之子德芳其文曰皇帝信寶至是德芳孫左屯衛大將軍從式上之嘉祐八年仁宗崩英宗立翰林學士范鎮言伏聞大行皇帝受命寶及緣寶法物與平生衣冠器用皆欲舉而葬之恐非所以稱先帝恭儉之意其受命寶伏乞陛下自寶用之且示有所傳付若衣冠器玩則請陳於陵寢及神御殿歲時展視以慰思慕詔檢討官考索典故及命兩制禮官詳議翰林學士王圭等奏曰受命寶者猶昔傳國璽也宜為天子傳器不當改作古者藏先王衣服於廟寢至於平生器玩則前世既不皆納於方中亦不盡陳於陵寢謂今宜從省約以稱先帝恭儉之實帝不用其議乃別造受命寶命參知政事歐陽修篆文八字至哲宗立亦作焉其文並同紹聖三年咸陽縣民段義得古玉印自言於河南鄉劉銀村修舍掘地得之有光照室四年上之詔禮部御史臺以下參驗元符元年三月翰林學士承旨蔡京及講議官十三員奏按所獻玉璽色緑如藍溫潤而澤其文曰受命于天既壽永昌其背螭鈕五盤鈕間有小竅用以貫組又得玉螭首一白如膏亦溫潤其背亦螭鈕五盤鈕間亦有貫組小竅其面無文與璽大小相合篆文工作皆非近世所為臣等以歷代正史考之璽之文曰皇帝壽昌者晉璽也曰受命於天者後魏璽也有德者昌唐璽也惟德允昌石晉璽也則既壽永昌者秦璽可知今得璽於咸陽其玉乃藍田之色其篆與李斯小篆體合飾以龍鳳鳥魚乃蟲書鳥迹之法於今所傳古書莫可比擬非漢以後所作明矣今陛下嗣守祖宗大寶而神璽自出其文曰受命于天既壽永昌則天之所畀烏可忽哉漢晉以來得寶鼎瑞物猶告廟改元肆眚上壽况傳國之器乎其緣寶法物禮儀乞下所屬施行詔禮部太常寺按故事詳定以聞禮官言五月朔故事當大朝會宜就行受寶之禮依上尊號寶册儀有司豫製緣寶法物並寶進入俟降出權於寶堂安奉前三日差官奏告天地宗廟社稷前一日帝齋于內殿翌日御大慶殿降坐受寶羣臣上壽稱賀先期又詔龍圖天章閣齎治平元年耀州所獻受命寶玉檢赴都堂參議詔以五月朔受傳國寶命章惇書玉檢以天授傳國受命之寶為文徽宗崇寧五年有以玉印獻者印方寸以龜為鈕工作精巧文曰承天福延萬億永無極徽宗因次其文倣李斯蟲魚篆作寶文其方四寸有奇螭鈕方盤上圓下方名為鎮國寶大觀元年又得玉工用元豐中玉琢天子皇帝六璽疊篆初紹聖間得漢傳國璽無檢螭又不闕疑其一角缺者乃檢也有檢傳考驗甚詳傳于世帝於是取其文而黜其璽不用自作受命寶其方四寸有奇琢以白玉篆以蟲魚鎮國受命二寶合天子皇帝六璽是為八寶詔曰自昔皆有尚符璽官今雖隸門下後省遇親祠則臨時具員訖事復罷八寶既備宜重典司之職可令尚書省置官如古之制又詔曰永惟受命之符當有一代之製而尚循秦舊六璽之用度越百年之久或未大備自天申命地不愛寶獲全玉於異域得妙工於編氓八寶既成敻無前比殆天所授非人能為可以來年元日御大慶殿恭受八寶尚書省言請置符寶郎四員隸門下省二員以中人充掌寶於禁中按唐八寶車駕臨幸則符寶郎奉寶以從大朝會則奉寶以進今鎮國寶受命寶非常用之器欲臨幸則從六寶朝會則陳八寶皆夕納內符寶郎奉寶出以授外符寶郎外符寶郎從寶行於禁衛之內朝則分進于御坐之前鎮國寶受命寶不常用唯封禪則用之皇帝之寶答鄰國書則用之皇帝行寶降御札則用之皇帝信寶賜鄰國書及物則用之天子之寶答外國書則用之天子行寶封册則用之天子信寶舉大兵則用之應合用寶外符寶郎具奏請內符寶郎御前請寶印訖付外符寶郎承受從之二年詔受命寶之上加鎮國二字政和七年從于闐得大玉踰二尺色如截肪徽宗又制一寶赤螭鈕文曰範圍天地幽贊神明保合太和萬壽無疆篆以魚蟲制作之工幾於秦璽其寶九寸檢亦如之號曰定命寶合前八寶為九詔以九寶為稱以定命寶為首且曰八寶者國之神器至於定命寶乃我所自制也於是應行導排設定命與受命天子寶在左鎮國與皇帝寶在右又詔鎮國受命寶與天子皇帝之寶其數有八蓋非乾元用九之數比得寶玉於異域受定命之符於神霄乃以範圍天地幽贊神明保合太和萬壽無疆為文卜云其吉篆以蟲魚縱廣之制其寸亦九號曰定命寶來年元日祗受又詔差官奏告天地宗廟社稷八年正月一日御大慶殿受定命寶百僚稱賀其後京城之難諸寶俱失之惟大宋受命之寶與定命寶獨存蓋天意也建炎初始作金寶三一曰皇帝欽崇國祀之寶祭祀詞表用之二曰天下合同之寶降付中書門下省用之三曰書詔之寶發號施令用之紹興元年又作玉寶一文曰大宋受命中興之寶又得舊寶二歷世寶之凡上太上皇尊號册后太子皆用焉十六年又作八寶一曰護國神寶以承天福延萬億永無極九字為文二曰受命寶以受命于天既壽永昌為文三曰天子之寶四曰天子信寶五曰天子行寶六曰皇帝之寶七曰皇帝信寶八曰皇帝行寶藏之御府大朝會則陳之上册寶尊號册后太子大禮設鹵簿亦如之寶之制用玉尺度鈕鼻大小綬玉環檢制舊制如牌上刻曰某寶皆裹以朱縷加緋羅泥金帕納於小盝盝三重皆飾以金內設金牀金寶斗龍鑰金宀元攴覆以緋羅繡帕載以腰輿行馬孝宗即位議上太上皇帝尊號曰光堯壽聖太上皇帝寶用皇祐中法黍尺量度乾道六年再加十四字尊號以寶材元係螭龍鈕止堪改作蹲龍其鈕高二寸四分五釐厚一寸一分五釐竅徑一寸理宗寶慶三年加上寧宗皇帝徽號寶面廣四寸二分厚一寸二分蹲龍鈕通高四寸一分寶四面鈎碾行龍后妃之寶哲宗元祐元年詔天聖中章獻明肅皇后用玉寶方四寸九分厚一寸二分龍鈕今太皇太后權同處分軍國事宜依章獻明肅皇后故事二年又詔太皇太后玉寶以太皇太后之寶為文皇太后金寶以皇太后寶為文皇太妃金寶以皇太妃寶為文中興之後后寶用金方二寸四分高下隨宜鼻紐以龜斗檢以銀塗以金寶盝三重鈒百花塗金盤鳳輿案行馬帕褥亦如之皇太子寶至道元年製皇太子受册金寶方二寸厚五寸係以朱組大綬連玉環金斗金檢長五寸闊二寸厚二分裹以紅綿加紅羅泥金帊納於小盝盝以金裝內設金牀又盝二重皆覆以紅羅銷金帊盝及腰輿行馬皆銀裝金塗他法物皆銀為之鈒花塗金中興寶龜鈕金塗銀檢上勒皇太子寶四字金塗銀寶斗黝漆盝三重並錦拓𩹉外以金塗銀百花鳳葉子五明裝鑰以金宀元攴載以黝漆腰輿行馬册制用珉玉簡長一尺二寸闊一寸二分簡數從字之多少聯以金繩首尾結帶前後褾首四枚二枚畫神二枚刻龍鏤金若奉護之狀藉以錦褥覆以緋羅泥金夾帊册匣長廣取容册塗以朱漆金鏤百花凸起行龍金宀元攴錔覆以紅羅繡盤龍蹙金帊承以金裝長竿床金龍首金魚鉤又以紅絲為絛縈匣册案塗朱漆以銷金紅羅覆之后册用珉或以象縷文以鳳尺寸制度並同帝册皇太子册用珉簡六十枚乾道中用七十五枚每枚高尺二寸博一寸二分前後褾首四枚長隨簡博四寸其二刻神其二刻龍為奉護狀貫以金絲首尾結為金花飾以錔襯以紅羅泥金夾帕藉以錦褥盛以黝漆匣錦拓𩹉以金塗銀葉段五明裝隱起百花鳳覆以緋羅泥金帕絡以紅絲結絛襯以錦褥載以黝漆腰輿行馬亡金國寶理宗端平元年命孟珙等以兵從大元兵夾攻金人於蔡州滅之其年四月丙戌大理寺言京湖制置司以所獲亡金寶物來上令金臣參知政事張天綱辨識其玉寶一文曰太祖應乾興運昭德定功睿神莊孝仁明大聖武元皇帝尊諡寶乃金人上其祖阿骨打諡寶也其法物有銷金盤龍紅紵絲袍一透碾雲龍玉帶一內方八胯結頭一塌尾一並玉塗金結頭一塗金小結攀一連珠環玉束帶一垂頭𩹉拓上有金龍帶上玉事件大小一十八又玉靶鐵銼一銷金玉事件二皮茄袋一玉事件三天綱稱上項帶國言謂之兔鶻皆其故主完顏守緒常服之物也碾玉巾環一樺皮龍飾角弓一金龍環刀一紅紵絲靠枕一佩玉大環一皆非臣庶服用之物制旨册一本舊作聖旨近侍局平日掌此以承受內降指揮壬辰四月故主援東漢光武故事令上書者不得言聖故避聖字不敢當因改作制旨外有臣下虎頭金牌三銀牌八十四塗金印三及諸官署銅印三百一十二顆法司以守緒函骨及俘囚故寶法物等庭引天綱並護尉都尉完顏好海及天綱妻完顏氏烏古論栲栳小女瓊瓊一一審實件列以聞有旨完顏守緒遺骸並故寶法物等藏大理寺獄庫天綱好海完顏氏烏古論瓊瓊拘諸殿前司候朝旨云印制兩漢以後人臣有金印銀印銅印唐制諸司皆用銅印宋因之諸王及中書門下印方二寸一分樞密宣徽三司尚書省諸司印方二寸惟尚書省印不塗金餘皆塗金節度使印方一寸九分塗金餘印並方一寸八分惟觀察使塗金諸王節度觀察使州府軍監縣印皆有銅牌長七寸五分諸王廣一寸九分餘廣一寸八分諸王節度觀察使牌塗以金刻文云牌出印入印出牌入其奉使出入或本局無印者皆給奉使印景德初別鑄兩京奉使印又有朱記以給京城及外處職司及諸軍將校等其制長一寸七分廣一寸六分士庶及寺觀亦有私記乾德三年太祖詔重鑄中書門下樞密院三司使印先是舊印五代所鑄篆刻非工及得蜀中鑄印官祝溫柔自言其祖思言唐禮部鑄印官世習繆篆即漢書藝文志所謂屈曲纏繞以模印章者也思言隨僖宗入蜀子孫遂為蜀人自是臺省寺監及開封府興元尹印悉令溫柔重改鑄焉太宗雍熙元年詔新除漢南國王錢俶印宜以漢南國為文四年詔錢俶新授南陽國王印宜以南陽國王之印為文真宗咸平三年賜山前後百蠻王諾驅印以大渡河南山前後都鬼王之印為文景德四年鑄交址郡王印製安南旌節付廣南轉運司就賜之大中祥符五年詔諸寺觀及士庶之家所用私記今後並方一寸雕木為文不得私鑄是歲七月帝覽河西節度使知許州石普奏狀用許州觀察使印以問宰臣王旦對曰節度州有三印節度印隨本使使缺則納有司觀察印則州長吏用之州印晝則付録事掌用暮納于長吏節度使在本鎮兵仗則節度判官掌書記推官書狀用節度印田賦則觀察判官支使推官書狀用觀察印符刺屬縣則本使判書用州印故命帥必曰某軍節度某州管內觀察等使某州刺史言軍則專制其兵旅言管內則總察其風俗言刺史則涖其州事石普獨書奏章當用河西節度使印仁宗景祐三年少府監言得篆文官王文盛狀在京三司糧料院頻有人偽造印記印成旁曆盜請官物欲乞鑄造圓印三面每面闊二寸五分於外一匝先篆年號及糧料院名計十二字次一匝篆寅印十二辰亦十二字中心篆正字上連印鈕鑄成轉關以機穴定之用時逐月分對年終轉逮十二月自寅至丑終始使用所有轉關正字次月轉定之時令本院官封押選差人行使其印遇改年號即令別鑄詔三司定奪以聞三司請如文盛奏後又命知制誥邵必殿中丞蘇唐卿詳定天下印文必唐卿皆通篆籀然亦無所釐改焉神宗熙寧五年詔內外官及溪洞官合賜牌印並令少府監鑄造送禮部給付元豐三年廣西經略司言知南丹州莫世忍貢銀香獅子馬遂賜以印以西南諸道武盛軍德政官家明天國主印為文並以南丹州刺史印賜之仍詔經略司毀其舊印六年舊制貢院專掌貢舉其印曰禮部貢舉之印以廢貢院事歸禮部別鑄禮部貢舉之印是歲十二月詔自今臣僚所授印亡歿並賜隨葬不即隨葬因而行用者論如律中興仍舊制惟三省樞密院用銀印六部以下用銅印諸路監司州縣亦如之寺監惟長二給焉屬則從其長若倉庫關涉財用司存或給之監司州縣長官曰印僚屬曰記又下無記者止令本道給以木朱記文大方寸或銜命出境者以奉使印給之復命則納于有司後以朝命出州縣者亦如之新進士置團司亦假奉使印結局還之此常制也南渡之後有司印記多亡失彼遺此得各自收用尚方重鑄給之加行在二字或冠年號以別新舊然欺偽猶未能革乾道二年禮部請郡縣假借印記者悉毀而更鑄四年兵部侍郎陳彌作言六部印藏於官以牌出入而胥史用於戶外或借用於他廳近有偽為文符盜印以支錢糧者有偽作奏鈔盜拆御寶而改秩者皆慢藏有以誨之詔三省申嚴戒敕紹熙元年禮部侍郎李巘言文書有印以示信防姦給毀悉經省部具有條制然州縣沿循或以縣佐而用東南將印以掾曹而用司寇舊章名既不正弊亦難防請令有司製州縣官合用印記舊印非所當用者毀之紹興十四年臣僚又言印信事重凡有官司印記年深篆文不明合改鑄者非進呈取旨不得改鑄焉時更鑄者成都府錢引每界以銅朱記給之行在都茶場會子庫每界給印二十五國用印三鈕各以三省戶房國用司會子印為文檢察印五鈕各以提領會子庫檢察印為文庫印五鈕各以會子庫印造會子印為文合同印十二鈕內一貫文二鈕各以會子庫一貫文合同印為文五百文二百文準此蕃國效順者給以銅印安南國王李天祚乞印以安南國王之印六字為文方二寸給牌皆以銅鑄金塗西蕃隴右郡王趙懷恩乞印以隴右郡王之印為文給之宜州界外諸蠻乞印以宜州管下羈縻某州之印為文凡六十顆給之其後文武百司節次所鑄不備載朱記同舊制紹興二年始鑄親賢宅益王府銅朱記二十七年改鑄建康戶部大軍庫記三十年鑄馬軍司統制統領官朱記三十二年鑄鄧恭慶王直講贊讀朱記隆興元年鑄都督府僉廳記又鑄寄樁庫記二年鑄戶部大軍庫勘合庫子記二鈕湖廣總領所覆印會子記二鈕乾道二年鑄成都錢引務朱記淳熙十六年鑄建康榷貨務中門大門之記凡內外官有請於朝則鑄給焉用木者易之以銅符券唐有銀牌發驛遣使則門下省給之其制闊一寸半長五寸面刻隸字曰敕走馬銀牌凡五字首為竅貫以韋帶其後罷之宋初令樞密院給券謂之頭子太宗太平興國三年李飛雄詐乘驛謀亂伏誅詔罷樞密院券乘驛者復制銀牌闊二寸半長六寸易以八分書上鈒二飛鳳下鈒二麒麟兩邊年月貫以紅絲絛端拱中以使臣護邊兵多遺失又罷銀牌復給樞密院券仁宗康定元年五月翰林學士承旨丁度翰林學士王堯臣知制誥葉清臣等請製軍中傳信牌及兵符事詔令兩制與端明殿學士李淑詳定奏聞軍中符信切要杜絶姦詐深合機宜今請下有司造銅兵符給諸路總管主將每發兵三百人或全指揮以上即用又別造傳信朱漆木牌給應軍中往來之處每傳達號令關報會合及發兵三百人以下即用又檢到符彥卿軍律有字驗亦乞令於移牒傳信牌上兩處參驗使用一銅兵符漢制銅鑄上刻虎形今聞皇城司見有木魚契乞令有司用木契形狀精巧鑄造陝西五路每路依漢制各給一至二十計二十面更換給用仍以公牒為照驗二傳信木牌先朝舊制合用堅木朱漆為之長六寸闊三寸腹背刻字而中分之字云某路傳信牌却置池槽牙縫相合又鑿二竅置筆墨上帖紙書所傳達事用印印號上以皮繫往來軍吏之項臨陳傳言應有取索並以此牌為言寫其上如已曉會施行訖復書牌上遣回今乞下有司造牌每路各給一面為樣餘令本司依此製造分給諸處更換使用城寨分屯軍馬事須往來關會之處亦如數給與三字驗凡軍行計會不免文牒或主司遺失懼罪單使被擒軍中所謀自然泄露故每分屯軍馬之時與主將密定字號各掌一通不令左右人知其義理但於尋常公狀文移內以此字私為契約有所施行依此參驗不得字有重疊及用凶惡嫌疑之語每用文牒之上別行寫此字驗訖印其上發往如所請報到許即依號卻寫印遣回如不許即空之此惟主將自知他人皆不得測符彥卿元用四十條以四十字為號今檢得只有三十七條內亦有不急之事今減作二十八字所貴軍中戎旅之人事簡易記詔並從之嘉祐四年三司使張方平編驛券則例凡七十四條賜名嘉祐驛令神宗熙寧五年詔西作坊鑄造諸銅符三十四副令三司給左契付諸門右契付大內鑰匙庫今後諸門輪差人員依時轉銅契入赴庫勘同其鐵牌只請人自執在外仗止宿本庫依漏刻發鑰匙付外仗驗請人鐵牌給付候開門訖卻執鐵牌納鑰匙請出銅契至晚卻依上請納其開門朝牌六面亦隨銅契依舊發放時神宗以京城門禁不嚴素無符契命樞密院約舊制更造銅契中刻魚形以門名識之分左右給納以戒不虞而啓閉之法密於舊矣元豐元年詳定禮文所言舊南郊式車駕出入宣德門太廟靈星門朱雀門南薰門皆勘箭熙寧中因參知政事王圭議已罷勘箭而勘契之式尚存春秋之義不敢以所不信加之尊者且雷動天行無容疑二必使誰何而後過門不應典禮考詳事始不見於開寶禮咸平中初載於儀注蓋當時禮官之失請自今車駕出入罷勘契從之高宗建炎三年改鑄虎符樞密院主之其制以銅為之長六寸闊三寸刻篆而中分之以左契給諸路右契藏之門符制以繒裹紙版謂之號皇城司掌之敕入禁衛號黃綾八角三千道入殿門黃絹以方一千道入宮門黃絹以圓八千道入皇城門黃絹以長三千道紹興二年正月所定也後更宮門號以緋紅絹方皇城門以緋紅絹圓遂久用之後復盡以黃或方或圓各隨其制又有檄牌其制有金字牌青字牌紅字牌金字牌者日行四百里郵置之最速遞也凡赦書及軍機要切則用之由內侍省發遣焉乾道末樞密院置雌黃青字牌日行三百五十里軍期急速則用之淳熙末趙汝愚在樞管乃作黑漆紅字牌奏委諸路提舉官催督歲校遲速最甚者以議賞罰其後尚書省亦踵行之仍命逐州通判具出入界日時狀申省久之稽緩復如故紹熙末遂置擺鋪焉宮室汴宋之制侈而不可以訓中興服御惟務簡省宮殿尤朴皇帝之居曰殿總曰大內又曰南內本杭州治也紹興初創為之休兵後始作崇政垂拱二殿久之又作天章等六閣寢殿曰福寧殿淳熙初孝宗始作射殿謂之選德殿八年秋又改後殿擁舍為別殿取舊名謂之延和殿便坐視事則御之他如紫宸文德集英大慶講武惟隨時所御則易其名紫宸殿遇朔受朝則御焉文德殿降赦則御焉集英殿臨軒策士則御焉大慶殿行册禮則御焉講武殿閲武則御焉其實垂拱崇政二殿權更其號而已二殿雖曰大殿其修廣僅如大郡之設廳淳熙再修止循其舊每殿為屋五間十二架修六丈廣八丈四尺殿南簷屋三間修一丈五尺廣亦如之兩朵殿各二間東西廊各二十間南廊九間其中為殿門三間六架修三丈廣四丈六尺殿後擁舍七間即為延和其制尤卑陛階一級小如常人所居而已奉太上則有德壽宮重華宮壽康宮奉聖母則有慈寧宮慈福宮壽慈宮德壽宮在大內北望仙橋故又謂之北內紹興三十二年所造宮成詔以德壽宮為名高宗為上皇御之重華宮即德壽宮也孝宗遜位御之壽康宮即寧福殿也初丞相趙汝愚議以祕書省為泰寧宮已而不果行以慈懿皇后外第為之上皇不欲遷因以舊寧福殿為壽康宮光宗遜位御之大內苑中亭殿亦無增其名稱可見者僅有復古殿損齋觀堂芺蓉閣翠寒堂清華閣欏木堂隱岫澄碧倚桂隱秀碧琳堂之類此南內也北內苑中則有大池引西湖水注之其上疊石為山象飛來峯有樓曰聚遠禁周回四分之東則香遠清深月臺梅坡松菊三徑清妍清新芙蓉岡南則載欣欣欣射廳臨賦燦錦至樂半丈紅清曠瀉碧西則冷泉文杏館靜樂浣溪北則絳華旱船俯翠春桃盤松皇太子宮曰東宮其未出閣但聽讀于資善堂堂在宮門內已受册則居東宮宮在麗正門內紹興三十二年始置孝宗居之莊文太子立復居之光宗為太子孝宗謂輔臣曰今後東宮不須創建朕宮中宮殿多所不御可移修之自是皆不別建淳熙二年始創射堂一為遊藝之所圃中有榮觀玉淵清賞等堂鳳山樓皆宴息之地也幕殿即周官大小次也東都時郊壇大次謂之青城祀前一日宿齋詣焉其制中有二殿外有六門前曰泰禋後曰拱極東曰祥曦西曰景曜東偏曰承和西偏曰迎禧大殿曰端誠便殿曰熙成中興後以事天尚質屢詔郊壇不得建齋宮惟設幕屋而已其制架木而以葦為障上下四旁周以幄帟以象宮室謂之幕殿及行事又於壇所設小次大小次之外又有望祭殿遇雨則行事於中東都時為瓦屋五間周圍重廊中興後惟設葦屋蓋倣清廟茅屋之制也臣庶室屋制度宰相以下治事之所曰省曰臺曰部曰寺曰監曰院在外監司州郡曰衙在外稱衙而在內之公卿大夫士不稱者按唐制天子所居曰衙故臣下不得稱後在外藩鎮亦僭曰衙遂為臣下通稱今帝居雖不曰衙而在內省部寺監之名則仍唐舊也然亦在內者為尊者避在外者遠君無嫌歟私居執政親王曰府餘官曰宅庶民曰家諸道府公門得施若私門則爵位穹顯經恩賜者許之在內官不設亦避君也凡公宇棟施瓦獸門設梐枑諸州正牙門及城門並施鴟尾不得施拒鵲六品以上宅舍許作烏頭門父祖舍宅有者子孫許仍之凡民庶家不得施重栱藻井及五色文采為飾仍不得四鋪飛簷庶人舍屋許五架門一間兩廈而已
