body:
  text: 宋史卷一百二十八志第八十一樂三元豐三年五月詔祕書監致仕劉几赴詳定所議樂以禮部侍郎致仕范鎮與几參考得失而几亦請命楊傑同議且請如景祐故事擇人修製大樂詔可初傑言大樂七失一曰歌不永言聲不依永律不和聲蓋金聲舂容失之則重石聲溫潤失之則輕土聲函胡失之則下竹聲清越失之則高絲聲纖微失之則細革聲隆大失之則洪匏聲叢聚失之則長木聲無餘失之則短惟人稟中和之氣而有中和之聲八音律呂皆以人聲為度言雖永不可以逾其聲今歌者或詠一言而濫及數律或章句已闋而笱音未終所謂歌不永言也請節其煩聲以一聲歌一言且詩言人志詠以為歌五聲隨歌是謂依詠律呂協奏是謂和聲先儒以為依人音而制樂託樂器以寫音樂本效人非人效樂者此也今祭祀樂章並隨月律聲不依詠以詠依聲律不和聲以聲和律非古制也二曰八音不諧鐘磬闕四清聲虞樂九成以簫為主商樂和平以磬為依周樂合奏以金為首鐘磬簫者衆樂之所宗則天子之樂用八鐘磬簫衆樂之本乃倍之為十六且十二者律之本聲而四者應聲也本聲重大為君父應聲輕清為臣子故其四聲曰清聲或曰子聲也李照議樂始不用四清聲是有本而無應八音何從而諧哉今巢笙和笙其管十九以十二管發律呂之本聲以七管為應聲用之已久而聲至和則編鐘磬簫宜用四子聲以諧八音三曰金石奪倫樂奏一聲諸器皆以其聲應既不可以不及又不可以有餘今琴瑟塤箎笛簫笙阮箏筑奏一聲則鎛鐘特磬編鐘編磬連擊三聲聲煩而掩衆器遂至奪倫則鎛鐘特磬編鐘編磬節奏與衆器同宜勿連擊四曰舞不象成國朝郊廟之樂先奏文舞次奏武舞而武舞容節六變一變象六師初舉所向宜北二變象上黨克平所向宜北三變象維揚底定所向宜東南四變象荊湖來歸所向宜南五變象邛蜀納款所向宜西六變象兵還振旅所向宜北而南今舞者發揚蹈厲進退俯仰既不足以稱成功盛德失其所向而文舞容節尤無法度則舞不象成也五曰樂失節奏樂之始則翕然如衆羽之合縱之純如也節奏明白皎如也往來條理繹如也然後成今樂聲不一混殽無則失於節奏非所謂成也六曰祭祀饗無分樂之序蓋金石衆作之謂奏詠以人聲之謂歌陽律必奏陰呂必歌陰陽之合也順陰陽之合所以交神明致精意今冬至祀天不歌大呂夏至祭地不奏太簇春饗祖廟不奏無射秋饗后廟不歌小呂而四望山川無專祠用樂之制則何以贊導宣發陰陽之氣而生成萬物哉七曰鄭聲亂雅然朱紫有色而易別雅鄭無象而難知聖人懼其難知也故定律呂中正之音以示萬世今古器尚存律呂悉備而學士大夫不講考擊奏作委之賤工則雅鄭不得不雜願審調鐘琯用十二律還宮均法令上下通習則鄭聲莫能亂雅遂為十二均圖並上之其論以為律各有均有七聲更相為用協本均則樂調非本均則樂悖今黃鐘為宮則太簇姑洗林鐘南呂應鍾蕤賓七聲相應謂之黃鐘之均餘律為宮同之宮為君商為臣角為民徵為事羽為物君者法度號令之所出故宮生徵法度號令所以授臣而承行之故徵生商君臣一德以康庶事則萬物得所民遂其生故商生羽羽生角然臣有常職民有常業物有常形而遷則失常故商角羽無變聲君總萬化不可執以一方事通萬務不可滯於一隅故宮徵有變聲凡律呂之調及其宮樂章具著於圖帝取所上圖考其說乃下鎮几參定而王朴阮逸之黃鐘乃當李照之太簇其編鐘編磬雖有四清聲而黃鐘大呂正聲舛誤照之編鐘編磬雖有黃鐘大呂而全闕四清聲非古制也朴之太簇夾鐘則聲失之高歌者莫能追逐平時設而不用聖人作樂以紀中和之聲所以導中和之氣清不可太高重不可太下必使八音協諧歌者從容而能永其言鎮等因請擇李照編鐘編磬十二參於律者增以王朴無射應鐘及黃鐘大呂清聲以為黃鐘大呂太簇夾鐘之四清聲俾衆樂隨之歌工詠之中和之聲庶可以考請下朴二律就太常鐘磬擇其可用者用之其不可修者別製之而太常以為大樂法度舊器乞留朴鐘磬別製新樂以驗議者之術詔以朴樂鐘為清聲毋得銷毀几等謂新樂之成足以薦郊廟傳萬世其明堂景靈宮降天神之樂六奏舊用夾鐘之均三奏謂之夾鐘為宮夷則之均一奏謂之黃鐘為角林鐘之均二奏謂之太簇為徵姑洗為羽而大司樂凡樂圜鐘為宮黃鐘為角太簇為徵姑洗為羽而圜鐘者夾鐘也用夾鐘均之七聲以其宮聲為始終是謂圜鐘為宮用黃鐘均之七聲以其角聲為始終是謂黃鐘為角用太簇均之七聲以其徵聲為始終是謂太簇為徵用姑洗均之七聲以其羽聲為始終是謂姑洗為羽今用夷則之均一奏謂之黃鐘為角林鐘之均二奏謂之太簇為徵姑洗為羽則祀天之樂無夷則林鐘而用之有太簇姑洗而去之矣唐典祀天以夾鐘宮黃鐘角太簇徵姑洗羽乃周禮也宜用夾鐘為宮其黃鐘為角則用黃鐘均以其角聲為始終太簇為徵則用太簇均以其徵聲為始終姑洗為羽則用姑洗均以其羽聲為始終祭地祇享宗廟皆視此均法以度曲几等又以太常磬三等王朴磬厚李照磬薄惟阮逸胡瑗磬形制精密而聲太高以磬氏之法摩其旁輕重與律呂相應鐘三等王朴鐘所謂聲疾而短聞者也阮逸胡瑗鐘所謂聲舒而遠聞者也惟李照鐘有旋蟲之制鐘磬皆三十有六架架各十有六則正律相應清聲自足其堂上堂下箎笛率從新制而調琴瑟阮筑塤諸器隨所下律詔悉從之乃緝新器用徙置太常闢屋以貯藏之考選樂工汰其椎鈍癃老而優募能者補其闕員立為程度以時習焉初皇祐中益州進士房庶論尺律之法以為嘗得古本漢書言在律曆志范鎮以其說為然請依法作為尺律然後別求古樂參考於是庶奉詔造律管二尺量籥各一而殿中丞胡瑗以為非詔鎮與几等定樂鎮曰定樂當先正律帝然之鎮作律尺等欲圖上之而几之議律主於人聲不以尺度求合其樂大抵即李照之舊而加四清聲遂奏樂成第加恩賚而鎮謝曰此劉几樂也臣何預焉乃復上奏曰太常鎛鐘皆有大小輕重之法非三代莫能為者禁中又出李照胡瑗所鑄銅律及尺付太常按照黃鐘律合王朴太簇律仲呂律合王朴黃鐘律比朴樂才下半律外有損益而內無損益鐘聲鬱而不發無足議者照之律雖是然與其樂校三格自相違戾且以太簇為黃鐘則是商為宮也方劉几奏上時臣初無所預臣頃造律內外有損益其聲和又與古樂合今若將臣所造尺律依大小編次太常鎛鐘可以成一代大典又太常無雷鼓靈鼓路鼓而以散鼓代之開元中有以畫圖獻者一鼓而為八面六面四面明皇用之國朝郊廟或考或不考宮架中惟以散鼓不應經義又八音無匏土二音笙竽以木斗攢竹而以匏裹之是無匏音也塤器以木為之是無土音也八音不具以為備樂安可得哉不報四年十一月詳定所言搏拊琴瑟以詠則堂上之樂以象朝廷之治下管鼗鼓合止柷敔笙鏞以間則堂下之樂以象萬物之治後世有司失其傳歌者在堂兼設鐘磬宮架在庭兼設琴瑟堂下匏竹置之於床並非其序請親祠宗廟及有司攝事歌者在堂不設鐘磬宮架在庭不設琴瑟堂下匏竹不置於床其郊壇上下之樂亦以此為正而有司攝事如之又言以小胥宮縣推之則天子鐘磬鎛十二虡為宮縣明矣故或以為配十二辰或以為配十二次則虡無過十二先王之制廢學者不能考其數隋唐以來有謂宮縣當二十虡甚者又以為三十六虡方唐之盛日有司攝事樂並用宮縣至德後太常聲音之工散亡凡郊廟有登歌而無宮縣後世因仍不改請郊廟有司攝事改用宮架十二虡太常以謂用宮架十二虡則律呂均聲不足不能成均請如禮宮架四面如辰位設鎛鐘十二虡而甲丙庚壬設鐘乙丁辛癸設磬位各一虡四隅植建鼓以象二十四氣宗廟郊丘如之五年正月開封布衣葉防上書論樂器律曲不應古法復下楊傑議傑論防增編鐘編磬二十有四為簨制管簫視鐘磬數登歌用玉磬去樂曲之近清聲者舞不立表皆非是其言均律差互與劉几同請以晉鼓節金奏考經禮制簨虡教國子宗子舞用之郊廟為何所取而范鎮亦言自唐以來至國朝三大祀樂譜並依周禮然其說有黃鐘為角黃鐘之角黃鐘為角者夷則為宮黃鐘之角者姑洗為角十二律之於五聲皆如此率而世俗之說乃去之字謂太簇曰黃鐘商姑洗曰黃鐘角林鐘曰黃鐘徵南呂曰黃鐘羽今葉防但通世俗夷部之說而不見周禮正文所以稱本寺均差互其說難行帝以樂律絶學防草萊中習之尤難乃補防為樂正六年春正月御大慶殿初用新樂二月太常言郊廟樂虡若遇雨雪望祭即設於殿上三月禮部言有司攝事祀昊天舞名請初獻曰帝臨嘉至亞終獻曰神娭錫羡太廟初獻曰孝熙昭德亞終獻曰禮洽儲祥詔可九月禮部言周禮凡大祭祀王出入則奏王夏明入廟門已用樂矣今既移祼在作樂之前皇帝詣罍洗奏乾安則入門亦當奏乾安庶合古制其入景靈宮及南郊壝門乞如之七年正月詔從協律郎榮咨道請於奉宸庫選玉造磬令太常審定音律六月禮部言親郊之歲夏至祀皇地祇於方丘遣冢宰攝事禮容樂舞謂宜加於常祀而其樂虡二十樂工百五十有二舞者六十有四與常歲南北郊上公攝事無異未足以稱欽崇之意乞自今準親祠用三十六虡工人三百有六舞人百三十有四詔可元祐元年咨道又言先帝詔臣製造玉磬將用于廟堂之上依舊同編鐘以登歌今年親祠明堂請用之以章明盛典從之三年范鎮樂成上其所製樂章三鑄律十二編鐘十二鎛鐘一衡一尺一斛一響石為編磬十二特磬一簫笛塤箎巢笙和笙各二並書及圖法帝與太皇太后御延和殿詔執政侍從臺閣講讀官皆往觀焉賜鎮詔曰朕惟春秋之後禮樂先亡秦漢以來韶武僅在散樂工於河海之上往而不還聘先生於齊魯之間有莫能致魏晉以下曹鄶無譏豈徒鄭衛之音已雜華戎之器間有作者猶存典刑然銖黍之一差或宮商之易位惟我四朝之老獨知五降之非審聲知音以律生尺覽詩書之來上閲簨虡之在廷君臣同觀父老太息方詔學士大夫論其法工師有司考其聲上追先帝移風易俗之心下慰老臣愛君憂國之志究觀所作嘉歎不忘鎮為樂論其自曰臣昔為禮官從諸儒難問樂之差謬凡十餘事厥初未習不能不小抵牾後考周官王制司馬遷書班氏志得其法流通貫穿悉取舊書去其抵牾掇其要作為八論其論律論黍論尺論量論聲器言在律曆志論鐘曰夫鐘之制周官鳧氏言之甚詳而訓解者其誤有三若云帶所以介其名也介在于鼓鉦舞甬衡之間介于鼓鉦舞之間則然非在甬衡之上其誤一也又云舞上下促以橫為修從為廣舞廣四分今亦去徑之二分以為之間則舞間之方常居銑之四也舞間方四則鼓間六亦其方也鼓六鉦六舞四既言鼓間與舞佾相應則鼓與舞皆六所云鉦六舞四其誤二也又云鼓外二鉦外一彼既以鉦鼓皆六無厚薄之差故從而穿鑿以遷就其說其誤三也今臣所鑄編鐘十二皆從其律之長故鐘口十者其長十六以為鐘之身鉦者正也居鐘之中上下皆八下去二以為之鼓上去二以為之舞則鉦居四而鼓與舞皆六是故于鼓鉦舞篆景欒隧甬衡旋蟲鐘之文也著於外者也廣長空徑厚薄大小鐘之數也起於內者也若夫金錫之齊與鑄金之狀率按諸經差之毫釐則聲有高下不可不審其鎛鐘亦以此法而四倍之今太常鐘無大小無厚薄無金齊一以黃鐘為率而磨以取律之合故黃鐘最薄而輕自大呂以降迭加重厚是以卑陵尊以小加大其可乎且清聲者不見於經惟小胥注云鐘磬者編次之二八十六枚而在一虡謂之堵至唐又有十二清聲其聲愈高尤為非是國朝舊有四清聲置而弗用至劉几用之與鄭衛無異論磬曰臣所造編磬皆以周官磬氏為法若黃鐘股之博四寸五分股九寸鼓一尺三寸五分鼓之博三寸而其厚一寸其弦一尺三寸五分十二磬各以其律之長而三分損益之如此其率也今之十二磬長短厚薄皆不以律而欲求其聲不亦遠乎鐘有齊也磬石也天成之物也以其律為之長短厚薄而其聲和此出於自然而聖人者能知之取以為法後世其可不考正乎考正而非是則不足為法矣特磬則四倍其法而為之國朝祀天地宗廟及大朝會宮架內止設鎛鐘惟后廟乃用特磬非也今已升祔后廟特磬遂為無用之樂臣欲乞凡宮架內於鎛鐘後各加特磬貴乎金石之聲小大相應論八音曰匏土革木金石絲竹是八物者生天地間其體性不同而至相戾之物也聖人制為八器命之商則商命之宮則宮無一物不同者能使天地之間至相戾之物無不同此樂所以為和而八音所以為樂也樂下太常而楊傑上言元豐中詔范鎮劉几與臣詳議郊廟大樂既成而奏稱其和協今鎮新定樂法頗與樂局所議不同且樂經仁宗制作神考睿斷奏之郊廟朝廷蓋已久矣豈可用鎮一說而遽改之遂著元祐樂議以破鎮說其議樂章曰國朝大樂所立曲名各有成憲不相淆雜所以重正名也故廟室之樂皆以大名之如大善大仁大英之類是也今鎮以文明之曲獻祖廟以大成之曲進皇帝以萬歲之曲進太皇太后其名未正難以施於宗廟朝廷議宮架加磬曰鎮言國朝祀天地宗廟及大朝會宮架內止設鎛鐘惟后廟乃用特磬非也今已升后廟特磬遂為無用之樂欲乞凡宮架內於鎛鐘後各加特磬貴乎金石之聲小大相應按唐六典天子宮架之樂鎛鐘十二編鐘十二編磬十二凡三十有六虡宗廟與殿庭同凡中宮之樂則以大磬代鐘餘如宮架之制今以鎛鐘特磬並設之則為四十八架於古無法皇帝將出宮架撞黃鐘之鐘右五鐘皆應皇帝興宮架撞蕤賓之鐘左五鐘皆應未聞皇帝出入以特磬為節議十六鐘磬曰鎮謂清聲不見於經惟小胥注云鐘磬者編次之十六枚而在一虡謂之堵至唐又有十二清聲其聲愈高尤為非是國朝舊有四清聲置而弗用至劉几用之與鄭衛無異按編鐘編磬十六其來遠矣豈徒見於周禮小胥之注哉漢成帝時犍為郡於水濱得古磬十六枚帝因是陳禮樂雅頌之聲以風化天下其事載於禮樂志不為不詳豈因劉几然後用哉且漢承秦秦未嘗制作禮樂其稱古磬十六者乃二帝三王之遺法也其王朴樂內編鐘編磬以其聲律太高歌者難逐故四清聲置而弗用及神宗朝下三律則四清聲皆用而諧協矣周禮曰鳧氏為鐘薄厚之所震動清濁之所由出則清聲豈不見於經哉今鎮以簫笛塤箎巢笙和笙獻於朝廷簫必十六管是四清聲在其間矣自古無十二管之簫豈簫韶九成之樂已有鄭衛之聲乎禮部太常亦言鎮樂法自係一家之學難以參用而樂如舊制四年十二月始命大樂正葉防撰朝會二舞儀武舞曰威加四海之舞第一變舞人去南表三步總干而立聽舉樂三鼓前行三步及表而蹲再鼓皆舞進一步正立再鼓皆持干荷戈相顧作猛賁趫速之狀再鼓皆轉身向𩹉以干戈相擊刺足不動再鼓皆回身向外擊刺如前再鼓皆正立舉手蹲再鼓皆舞進一步轉面相向立干戈各置腰再鼓各前進以左足在前右足在後左手執干當前右手執戈在腰為進旅再鼓各相擊刺再鼓各退身復位整其干為退旅再鼓皆正立蹲再鼓皆舞進一步正立再鼓皆轉面相向秉干持戈坐作再鼓各相擊刺再鼓皆起收其干戈為克捷之象再鼓皆正立遇節樂則蹲第二變聽舉樂依前蹲再鼓皆舞進一步正立再鼓皆正面作猛賁趫速之狀再鼓各轉身向𩹉相擊刺足不動再鼓各轉身向外擊刺如前再鼓皆正立蹲再鼓皆舞進一步陳其干戈左右相顧為猛賁趫速之狀再鼓皆並入行以八為四再鼓皆兩兩對相擊刺再鼓皆回易行列左在右右在左再鼓皆舉手蹲再鼓皆舞進一步正立再鼓各分左右再鼓各揚其干戈再鼓交相擊刺再鼓皆總干正立遇節樂則蹲第三變聽舉樂則蹲再鼓皆舞進一步轉面相向再鼓整干戈以象登臺講武再鼓皆擊刺於東南再鼓皆按盾舉戈東南嚮而望以象漳泉奉土再鼓皆擊刺於正南再鼓皆按盾舉戈南嚮而望以象杭越來朝再鼓皆舞進一步正立再鼓皆擊刺於西北再鼓皆按盾舉戈西北嚮而望以象克殄並汾再鼓皆擊刺於正西再鼓皆按盾舉戈西嚮而望以象肅清銀夏再鼓皆舞進一步正跪右膝至地左足微起再鼓皆置干戈于地各拱其手象其不用再鼓皆左右舞蹈象以文止武之意再鼓皆就拜收其干戈起而躬立再鼓皆舞退鼓盡即止以象兵還振旅文舞曰化成天下之舞第一變舞人立南表之南聽舉樂則蹲再鼓皆舞進一步正立再鼓皆稍前而正揖合手自下而上再鼓皆左顧左揖再鼓皆右顧右揖再鼓皆開手蹲再鼓皆舞進一步正立再鼓皆少卻身初辭合手自上而下再鼓皆右顧以右手在前左手推出為再辭再鼓皆左顧以左手在前右手推出為固辭再鼓皆合手蹲再鼓皆舞進一步正立再鼓皆俯身相顧初謙合手當胸再鼓皆右側身左垂手為再謙再鼓皆左側身右垂手為三謙再鼓皆躬而授之遇節樂則蹲第二變聽舉樂則蹲再鼓皆舞進一步轉面相嚮再鼓皆稍前相揖再鼓皆左顧左揖再鼓開手蹲正立再鼓皆舞進一步復相嚮再鼓皆卻身為初辭再鼓皆舞辭如上儀再鼓皆再辭再鼓皆固辭再鼓皆合手蹲正立再鼓皆舞進一步再鼓相嚮再鼓皆顧為初謙再鼓皆再謙再鼓皆三謙再鼓皆躬而授之正立遇節樂則蹲第三變聽舉樂則蹲再鼓皆舞進一步兩兩相嚮再鼓皆相趨揖再鼓皆左揖如上再鼓皆右揖再鼓皆開手蹲正立再鼓皆舞進一步復相嚮再鼓皆卻身初辭再鼓皆再辭再鼓皆固辭再鼓皆合手蹲正立再鼓皆舞進一步兩兩相嚮再鼓皆相顧初謙再鼓皆再謙再鼓皆三謙躬而授之正立節樂則蹲凡二舞綴表器及引舞振作並與大祭祀之舞同協律郎陳沂按閲以謂節奏詳備自是朝會則用之八年太常博士孫諤言臣嘗奉社稷之祠親覩陳設初疑其闕略而不備退而考元祐祀儀乃與所親見者合焉其登歌之樂雖有鐘磬簨虡搏拊柷敔之屬獨陳太社壇上而太稷闕焉夫宮架不備非所以重社稷也周官制祭祀之法則有靈鼓以鼓之有帗舞以舞之有太簇應鐘咸池以極其歌舞之節此樂文之備也唐社稷用二十架至於開元亦循三代之遺法於壇之北宮架備陳別異天神中建靈鼓歌鐘歌虡各設二壇下舞上歌何其盛也臣稽考典禮凡祭太社太稷宜倣周官及開元禮文於壇之北備設宮架鐘匏竹各列二壇南架之內更植靈鼓於是集侍從禮官議增稷壇樂而添用宮架之說不行元符元年十一月詔登歌鐘磬並依元豐詔旨復先帝樂制也二年正月詔前信州司法參軍吳良輔按協音律改造琴瑟教習登歌以太常少卿張商英薦其知樂故也初良輔在元豐中上樂書五卷其書分為四類以謂天地兆分氣數爰定律厥氣數通之以聲於是撰釋律律為經聲為緯律以聲為文聲以律為質旋相為宮七音運生於是撰釋聲聲生於日律生於辰故經之以六律緯之以五聲聲律相協和而無乖播之八音八音以生於是撰釋音四物兼采八器以成度數施設象隱於形考器論義道德以明於是撰釋器類各有條凡四十四篇大抵考之經傳精以講思頗益於樂理文多故弗著焉崇寧元年詔宰臣置僚屬講議大政以大樂之制訛繆殘闕太常樂器弊壞琴瑟制度參差不同簫笛之屬樂工自備每大合樂聲韻淆雜而皆失之太高箏筑阮秦晉之樂也乃列於琴瑟之間熊羆按梁隋之制也乃設於宮架之外笙不用匏舞不象成曲不協譜樂工率農夫市賈遇祭祀朝會則追呼於阡陌閭閻之中教習無成瞢不知音議樂之臣以樂經散亡無所據依秦漢之後諸儒自相非議不足取法乃博求知音之士而魏漢津之名達於上焉漢津至是年九十餘矣本剩員兵士自云居西蜀師事唐仙人李良授鼎樂之法皇祐中漢津與房庶以善樂被薦既至黍律已成阮逸始非其說漢津不得伸其所學後逸之樂不用乃退與漢津議指尺作書二篇述指法漢津嘗陳於太常樂工憚改作皆不主其說或謂漢津舊嘗執役於范鎮見其制作略取之蔡京神其說而託於李良二年九月禮部員外郎陳暘上所撰樂書二百卷命吏部尚書何執中看詳以謂暘欲考定音律以正中聲願送講議司令知音律者參驗行之暘之論曰漢津論樂用京房二變四清蓋五聲十二律樂之正也二變四清樂之蠹也二變以變宮為君四清以黃鐘清為君事以時作固可變也而君不可變太簇大呂夾鐘或可分也而黃鐘不可分豈古人所謂尊無二上之旨哉壬辰詔曰朕惟隆禮作樂實治內修外之先務損益述作其敢後乎其令講議司官詳求歷代禮樂沿革酌古今之宜修為典訓以貽永世致安上治民之至德著移風易俗之美化乃稱朕咨諏之意焉三年正月漢津言曰臣聞黃帝以三寸之器名為咸池其樂曰大卷三三而九乃為黃鐘之律禹效黃帝之法以聲為律以身為度用左手中指三節三寸謂之君指裁為宮聲之管又用第四指三節三寸謂之臣指裁為商聲之管又用第五指三節三寸謂之物指裁為羽聲之管第二指為民為角大指為事為徵民與事君臣治之以物養之故不用為裁管之法得三指合之為九寸即黃鐘之律定矣黃鐘定餘律從而生焉臣今欲請帝中指第四指第五指各三節先鑄九鼎次鑄帝坐大鐘次鑄四韻清聲鐘次鑄二十四氣鐘然後均弦裁管為一代之樂制其後十三年帝一日忽夢人言樂成而鳳凰不至乎蓋非帝指也帝寤大悔歎謂崇寧初作樂請吾指寸而內侍黃經臣執謂帝指不可示外人但引吾手略比度之曰此是也蓋非人所知今神告朕如此且奈何於是再出中指寸付蔡京密命劉昺試之時昺終匿漢津初說但以其前議為度作一長笛上之帝指寸既長於舊而長笛殆不可易以動人觀聽於是遂止蓋京之子絛云秋七月景鐘成景鐘者黃鐘之所自出也垂則為鐘仰則為鼎鼎之大終於九斛中聲所極製煉玉屑入於銅齊精純之至音韻清越其高九尺拱以九龍惟天子親郊乃用之立於宮架之中以為君圍於是命翰林學士承旨張康國為之銘其文曰天造我宋於穆不已四方來和十有二紀樂象厥成維其時矣迪惟有夏度自禹起我龍受之天地一指於論景鐘中聲所止有作于斯無襲于彼九九以生律呂根柢維此景鐘非弇非侈在宋之庭屹然中峙天子萬年既多受祉維此景鐘上帝命爾其承伊何以燕翼子永言寶之宋樂之始
