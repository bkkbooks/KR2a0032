body:
  text: 宋史卷一百一十二志第六十五禮十五嘉禮三聖節諸慶節聖節建隆元年羣臣請以二月十六日為長春節正月十七日於大相國寺建道場以祝壽至日上壽退百僚詣寺行香尋詔今後長春及諸慶節常參官致仕官僧道百姓等毋得進奉太宗以十月七日為乾明節復改為壽寧節真宗以十二月二日為承天節其儀帝先御長春殿諸王上壽次樞密使副宣徽三司使次使相次管軍節度使兩使留後觀察使次節度使至觀察使次皇親任觀察使以下各上壽仍以金酒器銀香合馬袖表為獻既畢咸赴崇德殿班宰相率百官上壽賜酒三行皆用教坊樂賜衣一襲文武羣臣方鎮州軍皆有貢禮前一月百官內職牧伯各就佛寺修齋祝壽罷日以香賜之仍各設會賜上尊酒及諸果百官兼賜教坊樂景德二年始令樞密三司使副學士復赴百官齋會少卿監刺史以上及近職一子賜恩僧道則賜紫衣師號禁屠輟刑仁宗以四月十四日為乾元節正月八日皇太后為長寧節詔定長寧節上壽儀太后垂簾崇政殿百官及契丹使班庭下宰臣以下進奉上壽閣門使於殿上簾外立侍百官再拜宰臣升殿跪進酒簾外內臣跪承以入宰臣奏曰長寧節臣等不勝歡抃謹上千萬歲壽復降再拜三稱萬歲內臣承旨宣曰得公等壽酒與公等同喜咸再拜宰臣升殿內侍出簾外跪授虛盞宰臣跪受降再拜舞蹈三稱萬歲內侍承旨宣羣臣升殿再拜升陳進奉物當殿庭通事舍人稱宰臣以下進奉客省使殿上喝進奉出內謁者監進第二盞賜酒三行侍中奏禮畢皆再拜舞蹈太后還內百官詣內東門拜表稱賀其外命婦舊入內者即入內上壽不入內者進表內侍引內命婦上壽次引外命婦如百官儀次日大宴英宗以正月三日為壽聖節禮官奏故事聖節上壽親王樞密於長春殿宰臣百官於崇德殿天聖諒暗皆於崇政殿於是紫宸上壽羣臣升殿間飲獻一觴而退又一日賜宴於錫慶院神宗以熙寧元年四月十日為同天節以宅憂罷上壽惟拜表稱賀明年親王樞密使管軍駙馬諸司使副詣垂拱殿宰臣百官大國使詣紫宸殿上壽命坐賜酒三行不舉樂明年以大旱罷同天節上壽羣臣赴東上閣門表賀中書門下言同天節上壽班自今樞密使副宣徽三司使殿前馬步軍副都指揮使以上共作一班進酒一盞親王宗室使相至觀察駙馬管軍觀察使以上皆赴紫宸殿依本班序立上壽更不赴垂拱殿蓋以管軍觀察使以上及親王駙馬並於垂拱殿以官序高下各班進酒畢而日晏外朝有班者仍詣紫宸殿議者以為近瀆改焉而詔袒免以上宗婦聽班賀于禁中哲宗即位詔以太皇太后七月十六日為坤成節宰臣請以十二月八日為興龍節哲宗本七日生以避僖祖忌故後一日徽宗以十月十日為天寧節定上壽儀皇帝御垂拱殿羣臣通班起居畢分班從義郎以下醫官待詔等先退知引進司官一員讀奏目知東上閣門官一員奏進壽酒由東階升舍人通教坊使以下贊再拜奏聖躬萬福又再拜復位次看盞人稍前舍人贊再拜贊上殿祗候分東西兩陛立俟進酒升殿次舍人引親王入殿庭北向立贊再拜班首奏萬福舍人引進奉西入列於親王後酒器簷床置馬前揖天武躬奏萬福進奉馬先出內侍進御茶床殿中監酹酒訖知東上閣門官殿上躬奏親王某以下進壽酒舍人揖親王以下躬贊再拜乃引親王二員升殿知東上閣門官引詣御坐前舍人東階下西向立後準此尚醞典御奉槃盞授班首搢笏受槃盞西向立奉御啓盞親王一員搢笏注酒班首奉詣御坐東進訖少退虛跪興以槃授典御退閣門引降階舍人引當殿北向立東上贊拜興搢笏跪奉表舍人接表一員在東餘詣親王西置表笏上授引進知引進司官殿上讀奏目退親王以下俯伏興躬舍人贊再拜引班首升東階餘殿下分立閣門引詣御坐東北向搢笏尚醞典御如前奉槃立樂作皇帝飲訖受盞復位再拜如上儀知引進司官詣折檻東西向宣曰進奉收贊拜舞蹈又再拜西出親王以下赴紫宸殿立班引進官宣進奉出天武奉進奉以出閣門復立殿上教坊使贊送御酒又再拜教坊致語訖贊再拜退次樞密官上壽次管軍觀察以上上壽進奉並如儀內侍舉御茶床舍人贊教坊使以下謝祗應再拜訖閣門側奏無公事皇帝赴紫宸殿後閣受羣臣上壽質明三公以下百僚並於殿門外就次東上閣門御史臺太常寺分引入詣殿庭東西立閣門附內侍進班齊牌皇帝出閣禁衛諸班親從迎駕自贊常起居皇帝升坐鳴鞭禮直官通事舍人引三公至執政官御史臺東上閣門分引百官並橫行北向立典儀贊再拜舞蹈班首奏萬福又再拜訖分東西立禮直官引殿中監少監升東階詣酒尊所稍西南向西上立舍人揖教坊使以下通班大起居次看盞人謝升殿贊再拜內侍進御茶床殿侍酹酒訖禮直官通事舍人分引三公至執政官御史臺東上閣門分引百僚並橫行北向立典儀贊再拜贊者承傳在位官皆再拜禮直官通事舍人引上公升東階東上閣門官接引升殿授盞啓盞如上儀上公詣御坐俯伏跪奏文武百僚上公具官臣某等稽首言天寧令節臣等不勝大慶謹上千萬歲壽俯伏興退降階舍人接引復位典儀贊再拜訖禮直官引知樞密院官詣御坐前承旨退詣折檻稍東西向宣曰得公等壽酒與公等內外同慶典儀贊拜如儀百官分東西立禮直官通事舍人引上公升東階東上閣門官接引詣御坐東搢笏殿中監授盤上公奉進御坐東北向樂作皇帝飲訖閣門引接盞降復位典儀贊拜如上儀宗室遙郡以下先退禮直官引樞密院官詣御坐前承旨退詣折檻稍東宣曰宣羣官升殿典儀贊拜訖禮直官通事舍人分引三公以下升東階親王使相以下升西階御史臺東上閣門分引祕書監以下升兩朵殿並東西廊席後立尚醞典御以盞授殿中監奉御啓盞殿中監西向立殿中少監以酒注于盞第二第三準此奉詣御坐前躬進訖少退奉盤西向立樂作皇帝飲訖殿中監接盞退授奉御出笏復位通事舍人分引殿上官橫行北向舍人贊再拜典儀曰再拜贊者承傳皆再拜舍人贊就坐各立席後復贊就坐羣官皆坐酒初行先宰臣次百官皆作樂尚食典御奉御進食太官設羣官食皇帝再舉酒羣官興立席後樂作飲訖舍人贊就坐再行羣官酒皇帝三舉酒並如第二之儀酒三行舍人曰可起羣官興立席後若宣示盞即隨東上閣門官以下揖稱宣示盞躬贊就坐若宣勸即立席後躬飲訖贊再拜內侍舉御茶床禮直官引左輔詣御坐前北向俯伏跪奏左輔具官臣某言禮畢俯伏興退復位禮直官通事舍人分引三公以下文武百僚降階橫行北向立樞密院官在親王後典儀贊再拜皆舞蹈再拜退靖康元年四月十三日太宰徐處仁等表請為乾龍節至日皇帝帥百官詣龍德宮上壽畢即本宮賜侍從官以上宴建炎元年五月宰臣等上言請以五月二十一日為天申節詔曰朕承祖宗遺澤獲託士民之上求所以扶危持顛之道未知攸濟念二聖鑾輿在遠萬民失業將士暴露夙夜痛悼寢食幾廢況以眇躬之故聞樂飲酒以自為樂乎非惟深拂朕志實增感于朕心所有將來天申節百官上壽常禮可令寢罷至是止就佛寺啓散祝壽道場詣閣門或後殿拜表稱賀紹興十三年二月臣僚奏臣聞孝理天下者帝王之盛德歸美報上者臣子之至誠是皆因性自然發於觀感必各盡其至然後為稱恭惟陛下撫艱難之運憂勤在御兢兢業業圖濟中興孝德通于神明皇天為之悔禍長樂還闕適當誕節之前陛下以天下養獲伸宮闈上壽之儀臣民得於觀聽天下無不欣慶所以崇大養而成孝理之功者既已盡善盡美矣陛下誕聖佳辰乃臣子所願奉觴上壽以盡歸美之意其可不舉而行之乎臣愚欲望將來天申節許令有司舉行舊典至日百官得以奉萬年之觴仰祝聖壽天下幸甚太常禮部討論每遇聖節樞密院以下先詣垂拱殿上壽畢宰臣率百僚於紫宸殿上壽前一月分日啓建道場至前一日樞密院官滿散依例作齋筵至日三省官上壽立班訖次赴滿散作齋筵後二日大宴於集英殿時命御史臺太常寺修立儀注孝宗隆興元年太上皇帝天申節皇帝及宰臣文武百僚詣德壽宮上壽是日以欽宗大祥前一日皇帝起居如宮中儀百僚拜表稱賀乾道八年立皇太子皇帝率皇太子及文武百僚詣德壽宮上壽前期儀鸞司陳設德壽宮殿門之內外設御坐於殿上當中南向設大次於德壽宮門內南向小次於殿東廊西向設皇帝褥位二一於御坐東南西向一於御坐之南北向尚醞設御酒尊酒器於御坐之東有司又設御茶床於御坐之西俱稍北其日文武百僚內不係從駕者並先赴德壽宮門外以俟迎駕起居質明皇帝服鞾袍出即御坐從駕臣僚禁衛起居如常儀皇帝降坐乘輦將至德壽宮文武百僚迎駕再拜起居訖前導官太常卿閣門官太常博士禮直官先入詣大次前分左右立定皇帝降輦入次御史臺閣門太常寺分引皇太子並文武百僚入詣殿廷東西相向立定前導官導皇帝入小次簾降皇太子並文武百僚並橫行北向立太上皇帝出宮升御坐鳴鞭小次簾捲前導官導皇帝升殿東階詣殿折檻前北向褥位再拜躬奏聖躬萬福再拜皇帝詣太上皇帝御坐之東褥位西向立前導官於殿上隨地之宜立次舍人揖皇太子並文武百僚躬典儀曰再拜贊者承傳在位官皆再拜搢笏舞蹈又再拜皇太子不離位奏聖躬萬福各再拜直身分東西相向立禮直官引奉盤盞官受盤盞官承旨宣答官奏禮畢官殿中監少監升殿內侍進御茶床尚醞典御以盤盞酒注授殿中監少監次禮直官引奉盤盞官詣酒尊所北向殿中監啓盞殿中少監注酒奉盤盞官奉酒詣皇帝前北向禮直官引受盤盞官詣太上皇帝御坐前西向立皇太子並文武百僚橫行北向立奉盤盞官躬進皇帝皇帝奉酒前導官導皇帝詣太上皇帝御坐前躬進訖少後以盤授受盤盞官前導官導皇帝詣太上御坐前褥位北向俯伏跪殿下皇太子並百僚皆躬身皇帝奏臣某謹率文武百僚稽首言天申令節臣某與百僚等不勝大慶謹上千萬歲壽奏訖伏興再拜在位官皆再拜承旨宣答官宣曰得皇帝壽酒與皇帝並百僚內外同慶皇帝再拜在位官皆再拜訖分東西相向立皇帝詣御坐東西向立奉盤盞官以盤北向恭進皇帝奉盤樂作俟太上皇帝飲酒皇帝躬接盞訖皇帝少後以盤盞授受盤盞官以授殿中監各復位立皇太子並文武百僚橫行北向皇帝詣褥位北向再拜在位官皆再拜皇帝詣太上御坐東褥位西向立皇太子文武百僚再拜搢笏舞蹈又再拜訖內侍舉茶床奏禮畢官北向俯伏跪奏具官臣某言禮畢在位官再拜太上皇帝駕興皇帝從入文武百僚以次退淳熙二年十一月詔太上皇帝聖壽無疆新歲七十以十一日冬至加上尊號册寶十二月十七日立春行慶壽禮是日早文武百僚並簪花赴文德殿立班聽宣慶壽赦宣赦訖從駕至德壽宮行慶壽禮致詞曰皇帝臣某言天祐君親錫茲難老維春之吉年德加新臣某與羣臣等不勝大慶謹上千萬歲壽餘與前上壽儀注同禮畢從駕官應奉官禁衛等並簪花從駕還內文武百僚文德殿拜表稱賀十年十二月以太上皇后新年七十詔以立春日行慶賀之禮十三年春正月朔以太上皇帝聖壽八十帝率羣臣詣德壽宮行禮其儀注恩赦並如淳熙二年典故孝宗以十月二十二日為會慶節光宗以九月四日為重明節寧宗以十月十九日為天祐節尋改為瑞慶節理宗以正月五日為天基節度宗以四月九日為乾會節瀛國公以九月二十八日為天瑞節其上壽稱賀之禮大略皆如天申節儀諸慶節古無是也真宗以後始有之大中祥符元年詔以正月三日天書降日為天慶節休假五日兩京諸路州府軍監前七日建道場設醮斷屠宰節日士庶特令宴樂京師然燈又以六月六日為天貺節京師斷屠宰百官行香上清宮又以七月一日聖祖降日為先天節十月二十四日降延恩殿日為降聖節休假宴樂並如天慶節中書親王節度樞密三司以下至駙馬都尉詣長春殿進金縷延壽帶金絲續命縷上保生壽酒改御崇德殿賜百官飲如聖節儀前一日以金縷延壽帶金塗銀結續命縷緋綵羅延壽帶綵絲續命縷分賜百官節日戴以入禮畢宴百官於錫慶院天禧初詔以大中祥符元年四月一日天書再降內中功德閣為天禎節一如天貺節尋以仁宗嫌名改為天祺節政和三年十一月五日以修祀事天真示見詔為天應節又以五月十二日祭方丘日為寧貺節既又以二月十五日太上混元上德皇帝降聖日為真元節八月九日青華帝君生辰為元成節正月四日有太祖神御之州府宮殿行香為開基節十月二十五日為天符節皆如天慶節著為令高宗建炎元年十一月五日詔政和以來添置諸節除開基節外餘並依祖宗法
