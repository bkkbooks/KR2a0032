body:
  text: 宋史卷七本紀第七真宗二六年春二月戊寅幸飛山雄武營觀發機石連弩遂宴射潛龍園己卯以京東西淮南水災遣使振恤貧民平決獄訟幸北宅視德潤疾庚辰以西涼府六谷首領潘羅支為朔方軍節度靈州西面都巡檢使甲申封賢懿長公主為鄭國長公主蕃部葉市族囉埋等內附己丑德潤卒庚寅屯田員外郎盛梁坐受賕枉法流崖州三月辛卯朔欽州言交州八州使黃慶集等來歸石隰都巡檢使言綏州東山蕃部軍使拽臼等內屬己酉餞种放還山乙卯幸惟吉第視疾戊午幸元份宮視疾四月李繼遷寇洪德砦蕃官慶香癿慶等擊走之以慶香等領刺史契丹來侵戰望都縣副都部署王繼忠陷於敵發河東廣銳兵赴援辛巳信國公玄祐薨五月甲午太白晝見辛亥錄望都戰沒將士子孫癸丑鎮州副都部署李福坐望都之戰臨陣退衂削籍流封州京城疫分遣內臣賜藥六月丁卯詔命官流竄沒嶺南者給緡錢歸葬豐州瓦窰沒劑如羅昧克等族以兵濟河擊李繼遷敗之丁丑隴山西首領禿逋等貢馬願附大兵擊賊丁亥寇準為三司使復鹽鐵度支戶部副使秋七月癸丑兗王元傑薨八月庚午太白晝見辛未原渭等州言西蕃八部二十五族納質來歸丙子詔環慶秋田經寇踐傷者頃賜粟十五斛民被掠者口賜米一斛蠲棣州民租十之三九月己丑浦端國獻紅鸚鵡丙申出內府繒帛市穀實邊甲辰以呂蒙正為太子太師萊國公十月丁丑狐出皇城角樓獲之戊寅給軍中傳信牌十一月癸巳慮囚雜犯死罪以下遞減一等杖釋之苦寒令諸路休役兵己亥閱捧日軍士教三陣于崇政殿壬寅幸大相國寺庚戌雨木冰甲寅有星孛于井鬼十二月庚申遣使西北勞賜將士甲子詔求直言西面部署言李繼遷攻西涼知府丁維清沒焉庚午以李繼隆為山南東道節度使甲戌萬安太后不豫詔求良醫戊寅赦天下死罪減一等流以下釋之是歲西涼府暨龍野馬族三佛齊大食國來貢河北興元府遂郢州大熟景德元年春正月丙戌朔大赦改元丁亥麟府路言契丹言碸族拔黃三百餘帳內屬癸巳幸天駟監賜從官馬丙申京師地震辛丑詔民間天象器物讖候禁書並納所司焚之匿不言者死石隰州言河西蕃部四十五族首領率屬內附京師地再震乙巳廢高州丁未京師地復震壬子開定州河通漕二月環慶部署言西涼府潘羅支集六谷蕃部合擊李繼遷敗之繼遷中流矢死羅支使夾獻捷戊寅太常卿張齊賢為兵部尚書冀益黎雅州地震三月威虜軍守將破契丹於長城口追北過陽山斬獲甚衆柳谷川蕃部入寇麟府擊敗之擒千餘人己亥皇太后崩辛丑羣臣三上表請聽政不允乙巳李沆等詣宮門見帝毀瘠過甚退上五表求見言西北軍事方殷力請聽政從之麟府路言敗西人於神堆破其砦柵己酉帝始於崇政殿西廡衰服慟哭見羣臣夏四月甲寅上大行皇太后謚曰明德羣臣三請御正殿從之丙辰邢州地震不止以溪蠻寧息民多復業蠲澧州石門縣租二年丁卯以隆暑休北邊役兵瀛州地震五月甲申邢州地連震不止賜民租之半蒲端國遣使來貢丁巳詔諸路轉運使代還日在任興除利害升黜能否凡所經畫事悉條上以聞六月己未幸北宅視德欽疾洪德砦言繼遷部將都尾等率屬歸附甲子詔罷川峽閩廣州軍貢承天節自今三千里外者罷之鎮戎軍言敗戎人於石門川庚午德欽卒洪德砦言蕃部羅泥天王本族諸首領各率屬歸附趙保忠卒壬午暑甚罷京城工役遣使賜暍者藥秋七月癸未班用兵誅賞格丙戌李沆薨庚寅以翰林侍讀學士畢士安為吏部侍郎參知政事庚子益都民李仁美國凝母皆百餘歲詔賜粟帛八月涇原部署言擊萬子軍主族帳斬首二百餘級己未以畢士安寇準並平章事宣徽南院使王繼英為樞密使同知樞密院事馮拯陳堯叟並簽署樞密院事壬申詔常參官二人共舉州縣官可任幕職者一人丙子以保平軍節度石保吉為武寧軍節度同平章事庚辰遣使廣南東西路疏決繫囚犒勞軍校父老訪民間便宜九月癸未罷北面齎御劍內臣以劍屬主將丙戌令諸路轉運使考察官吏能否己丑詔翰林學士承旨宋白等舉文武官可任藩郡者各一人丁酉召宰相議親征契丹耶律吳欲來降宋州汴水決乙巳置祁州河決澶州遣使具舟濟民給以糧餉閏月乙卯詔河北吏民殺契丹者所至援之仍頒賞格壬申江南旱遣使決獄訪民疾苦祠境內山川癸酉明德皇太后殯沙臺北平砦威虜軍合兵大破契丹乙亥參知政事王欽若判天雄軍府兼都部署契丹統軍撻覽率衆攻威虜順安軍三路都部署擊敗之斬偏將獲其輜重又攻北平砦及保州復為州砦兵所敗撻覽與契丹主及其母并衆攻定州宋兵拒於唐河擊其游騎契丹駐陽城淀因王繼忠致書于莫州石普以講和丙子以天雄軍都部署周瑩為駕前貝冀路都部署侍衞馬軍都指揮使葛霸為駕前邢洺路都部署己卯高繼勳率兵擊敗契丹數萬騎於岢嵐軍冬十月壬午詔修葺歷代聖賢陵墓癸未麟府路率部兵入朔州破大狼水砦乙酉令漕運所經州軍長吏兼輦運事戊子祔明德皇后于太廟庚寅命張齊賢兼青淄濰安撫使丁謂兼鄆齊濮安撫使癸巳幸故鄭國長公主第乙未詔王超等率兵赴行在丁酉詔魏能張凝田敏屯定州癸卯以廝鐸督為朔方軍節度靈州西面巡檢西涼府六谷大首領保莫州威虜岢嵐軍及北平砦皆擊敗契丹既而王繼忠上言契丹請和命閤門祗候曹利用往答之丁未以雍王元份為東京留守己酉置龍圖閣待制十一月辛亥太白晝見乙卯遣使撫河北契丹攻瀛州知州李延渥率兵敗之殺傷十餘萬衆遁去官吏進秩賜物有差己未遣使安撫河東諸州契丹逼冀州知州王嶼擊走之甲子校獵近郊丙寅遣使安集河北流民戊辰以山南東道節度同平章事李繼隆為駕前東面前排陣使武寧軍節度同平章事石保吉為駕前西面排陣使石州地震庚午車駕北巡司天言日抱珥黃氣充塞宜不戰而却癸酉駐蹕韋城縣甲戌寒甚左右進貂帽毳裘却之曰臣下皆苦寒朕安用此王繼忠數馳奏請和帝謂宰相曰繼忠言契丹請和雖許之然河冰已合且其情多詐不可不為之備契丹兵至澶州北直犯前軍西陣其大帥撻覽耀兵出陣俄中伏弩死丙子帝次澶州渡河幸北砦御城北樓召諸將撫慰鄆州得契丹諜者斬之戊寅曹利用使契丹還十二月庚辰朔日有食之契丹使韓嵵來講和辛巳遣使安撫河北京東壬午幸城南臨河亭賜鑿凌軍綿襦癸未幸北砦又幸李繼隆營命從官將校飲犒賜諸軍有差詔諭兩京以將班師甲申契丹使姚東之來獻御衣食物乙酉御行營南樓觀河遂宴從官及契丹使丙戌遣使撫諭懷孟澤潞鄭滑等州放強壯歸農遣監西京左藏庫李繼昌使契丹定和戒諸將勿出兵邀其歸路丁亥遣使安集河北流民瘞暴骸以閤門祗候曹利用為東上閤門使忠州刺史戊子幸北砦勞軍召李繼隆石保吉宴射行宮西亭壬辰赦河北諸州死罪以下民經蹂踐者給復二年死事官吏追錄子孫癸巳雍王元份疾命參知政事王旦權東京留守甲午車駕發澶州大寒賜道傍貧民襦袴乙未契丹使丁振以誓書來丁酉契丹兵出塞戊戌至自澶州己亥幸雍王元份宮視疾辛丑錄契丹誓書頒河北河東諸州癸卯遣使撫問河北東西路官吏將卒訪察功狀甲辰改威虜諸軍名戊申詔恤河北傷殘是歲交州西涼府西高豐甘沙州占城大食蒲端龜茲國來貢江南東西路饑陝濱棣州蝗害稼命使振之二年春正月庚戌朔以契丹講和大赦天下非故鬬殺放火強盜偽造符印犯贓官典十惡至死者悉除之壬子放河北諸州強壯歸農令有司市耕牛給之癸丑罷諸路行營合鎮定兩路都部署為一乙卯罷北面部署鈐轄都監使臣二百九十餘員振河北饑遣監察御史朱摶赴德清軍收瘞戰沒遺骸致祭罷江淮荊浙增榷酤錢丙辰幸雍王元份宮視疾甲子詔淮南以上供軍儲振饑民戊辰以天平軍節度使王超為崇信軍節度省河北戍兵十之五緣邊三之一所在量軍儲饋給勿調民飛輓癸酉幸李繼隆第視疾京西民轉送軍儲者賜租十二丁丑詔河北轉運使察官屬不任職者以名聞戊寅取淮楚間踏犂式頒之河朔二月嘉邛州鑄大鐵錢置霸州安肅軍榷場癸未李繼隆卒甲申定入粟實邊授官等級乙酉遣使安撫交州甲午詔緣邊得契丹馬牛悉縱還之沒蕃漢口歸業者給資糧弛邊民鐵禁環州言戎人入寇擊走之俘其軍主癸卯遣太子中允孫僅等使契丹丁未呂蒙正對便殿三月甲寅御試禮部貢舉人戊午鄭州防禦使魏能坐歸師不整責授右羽林將軍庚申禁邊民入外境掠奪夏四月賜進士李迪等瓊林宴丁酉樞密直學士劉師道責授忠武軍行軍司馬右正言知制誥陳堯咨單州團練使俱坐考試不公己亥葺河北城池癸卯置資政殿學士以王欽若為之馮拯為參知政事甲辰以寧國軍留後駙馬都尉吳元扆為武勝軍節度戎人寇環州擊敗之執其酋慶請戮之詔釋其罪配淮南五月戊申幸國子監丁巳司天少監史序上乾坤寶典己未幸元份宮視疾庚申御試河北舉人丁卯宴近臣于資政殿餞种放游嵩山癸酉詔天下榷利勿增羨為額六月丁丑詔勸學幸諸王宮己卯命法直官用士人己丑曹州民趙諫趙諤以恐喝贓鉅萬伏誅辛卯以趙德明歸款諭河西諸蕃各守疆界高瓊求板本經史詔給之秋七月庚戌劉質進兵要論召試中書甲子詔復賢良方正能直言極諫等六科八月戊寅雍王元份薨丙戌有司上新定權衡法遣內臣奉安太祖聖容於揚州建隆寺丁亥翰林學士晁迥先為鄆王元份留守官屬坐輔導無狀責授右司郎中辛丑幸南宮及恭孝太子宮有星孛于紫微九月丁未以向敏中為鄜延路都部署庚戌淮南旱詔轉運使疏理繫囚癸亥三司上新編敕羣臣三表上尊號不允庚午幸興國寺傳法院觀新譯經辛未命近臣慮開封府繫囚壬申詔荊湖溪峒民為蠻人所掠而歸者勿限年月給還舊產冬十月庚辰丁謂上景德農田編敕乙酉畢士安薨丙戌遣職方郎中韓國華等使契丹十一月戊申詔翰林侍講學士邢昺等舉堪為學官者十人丙辰享太廟丁巳祀天地于圜丘大赦庚申大宴含光殿癸亥寇準加中書侍郎兼工部尚書楚王元佐為右衞上將軍彭城郡王元偓進封寧王安定郡王元偁進封舒王曹國公元儼進封廣陵郡王安定郡公惟吉加同平章事癸酉契丹使來賀承天節十二月辛巳置資政殿大學士以王欽若為之癸未以高瓊為忠武軍節度葛霸為昭德軍節度對京畿父老於長春殿賜帛有差契丹遣使賀明年正旦是歲夏州西涼府邛部川蠻來貢淮南兩浙荊湖北路饑京東蝻生閩颶風不害稼遣使分振三年春正月丁巳親釋逋負繫囚振畿縣貧民收瘞遺骸丁卯詔緣邊歸業民給復三年辛未置常平倉二月甲戌幸北宅省德恭疾乙亥詔京東西淮南河北振乏食客戶己卯謁明德皇后攢宮賜守奉人緡帛甲申禁民開近陵域地以宋州為應天府丁亥王繼英卒戊戌以中書侍郎兼工部尚書平章事寇準為邢部尚書左丞參知政事王旦為工部尚書平章事己亥王欽若陳堯叟並知樞密院事翰林學士趙安仁參知政事樞密都承旨韓崇訓馬知節並簽署樞密院事三月乙巳客星出東南辛亥免隨州光化民貸糧己未詔儆諫臣悉心獻替夏四月癸酉幸秦國長公主第丙子幸開寶寺遂幸御龍直班院觀教閱弓刀又幸左騏驥院賜從官馬羣牧使等器幣還幸崇文院觀圖籍賜編修官金帛有差己卯置清平宣化二軍乙酉置河北緣邊安撫使副都監于雄州壬辰命使巡撫益利梓夔福建諸路決獄及犒設將吏父老乙未种放賜告歸終南山己亥遣使巡撫江浙路五月壬寅日當食不虧周伯星見辛亥置京東五路巡檢丁巳幸北宅視德恭疾己未德恭卒西涼府廝鐸督部落多疾賜以藥物渭州妙娥族三千餘帳內附復置高州六月丙子羣臣固請聽樂從之詔三班考較使臣以七年為限知廣州凌策請發兵定交阯亂帝以黎桓素修職貢不欲伐喪命遵前詔安撫戊寅罷兩川稅課金二分乙未汴水暴漲賜役兵錢丙申遣使振應天府水災及瘞溺死者秋七月壬寅減鄜延戍兵乙巳太白晝見庚戌詔渭州鎮戎軍收獲蕃部牛送給內地耕民壬子賜廣南聖惠方歲給錢五萬市藥療病者邵曄上邕州至交阯水陸路及控制宜州山川等圖帝曰祖宗闢土廣大唯當慎守不必貪無用地苦勞兵力甲子大宴含光殿始用樂丙寅大風遣中使視稼八月甲戌閱太常新集雅樂丁丑幸寶相院戊寅詔川峽戍兵二年者代之庚辰工部侍郎董儼坐躁競傾狡責授山南東道行軍司馬九月甲寅宴射含芳園丙辰御試賢良方正直言極諫科壬戌幸元偓宮視疾甲子置諸陵齋宮乙丑放西州納質人夏州趙德明奉表歸款冬十月庚午以趙德明為定難軍節度兼侍中封西平王甲午兩浙轉運使姚鉉坐不法除名為連州文學丁酉葬明德皇后十一月壬寅周伯星再見十二月癸酉太白晝見戊寅高瓊卒乙酉狩近郊以親獲兔付有司薦廟戊子詔牛羊司畜有孳乳者放牧勿殺辛卯朝陵緣路禁樂壬辰幸秦國長公主第又幸北宅視德鈞疾是歲西涼府龕谷十族高溪州風琶溪洞諸蠻酋來貢京東西河北陝西饑振之博州蝝不為災四年春正月己亥朔御朝元殿受朝詔京畿繫囚流以下減一等甲辰以陳堯叟為東京留守德鈞卒乙巳契丹使辭歸國以丁謂為隨駕三司使己未車駕發京師庚申次中牟縣除逋負釋繫囚賜父老衣幣所過如之王顯卒丙寅次永安鎮丁卯帝素服詣諸陵減西京及諸路繫囚罪如己亥詔置永安縣及三陵副使都監二月己巳幸西京經漢將軍紀信塚司徒魯恭廟贈信太尉恭太師命吏部尚書張齊賢祭周六廟詔從官先塋在洛者賜告祭拜癸酉詔西京建太祖神御殿置國子監武成王廟甲戌幸上清宮詔賜酺三日辛巳錄唐白居易孫利用為河南府助教壬午幸呂蒙正第甲申御五鳳樓觀酺召父老五百人賜飲樓下丁亥幸元偓宮戊子葺周六廟加號列子增封唐孝子潘良瑗及其子季通墓仍禁樵採庚寅詔河南府置五代漢高祖廟辛卯車駕發西京甲午次鄭州遣使祀中嶽及周嵩懿二陵丁酉賜隱士楊璞繒帛三月己亥至自西京甲辰謁啟聖院太宗神御殿癸丑趙德明遣使來謝廩給因貢駝馬優賜答之丁巳詔天下收瘞遺骸致祭庚申蠲河南府倉庫吏逋負芻糧緡帛四十五萬夏四月癸酉詔嶺南官除赴以時以避炎瘴辛巳皇后郭氏崩甲午詔榷酤不得增課五月丙申朔日有食之辛亥有司上大行皇后謚曰莊穆減并代戍兵屯河東以省饋運戊午幸元偁宮視疾兗州增二千戶守孔子墳閏月戊辰減劍隴等三十九州軍歲貢物夔賀等二十七州軍悉罷之己巳幸秦國長公主第省疾壬申御試制科舉人丙戌詔張齊賢等各舉供奉官侍禁殿直有謀略武幹知邊事者二人癸巳詔開封府斷獄雖被旨仍覆奏六月盛暑減京城役工日課之半丁未令翰林講讀樞密直學士各舉常參官一人充御史司天監言五星聚而伏於鶉火乙卯葬莊穆皇后秋七月丁卯莊穆皇后祔別廟庚午置靈臺令壬申增置開封府判官推官各一員甲戌宜州兵亂軍校陳進殺知州劉永規等劫判官盧成均為首詔閤門使曹利用等討之乙亥交州來貢賜黎龍廷九經及佛氏書辛巳以龍廷為靜海軍節度交阯郡王賜名至忠癸巳復置諸路提點刑獄八月壬寅幸大相國寺遂幸崇文院觀書賜修書官器幣又幸內藏庫丁未中書門下言莊穆皇后祥除已久秋宴請舉樂不允己酉頒宜州立功將士賞格益州地震辛亥賜文宣王四十六世孫聖佑同學究出身壬子邢昺加工部尚書中書門下再表請秋宴聽樂又不允丙辰涇原路言瓦亭砦地震丁巳詔王旦楊億等修太祖太宗史置龍圖閣直學士以右諫議大夫杜鎬為之丁謂上景德會計錄九月己巳賜交阯郡王印及安南旌節壬申賜畿縣聖惠方丁亥幸舒王宮視疾辛卯賜監修國史王旦宴壬辰日上有五色雲冬十月甲午朔日當食雲陰不見曹利用破賊於象州擒盧成均斬陳進優賜將士利用等進秩賜物有差乙巳頒考試進士新格祠祭置監祭使二員以御史充詔翰林學士晁迥等舉常參官可知大藩者二人丁未升象州為防禦甲寅詔宜柳象州懷遠軍死罪以下非十惡謀故鬬殺官吏犯枉法贓者並原之廣南東西路雜犯死罪以下遞減一等脅從受署者勿理蠲宜柳象州懷遠軍丁錢及夏秋租桂昭州秋租乙卯毀諸道官司非法訊囚之具十一月戊辰日南至御朝元殿受朝曹利用等言招安賊黨其饋賊食物者請追捕減死論詔釋不問十二月己亥賜近臣契丹錦綺綾縠等物癸卯廢兗州鐵冶己未甘州僧翟大秦等獻馬給其直是歲河西六谷夏州沙州大食占城蒲端國西南蕃溪峒蠻來貢雄州安肅廣信饑宛丘東阿須城縣蝗不為災諸路豐稔淮蔡間麥斗十錢粳米斛二百大中祥符元年春正月乙丑有黃帛曳左承天門南鴟尾上守門卒塗榮告有司以聞上召羣臣拜迎于朝元殿啟封號稱天書丁卯紫雲見如龍鳳覆宮殿戊辰大赦改元羣臣加恩賜京師酺幽州旱求市麥種夏州饑請易粟並許之己巳詔黎雅維茂四州官以瘴地二年一代甲戌大雪停汴口蔡河夫役戊寅蠲畿內貸糧己卯詔以天書之應申儆在位乙酉制加交阯郡王黎至忠功臣食邑二月壬辰御乾元門觀酺賜父老千五百人衣服茶綵丁酉分遣中使六人錫邊臣宴丙午申明非命服勿服銷金及不許以金銀為箔之制三月甲戌兗州父老千二百人詣闕請封禪丁卯兗州并諸路進士等八百四十人詣闕請封禪壬午文武官將校蠻夷耆壽僧道二萬四千三百七十餘人詣闕請封禪不允自是表凡五上夏四月甲午詔以十月有事于泰山遣官告天地宗廟嶽瀆諸祠乙未以知樞密院事王欽若參知政事趙安仁為泰山封禪經度制置使丙申以王旦為封禪大禮使馮拯陳堯叟分掌禮儀使庚子幸元偁宮視疾壬寅御試禮部貢舉人丙午作昭應宮戊申幸秦國長公主第省疾又幸晉國魯國長公主第並賜白金千兩綵二千匹曹濟州廣濟軍耆老二千二百人詣闕請臨幸五月壬戌王欽若言泰山醴泉出錫山蒼龍見丙子詔瘞汴蔡廣濟河流尸暴骸仍致祭丁丑幸南宮視惟能疾壬午詔緣路行宮舊屋止加塗塈毋別創癸未置天書儀衞使副扶侍使都監夾侍凡有大禮即命之詔離京至封禪以前不舉樂所經州縣勿以聲伎來迓甲申放後宮一百二十人戊子詔除乘輿供帳存於禮文者如舊自今宮禁中外進奉物勿以銷金文繡為飾六月乙未天書再降于泰山醴泉北丁酉詔宮苑皇親臣庶第宅飾以五綵及用羅製幡勝繒帛為假花者並禁之壬寅迎泰山天書於含芳園雲五色見俄黃氣如鳳駐殿上庚戌曲赦兗州繫囚流罪以下辛亥羣臣表上尊號曰崇文廣武儀天尊道寶應章感聖明仁孝皇帝秋七月庚申太白晝見丙寅詔諸州市上供物非土地所宜者罷之八月己丑上太祖尊謚曰啟運立極英武聖文神德玄功大孝皇帝太宗曰至仁應道神功聖德文武大明廣孝皇帝庚寅詔東封道路軍馬毋犯民稼開封府毋治道役民庚子置河東緣邊安撫司乙巳黔州言磨嵯洛浦蠻首領龔行滿等率族二千三百人內附己酉王欽若獻芝草八千餘本九月戊午令有司勿奏大辟案岳州進三脊茅庚申以向敏中權東京留守甲子奉天書告太廟悉陳諸州所上芝草嘉禾瑞木於仗內戊辰幸元偓宮視疾壬申知晉州齊化基坐貪暴削籍流崖州乙亥幸潛龍園宴射丁丑幸惟吉宮視疾戊寅西京諸州民以車駕東巡貢獻召對勞賜之己卯以馬知節為行宮都部署庚辰趙安仁獻五色金玉丹紫芝八千七百餘本乙酉親習封禪儀于崇德殿冬十月戊子上御蔬食庚寅以巡幸置考制度使副凡巡幸則命之是夕五星順行同色辛卯車駕發京師扶侍使奉天書先道丙申次澶州宴周瑩于行宮戊戌許鄆齊等州長吏赴泰山陪位辛丑駐蹕鄆州神光起昊天玉冊上甲辰詔扈從人毋壞民舍什器樹木丁未法駕入乾封縣奉高宮戊申王欽若等獻泰山芝草三萬八千餘本己酉五色雲起嶽頂庚戌法駕臨山門黃雲覆輦道經險峻降輦步進先夕大風至是頓息辛亥享昊天上帝於圜臺陳天書於左以太祖太宗配帝衮冕奠獻慶雲繞壇月有黃光命羣臣享五方帝諸神於山下封祀壇上下傳呼萬歲振動山谷降谷口日有冠戴黃氣紛郁壬子禪社首如封祀儀紫氣下覆黃光如星繞天書匣縱四方所獻珍禽奇獸還奉高宮日重輪五色雲見作會真宮癸丑御朝覲壇之壽昌殿受羣臣朝賀大赦天下常赦所不原者咸赦除之文武並進秩賜致仕官本品全奉一季京朝官衣緋綠十五年者改賜服色令開封府及所過州軍考送服勤詞學經明行修舉人其懷材抱器淪於下位及高年不仕德行可稱者所在以聞三班使臣經五年者與考課兩浙錢氏泉州陳氏近親蜀孟氏湖南馬氏荊南高氏廣南河東劉氏子孫未食祿者聽用賜天下酺三日改乾封縣為奉符縣泰山七里內禁樵採大宴穆清殿又宴近臣泰山父老於殿門賜父老時服茶帛甲寅復常膳次太平驛賜從官辟寒丸花茸袍丙辰次兗州以州為大都督府十一月戊午幸曲阜縣謁文宣王廟鞾袍再拜幸叔梁紇堂近臣分奠七十二弟子遂幸孔林加謚孔子曰玄聖文宣王遣官祭以太牢給近便十戶奉塋廟賜其家錢三十萬帛三百匹以四十六世孫聖佑為奉禮郎近屬授官賜出身者六人追謚齊太公曰昭烈武成王令青州立廟周文公曰文憲王曲阜縣立廟辛酉賜諸蕃使袍笏壬戌次中都縣幸廣相寺癸亥次鄆州幸開元寺丁卯賜曲阜孔子廟經史辛未幸河瀆廟加封癸酉曲宴永清軍節度使周瑩賜兵士緡錢丁丑帝至自泰山奉天書還宮壬午詔以正月三日為天慶節甲申命王旦奉上太祖太宗謚冊親享太廟乙酉大宴含光殿十二月辛卯御乾元殿受尊號庚子葛霸卒辛丑王旦加中書侍郎兼刑部尚書楚王元佐加太傅寧王元偓為護國軍節度舒王元偁為平江鎮江軍節度並兼侍中廣陵郡王元儼進封榮王安定郡公惟吉為威德軍節度餘進秩有差癸卯幸上清宮景德開寶寺王欽若加禮部尚書甲辰張齊賢為右僕射溫仲舒寇準並為戶部尚書王化基邢昺郭贄並為禮部尚書詔天下宮觀陵廟名在地志功及生民者並加崇飾戊申以德雍德文德存惟正惟忠惟惟和惟憲並領諸州刺史允升允言允成允寧允中並為各衞將軍庚戌幸元偁宮視疾又幸元偓宮辛亥交阯郡王黎至忠加同平章事壬子幸元偁宮契丹使上將軍蕭智可等來賀是歲西涼府甘州三佛齊大食國西南蕃等來賀封禪諸路言歲稔米斗七八錢二年春正月癸亥以封禪慶成賜宗室輔臣襲衣金帶器幣乙丑置內殿承制戊辰詔誘人子弟析家產或潛舉息錢輒壞墳域者令所在擒捕流配庚午詔讀非聖之書及屬辭浮靡者皆嚴譴之已鏤板文集令轉運司擇官看詳可者錄奏乙酉以陝西民饑遣使巡撫二月己丑改定入內內侍省內侍名職壬辰詔立曲阜縣孔子廟學舍乙未賜撫州高年黃泰粟帛甲辰蠲同華民租乙巳幸大相國等寺上清宮祈雨戊申遣使祠太一祀玄冥己酉雨癸丑禁毀金寶塑浮屠像甲寅以丁謂為三司使三月丙辰日當食陰晦不見辛未賜京城酺己卯左屯衞將軍允言坐稱疾不朝降太子左衞率夏四月戊子昇州火遣御史訪民疾苦蠲被火屋稅己丑餞种放還山乙未河北旱遣使祠北岳己亥以丁謂為修昭應宮使壬寅詔禁中外羣臣非休暇無得羣飲廢職詔醫官院處方幷藥賜河北避疫邊民丙午試服勤詞學經明行修國監生丁未振陝西民饑五月乙卯追封孔子弟子七十二人罷韶州獻頻婆菓丁卯遣使陝西決獄流罪以下減一等死罪情可憫者上請庚辰陝西旱遣使禱太平宮后土西嶽河瀆諸祠代州地震六月乙酉頒幕職州縣官招集戶口賞條甲午幸昭應宮賜修宮使器幣辛卯保州增屯田務兵三百人戊戌麟府言社慶族依唐龍鎮為援數擾別部請出兵襲之帝曰均吾民也不許壬寅詔量留五坊鷹鶻備諸王從時展禮餘悉縱之罷邕宜州歲貢藥箭庚戌御試東封路服勤詞學經明行修貢舉梁固等九十二人秋七月甲寅詔張齊賢等各舉才堪御史者一人丁巳置糾察在京刑獄司辛酉復以萬安宮為滋福殿己巳幸惟吉宮視疾辛未以昭應宮為玉清昭應宮乙亥蠲京東徐濟七州水災田租戊寅孔子廟配享魯史左丘明等十九人加封爵庚辰蠲天下封禪赦前逋負千二百六十六萬緡八月丙戌京東惠民河溢居民避水所過津渡戒有司勿算甲辰西南蕃龍漢來貢賀東封加漢寧德大將軍九月戊午賜秦州被水民粟人一斛壬戌合鎮定部署為一甲子浚汴口命工部侍郎馮起為契丹國信使乙丑幸潛龍園宴射甲戌遣使賜戎瀘軍民辟瘴藥乙亥無為軍言大風拔木壞城門營壘民舍壓溺者千餘人詔內臣恤視蠲來年租收瘞死者家賜米一斛丁丑發官廩振鳳州水災冬十月癸未優賞寧朔軍士戊子詔江浙運粮兵卒經冬停役兩月甲午詔天下置天慶觀甲辰兗州霖雨害稼振恤其民十一月丙辰作文武七條戒官吏甲子詔諸路官吏蠹政害民轉運使提點刑獄官不舉察者坐之癸酉蕃部阿黎等來朝貢授阿黎懷化司戈十二月辛巳詔晉國大長公主喪罷承天節上壽及明年元旦朝會交州黎至忠貢馴犀乙未幸惟吉宮視疾辛丑丁謂上封禪朝覲祥瑞圖劉承珪上天書儀仗圖甲辰幸惟吉宮視疾契丹國母蕭氏卒輟視朝是歲于闐西涼府西南蕃羅嵓州蠻來貢雄州蟲食苗即死遣使振恤三年春正月丁巳賜建安軍父老江禹錫粟帛二月乙酉丁謂請承天節禁屠宰刑罰從之癸巳交州黎至忠卒大校李公蘊自稱留後己亥禁方春射獵每歲春夏所在長吏申明之辛丑以張齊賢判河陽閏月辛亥帝御文德殿羣臣入閤甲寅冬官正韓顯符上新造銅候儀乙卯詔轉運司貸恤黎州夷人丁卯幸開封府射堂宴射賜開封府將吏器幣戊辰詔東京畿內死罪以下遞減一等將吏逮事太宗藩府者並賜予赤縣父老本府宴犒年九十者授攝官賜粟帛終身八十者爵一級甲戌以射堂為繼照堂丁丑召宰臣於宜聖殿謁太宗聖容玉皇像戊寅幸韓國長公主第視疾三月壬辰以權靜海軍留後李公蘊為靜海軍節度封交阯郡王賜衣帶器幣丙申幸石保吉第視疾辛丑詔戎瀘州給復一年艱食者振之夏四月辛亥左屯衞將軍允言坐狂率責授太子左衞副率壬子石保吉卒乙卯陝西民疫遣使齎藥賜之丁巳詔中書以五月一日進中外文武升朝官及奉使歲舉官名籍辛酉賜泰山隱士秦辨號貞素先生放還山甲子契丹國母葬廢朝禁邊城樂甲戌加王旦兵部尚書知樞密院事王欽若戶部尚書陳堯叟工部尚書五月己卯幸惟吉宮視疾壬午以西涼府覓諾族瘴疫賜藥丙戌惟吉卒辛丑京師大雨平地數尺壞廬舍民有壓死者賜布帛六月庚戌邊臣言契丹饑來市糴詔雄州糴粟二萬石振之河中府父老千餘人請祀后土不許丙辰頒天下釋奠先聖廟儀幷祭器圖詔前歲陝西民飢有鬻子者官為購贖還其家壬戌幸邢昺第視疾賜金帛乙丑幸元偁宮視疾秋七月丙申溫仲舒卒己亥以右丞向敏中為工部尚書資政殿大學士置龍圖閣學士以直學士杜鎬為之詔南宮北宅大將軍以下各勤講肄諸子十歲以上並受經學書勿令廢惰辛丑文武官將校等三上表請祠汾陰后土八月丁未朔詔明年春有事于汾陰州府長吏勿以修貢助祭煩民戊申陳堯叟為祀汾陰經度制置使己酉王旦為祀汾陰大禮使王欽若為禮儀使庚戌詔汾陰路禁弋獵不得侵占民田如東封之制辛亥以江南旱詔轉運使決獄壬子幸元偁宮視疾昇洪潤州屢火遣使存撫祠境內山川戊午賜占城國主馬及器甲庚申幸天駟監賜從官馬解州池鹽不種自生辛酉給鄆州牧馬草地還民甲子罷江淮和糴所在繫囚遞減一等盜穀食者量行論決丁卯羣臣五表上尊號不許戊辰詔昇洪揚廬州長吏兼安撫使甲戌以澄州團練使朱能為左龍武軍大將軍乙亥河中府父老千七百人來迎上勞問之賜以緡帛九月癸未賜錢三十萬給故盧多遜子葬其父母丁亥作宗室座右銘賜諸王華州言父老二千餘人請幸西嶽癸巳杖殺人內高品江守恩於鄭州知州俞獻卿坐論救削一任乙未幸崇真資聖院視吳國長公主疾甲辰內出綏撫十六條頒江淮南安撫使冬十月辛亥契丹使耶律寧告征高麗河中民獲靈寶真文庚申丁謂等上大中祥符封禪記十一月庚寅遣內臣奉安宣祖大祖聖容於二陵乙未甘州回鶻來貢己亥幸太一宮陝州黃河清十二月陝州黃河再清庚戌集賢校理晏殊獻河清頌癸丑詔天下貧民及漁採者過津渡勿算乙卯告太廟詔自今謁廟入東偏門以資政殿大學士向敏中權東京留守丁巳翰林學士李宗諤等上諸道圖經辛酉謁玉清昭應宮丙寅詔沙門島流人特給口糧己巳作奉天庇民述示宰相禁扈從人燔道路草木辛未以太宗御書賜交州李公蘊是歲龜茲占城交州來貢陝西飢江淮南旱
