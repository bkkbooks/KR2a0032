body:
  text: 宋史卷十六本紀第十六神宗三三年春正月乙丑朔以大行太皇太后在殯不視朝癸酉升許州為潁昌府丙子降潁昌囚罪一等徒以下釋之戊寅上太皇太后諡曰慈聖光獻戊子詔審刑院邢部斷議官失入者歲具數罰之己丑高麗國遣使來貢白虹貫日辛卯于闐國大首領阿令顛顙溫等來貢癸巳白虹貫日二月丙午以翰林學士章惇參知政事丙辰始御崇政殿視朝丁巳命輔臣禱雨三月乙丑工部侍郎同平章事吳充罷為觀文殿大學士西太一宮使癸酉葬慈聖光獻皇后于永昭陵丙子南丹州入貢以刺史印賜之乙酉祔慈聖光獻皇后神主于太廟戊子降兩京河陽囚罪一等民緣山陵役者蠲其賦己丑以慈聖光獻皇后弟昭德軍節度使曹佾為司徒兼中書令改護國軍節度使餘親屬加恩有差夏四月乙未觀文殿大學士吳充薨丁酉封宗暉為濮陽郡王濮安懿王子孫皆進官一等己亥遼遣耶律永芳等來賀同天節乙巳以瀘州夷乞弟侵擾詔邊將討之戊申乞弟寇戎州兵官王宣等戰歿甲寅罷羣牧行司復置提舉買馬監牧司乙卯令御史分案諸路監司庚申詔御史臺六察以糾劾多寡為殿最任滿取旨升黜辛酉增國子監歲賜錢六千緡五月乙丑詔自今三伏內五日一御前殿辛巳以潁昌進士劉堂上制盜十策授徐州蕭縣尉甲申復命韓存寶經制瀘夷詔改都大提舉導洛通汴司為都提舉汴河堤岸司是月青州臨朐益都石化為六月甲午日有五色雲戊戌詔省宗室教授存十三員丙午詔中書詳定官制罷兵部勾當公事官詔河北河東陝西路各選文武官一員提舉義勇保甲壬子詔罷中書門下省主判官歸其事於中書是月安州臨江軍産芝及連理麥秋七月庚午河決澶州甲戌詔自今遇大禮罷上尊號癸未彗出太微垣丙戌避殿減膳詔求直言丁亥罷羣神從祀明堂戊子太白晝見八月乙巳罷省寺監官領空名者癸丑遣王存等賀遼主生辰正旦戊午彗不見九月壬戌增宣祖定州東安墳地二十頃及守園戶丙寅御殿復膳乙亥正官名以開府儀同三司易中書令侍中同平章事特進易左右僕射自是以下至承務郎易祕書省校書郎正字將作監主簿有差檢校僕射以下及階散憲銜並罷詳在職官志辛巳大饗明堂以英宗配赦天下癸未薛向孫固並為樞密副使乙酉詔即景靈宮作十一殿以時王禮祠祖宗以王安石為特進改封荊國公丙戌進封岐王皓為雍王嘉王頵為曹王並為司空文彥博為太尉封曹佾為濟陽郡王宗旦為華陰郡王馮京為樞密使薛向罷知潁州丁亥以呂公著為樞密副使閏九月乙卯加文彥博河東永興軍節度使以富弼為司徒十一月己丑朔日當食雲陰不見十二月甲辰遼遣蕭偉等來賀正旦四年春正月乙未命步軍都虞候林廣代韓存寶經制瀘夷庚子詔試進士加律義辛亥于闐來貢馮京罷知河陽孫固知樞密院龍圖閣直學士韓縝同知樞密院事二月辛未置秦州鑄錢監己卯分東南團結諸軍為十三將三月乙未詔在京官毋舉辟執政有服親癸卯章惇罷知蔡州甲辰以翰林學士張璪參知政事乙巳命官閲九軍營陳法於京城南戊申大閲丙辰董遣使來貢夏四月癸亥遼遣耶律祐等來賀同天節御延和殿閲試保甲己巳詔罷南郊合祭天地自今親祀北郊如南郊儀有故不行則以上公攝事壬申慮囚山陰縣主簿余行之謀反伏誅乙酉河決澶州小吳掃五月丁酉詔河東路提點刑獄劉定專振被水民戊申封晉程嬰為成信侯公孫杵臼為忠智侯立廟于絳州六月戊午河北諸郡蝗生癸未命提點開封府界諸縣公事楊景略提舉開封府界常平等事王得臣督諸縣捕蝗秋七月己丑太白晝見庚寅西邊守臣言夏人囚其主秉常詔陝西河東路討之甲午鄜延涇原環慶熙河麟府路各賜金銀帶綿襖銀器鞍轡象笏甲辰韓存寶坐逗留無功伏誅丁未大軍進攻米脂寨己酉詔曾鞏充史館修撰專典史事詔內外官司舉官悉罷令大理卿崔台符同尚書吏部審官東西三班院議選格八月乙卯朔罷中書堂選悉歸有司丙辰詔蠲河北東路災傷州軍今年夏料役錢辛酉夏人寇臨川堡詔董會兵伐之以金州刺史燕達為武康軍節度使己巳復置滑州丁丑熙河經制李憲敗夏人于西市新城獲酋首三人首領二十餘人庚辰又襲破于女遮谷斬獲甚衆辛巳司馬光趙彥若上所修百官公卿年表十卷宗室世表三卷九月乙酉董遣使來貢且言已遣首領洛施軍篤喬阿公等將兵三萬會擊夏國李憲復蘭州古城戊子蘭州新順首領巴令謁等三族率所部兵攻夏人撒逋宗城敗之己亥王圭上國朝會要壬寅閲河北保甲于崇政殿官其優者三十六人甲辰詳定郊廟奉祀禮儀丙午詔諭夏主左右並嵬名部族諸部首領並許自歸戊申太白犯斗庚戌夏兵救米脂寨鄜延經略副使种諤率衆擊破之辛亥种諤又敗夏人于無定川十月丁巳米脂寨降己未拂菻國來貢庚申熙河兵至女遮谷與夏人遇戰敗之乙丑涇原兵至磨哆隘遇夏人與其統軍梁大王戰敗之追奔二十里斬大首領沒囉臥沙監軍使梁格嵬等十五級獲首領統軍姪訖多埋等二十二人己巳入銀州庚午環慶行營經略使高遵裕復清遠軍种諤遣曲珍等領兵通黑水安定堡路遇夏人與戰破之斬獲甚衆癸酉復韋州乙亥李憲敗夏人于屈吳山丁丑曲珍與夏人戰于蒲桃山敗之戊寅种諤入夏州詔諸將存撫降人辛巳史館修撰曾鞏乞收采名臣高士事迹遺文詔從之涇原節制王中正入宥州十一月癸未朔日有食之丁亥諸軍合攻靈州种諤敗夏人于黑水己丑李憲敗夏人于囉逋川辛卯种諤降橫河平人戶破石堡城斬獲甚衆辛丑師還癸卯种諤至夏州索家平兵衆三萬人以無食而潰丙午高遵裕以師還夏人來追遂潰十二月辛未林廣破乞弟于納江乙亥慈聖光獻皇后禫祭宰臣王圭等上表請聽樂不許自是五表乃從之戊寅遼遣蕭福全等來賀正旦五年春正月癸未朔不受朝丙申御宣德門觀燈己亥白虹貫日庚子責授高遵裕郢州團練副使本州安置乙巳作新渾儀浮漏辛亥詔再議西討以熙河經制李憲為涇原熙河蘭會安撫制置使李浩權安撫副使二月癸丑朔頒三省樞密六曹條制詔鄜延軍士病不能歸者賜其家絹十匹丙辰以乞弟平班師辛酉詔董首領結鄰死其朝辭物給其子董訥支藺增賜絹百匹癸亥華陰郡王宗旦薨丁卯封武昌軍節度觀察留後宗惠為江夏郡王癸酉以出師赦梓州路減囚罪一等民緣軍事役者蠲其賦封董為武威郡王丙子渤泥來貢三月壬辰親策進士甲午策武舉己亥以日當食避殿減膳赦天下降死罪一等流以下原之詔杭州歲修吳越王墳廟壬寅鄜延路副總管曲珍敗夏人于金湯乙巳賜進士諸科出身千四百二十八人丙午雨土夏四月壬子朔日食不見甲寅御殿復膳丁巳遼遣耶律永端等來賀同天節己未沈括奏遣曲珍將兵綏德城應援討葭蘆寨左右見聚羌落詔從之乙丑以直龍圖閣徐禧知制誥權御史中丞癸酉官制成以王圭為尚書左僕射兼門下侍郎蔡確為尚書右僕射兼中書侍郎甲戌太中大夫章惇為門下侍郎張璪為中書侍郎翰林學士蒲宗孟為尚書左丞翰林學士王安禮為尚書右丞録唐段秀實後復其家丁丑同知樞密院呂公著罷知定州五月辛巳朔行官制丁亥賞平蠻將士有差癸巳豐州卒張世矩等作亂伏誅其黨王安以母老詔特原之作尚書省戊戌詔兩省官人舉可任御史者各二人甲辰遣給事中徐禧治鄜延邊事六月辛亥朔環慶經略司遣將與夏人戰破之斬其統軍嵬名妹精嵬副統軍訛勃遇甲寅王圭上兩朝史戊午詔修兩朝寶訓詔以成都路供給瀘州邊事曲赦免二稅甲子改翰林醫官院為醫官局壬申交址獻馴犀二癸酉豫章郡王宗諤薨戊寅曲珍等敗夏人于明堂川作天源河秋七月辛巳廣西經略司言知宜州王奇與賊戰敗績壬午詔罷大理寺官赴中書省讞案戊子詔御史中丞舒亶舉任言事或察官十人辛卯詔尚書考功員外郎蔡京編手詔庚子以蔡京為起居郎仍同詳定官制丁未垂拱殿宴修史官己酉始建雩壇祀上帝以太宗配八月庚戌朔封御侍武氏為才人壬子進封均國公傭為延安郡王以昭容朱氏為賢妃庚申帝有疾詔歲以四孟月朝獻景靈宮辛未遣韓忠彥等賀遼主生辰正旦鳳州團練使种諤以行軍迂道降授文州刺史壬申詔罷增減幕職州縣官奉甲戌城永樂戊寅河決原武九月丁亥夏人三十萬衆寇永樂曲珍戰不利裨將寇偉等死之夏人遂圍城己丑帝以疾愈降京畿囚罪一等徒以下釋之壬辰遣使行視畿縣民被水患者乙未詔張世矩等將兵救永樂寨戊戌永樂陷給事中徐禧內侍李舜舉陝西轉運判官李稷死之己亥詔客省引進四方館東西上閣門各置使副等職庚子安化蠻寇宜州知州王奇死之詔贈忠州防禦使辛丑賞董將士有差癸卯滑州河水溢冬十月辛亥洛口廣武大河溢甲寅知延州沈括以措置乖方責授均州團練副使隨州安置鄜延路副都總管曲珍以城陷敗走降授皇城使丙辰修定景靈宮儀乙丑詔贈永樂死事臣徐禧金紫光祿大夫吏部尚書李舜舉昭化軍節度使並賜諡忠愍李稷朝奉大夫工部侍郎入內高品張禹勤皇城使各推恩賜贈有差癸酉貶知太原府資政殿大學士呂惠卿知單州十一月戊寅朔罷御史察諸路壬午景靈宮成告遷祖宗神御癸未初行酌獻禮乙酉以奉安神御赦天下官與享大臣子若孫一人庚寅紫宸殿宴侍祠官十二月丁巳新樂成以賢妃周氏為德妃辛酉塞原武決河丙寅休日御延和殿引進對官十人辛未西南龍蕃來貢壬申遼遣耶律儀等來賀正旦丙子録永樂死事將皇城使寇偉等十三人及東上閣門副使景思誼等九十人贈賜有差六年春正月丁丑朔御大慶殿受朝始用新樂儀鸞司徹幕屋壞毀玉輅甲申白虹貫日丁亥朝獻景靈宮己丑層檀入貢庚寅御宣德門觀燈癸巳詔御史六察罷上下半年更易法乙未詔修周漢以來陵廟乙巳御崇政殿閲武士丙午封楚三閭大夫屈平為忠潔侯二月丁未夏人數十萬衆攻蘭州鈐轄王文郁率死士七百餘人擊走之丙辰以夏人犯蘭州貶熙河經略使李憲為經略安撫都總管以王文郁為西上閣門使知蘭州副使李浩為四方館使甲子詔供備庫使高遵治西京左藏庫副使張壽各降一官三月辛卯夏人寇蘭州副總管李浩以衛城有功復隴州團練使乙未休日御延和殿引進對官八人丙申河東將薛義敗夏人于葭蘆西嶺戊戌以檢校太尉上柱國太原郡開國公王拱辰為武安軍節度使麟府州將郭忠詔等敗夏人于乜離抑部詔行賞有差己亥河東將高永翼敗夏人于真卿流部夏四月己酉朝獻景靈宮辛亥遼遣蕭固等來賀同天節甲子禮部郎中林希上兩朝寶訓李浩敗夏人于巴義溪辛未雨土壬申御邇英閣蔡卞進講周禮五月丙子朔于闐入貢甲申以時暑趣決開封大理獄庚寅以旱慮囚甲午夏人寇蘭州右侍禁韋定死之癸卯詔賜資州孝子支漸粟帛是月夏人寇麟州知州訾虎敗之六月乙巳朔詔御史臺六察各置御史一員癸丑詔御史中丞兩省官各舉可任言事或監察御史五人閏月乙亥朔夏主秉常請修貢許之戊寅詔陝西河東毋輒出兵丙戌詔內外文武各舉應武舉一人汴水溢丙申太師守司徒韓國公富弼薨諡文忠秋七月乙卯祔孝惠孝章淑德章懷皇后于廟丙辰以四后祔廟降京畿囚罪一等流以下原之孫固罷知河陽以同知樞密院韓縝知樞密院戶部尚書安燾同知樞密院戊午朝獻景靈宮八月丙子賜升祔陪祠官宴于尚書省己卯太白晝見乙酉遣蔡京等賀遼主生辰正旦辛卯蒲宗孟罷王安禮為尚書左丞吏部尚書李清臣為尚書右丞九月癸卯朔日有食之冬十月癸酉朔秉常遣使上表請復修職貢乞還舊疆戊子封孟軻為鄒國公癸巳會稽郡王世清薨庚子尚書省成辛丑封馬援為忠顯王十一月癸卯加上仁宗諡曰體天法道極功全德神文聖武睿哲明孝皇帝英宗曰體乾應曆隆功盛德憲文肅武睿神宣孝皇帝甲辰朝獻景靈宮乙巳朝享太廟丙午祀昊天上帝于圜丘赦天下甲寅文彥博以太師致仕乙卯以觀文殿大學士韓絳為建雄軍節度使庚申幸尚書省官執政五服內未仕者一人進尚書以下官一等七年春正月丙午封洺州防禦使世準為安定郡王癸丑夏人寇蘭州李憲等擊走之甲寅以賢妃朱氏為德妃二月甲戌太師文彥博入覲置酒垂拱殿癸未進封濮陽郡王宗暉為嗣濮王封宗晟為高密郡王宗綽為建安郡王宗隱為安康郡王宗瑗為漢東郡王宗愈為華原郡王三月辛丑賜文彥博宴于瓊林苑帝製詩以賜之庚申御崇政殿大閲壬戌詔賜鬼章寫經紙還其所獻馬癸亥白虹貫日夏四月辛未大食國來貢乙亥遼遣蕭浹等來賀同天節丁丑賜饒州童子朱天錫五經出身丙戌景靈宮天元殿門生芝草六本壬辰朝獻景靈宮癸巳夏人寇延州安塞堡將官呂真敗之五月壬子慮囚降死罪一等杖以下釋之辛酉白虹貫日壬戌以孟軻配食文宣王封荀況楊雄韓愈為伯並從祀詔諸路帥臣監司等舉大使臣為將領六月丙子夏人寇德順軍巡檢王友死之辛卯江夏郡王宗惠薨秋七月甲辰伊洛溢河決元城丙午遣使振恤賜溺死者家錢壬子朝獻景靈宮甲寅王安禮罷八月庚午詔王光祖遣人招諭乞弟許出降免罪補官是歲乞弟死辛巳遣陳睦等賀遼主生辰正旦九月壬寅西南龍蕃來貢乙巳三佛齊來貢乙丑夏人圍定西城熙河將秦貴敗之冬十月乙亥夏人寇熙河庚辰饒州童子朱天申對于睿思殿賜五經出身辛巳朝獻景靈宮戊子詔分畫交址界以六縣二峒賜之乙未夏人寇靜邊寨涇原將彭孫敗之十一月丁酉朔寇清邊寨隊將白玉李貴死之甲辰夏國主秉常遣使來貢乙卯太白晝見十二月戊辰端明殿學士司馬光上資治通鑑以光為資政殿學士降詔奬諭庚寅詔門下中書外省官同舉言事御史辛卯遼遣耶律襄等來賀正旦是歲河東饑河北水壞洺州廬舍蠲其稅八年春正月戊戌帝不豫甲辰赦天下乙巳命輔臣代禱景靈宮乙卯分遣羣臣禱于天地宗廟社稷二月辛巳開寶寺貢院火丁亥命禮部鎖試別所癸巳上疾甚遷御福寧殿三省樞密院入見請立皇太子及請皇太后權同聽政許之三月甲午朔立延安郡王傭為皇太子賜名煦皇太后權同處分軍國事乙未赦天下遣官告于天地宗廟社稷諸陵丁酉皇太后命吏部尚書曾孝寬為冊立皇太子禮儀使戊戌上崩于福寧殿年三十有八皇太子即皇帝位尊皇太后為太皇太后皇后為皇太后德妃朱氏為皇太妃太皇太后權同處分軍國事九月己亥上大行皇帝諡曰英文烈武聖孝皇帝廟號神宗十月乙酉葬于永裕陵贊曰帝天性孝友其入事兩宮必侍立終日雖寒暑不變嘗與岐嘉二王讀書東宮侍講王陶講論經史輒相率拜之由是中外翕然稱賢其即位也小心謙抑敬畏輔相求直言察民隱恤孤獨養耆老振匱乏不治宮室不事遊幸厲精圖治將大有為未幾王安石入相安石為人悻悻自信知祖宗志吞幽薊靈武而數敗兵帝奮然將雪數世之恥未有所當遂以偏見曲學起而乘之青苗保甲均輸市易水利之法既立而天下洶洶騷動慟哭流涕者接踵而至帝終不覺悟方斷然廢逐元老擯斥諫士行之不疑卒致祖宗之良法美意變壞幾盡自是邪佞日進人心日離禍亂日起惜哉
