body:
  text: 宋史卷一百九十二志第一百四十五兵六鄉兵三保甲建炎後鄉兵建炎後寨兵保甲熙寧初王安石變募兵而行保甲帝從其議三年始聯比其民以相保任乃詔畿內之民十家為一保選主戶有幹力者一人為保長五十家為一大保選一人為大保長十大保為一都保選為衆所服者為都保正又以一人為之副應主客戶兩丁以上選一人為保丁附保兩丁以上有餘丁而壯勇者亦附之內家資最厚材勇過人者亦充保丁兵器非禁者聽習每一大保夜輪五人警盜凡告捕所獲以賞格從事同保犯強盜殺人放火強姦略人傳習妖教造畜蠱毒知而不告依律伍保法餘事非干己又非敕律所聽糾皆毋得告雖知情亦不坐若於法鄰保合坐罪者乃坐之其居停強盜三人經三日保鄰雖不知情科失覺罪逃移死絶同保不及五家併他保有自外入保者收為同保戶數足則附之俟及十家則別為保置牌以書其戶數姓名既行之畿甸遂推之五路以達于天下時則以捕盜賊相保任而未肄以武事也四年始詔畿內保丁肄習武事歲農隙所隸官期日於要便鄉村都試騎步射並以射中親疏遠近為等騎射校其用馬有餘藝而願試者聽第一等保明以聞天子親閲試之命以官使第二等免當年春夫一月馬藁四十役錢二千本戶無可免或所免不及聽移免他戶而受其直第三第四等視此有差藝未精願候閲試或附甲單丁願就閲試者並聽都副保正武藝雖不及等而能整齊保戶無擾勸誘丁壯習藝及等捕盜比他保最多弭盜比他保最少所隸官以聞其恩視第一等焉都副保正有闕選大保長充都副保正雖勸誘丁壯習藝而輒彊率妨務者禁之吏因保甲事受賕斂掠加乞取監臨三等杖徒編管配隸告者次第賞之命官犯者除名時雖使之習武技而未番上也五年右正言知制誥判司農寺曾布言近日保戶數以狀詣縣願分番隸巡檢司習武技提點司以聞朝廷及司農寺未敢輒議願下提點司送中書詳審付司農具為令於是詔主戶保丁願上番於巡檢司十日一更疾故者次番代之月給口糧薪菜錢分番巡警每五十人輪大保長二都副保正一統領之都副保正月各給錢七千大保長三千當番者毋得輒離本所捕逐劇盜雖下番人亦聽追集給其錢斛事訖遣還毋過上番人數仍折除其上番日巡檢司量留廂界給使餘兵悉罷應番保丁武技及第三等已上並記于籍遇歲凶五分已上者第振之自十五石至三石為差十一月又詔尉司上番保丁如巡檢司法六年詔開封府畿以都保置木契左留司農寺右付其縣凡追胥閲試肄習則出契是月又詔行於永興秦鳳河北東西河東五路唯毋上番餘路止相保任毋習武藝內荊湖川廣並邊者可肄武事令監司度之後惟全邵土丁雍欽洞丁廣東槍手改為保甲者則肄焉十二月乃罷河北西路強壯緣邊弓箭社係籍番上巡守者初開封府畿五路保甲及五萬人二年一解發詣京師閲試命官開封府畿十人五路七人八年詔開封府畿及一萬人五路及一萬五千人各許解發一人九年樞密院請自今都副保正義勇軍校二年一比選縣考其訓習武藝及等最多捕察而盜賊最少者上于州州上所轄官司同比較以聞或中選人多則擇武藝最優者額外尚有可解發者則第其次為之旌勸第一次州縣籍記姓名犯杖以下聽贖第二次以等第賜杖子紫衫銀帶犯徒罪情輕奏裁纍及三次者降宣補之給馬及芻菽五路義勇軍校二千解發毋得過三人保甲都副保正之解發者亦以二年府界六人河北河東各四人永興秦鳳等路七人都保正指揮使與下班殿侍副保正副指揮使與三司軍將正副都頭與守闕軍將並賜衣及銀帶銀裹頭杖給馬有差初保甲隸司農熙寧八年改隸兵部增同判一主簿二幹當公事官十分按諸州其政令則聽于樞密院十年樞密院副都承旨張誠一上五路義勇保甲敕元豐元年翰林學士權判尚書兵部許將修開封府界保甲敕成書上之詔皆頒焉二年十一月始立府界集教大保長法以昭宣使入內內侍省副都知王中正東上閣門使狄咨兼提舉府界教保甲大保長總二十二縣為教場十一所大保長凡二千八百二十五人每十人一色事藝置教頭一凡禁軍教頭二百七十都教頭三十使臣十弓以八斗九斗一石為三等弩以二石四斗二石七斗三石為三等馬射九斗八斗為二等其材力超拔者為出等當教時月給錢三千日給食官豫戎械戰袍又具銀楪酒醪以為賞犒三年大保長藝成乃立團教法以大保長為教頭教保丁焉凡一都保相近者分為五團即本團都副保正所居空地聚教之以大保長藝成者十人衮教五日一周之五分其丁以其一為騎二為弓三為弩府界法成乃推之三路各置文武官一人提舉河北則狄咨劉定陝西則張山甫河東則黃廉王崇拯以封樁養贍義勇保甲錢糧給其費是歲引府界保甲武藝成帝親閲録用能者餘賜金帛四年改五路義勇為保甲狄咨劉定部領澶州集教大保長四百八十二人見於崇政殿召執政賜坐閲試補三班借職差使借差凡三十六人餘賜金帛有差遷咨四方館使定集賢校理又詔曰三路見訓民兵非久什長藝成須便行府界團教之錢糧官吏並如畿縣未知及期能辦與不若更稽延月日必致有誤措置大法可令承旨取索會校之其年府界河北河東陝西路會校保甲都保凡三千二百六十六正長壯丁凡六十九萬一千九百四十五歲省舊費緡錢一百六十六萬一千四百八十三歲費緡錢三十一萬三千一百六十六而團教之賞為錢一百萬有奇不與焉凡集教團教成歲遣使則謂之提舉按閲率以近臣挾內侍往給賞錢按格令從事諸路皆以番次藝成者為序率五六歲一遍獨河東以金帛不足乃至十一歲上以晉人勇悍介遼夏間講勸宜不可後詔賜緡錢十五萬時繫籍義勇保甲及民兵凡七百一十八萬二千二十八人云熙寧九年之數保甲立法之初故老大臣皆以為不便而安石主議甚力帝卒從之今悉著其論難使來者考焉帝嘗論租庸調法而善之安石對曰此法近井田後世立事粗得先王遺意則無不善今亦無不可為顧難速成爾及帝再問則曰人主誠能知天下利害以其所謂害者制法而加於兼併之人則人自不敢保過限之田以其所謂利者制法而加於力耕之人則人自勸於力耕而授田不能過限然此須漸乃能成法使人主誠知利害之權因以好惡加之則所好何患人之不從所惡何患人之不避若人主無道以揆之則多為異議所奪雖有善法何由立哉帝謂府兵與租庸調法相須安石則曰今義勇土軍上番供役既有廩給則無貧富皆可以入衛出戍雖無租庸調法亦自可為第義勇皆良民當以禮義奬養今皆倒置者以其手背也教閲而縻費也使之運糧也三者皆人所不樂若更驅之就敵使被殺戮尤人所憚也馮京曰義勇亦有以挽彊得試推恩者安石曰挽彊而力有不足則絶於進取是朝廷有推恩之濫初非勸奬使人趨武事也今欲措置義勇皆當反此使害在於不為義勇而利在於為義勇則俗可變而衆技可成臣願擇鄉閭豪傑以為將校稍加奬拔則人自悅服矧今募兵為宿衛及有積官至刺史以上者移此與彼固無不可况不至如此費官祿已足使人樂為哉陛下誠能審擇近臣皆有政事之材則異時可使分將此等軍矣今募兵出於無賴之人尚可為軍廂主則近臣以上豈不及此輩此乃先王成法社稷之長計也帝以為然時有欲以義勇代正兵者曾公亮以為置義勇弓手漸可以省正兵安石曰誠然第今江淮置新弓手適足以傷農富弼亦論京西弓手非便安石曰揆文教奮武衛先王所以待遠邇者固不同今處置江淮與三邊事當有異帝又言節財用安石對以減兵最急帝曰比慶曆數已甚減矣因舉河北陝西兵數慮募兵太少又訓擇不精緩急或闕事安石則曰精訓諫募兵而鼓舞三路之民習兵則兵可省臣屢言河北舊為武人割據內抗朝廷外敵四鄰亦有禦奚契丹者兵儲不外求而足今河北戶口蕃息又舉天下財物奉之常若不足以當一面之敵其施設乃不如武人割據時則三路事有當講畫者在專用其民而已帝又言邊兵不足以守徒費衣廩然固邊圉又不可悉減安石曰今更減兵即誠無以待急緩不減則費財困國無已時臣以謂儻不能理兵稍復古制則中國無富彊之理帝曰唐都長安府兵多在關中則為彊本今都關東而府兵盛則京師反不足待四方安石曰府兵在處可為又可令入衛則不患本不彊韓絳呂公弼皆以入衛為難文彥博曰如曹濮人專為盜賊豈宜使入衛安石曰曹濮人豈無應募皆暴猾無賴之人尚不以為虞義勇皆良民又以物力戶為將校豈當復以為可虞也陳升之欲令義勇以漸戍近州安石曰陛下若欲去數百年募兵之敝則宜果斷詳立法制令本末備具不然無補也帝曰制而用之在法當預立條制以漸推行彥博等又以為土兵難使千里出戍安石曰前代征流求討党項豈非府兵乎帝曰募兵專於戰守故可恃至民兵則兵農之業相半可恃以戰守乎安石曰唐以前未有黥兵然亦可以戰守臣以謂募兵與民兵無異顧所用將帥如何爾將帥非難求但人主能察見羣臣情僞善駕御之則人材出而為用不患無將帥有將帥則不患民兵不為用矣帝曰經遠之策必至什伍其民費省而兵衆且與募兵相為用矣安石對曰欲公私財用不匱為宗社長久計募兵之法誠當變革帝曰密院以為必有建中之變安石對曰陛下躬行德義憂勤政事上下不蔽必無此理建中所以致變德宗用盧嵵之徒而疏陸贄其不亡者幸也時開封鞫保戶有質衣而買弓箭者帝恐其貧乏艱於出備安石曰民貧宜有之抑民使置弓箭則法所弗去也往者冬閲及巡檢番上唯就用在官弓矢不知百姓何故至於質衣也然自生民以來兵農為一耒耜以養生弓矢以免死皆凡民所宜自具未有造耒耜弓矢以給百姓者也然則雖使百姓置弓矢亦不為過第陛下優恤百姓甚至故今立法一聽民便爾且府界素多羣盜攻草疏殺掠一歲之間至二百火逐火皆有賞錢備賞之人即今保丁也方其備賞之時豈無賣易衣服以納官賞者然人皆以謂賞錢宜出於百姓夫出錢之多不足以止盜而保甲之能止盜其效已見則雖令民出少錢以置器械未有損也帝曰賞錢人所習慣則安之如自然不習慣則不能無怨如河決壞民産民不怨決河以壞民産則怨矣帝嘗批陳留縣所行保甲每十人一小保中三人或五人須要弓箭縣吏督責無者有刑百姓買一弓至千五百十箭至六七百當青黃不接之際貧下客丁安能出辦又每一小保用民力築射𣛀又自辦錢糧起鋪屋每保置鼓遇賊聲擊民居遠近不一甲家遭賊鼓在乙家則無緣聲擊如此須人置一鼓費錢不少可速指揮令止如元議團保覺察盜賊餘無得施行鄉民既憂無錢買弓箭加以傳惑徙之戍邊是以父子聚首號泣者非虛也安石進呈不行帝謂安石保甲誠有斬指者此事宜緩而密安石曰日力可惜帝曰然亦不可遽恐卻沮事安石曰此事自不敢不密權知開封府韓維等言諸縣團結保甲鄉民驚擾祥符等縣已畢其餘縣乞候農間排定時府界諸縣鄉民或自殘傷以避團結安石辨說甚力時曾孝寬為府界提點榜募告捕扇惑保甲者雖甚嚴有匿名書封丘郭門者於是詔重賞捕之安石曰乃者保甲人得其願上番狀然後使之宜於人情無所驚疑且今居藏盜賊及為盜賊之人固不便新法陛下觀長社一縣捕獲府界劇賊為保甲迫逐出外者至三十人此曹既不容京畿又見捕於輔郡其計無聊專務扇惑比聞為首扇惑者已就捕然至京師亦止有二十許人以十七縣十數萬家而被扇惑者才二十許人不可謂多自古作事未有不以勢率衆而能令上下如一者今聯十數萬人為保甲又待其應募乃使之番上比乃以陛下矜恤之至令保甲番上捕盜若任其自去來即孰肯聽命若以法驅之又非人所願且為天下者如止欲任民情所願而已則何必立君而為之張官置吏也今輔郡保甲宜先遣官諭上旨後以法推行之帝曰然一日帝謂安石曰曾孝寬言民有斬指訴保甲者安石曰此事得於蔡駰趙子幾使駰驗問乃民因斫木誤斬指參證者數人大抵保甲法上自執政大臣中則兩制下則盜賊及停藏之人皆所不欲然臣召鄉人問之皆以為便則雖有斬指以避丁者不皆然也況保甲非特除盜固可漸習為兵既人皆能射又為旗鼓變其耳目且約以免稅上番代巡檢兵又自正長而上能捕賊者奬之以官則人競勸然後使與募兵相參則可以銷募兵驕志且省財費此宗社長久之計帝謂什伍百姓如保甲恐難成不如便團結成指揮以使臣管轄安石曰陛下誠能果斷不恤人言即便團結指揮亦無所妨然指揮是虛名五百人為一保緩急可喚集雖不名為指揮與指揮使無異乃是實事幸不至大急即免令人駭擾而事集為上策帝遂變三路義勇如府畿保甲法馮京曰義勇已有指揮使指揮使即其鄉里豪傑今復作保甲令何人為大保長安石曰古者民居則為鄉五家為比比有長及用兵即五人為伍伍有伍司馬二十五家為閭閭有閭胥二十五人為兩兩有兩司馬兩司馬即閭胥伍司馬即比長第隨事異名而已此乃三代六鄉六軍之遺法其法見於書自夏以來至周不改秦雖決裂阡陌然什伍之尚如古制此所以兵衆而強也征伐唯府兵為近之今舍已然之成憲而乃守五代亂亡之餘法其不足以致安強無疑然人皆恬然不以因循為可憂者所見淺近也安石又奏義勇須三丁以上請如府界兩丁以上盡籍之三丁即出戍誘以厚利而兩丁即止令於巡檢上番如府界法大略不過如此當遣人與經略轉運司及諸州長吏議之及訪本路民情所苦所欲因以寓法帝曰河東修義勇強壯法又令團集保甲如何安石對曰義勇須隱括丁數若因團集保甲即一動而兩業就今既遣官隱括義勇又別遣官團結保甲即分為兩事恐民不能無擾或曰保甲不可代正軍上番否安石曰俟其習熟然後上番然東兵技藝亦弗能優於義勇保甲臣觀廣勇虎翼兵固然今為募兵者大抵皆偷惰頑猾不能自振之人為農者皆朴力一心聽令之人則緩急莫如民兵可用馮京曰太祖征伐天下豈用農兵安石曰太祖時接五代百姓困極豪傑多以從軍為利今百姓安業樂生而軍中不復有如嚮時拔起為公侯者即豪傑不復在軍而應募者大抵皆偷惰不能自振之人爾帝曰兵之強弱在人五代兵弱至世宗而強安石曰世宗所收亦皆天下亡命強梁之人文彥博曰以道佐人主者不以兵強天下安石曰以兵強天下者非道也然有道者固能柔能剛能弱能強方其能剛強必不至柔弱張皇六師固先王之所尚也但不當專務兵強爾帝卒從安石議帝曰保甲義勇芻糧之費當預為之計安石曰當減募兵之費以供之所供保甲之費才養兵十之一二帝曰畿內募兵之數已減於舊強本之勢未可悉減安石曰既有保甲代其役即不須募兵今京師募兵逃死停放一季乃數千但勿招填即為可減然今廂軍既少禁兵亦不多臣願早訓練民兵民兵成則募兵當減矣又為上言今河北義勇雖十八萬然所可奬慰者不過酋豪百數十人而已此府兵之遺意也帝以為然令議其法樞密院傳上旨以府界保甲十日一番慮大促無以精武事其以一月為一番安石奏曰今保甲十日一番計一年餘八月當番若須一月即番愈疏又昨與百姓約十日一番今遽改命恐愈為人扇惑宜俟其習熟徐議其更番且今保甲閲藝八等勸奬至優人競私習不必上番然後就學臣愚願以數年其藝非特勝義勇當必勝正兵正兵技藝取應官法而已非若保甲人人有勸心也元豐八年哲宗嗣位知陳州司馬光上疏乞罷保甲曰兵出民間雖云古法然古者八百家才出甲士三人步卒七十二人間民甚多三時務農一時講武不妨稼穡自兩司馬以上皆選賢士大夫為之無侵漁之患故卒乘輯睦動則有功今籍鄉村之民二丁取一以為保甲授以弓弩教之戰陳是農民半為兵也三四年來又令河北河東陝西置都教場無問四時每五日一教特置使者比監司專切提舉州縣不得關預每一丁教閲一丁供送雖云五日而保正長以泥堋除草為名聚之教場得賂則縱否則留之是三路耕耘收穫稼穡之業幾盡廢也自唐開元以來民兵法壞戍守戰攻盡募長征兵士民間何嘗習兵國家承平百有餘年戴白之老不識兵革一旦畎畝之人皆戎服執兵奔驅滿野耆舊歎息以為不祥事既草創調發無法比戶騷擾不遺一家又巡檢指使按行鄉村往來如織保正保長依倚弄權坐索供給多責賂遺小不副意妄加鞭撻蠶食行伍不知紀極中下之民罄家所有侵肌削骨無以供億愁苦困弊靡所投訴流移四方襁屬盈路又朝廷時遣使者遍行按閲所至犒設賞賚糜費金帛以巨萬計此皆鞭撻平民銖兩丈尺而斂之一旦用之如糞土而鄉村之民但苦勞役不感恩澤農民之勞既如彼國家之費又如此終何所用哉若使之捕盜賊衛鄉里則何必如此之多使之戍邊境事征伐則彼遠方之民以騎射為業以攻戰為俗自幼及長更無他務中國之民大半服田力穡雖復授以兵械教之擊刺在教場之中坐作進退有似嚴整必若使之與敵人相遇填然鼓之鳴鏑始交其奔北潰敗可以前料决無疑也豈不誤國事乎又悉罷三路巡檢下兵士及諸縣弓手皆易以保甲主簿兼縣尉但主草市以𩹉其鄉村盜賊悉委巡檢而巡檢兼掌巡按保甲教閲朝夕奔走猶恐不辦何暇逐捕盜賊哉又保甲中往往有自為盜者亦有乘保馬行草疏者然則設保甲保馬本以除盜乃更資盜也自教閲保甲以來河東陝西京西盜賊已多至敢白晝公行入縣鎮殺官吏官軍追討經歷歲月終不能制况三路未至大饑而盜賊猖熾已如此萬一遇數千里之蝗旱而失業飢寒武藝成就之人所在蜂起以應之其為國家之患可勝言哉此非小事不可以忽夫奪其衣食使無以為生是驅民為盜也使比屋習戰勸以官賞是教民為盜也又撤去捕盜之人是縱民為盜也謀國如此果為利乎害乎且嚮者干進之士說先帝以征伐開拓之策故立保甲戶馬保馬等法近者登極赦書有云應緣邊州軍仰逐處長吏并巡檢使臣鈐轄兵士及邊上人戶不得侵擾外界務要靜守疆場勿令騷擾此蓋聖意欲惠綏殊方休息生民中外之人孰不歸戴然則保甲戶馬復何所用哉今雖罷戶馬寬保馬而保甲猶存者蓋未有以其利害之詳奏聞者也臣愚以為悉罷保甲使歸農召提舉官還朝量逐縣戶口每五十戶置弓手一人略依緣邊弓箭手法許蔭本戶田二頃悉免其稅役除出賊地分更不立三限科校但令捕賊給賞若獲賊數多及能獲強惡賊人者各隨功大小遷補職級或補班行務在優假弓手使人勸募然後募本縣鄉村戶有勇力武藝者投充計即今保甲中有勇力武藝者必多願應募若一人缺額有二人以上爭投者即委本縣令尉選武藝高強者充或武藝衰退者許他人指名與之比較若武藝勝於舊者即令衝替其被替者更不得蔭田如此則不必教閲武藝自然精熟一縣之中其壯勇者既為弓手其羸弱者雖使為盜亦不能為患仍委本州及提點刑獄常按察令佐有取舍不公者嚴行典憲若召募不足且即於鄉村戶上依舊條權差候有投名者即令充替其餘巡檢兵士縣尉弓手耆老壯丁逐捕盜賊並乞依祖宗舊法五月以光為門下侍郎光欲復申前說以為教閲保甲公私勞費而無所用是時資政殿學士韓維侍讀呂公著欲復上前奏先自進呈乞罷團教詔府界三路保甲自來年正月以後並罷團教仍依舊每歲農隙赴縣教閲一月其差官置場排備軍器教閲法式番次按賞費用令樞密院三省同立法後六日光再上奏極其懇切蔡確等執奏不行詔保甲依樞密院已得指揮保馬別議立法九月監察御史王巖叟言保甲之害三路之民如在湯火未必皆法之弊蓋由提舉一司上下官吏逼之使然而近日指揮雖令冬教然尚存官司則所以為保甲之害者十分之六七猶在陛下所不知也此皆奸邪遂非飾過而巧辭強辨以欺惑聖聽將至深之病略示更張以應副陛下聖意而已非至誠為國家去大害復大利以便百姓為太平長久之計者也此忠義之良心所以猶抑奸邪之素計所以尚存天下之識者皆言陛下不絶害源百姓無由樂生不屏羣邪太平終是難致臣願陛下奮然獨斷如聽政之初行數事則天下之大體無虧陛下高枕而臥矣十月詔提舉府界三路保甲官並罷令逐路提刑及府界提點司兼領所有保甲止冬教三月又詔逐縣監教官並罷委令佐監教十一月巖叟言保甲行之纍年朝廷固已知人情之所共苦而前日下詔蠲疾病汰小弱釋第五等之田不及二十畝者省一月之六教而為三日之併教甚大惠也然其司尚存其患終在今以臣之所見者為陛下言不敢隱其實以欺朝廷亦不敢飾其事以罔成法夫朝廷知教民以為兵而不知教之太苛而民不能堪知別為一司以總之而不知擾之太煩而民以生怨教之欲以為用也而使之至於怨則恐一日用之有不能如吾意者不可不思也民之言曰教法之難不足以為苦而羈縻之虐有甚焉羈縻不足以為苦而鞭笞之酷有甚焉鞭笞不足以為苦而誅求之無已有甚焉方耕方耘而罷方幹方營而去此羈縻之所以為苦也其教也保長得笞之保正又笞之巡檢之指使與巡檢者又交撻之提舉司之指使與提舉司之幹當公事者又互鞭之提舉之官長又鞭之一有逃避縣令又鞭之人無聊生恨不得死此鞭笞之所以為苦也創袍市巾買弓條箭添弦換包指治鞍轡蓋涼棚畫象法造隊牌緝架僦椅卓團典紙墨看定人雇直均菜緡納秸粒之類其名百出不可勝數故父老之諺曰兒曹空手不可以入教場非虛語也都副兩保正大小兩保長平居於家婚姻喪葬之問遺秋成夏熟絲麻穀麥之要求遇於城市飲食之責望此迫於勢而不敢不致者也一不如意即以藝不如法為名而捶辱之無所不至又所謂巡檢指使者多由此徒以出貪而冒法不顧後禍有踰於保正保長者此誅求之所以為甚苦也又有逐養子出贅壻再嫁其母兄弟析居以求免者有毒其目斷其指炙其肌膚以自殘廢而求免者有盡室以逃而不歸者有委老弱於家而保丁自逃者保丁者逃則法當督其家出賞錢十千以募之使其家有所出當未至於逃至於逃則其困窮可知而督取十千何可以得故每縣常有數十百家老弱嗟咨於道路哀訴於公庭如臣之愚且知不忍使陛下仁聖知之當如何也又保丁之外平民凡有一馬皆令借供逐場教騎終日馳驟往往飢羸以至於斃誰復敢言其或主家倘因他出一誤借供遂有追呼笞責之害或因官逋督迫不得已而易之則有抑令還取之苦故人人以有馬為禍此皆提舉官吏倚法以生事重為百姓之擾者也竊惟古者未嘗不教民以戰而不聞其有此者因人之情以為法也夫緣情以推法則愈久而愈行倚威以行令則愈嚴而愈悖此自然之理也獸窮則搏人窮則詐自古及今未有窮其下而能無危者也臣觀保甲一司上下官吏無毫髮愛百姓意故百姓視其官司不啻虎狼積憤銜怨人人所同比者保丁執指使逐巡檢攻提舉司幹當官大獄相繼今猶未已雖民之愚顧豈忘父母妻子之愛而喜為犯上之惡以取禍哉蓋激之至於此極爾激之至深安知其發有不甚於此者情狀如此不可不先事而慮以保大體而圖安靜夫三時務農一時講武先王之通制也一月之間併教三日不若一歲之中併教一月農事既畢無他用心人自安於講武而無憾遂可罷提舉司廢巡教官一以隸州縣而俾逐路安撫司總之每俟冬教於城下一邑分兩番當一月起教則與正長論階級罷教則與正長不相誰何庶使百姓得以優游治生無終年遁逃之苦無侵漁苛虐之患無爭陵犯上之惡矣且武事不廢威聲亦全豈不易而有功哉惟陛下深計遠慮斷在必行以省多事以為生靈安樂之惠以為國家安靜之福又乞罷三路提舉保甲錢糧司及罷提舉教閲及每歲分保甲為兩番於十一十二兩月上教不必分作四番且不必自京師遣官視教止令安撫司差那使臣為便並從之元祐元年正月樞密院言府界三路保甲已罷團教其教閲器械悉上送官仍立禁約閏二月詔河北東西路永興秦鳳等路提點刑獄兼提舉保甲並依提刑司例各為一司三月王巖叟劾狄咨劉定姦贓狀御史孫升亦言劉定上挾章惇之姦黨下附狄咨之庸材大肆憑陵公行恐喝故真定獲鹿之變起於後澶滑之盜作於前願早正其罪於是咨定皆罷與在外宮觀十一月詔府界三路保甲人戶五等已下地土不及二十畝者雖三丁以上並免教從殿中侍御史呂陶之請也紹聖二年七月帝問義勇保甲數宰臣章惇曰義勇自祖宗以來舊法治平中韓琦請遣使詣陝西再括丁數添刺熙寧中先帝始行保甲法府界三路得七十餘萬丁設官教閲始於府界衆議沸騰教藝既成更勝正兵元豐中始遣使遍教三路先帝留神按閲藝精者厚賞或擢以差使軍將名目而一時賞賚率取諸封樁或禁軍闕額未嘗費戶部一錢元祐弛廢深可惜也元符二年九月御史中丞安惇奏乞教習保甲月分差官按試曾布言保甲固當教習然陝西河東連年進築城寨調發未已河北連年水災流民未復以此未可督責訓練帝曰府界豈不可先行布曰熙寧中教保甲臣在司農是時諸縣引見保甲事藝精熟章惇即曰多得班行布曰止是得殿侍軍將然俱更差充巡檢司指揮以此仕宦及有力之家子弟皆欣然趨赴及引對所乘皆良馬鞍韉華楚馬上事藝往往勝諸軍知縣巡檢又皆得轉官或減年以此上下皆踊躍自效然是時司農官親任其事督責檢察極精密縣令有抑令保甲置衣裝非理騷擾者亦皆衝替故人莫敢不奉法其後乃令上番帝曰且與先自府界檢舉施行蔡卞曰於先朝法中稍加裁損無不可之理布以為甚便容檢尋文字進呈十一月蔡卞勸上復行畿內保甲教閲法帝屢以督曾布是日布進呈畿內保丁總二十六萬熙寧中教事藝者凡七萬因言此事固當講求然廢罷已十五年一旦復行與事初無異當以漸行則人不至於驚擾帝曰固當以漸行之布曰聖諭如此盡之矣若便以元豐成法一切舉行當時保丁存者無幾以未教習之人便令上番及集教則人情洶洶未易安也熙寧中施行亦有漸容臣講求施行次第退以語卞卞殊以為不快乃云熙寧初人未知保甲之法今耳目已習熟自不同矣布不答徽宗崇寧四年樞密院言比者京畿保甲投八百七十一牒乞免教閲又二百三十餘牒遮樞密張康國馬首訴焉是月詔京畿三路保甲並於農隙時教閲其月教指揮勿行五年詔河北東西河東永興秦鳳路各武臣一員充提舉保甲並兼提刑其見專提舉保甲文臣並罷是月詔京畿差武臣一員充提舉保甲兼提刑仍差文臣提刑兼提舉保甲政和三年四月樞密院言神考制保甲之法京畿三路聚教每番雖號五十日其間有能勤習弓弩該賞者首先拍放一歲之中在場閲教遠者不過二十七日近者止於十八日而已若秋稼災傷則免當年聚教如武藝稍能精熟則有激賞之法斗力出等則免戶下春夫科配最高強者則解發引見試藝命官行之纍年人皆樂從惟京東西雖有團成保甲之名未嘗訓以武事慮其間亦有人材甚衆能習武藝可以命官任使之人今欲依三路保甲編修點擇條約從之八月樞密院言諸路團成保甲者六十一萬餘人悉皆樂從無擾其京東西路提舉官任諒已轉一官直祕閣其朝議大夫已上與轉行武臣武功大夫特與轉遙郡刺史餘官減磨勘年有差宣和元年詔提舉保甲督察州縣都保不如令者限一月改正每歲以改正多寡為殿最二年詔諸路保甲法並遵依元豐舊制京東京西路並罷三年詔先帝若稽成周制保伍之法自五家相比推而達之二十五家為一大保二百五十家為一都保保各有長都各有正正各有副使之相保相愛以察姦慝故有所行諸自外來者同保互告使各相知行止不明者聽送所屬保內盜賊畫時集捕知而不糾又論如律所以糾禁幾察纖悉具備奇邪寇盜何所容跡訪聞法行既久州縣玩習弛廢保丁開收既不以實保長役使又不以時如修鼓鋪飾粉壁守敗船治道路給夫役催稅賦之類科率騷擾不一遂使寇賊奇邪無復糾察良法美意浸成虛文可令尚書省於諸路提點刑獄或提舉常平官內每路選委一員令專一督責逐縣令佐將係籍人丁開收取實選擇保正長各更替如法使鈐束保丁遞相覺察毋得舍亡賴作過等人遇有盜賊畫時追捕若有過致藏匿者許諸人告首仍具條揭示欽宗靖康元年三月以書戶部侍郎錢蓋為龍圖閣學士陝西五路制置使專一措置京兆府路保甲六月御史胡舜陟奏秦元學兵法三十年陛下拔之下僚為京畿提刑訓練保甲聞者莫不慰悅乞罷武臣提刑以保甲屬元庶得專一從之十一月京畿提舉秦元集保甲三萬先請出屯自當一面不從金兵薄城又乞行訓練乘間出戰守禦使劉韐奏取保甲自益元謀遂塞云建炎後鄉兵巡社建炎元年詔諸路州軍巡社並以忠義巡社為名隸宣撫司後募鄉民為之每十人為一甲有甲長有隊長四隊為一部有部長五部為一社有社長五社為一都有都正於鄉井便處駐劄紹興初罷之槍杖手建炎二年令福建招五千人土豪建炎四年詔諸州守臣募土豪民兵聽州縣守令節制後存留強壯餘並放散義兵紹興十年團集諸州名數不等後皆以縣令為軍正義士紹興元年籍興元良家子弟兩丁取一四丁取二每二十人為一隊號曰義士民兵建炎二年每五十人為一隊有長副一戶取一丁五丁取二丁淳熙十四年三丁取一五丁取二十丁取三弓箭手建炎初應諸路漢蕃弓箭手限百日自陳承襲紹興間以京城外間地依陝西沿邊例招弓箭手蒔種土丁紹興中詔依嘉祐措置三時務農一時講武諸縣逐鄉置教場自十一月起教至次年正月罷教把截將紹興二十七年詔恭州鴈門控扼之地置土丁二百人峒丁建炎三年命江西福建諸處總領官籍定槍杖手峒丁人數以備調遣紹興中罷之保勝紹興六年詔金均房三州保甲分為五軍以保勝為名勇敢紹興二年詔池州就招土人充二千為額保丁二廣保丁每戶一名土丁父子兄弟皆在其數乾道中以拘留擾民罷之山水寨詳見寨兵萬弩手初熙寧間以鼎澧辰沅靖五郡弓弩手萬三千人散居邊境訓練無事耕作有警調發紹興以後增損靡定壯丁民社乾道四年楚州置良家子紹興四年招兩淮關陝流寓及陳亡主兵將子弟驍武不能存立者充月給比強弓手五十人為一隊義勇湖北諸郡皆有義勇惟澧州石門慈利不置籍其法取於主戶之雙丁每十戶為一甲五甲為團甲皆有長擇邑豪為總首農隙教武藝食從官司給湖北土丁刀弩手政和七年募土丁充授以間田散邊境教以武藝紹興因之淳熙中李燾力言其不便罷之湖南鄉社舊制以鄉豪領之大者統數百家小者亦二三百家後言者以其不便淳熙中擇其首領使大者不過五十家小者減半忠勇關外西和階成鳳四州所聚民兵謂之忠勇鎮淮初淮南募邊民號鎮淮軍數至十萬月給視效勇惟不黥久之廩不足肆劫掠嘉定初選汰歸農僅存八千餘人以充效用餘補鎮江大軍淮西選二萬六千餘充御前武定軍分為六軍軍設統制忠義民兵福州諸縣舊有忠義社屯結邑民擇豪右為長量授器甲盜由是息人甚賴之後有司煩擾失初意開禧用兵淮襄民兵有籍于官者至用百六十緡以養一兵後又放令歸業而無所歸多散為盜乃令每郡擇豪酋一人授以官民鎮之建炎後寨兵兩浙西路臨安府十三寨外沙海內管界茶槽南蕩東梓上管赭山黃灣硤石奉口許村下塘安吉州七寨管界安吉秀塞呂小幽嶺下塘北豪皋塘平江府八寨吳江吳長許浦福山白茅江灣楊林角頭常州五寨管界小河馬跡香蘭分界江陰軍二寨申港石牌嚴州五寨威平港口鳳林茶山管界兩浙東路慶元府十寨浙東結崎三姑管界大嵩海內白峯岱山鳴鶴公塘溫州十三寨城下管界館頭青奧梅奧鹿西莆門南監東北三尖北監小鹿大荊台州六寨管界亭場吳都白塔松門臨門處州二寨管界梓亭江南東路南康軍五寨大孤山水陸四望山河湖左里江南西路隆興府七寨都巡塢子松門港口定江杉市管界撫州七寨城南曾田樂安鎮馬旗步招攜湖平江州六寨管界江內茭石馬當城子頭孤山興國二寨池口磁湖袁州四寨都巡四縣管界白斜臨江軍三寨本軍水陸管界吉州十六寨富田走馬塍永和鎮觀山明德沙溪西平山楊宅栗傳禾山勝鄉造口秀洲新寨北鄉黃茅峽荊湖南路永州三寨都巡同巡衡永界寶慶三寨黃茅西縣盧溪郴州五寨管界安福青要赤石上猶武岡軍十寨三門石查真良嶽溪臨口關硤黃石新寧綏寧永和道州四寨營道寧遠江華永明全州四寨上軍魚口吉寧平塘福建路邵武軍十寨同巡檢大寺水口永安明溪仁壽西安永平軍口梅口建寧府七寨黃琦籌嶺盆亭麻沙水吉苦竹仁壽南劍州八寨嵢峽洛陽浮流巖前同巡仁壽萬安黃土泉州五寨都巡同巡石井小兜三縣福州四寨辜嶺甘蔗五縣水口興化軍二寨同巡巡鹽漳州二寨同巡虎嶺廣西路賀州二寨臨賀富川昭州四寨昭平雲峒西嶺立山欽州二寨西縣管界
