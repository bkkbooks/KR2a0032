body:
  text: 宋史卷一百三十五志第八十八樂十樂章四朝謁玉清昭應宮太清宮朝享景靈宮封禪祀汾陰奉天書祭九鼎真宗奉聖祖玉清昭應宮御製十一首降聖真安巍巍真宇奕奕殊庭規模太紫炳煥丹青元命祗答大猷是經多儀有踐丕應無形肆設金石聲聞杳冥佇回飈馭永祐基扃奉香靈安芳氣上浹飈馭下臨紹承丕緒永勵精明氤氳成霧蔥鬱垂陰虔恭對越介祉攸欽奉饌吉安發祥有自介福無疆紛綸丕應保佑下方嘉薦斯備雅奏具揚寅威洞達監眄昭章玉皇位酌獻慶安無體之體強名之名監觀萬𧜛統治九清真期保祐瑞命昭明乾乾翼翼祗答財成聖祖位酌獻慶安於昭靈貺誕啓鴻源功濟庶彙慶流後昆蘭肴登俎桂酒盈尊俯回飈駕永庇雲孫太祖位酌獻慶安赫赫藝祖受命高穹威加海外化浹區中發祥宗祏錫祐眇沖欽承積德勵翼精衷太宗位酌獻慶安明明文考儲精上蒼禮樂明備溥率賓王功德纍洽歷數會昌孝思罔極丕祐無疆亞終獻沖安太初非有體至道本無聲降迹臨下土成功陟上清至仁敦動植丕緒啓宗祊紫禁承來格鴻基保永寧發祥垂誕告致孝薦崇名廣樂伸欽奉儲休固太平飲福慶安明明始祖誕啓慶基翼翼後嗣虔奉孝思精潔斯達祉福咸宜于以報貺于以受釐徹饌吉安雕俎在御飈駕聞聲真遊斯降旨酒斯盈大樂云闋大禮云成徹彼常薦罄此明誠送聖真安精心既達真遊允臻禮容斯舉福應惟醇將整仙馭言還上旻永存嘉貺用泰蒸民迎奉聖像四首並用慶安玉皇位玉虛上帝金像睟容宅真雲構練日龜從維皇對越率禮寅恭靈心丕應福祿來崇聖祖位總化在天保昌厥緒降格皇闈瓊輪載御藻仗星陳睟容金鑄佑我慶基宅茲靈宇太祖位蒸哉大君聿懷帝祖鎔範真儀奉尊靈宇至感祥開洪輝物覩瞻謁盡恭飛英率土太宗位於顯神宗德洽區中祥金爍冶範茲睟容殊庭胥宇備物致恭明威有赫降福來同玉清昭應宮上尊號三首奉告隆安登隆妙號欽翼淵宗茂宣德禮有恪其容奉璋升薦垂佩彌恭揚休詠美以間笙鏞太初殿奉册寶登安皇靈垂祐洪福彌隆祗率綿𧜛潔祀真容嚴恭奉册對越清躬睟容肅穆懿號尊崇禮成樂舉福祿來同二聖殿奉絳紗袍登安赫赫列聖盛德巍然彤彤靈宇睟儀在焉奉以龍袞被之象天重慶宗稷億萬斯年太尉奉聖號册寶真安上旻降監介祉實繁邦家修報妙道歸尊增名霄極奉册靈軒茂宣聖典永祐黎元寶册升殿大安圖書昭錫典禮紹成蒸民何幸教父儲靈欽承景貺祗奉崇名致虔寶册垂祐基扃降神真安猶龍之聖降生厲鄉教流清淨道符混茫大君肅謁盛儀允臧森羅羽衛躬薦蕭薌簪紱濟濟鍾石洋洋高真至止介福誕祥奉玉幣靈安琳宮奕奕黼坐煌煌玉帛成禮飈馭延祥鴻儀有則景福無疆嘉應昭協丕猶誕揚奉饌吉安金奏以諧飈遊斯格靈監章明皇心勵翼肅奉雕俎來升綵席享德有孚凝禧無斁酌獻大安欽崇至道肅謁殊庭順風而拜明德惟馨飈馭來格尊酒斯盈是酌是獻心通杳冥飲福大安彼渦之壤指李之區千乘萬騎來朝密都躬陳芳薦款接仙輿飲酒受福永耀鴻圖亞終獻正安邈矣道祖冥幾惚恍常德不離至真無象引位清穹降祥神壤酌醴薦誠控飈來享送神真安醴盞在戶金奏在庭籩豆有踐黍稷非馨義盡蠲潔誠通杳冥言旋風駟祚我修齡太極觀奉册寶一首登安之曲薦號穹冥登名祖禰陟配陽郊協宣典禮感電靈區誕聖鴻懿册寶斯陳福祿來暨景靈宮奉册寶一首登安之曲穆穆真宗錫羡蕃昌飈輪臨貺諄誨洞彰虔崇懿號祗答景祥至誠致享降福無疆景祐元年親享景靈宮二首降真太安真館奉幣潔齊致馨靈因斯格社稷慶寧送真太安椒漿尊享珍饌精祈睟容杳邈瑤輅霞飛大觀三年朝獻景靈宮二首奉饌吉安威靈洋洋靡有常嚮於惟欽承來假來饗博碩芬香是蒸是享奉器有虔載德無爽爾牲既充是烹是肆爾肴既具是羞是饋非物之重惟德之備神之格思歆我精意高宗郊前朝獻景靈宮二十一首皇帝入門乾安維皇齊居承神其初顒顒昂昂龍步雲趨景鍾鏗如肅覲清都肸蠁之交神人用孚升殿乾安帝既臨饗罄茲精意對越在天爰升紫陛孔容翼翼保承丕緒孝奉天儀永錫爾類降聖太安惟德馨香升聞八方粵神臨之來從帝鄉萬靈景衛有燁其光監我精純降福穰穰盥洗乾安齋居皇皇瓊琚鏘鏘承祭之初其如在旁挹彼注茲儲禧迎祥神之聽之欣欣樂康聖祖位乾安涓選休辰有事嘉薦琅琅瓊珮陟降巖殿其陟伊何幣玉斯尊周旋中禮千億儲羡聖祖位奉玉幣靈安上靈始祖雲景元尊嚴祀夙展六樂朱軒明玉之潔豐帛之溫暢乃繼序承德不愆還位乾安我后臨饗奠幣攸畢式旋其趨矩度有式禮容齋莊孝思純實天休滋至時萬時億奉饌吉安百職駿奔來相于庭奉盛以告登茲芳馨際天蟠地默運三靈神兮來歆祚我休平再盥洗乾安有嚴大禮對時休明情文則粲蠲潔必清再臨觀盥以專以精真遊來格永觀厥成再詣聖祖位乾安於赫炎宋十葉華耀屬茲郊報陟降在廟其降伊何椒漿桂酒再拜斟酌永御九有聖祖位酌獻祖安御製瑤源誕啓玉牒肇榮覆育羣有監觀圓清酒醴既洽登薦惟誠無有後艱駿惠雲仍還位乾安奠鬯告成式旋厥位天步雍容神人燕喜九廟觀德百靈薦祉子孫其昌垂千萬祀文舞退武舞進正安於皇樂舞進旅退旅一弛一張笙磬具舉豈惟玩聲象德是似神鑒孔昭福祿來豫亞終獻沖安五音飭奏神既億康淡其容與薦此嘉觴有來顯相鋗玉鏘鏘奉承若宥罔不齋莊飲福報安嘉薦既終神貺斯復賚我思成靈光下燭孝孫承之載祗載肅敷錫庶民函蒙祉福還位乾安帝臨閟庭逆釐上靈神鴹安坐肅若有承嘉觴既申德聞惟馨靈光留俞祚我億齡徹饌吉安普淖既薦苾芬孔時神嗜而顧有來燕娭饗矣將徹載欽載祗展詩以侑益臻厥熙送真太安雍歌既徹熙事備成神夕奄虞忽乘青冥靈心回眷監我精禋誕降嘉祉休德昭清降殿乾安我秩元祀上推靈源展事有侐祲威肅然丹墄既降秉心益虔荷天之休于千萬年望燎乾安奕奕靈宮有嚴毖祀燔燎具揚禮儀既備帝心肅祗天步旋止對越在天永膺蕃祉還大次乾安帝將于郊昭事上祀爰茲畢觴復即于此飈遊載旋容旌沓騎維皇嘉承錫祚昌熾高宗明堂前朝獻景靈宮十首降聖大安德惟馨香升聞八方粵神之從燦然有光驂飛乘蒼啾啾蹌蹌消搖從容顧豫不忘升殿乾安帝既臨享龍馭華耀孝孫承之陟降在廟誠意上交慶陰下冒天休駢至千億克紹聖祖位奠玉幣靈安玉氣如虹豐繒充笥既奉既將亦奠在位有永羣后實相祀事何以臨下心意不二奉饌吉安瓊琚鏘鏘玄衣繡裳薦嘉升香粢盛芬芳禮儀莫愆鼓鐘喤喤曾孫之常綏福無疆聖祖位酌獻祖安裴回若留靈其有喜薦我馨香挹茲酒醴我祖在天執道之紀申佑無疆奏神稱禮文舞退武舞進正安進旅退旅載執干戚不愆于儀容服有赫式妥式侑神保是格靈鑒孔昭孝思維則亞終獻沖安用舊辭飲福報安於赫大神總司元化監我純精威光來下延昌之貺千億馮藉曾孫保之丕平是迓徹饌吉安洋洋降臨肅肅布列熙事既成嘉籩告徹九天儲慶垂佑無缺寖明寖昌綿綿瓜瓞送真太安高飛安翔持御陰陽幽贊圓穹監觀四方元精回復奄虞孔良畢觴降嘏偃蹇于驤望燎乾安奕奕原祠有嚴毖祀禮儀孔宣燔燎斯暨帝心肅祗天步旋止熙事既成永膺蕃祉孝宗明堂前朝獻景靈宮八首盥洗乾安合宮之饗報本奉先欽惟道祖濬發璿源駕言謁款其盥惟虔尚監精衷錫祚綿綿聖祖乾安駿命有開慶基無窮祗率百辟仰瞻睟容鼓鐘斯和黍稷斯豐靈其居歆福祿來崇還位乾安嘉玉既設量幣既陳髣佛靈遊來顧來寧對越伊何厥惟一純佑我熙事以迄于成奉饌吉安發祥仙源流澤萬世曷其報之親饗三歲相維列卿潔粢是饋匪物之尚誠之為至再詣盥洗乾安華燈熒煌瑞煙氤氳威神如在蠲潔必親再盥于罍再帨于巾皇心肅祗其敢憚勤再詣聖祖位乾安歲逢有年月旅無射我將我饗如幾如式肅爾臣工諧爾金石本原休功垂裕罔極還位乾安旨酒思柔神具醉止工祝既告孝孫旋位何以酢之純嘏來備燕及雲來蕃衍無已文舞退武舞進正安象德之成有奕其舞一弛一張進旅退旅嘒以管簫和以鏞鼓神其樂康永錫多祜寧宗郊前朝獻景靈宮二十四首皇帝入門乾安閟幄邃深雲景杳冥天清日晬展容玉庭締基發祥希夷降靈神其來燕是饗是聽升殿乾安帝居瑤圖璇題玉京日月經振列宿上熒桂簋飶芬瑚器華晶夤承禋祀用戒昭明降神太安六變圜鐘為宮四靈晨耀五緯夕明風雲晏和天地粹清靈兮來迎靈兮來寧啓我子孫饗于純精黃鐘為角芬枝揚烈熉珠叶陶闓珍闡符展詩舞簫神哉來下神哉來翺肅若有承靈心招搖太簇為徵龍車既奏鳳馭載翔帝幄佇靈天衢騰芳神來留俞神來蹇驤禮鬯樂明奏假孔將姑洗為羽虹旌霓旄鸞旗翠蓋星樞扶輪月御叶衛靈至陰陰靈般裔裔來格來饗福流萬世盥洗乾安禮文有俶祀事孔明將以潔告允惟齊精自盥而往聿觀厥成靈監下臨天德其清詣聖祖位乾安維宋肖德欽天顧右於皇道祖丕釐靈祐葛藟殖繁瓜瓞孕茂克昌厥後世世孝奏聖祖位奉玉幣靈安高宗御製見前皇帝還位乾安桂宮耽耽藻儀穆穆天回袞彩風韶璜玉咸英皎亮容典炳煜假我上靈景命有僕奉饌吉安我簋斯盈我簠斯實或剝或烹或燔或炙有殽既將為俎孔碩禮儀卒度永錫爾極再盥洗乾安觴淡初勺禮戒重盥假廟以萃取象于觀清明外暢精肅中貫我儀圖之三靈攸贊再詣聖祖位乾安肇基駿命鞏右鴻業鼎玉龜符垂固萬葉靈貺具臻神光燁燁暉祚無疆規重矩疊聖祖位酌獻祖安高宗御製見前還位乾安皇帝瑞慶長發其祥纂系悠遠遡源靈長德之克明休烈有光配天作極孝饗是將文舞退武舞進正安持翟成象秉朱就列旄乘整溢鳳儀諧節揮舒皇文歌蹈先烈合好效歡福流有截亞獻沖安光熉紫幄神流玉房秉文侑儀嘉虞二觴震淡醉喜倣佛迪嘗璇源之休地久天長終獻沖安靈輿蹇驤畢觴泰筵二饗允穆祼將克竣垂恩儲祉錫羡永年將以慶成燕及皇天詣飲福位乾安若木露英清雲流霞蔓蔓芝秀馮馮桂華綿瑞無疆産嘏孔奢皇則受之鞏我帝家飲福酒報安旨酒惟蘭勺漿惟椒福流瓚斝光燭琨瑤拜貺清宮凝輝慶霄神其如在徘徊招搖還位乾安蒸哉我皇繼天育聖逆釐元都對越靈慶如天斯久如日斯盛瑤圖濬邈永隆駿命徹饌吉安房鉶陳列室簋登奉告饗具歆展徹惟拱祥光奕奕嘉氣懞懞受嘏不愆燕天之寵送真太安雲車風馬靈其來遊天門軼蕩神其莫留遺慶陰陰祉發祥流康我有宋與天匹休降殿乾安璇庭爛景紫殿流光禮洽乾回福應日昌聖系厖鴻景命溥將德茂功成率祀無疆詣望燎位乾安厥初生民淵濬唯祖芳薦既輟明燎具舉德馨升聞靈貺蕃詡懷濡上靈佑周之祜還大次乾安帝假于宮彝承清祀天暉臨幄宸衛森峙行繇大室旋趨紫畤率禮不違式敷靈祉理宗明堂前朝獻景靈宮二首餘用舊辭升殿登歌乾安我享我將罄茲精意陟降左右維天與契齋明乃心祗肅在位於萬斯年百福來備亞獻宮架沖安慶雲郁郁鳴璆琅琅淡其容與申薦二觴奉承若宥神其樂康錫以多祉源深流長大中祥符封禪十首餘同南北郊山上圜臺降神高安巖巖泰山配德于天奉符展采翼翼乾乾滌濯靜嘉罔有弗蠲上帝顧諟冷風肅然昊天上帝坐酌獻奉安皇天上帝陰騭下民道崇廣覆化洽鴻鈞靈文誕錫寶命惟新增高欽事式奉嚴禋太祖配坐酌獻封安於穆聖祖肇開鴻業我武惟揚皇威有曄四隩混同百靈震疊陟配高穹明靈是接太宗配坐酌獻封安祗若封祀神宗配天禮樂明備奠獻精虔景靈來格休祥藹然於昭垂慶億萬斯年亞獻恭安因高定位禮修物備薦鬯卜牲虔恭寅畏八音克諧天神咸暨降福穰穰永錫爾類終獻順安浩浩元精無臭無聲臨下有赫得一以清備物致享薦茲至誠泰尊奠獻夙夜齊明社首壇降神靖安至哉坤元資生伊始博厚稱德沈潛柔止降禪方位聿修明祀寅恭吉蠲永錫蕃祉皇地祇坐酌獻禪安坤德直方博厚無疆秉陰得一靜而有常寶藏以發乃育百昌肅祗禪祭錫祉穰穰太祖配坐酌獻禪安皇矣聖祖丕赫神武秉運宅中威加九土德厚功崇頌聲載路陟配方祗對天之祜太宗配坐酌獻禪安毖祀柔祇報功厚載思文太宗侑神嚴配鐘石斯和籩豆咸在永錫坤珍資生為大汾陰十首降神靖安茫茫坤載粵惟太寧資生光大品物流形瞻言汾曲允宅神靈聖皇躬享明德惟馨奠玉幣登歌嘉安至誠旁達柔祇格思奉以琮幣致誠在茲奉俎豐安博碩者牲載純其色體薦登俎聿崇坤德后土地祇坐酌獻博安秉陰成德敏樹宣功應變審諦神力無窮沈潛剛克流謙示中潔茲奠獻妙物玄通太祖配坐酌獻博安坤元茂育植物成形於穆聖祖功齊三靈嚴恭配侑厚德攸寧永懷錫羡歆此惟馨太宗配坐酌獻博安報功厚載祀事惟明思文烈考道濟羣生侑神定位協德安平馨潔並薦享于克誠飲福博安寅威寶命明祀惟虔協神備物罔不吉蠲后祇格思靈飈肅然誕受景福遐哉億年亞終獻正安至哉柔祇滋生蕃錫滌濯靜嘉寅恭夕惕金奏純如萬舞有奕立我蒸民莫匪爾極后土廟降神靖安博厚流形秉陰成德柔順利正直方維則明祇格思素汾之側祗載吉蠲宸心翼翼酌獻博安至哉物祖設象隆脽動靜之德翕闢攸宜嘉栗以薦精禱洪釐茂宣陰貺五穀蕃滋祗奉天書六首朝元殿酌獻瑞文妙道非常神變無方惟天輔德靈貺誕章玄文昭錫寶曆彌昌禮崇明祀式薦馨香含芳園瑞文運格熙盛將封介丘禮神之域瑞命殊尤靈文荐降丕顯皇猷聖心肅奉永洽鴻休泰山社首壇升降瑞文玄穹眷懷寶符申錫垂露騰文粲然靈迹發祥吉圖純熙寫奕登薦欽崇式昭天曆奉香酌獻瑞安謂天蓋高惟皇合德倬彼靈章圖書是錫眷命諄諄被以遐曆膺籙告成虔恭欽翼地屆興王祥開圖籙典禮昭成祺祥文屬大輅逶迤卿雲紛郁祐我含靈錫茲介福祥符七年奉祀畢天書回至應天府有雲物之瑞命製是曲以紀休應升降靈文旻穹無聲惟德是輔降監錫符垂文篆素孝瑞紀封英聲載路既壽而昌篤天之祜祭九鼎十二首帝鼐土王日祀降神景安日號丙丁方號中央德惟其時蠲吉是將夫何飲之黃流玉瓚夫何食之有陳伊饌奉饌豐安粢盛既豐牲牢既充展茲熙事溫溫其恭惟明欣欣燔炙芬芬保乎天子繁祉荐臻亞終獻文安工祝致辭黃流協鬯爰登清歌載期神享噫豫誠心精禋是虔嘉豫陳祀豐盈豆籩春分蒼鼎亞終獻成安法乾剛兮鑄鼎奠方涓嘉旦兮齊明迎祥胡為持幣維箱及筥胡為和羹有錡維釜立夏岡鼎迎神凝安我方東南我日朱明爰因其時鼎以岡名粢盛既馨牲牷既盈佑我皇家巽令風行亞終獻成安黃流在中惟馨香祀於薦于神爰祗厥事禮從多儀以進為文尊斝三獻昭示孔勤夏至彤鼎酌獻成安犧尊將將徂基自堂牲牷肥腯鼓鐘喤喤肆豫醴齊椒馨飶香聿來歆顧天祚永昌立秋阜鼎酌獻成安明德崇享磬管鏘鏘鏗兮佩舉冠齊莊肆陳有序承箱是將其牲伊何籩豆大房秋分皛鼎亞終獻成安神宮巍巍庭燎有輝聲諧備樂物陳豐儀清酤既載酌言獻之惟神醉止聿來蕃釐立冬魁鼎迎神凝安時運而冬乃神玄冥陰陽相推豐年以成越陳嘉肅牲牢粢盛來享來依監于明誠酌獻成安罍之初登其儀昭陳罍之既祼其香升聞神心嘉止於焉欣欣貽我有年穰穰其仁冬至寶鼎奠幣明安秉心齊明奉牲博碩匏絲鏗陳冠佩儼飾其肆其將明神來格執奠維何猗歟幣帛
