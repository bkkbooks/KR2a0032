為常人亦不大怖宣和末寖少而亂遂作政和三年夏至宰臣何執中奉祀北郊有黑氣長數丈出自齋宮行一里許入壇壝繞祭所皆近人穿燈燭而過俄又及於壇禮將畢不見宣和中洛陽府畿間忽有物如人或蹲踞如犬其色正黑不辨眉目始夜則掠小兒食之後雖白晝入人家為患所至喧然不安謂之黑漢有力者夜執槍棒自衞亦有託以作過者如此二歲乃息已而北征事起卒成金人之禍三年春日有眚忽青黑無光其中洶洶而動若鉟金而湧沸狀日旁有黑正如水波周迴旋繞將暮而稍止建炎三年二月甲寅日初出兩黑氣如人形夾日旁至巳時乃散乾道四年春舒州雨黑米堅如鐵破之米心通黑淳熙十一年二月臨安府新城縣深浦天雨黑水終夕十六年六月行都錢塘門啟黑風入揚沙石慶元元年徽州黃山民家古井風雨夜出黑氣波浪噴湧咸平元年五月撫州王羲之墨池水色變黑如雲大中祥符元年五月丁丑泰山王母池水變紅紫色四年二月己未河中府寶鼎縣瀵泉有光如燭焰四五炬其聲如雷三年八月解州鹽池紫泉場水次二十里許不種自生其味特嘉命屯田員外郎何敏中往祭池廟八月東池水自成鹽僅半池潔白成塊晶瑩異常紀汾陰經度制置使陳堯叟繼獻凡四千七百斤分賜近臣及諸列校紹興十四年樂平縣河衝里田隴數十百頃田中水類為物所吸聚為一直行高平地數尺不假隄防而水自行里南程氏家井水溢亦高數尺夭矯如長虹聲如雷穿牆毀樓二水鬥于杉墩且前且卻約十刻乃解各復故天聖四年十月甲午昏霧四塞靖康元年正月丁未霧氣四塞對面不見建炎二年十一月甲子北京大霧四塞是夕城陷三年三月車駕發溫州航海乙丑次松門海中白霧晝晦六月久陰四年三月乙丑四方霧下如塵紹興三年自正月陰晦陽光不舒者四十餘日五年正月甲申霧氣昏塞七月劉豫毀明堂天地晦冥者累日七年氛氣翳日八年三月甲寅晝晦日無光陰霧四塞乙卯晝夜雲氣昧濁四月積雨方止氛霧四塞晝日無光隆興元年五月丙午朝霧四塞二年六月積陰彌月乾道二年十一月久陰五年正月甲申晝蒙六年五月連陰六月日青無光淳熙六年十一月乙丑晝蒙十三年正月丁亥亦如之慶元二年二月己卯晝暝四方昏塞三年二月丁卯晝晦昏霧四塞六年十二月辛卯嘉定三年正月丙午十年正月乙未十三年三月壬辰皆晝蒙建炎四年三月辛亥白虹貫日紹興八年三月辛巳白虹亘天二十七年二月壬寅白虹貫日三十年十二月辛酉曲虹見日之西乾道三年十月丙申虹見淳熙元年十月戊寅曲虹見日東二年十月庚辰虹見五年十月丁巳曲虹見日東慶元元年正月丙辰白虹貫日嘉泰三年七月壬午亦如之四年十一月虹見嘉定十一年二月丙辰白虹貫日嘉熙三年十月乙丑虹見四年二月辛丑白虹貫日淳祐十年十二月丁巳虹見寶祐五年十月虹見太祖從周世宗征淮南戰于江亭有龍自水中向太祖奮躍乾德五年夏京師雨有黑龍見尾于雲際自西北趨東南占主大水明年州府二十四水壞田廬開寶六年四月單父縣民王美家龍起井中暴雨飄廬舍失族屬及壞舊鎮廨舍三百五十餘區大木皆折七年六月棣州有火自空墮于城北門樓有物抱東柱龍形金色足三尺許其氣甚腥旦視之壁上有煙痕爪跡三十六大中祥符二年八月青蛇出無為軍廨長數尺宣和元年夏雨晝夜凡數日及霽開封縣前茶肆中有異物如犬大蹲踞臥榻下細視之身僅六七尺色蒼黑其首類驢兩頰作魚頷而色正綠頂有角生極長於其際始分兩歧聲如牛鳴與世所繪龍無異茶肆近軍器作坊兵卒來觀共殺食之已而京城大水訛言龍復讐云紹興初朱勝非出守江州過梁山龍入其舟纔長數寸赤背綠腹白尾黑爪甲目有光近龍孽也行都柴𣛀橋旌忠廟三蛇出沒庭廡大者盈尺方鱗金色首脊有金錢遇霽或變化數百于蕉卉間廟徙而蛇孽亦絕十一年四月衡山縣淨居巖有蛇長二丈身圍數尺黑色而方丈震死山水大至先是山氣遇夜輒昏昧蛇斃始明二十五年六月湖口縣赤龍橫水中如山寒風怒濤覆舟數十艘士卒溺者數十人三十年春宜黃縣大蛇見于丞治長二丈捕之縱數里外俄復至者數四乾道五年七月乙亥武寧縣龍鬥于復塘村大雷雨二龍奔逃珠墜大如車輪牧童得之自是連歲有水災太平興國三年靈州獻官馬駒足有二距雍熙二年虔州吏李祚家馬生駒足有距四年鄜州直羅縣民高英家馬生前兩足如牛端拱二年夏州民程真家馬生二駒大中祥符九年十二月大名監馬生駒赤色肉尾無騣宣和五年馬生兩角長三寸四足皆生距時北方正用兵紹興八年廣西海壖有海獸如馬蹄鬣皆丹夜入民舍聚衆殺之明日海溢環村百餘家皆溺死近馬禍也五年廣西市馬全綱疫死淳熙六年十二月宕昌西馬金州馬皆大疫十二年黎雅州獻馬有角長二寸京房易傳曰臣易上政不順厥妖馬生角茲謂賢士不足紹熙元年二月丙申右丞相留正乘馬早朝入禁扉馬斃近馬禍也嘉定五年正月史彌遠入賀于東宮馬驚墮地衣幘皆敗其額微損事與上同建隆元年雄州歸義軍民劉進妻產三男二年孟州民孟福定州民孟公禮等妻各產三男三年齊州晉州大旱民家多生魃龍岡縣民林嗣妻京師龍捷軍卒宜超妻產三男乾德三年江陵府民劉暉妻產三男四年安州驍健軍卒趙遠妻產三男五年光州民高與德州民趙嗣乾寧軍卒王進妻產三男開寶元年沂州民王政澶州民謝興妻產三男二年閬州民孫延廣開州民董遠妻產三男七年青城縣王宥妻產三男河南府民劉元妻產三男太平興國二年邢州招收軍卒李遇汝州歸化軍卒魚霸常州民謝祚妻產三男晉原縣民楊萬妻產三男七年澶州龍衞軍卒靳興普州民鄭彥福