body:
  text: 宋史卷六十二志第十五五行一下水下建隆三年春延寧二州雪盈尺溝洫復冰草木不華丹州雪二尺太平興國七年三月宣州霜雪害桑稼雍熙二年冬南康軍大雨雪江水冰勝重載端拱元年閏五月鄆州風雪傷麥淳化三年九月京兆府大雪殺苗稼四年二月商州大雪民多凍死咸平四年三月丁丑京師及近畿諸州雪損桑天禧元年十二月京師大雪苦寒人多凍死路有僵尸遣中使埋之四郊二年正月永州大雪六晝夜方止江溪魚皆凍死慶曆三年十二月丁巳大雨雪皇祐四年十二月己丑雪初帝以愆亢責躬減膳每見輔臣憂形於色龐籍等因言臣等不能燮理陰陽而上煩陛下責躬引咎願守散秩以避賢路帝曰是朕誠不能感天而惠不能及民非卿等之過也是夕乃得雪至和元年正月京師大雪貧弱之民凍死者甚衆嘉祐元年正月甲寅朔御大慶殿受朝前一夕殿庭設仗衞既具而大雨雪折宮架是日帝因感風眩促禮行而罷壬午大雨雪泥塗盡冰都民寒餓死者甚衆元祐二年冬京師大雪連月至春不止久陰恆寒罷上元節遊幸降德音諸道八年十一月京師大雪多流民元符二年正月甲辰朔御大慶殿受朝賀以雪罷政和三年十一月大雨雪連十餘日不止平地八尺餘冰滑人馬不能行詔百官乘轎入朝飛鳥多死七年十二月大雪詔收養內外乞丐老幼靖康元年閏十一月大雪盈三尺不止天地晦冥或雪未下時陰雲中有雪絲長數寸墮地二年正月丁酉大雪天寒甚地冰如鏡行者不能定立是月乙卯車駕在青城大雪數尺人多凍死建炎三年六月寒紹興元年二月寒食日雪五年二月乙巳雨雪六年二月癸卯雪十三年三月癸丑雨雪十七年二月丙申雪十八年二月癸卯雪二十八年三月丙寅雨雪二十九年二月戊戌大雪三十一年正月戊子大雨雪至于己亥禁旅壘舍有壓者寒甚乾道元年二月大雪三月暴寒損苗稼二年春大雨寒至于三月損蠶麥二月丙申雪四年二月癸丑大雪五年二月戊子雪六年五月大風雨寒傷稼七年二月丙辰雨雪淳熙十二年淮水冰斷流是冬大雪自十二月至明年正月或雪或霰或雹或雨水冰沍尺餘連日不解台州雪深丈餘凍死者甚衆十六年四月戊子天水縣大雨雪傷麥紹熙元年三月留寒至立夏不退十二月建寧府大雪深數尺查源洞寇張海起民避入山者多凍死二年正月行都大雪積沍河冰厚尺餘寒甚是春雷雪相繼凍雨彌月四年二月己未雪慶元五年二月庚午雪六年二月乙酉雪五月亡暑氣如秋開禧三年二月戊申雪嘉定元年二月甲寅雪四年二月丙子雪六年二月丁亥雪六月亡暑夜寒九年二月乙酉丙申雪十年二月庚申壬戌雪十七年三月癸丑雪寶慶元年四月辛卯雪紹定四年二月己巳雨雪六年三月壬子雨雪端平元年二月癸酉雨雪二年三月乙未雨雪嘉熙二年二月乙未雨雪淳祐六年二月壬申雨雪寶祐元年二月壬子雨雪二年三月戊子雨雪六年二月雨雪開慶元年二月庚辰雨雪景定五年二月辛亥雨雪建隆三年春厭次縣隕霜殺桑民不蠶淳化三年三月商州霜花皆死景德四年七月渭州瓦亭砦早霜傷稼大中祥符九年十二月大名澶相州並霜害稼至和二年河東自春隕霜殺桑紹興七年二月庚申霜殺桑稼淳熙十六年七月階成鳳西和州霜殺稼幾盡紹熙三年九月丁未和州隕霜連三日殺稼是月淮西郡國稼皆傷嘉熙元年三月霜建隆元年十月臨清縣雨雹傷稼二年七月義川雲岩二縣大雨雹四年七月海州風雹乾德二年四月陽武縣雨雹宋州寧陵縣風雨雹傷民田六月潞州風雹七月同州郃陽縣雨雹害稼八月膚施縣風雹霜害民田三年四月尉氏扶溝二縣風雹害民田桑棗十損七八開寶二年風雹害夏苗太平興國二年六月景城縣雨雹七月永定縣大風雹害稼五年四月冠氏安豐二縣風雹七年五月蕪湖縣雨雹傷稼八年五月相州風雹害民田端拱元年三月霸州大雨雹殺麥苗閏五月潤州雨雹傷麥淳化元年六月許州大風雹壞軍營民舍千一百五十六區魚臺縣風雹害稼至道二年十一月代州風雹傷田稼咸平元年九月定州北平等縣風雹傷稼三年四月丁巳京師雨雹飛禽有隕者六年四月甲申京師暴雨雹如彈丸大中祥符三年丙申京師雨雹五年八月丙辰京師雨雹天禧元年九月鎮戎軍彭城砦風雹害民田八百餘畝天聖元年五月丙辰大雨雹二年七月壬午大雨雹六年京師雨雹嘉祐四年四月丙戌震雷雨雹熙寧元年秋鄜州雨雹三年七月七年四月五月京師雨雹八年夏鄜州涇州雨雹九年二月京師雨雹十年夏鄜州雨雹秦州大雨雹紹聖二年十月辛未西南方有雷聲次大雨雹四年閏二月癸卯京師雨雹自辰至申建中靖國元年二月丙申京師雨雹五月辛酉京師大雨雹崇寧三年十月辛丑京師雨雹大觀元年十月己巳三年五月戊申京師大雨雹政和七年六月京師大雨雹皆如拳或如一升器幾兩時而止宣和四年二月癸卯京師雨雹四年三月朔雨雹靖康元年十二月己卯庚辰京師雨雹建炎三年八月甲戌大雨雹紹興元年二月壬辰高宗在越州雨雹震雷二年二月丙子臨安府大雨雹三年正月雨雹震雷四年三月己未大雨雹傷稼五年閏月乙巳朔雨雹而雪十月丁未夜秀州華亭縣大風電雨雹大如荔枝實壞舟覆屋十二月戊辰雨雹七年二月癸丑雨雹先一夕雷後一日雪癸丑又雹八年六月丙辰大雨雹九年二月甲戌雨雹傷麥十二月辛未雨雹十年二月辛亥大雨雹十二月庚辰雨雹十一年正月辛酉雨雹十三年二月甲子雨雹傷麥五月戊午夜雹七月庚午壬申雹害稼十一月己未雨雹十七年正月庚辰雨雹五月丙寅又雹二十一年三月己卯雹傷禾麥二十八年四月辛亥雨雹二十九年二月戊戌雹損麥