body:
  text: 宋史卷四十四本紀第四十四理宗四二年春正月乙亥朔大元城利州閬州詔湘潭縣民陳克良孝行表其門二月甲辰朔詔太常釐正秦檜諡因諭輔臣曰諡繆狠可也熒惑犯權星乙巳詔利州統制呂達戰沒贈官四轉官一子承信郎一子下班祗應己酉余晦兼四川屯田使庚申詔饒州布衣饒魯不事科舉一意經學補迪功郎饒州教授辛酉日暈周匝戊辰故直華文閣李燔先儒朱熹門人賜諡文定三月壬午王元善使大元留七年來歸戊子雪詔蠲江淮今年二稅己丑詔録襄城功高達帶行環衛官遙郡團練使職任依舊王登行軍器監丞制司參議官程大元李和以下將士六千六百一十三人補轉官資有差甲午城東海賈似道以圖來上夏四月辛亥詔邊兵貧困可閔閒田甚多擇其近便者分給耕種制司守臣治之乙丑以徐清叟知樞密院兼參知政事董槐參知政事六月壬寅朔罷臨安府臨平鎮稅場甲辰四川制司言合州廣安軍北兵入境王堅曹世雄等戰禦有功詔堅官兩轉餘各補轉官資甲寅侍御史吳燧等論故蜀帥余玠聚斂罔利七罪玠死其子如孫盡竊帑庾之積以歸詔簿録玠家財以李曾伯為資政殿學士依舊節制四川丙辰利州王佐堅守孤壘降將南永忠以兵薄城下佐罵之永忠流涕而退初隆慶教授鄭炳孫不從南永忠降先縊殺其妻女亦朝服自縊詔奬諭佐進官一秩炳孫贈朝奉郎直祕閣仍訪其子官以文資王伯大乞致仕詔進一秩允所請丁巳以賈似道同知樞密院事職任依舊庚午詔余晦赴闕閏六月壬申董槐疏蜀事孔棘願假臣宣撫之名置司夔門以通荊蜀上優詔答曰士大夫以事功自勉者鮮卿請帥蜀足見忠壯然經理西事當在廟堂宜竭謀猷以副委任詔蒲擇之暫權四川制置司事甲戌録嘉定戰功先是大元兵圍城五旬帥守俞興元用等夜開關力戰而圍解詔俞興等十六人各官五轉將士補轉有差以包恢提點浙西刑獄招捕荻浦鹽寇乙亥台州海寇積年民罹其害路分董橚洎進士周自中等擒獲詔橚官一轉餘推賞有差壬午以李曾伯為四川宣撫使兼京湖制置大使進司夔路詔賜曾伯同進士出身罷江灣浮鹽局戊戌大元使離揚州北歸秋七月己酉詔前蜀帥余玠鎮撫無狀兵苦於征戍民困於徵求茲俾其家輸所取蜀財犒師振民並邊諸郡田租其復三年詔思播兩州連年扞禦其守臣田應庚楊文各官一轉餘推恩詔賈似道開閫以樞密行府為名庚戌有流星大如太白甲寅故光祿大夫賈涉諡忠肅壬戌復安西堡己巳荻浦海寇平包恢進直龍圖閣劉達授橫行帶遙郡李性傳赴闕以王堅為興元都統兼知合州八月乙亥詔以前知閬州兼利西安撫王惟忠付大理獄尋命臺臣監鞫辛巳徐清叟乞罷機務詔不允癸巳謝方叔等上玉牒日曆會要及七朝經武要略中興四朝志傳詔方叔徐清叟董槐等各進秩戊戌籍王惟忠家財九月辛亥祀明堂大赦辛酉詔詣西太一宮為國祈祥起居郎牟子才再疏諫而止丙寅詔戒外戚毋干請詔山陰蕭山諸暨會稽四縣水其除今年田租丁卯太白晝見冬十月庚午朔謝方叔等進寶祐編吏部七司續降條令癸酉皇子進封忠王甲午斬王惟忠于都市丁酉追削余玠資政殿學士奪余晦刑部侍郎告身戊戌段元鑑上隆慶堡戰功十一月壬寅日南至忠王冠丁未大元城光化舊治十二月庚午排保甲行自實法癸未雷四川苦竹隘捷至甲午隆慶部兵周榮被獲歸北密約段元鑑入隘解圍事覺就禽不屈而死馬徽白端戰歿詔四川宣撫司為之立廟安西堡受攻五月將士力戰解圍居民以資糧助軍實詔四川宣撫司具名推恩在城人普賞一資復租賦五年余玠男如孫徵所認錢三千萬將足詔如孫削三秩勒停三年春正月己未迅雷巴州捷至庚申城均州龍山起居郎牟子才上疏言元夜張燈侈靡倡優下賤奇技獻笑媟汙清禁上纍聖德今因震霆示威臣願聖明覺悟天意可回帝納其言壬戌詔宗正寺所擬宗子名以用宜季次紹五字續大由友嗣甫之下二月乙亥詔右千牛衛上將軍乃猷授蘄州防禦使奉沂靖惠王祠事兼給事中王野言國家與大元本無深仇而兵連禍結皆原於入洛之師輕啓兵端二三狂妄如趙楷全子才劉子澄輩輕而無謀遂致隻輪不返全子才誕妄慘毒今乃援劉子澄例自陳改正乞寢二人之命罷其祠祿以為喪師誤國之戒從之己卯復廣陵堡城賈似道以圖來上壬午詔發緡錢二百萬給四川調度乙酉詔以告身祠牒新會香鹽命臨安府守臣馬光祖收換兩界舊敝會子三月己酉詔沿邊耕屯課入登羡管屯田官推賞荊襄兩淮及山寨如之庚戌邵武寇平癸丑詔自實法宜寬期限監司守臣其嚴戢吏姦毋煩擾民以吳淵為觀文殿學士京湖制置使知江陵府己未雨土夏四月乙酉以江萬里知福州福建安撫使五月久雨丁未以監司州郡辟書冗濫詔申嚴禁止己酉李性傳薨辛酉太陰入畢嘉定大雨雹與南同日地震浙西大水六月辛未大風甲戌太陰入氐丙戌李全子松壽葺舊海城窺海道賈似道調兵敗之敕書奬諭趣上立功等第姓名推賞戊子洪天錫劾內官盧允叔董宋臣疏不報竟去詔遷太常少卿辛卯王野以御史胡大昌言罷給事中依舊端明殿學士提舉洞霄宮秋七月辛丑太陰入氐癸丑以呂文德知鄂州節制鼎澧辰沅靖五州丙辰謝方叔徐清叟以御史朱應元言罷辛酉有流星大如太白詔三省樞府機政令董槐程元鳳輪日判事取旨壬戌以謝方叔為觀文殿大學士提舉臨安府洞霄宮八月乙丑朔以董槐為右丞相兼樞密使程元鳳簽書樞密院事權參知政事蔡抗為端明殿學士同簽書樞密院事徐清叟資政殿學士提舉玉隆萬壽宮任便居住丁卯歲星熒惑在柳己巳太陰在氐馬光祖兼節制和州無為安慶三郡屯田使丙子鄭性之薨庚寅福建安撫江萬里以臺臣李衢言罷新命提舉武夷山沖佑觀辛卯應薨九月甲午朔雷丙午以徐清叟為資政殿學士提舉洞霄宮丙辰陳顯伯兼資善堂翊善皮龍榮兼資善堂贊讀壬戌權中書舍人陳大方言劉子澄端平入洛之師賈勇贊決北兵方入唐州界子澄巳率先遁逃一敗塗地二十年來為國家患者皆原於此宜投之四裔詔罷子澄祠祿冬十月甲戌太白晝見丁丑有流星出自畢十一月丁巳熒惑犯太微垣上相星十二月乙丑嗣濮王善奐薨丙子少傅節度使與歡薨贈少師追封奉化郡王四年春正月乙未詔謝方叔奪職罷祠謝修削三秩勒停乙巳太陰犯歲星己酉太陰犯熒惑辛亥以吳淵為京湖制置使兼夔路策應使軍馬急切便宜行事庚申蜀閫奏捷辛酉詔史嵩之觀文殿大學士依前金紫光祿大夫永國公致仕二月戊辰雨雹丙子詔襲封衍聖公孫孔洙添差通判吉州不釐務三月壬寅以少師嗣榮王與芮為太傅乙卯日暈周匝丙辰帝製字民訓賜改秩親民官夏四月庚午月暈周匝癸未以程元鳳參知政事蔡抗同知樞密院事賈似道參知政事職任依舊李曾伯資政殿大學士福建安撫使吳淵進二秩職任依舊吳潛沿海制置使判慶元府馬光祖煥章閣直學士職任依舊五月甲午孫夢觀兼資善堂贊讀章鑑兼資善堂直講先聖五十代孫孔元龍賜迪功郎授初品官甲辰羅氏鬼國遣報思播言大元兵屯大理國取道西南將大入邊詔以銀萬兩使思播結約羅鬼為援徐清叟奪資政殿大學士罷祠祿王野奪端明殿學士罷祠仍褫執政恩數丁未太白晝見詔申嚴老鼠隘防戍襄樊閫臣奏捷甲寅賜禮部進士文天祥以下六百一人及第出身有差六月甲戌朱祀孫太府寺簿知瀘州兼潼川路安撫任責瀘長寧邊防浙江堤成癸未董槐罷臺臣丁大全既纍疏擊之辭極詆毀且以臺牒役隅兵夜半迫槐出關物論殊駭三學生屢上書以為言詔以槐為觀文殿大學士提舉臨安府洞霄宮詔程元鳳蔡抗可輪日判事軍國重務取旨丁亥太白入井秋七月甲寅知州史俊調舟師與大元兵戰凡十三合詔俊官三轉仍帶閣門行宣贊舍人乙卯以程元鳳為右丞相兼樞密使蔡抗參知政事張磻端明殿學士簽書樞密院事八月甲子程元鳳上疏言正心待臣進賢愛民備邊守法謹微審令八事九月壬辰西南蕃呂告蠻目寧名天兄弟慕義與烏蘇蠻合力為國禦難詔各補承信郎丙申知雍州程芾以貪暴詔削二秩罷之甲寅監察御史朱熠言境土蹙而賦斂日繁官吏增而調度日廣景德慶曆時以三百二十餘郡之財賦供一萬餘員之奉祿今日以一百餘郡之事力贍二萬四千餘員之冗官邊郡則有科降支移內地則缺經常納解欲寬民力必汰冗員帝納焉冬十月壬戌太陰犯斗十一月戊子朔荊襄閫臣以功狀來上詔推賞將士戊戌京湖繼上戰功詔蜀罹兵革吾民重困所當勞來撫摩使之樂業比聞官吏乃肆誅求殊失培植邦本之意自今四川制司戒飭屬郡違者罪無赦御史臺其嚴覺察乙巳以監察御史吳衍翁應弼劾太學武學生劉黻等八人不率詔拘管江西湖南州軍宗學生與等七人並削籍拘管外宗正司癸丑以張磻同知樞密院事丁大全端明殿學士簽書樞密院事馬天驥端明殿學士同簽書樞密院事詔戒羣臣洗心飭行毋縱于貨賄其或不悛舉行淳熙成法又開國以來勳臣之裔有能世濟其美而不世其祿者所在州郡以聞參知政事蔡抗輒擅去國勉留不返詔授職豫祠尋以林存言寢其命十二月戊午朔熒惑犯填星庚申大元城棗陽乙丑以張磻兼參知政事甲戌奬諭荊閫吳淵其有功將士趣上姓名等第推賞五年春正月丁亥朔以趙葵為少保寧遠軍節度使京湖宣撫使判江陵府兼夔路策應大使進封衛國公賈似道進知樞密院事職任依舊吳淵參知政事李曾伯荊湖南路安撫使兼知潭州吳潛趙與各官一轉乙巳雷丙午禁姦民作白衣會監司郡縣官等失覺察者坐罪辛亥吳淵薨贈少師諡莊敏二月戊午四川嘉定上戰功以賈似道為兩淮安撫使辛酉命趙葵兼湖廣總領財賦余晦淮西總領財賦壬戌築思州三隘丁丑布衣余一飛高嵵陳襄陽備禦策詔命趙葵行之夏四月丁卯詔襄陽安撫高達以白河戰功轉行右武大夫帶遙郡防禦使王登以沮河督戰官一轉升直祕閣並職任依舊己卯大元兵攻苦竹隘詔京湖調兵應援閏四月己丑程元鳳等進玉牒日曆會要經武要略及中興四朝志傳甲午詔徐敏子嚴防雍宜己酉以呂文德知靖州職任依舊祈雨五月庚申雨丁卯城荊山置懷遠軍荊山縣詔賈似道官兩轉戊寅詔京湖沿江海道嚴備舟師防遏辛巳復劍門壘賞蒲擇之官兩轉朱祀孫蒲黼楊大淵韓勇各官四轉壬午夏貴正任吉州刺史帶御器械鎮江駐劄都統制知懷遠軍六月丙戌太白歲星合于翼辛卯太陰入氐丁酉祈雨馬天驥以臺臣言罷詔依舊端明殿學士提舉臨安洞霄宮秋七月丙辰祈雨戊午雨己未太白晝見丁卯有流星大如桃丙子太陰入井八月丙戌光化軍奏捷台州火癸巳詔謝方叔仍舊職蔡抗以資政殿學士並領祠在京甲午給事中邵澤等言謝方叔罪狀詔寢祠命丙申京城火庚子以張磻參知政事丁大全同知樞密院事兼權參知政事己酉史嵩之薨贈少師諡莊肅九月壬子朔詔今後臺臣遷他職輒出關以違制論仍著為令辛酉祀明堂大赦冬十月庚寅張磻薨贈少師癸巳雷甲午虹見丁酉以林存簽書樞密院事庚子詔皇子忠王授鎮南遂安軍節度使皇女進封升國公主十一月丙辰李曾伯兼節制廣南任責邊防乙丑奬諭安南國賜金器幣香茗乙亥詔京湖帥臣黃平清浪平溪分置屯戍庚辰詔三邊郡縣官毋擅離職守諸制帥臣其嚴糾察十二月壬午李曾伯依舊資政殿學士湖南安撫使兼廣南制置使移司靜江府丁未熒惑入氐六年春正月辛亥朔以丁大全參知政事兼同知樞密院事林存兼權參知政事癸亥詔出封樁庫銀萬兩付蜀閫辛未詔授成穆皇后弟太師郭師禹孫善庸承務郎仍免銓注差癸酉罷李曾伯廣西經略以廣南制置大使兼知靜江府其經略司官屬改充制司官屬甲戌詔樞密院編修官呂逢年詣蜀閫趣辦關隘屯柵糧餉相度黃平思播諸處險要緩急事宜具工役以聞戊寅雷二月辛巳朔以馬光祖為端明殿學士京湖制置使知江陵府兼夔路策應湖廣總領財賦並屯田事壬辰雨土三月辛亥朔祈雨丙辰馬光祖請以呂文德王鑑王登汪立信等充制司參議官及辟制司準備差使等官詔光祖開閫之初姑從所請戊辰以馬光祖兼荊湖北路安撫使庚午熒惑退入氐甲戌詔湖北提點刑獄文復之移司江陵兼京湖制司參議官夏四月庚辰朔詔自冬徂春天久不雨民失東作自四月一日始避殿減膳仰答譴告癸未程元鳳等以久旱乞解機務詔不允甲申大雨丙申羣臣三表請御正殿從之丁酉詔田應己思州駐劄御前忠勝軍副都統制往播州共築關隘防禦己亥臺臣朱熠劾沿江制置副使呂好問黃州之役貪酷誤事詔褫職乙巳程元鳳罷以觀文殿學士判福州尋提舉洞霄宮丙午趙葵三辭免福建安撫使詔授醴泉觀使兼侍讀丁未以丁大全為右丞相兼樞密使林存同知樞密院事兼權參知政事朱熠端明殿學士簽書樞密院事五月庚戌朔詔襄樊解圍高達程大元應援李和城守皆有勞績將士用命深可嘉尚其亟議行賞激癸丑詔懷遠漣水相繼奏功夏貴官兩轉兼河南招撫使毛興轉右武大夫並依舊任丁巳李曾伯言廣西多荒田民懼增賦不耕乞許耕者復三年租後兩年減其租之半守令勸墾闢多者賞之奏可丙寅命嗣榮王與芮判大宗正事丁卯嗣秀王師彌薨六月癸巳臺臣戴慶炣劾淮東總領趙與爻石奪職鐫秩秋七月庚戌城凌霄山詔朱祀孫進一秩易士英帶行閣門宣贊餘轉官有差癸丑熒惑犯房宿戊午趙葵四辭免醴泉觀使兼侍讀乞外祠從之戊辰蜀郡劉整上捷詔推恩賞癸酉知平江府余晦以臺臣戴慶炣言曩敗績于蜀誤國欺君詔奪寶章閣待制罷任追冒支官錢甲戌詔前福建漕臣高斯得已奪職鐫官其贓百餘萬嚴限徵償以懲貪吏乙亥呂文德入播州詔京湖給銀萬兩八月癸未太陰行犯熒惑戊戌詔上流鎖江防禦癸卯詔申嚴倭船入界之禁九月壬子詔蜀廣海道申嚴防遏甲寅詔安南情狀叵測申飭邊防戊辰安豐上戰功有流星透霞冬十月丙子朔詔蜀中將帥雖未克復成都而暴露日久戰功亦多宜與序升其亟條具以聞丁丑以俞興為四川制置副使知嘉定府兼成都安撫副使乙酉詔知隆慶府楊禮守安西堡有功官兩轉戊子大元兵攻通泰州庚寅廣南劉雄飛奏橫山之功詔雄飛官三轉部兵將校官兩轉辛卯詔常州江陰鎮江發米振贍淮民十一月己酉林存罷以資政殿學士知建寧府癸丑潁州上戰功詔亟推賞以示激厲詔追復余玠官職甲寅築黃平賜名鎮遠州呂逢年進一秩詔撫諭沿邊將士丙辰給事中張鎮言徐敏子曩帥廣右嗜殺黷貨流毒桂府詔仍舊羈管隆興府丁巳葉夢鼎依舊職知隆興府壬戌以朱熠同知樞密院事兼權參知政事饒虎臣端明殿學士同簽書樞密院事賈似道樞密使兩淮宣撫使甲子太陰犯權星丁卯東海失守賈似道抗章引咎詔令以功自贖特與放罪甲戌淮東帥臣奏大元兵退填星熒惑在危十二月戊寅詔改來年為開慶元年庚辰大元兵渡馬湖入蜀詔馬光祖時暫移司峽州六郡鎮撫向士璧移司紹慶府以便策應癸未房州上戰功丙戌詔置橫山屯丁亥向士璧不俟朝命進師歸州捐資百萬以供軍費馬光祖不待奏請招兵萬人捐奉銀萬兩以募壯士遂有房州之功詔士璧光祖各進一秩辛丑詔李曾伯城築關隘訓練民兵峒丁申嚴防遏填星太白熒惑合于室開慶元年春正月乙巳朔詔飭中外奉公法圖實政馬光祖與執政恩數李曾伯進觀文殿學士己酉大元兵攻忠涪漸薄夔境詔蒲擇之馬光祖戰守調遣便宜行事辛亥詔戍蜀將士頻年戰禦暴露可閔今申命蒲擇之從優犒師春防畢日即與更戍其輒逃歸者從軍令癸丑詔呂文德城黃平深入蠻地撫輯有方與官三轉庚申詔知賓州呂振龍知象州奚必勝兵至聞風先遁兵退乃返並追毀出身文字竄遠郡橫州守臣劉清卿設隘堅守與官一轉壬戌監察御史章士元言謝方叔帥蜀誤國詔方叔更與鐫秩其子修竄廣南癸亥左司諫沈炎言余晦壞蜀幕屬李卓王克己濟惡斂怨詔晦卓克己各奪兩官丙寅印應飛依舊職知鄂州兼湖北轉運使丁卯賈似道以樞密使為京西湖南北四川宣撫大使都大提舉兩淮兵甲湖廣總領知江陵府蜀帥蒲擇之以重兵攻成都不克大元兵破利州隆慶順慶諸郡閬蓬廣安守將相繼納降又造浮梁于涪州之藺市戊辰以李庭芝權知揚州二月乙亥朔詔京西提刑王登提兵援蜀功未及成齎志以歿贈官五轉致仕恩外仍官一子庚辰以趙與為觀文殿學士兩淮安撫制置使兼知揚州乙酉出內庫緡錢三千萬助邊用丙戌以馬光祖為資政殿學士沿江制置使江東安撫知建康府行宮留守己丑詔蠲建康太平寧國池州廣德等處沙田租壬辰詔蠲漣水軍制司所收屯田租乙未發平糶倉米三萬減直振在京民辛丑涪州報大元兵退三月庚戌詔印應雷黃夢桂赴都堂禀議命有司縣重賞募將士毀藺市浮梁癸丑詔蜀死節臣雲頂山諸處將士咸褒録其後丁巳以呂文德為保康軍節度使四川制置副使兼知重慶府庚申馬光祖奏大元兵自烏江還北辛酉雨土夏四月甲戌朔以段元鑑楊禮堅守城壁歿于王事詔各贈奉國軍節度使封二字侯立廟賜額致仕恩外更官一子成忠郎丁丑以向士璧為湖北安撫副使知峽州兼歸峽施珍南平軍紹慶府鎮撫使甲申詔守合州王堅嬰城固守百戰彌厲節義為蜀列城之冠詔賞典加厚乙酉知施州謝昌元自備緡錢百萬米麥千石築郡城有功詔官一轉乙未詔賜夏貴溧陽田三十頃丙申以呂文德兼四川總領財賦五月甲辰朔城金州開州辛亥雨雹乙卯達州上呂文德等戰功詔遷補有功將士丁巳詔湖北諸郡去年旱潦飢疫令江陵常澧嶽壽諸州發義倉米振糶仍嚴戢吏弊務令惠及細民乙丑行開慶通寶錢辛未賜禮部進士周震炎以下四百四十二人及第出身有差婺州大水發義倉米振之六月甲戌呂文德兵入重慶詔諭四川軍民共奮忠勇效死勿去有功行賞靡間邇遐有能效順來歸悉當宥過加恤仍奬呂文德斷橋通道之功命兼領馬軍行司辛巳以朱熠參知政事饒虎臣同知樞密院事丙戌南平來報戰功戊戌詔申嚴海道防禦己亥詔奬諭賈似道壬寅以李庭芝直寶謨閣湖北安撫副使兼知峽州太白晝見秋七月辛亥太白入井癸亥蔡抗薨贈少保諡文肅以知播州楊文知思州田應庚守禦勤勞詔各官一轉八月甲申以濠州統制張斌柘塘之戰歿于王事贈官三轉仍與一子下班祗應乙酉降人來言大元憲宗皇帝崩于軍中戊子詔吳潛開閫海道勤勞三年屢疏求退依舊觀文殿大學士判寧國府特進崇國公辛卯命呂文德兼湖北安撫使庚子太白犯權星熒惑九月壬子賈似道表言大元兵自黃州沙武口渡江中外震動己未嗣濮王善騰薨庚申以吳潛兼侍讀奉朝請戴慶炣端明殿學士簽書樞密院事下詔責己勉諭諸閫進兵壬戌詔出內府緡錢千萬銀五萬兩帛五萬匹給宣司緡錢五百萬銀三萬兩帛三萬匹給沿江副司犒師詔已命御史陳寅趣淮東調兵五萬應援上流癸亥趙葵特進觀文殿大學士封衛國公判慶元府沿海制置使命侍御史沈炎往沿江制置副司趣兵援鄂渚再出內庫緡錢五百萬銀二萬兩帛二萬匹給兩淮制司緡錢二百萬銀萬兩帛萬匹給沿江制司以備軍賞戊辰太白犯熒惑己巳詔賈似道兼節制江西二廣人馬通融應援上流庚午合州解圍詔王堅寧遠軍節度使依前左領軍衛上將軍興元府駐劄御前諸軍都統制兼知合州節制軍馬進封清水縣開國伯冬十月辛未朔丁大全罷以觀文殿大學士判鎮江府壬申以吳潛為左丞相兼樞密使進封相國公賈似道為右丞相兼樞密使進封茂國公宣撫大使等如舊癸酉命趙葵為江東宣撫使馬光祖移司江州應援鄂州史巖之沿江制置副使移司壽昌軍應援鄂州丙子改封吳潛為慶國公丁丑詔給還浙西提舉常平司歲收上亭戶沙地租二百萬永勿復徵庚辰詔合州圍解宣閫制臣及二三大將之功宜加優賞呂文德授檢校少師李遇龍進三秩權刑部侍郎各賜金幣將佐以下進秩賜金有差詔自今月十一日始避殿減膳徹樂又詔比者蜀道稍寧然干戈之餘瘡痍未復流離蕩析生聚何資咨爾旬宣之寄牧守之臣輕徭薄賦一意撫摩恤軍勞民庶底興復其被兵百姓遷入城郭無以自存者三省下各郡以財粟振之壬午御史陳寅言知江州袁玠貪贓不悛殘賊州邑詔削玠五秩竄南雄州癸未丁大全落職罷新任乙酉雷丙戌以趙葵為沿江江東宣撫使置司建康任責捍禦癸巳向士璧權兵部侍郎湖南安撫使兼知潭州任責廣西邊防十一月壬寅以朱熠權知樞密院事饒虎臣戴慶炣並權參知政事癸卯呂文福帶遙郡防禦使河南招撫使知淮安軍詔追毀袁玠出身以來文字除名不移萬安軍戊申詔求直言辛亥舟師戰滸黃洲乙卯詔趙葵授少保觀文殿大學士江東西宣撫使進封益國公其饒信袁臨撫吉隆興官軍民兵並聽節制調遣咨訪罷行黜陟皆得便宜行事以緡錢五百萬銀五萬兩給其用丙辰詔選精鋭招信泗州千人揚州拱衛軍千人安豐濠州各千五百人赴京聽調遣庚申夏貴入見帝撫勞甚至閏十一月甲戌詔出內帑緡錢五千萬犒內外諸軍丁丑以向士璧為湖南制置副使餘職仍舊賜金帶己卯熒惑入氐癸未諸將陶林文通進兵有功詔林帶行遙郡刺史文通轉武功大夫賜銀有差甲申以印應雷為軍器監淮西總領財賦兼江東轉運判官呂文德檢校少傅京西湖北安撫使兼制置使知鄂州兼侍衛馬軍都指揮使己丑皮龍榮兼資善堂翊善庚寅陶林奏沼山寺戰功癸巳向士璧連以功狀來上乙未詔降周震炎第四甲出身丙申賈似道表大戰數合皆有功十二月己亥朔賈似道言鄂州圍解詔論功行賞丁未熒惑犯房宿鈎鈐星辛亥詔改來年為景定元年壬子改封吳潛為許國公賈似道為肅國公
