body:
  text: 宋史卷一百六十四志第一百一十七職官四御史臺祕書省殿中省太常寺宗正寺大宗正司附光祿寺衛尉寺太僕寺御史臺掌糾察官邪肅正綱紀大事則廷辨小事則奏彈其屬有三院一曰臺院侍御史隸焉二曰殿院殿中侍御史隸焉三曰察院監察御史隸焉凡祭祀朝會則率其屬正百官之班序咸平四年以御史二人充左右巡使分糾不如法者文官右巡主之武官左巡主之分其職掌糾其違失常參班簿祿料假告皆主之祭祀則兼監祭使掌受誓戒致齋檢視糾劾又有廊下使專掌入閣監食又有監香使掌國忌行香二使臨時充通稱曰五使元豐正官名於是使名悉罷御史大夫宋初不除正員止為加官檢校官帶憲銜有至檢校御史大夫者元豐官制行亦並除去中丞一人為臺長舊兼理檢使凡除中丞而官未至者皆除右諫議大夫權熙寧五年以知雜御史鄧綰為中丞初除諫議大夫王安石言礙近制止以綰為龍圖閣待制權御史中丞不遷諫議大夫自綰始九年鄧潤甫自正言知制誥為中丞以宰相屬官不可長憲府於是復遷右諫議大夫權元豐五年以承議郎徐禧為知制誥權中丞禧言中丞糾彈之任赴舍人院行詞疑若未安會官制行罷知制誥職乃以本官試中丞南渡初除官最多隆興後被擢寖少淳熙十年始除黃洽又三年再除蔣繼周臺諫例不兼講讀神宗命呂正獻亦止命時赴講筵中興兼者三人万俟𪅂羅汝楫皆以秦檜意慶元後司諫以上無不預經筵者矣侍御史一人掌二臺政殿中侍御史二人掌以儀法糾百官之失凡大朝會及朔望六參則東西對立彈其失儀者監察御史六人掌分察六曹及百司之事糾其謬誤大事則奏劾小事則舉正迭監祠祭歲詣三省樞密院以下輪治凡六察之事稽其多寡當否歲終條具殿最以詔黜陟百官應赴臺參謝辭者以拜跪書札體驗其老疾凡事經郡縣監司省曹不能直者直牒閣門上殿論奏官卑而入殿中監察御史者謂之𩹉行治平四年中丞王陶言奉詔舉臺官而才行可舉者多以資淺不應格乃詔舉三任以上知縣為𩹉行熙寧二年詔御史闕委中丞奏舉毋拘官職高下兼權三年孫覺薦秀州軍事推官李定對稱旨為太子中允權監察御史𩹉行由選人為御史自定始於是知制誥宋敏求蘇頌李大臨以定資淺封還詞頭不草制相繼罷去元豐八年裁減察官兩員餘許盡兼言事紹聖二年復置元祐元年詔臺諫官許二人同上殿又令六曹差除更改事畫黃到即報臺又改六察旬奏為季奏四年詔應臺察事已彈舉而稽違踰月者遇赦不得原減元符二年詔吏部守令課績最優者關臺考察不實者重行黜責崇寧二年都省申明臺官職在繩愆糾謬自宰臣至百官三省至百司不循法守有罪當劾皆得糾正政和六年詔在京職事官與外任按察官雖未升朝並赴臺參謝辭七年中丞王安石奏以本臺覺察彈奏事刊為一書殿中侍御史以上録本給付從之靖康元年監察御史胡舜陟言監察御史自唐至本朝皆論政事擊官邪元豐紹聖著于甲令崇寧大臣欲其便己遂更成憲乞令本臺增入監察御史言事之文詔依祖宗法又詔宰執不得薦舉臺諫官舊臺令御史上下半年分詣三省樞密院點檢諸房文字輪詣尚書六曹按察奉行稽違付受差失咸得彈糾渡江後稍闊不舉紹興三年始復其舊是年十一月殿中侍御史常同言元豐始置六察上自諸部寺監下至廩庫場務無不分隸以詔廢置而乃有寅緣申請乞不隸臺察者恐非法意宜遵舊制從之乾道二年詔自今非曾經兩任縣令不得除監察御史慶元二年侍御史黃黼言監察御史高宗時嘗置六員孝宗時置三員今分按之任止二人乞增置一員自後常置三員檢法一人掌檢詳法律主簿一人掌受事發辰勾稽簿書宋初置推直官二人專治獄事凡推直有四曰臺一推曰臺二推曰殿一推曰殿二推咸平中置推勘官十員元豐官制行定員分職𩹉行推直等官悉罷紹興初詔檢法主簿特令殿中侍御史奏辟紹熙中侍御史林大中以論事不合去所奏辟檢法官李謙主簿彭龜年亦乞同罷嘉定元年劉矩除檢法官范之柔除主簿以後二職皆闕乾道併省吏額前司主管班次二人正副引贊官二人入品知班三人知班五人書令史四人驅使官四人法司二人六察書吏九人貼司五人通引官三人三京留司御史臺管勾臺事各一人舊曰判臺以朝官以上充掌拜表行香糾舉違失令史二人知班驅使官書吏各一人中興以後不置祕書省監少監丞各一人監掌古今經籍圖書國史實録天文曆數之事少監為之二而丞參領之其屬有五著作郎一人著作佐郎二人掌修纂日曆祕書郎二人掌集賢院史館昭文館祕閣圖籍以甲乙丙丁為部各分其類校書郎四人正字二人掌校讐典籍判正訛謬各以其職隸於長二惟日曆非編修官不預歲於仲夏曝書則給酒食費尚書學士侍郎待制兩省諫官御史並赴遇庚伏則前期遣中使諭旨聽以早歸大典禮則長二預集議所以待遇儒臣非他司比宴設錫豫率循故事宋初置三館長慶門北謂之西館太平興國初於升龍門東北創立三館書院三年賜名崇文院遷西館書貯焉東廊為集賢書庫西廊分四部為史館書庫大中祥符八年創外院於右掖門外天禧初令以三館為額置檢討校勘等員檢討以京朝官充校勘自京朝幕職至選人皆得備選以內侍二人為勾當官通掌三館圖籍事孔目官表奏官掌舍各一人又有監書庫內侍一人兼監祕閣圖籍孔目官一人祕閣係端拱元年就崇文院中堂建閣以三館書籍真本並內出古畫墨迹等藏之淳化元年詔次三館置直閣以朝官充校理以京朝官充以諸司三品兩省五品以上官一人判閣事直閣校理通掌閣事掌繕寫祕閣所藏供御人裝裁匠十二人元豐五年職事官貼職悉罷以崇文院為祕書省官屬始立為定員分案四置吏八崇文院太平興國三年置端拱元年建祕閣於院中昭文館史館集賢院皆沿唐制立名但有書庫寓於崇文院廡下三館祕閣崇文院各置貼職官又有集賢殿修撰直龍圖閣校勘通謂之館職初英宗謂輔臣曰館閣所以育巂材比選數人出使無可者豈乏材耶歐陽修曰今取材路狹館閣止用選人編校書籍故進用稍遲上曰卿等各舉數人雖親戚世家勿避於是宰相琦公亮參知政事修概各薦五人未及試神宗登極先召十人試以詩賦而開封府界提點陳汝義別以奏對稱旨預試於是御史吳申言試館職者請策以經史及世務毋用辭賦遂詔自今試館職專用策論熙寧二年置崇文校書始除河南府永安主簿邢恕乃詔自今應選舉可用人並除校書候二年取旨除館職官五年以隸祕書省元祐初復置直集賢院校理自校理而上職有六等內外官並許帶恩數仍舊元立試中人館職法選人除正字京官除校書郎校書郎供職二年除集賢校理祕書郎著作佐郎比集賢校理著作郎比直集賢院直祕閣丞及三年除祕閣校理三年二月詔御試唱名日祕書丞至正字升殿侍立九月復試賢良于閣下五年置集賢院學士並校對黃本書籍官員紹聖初罷校對以編修日曆選本省易集賢院學士為殿修撰直院為直祕閣集賢校理為祕書校理十二月詔禮部本省長二定校讐之課月終具奏入伏午時減半過渡伏依舊從蘇軾之請又罷本省官任滿除館職法元符二年詔職事官罷帶館職悉復元豐官制崇寧五年詔館閣並除進士出身人政和五年四月詔祕書省殿以右文為名改集賢殿修撰為右文殿修撰是月駕詣景靈宮朝獻還幸祕書省詔曰延見多士歷覽藏書之府祖宗遺文在焉屋室淺狹甚非稱太平右文之盛宜重行修展八月詔祕書省移於新左藏庫以其地為堂七年詔類集所訪遺書名曰祕書總目宣和二年立定祕書省員額監少監丞並依元豐舊制著作郎以四員為額校書郎二員正字四員渡江後制作未遑紹興元年始詔置祕書省權以祕監或少監一員丞著作郎佐各一員校書正字各二員為額續又參酌舊制校書郎正字召試學士院而後命之自是採求闕文補綴漏逸四庫書略備即祕書省復建史館以修神宗哲宗實録選本省官兼檢討校勘以侍從官充修撰五年效唐人十八學士之制監少丞外置著作郎佐祕書郎各二人校書郎正字通十二人又移史館於省之側別為一所以增重其事九年詔著作局惟修日曆遇修國史則開國史院遇修實録則開實録院以正名實十三年詔復每歲曝書會是冬新省成少監遊操援政和故事乞置提舉官遂以授禮部侍郎秦熺令掌求遺書仍鑄印以賜置編定書籍官二人以校書郎正字充孝宗即位詔館職儲養人才不可定員乾道九年正字止六員淳熙二年監少並置皆前所未有除少監丞外以七員為額尋復詔不立額紹熙二年館職闕人上令召試二員謹加審擇取學問議論平正之人自是監少丞外多止除二員是時陳傅良上言請以右文祕閣修撰並舊館閣校勘三等為史官自校勘供職稍遷祕閣修撰又遷右文在院三五年如有勞績就遷次對庶幾有專官之效無冷局之嫌時論韙之然不果行中興分案四曰經籍曰祝版曰知雜曰太史吏額都副孔目官二人四庫書直官二人表奏官書庫官各一人守當官二人正名楷書五人守闕一人正貼司及守闕各六人監門官一人以武臣充專知官一人日曆所隸祕書省以著作郎著作佐郎掌之以宰執時政記左右史起居注所書會集修撰為一代之典舊於門下省置編修院專掌國史實録修纂日曆元豐元年詔宣徽院等供報修注事自今更不供起居院直供編修院日曆所四年十一月廢編修院歸史館官制行屬祕書省國史案六年詔祕書省長二毋得預著作修纂日曆事進書即繫銜以防漏泄如舊編修院法焉八年詔吏部郎中曾肇禮部郎中林希兼著作職事官兼職自此始元祐五年移國史案置局專掌國史實録編修日曆以國史院為名隸門下省更不隸祕書省紹聖二年詔日曆還祕書省宣和二年詔罷在京修書諸局惟祕書省日曆所係元豐國史案除著作郎官專管修纂日曆之事無定員外其分案編修日曆書庫官吏並依元豐法紹興元年初修皇帝日曆詔以修日曆所為名本省長二通行修纂三年詔宰臣提舉侍從官修撰十一月詔以修國史日曆所為名四年詔以史館為名十年詔依舊制併歸祕書省國史案以著郎佐修纂舊史館官罷歸元官尋復詔以國史日曆所為名續併修神宗哲宗寶訓隆興元年詔編類聖政所併歸日曆所依舊宰臣提領仍令日曆所吏充行遣會要所以省官通任其事紹興九年詔祕書省官讐校國朝會要逐官添給茶湯錢乾道四年詔尚書右僕射陳俊卿兼提舉編修國朝會要每遇提舉官開院過局就本省道山堂聚呈文字提舉諸司官承受官主管諸司官並令國史日曆所官兼五年令本省再加刪定以續修國朝會要為名九年祕書少監陳騤言編類建炎以後會要成書以中興會要為名並從之其後接續修纂並隸祕書省國史實録院提舉國史監修國史提舉實録院修國史同修國史史館修撰同修撰實録院修撰同修撰直史館編修官檢討官校勘檢閲校正編校官初紹興三年詔置國史院重修神宗哲宗實録以從官充修撰續以左僕射呂頤浩提舉國史右僕射朱勝非監修國史四年置直史館及檢討校勘各一員五年置修撰官二員校勘官無定員是時國史實録皆寓史館未有置此廢彼之分九年修徽宗實録詔以實録院為名仍以宰臣提舉以從官充修撰同修撰餘官充檢討無定員明年以未修正史詔罷史館官吏併歸實録院二十八年實録書成詔修三朝正史復置國史院以宰臣監修侍從官兼同修餘官充編修明年詔國史院以宰臣提舉置修國史同修國史共二員編修官二員又置都大提舉諸司官承受官諸司官各一員以內侍省官充隆興元年以編類聖政所併歸國史院命起居郎胡銓同修國史二年參政錢端禮權監修國史乾道元年參政虞允文權提舉國史皆前所未有二年詔置實録院修欽宗實録其修撰檢討官以史院官兼領四年實録告成詔修欽宗正史以右僕射蔣芾提舉四朝國史詔增置編修官二員續又增置三員淳熙三年特命李燾以祕書監權同修國史權實録院同修撰四年罷實録院專置史院十五年四朝國史成書詔罷史院復開實録院修高宗實録慶元元年開實録院修纂孝宗實録六年詔實録院同修撰以四員檢討官以六員為額嘉泰元年開實録院修纂光宗實録二年復開國史院自是國史與實録院並置矣實録院吏兼行國史院事點檢文字一人書庫官八人楷書四人太史局掌測驗天文考定曆法凡日月星辰風雲氣候祥眚之事日具所占以聞歲頒曆于天下則預造進呈祭祀冠昏及大典禮則選所用日其官有令有正有春官夏官中官秋官冬官正有丞有直長有靈臺郎有保章正其判局及同判則選五官正以上業優考深者充保章正五年直長至令十年一遷惟靈臺郎試中乃遷而挈壺正無遷法其別局有天文院測驗渾儀刻漏所掌渾儀臺晝夜測驗辰象鐘鼓院掌文德殿鐘鼓樓刻漏進牌之事印曆所掌雕印曆書南渡後並同隸祕書省長二丞郎輪季點檢算學元豐七年詔四選命官通算學者許于吏部就試其合格者上等除博士中次為學諭元祐元年初議者謂本監雖準朝旨造算學元未興工其試選學官亦未有應格竊慮徒有煩費乞罷修建崇寧三年遂將元豐算學條制修成敕令五年罷算學令附於國子監十一月從薛昂請復置算學大觀三年太常寺考究以黃帝為先師自常先力牧至周王朴以上從祀凡七十人四年以算學生併入太史局宣和二年詔並罷官吏殿中省監少監丞各一人監掌供奉天子玉食醫藥服御幄帟輿輦舍次之政令少監為之二丞參領之凡總六局曰尚食掌膳羞之事曰尚藥掌和劑診候之事曰尚醞掌酒醴之事曰尚衣掌衣服冠冕之事曰尚舍掌次舍幄帟之事曰尚輦掌輿輦之事六尚各有典御二人奉御六人或四人監門二人或一人又尚食有膳工尚藥有醫師尚醞有酒工尚衣有衣徒尚舍有幕士尚輦有正供等皆分隸其局又置提舉六尚局及管幹官一員舊殿中省判省事一人以無職事朝官充雖有六尚局名別而事存凡官隨局而移不領於本省所掌唯郊祀元日冬至天子御殿及禘祫后廟神主赴太廟供具繖扇而殿中監視祕書監為寄祿官而已元豐中神宗欲復建此官而度禁中未有其地但詔御輦院不隸省寺令專達焉初權太府卿林顏因按內藏庫見乘輿服御雜貯百物中乃乞復殿中省六尚以嚴奉至尊於是徽宗乃出先朝所度殿中省圖命三省行之而其法皆左正言姚祐所裁定是歲崇寧二年也三年蔡京上修成殿中省六尚局供奉庫務敕令格式並看詳凡六十卷仍冠以崇寧為名政和元年殿中省高伸上編定六尚供奉式靖康元年詔六尚局並依祖宗法又詔六尚局既罷格內歲貢品物萬數尚為民害非祖宗舊制其並除之御藥院勾當官無常員以入內內侍充掌按驗祕方以時劑和藥品以進御及供奉禁中之用舊制勾當御藥院遷官至遙領團練防禦者謂之暗轉干恩澤浸不可止嘉祐五年詔御藥院內臣如當轉出而特留者俟其出計所留歲月優遷之更不許纍計所遷資序非勾當御藥院而留者其出更不推恩典八人藥童十一人匠七人崇寧二年併入殿中省尚衣庫使副使舊曰內衣庫大中祥符二年改監官二人以內侍三班充掌駕頭服御繖扇之名物凡御殿大禮前一日請乘輿袞冕鎮圭袍服於禁中以待進御事已復還內庫典一人匠四人掌庫十人內衣物庫在文德殿後太平興國二年置受納匹段庫受納綾錦西川鹿胎綾羅絹匹段大中祥符元年併入監官二人以京朝官並內侍充舊三人以諸司使副及三班內侍充掌受納錦綺綾羅色帛銀器腰束帶料造年支準備衣服以待頒賜諸王宗室文武近臣禁軍將校時服並給宰臣親王皇親使相生日器幣兩府臣僚百官皇親轉官中謝朝辭特賜及大遼諸外國人使辭見銀器射弓衣帶典八人掌庫三十一人新衣庫在太平坊監官二人以諸司使副三班及內侍充掌受錦綺雜帛衣服之物以備給賜及邦國儀注之用並受納衣服以賜諸司丁匠諸軍監門二人以三班使臣充典十人掌庫五十五人朝服法物庫太平興國二年置後分三庫一在天安殿後一在右掖門內北廊一在正陽門外監官二人以諸司使副及三班內侍充掌百官朝服諸司儀仗之名物典三人掌庫三十人已上崇寧二年併入殿中省舊有裁造院針線院雜賣場後省併之太常寺卿少卿丞各一人博士四人主簿協律郎奉禮部太祝各一人卿掌禮樂郊廟社稷壇壝陵寢之事少卿為之二丞參領之禮之名有五曰吉禮曰賓禮曰軍禮曰嘉禮曰凶禮皆掌其制度儀式祭祀有大祠有小祠其犧牲幣玉酒醴薦獻器服各辨其等掌樂律樂舞樂章以定宮架特架之制祭祀享則分樂而序之凡親祠及四孟月朝獻景靈宮郊祀告享太廟掌贊相禮儀升降之節歲時朝拜陵寢則視法式辨具以授祠官凡祠事差官卜日齋戒皆檢舉以聞初獻用執政官則卿為終獻用卿則少卿為亞獻博士為終獻闕則以次互攝郊祀已頒御札則撰儀以進宮架鼓吹警場率前期按閲即習餘祀及朝會宴享上壽封册之儀物亦如之若禮樂有所損益及祀典神祇爵號與封襲繼嗣之事當考定者擬上於禮部凡太醫之政令以時行宋初舊置判寺無常員以兩制以上充丞一人以禮官久次官高者充別置太常禮院雖隸本寺其實專達有判院同知院四人寺與禮院事不相兼康定元年置判寺同判寺始並兼禮院事元豐正名始專其職分案五置吏十有一元祐三年詔太常寺置長二他寺監則互置紹聖中復舊制大觀元年應太常寺所被旨及施行典禮事季輪博士銓次成籍以備討論政和四年令祠事監察御史闕則以六曹郎官及館職攝充宣和三年令本寺因革禮五年一檢舉接續編修建炎初併省冗職惟太常大理不能詔太常少卿一員兼宗正少卿罷丞簿惟置博士一員紹興三年復置丞九年臣僚言元豐正名太常主議論者博士四人乞參稽舊典添置博士以稱朝廷搜補闕軼緝熙彌文之意詔添博士一員十年置簿一員十五年詔太常討論置籍田令續置太社令隆興元年併省博士一員主簿一員又以光祿寺併歸太常罷丞明年詔丞簿並依舊制分案九曰禮儀掌討論大慶典禮神祠道釋襲封定諡檢舉忌辰曰祠祭掌大中小祠祀差行事官並酒齊幣帛蠟燭禮料曰壇廟掌行室壇廟域陵寢曰大樂掌大樂教習樂舞鼓吹警場曰法物掌給納朝祭服曰廩犧掌歲中祠祭牲牢羊豕滌室曰太醫掌臣僚陳乞醫人補充太醫助教等曰掌法曰知雜並掌本寺條制雜務裁減吏額贊引使二人正禮直官二人副禮直官二人正名贊者七人守闕贊者七人私名贊者七人胥吏一人胥佐四人貼司一人書表司一人祠祭局供官十二人祭器司供官十人樂正三人鼓吹令一人本寺天樂祭器庫專知官一人庫子二人圓壇大樂禮器庫專知官一人庫子一人博士掌講定五禮儀式有改革則據經審議凡於法應諡者考其行狀撰定諡文有祠事則監視儀物掌凡贊導之事主簿掌稽考簿書協律郎掌律呂以和陰陽之聲正宮架特架樂舞之位大祭祀享宴用樂則執麾以詔作止之節舉麾鼓柷而樂作偃麾戞敔而樂止凡樂掌其序事奉禮郎掌奉幣帛授初獻官大禮則設親祠板位太祝掌讀册辭授摶黍以嘏告飲福則進爵酌酒受其虛爵郊社令掌巡視四郊及社稷壇壝掌凡掃除之事祭祀則省牲太廟令掌宗廟薦新七祀及功臣從享之禮籍田令掌帝籍耕耨出納之事植五穀蔬果藏冰以待用宮闈令率其屬以汛灑廟庭凡修治潔除之事提點管幹郊廟祭器所南郊太廟祭器庫提點朝服法物庫所朝服法物庫南郊什物庫太廟什物庫掌藏其器服以待祭祀朝會之用凡冠服視其等而頒於執事之臣教坊及鈐轄教坊所掌宴樂閲習以待宴享之用考其藝而進退之諸陵祠墳所掌先世后妃之墳園而以時獻享太醫局有丞有教授有九科醫生額三百人歲終則會其全失而定其賞罰太醫局熙寧九年置以知制誥熊本提舉大理寺丞單驤管幹後詔勿隸太常寺置提舉一判局二判局選知醫事者為之科置教授一選翰林醫官以下與上等學生及在外良醫為之學生常以春試取合格者三百人為額太學律學武學生諸營將士疾病輪往治之各給印紙書其狀歲終稽其功緒為三等第補之上等月給錢十五千毋過二十人中等十千毋過三十人下等五千毋過五十人失多者罰黜之受兵校錢物者論如監臨強乞取法三學生願預者聽受而禁邀求者又官制行隸太常禮部自政和以後隸醫學詳見選舉志孝宗隆興元年省併醫官而罷局生續以虞允文請依舊存留醫學科逐舉附試省試別試所更不置局權令太常寺掌行紹熙二年復置太醫局局生以百員為額餘並依未罷局前體例仍隸太常寺大晟府以大司樂為長典樂為二次曰大樂令秩比丞次曰主簿協律郎又有按協聲律製撰文字運譜等官以京朝官選人或白衣士人通樂律者為之又以武臣監府門及大樂法物庫以侍從及內省近侍官提舉所典六案曰大樂曰鼓吹曰宴樂曰法物曰知雜曰掌法國朝禮樂掌于奉常崇寧初置局議大樂樂成置府建官以司之禮樂始分為二五年二月因省冗員併之禮官九月復舊大觀四年以官徒廩給繁厚省樂令一員監官二員吏祿並視太常格宣和二年詔以大晟府近歲添置冗濫徼幸並罷不復再置宗正寺卿少卿丞主簿各一人卿掌宗派屬籍以別昭穆而定其親疏少卿為之二丞參領之凡修纂牒譜圖籍其別有五曰玉牒以編年之體帝系而記其歷數凡政令賞罰封域戶口豐凶祥瑞之事載焉曰屬籍序同姓之親而第其服紀之戚疏遠近曰宗藩慶系録辨譜系之所自出序其子孫而列其名位品秩曰仙源積慶圖考定世次枝分派別而系以本宗曰仙源類譜序男女宗婦族姓婚姻及官爵遷而著其功罪生死凡録以一歲圖以三歲牒譜籍以十歲修纂以進宋初舊置判寺事二人以宗姓兩制以上充闕則以宗姓朝官以上知丞事掌奉諸廟諸陵薦享之事司皇族之籍主簿一員以京官充舊自丞簿以上皆宗姓為之通署寺事初置卿少率命常參官判寺事大中祥符八年以兵部侍郎趙安易兼卿判寺趙世長改為知寺事九年始定丞郎以上兼卿給舍以下兼少卿郎中以下兼丞京官兼主簿其卿闕則丞以下行寺事而無知判之名元豐官制行詔宗正長二不專用國姓蓋自有大宗正司以統皇族也渡江後卿不常置少卿一人以太常兼紹興三年復置少卿一人五年復置丞十年置主簿隆興元年併省次年詔丞簿復舊制嘉定九年詔以宗學改隸宗正寺自此寺官又預校試之事分案二曰屬籍曰知雜吏額胥長一人胥史一人胥佐二人楷書二人貼書二人大宗正司景祐三年始制司以皇兄寧江軍節度使濮王知大宗正事皇姪彰化軍節度觀察留後守節同知大宗正事元豐正名仍置知及同知官各一人選宗室團練觀察使以上有德望者充丞二人以文臣京朝官以上充掌糾合族屬而訓之以德行道藝受其詞訟而糾正其愆違有罪則先劾以聞法例不能決者同上殿取裁若宮邸官因事出入日書于籍季終類奏歲録存亡之數報宗正寺凡宗室服屬遠近之數及其賞罰規式皆總之官屬有記室一人掌箋奏講書教授十有二人分位講授兼領小學之事舊制擇宗室賢者為知大宗正事次一人為同知其後位高屬尊者為判熙寧三年始以異姓朝臣二員知丞事置局為睦親廣親宅是歲省管幹睦親廣親宅及提舉郡縣主等宅官以其事歸宗正自熙寧中置丞始以都官員外郎張稚圭為之神宗疑用異姓王安石言前代宗正固有用庶姓者乃録春秋時公侯大夫事神宗曰此雖無前代故事行之何害安石曰聖人創法不必皆循前代所已行者於是召稚圭對而命之分案五置吏十有一元豐五年詔大宗正司不隸六曹其丞屬中書省奏差元祐四年詔宗室越本司訴事者罪之六年詔宗正按熙寧敕諸院建小學自八歲至十四歲首檢舉入學紹聖元年詔袒免外兩世孤遺貧乏者驗實廩給之四年詔宗室若婦女自外還京並報宗正崇寧三年詔大宗正及外宗正司將條貫事迹關宗正寺修纂圖牒政和三年詔以知大宗正事仲忽提舉宗子學事崇寧三年置南外宗正司于南京西外宗正司于西京各置敦宗院初講議司言宗室疏屬願居兩京輔郡者各置敦宗院其兩京各置外宗正司從之仍詔各擇宗室之賢者一人為知宗掌外居宗室詔復定宗學博士正録員數大觀四年罷政和二年復舊又詔敦宗院宗子有文藝行實衆所共知者許外宗正官考察以聞中興後以位高屬尊者為判大宗正事其知及同知如舊制又置知大宗正丞一員以文臣充掌糾合宗室而檢防訓飭之凡南班宗室磨勘遷轉襲封請給核其當否嫁娶房奩分析財産酌厚薄多寡而訂其議凡宗室除合該賜名外皆大宗正定名而後報宗正寺其餘遷授官資支給錢米考核以詔豫奪其不率教者以法拘之歲久知悔則除其過名復置南外宗正司西外宗正司以處宗室之在外者各仍舊制設敦宗院皆設知宗所在通判職官兼丞簿其糾合檢防訓飭如大宗正司西南外兩司闕知宗間令大宗正司選擇保明而後授之又各置教授以課其行藝南渡初先徙宗室於江淮於是大宗正司移江寧南外移鎮江西外移揚州其後屢徙後西外止於福州南外止於泉州又置紹興府宗正司蓋初隨其所寓而分管轄之乾道七年嘗欲移紹興府宗司於蜀不果後併歸行在嘉定間用臣僚言乞凡除授知宗須擇老成更練之人詔知宗正丞照百司例每日入局所以示增重宗盟之意玉牒所淳化六年始設局置官詔以皇宋玉牒為名建玉牒殿咸平初命趙安易梁周翰編屬籍始創規制大中祥符九年以知制誥劉筠夏竦為修玉牒官自後置一員或二員元豐官制行分隸宗正寺官寺丞王鞏奏玉牒十年一進並以學士典領自熙寧中范鎮進書之後神宗玉牒至今未修仙源類譜自慶曆中張方平修進之後僅五十年並無成書乞別立法其修玉牒及類譜官每二年一具草繳進從之紹聖三年應宗室賜名三祖下各隨祖宗之支子而下雖兄弟數多並為一字相連南渡後紹興十二年始建玉牒所提舉一人或二人以宰相執政為之以侍從官一人兼修宗正卿少而下同修纂先是宗正寺丞邵大受奏講求宗正寺舊掌之書曰皇帝玉牒曰仙源積慶圖曰宗藩慶系録曰宗支屬籍南渡四書散失今重加修纂仙源慶系屬籍總要合圖録屬籍三者而一之既無愧於昔矣獨玉牒一書未修宜搜訪討論以正九族以壯本支於是始置官如舊制分案五置吏十乾道八年詔玉牒殿主管香火差內侍三員武臣一員充並改作幹辦玉牒所殿光祿寺卿少卿丞主簿各一人卿掌祭祀朝會宴饗酒醴膳羞之事修其儲備而謹其出納之政少卿為之二丞參領之凡祭祀共五齊三酒牲牢鬱鬯及尊彝籩豆簠簋鼎俎鉶登之實前期飭有司辦具牲鑊視滌濯奉牲則告充告備共其明水火焉禮畢進胙于天子而頒于百執事之人分案五置吏十元祐三年詔長二互置政和六年二月監察御史王桓奏祭祀牢醴之具掌於光祿而寺官未嘗臨視請大祠以長二朔祭及中祠以丞簿監視宰割禮畢頒胙有故及小祠聽以其屬攝從之舊置判寺事一人以朝官以上充光祿卿少皆為寄祿元豐制行始歸本寺中興後廢併入禮部太官令掌膳羞割烹之事凡供進膳羞則辨其名物而視食之宜謹其水火之齊祭祀共明水明火割牲取毛血牲體以為鼎俎之實朝會宴享則供其酒膳凡給賜視其品秩而為之等元祐初罷太官令二年復置崇寧三年置尚食局太官令惟掌祠事法酒庫內酒坊掌以式法授酒材視其厚薄之齊而謹其出納之政若造酒以待供進及祭祀給賜則法酒庫掌之凡祭祀供五齊三酒以實尊罍內酒坊惟造酒以待餘用太官物料庫掌預備膳食薦羞之物以供太官之用辨其名數而會其出入翰林司掌供果實及茶茗湯藥牛羊司牛羊供應所掌供大中小祀之牲牷及太官宴享膳羞之用乳酪院掌供造酥酪油醋庫掌供油及鹽胾外物料庫掌收儲米鹽雜物以待膳食之須凡百司頒給者取具焉衛尉寺卿少卿丞主簿各一人卿掌儀衛兵械甲胄之政令少卿為之二丞參領之凡內外作坊輸納兵器則辨其名數驗其良窳以歸于武庫不如式者罰之時其曝涼而封籍其數若進御及頒給則按籍而出之每季委官檢視歲終上計帳于兵部掌凡幄帟之事大禮設帷宮張大次小次陳鹵簿儀仗長二晝夜巡徼察其不如儀者押仗官則前期稟差凡仗衛供羽儀節鉞金鼓棨戟朝宴亦如之宴享賓客供幕帟茵席視其敝者移少府軍器監修焉舊制判寺事一人以郎官以上充凡武庫武器歸內庫守宮歸儀鸞司本寺無所掌元豐官制行始歸本寺分案四置吏十元祐三年詔長二互置所隸官司十有三內弓箭庫南外庫軍器弓槍庫軍器弩劍箭庫掌藏兵杖器械甲胄以備軍國之用儀鸞司掌供幕帟供帳之事軍器什物庫宣德樓什物庫掌收貯什物給用則按籍而頒之左右金吾街司左右金吾仗司六軍儀仗司掌清道徼巡排列奉引儀仗以肅禁衛凡儀物以時修飭選募人兵而校其遷補之事中興後衛尉寺廢併入工部太僕寺卿少卿丞主簿各一人卿掌車輅牧之令少卿為之二丞參領之國有大禮供其輦輅屬車前期戒有司教閲象馬凡儀仗既陳則巡視其行列后妃親王公主執政官應給車乘者視品秩而頒之總國之馬政籍京都坊監畿甸牧地畜馬之數謹其飼養察其治療考蕃息損耗之實而定其賞罰焉死則斂其騣尾筋革入于官府凡閲馬差次其高下應給賜則如格歲終鈎覆帳籍以上駕部若有事于南北郊侍中請降輿升輅則卿授綏舊置判寺事一人以朝官以上充凡邦國牧車輿之政令分隸羣牧司騏驥院諸坊監本寺但掌天子五輅屬車后妃王公車輅給大中小祀羊元豐官制行始歸本寺分案五置吏十有八總局十有二元祐二年詔外監事令本寺依羣牧司舊法施行應內外馬事專隸太僕直達樞密院更不經尚書省及駕部三年詔省主簿一員崇寧二年詔太僕寺依舊制不治外事歸尚書駕部應馬事上樞密院所隸官司車輅院掌乘輿法物凡大駕法駕小駕供輦輅及奉引屬車辨其名數與陳列先後之序左右騏驥院左右天駟監掌國馬別其駑良以待軍國之用鞍轡庫應奉御馬鞍勒及以韉轡給賜臣下養象所掌調御馴象駝坊車營致遠務掌分養雜畜以供負載般運牧養上下監掌治療病馬及申駒數有耗失則送皮剝所元豐末廢畿內牧馬監元祐初置左右天坊聽民間承佃牧地紹聖元年依元豐法置孳生監中興後廢太僕寺併入兵部羣牧司制置使一人景德四年置以樞密使副為之至道三年罷而復置使一人咸平三年置以兩省以上官充副使一人以閣門以上及內侍都知充都監二人以諸司使以上充判官二人以京朝官充掌內外牧之事周知國馬之政而察其登耗焉凡受宣詔文牒則以時下於院監大事則制置使同簽署小事則專遣其副使都監多不備置判官都監每歲更出諸州巡坊監點印國馬之蕃息者又有左右廂提點隸本司都勾押官一人勾押官一人押司官一人鞍轡庫使副使監官二人以諸司副使及三班使臣內侍充掌御馬金玉鞍勒及給賜王公羣臣外國使並國信韉轡之名物勾管一人典五人掌庫十四人元豐併入太僕寺
