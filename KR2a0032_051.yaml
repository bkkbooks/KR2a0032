body:
  text: 宋史卷五十一志第四天文四二十八舍下西方奎宿十六星天之武庫一曰天豕一曰封豕主以兵禁暴又主溝瀆西南大星曰天豕目亦曰大將明動則兵水大出日食魯國凶邊兵起及水旱日暈為兵為火月食聚斂之臣有憂月暈兵敗糴貴將戮人疾疫月犯之其分亂歲星犯之近臣為逆守之蟲為災人飢盜起多獄訟久守北兵降色潤澤大熟守二十日以上兵起魯地逆行守之君好兵民流亡熒惑犯之環繞三十日以上將相凶大水民流守二十日以上魯地有兵動搖進退有赦舍歲大熟留臣下專權多獄訟守百日以上多盜填星入犯吳越有兵一曰齊魯一曰兵喪守之有貴女執政出入水泉溢太白犯之大水有兵霜殺物入則外兵入國晝見將相死辰星犯之江河決有兵為旱為火守之王者憂兵旱客星犯之有溝瀆事守則王者有憂軍敗賊臣在側入之破軍殺將舍留不去人飢出則為謀臣惑天子彗犯為飢為兵喪出則有水災星孛之其下兵出民飢國無繼嗣出則西北有兵起流星入犯之有溝瀆事破軍殺將乙巳占流星出入色黃白光潤文昌武偃赤如火光作聲為弓弩用一曰入則有聚衆事赤雲氣入犯為兵黃為天子喜黑則大人有憂按漢永元銅儀以奎為十七度唐開元游儀十六度舊去極七十六度景祐測驗同天溷七星在外屏南主天廁養豬之所一曰天之廁溷也暗則人不安移徙則憂土司空一星在奎南一曰天倉主土事凡營城邑浚溝洫修隄防則議其利建其功耕織彗客犯之水旱民流兵大起土功興客星守之有土功哭泣事黃雲氣入土功興移京邑策一星在王良北天子僕也主執策御流星彗孛客星犯之皆為大兵起天子自將于野近之下有謀亂者附路一星附一作傅在閣道南旁別道也一曰在王良東主太僕主禦風雨芒角則車騎在野星亡有道路之變不具則兵起太白熒惑入兵起彗孛犯之道路不通客星入馬賤蒼白雲氣入太僕有憂赤為太僕誅黃白太僕受賜黑為太僕死閣道六星在王良前飛道也從紫宮至河神所乘也一曰主輦閣之道天子游別宮之道也星不見則輦閣不通動搖則宮掖有兵彗孛客星犯之主不安國有喪白雲氣入有急事黑主有疾黃則天子有喜王良五星在奎北居河中天子奉車御官也其四星曰天駟旁一星曰王良亦曰天馬星動則車騎滿野一曰為天橋主禦風雨水道星不具或客星守之津梁不通與閣道近有江河之變星明馬賤暗則馬災太白熒惑入守為兵彗客犯之為兵喪天下橋梁不通流星犯大兵將出青雲氣入犯之王良奉車憂墜車雲氣赤王良有斧鑕憂外屏七星在奎南主障蔽臭穢軍南門在天大將軍南天大將軍之南門也主誰何出入星不明外國叛動搖則兵起明則遠方來貢按步天歌以上諸星俱屬奎宿以晉志考之王良附路閣道軍南門策星俱在天市垣別無外屏天溷土司空等星隋志有之而武密以王良外屏天溷皆屬于壁或以外屏又屬奎乾象新書以王良西一星屬壁東四星屬奎外屏西一星屬壁東六星屬奎與步天歌各有不合婁三星為天獄主苑牧犧牲供給郊祀亦為興兵聚衆明大則賦斂以時星直則有執主命者就聚國不安日食于婁宰相大人當之郊祀神不享日暈有兵大人多死月食其分后妃憂民飢月暈在春百八十日有赦又為糴貴三日內雨解之月犯多畋獵其分憂將死民流一曰多寃獄歲星犯之牛多死米賤有赦守之國安一曰民多疫六畜貴有兵自罷熒惑犯守為旱為火穀貴又曰守二十日以上大臣死星動人多死若逆行入成勾巳者國廩災填星犯之天子戒邊境不可遠行將兵凶守之穀豐民樂若逆行女謁行留舍于婁外國兵來太白犯之有聚衆事守之期三十日有兵民飢辰星犯之刑罰急多水旱大臣憂王者以赦除之守而芒角動搖色赤黑者臣下起兵客星犯為大兵守之五穀不成又曰臣惑主專政歲多獄訟環繞三日大赦彗星犯之民飢死出則先旱後水穀大貴六畜疾倉庫空又曰國有大兵星孛其分為兵為饑流星出犯之有法令清獄青赤雲氣入為兵喪黑為大水按漢永元銅儀以婁為十二度唐開元游儀十三度舊去極八十度景祐測驗婁宿十二度距中央大星去極八十度在赤道內十一度天倉六星在婁宿南倉穀所藏也待邦之用星近而數則歲熟粟聚遠而疏則反是月犯之主發粟五星犯兵起歲饑倉粟出熒惑太白合守軍破將死熒惑入軍轉粟千里近之天下旱太白犯之外國人相食兵起西北辰星守之大水客彗犯之五穀不成客星入歲饑糴貴流星入色赤為兵犯之粟以兵出色黃白歲大稔蒼白雲氣入歲饑赤為兵旱倉廩災黃白歲大熟右更五星在婁西秦爵名主牧師官亦主禮義星不具天下道不通太白熒惑犯守山澤兵起左更五星在婁東亦秦爵名山虞之官主山澤林藪竹木蔬菜之屬亦主仁智占同右更天大將軍十一星在婁北主武兵中央大星天之大將也外小星吏士也動搖則兵起大將出小星動搖或不具亦為兵旗直揚者隨所擊勝五星犯守大將憂客星守之大將不安軍吏以飢敗流星入大將憂蒼白雲氣犯之兵多疾赤為軍出天庾四星在天倉東南主露積占與天倉同按晉志天倉天庾在二十八宿之外天大將軍屬天市垣左更右更惟隋志有之乾象新書以天倉屬奎武密亦以屬奎又屬婁步天歌皆屬婁宿胃宿三星天之廚藏主倉廩五穀府也明則天下和平倉廩實民安動則輸運暗則倉空就聚則穀貴民流中星衆穀聚星小穀散芒則有兵日食大臣誅一曰乏食其分多疾穀不實又曰有委輸事日暈穀不熟月食王后有憂將亡亦為饑郊祀有咎月暈兵先動者敗妊婦多死又曰國主死天多雨或山崩有破軍歲星在暈內天子有德令月暈在四孟之月有赦熒惑在暈中為兵月犯之鄰國有暴兵天下饑外國憂穀不實民多疾變色將軍凶歲星犯之大人憂兵起守則國昌入則國令變更天下獄空若逆行五穀不成國無積蓄熒惑犯之兵亂倉粟出貴人憂守之旱饑民疫客軍大敗入則改法令牢獄空進退環繞勾巳凌犯及百日以上天下倉庫並空兵起填星犯之大臣為亂守之無蓄積有德令歲穀大貴若逆行守勾巳者有兵色赤兵起流血青則有德令辰星犯其分不寧守之有兵國有立侯巫咸曰為旱穀不成有急兵又逆行守之倉空水災客星犯之王者憂倉廩用退行入則有赦守之強臣凌國穀不熟乘之為火舍而不去人飢出其分君有憂彗星犯之兵動臣叛有水災穀不登星孛其分兵起王者惡之流星犯之倉庫空色赤為火災蒼白雲氣出入犯之以喪糴粟事黑為倉穀敗腐青黑為兵黃白倉實按漢永元銅儀胃宿十五度景祐測驗十四度天囷十三星如乙形在胃南倉廩之屬主給御廩粢盛星明則豐稔暗則饑月犯之有移粟事五星犯之倉庫空虛客彗入倉庫憂水火焚溺青白雲氣入歲饑民流亡大陵八星在胃北亦曰積京主大喪也中星繁諸侯喪民疫兵起月犯之為兵為水旱天下有喪月暈前足大赦五星入為水旱兵喪熒惑守之天下有喪客彗入民疫流星出犯之其下有積尸蒼白雲氣犯之天下兵喪赤則人多戰死積尸一星在大陵中明則有大喪死人如山月犯之有叛臣五星犯之天下大疾客彗犯有大喪蒼色雲氣入犯之人多死黑為疫天船九星在大陵北河之中天之船也主通濟利涉石申曰不在漢中津河不通明則天下安不明及移徙天下兵喪月犯之百川流溢津梁不通五星犯之水溢民移居彗星犯之為大水客星犯為水為兵青雲氣入天子憂不可御船赤為兵船用黃白天子喜天廩四星在昴宿南一曰天廥主蓄黍稷以供享祀春秋所謂御廩此之象也又主賞功掌九穀之要明則國實歲豐移則國虛黑而希則粟腐敗月犯之穀貴五星犯之歲饑客星犯倉庫空虛流星入色青為憂赤為旱為火黃白天下熟青雲氣入蝗饑民流赤為旱黑為水黃則歲稔積水一星在天船中候水災也明動上行舟船用熒惑犯有水按晉志大陵積尸天船積水俱屬天市垣天囷天廩在二十八宿之外武密以天囷大陵屬婁又屬胃天船屬胃又屬昴乾象新書天囷五星屬婁餘星屬胃大陵西三星屬婁東五星屬胃與步天歌互有不同昴宿七星天之耳目也主西方及獄事又為旄頭北星也又主喪昴畢間為天街天子出旄頭畢以前驅此其義也黃道所經明則天下牢獄平六星皆明與大星等為大水七星皆黃兵大起一星亡為兵喪搖動有大臣下獄及有白衣之會大而數盡動若跳躍者北兵大起一星獨跳躍而動北兵欲犯邊日食王者疾宗姓自立又占邊兵起日暈陰國失地北主憂趙地凶又云大饑月食大臣誅女主憂為饑邊兵起將死北地叛月歲三暈弓弩貴民饑暈在正月上旬有赦犯之為饑北主憂天子破北兵變色民流國亡下有暴兵有赦出昴北天下有福乘之法令峻大水穀不登歲星犯之獄空乘之陰國有兵北主憂守之王急刑罰獄空一曰臣下獄有解者守其北有德令又曰水物不成久守大臣坐法民饑留守破軍殺將熒惑犯守為兵為旱饑守東齊楚越地有兵守南荊楚有兵西則兵起秦鄭北則兵起燕趙又為貴人多死北地不寧入則有喜有赦天下無兵守而環繞勾巳為赦久守糴貴填星犯或出入守之北地為亂有土功五穀不成水火為災民疫又為女主失勢入則地動水溢宗廟壞留則大將出征太白入犯之大赦在東六畜傷在西六月有兵又曰守之北兵動將下獄晝見邊兵起出入留舍在南為男喪北為女喪辰星犯北主憂守之穀不成民饑久守為水為兵客星犯貴人有急北兵大敗讒人在內守之臣叛主兵起入則其分有喪彗星犯之大臣為亂出則邊兵起有赦星孛其分臣下亂有邊兵大臣誅流星出入犯之夷兵起乙巳占流星入北方來朝出則天子有赦令恤民蒼赤雲氣犯之民疫黑則北主憂青為水為兵青白人多喪黃則有喜按漢永元銅儀昴宿十二度唐開元游儀十一度舊去極七十四度景祐測驗昴宿十一度距西南星去極七十一度芻六星在天苑西一曰在天囷南主積之屬一曰天積天子之藏府星明則芻貴星盛則百庫之藏存無星則百庫之藏散月犯之財寶出辰星熒惑犯之芻有焚溺之患赤雲氣犯之為火黃為喜天陰五星主從天子弋獵之臣不明為吉明則禁言泄天河一星一作天阿在天廩星北晉志在天高星西主察山林妖變五星客彗犯之主妖言滿路卷舌六星在昴北主樞機智謀一曰主口語以知讒佞曲而靜則賢人升直而動多讒人兵起天下有口舌之害徙出漢外則天下多妄說星繁人多死月犯之天下多喪五星犯佞人在側彗客犯之侍臣憂天苑十六星在昴畢南如環狀天子養禽獸之苑明則禽獸牛馬盈不明則多瘠死不具有斬刈事五星犯之兵起客彗犯為兵獸多死流星入色黑禽獸多死黃則蕃息雲氣占同天讒一星在卷舌中主巫醫暗為吉明盛人君納佞言月一星在昴宿東南蟾蜍也主日月之應女主臣下之象又主死喪之事明大則女主大專太白熒惑守之臣下起兵為亂彗客犯之大臣黜女主憂礪石四星在五車星西主百工磨礪鋒刃亦主候伺明則兵起常則吉熒惑入邊兵起守之諸侯發兵客星守之為兵按晉志天河卷舌天讒俱屬天市垣天苑在二十八宿之外芻天陰月礪石晉志不載隋史有之武密又以芻屬胃卷舌屬胃又屬昴乾象新書以芻屬婁卷舌西三星屬胃東三星屬昴天苑西八星屬胃南八星屬昴步天歌以上諸星皆屬昴宿互有不合畢宿八星主邊兵弋獵其大星曰天高一曰邊將主四夷之尉也天官書曰畢為車明大則遠人來朝天下安失色邊兵亂一星亡為兵喪動搖則邊兵起移徙天下獄亂就聚則法令酷日食邊王死軍自殺其主遠國有謀亂日暈有邊兵不則北主憂又占有風雨月食有赦趙分有兵或趙君憂月暈兵亂饑喪暈三重邊有叛者七日內風雨解之又為陰國有憂天下赦犯畢大星下犯上大將死陰國憂入畢口多雨穿畢歲饑盜起失行離于畢則雨居中女主憂又曰犯北則陰國憂南則陽國憂歲星犯之冬多風雨又曰為水入畢口邊兵起民飢有赦守三十日客兵起出陽為旱陰為水熒惑犯右角大戰左角小戰入則邊兵憂守之為饑有赦成勾巳環繞大赦一曰入畢中有兵兵罷又曰守之有畋獵事北主憂天下道路不通入畢口有赦逆行至昴為死喪已去還守貴臣憂舍畢口趙國憂填星犯之兵起西北不戰守之兵有降軍有赦一曰土功徭役煩兵起入則地震水溢守畢口大人當之出入留舍其野兵起客軍死太白犯右角戰敗將死入畢口將相為亂大赦國易政令諸侯起兵為水五穀不成貫畢倉廩空四國兵起辰星犯之邊地災入畢口國易政守之水溢民病物不成邊兵起守畢口人為亂客星犯之大人憂無兵兵起有兵兵罷入則多獄事守之為饑邊兵起出為車馬急行彗星犯之北地為亂人民憂星孛其分土功興多徭役色蒼為饑破軍黃則女為亂白為兵喪黑為水流星犯之邊兵大戰色赤貫之戎兵大至入而復出為赦入而黃白有光外人入貢蒼白雲氣入歲不收赤為兵旱為火黃白天子有喜按漢永元銅儀畢十六度舊去極七十八度景祐測驗畢宿十七度距畢口北星去極七十七度天節八星在畢附耳南主使臣持節宣威四方明大則使忠不明則奉使無狀熒惑守之臣有謀逆或使臣死太白守之大將出客彗犯之法令不行客星守持節臣有憂九州殊口九星在天節南下曉方俗之官通重譯者也常以十一月候之亡一星一國憂二星以上天下亂兵起太白熒惑守之亦為兵客星入民憂水負海國不安有兵附耳一星在畢下主聽得失伺愆邪察不祥也星盛則中國微有盜賊邊候警外國反動搖則讒臣在君側歲星犯之為兵將相喪太白犯之佞臣在側九斿九星在玉井西南一曰在九州殊口東南北列主天下兵旗又曰天子之旗也太白熒惑犯之兵騎滿野客星犯諸侯兵起禽獸多疾天街二星在昴畢間一曰在畢宿北為陰陽之所分大象占近月星西街南為華夏街北為外邦又曰三光之道主伺候關梁中外之境明則王道正月犯天街中為中平天下安寧街外為漏泄讒夫當事民不得志不由天街主政令不行月暈其宿關梁不通熒惑守之道路絕久守國絕禮歲星居之色赤為殃或大旱太白守之兵塞道路六夷旄頭滅一曰民飢天高四星在坐旗西乾象新書在畢口東北臺榭之高主望八方雲霧氛氣今仰觀臺也不見為官失禮守常則吉微暗陰陽不和月五星犯之則水旱不時乘之外臣誅月暈不出六月有喪熒惑入十日為小赦留三十日大赦客彗守之大旱蒼白雲氣犯亦然諸王六星在五車南主察諸侯存亡明則下附上不明則下叛不見宗廟危四方兵起熒惑入之諸王妃恣為下所謀守之下不信上太白熒惑犯諸王當之一曰宗臣憂客彗守諸侯黜五車五星三柱九星在畢宿北五帝坐也又五帝之車舍也主天子五兵又主五穀豐耗一車主蕡麻一車主麥一車主豆一車主黍一車主稻米西北大星曰天庫主太白秦分及雍州主豆東北一星曰天獄主辰星燕趙分及幽冀主稻東南一星曰天倉主歲星魯分徐州衞分幷州主麻次東南一星曰司空主填星楚分荊州主黍粟次西南一星曰卿主熒惑魏分益州主麥天文錄曰太白其神令尉辰星其神風伯歲星其神雨師熒惑其神豐隆填星其神雷公此五車有變各以所主占之三柱一曰天淵一曰天休一曰天旂欲其均明闊狹有常星繁則兵大起石申曰天庫星中河而見天下多死人河津絕又曰天子得靈臺之禮則五車三柱均明有常天旂星不見則大風折木天休動則四國叛一柱出或不見兵半出三柱盡出及不見兵亦盡出柱外出一月穀貴三倍出二月三月以次倍貴外出不盡兩間主大水月犯天庫兵起道不通犯天淵貴人死臣踰主月暈女主惡之在正月為赦暈一車赦小罪五車俱暈赦殊罪四七十月暈之為水暈十一十二月穀貴五星犯為旱喪犯庫星為兵起歲星入之糴貴熒惑入之為火或與歲星占同填星入天庫為兵為喪舍中央為大旱燕代之地當之舍東北畜蕃帛賤舍西北天下安太白入之兵大起守五車中國兵所向慴伏舍西北為疾疫牛馬死應酒泉分辰星入舍為水犯之兵以水潦起客星犯則人勞庚寅日候近之為金車主兵甲寅日候近之為木車主槥增價戊寅日候近之為土車主土功丙寅日候近之為火車主旱壬寅日候近之為水車主水溢入之色青為憂赤為兵守天淵有大水守天休左為兵右為喪黃為吉彗孛犯之兵起民流流星入甲子日主粟丙午日主麥戊寅日主豆庚申日主蕡壬戌日主黍各以其日占之而粟麥等價增白雲氣入民不安赤為兵起天潢五星在五車中主河梁津渡星不見則津梁不通月入天潢兵起五星失度留守之皆為兵熒惑填星入之為大旱為火熒惑舍之牛馬疫為兵辰星出天潢有赦客星入為兵留守則有水害蒼白或黑雲氣入為喪赤為兵黃白則天子有喜咸池三星在天潢南主陂澤池沼魚鼈鳧鴈明大則龍見虎狼為害星不具河道不通月入為暴兵五星入為兵為旱失忠臣君易政守之為饑為兵客星入天下大水流星入為喪出則兵起雲氣入色蒼白魚多死赤為旱白為神魚見黑為大水參旗九星一曰天旗一曰天弓司弓弩候變禦難星如弓張則兵起明則邊寇動暗為吉又曰天弓不具天下有兵五星犯之兵起熒惑守之下謀上諸侯起兵一曰有邊兵太白守之兵亂客星守天下憂流星入北地兵起雲氣犯之色青入自西北兵來期三年天關一星在五車南亦曰天門日月之所行主邊方主關閉星芒角為兵不與五車合大將出月歲三暈有赦犯之有亂臣更法五星守之貴人多死歲星熒惑守之臣謀主為水為饑太白熒惑守之大赦關梁有兵太白入則大亂填星守王者壅蔽犯之臣謀主太白失行兵起客星犯之民多疾關市不通又曰諸侯不通民相攻客星入多盜流星犯之天下有急關梁不通民憂多盜黃雲氣犯四方入貢天園十三星在天苑南植菜果之處曲而菜果熟白雲氣犯之兵起按步天歌以上諸星皆屬畢宿武密書以天節屬昴參旗天關五車三柱皆屬觜與步天歌不同乾象新書以天節參旗皆屬畢天園西八星屬昴東五星亦屬畢五車北西南三大星屬畢東二星及三柱屬參說皆不同今皆存之觜觿三星為三軍之候行軍之藏府葆旅收斂萬物明則軍糧足將得勢動則盜賊行葆旅起暗則不可用兵日食臣犯主戒在將臣暈及三重其下穀不登民疫五重大赦期六十日月食為旱大將憂有叛主者正月月暈有赦外軍不勝大將憂偏裨有死者歲星犯之其分兵起守則農夫失業后有憂丁壯多暴死下有叛者民多疾疫入則多盜天時不和國君誅伐不當則逆行熒惑犯之其分有叛者為旱為火為兵起為糴貴與觜觿合趙分相憂入則其下有兵填星入犯為兵為土功其分失地女主恣則填星逆行而色黃太白犯之兵起守之其分易令大臣叛物不成民疫辰星犯之不可舉兵一曰趙地水有叛者守之趙分饑客星出入其宿青為憂赤為兵黑為水白為喪黃白為吉彗星犯之兵起出入其分失地民流星孛之為兵亂軍破其色與客星同占流星入犯之有叛者有破軍雲氣犯之赤為兵蒼白為兵憂黑趙地大人有憂色黃有神寶入按漢永元銅儀唐開元游儀皆以觜觿為三度舊去極八十四度景祐測驗觜宿三星一度距西南星去極八十四度在赤道內七度坐旗九星在司怪西北君臣設位之表也星明則國有禮司怪四星在井鉞星前主候天地日月星辰變異鳥獸草木之妖明主聞災修德保福星不成行列宮中及天下多怪按步天歌坐旗司怪俱屬觜宿武密書及乾象新書皆屬于參參宿十星一曰參伐一曰天市一曰大辰一曰鈇鉞主斬刈萬物以助陰氣又為天獄主殺秉威行罰也又主權衡所以平理也又主邊城為九譯故不欲其動參為白虎之體其中三星橫列者三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍參應七將中央三小星曰伐天之都尉主鮮卑外國不欲其明七將皆明大天下兵精王道缺則芒角張伐星明與參等大臣有謀兵起失色軍散敗芒角動邊有急兵起有斬伐之事星移客伐主肩細微天下兵弱左足入玉井中兵起秦有大水有喪山石為怪星差戾王臣貳左股星亡東南不可舉兵右股則主西又曰參足移北為進將出有功徙南為退將軍失勢三星疏法令急日食大臣憂臣下相殘陰國強日暈有來和親者一曰大饑月食其度為兵臣下有謀貴臣誅其分大饑外兵大將死天下更令月暈將死人殃亂戰不利月犯貴臣憂兵起民飢犯參伐偏將死歲星犯之水旱不時大疫為饑守之兵起民疫入則天下更政熒惑犯之為兵為內亂秦燕地凶守之為旱為兵四方不寧逆行入則大饑填星犯之有叛臣守之其下國亡姦臣謀逆一云有喪后夫人當之逆行留守兵起太白犯之天下發兵守之大人為亂國易政邊民大戰辰星犯之為水為兵貴臣黜辰星與參出西方為旱大臣誅逆守之兵起客星入犯之國內有斬刈事守之邊州失地環繞者邊將有斬刈事彗星犯之邊兵敗君亡遠期三年貫之色白為兵喪星孛于參君臣俱憂國兵敗流星入犯之先起兵者亡乙巳占曰流星出而光潤邊安有赦獄空青雲氣入犯之天子起邊城蒼白為臣亂赤為內兵黃色潤澤大將受賜黑為水災大臣憂白雲氣出貫之將死天子疾按漢永元銅儀參八度舊去極九十四度景祐測驗參宿十星十度右足入畢十三度玉井四星在參左足下主水泉以給庖廚動搖為憂客星入為水為喪國失地出則國得地一云將出流星入為大水雲氣入而色青井水不可食屏二星一作天屏在玉井南一云在參右足星不具人多疾不明大人寢疾星亡王多病月五星犯之為水客星出于屏亦為大人有疾彗星犯之水旱不時軍井四星在玉井東南軍營之井主給師濟疲乏月犯芻財寶出熒惑入為水兵多死太白入兵動民不安客星入憂水害廁四星在屏星東一曰在參右脚南主溷色黃為吉歲豐青黑人主腰下有疾星不具則貴人多病客星入為穀貴彗孛入歲饑青雲氣入為兵黑為憂黃則天子有喜天屎一星在天廁南色黃則年豐凡變色為蝗為水旱為霜殺物常以秋分候之星亡不見天下荒星微民多流按步天歌玉井軍井廁各四星屏二星天屎一星俱屬參宿晉志玉井在參左足武密書屬觜乾象新書屬畢軍井晉志在玉井南武密亦屬觜乾象新書亦屬畢唐開元游儀在玉井東南屏廁天屎晉志皆不載隋志屏在玉井南開元游儀在觜隋志廁在屏東屎在廁南乾象新書皆屬參與步天歌互有不合南方東井八星天之南門黃道所經七曜常行其中為天之亭候主水衡事法令所取平也武密占曰井中為三光正道五緯留守若經之皆為天下無道不欲明明則大水又占曰用法平井宿明鉞一星附井宿前主伺奢淫而斬之明大與井宿齊則用鉞於大臣月宿其分有風雨日食秦地旱民流有不臣者暈則多風雨有青赤氣在日為冠天子立侯王月食有內亂大臣黜后不安五穀不登分有兵喪月暈為旱為兵為民流國有憂一曰有赦陰陽不和則暈暈及三重在三月為大水在十二月日壬癸為大赦月犯之將死于兵水官黜刑不平犯井鉞大臣誅有水事歲星犯之王急法多獄訟水溢將軍惡之犯井鉞近臣為亂兵起逆行入井川流壅塞熒惑犯之兵先起者殃又曰天子以水敗入守經旬下有兵貴人不安守三十日成勾巳角動色赤黑貴人當之百川溢兵起填星入犯之兵起東北大臣憂入井鉞王者惡之在觜而去東井其下亡地太白犯之咎在將久守其分君失政臣為亂辰星犯之星進則兵進退則兵退刑法平又曰北兵起歲惡芒角動搖色赤黑為水為兵起客星犯之穀不登大臣誅有土功小兒妖言彗星犯之民讒言國失政一曰大臣誅其分兵災流星犯之在春夏則秦地謀叛在秋冬則宮中有憂乙巳占流星色黃潤國安赤黑秦分民流水災蒼黑雲氣入犯之民有疾疫黃白潤澤有客來言水澤事黑氣入為大水常以正月朔日入時候之井宿上有雲歲多水潦按漢永元銅儀井宿三十度唐開元游儀三十三度去極七十度景祐測驗亦三十三度距西北星去極六十九度五諸侯五星在東井北主斷疑刺舉戒不虞理陰陽察得失亦曰主帝心一曰帝師二曰帝友三曰三公四曰博士五日太史五者常為帝定疑議星明大潤澤則天下治五禮備則光明不相侵陵暗則貴人謀上芒角禍在中歲星犯之兵起三年熒惑犯之大臣叛不成太白犯之諸侯興兵亡國經天晝見則諸侯受誅客星犯王室亂諸侯亡地秦國殃守之諸侯親屬失位彗孛犯之執法臣誅又曰貴臣當之期一年雲氣犯之色蒼白諸侯有喪不則臣有誅戮積水一星在北河西北所以供酒食之正也不見為災歲星犯之水物不成魚鹽貴民飢熒惑犯之為兵為水辰星犯之為水旱客星犯之兵起大水大臣憂期一年蒼白雲氣入犯之天下有水積薪一星在積水東北供庖廚之正也星不明五穀不登熒惑犯之為旱為兵為火災客星守之薪貴赤雲氣入犯之為火災南河三星與北河夾東井一曰天之關門也主關梁南河曰南戍一曰南宮一曰陽門一曰越門一曰權星主火兩河戍間日月五星之常道也河戍動搖中國兵起河星不具則路不通水泛溢月出入兩河間中道民安歲美無兵出中道之南君惡之大臣不附星明為吉昏昧動搖則邊兵起遠人叛主憂月犯之為中邦憂一曰為兵為喪為旱為疫行西南為兵旱入南戍則民疫暈則為土功乘之四方兵起經南戍南則為刑罰失歲星犯之北主憂熒惑犯兩河為兵守三十日以上川溢守南河穀不登女主憂守南戍西果不成在東則有攻戰填星乘南河為旱民憂守之為兵道不通太白舍三十日川溢一曰有姦謀守兩河為兵起客星守之為旱為疫彗孛出為兵守為旱流星出為兵喪邊戍有憂蒼白雲氣入之河道不通出而色赤天子兵向諸侯黃氣入之有德令出為災北河亦三星北河曰北戍一曰北宮一曰陰門一曰胡門一曰衡星主水五星出入留守之為兵起犯之為女喪乘之為北主憂歲星入北戍大臣誅熒惑從西入北戍六十日有喪從東入九十日有兵一曰出北戍北守之邊將有不請于上而用兵外國者勝填星守之兵起六十日內有赦一曰有土功若守戍西五穀不實太白舍北戍三十日為女喪有內謀守陰門不出百日天下兵悉起辰星守之外兵起邊臣有謀留止則兵起四方客星入犯之有喪於外姦人在中入自東兵起期九十日入自西有喪期六十日守之為大水流星經兩河間天下有難入為北兵入中國關梁不通雲氣蒼白入犯之邊有兵疾疫又為北主憂四瀆四星在東井南垣之東江河淮濟之精也明大則百川决水位四星在積薪東一曰在東井東北主水衡歲星犯之為大水一曰出南為旱熒惑守之田不治客星犯之水道不通伏兵在水中一日客星若水火守犯之百川流溢彗孛出為大水為兵穀不成流星入之天下有水穀敗民飢赤雲氣入為旱饑天罇三星在五諸侯南一曰在東井北罇器也主盛饘粥以給貧餒明為豐暗則歲惡闕丘二星在南河南天子雙闕諸侯兩觀也太白熒惑守之兵戰闕下軍市十三星狀如天錢天軍貿易之市有無相通也中星衆則軍餘粮小則軍飢月入為兵起主不安五星守之軍粮絕客星入有刺客起將離卒亡流星出為大將出野雞一星在軍市中主變怪出市外天下有兵守靜為吉芒角為凶狼一星在東井東南為野將主侵掠色有常不欲動也芒角動搖則兵起明盛兵器貴移位人相食色黃白為凶赤為兵月犯之有兵不戰一曰有水事月食在狼外國有謀五星犯之兵大起多盜彗孛犯之盜起客星守之色黃潤為喜黑則有憂赤雲氣入有兵弧矢九星在狼星東南天弓也主行陰謀以備盜常屬矢以向狼武密曰天弓張則北兵起又曰天下盡兵動搖明大則多盜矢不直狼為多盜引滿則天下盡為盜月入弧矢臣逾主月暈其宿兵大起客星入南夷來降若舍其分秋雨雪穀不成守之外夷飢出入之為兵出入流星入北兵起屠城殺將赤雲氣入之民驚一曰北兵入中國老人一星在弧矢南一名南極常以秋分之旦見于丙候之南郊春分之夕沒于丁見則治平天子壽昌不見則兵起歲荒君憂客星入為民疫一曰兵起老者憂流星犯之老人多疾一曰兵起白雲氣入之國當絕丈人二星在軍市西南主壽考悼耄矜寡以哀窮人星亡人臣不得自通子二星在丈人東主侍丈人側不見為災孫二星在子星東以天孫侍丈人側相扶而居以孝愛不見為災居常為無咎水府四星在東井西南水官也主隄塘道路梁溝以設隄防之備熒惑入之有謀臣辰星入為水客星入天下大水流星入色青主所之邑大水赤為旱按步天歌自五諸侯至水府常星一十八坐俱屬東井武密書以丈人二星子孫各一星屬牛宿乾象新書以丈人與子屬參孫屬井又以水府四星亦屬參武密以水府屬井餘皆與步天歌合輿鬼五星主觀察姦謀天目也東北星主積馬東南星主積兵西南星主積布帛西北星主積金玉隨變占之中央星為積尸主死喪祠祀一曰鈇鑕主誅斬星明大穀不成不明民散鑕欲其忽忽不明明則兵起大臣誅動而光賦重役煩民懷嗟怨日食國不安有大喪貴人憂暈則其分有兵大臣有誅廢者月食貴臣皇后憂期一年暈為旱為赦月犯之秦分君憂一曰軍將死貴臣女主憂民疫歲星犯之穀傷民飢君不聽事犯鬼鑕執法臣誅熒惑犯之忠臣誅一曰兵起后失勢入則后及相憂一曰賊在君側有兵喪勾巳國有赦留守十日諸侯當之二十日太子當之勾巳環繞天子失廟填星犯之大臣女主憂守之憂在後宮為旱為土功入鑕王者惡之犯積尸在陽為君在陰為后左為太子右為貴臣隨所守惡之太白入犯之為兵亂臣在內一曰將有誅貫之而怒下有叛臣久守之下有兵為旱為火萬物不成辰星犯之五穀不登守為有喪憂在貴人客星犯之國有自立者敗一曰多土功入之有詛盟祠鬼事彗星犯之兵起國不安星孛其下有喪兵起宜修德禳之流星犯鬼鑕有戮死者入則四國來貢白雲氣入有疾疫黑后有憂赤為旱黃為土功入犯積尸貴臣有憂青為病按漢永元銅儀輿鬼四度舊去極六十八度景祐測驗輿鬼三度距西南星去極六十八度爟四星在鬼宿西北一曰在軒轅西主烽火備邊亭之警急以不明為安明大則邊有警赤雲氣入天下烽火皆動天狗七星在狼星北主守財動移為兵為饑多寇盜有亂兵填星守之人相食客彗守之則羣盜起外廚六星為天子之外廚主烹宰以供宗廟占與天廚同積尸氣一星在鬼宿中孛孛然入鬼一度半去極六十九度在赤道內二十二度主死喪祠祀天紀一星在外廚南主禽獸之齒太白熒惑守犯之禽獸死民不安客星守之則政隳天社六星在弧矢南昔共工氏之勾龍能平水土故祀之以配社其精上為星明則社稷安不明動搖則下謀上太白熒惑犯之社稷不安客星入有祀事于國內出則有祀事于國外按晉志爟四星屬天市垣天狗七星在七星北武密以天狗屬牛宿又屬輿鬼乾象新書屬井外廚六星晉志在柳宿南武密書亦屬柳乾象新書與步天歌皆屬輿鬼天紀一星武密書及乾象新書皆屬柳惟步天歌屬鬼宿天社六星武密書屬井又屬鬼乾象新書以西一星屬井中一星屬鬼末一星屬柳今從步天歌以諸星俱屬輿鬼而備存衆說柳宿八星天之廚宰也主尚食和滋味又主雷雨爾雅曰咮謂之柳柳鶉火也又主木功一曰天庫又為鳥喙主草木明則大臣謹重國家廚食具開張則人飢死亡則都邑振動直則為兵日食宮室不安王者惡之廚官橋道隄防有憂日暈飛鳥多死五穀不成三抱而戴者君有喜月食宮室不安大臣憂月暈林苑有兵天下有土功廚獄官憂又為兵為饑為旱疫歲星犯之國多義兵熒惑犯之色赤而芒角其下君死一曰宮中憂火災守之有兵逆臣在側逆行守之王不寧填星犯守君臣和天下喜石申曰天子戒飲食之官出入留舍有急令太白犯之有急兵逆行勾巳臣謀主晝見為兵辰星犯之民相仇歲旱君戒在酒食客星犯之咎在周國守則布帛魚鹽貴色蒼白殺邊地諸侯彗星犯之大臣誅為兵為喪星孛于柳南夷叛甘德曰為兵為喪流星出犯之周分憂色黃為喜入則王者內有火災乙巳占出則宗廟有喜賢人用入為天廚官有憂木功廢赤雲氣入為火黃為赦黃白為天子有喜起宮室按漢永元銅儀以柳為十四度唐開元游儀十五度舊去極七十七度景祐測驗柳八星一十五度距西頭第三星去極八十三度酒旗三星在軒轅右角南酒官之旗也主宴享飲食星不具則天下有大喪帝王宴飲沉昏非禮以酒亡國明則宴樂謹五星守之天下大酺有酒肉賜宗室熒惑犯之飲食失度太白犯之三公九卿有謀客彗犯主以酒過為相所害赤雲氣入君以酒失按晉志酒旗在天市垣步天歌以酒旗屬柳宿以通占鏡考之亦屬柳又屬七星乾象新書亦屬七星與步天歌不同今並存之七星七星一名天都主衣裳文繡又主急兵故星明王道昌暗則賢良去天下空動則兵起離則易政蓋天曰七星為朱雀頸頸者文明之粹羽儀所承日食其宿主不安刑在門戶之神又曰文章士受誅其分兵起臣為亂日暈周邦君憂青色抱而順在兵為東軍吉月食后及大臣有憂又為歲饑民流其國更政暈其地旱獄官凶歲星犯之王憂兵五穀多傷熒惑犯之橋梁不通逆行則地動為火災出入留舍其國失地水決填星犯守世治平王道興后夫人喜太白犯之兵暴起大臣為亂經天防詐偽辰星犯之賊臣在側守則其分有憂萬物不成兵從中起貴臣有罪民疫流亡客星犯之為兵荊州占云河水決民流彗犯有亂兵起貴臣戮武密曰彗星出七星狀如杵為兵星孛于星有亂兵起宮殿貴臣戮大臣相譖流星犯之為兵憂又曰入則有急使來乙巳占流星入庫官有喜錦繡進女工用蒼白雲氣入貴人憂出則天子用急使赤入為兵黑為賢士死黃則遠人來貢白為天子遣使賜諸侯帛按景祐測驗七星七度距大星去極九十七度軒轅十七星在七星北后妃之主士職也一曰東陵一曰權星主雷雨之神南大星女主也次北一星夫人也屏也上將也次北一星妃也次將也其次諸星皆次妃之屬也女主南小星女御也左一星少民后宗也右一星大民太后宗也欲其色黃小而明武密曰后妃後宮之象陰陽交合感為雷激為電和為雨怒為風亂為霧凝為霜散為露聚為雲氣立為虹蜺離為背璚分為抱珥此二十四變皆權主之微細則皇后不安黑則憂在大人移徙則民流東西角大張而振后族敗月入之女主失勢或火災犯左右角大臣以罪免中犯乘守大民為饑太后宗有罪守少民小有饑女主失勢守御女有憂月暈女主有喪月五星凌犯環繞乘守皆為女主有禍月食女主憂歲星犯之女主失勢一曰大臣當之乘守大民為大饑太后宗黜中犯乘守少民為小饑後宮有黜者熒惑犯守勾巳后妃離德犯御女天子僕妾憂犯大民少民憂在后宗守之宮中有戮者填星行其中女主失勢有喪太白犯之皇后失勢客星犯之近臣謀滅宗族彗孛犯女主為寇一曰兵起流星入之後宮多讒亂乙巳占流星出之后有中使出一曰天子有子孫喜天稷五星在七星南農正也取百穀之長以為號明則歲豐暗或不具為饑移徙天下荒歉客星入之有祠事于內出有祠事于國外天相三星在七星北一曰在酒旗南丞相大臣之象武密曰占與相星同五星犯守之后妃將相憂彗客犯之大臣誅雲氣入黃為大臣喜黑為將疾內平四星在三台南一曰在中台南執法平罪之官明則刑罰平按軒轅十七星晉志在七星北而列于天市垣武密以軒轅屬七星又屬柳乾象新書以西八星屬柳中屬七星末屬張天稷五星晉志在七星南武密亦以天稷屬七星又屬柳乾象新書以西二星屬柳餘屬七星天相三星晉志在天市垣武密書屬七星乾象新書屬軫宿內平四星晉志在天市垣武密書屬柳乾象新書屬張步天歌屬七星諸說皆不同今並存之張宿六星主珍寶宗廟所用及衣服又主天廚飲食賞賚之事明則王行五禮得天之中動則賞賚不明王者子孫多疾移徙則天下有逆就聚則有兵日食為王者失禮掌御饌者憂甘德曰后失勢貴臣憂期七十日暈及有黃氣抱日主功臣效忠又曰財寶大臣黜將相憂月食其分饑臣失勢皇后有憂暈為水災陳卓曰五穀魚鹽貴巫咸曰后妃惡之宮中疫月犯之將相死其國憂歲星入犯之天子有慶賀事守之國大豐君臣同心三十日不出天下安寧其國升平熒惑犯之功臣當封入則為兵起又曰色如四時休王其分貴人安社稷無虞又曰熒惑春守諸侯叛逆行守之為地動為火災又曰將軍驚土功作又曰會則不可用兵填星犯之為女主飲宴過度或宮女失禮入為兵出則其分失地守之有土功太白犯之國憂守之其國兵謀不成石申日國易政舍留其國兵起辰星犯守五穀不成兵起大水貴臣負國民疫多訟芒角臣傷其君入為火災出則有叛臣客星犯之天子以酒為憂守之周楚之國有隱士出入于張兵起國饑舍留不去前將軍有謀又曰利先起兵彗星犯之國用兵民亡守為兵出為旱又曰犯守君欲移徙宮殿星孛于張為民流為兵大起乙巳占流星出入宗社昌有赦令下臣入賀蒼白雲氣入之庭中觴客有憂黃白天子因喜賜客黑為其分水災色赤天子將用兵按漢永元銅儀張宿十七度唐開元游儀十八度舊去極九十七度景祐測驗張十八度距西第二星去極一百三度天廟十四星在張宿南天子祖廟也明則吉微細其所有兵軍食不通客星中犯之有白衣會兵起又曰祠官有憂武密曰與虛梁同占按天廟十四星晉志雖列于二十八宿之外而亦曰在張宿南與隋志所載同兼與步天歌合翼宿二十二星天之樂府主俳倡戲樂又主外夷遠客負海之賓星明大禮樂興四國賓動搖則蠻夷使來離徙天子將舉兵日食王者失禮忠臣見譖為旱災暈為樂官黜上有抱氣三敵心欲和月食亦為忠臣見譖飛蟲多死北方有兵女主惡之石申曰大臣有謀月犯之國憂其分有兵大將亡女主惡之歲星犯五穀為風所傷守之王道具將相忠文術用逆行入之君好畋獵熒惑犯之其分民饑臣下不從命邊兵起出入留舍為兵守之佞臣為亂填星犯之大臣憂守之主聖臣賢歲豐后有喜出入留舍兵起逆行則女主失政太白入或犯之皆為兵起出入留舍大風水災其分君不安舍左為旱守犯勾巳淩突則大臣專君令辰星凌抵下臣為亂伏誅守之旱饑民流龍蛇見守其中兵大起同見西方大臣憂客星入犯之國有兵大臣憂一曰負海國有使來守之為兵起彗星犯之大臣憂國有兵喪星孛于翼亦為大臣憂其分失禮樂出則其地有謀下有兵喪芒所指有降人流星犯之亦為憂在大臣出則其下有兵入為貴臣囚繫乙巳占曰流星入天下賢士入見南夷來貢國有賢臣赤雲氣出入有暴兵黃而潤澤諸侯來貢黑為國憂按漢永元銅儀翼宿十九度唐開元游儀十八度舊去極九十七度景祐測驗翼宿一十八度距中行西第二星去極百四度東甌五星在翼南蠻夷星也天文錄曰東甌東越也今永嘉郡永寧縣是也芒角動搖則蠻夷叛太白熒惑守之其地有兵按東甌五星晉志在二十八宿之外乾象新書屬張宿武密書屬翼宿與步天歌合軫宿四星主冢宰輔臣主車騎主載任有軍出入皆占于軫又主風占死喪明大則車駕備移徙天子有憂就聚則兵起轄二星傅軫兩旁主王侯左轄為王者同姓右轄為異姓星明兵大起遠軫凶轄舉南蠻侵車無轄國有憂日食憂在將相戒車駕之官一曰后不安暈而生背氣其下兵起城拔視背所向擊之勝又曰王者惡之月食后及大臣憂月暈有兵歲旱多大風歲星犯之為火災為民疫大臣憂主庫者有罪入則其國將死守之國有喪七日不移有赦又曰君有憂熒惑犯之有亂兵入軫將軍為亂水傷稼民多妖言逆行為火為兵填星犯之為兵為土功入則兵敗逆行女主憂出入舍留六十日兵起大旱太白犯之為兵起得地入為兵守之亡地將憂起左角逆行至軫失地經天則兵滿野辰星犯之民疫大臣憂中國有貴喪守之大水入則天下以火為憂一曰國有喪客星犯之為兵為喪入則有土功糴貴諸侯使來出則君使諸侯守之邊兵起民飢守轄軍吏憂彗星犯之為兵為喪色赤為君失道又曰天子起兵王公廢黜星孛于軫亦為兵喪又曰下謀上主憂流星犯之有兵起亦有喪不出一年庫藏空春夏犯之為皮革用秋冬為水旱不調按漢永元銅儀以軫宿為十八度舊去極九十八度景祐測驗亦十八度去極一百度長沙一星在軫宿中入軫二度去極百五度主壽命明則君壽長子孫昌青丘七星在軫東南蠻夷之國號星明則夷兵盛動搖夷兵為亂守常則吉軍門二星在青丘西一曰在土司空北天子六宮之門主營候設豹尾旗與南門同占星非其故及客星犯之皆為道不通器府三十二星在軫宿南樂器之府也明則八音和君臣平不明則反是客彗犯之樂官誅赤雲氣掩之天下音樂廢土司空四星在青丘西主界域亦曰司徒均明則天下豐微暗則稼穡不登太白熒惑犯之男女廢耕桑客彗犯之為兵起民流按步天歌以左轄右轄二星長沙一星軍門二星土司空四星青丘七星器府三十二星俱屬軫宿晉志惟轄星長沙附于軫餘在二十八宿之外乾象新書以軍門器府土司空屬翼青丘屬軫武密書以軍門屬翼餘皆屬軫今從步天歌而附見諸家之說
