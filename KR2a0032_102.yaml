body:
  text: 宋史卷一百二志第五十五禮五吉禮五社稷嶽瀆籍田先蠶奏告祈禜社稷自京師至州縣皆有其祀歲以春秋二仲月及臘日祭太社太稷州縣則春秋二祭刺史縣令初獻上佐縣丞亞獻州博士縣簿尉終獻如有故以次官攝若長吏職官或少即許通攝或別差官代之牲用少牢禮行三獻致齋三日其禮器數正配坐尊各二籩豆各八簠簋各二俎三從祀籩豆各二簠簋俎各一太社壇廣五丈高五尺五色土為之稷壇在西如其制社以石為主形如鐘長五尺方二尺剡其上培其半四面宮垣飾以方色面各一屋三門每門二十四戟四隅連飾罘罳如廟之制中植以槐其壇三分宮之一在南無屋慶曆用羊豕各二正配位籩豆十二山罍簠簋俎二祈報象尊一元豐三年詳定所言社稷祝版牲幣饌物請並瘞於坎更不設燔燎又周禮大宗伯以血祭社稷社為陰祀血者幽陰之物是以類求神之意郊天先薦血次薦腥次薦爓次薦熟社稷五祀先薦爓次薦熟至於羣小祀薦熟而已今社稷不用血祭又不薦爓皆違經禮請以埋血為始先薦爓次薦熟古者祭社君南向於北墉下所以答陰也今社稷壝內不設北墉而有司攝事乃設東向之位非是請設北墉以備親祠南向答陰之位有司攝事則立北墉下少西王制曰天子社稷皆太牢諸侯社稷皆少牢今一用少牢殊不應禮夫為一郡邑報功者當用少牢為天下報功者當用太牢所有春秋祈報太社太稷請於羊豕外加角握牛二又言社稷之祭有瘞玉而無禮玉開元禮奠太社太稷並以兩圭有邸請下有司造兩圭有邸二以為禮神之器仍詔於壇側建齋廳三楹以備望祭先是州縣社主不以石禮部以謂社稷不屋而壇當受霜露風雨以達天地之氣故用石主取其堅久又禮諸侯之壇半天子之制請令州縣社主用石尺寸廣長亦半太社之制遂下太常修入祀儀元祐中又從博士孫諤言祭太社太稷皆設登歌樂太觀議禮局言太社獻官太祝奉禮皆以法服至于郡邑則用常服請下祭服制度於郡縣俾其自製弊則聽改造之紹興元年以春秋二仲及臘前祭太社太稷於天慶觀又望祭於臨安天寧觀十四年始築壇壝於觀橋之東立石主置太社令一員備牲牢器幣進熟望燎如儀嶽鎮海瀆之祀太祖平湖南命給事中李昉祭南嶽繼令有司製諸嶽神衣冠劍履遣使易之廣南平遣司農少卿李繼芳祭南海除去劉鋹所封偽號及宮名易以一品服又詔嶽瀆並東海廟各以本縣令兼廟令尉兼廟丞專掌祀事又命李昉盧多遜王祐扈蒙等分撰嶽瀆祠及歷代帝王碑遣翰林待詔孫崇望等分詣諸廟書于石六年遣使奉衣冠劍履送西鎮吳嶽廟太平興國八年河決滑州遣樞密直學士張齊賢詣白馬津以一太牢沈祠加璧自是凡河決溢修塞皆致祭祕書監李至言按五郊迎氣之日皆祭逐方嶽鎮海瀆自兵亂後有不在封域者遂闕其祭國家克復四方間雖奉詔特祭未著常祀望遵舊禮就迎氣日各祭於所隸之州長吏以次為獻官其後立春日祀東嶽岱山於兗州東鎮沂山於沂州東海於萊州淮瀆於唐州立夏日祀南嶽衡山於衡州南鎮會稽山於越州南海於廣州江瀆於成都府立秋日祀西嶽華山於華州西鎮吳山於隴州西海河瀆並於河中府西海就河瀆廟望祭立冬祀北嶽恆山北鎮醫巫閭山並於定州北鎮就北嶽廟望祭北海濟瀆並於孟州北海就濟瀆廟望祭土王日祀中嶽嵩山於河南府中鎮霍山於晉州真宗封禪畢加號泰山為仁聖天齊王遣職方郎中沈維宗致告又封威雄將軍為炳靈公通泉廟為靈泒侯亭山神廟為廣禪侯嶧山神廟為靈巖侯各遣官致告詔泰山四面七里禁樵採給近山二十戶以奉神祠社首徂徠山並禁樵採車駕次澶州祭河瀆廟詔進號顯聖靈源公遣右諫議大夫薛映詣河中府比部員外郎丁顧言詣澶州祭告祕書丞董溫其言漢以霍山為南嶽望令壽州長吏春秋致祭禮官言雖前漢嘗以霍山為南嶽緣今嶽廟已在衡山難於改制其霍山如遇水旱祈求及非時準別敕致祭即委州縣奉行詔封江州馬當上水府福善安江王太平州采石中水府順聖平江王潤州金山下水府昭信泰江王及祀汾陰命陳堯叟祭西海曹利用祭汾河車駕至潼關遣官祠西嶽及河瀆並用太牢備三獻禮庚午親謁華陰西嶽廟羣臣陪位廟垣內外列黃麾仗遣官分奠廟內諸神加號嶽神為順聖金天王還至河中親謁奠河瀆廟及西海望祭壇五月乙未加上東嶽曰天齊仁聖帝南嶽曰司天昭聖帝西嶽曰金天順聖帝北嶽曰安天元聖帝中嶽曰中天崇聖帝命翰林禮官詳定儀注及冕服制度崇飾神像之禮其玉册制如宗廟諡册帝自作奉神述備紀崇奉意俾撰册文有司設五嶽册使一品鹵簿及授册黃麾仗載册輅袞冕輿於乾元門外各依方所羣臣朝服序班仗衛如元會儀上服袞冕御乾元殿中書侍郎引五嶽玉册尚衣奉袞冕升殿上為之興奉册使副班于香案前侍中宣制曰今加上五嶽帝號遣卿等持節奉册展禮咸承制再拜奉册使以次升自東階受册御坐前降西階副使受袞冕輿于丹墀隨册使降立丹墀西玉册發至于朝元門外帝復坐册使奉册升輅鼓吹振作而行東嶽北嶽册次于瑞聖園南嶽册次于玉津園西嶽中嶽册次于瓊林苑及廟內外列黃麾仗設登歌奉册於車奉袞冕於輿使副袴褶騎從遣官三十員前導及門奉置幄次以州長吏以下充祀官致祭畢奉玉册袞冕置殿內又加上五嶽帝后號東曰淑明南曰景明西曰肅明北曰靖明中曰正明遣官祭告詔嶽瀆四海諸廟遇設醮除青詞外增正神位祝文又改唐州上源桐柏廟為淮瀆長源公加守護者帝自制五嶽醮告文遣使醮告即建壇之地構亭立石柱刻文其上天禧四年從靈臺郎皇甫融請凡修河致祭增龍神及尾宿天江天記天社等諸星在天河內者凡五十位仁宗康定元年詔封江瀆為廣源王河瀆為顯聖靈源王淮瀆為長源王濟瀆為清源王加東海為淵聖廣德王南海為洪聖廣利王西海為通聖廣潤王北海為沖聖廣澤王皇祐四年又以靈臺郎王大明言汴口祭河兼祠箕斗奎與東井天津天江咸池積水天淵天潢水位水府四瀆九坎天船王良羅堰等十七星在天河內者五年以儂智高遁益封南海洪聖廣利昭順王其五鎮沂山舊封東安公政和三年封王會稽舊封永興公政和封永濟王吳山舊封成德公元豐八年封王醫巫閭舊封廣寧公政和封王霍山舊封應聖公政和封應靈王東海太觀四年加號助順廣德王紹興七年太常博士黃積厚言嶽鎮海瀆請以每歲四立日分祭東西南北如祭五方帝禮詔從之乾道五年太常少卿林栗言國家駐蹕東南東海南海實在封域之內自渡江以後惟南海王廟歲時降御書祝文加封至八字王爵如東海之祠但以萊州隔絶未嘗致祭殊不知通泰明越溫台泉福皆東海分界也紹興中金人入寇李寶以舟師大捷於膠西神之助順為有功矣且元豐間嘗建廟於明州定海縣請依南海特封八字王爵遣官詣明州行禮詔可籍田之禮歲不常講雍熙四年始詔以來年正月擇日有事於東郊行籍田禮所司詳定儀注依南郊置五使除耕地朝陽門七里外為先農壇高九尺四陛周四十步飾以青二壝寬博取足容御耕位觀耕臺大次設樂縣二舞御耕位在壝門東南諸侯耕位次之庶人又次之觀耕臺高五尺周四十步四陛如壇色其青城設於千畝之外又言隋以青箱奉穜稑唐廢其禮青箱舊無其制請用竹木為之而無蓋兩端設襻飾以青中分九隔隔盛一種覆以青帊穜稑即早晚之種不定穀名請用稷秫稻粱大小豆大小麥陳於箱中大禮使李昉言按通禮乘耕根車今請改乘玉輅載耒耜於耕根車又前典不載告廟及稱賀之制今請前二日告南郊太廟耕禮畢百官稱賀於青城禮有勞酒合設會於還宮之翼日望如親祀南郊之制擇日大宴詳定所言御耒耜二具並盛以青縚準唐乾元故事不加雕飾禮畢收於禁中以示稼穡艱難之意其祭先農用純色犢一如郊祀例進胙餘並權用大祠之制皇帝散齋三日致齋二日百官不受誓戒神農后稷册學士院撰文進書以鹵簿使賈黃中言復用象輅載耒耜以重其事五年正月乙亥帝服袞冕執鎮圭親享神農以后稷配備三獻遂行三推之禮畢事解嚴還行宮百官稱賀帝改御大輦服通天冠絳紗袍鼓吹振作而還御乾元門大赦改元端拱文武遞進官有差二月七日宴羣臣於大明殿行勞酒禮景德四年判太常禮院孫奭言來年畫日正月一日享先農九日上辛祈穀祀上帝春秋傳曰啓蟄而郊郊而後耕月令曰天子以元日祈穀于上帝乃擇元辰親載耒耜躬耕帝籍先儒皆云元日謂上辛郊天也元辰謂郊後吉亥享先農而耕籍也六典禮閣新儀並云上辛祀昊天次云吉亥享先農望改用上辛後亥日用符禮文明道元年詔以來年二月丁未行籍田禮而罷冬至親郊遣官奏告天地宗廟諸陵景靈宮州都就告嶽瀆宮廟其禮一如端拱之制而損益之禮成遣官奏謝如告禮元豐二年詔於京城東南度田千畝為籍田置令一員徙先農壇於中神倉於東南取卒之知田事者為籍田兵乃以郊社令辛公佑兼令公佑請因舊鏺麥殿規地為田引蔡河水灌其中並植果蔬冬則藏冰凡一歲祠祭之用取具焉先薦獻而後進御有餘則貿錢以給雜費輸其餘於內藏庫著為令權管幹籍田王存等議以南郊鏺麥殿前地及玉津園東南菱地並民田共千一百畝充籍田外以百畝建先農壇兆開阡陌溝洫置神倉齋宮並耕作人牛廬舍之屬繪圖以進已而殿成詔以思文為名政和元年有司議享先農為中祠命有司攝事帝止行耕籍之禮罷命五使及稱賀肆赦之類太史局擇日不必專用吉亥耕籍所乘改用耕根車罷乘玉輅躬耕之服止用通天冠絳紗袍百官並朝服倣雍熙儀注九卿以左右僕射六尚書御史大夫攝諸侯以正員三品官及上將軍攝設庶人耕位於諸侯耕位之南以成終畝之禮備青箱設九穀如隋之制尋復以耕籍為大祠依四孟朝享例行禮又命禮制局修定儀注孟春之月太史擇上辛後吉日皇帝親耕籍田命有司以是日享先農后稷于本壇如常儀前期殿中監設御坐于思文殿儀鸞司設文武官次殿門外之左右其日早奉禮郎設御耕褥位于耕籍所尚舍設觀耕御坐於壇上南向典儀設侍耕羣臣位於御耕之東西設從耕羣臣位於御耕之東南西向北上奉禮郎設御耒席於三公之北稍西南向太僕設御耕牛於御壇之西稍北太僕卿位於耕牛之東稍前南向太常設左輔位於御耕之東稍南西向設司農位二一在左輔之後一在其南並西向籍田令三皆位司農卿南少退北上奉青箱官位於後諸執耒耜者位公卿耕者後侍耕者前西向三公三少宰臣親王等每員三人執政二人從耕羣官一名助耕並服絳衣介幘三公以次羣官耒耜各一具每一具正副牛二隨牛二人庶人耕位在從耕官位之南西向庶人百人並青衣耕牛二百每兩牛用隨牛一人耒耜百具畚五十具鍤二十五具以木為刃耆老百人常服陪位於庶人位南西向司農少卿位二於庶人位前太社令位司農少卿之西少退俱北向畿內諸令位庶人之東西向尚輦局設玉輅於仗內前期三日司農以青箱奉九穀穜稑之種進內前二日皇后率六宮獻于皇帝受于內殿前一日降出付司農其日質明左輔奉耒耜載于玉輅訖耕籍使朝服乘車用本品鹵簿以儀仗二千人衛耒耜先詣壇所尚輦奉御設平輦於祥曦殿皇帝鞾袍出自內東門從駕臣僚禁衛並起居如常儀將至耕所文武侍耕從耕以下及耆老庶人俱詣籍田西門外立班再拜奉迎訖各就次從耕陪耕等官服朝服以俟耕車駕至思文殿進膳訖左輔以御耒耜授籍田令橫執之詣耕籍所置于席遂守之凡執耒耜者橫執之受則先其耒後其耜諸縣令率終畝庶人陪耕耆老先就位司農卿籍田令太社令奉青箱官諸執耒耜者以次就位御史臺引殿中侍御史一員先入就位次禮直官宣贊舍人等分引侍耕從耕羣官各就位尚輦奉御進輦思文殿左輔奏請中嚴少頃奏外辦皇帝通天冠絳紗袍乘輦出將至御耕位尚舍先設黃道太常請降輦就位既降輦太常卿前導至褥位南向立奏請行禮禮直官請籍田令進詣御耒席南向引司農卿詣籍田令東西向籍田令俯伏跪執事者以縚受之籍田令解縚出耒執耒興東向立以授司農卿司農卿西向立以授左輔左輔詣御耕位前少東北向太常卿奏請受耒耜左輔執以進執耒者助執之皇帝受以三推左輔前受耒耜授司農卿以授籍田令各復位籍田令跪而納於縚執耒興以授執事者退位皇帝初耕諸執耒耜者以耒耜各授從耕者禮直官引太常卿詣御位前北向奏請皇帝升壇觀耕復位立前導官導皇帝升壇即御坐南向禮直官太常博士太常卿近東西向北上立禮直官引三公三少宰臣親王各五推餘從耕官各九推訖執耒耜者前受耒耜禮直官引司農少卿帥庶人以次耕于千畝候耕少頃禮直官引左輔詣御坐前跪奏禮畢降壇乘輦還思文殿左輔奏解嚴侍耕從耕官皆退次籍田令以青箱授司農卿詣耕所出穜稑播之次司農少卿帥太社令檢校終畝次司農卿詣御前北向俯伏跪奏省功畢退所司放仗以俟皇帝常服還內侍衛如常儀紹興七年始舉享先農之禮以立春後亥日行一獻禮十六年皇帝親耕籍田並如舊制先蠶之禮久廢真宗從王欽若請詔有司檢討故事以聞按開寶通禮季春吉巳享先蠶於公桑前享五日諸與享官散齋三日致齋二日享日未明五刻設先蠶氏神坐於壇上北方南向尚宮初獻尚儀亞獻尚食終獻女相引三獻之禮女祝讀文飲福受胙如常儀又按唐會要皇帝遣有司享先蠶如先農可也乃詔自今依先農例遣官攝事禮院又言周禮蠶於北郊以純陰也漢蠶於東郊以春桑生也請約附故事築壇東郊從桑生之義壇高五尺方二丈四陛陛各五尺一壝二十五步祀禮如中祠慶曆用羊豕各一攝事獻官太尉太常光祿卿不用樂元豐詳定所言季春吉巳享先蠶氏唐月令注以先蠶為天駟按先蠶之義當是始蠶之人與先農先牧先炊一也開元享禮為瘞坎於壇之壬地而郊祀録載先蠶祀文有肇興蠶織之語禮儀羅又以享先蠶無燔柴之儀則先蠶非天駟星明矣今請就北郊為壇不設燎壇但瘞埋以祭餘如故事政和禮局言禮天子必有公桑蠶室以興蠶事歲既畢則奉繭而繅遂朱緑之玄黃之以為郊廟之祭服今既開籍田以供粢盛而未有公桑蠶室以供祭服尚為闕禮請倣古制於先蠶壇側築蠶室度地為宮四面為牆高仞有三尺上被棘中起蠶室二十七別構殿一區為親蠶之所倣漢制置繭館立織室於宮中養蠶千薄以上度所用之數為桑林築採桑壇於先蠶壇南相距二十步方三丈高五尺四陛凡七事置蠶官令丞以供郊廟之祭服又周官內宰詔后帥內外命婦蠶於北郊鄭氏謂婦人以純陰為尊則蠶為陰事可知開元禮享先蠶幣以黑蓋以陰祀之禮祀之也請用黑幣以合至陰之義詔從其議命親蠶殿以無斁為名又詔親蠶所供不獨袞服凡施於祭祀者皆用之宣和元年三月皇后親蠶即延福宮行禮其儀季春之月太史擇日皇后親蠶命有司享先蠶氏于本壇前期殿中監帥尚舍設坐殿上南向前楹施簾設東西閣殿後之左右又設內命婦妃嬪以下次於殿之左右外命婦以下次於殿門內外之左右隨地之宜量施帷幄於採桑壇外四面開門設皇后幄次於壇壝東門之內道北南向其日有司設褥位壇上少東東向設內命婦位壇下東北南向設外命婦位壇下東南北向俱異位重行西上內外命婦一品各二人二品三品各一人又設從採桑內命婦等位於外命婦之東南向以內命婦一員充詣蠶室授蠶母桑以食蠶設從採桑外命婦等位於外命婦東北向俱異位重行西上設執皇后鈎箱者位於內命婦之西少南西上尚功執鈎司製執箱內外命婦鈎箱者各位於後典製執鈎女史執箱又於壇上設執皇后鈎箱位於皇后採桑位之北稍東南向西上前出宮一日兵部率其屬陳小駕鹵簿於宣德門外太僕陳厭翟車東偏門內南向其日未明外命婦應採桑及從採桑者先詣親蠶所幕次以俟起居各令其女侍者進鈎箱載至親蠶所授內謁者監以授執鈎箱者前一刻內命婦各服其服內侍引內命婦妃嬪以下俱詣殿庭起居訖內侍奏請中嚴少頃又奏外辦皇后首飾鞠衣乘龍飾肩輿如常儀障以行帷出內東門至左升龍門內侍跪奏具官臣某言請降肩輿升厭翟車訖俯伏興少退御者執綏升厭翟車內侍詣車前奏請車進發出宣德東偏門執事者進鈎箱載之車至親蠶所殿門降車乘肩輿入殿後西閣門侍衛如常儀內侍先引內外命婦及從採桑者俱就壇下位諸執鈎箱者各就位內侍奏請中嚴少頃奏外辦皇后首飾鞠衣乘肩輿內侍前導至壇東門華蓋仗衛止於門外近侍者從之入內侍奏請降肩輿至幄次內下簾又內侍至幄次請行禮導皇后詣壇升自南陛東向立執鈎箱者自北陛以次升壇就位次內侍引尚功詣採桑位前西向奉鈎以進皇后受鈎採桑司製奉箱進以受桑皇后採桑三條止以鈎授尚功尚功受鈎司製奉箱俱退復位初皇后採桑典製各以鈎授內外命婦皇后採桑訖內外命婦以次採桑女使執箱者受之內外命婦一品各採五條二品三品各採九條止典製受鈎與執箱者退復位內侍各引內外命婦退復位內侍詣皇后前奏禮畢退復位內侍引皇后降自南陛歸幄次少頃奏請乘肩輿如初內侍前導皇后歸殿後閣內侍奏解嚴初皇后降壇內侍引內命婦詣蠶室尚功帥執鈎箱者以次從至蠶室尚功以桑授蠶母蠶母受桑縷切之授內命婦食蠶灑一薄訖內侍引內外命婦各還次皇后還宮宣和重定親蠶禮外命婦宰執並一品夫人升壇侍立餘品列於壇下六年閏二月皇后復行親蠶之禮焉紹興七年始以季春吉巳日享先蠶視風師之儀乾道中升為中祀告禮古者天子將出類于上帝命史告社稷及圻內山川又天子有事必告宗廟歷代因之宋制凡行幸及封泰山祠后土謁太清宮皆親告太廟三歲郊祀每歲祈穀上帝祀感生帝雩祀祭方丘明堂神州地祇圜丘並遣官告祖宗配侑之意他大事即位改元更御名上尊號尊太后立皇后太子皇子生籍田親征納降獻俘朝陵肆赦河平及大喪上諡山陵園陵祔廟奉遷神主皆遣官奏告天地宗廟社稷諸陵嶽瀆山川宮觀在京十里內神祠其儀用犧尊籩豆各一實以酒脯醢宮寺以素饌時果代用祝幣行一獻禮若車駕出京則有軷祭用羝羊一所過州郡橋梁山川帝王名臣陵廟去路十里內者各令本州以香酒脯祭告建隆元年太祖平澤潞仍祭祅廟泰山城隍征揚州河東並用此禮四年修葺太廟遣官奏告四室及祭本廟土神凡修葺同如遷神主修畢奉安是歲十一月詔以郊祀前一日遣官奏告東嶽城隍浚溝廟五龍廟及子張子夏廟他如儀太平興國五年十一月車駕北征前一日遣官祭告天地於圜丘用特牲太廟社稷用太牢望祭嶽瀆名山大川於四郊磔風於風伯壇祀雨師於本壇禱馬於馬祖壇祭蚩尤禡牙於北郊並用少牢祭北方天王於北郊迎氣壇用香柳枝燈油乳粥酥蜜餅果仍遣內侍一人監祭咸平中北征禮同八年滑州合河口畢工遣官告天地嶽瀆後天禧中又遣謝玉清昭應景靈上清太一宮會靈祥源觀及諸陵雍熙四年詔以親耕籍田遣官奏告外又祭九龍黃溝扁鵲吳起信陵張耳單雄信七廟後又增祭德安公嶽臺諸神廟為定式淳化三年十二月將郊常奏告外又告太社太稷及文宣武成等廟景德二年契丹遣使修好遣官奏告諸陵四年二月次西京遣告汾陰中嶽太行河洛啓母少姨廟東還奏告如常儀大中祥符元年天書降及封禪告天地宗廟社稷及諸祠廟宮觀其在外者乘傳以往澶鄆兗州高陽帝嚳帝堯亦皆告之四年加五嶽帝號告天地宗廟社稷五年聖祖降告如封禪禮六年宮庭嘉禾生遣官告廟及玉皇聖祖天尊大帝天禧元年奉迎太祖聖容赴西京遣官奏告如常儀及經由五里內並西京城內外神祠天聖七年玉清昭應宮火遣告諸陵十年大內火遣告天地廟社明道二年詔以蟲螣為沴減尊號四字告天地宗廟熙寧七年南郊雅飾奏告太廟后廟八年以韓琦配享告英宗廟元符三年四月朔太陽虧遣官告太社大觀元年十二月以恭受八寶告天地宗廟社稷政和二年冬至受元圭禮同三年二月以太平告成册告諸陵四年二月皇長子冠告天地宗廟社稷諸陵五年建明堂告如上禮及宮觀嶽瀆高宗建炎已後事有關於國體者皆告紹興九年金人遣使議和割地十一年詔撰講和誓文二十四年進徽宗御集二十六年進太后回鑾事實二十七年進玉牒仙源類譜明年進神宗寶訓進祖宗仙源積慶圖進徽宗實録進祐陵迎奉録三十一年金人叛盟興師開禧二年吳曦伏誅嘉定七年進高宗中興經武要略十三年進宗藩慶系録刊正憲聖慈烈皇后聖德事迹進光宗玉牒十四年進孝宗寶訓十五年得玉璽明年上玉璽端平元年獲完顏守緒函骨淳祐五年進光宗寧宗兩朝寶訓經武要略玉牒日曆會要寶祐元年皇女延昌公主進封瑞國公主又封升國五年進中興四朝史景定二年進孝宗光宗實録皇女周國公主下降咸淳四年安奉寧宗理宗實録御集會要經武要略皆告天地宗廟社稷欑陵其餘即位改元受禪册寶皇子生冠及巡幸納降獻俘之屬並仍舊制祈報周官太祝掌六祝之辭以事鬼神示其福祥於是歷代皆有襘禜之事宋因之有祈有報祈用酒脯醢郊廟社稷或用少牢其報如常祀或親禱諸寺觀或再幸或徹樂減膳進蔬饌或分遣官告天地太廟社稷嶽鎮海瀆或望祭于南北郊或五龍堂城隍廟九龍堂浚溝廟諸祠如子張子夏信陵君段干木扁鵲張儀吳起單雄信等廟亦祀之或啓建道場於諸寺觀或遣內臣分詣州郡如河中之后土廟太寧宮亳之太清明道宮兗之會真景靈宮太極觀鳳翔之太平宮舒州之靈仙觀江州之太平觀泗州之延祥觀皆函香奉祝驛往禱之凡旱蝗水潦無雪皆禜禱焉咸平二年旱詔有司祠雷師雨師內出李雍祈雨法以甲乙日擇東方地作壇取土造青龍長吏齋三日詣龍所汲流水設香案茗果餈餌率羣吏鄉老日再至祝酹不得用音樂巫覡雨足送龍水中餘四方皆如之飾以方色大凡日干及建壇取土之里數器之大小及龍之修廣皆以五行成數焉詔頒諸路景德三年五月旱又以畫龍祈雨法付有司刊行其法擇潭洞或湫濼林木深邃之所以庚辛壬癸日刺史守令帥耆老齋潔先以酒脯告社令訖築方壇三級高二尺闊一丈三尺壇外二十步界以白繩壇上植竹枝張畫龍其圖以縑素上畫黑魚左顧環以天黿十星中為白龍吐雲黑色下畫水波有龜左顧吐黑氣如線和金銀朱丹飾龍形又設皂幡刎鵝頸血置槃中楊枝灑水龍上俟雨足三日祭以一豭取畫龍投水中大中祥符二年旱遣司天少監史序祀玄冥五星於北郊除地為壇望告已而雨足遣官報謝及社稷初學士院不設配位及是問禮官言祭必有配報如常祀當設配坐又諸神祠天齊五龍用中祠祅祠城隍用羊一八籩八豆舊制不祈四海帝曰百谷之長潤澤及物安可闕禮特命祭之天禧四年四月大風飛沙折木晝晦數刻命中使詣宮觀建醮禳之天聖三年九月帝宣諭近內臣南中勾當回言諸處名山洞府投送金龍玉簡開啓道場頗有煩擾速令分祈投龍處不得開建道場康定二年三月以黃河水勢甚淺致分流入汴未能通濟遣祭河瀆及靈津廟又澶州曹村掃方開減水直河而水自流通遣使祭謝後修塞禮同治平四年十二月詔以來歲正旦日食命翰林學士承旨王圭祭社熙寧元年正月帝親幸寺觀祈雨仍令在京差官分禱各就本司先致齋三日然後行事諸路擇端誠修潔之士分禱海鎮嶽瀆名山大川潔齋行事毋得出謁宴飲賈販及諸煩擾令監司察訪以聞諸路神祠靈迹寺觀雖不係祀典祈求有應者並委州縣差官潔齋致禱已而雨足復幸西太一宮報謝九年十一月以安南行營將士疾病者衆遣同知太常禮儀院王存詣南嶽虔潔致禱仍建祈福道場一月又以西江運糧獲應命本州長吏往祭龍祠十年四月以夏旱內出蜥蜴祈雨法捕蜥蜴數十納甕中漬之以雜木葉擇童男十三歲下十歲上者二十八人分兩番衣青衣以青飾面及手足人持柳枝霑水散灑晝夜環繞誦呪曰蜥蜴蜥蜴興雲吐霧雨令滂沱令汝歸去雨足元豐元年十月太皇太后違豫命輔臣以下分禱天地宗廟社稷及都內諸神祠又作祈福道場於寺觀及五嶽四瀆凡靈迹所在八年帝疾分禱亦如之又以京城火災建醮於集禧觀且為民祈福元祐元年十二月以華州鄭縣山摧命太常博士顏復往祭西嶽七年詔太皇太后本命歲正月一日京師及天下州軍各齋僧尼道士女冠一日在京宮觀寺院開建道場七晝夜內外獄囚並設食三日八年太皇太后違豫祈禱如元豐仍致禱諸陵又令南京等處長吏詣祖宗神御所在建置道場紹興二年三月苦雨命往天竺山祈晴即日雨止四年知樞密院張浚言四川自七月以來霖雨地震乞製祝文名山大川祈禱上曰霖雨地震之災豈非兵久在蜀調發供餽民怨所致當修德以應之又可禱乎七年正月一日詔朕痛兩宮北狩道君皇帝春秋益高念無以見勤誠之意可遣官往建康府元符萬歲宮修建祈福道場三晝夜務令嚴潔庶稱朕心又謂輔臣曰宣和皇后春秋浸高朕朝夕思之不遑安處已遣人於三茅山設黃籙醮仰祝聖壽是歲七月張浚等言雨澤稍愆乞禱上曰朕患不知四方水旱之實宮中種稻兩區其一地下其一地高高者其苗有稿意矣須精加祈禱以救旱暵八年宰臣奏積雨傷蠶上曰朕宮中自蠶一薄欲知農桑之候久雨葉濕豈不有損乃命往天竺祈晴三十二年太常少卿王普言逆亮誅夷虜騎遁去兩淮無警舊疆寖歸茲者回鑾臨安當行報謝之禮從之嘉定八年八月蝗禱于霍山九年六月蝗禱羣祀淳祐七年六月大旱命侍從禱于天竺觀音及霍山祠
