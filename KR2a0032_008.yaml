body:
  text: 宋史卷八本紀第八真宗三四年春正月辛巳詔執事汾陰懈怠者罪勿原乙酉習祀后土儀丁亥將祀汾陰謁啓聖院太宗神御殿普安院元德皇后聖容丙申詔以六月六日天書再降日為天貺節丁酉奉天書發京師日上有黃氣如匹素五色雲如蓋紫氣翼仗庚子右僕射判河陽張齊賢見于汜水頓陳堯叟獻白鹿辛丑陳幄殿於訾村望拜諸陵甲辰至慈澗頓賜道傍耕民茶荈二月戊申賜扈駕諸軍緡錢華州獻芝草東京獄空壬子出潼關渡渭河遣近臣祠西嶽癸丑次河中府丁巳黃雲隨天書輦次寶鼎縣奉祇宮戊午登後圃延慶亭己未瀵泉湧有光如燭辛酉祀后土地祇是夜月重輪還奉祇宮紫氣四塞幸開元寺作大寧宮壬戌甘州回鶻蒲端三麻蘭勿巡蒲婆大食國吐蕃諸族來貢大赦天下常赦不原者咸赦除之文武官並遷秩該封欲回授祖父母者聽四品以上逮事太祖太宗潛藩或嘗更邊任家無食祿者録其子孫建寶鼎縣為慶成軍建隆佐命及公王將相丘冢所在致祭給西京分司官實奉三分之一令法官慎刑名有情輕法重者以聞賜天下酺三日大宴羣臣於穆清殿賜父老酒食衣幣作汾陰配饗銘河瀆四海贊召草澤李瀆劉巽瀆以疾辭授巽大理評事乙丑觀酺加號西嶽詔葺夷齊祠丁卯賜寧王元偓服帶鞍馬有加乙巳次華州幸雲臺觀庚午宴宣澤亭紫雲如龍起嶽上召見隱士鄭隱李寧賜茶果束帛辛未次閿鄉縣召見道士柴又玄問以無為之要壬申宴虢州父老于湖城行宮三月甲戌次陝州召草澤魏野辭疾不至乙亥賜運船卒時服己卯次西京庚辰罷河北緣邊工役壬午幸上清宮甲申幸崇法院移幸呂蒙正第賜服御金幣丙戌大宴大明殿丁亥詔葺所經歷代帝王祠廟己丑御五鳳樓觀酺壬辰詔朝陵自西京至鞏縣不舉樂癸巳禁扈從人踐田稼甲午發西京丙申謁安陵永昌諸陵壬寅幸列子廟表潘孝子墓夏四月甲辰朔上至自汾陰壬子幸元稱宮視疾駙馬都尉李遵勗責授均州團練副使峽路鈐轄執為亂夷人王羣體等帝憫其異俗免死配隸丙辰大宴含光殿己未餞种放歸終南甲子王旦加右僕射元佐為太尉元偓進封相王乙丑幸元偓宮視疾葺尚書省加王欽若吏部尚書陳堯叟戶部尚書馮拯工部尚書丙寅以張齊賢為左僕射丁卯許國公呂蒙正薨五月丙子加交址郡王李公蘊同平章事癸未廬宿泗等州麥自生辛卯幸北宅視德存疾京兆旱詔振之癸巳詔州城置孔子廟乙未加上五嶽帝號作奉神述丁酉慮囚死罪流徒降等杖以下釋之辛丑視德存疾六月丙午太白晝見亳州二龍見禹祠德存卒丙寅遣使安撫江淮南水災許便宜從事詔授交甘等州大食蒲端三麻蘭勿巡國奉使官秋七月壬申朔除閩浙荊湖廣南歲丁錢四十五萬壬午韓國吳國隋國長公主進封衛國楚國越國長公主鎮眉昌等州地震己丑詔先蠲濱棣州水災田租十之三今所輸七分更除其半丙申江洪筠袁江漲沒民田八月乙巳太白晝見丙午幸南宮視惟疾詔除畬田租庚戌曲宴諸王宰相癸丑賜青州孤老惸獨民帛惟卒丙辰録唐長孫無忌段秀實等孫授官丁巳詔文武官有言刑政得失邊防機事者並賜對癸亥甘州回紇可汗夜落紇奉表詣闕乙丑刻御製大中祥符頌於左承天祥符門河決通利軍合御河壞州城及傷田廬遣使發粟振之九月丁丑涇原鈐轄曹瑋言籠竿川熟戶蕃部以間田輸官請於要害地募兵以居從之戊子幸太乙宮祈晴辛卯向敏中等為五嶽奉册使癸巳御乾元樓觀酺冬十月戊申御朝元殿發五嶽册丁巳定江淮鹽酒價有司慮失歲課帝曰苟便於民何顧歲入也十一月庚午占城國貢獅子丙子御試服勤詞學經明行修貢舉人十二月乙巳詔楚泰州潮害稼復租沒溺人賜千錢粟一斛是歲西涼府夏豐交州甘州諸溪洞蠻來貢畿內蝗河北陝西劍南飢吉州臨江軍江水溢害民田舍兗州刟繕蟲不為災五年正月乙亥賜處州進士周啓明粟帛戊寅雨木冰壬午幸元稱宮視疾河決棣州二月庚戌詔貢舉人公罪聽贖丙寅詔官吏安撫濱棣被水農民三月己丑御試禮部舉人丁未洞酋田仕瓊等貢溪布庚戌王旦等並加特進功臣丁巳免濱棣民物入城市者稅一年夏四月戊申以向敏中為平章事有司請違法販茶者許同居首告帝謂以利敗俗非國體不許壬子除通泰楚州鹽亭戶積負丁額課鹽乙丑樞密直學士邊肅責授嶽州團練副使五月辛未江淮兩浙旱給占城稻種教民種之戊寅修儀劉氏進封德妃丁亥免棣州租十之三戊子賜近臣金華殿所種麥六月庚申賜杭州草澤林逋粟帛壬戌詔常參官舉幕職州縣官充京官癸亥賜邵武軍被水者錢粟秋七月戊辰作保康門八月丙申朔日有食之丁酉禁周太祖葬冠劍地樵採戊戌張齊賢為司空致仕甲辰詔樞密直學士限置六員庚戌淮南旱減運河水灌民田仍寬租限州縣不能存恤致民流亡者罪之己未作五嶽觀九月辛未張齊賢入對壬申觀新作延安橋幸大相國寺上清宮射于宜春苑癸酉徙澄海三指揮屯嶺北州郡戊子王欽若陳堯叟並為樞密使同平章事丁謂為戶部侍郎參知政事庚寅幸故鄆王兗王宮冬十月戊午延恩殿道場帝瞻九天司命天尊降己未大赦天下賜致仕官全奉辛酉作崇儒術論刻石國學閏月己巳上聖祖尊號辛未謝太廟壬申立先天降聖節五日休沐輟刑乙亥詔上聖祖母懿號加太廟六室尊諡丙子羣臣上尊號曰崇文廣武感天尊道應真佑德上聖欽明仁孝皇帝丁丑出舒州所獲瑞石文曰志公記戊寅建景靈宮太極觀於壽丘辛巳建安軍鑄聖像龍見雲中戊子御製配享樂章並二舞名文曰發祥流慶武曰降真觀德十一月丙申親祀玉皇於朝元殿甲辰加王旦門下侍郎向敏中中書侍郎楚王元佐太師相王元偓太傅舒王元稱太保內外官加恩置玉清昭應宮使以王旦為之丁未作汴水發願文庚戌詔允言朝參乙卯罷獻珍禽異獸十二月甲子置景福殿使戊辰作景靈宮京師大寒鬻官炭四十萬減市直之半以濟貧民壬申改諡玄聖文宣王曰至聖文宣王戊寅溪洞張文喬等八百人來朝己卯知天雄軍寇準言獄空詔奬之乙酉振泗州飢丙戌詔天慶等節日民犯罪情輕者釋之丁亥立德妃劉氏為皇后是歲交州甘州西涼府溪洞蠻來貢京城河北淮南飢減直鬻穀以濟流民六年春正月癸巳朔上御朝元殿受朝司天監言五星同色庚子詔減配隸法十二條戊申禁內臣出使預民政己酉賜京師酺五日辛亥進封衛國楚國越國長公主三人為徐國邠國宿國庚申置淑儀淑容順儀順容婉儀婉容在昭儀上置司宮令在尚宮上以婕妤楊氏為婉儀貴人戴氏為修儀美人曹氏為婕妤辛酉詔宗正寺以帝籍為玉牒二月戊辰觀酺己亥泰州言海陵草中生聖米可濟飢三月丁未詔沙門島流人罪輕者徙近地乙卯建安軍鑄玉皇聖祖太祖太宗尊像成以丁謂為迎奉使夏四月庚辰詔淮南給飢民粥麥登乃止壬午太白晝見癸未幸元稱宮視疾丙戌詔諸州死罪可疑者詳審以聞五月壬辰詔伎術官未升朝特賜緋紫者勿佩魚甲辰聖像至丙午詔聖像所經郡邑減繫囚死罪流以下釋之升建安軍為真州乙卯謁聖像奉安於玉清宮丁巳遣使奏告諸陵六月壬戌惟和卒趙州黑龍見丁卯壽丘獻紫莖金芝癸酉保安軍雨河溢兵民溺死遣使振之丙子詔翰林學士陳彭年等刪定三司編敕丁丑崇飾諸州黃帝祠廟秋七月癸巳上清宮道場獲龍於香合中己亥中書門下表請元德皇后祔廟庚子行配祔禮癸卯詔天下勿稅農器己酉亳州官吏父老三千三百人詣闕請謁太清宮八月庚申詔來春親謁亳州太清宮辛酉以丁謂為奉祀經度制置使丙寅禁太清宮五里內樵採庚午加號太上老君混元上德皇帝置禮儀院九月庚寅幸元稱宮視疾丁酉出玉宸殿種占城稻示百官冬十月辛酉元德皇后祔廟甲子亳州太清宮枯檜再生真源縣菽麥再實癸酉謁玉清昭應宮己卯作步虛詞付道門壬午降聖節賜會如先天節儀十一月辛亥幸元稱宮視疾癸丑賜御史臺九經諸史甲寅判亳州丁謂獻芝草三萬七千本乙卯龜茲遣使來貢十二月戊午朔日有食之庚申涇原鈐轄曹瑋言發兵討原州界撥藏族違命者捕獲甚衆回鶻遣使來貢己巳天書扶侍使趙安仁等上奉天書車輅鼓吹儀仗壬申獻天書於朝元殿遂告玉清昭應宮及太廟乙亥幸開寶寺上清宮己卯幸太一宮戎瀘蠻寇平是歲西蕃高州蠻龜茲來貢七年春正月辛丑慮囚壬寅車駕奉天書發京師丙午次奉元宮判亳州丁謂獻白鹿一芝九萬五千本戊申王旦上混元上德皇帝册寶己酉朝謁太清宮天書升輅雨雪倏霽法駕繼進佳氣彌望是夜月重輪幸先天觀廣靈洞霄宮曲赦亳州及車駕所經流以下罪升亳州為集慶軍節度減歲賦十之二改奉元宮為明道宮太史言含譽星見庚戌御均慶樓賜酺三日壬子詔所過頓遞侵民田者給復二年丙辰建南京歸德殿赦境內及京畿車駕所過流以下罪追贈太祖幕府元勛僚舊録常參官逮事者並進秩欲授子孫者聽作鴻慶宮二月戊午次襄邑縣皇子來朝庚申夏州趙德明遣使詣行闕朝貢辛酉至自亳州丙寅詔天地壇非執事輒臨者斬辛未饗太廟壬申恭謝天地大赦天下乙亥益州鑄大鐵錢三月城淯井監癸巳雄州甲仗庫火甲午制加宰相王旦向敏中楚王元佐相王元偓舒王元稱榮王元儼樞密使同平章事乙未宴翔鸞閣辛丑發粟振儀州飢復諸州觀察使兼刺史甲辰幸元稱宮視疾丁未封皇子慶國公青州民趙嵩百一十歲詔存問之夏四月丁巳西涼府廝鐸督遣使來貢己未賜淮南諸州民租十之二癸亥河南府獄空有鳩巢其戶生二雛甲子以歸義軍留後曹賢順為歸義軍節度使丙子舒王元稱薨五月壬辰王旦為兗州景靈宮朝修使乙未又為天書刻玉使涇原言葉施族大首領豔般率族歸順六月乙卯禁文字斥用黃帝名號故事丙辰眉州通判董榮受賕鬻獄長安知縣王文龜酗酒濫刑並投荒裔戊午戒州縣官吏決罪逾法壬申封婉儀楊氏為淑妃乙亥樞密使王欽若罷為吏部尚書陳堯叟為戶部尚書以寇準為樞密使同平章事丙子詔棣州經水流民歸業者給復三年秋七月辛丑交州李公蘊敗鶴柘蠻獻捷癸卯太白晝見甲辰以同州觀察使王嗣宗內客省使曹利用並為樞密副使八月甲寅置景靈宮使以向敏中為之乙卯除江淮兩浙被災民租丁巳楊光習坐擅領兵出寨又誣軍中謀殺司馬張從吉配隸鄧州乙丑給河東沿邊將士皮裘氈襪甲戌河決澶州丁丑命內臣奉安太祖太宗聖像于鴻慶宮辛巳詔嶺南戍兵代還日人給裝錢五百九月丙戌含譽星再見辛卯尊上玉皇聖號曰太上開天執符御歷含真體道玉皇大天帝戊戌御試服勤詞學經明行修舉人辛丑幸五嶽觀冬十一月乙酉濱州河溢玉清昭應宮成詔減諸路繫囚罪流以下一等己丑加王旦司空修宮使壬辰御乾元門觀酺十二月癸丑朔日當食不虧丙辰詔王欽若等五人各舉京朝幕職州縣官詳練刑典曉時務任邊寄者二人丁巳詔川峽閩廣轉運提點刑獄官察屬吏貪墨慘刻者己未作元符觀庚申契丹使蕭延寧等辭歸國辛酉加楚王元佐尚書令相王元偓太尉榮王元儼兼中書令忠武軍節度使魏咸信同平章事餘並進秩涇原路請築籠竿城是歲夏州西涼府高麗女真來貢淮南江浙飢除其租天下戶九百五萬五千七百二十九口二千一百九十七萬六千九百六十五八年春正月壬午朔謁玉清昭應宮奉表告尊上玉皇大天帝聖號奉安刻玉天書于寶符閣還御崇德殿受賀赦天下非十惡枉法贓及已殺人者咸除之文武官滿三歲者有司考課以聞乙酉詔環州緣邊卒人賜薪水錢庚寅置清衛二指揮奉宮觀乙未皇女入道戊戌徙棣州城庚戌詔王欽若等舉供奉官至殿直有武幹者一人二月泗州周憲百五歲詔賜束帛甲寅宗正寺火丙辰唃廝囉立遵貢名馬丙寅以元佐為天策上將軍興元牧賜劍履上殿詔書不名丁卯遣使巡撫淮浙路癸酉祈雨丙子詔進士六舉諸科九舉者許奏名庚辰大雨三月乙酉幸元偓宮視疾戊戌宴宗室射于苑中壬寅御試禮部貢舉人夏四月辛酉賜宰相五臣論壬戌以寇準為武勝軍節度使同平章事王欽若陳堯叟並為樞密使同平章事戊辰德彝卒壬申榮王元儼宮火延及殿閣內庫癸酉詔求直言命丁謂為大內修葺使戊寅王膺坐準詔言事乖繆貶五月壬午榮王元儼罷武信軍節度使降封端王庚寅熒惑犯軒轅壬辰廢內侍省黃門禁金飾服器庚子放宮人一百八十四人六月己酉朔日有食之辛未詔諸州以御製七條刻石乙亥惟忠卒閏月己卯赦天下庚辰王欽若上彤管懿範七月丙辰以諸州牛疫免牛稅一年戊午王嗣宗為大同軍節度使丙寅幸相王元偓新宮以宮城火詔諸王徙宮于外丙子幸瑞聖園觀稼宴射于水心殿八月己卯大理少卿閻允恭開封判官韓允坐枉獄除名戊戌詔京兆河中府陝同華虢等州貸貧民麥種九月注輦國貢土物珍珠衫帽甲寅唃廝囉聚衆數十萬請討平夏人以自效丁卯宴宗室射于後苑己巳賜注輦使袍服牲酒冬十月乙巳王欽若上聖祖先天紀戊申回鶻呵羅等來貢十一月辛酉相王元偓加兼中書令端王元儼進封彭王癸亥高麗使同東女真來貢十二月戊寅皇子冠丁亥侍禁楊承吉使西蕃還以地理圖進辛卯皇子慶國公封壽春郡王是歲占城宗哥族及西蕃首領來貢坊州大雨河溢陝西飢九年春正月丙辰置會靈觀使以丁謂為之加刑部尚書壬申以張士遜崔遵度為壽春郡王友二月丁亥王旦等上兩朝國史戊子加旦守司徒修史官以下進秩賜物有差甲午詔以皇子就學之所名資善堂延州蕃部飢貸以邊穀三月丙午除雷州無名商稅錢秦州曹瑋撫捍蕃境得宜詔嘉之己酉王欽若上寶文統録辛酉以西蕃宗哥族李立遵為保順軍節度使壬戌詔舉官必擇廉能癸亥置修玉牒官乙丑著作佐郎高清以贓賄杖脊配沙門島夏四月庚辰周伯星見丙申賜天下酺振延州蕃族飢庚子幸陳堯叟第視疾壬寅以唐相元稹七世孫為台州司馬五月乙巳邠寧環慶部署王守斌言夏州蕃騎千五百來寇慶州內屬蕃部擊走之癸丑幸南宮視惟憲疾甲寅惟憲卒乙卯毛尸等三族蕃官馮移埋率屬來歸詔撫之丙辰詔天下繫囚死罪減等流以下釋之丁巳向敏中為宮觀慶成使甲子左天草場火庚午太白晝見六月戊寅幸會靈觀宴祝禧殿癸未京畿蝗秋七月撫水蠻寇宜州廣南西路請便宜掩擊許之丁未增築京師新城丙辰開封府祥符縣蝗附草死者數里戊午停京城工役癸亥以畿內蝗下詔戒郡縣甲子詔京城禁樂一月丁卯幸太乙宮天清寺八月壬申知秦州曹瑋言伏羌寨蕃部廝雞波與宗哥族連結為亂以兵夷其族帳丙子令江淮發運司留上供米五十萬以備飢年磁華瀛博等州蝗不為災丙戌製玉皇聖號册文以陳堯叟為右僕射戊子以旱罷秋宴壬辰羣臣請受尊號册寶表五上從之九月癸卯雄霸河溢甲辰以丁謂為平江軍節度使丙午陳彭年王曾張知白並參知政事丁未曹瑋言宗哥唃廝囉蕃部馬波叱臘魚角蟬等寇伏羌寨擊敗之斬首千餘級庚戌以不雨罷重陽宴利州水漂棧閣甲寅雨督諸路捕蝗丁巳詔以旱蝗得雨宜務稼省事及罷諸營造戊午禁諸路貢瑞物戊辰青州飛蝗赴海死積海岸百餘里己巳詔民有出私廩振貧乏者三千石至八千石第授助教文學上佐之秩冬十月己卯王欽若表上翊聖保德真君傳壬申詔馮拯等各舉殿直以上武幹者一人壬辰置直龍圖閣十一月會靈觀甘露降乙巳詔河陝諸路州簡禁軍五百人丁未河西節度使石普坐妄言災異除名流賀州丁卯以唐裴度孫坦為鄭州助教是歲西蕃宗哥族邛部山後蠻夏州甘州來貢諸州有隕霜害稼及水災者遣使振恤除其租天禧元年春正月辛丑朔改元詣玉清昭應宮薦獻上玉皇大天帝寶册衮服壬寅上聖祖寶册己酉上太廟諡册庚戌享六室辛亥謝天地于南郊大赦御天安殿受册號乙卯宰相讀天書於天安殿遂幸玉清昭應宮作欽承寶訓述示羣臣壬戌詔以四月旦日為天祥節丙寅命王旦為兗州太極觀奉上册寶使二月庚午詔振災發州郡常平倉壬申御正陽門觀酺丁丑置諫官御史各六員每月一員奏事有急務聽非時入對戊寅王旦加太保中書侍郎平章事向敏中加吏部尚書楚王元佐領雍州牧相王元偓加尚書令兼中書令進封徐王彭王元儼加太保壽春郡王禎兼中書令王欽若加右僕射趙德明加太傅中外官並加恩辛巳考課京朝官改秩及考者壬午定宗室子授官之制庚寅進封李公蘊為南平王秦州神武軍破宗哥族馬波叱臘等於野吳谷多獲人馬己亥陳彭年卒三月辛丑以不雨禱于四海壬寅不雨罷上巳宴庚申免潮州逋鹽三百七十萬有奇辛酉令作淖糜濟懷衛流民夏四月庚辰陳堯叟卒戊子邵州野竹生實以食飢五月戊戌詔所在安恤流民戊申以王旦為太尉侍中五日一入中書旦懇辭不拜己酉熒惑犯太微乙卯縱歲獻鷹犬己未奉太祖聖容於西京應天院向敏中為禮儀使諸路蝗食苗詔遣內臣分捕仍命使安撫六月壬申赦西京繫囚死罪減一等流以下釋之父老年八十者賜茶帛除其課役戊寅除升州後湖租錢五十餘萬聽民溉田陝西江淮南蝗並言自死庚辰盜發後漢高祖陵論如律並劾守土官吏遣內侍王克讓以禮治葬知制誥劉筠祭告因詔州縣申前代帝王陵寢樵採之禁乙酉免大食國蕃客稅之半龜茲國使張復延等貢玉勒鞍馬令給其直己丑王旦對于崇政殿秋七月丁未霖雨放朝己未幸魏咸信第視疾甲子魏咸信卒八月庚午以王欽若為左僕射兼中書侍郎平章事壬申向敏中加右僕射兼門下侍郎王旦對于便殿丙子詔京城禁圍草地聽民耕牧丁丑禁採狨戊寅免牛稅一年九月癸卯以參知政事王曾為禮部侍郎李迪為參知政事馬知節知樞密院事曹利用任中正周起並同知樞密院事丙午幸王旦第視疾戊申以蝗罷秋宴己酉王旦薨甲寅詔能拯救汴渠覆溺者給賞或溺者貧者以官錢給之丁未教衛士騎射冬十月辛未詔閣門自今審官三班院流內銓後殿日引公事勿過兩司壬申諭諸州非時災沴不以聞者論罪己卯罷京東上貢物辛卯賜壽春郡王及王友張士遜等詩十一月己亥詔曲宴日輟後殿視事辛丑曹瑋平鬼留家族壬寅詔淮浙荊湖治放生池禁漁採乙卯幸太一宮大雪帝謂宰相曰雪固豐稔之兆第民力未充慮失播種卿等其務振勸毋遺地利壬戌契丹使耶律準來賀承天節高麗使徐訥率女真首領入對崇政殿獻方物十二月丙寅京城雪寒給貧民粥並瘞死者乙亥罷京城工役丙子嚴寒放朝丁丑放逋負釋繫囚己卯女真國人歸給裝錢高麗使徐訥賜射瑞聖園辛卯詔陝西緣邊鬻穀者勿算壬辰遣使緣汴河收瘞流尸是歲三佛齊龜茲國來貢諸路蝗民飢鎮戎軍風雹害稼詔發廩振之蠲租賦貸其種糧二年春正月乙未真遊殿芝草生壬寅振河北京東飢辛亥賜壽春郡王恤民歌戊午王欽若等上天禧大禮記四十卷己未遣使諭京東官吏安撫飢民又命諸路振以淖糜二月丙寅甘州來貢丁卯壽春郡王加太保進封升王詔近臣舉常參官堪任御史者庚午右正言劉燁請自今言事許升殿從之庚辰振京西飢乙酉幸徐王元偓宮視疾三月辛丑修京城丙辰先貸貧民糧種止勿收夏四月戊子幸飛山雄武教場宴賜從臣將士庚寅赦天下死罪減一等流以下釋之閏月辰州討下溪州蠻斬首六十餘級降千餘人己亥詔戶部尚書馮拯等舉幕職令録堪充京官者各二人癸卯馬知節為彰德軍留後丁未靈泉出京師飲者愈疾作祥源觀壬子幸徐王元偓宮視疾五月壬戌詔長吏恤孝弟力田者甲子徐王元偓薨丁卯釋下溪州蠻彭儒猛罪丙戌西京訛言妖如帽夜蜚民甚恐六月壬辰詔三班使臣經七年者考課遷秩己亥詔諸州上佐文學參軍謫降十年者聽還鄉乙巳訛言帽妖至京師民夜叫譟達曙詔捕嘗為邪法人耿概等棄市辛亥彗出北斗魁秋七月壬申以星變赦天下流以下罪減等左降官羈管十年以上者放還京師京朝官丁憂七年未改秩者以聞丁亥彗沒八月庚寅羣臣請立皇太子從之壬寅下溪州彭儒猛納所掠漢生口器甲等詔賜袍帶甲辰立皇子升王為皇太子大赦天下宗室加恩羣臣賜勛一轉戊申黎州山後兩林百蠻都王李阿善遣使來貢壬子彭王元儼進封通王以李迪兼太子賓客癸丑作元良針賜皇太子甲寅楚王元佐加興元牧徐國長公主進封福國邠國長公主進封建國宿國長公主進封鄂國乙卯詔畎索河水入金水河丙辰以德雍德文惟政並為諸州防禦使允成允升允寧並為諸州團諫使九月丁卯册皇太子庚午詔全給外戍諸軍物庚辰御乾元門觀酺冬十月庚子御玉宸殿召近臣觀刈占城稻遂宴安福殿十二月辛丑以張旻為武寧軍節度使同平章事是歲占城國甘州溪洞黎州山後蠻來貢陝西旱振之江陰軍蝻不為災三年春正月癸亥貢舉人郭稹等見崇政殿稹冒喪赴舉命典謁詰之即引咎殿三舉二月乙未河南府地震三月戊午朔日有食之遣呂夷簡體訪陝亳民訛言丙寅御試禮部貢舉人癸未翰林學士工部尚書錢惟演等坐知舉失實降一官甲申潁州石隕出泉飲之愈疾夏四月甲午西上閣門使高繼勛坐市馬虧直削官五月丁巳大食國來貢乙丑左諫議大夫戚綸坐訕上貶嶽州副使辛未慮囚六月癸未浚淮南漕渠廢三堰甲午王欽若為太子太保河決滑州戊戌以寇準為中書侍郎兼吏部尚書平章事丁謂為吏部尚書參知政事滑州決河泛澶濮鄆齊徐境遣使救被溺者恤其家秋七月壬申曹璨卒羣臣表上尊號曰體元御極感天尊道應真寶運文德武功上聖欽明仁孝皇帝八月丁亥大赦天下普度道釋童行滑州龍見河決辛卯太白晝見己亥慶州亡去熟戶委乞等來歸庚戌遣使撫恤京東西河北水災九月乙丑慶州骨咩大門等族歸附辛巳遣中官存問高麗貢使之被溺者冬十一月己巳謁景靈宮庚午饗太廟辛未祀天地于圜丘大赦天下選兩任五考無責罰者試身言書判丁丑御天安殿受尊號册十二月丙戌富州蠻酋向光澤表納土詔卻之辛卯向敏中加左僕射中書侍郎兼禮部尚書平章事寇準加右僕射通王元儼進封涇王曹利用丁謂並為樞密使百官加恩癸巳以任中正周起並為樞密副使是歲高麗女真來貢江浙及利州路飢詔振之四年春正月乙丑以華州觀察使曹瑋為鎮國軍留後僉署樞密院事丙寅開揚州運河己巳幸元符觀庚午贈處士魏野著作郎賜其家粟帛二月帝不豫癸未遣使安撫淮南江浙利州飢民滑州決河塞辛丑發唐鄧八州常平倉振貧民三月戊午以淄州民飢貸牛糧甲子振蕃部粟庚午詔川峽致仕官聽還本貫癸酉川廣舉人勿拘定額己亥振益梓民飢己卯向敏中薨夏四月丁亥大風晝晦庚寅分江南轉運使為東西路丙申杖殺前定陶縣尉麻士瑤於青州五月丁巳發粟振秦隴六月丙申以寇準為太子太傅萊國公河決滑州壬寅御試禮部奏名舉人九十三人秋七月丁巳太白晝見辛酉京城大雨水壞廬舍大半丙寅以李迪為吏部侍郎兼太子少傅平章事馮拯為樞密使吏部尚書同平章事以霖雨壞營舍賜諸軍緡錢庚午以丁謂為平章事曹利用同平章事癸酉入內副都知周懷政伏誅丁丑太子太傅寇準降授太常卿翰林學士盛度樞密直學士王曙並罷職八月永興軍都巡檢使朱能殺中使叛乙酉以任中正王曾並參知政事詔利夔路置常平倉丙戌朱能自殺壬寅寇準貶道州司馬甲辰賜諸軍器幣入內押班鄭志誠坐交朱能削兩任配隸房州九月己酉分遣近臣張知白朝禋樂黃目等各舉常參官諸路轉運及勸農使各舉堪京官知縣者二人知制誥知雜御史直龍圖閣各舉堪御史者一人丙辰始御崇德殿視事治朱能黨死流者數十人己未久雨放朝壬戌給事中朱巽工部郎中梅詢坐不察朱能姦謫官丁卯赦天下己巳遣使安撫永興軍壬申賜京城酺冬十月戊寅命依唐制雙日不視事壬午幸正陽門觀酺帝自不豫浸少臨行至是人情大悅壬辰以王欽若為資政殿大學士甲辰減水災州縣秋租丙午召皇子宗室近臣玉宸殿觀稻賜宴十一月戊午召近臣於龍圖閣觀御製文詞帝曰朕聽覽之暇以翰墨自娛雖不足垂範亦平生遊心於此宰臣丁謂請鏤板宣布庚申內出御製七百二十二卷付宰臣丙寅丁謂加門下侍郎兼太子太傅李迪加中書侍郎兼尚書左丞依前少傅迪謂忿爭於帝前戊辰罷謂為戶部尚書迪為戶部侍郎任中正王曾錢惟演並兼太子賓客張士遜林特並兼太子詹事晏殊為太子左庶子己巳詔謂赴中書視事如故庚午詔自今除軍國大事仍舊親決餘皆委皇太子同宰相樞密使等參議行之太子上表陳讓不允以丁謂兼太子少師馮拯兼少傅曹利用兼少保辛未詔自今羣臣五日於長春殿起居餘隻日視朝於承明殿甲戌丁謂等請作天章閣奉安御集十二月乙酉皇太子親政詔內臣傳旨須覆奏丁亥龜茲甘州回鶻遣使來貢己丑王欽若加司空庚寅議事資善堂命張景宗侍皇太子丁酉以王欽若為山南東道節度使同平章事閏月丁卯以唃廝囉為邊患詔陳堯咨等巡撫庚午京城穀貴減直發常平倉乙亥帝不豫力疾御承明殿賜手書宰相諭以輔導儲二之意是歲京西陝西江淮荊湖諸州稔五年春正月己丑帝疾愈出幸啓聖院癸巳詔天下死罪降流以下釋之乙未遣使撫京東水災丁酉以張士遜為樞密副使己亥宴近臣承明殿二月甲寅審刑院言天下無斷獄丙寅賜天下酺庚午以孔子四十七世孫聖祐襲封文宣公三月辛巳御正陽門觀酺辛丑京東西水災賜民租十之五壬寅丁謂加司空馮拯加左僕射曹利用加右僕射任中正工部尚書夏四月丙辰客星出軒轅五月乙亥慮囚降天下死罪六月丙午太白晝見秋七月甲戌朔日有食之戊寅新作景靈宮萬壽殿八月壬戌熒惑犯南斗九月戊寅唃廝囉請降冬十月癸卯蠲京東西淮浙被災民租壬子依漢唐故事五日一受朝遇慶會皇太子押班十一月戊子王欽若以山南東道節度使坐擅赴闕降司農卿分司南京是歲高麗遣使來貢京東河北兩川荊湖稔乾興元年春正月辛未朔改元丁亥御東華門觀燈戊戌蠲秀州水災民租二月庚子大赦天下癸卯上尊號曰應天尊道欽明仁孝皇帝詔蘇湖秀州民飢貸以廩粟甲辰制封丁謂為晉國公馮拯為魏國公曹利用為韓國公庚戌詔徐州振貧民甲寅對宰相于寢殿帝不豫增劇禱于山川神祇戊午帝大漸遺詔皇太子於柩前即皇帝位尊皇后為皇太后權處分軍國事淑妃為皇太妃帝是日崩于延慶殿年五十五在位二十六年十月己酉葬永定陵己未祔太廟天聖二年十一月上尊諡曰文明武定章聖元孝皇帝廟號真宗慶曆七年加諡膺符稽古神功讓德文明武定章聖元孝皇帝贊曰真宗英晤之主其初踐位相臣李沆慮其聰明必多作為數奏災異以杜其侈心蓋有所見也及澶淵既盟封禪事作祥瑞沓臻天書屢降導迎奠安一國君臣如病狂然吁可怪也他日修遼史見契丹故俗而後推求宋史之微言焉宋自太宗幽州之敗惡言兵矣契丹其主稱天其后稱地一歲祭天不知其幾獵而手接飛鴈鴇自投地皆稱為天賜祭告而誇耀之意者宋之諸臣因知契丹之習又見其君有厭兵之意遂進神道設教之言欲假是以動敵人之聽聞庶幾足以潛消其窺覦之志歟然不思修本以制敵又效尤焉計亦末矣仁宗以天書殉葬山陵嗚呼賢哉
