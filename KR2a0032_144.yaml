body:
  text: 宋史卷一百四十四志第九十七儀衛二宮中導從行幸儀衛太上皇儀衛后妃儀衛宮中導從之制唐已前無聞焉五代漢乾祐中始置主輦十六人捧足一人掌扇四人持踏牀一人並服文綾袍銀葉弓腳幞頭尚宮一人寶省一人高鬢紫衣書省二人紫衣弓腳幞頭新婦二人高鬟青袍大將二人紫衣弓腳幞頭童子執紅絲拂二人高鬟髻青衣執犀盤二人帶鬅頭黃衫執翟尾二人帶鬅頭黃衫雞冠二人紫衣分執金灌器唾壺女冠二人紫衣執香爐香盤分左右以次奉引太宗太平興國初增主輦二十四人改服高腳幞頭輦頭一人衣紫繡袍持金塗銀仗以督領之奉珍珠七寶翠毛華樹二人衣緋袍奉金寶山二人衣緑繡袍奉龍腦合二人衣緋銷金袍並高腳幞頭執拂翟四人鬅頭衣黃繡袍舊衣綾袍紫衣者悉易以銷金及繡復增司簿一人內省一人司儀一人司給一人皆分左右前導凡一十七行每正至御殿祀郊廟步輦出入至長春殿用之其乘輦則屈右足垂左足而憑几蓋唐制也真宗時加四面內官周衛大中祥符三年內出繪圖以示宰相行幸儀衛宋初三駕皆以待禮事車駕近出止用常從以行其舊儀殿前司隨駕馬隊凡諸班直內殿前指揮使全班祗應左班七十六人二十四人在駕前左邊引駕五十二人作兩隊隨駕右班七十七人二十四人在駕前右邊引駕五十三人在駕後作兩隊隨駕二十七人第一隊二十六人第二隊內殿直五十四人散員六十四人散指揮六十四人散都頭五十四人散祗候五十四人金槍五十四人茶酒班祗應殿侍百五十七人東第二班長入祗候殿侍十八人駕後動樂三十一人馬隊弩手分東西八十五人招箭班三十五人散直百七人鈞容直三百二十人御龍直百四十二人御龍骨朵子直二百二十人並全班祗應御龍弓箭直百三十三人御龍弩直百三十三人寬衣天武指揮二百一十六人各有都虞候指揮使員僚若隨駕不使馬隊即減內殿直散員散指揮散都頭散祗候金槍等直仍減東西班馬隊弩手八十五人餘並同上凡皇城司隨駕人數崇政殿祗應親從四指揮共二百五十二人執擎骨朵充禁衛崇政殿門外快行祗候親從第四指揮五十四人車駕導從兩壁隨行親從親事官共九十六人並於駕前先行行幸所到之處充行宮司把門灑掃祗應各有正副都頭節級十將尚書兵部供黃麾仗內法物各一五色繡氅子並龍頭竿挂第一青繡孔雀氅第二緋繡鳳氅第三青繡孔雀氅第四皂繡鵝氅第五白繡鵝氅第六黃繡雞氅又六軍儀仗司供儀仗法物內獅子旗四口充門旗二口各一人執分左右二口各十人執扯分左右扯人執弓箭又左金吾引駕仗供牙門旗十四口十口開五門每門二口每口一人執二人夾計三十人並騎夾人執弓箭監門校尉二十人每門四人並帶儀刀騎二口係前步甲第七隊前二口係前部黃麾第一隊前二口係後部黃麾第一隊前二口係後步甲第一隊前二口係後步甲第七隊前四口開二門每門二口每口一人執二人夾計十二人並騎監門校尉六人並帶儀刀騎二口係兵部班劍儀刀隊後二口係真武隊前又右金吾引駕仗供牙門旗十四口制同左仗仁宗康定元年參知政事宋庠言車駕行幸非郊廟大禮具陳鹵簿外其常日導從惟前有駕頭後擁繖扇而已殊無禮典所載公卿奉引之盛其侍從及百司官屬下至廝役皆雜行道中步輦之後但以親事官百餘人執檛以殿謂之禁衛諸班徑騎頗與乘輿相遠士庶觀者率隨扈從之人夾道馳走喧呼不禁所過旗亭市樓垂簾外蔽士民馮高下瞰莫為嚴憚邏司街使恬不呵止威令薥闕玩習為常非所謂旄頭先驅清道後行之慎也且自黃帝以神功盛德猶假師兵營衛則防微御變古今一體案漢魏以降有大駕小駕之儀至唐又分殿中諸衛黃麾等仗名數次序各有施設國朝承五姓荒殘之弊事從簡略每鳴鑾遊豫盡去戈戟旌旗之制儀衛寡薄頗同藩鎮此皆制度放失憚于改作之咎宜委一二博學近臣討繹前代儀注及鹵簿令以乘輿常時出入之儀比之三駕諸仗酌取其中稍增儀物具嚴法禁以示尊極以防未然革去因循其在今日詔太常禮院與兩制詳定參以舊儀別加新制兩制同禮官議略準小駕制度添清道馬旗氅等物別為常行禁衛儀加清道馬百匹並帶器械分五行行二十人請下殿前司於諸班內差各一分左右並騎牙門旗前後各四分左右並騎緋繡鳳氅二十四分左右並騎以上請下殿前司於諸班內差充雉扇十二分左右請於親從官內差充以上新添百六十二人凡天武官舊二百一十六人空行今添執哥舒為一重親從官舊百四十五人今添百五十五人通為三百人為一重殿前指揮使舊四十八人今添百五十二人通為二百人或於近上諸班相兼差充並騎為一重以上因舊人數添舊四百九人新添三百七人共七百一十六人凡駕前殿前指揮使親從官為二重左右相對各開二門約二丈每門並差人員二人押當第一門與通事舍人相對第二門與閣門使相對每有臣僚仰駕起居並令中道候起居畢於左右門出其諸色人止令於牙門旗前道傍起居不得便入禁衛中每門外重令殿前指揮使執旗二面以表門用轉光錯綵旗通上計五重皆掩後團轉凡百司祗應人於禁衛內無執掌者及隨駕臣僚除合將入禁衛隨從人數外餘並令於殿前指揮使行外左右前後行凡前牙門旗以後後牙門旗以前屬禁衛中不得輒入凡中書樞密院臣僚並於從內第三重寬衣天武內行馬其餘隨駕文武臣僚並在從內第四重殿前指揮使內分左右依官位行馬凡車駕經歷去處若有樓閣並不得垂簾障蔽及止絶士庶不許臨高瞰下止於街兩傍立觀即不得夾路喧呼馳走前牙門以前後牙門以後不在此限凡車駕未出皇城門宣德左右掖東華拱宸門及已至所幸處即自有門禁不用牙門旗約束凡車駕已在道前牙門旗雖行後牙門旗未行除止絶間雜行人外其隨駕臣僚官司人等並依常例次第赴合隨從及行馬去處凡前牙門旗在清道馬後約十步已來後牙門旗在駕後殿前指揮使之後凡街巷寬闊處儀衛並依新圖排列如遇窄狹街巷禁衛止用親從官二重御龍直二重雉扇隨輦其殿前指揮使天武官並權分於駕前後隨行後至寬闊處乘輿徐行儀仗依舊排列或駕幸園苑宮觀寺院并臣僚宅即清道馬儀仗殿前指揮使天武官更不入惟於外排立其隨駕臣僚及諸司人自依常例隨從候駕行依次排列或臣僚宅在巷內前去不通人行處其儀仗殿前指揮使等各於巷口排立止絶行人餘並如故時詳定閲習既畢或言新制嚴密慮違犯者衆因不果行嘉祐六年先是幸睦親宅抱駕頭內臣墜馬壞駕頭太常禮院閣門及整肅禁衛所請自今車駕出以閣門祗候并內臣各二員分駕頭左右扇筤後編攔仍以皇城司親從官二十人隨之哲宗紹聖二年詔車駕行幸儀衛駕後東西班殿侍馬兩隊撥充駕前編攔分兩壁行於前引行門之前隨身器械各別給銀骨朵一駕後馬隊殿前指揮使馬以百人分四隊不足據人數均差仍別差人員六人內殿直散員散指揮散都頭散祗候並增作一百四人分四隊內人員各四人金槍班添一隊作七十八人內人員三人弩手班添兩隊充填撥過東西班殿侍馬兩隊禁衛御龍直弓箭直弩直長行仍各添給銀骨朵禁衛外添差編攔天武人員長行共二百人揀選有行止舊人充出入止於宣德門外至行在所即止於行宮門外南渡後乘輿出入初未有儀高宗將迎韋太后于郊因製常行儀仗用黃麾仗二千二百六十五人孝宗朝德壽宮減一千人用殿前司六百二十九人皇城在內巡檢司三百九十一人崇政殿四百四十九人凡一千四百六十九人四孟詣景靈宮用殿前司八百七十五人皇城在內巡檢司五百二十八人崇政殿五百二十一人凡一千九百二十四人九年正月詔駕出御後殿坐宰執百官儀衛等赴後殿起居殿上登輦出後殿門駕回入祥曦殿門太上皇儀衛隆興元年孝宗嗣位詔有司討論德壽宮輿輦儀衛先是紹興三十二年六月詔上皇日常朝殿差御龍直四十三人執仗排立并設繖扇鳴鞭宰執退朝仍赴德壽宮起居如遇行幸令禁衛所隨以祗應兩奉上皇旨却而不受故復有是詔尋有司上言漢之未央唐之興慶其車輦儀衛不載今父堯子舜事親典禮凡往古來今所未備者當以義起極其尊崇為萬世法遂定宰執百官詣德壽宮起居則禁衛所依後殿坐儀排列禁衛二百九十七人祗應行幸則禁衛所差行門禁衛諸班直天武親從官及繖扇鳴鞭燭罩等合五百人隨行扈從前引七十人內行宮殿前崇政殿親從一十人都下親從二十人快行親從二十人殿前指揮使二十人中道六十人編排禁衛行子一十人執從物御龍直三十人執繖扇天武一十人崇政殿親從攔前一十人禁衛圍子四重四百人第一崇政殿親從一百人第二御龍直骨朵直弓箭直三十人東西班七十人第三執燭罩都下親從一百人第四內殿直一十人散員散指揮散都頭散祗候金鎗銀鎗班各一十人後從殿前指揮使二十人皇太后儀衛自乾興元年仁宗即位章獻太后預政侍衛始盛用禮儀院奏製皇太后所乘輿名之曰大安輦天聖元年有司言皇太后車駕出合設護衛御龍直都虞候一人都頭二人副都頭一人長行五十人十將已下骨朵子直都虞候一人都頭二人副都頭二人十將長行八十人弓箭直指揮使一人都頭二人副都頭二人十將長行五十人弩直指揮使一人都頭二人副都頭二人十將長行五十人殿前指揮使兩班左班都虞候一人都知一人行門三人長行二十人帶器械右班指揮使一人都知一人行門三人長行二十人帶器械皇城司禁衛二百人寬衣天武二百人供御輦官六十二人寬衣天武百人餘諸司祗應鳴鞭侍衛如乘輿之儀詔依嘉祐八年英宗即位太常禮院言準詔再詳定皇太后出入儀衛御龍直都頭二人長行二十五人骨朵子直都頭二人長行四十人弓箭直都頭二人長行二十五人弩直都頭二人長行二十五人殿前指揮使兩班各都知一人行門各二人長行各一十人帶器械皇城司禁衛一百人寬衣天武一百五十人打燈籠子親事官八十人入內都知御藥院官各一員內東門司使臣二員御輦院短鐙教駿攏馬親事官入內院子諸司并入內內侍省祗應內品人數不定詔依治平元年詔皇太后出入唯不鳴鞭他儀衛如章獻明肅故事四年神宗嗣位詔太皇太后儀範已定皇太后合設儀衛御龍直骨朵子直差都虞候都頭副都頭各一人十將長行各共三十人弓箭直弩直差指揮使都頭副都頭各一人十將長行各共二十人皇城司親從官一百人執骨朵寬衣天武官百五十人充圍子行宮司人員共一百人入內院子五十人充圍子皇城司親事官八十人打燈籠短鐙馬攏馬親從官金銅車棕車隨車子祗應人擎簷子供御輦官執擎從物等供御次供御并下都輦直等人數不定都知一員御藥院使臣二員內東門司使臣二員內酒坊御廚法酒庫儀鸞司乳酪院翰林司翰林院車子院御膳素廚化成殿果子庫並從遇出新城門添差帶器械內臣哲宗即位元祐元年詔太皇太后出入儀衛並依章獻明肅皇后故事其不可考者則依慈聖光獻皇后之例既而又詔太皇太后出入儀衛添御龍骨朵子直三十六人御龍弓箭直四十五人御龍弩直四十五人皇城司禁衛五十人馬隊三百五十人東西班茶酒班殿侍共一百人快行增至二十人軍頭引見司監官二員並將帶承局等子依隨駕例祗應鈞容直并動樂殿侍則候開樂取旨仁英哲之世太后臨朝垂簾儀從亦不崇侈止曰儀衛無鹵簿名也南渡後尤簡其車以輿不以輦餘惟繖扇而已紹興奉迎太母極意備禮然猶曰太后天性朴素不敢過飾儀從器物惟塗金輿前用黃羅繖扇二緋黃繡雉扇六紅黃緋金拂扇二黃羅暖扇二朝謁景靈宮太廟則用禁衛諸班直天武親從五百人其前引中道圍子同上皇儀衛而差省焉皇太妃出入儀衛哲宗紹聖元年三省樞密院言增崇皇太妃出入儀衛龍鳳扇二十侍從官入內省都知或押班一員內侍省都知或押班一員皇城司御藥院內東門司各一員帶御器械內侍八員引喝內侍一員殿前指揮使三十二人內人員二人御龍直三十三人骨朵子直三十三人弓箭直二十三人弩直二十三人天武官一百五十四人皇城司禁衛一百人入內院子五十人行宮司一百人輦官供御六十二人次供御四十九人下都五十八人燭籠七十諸司御燎子茶牀快行親從四人禮部太常寺又言元祐三年詔皇太妃繖用紅黃羅參議得皇太后出入兼用紅黃今皇太妃若亦用黃則非差降之意伏請紅黃兼用從皇太后出入則止用紅徽宗崇寧元年臣僚言元符皇后先帝皇后也其典禮宜極褒崇於是約聖瑞皇太妃之制出入由宣德正門增龍鳳扇二十御龍直十二人御龍骨朵子直十七人御龍弓箭直十二人御龍弩直二十二人殿前指揮十三人皇城司禁衛二十人快行親從官四人執燭皇城司親從官金銅車并棕車隨時定數供須行幸藥架一坐勾當官吏人二員封題一員藥童三人撎檠藥架輦官十一人稱庫子親事官量差人數祗應從之二年臣僚又言元符皇后元符末嘗預定策之勳以承神宗哲宗之志禮部太常寺奏典禮準聖瑞皇太妃例侍從官入內內侍省都知或押班一員皇城御藥內東門司官各一員御輦院輪官隨從諸司御燎子茶牀帶御器械內侍十人引喝內侍一人輿用龍鳳繖紅黃兼用出入由宣德東門今欲出入由宣德正門龍鳳扇二十柄今添作三十柄輦官供御六十二人次供御四十九人都下五十八人御龍直三十三人今添作四十五人御龍骨朵子直三十三人今添作五十人御龍弓箭直三十三人今添作四十五人御龍弩直二十三人今添作四十五人殿前指揮三十二人今添作四十五人內臣二人皇城司一百人禁衛今添作一百二十人天武官一百五十四人行宮司一百人入內院子五十人快行親從官四人今添作八人執燭皇城司親從官金銅車並棕車逐時內中批出合要數供須行幸藥架一坐勾當官一員吏人二員封題一員藥童三人撎檠藥架輦官十一人稱庫子親事官量差人數祗應從之皇后儀衛惟東都政和禮有鹵簿他無鹵簿之名惟曰儀衛而已中興後皇太后既尚簡素后尤簡焉出入朝謁宮廟用應奉御輦官一員人吏三人供應六十三人內人員十五人頭帽紫羅四單衫金塗銀柘枝腰帶肩擎輦官四十八人幞頭緋羅單衫金塗海捷腰帶紫羅表夾三襜緋羅看帶次供應十四人內人員一人服同上惟海捷帶輦官一十三人服同肩擎官惟行獅帶都下五十四人內人員一人帽服同前輦官五十三人服同上輦官惟雲鶴帶
