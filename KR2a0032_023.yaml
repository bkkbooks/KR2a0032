body:
  text: 宋史卷二十三本紀第二十三欽宗欽宗恭文順德仁孝皇帝諱桓徽宗皇帝長子母曰恭顯皇后王氏元符三年四月己酉生于坤寧殿初名亶封韓國公明年六月進封京兆郡王崇寧元年二月甲午更名烜十一月丁亥又改今名大觀二年正月進封定王政和元年三月講學于資善堂三年正月加太保四年二月癸酉冠于文德殿五年二月乙巳立為皇太子大赦天下丁巳謁太廟詔乘金輅設鹵簿如至道天禧故事及宮僚參謁並稱臣皆辭之六年六月癸未納妃朱氏宣和七年十二月戊午除開封牧庚申徽宗詔皇太子嗣位自稱曰道君皇帝趣太子入禁中被以御服泣涕固辭因得疾又固辭不許辛酉即皇帝位御垂拱殿見羣臣是日日有五色暈挾赤黃珥重日相蕩摩久之乃引道君皇帝出居龍德宮皇后出居擷景園以少宰李邦彥為龍德宮使太保領樞密院事蔡攸門下侍郎吳敏副之是時金人已分道犯境壬戌赦大逆反叛以下罪進百官秩一等賞諸軍立妃朱氏為皇后以太子詹事耿南仲簽書樞密院事癸亥詔太傅燕王越王入朝不趨贊拜不名詔非三省樞密院所得旨有司勿行甲子斡離不陷信德府粘罕圍太原詔京東淮西浙募兵入衞太學生陳東等上書數蔡京童貫王黼梁師成李彥朱勔罪謂之六賊請誅之丙寅上道君皇帝尊號曰教主道君太上皇帝皇后曰道君太上皇后詔改元靖康元年春正月丁卯朔受羣臣朝賀退詣龍德宮賀道君皇帝詔中外臣庶實封言得失金人破相州戊辰破濬州威武軍節度使梁方平師潰河北河東路制置副使何灌退保滑州己巳灌奔還金人濟河詔親征道君皇帝東巡以領樞密院事蔡攸為行宮使尚書右丞宇文粹中副之詔自今除授黜陟及恩數等事並參酌祖宗舊制罷內外官司局所一百五處止留後苑以奉龍德宮以門下侍郎吳敏知樞密院事吏部尚書李梲同知樞密院事貶太傅致仕王黼為崇信軍節度副使安置永州賜翊衞大夫安德軍承宣使李彥死並籍其家放寧遠軍節度使朱勔歸田里帝欲親征以李綱為留守以李梲為副給事中王𧜛諫親征罷之庚午道君皇帝如亳州百官多潛遁宰相欲奉帝出襄鄧李綱諫止之以綱為尚書右丞辛未以李綱為親征行營使侍衞親軍馬軍都指揮使曹曚副之太宰兼門下侍郎白時中罷李邦彥為太宰兼門下侍郎守中書侍郎張邦昌為少宰兼中書侍郎尚書左丞趙野為門下侍郎翰林學士承旨王孝迪為中書侍郎同知樞密院事蔡懋為尚書左丞壬申金人渡河遣使督諸道兵入援癸酉詔兩省樞密院官制一遵元豐故事金人犯京師命尚書駕部員外郎鄭望之親衞大夫康州防禦使高世則使其軍詔從官舉文武臣僚堪充將帥有膽勇者是夜金人攻宣澤門李綱禦之斬獲百餘人至旦始退甲戌金人遣吳孝民來議和命李梲使金軍金人又使蕭三寶奴耶律忠張愿恭來以吏部尚書唐恪同知樞密院事乙亥金人攻通津景陽等門李綱督戰自卯至酉斬首數千級何灌戰死李梲與蕭三寶奴耶律忠王汭來索金帛數千萬且求割太原中山河間三鎮幷宰相親王為質乃退師丙子避正殿減常膳括借金銀籍倡優家財庚辰命張邦昌副康王構使金軍詔稱金國加大字辛巳道君皇帝幸鎮江以兵部尚書路允迪簽書樞密院事金人陷陽武知縣事蔣興祖死之壬午大風走石竟日乃止封子諶為大寧郡王甲申省廉訪使者官罷鈔旁定貼錢及諸州免行錢以諸路贍學戶絕田產歸常平司統制官馬忠以京西募兵至擊金人于順天門外敗之乙酉路允迪使粘罕軍于河東平陽府將劉嗣初以城叛丁亥靜難軍節度使河北河東路制置使种師道督涇原秦鳳兵入援以師道同知樞密院事為京畿河北河東宣撫使統四方勤王兵及前後軍庚寅盜殺王黼于雍丘癸巳大霧四塞乙未貶少保淮南節度使梁師成為彰化軍節度副使行及八角鎮賜死二月丁酉朔命都統制姚平仲將兵夜襲金人軍不克而奔戊戌罷李綱以謝金人廢親征行營司金人復來議和庚子命駙馬都尉曹晟使金軍辛丑又命資政殿大學士宇文虛中知東上閤門事王球使之許割三鎮地太學諸生陳東等及都民數萬人伏闕上書請復用李綱及种師道且言李邦彥等疾綱恐其成功罷綱正墮金人之計會邦彥入朝衆數其罪而罵吳敏傳宣衆不退遂撾登聞鼓山呼動地殿帥王宗濋恐生變奏上勉從之遣耿南仲號於衆曰已得旨宣綱矣內侍朱拱之宣綱後期衆臠而磔之幷殺內侍數十人乃復綱右丞充京城防禦使壬寅追封范仲淹魏國公贈司馬光太師張商英太保除元祐黨籍學術之禁詔誅士民殺內侍為首者禁伏闕上書廢苑囿宮觀可以與民者金人使王汭來癸卯命肅王樞使金軍以觀文殿學士大名尹徐處仁為中書侍郎宇文虛中簽書樞密院事蔡懋罷乙巳宇文虛中王球復使金軍康王至自金軍金人遣韓光裔來告辭遂退師京師解嚴丙午康王構為太傅靜江奉寧軍節度使省明堂班朔布政官丁未日有兩珥戊申赦天下詔諭士民自今庶事並遵用祖宗舊制凡蠹國害民之事一切寢罷己酉罷宰執兼神霄玉清萬壽宮使及殿中監符寶郎詔用祖宗故事擇武臣得軍心者為同知簽書樞密院邊將有威望者為三衙以金人請和詔官民昔嘗附金而復歸本朝者各還其鄉國庚戌李邦彥罷以張邦昌為太宰兼門下侍郎吳敏為少宰兼中書侍郎李綱知樞密院事耿南仲為尚書左丞李梲為尚書右丞辛亥詔監察御史言事如祖宗法宇文粹中罷知江寧府癸丑种師道罷為中太一宮使贈右正言陳瓘為右諫議大夫甲寅貶太師致仕蔡京為祕書監分司南京太師廣陽郡王童貫為左衞上將軍太保領樞密院事蔡攸為太中大夫提舉亳州明道宮先是粘罕遣人來求賂大臣以勤王兵大集拘其使人且結約余覩以圖之至是粘罕怒及攻太原不克分兵趣京師過南北關權威勝軍李植以城降乙卯陷隆德府知府張確通判趙伯臻司錄張彥遹死之丙辰有二流星一出張宿入濁沒一出北河入軫己未詔遙郡承宣使有功應除正任者自今除正任刺史辛酉梁方平坐棄河津伏誅王孝迪罷命給事中王雲侍衞親軍馬軍都指揮使曹曚使金國鎮洮軍節度使中太乙宮使种師道為河北河東路宣撫使保靜軍節度使殿前副都指揮使姚古為制置使乙丑御殿復膳丙寅下哀痛之詔于陝西河東是月金人犯澤州之高平知州高世由往犒之乃去三月丁卯朔遣徽猷閣待制宋煥奉表道君皇帝行宮詔侍從言事詔非三省樞密院所奉旨諸司不許奉行罷川路歲所遣使募人掩軍民遺骸遣使分就四郊致祭戊辰李梲罷為鴻慶宮使己巳張邦昌罷為中太一宮使徐處仁為太宰兼門下侍郎唐恪為中書侍郎翰林學士何石凾為尚書右丞御史中丞許翰同知樞密院事庚午宇文虛中罷知青州癸酉詣景靈東宮行恭謝禮命趙野為道君皇帝行宮奉迎使甲戌恭謝景靈西宮及建隆觀乙亥詣陽德觀凝祥池中太一宮佑神觀相國寺丙子改擷景園為寧德宮錄司馬光後己卯燕王俁越王偲為太師壬午詔金人叛盟深入其元主和議李邦彥奉使許地李梲李鄴鄭望之悉行罷黜又詔种師道姚古种師中往援三鎮保塞陵寢所在誓當固守癸未遣李綱迎道君皇帝于南京以徐處仁為禮儀使殿中侍御史李擢左司諫李會罷乙酉迎道君皇帝于宜春苑太后入居寧德宮丙戌知中山府詹度為資政殿大學士知太原府張孝純知河間府陳遘並為資政殿學士知澤州高世由直龍圖閣賞城守之勞也丁亥朝于寧德宮詔扈從行宮官吏候還京日優加賞典除有罪之人迫於公議已行遣外餘令臺諫勿復用前事糾言庚寅肅王樞為太傅姚古復隆德府辛卯復威勝軍壬辰太保景王嵵濟王栩為太傅有流星出紫微垣甲午康王構為集慶建雄軍節度使尚書戶部侍郎錢蓋為陝西制置使命陳東初品官賜同進士出身辭不拜籍朱勔家乙未詔金歸朝官民未發遣者止之丙申貶蔡京為崇信軍節度副使是春夏人取天德雲內武州及河東八館夏四月戊戌夏人陷震威城攝知城事朱昭死之己亥迎太上皇帝入都門壬寅朝于龍德宮癸卯立子諶為皇太子耿南仲為門下侍郎乙巳置春秋博士戊申置詳議司於尚書省討論祖宗法己酉乾龍節羣臣上壽于紫宸殿庚戌趙野罷壬子金人使賈霆冉企弓來癸丑封太師沂國公鄭紳為樂平郡王貶童貫為昭化軍節度副使安置郴州減宰執俸給三之一及支賜之半詔開經筵令吏部稽考庶官凡由楊戩李彥之公田王黼朱勔之應奉童貫西北之師孟昌齡河防之役夔蜀湖南之開疆關陝河東之改幣及近習所引獻頌可采特赴殿試之流所得爵賞悉奪之甲寅种師道加太尉同知樞密院事河北河東路宣撫使乙卯詔自今假日特坐百司毋得休務以平涼軍節度使范訥為右金吾衞上將軍丙辰詔有告姦人妄言金人復至以恐動居民者賞之戊午進封南康郡王栻為和王平陽郡王榛為信王己未復以詩賦取士禁用莊老及王安石字說壬戌詔親擢臺諫官宰執勿得薦舉著為令追政和以來道官處士先生封贈奏補等敕書甲子令在京監察御史在外監司郡守及路分鈐轄已上舉曾經邊任或有武勇可以統衆出戰者人二員東兵正將占沆與金人戰于交城縣死之乙丑詔三衙幷諸路帥司各舉諳練邊事智勇過人幷豪俊奇傑衆所推服堪充統制將領者各五名貶蔡攸節度副使安置朱勔于循州五月丙寅朔朝于龍德宮令提舉官日具太上皇帝起居平安以聞丁卯詔天下有能以財穀佐軍者有司以名聞推恩有差以少傅鎮西軍節度余深為特進觀文殿大學士戊辰罷王安石配享孔子廟庭庚午少傅安武軍節度使錢景臻鎮安軍節度使開府儀同三司劉宗元並為左金吾衞上將軍保信軍節度使劉敷武成軍節度使劉敏嚮德軍節度使張楙岳陽軍節度使王舜臣應道軍節度使朱孝孫瀘川軍節度使錢忱並為右金吾衞上將軍是日寒辛未申銅禁詔無出身待制已上年及三十而通歷任實及十年者乃得任子監察御史余應求坐言事迎合大臣罷知衞州甲戌曲赦河北路乙亥申銷金禁丁丑詔以儉約先天下澄冗汰貪為民除害授監司郡縣奉行所未及者凡十有六事姚古將兵至威勝聞粘罕將至衆驚潰河東大振河北河東路制置副使种師中與金人戰于榆次死之己卯借外任官職田一年開府儀同三司高俅卒辛巳損太官日進膳追削高俅官甲申罷詳議司己丑以河東經略安撫使張孝純為檢校少保武當軍節度使壬辰詔天下舉習武藝兵書者乙未詔姚古援太原六月丙申朔以道君皇帝還朝御紫宸殿受群臣朝賀詔諫官極論闕失戊戌令中外舉文武官才堪將帥者時太原圍急羣臣欲割三鎮地李綱沮之乃以李綱代种師道為宣撫使援太原辛丑以資政殿學士劉韐為宣撫副使陝西制置司都統制解潛為制置副使太白犯歲星壬寅封鄆國公楃為安康郡王韓國公楗為廣平郡王幷開府儀同三司詔今日政令惟遵奉上皇詔書修復祖宗故事羣臣庶士亦當講孔孟之正道察安石舊說之不當者羽翼朕志以濟中興癸卯以侍衞親軍馬軍副都指揮使鎮西軍承宣使王稟為建武軍節度使錄堅守太原之功也甲辰路允迪罷為醴泉觀使乙巳左司諫陳公輔以言事責監合州酒務壬子天狗墜地有聲如雷癸丑慮囚丙辰太白熒惑歲鎮四星合於張辛酉罷都水將作監承受內侍官熙河都統制焦安節坐不法李綱斬之壬戌姚古坐擁兵逗遛貶為節度副使安置廣州彗出紫微垣秋七月乙丑朔除元符上書邪等之禁宋昭政和中上書諫攻遼貶連州庚午詔赴都堂乙亥安置蔡京于儋州攸雷州童貫吉陽軍己卯免借河北河東陝西路職田乙酉詔蔡京子孫二十三人已分竄遠地遇赦不許量移是日京死于潭州丁亥令侍從官共議改修宣仁聖烈皇后謗史辛卯遣監察御史張澂誅童貫廣西轉運副使李昇之誅趙良嗣並竄其子孫于海南壬辰侍御史李光坐言事貶監當是月解潛與金人戰于南關敗績劉韐自遼州引兵與金人戰敗績八月甲午朔錄陳瓘後丙申復命种師道以宣撫使巡邊召李綱還庚子詔以彗星避殿減膳令從臣具民間疾苦以聞河東察訪使張灝與金人戰于文水敗績辛丑詔求民之疾苦者十七事悉除之丁未斡離不復攻廣信軍保州不克遂犯真定戊申都統制張思正等夜襲金人于文水縣敗之己酉復戰師潰死者數萬人思正奔汾州都統制折可求師潰于子夏山威勝隆德汾晉澤絳民皆渡河南奔州縣皆空金人乘勝攻太原錄張庭堅後乙卯遣徽猷閣待制王雲閤門宣贊舍人馬識遠使于金國祕書著作佐郎劉岑太常博士李若水分使其軍議和戊午許翰罷知亳州己未太宰徐處仁罷知東平少宰吳敏罷知揚州以唐恪為少宰兼中書侍郎何石凾為中書侍郎禮部尚書陳過庭為尚書右丞開封尹聶昌同知樞密院事御史中丞李回簽書樞密院事庚申遣王雲使金軍許以三鎮賦稅是月福州軍亂殺其知州事柳庭俊九月丙寅金人陷太原執安撫使張孝純副都總管王稟通判方笈皆死之辛未貶吳敏為崇信軍節度副使安置涪州移蔡攸于萬安軍尋與弟翛及朱勔皆賜死乙亥詔編修敕令所取靖康以前蔡京所乞御筆手詔參祖宗法及今所行者刪修成書丁丑禮部尚書王𧜛為尚書左丞戊寅有赤氣隨日出李綱罷知揚州壬午梟童貫首于都市癸未賜布衣尹焞為和靖處士甲申日有兩珥背氣丙戌建三京及鄧州為都總管府分總四道兵庚寅以知大名府趙野為北道都總管知河南府王襄為西道都總管知鄧州張叔夜為南道都總管知應天府胡直孺為東道都總管又罷李綱提舉洞霄宮辛卯遣給事中黃鍔由海道使金國議和是月夏人陷西安州冬十月癸巳朔御殿復膳貶李綱為保靜軍節度副使安置建昌軍丁酉金人陷真定都鈐轄劉死之有流星如杯戊戌金人使楊天吉王汭來庚子日有青赤黃戴氣金人陷汾州知州張克戩兵馬都監賈亶死之又攻平定軍辛丑下哀痛詔命河北河東諸路帥臣傳檄所部得便宜行事壬寅天寧節率羣臣詣龍德宮上壽甲辰詔用蔡京王黼童貫所薦人丙午集從官于尚書省議割三鎮召种師道還丁未以禮部尚書馮澥知樞密院事己酉閱砲飛山營庚戌以范訥為寧武軍節度使河北河東路宣撫使遼故將小攻陷麟州建寧砦知砦楊震死之壬子詔太常禮官集議金主尊號命尚書左丞王𧜛副康王使斡離不軍𧜛辭乙卯雨木冰丙辰金人陷平陽府又陷威勝隆德澤州丁巳高麗入貢令明州遞表以進遣其使還戊午貶王𧜛為單州團練副使命馮澥代行庚申日有兩珥及背氣侍御史胡舜陟請援中山不省辛酉种師道薨十一月丙寅夏人陷懷德軍知軍事劉銓通判杜翊世死之籍譚稹家戊辰康王未至金軍而還馮澥罷己巳集百官議三鎮棄守庚午詔河北河東京畿清野令流民得占官舍寺觀以居辛未有流星如杯壬申禁京師民以浮言相動者癸酉右諫議大夫范宗尹以首議棄地罷金人至河外宣撫副使折彥質領師十二萬拒之甲戌師潰金人濟河知河陽燕瑛西京留守王襄棄城遁乙亥命刑部尚書王雲副康王使斡離不軍許割三鎮奉衮冕車輅尊其主為皇叔且上尊號丙子金人渡河折彥質兵盡潰提刑許高兵潰于洛口金人來言欲盡得河北地京師戒嚴遣資政殿學士馮澥及李若水使粘罕軍丁丑何石凾罷以尚書左丞陳過庭為中書侍郎兵部尚書孫傅為尚書右丞命成忠郎郭京領選六甲正兵所簽書樞密院事李回以萬騎防河衆潰而歸是日塞京城門戊寅進龍德宮婉容韋氏為賢妃康王構為安國安武軍節度使罷清野辛巳以知懷州霍安國為徽猷閣待制通判林淵直徽猷閣賞守禦之功也壬午斡離不使楊天吉王汭勃堇撒離栂來命耿南仲使斡離不軍聶昌使粘罕軍許畫河為界康王至磁州州人殺王雲止王勿行王復還相州甲申以尚書右丞孫傅同知樞密院事御史中丞曹輔簽書樞密院事以京兆府路安撫使范致虛為陝西五路宣撫使令督勤王兵入援乙酉斡離不軍至城下遣蠟書間行出關召兵又約康王及河北守將來援多為邏兵所獲丁亥大風發屋折木李回罷戊子金人攻通津門范瓊出兵焚其砦己丑南道總管張叔夜將兵勤王至玉津園以叔夜為延康殿學士斡離不遣劉晏來庚寅幸東壁勞軍詔三省長官名悉依元豐舊制領開封府何石凾為門下侍郎閏月壬辰朔金人攻善利門統制姚仲友禦之奇兵作亂殺使臣王宗濋斬數十人乃定唐恪出都人欲擊之因求去罷為中太一宮使以門下侍郎何石凾為尚書右僕射兼中書侍郎劉韐坐棄軍降五官予祠癸巳京師苦寒用日者言借土牛迎春朱伯友坐棄鄭州降三官罷西道總管王襄棄西京去知澤州高世由以城降于金燕瑛欲棄河陽為亂兵所殺河東諸郡或降或破殆盡都民殺東壁統制官辛亢宗罷民乘城代以保甲粘罕軍至城下甲午時雨雪交作帝被甲登城以御膳賜士卒易火飯以進人皆感激流涕金人攻通津門數百人縋城禦之焚其砲架五鵝車二驛召李綱為資政殿大學士領開封府金人陷懷州霍安國林淵及其鈐轄張彭年都監趙士張諶皆死之乙未金人入青城攻朝陽門馮澥與金人蕭慶楊真誥來丙申帝幸宣化門以障泥乘馬行泥淖中民皆感泣張叔夜數戰有功帝如安上門召見拜資政殿學士金人執胡直孺又陷拱州丁酉赤氣亙天以馮澥為尚書左丞戊戌殿前副都指揮使王宗濋與金人戰于城下統制官高師旦死之庚子以資政殿學士張叔夜簽書樞密院事金人攻宣化門姚仲友禦之辛丑金人攻南壁殺傷相當壬寅詔河北守臣盡起軍民兵倍道入援癸卯金人攻南壁張叔夜范瓊分兵襲之遙見金兵奔還自相蹈藉溺隍死者以千數甲辰大雨雪金人陷亳州遣間使召諸道兵勤王乙巳大寒士卒噤戰不能執兵有僵仆者帝在禁中徒跣祈晴時勤王兵不至城中兵可用者惟衞士三萬然亦十失五六金人攻城急丙午雨木冰丁未始避正殿己酉遣馮澥曹輔與宗室仲溫士使金軍請和命康王為天下兵馬大元帥速領兵入衞辛亥金人來議和要親王出盟壬子金人攻通津宣化門范瓊以千人出戰渡河冰裂沒者五百餘人自是士氣益挫甲寅大風自北起俄大雨雪連日夜不止乙卯金人復使劉晏來趣親王宰相出盟丙辰妖人郭京用六甲法盡令守禦人下城大啟宣化門出攻金人兵大敗京託言下城作法引餘兵遁去金兵登城衆皆披靡金人焚南薰諸門姚仲友死于亂兵宦者黃經國赴火死統制官何慶言陳克禮中書舍人高振力戰與其家人皆被害秦元領保甲斬關遁京城陷衞士入都亭驛執劉晏殺之丁巳奉道君皇帝寧德皇后入居延福宮命何石凾及濟王栩使金軍戊午何石凾入言金人邀上皇出郊帝曰上皇驚憂而疾必欲之出朕當親往自乙卯雪不止是日霽夜有白氣出太微彗星見庚申日赤如火無光辛酉帝如青城十二月壬戌朔帝在青城蕭慶入居尚書省是日康王開大元帥府于相州癸亥帝至自青城甲子大索金帛丙寅遣陳過庭劉韐使兩河割地辛未定京師米價勸糶以振民癸酉斬行門指揮使蔣宣李福乙亥康王如北京丙子尚書省火庚辰雨雹癸未大雪寒縱民伐紫筠館花木為薪庚寅康王如東平二年春正月辛卯朔命濟王栩景王嵵出賀金軍金人亦遣使入賀壬辰金人趣召康王還遣聶昌耿南仲陳過庭出割兩河地民堅守不奉詔凡累月止得石州甲午詔兩河民開門出降乙未有大星出建星西南流入于濁沒丁酉雨木冰己亥陰曀風迅發夜西北陰雲中有如火光庚子金人索金銀急何石凾李若水勸帝親至軍中從之以太子監國而行乙巳籍梁師成家丙午劉韐自經于金軍太學生徐揆上書乞守門請帝還闕金人取至軍中揆抗論為所殺至夜金人劫神衞營丁未大霧四塞金人下含輝門剽掠焚五岳觀二月辛酉朔帝在青城自如金軍都人出迎駕丙寅金人塹南薰門路人心大恐已而金人令推立異姓孫傅方號慟乞立趙氏不允丁卯金人要上皇如青城以內侍鄧述所具諸王孫名盡取入軍中辛未金人偪上皇召皇后皇太子入青城庚辰康王如濟州癸未觀文殿大學士唐恪仰藥自殺乙酉金人以括金未足殺戶部尚書梅執禮侍郎陳知質刑部侍郎程振給事中安扶三月辛卯朔帝在青城丁酉金人立張邦昌為楚帝庚子金人來取宗室開封尹徐秉哲令民結保毋藏匿丁巳金人脅上皇北行夏四月庚申朔大風吹石折木金人以帝及皇后皇太子北歸凡法駕鹵簿皇后以下車輅鹵簿冠服禮器法物大樂教坊樂器祭器八寶九鼎圭璧渾天儀銅人刻漏古器景靈宮供器太清樓祕閣三館書天下州府圖及官吏內人內侍技藝工匠娼優府庫畜積為之一空辛酉北風大起苦寒五月庚寅朔康王即位于南京遙上尊號曰孝慈淵聖皇帝紹興三十一年五月辛卯帝崩問至七月己丑上尊謚曰恭文順德仁孝皇帝廟號欽宗三十二年閏二月戊寅祔于太廟贊曰帝在東宮不見失德及其踐阼聲技音樂一無所好靖康初政能正王黼朱勔等罪而竄殛之故金人聞帝內禪將有卷甲北旆之意矣惜其亂勢已成不可救藥君臣相視又不能同力協謀以濟斯難惴惴然講和之不暇卒致父子淪胥社稷蕪茀帝至於是蓋亦巽懦而不知義者歟享國日淺而受禍至深考其所自真可悼也夫真可悼也夫
