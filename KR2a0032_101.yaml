body:
  text: 宋史卷一百一志第五十四禮四吉禮四明堂明堂宋初雖有季秋大享之文然未嘗親祠命有司攝事而已真宗始議行之屬封岱宗祀汾陰故亦未遑皇祐二年三月仁宗謂輔臣今年冬至日當親祀圜丘欲以季秋行大享明堂禮然自漢以來諸儒各為論議駁而不同夫明堂者布政之宮朝諸侯之位天子之路寢乃今之大慶殿也況明道初合祀天地於此今之親祀不當因循尚於郊壝寓祭也其以大慶殿為明堂分五室於內仍詔所司詳定儀注以聞禮院請依周禮設五室於大慶殿舊禮明堂五帝位皆為幔室今旁帷上幕宜用青繒朱𩹉四戶八牖赤綴戶白綴牖宜飾以朱白繒詔曰祖宗親郊合祭天地祖宗並配百神從祀今祀明堂正當親郊之期而禮官所定祭天不及地祇配坐不及祖宗未合三朝之制且移郊為大享蓋亦為民祈福宜合祭皇地祇奉太祖太宗真宗並配而五帝神州亦親獻之日月河海諸神悉如圜丘從祀之數禮官議諸神位未決帝諭文彥博等曰郊壇第一龕者在堂第二第三龕設於左右夾廡及龍墀上在壝內外者列於堂東西廂及後廡以象壇壝之制仍先繢圖令輔臣禮官視設神位昊天上帝堂下山罍各四皇地祇太尊著尊犧尊山罍各二在堂上室外神坐左象尊二壺尊二山罍四在堂下中陛東三配帝五方帝山罍各二於室外神坐左神州太尊著尊山罍各二在堂上神坐左牲各用一犢毛不能如其方以純色代籩豆數用大祠日月天皇大帝北極太尊各二在殿上神坐左籩豆數用中祠五官數用小祠內官象尊各二每方嶽鎮海瀆山尊各二在堂左右中官壺尊各二在丹墀龍墀上外官每方丘陵墳衍原隰概尊各二衆星散尊各二在東西廂神坐左右配帝席蒲越五人帝莞北極以上秸加褥五官五星以下莞不加褥餘如南郊景靈宮升降置黃道褥位致齋日陳法駕鹵簿儀仗壝門大次之後設小次知廟卿酌奠七祠文臣分享奉慈后廟近侍宿朝堂行事及從升堂百官分宿升龍門外內庭省司宿本所諸方客宿公館設宿爟火於望燎位東南牲增四犢羊豕依郊各十六以薦從祀帝謂前代禮有祭玉燔玉今獨有燔玉命擇良玉為琮璧皇地祇黃琮黃幣神州兩圭有邸黑幣日月圭璧皆置神坐前燔玉加幣上五人帝五官白幣日月內官以下幣從方色九月二十四日未漏上水一刻百官朝服齋于文德殿明日未明二刻鼓三嚴帝服通天冠絳紗袍玉輅警蹕赴景靈宮即齋殿易袞圭薦享天興殿畢詣太廟宿齋其禮具太廟未明三刻帝鞾袍小輦殿門契勘門下省寶輿先入及大次易袞圭入至版位樂舞作沃盥自大階升禮儀使導入太室詣上帝位奠玉幣於神坐次皇地祇五方帝神州次祖宗奠幣酌獻之亦然皇帝降自中階還版位樂止禮生引分獻官奉玉幣祝史齋郎助奠諸神坐乃進熟諸太祝迎上帝皇地祇饌升自中階青帝赤帝神州配帝大明北極太昊神農氏饌升自東階黃帝白帝黑帝夜明天皇大帝軒轅少昊高陽氏饌升自西階內中官五官外官五星諸饌隨便升設亞獻將升禮生分引獻官俱詣罍洗各由其階酌獻五人帝日月天皇北極下及左右夾廡丹墀龍墀庭中五官東西廂外官衆星坐禮畢帝還大次解嚴改服乘輦御紫宸殿百官稱賀乃常服御宣德門肆赦文武內外官遞進官有差宣制畢宰臣百僚賀于樓下賜百官福胙及內外致仕文武升朝官以上粟帛羊酒嘉祐七年七月詔復有事於明堂有司言皇祐參用南郊百神之位不應祭法宜如隋唐舊制設昊天上帝五方帝位以真宗配而五人帝五官神從祀餘皆罷又前一日親享太廟嘗停孟冬之薦考詳典禮宗廟時祭未有因嚴配而輟者今明堂去孟冬畫日尚遠請復薦廟前者祖宗並侑今用典禮獨配前者地祇神州並享今以配天而罷是皆變於禮中之大者也開元開寶二禮五帝無親獻儀舊禮先詣昊天奠獻五帝並行分獻以侍臣奠幣皇帝再拜次詣真宗神坐於禮為允而帝欲盡恭於祀事五方帝位並親獻焉朝廟用犢一羊七豕七昊天上帝配帝犢各一羊豕各二五方五人帝共犢五豕五羊五五官從祀共羊豕十英宗即位禮官議仁宗配明堂知制誥錢公輔等言孝經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝又曰孝莫大於嚴父嚴父莫大於配天則周公其人也以周公言之則嚴父以成王言之則嚴祖方是時政則周公祭則成王亦安在必嚴其父哉我將之詩是也真宗則周之武王仁宗則周之成王雖有配天之業而無配天之祭未聞成康以嚴父之故廢文王配天之祭而移之以孔子之心推周公之志則嚴父也以周公之心攝成王之祭則嚴祖也嚴祖嚴父其義一也漢明始建明堂以光武配當始配之代適符嚴父之説章安二帝亦弗之變最為近古而合乎禮唐中宗時則以高宗配在玄宗時則以睿宗配在永泰時則以肅宗配禮官不能推明經訓務合古初反雷同其論以惑時主延及於今牢不可破仁宗嗣位之初儻有建是論者則配天之祭常在乎太宗矣詔有司博議使配天之祭不膠於嚴父而嚴父之道不專乎配天觀文殿學士孫抃等曰易稱先王作樂崇德薦之上帝以配祖考蓋祖考並可配天符於孝經之説不可謂必嚴其父也祖考皆可配郊與明堂而不同位不可謂嚴祖嚴父其義一也雖周家不聞廢文配而移於武廢武配而移於成然易之配考孝經之嚴父歷代循守不為無説魏明帝祀文帝於明堂以配上帝史官謂是時二漢之制具存則魏所損益可知亦不可謂章安之後配祭無傳遂以為未嘗嚴父也唐至本朝講求不為少所以不敢異者舍周孔之言無所本也今以為我將之詩祀文王於明堂而歌者安知非孔子刪詩存周全盛之頌被於管弦者獨取之也仁宗繼體守成置天下於泰安四十二年功德可謂極矣今祔廟之始抑而不得配帝甚非所以宣章嚴父之大孝諫官司馬光呂誨曰孝子之心孰不欲尊其父聖人制禮以為之極不敢踰也詩曰思文后稷克配彼天又我將祀文王於明堂下此皆不見於經前漢以高祖配天後漢以光武配明堂以是觀之自非建邦啓土造有區夏者皆無配天之文故雖周之成康漢之文景明章德業非不美也然而不敢推以配天避祖宗也孔子以周公有聖人之德成太平之業制禮作樂而文王適其父故引以證聖人之德莫大於孝答曾子非謂凡有天下者皆當尊其父以配天然後為孝也近代祀明堂者皆以其父配上帝此乃誤釋孝經之義而違先王之禮也景祐中以太祖為帝者之祖比周之后稷太宗真宗為帝者之宗比周之文武然則祀真宗於明堂以配上帝亦未失古禮仁宗雖豐功美德洽於四海而不在二祧之位議者乃欲舍真宗而以仁宗配恐於祭法不合詔從抃議御史趙鼎請遞遷真宗配雩祭太宗配祈穀神州用唐故事學士王圭等以為天地大祭有七皆以始封受命創業之君配神作主明堂用古嚴父之道配以近考故在真宗時以太宗配在仁宗時以真宗配今則以仁宗配仁宗始罷太宗明堂之配太宗先已配雩祀祈穀及神州之祭本非遞遷今明堂既用嚴父之道則真宗配天之祭於禮當罷不當復分雩祭之配也治平四年九月大享明堂以英宗配元豐詳定禮文所言祀帝南郊以天道事之則雖配帝用犢禮所謂帝牛不吉以為稷牛是也享帝明堂以人道事之則雖天帝用太牢詩所謂我將我享維羊維牛是也自梁用特牛隋唐因之皆用特牲非所謂以人道享上帝之意也皇祐熙寧所用犢與羊豕皆未應禮今親祠上帝配帝五方帝五人帝請用牛羊豕各一太常禮院言今歲明堂尚在慈聖光獻皇后三年之內請如熙寧元年南郊故事惟祀事用樂鹵簿鼓吹宮架諸軍音樂皆備而不作警場止鳴金鉦鼓角而已自是凡國有故皆用此制六月詔曰歷代以來合宮所配雜以先儒六天之説朕甚不取將來祀英宗皇帝於明堂惟以配上帝餘從祀羣神悉罷詳定所言按周禮有稱昊天上帝有稱上帝有稱五帝者一帝而已將來祀英宗於明堂合配昊天上帝及五帝欲以此修入儀注並據知太常禮院趙君錫等狀按周官掌次職曰王大旅上帝則張案祀五帝則設大次小次又司服職曰祀昊天上帝則服大裘而冕祀五帝亦如之明上帝與五帝異則宗祀文王以配上帝者非可兼五帝也自鄭氏之學興乃有六天之説而事非經見晉泰始初論者始以為非遂於明堂惟設昊天上帝一坐而已唐顯慶禮亦然請如詔祀英宗於明堂惟配上帝以稱嚴父之意又請以莞席代秸蒲越以玉爵代匏爵其豆登簋俎尊罍並用宗廟之器第以不祼不用彝瓚罷爟火及設褥上帝席以秸配帝席以蒲越皆加褥其上飲福受胙俟終三獻並從之監察御史𩹉行王祖道言前詔以六天之説為非古今復欲兼祀五帝是亦六天也禮官欲去四圭而廢祀神之玉殊失事天之禮望復舉前詔以正萬世之失仍並詔詳定合用圭璧詳定所言宋朝祀天禮以蒼璧則燎玉亦用蒼璧禮神以四圭有邸則燎玉亦用四圭有邸而議者欲以蒼璧禮神以四圭有邸從燎義無所主開寶開元禮祀昊天上帝及五帝於明堂禮神燔燎皆用四圭有邸今詔唯祀上帝則四圭有邸自不當設宜如南郊禮神燔燎皆用蒼璧又請宿齋於文德殿祭之旦服通天冠絳紗袍至大次改祭服行事如郊廟之禮先是三省言按天聖五年南郊故事禮畢行勞酒之禮如元會儀今明堂禮畢請太皇太后御會慶殿皇帝於簾內行恭謝禮百僚稱賀訖升殿賜酒太皇太后不許詔將來明堂禮畢更不受賀百官並於內東門拜表九月辛巳大享于明堂禮畢詣景靈宮及諸寺觀行恭謝禮元符元年尚書左丞蔡卞言每歲大享明堂即南郊望祭殿行禮制度隘窄未足以仰稱嚴事之意今新作南郊齋宮端誠殿實天子潔齋奉祠及見羣臣之所高明邃深可以享神即此行禮於義為合初元豐禮官以明堂寓大慶路寢別請建立以盡嚴奉而未暇講求至是蔡京為相始以庫部員外郎姚舜仁明堂圖議上詔依所定營建明年正月以彗出西方罷大觀元年九月辛亥大享于明堂猶寓大慶殿政和五年詔宗祀明堂以配上帝寓於寢殿禮蓋云闕崇寧之初嘗詔建立去古既遠歷代之模無足循襲朕刺經稽古度以九筵分其五室通以八風上圓下方參合先王之制相方視址于寢之南僝工鳩材自我作古以稱朕昭事上帝率見昭考之心既又以言者明堂基宜正臨丙方近東以據福德之地乃徙祕書省宣德門東以其地為明堂又詔明堂之制朕取考工互見之文得其制作之本夏后氏曰世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾窗考夏后氏之制名曰世室又曰堂者則世室非廟堂修二七廣四修一則度以六尺之步其堂修十四步廣十七步之半又曰五室三四步四三尺者四步益四尺中央土室也三步益三尺木火金水四室也每室四戶戶兩夾窗此夏制也商人重屋堂修七尋崇三尺四阿重屋而又曰堂者非寢也度以八尺之尋其堂修七尋又曰四阿重屋阿者屋之曲也重者屋之復也則商人有四隅之阿四柱復屋則知下方也周人明堂度以九尺之筵三代之制不相襲夏曰世室商曰重屋周曰明堂則知皆室也東西九筵南北七筵堂崇一筵五室凡室二筵者九筵則東西長七筵則南北狹所以象天則知上圜也名不相襲其制則一唯步尋筵廣狹不同而已朕益世室之度兼四阿重屋之制度以九尺之筵上圜象天下方法地四戶以合四序八窗以應八節五室以象五行十二堂以聽十二朔九階四阿每室四戶夾以八窗享帝嚴父聽朔布政于一堂之上於古皆合其制大備宜令明堂使司遵圖建立於是內出圖式宣示于崇政殿命蔡京為明堂使開局興工日役萬人京言三代之制修廣不相襲夏度以六尺之步商度以八尺之尋而周以九尺之筵世每近制每廣今若以二筵為太室方一丈八尺則室中設版位禮器已不可容理當增廣今從周制以九尺之筵為度太室修四筵三丈六尺廣五筵四丈五尺共為九筵木火金水四室各修三筵益四五三丈一尺五寸廣四筵三丈六尺共七筵益四尺五寸十二堂古無修廣之數今亦廣以九尺之筵明堂玄堂各修四筵三丈六尺廣五筵四丈五尺左右箇各修廣四筵三丈六尺青陽總章各修廣四筵三丈六尺左右箇各修四筵三丈六尺廣三筵益四五三丈一尺五寸四阿各四筵三丈六尺堂柱外基各一筵九尺堂總修一十九筵一十七丈一尺廣二十一筵一十八丈九尺蔡攸言明堂五門諸廊結瓦古無制度漢唐或蓋以茅或蓋以瓦或以木為瓦以夾紵漆之今酌古之制適今之宜蓋以素瓦而用琉璃緣𩹉及頂蓋鴟尾綴飾上施銅雲龍其地則隨所向甃以五色之石欄楯柱端以銅為文鹿或辟邪象明堂設飾雜以五色而各以其方所尚之色八窗八柱則以青黃緑相間堂室柱門欄楯並塗以朱堂階為三級級崇三尺共為一筵庭樹松梓檜門不設戟殿角皆垂鈴詔以玄堂犯祖諱取平在朔易之義改為平朔門亦如之仍改敷祐門曰左敷佑左承天門曰右敷佑右承天門曰平秩更衣大次曰齋明殿七年四月明堂成有司請頒常視朔聽朝詔明堂專以配帝嚴父餘悉移於大慶文德殿羣臣五表陳請乃從之禮制局言祀天神於冬至祀地祇於夏至乃有常日無所事卜季秋享帝以先王配則有常月而未有常日禮不卜常祀而卜其日所謂卜日者卜其辛爾蓋月有上辛次辛請以吉辛為正又言周禮祀昊天上帝則大裘而冕祀五帝亦如之享先王則袞冕蓋於大裘舉正位以見配位於袞冕舉配位以見正位以天道事之則舉卑明尊大裘象道袞冕象德明堂以人道享上帝請服袞冕郊祀正位設蒲越明堂正配位以莞蓋取禮記所謂莞簟之安請明堂正配位並用莞簟又周禮以蒼璧禮天又曰四圭有邸以祀天旅上帝然説者謂禮神在求神之前祀神在禮神之後蓋一祭而並用也夏祭方澤兩圭有邸與黃琮並用明堂大享蒼璧及四圭有邸亦宜並用圜丘方澤執玄圭則搢大圭執大圭則奠玄圭禮經祀大神祇享先王一如明堂親祠宜如上儀其正配二位請各用籩二十六豆二十六簠八簋八登三鉶三柶槃神位席幣篚祝篚玉爵反坫瑤爵牛羊豕鼎各一並局七畢茅俎六太尊山尊著尊犧尊象尊各二壺尊六皆設而弗酌尊加犧尊象尊壺尊犧罍象罍壺罍各五加勺御槃匜一並篚勺巾飲福受黍豆一以玉飾飲福受胙俎一亞獻終獻盥洗罍爵洗罍並篚勺巾各一神廚鸞刀一又言明堂用牲而不設庶羞之鼎按元豐禮明堂牲牢正配各用牛一羊一豕一宗祀止用三鼎而不設庶羞之鼎其俎亦止合用六宗廟祭祀五齊三酒有設而弗酌者若酒正所謂以法共五齊三酒以實八尊是也有設而酌者若司尊彝所謂醴齊縮酌盎齊酌凡酒修酌是也今太廟明堂之用請以太尊實泛齊山尊實醴齊著尊實盎齊犧尊實緹齊象尊實沉齊壺尊實三酒皆為弗酌之尊又以犧尊實醴齊為初獻象尊實盎齊為亞獻並陳於阼階之上犧在西象在東壺尊實清酒為終獻陳於阼階之下皆為酌尊尊三其二以備乏匱明堂雖嚴父然配天與上帝所以求天神而禮之宜同郊祀用禮天神六變之樂以天帝為尊焉皇祐以來以大慶殿為明堂奏請致齋於文德殿禮成受賀於紫宸殿今明堂肇建宜於大慶殿奏請致齋於文德殿禮成受賀宿齋奏嚴本以警備仁宗詔明堂直端門故齋夕權罷今明堂在寢東南不與端門直將來宗祀大慶殿齋宿皇城外不設鹵簿儀仗其警場請列於大慶殿門之外王者祀上帝于郊配以祖祀於明堂配以禰今有司行事乃寓端誠殿未盡禮意請非親祀歲有司行事亦於明堂改儀仗使曰禮衛鹵簿使曰禮器橋道頓遞使曰禮頓大禮禮儀二使仍舊制又設季秋大享登歌並用方士初禮部尚書許光凝等議明堂五室祀五帝而王安石以五帝為五精之君昊天之佐故分位於五室與享於明堂神宗詔唯以英宗配帝悉去從祀羣神陛下肇新宏規得其時制位五帝於五室既無以禰概配之嫌止祀五帝又無羣神從祀之瀆則神考絀六天於前陛下正五室於後其揆一也至是詔罷從祀而親祠五室焉尋詔每歲季秋大享親祠明堂如孟月朝獻禮罷有司攝事及五使儀仗等已而太常寺上明堂儀皇帝散齋七日於別殿致齋三日於內殿有司設大次於齋明殿設小次於明堂東階下祀日行事執事陪祠官立班殿下東西相向皇帝服袞冕太常卿東上閣門官太常博士前導禮部侍郎奏中嚴外辦太常卿奏請行禮太常卿奏禮畢禮部郎中奏解嚴其禮器牲牢酒饌奠獻玉幣升煙燔首祭酒讀册飲福受胙並樂舞等並如宗祀明堂儀其行事執事陪祠官並前十日受誓戒於明堂行事執事官致齋三日前一日並服朝服立班省饌祀日並祭服陪位官致齋一日祀前二日仍奏告神宗配侑自是迄宣和七年歲皆親祀明堂高宗紹興元年禮部尚書秦檜等言國朝冬祀大禮神位六百九十行事官六百七十餘員今鹵簿儀仗祭器法物散失殆盡不可悉行宗廟行禮又不可及天地明堂之禮可舉而行乞詔有司討論以聞禮部御史太常寺言仁宗明堂以大慶殿為之今乞於常御殿設位行禮乃下詔曰肇稱吉禮已見于三歲之郊載考彝章當間以九筵之祀因秋成物輯古上儀會天地以同禋升祖宗而並配乃以九月十八日行事四年太常寺看詳國子監丞王普言明堂有未合禮者十一事其一謂陶匏用於郊丘玉爵用於明堂今茲明堂實兼郊禮宜用陶匏他日正宗祀之禮當奉玉爵其二禮經太牢當以牛羊豕為序今用我將之詩遂以羊豕牛為序所謂以辭害意豈有用大牲作元祀而反在羊豕之後者其三陳設尊罍宜倣周官司尊彝秋嘗之制其四泛齊醴齊宜代以今酒而不易其名其五其六祭器冕服當從古制其七皇帝未後詣齋室則是致齋二日有半乞用質明以成三日之禮其八齋不飲酒茹葷乞罷官給酒饌俾得專心致志交於神明其九設神位版及升煙奠册不當委之散吏其十十一皆論樂並從之三十一年以欽宗之喪用元祐故事前期朝獻景靈宮朝享太廟皆遣大臣攝事唯親行大享之禮禮畢宣赦樂備不作附廟畢如故事享罷合祭奉徽宗配祀五天帝五人帝于堂上五官神於東廂仍罷從祀諸神位用熙寧禮也孝宗淳熙六年以羣臣議復合祭天地並侑祖宗從祀百神如南郊十五年九月有事于明堂上問宰執配位周必大奏昨已申請高宗几筵未除用徽宗故事未應配坐且當以太祖太宗並配留正亦言之上曰有紹興間典故可參照無疑嘉定十七年閏八月理宗即位大享當用九月八日在寧宗梓宮未發之前下禮官及臺諫兩省詳議吏部尚書羅點等言本朝每三歲一行郊祀皇祐以來始講明堂之禮至今遵行稽之禮經有越紼行事之文既殯而祭之説則雖未葬以前可以行事且紹熙五年九月在孝宗以日易月釋服之後未發引之前慶元六年九月亦在光宗以日易月釋服之後未發引之前今來九月八日前祀十日皇帝散齋別殿百官各受誓戒係在閏八月二十七日即當在以日易月未釋服之內乞下太史局於九月內擇次辛日行禮則在釋服之後正與前史相同乃用九月二十八日辛卯前二日朝獻景靈宮前一日享太廟遣官攝事皇帝親行大享禮成不賀淳祐三年將作少監權樞密都承旨韓祥言竊以明堂之禮纍聖不廢嚴父配侑之典南渡以來事頗不同高廟中興徽宗北狩當時合祭天地於明堂以太祖太宗配非廢嚴父之祀以父在故也及紹興末乃以徽廟配孝宗在位二十八年娛奉堯父故無祀父之典南郊明堂惟以太祖太宗配沿襲至今遂使陛下追孝寧考之心有所未盡時朝散大夫康熙亦援倪思所著合宮嚴父為言上曰三后並侑之説最當是後明堂以太祖太宗寧宗並侑寶祐五年九月辛酉復奉高宗升侑於是明堂之禮一祖三宗並配度宗咸淳五年明堂大享又去寧宗奉理宗與祖宗並配先是紹興初權禮部尚書胡直孺等言國朝配祀自英宗始配以近考司馬光呂誨爭之以為詘祖進父然卒不能奪王圭孫抃之諂辭其後神宗謂周公宗祀在成王之世成王以文王為祖則明堂非以考配明矣王安石亦對以誤引孝經嚴父之説惜乎當時無有辨正之者今或者曰后稷為周之祖文王武王是為二祧高祖為漢之祖孝文孝武特崇兩廟皆子孫世世所奉承者太祖為帝者祖太宗真宗宜為帝者宗皇祐以一祖二宗並配議出於此直孺等聞前漢以高祖配天後漢以光武配明堂蓋古之帝王非建邦啓土者皆無配天之祭故雖周之成康漢之文景明章其德業非不美也然而子孫不敢推以配天者避祖宗也有宋肇基創業之君太祖是已太祖則周之后稷配祭於郊者也太宗則周之文王配祭於明堂者也此二祭者萬世不遷之法皇祐宗祀合祭天地固宜以太祖太宗配當時蓋拘於嚴父故配帝並及於真宗今主上紹膺大統自真宗至於神宗均為祖廟獨躋則患在於無名並配則幾同於祫享今參酌皇祐詔書請合祭昊天上帝皇地祇于明堂奉太祖太宗以配惟禮專而事簡庶幾可以致力於神萬世行之可也七年徽宗哀聞是歲九月中書舍人傅嵩卿援嚴父之説不幸太上諱問奄至而大享不及理實未安吏部尚書孫近等言元年以來祖宗並配今論者乃欲祖宗並配之外增道君皇帝一位不合典禮權禮部侍郎陳公輔言今梓宮未還廟社未定疆土未復臣竊意祖宗上皇神靈所望於陛下者必欲興衰撥亂恢復中原迎還梓宮歸藏陵寢以隆我宋無疆之業若如議者之言以陛下貴為天子上皇北狩十有一年未獲天下之養今不幸而崩且欲因明堂之禮追配上帝謂是足以盡人子之孝則於陛下之志恐亦小矣宜依故事合祭天地祖宗並侑太上升配似未可行至嘉定四年遂以太祖太宗高宗寧宗並侑至度宗復以太祖太宗高宗理宗並配焉
