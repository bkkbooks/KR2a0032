body:
  text: 宋史卷一百九十八志第一百五十一兵十二馬政國馬之政歷五代寖廢至宋而規制備具自建隆而後其官司之規牧之政與夫收市之利牧地之數支配之等曰券馬曰省馬曰馬社曰括買沿革盛衰皆可得而考焉凡御馬之等三入殿祗候十五匹引駕十四匹從駕二十匹給用之等十有五曰揀中曰不得支使曰添價曰國信曰臣僚曰諸班曰御龍直曰捧日龍衛曰拱聖曰驍騎曰雲武騎曰天武龍猛曰配軍曰雜使曰馬鋪羣號之字十有七曰左曰右曰千曰立曰永曰官曰吉曰天曰主曰王曰方曰與曰來曰萬曰小曰官曰退毛物之種九十有二叱撥之別八青之別二白之別一烏之別五赤之別五紫之別六驄之別十一赭白之別六騮之別八騧之別六駱之別五騅之別五之別八駁胯之別六駁之別三驃之別七其官司之規則太祖承前代之制初置左右飛龍二院以左右飛龍二使領之太平興國五年改飛龍為天坊雍熙四年改天為左右騏驥院左右天駟監四左右天坊二皆隸焉真宗咸平元年創置估馬司凡市馬掌辨其良駑平其直以分給諸監三年置羣牧使以內臣勾當制置羣牧司京朝官為判官景德二年改諸州牧龍坊悉為監賜名鑄印以給之在外之監十有四大名曰大名洺州曰廣平衛州曰淇水並分第一第二河南曰洛陽鄭州曰原武同州曰沙苑相州曰安陽澶州曰鎮寧邢州曰安國中牟曰淳澤許州曰單鎮四年以知樞密院陳堯叟為羣牧制置使又別置羣牧使副都監增判官為二員凡牧之政皆出於羣牧司自騏驥院而下皆聽命焉諸州有牧監知州通判兼領之諸監各置勾當官二員又置左右廂提點又置牧養上下監以養療京城諸坊監病馬又詔左右騏驥院諸坊監官並以三年為滿如習知馬事願留者羣牧司以聞而徙涖他監焉其牧之政則自太祖置養馬務二葺舊務四以為牧放之地始太平興國四年太宗觀兵于幽得汾晉燕薊之馬四萬二千餘匹內皂充牣始分置諸州牧養之時殿直李諤坐贓監牧許州盜官菽馬多死并主吏斬於市又詔擇豐曠地置牧龍坊八以便牧養淳化二年十二月詔圉人取善馬數十匹於便殿設皂棧教以飼且以其法諭宰執仍頒于諸軍復以醫馬良方賜近臣嘗從趙守倫之請於諸州牧龍坊畜牝馬萬五千匹逐水草牧放不費芻秣生駒蕃息足資軍用至是守倫復言諸坊牧馬萬匹歲當生駒四千今歲止二千五百典司失職當嚴責罰若馬百匹歲得駒七十則加遷擢諸坊産駒即籍以聞牧放軍人當募少壯充役並從之真宗大中祥符元年立牧監賞罰之令外監息馬一歲終以十分為率死一分以上勾當官罰一月奉餘等第決杖牧倍多而死少者給賞緡有差凡生駒一匹兵校而下賞絹一匹當是時凡內外坊監及諸軍馬凡二十餘萬匹飼馬兵校一萬六千三十八人每歲京城草六十六萬六千圍麩料六萬二千二百四石鹽油藥糖九萬五千餘斤石諸州軍不預焉左右騏驥六坊監止留馬二千餘匹皆春季出就牧孟冬則別其羸病就棧皂養飼其尚乘之馬唯備用者在焉凡牧監之在河南北天禧後靈昌監為河決所衝至乾興天聖間兵久不試言者多以為牧馬費廣而亡補乃廢東平監以其地賦民五年廢單鎮監六年廢洛陽監於是河南諸監皆廢悉以馬送河北既而詔取原武監馬赴京師移河北孳生馬牧於原武八年羣牧司上言原武地廣而馬少請增牧數詔以淇水第二監四歲馬屬原武歲取河北孳生四歲馬分屬淇水第二并原武監移原武下等馬牧于靈昌鎮廢監仍隸原武九年詔諸監孳生駁馬四時遊牧勿復登明道元年議者謂自河南六監廢京師須馬取之河北道遠非便詔遣左廂提點王舜臣往度利害舜臣言鎮寧靈昌東平淳澤四監雖廢然其地猶牧本監并騏驥院馬洛陽單鎮去京師近罷之非便乃詔復二監以牧河北孳生馬景祐二年揀河北諸監馬一千九百牧於趙州界隸安陽監既而詔廣平廢監留其一以趙州界牧馬復隸焉所餘一監毋毀舍四年復以原武第二監為單鎮移于長葛縣以縣令都監兼領之三年詔院坊監馬歲留備用外餘為兩羣牧于咸豐門外牟岡凡收養病馬估馬司騏驥院取病淺者送上監深者送下監分十槽醫療之天聖六年詔月以都監判官一人提舉八年言者謂上監去京城遠送病馬非便詔廢之以病淺馬分屬左右騏驥院六坊監季較拋死數歲終第賞罰更以騏驥院官迭往提舉明道二年復置上監易名天坰養無病馬病馬并屬下監景祐二年詔以牧養監馬團羣牧于陳許州界鳳凰陂免耗芻菽歲以為常治平二年詔院坊監馬之病不堪估賣者送淇水第一監別為一羣以牧養之凡馬之孳生則大名府洺衛相州七監多擇善種合牝牡為羣判官歲以十二月巡行坊監閲二歲駒點印第賞牧兵諸軍收駒及二歲即送官天聖七年羣牧司言舊制知州軍通判領同羣牧事歲終較馬死數及分已上并生駒不及四分並罰奉死數少生駒多即奏第賞三歲都比以該賞者聞今請申明舊制通判始到官書所轄馬數歲一考之官滿較總數為賞罰詔從之嘉祐八年羣牧司言孳生七監每監歲定牝馬二千牡馬四百歲約生駒四百以為定數治平二年詔諸監生駒滿三十月已上每歲點印選牡之良者送淇水第二監餘雜大馬悉送河南三監其淇水第二監馬候滿六十月給配諸監諸監牝馬滿三十月本監別立羣牧放候滿五十月乃撥配他監凡收市馬戎人驅馬至邊總數十百為一券一馬預給錢千官給芻粟續食至京師有司售之分隸諸監曰券馬邊州置場市蕃漢馬團綱遣殿侍部送赴闕或就配諸軍曰省馬陝西廣鋭徑勇等軍相與為社每市馬官給直外社衆復裒金益之曰馬社軍興籍民馬而市之以給軍曰括買宋初市馬唯河東陝西川峽三路招馬唯吐蕃回紇党項藏牙族白馬鼻家保家名市族諸蕃至雍熙端拱間河東則麟府豐嵐州岢嵐火山軍唐龍鎮濁輪寨陝西則秦渭涇原儀延環慶階州鎮戎保安軍制勝關浩亹府河西則靈綏銀夏州川峽則益文黎雅戎茂夔州永康軍京東則登州自趙德明據有河南其收市唯麟府涇原儀渭秦階環州岢嵐火山保安保德軍其後置場則又止環慶延渭原秦階文州鎮戎軍而已太祖時歲遣中使詣邊州市馬先是兩河之民入蕃界盜馬入中國官給其直時方留意撫綏詔禁之太平興國四年詔市吏民馬十七萬匹六年詔內屬戎人驅馬詣闕下者首領縣次續食且禁富民無得私市十二月詔蕃部鬻馬官取良而棄駑又禁其私市歲入數既不充且無以懷遠人自今委長吏謹視馬之良駑駑即印識之許民私市焉先是以銅錢給諸蕃馬直八年有司言戎人得錢銷鑄為器乃以布帛茶及他物易之天禧中宰相向敏中言國馬倍於先朝廣費芻粟乃詔以十三歲以上配軍馬估直出賣先是市馬以三歲已上十三歲已下為率天聖中詔市四歲已上十歲已下既而所市不足羣牧司以為言乃詔入券并省馬市三歲已上十二歲已下明年詔府州岢嵐軍自今省馬三歲四歲者不以等第五歲已上十二歲已下骨格良善行者悉許綱送估馬司餘非上京省馬並送并州揀馬司景祐元年御史中丞韓億言蕃部以馬抵永康軍中賣所得至少徒使羌人知蜀山川道路非計之得乃詔罷之四年羣牧司奏河北諸軍闕馬請製等杖六付天雄軍真定府定瀛貝滄州市上生馬十二歲以下視等第給直馬自四尺七寸至四尺二寸凡六等其直自二萬五千四百五十至萬六千五百五十課自萬三千四百五十至八千九百五十九六等取備邊兵戶絶錢充直以第一等送京師餘就配諸軍康定初陝西用兵馬不足詔京畿京東西淮南陝西路括市戰馬馬四尺六寸至四尺二寸其直自五十千至二十千凡五等宰臣樞密使聽畜馬七參知政事樞密副使五尚書學士至知雜閣門使已上三升朝官閣門祗候已上一餘命官至諸司職員寺觀主首皆一節度使至刺史殿前馬步軍都指揮至軍頭司散員副兵馬使皆勿括並邊七州軍免出內庫珠償民馬直又禁邊臣私市闕者官給二年詔河北州軍置場市馬雖除等樣如聞所得不廣宜加增直第一等二萬八千第二等二萬六千第三等二萬四千第四等以下及牝馬即依舊直仍自第二等以下遞減一寸慶曆四年詔河北點印民間馬凡收市外見餘二萬七百除坊郭戶三等鄉村三等已上養飼如舊餘點印者悉集揀市五年出內藏庫絹二十萬市馬于府州岢嵐軍六年詔陝西河東社馬死者本營鬻錢以助馬直至和元年詔蜀馬送京師道遠多病瘠自今以春秋冬部送陝西四路總管司二年修陝西蕃馬驛羣牧司每季檄沿路郡縣察視之邊州巡檢兵校聽自市馬官償其直又詔陝西轉運使司以銀十萬兩市馬于秦州歲以為常嘉祐元年詔三司出絹三萬市馬于府州以給河東軍五年薛向言秦州券馬至京師給直并路費一馬計錢數萬請於原渭州德順軍置場收市給以解鹽交引即不耗度支縑錢其券馬姑存以來遠人歲可別得良馬八千以三千給沿邊軍騎五千入羣牧司七年陝西提舉買馬監牧司奏舊制秦州蕃漢人月募得良馬二百至京師給綵絹銀碗腰帶錦襖子蕃官回紇隱藏不引至者並以漢法論罪歲募及二千給賞物外蕃部補蕃官蕃官轉資回紇百姓加等給賞今原渭德順軍置場市馬請如秦州例施行詔從之先是詔議買馬利害吳奎等議於秦州古渭永寧寨及原州德順軍各令置場京師歲支銀四萬兩紬絹七萬五千匹充馬直不足以解鹽鈔并雜支錢給之詔行之八年宰臣韓琦言秦州永寧寨舊以鈔市馬自修古渭寨在永寧之西而蕃漢多互市其間因置買馬場凡歲用緡錢十餘萬蕩然流入虜中實耗國用詔復置場永寧罷古渭寨中場蕃部馬至徑鬻于秦州治平元年薛向請原渭州德順軍買馬官永興軍養馬務如原州德順軍并渭州同判三年為任悉以所市馬多少為殿最又言秦州山外蕃部至原渭州德順軍鎮戎軍鬻馬充豪商錢至秦州所償止得六百今請於原渭州德順軍官以鹽鈔博易使得輕齎至秦州易蜀貨以歸蜀商以所博鹽引至岐雍換監銀入蜀兩獲其便羣牧司請如向言施行是歲詔河東陝西廣鋭蕃落闕馬復置社買一馬官給錢三十千久之馬不至乃增直如慶曆詔書第三等三十五千第四等二十八千四年以成都府路歲輸紬絹三萬給陝西監牧司自是蕃部馬至者衆官軍仰給焉先是以陝西轉運使兼本路監牧買馬事後又以制置陝西解鹽官同主之大抵國初市馬歲僅得五千餘匹天聖中蕃部省馬至三萬四千九百餘匹嘉祐以前原渭德順凡三歲市馬至萬七千一百匹秦州券馬歲至萬五千匹凡牧地自畿甸及近郡使擇水草善地而標占之淳化景德間內外坊監總六萬八千頃諸軍班又三萬九百頃不預焉歲久官失其籍界堠不明廢置不常而淪於侵冒者多矣淳化二年十二月通利軍上十牧草地圖上慮侵民田遣中使檢視疆理嘉祐中韓琦請括諸監牧地留牧外聽下戶耕佃遣都官員外郎高訪等括河北得閒田三千三百五十頃募佃歲約得穀十一萬七千八百石絹三千二百五十匹草十六萬一千二百束羣牧司言諸監牧地間有水旱每監牧放外歲刈白草數萬束以備冬飼今悉賦民異時監馬增多及有水旱無以轉徙牧放詔遣左右廂提點官相度除先被侵冒己根括出地權給租佃餘委羣牧司審度存留有閒土即募耕佃五年羣牧司言凡牧一馬往來踐食占地五十畝諸監既無餘地難以募耕請存留如故廣平廢監先賦民者亦乞取還乃詔河北京東牧監帳管草地自今毋得縱人請射犯者論以違制羣牧使歐陽修言唐之牧地西起隴右金城平涼天水外暨河曲之野內則岐豳涇寧東接銀夏又東至于樓煩今則沒入蕃界淪於侵佃不可復得惟河東嵐石之間山荒甚多汾河之側草地亦廣其間水草最宜牧養此唐樓煩監地迹此推之則樓煩元池天池三監舊地尚冀可得臣往年出使嘗行威勝以東及遼州平定軍其地率多間曠河東一路水草甚佳地勢高寒必宜馬性又京西唐汝之間荒地亦廣請下河東京西轉運司遣官審度若可興置監牧則河北諸監尋可廢罷治平末牧地總五萬五千河南六監三萬二千而河北六監則二萬三千凡支配騏驥院估馬司以當配軍及新收馬閲于便殿數毋過二百凡配軍視其奉錢之數馬自四尺六寸至四尺三寸奉錢自一千至三百為四等差次給之至五月權止外州軍士闕馬先奏禀乃給荊湖路歸遠雄武軍士配以在所土産馬凡闕馬軍士以分數配填慶曆四年詔陝西河北河東填五分餘路填四分他州軍府界巡檢兵校聽自市官償其直毋過三十千是歲詔諸路以馬給軍士比試武技優者先給比試兩給闕馬十匹以下全給十匹以上如舊數支至和元年詔軍士戍陝西河東河北填七分餘路填六分凡主兵官當借馬者至罷兵權殿前馬步軍都指揮使賜所借馬三都虞候捧日天武龍神衛四廂都指揮使二軍都指揮使一外州在官當借馬者經略使三總管鈐轄二路分都監承受極邊寨至監押都巡檢把截保丁指使一毋得乘之他州并以假人犯者論以違制寶元元年詔羣臣例賜馬者宰相至樞密直學士使相至正任刺史并皇族緣姻事當賜者如舊制餘給以馬直少卿監已上三十五千內殿承制已下二十三千凡羣臣假官馬進奉者置籍報左藏庫償直四十千其後多負不償乃詔借馬者先輸直久逋不償者剋其奉料熙寧以來有保馬戶馬其後又變為給地牧馬神宗嘗患馬政不善謂樞密使文彥博曰羣牧官非人無以責成效其令中書擇使卿舉判官冀國馬蕃息以給戰騎於是以比部員外郎崔台符權羣牧判官又命羣牧判官劉航及台符刪定羣牧敕令以唐制參本朝故事而奏決焉熙寧元年又手詔彥博等曰今諸州守二雖同領羣牧而未嘗親涖職事其議更制應監牧郡守二並朝廷選授與坊監使臣皆第其能否制賞罰而升黜之宜立法以聞又手詔曰方今馬政不修官吏無著效豈任不久而才不盡歟是何監牧之多官吏之衆而乏才之甚也昔唐用張萬歲三世典羣牧恩信行乎下故馬政修舉後世稱為能吏今上自提總官屬下至坊監使臣既非銓擇而遷徙迅速謂之假道欲使官宿其業而盡其能不可得也為今之計者當簡其勞能進之以序自坊監而上至於羣牧都監皆課其功而第進之以為任事者勸焉於是樞密副使邵亢請以牧馬餘田修稼政以資牧養之利而羣牧司言馬監草地四萬八千餘頃今以五萬馬為率一馬占地五十畝大名廣平四監餘田無幾宜且仍舊而原武單鎮洛陽沙苑淇水安陽東平等監餘良田萬七千頃可賦民以收芻粟從之已而樞密院又言舊制以左右騏驥院總司國馬景德中始增置羣牧使副都監判官以領牧之政使領雖重未嘗躬自巡察不能周知牧畜利病以故馬不蕃息今宜分置官局專任責成乃詔河南北分置監牧使以劉航崔台符為之又置都監各一員其在河陽者為孳生監凡外諸監並分屬兩使各條上所當行者諸官吏若牧田縣令佐並委監牧使舉劾專隸樞密院不領於羣牧制置先是羣牧司請於河北河東陝西都總管治所各置一監以便給軍乃遣官下諸路詳度既又以知太原唐介之請發沙苑馬五百置監於交城又分置河南河北兩使時上方留意牧監地然諸監牧田皆寬衍為人所冒占故議者爭請收其餘資以佐芻粟言利者乘之始以增賦入為務二年詔括河南北監牧司總牧地舊籍六萬八千頃而今籍五萬五千餘數皆隱於民自是請以牧地賦民者紛然而諸監尋廢是歲天下應在馬凡十五萬三千六百有奇初內外班直諸軍馬以四月下槽出牧迄八月上槽風雨勞逸之不齊故多病斃圉人歲被榜罰吏緣牧事害民棚井科率無寧歲四年十月乃命同修起居注曾孝寬較度其利害孝寬請罷諸班直諸軍馬出牧以田募民出租詔自來年如所請仍令三司備當牧五月芻粟五年廢太原監七年廢東平原武監而合淇水兩監為一八年遂廢河南北八監惟存沙苑一監而兩監司牧亦罷矣沙苑先以隸陝西提舉監牧至是復屬之羣牧司始議廢監時羣牧制置使文彥博言議者欲賦牧地與民而收租課散國馬於編戶而責孳息非便詔元絳蔡確較其利害上之於是中書樞密院言河南北十二監起熙寧二年至五年歲出馬一千六百四十匹可給騎兵者二百六十四餘僅足配郵傳而兩監牧吏卒雜費及所占地租為緡錢五十三萬九千有奇計所出馬為錢三萬六千四百餘緡而已今九監見馬三萬若不更制則日就損耗於是卒廢之以其善馬分隸諸監餘馬皆斥賣收其地租給市易茶本錢分寄籍常平出子錢以為市馬之直監兵五千以為廣固指揮修治京城焉後遂廢高陽真定太原大名定州五監凡廢監錢歸市易之外又以給熙河歲計諸監既廢淤田司請廣行淤溉增課以募耕者而河北制置牧田所繼言牧田沒於民者五千七百餘頃乃嚴侵冒之法而加告獲之賞自是利入增多元豐三年廢監租錢遂至百一十六萬自羣牧使而下賜賚有差乃命太常博士路昌衡祕書丞王得臣與逐路轉運司開封府界提點司按租地約三年中價以定歲額若催督違滯以擅支封樁法論初經制熙河邊防財用司奏於岷州川荔川閭川寨通遠軍熟羊寨置牧養十監議者繼言蕃馬法帝欲試之近甸六年手詔樞密院牧馬重事經始之際宜得左右近臣以總其政今自霧澤陂牧馬所造法始於畿內置十監以次推之諸路宜令樞密院都承旨張誠一副都承旨張山甫經度制置權不隸尚書駕部及太僕寺有當自朝廷處分者樞密院主之已而其說皆不效八年同提舉經度制置曹誦言自崇儀副使溫從吉建議創孳生監逮今二年駒不蕃而死者益衆乃命御史臺校核自置監以來得駒不及一分四釐馬死已十分之六於是責議者及提舉官而罷畿內十監元祐初議興廢監以復舊制於是詔庫部郎中郭茂恂往陝西河東所當置監尋又下河北陝西轉運提點刑獄司按行河渭并晉之間牧田以聞時已罷保甲教騎兵而還戶馬於民於是右司諫王巖叟言兵之所恃在馬而能蕃息之者牧監也昔廢監之初識者皆知十年之後天下當乏馬已而不待十年其弊已見此甚非國之利也乞收還戶馬三萬復置監如故監牧事委之轉運官而不專置使今鄆州之東平北京之大名元城衛州之淇水相州之安陽洺州之廣平監以及瀛定之間棚塞草地疆畫具存使臣牧卒大半猶在稍加招集則指顧之間措置可定而人免納錢之害國收牧馬之利豈非計之得哉又况廢監以來牧地之賦民者為害多端若復置監牧而收地入官則百姓戴恩如釋重負矣自是洛陽單鎮原武淇水東平安陽等監皆復初熙寧中併天駟四監為二而左右天坊亦罷至是復左右天坊時又有旨內外馬事並隸太僕寺不由駕部而達尚書省兵部尚書王存右司諫王覿言先帝講求歷代之法正省臺寺監之職上下相繼各有統制其間或濡滯不通宜量加裁正不可因而隳紊言不果行又詔舊屬羣牧司者專隸太僕寺直達樞密院不由尚書省及駕部至崇寧中始詔如元豐舊制紹聖初用事者更以其意為廢置而時議復變太僕寺言府界牧田占佃之外尚存三千餘頃議復畿內孳生十監詔以莊宅副使麥文昞內殿崇班王景儉充提舉後二年而給地牧馬之政行矣先是知任縣韓筠等建議凡授民牧田一頃為官牧一馬而蠲其租縣籍其高下老壯毛色歲一閲亡失者責償已佃牧田者依上養馬知邢州張赴上其說且謂授田一頃為官牧一馬較陝西沿邊弓箭手既養馬又戍邊者為優試之一監一縣當有利而無害樞密院是其請且言熙寧中罷諸監以賦民歲收緡錢至百餘萬元祐初未嘗講明利害惟務罷元豐熙寧之政奪已佃之田而復舊監桑棗井廬多所毀伐監牧官吏為費不資牧卒擾民棚井抑配為害非一蓋自復監以來臣僚屢陳公私之害若循元祐倉卒更張之法久當益弊且左右廂今歲籍馬萬三千有奇堪配軍者無幾惟沙苑六千匹愈於他監今赴等所陳授田養馬既蠲其租不責以孳息而不願者無所抑勒又限以尺寸則緩急皆可用之馬矣乃具為條畫下太僕寺應監牧州縣悉行之時殿中侍御史陳次升言給地牧馬其初始於邢州守令之請未嘗下監司詳度諸路各有利害既不可知民居與田相遠者難就耕牧一頃之地所直不多而亡失責償為錢四五十千必非人情所願言竟不行時同知樞密院者曾布也四年遂廢淇水單鎮安陽洛陽原武監罷提點所及左右廂惟存東平沙苑二監曾布自叙其事曰元祐中復置監牧兩廂所養馬止萬三千匹而不堪者過半今既以租錢置蕃落十指揮於陝西養馬三千五百又人戶願養者亦數千而所存兩監各可牧萬馬馬數多於舊監而所省官吏之費非一近世良法未之能及時三省皆稱善其後沙苑復隸陝西買馬監牧司而東平監仍廢崇寧元年有司較諸路田養馬之數凡一千八百匹有奇而河北西路占一千四百他路自二百匹以下至河東路僅九匹而開封府界京西南路京東東路皆無應募者蓋法雖已具而猶未及行也大觀元年尚書省言元祐置監馬不蕃息而費用不資今沙苑最號多馬然占牧田九千餘頃芻粟官曹歲費緡錢四十餘萬而牧馬止及六千自元符元年至二年亡失者三千九百且素不調習不中於用以九千頃之田四十萬緡之費養馬而不適於用又亡失如此利害灼然可見今以九千頃之田計其磽瘠三分去一猶得良田六千頃以直計之頃為錢五百餘緡以一頃募一馬則人得地利馬得所養可以紹述先帝隱兵於農之意請下永興軍路提點刑獄司及同州詳度以聞俟見實利則六路新邊間田當以次推行時熙河蘭湟路牧馬司又請兼募願養牝馬者每收三駒以其二歸官一充賞詔行之是歲臣僚言岷州應募養馬者至萬餘匹於是自守二而下遞賞有差明年詔熙河路應縣鎮城寨關堡官並兼管幹給地牧事四年復罷京東西路給地牧馬復東平監政和二年詔諸路復行給地牧馬復罷東平監五年提舉河東給地牧馬尚中行以奏報稽違且欲擅更法詔授遠小監當官於是人皆趣令牧守提舉以率先就緒遷官第賞者甚衆七年有司言給地增牧法成令具諸路告功乃下諸路春秋集教以備選用令下奉行之者益力蔡京既罷政新用事者更言其不便宣和二年詔罷政和二年以來給地牧馬條令收見馬以給軍應牧田及置監處並如舊制又復東平監凡諸監興罷不一而沙苑監獨不廢自給地牧馬之法罷三年而復行時牧田已多所給占乃詔見管及已拘收如官司輒復請占者以違制論六年又詔立賞格應牧馬通一路及三千匹州通縣及一千縣及三百其提點刑獄守令各遷一官倍者更減磨勘年於是諸路應募牧馬者為戶八萬七千六百有奇為馬二萬三千五百既推賞如上詔而兵部長二亦以兼總八路馬政遷官然北方有事而馬政亦急矣靖康元年左丞李綱言祖宗以來擇陝西河東河北美水草高涼之地置監凡三十六所比年廢罷殆盡民間雜養以充役官吏便文以塞責而馬無復善者今諸軍闕馬者太半宜復舊制權時之宜括天下馬量給其直不旬日間則數萬之馬猶可具也然時已不能盡行其說矣保甲養馬者自熙寧五年始先是中書省樞密院議其事於上前文彥博吳充言國馬宜不可闕今法馬死者責償恐非民願安石以為令下而京畿投牒者已千五百戶決非出於驅迫持論益堅五月詔開封府界諸縣保甲願牧馬者聽仍以陝西所市馬選給之六年曾布等承詔上其條約凡五路義勇保甲願養馬者戶一匹物力高願養二匹者聽皆以監牧見馬給之或官與其直令自市毋或彊與府界毋過三千匹五路毋過五千匹襲逐盜賊外乘越三百里者有禁在府界者免體量草二百五十束加給以錢布在五路者歲免折變緣納錢三等以上十戶為一保四等以下十戶為一社以待病斃逋償者保戶馬斃保戶獨償之社戶馬斃社戶半償之歲一閲其肥瘠禁苛留者凡十四條先從府界頒焉五路委監司經略司州縣更度之於是保甲養馬行於諸路矣時河東騎軍馬萬一千餘匹番戍率十年一周議欲省費乃行五路義勇保甲養馬法兵部言河東正軍馬九千五百匹請權罷官給以義勇保甲馬五千補之以合額俟正軍馬不及五千始行給配下中書樞密院樞密院以為官養一馬歲為錢二十七千民養一馬才免折變緣納錢六千五百折米而輸其直為錢十四千四百餘皆出於民決非所願況減軍馬五千匹邊防事宜何所取備若存官軍馬如故漸令民間從便牧馬不以五千為限於理為可中書謂官養一馬以中價率之為錢二十七千募民牧養可省雜費八萬餘緡計前二年官馬死倍於保甲馬而保甲有馬可以習戰禦盜公私兩便帝卒從樞密院議九年京畿保甲養馬者罷給錢布止免輸草而增馬數元豐六年取河東路保甲十分之二以教騎戰且以本路鹽息錢給之每二十五千令市一馬仍以五年為限七年詔京東西路保甲免教閲每都保養馬五十匹匹給錢十千限京東以十年京西十五年而數足置提舉保甲馬官京西以呂公雅京東以霍翔領之罷鄉村物力養馬之令養戶馬者免保甲馬皆翔所陳也翔及公雅既領提舉事多所建白請借常平錢每路五萬緡付州縣出息以賞馬之充肥及孳息者願以私馬印為保馬者聽養馬至三匹蠲役外每匹許次丁一人贖杖罪之非侵損於人者詔悉從之公雅又令每都歲市二十匹限十五年者促為二年半京西不産馬民貧乏益不堪上慮有司責數過多百姓未喻上意詔如元令稍增其數公雅乃請每都歲市八匹限以八年山縣限以十年翔又奏本路馬已及萬匹請令諸縣弓手各養一匹以贖失捕之罪哲宗嗣位言新法之不便者以保馬為急乃詔曰京東西保馬期限極寬有司不務循守遂致煩擾先帝已嘗手詔詰責今猶未能遵守其兩路市馬年限並如元詔尋又詔以兩路保馬分配諸軍餘數付太僕寺不堪支配者斥還民戶而責官直翔公雅皆以罪去而保馬遂罷戶馬者慶曆中嘗詔河北民戶以物力養馬以備官買熙寧二年河北察訪使曾孝寬以為言始參考行之是時諸監既廢仰給市馬而義勇保甲馬復從官給朝廷以乏馬為憂元豐三年春以王拱辰之請詔開封府界京東西河北陝西河東路州縣戶各計資産市馬坊郭家産及三千緡鄉村五千緡若坊郭鄉村通及三千緡以上者各養一馬增倍者馬亦如之至三匹止馬以四尺三寸以上齒限八歲以下及十五歲則更市如初籍於提舉司於是諸道各上其數開封府界四千六百九十四河北東路六百一十五西路八百五十四秦鳳等路六百四十二永興路一千五百四十六河東路三百六十六京東東路七百一十七西路九百二十二京西南路五百九十北路七百一十六時初立法上慮商賈乘時高直以病民命以羣牧司驍騎以上千匹出市以平其直熙寧中嘗令德順軍蕃部養馬帝問其利害王安石謂今坊監以五百緡得一馬若委之熙河蕃部當不至重費蕃部地宜馬且以畜牧為生誠為便利已而得駒庳劣亡失者責償蕃部苦之其法尋廢至是環慶路經略司復言已檄諸蕃部養馬詔閲實及格者一匹支五縑鄜延秦鳳涇原路準此時西方用兵頗調戶馬以給戰騎借者給還死則償直七年遂詔河東鄜延環慶路各發戶馬二千以給正兵河東就給本路鄜延益以永興軍等路及京西坊郭馬環慶益以秦鳳等路及開封府界馬戶馬既配兵後遂不復補京東西既更為保馬諸路養馬指揮至八年亦罷其後給地牧馬則亦本於戶馬之意云至於收市則仍嘉祐之制置買馬司於原渭州德順軍而增為招市之令後開熙河則更於熙河置買馬司而以秦州買馬司隸焉八年遂置熙河路買馬場六而原渭德順諸場皆廢繼又置熙河岷州通遠軍永寧寨等場而德順軍置馬場亦復先是麟府路上所市馬三百以其直增於熙河而又多羸憊乃罷本路博易令軍馬司自市時又以邊臣之議市岢嵐火山軍土産馬以增戰騎既又以邊人盜馬越疆以趣利尋皆罷之自是國馬專仰市於熙河秦鳳矣熙寧七年熙河用兵馬道梗絶乃詔知成都府蔡延慶兼提舉戎黎州買馬以經度其事明年延慶言威雅嘉瀘文龍州地接烏蠻西羌皆産善馬請委知州寨主以錦綵茶絹招市未及施行會威茂州夷人盜邊及西邊馬已至八月遂詔罷提舉戎黎買馬元豐中軍興乏馬六年復命知成都呂大防同成都府利州路轉運司經制邊郡之可市馬者遂制嘉州中鎮寨雅州靈關等買馬場而馬皆不至元祐初乃罷之元祐中嘗詔以蜀馬給陝西軍以陝西馬赴京師崇寧五年增黎州市馬至四千匹然凡云蜀馬者惟沈黎所市為多其他如戎瀘等州歲與蠻人為市第存優恤數馬以給其直大觀初又詔播州夷界巡檢楊榮許歲市馬五十匹於南平軍其給賜視戎州之數熙寧中罷券馬而專於招市歲省三司錢二十萬緡自馬不下槽出牧三司復給芻秣之費更相補除而三司歲償羣牧者為緡錢十萬以增市馬券馬之罷已久紹聖初提舉買馬陸師閔奏復行之令蕃漢商人願以馬結券進賣者先從諸場驗印各具其直給券送太僕寺償之其說以為券馬既盛行則綱馬可罷行之三年樞密院言券馬死不及釐而綱馬之死十倍乃賜師閔金帛加集賢修撰以賞其功時議既不以券馬為是主管買馬閻令亦言其枉費然曾布力行之崇寧中乃詔買馬一遵元豐法市馬之官自嘉祐中始以陝西轉運使兼本路監牧買馬事後又以制置陝西解鹽官同主之熙寧中始置提舉熙河路買馬命知熙州王韶為之而以提點刑獄為同提舉八年提舉茶場李杞言賣茶買馬固為一事乞同提舉買馬詔如其請十年又置羣牧行司以往來督市馬者元豐三年復罷為提舉買馬監牧司四年羣牧判官郭茂恂言承詔議專以茶市馬以物帛市穀而併茶馬為一司臣聞頃時以茶易馬兼用金帛亦聽其便近歲事局既分專用銀絹錢鈔非蕃部所欲且茶馬二者事實相須請如詔便奏可仍詔專以雅州名山茶為易馬用自是蕃馬至者稍衆六年買馬司復罷兼茶事七年更詔以買馬隸經制熙河財用司經制司罷乃復故自李杞建議始於提舉茶事兼買馬其後二職分合不一崇寧四年詔曰神宗皇帝厲精庶政經營熙河路茶馬司以致國馬法制大備其後監司欲侵奪其利以助糴買故茶利不專而馬不敷額近雖更立條約令茶馬司總運茶博馬之職猶慮有司苟於目前近利不顧悠久深害三省其謹守已行毋輒變亂元豐成法自是職任始一市馬之數以時增損初原渭德順凡三歲共市馬萬七千一百匹而羣牧判官王誨言嘉祐六年以前秦州券馬歲至者萬五千匹今券馬法壞請令增市而優使臣之賞熙寧三年乃詔涇原渭德順歲買萬匹三年而會之以十分為率及六分七釐者進一官餘分又析為三等每增一等者更減磨勘年自是市馬之賞始優矣時誨上馬政條約詔頒行之其後熙河市馬歲增至萬五千紹聖中又增至二萬匹歲費五十萬緡後遂以為定額特詔增市者不在此數崇寧四年提舉程之邵孫鼇抃以額外市戰馬及二萬匹各遷一官鼇抃仍賜三品服大觀元年龐寅孫等又以買御前良馬及三萬匹推恩如之邵例宣和中宇文常何漸等更以遵用元豐成法省費不資各加職遷官時如此類頗衆賞典優濫官屬利於多市馬取充數而已支配舊制自御馬而下次給賜臣僚次諸軍而驛馬為下熙寧初樞密院言祖宗時臣僚任邊職者或賜帶甲馬示不忘疆埸之事承平日久僥幸滋長請應使臣閣門祗候以上充三路路分州軍總管鈐轄之類賜馬價如故餘皆罷給奏可十年羣牧司又言去歲給安南行營及兩省宗室諸班直及諸軍諸司馬總三千餘匹未支者猶二千請裁宗室以下所給馬諸司停給從之自罷監至此始闕馬矣熙寧初詔河北騎軍如陝西河東社馬例立社更相助錢以市馬而遞增官直尋出奉宸庫珠十餘萬以充其費其後陝西馬社苦於斂率元豐中乃詔本路罷其法更從買馬司給之時又諸路置將馬不能盡給則給其直而委諸將自市其在熙河蘭會路者即以為買馬之數初內外諸軍給馬例不及其元額視其闕之多寡以分數填配元豐更立為定制凡諸軍闕馬應給者在京府界京東西河東陝西路無過十之七河北路十之六然其後諸軍闕馬者多紹聖三年乃詔提舉陸師閔於歲額外市馬三萬匹給鄜延環慶路正兵餘支弓箭手仍權不限分數宣和初真定中山高陽等路乏馬復給度僧牒今帥臣就市以補諸軍之闕高宗紹興二年置馬監於饒州守倅領之擇官田為牧地復置提舉俄廢四年置監臨安之餘杭及南蕩十九年詔馬五百匹為一監牡一而牝四監為四羣歲産駒三分及斃二分以上有賞罰帝謂輔臣曰議者言南地不宜牧馬昨自牧養今二三年已得馬數百先是川路所置馬歲牧於鎮江是年春上以未見蕃息遂分送江上諸軍後又置監郢鄂間牝牡千十餘年僅生二十駒且不可用乃已故凡戰馬悉仰秦川廣三邊焉秦馬舊二萬乾道間秦川買馬額歲萬一千九百有奇川司六千秦司五千九百益梓利三路漕司歲出易馬紬絹十萬四千匹成都利州路十一州産茶二千一百二萬斤茶馬司所收大較若此慶元初合川秦兩司為萬一千十有六嘉泰末合兩司為萬二千九十四然纍歲市易多不及額蓋南渡前市馬分而為二其一曰戰馬生於西郵良健可備行陳今宕昌峯貼峽文州所産是也其二曰羈縻馬産西南諸蠻短小不及格今黎等五州所産是也羈縻馬每綱五十其間良者不過三五中等十數餘皆下等不可服乘守二貪賞格以多為貴經涉險遠且綱卒盜其芻粟道斃者相望成都府馬務歲發江上諸軍馬凡五十八綱月券錢米二百緡歲計萬一千六百緡興元府馬務歲發三衙馬百二十綱其費稱是率未嘗如數蓋茶馬司靳錢帛馬至價不即償致然也舊蕃蠻中馬良駑有定價紹興中張松為黎倅欲馬溢額覬賞乃高直市之夷人無厭邀求滋甚後邛部川蠻恃功趙彥博始以細茶錦與之而夷人每貿馬以茶錦不堪藉口慶元中金人既失冀北地馬至秦司亦罕舊川秦市馬赴密院多道斃者紹興二十七年詔川馬不赴行在分隸江上諸軍鎮江建康荊鄂軍各七百五十江池軍各五百殿前司二千五百馬司步司各千川馬良者二百進御此十九年所定格也廣馬者建炎末廣西提舉峒丁李棫請市馬赴行在紹興初隸經略司三年即雍州置司提舉市於羅殿自杞大理諸蠻未幾廢買馬司帥臣領之七年胡舜陟為帥歲中市馬二千四百詔賞之其後馬益精歲費黃金五鎰中金二百五十鎰錦四百絁四千廉州鹽二百萬斤得馬千五百須四尺二寸已上乃市之其直為銀四十兩每高一寸增銀十兩有至六七十兩者土人云尤駔駿者在其産處或博黃金二十兩日行四百里第官價已定不能致此自杞諸蕃本自無馬蓋轉市之南詔南詔大理國也乾道九年大理人李觀音得等二十二人至橫山寨求市馬知雍州姚恪盛陳金帛誇示之其人大喜出一文書稱利貞二年十二月約來年以馬來所求文選五經國語三史初學記及醫釋等書恪厚遺遣之而不敢上聞也嶺南自産小駟匹直十餘千與淮湖所出無異大理連西戎故多馬雖互市于廣南其實猶西馬也每擇其良赴三衙餘以付江上諸軍寶慶四年兩淮制府貿易北馬五千餘而他郡亦往往市馬不輟咸淳末有紀智立者獻謀以為兩淮軍將武官巨室皆畜馬率三借二二借一一全起團結隊伍借助防江各令飼馬役夫自乘之官優給月錢一年以半年為約江面寧即放歸又云陳巖守招信團馬至七千出沒張耀此其驗也臣僚言宜倣祖宗遺意亟謀和市馬如出一馬則免其某色力役惟是川秦之馬遵陸則崇岡復嶺盤回斗絶舟行則峽江湍急灘磧險惡每綱運公私經費十倍而人馬俱疲上則耗國用下則困州縣綱兵所經甚於寇賊雖臣僚條奏更迭終莫得其要領豈馬政各因風土之宜而非東南之利歟
