body:
  text: 宋史卷一百六十五志第一百一十八職官五大理寺鴻臚寺司農寺太府寺國子監少府監將作監軍器監都水監司天監大理寺舊置判寺一人兼少卿事一人建隆二年以工部尚書竇儀判寺事凡獄訟之事隨官司決劾本寺不復聽訊但掌斷天下奏獄送審刑院詳訖同署以上于朝詳斷官八人以京官充國初大理正丞評事皆有定員分掌斷獄其後擇他官明法令者若常參官則兼正未常參則兼丞謂之詳斷官舊六人後加至十一人又去兼正丞之名咸平二年始定置法直官二人以幕府州縣官充改京官則為檢法官元豐官制行置卿一人少卿二人正二人推丞四人斷丞六人司直六人評事十有二人主簿二人卿掌折獄詳刑鞫讞之事凡職務分左右天下奏劾命官將校及大辟囚以下以疑請讞者隸左斷刑則司直評事詳斷丞議之正審之若在京百司事當推治或特旨委勘及係官之物應追究者隸右治獄則丞專推鞫蓋少卿分領其事而卿總焉凡刑獄應審議者上刑部被旨推鞫及情犯重者卿同所隸官請對奏裁若獄空或斷絶則御史按實以聞分案十有一置吏六十有九先是舊制大理寺讞天下奏案而不治獄熙寧五年增詳斷官二為十員七年置詳斷習學官十四詳覆習學官六九年詔以京師官寺凡有獄皆繫開封府司録司及左右軍巡三院囚逮猥多難於隔訊又暑多瘐死因緣流滯動涉歲時稽參故事宜屬理官可復置大理獄始命崔台符為知卿事蹇周輔楊汲為少卿各舉丞及檢法官初神宗謂國初廢大理獄非是以問孫洙洙對合旨至是命官起寺十七日而成元豐二年手詔大理寺近舉墜典俾治獄事推輪規摹皆以義起不少寬假必懷顧忌稽留弊害無異前日宜依推制院及御史臺例不供報糾察司三年詔依舊供報凡官屬依御史臺例謁有禁又詔糾察司察訪本寺斷徒以上出入不當者索案點檢五年詔毋以大理寺官為試官六年又詔凡斷公案先上正看詳當否論難改正簽印注日然後過議司覆議如有批難具記改正長二更加審定然後判成録奏又刑部言應吏部補授大理寺左斷刑官先與刑部大理寺長二同議可否然後注擬仍取經試得循資以上人充正闕以丞補丞闕以評事補詔刑部吏部同著為令八年詔大理寺推斷事應奏及上尚書省者更不先申本曹元祐元年以右治獄勘斷公事全少並左右兩推為一司三年三省請罷右治獄依三司舊例置推勘檢法官于戶部從之又詔大理寺並置長二四年從刑部請改本寺條任大理官失斷徒已上五人或死罪二人不在選限舊條失斷徒已上三人或死罪一人紹聖元年詔斷刑獄官依元豐元年選試法二年復置右治獄置官屬如元豐制左右推事有翻異者互送再有異者朝廷委官審問或送御史臺治之元符元年應大理寺開封府承受內降公事不得奏請移送又詔應奏斷公事依開封府專條不許諸處取索崇寧四年詔大理寺官諸司輒奏辟者以違制論政和二年詔法官任滿擇職事修舉人材可録者奏舉再任仍許就任關升理本等資序五年依熙豐故事復置習學公事四員長二立課程正丞同指教宣和七年評事以上並差試中刑法人又詔大理寺開封府承受公事依法斷遣不得乞降特旨中興並省官寺惟大理寺不並紹興初詔正與丞並堂除評事闕則委本寺長二選擇應格人赴刑部議定申朝廷差填如無應格即選諳習刑法人權充又立比較法以懲差失隆興二年評事鞏衍言評事檢斷躬自節案親書斷語最為勞苦詔增置以八員為額淳熙末嚴寺官出謁之禁以防請託漏泄之弊紹熙初除試中刑法評事八員外司直主簿選用有出身曾歷任人各兼評事繫銜將八評事已擬斷文字分兩廳點檢或有未安則述所見與長二商量慶元四年定逐季仲月定日斷絶之法嘉定八年申嚴紹熙指揮重司直主簿之選增選試取人數以勸法科左斷刑分案三曰磨勘掌批會吏部等處改官事曰宣黃掌凡斷訖命官指揮曰分簿掌行分探諸案文字設司有四曰表奏議掌拘催詳斷案八房斷議獄案兼旬申月奏曰開拆曰知雜曰法司又有詳斷案八房專定斷諸路申奏獄案等又有敕庫掌收管架閣文書吏額胥長一人胥史三人胥佐三十人貼書六人楷書十四人隆興共減七人右治獄分案有四曰左右寺案掌斷訖公事案後收理追贓等曰驅磨掌驅磨兩推官錢官物文書曰檢法掌檢斷左右推獄案併供檢應用條法曰知雜又有開拆表奏二司有左右推主鞫勘諸處送下公事及定奪等吏額前司胥史一人胥佐九人表奏司一人貼書三人左右推胥史二人胥佐八人般押推司四人貼書四人隆興共減五人鴻臚寺舊置判寺事一人以朝官以上充元豐官制行置卿一人少卿一人丞主簿各一人卿掌四夷朝貢宴勞給賜送迎之事及國之凶儀中都祠廟道釋籍帳除附之禁令少卿為之二丞參領之凡四夷君長使價朝見辨其等位以賓禮待之授以館舍而頒其見辭賜豫宴設之式戒有司先期辦具有貢物則具其數報四方館引見以進諸蕃封册即行其禮命若崇義公承襲則辨其嫡庶具名上尚書省其周嵩慶懿陵廟命官以時致享若凶儀之節宗室以服臣僚以品辨其喪紀而詔奠臨賻贈之制禮應成服則卿掌贊導之儀葬則預戒有司具鹵簿儀物分案四置吏九其官屬十有二往來國信所掌大遼使介交聘之事都亭西驛及管幹所掌河西蕃部貢奉之事禮賓院掌回鶻吐蕃黨項女真等國朝貢館設及互市譯語之事懷遠驛掌南蕃交州西蕃龜茲大食于闐甘沙宗哥等國貢奉之事中太一宮建隆觀等各置提點所掌殿宇齋宮器用儀物陳設錢幣之事在京寺務司及提點所掌諸寺葺治之事傳法院掌譯經潤文左右街僧録司掌寺院僧尼帳籍及僧官補授之事同文館及管勾所掌高麗使命已上並屬鴻臚寺中興後廢鴻臚不置併入禮部司農寺舊置判寺事二人以兩制朝官以上充主簿一人以選人充掌供籍田九種大中小祀供豕及蔬果明房油與平糶利農之事元豐官制行始正職掌置卿少卿丞主簿各一人卿掌倉儲委積之政令總苑囿庫務之事而謹其出納少卿為之二丞參領之凡京都官吏祿廩辨其精粗而為之等諸路歲運至京師遣官閲其名色而分納于倉庾藁秸則歸諸場歲具封樁月具見存之數奏聞給兵食則進呈糧樣因出納而受賂刻取者嚴其禁有負失者計其數上于倉部凡諸路奏雨雪之闕與過多者皆籍之凡苑囿行幸排比及薦饗進御頒賜植藏之物戒有司先期辦具造麴糵儲薪炭以待給用天子親耕藉田有事于先農則卿奉耒耜少卿率屬及庶人以終千畝分案六置吏十有八初熙寧二年置制置條例司立常平斂散法遣諸路提舉官推行之三年五月詔制置司均通天下之財以常平新法付司農寺增置丞簿而農田水利免役保甲等法悉自司農講行初以太子中允呂惠卿判司農寺改同判寺胡宗愈為兼判四年以御史知雜鄧綰判寺曾布同判詔諸路提舉常平官課績田寺考校升絀管幹官令提舉司保明計功賞之六年以司農間遣屬官出視諸路力有不給乃置幹當公事官以葉康直等四人為之七年本寺言所主行農田水利免役保甲之法措置未盡官吏推行多違法意欲榜諭官私使人陳述有司違法從寺按察九年以幹當公事官所至輒用喜怒罷之從熊本請也元豐四年減丞一主簿三官制行寺監不治外事司農事舊職務悉歸戶部右曹元祐三年詔司農寺置長二五年以本寺主簿兼檢法八年復置提轄修倉所紹聖元年詔罷官屬以其事歸將作監四年罷主簿添丞一員政和六年浙西諸州各置排岸一員從兩浙運副應安道請也所隸官屬凡五十倉二十有五掌九穀廩藏之事以給官吏軍兵祿食之用凡綱運受納及封樁支用月具數以報司農草場十有二掌受京畿芻秸以給牧監飼秣排岸司四掌水運綱船輸納雇直之事園苑四玉津瑞聖宜春瓊林苑掌種植蔬蒔以待供進修飭亭宇以備遊幸宴設下卸司掌受納綱運都麴院掌造麴以供內酒庫酒醴之用及出鬻以收其直水磨務掌水磑磨麥以供尚食及內外之用內柴炭庫掌諸薪炭以給宮城及宿衛班直軍士薪炭席薦之物炭場掌儲炭以供百司之用建炎三年罷司農寺以事務併隸倉部紹興三年復置丞二員凡有合行事務申戶部施行四年復置寺仍置卿少十年復置簿隆興元年併省主簿一員明年詔如舊制乾道三年詔糧綱有欠從本寺斷遣監納情理重者大理寺推勘分案五南北省倉草料場和糴場隸焉監倉官分上中下界司其出納諸場皆置監官外有監門官交量則有檢察斛面官綱運下卸有排岸司官各分其事以佐本寺豐儲倉所置監官二員監門官一員初紹興以上供米餘數樁管別廩以為水旱之助後又增廣收糴淳熙間命右司為之提領後以屬檢正非奉朝廷指揮不許支撥別置赤曆提領官結押不許衮同司農寺收支經常米數凡外州軍起到樁管米從司農寺差官盤量據納到數報本所樁管監官監門官遇考任滿所屬批書外仍于本所批書視其有無欠折以定其功過在外則鎮江建康亦置倉焉太府寺舊置判寺事一人以兩制或帶職朝官充同判寺一人以京朝官充凡廩藏貿易四方貢賦百官奉給時皆隸三司本寺但掌供祠祭香幣帨巾神席及校造斗升衡尺而已元豐官制行始正職掌置卿少卿各一人丞主簿各二人卿掌邦國財貨之政令及庫藏出納商稅平準貿易之事少卿為之二丞參領之凡四方貢賦之輸于京師者辨其名物視其多寡別而受之儲於內藏者以待非常之用頒于左藏者以供經常之費凡官吏軍兵奉祿賜豫以法式頒之先給曆從有司檢察書其名數鈎覆而後給焉供奉之物則承旨以進審奏得畫乃聽除之若春秋授軍衣則前期進樣定其頒日畿內將校營兵支請月具其數以聞凡商賈之賦小賈即門征之大賈則輸於務貨之不售者平其價鬻於平準乘時賒貸以濟民用若質取於官則給用多寡各從其抵歲以香茶鹽鈔募人入豆穀實邊即京都闕用物預報度支凡課入以盈定課最行賞罰大祀晨祼則卿置幣奠玉則入陳玉帛餘祀供其帨巾分案九置吏六十有五元祐初以倉部郎官印發文鈔三年復歸本寺又詔太府置長二五年令長二每月分巡所轄庫務元符元年增置丞一員三年改市易案為平準其市易務亦如之崇寧中置藥局七所添丞一員點檢宣和三年減罷靖康元年詔內外官司局所依熙寧法錢物並納左藏庫凡省一百五所又詔戶部太府寺長二當職官及本庫官吏俸錢候在京官吏支散並足方許支給從戶部尚書梅執禮之請也所隸官司二十有五左藏東西庫掌受四方財賦之入以待邦國之經費給官吏軍兵奉祿賜豫舊分南北兩庫政和六年修建新庫以東西庫為名西京南京北京各置左藏庫內藏庫掌受歲計之餘積以待邦國非常之用奉宸庫掌供內庭凡金玉珠寶良貨賄藏焉祗候庫掌受錢帛器皿衣服以備傳詔頒給及殿庭賜豫元豐庫掌受諸路積剩及常平錢物凡封樁者皆入焉神宗常憤契丹倔強慨然有恢復幽燕之志聚金帛內帑自製四言詩一章曰五季失國獫狁孔熾藝祖造邦思有懲艾爰設內府基以募士曾孫保之敢忘厥志每庫以詩一字目之儲積皆滿又別置庫賦詩二十字分揭於庫曰每虔夕惕心妄意遵遺業顧豫不武姿何日成戎捷徽宗朝又有崇寧庫大觀庫布庫掌受諸道輸納之布辨其名物以待給用茶庫掌受江浙荊湖建劍茶茗以給翰林諸司及賞賚出鬻雜物庫掌受內外雜輸之物以備支用糧料院掌以法式頒廩祿凡文武百官諸司諸軍奉料以券準給審計司掌審其給受之數以法式驅磨都商稅務掌收京城商旅之算以輸于左藏汴河上下鎖蔡河上下鎖掌收舟船木筏之征都提舉市易司掌提點貿易貨物其上下界及諸州市易務雜買務雜賣場皆隸焉市易上界掌斂市之不售貨之滯於民用者乘時貿易以平百物之直市易下界掌飛錢給券以通邊糴雜買務掌和市百物凡宮禁官府所需以時供納雜賣場掌受內外幣餘之物計直以待出貨或準折支用榷貨務掌折博斛斗金帛之屬交引庫掌給印出納交引錢鈔之事抵當所掌以官錢聽民質取而濟其緩急和劑局惠民局掌修合良藥出賣以濟民疾店宅務掌管官屋及邸店計置出僦及修造之事石炭場掌受納出賣石炭香藥庫掌出納外國貢獻及市舶香藥寶石之事建炎詔罷太府寺以其所掌職務撥隸金部紹興元年復以章億守太府寺丞措置印給茶鹽鈔引續添置丞二員四年復置卿少各一員十年復置主簿十一年詔交引庫書押鈔引寺丞兩員遇合推賞各與減磨勘二年尋詔三丞一體行之隆興元年併省主簿一員明年如舊制設案七以序次分管監交案隨逐丞簿赴左藏庫監交看驗綱運錢物中興後所隸惟有糧料院審計司左藏東西庫交引庫祗候庫和劑局惠民局如前制所置左藏南庫係樁管御前激賞庫改以侍從官提領又置提轄檢察官一員編估局打套局二局係揀選市舶香藥雜物等第會其直以待貿易寄樁庫掌發賣香藥匹帛拘其直歸于左藏南庫置監官提領二人國子監舊置判監事二人以兩制或帶職朝官充凡監事皆總之直講八人以京官選人充掌以經術教授諸生舊以講書為名無定員淳化五年判監李至奏為直講以京朝官充其後又有講書説書之名並以幕職州縣官充其熟於講説而秩滿者稍遷京官皇祐中始以八人為額每員各專一經並選擇進士并九經及第之人相參薦舉丞一人以京朝官或選人充掌錢穀出納之事主簿一人以京官或選人充掌文簿以勾考其出納舊制祭酒闕始置判監事監生無定員並有蔭及京畿人初隸監授業後補監生或隨屬遊官以久離本貫不克赴鄉薦而文藝可稱亦許隸補試廣文教進士太學教九經五經三禮三傳學究律學館教明律餘不常置元豐官制行始置祭酒司業丞主簿各一人太學博士十人舊係國子監直講元豐三年詔改為太學博士每經二人正録各五人武學博士二人律學博士正各一人祭酒掌國子太學武學律學小學之政令司業為之二丞參領監事凡諸生之隸于太學者分三舍始入學驗所隸州公據以試補中者充外舍齋長諭月書其行藝于籍行謂率教不戾規矩藝謂治經程文季終考于學諭次學録次學正次博士然後考于長二歲終校定具注于籍以俟覆試視其校定之數參驗而序進之凡私試孟月經義仲月論季月策公試初場以經義次場以論策試上舍如省試法凡內舍行藝與所試之等俱優者為上舍上等取旨命官一優一平為中以俟殿試一優一否或俱平為下以俟省試唯國子生不預考選凡課試升黜教導之事長二皆總焉車駕幸學則率官屬諸生班迎即行在距學百步亦如之凡釋奠于先聖先師及武成王則率官屬諸生共薦獻之禮歲計所隸三舍生升降多寡之數以為學官之殿最賞罰博士掌分經講授考校程文以德行道藝訓導學者正録掌舉行學規凡諸生之戾規矩者待以五等之罰考校訓導如博士之職職事學録五人掌與正録通掌學規學諭二十人掌以所授經傳諭諸生直學四人掌諸生之籍及幾察出入凡八十齋齋置長諭各一人掌表率齋生凡戾規矩者糾以齋規五等之罰仍月考齋生行藝著于籍武學博士學諭各二人掌以兵書弓馬武藝訓誘學者律學博士二人掌傳授法律及校試之事小學置職事教諭二人掌訓導及考校責罰學長二人掌序齒位糾不如儀者集正二人掌籍諸生名氏糾程課不逮者熙寧初詔用經術取士廣闊黌舍分為三學增置生徒總二千八百人隸籍有數給食有等庫書有官治疾有醫分案八置吏十元豐三年詔自今奏舉太學博士先以所業進呈五年詔國子監官差承務郎以上闕即差選人充正官立行守試請奉法八年詔罷太學保任同罪法元祐元年詔太學每歲公試以司業博士主之如春秋補試法左司諫王巖叟言太學生補中人乞並許應舉罷一年之限詔國子監立法又詔給事中孫覺祕書少監顧臨崇政殿説書程頤國子監長二看詳修立國子監條例又詔置春秋博士一員二年增司業一員又詔內外學官選年三十以上歷任人充三年詔國子監置長二四年詔太學正録依熙寧法選上舍生充闕則以內舍生五年殿中侍御史岑象求言國子監無叩問師資之益學官不以訓導為己任補試伺察不嚴有假手之弊詔禮部相度以聞本部言生員遇有請益許見長二仍詔生員以所納齋課於講堂上指諭並委博士逐月巡所隸齋詢考生員所業凡私試不鎖宿欲令不罷講説從之紹聖元年監察御史劉拯言太學復行元豐中三舍推恩注官免省試免解試之制夫舊法欲行必先嚴考察請自今太學長二博士正録選學行純備衆所推服者為之有弛慢不公考察不實則重加譴責差職掌長諭改正如元豐舊制從之又詔內外學官非制科進士出身及上舍生入官者並罷又詔太學正録依元豐舊制各置五人又詔太學三舍生並依元豐學制重行考察依舊條推恩左司諫翟思言元豐太學令訓迪糾禁亦具矣今追復經義取士乞令有司看詳依舊頒行詔送國子監又詔內外學官選進士出身及經明行修人又詔學官並召試國子監長二臺諫官外監司皆許薦舉三年司業龔原言公試依元豐舊制以長二監試輪差博士五員考試乞朝廷更差官五員參考從之元符元年詔有官人許入太學充監生毋過四十人三年復置春秋博士崇寧元年省罷崇寧元年宰臣蔡京言有詔天下皆興學貢士以三舍考選法遍行天下聽每三年貢入太學上舍試仍別為考分為三等若試中上等補充太學上舍試中中等下等者補充內舍餘為外舍生仍建外學于國之南待其歲考行藝升之太學其外學官屬司業一人丞一人博士十人學正五人學録五人職事人係學生充學録五人學諭十人直學二人齋長齋諭各一人外舍生三千人太學上舍一百人內舍三百人候將來貢試到合格者即上舍以二百人內舍以六百人為額處上舍內舍于太學處外舍于外學外學置齋一百講堂四每齋三十人太學自訟齋移於外學諸路貢士並入外學候依法考選校試合格升之太學為上舍內舍生見為太學外舍生依舊在太學候外學成日取旨外學並依太學敕令格式從之二年罷春秋博士三年詔辟雍置司成司業各一員四年詔辟雍待四方貢士在國之郊太學教養上舍生在王城之內內外既殊高下未倫辟雍有司成在侍郎之次國子有祭酒司業列於卿少事體不順合行釐正改辟雍司成為太學司成總國子監及內外學事凡學之事皆許專達仍立學官謁禁大觀元年置國子博士四員國子正録各二員太學辟雍博士共置二十員國子太學每經一員辟雍二員從薛昂之請也三年詔諸路贍學餘錢並起發充在京學事支用四年詔省國子辟雍博士五員太學命官學録一員辟雍二員國子命官正録及命官直學國子監書庫官等官並省罷依紹聖格毋用謄録政和元年詔兩學博士正録依舊制選試朝廷除授七年新提舉河東路學事王格言崇寧初建辟雍于郊以處貢士及外舍生立太學于國以處上舍內舍由州郡而貢之辟雍由辟雍而升之太學法行之初上內舍之選未衆故外舍有校定者留太學無校定者出辟雍比年上內舍人日增而太學又有國子隨行親及小學生人數已多居處迫隘乞以外舍生有無校定並居辟雍升補上內舍乃入太學從之八年詔兩學博士正録並諸州教授兼用元豐試法仍止試一經吏部具到元豐法進士第一甲或省試十名內或府監發解五名內或太學公私試三名內或季試兩次為第一人或上舍內舍生或曾充經論以上職掌或投所業乞試並聽試入上等注博士中下等注正録即人多闕少願注諸州教授者聽宣和三年詔罷天下三舍太學以三舍考選開封府及諸路以科舉取士州學未行三舍以前應置學宮及養士去處依元豐舊制太學生並撥填舊額辟雍正額入太學者撥入額外依舊制遇闕填諸內舍上等校定人願入太學者與免補試辟雍官屬並罷又詔國子博士正録改充太學正録七年臣僚言熙豐間博士未嘗除代近年以來席未暖而代者已至當從正録第進新除太學博士胡世將周利建乞改除正録候將來升為博士從之靖康元年諫議大夫馮澥言朝廷罷元祐學術之禁不專王氏之學六經之旨其説是者取之今學校或主一偏之説執一偏之見願詔有司考校敢私好惡去取重行黜責又詔太學博士替成資闕建炎三年詔國子監併歸禮部未幾詔復養生徒置博士紹興十二年置祭酒司業各一人十三年太學成增置博士正録參用元祐紹聖監學法修立監學新法詔國子博士正録通治諸齋學官闕從本監選舉其後監學博士正録增減不齊兼攝並置不一至隆興以後正録不兼權祭酒司業並置復書庫官又定國子博士一員太學博士三員正録共四員學官之制始定淳熙四年置監門官一員兼管石經閣以不釐務使臣充以後相承不改武學慶曆三年詔置武學于武成王廟以阮逸為教授八月罷武學以議者言古名將如諸葛亮羊祜杜預等豈專學孫吳故也熙寧五年樞密院言古者出師受成於學文武弛張其道一也乞復置武學詔于武成王廟置學元豐官制行改教授為博士紹興十六年詔修建武學武博武諭以兵書弓馬武藝誘誨學者紹興二十六年詔武學博士學諭各置一員內博士於文臣有出身或武舉出身曾預高選充其學諭差武學人後又除文臣之有出身者宗學元豐六年宗室令鑠乞建宗學詔從之既而中輟建中靖國元年復置崇寧初立月書季考法南渡初建學嘉定更新置四齋後再增三齋宗學博士舊諸王宮大小學教授也至道元年太宗將為皇姪等置師傅執政謂環衛之官非親王比當有降乃以教授為名咸平初遂命諸王府官分兼南北宅教授南宮者太祖太宗諸王之子孫處之所謂睦親宅也崇寧五年又改稱某王宮宗子博士位國子博士之上靖康之亂宗學遂廢紹興四年始復置諸王宮大小學教授二員隆興省其一嘉定九年十二月始復置宗學改教授為博士又置宗學諭一員並隸宗正寺在太常博士之下諭在國子正之上奉給賞典依國子博士及正例於是宗室疏遠者皆得就學旋有旨復存諸王宮大小學教授一員書庫官淳化五年判國子監李志言國子監舊有印書錢物所名為近俗乞改為國子監書庫官始置書庫監官以京朝官充掌印經史羣書以備朝廷宣索賜豫之用及出鬻而收其直以上於官元豐三年省中興後併國子監入禮部紹興十三年復置一員三十一年罷隆興初詔主簿兼書庫乾道七年復置一員少府監舊制判監事一人以朝官充凡進御器玩后妃服飾雕文錯綵工巧之事分隸文思院後苑造作所本監但掌造門戟神衣旌節郊廟諸壇祭玉法物鑄牌印朱記百官拜表案褥之事凡祭祀則供祭器爵瓚照燭元豐官制行始置監少監丞主簿各一人監掌百工伎巧之政令少監為之二丞參領之凡乘輿服御寶册符印旌節度量權衡之制與夫祭祀朝會展采備物皆率其屬以供焉庀其工徒察其程課作止勞逸及寒暑早晚之節視將作匠法物勒工名以法式察其良窳凡金玉犀象羽毛齒革膠漆材竹辨其名物而考其制度事當損益則審其可否議定以聞少府所掌舊有主名其工作之事則監自親之熙寧中已釐歸有司官制行皆復舊元豐元年工部言文思院上下界諸作工料條格該説不盡功限例各寬剩乞委官檢照前後料例功限編為定式從之又詔文思監官除內侍外令工部少府監同議選差崇寧三年詔文思院兩界監官立定文臣一員武臣二員並朝廷選差其內侍幹當官並罷分案四置吏八所隸官屬五文思院掌造金銀犀玉工巧之物金采繪素裝鈿之飾以供輿輦册寶法物凡器服之用綾錦院掌織錦繡以供乘輿凡服飾之用染院掌染絲枲幣帛裁造院掌裁製服飾文繡院掌纂繡以供乘輿服御及賓客祭祀之用崇寧三年置招繡工三百人舊置南郊祭器庫監官二人太廟祭器法物庫監官二人掌祠祭器服之名物各有專典旌節官二人鑄印篆文官二人諸州鑄錢監監官各一人以上並屬少府監將作監舊制判監事一人以朝官以上充凡土木工匠之政京都繕修隸三司修造案本監但掌祠祀供省牲牌鎮石炷香盥手焚版幣之事元豐官制行始正職掌置監少監各一人丞主簿各二人監掌宮室城郭橋梁舟車營繕之事少監為之二丞參領之凡土木工匠板築造作之政令總焉辨其才幹器物之所須乘時儲積以待給用庀其工徒而授以法式寒暑蚤暮均其勞逸作止之節凡營造有計帳則委官覆視定其名數驗實以給之歲以二月治溝渠通壅塞乘輿行幸則預戒有司潔除均布黃道凡出納籍帳歲受而會之上于工部熙寧初以嘉慶院為監其官屬職事稽用舊典已而盡追復之元祐七年詔攽將作監修成營造法式八年又詔本監營造檢計畢長二隨事給限丞簿覆檢元符元年三省言將作監主簿二員乞將先到任一員改充幹當公事候成資替罷從之崇寧五年詔將作監應承受前後特旨應副外路並府監修造差撥人工物料遵執元豐條格不得應副宣和五年詔罷營繕所歸將作監分案五置吏二十有七所隸官屬十修內司掌宮城太廟繕修之事東西八作司掌京城內外繕修之事竹木務掌修諸路水運材植及抽算諸河商販竹木以給內外營造之用事材場掌計度材物前期朴斫以給內外營造之用麥場掌受京畿諸縣夏租以給圬墁之用窰務掌陶為磚瓦以給繕營及瓶缶之器丹粉所掌燒變丹粉以供繪飾作坊物料庫第三界掌儲積材物以備給用退材場掌受京城內外退棄材木掄其長短有差其曲直中度者以給營造餘備薪爨簾箔場掌抽算竹木蒲葦以供簾箔內外之用建炎三年詔將作監併歸工部紹興三年復置丞仍兼總少府之事十年置主簿一員十一年詔依司農太府寺置長二一員隆興初宮室無所營繕職務簡省百工器用屬之文思院以隸工部本監惟置丞一員餘官虛而不除乾道以後人材甚多監少丞簿無闕凡臺省之久次與郡邑之有聲者悉寄徑于此自是號為儲才之地而營繕之事多俾府尹畿漕分任其責焉軍器監國初戎器之職領于三司胄案官無專職熙寧六年廢胄案乃按唐令置監以從官總判元豐正名始置監少監各一人丞二人主簿一人監掌監督繕治兵器什物以給軍國之用少監為之二丞參領之凡利器以法式授工徒其弓矢干戈甲胄劍戟戰守之具因其能而分任之量用給材旬會其數以考程課而輸于武庫委遣官詣所隸檢察凡用膠漆筋革材物必以時課百工造作勞逸必均歲終閲其良否多寡之數以詔賞罰器成則進呈便殿俟閲試而頒其樣式于諸道即要會州建都作院分造器械從本監比較而進退其官吏焉元祐三年省丞一員紹聖中復置政和三年應御前軍器監所頒降軍器樣製非長二當職官不得省閲及傳寫漏泄論以違制分案五置吏十有三所隸官屬四東西作坊掌造兵器旗幟戎帳什物辨其名色謹其繕作以輸于受藏之府兵校工匠其役有程視精粗利鈍以為之賞罰作坊物料庫掌收鐵錫羽箭油漆之屬皮角場掌收皮革筋角以供作坊之用南渡置御前軍器所建炎三年詔軍器監併歸工部東西作坊都作院併入軍器所紹興三年復置丞一員令工部相度合管職事歸之十一年詔復置長二各一員十四年以朝奉大夫趙子厚守軍器監宗室為寺監長二自此始隆興初詔置造軍器已有軍器所隸工部本監惟置丞一員乾道五年復置少監及簿六年以少監韓玉往建康點檢物馬以奉使軍器少監為名是年復置監一員淳熙初元詔戎器非進入毋輒出所由是呈驗寖省二年錢良臣以少監總領淮東財賦八年沈揆復以監長行諸監長二自是始許總餉外帶然二人實初兼版曹職事嘉定十四年嶽珂獨以軍器監總餉淮東是後戎所作坊已備官于下宥府起部並提綱于上監居其間事務稀簡特為儲才之所焉都水監舊隸三司河渠案嘉祐三年始專置監以領之判監事一人以員外郎以上充同判監事一人以朝官以上充丞二人主簿一人並以京朝官充輪遣丞一人出外治河掃之事或一歲再歲而罷其有諳知水政或至三年置局于澶州號曰外監元豐正名置使者一人丞二人主簿一人使者掌中外川澤河渠津梁堤堰疏鑿浚治之事丞參領之凡治水之法以防止水以溝蕩水以澮寫水以陂池瀦水凡江河淮海所經郡邑皆頒其禁令視汴洛水勢漲涸增損而調節之凡河防謹其法禁歲計茭揵之數前期儲積以時頒用各隨其所治地而任其責興役以後月至十月止民功則隨其先後毋過一月若導水溉田及疏治壅積為民利者定其賞罰凡修堤岸植榆柳則視其勤惰多寡以為殿最南北外都水丞各一人都提舉官八人監掃官百三十有五人皆分職涖事即干機速非外丞所能治則使者行視河渠事元豐八年詔提舉汴河堤岸司隸本監先是導洛入汴專置堤岸司至是亦歸之有司元祐四年復置外都水使者五年詔南北外都水丞並以三年為任七年方議回河東流乃詔河北京西漕臣及開封府界提點各兼南北外都水事紹聖元年罷元符三年詔罷北外都水丞以河事委之漕臣三年復置重和元年工部尚書王詔言乞選差曾任水官諳練者為南北兩外丞從之宣和三年詔罷南北外都水丞司依元豐法通差文武官一員分案七置吏三十有七所隸有街道司掌轄治道路人兵若車駕行幸則前期修治有積水則疏導之建炎三年詔都水監置使者一員紹興九年復置南北外都水丞各一員南丞于應天府北丞于東京置司十年詔都水事歸于工部不復置官司天監監少監丞主簿春官正夏官正中官正秋官正冬官正靈臺郎保章正挈壺正各一人掌察天文祥異鍾鼓漏刻寫造曆書供諸壇祀祭告神名版位畫日監及少監闕則置判監事二人以五官正充禮生四人曆生四人掌測驗渾儀同知算造三式元豐官制行罷司天監立太史局隸祕書省
