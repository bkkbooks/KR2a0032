body:
  text: 宋史卷五十志第三天文三二十八舍上二十八舍東方角宿二星為天關其間天門也其內天庭也故黃道經其中七曜之所行也左角為天田為理主刑其南為太陽道右角為將主兵其北為太陰道蓋天之三門猶房之四表星明大吉王道太平賢者在朝動搖移徙王者行左角赤明獄平暗而微小王道失陶隱居曰左角天津右角天門中為天關日食角宿王者惡之暈于角內有陰謀陰國用兵得地又主大赦月犯角大臣憂獄事法官憂黜又占憂在宮中月暈其分兵起右角右將災左亦然或曰主水色黃有大赦月暈三重入天門及兩角兵起將失利歲星犯為飢熒惑犯之國衰兵敗犯左角有赦右角兵起守之讒臣進政事急居陽有喜填星犯角為喪一曰兵起太白犯角羣臣有異謀辰星犯為小兵守之大水客星犯兵起五穀傷守左角色赤為旱守右角大水彗星犯之色白為兵赤所指破軍出角天下兵亂星孛于角白為兵赤軍敗入天市兵喪流星犯之外國使來入犯左角兵起雲氣黃白入右角得地赤入左有兵入右戰勝黑白氣入于右兵將敗按漢永元銅儀以角為十三度而唐開元遊儀角二星十二度舊經去極九十一度今測九十三度半距星正當赤道其黃道在赤道南不經角中今測角在赤道南二度半黃道復經角中即與天象合景祐測驗角二星十二度距南星去極九十七度在赤道外六度與乾象新書合今從新書為正南門二星在庫樓南天之外門也主守兵禁星明則遠方來貢暗則夷叛中有小星兵動客彗守之兵起庫樓十星六大星庫也南四星樓也在角宿南一曰天庫兵車之府也旁十五星三三而聚者柱也中央四小星衡也芒角兵起星亡臣下逆動則將行實為吉虛乃凶歲星犯之主兵熒惑犯之為兵旱月入庫樓為兵彗孛入兵飢客星入夷兵起流星入兵盡出赤雲氣入內外不安天庫生角有兵平星二星在庫樓北角南主平天下法獄廷尉之象正則獄訟平月暈獄官憂熒惑犯之兵起有赦彗星犯政不行執法者黜平道二星在角宿間主平道之官武密曰天子八達之衢主轍軾明正吉動搖法駕有虞歲星守之天下治熒惑太白守為亂客星守車駕出行流星守去賢用姦天田二星在角北主畿內封域武密曰天子籍田也歲星守之穀稔熒惑守之為旱太白守穀傷辰星守為水災客星守旱蝗天門二星在平星北武密云在左角南朝聘待客之所星明萬方歸化暗則外兵至月暈其外兵起熒惑入關梁不通守之失禮太白守有伏兵客星犯有謀上者進賢一星在平道西主卿相舉逸材明則賢人用暗則邪臣進太陰歲星犯之大臣死熒惑犯為喪賢人隱太白犯之賢者退歲星太白填星辰星合守之其占為天子求賢黃白紫氣貫之草澤賢人出周鼎三星在角宿上主流亡星明國安不見則運不昌動搖國將移乾象新書引郟鄏定鼎事以周衰秦無道鼎淪泗水其精上為星李太異曰商巫咸星圖已有周鼎蓋在秦前數百年矣按步天歌庫樓十星柱十五星衡四星平星平道天田天門各二星進賢一星周鼎三星俱屬角宿而晉志以左角為天田別不載天田二星隋志有之平道進賢周鼎晉志皆屬太微垣庫樓並衡星柱星南門天門平星皆在二十八宿之外唐武密及景祐書乃與步天歌合亢宿四星為天子內朝總攝天下奏事聽訟理獄録功一曰疏廟主疾疫星明大輔忠民安動則多疾為天子正坐為天符秋分不見則穀傷糴貴太陽犯之諸侯謀國君憂日暈其分大臣凶多雨民飢疫月犯之君憂或大臣當之左為水右為兵月暈其分先起兵者勝在冬大人憂歲星犯之有赦穀有成守之有兵人多病留三十日以上有赦又曰犯則逆臣為亂熒惑犯居陽為喜陰為憂有芒角大人惡之守之久民憂多雨水又為兵填星犯穀傷民亡逆行女專政逆臣為謀守之有兵太白犯之國亡民災逆行為兵亂有芒角貴臣戮守之有水旱災或為喪辰星犯之為水又為大兵守之米貴民疾歲旱盜起民相惡客星犯國不安色赤為兵旱黃為土功青黑使者憂守之穀傷一云有赦令黑民流彗犯國災出則有水兵疫臣叛白為喪孛星犯國危為水為兵入則民流出則其國飢流星入外國使來穀熟出為天子遣使赦令出李淳風曰流星入亢幸臣死雲氣犯之色蒼民疫白為土功黑水赤兵一云白民虐疾黃土功右亢宿四星漢永元銅儀十度唐開元遊儀九度舊去極八十九度今九十一度半景祐測驗亢九度距南第二星去極九十五度大角一星在攝提間天王坐也又為天棟正經紀也光明潤澤為吉青為憂赤為兵白為喪黑為疾色黃而靜民安動則人主好遊月犯之大臣憂王者惡之月暈其分人主有服五星犯之臣謀主有兵太白守之為兵彗星出其分主更改或為兵天子失仁則守之孛星犯為兵守之主憂客星犯守臣謀上出則人主受制流星入王者惡之犯之邊兵起雲氣青主憂白為喪黃氣出有喜折威七星在亢南主斬殺斷軍獄月犯之天子憂五星犯將軍叛彗孛犯邊將死雲氣犯蒼白兵亂赤臣叛主黃白為和親出則有赦黑氣入人主惡之攝提六星左右各三直斗杓南主建時節伺禨祥其星為楯以夾擁帝坐主九卿星明大三公恣主弱色溫不明天下安近大角近戚有謀太陰入主受制月食其分主惡之熒惑太白守兵起天下更主彗孛入主自將兵出主受制流星入有兵出有使者出犯之公卿不安雲氣入赤為兵九卿憂色黃喜黑大臣戮陽門二星在庫樓東北主守隘塞禦外寇五星入五兵藏彗星守之外夷犯塞兵起赤雲氣入主用兵頓頑二星在折威東南主考囚情狀察詐偽也星明無咎暗則刑濫彗星犯之貴人下獄按步天歌大角一星折威七星左右攝提總六星頓頑陽門各二星俱屬角宿而晉志以大角攝提屬太微垣折威頓頑在二十八宿之外陽門則見於隋志而晉史不載武密書以攝提折威陽門皆屬角亢乾象新書以右攝提屬角左攝提屬亢餘與武密書同景祐測驗乃以大角攝提頓頑陽門皆屬於亢其説不同氐宿四星為天子舍室后妃之府休解之房前二星適也後二星妾也又為天根主疫後二星大則臣奉度主安小則臣失勢動則徭役起日食其分卿相有讒諛一曰王者后妃惡之大臣憂日暈女主恣一曰國有憂日下興師月食其宿大臣凶后妃惡之一曰糴貴月暈大將凶人疫在冬為水主危以赦解之月犯左右郎將有誅一曰有兵盜犯右星主水掩之有陰謀將軍當之歲星犯有赦或立后守之地動年豐逆行為兵熒惑犯之臣僭上一云將軍憂守有赦填星犯左右郎將有誅守之有赦色黃后喜或册太子留舍天下有兵齊明赦太白犯之郎將誅入其分疾疫或云犯之拜將乘右星水災辰星犯貴臣暴憂守之為水為旱為兵入守貴人有獄乘左星天子自將客星犯牛馬貴色黃白為喜有赦或曰邊兵起後宮亂五十日不去有刺客彗星犯有大赦糴貴滅之大疫入有小兵一云主不安孛星犯糴貴出則有赦入為小兵或云犯之臣干主流星犯祕閣官有事在冬夏為水旱乙巳占後宮有喜色赤黑後宮不安雲氣入黃為土功黑主水赤為兵蒼白為疾疫白後宮憂按漢永元銅儀唐開元遊儀氐宿十六度去極九十四度景祐測驗與乾象新書皆九十八度天乳一星在氐東北當赤道中明則甘露降彗客入天雨將軍一星騎將也在騎官東南總領車騎軍將部陳行列色動搖兵外行太白熒惑客星犯之大兵出天下亂招搖一星在梗河北主北兵芒角變動則兵大行明則兵起若與棟星梗河北斗相直則北方當來受命中國又占動則近臣恣離次則庫兵發色青為憂白為君怒赤為兵黑為軍破黃則天下安彗星犯北邊兵動出其分夷兵大起孛犯蠻夷亂客星出蠻夷來貢一云北地有兵喪流星出有兵雲氣犯色黃白相死赤為內兵亂色黃兵罷白大人憂帝席三星在大角北主宴獻酬酢星明王公災暗天下安星亡大人失位動搖主危彗犯主憂有亂兵客星犯主危亢池六星在亢宿北亢舟也池水也主渡水往來送迎微細凶散則天下不通移徙不居其度中則宗廟有怪五星犯之川溢客星犯水蟲多死武密云主斷軍獄掌棄市殺戮與舊史異説騎官二十七星在氐南天子虎賁也主宿衛星衆天下安稀則騎士叛不見兵起五星犯為兵客星守之將出有憂士卒發流星入兵起色蒼白將死梗河三星在帝席北天矛也一曰天鋒主北邊兵又主喪故其變動應以兵喪星亡國有兵謀彗星犯之北兵敗客星入兵出陰陽不和一云北兵侵中國流星出為兵赤雲氣犯兵敗蒼白將死車騎三星在騎官南總車騎將主部陳行列變色動搖則兵行太白熒惑客星犯之大兵出天下亂陳車三星在氐南一云在騎官東北革車也太白熒惑守之主車騎滿野內兵無禁天輻二星在房西斜列主乘輿若周官巾車官也近尾天下有福五星客彗犯之則輦轂有變一作天福按步天歌已上諸星俱屬氐宿乾象新書以帝席屬角亢池屬亢武密與步天歌合皆屬氐而以梗河屬亢占天録又以陳車屬於亢乾象新書屬氐餘皆與步天歌合房宿四星為明堂天子布政之官也亦四輔也下第一星上將也次次將也次次相也上星上相也南二星君位北二星夫人位又為四表中為天衢為天關黃道之所經也南間曰陽環其南曰太陽北間曰陰環其北曰太陰七曜由乎天衢則天下和平由陽道則旱喪由陰道則水兵亦曰天駟為天馬主車駕南星曰左驂次左服次右服次右驂亦曰天又主開閉為畜藏之所由星明則王者明驂大則兵起星離則民流左驂服亡則東南方不可舉兵右亡則西北不可舉兵日食其分為兵大臣專權日暈亦為兵君臣失政女主憂月食其宿大臣憂又為王者昏大臣專政月暈為兵三宿主赦及五舍不出百日赦太陰犯陽道為旱陰道為雨中道歲稔又占上將誅當天門天駟穀熟歲星犯之更政令又為兵為飢民流守之大赦天下和平一云良馬出熒惑犯馬貴人主憂色青為喪赤為兵黑將相災白芒火災守之有赦令十日勾巳者臣叛填星犯之女主憂勾巳相有誅守之土功興一曰旱兵一曰有赦太白犯四邊合從守之為土功出入霜雨不時辰星犯有殃守之水災一云北兵起將軍為亂客星犯歷陽道為旱陰道為水國空民飢色白有攻戰入為糴貴彗星犯國危人亂其分惡之孛星犯有兵民飢國災流星犯之在春夏為土功秋冬相憂入有喪乙巳占出其分天子恤民下德令雲氣入赤黃吉如人形后有子色赤宮亂蒼白氣出將相憂按漢永元銅儀唐開元遊儀房宿五度舊去極百八度今百十度半景祐測驗房距南第二星去極百十五度在赤道外二十三度乾象新書在赤道外二十四度鍵閉一星在房東北主關籥明吉暗則宮門不禁月犯之大臣憂火災歲星守之王不宜出填星占同太白犯將相憂熒惑犯主憂彗星客星守之道路阻兵起一云兵滿野鈎鈐二星在房北房之鈐鍵天之管籥王者至孝則明又曰明而近房天下同心房鈎鈐間有星及疏拆則地動河清月犯之大人憂車駕行月食其分將軍死歲星守之為飢去其宿三寸王失政近臣起亂熒惑守之有德令太白守喉舌憂填星守王失土彗星犯宮庭失業客星流星犯王有奔馬之敗東咸西咸各四星東咸在心北西咸在房西北日月五星之道也為房之戶以防淫泆也明則信吉東咸近鈎鈐有讒臣入西咸近上及動有知星者入月五星犯之有陰謀又為女主失禮民飢熒惑犯之臣謀上與太白同犯兵起歲星填星犯之有陰謀流星犯后妃恣王有憂客星犯主失禮后妃恣罰三星在東西咸正南主受金罰贖曲而斜列則刑罰不中彗星客星犯之國無政令憂多枉法日一星在房宿南太陽之精主昭明令德明大則君有德令月犯之下謀上歲星守王得忠臣陰陽和四夷賓五穀豐太白熒惑犯之主有憂客星彗星犯之主失位從官二星在房宿西南主疾病巫醫明大則巫者擅權彗孛犯之巫臣作亂雲氣犯黑為巫臣戮黃則受爵按步天歌以上諸星俱屬在房日一星晉隋志皆不載以他書考之雖在房宿南實入氐十二度半武密書及乾象新書惟以東咸屬心西咸屬房與步天歌不同餘皆吻合心宿三星天王正位也中星曰明堂天子位為大辰主天下之賞罰前星為太子後星為庶子星直則王失勢明大天下同心天下變動心星見祥搖動則兵離民流日食其分刑罰不中將相疑民飢兵喪日暈王者憂之月食其宿王者惡之三公憂下有喪月暈為旱穀貴蟲生將凶與五星合大凶太陰犯之大臣憂犯中央及前後星主惡之出心大星北國旱出南君憂兵起歲星犯之有慶賀事穀豐華夷奉化色不明有喪旱熒惑犯之大臣憂貫心為飢與太白俱守為喪又曰熒惑居其陽為喜陰為憂又曰守之主易政犯為民流大臣惡之守星南為水北為旱逆行大臣亂填星犯之大臣喜穀豐守之有土功留舍三十日有赦居久人主賢中犯明堂火災逆行女主干政太白犯糴貴將軍憂有水災不出一年有大兵舍之色不明為喪逆行環繞大人惡之辰星犯明堂則大臣當之在陽為燕在陰為塞北不則地動大雨守之為水為盜客星犯之為旱守之為火災舍之則糴貴民飢彗星犯之大臣相疑守之而出為蝗飢又曰為兵星孛其分有兵喪民流流星犯臣叛入之外國使來色青為兵為憂黃有土功黑為凶雲氣入色黃子孫喜白亂臣在側黑太子有罪按漢永元銅儀唐開元遊儀心三星皆五度去極百八度景祐測驗心三星五度距西第一星去極百十四度積卒十二星在房西南五營軍士之象主衛士掃除不祥星小為吉明則有兵一星亡兵少出二星亡兵半出三星亡兵盡出五星守之兵起不則近臣誅彗星客星守之禁兵大出天子自將雲氣犯之青赤為大臣持政欲論兵事按步天歌積卒十二星屬心晉志在二十八宿之外唐武密書與步天歌合乾象新書乃以積卒屬房宿為不同今兩存其説尾宿九星為天子後宮亦主后妃之位上第一星后也次三星夫人次星嬪妾也亦為九子均明大小相承則後宮有序子孫蕃昌明則后有喜穀熟不明則后有憂穀荒日食其分將有疾在燕風沙兵喪後宮有憂人君戒出日暈女主喪將相憂月食其分貴臣犯刑後宮有憂月暈有疫大赦將相憂其分有水災后妃憂太陰犯之臣不和將有憂歲星犯穀貴入之妾為嫡臣專政守之旱火災熒惑犯之有兵留二十日水災留三月客兵聚入之人相食又云宮內亂填星犯之色黃后妃喜入為兵飢盜賊逆行妾為女主守之而有芒角更姓易政太白犯入大臣起兵久留為水災出入舍守糴貴兵起後宮憂失行軍破城亡辰星犯守為水災民疾後宮有罪者兵起入則萬物不成民疫客星犯入宮人惡之守之賤女暴貴出則為風為水後宮惡之兵罷民飢多死彗星犯后惑主宮人出兵起宮門多土功出入貴臣誅有水災孛犯多土功大臣誅守之宮人出出為大水民飢流星入犯色青舊臣歸在春夏後宮有口舌秋冬賢良用事出則後宮喜有子孫色白後宮妾死出入風雨時穀熟入后族進祿青黑則后妃喪雲氣入色青外國來降出則臣有亂赤氣入有使來言兵黑氣入有諸侯客來按漢永元銅儀尾宿十八度唐開元遊儀同舊去極百二十度一云百四十度今百二十四度景祐測驗亦十八度距西行從西第二星去極百二十八度在赤道外二十二度乾象新書二十七度神宮一星在尾宿第三星旁解衣之內室也天江四星在尾宿北主太陰明動為水兵起星不具則津梁不通參差馬貴月犯為兵為臣強河津不通熒惑犯大旱守之有立主太白犯暴水彗星犯為大兵客星入河津不通流星犯為水為飢赤雲氣犯車騎出青為多水黃白天子用事兵起入則兵罷傅説一星在尾後河中主章祝官也一曰後宮女巫也司天王之內祭祀以祈子孫明大則吉王者多子孫輔佐出不明則天下多禱祠亡則社稷無主入尾下多祝詛左氏傳天策焞焞即此星也彗星客星守之天子不享宗廟赤雲氣入巫祝官有誅者魚一星在尾後河中主陰事知雲雨之期明大則河海水出不明則陰陽和多魚亡則魚少動搖則大水暴出出則河大魚多死月暈或犯之則旱魚死熒惑犯其陽為旱陰為水填星守之為旱赤雲氣犯出兵起將憂入兵罷黃白氣出兵起龜五星在尾南主卜以占吉凶星明君臣和不明則上下乖熒惑犯為旱守為火客星入為水憂流星出色赤黃為兵青黑為水各以其國言之赤雲氣出卜祝官憂按神宮傅説魚各一星天江四星龜五星步天歌與他書皆屬尾而晉志列天江於天市垣以傅説魚龜在二十八宿之外其説不同箕宿四星為後宮妃后之府亦曰天津一曰天雞主八風又主口舌主蠻夷星明大穀熟不正為兵離徙天下不安中星衆亦然糴貴凡日月宿在箕壁翼軫者皆為風起舌動三日有大風日犯或食其宿將疾佞臣害忠良皇后憂大風沙日暈國有妖言月食為風為水旱為飢后惡之月暈為風穀貴大將易又王者納后月犯多風糴貴為旱女主憂君將死后宮干政歲星入宮內口舌歲熟在箕南為旱在北為有年守之多惡風穀貴民飢死熒惑犯地動入為旱出則有赦久守為水逆行諸侯相謀人主惡之填星犯女主憂久留有赦守之后喜有土功色黃光潤則太后喜又占守有水守九十日人流兵起蝗太白犯女主喜入則有赦出為土功糴貴守之為旱為風民疾出入留箕五穀不登多蝗辰星犯有赦守則為旱動搖色青臣自戮又占為水溢旱火災穀不成客星入犯有土功宮女不安民流守之為飢色赤為兵守其北小熟東大熟南小飢西大飢出其分民飢大臣有棄者一云守之秋冬水災彗星犯守東夷自滅出則為旱為兵北方亂孛犯為外夷亂糴貴守之外夷災出為穀貴民死流亡春夏犯之金玉貴秋冬土功興入則多風雨色黃外夷來貢雲氣出色蒼白國災除入則蠻夷來見出而色黃有使者出箕口斂為雨開為多風少雨按漢永元銅儀箕宿十度唐開元遊儀十一度舊去極百十八度今百二十度景祐測驗箕四星十度距西北第一星去極百二十三度粳一星在箕舌前杵西北明則豐熟暗則民飢流亡杵三星在箕南主給庖舂動則人失釜甑縱則豐橫則大飢亡則歲荒移徙則人失業熒惑守民流客星犯守歲飢彗孛犯天下有急兵按晉志粳一星杵三星在二十八宿之外乾象新書與步天歌皆屬箕宿北方南斗六星天之賞祿府主天子壽算為宰相爵祿之位傳曰天廟也丞相太宰之位褒賢進士稟受爵祿又主兵一曰天機南二星魁天梁也中央二星天相也北二星天府廷也又謂南星者魁星也北星杓也第一星曰北亭一曰天開一曰鈇鑕石申曰魁第一主吳二會稽三丹陽四豫章五廬江六九江星明盛則王道和平帝王長齡將相同心不明則大小失次芒角動搖國失忠臣兵起民愁日食在斗將相憂兵起皇后災吳分有兵日暈宰相憂宗廟不安月食其分國飢小兵后夫人憂月暈大將死穀不生月犯將臣黜風雨不時大臣誅一歲三入大赦又占入為女主憂趙魏有兵色惡相死歲星犯有赦久守水災穀貴守及百日兵用大臣死熒惑犯有赦破軍殺將火災入二十日糴貴四十日有德令守之為兵盜久守災甚出斗上行天下憂不行臣憂入內外有謀守七日太子疾填星犯為亂入則失地逆行地動出入留二十日有大喪守之大臣叛又占逆行先水後旱守之國多義士太白犯之有兵臣叛留守之破軍殺將與火俱入白爍臣子為逆久則禍大辰星犯水穀不成有兵守之兵喪客星犯兵起國亂入則諸侯相攻多盜大旱宮廟火穀貴七日不去有赦彗星犯國主憂出則其分有謀又為水災宮中火下謀上有亂兵入則為火大臣叛孛犯入下謀上有亂兵出則為兵為疾國憂流星入蠻夷來貢犯之宰相憂在春天子壽夏為水秋則相黜冬大臣逆色赤而出斗者大臣死雲氣入蒼白多風赤旱出有兵起宮廟火入有兩赤氣兵黑主病按漢永元銅儀斗二十四度四分度之一唐開元遊儀二十六度去極百十六度今百十九度景祐測驗亦二十六度距魁第四星去極百二十二度鱉十四星在南斗南主水族不居漢中川有易者熒惑守之為旱辰星守為火客星守為水流星出色青黑為水黃為旱雲氣占同一曰有星守之白衣會主有水天淵十星一曰天池一曰天泉一曰天海在鱉星東南九坎間又名太陰主灌溉溝渠五星守之大水河決熒惑入為旱客星入海魚出彗星守之川溢傷人狗二星在南斗魁前主吠守以不居常處為災熒惑犯之為旱客星入多土功北邊飢守之守禦之臣作亂建六星在南斗魁東北臨黃道一曰天旗天之都關為謀事為天鼓為天馬南二星天庫也中二星市也鈇鑕也上二星為旗跗斗建之間三光道也主司七曜行度得失十一月甲子天正冬至大曆所起宿也星動人勞役月犯之臣更天子法掩之有降兵月食其分皇后娣姪當黜月暈大將死五穀不成蛟龍見牛馬疫月與五星犯之大臣相譖有謀亦為關梁不通大水歲星守為旱糴貴死者衆諸侯有謀入則有兵熒惑守之臣有黜者諸侯有謀糴貴入則關梁不通馬貴守旗跗三十日有兵填星守之王者有謀太白守外國使來辰星守為水災米貴多病彗孛客星犯之王失道忠臣黜客星守之道路不通多盜流星入下有謀色赤昌天辨九星辨一作辨在建星北市官之長主列肆闤闠市籍之事以知市珍也明盛則萬物昌不明及彗客犯之糴貴久守之囚徒起兵天雞二星在牛西一在狗國北主異鳥一曰主候時熒惑舍之為旱雞多夜鳴太白熒惑犯之為兵填星犯之民流亡客星犯水旱失時入為大水狗國四星在建星東南主三韓鮮卑烏桓玁狁沃且之屬星不具天下有盜不明則安明則邊寇起月犯之烏桓鮮卑國亂熒惑守之外夷兵起太白守之鮮卑受攻客星守其王來中國天籥八星在南斗杓第二星西主開閉門戶明則吉不備則關籥無禁客星彗星守之關梁閉塞農丈人一星在南斗西南老農主稼穡者又主先農農正官星明歲豐暗則民失業移徙歲飢客星彗星守之民失耕歲荒按步天歌已上諸星皆屬南斗晉志以狗國天雞天辨天籥建星皆屬天市垣餘在二十八宿之外乾象新書以天籥農丈人屬箕武密又以天籥屬尾互有不同牛宿六星天之關梁主犧牲事其北二星一曰即路一曰聚火又曰上一星主道路次二星主關梁次三星主南越明大則王道昌關梁通牛貴怒則馬貴動則牛災多死始出而色黃大豆賤赤則豆有蟲青則大豆貴星直糴賤曲則貴日食其分兵起暈為陰國憂兵起月食有兵暈為水災女子貴五穀不成牛多暴死小兒多疾月暈在冬三月百四十日外有赦暈中央大星大將被戮月犯之有水牛多死其國有憂歲星入犯則諸侯失期留守則牛多疫五穀傷在牛東不利小兒西主風雪北為民流逆行宮中有火居三十日至九十日天下和平道德明熒惑犯之諸侯多疾臣謀主守則穀不成兵起入或出守斗南赦填星犯之有土功守之雨雪民人牛馬病太白犯之諸侯不通守則國有兵起入則為兵謀人多死辰星犯敗軍移將臣謀主客星犯守之牛馬貴越地起兵出牛多死地動馬貴彗星犯之吳分兵起出為糴貴牛死孛犯改元易號糴貴牛多死吳越兵起下當有自立者流星犯之王欲改事春夏穀熟秋冬穀貴色黑牛馬昌關梁入貢雲氣蒼白橫貫有兵喪赤亦為兵黃白氣入牛蕃息黑則牛死按漢永元銅儀以牽牛為七度唐開元遊儀八度舊去極百六度今百四度景祐測驗牛六星八度距中央大星去極百十度半天田九星在斗南一曰在牛東南天子畿內之田其占與角北天田同客星犯之天下憂彗孛犯守之農夫失業河鼓三星在牽牛西北主天鼓蓋天子及將軍鼓也一曰三武主天子三將軍中央大星為大將軍左星為左將軍右星為右將軍左星南星也所以備關梁而拒難也設守險阻知謀徵也鼓欲正直而明色黃光澤將吉不正為兵憂星怒則馬貴動則兵起曲則將失計奪勢有芒角將軍凶猛象也動搖差度亂兵起月犯之軍敗亡五星犯之兵起彗星客星犯將軍被戮流星犯諸侯作亂黃白雲氣入之天子喜赤為兵起出則戰勝黑為將死青氣入之將憂出則禍除左旗九星在河鼓左旁右旗九星在牽牛北河鼓西南天之鼓旗旌表也主聲音設險知敵謀旗星明大將吉五星犯守兵起織女三星在天市垣東北一曰在天紀東天女也主果蓏絲帛珍寶王者至孝神祇咸喜則星俱明天下和平星怒而角布帛貴陶隱居曰常以十月朔至六七日晨見東方色赤精明者女工善星亡兵起女子為候織女足常向扶筐則吉不向則絲綿大貴月暈其分兵起熒惑守之公主憂絲帛貴兵起彗星犯后族憂星孛則有女喪客星入色青為飢赤為兵黃為旱白為喪黑為水流星入有水盜女主憂雲氣入蒼白女子憂赤則為女子兵死色黃女有進者漸臺四星在織女東南臨水之臺也主晷漏律呂事明則陰陽調而律呂和不明則常漏不定客星彗星犯之陰陽反戾輦道五星在織女西主王者遊嬉之道漢輦道通南北宮其象也太白熒惑守之御路兵起九坎九星在牽牛南主溝渠導引泉源疏瀉盈溢又主水旱星明為水災微小吉月暈為水五星犯之水溢客星入天下憂雲氣入青為旱黑為水溢羅堰三星在牽牛東拒馬也主隄塘壅蓄水源以灌溉也星明大則水泛溢天桴四星在牽牛東北橫列一曰在左旗端鼓桴也主漏刻暗則刻漏失時武密曰主桴鼓之用動搖則軍鼓用前近河鼓若桴鼓相直皆為桴鼓用太白熒惑守之兵鼓起客星犯之主刻漏失時按步天歌已上諸星俱屬牛宿晉志以織女漸臺輦道皆屬太微垣以河鼓左旗右旗天桴屬天市垣餘在二十八宿之外武密以左旗屬箕屬斗右旗亦屬斗漸臺屬斗又屬牛餘與步天歌同乾象新書則又以左旗織女漸臺輦道九坎皆屬於斗須女四星天之少府賤妾之稱婦職之卑者也主布帛裁製嫁娶星明天下豐女巧國富小而不明反是日食在女戒在巫祝后妃禱祠又占越分飢后妃疾日暈後宮及女主憂月食為兵旱國有憂月暈有兵謀不成兩重三重女主死月犯之有女惑有兵不戰而降又曰將軍死歲星犯之后妃喜外國進女守之多水國飢喪糴貴民大災熒惑犯之大臣皇后憂布帛貴民大災守之土人不安五穀不熟民疾有女喪又為兵入則糴貴逆行犯守大臣憂居陽喜陰為憂填星犯守有苛政山水出壞民舍女謁行后專政多妖女留五十日民流亡太白犯之布帛貴兵起天下多寡女留守有女喪軍發辰星犯國飢民疾守之天下水有赦南地火北地水又兵起布帛貴客星犯兵起女人為亂守之宮人憂諸侯有兵江淮不通糴貴彗星犯兵起女為亂出為兵亂有水災米鹽貴星孛其分兵起女為亂有奇女來進出入國有憂王者惡之流星犯天子納美女又曰有貴女下獄抵須女女主死乙巳占出入而色黃潤立妃后白為後宮妾死雲氣入黃白有嫁女事白為女多病黑為女多死赤則婦人多兵死者按漢永元銅儀以須女為十一度景祐測驗十二度距西南星去極百五度在赤道外十四度十二國十六星在牛女南近九坎各分土居列國之象九坎之東一星曰齊齊北二星曰趙趙北一星曰鄭鄭北一星曰越越東二星曰周周東南北列二星曰秦秦南二星曰代代西一星曰晉晉北一星曰韓韓北一星曰魏魏西一星曰楚楚南一星曰燕有變動各以其國占之陶隱居曰越星在婺女南鄭一星在越北趙二星在鄭南周二星在越東楚一星在魏西南燕一星在楚南韓一星在晉北晉一星在代北代二星在秦南齊一星在燕東離珠五星在須女北須女之藏府女子之星也又曰主天子旒珠后夫人環珮去陽旱去陰潦客星犯之後宮有憂奚仲四星在天津北主帝車之官凡太白熒惑守之為兵祥天津九星在虛宿北橫河中一曰天漢一曰天江主四瀆津梁所以度神通四方也一星不備津梁不通明則兵起參差馬貴大則水災移則水溢彗孛犯之津敗道路有賊客星犯橋梁不修守之水道不通船貴流星出必有使出隨分野占之赤雲氣入為旱黃白天子有德令黑為大水色蒼為水為憂出則禍除敗瓜五星在匏瓜星南主修瓜果之職與匏瓜同占匏瓜五星一作瓠瓜在離珠北天子果園也其西觜星主後宮不明則后失勢不具或動搖為盜光明則歲豐暗則果實不登彗孛犯之近臣僭有戮死者客星守之魚鹽貴山谷多水犯之有遊兵不戰蒼白雲氣入之果不可食青為天子攻城邑黃則天子賜諸侯果黑為天子食果而致疾扶筐七星為盛桑之器主勸蠶也一曰供奉后與夫人之親蠶明吉暗凶移徙則女工失業彗星犯將叛流星犯絲綿大貴按步天歌已上諸星俱屬須女而十二國及奚仲匏瓜敗瓜等星晉志不載隋志有之晉志又以離珠天津屬天市垣扶筐屬太微垣乾象新書以周越齊趙屬牛秦代韓魏燕晉楚鄭屬女武密以離珠匏瓜屬牛又屬女以奚仲屬危乾象新書以離珠匏瓜屬牛敗瓜屬斗又屬牛以天津西一星屬斗中屬牛東五星屬女虛宿二星為虛堂冢宰之官也主死喪哭泣又主北方邑居廟堂祭祀祝禱事宋均曰危上一星高旁兩星下似蓋屋也蓋屋之下中無人但空虛似乎殯宮主哭泣也明則天下安不明為旱欹斜上下不正享祀不恭動將有喪日食其分其邦有喪日暈民飢后妃多喪月食主刀劍官有憂國有喪月暈有兵謀風起則不成又為民飢月犯之宗廟兵動又國憂將死歲星犯民飢守之失色天王改服與填星同守水旱不時熒惑犯之流血滿野守之為旱民飢軍叛入為火災功成見逐或勾巳大人戰不利填星犯之有急令行疾有客兵入則有赦穀不成人不安守之風雨不時為旱米貴大人欲危宗廟有客兵太白犯下多孤寡兵喪出則政急守之臣叛君入則大臣下獄辰星犯春秋有水守之亦為水災在東為春水南為夏水西為秋水北冬有雷雨水客星犯糴貴守之兵起近期一年遠則二年有哭泣事出為兵喪彗星犯之國凶有叛臣出為野戰流血出入有兵起芒焰所指國必亡星孛其宿有哭泣事出則為野戰流血國有叛臣流星犯光潤出入則冢宰受賞有赦令色黑大臣死入而色青有哭泣事黃白有受賜者出則貴人求醫藥雲氣黃入為喜蒼為哭赤火黑水白有幣客來按漢永元銅儀以虛為十度唐開元遊儀同舊去極百四度今百一度景祐測驗距南星去極百三度在赤道外十二度司命二星在虛北主舉過行罰滅不祥又主死亡逢星出司命王者憂疾一曰宜防祅惑司祿二星在司命北主增年延德又主掌功賞食料官爵司危二星在司祿北主矯失正下又主樓閣臺榭死喪流亡司非二星在司危北主司候內外察愆尤主過失乾象新書命祿危非八星主天子已下壽命爵祿安危是非之事明大為災常為吉哭二星在虛南主哭泣死喪月五星彗孛犯之為喪泣二星在哭星東與哭同占天壘城十三星在泣南圜如大錢形若貫索主鬼方北邊丁零類所以候興敗存亡熒惑入守夷人犯塞客星入北方侵赤雲氣掩之北方驚滅有疾疫離瑜三星在十二國東乾象新書在天壘城南離圭衣也瑜玉飾皆婦人見舅姑衣服也微則後宮儉約明則婦人奢縱客星彗星入之後宮無禁敗臼四星在虛危南兩兩相對主敗亡災害石申曰一星不具民賣甑釜不見民去其鄉五星入除舊布新客星彗星犯之民飢流亡黑氣入主憂按步天歌已上諸星俱屬虛宿司命司祿司危司非離瑜敗臼晉志不載隋志有之乾象新書以司命司祿司危司非屬須女泣星敗臼屬危武密書與步天歌合危宿三星在天津東南為天子宗廟祭祀又為天子土功又主天府天市架屋受藏之事不明客有誅土功興動或暗營宮室有兵事日食陵廟摧有大喪有叛臣日暈有喪月食大臣憂有喪宮殿圮月暈有兵喪先用兵者敗月犯之宮殿陷臣叛主來歲糴貴有大喪歲星犯守為兵役徭多土功有哭泣事又多盜熒惑犯之有赦守之人多疾兵動諸侯謀叛宮中火災守上星人民死中星諸侯死下星大臣死各期百日十日守三十日東兵起歲旱近臣叛入為兵有變更之令填星守之為旱民疾土功興國大戰犯之皇后憂兵喪出入留舍國亡地有流血入則大亂賊臣起太白犯之為兵一曰無兵兵起有兵兵罷五穀不成多火災守之將憂又為旱為火舍之有急事辰星犯之大臣誅法官憂國多災守之臣下叛一云皇后疾兵喪起客星犯有哭泣一曰多雨水穀不收入之有土功或三日有赦出則多雨水五穀不登守之國敗民飢彗星犯之下有叛臣兵起出則將軍出國易政大水民飢孛犯國有叛者兵起流星犯之春夏為水災秋冬為口舌入則下謀上抵危北地交兵乙巳占流星出入色黃潤人民安穀熟土功興色黑為水大臣災雲氣入蒼白為土功青為國憂黑為水為喪赤為火白為憂為兵黃出入為喜按漢永元銅儀以危為十六度唐開元遊儀十七度舊去極九十七度距南星去極九十八度在赤道外七度虛梁四星在危宿南主園陵寢廟禱祝非人所處故曰虛梁一曰宮宅屋幃帳寢太白熒惑犯之為兵彗孛犯兵起宗廟改易天錢十星在北落師門西北主錢帛所聚為軍府藏明則庫盈暗為虛太白熒惑守之盜起彗孛犯之庫藏有賊墳墓四星在危南主山陵悲慘死喪哭泣大曰墳小曰墓五星守犯為人主哭泣之事杵三星在人星東一云臼星北主舂軍糧不具則民賣甑釜臼四星在杵星下一云危東杵臼不明則民飢星衆則歲樂疏為飢動搖亦為飢杵直下對臼則吉不相當則軍糧絶縱則吉橫則荒又臼星覆歲飢仰則歲熟彗星犯之民飢兵起天下急客星守之天下聚會米粟蓋屋二星在危宿南九度主治宮室五星犯之兵起彗孛犯守兵災尤甚造父五星在傳舍南一曰在騰蛇北御官也一曰司馬或曰伯樂主御營馬馬乘轡勒移處兵起馬貴星亡馬大貴彗客入之僕御謀主有斬死者一曰兵起守之兵動馬出人五星在虛北車府東如人形一曰主萬民柔遠能邇又曰臥星主夜行以防淫人星亡則有詐作詔者又為婦人之亂星不具王子有憂客彗守犯人多疾疫車府七星在天津東近河東西列主車府之官又主賓客之館星光明潤澤必有外賓車駕華潔熒惑守之兵動彗客犯之兵車出鈎九星在造父西河中如鈎狀星直則地動他星守占同一曰主輦輿服飾明則服飾正按步天歌已上諸星俱屬危宿晉志不載人星車府隋志有之杵臼星晉隋志皆無造父鈎星晉志屬紫薇垣蓋屋虛梁天錢在二十八宿外乾象新書以車府西四星屬虛東三星屬危武密書以造父屬危又屬室餘皆與步天歌合按乾象新書又有天綱一星在危宿南入危八度去極百三十二度在赤道外四十一度晉隋志及諸家星書皆不載止載危室二宿間與北落師門相近者近世天文乃載此一星在鬼柳間與外廚天紀相近然新書兩天綱雖同在危度其説不同今姑附于此營室二星天子之宮一曰玄宮一曰清廟又為軍糧之府主土功事一曰室一星為天子宮一星為太廟為王者三軍之廩故置羽林以衛又為離宮閣道故有離宮六星在其側一曰定室詩曰定之方中也星明國昌不明而小祠祀鬼神不享動則有土功事不具憂子孫無芒不動天下安日食在室國君憂王者將兵一曰軍絶糧士卒亡日暈國憂女主憂黜月食其分有土功歲飢月暈為水為火為風月犯之為土功有哭泣事歲星犯之有急而為兵入天子有赦爵祿及下舍室東民多死舍北民憂又曰守之宮中多火災主不安民疫熒惑犯歲不登守之有小災為旱為火糴貴逆行守之臣謀叛入則創改宮室成勾巳者主失宮填星犯為兵守之天下不安人主徙宮后夫人憂關梁不通貴人多死久守大人惡之以赦解吉逆行女主出入恣留六十日土功興太白犯五寸許天子政令不行守則兵大忌之以赦令解一曰太子后妃有謀若乘守勾巳逆行往來主廢后妃有大喪宮人恣去室一尺威令不行留六十日將死入則有暴兵辰星犯之為水入則后有憂諸侯發動於西北客星犯入天子有兵事軍飢將離外兵來出於室兵先起者敗彗星出占同或犯之則弱不能戰出入犯之則先起兵者勝一曰出室為大水孛犯或出入先起兵者勝出有小災後宮亂武密曰孛出其分有兵喪道藏所載室專主兵流星犯軍乏糧在春夏將軍貶秋冬水溢乙巳占曰流星出入色黃潤軍糧豐五穀成國安民樂雲氣入黃為土功蒼白大人惡之赤為兵民疫黑則大人憂按漢永元銅儀營室十八度唐開元遊儀十六度舊去極八十五度景祐測驗室十六度距南星去極八十五度在赤道外六度雷電六星在室南明動則雷電作離宮六星兩兩相對為一坐夾附室宿上星天子之別宮也主隱藏止息之所動搖為土功不具天子憂太白熒惑入兵起犯或勾巳環繞為后妃咎彗星犯之有修除之事壘壁陳十二星一作壁壘在羽林北羽林之垣壘主天軍營星明國安移動兵起不見兵盡出將死五星入犯皆主兵太白辰星尤甚客星入兵大起將吏憂流星入南色青后憂入北諸侯憂色赤黑入東后有謀入西太子憂黃白為吉騰蛇二十二星在室宿北主水蟲居河濱明而微國安移向南則旱向北大水彗孛犯之水道不通客星犯水物不成土功吏二星在壁宿南一曰在危東北主營造宮室起土之官動搖則版築事起北落師門一星在羽林軍南北宿在北方落者天軍之藩落也師門猶軍門長安城北門曰北落門象此也主非常以候兵星明大安微小芒角有大兵起歲星犯之吉熒惑入兵弱不可用客星犯之光芒相及為兵大將死守之邊人入塞流星出而色黃天子使出入則天子喜出而色赤或犯之皆為兵起雲氣入蒼白為疾疫赤為兵黃白喜黑雲氣入邊將死八魁九星在北落東南主捕張禽獸之官也客彗入多盜賊兵起太白熒惑入守占同天綱一星在北落西南一曰在危南主武帳宮舍天子遊獵所會客彗入為兵起一云義兵羽林軍四十五星三三而聚散出壘壁之南一曰在營室之南東西布列北第一行主天軍軍騎翼衛之象星衆則國安稀則兵動羽林中無星則兵盡出天下亂月犯之兵起歲星入諸侯悉發兵臣下謀叛必敗伏誅太白入兵起填星入大水五星入為兵熒惑太白經過天子以兵自守熒惑入而芒赤興兵者亡客星入色黃白為喜赤為臣叛流星入南色青后有疾入北諸侯憂入東而赤黑后有謀入西太子憂雲氣蒼白入南后有憂北諸侯憂黑太子諸侯忌之出則禍除黃白吉斧鉞三星在北落師門東芟刈之具也主斬芻以飼牛馬明則牛馬肥腯動搖而暗或不見牛馬死隋志通志皆在八魁西北主行誅拒難斬伐姦謀明大用兵將憂暗則不用移動兵起月入大臣誅歲星犯相誅熒惑犯大臣戮填星入大臣憂太白入將誅客彗犯斧金戊用又占客犯外兵被擒士卒死傷外國降色青憂赤兵黃白吉按步天歌已上諸星皆屬營室雷電土功吏斧鉞晉志皆不載隋志有之壘壁陳北落師門天綱羽林軍晉志在二十八宿外騰蛇屬天市垣武密書以騰蛇屬營室又屬壁宿乾象新書以西十六星屬尾屬危東六星屬室羽林軍西六星屬危東三十九星屬室以天綱屬危斧鉞屬奎通占録又以斧鉞屬壁屬奎説皆不同壁宿二星主文章天下圖書之祕府明大則王者興道術行國多君子星失色大小不同王者好武經術不用圖書廢星動則有土功日食于壁陽消陰壞男女多傷國不用賢日暈名士憂月食其分大臣憂文章士廢民多疫月暈為風水其分有憂月犯之國有憂為飢衛地有兵歲星犯之水傷五穀久守或凌犯勾巳有兵起熒惑犯之衛地憂守之國旱民飢賢不用一占王有大災填星犯守圖書興國王壽天下豐國用賢一占物不成民多病逆行成勾巳者有土功六十日天下立王太白犯之一二寸許則諸侯用命守之文武並用一曰有軍不戰一曰有兵喪一曰水災多風雨一曰犯之多火災辰星犯國有蓋藏保守之事王者刑法急守之近臣憂一曰其分有喪有兵姦臣有謀逆行守之橋梁不通客星犯之文章士死一曰有喪入為土功有水守之歲多風雨舍則牛馬多死彗星犯之為兵為火一曰大水民流孛犯為兵有火水災流星犯文章廢乙巳占曰若色黃白天下文章士用赤雲氣入之為兵黑其下國破黃則外國貢獻一曰天下有烈士立按漢永元銅儀東壁二星九度舊去極八十六度景祐測驗壁二星九度距南星去極八十五度天十星在東壁之北主馬之官若今驛亭也主傳令置驛逐漏馳騖謂其急疾與晷漏競馳也月犯之兵馬歸彗星入馬火客星入馬出行流星入天下有驚霹靂五星在雲雨北一曰在雷電南一曰在土功西主陽氣大盛擊碎萬物與五星合有霹靂之應雲雨四星在雷電東一云在霹靂南主雨澤成萬物星明則多雨水辰星守之有大水一占主陰謀殺事孳生萬物扶鑕五星在天倉西南刈具也主斬芻飼牛馬明則牛馬肥微暗則牛馬飢餓按步天歌壁宿下有鈇鑕五星晉隋志皆不載隋志八魁西北三星曰鈇鑕又曰鈇金戊其占與步天歌室宿內斧金戊略同恐即是此誤重出之霹靂五星雲雨四星晉志無之隋志有之武密書以雲雨屬室宿天十星晉志屬天市垣其説皆不同
