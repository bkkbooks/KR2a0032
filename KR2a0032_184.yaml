body:
  text: 宋史卷一百八十四志第一百三十七食貨下六茶下茶天聖三年八月詔翰林侍講學士孫奭等同究利害奭等言十三場茶積而未售者六百一十三萬餘斤蓋許商人貼射則善者皆入商人其入官者皆粗惡不時故人莫肯售又園戶輸歲課不足者使如商人入息而園戶皆細民貧弱力不能給煩擾益甚又姦人倚貼射為名強市盜販侵奪官利其弊不可不革十月遂罷貼射法官復給本錢市茶商人入錢以售茶者奭等又欲優之請凡入錢京師售海州荊南茶者損為七萬七千售真州等四務十三場茶者又第損之給茶皆直十萬自是河北入中復用三説法舊給東南緡錢者以京師榷貨務錢償之奭等議既用益以李咨等變法為非明年托計置司所上天聖二年比視增虧數差謬詔令嘗典議官張士遜等條析夷簡言天聖初環慶等路數奏芻糧不給京師府藏常闕緡錢吏兵月奉僅能取足自變法以來京師積錢多邊計不聞告乏中間蕃部作亂調發兵馬仰給有司無不足之患以此推之頗有成效三司比視數目差互不同非執政所能親自較計然士遜等猶被罰咨罷三司使初園戶負歲課者如商人入息後不能償至四年太湖等九場凡逋息錢十三萬緡詔悉蠲之然自奭等改制而茶法寖壞景祐中三司吏孫居中等言自天聖三年變法而河北入中虛估之敝復類乾興以前蠹耗縣官請復行見錢法時咨已執政矣三年河北轉運使楊偕亦陳三説法十二害見錢法十二利以謂止用三説所支一分緡錢足以贍一歲邊計遂命咨與參知政事蔡齊等合議且令詔商人訪其利害是歲三月咨等請罷河北入中虛估以實錢償芻粟實錢售茶皆如天聖元年之制又以北商持券至京師舊必得交引鋪為之保任並得三司符驗然後給錢以是京師坐賈率多邀求三司吏稽留為姦乃悉罷之命商持券徑趣榷貨務驗實立償之錢初奭等雖增商人入錢之數而猶以為利薄故競市虛估之券以射厚利而入錢者寡縣官日以侵削京師少蓄藏至是咨等請視天聖三年入錢數第損一千有奇入中增直亦視天聖元年數第加三百詔皆可之前已用虛估給券者給茶如舊仍給景祐二年已前茶既而咨等又言天聖四年嘗許陝西入中願得茶者每錢十萬所在給券徑趣東南受茶十一萬一千茶商獲利爭欲售陝西券故不復入錢京師請禁止之並言商人所不便者其事甚悉請為更約束重私販之禁聽商人輸錢五分餘為置籍召保期半年悉償失期者倍其數事皆施行咨等復言自奭等變法歲損財利不可勝計且以天聖九年至景祐二年較之五年之間河北入中虛費緡錢五百六十八萬今一旦復用舊法恐豪商不便依託權貴以動朝廷請先期申諭於是帝為下詔戒敕而縣官濫費自此少矣久之上書者復言自變法以來歲輦京師金帛易芻粟於河北配擾居民內虛府庫外困商旅非便寶元元年命御史中丞張觀等與三司議之觀等復請入錢京師以售真州等四務十三場茶直十萬者又視景祐三年數損之為錢六萬七千入中河北願售茶者又損一千既而詔又第損二千於是入錢京師止為錢六萬五千入中河北為錢六萬四千而已康定元年葉清臣為三司使是歲河北穀賤因請內地諸州行三説法募人入中且以東南鹽代京師實錢詔糴止二十萬石慶曆二年又請募人入芻粟如康定元年法數足而止自是三説稍復用矣八年三司鹽鐵判官董沔亦請復三説法三司以為然因言自見錢法行京師錢入少出多慶曆七年榷貨務緡錢入百十九萬出二百七十六萬以此較之恐無以贍給請如沔議以茶鹽香藥緡錢四物豫之於是有四説之法初詔止行於並邊諸州而內地諸州有司蓋未嘗請即以康定元年詔書從事自是三説四説二法並行於河北不數年間茶法復壞芻粟之直大約虛估居十之八米斗七百甚者千錢券至京師為南商所抑茶每直十萬止售錢三千富人乘時收蓄轉取厚利三司患之請行貼買之法每券直十萬比市估三千倍為六千復入錢四萬四千貼為五萬給茶直十萬詔又損錢一萬然亦不足以平其直久之券比售錢三千者才得二千往往不售北商無利入中者寡公私大弊皇祐二年知定州韓琦及河北轉運司皆以為言下三司議三司奏自改法至今凡得穀二百二十八萬餘石芻五十六萬餘圍而費緡錢一百九十五萬有奇茶鹽香藥又為緡錢一千二百九十五萬有奇茶鹽香藥民用有限榷貨務歲課不過五百萬緡今散於民間者既多所在積而不售故券直亦從而賤茶直十萬舊售錢六萬五千今止二千以至香一斤舊售錢三千八百今止五六百公私兩失其利請復行見錢法一用景祐三年約束乃下詔曰比食貨法壞芻粟價益倍縣官之費日長商賈不行豪富之家乘時牟利吏緣為姦自今有議者須究厥理審可施用若事已上而驗問無狀者置之重罰是時雖改見錢法而京師積錢少恐不足以支入中之費帝又出內藏庫錢帛百萬以賜三司久之入中者寖多京師帑藏益乏商人持券以俟動彌歲月至損其直以售於蓄賈之家言利者請出內藏庫錢稍增價售之歲可得遺利五十萬緡既行而諫官范鎮謂內藏庫榷貨務皆領縣官豈有榷貨務故稽商人而令內藏乘時射利傷體壞法莫斯為甚詔即罷之然自此並邊虛估之弊復起至和三年河北提舉糴便糧草薛向建議並邊十七州軍歲計粟百八十萬石為錢百六十萬緡豆六十五萬石芻三百七十萬圍並邊租賦歲可得粟豆芻五十萬其餘皆商人入中請罷並邊入粟自京輦錢帛至河北專以見錢和糴時楊察為三司使請用其説因輦絹四十萬匹當緡錢七十萬又蓄見錢及擇上等茶場八總為緡錢百五十萬儲之京師而募商人入錢並邊計其道里遠近優增其直以是償之且省輦運之費唯入中芻豆計直償以茶如舊行未數年論者謂輦運科折煩擾居民且商人入錢者少芻豆虛估益高茶益賤詔翰林學士韓絳等即三司經度絳等言自改法以來邊儲有備商旅頗通未宜輕變唯輦運之費悉從官給而本路舊輸稅絹者毋得折為見錢入中芻豆罷勿給茶所在平其市估至京償以銀紬絹自是茶法不復為邊糴所須而通商之議起矣初官既榷茶民私蓄盜販皆有禁臘茶之禁又嚴於他茶犯者其罪尤重凡告捕私茶皆有賞然約束愈密而冒禁愈繁歲報刑辟不可勝數園戶困於征取官司並緣侵擾因陷罪戾至破産逃匿者歲比有之又茶法屢變歲課日削至和中歲市茶淮南才四百二十二萬餘斤江南三百七十五萬餘斤兩浙二十三萬餘斤荊湖二百六萬餘斤唯福建天聖末增至五十萬斤詔特損五萬至是增至七十九萬餘斤歲售錢并本息計之才百六十七萬二千餘緡官茶所在陳積縣官獲利無幾論者皆謂宜弛禁便先是天聖中有上書者言茶鹽課虧帝謂執政曰茶鹽民所食而強設法以禁之致犯者衆顧經費尚廣未能弛禁爾景祐中葉清臣上疏曰山澤有産天資惠民兵食不充財臣兼利草芽木葉私不得專封園置吏隨處立管一切官禁人犯則刑既奪其資又加之罪黥流日報踰冒不悛誠有厚利重資能濟國用聖仁恤隱矜赦非辜猶將弛禁緩刑為民除害度支費用甚大榷易所收甚薄刳剝園戶資奉商人使朝廷有聚斂之名官曹滋虐濫之罰虛張名數刻蠹黎元建國以來法敝輒改載詳改法之由非有為國之實皆商吏協計倒持利權幸在更張倍求奇羡富人豪族坐以賈贏薄販下估日皆朘削官私之際俱非遠策臣竊嘗校計茶利所入以景祐元年為率除本錢外實收息錢五十九萬餘緡又天下所售食茶并本息歲課亦祇及三十四萬緡而茶商見通行六十五州軍所收稅錢已及五十七萬緡若令天下通商祇收稅錢自及數倍即榷務山場及食茶之利盡可籠取又況不費度支之本不置榷易之官不興輦運之勞不濫徒黥之辟臣意生民之弊有時而窮盛德之事俟聖不惑議者謂榷賣有定率征稅無彝準通商之後必虧歲計臣按管氏鹽鐵法計口受賦茶為人用與鹽鐵均必令天下通行以口定賦民獲善利又去嚴刑口數出錢人不厭取景祐元年天下戶千二十九萬六千五百六十五丁二千六百二十萬五千四百四十一三分其一為産茶州軍內外郭鄉又居五分之一丁賦錢三十村鄉丁賦二十不産茶州軍郭鄉村鄉如前計之又第損十錢歲計已及緡錢四十萬榷茶之利凡止九十餘萬緡通商收稅且以三倍舊稅為率可得一百七十餘萬緡更加口賦之入乃有二百一十餘萬緡或更於收稅則例微加增益即所增至寡所聚逾厚比於官自榷易驅民就刑利病相須炳然可察時下三司議皆以為不可行至嘉祐中著作佐郎何鬲三班奉職王嘉麟又皆上書請罷給茶本錢縱園戶貿易而官收租錢與所在征算歸榷貨務以償邊糴之費可以疏利源而寬民力嘉麟為登平致頌書十卷隆衍視成策二卷上之淮南轉運副使沈立亦集茶法利害為十卷陳通商之利時富弼韓琦曾公亮執政決意嚮之力言於帝三年九年命韓絳陳升之呂景初即三司置局議之十月三司言茶課緡錢歲當入二百二十四萬八千嘉祐二年才及一百二十八萬又募人入錢皆有虛數實為八十六萬而三十九萬有奇是為本錢才得子錢四十六萬九千而輦運麋耗喪失與官吏兵夫廩給雜費又不預焉至於園戶輸納侵擾日甚小民趨利犯法刑辟益繁獲利至少為弊甚大宜約至和以後一歲之數以所得息錢均賦茶民恣其買賣所在收算請遣官詢察利害以聞詔遣官分行六路還言如三司使議便四年二月詔曰古者山澤之利與民共之故民足於下而君裕於上國家無事刑罰以清自唐建中時始有茶禁上下規利垂二百年如聞比來為患益甚民被誅求之困日惟咨嗟官受濫惡之入歲以陳積私藏盜販犯者實繁嚴刑重誅情所不忍是於江湖之間幅員數千里為陷穽以害吾民也朕心惻然念此久矣間遣使者往就問之而皆歡然願弛其禁歲入之課以時上官一二近臣條析其狀朕猶若慊然又於歲輸裁減其數使得饒阜以相為生俾通商利歷世之敝一旦以除著為經常弗復更制損上益下以休吾民尚慮喜於立異之人緣而為姦之黨妄陳奏議以惑官司必置明刑無或有貸初所遣官既議弛禁因以三司歲課均賦茶戶凡為緡錢六十八萬有奇使歲輸縣官比輸茶時其出幾倍朝廷難之為損其半歲輸緡錢三十三萬八千有奇謂之租錢與諸路本錢悉儲以待邊糴自是唯臘茶禁如舊餘茶肆行天下矣論者猶謂朝廷志於恤人欲省刑罰其意良善然茶戶困於輸錢而商賈利薄販鬻者少州縣征稅日蹙經費不充學士劉敞歐陽修頗論其事敞疏大要以謂先時百姓之摘山者受錢於官而今也顧使之納錢於官受納之間利害百倍先時百姓冒法販茶者被罰耳今悉均賦於民賦不時入刑亦及之是良民代冒法者受罪先時大商富賈為國懋遷而州郡收其稅今大商富賈不行則稅額不登且乏國用修言新法之行一利而有五害大略與敞意同時朝廷方排衆論而行之敞等雖言不聽也治平中歲入臘茶四十八萬九千餘斤散茶二十五萬五千餘斤茶戶租錢三十二萬九千八百五十五緡又儲本錢四十七萬四千三百二十一緡而內外總入茶稅錢四十九萬八千六百緡推是可見茶法得失矣自天聖以來茶法屢易嘉祐始行通商雖議者或以為不便而更法之意則主於優民熙寧四年神宗與大臣論昔茶法之弊文彥博吳充王安石各論其故然於茶法未有所變及王韶建開湟之策委以經略七年始遣三司幹當公事李杞入蜀經畫買茶於秦鳳熙河博馬而韶言西人頗以善馬至邊所嗜唯茶乏茶與市即詔趣嵵據見茶計水陸運致又以銀十萬兩帛二萬五千度僧牒五百付之假常平及坊場餘錢以著作佐郎蒲宗閔同領其事初蜀之茶園皆民兩稅地不殖五穀唯宜種茶賦稅一例折輸蓋為錢三百折輸紬絹皆一匹若為錢十則折輸綿一兩為錢二則折輸草一圍役錢亦視其賦民賣茶資衣食與農夫業田無異而稅額總三十萬嵵被命經度又詔得調舉官屬乃即蜀諸州創設官場歲增息為四十萬而重禁榷之令其輸受之際往往壓其斤重侵其價直法既加急矣八年嵵以疾去先是嵵等歲增十萬之息既而運茶積滯歲課不給即建畫於彭漢二州歲買布各十萬匹以折腳費實以布息助茶利然茶亦未免積滯都官郎中劉佐復議歲易解鹽十萬席雇運回車船載入蜀而禁商販蓋恐布亦難敷也詔既以佐代嵵未幾鹽法復難行遂罷佐而宗閔乃議川陝路民茶息收十之三盡賣於官場更嚴私交易之令稍重至徒刑仍沒緣身所有物以待賞給於是蜀茶盡榷民始病焉十年知彭州呂陶言川峽四路所出茶比東南十不及一諸路既許通商兩川却為禁地虧損治體如解州有鹽池民間煎者乃是私鹽晉州有礬山民間煉者乃是私礬今川蜀茶園皆百姓己物與解鹽晉礬不同又市易司籠制百貨歲出息錢不過十之二然必以一年為率今茶場司務重立法盡榷民茶隨買隨賣取息十之三或今日買十千之茶明日即作十三千賣之變轉不休比至歲終豈止三分因奏劉佐李嵵蒲宗閔等苟希進用必欲出息三分致茶戶被害始詔息止收十之一佐坐措置乖方罷以國子博士李稷代之而陶亦得罪稷依李嵵例兼三司判官仍委權不限員舉劾侍御史周尹論蜀中榷茶為民害罷為提點湖北刑獄利州路漕臣張宗諤張升卿議廢茶場司依舊通商詔付稷稷方以茶利要功言宗諤等所陳皆疏謬罪當無赦雖會赦猶皆坐貶秩二等於是稷建議賣茶官非材許對易如闕員於前資待闕官差茶場司事州郡毋得越職聽治又以茶價增減或不一裁立中價定歲入課額及設酬賞以待官吏而三路三十六場大小使臣並不限員重園戶採造黃老秋葉茶之禁犯者沒官蒲宗閔亦援稷比許舉劾官吏以重其權二人皆務浚利刻急茶場監官買茶精良及滿五千馱以及萬馱第賞有差而所買粗惡偽濫者計虧坐贓論凡茶場州軍知州通判並兼提舉經略使所在即委通判又禁南茶入熙河秦鳳涇原路如私販臘茶法自熙寧十年冬推行茶法至元豐元年秋凡一年通課利及舊界息稅七十六萬七千六十餘緡帝謂稷能推原法意日就事功宜速遷擢以勸在位遂落權發遣以為都大提舉茶場而用永興軍等路提舉常平范純粹同提舉久之用稷言徙司秦州而録李嵵前勞以子王玉試將作監主簿蒲宗閔更請巴州等處産茶並用榷法五年李稷死永樂城詔以陸師閔代之師閔言稷治茶五年百費外獲淨息四百二十八萬餘緡詔賜田十頃而師閔榷利尤刻於前建言文階州接連而茶法不同階為禁地有博馬賣茶場文獨為通商地乞文龍二州並禁榷仍許川路餘羡茶貨入陝西變賣於成都府置博賣都茶場事皆施行初羣牧判官郭茂恂言賣茶買馬事實相須詔茂恂同提舉茶場至是師閔以買馬司兼領茶場茶法不能自立詔罷買馬司兼領令茶場都大提舉視轉運使同管幹視轉運判官以重其任賈種民更立茶法師閔論奏茶場與他場務不同詔並用舊條初李嵵增諸州茶場自熙寧七年至元豐八年蜀道茶場四十一京西路金州為場六陝西賣茶為場三百三十二稅息至稷加為五十萬及師閔為百萬元祐元年侍御史劉摯奏疏曰蜀茶之出不過數十州人賴以為生茶司盡榷而市之園戶有茶一本而官市之額至數十斤官所給錢靡耗於公者名色不一給借保任輸入視驗皆牙儈主之故費於牙儈者又不知幾何是官於園戶名為平市而實奪之園戶有逃而免者有投死以免者而其害猶及鄰伍欲伐茶則有禁欲增植則加市故其俗論謂地非生茶也實生禍也願選使者考茶法之敝以蘇蜀民右司諫蘇轍繼言呂陶嘗奏改茶法止行長引令民自販每緡長引錢百詔從其請民方有息肩之望孫迥李稷入蜀商度盡力掊取息錢長引並行民間始不易矣且盜賊贓及二貫止徒一年出賞五千今民有以錢八百私買茶四十斤者輒徒一年賞三十千立法苟以自便不顧輕重之宜蓋造立茶法皆傾險小人不識事體且備陳五害呂陶亦條上利害詔付黃廉體量未至摯又言陸師閔恣為不法不宜仍任事詔即罷之先是師閔提舉榷茶所行職務他司皆不得預聞事權震灼為患深密及黃廉就領茶事乃請凡緣茶事有侵損戾法或措置未當及有訴訟依元豐令聽他司關送十一月蒲宗閔亦以附會李稷賣茶罷明年熙河秦鳳涇原三路茶仍官為計置永興鄜延環慶許通商凡以茶易穀者聽仍舊毋得踰轉運司和糴價其所博斛斗勿取息七年詔成都等路茶事司以三百萬緡為額本紹聖元年復以陸師閔都大提舉成都等路茶事而陝西復行禁榷師閔乃奏龍州仍為禁茶地凡茶法並用元豐舊條師閔自復用以訖哲宗之世其掊克之迹不若前日之著故建明亦罕見焉茶之在諸路者神宗哲宗朝無大更革熙寧八年嘗詔都提舉市易司歲買商茶以三百萬斤為額元祐五年立六路茶稅租錢諸州通判轉運司月暨歲終比較都數之法七年以茶隸提刑司稅務毋得更易為雜稅收受紹聖四年戶部言商旅茶稅五分治平條立輸送之限既寬復慮課入無準故定以限約毋得更展元祐中輒展以季課入漏失且茶稅歲計七十萬緡積十年未嘗檢察請內外委官期一年驅算以聞詔聽其議展限令出一時毋承用崇寧元年右僕射蔡京言祖宗立禁榷法歲收淨利凡三百二十餘萬貫而諸州商稅七十五萬貫有奇食茶之算不在焉其盛時幾五百餘萬緡慶曆之後法制寖壞私販公行遂罷禁榷行通商之法自後商旅所至與官為市四十餘年利源寖失謂宜荊湖江淮兩浙褔建七路所産茶仍舊禁榷官買勿復科民即産茶州郡隨所置場申商人園戶私易之禁凡置場地園戶租折稅仍舊産茶州軍許其民赴場輸息量限斤數給短引於旁近郡縣便鬻餘悉聽商人於榷貨務入納金銀緡錢或並邊糧草即本務給鈔取便算請於場別給長引從所指州軍鬻之商稅自場給長引沿道登時批發至所指地然後計稅盡輸則在道無苟留買茶本錢以度牒末鹽鈔諸色封樁坊場常平剩錢通三百萬緡為率給諸路諸路措置各分命官詔悉聽焉俄定諸路措置茶事官置司湖南於潭州湖北於荊南淮南於揚州兩浙於蘇州江東於江寧府江西於洪州其置場所在蘄州即其州及蘄水縣壽州以霍山開順光州以光山固始舒州即其州及羅源太湖黃州以麻城廬州以舒城常州以宜興湖州即其州及長興德清安吉武康睦州即其州及青溪分水桐廬遂安婺州即其州及東陽永康浦江處州即其州及遂昌青田蘇杭越各即其州而越之上虞餘姚諸暨新昌剡縣皆置焉衢台各即其州而溫州以平陽大法既定其制置節目不可毛舉四年京復議更革遂罷官置場商旅並即所在州縣或京師給長短引自買於園戶茶貯以籠篰官為抽盤循第輸息訖批引販賣茶事益加密矣大觀元年議提舉茶事司須保驗一路所産茶色高下價直低昂而請茶短引以地遠近程以三等之期復慮商旅影挾舊引冒詐規利官吏因得擾動以御筆申飭之又以諸路再定茶息多寡或不等令斤各增錢十三年計七路一歲之息一百二十五萬一千九百餘緡榷貨務再歲一百十有八萬五千餘緡京專用是以舞智固權自是歲以百萬緡輸京師所供私奉掊息益厚盜販公行民滋病矣政和二年大增損茶法凡請長引再行者輸錢百緡即往陝西加二十茶以百二十斤短引輸緡錢二十茶以二十五斤私造引者如川錢引法歲春茶出集民戶約三歲實直及今價上戶部茶籠篰並皆官製聽客買定大小式嚴封印之法長短引輒竄改增減及新舊對帶繳納申展住賣轉鬻科條悉具初客販茶用舊引者未嚴斤重之限影帶者衆於是又詔凡販長引斤重及三千斤者須更買新引對賣不及三千斤者即用新引以一斤帶二斤鬻之而合同場之法出矣場置於産茶州軍而簿給於都茶場凡不限斤重茶委官司稱製毋得止憑批引為定有贏數即沒官別定新引限程及重商旅規避稱製之禁凡十八條若避匿抄劄及擅賣皆坐以徒復慮茶法猶輕課入不羡定園戶私賣及有引而所賣踰數保內有犯不告並如煎鹽亭戶法短引及食茶關子輒出本路坐以二千里流賞錢百萬重和元年詔客販輸稅檢括抵保吏因擾民其蠲之未幾復輸稅如舊大抵茶鹽之法主於蔡京務巧掊利變改法度前後相踰民聽眩惑初令茶戶投狀籍於官非在籍者禁與商旅貿易未幾即罷初限計斤重令買新引茶有贏者即及一千五百斤須用新引貼販或止願販新茶帶賣者聽未幾以帶賣者多又罷其令陝西舊通蜀茶崇寧二年始通東南茶政和中陝西沒官茶令估賣繼以妨商旅下令焚棄俄令正茶沒官者聽興販引外剩茶及私茶數以給告者長引限以一年短引限以半歲繳納久之令已買引而未得於園戶者期七年許民間同見緡流轉長引聽即本路住賣以二浙鹽香司有言而止其科條纖悉紛更不可勝記慮商旅疑豫茶貨不通乃重扇搖之令於時掊克之吏爭以贏羡為功朝廷亦嚴立比較之法州郡樂賞畏刑惟恐負課優假商人陵轢州郡蓋莫有言者獨邠州通判張益謙奏陝西非産茶地奉行十年未經立額歲歲比較第務增益稍或虧少程督如星州縣懼殿多前路招誘豪商增價以幸其來故陝西茶價斤有至五六緡者或稍裁之則批改文引轉之他郡及配之鋪戶安能盡售均及稅農民實受害徒令豪商坐享大利言竟不行然自茶法更張至政和六年收息一千萬緡茶增一千二百八十一萬五千六百餘斤及方臘竊發乃詔權罷比較臘誅有司議招集園戶借貸優恤止於文具姦臣仍用事蠹國害民又慮人言扇搖之令復出矣靖康元年詔川茶侵客茶地者以多寡差定其罪初熙寧五年以褔建茶陳積乃詔褔建茶在京京東西淮南陝西河東仍禁榷餘路通商元豐七年王子京為褔建轉運副使言建州臘茶舊立榷法自熙寧權聽通商自此茶戶售客人茶甚良官中所得惟常茶稅錢極微南方遺利無過於此乞仍舊行榷法建州歲出茶不下三百萬斤南劍州亦不下二十餘萬斤欲盡買入官度逐州軍民戶多少及約鄰路民用之數計置即官場賣嚴立告賞禁建州賣私末茶借豐國監錢十萬緡為本並從之所請均入諸路榷賣委轉運司官提舉褔建王子京兩浙許懋江東杜偉江西朱彥博廣東高鎛然子京蓋未免抑配於民時遠方若桂州修仁諸縣夔州路達州有司皆議榷茶言利者踵相躡然神宗聞鄂州失催茶稅輒蠲之建州園戶等以茶粗濫當剝納為錢三萬六千餘緡慮其不能償令準輸茶初成都帥司蔡延慶言邛部川蠻主苴克寸等願賣馬即詔延慶以茶招來後聞邊計蠻情非便即罷之哲宗嗣位御史安惇首劾王子京買臘茶抑民詔罷子京事任令褔建禁榷州軍視其舊餘並通商桂州修仁等縣禁榷及陝西碎賣芽茶皆罷崇寧二年尚書省言建劍二州茶額七十餘萬斤近歲增盛而本錢多不繼詔更給度牒四百仍給以諸色封樁繼詔商旅販臘茶蠲其稅私販者治元售之家如元豐之制臘茶舊法免稅大觀三年措置茶事始收焉四年私販勿治元售之家如元符令政和初復增損為新法三年詔免輸短引許依長引於諸路住賣後末骨茶每長引增五百斤短引倣此諸路監司州郡公使食茶禁私買聽依商旅買引六年詔褔建茶園如鹽田量土地産茶多寡依等第均稅重和元年以改給免稅新引重定褔建骨茶斤重長引以六百斤為率元豐中宋用臣都提舉汴河隄岸創奏修置水磨凡在京茶戶擅磨末茶者有禁並許赴官請買而茶鋪入米豆雜物揉和者募人告一兩賞三千及一斤十千至五十千止商賈販茶應往府界及在京須令産茶山場州軍給引並赴京場中賣犯者依私販臘茶法諸路末茶入府界者復嚴為之禁訖元豐末歲獲息不過二十萬商旅病焉元祐初寬茶法議者欲罷水磨戶部侍郎李定以失歲課持不可廢侍御史劉摯右司諫蘇轍等相繼論奏遂罷紹聖初章惇等用事首議修復水磨乃詔即京索天源等河為之以孫迥提舉復命兼提舉汴河隄岸四年場官錢景逢獲息十六萬餘緡呂安中二十一萬餘緡以差議賞元符元年戶部上凡獲私末茶並雜和者即犯者未獲估價給賞並如私臘茶獲犯人法雜和茶宜棄者斤特給二十錢至十緡止初元豐中修置水磨止於在京及開封府界諸縣未始行於外路及紹聖復置其後遂於京西鄭滑潁昌府河北澶州皆行之又將即濟州山口營置崇寧二年提舉京城茶場所奏紹聖初興復水磨歲收二十六萬餘緡四年於長葛等處京索潩水河增修磨二百六十餘所自輔郡榷法罷遂失其利請復舉行從之尋詔商販臘茶入京城者本場盡買之其翻引出外者收堆𣛀錢裁元豐制更立新額歲買山場草茶以五百萬斤為率客茶至京者許官場買十之三即索價故高驗元引買價量增三年詔罷之明年改令磨戶承歲課視酒戶納麴錢法五年復罷民戶磨茶官用水磨仍依元豐法應緣茶事併隸都提舉汴河堤岸司大觀元年改以提舉茶事司為名尋命茶場茶事通為一司三年復撥隸京城所一用舊法政和元年京城所請商旅販茶起引定入京住賣者即許借江入汴如元豐舊制其借江入汴却指他路住賣者禁已請引者並令赴京二年以課入不登商賈留滯詔以其事歸尚書省於是尚書省言水磨茶自元豐創立止行於近畿昨乃分配諸路以故致弊欲止行於京城仍通行客販餘路水磨並罷從之四年收息四百萬貫有奇比舊三倍遂創月進高宗建炎初於真州印鈔給賣東南茶鹽當是時茶之産於東南者浙東西江東西湖南北褔建淮南廣東西路十州六十有六縣二百四十有二霅川顧渚生石上者謂之紫筍毗陵之陽羡紹興之日鑄婺源之謝源隆興之黃龍雙井皆絶品也建炎三年置行在都茶場罷合同場十有八惟洪江興國潭建各置場一監官一罷食茶小引捕私茶法視捕私鹽二十一年秦檜等始進茶鹽法先是臣僚或因事建明朝廷亦因時損益至是審訂成書上之孝宗隆興二年淮東宣諭錢端禮言商販長引茶水路不許過高郵陸路不許過天長如願往楚州及盱眙界引貼輸翻引錢十貫五百文如又過淮北貼輸亦如之當是時商販自榷場轉入虜中其利至博幾禁雖嚴而民之犯法者自若也乾道二年戶部言商販至淮北榷場折博除輸翻引錢更輸通貨儈息錢十一緡五百文八年減輸翻引錢止七緡通貨儈息錢止八緡淳熙二年以長短茶引權以半依元引斤重錢數分作四緡小引印給而翻引貼輸錢隨小引輸送光宗紹熙初漳州守臣朱熹奏除屬邑科茶七千餘緡臣僚申明長短小引相兼從人之便戶部言給賣小引除金銀會子分數入輸餘願專以會子算請者聽寧宗嘉泰四年知隆興府韓邈奏請隆興府惟分寧縣産茶他縣無茶而豪民武斷者乃請引窮索一鄉使認茶租非便於是禁非産茶縣不許民擅認茶租建寧臘茶北苑為第一其最佳者曰社前次曰火前又曰雨前所以供玉食備賜豫太平興國始置大觀以後製愈精數愈多胯式屢變而品不一歲貢片茶二十一萬六千斤建炎以來葉濃楊勍等相因為亂園丁亡散遂罷之紹興二年蠲未起大龍鳳茶一千七百二十八斤五年復減大龍鳳及京鋌之半十二年興榷場遂取臘茶為榷場本凡胯截片鋌不以高下多少官盡榷之申嚴私販入海之禁議者請鬻建茶於臨安移茶事司於建州買發明年以失陷引錢復令通商自是上供龍鳳京鋌茶料凡製作之費篚笥之式令漕司專之蜀茶之細者其品視南方已下惟廣漢之趙坡合州之水南峨眉之白牙雅安之蒙頂土人亦珍之但所産甚微非江建比也舊無榷禁熙寧間始置提舉司收歲課三十萬至元豐中纍增至百萬建炎元年成都轉運判官趙開言榷茶買馬五害請用嘉祐故事盡罷榷茶而令漕司買馬或未能然亦當減額以蘇園戶輕價以惠行商如此則私販衰而盜賊息遂以開同主管川秦茶馬二年開至成都大更茶法倣蔡京都茶場法以引給茶商即園戶市茶百斤為一大引除其十勿算置合同場以譏其出入重私商之禁為茶市以通交易每斤引錢春七十夏五十市利頭子錢不預焉所過征一錢所止一錢五分自後引息錢至一百五萬緡至十七年都大茶馬韓球盡取園戶加饒之茶為額茶司歲收二百萬而買馬之數不加多乾道末年青羌作亂茶司增長細馬名色等錢歲三十萬淳熙六年以後纍減園戶重額錢十六萬又減引息錢十六萬至紹熙初楊輔為使遂定為法成都府利州路二十三場歲産茶二千一百二萬斤通博馬物帛歲收錢二百四十九萬三千餘緡朝廷歲以一百一十三萬緡隸總領所贍軍然茶馬司率多難之乾道以後歲撥止一二十萬緡至淳熙十年遂以五十萬緡為準自熙豐以來茶司官權出諸司之上初元豐開川秦茶場園戶既輸二稅又輸土産隆安縣園戶二稅土産兼輸外又催理茶課估錢建炎元年立為額至寧宗慶元初始除之六年詔四川産茶處歲輸經總制頭子錢五千四十一道有奇又科租錢三千一百四十道有奇宋初經理蜀茶置互市于原渭德順三郡以市蕃夷之馬熙寧間又置場于熙河南渡以來文黎珍南平長寧階和凡八場其間盧甘蕃馬歲一至焉洮州蕃馬或一月或兩月一至焉疊州蕃馬或半年或三月一至焉皆良馬也其他諸蕃馬多駑大率皆以互市為利宋朝曲示懷遠之恩亦以是羈縻之紹興二十四年復黎州及雅州碉門靈西寨易馬場乾道初川秦八場馬額九千餘匹淳熙以來為額萬二千九百九十四匹自後所市未嘗及焉
