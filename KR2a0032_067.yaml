body:
  text: 宋史卷六十七志第二十五行五土稼穡作甘土之性也土失其性則為災凶舊説以恆風脂夜之妖華孽裸蟲之孽牛禍黃眚黃祥皆屬之土今從之建隆元年河南諸州乏食乾德元年齊隰等州飢二年州府二十二飢開寶四年府州六水一旱諸州民乏食五年大飢六年水民飢九年州府十二飢太平興國四年太平州飢淳化元年開封河南等九州飢五年京東西淮南陝西水潦民飢咸平五年河北及鄭曹滑飢景德元年江南東西路飢二年淮南兩浙荊湖北路飢三年京東西河北陝西飢大中祥符三年陝西飢四年河北陝西劍南飢五年河北淮南飢七年淮南江浙飢八年陝西州府五飢天禧元年飢三年江浙及利州路飢天聖三年晉絳陝解飢明道元年京東淮南江東飢二年淮南江東西川飢寶元二年益梓利夔路飢嘉祐三年夔州路旱飢熙寧三年河北陝西旱四年河北旱飢六年淮南江東劍南西川潤州飢七年京畿河北京東西淮西成都利州延常潤府州威勝保安軍飢八年兩河陝西江南淮浙飢九年雄州飢十年漳泉州興化軍飢元豐元年河北飢四年鳳翔府鳳階州飢七年河東飢元符二年飢崇寧元年江浙熙河飢大觀三年秦鳳階成飢重和元年京西飢五年河北京東淮南飢建炎元年汴京大飢米升錢三百一鼠直數百錢人食水藻椿槐葉道殣骼無餘胔三年山東郡國大飢人相食時金人陷京東諸郡民聚為盜至車載乾尸為糧紹興元年行在越州及東南諸路郡國飢淮南京東西民流常州平江府者多殍死二年春兩浙福建飢米斗千錢時餫餉繁急民益食三年吉郴道州桂陽監飢五年湖南大飢殍死流亡者衆夏潼川路飢米斗二千人食糟粳興元飢民流于果閬秋溫處州飢六年春浙東福建飢湖南江西大飢殍死甚衆民多流徙郡邑盜起夏蜀亦大飢米斗二千利路倍之道殣枕藉是歲果州守臣宇文彬獻禾粟九穗圖吏部侍郎晏敦復言果遂飢民未蘇不宜導諛坐黜爵七年夏欽廉雍州飢九年江東西浙東飢米斗千錢饒信州尤甚十年浙東江南荐飢人食草木十一年京西淮南飢十八年冬浙東江淮郡國多飢紹興尤甚民之仰哺于官者二十八萬六千人不給乃食糟粳草木殍死殆半十九年春夏紹興府大飢明婺州亦如之二十四年衢州飢二十八年平江府飢二十九年紹興府荐飢隆興元年紹興府大飢四川尤甚平江襄陽府隨泗州棗陽盱眙軍大飢隨棗間米斗六七千二年平江府常秀州飢華亭縣人食粃粳行都及鎮江府興化軍台徽州亦艱食淮民流徙江南者數十萬乾道元年春行都平江鎮江紹興府湖常秀州大飢殍徙者不可勝計是歲台明州江東諸郡皆飢夏亡麥二年夏亡麥三年九月不雨麥種不入四年春蜀邛綿劍漢州石泉軍大飢邛為甚盜延八郡漢飢民至九萬餘五年夏饒信州荐飢民多流徙徽州大飢人食蕨葛台楚州盱眙軍亦飢秋冬不雨淮郡麥種不入六年冬寧國府廣德軍太平湖秀池徽和州皆飢七年秋江東西湖南十餘郡飢江筠州隆興府為甚人食草實流徙淮甸詔出內帑收育棄孩淮郡亦荐飢金人運麥於淮北岸易南岸銅鏹斗錢八千江西飢民流光濠安豐間皆效淮人私糴錢為之耗荊南亦飢八年江西亡麥隆興府荐飢南昌新建縣飢民仰給者二萬八千餘九年春成都永康邛三州飢秋台州飢溫婺州亦飢淳熙元年浙東湖南廣西江西蜀關外皆飢台處郴桂昭賀尤甚二年淮東西江東飢滁真揚州盱眙軍建康府為甚是歲鎮江寧國府常州廣德軍亦艱食詔奬建康留守劉珙振濟有方三年淮甸飢夏台州亡麥冬復施隨郢州荊門軍襄陽江陵德安府大飢四年春尤飢六年冬和州飢泰通楚州高郵軍大飢人食草木七年鎮江府台州無為廣德軍民大飢是歲江浙荊湘淮郡皆飢八年春江州飢人采葛而食詔罷守臣章騂冬行都寧國建康府嚴婺太平州廣德軍飢徽饒州大飢流淮郡者萬餘人浙東常平使者朱熹進對論荒政請蠲田賦身丁錢詔江浙淮湖北三十八郡並免之九年春大亡麥行都飢於潛昌化縣人食草木紹興府衢婺嚴明台湖州飢徽州大飢穜稑亦絶湖北七郡荐飢蜀潼利夔三路郡國十八皆飢流徙者數千人十年合昌州荐飢民就振相蹂死者三十餘人十一年泉汀漳州興化軍亡禾雍賓象州飢十二年福建飢亡麥江西廣東西飢金州飢有流徙者十四年金洋階成鳳西和州人乏食七月秀州飢有流徙者臨安府九縣飢十六年夏成州亡麥冬階成鳳西和州荐飢紹熙二年蘄州飢夔路五郡飢渝涪為甚階成鳳西和州亡麥三年資榮州麥普簡隆州富順監皆大飢亡麥殍死者衆民流成都府至千餘人威遠縣棄兒且六百人揚州亦飢四年簡資普州飢綿州亡麥夏紹興府亡麥安豐軍大亡麥五年冬亡麥苗行都淮浙西東江東郡國皆飢常明州寧國鎮江府廬滁和州為甚人食草木慶元元年春常州飢民之死徙者衆楚州飢人食糟粕淮浙民流行都三年浙東郡國亡麥台州大亡麥民飢多殍襄蜀亦飢四年秋浙東西荐飢多道殣六年冬常州大飢仰哺者六十萬人潤揚楚通泰州建康府江陰軍亦乏食嘉泰元年浙西郡國荐飢常州鎮江嘉興府為甚二年四川飢廣安懷安軍潼川府大亡麥衡郴州武岡桂陽軍乏食三年春邵永州大飢死徙者衆民多剽盜夏行都艱食四年春撫袁州隆興府臨江軍大飢殍死者不可勝瘞有舉家二十七人同赴水死者開禧二年紹興府衢婺州亡麥湖北京西淮東西郡國飢民聚為剽盜南康軍忠涪州皆飢嘉定元年淮民大飢食草木流于江浙者百萬人先是淮郡罹兵農久失業米斗二千殍死者十三四炮人肉馬矢食之詔所至郡國振恤歸業時邦儲既匱郡計不支去者多死亦有俘掠而北者是歲行都亦飢米斗千錢二年春兩淮荊襄建康府大飢米斗錢數千人食草木淮民刲道殣食盡發瘞胔繼之人相扼噬流於揚州者數千家度江者聚建康殍死日八九十人是秋諸路復大歉常潤尤甚冬行都大飢殍者橫市道多棄兒三年春建康府大飢人相食五月衢州飢頗聚為剽盜七年台州大亡麥八年淮浙江東西飢都昌縣為盜者三十六黨九年行都飢閭巷有殍十年台衢婺饒信州飢剽盜起台為甚蜀石泉軍飢殍死殆萬人十一年秋淮浙江東飢饉亡麥苗十二年春潼川府飢而不害十三年春福州飢人食草根十六年春海州新附山東民飢京東河北路新附山西民亦飢湖南永道州大飢是歲行都江淮閩浙郡國皆亡麥禾十七年春餘杭錢塘仁和三縣飢鎮江府飢真鄂州亦乏食嘉熙四年紹興府荐飢臨安府大飢嚴州飢咸淳七年江南大飢八年冬襄陽飢人相食德祐二年正月揚州飢三月揚州穀價騰踴民相食乾德二年五月揚州暴風壞軍營舍僅百區三年六月揚州暴風壞軍營舍及城上敵棚開寶二年三月帝駐太原城下大風一夕而止八年十月廣州颶風起一晝夜雨水二丈餘海為之漲飄失舟楫九年四月宋州大風壞甲仗庫城樓軍營凡四千五百九十六區太平興國二年六月曹州大風壞濟陰縣廨及軍營四年八月泗州大風浮梁竹笮鐵索斷華表石柱折六年九月高州大風雨壞廨宇及民舍五百區七年八月瓊州颶風壞城門州署民舍殆盡八年九月太平軍颶風拔木壞廨宇民舍千八十七區十月雷州颶風壞廩庫民舍七百區九年八月白州颶風壞廨宇民舍端拱二年京師暴風起東北塵沙曀日人不相辨淳化二年五月通利軍大風害稼三年六月丁丑黑風自西北起天地晦暝雷震有頃乃止先是京師大熱疫死者衆及此風至疫疾遂止至道二年八月潮州颶風壞州廨營寨咸平元年八月涪州大風壞城舍四年八月丙子京師暴風景德二年六月甲午大風吹沙折木八月福州海上有颶風壞廬舍三年七月丙寅京師大風四年三月甲寅夕京師大風黃塵蔽天自大名歷京畿害桑稼唐州尤甚大中祥符二年四月乙未大風起京師西北連日不止五年八月京師大風七年三月戊辰京師大風揚沙礫是日百官習儀恭謝壇有隨仆者八年六月辛亥京師風起巳位吹沙揚塵天禧二年正月永州大風發屋拔木數日止三年五月徐州利國監大風起西南壞廬舍二百餘區壓死十二人四年四月丁亥大風起西北飛沙折木晝晦數刻五月乙卯暴風起西北有聲折木吹沙黃塵蔽天占並主陰謀姦邪是秋內侍周懷政坐妖亂伏誅天聖九年十二月辛酉大風三日止景祐元年六月己巳無錫縣大風發屋民被壓死者衆九月甲寅夜漏上風自丑起有聲擺木鳴條二年六月戊寅平明風自未來占者以為百穀豐衍之候皇祐四年七月丁巳大風起西北方拔木嘉祐二年正月元日平旦有風從東北來遍天有蒼黑雲占云大熟多雨熙寧四年二月辛巳京東自濮州至河北旁邊大風異常百姓驚恐六年四月館陶縣黑風九年十一月海陽潮陽二縣颶風潮害民居田稼十年六月武城縣大風壞縣廨知縣李愈妻主簿寇宗奭妻之母壓死七月溫州大風雨漂城樓官舍元豐四年六月雍州颶風壞城樓官私廬舍七月甲午夜泰州海風作繼以大雨浸州城壞公私廬舍數千間靜海縣大風雨毀官私廬舍二千七百六十三楹丹陽縣大風雨溺民居毀廬舍丹徒縣大風潮飄蕩沿江廬舍損田稼六月雍州颶風壞城樓官私廬舍五年八月朱崖軍颶風毀廬舍元祐八年福建兩浙海風駕潮害民田紹聖元年秋蘇湖秀等州海風害民田靖康元年正月望夜大風起西北有聲吹沙走石盡明日乃止二月戊申大風起東北揚塵翳空三月己巳夜五更大風乍緩乍急聲如叫怒十一月丁亥大風發屋折木閏十一月甲寅大風起北方雪作盈數尺連夜不止二年正月己亥天氣昏曀狂風迅發竟日夜西北陰雲中如有火光長二丈餘闊數尺民時時見之庚戌大風雨二月乙酉大風折木晚尤甚三月己亥大風四月庚申朔大風吹石折木辛酉北風益甚苦寒建炎元年正月丁酉大風吹石折木十二月乙酉大風拔木紹興二十八年七月壬戌平江府大風雨駕潮漂溺數百里壞田廬三十二年七月戊申大風拔木溫州大風壞屋覆舟隆興元年浙東西郡國風水傷稼二年八月大風雨漂蕩田廬乾道二年八月丁亥溫州大風雨駕海潮殺人覆舟壞廬舍五年十月台州大風水壞田廬八年六月丙辰惠州颶風壞海艦三十餘時樞密院調廣東經略司水軍四艦覆其三死者百三十餘人淳熙三年六月大風連日四年九月明州大風駕海潮壞定海鄞縣海岸七千六百餘丈及田廬軍壘六月乙巳夜福清縣興化軍大風雨壞官舍民居倉庫及海口鎮人多死者五年正月庚戌大風六年十一月鄂州大風覆舟溺人甚衆七年二月江陵府大風火及舟焚溺死者尤衆十年八月辛酉雷州颶風大作駕海潮傷人禾稼林木皆折紹熙二年三月癸酉瑞安縣大風壞屋拔木殺人四年七月興化軍海風害稼五年六月丙子大風七月乙亥行都大風拔木壞舟甚衆紹興府秀州大風駕海潮害稼秋明州颶風駕海潮害稼十月甲戌行都大風拔木慶元二年六月壬申台州暴風雨駕海潮壞田廬六年三月甲子大風拔木嘉泰三年十月丁未暴風十一月癸未大風四年正月乙亥亦如之開禧元年四月乙卯九月庚戌大風嘉定元年九月乙丑大風二年二月戊子大風七月壬辰台州大風雨駕海潮壞屋殺人三年八月癸酉大風拔木折禾穗墮果實寧宗露禱至于丙子乃息後御史朝陵于紹興府歸奏風壞陵殿宮牆六十餘所陵木二千餘章四年閏月丁未大風六年十二月餘姚縣風潮壞海隄亘八鄉七年正月庚辰江州放鐙黑雲暴風忽作遊人相踐死者二十餘十年正月乙未大風拔木十一月丁丑大風十一年二月甲