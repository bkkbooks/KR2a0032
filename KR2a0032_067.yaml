靜今數震搖兵興民勞之象也四年五月庚午欣州地震西北有聲如雷五年七月十四日廣州地震六年二月戊寅青州地震三月庚寅登州地震岠嵎山摧自是震不已每震則海底有聲如雷五月甲申京師地震七年十月乙丑河陽許州地震皇祐二年十一月丁酉夜秀州地震有聲自北起如雷嘉祐二年雄州北界幽州地大震大壞城郭覆壓者數萬人五年五月己丑京師地震治平四年秋漳泉建州邵武興化軍等處皆地震潮州尤甚拆裂泉涌壓覆州郭及兩縣屋宇士民軍兵死者甚衆八月己巳京師地震熙寧元年七月甲申地震乙酉辛卯再震八月壬寅甲辰又震是月須城東阿二縣地震終日滄州清池莫州亦震壞官私廬舍城壁是時河北復大震或數刻不止有聲如雷樓櫓民居多摧覆壓死者甚衆九月戊子莫州地震有聲如雷十一月乙未京師及莫州地震十二月癸卯瀛州地大震丁巳冀州地震辛酉滄州地震湧出沙泥船板胡桃螺蚌之屬是月潮州地再震是歲數路地震有一日十數震有踰半年震不止者二年十月庚戌南郊東壝門內地陷有天寶十三年古墓元豐元年雍州佛像動搖初像動而夏人入寇又動而州大火其後儂智高叛復動於是知州錢師孟投其像于江中八年二月甲戌賓州嶺方縣地陷五月丙午京師地震元祐二年二月辛亥代州地震有聲四年春陝西河北地震七年九月己酉蘭州鎮戎軍永興軍地震十月庚戌朔環州地再震紹聖元年十一月丙戌太原府地震二年十月十一月河南府地震是歲蘇州自夏迄秋地震三年三月戊戌夜劍南東川地震九月己酉滁州沂州地震四年六月己酉太原府地震有聲元符元年七月壬申夜雲霠蔽天地震良久二年正月壬申恩州地震八月甲戌太原府地震三年五月己巳太原府又震建中靖國元年十二月辛亥太原府潞晉隰代石嵐等州岢嵐威勝保化寧化軍地震彌旬晝夜不止壞城壁屋宇人畜多死自後有司方言祥瑞郡國地震多抑而不奏政和七年六月詔曰熙河環慶涇原路地震經旬城寨關堡城壁樓櫓官私廬舍並皆摧塌居民覆壓死傷甚衆而有司不以聞其遣官按視之宣和四年北方用兵雄州地大震玄武見於州之正寢有龜大如錢蛇若朱漆筯相逐而行宣撫使焚香再拜以銀奩貯二物俄俱死六年正月京師連日地震宮殿門皆動有聲七年七月己亥熙河路地震有裂數十丈者蘭州尤甚陷數百家倉庫俱沒河東諸郡或震裂建炎二年正月戊戌長安地大震金將婁宿圍城彌旬無外援乘地震而入城遂陷紹興三年八月甲申地震平江府湖州尤甚是歲劉豫陷鄧隨等州金人犯蜀四年四川地震五年五月行都地震六年六月乙巳夜地震自西北有聲如雷餘杭縣為甚是冬劉麟猊犯順寇濠壽州七年地震二十四年正月戊寅地震二十五年三月壬申地震二十八年八月甲寅夜震三十一年三月壬辰地震三十二年七月戊申地震隆興元年十月丁丑地震六月甲寅又震乾道二年九月丙午地震自西北方四年十二月壬子石泉軍地震三日有聲如雷屋瓦皆落時綿竹有寃獄云淳熙元年十二月戊辰地震自東北方九年十二月壬寅夜地震十年十二月丙寅地震十二年五月庚寅地震慶元六年九月東北地震十一月甲子地震東北方嘉定六年四月行都地震六月丙子淳安縣地震九年二月辛亥東西川地大震四日十年二月庚申地震自東南十二年五月地震六月西川地震十四年正月乙未夜地震大雷五月丙申西川地震寶慶元年八月己酉地震嘉熙四年十二月丙辰地震淳祐元年十二月庚辰夜地震寶祐三年蜀地震咸淳七年嘉定府城震者三雍熙三年階州福津縣常峽山圮壅白江水逆流高十許丈壞民田數百里淳化二年五月名山縣大風雨登遼山圮壅江水逆流入民田害稼咸平元年七月庚午寧化軍汾水漲壞北水門山石摧圮軍士有壓死者二年七月庚寅靈寶縣暴雨崖圮壓居民死者二十二戶三年三月辛丑夜大澤縣三陽寨大雨崖摧壓死者六十二人四年正月成紀縣山摧壓死者六十餘人景德四年七月成紀縣崖圮壓死居民熙寧五年九月丙寅華州少華山前阜頭峯越八盤領及谷摧陷於石子坡東西五里南北十里潰散墳裂湧起堆阜各高數丈長若隄岸至陷居民六社凡數百戶林木廬舍亦無存者並山之民言數年以來峯上常有雲每遇風雨即隱隱有聲是夜初昏略無風雨山上忽霧起有聲漸大地遂震動不及食頃而山摧元祐元年十二月鄭縣界小敷谷山頽傷居民紹興十二年十二月陝西不雨五穀焦枯涇渭灞滻皆竭時秦民以飢離散壯者為北人所買郡邑遂空紹熙四年秋南嶽祝融峯山自摧劍門關山摧五年十二月臨安府南高峰山自摧慶元二年六月辛未台州黃巖縣大雨水有山自徙五十餘里其聲如雷草木冢墓皆不動而故址潰為淵潭時臨海縣清潭山亦自移嘉泰二年七月丁未閩建安縣山摧民廬之壓者六十餘家嘉定六年六月丙子嚴州淳安縣長樂鄉山摧水湧九年黎州山崩咸淳十年天目山崩熙寧元年荊襄間天雨白氂如馬尾長者尺餘彌漫山谷三月丁酉潭州雨毛八年五月丁丑雨黃毛紹熙四年十一月癸酉地生毛咸淳九年江南平地産白毛臨安尤多
