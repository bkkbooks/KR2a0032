body:
  text: 宋史卷七十一志第二十四律曆四崇天曆道體為一天地之元萬物之祖也散而為氣則有陰有陽動而為數則有奇有偶凝而為形則有剛有柔發而為聲則有清有濁其著見而為器則有律有呂凡禮樂刑法權衡度量皆出于是自周衰樂壞而律呂候氣之法不傳西漢劉歆揚雄之徒僅存其說京房作準以代律分六十聲始於南事終於去滅然聲細而難分世不能用歷晉及隋唐律法微隱宋史止載律呂大數不獲其詳今掇仁宗論律及諸儒言鐘律者記于篇以補續舊學之闕仁宗著景祐樂髓新經凡六篇述七宗二變及管分陰陽剖析清濁歸之于本律次及間聲合古今之樂參之以六壬遁甲其一釋十二均曰黃鐘之宮為子為神后為土為雞緩為正宮調太簇商為寅為功曹為金為般頡為大石調姑洗角為辰為天剛為木為嗢沒斯為小石角林鐘徵為未為小吉為火為雲漢為黃鐘徵南呂羽為酉為從魁為水為滴為般涉調應鐘變宮為亥為登明為日為密為中管黃鐘宮蕤賓變徵為午為勝先為月為莫為應鐘徵大呂之宮為大吉為高宮夾鐘商為大衝為高大石仲呂角為太一為中管小石調夷則徵為傳送為大呂徵無射羽為河魁為高般涉黃鐘變宮為正宮調林鐘變徵為黃鐘徵太簇之宮為中管高宮姑洗商為高大石蕤賓角為歇指角南呂徵為太簇徵應鐘羽為中管高般涉大呂變宮為高宮夷則變徵為大呂徵夾鐘之宮為中呂宮仲呂商為雙調林鐘角在今樂亦為林鐘角無射徵為夾鐘徵黃鐘羽為中呂調太簇變宮為中管高宮南呂變徵為太簇徵姑洗之宮為中管中呂宮蕤賓商為中管商調夷則角為中管林鐘角應鐘徵為姑洗徵大呂羽為中管中呂調夾鐘變宮為中呂宮無射變徵為夾鐘徵仲呂之宮為道調宮林鐘商為小石調南呂角為越調黃鐘徵為中呂徵太簇羽為平調姑洗變宮為中管中呂宮應鐘變徵為姑洗徵蕤賓之宮為中管道調宮夷則商為中管小石調無射角為中管越調大呂徵為蕤賓徵夾鐘羽為中管平調中呂變宮為道調宮黃鐘變徵為仲呂徵林鐘之宮為南呂宮南呂商為歇指調應鐘角為大石調太簇徵為林鐘徵姑洗羽為高平調蕤賓變宮為中管道調宮大呂變徵為蕤賓徵夷則之宮為仙呂無射商為林鐘商黃鐘角為高大石調夾鐘徵為夷則徵仲呂羽為仙呂調林鐘變宮為南呂宮太簇變徵為林鐘徵南呂之宮為中管仙呂宮應鐘商為中管林鐘商大呂角為中管高大石角姑洗徵為南呂徵蕤賓羽為中管仙呂調夷則變宮為仙呂宮夾鐘變徵為夷則徵無射之宮為黃鐘宮黃鐘商為越調太簇角為變角仲呂徵為無射徵林鐘羽為黃鐘羽南呂變宮為中管仙呂宮姑洗變徵為南呂徵應鐘之宮為中管黃鐘宮大呂商為中管越調夾鐘角為中管雙角蕤賓徵為應鐘徵夷則羽為中管黃鐘羽無射變宮為黃鐘宮仲呂變徵為無射徵二明所主事調五聲為五行五事四時五帝五神五嶽五味五色為生數一二三四五成數六七八九十為五藏五官及五星三辯音聲曰宮聲沈厚麤大而下為君聲調則國安亂則荒而危合口通音謂之宮其聲雄洪屬平聲西域言婆力一曰婆力商聲勁凝明達上而下歸於中為臣聲調則刑法不作威令行亂則其宮壞開口吐聲謂之商音將將倉倉然西域言稽識稽識猶長聲也角聲長而通徹中平而正為民聲調則四民安亂則人怨聲出齒間謂之角喔喔確確然西域言沙識猶質直聲也徵聲抑揚流利從下而上歸於中為事聲調則百事理亂則事隳齒合而唇啟謂之徵倚倚然西域言沙臘沙臘和也羽聲喓喓而遠徹細小而高為物聲調則倉廩實庶物備亂則匱竭齒開唇聚謂之羽詡雨酗芋然西域言般瞻變宮西域言侯利箑猶言斛律聲也變徵聲西域言沙侯加濫猶應聲也其四明律呂相生祭天地宗廟配律陽之數曰太空育五太太易太初太始太素太極也分為七政陽數七所以齊律呂均節度不可加減也以育六甲六甲天之使行風雹筴鬼神為歲日時有善惡故為九宮九者陽數變化之道也為四正卦五行十幹陰陽錯綜律呂相叶命宮而商者應修下而高者降下生隔八上生隔六皆圖于左其五著十二管短長其六出度量衡辯古今尺龠律呂真聲本陰陽之氣可以感格天地在於符合尺寸短長宜因聲以定之因聲定律則庶幾為得以尺定聲則乖隔甚矣初馮元等上新修景祐廣樂記時鄧保信阮逸胡瑗等奏造鐘律詔翰林學士丁度知制誥胥偃右司諫高若訥韓琦取保信逸瑗等鐘律詳考得失度等上議曰保信所製尺用上黨秬黍圓者一黍之長累而成尺律管一據尺裁九十黍之長空徑三分空圍九分容秬黍千二百遂用黍長為分再累成尺校保信尺律不同其龠合升斗深闊推以算法類皆差舛不合周漢量法逸瑗所製亦上黨秬黍中者累廣求尺製黃鐘之律今用再累成尺比逸瑗所製又復不同至於律管龠合升斗斛豆區鬴亦率類是蓋黍有圓長大小而保信所用者圓黍又首尾相銜逸等止用大者故再攷之即不同尺既有差故難以定鐘磬謹詳古今之製自晉至隋累黍之法但求尺裁管不以權量參校故歷代黃鐘之管容黍之數不同惟後周掘地得古玉斗據斗造律兼制權量亦不同周漢制度故漢志有備數和聲審度嘉量權衡之說悉起於黃鐘今欲數器之制參互無失則班志積分之法為近逸等以大黍累尺小黍實龠自戾本法保信黍尺以長為分雖合後魏公孫崇所說然當時已不施用況保信今尺以圓黍累之及首尾相銜有與實龠之黍再累成尺不同其量器分寸既不合古即權衡之法不可獨用詔悉罷之又詔度等詳定太府寺幷保信逸瑗所制尺度等言尺度之興尚矣周官璧羨以起度廣徑八寸袤一尺禮記布手為尺淮南子十二粟為一寸孫子十氂為分十分為寸雖存異說莫可適從漢志元始中召天下通知鐘律者百餘人使劉歆典領之是時周滅二百餘年古之律度當有考者以歆之博貫藝文曉達曆算有所制作宜不凡近其審度之法云一黍之廣為分十分為寸十寸為尺先儒訓解經籍多引以為義歷世祖襲著之定法然而歲有豐儉地有磽肥就令一歲之中一境之內取以校驗亦復不齊是蓋天物之生理難均一古之立法存其大概爾故前代制尺非特累黍必求古雅之器以雜校焉晉泰始十年荀勗等校定尺度以調鐘律是為晉之前尺勗等以古物七品勘之一曰姑玉律二曰小呂玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺當時以勗尺揆校古器與本銘尺寸無差前史稱其用意精密隋志所載諸代尺度十有五等然以晉之前尺為本以其與姬周之尺劉歆銅斛尺建武銅尺相合竊惟周漢二代享年永久聖賢制作可取則焉而隋氏銷毀金石典正之物罕復存者夫古物之有分寸明著史籍可以酬驗者惟有法錢而已周之圜法歷載曠遠莫得而詳秦之半兩實重八銖漢初四銖其文亦曰半兩孝武之世始行五銖下暨隋朝多以五銖為號既歷代尺度屢改故大小輕重鮮有同者惟劉歆置銅斛世之所鑄錯刀幷大泉五十王莽天鳳元年改鑄貨布貨泉之類不聞後世復有兩者臣等檢詳漢志通典唐六典云大泉五十重十二銖徑一寸二分錯刀環如大泉身形如刀長二寸貨布重二十五銖長二寸五分廣一寸首長八分有奇廣八分足股長八分間廣二分圍好徑二分半貨泉重五銖徑一寸今以大泉錯刀貨布貨泉四物相參校分寸正同或有大小輕重與本志微差者蓋當時盜鑄既多不必皆中法度但當較其首足肉好長廣分寸皆合正史者用之則銅斛之尺從可知矣況經籍制度皆起周世以劉歆術業之博祖冲之算數之妙荀勗揆較之詳密校之既合周尺則最為可法兼詳隋牛弘等議稱後周太祖敕蘇綽造鐵尺與宋尺同以調中律以均田度地唐祖孝孫云隋平陳之後廢周玉尺用此鐵尺律然比晉前尺長六分四氂今司天監影表尺和峴所謂西京銅望臬者蓋以其洛都舊物也晉荀勗所用西京銅望臬者蓋西漢之物和峴謂洛陽為西京乃唐東都爾今以貨布錯刀貨泉大泉等校之則景表尺長六分有奇略合宋周隋之尺由此論之銅斛貨布等尺寸昭然可驗有唐享國三百年其間制作法度雖未逮周漢然亦可謂治安之世矣今朝廷必求尺之中當依漢錢分寸若以為太祖膺圖受禪創制垂法嘗詔和峴等用影表尺與典修金石七十年間薦之郊廟稽合唐制以示詒謀則可且依影表舊尺俟有妙達鐘律之學者俾考正之以從周漢之制王朴律準尺比漢錢尺寸長二分有奇比影表尺短四分既前代未嘗施用復經太祖朝更易其逸瑗保信及照所用太府寺等尺其制彌長出古遠甚又逸進周禮度量法議欲且鑄嘉量然後取尺度權衡其說疏舛不可依用謹考舊文再造影表尺一校漢錢尺二幷大泉錯刀貨布貨泉總十七枚上進詔度等以錢尺影表尺各造律管比驗逸瑗幷太常新舊鐘磬考定音之高下以聞度等言前承詔考太常等四尺定可用者止按典故及以漢志古錢分寸參校影表尺略合宋周隋之尺謂宜準影表尺施用今被旨造律管驗音高下非素所習乞別詔曉音者總領校定詔乃罷之而若訥卒用漢貨泉度尺寸依隋書定尺十五種上之藏于太常寺一周尺與漢志劉歆銅斛尺後漢建武中銅尺晉前尺同二晉田父玉尺與梁法尺同比晉前尺為一尺七氂三梁表尺比晉前尺為一尺二分二氂一毫有奇四漢官尺比晉前尺為一尺三分七毫五魏尺杜夔之所用也比晉前尺為一尺四分七氂六晉後尺晉江東用之比晉前尺為一尺六分二氂七魏前尺比晉前尺為一尺一寸七氂八中尺比晉前尺為一尺二寸一分一氂九後尺同隋開皇尺周市尺比晉前尺為一尺二寸八分一氂十東魏後尺比晉前尺為一尺三寸八毫十一蔡邕銅龠尺同後周玉尺比晉前尺為一尺一寸五分八氂十二宋氏尺與錢樂之渾天儀尺後周鐵尺同比晉前尺為一尺六分四氂十三太府寺鐵尺制大樂所裁造尺也十四雜尺劉曜渾儀土圭尺也比晉前尺為一尺五分十五梁朝俗尺比晉前尺為一尺七分一氂太常所掌又有後周王朴律準尺比晉前尺長二分一氂比梁表尺短一氂有司天監影表尺比晉前尺長六分三氂同晉後尺有中黍尺亦制樂所新造也其後宋祁田況薦益州進士房庶曉音祁上其樂書補亡三卷召詣闕庶自言嘗得古本漢志云度起於黃鐘之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黃鐘之長一為一分今文脫之起積一千二百黍八字故自前世以來累黍為尺以製律是律生於尺尺非起於黃鐘也且漢志一為一分者蓋九十分之一後儒誤以一黍為分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黃鐘之長九寸加一以為尺則律定矣直祕閣范鎮是之乃為言曰照以縱黍累尺管空徑三分容黍千七百三十瑗以橫黍累尺管容黍一千二百而空徑三分四氂六毫是皆以尺生律不合古法今庶所言實千二百黍於管以為黃鐘之長就取三分以為空徑則無容受不合之差校前二說為是蓋累黍為尺始失之於隋書當時議者以其容受不合棄而不用及隋平陳得古樂器高祖聞而歎曰華夏舊聲也遂傳用之至唐祖孝孫張文收號稱知音亦不能更造尺律止沿隋之古樂制定聲器朝廷久以鐘律未正屢下詔書博訪羣議冀有所獲今庶所言以律生尺誠衆論所不及請如其法試造尺律更以古器參考當得其真乃詔王洙與鎮同於修制所如庶說造律尺龠律徑三分圍九分長九十分龠徑九分深一寸尺起黃鐘之長加十分而律容千二百黍初庶言太常樂高古樂五律比律成才下三律以為今所用黍非古所謂一稃二米黍也尺比橫黍所累者長一寸四分庶又言古有五音而今無正徵音國家以火德王徵屬火不宜闕今以五行旋相生法得徵音又言尚書同律度量衡所以齊一風俗今太常教坊鈞容及天下州縣各自為律非書同律之義且古者帝王巡狩方岳必考禮樂同異以行誅賞謂宜頒格律自京師及州縣毋容輒異有擅高下者論之帝召輔臣觀庶所進律尺龠又令庶自陳其法因問律呂旋相為宮事令撰圖以進其說以五正二變配五音迭相為主衍之成八十四調舊以宮徵商羽角五音次第配七聲然後加變宮變徵二聲以足其數推以旋相生之法謂五行相戾非是當改變徵為變羽易變為閏隨音加之則十二月各以其律為宮而五行相生終始無窮詔以其圖送詳定所庶又論吹律以聽軍聲者謂以五行逆順可以知吉凶先儒之說略矣是時瑗逸制樂有定議乃補庶試祕書省校書郎遣之鎮為論於執政曰今律之與尺所以不得其真累黍為之也累黍為之者史之脫文也古人豈以難曉不合之法書之於史以為後世惑乎殆不然也易曉而必合也房庶之法是矣今庶自言其法依古以律而起尺其長與空徑與容受與一千二百黍之數無不合之差誠如庶言此至真之法也且黃鐘之實一千二百黍積實分八百一十於算法圓積之則空徑三分圍九分長九十分積實八百一十分此古律也律體本圓圓積之是也今律方積之則空徑三分四釐六毫比古大矣故圍十分三釐八毫而其長止七十六分二釐積實亦八百一十分律體本不方方積之非也其空徑三分圍九分長九十分積實八百一十分非外來者也皆起於律也以一黍而起於尺與一千二百黍之起於律皆取於黍今議者獨於律則謂之索虛而求分亦非也其空徑三分圍九分長九十分之起於律與空徑三分四釐六毫圍十分三釐八毫長七十六分二釐之起於尺古今之法疏密之課其不同較然可見何所疑哉若以謂工作既久而復改為則淹引歲月計費益廣又非朝廷制作之意也其淹久而計費廣者為之不敏也今庶言太常樂無姑洗夾鐘太簇等數律就令其律與其說相應鐘磬每編才易數三因舊而新敏而為之則旬月功可也又何淹久廣費哉執政不聽四年鎮又上書曰陛下制樂以事天地宗廟以揚祖宗之休茲盛德之事也然自下詔以來及今三年有司之論紛然未決蓋由不議其本而爭其末也竊惟樂者和氣也發和氣者聲音也聲音之生生於無形故古人以有形之物傳其法俾後人參考之然後無形之聲音得而和氣可道也有形者秬黍也律也尺也龠也鬴也斛也算數也權衡也鐘也磬也是十者必相合而不相戾然後為得今皆相戾而不相合則為非是矣有形之物非是而欲求無形之聲音和安可得哉謹條十者非是之驗惟裁擇焉按詩誕降嘉種維秬維秠誕降者天降之也許慎云秬一稃二米又云一秬二米後漢任城縣產秬黍二斛八斗實皆二米史官載之以為嘉瑞又古人以秬黍為酒者謂之秬鬯宗廟降神惟用一尊諸侯有功惟賜一卣以明天降之物世不常有而可貴也今秬黍取之民間者動至數百斛秬皆一米河東之人謂之黑米設有真黍以為取數至多不敢送官此秬黍為非是一也又按先儒皆言律空徑三分圍九分長九十分容千二百黍積實八百一十分今律空徑三分四氂六毫圍十分二氂八毫是為九分外大其一分三氂八毫而后容千二百黍除其圍廣則其長止七十六分二氂矣說者謂四氂六毫為方分古者以竹為律竹形本圓今以方分置算此律之為非是二也又按漢書分寸尺丈引本起黃鐘之長又云九十分黃鐘之長者据千二百黍而言也千二百黍之施於量則曰黃鐘之龠施於權衡則曰黃鐘之重施於尺則曰黃鐘之長今遺千二百之數而以百黍為尺又不起於黃鐘此尺之為非是三也又按漢書言龠其狀似爵爵謂爵琖其體正圓故龠當圓徑九分深十分容千二百黍積實八百一十分與律分正同今龠乃方一寸深八分一氂容千二百黍是亦以方分置算者此龠之非是四也又按周禮鬴法方尺圓其外深尺容六斗四升方尺者八寸之尺也深尺者十寸之尺也何以知尺有八寸十寸之別按周禮璧羨度尺好三寸以為度璧羨之制長十寸廣八寸同謂之度尺以為尺則八寸十寸俱為尺矣又王制云古者以周尺八尺為步今以六尺四寸為步八尺者八寸之尺也六尺四寸者十寸之尺也同謂之周尺者是周用八寸十寸尺明矣故知八寸尺為鬴之方十寸尺為鬴之深而容六斗四升千二百八十龠也積實一百三萬六千八百分今鬴方尺積千寸此鬴之非是五也又按漢書斛法方尺圓其外容十斗旁有庣焉當隋時漢斛尚在故隋書載其銘曰律嘉量斛方尺圓其外庣旁九釐五毫冪百六十二寸深尺容一斛今斛方尺深一尺六寸二分此斛之非是六也又按算法圓分謂之徑圍方分謂之方斜所謂徑三圍九方五斜七是也今圓分而以方法算之此算數非是七也又按權衡者起千二百黍而立法也周之鬴其重一鈞聲中黃鐘漢之斛其重二鈞聲中黃鐘鬴斛之制有容受有尺寸又取其輕重者欲見薄厚之法以考其聲也今黍之輕重未真此權衡為非是八也又按鳧氏為鐘大鐘十分其鼓間之以其一為之厚小鐘十分其鉦間之以其一為之厚今無大小薄厚而一以黃鐘為率此鐘之非是九也又按磬氏為磬倨句一矩有半其博為一股為二鼓為三蓋各以其律之長短為法也今亦以黃鐘為率而無長短厚薄之別此磬之非是十也前此者皆有形之物也可見者也使其一不合則未可以為法況十者之皆相戾乎臣固知其無形之聲音不可得而和也請以臣章下有司問黍之二米與一米孰是律之空徑三分與三分四釐六毫孰是律之起尺與尺之起律孰是龠之圓制與方制孰是鬴之方尺圓其外深尺與方尺孰是斛之方尺圓其外庣旁九釐五毫與方尺深尺六寸二分孰是算數之以圓分與方分孰是權衡之重以二米秬黍與一米孰是鐘磬依古法有大小輕重長短薄厚而中律孰是是不是定然後制龠合升斗鬴斛以校其容受容受合然後下詔以求真黍真黍至然後可以為量為鐘磬量與鐘磬合於律然後可以為樂也今尺律本末未定而詳定修制二局工作之費無慮千萬計矣此議者所以云云也然議者不言有司論議依違不决而顧謂作樂為過舉又言當今宜先政令而禮樂非所急此臣之所大惑也儻使有司合禮樂之論是其所是非其所非陛下親臨決之顧於政令不已大乎昔漢儒議鹽鐵後世傳鹽鐵論方今定雅樂以求廢墜之法而有司論議不著盛德之事後世將何考焉願令有司人人各以經史論議條上合為一書則孰敢不自竭盡以副陛下之意如以臣議為然伏請權罷詳定修制二局俟真黍至然後為樂則必得至當而無事於浮費也詔送詳定所鎮說自謂得古法後司馬光數與之論難以為弗合世鮮鐘律之學卒莫辯其是非焉宋興百餘年司天數改曆其說曰曆者歲之積歲者月之積月者日之積日者分之積又推餘分置閏以定四時非博學妙思弗能考也夫天體之運星辰之動未始有窮而度以一法是以久則差差則敝而不可用曆之所以數改造也物銖銖而較之至石必差況於無形之數哉乾興初議改曆命司天役人張奎運算其術以八千為日法一千九百五十八為斗分四千二百九十九為朔距乾興元年壬戌歲三千九百萬六千六百五十八為積年詔以奎補保章正又推擇學者楚衍與曆官宋行古集天章閣詔內侍金克隆監造曆至天聖元年八月成率以一萬五百九十為樞法得九鉅萬數既上奏詔翰林學士晏殊制序而施行焉命曰崇天曆曆法曰演紀上元甲子距天聖二年甲子歲積九千七百五十五萬六千三百四十上考往古歲減一算下驗將來歲加一算步氣朔崇天樞法一萬五百九十歲周三百八十六萬七千九百四十歲餘五萬五千五百四十氣策一十五餘五千三百一十四秒六朔實三十一萬二千七百二十九歲閏一十一萬五千一百九十二朔策二十九餘五千六百一十九望策一十四餘八千一百四秒一十八弦策七餘四千五十二秒九中盈分四千六百二十八秒一十二朔虛分四千九百七十一閏限三十萬三千一百二十九秒二十四秒法三十六旬周六十三萬五千四百紀法六十推天正冬至置距所求積年以歲周乘之為氣積分滿旬周去之不盡以樞法約之為大餘不滿為小餘大餘命甲子算外即所求年天正冬至日辰及餘若以後合用約分即以樞法退除為分秒各以一百為母求次氣置天正冬至大小餘以氣策秒累加之秒盈秒法從小餘小餘滿樞法從大餘滿紀法去之不盡命甲子算外即各得次氣日辰及餘秒推天正十一月經朔置天正冬至氣積分朔實去之不盡為閏餘以減天正冬至氣積分為天正十一月經朔加時積分滿旬周去之不盡以樞法約之為大餘不滿為小餘大餘命甲子算外即所求年天正十一月經朔日辰及餘求弦望及次朔經日置天正十一月經朔大小餘以弦策累加之去命如前即各弦望及次朔經日及餘秒求沒日置有沒之氣小餘三百六十乘之其秒進一位從之用減歲周餘滿歲餘為日不滿為餘命其氣初日算外即其氣沒日日辰凡二十四氣小餘滿八千二百六十五秒三十以上為有沒之氣求減日置有減經朔小餘三十乘之滿朔虛分為日不滿為餘命經朔初日算外即為其朔減日日辰凡經朔小餘不滿朔虛分為有減之朔步發斂候策五餘七百七十一秒一十四卦策六餘九百二十五秒二十四土王策三餘四百六十二秒三十辰法八百八十二半刻法一千五十九秒法三十六推七十二候各因中節大小餘命之為其氣初候日也以候策加之為次候又加之為末候求六十四卦各因中氣大小餘命之為公卦用事日以卦策加之得次卦用事日以土王策加諸侯之卦得十有二節之初外卦用事之日推五行用事日各因四立日大小餘命之即春木夏火秋金冬水首用事日以土王策減四季中氣大小餘命甲子算外即其月土始用事日七十二候及卦日與應天同求發斂去經朔置天正十一月閏餘以中盈及朔虛分累益之即每月閏餘滿樞法除之為閏日不盡為小餘即各得其月中氣去經朔日及餘秒其餘閏滿閏限至閏仍先見定朔大小其月內無中氣乃為閏月求卦候去經朔各以卦候策及餘秒累加減之中氣前以減中氣后以加即各得卦候去經朔日及餘秒求發斂加時置小餘以辰法除之為辰數進一位滿刻法為刻不滿為刻分其辰數命子正算外即各加時所在辰刻及分
