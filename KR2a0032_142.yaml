body:
  text: 宋史卷一百四十二志第九十五樂十七詩樂琴律燕樂教坊雲韶部鈞容直四夷樂詩樂虞庭言樂以詩為本孔門禮樂之教自興於詩始記曰十有三年學樂誦詩詠歌以養其性情舞蹈以養其血脈此古之成材所以為易也宋朝湖學之興老師宿儒痛正音之寂寥嘗擇取二南小雅數十篇寓之塤籥使學者朝夕詠歌自爾聲詩之學為儒者稍知所尚張載嘗慨然思欲講明作之朝廷被諸郊廟矣朱熹述為詩篇彙于學禮將使後之學者學焉小雅歌凡六篇朱熹曰傳曰大學始教宵雅肄三謂習小雅鹿鳴四牡皇皇者華之三詩也此皆君臣宴勞之詩始學者習之所以取其上下相和厚也古鄉飲酒及燕禮皆歌此三詩及笙入六笙間歌魚麗南有嘉魚南山有臺六笙詩本無辭其遺聲亦不復傳矣小雅為諸侯之樂大雅頌為天子之樂二南國風歌凡六篇朱熹曰周南召南正始之道王化之基故用之鄉人焉用之邦國焉鄉飲酒及鄉射禮合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋燕禮云遂歌鄉樂即此六篇也合樂謂歌舞與衆聲皆作周南召南古房中之樂歌也關雎言后妃之志鵲巢言國君夫人之德采蘩言夫人之不失職采蘋言卿大夫妻能循法度夫婦之道生民之本王化之端此六篇者其教之原也故國君與其臣下及四方之賓燕用之合樂也小雅詩譜鹿鳴四牡皇皇者華魚麗南有嘉魚南山有臺皆用黃鐘清宮俗呼為正宮調二南國風詩譜關雎葛覃卷耳鵲巢采蘩采蘋皆用無射清商俗呼為越調朱熹曰大戴禮言雅二十六篇其八可歌其八廢不可歌本文頗有闕誤漢末杜夔傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀又加文王詩皆古聲辭其後新辭作而舊曲遂廢唐開元鄉飲酒禮乃有此十二篇之目而其聲亦莫得聞此譜相傳即開元遺聲也古聲亡滅已久不知當時工師何所考而為此竊疑古樂有唱有歎唱者發歌句也和者繼其聲也詩詞之外應更有疊字散聲以歎發其趣故漢晉間舊曲既失其傳則其詞雖存而世莫能補如此譜直以一聲協一字則古詩篇篇可歌又其以清聲為調似亦非古法然古聲既不可考姑存此以見聲歌之彷彿俟知樂者考焉琴律賾天地之和者莫如樂暢樂之趣者莫如琴八音以絲為君絲以琴為君衆器之中琴德最優白虎通曰琴者禁止於邪以正人心也宜衆樂皆為琴之臣妾然八音之中金石竹匏土木六者皆有一定之聲革為燥濕所薄絲有絃柱緩急不齊故二者其聲難定鼓無當於五聲此不復論惟絲聲備五聲而其變無窮五絃作於虞舜七絃作於周文武此琴制之古者也厥後增損不一至宋始製二絃之琴以象天地謂之兩儀琴每絃各六柱又為十二絃以象十二律其倍應之聲靡不畢備太宗因大樂雅琴加為九絃按曲轉入大樂十二律清濁互相合應大晟樂府嘗罷一三七九惟存五絃謂其得五音之正最優於諸琴也今復俱用太常琴制其長三尺六寸三百六十分象周天之度也姜夔樂議分琴為三準自一暉至四暉謂之上準四寸半以象黃鍾之半律自四暉至七暉謂之中準中準九寸以象黃鍾之正律自七暉至龍齦謂之下準下準一尺八寸以象黃鍾之倍律三準各具十二律聲按絃附木而取然須轉絃合本律所用之字若不轉絃則吳觸散聲落別律矣每一絃各具三十六聲皆自然也分五七九絃琴各述轉絃合調圖五絃琴圖說曰琴為古樂所用者皆宮商角徵羽正音故以五絃散聲配之其二變之聲惟用古清商謂之側弄不入雅樂七絃琴圖說曰七絃散而扣之則間一絃於第十暉取應聲假如宮調五絃十暉應七絃散聲四絃十暉應六絃散聲二絃十暉應四絃散聲大絃十暉應三絃散聲惟三絃獨退一暉於十一暉應五絃散聲古今無知之者竊謂黃鍾大呂並用慢角調故於大絃十一暉應三絃散聲太簇夾鍾並用清商調故於二絃十二暉應四絃散聲姑洗仲呂蕤賓並用宮調故於三絃十一暉應五絃散聲林鍾夷則並用慢宮調故於四絃十一暉應六絃散聲南呂無射應鍾並用蕤賓調故於五絃十一暉應七絃散聲以律長短配絃大小各有其序九絃琴圖說曰絃有七有九實即五絃七絃倍其二九絃倍其四所用者五音亦不以二變為散聲也或欲以七絃配五音二變以餘兩絃為倍若七絃分配七音則是今之十四絃也聲律訣云琴瑟齪四者律法上下相生也若加二變則於律法不諧矣或曰如此則琴無二變之聲乎曰附木取之二變之聲固在也合五七九絃琴總述取應聲法分十二律十二均每聲取絃暉之應皆以次列按古者大琴則有大瑟中琴則有中瑟有雅琴頌琴則雅瑟頌瑟實為之合夔乃定瑟之制桐為背梓為腹長九尺九寸首尾各九寸隱間八尺一寸廣尺有八寸岳崇寸有八分中施九梁皆象黃鍾之數梁下相連使其聲沖融首尾之下為兩穴使其聲條達是傳所謂大瑟達越也四隅刻雲以緣其武象其出於雲和漆其壁與首尾腹取椅桐梓漆之全設二十五絃絃一柱崇二寸七分別以五色五五相次蒼為上朱次之黃次之素與黔又次之使肄習者便於擇絃絃八十一絲而朱之是謂朱絃其尺則用漢尺凡瑟絃具五聲五聲為均凡五均其二變之聲則柱後抑角羽而取之五均凡三十五聲十二律六十均四百二十聲瑟之能事畢矣夔於琴瑟之議其詳如此朱熹嘗與學者共講琴法其定律之法十二律並用太史公九分寸法為準損益相生分十二律及五聲位置各定按古人以吹管聲傳於琴上如吹管起黃鍾則以琴之黃鍾聲合之聲合無差然後以次徧合諸聲則五聲皆正唐人紀琴先以管色合字定宮絃乃以宮絃下生徵徵上生商上下相生終於少商下生者隔二絃上生者隔一絃取之凡絲聲皆當如此今人苟簡不復以管定聲其高下出於臨時非古法也調絃之法散聲隔四而得二聲中暉亦如之而得四聲八暉隔三而得六聲九暉按上者隔二而得四聲按下者隔一而得五聲十暉按上者隔一而得五聲按下者隔二而得四聲每疑七絃隔一調之六絃皆應於第十暉而第三絃獨於第十一暉調之乃應及思而得之七絃散聲為五聲之正而大絃十二律之位又衆絃散聲之所取正也故逐絃之五聲皆自東而西相為次第其六絃會於十暉則一與三者角與散角應也二與四者徵與散徵應也四與六者宮與散少宮應也五與七者商與散少商應也其第三第五絃會於十一暉則羽與散羽應也義各有當初不相須故不同會於一暉也旋宮諸調之法旋宮古有隨月用律之說今乃謂不必轉軫促絃但依旋宮之法而抑按之恐難如此泛論當每宮指定各以何聲取何絃為唱各以何絃取何律為均乃見詳實又以禮運正義推之則每律各為一宮每宮各有五調而其每調用律取聲亦各有法此為琴之綱領而說者罕及乃闕典也當為一圖以宮統調以調統聲令其次第賓主各有條理仍先作三圖一各具琴之形體暉絃尺寸散聲之位二附按聲聲律之位三附泛聲聲律之位列于宮調圖前則覽者曉然可為萬世法矣觀熹之言其於琴法本融末粲至疏達而至縝密蓋所謂識其大者歟燕樂古者燕樂自周以來用之唐貞觀增隋九部為十部以張文收所製歌名燕樂而被之管絃厥後至坐部伎琵琶曲盛流于時匪直漢氏上林樂府縵樂不應經法而已宋初置教坊得江南樂已汰其坐部不用自後因舊曲創新聲轉加流麗政和間詔以大晟雅樂施於燕饗御殿按試補徵角二調播之教坊頒之天下然當時樂府奏言樂之諸宮調多不正皆俚俗所傳及命劉昺輯燕樂新書亦惟以八十四調為宗非復雅音而曲燕昵狎至有援君臣相說之樂以藉口者末俗漸靡之弊愈不容言矣紹興中始蠲省教坊樂凡燕禮屏坐伎乾道繼志述事間用雜攢以充教坊之號取具臨時而廷紳祝頌務在嚴恭亦明以更不用女樂頒旨子孫守之以為家法於是中興燕樂比前代猶簡而有關乎君德者良多蔡元定嘗為燕樂一書證俗失以存古義今采其略附于下黃鍾用合字大呂太簇用四字夾鍾姑洗用一字夷則南呂用工字無射應鍾用凡字各以上下分為清濁其中呂蕤賓林鍾不可以上下分中呂用上字蕤賓用勾字林鍾用尺字其黃鍾清用六字大呂太簇夾鍾清各用五字而以下上緊別之緊五者夾鍾清聲俗樂以為宮此其取律寸律數用字紀聲之略也一宮二商三角四變為宮五徵六羽七閏為角五聲之號與雅樂同惟變徵以於十二律中陰陽易位故謂之變變宮以七聲所不及取閏餘之義故謂之閏四變居宮聲之對故為宮俗樂以閏為正聲以閏加變故閏為角而實非正角此其七聲高下之略也聲由陽來陽生於子終於午燕樂以夾鍾收四聲曰宮曰商曰羽曰閏閏為角其正角聲變聲徵聲皆不收而獨用夾鍾為律本此其夾鍾收四聲之略也宮聲七調曰正宮曰高宮曰中呂宮曰道宮曰南呂宮曰僊呂宮曰黃鍾宮皆生於黃鍾商聲七調曰大食調曰高大食調曰雙調曰小食調曰歇指調曰商調曰越調皆生於太簇羽聲七調曰般涉調曰高般涉調曰中呂調曰正平調曰南呂調曰僊呂調曰黃鍾調皆生於南呂角聲七調曰大食角曰高大食角曰雙角曰小食角曰歇指角曰商角曰越角皆生於應鍾此其四聲二十八調之略也竊考元定言燕樂大要其律本出夾鍾以十二律兼四清為十六聲而夾鍾為最清此所謂靡靡之聲也觀其律本則其樂可知變宮變徵既非正聲而以變徵為宮以變宮為角反紊亂正聲若此夾鍾宮謂之中呂宮林鍾宮謂之南呂宮者燕樂聲高實以夾鍾為黃鍾也所收二十八調本萬寶常所謂非治世之音俗又於七角調各加一聲流蕩忘反而祖調亦不復存矣聲之感人如風偃草宜風俗之日衰也夫姦聲亂色不留聰明淫樂慝禮不接心術使心知百體皆由順正以行其義此正古君子所以為治天下之本也紹興乾道教坊迄弛不復置云教坊自唐武德以來置署在禁門內開元後其人寖多凡祭祀大朝會則用太常雅樂歲時宴享則用教坊諸部樂前代有宴樂清樂散樂本隸太常後稍歸教坊有立坐二部宋初循舊制置教坊凡四部其後平荊南得樂工三十二人平西川得一百三十九人平江南得十六人平太原得十九人餘藩臣所貢者八十三人又太宗藩邸有七十一人由是四方執藝之精者皆在籍中每春秋聖節三大宴其第一皇帝升坐宰相進酒庭中吹觱栗以衆樂和之賜羣臣酒皆就坐宰相飲作傾盃樂百官飲作三臺第二皇帝再舉酒羣臣立於席後樂以歌起第三皇帝舉酒如第二之制以次進食第四百戲皆作第五皇帝舉酒如第二之制第六樂工致辭繼以詩一章謂之口號皆述德美及中外蹈詠之情初致辭羣臣皆起聽辭畢再拜第七合奏大曲第八皇帝舉酒殿上獨彈琵琶第九小兒隊舞亦致辭以述德美第十雜劇罷皇帝起更衣第十一皇帝再坐舉酒殿上獨吹笙第十二蹴踘第十三皇帝舉酒殿上獨彈箏第十四女弟子隊舞亦致辭如小兒隊第十五雜劇第十六皇帝舉酒如第二之制第十七奏鼓吹曲或用法曲或用龜茲第十八皇帝舉酒如第二之制食罷第十九用角觝宴畢其御樓賜酺同大宴崇德殿宴契丹使惟無後場雜劇及女弟子舞隊每上元觀燈樓前設露臺臺上奏教坊樂舞小兒隊臺南設燈山燈山前陳百戲山棚上用散樂女弟子舞餘曲宴會賞花習射觀稼凡游幸但奏樂行酒惟慶節上壽及將相入辭賜酒則止奏樂都知色長二人攝太官令升殿對立逡巡周大宴則酒唱徧曲宴宰相雖各舉酒通用慢曲而舞三臺所奏凡十八調四十大曲一曰正宮調其曲三曰梁州瀛府齊天樂二曰中呂宮其曲二曰萬年歡劍器三曰道調宮其曲三曰梁州薄媚大聖樂四