冰卷珠箔隨風簾樹青蔥紫桂叢五色雲玉樓宴蘭堂宴千千歲越角九望明堂華池露貯香囊秋氣清照秋池曉風度靖邊塵聞新鴈吟風蟬林鍾角九慶時康上林果畫簾垂水精簟夏木繁暑氣清風中琴轉輕車清風來仙呂調十五喜清和芰荷新清世歡玉鈎欄金步搖金錯落燕引雛草芊芊步玉砌整華裾海山青旋絮綿風中帆青絲騎喜聞聲南呂調七春景麗牡丹開展芳茵紅桃露囀林鶯滿林花風飛花中呂調九宴嘉賓會羣仙集百祥凭朱欄香煙細仙洞開上馬杯拂長袂羽觴飛高般涉調九喜秋成戲馬臺汎秋菊芝殿樂鸂𩻸杯玉芙蓉偃干戈聽秋砧秋雲飛般涉調十玉樹花望星斗金錢花玉牕深萬民康瑤林風隨陽鴈倒金罍鴈來賓看秋月黃鍾羽七宴鄒枚雲中樹燎金罏澗底松嶺頭梅玉罏香瑞雪飛平調十萬國朝獻春盤魚上冰紅梅花洞中春春雪飛飜羅袖落梅花夜遊樂鬥春雞因舊曲造新聲者五十八正宮南呂宮道調宮越調南呂調並傾杯樂三臺仙呂宮高宮小石調大石調高大石調小石角雙角高角大石角歇指角林鍾角越角高般涉調黃鍾羽平調並傾杯樂中呂宮傾杯樂劍器感皇化三臺黃鍾宮傾杯樂朝中措三臺雙調傾杯樂攤破拋毬樂醉花間小重山三臺林鍾商傾杯樂洞中仙望行宮三臺歇指調傾杯樂洞仙歌三臺仙呂調傾杯樂月宮仙戴仙花三臺中呂調傾杯樂菩薩蠻瑞鷓鴣三臺般涉調傾杯樂望征人嘉宴樂引駕回拜新月三臺若宇宙賀皇恩降聖萬年春之類皆藩邸所作以述太祖美德諸曲多祕而平晉普天樂者平河東回所製萬國朝天樂者又明年所製每宴享常用之然帝勤求治道未嘗自逸故舉樂有度雍熙初教坊使郭守中求外任止賜束帛真宗不喜鄭聲而或為雜詞未嘗宣布于外太平興國中伶官蔚茂多侍大宴聞雞唱殿前都虞候崔翰問之曰此可被管弦乎茂多即法其聲製曲曰雞叫子又民間作新聲者甚衆而教坊不用也太宗所製曲乾興以來通用之凡新奏十七調總四十八曲黃鍾道調仙呂中呂南呂正宮小石歇指高平般涉大石中呂仙呂雙越調黃鍾羽其急慢諸曲幾千數又法曲龜茲鼓笛三部凡二十有四曲仁宗洞曉音律每禁中度曲以賜教坊或命教坊使撰進凡五十四曲朝廷多用之天聖中帝嘗問輔臣以古今樂之異同王曾對曰古樂祀天地宗廟社稷山川鬼神而聽者莫不和悅今樂則不然徒虞人耳目而蕩人心志自昔人君流連荒亡者莫不繇此帝曰朕於聲技固未嘗留意內外宴遊皆勉強耳張知白曰陛下盛德外人豈知之願備書時政記世號太常為雅樂而未嘗施於宴享豈以正聲為不美聽哉夫樂者樂也其道雖微妙難知至於奏之而使人悅豫和平則不待知音而後能也今太常樂縣鍾磬塤箎搏拊之器與夫舞綴羽籥干戚之制類皆倣古逮振作之則聽者不知為樂而觀者厭焉古樂豈真若此哉孔子曰惡鄭聲恐其亂雅亂之云者似是而非也孟子亦曰今樂猶古樂而太常乃與教坊殊絕何哉昔李照胡瑗阮逸改鑄鍾磬處士徐復笑之曰聖人寓器以聲不先求其聲而更其器其可用乎照瑗逸制作久之卒無所成蜀人房庶亦深訂其非是因著書論古樂與今樂本末不遠其大略以謂上古世質器與聲朴後世稍變焉金石鍾磬也後世易之為方響絲竹琴簫也後世變之為箏笛匏笙也攢之以斗塤土也變而為甌革麻料也擊而為鼓木柷敔也貫之為板此八音者於世甚便而不達者指廟樂鎛鍾鎛磬宮軒為正聲而概謂夷部鹵部為淫聲殊不知大輅起於椎輪龍艘生於落葉其變則然也古者食以俎豆後世易以杯盂簟席以為安後世更以榻桉使聖人復生不能舍杯盂榻桉而復俎豆簟席之質也八音之器豈異此哉孔子曰鄭聲淫者豈以其器不若古哉亦疾其聲之變爾試使知樂者由今之器寄古之聲去惉懘靡曼而歸之中和雅正則感人心導和氣不曰治世之音乎然則世所謂雅樂者未必如古而教坊所奏豈盡為淫聲哉當數子紛紛銳意改制之後庶之論指意獨如此故存其語以俟知者教坊本隸宣徽院有使副使判官都色長色長高班大小都知天聖五年以內侍二人為鈐轄嘉祐中詔樂工每色額止二人教頭止三人有闕即填異時或傳詔增置許有司論奏使副歲閱雜劇把色人分三等遇三殿應奉人闕即以次補諸部應奉及二十年年五十已上許補廟令或鎮將官制行以隸太常寺同天節寶慈慶壽宮生辰皇子公主生凡國之慶事皆進歌樂詞熙寧九年教坊副使花日新言樂聲高歌者難繼方響部器不中度絲竹從之宜去噍殺之急歸嘽緩之易請下一律改造方響以為樂準絲竹悉從其聲則音律諧協以導中和之氣詔從之十一月奏新樂於化成殿帝諭近臣曰樂聲第降一律已得寬和之節矣增賜方響為架三十命太常下法駕鹵部樂一律如教坊云初熙寧二年五月罷宗室正任以上借教坊樂人至八年復之許教樂政和三年五月詔比以大晟樂播之教坊嘉與天下共之可以所進樂頒之天下八月尚書省言大晟府宴樂已撥歸教坊所有諸府從來習學之人元降指揮令就大晟府教習今當並就教坊習學從之四年正月禮部奏教坊樂春或用商聲孟或用季律甚失四時之序乞以大晟府十二月所定聲律令教坊閱習仍令祕書省撰詞高宗建炎初省教坊紹興十四年復置凡樂工四百六十人以內侍充鈐轄紹興末復省孝宗隆興二年天申節將用樂上壽上曰一歲之間只兩宮誕日外餘無所用不知作何名色大臣皆言臨時點集不必置教坊上曰善乾道後北使每歲兩至亦用樂但呼市人使之不置教坊止令修內司先兩旬教習舊例用樂人三百人百戲軍百人百禽鳴二人小兒隊七十一人女童隊百三十七人築毬軍三十二人起立門行人三十二人旗鼓四十人以上並臨安府差相撲等子二十一人御前忠佐司差命罷小兒及女童隊餘用之雲韶部者黃門樂也開寶中平嶺表擇廣州內臣之聰警者得八十人令於教坊習樂藝賜名簫韶部雍熙初改曰雲韶每上元觀燈上巳端午觀水嬉皆命作樂於宮中遇南至元正清明春秋分社之節親王內中宴射則亦用之奏大曲十三一曰中呂宮萬年歡二曰黃鍾宮中和樂三曰南呂宮普天獻壽此曲亦太宗所製四曰正宮梁州五曰林鍾商汎清波六曰雙調大定樂七曰小石調喜新春八曰越調胡渭州九曰大石調清平樂十曰般涉調長壽仙十一曰高平調罷金鉦十二曰中呂調綠腰十三曰仙呂調綵雲歸樂用琵琶箏笙觱栗笛方響杖鼓羯鼓大鼓拍板雜劇用傀儡後不復補鈞容直亦軍樂也太平興國三年詔籍軍中之善樂者命曰引龍直每巡省遊幸則騎導車駕而奏樂若御樓觀燈賜酺則載第一山車端拱二年又選捧日天武拱聖軍曉暢音律者增多其數以中使監視藩臣以樂工上貢者亦隸之淳化四年改名鈞容直取鈞天之義初用樂工同雲韶部大中祥符五年因鼓工溫用之請增龜茲部如教坊其奉天書及四宮觀皆用之有指揮使一人都知二人副都知二人押班三人應奉文字一人監領內侍二人嘉祐元年係籍三百八十三人六年增置四百三十四人詔以為額闕即補之七年詔隸班及二十四年年五十以上者聽補軍職隸軍頭司其樂舊奏十六調凡三十六大曲鼓笛二十一曲幷他曲甚衆嘉祐二年監領內侍言鈞容直與教坊樂並奏聲不諧詔罷鈞容舊十六調取教坊十七調肄習之雖間有損益然其大曲曲破幷急慢諸曲與教坊頗同矣紹興中鈞容直舊管四百人楊存中請復收補權以舊管之半為額尋聞其召募騷擾降詔止之及其以應奉有勞進呈推賞又申諭止於支賜一次庶杜其日後希望紹興三十年復詔鈞容班可蠲省令殿司比擬一等班直收頓內老弱癃疾者放停教坊所嘗援祖宗舊典點選入教雖暫從其請紹興三十一年有詔教坊即日蠲罷各令自便東西班樂亦太平興國中選東西班習樂者樂器獨用銀字觱栗小笛小笙每騎從車駕而奏樂或巡方則夜奏於行宮殿庭諸軍皆有善樂者每車駕親祀回則衣緋綠衣自青城至朱雀門列於御道之左右奏樂迎奉其聲相屬聞十數里或軍宴設亦奏之棹刀槍牌翻歌等不常置清衞軍習樂者令鈞容直教之內侍主其事園苑賜會及館待契丹使人又有親從親事樂及開封府衙前樂園苑又分用諸軍樂諸州皆有衙前樂四夷樂者元豐六年五月召見米脂砦所降戎樂四十二人奏樂於崇政殿以三班借職王恩等六人差監在京閑慢庫務門及舊城門敢勇三十六人與茶酒新任殿侍大晟樂書曰前此宮架之外列熊羆案所奏皆夷樂也豈容淆雜大樂乃奏罷之然古鞮鞻氏掌四夷樂韎師旄人各有所掌以承祭祀以供宴享蓋中天下而立得四海之歡心使鼓舞焉先王之所不廢也漢律曰每大朝會宜設於殿門之外天子御樓則宮架之外列於道側豈可施於廣庭與大樂並奏哉
