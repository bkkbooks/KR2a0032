body:
  text: 宋史卷六本紀第六真宗一真宗應符稽古神功讓德文明武定章聖元孝皇帝諱恆太宗第三子也母曰元德皇后李氏初乾德五年五星從鎮星聚奎明年正月后夢以裾承日有娠十二月二日生于開封府第赤光照室左足指有文成天字幼英睿姿表特異與諸王嬉戲好作戰陣之狀自稱元帥太祖愛之育於宮中嘗登萬歲殿升御榻坐太祖大奇之撫而問曰天子好作否對曰由天命耳比就學受經一覽成誦初名德昌太平興國八年授檢校太保同中書門下平章事封韓王改名元休端拱元年封襄王改元侃淳化五年九月進封壽王加檢校太傅開封尹至道元年八月立為皇太子改今諱仍判府事故事殿廬幄次在宰相上宮僚稱臣皆推讓弗受見賓客李至李沆必先拜迎送降階及門開封政務填委帝留心獄訟裁決輕重靡不稱愜故京獄屢空太宗屢詔嘉美三年三月太宗崩奉遺制即皇帝位於柩前夏四月乙未尊皇后為皇太后赦天下常赦所不原者咸除之丙申羣臣請聽政表三上從之戊戌始見羣臣于崇政殿西序尋賜器幣癸卯門下侍郎兼兵部尚書平章事呂端加右僕射弟越王元份進封雍王吳王元傑進封兗王並兼中書令徐國公元偓進封彭城郡王涇國公元偁進封安定郡王並同平章事元儼封曹國公姪閬州觀察使惟吉為武信軍節度使侍衞馬步軍都虞候傅潛殿前都指揮使王超侍衞馬軍都指揮使李繼隆侍衞步軍都指揮使高瓊並領諸軍節度駙馬都尉王承衍石保吉魏咸信並為諸軍節度使甲辰宣徽北院使知樞密院事趙鎔加南院使左丞李至禮部侍郎李沆並參知政事丁未中外羣臣進秩一等罷鹽鐵度支戶部副使癸丑置鎮戎軍乙卯靜海軍節度使交趾郡王黎桓加兼侍中進封南平王五月丁卯詔求直言庚午命兩制議豐盈之術以聞甲戌戶部侍郎參知政事李昌齡責授忠武行軍司馬甲申放宮人給事歲久者丙戌以鎮安軍節度使李繼隆同平章事封姊秦國晉國二公主並為長公主齊國公主改許國長公主妹宣慈賢懿壽昌萬壽四公主並為長公主丁亥立秦國夫人郭氏為皇后六月乙未以太宗墨蹟賜天下名山戊戌追復涪王廷美西京留守兼中書令秦王贈兄魏王德昭太傅岐王德芳太保己亥上大行皇帝謚曰神功聖德文武皇帝廟號太宗辛丑詔罷獻祥瑞甲辰復封兄元佐為楚王乙巳追冊莒國夫人潘氏為皇后謚莊懷以工部侍郎同知樞密院事錢若水為集賢院學士贈弟元億為代國公秋七月乙丑詔轉運使更迭赴闕訪以民事癸酉詔訪孔子嫡孫乙亥以殿前都虞候范廷召領河西軍節度使葛霸保順軍節度使王漢忠威塞軍節度使康保裔彰國軍節度使王昭遠保靜軍節度使甲申以范廷召葛霸為定州鎮州駐泊都部署王漢忠為高陽關行營都部署康保裔為幷代州都部署八月丙申罷鹽井役己亥以鎮海軍節度使曹彬為樞密使知樞密院事趙鎔為壽州觀察使同知樞密院事李惟清為御史中丞戶部侍郎向敏中給事中夏侯嶠並為樞密副使庚子命以十二月二日為承天節戊申太白犯太微己酉封乳母齊國夫人劉氏為秦國延壽保聖夫人先是帝以漢唐封乳母為夫人縣君故事付中書已乃有是命戊午熒惑入東井庚申西川廣武卒劉旴逐巡檢使韓景祐掠蜀漢等州招安使上官正鈐轄馬知節討平之九月丁丑二星隕西南戊寅以孔子四十五世孫延世為曲阜縣令襲封文宣公冬十月夏人寇靈州合河都部署楊瓊擊走之己酉葬太宗于永熙陵丁巳賜山陵使而下銀帛有差歲星入氐十一月甲子祔太宗神主于太廟以懿德皇后配祔莊懷皇后於別廟丙寅詔兩京死罪以下遞減一等緣山陵役民賜租有差己巳詔工部侍郎錢若水修太宗實錄己卯賜帛西鄙餫餉士卒閱騎射擢精銳者十人遷職乙酉廢理檢院十二月癸巳承天節羣臣上壽於崇德殿丙申追尊母賢妃李氏為皇太后辛丑詔諸路轉運使申飭令長劭農甲辰以銀州觀察使趙保吉為定難軍節度使咸平元年春正月辛酉詔改元丙寅上皇太后李氏謚曰元德丁丑召學官崔頤正講書因命宰臣選明經術者以聞戊寅閱御龍直辛巳僧你尾尼等自西天來朝稱七年始達甲申彗出營室北二月癸巳呂端等言彗出之應當在齊魯分帝曰朕以天下為憂豈直一方耶甲午詔求直言避殿減膳乙未慮囚老幼疾病流以下聽贖杖以下釋之丁酉彗滅三月己巳置太平州壬申賜進士孫僅等宴瓊林辛巳以趙保吉歸順遣使諭陝西縱綏銀流民還鄉家給米一斛夏四月旱壬辰禱白鹿山壬寅趙保吉遣弟繼瑗入謝己酉遣使按天下吏民逋負悉除之五月戊午朔日有食之甲子幸大相國寺祈雨升殿而雨六月辛卯詔近臣舉常參官才堪轉運使者丙辰以旱免開封二十五州軍田租秋七月甲子詔民供億山陵者賜租什二己巳詔沿淮諸州藏瘞遺骸八月癸卯禁新小錢己酉幸諸王宮九月己巳詔呂端錢若水重修太祖實錄壬申賜終南隱士种放粟帛緡錢己卯以左衞上將軍張永德為太子太師冬十月丙戌朔日有食之戊子呂端為太子太保戶部尚書張齊賢參知政事李沆並平章事李至為武勝軍節度使己丑參知政事溫仲舒罷為禮部尚書樞密副使夏侯嶠罷為戶部侍郎翰林侍讀學士以樞密副使向敏中為兵部侍郎參知政事翰林學士楊礪宋湜並為樞密副使丙午許羣臣著述詣閤獻令兩制銓簡十一月丙辰龍鉢貢馬二千騎甲子詔葺歷代帝王陵廟十二月庚寅幸許國長公主第視疾癸卯令三司判官舉才堪知州者各一人是歲溪峒吐蕃諸族勒浪十六府大首領甘州回鶻西南蕃黎州山後蠻來貢定州雹傷稼遣使振恤除是年租二年春正月甲子詔尚書丞郎給舍舉升朝官可守大郡者各一人丙子定諸司使以下至三班使臣有罪比品聽贖二月丙申以趙普配饗太祖廟庭詔羣臣迎養父母蠲天下逋負釋繫囚己酉戒百官比周奔競有弗率者御史臺糾之三月丙辰江浙發廩振饑戊辰置荊湖南路轉運使壬申王漢忠為涇原邠寧靈環都部署閏月丁亥以久不雨帝諭宰相曰凡政有闕失宜相規以道毋惜直言詔天下繫囚非十惡枉法及已殺人者死以下減一等幸許國長公主第視疾又幸北宅視德愿疾詔兩京諸路收瘞暴骸營塞破塚戊子幸太一宮天清寺祈雨己丑上皇太后宮名曰萬安庚寅罷有司營繕之不急者詔中外臣直言極諫從弟德愿卒壬辰雨辛丑江南轉運使言宣歙竹生米民採食之丙午詔江浙饑民入城池漁採勿禁夏四月丙寅許國長公主薨五月丁亥嚴服用之制乙巳幸曹彬第視疾六月丁巳宰臣進重修太祖實錄戊午曹彬薨庚辰大食國遣使來貢七月甲申以傅潛為鎮定高陽關行營都部署張昭允為都鈐轄給外任官職田己丑以橫海軍節度使王顯為樞密使壬寅製聖教序賜傳法院甲辰幸國子監召學官崔偓佺講尚書大禹謨還幸崇文院賜秘書監祭酒以下器幣丙午置翰林侍讀學士以兵部侍郎楊徽之等為之置翰林侍講學士以國子祭酒邢昺為之八月辛亥御文德殿文武百官入閤乙卯羣臣上尊號曰崇文廣武聖明仁孝皇帝丁巳大宴崇德殿始作樂戊午社宴近臣于中書丙寅大閱於東北郊癸酉楊礪卒乙亥以太師贈濟陽郡王曹彬配饗太祖廟庭司空贈太尉中書令薛居正忠武軍節度使贈中書令潘美右僕射贈侍中石熙載配饗太宗廟庭九月庚辰朔日有食之戊子召宗室宴射後苑甲午奉安太宗聖容於啟聖院新殿帝拜而慟左右皆掩泣賜修殿內侍緡錢癸卯幸騏驥院賜從官馬還宴射後苑鎮定都部署言敗契丹兵於廉良路殺獲甚衆冬十月壬子宜州執溪峒蠻酋三十餘人詣闕詔釋其罪遣還癸丑放澧州蠻界歸業民租戊午置福建路惠民倉十一月壬午詔親王領大都督府節鎮者勿兼長史乙酉饗太廟丙戌祀天地于圜丘以太祖太宗配大赦天下錄功臣子孫之無祿者御朝元殿受尊號冊丁亥賜羣臣帶服鞍馬器幣有差庚寅大宴含光殿壬辰張齊賢加門下侍郎李沆加中書侍郎中外臣悉加恩甲午以左神武軍大將軍德恭為左衞大將軍左衞大將軍德彝為左神武軍大將軍乙未詔幸河北所次頓舍給用毋泛及州縣以周瑩為駕前軍都部署石保吉為行營先鋒都部署己亥狩近郊辛丑賜京城父老衣帛戊申以魏咸信為貝冀行營都部署己酉以李沆為東京留守十二月辛亥賜近臣戎服馬甲寅駕發京師次陳橋王昭遠卒戊午駐蹕澶州冀州言敗契丹兵於城南殺千餘人奪馬百餘匹辛酉宴從臣于行宮以王超等督先鋒仍示以陣圖俾識部分壬戌賜近臣甲冑弓劍幸浮橋登臨河亭賜澶州父老錦袍茶帛甲子次大名躬御鎧甲於中軍契丹攻威虜軍本軍擊敗之殺其酋帥府州言官軍入契丹五合川拔黃太尉砦殲其衆焚其車帳獲馬牛萬計丁卯召見大名府父老勞賜之是歲沙州蕃族首領邛部川蠻西南蕃占城大食國來貢江浙廣南荊湖旱嵐州春霜害稼分使發粟振之三年春正月己卯朔駐蹕大名府詔幷代都部署高瓊等分屯冀州邢州辛巳臨視樞密副使宋湜疾癸未以葛霸為貝冀高陽關前軍行營都部署萊州防禦使田紹斌凡十人以功進秩契丹犯河間高陽關都部署康保裔死之乙酉流忠武軍節度使傅潛于房州都鈐轄張昭允于通州並削奪官爵丁亥幸紫極宮還登子城閱騎射高陽關貝冀路都部署范廷召等追契丹至莫州斬首萬餘級庚寅赦河北及淄齊州罪人非持杖劫盜謀故殺枉法贓十惡至死者並釋之錄將吏死事者子孫民被焚掠者復其租罷緣邊二十三州軍榷酤令諸州舉吏民有武藝及材力過人者壬辰宋湜卒甲午發大名府益州軍變害鈐轄符昭壽逐知州牛冕等推都虞候王均為首作亂詔戶部使雷有終為瀘州觀察使帥師會李惠等討之均閉城門固守庚子至自大名府戊申幸呂端第視疾二月庚申宴含光殿辛酉詔近臣幷知雜御史尚書省五品及帶館閣三司職者各舉升朝官有武幹堪邊任一人癸亥以周瑩為宣徽南院使王繼英為北院使並知樞密院事王旦為給事中同知樞密院事乙丑以王顯為定州路行營都部署王超為鎮州路行營都部署丁卯益州王均開城偽遁雷有終等入城為所敗退保漢州李惠死之戊辰京畿旱慮囚癸酉大雨甲戌置靜樂軍丙子賞花苑中召從臣宴射三月戊寅朔日有食之甲午御崇政殿試禮部貢舉人夏四月戊申朔賜進士陳堯咨等袍笏庚戌呂端薨甲寅閱河北防城舉人康克勤等搫射乙卯葬元德皇太后丁巳以葛霸為邠寧環慶都部署壬申前知益州牛冕西川轉運使張適並削籍冕流儋州適為連州參軍五月丁卯詔天下死罪減一等流以下釋之十惡至死謀故劫殺坐贓枉法者論如律幸玉津園觀刈麥己丑幸金明池觀水嬉遂幸瓊林苑宴射壬寅御試河北舉人河決鄆州詔徙州城六月己未太白晝見丁卯以向敏中為河北河東宣撫使按巡郡國存慰士民秋七月己亥以翰林侍讀學士夏侯嶠侍講邢昺為江浙巡撫使八月辛亥京東水災遣使安撫九月庚辰賜契丹降人蕭肯頭名懷忠為右領軍衞將軍嚴州刺史招鶻名從化為右監門衞將軍虫哥名從順為千牛衞將軍壬辰幸大相國寺遂宴射玉津園壬寅衞國公張永德薨冬十月甲辰雷有終大敗賊黨復益州殺三千餘人壬子綿漢都巡檢澄州刺史張思鈞削籍流封州乙卯幸元份宮視疾令諸州兼羣牧己未濱州防禦使王榮削籍流均州己丑雷有終追斬王均于富順監禽其黨六千餘人詔原川峽路繫囚雜犯死罪以下雷有終等以功進秩有差丙寅以翰林學士王欽若知制誥梁顥分為川峽安撫使延州言破大盧小盧等十族獲人畜二十萬十一月甲戌環慶副部署徐興削籍配郢州乙亥靈州副部署孫進責授復州團練副使鄆州決河塞戊寅均畿內田稅壬午詔羣臣盡言無諱常參官轉對如故事未預次對者聽封事以聞辛卯日南至御朝元殿受朝丙申張齊賢罷為兵部尚書十二月戊申狩近郊以親獲禽獻太廟甲寅大宴含光殿乙卯幸元份宮視疾丁巳閱武藝遂宴射苑中庚申罷京畿均田稅育吾蕃部貢犛牛甲子契丹稅木監使黃顒等率屬內附賜冠帶丙寅開封府奏獄空詔嘉之丁卯詔河東北緣邊吏民斬邊寇首一級支錢五千禽者倍之獲馬者給帛二十匹是歲高麗大食國高州蠻來貢畿內江南荊湖旱果閬州水並振之四年春正月甲戌朔詔天下繫囚死罪已下減一等杖罪釋之辛巳幸范廷召第視疾甲申命樞密直學士馮拯陳堯叟詳中外封事詔應益州軍民因城亂殺傷劫盜除官吏外皆釋不問乙酉命收瘞西川遺骸丁亥幸開寶寺還御乾天門觀燈庚子謁啟聖院太宗神御殿二月丁未祈雨戊申交州黎桓貢馴犀象癸丑決天下獄丁巳幸大相國寺上清宮祈雨戊午雨帝方臨軒決事霑服不御蓋壬戌詔羣臣子弟奏補京官者試一經甲子釋逋負官物者二千六百餘人蠲逋負物二百六十餘萬已納而非理者以內府錢還之沒者給其家丙寅詔學士兩省御史臺五品尚書省諸司四品以上舉賢良方正直言敢諫一人己巳置永利監三月甲戌撫水州蠻酋蒙瑛等來納兵器毒藥箭誓不復犯邊乙亥詔史館韓瑗等舉御史臺推勘官丁丑風雪帝謂宰相曰霾曀頗甚卿等思闕政以佐予治李沆等乞免官不許辛巳分川峽轉運使為益利梓夔四路召終南隱士种放辭疾不至庚寅左僕射呂蒙正兵部侍郎向敏中並平章事中書侍郎平章事李沆加門下侍郎高瓊為殿前都指揮使葛霸為侍衞馬軍都指揮使王漢忠為殿前副都指揮使並領節度司天監進儀天曆辛卯以參知政事王化基為工部尚書同知樞密院事王旦為工部侍郎參知政事樞密直學士馮拯陳堯叟並為右諫議大夫同知樞密院事夏四月丙午葛霸為幷代行營都部署壬子詔親老無兼侍者特與近任回鶻可汗祿勝貢玉勒鞍名馬寶器願以兵助討繼遷丙辰審官院引對京朝官閱殿最而黜陟之己未以王欽若為左諫議大夫參知政事庚申幸元份宮視疾遂幸諸王宮辛未御試制科舉人五月壬申朔御乾元殿受朝京畿繫囚罪流以下遞減一等杖罪釋之癸酉以元儼為平海軍節度使甲申工部侍郎致仕朱昂對便殿賜器幣戊子亳州貢白兔還之乙未大同軍留後桑贊為侍衞步軍副都指揮使領河西軍節度六月癸卯有司言減天下冗吏凡十九萬五千餘人丁巳詔東川民田先為江水所害者除其租丁卯詔州縣學校及聚徒講誦之所並賜九經戊申出陣圖示宰相命督將練士以備北邊秋七月庚午以河朔餽運勞民詔轉運使減徭役存恤己卯邊臣言契丹謀入寇以王顯為鎮定高陽關三路都部署王超為副都部署王漢忠為都排陣使八月辛丑張齊賢為涇原等州安撫經略使戊申出環慶至靈州地圖險要示宰相議戰守方略己酉御試制科舉人壬子幸開寶寺又幸御龍營閱武藝賜緡錢有差遂觀稼北郊宴射於含芳園丁卯遣使巴蜀廉察風俗官吏能否戊辰社宴宰相於中書九月慶州地震李繼遷陷清遠軍冬十月曹璨以蕃兵邀李繼遷輜重於唐龍鎮己未張斌破契丹於長城口十一月壬申知階州竇玭獻白鷹還之王顯奏破契丹戮二萬人獲統軍鐵林等癸未京城民獲金牌有趙為君萬年字庚寅畋近郊甲午龜茲國來貢十二月丁未詔蜀賊王均既平除追捕亡命餘詿誤之民並釋不問訛言動衆者有司斬以聞丙寅太白晝見南斗丁卯詔罷三路都部署兼河北轉運使閏月己巳幸大相國寺丁丑邠寧副都部署楊瓊等七將流嶺南戊寅李繼遷蕃族訛遇等歸順己卯以兵部尚書張齊賢為右僕射壬午靈州言河外砦主李瓊等以城降西夏上念其力屈就禽特釋其親屬乙酉李繼遷部族訛豬等率屬來附庚寅河北饑蠲賦減役發廩振之是歲龜茲丹眉流宜高上溪撫水州蠻來貢梓州水遣使振恤五年春正月壬寅李繼遷部將臥浪己等內附給田宅壬戌環慶部署張凝襲諸蕃焚族帳二百餘斬首五千級降九百餘人二月乙酉詔邊士疾病戰沒者冬春衣聽給其家己丑幸上清宮以王漢忠為邠寧環慶路都部署三月丁酉李繼遷陷靈州知州裴濟死之庚戌比部員外郎洪湛削籍流儋州工部尚書趙昌言責授安遠軍司馬知雜御史范正辭滁州團練副使己未御試禮部舉人夏四月壬申詔陝西民輓送緣邊芻糧者賜租之半壬午命三司歲較戶口丙戌賜深霸九州民租有差癸巳復雄州榷場五月庚子減河北冗官壬寅知榮州褚德臻坐盜取官銀棄市癸卯置憲州代州進士李光輔善擊劍詣闕帝曰若奬用之民悉好劍矣遣還甲辰詔申明內侍養一子制乙巳蠲天下逋負丙午以王顯為河陽三城節度使六月癸酉繼遷圍麟州曹璨請濟師詔發幷代石隰州兵援之乙亥以侍衞馬軍都虞候王超為定州路駐泊行營都部署己卯以宣徽南院使知樞密院事周瑩為永清軍節度使己酉詔益兵八千分屯環慶涇原知麟州衞居實言繼遷以衆二萬來攻城兵出擊走之殺傷過半是月都城大雨壞廬舍民有壓死者振恤其家秋七月甲午朔日有食之戊戌幸啟聖院太平興國寺上清宮致禱雨霽遂幸龍衞營視所壞垣室勞賜有差乙巳召終南隱士种放疏丁岡河癸丑詔許高州蠻田彥伊子承寶等入朝賜器帛冠帶乙卯募河北丁壯壬戌契丹大林砦使王昭敏等來降戎人寇洪德砦守將擊走之癸亥增川峽官奉錢八月羣臣三表上尊號不允丙子沙州曹宗壽遣使入貢以宗壽為歸義軍節度使乙酉石隰部署言河西蕃族拽浪南山等四百人來歸九月戊申种放對于便殿授左司諫直昭文館乙卯賜种放第宅冬十月己巳遣使齎藥賜鎮戎軍將士戊寅詔河西戎人歸順者給內地閒田處之又詔諸州長吏與佐職官同錄問大辟罪人辛巳涇原部署繫內屬蕃族數叛者九十一人請誅之詔釋其罪丁亥平章事向敏中罷為戶部侍郎右僕射張齊賢為太常卿庚寅修豐州城十一月壬辰詔麟州給復一年甲午六谷首領潘羅支等貢馬第給其直辛丑享太廟壬寅祀天地于圜丘大赦丁未白州民黃受百餘歲賜粟帛己酉封子玄祐為信國公庚戌呂蒙正加司空李沆加右僕射楚王元佐為右羽林軍上將軍雍王元份守太傅兗王元傑守太保曹國公元儼同平章事十二月壬午賜京城百歲老人祝道嵓爵一級癸未遷麟州內屬人於樓煩是歲河北鄭曹滑州饑振之
