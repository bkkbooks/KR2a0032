body:
  text: 宋史卷一百五十三志第一百六輿服五諸臣服下士庶人服公服凡朝服謂之具服公服從省今謂之常服宋因唐制三品以上服紫五品以上服朱七品以上服緑九品以上服青其制曲領大袖下施橫襴束以革帶幞頭烏皮鞾自王公至一命之士通服之太宗太平興國二年詔朝官出知節鎮及轉運使副衣緋緑者並借紫知防禦團練刺史州衣緑者借緋衣緋者借紫其為通判知軍監止借緋其後江淮發運使同轉運提點刑獄同知刺史州雍熙初郊祀慶成始許升朝官服緋緑二十年者賜緋紫真宗登極京朝官亦聽及東封西祀赦書京朝官並以十五年為限後每帝登極亦如例景德三年詔內諸司使以下出入內庭不得服皂衣違者論其罪內職亦許服窄袍仁宗景祐元年詔軍使曾任通判者借緋曾任知州者借紫慶曆元年龍圖閣直學士任布言欲望自今贈官至正郎者其畫像許服緋至卿監許服紫從之嘉祐三年詔三品轉運使朝辭上殿日與賜章服諸路轉運使候及十年即與賜章服神宗熙寧元年中書門下奏六品以上犯贓濫或私罪徒重者不得因本品改章服從之元豐元年去青不用階官至四品服紫至六品服緋皆象笏佩魚九品以上則服緑笏以木武臣內侍皆服紫不佩魚假版官及伎術若公人之人入品者並聽服緑官應品而服色未易與品未及而已易者或以年格或以特恩五年詔六曹尚書依翰林學士例六曹侍郎給事中依直學士例朝謝日不以行守試並賜服佩魚罷職除他官日不帶行徽宗重和元年詔禮制局自冠服討論以聞其見服鞾先改用履禮制局奏履有絇繶純綦古者舄履各隨裳之色有赤舄白舄黑舄今履欲用黑革為之其絇繶純綦並隨服色用之以倣古隨裳色之意詔以明年正旦改用禮制局又言履隨其服色武臣服色一等當議差別詔文武官大夫以上具四飾朝請郎武功郎以下去繶並稱履從義郎宣教郎以下至將校伎術官去繶純並稱履當時議者以鞾不當用之中國實廢釋氏之漸云中興仍元豐之制四品以上紫六品以上緋九品以上緑服緋紫者必佩魚謂之章服非官至本品不以假人若官卑而職高則特許者有三自庶官遷六部侍郎自庶官為待制或出奉使者是也又有以年勞而賜者有品未及而借者升朝官服緑大夫以上服緋蒞事至今日以前及二十年歷任無過者許磨勘改授章服此賜者也或為通判者許借緋為知州監司者許借紫任滿還朝仍服本品此借者也又有出於恩賜者焉紹興十二年九月以皇太后回鑾詔承務郎以上服緋緑蒞事至今日以前十七年者並改轉服色三十二年六月孝宗即位詔承務郎以上服緋緑及十五年者並許改轉服色然計年之法亦不輕許無出身人自年二十出官服緑日起理服緋人亦自年二十服緋日起理有出身人自賜出身日起理內並除豁丁憂年月日不理外歷任無過者方許焉先是殿中侍御史張震奏今日之弊在於人有僥幸能革其俗然後天下可治且改轉服色常赦自升朝官以上服緑大夫以上服緋蒞事及二十年方得改賜今赦日承務郎以上服緋緑及十五年便與改轉比之常赦不惟年限已減而又官品相絶蓋已為異恩矣今竊聞省部欲自補官日便理歲月即是嬰孩授命年才十五者今遂服緋而貴近之子或初年賜緋年才及冠者今遂賜紫朱紫紛紛不亦濫乎況靖康建炎恩赦亦不曾以補官日為始若始於出官之日頗為折衷蓋比之蒞事所減已多而比之初補粗為有節帝從其言故有是命又有出於特賜者旌直臣則賜之勸循吏則賜之廣孝治則賜之優老臣則賜之此皆非常制焉內品未至而賜服及借者並於銜內帶賜及借幞頭一名折上巾起自後周然止以軟帛垂腳隋始以桐木為之唐始以羅代繒惟帝服則腳上曲人臣下垂五代漸變平直國朝之制君臣通服平腳乘輿或服上曲焉其初以藤織草巾子為𩹉紗為表而塗以漆後惟以漆為堅去其藤𩹉前為一折平施兩腳以鐵為之帶古惟用革自曹魏而下始有金銀銅之飾宋制尤詳有玉有金有銀有犀其下銅鐵角石墨玉之類各有等差玉帶不許施於公服犀非品官通犀非特旨皆禁銅鐵角石墨玉之類民庶及郡縣吏伎術等人皆得服之其制有金毬路荔支師蠻海捷寶藏方團二十五兩荔支自二十五兩至七兩有四等師蠻二十五兩海捷十五兩寶藏三十兩惟毬路方團胯餘悉方胯荔支或為御仙花束帶亦同金塗天王八仙犀牛寶瓶荔支師蠻海捷雙鹿行虎窪面天王八仙二十五兩犀牛寶瓶自二十五兩至十五兩有二等荔支自二十兩至十兩有三等師蠻自二十兩至十八兩有二等海捷自十五兩至十兩有三等雙鹿自二十兩至四兩有九等行虎七兩窪面自十五兩至十二兩有二等束帶則有金荔支師蠻戲童海捷犀牛胡荽鳳子寶相花荔支自二十五兩至十五兩有三等師蠻戲童二十五兩海捷自二十兩至十兩有二等犀牛二十兩鳳子寶相花十五兩金塗犀牛雙鹿野馬胡荽犀牛野馬十五兩雙鹿自二十兩有三等胡荽自十五兩至十兩有三等犀有上等次等以牯牸為別出黔南者在南海之下太宗太平國興七年正月翰林學士承旨李昉等奏曰奉詔詳定車服制度請從三品以上服玉帶四品以上服金帶以下升朝官雖未升朝已賜紫緋內職諸軍將校並服紅金塗銀排方雖升朝著緑者公服上不得繫銀帶餘官服黑銀方團胯及犀角帶貢士及胥吏工商庶人服鐵角帶恩賜者不用此制荔支帶本是內出以賜將相在於庶僚豈合僭服望非恩賜者官至三品乃得服之景德三年詔通犀金玉帶除官品合服及恩賜外餘人不得服用大中祥符五年詔曰方團金帶優寵輔臣今文武庶官及伎術之流率以金銀放效甚紊彝制自今除恩賜外悉禁之端拱中詔作瑞草地毬路文方團胯帶副以金魚賜中書樞密院文臣仁宗慶曆八年彰信軍節度使兼侍中李用和言伏見張耆授兼侍中日特賜笏頭金帶以為榮異欲望正謝日準例特賜詔如耆例神宗熙寧六年熙河路奏捷宰臣王安石率羣臣賀紫宸殿神宗解所服白玉帶賜之八年岐王皓嘉王頵言蒙賜方團玉帶著為朝儀乞寶藏于家不敢服用神宗不許命工別琢玉帶以賜之皓等固辭不聽請加佩金魚以別嫌詔以玉魚賜之親王佩玉魚自此始宗旦宗諤皆以使相遇郊恩告謝特賜毬文方團金帶佩魚自是宗室節度帶同平章事者著為例宣徽使張方平郭逵王拱辰皆嘗特賜元豐五年詔三師三公宰相執政官開府儀同三司節度使嘗任宰相者觀文殿大學士已上金毬文方團帶佩魚觀文殿學士至寶文閣直學士節度使御史大夫中丞六曹尚書侍郎散騎常侍御仙花帶內御史大夫六曹尚書翰林學士以上及資政殿學士特班翰林學士上者仍佩魚六年詔北使經過處守臣曾借朝議大夫者令權服紫不繫金帶其押賜御筵官仍互借先借朝議大夫者即借中散大夫並許繫金帶不佩魚哲宗元祐五年詔臣僚曾賜金帶後至不該繫者在外許繫徽宗崇寧二年詔六尚局奉御今後許服金帶四年中書省檢會哲宗元符儀制令諸帶三師三公宰相執政官使相節度使觀文殿大學士毬文佩魚節度使非曾任宰相即御仙花佩魚觀文殿學士至寶文閣直學士御史大夫中丞六曹尚書侍郎散騎常侍並御仙花權侍郎不同內御史大夫六曹尚書觀文殿學士至翰林學士仍佩魚資政殿學士特旨班在翰林學士上者同權尚書不同其官職未至而特賜者不拘此令因任職事官經賜金帶者雖後任不該賜亦許服看詳若稱因任六曹侍郎經賜帶後除知開封府之類既非職事官又非在外皆不許繫似非元立法之意蓋立文該舉未盡其特賜者既不緣官職自無時不許繫外因任職事官賜金帶後任不該者亦許服即在外與在京非職事官皆可用詔申明行下大觀二年詔中書舍人諫議大夫待制殿中少監許繫紅犀帶不佩魚中興仍之其等亦有玉有金有銀有金塗銀有犀有通犀有角其制毬文者四方五團御仙花者排方凡金帶三公左右丞相三少使相執政官觀文殿大學士節度使毬文佩魚觀文殿學士至華文閣直學士御史大夫中丞六曹尚書侍郎散騎常侍開封尹給事中並御仙花內御史大夫六曹尚書觀文殿學士至翰林學士仍佩魚中書舍人左右諫議大夫龍圖天章寶文顯謨徽猷敷文煥章華文閣待制權侍郎服紅排方黑犀帶仍佩魚權侍郎以上罷任不帶職者亦許服之魚袋其制自唐始蓋以為符契也其始曰魚符左一右一左者進內右者隨身刻官姓名出入合之因盛以袋故曰魚袋宋因之其制以金銀飾為魚形公服則繫於帶而垂於後以明貴賤非復如唐之符契也太宗雍熙元年南郊後內出以賜近臣由是內外升朝文武官皆佩魚凡服紫者飾以金服緋者飾以銀庭賜紫則給金塗銀者賜緋亦有特給者京官幕職州縣官賜緋紫者亦佩親王武官內職將校皆不佩真宗大中祥符六年詔伎術官未升朝賜緋紫者不得佩魚仁宗天聖二年翰林待詔太子中舍同正王文度因勒碑賜紫章服以舊佩銀魚請佩金魚仁宗曰先朝不許伎術人輒佩魚以別士類不令混淆宜卻其請景祐三年詔殿中省尚藥奉御賜紫徐安仁特許佩魚至和元年詔中書提點五房公事自今雖無出身亦聽佩魚舊制自選人入為堂後官轉至五房提點始得佩魚提點五房呂惟和非選人入援司天監五官正例求佩魚特許之神宗元豐二年蒲宗孟除翰林學士神宗曰學士職清地近非它官比而官儀未寵自今宜加佩魚遂著為令三年詔自今中書堂後官並帶賜緋魚袋餘依舊例徽宗政和元年尚書兵部侍郎王詔奏今監司守倅等並許借服色而不許佩魚即是有服而無章殆與吏無別乞今後應借緋紫臣僚並許隨服色佩魚仍各許入銜候回日依舊服色從之中興並仍舊制笏唐制五品以上用象上圓下方六品以下用竹木上挫下方宋文散五品以上用象九品以上用木武臣內職並用象千牛衣緑亦用象廷賜緋緑者給之中興同鞾宋初沿舊制朝履用鞾政和更定禮制改鞾用履中興仍之乾道七年復改用鞾以黑革為之大抵參用履制惟加靿焉其飾亦有絇繶純綦大夫以上具四飾朝請武功郎以下去繶從義宣教郎以下至將校伎術官並去純底用麻再重革一重𩹉用素衲檳高八寸諸文武官通服之惟以四飾為別服緑者飾以緑服緋紫者飾亦如之倣古隨裳色之意簪戴幞頭簪花謂之簪戴中興郊祀明堂禮畢回鑾臣僚及扈從並簪花恭謝日亦如之大羅花以紅黃銀紅三色欒枝以雜色羅大絹花以紅銀紅二色羅花以賜百官欒枝卿監以上有之絹花以賜將校以下太上兩宮上壽畢及聖及錫宴及賜新進士聞喜宴並如之重戴唐士人多尚之蓋古大裁帽之遺制本野夫巖叟之服以皂羅為之方而垂簷紫𩹉兩紫絲組為纓垂而結之頷下所謂重戴者蓋折上巾又加以帽焉宋初御史臺皆重戴餘官或戴或否後新進士亦戴至釋褐則止太宗淳化二年御史臺言舊儀三院御史在臺及出使並重戴事已久廢其御史出臺為省職及在京釐務者請依舊儀違者罰俸一月從之又詔兩省及尚書省五品以上皆重戴樞密三司使副則不中興後御史兩制知貢舉官新進士上三人許服之時服宋初因五代舊制每歲諸臣皆賜時服然止賜將相學士禁軍大校建隆三年太祖謂侍臣曰百官不賜甚無謂也乃遍賜之歲遇端午十月一日文武羣臣將校皆給焉是歲十月近臣軍校增給錦襯袍中書門下樞密宣徽院節度使及侍衛步軍都虞候以上皇親大將軍以上天下樂暈錦三司使學士中丞內客省使駙馬留後觀察使皇親將軍諸司使廂主以上簇四盤鵰細錦三司副使宮觀判官黃師子大錦防禦團練使刺史皇親諸司副使翠毛細錦權中丞知開封府銀臺司審刑院及待制以上知檢院鼓院同三司副使六統軍金吾大將軍紅錦諸班及諸軍將校亦賜窄錦袍有翠毛宜男雲鴈細錦師子練鵲寶照大錦寶照中錦凡七等應給錦袍者皆五事公服錦寬袍綾汗衫袴勒帛丞郎給舍大卿監以上不給錦袍者加以黃綾繡抱肚大將軍少卿監郎中以上樞密諸房副承旨以上諸司使皇親承制崇班皆四事無錦袍將軍至副率知雜御史至大理正入內都知內侍都知皇親殿直以上皆三事無袴通事舍人承制崇班入內押班內侍副都知押班內常侍六尚奉御以下京官充館閣宗正寺刑法官者皆二事無勒帛內職汗衫以綾文臣以絹閣門祗候內供奉官至殿直京官編修校勘止給公服端午亦給應給錦袍者汗衫以黃縠別加繡抱肚小扇誕聖節所給如時服京師禁廂軍校衛士內諸司胥史工巧人並給服有差朝官京官內職出為外任通判監押巡檢以上者大藩府監務者亦或給之每歲十月時服開寶中皆賜窄錦袍太平興國以後文官知制誥武官上將軍內職諸司使以上皆賜錦藩鎮觀察使以上天下樂暈錦尚書及步軍都虞候以上及知益州並州次暈錦皆五事學士丞郎簇四盤鵰錦刺史以上及知廣州翠毛錦皆三件待制以上橫班諸司使翠毛錦知代州御仙花錦諸司使領郡宜男錦諸司使雲鴈錦駙馬錦如丞郎增至四事益州鈐轄錦從本官增綾袴朝官供奉官以上皆賜紫地皂花欹正京官殿直以下皆賜紫大綾在外禁軍將校亦賜窄錦袍次賜紫綾色絹景德元年始詔河北河東陝西三路轉運使副並給方勝練鵲錦校獵從官兼賜紫羅錦旋襴暖鞾雍熙四年令節度使給皂地金線盤雲鳳鹿胎旋襴侍衛步軍都虞候以上給皂地金線盤花鴛鴦親王宰相使相生日並賜衣五事錦綵百匹金花銀器百兩馬二匹金塗銀鞍勒一宰相樞密使參知政事樞密副使宣徽使初拜加恩中謝日並賜衣五事金帶一舊荔支帶淳化後宰相參知政事文臣任樞密副使改賜方團胯毬路金帶加以金魚塗金銀鞍勒馬一三司使學士御史中丞初拜中謝日賜衣五事荔支金帶一塗金銀鞍勒馬一文明學士以下初賜金裝犀帶後改賜金帶中書舍人賜襲衣犀帶宰相以下對御撎賜樞密直學士中書舍人謝訖中使押賜再入謝于別殿中書舍人或告謝日已改賜章服則罷中使押賜郊禋禮畢親王宰相至龍圖閣直學士禁軍將校各賜襲衣金帶親王中書門下樞密宣徽三司使四廂都指揮使以上加鞍勒馬一其後宮觀副使天書扶侍使並同學士同中謝日雍熙元年兩省五品以下御史臺尚書省四品以上各賜襲衣犀帶魚袋其為五使則皆賜金帶仍各加器幣文武行事官各賜金帛牧伯在外者遇大禮不賜大中祥符元年詔節度觀察防禦團練使刺史因東封為諸州部署鈐轄者並特賜焉使相節度使自鎮來朝入見日賜衣五事金帶鞍馬朝辭日賜窄衣六事金束帶鞍勒馬一散馬二節度使減散馬為都部署者別賜帶甲鞍勒馬一觀察使為都部署副都部署赴本任知州賜窄衣三事金束帶鞍勒馬防禦團練使刺史為部署鈐轄賜窄衣三事金束帶赴本任賜窄衣三事塗金銀腰帶為知州都監賜窄衣三事絹三十匹諸司為鈐轄者賜窄衣金束帶文武官內職出為知州軍通判發運轉運使副提點刑獄都監巡檢寨主軍使及任使繁要者僕射賜窄衣三事絹五十匹尚書丞郎學士諫舍待制大卿監及統軍上將軍諸司使減絹二十匹少卿監至五官正大將軍至副率諸司副使減絹一十匹中郎將京官內殿承制至借職內常侍減衣二事又減絹一十匹窄衣起二月給紫羅衫起十月給紫欹正綿襖給公服者單夾亦然諸道衙內指揮使都虞候入貢辭日賜紫羅窄衫金塗銀帶士庶人車服之制太宗太平興國七年詔曰士庶之間車服之制至于喪葬各有等差近年以來頗成踰僭宜令翰林學士承旨李昉詳定以聞昉奏今後富商大賈乘馬漆素鞍者勿禁近年品官緑袍及舉子白襴下皆服紫色亦請禁之其私第便服許紫皂衣白袍舊制庶人服白今請流外官及貢舉人庶人通許服皂工商庶人家乘檐子或用四人八人請禁斷聽乘車兜子舁不得過二人並從之端拱二年詔縣鎮場務諸色公人並庶人商賈伎術不係官伶人只許服皂白衣鐵角帶不得服紫文武升朝官及諸司副使禁軍指揮使廂軍都虞候之家子弟不拘此限幞頭巾子自今高不過二寸五分婦人假髻並宜禁斷仍不得作高髻及高冠其銷金泥金真珠裝綴衣服除命婦許服外餘人並禁至道元年復許庶人服紫真宗咸平四年禁民間造銀鞍瓦金線盤蹙金線大中祥符元年三司言竊惟山澤之寶所得至難儻縱銷釋實為虛費今約天下所用歲不下十萬兩俾上幣棄於下民自今金銀箔線貼金銷金泥金蹙金線裝貼什器土木玩用之物並請禁斷非命婦不得以為首飾冶工所用器悉送官諸州寺觀有以金箔飾尊像者據申三司聽自齎金銀工價就文思院換給從之二年詔申禁鎔金以飾器服又太常博士知溫州李邈言兩浙僧求丐金銀珠玉錯末和泥以為塔像有高袤丈者毀碎珠寶寖以成俗望嚴行禁絶違者重論從之七年禁民間服銷金及鈸遮那纈八年詔內庭自中宮以下並不得銷金貼金間金戭金圈金解金剔金陷金明金泥金楞金背影金盤金織金金線撚絲裝著衣服並不得以金為飾其外庭臣庶家悉皆禁斷臣民舊有者限一月許回易為真像前供養物應寺觀裝功德用金箔須具殿位真像顯合增修創造數經官司陳狀勘會詣實聞奏方給公憑詣三司收買其明金裝假果花板樂身之類應金為裝彩物降詔前已有者更不毀壞自餘悉禁違者犯人及工匠皆坐是年又禁民間服皂班纈衣仁宗天聖三年詔在京士庶不得衣黑褐地白花衣服並藍黃紫地撮暈花樣婦女不得將白色褐色毛段並淡褐色匹帛製造衣服令開封府限十日斷絶婦女出入乘騎在路披毛褐以禦風塵者不在禁限七年詔士庶僧道無得以朱漆飾牀榻九年禁京城造朱紅器皿景祐元年詔禁錦背繡背遍地密花透背采段其稀花團窠斜窠雜花不相連者非二年詔市肆造作縷金為婦人首飾等物者禁三年臣庶之家毋得採捕鹿胎製造冠子又屋宇非邸店樓閣臨街市之處毋得為四鋪作閙鬬八非品官毋得起門屋非宮室寺觀毋得彩繪棟宇及朱黝漆梁柱窗牖雕鏤柱礎凡器用毋得表𩹉朱漆金漆下毋得襯朱非三品以上官及宗室戚里之家毋得用金稜器其用銀者毋得塗金玳瑁酒食器非宮禁毋得用純金器若經賜者聽用之凡命婦許以金為首飾及為小兒鈐鋜叉篸釧纏珥環之屬仍毋得為牙魚飛魚奇巧飛動若龍形者非命婦之家毋得以真珠裝綴首飾衣服及項珠纓絡耳墜頭抹子之類凡帳幔繳壁承塵柱衣額道項帕覆旌牀裙毋得用純錦遍繡宗室戚里茶檐食合毋得以緋紅蓋覆豪貴之族所乘坐車毋得用朱漆及五彩裝繪若用黝而間以五彩者聽民間毋得乘檐子乃以銀骨朵水罐引喝隨行慶曆八年詔禁士庶效契丹服及乘騎鞍轡婦人衣銅緑兔褐之類皇祐元年詔婦人冠高毋得踰四寸廣毋得踰尺梳長毋得踰四寸仍禁以角為之先是宮中尚白角冠梳人爭倣之至謂之內樣冠名曰垂肩等至有長三尺者梳長亦踰尺議者以為服妖遂禁止之七年初皇親與內臣所衣紫皆再入為黝色後士庶寖相效言者以為奇邪之服於是禁天下衣黑紫服者神宗熙寧九年禁朝服紫色近黑者民庶止令乘犢車聽以黑飾間五彩為飾不許呵引及前列儀物哲宗紹聖二年侍御史翟思言京城士人與豪右大姓出入率以轎自載四人舁之甚者飾以棕蓋徹去簾蔽翼其左右旁午於通衢甚為僭擬乞行止絶從之徽宗大觀元年郭天信乞中外並罷翡翠裝飾帝曰先王之政仁及草木禽獸今取其羽毛用於不急傷生害性非先王惠養萬物之意宜令有司立法禁之政和二年詔後苑造纈帛蓋自元豐初置為行軍之號又為衛士之衣以辨姦詐遂禁止民間打造令開封府申嚴其禁客旅不許興販纈板七年臣僚上言輦轂之下奔競侈靡有未革者居室服用以壯麗相誇珠璣金玉以奇巧相勝不獨貴近比比紛紛日益滋甚臣嘗考之申令法禁雖具其罰尚輕有司玩習以至於此如民庶之家不得乘轎今京城內暖轎非命官至富民娼優下賤遂以為常竊見近日有赴內禁乘以至皇城門者奉祀乘至宮廟者坦然無所畏避臣妄以為僭禮犯分禁亦不可以緩於是詔非品官不得乘暖轎先是權發遣提舉淮南東路學事丁瓘言衣服之制尤不可緩今閭閻之卑倡優之賤男子服帶犀玉婦人塗飾金珠尚多僭侈未合古制臣恐禮官所議止正大典未遑及此伏願明詔有司嚴立法度酌古便今以義起禮俾閭閻之卑不得與尊者同榮倡優之賤不得與貴者並麗止法一正名分自明革澆偷以歸忠厚豈曰小補之哉是歲又詔敢為契丹服若氈笠釣之類者以違御筆論釣今亦謂之襪袴婦人之服也中興士大夫之服大抵因東都之舊而其後稍變焉一曰深衣二曰紫衫三曰涼衫四曰帽衫五曰襴衫淳熙中朱熹又定祭祀冠婚之服特頒行之凡士大夫家祭祀冠婚則具盛服有官者幞頭帶鞾笏進士則幞頭襴衫帶處士則幞頭皂衫帶無官者通用帽子衫帶又不能具則或深衣或涼衫有官者亦通用帽子以下但不為盛服婦人則假髻大衣長裙女子在室者冠子背子衆妾則假紒背子冠禮三加冠服初加緇布冠深衣大帶納履再加帽子皂衫革帶繫㙐三加幞頭公服革帶納鞾其品官嫡庶子初加折上巾公服再加二梁冠朝服三加平冕服若以巾帽折上巾為三加者聽之深衣用白細布度用指尺衣全四幅其長過脅下屬於裳裳交解十二幅上屬於衣其長及踝圓袂方領曲裾黑緣大帶緇冠幅巾黑履士大夫家冠昏祭祀宴居交際服之紫衫本軍校服中興士大夫服之以便戎事紹興九年詔公卿長吏服用冠帶然迄不行二十六年再申嚴禁毋得以戎服臨民自是紫衫遂廢士大夫皆服涼衫以為便服矣涼衫其制如紫衫亦曰白衫乾道初禮部侍郎王曮奏竊見近日士大夫皆服涼衫甚非美觀而以交際居官臨民純素可憎有似凶服陛下方奉兩宮所宜革之且紫衫之設以從戎故為之禁而人情趨簡便靡而至此文武並用本不偏廢朝章之外宜有便衣仍存紫衫未害大體於是禁服白衫除乘馬道塗許服外餘不得服若便服許用紫衫自後涼衫祗用為凶服矣帽衫帽以烏紗衫以皂羅為之角帶繫㙐東都時士大夫交際常服之南渡後一變為紫衫再變為涼衫自是服帽衫少矣惟士大夫家冠昏祭祀猶服焉若國子生常服之襴衫以白細布為之圓領大袖下施橫襴為裳腰間有辟積進士及國子生州縣生服之紹興五年高宗謂輔臣曰金翠為婦人服飾不惟靡貨害物而侈靡之習實關風化已戒中外及下令不許入宮門今無一人犯者尚恐士民之家未能盡革宜申嚴禁仍定銷金及採捕金翠罪賞格淳熙二年孝宗宣示中宮褘衣曰珠玉就用禁中舊物所費不及五萬革弊當自宮禁始因問風俗龔茂良奏由貴近之家放效宮禁以致流傳民間粥簪珥者必言內樣彼若知上崇尚淳朴必觀感而化矣臣又聞中宮服浣濯之衣數年不易請宣示中外仍敕有司嚴戢奢僭寧宗嘉泰初以風俗侈靡詔官民營建室屋一遵制度務從簡朴又以宮中金翠燔之通衢貴近之家犯者必罰
