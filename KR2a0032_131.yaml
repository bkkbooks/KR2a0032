body:
  text: 宋史卷一百三十一志第八十四樂六光宗受禪崇上壽皇聖帝壽成皇后暨壽聖皇太后尊號壽皇樂用乾安壽聖壽成樂用坤安三殿慶禮在當時侈為盛儀尋以禮部太常寺言國朝歲饗上帝太祖肇造王業則配冬饗于圜丘太宗混一區宇則春祈穀夏大雩秋明堂俱配焉高宗身濟大業功德茂盛所宜奉侑仰繼祖宗以協先儒嚴祖之議以彰文祖配天之烈乃季秋升侑于明堂奠幣用宗安之樂酌獻用德安之樂並登歌作大呂宮及加上高宗徽號奉册寶以告用顯安之樂紹熙元年始行中宮册禮發册于文德殿皇帝升降御坐用乾安之樂持節展禮官出入殿門用正安之樂受册于穆清殿皇后出就褥位用坤安至位用承安受册寶用成安受內外命婦賀就坐用和安內命婦進行賀禮用惠安外命婦進行賀禮用咸安皇后降坐用徽安歸閣用泰安册寶入殿門用宜安宋初立后自景祐始行册命之禮元祐納后典章彌盛而六禮發制書日樂備不作惟皇后入宣德門朝臣班迎鳴鍾鼓而已崇寧中乃陳宮架用女工皇后升降行止並以樂為節至紹興復製樂以重褘翟詔執色勿用女工令太常止於門外設樂隆興册禮時則國樂未舉淳熙始遵用之而紹熙敷賁舊典於此特加詳備紹興樂奏仲呂宮仲呂為陰紹熙樂奏太簇宮太簇為陽用樂同而揆律異焉明年郊祀太常耿秉奏致敬鬼神以禮樂為本樂欲其備音欲其和今所用雷鼓之屬正所以祀天致神而皮革虛緩聲不能振應登歌大樂樂器及樂舞工人冠服有積歲久而損弊者宜葺新之太常在籍樂工不給於役召募百姓罕能習熟郊祀事重其樂工親扈乘輿和樂雅奏期以接天地享祖宗請優其日廩以籍田司錢給之樂藝稍精仍加賞勸其緣託權要送名充數者嚴戢絶之又言大禮前期皇帝朝饗太廟別廟內安穆安恭皇后二室前此係大臣分詣行事今既親詣室祼其酌獻升殿所奏樂曲恐不相協宜命有司更製皆從之寧宗即位孝宗升祔祧僖祖立別廟禮官言僖祖既倣唐興聖立為別廟遇祫則即廟以饗孟冬祫饗日合先詣僖祖廟室行禮其樂舞欲依每歲別廟五饗設樂禮例於僖祖添設登歌樂如僖廟行禮就廟殿依次作登歌樂其宮架樂則於太廟殿上通作詔從之既而臣僚言皇帝因重明聖節詣壽康宮上壽舉樂仰體聖主事親盡孝之志俯遂臣子尊君親上之忱此國家典禮之大者也檢照典故天申節賜御筵在上壽次日今乃於前一日賜文武百僚宴重明上壽用樂攸始而臣下聽樂乃在君父之先義有未安遂命改用次日凡奉上册寶于慈福壽康宮者再備樂行禮一用乾道舊制尋御文德殿制册皇后有司請設宮架之樂依儀施行慶元六年瑞慶節金使至以執光宗慈懿皇后喪詔就驛賜御筵並不作樂嘉定二年明堂大饗禮部尚書章穎奏太常工籍闕少率差借執役當親行薦饗或容不根遊手出入殿庭非所以肅儀衛嚴禁防也乞申紹興開禧已行禁令不許用市井替名顯示懲戒庶俾駿奔之人小大嚴潔以稱精禋臣僚又奏郊祀登歌列于壇上簉于上龕蓋在天地祖宗之側也宮架列于午階下則百神所同聽也夫樂音莫尚於和今絲竹管絃類有闕斷拊搏佾舞賤工窶人往往垢玩獶雜宜申嚴以肅祀事皆俞其請至十四年詔山東河北連城慕義殊俗效順奉玉寶來獻其文曰皇帝恭膺天命之寶實惟我祖宗之舊乃明年元日上御大慶殿受寶用鼓吹導引備陳宮架大樂奏詩三章一曰恭膺天命二曰舊疆來歸三曰永清四海並奏以太簇宮理宗享國四十餘年凡禮樂之事式遵舊章未嘗有所改作先是孝宗廟用大倫之樂光宗廟用大和之樂至是寧宗祔廟用大安之樂紹定三年行中宮册禮並用紹熙元年之典及奉上壽明仁福慈睿皇太后册寶始新製樂曲行事當時中興六七十載之間士多嘆樂典之久墜類欲搜講古制以補遺軼於是薑夔乃進大樂議于朝夔言紹興大樂多用大晟所造有編鍾鎛鍾景鍾有特磬玉磬編磬三鍾三磬未必相應塤有大小簫箎笛有長短笙竽之簧有厚薄未必能合度琴瑟絃有緩急燥濕軫有旋復柱有進退未必能合調總衆音而言之金欲應石石欲應絲絲欲應竹竹欲應匏匏欲應土而四金之音又欲應黃鍾不知其果應否樂曲知以七律為一調而未知度曲之義知以一律配一字而未知永言之旨黃鍾奏而聲或林鍾林鍾奏而聲或太簇七音之協四聲各有自然之理今以平入配重濁以上去配輕清奏之多不諧協八音之中琴瑟尤難琴必每調而改絃瑟必每調而退柱上下相生其理至妙知之者鮮又琴瑟聲微常見蔽於鍾磬鼓簫之聲匏竹土聲長而金石常不能以相待往往考擊失宜消息未盡至於歌詩則一句而鍾四擊一字而竽一吹未協古人稿木貫珠之意况樂工苟焉占籍擊鍾磬者不知聲吹匏竹者不知穴操琴瑟者不知絃同奏則動手不均迭奏則發聲不屬比年人事不和天時多忒由大樂未有以格神人召和氣也宮為君為父商為臣為子宮商和則君臣父子和徵為火羽為水南方火之位北方水之宅常使水聲衰火聲盛則可助南而抑北宮為夫徵為婦商雖父宮實徵之子常以婦助夫子助母而後聲成文徵盛則宮唱而有和商盛則徵有子而生生不窮休祥不召而自至災害不祓而自消聖主方將講禮郊見願詔求知音之士考正太常之器取所用樂曲條理五音櫽括四聲而使協和然後品擇樂工其上者教以金石絲竹匏土歌詩之事其次者教以戞擊干羽四金之事其下不可教者汰之雖古樂未易遽復而追還祖宗盛典實在茲舉其議雅俗樂高下不一宜正權衡度量自尺律之法亡於漢魏而十五等尺雜出於隋唐正律之外有所謂倍四之器銀字中管之號今大樂外有所謂下宮調下宮調又有中管倍五者有曰羌笛孤笛曰雙韻十四弦以意裁聲不合正律繁數悲哀棄其本根失之太清有曰夏笛鷓鴣曰胡盧琴渤海琴沉滯抑鬱腔調含糊失之太濁故聞其聲者性情蕩於內手足亂於外禮所謂慢易以犯節流湎以忘本廣則容姦狹則思欲者也家自為權衡鄉自為尺度乃至於此謂宜在上明示以好惡凡作樂製器者一以太常所用及文思所頒為準其他私為高下多寡者悉禁之則斯民順帝之則而風俗可正其議古樂止用十二宮周六樂奏六律歌六呂惟十二宮也王大食三侑注云朔日月半隨月用律亦十二宮也十二管各備五聲合六十聲五聲成一調故十二調古人於十二宮又特重黃鍾一宮而已齊景公作徵招角招之樂師涓師曠有清商清角清徵之操漢魏以來燕樂或用之雅樂未聞有以商角徵羽為調者惟迎氣有五引而已隋書云梁陳雅樂並用宮聲是也若鄭譯之八十四調出於蘇祗婆之琵琶大食小食般涉者胡語伊州石州甘州婆羅門者胡曲緑腰誕黃龍新水調者華聲而用胡樂之節奏惟瀛府獻仙音謂之法曲即唐之法部也凡有催袞者皆胡曲耳法曲無是也且其名八十四調者其實則有黃鍾太簇夾鍾仲呂林鍾夷則無射七律之宮商羽而已於其中又闕太簇之商羽焉國朝大樂諸曲多襲唐舊竊謂以十二宮為雅樂周制可舉以八十四調為宴樂胡部不可雜郊廟用樂咸當以宮為曲其間皇帝升降盥洗之類用黃鍾者羣臣以太簇易之此周人王用王夏公用夏之義也其議登歌當與奏樂相合周官歌奏取陰陽相合之義歌者登歌徹歌是也奏者金奏下管是也奏六律主乎陽歌六呂主乎陰聲不同而德相合也自唐以來始失之故趙慎言云祭祀有下奏太簇上歌黃鍾俱是陽律既違禮經抑乖會合今太常樂曲奏夾鍾者奏陰歌陽其合宜歌無射乃或歌大呂奏函鍾者奏陰歌陽其合宜歌蕤賓乃或歌應鍾奏黃鍾者奏陽歌陰其合宜歌大呂乃雜歌夷則夾鍾仲呂無射矣苟欲合天人之和此所當改其議祀享惟登歌徹豆當歌詩古之樂或奏以金或吹以管或吹以笙不必皆歌詩周有九夏鍾師以鍾鼓奏之此所謂奏以金也大祭祀登歌既畢下管象武管者簫箎笛之屬象武皆詩而吹其聲此所謂吹以管者也周六笙詩自南陔皆有聲而無其詩笙師掌之以供祀饗此所謂吹以笙者也周升歌清廟徹而歌雍詩一大祀惟兩歌詩漢初此制未改迎神曰嘉至皇帝入曰永至皆有聲無詩至晉始失古制既登歌有詩夕牲有詩饗神有詩迎神送神又有詩隋唐至今詩歌愈富樂無虛作謂宜倣周制除登歌徹歌外繁文當刪以合乎古其議作鼓吹曲以歌祖宗功德古者祖宗有功德必有詩歌七月之陳王業是也歌於軍中周之愷樂愷歌是也漢有短簫鐃歌之曲凡二十二篇軍中謂之騎吹其曲曰戰城南聖人出之類是也魏因其聲製為克官渡等曲十有二篇晉亦製為征遼東等曲二十篇唐柳宗元亦嘗作為鐃歌十有二篇述高祖太宗功烈我朝太祖太宗平僭偽一區宇真宗一戎衣而却契丹仁宗海涵春育德如堯舜高宗再造大功上儷祖宗願詔文學之臣追述功業之盛作為歌詩使知樂者協以音律領之太常以播于天下夔乃自作聖宋鐃歌曲宋受命曰上帝命平上黨曰河之表定維揚曰淮海濁取湖南曰沅之上得荊州曰皇威暢取蜀曰蜀山邃取廣南曰時雨霈下江南曰望鍾山吳越獻國曰大哉仁漳泉獻土曰謳歌歸克河東曰伐功繼征澶淵曰帝臨墉美致治曰維四葉歌中興曰炎精復凡十有四篇上于尚書省書奏詔付太常然夔言為樂必定黃鍾迄無成説其議今之樂極為詳明而終謂古樂難復則於樂律之原有未及講其後朱熹深悼先王制作之湮泯與其友武夷蔡元定相與講明反覆參訂以究其歸極熹在慶元經筵嘗草奏曰自秦滅學禮樂先壞而樂之為教絶無師授律尺短長聲音清濁學士大夫莫知其説而不知其為闕也望明詔許臣招致學徒聚禮樂諸書編輯別為一書以補六藝之闕後修禮書定為鍾律樂制等篇垂憲言以貽後人蓋宋之樂議因時迭出其樂律高下不齊俱有原委建隆初用王朴樂藝祖一聽嫌其太高近於哀思詔和峴考西京表尺令下一律比舊樂始和暢至景祐皇祐間訪樂議樂之詔屢頒於是命李照改定雅樂比朴下三律照以縱黍纍尺雖律應古樂而所造鍾磬才中太簇樂與器自相矛盾阮逸胡瑗復定議止下一律以尺生律而黃鍾律短所奏樂聲復高元豐中以楊傑條樂之疵召范鎮劉几參定几傑所奏下舊樂三律范鎮以為聲雜鄭衛且律有四釐六毫之差太簇為黃鍾宮商易位欲求真黍以正尺律造樂來獻復下李照一律至元祐廷奏而詔奬之初鎮以房庶所得漢書其言黍律異於他本以大府尺為黃帝時尺司馬光力辨其不然鎮以周釜漢斛為據光謂釜本考工所記斛本劉歆所作非經不足法鎮以所收開元中笛及方響合於仲呂校太常樂下五律教坊樂下三律光謂此特開元之仲呂未必合於后夔力止鎮勿奏所為樂光與鎮平生大節不謀而同惟鍾律之論往返爭議凡三十餘年終不能以相一是時濂洛關輔諸儒繼起遠溯聖傳義理精究周惇頤之言樂有曰古者聖王制禮法修教化三綱正九疇百姓大和萬物咸若乃作樂以宣八風之氣樂聲淡而不傷和而不淫淡則欲心平和則躁心釋德盛治至道配天地古之極也後世禮法不修刑政苛紊代變新聲導欲增悲故有輕生敗倫不可禁者矣樂者古以平心今以助欲古以宣化今以長怨不復古禮不變今樂而欲至治者遠哉程頤有曰律者自然之數先王之樂必須律以考其聲尺度權衡之正皆起於律律管定尺以天地之氣為準非秬黍之比也律取黃鍾黃鍾之聲亦不難定有知音者參上下聲考之自得其正張載有曰聲音之道與天地通蠶吐絲而商弦絶木氣盛則金氣衰乃此理自相應今人求古樂太深始以古樂為不可知律呂有可求之理惟德性深厚者能知之此三臣之學可謂窮本知變達樂之要者矣熹與元定蓋深講於其學者而研覃真積述為成書元定先究律呂本原分其篇目又從而證辨之其黃鍾篇曰天地之數始於一終於十其一三五七九為陽九者陽之成也其二四六八十為陰十者陰之成也黃鍾者陽聲之始陽氣之動也故其數九分寸之數具于聲氣之先不可得而見及斷竹為管吹之而聲和候之而氣應而後數始形焉均其長得九寸審其圍得九分積其實得八百一十分長九寸圍九分積八百一十分是為律本度量權衡於是而受法十一律由是損益焉其證辨曰古者考聲候氣皆以聲之清濁氣之先後求黃鍾也夫律長則聲濁而氣先至律短則聲清而氣後至極長極短則不成聲而氣不應今欲求聲氣之中而莫適為準莫若且多截竹以擬黃鍾之管或極其短或極其長長短之內每差一分而為一管皆即以其長權為九寸而度圍徑如黃鍾之法焉更迭以吹則中聲可得淺深以列則中氣可驗苟聲和氣應則黃鍾之為黃鍾者信矣黃鍾信則十一律與度量權衡者得矣後世不知出此而惟尺之求晉氏而下多求之金石梁隋以來又參之秬黍至王朴專恃纍黍金石亦不復考夫金石真偽固難盡信而秬黍長短小大不同尤不可恃古人謂子穀秬黍中者實其籥是先得黃鍾而後度之以黍以見周徑之度以生度量權衡之數而已非律生於黍也百世之下欲求百世之前之律者亦求之聲氣之元而毋必之於秬黍斯得之矣黃鍾生十一律篇曰子寅辰午申戌六陽辰皆下生丑卯巳未酉亥六陰辰皆上生陽數以倍者三分本律而損其一也陰數以四者三分本律而增其一也六陽辰當位自得六陰位以居其衝其林鍾南呂應鍾三呂在陰無所增損其大呂夾鍾仲呂三呂在陽則用倍數方與十二月之氣相應蓋陰陽自然之理也其證辨曰按呂氏淮南子上下相生與司馬氏律書漢前志不同雖大呂夾鍾仲呂用倍數則一然呂氏淮南不過以數之多寡為生之上下律呂陰陽錯亂而無倫非其本法也十二律篇曰按十二律之實約以寸法則黃鍾林鍾太簇得全寸約以分法則南呂姑洗得全分約以釐法則應鍾蕤賓得全釐約以毫法則大呂夷則得全毫約以絲法則夾鍾無射得全絲約至仲呂之實十三萬一千七十二以三分之不盡二算其數不行此律之所以止於十二也其證辨曰黃鍾為十二律之首他律無大於黃鍾故其正聲不為他律役至於大呂之變宮夾鍾之羽仲呂之徵蕤賓之變徵夷則之角無射之商自用變律半聲非復黃鍾矣此其所以最尊而為君之象然亦非人所能為乃數之自然他律雖欲役之而不可得也此一節最為律呂旋宮用聲之綱領也變律篇曰十二律各自為宮以生五聲二變其黃鍾林鍾太簇南呂姑洗應鍾六律則能具足至蕤賓大呂夷則夾鍾無射仲呂六律則取黃鍾林鍾太簇南呂姑洗應鍾六律之聲少下不和故有變律律之當變者有六黃鍾林鍾太簇南呂姑洗應鍾變律者其聲近正律而少高於正律然後洪纖高下不相奪倫變律非正律故不為宮其證辨曰十二律循環相生而世俗不知三分損益之數往而不返仲呂再生黃鍾止得八寸七分有奇不成黃鍾正聲京房覺其如此故仲呂再生別名執始轉生四十八律不知變律之數止於六者出於自然不可復加雖強加之亦無所用也房之所傳出於焦氏焦氏卦氣之學亦去四而為六十故其推律必求合此數不知數之自然在律不可增於卦不可減也何承天劉焯譏房之病乃欲增林鍾已下十一律之分使至仲呂反生黃鍾還得十七萬七千一百四十七之數則是惟黃鍾一律成律他十一律皆不應三分損益之數其失又甚於房律生五聲篇曰宮聲八十一商聲七十二角聲六十四徵聲五十四羽聲四十八按黃鍾之數九九八十一是為五聲之原三分損一以下生徵徵三分益一以上生商商三分損一以下生羽羽三分益一以上生角至角聲之數六十四以三分之不盡一算數不可行此聲之數所以止於五也其證辨曰通典曰黃鍾為均用五聲之法以下十一辰辰各有五聲其為宮商之法亦如之辰各有五聲合為六十聲是十二律之正聲也夫黃鍾一均之數而十一律於此取法焉以十二律之宮長短不同而其臣民事物尊卑莫不有序而不相亂良以是耳沈括不知此理乃以為五十四在黃鍾為徵在夾鍾為角在仲呂為商者其亦誤矣俗樂之有清聲略知此意但不知仲呂反生黃鍾黃鍾又自林鍾再生太簇皆為變律已非黃鍾太簇之清聲耳胡瑗於四清聲皆小其圍徑則黃鍾太簇二聲雖合而大呂夾鍾二聲又非本律之半且自夷則至應鍾四律皆以次而小其徑圍以就之遂使十二律五聲皆有不得其正者李照范鎮止用十二律則又未知此理蓋樂之和者在於三分損益樂之辨者在於上下相生若李照范鎮之法其合於三分損益者則和矣自夷則已降其臣民事物豈能尊卑有辨而不相凌犯乎晉荀勗之笛梁武帝之通皆不知而作者也變聲篇曰變宮聲四十二變徵聲五十六五聲宮與商商與角徵與羽相去各一律至角與徵羽與宮相去乃二律相去一律則音節和相去二律則音節遠故角徵之間近徵收一聲比徵少下故謂之變徵羽宮之間近宮收一聲少高於宮故謂之變宮角聲之實六十有四以三分之不盡一算既不可行當有以通之聲之變者二故置一而兩三之得九以九因角聲之實六十有四得五百七十六三分損益再生變徵變宮二聲以九歸之以從五聲之數存其餘數以為強弱至變徵之數五百一十二以三分之又不盡二算其數又不行此變聲所以止於二也變宮變徵宮不成宮徵不成徵淮南子謂之和謬所以濟五聲之不及也變聲非正聲故不為調其證辨曰宮羽之間有變宮角徵之間有變徵此亦出於自然左氏所謂七音漢前志所謂七始是也然五聲者正聲故以起調畢曲為諸聲之綱至二變聲則不比於正音但可濟其所不及而已然有五聲而無二變亦不可以成樂也八十四聲篇曰黃鍾不為他律役所用七聲皆正律無空積忽微自林鍾而下則有半聲大呂太簇一半聲夾鍾姑洗二半聲蕤賓林鍾四半聲夷則南呂五半聲無射應鍾為六半聲中呂為十二律之窮三半聲也自蕤賓而下則有變律蕤賓一變律大呂二變律夷則三變律夾鍾四變律無射五變律中呂六變律也皆有空積忽微不得其正故黃鍾獨為聲氣之元雖十二律八十四聲皆黃鍾所生然黃鍾一均所謂純粹中之純粹者也八十四聲正律六十三變律二十一六十三者九七之數也二十一者三七之數也六十調篇曰十二律旋相為宮各有七聲合八十四聲宮聲十二商聲十二角聲十二徵聲十二羽聲十二凡六十聲為六十調其變宮十二在羽聲之後宮聲之前變徵十二在角聲之後徵聲之前宮徵皆不成凡二十四聲不可為調黃鍾宮至夾鍾羽並用黃鍾起調黃鍾畢曲大呂宮至姑洗羽並用大呂起調大呂畢曲太簇宮至仲呂並用太簇起調太簇畢曲夾鍾宮至蕤賓羽並用夾鍾起調夾鍾畢曲姑洗宮至林鍾羽並用姑洗起調姑洗畢曲仲呂宮至夷則羽並用仲呂起調仲呂畢曲蕤賓宮至南呂羽並用蕤賓起調蕤賓畢曲林鍾宮至無射羽並用林鍾起調林鍾畢曲夷則宮至應鍾羽並用夷則起調夷則畢曲南呂宮至黃鍾羽並用南呂起調南呂畢曲無射宮至大呂羽並用無射起調無射畢曲應鍾宮至太簇羽並用應鍾起調應鍾畢曲是為六十調六十調即十二律也十二律即一黃鍾也黃鍾生十二律十二律生五聲二變五聲各有紀綱以成六十調六十調皆黃鍾損益之變也宮商角三十六調老陽也其徵羽二十四調老陰也調成而陰陽備也或曰日辰之數由天五地六錯綜而生律呂之數由黃鍾九寸損益而生二者不同至數之成則日有六甲辰有五子為六十日律呂有六律五聲為六十調若合符節何也曰即所謂調成而陰陽備也夫理必有對待數之自然也以天五地六合陰與陽言之則六甲五子究於六十其三十六為陽二十四為陰以黃鍾九寸紀陽不紀陰言之則六律五聲究於六十亦三十六為陽二十四為陰蓋一陽之中又自有陰陽也非知天地之化育者不能與於此其證辨曰禮運五聲六律十二管還相為宮孔氏疏曰黃鍾為第一宮至中呂為第十二宮各有五聲凡六十聲聲者所以起調畢曲為諸聲之綱領正禮運所謂還相為宮也周禮大司樂祭祀不用商惟宮角徵羽四聲古人變宮變徵不為調左氏傳曰中聲以降五降之後不容彈矣以二變聲之不可為調也後世以變宮變徵參而為八十四調其亦不考矣候氣篇曰以十二律分配節氣按曆而候之其氣之升分毫絲忽隨節各異夫陽生於復陰生於姤如環無端今律呂之數三分損益終不復始何也曰陽之升始於子午雖陰生而陽之升於上者未已至亥而後窮上反下陰之升始于午子雖陽生而陰升於上亦未已至巳而後窮上反下律於陰則不書故終不復始也是以升陽之數自子至巳差強在律為尤強在呂為差弱自午至亥漸弱在律為尤弱在呂為差強分數多寡雖若不齊然而絲分毫別各有條理此氣之所以飛灰聲之所以中律也或曰易以道陰陽而律不書陰何也曰易盡天下之變善惡無不備律致中和之用止於至善者也以聲言之大而至於雷霆細而至於蠛蠓無非聲也易則無不備也律則寫其所謂黃鍾一聲而已雖有十二律六十調然實一黃鍾也是理也在聲為中聲在氣為中氣在人則喜怒哀樂未發與發而中節此聖人所以一天人贊化育之道也其證辨曰律者陽氣之動陽聲之始必聲和氣應然後可以見天地之心今不此之務乃區區於秬黍之縱橫古錢之大小其亦難矣然非精於曆數則氣節亦未易正至於審度量謹權衡會粹古今辨析尤詳皆所以參伍而定黃鍾為中聲之符驗也朱熹深好其書謂國家行且平定中原必將審音協律以諧神人受詔典領之臣宜得此書奏之以備東都郊廟之樂熹定鍾律詩樂樂制樂舞等篇彙分於所修禮書中皆聚古樂之根源簡約可觀而鍾律分前後篇其前篇為條凡七一曰十二律陰陽辰位相生次第之圖二曰十二律寸分釐毫絲忽之數三曰五聲五行之象清濁高下之次四曰五聲相生損益先後之次五曰變宮變徵二變相生之法六曰十二律正變倍半之法七曰旋宮八十四聲六十調之圖其後篇為條凡六一曰明五聲之義二曰明十二律之義三曰律寸舊法四曰律寸新法五曰黃鍾分寸數法六曰黃鍾生十一律數大率采元定所著更互演繹尤為明邃其樂制彙于王朝禮其樂舞彙于祭禮上下千載旁搜遠紹昭示前聖禮樂之非迂而將期古樂之復見於今熹蓋深致意焉其詩樂篇別系于後
