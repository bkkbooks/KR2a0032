body:
  text: 宋史卷十三本紀第十三英宗英宗體乾應曆隆功盛德憲文肅武睿聖宣孝皇帝諱曙濮安懿王允讓第十三子母曰仙遊縣君任氏明道元年正月三日生於宣平坊第初王夢兩龍與日並墮以衣承之及帝生赤光滿室或見黃龍游光中四歲仁宗養於內寶元二年豫王生乃歸濮邸帝天性篤孝好讀書不為燕嬉褻慢服御儉素如儒者每以朝服見教授曰師也敢弗為禮時吳王宮教授吳充進宗室六針仁宗付宗正帝書之屏風以自戒景祐三年賜名宗實授左監門衛率府副率纍遷右羽林軍大將軍宜州刺史皇祐二年為右衛大將軍嶽州團練使嘉祐中宰相韓琦等請建儲仁宗曰宗子已有賢知可付者卿等其勿憂時帝方服濮王喪六年十月辛卯起為秦州防禦使知宗正寺帝以終喪辭奏四上乃聽喪終復授前命又辭七年八月許罷宗正復為嶽州團練使戊寅立為皇子癸未改今名帝聞詔稱疾益堅辭詔同判大宗正事安國公從古等往喻旨即臥內起帝以入甲辰見清居殿自是日再朝或入侍禁中九月遷齊州防禦使巨鹿郡公八年仁宗崩夏四月壬申朔皇后傳遺詔命帝嗣皇帝位百官入哭盡哀韓琦宣遺制帝御東楹見百官癸酉大赦賜百官爵一等優賞諸軍如乾興故事遣王道恭告哀于契丹帝欲亮陰三年命韓琦攝冢宰宰臣不可乃止乙亥帝不豫遣韓贄等告即位于契丹丙子尊皇后曰皇太后己卯詔請皇太后同聽政壬午皇太后御小殿垂簾宰臣覆奏事乙酉作受命寶丁亥以皇子右千牛衛將軍仲針為安州觀察使光國公熒惑自七年八月庚辰不見命宰臣祈禳至是月己丑見于東方庚子立京兆郡君高氏為皇后五月戊午以富弼為樞密使戊辰初御延和殿以疾未平命宰臣祈福于天地宗廟社稷及寺觀又禱于嶽瀆名山六月辛卯契丹遣蕭福延等來祭弔秋七月壬子初御紫宸殿帝自六月癸酉不御殿至是始見百官癸亥歲星晝見乙丑星大小數百西流戊辰百官請大行皇帝諡于南郊八月癸巳以生日為壽聖節九月辛亥以光國公仲針為忠武軍節度使同中書門下平章事淮陽郡王改名頊戊午上仁宗諡冊于福寧殿冬十月甲午葬仁宗于永昭陵十一月丙午祔于太廟大風霾己酉減東西二京罪囚一等免山陵役戶及靈駕所過民租辛亥契丹遣蕭素等來賀即位十二月己巳初御邇英閣召侍臣講讀經史乙亥淮陽郡王頊出閣是歲于闐西南蕃來貢治平元年春正月丁酉朔改元戊戌太白晝見己亥壽聖節百官及契丹使初上壽于紫宸殿甲寅賞知唐州趙尚寬修溝堰增戶口進一官賜錢二十萬三月壬寅命修秦悼王冢置守護官戊午録囚辛酉雨土夏四月癸未放宮女百三十五人甲午祈雨于相國天清寺醴泉觀賜諸軍錢有差五月己亥濬二股河戊申皇太后還政庚戌初日御前後殿壬子詔皇太后稱聖旨出入儀衛如章獻太后故事其有所須內侍録聖旨付有司覆奏即行丙辰上皇太后宮殿名曰慈壽己未熒惑犯太微上將壬戌以病愈命宰臣謝天地宗廟社稷及宮觀閏月戊辰輔臣進爵一等六月己亥以淮陽郡王頊為潁王祁國公皓為保寧軍節度使同中書門下平章事東陽郡王鄠國公頵為左衛上將軍增宗室教授丁未增同知大宗正事一員辛亥作睦親廣親宅辛酉太白晝見壬戌歲星晝見八月甲辰録周世宗後甲寅太白入太微垣乙卯遣兵部員外郎呂誨等四人充賀契丹太后生辰正旦使刑部郎中章岷等四人充賀契丹主生辰正旦使丙辰內侍都知任守忠坐不法貶保信軍節度副使蘄州安置丁巳以上供米三萬石振宿亳二州水災戶九月丁卯復武舉庚午詔夏國精擇使人戒勵毋紊彝章冬十月丙申詔中外近臣監司舉治行素著可備升擢者二人十一月乙亥科陝西戶三丁之一刺以為義勇軍凡十三萬八千四百六十五人各賜錢二千諫官司馬光纍上疏諫之不允戊寅復內侍養子令十二月乙巳雨土丙辰契丹遣耶律烈等來賀壽聖節蕭禧等來賀明年正旦是歲畿內宋亳陳許汝蔡唐潁曹濮濟單濠泗廬壽楚杭宣洪鄂施渝州光化高郵軍大水遣使行視疏治振恤蠲其賦租西蕃瞎子瞎欺米征內附二年春正月甲戌振蔡州二月甲辰大風晝冥丁未録囚是月賜禮部奏名進士明經諸科及第出身三百六十一人三月己巳班明天曆夏四月戊戌詔議崇奉濮安懿王典禮辛丑詔監司知州歲薦吏毋徒充數丙午奉安仁宗御容于景靈宮丁未白氣起西方五月癸亥詔以綜核名實勵臣下丙子詔自今皇子及宗室屬卑者勿授以檢校師傅官乙酉詔宗室封王者子孫襲爵六月壬辰録囚己酉詔尚書集三省御史臺議奉濮安懿王典禮甲寅罷尚書省集議令有司博求典故務在合經詔遣官與契丹定疆界秋七月癸亥富弼罷丙寅詔減乘輿服御丙子放宮女百八十人丁丑太白晝見己卯羣臣五上尊號不允庚辰張罷以文彥博為樞密使八月庚寅京師大雨水癸巳賜被水諸軍米遣官視軍民水死者千五百八十人賜其家緡錢葬祭其無主者乙未以雨災詔責躬乞言初學士草詔曰執政大臣其惕思天變帝書其後曰雨災專以戒朕不德可更曰協德交修己亥以水災罷開樂宴壬子以工部郎中蔡抗等充賀契丹生辰使侍御史趙鼎等充賀契丹正旦使乙卯減衮冕制度丙辰陝西置壯城兵九月壬戌雨罷大宴己巳以災異風俗策制舉人壬午太白犯南斗乙酉以久雨遣使祈于嶽瀆名山大川冬十月乙巳雨木冰十一月庚午朝饗景靈宮辛未饗太廟壬申有事南郊大赦上皇太后冊冊皇后以齊州為興德軍節度辛巳加恩百官十二月辛亥太白晝見是歲蔣波繡雲龍賜等州來貢三年春正月丙辰朔契丹遣使耶律仲達等來賀正旦戊午契丹遣使蕭惟輔等來賀壽聖節丙寅幸降聖院謁神御殿癸酉契丹改國號為遼己卯溫州火燒民屋萬四千間死者五千人丁丑皇太后下書中書門下封濮安懿王宜如前代故事王夫人王氏韓氏任氏皇帝可稱親尊濮安懿王為皇夫人為后詔遵慈訓以塋為園置守衛吏即園立廟俾王子孫主祠事如皇太后旨辛巳詔臣民避濮安懿王諱以王子宗懿為濮國公壬午黜御史呂誨范純仁呂大防二月乙酉朔白虹貫日三月庚申彗星晨見于室辛酉黜諫官傅堯俞御史趙鼎趙瞻戊辰上親録囚庚午以彗避正殿減膳辛未以黜呂誨等詔內外癸酉以災異責躬詔轉運使察獄訟調役利病大者以聞辛巳彗晨見于昴如太白長丈有五尺壬午孛于畢如月夏四月丙午詔有司察所部左道淫祀及賊殺善良不奉令者罪毋赦五月甲子罷知雜御史觀察使以上歲舉人乙丑彗至張而沒戊辰謂宰相曰朕欲與公等日論治道中書常務有定制者付有司行之六月己酉録囚秋七月乙丑進濮王子孫及魯王孫爵一等八月庚子遣傅卞等賀遼主生辰張師顏等賀正旦九月壬子朔日有食之癸亥定待制諫官朝官少卿郎中遷選歲月補員格庚辰禁妃嬪公主以下薦服親之夫冬十月壬午朔以仙遊縣君任氏墳域為園乙酉詔兩日一御邇英閣丁亥詔禮部三歲一貢舉甲午詔宰臣參知政事舉才行士可試館職者各五人十一月戊午帝不豫禱于大慶殿己未宰相始奏事辛酉降天下囚死罪一等流以下釋之十二月乙未宰相祈于天地宗廟社稷壬寅立潁王頊為皇太子癸卯大赦賜文武官子為父後者勳一轉遼遣蕭靖等來賀正旦壽聖節是歲遣使以違約數寇責夏國諒祚獻方物謝罪四年春正月庚戌朔羣臣上尊號曰體乾膺曆文武聖孝皇帝降天下囚罪一等徒以下釋之大風霾辛亥蠲京師逋麴錢丁巳帝崩于福寧殿壽三十六諡曰憲文肅武宣孝皇帝廟號英宗帝自居睦親宅孝德著聞濮安懿王薨以所服玩物分諸子帝所得悉以與王府舊人既葬而辭去者宗室有假金帶而以銅帶歸主吏以告帝曰真吾帶也受之命殿侍鬻犀帶直錢三十萬亡之帝亦不問初辭皇子請潭王宮教授周孟陽作奏孟陽有所勸戒即謝而拜之奏十餘不允始就召戒舍人曰謹守吾舍上有適嗣吾歸矣既為皇子慎靜恭默無所猷為而天下陰知其有聖德即位每命近臣必以官而不以名大臣從容以為言帝曰朕雖宮中命小臣亦未嘗以名也一日語神宗曰國家舊制士大夫之子有尚帝女皆升行以避舅姑之尊義甚無謂朕嘗思此寤寐不平豈可以富貴之故屈人倫長幼之序也可詔有司革之會疾不果神宗述其事焉贊曰昔人有言天之所命人不能違信哉英宗以明哲之資膺繼統之命執心固讓若將終身而卒踐帝位豈非天命乎及其臨政臣下有奏必問朝廷故事與古治所宜每有裁決皆出羣臣意表雖以疾疢不克大有所為然使百世之下欽仰高風詠歎至德何其盛也彼隋晉王廣唐魏王泰窺覦神器矯揉奪嫡遂啓禍原誠何心哉誠何心哉
