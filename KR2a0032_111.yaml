body:
  text: 宋史卷一百一十一志第六十四禮十四嘉禮二冊立皇后儀冊命皇太子儀冊皇太子妃儀公主受封儀冊命親王大臣儀冊立皇后建隆元年立琅邪郡夫人王氏為皇后命所司擇日備禮冊命自後凡制書云冊命者多不行冊禮后妃皆寫冊命告身以金花龍鳳羅紙金塗褾袋有司進入學士院草制宣於正殿近臣牧守宗室皆修貢禮羣臣拜表稱賀又詣內東門奉箋賀皇后真宗冊德妃劉氏為皇后不欲令藩臣貢賀不降制於外廷止命學士草詞付中書仁宗冊皇后曹氏其冊制如皇太子玉用珉玉五十簡匣依冊之長短寶用金方一寸五分高一寸其文曰皇后之寶盤螭紐綬並緣冊寶法物約舊制為之匣盝並朱漆金塗銀裝其禮與通禮異不立仗不設縣前一日守宮設次於朝堂設冊寶使副次於東門外命婦次於受冊寶殿門外設皇后受冊寶位於殿庭階下北向奉禮設冊寶使位於內東門外副使內侍位於其南差退東向北上冊寶案位於使前南向又設內給事位於北廂南向其日百官常服早入次禮直官通事舍人先引中書令侍中門下侍郎中書侍郎及奉冊寶官執事人絳衣介幘詣垂拱殿門就次以俟冊降禮直官通事舍人分引宰臣樞密冊寶使副百官詣文德殿立班東西相向內侍二員自內承旨降皇后冊寶出垂拱殿奉冊寶官俱搢笏率執事人禮直官導中書侍郎押冊中書令後從門下侍郎押寶侍中後從由東上閣門出至文德殿庭權置禮直官通事舍人引使副就位次引侍中於使前西向稱有制典儀曰再拜贊者承傳使副在位官皆再拜宣曰贈尚書令冀王曹彬孫女冊為皇后命公等持節展禮使副再拜侍中還位門下侍郎帥主節者詣使東北主節以節授門下侍郎門下侍郎執節授冊使冊使跪受興付主節幡隨節立於使左次引中書令侍中詣冊寶東北西向立中書侍郎引冊案立於中書令右中書令取冊授冊寶使使跪受興置於案中書令中書侍郎退復班門下侍郎引寶案於侍中之右取寶授冊寶使如上儀退復位典儀贊拜訖禮直官通事舍人引使副押冊寶持節者前導奉冊寶官奉舁援衛如式以次出朝堂門詣內東門附內臣入進內臣引內外命婦入就位內侍詣閣請皇后服褘衣冊寶至使副俱東向內給事前北向跪稱冊寶使李迪副使王隨奉制授皇后冊寶俯伏興退復位內給事入詣受冊寶殿門皇后前跪奏訖內侍進詣使前西面跪受冊寶以授內謁者監使退復位內謁者監主當內臣持冊寶入內東門內侍從之以次入詣殿庭內侍贊引皇后降立庭中北向位內侍跪取冊次內侍跪取寶興立皇后右少前西向內侍二員進立皇后左少前東向內侍稱有制內侍贊皇后再拜內侍奉冊進授皇后皇后受以授內侍次內侍奉寶亦然復贊再拜訖導皇后升坐內臣引內外命婦稱賀如常儀禮畢內侍導皇后降坐還閣內外命婦班退皇后易常服謝皇帝皇太后用常禮百官詣東上閣門表賀元祐五年八月太皇太后詔以皇帝納后令翰林學士御史中丞兩省與太常禮官檢詳古今六禮沿革參考通禮典故具為成式羣臣又議勘昏御史中丞鄭雍等請不用陰陽之說呂大防亦言不可太后納之六年八月三省樞密院言六禮命使納采問名納吉納成告期差執政官攝太尉充使侍從官或判宗正官攝宗正卿充副使以舊尚書省權為皇后行第納采問名同日次日納吉納成告期納成用穀圭為贄不用鴈請期依開寶禮改為告期親迎為命使奉迎納采前擇日告天地宗廟皇帝臨軒發冊同日先遣冊禮使副次遣奉迎使令文武百官詣行第班迎又言據開元禮納采問名合用一使納吉納成各別日遣使今未委三禮共遣一使或各遣使又合依發冊例立仗詔各遣使文德殿發制依發冊立仗七年正月詔尚書左丞蘇頌撰冊文並書學士院上六禮辭語其納采制文略曰太皇太后曰咨某官封姓名渾元資始肇經人倫爰及夫婦以奉天地宗廟社稷謀于公卿咸以為宜率由舊典今遣使持節太尉某宗正卿某以禮納采其答文曰太皇太后嘉命訪婚陋族備數采擇臣之女未間教訓衣履若而人欽承舊章肅奉典制某官封糞土臣姓某稽首再拜承制詔問名制曰兩儀合德萬物之統以聽內治必咨令族重宣舊典今遣使持節某官以禮問名答曰使者重宣中制問臣名族臣女夫婦所生先臣故某官之遺微孫先臣故某官之遺曾孫先臣故某官之遺孫先臣故某官之外孫女年若干欽承舊章肅奉典制納吉制曰人謀龜筮同符元吉恭順典禮今使某官以禮納吉答曰使者重宣中制臣陋族卑鄙憂懼不堪欽承舊章肅奉典制納成制曰咨某官某之女孝友恭儉實維母儀宜奉宗廟永承天祚以黝纁穀圭六馬以章典禮今使某官以禮納成答曰使者重宣中制降婚卑陋崇以上公寵以豐禮備物典策欽承舊章肅奉典制告期制曰謀于公卿大筮元龜罔有不臧吉日惟某月某甲子可迎率遵典禮今遣某官以禮告期答曰使者重宣中制以某月某甲子吉日告期臣欽承舊章肅奉典制奉迎制曰禮之大體欽順重正其期維吉典圖是若今遣某官以禮奉迎答曰使者重宣中制今日吉辰備禮以迎螻蟻之族猥承大禮憂懼戰悸欽率舊章肅奉典制餘如式三月禮部太常寺上納后儀注發六禮制書太皇太后御崇慶殿內外命婦立班行禮畢內給事出殿門置六禮制書案上出內東門禮直官通事舍人引由宣祐門至文德殿後門入權置案於東上閣門命使納采問名文德殿宰臣親王執政官宗室百僚大小使臣易朝服樂備而不作班定內給事奉制書案置橫街北稍東西向北上禮直官通事舍人引門下中書侍郎次引使副就橫街南承制位北向東上內給事詣使者東北面稱太皇太后有制典儀曰再拜在位官皆再拜宣制曰皇帝納后命公等持節行禮典儀曰再拜使副皆再拜授制書訖典儀曰再拜在位官皆再拜禮直官通事舍人太常博士引使副從制案出載於油絡網犢車出宣德門鼓吹備而不作至皇后行第大門外令史二人對奉制案立主人立大門內儐者立主人之左北面進受命出曰敢請事使者曰某奉制納采儐者入告主人曰臣某之女若而人既蒙制訪臣某不敢辭儐者出告入引主人出大門外再拜使者先入使者曰太皇太后制主人再拜宣制書畢主人再拜受訖主人進表訖再拜使者出問名同上儀使者曰將加卜筮奉制問名主人曰臣某之女若而人既蒙制命臣某不敢辭命使納吉納成告期並同命使納采問名儀納吉使者曰加請卜筮占曰從制使某納吉主人曰臣某之女若而人龜筮云吉臣預有焉臣某謹奉典制告期使者曰某奉制告期主人曰臣某謹奉典制以上納吉納成告期請見授制接表並如納采儀臨軒命使冊后及奉迎於文德殿百官朝服皇帝常服乘輦至殿後閣侍中奏中嚴外辦乃服通天冠絳紗袍乘輦出自西房降輦即御坐兩省官及待制權侍郎觀察使以上分東西入殿門各就位東西相向立奉寶置御坐前奉宣后冊由東上閣門出至文德殿庭橫行典儀曰拜在位官皆再拜使副受冊宣制曰冊某氏為皇后命公等持節展禮典儀曰拜使副再拜受冊寶訖典儀贊百官再拜宣制曰太皇太后制命公等持節奉迎皇后典儀贊使副再拜受節又贊百官再拜侍中奏禮畢解嚴百官再拜出皇帝常服還內冊寶至皇后行第如納采儀使者曰某奉制授皇后備物典冊皇后受冊寶內外命婦序立如儀主人以書奉使者奉迎百官常服班宣德門外行第儐者請使者曰某奉制以禮奉迎儐者入告主人曰臣某謹奉典制儐者出告入引主人出大門外再拜使者先入曰有制主人再拜使者宣制畢主人再拜受制答表又再拜姆導皇后尚宅前引升堂出立房外典儀贊使副再拜使者曰今月吉日某等承制以禮奉迎內侍受以入使副退主人以書授使者奉於司言受以奏聞皇后降立堂下再拜訖升堂主人升自東階西向曰戒之戒之夙夜無違命主人退母進西階上東向施襟結帨曰勉之戒之夙夜無違命皇后升輿至中門升車出大門使副及羣臣前引將至宣德門百官宗室班迎再拜訖分班皇后入門鳴鐘鼓班迎官退乃降車入次升輿入端禮門文德殿東上閣門出文德殿後門入至內東門內降輿司輿前導詣福寧殿門大次以俟晡後皇后車入宣德門侍中版奏請中嚴內侍轉奏皇帝服通天冠絳紗袍御福寧殿尚宮引皇后出次詣殿庭之東西向立尚儀跪奏外辦請皇帝降坐禮迎尚宮前引詣庭中之西東面揖皇后以入導升西階入室各就榻前立尚食跪奏具皇帝揖皇后皆坐尚食進饌食三飯尚食進酒受爵飲尚食以饌從再飲如初三飲用巹如再飲尚儀跪奏禮畢俱興尚宮請皇帝御常服尚寢請皇后釋禮服入幄次日以禮朝見太皇太后皇太后參皇太妃如宮中之儀詔從之四月太皇太后手書曰皇帝年長中宮未建歷選諸臣之家以故侍衛親軍馬軍都虞候贈太尉孟元孫女為皇后制詔六禮尚書左僕射兼門下侍郎呂大防攝太尉充奉迎使同知樞密院事韓忠彥攝司徒副之尚書左丞蘇頌攝太尉充發冊使簽書樞密院事王巖叟攝司徒副之尚書左丞蘇轍攝太尉充告期使皇叔祖同知大宗正事宗景攝大宗正卿副之皇伯祖判大宗正事高密郡王宗晟攝太尉充納成使翰林學士范百祿攝宗正卿副之吏部尚書王存攝太尉充納吉使權戶部尚書劉奉世攝宗正卿副之翰林學士梁燾攝太尉充納采問名使御史中丞鄭雍攝宗正卿副之五月甲午行納采問名禮丁酉行納吉納成告期禮戊戌帝御文德殿發冊及命使奉迎皇后己亥百官表賀于東上閣門次詣內東門賀太皇太后又上箋賀皇后上箋賀皇太妃皇后擇日詣景靈宮行廟見禮大觀四年冊貴妃鄭氏為皇后議禮局重定儀注臨軒冊使皇帝御文德殿服通天冠絳紗袍百官朝服陳黃麾細仗依古用宮架冊使出殿門依近儀不乘輅權以穆清殿為受冊殿其日皇后服褘衣其奉冊寶授皇后皆用內侍受冊訖皇后上表謝皇帝內外命婦立班稱賀羣臣入殿賀皇帝於內東門上箋賀皇后其上禮儀注乞依進馬條令施行其會羣臣及皇后會外命婦儀注並依開元開寶禮受冊之殿陳宮架用女工升降行止並以樂節而別定樂名樂章皇后上表乞免受冊排黃麾仗及乘重翟車陳小駕鹵簿等而於延福宮受冊其朝謁景靈宮亦止依近例云紹興十三年閏四月十七日冊貴妃吳氏為皇后前期於文德殿內設東西房東西閣凡香案宮架冊寶幄次舉麾位押案位權置冊寶褥位受制承制宣制位奉節位贊者位奉冊寶位舉冊舉寶官位及文武百僚應行事官執事官位皆儀鸞司太常典儀分設之以俟臨軒發冊其日質明皇帝服通天冠絳紗袍出西閣協律郎舉麾奏乾安之樂皇帝降輦即御坐樂止冊使副以下應在位官皆再拜侍中宣制曰冊貴妃吳氏為皇后命公等持節展禮冊使副再拜參知政事以節授冊使冊使跪受以授掌節者中書令以冊授冊使侍中以寶授副使並權置于案冊使副以下應在位官皆再拜冊使押冊副使押寶持節者前導正安之樂作出文德殿門樂止至穆清殿門外幄次權置以俟皇后首飾褘衣出閣協律郎舉麾坤安之樂作皇后至殿上中間南向立定樂止冊使副就內給事前東向跪稱冊使副姓某奉制授皇后備禮典冊內給事入詣皇后前北向奏訖冊使舉冊授內侍內侍轉授內謁者監副使舉寶授內侍內侍轉授內謁者監掌節者以節授掌節內侍內侍持節前導冊寶並案進行入詣殿庭冊寶初入門宜安之樂作至位樂止皇后降自東階至庭中北向位初行承安之樂作至位樂止皇后再拜舉冊官搢笏跪舉冊讀冊官搢笏跪宣冊內謁者監奉冊進授皇后皇后受以授司言又奉寶進授皇后皇后受以授司寶司言司寶置冊寶于案舉冊寶官並舉案官俱搢笏舉冊寶並案興詣東階之東西向位置定皇后初受冊寶成安之樂作受訖樂止皇后再拜禮畢冊皇太子至道元年八月壬辰詔立皇太子命有司草具冊禮以翰林學士宋白為冊皇太子禮儀使有司言前代無太子執圭之文請如王公之制執桓圭餘如舊制九月丁卯太宗御朝元殿陳列如元會儀帝衮冕設黃麾仗及宮縣之樂於庭百官就位太子常服乘馬就朝元門外幄次易遠遊冠朱明衣所司贊引三師三少導從至殿庭位再拜起居畢分班立太常博士引攝中書令就西階解劍履升殿詣御坐前俯伏興奏宣制降就劍履位由東階至太子位東南向稱有制太子再拜中書侍郎引冊案就太子東中書令北面跪讀冊畢太子再拜受冊以授右庶子門下侍郎進寶授中書令中書令授太子太子以授左庶子各置於案由黃道出太子隨案南行樂奏正安之典至殿門樂止太尉升殿稱賀侍中宣制答如儀皇太子易服乘馬還宮百官賜食於朝堂中書門下樞密院師保而下詣太子參賀皆序立於宮門之外庶子版奏外備內臣褰簾太子常服出次坐中書門下文武百官樞密師保賓客而下再拜並答拜四品以下官參賀升坐受之越三日具鹵簿謁太廟常服乘馬出東華門升輅儀仗內行事官乘車者並服禮衣餘皆袴褶乘馬導從有司言唐禮宮臣參賀皆舞蹈開元始罷之故事百官及東宮接見祗呼皇太子上箋啓稱皇太子殿下百官稱名宮官稱臣常行用左春坊印宮中行令又按唐制凡東宮處分論事之書太子並畫令左右庶子以下署名姓宣奉行書按畫日其與親友師傅不用此制今請如開元之制宮臣止稱臣不行舞蹈之禮今皇太子兼判開封府其所上表狀即署太子之位其當申中書樞密院狀祗判官等署餘斷案及處分公事並畫諾詔惟改諾為準餘並從之其朝皇后儀止用宮中常禮時真宗以壽王為皇太子兼判開封請見僚屬稱名而免稱臣神宗未及受冊禮而即位乃以冊寶送天章閣遂為故事紹興三十二年五月詔曰朕以不德躬履艱難三十有六年憂勞萬機宵旰靡怠屬時多故未能雍容釋負退養壽康今邊鄙粗寧可遂如志皇子育德允成神器有託朕心庶幾可立為皇太子仍改名所司擇日備禮冊命未及行禮六月十一日內禪乾道元年八月十日制立皇子鄧王㔶為皇太子十月詔以知樞密院洪適為禮儀使撰冊文簽書樞密院事葉顒書冊工部侍郎王弗篆寶十六日皇帝御大慶殿行冊禮皇太子服遠遊冠朱明衣執桓圭前期習儀禮官及有司並先一日入宿衛展宮架樂設太子次冊寶幄次百官次又設皇太子受冊位典寶褥位應行禮等皆有位列黃麾半仗於殿門內外質明百官就次皇太子常服詣幕次符寶郎陳八寶於御位之左右有司奉冊寶至幄次百官朝服入班殿庭有司自幄次奉冊寶至褥位參知政事中書令導從退各就位侍中升殿俟宣制皇太子易服執圭俟於殿門外樂正撞黃鐘之鐘乾安之樂作皇帝即御坐殿上侍臣起居樂止行禮官贊引皇太子入就殿庭東宮官從初入殿門明安之樂作樂止皇太子起居次百官起居各拜舞如儀皇太子詣受冊位侍中前承旨降階宣制曰冊鄧王㔶為皇太子皇太子拜舞如儀侍中升殿復位中書令詣讀冊位捧冊官奉冊至中書令跪讀畢興皇太子再拜有司奉冊至皇太子位中書令跪以冊授皇太子皇太子跪受以授右庶子置於案次侍中以寶授皇太子皇太子跪受以授左庶子如上儀皇太子再拜中書舍人押冊中允押寶以出次皇太子出如來儀初行樂作出殿門樂止次百官稱賀樂正撞蕤賓之鐘乾安之樂作皇帝降坐樂止放仗在位官再拜以出禮畢百官易常服赴內東門司拜箋賀皇后次赴德壽宮拜表箋賀諸路監司守臣等並奉表稱賀明日車駕詣德壽宮謝又明日上御紫宸殿引皇太子稱謝還東宮百官赴東宮參賀皇太子擇日先朝謁景靈宮次日朝謁太廟別廟又擇日詣德壽宮稱謝先是禮官言皇太子朝謁景靈宮無所服典故乞止用常服次朝謁太廟別廟當衮冕乘金輅設仗從之皇太子言乘輅設仗雖有至道天禧故事非臣子所安詔免冊皇太子妃政和五年三月詔選皇太子妃六年六月詔選少傅恩平郡王朱伯材女為皇太子妃令所司備禮冊命庚辰帝服通天冠絳紗袍御文德殿發冊先是議禮局上五禮新儀皇太子納妃乘金輅親迎皇太子三奏辭乘輅及臨軒冊命詔免乘輅而發冊如禮焉公主受封降制有冊命之文多不行禮惟以綸告進內至嘉祐二年封福康公主為兗國公主始備禮冊命前一日百官班文德殿內降冊印宣制冊案援衛一如冊皇后儀有司先設冊使等幕次於內東門外命婦次於公主本位門之外公主受冊印位於本位庭階下北向冊使位於內東門副使及內給事於其南差退並東向設冊印案位於冊使前南向內給事位於冊使北南向自文德殿奉冊印將至內東門內給事詣本位請公主服首飾褕翟冊印至內東門外褥位置訖內臣引內命婦入就位禮直官引冊使副等俱就東向位內給事就南向位通事舍人博士引冊使就內給事前東向躬稱冊使某副使某奉制授公主冊印退復位內給事入詣所設受冊印位公主前言訖退內給事進詣冊使前西向冊使跪以冊印授內給事內給事跪授內謁者內謁者及主當內臣等持入內東門內給事從入詣本位贊公主降詣庭中北向立跪取冊興立公主右少前西向又內給事立公主左少前東向稱有制贊者曰拜公主再拜右給事奉冊跪授之公主受以授左給事右給事又奉印授公主如上儀贊者曰拜公主再拜畢引公主升位次內臣引內命婦賀畢遂引公主謝皇帝皇后一如內中之儀羣臣進名賀其冊印如貴妃有匣文曰兗國公主之印遂為定制神宗進封邠國大長公主魯國公主皆請免冊禮止進告入內云冊命親王大臣之制具開寶通禮雖制書有備禮冊命之文多上表辭免而未嘗行每命親王宰臣使相樞密使西京留守節度使並翰林草制夜中進入翼日自內置於箱黃門二人舁之立御坐東內朝退乃奉箱出殿門外宣付閣門降置於案俟文德殿立班閣門使引制案置于庭宣付中書門下宰相跪受復位以授通事舍人赴宣制位唱名訖奉詣宰相宰相受之付所司若立后妃封親王公主即先稱有制百官再拜宣制訖復再拜舞蹈稱賀若宰相加恩制書即宣付通事舍人引宰相於宣制石東北向再拜立聽訖拜舞復位若百官受制即自班中引出聽麻文班於宣制石東武班於西並如宰相儀聽訖出赴朝堂其罷相者即引出赴朝堂金吾仗舍諸王宰相朝謝前一日內降官告從內出東上閣門外宣詞以賜授節者仍交旌節授者俯伏執旌節交於頸上者三參知政事宣徽使樞密使大兩省兩制祕書監上將軍觀察使以上授官告敕牒者皆拜敕舞蹈若止授敕或宣頭者止再拜餘官悉不拜敕不舞蹈惟御史大夫中丞拜授東上閣門使又引至殿門外中籠門再拜親王節度使相官告並載以綵輿迎歸第親王輿中設銀師子香合輦官十二人並幞頭緋繡寬衣旌節各二馬四犦矟官十六人執旌節攏馬對引由乾元門西偏門出至門外馬技騎士五十人槍牌步兵六十人教坊樂工六十五人及百戲蹴鞠鬥雞角抵次第迎引左右軍巡使具軍容前導至本宮使相輿中用銀香爐輦官十二人金帽錦絡縫紫絁寬衣旌節各一馬二犦矟官八人馬技騎士二十人槍牌步兵二十四人軍巡使不前導餘如親王制有故則罷凡諫舍刺史以上在外任加恩者悉令其親屬乘傳齎詔就以告牒賜之政和禮局上冊命親王大臣儀迄不果行
