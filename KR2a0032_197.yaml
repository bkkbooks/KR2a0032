body:
  text: 宋史卷一百九十七志第一百五十兵十一器甲之制器甲之制其工署則有南北作坊有弓弩院諸州皆有作院皆役工徒而限其常課南北作坊歲造塗金脊鐵甲等凡三萬二千弓弩院歲造角弝弓等凡千六百五十餘萬諸州歲造黃樺黑漆弓弩等凡六百二十餘萬又南北作坊及諸州別造兵幕甲袋梭衫等什物以備軍行之用京師所造十日一進謂之旬課上親閲視置五庫以貯之嘗令試牀子弩於郊外矢及七百步又令別造步弩以試戎具精緻犀利近代未有開寶三年五月詔京都士庶之家不得私蓄兵器軍士素能自備技擊之器者寄掌本軍之司俟出征則陳牒以請品官準法聽得置隨身器械時兵部令史馮繼升等進火箭法命試驗且賜衣物束帛淳化二年申明不得私蓄兵器之禁至道二年二月詔先造光明細鋼甲以給士卒者初無襯𩹉宜以紬𩹉之俾擐者不磨傷肌體咸平元年六月御前忠佐石歸宋獻木羽弩箭箭裁尺餘而所激甚遠中鎧甲則簳去而鏃存牢不可拔詔增歸宋月奉且補其子為東西班侍三年四月神騎副兵馬使焦偓獻盤鐵槊重十五斤令偓試之馬上往復如飛命遷本軍使八月神衛水軍隊長唐福獻所製火箭火毬火蒺草利木造船務匠項綰等獻海戰船式各賜緡錢先是相國寺僧法山本洺州人強姓其族百口悉為戎人所掠至是願還俗隸軍伍以效死力且獻鐵輪撥渾重三十三斤首尾有刃為馬上格戰具詔補外殿直五年知寧化軍劉永錫製手炮以獻詔沿邊造之以充用六年十月給軍中傳信牌其制漆木為牌長六寸闊三寸腹背刻字而中分之置鑿枘令可合又穿二竅容筆墨上施紙札每臨陳則分而持之或傳令則署其言而繫軍吏之頸至彼合契乃書復命因冀州團練使石普之請也仁宗時天下久不用兵天聖四年詔減諸路歲造兵器之半是歲詔作坊造鐵槍一萬五千給秦渭環慶延州鎮戎軍六年詔外器甲久不繕先遣使分詣諸路閲視修治之景祐二年罷秦州造輸京師弓弩三年詔廣南民家毋得置博刀犯者並鍛人並以私有禁兵律論先是嶺南為盜者多持博刀杖罪輕不能禁轉運使以為言故著是令四年詔作坊製栓子槍柧槍各五萬康定元年四月詔江南淮南州軍造紙甲三萬給陝西防城弓手又詔河東強壯習弩者聽自置戶四等以下官給之八月詔陝西製柳木旁牌慶曆元年知並州楊偕遣陽曲縣主簿楊拯獻龍虎八陳圖及所製神盾劈陳刀手刀鐵連槌鐵簡且言龍虎八陳圖有奇有正有進有止遠則射近則擊以刀盾彼蕃騎雖衆見神盾之異必遽奔潰然後以驍騎夾擊無不勝者歷代用兵未有經慮及此帝閲于崇政殿降詔奬諭其後言者以為其器重大緩急難用云二年詔鄜延環慶涇原秦鳳路各置都作院賜河北義勇兵弓弩箭材各一百萬四年賜鄜延路總管風羽子弩箭三十萬五年詔諸路所儲兵械悉報三司三司歲具須知以聞仍約為程式預頒之八年詔士庶之家所藏兵器非法所許者限一月送官敢匿聽人告捕皇祐元年御崇政殿閲知澧州供備庫副使宋守信所獻衝陳無敵流星弩拒馬皮竹牌火鎌石火綱三刃黑漆順水山字鐵甲野戰拒馬刀弩寨腳車衝陳劍輪無敵車大風翎弩箭八種四年河北河東陝西都總管司言郭咨所造獨轅衝陳無敵流星弩可以備軍陳之用詔弓弩院如樣製之除咨為鄜延路鈐轄許置弩五百募土民教之既成經略夏安期言其便詔立獨轅弩軍五年荊南兵馬鈐轄王遂上臨陳枴槍至和元年詔河北河東陝西路每歲夏曝器甲有損斷者悉令完備如復閲視有不堪用者知州通判並主兵官並貶秩嘉祐四年詔京師所製軍器多不鋒利其選朝臣使臣各一員揀試之七年詔江西制置賊盜司在所有私造兵甲匠並籍姓名若再犯者並妻子徙淮南熙寧元年始命入內副都知張若水西上閣門使李評料簡弓弩而增修之若水進所造神臂弓實李宏所獻蓋弩類也以檿為身檀為弰鐵為子槍頭銅為馬面牙發麻繩扎絲為弦弓之身三尺有二寸弦長二尺有五寸箭木羽長數寸射三百四十餘步入榆木半笴帝閲而善之於是神臂始用而他器弗及焉二年命河北州軍凡戎器分三等以聞又詔內庫凡器甲擇其良若干條上四年詔諸路遣官詣州分庫藏甲兵器為三等如沿邊三路而川峽不與五年帝匣斬馬刀以示蔡挺挺謂製作精而操擊便乃命中人領工造數萬口賜邊臣鐔長尺餘刃三尺餘首為大環是歲詔權三司度支副使沈起詳定軍器制度起以為一己之見有限宜令在京及三路主兵官監官工匠審度法度所宜庶可傳久詔從之時帝欲利戎器而患有司苟簡王雱上疏曰漢宣帝號中興賢主而史稱技巧工匠獨精於元成之時是雖有司之事而上繫朝廷之政方今外禦邊患內虞賊盜而天下歲課弓弩甲胄入充武庫者以千萬數乃無一堅好精利實可為備者臣嘗觀諸州作院兵匠乏少至拘市人以備役所作之器但形質而已武庫之吏計其多寡之數而藏之未嘗責其實用故所積雖多大抵敝惡夫為政如此而欲抗威決勝外攘內修未見其可也儻欲弛武備示天下以無事則金木絲枲蝲膠角羽之材皆民力也無故聚工以毀之甚可惜也莫若更制法度斂數州之作聚為一處若今錢監之比擇知工事之臣使專其職且募天下良工散為匠師而朝廷內置工官以總制其事察其精窳而賞罰之則人人務勝不加責而皆精矣聞今武庫太祖時弓尚有如新者而近世所造往往不可用此可見法禁之張弛矣大抵雱為此言以迎逢上意欲妄更舊制也六年始置軍器監總內外軍器之政置判一人同判一人屬有丞有主簿有管當公事先是軍器領於三司至是罷之一總於監凡産材州置都作院凡知軍器利害者聽詣監陳述於是吏民獻器械法式者甚衆是歲又置內弓箭南庫軍器監奏以利器頒諸路作院為式是年冬以騎兵據大鞍不便野戰始製小鞍皮木長於回旋馬射得以馳驟且選邊人習騎者分隸諸軍時周士隆上書論廣西交址事請為車以禦象陳文彥博非之安石以為自前代至本朝南方數以象勝中國士隆策宜可用因論自古車戰法甚辨請以車騎相當試以觀其孰利帝亦謂北邊地平可用車為營乃詔試車法令沿河採車材三千兩軍器監定法式造戰車以進七年判監呂惠卿言其所上弓式及其他兵器制度下殿前馬步三司令定奪去取而逐司不過取責軍校文狀以聞非獨持其舊説不肯更張又其智慮未必能知作器之意臣於朝廷已行之令非敢言改乞就一司同議帝乃遣管軍郝質赴監定奪皆曰便時軍器監製器不一材用滋耗於是詔不以常制選官馳往州縣根括牛皮角蝲能令數羡次第加奬是歲始造箭曰狼牙曰鴨觜曰出尖四楞曰一插刃鑿子凡四種推行之八年詔河北拒馬或多以竹為之不足當敵令軍器監造三萬具赴北京澶定州又令計河北所少兵器製造其不急者毋得妄費材力又詔民戶馬死舊不以報官者並報輸皮蝲以充用帝慮置監未有實效而虛用材役詔中書樞密院核實其事令條畫以聞軍器監奏置監以來增造兵器若干為工若干視前器增而工省帝復詰之且令與御前工作所較工孰省驗器孰良王韶謂如此恐內外相傾成俗且往年軍器監檢察內臣折剝弓弩隙由此生今令內臣較按軍器監又如曩日相傾無已帝曰比纍纍説軍器監事若不較見事實即中外便以為聽小臣譖訴今令得實行法所以明曲直也安石曰誠當如此若每事分別曲直明其信誕使功罪不蔽則天下之治久矣王韶曰軍器監事不須比較帝曰事不比較無由見枉直安石曰朝廷治事唯欲直而已其後安石卒以辨口解帝之疑而軍器監獲免欺冒之罪冬十月軍器監欲下河東等路采市曲木為鞍橋帝以勞民費財不許是時河東陝西廣南帥臣邀功不已請增給兵器帝各令給與之至是有乞以耕牛博買器甲者元豐元年冬鄜延路經略使呂惠卿乞給新樣刀軍器監欲下江浙福建路製造帝不許給以內南庫短刃刀五萬五千口二年御批有曰河東路見運物材於緣邊造軍器顯為迂費張皇可令軍器監速罷之三年吉州奏奉詔市箭笴三十萬非土地所産且民間不素蓄乞豫給緡錢期以一年和市從之時西邊用兵久不解四年春陝西轉運使李稷奏本道九軍什物之外一皆無之乞於永興軍庫以餘財立法營辦七月涇原路奏修渭州城畢而防城戰具寡少乞給三弓八牛床子弩一槍三劍箭各欲依法式製造詔圖樣給之五年七月鄜延路計議邊事所奏乞緡錢百萬工匠千人鐵生熟五萬斤牛馬皮萬張造軍器並給之八月詔令沈括以劈陳大斧五千選給西邊諸將十一月陝西轉運使李察言本路都作院五宜各委監司提舉從之六年二月詔熙河路守具有闕給氈三千領牛皮萬張運送之八月從環慶路趙之請以神臂弓一千箭十萬給之未幾賜蘭會路藥箭二十五萬七年陝西轉運副使葉康直言秦鳳路軍器見闕名物計四百三十餘萬使一一為之非十餘年可就乞自京給賜詔量給之帝性儉約有司造將官皮甲欲以生絲染紅代氂牛尾為瀝水帝惜之代以他毛於一弓一矢一甲一牌之用無不盡心焉弓曰闊閃促張弓罷長弰舊法矢曰減指箭牌以欒竹穿皮為之以易桐木牌改素鐵甲為編挨甲其法精密乃劉昌祚尹抃閻守勤等所定制度云八年十月詔內外所造軍器以見餘物材工匠造之兵匠民工即罷遣之元祐元年詔三路既罷保甲團教其器甲各送官收貯勿得以破損拘民整治八月詔太僕少卿高遵惠會工部及軍器監內外作坊及諸州都作院工器之數以要切軍器立為歲課務得中道他非要切並權住勿造於是數年之間督責少薥紹聖三年有司言州郡兵備全為虛文恐緩急不足備禦請稍推行熙寧之詔常令封樁排垛依雜隊法從之元符元年詔江湖淮浙六路合造神臂弓三千箭三十萬二年臣僚奏乞增造神臂弓於是軍器監所造歲益千餘弓是歲詔河北沿邊州城壁樓櫓器械各務修治有不治者罪之先是二廣路土丁令依熙寧指揮修置器械三年知端州蕭刓上疏極言傷財害民其弊非一乞住買槍手器械疏奏不報崇寧初臣僚爭言元祐以來因循弛廢兵不犀利詔復令諸路都作院創造修治官吏考察一如熙寧時矣時有詔造五十將器械從工部請令內外共造由是都大提舉內外製造軍器所之名立焉初從邢恕之議下令創造兵車數十乘買牛以駕已而蔡碩又請河北置五十將兵器且為兵車萬乘蔡京主其説姦吏旁緣而因為民害者深矣崇寧三年河北陝西都轉運司言兵車之式若用許彥圭所定則車大而費倍若依往年二十將舊式則輕小易用且可省費詔卒以許彥圭式行之時熙河轉運副使李復先奏曰今之用兵與古不同古者征戰有禮不為詭遇多由正塗故車可行而敵不敢輕犯今之用兵盡在極邊下寨駐軍各以保險為利車不能上又戰陳之交一進一退車不能及一被追襲遂非己有臣屢觀戎馬之間雖糧糗衣服器械不能為用況於車乎臣聞此車之造許彥圭因姚麟以進其説朝廷以麟熟於邊事而不知彥圭輕妄麟立私恩以誤國計其車比於常法闊六七寸運不合轍東來兵夫牽挽不行以致典賣衣物自賃牛具終日而進六七里棄車而逃者往往而是夫未造則有配買物材顧差夫匠之擾既成又難運致則為諸路之患有不可勝言者矣彥圭但圖一官之得不知有誤於國此而不誅何以懲後今乞便行罷造已造者不復運來以寬民力其後彥圭卒得罪元豐之時河北河東路軍器每季終委逐路職司更互考察元祐罷之四年因工部之請復行之大觀二年手詔曰前東南備禦指揮深慮監郡縣吏急切者倚法害民廢職者慢令失事如築城壁造軍器收戰馬習水戰之類並可量度工力計以歲月漸次興作毋得急遽科斂及差雇百姓使急不擾民緩不廢事然後為稱尋詔限十年一切畢工四月罷黎雅等州市氂牛尾慮為民害八月提舉御前軍器所奏乞如崇寧五年指揮下諸路買牛角四十萬隻蝲十萬斤從之政和二年二月詔諸路州郡造軍器有不用熙寧法式者有司議罰具為令六月又詔並用御前軍器所降法式前二月指揮勿行三年詔馬甲曩用黑髹漆今易以朱是歲姚古奏更定軍器曩時甲二副今拆造三副曩時手刀太重今皆令輕便易用曩時神臂弓硾二石三斗今硾一石四斗從之悉下諸路改造六年軍器少監鄧之綱奏國家諸路為將一百三十有一訓練士卒各給軍器以備不虞惟河北諸將軍器乃熙豐時造精利牢密冠於諸路臣恐歲久因循多致損弊乞自河北陝西路為首令諸路一新戎器仰稱陛下追述先志儲戎器壯國威之意從之七年之綱三上奏一言修武庫二言整軍器大省國用詔升之綱為大監又遷一官時宇文粹中賜對崇政殿奏武庫事因奏武庫有祖宗所御軍器十餘色乞編入鹵簿圖志遇郊兵重禮陳於儀物之首以識武功且示不忘創業艱難意是年御筆以武庫當修軍器近一億萬其中箭鏃五千餘萬用平時工料須七十年餘然後可畢於是令鄧之綱分給沿流作院限三年修之而權住三年上供軍器八年以之綱奏諸路歲起上供料買分數特免三年綱發然自時厥後申明郡縣牛皮角蝲之禁紛然為害者之綱之請也宣和元年權荊湖南路提點刑獄公事鄭濟奏本路惟潭邵二州各有年額製造軍器今年製造已足躬親試驗並依法式不誤施用詔加旌賞以為諸路之勸然自是歲督軍器率用御筆處分工造不已而較數嘗闕繕修無虛歲而每稱弊壞大抵中外相應一以虛文上下相蒙而馴致靖康之禍矣靖康初兵仗皆闕詔書屢下嚴立賞刑而卒亦無補時通判河陽權州事張旗奏曰河陽自今春以來纍有軍馬經過軍士舉隨身軍器若馬甲神臂弓箭槍牌之類於市肆博易熟食名為寄頓其實棄遺避逃征役拘收三日間得器械四千二百餘物此乃太原援師尚且棄捐器甲則他路軍馬事勢可知宜諭民首納免貽他患帝善旗奏賞以一官初御前軍器監軍器所萬全軍匠以三千七百為額東西作坊工匠以五千為額紹興初役兵才千人久之增至五千六百餘又於諸道增二千九百餘本券外復增給日錢百七十月米七斗半於是內庫纍歲兵械山積而諸軍悉除戎器二十六年詔工匠宜減免江浙福建諸州物料悉蠲之有司奏物料減三之一工匠二千雜役兵五百為額舊軍器所得專達建炎中嘗以閹官董賣心提舉尋罷之紹興五年隸工部後復以中人典領三十年工部言非祖宗建官意詔依條檢察孝宗受禪增提點官一員御史力論其不可復隸工部焉造車之制渡江後東南地多沮洳險隘不以車為主宗澤李綱有戰車法王大智獻車式皆不復用而屬意甲胄弧矢之利矣建炎初上諭宰執曰方今戰士無慮三十萬若皆被堅執鋭加以弧矢之利雖強敵無足畏也造弓必用良工善價紹興三年提舉製造軍器所言以七十工造全裝甲一又長齊頭甲每一甲用工百四十一短齊頭甲用工七十四乞以本所全裝甲為定式席益言諸州造馬蝗弩不若令造弓詔並改造弓弩內馬蝗弩改手射弓紹興四年軍器所言得旨依御降式造甲緣甲之式有四等甲葉千八百二十五表𩹉磨鋥內披膊葉五百四每葉重二錢六分又甲身葉三百三十二每葉重四錢七分又腿裙鶻尾葉六百七十九每葉重四錢五分又兜鍪簾葉三百一十每葉重二錢五分並兜鍪一杯子眉子共一斤一兩皮線結頭等重五斤十二兩五錢有奇每一甲重四十有九斤十二兩若甲葉一一依元領分兩如重輕差殊即棄不用虛費工材乞以新式甲葉分兩輕重通融全裝共四十五斤至五十斤止詔勿過五十斤三十二年詔江東安撫司造木弩五千箭五十萬隆興元年御降木羽弩箭式每路依式製箭百萬淳熙九年衢州守臣製到木鶴觜弩二千箭十萬又湖北京西造納無羽箭上曰箭不用羽可謂精巧其屋藏之淮東總領朱佺言鎮江一軍乃韓世忠部曲世忠造克敵弓以當敵騎衝突其發可至百步其徑可穿重甲最為利器往歲調發弓不免損失存者歲久亦漸薥壞今考諸軍見弩手八千八百四十二人人合用兩弓一弓一日上教一弓備出戰合用弓萬七千六百八十有四僅存六千五百七十有四餘皆不堪施教乞下鎮江都統司足其額十五年工部侍郎李昌圖言弓矢之利貴於便疾神臂弓斗力及遠屢獲其用後又造神徑弓及遠雖在神臂弓上軍中多言其發遲每神臂三矢而神徑方能一發若臨敵之際便疾反出神臂下上曰平原曠野宜用神徑弓西蜀崇山峻嶺未知孰利詔金州都統司詳議以聞既而都統制吳挺奏神徑弓並彈子頭箭諸軍用之誠便疾神臂不及也詔從其便楚州兵馬鈐轄言弩之力徑者三十石次者十五石矢之鏃狀若鍬所發何啻數百步洞穿數人江上諸軍有弩式皆廢不修詔兩淮荊襄沿邊城守各製二十枝御前軍器所亦如之紹熙而後日造器械數目山積開慶元年壽春府造筒木弩與常弩明牙發不同箭置筒內甚穩尤便夜中施發又造突火槍以巨竹為筒內安子窠如燒放焰絶然後子窠發出如炮聲遠聞百五十餘步咸淳九年沿邊州郡因降式製回回炮有觸類巧思別置炮遠出其上且為破炮之策尤奇其法用稻穰草成堅索條圍四寸長三十四尺每二十條為束別以麻索繫一頭於樓後柱搭過樓下垂至地𧸐梁垂四層或五層周庇樓屋沃以泥漿火箭火炮不能侵炮石雖百鈞無所施矣且輕便不費財立名曰護陴籬索是時兵紀不振獨器甲視舊制益詳
