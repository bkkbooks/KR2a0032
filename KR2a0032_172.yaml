body:
  text: 宋史卷一百七十二志第一百二十五職官十二奉祿制下增給公用錢給券職田增給權三司使知開封府百千權發遣三司使五十千玉清昭應宮景靈宮會靈觀三副使觀文殿大學士三十千觀文殿學士資政殿大學士元豐添保和殿大學士宮觀三司判官判子司權及權發遣同開封府判官提舉諸司庫務管轄三司軍大將提點內弓箭庫二十千宮觀都監勾當官十七千任都知押班者二十千資政端明翰林侍讀元祐復置翰林侍讀侍講學士紹聖中罷龍圖天章學士元豐添保和延康寶文顯謨徽猷學士樞密直後改述古殿龍圖天章直學士元豐添寶文顯謨徽猷直學士保和龍圖天章寶文顯謨徽猷待制十五千春冬綾各五匹絹十七匹羅一匹綿五十兩已上大學士至待制奉隨本官衣賜如本官例大即依本官例小即依逐等大觀二年戶部尚書左睿言見編修祿格學士添支比正任料錢相去遼邈如觀文殿大學士節度使從二品大學士添支三十千而已節度使料錢乃四百千傔從粟帛等稱是或謂大學士有寄祿官料錢故添支數少今以銀青光祿大夫任觀文殿大學士較之則通料錢不及節度使之半其厚薄不均明矣自餘學士視諸正任率皆不等欲將職錢改作貼職錢以別之正任料錢公使為率參酌立定自學士至直閣以上貼職錢不以內外並給觀文殿大學士百千觀文學士資政大學士八十千端明後改延康殿學士五十千前執政加二十千龍圖天章寶文顯謨徽猷學士樞密直改述古學士四十千龍圖天章寶文顯謨徽猷直學士三十千待制二十千集賢改集英殿修撰十五千直龍圖閣至直祕閣十千詔從之宣和三年戶部尚書沈積中侍郎王蕃言元豐法帶職人依嘉祐祿令該載觀文殿大學士以下至直學士添支錢三等自二十千至十五千大觀中因敕令所啓請改作貼職錢觀文大學士至直祕閣自百千至十千凡九等兼增添在京供職米麥觀文殿大學士至待制自五十石至二十五石四等比舊法增多數倍又奏學士提舉在京官除本身請給外更請貼職并差遣添支比六曹尚書翰林學士承旨幾及一倍以上非稱事制祿之意詔並依元豐法御史中丞二十千察案御史十千籍田令七千並依元豐三年詔司農寺丞十五千主簿京朝官十二千選人十千熙寧三年詔廣親睦親宅記室講書十五千教授十二千軍巡使十七千權使及判官七千已上並元豐制已下惟增散官而已羣牧使副使開封推官三司河渠勾當公事同管勾河渠案公事十五千羣牧都監十三千銀臺司審官院三班院吏部銓登聞檢院鼓院太常禮院主判官糾察在京刑獄羣牧判官監祭使十千判司農寺七千其知判諸路州軍府有六十千至七千凡八等有以官者三師三公六十千僕射東宮三師并曾任中書樞密特進五十千尚書并左右丞東宮三少金紫光祿大夫至光祿大夫學士給事中諫議舍人待制已上并橫班使副三十千橫班有二十千者待制已上充益梓利夔州路知州給鐵錢二百千橫班副使知夔州一百五十千知諸州軍者八十千大卿監諸司使副至供奉官中大夫至中散大夫武功郎至秉義郎閣門祗候已上十五千十五千已上有從州府地望給者不係大卿充益梓利夔知州給鐵錢一百五十千諸司副使至供奉官閣門祗候已上知四州同若知諸州軍八十千惟諸司使一百千朝官忠翊郎侍禁閣門祗候十千朝官權知軍州府者同若知四路諸州府給鐵錢八十千知軍六十千侍禁閣門祗候知諸軍州同保義郎殿直閣門祗候八千若知四路諸州軍者給鐵錢五十千京官十千至七千有二等知四路州府給鐵錢六十千知軍五十千試銜及州縣官職官兼知春州七千有以州望者河南大名荊南永興江寧杭揚潭并代州三十千應天真定鳳翔陝府秦青洪州二十千河中鄆許襄孟滑鄭滄邢澶貝相華晉潞廬壽宿泗楚蘇越潤常州十五千廣州知州歲七百千逐月均給舊月給百千大中祥符六年令歲取五百千餘充添給益州給鐵錢三百千梓州二百千夔州百五十千餘州約銅錢數而給之有都總管經略安撫等使者河北四路真定瀛州定州大名陝西逐路永興秦州渭州慶州延州河東路太原前任兩府並五十千諫議舍人待制太中大夫已上三十千並特添二十千知大名府帶河北路安撫使同知并州帶學士即五十千而無特給三路管勾機宜文字朝官十千京官七千知桂州充廣南西路都鈐轄經略安撫使自諫議舍人待制及大卿監太中大夫中散大夫已上三十千朝臣充廣西路兵馬都鈐轄兼本路安撫管勾經略司公事即二十千河北沿邊安撫副使都監以橫行使充者三十千自橫行副使并諸司使副至崇班武功大夫敦武郎以上充者二十千供奉官秉義郎閣門祗候充都監十五千同管勾河東緣邊安撫司公事以橫行副使至內殿崇班敦武郎以上二十千通判大藩有二十千至十五千者餘州軍朝官有十千至七千者京官七千朝官通判益州給鐵錢八十千京官六十千朝官通判益梓利夔路州軍府給鐵錢七十千京官五十千簽判朝官十千京官七千朝官簽判益梓州給鐵錢七十千京官五十千三路轉運使淮南江浙荊湖制置茶鹽等稅都大發運使諫議待制大卿監以下太中中散以上三十千朝官充發運使副二十千武功大夫至武翼郎諸司使副充發運使副都監同朝官充判官十千三門白波發運使朝官二十千朝官充判官十千京官七千諸路轉運使副朝官宣德郎以下二十千任四路者給鐵錢一百五十千判官十千任福建廣南東西路十五千任益梓利夔四路給鐵錢八十千諸路提點刑獄勸農使副開封府界提點諸縣鎮公事二十千忠翊郎侍禁閣門祗候以下任諸路提點刑獄勸農使副並府界同提點敦武郎內殿崇班已上者十五千朝官并秉義郎供奉官閣門祗候已上任四路提點刑獄給鐵錢一百五十千忠翊郎侍禁閣門祗候以下一百千諸路副都總管權總管都鈐轄路分鈐轄州鈐轄路分都監有五十千至八千凡六等任四路給鐵錢有二百千至一百千凡三等府界及諸路州府軍監縣鎮都監巡檢寨主監押自諸司使以下至三班借職武功大夫至承信郎已上十五千至五千凡六等任四路給鐵錢有一百千至五十千凡四等陝西河東沿邊諸族蕃官巡檢自十五千至四千凡六等諸路走馬承受公事自從義郎至保義郎供奉官至殿直并兩省自供奉官至黃門自十千至五千凡四等任四路給鐵錢自六十千至四十千凡三等府界并諸路州府軍監縣鎮監當朝官七千京官五千至四千凡二等武功大夫以下至進義校尉諸司使以下至三班使臣自十千至三千凡七等朝官任川峽州府軍監給鐵錢五十千京官三十千至二十五千凡二等三班使臣任四路者自六十千至二十五千凡五等朝官充陝西及江浙荊湖福建廣南提舉提點鑄錢等公事自二十千至十五千凡二等朝官充都大提舉河渠司勾當及提舉宮觀并催遣輦運催綱諸州監物務等自十五千至七千凡三等任四路給鐵錢七十千京官充催促輦運催裝斛斗綱船并諸州監物務等自七千至五千凡二等任四路給鐵錢五十千都大提舉修護黃河堤掃岸諸處巡檢并監北京大內軍器庫并蔡河撥發催綱等並以兩省供奉官以下至內品充自十千至三千凡七等舊志有諸路都部署鈐轄有五十千至十五千凡四等駐泊都監兵馬都監有二十千至十五千凡六等諸州監場務朝官供奉以上七千京官殿直五千奉職內品三千內課頤大者京朝官與京官同使臣與兵馬監押同大中祥符二年詔外任官不得挈家屬赴任者許分添給錢贍本家添給羊凡外任給羊有二十口至二口凡六等給米有二十石至二石凡七等給麥丏有三十石至二石凡七等傔從有二十人至二人凡七等馬有十匹至一匹凡六等舊志數不同今從四朝志建炎南渡以後奉祿之制參用嘉祐元豐政和之舊少所增損惟兵興之始宰執請受權支三分之一或支三分之二或支賜一半隆興及開禧自陳損半支給皆權宜也其後內外官有添支料錢職事官有職錢廚食錢職纂修者有折食錢在京釐務官有添支錢添支米選人使臣職田不及者有茶湯錢其餘祿粟傔人悉還疇昔今合新舊制而參記之元豐定制以官寄祿南渡重加修定開府儀同三司料錢一百貫特進九十貫春冬衣絹各二十五匹小綾一十匹春羅一匹冬綿五十兩金紫光祿大夫銀青光祿大夫料錢各六十貫春冬絹各二十匹小綾七匹春羅一匹冬綿五十兩宣奉大夫正奉大夫正議大夫通奉大夫料錢各五十貫春冬絹各十七匹小綾五匹春羅一匹冬綿五十兩通議大夫太中大夫中大夫中奉大夫中散大夫料錢各四十五貫春冬絹各二十五匹小綾三匹春羅一匹冬綿五十兩朝議大夫奉直大夫朝請大夫朝散大夫朝奉大夫以上料錢各三十五貫春冬絹各一十五匹春羅一匹冬綿三十兩朝請郎朝散郎朝奉郎以上料錢各三十貫春冬絹各一十三匹春羅一匹綿三十兩承議郎料錢二十貫春冬絹各一十匹春羅一匹冬綿三十兩奉議郎料錢二十貫春冬絹各十匹春羅一匹冬綿三十兩通直郎料錢十八貫春冬絹各七匹春羅一匹冬綿三十兩宣教郎料錢十五貫春冬絹五匹冬綿十五兩宣議郎料錢十二貫春冬絹各五匹冬綿十五兩承事郎料錢十貫春冬絹各五匹冬綿十五兩承奉郎料錢八貫承務郎料錢七貫元豐以來釐務止支驛料大觀二年定支以上料錢一分見錢二分折支每貫折錢在京六百文在外四百文到任添給驛料承直郎料錢二十五貫茶湯錢一十貫廚料米六斗一石五斗四十束柴二十束馬一匹春冬絹六匹綿一十二兩儒林郎料錢二十貫茶湯錢一十貫廚料米六斗一石五斗三十束柴一十五束春冬絹各五匹冬綿十兩文林郎料錢一十五貫茶湯錢十貫廚料米六斗一石五斗三十束柴十五束春冬絹各五匹綿十兩從事郎從政郎修職郎已上料錢各一十五貫茶湯錢一十貫米麥各二石迪功郎料錢一十二貫茶湯錢一十貫米麥各一石五斗以上錢折支中給一半見錢一半折支每貫折見錢七百文釐務日給滿替日住武臣請奉太尉料錢一百貫春服羅一匹小綾及絹各十匹冬服小綾十匹絹二十匹綿五十兩正任節度使在光祿大夫之下初授及帶管軍同料錢四百貫祿粟一百五十石承宣使在通議大夫之下料錢三百貫祿粟一百石觀察使在中大夫之下料錢各二百貫祿粟一百石米麥十五石防禦使在中散大夫之下料錢二百貫祿粟一百石米麥各十二石五斗團練使在中散大夫之下料錢一百五十貫祿粟七十石米麥各九石諸州刺史在中散大夫之下料錢一百貫祿粟五十石米麥各七石五斗自承宣使以下不帶階官者為正任帶階官者為遙郡遙郡各在正任之下請奉與次任正任一同靖康指揮遙郡以上奉錢衣賜傔人奉馬權支三分之二殿前三衙四廂捧日天武左右廂都指揮使遙郡團練使料錢一百貫文春冬服絹各十匹殿前諸班直都虞候諸軍都指揮使遙郡刺史料錢五十貫衣同前龍衛神衛右廂都指揮使遙郡團練使同捧日天武龍神衛諸軍都指揮使遙郡刺史同殿前左右金吾衛上將軍左右衛上將軍在光祿大夫之下諸衛上將軍在通奉大夫之下以上料錢各六十貫春冬綾各五匹絹各一十匹春羅一匹冬綿五十兩左右金吾衛大將軍在中散大夫之下料錢三十五貫春冬綾三匹絹七匹春羅一匹綿三十兩諸衛大將軍在中散大夫之下料錢二十五貫春冬綾三匹絹各七匹春羅一匹冬綿二十兩諸衛將軍在朝奉郎之下料錢二十五貫春冬綾各