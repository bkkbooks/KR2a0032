軍將隨諸司使以上有軍將橐駝餘皆有牙官馬驢惟節察有賓幕諸州及四夷貢奉使諸司職掌祗事者亦有給焉四夷有譯語通事書狀換醫十券頭首領部署子弟之名貢奉使有廳頭子將推船防授之名職掌有傔京朝官三班外任無添給者止續給之京府按事畿內幕職州縣出境比較錢穀覆按刑獄並給券其赴任川峽者給驛券赴福建廣南者所過給倉券入本路給驛券皆至任則止車駕巡幸羣臣扈從者中書樞密三司使給館券餘官給倉券職田周自卿以下有圭田不稅晉有芻田後魏宰人之官有公田北齊一品以下公田有差唐制內外官各給職田五代以來遂廢咸平中令館閣檢校故事申定其制以官莊及遠年逃亡田充悉免租稅佃戶以浮客充所得課租均分如鄉原例州縣長吏給十之五自餘差給其兩京大藩府四十頃次藩鎮三十五頃防禦團練州三十頃中上刺史州二十頃下州及軍監十五頃邊遠小州上縣十頃中縣八頃下縣七頃轉運使副十頃兵馬都監押寨主釐務官録事參軍判司等比通判幕職之數而均給之景德二年七月詔諸州職田如有災傷準例蠲課大中祥符九年殿中侍御史王奇上言請天下納職田以助振貸帝曰奇未曉給納之理然朕每覽法寺奏款外官占田多踰往制不能自備牛種水旱之際又不蠲省致民無告遂罷奇奏因下詔戒飭之天聖中上患職田有無不均吏或多取以病民詔罷天下職田悉以歲入租課送官具數上三司計直而均給之朝廷方議措置未下仁宗閲具獄見吏以賄敗者多惻然傷之詔復給職田毋多占佃戶及無田而配出所租違者以枉法論又十餘年至慶曆中詔限職田有司始申定其數凡大藩長吏二十頃通判八頃判官五頃幕職官四頃凡節鎮長吏十五頃通判七頃判官四頃幕職官三頃五十畝凡防團以下州軍長吏十頃通判六頃判官三頃五十畝幕職官三頃其餘軍監長吏七頃判官幕官並同防團以下州軍凡縣令萬戶以上六頃五千戶以上五頃不滿五千戶並四頃凡簿尉萬戶以上三頃五千戶以上二頃五十畝不滿五千戶二頃録事參軍比本判官曹官比倚郭簿尉發運制置轉運使副武臣總管比節鎮長吏發運制置判官比大藩府通判安撫都監路分都監比節鎮通判大藩府都監比本府判官黃汴河許汝石塘河都大催綱比節鎮判官節鎮以下至軍監諸路走馬承受并寨主都同巡檢提舉捉賊提點馬監都大巡河不得過節鎮判官在州監當及催綱撥發巡捉私茶鹽賊盜駐泊捉賊不得過簿尉自此人有定制士有定限吏以職田抵罪者視昔為庶幾焉至熙寧間復詔詳定凡知大藩府三京京兆成都太原荊南江寧府延秦揚杭潭廣州二十頃節鎮十五頃餘州及軍淮陽無為臨江廣德興國南康南安建昌邵武興化並十頃餘小軍監七頃通判藩府八頃節鎮七頃餘州六頃留守節度觀察判官藩府五頃節鎮四頃掌書記以下幕職官三頃五十畝防禦團練軍事推官軍監判官三頃令丞簿尉萬戶以上縣令六頃丞四頃不滿萬戶令五頃丞三頃不滿五千戶令四頃丞二頃五十畝簿尉減令之半藩府節鎮録參視本州判官餘視幕職官藩府節鎮曹官視萬戶縣簿尉餘視不滿萬戶者發運轉運使副視節鎮知州開封府界提點視餘州發運轉運判官常平倉司提舉官視藩府通判同提舉視萬戶縣令發運司幹當公事視節鎮通判轉運司管幹文字提刑司檢法官提舉常平倉司幹當公事視不滿萬戶縣令蔡河許汝石塘河都大催綱管幹機宜文字府界提點司幹當公事視節鎮判官總管視節鎮知州路分鈐轄視餘州知州安撫路分都監州鈐轄視節鎮通判藩府都監視本州判官諸路正將視路分都監副將視藩府都監走馬承受諸州都監都同巡都大巡河並視節鎮判官巡檢堡寨都監寨主在州監當及催綱撥發巡捉私茶鹽賊盜駐泊捉賊並視幕職官巡轄馬遞鋪監堰并縣鎮寨監當並視本縣簿尉諸路州學教授京朝視本州判官選人視本州曹官又詔成都府路提點刑獄司以本路職田令逐州軍歲以子利稻麥等拘收變錢從本司以一路所收錢數又紐而為斛斗價直然後等第均給自熙寧三年始知成都府一千石轉運使六百石鈐轄二員各五百石轉運判官視鈐轄通判二員各四百五十石簽判節推察推知録幹當糧料院監軍資庫都監都巡檢巡檢係大使臣走馬承受京朝官知縣各二百石內職官係兩使支掌以上資序者同如係初等及權入者各一百五十石監商稅市買院交子務係京朝官或大使臣充者視職官城外巡檢監排岸十縣巡檢係三班使臣者各一百五十石司理司戶司法府學教授係敕劄正授者監甲仗庫各一百石知眉蜀彭雅邛嘉簡陵州永康軍視成都通判其通判減三之一知威黎茂州視眉蜀通判其都監監押駐泊都巡檢係大使臣者簽判推判官係兩使職官并支掌以上資序知録京朝官并職官知縣監棚口鎮係京朝官視成都職官監押巡檢同巡檢駐泊係三班使臣初等職官或權入職官録事參軍縣令試銜知縣視成都城外巡檢司理司戶司法諸縣主簿尉應監當場務選人監稅監鹽巡轄馬鋪係三班使臣視成都曹官應諸縣令佐係職員權攝者不給歲有豐凶則數有少剩皆隨時等級為之增減初權御史中丞呂誨御史知雜劉述奉詔同均定成都梓利夔四路職田誨等以成都路歲收子利稻麥桑絲麻竹等物逐處不同遂計實直紐作稻穀一色每斗中價百有二十自知成都府以下官屬等第均定及再詔詳定而三路數少均分不足用定到成都路數目以聞中書再行詳定而有是詔元豐中詔熙河涇原蘭州路州軍官屬職田每頃歲給錢鈔十千以其元給田及新造之區募弓箭手及留其地以為營田元符三年朝散郎杜子民奏職田之法每患不均神宗首變兩川之法均給上下一路便之元祐中推廣此意以限月之法變而均給士大夫貪冒者或窮日之力以赴期會或交書請屬以幸權攝奔競之風長廉之節喪乞復元豐均給之法以養士廉節從之建中靖國元年知延安府范純粹奏昨帥河東日聞晉州守臣所得職田因李君卿為州諭意屬邑增廣租入比舊數倍後襄陵縣令周汲力陳其弊郡守時彥歲減所入十七八佃戶始脫苛斂之苦而晉絳陝三州圭腴素號優厚多由違法所致或改易種色或遣子弟公皂監穫貪污猥賤無所不有乞下河東陝西監司悉令改正從之大觀四年臣僚言圭田欲以養廉無法制以防之則貪者奮矣姦吏挾肥瘠之議以逞其私給田有限課入無算祖宗深慮其弊以提點刑獄官察之而未嘗給以圭租庶不同其利而公其心也近歲提點刑獄所受圭租同於他司故積年利病壅於上聞元豐舊制檢法官其屬也當視其長自元祐初併提舉常平司職事入提刑司兼領編敕遂將提舉官合給之數撥與提刑司參詳修立而檢法官亦預焉詔依舊法政和八年臣僚言尚書省以縣令之選輕措置自不滿五千戶至滿萬戶遞增給職田一頃夫天下圭租多寡不均久矣縣令所得亦復不齊多至九百斛如淄州高苑八百斛如常之江陰六百斛常之宜興亦六百斛自是而降或四五百或三二百凡在河北京東京西荊湖之間少則有至三二十斛者二廣福建有自來無圭租處川峽四路自守倅至簿尉又以一路歲入均給令固不得而獨有今欲一概增給一頃豈可得哉詔應縣令職田頃畝未及條格者催促摽撥宣和元年詔諸路職官各有職田所以養廉也縣召客戶稅戶租佃分收災傷檢覆減放所以防貪也諸縣多踰法抑都保正長及中上戶分佃認納不問所收厚薄使之必輸甚至不知田畝所在虛認租課聞之惻然應違法抑勒及詭名委保者以違詔論災傷檢放不盡者計贓以枉法論入己者以自盜論靖康元年詔諸路職田租存田亡者並與落租額紹興間懼其不均則詔諸路提刑司依法摽撥官多田少即於鄰近州縣通融須管數足又詔將空間之田為他司官屬所占者撥以足之仍先自簿尉始其有無職田選人並親民小使臣每員月支茶湯錢一十貫文內雖有職田每月不及十貫者皆與補足所以厚其養廉之利懼其病民則委通判縣令核實除其不可力耕之田損其已定過多之額凡職租不許輒令保正催納或抑令折納見錢或無田平白監租或以虛數勒民代納或額外過數多取皆申嚴禁止之令察以監司坐以贓罪所以防其不廉之害罷廢未幾而復舊拘借未久而給還移充糴本轉收馬料旋復免行皆所以示優恩厲清操也若其頃畝多寡具有成式知藩府謂三京潁昌京兆成都太原建康江陵延安興仁隆德開德臨安府秦揚潭廣州二十頃發運轉運使副總管副總管知節鎮一十五頃知餘州及廣濟淮陽無為臨江廣德興國南康南安建昌邵武興化漢陽永康軍并路分鈐轄一十頃發運轉運判官提舉淮南兩浙江南荊湖東西河北路鹽事官通判藩府八頃知餘軍及監并通判節鎮州鈐轄安撫副使都監路分都監將官發運司幹辦公事七頃通判餘州及軍滿萬戶縣令六頃藩府判官録事參軍州學教授並謂承務郎以上者都監發運轉運司主管文字滿五千戶縣令副將官五頃節鎮判官録事參軍州學教授並謂承務郎以上者轉運司主管帳司不滿五千戶縣令滿萬戶縣丞餘州都監走馬承受公事主管機宜文字同巡檢都大巡河提點馬監四頃節度掌書記觀察支使藩府及節鎮推官巡檢縣鎮寨都監寨主巡捉私茶鹽駐泊捉賊在城監當餘州判官學教授並謂承務郎以上者軍監都監三頃五十畝軍監判官餘州推官餘州及軍監録事參軍巡檢縣鎮寨都監寨主巡捉私茶鹽駐泊捉賊在城監當藩府及節鎮曹官州學教授謂承直郎以下滿五千戶縣丞滿萬戶縣簿尉巡轄馬遞鋪縣鎮寨監當及監堰三頃餘州及軍監曹官州學教授謂承直郎以下不滿五千戶縣丞滿五千戶縣簿尉巡轄馬遞鋪縣鎮寨監當及監堰二頃五十畝不滿五千戶縣簿尉巡轄馬遞鋪縣鎮寨監當及監堰二頃
