body:
  text: 宋史卷二本紀第二太祖二三年春正月癸酉朔以出師不御殿甲戌王全斌克劍門斬首萬餘級禽蜀樞密使王昭遠澤州節度趙崇韜乙亥詔瘞征蜀戰死士卒被傷者給繒帛壬午全斌取利州乙酉蜀主孟昶降得州四十五縣一百九十八戶五十三萬四千三十有九高麗國王遣使來朝獻戊子吏部郎中鄧守中坐試吏不當責本曹員外郎癸巳劉光義取萬施開忠四州遂州守臣陳愈降乙未詔撫西川將吏百姓丙申赦蜀歸俘獲除管內逋賦免夏稅及沿徵物色之半二月癸卯南唐吳越進長春節御衣金銀器錦綺以千計甲辰遣皇城使竇思儼迎勞孟昶丁未全州大水庚申王全斌殺蜀降兵二萬七千人於成都三月癸酉詔置義倉是月兩川賊羣起先鋒都指揮使高彥暉死之詔所在攻討夏四月乙巳回鶻遣使獻方物癸丑職方員外郎李嶽坐贓棄市南唐進賀收蜀銀絹以萬計戊午遣中使給蜀臣鞍馬車乘于江陵癸亥募諸軍子弟導五丈河通皇城為池五月辛未朔詔還諸道幕職令録經引對者以涉途遠近差減其選壬申幸迎春苑宴射乙亥遣開封尹光義勞孟昶於玉津園丙戌見孟昶於崇元殿宴昶等於大明殿丁亥賜將士衣服錢帛戊子大赦減死罪一等壬辰宴孟昶及其子弟於大明殿六月甲辰以孟昶為中書令秦國公昶子弟諸臣錫爵有差庚戌孟昶薨秋七月珍州刺史田景遷內附壬辰追封孟昶為楚王丁酉幸教船池遂幸玉津園宴射八月戊戌朔詔籍郡國驍勇兵送闕下癸卯河決陽武縣庚戌詔王全斌等廩蜀亡命兵士家乙卯河溢河陽壞民居戊午殿直成德鈞坐贓棄市己未鄆州河水溢沒田辛酉壽星見九月己巳閲諸道兵以騎軍為驍雄步軍為雄武並隸親軍壬申詔蜀諸郡各置克寧軍五百人辛巳河決澶州戊子幸西水磑十月丁酉朔大霧己未太子中舍王治坐受贓殺人棄市丙寅濟水溢鄒平十一月丙子甘州回鶻可汗遣僧獻佛牙寶器乙未劍州刺史張仁謙坐殺降貶宋州教練十二月丁酉朔詔婦為舅姑喪者齊斬己亥詔西川管內監軍巡檢毋預州縣事戊午甘州回鶻可汗于闐國王等遣使來朝進馬千匹橐駝五百頭玉五百團琥珀五百斤四年春正月丙子遣使分詣江陵鳳翔賜蜀羣臣家錢帛丁亥命丁德裕等率兵巡撫西川己丑幸迎春苑宴射二月癸卯視皇城役丙辰于闐國王遣其子德從來獻安國軍節度使羅彥瓌等敗北漢於靜陽擒其將鹿英辛酉試下第舉人甲子免西川今年夏稅及諸徵之半田不得耕者盡除之嶽州火三月癸酉罷義倉甲戌占城國遣使來獻癸未僧行勤等一百五十七人各賜錢三萬遊西域夏四月丁酉占城遣使來獻丙午潭州火壬子罷光州貢鷹鷂丁巳契丹天德軍節度使于延超與其子來降進士李藹坐毀釋氏辭不遜黥杖配沙門島庚申幸燕國長公主第視疾五月南唐賀文明殿成進銀萬兩甲戌光祿少卿郭坐贓棄市乙亥閲蜀法物圖書丁丑詔蜀郡敢有不省父母疾者罪之辛巳潭州火壬午澶州進麥兩歧至六歧者百六十五本辛卯熒惑犯軒轅六月甲午東阿河溢甲辰河決觀城月犯心前星丙午澧州刺史白全紹坐縱紀綱規財部內免官詔人臣家不得私養宦者內侍年三十以上方許養一子士庶敢有閹童男者不赦己酉果州貢禾一莖十三穗秋七月丙寅詔蜀官將吏及姻屬疾者所在給醫藥錢帛戊辰西南夷首領董皓等內附己巳幸造船務又幸開封尹北園宴射癸酉賜西川行營將士錢帛有差庚辰罷劍南蜀米麥征華州旱免今年租給州縣官奉戶八月丁酉詔除蜀倍息庚子水壞高苑縣城壬寅詔憲臣及吏刑部官三周歲滿日即轉授加恩庚戌樞密直學士馮瓚綾錦副使李美殿中侍御史李楫為宰相趙普陷以贓論死會赦流沙門島逢恩不還辛亥幸玉津園宴射京兆府貢野蠶繭壬子衡州火乙卯録囚丙辰河決滑州壞靈河大隄普州兔食稼閏月乙丑河溢入南華縣己巳衡州火乙亥詔民能樹藝開墾者不加征令佐能勸來者受賞九月壬辰朔水虎捷指揮使孫進龍衛指揮使吳瓌等二十七人坐黨呂翰亂伏誅夷進族庚子占城獻馴象乙巳幸教船池遂幸玉津園觀衛士騎射丙午詔吳越立禹廟于會稽冬十月辛酉朔命太常復二舞癸亥詔諸郡立古帝王陵廟置戶有差己巳禁吏卒以巡察擾民十二月庚辰妖人張龍兒等二十四人伏誅夷龍兒李玉楊密聶贇族五年春正月戊戌治河隄丁未合州漢初縣上青樛木中有文曰大連宋甲寅王全斌等坐伐蜀黷貨殺降全斌責崇義軍節度使崔彥進責昭化軍節度使王仁贍責右衛大將軍丙辰詔伐蜀將校有受蜀人錢物者並即還主丁巳賞伐蜀功曹彬劉光義等進爵有差二月庚申朔幸造船務遂幸城西觀衛士騎射甲子薛居正呂餘慶並為吏部侍郎依前參知政事己丑幸教船池三月甲辰詔翰林學士常參官於幕職州縣及京官內各舉堪任常參官者一人不當者連坐乙巳詔諸道舉部內官吏才德優異者丙午以普為尚書左僕射兼門下侍郎同中書門下平章事崇矩檢校太傅是日幸教船池又幸玉津園宴射丙辰北漢石盆寨招收指揮使閻章以寨來降五星聚奎夏五月乙巳賜京城貧民衣北漢鴻唐寨招收指揮使樊暉以寨來降甲寅王溥為太子太傅六月戊午朔日有食之辛巳幸建隆觀遂幸飛龍院丁亥嚑順化王子等來獻方物七月丁酉禁毀銅佛像己酉免水旱災戶今年租八月甲申河溢入衛州城民溺死者數百九月壬辰倉部員外郎陳郾坐贓棄市甲午西南蕃順化王子部才等遣使獻方物己酉畋近郊十一月乙酉朔工部侍郎毋守素坐居喪娶妾免供奉武仁海坐枉殺人棄市十二月丙辰禁新小鐵鑞等錢疏惡布帛入粉藥者癸酉升麟州為建寧軍節度趙普以母憂去位丙子起復開寶元年春正月甲午增治京城陝之集津絳之垣曲懷之武陟飢振之己亥北漢偏城寨招收指揮使任恩等來降三月庚寅班縣令尉捕盜令癸巳幸玉津園乙巳有馴象自至京師夏四月乙卯幸節度使趙彥徽第視疾五月丁未賜南唐米麥十萬斛六月癸丑朔詔民田為霖雨河水壞者免今年夏稅及沿徵物癸亥詔荊蜀民祖父母父母在者子孫不得別財異居丁丑太白晝見戊寅復見辛巳龍出單父民家井中大風雨漂民舍四百區死者數十人秋七月丙申幸鐵騎營賜軍錢羊酒有差北漢頴州寨主胡遇等來降丙午幸鐵騎營遂幸玉津園戊申坊州刺史李懷節坐強市部民物責左衛率府率北漢主劉鈞卒養子繼恩立八月乙卯按鶻于近郊還幸相國寺戊午又按鶻于北郊還幸飛龍院丙寅遣客省使盧懷忠等二十二人率禁軍會潞州戊辰命昭義軍節度使李繼勳等征北漢九月辛巳朔禁錢出塞癸未監察御史楊士達坐鞠獄濫殺棄市庚子李繼勳敗北漢於銅溫河己酉北漢供奉官侯霸榮弒其主繼恩繼元立冬十月己未畋近郊還幸飛龍院丙子吳越王遣其子惟濬來朝貢十一月癸卯日南至有事南郊改元開寶大赦十惡殺人官吏受贓者不原宰相普等奉玉册寶上尊號曰應天廣運大聖神武明道至德仁孝皇帝十二月甲子行慶自開封興元尹宰相樞密使及諸道蕃侯並加勳爵有差乙丑大食國遣使獻方物二年春正月己卯朔以出師不御殿二月乙卯命昭義軍節度使李繼勳為河東行營前軍都部署侍衛步軍指揮使黨進副之宣徽南院使曹彬為都監棣州防禦使何繼筠為石嶺關部署建雄軍節度使趙贊為汾州路部署以伐北漢宴長春殿命彰德軍節度使韓仲贇為北面都部署彰義軍節度使郭延義副之以防契丹戊午詔親征己酉以開封尹光義為上都留守樞密副使沈義倫為大內部署判留司三司事甲子發京師乙亥雨駐潞州三月壬辰發潞州乙未李繼勳敗北漢軍於太原城下戊戌駕傅城下庚子觀兵城南築長連城辛丑幸汾河作新橋發太原諸縣丁數萬集城下癸卯北漢史昭文以憲州來降乙巳臨城南謂汾水可以灌其城命築長隄壅之決晉祠水注之遂寨城四面繼勳軍於南贊軍於西彬軍於北進軍於東乃北引汾水灌城辛亥遣海州刺史孫方進率兵圍汾州四月戊申幸城東觀築隄壬子復幸城東己未何繼筠敗契丹於陽曲斬首數千級俘武州刺史王彥符以獻命陳示所獲首級鎧甲于城下壬戌幸汾河觀造船戊辰幸城西上生院丙子復幸城西五月癸未韓仲贇敗契丹於定州北自戊子至庚寅命水軍載弩環攻橫州團練使王廷義殿前都虞候石漢卿死之甲午北漢趙文度以嵐州來降甲辰都虞候趙廷翰奏諸軍欲登城以死攻上愍之不允閏月戊申雉圮水注城中上遽登隄觀己酉右僕射魏仁浦薨壬子以太常博士李光贊言議班師己未命兵士遷河東民萬戶于山東庚申分命使臣率兵赴鎮潞壬戌駕還戊辰駐蹕於鎮州六月丙子朔發鎮州癸巳至自太原曲赦京城囚秋七月丁巳幸封禪寺詔鎮深趙邢洺五州管內鎮寨縣悉城之甲子大宴賜宰相樞密使翰林學士節度觀察使襲衣金帶戊辰西南夷順化王子武才等來獻方物癸酉幸新水磑汴決下邑乙亥壽星見八月丁亥詔川峽諸州察民有父母在而別籍異財者論死九月乙巳朔幸武成王廟壬戌幸玉津園宴射冬十月戊子畋近郊庚寅散指揮都知杜延進等謀反伏誅夷其族詔相深趙三州丁夫死太原城下者復其家庚子以王溥為太子太師武衡德為太子太傅癸卯西川兵馬都監張延通內臣張嶼引進副使王王玉為丁德裕所譖延通坐不遜誅嶼王玉並杖配十一月丙午幸鎮寧軍節度使張令鐸第視疾甲寅畋近郊還幸金鳳園庚申回鶻于闐遣使來獻方物十二月癸未幸中書視宰相趙普疾己亥右贊善大夫王昭坐監大盈倉其子與倉吏為姦贓奪兩任配隸汝州丁德裕誣奏西川轉運使李鉉指斥事既直猶坐酒失責授右贊善大夫三年春正月癸卯朔雨雪不御殿癸丑增河堤辛酉詔民五千戶舉孝弟彰聞德行純茂者一人奇才異行不拘此限里閭郡國遞審連署以聞仍為治裝詣闕二月庚寅幸西茶庫遂幸建隆觀三月庚戌詔閲進士十五舉以上司馬浦等百六人並賜本科出身辛亥賜處士王昭素國子博士致仕丙辰殿中丞張顒坐先知潁州政不平免官己未幸宰相趙普第視疾夏四月辛未朔日有食之丁亥幸寺觀禱雨辛卯雨甲午幸教船池己亥罷河北諸州鹽禁詔郡國非其土産者勿貢五月丁未禁京城民畜兵器癸丑幸城北觀水磑癸亥賜諸班營舍為雨壞者錢有差六月乙未禁諸州長吏親隨人掌廂鎮局務秋七月乙巳立報水旱期式壬子詔蜀州縣官以戶口差第省員加祿尋詔諸路亦如之戊辰幸教船池又幸玉津園宴射八月戊子幸教船池又幸玉津園九月己亥朔命潭州防禦使潘美為賀州道兵馬行營都部署朗州團練使尹崇珂副之遣使發十州兵會賀州以伐南漢甲辰詔西京鳳翔雄耀等州周文成康三王秦始皇漢高文景武元成哀七帝後魏孝文西魏文帝後周太祖唐高祖太宗中宗肅宗代宗德順文武宣懿僖昭諸帝凡二十七陵嘗被盜發者有司備法服常服各一襲具棺槨重葬所在長吏致祭己酉幸開寶寺觀新鐘丙辰女直國遣使齎定安國王烈萬華表獻方物丁卯潘美等敗南漢軍萬衆於富州下之十月庚辰克賀州十一月壬寅下昭桂二州乙巳減桂陽歲貢白金額癸丑右領軍衛將軍石延祚坐監倉與吏為姦贓棄市癸亥定州駐泊都監田欽祚敗契丹於遂城丙寅以曹州舉德行孔蟾為章丘主簿十二月壬申潘美等下連州辛卯大敗南漢軍萬餘於韶州下之癸巳增河隄四年春正月戊戌朔以出師不視朝丙午罷諸道州縣攝官丁未右千牛衛大將軍桑進興坐贓棄市癸丑潘美等取英州雄州二月丁亥南漢劉鋹遣其左僕射蕭漼等以表來上己丑潘美克廣州俘劉鋹廣南平得州六十縣二百十四戶十七萬二百六十三辛卯大赦廣南免二稅偽署官仍舊三月乙未幸飛龍院賜從臣馬丙申詔廣南有買人男女為奴婢轉傭利者並放免偽政有害于民者具以聞除之增前代帝王守陵戶二夏四月丙寅朔前左監門衛將軍趙玭訴宰相趙普坐誣毀大臣汝州安置丁卯三佛齊國遣使獻方物己巳詔禁嶺南商稅鹽麴如荊湖法辛未幸永興軍節度使吳廷祚第視疾癸未幸開寶寺辛卯南唐遣其弟從諫來朝貢發廂軍千人修前代陵寢之在秦者壬辰監察御史閭丘舜卿坐前任盜用官錢棄市五月乙未朔御明德門受劉鋹俘釋之斬其柄臣龔澄樞李托薛崇譽大宴於大明殿鋹預焉丁酉賞伐廣南功潘美尹崇珂等進爵有差六月癸酉遣使祀南海丁丑命翰林試南漢官取書判稍優者授令録簿尉壬午以孝子羅居通為延州主簿封劉鋹為恩赦侯乙酉罷賀州銀場賜劉鋹月奉外錢五萬米麥五十斛河決原武汴決穀熟秋七月戊戌賜開封尹光義門戟十四庚子幸新修水磑賜役人錢帛有差戊午復著內侍養子令癸亥幸建武軍節度使何繼筠第視疾汴決宋城八月壬申文武百官上尊號不允辛卯景星見冬十月癸亥朔日有食之己巳詔偽作黃金者棄市庚午太子洗馬王元吉坐贓棄市辛巳除廣南舊無名配斂甲申詔十月後犯強竊盜者郊赦不原丙戌放廣南民驅充軍者十一月癸巳朔南唐遣其弟從善吳越國王遣其子惟濬以郊祀來朝貢南唐主煜表乞去國號呼名從之庚戌詔諸道所罷攝官三任無遺闕者以聞河決澶州通判姚恕坐不即上聞棄市己未日南至有事南郊大赦十惡故劫殺官吏受贓者不原詔置諸州幕職官奉戶壬戌蜀班內殿直四十人援御馬直例乞賞遂撾登聞鼓命各杖二十翌日悉斬于營都指揮單斌等皆杖降十二月癸亥朔賜南郊執事官器幣有差丁卯行慶開封尹光義興元尹光美貴州防禦使德昭宰相趙普並益食邑己巳內外文武官遞進勳爵辛未賜九經李符本科出身壬午畋近郊
