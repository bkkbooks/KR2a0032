body:
  text: 宋史卷一百一十七志第七十禮二十賓禮二入閣儀明堂聽政儀肆赦儀附皇太后垂簾儀皇太子正至受賀儀皇太子與百官師保相見儀入閣儀唐制天子日御正衙以見羣臣必立仗朔望薦食陵寢不能臨前殿則御便殿乃自正衙喚仗由宣政兩門而入是謂東西上閣門羣臣俟於正衙者因隨以入故謂之入閣五代以來正衙既廢而入閣亦希闊不講宋復行之建隆元年八月朔太祖常服御崇元殿設仗衛文武百官入閣始置待制候對官乃以工部尚書竇儀待制太常卿邊光範候對仗退賜食廊下乾德四年四月朔帝服通天冠絳紗袍御崇元殿視朝設金吾仗衛羣臣入閣太宗淳化二年十一月詔以十二月朔御文德殿入閣令史館修撰楊徽之張洎定為新儀前一日有司供帳於文德殿宋初曰文明是日既明先列文武官于殿庭之東西百官軍校行軍副使等序班於正衙門外屏南階下次御史中丞三院御史序立中丞獨穿金吾班過揖兩班一揖歸本位次監察御史兩員監閣於正衙門外屏北階上北面立次中書門下文明翰林樞密直學士兩省官分班立次司天奏辰刻次閣門版奏班齊皇帝服鞾袍乘輦至長春殿駐輦樞密使以下奏謁前導至文德殿殿上承旨索扇捲簾皇帝升位扇却儀鸞使焚香次文武官等拜次司天雞唱次閣門勘契次閣門使承旨呼四色官喚仗南班有辭謝者再拜先退中書門下班對揖序立正衙門外屏北階上次翰林學士兩省官中丞侍御史序立次金吾將軍押細仗入正衙門後橫行拜訖分行上黃道仗隨入金吾將軍至龍墀分班揖訖序立次吏部兵部侍郎執文武班簿入對揖立次中書門下學士兩省御史臺官入北面拜訖上黃道將至午階鞾急趨赴丹墀彈奏御史至吏部侍郎南便落黃道急趨就位起居郎舍人至兵部吏部侍郎後急趨而進飛至香案前皆揖訖序立次金吾大將軍先對揖並鞠躬鞾行至折方石位又對揖北行至奏事石位鞠躬一員奏軍國內外平安倒行就位次引文武班就位揖訖鞠躬鞾急趨入沙墀次引侍從班橫行宰臣祝月起居畢分班序立文武兩班出序立於衙門外刑法待制官赴監奏位中書門下夾香案侍立兩省御史臺官學士兵部吏部侍郎金吾將軍監閣御史並相次出就衙門外立惟學士立門側北候宰相中書門下詣香案前奏曰中書公事臣等已具奏聞訖乃退揖殿出次刑法官待制官各奏事並宣徽使答訖乃出就班次彈奏官左右史出閣內失儀者彈糾如式彈奏官失儀起居郎糾之起居郎失儀閣門使糾之閣門使失儀宣徽使糾之凡出者皆鞾急趨揖殿次中書門下學士就位閣門使宣放仗再拜賜廊下食又再拜次閣門使奏閣內無事文武官出殿上索扇垂簾輦還宮其賜廊下食自左右勤政門北東西兩廊文東武西以北為上立定中丞至本位面南一揖乃就坐食至臺吏贊乃搢笏食食訖復贊食畢而罷五月朔命有司增黃麾仗二百五十人令文武官隨中書門下橫行起居徙翰林學士位于參知政事後與節度使分東西揖殿出真宗凡三行之景德以後其禮不行仁宗從知制誥李淑議仍讀時令詔禮官詳定儀注以言者謂未合典禮而罷熙寧三年知制誥宋敏求等言奉詔重修定閣門儀制內文德殿入閣儀按今文德殿唐宣政殿也紫宸殿唐紫宸殿也然祖宗視朝皆嘗御文德殿入閣唐制常設仗衛于宣政殿或遇上坐紫宸即喚仗入閣如此則當御紫宸殿入閣方合舊典翰林學士王圭等議按入閣者乃唐隻日紫宸殿受常朝之儀也唐紫宸與今同宣政殿即今文德殿唐制天子坐朝必立仗于正衙若止御紫宸即喚正衙仗自宣政殿東西閣門入故為入閣五代以來遂廢正衙立仗之制今閣門所載入閣儀者止是唐常朝之儀非盛禮也自是入閣之禮遂罷敏求又言本朝惟入閣乃御文德殿視朝今既不用入閣儀即文德遂闕視朝之禮請下兩制及太常禮院約唐制御宣政殿裁定朔望御文德殿儀以備正衙視朝之制學士韓維等以入閣圖增損裁定上儀曰朔日不值假前五日閣門移諸司排辦前一日有司供帳文德殿其日金吾將軍常服押本衛仗判殿中省官押細仗先入殿庭東西對列文武官東西序立諸軍將校分入北向立朝堂引贊官引彈奏御史二員入殿門踏道當下殿北向立次催文武班分入並東西相向立諸軍將校即於殿庭北向立班皇帝服鞾袍御垂拱殿鳴鞭內侍閣門管軍依朔望常例起居次引樞密宣徽三司使副樞密直學士內客省使以下至醫官待詔及修起居注官二員並大起居諸司使以下退排立帝輦至文德殿後閣門奏班齊帝出殿上索扇升榻鳴鞭扇開捲簾儀鸞使焚香喝文武官就位四拜起居雞人唱時舍人於彈奏御史班前西向喝大起居御史由文武班後至對立位次引左右金吾將軍合班於宣制石南大起居班首出班躬奏軍國內外平安歸位再拜各歸東西押仗位通喝舍人於宣制石南北向對立舍人退於西階次揖宰臣親王以下躬奏文武百僚宰臣某姓名以下起居分引宰臣以下橫行諸軍將校仍舊立閣門使喝大起居舍人引宰臣至儀石北俯伏跪致詞祝月訖其詞云文武百僚宰臣全銜臣某姓名等言孟春之吉伏惟皇帝陛下膺受時祉與天無窮臣等無任歡呼抃蹈之至歸位五拜閣門使揖中書由東階升殿樞密使帶平章事以上由西階升殿侍立給事中一員歸左省位立轉對官立於給事中之南如罷轉對官每遇御史臺前期牒請文官二員並依轉對官例先於閣門投進奏狀吏部侍郎及刑法官立於轉對官南兵部侍郎於右省班南與吏部侍郎東西相向立搢笏各出班籍置笏上吏部兵部侍郎以知審官東西院官充刑法官以知審刑大理寺官充親王使相以下分班出引轉對官於宣制石南宣徽使殿上承旨宣答如儀次吏部兵部侍郎及刑法官對揖出次彈奏御史無彈奏對揖出如有彈奏並如儀引給事中至宣制石南揖躬奏殿中無事喝祗候揖西出次引修起居注官次引排立供奉官以下各合班於宣制石南躬喝祗候揖分班出喝天武官等門外祗候出索扇垂簾皇帝降坐鳴鞭舍人當殿承旨放仗四色官鞾急趨至宣制石南稱奉敕放仗金吾將軍並判殿中省官對拜訖隨仗出親王使相節度使至刺史學士臺省官諸軍將校等並序班朝堂謝賜茶酒帝復御垂拱殿中書樞密及請對官奏事不引見謝辭班後殿坐臨時取旨其日遇有德音制書御札仍候退御垂拱殿坐制箱出外應正衙見謝辭文武臣僚並依御史臺儀制喚班依序分入於文武班後以北為首分東西相向重行異位依見辭謝班序位餘押班臣僚於班稍前押班候刑法官對揖出分引近前揖躬舍人當殿宣班引轉對班見謝辭並如紫宸儀樞密使不帶平章事參知政事至同簽書樞密院事宣徽使並立於宣制石稍北宰臣親王樞密使帶平章事使相係押班者立於儀石南餘官並立於宣制石南如合通喚閣門使引並如儀贊喝訖係中書樞密並揖升殿辭謝揖西出其合問聖體者並如儀餘官分班出彈奏御史候見謝辭班絶對揖出其朝見如謝都城門外御筵及召赴闕謝茶藥撫問之類不可合班者各依別班中謝對賜酒食等並門賜其係正衙見門謝辭亦門外唱放應正衙見謝辭臣僚前一日於閣門投詣正衙榜子閣門上奏目又投正衙狀於御史臺四方館應朔日或得旨罷文德殿視朝止御紫宸殿起居其已上奏目正衙見謝辭班並放免依官品隨赴紫宸殿引或值改依常朝文德殿自有百官班日並如舊儀應外國蕃客見辭候喚班先引赴殿庭東依本國職次重行異位立候見辭謝班絶西向躬舍人當殿通班轉於宣制石南北向立贊喝如儀西出其酒食分物並門賜如有進奉候彈奏御史出進奉入唯御馬及擔床自殿西偏門入東偏門出其進奉出入天武官起居舍人通某國進奉宣徽使喝進奉出節次如紫宸儀候進奉出給事中奏殿中無事出其後殿再坐合引出者從別儀其日賜茶酒宰臣樞密於閣子親王於本廳使相宣徽使兩省官待制三司副使文武百官皇親使相以下至率府副率及四廂都指揮使以下至副都頭並於朝堂如朝堂位次不足即於朝堂門外設次管軍節度使至四廂都指揮使節度使兩使留後至刺史並於客省廳詔從所定徽宗初建明堂禮制局列上七議一曰古者朔必告廟示不敢專請視朝聽朔必先奏告以見繼述之意二曰古者天子負扆南向以朝諸侯聽朔則各隨其方請自今御明堂正南向之位布政則隨月而御堂其閏月則居門焉三曰禮記月令天子居青陽總章每月異禮請稽月令十二堂之制修定時令使有司奉而行之四曰月令以季秋之月為來歲受朔之日請以每歲十月於明堂受新曆退而頒之郡國五曰古者天子負扆公侯伯子男蠻夷戎狄四塞之國各以內外尊卑為位請自今元正冬至及大朝會並御明堂遼使依賓禮蕃國各隨其方立於四門之外六曰古者以明堂為布政之宮自今若有御劄手詔並請先於明堂宣示然後榜之朝堂頒之天下七曰赦書德音舊制宣於文德殿自今非御樓肆赦並於明堂宣讀政和七年九月一日詔頒朔布政自十月為始是月一日上御明堂平朔左個頒天運政治及八年戊戌歲運曆數于天下自是每月朔御明堂布是月之政先是羣臣五上表請負扆聽朝詔弗允至是復再請始從之十一月一日上御明堂南面以朝百辟退坐于平朔頒政其禮百官常服立明堂下乘輿自內殿出負斧扆坐明堂大晟樂作百官朝于堂下大臣升階進呈所頒布時令左右丞一員跪請付外施行宰相承制可之左右丞乃下授頒政官頒政官受而讀之訖出閣門奏禮畢帝降坐百官乃退自是以為常其歲運曆數天運政治之辭文多不載是後則各隨歲月星曆氣運推移沿改而易其辭焉初尚書左丞薛昂請凡崇寧以來紹述熙豐政事各條其節目繫之月令頒于明堂尋詔頒月之朔使民知寒暑燥濕之化而萬里之遠雖驛置日行五百里已不及時其千里外當前期十日進呈取旨頒布諸州長吏封掌俟月朔宣讀之宣和元年蔡京言周觀治象於正月之始和以十二月頒告朔于邦國皆不在十月後世以十月者祖秦朔故也秦以十月為歲首故月令以孟冬頒來歲之朔今不當用請以季冬頒歲運于天下詔自今以正月旦進呈宣讀四年二月太常王黼編類明堂頒朔布政詔書條例氣令應驗凡六十三册上之靖康元年詔罷頒朔布政御樓肆赦每郊祀前一日有司設百官親王蕃國諸州朝貢使僧道耆老位宣德門外太常設宮縣鉦鼓其日刑部録諸囚以俟駕還至宣德門內幄次改常服羣臣就位帝登樓御坐樞密使宣徽使侍立仗衛如儀通事舍人引羣官橫行再拜訖復位侍臣宣曰承旨舍人詣樓前侍臣宣敕立金雞舍人退詣班南宣付所司訖太常擊鼓集囚少府監立雞竿於樓東南隅竿末伎人四面緣繩爭上取雞口所絳幡獲者即與之樓上以朱絲繩貫木鶴仙人乘之奉制書循繩而下至地以畫臺承鶴有司取制書置案上閣門使承旨引案宣付中書門下轉授通事舍人北面宣云有制百官再拜宣赦訖還授中書門下付刑部侍郎承旨放囚百官稱賀閣門使進詣前承旨宣答訖百官又再拜舞蹈退若德音赦書自內出者並如文德殿宣制之儀其降御劄亦閣門使跪授殿門外置箱中百官班定閣門授宰臣讀訖傳告百僚皆拜舞稱萬歲真宗宣制有司請用儀仗四千人自承天殿設細仗導衛近臣起居訖則分左右前導之皇太后臨朝聽政乾興元年真宗崩遺旨以皇帝尚幼軍國事兼權取皇太后處分宰相率百官稱賀復前奉慰又慰皇太后於簾前有司詳定儀式內東門拜表合差入內都知一員跪授傳進皇太后所降批答首書覽表具之末云所請宜許或不許初丁謂定皇太后稱豫中書與禮院參議每下制令稱豫便殿處分稱吾皇太后詔止稱吾與皇帝並御承明殿垂簾決事百官表賀英宗即位輔臣請與皇太后權同聽政禮院議自四月內東門小殿垂簾兩府合班起居以次奏事非時召學士亦許至小殿時帝以疾權居柔儀殿東閣西室太后垂簾處分稱吾唯兩府日入候問聖體因奏政事退詣小殿簾外覆奏太后帝疾間御前後殿聽政兩府退朝猶於小殿覆奏哲宗即位太皇太后權同聽政三省樞密院按儀注未釋服以前遇隻日皇帝御迎陽門日參官並赴起居依例奏事每五日遇隻日於迎陽門垂簾皇帝坐於簾內之北宰執奏事則權屏去左右侍衛事有機速許非時請對及賜宣召亦許升殿禮部御史臺閣門奏討論御殿及垂簾儀制每朔望六參皇帝御前殿百官起居三省樞密院奏事應見謝辭班退各令詣內東門進榜子皇帝雙日御延和殿垂簾日參官起居太皇太后移班少西起居皇帝並再拜三省樞密院奏事三日以上四拜不舞蹈候祔廟畢起居如常儀簾前通事以內侍殿下以閣門吏部磨勘奏舉人垂簾日引應見謝辭臣僚遇朔望參日不坐並先詣殿門次內東門應撎賜者並門賜之於是帝御迎陽門幄殿同太皇太后垂簾宰臣親王以下合班起居常制分班十六至是合班以閣門奏請故也禮官請如有祥瑞邊捷宰臣以下紫宸殿稱賀皇帝畢赴內東門賀太皇太后從之徽宗即位皇太后權同聽政三省樞密院聚議故事嘉祐末英宗請慈聖同聽政五月同御內東門小殿垂簾至七月十三日英宗間日御前後殿輔臣奏事退詣內東門簾前覆奏又故事唯慈聖不立生辰節名不遣使契丹若天聖元豐則御殿垂簾立生辰節名遣使與契丹往還及避家諱等曾布曰今上長君豈可垂簾聽政請如嘉祐故事蔡卞曰天聖元豐與今日皆遺制處分非嘉祐比布曰今日之事雖載遺制實出自德音又皆長君正與嘉祐事相似有旨依嘉祐治平故事布語同列曰奏事先太后次覆奏皇帝如今日所得旨遂為定式矣尋以哲宗靈駕發引太后手書罷同聽斷焉皇太子元正冬至受羣臣賀儀政和新儀前一日有司於東門外量地之宜設三公以下文武羣官等次如常儀典儀設皇太子答拜褥位於階下南向又設文武羣官版位於門之外其日禮直官舍人先引三公以下文武羣臣以次入就位立定禮直官舍人引左庶子詣皇太子前跪請內嚴少頃又言外備內侍褰簾皇太子常服出次左右侍衛如常儀皇太子降階詣南向褥位典儀曰再拜贊者承傳曰再拜三公以下皆再拜皇太子答拜班首少前稱賀云元正首祚冬至云天正長至景福維新伏惟皇太子殿下與時同休賀訖少退復位左庶子前承令詣羣臣前答云元正首祚冬至云天正長至與公等均慶典儀曰再拜班首以下皆再拜皇太子答拜訖禮直官通事舍人引三公以下文武百官以次出內侍引皇太子升階還次降簾侍衛如常儀少頃禮直官舍人引知樞密院官以下入就位立定內侍引皇太子降階詣南向褥位樞密以下參賀如上儀訖退次引師傅保賓客以下入就位參賀如上儀師傅保以下以次出內侍引皇太子升坐禮直官引文武宮官入就位重行北向立典儀曰再拜在位官皆再拜左庶子少前跪言具官某言元正首祚冬至云天正長至伏惟皇太子殿下與時同休俯伏興復位典儀曰再拜在位者皆再拜分東西序立左庶子少前跪言禮畢左右近侍降簾皇太子降坐宮官退左右侍衛以次出皇太子與百官相見至道元年有司言百官見皇太子自兩省五品尚書省御史臺四品諸司三品以上皆答拜餘悉受拜宮官自左右庶子以下悉用參見之儀其宴會位在王公上與師傅保相見政和新儀前一日所司設師傅保以下次於宮門外道西南向設軒架之樂於殿庭近南北向其日質明諸衛率各勒所部屯門列仗典謁設皇太子位於殿東階下西向設師傅保位於殿西階之西三少位於傅保之南稍却俱東向北上師傅保以下俱朝服至宮門通事舍人引就次左庶子請內嚴通事舍人引師傅保立於正殿門之西三少在其南稍却俱東向北上左庶子言外備諸侍奉之官各服其器服俱詣閣奉迎皇太子朝服以出左右侍衛如常儀軒架作翼安之樂至東階下西向立樂止通事舍人引師傅保及三少入就位軒架作正安之樂至位樂止皇太子再拜師傅保以下答拜若三少特見則三少先拜通事舍人引師傅保以下出軒架正安之樂作出門樂止左庶子前跪稱左庶子某言禮畢皇太子入左右侍衛及樂作如來儀
