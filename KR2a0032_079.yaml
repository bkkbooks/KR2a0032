body:
  text: 宋史卷七十九志第三十二律曆十二紀元曆崇寧紀元曆演紀上元上章執徐之歲距元符三年庚辰歲積二千八百六十一萬三千四百六十算至崇寧五年丙戌歲積二千八百六十一萬三千四百六十六算步氣朔第一日法七千二百九十期實二百六十六萬二千六百二十六朔實二十一萬五千二百七十八歲周三百六十五日餘一千七百七十六氣策一十五餘一千五百九十二太朔策二十九餘三千八百六十八望策一十四餘五千五百七十九弦策七餘二千七百八十九半中盈分三千一百八十五半朔虛分三千四百二十二沒限五千六百九十七少旬周四十三萬七千四百紀法六十求天正冬至置上元距所求積年以期實乘之為天正冬至氣積分滿旬周去之不滿如日法而一為大餘不盡為小餘其大餘命己卯算外即所求年天正冬至日辰及餘求次氣置天正冬至大小餘以氣策加之四分之一為少之二為半之三為太如滿秒母收從小餘小餘滿日法從大餘大餘盈紀法乃去之去命如前即次氣日辰及餘求天正經朔置天正冬至氣積分以朔實去之不盡為天正閏餘用減氣積分餘為天正十一月經朔加時積分滿旬周去之不滿如日法而一為大餘不盡為小餘其大餘命己卯算外即所求年天正十一月經朔日辰及餘求弦望及次朔經日置天正經朔大小餘以弦策纍加之去命如前即各得弦望及次朔經日辰及餘求沒日置有沒常氣小餘凡常氣小餘在沒限已上者為有沒之氣六十乘之用減四十四萬三千七百七十一餘滿六千三百七十一而一為日不滿為餘命日起其氣初日辰算外即為氣內沒日辰求滅日置有滅經朔小餘凡經朔小餘不滿朔虛分者為有滅之朔三十乘之滿朔虛分而一為日不滿為餘命日起其月經朔日辰算外即為月內滅日辰步發斂候策五餘五百三十秒五十五卦策六餘六百三十七秒六土王策三餘三百一十八秒三十三歲閏七萬九千二百九十月閏六千六百七半閏限二十萬八千六百七十半辰法一千二百一十五半辰法六百七半刻法七百二十九秒法六十求七十二候各置中節大小餘命之為初候以候策加之為次候又加之為末候各命己卯算外即得所求日辰求六十四卦各置中氣大小餘命之為公卦用事日以卦策加之得辟卦用事日又加之得諸侯內卦用事日以土王策加之得十有二節之初諸侯卦用事日又加之得大夫卦用事日復以卦策加之得卿卦用事日各命己卯算外即得所求日辰求五行用事各因四立之節大小餘命之即春木夏火秋金冬水首用事日以土王策減四季中氣大小餘即其季土始用事之日各命己卯算外即得所求日辰七十二候及卦目與前曆同求中氣去經朔置天正閏餘以月閏纍加之滿日法為閏日不滿為餘即其月中氣去經朔日算因求卦候者各以卦候策依次纍加減之中氣前減中氣後加各得其月卦候去經朔日算求發斂加時置所求小餘倍之如辰法而一為辰數不滿五因之如刻法而一為刻不盡為分命辰數起子正算外即各得加時所在辰刻及分如半辰數即命起子初步日躔周天分二億一千三百一萬八千一十七歲差七千九百三十七周天度三百六十五約分二十五秒七十二象限九十一約分三十一秒九乘法一百一十九除法一千八百一十一秒法一百常氣中積日盈縮分先後數損益率朒朏積冬至空盈七千六十先初益三百八十五朒積空小寒一十五盈五千九百二十先七千六十益三百二十三朒三百八十五一千五百九十二太二十一八十四大寒三十盈四千七百一十七先一萬二千九百八十益二百五十七朒七百八三千一百八十五半四十三六十九立春四十五盈三千四百五十一先一萬七千六百九十七益一百八十七朒九百六十五四千七百七十八少六十五五十四雨水六十盈二千一百二十二先二萬一千一百四十八益一百一十六朒一千一百五十三六千三百七十一八十七三十九驚蟄七十六盈七百三十先二萬三千二百七十益四十朒一千二百六十九六百七十三太九二十四春分九十一縮七百三十先二萬四千損四十朒一千三百九二千二百六十六半三十一九清明一百六縮二千一百二十二先二萬三千二百七十損一百一十六朒一千三百六十九三千八百五十九少五十二九十三穀雨一百二十一縮三千四百五十一先二萬一千一百四十八損一百八十八朒一千一百五十三五千四百五十二七十四七十八立夏一百三十六縮四千七百一十七先一萬七千六百九十七損二百五十七朒九百六十五七千四十四太九十六六十三小滿一百五十二縮五千九百二十先一萬二千九百八十損三百二十三朒七百八一千三百四十七半一十八四十八芒種一百六十七縮七千六十先七千六十損三百八十五朒三百八十五二千九百四十少四十三十三夏至一百八十二縮七千六十後初益三百八十五朏空四千五百三十三六十二一十八小暑一百九十七縮五千九百二十後七千六十益三百二十三朏三百八十五六千一百二十五太八十四三大暑二百一十三縮四千七百一十七後一萬二千九百八十益二百五十七朏七百八四百二十八半五八十七立秋二百二十八縮三千四百五十一後一萬七千六百九十七益一百八十八朏九百六十五二千二十少二十七七十二處暑二百四十三縮二千一百二十二後二萬一千一百四十八益一百一十六朏一千一百五十三三千一百六十四四十九五十七白露二百五十八縮七百三十後二萬三千二百七十益四十朏一千二百六十九五千二百六太七十一四十二秋分二百七十三盈七百三十後二萬四千損四十朏一千三百九六千七百九十九半九十三二十七寒露二百八十九盈二千一百二十二後二萬三千二百七十損一百一十六朏一千二百六十九一千一百二少一十五一十二霜降三百四盈三千四百五十一後二萬一千一百四十八損一百八十八朏一千一百五十三二千六百九十五三十六九十六立冬三百一十九盈四千七百一十七後一萬七千六百九十七損二百五十七朏九百六十五四千二百八十七太五十八八十一小雪三百二十四盈五千九百二十後一萬二千九百八十損三百二十三朏七百八五千八百八十半八十六十六大雪三百五十盈七千六十後七千六十損三百八十五朏三百八十五一百八十三少二五十一求每日盈縮分先後數置所求盈縮分以乘法乘之如除法而一為其氣中平率與後氣中平率相減為合差半合差加減其氣中平率為初末泛率至後加為初減為末分後減為初加為末又以乘法乘合差如除法而一為日差半日差加減初末泛率為初末定率至後減初加末分後加初減末以日差纍加減其氣初定率為每日盈縮分至後減分後加各以每日盈縮分加減氣下先後數冬至後積盈為先在縮減之夏至後積縮為後在盈減之其分至前一氣無後氣相減皆因前氣合差為其氣合差餘依前術求朏朒倣此求經朔弦望入氣置天正閏日及餘如氣策以下者以減氣策為入大雪氣以上者去之餘以減氣策為入小雪氣即天正十一月經朔入氣日及餘求弦望及後朔入氣以弦策纍加之滿氣策去之即各得弦望及次朔入氣日及餘求經朔弦望入氣朏朒定數各以所入氣小餘乘其日損益率如日法而一所得以損益其日下朏朒積各為定數赤道宿度斗二十五牛七少女十一少虛九少秒七十二危十五半室十七壁八太北方七宿九十四度秒七十二奎十六半婁十二胃十五昴十一少畢十七少觜半參十半西方七宿八十三度井三十三少鬼二半柳十三太星六太張十七少翼十八太軫十七南方七宿一百九度少角十二亢九少氐十六房五太心六少尾十九少箕十半東方七宿七十九度按諸曆赤道宿次就立全度頗失真數今依宋朝渾儀校測距度分定太半少用為常數校之天道最為密近如考唐用唐所測考古用古所測即各得當時宿度求冬至赤道日度以歲差乘所求積年滿周天分去之不滿覆減周天分餘如五千八百三十二而一為分不盡退除為秒其分滿百為度命起赤道虛宿七度外去之至不滿宿即所求年天正冬至加時日躔赤道宿度及分秒求春分夏至秋分赤道日度置天正冬至加時赤道日度纍加象限滿赤道宿次去之即各得春分夏至秋分加時日在宿度及分秒求四正後赤道宿積度置四正赤道宿全度以四正赤道日度及分減之餘為距後度以赤道宿度纍加之各得四正後赤道宿積度及分求赤道宿積度入初末限視四正後赤道宿積度及分在四十五度六十五分秒五十四半已下為入初限已上用減象限餘為入末限求二十八宿黃道度以四正後赤道宿入初末限度及分減一百一度餘以初末限度及分乘之進位滿百為分分滿百為度至後以減分後以加赤道宿積度為其宿黃道積度以前宿黃道積度減之其四正之宿先加象限然後以前宿減之為其宿黃道度分其分就近約為太半少黃道宿度斗二十三牛七女十一虛九少秒七十二危十六室十八壁九半北方七宿九十三度太秒七十二奎十八婁十二太胃十五半昴十一畢十六半觜半參九太西方七宿八十四度井三十半鬼二半柳十三少星六太張十七太翼二十軫十八半南方七宿一百九度角十二太亢九太氐十六少房五太心六尾十八少箕九半東方七宿七十八度少前黃道宿度依今曆歲差所在算定如上考往古下驗將來當據歲差每移一度依術推變當時宿度然後可步七曜知其所在如徑求七曜所在置所在積度以前黃道宿積度減之為所在黃道宿度及分求天正冬至加時黃道日度以冬至加時赤道日度及分秒減一百一度餘以冬至加時赤道日度及分秒乘之進位滿百為分分滿百為度命曰黃赤道差用減冬至赤道日度及分秒即所求年天正冬至加時黃道日度及分秒求二十四氣加時黃道日度置所求年冬至日躔黃赤道差以次年黃赤道差減之餘以所求氣數乘之二十四而一所得以加其氣中積及約分又以其氣初日先後數先加後減之用加冬至加時黃道日度依宿次命之即各得其氣加時黃道日躔宿度及分秒如其年冬至加時赤道宿度空分秒在歲差已下者即加前宿全度然求黃赤道差餘依術算求二十四氣晨前夜半黃道日度置日法以其氣小餘減之餘副置之以其氣初日盈縮分乘之如萬約之所得盈加縮減其副滿日法為度不滿退除為分秒以加其氣加時黃道日度即各得其氣一日晨前夜半黃道日度及分秒每日加一度以百約每日盈縮分為分秒盈加縮減之滿黃道宿次去之即每日晨前夜半黃道日躔宿度及分秒其二十四氣初日晨前夜半黃道日度係屬前氣自前氣攤算即各得所求求每日午中黃道日度置一萬分以所入氣日盈縮分盈加縮減而半之滿百為分不滿為秒以加其日晨前夜半黃道日度即其日午中日躔黃道宿度及分求夏至加時黃道日度置天正冬至加時黃道日度及分秒以二至限及分秒加之滿黃道宿次去之不滿為夏至加時黃道日度及分秒求每日午中黃道積度以二至加時黃道日度距至所求日午中黃道日度為入二至後黃道積度及分求每日午中黃道入初末限視二至後黃道積度在四十三度一十二分秒八十七以下為初限以上用減象限餘為入末限其積度滿象限去之為二分後黃道積度在四十八度一十八分秒二十二以下為初限以上用減象限餘為入末限求每日午中赤道日度以所求日午中黃道積度入至後初