body:
  text: 宋史卷五十三志第六天文六月犯五緯月犯列舍上月犯五緯建隆二年十一月癸未月犯歲星三年二月乙巳又犯開寶三年七月乙卯犯填星太平興國三年七月己亥掩熒惑八月甲戌與太白合八年七月辛巳凌歲星端拱元年二月戊申犯填星辛亥犯歲星六月丁卯掩填星淳化元年十一月丙申與熒惑合二年六月己丑犯歲星三年三月癸亥與太白合九月戊午掩熒惑十二月甲申與熒惑合四年十月癸未與辰星合五年二月己亥犯歲星至道元年三月乙卯又犯三年八月戊申犯填星十二月癸丑犯歲星咸平元年三月乙丑犯熒惑五月己巳掩歲星七月甲子又犯十二月甲午犯填星二年二月戊子犯太白十一月乙未犯熒惑三年二月壬子犯太白九月辛丑又犯四年十月辛酉掩熒惑十一月己丑又犯五年二月癸巳犯歲星六年十一月癸卯犯填星十二月庚午又犯景德元年八月壬申犯填星二年五月辛卯犯填星七月庚午犯歲星大中祥符二年十一月丙子犯歲星三年十月丙辰犯熒惑四年正月丁丑犯太白二月壬辰犯填星八月丙寅犯太白五年三月癸未犯填星六月乙巳又犯六年正月壬子犯填星二月丙戌犯歲星四月辛巳又犯七月癸卯又犯十月甲申犯太白七年十二月丁丑犯填星八年三月己亥犯填星四月丙辰掩熒惑八月癸未犯填星九年五月己巳犯歲星十月戊戌犯太白十二月丙戌犯熒惑天禧元年正月戊申犯歲星三年四月乙未犯熒惑五月癸亥又犯九月己卯犯歲星四年二月乙未又犯三月癸亥又犯七月辛亥犯太白八月庚子犯熒惑五年五月辛卯犯填星九月己卯又犯天聖三年正月丁未犯熒惑五年七月己未犯歲星八月丁亥犯熒惑十一月戊申掩歲星六年九月己酉犯填星明道元年九月戊子犯填星景祐二年四月丁巳掩太白寶元元年三月己酉犯填星四月庚寅犯歲星慶曆元年八月庚子掩歲星十月丙申犯填星四年七月壬午犯熒惑六年三月丙申犯歲星七月乙酉又犯皇祐元年七月丙午犯歲星二年六月壬申犯填星四年十月己丑犯歲星至和二年五月庚辰犯填星十一月己酉犯歲星十二月辛丑犯填星甲辰掩歲星嘉祐元年三月丙寅掩填星閏三月癸巳掩歲星五月戊子犯填星二年四月庚申犯熒惑六月戊申犯太白乙卯犯熒惑四年五月丁酉犯太白十月甲戌犯熒惑十二月甲戌又犯庚午掩之五年三月甲午掩熒惑六年閏八月辛丑犯填星十一月癸亥又犯八年七月壬戌掩歲星治平四年正月辛亥犯辰星八月辛未犯太白癸酉犯歲星九月壬寅犯太白十月戊辰掩填星又犯熒惑熙寧元年二月丁巳犯填星四月壬子犯歲星五年四月癸亥犯填星閏七月庚申犯熒惑六年九月甲辰掩太白十年九月庚午犯歲星十二月壬辰犯歲星元豐七年十月甲午犯辰星八年八月戊寅犯填星十一月戊戌犯歲星庚子犯填星元祐三年七月庚午犯太白十月壬辰犯歲星四年三月丙子又犯七月辛卯犯填星十月癸丑掩填星六年九月癸卯犯熒惑十二月甲戌掩歲星八年十二月丁巳犯熒惑紹聖元年六月甲戌犯太白九月辛酉犯填星十二月癸未又犯二年正月庚戌又犯三月壬申又犯三年九月戊戌犯歲星四年七月丁丑犯熒惑元符二年八月壬辰犯歲星十一月辛巳十二月戊申皆犯三年六月癸卯犯熒惑建中靖國元年五月辛未犯填星崇寧元年七月丁亥犯太白五年二月戊子犯熒惑大觀二年十二月戊子犯熒惑四年七月戊午犯歲星政和元年正月己巳犯歲星宣和元年正月乙卯犯填星三年八月戊申犯熒惑四年八月庚戌犯填星七年十一月乙酉犯熒惑建炎四年六月戊寅犯熒惑紹興元年九月己未犯太白六年五月壬午犯填星十六年六月庚申掩填星二十年二月己未犯歲星二十四年八月戊子犯歲星二十七年六月甲辰犯太白三十年六月壬子犯熒惑三十二年正月癸巳犯太白二月己亥犯歲星隆興元年三月丙申四月丙子七月戊戌皆犯填星乾道元年十一月庚午犯熒惑四年十月庚子十一月戊申皆掩犯熒惑七年三月辛巳又犯淳熙三年五月庚午掩犯太白六年十一月己未犯歲星九年十一月癸巳犯太白慶元四年七月己亥宿于歲星嘉泰三年四月犯太白四年十月辛丑掩犯歲星十二月丙申又掩犯嘉定二年六月甲申掩食填星不見乙丑掩食熒惑五年九月丁未犯歲星十二年八月甲申犯熒惑十三年十月辛酉犯太白十五年三月壬子掩食太白端平二年正月丁酉犯太白嘉熙元年四月丁亥犯熒惑五月丙辰又犯七月辛酉犯歲星填星淳祐元年二月癸酉掩食熒惑六年四月壬戌犯太白寶祐四年正月乙巳掩歲星己酉犯熒惑六年八月癸未又犯景定元年八月己酉掩填星三年十月己未犯歲星月犯列舍建隆三年四月壬辰月犯輿鬼庚子犯氐五月甲子犯左執法六月丙申犯房第一星十二月庚戌入南斗魁乾德四年二月癸卯犯五車五年正月壬子犯南斗魁七月丁未犯昴十月己巳掩昴開寶元年正月辛卯犯昴二年正月丙戌犯昴三年六月乙未犯東井十月癸未犯天關五年七月庚辰犯東井六年三月丁巳犯畢大星太平興國五年七月乙丑掩五諸侯七年二月丙子犯輿鬼三月丙申犯昴八年三月癸未入南斗魁八月戊寅犯昴壬午犯輿鬼庚寅犯角十月癸未犯東井乙巳犯心後星九年正月庚申掩五車東南甲戌入南斗魁二月壬辰犯七星丁巳犯五諸侯丙午犯輿鬼五月甲寅掩星第三星六月壬寅犯昴七月甲子又犯癸酉犯五諸侯第三星九月丁未犯南斗魁甲子犯昴己巳入輿鬼掩積尸十二月丙戌掩昴雍熙二年正月庚午入南斗魁二月丙戌犯輿鬼西北星三月戊申犯昴四月己丑掩心後星五月丙辰犯房第二星閏九月丁亥掩昴十月