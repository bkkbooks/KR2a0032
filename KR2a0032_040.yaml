body:
  text: 宋史卷四十本紀第四十寧宗四十年春正月癸巳雨土乙未大風庚子遣錢撫賀金主生辰二月庚申地震夏四月丁未朔金人犯光州中渡鎮執榷場官盛允升殺之遂分兵犯樊城戊申鄂州江陵府副都統王守中引兵拒之金人遂分兵圍棗陽光化軍丙辰詔江淮制置使李王玉京湖制置使趙方措置調遣仍聽便宜行事丁巳命四川制置使董居誼酌量緩急便宜行事辛酉廬州鈐轄王辛敗金人于光山縣之安昌砦殺其統軍完顏掩壬戌金兵遁去隨州光化皆以捷聞丁卯詔出戍官兵全給其家五月辛巳以久雨釋大理三衙臨安府杖以下囚蠲茶鹽賞錢甲申賜禮部進士吳潛以下五百二十有三人及第出身癸卯趙方請下詔伐金遂傳檄招諭中原官吏軍民六月庚戌太白晝見戊午詔厲將士募京西忠義人進討辛未東川大水癸酉太白經天秋七月丙子朔日有食之戊寅以旱釋諸路杖以下囚甲申雅州蠻寇邊焚碉門砦遣兵討之丁亥嗣濮王不儔薨庚子詔諸軍將佐有罪者送屯駐州鞫之罷軍士淫刑八月乙丑詔監司郡守各舉威勇才略可將帥者二人冬十月乙巳朔以久雨釋大理三衙臨安府及兩浙諸州杖以下囚癸酉蠲三衙江上諸軍公私逋負錢十一月丁丑大風庚辰太白晝見甲申詔浙東提舉司發米十萬石振給貧民戊戌太白經天十二月戊申以軍興募民納粟補官乙卯詔武舉人毋復應文舉癸亥金鳳翔副統軍完顏贇以步騎萬人犯四川戊辰迫湫池堡己巳破天水軍守臣黃炎孫遁金人攻白環堡破之庚午迫黃牛堡統制劉雄棄大散關遁金人據之十一年春正月壬午京東路忠義李全率衆來歸詔以全為京東路總管戊子金人圍皂郊堡壬辰利州將麻仲率忠義人焚秦州永寧砦乙未以度僧牒千給四川軍費丁酉詔四川忠義人立功賞視官軍金人犯隔芽關興元都統李貴遁官軍大潰二月甲辰金人焚大散關而去乙巳沔州都統王大才馬蹶死于河池丙午金人破皂郊死者五萬人丁未金人破湫池堡戊申金人圍隨州棗陽軍游騎至漢上均州守臣應謙之棄城走丙辰白虹貫日楚州鈐轄梁昭祖焚金人糧舟于大清河京東忠義副都統沈鐸遣兵助之三月丁丑金人焚湫池堡而去戊子利州統制王逸等率忠義人復皂郊金副統軍完顏贇包長壽遁去沔州軍士郭雄追斬贇首長壽僅以身免己丑沔州都統劉昌祖至皂郊辛卯忠義人十萬餘出攻秦州官軍繼進至赤谷口王逸傳昌祖之命退師且放散忠義人軍大潰癸巳包長壽合長安鳳翔之衆復攻皂郊遂趨西和州是日鎮江忠義統制彭惟誠等敗于泗州丙申劉昌祖焚西和州遁守臣楊克家棄城去戊戌金人破西和州夏四月甲辰劉昌祖焚成州遁守臣羅仲甲棄城去是日金人去西和州戊申命四川增印錢引五百萬以給軍費階州守臣侯頤棄城去是日金人去成州戊午金人復犯大散關守將王立遁己未金人犯黃牛堡興元都統吳政拒退之癸亥政至大散關執王立斬之五月乙亥命四川制置司招集忠義人癸未蚩尤旗見其長竟天丁亥詔侍從臺諫兩省官集議平戎禦戎和戎三策壬辰申嚴試法官七等之制六月辛酉詔湖州振恤被水貧民秋七月癸酉奪知天水軍黃炎孫三官辰州居住乙酉修孝宗寶訓辛卯蠲四川關外諸州稅役甲午蠲光州民兵戰死之家稅役九月己卯朝獻于景靈宮庚辰朝饗于太廟辛巳合祭天地于明堂大赦辛卯安定郡王伯澤薨丙申興元都統吳政利州副都統張威各進三官劉昌祖奪五官韶州安置冬十月丙午羅仲甲楊克家侯頤並奪三官仲甲常德府克家道州頤撫州居住戊午大風壬戌修盱眙軍城十一月壬申金人攻安豐軍之黃口灘是月陝西人張羽來歸十二年春正月戊辰朔召董居誼詣行在以新利州路安撫使聶子述為四川制置使庚辰金人犯湫池堡守將石宣拒退之甲申金人攻白環堡守將董炤拒退之戊子金人犯成州沔州都統張威自西和州退守仙人原庚寅金人犯隨州棗陽軍又破信陽軍之二砦京西諸將引兵拒之辛卯金人犯西和州守臣趙彥吶設伏以待之殲其衆乃還金人犯安豐軍建康都統許俊遣將却之金人焚成州犯河池守將張斌遁去癸巳金人圍安豐軍及光州攻光化軍破鄖山縣進逼均州甲午破鳳州守臣雷雲棄城去金人夷其城乙未興元都統吳政及金人戰于黃牛堡死之金人乘勝攻武休關二月戊戌朔金人破光山縣太白晝見壬寅金人圍棗陽軍京湖制置使趙方遣統制扈再興救之不克進而還癸卯金人破武休關興元都統李貴遁還利州路提刑權興元府事趙希昔棄城去丁未金人破興元府戊申金人攻棗陽軍己酉遣殿前司軍八千人防捍江面庚戌以曾從龍同知樞密院事兼江淮宣撫使權吏部尚書任希夷簽書樞密院事辛亥金人破大安軍守臣李文子棄城去金人犯洋州守臣蔡晉卿遣兵拒之不克洋州破壬子四川制置使董居誼自利州遁沔州都統張威遣統制石宣等邀擊金人于大安軍大破之獲其將巴土魯安金人遂去興元府丙辰金人去洋州丁巳京湖制置使趙方遣統制扈再興等引兵三萬餘人出攻唐鄧二州隨州忠義統領劉世興等引兵攻唐州甲子金人去棗陽軍乙丑夏人復以書來四川議夾攻金人利州路安撫丁焴許之三月己巳以鄭昭先知樞密院事曾從龍參知政事癸酉金人復入洋州焚其城而去乙亥興元軍士權興等作亂犯巴州守臣秦季槱棄城去鄂州統制劉世榮會兵攻唐州丁亥太白晝見權興等降癸巳雨土甲午金人自盱眙退師閏月己未追雷雲三官梅州安置辛酉贈吳政為右武大夫忠州刺史壬戌詔撫諭四川官軍忠義人癸亥興元軍士張福莫簡等作亂以紅巾為號是春金人圍安豐軍滁濠光三州江淮制置使李王玉命池州都統武師道忠義軍統制陳孝忠救之皆不克進金人遂分兵自光州犯黃州之麻城自濠州犯和州之石磧自盱眙軍犯滁州之全椒來安及揚州之天長真州之六合淮南流民渡江避亂諸城悉閉金人游騎數百至東采石楊林渡建康大震京東總管李全自楚州忠義總轄季先自漣水軍各引兵來援金人乃解去全追擊敗之于曹家莊獲其貴將夏四月庚午張福入利州四川制置使聶子述遁殺總領財賦楊九鼎丁丑張福掠閬州丁亥掠果州癸巳曾從龍罷以鄭昭先兼參知政事崇信軍節度使開府儀同三司萬壽觀使安丙為四川宣撫使董居誼落職奪三官五月乙未朔召聶子述詣行在張福薄遂寧府潼川府路轉運判官權府事程遇孫棄城遁丁酉減兩淮荊襄湖北利州路沿邊諸州雜犯死罪囚釋流以下仍蠲今年租稅己亥太學生何處恬等伏闕上書以工部尚書胡榘欲和金人請誅之以謝天下張福入遂寧府焚其城甲寅四川宣撫司命沔州都統張威引兵捕福戊午福入普州守臣張已之棄城遁癸亥詔侍從兩省臺諫各舉文武可用之才二三人六月戊辰張福屯普州之茗山庚午張威引兵至丙子太白晝見辛巳西川地震太白晝見癸未張福請降乙酉張威執之歸于宣撫司丁亥嗣濮王不嫖薨金國招諭李全等不聽辛卯太白經天癸巳丁焴復以書約夏國攻金人秋七月丙申張福伏誅復奪董居誼二官永州居住庚子張威捕賊衆一千三百餘人誅之莫簡自殺紅巾賊悉平癸亥李全引兵至齊州知州王贇以城降八月戊辰復合利州東西路為一九月丙午罷江淮制置司置沿江淮東西制置司以寶文閣待制李大東為沿江制置使淮南轉運判官趙善湘為主管淮西制置司公事淮東提刑賈涉為主管淮東制置司公事兼節制京東河北路軍馬十一月辛亥進封楊次山為會稽郡王十二月壬申京東節制司言復京東河北二府九州四十縣乙亥築興元府城丁丑雅州蠻入盧山縣己卯四川宣撫司遣兵取洮州召諸將議出師招諭中原豪傑辛巳蠻焚碉門砦邊丁大敗乙酉金人犯鳳州之長橋丁亥四川宣撫司命罷洮州之師己丑京湖制置司遣統制扈再興等引兵六萬人分三道出境庚寅賞茗山捕賊功十三年春正月丁酉扈再興引兵攻鄧州鄂州都統許國攻唐州不克而還金人追之遂攻樊城趙方督諸將拒退之己亥雅州蠻復掠盧山縣遣兵討之己酉命不凌為嗣濮王戊午夏人復以書來四川議夾攻金人三月辛卯朔雨土丁巳黎州土丁叛遣兵討之夏四月庚申朔淮東制置賈涉招諭山東兩河豪傑五月庚寅朔雅州蠻降戊戌史彌遠等上玉牒及三祖下第七世宗藩慶系錄六月癸酉賜禮部進士劉渭以下四百七十有五人及第出身加安丙少保丙子以李全為左武衞大將軍壬午以季先為果州團練使漣水軍忠義副都統命赴樞密院議事未至殺之秋七月戊戌以京東河北諸州守臣空名官告付京東河北節制司以待豪傑之來歸者丙午以任希夷兼參知政事丙辰四川宣撫司招黎人土丁降之八月癸亥皇太子詢薨謚曰景獻壬申安丙遺夏人書定議夾攻金人癸未四川宣撫司命利州統制王仕信引兵赴熙鞏州會夏人遂傳檄招諭陝西五路官吏軍民甲申復海州以將作監丞徐晞稷知州事盱眙將石珪叛入漣水軍詔以珪為漣水忠義軍統轄九月辛卯夏人引兵圍鞏州且來趣師甲午太白晝見王仕信引兵發宕昌乙未四川宣撫司統制質俊李寔引兵發下城戊戌四川宣撫司命諸將分道進兵沔州都統張威出天水利州副都統程信出長道興元副都統陳立出大散關興元統制田胃為宣撫司帳前都統出子午谷金州副都統陳昱出上津己亥張威下令所部諸將毋得擅進兵庚子質俊等克來遠鎮辛丑王仕信克鹽川鎮壬寅質俊等自來遠鎮進攻定邊城金人來救俊等擊破之乙巳程信王仕信引兵與夏人會于鞏州城下丁未攻城不克庚戌金人犯皂郊堡沔州統制董炤等與戰大敗壬子程信及夏人攻鞏州不克信引兵趨秦州丙辰夏人自安遠砦退師冬十月丁巳朔程信邀夏人共攻秦州夏人不從信遂自伏羌城引軍還諸將皆罷兵戊寅程信以四川宣撫司之命斬王仕信于西和州四川宣撫司以張威不進兵罷其軍職十一月庚戌大風壬子臨安府火十二月戊午大風壬申漣水忠義軍統轄石珪叛癸未鎮江副都統翟朝宗以皇帝恭膺天命之寶來獻十四年春正月丙戌朔以雪寒釋大理三衙臨安兩浙諸州杖以下囚乙未地震以李全還自山東賜緡錢六萬庚子立四川運米賞格二月戊辰金人圍光州己巳金人犯五關壬申金人治舟于團風弗克濟遂圍黃州分兵破諸縣又遣別將犯漢陽軍丁丑李全棄泗州遁還甲申詔淮東京湖諸路應援淮西沿江制置司防守江面權殿前司職事馮榯將兵駐鄂州京東忠義都統李全將兵救蘄黃榯不果行三月丙戌朔鄂州副都統扈再興引兵攻唐州丁亥金人破黃州淮西提刑知州事何大節棄城遁死庚寅長星見李全自楚州引兵援淮西癸巳扈再興引所部趨蘄州甲午太白晝見乙未詔京湖制置司趣援蘄黃己亥金人陷蘄州知州事李誠之及其家人官屬皆死之癸丑金人退師扈再興邀擊敗之于天長鎮甲寅晦又敗之夏四月乙卯復置諸王宮大小學教授乙丑命任子簾試于御史臺戊辰金人渡淮而北李全遣兵追擊敗之五月甲申朔日有食之壬辰史彌遠等上孝宗寶訓皇帝會要丙申西川地震乙巳頒慶元寬恤詔令六月甲寅朔初置沿江制置副使司于鄂州丙寅詔以姪福州觀察使貴和為皇子更名竑進封祁國公丁卯以立皇子告于天地宗廟社稷乙亥以太祖十世孫與莒補秉義郎丙子減京畿囚罪一等釋杖以下辛巳大風秋七月辛丑以趙方為京湖制置大使賈涉為淮東制置使兼京東河北路節制使丁未修光宗寶訓八月乙卯賜史彌遠家廟任希夷罷壬戌以兵部尚書宣繒同知樞密院事給事中俞應符簽書樞密院事甲子以秉義郎與莒為右監門衞大將軍賜名貴誠乙丑追封史浩為越王改謚忠定配享孝宗廟庭戊寅以姪右監門衞大將軍貴誠為果州團練使九月癸未立貴誠為沂靖恵王後己丑朝獻于景靈宮庚寅朝饗于太廟辛卯合祭天地于明堂大赦冬十月癸丑京東河北節制司言復滄州詔以趙澤為河北東路鈐轄知州事甲寅復以齊州為濟南府兗州為襲慶府丙寅夏人復以書來四川趣會兵庚午雷十一月己亥安丙薨是月京東安撫張林叛十二月庚申鄭昭先罷閏月辛巳朔以宣繒兼參知政事俞應符兼權參知政事戊申以殿前司同正將華岳等謀為變殺之是歲浙東江西福建諸路旱沔成階利四州水振之十五年春正月庚戌朔御大慶殿受恭膺天命之寶癸丑立李誠之廟于蘄州甲寅褒贈蘄州死事官吏錄其子孫有差丁巳詔撫諭山東河北軍民將帥官吏己未以受寶大赦文武官各進秩一級大犒諸軍二月庚子罷御史臺簾試任子法三月丁巳詔江西提舉司振恤旱傷州縣夏四月壬午詔蠲蘄州今年租賦五月庚戌太白晝見甲寅詔監司慮囚察州縣匿囚者劾之丁巳進封子祁國公竑為濟國公己未以姪果州團練使貴誠為邵州防禦使壬戌知濟南府种贇等攻張林于青州林遁去己巳修孝宗經武要略六月辛卯俞應符薨秋七月甲子詔江淮荊襄四川制置監司條畫營田來上八月己卯命戶部詳議義役辛卯詔文武官毋得歸宗著為令甲午有彗星出于氐九月辛亥以宣繒參知政事給事中程卓同知樞密院事吏部尚書薛極賜出身簽書樞密院事癸丑雷大雨雹丁巳復以隨州三關隸德安府置關使壬戌彗星沒辛未太白晝見冬十月丙子以收復京東州軍犒賞忠義有差十一月戊午赦京東河北路十二月乙亥朔發米振給臨安府貧民丙子以雪寒釋京畿及兩浙諸州杖以下囚丁亥以李全為保寧軍節度使右金吾衞上將軍京東路鎮撫副使十六年春正月戊申詔命官犯贓毋免約法己酉子坻生辛酉命淮東制置司振給山東流民二月戊子雨土己丑嗣秀王師禹薨追封和王戊戌子坻薨追封邳王謚沖美三月戊申張林所部邢德來歸詔進二官復以為京東東路副總管丁卯以道州民饑詔發米振之夏五月甲辰詔右選試注官如左選之制戊申賜禮部進士蔣重珍以下五百四十有九人及第出身戊辰詔復潭州稅酒法六月丁酉程卓薨秋八月辛巳詔州縣經界毋增紹興稅額癸未申嚴舶船銅錢之禁九月庚子朔日有食之乙巳詔江淮諸司振恤被水貧民己卯雷冬十一月辛亥以太平州大水詔振恤之十二月辛巳命淮東西總領及沿江被水州募江西湖南民入米補官癸未嗣濮王不凌薨壬辰雷十七年春正月戊戌朔詔補先聖裔孔元用為通直郎錄程頤後癸亥命淮東西湖北路轉運司提督營屯田二月癸巳蠲台州逋賦十萬餘緡甲午命臨安府振糶貧民三月癸丑雪是月金人迫西和州尋引兵還夏四月辛卯詔廬州振糶饑民乙未賜李全彭義斌錢三十萬緡為犒賞戰士費五月戊戌詔覈實兩淮京湖四川江上諸軍之數六月丁卯朔太白經天晝見癸酉知西和州尚震午坐金兵至謀遁奪三官岳州居住壬辰大名府蘇椿等舉城來歸詔悉補官即以其州授之秋七月丁酉朔命福建路監司振恤被水貧民辛亥命師喦嗣秀王八月乙亥罷通州天賜鹽場丙戌帝不豫閏八月乙未朔申嚴兩浙諸州輸苗過取之禁丁酉皇帝崩于福寧殿年五十七史彌遠傳遺詔立姪貴誠為皇子更名昀即皇帝位尊皇后為皇太后垂簾聽政進封皇子竑為濟陽郡王出居湖州寶慶元年正月己丑謚曰仁文哲武恭孝皇帝廟號寧宗三月癸酉葬于會稽之永茂陵三年九月加謚法天備道純德茂功仁文哲武聖睿恭孝皇帝贊曰宋世內禪者四寧宗之禪獨當事勢之難能不失禮節焉斯可謂善處矣初年以舊學輔導之功召用宿儒引拔善類一時守文繼體之政燁然可觀中更侂冑用事內蓄羣姦至指正人為邪正學為偽外挑強鄰流毒淮甸頻歲兵敗乃函侂冑之首行成于金國體虧矣既而彌遠擅權幸帝耄荒竊弄威福至於皇儲國統乘機伺間亦得遂其廢立之私他可知也雖然宋東都至于仁宗四傳而享國百年邵雍稱為前代所無南渡至寧宗亦四傳而享國九十有八年是亦豈偶然哉惜乎神器授受之際寧理之視仁英其跡雖同其情相去遠矣
