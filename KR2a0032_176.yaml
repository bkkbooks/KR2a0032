body:
  text: 宋史卷一百七十六志第一百二十九食貨上四屯田常平義倉前代軍師所在有地利則開屯田營田以省餽餉宋太宗伐契丹規取燕薊邊隙一開河朔連歲繹騷耕織失業州縣多間田而緣邊益增戍兵自雄州東際于海多積水契丹患之不得肆其侵突順安軍西至北平二百里其地平曠歲常自此而入議者謂宜度地形高下因水陸之便建阡陌濬溝洫益樹五稼可以實邊廩而限戎馬端拱二年分命左諫議大夫陳恕右諫議大夫樊知古為河北東西路招置營田使恕對極言非便行數日有詔令修完城堡通導溝瀆而營田之議遂寢時又命知代州張齊賢制置河東諸州營田尋亦罷六宅使何承矩請於順安寨西引易河築堤為屯田既而河朔連年大水及承矩知雄州又言宜因積潦蓄為陂塘大作稻田以足食會滄州臨津令閩人黃懋上書言閩地惟種水田緣山導泉倍費功力今河北州軍多陂塘引水溉田省功易就三五年間公私必大獲其利詔承矩按視還奏如懋言遂以承矩為制置河北沿邊屯田使懋為大理寺丞充判官發諸州鎮兵一萬八千人給其役凡雄莫霸州平戎順安等軍興堰六百里置斗門引淀水灌溉初年種稻值霜不成懋以晚稻九月熟河北霜早而地氣遲江東早稻七月即熟取其種課令種之是歲八月稻熟初承矩建議沮之者頗衆武臣習攻戰亦於營葺既種稻不成羣議愈甚事幾為罷至是承矩載稻穗數車遣吏送闕下議者乃息而莞蒲蜃蛤之饒民賴其利度支判官陳堯叟等亦言漢魏晉唐於陳許鄧潁暨蔡宿亳至于壽春用水利墾田陳迹具在請選官大開屯田以通水利發江淮下軍散卒及募民充役給官錢市牛置耕具導溝瀆築防堰每屯千人人給一牛治田五十畝雖古制一夫百畝今且墾其半俟久而古制可復也畝約收三斛歲可收十五萬斛七州之間置二十屯可得三百萬斛因而益之數年可使倉廩充實省江淮漕運民田未闢官為種植公田未墾募民墾之歲登所取並如民間主客之例傅子曰陸田命懸於天人力雖修苟水旱不時則一年之功棄矣水田之制由人力人力苟修則地利可盡且蟲災之害亦少於陸田水田既修其利兼倍帝覽奏嘉之遣大理寺丞皇甫選光祿寺丞何亮乘傳按視經度然不果行至咸平中大理寺丞黃宗旦請募民耕潁州陂塘荒地凡千五百頃部民應募者三百餘戶詔令未出租免其徭役然無助於功利而汝州舊有洛南務內園兵種稻雍熙二年罷賦豫民至是復置命京朝官專掌募民戶二百餘自備耕牛立團長墾地六百頃導汝水溉灌歲收二萬三千石襄陽縣淳河舊作堤截水入官渠溉民田三千頃宜城縣蠻河溉田七百頃又有屯田三百餘頃知襄州耿望請於舊地兼括荒田置營田上中下三務調夫五百築堤堰仍集鄰州兵每務二百人荊湖市牛七百分給之是歲種稻三百餘頃四年陝西轉運使劉綜亦言宜於古原州建鎮戎軍置屯田今本軍一歲給芻糧四十餘萬石束約費茶鹽五十餘萬儻更令遠民輸送其費益多請於軍城四面立屯田務開田五百頃置下軍二千人牛八百頭耕種之又於軍城前後及北至木峽口各置堡寨分居其人無寇則耕寇來則戰就命知軍為屯田制置使自擇使臣充四寨監押每寨五百人充屯戍從之既而原渭州亦開方田戎人內屬者皆依之得安其居是時兵費浸廣言屯營田者輒詔邊臣經度行之順安軍兵馬都監馬濟請於靜戎軍東壅鮑河開渠入順安威虜二軍置水陸營田於其側命莫州部署石普護其役踰年而畢知保州趙彬復奏決雞距泉自州西至滿城縣分徐河水南流注運渠廣置水陸屯田詔駐泊都監王昭遜共成之自是定州亦置屯田五年罷襄州營田下務六年耿望又請於唐州赭陽陂置務如襄州歲種七十餘頃方城縣令佐掌之調夫耘耨景德初從京西轉運使張巽之請詔止役務兵二年令緣邊有屯營田州軍長吏並兼制置諸營田屯田事舊兼使者如故大中祥符九年改定保州順安軍營田務為屯田務凡九州軍皆遣官監務置吏屬淮南兩浙舊皆有屯田後多賦民而收其租第存其名在河北者雖有其實而歲入無幾利在蓄水以限戎馬而已天禧末諸州屯田總四千二百餘頃河北歲收二萬九千四百餘石而保州最多逾其半焉襄唐二州營田既廢景德中轉運使許逖復之初耿望借種田人牛及調夫耨穫歲入甚廣後張巽改其法募水戶分耕至逖又參以兵夫久之無大利天聖四年遣尚書屯田員外郎劉漢傑往視漢傑言二州營田自復至今襄州得穀三十三萬餘石為緡錢九萬餘唐州得穀六萬餘石為緡錢二萬餘所給吏兵俸廩官牛雜費襄州十三萬餘緡唐州四萬餘緡得不補失詔廢以給貧民頃收半稅其後陝西用兵詔轉運司度隙地置營田以助邊計又假同州沙苑監牧地為營田而知永興軍范雍括諸郡牛頗煩擾未幾遂罷右正言田況言鎮戎原渭地方數百里舊皆民田今無復農事可即其地大興營田以保捷兵不習戰者分耕五百人為一堡三兩堡置營田官一領之播種以時農隙則習武事疏奏不用後乃命三司戶部副使夏安期等議並邊置屯田迄不能成治平三年河北屯田三百六十七頃得穀三萬五千四百六十八石熙寧初以內侍押班李若愚同提點制置河北屯田事三年王韶言渭源城而下至秦州成紀旁河五六百里良田不耕者無慮萬頃治千頃歲可得三十萬斛知秦州李師中論韶指極邊見招弓箭手地恐秦州益多事詔遣王克臣等按視復奏與師中同再下沈起起奏不見韶所指何地雖實有之恐召人耕種西蕃驚疑侍御史謝景溫言聞沈起妄指甘谷城弓箭手地以塞韶妄而竇舜卿奏實止有閒田一頃四十三畝中書言起未嘗指甘谷城地以實韶奏而師中前在秦州與韶更相論奏互有曲直韶遂以妄指閒田自著作佐郎責保平軍節度推官師中亦落待制其後韓縝知秦州乃言實有古渭寨弓箭手未請空地四千餘頃遂復韶故官從其所請行之明年河北屯田司奏豐歲屯田入不償費於是詔罷緣邊水陸屯田務募民租佃收其兵為州廂軍時陝西曠土多未耕屯戍不可撤遠方有輸送之勤知延州趙請募民耕以紓朝廷憂詔下其事經略安撫使郭逵言懷寧寨所得地百里以募弓箭手無閒田又言之遂括地得萬五千餘頃募漢蕃兵幾五千人為八指揮詔遷官賜金帛而熙州王韶又請以河州蕃部近城川地招弓箭手以山坡地招蕃兵弓箭手每寨五指揮以二百五十人為額人給地一頃蕃官二頃大蕃官三頃熙河多良田七年詔委提點秦鳳路刑獄鄭民憲興營田許奏辟官屬以集事樞密使吳充上疏曰今之屯田誠未易行古者一夫百畝又受田十畝為公田莫若因弓箭手倣古助田法行之熙河四州田無慮萬五千頃十分取一以為公田大約中歲畝一石則公田所得十五萬石官無屯營牛具廩給之費借用衆力而民不勞大荒不收而官無所損省轉輸平糴價如是者其便有六而提點刑獄鄭民憲言祖宗時屯營田皆置務屯田以兵營田以民固有異制然襄州營田既調夫矣又取鄰州之兵是營田不獨以民也邊州營屯不限兵民皆取給用是屯田不獨以兵也至於招弓箭手不盡之地復以募民則兵民參錯固無異也而前後施行或侵占民田或差借耨夫或諸郡括牛或兵民雜耕或諸州廂軍不習耕種不能水土頗致煩擾至於歲之所入不償其費遂又報罷惟因弓箭手為助田法一夫受田百畝別以十畝為公田俾之自備種糧功力歲畝收一石水旱三分除一官無廩給之費民有耕鑿之利若可以為便然弓箭手之招至未安其業而種糧無所仰給又責其借力於公田慮人心易搖乞候稍稔推行九年詔熙河弓箭手耕種不及之田經略安撫司點廂軍田之官置牛具農器人一頃歲終參較弓箭手廂軍所種優劣為賞罰弓箭手逃地并營田召佃租課許就近於本城寨輸納仍免折變支移元豐二年改定州屯田司為水利司及章惇築沅州亦為屯田務其後遂罷之募民租佃役兵各還所隸五年詔提舉熙河等路弓箭手營田蕃部共為一司隸涇原路制置司提舉熙河營田康識言新復土地乞命官分畫經界選知田廂軍人給一頃耕之餘悉給弓箭手人加一頃有馬者又加五十畝每五十頃為一營四寨堡見缺農作廂軍許於秦鳳涇原熙河三路選募廂軍及馬遞鋪卒願行者人給裝錢二千詔皆從之知太原府呂惠卿嘗上營田疏曰今葭蘆米脂𩹉外良田不啻一二萬頃夏人名為真珠山七寶山言其多出禾粟也若耕其半則兩路新寨兵費已不盡資內地况能盡闢之乎前此所不敢進耕者外無捍衛也今於葭蘆米脂相去一百二十里間各建一寨又其間置小堡鋪相望則延州之義合白草與石州之吳堡克寸胡以南諸城寨千里邊面皆為內地而河外三州荒間之地皆可墾闢以贍軍用凡昔為夏人所侵及蘇安靖棄之以為兩不耕者皆可為法耕之於是就糴河外而使河內之民被支移者量出腳乘之直革百年遠輸貴糴以免困公之弊財力稍豐又通葭蘆之道於麟州之神木其通堡寨亦如葭蘆米脂之法而橫山膏腴之地皆為我有矣七年惠卿雇五縣耕牛發將兵外護而耕新疆葭蘆吳堡間膏腴地號木瓜原者凡得地五百餘頃麟府豐州地七百三十頃弓箭手與民之無力及異時兩不耕者又九百六十頃惠卿自謂所得極厚可助邊計乞推之陝西八年樞密院奏去年耕種木瓜原凡用將兵萬八千餘人馬二千餘匹費錢七千餘緡穀近九千石糗糒近五萬斤草萬四千餘束又保甲守禦費緡錢千三百米石三千二百役耕民千五百雇牛千具皆彊民為之所收禾粟蕎麥萬八千石草十萬二千不償所費又借轉運司錢穀以為子種至今未償增入人馬防拓之費仍在年計之外慮經略司來年再欲耕種乞早約束詔諭惠卿毋蹈前失河東進築堡寨自麟石鄜延南北近三百里及涇原環慶熙河蘭會新復城寨地土悉募廂軍配卒耕種免役已而營田司言諸路募發廂軍皆不間田作遂各遣還其州紹興元年知荊南府解潛奏辟宗綱樊賓措置屯田詔除宗綱充荊南府歸峽州荊門公安軍鎮撫使司措置五州營田官樊賓副之渡江後營田蓋始於此其後荊州軍食仰給省縣官之半焉二年德安府復州漢陽軍鎮撫使陳規放古屯田凡軍士相險隘立堡寨且守且耕耕必給費斂復給糧依鋤田法餘並入官凡民水田畝賦粳米一斗陸田豆麥夏秋各五升滿二年無缺給為永業兵民各處一方流民歸業寖衆亦置堡寨屯聚之凡屯田事營田司兼之營田事府縣兼之廷臣因規奏推廣謂一夫授田百畝古制也今荒田甚多當聽百姓請射其有闕耕牛者宜用人耕之法以二人曳一犂凡授田五人為甲別給蔬地五畝為廬舍場圃兵屯以大使臣主之民屯以縣令主之以歲課多少為殿最下諸鎮推行之詔江東西宣撫使韓世忠措置建康營田如陝西弓箭手法世忠言沿江荒田雖多大半有主難如陝西例乞募民承佃都督府奏如世忠議仍蠲三年租滿五年田主無自陳者給佃者為永業詔湖北浙西江西皆如之其徭役科配並免五年詔淮南川陝荊襄屯田六年都督張浚奏改江淮屯田為營田凡官田逃田並拘籍以五頃為一莊募民承佃其法五家為保共佃一莊以一人為長每莊給牛五具耒耜及種副之別給十畝為蔬圃貸錢七十千分五年償命樊賓王弗行之尋命五大將劉光世韓世忠張俊嶽飛吳玠及江淮荊襄利路帥悉領營田使遷賓司農少卿提舉江淮營田置司建康弗屯田員外郎副之官給牛種撫存流移一歲中收穀三十萬石有奇殿中侍御史石公揆監中嶽李寀及王弗皆言營田之害張浚亦覺其擾請罷司以監司領之於是詔帥臣兼領營田九月以川陝宣撫吳玠治廢堰營田六十莊計田八百五十四頃歲收二十五萬石以助軍儲賜詔奬諭焉三十二年督視湖北京西軍馬汪徹言荊鄂兩軍屯守襄漢糧餉浩瀚襄陽古有二渠長渠溉田七千頃木渠溉田三千頃兵後堙廢今先築堰開渠募邊民或兵之老弱耕之其耕牛耒耜種糧令湖北京西轉運司措置既省餽運又可安集流亡從之隆興元年臣僚言州縣營田之實其說有十曰擇官必審募人必廣穿渠必深鄉亭必修器用必備田處必利食用必充耕具必足定稅必輕賞罰必行且欲立賞格以募人及住廣西馬綱三年以市牛會有訴襄陽屯田之擾者上欲罷之工部尚書張闡言今日荊襄屯田之害以其無耕田之民而課之游民游民不足而強之百姓於是百姓舍己熟田而耕官生田或遠數百里徵呼以來或名雙丁而役其強壯老稚無養一方騷然罷之誠是也然自去歲以來置耕牛農器修長木二渠費已十餘萬一旦舉而棄之則荊襄之地終不可耕也比見兩淮歸正之民動以萬計官不能續食則老弱饑死強者轉而之他若使之就耕荊襄之田非惟可免流離抑使中原之民聞之知朝廷有以處我率皆襁負而至矣異時墾闢既廣取其餘以輸官實為兩便詔除見耕者依舊餘令虞允文同王王玉措置二年江淮都督府參贊陳俊卿言欲以不披帶人擇官荒田標旗立寨多買牛犂縱耕其中官不收租人自樂從數年之後墾田必多穀必賤所在有屯則村落無盜賊之憂軍食既足則饋餉無轉運之勞此誠經久守淮之策詔從之乾道五年三月四川宣撫使鄭剛中撥軍耕種以歲收租米對減成都路對糴米一十二萬石贍軍然兵民雜處村疃為擾百端又數百里外差民保甲教耕有二三年不代者民甚苦之知興元府朝公武欲以三年所收最高一年為額等第均敷召佃放兵及保甲以護邊從之八月詔鎮江都統司及武鋒軍三處屯田兵並拘收入隊教閲六年罷和揚州屯田八年復罷廬州兵屯田淳熙十年鄂州江陵府駐劄副都統制郭杲言襄陽屯田興置二十餘年未能大有益於邊計非田之不良蓋人力有所未至今邊陲無事正宜修舉為實邊之計本司有荒熟田七百五十頃乞降錢三萬緡收買耕牛農具便可施功如將來更有餘力可括荒田接續開墾從之紹熙元年知和州劉煒以剩田募民充萬弩手分耕嘉定七年以京西屯田募人耕種十三年四川宣撫安丙總領任處厚言紹興十五年諸州共墾田二千六百五十餘頃夏秋輸租米一十四萬一千餘石餉所屯將兵罷民和糴為利可謂博矣乾道四年以後屯兵歸軍教閲而營田付諸州募佃遂致租利陷失驕將豪民乘時占據其弊不可概舉今豪強移徙田土荒間正當拘種之秋合自總領所與宣撫司措置其逃絶之田關內外亦多有之為數不資其利不在營田之下乞併括之初玠守蜀以軍儲不繼治褒城堰為屯田民不以為便因漕臣郭大中言約中其數使民自耕民皆歸業而歲入多於屯田端平元年八月以臣僚言屯五萬人於淮之南北且田且守置屯田判官一員經紀其事暇則教以騎射初弛田租三年又三年則取其半十月知大寧監邵潛言昔鄭剛中嘗於蜀之關隘雜兵民屯田歲收粟二十餘萬石是後屯田之利既廢糧運之費益增宜詔帥臣縱兵民耕之所收之粟計直以償之則總所無轉輸之苦邊關有儲峙之豐戰有餘勇守有餘備矣從之嘉熙四年令流民於邊江七十里內分田以耕遇警則用以守江於邊城三五十里內亦分田以耕遇警則用以守城在寨者則耕四野之田而用以守寨田在官者免其租在民者以所收十之一二歸其主俟三年事定則各還元業咸淳三年詔曰淮蜀湖襄之民所種屯田既困重額又困苛取流離之餘口體不充及遇水旱收租不及而催輸急於星火民何以堪其日前舊缺並除之復催者以違制論常平義倉漢隋利民之良法常平以平穀價義倉以備凶災周顯德中又置惠民倉以雜配錢分數折粟貯之歲歉減價出以惠民宋兼存其法焉太祖承五季之亂海內多事義倉寖廢乾德初詔諸州於各縣置義倉歲輸二稅石別收一斗民饑欲貸充種食者縣具籍申州州長吏即計口貸訖然後奏聞其後以輸送煩勞罷之淳化三年京畿大穰分遣使臣於四城門置場增價以糴虛近倉貯之命曰常平歲饑即下其直豫民咸平中庫部員外郎成肅請福建增置惠民倉因詔諸路申淳化惠民之制景德三年言事者請於京東西河北河東陝西江南淮南兩浙皆立常平倉計戶口多寡量留上供錢自二三千貫至一二萬貫令轉運使每州擇清幹官主之領於司農寺三司無輒移用歲夏秋視市價量增以糴糶減價亦如之所減不得過本錢而沿邊州郡不置詔三司集議請如所奏於是增置司農官吏創廨舍藏籍帳度支別置常平案大率萬戶歲糴萬石戶雖多止五萬石三年以上不糶即回充糧廩易以新粟災傷州郡糶粟斗毋過百錢後又詔當職官於元約數外增糴及一倍已上者並與理為勞績天禧四年荊湖川峽廣南皆增置常平倉五年諸路總糴數十八萬三千餘斛糶二十四萬三千餘斛景祐中淮南轉運副使吳遵路言本路丁口百五十萬而常平錢粟才四十餘萬歲饑不足以救恤願自經畫增為二百萬他毋得移用許之後又詔天下常平錢粟三司轉運司皆毋得移用不數年間常平積有餘而兵食不足乃命司農寺出常平錢百萬緡助三司給軍費久之移用數多而蓄藏無幾矣自景祐初畿內饑詔出常平粟貸中下戶戶一斛慶曆中發京西常平粟振貧民而聚斂者或增舊價糶粟欲以市恩皇祐三年詔誡之淮南兩浙體量安撫陳升之等言災傷州軍乞糶常平倉粟令於元價上量添十文十五文殊非恤民之意乃詔止於元糴價出糶五年詔曰比者湖北歲儉發常平以濟饑者如聞司農寺復督取豈朝廷振恤意哉其悉除之明道二年詔議復義倉不果景祐中集賢校理王琪請復置令五等已上戶隨夏秋二稅二斗別輸一升水旱減稅則免輸州縣擇便地置倉貯之領於轉運使計以一中郡正稅歲入十萬石則義倉可得五千石推而廣之則利博矣明道中饑歉國家欲盡貸饑民則軍食不足故民有流轉之患是時兼并之家出粟數千石則補吏是豈以官爵為輕歟特愛民濟物不獲已為之爾且兼并之家占田常廣則義倉所入常多中下之家占田常狹則義倉所入常少及水旱振濟則兼并之家未必待此而濟中下之民實先受其賜矣事下有司會議議者異同而止慶曆初琪復上其議仁宗納之命天下立義倉詔上三等戶輸粟已而復罷其後賈黯又言今天下無事年穀豐熟民人安樂父子相保一遇水旱則流離死亡捐棄道路發倉廩振之則糧不給課粟富人則力不贍轉輸千里則不及事移民就粟則遠近交困朝廷之臣郡縣之吏倉卒不知所出則民饑而死者過半矣願放隋制立民社義倉詔天下州軍遇年穀豐登立法勸課蓄積以備凶災此所謂樂歲粒米狼戾多取之而不為虐者也況取之以為民耶下其說諸路以度可否以為可行才四路餘或謂賦稅之外兩重供輸或謂恐招盜賊或謂已有常平足以振給或謂置倉煩擾於是黯復上奏曰臣嘗判尚書刑部見天下歲斷死刑多至四千餘人其間盜賊率十六七蓋愚民迫於饑寒因之水旱枉陷重辟故臣請復民社義倉以備凶歲今諸路所陳類皆妄議若謂賦稅之外兩重供輸則義倉之意乃教民儲積以備水旱官為立法非以自利行之既久民必樂輸若謂恐招盜賊盜賊利在輕貨不在粟麥今鄉村富室有貯粟數萬石者不聞有劫掠之虞且盜賊之起本由貧困臣建此議欲使民有貯積雖遇水旱不憂乏食則人人自愛而重犯法此正消除盜賊之原也若謂有常平足以振給則常平之設蓋以準平穀價使無甚貴甚賤之傷或遇凶饑發以振救既已失其本意而費又出公帑今國用頗乏所蓄不厚近歲非無常平小有水旱輒流離餓莩起為盜賊則是常平果不足仰以振給也若謂置倉廩斂材木恐有煩擾則今州縣修治郵傳驛舍皆斂於民豈於義倉獨畏煩擾人情可與樂成不可與謀始願自朝廷斷而行之然當時牽於衆論終不果行嘉祐二年詔天下置廣惠倉初天下沒入戶絶田官自鬻之樞密使韓琦請留勿鬻募人耕收其租別為倉貯之以給州縣郭內之老幼貧疾不能自存者領以提點刑獄歲終具出內之數上之三司戶不滿萬留田租千石萬戶倍之戶二萬留三千石三萬留四千石四萬留五千石五萬留六千石七萬留八千石十萬留萬石田有餘則鬻如舊四年詔改隸司農寺州選官二人主出納歲十月遣官驗視應受米者書名于籍自十一月始三日一給人米一升幼者半之次年二月止有餘乃及諸縣量大小均給之其大略如此治平三年常平入五十萬一千四十八石出四十七萬一千一百五十七石熙寧二年制置三司條例司言諸路常平廣惠倉錢穀略計貫石可及千五百萬以上斂散未得其宜故為利未博今欲以見在斛斗遇貴量減市價糶遇賤量增市價糴可通融轉運司苗稅及錢斛就便轉易者亦許兌換仍以見錢依陝西青苗錢例願預借者給之隨稅輸納斛斗半為夏料半為秋料內有請本色或納時價貴願納錢者皆從其便如遇災傷許展至次料豐熟日納非惟足以待凶荒之患民既受貸則兼并之家不得乘新陳不接以邀倍息又常平廣惠之物收藏積滯必待年儉物貴然後出糶所及者不過城市游手之人今通一路有無貴發賤斂以廣蓄積平物價使農人有以赴時趨事而兼并不得乘其急凡此皆以為民而公家無所利其入是亦先王散惠興利以為耕斂補助之意也欲量諸路錢穀多寡分遣官提舉每州選通判幕職官一員典幹轉移出納仍先自河北京東淮南三路施行俟有緒推之諸路其廣惠倉除量留給老疾貧窮人外餘並用常平倉轉移法詔可既而條例司又言常平廣惠倉條約先行於河北京東淮南三路訪問民間多願支貸乞遍下諸路轉運司施行當議置提舉官時天下常平錢穀見在一千四百萬貫石詔諸路各置提舉官二員以朝官為之管當一員京官為之或共置二員開封府界一員凡四十一人初神宗既用王安石為參知政事安石為帝言天下財利所當開闔斂散者帝然其說遂創立制置三司條例司安石因請以著作佐郎編校集賢書籍呂惠卿為制置司檢詳文字自是專一講求立為新制欲行青苗之法蘇轍自大名推官上書召對亦除條例司檢詳文字安石出青苗法示之轍曰以錢貸民使出息二分本非為利然出納之際吏緣為奸雖有法不能禁錢入民手雖良民不免非理費用及其納錢雖富民不免違限如此則鞭笞必用州縣多事矣唐劉晏掌國計未嘗有所假貸有尤之者晏曰使民僥幸得錢非國之福使吏倚法督責非民之便吾雖未嘗假貸而四方豐凶貴賤知之未嘗逾時有賤必糴有貴必糶以此四方無甚貴甚賤之病安用貸為晏之言漢常平法耳公誠能行之晏之功可立俟也安石自此逾月不言青苗會河北轉運司幹當公事王廣廉召議事廣廉嘗奏乞度僧牒數千道為本錢於陝西轉運司私行青苗法春散秋斂與安石意合至是請施行之河北於是安石決意行之而常平廣惠倉之法遂變而為青苗矣蘇轍以議不合罷而諸路提舉官往往迎合安石之意務以多散為功富民不願取貧者乃欲得之即令隨戶等高下品配又令貧富相兼十人為保以富者為保首王廣廉在河北一等戶給十五千等而下之至五等猶給一千民間喧然不以為便廣廉入奏謂民皆歡呼感德然言不便者甚衆右正言李常孫覺乞詔有司毋以彊民時提舉府界常平事侯叔獻屢督提點府界縣鎮呂景散錢景以畿縣各有屯兵歲入課利僅能贍給又民戶嘗貸糧五十餘萬石尚悉以閣今條例司又以買陝西鹽鈔錢五十萬緡為青苗錢給散恐民力不堪詔送條例司召提舉司官至中書戒諭之王安石言若此諸路必顧望不敢推行新法第令條例司指揮從之三年判大名府韓琦言臣準散青苗詔書務在惠小民不使兼并乘急以要倍息而公家無所利其入今所立條約乃自鄉戶一等而下皆立借錢貫陌三等以上更許增借坊郭戶有物業勝質當者亦依鄉戶例支借且鄉村上等戶并坊郭有物業者乃從來兼并之家今令多借之錢一千令納一千三百則是官自放錢取息與初詔絶相違戾又條約雖禁抑勒然須得上戶為甲頭以任之民愚不慮久遠請時甚易納時甚難故自制下以來上下惶惑皆謂若不抑散則上戶必不願請近下等第與無業客戶雖或願請必難催納將來必有行刑督索及勒干係書手典押耆戶長同保均陪之患去歲河朔豐稔米斗不過七八十錢若乘時多斂俟貴而糶不唯合古制無失陷兼民被實惠亦足收其羡贏今諸倉方糴而提舉司巳亟止之意在移此糴本盡為青苗錢則三分之息可為己功豈暇更恤斯民久遠之患若謂陝西嘗行其法官有所得而民以為便此乃轉運司因軍儲有闕適自冬及春雨雪及時麥苗滋盛定見成熟行於一時可也今乃建官置司以為每歲常行之法而取利三分豈陝西權宜之比哉兼初詔且於京東淮南河北三路試行俟有緒方推之他路今三路未集而遽盡於諸路置使非陛下憂民祖宗惠下之意乞盡罷提舉官第委提點刑獄官依常平舊法施行帝袖出琦奏示執政曰琦真忠臣朕始謂可以利民不意乃害民如此且坊郭安得青苗而使者亦彊與之安石勃然進曰苟從其所欲雖坊郭何害因難琦奏曰陛下修常平法以助民至於收息亦周公遺法也如桑弘羊籠天下貨財以奉人主私用乃可謂興利之臣今抑兼并振貧弱置官理財非所以佐私欲安可謂興利之臣乎曾公亮陳升之皆言坊郭不當俵錢與安石論難久之而罷帝終以琦說為疑安石遂稱疾不出帝諭執政罷青苗法公亮升之欲即奉詔趙抃獨欲俟安石出自罷之連日不決帝更以為疑因令呂惠卿諭旨起安石安石入謝既視事志氣愈悍面責公亮等由是持新法益堅詔以琦奏付制置條例司條例司疏列琦奏而辨析其不然琦復上疏曰制置司多刪去臣元奏要語唯舉大概用偏辭曲難及引周禮國服為息之說文其謬妄上以欺罔聖聽下以愚弄天下臣竊以為周公立太平之法必無剝民取利之理但漢儒解釋或有異同周禮園廛二十而稅一唯漆林之征二十而五鄭康成乃約此法謂從官貸錢若受園廛之地貸萬錢者出息五百賈公彥廣其說謂如此則近郊十一者萬錢期出息一千遠郊二十而三者萬錢期出息一千五百甸稍縣都之民萬錢期出息二千如此則須漆林之戶取貸方出息二千五百當時未必如此今放青苗錢凡春貸十千半年之內便令納利二千秋再放十千至歲終又令納利二千則是貸萬錢者不問遠近歲令出息四千周禮至遠之地止出息二千今青苗取息過周禮一倍制置司言比周禮取息已不為多是欺罔聖聽且謂天下之人不能辨也且古今異宜周禮所載有不可施于今者其事非一若謂泉府一職今可施行則制置司何獨舉注疏貸錢取息一事以詆天下之公言哉康成又注云王莽時貸以治産業者但計所贏受息無過歲什一公彥疏云莽時雖計本多少為定及其催科唯所贏多少假令萬錢歲贏萬錢催一千贏五千催五百餘皆據利催什一若贏錢更少則納息更薄比今青苗取利尤為寬少而王莽之外上自兩漢下及有唐更不聞有貸錢取利之法今制置司遇堯舜之主不以二帝三王之道上裨聖政而貸錢取利更過莽時此天下不得不指以為非而老臣不可以不辨也況今天下田稅已重固非周禮什一之法更有農具牛皮鹽麴㙐錢之類凡十餘目謂之雜錢每夏秋起納官中更以紬絹斛斗低估令民以此雜錢折納又歲散官鹽與民謂之蠶鹽折納絹帛更有預買和買紬絹如此之類不可悉舉皆周禮田稅什一之外加斂之物取利已厚傷農已深奈何又引周禮國服為息之說謂放青苗錢取利乃周公太平已試之法此則誣汙聖典蔽惑睿明老臣得不太息而慟哭也制置司又謂常平舊法亦糶與坊郭之人坊郭有物力戶未嘗零糴常平倉斛斗此蓋欲多借錢與坊郭有業之人以望收利之多妄稱周禮以為無都邑鄙野之限以文其曲說唯陛下詳之樞密使文彥博亦數言不便帝曰吾遣二中使親問民間皆云甚便彥博曰韓琦三朝宰相不信而信二宦者乎先是王安石陰結入內副都知張若水押班藍元震帝因使二人潛察府界俵錢事還言民皆情願無抑配者故帝益信之初羣臣進讀邇英畢帝問朝廷每更一事舉朝洶洶何也司馬光曰青苗出息平民為之尚能以蠶食下戶至饑寒流離況縣官法度之威乎呂惠卿曰青苗法願則取之不願不彊也光曰愚民知取債之利不知還債之害非獨縣官不彊富民亦不彊也帝曰陝西行之久民不以為病光曰臣陝西人也見其病不見其利朝廷初不許有司尚能以病民況法許之乎及拜官樞密副使光上章力辭至六七曰帝誠能罷制置條例司追還提舉官不行青苗助役等法雖不用臣臣受賜多矣不然終不敢受命竟出知永興軍當是時爭青苗錢者甚衆翰林學士范鎮言陛下初詔云公家無所利其入今提舉司以戶等給錢皆令出三分之息物議紛紜皆云自古未有天子開課場者民雖至愚不可不畏後以言不行致仕臺諫官呂公著孫覺李常張戩程皓等皆以論青苗罷黜知亳州富弼知青州歐陽修繼韓琦論青苗之害且持之不行亦坐移鎮知陳留縣姜潛之官才數月青苗令下潛即榜於縣門又移之鄉村各三日無人至遂撤榜付吏曰民不願矣府寺疑潛壅令使其屬按驗無違令者潛知不免即移疾去知山陰縣陳舜俞不肯奉行移狀自劾曰方今小民匱乏願貸之人往往有之譬如孺子見飴蜜孰不染指爭食然父母疾止之恐其積甘足以生病故耆老戒其鄉黨父兄誨其子弟未嘗不以貸貰為不善治生今乃官自出舉誘以便利督以威刑非王道之舉也況正月放夏料五月放秋料而所斂亦在當月百姓得錢便出息輸納實無所利是使民一取青苗錢終身以及世世一歲嘗兩輸息錢乃別為一賦以弊生民也坐謫監南康軍鹽酒稅陝西轉運副使陳繹止環慶等六州毋散青苗錢且留常平倉物以備用條例司劾其罪詔釋之五月制置三司條例司罷歸中書以常平新法付司農寺命集賢校理呂惠卿同判寺兼領田役水利七年帝患俵常平官吏多違法王安石請縣專置一主簿主給納役錢及常平不過五百員費錢三十萬貫耳從之帝以久旱為憂翰林學士承旨韓維言畿縣近督青苗甚急往往鞭撻取足民至伐桑為薪以易錢旱災之際重罹此苦帝頗感悟太皇太后亦嘗為帝言聞民間甚苦青苗助役錢盍罷之會百姓流離帝憂見顏色益疑新法不便欲罷之安石不悅屢求去四月出知江寧府然安石薦韓絳代相仍以呂惠卿佐之於安石所為遵守不變既而詔諸路常平錢穀常留一半外方得給散兩經倚閣常平錢人戶不得支借民間非時闕乏許以物産為抵依常平限輸納當輸錢而願輸穀若金帛者官立中價示民物不盡其錢足以錢錢不盡其物者還其餘直又聽民以金帛易穀而有司少加金帛之直六年戶部言準詔諸路常平可酌三年斂散中數取一年為格歲終較其增虧今以錢銀穀帛貫石匹兩定年額散一千一百三萬七千七百七十二斂一千三百九十六萬五千四百五十九比元豐三年散增二百一十四萬八千三百四十二斂增一百三萬四千九百六十三四年散增二百七十九萬九千九百六十四斂虧一百九十八萬六千五百一十五詔三年四年散多斂少及散斂俱少之處戶部下提舉司具析以聞十年詔開封府界先自豐稔畿縣立義倉法明年提點府界諸縣鎮公事蔡承禧言義倉之法以二石而輸一斗至為輕矣乞今年夏稅之始悉今舉行詔可仍以義倉隸提舉司京東西淮南河東陝西路義倉以今年秋料為始民輸稅不及斗免輸頒其法於川峽四路元豐二年詔威茂黎三州罷行義倉法以夷夏雜居歲賦不多故也八年並罷諸路義倉元祐元年詔提舉官纍年積蓄錢穀財物盡樁作常平錢物委提點刑獄交管依舊常平倉法行之罷各縣專置主簿四月再立常平錢穀給斂出息之法限二月或正月以散及一半為額民間絲麥豐熟隨夏稅先納所輸之半願伴納者止出息一分左司諫王巖叟監察御史上官均右正言王覿右司諫蘇轍御史中丞劉摯交章論復行青苗之非八月司馬光奏先朝散青苗本為利民並取情願後提舉官速要見功務求多散或舉縣追呼或排門抄劄亦有無賴子弟謾昧尊長錢不入家亦有他人冒名詐請莫知為誰及至追催皆歸本戶今朝廷深知其弊故悉罷提舉官不復立額考校訪聞人情安便欲下諸路提點刑獄申嚴州縣抑配之禁詔從之中書舍人蘇軾不書録黃奏曰熙寧之法未嘗不禁抑配而其害至此民家量入為出雖貧亦足若令分外得錢則費用自廣況子弟欺謾父兄人戶冒名詐請似此本非抑配臣謂以散及一半為額與熙寧無異今許人願請未免設法罔民使快一時非理之用而不慮後日催納之患二者皆非良法相去無幾今已行常平糶糴之法惠民之外官亦稍利何用二分之息以賈無窮之怨於是王巖叟蘇轍朱光庭王覿等復言臣等屢有封事乞罷青苗皆不蒙付外願盡付三省公議得失初同知樞密院范純仁以國用不足建請復散青苗錢四月之詔蓋純仁意也時司馬光以疾在告已而臺諫皆言其非不報光尋奏乞約束州縣抑配蘇軾又繳奏乞盡罷之光始大悟遂力疾入對尋詔常平錢穀止令州縣依舊法趁時糴糶青苗錢更不支俵除舊缺二分之息元支本錢驗見缺多少分料次隨二稅輸納紹聖元年詔除廣南東西路外並復置義倉自來歲始放稅二分已上免輸所貯專充振濟輒移用者論如法二年戶部尚書蔡京首言承詔措置財利乞檢會熙豐青苗條約參酌增損立為定制淮南轉運司副使莊公嶽謂自元祐罷提舉官後錢穀為他司侵借所存無幾欲乞追還給散隨夏秋稅償納勿立定額自無抑民失財之患奉議郎鄭僅朝奉郎郭時亮承議郎許幾董遵等皆言青苗最為便民願戒抑配止收一分之息詔並送詳定重修敕令所三年舊缺常平錢斛人戶仍許請給宣和五年令州縣歲散常平錢穀畢即揭示請人名數逾月斂之庶革僞冒之弊先是諸路災傷截撥上供年額米斛數多致闕中都歲計令京東江南兩浙荊湖路義倉穀各留三分餘並起發赴京補還截撥之數六年詔罷之高宗紹興元年併提舉常平司於提刑司明年以臣僚言復常平官講補助之政以廣儲蓄九年用宗正丞鄭鬲言以常平錢於民輸賦未畢之時悉數和糴二十八年以趙令請糶州縣義倉米之陳腐者孝宗隆興二年遣司農少卿陳良弼點檢浙東常平等倉乾道六年知衢州胡堅奏廣糴常平福建轉運副使沈樞奏水旱州郡請留轉運司和糴米以續常平上即為之施行八年戶部侍郎楊倓奏義倉在法夏秋正稅斗輸五合不及斗者免輸凡豐熟縣九分以上即輸一升今諸路州縣歲收苗米六百餘萬石其合收義倉米數不少間有災傷支給不多訪聞諸州軍皆擅用請稽之寧宗慶元元年詔戶部右曹專領義倉十一年臣僚言紹興初臺臣嘗請通一縣之數截留下戶苗米輸之於縣別儲以備振濟使窮民不至於艱食惟負郭義倉則就州輸送至於屬縣之義倉則令丞同主之每歲終令丞合諸鄉所入之數上之守二守二合諸縣所入之數上之提舉常平提舉常平合一道之數上之朝廷考其盈虧以議殿最從之寶慶三年侍御史李知孝言郡縣素無蓄積緩急止仰朝廷非立法本意曩淮東總領嶽珂任江東轉運判官以所積經常錢糴米五萬石樁留江東九郡以時濟糶諸郡皆蒙其利其後史彌忠知饒州趙彥悈知廣德軍皆自積錢糴米五千石以是推之監司州郡苟能節用愛民即有贏羡若立之規繩加以黜陟所糴至萬石者旌擢其不收糴與擾民及不實者鐫罰庶幾郡縣趨事蓄積歲增實為經久之利有旨從之景定元年九月赦曰諸路已糶義米價錢州郡以低價抑令上戶補糴正稅逃閣義米用虧常平司責縣道陪納縣道遂敷吏貼保正長攬戶等人均納自今視時收糴見繫吏貼等人陪納之錢並與除放五年監察御史程元嶽奏隨粳帶義法也今粳糯帶義之外又有所謂外義焉者絹紬豆也豈有絹紬豆而可加之義乎縱使違法加義則絹加絹紬加紬豆加豆猶可言也州縣一意椎剝一切理苗而加一分之義甚者赦恩已蠲二稅義米依舊追索貧民下戶所缺不過升合星火追呼費用不知幾百倍破家蕩産鬻妻子怨嗟之聲有不忍聞望嚴督監司止許以粳帶義其餘盡罷其有循習病民者重其罰從之咸淳二年以諸路景定三年以前常平義倉米二百餘萬石減時直糶之
