body:
  text: 宋史卷一百四十九志第一百二輿服一五輅大輅大輦芳亭輦鳳輦逍遙輦平輦七寶輦小輿腰輿耕根車進賢車明遠車羊車指南車記里鼓車白鷺車鸞旗車崇德車皮軒車黃鉞車豹尾車屬車五車涼車相風烏輿行漏輿十二神輿鉦鼓輿鍾鼓樓輿昔者聖人作輿軫之方以象地蓋之圓以象天易傳言黃帝堯舜垂衣裳而天下治蓋取諸乾坤夫輿服之制取法天地則聖人創物之智別尊卑定上下有大於斯二者乎舜命禹曰豫欲觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡以五采彰施於五色作服汝明周官之屬有巾車典路司常有司服司裘內司服等職以是知輿服始於黃帝成於唐虞歷夏及商而大備於周周衰列國肆為侈汰秦併之攬上選以供服御其次以賜百官始有大駕法駕之制又自天子以至牧守各有鹵簿焉漢興乃不能監古成憲而效秦所為自是代有變更志有詳略東漢至舊唐書皆稱輿服新唐書改為車服鄭樵合諸代為通志又為器服其文雖殊而考古制作無以尚於三代矣夫三代制器所以為百世法者以其華質適中也孔子答顏淵為邦之問曰乘殷之輅服周之冕且禮謂周人上輿而孔子獨取殷輅是殷之質勝於周也又言禹致美乎黻冕而論冕以周為貴是周之文勝於夏也蓋已不能無損益於其間焉不知歷代於秦已還何所損益乎宋之君臣於二帝三王周公孔子之道講之甚明至其規模制度飾為聲明已足粲然雖不能盡合古制而於後代庶無愧焉宋初袞冕綴飾不用珠玉蓋存簡儉之風及為鹵簿又熾以旗幟華以繡衣以毬杖豈非循襲唐五季之習猶未能盡去其陋邪詒之子孫殆有甚焉者矣迄于徽宗奉身之欲奢蕩靡極雖欲不亡得乎靖康之末纍朝法物淪沒於金中興掇拾散逸參酌時宜務從省約凡服用錦繡皆易以纈以羅旗仗用金銀飾者皆易以繪以髹建炎初有事郊報仗內拂扇當用珠飾高宗曰事天貴質若尚華麗非禋祀本意也是以子孫世守其訓雖江介一隅而華質適時尚足為一代之法其儒臣名物度數之學見諸論議又有可觀者焉今取舊史所載著于篇作輿服志五輅宋自神宗以降鋭意稽古禮文之事招延儒士折衷同異元豐有詳定禮文所徽宗大觀間有議禮局政和又有禮制局先是元豐雖置局造輅而五輅及副輅多仍唐舊玉輅自唐顯慶中傳之至宋曰顯慶輅親郊則乘之制作精巧行止安重後載太常與闟戟分左右以均輕重世之良工莫能為之其制箱上置平盤黃屋四柱皆油畫刻鏤左青龍右白虎龜文金鳳翅雜花龍鳳金塗銀裝間以玉飾頂輪三層外施銀耀葉輪衣小帶絡帶並青羅繡雲龍周綴帶羅文佩銀穗毬小鈴平盤上布黃褥四角勾闌設圓鑑翟羽虛匱內貼銀鏤香罨軾匱銀龍二銜香囊銀香爐香寶錦帶下有障塵青畫輪轅銀轂乘葉三轅銀龍頭橫木上有銀鳳十二左建青旗十有二旒皆繡升龍右載闟戟繡黻文並青繡綢杠又設青繡門簾銀飾梯一拓叉二推竿一銀錔頭銀裝行馬青繒裹挽索駕六青馬馬有金面插鵰羽鞶纓攀胸鈴拂青繡屜錦包尾又誕馬二在輅前飾同駕馬餘輅及副輅皆有之駕士六十四人金輅色以赤駕六赤馬建大旗駕士六十四人象輅色以淺黃駕六赭白馬建大赤駕士四十人革輅色以黃駕六騧馬建大白駕士四十人木輅色以黑駕六黑騮馬建大麾駕士四十人自金輅而下其制皆同玉輅惟無玉飾五副輅並駕六馬駕士四十人當用銀飾者皆以銅餘制如正輅政和三年議禮局更上皇帝車輅之制詔頒行玉輅箱上平盤黃屋以下皆如舊頂輪三層內一層素輪頂上施金塗銀山花葉及翟羽青絲繡雲龍絡帶二周綴雜色帶八銅佩八銀穗毬二平盤上布紅羅繡雲龍褥曲几扶几上下設銀螭首二十四四角勾闌設圓鑑一十六青羅繡寶相花帶火珠二十八香匱設香爐紅羅繡寶相花帶香囊香寶銀結綬二紅羅繡雲龍結綬一紅錦幟龍鳳門簾一青畫輪轅銀轂乘葉軾匱橫轅前轅並飾以金塗銀螭首橫轅上施銀立鳳一十二左建太常十有二旒右載闟戟繡黻文杠褲一以青繡杠首飾以銀螭首金塗銅鈸青犛牛尾拂青繒裹索駕青馬六馬有銅面插鵰羽鞶纓攀胸鈴拂青線織屜紅錦包尾又踏路馬二在輅前飾同駕馬凡大祭祀乘之金輅以下並以次列其後若大朝會冊命皇太子諸王大臣則設五輅於大慶殿庭為充庭之儀金輅赤質以金飾諸末建大旗餘同玉輅駕赤馬六凡玉輅之飾以青者金輅以緋象輅淺黃質金塗銅裝以象飾諸末建大赤餘同玉輅駕赭白馬六凡玉輅之飾以青者象輅以銀褐革輅黃質鞔之以革建大白餘同玉輅駕騧馬六凡玉輅之飾以青者革輅以黃木輅黑質漆之建大麾餘同玉輅駕黑騮六凡玉輅之飾以青者木輅以皂凡玉輅用金塗銀裝者象輅革輅木輅及五副輅並金塗銅裝又禮制局言玉輅馬纓十二而無采不應古制欲以五采罽飾樊纓十有二就輅衡軾並無鸞和乞添置蓋弓二十有二不應古制乞增為二十八以象星又巾車言玉輅建太常而不言色司常注云九旗之帛皆用絳以周尚赤故也禮記月令中央天子乘大輅載黃旗以金象木革四輅及所建之旗與四時所乘所載皆合今玉輅所建之旗以青帛十二副連屬為之有升龍而非交龍又無三辰皆非古制如依成周以所尚之色則用赤依月令兼四代之制則當用黃仍分縿斿之制及繡畫三辰於其上今改制太常其斿曳地當依周官以六人維之又左傳言鍚鸞和鈴昭其聲也注鍚在馬額鈴在旗首今旗首無鈴乞增置又車蓋周以流蘇及佩各八無所法象欲各增為十二以應天數又輅之諸末盡飾以玉為稱其實而羅紋雜佩乃用塗金乞改為玉又車箱兩轓有金塗龜文及鵾翅左龍右虎乃後代之制欲改用蟉龍加玉為飾又言既建太常當車之後則自後登車有妨曲禮言君車將駕則僕執策立於馬前已駕僕展軨效駕奮衣由右上取二綏跪乘執策分轡驅之五步而立君出就車則君升車亦當自右由前而入今玉輅前有式匱不應古制恐當更易以便登車及改式之制又禮記言車得其式周官輿人三分其隧一在前二在後以揉其式以其廣之半為之式崇三分軫圍去一以為式圍三分軹圍去一以為轛圍注立者為轛橫者為軹今玉輅無式詔玉輅用青質輪輈絡帶其色如之四柱平盤虛匱則用赤增蓋弓之數為二十八左右建旗常並青太常繡日月五星二十八宿旗上則繡以雲籠朱杠青縚鈴垂十有二就流蘇及佩各增十二之數樊纓飾以五采之罽衡式之上又加鸞和輅之諸末耀葉螭頭雲龍垂牙鎚腳花版結綬羅紋雜佩羽臺蔥臺麻爐香寶壓貼牌字皆飾以玉自後而升式匱不去既成高二丈七寸五分闊一丈五尺副玉輅亦用青色舊駕馬四增為六色亦以青政和四年詔改修正副輅討論製造金象革木四輅並依新修玉輅制度旗常並建各與輅一色除去闟戟改車箱兩轓龜文鵾翅左龍右虎之飾並用蟉龍增蓋弓博山流蘇等數軾衡加和鸞以合於古金輅朱質飾以金塗銀左右建太常大旗及輪衣絡帶等色皆以黃龍旗九斿如周官金輅建大旗之制駕馬以騧飾樊纓五采九就象輅朱質凡制度裝綴名物並同金輅飾以象及金塗銀銅鍮石左右建太常大赤輪衣絡帶等色皆以紅大赤繡鳥隼七斿如周官象輅建大赤之制駕馬以赤飾樊纓七就革輅朱質凡制度裝綴名物並同金輅飾以金塗銅鍮石左右建太常大白及輪衣絡帶等色皆以淺黃大白繡熊虎六斿如周官革輅建大白之制駕馬以赭白飾樊纓五就木輅朱質凡制度裝綴名物皆同金輅飾以金塗鍮石左右建太常大麾及輪衣絡帶等色皆以皂大麾繡龜蛇四斿如周官木輅建大麾之制駕馬以烏飾樊纓三就四輅駕馬各六玉輅駕士六十四人餘皆四十人又禮制局增改雅飾諸輅舊副玉輅色青飾以金改用黃而飾以玉樊纓如正輅之制建太常色黃飾以組象日月於縿星辰於斿其長曳地舊金輅改用青飾以金樊纓以五采罽而九就建大旗色青飾以組象交龍於縿升龍於斿其長齊軫象輅改用赤飾以象樊纓以五采罽而七就建大赤色赤飾以組象鳥隼於縿斿其長齊較革輅改用白飾以革龍勒絛纓建大白色白飾以組象熊虎於縿斿其長齊肩三輅皆維以縷削幅為之木輅依舊色而飾以漆其色黑前樊鵠纓建大麾色黑飾以組象龜蛇於縿斿其長齊首維以縷充幅為之又詔玉輅身仍用紅太常旗絡帶等用黃餘常旗絡帶亦隨其輅色高宗渡江鹵簿儀仗悉燬於兵紹興十二年始命工部尚書莫將戶部侍郎張澄等以天禧宣和鹵簿圖考究制度及故內侍工匠省記指說參酌制度是年九月玉輅成明年遂作金象革木四輅副輅不設玉輅之制青色飾以玉通高十九尺輪高六十三寸輻徑三十九寸軸長十五尺三寸頂上剡為輪三層象天圜也外施青玉博山八十一一名耀葉鏤以金塗龍文覆以青羅曰輪衣綴垂玉佩間以五色垂氂尾曰流蘇一名帶頂四角分垂青羅曰絡帶表𩹉繡雲龍遇雨則油黃繒覆之輅之中四柱象地方也前柱卷龍平槃上布錦褥前有橫軾後垂錦軟簾登車則自後卷簾梯級以登四面周以闌而闕其中以備登降執綏官先自右升立於右柱下以備顧問闌柱頭有玉蹲龍軾前有牌鏤曰玉輅以玉篆之上有玉龍二中設御坐純以黃香木為之取其黃中之正色也下有塗金蹲龍十六在平槃四圍下又有拓角雲龍金彩飾之前後左右各二前有轅木三鱗體昂首龍形轅木上束兩橫竿在前者名曰鳳轅馬負之以行次曰推轅班直推之以助馬力橫於轅後者名曰壓轅以人壓於後欲取其平車輪三歲一易心用榆圜數尺圈以鐵以防折裂橫貫大木以為軸夾以兩輪輪皆彩畫此輅下飾也每新輪成載鐵萬斤試之左建太常右建龍旗插於輅後兩柱之金環前駕青馬六馬有鏤鍚鞶纓金鈴紅旄繡屜金包騣錦包尾青繒裹索引之駕士二百三十二人誕馬十二人左右索百二十八人入轅馬十二人龍頭子二人前後抱轅各六人推竿四人捧輪四人拓叉四人淨席四人前攔人員一人後攔人員一人前攔馬八人後攔馬八人踏道人員二人踏道二十人小拓叉四人小梯子二人燭臺二人香匙剪子二人左右索人員二人又有呵喝人員二人教馬官二人捧輪將軍四人千牛衛將軍二人推輪軸官健八人抱太常龍旗官六人職掌五人專知官一人手分一人庫子八人裝挂工匠二人諸作工匠十五人蓋覆儀鸞司十一人監官三員金輅黃色飾以金塗銀制如玉輅而高減五寸博山輪衣絡帶轅輻軸並以黃建大旗九斿駕黃馬六駕士一百五十四人象輅朱色飾以象及金塗銅制如金輅博山輪衣絡帶並以朱建大赤七斿駕赤馬六駕士一百五十四人革輅淺黃白色飾以金塗銅制如象輅博山輪衣絡帶並以淺黃白建大白六斿駕黃白馬六駕士百五十四人木輅黑色飾以金塗銀制如革輅博山輪衣絡帶並以黑建大麾四斿駕黑馬六駕士一百五十四人五輅駕士服色平巾幘青絹抹額纈絹對花鳳袍緋纈絹對花寬袖襖羅抹絹袴襪麻㙐其色各從其輅大輅政和六年徐秉哲言南北郊皇帝乘玉輅以赴齊宮自齊宮赴壇正當祀天祭地乃乘大輦疑非禮意下禮制局討論禮制局請造大輅如玉輅之制唯不飾以玉所駕之馬其數如之唯樊纓一就以稱尚質之義仍建大旗十有二旒龍章日月以協象天之義至禮畢還齊宮則御大輦於禮無嫌從之大輦周官巾車氏有輦車以人組挽之宮中從容所乘唐制輦有七一曰大鳳輦二曰大芳輦三曰仙遊輦四曰小輕輦五曰芳亭輦六曰大玉輦七曰小玉輦太祖建隆四年翰林學士承旨陶穀為禮儀使創意造為大輦赤質正方油畫金塗銀葉龍鳳裝其上四面行龍雲氣火珠方鑑銀絲囊網珠翠結條雲龍鈿窠霞子四角龍頭銜香囊頂輪施耀葉中有銀蓮花坐龍紅綾𩹉碧牙壓帖內設圓鑑銀絲香囊銀飾勾闌臺坐紅絲絛網錔中施黃褥上置御坐扶几香爐錦結綬几衣輪衣絡帶並緋繡壓金銀線長竿四銀裹鐵鋦龍頭魚鈎錦膊褥銀裝畫梯拓叉黃羅緣席褥帊梯杖褥朱索緋繒油帊主輦六十四人親祀南郊謁太廟還及具鑾駕黃麾仗省方還都則乘之真宗東封以舊輦太重遂命別造凡減七百餘斤後常用焉神宗已後其制赤質正方油畫金塗銀龍鳳裝朱漆天輪一金塗銀頂龍一四面施行龍一十六火珠四四角龍頭四穗毬一十二頂輪施耀葉紅羅輪衣一綴銀鈴紅羅絡帶二中設御坐曲几錦褥等施屏風香爐結綬長竿四飾以金塗銀龍頭祀畢車駕還內若不進輅則乘大輦政和之制黃質冒以黃衣紘以黃帶車箱四圍於桯之外高二尺二寸設軾於前楹軾高三尺二寸建大旗於後楹旗十二斿其長曳地其色黃繪以交龍素帛為縿繪以日月以弧張幅以韣韜弧杠以青錦綢之注旄於竿首繫以鈴國朝之輦有七中興後唯存大輦平輦逍遙三輦而已大輦又曰大安輦其制赤質正方高十五尺三寸方十一尺六寸四柱平槃上覆青緑錦上有天輪三層外施金塗銀博山八十一內有圓鏡金塗銀頂龍一四面行龍十六火珠四輪衣以青墜以金鈴頂有青羅十字分垂四角曰絡帶四角出龍首銜氂牛五色尾曰旒綏四面拱斗外施方鏡九柱圍以朱闌中設御坐曲几屏風錦褥下舉以長竿四攢竹筋膠丹漆之竿為龍首平槃下四圍結紅絲網輦官服色武辨黃纈對鳳袍黃絹勒帛紫生色袒帶紫絹行縢芳亭輦黑質頂如幕屋緋羅衣裙襴絡帶皆繡雲鳳兩面朱緑窗花版外施紅絲網綢金銅錔前後垂簾下設牙牀勾闌長竿四銀龍頭銀飾梯行馬主輦一百二十人政和之制簾以紅羅繡鵝為額內設御坐長竿飾以金塗銅螭首橫竿二鳳輦赤質頂輪下有二柱緋羅輪衣絡帶門簾皆繡雲鳳頂有金鳳一兩壁刻畫龜文金鳳翅前有軾匱香爐香寶結帶下有勾闌二重內設紅錦褥長竿三銀飾梯行馬主輦八十人法駕鹵簿不設鳳輦逍遙輦以棕櫚為屋赤質金塗銀裝朱漆扶版二雲版一長竿二飾以金塗銀龍頭常行幸所御又魚鈎錔梅紅絛輦官十二人春夏服緋羅衫秋冬服白師子錦襖東封別造辟塵逍遙輦加窗隔黃繒為𩹉賜名省方逍遙輦中興之制赤質金塗四柱棕屋上有走脊金龍四中起火珠凸頂四面不設窗障中有御踏子制甚簡素祗應人員服帽子宜男方勝纈衫平輦又名平頭輦亦曰太平輦飾如逍遙輦而無屋輦官十二人服同逍遙輦常行幸所御東封別造升山天平輦施機關賜名曰登封輦中興之制赤質正方形如一朱龍椅而加長竿二飾如逍遙輦而不施棕屋制尤簡素止施畫雲版而已又有七寶輦隆興二年為德壽宮所製也高五十一寸闊二十七寸深三十六寸比附大輦平輦制度為之上施頂輪耀葉角龍頂龍滴子鐸子結穗毬下施梅紅絲裙網加綴七寶中設香木御坐引手為轉身龍靠背為龍首靠枰子織以紅黃藤舁以長竿二竿為螭首金塗銀飾焉初有司言東都舊制輦飾以玉裙網用七寶而滴子用真珠帝曰上皇意不然止欲簡素遂以塗金易玉梅紅絲結裙網間綴七寶而象牙易真珠既而上皇却不受每至大內多乘馬而間有行幸則用肩輿自是重華壽康兩宮並不別造小輿赤質頂輪下施曲柄如蓋緋繡輪衣絡帶制如鳳輦而小下有勾闌牙牀繡瀝水中設方牀緋繡羅衣錦褥上有小案坐牀皆繡衣踏牀緋衣前後長竿二銀飾梯行馬奉輿二十四人中興後去其輪蓋方四十九寸高三十一寸輿上周以勾闌施翟羽玉照子中為方牀三級上設御坐曲几踏子曲柄緋羅繡蓋輿下紅絲結五色花裙網舁以長竿二竿為螭首宮殿從容所乘設鹵簿則陳之腰輿前後長竿各二金銅螭頭緋繡鳳裙襴上施錦褥別設小牀緋繡花龍衣奉輿十六人中興制赤質方形四面曲闌下結繡裙網制如小輿惟無翟尾玉照子三級床曲柄蓋而上設方御床曲几舁竿無螭首用亦同小輿耕根車制青質蓋三層餘如五輅之副駕六青馬駕士四十人親祠具大駕法駕鹵簿並列於仗內若耕藉則乘之國朝之車自耕根而下凡十有五南渡所存惟耕根車一而已其制度並同惟駕士七十五人進賢車古安車也太祖乾德元年改赤質兩壁紗窗擎耳虛匱一轅緋幰衣絡帶門簾皆繡鳳紅絲網中設朱漆牀香案紫綾案衣緋繒裹挽索朱漆行馬凡車皆有挽索行馬駕四馬駕士二十四人明遠車古四望車也駕以牛太祖乾德元年改仍舊四馬赤質制如屋重勾闌上有金龍四角垂銅鐸上層四面垂簾下層周以花版三轅駕士四十人服繡對鳳羊車古輦車也亦為畫輪車駕以牛隋駕以果下馬今亦駕以二小馬赤質兩壁畫龜文金鳳翅緋幰衣絡帶門簾皆繡瑞羊童子十八人指南車一曰司南車赤質兩箱畫青龍白虎四面畫花鳥重臺勾闌鏤拱四角垂香囊上有仙人車雖轉而手常南指一轅鳳首駕四馬駕士舊十八人太宗雍熙四年增為三十人仁宗天聖五年工部郎中燕肅始造指南車肅上奏曰黃帝與蚩尤戰于涿鹿之野蚩尤起大霧軍士不知所向帝遂作指南車周成王時越裳氏重譯來獻使者惑失道周公賜軿車以指南其後法俱亡漢張衡魏馬鈞繼作之屬世亂離其器不存宋武帝平長安嘗為此車而制不精祖沖之亦復造之後魏太武帝使郭善明造彌年不就命扶風馬嶽造垂成而為善明鴆死其法遂絶唐元和中典作官金公立以其車及記里鼓上之憲宗閲於麟德殿以備法駕歷五代至國朝不聞得其制者今創意成之其法用獨轅車車箱外籠上有重構立木仙人於上引臂南指用大小輪九合齒一百二十足輪二高六尺圍一丈八尺附足立子輪二徑二尺四寸圍七尺二寸出齒各二十四齒間相去三寸轅端橫木下立小輪二其徑三寸鐵軸貫之左小平輪一其徑一尺二寸出齒十二右小平輪一其徑一尺二寸出齒十二中心大平輪一其徑四尺八寸圍一丈四尺四寸出齒四十八齒間相去三寸中立貫心軸一高八尺徑三寸上刻木為仙人其車行木人指南若折而東推轅右旋附右足子輪順轉十二齒擊右小平輪一匝觸中心大平輪左旋四分之一轉十二齒車東行木人交而南指若折而西推轅左旋附左足子輪隨輪順轉十二齒擊左小平輪一匝觸中心大平輪右轉四分之一轉十二齒車正西行木人交而南指若欲北行或東或西轉亦如之詔以其法下有司製之大觀元年內侍省吳德仁又獻指南車記里鼓車之制二車成其年宗祀大禮始用之其指南車身一丈一尺一寸五分闊九尺五寸深一丈九寸車輪直徑五尺七寸車轅一丈五寸車箱上下為兩層中設屏風上安仙人一執杖左右龜鶴各一童子四各執纓立四角上設關戾臥輪一十三各徑一尺八寸五分圍五尺五寸五分出齒三十二齒間相去一寸八分中心輪軸隨屏風貫下下有輪一十三中至大平輪其輪徑三尺八寸圍一丈一尺四寸出齒一百齒間相去一寸二分五釐通上左右起落二小平輪各有鐵墜子一皆徑一尺一寸圍三尺三寸出齒一十七齒間相去一寸九分又左右附輪各一徑一尺五寸五分圍四尺六寸五分出齒二十四齒間相去二寸一分左右疊輪各二下輪各徑二尺一寸圍六尺三寸出齒三十二齒間相去二寸一分上輪各徑一尺二寸圍三尺六寸出齒三十二齒間相去一寸一分左右車腳上各立輪一徑二尺二寸圍六尺六寸出齒三十二齒間相去二寸二分五釐左右後轅各小輪一無齒繫竹並索在左右軸上遇右轉使插羽鞶纓攀胸鈴拂緋絹屜錦包尾記里鼓車一名大章車赤質四面畫花鳥重臺勾闌鏤拱行一里則上層木人擊鼓十里則次層木人擊鐲一轅鳳首駕四馬駕士舊十八人太宗雍熙四年增為三十人仁宗天聖五年內侍盧道隆上記里鼓車之制獨轅雙輪箱上為兩重各刻木為人執木槌足輪各徑六尺圍一丈八尺足輪一周而行地三步以古法六尺為步三百步為里用較今法五尺為步三百六十步為里立輪一附於左足徑一尺三寸八分圍四尺一寸四分出齒十八齒間相去二寸三分下平輪一其徑四尺一寸四分圍一丈二尺四寸二分出齒五十四齒間相去與附立輪同立貫心軸一其上設銅旋風輪一出齒三齒間相去一寸二分中立平輪一其徑四尺圍一丈二尺出齒百齒間相去與旋風等次安小平輪一其徑三寸少半寸圍一尺出齒十齒間相去一寸半上平輪一其徑三尺少半尺圍一丈出齒百齒間相去與小平輪同其中平輪轉一周車行一里下一層木人擊鼓上平輪轉一周車行十里上一層木人擊鐲凡用大小輪八合二百八十五齒遞相鈎宀元攴犬牙相制周而復始詔以其法下有司製之大觀之制車箱上下為兩層上安木人二身各手執木槌輪軸共四內左壁車腳上立輪一安在車箱內徑二尺二寸五分圍六尺七寸五分二十齒齒間相去三寸三分五釐又平輪一徑四尺六寸五分圍一丈三尺九寸五分出齒六十齒間相去二寸四分上大平輪一通軸貫上徑三尺八寸圍一丈一尺出齒一百齒間相去一寸二分立軸一徑二寸二分圍六寸六分出齒三齒間相去二寸二分外大平輪軸上有鐵撥子二又木橫軸上關戾撥子各一其車腳轉一百遭通輪軸轉周木人各一擊鉦鼓白鷺車隋所制也一名鼓吹車赤質周施花版上有朱柱貫五輪相重輪衣以緋皂頂及緋絡帶並繡飛鷺柱杪刻木為鷺銜鵝毛筒紅綬帶一轅駕四馬駕士十八人鸞旗車漢制為前驅赤質曲壁一轅上載赤旗繡鸞鳥駕四馬駕士十八人崇德車本秦辟惡車也上有桃弧棘矢所以禳卻不祥太祖乾德元年改赤質周施花版四角刻辟惡獸中載黃旗亦繡此獸太卜署令一人在車中執旗駕四馬駕士十八人政和之制建黃羅繡崇德旗一彩畫刻木獬豸四宣和元年禮制局言崇德車載太卜令一員畫辟惡獸於旗記曰前巫而後史傳曰桃弧棘矢以供禦王事請以巫易太卜弧矢易辟惡獸從之皮軒車漢前驅車也冒以虎皮為軒取曲禮前有士師則載虎皮之義赤質曲壁上有柱貫五輪相重畫虎文駕四馬駕士十八人政和之制用漆柱貫朱漆皮軒五黃鉞車漢制乘輿建之在大駕後晉鹵簿有黃鉞車唐初無之貞觀後始加赤質曲壁中設金鉞一錦囊綢杠左武衛隊正一人在車中執鉞駕兩馬駕士十五人豹尾車古者軍正建豹尾漢制最後車一乘垂豹尾豹尾以前即同禁中唐貞觀後始加此車於鹵簿內制同黃鉞車上載朱漆竿首綴豹尾右武衛隊正一人執之駕兩馬駕士十五人屬車一曰副車一曰二車一曰左車秦制大駕屬車八十一乘法駕三十六乘漢法駕用三十一乘小駕用十二乘隋制大駕三十六法駕十二小駕不用唐大駕唯用十二乘宋因之黑質兩箱軬裝前有曲闌金銅飾上施紫通幰絡帶門簾皆繡雲鶴紫絲網錔每乘駕三牛駕士十人五車徽宗宣和元年禮制局言舊鹵簿記有白鷺鸞旗皮軒三車其制非古按曲禮曰前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有鷙獸則載貔貅萬乘一出五車必載所以警衆也青旌鳴鳶飛鴻貔貅乃以白鷺鸞旗雜陳其間未為合禮今欲改五車相次於中道繼之以崇德車於是為備青旌車赤質曲壁中載青旌以絳帛為之畫青鳥於其上鳴鳶車赤質曲壁中載鳴鳶旌以絳帛為之畫鳴鳶於其上飛鴻車赤質曲壁中載飛鴻旌以絳帛為之畫飛鴻於其上虎皮車赤質曲壁中載虎皮旌以絳帛為之緣以赤畫虎皮於上貔貅車赤質曲壁旌以絳帛為之緣以赤畫貔貅於上其轅皆一涼車赤質金塗銀裝龍鳳五采明金織以紅黃藤油壁緋絲絛龍頭梅紅羅褥銀螭頭穗毬雲朵踏頭蓮花坐鴈鈎火珠門沓金戎頻伽大小鐶駕以橐駝省方在道及校獵回則乘之相風烏輿上載長竿竿杪刻木為烏垂鵝毛筒紅綬帶下承以小盤周以緋裙繡烏形輿士四人行漏輿隋大業行漏車也制同鍾鼓樓而大設刻漏如稱衡首垂銅鉢末有銅象漆匱貯水渴烏注水入鉢中長竿四輿士六十人十二神輿赤質四門旁刻十二辰神緋繡輪衣絡帶輿士十二人交龍鉦鼓輿各一皆刻木為二青龍相交下有木臺長竿一挂畫鼓一挂金鉦上皆有緋蓋亦繡交龍輿士各二人中興後相風行漏十二神鉦鼓四輿悉省去鍾鼓樓輿各一本隋大駕鍾車鼓車也皆刻木為屋中置鍾鼓下施木臺長竿如鉦鼓輿輿士各二十四人行漏輿十二神輿交龍鉦鼓輿鍾鼓樓舊禮無文皆太祖開寶定禮所增
