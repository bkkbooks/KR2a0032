body:
  text: 宋史卷一百三十八志第九十一樂十三樂章七朝會御樓肆赦恭上皇帝皇太后尊號上建隆乾德朝會樂章二十八首皇帝升坐隆安天臨有赫上法乾元鏗鏘六樂儼恪千官皇儀允肅玉坐居尊文明在御禮備誠存公卿入門正安堯天協紀舜日揚光淑慎爾止率由舊章佩環濟濟金石鏘鏘威儀炳煥至德昭彰上壽禧安乾健為君坤柔曰臣惟其臣子克奉君親永御皇極以綏兆民稱觴獻壽山嶽嶙峋舜韶更奏堯酒浮觴皇情載懌洪算無疆基隆郟鄏德茂陶唐山巍日煥地久天長皇帝舉酒第一盞用白龜聖德昭宣神龜出焉載白其色或游于川名符在沼瑞應巢蓮登歌丹陛紀異靈篇第二盞甘露天德冥應仁澤載濡其甘如醴其凝若珠雲表潛結皓英允敷降于竹柏永昭瑞圖第三盞紫芝煌煌茂英不根而生蒲茸奪色銅池著名晨敷表異三秀分榮書于瑞典光我文明第四盞嘉禾嘉彼合穎致貢升平異標南畝瑞應西成德至于地皇祇效靈和同之象煥發祥經第五盞玉兔盛德好生網開三面明視標奇昌辰乃見育質雪園淪精月殿著於樂章色含江練羣臣舉酒正安戶牖嚴丹扆鵷鸞簉紫庭懇祈南嶽壽勢拱北辰星得士於茲盛基邦固以寧誠明一何至金石與丹青簪紱若雲屯晨趨閶闔門侁侁羅禹會濟濟奉堯樽周禮觀明備天儀仰睟溫高卑陳表著同拱帝王尊待漏造王庭威儀盛莫京紛綸簪組列清越佩環聲禮飲終三爵韶音畢九成永同鳧藻樂千載奉升平羣臣第一盞畢作玄德升聞治定資神武功成顯睿文貢輸庭實旅朝會羽儀分偃革千年運垂衣萬乘君孰知堯舜力明德自升聞約法皇綱正崇文寶曆昌遒人振木鐸農器鑄干將瑞日含王宇卿雲藹帝鄉萬邦成一統鴻祚與天長六變宸扆威容盛聲明禮樂宣九州臻禹會萬國戴堯天貢職輸琛賮皇猷煥簡編含和均暢茂鴻慶結非煙朝會儼威儀司常建九旗舞容分綴兆文物辨威蕤運格桃林牧祥開洛水龜帝功潛日用化俗自登熙螭階聊載筆紀瑞軼唐虞丹鳳儀金奏黃龍負寶圖羣材薪棫朴仁政煦蒲盧蕩蕩巍巍德䄡魚信自孚接聖宅神都方來五達區國賢熙帝載靈命握乾符至化當純被斯文益誕敷車書今混一聖治奉三無聖皇臨大寶八表湊才賢經緯文天賦剛柔德日宣建邦隆柱石造物運陶甄共致升平業綿長保億年神化妙無方巍巍邁百王鶴書搜隱逸龍陛策賢良拱揖朝羣后賓筵闢四方洪圖基億載淳曜德彌光第二盞畢天下大定皇猷敷八表武誼肅三邊蘭錡韜兵日靈臺偃伯年奉珍皆述職削衽盡朝天功德超前古音徽播管弦伐叛天威震恢疆帝業多削平侔肅殺涵煦極陽和蹈厲觀周舞風雲入漢歌功成推大定歸馬偃雕戈六變惕厲日乾乾潛蟠或躍淵伐謀參上策受鉞總中堅田訟歸周日民謠戴舜年風雲自冥感嘉會翼飛天壺關方逆命投袂起親征虎旅聊攻伐梟巢遽蕩平天威清朔漠仁澤被黎氓按節皇輿復洋洋載頌聲蠢茲淮海帥保據毒黎苗不悟龍興漢猶同犬吠堯六師方雨施孤壘自冰消千載逢嘉運華夷奉聖朝上游荊楚要澤國洞庭深自識同文世皆回拱極心一戎聊杖鉞九土盡輸金大定功成後薰風入舜琴席卷定巴邛西遐盡率從岷峨難負阻江漢自朝宗述職方舟集驅車九折通粲然書國史冠古耀豐功鋭旅慶回旋邊防盡晏然鍵櫜方偃武飛將亦韜弦震曜資平壘文明協麗天洸洸成大業赫奕在青編淳化中朝會二十三首上壽和安四序伊始三陽肇開條風入律玉琯飛灰望雲肅謁鳴佩斯來稱觴獻壽瞻拱星回一陽應候萬國同文天正紀節太史書雲凝旒在御列爰分壽觴斯薦祝慶明君皇帝初舉酒用祥麟聖皇御𧜛仁獸誕彰在郊旅貢游畤呈祥星辰是稟草木無傷紀異信史登歌太常再舉酒丹鳳九苞薦瑞戴德膺仁藻翰爰奮靈音載振非時不見有道則臻降岐匪匹儀舜為鄰三舉酒河清沔彼涇瀆澄明鑑如清應寶運光涵帝居洞分沈璧徹見游魚聖祚無極神休偉與四舉酒白龜稽彼靈物允昭聖皇浮石可躡巢蓮益光金方正色介族殊祥信書永耀帝德無疆五舉酒瑞麥芃芃嘉麥擢秀分岐甘露夕灑惠風晨吹良農告瑞循吏稱奇歸美英主折而貢之羣臣初舉酒畢作化成天下軒昊方同德成康粗比肩素風惟普暢皇道本無偏陰魄重輪滿陽精五色圓要荒咸率服卓越聖功全聖德比陶唐千年祚運昌茂功雖不宰鴻業自無疆極塞成清謐齊民益阜康文明同日月遐邇仰輝光六變蕩蕩無私世巍巍至聖君山河分國寶日月耀人文厭浥凝甘露輪囷吐慶雲正聲兼大雅洋溢應南薰鴻範合彝倫調元四序均歲功天吏正御苑物華新底貢陳方物來賓列遠人奉常呈九奏嘉貺動穹旻大君隆至化興運契千齡覲禮俄班瑞夷賨盡實庭成文調露樂奉聖拱辰星舞佾方更進朝陽上楚萍禮樂昭王業寰區致太平革車停北狩雲稼屢西成國有詳延詔鄉聞講誦聲日華融五色遐邇仰文明亭障戢干戈人心浹太和務農登寶穀獵俊設雲羅儀鳳書良史祥麟載雅歌嘉辰資宴喜星拱辨冠古耀鴻徽深仁及隱微二南江漢詠九奏鳳凰飛設虡羅鐘律盈庭列舞衣文明資厚德怡懌兆民歸再舉酒畢威加海內革輅征汾晉隳城比燎毛桓桓勗軍旅將將御英豪神武誠無敵天威詎可逃王師宣利澤霈若沃春膏振萬方明德疾徐咸可觀鏗鏘動金奏蹈厲總朱干夾進昭威武申嚴警宴安守方推猛士當用鶡為冠六變宣榭始觀兵桓桓稱鼓行一戎期大定載纘議徂征善政從師律神功冀武成勗哉勤誓衆王業自經營聲教方柔遠甌閩禮可招獻圖連日際歸國象江潮撫運重熙盛提封萬里遙還同有虞氏文德格三苗南暨宣皇化東吳奉乃神舞干方耀德執玉自來賓巢伯朝丹陛韓侯覲紫宸古今歸一揆懷遠道彌新遺俗續陶唐來蘇徯聖皇布昭湯弔伐恢復漢封疆金鉞申戡剪朱干示發揚宜哉七德頌千載播洋洋乃眷嘗西顧偏師暫首征靈旗方直指獷俗自亡精禹𧜛終馴致堯封漸化成不須嚴尉候於廓海彌清干戚有司傳威容著凱旋象成王業盛役輟武功全兵寢西郊閲書惟北闕縣聖神膺景命卜世萬斯年景德中朝會一十四首皇帝升坐隆安金奏在庭羣后在位天威煌煌嚮明負扆高拱穆清辨冕端委盛德日新禮容有煒公卿入門正安萬邦來同九賓在位奉璋薦紳陟降庭止文思安安威儀棣棣臣哉鄰哉介爾蕃祉上壽和安天威煌煌山龍采章庭實旅百上公奉觴拱揖羣后端委垂裳永錫難老萬壽無疆皇帝初舉酒祥麟帝圖昌二獸效祥雙角共抵示武不傷四靈為畜玄枵耀芒公族信厚元元阜康再舉酒丹鳳矯矯長離振羽來儀和音中律藻翰揚輝珍符沓至品物攸宜至德玄感受天之祺三舉酒河清德水湯湯發源靈長皎鑒澄徹千年效祥積厚流濕資生阜昌朝宗潤下善利無疆羣臣舉酒正安思皇多士靖恭著位鳴玉飛緌鏘鏘濟濟宴有折俎以示慈惠罔敢不祗福祿來暨金奏在庭有酒斯旨顒顒卬卬嚮明負扆湛湛露斯式宴以喜佩玉蘂兮罔不由禮酒以成禮樂以侑食露湛朝陽星環紫極淑慎爾容既飽以德進退周旋威儀抑抑初舉酒畢盛德升聞八佾具呈萬舞有奕既以象功又以觀德進旅退旅執籥秉翟至化懷柔遠人來格閶闔天開羣后在位設業設虡庭燎晰晰斧扆當陽虎賁夾陛舞之蹈之四隩來暨再舉酒畢天下大定武功既成綴兆有翼以節八音以象七德俁俁蹲蹲朱干玉戚發揚蹈厲其儀不忒偃伯靈臺功成作樂以昭德容以清戎索萬邦會同邪慝銷鑠盡善盡美侔彼韶簫降坐隆安被袞當陽穆穆皇皇擊石拊石頌聲揚揚和樂優洽終然允臧禮成而退荷天百祥大中祥符朝會五首皇帝舉酒醴泉觱沸檻泉寒流清泚地不愛寶其旨如醴上善至柔靈休所啓利澤無疆允資岱禮再舉酒神芝彼茁者芝茂英煌煌敷秀喬嶽實繁其房適符修貢封巒允臧永言登薦抑惟舊章三舉酒慶雲惟帝佑德卿雲發祥紛紛郁郁五色成章奉日逾麗回風載翔歌薦郊廟播厥無疆四舉酒靈鶴玄文申錫嘉祥紹至偉茲胎禽羽族之異翻翰來儀徘徊嘹唳祚聖儲休聿昭天意五舉酒瑞木天生五材木曰曲直維帝順天厚其生植連理效祥成文表德總萃坤珍永光祕刻熙寧中朝會三首皇帝初舉酒慶雲乾坤順夷皇有嘉德爰施慶雲承日五色輪囷下乘萬物皆飾惟天祚休長彼無極再舉酒嘉禾彼美嘉禾一莖九穗農疇告祥史牒書瑞擊壤歡歌如京委積留獻春種昭錫善類三舉酒靈芝皇仁溥博品物蕃滋慶祥回復秀發神芝靈華雙舉連葉四施披圖按牒永享純禧元符大朝會三首皇帝初舉酒靈芝嘉瑞降臨應我皇德燁燁神芝不根而植春秋三秀晝夜一色物播詩歌聲被金石再舉酒壽星倬彼星象於昭于天維南有極離丙之躔既明且大應聖乘乾誕受景福億萬斯年三舉酒甘露泫泫零露雲英醴溢和氣凝津流甘委白飴泛泮林珠聯竹柏天不愛道聖功允格哲宗傳受國寶三首與大朝會兼用永昌於穆我王繼序不忘明昭上帝上帝是皇長發其祥惠我無疆受命于天既壽永昌神光惟皇上德伊嘏我王將受厥明載錫之光於昭于天曄曄煌煌緝熙欽止其永無疆翔鶴彼鳴在陰亦白其羽聲聞于天來集斯所勉勉我王咸遂厥宇播于異物受天多祜紹興朝會十三首皇帝升坐乾安鈎陳肅列金奏充庭顒卬南面如日之升垂衣拱手治無能名順履獻歲大安大榮公卿入門正安升降同天子當陽臣工率職流水朝宗衆星拱極環佩鏘鏘威儀抑抑上下交欣同心同德上公上壽和安八音克諧萬舞有奕上公奉觴率茲百辟聲效呼嵩祝聖人壽億載萬年天長地久皇帝初舉酒瑞木成文厚地效珍嘉木紀瑞匪刻匪雕具文見意三登太平允協聖治詩雅詠歌有光既醉再舉酒滄海澄清百谷王符聖治不揚波效殊祉德淪淵滄海清應千秋五行三舉酒瑞粟呈祥至治發聞惟馨香播厥百穀臻穰穰農夫之慶歲其有禾易長畝盈倉箱時和物阜粟滋茂嘉生駢穗來呈祥自今以始大豐美行旅不用齎餱糧羣臣酒行正安羣公卿士咸造在庭式燕以衎思均露零穆穆明明於斯為盛歸美報上一人有慶明明天子萬福來同嘉賓式燕曷不肅雍燕以示慈式禮莫愆樂胥君子容止可觀酒一行文舞帝德誕敷銷爍羣慝近悅遠來惟聖時克玉振金聲治功興起韶簫象之盡善盡美文物以紀藻色以明禮備樂舉遹觀厥成睿知有臨誕敷文德教雨化風洽此四國酒載行武舞用戒不虞誰能去兵師出以律動必有名折彼遐衝布昭聖武和衆安民時惟多助止戈曰武惟聖為能御得其道無敢不庭整我六師稽諸七德不吳不揚有嚴有翼皇帝降坐乾安帝坐熒煌廷紳肅穆對揚天休各恭爾服頌聲洋洋彌文郁郁禮備樂成永膺多福建隆御樓三首南郊回仗駕至樓前采茨高煙升太一明祀達乾坤天仗回嶢闕皇輿入應門簪裳如霧集車騎若雲屯兆庶皆翹首巍巍萬乘尊升坐隆安禋祀畢圓丘嘉辰慶澤流天儀臨觀魏盛禮藹風猷洋溢歡聲動氛氳瑞氣浮上穹垂眷佑邦國擁鴻休降坐隆安華纓就列左衽來王帝儀炳煥大樂鏗鏘禮成嶢闕言旋未央一人有慶萬壽無疆咸平御樓四首采茨禮成于郊迎日之至時乘六龍天旋象魏端門九重虎賁萬騎四夷來王羣后輯瑞索扇隆安應門有翼羽衛斯陳山龍袞冕律度聲身峨峨奉璋肅肅九賓清明在躬志氣如神升坐隆安圜丘類上帝六變降天神禋燔禮云畢仗衛肅以陳天顏瞻咫尺王澤熙陽春玉帛臻禹會動植霑堯仁降坐隆安肆眚云畢淳熙溥將雷雨麗澤雲物效祥禮容濟濟天威皇皇大賚四海富壽無疆咸平籍田回仗御樓二首采茨農皇既祀禮畢躬耕商輅旋軫周頌騰聲觀魏將陟服御爰更輿人瞻仰如日之明升坐隆安應門斯御雉扇爰開人瞻日月澤動雲雷同風三代均禧九垓歡心允洽時詠康哉乾興御樓二首升坐隆安夾鐘紀月初吉在辰眚災流慶布德推仁采章震耀典禮具陳茂昭丕貺永庇斯民降坐隆安皇衢赫敞黼坐穹崇華纓在列嚴令發中王制巨麗寶瑞豐融均禧綿𧜛萬壽無窮紹興登門肆赦二首升坐乾安拜况于郊皇哉唐哉熙事休成六騑鼎來天閫以決地垠以開隤祉發祥如登春臺降坐乾安鴻霈普洽言歸端門蕩蕩巍巍旋乾轉坤穆然宣室儲思垂恩於萬斯年敷錫羣元寧宗登門肆赦二首升坐乾安帝饗于郊荷天之休五福敷錫皇明燭幽雲行雨施仁翔德游聖人多男歌頌九州降坐乾安天日清晏朝野靖安三靈答祉萬國騰歡帝命不違王業艱難天子萬年永迪監觀皇帝上尊號一首冊寶入門正安於穆元后天臨紫宸飛緌星拱建羽林芬徽冊是奉鴻名愈新荷茲介祉永永無垠明道元年章獻明肅皇太后朝會十五首皇太后升坐聖安聖母有子重光類禋聖皇事母感極天人百辟在庭九儀具陳禮容之盛萬國咸賓公卿入門禮安帝率四海承顏盡恭端闈肅設羣后來同玉佩鏘鳴衣冠有容英韶節步磬管雍雍皇帝上壽酒崇安天子之德形于四方尊親立愛化洽風揚聖母褘衣明君黼裳因時獻壽克盛朝章上壽福安盛禮煌煌六衣有光千官在位百福稱觴坤德慈仁邦斯淑祥如山之壽佑聖無疆皇太后初舉酒玉芝燁燁靈芝生于殿闈照映華拱紛敷玉蕤感召元和光符聖期祥篇協吉百福咸宜再舉酒壽星現彼南極昭然瑞文騰光丙位薦壽中宸太史駢奏升歌有聞軒宮就養億萬斯春三舉酒奇木連理王化無外坤珍效靈旁枝內附直幹來並羣分非一祺祥紹登至誠攸感海縣斯寧羣臣酒行禮安肅肅臨下有威有容循循事上惟信惟忠盛禮興樂示慈訓恭君臣協吉惟道之從湛湛零露晞于載陽我有旨酒羣臣樂康既飲以德亦圖爾良永言修輔用協天常禮均孝慈樂合韶武至德光矣鴻恩亦溥上下和濟華夷樂湑盞斝三行盛儀斯舉酒一行畢作厚德無疆之舞堯母之聖放勛為子同心協謀柔遠能邇以德康俗以文興治斯焉象功罔不昭濟至矣坤元道符惟聖就養宸極助隆善政翟籥紛舉笙鏞協應翺翔有容表德之盛酒再行四海會同之舞七德之舞四朝用康有如姬姒助集周邦威克厥愛居安不忘風旋山立濟濟皇皇左秉朱干右揮玉戚以象武綴以明皇德天子榮養羣臣述職四夷賓附罔不承式降坐聖安長樂居尊盛容有煒文王事親萬國歸美朝會之則邦家之紀受福于天克昭隆禮治平皇太后皇后冊寶三首皇帝升坐乾安王化之始治繇內孚時庸作命玉簡金書磬管在庭其縱繹如天臨法扆禮與誠俱太尉等奉冊寶入門正安晬儀臨拱丕命明揚鸞回寶勢鴻貫瑤光禮成樂備德裕名芳肇基王化永懋天祥皇帝降坐乾安衮衣繡裳嚴威肅莊八音具張簨虡龍驤玉簡瑤章金書煌煌壽千萬年與天比長熙寧皇太后冊寶三首出入正安煌煌鳳字玉氣宛延天門崛岉飛驂後先龍簨四合奏鼓淵淵母儀天下何千萬年升坐乾安峨峨繡扆旋佩以登如彼杲日凌天而升玉色下照亹亹繩繩猗歟大孝四海其承降坐乾安皇帝降席流雲四開堯趨舜步下躡天階恭授寶冊翠旄裴回明明純孝鴻釐大來哲宗上太皇太后冊寶五首皇帝升坐乾安大矣孝熙帥民以躬奉承寶冊欽明兩宮萬樂具舉一人肅雍化繇上始四海來同降坐乾安皇帝仁孝總臨萬方褒顯其親日嚴以莊龍衮翼翼玉書煌煌傳之億世休有烈光太皇太后升坐乾安總裁庶政擁佑嗣皇金書玉簡爛其文章衆歌警作管磬將將保安四極降福無疆降坐乾安塗山之德渭涘之祥圖徽寶冊玉色金相管弦燁煜鐘鼓喤喤天之所啓既壽而昌太尉等奉冊寶出入門正安玉車臨御鳳蓋棽麗奉承寶冊彌文盛儀抗聲極律助我孝熙天之所佑萬壽無期紹興十年發皇太后冊寶八首皇帝隨冊寶降殿聖安景祚有開符天昊誕育聖神是崇位號星拱天隨祗嚴冊寶還御慈寧增光舜道中書令奉冊詣皇帝褥位禮安聲樂備陳禮容罔忒相維辟公虔奉玉冊皇則受之慕形於色既壽且康與天無極侍中奉寶詣皇帝褥位禮安祖啓瑤光誕生明聖尊極母儀帝庸作命寶章煌煌導以笙磬還燕慈寧邦家徯慶太傅奉冊寶出門聖安肅肅東朝帝隆孝治猗歟丕稱寶冊斯備皇扉四闢導迎慶瑞德邁太任有周卜世太傅奉冊寶入門聖安靜順坤儀聖神是育懿鑠昭陳鏤文華玉樂奏既備禮儀不瀆導迎善祥翟車歸毣太傅奉冊授提點官禮安孝奉天儀信維休德發越徽音禮文靡忒永保嘉祥時萬時億歸于東朝含飴燕息太傅奉冊授提點官禮安肅雍長樂克篤其慶河洲茂德沙麓啓聖是生睿哲蚤隆丕運欽稱鴻寶永膺天命冊寶升慈寧殿幄聖安禮行東朝樂奏大呂羽衛森陳簪紳式序雲幄邃嚴宏典是舉天子萬年母儀寰宇乾道七年恭上太上皇帝太上皇后尊號十一首冊寶降殿正安元祀介福孰綏孰將歸于尊親孝哉君王載鏤斯牒載琢斯章得名得壽如虞如唐中書令侍中奉冊寶詣殿下正安宗郊斯成交舉典冊汝輔汝弼威儀是力陳于廣庭逮此上日巍巍煌煌烏覩在昔皇帝奉太上皇帝冊寶授太傅用禮安奉太上皇后同儀物陳矣禮樂明矣天子戾止詒爾臣矣陟降維則恭且勤矣茫茫四海德教形矣冊寶出門正安天門九重蕩蕩開徹金支秀華垂紳佩玦或導或陪率履不越注民耳目四表胥悅冊寶入德壽宮門正安禮神頌祇福祿來下不有榮名孰緝伊嘏千乘萬騎魚魚雅雅皇扉洞開鞠躬如也太上皇帝升御坐降同穆穆聖顏安安天步有縟者儀以莫不舉天人和同恩澤洋普億載萬年為衆父父太傅奉太上皇帝冊寶升殿用聖安大哉堯乎南嚮垂裳君哉舜也拜而奉觴繅藉光華鼓鐘鏗鏘三事稽首宋德無疆太傅奉太上皇后冊寶升殿用聖安乾元資始坤元資生允也聖德同實異名春王三朝典冊並行咨爾上公相儀以登皇帝從太上皇后冊寶詣宮中用正安維冊伊何鏤玉垂鴻維寶伊何範金鈕龍翊以御間以笙鏞誰敢不恭天子實從太上皇后出閣升御坐坤安降同帝膺永福功靡專有既尊聖父亦燕壽母怡怡在宮大典時受彤管紀之天長地久內侍官舉太上皇后冊詣讀冊位用聖安斂福于郊逢時之泰揭名日月侔德覆載自我作古域中有大永言保之眉壽無害淳熙二年發太上皇帝太上皇后冊寶十一首冊寶降殿正安高明者乾博厚者坤以清以寧資始資生壽胡可度德胡可評願言從欲誕受強名中書令侍中奉冊寶詣殿下正安受命既長福祿既康如日之升如月之常追琢其章金玉其相君子萬年保其家邦皇帝奉太上皇帝冊寶授太傅禮安奉太上皇后同翠華之旗靈鼉之鼓陳于廣宇相我盛舉來汝公傅肅乃儀矩毋愆于素以篤多祜冊寶出門正安蚴蟉青龍婉嬗象輿其載伊何煌煌金書乃由端門乃行康衢于以榮親振古所無冊寶入德壽宮門正安惟天為大其德曰誠惟堯則之其性曰仁乃文乃武得壽得名於萬斯年以莫不增太上皇帝升御坐乾安降同天行惟健天步惟安聖子中立臣工四環民無能名威不違顏宋德宜頌漢儀可刪太傅奉太上皇帝冊升殿聖安奉寶同天畀遐福允彰父慈維昔曠典我能舉之徐爾陟降敬爾威儀申錫無疆永言保之太傅奉太上皇后冊寶升殿聖安乾健坤從陽剛陰相逮茲受祉允也並况虡業在下儀物在上咨時三公執事無曠皇帝從太上皇后冊寶詣宮中用正安丕顯文王之德之純亦有太姒式揚徽音維冊維寶乃玉乃金伊誰從之一人事親太上皇后出閣升御坐坤安降同重翟出房褘衣被躬委委他他河潤山容聖皇臨軒聖母在宮並受鴻名與天無窮內侍官舉太上皇后冊詣讀冊位用聖安舉寶同珉玉玢豳裊蹄精良既刻厥文亦鑄之章象德維何至靜而方輔我光堯萬壽無疆淳熙十二年加上太上皇帝太上皇后尊號十一首大慶殿發冊寶降殿正安維天蓋高維地克承父尊母親天地難名疆名廣大建號安榮衍登壽嘏闡繹皇明中書令侍中奉太上皇帝冊寶太上皇后冊寶詣殿下用正安二儀同尊兩耀齊光巍巍煌煌不顯亦彰實茂號榮玉振金相於萬斯年既壽且昌皇帝奉太上皇帝冊寶授太傅太上皇后冊寶同我尊我親承天之祉壽名兼美家國咸喜公傅秉禮寶冊有煒惟千萬祀令聞不已冊寶出門正安羽衛有嚴寶書有輝昭衍尊名鋪張上儀出其端闈由于康逵比屋延瞻歌之舞之德壽宮冊寶入殿門正安南山之鞏皇壽無窮太極之尊皇名是崇奉茲寶冊于皇之宮皇則受之於昭盛容太上皇帝出宮升御坐乾安降坐同聖明太上天子有尊玉坐高拱慈顏睟溫震禁嘉承朝辨昈分盛禮縟典邃古未聞太傅中書令侍中奉太上皇帝冊寶升殿用聖安天錫伊嘏地效其珍誕作寶典奉于尊親爾公爾相爾恭爾寅協舉令儀遹臻厥成太傅中書令侍中奉太上皇后冊寶升殿用聖安坤載有元乾行是順施生萬彙厥德彌盛翼翼母道贊我皇訓相維羣公奉典斯敬皇帝從太上皇后冊寶詣宮中用正安大矣母慈德備且純思古齊敬佐我皇文明章茂典金玉其音帝親奉之以翼以欽太上皇后出閣升御坐用坤安降坐同天相慈皇慶臻壼闈徽柔內修壽與天齊既承皇歡載覿母儀懿典鴻名永綏多祺內侍舉太上皇后冊寶詣讀冊寶位用聖安有美英瑤於昭祥金為策為章並著徽音德聖而尊備舉彌文億載萬年永輔堯勛
