body:
  text: 宋史卷九十七志第五十河渠七東南諸水下淮郡諸水紹興初以金兵蹂踐淮南猶未退師四年詔燒毀揚州灣頭港口閘泰州薑堰通州白莆堰其餘諸堰並令守臣開決焚毀務要不通敵船又詔宣撫司毀拆真揚堰閘及真州陳公塘無令走入運河以資敵用五年正月詔淮南宣撫司募民開濬瓜洲至淮口運河淺澀之處乾道二年以和州守臣言開鑿姥下河東接大江防捍敵人檢制盜賊六年淮東提舉徐子寅言淮東鹽課全仰河流通快近運河淺澀自揚州灣頭港口至鎮西山光寺前橋𣛀頭計四百八十五丈乞發五千餘卒開濬從之七年二月詔令淮南漕臣自洪澤至龜山淺澀之處如法開撩淳熙三年四月詔築泰州月堰以遏潮水從守臣張子正請也八年提舉淮南東路常平茶鹽趙伯昌言通州楚州沿海舊有捍海堰東距大海北接鹽城袤一百四十二里始自唐黜陟使李承實所建遮護民田屏蔽鹽竈其功甚大歷時既久頽圮不存至本朝天聖改元范仲淹為泰州西溪鹽官日風潮泛溢淹沒田産毀壞亭竈有請于朝調四萬餘夫修築三旬畢工遂使海瀕沮洳潟鹵之地化為良田民得奠居至今賴之自後寖失修治才遇風潮怒盛即有衝決之患自宣和紹興以來屢被其害阡陌洗蕩廬舍漂流人畜喪亡不可勝數每一修築必請朝廷大興工役然後可辦望令淮東常平茶鹽司今後捍海堰如有塌損隨時修葺務要堅固可以經久從之九年淮南漕臣錢沖之言真州之東二十里有陳公塘乃漢陳登濬源為塘用救旱飢大中祥符間江淮制置發運置司真州歲藉此塘灌注長河流通漕運其塘周回百里東西北三面倚山為岸其南帶東則係前人築疊成堤以受啓閉廢壞歲久見有古來基趾可以修築為旱乾溉田之備凡諸場鹽綱糧食漕運使命往還舟艦皆仰之以通濟其利甚博本司自發卒貼築周回塘岸建置斗門石各一所乞於揚子縣尉階銜內帶兼主管陳公塘六字或有損壞隨時補築庶幾久遠責有所歸十二年和州守臣請於千秋澗置斗門以防麻澧湖水泄入大江遇歲旱灌溉田疇實為民利十四年揚州守臣熊飛言揚州運河惟藉瓜洲真州兩閘瀦積今河水走泄緣瓜洲上中二閘久不修治獨潮閘一坐轉運提鹽及本州共行修整然迫近江潮水勢衝激易致損壞真州二閘亦復損漏令有司葺理上下二閘以防走泄從之紹熙五年淮東提舉陳損之言高郵楚州之間陂湖渺漫茭葑彌滿宜創立堤堰以為瀦泄庶幾水不至於泛溢旱不至於乾涸乞興築自揚州江都縣至楚州淮陰縣三百六十里又自高郵興化至鹽城縣二百四十里其隄岸傍開一新河以通舟船仍存舊堤以捍風浪栽柳十餘萬株數年後隄岸亦牢其木亦可備修補之用兼揚州柴墟鎮舊有隄閘乃泰州泄水之處其閘壞久亦於此創立斗門西引盱眙天長以來衆湖之水起自揚州江都經由高郵及楚州寶應山陽北至淮陰西達于淮又自高郵入興化東至鹽城而極於海又泰州海陵南至揚州泰興而徹于江共為石十三斗門七乞以紹熙堰為名鑱諸堅石淮田多沮洳因損之築隄捍之得良田數百萬頃奏聞除直祕閣淮東轉運判官浙江通大海日受兩潮梁開平中錢武肅王始築捍海塘在候潮門外潮水晝夜衝激版築不就因命強弩數百以射潮頭又致禱胥山祠既而潮避錢塘東擊西陵遂造竹器積巨石植以大木堤岸既固民居乃奠逮宋大中祥符五年杭州言浙江擊西北岸益壞稍逼州城居民危之即遣使者同知杭州戚綸轉運使陳堯佐畫防捍之策綸等因率兵力籍梢楗以護其衝七年綸等既罷去發運使李溥內供奉官盧守勤經度以為非便請復用錢氏舊法實石於竹籠倚疊為岸固以樁木環亙可七里斬材役工凡數百萬踰年乃成而鈎末壁立以捍潮勢雖湍湧數丈不能為害至景祐中以浙江石塘積久不治人患墊溺工部郎中張夏出使因置捍江兵士五指揮專採石修塘隨損隨治衆賴以安邦人為之立祠朝廷嘉其功封寧江侯及高宗紹興末以錢塘石岸毀裂潮水漂漲民不安居令轉運司同臨安府修築孝宗乾道九年錢塘廟子灣一帶石岸復毀於怒潮詔令臨安府築填江岸增砌石塘淳熙改元復令有司自今江岸衝損以乾道修治為法理宗寶祐二年十二月監察御史兼崇政殿説書陳大方言江潮侵齧堤岸乞戒飭殿步兩司帥臣同天府守臣措置修築留心任責或有潰決咎有攸歸三年十一月監察御史兼崇政殿説書李衢言國家駐蹕錢塘今踰十紀惟是浙江東接海門胥濤澎湃稍越故道則衝齧堤岸蕩析民居前後不知其幾慶曆中造捍江五指揮兵士每指揮以四百人為額今所管才三百人乞下臨安府拘收不許占破及從本府收買樁石沿江置場樁管不得移易他用仍選武臣一人習於修江者隨其資格或以副將或以路分鈐轄繫銜專一鈐束修江軍兵值有摧損隨即修補或不勝任以致江潮衝損堤岸即與責罰臨安西湖周回三十里源出於武林泉錢氏有國始置撩湖兵士千人專一開濬至宋以來稍廢不治水涸草生漸成葑田元祐中知杭州蘇軾奏謂杭之為州本江海故地水泉鹹苦居民零落自唐李泌始引湖水作六井然後民足於水井邑日富百萬生聚待此而食今湖狹水淺六井盡壞若二十年後盡為葑田則舉城之人復飲鹹水其勢必耗散又放水溉田瀕湖千頃可無凶歲今雖不及千頃而下湖數十里間茭菱穀米所獲不資又西湖深闊則運河可以取足於湖水若湖水不足則必取足於江潮潮之所過泥沙渾濁一石五斗不出三載輒調兵夫十餘萬開濬又天下酒官之盛如杭歲課二十餘萬緡而水泉之用仰給於湖若湖漸淺狹少不應溝則當勞人遠取山泉歲不下二十萬工因請降度牒減價出賣募民開治禁自今不得請射侵占種植及臠葑為界以新舊菱蕩課利錢送錢塘縣收掌謂之開湖司公使庫以備逐年雇人開葑撩淺縣尉以管勾開湖司公事繫銜軾既開湖因積葑草為堤相去數里橫跨南北兩山夾道植柳林希榜曰蘇公堤行人便之因為軾立祠堤上紹興九年以張澄奏請命臨安府招置廂軍兵士二百人委錢塘縣尉兼領其事專一濬湖若包占種田沃以糞土重置于法十九年守臣湯鵬舉奏請重開乾道五年守臣周淙言西湖水面唯務深闊不容填溢並引入城內諸井一城汲用尤在涓潔舊招軍士止有三十餘人今宜增置撩湖軍兵以百人為額專一開撩或有種植茭菱因而包占增疊堤岸坐以違制九年臨安守臣言西湖冒佃侵多葑菱蔓延西南一帶已成平陸而瀕湖之民每以葑草圍裹種植荷花駸駸不已恐數十年後西湖遂廢將如越之鑑湖不可復矣乞一切芟除務令淨盡禁約居民不得再有圍裹從之臨安運河在城中者日納潮水沙泥渾濁一汛一淤比屋之民委棄草壤因循填塞元祐中守臣蘇軾奏謂熙寧中通判杭州時父老皆云苦運河淤塞率三五年常一開濬不獨勞役兵民而運河自州前至北郭穿闤闠中蓋十四五里每將興工市肆洶動公私騷然自胥吏壕寨兵級等皆能恐喝人戶或云當於某處置土某處過泥水則居者皆有失業之憂既得重賂又轉而之他及工役既畢則房廊邸舍作踐狼籍園圃隙地例成丘阜積雨蕩濯復入河中居民患厭未易悉數若三五年失開則公私壅滯以尺寸水行數百斛舟人牛力盡跬步千里雖監司使命有數日不能出郭者詢其所以頻開屢塞之由皆云龍山浙江兩閘泥沙渾濁積日稍久便及四五尺其勢當然不足怪也尋剗刷捍江兵士及諸色廂軍得一千人七月之間開濬茆山鹽橋二河各十餘里皆有水八尺自是公私舟船通利三十年以來開河未有若此深快者然潮水日至淤塞猶昔則三五年間前功復棄今於鈐轄司前置一閘每遇潮上則暫閉此閘候潮平水清復開則河過闤闠中者永無潮水淤塞開淘騷擾之患詔從其請民甚便之紹興三年十一月宰臣奏開修運河淺澀帝曰可發旁郡廂軍壯城捍江之兵至於廩給之費則不當吝宰臣朱勝非等曰開河非今急務而餽餉艱難為害甚大時方盛寒役者良苦臨流居人侵塞河道者悉當遷避至於畚閘所經沙泥所積當預空其處則居人及富家以僦屋取資者皆非便恐議者以為言帝曰禹卑宮室而盡力於溝洫浮言何恤焉八年又命守臣張澄發廂軍壯城兵千人開濬運河堙塞以通往來舟楫隆興二年守臣吳芾言城𩹉運河先已措置北梅家橋仁和倉斜橋三所作壩取西湖六處水口通流灌入府河積水至望仙橋以南至都亭驛一帶河道地勢自昔高峻今欲先於望仙橋城外保安閘兩頭作壩却於竹車門河南開掘水道車戽運水引入保安門通流入城遂自望仙橋以南開至都亭驛橋可以通徹積水以備緩急計用工四萬從之乾道三年六月知荊南府王炎言臨安居民繁夥河港堙塞雖屢開導緣裁減工費不能迄功臣嘗措置開河錢十萬緡乞候農暇特詔有司用此專充開河支費庶幾河渠復通公私為利上俞其請四年守臣周淙出公帑錢招集遊民開濬城內外河疏通淤塞人以治辦稱之淳熙二年兩浙漕臣趙磻老言臨安府長安閘至許村巡檢司一帶漕河淺澀請出錢米發兩岸人戶出力開濬又言欲於通江橋置板閘遇城中河水淺涸啓板納潮繼即下板固護水勢不得通舟若河水不乏即收閘板聽舟楫往還為便七年守臣吳淵言萬松嶺兩旁古渠多被權勢及百司公吏之家造屋侵占及內寨前石橋都亭驛橋南北河道居民多拋糞土瓦礫以致填塞流水不通今欲分委兩通判監督地分廂巡逐時點檢勿令侵占並拋揚糞土秩滿若不淤塞各減一年磨勘違展一年以示勸懲十四年七月不雨臣僚言竊見奉口至北新橋三十六里斷港絶潢莫此為甚今宜開濬使通客船以平穀直從之鹽官海水嘉定十二年臣僚言鹽官去海三十餘里舊無海患縣以鹽竈頗盛課利易登去歲海水泛漲湍激橫衝沙岸每一潰裂常數十丈日復一日浸入鹵地蘆洲港瀆蕩為一壑今聞潮勢深入逼近居民萬一春水驟漲怒濤奔湧海風佐之則呼吸蕩出百里之民寧不俱葬魚腹乎況京畿赤縣密邇都城內有二十五里塘直通長安閘上徹臨平下接崇德漕運往來客船絡繹兩岸田畝無非沃壤若海水徑入于塘不惟民田有鹹水淹沒之患而𩹉河堤岸亦將有潰裂之憂乞下浙西諸司條具築捺之策務使捍堤堅壯土脈充實不為怒潮所衝從之十五年都省言鹽官縣海塘衝決命浙西提舉劉垕專任其事既而垕言縣東接海鹽西距仁和北抵崇德德清境連平江嘉興湖州南瀕大海元與縣治相去四十餘里數年以來水失故道早晚兩潮奔衝向北遂致縣南四十餘里盡淪為海近縣之南元有捍海古塘亙二十里今東西兩段並已淪毀侵入縣兩旁又各三四里止存中間古塘十餘里萬一水勢衝激不已不惟鹽官一縣不可復存而向北地勢卑下所慮鹹流入蘇秀湖三州等處則田畝不可種植大為利害詳今日之患大概有二一曰陸地淪毀二曰鹹潮泛溢陸地淪毀者固無力可施鹹潮泛溢者乃因捍海古塘衝損遇大潮必盤越流注北向宜築土塘以捍鹹潮所築塘基址南北各有兩處在縣東近南則為六十里鹹塘近北則為袁花塘在縣西近南亦曰鹹塘近北則為淡塘亦嘗驗兩處土色虛實則袁花塘淡塘差勝鹹塘且各近𩹉未至與海潮為敵勢當東就袁花塘西就淡塘修築則可以禦縣東鹹潮盤溢之患其縣西一帶淡塘連縣治左右共五十餘里合先修築兼縣南去海一里餘幸而古塘尚存縣治民居盡在其中未可棄之度外今將見管樁石就古塘稍加工築疊一里許為防護縣治之計其縣東民戶日築六十里鹹塘萬一又為海潮衝損當計用樁木修築袁花塘以捍之上以為然明州水紹興五年明州守臣李光奏明越陂湖專溉農田自慶曆中始有盜湖為田者三司使切責漕臣嚴立法禁宣和以來王仲薿守越樓虉守明創為應奉始廢湖為田自是歲有水旱之患乞行廢罷盡復為湖如江東西之墟田蘇秀之圍田皆當講究興復詔逐路轉運司相度聞奏乾道五年守臣張津言東錢湖容受七十二溪方圓廣闊八百頃傍山為固疊石為塘八十里自唐天寶三年縣令陸南金開廣之國朝天禧元年郡守李夷庚重修之中有四閘七堰凡遇旱涸開閘放水溉田五十萬畝比因豪民於湖塘淺岸漸次包占種植菱荷障塞湖水紹興十八年雖曾檢舉約束盡罷請佃歲久菱根蔓延滲塞水脈致妨蓄水兼塘岸間有低塌處若不淘濬修築不惟寖失水利兼恐塘埂相繼摧毀乞候農隙趁時開鑿因得土修治埂岸實為兩便從之鄞縣水嘉定十四年慶元府言鄞縣水自四明諸山溪澗會至他山置堰小涇下江入河所入上河之水專溉民田其利甚博比因淤塞堰上山觜少有溪水流入上河自春徂夏不雨令官吏發卒開淘沙觜及濬港汊又於堰上壘疊沙石逼使溪流盡入上河其他山水入府城南門一帶有碶閘三所曰烏金曰積瀆曰行春烏金碶又名上水碶昔因倒損遂捺為壩以致淤沙在河或遇溪流聚湧時復衝倒所捺壩走泄水源行春橋又名南石碶碶面石板之下歲久損壞空虛每受潮水演溢奔突出於石縫以致鹹潮袞入上河其縣東管有道士堰至白鶴橋一帶河港堙塞又有朱賴堰與行春等碶相連堰下江流通徹大海今春闕雨上河乾淺堰身塌損以致鹹潮透入上河使農民不敢車注溉田乞修砌上水烏金諸處壩堰仍選清強能幹職官專一提督潤州水紹興七年兩浙轉運使向子諲言鎮江府呂城夾岡形勢高仰因春夏不雨官漕艱勤尋遣官屬李澗詢究練湖本末始知此湖在唐永泰間已廢而復興今堤岸弛禁致有侵佃冒決故湖水不能瀦蓄舟楫不通公私告病若夏秋霖潦則丹陽金壇延陵一帶良田亦被淹沒臣已令丹陽知縣朱穆等增置二斗門一石及修補隄防盡復舊迹庶為永久之利乾道七年以臣僚言丹陽練湖幅員四十里納長山諸水漕渠資之故古語云湖水寸渠水尺在唐之禁甚嚴盜決者罪比殺人本朝寖緩其禁以惠民然修築嚴甚春夏多雨之際瀦蓄盈滿雖秋無雨漕渠或淺但泄湖水一寸則為河一尺矣兵變以後多廢不治堤岸圮闕不能貯水強家因而專利耕以為田遂致淤澱歲月既久其害滋廣望責長吏濬治堙塞立為盜決侵耕之法著於令庶幾練湖漸復其舊民田獲灌溉之利漕渠無淺涸之患詔兩浙漕臣沈度專一措置修築慶元五年兩浙轉運浙西提舉言以鎮江府守臣重修呂城兩閘畢再造一新閘以固隄防庶為便利從之浙西運河自臨安府北郭務至鎮江江口閘六百四十一里淳熙七年帝因輔臣奏金使往來事曰運河有淺狹處可令守臣以漸開濬庶不擾民至十一年冬臣僚言運河之濬自北關至秀州杉青各有堰閘自可瀦水惟沿河上塘有小堰數處積久低陷無以防遏水勢當以時加修治兼沿河下岸涇港極多其水入長水塘海鹽塘華亭塘由六里堰下私港散漫悉入江湖以私港深運河淺也若修固運河下岸一帶涇港自無走泄又自秀州杉青至平江府盤門在太湖之際與湖水相連而平江閶門至常州有楓橋許墅烏角溪新安溪將軍堰亦各通太湖如遇西風湖水由港而入皆不必濬惟無錫五瀉閘損壞纍年常是開堰徹底放舟更江陰軍河港勢低水易走泄若從舊修築不獨瀦水可以通舟而無錫晉陵間所有陽湖亦當積水而四傍田畝皆無旱暵之患獨自常州至丹陽縣地勢高仰雖有奔牛呂城二閘別無湖港瀦水自丹陽至鎮江地形尤高雖有練湖緣湖水日淺不能濟遠雨晴未幾便覺乾涸運河淺狹莫此為甚所當先濬上以為然至嘉定間臣僚又言國家駐蹕錢塘綱運糧餉仰給諸道所繫不輕水運之程自大江而下至鎮江則入閘經行運河如履平地川廣巨艦直抵都城蓋甚便也比年以來鎮江閘口河道淤塞不復通舟乞令漕臣同淮東總領及本府守臣公共措置開撩越州水鑑湖之廣周回三百五十八里環山三十六源自漢永和五年會稽太守馬臻始築塘溉田九千餘頃至宋初八百年間民受其利歲月寖遠濬治不時日久堙廢瀕湖之民侵耕為田熙寧中盜為田九百餘頃嘗遣廬州觀察推官江衍經度其宜凡為湖田者兩存之立碑石為界內者為田外者為湖政和末為郡守者務為進奉之計遂廢湖為田賦輸京師自時姦民私占為田益衆湖之存者亡幾矣紹興二十九年十月帝諭樞密院事王綸曰往年宰執嘗欲盡乾鑑湖云可得十萬斛米朕謂若遇歲旱無湖水引灌則所損未必不過之凡事須遠慮可也隆興元年紹興府守臣吳芾言鑑湖自江衍所立碑石之外今為民田者又一百六十五頃湖盡堙廢今欲發四百九十萬工於農隙接續開鑿又移壯城百人以備撩漉濬治差強幹使臣一人以巡轄鑑湖隄岸為名二年芾又言修鑑湖全藉斗門堰閘蓄水都泗堰閘尤為要害凡遇綱運及監司使命舟船經過堰兵避免車拽必欲開閘通放以致啓閉無時失泄湖水且都泗堰因高麗使往來宣和間方置閘今乞廢罷其後芾為刑部侍郎復奏自開鑑湖溉廢田二百七十頃復湖之舊又修治斗門堰閘十三所夏秋以來時雨雖多亦無泛溢之患民田九千餘頃悉獲倍收其為利較然可見乞將江衍原立禁牌別定界至則隄岸自然牢固永無盜決之虞紹興初高宗次越以上虞縣梁湖堰東運河淺澀令發六千五百餘工委本縣令佐監督濬治既而都省言餘姚縣境內運河淺澀壩閘隳壞阻滯綱運遂命漕臣發一萬七千餘卒自都泗堰至曹娥塔橋開撩河身夾塘詔漕司給錢米蕭山縣西興鎮通江兩閘近為江沙壅塞舟楫不通乾道三年守臣言募人自西興至大江疏沙河二十里並濬閘𩹉運河十三里通便綱運民旅皆利復恐潮水不定復有填淤且通江六堰綱運至多宜差注指使一人專以開撩西興沙河繫銜及發捍江兵士五十名專充開撩沙浦不得雜役仍從本府起立營屋居之常州水隆興二年常州守臣劉唐稽言申利二港上自運河發流經營回復至下流析為二道一自利港一自申港以達于江緣江口每日潮汐帶沙填塞上流遊泥淤積流泄不通而申港又以江陰軍釘立標楬拘攔稅船每潮來則沙泥為木標所壅淤塞益甚今若相度開此二河但下流申利二港並隸江陰軍若議定深闊丈尺各於本界開淘庶協力皆辦又孟瀆一港在奔牛鎮西唐孟簡所開並宜興縣界沿湖舊百瀆皆通宜興之水藉以疏泄近歲阻於吳江石塘流行不快而沿湖河港所謂百瀆存者無幾今若開通委為公私之便至乾道二年以漕臣薑詵等請造蔡涇閘及開申港上流橫石次濬利港以泄水勢六年三月又命兩浙運副劉敏士浙西提舉芮輝於新涇塘置閘堰以捍海潮楊家港東開河置閘通行鹽船仍差閘官一人兵級十五人以時啓閉挑撩五月又以兩浙轉運司並常州守臣言填築五瀉上下兩閘及修築閘𩹉堤岸仍於郭瀆港口舜郎廟側水聚會處築捺硬壩以防走泄運水委無錫知縣主掌鑰匣遇水深六尺方許開閘通放客舟淳熙五年以漕臣陳峴言於十月募工開濬無錫縣以西橫林小井及奔牛呂城一帶地高水淺之處以通漕舟九年知常州章沖奏常州東北曰深港利港黃田港夏港五斗港其西曰竈子港孟瀆泰伯瀆烈塘江陰之東曰趙港白沙港石頭港陳港蔡港私港令節港皆古人開導以為溉田無窮之利者也今所在堙塞不能灌溉臣嘗講求其説抑欲不勞民不費財而漕渠旱不乾水不溢用力省而見功速可以為悠久之利者在州之西南曰白鶴溪自金壇縣洮湖而下今淺狹特七十餘里若用工濬治則漕渠一帶無乾涸之患其南曰西蠡河自宜興太湖而下止開濬二十餘里若更令深遠則太湖水來漕渠一百七十餘里可免濬治之擾至若望亭堰閘置於唐之至德而徹於本朝之嘉祐至元祐七年復置未幾又毀之臣謂設此堰閘有三利焉陽羡諸瀆之水奔趨而下有以節之則當潦歲平江三邑必無下流淫溢之患一也自常州至望亭一百三十五里運河一有所節則沿河之田旱歲資以灌溉二也每歲冬春之交重綱及使命往來多苦淺涸今啓閉以時足通舟楫後免車畝灌注之勞三也詔令相度開濬嘉泰元年守臣李王玉言州境北邊揚子大江南並太湖東連震澤西據滆湖而漕渠界乎其間漕渠兩傍曰白鶴溪西蠡河南戚氏北戚氏直湖州港通于二湖曰利浦孟瀆烈塘橫河五瀉諸港通于大江而中間又各自為支溝斷汊曲繞參錯不以數計水利之源多於他郡而常苦易旱之患何哉臣嘗詢訪其故漕渠東起望亭西上呂城一百八十餘里形勢西高東下加以歲久淺淤自河岸至底其深不滿四五尺常年春雨連綿江湖泛漲之時河流忽盈驟減連歲雨澤愆闕江湖退縮渠形尤亢間雖得雨水無所受旋即走泄南入于湖北歸大江東徑注于吳江晴未旬日又復乾涸此其易旱一也至若兩傍諸港如白鶴溪西蠡河直湖烈塘五瀉堰日為沙土淤漲遇潮高水泛之時尚可通行舟楫若值小汐久晴則俱不能通應自餘支溝別港皆已堙塞故雖有江湖之浸不見其利此其易旱二也況漕渠一帶綱運於是經由使客于此往返每遇水澀綱運便阻一入冬月津送使客作埧車水科役百姓不堪其擾豈特溉田缺事而已望委轉運提舉常平官同本州相視漕渠並徹江湖之處如法濬治盡還昔人遺迹及於望亭修建上下二閘固護水源從之升州水乾道五年建康守臣張孝祥言秦淮之水流入府城別為兩派正河自鎮淮新橋直注大江其為青溪自天津橋出柵寨門亦入於江緣柵寨門地近為有力者所得遂築斷青溪水口創為花圃每水流暴至則泛溢浸蕩城內居民尤被其害若訪古而求使青溪直道大江則建康永無水患矣既而汪徹奏於西園依異時河道開濬使水通柵門入從之先是孝祥又言秦淮水三源一自華山由句容一自廬山由溧水一自溧水由赤山湖至府城東南合而為一縈回綿亙三百餘里溪港溝澮之水盡歸焉流上水門由府城入大江舊上下水門展闊自兵變後砌疊稍狹雖便於一時防守實遏水源流通不快兼兩岸居民填築河岸添造屋宇若禁民不許侵占秦淮既復故道則水不泛溢矣又府東門號陳二渡有順聖河正分秦淮之水每遇春夏天雨連綿上源奔湧則分一派之水自南門外直入於江故秦淮無泛濫之患今一半淤塞為田水流不通若不惜數畝之田疏導之以復古迹則其利尤倍其後汪徹言水潦之害大抵緣建康地勢稍低秦淮既泛又大江湍漲其勢湓溢非由水門窄狹居民侵築所致且上水門砌疊處正不可闊闊則春水入城益多自今指定上下水門砌疊處不動夾河居民之屋亦不毀除止去兩岸積壞使河流通快況城中繫行宮東南王方不宜開鑿從之嘉定五年守臣黃度言府境北據大江是為天險上自采石下達瓜步千有餘里共置六渡一曰烈山渡籍于常平司歲有河渡錢額五曰南浦渡龍灣渡東陽渡大城堽渡岡沙渡籍于府司亦有河渡錢額六渡歲為錢萬餘緡歷時最久舟楫廢壞官吏篙工初無廩給民始病濟而官漫不省遂至姦豪冒法別置私渡左右旁午由是官渡濟者絶少乃聽吏卒苛取以充課徒手者猶憚往來而車簷牛馬幾不敢行甚者扼之中流以邀索錢物竊以為南北津渡務在利涉不容簡忽而但求征課臣已為之繕治舟艦選募篙梢使遠處巡檢兼監渡官於諸渡月解錢則例量江面闊狹計物貨重輕斟酌裁減率三之一或四之一自人車牛馬皆有定數雕榜約束不得過收邀阻乞覓裒一歲之入除烈山渡常平錢如額解送其餘諸渡以二分充修船之費而以其餘給官吏篙梢水手食錢令監渡官逐月照數支散有餘則解送府司然後盡絶私渡不使姦民踰禁從之秀州水秀州境內有四湖一曰柘湖二曰澱山湖三曰當湖四曰陳湖東南則柘湖自金山浦小官浦入于海西南則澱山湖自蘆歷浦入于海西北則陳湖自大姚港朱里浦入于吳松江其南則當湖自月河南浦口澉浦口亦達于海支港相貫乾道二年守臣孫大雅奏請於諸港浦分作閘或斗門及張涇堰兩岸創築月河置一閘其兩柱金口基址並以石為之啓閉以時民賴其利十三年兩浙轉運副使張叔獻言華亭東南枕海西連太湖北接松江江北復控大海地形東南最高西北稍下柘湖十有八港正在其南故古來築堰以禦鹹潮元祐中於新涇塘置閘後因沙淤廢毀今除十五處築堰及置石外獨有新涇塘招賢港徐浦塘三處見有鹹潮奔衝淹塞民田今依新涇塘置閘一所又於兩旁貼築鹹塘以防海潮透入民田其相近徐浦塘元係小派自合築堰又欲於招賢港更置一石兼楊湖歲久今稍淺澱自當開濬上曰此閘須當為之方今邊事寧息惟當以民事為急民事以農為重朕觀漢文帝詔書多為農而下今置閘其利久遠不可憚一時之勞十五年以兩浙路轉運判官吳坰奏請命浙西常平司措置錢穀勸諭人戶於農隙併力開濬華亭等處沿海三十六浦堙塞決泄水勢為永久利乾道七年秀州守臣丘䥩奏華亭縣東南大海古有十八堰捍禦鹹潮其十七久皆捺斷不通𩹉河獨有新涇塘一所不曾築捺海水往來遂害一縣民田緣新涇舊堰迫近大海潮勢湍急其港面闊難以施工設或築捺決不經久運港在涇塘向𩹉二十里比之新涇水勢稍緩若就此築堰決可永久堰外凡管民田皆無鹹潮之害其運港止可捺堰不可置閘不惟瀕海土性虛燥難以建置兼一日兩潮通放鹽運不減數十百艘先後不齊比至通放盡絶勢必晝夜啓而不閉則鹹潮無緣斷絶運港堰外別有港汊大小十六亦合興修從之八年䥩又言興築捍海塘堰今已畢工地理闊遠全藉人力固護乞令本縣知佐兼帶主管塘堰職事繫銜秩滿視有無損壞以為殿最仍令巡尉據地分巡察詔特轉丘䥩左承議郎令所築華亭捍海塘堰趁時栽種蘆葦不許樵採九年又命華亭縣作監閘官招收土軍五十人巡邏堤堰專一禁戢將卑薄處時加修捺令知縣縣尉並帶主管堰事則上下協心不致廢壞淳熙九年又命守臣趙善悉發一萬工修治海鹽縣常豐閘及八十一堰埧務令高牢以固護水勢遇旱可以瀦積十年以浙西提舉司言命秀州發卒濬治華亭鄉魚祈塘使接松江太湖之水遇旱即開西閘堰放水入泖湖為一縣之利蘇州水乾道初平江守臣沈度兩浙漕臣陳彌作言疏濬崑山常熟縣界白茆等十浦約用三百萬餘工其所開港浦並通徹大海遇潮則海內細沙隨泛以入潮退則沙泥沉墜漸致淤塞今依舊招置闕額開江兵卒次第開濬不數月諸浦可以漸次通徹又用兵卒駕船遇潮退搖蕩隨之常使沙泥隨潮退落不致停積實為久利從之淳熙元年詔平江府守臣與許浦駐劄戚世明同措置開濬許浦港三旬訖工黃巖縣水淳熙十二年浙東提舉勾昌泰言黃巖縣舊有官河自縣前至溫嶺凡九十里其支流九百三十六處皆以溉田元有五閘久廢不修今欲建一閘約費二萬餘緡乞詔兩浙運司於窠名錢內支撥明年六月昌泰復言黃巖縣東地名東浦紹興中開鑿置常豐閘名為決水入江其實縣道欲令舟船取徑通過每船納錢以充官費一日兩潮一潮一淤才遇旱乾更無灌溉之備已將此閘築為平陸乞戒自今永不得開鑿放入江湖庶絶後患荊襄諸水紹興二十八年監察御史都民望言荊南江陵縣東三十里沿江北岸古隄一處地名黃潭建炎間邑官開決放入江水設以為險阻以禦盜既而夏潦漲溢荊南復州千餘里皆被其害去年因民訴始塞之乞令知縣遇農隙隨力修補勿致損壞從之淳熙八年襄陽府守臣郭杲言本府有木渠在中廬縣界擁漹水東流四十五里入宜城縣後漢南郡太守王寵嘗鑿之以引蠻水謂之木里溝可溉田六千餘頃歲久堙塞乞行修治既而杲又修護城隄以捍江流繼築救生堤為二閘一通于江一達于濠當水涸時導之入濠水漲時放之于江自是水雖至隄無湍悍泛濫之患焉十年五月詔疏木渠以渠傍地為屯田尋詔民間侵耕者就給之毋復取慶元二年襄陽守臣程九萬言募工修作鄧城永豐堰可防金兵衝突之患且為農田灌溉之利三年臣僚言江陵府去城十餘里有沙市鎮據水陸之衝熙寧中鄭獬作守始築長隄捍水緣地本沙渚當蜀江下流每遇漲潦奔衝沙水相蕩摧圮動輒數十丈見存民屋岌岌危懼乞下江陵府同駐劄副都統制司發卒修築庶幾遠民安堵免被墊溺從之廣西水靈渠源即離水在桂州興安縣之北經縣郭而南其初及秦史祿所鑿以下兵於南越者至漢歸義侯嚴出零陵離水即此渠也馬伏波南征之師餉道亦出於此唐寶曆初觀察使李渤立斗門以通漕舟宋初計使邊詡始修之嘉祐四年提刑李師中領河渠事重闢發近縣夫千四百人作三十四日乃成紹興二十九年臣僚言廣西舊有靈渠抵接全州大江其渠近百餘里自靜江府經靈川興安兩縣昔年並令兩知縣繫銜兼管靈渠遇堙塞以時疏導秩滿無闕例減舉員兵興以來縣道苟且不加之意吏部差注亦不復繫銜渠日淺澀不勝重載乞令廣西轉運司措置修復俾通漕運仍俾兩邑令繫銜兼管務要修治從之
