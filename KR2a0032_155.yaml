body:
  text: 宋史卷一百五十五志第一百八選舉一科目上自敷奏以言明試以功三載考績三考黜陟幽明始于舜典司徒以鄉三物興賢能太宰以三歲計吏治詳於周官兩漢而下選舉之制不同歸于得賢而已考其大要不過入仕則有貢舉之科服官則有銓選之格任事則有考課之法然歷代之議貢舉者每曰取士以文藝不若以德行就文藝而參酌之賦論之浮華不若經義之實學議銓選者每曰以年勞取人可以絶超躐而不無賢愚同滯之歎以薦舉取人可以拔俊傑而不無巧佞捷進之弊議考課者每曰拘吏文則上下督察浸成澆風通譽望則權貴請託徒開利路於是議論紛紛莫之一也宋初承唐制貢舉雖廣而莫重于進士制科其次則三學選補銓法雖多而莫重于舉削改官磨勘轉秩考課雖密而莫重于官給曆紙驗考批書其他教官武舉童子等試以及遺逸奏薦貴戚公卿任子親屬與遠州流外諸選委曲瑣細咸有品式其間變更不常沿革迭見而三百餘年元臣碩輔鴻博之儒清強之吏皆自此出得人為最盛焉今輯舊史所録臚為六門一曰科目二曰學校試三曰銓法四曰補廕五曰保任六曰考課煩簡適中櫽括歸類作選舉志宋之科目有進士有諸科有武舉常選之外又有制科有童子舉而進士得人為盛神宗始罷諸科而分經義詩賦以取士其後遵行未之有改自仁宗命郡縣建學而熙寧以來其法浸備學校之設遍天下而海內文治彬彬矣今以科目學校之制各著于篇初禮部貢舉設進士九經五經開元禮三史三禮三傳學究明經明法等科皆秋取解冬集禮部春考試合格及第者列名放榜于尚書省凡進士試詩賦論各一首策五道帖論語十帖對春秋或禮記墨義十條凡九經帖書一百二十帖對墨義六十條凡五經帖書八十帖對墨義五十條凡三禮對墨義九十條凡三傳一百一十條凡開元禮凡三史各對三百條凡學究毛詩對墨義五十條論語十條爾雅孝經共十條周易尚書各二十五條凡明法對律令四十條兼經並同毛詩之制各間經引試通六為合格仍抽卷問律本科則否諸州判官試進士録事參軍試諸科不通經義則別選官考校而判官監之試紙長官印署面給之試中格者第其甲乙具所試經義朱書通否監官試官署名其下進士文卷諸科義卷帖由並隨解牒上之禮部有篤廢疾者不得貢貢不應法及校試不以實者監官試官停任受賂則論以枉法長官奏裁凡命士應舉謂之宀元攴廳試所屬先以名聞得旨而後解既集什伍相保不許有大逆人緦麻以上親及諸不孝不悌隱匿工商異類僧道歸俗之徒家狀並試卷之首署年及舉數場第鄉貫不得增損移易以仲冬收納月終而畢將臨試期知舉官先引問聯保與狀僉同而定焉凡就試唯詞賦者許持切韻玉篇其挾書為姦及口相受授者發覺即黜之凡諸州長吏舉送必先稽其版籍察其行為鄉里所推每十人相保內有缺行則連坐不得舉故事知舉官將赴貢院臺閣近臣得薦所知之負藝者號曰公薦太祖慮其因緣挾私禁之自唐以來所謂明經不過帖書墨義觀其記誦而已故賤其科而不通者其罰特重乾德元年詔曰舊制九經一舉不第而止非所以啓迪仕進之路也自今依諸科許再試是年諸州所薦士數益多乃約周顯德之制定諸州貢舉條法及殿罰之式進士文理紕繆者殿五舉諸科初場十不殿五舉第二第三場十不殿三舉第一至第三場九不並殿一舉殿舉之數朱書于試卷送中書門下三年陶穀子邴擢上第帝曰穀不能訓子安得登第乃詔食祿之家有登第者禮部具姓名以聞令覆試之自是別命儒臣于中書覆試合格乃賜第時川蜀荊湖內附試數道所貢士縣次往還續食開寶三年詔禮部閲貢士及十五舉嘗終場者得一百六人賜本科出身特奏名恩例蓋自此始五年禮部奏合格進士諸科凡二十八人上親召對講武殿而未及引試也明年翰林學士李昉知貢舉取宋準以下十一人而進士武濟川三傳劉睿材質最陋對問失次上黜之濟川昉鄉人也會有訴昉用情取舍帝乃籍終場下第人姓名得三百六十人皆召見擇其一百九十五人並準以下乃御殿給紙筆別試詩賦命殿中侍御史李瑩等為考官得進士二十六人五經四人開元禮七人三禮三十八人三傳二十六人三史三人學究十八人明法五人皆賜及第又賜錢二十萬以張宴會昉等尋皆坐責殿試遂為常制帝嘗語近臣曰昔者科名多為勢家所取朕親臨試盡革其弊矣八年親試進士王式等乃定王嗣宗第一王式第四自是御試與省試名次始有升降之別時江南未平進士林松雷説試不中格以其間道來歸亦賜三傳出身太宗即位思振淹滯謂侍臣曰朕欲博求俊彥於科場中非敢望拔十得五止得一二亦可為致治之具矣太平興國二年御殿覆試內出賦題賦韻平側相間依次而用命李昉扈蒙第其優劣為三等得呂蒙正以下一百九人越二日覆試諸科得二百人並賜及第又閲貢籍得十舉以上至十五舉進士諸科一百八十餘人並賜出身九經七人不中格亦憐其老特賜同三傳出身凡五百餘人皆賜袍笏錫宴開寶寺帝自為詩二章賜之甲乙第進士及九經皆授將作監丞大理評事通判諸州其餘亦優等授官三年九月廷試舉人故事惟春放榜至是秋試非常例也是冬諸州舉人並集會將親征北漢罷之自是間一年或二年乃貢舉五年覆試進士有顏明遠劉昌言張觀樂史四人以見任官舉進士特授近藩掌書記有趙昌國者求應百篇舉謂一日作詩百篇帝出雜題二十令各賦五篇篇八句日旰僅成數十首率無可觀帝以是科久廢特賜及第以勸來者八年進士諸科始試律義十道進士免帖經明年惟諸科試律進士復帖經進士始分三甲自是錫宴就瓊林苑上因謂近臣曰朕親選多士殆忘飢渴召見臨問觀其才技而用之庶使田野無遺逸而朝廷多君子爾雍熙二年廷試初唱名及第第一等為節度推官是年及端拱初禮部試已帝慮有遺才取不中格者再試之於是由再試得官者數百人凡廷試帝親閲卷纍日宰相屢請宜歸有司始詔歲命官知舉舊制既宀元攴院給左藏錢十萬資費用端拱元年詔改支尚書祠部仍倍其數罷御廚儀鸞司供帳知貢舉宋白等定貢院故事先期三日進士具都榜引試借御史臺驅使官一人監門都堂簾外置案設銀香罏唱名給印試紙及試中格録進士之文奏御諸科惟籍名而上俟制下先書姓名散報之翌日放榜唱名既謝恩詣國學謁先聖先師進士過堂閣下告名聞喜宴分為兩日宴進士請丞郎大兩省宴諸科請省郎小兩省綴行期集列名氏鄉貫三代之類書之謂之小録醵錢為遊宴之資謂之酺皆團司主之制下而中書省同貢院關黃覆奏之俟正敕下關報南曹都省御史臺然後貢院寫春關散給籍而入選謂之春關登科之人例納朱膠綾紙之直赴吏部南曹試判三道謂之關試淳化三年諸道貢士凡萬七千餘人先是有擊登聞鼓訴校試不公者蘇易簡知貢舉受詔即赴貢院仍糊名考校遂為例既廷試帝諭多士曰爾等各負志業效官之外更勵精文采無墜前功也詔刻禮記儒行篇賜之每科進士第一人天子寵之以詩後嘗作針賜陳堯叟至是並賜焉先是嘗併學究尚書周易為一科始更定本經日試義十道尚書周易各義五道仍雜問疏義六道經注四道明法舊試六場更定試七場第一第二場試律第三場試令第四第五場試小經第六場試令第七場試律仍於試律日雜問疏義六經注四凡三禮三傳通禮每十道義分經注六道疏義四道以六通為合格自淳化末停貢舉五年真宗即位復試而高句麗始貢一人先是國子監開封府所貢士與舉送官為姻戚則兩司更互考試始命遣官別試咸平三年親試陳堯咨等八百四十人特奏名者九百餘人有晉天福中嘗預貢者凡士貢于鄉而屢絀于禮部或廷試所不録者積前後舉數參其年而差等之遇親策士則別籍其名以奏徑許附試故曰特奏名又賜河北進士諸科三百五十人及第同出身既下第願試武藝及量才録用者又五百餘人悉賜裝錢慰遣之命禮部為一舉較藝之詳推恩之廣近代所未有也舊制及第即命以官上初復廷試賜出身者亦免選於是策名之士尤衆雖藝不及格悉賜同出身乃詔有司凡賜同出身者並令守選循用常調以示甄別又定令凡試卷封印院糊名送知舉官考定高下復令封之送覆考所考畢然後參校得失不合格者須至覆場方落諭館閣臺省官有請屬舉人者密以聞隱匿不告者論罪仍詔諸王公主近臣毋得以下第親族賓客求賜科名景德四年命有司詳定考校進士程式送禮部貢院頒之諸州士不還鄉里而竊戶他州以應選者嚴其法每秋賦自縣令佐察行義保任之上于州州長二復審察得實然後上本道使者類試已保任而有缺行則州縣皆坐罪若省試而文理紕繆坐元考官諸州解試額多而中者少則不必足額尋又定親試進士條制凡策士即殿兩廡張帟列几席標姓名其上先一日表其次序揭示闕外翌旦拜闕下乃入就席試卷內臣收之付編排官去其卷首鄉貫狀別以字號第之付封彌官謄寫校勘用御書院印付考官定等畢復封彌送覆考官再定等編排官閲其同異未同者再考之如復不同即以相附近者為定始取鄉貫狀字號合之即第其姓名差次並試卷以聞其考第之制凡五等學識優長詞理精絶為第一才思該通文理周率為第二文理俱通為第三文理中平為第四文理疏淺為第五然後臨軒唱第上二等曰及第三等曰出身四等五等曰同出身餘如貢院舊制五年詔士曾預南省試者犯公罪聽贖罰令禮部取前後詔令經久可行者編為條制諸科三場內有十不進士詞理紕繆者各一人以上監試考試官從違制失論幕職州縣官得代日殿一選京朝官降監場務嘗監當則與遠地有三人則監試考試官亦從違制失論幕職州縣官衝替京朝官遠地監當有五人則監試以下皆停見任舉送守倅諸科五十人以上有一人十不即罰銅與免殿選監當進士詞理紕繆亦如之後又詔試宀元攴廳者州長吏先校試合格始聽取解至禮部不及格停其官而考試及舉送者皆重置罪八年始置謄録院令封印官封試卷付之集書吏録本監以內侍二人詔進士第一人令金吾司給七人導從聽引兩節著為令天聖初宋興六十有二載天下乂安時取才唯進士諸科為最廣名卿巨公皆繇此選而仁宗亦嚮用之登上第者不數年輒赫然顯貴矣其貢禮部而數詘者得特奏名或因循不學乃詔曰學猶殖也不學將落遜志務時敏厥修乃來朕慮天下之士或有遺也既已臨軒較得失而憂其屢不中科則衰邁而無所成退不能返其里閭而進不得預于祿仕故常數之外特為之甄采而狃于寬恩遂隳素業苟簡成風甚可恥也自今宜篤進厥學無習僥幸焉時晏殊言唐明經並試策問參其所習以取材識短長今諸科專記誦非取士之意請終場試策一篇詔近臣議之咸謂諸科非所習議遂寢舊制宀元攴廳試落輒停官至是始詔免罪景祐初詔曰鄉學之士益蕃而取人路狹使孤寒棲遲或老而不得進朕甚憫之其令南省就試進士諸科十取其二凡年五十進士五舉諸科六舉嘗經殿試進士三舉諸科五舉及嘗預先朝御試雖試文不合格毋輒黜皆以名聞自此率以為常士有親戚仕本州或為發解官及侍親遠宦距本州二千里令轉運司類試以十率之取三人於是諸路始有別頭試其年詔開封府國子監及別頭試封彌謄録如禮部初貢士踵唐制猶用公卷然多假他人文字或傭人書之景德中嘗限舉人於試紙前親書家狀如公卷及後所試書體不同並駁放其假手文字辨之得實即斥去永不得赴舉賈昌朝言自唐以來禮部采名譽觀素學故預投公卷今有封彌謄録法一切考諸試篇則公卷可罷自是不復有公卷寶元中李淑侍經筵上訪以進士詩賦策論先後俾以故事對淑對曰唐調露二年劉思立為考功員外郎以進士試策滅裂請帖經以觀其學試雜文以觀其才自此沿以為常至永隆二年進士試雜文二篇通文律者始試策天寶十一年進士試一經能通者試文賦又通而後試策五條皆通中第建中二年趙贊請試以時務策五篇針論表贊各一篇以代詩賦大和三年試帖經略問大義取精通者次試論議各一篇八年禮部試以帖經口義次試策五篇問經義者三問時務者二厥後變易遂以詩賦為第一場論第二場策第三場帖經第四場今陛下欲求理道而不以雕琢為貴得取士之實矣然考官以所試分考不能通加評校而每場輒退落士之中否殆繫于幸不幸願約舊制先策次論次賦及詩次帖經墨義而敕有司併試四場通較工拙毋以一場得失為去留詔有司議稍施行焉既而知制誥富弼言曰國家沿隋唐設進士科自咸平景德以來為法尤密而得人之道或有未至且歷代取士悉委有司未聞天子親試也至唐武后始有殿試何足取哉使禮部次高下以奏而引諸殿廷唱名賜第則與殿試無以異矣遂詔罷殿試而議者多言其輕上恩隳故事復如舊時范仲淹參知政事意欲復古勸學數言興學校本行實詔近臣議於是宋祁等奏教不本于學校士不察于鄉里則不能核名實有司束以聲病學者專於記誦則不足盡人材參考衆説擇其便于今者莫若使士皆土著而教之于學校然後州縣察其履行則學者修飭矣乃詔州縣立學士須在學三百日乃聽預秋賦舊嘗充賦者百日而止試于州者令相保任有匿服犯刑虧行冒名等禁三場先策次論次詩賦通考為去取而罷帖經墨義士通經術願對大義者試十道仲淹既去而執政意皆異是冬詔罷入學日限言初令不便者甚衆以為詩賦聲病易考而策論汗漫難知祖宗以來莫之有改且得人嘗多矣天子下其議有司請如舊法乃詔曰科舉舊條皆先朝所定也宜一切如故前所更定令悉罷會張方平知貢舉言文章之變與政通今設科選才專取辭藝士惟道義積于中英華發于外然則以文取士所以叩諸外而質其中之蘊也言而不度則何觀焉邇來文格日失其舊各出新意相勝為奇朝廷惡其然屢下詔書戒飭而學者樂于放逸罕能自還今賦或八百字論或千餘字策或置所問而妄肆胸臆漫陳他事驅扇浮薄重虧雅俗豈取賢斂才備治具之意邪其增習新體澶漫不合程式悉已考落請申前詔揭而示之初禮部奏名以四百名為限又諸科雜問大義僥幸之人悉以為不便知制誥王圭奏曰唐自貞觀訖開元文章最盛較藝者歲千餘人而所收無幾咸亨上元增其數亦不及百人國初取士大抵唐制逮興國中貢舉之路寖廣無有定數比年官吏猥衆故近詔限四百人以懲其弊且進士明經先經義而後試策三試皆通為中第大略與進士等而諸科既不問經義又無策試止以誦數精粗為中否則其專固不達于理安足以長民治事哉前詔諸科終場問本經大義十道九經五經科止問義而不責記誦皆以著于令言者以為難於遽更而圖安于弊也惟陛下申敕有司固守是法毋輕易焉嘉祐二年親試舉人凡與殿試者始免黜落時進士益相習為奇僻鈎章棘句寖失渾淳歐陽修知貢舉尤以為患痛裁抑之仍嚴禁挾書者既而試榜出時所推譽皆不在選澆薄之士候修晨朝羣聚詆斥之街司邏卒不能止至為祭文投其家卒不能求其主名置于法然自是文體亦少變待試京師者恆六七千人一不幸有故不應詔往往沉淪十數年以此毀行干進者不可勝數王洙侍邇英閣講周禮至三年大比大考州里以贊鄉大夫廢興上曰古者選士如此今率四五歲一下詔故士有抑而不得進者孰若裁其數而屢舉也下有司議咸請易以間歲之法則無滯才之歎薦舉數既減半主司易以詳較得士必精且人少則有司易於檢察偽濫自不能容使寒苦藝學之人得進於是下詔間歲貢舉進士諸科悉解舊額之半增設明經試法凡明兩經或三經五經各問大義十條兩經通八三經通六五經通五為合格兼以論語孝經策時務三條出身與進士等而罷説書舉時以科舉既數而高第之人驟顯欲稍裁抑遂詔曰朕惟國之取士與士之待舉不可曠而冗也故立間歲之期以勵其勤約貢舉之數以精其選著為定式申敕有司而高第之人嘗不次而用若循舊比終至濫官甚無謂也自今制科入第三等與進士第一除大理評事簽書兩使幕職官代還升通判再任滿試館職制科入第四等與進士第二第三除兩使幕職官代還改次等京官制科入第五等與進士第四第五除試銜知縣代還遷兩使職官宀元攴廳人視此若夫高才異行施於有政而功狀較然者當以異恩擢焉仁宗之朝十有三舉進士四千五百七十人其甲第之三人凡三十有九其後不至于公卿者五人而已英宗即位議者以間歲貢士法不便乃詔禮部三歲一貢舉天下解額取未行間歲之前四之三為率明經諸科毋過進士之數神宗篤意經學深憫貢舉之弊且以西北人材多不在選遂議更法王安石謂古之取士俱本于學請興建學校以復古其明經諸科欲行廢罷取明經人數增進士額乃詔曰化民成俗必自庠序進賢興能抑繇貢舉而四方執經藝者專于誦數趨鄉舉者狃于文辭與古所謂三物賓興九年大成亦已盩矣今下郡國招徠雋賢其教育之方課試之格令兩制兩省待制以上御史三司三館雜議以聞議者多謂變法便直史館蘇軾曰得人之道在於知人知人之法在於責實使君相有知人之明朝廷有責實之政則胥吏皂隸未嘗無人雖用今之法臣以為有餘使無知人之明無責實之政則公卿侍從常患無人况學校貢舉乎雖復古之制臣以為不足矣時有可否物有興廢使三代聖人復生于今其選舉亦必有道何必由學乎且慶曆間嘗立學矣天下以為太平可待至于今惟空名僅存今陛下必欲求德行道藝之士責九年大成之業則將變今之禮易今之俗又當發民力以治宮室斂民財以養遊士置學立師以又時簡不帥教者屏之遠方徒為紛紛其與慶曆之際何異至於貢舉或曰鄉舉德行而略文章或曰專取策論而罷詩賦或欲舉唐故事采譽望而罷封彌或欲變經生帖墨而考大義此數者皆非也夫欲興德行在於君人者修身以格物審好惡以表俗若欲設科立名以取之則是教天下相率而為偽也上以孝取人則勇者割股怯者廬墓上以廉取人則弊車羸馬惡衣菲食凡可以中上意者無所不至自文章言之則策論為有用詩賦為無益自政事言之則詩賦論策均為無用然自祖宗以來莫之廢者以為設法取士不過如此也近世文章華麗無如楊億使億尚在則忠清鯁亮之士也通經學古無如孫復石介使復介尚在則迂闊誕謾之士也矧自唐至今以詩賦為名臣者不可勝數何負於天下而必欲廢之帝讀軾疏曰吾固疑此得軾議釋然矣他日問王安石對曰今人材乏少且其學術不一異論紛然不能一道德故也一道德則修學校欲修學校則貢舉法不可不變若謂此科嘗多得人自緣仕進別無他路其間不容無賢若謂科法已善則未也今以少壯時正當講求天下正理乃閉門學作詩賦及其入官世事皆所不習此科法敗壞人材致不如古既而中書門下又言古之取士皆本學校道德一於上習俗成於下其人才皆足以有為於世今欲追復古制則患於無漸宜先除去聲病偶對之文使學者得專意經術以俟朝廷興建學校然後講求三代所以教育選舉之法施於天下則庶幾可以復古矣於是改法罷詩賦帖經墨義士各占治易詩書周禮禮記一經兼論語孟子每試四埸初大經次兼經大義凡十道後改論語孟子義各三道次論一首次策三道禮部試即增二道中書撰大義式頒行試義者須通經有文采乃為中格不但如明經墨義粗解章句而已取諸科解名十之三增進士額京東西陝西河北河東五路之創試進士者及府監他路之舍諸科而為進士者乃得所增之額以試皆別為一號考取蓋欲優其業使不至外侵則常慕向改業也又立新科明法試律令刑統大義斷桉所以待諸科之不能業進士者未幾選人任子亦試律令始出官又詔進士自第三人以下試法或言高科任簽判及職官於習法豈所宜緩昔試刑法者世皆指為俗吏今朝廷推恩既厚而應者尚少若高科不試則人不以為榮乃詔悉試帝嘗言近世士大夫多不習法吳充曰漢陳寵以法律授徒常數百人律學在六學之一後來縉紳多恥此學舊明法科徒誦其文罕通其意近補官必聚而試之有以見恤刑之意熙寧三年親試進士始專以策定著限以千字舊特奏名人試論一道至是亦制策焉帝謂執政曰對策亦何足以實盡人材然愈於以詩賦取人爾舊制進士入謝進謝恩銀百兩至是罷之仍賜錢三千為期集費諸州舉送發解考試監試官凡親戚若門客毋試於其州類其名上之轉運司與宀元攴廳者同試率七人特立一額後復令存諸科舊額十之一以待不能改業者元祐初知貢舉蘇軾孔文仲言每一試進士諸科及特奏名約八九百人舊制禮部已奏名至御試而黜者甚多嘉祐始盡賜出身近雜犯亦免黜落皆非祖宗本意進士升甲本為南省第一人唱名近下方特升之皆出一時聖斷今禮部十人以上別試國子開封解試武舉第一人經明行修進士及該特奏而預正奏者定著于令遞升一甲則是法在有司恩不歸於人主甚無謂也今特奏者約已及四百五十人又許例外遞減一舉則當復增數百人此曹垂老無他望布在州縣惟務黷貨以為歸計前後恩科命官幾千人矣何有一人能自奮厲有聞于時而殘民敗官者不可勝數以此知其無益有損議者不過謂宜廣恩澤不知吏部以有限之官待無窮之吏戶部以有限之財祿無用之人而所至州縣舉罹其害乃即位之初有此過舉謂之恩澤非臣所識也願斷自聖意止用前命仍詔考官量取一二十人誠有學問即許出官其餘皆補文學長史之類不理選限免使積弊增重不已遂詔定特奏名考取數進士入四等以上諸科入三等以上通在試者計之毋得取過全額之半是後著為令時方改更先朝之政禮部請置春秋博士專為一經尚書省請復詩賦與經義兼行解經通用先儒傳注及己説又言新科明法中者吏部即注司法名在及第進士之上舊明法最為下科然必責之兼經古者先德後刑之意也欲加試論語大義仍裁半額注官依科目次序詔近臣集議左僕射司馬光曰取士之道當先德行後文學就文學言之經術又當先於詞采神宗專用經義論策取士此乃復先王令典百王不易之法但王安石不當以一家私學令天下學官講解至於律令皆當官所須使為士者果能知道義自與法律冥合何必置明法一科習為刻薄非所以長育人材敦厚風俗也四年乃立經義詩賦兩科罷試律義凡詩賦進士於易詩書周禮禮記春秋左傳內聽習一經初試本經義二道語孟義各一道次試賦及律詩各一首次論一首末試子史時務策二道凡專經進士須習兩經以詩禮記周禮左氏春秋為大經書易公羊穀梁儀禮為中經左氏春秋得兼公羊穀梁書周禮得兼儀禮或易禮記詩並兼書願習二大經者聽不得偏占兩中經初試本經義三道論語義一道次試本經義三道孟子義一道次論策如詩賦科並以四場通定高下而取解額中分之各占其半專經者用經義定取舍兼詩賦者以詩賦為去留其名次高下則於策論參之自復詩賦士多鄉習而專經者十無二三諸路奏以分額各取非均其後遂通定去留經義毋過通額三分之一光又請立經明行修科歲委升朝文臣各舉所知以勉勵天下使敦士行以示不專取文學之意若所舉人違犯名教及贓私罪必坐舉主毋有所赦則自不敢妄舉而士之居鄉居家者立身行己不敢不謹惟懼玷缺外聞所謂不言之教不肅而成不待學官日訓月察立賞告訐而士行自美矣遂立科許各舉一人凡試進士者及中第唱名日用以升甲後分路別立額六十一人州縣保任上之監司監司考察以聞無其人則否預薦者不試于州郡惟試禮部不中許用特奏名格赴廷試後以為常既而詔須特命舉乃舉毋概以科場年上其名六年詔復通禮科初開寶中改鄉貢開元禮為通禮熙寧嘗罷至是始復凡禮部試添知舉官為四員罷差參詳官而置點檢官二十人分屬四知舉使協力通考諸州點檢官專校雜犯亦預考試八年中書請御試復用祖宗法試詩賦論策三題且言士子多已改習詩賦太學生員總二千一百餘人而不兼詩賦者才八十二人於是詔來年御試習詩賦人復試三題專經人且令試策自後概試三題帝既親政羣臣多言元祐所更學校科舉制度非是帝念宣仁保佑之功不許改紹聖初議者益多乃詔進士罷詩賦專習經義廷對仍試策初神宗念字學廢缺詔儒臣探討而王安石乃進其説學者習焉元祐禁勿用至是除其禁四年詔禮部凡內外試題悉集以為籍遇試頒付考官以防復出罷春秋科凡試優取二禮兩經許占全額之半而以其半及他經既而復立春秋博士崇寧又罷之徽宗設辟雍於國郊以待士之升貢者臨幸加恩博士弟子有差然州郡猶以科舉取士不專學校崇寧三年遂詔天下取士悉由學校升貢其州郡發解及試禮部法並罷自此歲試上舍悉差知舉如禮部試五年詔大比歲更參用科舉取士一次其亟以此意使遠士即聞之時州縣悉行三舍法得免試入學者多當官子弟而在學積歲月纍試乃得應格其貧且老者甚病之故詔及此而未遽廢科舉也大觀四年五月星變凡事多所更定侍御史毛注言養士既有額而科舉又罷則不隸學籍者遂致失職天之視聽以民士其民之秀者今失職如此疑天亦譴怒願以解額之歸升貢者一二分不絶科舉亦應天之一也遂詔更行科舉一次臣僚言場屋之文專尚偶麗題雖無兩意必欲釐而為二以就對偶其超詣理趣者反指以為淡泊請擇考官而戒飭之取其有理致而黜其強為對偶者庶幾稍救文弊宣和三年詔罷天下三舍法開封府及諸路並以科舉取士惟太學仍存三舍以甄序課試遇科舉仍自發解六年禮部試進士萬五千人詔特增百人額正奏名賜第者八百餘人因上書獻頌直令赴試者殆百人有儲宏等隸大閹梁師成為使臣或小史皆賜之第梁師成者於大觀三年嘗中甲科自設科以來南宮試者無踰此年之盛然雜流閹宦俱玷選舉而祖宗之良法蕩然矣凡士不繇科舉若三舍而賜進士第及出身者其所從得不一凡遺逸文學吏能言事或奏對稱旨或試法而經律入優或材武或童子而皆能文或邊臣之子以功來奏其得之雖有當否大較猶可取也崇寧大觀之後達官貴胄既多得賜以上書獻頌而得者又不勝紀
