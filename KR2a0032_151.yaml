body:
  text: 宋史卷一百五十一志第一百四輿服三天子之服皇太子附后妃之服命婦附天子之服一曰大裘冕二曰袞冕三曰通天冠絳紗袍四曰履袍五曰衫袍六曰窄袍天子祀享朝會親耕及視事燕居之服也七曰御閲服天子之戎服也中興之後則有之大裘之制神宗元豐四年詳定郊廟奉祀禮文所言周禮司裘掌為大裘以供王祀天之服司服王祀昊天上帝則服大裘而冕祀五帝亦如之享先王則袞冕而禮記云郊祭之日王被袞以象天戴冕璪十有二旒則天數也王肅據家語以為臨燔柴脫袞冕著大裘則是禮記被袞與周禮大裘郊祀並用二服事不相戾但服之有先後耳是以開寶通禮皇帝服袞冕出赴行宮祀日服袞冕至大次質明改服大裘而冕出次蓋袞冕盛服而文之備者故於郊之前期被之以至大次既臨燔柴則脫袞冕服裘以明天道至質故被裘以體之今儀注車駕赴青城服通天冠絳紗袍祀之日乃服鞾袍至大次服袞冕臨祭非尚質之義乞並依開寶通禮詔詳定所參議又言臣等詳大裘之制本以尚質而後世反以尚文故冕之飾大為不經而禮書所載上有垂旒加飾又異大裘不裼之説今參考諸説大裘冕無旒廣八寸長一尺六寸前圜後方前低寸二分玄表朱𩹉以繒為之玉筓以朱組為紘玉瑱以玄紞垂之為裘以黑羔皮領袖以黑繒纁裳朱紱而無章飾佩白玉玄組綬革帶博二寸玉鈎以佩紱屬之素帶朱𩹉絳純其外上朱下緑白紗中單皂領青褾襈裾朱襪赤舄黑絇繶純乞下所屬製造其當暑奉祠之服乞降梁陸瑋議以黑繒為裘及唐輿服志以黑羔皮為緣詔重詳定光祿寺丞集賢校理陸佃言臣詳冕服有六周官辨師云掌王之五冕則大裘與袞同冕故禮記云郊之日王被袞以象天又曰服之襲也充美也禮不盛服不充故大裘不裼此明王服大裘以袞衣襲之也先儒或謂周祀天地皆服大裘而大裘之冕無旒非是蓋古者裘不徒服其上必皆有衣故曰緇衣羔裘黃衣狐裘素衣麑裘如郊祀徒服大裘則是表裘以見天地表裘不入公門而乃欲以見天地可乎且先王之服冬裘夏葛以適寒暑未有能易之者也郊祀天地有裘無袞則夏祀赤帝與至日祭地祇亦將被裘乎然則王者冬祀昊天上帝中裘而表袞明矣至於夏祀天神地祇則去裘服袞以順時序周官曰凡四時之祭祀以宜服之明夏不必衣裘也或曰祭天尚質故徒服大裘被袞則非尚質臣以為尚質者明有所尚而已不皆用質也今欲冬至禋祀昊天上帝服裘被袞其餘祀天及祀地祇並請服袞去裘各以其宜服之於是詳定所言裘不可徒服禮記曰大裘不裼則襲可知所謂大裘之襲者袞也與袞同冕伏請冬祀昊天與黑帝皆服大裘被以袞其餘非冬祀天及夏至祭地則皆服袞六年尚書禮部言經有大裘而無其制近世所為惟梁隋唐為可考請緣隋制以黑羔皮為裘黑繒為領袖及𩹉緣袂廣可運肘長可蔽膝按皇侃説祭服之下有袍繭袍繭之下有中衣朝服裼衣之下有裘裘之下有中衣然則今之親郊中單當在大裘之下其袂之廣狹衣之長短皆當如裘伏乞改製於是神宗始服大裘而加袞冕焉哲宗元祐元年禮部言元豐所造大裘雖用黑羔皮乃作短袍樣襲於袞衣之下仍與袞服同冕未合典禮下禮部太常寺共議上官均吳安詩常安民劉唐老龔原姚勔請依元豐新禮丁隲請循祖宗故事王悆請倣唐制朱光庭周秩請以玄衣襲裘獨禮部員外郎何洵直在元豐中嘗預詳定以陸佃所議有可疑者八按周禮節服氏掌祭祀朝覲袞冕六人惟王之太常郊祀裘冕二人既云袞冕又云裘冕是袞與裘各有冕乃云裘與袞同冕當以袞襲之裘既無冕又襲於袞中裘而表袞何以示裘袞之別哉古人雖質不應以裘為夏服蓋冬用大裘當暑則以同色繒為之記曰郊祭之日王被袞以象天若謂裘上被袞以被為襲則家語亦有被裘象天之文諸儒或言臨燔柴脫袞冕著大裘或云脫裘服袞蓋裘袞無同冕兼服之理今乃以二服合為一可乎且大裘天子吉服之最上若大圭大路之比是裘之在表者記曰大裘不裼説者曰無別衣以裼之蓋他服之裘故表裘不入公門事天以報本復始故露質見素不為表襮而冕亦無旒何必假他衣以藩飾之乎凡裘上有衣謂之裼裼上有衣謂之襲襲者裘上重二衣也大裘本不裼鄭志乃云裘上有玄衣與裘同色蓋趙商之徒附會為説不與經合襲之為義本出於重沓非一衣也古者齋祭異冠齋服降祭服一等祀昊天上帝五帝以裘冕祭則袞冕齋故鄭氏云王齋服袞冕是袞冕者祀天之齋服也唐開元及開寶禮始以袞冕為齋服裘冕為祭服兼與張融臨燔柴脫袞服裘之義合請從唐制兼改製大裘以黑繒為之佃復破其説曰夫大裘而冕謂之裘冕非大裘而冕謂之袞冕則裘冕必服袞袞冕不必服裘今特言裘冕者主冬至言之周禮司裘掌為大裘以供王祀天之服則祀地不服大裘以夏日至不可服裘故也今謂大裘當暑以同色繒為之尤不經見兼裼襲一衣而已初無重沓之義被裘而覆之則曰襲袒而露裘之美則曰裼所謂大裘不裼則非袞而何玉藻曰禮不盛服不充故大裘不裼則明不裼而襲也充美也鄭氏謂大裘之上有玄衣雖不知覆裘以袞然尚知大裘不可徒服必有玄衣以覆之玉藻有尸襲之義周禮裘冕注云裘冕者從尸服也夫尸服大裘而襲則王服大裘而襲可知且裘不可以徒服故被以袞豈借袞以為飾哉今謂祭天用袞冕為齋服裘冕為祭服此乃襲先儒之謬誤後漢顯宗初服日月星辰十二章以祀天地自魏以來皆用袞服則漢魏祭天嘗服袞矣雖無大裘未能盡合於禮固未嘗有表裘而祭者也且裘內服也與袍同袍矣而欲襌以祭天以明示質是欲衣以見上帝也洵直復欲為大裘之裳纁色而無章飾夫裘安得有裳哉請從先帝所志其後詔如洵直議去黑羔皮而以黑繒製焉政和議禮局上大裘青表纁𩹉黑羔皮為領褾襈朱裳被以袞服冬至祀昊天上帝服之立冬祀黑帝立冬後祭神州地祇亦如之中興之後無有存者紹興十三年禮部侍郎王賞等言郊祀大禮合依禮經皇帝服大裘被袞行禮據元豐詳定郊廟禮文何洵直議以黑繒創作大裘如袞惟領袖用黑羔乞如洵直議詔有司如祖宗舊制以羔製之禮部又言關西羊羔係天生黑色今有司白羔為之不中禮制不如權以繒代又元祐中有司欲為大裘度用百羔哲宗以為害物遂用黑繒請依太常所言從之遂以袞襲裘冕亦十二旒焉袞冕之制宋初因五代之舊天子之服有袞冕廣一尺二寸長二尺四寸前後十二旒二纊並貫真珠又有翠旒十二碧鳳之在珠旒外冕版以龍鱗錦表上綴玉為七星旁施琥珀瓶犀瓶各二十四周綴金絲網鈿以真珠雜寶玉加紫雲白鶴錦𩹉四柱飾以七寶紅綾𩹉金飾玉簪導紅絲絛組帶亦謂之平天冠袞服青色日月星山龍雉虎蜼七章紅裙藻火粉米黼黻五章紅蔽膝升龍二並織成間以雲朵飾以金鈒花鈿窠裝以真珠琥珀雜寶玉紅羅襦裙繡五章青褾襈裾六采綬一小綬三結玉環三素大帶朱𩹉青羅四神帶二繡四神盤結綬帶飾並同袞服白羅中單青羅抹帶紅羅勒帛鹿盧玉具劍玉鏢首鏤白玉雙佩金飾貫真珠金龍鳳革帶紅襪赤舄金鈒花四神玉鼻祭天地宗廟朝太清宮饗玉清昭應宮景靈宮受册尊號元日受朝册皇太子則服之太祖建隆元年太常禮院言準少府監牒請具袞龍衣絳紗袍通天冠制度令式袞冕垂白珠十有二旒以組為纓色如其綬黈纊充耳玉簪導玄衣纁裳十二章八章在衣日月星辰山龍華蟲火宗彝四章在裳藻粉米黼黻衣褾領如上為升龍皆織就為之山龍以下每章一行重以為等每行十二白紗中單黼領青褾襈裾蔽膝加龍山火三章革帶玉鈎大帶素帶朱𩹉紕其外上朱下緑紐約用組鹿盧玉具劍大珠鏢首白玉雙佩玄組雙大綬六采玄黃赤白縹緑純玄質長二丈四尺五寸首廣一尺小雙綬長二尺六寸色同大綬而首半之間施三玉環朱襪赤舄加金飾詔可二年太子詹事尹拙工部尚書竇儀議謹按周禮辨師掌王之五冕朱𩹉延紐五采繅十有二就皆五采玉十有二玉筓朱紘諸侯之繅旒九就珉玉三采其餘如王之事繅斿皆就玉瑱玉筓疏云王不言玉瑱於此言之者王與諸侯互相見為義是以王言玄冕朱𩹉延紐及朱紘明諸侯亦有之諸公言玉瑱明王亦有之詳此經疏之文則是本有充耳今請令君臣袞冕以下並畫充耳以合正文從之乾德元年閏十二月少府監楊格少監王處訥等上新造皇帝冠冕先是郊祀冠冕多飾以珠玉帝以華而且重故命改製之仁宗景祐二年又以帝后及羣臣冠服多沿唐舊而循用之久則有司寖為繁文以失法度詔入內內侍省御藥院與太常禮院詳典故造冠冕蠲減珍華務從簡約俾圖以進續詔通天冠絳紗袍更不修製由是改製袞冕天版元闊一尺二寸長二尺四寸今製廣八寸長一尺六寸減翠旒並鳳子前後二十四珠旒並合典制天板頂上元織成龍鱗錦為表紫雲白鶴錦為𩹉今製青羅為表采畫出龍鱗紅羅為𩹉采畫出紫雲白鶴所有犀瓶琥珀瓶各二十四今減不用金絲結網子上舊有金絲結龍八今減四亦減絲令細天板四面花墜子素墜子依舊減輕造冠身並天柱元織成龍鱗錦今用青羅采畫出龍鱗金輪等七寶元真玉碾成今更不用如補空郤以雲龍細窠分旒玉鈎二今減去之天河帶組帶款慢帶依舊減輕造納言元用玉製今用青羅采畫出龍鱗錦金稜上稜道依舊用金即減輕製黈纊玉簪袞服八章日月星辰山龍華蟲火宗彝青羅身紅羅襈繡造所有雲子相度稀稠補空更不用細窠亦不使真珠裝綴中單依舊皂白製造裙用紅羅繡出藻粉米黼黻周回花樣仍舊減稀製之蔽膝用紅羅繡升龍二雲子補空減稀製之周回依舊細窠不用六采綬依舊減絲織造所有玉環亦減輕帶頭金葉減去用銷金四神帶不用劍佩梁帶襪舄並依舊嘉祐元年王洙奏天子法服冕旒形度重大華飾稍繁願集禮官參定詔禮院詳典禮上聞而禮院繪圖以進因敕御藥院更造其後冕服稍增侈如故英宗治平二年知太常禮院李育奏曰郊廟之祭本尚純質袞冕之飾皆存法象非事繁侈重奇玩也冕則以周官為本凡十二旒間以采玉加以紘綖筓瑱之飾袞則以虞書為始凡十二章首以辰象別以衣裳繪繡之采東漢至唐史官名儒記述前制皆無珠翠犀寶之飾何則鷸羽胎非法服所用琥珀犀瓶非至尊所冠龍錦七星已列采章之內紫雲白鶴近出道家之語豈被袞戴璪象天則數之義哉自大裘之廢顓用袞冕古朴稍去而法度尚存夫明水大羹不可以衆味和雲門咸池不可以新聲間袞冕之服不宜以珍怪纍也若魏明之用珊瑚江右之用翡翠侈靡衰播之餘豈足為聖朝道哉且太祖建隆元年少府監所造冕服及二年博士聶崇義所進三禮圖嘗詔尹拙竇儀參校之皆倣虞周漢唐之舊至四年冬服之合祭天地於圜丘用此制也太宗亦嘗命少府製於禁中不聞改作及真宗封泰山禮官請服袞冕帝曰前王服羔裘尚質也今則無羔裘而有袞冕可從近制是豈有意於繁飾哉蓋後之有司率意妄增未嘗確議遂相循而用故仁宗嘗詔禮官章得象等詳議之其所減過半然不經之飾重者多去輕者尚存不能盡如詔書之意故至和三年王洙復議去繁飾禮官畫圖以獻漸還古禮而有司所造復如景祐之前又按開寶通禮及衣服令冕服皆有定法悉無寶錦之飾夫太祖太宗富有四海豈乏寶玩顧不可施之郊廟也臣竊謂陛下肇祀天地躬饗祖禰服周之冕觀古之象願復先王之制祖宗之法其袞冕之服及綬佩舄之類與通禮衣服令三禮圖制度不同者宜悉改正詔太常禮院少府參定遂合奏曰古者冕服之用郊廟殊制唐典天子之服有二等而大裘尚存顯慶初長孫無忌等采郊特牲之説獻議廢大裘自是郊廟之祭一用袞冕然旒章之數止以十二為節亦未聞有餘飾也國朝冕服雖倣古制然增以珍異巧縟前世所未嘗有夫國之大事莫大於祀而祭服違經非以肅祀容尊神明也臣等以謂宜如育言參酌通禮衣服令三禮圖及景祐三年減定之制一切改造也孔子曰麻冕禮也今也純儉吾從衆純者絲也變麻用絲蓋已久矣則冕服之制宜依舊以羅為之冕廣一尺二寸長二尺二寸約以景表尺前圓後方黝上朱下以金飾版側以白玉珠為旒貫之以五采絲繩前後各十二旒旒各十二珠相去一寸長二尺朱絲組為纓黈纊充耳金飾玉簪導青衣纁裳十二章八章繪之於衣日月星辰山龍華蟲火宗彝也四章繡之於裳藻粉米黼黻也錦龍褾領織為升龍山龍而下一章為一行重以為等行十二別製大帶素表朱𩹉朱緑終辟紱舄大小綬亦去珠玉鈿窠琥珀玻璃之飾其中單革帶玉具劍玉佩朱襪之制已中禮令無復改為則法服有稽祭禮增重復詔禮院再詳以聞而內侍省奏謂景祐中已裁定可因而用也從之神宗元豐元年詳定郊廟禮文所言凡冕版廣八寸長尺六寸與古制相合更不復議今取少府監進樣如以青羅為表紅羅為𩹉則非辨師所謂玄冕朱𩹉者也上用金稜天板四周金絲結網兩旁用真珠花素墜之類皆不應禮伏請改用朱組為紘玉筓玉瑱以玄紞垂瑱以五采玉貫於五色藻為旒以青赤黃白黑五色備為一玉每一玉長一寸前後二十四旒垂而齊肩以合孔子所謂純儉之義又古者祭服朝服之裳皆前三幅後四幅前為陽以象奇後為陰以象偶惟深衣中襌之屬連衣裳而裳復不殊前後然以六幅交解為十二幅象十二月其制作莫不有法故謂之法服今少府監袞服其裳乃以八幅為之不殊前後有違古義伏請改正祭服之裳以七幅為之殊其前後以今太常周尺度之幅廣二尺二寸每幅兩旁各縫殺一寸謂之削幅腰間辟積無數裳側有純謂之綼裳下有純謂之緆綼緆之廣各寸半表𩹉合為三寸羣臣祭服之裳倣此從之政和議禮局更上皇帝冕服之制冕版廣八寸長一尺六寸前高八寸五分後高九寸五分青表朱𩹉前後各十有二旒五采藻十有二就就間相去一寸青碧錦織成天河帶長一丈二尺廣二寸朱絲組帶為纓黈纊充耳金飾玉簪導長一尺二寸袞服青衣八章繪日月星辰山龍華蟲火宗彝纁裳四章繡藻粉米黼黻蔽膝隨裳色繡升龍二白羅中單皂褾襈紅羅勒帛青羅襪帶緋白羅大帶革帶白玉雙佩大綬六采赤黃黑白縹緑小綬三色如大綬間施玉環三朱襪赤舄緣以黃羅中興仍舊制延以羅衣木玄表朱𩹉長尺有六寸前低一寸二分四旁緣以金覆於卷武之上繅以五色絲貫五色玉前後各十二凡用二百八十有八玉筓充耳用黃綿紘以朱組以其一屬於左筓上垂下又屈而屬於右筓繫之而垂其餘衣玄八章升龍於山繪裳纁四章繡幅前三後四斷而不屬兩旁殺縫腰辟積綼緆之廣皆如舊大帶以緋白羅合而紩之以朱緑飾其側上朱下緑其束處以組為紐約下垂三尺通天冠絳紗袍亦如之白羅中單領褾襈以黻服裘則以皂絳紗袍則衣用白紗領褾襈以朱綬大小各一大綬織以六采青黃黑白縹緑下垂青絲網上有結垂玉環三小綬制如大綬惟三色大裘絳紗袍皆用之革帶博二寸革為𩹉緋羅為表飾以玉銙鈕以玉鈎通天冠絳紗袍亦用之韍從裳色上有紕下有純去上五寸繪以山龍火上接革帶繫之佩有衡有琚瑀有衝牙繫於革帶左右各一上設衡衡下垂三帶貫以蠙珠次則中有金獸面兩旁夾以雙璜又次設琚瑀下則衝牙居中央兩旁有玉滴子行則擊牙而有聲舄有絇有純有繶有綦以緋羅為之首加金飾服通天冠絳紗袍則用黑舄以烏皮為之常服則用白舄以絲為之襪羅表繒𩹉施靿著綦以繫之赤舄以朱黑舄以白白舄同通天冠二十四梁加金博山附蟬十二高廣各一尺青表朱𩹉首施珠翠黑介幘組纓翠緌玉犀簪導絳紗袍以織成雲龍紅金條紗為之紅𩹉皂褾襈裾絳紗裙蔽膝如袍飾並皂褾襈白紗中單朱領褾襈裾白羅方心曲領白襪黑舄佩綬如袞大祭祀致齋正旦冬至五月朔大朝會大册命親耕籍田皆服之仁宗天聖二年南郊禮儀使李維言通天冠上一字準敕回避詔改承天冠中興之制冠高九寸服用並同乾道九年又用履袍袍以絳羅為之折上巾通犀金玉帶繫履則曰履袍服鞾則曰鞾袍履鞾皆用黑革四孟朝獻景靈宮郊祀明堂詣宮宿廟進胙上壽兩宮及端門肆赦並服之大禮畢還宮乘平輦服亦如之若乘大輦則服通天絳紗如常儀衫袍唐因隋制天子常服赤黃淺黃袍衫折上巾九還帶六合鞾宋因之有赭黃淡黃袍衫玉裝紅束帶皂文鞾大宴則服之又有赭黃淡黃袍紅衫袍常朝則服之又有窄袍便坐視事則服之皆皂紗折上巾通犀金玉環帶窄袍或御烏紗帽中興仍之初高宗踐祚於南都隆祐太后命內臣上乘輿服御有小冠太后曰祖宗間居之所服也自神宗始易以巾願即位後退朝上戴此冠庶幾如祖宗時氣象後殿早講皇帝服帽子紅袍玉束帶講讀官公服繫㙐晚講皇帝服頭巾背子講官易便服此嘉定四年講筵之制也御閲服以金裝甲乘馬大閲則服之圭宋初凡大祭祀大朝會天子皆執圭元豐二年詳定儀注所言周禮王執鎮圭釋者曰祭天地宗廟及朝日夕月則執之若朝覲諸侯授玉於王王受玉撫玉而已考工記天子執冒四寸以朝諸侯蓋天子以冒圭邪刻之處冒諸侯之圭以齊瑞信也未有臨臣子而執鎮圭者唐六典殿中監掌服御之事凡大祭祀則搢大圭執鎮圭若大朝會止進爵開寶通禮始著元會執圭出自西房淳化中上壽進酒又令內侍奉圭於周制唐禮皆不合其元會受朝賀請不執鎮圭上壽詔可三年詔議大圭尺度詳定所言考工記鎮圭尺有二寸天子守之大圭長三尺杼上終葵首天子服之後魏以降以白玉為之長尺有二寸西魏以來皆然方而不折雖非古制蓋後世以所得之玉隨宜為之今請揆玉之有無制之又言唐禮親祀天地神祗皆搢大圭執鎮圭有事宗廟則執鎮圭而已王涇郊祀録曰大圭質也事天地之禮質故執而搢之鎮圭文也宗廟之禮亦文故無兼執之義不知大圭天子之笏也通用於郊廟請自今皇帝親祠郊廟搢大圭執鎮圭奉祀之時既接神再拜則奠鎮圭為摯大圭為笏又言開元及開寶通禮皇帝升輅不言執圭祀日質明至中壝門外殿中監進大圭尚衣奉御又以鎮圭授殿中監以進於是始搢大圭執鎮圭今皇帝乘玉輅執鎮圭赴景靈宮及太廟青城皆乘輅執圭殊不應禮請自今乘輅不執圭還內御大輦亦如之詳定所又言大圭中必之制請製薦玉繅藉以木為幹廣袤如玉以韋衣之韋上畫五采文前後垂之又製約圭繅藉長尺上玄下降為地五采五就因以為飾每奠圭則以薦玉之繅陳于地執圭則以約圭之繅備失墜因垂之為飾況大圭搢之紳帶之間不可無中必明矣俟明堂服大圭宜依鎮圭所約之組令可繫之哲宗元祐元年禮部言元豐新禮皇帝祀天搢大圭其制圓首前詘於禮未合今欲放西魏隋唐玉笏之制方而不折上下皆博三寸長尺二寸其厚以鎮圭為約從之政和二年宦者談稹獻玄圭其制兩旁刻十二山若古山尊上鋭下方上有雷雨之文下無瑑飾外黑內赤中一小好可容指其長尺有二寸詔付廷議議官以為周王執鎮圭緣飾以四鎮之山其中有好為受組之地其長尺有二寸周人倣古為之而王執以鎮四方也徽宗乃以是歲冬御大慶殿受圭焉三年又詔曰先王以類而求祀圜丘以象形蒼玉以象色冬日以至取其時大裘而冕法其幽而未有以體其道天玄而地黃今大圭內赤外黑于以體之冬祀可搢大圭執玄圭永為定制中興仍舊制大祭祀則執大圭以為笏上太上皇皇太后册寶亦如之皇太子之服一曰袞冕二曰遠遊冠朱明衣三曰常服袞冕青羅表緋羅紅綾𩹉塗金銀鈒花飾犀簪導紅絲組前後白珠九旒二纊貫水晶珠青羅衣繡山龍雉火虎蜼五章紅羅裳繡藻粉米黼黻四章紅羅蔽膝繡山火二章白紗中單青褾襈裾革帶塗金銀鈎瑜玉雙佩四采織成大綬結二玉環金塗銀鈒花飾青羅襪帶紅羅勒帛玉具劍金塗銀鈒花玉鏢首白羅襪朱履金塗銀扣從祀則服之遠遊冠十八梁青羅表金塗銀鈒花飾犀簪導紅絲組為纓博山政和加附蟬朱明服紅花金條紗衣紅紗𩹉皂褾襈紅紗裳紅紗蔽膝並紅紗𩹉白花羅中單皂褾襈白羅方心曲領羅襪黑舄革帶劍佩綬餘同袞服襪帶勒帛執桓圭受册謁廟朝會則服之常服皂紗折上巾紫公服通犀金玉帶太宗至道元年太常禮院言南郊皇太子充亞獻合著祭祀服準制度袞冕以組為纓色如其綬青纊充耳玄衣纁裳凡九章每章一行重以為等皆織為之白紗中單黻領青褾襈裾革帶金鉤大帶素帶不朱𩹉亦紕以朱緑紐約用組黻隨裳色二章朱組雙大綬四采赤白褾襈純朱質長一丈八尺三百二十首廣九寸小雙綬長二尺六寸色同大綬而首半之間施二玉環朱襪赤舄舄加金飾餘同舊制侍從祭祀及謁廟加元服納妃則服之詔依上製造政和議禮局更上皇太子服制袞冕惟青纊充耳餘並同國初之制加元服從祀納妃釋奠文宣王服之中興並同其皇子之服紹興三十二年十月禮官言皇子鄧慶恭三王遇行事服朝服則七梁額花冠貂蟬籠巾金塗銀立筆真玉佩綬金塗銀革帶烏皮履若服祭服則金塗銀八旒冕真玉佩綬緋羅履襪詔文思院製造后妃之服一曰褘衣二曰朱衣三曰禮衣四曰鞠衣妃之緣用翟為章三等大帶隨衣色朱𩹉紕其外上以朱錦下以緑錦紐約用青組革帶以青衣之白玉雙佩黑組雙大綬小綬三間施玉環三青襪舄舄加金飾受册朝謁景靈宮服之鞠衣黃羅為之蔽膝大帶革舄隨衣色餘同褘衣唯無翟文親蠶服之妃首飾花九株小花同並兩博鬢冠飾以九翬四鳳褕翟青羅繡為搖翟之形編次於衣青質五色九等素紗中單黼領羅縠褾襈蔽膝隨裳色以緅為領緣以搖翟為章二等大帶隨衣色不朱𩹉紕其外餘倣皇后冠服之制受册服之皇太子妃首飾花九株小花同並兩博鬢褕翟青織為搖翟為形青質五色九等素紗中單黼領羅縠褾襈皆以朱色蔽膝隨裳色以緅為領緣以搖翟為章二等大帶隨衣色不朱𩹉紕其外上以朱錦下以緑錦紐約用青組革帶以青衣之白玉雙佩純朱雙大綬章采尺寸與皇太子同受册朝會服之鞠衣黃羅為之蔽膝大帶革帶隨衣色餘與褕翟同唯無翟從蠶服之中興仍舊制其龍鳳花叉冠大小花二十四株應乘輿冠梁之數博鬢冠飾同皇太后皇后服之紹興九年所定也花叉冠小大花十八株應皇太子冠梁之數施兩博鬢去龍鳳皇太子妃服之乾道七年所定也其服后惟備褘衣禮衣妃備褕翟凡三等其常服后妃大袖生色領長裙霞帔玉墜子背子生色領皆用絳羅蓋與臣下不異命婦服政和議禮局上花叉冠皆施兩博鬢寶鈿飾翟衣青羅繡為翟編次於衣及裳第一品花叉九株寶鈿準花數翟九等第二品花叉八株翟八等第三品花叉七株翟七等第四品花叉六株翟六等第五品花叉五株翟五等並素紗中單黼領朱褾襈通用羅縠蔽膝隨裳色以緅為領緣加文繡重雉為章二等二品以下準此大帶革帶青襪舄佩綬受册從蠶服之七年臣僚言今文臣九品殊以三品之服至於命婦已釐八等之號而服制未有名稱詔有司視其夫之品秩而定其服飾詔送禮制局定之其儀闕焉
