北路崇寧戶一十二萬七千七百六十七口二十三萬三千二百八十貢蜜蠟瓷器縣十六河南赤洛陽赤熙寧五年省入河南元祐二年復永安赤奉陵寢景德四年升鎮為縣偃師畿慶曆三年廢四年復熙寧五年省入緱氏八年復置省緱氏縣為鎮隸焉潁陽畿慶曆三年廢為鎮四年復熙寧二年省入登封元祐二年復置鞏畿密畿崇寧四年割隸鄭州宣和二年還隸府新安畿福昌畿熙寧五年省入壽安元祐元年復為縣伊陽畿熙寧二年割欒川冶鎮入虢州盧氏縣五年廢伊闕縣為鎮入河南六年改隸伊陽澠池畿景祐四年改鐵門鎮曰延禧永寧畿長水畿壽安畿慶曆三年廢為鎮四年復河清畿開寶元年移治白波鎮熙寧八年閏四月置鐵監登封畿監一阜財熙寧七年置鑄銅錢潁昌府次府許昌郡忠武軍節度本許州元豐三年升為府崇寧四年為南輔隸京畿大觀四年罷輔郡政和四年復為輔郡隸京畿宣和二年復罷輔郡依舊隸京西北路崇寧戶六萬六千四十一口一十六萬一百九十三貢絹藨席縣七長社次赤熙寧四年省許田縣為鎮入焉郾城次畿陽翟次畿長葛次畿臨潁次畿舞陽次畿郟中元隸汝州崇寧四年來隸鄭州輔滎陽郡奉寧軍節度熙寧五年廢州以管城新鄭隸開封府省滎陽滎澤縣為鎮入管城原武縣為鎮入陽武元豐八年復州元祐元年還舊節復以滎陽滎澤原武為縣與滑州並隸京西路崇寧四年建為西輔大觀四年罷輔郡政和四年又復宣和二年又罷崇寧戶三萬九百七十六口四萬一千八百四十八貢絹麻黃縣五管城望滎澤中原武上新鄭上滎陽緊滑州輔靈河郡太平興國初改武成軍節度熙寧五年廢州縣並隸開封府元豐四年復舊縣復來隸元祐元年還舊節度崇寧戶二萬六千五百二十二口八萬一千九百八十八貢絹縣三白馬中熙寧三年廢靈河縣隸焉韋城望胙城緊孟州望河陽三城節度政和二年改濟源郡崇寧戶三萬三千四百八十一口七萬一百六十九貢粱米縣六河陽望濟源望溫望汜水上熙寧五年省入河陰元豐二年復置大中祥符四年改武牢關曰行慶河陰中王屋中熙寧五年自河南來隸蔡州緊汝南郡淮康軍節度崇寧戶九萬八千五百二口十八萬五千一十三貢綾縣十汝陽上上蔡上新蔡中褒信中遂平中新息中確山中隋朗山縣大中祥符五年改真陽中西平中平輿中淮寧府輔淮陽郡鎮安軍節度本陳州政和二年改輔為上宣和元年升為府崇寧戶三萬二千九十四口一十五萬九千六百一十七貢紬絹縣五宛丘緊項城上商水中西華中南頓中熙寧六年省為鎮入商水項城二縣元祐元年復順昌府上汝陰郡舊防禦後為團練開寶六年復為防禦元豐二年升順昌軍節度舊潁州政和六年改為府崇寧戶七萬八千一百七十四口一十六萬六百二十八貢紬絁綿縣四汝陰望開寶六年移治於州城東南十里泰和望潁上緊沈丘緊汝州輔臨汝郡陸海軍節度本防禦州政和四年賜軍額崇寧戶四萬一千五百八十七口一十七萬一千四百九十五貢絁絹縣五梁中襄城緊葉上魯山中寶豐中舊名龍興熙寧五年省為鎮入魯山元祐元年復宣和二年改為寶豐縣信陽軍同下州開寶九年降為義陽軍廢鍾山縣太平興國元年改為信陽軍崇寧戶九千九百五十四口二萬五十貢紵布縣二信陽中下羅山中下開寶九年廢雍熙二年復置京西南北路本京西路蓋禹貢冀豫荊兗梁五州之域而豫州之壤為多當井柳星張角亢氐之分東暨汝潁西被陝服南略鄢郢北抵河津絲枲漆纊之所出而洛邑為天地之中民性安舒而多衣冠舊族然土地褊薄迫於營養盟津滎陽滑臺宛丘汝陰潁川臨汝在二京之交其俗頗同唐鄧汝蔡率多曠田蓋自唐季之亂土著者寡太宗遷晉雲朔之民於京洛鄭汝之地墾田頗廣民多致富亦由儉嗇而然乎襄陽為汴南巨鎮淮安隨棗陽西城武當上庸東梁信陽其習俗近荊楚
