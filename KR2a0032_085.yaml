body:
  text: 宋史卷八十五志第三十八地理一京城京畿路京東路京西路唐室既衰五季迭興五十餘年更易八姓𧜛縣分裂莫之能一宋太祖受周禪初有州百一十一縣六百三十八戶九十六萬七千三百五十三建隆四年取荊南得州府三江陵府歸峽縣一十七戶一十四萬二千三百平湖南得州一十五監一潭衡邵郴道永全嶽澧朗蔣辰錦溪敘桂陽監縣六十六戶九萬七千三百八十八乾德三年平蜀得州府四十六益彭眉嘉邛蜀綿漢資簡梓遂黎雅陵戎瀘維茂昌榮果閬渠合龍普利興文巴劍蓬壁夔忠萬集開渝涪黔施達洋興元府縣一百九十八戶五十三萬四千三十九開寶四年平廣南得州六十廣韶潮循封端英連雄龔惠康恩春瀧勤新高潘雷羅辨桂賀昭梧蒙恭象富融宜柳嚴思唐雍澄貴蠻橫賓欽潯容牢白廉黨繡鬱林藤竇義禺順瓊崖儋萬安振縣二百一十四戶一十七萬二百六十三八年平江南得州一十九軍三升宣歙池洪潤常鄂筠饒信虔吉袁撫江汀建劍江陰雄遠建昌軍縣一百八戶六十五萬五千六十五計其末年凡有州二百九十七縣一千八十六戶三百九萬五百四太宗太平興國三年陳洪進獻地得州二漳泉縣十四戶十五萬一千九百七十八錢俶入朝得州十三軍一杭蘇越湖衢婺台明溫秀睦福處衣錦縣八十六戶五十五萬六百八十四年平太原得州十軍一並汾嵐憲欣代遼沁隆石寶興縣四十戶三萬五千二百二十七年李繼捧來朝得州四夏銀綏宥雍熙元年復以四州授繼捧自後不復領於職方縣八雍熙中天下上閏年圖州府軍監幾於四百至是天下既一疆理幾復漢唐之舊其未入職方氏者唯燕雲十六州而已至道三年分天下為十五路天聖析為十八元豐又析為二十三曰京東東西曰京西南北曰河北東西曰永興曰秦鳳曰河東曰淮南東西曰兩浙曰江南東西曰荊湖南北曰成都梓利夔曰福建曰廣南東西東南際海西盡巴僰北極三關東西六千四百八十五里南北萬一千六百二十里崇寧四年復置京畿路大觀元年別置黔南路三年並黔南入廣西以廣西黔南為名四年仍舊為廣南西路當是時天下有戶二千八十八萬二千二百五十八口四千六百七十三萬四千七百八十四天下主客戶自至道末四百一十三萬二千五百七十六天禧五年主戶六百三萬九千三百三十一客戶不預焉至嘉祐八年主戶一千二百四十六萬二千三百一十一口二千六百四十二萬一千六百五十一至治平三年天下主客戶一千四百一十八萬一千四百八十六口二千五十萬六千九百八十熙寧十年戶一千四百二十四萬五千二百七十口三千八十萬七千二百十一元祐元年戶一千七百九十五萬七千九十二口四千七萬二千六百六紹聖元年戶一千九百一十二萬九百二十一口四千二百五十六萬六千二百四十三元符三年戶一千九百九十六萬八百一十二口四千四百九十一萬四千九百九十一崇寧元年戶二千二十六萬四千三百七口四千五百三十二萬四千一百五十四各府州下戶口與總數少異姑兩存之視西漢盛時蓋有加焉隋唐疆理雖廣而戶口皆有所不及逮宣和四年又置燕山府及雲中府路天下分路二十六京府四府三十州二百五十四監六十三縣一千二百三十四可謂極盛矣大抵宋有天下三百餘年繇建隆初訖治平末一百四年州郡沿革無大增損熙寧始務闢土而种諤先取綏州韓絳繼取銀州王韶取熙河章惇取懿洽謝景溫取徽誠熊本取南平郭逵取廣源最後李憲取蘭州沈括取葭蘆米脂浮圖安疆等寨雖嘗以河東邊界七百里地與遼人當時王安石議蓋曰吾將取之寧姑與之也逮元祐更張葭蘆等四寨給賜夏人而分畫久不能定紹聖遂罷分畫督諸路各乘勢攻討進築自三年秋八月訖元符二年冬凡陝西河東建州一西安軍二晉寧綏德關三龍平會寧金城城九安西平夏威戎興平定邊威羌金湯白豹會川寨二十八平羌平戎殄羌暖泉米脂克戎安疆橫山綏遠寧羌靈平高平西平新泉蕩羌通峽天都臨羌定戎龕谷大和通秦寧河彌川寧遠神泉烏龍堡十開光通塞石門通會大和通秦寧河彌川寧川三交又取青唐鄯邈川湟寧塞廓龍支宗哥等城建中靖國悉還吐蕃故壤稍紓民力崇寧亟變前議專以紹述為事蔡京始任童貫王厚更取湟鄯廓三州二十餘壘陶節夫鍾傳邢恕胡宗回曾孝序之徒又相與鑿空駕虛馳騖於元符封域之表訖於重和既立靖夏涇原制戎鄜延制羌西寧三城雖夏人浸衰而民力亦弊西事甫定北釁旋起蓋自崇寧以來益梓夔黔廣西荊湖南北迭相視效斥大土宇靡有寧歲凡所建州軍關城寨堡紛然莫可勝紀厥後建燕山雲中兩路粗閲三歲禍變旋作中原版蕩故府淪沒職方所記漫不可考高宗蒼黃渡江駐蹕吳會中原陝右盡入于金東畫長淮西割商秦之半以散關為界其所存者兩浙兩淮江東西湖南北西蜀福建廣東廣西十五路而已有戶一千二百六十六萬九千六百八十四此寧宗嘉定十一年數建國江左又百五十年逮德祐丙子遂併歸于我皇元版圖而天下始復合為一焉今據元豐所定併京畿為二十四路首之以京師重帝都也終之以燕雲以其既得而旋失故附見于後而凡四京之城闕宮室及南渡行在之所其可考者冠于篇首為地理志云東京汴之開封也梁為東都後唐罷晉復為東京宋因周之舊為都建隆三年廣皇城東北隅命有司畫洛陽宮殿按圖修之皇居始壯麗矣雍熙三年欲廣宮城詔殿前指揮使劉延翰等經度之以居民多不欲徙遂罷宮城周回五里南三門中曰乾元宋初依梁晉之舊名曰明德太平興國三年改丹鳳大中祥符八年改正陽明道二年改宣德雍熙元年改今名東曰左掖西曰右掖東西面門曰東華西華舊名寬仁神獸開寶三年改今名熙寧十年又改東華門北曰謻門北一門曰拱宸舊名玄武大中祥符五年改今名熙寧十年改門內西橫門曰臨華乾元門內正南門曰大慶東西橫門曰左右升龍左右北門內各二門曰左右長慶熙寧間改左右長慶隔門曰左右嘉肅左右銀臺東華門內一門曰左承天祥符乾德六年賜名大中祥符元年正月天書降其上詔加祥符二字而增葺之西華門內一門曰右承天左承天門內道北門曰宣祐舊名光天大中祥符八年改大寧明道元年改今名正南門內正殿曰大慶東西門曰左右太和宋初曰日華月華大中祥符八年改今名正衙殿曰文德宋初曰文明雍熙元年改今名熙寧間改南門曰端禮兩掖門曰東西上閣東西門曰左右嘉福宋初曰左右勤政明道元年十月改今名大慶殿舊名崇元乾德四年重修改曰乾元太平興國九年改朝元大中祥符八年改天安明道三年改今名北有紫宸殿舊名崇德明道元年改視朝之前殿也西有垂拱殿舊名長春明道元年改常日視朝之所也次西有皇儀殿開寶四年賜名滋福明道元年十月改又次西有集英殿舊名廣政開寶三年曰大明淳化間曰含光大中祥符八年名會慶明道元年十月改今名宴殿也殿後有需雲殿舊名玉華後改瓊華熙寧初改今名東有升平樓舊名紫雲明道元年改宮中觀宴之所也宮後有崇政殿舊名簡賢講武太平興國二年改今名熙寧間改北橫門曰通極閲事之所也殿後有景福殿殿西有殿北向曰延和便坐殿也大中祥符七年建後苑東門洎北向便殿成賜名宣和門承明殿明道元年改端明二年改今名凡殿有門者皆隨殿名宮中又有延慶舊名萬歲大中祥符七年改安福觀文舊名集聖明道二年改肅儀慶曆八年改今名清景慶雲玉京等殿壽寧堂舊名清淨明道元年改延春閣舊名萬春寶元元年改福寧殿即延慶明道元年改東西有門曰左右昭慶觀文殿西門曰延真其東真君殿曰積慶前建感真閣又有龍圖閣下有資政崇和宣德述古四殿天章閣下有羣玉蘂珠二殿後有寶文閣即壽昌閣慶曆元年改閣東西有嘉德延康二殿前有景輝門後苑東門曰寧陽即宣和門明道元年改苑內有崇聖殿太清樓其西又有宜聖化成即玉宸殿明道元年改金華西涼清心等殿翔鸞儀鳳二閣華景翠芳瑤津三亭延福宮有穆清殿延慶殿北有柔儀殿初有殿無名章獻太后名曰崇徽明道元年改寶慈景祐二年改今名崇徽殿北有欽明殿舊名天和明道元年改觀文又改清居治平三年改今名延福宮北有廣聖宮天聖二年建名長寧景祐二年改內有太清玉清沖和集福會祥五殿建流杯殿於後苑明道元年八月修文德殿成是夜禁中火延燔崇德長春滋福會慶延慶崇徽天和承明八殿命宰相呂夷簡為修葺大內使樞密副使楊崇勳副之發京東西河北淮南江東西路工匠給役內出乘輿物左藏庫易緡錢二十萬助其費以故改諸殿名又有慈德殿楊太后所居景祐元年賜名觀稼殿在後苑觀種稻景祐二年創建延羲閣在崇政殿西邇英閣在崇政殿西南蓋侍臣講讀之所也與延羲同景祐三年賜名隆儒殿邇英閣後小殿皇祐三年始賜名慈壽殿皇太后所居治平元年賜名慶壽宮保慈宮熙寧二年建玉華殿在後苑基春殿熙寧七年建在玉華殿後睿思殿八年建承極殿元豐三年建崇慶隆祐二宮元祐元年建睿成宮神宗所居東宮紹聖二年賜名宣和殿在睿思殿後紹聖二年四月殿成其東側別有小殿曰凝芳其西曰瓊芳前曰重熙後曰環碧元符三年廢崇寧初復作大觀三年徽宗製記刻石實蔡京為之聖瑞宮皇太妃所居因以名宮顯謨閣元符元年建藏神宗御集建中靖國元年改曰熙明尋復舊玉虛殿元符初建玉華閣大觀初建在宣和殿後親蠶宮政和元年建燕寧殿在延福北奉安仁宗慈聖光獻皇后御容延福宮政和三年春新作於大內北拱辰門外舊宮在後苑之西南今其地乃百司供應之所凡內酒坊裁造院油醋柴炭鞍轡等庫悉移它處又遷兩僧寺兩軍營而作新宮焉始南向殿因宮名曰延福次曰蘂珠有亭曰碧琅玕其東門曰晨暉其西門曰麗澤宮左復列二位其殿則有穆清成平會寧睿謨凝和崑玉羣玉其東閣則有蕙馥報瓊蟠桃春錦疊瓊芬芳麗玉寒香拂雲偃蓋翠葆鉛英雲錦蘭薰摘金其西閣有繁英雪香披芳鉛華瓊華文綺絳萼穠華緑綺瑤碧清陰秋香叢玉扶玉絳雲會寧之北疊石為山山上有殿曰翠微旁為二亭曰雲巋曰層巘凝和之次閣曰明春其高踰一百一十尺閣之側為殿二曰玉英曰玉澗其背附城築土植杏名杏岡覆茅為亭修竹萬竿引流其下宮之右為佐二閣曰宴春廣十有二丈舞臺四列山亭三峙鑿圓池為海跨海為二亭架石梁以升山亭曰飛華橫度之四百尺有奇縱數之二百六十有七尺又疏泉為湖湖中作隄以接亭隄中作梁以通湖梁之上又為茅亭鶴莊鹿寨孔翠諸柵蹄尾動數千嘉花名木類聚區別幽勝宛若生成西抵麗澤不類塵境初蔡京命童貫楊戩賈詳藍從熙何欣等分任宮役五人者因各為制度不務沿襲故號延福五位東西配大內南北稍劣其東直景龍門西抵天波門宮東西二橫門皆視禁門法所謂晨暉麗澤者也而晨暉門出入最多其後又跨舊城修築號延福第六位跨城之外浚壕深者水三尺東景龍門橋西天波門橋二橋之下疊石為固引舟相通而橋上人物外自通行不覺也名曰景龍江其後又闢之東過景龍門至封丘門景龍江北有龍德宮初元符三年以懿親宅潛邸為之及作景龍江江夾岸皆奇花珍木殿宇比比對峙中塗曰壺春堂絶岸至龍德宮其地歲時次第展拓後盡都城一隅焉名曰擷芳園山水美秀林麓暢茂樓觀參差猶艮嶽延福也宮在舊城因附見此保和殿政和三年四月作九月殿成總為屋七十五間玉清神霄宮政和三年建舊名玉清和陽在福寧殿東七年改今名上清寶籙宮政和五年作在景龍門東對景暉門既又作仁濟輔正二亭於宮前命道士施民符藥徽宗時登皇城下視之又開景龍門城上作復道通寶籙宮以便齋醮之路徽宗數從復道上往來是年十二月始張燈於景龍門上下名曰預賞其明年乃有期門之事萬歲山艮嶽政和七年始於上清寶籙宮之東作萬歲山山周十餘里其最高一峯九十步上有亭曰介分東西二嶺直接南山山之東有萼緑華堂有書館八仙館紫石巖棲真嶝覽秀軒龍吟堂山之南則壽山兩峯並峙有雁池噰噰亭北直絳霄樓山之西有藥寮有西莊有巢雲亭有白龍沜濯龍峽蟠秀練光跨雲亭羅漢巖又西有萬松嶺半嶺有樓曰倚翠上下設兩關關下有平地鑿大方沼中作兩洲東為蘆渚亭曰浮陽西為梅渚亭曰雪浪西流為鳳池東出為雁池中分二館東曰流碧西曰環山有閣曰巢鳳堂曰三秀東池後有揮雪廳復由嶝道上至介亭亭左復有亭曰極目曰蕭森右復有亭曰麗雲半山北俯景龍江引江之上流注山間西行為漱瓊軒又行石間為煉丹凝觀圜山亭下視江際見高陽酒肆及清澌閣北岸有勝筠庵躡雲臺蕭間館飛岑亭支流別為山莊為回溪又於南山之外為小山橫亙二里曰芙蓉城窮極巧妙而景龍江外則諸館舍尤精其北又因瑤華宮火取其地作大池名曰曲江池中有堂曰蓬壺東盡封丘門而止其西則自天波門橋引水直西殆半里江乃折南又折北折南者過閶闔門為復道通茂德帝姬宅折北者四五里屬之龍德宮宣和四年徽宗自為艮嶽記以為山在國之艮故名艮嶽蔡絛謂初名鳳凰山後神降其詩有艮嶽排空霄因改名艮嶽宣和六年詔以金芝産于艮嶽之萬壽峯又改名壽嶽蔡絛謂南山成又改名壽嶽嶽之正門名曰陽華故亦號陽華宮自政和訖靖康積纍十餘年四方花竹奇石悉聚于斯樓臺亭館雖略如前所記而月增日益殆不可以數計宣和五年朱勔於太湖取石高廣數丈載以大舟挽以千夫鑿河斷橋毀堰拆閘數月乃至賜號昭功敷慶神運石是年初得燕地故也勔緣此授節度使大抵羣閹興築不肯已徽宗晚歲患苑囿之衆國力不能支數有厭惡語由是得稍止及金人再至圍城日久欽宗命取山禽水鳥十餘萬盡投之汴河聽其所之拆屋為薪鑿石為炮伐竹為笓籬又取大鹿數百千頭殺之以衛士云舊城周回二十里一百五十五步東二門北曰望春宋初名和政南曰麗景南面三門中曰朱雀東曰保康大中祥符五年創建西曰崇明西二門南曰宜秋北曰閶闔北三門中曰景龍東曰安遠西曰天波以上宋初仍梁晉舊名至太平興國四年改今名新城周回五十里百六十五步大中祥符九年增築元豐元年重修政和六年詔有司度國之南展築京城移置官司軍營舊城周四十八里二百三十三步周顯德三年築南三門中曰南薰東曰宣化西曰安上東二門南曰朝陽北曰含輝太平興國四年改寅賓後復西二門南曰順天北曰金耀北四門中曰通天天聖初改寧德後復東曰長景次東曰永泰西曰安肅初號衛州門以上皆因周舊名至太平興國四年改今名汴河上水門南曰大通太平興國四年賜名天聖初改順濟後復今名北曰宣澤舊南北水門皆曰大通熙寧十年改汴河下南曰上善北曰通津天聖初改廣津熙寧十年復惠民河上曰普濟下曰廣利廣濟河上曰咸豐下曰善利舊名咸通上南門曰永順熙寧十年賜名其後又於金耀門南置開遠門舊名通遠以上皆太平興國四年賜名天聖初改今名西京唐顯慶間為東都開元改河南府宋為西京山陵在焉宮城周回九里三百步城南三門中曰五鳳樓東曰興教西曰光政因隋唐舊名東一門曰蒼龍西一門曰金虎北一門曰拱宸舊名玄武大中祥符五年改五鳳樓內東西門曰左右永泰門外道北有鸞和門太平興國三年以車輅院門改右永泰門西有永福門興教光政門內各三門曰左右安禮左右興善左右銀臺蒼龍金虎門內第二隔門曰膺福千秋膺福門內道北門曰建禮正殿曰太極舊名明堂太平興國三年改殿前有日月樓日華月華門又有三門曰太極殿門後有殿曰天興次北殿曰武德西有門三重曰應天乾元敷教內有文明殿旁有東上閣門西上閣門前有左右延福門後又有殿曰垂拱殿北有通天門柱廊北有明福門門內有天福殿殿北有寢殿曰太清第二殿曰思政第三殿曰延春東又有廣壽殿視朝之所也北第二殿曰明德第三殿曰天和第四殿曰崇徽天福殿西有金鸞殿對殿南廊有彰善門殿北第二殿曰壽昌第三殿曰玉華第四殿曰長壽第五殿曰甘露第六殿曰乾陽第七殿曰善興西有射弓殿千秋門內有含光殿拱宸門內西偏有保寧門門內有講武殿北又有殿相對內園有長春殿淑景亭十字亭九江池砌臺娑羅亭宮城東西有夾城各三里餘東二門南曰賓曜北曰啓明西二門南曰金曜北曰乾通宮室合九千九百九十餘區夾城內及內城北皆左右禁軍所處皇城周回十八里二百五十八步南面三門中曰端門東西曰左右掖門東一門曰宣仁西三門南曰麗景與金曜相直中曰開化與乾通相直北曰應福內皆諸司處之京城周五十二里九十六步隋大業元年築唐長壽二年增築南三門中曰定鼎東曰長夏西曰厚載東三門中曰羅門南曰建春北曰上東西一門曰關門北二門東曰安喜西曰徽安政和元年十一月重修大內至六年九月畢工朱勝非言政和間議朝謁諸陵敕有司預為西幸之備以蔡攸妻兄宋為京西都漕修治西京大內合屋數千間盡以真漆為飾工役甚大為費不資而漆飾之法須骨灰為地科買督迫灰價日增一斤至數千於是四郊冢墓悉被發掘取人骨為灰矣南京大中祥符七年建應天府為南京宮城周二里三百一