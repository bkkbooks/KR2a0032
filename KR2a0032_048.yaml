body:
  text: 宋史卷四十八志第一天文一儀象極度黃赤道中星土圭夫不言而信天之道也天於人君有告戒之道焉示之以象而已故自上古以來天文有世掌之官唐虞羲和夏昆吾商巫咸周史佚甘德石申之流居是官者專察天象之常變而述天心告戒之意進言於其君以致交修之警焉易曰天垂象見吉凶聖人則之又曰觀乎天文以察時變是也然考堯典中星不過正人時以興民事夏仲康之世胤征之篇乃季秋月朔辰弗集于房然後日食之變昉見於書觀其數羲和以俶擾天紀昏迷天象之罪而討之則知先王克謹天戒所以責成於司天之官者豈輕任哉箕子洪範論休咎之徵曰王省惟歲卿士惟月師尹惟日庶民惟星星有好風星有好雨禮記言體信達順之效則以天降膏露先之至於周詩屢言天變所謂旻天疾威敷于下土又所謂雨無其極傷我稼穡正月繁霜我心憂傷以及彼月而微此日而微燁燁震電不寧不令孔子刪詩而存之以示戒也他日約魯史而作春秋則日食星變屢書而不為煩聖人以天道戒謹後世之旨昭然可覩矣於是司馬遷史記而下歷代皆志天文第以羲和既遠官乏世掌賴世以有專門之學焉然其說三家曰周髀曰宣夜曰渾天宣夜先絶周髀多差渾天之學遭秦而滅洛下閎耿壽昌晚出始物色得之故自魏晉以至隋唐精天文之學者犖犖名世豈非難得其人歟宋之初興近臣如楚昭輔文臣如竇儀號知天文太宗之世召天下伎術有能明天文者試隸司天臺匿不以聞者罪論死既而張思訓韓顯符輩以推步進其後學士大夫如沈括之議蘇頌之作亦皆底於幼眇靖康之變測驗之器盡歸金人高宗南渡至紹興十三年始因祕書丞嚴抑之請命太史局重創渾儀自是厥後窺測占候蓋不廢焉爾寧宗慶元四年九月太史言月食於晝草澤上書言食于夜及驗視如草澤言乃更造統天曆命祕書正字馮履參定以是推之民間天文之學蓋有精於太史者則太宗召試之法亦豈徒哉今東都舊史所書天文禎祥日月薄蝕五緯凌犯彗孛飛流暈珥虹霓精祲雲氣等事其言時日災祥之應分野休咎之別視南渡後史有詳略焉蓋東都之日海內為一人君遇變修德無或他諉南渡土宇分裂太史所上必謹星野之書且君臣恐懼修省之餘故於天文休咎之應有不容不縷述而申言之者是亦時勢使然未可以言星翁日官之術有精粗敬怠之不同也今合纍朝史臣所録為一志而取歐陽修新唐書五代史記為法凡徵驗之說有涉於傅會咸削而不書歸於傳信而已矣儀象曆象以授四時璣衡以齊七政二者本相因而成故璣衡之設史謂起於帝嚳或謂作於宓犧又云璿璣玉衡乃羲和舊器非舜創為也漢馬融有云上天之體不可得知測天之事見於經者惟有璣衡一事璣衡者即今之渾儀也吳王蕃之論亦云渾儀之制置天梁地平以定天體為四游儀以綴赤道者此謂璣也置望筒橫簫於游儀中以窺七曜之行而知其躔離之次者此謂衡也若六合儀三辰儀與四游儀並列為三重者唐李淳風所作而黃道儀者一行所增也如張衡祖洛下閎耿壽昌之法別為渾象置諸密室以漏水轉之以合璿璣所加星度則渾象本別為一器唐李淳風梁令瓚祖之始與渾儀並用太平興國四年正月巴中人張思訓創作以獻太宗召工造於禁中踰年而成詔置於文明殿東鼓樓下其制起樓高丈餘機隱於內規天矩地下設地輪地足又為橫輪側輪斜輪定身關中關小關天柱七直神左搖鈴右扣鍾中擊鼓以定刻數每一晝夜周而復始又以木為十二神各直一時至其時則自執辰牌循環而出隨刻數以定晝夜短長上有天頂天牙天關天指天抱天束天條布三百六十五度為日月五星紫微宮列宿斗建黃赤道以日行度定寒暑進退開元遺法運轉以水至冬中凝凍遲澀遂為疏略寒暑無準今以水銀代之則無差失冬至之日日在黃道表去北極最遠為小寒晝短夜長夏至之日日在赤道去北極最近為小暑晝長夜短春秋二分日在兩交春和秋涼晝夜平分寒暑進退皆由於此並著日月象皆取仰視按舊法日月晝夜行度皆人所運行新制成於自然尤為精妙以思訓為司天渾儀丞銅候儀司天冬官正韓顯符所造其要本淳風及僧一行之遺法顯符自著經十卷上之書府銅儀之制有九一曰雙規皆徑六尺一寸三分圍一丈八尺三寸九分廣四寸五分上刻周天三百六十五度南北並立置水臬以為準得出地三十五度乃北極出地之度也以釭貫之四面皆七十二度屬紫微宮星凡三十七坐一百七十有五星四時常見謂之上規中一百一十度四面二百二十度屬黃赤道內外官星二百四十六坐一千二百八十九星近日而隱遠而見謂之中規置臬之下繞南極七十二度除老人星外四時常隱謂之下規二曰游規徑五尺二寸圍一丈五尺六寸廣一寸二分厚四分上亦刻周天以釭貫於雙規巔軸之上令得左右運轉凡置管測驗之法衆星遠近隨天周遍三曰直規二各長四尺八寸闊一寸二分厚四分於兩極之間用夾窺管中置關軸令其游規運轉四曰窺管一長四尺八寸廣一寸二分關軸在直規中五曰平準輪在水臬之上徑六尺一寸三分圍一丈八尺三寸九分上刻八卦十干十二辰二十四氣七十二候於其中定四維日辰正晝夜百刻六曰黃道南北各去赤道二十四度東西交於卯酉以為日行盈縮月行九道之限凡冬至日行南極去北極一百一十五度故景長而寒夏至日在赤道北二十四度去北極六十七度故景短而暑月有九道之行歲匝十二辰正交出入黃道遠不過六度五星順留伏逆行度之常數也七曰赤道與黃道等帶天之紘以隔黃道去兩極各九十一度強黃道之交也按經東交角宿五度少西交奎宿一十四度強日出於赤道外遠不過二十四度冬至之日行斗宿日入於赤道內亦不過二十四度夏至之日行井宿及晝夜分炎涼等日月五星陰陽進退盈縮之常數也八曰龍柱四各高五尺五寸立於平準輪下九曰水臬十字為之其水平滿北辰正以置四隅各長七尺五寸高三寸半深一寸四隅水平則天地準唐貞觀初李淳風於浚儀縣古嶽臺測北極出地高三十四度八分差陽城四分今測定北極高三十五度以為常準熙寧七年七月沈括上渾儀浮漏景表三議渾儀議曰五星之行有疾舒日月之交有見匿求其次舍經劘之會其法一寓於日冬至之日日之端南者也日行周天而復集於表鋭凡三百六十有五日四分日之幾一而謂之歲周天之體日別之謂之度度之離其數有二日行則舒則疾會而均別之曰赤道之度日行自南而北升降四十有八度而迤別之曰黃道之度度不可見其可見者星也日月五星之所由有星焉當度之畫者凡二十有八而謂之舍舍所以潔度度所以生數也度在天者也為之璣衡則度在器度在器則日月五星可摶乎器中而天無所豫也天無所豫則在天者不為難知也自漢以前為曆者必有璣衡以自驗跡其後雖有璣衡而不為曆作為曆者亦不復以器自考氣朔星緯皆莫能知其必當之數至唐僧一行改大衍曆法始復用渾儀參實故其術所得比諸家為多臣嘗歷考古今儀象之法虞書所謂璿璣玉衡唯鄭康成粗記其法至洛下閎製圓儀賈逵又加黃道其詳皆不存于書其後張衡為銅儀於密室中以水轉之蓋所謂渾象非古之璣衡也吳孫氏時王蕃陸績皆嘗為儀及象其說以謂舊以二分為一度而患星辰稠穊張衡改用四分而復椎重難運故蕃以三分為度周丈有九寸五分寸之三而具黃赤道焉績之說以天形如鳥卵小橢而黃赤道短長相害不能應法至劉曜時南陽孔定製銅儀有雙規規正距子午以象天有橫規判儀之中以象地有時規斜絡天腹以候赤道南北植幹以法二極其中乃為游規窺管劉曜太史令朝崇斛蘭皆嘗為鐵儀其規有六四常定一象地一象赤道其二象二極乃是定所謂雙規者也其制與定法大同唯南北柱曲抱雙規下有縱衡水平以銀錯星度小變舊法而皆不言有黃道疑其失傳也唐李淳風為圓儀三重其外曰六合有天經雙規金渾緯規金常規次曰三辰轉於六合之內圓徑八尺有璿璣規月游規所謂璿璣者黃赤道屬焉又次曰四游南北為天樞中為游筒可以升降游轉別為月道傍列二百四十九交以攜月游一行以為難用而其法亦亡其後率府兵曹梁令瓚更以木為游儀因淳風之法而稍附新意詔與一行雜校得失改鑄銅儀古今稱其詳確至道中初鑄渾天儀于司天監多因斛蘭朝崇之法皇祐中改鑄銅儀于天文院姑用令瓚一行之論而去取交有失得臣今輯古今之說以求數象有不合者十有三事其一舊說以謂今中國於地為東南當令西北望極星置天極不當中北又曰天常傾西北極星不得居中臣謂以中國規觀之天常北倚可也謂極星偏西則不然所謂東西南北者何從而得之豈不以日之所出者為東日之所入者為西乎臣觀古之候天者自安南都護府至浚儀大嶽臺才六千里而北極之差凡十五度稍北不已庸詎知極星之不直人上也臣嘗讀黃帝素書立於午而面子立於子而面午至於自卯而望酉自酉而望卯皆曰北面立於卯而負酉立於酉而負卯至于自午而望南自子而望北則皆曰南面臣始不諭其理逮今思之乃常以天中為北也常以天中為北則蓋以極星常居天中也素問尤為善言天者今南北才五百里則北極輒差一度以上而東西南北數千里間日分之時候之日未嘗不出於卯半而入於酉半則又知天樞既中則日之所出者定為東日之所入者定為西天樞則常為北無疑矣以衡窺之日分之時以渾儀抵極星以候日之出沒則常在卯酉之半少北此殆放乎四海而同者何從而知中國之為東南也彼徒見中國東南皆際海而為是說也臣以謂極星之果中果非中皆無足論者彼北極之出地六千里之間所差者已如是又安知其茫昧幾千萬里之外邪今直當據建邦之地人目之所及者裁以為法不足為法者宜置而勿議可也其二曰紘平設以象地體今渾儀置于崇臺之上下瞰日月之所出則紘不與地際相當者臣詳此說雖粗有理然天地之廣大不為一臺之高下有所推遷蓋渾儀考天地之體有實數有準數所謂實者此數即彼數也此移赤彼亦移赤之謂也所謂準者以此準彼此之一分則準彼之幾千里之謂也今臺之高下乃所謂實數一臺之高不過數丈彼之所差者亦不過此天地之大豈數丈足纍其高下若衡之低昂則所謂準數者也衡移一分則彼不知其幾千里則衡之低昂當審而臺之高下非所當恤也其三曰月行之道過交則入黃道六度而稍却復交則出於黃道之南亦如之月行周於黃道如繩之繞木故月交而行日之陰則日為之虧入蝕法而不虧者行日之陽也每月退交二百四十九周有奇然後復會今月道既不能環繞黃道又退交之漸當每日差池今必候月終而頓移亦終不能符會天度當省去月環其候月之出入專以曆法步之其四衡上下二端皆徑一度有半用日之徑也若衡端不能全容日月之體則無由審日月定次欲日月正滿上衡之端不可動移此其所以用一度有半為法也下端亦一度有半則不然若人目迫下端之東以窺上端之西則差幾三度凡求星之法必令所求之星正當穿之中心今兩端既等則人目游動無因知其正中今以鈎股法求之下徑三分上徑一度有半則兩竅相覆大小略等人目不搖則所察自正其五前世皆以極星為天中自祖耳幾以璣衡窺考天極不動處乃在極星之末猶一度有餘今銅儀天樞內徑一度有半乃謬以衡端之度為率若璣衡端平則極星常游天樞之外璣衡小偏則極星乍出乍入令瓚舊法天樞乃徑二度有半蓋欲使極星游於樞中也臣考驗極星更三月而後知天中不動處遠極星乃三度有餘則祖耳幾窺考猶為未審今當為天樞徑七度使人目切南樞望之星正循北極樞𩹉周常見不隱天體方正其六令瓚以辰刻十干八卦皆刻於紘然紘平正而黃道斜運當子午之間則日徑度而道促卯酉之際則日迤行而道舒如此辰刻不能無謬新銅儀則移刻於緯四游均平辰刻不失然令瓚天中單環直中國人頂之上而新銅儀緯斜絡南北極之中與赤道相直舊法設之無用新儀移之為是然當側窺如車輪之牙而不當衡規如鼓陶其旁迫狹難賦辰刻而又蔽映星度其七司天銅儀黃赤道與紘合鑄不可轉移雖與天運不符至於窺測之時先以距度星考定三辰所舍復運游儀抵本宿度乃求出入黃道與去極度所得無以異於令瓚之術其法本於朝崇斛蘭之舊制雖不甚精縟而頗為簡易李淳風嘗謂斛蘭所作鐵儀赤道不動乃如膠柱以考月行差或至十七度少不減十度此正謂直以赤道候月行其差如此今黃赤道度再運游儀抵所舍宿度求之而月行則以月曆每日去極度算率之不可謂之膠也新法定宿而變黃道此定黃道而變宿但可賦三百六十五度而不能具餘分此其為略也其八令瓚舊法黃道設於月道之上赤道又次月道而璣最處其下每月移一交則黃赤道輒變今當省去月道徙璣於赤道之上而黃道居赤道之下則二道與衡端相迫而星度易審其九舊法規環一面刻周天度一面加銀丁所以施銀丁者夜候天晦不可目察則以手切之也古之人以璿為之璿者珠之屬也今司天監三辰儀設齒于環背不與橫簫會當移列兩旁以便參察其十舊法重璣皆廣四寸厚四分其他規軸椎重朴拙不可旋運今小損其制使之輕利其十一古之人知黃道歲易不知赤道之因變也黃道之度與赤道之度相偶者也黃道徙而西則赤道不得獨膠今當變赤道與黃道同法其十二舊法黃赤道平設正當天度掩蔽人目不可占察其後乃別加鑽孔尤為拙謬今當側置少偏使天度出北際之外自不凌蔽其十三舊法地紘正絡天經之半凡候三辰出入則地際正為地紘所伏今當徙紘稍下使地際與紘之上際相直候三辰伏見專以紘際為率自當默與天合又言渾儀製器渾儀之為器其屬有三相因為用其在外者曰體以立四方上下之定位其次曰象以法天之運行常與天隨其在內璣衡璣以察緯衡以察經求天地端極三明匿見者體為之用察黃道降陟辰刻運徙者象為之用四方上下無所不屬者璣衡為之用體之為器為圓規者四其規之別一曰經經之規二並峙正抵子午若車輪之植二規相距四寸夾規為齒以別去極之度北極出紘之上三十有四度十分度之八強南極下紘亦如之對銜二釭聯二規以為一釭中容樞二曰緯緯之規一與經交於二極之中若車輪之倚南北距極皆九十一度強夾規為齒以別周天之度三曰紘紘之規一上際當經之半若車輪之仆以考地際周賦十二辰以定八方紘之下有趺從一衡一刻溝受水以為平中溝為地以受注水四末建趺為升龍四以負紘凡渾儀之屬皆屬焉龍吭為綱維之四揵以為固象之為器為圓規者四其規之別一曰璣璣之規二並峙相距如經之度夾規為齒對銜二釭釭中容樞皆如經之率設之亦如經其異者經膠而璣可旋二曰赤道赤道之規一刻璣十分寸之三以銜赤道赤道設之如緯其異者緯膠於經而赤道銜於璣有時而移度穿一竅以移歲差三曰黃道黃道之規一刻赤道十分寸之二以銜黃道其南出赤道之北際二十有四度其北入赤道亦如之交於奎角度穿一竅以銅編屬於赤道歲差盈度則並赤道徙而西黃赤道夾規為齒以別均迤之度璣衡之為器為圓規二曰璣對峙相距如象璣之度夾規為齒皆如象璣其異者象璣對銜二釭而璣對銜二樞貫于象璣天經之釭中三物相重而不相膠為間十分寸之三無使相切所以利旋也為橫簫二兩端夾樞屬于璣其中挾衡為橫一棲於橫簫之間中衡為轊以貫橫簫兩末入于璣之罅而可旋璣可以左右以察四方之祥衡可以低昂以察上下之祥浮漏議曰播水之壺三而受水之壺一曰求壺廢壺方中皆圓尺有八寸尺有四寸五分以深其食二斛為積分四百六十六萬六千四百六十曰復壺如求壺之度中離以為二元一斛介八斗而中有達曰建壺方尺植三尺有五寸其食斛有半求壺之水復壺之所求也壺盈則水駛壺虛則水凝復壺之脅為枝渠以為水節求壺進水暴則流怒以搖復以壺又折以為介復為枝渠達其濫溢枝渠之委所謂廢壺也以受廢水三壺皆所以播水為水制也自復壺之介以玉權釃于建壺建壺所以受水為刻者也建壺一易箭則發土室以瀉之求復建壺之泄皆欲迫下水所趣也玉權下水之概寸矯而上之然後發則水撓而不躁也復壺之達半求壺之注玉權半復壺之達枝渠博皆分高如其博平方如砥以為水概壺皆為之冪無使穢遊則水道不慧求壺之冪龍紐以其出水不窮也復壺士紐士所以生法者復壺制法之器也廢壺鯢紐止水之瀋鯢所伏也銅史令刻執漏政也冬設熅燎以澤凝也注水以龍噣直頸附于壺體直則易浚附于壺體則難敗復壺玉為之喙銜于龍噣謂之權所以權其盈虛也建壺之執窒瓬塗而彌之以重帛窒則不吐也管之善利者水所溲也非玉則不能堅良以久權之所出高則源輕源輕則其委不悍而溲物不利箭不效於璣衡則易權洗箭而改畫覆以璣衡謂之常不弊之術今之下漏者始嘗甚密久復先大者管泐也管泐而器皆弊者無權也弊而不可復壽者術固也察日之晷以璣衡而制箭以日之晷跡一刻之度以賦餘刻刻有不均者建壺有眚也贅者磨之創者補之百刻一度其壺乃善晝夜已復而箭有餘才者權鄙也晝夜未復而壺吐者權沃也如是則調其權此制器之法也下漏必用甘泉惡其垽之為壺眚也必用一源泉之冽者權之而重重則敏於行而為箭之情慓泉之鹵者權之而輕輕則椎於行而為箭之情駑一井不可他汲數汲則泉濁陳水不可再注再注則行利此下漏之法也箭一如建壺之長廣寸有五分三分去二以為之厚其陽為百刻為十二辰博牘二十有一如箭之長廣五分去半以為之厚陽為五更為二十有五籌陰刻消長之衰三分箭之廣其中刻契以容牘夜算差一刻則因箭而易牘鐐匏箭舟也其虛五升重一鎰有半鍛而赤柔者金之美者也然後漬而不墨墨者其久必蝕銀之有銅則墨銅之有錫則屑特銅久灂則腹敗而飲皆工之所不材也景表議曰步景之法惟定南北為難古法置為規識日出之景與日入之晝參諸日中之景夜考之極星極星不當天中而候景之法取晨夕景之最長者規之兩表相去中折以參假最短之景為日中然測景之地百里之間地之高下東西不能無偏其間又有邑屋山林之蔽倘在人目之外則與濁氛相雜莫能知其所蔽而濁氛又繫其日之明晦風雨人間烟氣塵坌變作不常臣在本局候景入濁出濁之節日日不同此又不足以考見出沒之實則晨夕景之短長未能得其極數參考舊聞別立新術候景之表三其崇八尺博三寸三分殺一以為厚者圭首剡其南使偏鋭其趺方厚各二尺環趺刻渠受水以為準以銅為之表四方志墨以為中刻之綴四繩垂以銅丸各當一方之墨先約定四方以三表南北相重令趺相切表別相去二尺各使端直四繩皆附墨三表相去左右上下以度量之令相重如一自日初出則量西景三表相去之度又量三表之端景之所至各別記之至日欲入候東景亦如之長短同相去之疏密又同則以東西景端隨表景規之半折以求最短之景五者皆合則半折最短之景為北表南墨之下為南東西景端為東西五候一有不合未足以為正既得四方則惟設一表方首表下為石席以水平之植表于席之南端席廣三尺長如九服冬至之景自表趺刻以為分分積為寸寸積為尺為密室以棲表當極為霤以下午景使當表端副表並趺崇四寸趺博二寸厚五分方首剡其南以銅為之凡景表景薄不可辨即以小表副之則景墨而易度元祐間蘇頌更作者上置渾儀中設渾象旁設昏曉更籌激水以運之三器一機吻合躔度最為奇巧宣和間又嘗更作之而此五儀者悉歸于金中興更謀制作紹興三年正月工部員外郎袁正功獻渾儀木樣太史局令丁師仁始請募工鑄造且言東京舊儀用銅二萬斤今請折半用八千斤有奇已而不就蓋在廷諸臣罕通其制度者乃召蘇頌子取頌遺書考質舊法而亦不能通也至十四年乃命宰臣秦檜提舉鑄渾儀而以內侍邵諤專領其事久而儀成三十二年始出其二置太史局而高宗先自為一儀置諸宮中以測天象其制差小而邵諤所鑄蓋祖是焉後在鍾鼓院者是也清臺之儀後其一在祕書省按儀制度表𩹉凡三重其第一重曰六合儀陽經徑四尺九寸六分闊三寸二分厚五分南北正位兩面各列周天度數南北極出入地皆三十一度少度闊三分陰緯單環大小如陽經闊三寸二分厚一寸八分上置水平池闊九分深四分沿環通流亦如舊制內外八幹十二枝畫艮巽坤乾卦於四維第二重曰三辰儀徑四尺三分闊二寸二分厚五分釭釧刻畫如陽經赤道單環徑四尺一寸四分闊一寸二分厚五分上列二十八宿均天度數闊二分七釐黃道單環徑四尺一寸四分闊一寸二分厚五分上列七十二候均分卦策與赤道相交出入各二十四度弱百刻單環徑四尺五寸六分闊一寸二分厚五分上列晝夜刻數第三重曰四游儀徑三尺九寸闊一寸九分厚五分釭釧刻畫如璿璣度闊二分半望筒長三尺六寸五分內圓外方中通孔竅四面闊一寸四分七釐窺眼闊三分夾窺徑五尺三分鼇雲以負龍柱龍柱各高五尺二寸十字平水臺高一尺一寸七分長五尺七寸闊五寸二分水槽闊七分深一寸二分若水運之法與夫渾象則不復設其後朱熹家有渾儀頗考水運制度卒不可得蘇頌之書雖在大抵於渾象以為詳而其尺寸多不載是以難遽復云舊制有白道儀以考月行在望筒之旁自熙寧沈括以為無益而去之南渡更造亦不復設焉極度極度極星之在紫垣為七曜三垣二十八宿衆星所拱是謂北極為天之正中而自唐以來曆家以儀象考測則中國南北極之正實去極星之北一度有半此蓋中原地勢之度數也中興更造渾儀而太史令丁師仁乃言臨安府地勢向南於北極高下當量行移易局官呂璨言渾天無量行更易之制若用於臨安與天參合移之他往必有差忒遂罷議後十餘年邵諤鑄儀則果用臨安北極高下為之以清臺儀校之實去極星四度有奇也黃赤道黃赤道占天之法以二十八宿為綱維分列四方南北去極各九十有一度有奇南低而北昂去地各三十有六度一定不易者名之曰赤道以日躔半在赤道內半在赤道外出入內外極遠者皆二十有四度以其行赤道之中者名之曰黃道凡五緯皆隨日由黃道行惟月之行有九道四時交會歸於黃道而轉變焉故有青黑白赤四者之異名夫赤道終古不移則星舍宜無盈縮矣然自唐一行作大衍曆以儀揆測之得畢觜參鬼四宿分度與古不同皇祐初日官周琮以新儀測候與唐一行尤異紹聖二年清臺以赤道度數有差復命考正惟牛尾室柳四宿與舊法合其他二十四宿躔度或多或寡蓋天度之不齊古人特紀其大綱後世漸極於精密也若夫黃道橫絡天體列宿躔度自隨歲差而增減中興以來用統元紀元及乾道淳熙開禧統天會元每一曆更一黃道其多寡之異有不可勝載者而步占家亦隨各曆之躔度焉中星中星四時中星見於堯典蓋聖人南面而治天下即日行而定四時虛鳥火昴之度在天夷隩析因之候在人故書首載之以見授時為政之大也而後世考驗冬至之日堯時躔虛至於三代則躔于女春秋時在牛至後漢永元已在斗矣大略六十餘年輒差一度開禧占測已在箕宿校之堯時幾退四十餘度蓋自漢太初至今已差一氣有餘而太陽之躔十二次大約中氣前後乃得本月宮次蓋太陽日行一度近歲紀元曆定歲差約退一分四十餘秒蓋太陽日行一度而微遲緩一年周天而微差積纍分秒而躔度見焉曆家考之萬五千年之後所差半周天寒暑將易位世未有知其說者焉土圭土圭周官大司徒以土圭之法正日景以求地中而馮相氏春夏致日秋冬致月以辨四時之漢之造曆必先定東西立晷儀唐詔太史測天下之晷蓋校定日景推驗氣節必先乎此也宋朝測景在浚儀之嶽臺崇寧間姚舜輔造紀元曆求嶽臺晷景冬至後初限六十二日二十二分蓋立八尺之表俟圭尺上正八尺之景去冬至多寡日辰立為初限用減二至得一百二十日四十二分為夏至後初限以為後法蓋冬至之景長短實與歲差相應而地里遠近古今亦不同焉中興後清臺亦立晷圭如汴京之制冬至必測驗焉統天曆開禧曆亦皆以六十二日數分為冬至初限而議者謂臨安之晷景當與嶽臺異或謂當立八尺之表俟圭景上八尺之景在四十九日有奇當用四十九日五分為臨安冬至後初限用減二至限得一百三十三日有奇為夏至後初限參合天道其法為密焉然土圭之法本以致日景求地中而表景不應災祥繫焉占家知之而亦不能知其所以然也
