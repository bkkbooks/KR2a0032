body:
  text: 宋史卷六十九志第二十二律曆二應天乾元儀天曆步月離入先後曆乾元謂之月離儀天謂之步月離離總五萬五千一百二十秒一千二百四十二乾元轉分一萬六千二百秒一千二百四儀天曆終分二十七萬八千三百一秒一百六十五轉日二十七五千五百四十六秒六千二百一十乾元轉曆二十七一千六百三十秒六千二十儀天曆周二十七五千六百一秒一百六十五曆中日一十三七千七百七十四秒三千一百五乾元不立此法儀天曆中十三日七千八百五十秒五千八十二半儀天有象限六日八千九百七十五秒二千五百四十一少朔差日一九千七百六十二秒三千七百九十乾元轉差一三千八百六十九秒三千九百八十儀天會差日一九千八百五十七秒九千八百三十五儀天又有象差日空四千九百八十秒四千九百五十八太望一百八十二度六千三百四十四秒四千九百五十度母一萬一百秒法一萬二曆同求天正十一月朔入先後曆乾元謂之求月離入曆求弦望入曆儀天謂之推天正經朔入曆以通餘減元積餘以離總去之為總數不盡者半而進位以元法收為日不滿為分如曆中日以下為入先曆以上者去之為入後曆命日算外即得天正十一月朔入先後曆日分累加七日三千八百二十七分秒六盈曆中日及分秒去之各得次朔望入先後曆日分乾元以朔餘減歲積分以轉分去之餘以五因之滿元率收之為度以弦策加之即弦望所入以轉差加之得後朔曆累加之即得弦望入曆及分儀天以閏餘減歲積分餘以曆終分去之不滿以宗法除之為日在象限以下為初限以上去之餘為末限各為入遲疾曆初末限七日初數八千八百八十八乾元初二千六百一十二末數一千一百一十四末三百二十八十四日初數七千七百七十四乾元初二千二百八十五末數二千二百二十八末六百五十五乾元又有二十一日初一千九百五十八末九百八十二二十八日初一千六百三十二末一千三百九又儀天法月離先後度數乾元謂之月離陰陽差儀天謂之求朔弦望昇平定數以月朔弦望入曆先後分通減元法餘進位下以其日損益率展之以元法收為分所得損益次日下先後積為定數其七日十四日如初數以下者返減之以上者去之餘返減末數皆進位下以損益率展之各滿末數為分損益次日下先後積為定數乾元置入曆分以其日損益率乘之元率收為分損益其下陰陽差為定數四七術如初數已下者以初率乘之如初數而一以損益陰陽差為定數若初數以上者以初數減之餘乘末率末數除之用減初率餘加陰陽差各為定數朔弦望定日以日躔月離先後定數先加後減朔弦望中日為定日二曆法同推定朔弦望日辰七直以天正所盈之日加定積視朔弦望中日如入大小雪氣即加去年天正所盈之日分若入冬至氣者即加今年天正所盈之日分日滿七十六去之不滿者命從金星甲子算外即得定朔弦望日辰星直也視朔干名與後朔同者大不同者小其月無中氣者為閏又視朔所入辰分皆與二分相減餘二收用減八分之六其朔定小餘如此以上者進一日朔或有交正見者其朔不進定望小餘在日出分以下者退一日若有初在辰分以下亦如之二曆法同儀天又有求朔弦望加時月度置弦望加時日度其合朔加時月與太陽同度其日度便為月離所次餘加弦望象度及餘秒滿黃道宿次去之即定朔弦望加時日度也九道宿度乾元儀天皆謂之月行九道凡合朔所交冬在陰曆夏在陽曆月行青道冬至夏至後青道半交在春分之宿出黃道東立夏立冬後青道半交在立春之宿出黃道東南至所衝之宿亦如之冬在陽曆夏在陰曆月行白道冬至夏至後白道半交在秋分之宿出黃道西立冬立夏後白道半交在立秋之宿出黃道西北至所衝之宿亦如之春在陽曆秋在陰曆月行朱道春分秋分後朱道半交在夏至之宿出黃道南立春立秋後朱道半交在立夏之宿出黃道西南至所衝之宿亦如之春在陰曆秋在陽曆月行黑道春分秋分後黑道半交在冬至之宿出黃道北立春立秋後黑道半交在立冬之宿出黃道東北至所衝之宿亦如之四序月離為八節九道斜正不同所入七十二候皆與黃道相會各距交初黃道宿度每五度為限初限十二每限減半終九限又減盡距二立之宿減一度少強却從減盡起每限減半九限終十二而至半交乃去黃道六度又自十二每限減半終九限又減一度少強更從減盡起每限增半九限終十二復與日軌相會交初交中半交各以限數遇半倍使乘限度為汎差其交中前後各九限以距二至之宿前後候數乘之半交前後各九限各至二分之宿前後候數乘之皆滿百而一為黃道差在冬至之宿後交初前後各九限為減交中前後各九限為加夏至之宿後交初前後各九限為加交中前後各九限為減大凡月交後為出黃道外交中後為入黃道內半交前後各九限在春分之宿後出黃道外秋分之宿後入黃道內皆以差為加在春分之宿後入黃道內秋分之宿後出黃道外皆以差為減倍汎差退一位遇減身外除三遇加身外除一又以黃道差減為赤道差交初交中前後各九限以差加半交前後各九限皆以差減以黃赤道差減黃道宿度為九道宿度有餘分就近收為太半少之數乾元初數九每限減一終於一限數並同即八十四除之儀天初數一百一十七每限減一十終於二十七以一百一除二曆皆不身外為法初中正交春秋二分冬夏二至前後各九限加減並同應天又儀天即除法是九十乘黃道汎差一百一收為度乃得月與黃赤道定差以上入交定月出入各六度相較之差黃道隨其日行所向斜正各異餘皆同應天儀天有求定朔望加時入遲疾曆初末限置經朔望入遲疾初末限日及餘秒如求定朔弦望法入之即各得所求又求初中正交入曆置其朔望加時入遲疾曆初末限日及餘秒視其日月行入陰陽曆日及餘秒如近前交者即加近後交者即返減交中日餘乃如之各得初中正交入遲疾曆初末限日及餘秒也其加減滿或不足即進退象限及餘秒各得所求又求朔望加時及初中正交入遲疾限日入曆積度各置小餘以其日曆定分乘之宗法收之為分一百一除之為度以加其日下曆積度各得所求又乾元儀天有求正交黃道月度乾元元率通定交度及分以一百二十七乘之滿九十五而一進一等復收為入交度用減其朔加時日度即朔前月離正交黃道宿度儀天置朔望及正交曆積度以少減多餘為月行去交度及分乃視其朔望在交前者加交後者減朔望加時黃道月度為初中正交黃道月度也九道交初月度乾元謂之月離入交九道正交月度九道朔度儀天謂之求月離正交九道宿度置月離交初黃道宿度各以所入限數乘之遇半倍使如百而一為汎差用求黃赤二道差依前法加減之即月離交初九道宿度乾元以日陰陽差陽加陰減為朔望常分又以所入限率乘正交黃道宿度相從之以求黃赤二道差如前加減為月離正交九道宿度以入交定度加而命之即朔月離宿度儀天置正交月離黃道以距度下月九道差宗法乘之以距度所入限數乘度餘從之為總差半而退位一百一收之又計冬夏二至以求度數乘滿九十而一為度差依前法加減為正交月離九道求九道朔月度百約月離先後定數後加先減四十二用減中盈而從朔日迺加交初九道宿次即得所求乾元置九道正交之度及分以入交定度加之命以九道宿次即其朔加時月離宿度及分也儀天法見下乾元又有定交度置月離陰陽定數以七十一乘之滿九百一除之為分用陰減陽加常分為度及分求九道望月度儀天謂之求定朔望加時日月度以象積加朔九道月度命以其道即得所求乾元置朔望加時日相距之度以天中度及分加之為加時象積用加九道朔月度命以其道宿次去之即望日月度及分也自望推朔亦如之儀天求定朔望加時九道日度以其朔望去交度交前者減之交後者加之滿九道宿度去之即定朔望加時九道日度也求定朔望加時九道月度置其日加時九道日度其合朔者非正交即日在黃道月在九道各入宿度多少不同考其去極若應繩準故云月與太陽同度也如求黃道月度法盈九道宿次去之各得其日加時九道宿度自此以後皆如求黃道月度法入之依九道宿度行之各得所求也求晨昏月乾元謂之月離晨昏度儀天謂之求晨昏月度置後曆七日下離分與其日離分相比較取多者乘朔望定分取少者乘晨昏分皆滿元法為分百除為度分仍相減之朔望度多者為後少者為前各得晨昏前後度分前加後減朔望九道月度為晨昏月乾元置其月離差在三百九十三以上者用乘朔望定分以下者只用三百九十三乘為加時分元率除之進一位二百九十四收為度又以離差乘晨昏分亦如前收之為度與加時度相減之加時度多為後少為前即得晨昏前後度及分加減如應天儀天以晨昏分減定朔弦望小餘為後不足者返減之為前以乘入曆定分宗法除之一百一約之為度乃以前加後減加時月度為晨昏月度晨昏象積儀天謂之求晨昏程積度置加時象積以前象前後度前減後加又以後象前後度前加後減即得所求乾元法同儀天以所求朔弦望加時日度減後朔弦望加時日度餘加弦望度及餘為加時程積以所求前後分返其加減又以後朔弦望前後度分依其加減各為晨昏程積度及餘也求每日晨昏月儀天謂之求每日入曆定度累計距後象離分百除為度分用減晨昏象積為加不足返減以距後象日數除之為日差用加減每日離分百除為度分累加晨昏月命以九道宿次即得所求乾元法同儀天從所求日累計距後曆每日曆度及分以減程積為進不足返減之餘為退以距後朔弦望日數均之進加退減每日曆定度及分各為每日曆定度及分也步晷漏二十四氣午中晷景乾元同去極度黃道乾元謂之距中度晨分乾元同冬至一丈二尺七寸一分乾元同一百一十五二十乾元八十二二千七百四十八乾元八二十二百八小寒一丈二尺三寸一分乾元一丈一百一十四五十八乾元八十二二千七百三十五乾元八一尺三寸五十九百二大寒一丈一尺二寸一分乾元同一百一十二乾元三十二乾元八十四二千六百八十八乾元七百八十四八十六立春九尺七寸一分乾元九尺一百八六十七乾元八十七二千六百一十二乾元七百七寸三分九十四六十一雨水八尺二寸一分乾元同一百三八十一乾元九十一二千五百八乾元七百三十二六十七驚蟄六尺七寸四分乾元六尺九十七九十三乾元九十六二千三百八十八乾元六百七寸三分一十四九十九春分五尺四寸三分乾元同九十一三十一乾元一百度二千三百五十乾元六百二十四六十六清明四尺三寸一分乾元同八十四七十七乾元一百五二千二百一十二乾元六百二十四二十四穀雨三尺三寸一分乾元三尺三寸七十八七十九乾元一百九一千九百九十二乾元五百五十六八十九立夏二尺五寸三分乾元二尺五寸七十三九十二乾元一百一十三一千八百八十八乾元五百二十九五十八小滿一尺九寸六分乾元一尺七十度二十七乾元一百一十六一千八百一十二乾元五百九寸三分一十五三十四芒種一尺六寸乾元同六十八二乾元一百一十八一千七百六十五乾元五百一十四十九夏至一尺四寸八分乾元一尺六十七三十九乾元一百一十八一千七百五十二乾元五百四寸七分五十八一十五小暑一尺六寸乾元同六十八二乾元一百一十八一