以上者返減前限餘為下限皆自相乘之其分半以下乘半以上收之以一百通日內其分乃乘之所得在冬至後初象夏至後次象以昇法除之若冬至後次象夏至後初象以平法除之皆為分不滿退除為小分所得置於上位又別置五百五分於下以上減下以下乘上用在昇法者以二千八百五十除之用在平法者以五千五百五十二除之皆為分不滿退除為小分所得以加上位為其日損益數儀天求每日黃道去極度及赤道內外度分若春分後置損益差以五十乘之以一千五十二除之為度不滿以一千四十二除之為分以加六十七度三千八百四十五若秋分後置損益差以五十乘之以一千六十除之為度不滿以一千五十退除為分以減一百一十五度二千二百二十二分即得黃道去極度置去極度分與九十一度三千八百四十五相減餘者為赤道內外度分若黃道去極度分在九十一度三千八百四十五以下者為內若在以上者為外度及分儀天求每日晷漏母各以其日損益差自春分初日以後加一千七百六十八自秋分初日以後減二千七百七十七各得其日晷漏母又曰晨分儀天求每日昏分及距午分置日元分以其日晷漏母減之餘者為昏分又以其日晷漏母減五千五十分餘者為其日距午分月離九道交會乾元謂之交會儀天謂之步交會交總七十一萬七千八百一秒八十二正交三百六十三度八千二百八十三秒七半交一百八十一度九千一百四十二秒五十三半少交九十度九千五百二十一秒二十六太平朔一度四千六百三十二平望空七千三百一十六朔差二度八千八百四十一望差二度一千五百二十五初準一萬六千六百四十一中準一萬八千一百九十一末準一千五百五十乾元交會交率一萬六千秒七千八百九十一交策二十七餘六百二十三秒九千四百五十五朔準二九百三十六秒五百四十五望準十四二千二百五十初限三萬六千五百九十四中限四萬二末限三千四百八儀天步交會交終分二十七萬四千八百四十三秒二千二百七十九交終日二十七餘二千一百四十三秒二千二百七十九交中日一十三餘六千一百二十一秒六千一百二十一交朔日二餘三千二百一十五秒七千七百二十一交望日一十四餘七千七百二十九秒五千前限日一十二餘四千五百一十三秒七千二百七十九後限日一餘一千六百七秒八千八百六十半交差四十五交數五百七十二秒母一萬陰限七千二百八十六交日空小餘六千一百四十六秒三百七十三陽限三千一百七十四月食既限二千五百八十二月食分法九百一十二半中盈度乾元謂之求平交朔日儀天謂之求天正朔入交以通餘減元積七十五展之以四百六十七除為分滿交總去之為總數不盡半而進位倍總數百收為分用減之餘以元法收為度不滿為分命曰中盈度及分乾元置朔分以交率去之餘以五因之滿元率收為日即得平交朔日及分次朔望以朔望準加之即得所求儀天置天正朔積分以交終分去之滿宗法為日即得所求求次朔望中盈儀天謂之求次朔入交各置天正經朔中盈度分視十一月望十二月朔望中日如二十九日五千三百七以下者即加朔望差度分秒餘月即加平朔望度分秒即得所求乾元法見上儀天置天正朔入交汎日餘秒如交朔及交望餘秒皆滿交終日及餘秒即去之各得朔望入交汎日及餘秒月離朔交初度分乾元謂之求朔望交分儀天謂之求入交常日置其朔中盈度分常與其朔常日度分合之如正交以下者減半法以上者倍而加之加減訖為定用減天正加時黃道宿度分餘命起天正之宿初算即得所求乾元置平交朔望日及分以元率通之以日陰陽差陽加陰減為朔望交分儀天以其日入盈朔限昇平定數昇加平減入交汎日即為其朔望入交常日也儀天又有求朔望入定交日置其日入遲疾限昇平定數以交差乘之如交數而一昇加平減入交常日即為入定交日月入陰陽曆乾元謂之求朔望陰陽定分儀天謂之求月行陰陽曆以月離先後定數先加後減朔望中盈用加朔望常日月分分即百除度即百通如中準以下者為月出黃道外以上者去之餘為月入黃道內乾元以一百四十二乘陰陽差一千八百二除陽加陰減朔望交分為度定分中限以上為陽以下為陰儀天視入交定日及餘秒在交中日以下為陽以上者去之餘為月入陰曆求食甚定餘置朔定分如半法以下者返減半法餘為午前分前以上者減去半法餘為午後分以乘三百如半晝分而一為差午後加之午前半而減之加減定朔分為食定餘以差皆加午前後分為距中分其望定分便為食定餘乾元以半晝刻約刻法為時差乃視定朔小餘在半法以下為用減半法為午前分以上者去之為午後分以時差乘五因之如刻法而一午前減午後加又皆加午前後分為距日分刻法而一為距午刻分月只以定朔小餘為食定餘儀天置月行去交黃赤道差視月道差如黃赤道交者依其加減不如黃赤道交者返其加減定朔望小餘為食甚餘亦返其加減去交定分其日食則又以其日晝刻其三百五十四為時差乃視食甚餘如半法以下返減半法餘為初率半法以上者半法去之餘為末率滿一百一收之為初率以減末率倍之以加食甚餘為食定餘亦加減初末率為距午退分置之皆如求發斂加時術入之即日月食甚辰刻及分也入食限置黃道內外分如初準已上末準已下為入食限望入食限則月食朔入食限則日食月在黃道內則日食在外則不食望則無問內外皆食末準已下為交後分初準以上者返減中準為交前分乾元置陰陽定分在初限以上末限以下為入食限餘同應天儀天置朔望入交月行陰陽曆日及餘秒如前限以上後限以下者為入食限望入食限則月食朔入食限月入陰曆則日食如後限以下為交後限以上以減交中日及餘秒為交前限各得所求入盈縮曆乾元儀天不立此法置朔定積如一百八十二日六千二百二十三以下為入盈日分以上者去之餘為入縮日分黃道差乾元謂之求晷差儀天謂之求黃道食差置其朔入曆盈縮日及分如四十五日以上一百三十七日以下皆以一千五百乘為汎差如四十五日以下返減之餘為初限日一百三十七日以上者減去之餘為末限日及分以六十七乘半之用減汎差以乘距午分以元法收為黃道定分入盈以定分午前內減外加午後內加外減入縮以定分午前內加外減午後內減外加乾元置入氣日以距冬至之氣以十五乘之以所入氣日通之以一百八十二日以下為入陽曆赤道差乾元謂之求離差儀天謂之求赤道食差置入盈縮曆日及分如九十一日以下返減之為初限日以上者用減一百八十二日半餘為末限日及分四因之用減三百七十四為汎差以乘距中分如半晝分而一用減汎差為赤道定分盈初縮末內減外加縮初盈末內加外減乾元計春秋二分後日加入氣日以十五乘在九十以下以九十一乘退為汎差九十一以上去之餘以九十一乘退一等以減八百一十九為汎差二分氣內置入氣日以九十一乘退為汎差以半晝刻而一以乘距午分用加減汎差為離差食甚在出沒以前者不用求離差只用汎差春分後陰加陽減秋分後陰減陽加儀天二分後益差至二至積差皆二千八百二十六自後累減至二分空冬至後日損三十一小分八十夏至後日益三十小分十五又以宗法乘積差各以盈縮初末限分除之為日差乃以末限累增初限累損各為每日食差又以半晝刻數約其日食差以乘食甚距午正刻所得以減食差餘為定數餘同乾元日食差依黃赤二差同名相從異名相消為食差二曆法同距交分乾元謂之去交分儀天謂之去交定分置交前後分以黃赤二差加減之為距交分如月在內道不足減者返減入外道不食如月在外道不足減返減食差為返減入內道即有食乾元置陰陽曆去交前後分以食差合加減者依其加減所得為去交前後定分月在陰曆去交前後分不足減者即返減食差交前減之餘者為得陽曆交後得減之餘者為陽曆交前定分並不入食限月在陽曆去交前後分不足減者亦返減食差交前減之餘者為陰曆交後定分交後減之餘者為陰曆交前定分並入食限儀天應食差同名相從異名相消餘同乾元法日食分置距交分如四百二十以下者類同陽曆分以上者去之為陰曆分又以食定餘減四分之三午前倍之午後半之皆退一等用減陰陽曆分為食定分如不足減即返減之餘進一位加陰曆分為食定分陽以四十二除為食之大分陰九百六十以下返減之如九十六而一為食之大分命十為限乾元置交前後分以食差加減之為定交分在九百二十以下為陽以上去之為陰在陽以九十四在陰以二百一十三除為大分餘同應天儀天置入限去交定分減七百二十八陽限以上為陰曆食以陽限去之餘減陰限為陰曆食分以下者為陽曆食分亦減三百一十七如限除之皆進一位各命十為限餘同應天月食分置黃道內外前後分如食限三百四十以下者食既以上者返減末準餘以一百二十一除為月食之大分其食五分以下在子正前後八刻內以二百四十二除為食之大分命十為限其前後分以九百以上入或食或不食之限乾元交定分在七百五十二以下食既以上返減末限以二百六十四除之為大分儀天陽減陰加前後定分九百一十二半在既限以下食既以上以去交分減之以月食法除之為大分日月食初復末乾元謂之求定用刻儀天謂之求日月汎用分求初復末百通日月食之大小分以一千三百三十七乘之各如其日離分為定用分加食定餘為復末定分減之為初定分其月食以食限減定用分用減食甚為初定分如不足減者即以食限分如望定餘為食定分餘却依日食加減各得月食初復末定分也乾元月以五百八十八日以五百二十九秒二十乘所食分退一等半之為定用刻儀天日以五百四十五秒四十月以六百六皆乘所食分其小分以本母除從之為泛用分其食又視去交定分在一千七百二十六以下增半刻八百五十六以下又增半刻以一千三百五十乘以辰定分除為定用刻皆減定朔望小餘為初加之為復末日食起儀天謂之求日食初起視距交分如四百二十以上者初起西北甚於正北復於東北如以下者初起西南甚於正南復於東南凡食八分以上者皆初起正西復於正東儀天乾元日在陰曆初起西北在陽曆初起西南餘並同應天月食起乾元謂之月食初定儀天謂之月食初起月在內道初起東南甚於正南復於西南月在外道初起東北甚於正北復於西北凡食八分以上者初起正東復於正西乾元儀天以內道為陰曆外道為陽曆餘皆同應天而儀天又法云此法據古經所載以究天體食在午中前後一辰之內其餘方若要的驗當視日月食時所在方位高下審詳黃道斜正月行所向起復滿皆可知也帶食出入儀天謂之求帶食出入見食分數視其日出入分如在初定分以上復末定分以下即帶食出入食甚在出入分以下以出入分減復末定分為帶食差食甚在出入分以上者以初定分減出入分為帶食差以乘食定分滿定用而一日陽以四十二陰以九十六月一百二十一除之為帶食之大分餘為小分乾元各以食甚餘與其日晨昏分相減餘為帶食差其帶食差在定用刻以下者即帶食出入以上者即不帶食出入也以帶食差乘所食之分滿定用刻而一所得以減所食之分即帶食出入所見之分也其朔日食甚在晝者晨為已食之分昏為所殘之分若食甚在夜昏為已食之分晨為所殘之分其月食見此可以知之也儀天以食甚餘減晨昏分餘為出入前分不足者返減食甚餘為出入後分以乘所食之分其食分以本母通之從其小分滿定用分除之所得以本母約之不滿者半以上為半強半以下為半弱即得帶食出入之分數也其日月食甚在出入前者為所殘之分在出入後者為已退之分更點乾元儀天謂之月食入定點各置初食甚復末定分如晨分以下者加晨分昏分以上者減去昏分皆以更分除為更數不盡以點分除之為點數命初更算外即得所求乾元法同儀天倍其日晨分以五除之為更分又以五除之為點分乃視所求小餘如晨分以下加晨分昏分以上減去昏分求更點並同應天日月食宿分乾元謂之日月食宿以天正冬至黃道日度加朔望常日月度命起斗初算外即日月食在宿分也乾元以距日沒辰至食甚辰之數約其日離差用加昏度儀天用加時定月度也
