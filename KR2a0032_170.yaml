記觀察支使防禦判官團練判官奉議郎文林郎從事郎從政郎兩使初等職官令録留守推官觀察推官軍事判官軍事推官司録參軍録事參軍團練推官軍監判官防禦判官縣令通直郎修職郎知令録知司録參軍知録事參軍縣丞宣教郎迪功郎判司簿尉軍巡判官司理參軍司法參軍司戶參軍主簿縣尉宣義郎致仕凡文武朝官內職引年辭疾者多增秩從其請或加恩其子孫乾德元年太子太師致仕侯益來預郊祀太祖優待之因詔曰羣官列位自有通規舊德來朝所宜加禮且表優賢之意用敦尚齒之風自今一品致仕官曾帶平章事者每遇朝會宜綴中書門下班二年令藩鎮帶平章事求休致者亦如之咸平五年詔文武官年七十以上求退者許致仕因疾及有贓犯者聽從便牧伯內職三班皆換環衛幕職州縣外官景德元年三月詔三班使臣七十以上視聽未衰者與釐務其老昧不任及年七十五以上者借職授支郡上佐奉職殿直授節鎮上佐不願者聽歸鄉里凡升朝官遇慶恩父在者授致仕官其不在者文官始大理評事武官始副率再經恩纍加焉祖在而求回授者亦聽皆不給奉亦有子居要近加賜章服者天聖明道間員外郎已上致仕者録其子試祕書省校書郎三丞已上為太廟齊郎無子聽降等官其嫡孫若弟姪一景祐三年詔曰致仕官舊皆給半奉而未嘗為顯官者或貧不能自給豈所以遇高年養廉恥也其大兩省大卿監正刺史閣門使以上致仕者自今給奉並如分司官例仍歲時賜羊酒米麵令所在長吏常加存問其後又許致仕官子孫免選除近官四年臣僚有請致仕未及録其子孫而遽亡者命既出輔臣皆謂法當追收仁宗憫之竟官其後侍御史知雜事司馬池言文武官年七十以上不自請致仕者許御史臺糾劾以聞慶曆中權御史中丞賈昌朝又言臣僚年七十而筋力衰者並優與改官致仕雖七十而未衰及別有功狀朝廷固留任使者勿拘此令在京若尚書工部侍郎俞獻卿少府監畢世長太常少卿李孝若尚書駕部郎中李士良在外若給事中盛京光祿卿王盤太常少卿張效尚書兵部郎中張億皆耄昏不可任事並請除致仕詔在京者令中書體量在外者下諸處曉諭之皇祐中知諫院包拯吳奎亦言願令御史臺檢察年七十已上移文趣其請老不即自陳者直除致仕朝廷未行奎復言國家謹禮法以維君子明威罰以御小人君子所顧者禮法也小人所畏者威罰也繇文武二選為士大夫是皆君子之地也儻不以禮法待之則是廢名器而輕爵祿七十致仕學者所知而臣下引年自陳分之常也人君好賢樂善而留之仁之至也自三代以來用此以塞貪墨聳廉隅近者句希仲陸軫等皆以年高特與分司初欲風動羣臣而在位殊未有引去者是臣言未效也請詳前奏施行於是詔少卿監以下年七十不任釐務者外任令監司在京委御史臺及所屬以狀聞嘗任館閣臺諫官及提點刑獄者令中書裁處待制已上能自引年則優加恩禮然是時言事之人競欲擊劾大臣有高年者俱不自安仁宗手詔曰老臣朕之所眷禮也進退體貌恩意豈不有異哉凡嘗預政事之臣自今毋或遽求引去臺諫官勿以為言其風動勸勵之方又如此至於因事責降分司或老病不任官職之事或居官犯法或以不治為所部劾奏衝替而求致仕者子孫更不推恩雖或推恩其除官例皆降等若耆老舊臣體貌優異賞或延于子孫奉或全給半給歲時問勞皆有禮意治平四年神宗即位龍圖閣直學士兼侍讀李柬之李受相繼致仕舊制閣門無謝辭例帝特召柬之對延和殿命坐賜茶以受先朝藩府舊僚升其子一任差遣并録其孫皆宴餞資善堂命講讀官賦詩御製詩序以寵其行示異數也是歲又以果州團練使何誠用惠州防禦使馮承用嘉州團練使劉保吉昭州刺史鄧保壽皆年七十以上至八十餘並特令致仕以樞密院言致仕雖有著令臣僚鮮能自陳故也熙寧元年以定國軍節度使李端願為太子少保致仕故事多除上將軍帝令討閲唐制優加是命二年以觀文殿學士吏部尚書趙概為太子少師致仕故事再請則許概三乞始從優耆舊也三年編修中書條例所言人臣非有罪惡致仕而去人君遇之如在位時禮也近世致仕並與轉官蓋以昧利者多知退者少欲加優恩以示勸奬推行既久姑從舊例若兩省正言以上官三班使臣大使臣橫行正任等並不除為致仕官致仕帶職者皆落職而後優遷其官看詳別無義理但致仕恩例不均如諫議大夫不可改給事中並轉工部侍郎乃是超轉兩資工部尚書並除太子少保乃是超轉六資若知制誥待制官卑者除卿監緣知制誥待制待遇非與卿監比今他官致仕皆得遷官此獨因致仕更見退抑供奉官侍禁八品除率府副率蓋六品諸司副使承制崇班七品除將軍乃三品至於節度使除上將軍防禦團練刺史並除大將軍緣諸衛名額不一至有刺史除官高於防禦使者今若令文武官帶職致仕人許仍舊職止轉一官及文臣正言武臣借職以上皆得除為致仕官則無輕重不等之患若選人令録以上並除朝官經恩皆得封贈蔭及數世旁支例得贖罪免役又京官致仕亦止遷一官若光祿寺丞致仕有出身除祕書省著作佐郎無出身除大理寺丞而令録職官乃除太子中允或中舍殊未為當若進納出身人例除京官至有經覃恩遷至升朝官者類多兼并有力之家皆免州縣色役及封贈父母如京官七品除衙前外亦免餘色役尤為僥幸條例繁雜無所適從如録事參軍或除衛尉寺丞或除大理評事或除奉禮郎恩例不同可以因緣生弊今定凡文臣京朝官以上各轉一官帶職仍舊不轉官乞親屬恩澤者依舊條選人依本資序轉合入京朝官進納及流外人判司簿尉除司馬令録除別駕在京諸司勒留官依簿尉以上親賢勞舊合別推恩者取旨歷任有入己贓不得乞親戚恩澤仍不遷官其致仕官除中書樞密院外並在見任官之上致仕及三年之上元非因過犯年未及七十不曾經封及陳乞親戚恩澤却願仕宦並許進狀述若有薦舉者各依元資序授官其才行為衆所知朝廷特任使者不拘此法從之自此宰相以下並帶職致仕四年以端明殿學士尚書右丞王素為工部尚書端明殿學士致仕觀文殿學士兵部尚書歐陽修為太子少師觀文殿學士致仕帶職致仕自素始也五年守司空兼侍中曾公亮遷守太傅致仕特許入謝以公亮逮事三朝既加優禮仍給見任支賜十月詔兩省以上致仕官毋得因大禮用子升朝封遷官先是王安石言李端願李柬之封中書失檢舊例法當改正帝曰如此則獨不被恩安石曰封初無義理今既未能遽革庸可承誤為例如三師三公官因子孫郊恩授尤非宜也帝從之元豐三年詔自今致仕官遇誕節及大禮許綴舊班以禮部侍郎范鎮居都城外遇同天節乞隨散官班上壽帝令鎮班見任翰林學士上故有是詔又詔致仕官朝失儀勿劾並著為令又詔自今致仕官領職事者許帶致仕該遷轉者轉寄祿官若止係寄祿官即以本官致仕其見任致仕官除三師三公東宮三師三少外餘並易之六年以守太尉開府儀同三司知河南府文彥博為河東永興節度使守太師致仕彥博辭兩鎮止以河東舊鎮貼麻行下彥博又言前辭闕下之日嘗奏得致仕後當親辭天陛今既得請欲赴闕廷降詔從之七年詔文臣中大夫武臣諸司使以下致仕更不加恩元祐元年樞密院奏諸軍年七十若以疾假滿百日不堪醫治差使者諸廂都指揮使除諸衛大將軍致仕諸軍都指揮使諸班直都虞候帶遙郡除諸衛將軍致仕諸班直上四軍除屯衛拱聖以下除領軍衛並有功勞者為左無則為右從之四年詔應乞致仕而不願轉官者受敕後所屬保明以聞當與推恩中大夫至朝奉郎及諸司使本宗有服親一人蔭補恩澤橫行諸司副使見有身自蔭補人及內殿承制崇班閣門祗候見理親民并承議奉議郎許陳乞有服親一人恩例中大夫中散大夫諸司使帶遙郡者蔭補外準此即朝奉郎以上及諸司使雖未授敕而身亡在外者以乞致仕狀到門下省日在京以得旨日亦許陳乞有服親一人恩例六年監察御史徐君平言文臣致仕以年七十為斷而使臣年七十猶與近地監當至八十乃致仕願許其致仕之年如文臣法而給其奉從之三省言張方平元係宣徽南院使檢校太傅太子少師致仕元豐官制行廢宣徽使元祐三年復置儀品恩數如舊制方平依舊帶宣徽南院使致仕紹聖三年詔文武官該轉官致仕依舊出告外其餘守本官致仕者並降敕更不給告內因致仕合該乞恩澤人更不具鈔令尚書省通書三司入熟狀仍不候印畫又詔應臣僚丁憂中不許陳乞致仕建中靖國元年尚書省言臣僚在憂制中不得陳乞致仕其間有官序合得致仕恩澤之人合行立法詔臣僚丁憂中遇疾病危篤其官序合該致仕恩澤者聽以前官經所屬自陳大觀二年詔致仕官年八十以上應給奉者以緡錢充政和六年提舉廣東學事孫璘言諸州致仕官居鄉者乞許令赴貢士宴擇其年彌高者而惇事之使長幼有序獻酬有禮人知里選之法孝悌之義從之宣和四年詔六曹尚書致仕遺表恩澤共與四人其餘侍從官三人立為定制建炎間嘗詔文武官陳乞致仕朝廷不從致有身亡之人許依條陳乞致仕恩澤及陳乞致仕而道路不通不曾被受敕命亦許州軍保明推恩時強行父博學清修不緣事故疾病慨然請老葉份言之許令再仕王次翁年未六十浩然休退呂祉言之落致仕特令再仕凡類此者蓋因其材而挽留之也直祕閣致仕鄭南掛冠已久年德俱高大臣言之詔除祕閣修撰仍舊致仕優其恩不奪其志也呂頤浩以少保乞除一寄祿官致仕詔除少傅依前鎮南軍節度使成國公致仕韓世忠以太傅鎮南武安寧國軍節度使充醴泉觀使咸安郡王乞身詔除太師致仕因將相之知止而優其歸也楊惟忠邢煥皆以節度致仕臣僚言祖宗時節將臣僚得謝不以文武並納節除一官以今日不復納節換官為非詔今後依祖宗典故蓋不以私恩勝公法也昭慶軍節度使開府儀同三司充萬壽觀使韋淵乞守本官致仕詔免赴朝參仍依兩府例合破請給人從優親之恩而異之也隆興以後因臣僚言年七十不陳乞致仕者除合得致仕或遺表恩澤外並不許遇郊奏薦已而復詔郊祀在近未致仕人更許陳乞奏薦一次可以不豫而豫之示厚恩也執政在謫籍者陳乞致仕雖許復而寢罷合得恩澤只據見存階官蔭補淳熙十六年寧武軍承宣使提舉佑神觀王友直復奉國軍節度使致仕臣僚論列仍守本官職致仕可以豫而不豫嚴公法也抑揚輕重間可以見優老恤賢之意可以識制情抑幸之術故備録于篇文臣蔭補太師至開府儀同三司子承事郎孫及期親承奉郎大功以下及異姓親登仕郎門客登仕郎不理選限知樞密院事至同知樞密院事子承奉郎孫及期親承務郎大功以下及異姓親登仕郎門客登仕郎不理選限太子太師至保和殿大學士子承奉郎孫及期親承務郎大功以下登仕郎異姓親將仕郎太子少師至通奉大夫子孫及期親承務郎大功親登仕郎異姓親登仕郎小功以下親將仕郎御史中丞至侍御史子承務郎孫及期親登仕郎大功將仕郎小功以下及異姓親將仕郎中大夫至中散大夫子通仕郎孫及期親登仕郎大功將仕郎小功以下將仕郎太常卿至奉直大夫子登仕郎孫及期親將仕郎大功小功親將仕郎國子祭酒至開封少尹子孫及小功以上將仕郎朝請大夫帶職朝奉郎以上理職司資序及不帶職致仕者同子將仕郎小功以上親將仕郎緦麻上州文學注權官一任回注正官謂帶職朝奉郎以上亡歿應蔭補者廣南東西路轉運副使子登仕郎孫及期親將仕郎提點刑獄子將仕郎孫及期親將仕郎武臣蔭補樞密使開府儀同三司子秉義郎孫及期親忠翊郎大功以下親承節郎異姓親承信郎知樞密院事同知樞密院事樞密副使太尉節度使子忠訓郎孫及期親成忠郎大功承節郎小功以下及異姓親承信郎諸衛上將軍承宣使觀察使通侍大夫子成忠郎孫及期親保義郎大功以下承信郎及異姓親承信郎樞密都承旨正侍大夫至右武大夫防禦使團練使延福宮使至昭宣使任入內內侍省都知以上子保義郎孫及期親承節郎大功以下親內各奏異姓親者同承信郎刺史子承節郎孫及期親承信郎大功以下進武校尉諸衛大將軍武功至武翼大夫樞密承旨至諸房副承旨子承節郎孫及期親承信郎大功以下進武校尉諸衛將軍正侍至右武郎武功至武翼郎子承信郎孫進武校尉期親進義校尉樞密院逐房副承旨子承信郎訓武修武郎及閣門祗候子進義校尉忠佐帶遙郡者每兩遇大禮蔭補子刺史進武校尉團練使防禦使承信郎臣僚大禮蔭補宰相執政官本宗異姓門客醫人各一人東宮三師三少至諫議大夫權六曹侍郎侍御史同本宗一人寺長二監長二祕書少監國子司業起居郎舍人中書門下省檢正尚書省左右司郎官樞密院檢詳若六曹郎中殿中侍御史左右司諫開封少尹子或孫一人致仕蔭補曾任宰相及見任三少使相三人曾任三少使相執政官見任節度使二人太中大夫及曾任尚書侍郎及右武大夫以上并曾任諫議大夫以上及侍御史一人遺表蔭補曾任宰相及見任三少使相五人曾任執政官見任節度使四人太中大夫以上一人諸衛上將軍承宣使四人觀察使三人
