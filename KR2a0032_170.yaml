body:
  text: 宋史卷一百七十志第一百二十三職官十雜制贊引導從賜食邑實封使職宮觀贈官封致仕蔭補贊引舊中書門下翰林學士御史中丞並緋衣雙引仍傳呼開寶中學士止令一吏前導亦罷傳呼惟謝恩初上日雙引傳呼云使相僕射兩省五品已上一吏前引樞密使兼相者二吏不贊引大中祥符五年止令於本廳贊引不帶相及副使止令本院紫衣吏前贊引之淳化四年令東宮三少尚書丞郎入朝以緋衣吏前導並通官呵止二品已上用朝堂驅使官餘用本司驅使官宰臣親王仍令紫衣一吏引馬導從中書樞密宣徽院御史臺開封府金吾司皆有常從景德三年詔諸行尚書文明殿學士資政殿大學士給從七人學士丞郎六人給事諫議舍人五人諸司三品四人於開封府金吾司差借每季代之中書先差金吾從人自今亦令參用開封府散從官宰臣參知政事僕射御史大夫中丞知雜皆通官呵止行人淳化四年令東宮三少尚書丞郎並通官呵止大中祥符五年以羣官導從不合品式命翰林學士李宗諤龍圖直學士陳彭年與禮官詳定宗諤等請自今除中書樞密宣徽使御史中丞知雜御史金吾並攝事清道如舊制呵導外僕射已上及三司使知開封府止四節尚書文明殿學士資政殿大學士三節丞郎已上三司副使兩節大兩省卿監一節小兩制御史郎中員外諸司四品三司開封府判官推官二人前行引不得過五步合於金吾借從人者以諸軍剩員代之又外任節鎮知州都監從軍士七十人通判十五人防團軍事知州都監五十人通判十人河河東陝西駐泊兵處節鎮知州都監百人防團軍事知州都監七十人轉運使三十人咸平二年詔節度觀察防團刺史或別鎮他鎮其給使者止令本使給之景德六年令牧守以州兵隨行者以一年為限副使二十五人提點刑獄官亦給軍士副留守節度行軍副使留守兩使判官給散從官十五人小尹掌書記支使防禦團練副使兩使推官十人兩浙推官防團軍事判官推官軍監判官七人録事諸曹給承符人縣令簿尉手力弓手其代還者給人護送有差賜六劍履上殿詔書不名贊拜不名入朝不趨紫金魚袋緋魚袋右升朝官該恩著緑二十周年賜緋魚袋著緋及二十周年賜紫金魚袋特旨者係臨時指揮食邑一萬戶八千戶七千戶六千戶五千戶四千戶三千戶二千戶一千戶七百戶五百戶四百戶三百戶二百戶右宰相親王樞密使經恩加一千戶兩府使相節度使七百戶宣徽三司使觀文殿大學士以下至直學士文臣侍郎武臣觀察使宗室正任以上皇子上將軍駙馬都尉加五百戶宗室大將軍以上加四百戶知制誥待制并文臣少卿監武臣諸司副使宗室副率已上并承制崇班軍員等初該恩加三百戶承制崇班軍員再該恩二百戶二千戶以上雖有加例緣無定法親王重臣特加有至萬戶者食實封一千戶八百戶五百戶四百戶三百戶二百戶一百戶右宰臣親王樞密使經恩加四百戶兩府使相節度宣徽使皇子上將軍并宗室駙馬都尉任觀察使已上加三百戶觀文殿學士并宗室正任已上騎都尉加二百戶武臣崇班宗室副率已上加一百戶五百戶已上雖有加例緣無定法親王重臣有特加至數千戶者三朝志云檢校兼試官之制檢校則三師三公僕射尚書散騎常侍賓客祭酒卿監諸行郎中員外郎之類兼官則御史大夫中丞侍御殿中監察御史試秩則大理司直評事祕書省校書郎凡武官內職軍職及刺史已上皆有檢校官兼官內殿崇班初授檢校祭酒兼御史大夫三班及吏職蕃官諸軍副都頭加恩初授檢校太子賓客兼監察御史自此纍加焉廂軍都指揮使止於司徒軍都指揮使忠佐馬步都頭止於司空親軍都虞候忠佐副都頭以上止於僕射諸軍指揮使止於吏部尚書其官止若遇恩例則或加階爵功臣幕職初授則試校書郎再任如至兩使推官則試大理評事掌書記支使防禦團練判官以上試大理司直評事又加則兼監察御史亦有至檢校員外郎已上者行軍副使皆檢校員外已上朝官階勳高遇恩亦有加檢校官郎中則卿監少監員外郎則郎中太常博士以下則員外郎並無兼官其解褐評事校書郎正字寺監主簿助教者謂之試銜有選集同出身例使職兼領者親祀南郊則有大禮禮儀儀仗鹵簿橋道頓遞五使藉田泰山封禪汾陰奉祀恭上寶冊南郊恭謝皆如之自餘行禮或止有大禮禮儀使建隆中南郊置儀仗都部署副都署經始大禮則有經度制置使副巡幸有行宮都部署行宮有三司使副使判官行宮使都監舊南郊止有御營使咸平中置行宮使又有車駕前後行宮四面闌前收後郊壇巡檢巡闌儀仗勾當編排鹵簿其百司皆有行在之名舊巡幸百司皆稱隨駕大中祥符初並同行在某司京師居留則有大內都部署皇城都點檢巡檢及增新舊巡檢大閲亦置征行則有招討使招安使或云捉賊招安安撫使名者排陳使都監前軍先鋒大陳行營壕寨頭車洞子招收部署鈐轄都監策應之名又有拐子馬無地名馬選武幹者別領之親征則冠以駕前之號廉訪民瘼則有巡撫大使副大使安撫使副使都監採訪使副使或官卑者止云巡撫安撫無使字加禮外國則有國信接伴送伴使副弔祭大帥若是又有翻譯經潤文使宰相為使以翰林學士為潤文官伸達寃濫則有理檢使勸課農桑則有勸農使講修馬政則有羣牧制置使最後明堂祫饗置五使如南郊其一時特置者則各具志傳或臨事更制者事畢即停內外名務繁細者猶不具載階之法開府儀同三司至將仕郎為文散官驃騎大將軍至陪戎副尉為武散官太平興國元年改正議大夫為正奉通議大夫為朝奉朝議郎為朝奉承議郎為承直奉議郎為奉直宣義郎為通直京朝官幕職自將仕郎至朝奉郎每加五階至朝散大夫已上每加一階朝散銀青者須已服緋紫者入令録判司簿尉每加一階并幕職計考當服緋紫者皆奏加朝散銀青階諸司使已上如使額高者加金紫階內殿崇班初授則銀青階三班軍職使職遇恩檢校兼官並除銀青階丁憂者起復使相則授雲麾將軍使相仍加金吾上將軍同正節度使大將軍同正留後以下無之其胥吏掌事而至衣緋者則授游擊將軍千牛備身則授陪戎副尉以上改賜功臣勳官自上柱國至武騎尉五代以來初勳官即授柱國淳化元年詔自今京官幕職州縣官始武騎尉朝官始騎都尉三班及軍員吏職經恩並授武騎尉又詔古之勳爵悉有職奉之蔭贖宜以今之所授與散官等不得用以蔭勳封爵之差唐制王食邑五千戶郡王國公三千戶開國郡公二千戶縣公千五百戶縣侯千戶伯七百戶子五百戶男三百戶又有食實封者戶給縑帛每賜爵遞加一級唐末及五代始有加邑特戶而罷去實封之給又去縣公之名封侯以郡宋初沿其制文臣少監少卿以上武臣副率以上內職崇班以上有封爵丞郎學士刺史大將軍諸司使以上有實封但以增戶數為差不係爵級邑過其爵則並進爵焉止於郡公每加食邑自千戶至二百戶實封自六百戶至百戶親王重臣或特加有踰千戶者郡公食邑有纍加至萬餘實封至數千戶者皇屬特封郡公縣公或贈侯者無開國字侯亦在開國郡公之上又采秦制賜爵曰公士端拱二年賜諸州高年一百二十七人爵公士景德中福建民有擒獲強盜者當授鎮將以遠俗非所樂並賜公士自後率為例功臣者唐開元間賜號開元功臣代宗時有寶應功臣德宗時有奉天定難元從功臣之號僖宗將相多加功臣美名五代寖增其制宋初因之凡宣制而授者多賜焉參知政事樞密副使刺史以上階勳高者亦賜之中書樞密則推忠協謀親王則崇仁佐運餘官則推誠保德翊戴掌兵則忠果雄勇宣力外臣則純誠順化宰相初加即六字餘並四字其纍加則二字中書樞密所賜若罷免或出鎮則改之其諸班直將士禁軍則賜拱衛翊衛等號遇恩纍加但改其名不過兩字宮觀宋制設祠祿之官以佚老優賢先時員數絶少熙寧以後乃增置焉在京宮觀舊制以宰相執政充使或丞郎學士以上充副使兩省或五品以上為判官內侍官或諸司使副政和改武臣官制以使為大夫以副使為郎為都監又有提舉提點主管其戚里近屬及前宰執留京師者多除宮觀以示優禮時朝廷方經理時政患疲老不任事者廢職欲悉罷之乃使任宮觀以食其祿王安石亦欲以此處異議者遂詔宮觀毋限員並差知州資序人以三十月為任又詔杭州洞霄宮亳州明道宮華州雲臺觀建州武夷觀台州崇道觀成都玉局觀建昌軍仙都觀江州太平觀洪州玉隆觀五嶽廟自今並依嵩山崇福宮舒州靈仙觀置管幹或提舉提點官奉給大兩省卿監及職司資序人視小郡知州知州資序人視小郡通判武臣倣此四年詔宮觀嶽廟留官一員餘聽如分司致仕例從便居住六年詔卿監職司以上提舉餘官管幹又有以京官為幹當者又詔年六十以上者乃聽差毋過兩任又詔兼用執政恩例者通不得過三任元豐中王安石以左僕射觀文殿大學士為集禧觀使呂公著韓維以資政殿學士兼侍讀仍提舉中太一宮兼集禧觀公事元祐間馮京以觀文殿學士梁燾以資政殿學士為中太一宮醴泉觀使范鎮落致仕以端明殿學士提舉中太一宮兼集禧觀公事三年詔橫行使副無兼領者許兼宮觀一處六年詔橫行狄咨宋球既領皇城司罷提點醴泉觀元符元年高遵固年八十一乞再任宮觀高遵禮年七十六乞再任亳州太清宮又從其再任之請以待遇宣仁親屬故也大觀元年趙挺之以觀文殿大學士為佑神觀使政和六年詔措置宮觀如萬壽醴泉近百員更不立額靖康元年詔內外官見帶提舉主管神霄玉清萬壽宮並罷大抵祠館之設均為佚老優賢而有內外之別京祠以前宰相見任使相充使次充提舉餘則為提點為主管皆隨官之高下處以外祠選人為監嶽廟非自陳而朝廷特差者如黜降之例紹興以來士大夫多流離困厄之餘未有闕以處之於是許以承務郎以上權差宮觀一次續又有選人在部無闕可入與破格嶽廟者亦有以宰執恩例陳乞而與之者月破供給非責降官並月破供給依資序降二等支理為資任意至厚也然初將以撫安不調之人末乃重僥求泛與之弊於是臣僚交章欲罷供給以絶干請變理任以抑僥幸嚴按格以去泛濫上並從之自是以後稍復祖宗條法之舊又有年及七十耄昏不堪牧養而不肯自陳宮觀者復申明舊法著為定令以律之舊制六十以上知州資序人本部長官體量精神不致昏昧堪釐務者許差一任兼用執政官陳乞者加一任紹興三十二年臣僚言郡守之職其任至重昨朝廷以年及七十令吏部與自陳宮觀乞將前項指揮永為著令從之蓋不當請而請則冗瑣者流競竊優間廩稍或當請而不請則知進而不知退識者羞焉一祠館之與奪不可不謹如是故重內祠專使職所以崇大臣之體貌一次以定法再任以示恩紹熙五年慶壽赦應文武臣宮觀嶽廟已滿不應再陳者該今來慶壽恩年八十以上特許更陳一次京官以上二年選人三年凡待庶僚者皆於優厚之中寓間制之意焉贈官建隆已來凡有恩例文武朝官諸司使副禁軍及藩方馬步都指揮使以上父亡皆贈官親王贈三官可贈者贈二官追加大國皇屬近親如之追加封爵服疏及諸親之服近者贈一官宰相樞密使贈二官使相參知政事樞密副使尚書已上三司使節度使留後觀察使統軍上將軍內臣任都知副都知者贈一官此皇族及臣僚薨卒贈官之法也其官秩未至而因勳舊褒録或沒王事雖卑秩皆贈官加等者並係臨時取旨至於母后后族臣僚録其先世各有等差太皇太后皇太后皇后並贈