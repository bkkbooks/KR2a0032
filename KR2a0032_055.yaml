body:
  text: 宋史卷五十五志第八天文八五緯犯列舍歲星建隆二年四月乙巳犯左執法五月己丑犯東井十月乙巳犯亢太平興國八年七月丙寅入張雍熙元年正月辛巳犯靈臺第一星至道元年十一月庚戌犯右執法三年十月丁巳入氐咸平元年三月乙酉退行入氐六月庚戌入亢景德二年八月壬子入太微十二月壬辰犯天罇三年十月戊寅犯軒轅大星四年閏五月己巳犯軒轅大星九月乙亥入太微大中祥符元年正月甲子犯右執法四月丁未入太微七月己未又在太微二年十月庚戌入氐三年四月庚申退行入氐丙子守氐四年六月己巳犯天江五年三月丁丑犯牽牛六年四月乙丑犯壁壘陣九年五月辛未失度天禧三年九月壬戌入太微丙寅犯右執法十一月乙丑犯右執法四年二月己酉犯右執法三月庚申犯輿鬼積薪又犯哭星五月乙丑七月乙卯犯右執法五年十二月丁未犯房乾興元年正月丁丑犯鍵閉二月庚午犯房天聖元年八月戊午犯天籥三年五月辛卯犯壁壘陣七月乙未又犯六年八月庚午犯鉞十月丙寅又犯七年八月己亥犯輿鬼九月己未犯積尸八年九月丁未犯軒轅九年十月戊戌犯左執法明道元年正月辛巳掩左執法五月戊戌犯太微左執法景祐元年正月己巳犯東咸四月丙申犯鈎鈐戊申犯房甲寅掩房上相七月戊子又犯房二年五月丁未犯天籥康定元年六月丁未犯井鉞七月戊午犯東井十月庚子又犯慶曆元年八月庚辰犯鬼丙戌犯積尸十一月癸酉退犯輿鬼二年四月乙酉犯輿鬼庚寅犯積尸三年九月庚寅犯左執法四年二月戊午犯左執法嘉祐二年八月乙巳犯氐三年五月乙酉退犯東咸第二星七月辛卯順行又犯四年正月丙申犯建五年七月己亥退犯十二諸國代星治平元年閏五月癸未入東井八月丁未犯天罇二年四月癸巳犯天罇七月丙辰犯輿鬼三年九月庚午犯靈臺十月甲午犯太微上將四年正月壬子犯西上將二月戊子犯靈臺四月甲子又犯五月丙申犯西上將六月乙丑入太微十月丁卯犯進賢熙寧元年七月壬申犯進賢十一月丙戌入氐二年七月辛巳犯氐丁亥入氐八年六月己未犯諸王八月庚戌又犯九年六月辛卯入東井七月丁丑犯天罇西星十月戊戌犯天罇東北星十年三月戊寅犯天罇西星元豐元年八月丁巳犯靈臺北第一星九月乙亥犯西上將十月戊申入太微二年正月己丑又犯三月辛未犯靈臺北星三年十月辛酉犯氐距星庚午入氐四年二月壬午退入氐五年九月癸未犯天江北第一星七年四月壬午犯壁壘陣西第六星七月癸卯又犯西第五星十一月丙辰又犯十二月庚午犯天罇元祐四年二月壬子犯天罇五年五月壬辰犯軒轅大星十月癸巳入太微庚戌犯右執法七年十月庚申入氐八年四月癸亥退入氐十二月丁卯犯天江紹聖元年三月乙巳犯天籥三年三月丁未犯壁壘陣四月戊子入羽林軍七月辛丑又犯壁壘陣十一月甲辰又犯元符元年正月己未犯外屏二年六月甲申犯諸王東第一星十一月丁亥又犯建中靖國元年十二月己酉犯軒轅大星崇寧元年六月甲辰犯軒轅左角少民二年正月戊戌退行入端門三年八月乙卯犯亢距星四年正月辛巳犯房北第一星閏二月庚辰犯房鈎鈐五年十月辛未犯南斗西第二星大觀元年二月庚午犯斗二年十月庚辰犯壁壘陣三年十二月丙申犯外屏四年六月癸未犯天陰政和元年八月甲寅犯鉞二年三月乙亥犯司怪八月丁酉犯積薪九月丁卯犯鬼三年三月戊寅犯積薪閏四月壬戌犯鬼入犯積尸氣八月甲辰犯軒轅四年正月丁亥犯軒轅大星八月己巳入太微垣十月辛酉犯左執法五年正月丁丑又犯二月辛酉入太微六年閏正月己酉犯亢七月辛亥又犯十一月丙辰犯房七年三月丙辰又犯重和元年五月甲午犯斗宣和元年五月乙亥犯牛二年二月甲戌犯壁壘陣四年三月甲戌犯昴五年八月壬午犯井靖康元年十月癸卯犯左執法二年二月壬戌又犯丁卯入太微六月甲申犯諸王東第一星建炎三年五月丙午逆行犯房七月癸未犯鈎鈐紹興二年八月庚寅逆行犯壁壘陣五年四月壬子犯井鉞七月丁丑十月丙午十一月庚午朔至戊子逆行入井六年三月庚午入井壬辰復入留二十日七月壬辰犯鬼癸巳犯積尸氣十二月壬戌又如之十二月庚申逆行犯鬼東南星辛酉入鬼宿內七年正月癸亥三月壬午逆行入鬼犯積尸氣八年九月己丑犯太微垣東左執法十年正月戊子七月辛未入氐十一年七月戊午犯東咸西第二星十七年七月壬戌順行入東井不犯星十一月丙戌退行入井二十一年十一月辛丑順行犯氐戊申又入氐二十二年七月辛亥入氐二十八年七月丁丑順行犯諸王二十九年六月己酉閏六月辛酉順行入犯東井七月戊戌順行犯天罇十二月己巳入犯東井三十二年正月戊寅退行入太微二月戊戌朔退行犯太微垣西上將星乙巳退行逆出太微西門五月庚子順行犯太微垣西上將星乙巳復順行犯太微乙酉順行犯右執法十月庚午順行犯進賢隆興元年十月戊子順行犯氐十一月庚寅又入氐二年二月己卯退行入氐六月壬申癸未犯氐乾道三年十月乙巳犯壁壘陣四年九月丙戌留守壁壘陣六年六月癸丑十一月丁丑犯諸王七年六月癸酉犯天罇十一月癸巳又如之八年三月丁丑犯天罇十一月癸未留守權大星九年五月乙卯犯權大星十月庚午十二月庚午犯太微右執法淳熙元年二月壬午犯太微垣西上將星二年四月庚申犯進賢十月丁亥入氐三年五月己未留守氐五年四月壬午留守牛六年五月癸亥留入羽林軍六月乙巳十一月壬戌犯壁壘陣西第六星八月丁未留守壁壘陣西第五星九年十一月庚申守諸王星十年七月己巳犯天罇十一年九月癸卯十月辛巳皆犯守權大星十二年十月辛亥犯太微右執法十五年正月壬子犯房北第一星二月己巳留守房五月癸亥留守氐十六年六月乙未留守天江紹熙五年八月壬辰犯司怪十一月庚戌犯諸王慶元二年八月乙亥犯權大星四年三月乙巳入太微犯右執法五年十二月己卯犯房六年三月丙寅犯房嘉泰二年八月丙戌留守牛三年七月戊午行入羽林軍開禧二年七月乙未犯井鉞八月庚戌犯東井三年九月甲戌順行入鬼在積尸氣鑕星西南嘉定元年閏四月壬申順行入鬼犯積尸氣鑕星七月辛酉順行犯權大星二年二月丙戌犯守權大星三年二月己巳退行入太微犯左執法四月乙亥留守太微四年十一月甲子犯房五年四月乙巳退行犯房宿七月丙辰順行犯房辛酉順行犯鈎鈐六年三月丙寅留守建星八年八月甲午犯壁壘陣入羽林軍十年七月壬寅留守畢十一年七月甲戌順行犯井鉞八月丙午順行入東井九月己丑留守東井十二年七月辛酉順行犯鬼十三年二月庚寅順行犯鬼十四年二月乙丑退行犯權左角少民星十五年三月甲子退行犯太微左執法十六年正月戊申留守氐距星紹定三年六月乙酉順行入井十一月丁未退行入井端平元年四月戊寅退守太微東上相二年二月癸酉留氐八月癸巳順行入氐宿嘉熙元年五月庚午朔留守建星二年五月壬寅退行壁壘陣淳祐二年六月丁丑順行犯井宿六年十一月癸亥入氐咸淳三年十月甲寅順行犯權大星熒惑建隆元年十月癸酉犯進賢十一月乙卯犯氐二年八月戊申犯哭星九月乙酉犯壁壘陣三年十月甲辰犯氐十二月庚戌入天籥乾德三年九月乙亥犯司怪四年四月壬子入輿鬼犯積尸五月辛卯犯軒轅五年九月戊申犯輿鬼十二月戊辰犯五諸侯開寶元年五月壬子犯太微上將六月壬戌掩心大星二年七月乙亥犯輿鬼八月戊寅掩積尸三年八月壬辰犯房五年二月己卯退入太微犯上相七月甲子入氐太平興國八年七月癸亥入輿鬼雍熙元年七月乙卯入東井十二月辛巳逆犯軒轅第二星三年七月癸巳入輿鬼九月乙亥犯軒轅大星端拱元年六月己丑入輿鬼犯積尸八月戊午又犯軒轅大星九月甲申犯靈臺壬辰犯太微上將乙巳犯右執法十月癸亥又犯左執法十一月甲申犯進賢二年二月辛未退行犯亢六月壬申犯氐東南星八月丙寅犯天江十一月庚辰犯哭星十二月己巳犯房又犯鈎鈐淳化元年八月戊申犯軒轅大星壬申犯靈臺九月庚辰犯太微上將壬辰犯右執法癸巳犯左執法二年正月丙戌犯房第一星四月丁亥犯天江三年十月乙巳犯左執法十一月己亥入氐四年四月戊辰入羽林丙子犯氐五年三月甲戌犯東井西垣第一星十月己未入氐十一月癸丑犯房第一星至道二年正月丁卯守昴三月守東井閏七月丁亥犯畢北小星十月己未入太微甲子入氐十一月丁亥又入太微三年五月庚午入太微端門八月庚子掩南斗魁己未入東井咸平元年四月癸巳入輿鬼二年十一月戊申退行犯輿鬼三年二月癸酉又犯四月辛酉犯軒轅大星六月丁未犯右執法四年八月甲子犯輿鬼十月庚子犯軒轅十一月庚寅犯太微上將五年四月庚辰又犯甲申犯太微西垣壬辰犯右執法七月丁巳犯氐八月丙子犯房六年七月壬寅犯輿鬼八月庚申犯軒轅大星九月戊申犯靈臺十月己未入太微犯上將十一月庚寅犯左執法壬辰犯進賢甲辰犯太微上相十二月甲子又犯進賢景德元年三月丙申犯太微上將戊戌犯次相己酉犯執法七月乙巳犯氐閏九月庚戌犯南斗二年八月丁丑犯軒轅大星甲戌犯左執法十二月乙酉犯氐三年正月己巳犯房上相庚午犯次相二月甲戌犯鈎鈐丙寅犯房次相三月丁未守心乙丑犯鈎鈐丙寅又退行犯房次相七月丁酉犯天江四年八月丙申與歲星犯太微上將己酉犯右執法十一月丙寅犯氐丙戌犯西咸大中祥符元年九月戊辰犯壁壘陣二年十一月乙卯犯氐十二月庚寅犯東井三年四月辛卯犯右執法四年三月庚寅犯東井五月乙亥入輿鬼五年七月辛卯犯畢閏十月丁卯在諸王北六年正月己亥犯畢丁巳犯司怪二月甲戌掩犯東井三月己未犯輿鬼五月辛丑犯軒轅大星七年七月己酉犯井鉞又犯東井八月己卯犯天罇八年二月乙亥犯五諸侯三月辛丑犯輿鬼四月癸丑掩井鉞五月丁亥入太微庚寅犯軒轅大星辛丑犯太微上將丙子犯右執法九年七月丁巳犯天罇八月丙戌犯輿鬼己丑犯積尸十月丁丑犯軒轅大星十二月丁酉又犯軒轅天禧元年五月戊戌犯靈臺己酉掩太微上相丁酉犯右執法六月丙子犯左執法二年五月庚寅入東井七月癸酉犯輿鬼九月辛巳犯靈臺十月壬辰犯太微上將十一月丙寅犯左執法甲申又犯太微上將十二月壬辰又犯乙巳入太微己酉犯氐三年三月戊辰入太微四月己丑又入太微犯右執法四年九月丁卯犯靈臺庚午犯五諸侯十月辛巳入太微丁亥犯右執法辛丑犯左執法十一月丙寅掩進賢閏十二月辛未入氐五年三月辛卯退行犯亢六月甲寅入氐壬申犯房七月庚子犯天江八月庚戌掩南斗魁第二星壬戌犯南斗乾興元年七月甲午犯軒轅大星九月辛未入太微己丑出太微端門犯左執法十一月庚辰犯亢天聖元年正月丙寅犯房丁卯犯鈎鈐鍵閉癸酉犯罰二月庚申犯天籥四月戊午犯南斗魁八月癸巳又犯南斗距星閏九月乙巳犯壁壘陣二年十一月戊申犯房三年正月辛卯犯天籥三月庚戌又犯壁壘陣五月辛卯犯羽林六月壬戌又犯壁壘陣七月戊子又犯十一月乙巳犯外屏四年正月己亥犯天陰二月癸酉犯天高八月甲午犯東井九月壬申犯氐十二月戊寅犯天街六年三月甲辰犯東井七年七月壬午犯井鉞丙戌又犯井距星八年正月