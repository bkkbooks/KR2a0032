body:
  text: 宋史卷三十三本紀第三十三孝宗一孝宗紹統同道冠德昭功哲文神武明聖成孝皇帝諱字元永太祖七世孫也初太祖少子秦王德芳生英國公惟憲惟憲生新興侯從郁從郁生華陰侯世將世將生慶國公令令生子稱是為秀王王夫人張氏夢人擁一羊遺之曰以此為識已而有娠以建炎元年十月戊寅生帝于秀州青杉閘之官舍紅光滿室如日正中少長命名伯琮及元懿太子薨高宗未有後而昭慈聖獻皇后亦自江西還行在后嘗感異夢密為高宗言之高宗大寤會右僕射范宗尹亦造膝以請高宗曰太祖以神武定天下子孫不得享之遭時多艱零落可憫朕若不法仁宗為天下計何以慰在天之靈於是詔選太祖之後同知樞密院事李回曰藝祖不以大位私其子發於至誠陛下為天下遠慮合於藝祖可以昭格天命參知政事張守曰藝祖諸子不聞失德而傳位太宗過堯舜遠甚高宗曰此事不難行朕於伯字行中選擇庶幾昭穆順序而上虞丞婁寅亮亦上書言昌陵之後寂寥無聞僅同民庶藝祖在上莫肯顧歆此金人所以未悔禍也望陛下於伯字行內選太祖諸孫有賢德者高宗讀之大感歎紹興二年五月選帝育于禁中三年二月除和州防禦使賜名瑗壬寅改貴州五年五月用左僕射趙鼎議立書院宮中教之既成遂以為資善堂帝讀書強記天資特異己亥制授保慶軍節度使封建國公六月己酉聽讀資善堂以徽猷閣待制范沖兼翊善起居郎朱震兼贊讀高宗命帝見沖震皆拜十二年正月丁酉加檢校少保封普安郡王三月壬寅出閣就外第十三年九月秀王歿于秀州十四年正月庚辰用廷臣議聽解官行服十六年四月乙巳免喪還舊官十七年六月戊午改常德軍節度使二十四年衢州盜起秦檜遣殿前司將官辛立將千人捕之不以聞帝入侍言之高宗大驚明日以問檜檜謂不足煩聖慮故不敢聞俟朝夕盜平則奏矣檜退知為帝言忌之及檜疾篤其家祕不以聞謀以子熺代相帝又密啓高宗破其姦三十年二月癸酉立為皇子更名瑋甲戌詔下丙子制授寧國軍節度使開府儀同三司進封建王制出中外大悅四月賜字元瓌三十一年十月壬子以明堂恩改鎮南軍節度使先是金人犯邊高宗下詔親征而兩淮失守朝臣多陳退避之計帝不勝其憤請率師為前驅直講史浩以疾在告聞之亟入為帝言太子不宜將兵乃為草奏因中宮以進請衛從以共子職高宗因亦欲帝遍識諸將十二月遂扈蹕如金陵三十二年五月甲子立為皇太子改名初高宗久有禪位之意嘗以諭帝帝流涕固辭會有邊事不果及歸自金陵陳康伯求去高宗復以倦勤諭之中書舍人唐文若聞而請對言不宜急遽故先下建儲之詔賜名燁監察御史周必大密與康伯言與唐昭宗名同音不可詔別擬進乃定今名既又命學士承旨洪遵為太子擇字遵擬四字以進皆不稱旨六月甲戌御筆賜字元永乙亥內降御札皇太子可即皇帝位朕稱太上皇帝退處德壽宮皇后稱太上皇后丙子遣中使召帝入禁中面諭之帝又推遜不受即趨側殿門欲還東宮高宗勉諭再三乃止於是高宗出御紫宸殿輔臣奏事畢高宗還宮百官移班殿門外拜詔畢復入班殿庭頃之內侍掖帝至御榻前側立不坐內侍扶掖至七八乃略就坐宰相率百僚稱賀帝遽興輔臣升殿固請帝愀然曰君父之命出於獨斷然此大位懼不克當班退太上皇帝即駕之德壽宮帝服袍履步出祥曦殿門冒雨掖輦以行及宮門弗止上皇麾謝再三且令左右扶掖以還顧曰吾付託得人吾無憾矣左右皆呼萬歲是日詔有司議太上皇帝太上皇后尊號以聞在內諸司日輪官吏應奉德壽宮增置德壽宮提點幹辦等官德壽宮宿衛依皇城及宮門法丁丑朝德壽宮戊寅大赦詔宰相率百官月兩朝德壽宮己卯以即位告于天地宗廟社稷庚辰詔五日一朝德壽宮以左武大夫龍大淵為樞密副都承旨武翼郎曾覿帶御器械癸未始御後殿甲申詔中外士庶陳時政闕失丙戌詔進宰執官二等丁亥詔以太上皇不許五日一朝自今月四朝復除名勒停人胡銓官知饒州己丑詔有司月奉德壽宮緡錢十萬辛卯詔罷四川市馬壬辰詔百官日一人入對癸巳蝗甲午上太上皇帝尊號曰光堯壽聖太上皇帝太上皇后曰壽聖太上皇后乙未晦金人屠原州秋七月戊戌興州中軍統制吳挺復鞏州庚子判建康府張浚入見以雨水飛蝗令侍從臺諫條上民間利害壬寅詔戒飭諸郡守臣癸卯以張浚為少傅江淮宣撫使封魏國公甲辰以參知政事汪徹視師湖北京西遣劉珙等使金告即位戊申以四川宣撫使吳璘兼陝西河東路宣撫招討使追復嶽飛元官以禮改葬是夜地震大風拔木己酉有事于太廟別廟癸丑馬軍司中軍統制趙撙忠義軍統領皇甫倜復光州甲寅朝獻景靈宮詔淮南諸州存恤淮北來歸之民權免稅役丙辰以少保保康軍節度使吳益為少傅太尉寧武軍節度使吳蓋為開府儀同三司丁巳罷李寶措置海道戊午恩平郡王璩入見庚申以御前軍器所仍隸工部辛酉詔後省看詳中外上書有可采者以聞壬戌以黃祖舜兼權參知政事罷諸路聖節進奉詔李顯忠軍馬聽張浚節制癸亥增將士戰傷死者推恩格詔蠲四川積年逋負八月乙丑朔四川馬軍統制高師中與金人戰于摧沙敗死丙寅吳璘與金人戰于德順軍己巳以翰林學士史浩為參知政事戊寅率羣臣詣德壽宮奉上太上皇帝太上皇后尊號册寶丁亥班寬恤事十八條起居舍人洪邁知閣門事張掄坐奉使辱命罷甲申吳璘敗金人于北山戊子追復李光資政殿學士趙鼎范沖並還合得恩數庚寅以生日為會慶節追册故妃郭氏為皇后九月甲午以子㔶為少保永興軍節度使進封鄧王愷為雄武軍節度使開府儀同三司進封慶王惇為鎮洮軍節度使開府儀同三司進封恭王甲午金人攻德順軍東山堡中軍將李庠戰死丁酉詔開講日召輔臣觀講川陝宣諭使虞允文以論邊事不合罷己亥詔侍從臺諫舉知四川利害可為都轉運使者庚子以金人來索舊禮詔宰執侍從臺諫各陳應敵定論以聞辛丑詔吳璘審度措置保全川蜀乙巳詔纂録勳臣名次丙午轉補朱震范沖子孫官庚戌諡皇后郭氏曰恭懷辛亥振淮東義兵及歸正人以總領四川財賦軍馬錢糧王之望為戶部侍郎川陝宣諭使仍命將調兵同防守興州川口乙卯詔虞允文赴吳璘軍議事辛酉以吳璘為少師冬十月丙寅詔朝臣舉堪監司郡守者戊辰以嶽陽軍節度使居廣開府儀同三司史浩兼權知樞密院事己巳葉義問罷詔登聞鼓院毋沮抑進狀庚午以恩平郡王璩為少保詔會慶節權免上壽戊寅詔張浚陳俊卿覆實諸將所陳功賞改諡皇后郭氏曰安穆壬午官嶽飛孫六人甲申契丹招討蕭鷓巴來奔金人攻德順城吳璘擊走之復遣兵追襲遂為所敗乙酉升建州為建寧府戊子以資政殿學士張燾同知樞密院事己丑安南都護南平王李天祚闍婆國王悉里地茶蘭固野占城國王鄒時巴蘭並加食邑實封十一月庚子以蕭鷓巴為忠州團練使乙巳金人攻水洛城丙午賜忠義軍統制皇甫倜軍帛五千匹綿萬兩戊申詔改明年為隆興元年辛亥免楊存中所獻酒坊逋負錢四十萬緡甲寅定內侍官額辛酉史浩免權知樞密院事裁定文武臣宮觀嶽廟員數立措置京西營田司十二月乙丑詔宰臣復兼樞密使金人攻隴城縣官軍拒卻之丙寅詔帥臣監司具部內知州治行臧否以聞詔棄德順城徙兵民于秦州以𩹉屯住丁卯以陳康伯兼樞密使令江淮宣撫司增招武勇效用軍戊辰詔侍從臺諫集議當今弊事仍命盡率其屬使極言無隱辛未劉珙張説還自盱眙戊寅蠲四川登極赦前帶白契稅錢丙戌詔觀察使已上各舉所知三人三省樞密院詳議立格以聞庚寅罷建康鎮江營田官兵辛卯廣西賊王宣破藤州守臣廖顒棄城遁是歲諸路斷大辟四十一人隆興元年春正月壬辰朔羣臣朝于文德殿帝朝德壽宮立武臣薦舉格甲午四川宣撫司奉詔班師庚子以史浩為尚書右僕射同中書門下平章事兼樞密使張浚進樞密使都督江淮東西路軍馬丙午誅殿前司後軍謀變者戊申詔禮部貢院試額增一百人丁巳詔吳璘軍進退可從便宜璘已棄德順道為金人所邀將士死者數萬計二月壬戌朔用史浩策以布衣李信甫為兵部員外郎齎蠟書間道往中原招豪傑之據有州郡者許以封王世襲安慶軍節度使士籛乞減奉賜之半以助軍用自是諸宗室有請悉從之戊辰宰執陳康伯等乞再減奉止存舊格之半許之己卯振兩淮流民及山東歸正忠義軍癸未黃祖舜罷庚寅逐秦檜黨人仍禁輒至行在三月壬辰朔金左副元帥紇石烈志寧以書取侵地癸巳以張燾為參知政事御史中丞辛次膺同知樞密院事葉義問落端明殿學士饒州居住丙申雨雹丁酉詔戶部置局議節浮費己亥楊存中等乞減半奉如宰執例許之庚子以龍大淵知閣門事曾覿同知閣門事壬寅陳康伯上欽宗陵名曰永獻乙巳詔求遺逸丁未詔修太上皇帝聖政罷龍大淵別與差遣曾覿復帶御器械召張浚己酉張燾罷立選人減舉主法甲寅復以龍大淵知閣門事曾覿同知閣門事給事中中書舍人留黃不行乙卯詔飭郡縣吏庚申以久雨命有司振災傷察刑禁夏四月乙丑定選人改官歲額戊辰張浚入見議出師渡淮三省樞密院不預聞壬申賜禮部進士木待問以下五百三十八人及第出身乙亥王之望罷壬午詔戶部臺諫議節浮費癸未詔以白金二十五萬兩給江淮都督府軍費戊子張浚命邵宏淵帥師次盱眙己丑又命李顯忠帥師次定遠是月金人拔環州守臣強霓及其弟震死之五月壬辰申嚴鋪翠銷金及神祠僭擬之禁丁酉李顯忠復靈壁縣邵宏淵次虹縣金人拒之戊戌顯忠東趨虹縣庚子復虹縣金知泗州蒲察徒穆及同知泗州大周仁降辛丑命左右史日更立前殿壬寅張浚渡江視師癸卯金右翼軍都統蕭琦降于李顯忠甲辰顯忠及宏淵敗金人于宿州乙巳史浩罷追復司馬康右諫議大夫丙午復宿州戮金兵數千人建康前軍統領官王珙巷戰死之丁未以辛次膺為參知政事翰林學士承旨洪遵同知樞密院事督諸路開營田辛亥詣德壽宮賀天申節金紇石烈志寧自睢陽引兵至宿州李顯忠擊卻之壬子欽宗大祥帝服衰服詣几筳易祥服行祥祭禮顯忠與金人戰于宿州邵宏淵不援顯忠失利是夜建康中軍統制周宏及邵宏淵之子世雄殿前司統制官左士淵逃歸癸丑進李顯忠開府儀同三司淮南京畿京東河北招討使邵宏淵檢校少保寧遠軍節度使招討副使金人攻宿州城顯忠大敗之殿前司統制官張訓通等七人統領官十二人以二將不叶而遁甲寅李顯忠邵宏淵軍大潰于符離乙卯下詔親征丙辰召汪徹以張浚兼都督荊襄軍馬李顯忠邵宏淵至濠州張浚以劉寶為鎮江諸軍都統制丁巳以蒲察徒穆大周仁蕭琦並為節度使徒穆大同軍周仁彰國軍琦威塞軍遣御前忠勇軍赴都督府是月成都地震三六月庚申朔日有食之遣內侍趣上淮東將士功賞癸亥汪徹罷張浚乞致仕且請通好皆不許丁卯以觀文殿大學士湯思退為醴泉觀使兼侍讀戊辰召虞允文以兵部侍郎周葵為參知政事汪徹落資政殿學士台州居住庚午張浚自盱眙還揚州辛未李顯忠罷軍職壬申以太傅同安郡王楊存中為御營使節制殿前司軍馬癸酉下詔罪己張浚降授特進仍前樞密使江淮東西路宣撫使官屬各奪二官邵宏淵降武義大夫職仍舊詔楊存中先詣建康措置營寨檢視沿江守備戊寅詔展巡幸之期辛次膺罷己卯李顯忠責授清遠軍節度副使筠州安置辛巳命浙西副都總管李寶兼御營統制官措置浙西海道甲申右諫議大夫王大寶入對論移蹕以敷文閣學士虞允文為兵部尚書兼湖北京西宣諭使戊子放宮人三十人以蕭琦為檢校少保河北招撫使秋七月庚寅朔以虞允文為湖北京西制置使癸巳以湯思退為尚書右僕射同中書門下平章事兼樞密使李顯忠再責授果州團練副使潭州安置乙未詔宿州棄軍將佐奪官貶竄有差丙申太白晝見經天罷江淮宣撫司便宜行事乙巳以旱蝗星變詔侍從臺諫兩省官條上時政闕失丁未詔徵李顯忠侵欺官錢金銀免籍其家乙卯裁減省部寺監官吏戊午給還嶽飛田宅八月丙寅張浚復都督江淮軍馬庚午以劉寶兼淮東招撫使丙子以飛蝗風水為災避殿減膳罷借諸路職田之令戊寅金紇石烈志寧又以書求海泗唐鄧四州地及歲幣癸未復以龍大淵知閣門事曾覿同知閣門事丙戌遣淮西安撫司幹辦公事盧仲賢等齎書至金帥府戒勿許四州差減歲幣仍命諸將毋遣兵人出境九月己酉楊存中罷冬十月戊午朔大臣奏金帥書言四事帝曰四州地歲幣可與名分歸正人不可從辛酉御殿復膳己巳遣護聖軍戍江南丙子詔太上皇后教旨改稱聖旨立賢妃夏氏為皇后丁丑地震辛巳升洪州為隆興府詔江淮軍馬調發應援從都督府取旨餘事悉以聞十一月己丑盧仲賢自宿州以金都元帥僕散忠義遺三省樞密院書來庚子遣王之望等為金國通問使辛丑詔侍從臺諫於後省集議講和遣使禮數土貢四事仍各薦可備小使者丙午盧仲賢擅許四州下大理寺奪三官召張浚癸丑以胡昉楊由義為使金通問國信所審議官十二月己未陳康伯罷乙丑張浚入見丁丑以湯思退為尚書左僕射張浚為右僕射並同中書門下平章事兼樞密使浚仍都督江淮東西路軍馬壬午西南方有白氣是歲以兩浙大水旱蝗江東大水悉蠲其租二年春正月辛卯詔增德壽宮車輦儀衛壬辰御文德殿册皇后癸巳修三省法乙未及皇后朝德壽宮丙申命虞允文調兵討廣西諸盜庚子罷諸州招軍丙午金僕散忠義復以書來庚戌申嚴卿監郎官更出迭入之制壬子振歸正人甲寅白氣亙天是月福建諸州地震二月辛未蠲秀州貧民逋租壬申容州妖賊李雲作亂癸酉復王權武義大夫命權廣西路都鈐轄專一措置盜賊丙子詔飭將帥減文武官及百司吏郊賜之半罷兩浙福建江西湖南夔州路參議官丁丑雨雹及雪獲李雲其黨悉平乙酉胡昉自宿州還初金帥以昉等不許四郡械繫之昉等不屈金主命歸之三月丙戌朔詔張浚視師于淮又詔王之望等以幣還丁亥詔荊襄川陝帥臣嚴邊備毋先事妄舉盧仲賢除名械送郴州編管壬寅詔知光州皇甫倜毋招納歸正人丙午王宣等降詔三衙戍兵歸司建康鎮江大軍更番歸寨庚戌芝生德壽宮以戶部侍郎錢端禮為淮東宣諭使吏部侍郎王之望為淮西宣諭使詔撫諭兩淮軍民壬子以廣西賊平詔減高藤雷容四州雜犯死罪囚釋杖以下蠲夏秋稅賦以忠勇軍隸步軍司神徑右軍隸鎮江都統司癸丑以王彥為建康諸軍都統制兼淮西招撫使夏四月庚申召張浚還朝甲子以李顯忠侵欺官錢給還諸軍丁卯以建康歸正人為忠毅軍鎮江為忠順軍命蕭琦蕭鷓巴分領之戊辰罷江淮都督府高麗入貢丁丑張浚罷癸未言者論宰相執政徇欺之弊命書置政事堂五月壬辰復置環衛官丙申詔吳璘毋招納歸正人辛丑詔劉寶量度泗州輕重取舍事宜以聞江西總管邵宏淵責授靖州團練副使南安軍安置仍徵其盜用庫錢乙巳率羣臣詣德壽宮賀天申節始用樂丁未蝗詔內外贓私不法官吏尚書省置籍檢勘庚戌罷招神徑效用軍辛亥鬻兩淮所括戶馬六月甲寅朔日有食之辛酉以淫雨詔州縣理滯囚戊辰太白晝見壬申命虞允文棄唐鄧允文不奉詔丁丑振江東兩淮被水貧民秋七月乙酉召虞允文以戶部尚書韓仲通為湖北京西制置使丁亥洪遵罷己丑以周葵兼權知樞密院事遣主管馬軍司公事張守忠以兵詣淮西措置邊備庚子太白經天詔內外文武官年七十不請致仕者遇郊毋得蔭補乙巳命海泗州徹戍丁未雨雹戊申蠲淮東內庫坊場錢一年庚戌洪遵落端明殿學士癸丑以江東浙西大水詔侍從臺諫卿監郎官館職陳闕失及當今急務是月罷內侍押班梁珂為在外宮觀移廣西提刑司于容州八月甲寅朔以災異避殿減膳戊午南丹州莫延廩為諸蠻所逐來歸詔補修武郎命江東浙西守臣措置開決圍田甲子秦國大長公主薨以久雨決繫囚庚辰以資政殿大學士賀允中為知樞密院事兼參知政事辛巳詔振淮東被水州縣張浚薨壬午遣魏杞等為金國通問使九月甲申罷內侍李珂賜諡甲午詔江東浙西監司守臣講明措置田事乙未交址入貢丁酉嚴贓吏法辛丑以王之望為參知政事權刑部侍郎吳芾為給事中兼淮西宣諭使金人犯邊以久雨出內庫白金四十萬兩糴米賑貧民壬寅王彥帥師濟江軍昭關癸卯命湯思退都督江淮東西路軍馬辭不行乙巳復命楊存中為同都督錢端禮吳芾並為都督府參贊軍事罷宣諭司仍易國書以付魏嵵少保崇信軍節度使趙密落致仕權領殿前司職事冬十月甲寅魏嵵至盱眙金帥以國書未如式弗受欲得商秦地及俘獲人且邀歲幣二十萬嵵未得進丁卯賀允中罷為資政殿大學士致仕己巳以周葵兼權知樞密院事王之望兼同知樞密院事庚午詔輔臣夕對便殿丙子大風庚辰蠲京西湖北運糧所經州縣秋稅之半以靖海軍節度使李寶為沿海駐劄御前水軍都統制辛巳金人分道渡淮劉寶棄楚州遁十一月乙酉知楚州魏勝與金人戰死之州遂陷濠州亦陷王彥棄昭關遁滁州又陷丙戌詔諭沿邊將士丁亥詔魏嵵等以所齎禮幣犒軍嵵弗從命留鎮江俟旨復命王之望督視江淮軍馬戊子以金人侵擾詔郊祀改用明年又詔諭歸正官民軍士命王之望同都督江淮軍馬湯思退罷都督召陳康伯己丑王之望罷同都督庚寅命楊存中都督江淮軍馬辛卯湯思退罷尋以尹穡朝公武論之落觀文殿文學士永州居住未至而卒甲午以黃榜禁太學生伏闕是日太學生張觀等七十二人上書請斬湯思退王之望尹穡竄其黨洪適朝公武而用陳康伯胡銓等以濟大計丙申遣國信所大通事王抃持周葵書如金帥府請正皇帝號為叔姪之國易歲貢為歲幣減十萬割商秦地歸被俘人惟叛亡者不與誓目大略與紹興同以金人犯淮南詔避殿減膳丁酉詔擇日視師戊戌以少保觀文殿大學士陳康伯為尚書左僕射同中書門下平章事兼樞密使庚子遣兵部侍郎胡銓右諫議大夫尹穡分詣兩浙措置海道贈魏勝寧國軍節度使諡忠壯辛丑兵部尚書錢端禮賜出身簽書樞密院事兼提領德壽宮壬寅詔侍從兩省官日一至都堂議事有關臺諫者亦聽會議以顯謨閣學士虞允文同簽書樞密院事癸卯遣王之望勞師江上甲辰金人犯六合縣步軍司統制崔皋擊卻之乙巳以錢端禮兼權參知政事丁未以顯謨閣直學士沈介為沿江制置使命沿江諸州調保甲分守渡口己酉劉寶落節鉞為武泰軍承宣使王彥落龍神衛四廂都指揮使閏月甲寅陳康伯入見詔康伯間日一朝肩輿至殿門給扶升殿丙辰周葵罷王抃見金二帥皆得其報書以歸戊午蕭琦卒壬戌詔罷胡銓尹穡丙寅召韓仲通以沈介為兵部尚書湖北京西制置使戊辰以金人且退詔督府擇利擊之王之望執不可乙亥之望罷丙子以王抃為奉使金國通問國信所參議官持陳康伯報書以行丁丑金遣張恭愈來迓使者詔臺諫侍從兩省官舉楚廬滁濠四州守臣十二月甲申罷陝西路轉運司戊子魏嵵始渡淮詔郊祀大禮遵至道典故改用來年正月一日上辛辛卯以錢端禮為參知政事兼知樞密院事虞允文同知樞密院事兼權參知政事禮部尚書王剛中簽書樞密院事丙申制曰比遣王抃遠抵潁濱得其要約尋澶淵盟誓之信倣大遼書題之儀正皇帝之稱為叔姪之國歲幣減十萬之數地界如紹興之時憐彼此之無辜約叛亡之不遣可使歸正之士咸起寧居之心重念數州之民罹此一時之難老稚有蕩析之災丁壯有係纍之苦宜推蕩滌之宥少慰雕殘之情應沿邊被兵州軍除逃遁官吏不赦外雜犯死罪情輕者減一等餘並放遣遣洪適等賀金主生辰詔吳挺市馬赴行在己亥雨雹壬寅罷三衙江上荊襄諸軍招軍甲辰遣沿海水軍還屯己酉朝獻景靈宮庚戌朝饗太廟乾道元年春正月辛亥朔合祀天地于圜丘大赦改元丁巳淮西安撫韓璡勒停賀州編管庚申以錢端禮兼德壽宮使辛酉召楊存中通問使魏嵵至燕山丁卯以王抃使金有勞進五官庚午西北方有白氣詔館職更迭補外辛未立兩淮守令勸民種桑賞壬申詔兩浙振流民以紹興流民多死罷守臣徐嚞及兩縣令癸酉蠲沿邊殘破州軍官賦一年甲戌劉寶責果州團練副使瓊州安置乙亥罷兩淮招撫司及陝西河東宣撫招討司丙子淮西守將孔福以遇敵棄城伏誅頓遇奪官刺面配吉陽軍牢城二月庚辰朔朝德壽宮從太上皇太上皇后幸四聖觀乙酉罷江淮都督府遣官檢察兩浙州縣振濟飢民庚寅雨雹癸巳移濠州戍兵于藕塘庚子以楊存中為寧遠昭慶軍節度使甲辰以久雨避殿減膳蠲兩浙災傷州縣身丁錢絹決繫囚丁未陳康伯薨諡文恭三月甲寅太白晝見己未御殿復膳庚申以虞允文為參知政事兼同知樞密院事王剛中同知樞密院事命淮西湖北荊襄帥臣措置屯田復置榷場癸亥黃祖舜薨戊辰白氣亙天己巳罷諸軍額外制領將佐乙亥太白經天是春湖南盜起入廣東焚掠州縣官軍討平之夏四月庚子金報問使完顏仲等入見乙巳吳璘入見五月庚戌以璘為太傅封新安郡王丙辰詔有司治皇后家廟壬戌詔監司帥守講究弊事以聞合廣南東西路鹽事為一司癸亥詔總領帥漕臣諸軍都統制並兼提領措置屯田沿邊守臣兼管屯田事丁卯詔吳璘措置馬綱水路壬申蠲四川州縣虛額錢吳璘改判興元府乙亥詔未銓試人毋得堂除丙子遣李若川等使金賀上尊號增置諸路鈐轄都監郴州盜李金等復作亂遣兵討捕之六月癸未王剛中薨乙酉詔恭王府直講王淮傾邪不正有違禮經可與外任丙戌以翰林學士洪適簽書樞密院事戊子步軍司統制官崔皋坐奏功冒濫奪所遷觀察使止進橫行三官令本軍自效辛卯以武經郎令德為安定郡王壬辰以淮南轉運判官姚嶽言境內飛蝗自死奪一官罷之丙申以兩淮守令勞徠安集無效下詔戒飭之仍以詔置守令治所壬寅蠲廣東殘破郡縣稅賦甲辰罷湖北京西制置司秋七月辛亥詔知州年七十以上者與宮觀癸丑輔臣晚對選德殿御坐後有大屏記注諸道監司郡守姓名因命都堂視此書之甲寅借職田租二年以裨經費己未鑄當二錢己巳蠲關外四州民今年租賦及湖南賊蹂郡縣夏稅八月己卯以永豐墟田賜建康都統司癸未獲李金乙酉詔立子㔶為皇太子丁亥虞允文罷戊子大赦己丑以洪適為參知政事兼權知樞密院事吏部侍郎葉顒簽書樞密院事兼權參知政事庚寅立知州軍諸路總管鈐轄都監辭見法癸巳錢端禮以避東宮親嫌罷為資政殿大學士提舉萬壽觀戊戌吏部侍郎章服以論虞允文阿附罷謫居汀州九月乙卯立廣國夫人錢氏為皇太子妃丁巳申嚴百司官出入局之制丁卯升鼎州為常德府甲戌以端明殿學士汪徹知樞密院事洪適兼同知樞密院事乙亥置沿淮諸州都巡檢冬十月己卯遣方滋等使金賀正旦戊子增頭子錢歸正人右通直郎劉蘊古坐以軍器法式送北境伏誅壬辰御大慶殿册皇太子癸巳詣德壽宮稱謝乙未詔侍從各舉所知宗室一二人丁酉金遣高衎等來賀會慶節乙巳淮北紅巾賊踰淮劫掠立賞討捕之已而知楚州胡明遣巡尉擊殺其首蕭榮十一月辛亥招收兩淮流散忠義人丙寅白氣亙天辛未遣龍大淵撫諭兩淮措置屯田督捕盜賊十二月戊寅以洪適為尚書右僕射同中書門下平章事兼樞密使汪徹為樞密使命廣東提刑司招安李金餘黨癸未遣王曮等賀金主生辰庚寅以葉顒為參知政事兼同知樞密院事辛卯詔侍從臺諫兩省舉堪監司郡守者各一人三衙知閣舉材武可守邊者一人庚子罷兩淮諸州權攝官壬寅金遣烏古論忠弼等來賀明年正旦癸卯詔樞密院文書依三省式經中書門下畫黃書讀二年春正月辛酉省六合戍兵以所墾田給還復業之民辛未命湖南監司存恤寇盜殘破郡縣二月丁丑罷盱眙屯田振兩浙江東飢戊寅幸玉津園宴射遂幸龍井三月乙巳禁京西利州路科役保勝義士壬子詔戒飭刑獄官戊午殿中侍御史王伯庠請裁定奏薦詔三省臺諫集議具條式以聞詔縣令非兩任毋除監察御史非任守臣毋除郎官著為令丁卯賜禮部進士蕭國梁以下四百九十有三人及第出身戊辰再增諸州軍離軍添差員闕辛未罷洪適右僕射癸酉以給事中權吏部尚書魏嵵同知樞密院事兼權參知政事丁丑罷和糴夏四月戊寅以久雨命侍從臺諫議刑政所宜以聞減大理三衙臨安府及浙西州縣雜犯死罪以下囚一等釋杖以下庚辰詔兩浙漕臣王炎開平江湖秀圍田辛巳避殿減膳甲申太白晝見癸巳御殿復膳乙未汪徹罷丁酉以知荊南府李道憑恃戚里妄作罷之五月戊申張燾薨己酉罷權借職田庚戌葉顒罷以魏嵵為參知政事右諫議大夫林安宅同知樞密院事兼權參知政事中書舍人蔣芾簽書樞密院事癸丑太白晝見經天禁浙西修築圍田罷修建康行宮丁卯命監司守臣預備水旱六月甲戌罷兩浙路提舉市舶司詔諸路監司帥臣各察守令臧否以聞丙子刑部上乾道新編特旨斷例戊寅詔制科權罷注疏出題守臣監司亦許解送庚辰封孫挻為福州觀察使榮國公挺為左千牛衛大將軍癸未詔使相毋奏補文資七色補官人毋任子堂吏遷朝議大夫以五員為額乙酉申嚴內外牒式法裁其額丙戌廢永豐墟戊戌詔改官人實歷知縣一任方許關升著為定式秋七月己酉調泉州左翼軍二千人屯許浦鎮甲寅以鎮江都統制戚方為武當軍節度使八月辛未朔詔兩淮行鐵錢銅錢毋過江北癸酉以武鋒軍隸步軍司甲戌罷任子年三十得免試參選之令丁丑蠲淮南放歸萬弩手差役二年壬午詔諸州守臣兼訓練禁軍癸未降會子交子于鎮江建康務場令江淮之人對換丙戌林安宅劾葉顒之子受金失實罷之丁亥詔安宅筠州居住溫州大水戊子以魏嵵兼同知樞密院事蔣芾權參知政事召葉顒庚寅少保新興郡王吳蓋薨甲午立中興以來十三處戰功格目乙未詔吳璘復判興州丙申升宣州為寧國府罷戶部諸路歲糴一年九月甲辰知上元縣李允升犯贓貸死杖脊刺面配惠州牢城籍其資丙午建康守臣王佐坐縱允升去官奪三官勒停建昌軍居住餘失按官吏及薦舉官奪官有差辛亥遣官按視溫州水災振貧民決繫囚乙卯詔改造大曆辛酉追封子恪為邵王諡曰悼肅甲子詔監司各舉部內知縣縣令二三人守臣各舉屬縣一二人己巳魏嵵等上神宗哲宗徽宗三朝帝紀太上皇聖政太白晝見是月詔舉將帥置章奏簿冬十月癸酉上太上皇聖政于德壽宮乙亥遣薛良朋等使金賀正旦己卯減饒州歲貢金三之一蠲諸路酒坊逋賦戊子知峽州呂令問坐縱贓吏知夷陵縣韓贄胄去官奪二官鄂州居住辛卯雨雹金遣魏子平等來賀會慶節十一月丙午楊存中薨己酉盡出內藏及南庫銀以易會子官司並以錢銀支遣民間從便兩淮總領所許自造會子鬻諸路營田壬子詔修祥曦殿記注乙卯密詔四川制置使汪應辰如吳璘不起收其宣撫使牌印權行主管職事甲子大閲戊辰築郢州城是月詔汰冗兵十二月庚午朔白氣亙天癸酉詔三省侍從臺諫兩淮漕臣郡守條具兩淮鐵錢交子利害以聞乙亥遣梁克家等賀金主生辰己卯以資政殿學士葉顒知樞密院事辛巳詔免進呈欽宗日曆送國史院修纂實録壬午追封楊存中為和王甲申以葉顒為尚書左僕射魏嵵右僕射並同中書門下平章事兼樞密使蔣芾參知政事吏部尚書陳俊卿同知樞密院事兼權參知政事庚寅詔宰相領兼制國用使參知政事同知國用事癸巳詔監司守臣舉廉吏丙申金遣烏古論元忠等來賀明年正旦以江東兵馬鈐轄王抃為帶御器械是歲裁定內外軍額
