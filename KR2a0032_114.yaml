body:
  text: 宋史卷一百一十四志第六十七禮十七嘉禮五巡幸養老視學賜進士宴幸祕書省進書儀大射儀鄉飲酒禮巡幸之制唐開元禮有告至肆覲考制度之儀開寶通禮因之太祖幸西京所過賜夏秋田租之半真宗朝諸陵及舉大禮塗中皆服折上巾窄袍出京過京城服鞾袍具鸞駕羣臣公服繫㙐供奉班及內朝官僚前導凡從官並日赴行宮合班起居晚朝視事羣臣不赴中頓侍食百官就宿頓迎駕訖先發或道塗隘遠則免迎駕將進發近臣諸軍賜裝錢出京留司馬步諸軍夾道左右至新城門外奉辭留守辭於門內百官父老辭於苑前召留守等賜飲苑中州縣長吏留司官待于境所過賜巡警兵守津梁行郵治道卒時服錢履父老綾袍茶帛塗中賜衛士緡錢所幸寺觀賜道釋茶帛或加紫衣師號吏民有以饔餼酒果方物獻者計直答之命官籍所過繫囚逋負者日引對多原釋仍採訪民間疾苦振恤魚衆寡孤獨車服度量權衡有不如法則舉儀制禁之有奇材異德及政事尤異者孝子順孫義夫節婦為鄉里所稱者其不守廉隅昧於正理者並條析以聞官吏知民間疾苦者亦許録奏所過州府結綵為樓陳音樂百戲道釋以威儀奉迎者悉有賜東京留守遣官表請還京優詔答之駕還京大陳兵衛以入凡行幸太祖太宗不常其數自咸平中車駕每出金吾將軍帥士二百人執檛周繞謂之禁圍春夏緋衣秋冬紫衣郊祀省方並增二百服錦襖出京師則加執劍親王中書樞密宣徽行圍內餘官圍外大禮備儀衛則有司先布土為黃道自宮至祀所左右設香臺畫青繩闌干巡省在塗則不設凡巡省翰林進號傳詩付樞密院每夕摘字令衛士相應為識東京舊城城門西京皇城司並契勘內外城宮廟門並勘箭出入皆然入藩鎮外城子城門亦勘箭朝陵定扈從官人數入柏城者僕射以上三人丞郎以上二人餘各一人東封定仗內導駕官從人數親王中書樞密宣徽三司使四人學士尚書丞郎節度使三人大兩省大卿監三司副使樞密承旨客省閣門使副金吾大將軍押仗鳴珂內殿崇班以上二人餘各一人命諸司巡察之自後舉大禮皆循此制建炎元年七月詔曰祖宗都汴垂二百年比年以來圖慮弗臧禍生所忽肆朕纂承顧瞻宮室何以為懷是用權時之宜法古巡狩駐蹕近甸號召軍馬朕將親督六師以援京城及河北河東諸路與之決戰歸宅故都迎還二聖以稱朕夙夜憂勤之意十月一日車駕登舟巡幸淮甸宰執侍從百司三衙禁旅五軍將佐扈衛以行駐蹕揚州三年幸杭州自杭州幸江寧府尋幸浙西自浙西幸浙東乃下詔曰國家遭金人侵逼無歲無兵朕纂承以來深軫念慮謂父兄在難而吾民未撫不欲使之陷於鋒鏑故包羞忍恥為退避之謀冀其逞志而歸稍得休息自南京移淮甸自淮甸移建康而會稽播遷之遠極于海隅卑詞厚禮使介相望以至願去尊稱甘心貶屈請用正朔比於藩臣遣使哀祈無不曲盡假使金石無情亦當少動纍年卑屈卒未見從生民嗷嗷何時寧息今諸路之兵聚於江浙之間朕不憚親行據其要害如金人尚容朕為汝兵民之主則朕於事大之禮敢有不恭或必用兵窺我行在傾我宗社塗炭生竭取東西金帛子女則朕亦何愛一身不臨行陳以踐前言以保羣生朕已取十一月二十五日移蹕前去浙西為迎敵計惟我將士人民念國家涵養之恩二聖拘縻之辱悼殺戮焚殘之禍與其束手待斃曷若並計合謀同心戮力奮勵而前以存家國乃詔御前應奉官司自合扈從外內太常寺據實用人數扈從餘接續起發四年正月次台州二月次溫州三月幸浙西紹興元年詔移蹕臨安府六年詔周視軍師車駕進發遣官奏告天地社稷宗廟自臨安幸平江尋幸建康八年二月還臨安三十一年九月詔金人背盟失信今率精兵百萬躬行天討用十二月十日車駕進發應行宮臨安府文武百僚城北奉辭其日應文武百僚先詣城北幕次俟車駕御舟將至御史臺閣門太常寺分引文武百僚立班定兩拜訖俟御舟過班退三十二年正月詔視師江上北騎遁去兩淮無警已委重臣統護諸將經畫進討今暫還臨安畢恭文祔廟之禮宜令有司增修建康百官吏舍諸軍營寨以備往來巡幸可擇日進發車駕還宮養老於太學皇帝服通天冠絳紗袍乘金輅至太學酌獻文宣王三祭酒再拜歸御幄比車駕初出量時刻遣使迎三老五更於其第三老五更俱服朝服乘安車導從至太學就次國老庶老有司預戒之各服朝服集於其次大樂正帥工人二舞入立於庭東上閣門御史臺太常寺客省四方館自下分引百官宗室客使學生等以次入就位如視學班太常博士贊三老五更俱出次引國老庶老立於後重行異位禮直官通事舍人引左輔奏請中嚴少頃又奏外辦皇帝出大次侍衛如常儀大樂正令撞黃鐘之鐘右五鐘皆應協律郎跪俯伏舉麾興宮架乾安之樂作皇帝即御坐樂止典儀曰再拜在位官皆再拜三老五更杖而入各左右二人夾扶太常博士前引史臣執筆以從三老五更入門宮架和安之樂作至宮架北北向立以東為上奉禮郎引羣老隨入位於其後樂止博士揖進三老在前五更在後仍杖夾扶宮架和安之樂作至西階下樂止博士揖三老五更自西階升堂國老庶老立堂下三老五更當御坐揖羣老亦揖皇帝為興次奉禮郎揖國老升堂博士引三老五更奉禮郎引國老以下各於席後立典儀贊各就坐贊者承傳宮架尊安之樂作三老五更就坐三公授几九卿正履訖殿中監尚食奉御進珍羞及黍稷等先詣御坐前進呈遂設於三老前樂止尚食奉御詣三老坐前執醬而饋訖尚醞奉御詣酒尊所取爵酌酒奉御執爵奉於三老次太官良醞令以次進珍羞酒食於五更羣老之前皆食大樂正引工人升登歌奏惠安之樂三終史臣既録三老所論善言善行宮架作申安之樂憲言成福之舞畢文舞退作受成告功之舞畢三老以下降筵博士引三老五更於堂下當御坐前奉禮郎引羣老復位俱揖皇帝為興三老五更降階至堂下宮架和安之樂作出門樂止禮直官通事舍人引左輔前奏禮畢退復位典儀贊拜訖皇帝降坐太常卿導還大次百僚以次退車駕還宮三老五更升安車導從還翼日詣闕表謝視學哲宗始視學遂幸國子監詣至聖文宣王殿行釋奠禮一獻再拜御敦化堂召從官賜坐禮部太常寺本監官承事郎以上侍立承務郎以下三學生坐于東西廡侍講吳安詩執經祭酒豐稷講尚書無逸終篇復命宰臣以下至三學生坐賜茶豐稷賜三品服本監官學官等賜帛有差遂幸昭烈武成王廟酌獻肅揖徽宗幸太學遂幸辟雍奠獻如上儀詔司業吳絪等轉官改秩循資賜章服文武學生授官免省試文解賜帛有差所司預設次於敦化堂後又於堂上稍北當中兩間設次南向設御坐又設從官及講筵講書執經官並太學官坐御坐之南東西重行異位太學生坐於兩廡相向並北上宰臣以下從官之次設於中門外皇帝酌獻文宣王畢幸太學降輦入次簾垂更衣禮直官通事舍人引講官與侍立官入就堂下皆繫㙐講書執經官學生各立堂下東西相向俟報班齊皇帝升坐班首奏萬福在位者皆應喏訖閣門使承旨臨階宣升堂通事舍人喝拜應在位者再拜訖分左右升堂各就位少立起居郎舍人分左右侍立禮直官通事舍人引講書及執經官就北向位班首奏萬福閣門使宣升堂舍人喝再拜訖分東西升堂立於御坐左右講書官在西東向執經官在東西向學生就北向位舍人喝拜在位者皆再拜立於東西兩廡內侍進書案以經授執經官稍前進於案上舍人喝拜就坐宰臣以下並堂上坐如閣門所進坐位圖講書畢通事舍人曰可起羣臣皆起降階立執經官降講書官於御坐前致辭訖亦降舍人喝拜如有宣答即再喝拜閣門宣坐賜茶舍人喝拜訖宰臣以下升堂各立於位後學生各就北向位舍人喝拜在位者俱拜訖各分東西廡以北為上下舍人喝就坐上下皆就坐賜茶畢禮直官通事舍人引堂上官降階就位舍人喝拜在位者俱拜訖禮直官引之以次出學生就位舍人喝拜學生俱再拜退紹興十三年七月國學大成殿告成奉安廟像明年二月國子司業高閌請幸學上從之詔略曰偃革息民恢儒建學聲明丕闡輪奐一新請既方堅理宜從欲將款謁於先聖仍備舉於舊章三月上服鞾袍乘輦入監止輦于大成殿門外入幄羣臣列班於庭帝出幄升東階跪上香執爵三祭酒再拜羣臣皆再拜上降入幄分奠從祀如常儀尚舍先設次於崇化堂之後及堂上之中南向設御坐閣門設羣臣班於堂下如月朔視朝之儀宰輔從臣次於中門之外上乘輦幸太學降輦於堂入次更衣講官入就堂下講位北向執經官學生皆立於堂下東西相向帝出次升御坐羣臣起居如儀乃命三公宰輔以下升堂皆就位左右史侍立講書及執經官北面起居再拜皆命之升立於御坐左右學生北面再拜分立兩廡北上內侍進書案牙籤以經授執經官賜三公宰輔以下坐講畢羣臣皆起降階東西相向立執經官降講官進前致詞乃降北面再拜左右史降乃賜茶三公以下北面再拜升各立於位後學生北面再拜分兩廡立上下就坐賜茶畢三公以下降階學生自兩廡降皆北面再拜羣臣以次出上降坐還次乘輦還宮時命禮部侍郎秦熺執經司業高閌講易之泰遂幸養正持志二齋賜閌三品服學官遷秩諸生授官免舉賜帛有差上既奠拜注視貌象翼翼欽慕覽唐明皇及太祖真宗徽宗所製贊文命有司悉取從祀諸贊皆録以進帝遂作先聖及七十二子贊冠以序文親灑翰墨以方載之五月丙辰登之綵殿備儀衛作樂命監學之臣自行宮北門迎置學宮揭之大成殿上及二廡序曰朕自睦鄰息兵首開學校教養多士以遂忠良繼幸太學延見諸生濟濟在庭意甚嘉之因作文宣王贊機政餘間歷取顏回而下七十二人亦為製贊用廣列聖崇儒右文之聲復知師弟子間纓辨森森覃精繹思之訓其於世道人心庶幾焉二十六年十二月言者謂陛下崇儒重道製為贊辭刻宸翰于琬琰光昭往古寰宇儒紳孰不顧瞻雲漢之章請奉石刻于國子監以碑本遍賜郡學從之淳熙四年孝宗幸太學如紹興之儀命禮部侍郎李燾執經祭酒林光朝講大學尋幸武學如太學之儀帝肅揖武成王不拜嘉泰三年正月寧宗幸太學如淳熙之儀淳祐元年正月理宗幸太學宗武兩學官屬生員並赴太學陪位候車駕至學詣先聖文宣王位三上香執爵三祭酒俯伏興再拜在位官皆再拜皇帝至崇化堂宰臣使相執政並起居執經官由東階講官由西階並升堂於御前分東西相向立次引國子監三學學官學生一班北面再拜贊各就坐賜茶俟講書畢起立班再拜禮成執經官講書官國子監三學官生員各推恩轉官有差咸淳三年正月戊辰度宗幸太學祗謁禮部尚書陳宗禮執經國子祭酒雷宜中講中庸餘並如儀賜貢士宴名曰聞喜宴政和新儀押宴官以下及釋褐貢士班首初入門正安之樂作至庭中望闕位立樂止預宴官就位再拜訖押宴官西向立中使宣曰有敕在位者皆再拜訖中使宣曰賜卿等聞喜宴在位者皆再拜搢笏舞蹈又再拜次引押宴官稍前謝坐再拜在位者皆再拜若賜敕書即引貢士班首稍前中使宣曰有敕貢士再拜中使宣曰賜卿等敕書班首稍前搢笏跪中使授敕書訖少退班首以敕書加笏上俯伏興歸位再拜在位者皆再拜凡預宴官分東西升階就坐貢士以齒酒初行賓興賢能之樂作飲訖食畢樂止酒再行於樂辟雍之樂作酒三行樂育人材之樂作酒四行樂且有儀之樂作酒五行正安之樂作再坐酒行樂作節次如上儀皆飲訖食畢樂止押宴官以下俱興就次賜花有差少頃戴花畢次引押宴官以下並釋褐貢士詣庭中望闕位立謝花再拜復升就坐酒行樂作飲訖食畢樂止酒四行訖退次日預宴官及釋褐貢士入謝如常儀寧宗慶元五年五月賜新及第進士曾從龍以下聞喜宴于禮部貢院上賜七言四韻詩祕書監楊王休以下繼和以進自後每舉並如之幸祕書省紹興十四年七月新建祕書省成祕書少監遊操等援宣和故事請車駕臨幸詔從之二十七日幸祕書省至右文殿降輦頒手詔曰蓋聞周建外史掌三皇五帝之書漢選諸儒定九流七略之奏文德之盛後世推焉仰惟祖宗建開册府凡纍朝名世之士由是以興而一代致治之原蓋出於此朕嘉與學士大夫共宏斯道乃一新史觀新御榜題肆從望幸之忱以示右文之意鳴呼士習為空言而不為有用之學久矣爾其勉修術業益勵猷為一德一心以共赴亨嘉之會用丕承我祖宗之大訓顧不善歟遂陳纍朝御書御製晉唐書畫三代古器次宣皇太子宰臣以下觀訖退遂賜宴于右文殿酒五行羣臣再拜退車駕還內賜少監遊操三品服御書扇餘官筆墨館閣官各轉一官淳熙五年九月十三日孝宗幸祕書省如紹興十四年之儀帝賦詩羣臣皆屬和進書儀紹興二十年五月八日進呈中興聖統太常博士丁屢明言乞比附進呈玉牒行禮二十四年進呈徽宗御集禮部曰昨紹興十年徽宗御製擬以敷文名閣今乞權安奉於天章閣續俟崇建二十六年十月進呈太后回鑾事實二十七年三月宰臣沈該言玉牒所官陳康伯等先次編修太祖皇帝玉牒自誕聖至即位自建隆元年至開寶九年通修一十七年開基玉牒舊制以梅紅羅面簽金字今欲題曰皇宋太祖皇帝玉牒引編修今上皇帝玉牒自誕聖之後聖德祥瑞建大元帥府事迹至即帝位二十餘年又自即位後編修至紹興二年通修二十六年中興玉牒今欲題曰皇宋今上皇帝玉牒宣祖太祖太宗魏王下各宗仙源類譜五世昭穆今已修寫進本乞擇日進呈詔從其請前期儀鸞司臨安府於玉牒殿上南向設權安奉玉牒類譜並中興聖統幄次又於玉牒所向外設騎從官及文武百官等待班幕次又於景靈宮內外設騎從官幕次進呈前一日俟朝退玉牒所提領官都大提舉諸司官承受官玉牒所官等赴本所幕次宿衛俟儀仗樂人等排立御史臺閣門太常寺分引玉牒所官詣玉牒殿下北向立禮直官引提領官詣玉牒殿下北向立禮直官揖躬拜提領官拜在位官皆再拜訖次引提領官詣香案前搢笏三上香執笏退復位皆再拜訖班退歸幕次宿衛儀仗樂人作樂晝夜更互排立其日五更御史臺閣門太常寺分引提領官宰執使相侍從臺諫兩省官知閣禮官南班宗室詣玉牒殿北向立禮直官揖躬拜提領官拜在位官皆再拜訖次引提領官詣玉牒類譜香案前搢笏三上香執笏退復位禮直官引提領官詣幄前西向立次騎從官分左右乘馬俟玉牒所率輦官奉擎玉牒類譜腰輿進行樂人作樂儀衛儀仗迎引次引提領官宰執使相侍從臺諫兩省官知閣禮官南班宗室騎從至和寧門下馬執笏步從玉牒類譜至垂拱殿門外幄次步從官權歸幕次樂止儀衛樂人等並於幄次前排立俟進呈玉牒類譜並如閣門儀訖俟玉牒類譜出殿門御史臺閣門太常寺分引提領官宰執使相侍從臺諫兩省官知閣禮官南班宗室分左右執笏步從儀衛樂人前引迎奉出皇城北宮門步從等官上馬騎從至和寧門外前引將至玉牒所御史臺閣門太常寺分引文武百官於玉牒所門內殿門外立班內文臣釐務通直郎以上及承務郎見任寺監主簿執事官以上武臣修武郎以上迎拜訖如值雨地下沾濕迎拜官吏不迎拜騎從官至玉牒所並下馬執笏步從詣玉牒殿下分東西相向立禮直官引提領官詣玉牒類譜幄前西向立定俟玉牒所率輦官奉擎玉牒類譜入幄儀仗儀衛輦官樂人更互排立提領官宰執使相侍從臺諫兩省官知閣禮官南班宗室及玉牒所官分官赴景靈宮迎奉皇帝中興聖統赴玉牒殿同時安奉俟安奉時將至設香案畢次御史臺閣門太常寺分引文武百官詣玉牒殿下並北向立班定禮直官引提領官詣幄前西立俟日官報時及次玉牒所安奉玉牒類譜訖次引提領官復位北向立定禮直官揖躬拜提領官拜在位官皆再拜訖禮直官引提領官詣香案前搢笏三上香執笏退復位立定在位皆再拜訖退儀衛樂人等以次退自是凡進書並倣此惟進太上皇聖政則有詣德壽宮之儀淳祐五年二月十二日進孝宗光宗兩朝御集寧宗實録及理宗玉牒日曆其日皇帝御垂拱殿提舉官禮儀使宗室使相宰執以下赴實録院右文殿玉牒所經武閣並行燒香禮畢奉迎諸書至和寧門步導至垂拱殿以俟班齊各隨腰輿入殿下東西向立皇帝服鞾袍出宮殿下鳴鞭禁衛諸班直親從等並入內省執骨朵使臣國史實録院日曆所編修經武要略所玉牒所點檢文字以下並腰輿下人並迎駕自贊常起居內擎腰輿人不拜止應喏皇帝即御坐先知閣門官以下各班起居如常儀次入內官下殿各取合進呈書匣升殿於殿上東壁各置案上以南為上知閣門官二員自御坐前導皇帝起詣三朝諸書香案前褥位東向立閣門提點奏請上香三上香訖又奏請皇帝再拜訖知閣門官前導皇帝復歸御坐知閣門官歸東朵殿上侍立儀鑾司徹香案拜褥降東朵殿次舍人請國史實録院以下提舉官禮儀使宰執並進讀官升殿於御坐東面西立國史實録院國史日曆所編修經武要略所玉牒所官殿下依舊立俟入內官進御案孝宗御集提舉官並進讀御集官稍前立分進讀御集官於御前過西壁面東立御集提舉諸司官於孝宗御集匣前搢笏啓封開鑰訖出笏歸侍立位御集承受官搢笏於御集匣內取册轉授提舉官搢笏接訖承受出笏提舉官奉册置御案上出笏皇帝起前立提舉諸司官承受官分東西相向立並搢笏揭册訖各出笏進讀御集官搢笏稍前取子指讀逐版揭册指讀並如上儀俟進讀畢皇帝復坐進讀御集官置子於御案上出笏却於御前東壁面西立以俟提舉官搢笏收册復授承受官搢笏接訖提舉官出笏稍後立承受官奉册入匣訖出笏提舉諸司官搢笏鎖匣訖出笏歸侍立位次讀光宗御集寧宗實録光宗經武要略並同上儀次玉牒提舉官並進讀玉牒官稍前立分進讀玉牒官於御前過西壁面東立玉牒提舉諸司官於玉牒匣前搢笏啓封鑰訖出笏歸侍立位玉牒承受官搢笏取册授提舉官置御案上進讀亦如前儀讀畢鎖匣出笏歸侍立位次日曆提舉官並進讀日曆官啓封鑰進讀亦同俱畢入內官徹案承受官奉册入匣訖出笏提舉諸司官搢笏鑰匣訖出笏歸侍立位儀鸞司徹卓子降東朵殿奉書匣下殿各置腰輿上國史實録院日曆所編修經武要略所玉牒所提舉官禮儀使宰執並降東階下殿東壁面西立舍人引各官及禮儀使一班當殿面北立定引各直身出班斂身稱謝訖歸位立揖躬身贊拜兩拜訖贊各祗候直身立宣答御藥下殿宣答提舉官禮儀使並斂身聽宣答訖御藥升殿揖躬身贊拜兩拜訖贊各祗候直身立舍人引赴東壁面西立次引國史實録院日曆所編修經武要略所玉牒所官一班首直身出班斂身稱謝訖歸位立揖躬身贊拜兩拜訖贊各祗候直身立如傳旨謝恩知閣門官承旨訖於折檻東面西立傳與舍人承旨訖再揖躬身贊謝恩拜兩拜訖贊各祗候直身立不該賜茶官先退次引國史實録院日曆所編修經武要略所玉牒所提舉諸司官並承受官以下一班當殿面北立定揖躬身贊謝恩拜兩拜訖贊各祗候直身立各歸位立次引國史實録院日曆所編修經武要略所玉牒所點檢文字以下一班當殿面北立定揖躬身贊謝恩拜兩拜訖贊各祗候直身立各歸位立傳旨宣坐賜茶訖舍人奏閣門無公事皇帝起還宮百官導送奏安兩朝御集實録於天章閣經武要略於經武閣玉牒於玉牒所日曆於祕閣如儀大射之禮廢於五季太宗始命有司草定儀注其羣臣朝謁如元會酒三行有司言請賜王公以下射侍中稱制可皇帝改服武辨布七埒於殿下王公以次射開樂縣東西廂設熊虎等侯陳賞物於東階以賚能者設豐爵於西階以罰否者並圖其冠冕儀式表著埻埒之位以進帝覽而嘉之謂宰臣曰俟弭兵當與卿等行之凡遊幸池苑或命宗室武臣射每帝射中的從官再拜奉觴貢馬為賀預射官中者帝為之解賜襲衣金帶散馬不解則不賜苑中皆有射棚畫暈的射則用招箭班三十人服緋紫繡衣帕首分立左右以唱中否節序賜宴則宗室禁軍大校牧伯諸司使副皆令習射遂為定制外國使入朝亦令帥臣伴賜射於園苑政和宴射儀皇帝御射殿侍宴官公服繫㙐射官窄衣奏聖躬萬福再拜升殿酒三行引射官降皆執弓矢謝恩再拜三公以下在右射官在左不射者依坐次分立皇帝初射中舍人贊拜凡左右祗應臣僚除內侍外並階上下再拜行門禁衛諸班親從諸司祗應人並自贊再拜招箭班殿上躬奏訖跪進碗射官先傳弓箭與殿侍側立內侍接碗訖就拜起降階再拜有司進御茶牀天武引進奉馬列射𣛀前員僚奏聖躬萬福東上閣門官詣御前躬奏班首姓名以下進酒班首以下橫行立贊再拜班首奉酒進樂作飲畢殿上臣僚再拜舍人贊各賜酒羣官俱再拜贊各就坐羣官皆立席後引進司官臨階宣進奉出天武奉馬出樂合復贊就坐飲訖揖興諸司收坐物等射官左側臨階取弓箭侍立皇帝再射中的或雙中如上儀進酒臨時取旨得旨進酒更不進奉中扁碗及解中更不賀不進酒臣僚射中引降階再拜訖殿下側立御箭解中招箭班進碗如上儀舍人再引射中官當殿揖躬宣有敕賜窄衣金帶跪受箱過再拜過殿側服所賜訖再引當殿再拜更不射如宣再射或更賜箭令射如未退即就位再拜如再射中御箭再解中賜鞍轡馬如上儀臣僚射中御箭不解引降階再拜立招箭班殿上躬奏訖下殿舍人宣有敕賜銀碗跪受執碗並箭就拜起再拜如合賜散馬即同宣賜宣有敕賜銀碗兼賜散馬若干匹射訖進御茶床諸司復陳坐物等羣官各立席後贊就坐羣官俱坐酒五行宣示盞宣勸如儀皆作樂宴畢內侍舉御茶床三公以下降階再拜退乾道二年二月四日車駕幸玉津園皇帝射訖次命皇太子次慶王次恭王次管軍臣僚等射如是者三每射四發帝前後四中的淳熙元年九月車駕幸玉津園命從駕文武官行宴射之禮皇太子宰執以下酒三行樂作皇帝臨軒有司進弓矢皇帝中的皇太子進酒率宰執以下再拜稱賀宣皇太子射射中賜宣預射臣僚射使相鄭藻起居舍人王卿月環衛官蕭奪里懶射中各賜襲衣金帶鄉飲之禮有三周禮鄉大夫三年大比興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮賓之一也黨正國索鬼神而祭祀則禮屬民而飲酒于序以正齒位二也州長春秋習射于序先行鄉飲禮三也後世臘蠟百神春秋習射序賓飲酒之儀不行於郡國唯貢士日設鹿鳴宴猶古者賓興賢能行鄉飲之遺禮也然古禮有賓主僎介與今之禮不同器以尊俎與今之器不同賓坐於西北介坐於西南主人坐東南僎坐東北與今之位不同主人獻賓賓酢主人主人酬賓次主人獻介介酢主人次主人獻衆賓與今之儀不同今制州軍貢士之月以禮飲酒且以知州軍事為主人學事司所在以提舉學事為主人其次本州官入行上舍生當貢者與州之羣老為衆賓亦古者序賓養老之意也是月也會凡學之士及武士習射亦古者習射于序之意也唐貞觀所頒禮惟明州獨存淳化中會例行之政和禮局定飲酒祭降之節與舉酒作樂器用之屬並參用辟雍宴貢士儀其有古樂處令用古樂既又以河北轉運判官張孝純之言周官以六藝教士必射而後行古者諸侯貢士天子試諸射宮請詔諸路州郡每歲宴貢士於學因講射禮於是禮官參定射儀鄉飲酒前一日本州於射亭東西序量地之宜設提舉學事諸監司知州通判州學教授應赴鄉飲酒官貢士幕次本州兵馬教諭備弓矢應用物設樂其日初筵提舉學事知州軍通判帥應赴鄉飲酒官貢士詣射亭執弓矢揖人射乘矢若中則守帖者舉獲唱獲執算者以算投壺畢多算勝少算射畢贊者贊揖酬酢如儀畢揖退飲如鄉飲酒紹興七年郡守仇悆置田以供費十三年比部郎中林保乞修定鄉飲儀制遍下郡國於是國子祭酒高閌草具其儀上之僎介之位皆與古制不合諸儒莫解其指意慶元中朱熹以儀禮改定知學者皆尊用之主賓僎介之位始有定説其主則州以守縣以令位于東南賓以里居年高及致仕者位于西北僎則州以倅縣以丞或簿位東北介以次長位西南三賓以賓之次者司正以衆所推服者相及贊以士之熟於禮儀者其日質明主人率賓以下先釋菜于先聖先師退各就次以俟肅賓介與衆賓既入主人序賓祭酒再拜詣罍洗洗觶至酒尊所酌實觶授執事者至賓席前跪以獻賓賓酬主人主人酬介介酬衆賓賓主以下各就席坐訖酒再行次沃洗贊者請司正揚觶致辭司正復位主人以下復坐主人興復至阼階楣下僎從賓介復至西階下立三賓至西階立並南向主人拜賓介以下再拜賓介與衆賓先自西趨出主人少立自東出賓以下立于庠門外之右東鄉主人立于門外之左西鄉僎從主人再拜賓介以下皆再拜退
