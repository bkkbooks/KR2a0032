body:
  text: 宋史卷一百五十志第一百三輿服二后妃車輿皇太子王公以下車輿繖扇鞍勒門戟旌節皇后之車唐制六等一曰重翟二曰厭翟三曰翟車四曰安車五曰四望車六曰金根車宋因之初用厭翟車其制箱上有平盤四角曲闌盤兩壁紗牕龜文金鳳翅前有虛匱香爐香寶緋繡幰衣絡帶門簾三轅鳳首畫梯推竿行馬緋繒裹索駕六馬金銅面纓轡鈴攀緋屜駕士三十人武弁緋繡衫常出止用正副金塗銀裝白藤輿各一上覆椶櫚屋飾以鳳輦官服同乘輿平頭輦之制徽宗政和三年議禮局上皇后車輿之制重翟車青質金飾諸末間以五采輪金根朱牙其箱飾以重翟羽四面施雲鳳孔雀刻鏤龜文頂輪上施金立鳳耀葉青羅幰衣一紫羅畫雲龍絡帶二青絲絡網二紫羅畫帷一青羅畫雲龍夾幔二車內設紅褥及坐橫轅上施立鳳八香匱設香爐香寶香匱飾以螭首前後施簾長轅三飾以鳳頭青繒裹索駕青馬六馬有銅面插翟羽鞶纓攀胸鈴拂青屜青包尾若受冊謁景靈宮則乘之厭翟車赤質其箱飾以次翟羽紫幰衣紅絲絡網紅羅畫絡帶夾幔錦帷餘如重翟車駕赤騮四若親蠶則乘之翟車黃質其車側飾以翟羽黃幰衣黃絲絡網錦帷絡帶餘如重翟車駕黃騮四安車赤質金飾間以五采刻鏤龜文紫幰衣錦帷絡帶紅絲絡網前後施簾車內設褥及坐長轅三飾以鳳頭駕赤騮四凡駕馬鞶纓之飾並從車質四望車朱質青幰衣餘同安車駕牛三金根車朱質紫幰衣餘同安車駕牛三自重翟車以下備鹵簿則皆以次陳設藤輿金塗銀裝上覆椶櫚屋以龍飾常行之儀則用之龍肩輿一名椶檐子一名龍檐子舁以二竿故名檐子南渡後所製也東都皇后備厭翟車常乘則白藤輿中興以太后用龍輿后惟用檐子示有所尊也其制方質椶頂施走脊龍四走脊雲子六朱漆紅黃藤織百花龍為障緋門簾看牕簾朱漆藤坐椅踏子紅羅裀褥軟屏夾幔隆興二年正月皇后受冊畢擇日朝謁有司具儀物乞乘肩輿龍檐製造所受給使臣尹肇發納中宮金塗銀葉椶櫚朱漆紅黃藤織百花龍枰子碌牙壓貼鏤金雕木腰花泥版龍檐子一乘金塗銀頂子龍頭六走脊龍四走脊雲子六貼絡龍四十貼絡雲子三十鐸子八插拴坐龍四環索全鈸遮那一副檀香龜背紅紗牕四扇紅羅緣紅篸門簾一瀝水全看牕簾二朱漆藤面明金雕木龍頭椅一脚踏一紅線絛結一朱漆小几二紅羅褥全紅羅緣肩膊席褥一十六繫帶全金塗銀鐵胎杆鞫四魚鈎四火踏一朱漆梯盤全朱漆衣匣二金塗銅手把葉段拓叉二金塗銅叉頭拖泥行馬二金塗銀葉杠子二紅茸匾絛四紅羅夾軟屏風夾幔各一襯脚席褥靠背坐褥及踏床各一紅絹十字帕一竿袋四魚鈎帕二紅油十字帕竿袋魚鈎帕數同上兜地帕一圍裙一大安輦真宗咸平中為萬安太后製輿上設行龍六乾興元年詔皇太后御坐檐子名大安輦神宗嗣位尊皇太后為太皇太后其行幸依治平元年之制而皇太后皇后常出止用副金塗銀裝白藤輿覆以椶櫚屋飾以鳳輦官服同乘輿平頭輦之制於是詔太皇太后出入所乘如萬安太后輿上設行龍六制飾率有加金銅車禮典不載則如舊制哲宗紹聖元年議造皇太后大安輦中書具治平元豐中皇太后輿服儀衞以呈曰元豐中先帝手詔皇太后行幸儀衞並依慈聖光獻太皇太后日例而宣仁謙恭不乘大安輦哲宗曰今皇太后獨尊非宣仁比遂詔行幸進大安輦已而皇太后嫌避竟不製造龍輿皇太后所乘也東都皇太后多垂簾皆抑損遠嫌不肯乘輦止用輿而已哲宗既嗣位尊朱貴妃為皇太妃出入許乘檐子有司請用牙魚鳳為飾繖用青元祐三年太皇太后詔有司尋繹典故於是檐子飾以龍鳳繖用紅九年羣臣議改檐子為輿上設行龍五出入由宣德東偏門哲宗以皇太后諭旨令太妃坐六龍輿出入進黃繖由宣德正門於是三省議皇太妃坐龍鳳輿繖紅黃兼用從皇太后出入止用紅紹聖元年禮部太常寺言近奉旨皇太后欲令皇太妃坐六龍輿朕常思皇太妃尊奉之禮既不敢擬隆於皇太后又不可不逮於中宮今參以人情再加詳定伏請供進龍鳳輿從之及徽宗即位尊太妃為聖瑞皇太妃詔儀物除六龍輿不用仍進龍鳳輿外餘悉增崇焉紹興奉迎皇太后詔造龍輿其制朱質正方金塗銀飾四竿竿頭螭首赭牕紅簾上覆以椶加走龍六內設黃花羅帳裀褥朱椅踏子紅羅黃羅繡巾二皇太子車輅之制唐制三等一曰金輅二曰軺車三曰四望車太宗至道初真宗為皇太子謁太廟乘金輅常朝則乘馬真宗天禧中仁宗為皇太子亦同此制徽宗政和三年議禮局上皇太子車輅之制金輅赤質金飾諸末重較箱畫苣文鳥獸黃屋伏鹿軾龍輈金鳳一在軾前設障塵朱蓋黃𩹉輪畫朱牙左建旂九旒右載闟戟旂首金龍頭銜結綬及鈴綏八鸞在衡二鈴在軾駕赤騮四金鍐方釳插翟尾鏤鍚鞶纓九就從祀謁太廟納妃則供之軺車金飾諸末紫油通幰紫油纁朱𩹉駕馬一四望車金飾諸末青油通幰青油纁朱𩹉朱絲絡網駕馬一軺車四望車以次列於鹵簿仗內皇太子妃則有厭翟車駕以三馬出入亦乘檐子中興簡儉惟用藤檐子頂梁舁杠皆飾以玄漆四角刻獸形素藤織花為面如政和之制親王羣臣車輅之制唐制有四一曰象輅親王及一品乘之二曰革輅二品三品乘之三曰木輅四品乘之四曰軺車五品乘之宋親王一品二品奉使及葬並給革輅制同乘輿之副惟改龍飾為螭六引內三品以上乘革車赤質制如進賢車無案駕四赤馬駕士二十五人其緋幰衣絡帶旗戟綢杠繡文司徒以瑞馬京牧以隼御史大夫以獬豸兵部尚書以虎太常卿以鳳駕士衣亦同縣令乘軺車黑質兩壁紗牕一轅金銅飾紫幰衣絡帶並繡雉銜瑞草駕二馬駕士十八人百官常朝皆乘馬真宗大中祥符四年知樞密院事王欽若言王公車輅上並用龍裝乞下有司檢定制度詔下太常禮院詳定本院言按鹵簿令王公已下象輅以象飾諸末朱班輪八鸞在衡左建旂畫龍一升一降右載闟戟革輅以革飾諸末左建旃餘同象輅木輅以漆飾之餘同革輅軺車曲壁青幰碧𩹉諸輅皆朱質朱蓋朱旂旃一品九旒二品八旒三品七旒四品六旒其鞶纓如之神宗元豐三年詳定禮文所言鹵簿記公卿奉引第一開封令乘軺車次開封牧隼旗次太常卿鳳旗次司徒瑞馬旗次御史大夫獬豸旗次兵部尚書虎旗而乘革車考之非是謹按周禮巾車職曰孤乘夏篆卿乘夏縵大夫乘墨車司常職曰孤卿建旃大夫建物請公卿已下奉引先開封令乘墨車建物次開封牧乘墨車建旗太常卿御史大夫兵部尚書乘夏縵司徒乘夏篆並建旃所以參備九旗之制詔從之政和議禮局上王公以下車制象輅以象飾諸末朱班輪八鸞在衡左建旗右載闟戟駕馬四親王昏則用之革車赤質載闟戟緋羅繡輪衣簾旗韜杠絡帶駕赤馬四大駕鹵簿六引法駕鹵簿三引開封牧第乘之王公一品二品三品備鹵簿皆供革車一乘其輪衣簾旗韜杠絡帶繡文開封牧以隼大司樂以鳳少傅以瑞馬御史大夫以獬豸兵部尚書以虎軺車黑質紫幰衣絡帶並繡雉施紅錦簾香爐香寶結帶駕赤馬二鹵簿內第一引官縣令乘之駕馬皆有銅面插羽鞶纓攀胸鈴拂緋絹屜紅錦包尾六年禮制局言大觀中用大司樂代太常卿為第三引蓋以大司樂掌鼓吹之事夫禮樂之官宗伯為長宜改用禮部尚書又第四引司徒即用地官之長自漢以來為三公朝廷近改司徒為少傅然六引司徒乃地官之事宜改用戶部尚書其府佐依六引諸卿例改為僚佐其鹵簿儀仗依兵部尚書例給古之諸侯出封於外同姓錫以金輅異姓錫以象輅蓋出而制節則遠君而其道伸入而謹度則近君而其勢屈故其入覲則不敢乘金輅象輅以同于王當自降而乘墨車也若公侯采地在天子縣內者則為都鄙之長大司馬所謂師都建旃是矣今開封牧列職于朝與御史大夫同謂之卿可也其在周官則卿大夫之職是矣又無金輅象輅之錫而乃比於古之諸侯入覲而乘墨車可乎成周上公九命車旗以九為節故建常九斿侯伯七命車旗以七為節故建常七斿子男五命車旗以五為節故建常五斿其卿六命其大夫四命車旗亦各其命之數則卿之建旃當用六斿大夫建物當用四斿至於三斿則上士所建也其開封令宜乘墨車而建物四斿開封牧御史大夫戶部兵部禮部尚書皆卿也宜乘夏縵而建旃六斿其年詳定官蔡攸又言六引開封令乘軺車居前開封牧大司樂司徒御史大夫兵部尚書乘革車次之開封牧建繡隼旗太常卿建繡鳳旗司徒繡瑞馬旗御史大夫繡以獬豸兵部尚書繡以虎皆副之以闟戟其先後之序所乘之車所建之旗揆古則不合驗今則有戾且大駕之出自漢光武時始有三引先河南尹次執金吾次洛陽令先尊而後卑也後魏亦三引先平城令次司隸校尉次丞相先卑而後尊也唐兼用六引五代減為三後周復增為六本朝因之以開封令居前終以兵部尚書然以前為尊則大司樂不當次令牧以後為尊則兵部尚書不當繼御史大夫此先後之序未正也軺車非縣令宜駕革車非公卿宜用是所乘之車未稱也鳳馬之繡無所經見闟戟之設尤為訛謬是所建之旗未宜也司徒三公論道之官車徒非其所任戶部主之可也奉常掌禮司樂典樂皆專於一事禮樂之容非其所兼禮部之宜也請改司徒用戶部尚書改大司樂用禮部尚書其僚佐儀制視兵部尚書御史大夫位亞三少秩從二品又尊於六尚書其行宜以兵部次令牧禮部戶部又次之終以御史大夫則先後之序正矣夏篆者篆其車而五采畫之也夏縵則五采畫之而不篆墨車則漆之而不畫孤宜乘夏篆象其文質之備卿宜乘夏縵象其文采而不足於篆開封令秩比大夫開封牧古之諸侯其乘皆宜墨車其駕之馬令以三牧以四御史大夫以六尚書卿之任也其駕亦四則所乘之車稱矣司常曰孤卿建旃大夫士建物師都建旗蓋通帛為旃其色純赤雜帛為物其色赤白物為三斿旃亦如之開封令秩視大夫故宜建以物開封牧率王畿之衆而衞上師都之任也故宜建以旗尚書御史大夫古之卿也故宜建以旃從之七年禮制局言昨討論大駕六引開封牧乘墨車兵部尚書禮部尚書戶部尚書御史大夫乘夏縵已經冬祀陳設訖所有駕士衣服尚循舊六引之制宜行改正況天子五輅駕士之服各隨其輅之色則六引駕士之服當亦如之請墨車駕士衣皂夏縵駕士皂質綉五色團花於禮為稱從之肩輿神宗優待宗室老疾不能騎者出入聽肩輿熙寧五年大宗正司請宗室以病肩輿者踏引籠燭不得過兩對中興後人臣無乘車之制從祀則以馬常朝則以轎舊制輿檐有禁中興東征西伐以道路阻險詔許百官乘轎王公以下通乘之其制正方飾有黃黑二等凸蓋無梁以篾席為障左右設牖前施簾舁以長竿二名曰竹轎子亦曰竹輿內外命婦之車唐制有厭翟車翟車安車白銅飾犢車而幰網有降差宋制銀裝白藤輿檐內命婦皇親所乘白藤輿檐金銅犢車漆犢車或覆以梹或覆以椶內外命婦通乘繖人臣通用以青絹為之宋初京城內獨親王得用太宗太平興國中宰相樞密使始用之其後近臣及內命婦出入皆用真宗大中祥符五年詔除宗室外其餘悉禁明年復許中書樞密院用焉京城外則庶官通用神宗熙寧之制非品官禁用青蓋京城惟執政官及宗室許用哲宗紹聖二年詔在京官不得用涼扇徽宗政和三年以燕越二王出入百官不避乃賜三接青羅繖一紫羅大掌扇二塗金花鞍韉茶燎等物皆用塗金遂為故事八年詔民庶享神不得造紅黃繖扇及彩繪以為祀神之物宣和初又詔諸路奉天神用紅黃繖扇餘祠廟並禁其畫壁塑像儀仗用龍飾者易之建炎中初駐蹕杭州執政張澂言羣臣扈從兵閒權免張蓋俟回鑾仍舊詔前宰相到闕許張蓋鞍勒之制宋以賜羣臣其非賜者皆有令式而不敢踰越焉金塗銀鬧裝牡丹花校具八十兩紫羅繡寶相花雉子方韉油畫鞍白銀銜鐙以賜宰相親王樞密使帶使相曾任宰相觀文殿大學士宮觀使殿前馬軍步軍都指揮使金塗銀鬧裝太平花校具七十兩紫羅繡瑞草方韉油畫鞍陷銀銜鐙以賜使相樞密副使參知政事宣徽使節度使宮觀使殿前馬軍步軍副都指揮使都虞候四廂都指揮使韀以紫羅剜花若出使則加紅犛牛纓金塗銀鈸使相在外加紅織成鞍複步軍都虞候以上賜帶甲馬者加紅皮鞦轡校具七十兩青梹圓韉陷銀銜鐙金塗銀鬧裝麻葉校具五十兩紫羅剜花方韉油畫鞍陷銀銜鐙以賜三司使觀文殿學士資政殿大學士翰林學士承旨翰林學士資政殿端明殿翰林侍讀侍講龍圖天章寶文閣樞密直學士御史中丞兩使留後觀察防禦使軍廂都指揮使軍廂都指揮使初出授團練使刺史者賜亦同曾任中書樞密院後為學士中丞者七十兩韉以繡瑞草見任中書樞密院宣徽使使相節度使出使曾任中書樞密院充諸路都總管安撫使朝日賜亦如之金塗銀三環寶相花校具二十五兩紫羅圓韉烏漆鞍銜鐙以賜團練使刺史金塗銀促結洛州花校具三十兩紫羅圓韉以賜諸路承受白成十五兩以賜諸王宮僚翰林侍讀侍書金塗銀寶相花校具四十兩蠻雲校具十五兩以賜諸班押班殿前指揮使以上白成窪面校具十二兩以賜諸班皆藍黃絁圓韉其皇親婚嫁皆給藍黃羅繡方韉金塗銀花鞍金塗銀校具自八十兩至十二兩有六等宗室女壻繫親皆賜紫羅繡瑞草方韉校具自七十兩至五十兩有二等其賜契丹使則金塗銀太平花校具七十兩紫羅繡寶相花雉子方韉副使則槲葉校具五十兩紫羅繡合子地圓韉皆油畫鞍射弓則使銀裝副使銀稜賜諸蕃進奉大使則如刺史而用青絛韉副使則如宮僚凡京官三品以上外任者皆許馬以纓飾太宗太平興國七年翰林學士承旨李昉言準詔詳定車服制度請升朝官許乘銀裝絛子鞍勒六品以下不得鬧裝其韉皆不得刺繡金皮飾餘官及工商庶人許並乘烏漆素鞍不得用狨毛暖坐其藍黃絛子非宮禁不得乘士庶軍校乘白皮韉勒者悉禁斷從之八年詔京朝知錄事參軍及知縣者所乘馬並不得飾纓後復許帶纓端拱二年詔內職諸班押班禁軍指揮使廂軍都虞候並許乘銀裝絛子鞍勒京官任知州通判許依六品朝官真宗咸平二年西京留臺上言留府羣官使臣乘馬不得帶纓從之大中祥符五年詔繡韉及鬧裝校具除宗室及恩賜外悉禁天禧元年令兩省諫舍宗室將軍以上許乘狨毛暖坐餘悉禁凡京官三班已上外任者皆許馬以纓飾仁宗景祐三年詔官非五品以上毋得乘鬧裝銀鞍其乘金塗銀裝絛子促結鞍轡者自文武升朝官及內職禁軍指揮使諸班押班廂軍都虞候防團副使以上聽之仍毋得以藍黃為絛白皮為韉轡民庶止許以梹皮絁紬為韉京官為通判以上職任者許權依升朝例神宗熙寧間文武升朝官禁軍都指揮使以上塗金銀裝盤絛促結五品以上復許銀鞍鬧裝若開花繡韉惟恩賜乃得乘餘官及民庶仍禁銀飾舊制諸王視宰相用繡鞍韉政和三年始賜金花鞍韉諸王不施狨坐宣和末始賜中興因之乾道九年重修儀制權侍郎太中大夫以上及學士待制經恩賜許乘狨坐三衙節度使曾任執政官亦如之先是建炎初駐蹕杭州詔扈從臣僚合設狨坐者權宜撤去故事宰執侍從自八月朔搭坐紹興元年以江浙地燠改為九月朔著為例乾道元年乃詔三衙乘馬賜狨坐門戟木為之而無刃門設架而列之謂之棨戟天子宮殿門左右各十二應天數也宗廟門亦如之國學文宣王廟武成王廟亦賜焉惟武成王廟左右各八臣下則諸州公門設焉私門則府第恩賜者許之太宗淳化二年詔諸道州府軍監奏乞鼓角戟矟如令文合賜即下三司指揮仁宗天聖四年太常禮院言準批狀詳定知廣安軍范宗古奏本軍乞降矟檢會令文京兆河南太原府大都督府都護門十四戟若中都督上都護門十二戟下都督諸州門各十戟並官給所有軍監門不載伏請不行神宗元豐之制凡門列戟者官司則開封河南應天大名大都督府皆十四中都督皆十二下都督皆十品官恩賜者正一品十六二品以上十四中興仍舊制旌節唐天寶中置節度使受命日賜之得以專制軍事行即建節府樹六纛宋凡命節度使有司給門旗二龍虎各一旌一節一麾槍二豹尾二旗以紅繒九幅上設耀篦鐵鑽髹杠緋纛旌用塗金銅螭頭髹杠綢以紅繒畫白虎頂設髹木盤周用塗金飾節亦用髹杠飾以金塗銅葉上設髹圓盤三層以紅綠裝釘為旄並綢以紫綾複囊又加碧油絹袋麾槍設髹木盤綢以紫繒複囊又加碧油絹袋豹尾製以赤黃布畫豹文並髹杠神宗熙寧五年詔新建節幷移鎮並降敕太常寺排比旌節下左右金吾街仗司騏驥院給執擎人員鞍馬中興因之建炎三年表韓世忠之旗曰忠勇紹興三年表岳飛之旗曰精忠孝宗詔以其藩邸旌節迎置天章閣淳熙中光宗亦詔奉東宮旌節其後寧宗踐祚有司言安奉皇帝藩邸旌節宜有推飾今用朱漆青地金字牌二其一題曰太上皇帝藩邸旌節其一曰今上皇帝藩邸旌節蓋襲用元豐延安故事云
