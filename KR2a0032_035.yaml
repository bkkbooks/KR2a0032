body:
  text: 宋史卷三十五本紀第三十五孝宗三五年春正月辛丑侍御史謝廓然乞戒有司毋以程頤王安石之說取士從之癸卯罷特旨免臣僚及寺觀科徭庚戌大風己未詔侍從臺諫兩省官集議考課法二月己巳置州縣丁稅司辛未申嚴武臣呈試法詔二廣毋以攝官人治獄丁丑禁解鹽入京西界甲申雨土庚寅威州蠻寇邊討降之三月丁未李彥穎罷給辰沅澧靖四州刀弩手田壬子以史浩為右丞相丁巳幸玉津園己未以王淮知樞密院事趙雄參知政事是春黎州蠻出降夏四月乙丑朔詔葉衡任便居住丙寅以禮部尚書范成大參知政事辛未知紹興府張津進羨餘四十萬緡詔以代民輸和買身丁之半賜禮部進士姚穎以下四百十有七人及第出身丁丑雨土己卯以趙思奉使不如禮罷起居舍人仍降二官丁亥命後省擇中外所言利病不戾成法者以聞五月庚子置武學國子員丁未修臨安府城禁諸路州軍責屬縣進羨餘六月庚午飭百官及諸監司毋得請托乙亥范成大罷癸未詔京西湖北商人以牛馬負茶出境者罪死甲申詔翰林學士諫議大夫給事中中書舍人侍御史各舉堪御史者二人以給事中錢良臣簽書樞密院事己丑罷諸州私置稅場減四川茶課十五萬餘緡庚寅蠲大理寺贓錢三萬九千餘緡閏月丙申贈強霓強震官立廟西和州賜名旌忠丁酉限四川總領會子額戊戌罷興州都統司營田官兵募民耕佃己亥復分利州東西路為二壬寅置鎮江建康府轉般倉龔茂良卒于英州乙巳以魏王愷為永興成德軍節度使雍州牧判明州如故庚戌蠲秀州民折帛錢秋七月甲子太尉提舉萬壽觀李顯忠薨癸未禁砂毛錢丁亥以歲豐命沿江糴米百六十萬石以廣邊儲八月甲午詔諸路監司戒所部民稅毋以重價強折輸錢復制科舊法丁酉詔關外四州增募民兵為忠勇軍戊午增銓試為五場呈試為四場九月甲子定廣西賣鹽賞罰壬申幸秘書省戊寅賜岳飛謚曰武穆冬十月戊戌史浩等上三祖下第六世仙源類譜仁宗玉牒庚子遣宇文价等使金賀正旦辛亥金遣張九思等來賀會慶節乙卯奉國軍節度使殿前都指揮使王友直以募兵擾民降為武寧軍承宣使罷軍職統制以下奪官有差軍民讙呶者執送大理寺鞫之戊午以孫右千牛衞大將軍擴為明州觀察使封英國公十一月丙寅詔軍民喧鬨者並從軍法史浩言民不宜律以軍法不聽王友直再降為宜州觀察使信州居住浩請罷政甲戌浩罷為少傅還舊節充醴泉觀使兼侍讀乙亥以錢良臣參知政事丁丑以趙雄為右丞相王淮為樞密使戊寅以兩川禁卒千人為成都府雄邊軍庚辰復監司互察法十二月庚寅朔班新定薦舉式辛卯遣錢沖之等賀金主生辰丁酉罷興元都統司營田官兵募民耕佃辛丑復同安蘄春監丙午禁兩淮銅錢復行鐵錢丙辰金遣烏延察等來賀明年正旦是歲階福建興化軍水通泰楚州高郵軍田鼠傷禾三佛齊國入貢六年春正月戊辰振淮東饑民庚午復置內侍省合同憑由司壬申蠲夔州路上供金銀丁丑雨雹辛巳復置光州中渡榷場二月己丑朔幸佑聖觀召史浩曾覿賜酒壬辰錢良臣以失舉贓吏奪三官丙申詔前宰執侍從有己見利便聽不時以聞辛丑立武臣關升蔭補法丙午詔逃軍犯強盜者毋擬貸癸丑命州縣毋撓義役乙卯詔自今歸正官親赴部授官以革冒濫丁巳裁特奏名試法三月庚申幸聚景園丙寅錄趙鼎岳飛子孫賜以京秩己巳郴州賊陳峒等破連道州桂陽軍諸縣命湖南帥臣討捕之置廣西義倉辛未再振淮東饑民壬申雨雹丁丑詔戒勵諸道轉運使庚辰幸玉津園夏五月壬戌裁宗室換官法庚午蠲四川鹽課十萬緡乙亥郴寇平癸未給襄陽歸正忠義人田六月甲午建豐儲倉丙申詔特奏名毋授知縣縣令戊戌蠲郴州運粮丁夫今年役錢之半辛亥廣西妖賊李接破鬱林州守臣李端卿棄城遁遂圍化州命經略司討捕之端卿除名勒停梅州編管秋七月癸亥籍郴州降寇隸荊鄂軍戊辰班隆興以來寬恤詔令于諸路趙雄等上會要乙亥詔諸軍五口以上增給緡錢癸未太白晝見經天八月庚寅罷諸路監司帥守便宜行事壬寅以知楚州翟畋過淮生事奪五官筠州居住九月辛未合祭天地于明堂大赦癸未詔福建二廣賣鹽毋擅增舊額冬十月乙酉朔蠲連州被寇民租稅辛卯遣陳峴等使金賀正旦丙申詔太學兩優釋褐與殿試第二人恩例庚子四川行當三大錢再蠲四川鹽課十七萬餘緡辛丑除紹興府民逋賦五萬餘緡乙巳金遣蒲察鼎壽等來賀會慶節戊申廣西妖賊平十一月乙卯朔帝著論數百言深原用人之弊因及誅賞之法命宰執示從臣于都堂辛酉裁宗子試法戊寅罷金州管內安撫司壬午詔宗室有出身人得考試及注教授官癸未遣傅淇等賀金主生辰十二月丙戌班重修淳熙敕令格式丙申修百司省記法己亥詔自今鞫贓吏後雖原貸者毋以失入坐獄官庚戌金遣耶德慥等來賀明年正旦辛亥蠲臨安府征稅一年是歲溫台州水和州旱七年春正月甲子減廣西諸州歲賣鹽數乙丑劉焞以平李接功擢集英殿修撰將佐幕屬吏士進官減磨勘年有差己卯詔京西州軍並用鐵錢及會子民戶銅錢以鐵錢或會子償之滿二月不輸官許告賞庚辰蠲淮東民貸常平錢米二月癸未朔初置廣南煙瘴諸州醫官丙戌復置皇太子宮小學教授辛卯魏王愷薨乙未詔撥廣西兵校五百人隸提刑司戊戌罷瓜洲孳生馬監己亥出湖南樁積米十萬石振糶永邵郴三州甲辰命利州路守貳縣令兼領營田乙巳限改官員歲毋過八十人封子棟為宜州觀察使安定郡王三月壬戌詔舉賢良方正能直言極諫者庚午迎太上皇太上皇后宴翠寒堂乙亥減內外官薦舉員丁丑再蠲臨安府民身丁錢三年詔諸州招補軍籍之闕自今歲以為常夏四月甲申幸聚景園丙戌趙雄等上仁宗哲宗玉牒戊子除明州積欠諸司錢十五萬緡辛卯再免沿邊歸正人請占官田賦役三年甲辰黎州五部落犯盤佗砦兵馬都監高晃以綿潼大軍三千人與戰敗走蠻人深入大掠而去己酉命廕補武舉宗室小使臣行三年喪五月戊辰以吏部尚書周必大參知政事刑部尚書謝廓然簽書樞密院事袁州分宜縣大水捐其稅戊寅詔舒蘄二州鑄錢歲以四十五萬貫為額己卯申飭書坊擅刻書籍之禁庚辰詔特奏名年六十人毋注縣尉六月丙戌以特進觀文殿大學士判建康府陳俊卿為少保壬辰五部落再犯黎州制置司鈐轄成光延戰敗官軍死者甚衆提點刑獄權州事折知常棄城遁甲午制置司益兵遣都大提舉茶馬吳總往平之壬寅詔試刑法官增試經義秋七月癸丑詔二廣帥臣監司察所部守臣臧否以聞丁卯以旱決繫囚分命羣臣禱雨于山川壬申移廣西提刑司于鬱林州八月癸未禁黎州官吏市蕃商物甲申以禱雨未應諭輔臣欲令職事官以上各實封言事是夕雨丁酉置湖南飛虎軍戊戌雨甲辰五部落犯黎州塞興州左軍統領王去惡拒却之折知常重賂蠻使之納款九月癸亥詔自今常朝毋稱丞相名甲子命樞密使亦如之乙丑詔宰執使相給使減年恩數身後三年者毋收使丙寅詔知縣成資始聽監司薦舉壬申禁諸路遏糴癸酉名省記法為淳熙重修百司法冬十月丙戌詔限田太寬民役煩重其令臺諫給舍同戶部長貳詳議以聞戊子遣葉宏等使金賀正旦乙未黎州五部落進馬乞降詔却獻馬許其互市庚子金遣李佾等來賀會慶節十一月癸丑詔邊吏存恤江西過淮饑民丁巳禁淮南諸司州郡抑配民酒辛酉蠲兩淮州軍二稅一年癸亥黎州戍軍伍進等作亂折知常遁去王去惡誘進等誅之壬申南康軍旱詔出檢放所餘苗米萬石充軍糧癸酉遣蓋經等賀金主生辰十二月庚寅趙雄等上神宗哲宗徽宗欽宗四朝國史志壬辰以四川制置使胡元質不備蕃部致其猖獗奪兩官罷之丙申嗣濮王士輵薨戊戌以新除成都府路提點刑獄祿東之權四川制置司應黎州邊事隨宜措置癸卯詔臨安府承宣旨審奏如故事甲辰金遣徒單守素等來賀明年正旦是月詔以太上皇明年七十有五議行慶壽禮太上皇不允帝進黃金二千兩為壽是歲江浙淮西湖北旱蠲租發廩貸給趣州縣決獄募富民振濟補官故歲雖凶民無流殍安南入貢八年春正月甲寅停折知常官汀州居住丙辰詔內侍見帶兵官並與在京宮觀著為令乙亥詔福建歲撥鹽于邵武軍市軍糧二月壬午詔去歲旱傷郡縣以義倉米日給貧民至閏三月半止黎州土丁張百祥等不堪科役為亂統領官劉大年引兵逆擊之土丁潰去大年坐誅戊子禁浙西民因旱置圍田者裁童子試法己丑禁廣西諸州科賣亭戶食鹽庚寅詔三省樞密六部置籍稽考興利除害等事戊戌以保康軍節度使士歆為嗣濮王三月丁未朔幸佑聖觀戊午以潮州賊沈師為亂趣帥憲捕之辛未幸聚景園閏月辛巳命諸路帥臣監司分州郡臧否為三等歲終來上戊子賜禮部進士黃由以下三百七十有九人及第出身庚寅修揚州城甲午幸玉津園壬寅減在京及諸路房廊錢什之三德壽宮所減月以南庫錢貼進禁潭道等州官賣鹽甲辰立宗室命繼法夏四月癸丑修湖南諸州城丙辰以臨安疫分命醫官診視軍民庚申復以強盜配隸諸軍重役丁卯安定郡王子棟薨癸酉立郴州宜章桂陽軍臨武縣學以教養峒民子弟五月戊寅詔監司守令勸課農桑以奉行勤怠為賞罰壬午詔諸路轉運司趣民間補葺經界簿籍辛卯以久雨減京畿及兩浙囚罪一等釋杖以下貸貧民稻種錢壬寅以史浩為少師六月己酉詔放殿前司平江府牧馬草蕩二萬畝聽民漁採戊午除淳熙七年諸路旱傷檢放米一百三十七萬石錢二十六萬緡辛酉罷諸路坊場監官聽民承買戊辰史浩薦薛叔似楊簡陸九淵陳謙葉適袁燮趙善譽等十六人詔並赴都堂審察七月癸未復以許浦水軍隸殿前司永陽郡王居廣薨追封永王辛卯賞監司守臣修舉荒政者十六人以不雨決繫囚壬辰紹興大水出秀婺州平江府米振糶丁酉嚴州水詔被災之家蠲其和買三等以上戶減半辛丑錄范質後八月丙午以旱罷招軍庚戌趙雄罷壬子詔紹興府諸縣夏稅和市折帛身丁錢絹之類不以名色截日並令住催癸丑以王淮為右丞相兼樞密使甲寅以謝廓然同知樞密院事丙辰更後殿幄次為延和殿己未以觀文殿大學士新四川制置使趙雄知瀘州戊辰言者請自今歉歲蠲減經費有虧令戶部據實以聞毋得督趣已蠲閣之數從之罷諸路補葺經界簿籍九月庚辰命諸路提舉司貸民麥種辛巳錢良臣罷庚寅以謝廓然兼權參知政事冬十月己酉遣施師點等使金賀正旦辛酉錄黎州戰歿將士四百三人甲子金遣完顏寔等來賀會慶節詔災傷州縣諭民振糶十一月甲戌以旱傷罷喜雪宴戊寅蠲富陽新城錢塘夏稅庚寅前池州守趙粹中誤斬遞卒汪青落職仍詔給青家衣粮十五年辛卯詔兩省侍從臺諫各舉所知浚行在至鎮江府運河丁酉遣燕世良賀金主生辰己亥振臨安府及嚴州饑民庚子再詔臨安府為粥食饑民辛丑以淳熙元年減半推賞法募民振糶十二月癸卯朔以徽饒二州民流者衆罷守臣官出南庫錢三十萬緡付新浙東提舉常平朱熹振糶丁未禁諸州營造戊申謚劉安世曰忠定辛亥蠲諸路旱傷州軍明年身丁錢物甲寅雨雹以度僧牒募閩廣民入米丙辰詔縣令有能舉荒政者監司郡守以名聞甲子下朱熹社倉法于諸路戊辰金遣魏貞吉等來賀明年正旦以爭執進書儀帝還內遣王抃往諭旨己巳貞吉奉書入見是月廣東安撫鞏湘誘潮賊沈師出降誅之是歲江浙兩淮京西湖北潼川夔州等路水旱相繼發廩蠲租遣使按視民有流入江北者命所在振業之九年春正月甲戌詔四孟朝獻分用三日如在京故事丁丑命兩淮戍兵歲一更癸未罷樞密都承旨王抃為在外宮觀因罷諸軍承受復密院文書關錄兩省舊法以文臣為都承旨戊子糴廣南米赴行在庚寅詔江浙兩淮旱傷州縣貸民稻種計度不足者貸以樁積錢二月庚戌遣使訪問二廣鹽法利害戊辰四川制置司言獲州賊大波浪三月辛未朔幸佑聖觀詔振濟忠萬恭涪四州癸未振濟鎮江壬辰遣使按視淮南江浙振濟甲午罷諸路寄招軍兵三年就揀軍子弟補其闕夏四月甲辰詔自今盜發所在親臨帥守監司論罰平定有勞者議賞乙卯詔諸路提刑文武臣通置一員癸亥帝覽陸贄奏議諭講讀官曰今日之政恐有如德宗之弊者卿等條陳來上無有所隱五月癸酉以孫抦為右千牛衞大將軍丙子詔輔臣擇監司郡守必先才行六月壬寅詔侍從臺諫各舉操修端亮風力彊明可充監司者一二人甲寅蠲犒賞庫酒課二十二萬餘緡汀漳二州民為沈師蹂踐者除其賦丁巳給臨安府貧民棺瘞錢戊午謝廓然薨庚申太白晝見臨安府蝗詔守臣亟加焚瘞甲子太白晝見經天秋七月甲戌以江西常平義倉及樁管米四十萬石付諸司預備振糶辛巳出南庫錢三十萬緡付浙東提舉朱熹以備振糶壬辰以資政殿學士李彥穎參知政事詔發所儲和糴米百四十萬石補淳熙八年振濟之數于沿江屯駐諸州樁管八月己亥朔詔紹興民戶去歲已納夏稅應減者三十萬緡理為今年之數庚子減皇后內命婦蔭補數立文武臣遇郊奏薦員限致仕遺表恩澤視舊法捐三之一淮東浙西蝗壬子定諸州官捕蝗之罰乙卯復賞修舉荒政監司守臣九月己巳朔罷諸路科買軍器物料三年庚午以王淮為左丞相梁克家為右丞相丙子以子彤為容州觀察使封安定郡王辛巳大享明堂大赦乙酉以錢引十萬緡賜瀘州備振糶辛卯封伯圭為滎陽郡王以旱減恭合渠昌州今年酒課癸巳太白晝見乙未禁蕃舶販易金銀著為令十月戊戌朔遣王藺等使金賀正旦丙午罷軍器所招軍辛亥塞四川沿邊支徑戊午金遣完顏宗回等來賀會慶節甲子蠲諸路旱傷州軍淳熙七年八年逋賦出縣官緡錢以償戶部十一月戊辰朔禁臣庶之家婦飾僭擬庚午振夔路飢乙酉進奏院火丙戌遣賈選等賀金主生辰戊子大風十二月己亥更二廣官賣鹽法復行客鈔仍出緡錢四十萬以備漕計之闕癸亥金遣孛朮魯正等來賀明年正旦十年春正月丁丑以給事中施師點簽書樞密院事命州縣掘蝗甲申李彥穎罷乙酉命二廣提舉鹽事官互措置鹽事丙戌以施師點兼權參知政事丁亥詔終身任宮觀人毋得奏子己丑詔罷廣南官鬻鹽法壬辰罷江東浙西寄招鎮江諸軍三年二月癸卯提舉德壽宮陳源有罪竄建寧府尋移郴州仍籍其家貲進納德壽宮三月戊辰李燾上續資治通鑑長編六百八十七卷辛未有司請造第七界會子辛巳免四川和糴三年癸未幸玉津園戊子詔四川類試自今十六人取一人己丑除詐稱災傷籍產法癸巳復銓試舊法罷試雜文夏四月丙申再蠲臨安府民丁身錢三年己亥命湖南廣西堙塞溪洞徑路五月丙寅增皇太子宮小學教授一員甲戌以潭州飛虎軍隸江陵都統司戊寅幸聚景園辛卯詔疏襄陽木渠以渠傍地為屯田尋詔民間侵耕者就給之廢舒州宿松監六月戊戌監察御史陳賈請禁偽學乙巳罷昭州歲貢金己未詔諸路監司帥臣歲舉廉吏庚申嚴贓吏禁秋七月乙丑以不雨決繫囚丙寅幸明慶寺禱雨甲戌以夏秋旱暵避殿減膳令侍從臺諫兩省卿監郎官館職各陳朝政闕失分命羣臣禱雨于天地宗廟社稷山川左丞相王淮等以旱乞罷不許丁丑詔除災傷州縣淳熙八年欠稅甲申雨己丑御殿復膳八月戊申以施師點參知政事兼同知樞密院事御史中丞黃洽參知政事庚戌以史浩為太保魏國公致仕庚申以左藏南庫隸戶部九月乙丑長溪寧德縣大水丙寅嚴盜販解鹽法丁丑幸佑聖觀壬午蠲諸州逋負內藏庫錢六十萬緡乙酉遣余端禮等使金賀正旦丁亥禁內郡行鐵錢冬十月乙未詔兩浙義役從民便壬子金遣完顏方等來賀會慶節十一月壬戌朔日有食之乙丑降會子收兩淮銅錢甲戌幸龍山大閱遂幸玉津園閏月壬寅詔却安南獻象丁巳遣陳居仁等賀金主生辰十二月丙子朝德壽宮行太上皇后慶壽禮推恩如太上皇故事丁亥金遣完顏婆盧火等來賀明年正旦是歲福漳台信吉州水京西金澧州南平荊門興國廣德軍江陵建康鎮江紹興寧國府旱十一年春正月辛卯朔雨土辛丑安化蠻蒙光漸等犯宜州思立砦廣西兵馬鈐轄沙世堅出兵討之獲光漸丙午詔江東西路諸監司義役差役從民便甲寅雨土二月甲申詔兩淮京西湖北萬弩手令在家閱習每州許歲上材武者一二人試授以官如四川義士之制三月辛卯詔刑部御史臺每季以仲月錄囚徒癸巳命利路三都統吳挺郭鈞彭杲密陳出師進取利害以備金人復金州管內安撫司甲午以上津洵陽旱蠲其稅辛丑罷秀州御馬院莊歸其侵地于民丁未禁淮民招溫處州戶口除職田官田八年逋租庚戌詔御試策有及軍民利害者考官裒類以聞辛亥史浩入謝賜宴于內殿夏四月甲子以興元義勝軍移戍襄陽戊辰賜禮部進士衞涇以下三百九十四人及第出身癸未重班紹興申明刑統五月戊子朔蠲崇德等十六縣小民淳熙十年欠稅十四萬緡癸卯命刑部大理寺議減刺配法甲寅出緡錢三十萬犒給四川久戍將士乙卯太白晝見六月戊午朔詔諸道總領舉偏裨可將帥者庚申以周必大為樞密使壬戌詔在內尚書侍郎兩省諫議大夫以上御史中丞學士待制在外守臣監司不限科舉年分各舉賢良方正能直言極諫一人己卯詔諸州歲買稻種備農民之闕秋七月癸卯蠲減浙東敗闕坊場酒課癸丑以浙西江東水禁諸州遏糴甲寅築黎州要衝城八月庚申遣章森使金賀正旦九月丁亥詔諸路添差官自今毋創置乙巳詔殿前軍子弟許權收刺一次甲寅再減四川酒課六十八萬餘緡冬十月甲子初命舉改官人犯贓者舉主降二官乙丑遣王信等賀金主生辰庚午禁諸州增收稅錢丙子金遣張大節等來賀會慶節盱眙軍言得金人牒以上京地寒來歲正旦生辰人使權止一年壬午詔諸以忠義立廟者兩淮漕臣繕治之十一月壬寅禁福建民私有兵器癸卯助廣西諸州歲計十萬緡甲寅令峽州歲時存問處士郭雍十二月丁巳修湖南府城己卯詔戒監司州縣毋得於常賦外追取於民是歲江東浙西諸州水福建廣東吉贛州建昌軍興元府金洋西和州旱十二年春正月己丑禁交阯鹽入省地壬辰四川制置使留正遣人誘青羌奴兒結殺之戊戌日中有黑子戊申賜任伯雨謚曰忠敏庚戌日中復有黑子二月辛酉雨雹乙亥罷諸軍額外制領將佐庚辰置黎州防邊義勇三月乙酉進孫擴為安慶軍節度使封平陽郡王辛卯禁習渤海樂辛亥命侍從臺諫兩省總領管軍官各舉堪都副統制者一二人癸丑除稅場高等累賞法夏四月甲子幸聚景園戊辰班淳熙寬恤詔令丙子諜言故遼大石林牙假道夏人以伐金密詔吳挺與留正議之己卯幸玉津園五月庚寅地震辛卯福州地震詔帥臣趙汝愚察守令擇兵官防盜賊六月乙卯立淮東彊勇軍效用效士法壬戌除諸軍逋欠營運錢丁丑詔浙東帥臣監司不以時上諸州臧否奪一官戊寅太白晝見秋七月丁酉太白晝見經天壬寅詔二廣試攝官如銓試例取其半甲辰以淮西屯田鹵莽總領軍帥漕臣守臣奪官有差八月癸亥詔太上皇壽八十令有司議慶壽禮乙丑詔戶部給舍臺諫詳議官民戶役法以聞九月甲申復二廣監司以下到罷酬賞法丙戌詔恤湖州台州被水之家庚寅遣王信等使金賀正旦丁丑詔諸路總領軍帥漕臣守臣歲上屯田所收之數冬十月辛亥加上太上皇尊號曰光堯壽聖憲天體道性仁誠德經武緯文紹業興統明謨盛烈太上皇帝太上皇后曰聖壽齊明廣慈備德太上皇后甲寅蠲施黔州經制無額錢命侍從各舉宗室一二人癸亥詔諸路臧否以三月終四川二廣以五月終來上十一月丁亥鄂州大火戊子雷壬辰遣章森等賀金主生辰辛丑合祀天地于圜丘大赦十二月庚戌朔帥羣臣奉上太上皇太上皇后冊寶于德壽宮推恩如紹興三十二年故事甲子以知福州趙汝愚為四川制置使丙子金遣僕散守忠等來賀明年正旦十三年春正月庚辰朔率羣臣詣德壽宮行慶壽禮大赦文武臣僚並理三年磨勘免貧民丁身錢之半為一百一十餘萬緡內外諸軍犒賜共一百六十萬緡癸巳以史浩為太傅陳俊卿為少師嗣濮王士歆為少保庚子以昭慶軍節度使士峴為開府儀同三司二月甲寅詔強盜兩次以上雖為從論死庚申詔舉歸正添差任滿人才藝堪從軍者三月丁酉詔職事官改官許在歲額八十員之外合提舉廣南東西鹽事司為一甲辰幸玉津園夏四月辛亥吳挺結約夏人戊辰再蠲四川和糴軍粮三年辛未幸聚景園五月癸未日中有黑子甲申詔非泛補官及七色補官人非曾任在朝侍從者品秩雖高毋得免役丙申賜冲晦處士郭雍號曰頤正先生仍遣官就問雍所欲言備錄來上秋七月壬辰詔內外諸軍主帥各舉堪統制者二三人壬寅謚胡銓曰忠簡閏月丙午朔雨雹戊申以敷文閣學士留正簽書樞密院事己酉施師點乞免兼同知樞密院事許之己未五星皆伏八月乙亥朔日月五星聚于軫丙子以故相曾懷鬻奏補恩追落觀文殿大學士壬午新築江陵城成九月乙巳詔偽造會子凡經行用並處死是月遣李獻等使金賀正旦冬十月甲戌朔福州火甲午金遣完顏老等來賀會慶節十一月戊午詔四川制置司通知馬政量收木渠民包占荒田租庚申遣張叔椿等賀金主生辰甲子王淮等上仁宗英宗玉牒神宗哲宗徽宗欽宗四朝國史列傳皇帝會要丙寅梁克家罷為觀文殿大學士醴泉觀使兼侍讀辛未裁定百司吏額十二月丙子思州田氏獻納所買黔州民省地詔償其直辛巳減汀州鹽價歲萬緡甲午陳俊卿薨乙未振臨安府城內外貧乏老疾之民戊戌大理寺獄空己亥金遣耶律子元等來賀明年正旦辛丑再賜軍士雪寒錢是歲利州路饑江西諸州旱十四年春正月癸亥出四川樁積米貸濟金洋州及關外四州饑民二月丁亥以周必大為右丞相戊子以施師點知樞密院事三月甲子幸玉津園夏四月己卯置籍考諸路上供殿最以為賞罰戊子賜禮部進士王容以下四百三十五人及第出身五月乙巳成都火己酉遣官措置汀州經界六月戊寅以久旱班畫龍祈雨法甲申幸太一宮明慶寺禱雨丁亥梁克家薨庚寅臨安府火辛卯太白晝見癸巳王淮等以旱求罷不許詔衡州葺炎帝陵廟己亥減兩浙路囚罪一等釋杖以下秋七月辛丑罷戶部上供殿最丙午詔羣臣陳時政闕失及當今急務丁未以旱罷汀州經界己酉詔監司條上州縣弊事民間疾苦辛亥避殿減膳徹樂癸丑命檢正都司看詳羣臣封事有可行者以聞詔省部漕臣催理已蠲逋欠者令臺諫覺察權減秀州經總制糴本錢半年丙辰命臨安府捕蝗募民輸米振濟除紹興新科下戶今年和市布帛二萬八千匹辛酉江西湖南饑給度僧牒鬻以糴米備振糶戊辰雨命給舍看詳監司所條弊事八月辛未賜度牒一百道米四萬五千石備振紹興府饑甲戌御殿復膳癸未以留正參知政事兼同知樞密院事丙戌復夔路酬賞法九月癸卯太上皇不豫乙巳詣德壽宮問疾丙午遣萬鍾等使金賀正旦己未詣德壽宮問疾乙丑罷增收木渠民田租丙寅除官軍私負冬十月辛未以太上皇不豫赦壬申詣德壽宮問疾癸酉分遣羣臣禱于天地宗廟社稷甲戌以太上皇未御常膳自來日不視朝宰執奏事內殿乙亥詣德壽宮侍疾太上皇崩于德壽殿遣誥太上皇后改稱皇太后奉皇太后旨以奉國軍承宣使甘主管太上皇喪事丙子以韋璞等為金告哀使戊寅以滎陽郡王伯圭為欑宮總護使翰林學士洪邁言大行皇帝廟號當稱祖詔有司集議以聞己卯詔尊皇太后辛巳詔曰大行太上皇帝奄棄至養朕當衰服三年羣臣自遵易月之令可令有司討論儀制以聞甲申用禮官顏師魯等言大行太上皇帝上繼徽宗正統廟號稱宗乙酉百官五上表請帝還內聽政丙戌詔俟過小祥勉從所請戊子帝衰絰御素輦還內以顏師魯等充金國遣留國信使己丑金遣田彥臯等來賀會慶節詔免入見却其書幣甲午詣德壽宮自是七日皆如之十一月戊戌朔詣德壽宮自是朔望皆如之己亥大行太上皇帝大祥自是帝以白布巾袍御延和殿詣德壽宮衰絰而杖如初詔皇太子惇參決庶務庚子皇太子三辭參決庶務不許辛丑詣德壽宮禫祭百官釋服甲辰羣臣三上表請御殿聽政詔俟過祔廟戊申遣胡晉臣等賀金主生辰辛亥冬至詣德壽宮甲寅西南方有赤氣隨日入乙卯雷戊午詔皇太子參決庶務于議事堂在內寺監在外守臣以下與宰執同除授訖乃奏己未詔五日一朝德壽宮十二月庚午大理寺獄空壬午東北方有赤氣隨日出癸巳金遣完顏崇安等來賀明年正旦見于垂拱殿之東楹素幄詔禮物毋入殿付之有司是歲兩浙江西淮西福建旱振之十五年春正月丁酉朔詣德壽宮几筵行禮戊戌皇太子初決庶務于議事堂辛丑復置左右補闕拾遺乙巳詔免諸州軍會慶節進奉二年詔自今御內殿令皇太子侍立庚申施師點罷甲子以黃洽知樞密院事吏部尚書蕭燧參知政事二月丁亥金遣蒲察克忠等來吊祭行禮于德壽殿次見帝于東楹之素幄癸巳遣京鏜等使金報謝三月庚子王淮等上大行太上皇謚曰聖神武文憲孝皇帝廟號高宗乙巳上高宗謚冊寶于德壽殿又上懿節皇后改謚憲節冊寶于別廟本室丁未右丞相周必大攝太傅持節導梓宮癸丑用洪邁議以呂頤浩趙鼎韓世忠張俊配饗高宗廟庭吏部侍郎章森乞用張浚岳飛祕書少監楊萬里乞用浚皆不報丙寅權欑高宗于永思陵夏四月壬申帝親行奉迎虞主之禮自是七虞八虞九虞卒哭奉辭皆如之乙亥詔洪邁楊萬里並予郡甲申用禮官尤袤請詔羣臣再集議配享臣僚丙戌祔高宗神主于太廟詔曰朕比下令欲衰絰三年羣臣屢請御殿易服故以布素視事內殿雖詔俟過祔廟勉從所請然稽諸典禮心實未安行之終制乃為近古宜體至意勿復有請己丑詔減臨安紹興府囚罪一等釋杖以下民緣欑宮役者蠲其賦庚寅用御史冷世光言罷再議配享皇太后有旨車駕一月四詣德壽宮如舊禮五月己亥王淮罷乙巳帝既用薛叔似言罷王淮詔諭叔似等曰卿等官以拾遺補闕為名不任糾劾今所奏乃類彈擊甚非設官命名之意宜思自警丁巳詔修高宗實錄己未祈門縣大水壬戌始御後殿詔歲出錢五萬六千餘緡減廣東十二州折納米價錢六月丁卯雨雹戊辰罷敕令所己巳以伯圭為少傅帶御器械夏執中為奉國軍節度使癸酉以新江西提點刑獄朱熹為兵部郎官熹以疾未就職侍郎林栗劾熹慢命熹乞奉祠太常博士葉適論栗襲王淮鄭丙陳賈之說為道學之目妄廢正人詔熹仍赴江西熹力辭不赴庚寅熒惑犯太微秋七月戊戌上高宗廟樂曰大勳舞曰大德己未出兵部侍郎林栗壬戌恩平郡王璩薨追封信王八月甲子朔日有食之九月庚子夜南方有赤黃氣覆大內辛丑大饗明堂以太祖太宗配大赦癸卯更試補醫官法己酉遣鄭僑等使金賀正旦甲寅上皇太后宮名慈福冬十月癸未金遣王克溫等來賀會慶節見于垂拱殿東楹甲申會慶節詔北使百官詣東上閤門拜表起居免入賀己丑再罷諸州科買軍器物料三年十一月庚子建煥章閣藏高宗御集遣何澹賀金主生辰甲辰詔百官輪對毋過三奏十二月丙寅追復龔茂良資政殿學士壬午命朱熹主管西太一宮兼崇政殿說書辭不至戊子金遣田彥臯等來賀明年正旦是歲江西湖北兩淮建寧府徽州水十六年春正月癸巳金主雍殂孫璟立甲午封孫抦為嘉國公丙申黃洽罷己亥以周必大為左丞相留正為右丞相蕭燧兼權知樞密院事禮部尚書王藺參知政事刑部尚書葛邲同知樞密院事乙巳蕭燧罷丙午皇太后移御慈福宮戊申以昭慶軍承宣使郭師禹為保大軍節度使辛亥罷淮西屯田是日帝始諭二府以旬日當內禪命周必大留身呈詔草丙辰罷拘催錢物所復二廣官般官賣鹽法己未更德壽宮為重華宮謚李綱曰忠定二月辛酉朔日有食之壬戌下詔傳位皇太子是日皇太子即皇帝位帝素服駕之重華宮辛未上尊號曰至尊壽皇聖帝皇后曰壽成皇后紹熙五年五月壬戌壽皇聖帝不豫六月戊戌崩于重華殿年六十有八十月丙辰謚曰哲文神武成孝皇帝廟號孝宗十一月乙卯權欑于永阜陵十二月甲戌祔于太廟慶元三年十一月辛丑加謚紹統同道冠德昭功哲文神武明聖成孝皇帝贊曰高宗以公天下之心擇太祖之後而立之乃得孝宗之賢聰明英毅卓然為南渡諸帝之稱首可謂難矣哉即位之初銳志恢復符離邂逅失利重違高宗之命不輕出師又值金世宗之立金國平治無釁可乘然易表稱書改臣稱姪減去歲幣以定鄰好金人易宋之心至是亦寖異於前日矣故世宗每戒羣臣積錢穀謹邊備必曰吾恐宋人之和終不可恃蓋亦忌帝之將有為也天厭南北之兵欲休民生故帝用兵之意弗遂而終焉然自古人君起自外藩入繼大統而能盡宮庭之孝未有若帝其間父子怡愉同享高壽亦無有及之者終喪三年又能却羣臣之請而力行之宋之廟號若仁宗之為仁孝宗之為孝其無愧焉其無愧焉
