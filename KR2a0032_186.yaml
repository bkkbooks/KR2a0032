body:
  text: 宋史卷一百八十六志第一百三十九食貨下八商稅市易均輸互市舶法商稅凡州縣皆置務關鎮亦或有之大則專置官監臨小則令佐兼領諸州仍令都監監押同掌行者齎貨謂之過稅每千錢算二十居者市鬻謂之住稅每千錢算三十大約如此然無定制其名物各隨地宜而不一焉行旅齎裝非有貨幣當算者無得發篋搜索凡販夫販婦細碎交易嶺南商賈齎生藥及民間所織縑帛非鬻於市者皆勿算常稅名物令有司件析頒行天下揭于版置官署屋壁俾其遵守應算物貨而輒藏匿為官司所捕獲沒其三分之一以半畀捕者販鬻而不由官路者罪之有官須者十取其一謂之抽稅自唐室藩鎮多便宜從事擅其征利以及五季諸國益務掊聚財貨以自贍故征算尤繁宋興所下之國必詔蠲省屢敕官吏毋事煩苛規羨餘以徼恩寵大中祥符六年始免諸路州軍農器之稅諸州津渡舊皆有算或水涸改置橋梁有司猶責主者備償建隆初詔除滄德棣淄齊鄆乾渡三十九處算錢水漲聽民置渡勿收其算自是有類此者多因恩宥蠲除其餘橘園魚池水磑社酒蓮藕鵝鴨螺蚌柴薪地鋪枯牛骨溉田水利等名皆因諸國舊制前後屢詔廢省緣河州縣民船載粟亦輸算三年始罷陳州私置蔡河鎖民船勝百斛者取百錢有所載倍其征太平興國三年乃悉除之至道元年詔江南溪渡多公吏豪民典其事量輸官課而厚算行旅州縣宜加嚴禁所輸年額錢五千以下者並免不係色役近便人戶掌船濟渡毋得擾人至道中歲入稅課錢四百萬貫天禧末增八百四萬貫天聖以來國用寖廣有請算緡錢以助經費者仁宗曰貨泉之利欲流天下通有無何可算也一日內出蜀羅一端為印朱所漬者數重因詔天下稅務毋輒污壞商人物帛康定元年西邊兵費不給州縣或增所算名物朝廷知之悉命蠲去既而下詔敕勵且戒毋搜索行者家屬歲儉則免算耕牛水鄉又或弛蒲魚果蓏之稅民流而渡河者亦為之免算應算而匿不自言者雖聽人捕告抵罪如舊法然須物皆見在乃聽以防誣罔至於歲課贏縮屢詔有司裁定前後以詔蠲放者不可勝數皇祐中歲課緡錢七百八十六萬三千九百嘉祐以後弛茶禁所歷州縣收算錢至治平中歲課增六十餘萬而茶稅錢居四十九萬八千六百熙寧以來河北河東陝西三路支移民以租賦齎貨至邊貿易以輸官者勿稅河北流民復業者所過免算後以歲稔慮逸歲課復舊五年以在京商稅院隸提舉市易務七年減國門之稅數十種錢不滿三十者蠲之其先外城二十門皆責以課息近令隨閑要分等以檢捕獲失之數為賞罰既而以歲旱復有是命元豐元年濱棣滄州竹木魚果炭箔稅不及百錢者蠲之二年熙河路制置邊防財用李憲擅榷本路商貨令漕臣蔣之奇劾其罪導洛通汴司請置堆𣛀場於泗州賈物至者先入官場官以船運至京稍輸船算明年詔近京以通津水門外順成倉為場非導洛司船而載商人稅物入汴者許糾告雖自請稅猶如私載法惟日用物非販易若箔柴草竹木之類勿禁瓊管奏海南收稅較船之丈尺謂之格納其法分三等有所較無幾而輸錢多寡十倍賈物自泉福兩浙湖廣至者皆金銀物帛直或至萬餘緡自高化至者唯米包瓦器牛畜之類直纔百一而概收以丈尺故高化商人不至海南遂乏牛米請自今用物貴賤多寡計稅官給文憑聽鬻於部內否則許糾告以船貨給賞詔如所奏六年京東漕臣吳居厚言商人負正稅七萬六千餘緡倍稅十五萬二千餘緡詔蠲其倍稅納正稅百千以下期以三年百千以上五年元祐元年戶部請令在京商稅院酌取元豐八年錢五十五萬二千二百六十一緡有奇以為新額自明年始三年又以天聖歲課為額蓋戶部用五年併增之法立額既重歲課不登故言者論而更之七年罷諸路承買土產稅場初罷江南路承買而河東轉運司以為較元祐六年官監額增三萬餘緡遂行之諸路八年權蠲商人載米入京糶賣力勝之稅先是熙寧六年蘇湖歲稔穀價比淮南十五而商船以力勝稅不至嘗命權蠲惠止一方未為定法及汴泗𣛀場法行穀船毋得增置而力勝之稅益三之一至是蘇軾言法不稅五穀請削去力勝錢之條而行天聖免稅之制既而尚書省亦言在京穀貴欲平其直復權蠲之後徽宗宣和中以州縣災傷并贍給都下亦一再免旋復如舊惟兩浙并東北鹽以鹽事司之請遂不復征自哲宗即位罷導洛物貨場紹聖四年藍從熙提舉京城所欲復其事令泗州及京師洛口各置𣛀場并請復麵市牛羊圈詔下尚書省久之遂寢至是提舉汴河隄岸王憲復言之且請假溫明州運船給用命太府少卿鄭僅同詳度明年竟詔勿行五年令戶部取天下稅務五年所收之數酌多寡為中制頒諸路揭版示之率十年一易其增名額及多稅者並論以違制大觀元年凡典買牛畜舟車之類未印契者更期以百日免倍稅二年詔在京諸門凡民衣屨穀菽鷄魚蔬果柴炭瓷瓦器之類並蠲其稅歲終計所蠲數令大觀庫給償宣和二年宮觀寺院臣僚之家商販令關津搜閱如元豐法輸稅歲終以次數報轉運司取旨初元符令品官供家服用物免稅至建中靖國初馬牛駝驢騾已不入服用例而比年臣僚營私牟利者衆宮觀寺院多有專降免稅之旨皆以船艘賈販故有是詔漕臣劉既濟起應奉物兩浙淮南等路稅例外增一分以供費三年詔罷之凡以蠶織農具耕牛至兩浙江東者給文憑蠲稅一年四年令諸路近歲所增稅錢悉歸應奉司七年以歲歉之後用物少而民艱食在京及畿內油炭麵布絮稅并力勝錢並權免提舉京東常平楊連奏本路牛價貴田多荒萊請令販牛至本路者仍給文憑蠲稅俟二年足如舊從之靖康元年詔都城物價未平凡稅物權更蠲稅一年臣僚上言祖宗舊制并政和新令場務立額之法並以五年增虧數較之併增者取中數併虧者取最高數以為新額故課息易給而商旅可通近諸路轉運司不循其法有益無損致物價騰踴官課愈負請令諸路提刑下諸郡準舊法釐正立額詔依所奏高宗建炎元年詔販貨上京者免稅明年又詔販糧草入京抑稅者罪之凡殘破州縣免竹木磚瓦稅北來歸正人及兩淮復業者亦免路稅紹興三年臨安火免竹木稅然當時都邑未奠兵革未息四方之稅間有增置及於江灣浦口量收海船稅凡官司回易亦並收稅而寬弛之令亦錯見焉如諸路增置之稅場山間迂僻之縣鎮經理未定之州郡悉罷而免之又以稅網太密減併者一百三十四罷者九免過稅者五至於牛米薪麵民間日用者並罷孝宗繼志凡高宗省罷之未盡者悉推行之又以臨安府物價未平免淳熙七年稅一年光寧以降亦屢與放免商稅或一年或五月或三月凡遇火放免竹木之稅亦然光寧嗣服諸郡稅額皆累有放免然當是時雖寬大之旨屢頒關市之征迭放而貪吏並緣苛取百出私立稅場算及緡錢斗米束薪菜茹之屬擅用稽察措置添置專欄收檢虛市有稅空舟有稅以食米為酒米以衣服為布帛皆有稅遇士夫行李則搜囊發篋目以興販甚者貧民貿易瑣細于村落指為漏稅輒加以罪空身行旅亦白取百金方紆路避之則欄截叫呼或有貨物則抽分給賞斷罪倍輸倒囊而歸矣聞者咨嗟指為大小法場與斯民相刃相劘不啻讎敵而其弊有不可勝言矣市易之設本漢平準將以制物之低昂而均通之其弊也以官府作賈區公取牙儈之利而民不勝其煩矣熙寧三年保平軍節度推官王韶倡為緣邊市易之說丐假官錢為本詔秦鳳路經略司以川交子易物貨給之因命韶為本路帥司幹當兼領市易事時欲移司於古渭城李若愚等以為多聚貨以啟戎心又妨秦州小馬大馬私貿易不可文彥博曾公亮馮京皆韙之韓絳亦以去秦州為非唯王安石曰古渭置市易利害臣雖不敢斷然如若愚奏必無可慮七月詔轉運司詳度復問陳升之升之謂古渭極邊恐啟羣羌闚覬心安石乃言今蕃戶富者往往蓄緡錢二三十萬彼尚不畏劫奪豈朝廷威靈乃至衰弱如此今欲連生羌則形勢欲張應接欲近古渭邊砦便於應接商旅並集居者愈多因建為軍增兵馬擇人守之則形勢張矣且蕃部得與官市邊民無復逋負足以懷來其心因收其贏以助軍費更闢荒土異日可以聚兵時王安石為政汲汲焉以財利兵革為先其市易之說已見於熙寧二年建議立均輸平準法之時故王韶首迎合其意而安石力主之雖以李若愚陳升之韓絳諸人之議而卒不可回五年遂詔出內帑錢帛置市易務于京師先是有魏繼宗者自稱草澤上言京師百貨無常價貴賤相傾富能奪貧能與乃可以為天下今富人大姓乘民之亟牟利數倍財既偏聚國用亦屈請假榷貨務錢置常平市易司擇通財之官任其責求良賈為之轉易使審知市物之價賤則增價市之貴則損價鬻之因收餘息以給公上於是中書奏在京置市易務官凡貨之可市及滯於民而不售者平其價市之願以易官物者聽若欲市於官則度其抵而貸之錢責期使償半歲輸息十一及歲倍之凡諸司配率並仰給焉以呂嘉問為提舉賜內庫錢百萬緡京東路錢八十七萬緡為本三司請立市易條有兼并之家較固取利有害新法本務覺察三司按治之文帝削去之七月以榷貨務為市易西務下界市易務為東務上界以在京商稅院雜買務雜賣場隸焉又賜錢帛五十萬于鎮洮軍置司市易極苛細道路怨謗者籍籍上以諭安石請宣示事實帝以鬻冰市梳樸等數事語之安石皆辯解後帝復言市易鬻果太煩碎罷之如何安石謂立法當論有害於人與否不當以煩碎廢也自是諸州上供席黃蘆之類六十色悉令計直從民願鬻者市之以給用六年詔在京市易幹當公事孫迪同兩浙淮東轉運司議置杭州市易務利病以聞其後以市易上界所償內帑錢三十萬緡假之為本又賜夔州路轉運司度僧牒五百置市易于黔州選本路在任已替官監之仍以知州或通判提舉令在京市易務及開封府司錄同詳度諸行利病於是詳定所請約諸行利入薄厚輸免行錢以祿吏蠲其供官之物禁中所須並下雜賣場雜買務置市司估物價低昂凡內外官司欲占物價悉於是乎取決從之改提舉在京市易務為都提舉市易司諸州市易務皆隸焉又詔三司幹當公事李嵵等同詳度成都置市易務七年帝與輔臣論及成都市易事馮京曰曩因榷市物致王小波之亂今頗以市易為言安石曰彼以饑民衆官不之恤相聚為盜耳帝問李嵵行邪安石曰未也然保市易必不能致亂帝猶慮蜀人駭擾安石謂已遣使乃遽罷豈不為四方笑乃已然其後竟罷嵵等詳度三月詔權三司使曾布翰林學士呂惠卿同究詰市易事先是帝出手詔付布謂市易司市物頗害小民之業衆言喧譁布乃引監市易務魏繼宗之言以為呂嘉問多取息以干賞商旅所有者盡收市肆所無者必索率賤市貴鬻廣裒贏餘是挾官府為兼并也王安石具奏明其不然乃更令惠卿偕布究詰之帝尋復以手札賜布令求對布即上行人所訴并疏惠卿姦欺狀且言臣自立朝以來每聞德音未嘗不欲以王道治天下今市易之為虐乎間架除陌之事矣嘉問奏近遣官往湖南販茶陝西販鹽兩浙販紗皆未敢計息臣以謂如此政事書之簡牘不獨唐虞三代所無歷觀秦漢以來衰亂之世恐未之有也四月布復陳薛向罪茶儈不當帝惻然咨嗟及言三司決責商人多濫時帝猶必欲按治而安石主用惠卿不可去蓋謀變其事也帝疑焉故仍以屬布既而中書奏事已帝論及市易且曰朝廷設此本欲為平準之法以便民今正爾相反使中下之民失業若此宜修補其法令元詳定呂嘉問吳安持同韓維孫永問行人輸錢免行利病參知政事馮京曰開封祥符縣給民錢有出息抵當銀絹米麥緩急喪葬之目七八種其初給錢往往願請積數既多實艱輸送帝曰如此吾民安得泰然也時布與惠卿方究市易事率數日一對帝初是布言已而從惠卿之請拘魏繼宗於開封府既而布與惠卿即東府再詰行人所訴狀如前不變而安石懇求去位引惠卿執政提舉楚州市易蔣之奇奏監務王景彰榷市商人物非法及虛作中糴入務立詭名糴之白輸息錢謂之乾息又抑賈販毋得至他郡多為留難帝謂輔臣曰景彰違法害人宜即治其罪時呂惠卿已參朝政而究詰市易未竟詔促之惠卿請令中書悉取桉牘異同以奏後二日布對延和殿條祈先後所陳并較治平熙寧入出錢物數以聞帝方慮歲費寖廣令布送中書五月乃詔章惇曾孝寬即軍器監鞫布所究市易事又令戶房會財賦數與布所陳異而呂嘉問亦以雜買務多入月息不覺皆從公坐有差未幾布褫職與嘉問俱出守郡魏繼宗仍奪秩勒停初市易之建布實預之後揣上意有疑遂急治嘉問而惠卿與布有夙怨故卒擠之而市易如故三司使章惇請假內藏錢五百萬緡令市易司有幹局者分四路入中計見鹽引及乘賤糴買詔假二百萬緡八年復呂嘉問提舉市易二月鳳翔大名真定府永興安肅軍秦瀛定越真州並置市易司以惠州阜民監錢十萬緡給廣州市易務司農寺坊場錢三十萬緡給鄆州市易九年又以在京市易司物貨十五萬緡給熙河市易司九月中書言市易息錢并市例錢總收百三十三萬二千緡有奇詔嘉問安持等推恩有差自後凡二年一較十年定上界本錢以七百萬緡為額不足以歲所收息益之其貸內帑錢歲償以息二十萬緡元豐元年以都提舉王居卿請令貸市易錢貨者許用金帛等為抵收息毋過一分二釐不及年者月計之願皆得錢或欲以物貨兼給者聽市易司請遣官以物貨至諸路貿易十萬緡以上期以二年二十萬緡以上三年斂及三分者比遞年推恩八分者理為任期盡不及者勿賞官吏廩給並罷二年經制熙河路邊防財用李憲言蕃賈與牙儈私市其貨皆由他路避稅入秦州乃令秦熙河岷州通遠軍五市易務募牙儈引蕃貨赴市易務中賈私市者許糾告賞倍所告之數以田宅抵市易錢久不償者估實直如賣坊場河渡法若未輸錢者官收其租息在京市易務亦如之三年詔免行月納錢不及百者皆免凡除八千六百五十四人九月王居卿又言市易法有三結保貸請一也契要金銀為抵二也貿遷物貨三也三者惟保貸法行之久負失益多往歲罷貸錢而物貨如故請自今所貸歲約毋過二百萬緡聽舊戶貸請以相濟續非舊戶惟用抵當貿遷之法詔中書立法以聞於是中書奏在京物貨許舊戶貸請斂而復散通所負毋過三百萬緡諸路毋過四之一詔如所奏是歲經制熙河邊防財用司會其置司以來所收息元豐初四十一萬四千六百二十六緡石次年六十八萬四千九十九緡石四年從都提舉賈青請於新舊城外內置四抵當所遣官掌之罷市易上界等處抵當以便民五年詔外內市易務所負錢寬以三歲均月限以輸限內罰息並除之先是王安禮在開封日有負市易錢者累訴於庭安禮既執政言於帝曰市易法行取息滋多而輸官不時者有罰息民至窮困願詔蠲之帝曰羣臣未有為朕言者其令民以限輸免其罰息安禮退批詔加內外字蔡確曰方帝有旨無外內字公欲增詔邪安禮曰亦不止言內字卒加之八月置饒州景德鎮瓷窰博易務六年蘭州增置市易務以通蕃漢貿易七年改市易下界為榷貨務令諸州旬估物價既定報提舉司提舉司下所部州州下所屬募民出抵或錢以市收息毋過二分詔諸路常平司錢留其半以二分為市易抵當蓋自五年賈青以平準物價與金銀之類行抵當於畿縣次年行之諸路以常平市易賒貸及寬剩錢為本五路各十萬緡餘路五萬緡至是復有是詔若無抵當而物貨宜易者亦聽變鬻八年罷諸鎮砦市易抵當八月詔諸郡抵當有取息薄可濟民乏者存之其餘抵當并州縣市易並罷元祐元年內外監督市易及坊場淨利錢許以所入息并罰錢比計若及官本者並釋之紹聖四年三省言熙寧興置市易元祐一切罷去不原立法之意詔戶部太府寺詳度復置市易務惟以錢交市收息毋過二分勿令貸請元符三年改市易務為平準務戶部太府寺市易案改為平準案尚書省言平準務官吏等給費多并遣官市物搔動于外近官鬻石炭市直遽增皆不便民詔罷平準務及官鬻石炭其在官物貨令有司轉易錢鈔償元給之所崇寧元年戶部奏平準務錢物毋得他司移用二年以平準為南北兩務如舊分置官吏歲終考察能否行勸沮法五年郡縣應置市易者凡歲收息官吏用度之餘及千緡以上置官監五百緡以上令場務兼領餘並罷先是嘗詔府界萬戶縣及路在衝要市易抵當已設官置局其不及萬戶非衝要并諸鎮有官監而商販所會並如元豐令監當官兼領至是戶部復詳度以聞遂行其議建炎二年言者以為得不償費遂罷之而以其錢輸左藏庫惟抵當庫仍舊紹興元年罷諸州軍免行錢及行戶供應見任官買賣並依時直違者以盜論四年兩浙轉運司檄婺州市御爐炭須胡桃紋鵓鳩色守臣王居正以為言上曰隆冬附火取溫煖而已豈問炭之紋色乎命罷之諸類此者並禁止焉十三年蠲雷化高融宜廉邕欽賀貴免行錢十四年以開州兩縣在夔部尤為僻遠減免行錢之半十五年以知漢陽軍韓盺言諸路收免行錢定數外多取一文以上以擅增稅賦法罪之十七年蠲百姓見輸免行錢三分之一十九年南郊赦盡蠲百姓免行錢欠是後凡赦皆然二十五年罷見輸免行錢禁下行買物以害及小商敷於鄉村故也淳熙元年罷市令司詔臨安府及屬縣交易儈保錢減十之五七年諸路州縣交易儈保錢亦以十分為率與減五分嘉定二年以臣僚言輦轂之下買物於鋪戶無從得錢凡臨安府未支物價令即日盡數給還是後買物須給見錢違許陳訴於臺嘉熙三年臣僚言今官司以官價買物行鋪以時直計之什不得二三重以遷延歲月而不償胥卒並緣之無藝積日既久類成白著至有遷居以避其擾改業以逃其害者甚而蔬菜魚肉日用所需瑣瑣之物販夫販婦所資錐刀以營斗升者亦皆以官價強取之終日營營而錢本俱成乾沒商旅不行衣食路絕望特降睿旨凡諸路州縣官司買物並以時直不許輒用官價違者以贓定罪從之均輸之法所以通天下之貨制為輕重斂散之術使輸者既便而有無得以懋遷焉熙寧二年制置三司條例司言天下財用無餘典領之官拘於弊法內外不相知盈虛不相補諸路上供歲有常數豐年便道可以多致而不能贏年儉物貴難於供億而不敢不足遠方有倍蓗之輸中都有半價之鬻徒使富商大賈乘公私之急以擅輕重斂散之權今發運使實總六路賦入其職以制置茶鹽礬酒稅為事軍儲國用多所仰給宜假以錢貨資其用度周知六路財賦之有無而移用之凡糴買稅斂上供之物皆得徙貴就賤用近易遠令預知中都帑藏年支見在之定數所當供辦者得以從便變易蓄買以待上令稍收輕重斂散之權歸之公上而制其有無以便轉輸省勞費去重斂寬農民庶幾國用可足民財不匱詔本司具條例以聞而以發運使薛向領均輸平準事賜內藏錢五百萬緡上供米三百萬石時議慮其為擾多以為非向既董其事乃請設置官屬神宗使自擇之向於是辟劉忱衞琪孫珪張穆之陳倩為屬又請有司具六路歲當上供數中都歲用及見儲度可支歲月凡當計置幾何皆預降有司從之八月侍御史劉琦侍御史𩹉行錢顗等言向小人假以貨泉任其變易縱有所入不免奪商賈之利琦顗皆坐貶條例司檢詳文字蘇轍言昔漢武外事四夷內興宮室財用匱竭力不能支用賈人桑弘羊之說買賤賣貴謂之均輸雖曰民不加賦而國用饒足然法術不正吏緣為姦掊克日深民受其病孝昭既立學者爭排其說霍光順民所欲從而予之天下歸心遂以無事今此論復興衆口紛然皆謂其患必甚於漢何者方今聚斂之臣材智方略未見有桑弘羊比而朝廷破壞規矩解縱繩墨使得馳騁自由唯利是嗜其害必有不可勝言者矣轍亦坐去官於是知諫院范純仁言向憸巧刻薄不可為發運使人主當務農桑節用不當言利自後罷純仁諫職而諫官李常復論均輸不便權開封府推官蘇軾亦言均輸徙貴就賤用近易遠然廣置官屬多出緡錢豪商大賈皆疑而不敢動以為雖不明言販賣既已許之變易變易既行而不與商賈爭利未之聞也夫商賈之事曲折難行其買也先期而予錢其賣也後期而取直多方相濟委曲相通倍稱之息由此而得今先設官置吏簿書廩祿為費已厚非良不售非賄不行是官買之價比民必貴及其賣也弊復如前商賈之利何緣而得朝廷不知慮此乃捐五百萬緡以予之此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多矣帝方惑於安石之說言皆不行乃以向為天章閣待制遣太常少卿羅拯為使手詔賜向曰政事之先理財為急朕托卿以東南賦入皆得消息盈虛翕張斂散之而卿忠誠內固能倡舉職業導揚朕意底于成績朕甚嘉之覽奏慮流言致惑朕心匪石豈易轉也卿其濟之以彊終之以不倦以稱朕意然均輸後迄不能成互市舶法自漢初與南越通關市而互市之制行焉後漢通交易於烏桓北單于鮮卑北魏立互市於南陲隋唐通貿易于西北開元定令載其條目後唐亦然而高麗回鶻黑水諸國又各以風土所產與中國交易宋初循周制與江南通市乾德二年禁商旅毋得渡江於建安漢陽蘄口置三榷署通其交易內外羣臣輒遣人往江浙販易者沒入其貨緣江百姓及煎鹽亭戶恣其樵漁所造屨席之類榷署給券聽渡江販易開寶三年徙建安榷署於揚州江南平榷署雖存止掌茶貨四年置市舶司于廣州後又於杭明州置司凡大食古邏闍婆占城勃泥麻逸三佛齊諸蕃並通貨易以金銀緡錢鉛錫雜色帛瓷器市香藥犀象珊瑚琥珀珠琲鑌鐵鼊皮瑁瑪瑙車渠水精蕃布烏樠蘇木等物太宗時置榷署于京師詔諸蕃香藥寶貨至廣州交阯兩浙泉州非出官庫者無得私相貿易其後乃詔自今惟珠貝玳瑁犀象鑌鐵鼊皮珊瑚瑪瑙乳香禁榷外他藥官市之餘聽市於民雍熙中遣內侍八人齎敕書金帛分四路招致海南諸蕃商人出海外蕃國販易者令並詣兩浙市舶司請給官券違者沒入其寶貨淳化二年詔廣州市舶除榷貨外他貨之良者止市其半大抵海舶至十先征其一價直酌蕃貨輕重而差給之歲約獲五十餘萬斤條株顆太平興國初私與蕃國人貿易者計直滿百錢以上論罪十五貫以上黥面流海島過此送闕下淳化五年申其禁至四貫以上徒一年稍加至二十貫以上黥面配本州為役兵天聖以來象犀珠玉香藥寶貨充牣府庫嘗斥其餘以易金帛芻粟縣官用度實有助焉而官市貨數視淳化則微有所損皇祐中總歲入象犀珠玉香藥之類其數五十三萬有餘至治平中又增十萬熙寧五年詔發運使薛向曰東南之利舶商居其一比言者請置司泉州其創法講求之七年令舶船遇風至諸州界亟報所隸送近地舶司榷賦分買泉福瀕海舟船未經賦買者仍赴司勘驗時廣州市舶虧歲課二十萬緡或以為市易司擾之故海商不至令提舉司究詰以聞既而市易務呂邈入舶司闌取蕃商物詔提舉司劾之九年集賢殿修撰程師孟請罷杭明州市舶諸舶皆隸廣州一司令師孟與三司詳議之是年杭明廣三司市舶收錢糧銀香藥等五十四萬一百七十三緡匹斤兩段條箇顆臍隻粒支二十三萬八千五十六緡匹斤兩段條箇顆臍隻粒元豐二年賈人入高麗貲及五千緡者明州籍其名歲責保給引發船無引者如盜販法先是禁人私販然不能絕至是復通中國故明立是法三年中書言廣州市舶已修定條約宜選官推行詔廣東以轉運使孫迥廣西以陳倩兩浙以副使周直孺福建以判官王子京罷廣東帥臣兼領五年廣西漕臣吳潛言雷化州與瓊島對境而發船請引於廣州舶司約五千里乞令廣西瀕海郡縣土著商人載米穀牛酒黃魚及非舶司賦取之物免至廣州請引詔孫迥詳度行之知密州范鍔言板橋瀕海東則二廣福建淮浙西則京東河北河東三路商賈所聚海舶之利顓於富家大姓宜即本州置市舶司板橋鎮置抽解務六年詔都轉運使吳居厚條析以聞元祐三年鍔等復言廣南福建淮浙賈人航海販物至京東河北河東等路運載錢帛絲綿貿易而象犀乳香珍異之物雖嘗禁榷未免欺隱若板橋市舶法行則海外諸物積於府庫者必倍於杭明二州使商舶通行無冒禁罹刑之患而上供之物免道路風水之虞乃置密州板橋市舶司而前一年亦增置市舶司於泉州賈人由海道往外蕃令以物貨名數并所詣之地報所在州召保毋得參帶兵器或可造兵器及違禁之物官給以券擅乘船由海入界河及往高麗新羅登萊州境者罪以徒往北界者加等崇寧元年復置杭明市舶司官吏如舊額三年令蕃商欲往他郡者從舶司給券毋雜禁物姦人初廣南舶司言海外蕃商至廣州貿易聽其往還居止而大食諸國商亦丐通入他州及京東販易故有是詔凡海舶欲至福建兩浙販易者廣南舶司給防船兵仗如詣諸國法廣南舶司鬻所市物貨取息毋過二分政和三年詔如至道之法凡知州通判官吏并舶司使臣等毋得市蕃商香藥禁物宣和元年秀州開修青龍江浦舶船輻輳請復置監官先是政和中置務設官於華亭縣後江浦湮塞蕃舶鮮至止令縣官兼掌至是復設官專領焉四年蕃國進奉物如元豐法令舶司即其地鬻之毋發至京師違者論罪契丹在太祖時雖聽緣邊市易而未有官署太平興國二年始令鎮易雄霸滄州各置榷務輦香藥犀象及茶與交易後有范陽之師罷不與通雍熙三年禁河北商民與之貿易時累年興師千里饋糧居民疲乏太宗亦頗有厭兵之意端拱元年詔曰朕受命上穹居尊中土惟思禁暴豈欲窮兵至於幽薊之民皆吾赤子宜許邊疆互相市易自今緣邊戍兵不得輒恣侵略未幾復禁違者抵死北界商旅輒入內地販易所在捕斬之淳化二年令雄霸州靜戎軍代州鴈門砦置榷署如舊制所鬻物增蘇木尋復罷咸平五年契丹求復置署朝議以其翻覆不許知雄州何承矩繼請乃聽置於雄州六年罷景德初復通好請商賈即新城貿易詔北商齎物貨至境上則許之二年令雄霸州安肅軍置三榷場北商趨他路者勿與為市遣都官員外郎孔揆等乘傳詣三榷場與轉運使劉綜并所在長吏平互市物價稍優其直予之又於廣信軍置場皆廷臣專掌通判兼領焉三年詔民以書籍赴沿邊榷場博易者非九經書疏悉禁之凡官鬻物如舊而增繒帛漆器秔糯所入者有銀錢布羊馬橐駝歲獲四十餘萬天聖中知雄州張昭遠請歲會入中金錢仁宗曰先朝置互市以通有無非以計利不許終仁宗英宗之世契丹固守盟好互市不絕熙寧八年市易司請假奉宸庫象犀珠直總二十萬緡於榷場貿易明年終償之詔許九年立與化外人私貿易罪賞法河北四榷場自治平四年其貨物專掌於三司之催轄司而度支賞給案判官置簿督計之至是以私販者衆故有是命未幾又禁私市硫黃焰硝及以盧甘石入他界者河東亦如之元豐元年復申賣書北界告捕之法西夏自景德四年於保安軍置榷場以繒帛羅綺易駝馬牛羊玉氈毯甘草以香藥瓷漆器薑桂等物易蜜蠟麝臍毛褐羱羚角𢱧砂柴胡蓯蓉紅花翎毛非官市者聽與民交易入貢至京者縱其為市天聖中陝西榷場二并代路亦請置場和市許之及元昊反即詔陝西河東絕其互市廢保安軍榷場後又禁陝西並邊主兵官與屬羌交易久之元昊請臣數遣使求復互市慶曆六年復為置場于保安鎮戎二軍繼言驅馬羊至無放牧之地為徙保安軍榷場于順寧砦既而蕃商卒無至者嘉祐初西人侵耕屈野河地知并州龐籍謂非絕其互市則內侵不已且聞出兀臧訛龐之謀若互市不通其國必歸罪訛龐年歲間然後可與計議從之初第禁陝西四路私與西人貿易未幾乃悉絕之治平四年河東經略司言西界乞通和市自夏人攻慶州大順城詔罷歲賜嚴禁邊民無得私相貿易至是上章謝罪乃復許之後二年令涇原熟戶及河東陝西邊民勿與通市又二年因回使議立和市而私販不能止遂申詔諸路禁絕既而河東轉運司請罷吳堡於寧星和市如舊而麟州復奏夏人之請乃令鬻銅錫以市馬而纖縞與急須之物皆禁西北歲入馬事具兵志楚蜀南粵之地與蠻獠溪峒相接者以及西州沿邊羌戎皆聽與民通市熙寧三年王韶置市易司於秦鳳路古渭砦六年增置市易於蘭州自後於熙河蘭湟慶渭延等州又各置折博務湖北路及沅錦黔江口蜀之黎雅州皆置博易場重和元年燕瑛言交人服順久毋令阻其貿易初廣西帥曾布請即欽廉州各創驛令交人就驛博買至是即用瑛兼廣西轉運副使同王蕃計畫焉建炎四年三月宣撫使張浚奏大食國遣人進珠玉寶貝上曰大觀宣和間川茶不以博馬惟市珠玉故武備不修遂致危弱如此今復捐數十萬緡易無用之物曷若惜財以養戰士乎諭張浚勿受量賜予以答之六月罷宜州歲市朱砂二萬兩紹興三年邕州守臣言大理請入貢上諭大臣止令賣馬不許其進貢四年詔川陝即永興軍威茂州置博易場移廣西買馬司于邕管歲捐金帛倍酬其直然言語不通一聽譯者高下其手吏得因緣為姦六年大理國獻象及馬五百匹詔償其馬直卻象勿受而賜書勞遣之十二年盱眙軍置榷場官監與北商博易淮西京西陝西榷場亦如之十九年罷國信所博易二十六年罷廉州貢珠散蜑丁蓋珠池之在廉州凡十餘接交阯者水深百尺而大珠生焉蜑往採之多為交人所取又為大魚所害至是罷之二十九年存盱眙軍榷場餘並罷乾道元年襄陽鄧城鎮壽春花靨鎮光州光山縣中渡市皆置榷場以守臣措置通判提轄五年省提轄官淳熙二年臣僚言溪峒緣邊州縣置博易場官主之七年塞外諸戎販珠玉入黎州官常邀市之臣僚言其黷貨啟釁非便止合聽商賈百姓收買詔從之建炎元年詔市舶多以無用之物費國用自今有博買篤耨香環瑪瑙猫兒眼睛之類皆寘于法惟宣賜臣僚象笏犀帶選可者輸送胡人謂三百斤為一婆蘭凡舶舟最大者曰獨檣載一千婆蘭次者曰牛頭比獨檣得三之一又次曰木舶曰料河遞得三之一隆興二年臣僚言熙寧初立市舶以通物貨舊法抽解有定數而取之不苛輸稅寬其期而使之待價懷遠之意實寓焉邇來抽解既多又迫使之輸致貨滯而價減擇其良者如犀角象齒十分抽二又博買四分珠十分抽一又博買六分舶戶懼抽買數多止販竹𢢧色雜貨若象齒珠犀比他貨至重乞十分抽一更不博買乾道二年罷兩浙路提舉以守倅及知縣監官共事轉運司提督之三年詔廣南兩浙市舶司所發舟還因風水不便船破檣壞者即不得抽解七年詔見任官以錢附綱首商旅過蕃買物者有罰舶至除抽解和買違法抑買者許蕃商越訴計贓罪之舊法細色綱龍腦珠之類每一綱五千兩其餘犀象紫礦乳檀香之類為竹𢢧色每綱一萬斤凡起一綱遣衙前一名部送支脚乘贍家錢一百餘緡大觀以後張大其數象犀紫礦皆作細色起發以舊日一綱分為三十二綱多費脚乘贍家錢三千餘貫至于乾道七年詔廣南起發竹𢢧色香藥物貨每綱二萬斤加耗六百斤依舊支破水脚錢一千六百六十二貫有奇淳熙二年戶部言福建廣南市舶司竹𢢧細物貨並以五萬斤為一全綱南渡三路舶司歲入固不少然金銀銅鐵海舶飛運所失良多而銅錢之泄尤甚法禁雖嚴姦巧愈密商人貪利而貿遷黠吏受賕而縱釋其弊卒不可禁
