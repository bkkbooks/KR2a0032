湖南二廣兩淮四川見存州郡悉上聖朝為宗社生靈祈哀請命伏望聖慈垂念不忍臣三百餘年宗社遽至隕絕曲賜存全則趙氏子孫世世有賴不敢弭忘是夜丞相陳宜中遁張世傑蘇劉義劉師勇各以所部兵去乙酉以文天祥為右丞相兼樞密使都督丙戌命天祥同吳堅使大元軍賜家鉉翁進士出身簽書樞密院事賈餘慶同簽書樞密院事知臨安府戊子知建德軍方回知婺州劉怡知處州梁椅知台州楊必大皆降是月知臨江軍滕岩瞻遁二月丁酉朔日中有黑子相盪如鵝卵辛丑率百官拜表祥曦殿詔諭郡縣使降大元使者入臨安府封府庫收史館禮寺圖書及百司符印告敕罷官府及侍衞軍壬寅猶遣賈餘慶吳堅謝堂劉岊家鉉翁充祈請使是日大元軍軍錢塘江沙上潮三日不至三月丁丑入朝五月丙申朝于上都降封開府儀同三司瀛國公是月陳宜中等立昰于福州後二年四月昰殂于碙洲陸秀夫等復立衞王昺後三年始平之贊曰司馬遷論秦趙世系同出伯益夫稷契伯益其子孫皆有天下至於運祚短長亦係其功德之厚薄焉趙宋雖起於用武功成治定之後以仁傳家視秦宜有間矣然仁之敝失於弱即文之敝失於僿也中世有欲自強以革其敝用乖其方馴致棼擾建炎而後土宇分裂猶能六主百五十年而後亡豈非禮義足以維持君子之志恩惠足以固結黎庶之心歟瀛國四歲即位而天兵渡江六歲而羣臣奉之入朝漢劉向言孔子論詩至殷士膚敏祼將于京喟然嘆曰大哉天命善不可不傳於後嗣是以富貴無常至哉言乎我皇元之平宋也吳越之民市不易肆世祖皇帝命征南之帥輒以宋祖戒曹彬勿殺之言訓之書曰大哉王言一哉王心我元一天下之本其在于茲二王者度宗庶子也長建國公昰母淑妃楊氏季永國公昺母修容俞氏度宗崩謝太后召賈似道等入宮議所立衆以為昰長當立似道主立嫡乃立而封昰為吉王昺信王德祐二年正月文天祥尹臨安請以二王鎮閩廣不從始命二王出閤大元兵迫臨安宗親復以請乃徙封昰為益王判福州福建安撫大使昺為廣王判泉州兼判南外宗正以駙馬都尉楊鎮及楊亮節俞如珪為提舉大元兵至高亭山鎮等奉之走婺州丞相伯顏入臨安遣范文虎將兵趣婺召鎮以王還鎮得報即去曰我將就死於彼以緩追兵亮節等遂負王徒步匿山中七日其將張全以兵數十人始追及之遂同走溫州陸秀夫蘇劉義繼追及於道遣人召陳宜中于清澳宜中來謁復召張世傑于定海世傑亦以所部兵來溫之江心寺高宗南奔時嘗至是有御座在寺中衆相率哭座下奉昰為天下兵馬都元帥昺副之乃發兵除吏以秀王與睪為福建察訪使兼安撫知西外宗正趙吉甫知南外宗正兼福建同提刑先入閩中撫吏民諭同姓太皇太后尋遣二宦者以兵八人召王于溫宜中等沉其兵江中遂入閩時汀建諸州方欲從黃萬石降聞昰將至即閉城却使者萬石將劉俊宋彰周文英輩亦多來歸五月乙未朔宜中等乃立昰于福州以為宋主改元景炎冊楊淑妃為太后同聽政封信王昺為衞王宜中為左丞相兼都督李庭芝為右丞相陳文龍劉黻為參知政事張世傑為樞密副使陸秀夫為簽書樞密院事命吳浚趙溍傅卓李王玉翟國秀等分道出兵改福州為福安府溫州為瑞安府郊赦是日黎明有大聲出府中衆皆驚仆文天祥自鎮江亡歸庚辰以為右丞相兼知樞密院事遣其將呂武入江淮招豪傑杜滸如溫州募兵廣東經略使徐直諒遣梁雄飛請降于隆興帥府乃假雄飛招討使使徇廣州既而直諒聞昰立命權通判李性道摧鋒軍將黃俊等拒雄飛于石門性道不戰俊戰敗奔廣州直諒棄城遁六月丙子雄飛入廣州諸降將皆授以官俊獨不受遂為衆所殺吳浚聚兵于廣昌取南豐宜黃寧都三縣翟國秀取秀山傅卓至衢信諸縣民多應之者命文天祥為同都督七月丁酉進兵南劍州欲取江西是月吳浚兵敗於南豐翟國秀聞兵至遂引還傅卓兵敗詣江西元帥府降平章阿里海牙破嚴關馬暨退保靜江府八月漳州亂命陳文龍為閩廣宣撫使以討之甲戌秀王與睪圍婺州丙子聞大兵至遂解歸以王積翁為福建提刑招捕使知南劍州備禦上三郡黃恮為同提刑招捕使知漳州備禦下三郡張世傑遣兵助吳浚與元帥李恆戰兜零兵敗奔寧都興化石手軍亂九月復以陳文龍知興化軍東莞人熊飛為黃世傑守潮惠二州聞趙溍至即以兵應之攻雄飛于廣州壬寅雄飛遁熊飛遂復韶州新會令曾逢龍亦帥兵至廣州李性道出迎謁飛與逢龍執而殺之衢州守將魏福興出戰福星橋死壬子趙溍入廣州是月招討也的迷失會東省兵于福州元帥呂師夔張榮實將兵入梅嶺十月壬戌朔文天祥入汀州趙溍遣曾逢龍就熊飛禦大軍于南雄逢龍戰死熊飛奔韶州大軍圍韶州守將劉自立以城降飛率兵巷戰兵敗赴水死十有一月參政阿剌罕董文炳將兵至處州李王玉以城降甲辰秀王與睪逆戰于瑞安觀察使李世達死之與睪及其弟與慮子孟備監軍趙由察訪使林溫被執皆死阿剌罕兵至建寧府執守臣趙崇鐖知邵武軍趙時賞知南劍州王積翁皆棄城去乙巳昰入海癸丑大軍至福安府知府王剛中以城降昰欲入泉州招撫蒲壽庚有異志初壽庚提舉泉州舶司擅蕃舶利者三十年昰舟至泉壽庚來謁請駐蹕張世傑不可或勸世傑留壽庚則凡海舶不令自隨世傑不從縱之歸繼而舟不足乃掠其舟幷沒其貲壽庚乃怒殺諸宗室及士大夫與淮兵之在泉者昰移潮州是月福興化皆降英德守臣凌彌堅徐夢得等亦降十二月辛酉朔趙溍棄廣州遁乙丑制置方興亦遁吳浚退走入瑞金戊辰蒲壽庚及知泉州田真子以城降知興化軍陳文龍嬰城不下乙酉通判曹澄孫以城降文龍被執不屈死昰次甲子門至元十四年正月大軍破汀關癸巳知循州劉興降壬寅吳浚棄瑞金遁鎮撫孔遵入瑞金文天祥走漳州浚尋還汀州降戊申知潮州馬發及其通判戚繼祖降癸丑復來歸丁巳權知梅州錢榮之以城降二月大軍至廣州縣人趙若岡以城降廣東諸郡皆降三月文天祥取梅州陳文龍從子瓚舉兵殺守將林華據興化軍四月文天祥取興國縣廣東制置使張鎮孫襲廣州取之梁雄飛等棄城走韶州五月張世傑將兵取潮州文天祥提兵自梅州出江西入會昌縣淮民張德興亦起兵殺太湖縣丞王德顒據司空山攻下黃州壽昌軍丁巳遇宣慰鄭鼎戰樊口鼎墜水死六月辛酉文天祥取雩都己卯入興國縣七月遣兵取吉贛諸縣圍贛州衡山人趙璠撫州人何時皆起兵應之乙巳張世傑圍泉州遣將高日新復邵武淮兵在福州者欲殺王積翁以應世傑皆為積翁所戮江西宣慰李恆遣兵援贛州而自將兵入興國八月文天祥諸將兵皆敗乃引兵即鄒于永豐兵亦潰己巳熒惑掩月天色赤壬申文天祥兵敗于興國己卯大軍破司空山張德興敗亡走甲申天祥至空坑兵盡潰遂挺身走循州諸將皆被執九月元帥唆都援泉州戊申張世傑歸淺灣左丞塔出將兵入大庾嶺參政也的迷失將兵復取邵武入福州十月甲辰唆都破興化軍陳瓚死之進攻潮州馬發拒之乃去攻惠州十一月塔出圍廣州庚寅張鎮孫以城降元帥劉深以舟師攻昰于淺灣昰走秀山陳宜中入占城遂不反十二月丙子昰至井澳颶風壞舟幾溺死遂成疾旬餘諸兵士始稍稍來集死者十四五丁丑劉深追昰至七州洋執俞如珪以歸十五年正月大軍夷廣州城張世傑遣兵攻雷州不克己酉大軍克涪州執守將王明二月大軍破潮州馬發死之三月文天祥取惠州廣州都統凌震轉運判官王道夫取廣州昰欲往居占城不果遂駐碙洲遣兵取雷州曾淵子自雷州來以為參知政事廣西宣諭使四月戊辰昰殂于碙洲其臣號之曰端宗庚午衆又立衞王昺為主以陸秀夫為左丞相是月有黃龍見海中五月癸未朔改元祥興乙酉升碙洲為翔龍縣遣張應科王用取雷州應科三戰皆不利用因降六月丁巳應科再戰雷州遂死之知高州李象祖降己未昺徙居厓山升廣州為翔龍府己巳有大星東南流墜海中小星千餘隨之聲如雷數刻乃已己卯都元帥張弘範李恆征厓山十月趙與珞與謝明謝富守瓊州阿里海牙遣馬成旺招之與珞率兵拒于白沙口十一月癸巳州民執與珞以降閏月庚戌王道夫棄廣州遁壬戌凌震遁癸亥大軍入廣州十二月壬午王道夫攻廣州兵敗被執凌震兵繼至亦敗文天祥走海豐壬寅被執于五坡嶺震兵又敗于芰塘大軍破南安縣守將李梓發死之十六年正月壬戌張弘範兵至厓山庚午李恆兵亦來會世傑以舟師碇海中結巨艦千餘艘中艫外舳貫以大索四周起樓棚如城堞居昺其中大軍攻之艦堅不動又以舟載茅沃以膏脂乘風縱火焚之艦皆塗泥縛長木以拒火舟火不能二月戊寅朔世傑部將陳寶降己卯都統張達以夜襲大軍營亡失甚衆癸未有黑氣出山西李恆乘早潮退攻其北世傑以淮兵殊死戰至午潮上張弘範攻其南南北受敵兵士皆疲不能戰俄有一舟檣旗仆諸舟之檣旗遂皆仆世傑知事去乃抽精兵入中軍諸軍潰翟國秀及團練使劉俊等解甲降大軍至中軍會暮且風雨昏霧四塞咫尺不相辨世傑乃與蘇劉義斷維以十餘舟奪港而去陸秀夫走衞王舟王舟大且諸舟環結度不得出走乃負昺投海中後宮及諸臣多從死者七日浮尸出于海十餘萬人楊太后聞昺死撫膺大慟曰我忍死艱關至此者正為趙氏一塊肉爾今無望矣遂赴海死世傑葬之海濱已而世傑亦自溺死宋遂亡贊曰宋之亡徵已非一日曆數有歸真主御世而宋之遺臣區區奉二王為海上之謀可謂不知天命也已然人臣忠於所事而至於斯其亦可悲也夫
