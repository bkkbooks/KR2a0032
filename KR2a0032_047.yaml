body:
  text: 宋史卷四十七本紀第四十七瀛國公二王附瀛國公名度宗皇帝子也母曰全皇后咸淳七年九月己丑生於臨安府之大內九年十一月授左衞上將軍封嘉國公十年七月癸未度宗崩奉遺詔即皇帝位于柩前年四歲謝太后臨朝稱詔甲申兄昰保康軍節度使開府儀同三司進封吉王加食邑一千戶弟昺保寧軍節度使開府儀同三司進封信王加食邑一千戶命平章賈似道依文彥博故事獨班起居丙戌上皇太后尊號曰壽和聖福太皇太后皇后曰皇太后又詔以生日為天瑞節戊子命臨安府振贍細民辛卯以朱禩孫為京湖四川宣撫使兼知江陵府壬寅詔撫三邊將士命州郡舉遺逸除浙西安撫司兩浙轉運司臨安府見追贓賞錢詔求言八月甲辰詔乞言於老臣江萬里葉夢鼎馬廷鸞留夢炎趙順孫王爚李庭芝築清河城以圖來上詔庭芝進一秩宣勞將士具名推賞加知鄂州李雷應守軍器監知太平州孟之縉尚書兵部員外郎知江州錢真孫直寶章閣知鎮江軍洪起畏直敷文閣癸丑大霖雨天目山崩水涌流安吉臨安餘杭民溺死者亡算甲寅太皇太后以老不能御正衙命暫以慈元殿為後殿辛酉作度宗廟戊辰以全清夫為昭信軍節度使謝堂檢校少保謝垕保康軍節度使馬廷鸞乞骸骨歸田里詔趣之任九月丁丑資政殿大學士光祿大夫王爚乞致仕詔不允戊寅發米振餘杭臨安兩縣水災餘杭災甚再給米二千石己卯似道乞免答拜從之辛巳覆試文武舉士人壬午覆試文武舉士人癸未大元兵大會于襄陽丙戌丞相伯顏將一軍趣郢州元帥唆都將一軍入淮翟招討將一軍徇荊南丁亥大元軍薄郢州戊子免被水州縣今年田租甲午初開經筵丁酉天瑞節免徵臨安府公私房賃錢十日以金符十三銀符百給夏貴激賞奇功己亥試正奏名進士賜王龍澤以下出身有差壬寅有星見西方委曲如蚓復州副將翟國榮遇大元兵戰爛泥湖死之閩中旱冬十月丙午知達州趙章復洋州加右驍騎尉中郎將大元兵破渠州禮義城知州張資自殺丁未饒州布衣董聲應進諸史纂約兵鑑刑鑑詔聲應充史館編校文字癸丑上度宗謚廣西經略司權參議官邢友龍擊潮州漳州寇破之乙卯令州縣行義田義役丁巳友龍以下諸將各轉官有差大元兵攻郢州都統制張世傑力戰禦之遂去由藤湖入漢戊午郢州副都統趙文義追戰全子湖死恤其家庚申贈翟國榮復州團練使官其二子立廟復州壬戌以錢百萬給郢城屯戍將士甲子詔以明年為德祐元年乙丑以章鑑同知樞密院事兼權參知政事陳宜中簽書樞密院事兼權參知政事大元兵徇沙洋城京湖宣撫司遣總管王虎臣援之丙寅城破虎臣與守隘官王大用皆被執熒惑犯鎮星大元兵至新城戊辰總制黃順出降己巳副總制仁寧出降都統制邊居誼力戰城破赴火死知復州翟貴以城降閩中地震十一月癸酉以朱禩孫為京湖四川宣撫使丁丑命沿江制置使趙溍巡江策應賜錢百萬激賞戰功戊寅馬廷鸞力辭浙東安撫使知紹興府詔依舊觀文殿大學士提舉洞霄宮贈趙文義清遠軍節度使與其兄威武軍節度使文亮共立廟揚州賜名傳忠庚辰以陸秀夫為淮東安撫制置司參議官壬午削諸班直溢額人癸未至乙酉覆試特奏名士人丙戌以王爚為左丞相章鑑為右丞相並兼樞密使似道自九月乞命左右丞相至是從之以張晏然兼京湖四川宣撫司參議官己丑至庚寅覆試特奏名士人壬辰至癸巳如上覆試甲午括邸第戚畹及御前寺觀田令輸租丁酉加安南國王陳日煚寧遠功臣其子威晃奉正功臣十二月癸卯朔命建康府太平州池州振避兵淮民以隆寒勞賜京湖及沿江戍守將士甲辰詔淮西四郡水旱去年屯田未輸之租其勿徵丁未提舉興國宮呂師夔請募兵江州詔知州錢真孫同募尚書省以錢米給之癸丑大元兵攻陽邏堡夏貴以兵力守武定軍都統制王達戰死乙卯大元兵夜以偏師乘雪渡青山磯丙辰都統程鵬飛鏖戰被重創歸鄂州都統高邦憲屯馬家渡棄舟走被執大元兵復攻夏貴于陽邏堡都統制劉成以定海水軍戰死貴敗沿江縱兵大掠歸廬州朱禩孫將兵至鄂州聞鄂兵敗夜奔江陵府己未權知漢陽軍王儀以城降呂文煥以北兵攻鄂州庚申程鵬飛及權守張晏然以城降幕僚張山翁不屈諸將欲殺之丞相伯顏曰義士也釋之詔錢塘仁和兩縣民年七十至九十已上者賜帛及酒米癸亥詔似道都督諸路軍馬以步軍指揮使孫虎臣總統諸軍所辟官屬皆先命後奏詔天下勤王甲子起李芾為湖南提刑乙丑以高達為湖北制置使兼安撫知江陵府詔邊費浩繁吾民重困貴戚釋道田連阡陌安居暇食有司覈其租稅收之贈王達清遠軍承宣使庚午度宗梓宮發引至浙江上俟潮漲絕江潮失期日晡不至程鵬飛以北兵徇黃州知州陳奕遣人請降于壽昌軍李庭芝以兵勤王辛未命州郡節制駐戍經從兵德祐元年春正月癸酉朔大元兵入黃州甲戌陳奕遣人下蘄州幷招其子巖于安東州丁丑知蘄州管景模遣人請降于黃州戊寅詔浙東邸第出米減價糶民壬午葬度宗于永紹陵大元兵入蘄州癸未似道以呂師夔權刑部尚書都督府參贊軍事任中流調遣乙酉以陳宜中同知樞密院事兼參知政事呂師夔錢真孫遣人請降于蘄州丙戌大元兵徇江州知安東州陳巖夜遁邳州降知壽昌軍胡夢麟寓治于江州丁亥自殺戊子知南康軍葉閶遣人請降于江州似道出師知德安府來興國以城降夔路安撫張起巖與其將弋德攻開州復取之己丑知安慶府范文虎遣人以酒饌如江州迎師乙未附度宗神主于新宮以孫虎臣為寧武軍節度使戊戌赦京畿罪池州都統張林遣人請降于江州大元兵入安慶范文虎降通判夏椅仰藥死是月知達州鮮汝忠以城降二月癸卯似道以宋京為都督府計議官使大元軍中甲辰以黃萬石為江南西路制置使加湖北制置副使高達檢校少保庚戌大元兵入池州權守趙卯發自經死宋京如軍中請稱臣奉歲幣不得請而還辛亥贈劉成清遠軍承宣使乙卯五郡鎮撫呂文福遣所部淮兵入衞降詔褒之丙辰詔勞賈似道命都督府歲舉改官如史嵩之故事己未加張起巖福州觀察使弋德以下各轉五官庚申虎臣與大元兵戰于丁家洲敗績奔魯港夏貴不戰而去似道虎臣以單舸奔揚州諸軍盡潰翁應龍以都督府印奔臨安壬戌大元兵徇饒州知州唐震死之故相江萬里赴水死通判萬道同以城降沿江制置大使趙溍知鎮江府洪起畏知寧國府趙與可知隆興府吳益皆棄城遁知和州王喜以城降建康都統翁福出迎大元兵甲子大元兵至臨江軍民盡去知軍鮑廉死之似道上書請遷都乙丑下公卿雜議王爚言己不能與大計遂去張世傑將兵入衞臨安道饒州復取之其將謝元王海李旺袁恩呂再興皆戰死江西提刑文天祥起兵勤王丙寅以天祥為江西安撫副使知贛州趣入衞詔募兵以謝堂為兩浙鎮撫使謝至保寧軍節度使全永堅謝垕並檢校少保戊辰徵兩浙福建諸郡廂禁兵之半入衞湖南提刑李芾以兵勤王知江陰軍鄭棄城遁知無為軍劉權知太平州孟之縉皆以城降己巳大元兵攻嘉定九頂山都統侯興戰死以陳宜中知樞密院事兼參知政事曾淵子同知樞密院事兩浙安撫制置大使兼知臨安府文及翁簽書樞密院事倪普同簽書樞密院事召王爚為浙西江東宣撫招撫大使使居京師以備咨訪遣大元國信使郝經等歸庚午加夏貴開府儀同三司令以所部兵入衞令長吏給經過兵民錢米一切勿征稅應編配拘鎖人除偽造關會強盜放火者餘悉縱之放免浙西公田逋米及諸處見監贓諸文武官在謫籍者並放自便與復改正放參親民加張王玉寧遠軍節度使昝萬壽保康軍節度使張世傑和州防禦使令將兵入衞陳宜中乞誅似道詔罷似道平章都督予祠趙與可除名令臨安府捕案之招似道潰兵辛未右丞相章鑑遁三月壬申朔詔復茶鹽市舶法似道諸不恤民之政次第除之以公田給佃主令率其租戶為兵殿前指揮使韓震請遷都陳宜中殺之震所部兵叛攻嘉會門射火箭至大內急發兵捕之皆散走癸酉都統徐旺榮迎大元兵入建康府鎮江統制石祖忠請降于建康命浙西提刑司準備差遣劉經戍吳江兩浙轉運司準備差遣羅林浙西安撫司參議官張濡戍獨松關山陰縣丞徐垓正將郁天興戍四安鎮起趙淮為太府寺丞戍銀樹東壩湖北安撫司計議官吳繼明攻通城縣復取之執縣令以歸遣使召章鑑還朝甲戌以似道為醴泉觀使大元兵至無錫縣知縣阮應得出戰一軍皆沒應得赴水死詔發兵戍吳江乙亥發兵戍獨松嶺銅嶺詔諭呂文煥陳奕范文虎使通和議息兵以王爚為左丞相兼樞密使閩中地復大震丙子下詔罪己以陳宜中為特進右丞相兼樞密使罷章鑑官予祠侍御史陳過請竄賈似道倂治其黨人翁應龍等不俟報而去監察御史潘文卿季可乞從過所請乃命捕應龍下臨安府獄罷廖瑩中王庭劉良貴游汶朱浚陳伯大董樸責洪起畏鎮江自效丁丑知滁州王應龍以城降己卯杖翁應龍刺配吉陽軍命王爚陳宜中並都督諸路軍馬加呂文福福州觀察使庚申贈唐震華文閣待制削萬道同三官罷之壬午復吳潛向士璧官知常州趙與鑒聞兵至遁常民錢爻石以城降甲申大元兵至西海州安撫丁順降乙酉知東海州施居文乞降于西海州知平江府潛說友通判胡玉林鏜以城降加張世傑保康軍承宣使總都督府諸軍丙戌知廣德軍令狐㮣以城降徙浙西提點刑獄司于平江府張世傑遣其將閻順李存進軍廣德謝洪永進軍平江李山進軍常州丁亥張德以下各轉官有差謝元等贈十官有星二鬬於中天頃之一星隕己丑滁人執王應龍歸於揚州殺之加呂文福保康軍承宣使趣入衞文福至饒州殺使者入江州降大元庚寅左司諫潘文卿右正言季可同知樞密院曾淵子兩浙轉運副使許自浙東安撫王霖龍相繼皆遁簽書樞密院文及翁同簽書樞密院倪普諷臺臣劾己章未上亟出關遁知安東州孫嗣武以城降雨土辛卯命在京文武官並轉兩官其畔官而遁者令御史臺覺察以聞閻順戰安吉縣復取鳳平張濡部曲害大元行人嚴忠範于獨松關執廉希賢至臨安重創死壬辰岳州安撫高世傑軍洞庭中大元兵攻之世傑降癸巳攻岳州總制孟之紹以城降甲午詔褒諭張世傑閻順諸將各轉官有差乙未免安吉縣今年夏田租有戰沒者縣令丞恤之丙申顧順攻廣德軍復取之以陳合同簽書樞密院事丁酉贈邊居誼利州觀察使戊戌赦邊城降將罪能自拔而歸者錄之復一州者予知州復一縣者予知縣所部僚吏將卒及土豪立功者同賞罷章鑑祠官幷奪宰輔恩數曾淵子削兩官奪執政恩數陳過陳堅徐卿孫各削兩官奪侍從恩數趙與鑒追兩官罷之遇赦永不收罷許自王霖龍令淮東制置司用標由庚子徙淮東總領所于江陰軍加吳繼明閤門宣贊舍人四月壬寅朔贈趙卯發華文閣待制貶陳過平江府雄江軍統制洪福率衆復鎮巢軍甲辰贈江萬里太師謚文忠輟視朝二日乙巳大元兵入廣德縣知縣王汝翼與寓居官趙時晦率義兵戰斗山路分孟唐老與其二子皆死汝翼被執至建康死之王大用贈三官王虎臣贈兩官官其二子丙午大元兵破沙市城都統孟紀死之監鎮司馬夢求自經死戊申京湖宣撫朱禩孫湖北制置副使高達以江陵降京湖北路相繼皆下張起巖提兵保飛山己酉命劉師勇戍平江府辛亥顧順諸將各轉三官孟唐老贈三官壬子以高斯得簽書樞密院事兼權參知政事總統張敏與大元兵戰豐城死之癸丑贈五官官其一子阮應得贈十官乙卯以福王