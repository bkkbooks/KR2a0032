body:
  text: 宋史卷一百六十志第一百一十三選舉六保任考課保任之制銓注有格概拘以法法可以制平而不可以擇才故予奪升黜品式具在而又責官以保任之凡改秩遷資必視舉任有無以為應否至其職任優殊則又隨事立目往往特詔公卿部刺史牧守長官即所部所知揚其才識而任其能否上自侍從臺諫館學下暨錢穀兵武之職時亦以薦舉命之蓋不膠於法矣國初保任未立限制建隆三年始詔常參官及翰林學士舉堪充幕職令錄者各一人條析其實毋以親為避既而舉者頗因緣為姦用知制誥高錫奏請許人訐告得實則有官者優擢非仕宦者授以官或賞緡錢不實則反坐之自是或特命陶穀等舉才堪通判者或詔翰林學士及常參官舉京官幕職州縣正員堪升朝者藩鎮奏掌書記多越資則詔歷兩任有文學方得奏又令諸道節度觀察使於部內官選才識優茂德行敦篤者各二人防禦團練使各舉一人遣詣闕庭觀其器業而進用焉凡被舉擢官於誥命署舉主姓名他日不如舉狀則連坐之太宗尤嚴牧守之任詔諸道使者察部內履行著聞政術尤異文學茂異者州長吏擇判司簿尉之清廉明幹者具名以聞驛召引對授之知縣又令閱屬部司理參軍廉慎而明於推鞫者舉之雍熙二年舉可升朝者始令翰林學士兩省御史臺尚書省官舉之淳化三年令宰相以下至御史中丞各舉朝官一人為轉運使迺詔曰國家詳求幹事之吏外分主計之司雖曰轉輸得兼按察總覽郡國職任尤重物情舒慘靡不由之尚慮徼功固當責實凡轉運使釐革庶務平反獄訟漕運金穀成績居最及有建置之事果利於民令歲終以聞非殊異者不得條奏又詔三司三館職事官已升擢者不在論薦其有懷材外任未為朝廷所知者方得奏舉始令內外官凡所舉薦有變節踰矩者自首則原其聯坐之罪太宗聽政之暇每取兩省兩制清望官名籍擇其有德譽者悉令舉官所舉之人須析其爵里及歷任殿最以聞不得有隱如舉狀者有賞典無驗者罪之又嘗謂宰臣曰君子小人趣向不同君子畏慎不欺暗室名節造次靡渝小人雖善談忠信而履行頗僻在官黷貨罔畏刑罰如薛智周以侍御史守婺政以賄成聚斂無已其土產富於羅州民謂之羅端公則為治可知矣卿等職在掄材今令朝臣舉官已是逐末更不擇舉主何由得人也供奉官劉文質嘗入奏察舉兩浙部內官高輔之李易直艾仲孺梅詢高鼎高貽慶姜嶼戚綸八人有治迹並隆璽書褒諭帝曰文質所舉皆良吏也特遷文質為西京作坊副使咸平間祕書丞陳彭年請用唐故事舉官自代詔祕書直學士馮拯陳堯叟參詳之拯等上言往制常參官及節度觀察防禦刺史少尹畿赤令幷七品以上清望官授訖三日內於四方館上表讓一人以自代其表付中書門下每官闕以見舉多者量而授之今官品制度沿革不同請令兩省御史臺尚書省六品以上諸司四品以上授訖具表讓一人自代於閤門投下方得入謝在外者授訖三月內具表附驛以聞遂著為令真宗初屢詔舉官未立常制大中祥符二年詔幕職州縣官初任未閑吏事須三任六考方得論薦三年始定制自翰林學士以下常參官歲各舉外任京朝官三班使臣幕職州縣官一人著其治行所宜任令閤門御史臺歲終會其數如無舉狀即具奏致罰於冬季以差出亦須舉官後乃入辭諸司使副承制崇班曾任西北邊川廣鈐轄親民者亦倣此制諸路轉運使副提點刑獄官知州通判奏舉部內官屬則不限人數具在任勞績如無可舉及顯有踰濫者亦須指述不得顧避以次年二月二十五日以前到京違期則都進奏院以名聞論如不申考帳法三司使副舉在京掌事京朝官使臣凡被舉者中書歲置二籍疏其名銜下列歷任功過舉主姓名及薦舉數一以留中書一以五月一日進內明年籍內仍計向來功過及舉主數使臣即樞密院置籍兩省尚書省御史臺官凡出使迴須採訪所至及經歷隣近郡官治迹善惡以聞轉運使副提點刑獄官知州通判赴闕各具前任部內官治迹能否如隣近及所經州縣訪聞善惡亦許同奏先於閤門投進方得入見凡朝廷須人才及欲理州縣弊政劇務即籍內視舉任及課績數多而資歷相當者差委於宣敕內盡列舉主姓名或任內幹集特與遷秩苟不集事本犯雖不去官亦移閑慢僻遠地內外羣臣所舉及三人有成績仰中書樞密院具姓名取旨甄奬如倂舉三人俱不集事坐罪不至去官亦仰奏裁當行責降或得失相參亦與折當天聖六年詔審刑院舉常參官在京刑法司者為詳議官大理寺詳斷刑部詳覆法直官皆舉幕職州縣曉法令者為之自請試律者須五考有舉者乃聽試試律三道疏二道又斷中小獄案二道通者為中格時舉官擢人不常其制國子監闕講官則詔諸路轉運使舉經義通明者或欲不次用人嘗詔近臣舉常參官歷通判無贓罪而才任繁劇者欲官諸邊要亦嘗詔節度使至閤門使知州軍鈐轄諸司使舉殿直以上材勇堪邊任者或令三司使下至天章閣待制舉奏之邊有警則詔諸轉運使提點刑獄舉所部官才堪將帥者三路知州通判縣令則詔近臣舉廉幹吏選任之毋拘資格至于文行之士錢穀之才刑名之學各因時所求而薦焉自天聖後進者頗多始戒近臣非受詔毋輒舉官又下詔風厲毋以薦舉為阿私其任用已至部使者毋得復薦失舉而已擢用聽自言不實弗為負初選人四考有舉者四人得磨勘遷京官始詔增為六考舉者五人須有本部使者御史王端以為法用舉者兩人得為縣令為令無過譴遷職事官知縣又無過譴遂得改京官乃是用舉者兩人保其三任也朝廷初無參伍考察之法偶幸無過輒信而遷之是以碌碌之人皆得自進因仍弗革其弊將深乃定令被薦為令任內復有舉者始得遷否則如常選毋輒升補時增設禁限常參官已授外任毋得奏舉京官見任知州通判升朝官兵馬都監諸司副使以上及在京員外郎嘗任知州通判諸司副使嘗任兵馬都監者乃聽舉流內銓復裁內外臣僚歲舉數文臣待制至侍御史武臣自觀察至諸司副使舉吏各有等數毋得輒過而被舉者須有本部監司長吏按察官乃得磨勘又限到官一考方得薦知雜御史觀察使以上歲舉京官不得過二人其常參官毋得復舉自是舉官之數省矣定監司以所部州多少劇易之差為舉令數非本部勿舉其後又增舉主三員蓋官冗之弊浸極故保薦之法大抵初略而後詳也英宗時御史中丞賈黯又言今京朝官至卿監凡二千八百餘員而吏部奏舉磨勘選人未引見者至二百五十餘人且以先朝事較之方天聖中法尚簡選人以四考改官而諸路使者薦部吏未有限數而在京臺閣及常參官嘗任知州通判者雖非部吏皆得薦時磨勘改官者歲才數十人後資考頗增而知州薦吏視屬邑多少裁定其數常參官不許薦士其條約漸繁而改官者固已衆矣然引對猶未有待次者也皇祐中始限監司奏舉之數其法益密而磨勘待次者已不減六七十人皇祐及今纔十年耳而猥多至于三倍向也法疏而其數省今也法密而其數增此何故哉正在薦吏者歲限定員務充數而已如郡守歲許薦五人而歲終不滿其數則人人以為遺己當舉者避謗畏譏欲止不敢此薦者所以多而真才實廉未免慁於無能也宜明詔天下使有人則薦不必滿所限之數天子納其言下詔申敕中外臣僚歲得舉京官者視元數以三分率之減一分舉職官有舉者三人任滿選如法所以分減舉者數省京官也判吏部流內銓蔡抗又言奏舉京官人度二年引對乃可畢計每歲所舉無慮千九百員被舉者既多則磨勘者愈衆且今天下員多闕少率三人而待一闕若不稍改除吏愈難臣以為可罷知雜御史觀察使以上歲得舉官法從之自是舉官之數彌省矣故事初入二府舉所知者三人將以觀大臣之能後來請謁之說勝而薦者或不以公四年詔中書樞密院舉人皆明言才業所長堪任何事以副朕為官擇人之意神宗即位乃罷兩府初入舉官凡薦任之法選人用以進資改秩京朝官用以升任舊悉有制熙寧後又從而損益之故舉皆限員而歲又分舉制益詳矣定十六路提點刑獄歲舉京官縣令額又詔察訪使者得舉官選人任中都官者舊無舉薦始許其屬有選人六員者歲得舉三員既而帝以舊舉官往往緣求請得之乃革去奏舉而概以定格詔內外舉官法皆罷令吏部審官院參議選格元祐初左司諫王巖叟言自罷辟舉而用選格可以見功過而不可以見人材中外病之於是不得已而別為之名以用其平日之所信故有踏逐申差之目踏逐實薦舉而不與同罪且選才薦能而謂之踏逐非雅名也況委人以權而不容舉其所知豈為通術遂復內外舉官法及司馬光為相奏曰為政得人則治然人之才或長於此而短於彼雖臯夔稷契各守一官中人安可求備故孔門以四科論士漢室以數路得人若指瑕掩善則朝無可用之人苟隨器授任則世無可棄之士臣備位宰相職當選官而識短見狹士有恬退滯淹或孤寒遺逸豈能周知若專引知識則嫌於私若止循資序未必皆才莫若使有位達官各舉所知然後克叶至公野無遺賢矣欲乞朝廷設十科舉士一曰行義純固可為師表科有官無官人皆可舉二曰節操方正可備獻納科舉有官人三曰智勇過人可備將帥科舉文武有官人四曰公正聰明可備監司科舉知州以上資序五曰經術精通可備講讀科有官無官人皆可舉六曰學問該博可備顧問科同上七曰文章典麗可備著述科同上八曰善聽獄訟盡公得實科舉有官人九曰善治財賦公私俱便科舉有官人十曰練習法令能斷請讞科同上應職事官自尚書至給舍諫議寄祿官自開府儀同三司至太中大夫職自觀文殿大學士至待制每歲須於十科內舉三人仍具狀保任中書置籍記之異時有事須材即執政案籍視其所嘗被舉科格隨事試之有勞又著之籍內外官闕取嘗試有效者隨科授職所賜告命仍備所舉官姓名其人任官無狀坐以繆舉之罪所貴人人重慎所舉得才光又言朝廷執政惟八九人若非交舊無以知其行能不惟涉徇私之嫌兼所取至狹豈足以盡天下之賢才若採訪毀譽則情偽萬端與其聽遊談之言曷若使之結罪保舉故臣奏設十科以舉士其公正聰明可備監司誠知請屬挾私所不能無但有不如所舉譴責無所寬宥則不敢妄舉矣詔皆從之二年殿中侍御史呂陶言郡守提封千里生聚萬衆所係休戚而不察能否一以資格用之凡再為半刺有薦者三人則得之矣不公不明十郡而居三四是天下之民半失其養請令內外從臣歲舉可為守臣者各三人略資序而採公言庶其可以擇才芘民也詔內外待制太中大夫以上歲舉再歷通判資序堪任知州者一人籍于吏部遇三路及一州而四縣者其守臣有闕先差本資序人次案籍以所薦者頃之侍御史韓川言近太中大夫以上歲舉守臣而薦所不及雖課入優等皆未預選此倚薦以為信也然太中大夫以上率在京師唯馳騖請求因緣宛轉者常多得之迹遠地寒雖歷郡久治狀著課入上考偶以無薦則反在通判下不許入三路及四縣州且州以縣之多少而分簡劇亦未為盡蓋繁簡在事不在縣固有縣多而事不繁亦有縣少而事不簡者願參以考績之實著為通令仍不以縣之多少而為簡劇詔吏部立法以聞已而歲舉積久吏部無闕以授四年遂罷太中大夫以上歲舉法惟奉詔乃舉焉紹聖元年右司諫朱勃言選人初受任雖能法未得舉為京官而有挾權善請求者職官縣令舉員既足又倂改官舉員求之詔歷任通及三考而資序已入幕職令錄方許舉之改官初神宗罷薦舉惟舉御史法不廢熙寧二年王安石言舉御史法太密故難於得人帝曰豈執政者惡言官得人耶於是中書悉具舊法以奏安石曰舊法凡執政所薦即不得為御史執政取其平日所畏者薦之則其人不復得言事矣蓋法之弊如此帝乃令悉除舊法一委中丞舉之而稍略其資格趙抃曰用京官恐非體又不委知雜專任中丞亦非舊制帝曰唐以布衣馬周為之用京官何為不可知雜屬也委長為是侍御史劉述奏曰舊制舉御史必官升京朝資入通判衆學士本臺丞知雜更互論薦每一闕上二人而擇用一人今專委中丞則愛憎由己公道廢於私恩或受權臣之託引所親厚擅竊人主威福此大不便弗聽既改法著作佐郎程顥王子韶謝景福方為條例司屬官中丞呂公著薦之遂以太子中允權監察御史𩹉行宣仁太后聽政詔范純仁為諫議大夫唐叔問蘇轍為司諫朱光庭范祖禹為正言章惇曰故事諫官皆薦諸侍從然後大臣稟奏今得無有近習援引乎太后曰大臣實皆言之非左右也惇曰臺諫所以糾大臣之越法者故事執政初除苟有親戚及嘗被薦引者見為臺臣則皆他徙防壅蔽也今天子幼沖太皇太后同聽萬機故事不可違於是呂公著以范祖禹韓縝司馬光以范純仁皆避親嫌光曰純仁祖禹實宜在諫列不可以臣故妨賢寧臣避位惇曰縝光公著必不私他日有懷姦當國者例此而引其親黨蔽塞聰明恐非國之福純仁祖禹請除他官仍令侍從以上各得奏舉於是詔尚書侍郎給舍諫議中丞待制各舉諫官二員純仁改除天章閣待制祖禹為著作佐郎後又命司諫正言殿中侍御史監察御史並用升朝官通判資序元祐六年御史中丞鄭雍言舊御史闕臺官得自薦所以正名舉職也自官制行御史中丞與兩省分舉而今之兩省官屬皆與聞門下中書政事其自舉非故事且有嫌乞專委臺官若稍涉私自有黜典詔御史中丞舉殿中侍御史二員翰林學士中書舍人同舉監察御史二員給事中亦舉二員雍又言風憲之地責任宜專若臺屬多由他薦恐非責任之本意詔中丞更舉監察御史二員八年侍御史楊畏言風憲之任人主寄耳目焉御史進用宰執不得預顧令兩省屬官舉之非是遂寢前命武臣薦舉立格有枚別職任而舉之者有概名材武而入之銓格者又其上則謀略膽勇可備統衆諳練兵事可任邊寄之類惟邊要任使隸樞密院餘則審官西院三班院按格注之其後雖時有更易而薦舉之所重輕選用之所隸屬多規此立制建炎兵興多事以中外有文武材略出倫或淹布衣或沉下僚命侍從監司郡守搜訪各舉所知州縣禮遣赴行在又詔舉忠信寬博可使絕域與智謀勇毅能將萬衆者不以有無官資並詣登聞檢院自陳才謀勇略可使者赴御營司量材錄用或命庶僚各舉內外官及布衣隱士才堪大用者擢為輔弼協濟大功或命侍從舉可為臺諫者或舉縣令或舉宗室刺史舉忠義之士能恢復土疆保護王室者帥臣監司守令舉所部見任寄居待次文武官有智謀及武藝精熟者及訪求國初功臣後裔中興以來忠義死節之家子孫四年以朝班多闕詔臺諫左右司郎官已上各薦士二人仍令執政同選在外侍從雖在謫籍無大過而政事才學實可用者亦與召擢紹興二年廷臣言今右武之世雖二三大將各立雋功微賤之中尚多奇士願廣加薦舉延問恢復之計帝然其言詔觀察使以上各薦可為將帥者二人樞密籍錄以備選用又以中原士大夫隔絕滋久流徙東南者媒寡援疎多致沉滯令侍從搜訪以聞三年復司馬光十科時遣五使宣諭諸道令訪廉潔清修可以師表吏民者尋詔宣諭官所薦並俟終更令入對升擢以勸能吏復用舊制侍從官受命三日舉官一員自代中書門下省籍記姓名每闕官即以舉狀多者進擬內外武臣舉忠勇智略可自代者一人如文臣法五年命自監察御史至侍從官舉曾經治縣聲績顯著者為監司郡守不限員數遇闕選除才堪大縣者通舉二十人不限資序十年以南渡後人材萃於兩浙而屬吏薦員甚狹增部使者薦舉改官之額歲五員十四年命守臣終更入見各舉所部縣令一人二十二年右諫議大夫林大鼐言國初常參官皆得舉人不限內外亦無員數南渡之初恩或非泛人得僥倖有從軍而改秩者有捕盜而改秩者有以登對而改秩者今朝廷無事謹惜名器惟薦舉一路貪躁者速化廉靜者陸沉今欲取考第員數增減以便之增一任者減一員十考者用四十二考者用三十五考者用二如減舉法須實歷縣令不得仍請嶽祠其或負犯殿選自如常坐士有應此格者行無玷缺年亦蹉跎無非孤寒老練安義分之士望付有司條上以弭奔競二十五年命侍從舉知州通判治跡顯著者以補監司之闕仍保任終身犯贓及不職與同罪二十九年聞人滋又請凡在官歷任及十考以上無公私罪雖舉削不及格許降等升改或疑其太濫則取吏部累年改官酌中之數立為限隔舉狀年勞參酌並用於是下其議中書舍人洪遵給事中王晞亮等上議曰本朝立薦舉之法必使歷任六考所以遲其歲月而責其赴功必使之舉官五員所以多其保任而必其可用今如議臣所請則有力者惟圖見次無材者苟冀終更出官十餘年可以坐待京秩此不可一也今欲減改官分數以待無舉削者則當被舉之人必有失職淹滯之歎此不可二也京官易得馴至郎位任子之恩愈不可減非所以救入流之弊此不可三也夫祖宗之法非有大害未易輕議今一旦取二百年成法而易之此不可四也臣以為如故便滋議遂寢三十年以武臣被薦者衆命內外大臣所舉統制統領官各遷一秩將官以下所舉者令兩府籍記右正言何溥言比命侍從薦舉縣令如聞選人不可授大邑止籍記姓名夫論人才不拘資格豈堪為縣令而有小大之別乎今所舉者才也非官也願無拘劇易早與選除歲一行之十年之後天下多賢令矣乃詔薦舉守令遇見闕依次除授如已授差遣者任滿取旨帝謂輔臣曰朕有一人材簿臣下有所薦揚退則記其姓名遇有選用搜而得之無不適當孝宗嘗命內外選在任閑居待次官舉可任監司郡守之人以資序分二等一見今可任一將來可任注籍于三省仍作圖進呈以憑除擢又以武選之衆拔擢未廣立謀略沉雄可任大計寬猛適宜可使御衆臨陣驍勇可鼓士氣威信有聞可守邊郡思智精巧可治器械凡五等科目令曾歷軍功觀察使以上各舉二人其通習典章可掌朝儀練達民事可任郡寄諳曉財計可裕民力持身廉潔可律貪鄙詞辨不屈可備奉使五等令非軍功觀察使以上舉之並隨類指陳實跡毋得別撰褒詞隆興二年廷臣上言謂國朝視文武為一體故有武臣以文學換授文資文臣以材略智謀換右職當邊寄者蓋文武兩塗情本參商若文臣總幹戎事不換武階則終以氣習相忌有不樂從者矣今兵塵未息方厲恢復之圖願博采中外有材智權略可以臨邊可以制閫者倣舊制改授從之乾道以後又選大將之家能世其武勇者武舉及第武藝絕倫可為將佐者會廷臣言曰方今國家之兵東至淮海西至川蜀殆百餘萬其間可為將帥者不在其上則在其下而朝廷未知振其氣表其才也今文臣有三人舉主則為之循資再任五人則為之改秩而武臣無有焉古語曰三辰不軌擢士為相蠻夷不恭拔卒為將宜令都統制視監司者歲舉武臣二人視郡守者歲舉一人以智勇俱全為上善撫士卒專有膽勇者次之不拘將校士卒優以奬擢被舉人有臨戰不用命者與文臣犯入己贓者同倂坐舉主帝可其奏仍著為法三年禮部尚書趙雄請令侍從臺諫兩省於知縣資序以上歲薦堪充郡守通判資序以上歲薦監司仍用漢朝雜舉之制三省詳加考察詔如所請仍不以內外雜舉歲各五人保舉官及五員以上列銜共奏帝曰薦舉本欲得人又恐干請反長奔競龔茂良言三代良法亦不免於弊今欲精選監司郡守非薦舉何由知之帝曰若今雜舉則須衆論僉允又經中書考察而後除授亦博采遴選之道也吏部請武舉軍班武藝特奏名出身幷任巡檢駐泊監押知砦比附文臣關升條令並實歷六考有舉主四人內監司一人聽關升親民正副將兩任有舉主二人內一人監司亦與關升凡升副將視文臣初任通判資序再關升正將視文臣次任通判資序關升路分副都監視文臣初任知州資序小郡州鈐轄視文臣次任知州資序孝宗以歲舉京官數濫於是內外薦舉改官員數六部寺監長貳戶部右曹郎官等三分減一禮部國子監長貳如上條外又減半前宰執歲各減二員諸道轉運提刑提舉常平茶鹽學事司總領茶馬鑄錢司安撫制置司及諸路州軍並四分減一通籍之數彌省矣光宗時言者謂被薦者衆朝廷疑其私而不信病其泛而難從縱有賢才不免與僥倖者倂棄請條約之乃命帥守監司毋獨員薦士時薦舉固多得人然有或乏廉聲而舉充廉吏或素昧平生而舉充所知或不能文而舉可備著述遂命臣僚自今有人則薦無人則闕其尤繆妄者覺察之嘉泰二年令內外舉薦並具實跡以聞自是濫舉之弊稍革嘉定十二年命監司守臣舉十科政績所知自代露章列薦並籍記審察任滿則取其舉數多有政績行誼者升擢之宋初內外小職任長吏得自奏辟熙寧間悉罷歸選部然要處職任如沿邊兵官防河捕盜重課額務場之類尋又立專法聽舉於是辟置不能全廢也既出常格則憸人往往因之以行其私元祐以來屢行屢止蓋處心公明則得以用其所知固為良法苟徇私昧理則才不為用請屬賄賂無所不有矣又孰若付之銓曹而概以公法者哉建炎初詔河北招撫河東經制及安撫等使皆得辟置將佐官屬行在五軍幷御營司將領亦辟大小使臣諸道郡縣殘破之餘官吏解散諸司誘人填闕皆先領職而後奏給付身於是州郡守將皆假軍興之名換易官屬有罪籍未復守選未參部者朝論患之乃令釐正使歸部依格注擬惟陝西五路兩河兩淮京東等路經略安撫司屬官聽舉辟餘路並罷四年初置諸鎮撫使管內州縣官並許辟置言者謂遠方之民理宜綏撫如峽州四縣多用軍功或胥吏補知縣欄吏補監稅民被其害遂命取峽州江陵府荊門軍公安軍州縣官闕委安撫司奏辟命御史臺仍舊辟舉承務郎已上官充主簿檢法官不限資序紹興二年臣僚又以比年帥守監司辟官攙奪部注朝廷不能奪銓曹不能違又多畀以添差不釐務之闕上自監司倅貳下至掾屬給使一郡之中兵官八九員一務之中監當六七員數倍於前日存無事之官食至重之祿所以重困生民請裁省其闕否則以宮廟之祿畀之遂命自今已就辟差理資任者毋得據舊闕以妨下次六年詔諸道宣撫司僚屬許本司奏辟內京官以二年為任願留再任者取旨自兵興所辟官有經十年不退者故條約焉二十六年詔已注知縣縣令不許奏辟孝宗初詔內外有專法辟闕並仍舊乾道九年命監司帥臣非有著令不得創行奏辟所辟毋得攙已差之闕違者御史臺察之淳熙三年命自今極邊知縣縣令闕官專委本州守臣奏辟毋得仍舊權攝其見攝官留意民事百姓愛服者許不以有無拘礙特行奏辟七年詔未中銓未歷任初改秩人毋得差辟著為令理宗寶慶二年以廣南東西路通判幕職教授等官法未嘗許辟者須於各官將滿之前具闕如未有代者即聽申部出闕滿三月無人注擬申省下本路通判以下京官闕從諸司奏辟選人闕從漕司定差作邑未滿三年作倅未滿二考不許預期奏辟他闕諸司屬官不許輒自辟置或久闕正官許令次官暫攝待朝命方許奏辟淳祐十一年以御史臺申嚴銓法禁監司郡守辟親戚為屬吏又選人無考第舉主不及三員及納粟人雖有考第舉主並不聽辟為令寶祐三年戒諸路監司帥閫不應辟而輒辟者辟主及受辟之官並與鐫秩考課宋初循舊制文武常參官各以曹務閑劇為月限考滿即遷太祖謂非循名責實之道罷歲月遷之制置審官院考課中外職事受代京朝官引對磨勘非有勞績不進秩其後立法文臣五年武臣七年無贓私罪始得遷秩曾犯贓罪則文臣七年武臣十年中書樞密院取旨其七階選人則考第資歷無過犯或有勞績者遞遷謂之循資凡考第之法內外選人周一歲為一考欠日不得成考三考未替更周一歲書為第四考已書之績不得重計初著令州縣戶口準見戶十分增一刺史縣令進考若耗一分降考一等建隆三年又以科賦有欠踰十之一及公事曠違嘗有制受罰者皆如耗戶口降考吏部南曹又舉周制請州縣官益戶增稅受代日並書於籍凡千戶以下能增百戶減一選減及三選以上令賜章服主簿升秩進階能歸復逋亡之民者亦如之是年縣始置尉頒捕盜條給以三限限各二十日三限內獲者令尉等第議賞三限外不獲尉罰一月奉令半之尉三罰令四罰皆殿一選三殿停官令尉與賊鬥而能盡獲者賜緋升擢乾德四年詔諸縣令佐有能招攜勸課以致蕃庶民籍租額出其元數減一選仍進一階太宗勵精圖治遣官分行郡縣廉察官吏河南府法曹參軍高丕等皆以不勝任免官復詔諸道察舉部內官第其優劣為三等政績尤異為上職務粗治為中臨事弛慢所涖無狀者為下歲終以聞先是諸州掾曹及縣令簿尉皆戶部南曹給印紙曆子俾州郡長吏書其績用愆過秩滿送有司差其殿最詔有司申明其諸州別給公據者罷之判吏部南曹董淳言有司批書印曆多所闕略令漏書一事殿一選三事降一資自是職事官依州縣給南曹曆子天下知州通判京朝官釐務於外者給以御前印紙令書課績時蔣元振知白州為政清簡民甚便之秩滿衆輒詣部使乞留凡十有八年未受代姚益恭清白有才幹知鄆州須城縣鞭朴不施境內大治淳化初採訪使各言其狀下詔褒嘉賜元振絹三十匹粟五十石賜益恭對衣銀帶絹五十匹四年始分置磨勘之司審官院掌京朝官考課院掌幕職州縣官廢差遣院令審官總之乃詔郡縣有治行尤異吏民畏服居官廉恪涖事明敏鬬訟衰息倉廩盈羨寇盜剪滅部內清肅者本道轉運司各以名聞當驛置赴闕親問其狀加旌賞焉其貪冒無狀淹延鬬訟踰越憲度盜賊競起部內不治者亦條其狀以聞當行貶斥以翰林學士錢若水樞密直學士劉昌言同知審官院考覆功過以定升降又以判流內銓翰林學士蘇易簡知制誥王旦等知考課院重其職也凡流內銓主常調選人考課院主奏舉及歷任有殿最者明年帝親選京朝官三十餘人自書戒諭之言于印紙曰勤政愛民奉法除姦方可書為勞績且謂錢若水曰奉法除姦之言恐諸臣未喻因而生事可語之曰除姦之要在乎奉法至道初罷考課院倂流內銓二年遣使廉察諸道長吏得八人涖事公正惠愛及民皆降璽書奬諭真宗即位命審官院考京朝官殿最引對遷秩京朝官引對磨勘自此始先是每恩慶百僚多得序進帝始罷之惟郊祀恩許加勳階爵邑帝察羣臣有聞望者得刑部郎中邊肅等二十有四人令閤門再引對觀其辭氣文藝並得優升景德初令諸道辨察所部官吏能否為三等公勤廉幹惠及民者為上幹事而無廉譽清白而無治聲者為次畏懦貪猥為下仁宗尤矜憐下吏以銓法選人有私罪皆未聽磨勘諭近臣凡門謝弗至與對敭失儀其毋以為罪又曰州縣秩卑而長吏多鈎摭細故文致之法使不得自進朕甚閔焉宰相王曾曰引對時陛下酌其輕重而稍擢之則下無滯才矣其後選人有束鹿縣尉王得說歷官寡過書考最多而無保任者帝察其孤貧特擢為大理寺丞天聖時詔文武臣僚非有勳德善狀不得非時進秩非次罷免者毋以轉官帶職為例兩省以上舊法四年一遷官今具履歷聽旨京朝官磨勘年限有私罪及歷任嘗有罪先以情重輕及勤績與舉者數奏聽旨若無私犯而著最課及有舉者皆第遷之自請釐物務于京師五年一磨勘因舉及選差勿拘凡有善政異績準事大小遷升選人視此又定監物務入親民次升通判通判升知州皆用舉者舉數不足毋輒關升慶曆三年從輔臣范仲淹等奏定磨勘保任之法自朝官至郎中少卿須清望官五人保任始得遷其後知諫院劉元瑜以為適長奔競非所以養廉恥乃罷之八年詔近臣論時政翰林學士張方平言祖宗之時文武官不立磨勘年歲不為升遷次序有才實者從下位立見超擢無才實者守一官十餘年不轉其任監當或知縣通判知州至數任不遷當時人皆自勉非有勞効知不得進祥符之後朝廷益循寬大自監當入知縣知縣入通判通判入知州皆以兩任為限守官及三年例得磨勘先朝始行未見有弊及今年深習以為常皆謂分所宜得無賢不肖莫知所勸願陛下稍革此制其應磨勘遷必有勞績或特敕擇官保任者即與轉遷如無勞績又不因保任者更增展年其保任之法須選擇清望有才識之人命之舉官如此則是執政之臣舉清望官委清望官舉親民官凡官有闕惟隨員數舉之庶見急才愛民之意嘉祐六年下詔曰朕觀古者治世牧民之吏多稱其官而百姓安其業今求材之路非不廣責善之法非不詳而吏多失職非稱所以為民之意豈人材獨少而世變殊哉殆不得久於其官故也蓋智能才力之士雖有興利除害禁姦勸善之意非假以歲月則亦媮不為用欲終厥功其路無由自今諸州縣守令有清白不擾政迹尤異而實惠及民者本路若州連書同罪保舉將政迹實狀以聞中書門下察訪得實許令再任英宗治平三年考課院言知磁州李田再考在劣等降監淄州鹽酒稅務坐考劣降等自田始考績舊審定殿最格法自發運使率而下至於知州皆歸考課院專以監司所第等級為據至考監司則總其甄別部吏能否副以採訪才行合二事為課悉書中等無高下神宗即位凡職皆有課凡課皆責實監司所上守臣課不占等者展年降資而治狀優異者增秩賜金帛以璽書奬勵之若監司以上則命御史中丞侍御史考校凡縣令之課以斷獄平允賦入不擾均役屏盜勸課農桑振恤飢窮導修水利戶籍增衍整治簿書為最而德義清謹公平勤恪為善參考治行分定上中下等至其能否尤殊絕者別立優劣二等歲上其狀以詔賞罰其入優劣者賞罰尤峻繼又令一路長吏無甚臧否不須別為優劣二等止因上中下三等區別以聞是時內外官職各從所隸司以考覈而中書皆置之籍每歲竟或有除授則稽差殿最取其尤甚者而進退之熙寧五年遂罷考課院間遣使察訪所至州縣條其吏課凡知州通判上中書縣令上司農各注籍以相參考惟侍從出守郡聽不以考法朝廷察其治焉元豐元年詔因勞效得酬賞皆分五等有司受其等而差進之初一等京朝官大小使臣皆轉一官選人資歷深者改京朝官資淺者循兩資次二等隨其官高下升資或減磨勘年惟軍功捕盜皆得改次等京朝官自三等以下賞以差減若一人而該兩賞許累計其等以遷三年詔御史臺六察按官以所糾劾官司稽違失職事多寡為殿最中書置簿以時書之任滿取旨升黜元祐初御史中丞劉摯言近者朝廷主察名實行綜覈之政下乃承之以刻主行教化擴寬洪之澤而下乃為苟簡先此追罪監司數人為其掊斂害民耳而昧者矯枉過正乃欲以緩縱委靡為安靜請申立監司考績之政以常賦登耗郡縣勤惰刑獄當否民俗休戚為之殿最歲終用此以誅賞文彥博又奏唐六典所載以德行才用勞效三類察在選之士參辨能否今之選格特多舉主有軍功斯為上矣然舉主可求軍功或妄何可盡據請委吏依倣三類第其才德功效送中書門下覆驗取其應選者引對而去留之詔令近臣議議者請用元豐考課令第為高下以行升黜歲毋過五人後改立縣令課有四善五最之目及增損監司轉運課格守令為五等減磨勘法初元祐嘗立吏戶刑三部郎官課崇寧間言者乞倣周制歲終委省寺監六曹之長各攷其屬稽其官成而三年遂校其勤惰行賞罰焉大觀元年詔國家休養生民垂百五十年生齒日繁而戶部民籍曾不加益州縣於進丁入老收落失實以故課役不均皆守令弛職可申嚴考課法然其考法因時所尚以示誘抑若勸學墾田植桑棗振貸葬枯興發坑冶奉詔無違誘進道徒賦稅趣辦能按贓吏皆因事而增品目舊法固不易也但奉行不皆良吏以請謁移實者亦多紹興二年初詔監司守臣舉行考課之法時郡縣數罹兵燹又命以戶口增否別立守令課分上中下三等每等分三甲置籍守倅考縣令監司考知州考功會其已成較其優劣而賞罰之五年立縣令四課曰糾正稅籍團結民兵勸課農桑勸勉孝悌三歲就緒者加旌賞無善狀者汰之臣僚上言守令之治其略有七一曰宣詔令二曰厚風俗三曰勸農桑四曰平獄訟五曰理財賦六曰興學校七曰實戶口得人則七者皆舉今之監司實古刺史比年守令姦貪監司未嘗按發玩弛之弊日甚而戶部侍郎張致遠亦言之乃下詔戒飭監司考察守令而舉按焉頃之有請令江淮官久任而課其功過者帝曰朕昔為元帥時見州縣官以三年為任猶且一年立威信二年守規矩三年則務收人情以為去計今止以二年為任雖有葺治之心蓋亦無暇矣可如所奏是時歲以十五事考校監司四善四最考校縣令違限不實者有罪又詔監司一歲再具所部知縣有無善政顯著繆懦不職上之省十三年詔淮東京西路州縣逐考批書若增添戶口勸課農桑增修水利歲終委監司覆實比較守臣之條有九通判之條十有四令佐而下有差二十五年以州縣貪吏為虐監司郡守不訶察遂命監司按郡守之縱容臺諫劾監司之失察而每歲校其所按之多寡以為殿最之課二十七年校書郎陳俊卿言古人各守一官終身使易地而居未必盡其能也今監司帥守小州換大州東路易西路朝廷百執事亦往往計日待遷視所居之官有如傳舍望令有政術優異者或增秩賜金或待終秩而後遷使久於其職察其勤惰而升黜之庶幾人安其分而萬事舉矣詔三省行之隆興元年命湖南北路應守令增闢田疇自一千頃以下轉磨勘有差虧者展磨勘降名次二年詔淮南川陝京西邊郡守令能安輯流亡勸課農桑首就緒者本道監司以聞乾道二年廷臣上言國朝盛時有京朝官考課有幕職州縣官考課其後為審官院為考課院皆命中書或兩制臣僚校其能否以施賞罰望遵故事應監司郡守朝辭日別給御前曆子如薦賢才為幾人若為治錢穀若為理獄訟興某利除某害各為條目使之黽勉從事每考令當職官吏從實批書代還使藉手陛見然後詔執事精加考覈其風績有聞者優與增秩所莅無狀者罰之無赦則賢者效職而中下之才亦皆強於為善矣帝乃命經筵官參照累朝考課之法講而行之淳熙二年因臣僚言沿邊七路每路以文臣一人充安撫使以治民武臣一人充都總管以治兵分舉其職各奏其功任必加久歲考優劣一年視其規畫二年視其成效三年視其大成重議誅賞臧否分為三等治效顯著者為臧貪刻庸繆者為否無功無過者為平時天子留意黜陟諸道莫敢不奉承於是得實者皆增秩升擢而監司牧伯舉按稽緩者輒降黜行之十餘年不免有弊帝因諭輔臣曰臧否亦有喜怒之私如諸司以為臧一司以為否必從衆為公亦在精擇監司而以臺諫攷察之庶乎其可也光宗初詔罷其令寧宗以郡國按刺多徇私情遂倣舊制於御史臺別立攷課一司歲終各以能否之實聞于上以詔升黜其貪墨昏懦致臺諫奏劾者坐監司郡守以容庇之罪度宗咸淳三年命參酌舊制凡文武官一是以公勤廉恪為主而又職事修舉斯為上等公勤廉恪各有一長為中等既無廉聲又多繆政者考下等其要則以御史臺總帥閫監司監司總守倅守倅總州縣屬官餘如戎司及屯軍大壘則總之制司或無制司則倂各郡總管鈐轄並總於帥司以逐路所部州郡多寡之數分隸轉運提舉提刑三司守倅月一考州縣屬官監司會所隸守倅制司會戎司軍壘遵照舊制互用文移會其兵甲獄訟金穀之數及各司屬官書擬公事拘榷錢物招軍備器之數次月置冊各申御史臺上之課籍俟至半年類考較前三年定為三等中者無所賞罰上者或轉官或減磨勘下者降官展磨勘各有等差
