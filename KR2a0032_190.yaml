body:
  text: 宋史卷一百九十志第一百四十三兵四鄉兵一陝西保毅河北忠順河北陝西強人砦戶河北河東強壯河東陝西弓箭手河北等路弓箭社鄉兵者選自戶籍或土民應募在所團結訓練以為防守之兵也周廣順中點秦州稅戶充保毅軍宋因之自建隆四年分命使臣往關西道令調發鄉兵赴慶州咸平四年令陝西係稅人戶家出一丁號曰保毅官給糧賜使之分番戍守五年陝西緣邊丁壯充保毅者至六萬八千七百七十五人七月以募兵離去鄉土有傷和氣詔諸州點充強壯戶者稅賦止令本州輸納有司不得支移之先是河北忠烈宣勇無人承替者雖老疾不得停籍至是詔自今委無家業代替者放令自便自是以至天禧間幷代廣銳老病之兵雖非親屬而願代者聽河北彊壯恐奪其農時則以十月至正月旬休日召集而教閱之忠烈宣勇廣銳之歸農而闕員者並自京差補戍於河上而歲月久遠者則特為遷補貧獨而無力召替者則令逐處保明放停當是時河北河東有神銳忠勇強壯河北有忠順強人陝西有保毅砦戶強人強人弓手河東陝西有弓箭手河北東陝西有義勇麟州有義兵川峽有土丁壯丁荊湖南北有弩手土丁廣南東西有槍手土丁邕州有溪洞壯丁土丁廣南東西有壯丁當仁宗時神銳忠勇彊壯久廢忠順保毅僅有存者康定初詔河北河東添籍彊壯河北凡二十九萬三千河東十四萬四千皆以時訓練自西師屢衂正兵不足乃籍陝西之民三丁選一以為鄉弓手未幾刺充保捷為指揮一百八十五分戍邊州西師罷多揀放焉慶曆二年籍河北強壯得二十九萬五千揀十之七為義勇且籍民丁以補其不足河東揀籍如河北法其後議者論義勇為河北伏兵以時講習無待儲廩得古寓兵於農之意惜其束於列郡止以為城守之備誠能令河北邢冀二州分東西兩路命二郡守分領以時閱習寇至即兩路義勇翔集赴援使其腹背受敵則河北三十餘所常伏銳兵矣朝廷下其議河北帥臣李昭亮等議曰昔唐澤潞留後李抱真籍戶丁男三選其一農隙則分曹角射歲終都試以示賞罰三年皆善射舉部內得勁卒二萬既無廩費府庫益實乃繕甲兵為戰具遂雄視山東是時天下稱昭義步兵冠於諸軍此近代之顯效而或謂民兵祗可城守難備戰陣非通論也但當無事時便分義勇為兩路置官統領以張用兵之勢外使敵人疑而生謀內亦搖動衆心非計之得姑令在所點集訓練三二年間武藝稍精漸習行陣遇有警得將臣如抱真者統馭制其陣隊示以賞罰何敵不可戰哉至於部分布列量敵應機繫於臨時便宜亦難預圖況河北河東皆邊州之地自置義勇州縣以時按閱耳目已熟行固無疑詔如所議治平元年宰相韓琦言古者籍民為兵數雖多而贍至薄唐置府兵最為近之後廢不能復今之義勇河北幾十五萬河東幾八萬勇悍純實出於天性而有物力資產父母妻子之所係若稍加練簡與唐府兵何異陝西嘗刺弓手為保捷河北河東陝西皆控西北事當一體請於陝西諸州亦點義勇止手背一時不無小擾終成長利天子納其言乃遣籍陝西義勇得十三萬八千四百六十五人是時諫官司馬光累奏謂陝西頃嘗籍鄉弓手始諭以不去鄉里既而為保捷正兵遣戍邊州其後不可用遂汰為民徒使一路騷然而於國無補且祖宗平一海內曷嘗有義勇哉自趙元昊反諸將覆師相繼終不能出一旅之衆涉區脫之地當是時三路鄉兵數十萬何嘗得一人之力議者必曰河北河東不用衣廩得勝兵數十萬閱教精熟皆可以戰又兵出民間合於古制臣謂不然彼數十萬者虛數也閱教精熟者外貌也兵出民間者名與古同而實異蓋州縣承朝廷之意止求數多閱教之日觀者但見其旗號鮮明鉦鼓備具行列有序進退有節莫不以為真可以戰殊不知彼猶聚戲若遇敵則瓦解星散不知所之矣古者兵出民間耕桑所得皆以衣食其家故處則富足出則精銳今既賦斂農民粟帛以給正軍又籍其身以為兵是一家而給二家之事也如此民之財力安得不屈臣愚以為河北河東已刺之民猶當放還況陝西未刺之民乎帝弗聽於是三路鄉兵唯義勇為最盛熙寧以來則尤重蕃兵保甲之法餘多承舊制前史沿革不復具述取其有損益者著于篇南渡而後土宇雖不及前而兵制多仍其故凡其鄉兵砦兵之可攷者皆附見焉陝西保毅開寶八年發渭州平涼潘原二縣民治城隍因立為保毅弓箭手分戍鎮砦能自置馬免役逃死以親屬代因周廣順舊制也咸平初秦州極邊止置千人分番守戍上番人月給米六斗仲冬賜指揮使至副都頭紫綾綿袍十將以下皂綾袍五年點陝西沿邊丁壯充保毅凡得六萬八千人給資粮與正兵同戍邊郡慶曆初詔悉刺為保捷軍唯秦州增置及三千人環慶保安亦各籍置是時諸州總六千五百十八人為指揮三十一皇祐五年涇原都總管程戡上言陝西保毅近歲止給役州縣無復責以武技自黥刺為保捷而家猶不免於保毅之籍或折賣田產而得產者以分數助役今秦州僅三千人久廢農業請罷遣詔自今敢私役者計傭坐之治平初詔置保毅田承名額者悉揀刺以為義勇熙寧四年詔廢其軍環慶砦戶強人弓手九年詔如禁軍法上其籍隸于馬軍司廩給視中禁軍河北忠順自太宗朝以瀛莫雄霸州乾寧順安保定軍置忠順凡三千人分番巡徼隸沿邊戰櫂巡檢司自十月悉上人給糧二升至二月輪半營農慶曆七年夏竦建議與正兵參戍八年以水沴多逋亡者權益正兵代其闕額皇祐四年權放業農後不復補河北陝西強人砦戶強人弓手名號不一咸平四年募河北民諳契丹道路勇銳可為間伺者充強人置都頭指揮使無事散處田野寇至追集給器甲口糧食錢遣出塞偷斫賊壘能斬首級奪馬者如賞格虜獲財畜皆畀之慶曆二年環州亦募手背自備戎械幷馬置押官甲頭隊長戶四等以下免役上番防守月給奉廩三年涇原路被邊城砦悉置環慶二州復有砦戶康定中以沿邊弓手手背充有警召集防戍與保毅弓手同大順城西谷砦有彊人弓手天禧慶曆間募置番戍為巡徼斥候日給糧人賦田八十畝能自備馬者益賦四十畝遇防秋官給器甲下番隨軍訓練為指揮六河北河東強壯五代時瀛霸諸州已置咸平三年詔河北家二丁三丁籍一四丁五丁籍二六丁七丁籍三八丁以上籍四為強壯五百人為指揮置指揮使百人為都置正副都頭二人節級四人所在置籍擇善騎射者第補校長聽自置馬勝甲者蠲其戶役五年募其勇敢團結附大軍為柵官給鎧甲景德元年遣使分詣河北河東集強壯借庫兵給糧訓練非緣邊即分番迭教寇至悉集守城寇退營農至康定初州縣不復閱習其籍多亡乃詔二路選補增其數為伍保迭糾遊惰及作奸者二十五人為團置押官四團為都置正副都頭各一人五都為指揮置指揮使各以階級伏事年二十係籍六十免取家人或他戶代人歲正月縣以籍上州州以籍奏兵部按舉不如法者慶曆二年悉揀以為義勇不預者釋之而存其籍以備守葺城池而河東強壯自此寖廢矣其募於河北者舊給塘泊河淤之田力不足以耕重苦番教應募者寡熙寧七年罷之以其田募民耕戶兩頃蠲其賦以為保甲河東陝西弓箭手周廣順初鎮州諸縣十戶取材勇者一人為之餘九戶資以器甲芻糧建隆二年詔釋之凡一千四百人景德二年鎮戎軍曹瑋言有邊民應募為弓箭手者請給以閒田蠲其徭賦有警可參正兵為前鋒而官無資糧戎械之費詔人給田二頃出甲士一人及三頃者出戰馬一匹設堡戍列部伍補指揮使以下據兵有功勞者亦補軍都指揮使置巡檢以統之其後鄜延環慶涇原幷河東州軍亦各募置慶曆中諸路總三萬二千四百七十四人為指揮一百九十二是時河東都轉運使歐陽脩言代州岢嵐寧化火山軍被邊地幾二三萬頃請募人墾種充弓箭手詔宣撫使范仲淹議以為便遂以岢嵐軍北草城川禁地募人拒敵界十里外占耕得二千餘戶歲輸租數萬斛自備弓馬手背為弓箭手既以幷州明鎬沮議而止至和二年韓琦奏訂鎬議非是曰昔潘美患契丹數入寇遂驅旁邊耕民內徙苟免一時失備之咎其後契丹講和因循不復許人復業遂名禁地歲久為戎人侵耕漸失疆界今代州寧化軍有禁地萬頃請如草城川募弓箭手可得四千餘戶下幷州富弼議弼請如琦奏詔具為條視山坡川原均給人二頃其租秋一輸川地畝五升坂原地畝三升毋折變科徭仍指揮即山險為屋以便居止備征防無得擅役先是麟府豐州亦以閒田募置人給屋貸口糧二石而德順軍靜邊砦壕外弓箭手尤為勁勇夏人利其地數來爭占朝廷為築堡戍守至治平末河東七州軍弓箭手總七千五百人陝西十州軍幷砦戶總四萬六千三百人先是康定元年詔麟府州募歸業人增補義軍俾耕本戶故地而免其稅租其制與弓箭手略同而不給田熙寧二年兵部上河東七郡舊籍七千五今籍七千陝西十郡幷砦戶舊籍四萬六千三百今唯秦鳳有砦戶三年秦鳳路經略使李師中言前年築熟羊等堡募蕃部獻地置弓箭手迄今三年所募非良民初未嘗團結訓練竭力田事今當置屯列堡為戰守計置屯之法百人為屯授田於旁塞堡將校領農事休即教武技其牛具農器旗鼓之屬並官予置堡之法諸屯併力自近及遠築為堡以備寇至寇退則悉出掩擊從之五年趙离為鄜延路以其地萬五千九百頃募漢蕃弓箭手四千九百人帝嘉其能省募兵之費褒賞之六年离言新募弓箭手頗習武技請更番代正兵歸京師詔審度之十月詔熙河路以公田募弓箭手其旁塞民強勇願自占田出租賦聯保伍或義勇願應募或民戶願受蕃部地者聽七年正月帶御器械王中正詣熙河路以土田募弓箭手所募人毋拘路分遠近不依常格差官召募仍親提舉三月王韶言河州近城川地招漢弓箭手外其山坡地招蕃弓箭手人給地一頃蕃官兩頃大蕃官三頃仍募漢弓箭手等為甲頭候招及人數補節級人員與蕃官同管勾自來出軍多為漢兵盜殺蕃兵以為首功今蕃兵各願於左耳前刺蕃兵字從之十月中書條例司乞五路弓箭手砦戶除防拓巡警及緩急事許差發外若修城諸役即申經略安撫鈐轄司其有擅差發及科配和雇者並科違制之罪從之其夔州路義軍廣南槍手土丁峒丁湖南弩手福建鄉丁槍手依此法八年詔涇原路七駐泊就糧上下番正兵弓箭手蕃兵約七萬餘人分為五將別置熙河策應將副十年知延州呂惠卿言自熙寧五年招到弓箭手只是權行差補未曾團定指揮本司見將本路團結將分團成指揮都分置立將校統轄即於臨時易為勾集從之元豐二年計議措置邊防所言以涇原路正兵漢蕃弓箭手為十一將分駐諸州從之三年詔凡弓箭手兵騎各以五十人為隊置引戰旗頭左右傔旗及以本屬酋首將校為擁隊並如正軍法蕃捉生蕃敢勇山河戶亦如之凡募弓箭手蕃捉生強人山河戶不以等樣第募有保任年十七已上弓射七斗任負帶者鄜延路新舊蕃捉生環慶路強人諸路漢弓箭手鄜延路歸明界保毅蕃戶弓箭手皆於手背四年涇原路經略司言本路弓箭手闕地九千七百頃渭州隴山一帶川原陂地四千餘頃可募弓箭手二千餘人或不願應募乞收其地入官熙河路都大經制司言乞依熙河舊例許涇原秦鳳路環慶及熙河路弓箭手投換仍帶舊戶田土耕種二年即收入官別招弓箭手皆從之五年正月鄜延路經略司乞以新收復米脂吳堡義合細浮圖塞門五砦地置漢蕃弓箭手及春耕種其約束補職並用舊條從之二月詔提舉熙河等路弓箭手營田蕃部共為一司隸涇原路制置司四月詔蕃弓箭手陣亡依漢弓箭手給賻弓箭手出戰因傷及病羸不能自還者並依軍例賜其家七月提舉熙河路弓箭手營田蕃部司康識兼提舉營田張大寧言乞應新收復地差官分畫經界選知農事廂軍耕佃頃一人其部押人員節級及雇助人工歲入賞罰並用熙河官莊法餘並招弓箭手營田每五十頃為一營差諳農事官一員幹當從之六年鄜延路經略司言弓箭手於近𩹉縣置田兩處立戶及四丁已上乞取一丁為保甲一丁為弓箭手有二丁至三丁即且令充弓箭手詔保甲願充弓箭手者聽其見充弓箭手與當丁役毋得退就保甲陝西河東亦如之八年詔罷秦鳳路置場集教弓箭手令經略司講求土人習教所宜立法元祐元年詔罷提舉熙河等路弓箭營田蕃部司三年兵部言涇原路隴山一帶係官地例為人侵冒略無色役非自朝廷置局招置摽撥無以杜絕姦弊從之其後殿前司副都指揮使劉昌祚奏根括隴山地凡一萬九百九十頃招置弓箭手人馬凡五千二百六十一賜敕書奬諭四年詔將隴山一帶弓箭手人馬別置一將管幹仍以涇原路第十二將為名五年詔戶部遣官往熙河蘭岷路代孫路措置弓箭手土田紹聖元年樞密院言熙河蘭岷路經略司奏本路弓箭手自展置以來累經戰鬥內有戰功補三班差使已上之人欲並遣歸所屬差使仍以其地令親屬承刺如無即別召人承之三年正月詔自今漢蕃人互投弓箭手者官司不得收刺違者杖一百五月詔在京府界諸路馬軍槍手並改充弓箭手兼習蕃槍四年詔張詢巴宜專根括安西金城膏腴地頃畝可以招置弓箭手若干人具團結以聞元符元年二月樞密院言鍾傳奏近往涇原與章楶講究進築天都山南牟等處今相度如展置青南訥心須置一將乞權於熙秦兩路輟那新城內土田幷招弓箭手仍置提舉官二員熙秦兩路弓箭手每指揮以三百人為額乞作二十指揮招置不一二年間須得數千民兵以充武備從之七月詔陝西河東路新城砦合招弓箭手投換其元祐八年四月不得招他路弓箭手指揮勿用三年提舉涇原路弓箭手安師文知涇州罷提舉弓箭手司崇寧元年九月樞密院勘會陝西五路幷河東自紹聖開斥以來疆土至廣遠者數百里近者不減百里罷兵以來未曾措置田多膏腴雖累降詔置弓箭手類多貧乏或致逃走州縣鎮砦污吏豪民冒占沃壤利不及於平民且並緣舊疆侵占新土今遣官分往逐路提舉措置應緣新疆土田分定腴瘠招置弓箭手推行新降條法舊弓箭手如願出佃新疆亦仰相度施行詔湯景仁河東路董采秦鳳路陶節夫環慶路安師文鄜延路並提舉弓箭手元符三年罷提舉司今復置崇寧二年十一月安師文奏據權通判德順軍事盧逢原申根括打量出四將地分管下五砦新占舊邊壕外地共四萬八千七百三十一頃有奇乞特賜優賞詔安師文特授左朝議大夫差遣如故盧逢原特授朝請郎二年九月熙河路都轉運使鄭僅奉詔相度措置熙河新疆邊防利害僅奏朝廷給田養漢蕃弓箭手本以藩扞邊面使顧慮家產人自為力今拓境益遠熙秦漢蕃弓箭手乃在腹𩹉理合移出然人情重遷乞且家選一丁官給口糧團成耕夫使佃官莊遇成熟日除糧種外半入官半給耕夫候稍成次第聽其所便從之五年三月趙挺之言湟鄯之復歲費朝廷供億一千五百餘萬鄭僅初建官莊之議朝廷令會計其歲入凡五莊之入乃能支一莊之費蓋鄯湟乃西蕃之二小國湟州謂之邈川鄯州謂之青唐與河南本為三國其地濱河多沃壤昔三國分據時民之供輸於其國厚而又每族各有酋長以統領之皆衣食贍足取於所屬之民自朝廷收復以來名為使蕃民各占舊地以居其實屢更戰鬥殺戮竄逐所存無幾今兵將官帥臣知州多召閑民以居貪冒者或受金乃與之地又私取其羊馬駝畜然無一毫租賦供官若以昔輸於三國者百分之一入於縣官即湟州資費有餘矣帝深然之翌日知樞密院張康國入見力言不可使新民出租恐致擾動衆情且言蕃民既刺手背為兵安可更出租賦帝因宣諭新民不可搖動兼已令多招弓箭手矣挺之奏弓箭手官給以地而不出租此中國法也若蕃兵則其舊俗既輸納供億之物出戰又人皆為兵非弓箭手之比今朝廷所費不貲經營數年得此西蕃之地若無一毫之入而官吏戍卒饋餉之費皆出於朝廷何計之拙也帝曰已令姚雄經畫時累詔令雄括空閑地召人耕墾出課故深以挺之所奏為然挺之又云鄯湟之復羌人屢叛溪撦羅撒走降夏國夏國納之時時寇邊兵不解嚴而饋運極艱和糴入粟鄯州以每石價至七十貫湟州五十餘貫蓋倉場利於客人入中乞取而官吏利於請給斛斗中官獲利百倍人人皆富是以上下相蒙而為朝廷之害熙寧三年熙河運司以歲計不足乞以官茶博糴每茶三斤易粟一斛其利甚博朝廷謂茶馬司本以博馬不可以博糴於茶馬司歲額外增買川茶兩倍茶朝廷別出錢二百萬給之令提刑司封樁又令茶馬官程之邵兼領轉運使由是數歲邊用粗足及挺之再相熙河漕司屢申以軍糧不足為急乃令會去年拋降錢數共一千一百萬馱一馱價直三千至四十千二百馱所轉不可勝計今年已降撥銀錢絹等共九百萬乃令更支兩倍茶一百萬馱張康國同進呈得旨乃密檢元豐以來茶惟用博馬指揮以進然康國不知兩倍茶自非博馬之數而何執中鄧洵武雜然和之由是兩倍茶更不支給而鄯湟兵費不給矣七年詔邊地廣而耕墾未至膏腴荒閑芻粟翔踴歲糴本不貲昨累降指揮令涇原路經略司與提舉弓箭手司措置召人開墾以助塞下積粟為備邊無窮之利訪聞提舉弓箭手司與經略司執見不同措置議論不務和協其提舉涇原路弓箭手錢歸善可罷大觀三年二月臣僚言自復西寧州饋給每多而儲積未廣買價數增市物隨踴地利不闢兵籍不敷蓋招置之術失講勸利之法未興也乞委帥臣監司講求或募或招何為而可足弓箭手之數以期于不闕或拘或誘何為而使蕃部著業而責以耕耘田既墾則穀自盈募既充而兵益振是收班超之功盡充國之利也詔熙河洮岷前後收復歲月深久得其地而未得其利得其民而未得其用地利不闢兵籍不敷歲仰朝廷供億非持久之道可令詳究本末條畫來上政和三年秦鳳路經略安撫使何常奏自古行師用兵或騎或步率因地形兵法曰蕃兵惟勁馬奔衝漢兵惟強弩掎角蓋蕃長於馬漢長於弩也今則不然西賊有山間部落謂之步跋子者上下山坡出入谿澗最能踰高超遠輕足善走有平夏騎兵謂之鐵鷂子者百里而走千里而期最能倏往忽來若電擊雲飛每於平原馳騁之處遇敵則多用鐵鷂子以為衝冒奔突之兵山谷深險之處遇敵則多用步跋子以為擊刺掩襲之用此西人步騎之長也我諸路並塞之民皆是弓箭手地分平居以田獵騎射為能緩急以追逐馳騁相尚又沿邊土兵習於山川慣於馳驟關東戍卒多是硬弩手及摽牌手不惟扞賊勁矢亦可使賊馬驚潰此中國步騎之利也至道中王超丁罕等討繼遷是時馬上用弩遇賊則萬弩齊發賊不能措手足而遁又元豐間劉昌祚等趨靈州賊衆守隘官軍不能進於是用牌子為先鋒賊下馬臨官軍其勢甚盛昌祚等乃以牌子踢跳閃爍振以響環賊馬驚潰若遇賊於山林險隘之處先以牌子扞賊次以勁弓強弩與神臂弓射賊先鋒則矢不虛發而皆穿心達臆矣或遇賊於平原廣野之間則馬上用弩攢射可以一發而盡殪兼牌子與馬上用弩皆已試之效不可不講前所謂勁馬奔衝強弩掎角其利兩得之而賊之步跋子與鐵鷂子皆不足破也又步兵之中必先擇其魁健材力之卒皆用斬馬刀別以一將統之如唐李嗣業用陌刀法遇鐵鷂子衝突或掠我陣脚或踐踏我步人則用斬馬刀以進是取勝之一奇也詔樞密院劄與諸路經略司四年詔西羌久為邊患乍叛乍服譎詐不常頃在先朝使者在廷猶或犯境今植養積歲屢饑久困雖誓表已進羌夷之性不保其往修備禦於無事之時戒不虞於萃聚之際正在今日可令陝西河東路帥臣訓練兵伍除治軍器繕修樓櫓收積芻糧常若寇至不可謂已進誓表輒或弛怠墮其姦謀所有弓箭手蕃兵常令優恤逃亡者可速招補貧乏者亦令貸借將佐偏裨如或輭懦失職具名以聞或寇至失事並行軍法五年二月詔陝西河東逐路自紹聖開拓邊疆以來及西寧湟廓洮州積石等處新邊各有包占良田並合招置弓箭手以為邊防籬落至今累年曠土尚多應募人數未廣蓋緣自罷專置提舉官隸屬經略司事權不專頗失措置根括打量催督開墾理斷交侵等職事盡在極邊帥臣無由親到即今夏人通貢邊鄙安靜若不乘此委官往來督責多方招刺弓箭手墾闢閑田補助邊計以寬飛輓之勞竊慮因循寖久曠土愈多銷耗民兵人額有害邊防大計兼提舉文臣玩習翰墨多務安養罕能衝冒寒暑可令陝西河東逐路並復置提舉弓箭手司仍各選差武臣一員充理任請給恩數等並依提舉保甲條例施行每路各置幹當公事使臣二員仍每歲令樞密院取索逐路招到弓箭手并開墾過地土比較優劣殿最取旨黜陟合措置事節所差官條畫以聞八月樞密院言欲將近𩹉弓箭手地但有爭訟侵冒之處並行打量庶幾杜絕侵冒之弊從之是月提舉河東路弓箭手司奏本司體訪得沿邊州軍逐處招置弓箭手多將人戶舊用工開耕之地指射剗奪其舊佃人遂至失業且所出租僅比佃戶五分之一於公私俱不便今欲將係官莊屯田已有人租佃及五年者並不在招置弓箭手請射之限其河東路察訪司初不以邊防民兵為重姑息佃戶致有此弊欲乞應熙寧八年以前人戶租佃官田並先取問佃人如願投刺弓箭手每出一丁許依條給見佃田二頃五十畝充人馬地若不願充弓箭手及出丁外尚有請占不盡地土即拘收入官從之十一月邊防司奏據提舉熙河蘭湟路弓箭手何灌申漢人買田常多比緣打量其人亦不自安首陳已及一千餘頃若招弓箭手即可得五百人若納租稅每畝三斗五升草二束一歲間亦可得米三萬五千石草二十萬束今相度欲將漢人置買到蕃部土田願為弓箭手者兩頃已上刺一名四頃已上刺兩名如願者依條立定租稅輸納其巧為影占者重為禁止從之七年三月詔熙河鄯湟自開拓以來疆土雖廣而地利悉歸屬羌官兵吏祿仰給縣官不可為後計仰本路帥臣相度以錢糧茶綵或以羌人所嗜之物與之貿易田土田土既多即招置弓箭手入耕出戰以固邊圉宣和六年七月詔已降處分陝西昨因地震摧塌屋宇因而死傷弓箭手內合承襲人速具保明聞奏靖康元年二月臣僚言陝西恃弓箭手為國藩籬舊隸帥府比年始置提舉弓箭手官務取數多自以為功自是選練不精遂使法制寖壞欲乞詳酌罷提舉官以弓箭手復隸帥司務求以振邊聲詔從之河東路依此四月樞密院奏陝西河東逐路漢弓箭手自來並給肥饒田近年以來多將舊人已給田分擘招刺新人蓋緣提舉官貪賞欺蔽務要數多妄行招刺無以激勸朝廷近已罷提舉官今復隸帥司所轄況當今邊事全藉民兵若不早計深慮誤事詔令陝西五路制置使錢蓋及陝西河東逐路帥臣相度措置將已分擘弓箭手田土依舊改正撥還所有新招到人別行給地務要均濟仍仰帥臣嚴切奉行是月徐處仁又奏詔並送詳議司熙寧五年涇原路經略司蔡挺言涇原勇敢三百四十四人久不揀練徒有虛名臣委二將領季一點閱校其騎射能否升除補有功者以為隊長募極塞博軍子嘗歷戰陣者補其闕益募熟戶蕃部以為蕃勇敢凡一千三百八十人騎一千一百九十四匹挽弓一石馳逐擊刺如法其有功者受勇敢下等奉餘遇調發則人給奉三百益以芻糧詔諸路如挺言行之六年樞密院言勇敢効用皆以材武應募從軍廩食既優戰馬戎械之具皆出公上平時又得以家居以勞効賞者凡四補而至借職校弓箭手減十資淹速相遠甚非朝廷第功均賞之意請自今河東鄜延秦鳳環慶熙河路各以三百涇原路以五百為額第一等步射弓一石一斗馬射九斗奉錢千第二等以下遞減一斗奉七百至五百季首閱試於經略司射親及野戰中者有賞全不中者削其奉次季又不中者罷之戰有功者以八等定賞一給公據二以為隊長三守闕軍將四軍將五殿侍六三班借差七差使八借職其弓箭手有功亦以八等定賞一押官承局二將虞候十將三副兵馬使軍使四副指揮使五都虞候六都指揮使七三班差使八借職即以闕排連者次遷元豐三年詔涇原路募勇敢如鄜延路以百人為額自是以後蕃部益衆而弓箭手多蕃兵矣弓箭社河北舊有之熙寧三年十二月知定州滕甫言河北州縣近山谷處民間各有弓箭社及獵射人習慣便利與夷人無異欲乞下本道逐州縣並令募諸色公人及城郭鄉村百姓有武勇願習弓箭者自為之社每歲之春長吏就閱試之北人勁悍緩急可用從之元祐八年十一月知定州蘇軾言北邊久和河朔無事沿邊諸郡軍政少弛將驕卒惰緩急恐不可用武藝軍裝皆不逮陝西河東遠甚雖據即目邊防事勢三五年間必無警急然居安慮危有國之常備事不素講難以應變臣觀祖宗以來沿邊要害屯聚重兵止以壯國威而消敵謀蓋所謂先聲後實形格勢禁之道耳若進取深入交鋒兩陣猶當雜用禁旅至於平日保境備禦小寇即須專用極邊土人此古今不易之論也晁錯與漢文帝畫備邊策不過二事其一曰徙遠方以實空虛其二曰制邊縣以備敵國寶元慶曆中趙元昊反屯兵四十餘萬招刺宣毅保捷二十五萬人皆不得其用卒無成功范仲淹劉滬种世衡等專務整緝蕃漢熟戶弓箭手所以封殖其家砥礪其人者非一道藩籬既成賊來無所得故元昊復臣今河朔西路被邊州軍自澶淵講和以來百姓自相團結為弓箭社不論家業高下戶出一人又自相推擇家資武藝衆所服者為社頭社副錄事謂之頭目帶弓而鋤佩劍而樵出入山坂飲食長技與敵國同私立賞罰嚴於官府分番巡邏鋪屋相望若透漏北賊及本土強盜不獲其當番人皆有重罰遇其警急擊鼓頃刻可致千人器甲鞍馬常若寇至蓋親戚墳墓所在人自為戰敵深畏之先朝名臣帥定州者韓琦龐籍皆加意拊循其人以為爪牙耳目之用而籍又增損其約束賞罰熙寧六年行保甲法強壯弓箭社並行廢罷熙寧七年應兩地供輸人戶除元有弓箭社強壯并義勇之類並依舊存留外更不編排保甲看詳上件兩次聖旨除兩地供輸村分方許依舊置弓箭社其餘並合廢罷雖有上件指揮公私相承元不廢罷只是令弓箭社兩丁以上人戶兼充保甲以至逐捕本界及他盜賊並皆驅使弓箭社人戶用命捉殺見今州縣全藉此等寅夜防拓灼見弓箭社實為邊防要用其勢決不可廢但以兼充保甲之故召集追呼勞費失業今雖名目俱存責其實用不逮往日臣竊謂陝西河東弓箭手官給良田以備甲馬今河朔沿邊弓箭社皆是人戶祖業田產官無絲毫之損而捐軀捍邊器甲鞍馬與陝西河東無異苦樂相遠未盡其用近日霸州文安縣及真定府北砦皆有北賊驚劫人戶捕盜官吏拱手相視無如之何以驗禁軍弓手皆不得力向使州縣逐處皆有弓箭社人戶致命盡力則北賊豈敢輕犯邊砦如入無人之境臣已戒飭本路將吏申嚴賞罰加意拊循其人輒復拾用龐籍舊奏約束稍加增損別立條目欲乞朝廷立法少賜優異明設賞罰以示懲勸今已密切取會到本路極邊定保兩州安肅廣信順安三軍邊面七縣一砦內管自來團結弓箭社五百八十八社六百五十一火共計三萬一千四百一十一人若朝廷以為可行立法之後更敕將吏常加拊循使三萬餘人分番晝夜巡邏盜邊小寇來即擒獲不至狃以生戎心而事皆循舊無所改作敵不疑畏無由生事有利無害較然可見奏凡兩上皆不報政和六年詔河北路有弓箭社縣分已令解發異等其逐路縣令佐俟歲終教閱異等帥司具優劣之最各取旨賞罰以為勸沮仍具為令又高陽關路安撫司言大觀三年弓箭社人依保甲法政和保甲格較最優劣縣令各減展磨勘年有差詔依保甲格賞罰施行宣和七年二月臣僚言往年西路提刑梁揚祖奏請勸誘民戶充弓箭社繼下東路令倣西路例招誘原立法之意不過使鄉民自願入社者閱習武備為禦賊之具爾奈何邀功生事之人唯以入社之民衆多為功厚誣朝廷而斂怨于民督責州縣急於星火取五等之籍甲乙而次之家至戶到追胥迫脅悉驅之入社更無免者法始行於西路西路既已冒受厚賞於是東路憲司前後論列誕謾滋甚近者東路之奏數至二十四萬一千七百人武藝優長者一十一萬六千且云比之西路僅多一倍陛下灼知其不然雖命帥臣與廉訪使者覈實彼安肯以實聞乎今東路憲司官屬與登淄兩州當職官坐增秩者幾二十人而縣令佐不及焉不知出入阡陌間勸誘者誰歟此其誕謾可知矣審如所奏山東之寇何累月淹時未見殄滅哉則其所奏二十四萬與十一萬殆虛有名不足以捍賊明矣大抵因緣追擾民不堪其勞則老弱轉徙道路強壯起為盜賊此亦致寇之一端也近者仰煩陛下遣將出師授以方略又命近臣持詔撫諭至於發內庫之藏轉淮甸之粟以振給之寬免其稅租蕩宥其罪戾丁寧畕悉罔不曲盡方將歸伏田畝以為遷善遠罪之民詎可以其所甚病擾之邪且私有兵器在律之禁甚嚴三路保伍之法雖於農隙以講武事然猶事畢則兵器藏於官府今弓箭社一切兵器民皆自藏於家不幾於借寇哉望陛下斷自聖心罷京東弓箭社之名所藏兵器悉送之官使民得免非時追呼迫脅之擾以安其生應兩路緣弓箭社推恩者並追奪改正首議之人重賜黜責後來奏請誕謾亦乞特賜施行庶幾羣下悚懼不敢妄進曲說以肆其姦實今日之先務也詔並依奏梁揚祖落職兵器並拘入官弓箭社人依已降指揮放散
