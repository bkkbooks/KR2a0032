body:
  text: 宋史卷九十九志第五十二禮二吉禮二南郊南郊壇制梁及後唐郊壇皆在洛陽宋初始作壇於東都南薰門外四成十二陛三壝設燎壇於內壇之外丙地高一丈二尺設皇帝更衣大次於東壝東門之內道北南向仁宗天聖六年始築外壝周以短垣置靈星門親郊則立表於青城表三壝神宗熙寧七年詔中書門下參定青城殿宇門名先是每郊撰進至是始定名前門曰泰禋東偏門曰迎禧正東門曰祥曦正西門曰景曜後三門曰拱極內東側門曰夤明西側門曰肅成殿曰端誠殿前東西門曰左右嘉德便殿曰熙成後園門曰寶華著為定式元豐元年二月詔內壝之外衆星位周環每二步植一杙繚以青繩以為限域既而詳定奉祀禮文所言周官外祀皆有兆域後世因之稍增其制國朝郊壇率循唐舊雖儀注具載圜丘三壝每壝二十五步而有司乃以青繩代內壝誠不足以等神位序祀事嚴內外之限也伏請除去青繩為三壝之制從之徽宗政和三年詔有司討論壇壝之制十月禮制局言壇舊制四成一成二十丈再成十五丈三成十丈四成五丈成高八尺一寸十有二陛陛十有二級三壝二十五步古所謂地上圜丘澤中方丘皆因地形之自然王者建國或無自然之丘則於郊澤吉土以兆壇位為壇之制當用陽數今定為壇三成一成用九九之數廣八十一丈再成用六九之數廣五十四丈三成用三九之數廣二十七丈每成高二十七尺三成總二百七十有六乾之策也為三壝壝三十六步亦乾之策也成與壝俱三參天地之數也詔行之建炎二年高宗至揚州庶事草創築壇於州南門內江都縣之東南詔東京所屬官吏奉祭器大樂儀仗法物赴行在所紹興十三年太常寺言國朝圓壇在國之東南壇側建青城齋宮以備郊宿今宜於臨安府行宮東南修建於是遂詔臨安府及殿前司修建圓壇第一成縱廣七丈第二成縱廣一十二丈第三成縱廣一十七丈第四成縱廣二十二丈一十二陛每陛七十二級每成一十二綴三壝第一壝去壇二十五步中壝去內壝外壝去中壝各半之燎壇方一丈高一丈二尺開上南出戶方六尺三出陛在壇南二十步丙地其青城及望祭殿與行事陪祠官宿齋幕次並令絞縛更不修蓋先是張枃為京尹議築齋宮可一勞永逸宇文價曰陛下方經略河南今築青城是無中原也遂罷役神位元豐元年十一月詳定郊廟奉祀禮文所言按東漢壇位天神從祀者至千五百一十四故外設重營以為等限日月在中營內南道而北斗在北道之西至於五星中宮宿之屬則其位皆中營二十八宿外宮星之屬則其位皆外營然則為重營者所以等神位也唐因隋制設為三壝天神列位不出內壝而御位特設於壇下之東南若夫公卿分獻文武從祀與夫樂架饌幔則皆在中壝之內而大次之設乃在外壝然則為三壝者所以序祀事也景德三年鹵簿使王欽若言漢以五帝為天神之佐今在第一龕天皇大帝在第二龕與六甲嶽瀆之類接席帝座天市之尊今與二十八宿積薪騰蛇杵臼之類同在第三龕卑主尊臣甚未便也若以北極帝坐本非天帝蓋是天帝所居則北極在第二帝坐在第三亦高下未等又太微之次少左右執法子星之次少孫星望令司天監參驗乃詔禮儀使太常禮院司天監檢定之禮儀使趙安仁言按開寶通禮元氣廣大則稱昊天據遠視之蒼然則稱蒼天人之所尊莫過於帝託之於天故稱上帝天皇大帝即北辰耀魄寶也自是星中之尊易曰日月麗乎天百穀草木麗乎土又曰在天成象在地成形蓋明辰象非天草木非地是則天以蒼昊為體不入星辰之列又郊祀録壇第二等祀天皇大帝北斗天一太一紫微五帝坐差在行位前餘內官諸位及五星十二辰河漢都四十九坐齊列俱在十二陛之間唐建中間司天冬官正郭獻之奏天皇北極天一太一準天寶敕並合升第一等貞元二年親郊以太常議詔復從開元禮仍為定制郊祀録又云壇第三等有中宮天市垣帝坐等十七坐並在前開元禮義羅云帝有五坐一在紫微宮一在大角一在太微宮一在心一在天市垣即帝坐者非直指天帝也又得判司天監史序狀天皇大帝一星在紫微勾陳中其神曰耀魄寶即天皇是星五帝乃天帝也北極五星在紫微垣內居中一星曰北辰第一主月為太子第二主日為帝王第三為庶子第四為嫡子第五為天子之樞蓋北辰所主非一又非帝坐之比太微垣十星有左右執法上將次將之名不可備陳故總名太微垣星經舊載孫星而壇圖止有子星辨其尊卑不可同位竊惟壇圖舊制悉有明據天神定位難以躋升望依星經悉以舊禮為定欽若復言舊史天文志並云北極北辰最尊者又勾陳口中一星曰天皇大帝鄭玄注周禮謂禮天者冬至祭天皇於北極也後魏孝文禋六宗亦升天皇五帝上按晉天文志帝坐光而潤則天子吉威令行既名帝坐則為天子所占列于下位未見其可又安仁議以子孫二星不可同位陛下方洽高禖之慶以廣維城之基苟因前代闕文便為得禮實恐聖朝茂典尤未適中詔天皇北極特升第一龕又設孫星于子星位次帝坐如故欽若又言帝坐止三紫微太微者已列第二等唯天市一坐在第三等按晉志大角及心中星但云天王坐實與帝坐不類詔特升第二龕舊郊丘神位板皆有司題署命欽若改造之至是欽若奉板便殿壇上四位塗以朱漆金字餘皆黑漆第一等金字第二等黃字第三等以降朱字悉貯漆匣覆以黃縑帊帝降階觀之即付有司又以新定壇圖五帝五嶽中鎮河漢合在第三等四年判太常禮院孫奭言準禮冬至祀圜丘有司攝事以天神六百九十位從祀今惟有五方上帝及五人神十七位天皇大帝以下並不設位且太昊勾芒惟孟夏雩祀季秋大享及之今乃祀於冬至恐未協宜翰林學士朝迥等言按開寶通禮圜丘有司攝事祀昊天配帝五方帝日月五星中官外官衆星總六百八十七位雩祀大享昊天配帝五天帝五人帝五官總十七位方丘祭皇地祇配帝神州嶽鎮海瀆七十一位今司天監所設圜丘雩祀明堂方丘並七十位即是方丘有嶽瀆從祀圜丘無星辰而反以人帝從祀望如奭請以通禮及神位為定其有增益者如後敕從之政和三年議禮局上五禮新儀皇帝祀昊天上帝太史設神位版昊天上帝位于壇上北方南向席以秸太祖位于壇上東方西向席以蒲越天皇大帝五帝大明夜明北極九位于第一龕北斗太一帝坐五帝內坐五星十二辰河漢等內官神位五十有四于第二龕二十八宿等中官神位百五十有九于第三龕外官神位一百有六于內壝之內衆星三百有六十于內壝之外第一龕席以秸餘以莞席皆內向配位太祖乾德元年始有事於南郊自五代以來喪亂相繼典章制度多所散逸至是詔有司講求遺逸遵行典故以副寅恭之意是歲十一月十六日合祭天地于圜丘初有司議配享請以僖祖升配張昭獻議曰隋唐以前雖追立四廟或六七廟而無遍加帝號之文梁陳南郊祀天皇配以皇考北齊圜丘祀昊天以神武升配隋祀昊天於圜丘以皇考配唐貞觀初以高祖配圜丘梁太祖郊天以皇考烈祖配恭惟宣祖皇帝積纍勳伐肇基王業伏請奉以配享從之九年正月詔以四月幸西京有事於南郊自國初以來南郊四祭及感生帝皇地祇神州凡七祭並以四祖迭配太祖親郊者四並以宣祖配太宗即位其七祭但以宣祖太祖更配是歲親享天地始奉太祖升侑雍熙元年冬至親郊從禮儀使扈蒙之議復以宣祖配四年正月禮儀使蘇易簡言親祀圜丘以宣祖配此則符聖人大孝之道成嚴父配天之儀太祖皇帝光啓丕圖恭臨大寶以聖授聖傳於無窮按唐永徽中以高祖太宗同配上帝欲望將來親祀郊丘奉宣祖太祖同配其常祀祈穀神州明堂以宣祖崇配圜丘北郊雩祀以太祖崇配奏可真宗至道三年十一月有司言冬至圜丘孟夏雩祀夏至方丘請奉太宗配上辛祈穀季秋明堂奉太祖配上辛祀感生帝孟冬祭神州地祇奉宣祖配其親郊奉太祖太宗並配詔可乾興元年真宗崩詔禮官定遷郊祀配帝乃請祈穀及祭神州地祇以太祖配雩祀及昊天上帝及皇地祇以太宗配感生帝以宣祖配明堂以真宗配親祀郊丘以太祖太宗配奏可景祐二年郊詔以太祖太宗真宗三廟萬世不遷南郊以太祖定配二宗迭配親祀皆侑常祀圜丘皇地祇配以太祖祈穀雩祀神州配以太宗感生帝明堂以宣祖真宗配如舊慶曆元年判太常寺呂公綽言歷代郊祀配位無側向真宗示輔臣封禪圖曰嘗見郊祀昊天上帝不以正坐蓋皇地祇次之今修登封上帝宜當子位太祖太宗配位宜比郊祀而斜置之其後有司不諭先帝以告成報功酌宜從變之意每郊儀範既引祥符側置之文又載西向北上之禮臨時擇一未嘗考定乃詔南郊祖宗之配並以東方西向為定皇祐五年郊詔自今圜丘三聖並侑嘉祐六年諫官楊畋論水災繇郊廟未順禮院亦言對越天地神無二主唐始用三祖同配後遂罷之皇祐初詔三聖並侑後復迭配未幾復並侑以為定制雖出孝思然頗違經典當時有司失於講求下兩制議翰林學士王圭等曰推尊以享帝義之至也然尊尊不可以瀆故郊無二主今三后並侑欲以致孝也而適所以瀆乎享帝非無以寧神也請如禮官議七年正月詔南郊以太祖定配高宗建炎二年車駕至揚州築壇於江都縣之東南是歲冬至祀昊天上帝以太祖配度宗咸淳二年將舉郊祀時復議以高宗參配吏部侍郎兼中書門下省檢正洪燾等議以為物無二本事無二初舜之郊嚳商之郊契周郊后稷皆所以推原其始也禮者所以別等差視儀則遠而尊者配於郊近而親者配於明堂明有等也臣等謂宜如紹興故事奉太宗配將來明堂遵用先皇帝彝典以高宗參侑庶於報本之禮奉先之孝為兩盡其至詔恭依儀注乾德元年八月禮儀使陶穀言饗廟郊天兩日行禮從祀官前七日皆合於尚書省受誓戒自來一日之內受兩處誓戒有虧虔潔今擬十一月十六日行郊禮望依禮文於八日先受從享太廟誓戒九日別受郊天誓戒其日請放朝參從之自後百官受誓戒於朝堂宗室受於太廟祭之日均用丑時秋夏以一刻春冬以七刻前二日遣官奏告配帝之室儀鸞司設大次小次及文武侍臣蕃客之次太常設樂位神位版位等事前一日司尊彝帥其屬以法陳祭器于堂東僕射禮部尚書視滌濯告潔禮部尚書侍郎省牲光祿卿奉牲告充告備禮部尚書視鼎鑊禮部侍郎視腥熟之節祭之旦光祿卿率其屬取籩豆簠簋實之及薦腥禮部尚書帥其屬薦籩豆簠簋戶部兵部工部尚書薦三牲之腥熟俎禮畢各徹而有司受之以出晡後郊社令帥其屬掃除御史按視之奏中嚴外辦以禮部侍郎請解嚴以禮部郎中贊者設亞終獻位於小次之南宗室位於其後設公卿位於亞終獻之南分獻官位於公卿之後執事者又在其後俱重行西向北上其致福也太牢以牛左肩臂臑折九箇少牢以羊左肩七箇犆豕以左肩五箇有司攝事進胙皆如禮太尉展視以授使者再拜稽首既享大宴號曰飲福自宰臣而下至應執事及樂工馭車馬人等並均給有差以為定式是歲十一月日至皇帝服袞冕執圭合祭天地于圜丘還御明德門樓肆赦仁宗天聖二年詔加真宗諡上謂輔臣曰郊祀重事朕欲就禁中習儀其令禮官草具以聞先郊三日奉諡册寶于太廟次日薦享玉清昭應景靈宮宿太廟既享赴青城至大次就更衣壇改服袞冕行事五年郊後擇日恭謝大禮使王曾請節廟樂帝曰三年一享不敢憚勞也三獻終增禮生七人各引本室太祝升殿徹豆三日又齋長春殿謝玉清昭應宮禮畢賀皇太后比籍田勞酒儀略如元會其恭謝云臣某虔遵舊典郊祀禮成中外協心不勝歡抃宣答曰皇帝德備孝恭禮成嚴配萬國稱頌歡豫增深帝再拜還內樞密使以下稱賀閣門使宣答樞密副使升殿侍立百官稱賀酒三行還內殿受命婦賀司賓自殿側幕次引內命婦於殿庭北向立尚儀奏請皇太后即御坐司賓贊再拜引班首升自西階稱封號妾某氏等言郊祀再舉福祚咸均凡在照臨不勝欣抃降再拜尚宮承旨降自東階稱皇太后聖旨又再拜司賓宣答曰已成巨禮歡豫良深皆再拜次外命婦賀如內命婦儀退皆赴別殿賀皇帝惟不致詞不宣答神宗元豐六年十一月二日帝將親郊奉仁宗英宗徽號册寶于太廟是日晚齋于大慶殿三日薦享于景靈宮齋于太廟四日朝享七室齋于南郊之青城五日冬至祀昊天上帝于圜丘以太祖配是日帝服鞾袍乘輦至大次有司請行禮服大裘被袞冕以出至壇中壝門外殿中監進大圭帝執以入宮架樂作至午階下版位西向立樂止禮儀使贊曰有司謹具請行事宮架奏景安之樂文舞作六成止帝再拜詣罍洗宮架樂作至洗南北向樂止帝搢圭盥帨訖樂作至壇下樂止升午階登歌樂作至壇上樂止殿中監進鎮圭嘉安樂作詣上帝神坐前北向跪奠鎮圭於繅藉執大圭俯伏興搢圭跪三上香奠玉幣執圭俯伏興再拜內侍舉鎮圭授殿中監樂止廣安樂作詣太祖神坐前東向奠圭幣如上帝儀登歌樂作帝降壇樂止宮架樂作還位西向立樂止禮部尚書戶部尚書以下奉饌俎宮架豐安樂作奉奠訖樂止再詣罍洗帝搢大圭盥帨洗爵拭爵訖執大圭宮架樂作至壇下樂止升自午階登歌樂作至壇上樂止登歌禧安樂作詣上帝神坐前搢圭跪執爵祭酒三奠訖執圭俯伏興樂止太祝讀册帝再拜訖樂作次詣太祖神坐前如前儀登歌樂作帝降自午階樂止宮架樂作還位西向立樂止文舞退武舞進宮架正安之樂作樂止亞獻盥帨訖正安樂作禮畢樂止終獻行禮並如上儀獻畢宮架樂作帝升自午階樂止登歌樂作至飲福位樂止禧安樂作帝再拜搢圭跪受爵祭酒三啐酒奠爵受俎奠俎受摶黍豆再受爵飲福訖奠爵執圭俯伏興再拜樂作帝降還位如前儀禮部戶部尚書徹俎豆禮直官曰賜胙行事陪祀官再拜宮架宴安樂作一成止宮架樂作帝詣望燎位南向立樂止禮直官曰可燎俟火燎半柴禮儀使跪奏禮畢宮架樂作帝出中壝門殿中監受大圭歸大次樂止有司奏解嚴帝乘輿還青城百官稱賀於端誠殿有司轉仗衛奏中嚴外辦帝服通天冠絳紗袍乘輿以出至玉輅所侍中跪請降輿升輅帝升輅門下侍郎奏請進行又奏請少駐宣侍臣乘馬將至宣德門奏采薺一曲入門樂止侍中請降輅赴幄次有司奏解嚴帝常服乘輿御宣德門肆赦羣臣稱賀如常儀初淳化三年將以冬至郊前十日皇子許王薨有司言王薨在未受誓戒之前準禮天地社稷之祀不廢詔下尚書省議吏部尚書宋琪等奏以許王薨謝去郊禮裁十日又詔輟十一日以後五日朝參且至尊成服百僚皆當入慰有司又以十二十三日受誓戒按令式受誓戒後不得弔喪問疾今若皇帝既輟朝而未成服則全爽禮文百僚既受誓而入奉慰又違令式況許王地居藩戚望著親賢於昆仲為大宗於朝廷為冢嗣遽茲薨逝朝野同哀伏想聖情豈勝追念當愁慘之際行對越之儀臣等實慮上帝之弗歆下民之斯惑況祭天之禮歲有四焉載於禮經非有差降請以來年正月上辛合祭天地從之神宗之嗣位也英宗之喪未除是歲當郊帝以為疑以問講讀官王圭司馬光王安石皆對以不當廢圭又謂喪三年不祭惟祭天地社稷為越紼而行事傳謂不敢以卑廢尊也景德二年真宗居明德太后之喪即易月而服除明年遂享太廟而合祀天地於圜丘請冬至行郊廟之禮其服冕車輅儀物音樂緣神事者皆不可廢詔用景德故事惟郊廟及景靈宮禮神用樂鹵簿鼓吹及樓前宮架諸軍音樂皆備而不作警場止鳴金鉦鼓角仍罷諸軍呈閲騎隊故事齋宿必御樓警嚴幸後苑觀花作水戲至是悉罷之有司言故事當謁謝於祖宗神御殿獻享月吉禮以禮官攝詔遣輔臣仍罷詣佛寺是後國有故皆遣輔臣高宗紹興十二年臣僚言自南巡以來三歲之祀獨於明堂而郊天之禮未舉來歲乞行大禮詔建圜壇於臨安府行宮東城之外自是凡六郊焉孝宗隆興二年詔曰朕恭覽國史太祖乾德詔書有云務從省約無至勞煩仰見事天之誠愛民之仁所以垂萬世之統者在是今歲郊見可令有司除禮物軍賞其餘並從省約初降詔以十一月行事以冬至適在晦日以至道典故改用獻歲上辛遂改來年元為乾道乃以正月一日有事南郊禮成進胙于德壽宮以牛腥體肩三臂上臑二導駕官自端誠殿簪花從駕至德壽宮上壽飲福稱賀陳設儀注並同上壽禮皇帝致詞曰皇帝臣某言享帝合宮受天純嘏臣某與百僚不勝大慶謹上千萬歲壽自後郊祀明堂進胙飲福並如上儀光宗紹熙二年十一月郊以值雨行禮于望祭殿帝遂感疾理宗四十一年一郊而已度宗咸淳二年權工部尚書趙汝暨等奏今歲大禮正在先帝大祥之後臣等竊惟帝王受命郊見天地不可緩也古者有改元即郊不用前郊三年為計況今適在當郊之歲既踰大祥之期圜丘之祀豈容不舉於是降禮以十一月十七日款謁南郊適太史院言十六日太陰交蝕遂改來年正月一日南郊行禮太常寺言皇帝既已從吉請依儀用樂其十二月二十九日朝獻景靈宮三十日朝享太廟尚在禫制之內所有迎神奠幣酌獻送神作樂外其盥洗升降行步等樂備而不作
