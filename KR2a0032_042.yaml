body:
  text: 宋史卷四十二本紀第四十二理宗二端平二年正月丁酉太陰行犯太白甲寅詔議胡瑗孫明復邵雍歐陽修周敦頤司馬光蘇軾張載程皓程頤等十人從祀孔子廟庭升孔伋十哲丙辰詔主管侍衛馬軍孟珙黃州駐劄措置邊防丁巳孟珙入見辛酉以御前寧淮軍統制借和州防禦使程芾為大元通好使從義郎王全副之尋以武功郎杜顯為添差通好副使二月甲子朔日當虧不虧癸酉歲星守氐壬午太白填星合于胃三月乙未詔太學生陳均編宋長編綱目進士陳文蔚著尚書解並補迪功郎丁酉楊谷楊石並升太師尋辭免乙巳曾從龍兼同知樞密院事真德秀參知政事兼給事中兼侍讀陳卓同簽書樞密院事夏四月甲子詔前四川制置鄭損城池失守且盜陝西五路府庫財巨萬削官二秩謫居溫州簿録其家丁卯都城火丁亥太白晝見戊子大閲有流星大如太白五月乙未雨雹軍民交鬨御前諸軍都統制趙勝削三秩罷命韓昱代之丙申大雨雹甲辰真德秀薨贈銀青光祿大夫諡文忠庚戌以喬行簡兼參知政事六月壬申太陰入氐戊寅以鄭清之為特進左丞相兼樞密使喬行簡金紫光祿大夫右丞相兼樞密使己卯葛洪資政殿大學士豫祠祿庚辰流星晝隕祈雨壬午以曾從龍知樞密院事兼參知政事崔與之參知政事鄭性之同知樞密院事陳卓簽書樞密院事賜進士吳叔告以下四百五十四人及第出身有差己丑熒惑入太微垣庚寅詔鄭損更削兩秩竄南劍州秋七月丁酉有流星大如太白戊戌太白經天辛丑流星晝隕丙午太白入東井庚申禮部尚書魏了翁上十事不報閏七月戊寅詔録開禧蜀難死事之臣大安知軍楊震仲孫忠孫補下州文學利州路常平幹官劉當可母王氏義不降曦投江而死追贈和義郡夫人當可與升官差除乙酉賜少師特進銀青光祿大夫趙方諡忠肅丙戌故保寧軍節度使魯國公安丙諡忠定丁亥全子才劉子澄坐唐州之役棄兵宵遁子才削二秩謫居衡州子澄削二秩謫居瑞州八月癸巳歲星入氐乙卯以太師趙汝愚配享寧宗廟庭仍圖像于昭勳崇德之閣丁巳太白犯太微垣右執法九月癸未崇國公主薨冬十月辛卯有流星大如太白己未填星犯畢歲星太白合于心十一月乙丑以曾從龍為樞密使督視江淮軍馬魏了翁同簽書樞密院事督視京湖軍馬鄭性之兼權參知政事戊辰詔兩督府各給金千兩銀五萬兩度牒千緡錢五百萬為隨軍資臺臣李鳴復論曾從龍魏了翁督府事不允戊子安南國貢方物十二月庚寅曾從龍六疏乞寢樞密使命依舊知樞密院事督視江淮軍馬詔許辭樞密使以魏了翁兼督視江淮軍馬癸巳四川制置司遣將斬叛軍首賊蒲世興於萬州己亥填星守天街星庚子詔官告院製修武郎以下告身給督視府太陰入井壬寅魏了翁陛辭詔事干機速許便宜行之吳潛樞密都承旨督府參謀官趙善瀚馬光祖督府參議官甲辰曾從龍薨贈少師余嶸同簽書樞密院事庚戌故參知政事李壁諡文懿辛亥雷三年春正月己未朔以星行失度雷發非時罷天基節宴詔勸農桑賜安南國王封爵襲衣金帶丁卯填星犯畢壬申大元兵連攻洪山張順翁大成等以兵捍禦之二月甲午詔以大元兵攻江陵統制李復明奮勇戰沒其贈三秩仍官其二子死傷士卒趣具姓名來上壬寅詔侍從臺諫給舍條具邊防事宜甲辰起居郎吳泳上疏論淮蜀京襄捍禦十事不報詔魏了翁依舊端明殿學士簽書樞密院事其速赴闕詔史嵩之淮西制置使兼副使辛亥日暈周匝甲寅左曹郎官趙以夫上備邊十策三月乙亥吳潛赴闕是月襄陽北軍主將王旻李伯淵焚城郭倉庫相繼降北時城中官民兵四萬七千有奇其財粟三十萬軍器二十四庫皆亡金銀鹽鈔不與焉南軍主將李虎乘火縱掠襄陽為空制置使趙范坐失撫御致南北軍交爭造亂詔削官三秩落龍圖閣學士姑仍制置職任階岷疊宕十八族降有諜者以檄招曹友聞軍降友聞斬之以聞夏四月丙申太陰入太微垣己酉魏了翁乞歸田里詔不允以資政殿學士知潭州癸丑詔悔開邊責己其京湖興沔州軍縣鎮見繫囚情理輕者釋之五月戊寅提舉萬壽觀洪咨夔依舊兼侍讀己卯有流星出心大如太白辛巳太陰入畢甲申趙葵華文閣直學士淮東安撫制置使兼知揚州六月丁亥流星夕隕己亥洪咨夔卒詔與執政恩例贈二秩諡忠文癸卯熒惑填星合于畢丙午熒惑犯填星庚戌大雨雹秋七月丁巳祈晴詔權徐州國安用力戰而歿已贈順昌軍節度使仍官其子國興承節郎庚申以趙范失襄城罪重罰輕詔罷職奉祠辛酉太陰入氐丁卯以鄭性之參知政事李鳴復簽書樞密院事戊辰監察御史杜範吳昌裔以言事不報上疏乞罷官詔改授範太常少卿昌裔太常卿庚午熒惑入井戊寅太陰入東井甲申雨血八月丙戌詔趙范更削兩秩謫居建寧府李虎削三秩落刺史罷御器械各令任責捍禦自效癸卯詔前龍圖閣學士光祿大夫贈開府儀同三司傅伯成諡忠簡九月庚申太白歲星合于尾庚午雷辛未祀明堂大赦雷雨乙亥左丞相兼樞密使鄭清之罷為觀文殿大學士醴泉觀使兼侍讀右丞相兼樞密使喬行簡罷為觀文殿大學士醴泉觀使兼侍讀以崔與之為右丞相兼樞密使壬午驍衛大將軍利州駐劄御前諸軍統制曹友聞與大元兵大戰于大安軍陽平關兵敗死之詔贈龍圖閣學士大中大夫諡毅節立廟曰褒忠官其二子承務郎冬十月乙酉詔殿前司將胡斌曩死邵武之寇贈武節大夫有司為立後授官因舊廟賜額宗室師檟死尤溪之戰贈武節郎官其一子進義校尉立廟林嶺甲午詔沿江制置使陳韡應援淮東授淮西制置使兼沿江制置副使史嵩之應援江陵峽州江面上流壬寅大元兵破固始縣淮西將呂文信杜林率潰兵數萬叛六安霍丘皆為羣盜所據丙午安南國貢方物詔授金紫光祿大夫靜海軍節度觀察等使賜襲衣金銀帶大元太子闊端兵離成都大元兵破文州守臣劉鋭通判趙汝嚮死之十一月戊午詔嗣秀王師彌授少師丙寅以喬行簡為特進左丞相兼樞密使封肅國公大元兵圍光州詔史嵩之援光趙葵援合肥陳韡遏和州為淮西聲援戊辰魏了翁依舊資政殿學士知紹興府浙東安撫使吳潛袁甫徐清叟赴闕壬申詔侍從兩省臺諫卿監宰掾樞屬郎官鈐轄各陳防邊方略甲戌太陰入太微垣戊寅復成都府十二月戊戌以吳淵戶部侍郎淮東總領財賦兼知鎮江府壬寅詔改明年為嘉熙元年癸卯鄭清之辭免觀文殿大學士醴泉觀使兼侍讀詔仍舊觀文殿大學士提舉洞霄宮丁未宣繒薨以定策功贈太師諡忠靖甲寅池州都統趙邦永以援滁州功詔邦永轉左武大夫其餘立功將士具等第姓名推賞嘉熙元年春正月乙卯以魏了翁知福州兼福建安撫使丁巳詔京西兵馬都監隨州駐劄程再暹官三轉帶行閣門宣贊舍人京西鈐轄兼知隨州賞其洪山戰功餘有功將士趣以名上辛酉以李同知樞密院事四川宣撫使甲子詔兩淮荊襄之民避地江南沿江州縣間有招集振恤尚慮恩惠不周流離失所江陰鎮江建寧太平池江興國鄂嶽江陵境內流民其計口給米期十日竣事以聞癸酉熒惑守鬼宿壬午流星大如太白二月癸未朔以鄭性之知樞密院事兼參知政事鄒應龍端明殿學士簽書樞密院事李宗勉同簽書樞密院事李鳴復罷以資政殿學士知紹興府乙酉葛洪薨壬寅雨雹丙申詔忠義選鋒張順屈伸等以舟師戰公安縣之巴芒有功各官一轉餘推恩有差癸卯詔以朱熹通鑑綱目下國子監並進經筵己酉太白晝見日暈周匝三月癸亥日生背氣己巳詔陳韡史嵩之趙葵各官兩轉乙亥魏了翁薨贈少師賜諡文靖以孟珙為忠州團練使知江陵府京西湖北安撫副使別之傑寶章閣待制知太平州夏四月壬午朔以李同知樞密院事四川宣撫使知成都府壬辰弟貴謙保康軍節度使仍奉朝請進封天水郡開國侯加食邑與芮武康軍節度使提舉萬壽觀仍奉朝請進封開國子丙申詔兩淮策應軍戰宣化兩軍殺傷相當陳亡將校李仙王海李雄廖雷各贈武翼大夫餘贈官有差庚子熒惑犯權星丙午詔沔州諸鎮將帥昨以大元兵壓境皆棄官遁夔路鈐轄知恩州田興隆獨自大安德勝堡至潼川逆戰數合雖兵寡不敵而忠節可尚特與官一轉五月丙辰袁韶薨太陰犯熒惑壬申京城大火丙子熒惑犯將星六月壬辰詔賞蘄州都統制萬文勝知州徐石函守城之功將士在行間者論功補官有差癸巳以鄒應龍為資政殿學士知慶元府沿海制置使乙未太白填星合于井甲辰祈雨丙午以吳潛為工部侍郎知慶元府兼沿海制置使知黃州兼淮西安撫使本路提刑李壽朋被命三月不即便途之官遂還私舍詔削三秩送建昌軍居住詔建內小學擇宗子十歲以下資質美者二三人置師教之秋七月壬子湖北提舉董槐朝辭奏楮幣物價重輕之弊己未樞密院言大元兵自光州信陽抵合肥制司參議官李曾伯廬州守臣趙勝都統王福戰守俱有勞效詔曾伯等十一人各官一轉辛酉太陰犯歲星填星入井庚午歲星守建星壬申日生背氣癸酉太陰入井八月甲申太師秦國公汝愚追封福王乙酉填星犯井癸巳以李鳴復參知政事李宗勉簽書樞密院事甲辰詔蜀雞冠隘都統王宣戰歿其總管吳桂棄所守走又縱部伍剽劫削三官勒停九月壬子填星留于井癸丑有流星出七公西星至濁沒丁巳雷冬十月戊戌有流星大如桃十一月戊辰詔陳韡史嵩之趙葵於沿江淮漢州軍備舟師戰具防遏衝要堡隘辛未太史言十二月朔日食將既日與金木水火四星俱纏于斗詔損膳避朝庶圖消弭其令有司檢會故實以聞十二月戊寅朔日有食之二年春正月戊申朔詔令侍從臺諫卿監郎官帥臣監司前宰執侍從舉曉暢兵財各二人三衙諸軍統制舉將材二人己未詔史嵩之趙葵應援黃州安豐其立功將士等第亟具名以聞光州信陽二城共圖克復辛酉詔史嵩之進端明殿學士視執政恩數趙葵刑部尚書制置並如舊余玠知招信軍兼淮東制置司參議官進三秩孟珙寧遠軍承宣使依舊帶御器械史嵩之端明殿學士依舊京湖安撫制置使兼沿江制置副使兼知鄂州召赴闕甲子兩浙轉運判官王野察訪江面還進對劾吳潛知平江府不法厲民數事詔野直華文閣知建寧府二月甲申大理少卿朱揚祖充押伴使借章服金魚庚寅詔史嵩之以參知政事督視京西荊湖南北路江西軍馬置司鄂州癸巳大宗正丞賈似道奏言北使將至地界名稱歲例宜有成説又奏裕財之道莫急於去贓吏藝祖治贓吏杖殺朝堂孝宗真決刺面今日行之則財自裕戊戌詔近覽李奏知蜀漸次收復然創殘之餘綏撫為急宜施蕩宥之澤淮西被兵恩澤亦如之其降德音諭朕軫恤之意大元再遣王楫來辛丑楫還以朱揚祖充送伴使癸卯以孟珙為京湖安撫制置副使置司松滋縣三月己丑命將作監周次説為大元通好使壬子以李心傳為祕書少監史館修撰修高宗孝宗光宗寧宗四朝國史實録癸丑以高定子為中書舍人京湖江西督視參贊軍事庚申詔史嵩之兼督視光蘄黃夔施州軍馬戊辰發行都會子二百萬並湖廣九百萬下都督參政行府犒師乙亥詔四川被兵州軍府縣鎮並轉輸勞役之所見禁囚人情理輕者釋之詔四川帥臣招集流民復業給種與牛優與振贍夏四月癸未以李同簽書樞密院事督視江淮京湖軍馬己酉雨土太陰入太微垣閏月丁未太陰入井甲子有流星大如太白壬申賜禮部進士周坦以下四百二十二人及第出身有差五月辛巳太白晝見癸未以李鳴復知樞密院事李宗勉參知政事余天錫簽書樞密院事甲申喬行簡請以兵事委李