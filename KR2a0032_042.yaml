伯程皓河南伯程頤伊陽伯丁未太陰入氐戊申幸太學謁孔子遂御崇化堂命祭酒曹觱講禮記大學篇監學官各進一秩諸生推恩錫帛有差製道統十三贊就賜國子監宣示諸生二月戊寅日生暈壬午喬行簡薨諡文惠夏四月丁丑詔以與芮為開府儀同三司萬壽觀使嗣榮王貴謙開府儀同三司嗣沂王辛巳以賈似道為太府少卿湖廣總領財賦五月庚寅以少師保寧軍節度使判大宗正事嗣秀王師彌為太子少保奉國軍節度使充萬壽觀使師貢為少師己亥詔沿江淮西制置使別之傑任責邊防戊申賜禮部進士徐儼夫以下三百六十七人及第出身有差六月庚申太白晝見螟癸酉有流星大如太白己卯流星晝隕丙戌熒惑入氐秋七月壬辰祈雨八月辛巳楊石薨贈太師冬十月庚辰太白入氐十一月戊戌太白晝見己亥淮東提刑余玠以舟師解安豐之圍己巳太白經天晝見十二月丁卯余天錫薨贈太師賜諡忠惠丁丑侍御史金淵言彭大雅貪黷殘忍蜀人銜怨罪重罰輕乞更竄責詔除名贛州居住二年春正月甲申朔詔作新吏治戊戌右丞相史嵩之等進玉牒及中興四朝國史孝宗經武要略寧宗玉牒日曆會要實録二月甲戌以遊知紹興府浙東安撫使請祠祿詔提舉洞霄宮范鍾知樞密院事兼參知政事徐榮叟參知政事趙葵賜進士出身同知樞密院事別之傑簽書樞密院事三月戊子詔和州無為軍安慶府並聽沿江制置司節制詔今後州縣官有罪諸帥司毋輒加杖責夏四月甲寅白氣亘天壬申雨雹五月己亥淮東制置副使余玠進對戊申臺臣言知建寧府吳潛有三罪詔奪職罷新任己酉以趙葵為湖南安撫使知潭州六月壬子朔徐榮叟乞歸田里從之丁巳詔以余玠為四川宣諭使事干機速許同制臣共議措置先行後奏仍給金字符黃榜各十以備招撫丙寅以別之傑同知樞密院事兼權參知政事高定子簽書樞密院事杜範同簽書樞密院事是月盛夏積雨浙右大水丁丑歲星犯井秋七月辛巳朔常潤建康大水兩淮尤甚八月丁卯詔淮東先鋒馬軍鄧淳李海等揚州撻扒店之戰宣勞居多各官兩轉餘推恩有差九月庚辰朔日有食之己丑雷辛卯祀明堂大赦癸巳詔淮東忠勇軍統領王溫等二十四人戰天長縣東衆寡不敵皆沒於陳贈溫武翼大夫吉州刺史其子興國補保義郎更官其一子承信郎厚賜其家餘人恤典有差冬十月甲寅史嵩之進封永國公乙丑大元兵大入通州十一月辛卯詔諭兩淮節制李曾伯毋以通州被兵之故不安厥職其督勵諸將勉圖後功己亥日南至雷電交作詔避殿減膳求直言癸卯詔決中外繫囚十二月己未詔通州守臣杜霆兵至棄城弗守載其私帑渡江以遁遂致民被屠戮雖已奪三秩厥罰猶輕其追毀出身以來文字竄南雄州壬戌太白晝見癸亥大元兵連攻州帳前都統楊大全等水陸並進自卯至午戰十數合歿于行伍詔贈武節大夫眉州防禦使官其二子承節郎丙寅以孟珙為檢校少保依舊寧武軍節度使京湖安撫制置大使夔路策應大使余玠權資政殿學士湖南安撫大使兼知潭州趙葵資政殿大學士福建安撫使知福州三年春正月戊寅朔以高定子兼參知政事庚辰熒惑入氐乙未以李曾伯為華文閣待制依舊淮東西制置使知揚州杜杲敷文閣學士依舊沿江制置使知建康府董槐祕閣修撰依舊沿江制置副使知江州主管江西安撫司事辛丑詔安南國王陳日煚元賜功臣號特增守義二字二月乙丑以呂文德為福州觀察使侍衛馬軍副都指揮使總統兩淮出戰軍馬捍禦邊陲庚午以郢州推官黃從龍死節詔贈通直郎一子補下州文學三月丁丑朔日有食之夏四月癸丑左武衛中郎將濠州措置捍禦王烈閣門宣贊淮西路鈐王杰閣門祗候江東路鈐李季實往馬帥王鑑軍前議事遇大元兵戰死贈官仍各官其二子乙卯嘉定守臣程立之固守詔官一轉丙辰安豐軍統領陳友直以王家缸戰功與官兩轉壬申布衣王與之進所著周禮訂議補下州文學五月庚子詔施州創築郡城及關隘六十餘所本州將士及忠州戍卒執役三年者各補轉一官六月甲戌有流星大如太白出于氐秋七月丁亥詔海州屯駐借補保義郎申政密州之役先登陷陳後以戰沒特贈保義郎官其子進勇副尉太白入井壬辰四川制司言大元兵破大安軍忠義副總管楊世威堅守魚孔隘孤壘不降有特立之操可任責邊防詔以世威就知大安軍甲午日生格氣己亥太白經天晝見八月乙卯流星晝隕癸亥詔福州延祥荻蘆兩寨並置武濟水軍摘本州廂禁習水者充千五百人為額閏月丁丑四川總領余玠言知巴州向佺鈐轄談淵白土坪等戰有功詔佺等十八人各官三轉餘轉官有差其中創人各給緡錢百陳沒者趣上姓名贈恤其家太白犯權星壬寅太白填星合于翼九月壬申詔蠲高郵民耕荒田租冬十月丙戌太白入于氐十二月己丑史嵩之五請祠不允
