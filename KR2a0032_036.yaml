body:
  text: 宋史卷三十六本紀第三十六光宗光宗循道憲仁明功茂德溫文順武聖哲慈孝皇帝諱惇孝宗第三子也母曰成穆皇后郭氏紹興十七年九月乙丑生于藩邸二十年賜今名授右監門衛率府副率轉榮州刺史孝宗即位拜鎮洮軍節度使開府儀同三司封恭王及莊文太子薨孝宗以帝英武類己欲立為太子而以其非次遲之乾道六年七月太史奏木火合宿主册太子當有赦是時虞允文相因請蚤建儲二孝宗曰朕久有此意事亦素定但恐儲位既正人性易驕即自縱逸不勤於學浸有失德朕所以未建者更欲其練歷庶務通知古今庶無後悔爾七年正月丙子朔孝宗上兩宮尊號册寶禮成丞相允文復以請孝宗曰朕既立太子即令親王出鎮外藩卿宜討論前代典禮允文尋以聞二月癸丑乃立帝為皇太子慶王愷為雄武保寧軍節度使判寧國府進封魏王三月丁酉受皇太子册四月甲子命判臨安府尋領尹事帝之為恭王與講官商較前代時出意表講官自以為不及逮尹臨安究心民政周知情偽孝宗數稱之且語丞相趙雄曰太子資質甚美每遣人來問安朕必戒以留意問學淳熙十四年十月乙亥高宗崩十一月己亥百官大祥畢孝宗手詔皇太子可令參決庶務以內東門司為議事堂十五年二月戊戌帝始赴議事堂自是間日與輔臣公裳繫鞋相見內外除擢自館職部刺史以上乃以聞九月乙巳又詔每遇朝殿令皇太子侍立十一月丞相周必大乞去孝宗諭曰朕比年病倦欲傳位太子卿須少留會陳康伯家以紹興傳位御劄來上十二月壬申孝宗遣中使密持賜必大因令討論典禮既又密以禪意諭參知政事留正十六年正月辛亥兩府奏事孝宗諭以倦勤欲禪位皇太子退就休養以畢高宗三年之制因令必大進呈詔草二月壬戌孝宗吉服御紫宸殿行內禪禮應奉官以次稱賀內侍固請帝坐帝固辭內侍扶掖至七八乃微坐復興次丞相率百僚稱賀禮畢樞密院官升殿奏事帝立聽班退孝宗反喪服御後殿帝侍立尋登輦同詣重華宮帝還內即上尊號曰至尊壽皇聖帝皇后曰壽成皇后壽皇聖帝詔立帝元妃李氏為皇后甲子帝率羣臣朝重華宮大赦百官進秩一級優賞諸軍蠲公私逋負及郡縣淳熙十四年以前稅役丙寅帝率羣臣詣重華宮上尊號册寶以閣門舍人譙熙載薑特立並知閣門事庚午詔五日一朝重華宮辛未尊皇太后曰壽聖皇太后壬申詔內外臣僚陳時政闕失四方獻歌頌者勿受遣羅點等使金告即位癸酉詔戒敕將帥賜前宰執從官詔訪以得失乙亥詔兩省官詳定內外封章具要切者以聞遣諸葛廷瑞等使金弔祭丙子詔戒敕官吏己卯詔官吏贓罪顯著者重罰毋貸辛巳以生日為重明節丁亥詔百官輪對己丑詔編壽皇聖政庚寅詔中書舍人羅點具可為臺諫者點以葉適吳鎰孫逢吉張體仁馮震武鄭湜劉崇之沈清臣八人上之三月壬辰以周必大為少保留正轉正奉大夫丙申遣沈揆等使金賀即位詔侍從兩省臺諫各舉可任湖廣及四川總領者一人己亥子擴進封嘉王癸卯金遣王元德等來告哀戊申以壽皇却五日之朝詔自今月四朝重華宮甲寅以史浩為太師伯圭為少師少保士歆為少傅昭慶軍節度使士峴為少保戊午金遣張萬公等來致遺留物己未以左補闕薛叔似為將作監右拾遺許及之為軍器監拾遺補闕官自此罷詔東宮書籍並賜嘉王夏四月丙寅有事于太廟丁卯四川應起經總制錢存留三年代輸鹽酒重額癸酉姪抦進封許國公乙亥以兩浙犒賞酒庫隸諸州歲入六十五萬尋減三十萬戊寅金遣徒單鎰等來告即位以權兵部侍郎何淡為右諫議大夫丙戌有事于景靈宮五月甲午以王藺知樞密院事兼參知政事丙申周必大罷為觀文殿大學士判潭州常德府辰沅靖州大水入其郛丁酉詔丞相以下月一朝重華宮戊戌罷周必大判潭州之命許以舊官為醴泉觀使戊申以和義郡夫人黃氏為貴妃右丞相留正論知閣門事薑特立罷之閏月庚申朔詔內侍陳源許在外任便居住免郡縣淳熙十四年以前私負十五年以後輸息及本者亦蠲之壬戌以趙雄為寧武軍節度使開府儀同三司進封衛國公仍判江陵府庚午詔罷賣浙西常平官田癸酉詔季秋有事于明堂以高宗配丙子趙雄疾甚改判資州戊寅蠲郡縣第五等戶身丁錢及臨安第五等戶和買絹各一年仍出錢二十三萬緡振臨安貧民己卯階州大水入其郛壬午大理獄空乙酉御後殿慮囚六月庚寅鎮江大水入其郛癸卯詔自今臣僚奏請事涉改法者三省樞密院詳具以聞秋七月辛酉儒林郎倪恕等以封事可采遷官免文解有差戊辰遣謝深甫等賀金主生辰庚辰下詔恤刑八月甲午升恭州為重慶府丙申減兩浙月樁等錢歲二十五萬五千緡己亥王淮薨癸丑金遣溫迪罕肅等來賀即位九月癸亥金遣完顏守真等來賀重明節減紹興和買絹歲額四萬四千餘匹乙丑戒執政侍從臺諫毋移書以薦舉請託南劍州火降其守臣一官仍令優加振濟戊辰詔侍從各舉公正強敏之士嘗任守令及職事官材堪御史者一人甲戌詔監司帥守秩滿到闕薦所部廉吏一二人遣郭德麟等使金賀正旦冬十月庚子罷樞密院審察諸軍之制壬寅蠲楚州高郵盱眙軍民負常平米一萬四千餘石甲寅大閲十一月庚午詔改明年為紹熙元年復置嘉王府翊善以祕書郎黃裳為之乙亥詔陳源毋得輒入國門丁丑減江浙月樁錢額十六萬五千餘緡十二月壬子金遣裴滿餘慶等來賀明年正旦紹熙元年春正月丙辰朔帝率羣臣詣重華宮奉上壽聖皇太后至尊壽皇聖帝壽成皇后册寶壬申再蠲臨安府民身丁錢三年壬午何淡請置紹熙會計録詔何淡同戶部長二檢正都司稽考財賦出入之數以聞二月丁酉雨雹辛亥殿中侍御史劉光祖言道學非程氏私言乞定是非別邪正從之三月丁卯詔秀王襲封置園廟班安僖王諱録趙普後一人庚午以久雨釋杖以下囚夏四月乙酉詔兩淮措置流民己丑以伯圭為太保嗣秀王丁未殿中侍御史劉光祖以論帶御器械吳端罷戊申賜禮部進士余復以下五百三十有七人及第出身五月乙卯趙雄坐所舉以賄敗降封益川郡公削食邑一千戶己未出吳端為浙西馬步軍副總管丙寅修楚州城丙子太白晝見六月丁亥遣丘䥩等賀金主生辰丙申以上供等錢償廣州放免身丁錢數甲午御後殿慮囚秋七月癸丑詔秀王諸孫並授南班甲寅以葛邲參知政事給事中胡晉臣簽書樞密院事乙卯以留正為左丞相王藺樞密院使癸酉建秀王祠堂于行在八月辛卯立任子中銓人吏部簾試法己亥帝率羣臣上壽皇聖帝玉牒日曆于重華宮己酉詔造新曆九月丁巳金遣王翛等來賀重明節己未升劍州為隆慶府辛酉雷庚午遣蘇山等使金賀正旦冬十月丁酉詔內外諸軍自今毋置額外制領以下官丙午詔內外軍帥各薦所部有將才者庚戌詔諭郡縣吏奉法愛民十一月甲寅安南入貢壬戌潼川轉運判官王溉撙節漕計代輸井戶重額錢十六萬緡詔奬之十二月辛巳朔贈左千牛衛大將軍挺為保寧軍節度使壬午賜王倫諡曰節愍丙戌罷王藺樞密使戊子以葛邲知樞密院事胡晉臣參知政事兼同知樞密院事癸卯詔歲減廣東官賣鹽丙午金遣把德固等來賀明年正旦戊申浦城盜張海作亂詔提點刑獄豐誼捕之二年春正月庚戌朔命兩淮行義倉法壬子詔尊高宗為萬世不祧之廟庚申修六合城辛酉金主母徒單氏殂戊寅雷電雨雹二月庚辰朔大雨雪壬午遣宋之瑞等使金弔祭癸未名新曆曰會元甲申福建安撫使趙汝愚等以盜發所部與守臣監司各降秩一等縣令追停乙酉詔以陰陽失時雷雪交作令侍從臺諫兩省卿監郎官館職各具時政闕失以聞出米五萬石賑京城貧民權罷修皇后家廟辛卯布衣余古上書極諫帝怒詔送筠州學聽讀丁未金遣完顏等來告哀三月丙辰詔監司郡守互送以贓論丁巳詔自今邊事令宰相與樞密院議仍同簽書丙寅詔福建提點刑嶽陳公亮知漳州朱熹同措置漳泉汀三州經界丁卯增廣州摧鋒軍三百人癸酉建寧府雨雹大如桃李壞民居五千餘家溫州大風雨雷雹田苗桑果蕩盡丙子出右司諫鄧馹夏四月乙酉從壽皇聖帝壽成皇后幸聚景園丙申詔侍從兩省臺諫及在外侍從之臣各舉所知嘗任監司郡守可充郎官卿監及資歷未深可充諸職事官者各三人辛丑徽州火二日乃滅五月己酉朔福州水辛亥詔六院官許輪對仍入雜壓庚申詔侍從經筵翰苑官自今並不時宣對庶廣咨詢以補治道戊辰金州大火己巳潼川崇慶二府大安石泉淮安三軍興利果合綿漢六州大水六月戊寅詔監司到任半年條上裕民事如郡守庚辰遣趙雍等賀金主生辰丁亥以伯圭判大宗正事癸巳詔宰臣執政自今不時內殿宣引奏事秋七月丁未朔詔故容州編管人高登追復元官仍贈承務郎己未出會子百萬緡收兩淮私鑄鐵錢乙丑復置太醫局己巳興州大水漂沒數千家八月戊寅何淡以本生繼母喪去官甲申寬兩浙榷鐵之禁九月壬子金遣完顏兗等來賀重明節召知福州趙汝愚為吏部尚書壬戌禁職田折變癸亥遣黃申等使金賀正旦乙丑以久雨命大理三衙臨安府及兩浙決繫囚釋杖以下己巳詔侍從於嘗任卿監郎官內選堪斷刑長二一二人以聞冬十月丙子朔詔罷經界丁丑築福州外城庚辰減百官大禮賜物三之一甲申復吳端帶御器械辛卯詔守令毋征斂病民庚子下詔撫諭四川被水州軍十一月戊申安定郡王子肜薨己巳册加高宗徽號曰受命中興全功至德聖神武文昭仁憲孝皇帝辛未有事于太廟皇后李氏殺黃貴妃以暴卒聞壬申合祭天地于圜丘以太祖太宗配大風雨不成禮而罷帝既聞貴妃薨又值此變震懼感疾罷稱賀肆赦不御樓壽皇聖帝及壽成皇后來視疾帝自是不視朝十二月庚辰築荊門軍城丁亥帝始對輔臣于內殿乙未增楚州更戍兵一千五百人庚子復出會子百萬緡收兩淮鐵錢辛丑金遣完顏宗璧等來賀明年正旦壬寅資簡普榮四州及富順監旱甲辰詔慶遠軍承宣使內侍省都知楊皓懷姦凶恣刺面杖脊配吉州和州防禦使內侍省押班黃邁私相朋附決杖編管撫州尋送皓撫州邁常州居住是歲建寧府汀州水階成西和鳳四州及淮東旱振之三年春正月乙巳朔帝有疾不視朝庚戌蠲秀州上供米四萬四千石歲蠲四川鹽酒重額錢九十萬緡出度僧牒二百收淮東鐵錢丁巳命夔路轉運使通融漕計糴米以備凶荒壬戌罷文州民雜役詔輔臣代行恭謝之禮二月甲戌朔復以兩浙犒賞酒庫隸戶部丁酉申嚴錢銀過淮之禁閏月丙午禁郡縣新作寺觀甲寅以王藺為端明殿學士四川安撫制置使藺辭不行壬戌詔州縣未斷之訟監司毋得移獄違者許執奏甲子成都府路轉運判官王溉以代民輸激賞等絹錢三十三萬緡詔進一官仍令再任詔賣郡縣沒官田屋及營田三月甲戌修天長縣城辛巳帝疾稍愈始御延和殿聽政以子濤為安定郡王甲申罷雅州稅場五築峽州城乙酉留正乞去位不許庚寅宜州蠻寇邊改知鬱林州沙世堅知宜州以討之辛卯復監司列薦法丁酉罷廣東增收鹽斤錢己亥詔技藝補授之人毋得奏補著為令庚子監察御史郭德麟以察事失體出為湖北提舉常平茶鹽夏四月癸卯補童子吳鋼官甲寅振四川旱傷郡縣乙卯以戶部侍郎丘䥩為煥章閣直學士四川安撫制置使戊午帝朝重華宮丁卯蠲臨安民元年二年逋賦五月帝有疾不視朝乙未命漢陽荊門軍復州行鐵錢己亥蠲四川水旱郡縣租賦仍以兩浙犒賞酒庫隸諸州令戶部郎官提領歲以四十五萬緡為額庚子晦常德府大水入其郛六月辛丑朔下詔戒飭風俗禁民奢侈與士為文浮靡吏苟且飾偽者以權禮部尚書陳騤同知樞密院事甲辰遣錢之望等賀金主生辰丁未罷四川諸軍歲起西兵廢光州定城監壬子慮囚戊午以伯圭為太師甲子增捕獲私鑄銅錢賞格丙寅以太尉郭師禹為少保秋七月己巳刺沿邊盜萬人為諸州禁軍壬申監文思院常良孫坐贓配海外益國公周必大坐繆舉良孫降榮陽郡公省廣西郡縣官甲戌台州水壬午瀘州騎射卒張信等作亂殺其帥臣張孝芳甲申軍士卞進張昌擊殺信增嘉王府講讀官二員壬辰修揚州城八月甲寅詔兩淮行鐵錢交子戊午總領四川財賦楊輔奏已蠲東西兩川畸零絹錢四十七萬緡激賞絹六萬六千匹詔奬之自是歲以為例九月甲戌修德安府外城乙亥金遣僕散端等來賀重明節戊子遣鄭汝諧等使金賀正旦丙申勸兩淮民種桑冬十月壬寅修大禹陵廟丙午修潭州城辛亥帝詣重華宮進香庚申會慶節丞相率百官詣重華宮拜表稱賀十一月壬申振襄陽府被水貧民癸酉減蘄州歲鑄錢二十萬緡丙戌日南至丞相率百官詣重華宮拜表稱賀兵部尚書羅點給事中尤袤中書舍人黃裳皆上疏請帝朝重華宮吏部尚書趙汝愚亦因面對以請帝開納辛卯帝朝重華宮皇后繼至都人大悅癸巳蠲湖南北京西江西郡縣月樁經總制錢歲二十三萬餘緡戊戌詔李純乃皇后親姪可特除閣門宣贊舍人十二月癸卯帝率羣臣上壽皇聖帝玉牒聖政會要于重華宮丙午蠲歸正人賦役三年辛亥以留正為少保乙丑金遣溫敦忠等來賀明年正旦是歲江東京西湖北水四年春正月己巳朔帝朝重華宮辛卯蠲臨安府民身丁錢三年二月戊戌朔詔陳源特與在京宮觀丙寅貸淮西民市牛錢出米七萬石振江陵飢民甲戌皇孫生三月丙子帝朝重華宮皇后從辛巳以葛邲為右丞相胡晉臣知樞密院事陳騤參知政事趙汝愚同知樞密院事甲申監察御史汪義端奏汝愚執政非祖宗故事請罷之疏三上不報辛卯義端罷癸巳帝從壽皇聖帝壽成皇后幸聚景園乙未修巢縣城夏四月己酉罷括賣四川沿邊郡縣官田五月丙寅朔復永州義保己巳賜禮部進士陳亮以下三百九十有六人及第出身進士李僑年五十四調成都司戶參軍自以祿不及養乞以一官回贈父母帝嘉其志特詔以本官致仕父母皆與初品官封丙子淮西大水丙戌紹興大水召浙東總管薑特立丞相留正以論特立不行乞罷相不報壬辰太尉利州安撫使吳挺卒四川制置使丘䥩承制以總領財賦楊輔權安撫使命統制官李世廣權管其軍六月丙申朔留正出城待罪振江浙兩淮荊湖被水貧民戊戌祕書省著作郎沈有開著作佐郎李唐卿祕書郎范黼彭龜年校書郎王奭正字蔡幼學顏棫吳獵項安世上疏乞寢薑特立召命己亥遣許及之等賀金主生辰壬寅詔市淮馬充沿江諸軍戰騎戊申胡晉臣薨己酉御後殿慮囚癸丑蠲臨安增民稅錢八萬餘緡甲寅太白晝見甲子雨雹秋七月乙丑朔太白晝見丙寅大雨雹己巳留正復論薑特立繳納出身以來文字待罪于范村丙子以不雨命諸路提刑審斷滯獄戊寅命臨安府及三衙決繫囚釋杖以下壬午以趙汝愚知樞密院事吏部尚書余端禮同知樞密院事陳源為內侍省押班癸未禁雍州左右兩江販鬻生口乙酉敘州夷賊沒該落無等寇邊遣兵討平之八月丙申蠲紹興丁鹽茶租錢八萬二千餘緡丁酉罷郡縣賣沒官田癸丑詔三省議振恤郡縣水旱丁巳贈吳挺少保其子曦落階官起復濠州團練使帶御器械戊午振江東浙西淮西旱傷貧民九月己巳金遣董師中等來賀重明節庚午重明節百官上壽侍從兩省請帝朝重華宮不聽己卯上壽聖皇太后尊號曰壽聖隆慈備福皇太后壬午遣倪思等使金賀正旦甲申帝將朝重華宮皇后止帝中書舍人陳傅良引裾力諫不聽戊子著作郎沈有開祕書郎彭龜年禮部侍郎倪思等咸上疏請朝重華宮冬十月丙午內教三衙諸軍己酉朝獻于景靈宮夜地震庚戌朝獻于景靈宮夜地又震壬子祕書省官請朝重華宮疏三上不報甲寅雨土工部尚書趙彥逾等上疏重華宮乞會慶聖節勿降旨免朝壽皇曰朕自秋涼以來思與皇帝相見卿等奏疏已令進御前矣明日會慶節帝以疾不果朝丞相葛邲率百官賀于重華宮侍從上章居家待罪詔不許嘉王府翊善黃裳上疏請誅內侍楊舜卿臺諫張叔椿章穎上疏乞罷黜戊午太學生汪安仁等二百一十八人上書請朝重華皆不報己未丞相以下奏事重華宮庚申帝將朝重華宮復以疾不果丞相以下上疏自劾請罷政彭龜年請逐陳源以謝天下皆不報十一月辛未日中有黑子壬申侍從兩省趙彥逾等十一人同班奏事癸酉太白晝見地生毛夜有赤雲白氣戊寅帝朝重華宮都人大悅遣右司郎官徐誼召留正于城外庚辰正始入朝復赴都堂視事命薑特立還故官日中黑子滅癸未帝率羣臣奉上皇太后册寶于慈福宮十二月戊戌帝朝重華宮壬寅右司諫章穎以地震請罷葛邲疏十餘上不報甲辰命沿邊守臣三年為任己酉詔監司帥守毋獨員薦士庚戌趙雄薨甲寅復四川鹽合同場舊法丁巳振江浙流民己未金遣完顏弼等來賀明年正旦五年春正月癸亥朔帝御大慶殿受羣臣朝遂朝重華宮次詣慈福宮行慶壽禮推恩如淳熙十年故事癸酉壽皇聖帝不豫丙子大理獄空癸未葛邲罷丙戌寬紹興民租稅二月乙未趙汝愚余端禮以奏除西帥不行居家待罪戊戌荊鄂諸軍都統制張詔為成州團練使興州諸軍都統制庚戌禁湖南江西遏糴三月癸亥合利州東西為一路己巳壽成皇后生辰免過宮上壽夏四月甲午帝幸玉津園皇后及後宮皆從乙未壽皇聖帝幸東園丙申史浩薨己亥朝獻于景靈宮壬寅以不雨命大理三衙臨安府及兩浙決繫囚釋杖以下癸卯雨土甲辰侍從入對請朝重華宮己酉太學生程肖説等以帝未朝移書大臣事聞帝將以癸丑日朝至期丞相以下入宮門以俟日昃帝復以疾不果出侍從館學官上疏乞罷黜居家待罪職事官請去待罪者百餘人詔不許丙辰侍講黃裳祕書少監孫逢吉等再上疏以請丁巳起居郎兼權中書舍人陳傅良請以親王執政或近上宗戚一人充重華宮使臺諫交章劾內侍陳源楊舜卿林億年離間兩宮請罷逐之五月辛酉朔辰州徭賊寇邊甲子侍從入對未得見宰執詣重華宮問疾不及引陳傅良繳上告敕出城待罪丁卯以壽皇聖帝疾棘命丞相以下分禱天地宗廟社稷戊辰丞相留正等請帝侍疾正引裾隨帝至福寧殿久之乃泣而出辛未丞相以下以所請不從求退帝命皆退於是丞相以下遂出城待罪知閣門事韓托胄請宣押入城許之追封史浩為會稽郡王乙亥帝將朝重華宮復不果戊寅以壽皇聖帝疾赦權刑部尚書京鏜入對請朝重華宮庚辰丞相以下詣重華宮問疾癸未起居舍人彭龜年叩頭請奏事詔令上殿乃請朝重華宮甲申從官列奏以請嘉王府翊善黃裳講讀官沈有開彭龜年奏乞令嘉王詣重華宮問疾許之王至重華宮壽皇為之感動丙戌權戶部侍郎袁説友入對請朝重華宮六月遣梁總等賀金主生辰戊戌夜壽皇聖帝崩遺誥改重華宮為慈福宮建壽成皇后殿於宮後以便定省以重華宮錢銀一百萬緡賜內外軍先是丞相留正知樞密院事趙汝愚參知政事陳騤同知樞密院事余端禮聞壽皇聖帝大漸見帝于後殿力請帝朝重華宮皇子嘉王亦泣以請不聽至是丞相正等聞壽皇聖帝崩乃率百官聽遺誥于重華宮己亥丞相以下上疏請詣重華成禮庚子遣薛叔似等使金告哀辛丑丞相率百官拜表請就喪次成服壬寅壽皇大斂皇子嘉王復入奏事詔俟疾愈過宮行禮丞相以下請皇太后垂簾聽政不許請代行祭尊禮許之仍有旨皇帝有疾聽就內中成服夜白氣亙天乙巳尊壽聖隆慈備福皇太后為太皇太后壽成皇后為皇太后己酉白氣亙天乙卯遣林湜等使金致遺留物秋七月辛酉丞相留正稱疾乞罷政遂逃歸初正等屢請立嘉王為皇太子帝許之正擬指揮以進奉御筆歷事歲久念欲退間正得之大懼乃謀退焉甲子太皇太后以皇帝疾未能執喪命皇子嘉王即皇帝位于重華宮之素幄尊皇帝為太上皇帝皇后為壽仁太上皇后移御泰安宮慶元元年十一月戊戌上尊號曰聖安壽仁太上皇帝六年八月庚寅太上皇帝不豫辛卯崩于壽康宮年五十有四十一月丙寅諡曰憲仁聖哲慈孝皇帝廟號光宗嘉泰三年十一月壬申加諡循道憲仁明功茂德溫文順武聖哲慈孝皇帝贊曰光宗幼有令聞嚮用儒雅逮其即位總權綱屏嬖幸薄賦緩刑見於紹熙初政宜若可取及夫宮闈妬悍內不能制驚憂致疾自是政治日昏孝養日怠而乾淳之業衰焉
