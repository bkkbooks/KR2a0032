body:
  text: 宋史卷三十本紀第三十高宗七十二年春正月癸卯罷樞密行府庚申孫近分司漳州居住二月丁丑加建國公瑗為檢校少保進封普安郡王己卯賜楊沂中名存中丙戌詔諸州修學宮辛卯蠲廣南東西路駱科殘擾州縣今年租鎮江太平池州蕪湖大火癸巳金主許歸梓宮及皇太后遣何鑄等還三月丙申臨安府火壬寅命普安郡王出就第朝朔望辛亥以士嘗營護岳飛為朋比責建州居住丙辰胡世將卒夏四月甲子朔遣孟忠厚為迎護梓宮禮儀使王次翁為奉迎兩宮禮儀使丁卯皇太后偕梓宮發五國城金遣完顏宗賢劉祹護送梓宮高居安護送皇太后庚午賜禮部進士陳誠之以下二百五十四人及第出身戊寅封韋淵平樂郡王辛巳皇后邢氏崩訃初至甲申增修臨安府學為太學五月甲午以鄭剛中為川陝宣撫副使乙未遣沈昭遠等賀金主生辰置淮西京西陝西諸路榷場丙午增築慈寧殿停給度僧牒乙卯復試教官法六月甲子命侍從臺諫禮官雜議權奉欑宮戊辰以万俟𪅂為欑宮按行使辛未責降王庶為嚮德軍節度副使道州安置壬午金國歸孟庾李正民甲申以吳璘為檢校少師階成岷鳳四州經略使秋七月壬辰朔福州簽判胡銓除名新州編管丁酉上皇后謚曰懿節祔神主于別廟己亥以何鑄權參知政事己酉始製常行儀仗及造玉輅乙卯蠲廣南湖北沿邊州軍免行錢八月辛酉朔兀朮使來求商州及和尚方山二原丙寅何鑄罷甲戌以万俟𪅂參知政事充金國報謝使壬午皇太后至入居慈寧宮己丑帝易緦服奉迎徽宗及顯肅懿節二后梓宮至奉安于龍德別宮是月鄭剛中分畫陝西地界割商秦之半畀金國存上津豐陽天水三縣及隴西成紀餘地棄和尚方山二原以大散關為界九月乙未以孟忠厚為樞密使充欑宮總護使壬寅大赦乙巳加秦檜太師封魏國公丙午金使劉筈完顏宗表等九人入見戊申以王次翁等充金國報謝使藏金國誓書于內侍省辛亥加張中孚開府儀同三司中彥靖海軍節度使甲寅杖殺偽福國長公主李善靜以知金州郭浩為金房開達四州經略安撫使始遣楊愿使金賀正旦冬十月乙丑始聽中外用樂丙寅權欑徽宗皇帝及顯肅皇后于會稽永固陵懿節皇后祔乙亥以翰林學士程克俊簽書樞密院事權參知政事丁丑以皇太后回鑾推恩進封秦檜為秦魏兩國公辭不拜庚辰以何鑄黨援岳飛不主和議責授祕書少監徽州居住甲申皇太后生辰上壽于慈寧宮丁亥置福建路提舉茶事司十一月癸巳樞密使張俊罷進封清河郡王以左司郎中李椿年為兩浙轉運副使專治經界乙未加楊存中少保己亥禁貶謫人私至行在庚子作崇政垂拱二殿辛丑劉光世薨壬寅曾祖姑秦魯國大長公主薨丙午尹焞卒庚戌孟忠厚罷左承事郎張戒坐黨趙鼎岳飛停官辛亥遣張中孚中彥還金國十二月甲子詔侍從監察御史已上監司郡守各舉所知宗室丙寅幸秦魯國大長公主第臨奠又幸劉光世第臨奠庚午命太學弟子員以三百人為額壬申秦檜上六曹寺監通用敕令格式癸酉以李顯忠為保信軍節度使御前選鋒軍統制王進為御前諸軍都統制是歲斷大辟二十四人十三年春正月戊戌加上徽宗謚曰體神合道駿烈遜功聖文仁德憲慈顯孝皇帝己亥親饗太廟奉上冊寶癸卯增建國子監太學乙巳復兼試進士經義詩賦二月壬戌初御前殿特引四參官起居甲子製郊廟社稷祭器乙丑更永固陵曰永祐丙寅封韓世忠咸安郡王乙亥蠲雷化等十州免行錢丙子造金象革木四輅庚辰立太學及科舉試法辛巳祕書少監秦熺修建炎以來日曆成乙酉建景靈宮奉安累朝神御三月己亥造鹵簿儀仗乙巳建社稷壇丙午築圜丘振淮南饑民仍禁遏糴夏四月癸亥頒鄉飲酒儀于郡國甲戌毀獄吏訊囚非法之具閏月己丑立貴妃吳氏為皇后戊申命史館編靖康建炎忠義錄庚戌楊政入見加檢校少保賜田五十頃壬子蠲諸路無名月樁錢乙卯王次翁罷五月甲子張九成坐黨趙鼎南安軍居住壬申置國子博士正錄乙亥命諸路置放生池丁丑天申節始上壽錫宴如故事六月壬戌禁三衙及諸軍市易月增將官供給錢有差壬寅程克俊罷以万俟𪅂兼權簽書樞密院事戊申詔諸路提刑歲舉部內廉明平恕獄官庚戌金遣洪皓張邵朱弁來歸秋七月甲子詔求遺書罷捕賊補官格丙寅處州兵士楊興等謀作亂事覺伏誅戊辰置諸州銅作務壬申雨雹蠲浙西貧民逋負丁鹽錢八月丙戌遣吏部侍郎江邈奉迎累朝神御于溫州丁亥命諸路有出身監司一員提舉學事戊戌洪皓至自金國入見己亥遣鄭朴等使金賀正旦王師心等賀金主生辰鄭剛中獻黃金萬兩辛丑復昌化萬安吉陽軍知階州田晟將所部三千人赴行在丁未以晟主管侍衞馬軍司公事其衆隸焉己酉加錢愐太尉庚戌詔監司守臣講求恤民事宜九月丁巳宗室子偁卒于秀州甲子洪皓出知饒州戊辰命諸路置敦宗院己巳詔淮東京西監司歲終上州縣所增戶口為守令殿最庚午以兵部侍郎司馬朴死節贈兵部尚書賜其家銀絹癸酉詔諸州守貳提舉學事縣令佐主管學事戊寅蠲淮南逋欠坊場錢及上供帛冬十月己丑秦檜上監學敕令格式庚寅製渾天儀乙未奉安累朝帝后神御于景靈宮十一月庚申日南至合祀天地于圜丘太祖太宗並配大赦十二月癸未朔日食雲陰不見辛卯毀私鑄毛錢癸巳建祕書省丁酉增太學弟子員二百己亥郭浩入見丁未命行在宗子入宮學己酉金遣完顏曄等來賀明年正旦是月始頒來歲曆于諸路監司守臣是歲關外初行營田十四年春正月丁巳遣羅汝楫等報謝金國甲子臨安府火戊寅命普安郡王為子偁解官持服二月丁亥復置靖州新民學癸巳蠲江浙諸路逋欠錢帛戊戌初命四川都轉運司歲撥總制司錢百七十三萬緡市紬絹綿輸于鄂州總領所丙午罷万俟𪅂定宗學生額為百員己酉以資政殿學士樓炤簽書樞密院事兼權參知政事加郭浩檢校少保三月乙卯蠲江浙京湖積欠上供錢米丁卯避金太祖嫌名改岷州為西和州川陝宣撫司為四川宣撫司己巳幸太學蠲汀漳泉建四州經賊殘蹂民戶賦役一年壬申解潛坐黨趙鼎責授濠州團練副使南安軍安置己卯詔舉賢良夏四月甲申詔刑部及監司決絕滯訟丁亥初禁野史虔州民析其屋朽柱中有文曰天下太平年甲午金人來求淮北人之在南者詔願者聽還遣馬軍司統領張守忠討海賊朱明五月丙辰詔階成西和鳳四州募兵赴行在甲子樓炤罷乙丑以御史中丞李文會簽書樞密院事兼權參知政事丙寅婺州大水己巳金始遣烏延和等來賀天申節辛未楚州鹽城縣海水清是月嚴信衢建四州水六月甲申蠲江浙州縣酒稅坊場綱運倉庫積年逋負孫近再奪三官移南安軍居住丁亥加高世則少保戊子安南國入貢癸巳宣州涇縣妖賊俞一作亂守臣捕滅之乙未振江浙福建被水之民丙申內侍白鄂坐誹謗及其客張伯麟俱黥配吉陽軍特贈子偁太子少師官給葬事庚子奪万俟𪅂三官歸州居住乙巳置國子監小學秋七月戊午金人殺王倫于河間府丙寅立明法科兼經法丙子幸祕書省八月癸未撫州獻瑞禾庚寅以李椿年權戶部侍郎仍治經界乙未遣林保使金賀正旦宋之才賀金主生辰九月辛酉分利州為東西路以吳璘為利州西路安撫使楊政利州東路安撫使甲子命郡守終更入見各舉所部縣令一人壬申趙鼎移吉陽軍安置癸酉命臨安府索蔡京子孫逮赴貶所遇赦永不量移冬十月甲午從右正言何若言請戒內外師儒之官黜伊川程氏之學乙未加韋淵少師己亥以永道郴三州桂陽監及茶陵縣民多不舉子永蠲其身丁錢絹米麥十一月甲子復內教即禁中閱試三衙將士癸酉李光移瓊州安置乙亥朱勝非薨十二月丁丑朔潼川府路轉運判官宋蒼舒獻嘉禾一莖九穗己卯命諸郡收養老疾貧乏之民復置漏澤園葬死而無歸者丁酉李文會罷尋責筠州居住庚子以御史中丞楊愿簽書樞密院事兼權參知政事癸卯金遣孛散溫等來賀明年正旦是月汀賊華齊寇漳州長泰縣安撫司遣兵捕之為所敗將佐趙成等死之是歲四川宣撫司始取民戶稱提錢歲四十萬緡以備軍費十五年春正月丁未朔御大慶殿初行大朝會禮戊申瀘南安撫使馮楫獻嘉禾己未分經義詩賦為兩科取士辛酉初置籍田丁卯減成都府路對糴米三之一宣撫司激賞錢三十萬緡戊辰命戶部侍郎王鈇措置兩浙經界辛未初命僧道納免丁錢二月戊寅增太學弟子員百人乙未詔州縣科折之數第五等戶毋或均配己亥封崇國公璩為恩平郡王出就第三月甲子遣敷文閣待制周襟馬觀國史愿諸將程師回馬欽白常皆還金國夏四月丙子朔賜秦檜第一區戊寅彗星出東方癸未避殿減膳命監司郡守條上便民事宜提刑巡行決獄賜禮部進士劉章以下三百人及第出身丁亥以彗出大赦癸巳彗沒甲午遣後軍統制張淵討捕福建盜賊庚子罷四川都轉運司五月丙辰客星見戊午命貧民產子賜義倉米一斛甲子金遣完顏宗尹等來賀天申節六月乙亥朔日有食之丁丑幸秦檜第乙酉加檜妻婦子孫官封丁亥客星沒秋七月戊申復置利州鑄錢監戊午命監司審察縣令治狀顯著及老懦不職者上其名以為黜陟蠲廬光二州上供錢米一年丁卯免汀漳二州秋稅及處州三縣被水民家紬絹鄂州舊額絹各一年己巳蠲四川轉運司積貸常平錢十三萬緡八月甲戌朔禁收折帛合零錢止輸實數乙亥蠲京西路請佃田租及州縣場務稅錢二年己亥改諸路提舉茶鹽官為提舉常平茶鹽公事川廣以憲臣兼領辛丑復增太學弟子員二百九月辛酉遣錢周材使金賀正旦嚴抑賀金主生辰冬十月乙亥帝書一德格天之閣賜秦檜仍就第賜宴丙子楊愿罷癸未以樞密都承旨李若谷簽書樞密院事兼權參知政事武岡軍徭人楊再興降庚寅以翰林學士承旨秦熺為資政殿學士提舉萬壽觀兼侍讀恩數視執政辛卯夜雷癸巳蠲安豐軍上供錢米二年甲午以汪勃言折彥質黨趙鼎郴州安置庚子置四川宣撫司總領錢糧官辛丑命秦熺班簽書樞密之下十一月甲辰加錢忱少保錢愐開府儀同三司丙辰郭浩卒丙寅全給秦檜歲賜公使錢萬緡閏月己卯罷明法新科十二月戊午置江陰軍市舶務甲子命右司員外郎李朝正同措置經界丁卯金遣蒲察說等來賀明年正旦十六年春正月戊子增太學外舍生額至千人壬辰親饗先農于東郊行籍田禮執耒耜九推詔告郡縣二月辛丑割金州豐陽縣洋州乾祐縣畀金人壬寅毀諸路淫祠癸丑建秦檜家廟三月庚午朔建武學置弟子員百人辛卯造秦檜家廟祭器乙未增建太廟己亥立淮東江東兩浙湖北州縣歲較營田賞罰格夏四月壬子禁州縣預借民稅及和買錢戊午定選試武士弓馬去留格五月壬申濬運河命諸路漕臣兼提舉學事癸未初作太廟祏室丙戌作景鐘丁亥金遣烏古論海等來賀天申節六月安南獻馴象十秋七月壬申以張浚上疏論時事落節鉞連州居住壬辰立祕書省獻書賞格丙申復何鑄為端明殿學士兼侍讀八月辛丑築高禖壇壬子遣邊知白使金賀正旦周執羔賀金主生辰九月甲戌命何鑄等為金國祈請使請國族甲午賞統制張淵韓京等討捕福建廣東諸盜功各進官有差冬十月戊戌帝觀新作禮器于射殿撞景鐘奏新樂十一月丙子合祀天地于圜丘大赦庚辰罷州縣新創稅場癸未復置御書院己丑加潘正夫少保十二月戊戌彗見西南方乙巳滅辛酉金遣盧彥倫等來賀明年正旦十七年春正月己巳命諸路收試中原流寓士人己卯禁監司郡守進羨餘辛卯以舉人多冒貫命州縣每三歲行鄉飲酒禮以貢士壬辰以李若谷參知政事御史中丞何若簽書樞密院事癸巳進秦熺為資政殿大學士二月乙巳親祠高禖辛酉李若谷罷三月乙亥何若罷己卯以翰林學士段拂參知政事乙酉改封秦檜為益國公戊子改命張俊為靜江寧武靖海軍節度使韓世忠鎮南武安寧國軍節度使落李若谷資政殿學士江州居住夏四月丙申蠲諸路免行錢三之一己亥以御史中丞汪勃簽書樞密院事己未詔趙鼎遇赦永不檢舉以前貶所潮州錄事參軍石恮待遇鼎厚除名潯州編管五月甲子詔舉賢良乙丑雨雹己巳洪皓責濠州團練副使英州安置辛巳金遣完顏卞等來賀天申節六月乙卯禁招安盜賊戊午改命普安郡王瑗為常德軍節度使恩平郡王璩武康軍節度使秋七月庚辰召鄭剛中赴行在辛巳太白晝見以徽猷閣待制知成都府李璆權四川宣撫使癸未命李璆同總領四川財賦符行中參酌減放四川重斂戊子以吳璘充御前諸軍都統制兼知興州八月庚子罷建州創置賣鹽坊癸卯趙鼎薨于吉陽軍戊申遣沈該使金賀正旦詹大方賀金主生辰丁巳以諸路羨餘錢充月樁之數加邢孝揚太尉九月己巳減四川科率虛額錢歲二百八十五萬緡癸酉詔以四川宣撫司降賜庫米一百萬石均減對糴乙亥蠲江南東西道諸州月樁錢丙子鄭剛中罷丙戌減江浙諸州折帛錢冬十月辛卯朔日有食之癸卯建太一宮丁未命太常歲以春秋二仲薦獻欑宮季秋遣御史按視己酉進楊存中為少傅己未臨安府甘露降十一月丙寅秦檜上重修免役敕令格式丁卯復賜進士聞喜宴十二月辛卯朔禁諸州擅釋放流配命官及事干邊防切要之人甲寅鄭剛中落職桂陽監居住丙辰金遣完顏宗藩等來賀明年正旦十八年春正月己巳幸天竺寺遂幸玉津園二月乙未段拂罷尋落職興國軍居住以汪勃兼權參知政事辛亥聽趙鼎歸葬三月丁丑命楊政吳璘招關陝流民補殿前軍戊寅罷汀州諸縣上供銀蠲茶鉛本錢之半庚辰幸新太一宮壬午以秦熺知樞密院事乙酉禁民私渡淮及招納叛亡夏四月戊子朔日有食之庚子秦熺乞避父子共政以為觀文殿學士提舉萬壽觀兼侍讀提舉祕書省壬寅命熺恩禮視宰臣班次亞右僕射甲辰賜禮部進士王佐以下三百三十人及第出身丙辰加士開府儀同三司五月戊辰加吳益太尉乙亥裁損奉使賞給丙子金遣蕭秉溫等來賀天申節癸未以李顯忠私取故妻于金降為平海軍承宣使台州居住甲申罷四川宣撫司以李璆為四川安撫制置使是月徽州慶雲見六月甲辰築九宮貴神壇于東郊戊申士民曹溥等上尊號不許是月遣太府寺丞宋仲堪詣江州置獄鞫鄭剛中欺隱官錢福州候官縣有竹實如米飢民採食之是夏浙東西淮南江東旱八月丙申汪勃罷丁酉以工部尚書詹大方簽書樞密院事兼權參知政事禁州縣士民飾詞舉留官吏閏月庚申免江浙湖南今歲和糴甲子命臨安平江二府淮東西湖北三總領所歲糴米百二十萬石以廣儲蓄壬申遣王墨卿使金賀正旦陳誠之賀金主生辰甲申辛道宗降官房州羈管乙酉禁奉使三節人出境博易福建諸州賊平以所創招奇兵為殿前司左翼軍九月丙午詹大方薨冬十月丙辰以御史中丞余堯弼簽書樞密院事兼權參知政事十一月乙酉朔升感生帝為上祀己亥胡銓移吉陽軍編管壬寅鄭剛中責濠州團練副使復州安置戊申禁四川買馬官吏私市蠻馬辛亥振紹興府饑十二月乙卯朔振明越秀潤徽婺饒信諸州流民丙寅借給被災農民春耕費丁卯命利路三都統措置營田以其租充減免對糴之數戊辰蠲被災下戶積欠租稅庚辰金遣召守忠等來賀明年正旦十九年春正月甲申朔以皇太后年七十帝詣慈寧殿行慶壽禮甲午罷國信所回易北貨癸卯幸天竺寺遂幸玉津園二月丁丑禁湖北溪洞用人祭鬼及造蠱毒犯者保甲同坐三月癸未朔日有食之甲辰鄭剛中移封州安置子良嗣等亦除名編管夏四月丁巳立孳生牧馬監賞罰格丙寅祕閣修撰張邵上秦檜在金國代徽宗與粘罕書稿詔付史館以邵為徽猷閣待制戊寅湖廣江西路建康府並甘露降五月壬午朔汀漳泉三州民田被賊蹂踐蠲其二稅戊戌賞平福建羣盜功以選鋒軍統制劉寶為武泰軍承宣使餘將士遷秩有差庚子金遣唐括德溫等來賀天申節丁未減連英循惠新恩六州免行錢六月丁巳茶陵縣丞王庭珪作詩送胡銓坐謗訕停官辰州編管戊午秦檜上吏部續降七司通用法秋七月壬寅頒諸農書于郡邑八月辛未刺浙東諸州強盜當配者充沿海諸軍九月戊申命繪秦檜像仍作贊賜之冬十月己未湖南副總管辛永宗停官肇慶府編管十一月壬辰合祀天地于圜丘大赦辛丑李樁年以經界不均罷丁未立州縣墾田增虧賞罰格是月命復蜡祭十二月丁巳金岐王亮弒其主亶自立己未詔無子女戶得解舉人太學生之獨居者並免役己巳命四川制置司歲募扈衞三百人赴行在丁丑金遣完顏兗等來賀明年正旦二十年春正月丁亥秦檜入朝殿前司軍士施全道刺之不中壬辰磔全于市癸卯趣諸路轉運司及守臣畢經界事丙午兩浙轉運副使曹泳言李孟堅誦其父光所撰私史語涉譏謗詔送大理寺二月戊申朔立守貳令尉營田增虧賞罰格庚戌禁民春月捕鳥獸蠲靜江府昭州上供折布錢三之一壬子罷經界所覆實官吏庚申免海外四州及瀘二州長寧軍經界三月庚辰金遣完顏思恭等來報即位癸未以余堯弼參知政事給事中巫伋簽書樞密院事丙戌遣堯弼等賀金主即位戊子以秦熺為觀文殿大學士萬壽觀使丙申李孟堅獄具詔李光遇赦永不檢舉孟堅除名峽州編管胡寅程瑀潘良貴張燾等八人緣坐黜降有差戊戌詔改正經界法之厲民者庚子以巫伋兼權參知政事壬寅胡寅責果州團練副使新州安置夏四月壬子以沒入官田悉歸常平司禁募民佃種癸酉置力田科募江浙福建民耕兩淮閒田是月信州妖賊黃曾等作亂陷貴溪縣江西兵馬鈐轄李橫等討平之五月庚辰申禁諸軍差承接文字使臣伺察朝政癸未秦檜上中興聖統甲午金就遣完顏思恭等來賀天申節六月癸亥加秦熺少保詔大理寺鞫前太常主簿吳元美譏謗獄丙寅禁民結集經社是月建州民張大一作亂秋七月丙子罷招刺禁軍庚寅罷泉漳汀三州經界八月甲辰朔量移張浚永州孫近虔州万俟𪅂沅州李若谷饒州李文會江州段拂南康軍並居住雷州守臣王趯坐交通趙鼎李光停官戊申改建大理寺辛酉遣陳誠之使金賀正旦王曮賀金主生辰九月甲申以吳元美譏毀大臣除名容州編管丙申侍御史曹筠以附下罔上罷冬十月戊辰右迪功郎安誠坐文字謗訕送惠州編管秦檜有疾庚午命執政赴檜第議事十二月甲子檜始朝命肩輿入宮門二孫扶掖升殿不拜己巳金遣蕭頤等來賀明年正旦二十一年春正月癸未以兩淮民復業未久寬其租賦庚子蠲平江府折帛錢三年二月甲寅夜雨雹乙卯詔諸州置惠民局官給醫書壬戌遣巫伋等為金國祈請使請歸淵聖皇帝及皇族增加帝號等事癸亥以余堯弼兼簽書樞密院事三月丁丑雨雹丁亥蠲江浙荊湖等路中戶以下積年逋負夏閏四月己卯禁三衙掊剋諸軍丁亥賜禮部進士趙逵以下四百四人及第出身五月辛亥罷利州路選刺義士戊午金遣劉長言等來賀天申節以吳璘楊政田師中並為太尉六月甲戌括淮南佃田所隱頃畝以理租稅辛巳命歲給大理寺三衙及州縣錢和藥劑療病囚秋七月壬寅以集英殿修撰知衢州曹筠為四川安撫制置使辛亥罷柴米稅癸亥詔州縣官嘗被科率害民重罪者不得任守令親民官八月辛未秦檜上重修諸路茶鹽法壬申韓世忠薨詔進太師致仕癸酉追封通義郡王禁郡守特斷乙亥加岳陽軍節度使士撙開府儀同三司充萬壽觀使甲申遣陳夔使金賀正旦陳相賀金主生辰九月戊戌朔籍寺觀絕產以贍學乙巳均科處州丁鹽錢丁巳增築景靈宮是月巫伋使還所請皆不許冬十月甲戌幸張俊第壬午進俊為太師升從子子蓋為安德軍節度使甲申夜有赤氣十一月庚戌余堯弼罷乙卯命提舉常平官修復陂湖丁巳進義副尉劉允中坐指斥謗訕棄市十二月壬申雷癸巳金遣兀朮魯定方等來賀明年正旦二十二年春正月丁未加韋淵太保三月丁酉以王庶二子之奇之荀謗毀朝政並除名之奇梅州之荀容州編管甲辰以直龍圖閣葉三省監都作院王遠通書趙鼎王庶力詆和議言涉謗訕三省落職筠州居住遠除名高州編管丁巳遣司農丞鍾世明詣福建路籍寺觀絕產田宅入官其後歲入錢三十四萬緡夏四月丙子巫伋罷辛巳以御史中丞章复簽書樞密院事兼權參知政事五月癸丑金遣田秀穎等來賀天申節是月襄陽大水容州野蠶成繭秋七月甲午朔加封程嬰公孫杵臼韓厥為公升中祀丁巳虔州軍卒齊述殺殿前司統制吳進江西同統領馬晟據州叛八月己卯遣鄂州都統制田師中發兵同江西安撫使張澄殿前司遊奕軍統制李耕討述九月乙未又遣左翼軍統制陳敏相繼討之癸丑章复罷冬十月甲戌以御史中丞宋樸簽書樞密院事兼權參知政事就命李耕知虔州庚辰以黃岩縣令楊煒誹謗除名萬安軍編管知台州蕭振落職池州居住十一月戊申合祀天地于圜丘大赦丁巳立薦舉受財刑名李耕入虔州盡誅叛兵虔州平十二月辛酉朔減夔州路及蒲江淯井兩監鹽錢歲八萬二千緡有奇戊子金遣張利用等來賀明年正旦
