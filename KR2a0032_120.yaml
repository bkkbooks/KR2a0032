body:
  text: 宋史卷一百二十志第七十三禮二十三賓禮五附錄羣臣上表儀宰臣赴上儀朝省集議班位臣僚上馬之制臣僚呵引之制羣臣上表儀通禮守宮設次于朝堂文東武西相對為首設中書令位于羣臣之北禮曹掾舉表案入引中書令出就南面立禮部郎中取表授中書令令即受表入奏其禮凡正至不受朝及邦國大慶瑞上尊號請舉行大禮宰相率文武羣臣暨諸軍將校蕃夷酋長道釋耆老等詣東上閤門拜表知表官跪授表於宰臣宰臣跪授於閤門使乃由通進司奏御凡有答詔亦拜受於閤門獲可奏者奉表稱賀其正至樞密使率內班拜表長春殿門外亦閤門使受之又西京留守拜表儀制留司百官每五日一上表起居質明並集長壽寺立班置表于案再拜以遣其春秋賜服及大慶瑞並如之或令分司官齎詣行在或止驛付南京留司約用此制若巡幸東京則留司百官亦五日一上表起居並集大相國寺其制羣臣詣閤拜奏者首云文武百僚具官臣某等言常奏御者止云臣某言並稱尊號已有功臣爵邑者具之狀奏者前後列銜不稱尊號亦云功臣爵邑其外又有書疏奏劄牓子之類乾德二年令有司詳定表首太常禮院言僕射南省官品第二太子三師官品第一品位雖高而南省上臺為尊合以僕射充首若專以品秩為定則諸行侍郎品第四列於諸司三品卿監之上不可以品序為準按唐貞元六年詔每有慶賀及諸臣上表並合上公為首如三公闕以令僕行之中書門下列貢章表則僕射是百僚師長難同宮僚之例詔百官集議翰林學士陶穀等曰按唐制上臺東宮並是廷臣當時左右僕射侍中中書令為正宰相貞觀末帶同中書門下三品者方為宰相今僕射既非宰相合在太子三師之下理固不疑若以宮僚非廷臣即宰相豈當兼領今若先二品而後一品升後列而退前班紊其等威事恐非順請以太子三師為表首竇儀等曰東宮三師為表首論討故典實皆無據左右僕射當為表首者其事有六按六典尚書為百官之本今自一品至六品常參官皆以尚書省官為首則僕射合為表首一也又唐制上表無上公即尚書令僕以下行之其嗣王合隨宗正若有班位合依王品則嗣王雖一品不得為表首二也僕射位次三公合為表首三也况僕射為百僚師長東宮三師非師長之任四也晉天福中詔謝賀上表上公行之如闕即令僕射行之五也立制之班卑者先入後出尊者後入先出今東宮一品立定僕射乃入僕射既退東宮一品乃出且在兩省之後六也詔從儀等議以僕射為表首焉宰臣赴上儀開元禮有任官初上相見之儀宋制凡牧守赴上多仍州府舊禮臺省之制宰相親王使相正衙謝訖出文德殿便門至西廊堂後官兩省雜事迎參至中書便門兩省官迎班升都堂與送上官對揖見任侍中中書令同平章事者降階又與送上官對拜訖分東西升坐于牀兩省雜事讀案堂後官接案搢笏頂筆判署凡三道一司天監壽星見二開封府嘉禾合穗三澶州黃河清並判準始謝送上官訖三司使學士兩省官待制三司副使升堂展賀百官先班中書門外上事官降階百官入直省官通班贊致賀歸後堂與參知政事樞密副使宣徽使相見會食訖退建隆三年中書門下言準唐天成元年詔故事藩鎮帶平章事合於都堂視事刊石以記官族輸禮錢三千貫近年頗隳曩制自今藩鎮帶平章事者輸禮錢五百千刻石記歲月其錢以給兩省公用望舉行之詔自今宰相及樞密使兼平章事侍中中書令者輸禮錢三百千藩鎮五百千刻石以記如舊制增秩者不再輸舊相復入者輸如其數乾德二年置參知政事就宣徽院赴上而樞密使副止上事于本廳後以曹彬兼侍中為樞密使特令赴中書上事大中祥符中詔自今宰相官至僕射者並于中書都堂赴上不帶平章事亦令赴上有司上儀注宰相用常儀僕射本省上日郎中員外班迎于都堂門內尚書丞郎于東廊階上稍近班迎揖金吾將軍升階展拜賀禮生贊引主事讀案見任中書樞密使相前任中書門下並不赴餘如宰相之儀上訖與本省御史臺四品兩省五品諸司三品以上會食右僕射王旦充玉清昭應宮使有司按故事宰相凡有吉慶百官皆班賀詔以未葺攸司其班賀權罷旦赴上修宮所特賜會丞郎三司副使以上悉預自是宮觀使副上日皆賜會作樂天禧初太保平章事王旦為太尉國朝以來三公不兼宰相無赴上儀特詔有司詳定就尚書省赴上百官班迎宰相而下悉集御史大夫中丞知雜三院御史皆僚屬送上判案三道中丞以上即京府尹赤縣令諸曹節度刺史皇城宮苑使悉集翰林學士入院日賜設惟學士中書舍人赴坐又資政侍讀侍講龍圖閣學士直學士兼祕書監並赴上祕閣及兩省五品以上任三館學士判館修撰者皆賜設焉朝省集議前代不載其儀宋初刑政典禮之事當集議者先下詔都省省吏以告當議之官悉集都堂設左右丞于堂之東北南向御史中丞于堂之西北南向尚書侍郎于堂之東廂西向兩省侍郎常侍給事諫舍于堂之西廂東向知名表郎官于堂之東南北向監議御史于堂之西南北向又設左右司郎中員外于左右丞之後三院御史于中丞之後郎中員外于尚書侍郎之後起居司諫正言于諫舍之後如有僕射御史大夫即于左右丞中丞之前如更有他官即諸司三品于侍郎之南東宮一品于尚書之前武班二品於諫舍之南皆重行異位卑者先就席左右丞升廳省吏抗聲揖羣官就坐知名表郎官以所議事授所司奉詣左右丞左右丞執卷讀訖授中丞中丞授于尚書侍郎以次讀訖復授知名表郎官將畢左右丞奉筆叩頭揖羣官以一副紙書所議事節署字于下授四坐監議御史命吏告云所見不同者請不署字以官高者為表首如止集本省官坐如常儀其知名表郎官監議御史坐仍北向惟僕射以上得乘馬至都堂他官雖同平章事亦止屏外明道二年尚書議莊獻莊懿太后升祔省官帶內外制兼三司副使承例移文不赴監議御史段少連以為官帶近職一時之選宜有建明不當反自高異乃奏議事不集以違制論從之集賢校理趙良規言國朝故事令敕儀制別有學士知制誥待制三司副使著位視品與前朝異固無在朝職入省官之說若全不論職則後行員外郎兼學士在朝立丞郎上入省居比駕下知制誥待制入朝與侍郎同列入省分廁散郎員外郎任三司副使郎中任判官在三司為參佐入本省為正員所以舊來議事集尚書省官帶職者不赴別詔三省悉集則及大小兩省內朝官悉集則及學士待制三司副使更集他官則諸司三品武官二品各次本司長官故事尚書省官帶知制誥中書省奏班簿是于尚書省御史臺了不著籍故有絕曹之語又凡定學士舍人兩省著位除先後入外若有升降皆特稟朝旨豈有在朝入省迭為高下御史臺禮院詳定久不决判禮院馮元等曰會議之文由來非一或出朝廷別旨或循官司舊規故集本省者即南省官集學士兩省臺官者容有兩制給舍中丞集學士臺省及諸司四品以上者容有卿監集文武百官者容有諸衞蓋謀事有小大集官有等差率繫詔文乃該餘職少連以太常易名之細考功覆議之常誤謂羣司普當會席列為具奏嬰以嚴科遂使絕曹清列還入本行分局常員略無異等請臣僚擬謚止集南省官屬或事緣體大臨時敕判兼召三省臺寺即依舊例御史臺言今尚書省官任兩制者依臺省之籍無坐曹之實論職官之言正為絕曹者設豈可受祿則繫官定奉議事則絕曹為辭况王旦王化基趙安仁晁迥杜鎬楊億皆嘗預議於尚書省故相李昉為主客郎中知制誥日屢經都省議事又議大事僕射御史大夫入省唯僕射至廳下馬于今行之所以重本省也故都堂會議列狀以品就坐以官忽此更張恐非通理禮官吳育曰兩奏各有未安尚書省制度雖崇亦天子之有司在朝廷既殊班列入有司輒易尊卑是以朝省為彼我官職分二事也兩制近職若有事議而云絕班不赴非所以求至當且知制誥中書省奏班簿是謂絕班翰林學士亦知制誥不絕班簿此因循之制非確據也縱絕班有例而絕官無聞一人命書三省連判而都無所繫止為奉錢豈命官之禮今取典故中最明一事足以質定祥符五年僕射上事儀絕班之官別頭贊引不與本省官同在迎班請凡會議省官帶近職者別作一行而坐自為序列非以相壓若招兩制臺省諸司諸衞官畢集則各從其類自作一行書議如其位次詔尚書省議事應帶職官三司副使以上並不赴如遇集議大事令赴別設坐次是歲紫宸垂拱殿刊石為百官表位三司使內朝班學士右獨立石位門外亦班其上熙寧二年御史臺太常禮院詳定臣僚御路上馬之制近上臣僚及北使到闕並于御路上行馬中書樞密院執政官宣徽院御史中丞知雜御史左右金吾攝事官清道者導從呵止依舊式其三司副使以上亦許出節正任觀察使以上與合出節臣僚並許自宣德門外至天漢橋北御路上行馬如從駕出入及宗室內庭諸宮院車騎並不在此限御史臺又言舊制百官臺參辭謝臣僚于朝堂先赴三院御史幕次又赴中丞幕次得以體按老疾今止于御史廳一員對拜不惟有失舊儀兼恐不能公共參驗請如舊制朝堂拜揖遇放常朝即詣御史臺已而詔宰臣親王使相兩府宣徽使遇入樞密院門許至從南第二門外上下馬又詔宰臣上馬樞密次之諸司又次之左右丞上下馬處並同兩省侍郎御史臺言左丞蒲宗孟右丞王安禮賀僕射上尚書省于都堂下馬按左右丞上下馬于本廳請付有司推治安禮爭論上前以為今日置左右丞為執政官不應有厚薄左右丞于都堂上下馬自此始尋詔執政官退朝上馬宰臣于樞密院餘於隔門外都堂聚議退左丞于門下侍郎廳右丞于中書侍郎廳品官詣尚書省上下馬依雜壓太中大夫以上就第一貯廊監察御史以上就過道諸六曹尚書侍郎即太中大夫以上就本廳監察御史以上就客位餘並過道門外政和朝參臣僚上馬次序俟皇城門開樞密入次三省執政官次一品二品文臣六曹侍郎殿中監開封尹大司成侍從官兩省次百官御史臺編欄以次入其宰相罷政韓琦以司徒節度判相州曾公亮以司空節度為集禧觀使王安石以觀文殿大學士吏部尚書知江寧府曹佾以中書令節度充景靈宮使韓絳以觀文殿大學士吏部侍郎知大名府致仕太師文彥博來朝其大朝會班位儀物如之吳育以觀文殿大學士吏部尚書為西太一宮使大朝會綴中書門下班而已自是舊相按例重輕以特旨行之治平四年御史臺言慶曆中有詔詳定武臣出節呵引之制節度使在尚書下三節節度觀察留後在諸行侍郎下兩節觀察使在中書舍人下諸衞大將軍防禦團練使在大卿監下內客省使比諸司大卿景福殿使比將作監引進使比庶子在防禦使上以上各一節諸州刺史諸衞將軍在少卿監下宣慶四方館使比少卿宣政昭宣閤門使比司天監少監諸衞將軍上皇城使以下諸司使比郎中客省引進閤門副使比員外郎樞密都承旨在司天少監下閤門使上副都承旨在閤門使下樞密副承旨諸房副承旨在諸司使下以上並兩人呵引當時已施行矣而皇祐編敕刪去此制請復舉行
