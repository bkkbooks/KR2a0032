body:
  text: 宋史卷五十七志第十天文十流隕一流隕建隆元年正月戊午有星出東北方青赤色北行初小後大尾迹斷續光燭地四月有星出天市垣六月癸酉有大星赤色出心大星甲申有星色赤出太微垣歷上相乙未有大星色赤流虛東北九月癸亥有星出昴甲子有星如缶出卯光明燭地十二月戊辰有星青赤色出參旗西南慢行而沒蒼光燭地三年六月丁酉有星出天市入南斗魁乾德元年二月丙午有星如桃色赤出弧矢東南沒有光明二年二月乙丑有星黃白色出太微五帝坐南速行至外廚沒其體散落光燭地三年六月丁巳有星如桃色黃赤出北斗魁經太微垣北過角宿西漸大行五尺餘沒尾迹凝天有光明十二月丁巳有星出天河青白色南行至天倉沒初小後大光燭地四年正月乙未有星出天社青白色速行尾迹三丈餘初小後大沒有光明四月甲寅有星出天乳青赤色東南行貫房沒光燭地閏八月己丑有星出天船青白色西北速行沒於文昌開寶元年七月戊子有星出大角青白色北行沒明燭地九月戊子有星出文昌赤黃色東北速行而沒二年六月己卯有星出河鼓慢行明燭地三年九月庚午廣州民見衆星皆北流四年八月辛卯有星出織女西北行尾迹三丈餘沒久有聲五年八月乙巳有星出王良西北行四丈餘有聲而散七年九月甲午有星出室西北行星體散落有聲明燭地太平興國三年十月甲寅有星出天船赤黃色至天棓星體散落明燭地八年三月丙寅有星晝出西南當未地青白色尾迹二丈餘沒于東南有光明七月辛巳有星如稱權沒于婁八月壬寅有星出紫微鈎陳東赤黃色向北速行近北極沒雍熙元年十月丁酉有星出昴赤色東南蛇行二丈餘沒二年正月壬戌有星出東井其大倍於金星入輿鬼沒四年六月庚戌酉初有星出西北色青白入濁當戌地有聲如雷八月乙亥有星出天關東色赤黃尾貫月端拱元年四月辛亥有星出天津赤黃色蛇行有聲明燭地犯天津東北閏五月辛亥丑時有星出奎如半月北行而沒乙卯有星出紫微鈎陳西色青尾迹短赤光照地北行而沒九月癸丑有星出西南如太白有尾迹至中天旁出一小星行丈餘又出一小星相隨至五車沒二年四月辛亥戌時有星出東南色白墜于氐房間壬申有星出漸臺血色赤東南急行掩左旗過河鼓沒淳化元年九月辛巳有星出羽林色青南行光奪月十一月壬午流星出天關南行歷東井郎位攝提至大角東北墜於地光芒四照聲如隤牆二年正月丙申有星出水府西色赤黃經參旗分為三星相從至天苑東沒光燭地七月癸酉有星出雲雨側色青白緩行三尺餘沒三年三月己酉未時西北方有星西北速行色青白有尾迹四月己卯有星出文昌西南速行至柳分為二星而沒六月己丑有星出天市垣屠肆東色青白西北慢行丈餘分為三星從而沒四年五月乙未平明有星東南出南斗色青白西北行而沒五年八月己酉常星未見有星出東方色青白東北慢行至濁沒大約出奎婁間九月庚午有星出昴北緩行過卷舌至礪石沒至道元年四月乙巳常星未見有星出心北色青赤急行而墜七月癸丑有星出危色青白入羽林沒二年五月辛丑有星出紫微北尾迹丈餘如彗而有聲墜于壁室間五月己未日未及地五尺間有星出中天色赤黃有尾迹東行速行二丈餘沒六月己卯有星出牽牛西歷狗國光芒丈餘墜東南及地無聲又有星出翼貫天廟墜于稷星東光燭地九月丁酉平明有星出北方東行三丈餘分為三星從而沒三年九月丁丑有星二隕于西南一出南斗一出牽牛有光三丈許咸平五年三月丙午有星晝出心至南斗沒赤光丈餘八月辛巳有星出營室色白丙申有星流出東方西南行大如斗有聲若牛吼小星數十隨之而隕戊戌又有星千數入輿鬼至中台凡一大星偕小星數十隨之其間兩星一至狼星一至南斗沒丁未有星晝出紫微垣貫北斗沒壬子有星出中天尾迹數道如迸火西流至狼弧沒六年五月乙未有星出王良西又出北極稍東北至垣外沒有聲如雷六月庚午有星晝出東北方色黃白有尾迹七月壬辰有星出昴尾迹丈餘色白隱隱有聲至狼星沒十一月癸丑有星出畢至屏星北沒尾迹蛇行屈曲三丈餘久方沒十二月乙酉威虜軍有星歷城西北尾迹長數里光照地落蕃帳有聲如雷者三景德元年六月戊午有星晝出西南方赤黃有尾迹速流丈餘沒十月戊申天雄軍有星出北方隕于西北光丈餘十二月庚辰有星出文昌慢行西北分為數星至紫微垣東北沒戊子有星出昴至參旗迸為數星沒二年正月丙子日未沒有星速流西南二月己亥有星出太微上將光燭地四月癸卯有星北流入天倉尾迹丈餘十月戊寅有星出太微垣內屏北至翼分為三星隨而沒尾迹青白色十一月壬子有星出南晝聲如雷光燭地三年五月乙卯有星出天津東北紫微垣北分為四星隨而沒赤黃有尾迹六月乙亥有星出雲雨星北至羽林天軍南迸為三星沒丁酉有星出胃北入天囷迸為數星光燭地七月庚申有星出靈臺有炬彗聲如雷至南北沒赤光照地十一月辛丑有星出中台東北速流有聲光燭地四年三月庚申有星晝出南方六月丙辰有星出北方慢流至八穀迸為數星沒光燭地己未有星出天市分為三星至尾沒七月辛卯有星出敗瓜南慢流歷河鼓入天市至宗人東北迸為二星沒色赤黃有尾迹十二月癸巳有星出弧矢赤黃色尾迹丈餘光燭地速流入濁大中祥符元年二月戊申有星十餘急流入濁色赤黃有尾迹五月辛未有星如太白出天市垣宗人東南尾迹丈餘闊三寸向北慢流至女牀西分為數星沒六月戊申有星出北斗魁內赤黃有尾迹稍北速行迸為數星沒八月己丑有星晝出中天如太白有尾迹急流東南近日沒九月乙丑有星出天倉急流東南星體散落二年三月己未有星出天津南至離珠沒尾迹五丈餘照地明四月丙申有星出八穀有尾迹速流而西至五車東迸為數星沒五月乙亥有星晝出東方如太白尾迹赤黃流至日北沒八月丙申有星出北斗西南急行至郎將西分為數點九月乙丑有星出南河如桃色赤至中台沒三年三月丁未有星出天市宗人東北尾迹二丈至左旗迸為數星沒光燭地五月丁亥有星出北斗魁如桃色青白尾迹二丈餘六月丁巳有星出文昌至上台沒乙卯有星出傳舍如桃色赤黃至紫微沒壬申有星出建星入南斗沒赤黃有尾迹七月庚辰有星出宗人西北流入濁光照地八月丁未有星出貫索至帝座沒尾迹光明壬戌有星出文昌至北極沒尾迹丈餘九月庚辰有星出軒轅左入太微垣沒十月庚戌有星出東方赤黃無尾迹分為數星稍南沒四年二月辛亥有星出東方尾迹赤黃二丈餘四月乙丑有星出柳色赤黃至翼沒五月戊子有星出東方赤黃色六月壬戌有星出觜東北流入濁七月壬申有星出紫微宮速流至天皇沒戊寅有星自內階流經文昌至上台迸為數星隨而沒十月戊午有星出東北入濁又星出七星南至天稷沒尾迹丈餘五年二月戊申有星出貫索經庫樓迸為數星沒八月戊午有星大小二十餘皆有尾迹北流又一星光燭地出紫微垣外尾丈餘闊三寸許東北流至傳舍沒庚申星出天耗北尾迹十丈餘明燭地至文昌沒六年乙巳有星晝出南方赤光迸逸照地明十一月丁巳有星出太微郎位東色赤黃有尾迹至軫北迸為數星沒十二月癸亥有星出西南色青白入東北沒七年三月丙戌有星出南河大如杯至玉井沒四月辛酉星出鈎陳尾迹赤黃七月丁未有星晝出東南方色黃急流而北九月辛亥有星出軍市至柳迸為三星沒十一月癸未有星晝出日西南尾迹二丈餘闊三寸許青白色西流而沒己丑有星出南河至弧矢沒光燭地八年二月丁卯有星出郎將北迸為三星四月癸丑有星出亢西至右攝提迸為數星隨而沒五月乙酉有星青白色出人星至騰蛇沒光燭地丙申有星西南流迸為數星沒明照地八月己亥有星出參南流入濁九年四月庚子有星晝出赤黃色急流西北沒天禧元年四月己巳有星出軫至器府北沒光照地六月有星出河鼓速流至天田迸為數星沒十二月癸巳有星出東北尾迹赤黃急流西南沒二年八月乙卯有星二有尾迹赤黃一出五車一出狼北入濁戊午有星出酒旗至明堂沒光燭地九月戊子有星出西南至天園沒十一月辛酉有星出南河色赤黃至柳沒三年六月乙巳有星出昴急流至天倉沒十二月壬寅有星出軒轅尾迹黃慢流至太微垣久之有聲如雷四年正月丁丑有星出王良明照地至騰蛇沒五年四月丙辰有星出軒轅前星大如桃狀若粉絮犯次將入太微垣歷屏星凡七十五日入濁沒己未有星出南方如二升器色青赤北流入濁尾迹三丈許七月辛巳有星出文昌光明燭地十月乙巳有星出天津西乾興元年三月庚寅夜漏未上星出七星曳尾緩行至翼沒五月己巳星出天棓速行入紫微極星西沒癸酉星出張西北入濁壬午星出危赤黃有尾迹速行而東炸烈如迸火隨至羽林軍南沒明燭地己丑星出北河至軒轅沒九月己巳星出羽林流至芻沒己丑星出天市垣旁緩行經天過天市垣至營室沒壬辰星出營室行至天倉沒十月丁酉星出右旗如太白西南速行至天辨沒明燭地十一月壬辰常星未見有星出五車南行至奎沒天聖元年正月丙戌星出北斗魁西至八穀沒三月戊辰星出貫索至五車沒六月戊戌星出天辨至建星沒己丑星出北斗星東北入濁沒庚寅星出五車至五諸侯沒閏九月癸巳星出五車至參沒丙申星出東壁至天倉沒甲辰常星未見星出營室至外屏沒己酉星出翼南行入濁二年辛丑星出五車至畢沒六月丁卯晝漏上星出中天赤黃色有尾迹西南緩行入濁辛巳星出牽牛南入濁九月辛卯星出太微沒于右執法四年正月壬午星出亢東南流入濁丁巳星出靈臺至翼沒丙午星出北斗魁近文昌沒其夜又有星出箕南行入濁四月丙寅星出太微從官側南行入濁五月辛巳星出天市垣市樓側東北流入濁閏五月丙辰星出天船沒于紫微鈎陳側六月乙亥星出土司空東南入濁八月乙未星出天棓近天倉沒九月丁未星出王良西北入濁十一月丙辰星出東井沒于南河側十二月丁丑星出鈎陳沒于天棓側戊戌星出太微至文昌沒五年正月壬寅星出天社西南入濁九月癸卯星出天廚北流入濁丁未星出北辰沒于天牀側甲子有星出北河沒于東井六年四月甲申夜漏欲盡有星大如斗器自北方至於西南光照地有聲如雷曳尾迹長數丈久之散為蒼白雲七年二月乙丑星出天乳貫天市入濁八年二月丁酉星出軒轅大星側如杯速行至器府沒明道元年三月癸巳星出中台貫北河入東井沒炸烈有聲明燭地食頃又有星出天市垣宗人側東流入濁四月乙巳星出貫索大如杯沒于鈎陳側光照地八月癸亥星出天船近鈎陳沒明燭地乙丑星出胃大如杯有尾迹西北緩行迸為六七小星相隨沒于大陵明燭地丙寅星出營室西南速行至危沒良久又有星出天園至天社沒光燭地九月丙子星出婁沒于雲雨側尾迹久方散食頃又有星出天大將軍近奎沒尾迹久方散明燭地續又星出北辰西北速行至內階沒又有星出天苑沒于天園明燭地景祐元年八月己卯星出東井行至廁星沒尾迹久方散明燭地乙酉星出北斗魁西北速行入紫微東南垣沒又有星出文昌西北速行至紫微鈎陳沒尾迹久方散明燭地九月丁亥星出天津如太白青色有尾迹沒于危良久星出五車沒天廩己丑星出東井如太白赤黃色有尾迹向東速行至柳沒光照地其夜星出婁至奎沒明燭地十一月乙卯星出軒