body:
  text: 宋史卷一百八十五志第一百三十八食貨下七酒坑冶礬香附酒宋榷酤之法諸州城內皆置務釀酒縣鎮鄉閭或許民釀而定其歲課若有遺利所在多請官酤三京官造麴聽民納直以取陳滑蔡潁隨郢鄧金房州信陽軍舊皆不榷太平興國初京西轉運使程能請榷之所在置官吏局署取民租米麥給釀以官錢市薪槱及吏工奉料歲計獲無幾而主吏規其盈羡及醞齊不良酒多醨薄至課民婚葬量戶大小令酤民甚被其害歲儉物貴殆不償其費太宗知其弊淳化五年詔募民自釀輸官錢減常課三之二使其易辦民有應募者檢視其資産長吏及大姓共保之後課不登則均償是歲取諸州歲課錢少者四百七十二處募民自酤或官賣麴收其直其後民應募者寡猶多官釀陝西雖榷酤而尚多遺利咸平五年度支員外郎李士衡請增課以助邊費乃歲增十一萬餘貫兩浙舊募民掌榷雍熙初以民多私釀遂蠲其禁其榷酤歲課如麴錢之制附兩稅均率二年詔曰有司請罷杭州榷酤乃使豪舉之家坐專其利貧弱之戶歲責所輸本欲惠民乃成侵擾宜仍舊榷酒罷納所均錢天禧四年轉運副使方仲荀言本道酒課舊額十四萬貫遺利尚多乃歲增課九萬八千貫川峽承舊制賣麴價重開寶二年詔減十之二既而頗興榷酤言事者多陳其非便太平興國七年罷仍舊賣麴自是惟夔達開施瀘黔涪黎威州梁山雲安軍及河東之麟府州荊湖之辰州褔建之褔泉汀漳州興化軍廣南東西路不禁自春至秋醞成即鬻謂之小酒其價自五錢至三十錢有二十六等臘釀蒸鬻候夏而出謂之大酒自八錢至四十八錢有二十三等凡醞用粳糯粟黍麥等及麴法酒式皆從水土所宜諸州官釀所費穀麥準常糴以給不得用倉儲酒匠役人當受糧者給錢凡官麴麥一斗為麴六斤四兩賣麴價東京南京斤直錢百五十五西京減五咸平末江淮制置增榷酤錢頗為煩刻景德二年詔毋增榷自後制置使不得兼領酒榷四年又詔中外不得更議增課以圖恩奬天禧初著作郎張師德使淮南上言鄉村酒戶年額少者望並停廢從之至道二年兩京諸州收榷課銅錢一百二十一萬四千餘貫鐵錢一百五十六萬五千餘貫京城賣麴錢四十八萬餘貫天禧末榷課銅錢增七百七十九萬六千餘貫鐵錢增一百三十五萬四千餘貫麴錢增三十九萬一千餘貫五代漢初犯私麴者並棄市周至五斤者死建隆二年以周法太峻犯私麴至十五斤以私酒入城至三斗者始處極刑餘論罪有差私市酒麴者減造人罪之半三年再下酒麴之禁凡私造差定其罪城郭二十斤鄉閭三十斤棄市民持私酒入京城五十里西京及諸州城二十里者至五斗處死所定里數外有官署酤酒而私酒入其地一石棄市乾德四年詔比建隆之禁第減之凡至城郭五十斤以上鄉閭百斤以上私酒入禁地二石三石以上至有官署處四石五石以上者乃死法益輕而犯者鮮矣端拱二年令民買麴釀酒酤者縣鎮十里如州城二十里之禁天聖以後北京售麴如三京法官售酒麴亦畫疆界戒相侵越犯皆有法其不禁之地大概與宋初同唯增永興軍大通監川峽之茂州富順監時天下承平既久戶口寖蕃為酒醪以靡穀者益衆乾興初言者謂諸路酒課月比歲增無有藝極非古者禁羣飲教節用之義遂詔鄉村毋得增置酒場已募民主之者期三年他人雖欲增課以售勿聽主者自欲增課委官吏度異時不至虧額負課然後上聞既而御史中丞晏殊請酒場利薄者悉禁增課天聖七年詔民間有吉凶事酤酒舊聽自便毋抑配而江淮荊湖兩浙酒戶往往豪制良民至出引目抑使多售其嚴禁止犯者聽人告募人代之慶曆初三司言陝西用兵軍費不給尤資榷酤之利請較監臨官歲課增者第賞之繼令蕭定基王琪等商度利害初酒場歲課不登州縣多責衙前或伍保輸錢以充其數嘉祐治平中數戒止之治平四年手詔蠲京師酒戶所負麴錢十六萬緡又江南比歲所增酒場強率人酤酒者禁止皇祐中酒麴歲課合緡錢一千四百九十八萬六千一百九十六至治平中減二百一十二萬三千七百三而皇祐中又入金帛絲纊芻粟材木之類總其數四百萬七百六十治平中乃增一百九十九萬一千九百七十五熙寧三年詔諸郡遇節序毋得以酒相饋初知渭州蔡挺言陝西有醞公使酒交遺至踰二十驛道路煩苦詔禁之至是都官郎中沈衡復言知莫州柴貽範饋他州酒至九百餘瓶用兵夫踰二百人故并諸路禁焉四年三司承買酒麴坊場錢率千錢稅五十儲以祿吏六月令式所刪定官周直孺言在京麴院酒戶鬻酒虧額原於麴數多則酒亦多多則價賤賤則人戶損其利為今之法宜減數增價使酒有限而必售則人無耗折之患而官額不虧請以百八十萬斤為定額閏年增十五萬斤舊直斤百六十八百以八十五為數請增為二百百用省數以便入出七年諸郡舊不釀酒者許釀以公使錢率百緡為十石溢額者以違制論在京酒戶歲用糯三十萬石九年江浙災傷米直騰貴詔選官至所産地預給錢俟成稔折輸於官未幾詔勿行止以所糴在京新米與已糴米半用之元豐元年增在京酒戶麴錢較年額損麴三十萬斤閏年益造萬斤二年詔在京鬻麴歲以百二十萬斤為額斤直錢二百五十俟鬻及舊額令復舊價酒戶負糟糯錢更期以二年帶輸并蠲未請麴數十萬斤先是京師麴法自熙寧四年更定後多不能償雖屢閣未請麴數及損歲額為百五十萬斤斤增錢至二百四十未免逋負至是命畢仲衍與周直孺講求利病請損額增直均給七十店令月輸錢周歲而足月輸不及數計所負倍罰其炊醞非時擅益器量及用私麴皆立告賞法悉施行之而裁其價三年詔帶輸舊麴錢及倍罰錢仍寬以半歲未經免罰者蠲三之一五年外居宗室酒止許於舊宮院尊長及近屬寄醞增永興軍乾祐縣十酒場酒戶負糟糯錢更令三年之內均月限以輸並除限內罰息其倍罰麴錢已蠲三之一下戶更免一分元祐元年刪監司鬻酒及三路饋遺條紹聖二年左司諫翟思言諸郡釀酒非沿邊並復熙寧之數詔熙寧五年以前諸郡不釀酒及有公使錢而無酒者所釀並依熙寧編敕數仍令諸郡所減勿逾百石舊不及數者如舊毋得於例外供饋後又以陝西沿邊官監酒務課入不足乃令邊郡非帥府並酌條制定釀酒數諸將并城寨止許於官務寄釀崇寧二年知漣水軍錢景允言建立學舍請以承買醋坊錢給用詔常平司計無害公費如所請仍令他路準行之初元祐臣僚請罷榷醋戶部謂本無禁文後翟思請以諸郡醋坊日息用餘悉歸常平至是景允有請故令常平計之十月諸路官監酒直上者升增錢二中下增一以充學費餘裨轉運司歲用大觀四年以兩浙轉運司之請官監鬻糟錢別立額比較又詔諸郡榷酒之地入出酒米並別遣倉官賣醋毋得越郡城五里外凡縣鎮村並禁其息悉歸轉運司舊屬常平者如故政和二年淮南發運副使董正封言杭州都酒務甲於諸路治平前歲課三十萬緡今不過二十萬請令分務為三更置比較務二毋增官吏兵匠仍請本路諸郡並增務比較從之四年兩浙轉運司亦請置務比較定課額釀酒收息以增虧為賞罰詔酒務官二員者分兩務三員者復增其一員雖多毋得過四務內有官雖多而課息不廣者聽如舊是歲以湖南路諸務糟酵錢分入提舉司令斤增錢三為直達糧綱水工之費立酒匠闕聽選試清務廂軍之法清務者本州選刺供踏麴爨蒸之役闕則募人以充宣和二年公使庫假用米麴及因耗官課者以坐贓罪之監官移替三年發運使陳遘奏江淮等路官監酒直上者升權增錢五次增三為江浙新復州縣之用其後尚書省請令他路悉行之詔如其請所收率十之三以給漕計餘輸大觀庫五年罷夔路榷酤未幾復舊以轉運司言新邊城寨藉以供億故也六年在任官以奉酒抑賣坊戶轉鬻者論以違制律先是政和末嘗詔毋得令人置肆以鬻今併禁之諸路增酒錢如元豐法悉充上供為戶部用毋入轉運司七年諸路鬻醋息率十五為公使餘如鈔旁法令提刑司季具儲備之數毋得移用靖康元年兩浙路酒價屢增較熙豐幾倍而歲稔米麴直賤民規利輕冒法遂令罷所增價渡江後屈於養兵隨時增課名目雜出或主於提刑或領於漕司或分隸於經總制司惟恐軍資有所未裕建炎三年總領四川財賦趙開遂大變酒法自成都始先罷公帑賣供給酒即舊撲買坊場所置隔釀設官主之民以米入官自釀斛輸錢三十頭子錢二十二明年遍下其法於四路歲遞增至六百九十餘萬緡凡官槽四百所私店不預焉於是東南之酒額亦日增矣四年以米麴價高詔上等升增二十文下等升增十八文俟米麴價平依舊紹興元年兩浙酒坊於買撲上添淨利錢五分季輸送戶部又增諸酒錢上升二十文下十文其諸州軍賣酒虧折隨宜增價一分州用一分漕計一分隸經制司先是酒有定價每增須上請是後郡縣始自增而價不一矣五年令諸州酒不以上下升增五文隸總制司六年以紹興二年以後三年中一年中數立額其增羡給郡縣用罷四川州軍縣鎮酒官百七員其酒息微處並罷之七年以戶部尚書章誼等言行在置贍軍酒庫四川制置使胡世將即成都潼川資普廣安立清酒務許民買撲歲為錢四萬八千餘緡自趙開行隔槽法增至十四萬六千餘緡紹興元年及世將改官監所入又倍自後纍增至五十四萬八千餘緡紹興二十五年而外邑及民戶坊場又為三十九萬緡淳熙二年然隔槽之法始行聽就務分槽醞賣官計所入之米而收其課若未病也行之既久醞賣虧久則責入米之家認輸不復核其米而第取其錢民始病矣十年罷措置贍軍酒庫所官吏悉歸戶部以左曹郎中兼領以點檢贍軍酒庫為名與本路漕臣共其事十五年弛夔路酒禁以南北十一庫並充贍軍激賞酒庫隸左右司十七年省四川清酒務監官成都府二員興元遂寧府漢綿邛蜀彭簡果州富順監并漢州綿竹縣各一員二十一年詔諸軍買撲酒坊監官賞格依舊四萬三萬貫已上場務增及一倍減一年磨勘二倍減二年磨勘三倍減三年磨勘四倍減四年磨勘二萬一萬貫已上場務增及一倍減三季磨勘二倍減一年磨勘三倍減三年磨勘七千貫以上場務增及一倍升三季名次二倍減一年磨勘三倍減一年半磨勘四倍減二年磨勘七千貫以下場務增及一萬貫減一年磨勘二萬貫減二年磨勘三萬貫減三年磨勘四萬貫減四年磨勘二十五年罷諸路漕司寄造酒二十七年以隔槽酒擾民許買撲以便民罷官監後復置之三十年以點檢措置贍軍酒庫改隸戶部既而戶部侍郎邵大受等言歲計賴經總制窠名至多今諸路歲虧二百萬皆緣諸州公使庫廣造別置店酤賣以致酒務例皆敗壞詔罷諸州別置酒庫如軍糧酒庫防月庫月樁庫之類并省務寄造酒及帥司激賞酒庫凡未分隸經總制錢處並立額分隸補趁虧額三十一年殿帥趙密以諸軍酒坊六十六歸之戶部見九年同安郡王楊存中罷殿帥復以私撲酒坊九上之歲通收息六十萬緡有奇以十分為率七分輸送行在三分給漕計蓋自軍興以來諸帥擅榷酤之利由是縣官始得資之以佐經費焉孝宗乾道元年以浙東西犒賞庫六十四隸三衙輸課於左藏南庫餘錢充隨年贍軍及造軍器二年詔臨安府安撫司酒庫悉歸贍軍并贍軍諸庫及臨安府安撫司酒務令戶部取三年所收一年中數立額日售錢萬緡歲收本錢一百四十萬息錢一百六十萬麴錢二萬羡餘獻以內藏者又二十萬其後增為五十萬四年立場務官賞格七年以淮西總領周閟言總所庫四安撫司庫五都統司庫十八馬軍司庫一增置行宮庫一共為庫二十九以三年最高年為額其行宮新庫息錢除分認諸處錢及縻費以淨息三分為率一分輸御前酒庫以提領建康府戶部贍軍酒庫為名遂鑄印及改庫名八年知常德府劉邦翰言湖北之民困於酒坊至貧之家不捐萬錢則不能舉一吉凶之禮乃檢乾道重修敕令申嚴抑買之禁淳熙三年詔四川酒課折估困弊可減額錢四十七萬三千五百餘緡令禮部給降度牒六百六十一道補還今歲減數明年於四川合給湖廣總所錢補之寧宗開禧元年知臨安府兼點檢贍軍激賞庫趙善防轉運判官提領戶部犒賞酒庫詹徽之言官吏冗費請諸司官屬兼管明年又以都省言課額失陷依舊辟置初趙開之立隔釀法也蓋以紓一時之急其後行之諸郡國家贍兵郡縣經費率取給於此故雖罷行增減不一而足而其法卒不可廢云坑冶凡金銀銅鐵鉛錫監冶場務二百有一金産商饒歙撫四州南安軍銀産鳳建桂陽三州有三監饒信虔越衢處道褔汀漳南劍韶廣英連恩春十七州建昌邵武南安三軍有五十一場秦隴興元三州有三務銅産饒處建英信汀漳南劍八州南安邵武二軍有三十五場梓州有一務鐵産徐兗相三州有四監河南鳳翔同虢儀蘄黃袁英九州興國軍有十二冶晉磁鳳澧道渠合梅陝耀坊虔汀吉十四州有二十務信鄂連建南劍五州邵武軍有二十五場鉛産越建連英春韶衢汀漳南劍十州南安邵武二軍有三十六場務錫産河南南康虔道賀潮循七州南安軍有九場水銀産秦階商鳳四州有四場朱砂産商宜二州富順監有三場開寶三年詔曰古者不貴難得之貨後代賦及山澤上加侵削下益雕弊每念茲事深疚于懷未能捐金於山豈忍奪人之利自今桂陽監歲輸課銀宜減三分之一民鑄銅為佛像浮圖及人物之無用者禁之銅鐵不得闌出蕃界及化外至道二年有司言定州諸山多銀礦而鳳州山銅礦復出採鍊大獲而皆良焉請置官署掌其事太宗曰地不愛寶當與衆庶共之不許東西川鹽酒商稅課半輸銀帛外有司請令二分入金景德三年詔以非土産罷之天聖中登萊採金歲益數千兩仁宗命奬勸官吏宰相王曾曰採金多則背本趨末者衆不宜誘之景祐中登萊饑詔弛金禁聽民採取俟歲豐復故然是時海內承平已久民間習俗日漸侈靡糜金以飾服器者不可勝數重禁莫能止焉景祐慶曆中屢下詔申敕之語在輿服志大率山澤之利有限或暴發輒竭或採取歲久所得不償其費而歲課不足有司必責主者取盈仁宗英宗每降赦書輒委所在視冶之不發者或廢之或蠲主者所負歲課率以為常而有司有請亦輒從之無所吝故冶之興廢不常而歲課增損隨之皇祐中歲得金萬五千九十五兩銀二十一萬九千八百二十九兩銅五百一十萬八百三十四斤鐵七百二十四萬一千斤鉛九萬八千一百五十一斤錫三十三萬六百九十五斤水銀二千二百斤其後以赦書從事或有司所請廢冶百餘既而山澤興發至治平中或增冶或復故者六十有八而諸州坑冶總二百七十一登萊商饒汀南恩六州金之冶十一登虢秦鳳商隴越衢饒信虔郴衡漳汀泉建褔南劍英韶連春二十三州南安建昌邵武三軍桂陽監銀之冶八十四饒信虔建漳汀南劍泉韶英梓十一州邵武軍銅之冶四十六登萊徐兗鳳翔陝儀邢虢磁虔吉袁信澧汀泉建南劍英韶渠合資二十四州興國邵武二軍鐵之冶七十七越衢信汀南劍英韶春連九州邵武軍鉛之冶三十商虢虔道賀潮循七州錫之冶十六而水銀丹砂州冶與至道天禧之時則一皆置吏主之是歲視皇祐金減九千六百五十六銀增九萬五千三百八十四銅增一百八十七萬鐵錫增百餘萬鉛增二百萬又得丹砂二千八百餘斤獨水銀無增損焉熙寧元年詔天下寶貨坑冶不發而負歲課者蠲之八年令近坑冶坊郭鄉村並淘採烹鍊人並相為保保內及於坑冶有犯知而不糾或停盜不覺者論如保甲法元豐元年諸坑冶金總收萬七百一十兩銀二十一萬五千三百八十五兩銅千四百六十萬五千九百六十九斤鐵五百五十萬一千九十七斤鉛九百十九萬七千三百三十五斤錫二百三十二萬一千八百九十八斤水銀三千三百五十六斤朱砂三千六百四十六斤十四兩有奇先是熙寧七年廣西經略司言雍州右江填乃洞産金請以鄧闢監金場後五年凡得金為錢二十五萬緡闢遷官者再焉元豐四年始以所産薄罷貢而虔吉州界鉛悉禁之七年戶部尚書王存等請復開銅禁各展磨勘年有差是歲坑冶凡一百三十六所領於虞部紹聖元年戶部尚書蔡京奏岑水場銅額寖虧而商虢間苗脉多陝民不習烹採久廢不發請募南方善工詣陝西經畫擇地興冶於是以許天啓同管幹陝西坑冶事元符三年天啓罷領坑冶以其事歸之提刑司初新舊坑冶合為一司而漕司兼領天啓為同管幹欲專其事慮有所牽制乃請川陝京西路坑冶自為一司許檢束州縣刺舉官吏而漕司不復兼坑冶至是中書奏天啓所領首末六歲總新舊銅止收二百六萬餘斤而兵匠等費繁多故罷之崇寧元年提舉江淮等路銅事游經言信州膽銅古坑二一為膽水浸銅工少利多其水有限一為膽土煎銅土無窮而為利寡計置之初宜增本損息浸銅斤以錢五十為本煎銅以八十詔用其言諸路坑冶自川陝京西之外並令常平司同管幹所收息薄而煩官監者如元符紹聖敕立額許民封狀承買四年湖北旺溪金場以歲收金千兩乃置監官廣東漕臣王覺自言嘗領常平講求山澤之利岑水一場去年收銅比祖額增三萬九千一百斤較之常年亦增六十六萬一千斤遂增其秩是歲山澤坑冶名數令監司置籍非所當收者別籍之若弛興廢置移併亦令具注上於虞部大觀二年詔金銀坑發雖告言而方檢視私開淘取者以盜論坑冶舊不隸知縣縣丞者並令兼監賞罰減正官一等有冶地知縣月一行點閲言者論其職在宣導德澤平征賦獄訟不宜為課利走山谷間遂已之八月提舉陝西坑冶司改併入轉運司政和元年張商英言湖北産金非止辰沅靖溪峒其峽州夷陵宜都縣荊南府枝江江陵縣赤湖城至鼎州皆商人淘採之地漕司既乏本錢提舉司買止千兩且無專司定額請置專切提舉買金司有金苗無官監者許遣部內州縣官及使臣掌幹詔提舉官措畫以聞仍於荊南置司廣東漕司復奏端州高明惠州信上立溪場皆宜停閉韶州曹峒場英州銀岡場皆併入英之清溪場惟黃坑場欲權存俟歲終會所入別奏惠州楊梅東坑康州雲烈潮州豐政連州元魚銅坑黃田白寶廣州大利宜祿韶州伍注岑水銅岡循州大佐羅翊英州鍾峒凡十六場請並如舊循之夜明英之竹溪韶之思溪連之同安請更遣攝官從之三年尚書省言陝西路坑冶已遣官提轄措置川路金銀坑冶興發慮失利源詔令陝西措置官兼行川路事坑冶所收金銀銅鉛錫鐵水銀朱砂物數令工部置籍籤注歲半消補上之尚書省自是戶工部尚書省皆有籍鉤考然所憑唯帳狀至有有額而無收有收而無額乃責之縣丞監官及曹部奉行者而更督遞年違負之數九月措置陝西坑冶蔣彝奏本路坑冶收金千六百兩他物有差詔輸大觀西庫彝增秩官屬各減磨勘年四年令監司遣官同諸縣丞遍視坑冶之利為圖籍籤注監司覆實保奏議遣官再覆酌重輕加賞異同脫漏者罪之六年川陝路各置提轄措置坑冶官劉草巳計置萬永州産金一歲收二千四百餘兩特與增秩十二月廣東漕司言本路鐵場坑冶九十二所歲額收鐵二百八十九萬餘斤浸銅之餘無他用詔令官悉市以廣浸仍以諸司及常平錢給本尚書省奏五路坑冶已有提轄措置專司淮南湖北廣東西亦監司兼領其餘路請並令監司領之於是江東西福建兩浙漕臣皆領坑冶七年提舉東南九路坑冶徐禋奏太平瑞應史不絶書今部內山澤坑冶若獲希世珍物及古寶器請赴書藝局上進蓋自政和初京西漕臣王璹奏太和山産水精知桂州王覺奏枕門等處産金及生花金田提轄京西坑冶王景文奏汝州青嶺鎮界産瑪瑙其後湟州界蕃官結彪地內金坑千餘收生熟金四等凡百三十四兩有奇蔡京請宣付史館帥百官表賀故禋復有是請焉是時河北京東西及徐禋所領九路興修坑冶類鑿空擾下抑州縣承額於是降黜河北提轄官遣廉訪使者鄭諶并諸路廉訪悉究陳利病真僞八月中書奏坑冶寖已即緒詔京東西河北路并提舉東南九路坑冶並罷十一月尚書省言徐禋以東南黑鉛留給鼓鑄之餘悉造丹粉鬻以濟用詔諸路常平司以三十萬輸大觀西庫餘從所請明年令諸路鐵倣茶鹽法榷鬻置爐冶收鐵給引召人通市苗脉微者聽民出息承買以所收中賣於官私相貿易者禁之先是元豐六年京東漕臣吳居厚奏徐鄆青等州歲製軍器及上供簡鐵之類數多而利國萊蕪二監鐵少不能給請鐵從官興煽所獲可多數倍自是官榷鐵造器用以鬻於民至元祐罷之其後大觀初入內皇城使裴絢為涇原幹當奏上渭州通判苗沖淑之言石河鐵冶既令民自採鍊中賣於官請禁民私相貿易農具器用之類悉官為鑄造其冶坊已成之物皆以輸官而償其直乃禁毋得私相貿易農具器用勿禁官自賣鐵唯許鑄瀉戶市之政和初臣僚言鹽鐵利均今鹽策推行已備而鐵貨尚未講畫請即冶戶未償之錢收其已鍊之鐵為器鬻之兼京東二監所出尤多河北固鎮等冶並官監其利不資而河東鐵炭最盛若官榷為器以贍一路旁及陝雍利入甚廣且以銷盜鑄之弊又夏人茶山鐵冶既入中國乏鐵為器聞以鹽易鐵錢於邊若官自為器則鐵與錢俱重可伐其謀請榷諸路鐵擇其最盛者可置監設官總之概諸路不越數十處餘止為鑄瀉之地屬之都監或監當官兼領凡農具器用皆官鑄造表以字號官本之餘取息二分以上仍置鐵引以通諸路儲其錢助三路鈔本詔戶部下諸路漕臣詳度會次年廣東路請以可監之地如舊法收其淨利苗脉微者召人承買官不榷取遂并諸路詳度之旨不行至是臣僚復以為言故嚴貿易之禁而鐵利盡榷於官然農具器用從民鑄造卒如舊法四月廣東廉訪黃烈等言廣惠英康韶州興慶府政和中寶貨司立坑冶金銀等歲額或苗脉微或無人承買而浮冗之人虛託其名發毀民田騷動邀賂詔政和六年所立額並罷舊有苗脉可給歲課者如故十一月復諸路元罷提舉坑冶官其江南路仍令江西漕臣劉蒙同措置宣和元年石泉軍江溪沙磧麩金許民隨金脉淘採立課額或以分數取之十月復置相州安陽縣銅冶村監官先是詔留邢州綦村磁州固鎮兩冶餘創置冶並罷而常平司謂銅冶村近在河北得利多故有是命六年詔坑冶之利二廣為最比歲所入稽之熙豐十不逮一令漕臣鄭良提舉經畫分任官屬典掌計置取元豐以來歲入多數立額定為常賦坑冶司毋預焉時江淮荊浙等九路坑冶凡二百四十五鑄錢院監十八歲額三百餘萬緡五月詔坑冶舊隸轉運司者如熙豐紹聖法崇寧以後隸常平司者如崇寧法其江淮等路坑冶官屬如熙豐員數餘路官屬並罷仍令中書選提點官靖康元年諸路坑冶苗礦既微或舊有今無悉令蠲損凡民承買金場並罷宋初舊有坑冶官置場監或民承買以分數中賣於官初隸諸路轉運司本錢亦資焉其物悉歸之內帑崇寧已後廣搜利穴榷賦益備凡屬之提舉司者謂之新坑冶用常平息錢與剩利錢為本金銀等物往往皆積之大觀庫自蔡京始政和間數罷數復然告發之地多壞民田承買者立額重或舊有今無而額不為損欽宗即位詔悉罷之南渡坑冶廢興不常歲入多寡不同今以紹興三十二年金銀銅鐵鉛錫之冶廢興之數一千一百七十及乾道二年鑄錢司比較所入之數附之湖南廣東江東西金冶二百六十七廢者一百四十二湖南廣東福建浙東廣西江東西銀冶一百七十四廢者八十四潼川湖南利州廣東浙東廣西江東西福建銅冶一百九廢者四十五舊額歲七百五萬七千二百六十斤有奇乾道歲入二十六萬三千一百六十斤有奇淮西夔州成都利州廣東福建浙東廣西江東西鐵冶六百三十八廢者二百五十一舊額歲二百一十六萬二千一百四十斤有奇乾道歲入八十八萬三百斤有奇淮西湖南廣東福建浙東江西鉛冶五十二廢者一十五舊額歲三百二十一萬三千六百二十斤有奇乾道歲入一十九萬一千二百四十斤有奇湖南廣東江西錫冶一百一十八廢者四十四舊額歲七十六萬一千二百斤有奇乾道歲入二萬四百五十斤有奇宋初諸冶外隸轉運司內隸金部崇寧二年始隸右曹建炎元年復隸金部轉運司隆興二年坑冶監官歲收買金及四千兩銀及十萬兩銅錫及四十萬斤鉛及一百二十萬斤者轉一官守倅部內歲比祖額增金一萬兩銀十萬兩銅一百萬斤亦轉一官令丞歲收買及監官格內之數減半推賞慶元二年宰執言封樁銀數比淳熙末年虧額幾百五十萬今務場所入歲不滿三十萬而歲奉三宮及冊寶費約四十萬恐愈侵銀額欲權以三分為率一分支銀二分支會子上曰善端平三年赦曰諸路州縣坑冶興發在觀寺祠廟公宇居民墳地及近墳園林地者在法不許人告亦不得受理訪聞官司利於告發更不究實多致擾害自今許人戶越訴官吏并訟者重置典憲及有坑冶停閉苗脉不發之所州縣勒令坑戶虛認歲額提點鑄錢司核實追正礬唐於晉州置平陽院以收其利開成三年度支奏罷之乃以礬山歸之州縣五代以來復創務置官吏宋因之白礬出晉慈坊州無為軍及汾州之靈石縣録礬出慈隰州及池州之銅陵縣皆設官典領有鑊戶鬻造入官市晉汾慈州礬以一百四十斤為一馱給錢六千隰州礬馱減三十斤給錢八百博賣白礬價晉州每馱二十一貫五百慈州又增一貫五百緑礬汾州每馱二十四貫五百慈州又增五百隰州每馱四貫六百散賣白礬坊州斤八十錢汾州百九十二錢無為軍六十錢緑礬斤七十錢建隆中詔商人私販幽州礬官司嚴捕沒入之繼定私販河東幽州礬一兩以上私鬻礬三斤及盜官礬至十斤者棄市開寶三年增私販至十斤私鬻及盜滿五十斤者死餘論罪有差太平興國初以歲鬻不充乃詔私販化外礬一兩以上及私鬻至十斤並如律論決再犯者悉配流還復犯者死淳化元年有司言慈礬滯積小民多於山谷僻奧之地私鬻侵利而緑礬價賤不宜與晉礬均法詔同犯私茶罪賞先是建隆二年命左諫議大夫劉熙古詣晉州制置礬許商人輸金銀布帛絲綿茶及緡錢官償以礬凡歲增課八十萬貫太平興國初歲博緡錢金銀計一十二萬餘貫茶計三萬餘貫端拱初銀絹帛二萬餘貫茶計十四萬貫至是言者謂礬直酬以見錢商人以陳茶入博有利豪商無資國用詔今後惟聽金銀見錢入博至道中白礬歲課九十七萬六千斤緑礬四十萬五千餘斤鬻錢一十七萬餘貫真宗末白礬增二十萬一千餘斤緑礬增二萬三千餘斤鬻錢增六萬九千餘貫天聖以來晉慈二州礬募民鬻之季鬻礬一盆多者千五六百斤少者六七百斤四分輸一入官餘則官市之無為軍亦置務鬻礬後聽民自鬻官置場售之私售礬禁如私售茶法六年詔弛兩蜀榷礬之禁時河東礬積益多復聽入金帛芻粟芻粟虛估高商人利於入中麟州粟斗實直錢百虛估增至三百六十礬之出官為錢二萬一千五百才易粟六石計粟實直錢才六千而礬一馱已費本錢六千縣官徒有榷礬之名其實無利嘉祐六年罷入芻粟復令入緡錢礬以百四斤為一馱入錢京師榷貨務者為錢十萬七千入錢麟府州者又減三千自是商賈不得專其利矣皇祐中晉慈入礬二百二十七萬三千八百斤以易芻粟之類為緡錢十三萬六千六百無為軍礬售緡錢三萬三千一百治平中晉慈礬損一百九萬六千五百四斤無為軍礬售錢歲有常課發運使領之視皇祐數無增損隰州礬至是入三十九萬六千斤亦以易緡錢助河東歲糴熙寧元年命河東轉運司經畫礬鹽遺利李師中言官積礬三百斤走鹵消耗恐後為棄物詔令商人入中糧草即以償之三年罷潞州交子務以防中納糧草算請礬鹽故也知慶州王廣淵言河東礬為利源之最請河東京東河北陝西別立礬法專置提舉官詔遣光祿丞楊蟠會議以聞蟠言坊州産礬官雖置場而商多私售請置鑊戶定其數許於陝西北界黃河東限潼關南及京西均房襄鄧金州光化軍令鑊戶遞相保察或私賣越界禁如私白礬法仍增官獲私礬輒以夾雜減斤重之法從之元豐元年定畿內及京東西五路許賣晉隰礬陝西自潼關以西黃河以南達于京西均房襄鄧金州則售坊州礬礬之出於西山保霸州者售於成都梓州路出無為軍者餘路售之私鬻與越界者如私礬法自熙寧初礬法始變歲課所入元年為錢三萬六千四百緡有奇併增者五年乃取熙寧六年中數定以十八萬三千一百緡有奇為新額至元豐六年課增至三十三萬七千九百緡而無為軍礬歲課一百五十萬斤用本錢萬八千緡自治平至元豐數無增損元祐元年戶部言商旅販礬舊聽其便乃者發運司請用河東例令染肆鋪戶連保豫買頗致抑擾詔如舊制元符三年崇儀使林像奏禁河北土礬非便若即河北産礬地置場官買增價出之罷運晉礬則官獲淨利無運載之勞民資地産省犯法之弊詔下戶部初熙豐間東南九路官自賣礬發運司總之元祐初通商紹聖復熙豐之制大觀元年定河北河東礬額各二十四萬緡淮南九萬緡罷官賣從商販而河東河北淮南各置提舉官政和初復官鬻罷商販如舊制淮南礬事司罷歸發運司上供礬錢責以三萬三千一百緡為額三年有司奏減河北河東并淮南礬額計十六萬緡四年礬額復循大觀之制五年河北河東緑礬聽客販於東南九路民間見用者依通商地籍之聽買新引帶賣大率循倣鹽法宣和中舉比較增虧賞罰未幾以擾民罷建炎三年措置財用黃潛厚奏許商人販淮南礬入東南諸路聽輸錢行在而持引據赴場支礬紹興十一年以鑄錢司韓球言撫州青膽礬斤錢一百二十文土礬斤三十文省鉛山場所産品高於撫青膽礬斤作一百五十文黃礬斤作八十文二十九年以淮西提舉司言取紹興二十四年至二十八年所收礬錢一年中數四萬一千五百八十五緡為定額其他産礬之所若潭州瀏陽之永興場韶州之岑水場皆置場給引歲有常輸惟漳州之東去海甚邇大山深阻雖有采礬之利而潮梅汀贛四州之姦民聚焉其魁傑者號大洞主小洞主土著與負販者皆盜賊也香宋之經費茶鹽礬之外惟香之為利博故以官為市焉建炎四年泉州抽買乳香一十三等八萬六千七百八十斤有奇詔取赴榷貨務打套給賣陸路以三千斤水路以一萬斤為一綱紹興元年詔廣南市舶司抽買到香依行在品答成套召人算請其所售之價每五萬貫易以輕貨輸行在六年知泉州連南夫奏請諸市舶綱首能招誘舶舟抽解物貨纍價及五萬貫十萬貫者補官有差大食蕃客囉辛販乳香直三十萬緡綱首蔡景芳招誘舶貨收息錢九十八萬緡各補承信郎閩廣舶務監官抽買乳香每及一百萬兩轉一官又招商入蕃興販舟還在罷任後亦依此推賞然海商入蕃以興販為招誘僥幸者甚衆淳熙二年郴桂寇起以科買乳香為言詔湖南路見有乳香並輸行在榷貨務免科降十二年分撥榷貨務乳香於諸路給賣每及一萬貫輸送左藏南庫十五年以諸路分賣乳香擾民令止就榷貨務招客算請紹熙三年以福建舶司乳香虧數詔依前博買開禧三年住博買嘉定十二年臣僚言以金銀博買泄之遠夷為可惜乃命有司止以絹帛錦綺瓷漆之屬博易聽其來之多寡若不至則任之不必以為重也
