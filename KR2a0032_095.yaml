body:
  text: 宋史卷九十五志第四十八河渠五漳河滹沱河御河塘濼緣邊諸水河北諸水岷江漳河源於西山由磁洺州南入冀州新河鎮與胡盧河合流其後變徙入于大河神宗熙寧三年詔程昉同河北提點刑獄王廣廉相視四年開修役兵萬人袤一百六十里帝因與大臣論財用文彥博曰足財用在乎安百姓安百姓在乎省力役且河久不開不出於東則出於西利害一也今發夫開治徙東從西何利之有王安石曰使漳河不由地中行則或東或西為害一也治之使行地中則有利而無害勞民先王所謹然以佚道使民雖勞不可不勉會京東河北大風三月詔曰風變異常當安靜以應天災漳河之役妨農來歲為之未晚中書格詔不下尋有旨權令罷役程昉憤恚遂請休退朝廷令以都水丞領淤田事於河上五月御史劉摯言昉等開修漳河凡用九萬夫物料本不預備官私應急勞費百倍逼人夫夜役踐蹂田苗發掘墳墓殘壞桑柘不知其數愁怨之聲流播道路而昉等妄奏民間樂於工役河北廂軍剗刷都盡而昉等仍乞於洺州調急夫又欲令役兵不分番次其急切擾攘至於如此乞重行貶竄以謝疲民中丞楊繪亦以為言王安石為昉辨説甚力後卒開之五年工畢昉與大理寺丞李宜之知洺州黃秉推恩有差七年六月知冀州王慶民言州有小漳河向為黃河北流所壅今河已東乞開濬詔外都水監相度而已滹沱河源於西山由真定深州乾寧與御河合流神宗熙寧元年河水漲溢詔都水監河北轉運司疏治六年深州祁州永寧軍修新河八年正月發夫五千人並胡盧河增治之元豐四年正月北外都水丞陳祐甫言滹沱自熙寧八年以後泛濫深州諸邑為患甚大諸司纍相度不決謂其下流舊入邊吳宜子淀最為便順而屯田司懼填淤塘濼煩文往復無所適從昨差官計之若障入胡盧河約用工千六百萬若治程昉新河約用工六百萬若依舊入邊吳等淀約用工二十九萬其工費固已相遠乞嚴立期會定歸一策詔河北屯田轉運司同北外都水丞司相視五年八月癸酉前河北轉運副使周革言熙寧中程昉於真定府中渡創繫浮梁增費數倍既非形勢控扼請歲八九月易以版橋至四五月防河即拆去權用船渡從之御河源出衛州共城縣百門泉自通利乾寧入界河達于海神宗熙寧二年九月劉彝程昉言二股河北流今已閉塞然御河水由冀州下流尚當疏導以絶河患先是議者欲於恩州武城縣開御河約二十里入黃河北流故道下五股河故命彝昉相度而通判冀州王庠謂第開見行流處下接胡盧河尤便近彝等又奏如庠言雖於河流為順然其間漫淺沮洳費工猶多不若開烏欄堤東北至大小流港橫截黃河入五股河復故道尤便遂命河北提舉糴便糧草皮公弼提舉常平王廣廉按視二人議協詔調鎮趙邢洺磁相州兵夫六萬濬之以寒食後入役三年正月韓琦言河朔纍經災傷雖得去年夏秋一稔瘡痍未復而六州之人奔走河役遠者十一二程近者不下七八程比常歲勞費過倍兼鎮趙兩州舊以次邊未嘗差夫一旦調發人心不安又於寒食後入役比滿一月正妨農務詔河北都轉運使劉庠相度如可就寒食前入役即亟興工仍相度最遠州縣量減差夫而輟修塘堤兵千人代其役二月琦又奏御河漕運通流不宜減大河夫役於是止令樞密院調兵三千並都水監卒二千三月又益發壯城兵三千仍詔提舉官程昉等促迫功限六月河成詔昉赴闕遷宮苑副使四年命昉為都大提舉黃御等河八年昉與劉璯言衛州沙河湮沒宜自王供掃開濬引大河水注之御河以通江淮漕運仍置斗門以時啓閉其利有五王供危急免河勢變移而別開口地一也漕舟出汴橫絶沙河免大河風濤之患二也沙河引水入于御河大河漲溢沙河自有限節三也御河漲溢有斗門啓閉無衝注淤塞之弊四也德博舟運免數百里大河之險五也一舉而五利附焉請發卒萬人一月可成從之九年秋昉奏畢功中書欲論賞帝令河北監司案視保明大名安撫使文彥博覆實十月彥博言去秋開舊沙河取黃河行運欲通江淮舟楫徹於河北極邊自今春開口放水後來漲落不定所行舟皆輕載有害無利枉費功料極多今御河上源止是百門泉水其勢壯猛至衛州以下可勝三四百斛之舟四時行運未嘗阻滯隄防不至高厚亦無水患今乃取黃河水以益之大即不能吞納必致決溢小則緩漫淺澀必致淤澱凡上下千餘里必難歲歲開濬況此河穿北京城中利害易覩今始初冬已見阻滯恐年歲間反壞久來行運儻謂通江淮之漕即尤不然自江浙淮汴入黃河順流而下又合於御河大約歲不過一百萬斛若自汴順流徑入黃河達于北京自北京和雇車乘陸行入倉約用錢五六千緡却於御河裝載赴邊城其省工役物料及河清衣糧之費不可勝計又去冬外監丞欲於北京黃河新堤開置水口以通行運其策尤疏此乃熙寧四年秋黃河下注御河之處當時朝廷選差近臣督役修塞所費不資大名恩冀之人至今瘡痍未平今奈何反欲開口導水耶都水監雖令所屬相視而官吏恐忤建謀之官止作遷延回報謂俟修固御河堤防方議開置河口況御河堤道僅如蔡河之類若欲吞納河水須如汴岸增修猶恐不能制蓄乞別委清強官相視利害並議可否又言今之水官尤為不職容易建言僥幸恩賞朝廷便為主張中外莫敢異議事若不效都無譴罰臣謂更當選擇其人不宜令狂妄輩橫費生民膏血已而都水監言運河乞置雙閘例放舟船實便與彥博所言不同十二月命知制誥熊本與都水監河北轉運司官相視本奏河北州軍賞給茶貨以至應接沿邊榷場要用之物並自黃河運至黎陽出卸轉入御河費用止於客軍數百人添支而已向者朝廷曾賜米河北亦於黎陽或馬陵道口下卸倒裝轉致費亦不多昨因程昉等擘畫於衛州西南循沙河故迹決口置閘鑿堤引河以通江淮舟楫而實邊郡倉廩自興役至畢凡用錢米功料二百萬有奇今後每歲用物料一百一十六萬廂軍一千七百餘人約費錢五萬七千餘緡開河行水才百餘日所過船六百二十五而衛州界御河淤淺已及三萬八千餘步沙河左右民田淹浸者幾千頃所免租稅二千貫石有餘有費無利誠如議者所論然尚有大者衛州居御河上遊而西南當王供向著之會所以捍黃河之患者一堤而已今穴堤引河而置閘之地才及隄身之半詢之土人云自慶曆八年後大水七至方其盛時遊波有平堤者今河流安順三年矣設復礬水暴漲則河身乃在閘口之上以湍悍之勢而無隄防之阻泛濫衝溢下合御河臣恐墊溺之禍不特在乎衛州而瀕御河郡縣皆罹其患矣夫此河之興一歲所濟船其數止此而萌每歲不測之患積無窮不資之費豈陛下所以垂世裕民之意哉臣博采衆論究極利病咸以謂葺故堤堰新口存新閘而勿治庶可以銷淤澱決溢之患而省無窮之費萬一他日欲由此河轉粟塞下則暫開亟止或可紓飛挽之勞未幾河果決衛州元豐五年提舉河北黃河堤防司言御河狹隘堤防不固不足容大河分水乞令綱運轉入大河而閉截徐曲既從之矣明年戶部侍郎蹇周輔復請開撥以通漕運及令商旅舟船至邊是時每有一議朝廷輒下水官相度或作或輟迄莫能定大抵自小吳掃決大河北流御河數為漲水所冒亦或湮沒哲宗紹聖三年四月河北都轉運使吳安持始奏大河東流御河復出詔委前都水丞李仲提舉開導徽宗崇寧元年冬詔侯臨同北外都水丞司開臨清縣埧子口增修御河西堤高三尺並計度西堤開置斗門決北京恩冀滄州永靜軍積水入御河枯源明年秋黃河漲入御河行流浸大名府館陶縣敗廬舍復用夫七千役二十一萬餘工修西堤三月始畢漲水復壞之政和五年閏正月詔於恩州北增修御河東堤為治水隄防令京西路差借來年分溝河夫千人赴役於是都水使者孟揆移撥十八掃官兵分地步修築又取棗強上掃水口以下舊堤所管榆柳為樁木塘濼緣邊諸水所聚因以限遼河北屯田司緣邊安撫司皆掌之而以河北轉運使兼都大制置凡水之淺深屯田司季申工部其水東起滄州界拒海岸黑龍港西至乾寧軍沿永濟河合破船淀灰淀方淀為一水衡廣一百二十里縱九十里至一百三十里其深五尺東起乾寧軍西信安軍永濟渠為一水西合鵝巢淀陳人淀燕丹淀大光淀孟宗淀為一水衡廣一百二十里縱三十里或五十里其深丈餘或六尺東起信安軍永濟渠西至霸州莫金口合水汶淀得勝淀下光淀小蘭淀李子淀大蘭淀為一水衡廣七十里或十五里或六里其深六尺或七尺東北起霸州莫金口西南保定軍父母寨合糧料淀回淀為一水衡廣二十七里縱八里其深六尺霸州至保定軍並塘岸水最淺故咸平景德中契丹南牧以霸州信安軍為歸路東南起保安軍西北雄州合百世淀黑羊淀小蓮花淀為一水衡廣六十里縱二十五里或十里其深八尺或九尺東起雄州西至順安軍合大蓮花淀洛陽淀牛橫淀康池淀疇淀白羊淀為一水衡廣七十里縱三十里或四十五里其深一丈或六尺或七尺東起順安軍西邊吳淀至保州合齊女淀勞淀為一水衡廣三十餘里縱百五十里其深一丈三尺或一丈起安肅廣信軍之南保州西北畜沈苑河為塘衡廣二十里縱十里其深五尺淺或三尺曰沈苑泊自保州西合雞距泉尚泉為稻田方田衡廣十里其深五尺至三尺曰西塘泊自何承矩以黃懋為判官始開置屯田築堤儲水為阻固其後益增廣之凡並邊諸河若滹沱胡盧永濟等河皆匯于塘天聖以後相循而不廢仍領于沿邊屯田司而當職之吏各從其所見或曰有兵將在契丹來云無所事塘自邊吳淀西望長城口尚百餘里皆山阜高仰水不能至契丹騎馳突得此路足矣塘雖距海亦無所用夫以無用之塘而廢可耕之田則邊穀貴自困之道也不如勿廣以息民為根本或者則曰河朔幅員二千里地平夷無險阻契丹從西方入放兵大掠由東方而歸我嬰城之不暇其何以禦之自邊吳淀至泥姑海口綿亙七州軍屈曲九百里深不可以舟行淺不可以徒涉雖有徑兵不能度也東有所阻則甲兵之備可以專力于其西矣孰謂無益論者自是分為兩歧而朝廷以契丹出沒無常阻固終不可以廢也仁宗明道二年劉平自雄州徙知成德軍奏曰臣嚮為沿邊安撫使與安撫都監劉志嘗陳備邊之略臣今徙真定路由順安安肅保定州界自邊吳淀望趙曠川長城口乃契丹出入要害之地東西不及一百五十里臣竊恨聖朝七十餘年守邊之臣何可勝數皆不能為朝廷預設深溝高壘以為扼塞臣聞太宗朝嘗有建請置方田者今契丹國多事兵荒相繼我乘此以引水植稻為名開方田隨田塍四面穿溝渠縱廣一丈深二丈鱗次交錯兩溝間屈曲為徑路才令通步兵引曹河鮑河徐河雞距泉分注溝中地高則用水車汲引灌溉甚便願以劉志知廣信軍與楊懷敏共主其事數年之後必有成績帝遂密敕平與懷敏漸建方田侍禁劉宗言又奏請種木于西山之麓以法榆塞云可以限契丹也後劉平去真定懷敏猶領屯田司塘日益廣至吞沒民田蕩溺丘墓百姓始告病乃有盜決以免水患者懷敏奏立法依盜決堤防律景祐二年懷敏知雄州又請立木為水則以限盈縮寶元元年十一月己未河北屯田司言欲於石冢口導永濟河水以注緣邊塘泊請免所經民田稅從之時歲旱塘水涸懷敏慮契丹使至測知其廣深乃壅界河水注之塘復如故慶曆二年三月己巳契丹遣使致書求關南十縣且曰營築長堤填塞隘路開決塘水添置邊軍既潛稔於猜嫌慮難敦於信睦四月庚辰復書曰營築堤埭開決陂塘昨緣霖潦之餘大為衍溢之患既非疏導當稍繕防豈蘊猜嫌以信睦遼使劉六符嘗謂賈昌朝曰南朝塘濼何為者哉一葦可杭投箠可平不然決其堤十萬土囊遂可踰矣時議者亦請涸其地以養兵帝問王拱辰對曰兵事尚詭彼誠有謀不應以語敵此六符誇言爾設險守國先王不廢且祖宗所以限遼騎也帝深然之七月契丹復議和好約兩界河淀已前開畎者並依舊外自今已後各不添展其見堤堰水口逐時決泄壅塞量差兵夫取便修疊疏導非時霖潦別至大段漲溢並不在關報之限是歲劉宗言知順安軍上言屯田司濬塘水漂招賢鄉六千戶五年七月初與契丹約罷廣兩界塘淀約既定朝廷重生事自是每邊臣言利害雖聽許必戒之以毋張皇使契丹有詞而楊懷敏獨治塘益急是月懷敏密奏曰前轉運使沈邈開七級口泄塘水臣已亟塞之知順安軍劉宗言閉五門幞頭港下赤大渦柳林口漳河水不使入塘臣已復通之令注白羊淀矣邈宗言朋黨沮事如此不譴誅無以懲後詔從懷敏奏自今有妄乞改水口者重責之嘉祐中御史中丞韓絳言宣祖已上本籍保州懷敏廣塘水侵皇朝遠祖墳近聞詔旨以錢二百千賜本宗使易葬此虧薄國體尤甚物論駭嘆願請州縣屏水患而已知雄州趙滋言屯田司當徐河間築堤斷水塘堤具存可覆視也宜開水竇六十尺修石限以節之咸可其奏八年河北提點刑獄張問言視八州軍塘出土為堤以畜西山之水涉夏河溢而民田無患亦施行焉神宗熙寧元年正月復汾州西河濼濼舊在城東圍四十里歲旱以溉民田雨以瀦水又有蒲魚茭芡之利可給貧民前轉運使王沿廢為田人不以為便至是知雜御史劉述請復之是歲又遣程昉諭邊臣營治諸濼以備守禦五年東頭供奉官趙忠政言界河以南至滄州凡二百里夏秋可徒涉遇冬則冰合無異平地請自滄州東接海西抵西山植榆柳桑棗數年之間可限契丹然後施力耕種益出租賦以助邊儲詔程昉察視利害以聞六年五月帝與王安石論王公設險守國安石曰周官亦有掌固之官但多侵民田恃以為國亦非計也太祖時未有塘泊然契丹莫敢侵軼他日樞密院官言程昉放滹沱水大懼填淤塘濼失險固之利安石謂滹沱舊入邊吳淀新入洪城淀均塘濼也何昔不言而今言乎蓋安石方主昉等故其論如此六年十二月癸酉命河北同提點制置屯田使閻士良專興修朴樁口增灌東塘淀濼先是滄州北三堂等塘濼為黃河所注其後河改而濼塞程昉嘗請開琵琶灣引河水而功不成至是士良請堰水絶御河引西塘水灌之故有是命七年六月丁丑河北沿邊安撫司上制置沿邊浚陂塘築堤道條式圖請付邊郡屯田司又言於沿邊軍城植柳蒔麻以備邊用並從之九年六月高陽關言信安乾寧塘濼昨因不收獨流決口至今乾涸於是命河北東西路分遣監司視廣狹淺深具圖本上十年正月甲子詔比修築河北破缺塘堤收匱水勢其信安軍等處因塘水減涸退出田土已召人耕佃者復取之元豐三年詔諭邊臣曰比者契丹出沒不常不可全恃信約以為萬世之安況河朔地勢坦平略無險阻殆非前世之比惟是塘水實為礙塞卿等當體朕意協力增修自非地勢高仰人力所不可施者皆在滋廣用謹邊防蓋功利近在目前而不為良可惜也六年十二月定州路安撫使韓絳言定州界西自山麓東接塘淀綿地百餘里可瀦水設險詔以引水灌田陂為名哲宗元祐中大臣欲回河東流者皆以北流壞塘濼為言事見前篇徽宗大觀二年十二月詔曰瀦水為塘以備泛濫留屯營田以實塞下國家設官置吏專總其事州縣習玩歲久隳壞其令屯田司循祖宗以來塘堤故迹修治之毋得增益生事大抵河北塘濼東距海西抵廣信安肅深不可涉淺不可舟故指為險固之地其後淤澱乾涸不復開濬官司利於稻田往往泄去積水自是堤防壞矣河北諸水有通轉餉者有為方田限遼人者太宗太平興國六年正月遣八作使郝守濬分行河道抵于遼境者皆疏導之又於清苑界開徐河雞距河五十里入白河自是關南之漕悉通濟焉端拱二年以左諫議大夫陳恕為河北東路招置營田使魏羽為副使右諫議大夫樊知古為河北西路招置營田使索湘為副使欲大興營田也先是自雄州東際于海多積水契丹患之未嘗敢由此路入每歲數擾順安軍議者以為宜度地形高下因水陸之便建阡陌濬溝洫益樹五稼所以實邊廩而限契丹雍熙後數用兵歧溝君子館敗衄之後河朔之民農桑失業多間田且戍兵增倍故遣恕等經營之恕密奏戍卒皆墯遊仰食縣官一旦使冬被甲兵春執耒耜恐變生不測乃詔止令葺營堡營田之議遂寢淳化二年從河北轉運使請自深州新寨鎮開新河導胡盧河分為一派凡二百里抵常山以通漕運胡盧河源於西山始自冀州新河鎮入深州武強縣與滹沱河合流其後變徙入大河至神宗熙寧中內侍程昉請開決引水入新河故道詔本路遣官按視永靜軍判官林伸東光縣令張言舉言新河地形高仰恐害民田昉言地勢最順宜無不便乃復遣劉璯李直躬考實而璯等卒如昉言伸等坐貶官四年春詔六宅使何承矩等督戍兵萬八千人自霸州界引滹沱水灌稻為屯田用實軍廩且為備禦焉初臨津令黃懋上封事盛稱水田之利乃以承矩洎內供奉官閻承翰殿直張從古同制置河北緣邊屯田事仍以懋為大理寺丞充屯田判官其所經畫悉如懋奏真宗咸平四年如靜戎軍王能請自薑女廟東決鮑河水北入閻臺淀又自靜戎之東引北注三臺小李村其水溢入長城口而南又壅使北流而東入于雄州五年順安軍兵馬都監馬濟復請自靜戎軍東擁鮑河開渠入順安軍又自順安軍之西引入威虜軍置水陸營田於渠側濟等言役成可以達糧漕隔遼騎帝許之獨鹽臺淀稍高恐決引非便不從其議因詔莫州部署石普並護其役踰年功畢帝曰普引軍壁馬村以西開鑿深廣足以張大軍勢若邊城壕溝悉如此則遼人倉卒難馳突而易追襲矣其年河北轉運使耿望開鎮州常山鎮南河水入洨河至趙州有詔褒之三月西京左藏庫使舒知白請於泥姑海口章口復置海作務造舟令民入海捕魚因偵平州機事異日王師征討亦可由此進兵以分敵勢先是置船務以近海之民與遼人往還遼人嘗泛舟直入千乘縣亦疑有鄉導之者故廢務至是令轉運使條上利害既而以為非便罷之景德元年北面都鈐轄閻承翰自嘉山東引唐河三十二里至定州釃而為渠直蒲陰縣東六十二里會沙河徑邊吳泊遂入于界河以達方舟之漕又引保州趙彬堰徐河水入雞距泉以息挽舟之役自是朔方之民灌溉饒益大蒙其利矣八月詔滄州乾寧軍謹視斗門水口壅潮水入御河東塘堰以廣溉廕四年五月知雄州李允則決渠為水田帝以渠接界河罷之因下詔曰頃修國好聽其盟約不欲生事姑務息民自今邊城止可修葺城壕其餘河道不得輒有濬治大中祥符七年四月涇原都鈐轄曹瑋言渭北有古池連帶山麓今濬為渠令民導以溉田六月知永興軍陳堯咨導龍首渠入城民庶便之並詔嘉奬天禧末諸州屯田總四千二百餘頃而河北屯田歲收二萬九千四百餘石保州最多逾其半焉江淮兩浙承偽制皆有屯田克復後多賦與民輸租第存其名在河北者雖有其實而歲入無幾利在畜水以限遼騎而已仁宗天聖四年閏五月陝西轉運使王博文等言準敕相度開治解州安邑縣至白家場永豐渠行舟運鹽經久不至勞民按此渠自後魏正始二年都水校尉元清引平坑水西入黃河以運鹽故號永豐渠周齊之間渠遂廢絶隋大業中都水監姚暹決堰濬渠自陜郊西入解縣民賴其利及唐末至五代亂離迄今湮沒水甚淺涸舟楫不行詔三司相度以聞神宗即位志在富國故以劭農為先熙寧元年六月詔諸路監司比歲所在陂塘堙沒瀕江墟𣲵浸壞沃壤不得耕宜訪其可興者勸民興之具所增田畝稅賦以聞二年十月權三司使吳充言前宜城令朱紘治平間修復木渠不費公家束薪斗粟而民樂趨之渠成溉田六千餘頃數邑蒙其利詔遷紘大理寺丞知比陽縣或云紘之木渠繞山度溪以行水數勤民而終無功十一月制置三司條例司具農田利害條約詔頒諸路凡有能知土地所宜種植之法及修復陂湖河港或元無陂塘墟𣲵堤堰溝洫而可以創修或水利可及衆而為人所擅有或田去河港不遠為地界所隔可以均濟流通者縣有廢田曠土可糾合興修大川溝瀆淺塞荒穢合行濬導及陂塘堰埭可以取水灌溉若廢壞可興治者各述所見編為圖籍上之有司其土田迫大川數經水害或地勢汙下雨潦所鍾要在修築墟𣲵堤防之類以障水潦或疏導溝洫畎澮以泄積水縣不能辦州為遣官事關數州具奏取旨民修水利許貸常平錢穀給用初條例司奏遣劉彝等八人行天下相視農田水利又下諸路轉運司各條上利害又詔諸路各置相度農田水利官至是以條約頒焉祕書丞侯叔獻言汴岸沃壤千里而夾河公私廢田略計二萬餘頃多用牧馬計馬而牧不過用地之半則是萬有餘頃常為不耕之地觀其地勢利於行水欲於汴河兩岸置斗門泄其餘水分為支渠及引京索河並三十六陂以灌溉田詔叔獻提舉開封府界常平使行之而以著作佐郎楊汲同提舉叔獻又引汴水淤田而祥符中牟之民大被水患都水監或以為非三年三月帝謂王安石韓絳曰都水沮壞淤田者以侵其職事爾安石曰必欲任屬當以楊汲為都水監今每事稟於沈立張鞏何能辦集七月帝聞淤田多浸民田稼屋宇令內侍馮宗道往視宗道以説者為妄八月叔獻汲並權都水監丞提舉沿汴淤田九月戊申遣殿中丞陳世修乘驛經度陳潁州八丈溝故迹初世修言陳州項城縣界蔡河東岸有八丈溝或斷或續迤邐東去由潁及壽綿亙三百五十餘里乞因其故道量加濬治興復大江次河射虎流龍百尺等陂塘導水行溝中布灌溉俾數百里復為稻田則其利百倍繪圖來上帝意向之王安石曰世修言引水事即可試八丈溝新河則不然昔鄧艾不賴蔡河漕運故能並水東下大興水田厥後既分水以注蔡河又有新修閘以限之與昔不同惟無所用水即水可並而溝可復矣故先命世修相度四年三月帝語侍臣中人視麥者言淤田甚佳有未淤不可耕之地一望數百里獨樞密院以淤田無益謂其薄如餅安石曰就令薄固可再淤厚而後止是月帝以慶州軍亂召執政對資政殿馮京曰府界既淤田又行免役作保甲人極勞弊帝曰淤田於百姓何苦聞土細如麵王安石曰慶卒之變陛下旰食大臣宜於此時共圖消弭乃合為浮議歸咎淤田保甲了不相關此非待至明而後察也十月前知襄州光祿卿史照言開修古淳河一百六里灌田六千六百餘頃修治陂堰民已獲利慮州縣遽欲增稅詔三司應興修水利墾開荒梗毋增稅五年二月侯叔獻等言民願買官淤田者七十餘戶已分赤淤花淤等及定其直各有差仍於次年起稅若願增錢者不以投狀先後給之五月御史張商言嘗聞獻議者請開鄧州穰縣永國渠引湍河水灌溉民田失邵信臣故道鑿焦家莊地勢偏仰水不通流詔京西路覆實遣程昉領其事昉刳河去疏土築為巨堰水行再歲會霖雨溪谷合流大漲堰下土疏惡莫能禦由此廢不復治閏七月程昉奏引漳洺河淤地凡二千四百餘頃帝曰灌溉之利農事大本但陝西河東民素不習此苟享其利後必樂趨三白渠為利尤大有舊迹可極力修治凡疏積水須自下流開導則畎澮易治書所謂濬畎澮距川是也時人人爭言水利提舉京西常平陳世修乞於唐州引淮水入東西邵渠灌注九子等十五陂溉田二百里提舉陝西常平沈披乞復京兆府武功縣古迹六門堰於石渠南二百步傍為土洞以木為門回改河流溉田三百四十里大抵迂闊少效披坐前為兩浙提舉開常州五瀉堰不當法寺論之至是降一官十一月陝西提舉常平楊蟠議修鄭白渠詔都水丞周良孺相視乃自石門堰涇水開新渠至三限口以合白渠王安石請捐常平息錢助民興作帝曰縱用內帑錢亦何惜也六年三月程昉言得共城縣舊河槽若疏導入三渡河可灌西垙稻田從之五月詔諸創置水磑碾碓妨灌溉民田者以違制論命贊善大夫蔡朦修永興軍白渠八月程昉欲引水淤漳旁地王安石以為長利須及冬乃可經畫九月丙辰賜侯叔獻楊汲府界淤田各十頃十月命叔獻理提點刑獄資序周良孺與升一任皆賞淤田之勞也陽武縣民邢晏等三百六十四戶言田沙鹹瘠薄乞淤溉候淤深一尺計畝輸錢以助興修詔與淤溉勿輸錢十二月河北提舉常平韓宗師論程昉十六罪盛陶亦言昉帝以問安石安石請令昉宗師及京東轉運司各差官同考實以聞還奏得良田萬頃又淤四千餘頃於是進呈宗師疏至言昉奏百姓乞淤田實未嘗乞帝曰此小失何罪但不知淤田如何爾安石曰今檢到好田萬頃又淤田四千餘頃陛下以為不知臣實未喻帝曰昉修漳河漳河歲決修滹沱又無下尾安石力為辨説已而宗師與昉皆放罪他日帝論唐太宗能受諫安石因言陛下判功罪不及太宗如程昉開閉四河除漳河黃河外尚有溉淤及退出田四萬餘頃自秦以來水利之功未有及此止轉一官又令與韓宗師同放罪臣恐後世有以議聖德安石佑昉大率類此是時原武等縣民因淤田壞廬舍墳墓妨秋稼相率詣闕訴使者聞之急責縣令追呼將杖之民謬云詣闕謝耳使者因為民謝表遣二吏詣鼓院投之安石大喜久之帝始知雍丘等縣淤田清水頗害民田詔提舉常平官視民耕地蠲稅一料樞密院奏淤田役兵多死每一指揮僅存軍員數人下提點司密究其事提點司言死事者數不及三釐七年正月程昉言滄州增修西流河堤引黃河水淤田種稻增灌塘泊並深州開引滹沱水淤田及開回胡盧河並回滹沱河下尾六月金州西城縣民葛德出私財修長樂堰引水灌溉鄉戶土田授本州司士參軍八月甲戌詔司農寺具所興修農田水利次第九月又詔籍所興水利自今遣使體訪其不實不當者案驗以聞從侍御史張琥請也十一月壬寅知諫院鄧潤甫言淤田司引河水淤酸棗陽武縣田已役夫四五十萬後以地下難淤而止相度官吏初不審議妄興夫役乞加絀罰詔開封劾元檢計按覆官丁未同知諫院范百祿言向者都水監丞王孝先獻議於同州朝邑縣界畎黃河淤安昌等處地及放河水而鹹地高原不能及乃灌注朝邑縣長豐鄉永豐等十社千九百戶秋苗田三百六十餘頃詔蠲被水戶夏稅是歲知耀州閻充國募流民治漆水堤八年正月程昉言開滹沱胡盧河直河淤田等部役官吏勞績別為三等乞推恩從之三月庚戌發京東常平米募飢民修水利四月管轄京東淤田李孝寬言礬山漲水甚濁乞開四斗門引以淤田灌罷漕運再旬從之深州靜安令任迪乞俟來年刈麥畢全放滹沱胡盧兩河又引永靜軍雙陵口河水淤溉南北岸田二萬七千餘頃河北安撫副使沈披請治保州東南沿邊陸地為水田皆從之閏四月丁未提點秦鳳等路刑獄鄭民憲請於熙州南關以南開渠堰堰引洮水並東山直北通下至北關並自通遠軍熟羊寨導渭河至軍溉田詔民憲經度如可作陂即募京西江南陂匠以往五月乙酉右班殿直幹當修內司楊琰言開封陳留咸平三縣種稻乞於陳留界舊汴河下口因新舊二堤之間修築水塘用碎甓築虛堤五步以來取汴河清水入塘灌溉從之七月江寧府上元縣主薄韓宗厚引水溉田二千七百餘頃遷光祿寺丞太原府草澤史守一修晉祠水利溉田六百餘頃八月知河中府陸經奏管下淤官私田約二千餘頃下司農覆實九月癸未提舉出賣解鹽張景溫言陳留等八縣地可引黃汴河水淤溉詔次年差夫十二月癸丑侯叔獻言劉瑾相度淮南合興修水利僅十萬餘頃皆並運河乞候開河畢工以水利司錢募民修築墟𣲵九年八月程師孟言河東多土山高下旁有川谷每春夏大雨衆水合流濁如黃河礬山水俗謂之天河水可以淤田絳州正平縣南董村旁有馬璧谷水嘗誘民置地開渠淤瘠田五百餘頃其餘州縣有天河水及泉源處亦開渠築堰凡九州二十六縣新舊之田皆為沃壤嘉祐五年畢功纘成水利圖經二卷逮今十七年矣聞南董村田畝舊直三兩千收穀五七斗自灌淤後其直三倍所收至三兩石今臣權領都水淤田竊見纍歲淤京東西鹹鹵之地盡成膏腴為利極大尚慮河東猶有荒瘠之田可引天河淤溉者於是遣都水監丞耿琬淤河東路田十年六月師孟琬引河水淤京東西沿汴田九千餘頃七月前權提點開封府界劉淑奏淤田八千七百餘頃三人皆減磨勘年以賞之九月入內內侍省都知張茂則言河北東西路夏秋霖雨諸河決溢占壓民田詔委官開畎元豐元年二月都大提舉淤田司言京東西淤官私瘠地五千八百餘頃乞差使臣管幹許之四月詔闢廢田興水利建立堤防修貼墟𣲵之類民力不給者許貸常平錢穀六月京東路體量安撫黃廉言梁山張澤兩濼十數年來淤澱每歲泛浸近城民田乞自張澤濼下流濬至濱州可泄壅滯從之十二月壬申二府奏事語及淤田之利帝曰大河源深流長皆山川膏腴滲漉故灌溉民田可以變斥鹵而為肥沃朕取淤土親嘗極為潤膩二年導洛通汴六月罷沿汴淤田司十二月辛酉置提舉定州路水利司三年知濰州楊采開白浪河哲宗元祐以後朝廷方務省事水利亦浸緩矣四年二月甲辰詔瀕河州縣積水占田在任官能為民溝畎疏導退出良田百頃至千頃以上者遞賞之功利大者取特旨四年六月乙丑知陳州胡宗愈言本州地勢卑下秋夏之間許蔡汝鄧西京及開封諸處大雨則諸河之水並由陳州沙河蔡河同入潁河不能容受故境內瀦為陂澤今沙河合入潁河處有古八丈溝可以開濬分決蔡河之水自為一支由潁壽界直入于淮則沙河之水雖甚洶湧不能壅遏詔可徽宗建中靖國元年十一月庚辰赦書略曰熙寧元豐中諸路專置提舉官兼領農田水利應民田堤防灌溉之利莫不修舉近多因循廢弛慮歲久日更隳壞命典者以時檢舉推行崇寧二年三月宰臣蔡京言熙寧初修水土之政元祐例多廢弛紹復先烈當在今日如荒間可耕瘠鹵可腴陸可為水水可為陸陂塘可修灌溉可復積潦可泄墟𣲵可興許民具陳利害或官為借貸或自備工力或從官辦集如能興修依格酬奬事功顯著優與推恩從之三年十月臣僚言元豐官制水之政令詳立法之意非徒為穿塞開導修舉目前而已凡天下水利皆在所掌在今尤急者如浙右積水比連震澤未有歸宿此最宜講明而未之及者也願推廣元豐修明水政條具以聞從之岷江水發源處古導江今為永康軍漢史所謂秦蜀守李冰始鑿離堆辟沫水之害是也沫水出蜀西徼外今陽山江大皂江皆為沫水入于西川始嘉眉蜀益間夏潦洋溢必有潰暴衡決可畏之患自鑿離堆以分其勢一派南流于成都以合岷江一派由永康至瀘州以合大江一派入東川而後西川沫水之害減而耕桑之利博矣皂江支流迤北曰都江口置大堰疏北流為三曰外應溉永康之導江成都之新繁而達于懷安之金堂東北曰三石洞溉導江與彭之九隴崇寧濛陽而達于漢之雒東南曰馬騎溉導江與彭之崇寧成都之郫溫江新都新繁成都華陽三流而下派別支分不可悉紀其大者十有四自外應而分曰保堂曰倉門自三石洞曰將軍橋曰灌田曰雒源自馬騎曰石址曰豉彘曰道溪曰東穴曰投龍曰北曰樽下曰玉徙而石渠之水則自離堆別而東與上下馬騎乾溪合凡為堰九曰李光曰膺村曰百丈曰石門曰廣濟曰顏上曰弱水曰濟曰導皆以隄攝北流注之東而防其決離堆之南實支流故道以竹籠石為大隄凡七壘如象鼻狀以捍之離堆之趾舊鑱石為水則則盈一尺至十而止水及六則流始足用過則從侍郎堰減水河泄而歸于江歲作侍郎堰必以竹為繩自北引而南準水則第四以為高下之度江道既分水復湍暴沙石填委多成灘磧歲暮水落築隄壅水上流春正月則役工濬治謂之穿淘元祐間差憲臣提舉守臣提督通判提轄縣各置籍凡堰高下闊狹淺深以至灌溉頃畝夫役工料及監臨官吏皆注於籍歲終計效賞如格政和四年又因臣僚之請檢計修作不能如式以致決壞者罰亦如之大觀二年七月詔曰蜀江之利置堰溉田旱則引灌潦則疏導故無水旱然歲計修堰之費敷調於民工作之人並緣為姦濱江之民困於騷動自今如敢妄有檢計大為工費所剩坐贓論入己準自盜法許人告興元府褒斜谷口古有六堰澆溉民田頃畝浩瀚每春首隨食水戶田畝多寡均出夫力修葺後經靖康之亂民力不足夏月暴水衝損堰身紹興二十二年利州東路帥臣楊庚奏謂若全資水戶修理農忙之時恐致重困欲過夏月於見屯將兵內差不入隊人併力修治庶幾便民從之興元府山河堰灌溉甚廣世傳為漢蕭何所作嘉祐中提舉常平史照奏上堰法獲降敕書刻石堰上中興以來戶口凋疏堰事荒廢纍曾修葺旋即決壞乾道七年遂委御前諸軍統制吳拱經理發卒萬人助役盡修六堰濬大小渠六十五復見古迹並用水工準法修定凡溉南鄭褒城田二十三萬餘畝昔之瘠薄今為膏腴四川宣撫王炎表稱拱宣力最多詔書褒美焉
