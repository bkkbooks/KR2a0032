body:
  text: 宋史卷一百五十九志第一百一十二選舉五銓法下遠州銓補蔭流外補川峽閩廣阻遠險惡中州之人多不願仕其地初銓格稍限以法凡州縣幕職每一任近即一任遠川峽廣南及沿邊不許挈家者為遠餘悉為近既分川峽為四路廣南東西為二路福建一路後增荊湖南一路始立八路定差之制許中州及土著在選者隨意就差名曰指射行之不廢太平興國初選人孟巒擬賓州録事參軍詣匭訴寃坐流海島自是得遠地者不敢辭既而詔川峽嶺南福建注授計程外給兩月期違則本州不得放上遣送闕下除籍不齒或被疾則所至陳牒長吏按驗付以公據廢痼末損則條狀以聞雍熙四年又詔選人年六十勿注遠地非土人而願者聽凡任廣蜀福建州縣並給續食初嶺南闕官往往差攝至是詔州長吏試可者選用之罷秩奏送闕下與出身淳化間又詔嶺南攝官各路惟許選二十員以承乏餘悉罷歸始令嶺南幕職許攜族行受代不得寄留至道初申詔劍南州縣官不得以族行敢有妄稱妻為女奴攜以之官除名初榮州司理判官鄭蛟冒禁攜妻之任會蜀賊李順構亂其黨田子宣攻陷城邑而蛟捕得之擢為推官至是知梓州張雍奏其事上命戮蛟而有是詔咸平間以新恩循梅四州瘴地選荊湖福建人注之吏部銓擬官悉標其過犯自是凡注惡地令不須書又詔規避遐遠違期受代勘鞫責罰就移遠地神宗更制始詔川峽福建廣南之官罷任迎送勞苦其令轉運司立格就注免其赴選於是七路自常選知州而下轉運司置員闕籍具書應代時日下所部郡衆示之凡見任距受代半年及已終更者許用本資序指射有司受而閲之定其應格當差者上之審官東院流內銓審覆如令即奏聞降敕若占籍本路或游注此州皆從其便惟不許官本貫州縣及鄰境其參擬銓次悉如銓格無願注者上其闕審官而在選者射之武臣之屬西院三班院者令樞密院放此具制後荊湖南亦許就注或言土人知州非便法應遠近迭居而川人許連任本路常獲家便實太偏濫王安石曰分遠近均勞佚也中州士不願適遠四路人樂就家便用新法即兩得所欲况可以省吏卒將迎官府浮費邪何正臣又言蜀人之在仕籍者特衆今自郡守而下皆得就差一郡之官土人太半寮寀吏民皆其鄉里親信難於徇公易以合黨請收守令闕歸之朝廷而他官兼用土人量立分限庶經久無弊兼聞差注未至盡公願許提刑司索案牘究察之奏上法不為改但申嚴提刑司互察之法元祐初御史上官均言定差不均之弊有七諸路赴選中試乃差八路隨意取射一也諸路吏部待試需次率及七年方成一任八路就注若及七年已更三任二也八路雖坐停罷隨許射注其待次者又許權攝祿無虛日而吏選無愆犯亦大率四年方再得祿四也土人得射奏名者免試就注家便年高力憊不復望進往往營私廢職五也仕久知識既多土人就射本路不無親故請託六也八路監司地遠而專設漫滅功過名次人亦不敢爭校故有力者多得優便而孤寒滯卻七也請並八路差盡歸吏部為便既而吏部亦請用常格差除遂悉歸之銓紹聖復行舊制且許八路人廕補出官即轉運司試中注闕重和間臣僚又言其弊轉運以軍儲吏祿供饋支移為己責而視差注為末務往往付之主案吏胥定擬而簽廳視成書判而已注闕之高下視賄之厚薄無賂則定差之牘脫漏言詞隱落節目及其上部必致退卻參會重上又半歲矣以是闕多而不調者衆宜督典領之官歲終取吏部退難有無多寡為之課而賞罰之庶可公注擬而絶吏賕乃命立考課法建炎初詔福建二廣闕並歸吏部惟四川仍舊制初纍朝以廣南地遠利入不足以資正官故使舉人兩與薦選者試刑法於漕司以合格者注攝兩路謂之待次攝官更兩任無過則錫以真命至是雖歸之吏部踰年無願就者復歸漕司自神宗朝宗室不許調川陝官至是宗室多避難入蜀乃聽於四路注擬六年詔川陝轉運司每季孟月上旬集注為定法焉八年直學士院勾龍如淵上疏謂行都去蜀萬里而比歲窠闕歸之朝廷寒遠之士困抑者衆願參酌前制稍還漕銓之舊立為定格使與堂除不相侵紊遂命以小郡知州監以下仍付漕司差注其選人改官詣司公參理為到部人稱便焉補蔭之制凡奏戚屬太皇太后皇太后皇后本服期親奉禮郎大功守監簿小功初等幕職官元豐前試大理評事緦麻知令録元豐前試校書郎異服親亦如之有服女之夫則本服大功以上女夫知令録小功判司主簿或尉緦麻試監簿周功女之子知令録孫及大功女之子判司主簿或尉曾孫及大功女之孫小功女之子並試監簿其非所生子若孫各降一等緦麻女之子試監簿每祀南郊誕聖節太皇太后皇太后並録親屬四人皇后二人非遇推恩而特旨賜官不用此法凡諸妃期親守監簿餘判司主簿或尉異姓親試監簿婉容以上有服親才人以上小功親並試監簿凡大長公主長公主公主夫之期親判司主簿或尉餘試監簿子補殿中丞孫光祿寺丞壻太常寺太祝外孫試銜知縣凡親王壻大理評事外孫初等職官女之子壻試監簿宗室緦麻以上女之夫試銜知縣袒免判司主簿或尉其願補右職依換官法奉禮郎即右侍禁幕職官即左班殿直知令録即右班殿直判司主簿尉即奉職試監簿即借職凡文臣三公宰相子為諸寺丞期親校書郎餘親本宗大功至緦麻服者以屬遠近補試銜使相參知政事樞密院使副使宣徽使子為太祝奉禮郎期親校書正字餘親補試銜節度使僕射尚書太子三少御史大夫文明殿學士資政殿大學士子校書郎正字期親寺監主簿餘親試銜三司使翰林資政殿侍講龍圖閣學士樞密直學士太常宗正卿中丞丞郎留後觀察使內客省使子正字期親寺監主簿餘親試銜及齊郎兩省五品龍圖閣直學士待制三司副使知雜御史子寺監主簿期親試銜餘親齊郎諸司大卿監子寺監主簿期親試銜小卿監兼職者子試銜期親齊郎凡武臣宰相子為東頭供奉官使相知樞密院子為西頭供奉官期親皆左侍禁餘屬自左班殿直以下第官之樞密使副使宣徽節度使子西頭供奉官期親右侍禁餘屬自右班殿直以下第官之六統軍諸衛上將軍節度觀察留後觀察使內客省使子右侍禁期親右班殿直餘屬三班奉職以下第官之客省使引進防禦使團練使四方館使樞密都承旨閣門使子右班殿直期親三班奉職餘屬為差使殿侍諸衛大將軍內諸司使樞密院諸房副承旨子三班奉職期親借職餘屬為下班殿侍諸衛將軍內諸司副使樞密分房副承旨子為三班借職凡兼職在館閣校理檢討王府記室翊善侍講三司主判官開封府判官推官江淮發運諸路轉運始許奏及諸親提點刑獄惟許奏男其嘗以贓抵罪得復故官文臣至郎中及員外郎任館閣職武臣至諸司副使諸衛將軍者止許廕子若孫一人尚在謫籍者弗預太祖初定任子之法臺省六品諸司五品登朝嘗歷兩任然後得請始減歲補千牛齊郎員額齊郎須年貌合格誦書精熟乃得奏太宗踐極諸州進奏者授以試銜及三班職初推恩授散試官者不得赴選太平興國二年乃詔授試銜等人特定七選集遂為定令凡誕聖節及三年大祀皆聽奏一人而淳化改元恩文班中書舍人武班大將軍以上並許廕補如遇轉品許更蔭一子由是奏薦之恩始廣每誕聖節朝臣多請奏疏屬不報至道二年始限以翰林學士兩省五品尚書省四品以上賜一子出身此聖節奏薦例也先是任子得攝太祝奉禮未幾即補正員帝謂膏粱之子不十年坐致閨籍是年悉授同學究出身赴選集真宗東封祀汾陰進奉人已官者進秩未官者令翰林試藝與試銜齊郎借職公主郡縣主以下諸親外命婦入內者亦有恩慶而東封恩則提點刑獄朝臣使臣皆得奏一人奏戚屬舊無定制有求補閣門祗候者真宗以宣贊之職非可以恩澤授乃詔自今求遷者至殿直止大中祥符二年以門廕授京官年二十五以上求差使者令於國學受業及二年審官院與判監官考試其業乃以名聞內諸司使副授邊任官者陛辭時許奏子詔樞密院定其制凡妄名孫及從子為子求蔭者坐之七年帝幸南京詔臣僚逮事太祖者賜一子恩澤令翰林學士李維等定自給諫觀察使以上得請初轉運使辭日許奏一人天禧後惟川廣福建者聽餘路再任始得奏又詔承天節恩例所蔭子孫不許以他親及已食祿者特許西京分司官郊禋奏廕一子自是分務西洛者得以為例南京則否仁宗慶曆中裁損奏補入仕之路凡選人遇郊赴銓試其不赴試亦無舉者永不預選罷聖節奏蔭恩學士以下遇郊恩得奏大功以上親再遇郊得奏小功以下親郎中帶職員外郎初遇郊蔭子若孫再郊及期親四遇郊聽蔭大功以下親初得奏而年過六十無子孫廕期親其皇親大將軍以上妻再遇郊亦許之武臣蔭例倣此凡蔭長子孫皆不限年諸子孫須年過十五若弟姪須過二十必五服親乃許已嘗蔭而物故者無子孫祿仕聽再蔭自是任子之恩殺矣英宗即位郡縣致貢奉人悉命以官知諫院司馬光建言監司太守遣親屬奉表京師不問官職高下親屬近遠推恩至班行幕職權知州軍或所遣非親亦除齊郎及差使殿侍此蓋國初承五代姑息藩鎮之弊因循不革爵祿本待賢才今此等受官誠為大濫縱不能盡罷其人若五服內親等第受以一官其無服屬量賜金帛庶少救濫官之失然詔令已行不從其議時方患官冗言者皆謂由三歲一磨勘其進甚亟易至高位故獲蔭者衆乃令待制以上自遷官後六歲無故則復遷之有過益展年至諫議大夫止京朝官四歲磨勘至前行郎中止少卿監限七十員員有闕以前行郎中久次者補之少卿監以上遷官聽旨仁宗雖罷聖節恩而猶行之妃主神宗既裁損臣僚奏蔭以宮掖外戚恩尤濫故稍抑之舊諸妃遇聖節奏親屬一人間一年許奏二人郊禮許奏一人嬪御每遇郊奏一人兩遇聖節與一奏後定諸妃每遇聖節並郊許奏有服親一人淑儀充儀婕妤貴人遇郊許奏小功以上親一人位號別而資品同者許比類奏薦舊公主每遇聖節郊禮奏夫之親屬一人公主生日許奏一人後罷生日恩所奏須有服親皇親妻兩遇郊許奏期親一人後罷奏舊郡縣主遇郊許奏親生子右班殿直若庶子及其夫之親兩遇郊許奏借職一人後親子惟注幕職孫若庶子兩遇郊方許奏一人夫之親屬勿奏舊臣僚之妻為國夫人者得遺表恩後除之妃嬪公主以下非有服親之壻不許奏既而曾布等又言臣僚陳請恩澤宜有定制乃許見任二府歲乞差遣一人宰臣樞密使兼平章事因事罷者陳乞轉官一人指射差遣二人餘執政官並各一人待制以上乞差遣遷學士者又一人三路廣桂安撫使知成都府梓州差遣一人親孫子循一資廣南轉運提點刑獄奏子孫或期親合入官一人成都梓利夔路差遣一人子孫循一資中書檢正官樞密院檢詳官至員外郎在職及二年遇大禮許補親屬中書堂後官提點五房官雖未至員外聽奏補雍宜欽極邊煙瘴知州聽奏子孫一人凡因戰陳物故及歿於王事許官其子孫又功臣繪像之家如無食祿人則許特奏子孫一人入官既定銓試法任子中選者得隨銓擬注其入優等往往特旨賜進士出身元祐元年詔諸軍致仕停放人其遺表恩該及子而過五年自陳者慮有冒濫毋推恩職事官卿監以下應任子者須官至朝奉郎乃許奏三年定宰臣執政初遇郊許奏本宗異姓親各一人次遇郊奏數如初願用其恩與有官人則許轉官並循資或乞差遣惟不得轉入朝官循入支掌應奏承務郎殿直以上許換升一任不得升入通判餘官三遇郊許奏有官人舊制應奏兩人止者次郊止許奏有官人其後遇郊更合補蔭者並準此為間隔之次已致仕而遇大禮應奏補者再奏而止宣仁太皇太后諭輔臣曰近已裁減入流本家恩澤宜減四分之一呂公著等曰陛下臨朝同聽斷本殿恩澤自不當限數先來所定止與皇太后同等豈可更損宣仁曰裁減恩澤凡自上而始則均一矣乃詔曰官冗之患實極于今苟非裁入流之數無以清取士之原吾以眇身率先天下今後每遇聖節大禮生辰合得親屬恩澤並四分減一皇太后皇太妃同之哲宗既親政詔復舊凡乞致仕而不願轉官者中大夫至朝奉郎及諸司使許奏補本宗有服親一人自奉議郎內殿承制以下許與有服親一人恩例惟中大夫中散大夫諸司使帶遙郡者蔭補外仍與有服親恩例若致仕未受敕而身亡者在外以陳乞至門下省日在京以得旨日亦許乞有服親恩例一人初任子法以長幼為序若應奏者有廢疾或嘗犯私罪至徒或不肖難任從仕許越奏其次至是始刪去格令長幼為序四字五年定親王女郡主蔭補法遇大禮許奏親屬一人所生子仍與右班殿直兩遇奏子或孫與奉職即用奏子孫恩回授外服親之夫及夫之有服親者有官人轉一官毋得升朝選人循一資無官者與借職須期以下親乃得奏吏部言皇太妃遇大禮以應奏恩與其親屬而服行不應法詔用皇后緦麻女之子為比補借職舊法母后之家十年一奏門客而太妃未有法紹聖初詔皇太妃用興龍節奏親屬恩回授門客自是太后每及八年太妃十年奏門客一名與假承務郎許參選如年數未及凡恩皆毋回授元符後命婦生皇子許依大禮奏有服親三品以上三人宗室緦麻親許視異姓蔭孫凡蔭補異姓惟執政得奏如簽書樞密院事雖依執政法而所蔭即不理選限後因轉官礙止法者許回授未仕子孫而貪冒者又請回授異姓有司每沮止之然亦多御筆許特補政和間尚書省定回授格謂無官可轉或可轉而官高不欲轉或事大而功效顯著為一格許奏補內外白身有服親官有止法不可轉功績次著為一格許奏本宗白身袒免親官不甚高而功績大為一格許奏本宗白身有服親官不甚高功不甚大為一格而分為三一與內外有官有服親一與有官有服本宗親一與有官有服者之子孫凡為六等宣和二年殿中侍御史張汝舟言今法所該補奏與先朝同昔之官至大夫歷官不下三五十年而今閲三五年有已至大夫者矣諸翼將軍至武翼郎須出官三十年方許奏補今文武官奏補未嘗限年此太濫也至若中大夫以下及武功武翼大夫已求致仕而不及受敕乃格其恩於是有身謝而未受敕者其家或至匿哀須限然不及親受而不與霑恩者多矣此太吝也欲自今中大夫至帶職朝奉郎以上雖遇郊恩入官不及二十年皆未許蔭補雖已經奏薦再遇郊恩年仍未及者亦寢其奏庶抑其濫至於文武官及大夫以上嘗求休致而身謝在出敕前欲並許奏廕以補其不及尚書省文武官致仕雖不及受敕若無曾受廕人自有遺表恩又寺監長二至開封少尹係用職事蔭補不合限年餘從之崇寧以來類多泛賞如曰應奉有勞獻頌可采職事修舉特授特轉者皆無事狀可名而直以與之孟昌齡朱勔父子童貫梁師成李邦彥等凡所請求皆有定價故不三五年選人有至正郎或員外帶職小使臣至正副使或入遙郡橫行者而蔡京拔用從官不論途轍一言合意即日持槖又優堂吏往往至中奉大夫或換防禦觀察使由此任子百倍欽宗即位赦恩覃轉惟許宗室其文武臣止令回授有官有服親且詔非法應回授及特許者毋録用高宗中興重定補蔭法內外臣僚子孫期親大功以下及異姓親隨文武各有等秩見職官志建炎元年詔宰執子弟以恩澤任待制以上者並罷紹興四年詔文武太中大夫以上及見帶兩制職名依舊不限年內無出身自授官後以及十五年年及三十不係宮觀責降之人聽依條補蔭七年中書舍人趙思誠言孤寒之士名在選部皆待數年之闕大率十年不得一任今親祠之歲任子約四千人是十年之後增萬二千員科舉取士不與焉將見寒士有三十年不得調者矣祖宗時仕至卿監者皆實以年勞功績得之年必六十身不過得恩澤五六人厥後私謁行橫恩廣有年未三十而官至大夫者員數比祖宗時不知其幾倍而恩例未嘗少損有一人而任子至十餘者此而不革實𢀿政事望議革其弊會思誠去國議遂格舊法惟贓罪不許任子新令並及私罪徒有司以為拘礙者多遂罷新令又詔宰執侍從致仕遺表惟補緦麻以上親毋及異姓二十二年以武臣多出軍中爵秩高而族姓少凡有薦奏同姓皆期功異姓皆中表閭巷之徒附會以進命須經統轄長官結罪保明詭冒者連坐之帝於后妃補蔭每加裁抑詔后族不得任從官孝宗即位思革冗官初詔百官任子遇郊恩權免奏薦年七十人遇郊不許奏子俄又詔未奏者許一名隆興元年以張宋卿言蔭補冗濫立為定法凡員外轉正郎正郎轉侍從卿監之至中大夫每初遇郊則聽任一子再經則不許復請遺表之恩各減其一減年之類亦去其半至府史之屬武功之等亦倣此差降之乾道二年詔非泛補官如宗室戚里女夫捧香異姓上書獻頌隨奉使補官陳亡女夫異姓給使減年之類轉至合奏薦官候致仕與奏一名嘗奏者不再奏四年詔宗室袒免親諸衛將軍武功大夫至武翼郎以上遇大禮奏補親屬並依外官法著為令九年詔文臣帶職員外郎及武翼大夫以上生前未嘗奏薦者與致仕恩澤一名即已嘗奏薦而被蔭人身亡許再請應朝奉郎武翼郎以上補授及三十年者亦與一名又詔武臣嘗任執政官遇郊聽補文資於是恩數視執政者亦得之蓋戚里宗王與夫攀附之臣皆爭以文資祿其子不可復正矣自隆興著酬賞實歷對用轉官之法遷官稍緩至是郊恩之奏視為減半然猶未大艾也淳熙九年始詔減任子員數自宰相執政侍從卿監正郎員外郎分為五等每等降殺以兩酌中定為止數武臣如之宰相十人執政八人侍從六人中散大夫至中大夫四人帶職朝奉郎至朝議大夫三人通減三分之一於是冗濫漸革寧宗慶元中立補蔭新格自使相以下有差文臣中大夫武臣防禦使以下不許遺表推恩嘉泰初以官冗恩濫凡宗女夫授官者依舊法終身止任一子兩府使相不得以郊恩奏門客著為令凡流外補選五省御史臺九寺三監金吾司四方館職掌每歲遣近臣與判銓曹就尚書同試律三道中者補正名理勞考三館祕閣楷書皆本司試書札中書覆試補受後以就試多懷挾傳授乃鎖院巡搜糊名凡試百司吏人問律及疏既考合格復令口誦所對以防其弊其自勞績臣僚為之陳請特免口誦謂之優試得優試者率中選後遂考試百司人歲以二十人為額毋得僥幸求優試為職掌者皆限年授外州司戶勒留有至諸衛長吏兩省主事者學士審官審刑院登聞檢鼓院糾察刑獄司皆選取諸司吏人或以年限或理本司選然中書制敕及五院員闕多即遣官特試書劄驗視材質制敕院須堂後官以下親屬五院須父祖有官者樞密院亦如之惟本院試驗宣徽院三司各省閣門三班院皆本司召補至其首者出職凡出職者樞密院三司皆補借職以上餘或補州縣內廷諸司主吏三司大將亦有補三班借職者中書主事以下三司勾覆官以上各帶諸州上佐樞密院主事以上皆帶同正將軍餘多帶遠地司戶簿尉先是勒留出官及選限皆無定制其隸近司有裁三二年即堂除外官者咸平末命翰林學士承旨宋白與兩制御史中丞同詳定之白等請令中書沿堂五院行首副行首依舊制補三班通引堂門直省發敕驗使臣遇闕依名次補正名三年授勒留官遇恩則一年授後七年出官宣徽院貼房至都勾押官軍將至知客押衙各六等並以次補至勾押官押衙及五年以上出官補三班或簿尉學士院孔目官補正三年授勒留官遇恩一年授後五年出官驅使官補正四年授勒留官遇恩二年授後八年出官三館孔目官書直庫表奏守當官四年授勒留官遇恩二年授後守當官八年書直庫表奏官七年孔目官六年出職其職遷補者許通計年考有奉錢官者更留三年典書楷書五選集準格三館入流歲數已少無得以諸色優勞減選閣門客省承受驅使官轉次第並依本司舊例補正名四年授勒留官遇恩則二年授後七年出授簿尉其行首並如舊制審刑院本無職掌名額於諸司選差正名令不以有無勒留審官五年審刑三年出官以前諸司請自今勒留並比七選集授官例赴選日不以州縣地望為資從之後又定客省承受行首歲滿補殿直奉職御書院翰林待詔書藝祗候十年以上無犯者聽出職太祖嘗親閲諸司流外人勒之歸農者四百人開寶間詔流外選人經十考入令録者引對方得注擬驅使散從官伎術人資考雖多亦不注擬堂後官多為姦贓欲更用士之在令録簿尉選者充之或不屑就而所選不及數乃如舊制雍熙時以堂後官充職事官入謝外不赴朝參見宰相禮同胥吏端拱初以河南府法曹參軍梁正辭楚丘縣主簿喬蔚等五人為將作監丞充中書堂後官拔選人授京官為堂吏自此始
