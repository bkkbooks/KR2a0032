body:
  text: 宋史卷四十九志第二天文二紫微垣太微垣天市垣紫微垣紫微垣東蕃八星西蕃七星在北斗北左右環列翊衛之象也一曰大帝之坐天子之常居也主命主度也東蕃近閶闔門第一星為左樞第二星為上宰三星曰少宰四星曰上弼一曰上輔五星為少弼一曰少輔六星為上衛七星為少衛八星為少丞或曰上丞其西蕃近閶闔門第一星為右樞第二星為少尉第三星為上輔第四星為少輔第五星為上衛第六星為少衛第七星為上丞其占欲均明大小有常則內輔盛垣直天子自將出征門開兵起宮垣兩蕃正南開如門曰閶闔有流星自門出四野者當有中使御命視其所往分野論之不依門出入者外蕃國使也太陰歲星犯紫微垣有喪太白辰星犯之改世熒惑守宮君失位客星守有不臣國易政國皇星兵彗星犯有異王立流星犯之為兵喪水旱不調使星入北方兵起石氏云東西兩蕃總十六星西蕃亦八星一右樞二上尉三少尉四上輔五少輔六上衛七少衛八少丞上宰一星上輔二星三公也少宰一星少輔二星三孤也此三公三孤在朝者也左右樞上少丞疑丞輔弼四鄰之謂也尉二星衛四星六軍大副尉四衛將軍也北極五星在紫微宮中北辰最尊者也其紐星為天樞天運無窮三光迭耀而極星不移故曰居其所而衆星共之樞星在天心四方去極各九十一度賈逵張衡蔡雍王蕃陸績皆以北極紐星之樞是不動處在紐星末猶一度有餘今清臺則去極四度半第一星主月太子也二星主日帝王也亦太一之坐謂最赤明者也第三星主五行庶子也乾象新星書曰第三星主五行第四星主諸王第五星為後宮閎云北極五星初一曰帝次二曰后次三曰妃次四曰太子次五曰庶子四曰太子者最赤明者也後四星勾曲以抱之者帝星也太公望以為北辰以為耀魄寶以為帝極者是也或以勾陳口中一星為耀魄寶者非是北極中星不明主不用事右星不明太子憂左星不明庶子憂明大動搖主好出游色青微者凶客星入為兵喪彗入為易位流星入兵起地動北斗七星在太微北杓攜龍角衡殷南斗魁枕參首是為帝車運於中央臨制四海以建四時均五行移節度定諸紀乃七政之樞機陰陽之元本也魁第一星曰天樞正星主天又曰樞為天主陽德天子象其分為秦漢志主徐州天象占曰天子不恭宗廟不敬鬼神則不明變色二曰璇法星主地又曰璇為地主陰刑女主象其分為楚漢志主益州天象占曰若廣營宮室妄鑿山陵則不明變色三曰璣為人主火為令星主中禍其分為梁漢志主冀州若王者不恤民驟征役則不明變色四曰權為時主水為伐星主天理伐無道其分為吳漢志主荊州若號令不順四時則不明變色五曰玉衡為音主土為殺星主中央助四方殺有罪其分為燕漢志主兗州若廢正樂務淫聲則不明變色六曰闓陽為律主木為危星主天倉五穀其分為趙漢志主揚州若不勸農桑峻刑法退賢能則不明變色七曰搖光為星主金為部星為應星主兵其分為齊漢志主豫州王者聚金寶不修德則不明變色又曰一至四為魁魁為璇璣五至七為杓杓為玉衡是為七政星明其國昌第八曰弼星在第七星右不見漢志主幽州第九曰輔星在第六星左常見漢志主並州晉志輔星傅乎闓陽所以佐斗成功丞相之象也其色在春青黃在夏赤黃秋為白黃冬為黑黃變常則國有兵殃明則臣強斗旁欲多星則安斗中星少則人恐太陰犯之為兵喪大赦白暈貫三星王者惡之星孛于北斗主危彗星犯為易主流星犯主客兵客星犯為兵五星犯之國亂易主按北斗與輔星為八而漢志云九星武密及楊維德皆采用之史記索隱云北斗星間相去各九千里其二陰星不見者相去八千里而丹元子步天歌亦云九星漢書必有所本矣勾陳六星在紫宮中五帝之後宮也太帝之正妃也大帝之帝居也樂緯曰主後宮巫咸曰主天子護軍荊州占主大司馬或曰主六軍將軍或曰主三公三師為萬物之母六星比陳象六宮之化其端大星曰元始餘星乘之曰庶妾在北極配六輔甘氏曰勾陳在辰極左是為鈎陳衛六軍將軍或以為後宮非是勾陳口中一星為陽德天皇大帝內坐或即以為天皇大帝非是其占色不欲甚明明即女主惡之星盛則輔強主不用諫佞人在側則不見客星入之色蒼白將有憂白為立將赤黑將死客星出而色赤戰有功守之後宮有女使欲謀彗星犯之后宮有謀近臣憂流星入為迫主青氣入大將憂天皇大帝一星在勾陳口中其神曰耀魄寶主御羣靈執萬神圖大人之象也客星犯之為除舊布新彗孛犯大臣叛流星犯國有憂雲氣入之潤澤吉黃白氣入連大帝坐臣獻美女出天皇上者改立王四輔四星又名四弼在極星側是曰帝之四鄰所以輔佐北極而出度授政也去極星各四度閎云四輔一名中斗或以為後宮非是武密曰光浮而動凶明小吉暗則不理客星犯之大臣憂彗孛犯權臣死流星犯大臣黜黃白氣入四輔有喜白氣入相失位五帝內坐五星在華蓋下設叙順帝所居也色正吉變色為災客星犯紫宮中坐占為大臣犯主彗孛犯之民饑大臣憂三年有兵起流星犯為兵起臣叛出為有誅戮雲氣入色黃太子即位期六十日赤黃人君有異六甲六星在華蓋杠旁主分陰陽配節候故在帝旁所以布政教授農時也明則陰陽和不明則寒暑易節星亡水旱不時客星犯之色赤為旱黑為水白則人多疫彗孛犯女主出政令流星犯為水旱術士誅雲氣犯色黃術士興蒼白史官受爵柱史一星在北極東主記過左右史之象一云在天柱前司上帝之言動星明為史官得人不明反是客星犯之史官有黜者彗孛犯太子憂若百官黜流星犯君有咎雲氣犯色黃史有爵祿蒼白氣入左右史死女史一星在柱史北婦人之微者主傳漏天柱五星在東垣下一云在五帝左稍前主建政教一曰法五行主晦朔晝夜之職明正則吉人安陰陽調不然則司歷過客星犯之國中有賊彗孛犯宗廟不安君憂一曰三公當之雲氣赤黃君喜黑三公死女御四星在大帝北一云在勾陳腹一云在帝坐東北御妻之象也星明多內寵客星犯之後宮有謀一云自戮孛彗犯後宮有誅流星犯後宮有出者一云外國進美女雲氣化黃為後宮有子喜蒼白多病尚書五星在紫微東蕃內大理東北晉志在東南維一云在天柱右稍前主納言夙夜咨謀龍作納言之象彗孛犯之官有叛或太子憂流星若出則尚書出使犯之諫官黜八坐憂雲氣入黃為喜黃而赤尚書出鎮黑尚書有坐罪者大理二星在宮門左一云在尚書前主平刑斷獄明則刑憲平不明則獄有寃酷客星犯之貴臣下獄色黃赦白受戮赤黃無罪守之則刑獄寃滯或刑官有黜彗犯獄官憂流星占同雲氣入黃白為赦黑法官黜陰德二星巫咸圖有之在尚書西甘氏云陰德外坐在尚書右陽德外坐在陰德右太陰太陽入垣翊衛也天官書則以前列直斗口三星隨北專鋭若見若不見曰陰德謂施德不欲人知也主周急振撫明則立太子或女主治天下客星犯之為旱饑守之發粟振給彗孛犯後宮有逆謀流星犯君令不行雲氣入黃為喜青黑為憂天牀六星在紫微垣南門外主寢舍解息燕休一曰在二樞之間備幸之所也陶隱居云傾則天王失位客星入宮中有刺客或內侍憂彗孛犯之主憂大臣失位流星犯后妃叛女主立或人君易位雲氣入色黃天子得美女後宮喜有子蒼白主不安青黑憂白凶華蓋七星杠九星如蓋有柄下垂以覆大帝之坐也在紫微宮臨勾陳之上正吉傾則凶客星犯之王室有憂兵起彗孛犯兵起國易政流星犯兵起宮內以赦解之貫華蓋三公災雲氣入黃白主喜赤黃侯王喜傳舍九星在華蓋上近河賓客之館主北使入中國客星犯邦有憂一曰客星守之備姦使亦曰北地兵起彗孛犯守之亦為北兵黑雲氣入北兵侵中國八穀八星在華蓋西五車北一曰在諸王西武密曰主候歲豐儉一稻二黍三大麥四小麥五大豆六小豆七粟八麻甘氏曰八穀在宮北門之右司親耕司候歲司尚食星明吉一星亡一穀不登八星不見大饑客星入穀貴彗星入為水黑雲氣犯之八穀不收內階六星在文昌東北天皇之階也一曰上帝幸文館之內階也明吉傾動憂彗孛客流星犯之人君遜避之象文昌六星在北斗魁前紫微垣西天之六府也主集計天道一曰上將大將軍建威武二曰次將尚書正左右三曰貴相大常理文緒四曰司祿司中司隸賞功進五曰司命司怪太史主滅咎六曰司寇大理佐理寶所謂一者起北斗魁前近內階者也明潤色黃大小齊天瑞臻四海安青黑微細則多所殘害動搖三公黜月暈其宿大赦歲星守之兵起熒惑守之將凶太白守入兵興填星守國安客星守大臣叛彗孛犯大亂流星犯宮內亂三公三星在北斗杓南及魁第一星西一云在斗柄東為太尉司徒司空之象在魁西者名三師占與三公同皆主宣德化調七政和陰陽之官也移徙不吉居常則安一星亡天下危二星亡天下亂三星不見天下不治客星犯三公憂彗孛及流星犯之三公死天牢六星在北斗魁下貴人之牢也主繩愆禁暴甘氏云賤人之牢也月暈入多盜熒惑犯之民相食國有敗兵太白歲星守國多犯法客星彗星犯之三公下獄或將相憂流星犯之有赦宥之令勢四星在太陽守西北一曰在璣星北勢腐形人也主助宣王命內常侍官也以不明為吉明則閹人擅權天理四星在北斗魁中貴人之牢也星不欲明其中有星則貴人下獄客星犯多獄彗孛犯之國危赤雲氣犯之兵大起將相行兵相一星在北斗第四星南總百司集衆事掌邦典以佐帝王一曰在中斗文昌之南在朝少師行大宰者明吉暗凶亡則相黜太陽守一星在相星西北斗第三星西南大將大臣之象主設武備以戒不虞一曰在下台北太尉官也在朝少傅行大司馬者明吉暗凶客彗孛犯之為易政將相憂兵亂雲氣入黃為喜蒼白將死赤大臣憂內廚二星在紫微垣西南外主六宮之內飲食及后妃夫人與太子燕飲彗孛或流星犯之飲食有毒天廚六星在扶筐北一曰在東北維外主盛饌今光祿廚也星亡則饑不見為凶客星流星犯之亦為饑天一一星在紫微宮門右星南天帝之神也主戰鬬知吉凶明則陰陽和萬物盛人君吉亡則天下亂客星犯五穀貴彗孛犯之臣叛流星犯兵起民流雲氣犯黃君臣和黑宰相黜太一一星在天一南相近一度亦天帝神也主使十六神知風雨水旱兵革饑饉疾疫災害所在之國也明吉暗凶離位有水旱客星犯兵起民流火災水旱饑饉彗孛犯兵喪流星犯宰相史官黜雲氣犯黃白百官受賜赤為旱兵蒼白民多疫天槍三星在北斗杓東一曰天鉞天之武備也故在紫微宮左右所以禦難也明吉暗小兵敗芒角動兵起客星彗星流星犯皆為兵饑天棓五星在女牀北天子先驅也主分爭與刑罰藏兵亦所以禦難備非常也一星不具其國兵起明有憂細微吉客星入兵喪彗星守兵起流星犯諸侯多爭雲氣犯蒼白黑為凶天戈一星又名玄戈在招搖北主北方芒角動搖則北兵起客星守之北兵敗彗孛流星犯之占同雲氣犯黑為北兵退蒼白北人病太尊一星在中台北貴戚也不見為憂客彗流星犯之並為貴戚將敗之徵按步天歌載中宮紫微垣經星常宿可名者三十五坐積數一百六十有四而晉志所載太尊天戈天槍天棓皆屬太微垣八穀八星在天市垣與步天歌不同太微垣太微垣十星漢志曰南宮朱鳥權衡晉志曰天子庭也五帝之坐也十二諸侯之府也其外蕃九卿也一曰太微為衡衡主平也又為天庭理法平辭監升授德列宿受符諸神考節舒情稽疑也南蕃中二星間曰端門東曰左執法廷尉之象西曰右執法御史大夫之象執法所以舉刺凶邪左執法東左掖門也右執法西右掖門也東蕃四星南第一曰上相其北東太陽門也第二曰次相其北中華東門也第三曰次將其北東太陰門也第四曰上將所謂四輔也西蕃四星南第一曰上將其北西太陽門也第二曰次將其北中華西門也第三曰次相其北西太陰門也第四曰上相亦曰四輔也漢志環衛十二星蕃臣西將東相南四星執法中端門左右掖門乾象新書十星東西各五在翼軫北其西蕃北星為上相南門右星為右執法東西蕃有芒及動搖者諸侯謀上執法移刑罰尤急月五星入太微軌道吉其所犯中坐成刑月犯太微垣輔臣惡之又君弱臣強四方兵不制犯執法海中占云將相有免者期三年月入東西門左右掖門而南出端門有叛臣君憂入西門出東門君憂大臣假主威月中犯乘守四輔為臣失禮輔臣有誅月暈天子以兵自衛一月三暈太微有赦月食太微大臣憂王者惡之歲星入有赦犯之執法臣有憂入東門天下有急兵守之將相執法憲臣死入端門守天庭大禍至入南門出東門旱入南門逆出西門國有喪逆行入東門出西門國破亡填星熒惑犯之逆行入為兵喪犯上將上將憂守端門國破亡或三公謀上有戮臣犯西上將天子戰于野上相死入太微色白無芒天下饑退行不正有大獄犯太微門左右將死入天庭在屏星南出左掖門左將死右掖門右將死直出端門無咎入太微凌犯留止為兵入二十日廷尉當之留天庭十日有赦犯太微東南陬歲饑執法大臣憂犯上相大臣死填星犯入太微有德令女主執政若逆行執法四輔守之有憂守太微國破守西蕃王者憂太白犯入太微為兵大臣相殺留守有兵喪與填星犯太微中王者惡之入右掖門從端門出貴人奪勢晝見太微國有兵喪月掩太白于端門外國受兵辰星犯太微天子當之有內亂入天庭後宮憂大水守左右執法入兵起有赦入西門後宮災大水入西門出東門為兵喪水災客星犯入太微色黃白天子喜出入端門國有憂左掖門旱右掖門國亂出天庭有苛令兵起入太微三十日有赦犯四輔輔臣凶彗星犯太微天下易出太微宮中憂火災犯執法執法者黜犯天庭王者有立孛于翼近太微上將為兵喪孛于西蕃主革命孛五帝亡國殺君流星出太微大臣有外事出南門甚衆貴人有死者縱橫太微宮主弱臣強由端門入翼光照地有聲有立王雲氣出入色微青君失位青白黑雲氣入左右掖為喪出無咎赤氣入東掖門內兵起黃白雲氣入太微垣人主喜年壽長入左右掖門天子有德令黑及蒼白氣入天子憂出則無咎黑氣如蛇入垣門有喪內五帝坐五星內一星在太微中黃帝坐含樞紐之神也天子動得天度止得地意從容中道則明以光不明則人主當求賢以輔法不則奪勢四帝星夾黃帝坐四方各去二度東方蒼帝靈威仰之神也南方赤帝赤熛怒之神也西方白帝白招拒之神也北方黑帝叶光紀之神也黃帝坐明天子壽威令行小則反是勢在臣下若亡大人當之月出坐北禍大出坐南禍小出近之大臣誅或饑犯黃帝坐有亂臣抵帝坐有土功事月暈帝坐有赦海中占月犯帝坐人主惡之五星守黃帝坐大人憂熒惑太白入有強臣歲星犯有非其主立熒惑犯兵亂入天庭至帝坐有赦太白入之兵在宮中填逆行守黃帝坐亡君之戒五星入色白為亂客星色黃白抵帝坐臣獻美女彗星入宮亂抵帝坐或如粉絮兵喪並起流星犯之大臣憂抵四帝坐輔臣憂人多死蒼白氣抵帝坐天子有喪青赤近臣欲謀其主黃白天子有子孫喜月犯四帝天下有喪諸侯有憂五星犯四帝為憂太子一星在帝坐北帝儲也儲有德則星明潤雲氣入黃為喜黑為憂太白熒惑客星流星守犯皆為憂一云金火守之或入太子不廢則為篡逆之事內五諸侯五星在九卿西內侍天子不之國也乾象新書在郎位南辟雍禮得則星明亡則諸侯黜從官一星在太子北侍臣也以不見為安一曰不見則帝不安如常則吉幸臣一星在帝坐東北常侍太子以暗為吉新書在太子東青赤氣入之近臣謀君不成內屏四星在端門內近右執法屏者所以擁蔽帝庭也左右執法各一星在端門兩旁左為廷尉之象右為御史大夫之象主舉刺凶姦君臣有禮則光明潤澤乾象新書在中台南明則法令平月五星及客星犯守則君臣失禮輔臣黜熒惑太白入為兵流星犯之尚書憂郎位十五星在帝坐東北一曰依烏郎府也周之元士漢之光祿中散諫議議郎郎中是其職主衛守也其星不具后妃災幸臣誅星明大或客星入之大臣為亂元士憂彗孛犯郎官失勢彗星枉矢出其次郎佐謀叛熒惑守之兵喪赤氣入兵起黃白吉黑凶郎將一星在郎位北主閲具以為武備也若今之左右中郎將新書曰在太微垣東北明大臣叛客星犯守郎將誅黃白氣入則受賜流星犯將軍憂常陳七星如畢狀在帝坐北天子宿衛虎賁之士以設強禦也星搖動天子自出將明則武兵用微則弱客星犯王者行誅九卿三星在三公北主治萬事今九卿之象也乾象新書在內五諸侯南占與天紀同三公三星在謁者東北內坐朝會之所居也乾象新書在九卿南其占與紫微垣三公同謁者一星在左執法東北主贊賓客辨疑惑乾象新書在太微垣門內左執法北明盛則四夷朝貢三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也在人曰三公在天曰三台主開德宣符西近文昌二星曰上台為司命主壽次二星曰中台為司中主宗室東二星曰下台為司祿主兵所以昭德塞違也又曰三台為天階太一躡以上下一曰泰階上階上星為天子下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人所以和陰陽而理萬物也又曰上台上星主兗豫下星主荊揚中台上星主梁雍下星主冀下台上星主青下星主徐人主好兵則上階上星疏而色赤修宮廣囿肆聲色則上階合而橫君弱則上階迫而色暗公侯背叛率部動兵則中階上星赤外夷來侵邊國騷動則中階下星疏而橫色白卿大夫廢正向邪則中階下星疏而色赤民不從令犯刑為盜則上階下星色黑去本就末奢侈相尚則下階上星闊而橫色白君臣有道賦省刑清則上階為之戚諸侯貢聘公卿盡忠則中階為之比庶人奉化徭役有叙則下階為之密若主奢欲數奪民時則上階為之奪諸侯僭強公卿專貪則中階為之疏士庶逐末豪傑相凌則下階為之闊三階平則陰陽和風雨時穀豐世泰不平則反是三台不具天下失計色明齊等君臣和而政令行微細反是一曰天柱不見王者惡之司命星亡春不得耕司中不具夏不得耨司祿不具秋不得穫一曰三台色青天下疾赤為兵黃潤為德白為喪黑為憂月入君憂臣亂公族叛月入而暈三公下獄客星入之貴臣賜爵邑出而色蒼臣奪爵守之大臣黜或貴臣多病彗星犯三公黜流星入天下兵將憂抵中台將相憂人主惡之雲氣入蒼白民多傷黃白潤澤民安君喜黃將相喜赤為憂青黑憂在三公蒼白三公黜按上台二星在柳北其北星入柳六度中台二星其北入張二度下台二星在太微垣西蕃北其北星入翼二度武密書三台屬鬼又屬柳屬張乾象新書上台屬柳中台屬張下台屬翼長垣四星在少微星南主界域及北方熒惑入之北人入中國太白入九卿謀邊將叛彗孛犯之北地不安流星入北方兵起將入中國少微四星在太微西士大夫之位也一名處士亦天子副主或曰博士官一曰主衛掖門南第一星處士第二星議士第三星博士第四星大夫明大而黃則賢士舉月五星犯守處士女主憂宰相易歲犯小人用忠臣危火犯賢德退土犯宰相易女主憂金犯大臣誅又曰以所居主占之客星孛星犯之王者憂姦臣衆彗星犯功臣有罪一曰法令臣誅流星出賢良進道術用雲氣入色蒼白賢士憂大臣黜靈臺三星在明堂西神之精明曰靈四方而高曰臺主觀雲物察符瑞候災變也武密曰與司怪占同虎賁一星在下台星南一曰在太微西蕃北下台南靜室旄頭之騎官也明則臣順與車騎星同占明堂三星在太微西南角外天子布政之宮明吉暗凶五星客星及彗犯之主不安其宮右上元太微宮常星一十九坐積數七十有八而晉志所載少微長垣各四星屬天市垣與步天歌不同天市垣天市垣二十二星在氐房心尾箕斗內宮之內東蕃十一星南一曰宋二曰南海三曰燕四曰東海五曰徐六曰吳越七曰齊八曰中山九曰九河十曰趙十一曰魏西蕃十一星南一曰韓二曰楚三曰梁四曰巴五曰蜀六曰秦七曰周八曰鄭九曰晉十曰河間十一曰河中象天王在上諸侯朝王王出皋門大朝會西方諸侯在應門左東方諸侯在應門右其率諸侯幸都市也亦然一曰在房心東北主權衡主聚衆又曰天旗庭主斬戮事乾象新書曰市中星衆潤澤則歲實熒惑守之戮不忠之臣彗星掃之為徙市易都客星入為兵起出為貴喪天文録曰天子之市天下所會也星明大則市吏急商人無利小則反是忽然不明糴貴中多小星則民富月入天市易政更弊近臣有抵罪兵起月守其中女主憂大臣災五星入將相憂五官災守之主市驚更弊又曰五星入兵起熒惑守大饑火災或芒角色赤如血市臣叛填星守糴貴太白入起兵糴貴辰星守蠻夷君死客星守度量不平星色白市亂出天市有喪彗星守穀貴出天市豪傑起徙易市都掃帝坐出天市除舊布新流星入色蒼白物貴赤火災民疫一曰出天市為外兵雲氣入色蒼白民多疾蒼黑物貴出物賤黃白物賤黑為嗇夫死帝坐一星在天市中天皇大帝外坐也光而潤澤主吉威令行微小大人憂月犯之人主憂五星犯臣謀主下有叛熒惑尤甚客星入色赤有兵守之大臣為亂彗孛犯人民亂宮廟徙流星犯諸侯兵起臣謀主貴人更令候一星在帝坐東北候一作后主伺陰陽也明大輔臣強細微國安亡則主失位移則不安居太陰犯之輔臣憂客彗守之輔臣黜孛犯臣謀叛宦者四星在帝坐西南侍主刑餘之臣也星微吉失常宦者有憂斗五星在宦者南主平量乾象新書在帝坐西覆則歲熟仰則荒客彗犯為饑斛四星在斗南主度量分銖算數其星不明凶亡則年饑一曰在市樓北名天斛列肆二星在斛西北主貨金玉珠璣屠肆二星在帛度東北主屠宰烹殺乾象新書在天市垣內十五度車肆二星在天市門中主百貨星不明則車蓋盡行明則吉客星彗星守之天下兵車盡發乾象新書在天市垣南門偏東宗正二星在帝坐東南宗大夫也武密曰主囗司宗得失之官乾象新書在宗人西彗星守之若失色宗正有事客星守之更號令也犯之主不親宗廟星孛其分宗正黜宗人四星在宗正東主録親疏享祀宗族有序則星如綺文而明正動則天子親屬有變客星守之貴人死宗星二星在候星東宗室之象帝輔血脈之臣乾象新書在宗人北客星守之宗支不和暗則宗支弱帛度二星在宗星東北主度量買賣平貨易者乾象新書在屠肆南星明大尺量平商人不欺客星彗星守之絲綿大貴市樓六星在天市中臨箕星之上市府也主市賈律度其陽為金錢陰為珠玉變見各以其所占之乾象新書主闤闠度律制令在天市中星明吉暗則市吏不理彗星客星守之市門多閉七公七星在招搖東為天相三公之象也主七政明則輔佐強大而動為兵齊政則國法平戾則獄多囚連貫索則世亂入河中糴貴民饑太白守之天下亂兵起客星守歲饑主危流星出其分主將黜貫索九星在七公星前賤人之牢也一曰連索一曰連營一曰天牢主法律禁強暴牢口一星為門欲其開也星在天市垣北星皆明天下獄繁七星見小赦五星六星大赦動則斧鑕用中空改元石申曰一星亡則有賜爵三星亡大赦遠期八十日入河中為饑中星衆則囚多辰星犯之主水米貴彗星出其分中外豪傑起客星入有枉死者色黃諸侯獻地青為憂赤為兵白乃為吉流星入女主憂或赦出則貴女死雲氣入色蒼白天子亡地青兵起黑獄多枉死白天子喜天紀九星在貫索東九卿之象萬事綱紀主獄訟星明則天下多訟亡則政理壞國紀亂散絶則地震山崩與女牀合則君失禮女謁行客星守之主危民饑客星犯諸侯舉兵彗孛犯之地震客星彗星合守天下獄訟不理女牀三星在天紀北後宮御女侍從官也主女事明則宮人恣舒則妾代女主不動則吉不見女子多疾客星彗星守之宮人謀上客星入女子憂後宮恣動女謁行雲氣出色黃後宮有福白為喪黑凶青女多疾右天市垣常星可名者一十七坐積數八十有八而市樓天斛列肆車肆斗帛度屠肆等星晉志皆不載隋志有之屬天市垣與步天歌合又貫索七公女牀天紀晉志屬太微垣按乾象新書天紀在天市垣北女牀屬箕宿貫索屬房宿七公屬氐宿武密以七公屬房又屬尾貫索屬房又屬氐屬心女牀屬於尾箕說皆不同
