body:
  text: 宋史卷一百四十一志第九十四樂十六鼓吹下高宗郊祀大禮五首導引聖皇巡狩清蹕駐三吳十世嗣瑤圖邊塵不動干戈戢文德溥天敷灰飛緹室氣潛噓郊見紫壇初歸來赦令樓前下喜氣溢寰區六州雙鳳落佳氣藹龍山澄江左清湖右日夜海潮翻因吉地卜築圜壇宏基隆陛級神位周環邊陲靜挂起櫜鞬奠枕海隅安三年親祀一陽初動虔修大報高處紫煙燔看鳴鑾鈎陳肅天仗轉朔風寒孤竹管雲和瑟樂奏徹天關嘉籩薦玉奠璵璠奉神歡九霄瑞氣起祥煙來如風馬歘然還留福已滋繁回龍馭升丹闕布皇澤春色滿人間十二時日將旦陰曀潛消天宇扇祥邊陲靜謐夜熄鳴刁文教普旁昭興太學多士舒翹奉宗祧新廟榜宸毫配侑享於郊慈寧萬壽四海仰東朝男女正中壼致桃夭年屢稔漕舟銜尾夥高廩接楹饒廟堂自有擎天一柱功比漢庭蕭多少羣工同德俊乂旁招吉祥諸福集燮理四時調三年郊見六變奏咸韶望雲霄降福與唐堯奉禋歌蒼蒼天色是還非視下應疑亦若斯統元氣覆無私四時寒暑推移物蕃滋造化有誰知嚴大報反本始禮重祀神祇律管灰吹黃宮動陽來復景長時車陳法駕仗列黃麾帝心祗紫霄霽霜華薄星爛明垂祥煙起紛敷浮袞冕六變笙鏞迭奏一誠幣玉交持宮漏聲遲千官顯相多儀百神嬉風馬雲車來止來綏誕降純禧受神策萬年無極歌頌昊天成命周詩降仙臺升煙既罷良夜未曉天步下神丘鏘鏘鳴玉佩煒煒照金蓮杳靄雲裘綵仗初轉回龍馭旌斾悠悠星影疏動與天流漏盡五更籌大明升東海頭杲杲靈曜倒影射旗旒輦路具修鬱蔥瑞光浮歸來雙闕看御樓有仙鶴銜書赦囚萬方喜氣均祉福播歌謳孝宗郊祀大禮五首導引重華天子長至奉神虞九奏會軒朱星暉雲潤東方曉拜貺竹宮初歸來千乘護皇輿瑞景集金鋪雞竿高唱恩書下惠露匝中區六州嚴更永今夕是何年玉衡正鈎陳粲天宇起祥煙協風應江海安瀾重規仍疊矩聖主乘乾舜授禹盛事光前稱壽玉巵邊三年親祀一陽回律八鄉承宇觚陛紫為壇仰天顏齋居寂誠心肅禮容專鳴鍾石擁輿衛五輅列駢闐聽金鑰虎旅無眠儼千官須期顯相嘉籩一人儉德動天淵費減大農錢神示格宗祧燕人民悅祉福正綿綿十二時庭有燎疊鼓鳴鼉更問夜如何信星彪列天象森羅虞旦閟宮畢觴清廟漿柘樽犧繼猗那嘉頌可同科扈聖萬肩摩飭躬三宿泰畤縟儀多丘澤合嶽瀆從羲和神光燭雲車風馬芝作蓋玉為珂奉瑄成禮燔柴竣事休嘉砰隱丹闕湛恩波共願乾坤隤祉邊鄙投戈覆盂連瀚海洗甲挽天河欣欣喜色長遇六龍過奏雲和三脊薦嘉禾奉禋歌吹葭緹籥氣潛分雲采宜書壤效珍長日至一陽新四時玉燭和均物欣欣化轉洪鈞郊之祭孤竹管六變舞雲門自古嚴禋犧牲具粢盛潔豆籩陳袞龍陟降幣玉紛綸徹高閽靈之斿神哉沛排歷昆侖九歌畢盈郊瞻槱燎斗轉參橫將旦天開地闢如春清蹕移輪闐然鼓吹相聞糸袞祥雲歡臚八陛釐逆三神聖矣吾君華封祝慈宮萬壽椒掖多男六合同文降仙臺漏殘柝靜雞聲遠到高燎入層霄雲裘蟠瑞靄天步下嘉壇旗斾飄搖黃麾列仗貔貅整氣壓江潮導前從後盛官僚玉佩間金貂望扶桑日漸高陰霾霜雪底處不潛消輦路祥飈披拂絳紗袍雲間端闕仰岧挾春澤喜浹黎苗禮成大慶鼇三抃受昕朝寧宗郊祀大禮四首六州皇撫極明德貫乾坤信星列卿雲爛輝亙紫微垣思報貺明詔祠官練時搜曠典紫畤觚壇昭孝德親御和鑾振鷺玉珊珊精純謁款膋蕭爌煬黃流湛淡百末布生蘭扣天閽延飛駕相倣佛降雲端神光集嘉嚮應靄靄萬衣冠竣熙事清曉輕寒恣榮觀華衣霧縠般般乾坤並貺慶君歡翹首聖恩寬遵皇極沛天澤靈心懌龜鼎永尊安十二時宵景霽河漢清夷曠典講明時合祛升侑孝德爰熙陳祼閟宮淡觴太室來奏天儀駟蒼螭玉輅馭蕤綏觚陛展躬祠長梢飾玉翠羽秀金支華始倡雅韻出宮垂神來下雲車風馬繽暗藹宴棲遲畢觴流胙柴煙竣事棠梨回謁宣室受蕃釐盛德無心專饗端為民祈雲恩有截雨澤霈無涯君王愈樂和氣溢瑤巵壽天齊長擁神基奉禋歌葭飛璇籥孕初陽雲絶清臺薦景祥風應律日重光歲功順底金穰壽而康庭壼樂無疆皇展報新禮樂觚陛詠賓鄉珠幄熉黃登瑞繅陳俎豆淡嘉觴袞衣輝煥寶珮琳琅奠椒漿慶陰陰神來下鳳翥龍驤靈燕喜錫符仍降嘏鏞管琳琅歡亮神之出祓蘭堂輦路天香輕煙半襲旗常祉滂洋受釐宣室返馭齋房恩與風翔華封祝皇來有慶八荒同壽寶歷無疆降仙臺星芒收采雲容放曉羲馭漸揚明觚壇竣事霽風襲袞衣輕鑾路塵清甘泉鹵簿祲威肅回軫旋衡千官導從粲簪纓鈞奏間韶英瞻龍闈近鳳城都人雲會芬茀夾道歡迎宸極尊榮巵玉慶熙成瓊樓天上起和聲布春澤洪暢寰瀛嵩呼萬歲鼇三抃頌升平明堂大禮四首合宮歌聖明朝曠典乘秋舉大饗本仁祖九室八牖四戶敕躬齊戒格堪輿盛牲實俎並侑總稽古玉露乍肅天宇冰輪下照金鋪燎煙噓鬱尊香雲門舞髣佛翔坐靈心咸嘉娛衆星俞美光屬照熉清曉御丹鳳湛恩遍浹率溥歡聲雷動嶽鎮呼徐命法駕萬騎花盈路萬姓齊祝壽同天地事超唐虞看平燕雲從此興文偃武待重會諸侯舊東都六州商秋肅嘉會協中辛涓路寢修禋祀聖德昭清端志慮罄竭齋精錦繡排天仗羽衛繽紛朝太室返中宸被袞接神明時平天地俱清晏兼金行萬寶物盛藹清馨瞻熉座舂容娭燕三靈奠瑤爵薦量幣清思窈冥冥望崑崙輸嘉祥塞絪縕誠殫禮洽慶休成潤澤被生民諯門肆眚昕庭稱賀俱將戩穀萬壽祝明君十二時炎圖鞏天祚昌期聖德茂重離英明經遠濬哲昭微寶儉更深慈觀萬國纍洽重熙對時報禮秩神祇玉帛湊華夷肅雍顯相百辟盡欽祗奄嘉虞英璧奠華滋神安坐景氣澄虛極光焰燭長麗展詩應律萬舞逶遲三獻洽皇儀垂靈祲慶祐來宜禮無違鳴鑾臨帝闕飛鳳下天倪清和寰宇霈澤一朝馳醇化無為萬祀鞏丕基導引合宮親饗青女肅長空精意與天通后皇臨顧誰為侑文祖暨神功函蒙祉福歲常豐聲教被華戎兩宮眉壽同榮樂戩穀永來崇乾道發太上皇帝太上皇后册寶導引一首重華真主晨夕奉庭闈禋祀慶成時乾元坤載同歸美寶册兩光輝斑衣何似赭黃衣此事古今稀都人歡樂嵩呼震聖壽總天齊淳熙發太上皇帝太上皇后册寶導引一首新陽初應樂事起彤庭和氣滿吳京帝家來慶東皇壽西母共長生金書玉篆粲龍文前導沸歡聲修齡無極名無盡一歲一回增加上太上皇帝太上皇后册寶導引一首皇家多慶親壽與天長德業播輝光焜煌寶册來清禁玉篆映金相庭闈尊奉會明昌佳氣溢康莊洪禧申輯名增衍億載頌無疆恭上壽聖皇太后至尊壽皇聖帝壽成皇后尊號册寶導引一首皇家盛事三殿慶重重聖主極推崇瑤編寶列相輝映歸美意何窮鈞韶九奏度春風彩仗煥儀容歡聲和氣彌寰宇皇壽與天同加上壽聖皇太后尊號册寶導引一首重親萬壽八帙衍新元禮典備文孫溫溫和氣迎長日寶册煥瑤琨徽音顯號自堯門德行已該存更期昌算齊箕翼愈久愈崇尊嘉泰二年加上壽成太皇太后册寶導引一首思齊文母盛德比薑任擁佑極恩深湯孫歸美熙鴻號鏤玉更繩金虞廷萬辟萃華簪法仗儼天臨層闈慶典年年舉千古播徽音親耕籍田四首導引春融日暖四野瑞煙浮柳菀更桑柔土膏脈起條風扇宿雪潤田疇金根轂轉如雷動羽衛擁貅扶攜老稚康衢滿延跂望凝旒斗移星轉一氣又環周六府要時修務農重穀人胥勸耕籍禮殊尤壇壝嶽峙文明地黛耜駕青牛雍容南畝三推了玉趾更遲留六州昭聖武不戰屈人兵干戈戢烽燧息海宇清寧民豐業歌詠升平願咸歸畎畝力穡為氓經界正東作西成農務軫皇情躬親耒耜相勸深耕人心感悅擊壤沸歡聲乘鸞輅羽旗綵仗鮮明傳清蹕行黃道緹騎出重城仰瞻日表映朱紘環佩更鏘鳴百執公卿不辭染屨意專精準擬奉粢盛田多稼風行遐邇家家給足胥慶三登十二時臨寰宇恭己巖廊屬意在耕桑愛民利物德邁陶唐躋俗盡淳厖開千畝帝籍神倉舉彝章祗祓壇場為農事祈祥涓辰行禮節物值春陽罄齊莊明德薦馨香宮禁邃嬪妃並御侍穜稑獻君王中闈表率陰教逾光帳殿靄熉黃梐枑設翠幕高張慶雲翔樽罍陳酒醴金石奏宮商神靈感格歲歲富倉箱慶明昌行旅不齎糧奉禋歌吾皇端立太平基奉祀肅雍格神祇撫御耦降嘉種何辭手攬洪縻命太史視日祗告前期驗穹象天田入望更光輝掌禮陳儀搜巨典迎春令頒宣溫詔遍九圍人盡熙熙仰明時儼垂衣佳氣氤氳表厖禧豐年屢大田生異粟含滋吐秀九種傳圖盡來丹闕瑞應昌時亨運正當攝提佇見詠京坻躬稼穡重耘耔盛禮興行先百姓崇本業憂勤如禹稷播在聲詩顯仁皇后上仙發引三首導引長樂晚綵戲萊衣奄忽夢報仙期帝鄉渺渺乘鸞去啼紅嬪御不勝悲蒼梧煙水杳難追腸斷處過江時銀濤千萬疊不知何處是瑤池六州中興運孝治格升平回騩馭弭鳳駕册寶初上鴻名龍樓問寢候雞鳴更翻來戲綵衣輕坤躔夜照老人星金觴上壽長願燕慈寧乘雲何處去愁斷紫簫聲追思金殿椒壁丹楹又誰知勤儉仁明風行化被宮庭佑聖主底明時陰功暗及生靈離宮晚花卉娉婷甲觀高潮海崢嶸往事回頭忽飄零空留嬪御掩泣望霓旌會稽山翠永祐陵高而今便是蓬瀛十二時炎圖景運正延鴻文思坐深宮慈寧大養樂事時奏宸聰皇齡永恩霈下遍寰中君王垂綵服嬪御上瑤鍾年年誕節就盈吉月交慶流虹歡洽意方濃不覺仙遊渺邈但號泣蒼穹追慕念音容詩書慈儉配古追蹤躬行四德誰知繼二南風移眄俄空寶鑑脂澤塵封清都遠帝鄉遙杳難通想雲軿還上瀛蓬稽山何在當年禹宅萬古蔥蔥最難堪潮頭定海波融顯仁皇后神主祔太廟導引一首返虞長樂猶是憶賓天何事駕仙軿簫笳儀衛辭宮闕移仗入雲煙於皇清廟敞華筵昭穆謹承先千秋長奉蒸嘗孝永享中興年欽宗皇帝導引一首鼎湖龍遠九祭畢嘉觴遙望白雲鄉簫笳淒咽離天闕千仗儼成行聖神昭穆盛重光寶室萬年藏皇心追慕思無極孝饗奉蒸嘗安穆皇后導引一首鳳簫聲斷縹眇遡丹丘猶是憶河洲熒煌寶册來天上何處訪仙遊蔥蔥鬱鬱瑞光浮嘉酌侑芳羞雕輿繡幰歸新廟百世與千秋景靈宮奉安神御三首徽宗皇帝導引中興復古孝治日昭鴻原廟飾瑰宮金璧千門磻萬楹桷競穹崇亭童芝蓋擁旌龍列聖儼相從共錫神孫千萬壽龜鼎亘衡嵩顯仁皇后導引坤儀厚載遺德滿寰中歸御廣寒宮玉容如在飈輿遠長樂起悲風霓旌絳節下層空雲闕曉曈曨真遊千載安原廟聖孝與天通欽宗皇帝導引深仁厚德流澤自無窮仙馭倏賓空衣冠未返蒼梧遠遙望鼎湖龍人間髣佛認天容縹眇五雲中帝城猶有遺民在垂淚向西風安恭皇后上仙發引一首金殿晚愁結坤寧天下母忽仙升雲山浩浩歸何處但聞空際綵鸞聲紫簫斷後無蹤迹煙靄夜澄澄曉夢到瑤城當時花木正冥冥高宗梓宮發引三首導引寒日短草露朝晞仙鶴下夢雲歸大椿亭畔蒼蒼柳悵無由挽住天衣昭陽深暝鴉飛愁帶箭戀恩栖笳簫三疊奏都人悲淚袂成帷六州堯傳舜盛事千古難並回龍馭辭鳳掖北內別有蓬瀛為天子父册鴻名萬年千歲福康寧春秋不説楚冥靈萊衣綵戲漢殿玉巵輕宸遊今不見煙外落霞明前回丁未霧塞神京正同符光武中興擎天獨力扶傾定宗廟保河山乾坤整頓庚庚功成了脫屣遺榮訪崆洞容與丹庭笑挹塵寰不留行吾皇哀戀淚血灑神旌腸斷濤江渡明日稽山暮雲東望元陵十二時璧門雙闕轉蒼龍德壽儼祗宮軒屏正坐天子親拜天公儀紳笏羅鵷鷺粲庭中仙家歡不盡人世壽無窮誰知雲路玉京成就催返璇穹轉手萬緣空見説煙霄好處不與下方同塵合霧迷濛笙簫寥亮樓閣玲瓏中興大業巍巍稽古成功事去孤鴻忍聽宵柝晨鍾靈輿駕素幃低杳厖茸浙江潮萬神護川后滋恭因山祗事崔嵬禹穴此日重逢柏城封愁長夜起悲風歌清廟千古誦高宗虞主赴德壽宮導引一首上皇天大華旦煥堯文鴻福浩無垠羽龍俄駕靈輴去空宀元攴鼎湖雲稽山翠擁浙江濆歸斾捲繽紛仙遊指日嚴升祔萬載頌高勳祔廟導引一首虞觴奉主仙馭返皇宮禮典極欽崇雲旗前導開清廟龍管咽薰風巍巍堯父告神功追慕孝誠通千秋萬歲中興統宗祀與天同淳熙十六年高宗神御奉安導引一首中興揖遜功德仰兼隆仁澤被華戎鼎湖俄痛遺弓墮如日想威容柔儀懿範與堯同飈馭儼相從靈宮真館偕來燕垂裕永無窮紹熙五年孝宗皇帝虞主還宮導引一首孝宗純孝前聖更何加高蹈處重華丹成仙去龍輴遠越岸暮山遐波臣先為捲寒沙來往護靈槎九虞禮舉神祇樂萬世佑皇家祔廟導引一首吾皇盡孝宗廟務崇尊巨典備彌文巍巍東向開基主七世祔神孫追思九閏整乾坤寰宇慕洪恩從今密邇高宗室千載事如存慶元六年光宗皇帝發引一首笳鼓發雲慘寒空丹旐去捲悲風憂勤六載親幾務有巍巍聖德仁功褰裳尊處大安宮荊鼎就遽遺弓仙遊攀不及臣民號慟訴蒼穹神御奉安導引一首龜書畀姒曆數在皇躬揖遜仰高風鼎湖龍去遺弓墮冠劍宀元攴深宮塗山齊德翊成功仙魄早賓空珍臺間館棲神地獻饗永無窮寧宗皇帝發引三首導引三弄曉雲黯天低攀六引轉悲悽儉慈孝哲鍾天性深仁厚澤遍羣黎東西南北傒商霓功甫就別宸閨臣民千古恨幾時羽衛帶潮歸六州明天子昔日丕纂鴻圖躬道德崇學問稽古訓訪羣儒日親廣廈論唐虞講求政治想都俞君臣一德志交孚外夷效順猶自選車徒仁恩霑四國固結滿寰區千年宗社萬歲規摹重新天命出乾符老癃策杖相扶願觀德化遍方隅幸無死須臾謂宜聖壽等嵩呼遽登雲輿上龍湖宸居幽寂紫雲孤宸章寶畫但與日星俱龍帷鳳翣已載塗忍聽笳鼓嗟吁十二時弋綈革舄最仁賢儉德自躬全憂勤庶政三十餘年金風肅秋漸老攝調愆忱恂遍羣祀號泣訴旻天綴衣將出神凝玉几一夜登仙弓墮隔蒼煙七月有來同軌引綍動靈輇悽愴淚潸然行號巷哭薤露聲傳東城去路驚濤忍見江船憔悴山川不禁簫鼓咽山陰處茂林修竹芊芊望陵宮應弗遠金粟堆前人徒慕戀百神警侍盤翥驅先戴鴻恩空痛慕淚珠連千秋歲功德寄華編神主祔廟導引一首中興四葉休德繼昭清王度日熙平氣調玉燭金穰應八表頌聲騰中原圖籍入宸廷列聖慰真靈袞龍登廟遊仙闕億萬載尊承寶慶三年奉上寧宗徽號導引一首中興五葉天子肇明禋一德格高旻寧皇至聖功超古萬國慕深仁徽稱顯號又還新功德粲雕珉乾坤繪畫終難盡遺澤在斯民莊文太子薨導引一首秋月冷秋鶴無聲清禁曉動皇情玉笙忽斷今何在不知誰報玉樓成七星授轡驂鸞種人不見恨難平何以返霓旌一天風露苦淒清景獻太子薨導引一首霜月苦宮鼓鼕鼕霓旐啓鶴闈空洞簫聲斷知何處海山依約五雲東玉符龍節參神閟昭聖眷慘天容千古恨無窮遍山松柏撼悲風
