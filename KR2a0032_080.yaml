body:
  text: 宋史卷八十志第三十三律曆十三紀元曆步交會交終分一十九萬八千三百七十七秒八百八十交終日二十七餘一千五百四十七秒八百八十交中日一十三餘四千四百一十八秒五千四百四十朔差日二餘二千三百二十秒九千一百二十望策一十四餘五千五百七十九已上秒母一萬交率三百二十四交數四千一百二十七交終度三百六十三約分七十九秒四十四交中度一百八十一約分八十九秒七十二交象度九十約分九十四秒八十六半交象度四十五約分四十七秒四十三日食陽曆限三千四百定法三百四十陰曆限四千三百定法四百三十月食限六千八百定法四百四十已上分秒母各同一百推天正十一月經朔加時入交置天正十一月經朔加時積分以交終分及秒去之不盡滿日法為日不滿為餘秒即天正十一月經朔加時入交泛日及餘秒求次朔及望入交置天正十一月經朔加時入交泛日及餘秒求次朔以朔差加之求望以望策加之滿交終日及餘秒去之即各得次朔及望加時入交泛日及餘秒若以經朔望小餘減之各得朔望夜半入交泛日及餘秒求定朔望夜半入交因經朔望夜半入交泛日及餘秒視定朔望日辰有進退者亦進退交日否則因經為定各得所求求次定朔夜半入交各因定朔夜半入交泛日及餘秒大月加二日小月加一日餘皆加五千七百四十二秒九千一百二十即次朔夜半入交若求次日纍加一日滿交終日及餘秒皆去之即每日夜半入交泛日及餘秒求定朔望加時入交置經朔望加時入交泛日及餘秒以入氣入轉朏朒定數朏減朒加之即得定朔望加時入交泛日及餘秒求定朔望加時月行入交積度置定朔望加時入交泛日及餘秒以日法通日內餘進一位如五千四百五十三而一為度不滿退除為分即定朔望加時月行入交積度及分每日夜半準此求之求定朔望加時月行入交定積度置定朔望加時月行入交積度及分以定朔望加時入轉遲疾度遲減疾加之滿與不足進退交終度及分即定朔望加時月行入交定積度及分每日夜半準此求之求定朔望加時月行入陰陽曆積度置定朔望加時月行入交定積度及分如在交中度及分已下為入陽曆積度已上者去之餘為入陰曆積度每日夜半準此求之求定朔望加時月去黃道度視月入陰陽曆積度及分如交象已下為在少象已上覆減交中度餘為入老象置所入老少象度及分於上列交象度於下以上減下餘以乘上五百而一所得用減所入老少象度及分餘列交中度於下以上減下餘以乘上滿一千三百七十五而一所得為度不滿退除為分即為定朔望加時月去黃道度及分每日夜半準此求之求朔望加時入交常日置其月經朔望加時入交泛日及餘秒以其月入氣朏朒定數朏減朒加之滿與不足進退其日即得朔望加時入交常日及餘秒近交初為交初在二十六日二十七日為交初近交中為交中在十三日十四日為交中求日月食甚定數以其朔望入氣入轉朏朒定數同名相從異名相消副置之以定朔望加時入轉算外損益率乘之如日法而一其定朔望如算外在四七日者視其餘在初數已下初率乘之初數而一初數已上以末率乘之末數而一所得視入轉應朒者依其損益應朏者益減損加其副以朏減朒加經朔望小餘為泛餘滿與不足進退大餘日食者視泛餘如半法已下為中前列半法於下以上減下餘以乘上如一萬九百三十五而一所得為差以減泛餘為食甚定餘用減半法為午前分如泛餘在半法已上減去半法為中後列半法於下以上減下餘以乘上如日法而一所得為差以加泛餘為食甚定餘乃減去半法為午後分月食者視泛餘如半法已上減去半法餘在一千八百二十二半已下自相乘已上者覆減半法餘亦自相乘如三萬而一所得以減泛餘為食甚定餘如泛餘不滿半法在日出分三分之二已下列於上位已上者用減日出分餘倍之亦列於上位乃四因三約日出分列之於下以上減下餘以乘上如一萬五千而一所得以加泛餘為食甚定餘求日月食甚辰刻倍食甚定餘以辰法除之為辰數不盡五因之滿刻法除之為刻不滿為分命辰數起子正算外即食甚辰刻及分若加半辰命起子初求日月食甚入氣食甚大小餘及食定小餘並定朔望大餘以此與經朔望大小餘相減置其朔望食甚大小餘與經朔望大小餘相減之餘以加減經朔望入氣日餘經朔望少即加之多即減之為日月食甚入氣日及餘秒各置食甚入氣及餘秒加其氣中積其餘以日法退除為分即為日月食甚中積及分求日月食甚日行積度置食甚入氣餘以所入氣日盈縮分乘之日法而一加減其日先後數至後加分後減先加後減日月食甚中積即為日月食甚日行積度及分求氣差置日食甚日行積度及分滿二至限去之餘在象限已下為在初已上覆減二至限餘為在末皆自相乘進二位滿三百四十三而一所得用減二千四百三十餘為氣差以午前後分乘之如半晝分而一以減氣差為氣差定數在冬至後末限夏至後初限交初以減交中以加夏至後末限冬至後初限交初以加交中以減如半晝分而一所得在氣差已上者即以氣差覆減之餘應加者為減減者為加求刻差置日食甚日行積度及分滿二至限去之餘列二至限於下以上減下餘以乘上進二位滿三百四十三而一所得為刻差以午前後分乘而倍之如半法而一為刻差定數冬至後食甚在午前夏至後食甚在午後交初以加交中以減冬至後食甚在午後夏至後食甚在午前交初以減交中以加如半法而一所得在刻差已上者即倍刻差以所得之數減之餘為刻差定數依其加減求朔入交定日置朔入交常日及餘秒以氣刻差定數各加減之交初加三千一百交中減三千為朔入交定日及餘秒求望入交定日置望入轉朏朒定數以交率乘之如交數而一所得以朏減朒加入交常日之餘滿與不足進退其日即望入交定日及餘秒求月行入陰陽曆視其朔望入交定日及餘秒如在中日及餘秒已下為月在陽曆如中日及餘秒已上減去中日為月在陰曆求入食限交前後分視其朔望月行入陰陽曆不滿日者為交後分在十三日上下者覆減交中日為交前分視交前後分各在食限已下者為入食限求日食分以交前後分各減陰陽曆食限餘如定法而一為日食之大分不盡退除為小分命大分以十為限即得日食之分其食不及大分者行勢稍近交道光氣微有映蔽其日或食或不食求月食分視其望交前後分如二千四百已下者食既已上用減食限餘如定法而一為月食之大分不盡退除為小分命大分以十為限得月食之分求日食泛用分置交前後分自相乘退二位陽曆一百九十八而一陰曆三百一十七而一所得用減五百八十三餘為日食泛用分求月食泛用分置交前後分自相乘退二位如七百四而一所得用減六百五十六餘為月食泛用分求日月食定用分置日月食泛用分副之以食甚加時入轉算外損益率乘之如日法而一如算外在四七日者依食定餘求之所得應朒者依其損益應朏者益減損加其副即為日月食定用分求月食既內外分置月食交前後分自相乘退二位如二百四十九而一所得用減二百三十一餘以定用分乘之如泛用分而一為月食既內分用減定用分餘為既外分求日月食虧初復滿小餘置日月食甚小餘各以定用分減之為虧初加之為復滿其月食既者以既內分減之為初既加之為生光即各得所求小餘如求時刻依食甚術入之求月食更點法置月食甚所入日晨分倍之減去七百二十九餘五約之為更法又五除之為點法求月食入更點置虧初食甚復末小餘在晨分已下加晨分昏分已上減去昏分餘以更法除之為更數不滿以點法除之為點數其更數命初更算外即各得所入更點求日食所起日在陽曆初起西南甚於正南復於東南日在陰曆初起西北甚於正北復於東北其食八分已上皆起正西復於正東此據午地而論之求月食所起月在陽曆初起東北甚於正北復於西北月在陰曆初起東南甚於正南復於西南其食八分已上皆起正東復於正西此亦據午地而論之求日月出入帶食所見分數各以食甚小餘與日出入分相減餘為帶食差以乘所食之分滿定用分而一如月食既者以既內分減帶食差餘進一位如既外分而一所得以減既分即月帶食出入所見之分不及減者為帶食既出入以減所食分即日月出入帶食所見之分其食甚在晝晨為漸進昏為已退其食甚在夜晨為已退昏為漸進求日月食甚宿次置食甚日行積度望即更加半周天以天正冬至加時黃道日度加而命之即各得日月食甚宿度及分步五星木星周率二百九十萬七千八百七十九秒六十四周差二十四萬五千二百五十三秒六十四曆率二百六十六萬二千六百三十六秒二十二周日三百九十八約分八十八秒六十曆度三百六十五約分二十四秒五十曆中度一百八十二約分六十二秒二十五曆策度一十五約分二十一秒八十五伏見度一十三木星盈縮曆火星周率五百六十八萬五千六百八十七秒六十四周差三十六萬四百一十四秒四十四曆率二百六十六萬二千六百四十七秒二十周日七百七十九約分九十二秒九十七曆度三百六十五約分二十四秒六十五曆中度一百八十二約分六十二秒三十二半曆策度一十五約分二十一秒八十六伏見度一十九火星盈縮曆土星周率二百七十五萬六千二百八十八秒七十八周差九萬三千六百六十二秒七十八曆率二百六十六萬九千九百二十五秒九十周日三百七十八約分九秒一十七曆度三百六十六約分二十四秒四十九曆中度一百八十三約分一十二秒二十四半曆策度一十五約分二十六秒二伏見度一十七土星盈縮曆策數損益率盈積度損益率縮積度一益二百一十三初益一百六十三初二益一百九十七二度一十三益一百四十九一度六十三三益一百六十八四度一十益一百二十八三度一十二四益一百二十八五度七十八益一百四度四十五益八十一七度六益六十五五度四十六益三十三七度八十七益二十三六度五七損三十三八度二十損二十三六度二十八八損八十一七度八十七損六十五六度五九損一百二十八七度六損一百五度四十十損一百六十八五度七十八損一百二十八四度四十十一損一百九十七四度一十損一百四十九三度一十二十二損二百一十三二度一十三損一百六十三一度六十三金星周率四百二十五萬六千六百五十一秒四十三半合日二百九十一約分九十五秒一十四曆率二百六十六萬二千六百九十六秒一十六周日五百八十三約分九十秒二十八曆度三百六十五約分二十五秒三十二曆中度一百八十二約分六十二秒六十六曆策度一十五約分二十一秒八十九伏見度一十半段目常日常度限度初行率合伏三十九日二十五四十九度七十五四十七度七十六一百二十七夕疾初四十七日七十五六十度一十六五十七度七十六一百二十六五十五十夕疾末四十七日七十五五十九度三十九五十七度一一百二十五五十夕次疾初四十七日七十五五十七度空五十四度七十二一百二十三二十五夕次疾末二十九日二十五四十二度二十九四十度六十一百一十五五十夕遲初二十九日二十五二十四度七十二二十三度七十三一百夕遲末一十八日二十五六度九十三六度六十六六十九五十夕留七日夕退九日七十三度七十九一度六十九一十四八十六一十四夕