半總差求諸段初末日行分各半其段總差加減其段平行分後段平行分多者減之為初加之為末後段平行分少者加之為初減之為末其在退行者前減之為初加之為末後加之為初減之為末各為其星其段初末日行度及分秒如前後段平行分俱多俱少者平注之本段總差不滿大分者亦平注之求每日晨前夜半星行宿次置其段總差減日率一以除之為日差纍損益初日行分後行分少損之後行分多益之為每日行度及分秒乃順加退減其段初日晨前夜半宿次命之即每日晨前夜半星行所在宿次徑求其日宿次置所求日減一半之以日差乘而加減初行日分後行分少減之後行分多加之以所求日乘之為積度乃順加退減其段初日宿次即得所求日宿次求五星平合及見伏入氣置定積以氣策及約分除之為氣數不盡為入氣已來日數及分秒其氣數命天正冬至算外即五星平合及見伏入氣日及分秒其定積滿歲周日及分去之餘在來年冬至後求五星合見伏行差木火土三星以其段初日星行分減太陽行分餘為行差金水二星順行者以其段初日太陽行分減星行分餘為行差金水二星退行者以其段初日星行分並太陽行分為行差求五星定合及見伏泛積木火土三星各以平合晨疾夕伏定積便為定合定見定伏泛積金水二星各置其段盈縮定差內水星倍之以其段行差除之為日不滿退除為分秒在平合夕疾晨伏者乃盈減縮加定積為定合定見定伏泛積在退合夕伏晨見者乃盈加縮減定積為定合定見定伏泛積求五星定合定積定星木火土三星以平合行差除其日先後數為距合差日以先後數減之為距合差度以差日差度後加先減其星定合泛積為其星定合日定積定星金水二星順合者以平合行差除其日先後數為距合差日以先後數加之為距合差度以差日差度先加後減其星定合泛積為其星定合日定積定星金水二星退合者以退合行差除其日先後數為距合差日以減先後數為距合差度以差日先減後加以差度先加後減再定合泛積為其星再定合積星各以冬至大餘及約分加定積滿紀法去之命己卯算外即得定合日辰以冬至加時黃道日度加定星依宿次去之即得定合所在宿次求木火土三星定見伏定積日各置其星定見伏泛積晨加夕減象限日及分秒如二至限已下自相乘已上覆減歲周餘亦自相乘百約為分以其星伏見度乘之十五除之為差其差如其段行差而一為日不滿退除為分秒見加伏減泛積為定積如前加命即得日辰求金水二星定見伏定日夕見晨伏以行差除其日先後數為日先加後減泛用積為常用積晨見夕伏以行差除其日先後數為日先減後加泛用積為常用積如常用積在二至限已下為冬至後已上去之餘為夏至後其二至後日及分在象限已下自相乘已上用減二至限餘亦自相乘如法而一所得為分冬至後晨夏至後夕以十八為法冬至後夕夏至後晨以七十五為法以伏見度乘之十五除之為差滿行差而一為日不滿退除為分秒加減常用積為定用積加命如前即得定見伏日辰冬至後晨見夕伏加之夕見晨伏減之夏至後晨見夕伏減之夕見晨伏加之其水星夕疾在大暑氣初日至立冬氣九日三十五分已下者不見晨留在大寒氣初日至立夏氣九日三十五分已下者春不晨見秋不夕見熙寧六年六月提舉司天監陳繹言渾儀尺度與法要不合二極赤道四分不均規環左右距度不對游儀重澀難運黃道映蔽橫簫遊規璺裂黃道不合天體天樞內極星不見天文院渾儀尺度及二極赤道四分各不均黃道天常環月道映蔽橫簫及月道不與天合天常環相攻難轉天樞內極星不見皆當因舊修整新定渾儀改用古尺均賦辰度規環輕利黃赤道天常環並側置以北際當天度省去月道令不蔽橫簫增天樞為二度半以納極星規環二極各設環樞以便遊運詔依新式製造置於司天監測驗以較疏密七年六月司天監呈新製渾儀浮漏於迎陽門帝召輔臣觀之數問同提舉官沈括具對所以改更之理尋又言準詔集監官較其疏密無可比較詔置於翰林天文院七月以括為右正言司天秋官正皇甫愈等賞有差初括上渾儀浮漏景表三議見天文志朝廷用其說令改造法物曆書至是渾儀浮漏成故賞之元豐五年正月翰林學士王安禮言詳定渾儀官歐陽發所上渾儀浮漏木樣具新器之宜變舊器之失臣等竊詳司天監浮漏疏謬不可用請依新式改造其至道皇祐渾儀景表亦各差舛請如法條奏修正從之元祐四年三月翰林學士許將等言詳定元祐渾天儀象所先奉詔製造水運渾儀木樣如試驗候天不差即別造銅器今校驗皆與天合詔以銅造仍以元祐渾天儀象為名將等又言前所謂渾天儀者其外形圓可遍布星度其內有璣有衡可仰窺天象今所建渾儀象別為二器而渾儀占測天度之真數又以渾象置之密室自為天運與儀參合若並為一器即象為儀以同正天度則渾天儀象兩得之矣請更作渾天儀從之七年四月詔尚書左丞蘇頌撰渾天儀象銘六月元祐渾天儀象成詔三省樞密院官閲之紹聖元年十月詔禮部祕書省即詳定製造渾天儀象所以新舊渾儀集局官同測驗擇其精密可用者以聞宣和六年七月宰臣王黼言臣崇寧元年邂逅方外之士于京師自云王其姓面出素書一道璣衡之制甚詳比嘗請令應奉司造小樣驗之踰二月乃成璿璣其圓如丸具三百六十五度四分度之一置南北極崑崙山及黃赤二道列二十四氣七十二候六十四卦十干十二支晝夜百刻列二十八宿並內外三垣周天星日月循黃道天行每天左旋一周日右旋一度冬至南出赤道二十四度夏至北入赤道二十四度春秋二分黃赤道交而出卯入酉月行十三度有餘生明于西其形如鈎下環西見半規及望而圓既望西缺下環東見半規及晦而隱某星始見某星已中某星將入或左或右或遲或速皆與天象吻合無纖毫差玉衡植於屏外持扼樞斗注水激輪其下為機輪四十有三鈎鍵交錯相持次第運轉不假人力多者日行二千九百二十八齒少者五日行一齒疾徐相遠如此而同發于一機其密殆與造物者侔焉自餘悉如唐一行之制然一行舊制機關皆用銅鐵為之澀即不能自運今制改以堅木若美玉之類舊制外絡二輪以綴日月而二輪蔽星度仰視躔次不審今制日月皆附黃道如蟻行磑上舊制雖有合望而月體常圓上下弦無辨今以機轉之使圓缺隱見悉合天象舊制止有候刻辰鐘鼓晝夜短長與日出入更籌之度皆不能辨今制為司辰壽星運十二時輪所至時刻以手指之又為燭龍承以銅荷時正吐珠振荷循環自運其制皆出一行之外即其器觀之全象天體者璿璣也運用水斗者玉衡也昔人或謂璣衡為渾天儀或謂有璣而無衡者為渾天象或謂渾儀望筒為衡皆非也甚者莫知璣衡為何器唯鄭康成以運轉者為璣持正者為衡以今制考之其說最近又月之晦明自昔弗燭厥理獨揚雄云月未望則載魄于西既望則終魄于東其遡於日乎京房云月有形無光日照之乃光始知月本無光遡日以為光本朝沈括用彈况月粉塗其半以象對日之光正側視之始盡圓缺之形今制與三者之說若合符節宜命有司置局如樣製相址於明堂或合臺之內築臺陳之以測上象又別製三器一納御府一置鐘鼓院一備車駕行幸所用仍著為成書以詔萬世詔以討論制造璣衡所為名命黼總領內侍梁師成副之
