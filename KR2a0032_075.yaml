段中積以其段盈縮定差盈加縮減之即其星其段定積及分以天正冬至大餘及約分加之滿紀法去之不盡命甲子算外即得日辰其五星合見伏即為推算段定日後求見伏合定日即曆注其日求五星諸段所在月日各置諸段定積以天正閏日及約分加之滿朔策及分去之為月數不滿為入月以來日數及分其月數命從天正十一月算外即其星其段入其月經朔日數及分定朔有進退者亦進退其日以日辰為定若以氣策及約分去定積命從冬至算外即得其段入氣日及分求五星諸段加時定星各置其星其段中星以其段盈縮定差盈加縮減之即五星諸段定星若以天正冬至加時黃道日度加而命之即其段加時定星所在宿次五星皆以前留為前退初定星後留為後順初定星求五星諸段初日晨前夜半定星木火土三星以其星其段盈縮定差與次度下盈縮定差相減餘為其度損益差以乘其段初行率一百約之所得以加減其段初行率在盈益加損減在縮益減損加以一百乘之為初行積分又置一百分亦依其數加減之以除初行積分為初日定行分以乘其段初日約分以一百約之順減退加其段定星為其段初日晨前夜半定星以天正冬至加時黃道日度加而命之即得所求金水二星直以初行率便為初日定行分求太陽盈縮度各置其段定積如二至限以下為在盈以上者去之餘為在縮又視入盈縮度如一象以下者為在初以上者覆減二至限餘為在末置初末限度及分如前日度術求之即得所求若用立成者直以其度下損益分乘度餘百約之所得損益其度下盈縮差亦得所求求諸段日度率以二段日辰相距為日率又以二段夜半定星相減餘為其段度率及分求諸段平行分各置其段度率及分以其段日率除之為其段平行分求諸段泛差各以其段平行分與後段平行分相減餘為泛差併前段泛差四因之退一等為其段總差五星前留前後留後一段皆以六因平行分退一等為其段總差水星為半總差其在退行者木火土以十二乘其段平行分退一等為其段總差金星退行者以其段泛差為總差後變則反用初末水星退行者以其段平行分為總差若在前後順第一段者乃半次段總差為其段總差求諸段初末日行分各半其段總差加減其段平行分為其段初末日行分前變加為初減為末後變減為初加為末其在退段者前則減為初加為末後則加為初減為末若前後段行分多少不倫者乃平注之或總差不滿大分者亦平注之皆類會前後初末不可失其衰殺求諸段日差減其段日率一以除其段總差為其段日差後行分少為損後行分多為益求每日晨前夜半星行宿次置其段初日行分以日差纍損益之為每日行分以每日行分纍加減其段初日晨前夜半宿次命之即每日星行宿次徑求其日宿次置所求日減一以乘日差以加減初日行分後少減之後多加之為所求日行分乃加初日行分而半之以所求日數乘之為徑求積度以加減其段初日宿次命之即徑求其日星宿次求五星定合定日木火土三星以其段初日行分減一百分餘以除其日太陽盈縮分為日不滿退除為分命曰距合差日及分以差日及分減太陽盈縮分餘為距合差度以差日差度盈減縮加金水二星平合者以一百分減初日行分餘以除其日太陽盈縮分為日不滿退除為分命曰距合差日及分以減太陽盈縮分餘為距合差度以差日差度盈加縮減金水星再合者以初日行分加一百分以除其日太陽盈縮分為日不滿退除為分命曰再合差日以減太陽盈縮分餘為再合差度以差日差度盈加縮減差度則反其加減皆以加減定積為再合定日以天正冬至大餘及約分加而命之即得定合日辰求五星定見伏木火土三星各以其段初日行分減一百分餘以除其日太陽盈縮分為日不滿退除為分以盈減縮加金水二星夕見晨伏者以一百分減初日行分餘以除其日太陽盈縮分為日不滿退除為分以盈加縮減其在晨見夕伏者以一百分加其段初日行分以除其日太陽盈縮分為日不滿退除為分以盈減縮加皆加減其段定積為見伏定日以加冬至大餘及約分滿紀法去之命從甲子算外即得五星見伏定日日辰琮又論曆曰古今之曆必有術過於前人而可以為萬世之法者乃為勝也若一行為大衍曆議及略例校正歷世以求曆法強弱為曆家體要得中平之數劉焯悟日行有盈縮之差舊曆推日行平行一度至此方悟日行有盈縮冬至前後定日八十八日八十九分夏至前後定日九十三日七十四分冬至前後日行一度有餘夏至前後日行不及一度李淳風悟定朔之法並氣朔閏餘皆同一術舊曆定朔平注一大一小至此以日行盈縮月行遲疾加減朔餘餘為定朔望加時以定大小不過三數自此後日食在朔月食在望更無晦二之差舊曆皆須用章歲章月之數使閏餘有差淳風造麟德曆以氣朔閏餘同歸一母張子信悟月行有交道表𩹉五星有入氣加減北齊學士張子信因葛榮亂隱居海島三十餘年專以圓儀揆測天道始悟月行有交道表𩹉在表為外道陽曆在𩹉為內道陰曆月行在內道則日有食之月行在外道則無食若月外之人北戶向日之地則反觀有食又舊曆五星率無盈縮至是始悟五星皆有盈縮加減之數宋何承天始悟測景以定氣序景極長冬至景極短夏至始立八尺之表連測十餘年即知舊景初曆冬至常遲天三日乃造元嘉曆冬至加時比舊退減三日晉姜岌始悟以月食所衝之宿為日所在之度日所在不知宿度至此以月食之宿所衝為日所在宿度後漢劉洪作乾象曆始悟月行有遲疾數舊曆月平行十三度十九分度之七至是始悟月行有遲疾之差極遲則日行十二度強極疾則日行十四度太其遲疾極差五度有餘宋祖沖之始悟歲差書堯典曰日短星昴以正仲冬宵中星虛以殷仲秋至今三千餘年中星所差三十餘度則知每歲有漸差之數造大明曆率四十五年九月而退差一度唐徐升作宣明曆悟日食有氣刻差數舊曆推日食皆平求食分多不允合至是推日食以氣刻差數增損之測日食分數稍近天驗明天曆悟日月會合為朔所立日法積年有自然之數及立法推求晷景知氣節加時所在自元嘉曆後所立日法以四十九分之二十六為強率以十七分之九為弱率併強弱之數為日法朔餘自後諸曆效之殊不知日月會合為朔併朔餘虛分為日法蓋自然之理其氣節加時晉漢以來約而要取有差半日今立法推求得盡其數後之造曆者莫不遵用焉其疏謬之甚者即苗守信之乾元曆馬重績之調元曆郭紹之五紀曆也大概無出於此矣然造曆者皆須會日月之行以為晦朔之數驗春秋日食以明強弱其於氣序則取驗於傳之南至其日行盈縮月行遲疾五星加減二曜食差日宿月離中星晷景立數立法悉本之於前語然後較驗上自夏仲康五年九月辰弗集于房以至於今其星辰氣朔日月交食等使三千年間若應準繩而有前有後有親有疏者即為中平之數乃可施於後世其較驗則依一行孫思恭取數多而不以少得為親密較日月交食若一分二刻以下為親二分四刻以下為近三分五刻以上為遠以曆注有食而天驗無食或天驗有食而曆注無食者為失其較星度則以差天二度以下為親三度以下為近四度以上為遠其較晷景尺寸以二分以下為親三分以下為近四分以上為遠若較古而得數多又近於今兼立法立數得其理而通於本者為最也琮自謂善曆嘗曰世之知曆者鮮近世獨孫思恭為妙而思恭又嘗推劉羲叟為知曆焉
