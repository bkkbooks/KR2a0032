body:
  text: 宋史卷七十五志第二十八律曆八明天曆步晷漏術二至限一百八十二日六十二分一象度九十一度三十一分消息法一萬六百八十九辰法三千二百五十刻法三百九十半辰法一千六百二十五昏明刻分九百七十五昏明二刻一百九十五分冬至嶽臺晷景常數一丈二尺八寸五分夏至嶽臺晷景常數一尺五寸七分冬至後初限夏至後末限四十五日六十二分夏至後初限冬至後末限一百三十七日求嶽臺晷景入二至後日數計入二至後來日數以二至約餘減之仍加半日之分即為入二至後來日午中積數及分求嶽臺晷景午中定數置所求午中積數如初限以下者為在初已上者覆減二至限餘為在末其在冬至後初限夏至後末限者以入限日減一千九百三十七半為泛差仍以入限日分乘其日盈縮積盈縮積在日度術中五因百約之用減泛差為定差乃以入限日分自相乘以乘定差滿一百萬為尺不滿為寸為分及小分以減冬至常晷餘為其日午中晷景定數若所求入冬至後末限夏至後初限者乃三約入限日分以減四百八十五少餘為泛差仍以盈縮差減極數餘者若在春分後秋分前者直以四約之以加泛差為定差若春分前秋分後者以去二分日數及分乘之滿六百而一以減泛差餘為定差乃以入限日分自相乘以乘定差滿一百萬為尺不滿為寸為分及小分以加夏至常晷即為其日午中晷景定數求每日消息定數置所求日中日度分如在二至限以下者為在息以上者去之餘為在消又視入消息度加一象以下者為在初以上者覆減二至限餘為在末其初末度自相乘以一萬乘而再折之滿消息法除之為常數乃副之用減一千九百五十餘以乘其副滿八千六百五十除之所得以加常數為所求消息定數求每日黃道去極度及赤道內外度置其日消息定數以四因之滿三百二十五除之為度不滿退除為分所得在春分後加六十七度三十一分在秋分後減一百一十五度三十一分即為所求日黃道去極度及分以黃道去極度與一象度相減餘為赤道內外度若去極度少為日在赤道內若去極度多為日在赤道外求每日晨昏分及日出入分以其日消息定數春分後加六千八百二十五秋分後減一萬七百二十五餘為所求日晨分用減元法餘為昏分以昏明分加晨分為日出分減昏分為日入分求每日距中距子度及每更差度置其日晨分以七百乘之滿七萬四千七百四十二除為度不滿退除為分命曰距子度用減半周天餘為距中度若倍距子度五除之即為每更差度及分若依司辰星漏曆則倍距子度減去待旦三十六度五十二分半餘以五約之即每更差度求每日夜半定漏置其日晨分以刻法除之為刻不滿為分即所求日夜半定漏求每日晝夜刻及日出入辰刻倍夜半定漏加五刻為夜刻用減一百刻餘為晝刻以昏明刻加夜半定漏滿辰法除之為辰數不滿刻法除之為刻又不滿為刻分命辰數從子正算外即日出辰刻以晝刻加之命如前即日入辰刻若以半辰刻加之即命從辰初也求更點辰刻倍夜半定漏二十五而一為點差刻五因之為更差刻以昏明刻加日入辰刻即甲夜辰刻以更點差刻纍加之滿辰刻及分去之各得更點所入辰刻及分若同司辰星漏曆者倍夜半定漏減去待旦一十刻餘依術求之即同內中更點求昏曉及五更中星置距中度以其日昏後夜半赤道日度加而命之即其日昏中星所格宿次其昏中星便為初更中星以每更差度加而命之即乙夜所格中星纍加之得逐更中星所格宿次又倍距子度加昏中星命之即曉中星所格宿次若同司辰星漏曆中星則倍距子度減去待旦十刻之度三十六度五十二分半餘約之為五更即同內中更點中星求九服距差日各於所在立表候之若地在嶽臺北測冬至後與嶽臺冬至晷景同者纍冬至後至其日為距差日若地在嶽臺南測夏至後與嶽臺晷景同者纍夏至後至其日為距差日求九服晷景若地在嶽臺北冬至前後者以冬至前後日數減距差日為餘日以餘日減一千九百三十七半為泛差依前術求之以加嶽臺冬至晷景常數為其地其日中晷常數若冬至前後日多於距差日乃減去距差日餘依前術求之即得其地其日中晷常數若地在嶽臺南夏至前後者以夏至前後日數減距差日為餘日乃三約之以減四百八十五少為泛差依前術求之以減嶽臺夏至晷景常數即其地其日中晷常數如夏至前後日數多於距差日及減嶽臺夏至常晷餘即晷在表南也若夏至前後日多於距差日即減去距差日餘依前術求之各得其地其日中晷常數若求定數依立成以求午中晷景定數求九服所在晝夜漏刻冬夏二至各於所在下水漏以定其地二至夜刻乃相減餘為冬夏至差刻置嶽臺其日消息定數以其地二至差刻乘之如嶽臺二至差刻二十而一所得為其地其日消息定數乃倍消息定數滿刻法約之為刻不滿為分乃加減其地二至夜刻秋分後春分前減冬至夜刻春分後秋分前加夏至夜刻為其地其日夜刻用減一百刻餘為晝刻其日出入辰刻及距中度五更中星並依前術求之步月離術轉度母八千一百一十二萬轉終分二百九十八億八千二百二十四萬二千二百五十一朔差二十一億四千二百八十八萬七千朔差二十六度餘三千三百七十六萬七千約餘四千一百六十二半轉法一十億八千四百四十七萬三千會周三百二十億二千五百一十二萬九千二百五十一轉終三百六十八度餘三十八萬二千二百五十一約餘三千七百八轉終二十七日餘六億一百四十七萬一千二百五十一約餘五千五百四十六中度一百八十四度餘一千五百四萬一千一百二十五半約餘一千八百五十四象度九十二度餘七百五十二萬五百六十二太約分九百二十七月平行十三度餘二千九百九十一萬三千約分三千六百八十七半望差一百九十七度餘三千一百九十二萬四千六百二十五半約分三千九百三十四弦差九十八度餘五千六百五十二萬二千三百一十二太約分六千九百六十七日衰一十八小分九求月行入轉度以朔差乘所求積月滿轉終分去之不盡為轉餘滿轉度母除為度不滿為餘其餘若以一萬乘之滿轉度母除之即得約分若以轉法除轉餘即為入轉日及餘即得所求月加時入轉度及餘若以弦度及餘纍加之即得上弦望下弦及後朔加時入轉度及分其度若滿轉終度及餘去之其入轉度如在中度以下為月行在疾曆如在中度以上者乃減去中度及餘為月入遲曆求月行遲疾差度及定差置所求月行入遲速度如在象度以下為在初以上覆減中度餘為在末其度餘用約分百為母置初末度於上列二百一度九分於下以上減下餘以下乘上為積數滿一千九百七十六除為度不滿退除為分命曰遲疾差度在疾為減在遲為加以一萬乘積數滿六千七百七十三半除之為遲疾定差疾加遲減若用立成者以其度下損益率乘度餘滿轉度母而一所得隨其損益即得遲疾及定差其遲疾初末損益分為二日者各加其初末以乘除求朔弦望所直度下月行定分置遲疾所入初末度分進一位滿七百三十九除之用減一百二十七餘為衰差乃以衰差疾初遲末減遲初疾末加皆加減平行度分為其度所直月行定分其度以百命為分求朔弦望定日各以日躔盈縮月行遲疾定差加減經朔弦望小餘滿若不足進退大餘命甲子算外各得定日日辰及餘若定朔干名與後朔干名同者月大不同月小月內無中氣者為閏月凡注曆觀定朔小餘秋分後四分之三已上者進一日若春分後其定朔晨分差如春分之日者三約之以減四分之三如定朔小餘及此數已上者進一日朔或當交有食初虧在日入已前者其朔不進弦望定小餘不滿日出分者退一日其望或當交有食初虧在日出已前其定望小餘雖滿日出分者亦退之又月行九道遲疾曆有三大二小日行盈縮纍增損之則有四大三小理數然也若循其常則當察加時早晚隨其所近而進退之使月之大小不過連三舊說正月朔有交必須消息前後一兩月移食在晦二之日且日食當朔月食當望蓋自然之理夫日之食蓋天之垂誡警悟時政若道化得中則變咎為祥國家務以至公理天下不可私移晦朔宜順天誡故春秋傳書日食乃糾正其朔不可專移食於晦二其正月朔有交一從近典不可移避求定朔弦望加時日度置朔弦望中日及約分以日躔盈縮度及分盈加縮減之又以元法退除遲疾定差疾加遲減之餘為其朔弦望加時定日以天正冬至加時黃道日度加而命之即所求朔弦望加時定日所在宿次朔望有交則依後術求月行九道凡合朔所交冬在陰曆夏在陽曆月行青道冬至夏至後青道半交在春分之宿當黃道東立夏立冬後青道半交在立春之宿當黃道東南至所衝之宿亦如之冬在陽曆夏在陰曆月行白道冬至夏至後白道半交在秋分之宿當黃道西立冬立夏後白道半交在立秋之宿當黃道西北至所衝之宿亦如之春在陽曆秋在陰曆月行朱道春分秋分後朱道半交在夏至之宿當黃道南立春立秋後朱道半交在立夏之宿當黃道西南至所衝之宿亦如之春在陰曆秋在陽曆月行黑道春分秋分後黑道半交在冬至之宿當黃道正北立春立秋後黑道半交在立冬之宿當黃道東北至所衝之宿亦如之四序離為八節至陰陽之所交皆與黃道相會故月行九道各視月所入正交積度視正交九道宿度所入節候即其道其節所起滿象度及分去之餘者入交積度及象度並在交會術中若在半象以下為在初限以上覆減象度及分為在末限用減一百一十一度三十七分餘以所入初末限度及分乘之退位半之滿百為度不滿為分所得為月行與黃道差數距半交後正交前以差數減距正交後半交前以差數加此加減出入六度單與黃道相較之數若較之赤道隨數遷變不常計去二至以來度數乘黃道所差九十而一為月行與黃道差數凡日以赤道內為陰外為陽月以黃道內為陰外為陽故月行宿度入春分交後行陰曆秋分交後行陽曆皆為同名若入春分交後行陽曆秋分交後行陰曆皆為異名其在同名以差數加者加之減者減之其在異名以差數加者減之減者加之皆加減黃道宿積度為九道宿積度以前宿九道宿積度減其宿九道宿積度餘為其宿九道宿度及分其分就近約為太半少三數求月行九道入交度置其朔加時定日度以其朔交初度及分減之餘為其朔加時月行入交度及餘其餘以一萬乘之以元法退除之即為約餘以天正冬至加時黃道日度加而命之即正交月離所在黃道宿度求正交加時月離九道宿度以正交度及分減一百一十一度三十七分餘以正交度及分乘之退一等半之滿百為度不滿為分所得命曰定差以定差加黃道宿度計去冬夏至以來度數乘定差九十而一所得依同異名加減之滿若不足進退其度命如前即正交加時月離九道宿度及分求定朔弦望加時月離所在宿度各置其日加時日躔所在變從九道循次相加凡合朔加時月行潛在日下與太陽同度是為加時月離宿次先置朔弦望加時黃道宿度以正交加時黃道宿度減之餘以加其正交加時九道宿度命起正交宿次算外即朔弦望加時所當九道宿度其合朔加時若非正近則日在黃道月在九道各入宿度雖多少不同考其去極若應繩準故云月行潛在日下與太陽同度各以弦望度及分加其所當九道宿度滿宿次去之各得加時九道月離宿次求定朔夜半入轉以所求經朔小餘減其朔加時入轉日餘其經朔小餘以二萬七千八百七乘之