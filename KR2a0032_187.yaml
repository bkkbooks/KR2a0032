可考者統制統領正將副將準備將之目也至於水軍之制則有加於前者南渡以後江淮皆為邊境故也建炎初李綱請於沿江淮河帥府置水兵二軍要郡別置水兵一軍次要郡別置中軍招善舟楫者充立軍號曰凌波樓船軍其戰艦則有海鰍水哨馬雙車得勝十棹大飛旗捷防沙平底水飛馬之名隆興以後至于寶祐景定間江淮沿流堡隘相望守禦益繁民勞益甚逮咸淳末廣東籍蛋丁閩海拘舶船民船公私俱弊矣其禁軍將校則有殿前司都指揮使副都指揮使都虞候各一人諸班有都虞候指揮使都知副都知押班御龍諸直有四直都虞候本直各有都虞候指揮使副指揮使都頭副都頭十將將虞候馬步軍有捧日天武左右四廂都指揮使捧日天武左右各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使每都有軍使步軍謂之都頭副兵馬使步軍謂之副都頭十將將虞候承局押官所領諸班直指揮騎兵步兵之額列如左以其前後之異同者分為建隆以來之制熙寧以後之制而將兵水兵之制可考者因附著于後云建隆以來之制騎軍殿前指揮使左右班二宋初以舊府親從帶甲之士及諸班軍騎中選武藝絶倫者充內殿直左右班四周制簡軍校暨武臣子弟有材勇者立又有川班內殿直乾德三年平蜀得奇兵簡閲材貌魁偉便習騎射者凡百二十人立開寶四年廢散員左右班四周制招置諸州豪傑立散指揮散都頭散祗候凡十二班又於北面驍捷員僚直及諸軍內簡閲填補咸平五年定州路都部署王超言緣邊有強梁輩常居四界擾動邊境請厚給金帛募充散員從之散指揮左右班四散都頭左右班二金槍班左右班二舊名內直太平興國初改選諸軍中善用槍槊者增補東西班弩手龍旗直招箭班共十二舊號東西班承旨淳化二年改為殿前侍東西各第一第二弩手龍旗直班六並帶甲選諸班及不帶甲班增補其東第二茶酒及第三西第四班不帶甲並以諸軍員使臣及沒王事者子弟為之又擇善弓箭者為招箭班散直左右班四雍熙四年以諸道募置藩鎮廳頭軍將及詣登聞院求試武藝者立咸平元年選諸節度使從人騎御馬小底增補鈞容直班二太平興國三年選諸軍諳曉音樂騎御馬小底立淳化二年改之外殿直班一諸班衛士中年多者號看班外殿直後削看班之號或詣諸道攝軍校之職部分州兵謂之權管國初又有內員僚直開寶中廢太平興國四年征太原得上軍天禧四年併入此班捧日并左射直弩手左第五軍總指揮三十五京師三十三雍丘鄭各一舊號小底周改為鐵騎太平興國二年改為日騎雍熙四年改今名分左右廂各四軍雍熙三年選善槍槊者充直淳化三年選善左射者為左射咸平五年選天武拱聖驍騎善弩射者為弩手契丹直三咸平許壽各一後唐置旋廢開寶三年以遼人內附之衆復置太平興國中因事復置旋廢歸明渤海指揮二京師太平興國四年征幽州以渤海降兵立拱聖指揮二十一京師乾德中選諸州騎兵送闕下立為驍雄後改驍猛雍熙四年又改拱辰未幾改今名吐渾小底舊指揮五治平中併為二京師太平興國四年平太原獲吐渾子弟又選監牧諸軍中所有者充驍騎指揮二十三京師太平興國四年置後又選掉搨索兵及左右教駿兵增置雍熙四年改殿前司步鬥弩手為驍騎弩手淳化四年選壯勇超絶者為上驍騎在本軍之上咸平五年分左右廂舊又有殿前小底至道二年選驍騎馬直及善射者充後廢驍勝左右指揮各五京師咸平三年選教駿驍騎諸軍備征子弟材勇者立寧朔指揮十京師尉氏各三雍丘渭河陽河陰各一咸平三年選教駿諸軍備征及外州兵立龍猛指揮八京師太平興國中揀閲龍騎及諸州部送招獲羣盜取其材勇者立淳化四年又擇精悍者為教閲龍猛以備禽盜在本軍之上景德四年又選龍騎驍騎兵增之飛猛指揮二咸平二年選龍猛驍騎兵子弟之材勇者立驍猛指揮四尉氏三太康一舊號驍雄太平興國中改雍熙四年以拱聖年多者為拱辰軍其次等者如故景德四年以拱聖年多者隸之神騎指揮十八雍丘十三咸平五端拱二年選驍雄新配人及教駿借事等兵立淳化二年廢掉搨索軍隸之咸平二年又擇教駿備征及外州增之驍雄指揮四咸平陳留各二太平興國八年遷驍猛中次等者立景德中以驍騎驍勝寧朔軍年多者隸之吐渾直指揮三太原二潞一太平興國八年太原遷雲州及河界吐渾立屯并代州雍熙三年又得雲朔歸明吐渾增立屯潞州安慶直四太原一潞三太平興國四年遷雲朔及河東歸明安慶民分屯并潞等州給以土田雍熙四年立三部落指揮一太原太平興國四年親征幽州遷雲朔應等州部落於并州因立清朔指揮四西京二許汝各一太平興國四年遷雲朔州民於內地得自置馬以為騎兵謂之家戶馬雍熙四年立擒戎指揮五西京許各二汝一太平興國四年遷雲朔州民於西京許汝等州給以土田充家戶馬端拱二年立新立內員僚直五端拱二年成德軍節度使田重進言易州靜寨兵先屯鎮州賊陷勇陷谷盡俘其家請以其軍備宿衛因而立此直後廢天聖後無散祗候左右班二天聖前無步鬥指揮六尉氏太康各一蔡四慶曆中增置天聖前無步軍御龍直左右二舊號簇御馬直太平興國二年改為簇御龍直後改今名御龍骨子直左右二舊號骨子直太平興國二年改為御龍散手直後改今名御龍弓箭直五選天武諸軍材貌魁傑者充御龍弩直五天武并寬衣直左射總指揮三十四京師三十三咸平一神勇上下共二十一指揮乾德中揀閲諸軍壯實而大體者立為雄威太平興國二年改為雄勇雍熙四年改今名淳化四年選武藝超絶者立為上神勇以備擒盜宣武上下共二十指揮京師太平興國二年併效節忠猛二軍立又選諸軍及鄉兵增之至道二年又選軍頭司步直善用槍槊掉刀者立殿前步直後廢虎翼太平興國中揀雄武弩手立為上鐵林又於雄武定遠寧勝床子弩手飛山雄武等軍選徑兵以增其數雍熙四年改分左右四軍淳化四年選本軍精鋭者為上虎翼以備禽盜咸平二年併廣勇軍隸之大中祥符六年詔在京諸軍選江淮士卒善水者習戰於金明池立為虎翼水軍舊指揮六十二景德中增六京師雄勇舊號雄威太平興國二年改今名雍熙四年改神勇復於本軍選退入次等者為之舊指揮五至和五年增為八咸平三鄆二許鄭滑各一廣德開寶四年平廣南以其兵隸殿前司次等隸八作司闕則選廣南諸州兵補之雍熙三年選八作司之彊壯者為揀中總指揮十咸平尉氏陽武河陽滄鞏白波各一西京三廣勇淳化二年選神射鞭箭雄武效忠等軍彊壯善射者立為廣武大中祥符二年改今名舊指揮二十三慶曆中增為四十三每指揮十為一軍京師五陳留二十二咸平東明太原胙城南京各二襄邑陽武鄆各一滑三廣捷舊名左右平遠建隆二年改咸平五年又選廣德神威等軍教以標槍旁牌補之舊指揮五景祐中增五明道中增十慶曆增三十六總五十六陳留八咸平六雍丘四襄邑尉氏許各三太康扶溝南京亳河陰潁寧陵各二陳六滑曹鄧蔡廣濟穀熟永城襄城葉各一雄威雍熙四年選神勇兵退入第二等立為神威後改今名指揮十考城襄邑陳留各一南京四陳二宣威雍熙四年選神勇宣武兵退入次等者立上下指揮二咸平襄邑各一龍騎建隆間以諸道招致及捕獲羣寇立號有馬步人見陳即步鬥淳化三年選本軍年多者為帶甲剩員咸平以後又以本軍及龍猛退兵增之舊指揮八康定中取配隸充軍者增置為指揮二十分三軍京師四尉氏雍丘咸平鄭各二南京陳蔡河陽潁單四波各一神射兩浙州兵舊號腰弩雍熙四年改今名淳化元年部送闕下選其彊者為廣武次等復為本軍指揮五陳留三雍丘二步鬥雍熙三年選諸州廂軍之壯勇者立後廢此下二軍天聖後無鞭箭雍熙三年選兩浙兵為鞭箭次等者為忠節鞭箭端拱二年併為一至道元年發此兵援靈州芻粟喪車重兵器於浦洛河詔免死後廢侍衛司侍衛親軍馬步軍都指揮使副都指揮使都虞候各一人馬軍都指揮使副都指揮使都虞候各一人步軍亦如之自馬步軍都虞候已上其員全闕即馬步軍都指揮使等各領其務與殿前號為三司馬步軍有龍衛神衛左右四廂都指揮使都虞候每指揮有指揮使副指揮使餘如殿前司之制所領騎兵步兵之額列如左騎軍員僚直顯德中周平三關召募強人及選高陽關馳捷兵為北面兩直建隆初選諸州騎兵及蕃鎮廳頭召募人等為左三直太平興國四年平太原選其騎兵為右三直北面兩直營貝冀隸高陽關都部署大中祥符中改為貝州左直冀州右直後改四直京師二恩冀各一龍衛舊號護聖周廣順中改龍捷建隆二年揀去衰老以諸州所募精徑者補之太平興國二年改分左右廂四年平太原選其降兵為揀中龍衛雍熙二年又揀善槍槊者為直淳化三年選剩員堪披甲者為帶甲剩員五年又揀善左射者為左射指揮四十四京師三十八雍丘尉氏河陽各一澶三忠猛咸平一年置指揮一定州散員咸平五年置指揮一定州驍捷周顯德中平三關揀諸州士卒壯勇者為河北驍捷宋初隸高陽關都部署建隆二年廢左右驍武以其兵來隸乾德中又選備征及嵐州歸附之兵為河南驍捷其後止以驍捷為名太平興國四年平太原揀閲降兵為揀中驍捷淳化四年又置新立驍捷至道三年分驍捷為左右廂咸平五年以其年多者為帶甲剩員指揮二十六尉氏新立陳揀中各一恩十四冀十雲騎舊號左右備征建隆二年改開寶以後募子弟為雲騎以其次為武騎又選騎兵之次等為武騎又選本軍年多者為帶甲剩員指揮十五京師十一陳留西京各一鞏二歸明神武太平興國四年親征幽州以其降兵立此軍初指揮一後增為四雍丘克勝本潞州騎兵端拱初升指揮二潞驍鋭舊名散員指揮咸平四年改指揮四莫三冀一驍武本河北諸州忠烈威邊騎射等兵淳化四年揀閲其材與雲騎武騎等立得自置馬分左右廂指揮二十北京七真定三定六相懷洺邢各一廣鋭本河州忠烈宣勇能結社買馬者馬死則市補官助其直至道元年立咸平以後選振武兵增之老疾者以親屬代景德二年詔非親屬願代者聽大中祥符五年以其退兵為帶甲剩員舊河東指揮三十一陝西七景祐康定中增為四十二太原代并各三汾五嵐石岢嵐各二晉熙慈絳澤隰憲寧化威勝平定火山各一涇原鄜各二秦渭環邠寧各一武清晉州騎兵端拱二年以其久在北鄙有屯戍之勞選勇悍者就升指揮一晉有馬徑勇咸平四年選江東諸州兵立慶曆中分置第六第七總指揮七太原二代嵐各一磁三雲翼舊指揮三十三景祐以後增置二十三分左右廂總五十六真定雄瀛深趙永寧各三定冀各六保五滄北平永靜順安保定各二莫邢霸各一廣信安肅各四廳子本石州城立景德元年改徙營相州慶曆初升禁軍指揮六定一相五萬捷開寶中募趙相滄冀州民立大中祥符中以驍武雲騎退兵隸之指揮七相冀遼各二滄一雲捷太平興國四年選諸軍中應募子弟及教駿借事備征等有武幹者立大中祥符五年以寧朔退兵隸之指揮十二尉氏咸平西京北京澶各二汝懷各一橫塞咸平三年選諸軍威邊騎射及在京借事立指揮七雍丘咸平考城襄邑寧陵各一衛二員僚剩員直禁軍員僚以罪責降者充此下至騎捷凡六軍天聖後無清塞周立指揮二其一北蕃歸附之衆營壽州其一破淮南紫金山寨所得騎軍營延州宋初選本軍子弟補其缺太平興國三年又得泉州兩浙兵以益之飛捷本威虜軍保州易州靜塞兵定州廳子軍立淳化元年詔赴闕揀閲以靜塞為三等廳子為一等改今名指揮四驍駿本壽州咸聖軍咸平三年改指揮一揀中夏州廳子本夏州家戶淳化五年河西行營都部署李繼隆遣部送京師立指揮一騎捷本雍州強人指揮咸平三年改分營瀛莫指揮四武騎指揮一十一京師雍丘各一尉氏三陳留考城咸平鄭各一西京二此下至有馬雄略凡十二軍三朝志無驍騎指揮一太原無敵河北沿邊廂兵慶曆二年升禁軍總指揮六定北平各二安肅廣信各一忠鋭廣信廂兵有馬者慶曆二年升禁軍指揮一威邊諸州廂兵惟保州教戰射隸巡檢司慶曆初升禁軍指揮二定保各一飛騎麟州廂兵慶曆初升禁軍指揮二威遠府州廂兵本胡騎之精鋭慶曆初升禁軍指揮二克戎并州廂軍有馬者康定中升禁軍指揮一有馬安塞慶州廂軍慶曆中升禁軍指揮一蕃落陝西沿邊廂兵有馬者天禧後升禁軍極邊城寨悉置至慶曆中總指揮八十三環五延慶各四秦并外寨十七原渭并外寨各十二德順并外寨十二鳳翔涇并外寨儀保安各二隴外一并州騎射諸道廂軍惟并州路有馬備征役慶曆五年升禁軍指揮一有馬雄略至和二年置指揮三廣桂雍各一步軍神衛晉曰奉國軍周改虎捷建隆二年揀閲諸州所募禁軍增補乾德三年西川行營都部署王全斌僞署感化耀武等軍平寇者功請備禁旅詔並為虎捷太平興國二年改舊水虎翼即軍中習水戰者是歲改為神衛水軍又於剩員中選可備征役者立為揀中神衛大中祥符後剩員又有帶甲看倉草場看船之名凡四等皆選本軍年多者補宋初指揮四十六仁宗後止存指揮三十一京師步武本鄉軍選充神勇宣武雍熙三年揀其次等者立慶曆中增指揮六陳虎翼宋初號雄武弩手太平興國二年選壯勇者為上鐵林其次為下鐵林雍熙四年改為左右廂各三軍咸平五年以威虎軍來隸景德三年選效順兵補其缺大中祥符五年擇本軍善水戰者為上虎翼六年又選江淮習水卒於金明池按試戰棹立為虎翼軍江浙淮南諸州亦准此選置七年改為虎翼水軍舊指揮七十五慶曆中增置二十一總九十六京師九十并水軍一襄邑東明單各一長葛一奉節乾德三年平蜀得其兵立為奉議後改今名景德三年又選立上奉節指揮五京師武衛太平興國中募河北諸州兵立舊指揮十六慶曆中河北增置為指揮六十七南京真定淄各四北京澶相邢懷趙棣洺德祁通利乾寧廣濟各一青五鄆徐兗曹濮沂濟單萊濰登淮陽瀛博各二齊密滄各三雄武并雄武弩手床子弩雄武揀中雄武飛山雄武揀中歸明雄武總指揮三十四京師十三太原尉氏南京鄭汝寧陵各二咸平東明雍丘襄邑許曹廣濟穀熟長葛各一川效忠太平興國三年選諸州廂兵歸京師者立淳化四年又選川峽威棹克寧兵部送京師者立為川效忠景德六年以德清廂軍及威遠兵增之舊指揮二十八後減為七南京六寧陵一效順宋初征潞州以降卒立指揮一襄邑雄勝開寶中以剩員立太平興國中選入上鐵林餘如故又有雄勝剩員指揮三峽冀濟各一揀中雄勇開寶中立以常寧雄勇效順等軍剩員中選其強者立為揀中大中祥符二年又選歸遠軍為新立舊指揮四後損為一襄邑懷勇開寶四年揀蜀兵之在京師者立指揮三雍丘二陳一威寧淳化中部送西川賊帥王小波脅從之兵歸京師立咸平元年又以散員直增補指揮一許飛虎本虎翼廣武兵屯西川無家屬者太平興國中歸京師指揮三陳留二咸平一懷順本淮南兵舊號懷德建隆二年改指揮一霸歸聖開寶七年以李從善所領兵及水軍立八年平江南又以其降兵增補指揮一雍丘順聖太平興國中部送兩浙兵歸京師立指揮一鞏懷恩乾德三年平蜀得其軍立指揮三荊南二鄂一揀中懷愛本蜀兵與懷恩同立又拔精鋭者為揀中淳化四年又選川峽威棹克寧兵次等者立為牽船以給河漕之役舊指揮三後損為一寧陵勇捷太平興國四年征太原立分左右廂以諸州庫兵補左廂廣濟開山兵補右廂指揮二十六襄邑北京澶陳壽汝曹宿各二咸平西京南京亳寧洪河陰鞏長葛韋城各一威武太平興國四年征太原立分左右廂以江南歸化兵補左廂兩浙順化兵補右廂大中祥符五年又立下威武共指揮十三西京河陽鄭鄆澶滑濮通利鞏河陰永城各一曹二靜戎弩手選江南歸化兵及諸州廂兵壯實者立指揮四河陽澶衛通利各一平塞弩手本兩浙順化軍揀其強壯立為弩手又以江浙逋負官物隸窯務徒役者為揀中平塞指揮四咸平亳河陽白波各一新立弩手本徑勇兵太平興國中選其善弩者立指揮一廣濟忠勇咸平五年以易州兵能禽賊者立指揮一成都寧遠大中祥符六年選西川克寧威棹兵立舊指揮五皇祐及至和中增置為八戎三遂梓嘉雅江安各一忠節太平興國三年選諸州廂軍之強壯者立淳化四年又選川峽威棹克寧兵立為川忠節舊指揮二十四後增教閲忠節總為六十雍丘襄邑寧陵各三陳留咸平東明亳河陰永城各二南京五太康陽武許江寧揚廬宿壽楚真泗泰滁嶽澧池歙信太平饒宣洪虔吉臨江興國廣濟南康廣德長葛各一合流四神威咸平三年選京師諸司庫務兵立上下指揮十三陳留三許鞏各二雍丘考城咸平河陽廣濟白波各一歸遠雍熙三年王師北征拔飛狐靈丘得其降卒立咸平二年選諸州雜犯兵增之舊指揮三天聖中增置為十六陳許亳壽宿鄧襄鼎各一荊南澧潭洪各二雄略咸平六年選諸州廂兵及香藥遞鋪兵立舊指揮十五皇祐五年增置為二十五荊南五潭四鼎澧各二廣辰桂各二許全邵容各一威猛咸平三年選諸州廂兵及召募者立上下指揮十襄邑四咸平許長葛各二神鋭咸平六年料簡河東兵立大中祥符五年以本軍及神虎兵年多者為帶甲剩員指揮二十六太原六潞晉各三澤汾隰平定各二代絳欣遼邢威勝各一神虎咸平五年選陝西州兵馬立六年又料簡河東州兵立以西路河東兵之指揮二十六永興六鳳翔河中欣晉威勝各二太原秦延鄜華各一潞州三保捷咸平四年詔陝西沿邊選鄉丁保毅升充舊指揮四十五慶曆中揀鄉弓手增置總一百三十五永興十二同九秦八河中汾涇各七渭寧耀各六鳳翔延儀華隴解乾各五陝原鄜各四成三慶鳳坊晉鎮戎各二環丹商虢階慶成德順各一振武舊指揮四十慶曆後河北增置為指揮四十二陝西增置為指揮三十九總八十一北京澶相懷衛霸莫祁棣趙濱洺保安永寧通利安肅儀各一真定定瀛保恩邢深博永靜乾寧陵涇各二延六邠隴各七鄜寧各五磁四滄原各三橋道太平興國三年選諸州廂兵次等者立淳化四年又選川峽威棹克寧為川橋道總指揮十八襄邑咸平陽武各二陳留東明尉氏太康西京河陽濮鄆鞏河陰白波寧陵各一清塞太平興國初立左右廂舊指揮二十三嘉祐中併為十三曹二鄭鄆滑通利鞏河陰白波汜水長葛各一招收端拱中獲通州大沙洲賊衆立缺則以江浙招致海賊補之又收端拱中逃軍來復者原其罪為德壽軍後改今名隸保州巡檢司慶曆初升禁軍為指揮十七保四霸信安各三定軍城寨各二廣信安肅順安各一壯勇本招獲羣盜配近京徒役者揀拔立咸平三年選諸雜犯兵增之至道三年江浙發運使楊允恭禽海賊送闕下增補旋廢舊指揮三慶曆中增置為七耀解滑各二許一宣效咸平三年選六軍窯務軍營務天駟監效役店宅務州兵立景德元年又揀本軍材勇者為揀中宣效舊指揮五後損為二京師來化雍熙中以飛狐靈丘歸附之衆立又以朔州內附牽擺兵立後廢舊指揮三後損為二寧陵歸恩雍熙中平塞陷邊之民黥面放還立分有家屬者隸左廂無者隸右廂指揮二亳順化太平興國三年以兩浙兵之次等者立指揮二河陽鄆各一左右清衛大中祥符八年立以奉諸宮觀灑掃之役指揮二此下至強壯軍員凡八軍天聖後無川員僚直本西蜀賊全師雄所署將領乾德中立造船務乾德初平荊湖選其軍善治舟楫者立歸明羽林太平興國四年征幽州獲其兵立新立清河緣河舊置鋪兵以備河决後揀閲立指揮二保寧大中祥符元年馬步軍都虞候王超請以病軍經行陳者立新立歸化開寶七年以江南李從善所領部曲水軍立八年平江南又以降兵增之指揮一強壯軍員咸平六年置指揮一澄海弩手慶曆二年置隸海州都巡檢司指揮二登此下至武嚴凡十三軍捉生延州廂兵天聖五年升禁軍指揮二清邊弩手寶元初選陝西河東廂軍之伉健者置以弩手名指揮四十三太原九秦五涇四河中隴各三永興代潞晉各二慶環滑同坊鎮戎慈丹隰汾憲各一制勝陝西廂兵慶曆中升禁軍指揮九永興華各二鳳翔耀同解乾各一定功陝西廂軍慶曆四年升禁軍增置為指揮十永興秦慶原渭涇儀鄜延鎮戎各一清澗慶曆初募土人精悍者充因其地名指揮二建威秦州廂兵慶曆八年升禁軍指揮一效勇景祐中募川峽流民增置為指揮二十七陳留三太康尉氏襄邑河陽曹合流各二咸平鄭亳衛許單澶磁廣濟河陰寧陵白波各一宣毅慶曆中京東京西河北河東淮南江南兩浙荊湖福建九路募健勇或選廂軍為之指揮二百八十八至治平中管一百七十四京東路南京鄆徐曹齊各二青兗密濮沂單濟淄萊濰登淮陽廣濟各一京西路西京滑許河陽陳襄鄭潁蔡汝隨信陽各一鄧二河北路真定德棣博邢祁恩磁深定濱通利永靜乾寧各一河東路太原汾各六晉四澤絳石代各三潞嵐欣遼威勝平定各二慈隰寧化各一淮南路揚亳各二廬宿壽楚真泗蘄海舒泰濠和光黃通無為高郵漣水各一江南路江寧洪虔吉撫袁筠建昌南安各一兩浙路杭二越蘇明湖婺潤溫衢常秀處各一荊湖路潭全鼎各三荊南邵衡永郴道安鄂嶽澧復峽歸辰荊門漢陽桂陽各一福建路建二泉南劍漳汀邵武興化各一宣毅床子弩炮手慶曆中置指揮一岢嵐建安府州廂兵慶曆二年升禁軍指揮二府嵐各一威果嘉祐四年置指揮二十五荊南江寧杭揚廬潭各三洪越福各二虔一武嚴指揮一京師御前忠佐軍頭司馬步軍都軍頭副都軍頭馬軍都軍頭副都軍頭步軍都軍頭副都軍頭其所轄散員有副指揮使軍使副兵馬使十將馬步直自指揮使而下皆如殿前司之制御前忠佐散員本許州員僚剩員淳化中立為軍頭司散員一班又五代以來軍校立功無可門署者第令與諸校同其飲膳名健飯都指揮使後唯被譴者居此大中祥符二年改為散指揮使班一馬直雍熙四年置指揮一步直端拱元年置指揮一備軍一千九百六十人皇城司親從官太平興國四年分親事官之有材勇者為之給諸殿灑掃及契勘巡察之事指揮三入內院子天聖元年揀親事官年高者為之九年選輦官六十以上者充治平二年詔以五百人為額騏驥院騎御馬直太平興國二年置分左右番八年分為二直其後增置八直左右教駿舊名左右備征建隆二年改指揮四
