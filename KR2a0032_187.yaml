body:
  text: 宋史卷一百八十七志第一百四十兵一禁軍上宋之兵制大概有三天子之衛兵以守京師備征戍曰禁軍諸州之鎮兵以分給役使曰廂軍選於戶籍或應募使之團結訓練以為在所防守則曰鄉兵又有蕃兵其法始於國初具籍塞下團結以為藩籬之兵其後分隊伍給旗幟繕營堡備器械一律以鄉兵之制今因舊史纂修兵志特置于熙寧保甲之前而附之鄉兵焉其軍政則有召募揀選廩給訓練屯戍遷補器甲馬政八者之目條分而著之以見歷朝因革損益之不同而世道之盛衰亦具是矣嗟乎三代遠矣秦漢而下得寓兵於農之遺意者惟唐府衛為近之府衛變而召募因循姑息至於藩鎮盛而唐以亡更歷五代亂亡相踵未有不由於兵者太祖起戎行有天下收四方徑兵列營京畿以備宿衛分番屯戍以捍邊圉于時將帥之臣入奉朝請獷暴之民收隸尺籍雖有桀驁恣肆而無所施於其間凡其制為什長之法階級之辨使之內外相維上下相制截然而不可犯者是雖以矯纍朝藩鎮之弊而其所懲者深矣咸平以後承平既久武備漸寬仁宗之世西兵招刺太多將驕士惰徒耗國用憂世之士屢以為言竟莫之改神宗奮然更制於是聯比其民以為保甲部分諸路以隸將兵雖不能盡拯其弊而亦足以作一時之氣時其所任者王安石也元祐紹聖遵守成憲逮崇寧大觀間增額日廣而乏精鋭故無益於靖康之變時其所任者童貫也建炎南渡收潰卒招羣盜以開元帥府其初兵不滿萬用張韓劉嶽為將而軍聲以振及秦檜主和議士氣遂沮孝宗有志興復而未能光寧以後募兵雖衆土宇日蹙況上無馭將之術而將有中制之嫌然沿邊諸壘尚能戮力效忠相與維持至百五十年而後亡雖其祖宗深仁厚澤有以固結人心而制兵之有道綜理之周密於此亦可見矣禁兵者天子之衛兵也殿前侍衛二司總之其最親近扈從者號諸班直其次總於御前忠佐軍頭司皇城司騏驥院餘皆以守京師備征伐其在外者非屯駐屯泊則就糧軍也太祖鑒前代之失萃精鋭於京師雖曰增損舊制而規𤨓宏遠矣建隆元年詔殿前侍衛二司各閲所掌兵揀其驍勇升為上軍老弱怯懦置剩員以處之詔諸州長吏選所部兵送都下以補禁旅之闕又選強壯卒定為兵樣分送諸道其後代以木梃為高下之等散給諸州軍委長吏都監等召募教習俟其精練即送闕下二年改左右雄捷左右驍武軍並為驍捷左右備征為雲騎左右平遠為廣捷左右懷德為懷順四年賜河東樂平縣歸降卒元威以下二百六十六人衣服錢絹有差立為效順指揮乾德二年詔遼州降軍宜以效順懷恩為名三年四月詔改西川感化耀武等軍並為虎捷九月上御講武殿閲諸道兵得萬餘人以騎兵為驍雄步軍為雄武並隸侍衛司且命王繼勳主之給緡錢俾娶妻繼勳縱之白日掠人妻女街使不能禁帝聞大怒捕斬者百人小黃門閻承翰見而不奏亦杖數十開寶七年泰寧軍節度使李從善部下及江南水軍凡千三十九人並黥面隸籍以歸化歸聖為額太平興國二年詔改簇御馬直曰簇御龍直鐵騎曰日騎龍捷曰龍衛控鶴曰天武虎捷曰神衛骨子直曰御龍骨子直寬衣控鶴曰寬衣天武雄威曰雄勇龍騎曰雄猛八年改濮州平海指揮為崇武雍熙四年改殿前司日騎直指揮為捧日直日騎改為捧日驍猛改為拱辰雄勇改為神勇上鐵林改為殿前司虎翼腰弩改為神射侍衛步軍司鐵林改為侍衛司虎翼至道元年帝閲禁兵有挽彊弩至一石五斗連二十發而有餘力者顧謂左右曰今宇內阜安材武間出弧矢之妙亦近代罕有也又令騎步兵各數百東西列陳挽彊彀弩視其進退發矢如一容止中節因曰此殿庭間數百人爾猶兵威可觀況堂堂之陳數萬成列者乎咸平三年詔定州等處本城廳子無敵忠鋭定塞指揮已並升充禁軍馬軍雲翼指揮依逐州軍就糧令侍衛馬軍司管轄定州揀中廳子第一充雲翼第一第二充雲翼第二相州廳子第一充雲翼第三第二充雲翼第四保州無敵第一充雲翼第五第二充雲翼第六忠鋭充雲翼第七威勇軍無敵第一充雲翼第八第二充雲翼第九忠鋭充雲翼第十靜戎軍無敵充雲翼第十一寧邊軍無敵充雲翼第十二北平塞無敵充雲翼第十三深州無敵充雲翼第十四北面諸處應管本城定塞指揮已下鎮定州高陽關路都總管並充禁軍馬軍雲翼指揮才候升立訖分析逐指揮員兵士人數就糧州府本指揮見在去處以聞四年詔陝西沿邊州軍兵士先選中者並升為禁軍名保捷五年正月置廣捷兵士五指揮五月命使臣分往邠寧環慶涇原儀渭隴鄜延等州於保安保毅軍內與逐處官吏選取有力者共二萬人各於本州置營升為禁軍號曰振武指揮既而帝曰邊防闕兵朝廷須為制置蓋不得已也候邊鄙乂寧即可銷弭六月以河東州兵為神鋭二十四指揮神虎十指揮又升石州廳子軍為禁軍又以威虎十指揮隸虎翼景德四年詔河東廣鋭神鋭神虎軍以見存為定額缺則補之大中祥符元年詔侍衛步軍司閲保寧軍士分為四等其第一等徙營亳州永城縣餘聽歸農無家可還者隸諸州為剩員四年宣示永安縣永安指揮兵八千餘人以奉諸陵其軍額猶隸西京本城廂軍可賜名奉先指揮升為禁軍在清塞之下八年置禁軍左右清衛二指揮在雄武弩手之上散卒月給鐵錢五百以奉宮觀仁宗即位海內承平而留神武備始幸安肅教場觀飛山雄武發炮命捧日天武神衛虎翼四軍為戰陳法拔其擊刺騎射之精者稍遷補之由天聖至寶元間增募諸軍陝西蕃落廣鋭河北雲翼京畿廣捷虎翼效忠陝西河東清邊弩手京西江淮荊湖歸遠總百餘營康定初趙元昊反西邊用兵詔募神捷兵易名萬勝為營二十所募多市井選磱不足以備戰守是時禁兵多戍陝西並邊土兵雖不及等然驍勇善戰京師所遣戍者雖稱魁頭大率不能辛苦而摧鋒陷陳非其所長又北兵戍及川峽荊湘嶺嶠間多不便習水土故議者欲益募土兵為就糧於是增置陝西蕃落保捷定功河北雲翼有馬徑勇陝西河北振武河北京東武衛陝西京西壯勇延州青澗登州澄海弩手京畿近郡亦增募龍騎廣勇廣捷虎翼步鬥步武復升河北招收無敵廳子馬陝西制勝并州克戎騎射麟州飛騎府州威遠秦州建威慶州有馬安塞保州威邊安肅軍忠鋭嵐府州建安登州平海皆為禁兵增內外馬步凡數百營又京東西河北河東江淮荊湖兩浙福建路各募宣毅大州二營小州一營凡二百八十八岢嵐軍別置床子弩炮手時吏以所募多寡為賞罰格諸軍子弟悉聽隸籍禁軍闕額多選本城補填故慶曆中外禁廂軍總一百二十五萬視國初為最多西師既罷上患兵冗帑庾不能給乃詔省兵數萬人皇祐二年川峽增置寧遠五年江淮荊湖置教閲忠節州一營大州五百人小州三百人於是宣毅寖廢不復補而荊湖廣南益募雄略至和二年廣桂雍州置有馬雄略明年併萬勝為十營其後議者謂東南雖無事不宜弛備嘉祐四年乃詔荊南江寧府揚廬洪潭福越州募就糧軍號威果各營於本州又益遣禁軍駐泊長吏兼本路兵馬鈐轄選武臣為都監專主訓練於是東南稍有備矣七年宰相韓琦言祖宗以兵定天下凡有征戍則募置事已則併故兵日精而用不廣今二邊雖號通好而西北屯邊之兵常若待敵之至故竭天下之力而不能給不於此時先慮而豫備之一旦邊陲用兵水旱相繼卒起而圖之不可及矣又三路就糧之兵雖勇徑服習然邊儲貴踊常苦難贍若其數過多復有尾大不掉之患京師之兵雖雜且少精然漕於東南廣而易供設其數多得彊幹弱枝之勢祖宗時就糧之兵不甚多邊陲有事則以京師兵益之其慮深而其費鮮願詔樞密院同三司量河北陝西河東及三司榷貨務歲入金帛之數約可贍京師及三路兵馬幾何然後以可贍之數立為定額額外罷募闕即增補額外數已盡而營畸零則省併之既見定額則可以定其路馬步軍一營以若干為額仍請核見開寶至道天禧慶曆中外兵馬之數蓋開寶至道之兵太祖太宗以之定天下服四方也天禧之兵真宗所以守成備豫也慶曆之兵西師後增置之數也以祖宗之兵視今數之多少則精冗易判裁制無疑矣於是詔中書樞密院同議樞密院奏開寶之籍總三十七萬八千而禁軍馬步十九萬三千至道之籍總六十六萬六千而禁軍馬步三十五萬八千天禧之籍總九十一萬二千而禁軍馬步四十三萬二千慶曆之籍總一百二十五萬九千而禁軍馬步八十二萬六千視前所募兵寖多自是稍加裁制以為定額英宗即位詔諸道選軍士能引弓二石彍弩四石五斗送京師閲試第升軍額明年併萬勝為神衛三年京師置雄武第三軍時宣毅僅有存者然數詔諸路選廂軍壯勇者補禁衛而退其老弱焉蓋治平之兵一百十六萬二千而禁軍馬步六十六萬三千云熙寧元年十二月詔京東武衛四十二指揮並分隸河北都總管司六指揮隸大名府路三十六指揮均隸定州高陽關兩路更戍其休番者選差兵官三人依河北教閲新法訓練仍差使臣押教又詔京東路募河北流民招置教閲廂軍二十指揮以忠果為額青鄆淄齊州各三指揮濟兗曹濮州各兩指揮三年十二月樞密使文彥博等上在京開封府界及京東等路禁軍數帝亦參以治平中兵數而討論焉遂詔殿前虎翼除水軍一指揮外存六十指揮各以五百人為率總三萬四百人在京增廣勇五指揮共二千人開封府界定六萬二千人京東五萬一千二百人兩浙四千人江東五千二百人江西六千八百人湖南八千三百人湖北萬二千人福建四千五百人廣南東西千二百人川峽三路四千四百人為額在京其餘指揮并河東陝西京西淮南路既皆撥併唯河北人數尚多乃詔禁軍以七萬為額初河北兵籍比諸路為多其緣邊者且仰給三司至是而撥併畸零立為定額焉是時京東增置武衛軍分隸河北四路後又以三千人戍揚杭州江寧府其後又團結軍士置將分領則謂之將兵云七年正月詔頒諸班直禁軍名額殿前司諸班殿前指揮使內殿直散員散指揮散都頭散祗候金槍東西招箭散直鈞容直諸直御龍御龍骨御龍弓箭御龍弩直諸軍捧日直捧日左射捧日寬衣天武直天武左射天武歸明渤海拱聖神勇吐渾驍騎驍勝宣武虎翼水軍寧朔龍猛捧日第五軍捧日第七軍天武第五軍天武第七軍契丹直第一契丹直第二神騎廣勇步鬥龍騎驍猛雄勇太原府就糧吐渾潞州就糧吐渾左射清朔擒戎廣捷廣德驍雄雄威侍衛馬軍司龍衛直龍衛左射龍衛恩冀州員僚直忠猛定州散員驍捷雲騎武騎龍衛第十軍揀中龍衛新立驍捷飛捷驍武廣鋭雲翼禁軍有馬徑勇廳子馬無敵克勝飛騎威遠克戎萬捷雲捷橫塞慶州有馬安塞蕃落有馬雄略員僚剩員直侍衛步軍司神衛虎翼水軍神衛第十軍步武武衛牀子弩雄武飛山雄武神衛振武來化雄武弩手上威猛招收雄勝澄海水軍弩手神虎保捷捉生清邊弩手制勝定功青澗平海雄武效忠宣毅建安威果川效忠揀中雄勇懷順懷恩勇捷威武靜戎弩手忠遠寧遠忠節教閲忠節川忠節神威歸遠雄略下威猛彊猛壯勇橋道清塞武嚴宣效神衛剩員奉先園揀中六軍左龍武右龍武左羽林右羽林左神武右神武御營喝探新團立揀中剩員諸班直資次相壓殿前指揮使御龍直御龍骨子直內殿直散員散指揮使散都頭散祗候金槍東西班御龍弓箭直御龍弩直招箭班散直鈞容直諸軍資次相壓捧日直捧日左射捧日寬衣天武天武直天武左射天武龍衛直龍衛左射龍衛神衛歸明渤海拱聖神勇恩冀州員僚直忠猛定州散員吐渾驍騎驍捷雲騎驍勝