body:
  text: 宋史卷一百二十六志第七十九樂一有宋之樂自建隆訖崇寧凡六改作始太祖以雅樂聲高不合中和乃詔和峴以王朴律準較洛陽銅望臬石尺為新度以定律呂故建隆以來有和峴樂仁宗留意音律判太常燕肅言器久不諧復以朴準考正時李照以知音聞謂朴準高五律與古制殊請依神瞽法鑄編鍾既成遂請改定雅樂乃下三律鍊白石為磬範中金為鍾圖三辰五靈為器之飾故景祐中有李照樂未幾諫官御史交論其非竟復舊制其後詔侍從禮官參定聲律阮逸胡瑗實預其事更造鍾磬止下一律樂名大安乃試考擊鍾聲弇鬱震掉不和滋甚遂獨用之常祀朝會焉故皇祐中有阮逸樂神宗御歷嗣守成憲未遑制作間從言者緒正一二知禮院楊傑條上舊樂之失召范鎮劉几與傑參議几傑請遵祖訓一切下王朴樂二律用仁宗時所制編鍾追考成周分樂之序辨正二舞容節而鎮欲求一稃二米真黍以律生尺改修鍾量廢四清聲詔悉從几傑議樂成奏之郊廟故元豐中有楊傑劉几樂范鎮言其聲雜鄭衞請太府銅制律造樂哲宗嗣位以樂來上按試於庭比李照樂下一律故元祐中有范鎮樂楊傑復議其失謂出於鎮一家之學卒置不用徽宗銳意制作以文太平於是蔡京主魏漢津之說破先儒累黍之非用夏禹以身為度之文以帝指為律度鑄帝鼐景鍾樂成賜名大晟謂之雅樂頒之天下播之教坊故崇寧以來有魏漢津樂夫韶濩之音下逮戰國歷千數百年猶能使人感嘆作興當是時桑間濮上之音已作而古帝王之樂猶存豈不以其制作有一定之器而授受繼承亦代有其人歟由是論之鄭衞風雅不異器也知此道也則雖百世不易可也禮樂道喪久矣故宋之樂屢變而卒無一定不易之論考諸家之說累黍既各執異論而身為度之說尤為荒唐方古制作欲垂萬世難哉觀其高二律下一律之說雖賢者有所未知直曰樂聲高下於歌聲則童子可知矣八音克諧之說智者有所未諭直以歌聲齊簫聲以簫聲定十六聲而齊八器則愚者可諭矣審乎此道以之制作器定聲應自不奪倫移宮換羽特餘事耳去惉懘靡曼而歸之和平澹泊大雅之音不是過也南渡之後大抵皆用先朝之舊未嘗有所改作其後諸儒朱熹蔡元定輩出乃相與講明古今制作之本原以究其歸極著為成書理明義析具有條制粲然使人知禮樂之不難行也惜乎宋祚告終天下未一徒亦空言而已今集累朝制作損益因革議論是非悉著于編俾來者有考焉為樂志王者致治有四達之道其二曰樂所以和民心而化天下也歷代相因咸有制作唐定樂令惟著器服之名後唐莊宗起於朔野所好不過北鄙鄭衞而已先王雅樂殆將掃地晉天福中始詔定朝會樂章二舞鼓吹十二案周世宗嘗觀樂縣問工人不能答由是患雅樂凌替思得審音之士以考正之乃詔翰林學士竇儼兼判太常寺與樞密使王朴同詳定朴作律準編古今樂事為正樂宋初命儼仍兼太常建隆元年二月儼上言曰三五之興禮樂不相沿襲洪惟聖宋肇建皇極一代之樂宜乎立名樂章固當易以新詞式遵舊典從之因詔儼專其事儼乃改周樂文舞崇德之舞為文德之舞武舞象成之舞為武功之舞改樂章十二順為十二安蓋取治世之音安以樂之義祭天為高安祭地為靜安宗廟為理安天地宗廟登歌為嘉安皇帝臨軒為隆安王公出入為正安皇帝食飲為和安皇帝受朝皇后入宮為順安皇太子軒縣出入為良安正冬朝會為永安郊廟俎豆入為豐安祭享酌獻飲福受胙為禧安祭文宣王武成王同用永安籍田先農用靜安五月有司上言僖祖文獻皇帝室奏大善之舞順祖惠元皇帝室奏大寧之舞翼祖簡恭皇帝室奏大順之舞宣祖昭武皇帝室奏大慶之舞從之乾德元年翰林學士承旨陶穀等奉詔撰定祀感生帝之樂章曲名降神用大安太尉行用保安奠玉幣用慶安司徒奉俎用咸安酌獻用崇安飲福用廣安亞獻終獻用文安送神用普安五代以來樂工未具是歲秋行郊享之禮詔選開封府樂工八百三十人權隸太常習鼓吹四年春遣拾遺孫吉取成都孟昶偽宮縣至京師太常官屬閱視考其樂器不協音律命毀棄之六月判太常寺和峴言大樂署舊制宮縣三十六虡設於庭登歌兩架設於殿上望詔有司別造仍令徐州求泗濱石以充磬材許之先是晉開運末禮樂之器淪陷至是始令有司復二舞十二案之制二舞郎及引舞一百五十人按視教坊開封樂籍選樂工子弟以備其列冠服準舊制鼓吹十二案其制設氈牀十二為熊羆騰倚之狀以承其下每案設大鼓羽葆鼓金錞各一歌簫笳各二凡九人其冠服同引舞之制十月峴又言樂器中有叉手笛樂工考驗皆與雅音相應按唐呂才歌白雪之琴馬滔進太一之樂當時得與宮縣之籍况此笛足以協十二旋相之宮亦可通八十四調其制如雅笛而小長九寸與黃鍾管等其竅有六左四右二樂人執持兩手相交有拱揖之狀請名之曰拱宸管望於十二案十二編磬幷登歌兩架各設其一編於令式詔可太祖每謂雅樂聲高近於哀思不合中和又念王朴竇儼素名知樂皆已淪沒因詔峴討論其理峴言以朴所定律呂之尺較西京銅望臬古制石尺短四分樂聲之高良由於此乃詔依古法別創新尺以定律呂自此雅音和暢事具律歷志自國初已來御正殿受朝賀用宮縣次御別殿羣臣上壽舉教坊樂是歲冬至上御乾元殿受賀畢羣臣詣大明殿行上壽禮始用雅樂登歌二舞是月和峴又上言郊廟殿庭通用文德武功之舞然其綴兆未稱武功文德之形容又依古義以揖讓得天下者先奏文舞以征伐得天下者先奏武舞陛下以推讓受禪宜先奏文舞按尚書舜受堯禪玄德升聞乃命以位請改殿宇所用文舞為玄德升聞之舞其舞人約唐太宗舞圖用一百二十八人以倍八佾之數分為八行行十六人皆著履執拂服袴褶冠進賢冠引舞二人各執五采纛其舞狀文容變數聊更增改又陛下以神武平一宇內即當次奏武舞按尚書周武王一戎衣而天下大定請改為天下大定之舞其舞人數行列悉同文舞其人皆被金甲持戟引舞二人各執五采旗其舞六變一變象六師初舉二變象上黨克平三變象維揚底定四變象荊湖歸復五變象邛蜀納款六變象兵還振旅乃別撰舞曲樂章其鐃鐸雅相金錞鼗鼓幷引二舞等工人冠服即依樂令而文德武功之舞請於郊廟仍舊通用又按唐貞觀十四年景雲見河水清張文收採古朱鴈天馬之義作景雲河清歌名燕樂元會第二奏者是也伏見今年荊南進甘露京兆果州進嘉禾黃州進紫芝和州進綠毛龜黃州進白兔欲依月律撰神龜甘露紫芝嘉禾玉兔五瑞各一曲每朝會登歌首奏之有詔二舞人數衣冠悉仍舊制樂章如所請六年峴又言漢朝獲天馬赤鴈神鼎白麟之瑞並為郊歌國朝合州進瑞木成文馴象由遠方自至秦州獲白烏黃州獲白雀並合播在筦絃薦于郊廟詔峴作瑞文馴象玉烏皓雀四瑞樂章以備登歌未幾峴復言按開元禮郊祀車駕還宮入嘉德門奏采茨之樂入太極門奏太和之樂今郊祀禮畢登樓肆赦然後還宮宮縣但用隆安不用采茨其隆安樂章本是御殿之辭伏詳禮意隆安之樂自內而出采茨之樂自外而入若不並用有失舊典今大樂署丞王光裕誦得唐日采茨曲望依月律別撰其辭每郊祀畢車駕初入奏之御樓禮畢還宮即奏隆安之樂並從之太常寺又言準令宗廟殿庭宮縣三十虡郊社二十虡殿庭加鼓吹十二案開寶四年郊祀誤用宗廟之數今歲親郊欲用舊禮有詔圜丘增十六虡餘依前制太宗太平興國二年冬至上壽復用教坊樂九年嵐州獻祥麟雍熙中蘇州貢白龜端拱初澶州河清廣州鳳凰集諸州麥兩穗三穗者連歲來上有司請以此五端為祥麟丹鳳河清白龜瑞麥之曲薦于朝會從之淳化二年太子中允直集賢院和上言兄峴嘗於乾德中約唐志故事請改殿庭二舞之名舞有六變之象每變各有樂章歌詠太祖功業今覩來歲正會之儀登歌五瑞之曲已從改製則文武二舞亦當定其名周易有化成天下之辭謂文德也漢史有威加海內之歌謂武功也望改殿庭舊用玄德升聞之舞為化成天下之舞天下大定之舞為威加海內之舞其舞六變一變象登臺講武二變象漳泉奉土三變象杭越來朝四變象克殄幷汾五變象肅清銀夏六變象兵還振旅每變樂章各一首詔可三年元日朝賀畢再御朝元殿羣臣上壽復用宮縣二舞登歌五瑞曲自此遂為定制又請取今朝祥瑞之殊尤者作為四瑞樂章備郊廟奠獻以代舊曲詔從之有司雖承詔不能奉行故今闕其曲太宗嘗謂舜作五絃之琴以歌南風後王因之復加文武二絃至道元年乃增作九絃琴五絃阮別造新譜三十七卷凡造九絃琴宮調鳳吟商調角調徵調羽調龍仙羽調側蜀調黃鍾調無射商調瑟調變弦法各一制宮調鶴唳天弄鳳吟商調鳳來儀弄龍仙羽調八仙操凡三曲又以新聲被舊曲者宮調四十三曲商調十三曲角調二十三曲徵調十四曲羽調二十六曲側蜀調四曲黃鍾調十九曲無射商調七曲瑟調七曲造五弦阮宮調商調鳳吟商調角調徵調羽調黃鍾調無射商調瑟調碧玉調慢角調金羽調變弦法各一制宮調鶴唳天弄鳳吟商調鳳來儀弄凡二曲又以新聲被舊曲者宮調四十四曲商調十三曲角調十一曲徵調十曲羽調十曲黃鍾調十九曲無射商調七曲瑟調七曲碧玉調十四曲慢角調十曲金羽調三曲阮成以示中書門下因謂曰雅樂與鄭衞不同鄭聲淫非中和之道朕常思雅正之音可以治心原古聖之旨尚存遺美琴七弦朕今增之為九其名曰君臣文武禮樂正民心則九奏克諧而不亂矣阮四絃增之為五其名曰水火金木土則五材並用而不悖矣因命待詔朱文濟蔡裔齎琴阮詣中書彈新聲詔宰相及近侍咸聽焉由是中外獻賦頌者數十人二年太常音律官田琮以九弦琴五弦阮均配十二律旋相為宮隔八相生並協律呂冠于雅樂仍具圖以獻上覽而嘉之遷其職以賞焉自是遂廢拱宸管真宗咸平四年太常寺言樂工習藝匪精每祭享郊廟止奏黃鍾宮一調未嘗隨月轉律望示條約乃命翰林侍讀學士夏侯嶠判寺郭贊同按試擇其曉習月律者悉增月自餘權停廩給再俾學習以奬勵之雖頗振綱紀然亦未能精備蓋樂工止以年勞次補而不以藝進至有抱其器而不能振作者故難於驟變景德二年八月監察御史艾仲孺上言請修飾樂器調正音律乃詔翰林學士李宗諤權判太常寺及令內臣監修樂器後復以龍圖閣待制戚綸同判寺事乃命太樂鼓吹兩署工校其優劣黜去濫吹者五十餘人宗諤因編次律呂法度樂物名數目曰樂纂又裁定兩署工人試補條式及肄習程課明年八月上御崇政殿張宮縣閱試召宰執親王臨觀宗諤執樂譜立侍先以鍾磬按律準次令登歌鍾磬塤箎琴阮笙簫各二色合奏箏瑟筑三色合奏迭為一曲復擊鎛鍾為六變九變又為朝會上壽之樂及文武二舞鼓吹導引警夜之曲頗為精習上甚悅舊制巢笙和笙每變宮之際必換義管然難於遽易樂工單仲辛遂改為一定之制不復旋易與諸宮調皆協又令仲辛誕唱八十四調曲遂詔補副樂正賜袍笏銀帶自餘皆賜衣帶緡錢又賜宗諤等器幣有差自是樂府制度頗有倫理先是惟天地感生帝宗廟用樂親祀用宮縣有司攝事止用登歌自餘大祀未暇備樂時既罷兵垂意典禮至是詔曰致恭明神邦國之重事升薦備樂方冊之彝章矧在尊神固當嚴奉舉行舊典用格明靈自今諸大祠並宜用樂皆同感生帝六變八變如通禮所載大中祥符元年四月詳定所言東封道路稍遠欲依故事山上圜臺及山下封祀壇前俱設登歌兩架壇下設二十架幷二舞其朝覲壇前亦設二十架更不設熊羆十二案從之九月都官員外郎判太常禮院孫奭上言按禮文饗太廟終獻降階之後武舞止太祝徹豆豐安之樂作一成止然後理安之樂作是謂送神論語曰三家者以雍徹又周禮樂師職曰及徹帥學士而歌徹鄭玄曰謂歌雍也郊祀錄載登歌徹豆一章奏無射羽然則宗廟之樂禮有登歌徹豆今於終獻降階之後即作理安之樂誠恐闕失望依舊禮增用詔判太常寺李宗諤與檢討詳議以聞宗諤等言國初撰樂章有徹豆豐安曲辭樂署因循不作望如奭所奏從之時以將行封禪詔改酌獻昊天上帝禧安之樂為封安皇地祇禧安之樂為禪安飲福禧安之樂為祺安別製天書樂章瑞安靈文二曲每親行禮用之又作醴泉神芝慶雲靈鶴瑞木五曲施於朝會宴享以紀瑞應十月真宗親習封禪儀于崇德殿覩亞獻終獻皆不作樂因令檢討故事以聞有司按開寶通禮親郊壇上設登歌皇帝升降奠獻飲福則作樂壇下設宮縣降神迎俎退文舞引武舞迎送皇帝則作亞獻終獻升降在退文舞引武舞之間有司攝事不設宮架二舞故三獻升降並用登歌今山上設登歌山下設宮縣二舞其山上圜臺亞獻終獻準親祠例無用樂之文於是特詔亞終獻並用登歌五年聖祖降有司言按唐太清宮樂章皆明皇親製其崇奉玉皇聖祖及祖宗配位樂章並望聖製詔可之聖製薦獻聖祖文舞曰發祥流慶之舞武舞曰降真觀德之舞自是玉清昭應宮景靈宮親薦皆備樂用三十六虡景靈宮以庭狹止用二十虡上又取太宗所撰萬國朝天曲曰同和之舞平晉曲曰定功之舞親作樂辭奏于郊廟自時厥後仁宗以大明之曲尊真宗英宗以大仁之曲尊仁宗神宗以大英之曲尊英宗仁宗天聖五年十月翰林侍講學士孫奭言郊廟二舞失序願下有司考議於是翰林學士承旨劉筠等議曰周人奏清廟以祀文王執競以祀武王漢高帝文帝亦各有舞至唐有事太廟每室樂歌異名蓋帝王功德既殊舞亦隨變屬者有司不詳舊制奠獻止登歌而樂舞不作其失明甚請如舊制宗廟酌獻復用文舞皇帝還版位文舞退武舞入亞獻酌醴已武舞作至三獻已奠還位則止蓋廟室各頌功德故文舞迎神後各奏逐室之舞郊祀則降神奏高安之曲文舞已作及皇帝酌獻惟登歌奏禧安之樂而縣樂舞綴不作亞獻終獻仍用武舞詔從之是時仁宗始大朝會羣臣上壽作甘露瑞木嘉禾之曲明道初章獻皇太后御前殿見羣臣作玉芝壽星奇木連理之曲厚德無疆四海會同之舞明年太后躬謝宗廟帝耕籍田享先農率有樂歌其後親祀南郊享太廟奉慈廟大享明堂祫享帝皆親製降神送神奠幣瓚祼酌獻樂章餘詔諸臣為之至於常祀郊廟社稷諸祠亦多親製景祐元年八月判太常寺燕肅等上言大樂制器歲久金石不調願以周王朴所造律準考按修治幷閱樂工罷其不能者乃命直史館宋祁內侍李隨同肅等典其事又命集賢校理李照預焉於是帝御觀文殿取律準閱視親篆之以屬太常明年二月肅等上考定樂器幷見工人帝御延福宮臨閱奏郊廟五十一曲因問照樂音高命詳陳之照言朴準視古樂高五律視教坊樂高二律蓋五代之亂雅樂廢壞朴剏意造準不合古法用之本朝卒無福應又編鍾鎛磬無大小輕重厚薄長短之差銅錫不精聲韻失美大者陵小者抑非中度之器也昔軒轅氏命伶倫截竹為律後令神瞽協其中聲然後聲應鳳鳴而管之參差亦如鳳翅其樂傳之亘古不刊之法也願聽臣依神瞽律法試鑄編鍾一虡可使度量權衡協和乃詔於錫慶院鑄之既成奏御照遂建議請改制大樂取京縣秬黍累尺成律鑄鍾審之其聲猶高更用太府布帛尺為法乃下太常制四律別詔潞州取羊頭山秬黍上送於官照乃自為律管之法以九十黍之量為四百二十星率一星占九秒一黍之量得四星六秒九十黍得四百二十星以為十二管定法乃詔內侍鄧保信監視羣工照幷引集賢校理聶冠卿為檢討雅樂制度故實官入內都知閻文應董其事中書門下總領焉凡所改制皆關中書門下詳定以聞別詔翰林侍讀學士馮元同祁冠卿照討論樂理為一代之典又詔天下有深達鍾律者在所亟以名聞於是杭州鄭向言阮逸蘇州范仲淹言胡瑗皆通知古樂詔遣詣闕其他以樂書獻者悉上有司五月照言既改制金石則絲竹匏土革木亦當更制以備獻享照乃鑄銅為龠合升斗四物以興鍾鎛聲量之法龠之率六百三十黍為黃鍾之容合三倍於龠升十二倍於合斗十倍於升乃改造諸器以定其法俄又以鎛之容受差大更增六龠為合十合為升十升為斗銘曰樂斗後數月潞州上秬黍照等擇大黍縱累之檢考長短尺成與太府尺合法乃定先時太常鍾磬每十六枚為虡而四清聲相承不擊照因上言十二律聲已備餘四清聲乃鄭衞之樂請於編縣止留十二中聲去四清聲則哀思邪僻之聲無由而起也元等駮之曰前聖制樂取法非一故有十三管之和十九管之巢三十六簧之竽二十五弦之瑟十三弦之箏九弦七弦之琴十六枚之鍾磬各自取義寧有一之於律呂專為十二數者且鍾磬八音之首絲竹以下受之於均故聖人尤所用心焉春秋號樂總言金奏詩頌稱美實依磬聲此二器非可輕改今照欲損為十二不得其法稽諸古制臣等以為不可且聖人既以十二律各配一鍾又設黃鍾至夾鍾四清聲以附正聲之次原四清之意蓋為夷則至應鍾四宮而設也夫五音宮為君商為臣角為民徵為事羽為物不相凌謂之正迭相凌謂之慢百王所不易也聲重濁者為尊輕清者為卑卑者不可加於尊古今之所同也故列聲之尊卑者事與物不與焉何則事為君治物為君用不能尊於君故也惟君臣民三者則自有上下之分不得相越故四清聲之設正謂臣民相避以為尊卑也今若止用十二鍾旋相考擊至夷則以下四管為宮之時臣民相越上下交戾則凌犯之音作矣此甚不可者也其鍾磬十六皆本周漢諸儒之說及唐家典法所載欲損為十二惟照獨見臣以為且如舊制便帝令權用十二枚為一格且詔曰俟有知者能考四鍾協調清濁有司別議以聞鍾舊飾旋蟲改為龍乃遣使採泗濱浮石千餘段以為縣磬先是宋祁上言縣設建鼓初不考擊又無三鼗且舊用諸鼓率多陋敝於是敕元等詳求典故而言曰建鼓四今皆具而不擊別設四散鼓於縣間擊之以代建鼓乾德四年祕書監尹拙上言散鼓不詳所置之由且於古無文去之便時雖奏可而散鼓于今仍在又雷鼓靈鼓路鼓雖擊之皆不成聲故常賴散鼓以為樂節而靈鼗露鼗路鼗闕而未製今既修正雅樂謂宜申敕大匠改作諸鼓使擊考有聲及創為三鼗如古之制使先播之以通三鼓罷四散鼓如乾德詔書奏可時有上言以為雷鼓八面前世用以迎神不載考擊之法而大樂所製以柱貫中故擊之無聲更令改造山趺上出雲以承鼓刻龍以飾柱面各一工擊鼓一工左執鼗以先引凡圜丘降神六變初八面皆三擊推而左旋三步則止三者取陽數也又載擊以為節率以此法至六成靈鼓路鼓亦如之植建鼓于四隅皆有左鞞右應乾隅左鞞應鍾亥之位也中鼓黃鍾子之位也右應大呂丑之位也艮隅左鞞太簇寅之位也中鼓夾鍾卯之位也右應姑洗辰之位也巽隅右應仲呂巳之位也中鼓蕤賓午之位也左鞞林鍾未之位也坤隅右應夷則申之位也中鼓南呂酉之位也左鞞無射戍之位也宜隨月建依律呂之均擊之後照等復以殿庭備奏四隅既隨月協均顧無以節樂而周官鼓人以晉鼓鼓金奏應以施用詔依周官舊法製焉於是縣內始有晉鼓矣古者鎛鍾擊為節檢而無合曲之義大射有二鎛皆亂擊焉後周以十二鎛相生擊之景德中李宗諤領太常總考十二鎛鍾而樂工相承殿庭習用三調六曲三調者黃鍾太簇蕤賓也六曲者調別有隆安正安二曲郊廟之縣則環而擊之宗諤上言曰金部之中鎛鍾為難和一聲不及則宮商失序使十二鎛工皆精習則遲速有倫隨月用律諸曲無不通矣真宗因詔黃鍾太簇二宮更增文舞武舞福酒三曲至是詔元等詢考擊之法元等奏言後周嘗以相生之法擊之音韻克諧國朝亦用隨均合曲然但施殿庭未及郊廟謂宜使十二鍾依辰列位隨均為節便於合樂仍得幷施郊廟若軒縣以下則不用此制所以重備樂尊王制也詔從焉隋制內宮縣二十虡以大磬代鎛鍾而去建鼓唐武后稱制改用鍾因而莫革及是乃詔訪元等曰大磬應何法考擊何禮應用元等具言古者特磬以代鎛鍾本施內宮遂及柔祀隋唐之代繼有因改先皇帝東禪梁甫西瘞汾陰並仍舊章陳於縣奏若其所用吉禮則中宮之縣祀禮則皇地祇神州地祇先蠶今之奉慈廟后廟皆應陳設宮縣則三十六虡去四隅建鼓如古便若考擊之法謂宜同於鎛鍾比緣詔旨不俾循環互擊而立依均合曲之制則特磬固應不出本均與編磬相應為樂之節也詔可九月翰林學士承旨章得象等言宋祁所上大樂圖義其論武舞所執九器經禮但舉其凡而不著言其用後先故旅進輩作而無終始之別且鼗者所謂導舞也鐸者所謂通鼓也錞者所謂和鼓也鐃者所謂止鼓也相者所謂輔樂也雅者所謂陔步也寧有導舞方始而參以止鼓止鼓既搖而亂以通鐸臣謂當舞入之時左執干右執戚離為八列別使工人執旌最前鼗鐸以發之錞以和之左執相以輔之右執雅以節之及舞之將成也則鳴鐃以退行列築雅以陔步武鼗鐸錞相皆止而不作如此則庶協舞儀請如祁所論其冬帝躬款奉慈廟樂縣罷建鼓始以磬代鎛鍾禮官又言春秋隱公五年考仲子之宮初獻六羽何休范宀心等咸謂不言佾者明佾則干舞在其中婦人無武事獨奏文樂也江左宋建平王宏皆據以為說故章皇后廟獨用文舞至唐垂拱以來中宮之縣既用鎛鍾其後相承故儀坤等廟獻武舞備鍾石之樂尤為失禮前詔議奉慈之樂有司援舊典已用特磬代鎛鍾取陰教尚柔以靜為體今樂去大鍾而舞進干盾頗戾經旨請止用文德之舞奏可大樂塤舊以漆飾敕令黃其色以本土音或奏言柷舊以方畫木為之外圖以時卉則可矣而中設一色非稱也先儒之說曰有柄連底挏之鄭康成以為設椎其中撞之今當剏法垂久用明制作之意有所本焉柷之中東方圖以青隱而為青龍南方圖以赤隱而為丹鳳西方圖以白隱而為騶虞北方圖以黑隱而為靈龜中央圖以黃隱而為神螾撞擊之法宜用康成之說從之又詔以新製雙鳳管付大樂局其制合二管以足律聲管端刻飾雙鳳施兩簧焉照因自造葦籥清管簫管清笛雅笛大笙大竽宮琴宮瑟大阮大嵇凡十一種求備雅器詔許以大竽大笙二種下大樂用之時又出兩儀琴及十二弦琴二種以備雅樂兩儀琴者施兩弦十二柱十二弦琴者如常琴之制而增其弦皆以象律呂之數又敕更造七弦九弦琴皆令圓其首者以祀天方其首者以祀地帝乃親製樂曲以夾鍾之宮黃鍾之角太簇之徵姑洗之羽作景安之曲以祀昊天更以高安祀五帝日月作太安以享景靈宮罷舊真安之曲以黃鍾之宮大呂之角太簇之徵應鍾之羽作興安以獻宗廟罷舊理安之曲景安興安惟乘輿親行則用之以姑洗之角林鍾之徵黃鍾之宮太簇之角南呂之羽作祐安之曲以酌獻五帝以林鍾之宮太簇之角姑洗之徵南呂之羽作寧安之曲以祭地及太社太稷罷舊靖安之曲于時制詔有司以太祖太宗真宗三聖並侑乃以黃鍾之宮作廣安之曲以奠幣彰安之曲以酌獻又詔躬謁奉慈廟章獻皇后之室作達安之曲以奠瓚厚安以酌獻章懿皇后之室作報安之曲以奠瓚衍安以酌獻皇帝入出作乾安罷舊隆安之曲常祀至日祀圜丘太祖配以黃鍾之宮作定安以奠幣英安以酌獻孟春祀感生帝宣祖配以太簇之宮作皇安以奠幣肅安以酌獻祈穀祀昊天太宗配作仁安以奠幣紹安以酌獻孟夏雩上帝太祖配以仲呂之宮作獻安以奠幣感安以酌獻夏至祭皇地祇太祖配以蕤賓之宮作恭安以奠幣英安以酌獻季秋大饗明堂真宗配以無射之宮作誠安以奠幣德安以酌獻孟冬祭神州地祇太宗配以應鍾之宮作化安以奠幣韶安以酌獻又造沖安之曲以七均演之為八十四皆作聲譜以授有司沖安之曲獨未施行親製郊廟樂章二十一曲財成頌體告于神明詔宰臣呂夷簡等分造樂章參施羣祀又為景祐樂髓新經凡六篇第一釋十二均第二明所主事第三辨音聲第四圖律呂相生幷祭天地宗廟用律及陰陽數配第五十二管長短第六歷代度量衡皆本之於陰陽配之於四時建之於日辰通之於鞮笁演之於壬式遁甲之法以授樂府以考正聲以賜羣臣焉初照等改造金石所用員程凡七百十四攻金之工百五十三攻木之工二百十六攻皮之工四十九刮摩之工九十一搏埴之工十六設色之工百八十九起五月止九月成金石具七縣至於鼓吹及十二案悉修飾之令冠卿等纂景祐大樂圖二十篇以載鎔金鑢石之法歷世八音諸器異同之狀新舊律管之差是月與新樂幷獻於崇政殿詔中書門下樞密院大臣預觀焉自董監而下至工徒凡七百餘人進秩賞賜各有差其年十一月有事南郊悉以新樂幷聖製及諸臣樂章用之先是左司諫姚仲孫言照所製樂多詭異至如煉白石以為磬範中金以作鍾又欲以三辰五靈為樂器之飾臣愚竊有所疑自祖宗考正大樂薦之郊廟垂七十年一旦黜廢而用新器臣竊以為不可御史曹脩睦亦為言帝既許照制器且欲究其術之是非故不聽焉
