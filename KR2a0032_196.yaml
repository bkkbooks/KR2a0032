body:
  text: 宋史卷一百九十六志第一百四十九兵十遷補之制屯戍之制遷補之制自殿前侍衛馬步軍校每遇大禮後各以次遷謂之轉員轉員至軍都指揮使又遷則遙領刺史又遷為廂都指揮使遙領團練使員溢即從上罷軍職為正團練使刺史之本任或有他州總管鈐轄其老疾若過失者為御前忠佐馬軍都軍頭副都軍頭隸軍頭司其黜則為外州馬步軍都指揮使凡軍主闕以軍都指揮使遞遷餘闕以諸軍都虞候指揮使副指揮使行首軍使副行首副兵馬使十將遞遷凡將校一軍營止補十人其廂都指揮使軍都指揮使都虞候指揮使營主其一即闕其三殿前左右班都虞候遙領刺史即與捧日軍都指揮使通以次遷捧日龍衛廂都指揮使仍遙領團練使若員溢即為正刺史補外他如諸軍例遞遷凡列校轉補有司先閲走躍上下馬次出指二十步掩一目試之左右各五占數為見物武藝弓射五斗弩彍一石五斗槍刀手稍練負罪不至徒年未高或雖年高而無疾精力不耗者並取之凡諸軍轉員後取殿前指揮使長入祗候填行門取東西班長入祗候殿侍諸班直充諸班押班諸軍將校者皆親閲前一日命入內都知或押班一人勾當御藥院內侍一人同軍頭引見司較定弓弩斗力標志之凡弓弩藝等者人占其一至日引見弓弩列置殿前命取一以射軍頭引見司專視喝箭以奏如喝失當即奏改正入內都知或押班同勾當御藥院內侍殿上察視如引見司不覺舉亦奏改正槍刀手竭勝負若喝不以實并引見司失覺舉並劾其罪太平興國九年上詣崇政殿轉改諸軍將校自軍都指揮使以下員僚以上皆按名籍驗勞績而升陟之凡數日而畢內外感悅乃謂宰臣等曰朕遷轉軍員先取其循謹能御下者武勇次之若不自謹飭則其下不畏憚雖有一夫之勇亦何所用咸平三年五月上御便殿遷補軍職凡十一日而畢自神衛右第二軍都指揮使恩州刺史周訓而下遞遷者千三十一人四年十二月帝謂呂蒙正曰選衆求才誠非易事朕常孜孜詢訪冀有所得向求於軍校中超擢八九人委以方任其間王能魏能頗甚宣力陳興張禹圭亦有能名蒙正等曰才難求備今拔十得五有以見陛下知臣之明也五年帝謂知樞密院周瑩曰國朝之制軍員有闕但權領之三歲一遷補未及期以功而授止奉朝請而已今闕員處則乏人部轄須當例與轉補於是召瑩等至便殿按軍籍次補其屯戍於外及軍額在下素不該恩例亦溥及之凡再旬方畢景德二年四月帝曰殿前諸班侍衛馬步諸軍及軍頭司諸軍員因衰病或以他事出補外職率皆臨事奏裁殊無定制可條其所入職名類例以聞又曰近纍有諸處立功指揮使未可別加遷擢皆特補本軍都虞候舊無此職名蓋權宜加置若後有闕不須復補又曰內外諸軍所闕小校儻以名次遷補或慮不能盡得武幹之士自今並令閲試武藝選擢為之大中祥符四年七月詔曰自來轉補軍員皆是議定降宣命訖方引見轉補其間有老病不任職者臨時易之無由整齊經汾陰大禮應殿前馬步軍諸班諸軍員並分作甲次於崇政殿逐人唱名引見朕自視之有不任職者當於不係禁軍處優與安排免轉員之際旋議改易八月詔殿前侍衛馬軍步軍司所管內外禁軍軍員自來補轉體例不一未得均平朕夙夜思之今來該汾陰轉員可立定久遠規制其馬軍步軍自指揮使以下各別轉補皆令自下而升仍將殿前侍衛馬軍步軍司所轄軍分各衮同轉補如馬軍軍員自近下補至拱聖即雙取之以分補捧日龍衛其近下軍分有闕即却自捧日龍衛雙取升一員資補填其步軍有闕填補並準此又詔所議改更轉補軍員職名恐諸軍未喻可降宣命云殿前侍衛馬步軍司自來多是龍衛更轉入捧日並神衛更入天武之類是致難得出職久成沉滯今來轉員出自朕意並各與分兩頭遷改其龍衛更不入捧日並神衛更不入天武其捧日龍衛闕於拱聖內隔間取人分頭充填其拱聖闕即將驍騎雲騎分頭轉入其天武神衛闕於神勇內隔間取人分頭充填其神勇闕即將宣武充填其宣武闕取殿前步軍司虎翼充填已上如取盡指定軍員即轉已次軍員充填所有寧朔軍分次第請受並轉員出入今後並特與依驍勝體例施行六年十月詔諸班直並馬步軍事軍員其諸班捧日龍衛天武神衛五頭下出人外其御龍諸直作一處轉員僚直拱聖驍騎雲騎驍勝武騎寧朔神騎已上軍額軍員作一處挨排遞遷水軍神勇宣武殿前司虎翼衛聖步軍司虎翼奉節廣勇神射已上軍額軍員作一處挨排轉補事內殿前指揮使押班至都知只本班轉其神衛廣勇神射已下至軍使都頭即逐指揮內遞遷內有年及六十已下者並勾押赴闕令殿前司看驗聞奏當議相度安排所有副兵馬使副都頭員闕仍取捧日龍衛神勇十將充填餘並從之內神衛水軍第一指揮令立充神衛水軍指揮殿前司上虎翼第二步軍司上虎翼第一並立充虎翼水軍指揮依舊係逐司管押其神衛水軍見管軍員先自奉節補入多不會舟楫並一齊轉上外却將虎翼水軍兩指揮會水軍員與神衛水軍共三指揮一處衮轉如轉至神衛水軍指揮使除年老病患依例出職安排外更不轉上天禧元年十月以御前忠佐郭豐等六人並受將軍初軍頭司定年老負犯者將黜之帝以其久居武列命置環衛其帶遙郡者與大將軍不帶遙郡者與將軍天聖六年將轉員樞密院奏諸軍將校有因循不敢戢士者請諭殿前馬步軍司密以名聞八年詔殿前侍衛司同定內外諸軍排立資次景祐二年詔緣邊就糧兵有員闕奏以舊人次遷康定元年詔三路就糧將校半以次遷半遣自京師又詔陝西土兵校長遣自京師情不諳達自今悉就本路通補慶曆四年詔捧日天武選退將校超三資餘超二資悉補外職五年真定府定州路都總管司奏奉詔閲教軍士選補階級弓射九斗至一石距堋七十步至百步射最親者為第一等其閲教時弓不必引滿力競即發務在必中伏緣舊例軍中揀節級以挽強引滿為勝今一旦取射親者為第一等其弓力止九斗一石箭留三兩指而退素習挽強引滿之士於理未便詔諸軍選節級用舊例遇閲教即如近制皇祐元年詔諸路就糧兵闕將校須轉補滿三年聽遷又詔將帥麾下兵非有戰功毋得請遷隸上軍嘉祐二年詔京東教閲本城騎射威邊威勇壯武自初募置即給鼓旗閲教以代禁軍如有員闕聽遞遷至副指揮使止轉補後滿三歲闕三分已上即舉行其指揮使闕即步軍司補之至和三年詔親從官入殿滿八年者補節級從樞密院之請也治平元年選諸班直長行洎禁軍副兵馬使已上有材武者得七十人帝臨軒親閲喻天武右第三軍都指揮使王秀曰爾武藝雖不中格而有戰功且能恪守法度其以爾為正刺史務勤乃職無負朕之委寄也又喻散直都虞候胡從內殿直副都知張思曰爾能勤以持身忠以事上治軍又皆整肅其以從為內園使思為崇儀副使自餘擢遷有差二年詔廣南教閲忠敢澄海一營者即本營遞遷兩營已上者營三百人補五人二百人至三百人補三人二百人以下補二人百人以下補一人止於副指揮使凡遞遷滿三歲五階闕二三階闕一即補四年詔自今一營及二百五十人已上置校十人闕三人即補二百五十人已下置校七人闕二人即補京師非轉員並諸道就糧並準此令凡軍頭十將節級轉補謂之排連有司按籍閲試如列校轉員法弓射六斗弩彍一石七斗槍刀手稍練並取之如舊不試武技者即遞遷其不教閲廂軍節級則其半遞遷其半取伉健未嘗犯徒刑角力勝者充治平四年有司言軍士闕額多而將校衆請以實領兵數制將校額第其遷補並通領五都之事乃詔二百五十人以上補指揮使十人以下七人闕二人者以次補補十將者馬軍四十人步軍如馬軍之數而加其一焉百五十人以上者三十人闕五人者以次補不及百五十人者如舊格補單將二十人熙寧二年樞密院請自今捧日龍衛天武神衛廂都指揮使闕無當次遷者並虛之其諸軍都指揮使都虞候當遷者闕多則間一名補轉兼以次職事吐渾等軍都指揮使都虞候闕者虛其闕六月詔河東陝西就糧軍士將校其間材效之人孤遠無由自達有司審度其有軍功驍勇者以名聞當擢置班行以備本路任使四年詔諸班直嘗備宿衛病告滿尚可療者殿前指揮使補外牢城指揮使餘以為捧日天武第五軍押營奉錢三千者豫五百二千以下者豫三百六年詔軍校老而諳部轄者優假之雖疾不至罷癃或未七十猶堪任事者勿罷即法雖當留而不能部轄者以聞當議處之廂軍十月詔軍士選為節級取兩嘗有功者功等以先後又等以重輕又等以傷多者為上七年詔十將以下當轉資而不欲者凡一資以功者賜帛十五匹技優者十匹六月詔在京轉員諸軍都虞候已上至軍都指揮使以軍功當遷而願以授子孫者聽視其秩有差八年轉員帝親閲凡三日舊制捧日都虞候四人至是補者五人而馬軍都指揮使闕驍騎二人以捧日一人補驍騎軍主餘四人如故則次軍皆不得遷乃補四人者皆為馬步軍副都軍頭舊龍衛拱聖驍騎武騎寧朔神騎為一百三十一營今省五十營而馬軍指揮以下已補八十一營補外尚有溢員乃詔所省營未移併者凡四十三每營權置下名指揮使副指揮使各一軍使三以便遞遷九年將轉員樞密院奏換官稍優軍校由行伍有功不久乃至團練使帝曰祖宗以來軍制固有意凡隸在京殿前馬步軍司所統諸營置軍都指揮使都虞候分領之凡軍事止責分領節制之人責之既嚴則遇之不得不優至若諸路則軍校不過各領一營不可比也吳充等以本大末小對帝然之因言周室雖盛成康之後寖以衰微本朝太平百有餘年由祖宗法度具在豈可輕改也元豐元年詔禁軍排連者三分其人以其一取立功額外人二分如令簡試十二月詔諸軍軍使都頭以下並充兵額正副指揮使以上置於額外軍行則分押諸隊又詔內殿直以下諸班直闕按籍闕二分者虛其闕四之一二分以上亦如之不及二分補其半餘並闕之四年詔五路衮轉土軍與諸路不衮轉禁軍法十將副都頭副兵馬使都頭軍使並如令自副都指揮使至都虞候嘗轉資者間以賜帛已賜帛乃遷五年詔以諸路教閲廂軍為下禁軍排連如禁軍法七年樞密院言騎軍諸營諸班直以年勞升至軍使者甚衆無闕可補詔捧日龍衛拱聖驍騎雲騎驍勝權置下名軍使凡二百四十員拱聖驍騎雲騎權置副兵馬使凡九十員以處之元祐元年樞密院奏諸軍將年七十若有疾假滿百日不堪療者諸廂都指揮使除諸衛大將軍致仕諸軍都指揮使諸班直都虞候帶遙郡除諸衛將軍致仕諸班直上四軍除屯衛拱聖以下除領軍衛仍並以有功勞者為左無功勞者為右從之二年樞密院言舊例行門對御呈試武藝並臨時特旨推恩前期未嘗按試至日旋乞增加斗力或涉唐突因以抵罪請於轉員前一日按定斗力從之四月樞密院言舊例諸班直長行補諸軍員僚並取入班及轉班二十年年四十以上人逮元豐四年以闕額數多乃特詔減五年繫一時之命今諸軍員僚溢額儻不定制即異時遷補不行若便依限年舊法又慮未有合該出職之人請於三次漸次增及舊例年限從之五年樞密院言轉員馬軍指揮使以下至副兵馬使人數溢額轉遷不行詔權置下名軍使一百七十人副兵馬使一百七十五人又言禁軍大閲請以匹帛銀楪支賜罷轉資從之六年又言應排連長行充承局押官者先取年五十五以下有戰功公據者仍以戰功多少得功先後傷中輕重為次事等而俱無傷中則以事藝營名為次從之紹聖二年詔將來轉員換前班人並從元豐轉員令仍不得過一百二十人元祐所限人數比試家狀指揮勿用三年樞密院進呈轉員及行門試武藝換前班留住等條例曾布言國初以來皆面問其所欲察相人才或換官或遷將校或再任此則威福在人主以至唐突或放罪或行法亦視其情狀而操縱之元祐改法乃令大閹與三司軍頭司先指試定但對御引呈依拍定等第推恩殊失祖宗馭衆之法不許唐突例坐徒罪兼決責人員皆非舊法唐突人雖有理亦不施行緣情輕者放罪重者取旨自有舊格先朝燕達林廣嘗唐突當降配先帝釋之後皆為名將至情重則杖脊配嶺表者有王明者住留叫呼云若不得換前班乞納命管軍賈逵乞重配先帝亦貸之但降一等與換外官如此故人知恩威皆自人主出豈可一切付之有司帝悅詔令並依元豐以前條例施行五年馬步軍司言三路衮轉軍員請依元豐七年詔應三月一日後續有得功嵌補升名並改轉名職自充下名者並依先補名次各理降宣月日以為高下審會給據候再經衮轉即依嵌補升轉名次高下轉那自今三路軍員衮轉亦如之詔侍衛馬步軍司自今開具合轉補職名申樞密院降宣餘並從之七月軍頭司引見殿前馬步軍司揀到御龍諸直人材事藝應格並補逐直將虞候賜杖子一名開弓偃身不應法黜之八月樞密院言轉員旁通格捧日天武不帶遙刺軍都指揮使換左藏庫使仍除遙刺殿前班不帶遙刺都虞候換左藏庫使看詳殿前班帶遙郡都虞候係與捧日帶遙郡軍都指揮使理先後相壓轉遷其不帶遙郡殿前班都虞候捧日軍都指揮使換官班合一等推恩欲殿前班不帶遙郡都虞候依捧日不帶遙郡軍都指揮使換官又拱聖神勇與驍騎已下軍分有異其逐軍都虞候指揮使理難一等換官欲拱聖神勇都虞候依舊換供備庫使外驍騎雲騎宣武都虞候換左藏庫副使拱聖神勇指揮使換內殿承制捧日天武神龍衛指揮使皆係上四軍其捧日天武換西京左藏庫副使龍神衛換內殿承制比捧日天武隔兩官理有未均欲神龍衛指揮使換供備庫副使又殿前班上名副都知換供備庫副使下名副都知換內殿承制自來以左右第一第二班為資次欲第一班換供備庫副使第二班換內殿承制又換前班差遣州總管以下並以五路緣邊為優諸路為次正團練使州總管正刺史州鈐轄諸司使副都巡檢使駐泊都監內殿承制崇班巡檢州都監供奉官至借職教押軍隊指使看詳諸司使副已上差遣見依格施行外承制以下欲依今來轉員所差遣例又拱聖神勇驍騎雲騎宣武軍都指揮使換文思仍除遙刺已帶者依舊御龍直都虞候文思使帶遙刺者依舊內殿直兩次都虞候換左藏庫使一次文思使帶遙刺者依舊看詳拱聖神勇與驍騎以下軍分有異兼御龍直都虞候遇轉員合次神勇軍都指揮使轉行及係環衛諸直人員最上名人兼內殿直都虞候以次殿前班及轉員無闕合隨龍衛軍都指揮使轉行理難於驍騎雲騎宣武軍都指揮使之下換官欲御龍直內殿直都虞候依格合換官外並除遙刺驍騎雲騎宣武軍都指揮使止與換文思使更不除遙郡刺史內已帶遙刺者並依舊內殿前班副都知並與換供備庫副使今馬步軍諸指揮事藝高強十將引見取揀充員僚內弓箭手短一指箭人合降一軍安排弩手括不發事體頗同並弩手墮箭與括不發亦同欲並降一軍安排從之十一月樞密院言轉員旁通册內御龍直都虞候至副都頭換官惟指揮使上兩直與文思副使係降兩資餘止降一資散員至金槍都知副都知皆換內殿承制不惟職名有差自副都知約六遷方轉都知兼東西班散直鈞容直係近下班分副都知亦降都知一等換內殿崇班其東西班散直押班與副都知職名不等兩經轉遷方入近下班分副都知理難與都知一等換內殿崇班又散指揮至鈞容直指揮使並換供備庫副使緣東西班散直鈞容直遇轉員止是遷入上班亦難一等換官詔御龍下兩直指揮使換左藏庫副使散員散指揮散都頭散祗候金槍都知換供備庫副使東西班散直押班換東頭供奉官東西班指揮使換官依舊外散直鈞容直指揮使換左藏庫副使緣轉員旁通册內未載雲武騎軍都指揮使轉遷換官並恩例等詔並依驍騎軍都指揮使格四年二月軍頭司引見捧日等兵試藝帝於行間召邢斌韓扆問曰開弓猶有餘力乎各對願增二石二斗弓遣內侍監定斗力授之射皆應法並特充殿前指揮使賜緡錢元符元年七月樞密院言將校軍頭十將各轉補者委本將體量不掩眼試五次二十步見若一次不同減五步掩一眼再試但兩眼共見二十步或一眼全不見二十步仍試上下馬如無病切弓射五斗弩踏一石五斗槍刀標牌手各不至生疏並與轉補即有病切或精神悴或將校年六十九或經轉補後犯姦盜贓罪情罪重以上雖該降並隔下奏聽旨如差出者勾赴本將體量在別州者報所在州體量排連長行充承局押官者先取年五十五以下有兩次以上戰功人填闕六人更取一名餘取年四十以下武藝高強無病切人試兩眼各五次二十步見者選拍內步軍以闕六分為率先取弓手一分次取弩手三分次取槍牌刀手二分更有零分者依六分為率資次取揀周而復始長行犯徒經決及二年或軍人因犯移配杖罪經三年徒罪經四年或已升揀軍分又經一年各無過犯並聽排連不應充軍人已投狀後審會取放逐便雖未給公憑其請給差使並罷有違犯加凡人二等不應充軍人於法許逐便者並追納元請投軍例物訖報合屬去處給公憑放逐便如非品官之家無例物回納願依舊充軍者聽從之三月禮部言檢會故事臣僚申請諸州軍府管押進奉衙校等祖宗以來並加散官自更官制階散並罷既罷階散若與轉資似屬太優欲每轉一資支賜絹二十匹如一名管押兩處只許就一處支給或一州一軍差二人同押亦共與上件支賜若一員官兩處進奉只隨本官合推恩處從一支給今押進奉皇帝登寶位禮物衙校等欲依故例施行並從之宣和七年十一月南郊制應軍員送軍頭司未得與差遣者如後來別無過犯却與差遣應廂軍人員補職及十五年未經遷補者令所屬保明聞奏應禁軍廂軍因一犯濫情重不得補充人員及遞遷資給者若經斷及五年不曾再犯及不曾犯贓委所在候排連日審實特與不礙遷補建炎紹興之間排連轉員屢嘗損益而大率因於舊制乾道六年主管侍衛馬軍司公事李顯忠言本司諸兵將官有闕自來擇衆所推者不以次序上聞升遷比年須自訓練官充準備將準備將及二年升副將副將及二年升正將正將及三年升統領官再及三年升統制官竊恐無以激揚士氣請今後兵將官有闕不以年為限許本司銓量人材膽勇服衆上聞補用詔從其請此誠砥礪兵將之良法也嘉定中樞密院言諸軍轉員遷補務在均一如內諸班直循舊格排連積習既久往往超躐升轉後名反居前列高下不倫甚失公平之意今參酌前後例格均次資序其一曰內殿直左第一班副都知轉東西班西第二都知內殿直左第二班副都知轉散直左班都知其二曰散員左第二班副都知升內殿直左第一班副都知散員右第一班副都知升內殿直左第一班副都知其三曰散員右第一班副都知升內殿直右第一班副都知散員左第二班副都知升內殿直右第二班副都知其四曰散指揮左第一班副都知升散員左第一班副都知散指揮右第一班副都知升散員右第一班副都知其五曰散指揮左第二班副都知升散員左第二班副都知散指揮右第三班副都知升右第二班副都知其六曰散都頭左班副都知升散指揮左第一班副都知散都頭右班副都知升散指揮右第一班都知其七曰散祗候左班副都知升散指揮左第二班副都知散祗候右班副都知升散指揮右第二班副都知其八曰內殿直左第一班押班遷轉東西班西第一班副都知內殿直右第一班押班轉東西班西第三班副都知以上各係升四名外御龍直御龍左第一直十將轉御龍弓箭直副都頭御龍直右第一直十將轉御龍弩直副都頭御龍骨朵子直左第一直十將升御龍左第一直十將御龍弩直左第一直十將升御龍弓箭左第三直十將係各升六名於是超躐積習之弊盡革而為定制焉淳祐十一年御史臺條奏軍功賞格違法之弊在法邊戍獲捷奇功暴露撤戍者制閫軍帥舉奏授官必其人身親行陳有戰禦功今自守闕進勇副尉至承信郎承節郎者其弊尤多乃以奉權要酬私恩或轉售於人方等第功賞之初即竄名其中朝廷審核動涉歲年已無稽考甚至承受廳吏廝卒之流足迹未嘗出都門而沾親冒矢石往來軍旅之恩授以名器請申嚴帥閫令立功人親授告身庶革冒濫寶祐五年樞密院言應從軍職事必立戰功並隊伍中人曾經拍試武藝若訓練官以遞而升者或年限未及仍帶權字俟年及方升正統制此定法也近年任子雜流冒授者才無差遣便請從軍繇統領至總管曾幾何時超躐而進甫得總管却軍職輒稱私計不便或托父母老疾巧計離軍又以筋力未衰求差正任甚非法意至咸淳中大將若呂文德夏貴孫虎臣范文虎輩矜功怙寵慢上殘下行伍功賞視為己物私其族姻故舊俾戰士身膏於草莽而姦人坐竊其勳爵矣屯戍之制凡遣上軍軍頭司引對賜以裝錢代還亦入見犒以飲食簡拔精鋭退其癃老至於諸州禁廂軍亦皆戍更隸州者曰駐泊戍蜀將校不遣都虞候當行者易管他營凡屯駐將校帶遙郡者以客禮見長吏餘如屯駐將校凡駐泊軍若捍禦邊寇即總管鈐轄共議州長吏等毋預事涉本城並屯駐在城兵馬即知州都監監押同領若州與駐泊事相關者公牒交報凡戍更有程京東西河北河東陝西江淮兩浙荊湖川峽廣南東路三年廣南西路二年陝西城寨巡檢並將領下兵半年景祐元年詔若聞陝西戍卒多為大將選置麾下及偏裨臨陳鮮得精鋭自隨自今以全軍隸逐將毋得選占三年詔廣桂荊潭鼎澧六州各置雄略一營與歸遠軍更戍嶺外康定元年頒銅符木契傳信牌銅符上篆刻曰某處發兵符下鑄虎豹為飾而中分之右符五左旁作虎豹頭四左符五右旁為四竅令可勘合又以篆文相向側刻十干字為號一甲己二乙庚三丙辛四丁壬五戊癸左符刻十干半字右符止刻甲己等兩半字右五符留京師左符降總管鈐轄知州軍官高者掌之凡發兵樞密院下符一至五周而復始指揮三百人至五千人用一虎一豹符五千人已上用雙虎豹符樞密院下符以右符第一為始內匣中緘印之命使者齎宣同下云下第一符發兵與使者復緘右符以還仍疾置聞所在籍下符資次日月及兵數毋得付所司其木契上下題某處契中剖之上三枚中為魚形題一二三下一枚中刻空魚令可勘合左旁題云左魚合右旁題云右魚合上三枚留總管鈐轄官高者掌之下一枚付諸州軍城寨主掌之總管鈐轄發兵馬百人已上先發上契第一枚貯以韋囊緘印之遣指揮齎牒同往所在驗下契與上契合即發兵復緘上契以還仍報總管鈐轄其發第二第三契亦如之掌契官籍發契資次日月及兵數以為驗傳信牌中為池槽藏筆墨紙令主將掌之每臨陳傳命書紙內牌中持報兵官復書事宜內牌中而還主將密以字為號驗毋得漏泄軍中事呂夷簡言自元昊反被邊城寨各為自守計萬一賊有奔衝即關輔驚擾雖夏竦等屯永興其實兵少自永興距鄜延環慶諸路皆數百里設有急緩內外不能相救請募勇敢士三萬訓以武技分置十隊以有謀勇者三人將之分營永興西寇至則舉烽相應或乘勢討擊進退不以地分並受夏竦等節制詔從之初趙元昊反以夏竦陳執中知永興軍節度陝西諸軍久之無功乃析秦鳳涇原環慶鄜延為四路以秦渭慶延知州分領本路馬步軍是歲罷銅符木契詔曰陝西屯重兵罄本路租稅益以內庫錢帛並西川歲輸而軍儲猶不足宜度隙地為營田務四路總管轉運悉兼領使慶曆二年詔已發士三萬戍永興委總管司部分閲教歲以八月遣萬五千人戍涇原儀渭州鎮戎軍十二月以萬五千人代至二月無警即還歲以為常葛懷敏等喪師命范仲淹韓琦龐籍復統四路軍期中覆不及者以便宜從事四年夏人已納款乃罷四月帝謂輔臣曰湖廣擊蠻吏士方夏瘴熱而罹疾者衆宜遣醫往為疹視六年詔騎軍以盛夏出戍馬多道死自今以八月至二月遣發又詔廣南方春瘴癘戍兵在邊者權休善地其自嶺外戍回軍士豫休兩月李昭亮上言舊制調發諸軍先引見試以戰陳遷補校長今或不暇試戰陳請選強壯有武技者每十人引見轉資後遣詔可時契丹使來議關南地朝廷經制河北武備議者欲增兵屯程琳自大名府徙安撫陝西上言曰河朔地方數千里連城三十六民物繁庶川原坦平自景德以前邊數有警官軍雖衆罕有成功蓋定州真定府高陽關三路之兵形勢不接召發之際交錯非便况建全魏以制北方以兵隸定州真定府路其勢倒置請以河朔兵為四路以鎮定十州軍為一路合兵十萬人高陽關十一州軍為一路合兵八萬人滄霸七州軍為一路合兵四萬人北京九州軍為一路合兵八萬人其駐泊鈐轄都監各掌訓練使士卒習聞主將號令急緩即成部分天子下其章判大名府夏竦奏鎮定二路當內外之衝萬一有警各藉重兵控守要害迭為應援若合為一則兵柄太重減之則不足以備敵又滄州久隸高陽關道里頗近瀕海斥鹵地形沮洳東北三百里野無民居非賊蹊徑萬一有警可決漳御河東灌塘淀隔越賊兵未易奔衝不必別建一路惟北京為河朔根本宜宿重兵控扼大河南北內則屏蔽王畿外則聲援諸路請以大名府澶懷衛濱棣德博州通利軍建為北京路四路各置都總管副都總管一人鈐轄二人都監四人平時祇以河北安撫使總制諸路有警即北京置四路行營都總管擇嘗任兩府重臣為之議未決竦入為樞密使賈昌朝判大名府復命規度昌朝請如竦議惟保州沿邊巡檢並雄霸滄州界河二司兵馬國初以來拓邊最號強徑今未有所隸請立沿邊巡檢司隸定州路界河司隸高陽關路於是下詔分河北兵為四路北京澶懷衛德博濱棣州通利保順軍合為大名府路瀛莫雄霸貝冀滄州永靜乾寧保定信安軍合為高陽關路鎮邢洺相趙磁州合為真定府路定保深祁州北平廣信安肅順安永寧軍合為定州路凡兵屯將領悉如其議韓琦謂兵勢大分請合定州真定府為一高陽關大名府為一朝廷以更置甫新不報詔四路兵依陝西遣部將往來按閲又詔自今兵戍回揀充捧日龍衛天武神衛等軍皇祐元年發禁兵十指揮戍京東以歲飢備盜詔陝西邊警既息土兵可備守禦東軍屯戍者徙內郡以省餉饋二年詔如聞河北諸屯將校有老疾廢事而不知退有善部勒著勞效而不得進帥臣監司審察密以名聞四年詔戍兵歲滿有司按籍遠者前二月近者前一月遣代戍還本管聽休五年又詔廣西戍兵及二年而未得代者罷歸鈐轄司以土兵歲一代之自儂智高之亂戍兵踰二萬四千至是聽還而令土兵代戍至和元年詔陳許鄭滑曹州各屯禁兵三千嘉祐五年用賈昌朝奏京北路置都監三人駐劄許蔡鄭州分督近畿屯兵七年詔陝西土兵番戍者毋出本路治平二年發兵指揮二十分戍永興軍邠州河中府仍遣官專掌訓練三年詔員僚直龍衛毋出戍神衛嘗留十指揮在營又詔頃以東兵戍嶺南冒犯瘴癘得還者十無五六自今歲滿以江淮教閲忠節威果代之神宗嗣位軍政多所更革熙寧初嘗與輔臣論河北守備韓絳等曰漢唐重兵皆在京師其邊戍裁足守備而已故邊無橫費強本弱末其勢亦順開元後有事四夷權臣皆節制一方重兵在西北天寶之亂由京師空虛賊臣得以肆志也帝曰邊上老人亦謂今之邊兵過於昔時其勢如倒植浮圖朕亦每以此為念也三年詔諸路戍兵畸零不成部伍致乖紀律或互遣郡兵更相往來道路艱梗宜悉罷之易以上番全軍或就糧兵為戍當遣者並隸總管司以詔令從事舊制河北軍馬不出戍帝慮其驕惰五年始命河北河東兵更戍減其一歲以優之其年詔徙河州軍馬駐熙州熙州軍馬駐通遠軍追召易集可省極邊軍儲帝嘗曰窮吾國用者冗兵也其議徙軍於內郡以弓箭手代之冀省邊費九年詔京師兵比留十萬餘以備四方屯戍數甚減少自今戍兵非應發京師者勿遣其後言者屢請損河北冗兵詔立額止留禁兵七萬而京東增置武衛軍四十二營訓練精鋭皆以分隸河北而以三千人散戍東南杭揚江寧諸州以備盜賊嶺外惟廣韶南雄州常有戍兵千人桂林以瘴癘間徙軍於全永元豐中或請遣陝西路騎軍五七百戍桂林者詔遣在京軍馬以戍之元祐元年六月右諫議大夫孫覺言將兵之禁宜可少解而責所在守臣與州郡兵官可令乘時廣行召募稍補前日之額循祖宗之法使屯駐三邊及川廣福建諸道州軍往來道路足以服習勞苦南北番戍足以均其勞佚詔陝西河東廣南將兵不輪戍他路河北輪近𩹉一將赴河東府界諸路逐將與不隸將兵並更互差撥出戍別路赴三路者差全將或半將餘路聽全指揮分差仍不過半將十月樞密院言東南一十三將自團將以來未曾均定出戍路分及不隸將兵內有出戍窠名數少所管指揮數多去處未得均當欲除廣南東西兩路駐劄三將只充本路守禦差使虔州第六將全永州第九將準備廣南東西路緩急勾抽策應並不差戍他路外餘八將及不隸將兵依均定路分都鈐轄司駐泊分擘差使內將兵不隸將兵路分却於自京差撥步軍前去補戍候將兵回日却行勾抽從之十二月廣西經略安撫使都鈐轄司言乞除桂宜融欽廉州係將不係將馬步軍輪差赴雍州極邊水土惡弱寨鎮監柵及巡防並都同巡檢等處並乞依雍州條例一年一替其餘諸州差往雍州永平古萬太平橫山遷隆寨鎮及左右江溪洞巡檢並欽州如昔洞駐劄抵棹寨並二年一替其諸州巡檢下一年一替從之二年河東經略安撫使曾布言河外上番四將每將內抽減步軍赴嵐石州分擘沿河等處差使代開封府界等五將兵馬歸營及赴岢嵐火山軍駐劄代東兵兩指揮赴太原府就食從之是月樞密院言昨為熙河蘭會路戍兵數多尋以年滿二千餘人節次抽減歸營兼本路即目見管戍兵比額尚多一千三百餘人今朝旨令熙河蘭會路都總管司遇本路緩急闕人許於秦鳳路勾抽一將應副緣本路即目事宜慮向秋闕人防守欲熙河蘭會路都總管司遇本路緩急闕人聽全勾抽秦鳳路九將應副差使從京東差步軍五指揮赴永興軍商虢州權駐劄以備秦鳳路勾抽從之紹聖四年樞密院備呂惠卿所言比緣邊牒報西界點集本路叛卒見闕守禦人兵兼土兵未填闕額並蕃兵弓箭手比元豐元年少二千二百有餘東兵馬步軍比元豐四年七年少十六指揮乞於東兵步人內差撥一十六指揮添助防守兼本路自去歲泛差過軍馬三十六指揮比之他路已是倍多即今戍兵三萬六千餘人比之元豐四年人數亦不至闕少自可那融使喚詔鄜延路都總管司詳此照會如遇賊兵犯塞或本路舉兵委是闕人其年滿人指揮兵級令相度事宜權留三兩月候事宜稍息遣還是月詔河東路總管司那融替換上番兵馬無令戍邊日久致有勞弊如無人替換候春月事宜稍息即先後上番四將抽減一番兵馬歸營元符二年閏九月遣秦鳳戍兵十指揮應副熙河新邊戍守十一月以呂惠卿奏減鄜延戍兵五十指揮三年八月詔遣虎翼軍六千戍熙河路令代蕃兵及弓箭手還家休息十二月詔邊帥減額外戍兵崇寧四年詔廣南瘴癘之鄉東西雖殊氣候無異西路戍兵二年一代而東路獨限三年代不如期有隕於瘴癘者朕甚惻然其東路亦令二年一替前期半年差人如違以違制論大觀二年六月詔陝西諸路自罷兵以來數年于此兵未曾徹蓋緣邊將怯懦坐費邊儲戍卒勞苦可除新邊的確人外餘並依元豐罷邊事日戍額人數外餘並直抽歸營有司不得占吝如違以違制論又詔東南除見兵額外帥府別屯二千人望郡一千人帥府置奉錢五百一指揮以威捷為名望郡奉錢四百一指揮以威勝為名帥府三指揮望郡一指揮各奉錢三百以全捷為名並以步軍五百人為額三年六月詔國家承平百五十年東南一方地大人衆已見兵寡勢弱非持久之道可除見今兵額外帥府別屯兵士二千人望郡一千人宣和二年詔河北軍馬與陝西河東更戍三年正月詔河北軍馬與陝西河東更戍非元豐法遂罷其令應拖後人並與免罪依舊收管閏五月江浙淮南等路宣撫使童貫奏勘會江南東路兩浙東西路各有東南一將平日未嘗訓練武藝臨敵必誤驅策昨睦寇初發天兵未到已前遣令上項將兵捕賊遂致敗衄亡失軍兵甚多今睦賊討平之後脅從叛亡者方始還業非增戍兵鎮遏無以潛消凶暴臣今擬留戍兵二萬五千五百七十八人分置江南東路兩浙東西路州軍防把一年滿替出軍一次依平蠻故事每月別給錢三百歲給鞋錢一千其兵並隸本路安撫司統轄訓練詔從之是年權知婺州楊應誠奏凡屯戍將兵須隸守臣使兵民之任歸一則號令不二然後可以立事詔從之續有旨改從舊制四年臣僚言東軍遠戍四川皆京師及府界有武藝無過之人既至川路分屯散處多不成隊而差使無時委致勞弊蓋四川土兵既有詔不得差使則其役併著東軍實為偏重若令四川應有土兵禁軍與東軍一同差使不惟勞逸得均抑亦不失熙豐置東軍彈壓蜀人兼備蠻寇之意詔本路鈐轄轉運兩司公同相度利害以聞五年制置所奏江浙增屯戍兵相度節鎮增添兩指揮處餘州各一指揮各不隸將內兩指揮處將一指揮以威果為名一指揮以全捷為名餘州並以威果為名從之七年三月詔廣南東西路地遠山險盜賊間有竊發內郡戍兵往彼屯守多緣瘴癘疾病不任捕盜又不諳知山川道里林壑曲折故盜不能禁可令每巡檢下招置土人健勇輕捷者參戍兵之半互相關防易於擒捕令樞密院行之靖康元年四月以种師道為太尉依前鎮洮軍節度使河北河東宣撫使後加同知樞密院事時師道駐軍滑州實無兵從行請合山東陝西京畿兵屯於青滄滑衛河陽預為防秋之計除處仁等謂金人重載甫還豈能復來不宜先自擾費示之以弱議格不行七月河北東路宣撫使李綱奏臣兩具論以七月七日指揮止諸路防秋之兵為不可必蒙聖察今宣撫司既無兵可差不知朝廷既止諸路防秋之兵將何應副兼遠方人兵各已在路又已借請數月本路漕司州縣又已預備半年百日之糧今一放散皆成虛費而實要兵用處無可摘那深恐誤國大計詔依所奏紹興之初羣盜四起有若嶽飛劉光世諸大將領兵尤重隨宜調發屯泊要害控制捍蔽是亦權宜之利矣厥後樞府帥臣屢言久戍之弊甚者或十年或二十年而不更尤可閔念蓋出戍者皆已老瘁而諸州所留類皆少壯及工匠三司多以坐甲為名占留違制有終身未嘗一日戍者於是命帥臣鈐轄司置諸州尺籍定其姓名依期更戍帥臣又言有如貴溪戍兵三月一更繇貴溪至池州往返一千五百里即是一月在途徒有勞費願以一年終更今考紹興間邊境弗靖故以大軍屯戍而踐更之期近者三月遠者三年逮和議既成諸軍移屯者漸歸營矣惟防秋仍用移屯更戍之法沿邊備禦亦倚重焉乾道淳熙紹熙之際一遵其制開禧初復議用兵駐劄諸兵始復移屯和議再成邊地一二要郡雖循舊貫其諸駐劄更戍之法不講而常屯之兵益多逮夫端平破川蜀咸淳失襄樊裂淮甸疆宇蹙而兵法壞叛將賣降庸夫秉鉞間有圖國忘死之士則遙制于權姦移屯更戍靡有定方於是戍卒疲於奔命不戰而斃者衆矣至若將校之部曲諸軍之名號士卒之衆寡詳列于屯駐者茲不重録云
