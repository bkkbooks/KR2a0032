body:
  text: 宋史卷一百二十三志第七十六禮二十六凶禮二園陵濮安懿王園廟秀安僖王園廟莊文景獻二太子欑所上陵忌日羣臣私忌附皇后園陵太祖建隆二年六月二日皇太后杜氏崩于滋德殿三日百官入臨明日大斂欑于滋福宮百官成服中書門下文武百僚諸軍副兵馬使以上並服布斜巾四腳直領襴衫外命婦帕頭帔裙衫九日帝見百官于紫宸門太常禮院言皇后燕國長公主高氏皇弟泰寧軍節度使光義嘉州防禦使光美並服齊衰三年準故事合隨皇帝以日易月之制二十五日釋服二十七日禫除畢服吉心喪終制從之七月太常禮院言準詔議定皇太后諡按唐憲宗母王太后崩有司集議以諡狀讀于太廟然後上之周宣懿皇后諡即有司撰定奏聞未常集議制下之日亦不告郊廟修諡册畢始告廟還讀于靈坐前詔從周制於是太常少卿馮吉請上尊諡曰明憲皇太后九月六日羣臣奉册寶告于太廟翌日上于滋福宮十月十六日葬安陵十一月四日神主祔太廟宣祖室乾德二年改卜安陵于河南府鞏縣三月二十五日奉寶册改上尊諡曰昭憲皇太后讀于陵次二十六日啓故安陵二十七日靈駕發引命攝太尉開封尹光義遣奠讀哀册四月九日掩皇堂太祖孝明孝惠二后乾德元年十二月七日皇后王氏崩二十五日命樞密承旨王仁贍為園陵使時議改卜安陵于鞏並以二后陪葬焉皇堂之制下深四十五尺上高三十尺陵臺再成四面各長七十五尺神牆高七尺五寸四面各長六十五步南神門至乳臺四十五步高二丈三尺吉仗用中宮鹵簿凶仗名物悉如安陵而差減其數孝惠又減孝明焉二年三月二十七日孝明皇后啓欑宮羣臣服初喪之服明日孝惠皇后自幄殿發引皆設遣奠讀哀册四月九日葬孝惠于安陵之西北孝明于安陵之北二十六日皆祔于別廟其後孝明升祔太祖室太祖皇后宋氏太宗至道元年四月二十八日崩帝出次素服舉哀輟朝五日六月六日上諡曰孝章皇后以歲在未有忌權欑于趙村沙臺三年正月二十日祔葬永昌陵之北皇堂陵臺神牆乳臺鵲臺並如孝明園陵制度仍以故許王及夫人李氏魏王夫人王氏楚王夫人馮氏皇太子亡妻莒國夫人潘氏將軍惟正亡妻裴氏陪葬二月二日祔神主于別廟莒國潘氏至道三年六月追册為莊懷皇后陵曰保泰神主祔后廟太宗賢妃李氏真宗至道三年十二月追尊為皇太后諡曰元德祔葬永熙陵大中祥符六年升祔太宗室太宗明德皇后李氏真宗景德元年三月十五日崩十七日羣臣上表請聽政凡五上始允帝去杖絰服衰即御坐哀動左右太常禮院言皇后宜準昭憲皇太后禮例合隨皇帝以日易月之制宗室雍王以下禫除畢吉服心喪終制五月詳定園陵宜在元德皇太后陵西安葬八月十二日上諡九月二十二日遷坐于沙臺欑宮十月七日祔神主太宗室三年十月十五日帝詣欑宮致奠十六日發引二十九日掩皇堂真宗章穆皇后郭氏景德四年四月十五日崩皇帝七日釋服後改用十三日羣臣三日釋服諸道州府官吏訃到日舉哀成服三日而除二十一日司天監詳定園陵帝令祔元德皇太后陵側但可安厝不必寬廣其棺槨等事無得鐫刻花樣務令堅固二十五日殯于萬安宮之西階詔兩制三館祕閣各撰挽詞閏五月十三日上諡曰莊穆六月二十一日葬永熙陵之西北七月有司奉神主謁太廟祔享于昭憲皇后享畢祔別廟大中祥符二年四月十五日大祥詔特廢朝羣臣奉慰真宗宸妃李氏仁宗明道元年二月二十六日薨初葬洪福禪院之西北命晏殊撰墓銘二年四月六日追册為莊懿皇太后十月五日改葬永定陵之西北隅十七日祔神主于奉慈廟真宗章獻明肅皇后劉氏明道二年三月二十七日崩于寶慈殿遷坐于皇儀殿三十日宣遺誥羣臣哭臨見帝于殿之東廂奉慰宗室削杖不散髮中書樞密使相比宗室去斜巾垂帽首絰及杖翰林學士至龍圖閣直學士已上並節度使文武二品已上又去中單及袴兩省御史臺中丞文武百官以下四腳幅巾連裳腰絰館閣讀書翰林待詔伎術官並給孝服宰相百官朝晡臨三日內外命婦朝臨三日四月遣使告哀遼夏及賜遺留物十日司天監詳定山陵制度皇堂深五十七尺神牆高七尺五寸四面各長六十五步乳臺高一丈九尺至南神門四十五步鵲臺高二丈三尺至乳臺四十五步詔下宮更不修蓋餘依二十七日以宰臣張士遜為山園使是日翰林學士馮元請上尊諡九月四日讀于靈坐十月五日葬永定陵之西北隅十七日祔神主于奉慈廟真宗章惠皇后楊氏景祐三年十一月五日保慶皇太后崩太常禮院言皇帝本服緦麻三月皇帝皇后服皆用細布宗室皆素服吉帶大長公主以下亦素服並常服入內就次易服三日而除詔以保祐沖人加服為小功五日而除四年正月十六日上諡二月六日葬永定陵之西北隅十六日升祔奉慈廟仁宗慈聖光獻皇后曹氏神宗元豐二年十月二十日太皇太后崩于慶壽宮是日文武百官入宮宰臣王圭升西階宣遺誥已內外舉哭盡哀而出二十六日大斂命韓縝為山陵按行使二十九日皇帝成服十一月韓縝言永昭陵北稍西地二百十步內取方六十五步可為山陵上以迫隘縝言若增十步合徵火相主及中五之數詔增十步十二月中書言先是司天監選年月遷祔濮安懿王三夫人今大行太皇太后山陵濮三夫人亦當舉葬於是詔宗室正任防禦使以上許從靈駕已從濮安王夫人者免從三年正月十四日上諡太常禮院言大行太皇太后雖已有諡然山陵未畢俟掩皇堂去大行稱慈聖光獻太皇太后祔廟題神主仍去二太字祕閣校理何洵直言按禮既葬日中還虞于正寢蓋古者之葬近在國城之北故可以平旦而往至日中即虞於寢所謂葬日虞弗忍一日離也後世之葬其地既遠則禮有不能盡如古者今大行太皇太后葬日至第六虞自當行之於外如舊儀其七虞及九虞卒哭謂宜行之於慶壽殿又按春秋公羊傳曰虞主用桑士虞禮曰桑主不文伏請罷題虞主太常言洵直所引乃士及諸侯之禮況嘉祐治平並虞于集英殿宜如故事又嘉祐治平虞主已不書諡當依所請太常禮院又言慈聖光獻皇后祔廟前二日告天地社稷太廟皇后廟如故事至日奉神主先詣僖祖室次翼祖宣祖太祖太祖后太宗皇帝懿德皇后明德皇后同一祝次饗元德皇后慈聖光獻皇后異饌異祝行祔廟之禮次真宗仁宗英宗室禮畢奉神主歸仁宗室如此則古者祔謁之禮及近代遍饗故事並行不廢從之三月十日葬永昭陵二十二日祔于太廟英宗宣仁聖烈皇后高氏哲宗元祐八年九月三日崩于崇慶宮遺誥皇帝成服三日內聽政羣臣十三日諸州長吏以下三日而除釋服之後勿禁作樂園陵制度務遵儉省餘並如章獻明肅皇太后故事十四日詔園陵依慈聖光獻太皇太后之制紹聖元年正月二十八日禮部言將題神主謹按章獻明肅皇后神主書姓劉氏詔依故事四月一日葬永厚陵神宗欽聖憲肅皇后向氏建中靖國元年正月十三日崩二月太常寺言大行皇太后山陵一行法物宜依元豐二年慈聖光獻皇后故事皇堂之制下深六十九尺面方二丈五尺石地穴深一丈明高二丈一尺鵲臺二各高四十一尺乳臺二各高二丈七尺神牆高一丈三尺五月六日葬永裕陵二十六日祔于神宗廟室先是元祐四年美人陳氏薨贈充儀又贈貴儀徽宗入繼大統詔有司議追崇之典上尊諡曰欽慈皇后祔葬永裕陵與欽聖同祔神宗室崇寧元年二月聖瑞皇太妃朱氏薨制追尊為皇太后遂上尊諡曰欽成皇后五月祔葬永裕陵祔神主於神宗室皆備禮如故事哲宗皇后劉氏政和三年二月九日崩詔崇恩太后合行禮儀可依欽成皇后及開寶皇后故事參酌裁定閏四月上諡曰昭懷皇后五月葬永泰陵祔神主於哲宗廟室徽宗皇后王氏大觀二年九月二十六日崩尚書省言章穆皇后故事真宗服七日從之十月太史局言大行皇后園陵斬草用十月二十四日斥土用十一月十三日葬用十二月二十七日諸宗室合祔葬者並依大行皇后月日時刻十一月宰臣蔡京等請上諡曰靖和皇后十二月奉安梓宮于永裕陵之下宮神主祔別廟四年十二月改諡曰惠恭其後高宗復改曰顯恭哲宗昭慈聖獻皇后孟氏紹興元年四月崩詔以繼體之重當承重服以遺誥擇近地權殯俟息兵歸葬園陵梓取周身勿拘舊制以為他日遷奉之便六月殯于會稽上亭鄉欑宮方百步下宮深一丈五尺明器止用鉛錫置都監巡檢各一員衛卒百人生日忌辰旦望節序排辦如天章閣儀虞主還州行祔廟禮徽宗顯仁皇后韋氏紹興二十九年崩祔于永祐陵欑宮高宗憲聖慈烈皇后吳氏慶元三年崩時光宗以太上皇承重寧宗降服齊衰期四年三月甲子權欑于永思陵孝宗成肅皇后夏氏開禧三年崩殯于永阜陵正北吏部尚書陸峻言伏覩列聖在御間有諸后上仙緣無山陵可祔是致別葬若上仙在山陵已卜之後無有不從葬者其他諸后葬在山陵之前神靈既安並不遷祔惟元德章懿二后方其葬時名位未正續行追册其成穆皇后孝宗登極即行追册改殯所為欑宮典禮已備與元德章懿事體不同所以更不遷祔竊稽前件典禮祇緣喪有前後勢所當然其於禮意却無隆殺今來從葬阜陵為合典故從之寧宗恭聖仁烈皇后楊氏紹定五年十二月崩祔葬茂陵濮安懿王園廟治平三年置園令一人以大使臣為之募兵二百人以奉園為額置柏子戶五十人廟三間二廈神門屋二所及齋院神廚靈星門其告祭濮安懿王及諸神祝文並本宮教授撰河南府給香幣酒脯禮物太祝奉禮則命永安縣尉主簿攝如闕官以本府曹官凡祭告及四仲饗並依此制奉安神主三獻命西京差判官一員亞獻朝臣一員終獻攝知園令出納神主廟制用一品夫人任氏墳域亦稱為園元豐詔曰濮安懿王先帝斟酌典禮即園立廟詔王子孫歲時奉祀義協恩稱後世無得議焉今三夫人名位或未正塋域或異處有司置而不講曷足以彰明先帝甚盛之德仰承在天之志乎三夫人可並稱曰王夫人命主司擇歲月遷祔濮園俾其子孫以時奉主與王合食而致孝思焉禮官奏請王夫人遷葬給鹵簿全仗用鼓吹至國門外減半喪行與四時告享並令嗣濮王主之南渡後主奉祠事以嗣濮王為之園令一員以宗室為之祠堂主管兼園廟香火官一員以武臣為之紹興二年九月詔每歲給降福建度牒一十道充祠堂仲饗忌祭五年二月嗣濮王仲湜言被旨迎奉濮安懿王神主至行在今已至紹興府欲權就本處奉安從之先是神主神貌在廬州嗣濮王士從乞奉遷於穩便州郡安奉故也十三年五月知大宗正事權主奉濮安懿王祠堂士言濮安懿王神貌神主權於紹興府光孝寺仲享薦祭其獻官牲牢禮料並多簡略乞令有司討論舊制行下禮部太常寺令參酌欲令士攝初獻仍差士子或從子二人攝亞終獻其合用牲牢羊豕各一籩豆各十設禮料初獻合服八旒冕亞獻終獻合服四旒冕奉禮郎太祝太官令服無旒冕並以舊制從事從之二十六年二月嗣濮王士俴言濮安懿王祠堂外無門牖內闕龕帳別無供具望下紹興府置造修奉淳熙五年四月詔濮安懿王祠堂園廟自今實及三年令本堂牒紹興府檢計修葺從嗣濮王士輵請也秀安僖王園廟紹熙元年三月詔秀王襲封等典禮禮部太常寺乞依濮安懿王典禮避秀安僖王名一字詔恭依仍置園廟四月詔皇伯滎陽郡王伯圭除太保依前安德軍節度使充萬壽觀使嗣秀王以奉王祀六月禮部太常寺言濮安懿王園廟制度廟堂神門宜並用獸所安木主石塪于室中西壁三分之一近南去地四尺開坎室以石為之其中可容神主趺匱今來秀安僖王及夫人神主欲乞並依上件典禮四仲饗廟三獻官並奉禮郎等係嗣秀王充初獻本位姪男攝亞終獻其奉禮郎等乞湖州差官充攝行禮合用牲牢羊豕湖州排辦祭器祭服工部下文思院製造每遇仲饗本府前期牒報湖州排辦所有行禮儀注乞從太常寺參照濮安懿王儀注修定並從之其園廟差御帶霍漢臣同湖州通判一員相度聞奏八月霍漢臣暨通判湖州朱僎言奉詔相度園廟以圖來上十月詔委通判一員提督修造祠堂如法修蓋十一月禮工部太常寺言濮安懿王園廟三間二廈神門屋二坐齋院神廚靈星門欲令湖州照應建造從之三年正月一日嗣秀王伯圭奏建造秀安僖王園廟近已畢工所有修製神主儀式令所司檢照典故修製委官題寫詔差權禮部尚書李巘題寫二月伯圭又奏秀安僖王祠堂園廟乞從濮安懿王例每三年一次從本所移牒所屬州府檢計修造從之莊文太子喪禮乾道三年七月九日皇太子薨設素幄于太子宮正廳之東皇帝自內常服至幄俟時至易服皂幞頭白羅衫黑銀帶絲鞋就幄發哀是日皇后服素詣宮隨時發哀如宮中之禮合赴陪位官並常服吉帶入麗正門詣宮幕次俟時至常服黑帶立班俟發哀畢易吉服退自發哀至釋服日皇帝不視事權禁行在音樂仍命諸寺院聲鍾其小斂大斂合祭告以本宮主管春坊官一員行禮其餘祭告以諸司官行禮差護喪葬事一員左藏庫出錢二萬貫銀五千兩絹五千匹成服日皇帝服期次粗布幞頭襴衫腰絰絹襯衫白羅㙐以日易月十三日而除皇后服次粗布蓋首長衫裙帔絹襯服白羅㙐六宮人不從服皇太子妃及本宮人並斬衰三年文武百官成服一日而除其文武合赴官及御史臺閣門太常寺引班祗應人並服布幞頭襴衫腰繫布帶本宮官僚並服齊衰三日服臨七日而除釋衰服後藏其服至葬日服葬畢而除十二日詔故皇太子欑所就安穆皇后欑宮側近擇地繼而都大主管所言太史局官等選到寶林院法堂堪充皇太子欑所從之十三日以皇太子薨告天地宗廟社稷宮觀十八日賜諡莊文閏七月一日遣攝中書令尚書右僕射魏嵵奉諡册寶于皇太子靈柩前百官常服入次易黑帶行禮畢常服赴後殿門外進名奉慰是夕皇帝詣東宮行燒香之禮如宮中之儀二日出葬宰臣葉顒等詣靈柩前行燒香之禮興靈訖行事官陪位親王南班宗室東宮官僚入班廳下再拜宰臣升詣香案前上香酹茶奠酒訖舉册官舉哀册讀册官跪讀讀訖宰臣再拜各降階立在位官皆再拜靈柩進行文武百僚奉辭于城外親王宗室並騎從至葬所掩壙畢辭訖退是日百僚進名奉慰四年五月禮部太常寺言國朝典故即無皇太子小祥典禮今參酌討論將來莊文太子小祥日乞皇帝前後殿特不視事其日先命侍從官一員常服詣太子神坐前行奠酹禮令本宮官僚常服陪位奠酹畢退次慶王恭王常服赴神坐前奠酹畢退次太子妃並榮國公以下行家人禮至大祥日太子妃榮國公以下及本宮人行禮畢焚燒神帛衰服間月妃及榮國公行禫祭家人禮從之明年七月九日大祥是日皇帝不視事差簽書樞密院事梁克家詣太子宮行奠酹禮如前儀景獻太子嘉定十三年八月六日薨其發哀制服並如莊文太子之禮九日詔護喪視殯所于莊文太子欑宮之東並依其制建造九月十日賜諡景獻遣攝中書令知樞密院事鄭昭先奉諡册寶于皇太子靈柩前讀册讀寶如儀訖班退至興靈日宰臣詣皇太子柩前行禮畢柩行其宗室使相南班官常服黑帶並赴陪位騎從至葬所俟掩欑畢奉辭訖退其日皇帝不視事百司赴後殿門外立班進名奉慰十四年七月二日小祥差知樞密院事鄭昭先充奠酹官十五年八月六日大祥九月十五日詔景獻太子几筵已徹高平郡夫人傅氏可特封信國夫人仍令主奉祭祀上陵之禮古者無墓祭秦漢以降始有其儀至唐復有清明設祭朔望時節之祀進食薦衣之式五代諸陵遠者令本州長吏朝拜近者遣太常宗正卿或因行過親謁宋初春秋命宗正卿朝拜安陵以太牢奉祠乾德三年始令宮人詣陵上冬服歲以為常開寶九年太祖幸西京過鞏縣謁安陵奠獻雍熙二年宗正少卿趙安易言昨朝拜安陵永昌陵有司止設酒脯香以未明行事不設燭燎又先赴永昌陵後赴安陵及帝后二位不遍拜頗愆於禮事下有司議曰按開元禮春秋二仲月司徒司空巡陵不設牲牢之祀今請如宗廟薦享少加裁減除不設登鉶牙槃食及太常登歌外餘悉如大祠朝拜日有司豫于陵南百步道東設次具翦除器以備灑掃設宗正卿位于兆外之左西向陵官位於卿之東南執事官又於其南俱西向北上設祭器禮料酒饌于兆門內宗正卿以下各就位再拜盥手奠酒讀祝册再拜先赴安陵次永昌陵次孝明孝惠懿德淑德皇后陵從之景德三年真宗將朝諸陵以宰臣王旦為朝拜諸陵大禮使太常禮院言朝陵故事合排小駕鹵簿唐太宗朝獻陵宿設黃麾仗周衛陵寢今請周設黃麾仗又唐制前一日陵令以玉册進御親書近臣奉出陵令受之今請造竹册四副祝畢焚之其百官位舊設陵所從祝官及皇親客使分於神道左右貞觀中並陪列司馬門內今望準舊儀施行又舊儀詣寢宮至大次之時設百官位奏請行禮望令先入赴寢殿立班貞觀中皇帝至小次素服乘馬檢會今年正月車駕朝拜明德欑宮止服素白衣當時皇帝在大祥之內今既服除望止服淡黃袍又按貞觀永徽故事朝陵皆先親後尊拜辭訖出還大次便進發今望先朝永熙陵行事及辭皇帝皆兩次再拜陪位官每陵亦各兩次再拜今請皇帝詣安陵參辭四度再拜永昌永熙陵各兩度設拜舊儀逐寢殿上食備太牢之饌珍羞庶品近以羊豕代太牢今請備少牢之祭設奠讀册畢復詣寢宮上珍羞庶品別行致奠之禮又舊儀前發二日太尉告太廟今請依禮遍告六室詔特服素白衣行事次序如告太廟餘依所請四年正月車駕次鞏縣罷鳴鞭及太常奏嚴金吾傳呼既至齋于永安鎮行宮太官進蔬膳是夜漏未盡三鼓帝乘馬却輿輦繖扇至安陵素服步入司馬門行奠獻禮諸陵亦然又詣下宮凡上宮用牲牢祝册有司奉事下宮備膳羞內臣執事百官陪位又詣元德太后陵奠獻別于陵西南設幄殿祭如下宮禮畢遍詣孝明孝惠孝章懿德淑德明德莊懷七后陵遂單騎從內臣巡視陵闕而親奠夔魏岐鄆安周六王及恭孝太子諸墳其三陵陪葬皇子皇孫公主之未出閣者及諸王夫人之蚤亡者各設位次諸陵下宮之東序安陵百二十一墳量設三十位男子女子共祝版二昌陵十五墳量設十位熙陵八墳量設五位並祝版一以致祭焉辰後暫詣幄次更衣復詣諸陵奉辭有司以朝拜無辭禮帝不忍故復往仍遣官祭一品皇親諸親墓大中祥符四年正月祀汾陰經鞏縣有司請于訾村王臺設幄殿置三陵神坐皇帝鞾袍就幄設香酒時果牙槃食奠獻而命大臣以香幣酒脯詣諸陵致告駕還復行親謁之禮帝素服乘馬至永安縣齋于行宮夜漏未盡二鼓詣三陵及元德太后明德皇后陵奠獻哀慟未明禮畢復詣四陵奉辭省視几筵奠獻如初禮又遍詣諸后陵諸王墳致奠命中使遍祭皇親諸親墳及汝州秦王墳是歲命禮官定春秋二仲遣官朝陵儀注以祭服行事專差宗正卿一員朝拜三陵別遣官二員分拜諸陵又製長竿簷床二副置陵表祝版遣寬衣軍士三十二人輿送陵下其後添差陵廟行禮官四員選朝官京官宗姓者充翰林學士錢惟演言春秋朝陵載于舊式公卿親往蓋表至恭唐顯慶中始詔三公行事天寶以後亦遣公卿巡謁蓋取朝廷大臣不必須同國姓後參用太常宗正卿晉開運中亦命吏部侍郎近年以來止遣宗正寺官人輕位卑實虧舊制望自今于丞郎諸司三品內遣官闕則差兩省諫舍以上所冀仰副追孝之心以成稽古之美景祐初滄州觀察使守節言寒食節例遣宗室拜陵而十月令內司賓往非所以致恭乃詔宗室正刺史以上一員朝拜四年減柏子戶安陵永昌永熙各留四十戶永定五十戶會聖宮十戶慶曆二年寒食十月朔宗室刺史以上聽更往朝陵皇祐三年太常博士李壽朋奏帝后諸陵薦饗皆有時獨昭憲皇后以合葬安陵不及時祭禮院言朝拜儀注牲牢並如太廟常饗例諸陵止奠一爵而安陵奠兩爵兩贊再拜惟祭饌不兼設蓋有司相承失之於是詔安陵昭憲皇后祝版牲幣御封香依太廟同室禮更造諸陵祭器貯別庫三陵皆置卒五百人唯定陵以章獻太后故別置一指揮昭陵使甘昭吉引定陵例請置守陵奉先兩指揮京西轉運司請減定陵卒半以奉昭陵詔選募一指揮額五百人初永安縣官月朔朝定陵望朝三陵韓琦言昭陵未有朝日乃令縣官朔望分朝諸陵熙寧中詔文臣大兩省武臣閣門使以上經過陵下並許朝拜又詔自今臣僚朝拜諸陵除見任嘗任執政官許進湯餘止奠獻薦新不特拜初故事車駕詣陵謂之親謁南渡之後此禮不舉故上陵或曰省視或曰保護或曰薦獻或曰祭告或曰致祭或曰望祭或曰修奉悉遣官不專於行禮也建炎元年五月一日詔應永安軍祖宗陵寢可差西京留守及臺臣一員躬親省視如有合修奉去處措置奏聞仍詔鄜延路副總管劉光世充省視陵寢使又詔河南府鎮撫使翟興團結本處義兵保護祖宗陵寢四年六月詔令禮部給降度牒一百道充祭告諸陵禮料仍令翟興所差來人賚祭告表以行紹興元年九月起居郎陳與義言陛下躬履艱難之運駐蹕東南列聖陵邑遠在洛師顧瞻山川未得時省雖欲遣使道路不通聖懷日憤近聞道路少通差易前日願詔執事每半年擇遣使臣兩員往省諸陵詔令樞密院每半年差使臣兩員前去三年正月禮部太常寺言春秋二仲薦獻諸陵乞于行在法惠寺設位望祭行禮從之自是每歲薦獻率循此制五月詔令戶部支金一百兩付河南府鎮撫使司幹辦公事任直清充祭告永安軍諸陵九年正月上謂輔臣曰祖宗陵寢久淪異域今金國既割還故地便當遣宗室使相與臣僚前去修奉酒掃尋命同判大宗正事士兵部侍郎張燾前去河南府袛謁修奉六月太常丞梁仲敏等言春秋二仲遣宗室遙郡防禦使薦獻諸陵太常少卿薦獻永祐陵權宜于行在設位行禮今道路既通望依舊遣官前詣詔令西京留守司候仲秋就便選官前詣諸陵薦獻士張燾回言諸陵下石澗水自兵興以來涸竭幾十五年二使到日水即大至父老驚嘆以為中興之祥十年三月禮部言池州銅陵縣丞呂和問進宮陵儀制望付太常寺以備檢照永安軍等處今已收復遂委知軍詣諸陵逐位檢視除永定永昭永厚永裕永泰陵園廟並無損動內永安永昌永熙陵神臺璺裂未敢一面擅行補飾太常寺看詳若行補修合就差所委修飾官奏告行禮詔令河南府委官如法補飾不得滅裂其後兵部侍郎兼史館修撰張燾言伏見宣諭官方庭實有請乞將來先帝山陵一依永安陵等制度臣區區愚忠願明詔有司異時永固陵凡金玉珍寶盡斥不用播告天下咸使聞知如是自然可保無虞上嘉納之三十二年六月詔祖宗陵寢令本處招討使同本處官吏躬親朝謁如法修奉務在嚴潔以稱孝思之意乾道六年八月詔承信郎劉湛特轉兩官右迪功郎劉師顏特與右承務郎升擢差遣秦世輔特轉一官升充正將以湛等歸正結義保護陵寢故也端平元年正月京西湖北安撫制置使史嵩之露布以滅金聞二月御筆國家南渡以後八陵禋隔常切痛心今京湖帥臣以圖來上恭覽再三悲喜交集凡在臣子諒同此情可令卿監郎官以上詣尚書省恭集議遂遣太常寺主簿朱揚祖閣門祗候林拓朝謁八陵紹興元年六月太常寺言昭慈獻烈皇太后欑宮在越州會稽縣合依四孟朝獻禮例差宰執一員前一日赴欑宮泰寧寺宿齋至日行朝拜之禮詔同知樞密院事李回行禮二年三月知紹興府張守言昭慈獻烈皇后欑宮近在府界望許臣以時朝謁從之自是守臣皆許朝謁十七年十一月殿中侍御史余堯弼言望舉行舊制於春秋二仲遣官詣永祐陵欑宮薦獻臣僚又言陵廟之祭月有薦新著在令典方今宗廟久已遵奉惟是永祐陵闕而未講望令有司討論舉而行之太常寺討論欲依政和五禮依典故令兩欑宮遵依每月檢舉差官行禮其新物令逐宮預行關報紹興府排辦從之二十七年六月詔永祐陵及昭慈聖獻皇后欑宮檢察承受以檢察宮陵所為名三十年九月吏部言紹興府會稽知縣依倣陵臺令典故於階銜內帶兼主管欑宮事務量加優異淳熙元年正月禮部太常寺言春秋二仲差太常少卿薦獻永祐陵欑宮並周視陵域如遇少卿有缺乞從本寺前期取指揮差本寺以次官充攝所有今年仲春薦獻即日見闕少卿詔差太常丞錢良臣自後春秋遇少卿闕率以為例慶元元年六月詔永阜陵孝宗皇帝欑宮每歲秋季一就令所差監察御史恭詣朝拜檢察從御史臺申請諸陵亦如之忌日唐初始著罷樂廢務及行香修齋之文其後又朔望停朝令天下上州皆準式行香天祐初始令百官詣閣奉慰宋循其制惟宣祖昭憲皇后為大忌前一日不坐羣臣詣西上閣門奉慰移班奉慰皇太后退赴佛寺行香凡大忌中書悉集小忌差官一員赴寺如車駕巡幸道遇忌日皆不進名奉慰留守自於寺院行香仍不得在拜表之所天下州府軍監亦如之建隆二年宣祖忌日時明憲太后在殯羣臣止詣閣奉慰而罷行香乾德二年禘于太廟其日惠明皇后忌有司言唐開成四年正月二十二日祀先農與穆宗忌同日大和七年十二月八日蠟百神與敬宗忌同日詔以近廟忌辰作樂非便宜令縣而不作竊以農蠟之祭猶避廟忌而不作樂況僖祖同廟連室而在諱辰詎可輒陳金石之奏伏望依禮縣而不作其後宣祖昭憲忌日詔準太祖太宗奉翼祖禮前一日更不廢務咸平中有司將設春宴金明池習水戲開瓊林苑縱都人遊賞帝以是月太宗忌月命詳定故事以聞史館檢討杜鎬等言按晉穆帝納后月是康帝忌月禮官荀訥議有忌日無忌月若有忌月即有忌時忌歲益無所據當時從訥所議唐武后神功元年建安王攸宜破契丹詣闕獻捷軍人入城例有軍樂內史王及善以國家忌月請備而不奏鳳閣侍郎王方慶奏按禮經有忌日而無忌月遂舉樂憲宗時太常博士韋公肅言禮無忌月禁樂今太常教坊以正月為忌月停郊廟饗宴之音中外士庶咸罷宴樂竊恐乖宜時依公肅所奏伏以忌日不樂嘗載禮經忌月徹縣實無典故況前代鴻儒議論足據其春宴及池苑並合舉樂景德元年北征凱旋京師是日以懿德皇后忌詔徹鹵簿鼓吹禮官議曰班師振旅國之大事后之忌日家之私事今大駕凱旋軍容宜肅昔武王伐紂在諒暗中猶前歌後舞夫諒暗是重遠忌是輕以此而論舉樂無爽況春秋之義不以家事辭王事其還京日法駕鼓吹音樂並請振作尋詔自今宗廟忌日西京及諸節鎮給錢十千防禦團練州七千軍事州五千以備齋設元德皇后忌日舊制樞密使依內諸司例惟進名不赴行香知樞密院王欽若以為言自是三司使副翰林樞密龍圖直學士並赴焉真宗崩元德明德皇后忌日在禫制內乃停進名行香凡奉慰宰相樞密使各帥百官內職共進名節度使留後觀察使各進名忌日前後各禁刑三日如天慶節釋杖以下情輕者復斷屠宰不視事前後各三日禁樂各五日其後以歲月漸遠禁刑不視事各二日禁樂各三日章憲明肅太后忌辰禮官請依章懿太后禮例前後各二日不視事一日禁屠宰各三日禁樂詔應大忌日行香臣僚並素食復立孝惠孝章淑德章懷章惠溫成諸后為小忌未幾罷神宗即位太常禮院言僖祖及文懿皇后神主既祧準禮不諱忌日亦請依唐睿宗祧遷故事廢之初神御殿酌獻設皇帝位于庭下而忌日兩府列于殿上寺院行香左右巡使兩赤縣令于中門相向分立俟宰臣至立位前直省官贊通揖于禮無據乃命行香羣臣班殿下宰相一員升殿跪爐而罷通揖又詔大忌日不為假執政官蚤出禮部言順祖及惠明皇后既葬遷主罷行香忌日請于永昌院佛殿之東張幄齋薦乃詔僖祖翼祖並后六位忌日咸如之先是翼祖簡穆皇后神主奉藏夾室依禮不忌後復詔還本室而忌日亦如舊焉政和新儀羣臣進名奉慰其日質明文武朝參官入詣朝堂就次御史臺先引殿中侍御史一員入就位次西上閣門御史臺分引朝參官及諸軍將校次禮直官引三公以下在西上閣門南階下每等重行異位並北向東上知西上閣門官于班前西向立搢笏執名紙躬三公以下文武百僚俱再拜俟閣門官執笏置名紙笏上入西上閣門訖退羣臣奉慰詣景靈宮每等重行異位並北向東上禮直官揖班首以下再拜訖引班首自東階升殿舍人接引同升詣香案前搢笏上香跪奠茶訖執笏興降階復位又再拜次引班首以下分左右搢笏行香宰相執政官分左右行香訖執笏俱復位次引班首升殿詣香案前俯伏跪搢笏執爐俟讀疏畢執笏俯伏興降階復位又再拜退中興之制忌日百僚行香在外州軍亦詣寺院行香如在以日易月服制之內並依禮例權停大祥後次年於曆日內箋注立忌辰禁音樂一日紹興元年二月太常少卿蘇遲等以徽宗欽宗留北有朔望遙拜之禮乃言凡遇祖宗帝后忌前一日並忌日皇帝自內先服紅袍遙拜訖易服行禮從之二年八月詔應諸路州軍見屯軍馬統兵官每遇國忌免行香十三年正月御史臺言正月十三日欽聖憲肅皇后忌其日立春準令諸臣僚及將校立春日賜幡勝遇稱賀等拜表忌辰奉慰退即戴欲乞候十三日忌辰行香退即行戴插從之三十一年六月禮部侍郎金安節等言六月二十八日欽慈皇后忌辰係在淵聖皇帝以日易月釋服之外百官行香宜如常制詔依三十二年正月禮部太常寺言已降旨欽宗祔廟翼祖當遷於正月九日告遷翼祖皇帝簡穆皇后神主奉藏于夾室所有以後翼祖皇帝忌及諱簡穆皇后忌欲乞依禮不諱不忌詔恭依淳熙元年十一月詔文武百僚詣景靈宮國忌立班行香自今如遇宰執俱致齋不及趁赴于東班從上引官一員升殿跪爐行香以次官一員詣西班行香先是閣門得旨國忌行香宰執致齋不赴其西壁武臣闕官押班已降指揮差使相或太尉節度使等押班可令文武班內班上一員東壁押班止令西壁散香今後準此至是禮部太常寺重別指定來上故有是命四年十月太常少卿齊慶胄言每遇國忌文臣班列莫敢不肅唯是武臣一班員數絶少或以疾病在告多不趁赴詔閣門御史臺申嚴行下如有違戾彈劾聞奏九年十月侍御史張大經奏比來國忌行香日分合赴官類多託疾在告以免夙興拜跪之勞乞自今如遇行香日有稱疾託故不赴者從本臺彈奏乞置典憲從之羣臣私忌開寶敕文應常參官及內殿起居職官等自今刺史郎中將軍以下遇私忌請準式假一日忌前之夕聽還私第其後有司言臣僚忌日恩賜其間甚有無名者如劉繼元李煜劉鋹之類皆身為降俘亡沒已久而尚霑恩賜及周朝忌日尚有追薦本朝亦有追尊皇后生日道場並諸神祠亦有為生日者請付禮官詳議不經之物一切省去詔周朝忌日仍舊餘罷之
