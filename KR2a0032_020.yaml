body:
  text: 宋史卷二十本紀第二十徽宗二四年春正月庚午朔改熙河蘭會路為熙河蘭湟路丙戌築溪哥城壬辰詔察諸路監司貪虐者論其罪丙申詔京畿路改置轉運使提點刑獄官蔡卞罷文武學法丁酉秦鳳蕃落獻邦潘疊三州以內侍童貫為熙河蘭湟秦鳳路經略安撫制置使二月乙巳築御謀城己酉置親衛勳衛翊衛郎中郎等官以勳戚近臣之兄弟子孫有官者試充甲寅以張康國知樞密院事兵部尚書劉逵同知樞密院事吏部尚書何執中為尚書左丞乙卯班方田法庚申詔西邊用兵能招納羌人者與斬級同賞壬戌升趙州為慶源軍甲子雨雹乙丑改三衛郎為侍郎閏月壬申復元豐銓試斷按法令州縣倣尚書六曹分六案甲申置陝西河東河北京西監鑄當二夾錫鐵錢己丑御端門受趙懷德降授感德軍節度使封安化郡王壬辰曲赦熙河蘭湟路三月壬寅置青海馬監甲辰以趙挺之為尚書右僕射兼中書侍郎丙午詔建王口寨為懷遠軍庚戌令呂惠卿致仕戊午復銀州乙丑詔州縣屬鄉聚徒教授者非經書子史毋習丁卯嚑夜郎首領以地降是月夏人攻塞門寨夏四月辛未遼遣蕭良來為夏人求還侵地及退兵戊寅夏人攻臨宗寨辛巳詔諸路走馬承受毋得預軍政及邊事己丑夏人寇順寧寨鄜延第二副將劉延慶擊破之復攻湟州北蕃市城知州辛叔獻等擊却之五月戊申除黨人父兄子弟之禁壬子遣林攄報聘于遼賜張繼先號虛靖先生癸丑罷轉運司檢察鈎考法辛酉命官分部決獄六月丙子復解池鹽占城入貢丁丑慮囚辛巳罷陝西河東力役甲申曲赦熙河陝西河東京西路戊子趙挺之罷秋七月丙申朔罷三京國子監官各置司業一員辛丑置熒惑壇置四輔郡以潁昌府為南輔襄邑縣為東輔鄭州為西輔澶州為北輔甲寅詔奪元祐輔臣墳寺丁巳還上書流人戶部尚書曾孝廣坐錢帛皆闕出知杭州八月戊辰以德妃王氏為淑妃庚午以王江古州歸順置提舉溪洞官二員改懷遠軍為平州丙子以東輔為拱州甲申奠九鼎于九成宮乙酉詣宮酌獻辛卯賜新樂名大晟置府建官壬辰遣劉正夫使遼九月己亥赦天下乙巳詔元祐人貶謫者以次徙近地惟不得至畿輔詔京畿三路保甲並於農隙時教閲乙卯賜上舍生三十五人及第丙辰詔自今非宰臣毋得除特進冬十月自七月雨至是月不止甲申以左右司所編紹聖元符以來申明斷例班天下刑名例班刑部大理司丁亥升武岡縣為軍戊子詔上書進士未獲者限百日自陳免罪壬辰日中有黑子十一月戊戌安定郡王世雄薨丙辰置諸路提舉學事官己未章惇卒十二月癸酉升拱州為保慶軍甲申分平州置允州格州是歲蘇湖秀三州水賜乏食者粟泰州禾生穭五年春正月戊戌彗出西方其長竟天庚子復置江湖淮浙常平都倉甲辰以吳居厚為門下侍郎劉逵為中書侍郎乙巳以星變避殿損膳詔求直言闕政毀元祐黨人碑復謫者仕籍自今言者勿復彈糾丁未太白晝見赦天下除黨人一切之禁權罷方田戊申詔侍從官奏封事己酉罷諸州歲貢供奉物庚戌詔崇寧以來左降者各以存歿稍復其官盡還諸徙者辛亥御殿復膳壬子罷圜土法丁巳罷書畫算醫四學壬戌復書畫算學二月甲子朔詔監司條奏民間疾苦丙寅蔡京罷為開府儀同三司中太一宮使以觀文殿大學士趙挺之為特進尚書右僕射兼中書侍郎庚午詔翰林學士兩省官及館閣自今並除進士出身人壬申省內外冗官罷醫官兼宮觀者蒲甘國入貢丁丑以前後所降御筆手詔模印成冊班之中外州縣不遵奉者監司按劾監司推行不盡者諸司互察之三月丙申詔星變已消罷求直言辛丑改威德軍為石堡寨封眉州防禦使世福為安定郡王癸卯御集英殿策進士丁未罷諸州武學乙卯廢銀州為銀川城丙辰蔡王似薨己未賜禮部奏名進士及第出身六百七十一人夏四月丁丑停免兩浙水災州郡夏稅五月丁未班紀元曆辛亥封子栩為魯國公乙卯罷辟舉盡復元豐選法六月癸亥立諸路監司互察法庇匿不舉者罪之仍令御史臺糾劾改格州為從州甲子詔求隱逸之士令監司審核保奏其緣私者御史察之丁卯詔輔臣條具東南守備策壬申慮囚秋七月庚寅朔日當食不虧壬寅詔改明年元九月辛丑河南府嘉禾與芝草同本生冬十月己卯升澶州為開德府庚辰降德音于開德府減囚罪一等徒以下釋之十一月辛卯陳王佖薨乙巳詔立武士貢法辛亥併京畿提刑入轉運司十二月戊午朔日當食不虧羣臣稱賀己未劉逵罷壬戌詔臣僚休日請對特御便殿己巳詔監司按事有懷姦挾情不盡實者流竄不是歲廣西黎洞韋晏鬧等內附大觀元年春正月戊子朔赦天下甲午以蔡京為尚書左僕射兼門下侍郎戊戌幸興德禪院復廢官庚子復置議禮局於尚書省甘露降于帝鼐內羣臣稱賀壬寅吳居厚罷戊申進封衛王俁為魏王定王偲為鄧王壬子以何執中為中書侍郎鄧洵武為尚書左丞戶部尚書梁子美為尚書右丞乙卯封仲損為南康郡王仲御為汝南郡王二月壬戌以向宗回為開府儀同三司徙封安康郡王甲子以黎洞納土曲赦廣西乙亥復醫學己卯復行方田丙戌以平昌郡君韋氏為才人三月丁酉趙挺之罷以何執中為門下侍郎鄧洵武為中書侍郎梁子美為尚書左丞吏部尚書朱諤為右丞甲辰立八行取士科癸丑趙挺之卒夏四月乙丑以淑妃王氏為貴妃五月己丑封子棫為揚國公朝散郎吳儲承議郎吳侔坐與妖人張懷素謀反伏誅貶呂惠卿為祁州團練副使庚寅鄧洵武罷甲午詔班新樂于天下癸卯詔自今凡總一路及監司之任勿以元祐學術及異意人充選以安化蠻犯邊益兵赴廣西討之乙巳子構生六月己未以梁子美為中書侍郎壬戌詔景靈宮建僖祖殿室甲子以黎人地為庭孚二州癸酉賜上舍生二十九人及第乙亥朱諤卒丁丑慮囚甲申以才人韋氏為婕妤秋七月乙酉朔伊洛溢戊子詔括天下漏丁壬寅班祭服于州郡乙巳賢妃武氏薨八月乙卯曾布卒丁巳封子構為蜀國公庚申以戶部尚書徐處仁為尚書右丞吏部尚書林攄同知樞密院事己巳降德音于淮海吳楚二十六州減囚罪一等流以下釋之九月庚寅建顯烈觀於陳橋己酉加上僖祖諡曰立道肇基積德起功懿文憲武睿和至孝皇帝朝獻景靈宮庚戌饗太廟辛亥大饗明堂赦天下升永興軍為大都督府章綖坐冒法竄海島李景直等四人以上書觀望罪並編管嶺南冬十月己未詔士有才武絶倫者歲貢準文士上舍上等法辛酉蘇州地震乙丑貶張商英為安化軍節度副使己巳大雨雹閏月丙戌以林攄為尚書左丞資政殿學士鄭居中同知樞密院事乙未詔守令以戶口為殿最升桂州為大都督府鎮州為靖海軍節度壬寅禁用翡翠乙巳升太原府鄆州並為大都督府十一月壬子朔日有食之蔡京等以不及所當食分率羣臣稱賀乙丑置符寶郎己巳升瀛州為河間府瀛海軍節度戊寅南丹州刺史莫公佞降徐處仁以母憂去位十二月庚寅以蔡京為太尉進何執中以下官二等癸巳以江寧荊南揚杭越洪福潭廣桂並為帥府置黔南路丁酉置開封府府學己亥以婉容喬氏為賢妃開潩河是歲秦鳳旱京東水河溢遣官振濟貸被水戶租廬州雨豆汀懷二州慶雲見乾寧軍同州黃河清于闐夏國入貢涪州夷駱世華駱文貴內附二年春正月壬子朔受八寶于大慶殿赦天下文武進位一等蔡京表賀符瑞乙卯以婉儀劉氏為德妃己未蔡京進太師加童貫節度使仍宣撫庚申進封魏王俁為燕王鄧王偲為越王並為太尉京兆郡王桓為定王高密郡王楷為嘉王並為司空吳國公樞為建安郡王冀國公嵵為文安郡王楚國公栩為安康郡王揚國公棫為濟陽郡王蜀國公構為廣平郡王並為開府儀同三司甲子以神宗德妃宋氏劉氏為淑妃賢妃喬氏為德妃庚午徙封仲損為齊安郡王仲御為華陽郡王孝騫為晉康郡王孝參為豫章郡王並開府儀同三司封仲增為信安郡王仲忽為普安郡王仲癸為咸安郡王仲僕為同安郡王仲糜為淮安郡王戊寅徙封向宗回為漢東郡王向宗良為開府儀同三司仲損薨河東北盜起二月甲申置諸州曹掾官甲午詔建徽猷閣藏哲宗御集置學士直學士待制官己亥以安德軍節度使錢景臻為開府儀同三司庚戌以婕妤韋氏為修容三月庚申班金籙靈寶道場儀範于天下甲子封子材為魏國公乙亥封子模為鎮國公戊寅賜上舍生十三人及第升乾寧軍為清州詔監司歲舉所部郡守二人縣令四人赴三省審察夏四月甲辰復洮州五月庚戌朔日有食之辛亥慮囚以復洮州功賜蔡京玉帶加童貫檢校司空仍宣撫甲寅復諸路歲貢供奉物壬戌溪哥王子臧征撲哥降復積石軍戊辰詔官蔡京子孫一人進執政官一等六月乙酉以涪夷地為珍州甲午以平夏城為懷德軍乙未以殿中六尚算學太官局翰林儀鸞司皆隸六察秋七月庚戌罷建僖祖殿室乙卯以婉容王氏為賢妃八月辛巳邢州河水溢壞民廬舍復被水者家丙申中書侍郎梁子美罷知鄆州己亥置保州敦宗院九月辛亥以林攄為中書侍郎吏部尚書余深為尚書左丞壬戌貶向宗回為太子少保致仕壬申封子植為吳國公癸酉皇后王氏崩削向宗回官爵丙子曲赦熙河蘭湟秦鳳永興軍路冬十一月丁未朔太白晝見乙丑上大行皇后諡曰靖和十二月壬寅陪葬靖和皇后于永裕陵是歲同州黃河清出宮女七十有七人于闐夏國入貢涪夷任應舉楊文貴湖南徭楊再光內附三年春正月乙卯祔靖和皇后神主于別廟己未減兩京河陽鄭州囚罪一等民緣園陵役者蠲其賦丁卯以涪夷地為承州甲戌升湟州為嚮德軍節度二月丙子朔播州楊文貴納土以其地置遵義軍丁丑韓忠彥致仕三月丙午立海商越界法庚戌御集英殿策進士辛酉詔四川郡守並選內地人任之壬戌併黔南入廣西路乙丑賜禮部奏名進士及第出身六百八十五人壬申張康國卒夏四月戊寅林攄罷戊子以淑妃劉氏為貴妃癸巳以鄭居中知樞密院事吏部尚書管師仁同知樞密院事癸卯以余深為中書侍郎兵部尚書薛昂為尚書左丞工部尚書劉正夫為尚書右丞五月乙巳朔孟翊獻所畫卦象謂宋將中微宜更年號改官名變庶事以厭之帝不樂詔竄遠方丙辰令辟雍宴用雅樂丁巳慮囚戊辰大雨雹辛未以德妃喬氏為貴妃六月甲戌朔詔修樂書管師仁罷丁丑蔡京罷辛巳以何執中為特進尚書左僕射兼門下侍郎以瀘夷地為純滋二州庚寅冀州河水溢秋七月丁未詔謫籍人除元祐姦黨及得罪宗廟外餘並録用丙辰詔罷都提舉茶事司在京令戶部在外令轉運司主之八月乙酉封子朴為雍國公己丑嗣濮王宗漢薨甲午以仲增為開府儀同三司封嗣濮王丙申升融州為清遠軍節度己亥韓忠彥薨九月癸丑封子棣為徐國公己未賜天下州學藏書閣名稽古冬十月癸巳減六尚局供奉物十一月丁未詔算學以黃帝為先師風后等八人配饗巫咸等七十人從祀己巳蔡京進封楚國公致仕仍提舉哲宗實録朝朔望十二月己亥罷東南鑄夾錫錢是歲江淮荊浙福建旱秦鳳階成饑發粟振之蠲其賦陝州同州黃河清闍婆占城夏國入貢瀘州夷王募弱內附四年春正月癸卯罷改鑄當十錢辛酉詔士庶拜僧者論以大不恭丁卯夏國入貢二月庚午朔禁然頂煉臂刺血斷指庚辰罷京西錢監甲申詔自今以賞進秩者毋過中奉大夫己丑以余深為門下侍郎資政殿學士張商英為中書侍郎戶部尚書侯蒙同知樞密院事壬辰罷河東河北京東鑄夾錫鐵錢三月庚子募飢民補禁卒詔醫學生併入太醫局算入太史局書入翰林書藝局畫入翰林圖畫局學官等並罷甲寅敕所在振恤流民癸亥詔罪廢人稍加甄能安分守者不俟滿歲各與進以責來效丙寅賜上舍生十五人及第戊辰詔上書邪下等人可依無過人例今後改官升任並免檢舉夏四月己卯班樂尺于天下癸未蔡京上哲宗實録丙申立感生帝壇丁酉詔修哲宗史五月壬寅停僧牒三年丁未彗出奎婁甲寅立詞學兼茂科丙辰詔以彗見避殿減膳令侍從官直言指陳闕失戊午赦天下壬戌改廣西黔南路為廣南西路癸亥治廣西妄言拓地罪追貶帥臣王祖道為昭信軍節度副使甲子貶蔡京為太子少保丙寅余深罷六月庚午御殿復膳乙亥以張商英為尚書右僕射兼中書侍郎壬辰復向宗回為開府儀同三司漢東郡王乙未慮囚丙申薛昂罷秋七月辛丑復罷方田戊申封子㮙為冀國公八月乙亥以劉正夫為中書侍郎侯蒙為尚書左丞翰林學士承旨鄧洵仁為尚書右丞戊寅省內外冗官庚辰以資政殿學士吳居厚為門下侍郎丁亥行內外學官選試法閏月辛丑詔諸路事有不便於民者監司條奏之癸卯改陵井監為仙井監辛酉詔戒朋黨以張閣知杭州兼領花石綱九月丙寅朔日有食之冬十月丁酉立貴妃鄭氏為皇后鄭居中罷戊戌太白晝見以吳居厚知樞密院事十一月乙丑朔朝景靈宮丙寅饗太廟丁卯祀昊天上帝于圜丘赦天下改明年元丙戌罷拱州為襄邑縣十二月庚戌改諡靖和皇后為惠恭是歲夔州江水溢海水清出宮女四百八十六人南丹州首領莫公晟內附政和元年春正月己巳以賢妃王氏為德妃壬申毀京師淫祠一千三十八區戊寅封子栱為定國公丙戌廢白龔二州壬辰詔百官厲名節二月壬寅冊皇后乙巳詔陝西河東復鑄夾錫錢丙午以太子少師鄭紳為開府儀同三司三月己巳詔監司督州縣長吏勸民增植桑柘課其多寡為賞罰癸酉以吏部尚書王襄同知樞密院事夏四月乙卯罷陝西河東鑄夾錫錢丙辰慮囚立守令勸農黜陟法丁巳以淮南旱降囚罪一等徒以下釋之五月癸亥詔四川羡餘錢物歸左藏庫戊辰改當十錢為當三己卯東南有星晝隕丁亥解池生紅鹽六月甲寅復蔡京為太子少師秋七月壬申以疾愈赦天下癸未廢平從二州為寨八月乙未復蔡京為太子太師丁巳張商英罷戊午詔監司部內官吏一歲中有犯罪至三人以上雖不及三人而或有曾薦舉者罪及監司九月戊寅王襄罷丁亥封子栻為廣國公是月鄭允中童貫使遼以李良嗣來良嗣獻取燕之策詔賜姓趙冬十月辛卯以用事之臣多險躁朋比下詔申警庚戌封昭化軍節度使宗粹為信安郡王辛亥貶張商英為崇信軍節度副使十一月壬戌以上書邪等及曾經入籍人並不許試學官丙子封子榛為福國公十二月己酉詔臺諫以直道核是非毋憚大吏毋比近習辛亥廢鎮州升瓊州為靖海軍是歲虔州芝草生蔡州瑞麥連野河南府嘉禾生野蠶成繭出宮女八十人交趾夏國入貢
