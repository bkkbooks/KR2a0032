body:
  text: 宋史卷一本紀第一太祖一太祖啓運立極英武睿文神德聖功至明大孝皇帝諱匡胤姓趙氏涿郡人也高祖朓是為僖祖仕唐歷永清文安幽都令朓生珽是為順祖歷藩鎮從事纍官兼御史中丞珽生敬是為翼祖歷營薊涿三州刺史敬生弘殷是為宣祖周顯德中宣祖貴贈敬左驍騎衛上將軍宣祖少驍勇善騎射事趙王王鎔為鎔將五百騎援唐莊宗于河上有功莊宗愛其勇留典禁軍漢乾祐中討王景於鳳翔會蜀兵來援戰于陳倉始合矢集左目氣彌盛奮擊大敗之以功遷護聖都指揮使周廣順末改鐵騎第一軍都指揮使轉右廂都指揮領嶽州防禦使從征淮南前軍却吳人來乘宣祖邀擊敗之顯德三年督軍平揚州與世宗會壽春壽春賣餅家餅薄小世宗怒執十餘輩將誅之宣祖固諫得釋纍官檢校司徒天水縣男與太祖分典禁兵一時榮之卒贈武清軍節度使太尉太祖宣祖仲子也母杜氏後唐天成二年生於洛陽夾馬營赤光繞室異香經宿不散體有金色三日不變既長容貌雄偉器度豁如識者知其非常人學騎射輒出人上嘗試惡馬不施銜勒馬逸上城斜道額觸門楣墜地人以為首必碎太祖徐起更追馬騰上一無所傷又嘗與韓令坤博土室中雀鬬戶外因競起掩雀而室隨壞漢初漫遊無所遇舍襄陽僧寺有老僧善術數顧曰吾厚贐汝北往則有遇矣會周祖以樞密使征李守真應募居帳下廣順初補東西班行首拜滑州副指揮世宗尹京轉開封府馬直軍使世宗即位復典禁兵北漢來寇世宗率師禦之戰于高平將合指揮樊愛能等先遁軍危太祖麾同列馳馬衝其鋒漢兵大潰乘勝攻河東城焚其門左臂中流矢世宗止之還拜殿前都虞候領嚴州刺史三年春從征淮南首敗萬衆于渦口斬兵馬都監何延錫等南唐節度皇甫暉姚鳳衆號十五萬塞清流關擊走之追至城下暉曰人各為其主願成列以決勝負太祖笑而許之暉整陳出太祖擁馬項直入手刃暉中腦並姚鳳禽之宣祖率兵夜半至城下傳呼開門太祖曰父子固親啓閉王事也詰旦乃得入韓令坤平揚州南唐來援令坤議退世宗命太祖率兵二千趨六合太祖下令曰揚州兵敢有過六合者斷其足令坤始固守太祖尋敗齊王景達于六合東斬首萬餘級還拜殿前都指揮使尋拜定國軍節度使四年春從征壽春拔連珠寨遂下壽州還拜義成軍節度檢校太保仍殿前都指揮使冬從征濠泗為前鋒時南唐寨于十八里灘世宗方議以橐駝濟師而太祖獨躍馬截流先渡麾下騎隨之遂破其寨因其戰艦乘勝攻泗州下之南唐屯清口太祖從世宗翼淮東下夜追至山陽俘唐節度使陳承昭以獻遂拔楚州進破唐人于迎鑾江口直抵南岸焚其營柵又破之于瓜步淮南平唐主畏太祖威名用間於世宗遣使遺太祖書餽白金三千兩太祖悉輸之內府間乃不行五年改忠武軍節度使六年世宗北征為水陸都部署及莫州先至瓦橋關降其守將姚內斌戰却數千騎關南平世宗在道閲四方文書得韋囊中有木三尺餘題云點檢作天子異之時張永德為點檢世宗不豫還京師拜太祖檢校太傅殿前都點檢以代永德恭帝即位改歸德軍節度檢校太尉七年春北漢結契丹入寇命出師禦之次陳橋驛軍中知星者苗訓引門吏楚昭輔視日下復有一日黑光摩蕩者久之夜五鼓軍士集驛門宣言策點檢為天子或止之衆不聽遲明逼寢所太宗入白太祖起諸校露刃列于庭曰諸軍無主願策太尉為天子未及對有以黃衣加太祖身衆皆羅拜呼萬歲即掖太祖乘馬太祖攬轡謂諸將曰我有號令爾能從乎皆下馬曰唯命太祖曰太后主上吾皆北面事之汝輩不得驚犯大臣皆我比肩不得侵凌朝廷府庫士庶之家不得侵掠用令有重賞違即孥戮汝諸將皆載拜肅隊以入副都指揮使韓通謀禦之王彥升遽殺通於其第太祖進登明德門令甲士歸營乃退居公署有頃諸將擁宰相范質等至太祖見之嗚咽流涕曰違負天地今至于此質等未及對列校羅彥瓌按劍厲聲謂質等曰我輩無主今日須得天子質等相顧計無從出乃降階列拜召文武百僚至晡班定翰林承旨陶穀出周恭帝禪位制書于袖中宣徽使引太祖就庭北面拜受已乃掖太祖升崇元殿服衮冕即皇帝位遷恭帝及符后于西宮易其帝號曰鄭王而尊符后為周太后建隆元年春正月乙巳大赦改元定有天下之號曰宋賜內外百官軍士爵賞貶降者復流配者釋放父母該恩者封贈遣使遍告郡國丙午詔諭諸鎮將帥戊申賜書南唐贈韓通中書令命以禮收葬己酉遣官告祭天地社稷復安州華州兗州為節度辛亥論翊戴功以周義成軍節度使殿前都指揮使石守信為歸德軍節度使侍衛親軍馬步軍副都指揮使江寧軍節度使侍衛親軍馬軍都指揮使高懷德為義成軍節度使殿前副都點檢武信軍節度使侍衛親軍步軍都指揮使張令鐸為鎮安軍節度使侍衛親軍馬步軍都虞候殿前都虞候王審琦為泰寧軍節度使殿前都指揮使虎捷右廂都虞候張光翰為江寧軍節度使侍衛親軍馬軍都指揮使龍捷右廂都指揮使趙彥徽為武信軍節度使餘領軍者並進爵壬子賜宰相樞密諸軍校襲衣犀玉帶鞍馬有差癸丑放南唐降將周成等歸國乙卯遣使分振諸州丁巳命周宗正郭祀周陵廟仍以時祭享己未宰相表請以二月十六日為長春節癸亥以周天雄軍節度使魏王符彥卿守太師雄武軍節度使王景守太保太原郡王定難軍節度使守太傅西平王李彝殷守太尉荊南節度使高保融守太傅餘領節鎮者並進爵甲子賜皇弟殿前都虞候匡義名光義己巳立太廟鎮州郭崇報契丹與北漢軍皆遁二月乙亥尊母南陽郡夫人杜氏為皇太后以周宰相范質依前守司徒兼侍中王溥守司空兼門下侍郎同中書門下平章事魏仁浦為尚書右僕射兼中書侍郎同中書門下平章事樞密使吳廷祚同中書門下二品丙戌長春節賜羣臣衣各一襲三月乙巳改天下郡縣之犯御名廟諱者丙辰南唐主李景吳越王錢俶遣使以御服錦綺金帛來賀宿州火遣使恤災壬戌定國運以火德王色尚赤臘用戌癸亥命武勝軍節度使宋延渥等率舟師巡江徼是春均房商洛鼠食苗夏四月癸酉竇儼上二舞十二樂曲名樂章乙酉幸玉津園遣使分詣京城門賜饑民粥丙戌浚蔡河癸巳昭義軍節度使李筠叛遣歸德軍節度石守信討之五月己亥朔日有食之庚子遣昭化軍節度使慕容延釗彰德軍節度使王全斌將兵出東道與守信會討李筠壬寅竇儼上太廟舞曲名癸卯石守信敗李筠于長平甲辰命諸道進討丙午幸魏仁浦第視疾己酉西京作周六廟成遣官奉遷丁巳詔親征以樞密使吳廷祚留守上都都虞候光義為大內都點檢命天平軍節度使韓令坤屯兵河陽己未發京師丁卯石守信高懷德破筠衆于澤州禽僞節度范守圖殺北漢援兵之降者數千人筠遁入澤州戊辰王師圍之六月癸酉有星赤色出心辛未拔澤州筠赴火死命埋胔骼釋河東相衛融禁剽掠甲申免澤州今年租有星赤色出太微垣歷上相乙酉伐上黨丁亥筠子守節以城降赦之上如潞辛卯大赦減死罪免附潞三十里今年租録陳歿將校子孫丁夫給復三年甲午永安軍節度使折德扆破北漢沙谷寨秋七月戊申上至自潞壬子幸范質第視疾甲子遣工部侍郎艾穎拜嵩慶陵乙丑南唐進白金賀平澤潞丁卯南唐進乘輿御服物八月戊辰朔御崇元殿行入閣儀辛未遣郭饗周廟壬申復貝州為永清軍節度甲戌命宰相禱雨辛巳以周武勝軍節度使侯章為太子太師壬午以光義領泰寧軍節度依前殿前都虞候甲申立琅琊郡夫人王氏為皇后戊子南唐進賀平澤潞金銀器羅綺以千計九月壬寅昭義軍節度使李繼勳焚北漢平遙縣癸卯三佛齊國遣使貢方物丙午奉玉冊諡高祖曰文獻皇帝廟號僖祖高祖妣崔氏曰文懿皇后曾祖曰惠元皇帝廟號順祖曾祖妣桑氏曰惠明皇后祖曰簡恭皇帝廟號翼祖祖妣劉氏曰簡穆皇后皇考曰武昭皇帝廟號宣祖己酉幸宜春苑中書舍人趙逢坐從征避難貶房州司戶參軍己未淮南節度李重進以揚州叛遣石守信等討之甲子歸太原俘冬十月丁卯朔賜內外文武官冬衣有差壬申定縣為望緊上中下令三年一注壬午河決厭次乙酉晉州兵馬鈐轄荊罕儒襲北漢汾州死之龍捷指揮石進二十九人坐不救棄市丁亥詔親征揚州以都虞候光義為大內都部署樞密使吳廷祚權上都留守戊子詔諸道長二有異政衆舉留請立碑者委參軍驗實以聞庚寅發京師十一月丁未師傅揚州城拔之重進盡室自焚戊申誅重進黨揚州平命諸軍習戰艦于迎鑾南唐主懼甚其臣杜著薛良因詭迹來奔帝疾其不忠斬著下蜀市配良廬州牙校己酉振揚州城中民人米一斛十歲以下者半之脅隸為軍者賜衣屨遣還庚戌給攻城役夫死者人絹三匹復三年乙卯南唐主遣使來犒師庚申遣其子從鎰來朝十二月己巳駕還丁亥上至自揚辛卯泉州節度使留從效稱藩二年春正月丙申朔上詣太后宮門稱慶庚子占城國王遣使來朝壬寅幸造船務觀習水戰戊申以揚州行宮為建隆寺太僕少卿王承哲坐舉官失實責授殿中丞壬子商州鼠食苗詔免賦謂宰臣曰比命使度田多邀功弊民當慎其選以見朕意丁巳導蔡水入潁己未遣郭饗周廟靈武節度使馮繼業獻馬五百橐駝百野馬二甲子澤州刺史張崇詁坐黨李重進棄市二月丙寅幸飛山營閲炮車壬申疏五丈河癸酉有司奏進士合格者十一人荊南高保勗進黃金什器甲戌幸城南觀修水匱丁丑南唐進長春節御衣金帶及金銀器己卯賜天雄軍節度符彥卿粟禁春夏捕魚射鳥己丑定竊盜律三月丙申內酒坊火酒工死者三十餘人乘火為盜者五十人擒斬三十八人餘以宰臣諫獲免酒坊使左承規副使田處巖以酒工為盜坐棄市閏月己巳幸玉津園謂侍臣曰沉湎非令儀朕宴偶醉恆悔之壬辰南唐進謝賜生辰金器羅綺丁丑金商房三州饑振之癸未幸迎春苑宴射夏四月癸巳朔日有食之壬寅詔郡國置前代帝王賢臣陵冢戶己酉無棣男子趙遇詐稱皇弟伏誅己未商河縣令李瑤坐贓杖死左贊善大夫申文緯坐失覺察除籍庚申班私鍊貨易鹽及貨造酒麴律五月癸亥朔以皇太后疾赦雜犯死罪已下乙丑天狗墮西南丙寅三佛齊國來獻方物丁丑以安邑解兩池鹽給徐宿鄆濟庚寅供奉官李繼昭坐盜賣官船棄市詔諸道郵傳以軍卒遞六月甲午皇太后崩于滋德殿己亥羣臣請聽政從之庚子以太后喪權停時享辛丑見百官於紫宸殿門壬子祈雨庚申釋服秋七月壬戌以皇太后殯不受朝辛未晉州神山縣谷水泛出鐵方圓二丈三尺重七千斤壬申以光義為開封府尹光美行興元尹己卯隴州進黃鸚鵡八月壬辰朔不視朝壬寅詔諸大辟送所屬州軍決判甲辰南唐主李景死子煜嗣遣使請追尊帝號從之己酉執易定節度使同平章事孫行友削官勒歸私第辛亥幸崇夏寺觀修三門女直國遣使來朝獻大名府永濟主簿郭顗坐贓棄市庚申周世宗實録成九月壬戌朔不御殿南唐遣使來進金銀繒綵甲子契丹解利來降荊南節度使高保勗遣其弟保寅來朝戊子遣使南唐賻祭冬十月癸巳南唐遣其臣韓熙載田霖來會皇太后葬丙申遣樞密承旨王仁贍賜南唐禮物戊戌禁邊民盜塞外馬辛丑丹州大雨雹丙午葬明憲皇太后于安陵十一月辛酉朔不視朝甲子太后祔廟己巳幸相國寺遂幸國子監癸酉沙州節度使曹元忠瓜州團練使曹延繼等遣使獻玉鞍勒馬十二月壬申回鶻可汗景瓊遣使來獻方物乙未李繼勳敗北漢軍俘遼州刺史傅廷彥弟勳來獻辛丑幸新修河倉庚戌畋于近郊癸丑遣使賜南唐吳越馬羊橐駝有差三年春正月庚申朔以喪不受朝賀己巳淮南饑振之庚午幸迎春苑宴射甲戌廣皇城詔郡國長吏勸民播種丙子瓜沙歸義節度使曹元忠獻馬庚辰女直國遣使只骨來獻詔郡國不得役道路居民癸未幸國子監二月丙辰復幸國子監遂如迎春苑宴從官庚寅詔文班官舉堪為賓佐令録者各一人不當者比事連坐甲午詔自今百官朝對須陳時政利病無以觸諱為懼乙未滑州節度使張建豐坐失火免官己亥更定竊盜律壬午上謂侍臣曰朕欲武臣盡讀書以通治道何如左右不知所對甲寅北漢寇潞晉守將擊走之三月戊午朔厭次霣霜殺桑壬戌三佛齊國遣使來獻癸亥禱雨丁卯幸太清觀遂幸開封尹後園宴射己巳大雨詔申律文諭郡國犯大辟者刑部審覆乙亥遣使賜南唐主生辰禮物丁丑女直國遣使來獻丁亥命徙北漢降人于邢洺夏四月乙未延州大雨雪趙衛二州旱丙申寧州大雨雪溝洫冰戊戌幸太清觀庚子回鶻阿督等來獻方物壬寅丹州雪二尺乙巳贈兄光濟為雍王弟光贊為夔王追冊夫人賀氏為皇后五月甲子幸相國寺禱雨遂幸迎春苑宴射乙亥海州火開太行運路癸未命使檢河北諸州旱甲申詔均戶役敢蔽占者有罪復幸相國寺禱雨乙酉廣大內齊博德相霸五州自春不雨以旱減膳徹樂六月辛卯振宿州饑癸巳吳廷祚以雄武軍節度使罷乙未賜酒國子監丁酉幸太清觀己亥減京畿河北死罪以下壬寅京師雨壬子蕃部尚波于等爭採造務以兵犯渭北知秦州高防擊走之乙卯幸迎春苑宴射黃陂縣有象自南來食稼秋七月庚申南唐遣其臣翟如璧謝賜生辰禮貢金銀錦綺千萬壬戌放南唐降卒弱者數千人歸國乙丑免舒州菰蒲新稅丁卯潞州大雨雹索內外軍不律者配沙門島己卯北漢捉生指揮使路貴等來降辛巳遣從臣十人檢河北旱癸未兗濟德磁洺五州蝝八月癸巳蔡河務綱官王訓等四人坐以糠土雜軍糧磔于市乙未用知制誥高錫言諸行賂獲薦者許告訐奴婢鄰親能告者賞詔注諸道司法參軍皆以律疏試判詔尚書吏部舉書判拔萃科九月庚午吐蕃尚波于等歸伏羌縣地壬申修武成王廟丙子占城國來獻禁伐桑棗冬十月乙酉朔賜百官冬服有差丙戌幸太清觀遂幸造船務觀習水戰己亥幸嶽臺命諸軍習騎射復幸玉津園辛丑以樞密副使趙普為樞密使辛亥畋近郊十一月癸亥禁奉使請托縣令考課以戶口增減為黜陟丙寅南唐遣其臣顧彝來朝丙子三佛齊國遣使李麗林等來獻高麗國遣李興祐等來朝己卯畋于近郊壬午賜南唐建隆四年曆十二月丙戌詔縣置尉一員理盜訟置弓手視縣戶為差戊戌蒲晉慈隰相衛六州饑振之庚子班捕盜令甲辰衡州刺史張文表叛是歲周鄭王出居房州乾德元年春正月甲寅朔不御殿乙卯發關西鄉兵赴慶州丁巳修畿內河隄己未遣使賜南唐吳越馬橐駝羊有差庚申遣山南東道節度使慕容延釗率十州兵以討張文表乙丑幸造船務觀造戰船甲戌詔荊南發水卒三千應延釗于潭己卯女直國遣使來獻二月壬辰周保權將楊師璠梟文表于朗陵市甲午慕容延釗入荊南高繼沖請歸朝得州三縣十七乙未克潭州辛亥澶滑衛魏晉絳蒲孟八州饑命發廩振之三月辛未幸金鳳園習射七發皆中符彥卿等進馬稱賀乃遍賜從臣名馬銀器有差壬申高繼沖籍其錢帛芻粟來上癸酉班新定律戊寅慕容延釗破三江口下嶽州克復朗州湖南平得州十四監一縣六十六夏四月旱甲申遍禱京城祠廟夕雨減荊南朗州潭州管內死罪一等鹵掠者給主乙酉遣使祭南嶽丁亥幸國子監遂幸武成王廟宴射玉津園庚寅出內錢募諸軍子弟鑿習戰池辛卯建隆應天曆成御製序壬辰賞湖南立功將士癸巳幸玉津園丙申兵部郎中曹匪躬棄市海陵鹽城屯田副使張藹除名並坐不法庚子荊南節度使高繼沖進助宴金銀羅紈柱衣屏風等物癸卯辰錦等州歸順甲辰詔疏鑿三門禁涇原邠慶等州補蕃人為邊鎮將夏西平王李彝興獻犛牛一乙巳幸玉津園閲諸軍騎射丙午免湖南茶稅禁峽州鹽井辛亥貸澶州民種食五月壬子朔禱雨京城甲寅遣使禱雨嶽瀆乙丑廣大內庚午給荊南管內符印癸酉幸玉津園六月乙酉免潭州諸縣無名配斂壬辰暑罷營造賜工匠衫履乙未詔荊南兵願歸農者聽丙申詔歷代帝王三年一饗立漢光武唐太宗廟己亥澶濮曹絳蝗命以牢祭庚子百官三上表請舉樂從之減左右仗千牛員丙午雨詔蠟祀廟社皆用戌臘一日己酉命習水戰于新池秋七月辛亥朔定州縣所置雜職承符廳子等名數甲寅以湖湘歿王事靳彥朗男承勳等三十人補殿直丙辰幸新池賜役夫錢遂幸玉津園丁巳安國軍節度使王全斌等率兵入太原境以俘來獻給錢米以釋之己未詔民有疾而親屬遺去者罪之癸亥湖南疫賜行營將校藥丁卯幸武成王廟遂幸新池觀習水戰己巳朗州賊將汪端寇州城都監尹重睿擊走之詔免荊南管內夏稅之半甲戌釋周保權罪乙亥詔繕朗州城免其管內夏稅丁丑分命近臣禱雨己卯班重定刑統等書八月壬午殿前都虞候張瓊以陵侮軍校史圭石漢卿等為所誣譖下吏瓊自殺丙戌遣給事中劉載朝拜安陵丁亥王全斌攻北漢樂平縣降之辛卯以樂平縣為平晉軍降卒千八百人為效順軍人賜錢帛壬辰詔九經舉人下第者再試癸巳女直國遣使獻名馬蠲登州沙門島民稅令專治船渡馬丙申北漢靜陽十八寨首領來降泉州陳洪進遣使來朝貢齊州河決京師雨己亥契丹幽州岐溝關使柴廷翰等來降癸卯宰相質率百官上尊號不允九月甲寅三上表請從之丙寅宴廣政殿始用樂丁卯責宣徽南院使兼樞密副使李處耘為淄州刺史戊辰女直國遣使獻海東青名鷹丙子禁朝臣公薦貢舉人賜南唐羊萬口磔汪端于朗州戊寅北漢引契丹兵攻平晉遣洺州防禦使郭進等救之冬十月庚辰詔州縣徵科置簿籍己亥畋近郊丁未吳越國王進郊祀禮金銀珠器犀象香藥皆萬計十一月乙卯荊南節度使高繼沖進郊祀銀萬兩甲子有事南郊大赦改元乾德百官奉玉冊上尊號曰應天廣運仁聖文武至德皇帝丙寅南唐進賀南郊尊號銀絹萬計丁卯賜近臣襲衣金帶器幣鞍馬有差乙亥畋近郊十二月庚辰殿前祗候李璘以父讎殺員僚陳友璘自首義而釋之辛巳開封府尹光義興元尹光美各益食邑賜功臣號宰相質溥仁浦並特進易封益食邑樞密使普加光祿大夫易功臣號文武臣僚各進階勳爵邑甲申皇后王氏崩辛卯罷登州都督己亥泉州陳洪進遣使貢白金千兩孔香茶藥皆萬計己巳南唐主上表乞呼名詔不允閏月己酉朔校醫官黜其藝不精者二十二人甲寅命近臣祈雪丁卯覆試拔萃科田可封宋白談利用等稱旨賜與有差辛未卜安陵于鞏縣乙亥折德扆敗北漢軍于府州城下禽其將楊璘以太常議奉赤帝為感生帝二年春正月辛巳諭郡國長吏勸農耕作有象入南陽虞人殺之以齒革來獻京師雨雪雷癸未幸迎春苑宴射甲申詔著四時聽選式回鶻遣使獻方物戊子質以太子太傅溥以太子太保仁浦仍尚書左僕射罷庚寅以趙普為門下侍郎同中書門下平章事李崇矩樞密使壬辰詔親試制舉三科不限官庶許直詣閣門進狀甲辰詔諸道獄詞令大理刑部檢詳或淹留差失致中書門下改正者重其罪乙巳幸玉津園宴射丁未詔縣令簿尉非公事毋至村落令録簿尉諸職官有耄耋篤疾者舉劾之二月戊申朔北漢遼州刺史杜延韜以城來降癸丑遣使振陝州饑導潩水入京丁巳治安陵隧壞役兵壓死者二百人命有司瘞恤庚午府州俘北漢衛州刺史楊璘來獻甲戌南唐進改葬安陵銀綾絹各萬計浚汴河三月辛巳幸教船池賜水軍將士衣有差還幸玉津園宴射乙未北漢耀州團練使周審玉等來降丁酉遣使祈雨于五嶽禁臣僚往來假官軍部送辛丑遣攝太尉光義奉冊寶上明憲皇太后諡曰昭憲皇后賀氏諡曰孝惠王氏諡曰孝明夏四月丁未朔策賢良方正直言極諫科博州判官穎贄中第戊申振河中饑己酉免諸道今年夏稅之無苗者乙卯葬昭憲皇太后孝明皇后于安陵乙丑始置參知政事以兵部侍郎薛居正呂餘慶為之己巳靈武饑轉涇粟以餉壬申祔二后于別廟徙永州諸縣民之畜蠱者三百二十六家于縣之僻處不得復齒於鄉五月己卯知制誥高錫坐受藩鎮賂貶萊州司馬辛巳宗正卿趙礪坐贓杖除籍癸未幸玉津園宴射六月己酉以光義為中書令光美同中書門下平章書子德昭貴州防禦使庚申幸相國寺遂幸教船池玉津園辛未河南北及秦諸州蝗惟趙州不食稼秋七月乙亥春州暴水溺民庚辰郃陽雨雹辛巳幸玉津園還幸新池觀習水戰辛卯詔翰林學士陶穀竇儀等舉堪為藩郡通判者各一人不當者連坐九月甲戌朔周易博士奚嶼責乾州司戶庫部員外王貽孫責左贊善大夫並坐試任子不公戊子延州雨雹乙未幸北郊觀稼辛丑太子太傅質薨壬寅潘美等克郴州冬十月戊申周紀王熙謹薨輟視朝十一月甲戌命忠武軍節度使王全斌為西川行營前軍兵馬都部署武信軍節度崔彥進副之將步騎三萬出鳳州道江寧軍節度使劉光義為西川行營前軍兵馬副都部署樞密承旨曹彬副之將步騎二萬出歸州道以伐蜀乙亥宴西川行營將校于崇德殿示川峽地圖授攻取方略賜金玉帶衣物各有差壬辰畋近郊十二月乙巳釋廣南郴州都監陳琄等二百人戊申劉光義拔夔州蜀節度高彥儔自焚丁巳蠲歸峽秋稅辛酉王全斌克萬仞燕子二寨下興州連拔石圌等二十餘寨甲子光義拔巫山等寨斬蜀將南光海等八千級禽其戰櫂都指揮袁德宏等千二百人全斌先鋒史進德敗蜀人于三泉寨禽其節度使韓保正李進等南唐進銀二萬兩金銀器皿數百事庚午詔招復山林聚匿辛未畋北郊
