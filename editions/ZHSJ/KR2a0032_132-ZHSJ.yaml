body:
  text: 宋史卷一百三十二志第八十五樂七樂章一郊祀祈穀雩祀五方帝感生帝建隆郊祀八曲降神高安在國南方時維就陽以祈帝祉式致民康豆籩鼎俎金石絲簧禮行樂奏皇祚無疆皇帝升降隆安步武舒遲陞壇肅祗其容允若于禮攸宜奠玉幣嘉安嘉玉制幣以通神明神不享物享于克誠奉俎豐安笙鏞備樂繭栗陳牲乃迎芳俎以薦高明酌獻禧安丹雲之爵金龍之杓挹于尊罍是曰清酌飲福禧安潔茲五齊酌彼六尊致誠斯至率禮彌敦以介景福永隆後昆重熙累洽帝道攸尊亞獻終獻正安謂天蓋高其聽孔卑聞樂歆德介以福禧送神高安倏兮而來忽兮而迴雲馭杳邈天門洞開咸平親郊八首降神高安圜丘何方在國之陽禮神合祭運啟無疆祖考來格籩豆成行其儀肅肅降福穰穰皇帝升降隆安禮備樂成乾健天行帝容有穆佩玉鏘鳴奠玉幣嘉安定位毖祀告于神明嘉玉量幣享于克誠奉俎豐安有牲斯純有俎斯陳進于上帝昭報深仁酌獻禧安大報于帝盛德升聞醴齊良潔粢盛苾芬飲福禧安祀帝圜丘九州獻力禮行于郊百神受職靈祗格思享我明德天鑒孔章玄祉昭錫亞獻終獻正安羽籥云罷干戚載揚接神有恪錫羨無疆送神高安神駕來思風舉雲飛神馭歸止天空露晞景祐親郊三聖並侑二首奠幣廣安千齡啟運三后在天嘉壇並侑億萬斯年酌獻彰安皇基締構帝系靈長躬薦鬱鬯子孫保昌常祀二首太祖配位奠幣定安翕受駿命震疊羣方侑祀上帝德厚流光酌獻英安誕受靈符肇基丕業配享潔尊永隆萬葉元符親郊五首餘同咸平凡闕者皆用舊詞降神景安六變辭同無為靡遠深厚廣圻祭神恭在弁冕袞衣粢盛豐美明德馨輝以祥以佑非眇專祈升降乾安罍洗飲福並奏神靈擁衞景從雲隨玉色溫粹天步舒遲周旋陟降皇心肅祗千靈是保百福攸宜退文舞迎武舞正安左手執籥右手秉翟進旅退旅萬舞有奕徹豆熙安陟彼郊丘大祀是承其豆孔庶其香始升上帝時歆以我齊明卒事而徹福祿來成送神景安馨遺八尊器空二簋至祝至虔穹祗貺祉政和親郊三首皇帝升降乾安因山為高爰陟其首玉趾躩如在帝左右帝謂我王予懷仁厚眷言顧之永綏九有配位酌獻大寧於穆文祖妙道九德默契靈心肇基王迹啟佑後人垂裕罔極合食昭薦孝思維則於皇順祖積德累祥發源深厚不耀其光基天明命厥厚克昌是孝是享申錫無疆高宗建炎初國步尚艱乃詔有司天帝地祇及他大祀先以時舉太常尋奏近已增募樂工干羽簨虡亦備始循舊禮用登歌樂舞其祀昊天上帝降神用景安圜鍾為宮三奏蒐講上儀式修毖祀日吉辰良禮成樂備風馭雲旗聿來歆止嘉我馨德介茲繁祉黃鍾為角一奏我將我享涓選休成執事有恪惟寅惟清樂既六變肅雍和鳴高高在上庶幾是聽太簇為徵一奏禮崇禋祀備物薦誠昭格穹昊明德惟馨風馬雲車肸蠁居歆申錫無疆賚我思成姑洗為羽一奏惟天為大物始攸資恭承禋祀以報以祈神不可度日監在茲有馨明德庶其格思皇帝盥洗正安靈承上帝厲意專精設洗于阼罍水以清盥以致潔感通神明無遠弗屆其饗茲誠升壇正安皇矣上帝神格無方一陽肇復典祀有常豆登豐潔薦德馨香棐忱居歆降福穰穰上帝位奠玉幣嘉安治極發聞不瑕有芬嘉玉陳幣神屆欣欣誠心昭著欽恭無文以妥以侑篤祜何垠太祖位奠幣定安茫茫蒼穹孰知其紀精意潛通雖遠而邇量幣薦誠有實斯篚睠然顧之永錫繁祉皇帝還位正安典祀有常昭事上帝奉以告虔逮迄奠幣鍾鼓既設禮儀既備神之格思恭承貺賜捧俎豐安祀事孔明禮文惟楙爰潔犧牲載登俎豆或肆或將無聲無臭精祲潛通永綏我后上帝酌獻嘉安氣萌黃鍾萬物資始欽若高穹吉蠲時祀神筴泰元增授無已羣生熙熙函蒙繁祉太祖位酌獻英安赫赫翼祖受命于天德邁三代威加八埏陟配上帝明禋告虔流光垂裕於萬斯年文舞退武舞進正安大德曰生陰陽寒暑樂舞形容干戚籥羽一弛一張退旅進旅神安樂之祉錫綿宇亞終獻文安惟聖普臨順皇之德典禮有彝享祀不忒籩豆靜嘉降登飭神具醉止景貺咸集徹豆肅安內心齊誠外物蠲潔神來迪嘗俎豆既徹燕及羣生靡或夭閼降福穰穰時萬時億送神景安於赫上帝乘龍御天惟聖克事明饗斯虔薦豆云徹靈猋且旋載錫休祉其惟有年望燎正安靈承上帝精意感通馨香旁達粢盛既豐登降有儀祀備樂終神之聽之福祿來崇紹興十三年初舉郊祀命學士院製宮廟朝獻及圜壇行禮登門肆赦樂章凡五十有八至二十八年以臣僚有請改定於是御製樂章十有三及徽宗元御製仁宗廟樂章一共十有四篇餘則分命大臣與兩制儒館之士一新撰述幷懿節別廟樂曲凡七十有四俱彙見焉其祀圜丘皇帝入中壝乾安帝出于震巽惟齊明律曰姑洗以示潔清我交于神蠲意必精既盥而往祈鑒斯誠降神景安陽動黃宮日旋南極天門蕩蕩百神受職爰熙紫壇熉黃殊色神哉沛來蓋親有德盥洗乾安帝顧明德監于克誠齊戒滌濯式示潔清郊丘合祛享意必精既盥而薦熙事備成升壇乾安帝臨崇壇媼神其從稽古合袪並侑神宗升階奠玉誠意感通貺施鼎來受福無窮昊天上帝位奠玉幣嘉安御製上穹昊天日星垂曜照臨下土王國是保維玉與帛寅恭昭報永左右之欽若至道皇地祇位奠玉幣嘉安御製至哉坤厚隤然止靜柔載動植資始成性玉光幣色璨若其映式恭禋祀有邦之慶太祖皇帝位奠幣廣安御製明明翼祖並侑泰壇肇造綿宇王業孔艱表正封略上際下蟠躬以大報亦止于燔太宗皇帝位奠玉幣化安御製赫赫巍巍及時純熙昊天成命后則受之登邁邃古光被聲詩有幣陟配孫謀所貽降壇乾安躬展盛儀天步逡巡樂備禮交嘉玉既陳神方安坐薦祉紛綸陟降有容皇心載勤還位乾安克昭王業命成昊天泰畤禋燎八陛惟圓肅然威儀登降周旋是謂精享神監吉蠲奉俎豐安至大惟天云何稱德展誠致薦牲用博碩誠以牲寓帝由誠格居歆降祥時萬時億再詣盥洗乾安帝出于震巽惟潔齊神明其德迺稱禋柴惟茲吉蠲昭事聿懷重盥而祀敷錫孔皆再升壇與初升同惟易奠玉作奠酌昊天上帝位酌獻禧安御製謁款壇陛祗祀泰禋丘圜自然可格至神桂尊登酌嘉薦芳新靡福菲眇敷佑下民皇地祇位酌獻光安御製厚德光大承元之明茲潛莩吹升于昭清冰天桂海咸資化成恭酌彝醪報本惟精太祖皇帝位酌獻彰安御製於赫皇祖創業立極肅肅靈命蕩蕩休德嘉觴精潔雅奏金石丕顯神謨惟後之則太宗皇帝位酌獻韶安御製丕鑠帝宗復受天命羣陰猶黷一戎大定奠鬯斯馨功歌在詠佑啟後人文軌蚤正還位乾安肆類上帝懷柔百神秸既設珪幣既陳精誠潛交已事而竣佑我億載基圖日新入小次乾安恭展美報聿修上儀禮樂和節登降適宜德焉斯親神靡不娭海內承福式固邦基文舞退武舞進正安泰元尊臨富媼繁祉於皇祖宗既昭格止奏舞象功靈其有喜永言孝思盡善盡美亞獻正安陽丘其高神祇並位既奠厥玉既奉厥醴亦有嘉德克相毖祀旨酒載爵以成熙事終獻同止易再酌為三酌出小次位乾安爰熙紫壇天地並貺來燕來寧畢陳鬱鬯承神至尊精意所鄉告靈饗矣祉福其暢詣飲福位乾安帝臨崇壇媼神其從祖宗並歆福祿攸同兵寢刑措時和歲豐其膺受之將施無窮降壇同止易將作以飲福禧安八音克諧降神出祇風馬雲車陟降在茲錫我純嘏我應受之一人有慶燕及羣黎還位乾安帝出于震孝奏上儀燔燎羶薌神徠燕娭肅若舊典罔或不祗既右饗之翕受蕃釐徹豆熙安燎薌既升焫膋以潔于豆于登焄蒿有飶紫幄熉黃神其安悅將以慶成薄言盍徹送神景安九霄眇邈神不可求何以降之監德之修三獻備成神不可留何以送之保天之休望燎乾安謂天蓋高陽噓而生日月列宿皆天之神肆求厥類與陽俱升視燎于壇以終其勤望瘞乾安謂地蓋厚陰翕而成社稷羣望皆地之靈肆求厥類與陰俱凝視瘞于坎以終其勤還大次乾安舞具八佾樂備六成大矣孝熙厲意專精已事而竣回軫還衡我應受之以莫不增還內采茨五輅鳴鑾八神警蹕天官景從莫不祗栗祲威盛容昭哉祖述祚我無疆叶氣充溢寧宗郊祀二十九首皇帝入中壝乾安合祀丘澤登侑祖宗顧諟惟精靈承惟恭有嚴皇儀有莊帝容監于克誠肅肅雍雍降神景安圜鍾為宮天門蕩蕩雲車陰陰百神咸秩三靈顧歆神哉來娭神哉溥臨饗時宋德翼翼小心黃鍾為角華蓋既動紫微洞開星樞周旋日車徘徊靈兮顧佑靈兮沛來載燕載娭式時壇垓太簇為徵泰尊媼釐祖功宗德辰躔陪營嶽瀆受職神哉來下神哉來格饗德惟馨留虞嘉席姑洗為羽金石宣昭羽旄紛綸潔火夕照明水夜陳娭哉惟靈娭哉惟神風馬招搖惟德之親皇帝盥洗乾安皇帝儉勤盥用陶瓦禮神頌祗奠幣獻斝月鑑陰肅醴液融冶挹彼注茲禮無違者升壇乾安崇臺穹窿高靈下墮慶陰彷彿從坐峨宵昇于丘時通權火維天之命百祿是荷降壇帝饗于郊一精二純紫觚陟降嘉玉妥陳神方留娭瑞貺紛綸申錫無疆螽斯振振還位肅肅禮度鋗鋗宮奏天行徐謐皇儀昭懋光連重璧物備簋豆於皇以饗無聲無臭尚書奉俎列俎孔陳嘉籩維實鼎煁陽燧玉流星液我牲既碩我薦既苾神監下昭安坐翔吉再詣盥洗帝登初觴禮嚴再盥精明顯昭齊顒洞貫靈娭留俞神光炳煥我宋受福永壽於萬再升壇紫壇嶽立神光夜燭有儼旒采有鸞佩玉霄垠顧佑祖宗熙穆對越不忘俾爾戩穀降壇乾安天容澄謐景氣晏和瓚斝薦醇鋗璆叶歌帝降庭止夜其如何神助之休宜爾衆多還位乾安甘露流英卿雲舒采靈俞有喜神光晻曖穆穆來蒞洋洋如在帝用居歆澤及四海入小次乾安聽惟饗德監惟棐忱顧諟思明靈承思欽永言端蒞肅對下臨上帝是皇毋貳爾心文舞退武舞進正安羽籥陳容干戚按節德閑而泰功勞而決虞我神祇揚我謨烈盡美盡善福流有截亞獻正安帝臨中壇神從八陛華玉展瑞明馨薦醴亦有嘉德克相盛禮獻茲重觴降福瀰瀰終獻正安敬事天地升侑祖宗陳盥于三介觴之重秉德翼翼有來雍雍相予祀事福嘏日溶出小次乾安孝奏展成熙儀畢薦光流桂俎祥衍椒奠風管晨凝雲容天轉拜貺于郊右序詒燕詣飲福位乾安所饗惟清所欽惟馨靈喜留俞天景窈冥福祿來成福祿來寧皇用時斂壽我慈庭飲福禧安瓚斝觩觥罍氤氳有醴惟香有酒惟欣肸蠁豐融懿懿芬芬我龍受之如川如雲降壇乾安天錫多祉皇受五福言瞻瑤壇迄奉瑄玉昭星炳燿元氣回復帝儀載旋有嘉穆穆還位乾安璇圖天深鼎文日輝慶流皇家象炳紫微乾回冕旒雲煥袞衣何千萬年式于九圍尚書徹豆熙安蘭豆既升簠簋既登禮備俎實饗貴牲時乃告徹器用畢興祚我皇基介福是膺送神景安神輔有德來燕來娭禮薦熙成三靈逆釐神饗有道言旋言歸福祉咸蒙百世本支詣望燎位乾安莫神乎天陽噓而生日月星辰皆乾之精肆求厥類與陽俱升燎于壇展也大成詣望瘞位乾安地載萬物陰翕而成山嶽河瀆皆坤之靈克肖其象與陰俱凝瘞于坎思求厥成還大次乾安福方流胙祈方欽柴鹵簿載肅球架允諧帝祉具臨皇靈允懷遄御于次降福孔皆還內乾安八神呵蹕千官景從回軫還衡祲威盛容妥飾芝鳳御朝雲龍歸壽慈闈敷時民雍景祐上辛祈穀仁宗御製二首太宗配位奠幣仁安天祚有開文德來遠祈穀日辛侑神禮展酌獻紹安於穆神宗惟皇永命薦醴六尊聲歌千詠紹興祈穀三首降神盥洗升壇還位及上帝奠玉幣奉俎並同圜丘太宗位奠幣宗安於穆思文克配上帝涓選休成遵揚嚴衞祗