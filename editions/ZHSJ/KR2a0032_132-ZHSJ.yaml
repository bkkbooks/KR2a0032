與我居孰不可來肸蠁斯須象服龍駕淵淵鼓桴蓀不汝多多汝意孚太簇徵樂哉帝居逝留無常爾信我宅爾中我鄉乃眷茲土於赫君王翩然下來去未遽央姑洗羽澹兮撫琴啾兮吹笙神之未來肅穆以聽繽紛羽旄姣服在中神既來止亦無惰容升殿正安民生地中動作食息與我周旋莫匪爾極捕鰈東海搴茅南山彼勞如何矧升降間黃帝奠玉幣嘉安萬櫝之寶一絇之絲孕之育之誰為此施歸之后神神曰何為不宰之功蕩然四垂有熊氏位奠幣嘉安維有熊氏以土勝王其後皆沿茲德用壯黼黻幅舄裳衣是創幣之元纁對此昭亮奉俎豐安王曰欽哉無愛斯牲登我元祀亦有皇靈以將以享或剝或烹大夫之俎天子之誠黃帝酌獻祐安黍以為翁鬱以為婦以侑元功以酌大斗伊誰歆之皇皇帝后伊誰嘏之天子萬壽有熊氏酌獻祐安昔在緜邈有人公孫登政撫辰節用良勤所蓄既大所行宜遠載其華罇從以簫管亞終獻文安羽觴更陳厥味清涼飲之不煩又有蔗漿夜未艾止明星浮浮願言妥靈靈兮淹留送神高安靈不肯留沛兮將歸玉節猋逝翠旗並馳顧瞻佇立悵然佳期蹇千萬年無斁人斯白帝降神高安圜鍾為宮白藏啟序庶彙向成有嚴禋祀用答幽靈風馬雲車來燕來寧洋洋在上休福是承黃鍾角素精肇節金行固藏氣沖炎伏明河翻霜功收有年禮薦有章祇越眇冥鴻基永昌太簇徵昊天之氣揫斂萬彙涓日潔齊有嚴厥祀有牲維肥有酒維旨神之燕娭錫茲福祉姑洗羽執矩斯兌實惟素靈受職儲休萬寶以成饗于西郊奠玉陳牲侑以雅樂來歆克誠升殿正安素猋諧律西顥墮靈肇復元祀晨煬肅清下土層陔嘉薦芳馨以御蕃祉介我西成白帝奠玉幣嘉安惟時素秋肇舉元祀禮備樂作降登有數洋洋在上神既來止神之格思錫我繁祉少昊氏位奠幣嘉安西顥肅清羣生茂遂有嚴報典孔明祀事珪幣告虔神靈燕喜賚我豐年以錫民祉奉俎豐安洽禮既陳諧音具舉有滌斯牲孔碩為俎維帝居歆介我稷黍樂哉有秋繄神之祜白帝酌獻祐安徂商肇祀靈蓋孔饗恭承嘉禧湛澹秬鬯監此馨香靈其安留疇惠下民匪靈之休少昊氏位酌獻祐安沆碭西顥功載萬世乘金宅兌侑我明祀嘉觴布蘭牲玉潔精神之燕虞肅用有成亞終獻文安肅成萬物泬寥其秋惟茲祀事戾止靈斿酌獻具舉典禮是求冀福斯民黍稷盈疇送神高安沆碭白藏順成萬寶有來德馨於昭神妥露華晨晞飈馭聿還介我嗣歲澤均幅員黑帝降神高安圜鍾為宮吉日壬癸律中應鍾國有故常北郊迎冬乃蕆祀事必祗必恭明默雖異感而遂通黃鍾為角良月盈數四氣推遷帝於是時典司其權高靈下墮降祉幅員神之聽之祀事罔愆太簇為徵北方之神執權司冬三時務農於焉告功禮備樂作歸功于神風馬來游永錫斯民姑洗為羽天地閉塞盛德在水黑精之君降福羨祉洋洋在上若或見之齊莊承祀其敢斁思升殿正安昧爽昭事煌煌露光滌溉蠲潔容儀肅莊牲肥酒旨薦此芬芳降陟有序禮無越常黑帝奠玉幣嘉安晨曦未升天宇肅穆祗若元祀將以幣玉神之格思三獻茅縮明靈懌豫下土是福高陽氏位奠幣嘉安飈馭雲蓋神之顧歆丕昭禮容發揚樂音祀事既舉仰當神心申以嘉幣式薦誠諶奉俎豐安辰牡孔碩奉牲以告祕祝非祈豐年宜報至意昭徹交乎神明降福穰穰用燕羣生黑帝酌獻祐安赫赫神游周流八極德馨上聞於焉來格不腆酒醴用伸悃愊神其歆之民用嚮德高陽氏酌獻祐安十月納禾民務藏蓋不有神休民罔攸賴孟冬之吉禮行不昧神降百祥昭著蓍蔡亞終獻文安萬彙揫斂時惟冬序蠢爾黎氓入此室處酌獻告神禮以時舉賴此陰騭民有所怙送神高安神之戾止天門夜開禮備告成雲軿亟回旗纛晻靄萬靈喧豗獨遺祉福用澤九垓乾德以後祀感生帝十首降神大安和均玉管政協璿衡四序資始萬物含生皇猷允洽至德惟明為民祈福克致精誠太保行保安衣冠儼若步武有容公卿濟濟率禮惟恭罍洗正安昊天降康云何以報斯謀斯惟雍雍灌鬯身之潔兮神斯來止神之享兮民斯福矣奠玉幣慶安籩豆有踐玉帛斯陳神無常享享于精純奉俎咸安俎實具列明德惟馨肅容祗薦神其降靈酌獻崇安樂調鳳律酒浥犧尊至靈斯御盛德彌敦飲福廣安三陽戒律萬彙騰精既蘇昆蟲畢達勾萌具陳犧象式薦誠明錫以蕃祉永保咸平亞終獻文安大君有命祀典咸脩薦獻式淑慎優柔徹豆肅安以下二首政和中製奉承明祀惟羊惟牛卬盛于豆備陳庶羞鍾鼓喤喤神具醉止其徹嘉籩永綏福祉送神普安既臨下土復歸于天神之報貺受福無邊景祐祀感生帝二首宣祖配位奠幣皇安濬發長源粵惟始祖五運協圖萬靈來護酌獻肅安龍德而隱源流則長宜乎億祀侑享彌昌元符祀感生帝五首降神大安六變二儀交泰七政順行四序資始萬物含生皇朝創業盛德致平為民祈福潔此精誠初獻升降保安冕旒儼若步武有容公卿濟濟韶濩邕邕帝位酌獻樂和鳳律酒奠犧尊神明斯享禮盛難論亞終獻文安大君有命闕典咸脩帝歆明祀佑聖千秋送神普安俯臨下土迴復上天觸類而長荷福無邊帝位奠玉幣同前慶安禧祖奠幣同景祐皇安酌獻同景祐宣祖肅安奉俎同熙寧咸安紹興以後祀感生帝十六首降神大安圜鍾為宮炎精之神飛軿碧落駕以浮雲丹書赤雀禮備豆籩樂諧簫勺神具醉止佑我景鑠黃鍾為角宋德惟火神實司之上儀申蕆迎方重離瑤幣告潔秀華金支啾啾神龍來介繁禧太簇為徵於物司火於方峙南璇霄來下羽衞毿毿祠官祝釐聯珮合簪本支有衍則百斯男姑洗為羽惟神之安方解羽鑾赤旂霞曳從以炎官居歆嘉薦肸蠁靈壇神之格矣民訖多盤盥洗保安衝牙鏘鳴肅容專精交神之義罔敢弗誠設洗于阼罍水惟清盥以致潔感通神明升殿保安三陽交泰日新惟良大建厥祀茲報興王禮嚴陟降德薦馨香聿懷嘉慶降福穰穰感生帝位奠玉幣光安肅肅嚴祀神幽必聞騁駕臨饗將歆飶芬嘉玉陳幣欽恭無文永綏多祜國祚何垠僖祖位奠幣皇安於穆文獻景炎發祥啟茲皇運垂慶無疆篚幣有陳式昭肅莊神之格思如在洋洋奉俎咸安籩豆大房秩秩在列奉牲以告既全既潔樂均無爽牲醴攸設神兮燕娭霓旌孑孑感生帝位酌獻崇安盛德在火相我炎祚典祀有常牲玉維具風馬雲車翩翩來顧式蕃帝祉後昆有裕僖祖位酌獻肅安皇矣文獻開國有先德配感生對越在天練日得辛來止靈壇神其錫羨瑞應猗蘭文舞退武舞進正安苾苾芬芬神具醉止笙磬鏗鏘干旄旖旎鬷假無言神靈惟喜申錫蕃釐暨我孫子亞終獻文安偉炎厥初緣感而系慶衍式崇昭融有契樂功既諧觴獻斯繼歆類不違克昌百世徹豆肅安潔陳斯備昭格惟禋神歆以飫宰徹其餕清歌振曉叶氣流春永錫祚嗣以渥烝民送神大安豐祀孔飾肅來自天蘭尊既徹飈馭載遄騎雲縹緲聆樂流連惟邁惟顧降福緜緜望燎普安禮文既洽熏燎聿升嘉氣四塞丹誠上騰惟類之應惟福之興永熾天統億載靈承
