body:
  text: 宋史卷一百八十二志第一百三十五食貨下四鹽中元豐七年知滄州趙瞻請自大名府澶恩信安雄霸瀛莫冀等州盡榷賣以增其利纔半歲獲息錢十有六萬七千緡哲宗即位監察御史王巖叟言河北二年以來新行鹽法所在價增一倍既奪商賈之利又增居民之價以為息聞貧家至以鹽比藥伏惟河朔天下根本祖宗推此為惠願陛下不以損民為利而以益民為利復鹽法如故以為河北數百萬生靈無窮之賜會河北轉運使范子奇奏鹽稅欲收以十分遣范鍔商度巖叟復言臣在河北亦知商賈有自請於官乞罷榷買願輸倍稅主計者但知於商賈倍得稅緡以為利不知商賈將於民間復增賣價以為害也慶曆六年既不行三司榷買之法又不從轉運司增稅之請仁宗直謂朕慮河北軍民驟食貴鹽可令依舊是時計歲增幾六十萬緡仁宗豈不知為公家之利意謂藏之官不若藏之民今陛下即位之始宜法仁宗之意不宜以小利失人心也明年遂罷河北榷法仍舊通商六年提舉河北鹽稅司請令商賈販鹽於場務輸稅以及等戶保任給小引量道里為限即非官監鎮店聽以便鬻之鹽稅舊額五分者增為七分則鹽稅蓋已行焉紹聖中河北官復賣鹽繼詔如京東法元符三年崇儀使林豫言河北榷鹽未必敷前日稅額且契丹鹽益售慮啟邊隙明年給事中上官均亦以為言皆不果行宣和元年京畿四輔及滑州河陽所產地悉墾為田革盜刮煎鹽之弊知河陽王序以勸誘推賞三年大改鹽法舊稅鹽並易為鈔鹽凡未賣稅鹽鈔引及已請算或到倉已投暨未投者並赴榷貨務改給新法鈔引許通販已請舊法稅鹽貨賣者自陳更買新鈔帶賣已請鈔引毋得帶支初茶鹽用換鈔對帶之法民旅皆病然河北猶未及也至是併河北京東行之其在兩浙曰杭州場歲𡞰七萬七千餘石明州昌國東西兩監二十萬一千餘石秀州場二十萬八千餘石溫州天富南北監密鸚永嘉二場七萬四千餘石台州黃巖監一萬五千餘石以給本州及越處衢婺州天聖中杭秀溫台明各監一溫州又領場三而一路歲課視舊減六萬八千石以給本路及江東之歙州慶曆初制置司言比年河流淺涸漕運艱阻靡費益甚請量增江淮兩浙荊湖六路糶鹽錢下三司議三司奏荊湖已嘗增錢餘四路三十八州軍請斤增二錢或四錢詔俟河流通運復故既而江州置轉般倉益置漕船及傭客舟以運制置司因請六路五十一州軍斤增五錢民苦官鹽估高無以為食諸路皆言其不便久之韓絳安撫江南還亦極言之其後兩浙轉運使沈立李肅之奏本路鹽課緡錢歲七十九萬嘉祐三年纔及五十三萬而一歲之內私販坐罪者三千九十九人弊在於官鹽估高故私販不止而官課益虧請裁官估罷鹽綱令鋪戶衙前自趨山場取鹽如此則鹽善而估平人不肯冒禁私售官課必溢發運司難之立肅之固請試用其法二三年可見利害詔可立嘗論東鹽利害條亭戶倉場漕運之弊謂愛恤亭戶使不至困窮休息漕卒使有以為生防制倉場使不為掊克率斂絕私販減官估果能行此五者歲可增緡錢一二百萬集鹽策二十卷以進其言亭戶困乏尤甚然自皇祐以來屢下詔書輒及之命給亭戶官本皆以實錢其售額外鹽者給粟帛必良亭戶逋歲課久不能輸者悉蠲之所以存恤之意甚厚而有司罕有承順焉熙寧以來杭秀溫台明五州共領監六場十有四然鹽價苦高私販者衆轉為盜賊課額大失二年有萬奇者獻言欲撲兩浙鹽而與民乃遣奇從發運使薛向詢度利害神宗以問王安石對曰趙抃言衢州撲鹽所收課敵兩浙路抃但見衢湖可撲不知衢鹽侵饒信湖鹽侵廣德昇州故課可增如蘇常則難比衢湖今宜制置煎鹽亭戶及差鹽地人戶督捕私販般運以時嚴察拌和則鹽法自舉毋事改制五年以盧秉權發遣兩浙提點刑獄仍專提舉鹽事秉前與著作佐郎曾默行淮南兩浙詢究利害異時竈戶𡞰鹽與官為市鹽場不時償其直竈戶益困秉先請儲發運司錢及雜錢百萬緡以待償而諸場皆定分數錢塘縣楊村場上接睦歙等州與越州錢清場等水勢稍淡以六分為額楊村下接仁和之湯村為七分鹽官場為八分並海而東為越州餘姚縣石堰場明州慈溪縣鳴鶴場皆九分至岱山昌國又東南為溫州雙穗南天富北天富場為十分蓋其分數約得鹽多寡而為之節自岱山以及二天富煉以海水所得為最多由鳴鶴西南及湯村則刮淋鹵十得六七鹽官湯村用鐵盤故鹽色青白楊村及錢清場織竹為盤塗以石灰故色少黃石堰以東近海水鹹故雖用竹盤而鹽色尤白秉因定伏火盤數以絕私𡞰自三竈至十竈為一甲而𡞰鹽地什伍其民以相幾察及募酒坊戶願占課額取鹽於官賣之月以錢輸官毋得越所酤地而又嚴捕盜販者罪不至配雖杖者皆同妻子遷五百里仍益開封府界京東兵各五百人防捕時惟杭越湖三州格新法不行發運司劾奏虧課皆獄治王安石為神宗言捕鹽法急可以止刑久之乃詔兩浙提舉鹽事司諸州虧課者未得遽劾以增虧及違法輕重分三等以聞七年以盧秉鹽課雖增刑獄實繁慮無辜即罪者衆徙其職淮南以江東漕臣張靚代之且體量其事靚言秉在事越州監催鹽償至有母殺子者詔劾其罪然竟免仍以增課擢太常博士升一資歲餘三司言兩浙漕司寬弛鹽息大虧命著作佐郎翁仲通更議措置元祐初言者論秉推行浙西鹽法務誅利以增課所配流者至一萬二千餘人秉坐降職兩浙鹽亭戶計丁輸鹽逋負滋廣二年詔蠲之後更積負無以償元符初察訪使以狀聞有司乃以朝旨不行右正言鄒浩嘗極疏其害明州鳴鶴場鹽課弗登撥隸越州宣和元年樓虉為明州請仍舊且於接近台州給舊鹽五七萬囊詔曰明州鹽場三昨以施置不善以鳴鶴一場隸越客始輻湊猶有二場積鹽以百萬計未見功緒此而不圖東欲取於越西欲取於台改令害法動搖衆情令狀析以聞其在淮南曰楚州鹽城監歲𡞰四十一萬七千餘石通州利豐監四十八萬九千餘石泰州海陵監如臯倉小海場六十五萬六千餘石各給本州及淮南之廬和舒蘄黃州無為軍江南之江寧府宣洪袁吉筠江池太平饒信歙撫州廣德臨江軍兩浙之常潤湖睦州荊湖之江陵府安復潭鼎鄂岳衡永州漢陽軍海州板浦惠澤洛要三場歲𡞰四十七萬七千餘石漣水軍海口場十一萬五千餘石各給本州軍及京東之徐州淮南之光泗濠壽州兩浙之杭蘇湖常潤州江陰軍天聖中通楚州場各七泰州場八海州場二漣水軍場一歲𡞰視舊減六十九萬七千五百四十餘石以給本路及江南東西荊湖南北四路舊幷給兩浙路天聖七年始罷凡鹽之入置倉以受之通楚州各一泰州三以受三州鹽又置轉般倉二一於真州以受通泰楚五倉鹽一於漣水軍以受海州漣水鹽江南荊湖歲漕米至淮南受鹽以歸東南鹽利視天下為最厚鹽之入官淮南福建兩浙之溫台明斤為錢四杭秀為錢六廣南為錢五其出視去鹽道里遠近而上下其估利有至十倍者咸平四年祕書丞直史館孫冕請令江南荊湖通商賣鹽緣邊折中糧草在京入納金銀錢帛則公私皆便為利實多設慮淮南因江南荊湖通商或至年額稍虧則國家折中糧草足贍邊兵中納金銀實之官庫且免和雇車乘差擾民戶冒寒涉遠借如荊湖運錢萬貫淮南運米千石以地里脚力送至窮邊則官費民勞何啻數倍詔吏部侍郎陳恕等議恕等謂江湖官賣鹽蓋近𡞰海之地欲息犯禁之人今若通商住賣官鹽立乏一年課額冕議遂寢至天禧初始募人入緡錢粟帛京師及淮浙江南荊湖州軍易鹽乾興元年入錢貨京師總為緡錢一百十四萬會通泰𡞰鹽歲損所在貯積無幾因罷入粟帛第令入錢久之積鹽復多明道二年參知政事王隨建言淮南鹽初甚善自通泰楚運至真州自真州運至江浙荊湖綱吏舟卒侵盜販鬻從而雜以沙土涉道愈遠雜惡殆不可食吏卒坐鞭笞徒配相繼而莫能止比歲運河淺涸漕輓不行遠州村民頓乏鹽食而淮南所積一千五百萬石至無屋以貯則露積苫覆歲以損耗又亭戶輸鹽應得本錢或無以給故亭戶貧困往往起為盜賊其害如此願權聽通商三五年使商人入錢京師又置折博務於揚州使輸錢及粟帛計直予鹽鹽一石約售錢二千則一千五百萬石可得緡錢三千萬以資國用一利也江湖遠近皆食白鹽二利也歲罷漕運糜費風水覆溺舟人不陷刑辟三利也昔時漕鹽舟可移以漕米四利也商人入錢可取以償亭戶五利也時范仲淹安撫江淮亦以疏通鹽利為言即詔知制誥丁度等與三司使江淮制置使同議皆謂聽通商恐私販肆行侵蠹縣官請敕制置司益漕船運至諸路使皆有二三年之蓄復天禧元年制聽商人入錢粟京師及淮浙江南荊湖州軍易鹽在通楚泰海真揚漣水高郵貿易者毋得出城餘州聽詣縣鎮毋至鄉村其入錢京師者增鹽予之并敕轉運司經畫本錢以償亭戶詔皆施行景祐二年諸路博易無利遂罷而入錢京師如故康定元年詔商人入芻粟陝西並邊願受東南鹽者加數與之會河北穀賤三司因請內地諸州行三說法亦以鹽代京師所給緡錢糴二十萬石止慶曆二年又詔入中陝西河東者持券至京師償以錢及金帛各半之不願受金帛者予茶鹽香藥惟其所欲而東南鹽利厚商旅皆願得鹽八年河北行四說法鹽居其一而並邊芻粟皆有虛估騰踴至數倍券至京師反為蓄賈所抑鹽百八斤舊售錢十萬至是六萬商人以賤估售券取鹽不復入錢京師帑藏益乏皇祐二年復入錢京師法視舊錢數稍增予鹽而並邊入中先得券受鹽者河東陝西入芻粟直錢十萬止給鹽直七萬河北又損為六萬五千且令入錢十萬於京師迺聽兼給謂之對貼自是入錢京師稍復故初天聖九年三司請榷貨務入錢售東南鹽以百八十萬三千緡為額後增至四百萬緡嘉祐中諸路漕運不足榷貨務課益不登於是即發運司置官專領運鹽公事治平中京師入緡錢二百二十七萬而淮南兩浙福建江南荊湖廣南六路歲售緡錢皇祐中二百七十三萬治平中三百二十九萬江湖運鹽既雜惡官估復高故百姓利食私鹽而並海民以魚鹽為業用工省而得利厚繇是不逞無賴盜販者衆捕之急則起為盜賊江淮間雖衣冠士人狃於厚利或以販鹽為事江西則虔州地連廣南而福建之汀州亦與虔接虔鹽弗善汀故不產鹽二州民多盜販廣南鹽以射利每歲秋冬田事纔畢恆數十百為羣持甲兵旗鼓往來虔汀漳潮循梅惠廣八州之地所至劫人穀帛掠人婦女與巡捕吏卒鬥格至殺傷吏卒則起為盜依阻險要捕不能得或赦其罪招之歲月浸淫滋多而虔州官糶鹽歲纔及百萬斤慶曆中廣東轉運使李敷王繇請運廣州鹽於南雄州以給虔吉未報即運四百餘萬斤於南雄而江西轉運司不以為便不往取後三司戶部判官周湛等八人復請運廣鹽入虔州江西亦請自具本錢取之詔尚書屯田員外郎施元長等會議皆請如湛等議而發運使許元以為不可遂止嘉祐以來或請商販廣南鹽入虔汀所過州縣收算或請放虔汀漳循梅潮惠七州鹽通商或謂第歲運淮南鹽七百萬斤至虔二百萬斤至汀民間足鹽寇盜自息或請官自置鋪役兵卒運廣南福建鹽至虔汀州論者不一先嘗遣職方員外郎黃炳乘傳會所屬監司及知州通判議謂虔州食淮南鹽已久不可改第損近歲所增官估斤為錢四十以十縣五等戶夏秋稅率百錢令糴鹽二斤隨夏稅入錢償官繼命提點鑄錢沈扶覆視可否扶等請選江西漕船團為十綱以三班使臣部之直取通泰楚都倉鹽詔用炳等策然歲纔增糶六十餘萬斤江西提點刑獄蔡挺制置鹽事乃令民首納私藏兵械給巡捕吏卒而販黃魚籠挾鹽不及二十斤徒不及五人不以甲兵自隨者止輸算勿捕淮南既團新綱漕鹽挺增為十二綱綱二十五艘宀元攵至州迺發輸官有餘以畀漕舟吏卒官復以半賈取之繇是減侵盜之弊鹽遂差善又損糶價歲課視舊增至三百餘萬斤乃罷炳等議所率糴鹽錢異時汀州人欲販鹽輒先伐鼓山谷中召願從者與期日率常得數十百人已上與俱行至是州縣督責耆保有伐鼓者輒捕送盜販者稍稍畏縮朝廷以挺為能留之江西積數年乃徙久之江西鹽皆團綱運致如虔州焉初荊湖亦病鹽惡且歲漕常不足治平二年纔及二十五萬餘石三年撥淮西二十四綱及傭客舟載鹽以往是歲運及四十萬石四年至五十三萬餘石慶曆初判戶部勾院王琪言天禧初嘗以荊湖鹽估高詔斤減三錢或二錢自後利入寢損請復舊估可歲增緡錢四萬許之治平中淮南轉運使李復圭張芻蘇頌三司度支判官韓縝相繼請減淮南鹽價然卒不果行熙寧初江西鹽課不登三年提點刑獄張頡言虔州官鹽鹵濕雜惡輕不及斤而價至四十七錢嶺南盜販入虔以斤半當一斤純白不雜賣錢二十以故虔人盡食嶺南鹽乃議稍減虔鹽價更擇壯舟團為十綱以使臣部押後蔡挺以贛江道險議令鹽船三歲一易仍以鹽純雜增虧為綱官舟人殿最鹽課遂敷盜販衰止自挺去法十廢五六請復之便詔從之仍定歲運淮鹽十二綱至虔州及章惇察訪湖南符本路提點刑獄朱初平措置般運廣鹽添額出賣然未及行元豐三年惇既參政有郟亶者邪險銳進素為惇所喜迎合惇意推倣湖南之法乞運廣鹽於江西即遣蹇周輔往江西相度周輔承望惇意奏言虔州運路險遠淮鹽至者不能多人苦淡食廣東鹽不得輒通盜販公行淮鹽官以九錢致一斤若運廣鹽盡會其費減淮鹽一錢而其鹽更善運路無阻請罷運淮鹽通般廣鹽一千萬斤於江西虔州南安軍復均淮鹽六百一十六萬斤於洪吉筠袁撫臨江建昌興國軍以補舊額詔周輔立法以聞周輔具鹽法并總目條上大率峻剝於民民被其害舊江西鹽場許民買撲周輔悉籍於官賣之遂以周輔遙領提舉江西廣東鹽事即司農寺置局四年周輔改漕河北明年提舉常平劉誼言道途洶洶以賣鹽為患詔江東提點刑獄范峋體量未報誼坐言役法等事罷及峋奏至但以州縣違法塞詔竟無更張未幾周輔奏虔州南安軍推行鹽法方半年已收息十四萬緡自以為功詔命發運副使李琮體訪利害琮知周輔方被奬用止謂鹽法宜變通而已不敢斥言其害六年周輔為戶部侍郎復奏湖南郴道州隣接韶連可以通運廣鹽數百萬卻均舊賣淮鹽於潭衡永全邵等州並準江西廣東見法仍舉郟亶初議郴全道三州亦賣廣鹽詔委提舉常平張士澄轉運判官陳偲措置明年士澄等具條約來上詔施行之額利增加一方騷然于時淮西亦推行周輔鹽法發運使蔣之奇奏立知州通判鹽事官賞罰下戶部著為令紹聖三年發運司言淮南亭戶貧瘠官賦本錢六十四萬緡皆倚辦諸路以故不時至民無所得錢必舉倍稱之息欲以糴本錢十萬緡給之不足畀以憑由即欲質於官與平之七而蠲其息鹽本集復給其三分憑由毀棄崇寧元年蔡京議更鹽法乃言東南鹽本或闕滯於客販請增給度牒及給封樁坊場錢通三十萬緡并列七條一許客用私船運致仍嚴立輒踰疆至夾帶私鹽之禁二鹽場官吏㮣量不平或支鹽失倫次者論以徒三鹽商所繇官司場務堰牐津渡等輒加苛留者如上法四禁命吏廕家貢士胥史為賈區請鹽五議貸亭戶六鹽價太低者議增之七令措置官博盡利害以聞明年詔鹽舟力勝錢勿輸用絕阻遏且許舟行越次取疾官綱等舟輒攔阻者坐之遂變鈔法置買鈔所於榷貨務凡以鈔至者並以末鹽乳香茶鈔并東北一分及官告度牒雜物等換給末鹽鈔換易五分餘以雜物而舊鈔止許易末鹽官告仍以十分率之止聽算三分其七分兼新鈔定民間買鈔之價以抑豪強以平邊糴在河北買者率百緡毋得下五千東南末鹽鈔毋得下十千陝西鹽鈔毋得下五千五百私減者坐徒徙之罪官吏留難文鈔展限等條皆備四年又以算請鹽價輕重不等載定六路鹽價舊價二十錢以上皆遞增以十錢四十五者如舊算請東南末鹽願折以金銀物帛者聽其便而亭戶貸錢舊輸息二分者蠲之五年詔算請不貼納見錢以十分率之毋過二分大觀元年乃令算請東南末鹽貼輸及帶舊鈔如見條外更許帶日前貼輸三分錢鈔輸四分者帶二分五分者帶三分後又貼輸四分者帶三分五分者帶四分而東南鹽並收見緡換請新鈔者如四分五分法貼輸其換請新鈔及見錢算東南末鹽如不帶六等舊鈔者聽先給如止帶五等舊鈔其給鹽之在崇寧四年十月前所帶不貼輸舊鈔之上六等者謂貼三貼四貼五當十鈔并河北公據免貼納錢是也時鈔法紛易公私交弊四年侍御史毛注言崇寧以來鹽法頓易元豐舊制不許諸路以官船迴載為轉運司之利許人任便用鈔請鹽般載於所指州縣販易而出賣州縣用為課額提舉鹽事司苛責郡縣以賣鹽多寡為官吏殿最一有循職養民不忍侵克則指為沮法必重奏劾譴黜州縣孰不望風畏威競為刻虐由是東南諸州每縣三等以上戶俱以物產高下勒認鹽數之多寡上戶歲限有至千緡第三等末戶不下三五十貫籍為定數使依數販易以足歲額稍或愆期鞭撻隨之一縣歲額有三五萬緡今用為常額實為害之大者又言朝廷自昔謹三路之備糧儲豐溢其術非他惟鈔法流通上下交信東南末鹽錢為河北之備東北鹽為河東之備解池鹽為陝西之備其錢並積於京師隨所積多寡給鈔於三路如河北糧草鈔至京並支見錢號飛錢法河東三路至京半支見錢半支銀紬絹陝西解鹽鈔則支請解鹽或有泛給鈔亦以京師錢支給惟錢積於京師鈔行於三路至則給錢不復滯留當時商旅皆悅爭運糧草入於邊郡商賈既通物價亦平官司上下無有二價斗米止百餘錢束草不過三十邊境倉廩所在盈滿自崇寧來鈔法屢更人不敢信京師無見錢之積而給鈔數倍於昔年鈔至京師無錢可給遂至鈔直十不得一邊郡無人入中糴買不敷乃以銀絹見錢品搭文鈔為糴買之直民間中糴不復會算鈔直惟計銀絹見錢須至高撎糧草之價以就虛數致使官價幾倍於民間斗米有至四百束草不下百三十餘錢軍儲不得不闕財用不得不匱如解鹽鈔每紙六千今可直三千商旅凡入東南末鹽鈔乃以見錢四分鹽引六分榷貨務惟得七十千之入而東南支鹽官直百千則鹽本已暗有所損矣臣謂鈔法不循復熙豐則物價無由可平邊儲無由可積方今大計無急於此薛向昔講究於嘉祐中行之未幾穀價遽損邊備有餘逮及熙豐其法始備比年榷貨務不顧鈔法屢變有誤邊計惟冀貼納見錢專買東南鹽鈔圖增錢數以僥冒榮賞前鈔方行而後鈔又復變易特令先次支鹽則前鈔遂為廢紙罔人攘利商旅怨嗟臣願明詔執政大臣精擇能吏推明鈔法無以見行為有妨無以既往為不可復如薛向之法已效於昔者可舉而行之今之練政事通鈔法不患無人在京三庫之積皆四方郡縣所入不患無備如以三四百萬緡樁留京師隨數以給鈔引使鈔至給錢不復邀阻上下交信則人以鈔引為輕齎轉相貿易或支請多惟轉廊就給東南末鹽鈔或度牒之類如東南末鹽鈔或度牒敕牒唯許以鈔引就給外餘並令在京以見錢入易樁留以為鈔引之資亦計之得者若舊出文鈔亦當體究立法量為分數支鹽償之自昔立法之難非特造始修復既廢亦為非易欲興經久之利則目前微害宜亦可略惟詳酌可否施行之未幾張商英為相乃議變通損益復熙豐之舊令內府錢別樁一千五百萬緡餘悉移用以革錢鈔物三等偏重之弊陝西給鈔五百萬緡江淮發運司給見錢文據或截兌上供錢三百萬緡以左司員外郎張察措置東南鹽事提舉江西常平張根管幹運淮鹽於江西罷提舉鹽香諸路鹽事各歸提刑司議定五等舊鈔商旅已換請新鈔及見錢鈔不對帶聽先給東南末鹽諸路貨易仍下淮浙鹽場以鹽十分率之樁留五分以待支發官綱備三路商旅轉廊算請餘五分以待算請新鈔及見錢鈔與不帶舊鈔當先給者於是推行舊法以商旅五色舊鈔若用換請新鈔對帶方許支鹽慮伺候歲月欲給無由乃立增納之法貼三鈔許於榷貨務更貼見緡七分貼四鈔更貼六分貼五當十鈔貼七分河北見錢文據貼五分算請有司議三路鈔法如熙豐舊法全仰東南末鹽為本若許將舊鈔貼納算請正與推行三路熙豐鈔法相戾即不令貼納算還又鈔無所歸議將河北見錢文據減增納二分餘各減二分以告敕度牒香藥雜物東南鹽算請給償帝詔東南六路元豐年額賣鹽錢以緡計之諸路各不下數十萬自行鈔鹽漕計窘匱以江西言之和豫買欠民價不少何以副仁民愛物之意令東南諸路轉運司協力措置般運政和元年詔商旅願依熙豐法轉廊者許先次用三路新鈔算請往他所定價給賣優存兩浙亭戶額外中鹽斤增價三分已而張察均定鹽價視紹聖斤增二錢詔從其說仍斤增一錢議者謂異時鹽商於榷貨務入納轉廊惟視東南諸郡積鹽多寡鹽多則請鈔者衆所入亦倍其闕鹽地客不肯住在元豐時遠地須豫備二年或三年次遠一年至二年最近亦半年及一年謂之準備鹽而後鈔法乃通紹聖間遵用舊制廣有準備故均價之後課利增倍謂宜嚴責轉運司般運準備鹽外更及元豐準備之數則鈔法始通課利且羨亭戶煎鹽官為買納比舊既增矣止用元豐舊價自可況用新價而有本錢復加借貸何慮不增若斤更增一錢虛費亦大詔施行之六路通置提舉鹽事官置司於揚州未幾罷議者復謂客人在京榷貨務買東南末鹽者其法有二一曰見錢入納二曰鈔面轉廊今既許三路文鈔得以轉廊若更循舊制許以見錢入納則客旅之錢當入於榷貨而不入於兼并見錢留於京師客旅走於東南詔采用焉又有謂舊法聽以物貨及官鈔引抵當所以扶持鈔價不大減損昨禁之非是其舊轉廊鹽鈔販致東南轉運司乃專以見錢為務致多壅閼於是復鈔引抵當一如其舊末鹽以十分率之限以八分給末鈔二分許鬻見緡後又增見緡為三分二年江寧府廣德軍太平州斤更增錢二宣歙饒信州斤增錢三池江州南康軍斤增錢四各以去產鹽地遠近為差是歲蔡京復用事大變鹽法五月罷官般賣令商旅赴場請販已般鹽并封樁商旅赴榷貨務算請先至者增支鹽以示勸前轉廊已算鈔未支者率百緡別輸見緡三分仍用新鈔帶給舊鈔三分已算支者所在抄數別輸帶賣如上法其算請悉用見緡而給鹽倫次以全用見緡不帶舊鹽者為上帶舊鹽者次之帶舊鈔者又次之三路糴買文鈔算給七分東南末鹽者聽對見緡支算二分東北鹽亦如之自餘文鈔毋得一例對算復置諸路提舉官於是詔書褒美京功然商旅終以法令不信為疑算請者少乃申扇搖之令增賞錢五百緡三年以商人承前先即諸州投勾乃請鹽於場留滯罷之若請鹽大帶斤重者官為秤驗乃輸錢給鈔時法既屢變蔡京更欲巧籠商賈之利乃議措置十六條裁定買官鹽價囊以三百斤價以十千其鬻者聽增損隨時舊加饒脚耗並罷客鹽舊止船貯改依東北鹽用囊官製鬻之書印及私造貼補並如茶籠篰法仍禁再用受鹽支鹽官司析而二之受於場者管秤盤囊封納於倉者管察視引據合同號簿囊二十則以一拆驗合同遞牒給商人外東南末鹽諸場仍給鈔引號簿有欲改指別場者並批銷號簿及鈔引仍用合同遞牒報所指處給隨鹽引即已支鹽關所指處籍記中路改指者倣此其引繳納限以一年有故展毋得踰半年限竟鹽未全售者毀引以見鹽籍于官止聽鬻其處毋得翻改大抵皆視茶法而多為節目欺奪民利故以免究盜販私煎大帶斤重為名而專用對帶之法客負鈔請鹽往往阨不即畀必對元數再買新鈔方聽帶給舊鈔之半慮令之不行也嚴避免之禁申沮壞之制重扇搖之法季輒比較務峻督責以取辦四年以遠地商販者稀鹽倉以地遠近為先給遠者繼令大搭帶正鹽期一月不買新鈔沒官而剩鹽即沒納五年偽造引者並依川錢引定罪六年以產鹽州軍大商弗肯止留其用小袋住賣者聽輸錢二十給鈔毋得輒出州界宣和二年詔六路封樁舊鹽數踰億萬其聽商旅般販與淮浙鹽倉即今鹽鈔對算四年榷貨務建議古有斗米斤鹽之說熙豐以前米石不過六七百時鹽價斤為錢六七十今米價石兩千五百至三千而鹽仍舊六十崇寧曾定鹽價買鈔折算酌以中價斤為錢四十今一斤三十七錢虧公稍多欲囊增為十三千入納而亭戶所輸並增價庶克自贍盜販衰止於是舊鹽盡禁住賣而籍記貼輸帶賣之令復用焉初鹽鈔法之行積鹽于解池積錢于京師榷貨務積鈔于陝西沿邊諸郡商賈以物斛至邊入中請鈔以歸物斛至邊有數倍之息惟患無回貨故極利於得鈔徑請鹽於解池而解鹽通行地甚寬或請錢于京師每鈔六千二百登時給與但輸頭子等錢數十而已以此所由州縣貿易者甚衆崇寧間蔡京始變法俾商人先輸錢請鈔赴產鹽郡授鹽欲囊括四方之錢盡入中都以進羨要寵鈔法遂廢商賈不通邊儲失備東南鹽禁加密犯法被罪者多民間食鹽雜以灰土解池天產美利乃與糞壤俱積矣大概常使見行之法售給才通輒復變易名對帶法季年又變對帶為循環循環者已賣鈔未授鹽復更鈔已更鈔鹽未給復貼輸錢凡三輸錢始獲一直之貨民無貲更鈔已輸錢悉乾沒數十萬券一夕廢棄朝為豪商夕儕流丐有赴水投繯而死者時有魏伯芻者本省大胥蔡京委信之專主榷貨務政和六年鹽課通及四千萬緡官吏皆進秩七年又以課羨第賞伯芻年除歲遷積官通議大夫徽猷閣待制既而黨附王黼京惡而黜之伯芻非有心計但與交引戶關通凡商旅算請率克寸留十分之四以充入納之數務入納數多以昧人主而張虛最初政和再更鹽法伯芻方為蔡京所倚信建言朝廷所以開闔利柄馳走商賈不煩號令億萬之錢輻湊而至御府須索百司支費歲用之外沛然有餘則榷鹽之入可謂厚矣頃年鹽法未有一定之制隨時變革以便公私防閑未定姦弊百出自政和立法之後頓絕弊源公私兼利異時一日所收不過二萬緡則已詫其太多今日之納乃常及四五萬貫以歲計之有一郡而客鈔錢及五十餘萬貫者處州是也有一州倉而客人請鹽及四十萬袋者泰州是也新法於今纔二年而所收已及四千萬貫雖傳記所載貫朽錢流者實未足為今日道也伏乞以通收四千萬貫之數宣付史館以示富國裕民之政小人得時騁志無所顧忌遂至於此于時御府用度日廣課入欲豐再申歲較季比之令在職而暫取告其月日皆毋得計折害法者不以官廕並處極坐微至於鹽袋艹方斤鹽莫不有禁州縣惟務歲增課以避罪法上下程督加厲七年乃詔昨改鹽法立賞至重抑配者多計口敷及嬰孩廣數下逮駝畜使良民受弊比屋愁嘆悉從初令以利百姓三省其申嚴近制改奉新鈔然有司不能承守故比較已罷而復用抄劄既免而復行鹽囊既增而復止一囊之價裁為十一千既又復為十三千民力因以擾匱而盜賊滋焉靖康元年詔未降新鈔前已給見錢公據文鈔並給還商賈以示大信時鹽盡給新鈔亦用帶賣舊鹽立限之法言者論王黼當國循用蔡京弊法改行新鈔舊鹽貼錢對帶方許出賣初限兩月再限一月是時黼方用事專務害民剝下益上改易鈔法甚於盜賊然今不改覆車之轍又促限止半月反不及王黼之時商賈豈得不怨詔申限焉南渡淮浙亭戶官給本錢諸州置倉令商人買鈔五十斤為石六石為袋輸鈔錢十八千紹興元年詔臨安府秀州亭戶二稅依皇祐法輸鹽立監官不察亭戶私煎及巡捕漏泄之法二年九月詔淮浙鹽令商人袋貼輸通貨錢三千已算請而未售者亦如之十日不自陳如私鹽律時呂頤浩用提轄張純議峻更鹽法十有一月詔淮浙鹽以十分為率四分支今降旨符以後文鈔四分支建炎渡江以後文鈔先是呂頤浩以對帶法不可用令商人貼輸錢至是復以分數如對帶法於是始加嚴酷矣三年減民間蠶鹽錢四年正月詔淮浙鹽鈔錢每袋增貼輸錢三貫並計綱輸行在尋命廣鹽亦如之九月以入輸遲細減所添錢然自建炎三年改鈔法及今所改凡五變而建炎舊鈔支尚未絕乃命以先後併支焉孝宗乾道六年戶部侍郎葉衡奏今日財賦𡞰海之利居其半年來課入不增商賈不行皆私販害之也且以淮東二浙鹽出入之數言之淮東鹽竈四百一十二所歲額鹽二百六十八萬三千餘石去年兩務場賣淮鹽六十七萬二千三百餘袋收錢二千一百九十六萬三千餘貫二浙課額一百九十七萬餘石去年兩務場賣浙鹽二十萬二千餘袋收錢五百一萬二千餘貫而鹽竈乃計二千四百餘所以鹽額論之淮東之數多於二浙五之一以去歲賣鹽錢數論之淮東多於二浙三之二及以竈之多寡論之兩浙反多淮東四之三蓋二浙無非私販故也欲望遣官分路措置淳熙八年詔住賣帶賣積鹽以朝廷徒有帶賣之名總所未免有借撥之弊故也十年先是湖北鹽商吳傳言國家𡞰海之利以三分為率淮東居其二通泰楚隸買鹽場十六催煎場十二竈四百十二紹興初竈煎鹽多止十一籌籌為鹽一百斤淳熙初亭戶得嘗試鹵水之法竈煎至二十五籌至三十籌增舊額之半緣此鹽場買亭戶鹽籌增稱鹽二十斤至三十斤為浮鹽日買鹽一萬餘籌其浮鹽止以二十斤為則有二十萬斤為二千籌籌為錢一貫八百三十文內除船脚錢二百文有一貫六百三十文其鹽並再中入官為鈔錢四百五十一萬七千五百餘緡又綱取鹽一袋并諸窠名等及賣又多稱斤兩亭戶饑寒不免私賣若朝廷嚴究還其本錢而後可以盡革私賣之弊至是詔還通泰等州諸鹽場欠亭戶鹽本錢一百一十萬貫寧宗慶元初詔罷循環鹽鈔改增剩鈔名為正支文鈔給算與已投倉者通理先後支散以淮東提舉陳損之言循環鈔多弊故有是命於是富商臣賈有頓為貧民者矣開禧二年詔自今新鈔一袋搭支舊鈔一袋如新鈔多於舊鈔或願全以新鈔支鹽及無舊鈔而願全買新鈔者聽以新鈔理資次嘉定二年詔淮東貼輸鹽錢免二分交子止用錢會中半三年詔停塌鈔引之家增長舊鈔價直袋賣官會百貫以上自今令到日鹽鈔官錢袋增收會子二十貫三務場朱印於鈔面作某年某月新鈔俟通賣及一百萬袋即免增收其日前已未支鹽鈔並為舊鈔期以一年持赴倉場支鹽袋貼輸官會一十貫出限更不行用此淮浙鹽之大略也唐乾元初第五琦為鹽鐵使變鹽法劉晏代之當時舉天下鹽利歲纔四十萬緡至大曆增至六百餘萬緡天下之賦鹽利居半元祐間淮鹽與解池等歲四百萬緡比唐舉天下之賦已三分之二紹興末年以來泰州海陵一監支鹽三十餘萬席為錢六七百萬緡則是一州之數過唐舉天下之數矣寶慶二年監察御史趙至道言夫產鹽固藉於鹽戶鬻鹽實賴於鹽商故鹽戶所當存恤鹽商所當優潤慶元之初歲為錢九百九十萬八千有奇寶慶元年止七百四十九萬九千有奇乃知鹽課之虧實鹽商之無所贏利為今之計莫若寬商旅減征稅庶幾慶元鹽課之盛復見於今日矣從之紹定元年以侍御史李知孝言罷上虞餘姚海塗地創立鹽竈端平二年都省言淮浙歲額鹽九十七萬四千餘袋近二三年積虧一百餘萬袋民食貴鹽公私俱病有旨三路提舉茶鹽司各置主管文字一員專以興復鹽額收買散鹽為務歲終尚書省課其殿最淳祐元年臣僚奏南渡立國專仰鹽鈔紹興淳熙率享其利嘉定以來二三十年之間鈔法或行或罷而浮鹽之說牢不可破其害有不可勝言者望付有司集議孰為可行孰為可罷天地之藏與官民共之豈不甚盛從之五年申嚴私販苛征之禁寶祐元年都省言行在榷貨務都茶場上本務場淳祐十二年收趁到茶鹽等錢一萬一千八百一十五萬六千八百三十三貫有奇比今新額四千萬貫增一倍以上合視淳祐九年十年十一年例倍賞之以勵其後有旨依所上推賞四年五月以行在務場比新額增九千一百七十三萬五千九百一十二貫有奇本務場并三省戶部太府寺交引庫凡通管三務場職事之人視例推賞後以為常十有二月殿中侍御史朱熠言近者課額頓虧日甚一日姑以真州分司言之見虧二千餘萬皆由臺閫及諸軍帥興販規利之由於是復申嚴私販之禁五年朱熠復言鹽之為利博矣以蜀廣浙數路言之皆不及淮鹽額之半蓋以斥鹵彌望可以供煎烹蘆葦阜繁可以備燔燎故環海之湄有亭戶有鍋戶有正鹽有浮鹽正鹽出於亭戶歸之公上者也浮鹽出於鍋戶鬻之商販者也正鹽居其四浮鹽居其一端平之初朝廷不欲使浮鹽之利散而歸之於下於是分置十局以收買浮鹽以歲額計之二千七百九十三萬斤十數年來鈔法屢更公私俱困真揚通泰四州六十五萬袋之正鹽視昔猶不及額尚何暇為浮鹽計邪是以貪墨無恥之士大夫知朝廷住買浮鹽龍斷而籠其利纍纍竈戶列處沙洲日藉銖兩之鹽以延旦夕之命今商賈既不得私販朝廷又不與收買則是絕其衣食之源矣為今之計莫若遵端平之舊式收鍋戶之浮鹽所給鹽本當過於正鹽之價則人皆與官為市卻以此鹽售於上江所得鹽息徑輸朝廷一則可以絕戎閫爭利之風二則可以續鍋戶烹煎之利有旨從之
