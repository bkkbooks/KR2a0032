body:
  text: 宋史卷一百四十八志第一百一儀衞六鹵簿儀服鹵簿儀服自漢鹵簿象最在前晉平吳後南越獻馴象作大車駕之以載黃門鼓吹數十人使越人騎之以試橋梁宋鹵簿以象居先設木蓮花坐金蕉盤紫羅繡襜絡腦當胸後鞦並設銅鈴杏葉紅犛牛尾拂塵每象南越軍一人跨其上四人引並花脚幞頭緋繡窄衣銀帶太宗太平興國六年兩莊養象所奏詔以象十於南郊引駕開寶九年南郊時其象止在六引前排列詔鹵簿使領其事旗皆錯采為之漆竿鎞首纛頭錦帶腰火燄脚白澤攝提金鸞金鳳師子苣文天下太平君王萬歲仙童騰蛇神龜及在步甲前後隊後馬隊三隊六軍儀仗內並以赤日月及合璧連珠風雨雷電五星二十八宿祥雲並以青北斗以黑五岳四瀆五方四神十二辰五龍五鳳龍虎君並以方色天王以赤黃二色排攔以黃紫赤三色元豐三年詳定郊廟奉祀禮文所言鹵簿前用二十八宿五星攝提旗有司乃取方士之說繪為人形於禮無據伏請改製各著其象以則天文從之元祐七年太常寺言二十八宿旗五星攝提旗按鹵簿圖畫人形及牛虎頭婦人小兒之類於禮無據元豐三年禮文所上言乞改製各著其象以則天文後有司循舊儀未曾改正今欲改造從之元符二年徽宗即位兵部侍郎黃裳言南郊大駕諸旗名物除用典故制號外餘因時事取名伏見近者璽授元符茅山之上日有重輪太上老君眉間發紅光武夷君廟有仙鶴臣請制為旗號曰寶符曰重輪曰祥光曰瑞鶴從之政和四年禮制局言鹵簿大黃龍負圖旗畫八卦乞改畫九一三七二四六八五之數仙童網子大神三旗無所經見乞除去從之初大觀三年西京潁陽縣大慶觀聖祖殿東有嘉禾芝草並生其嘉禾一本四穗芝草葉圓而重起至是詔製芝禾並秀旗又以是年二月日上生青赤黃戴氣後日下生青赤黃承氣詔製日有戴承旗又以元符二年武夷君廟有仙鶴迎詔政和二年延福宮宴輔臣有羣鶴自西北來盤旋於睿謨殿上及奏大晟樂而翔鶴屢至詔製瑞鶴旗八年禮部侍郎張邦昌奏太祖時甘露降於江陵者十日瑞麥秀於濮陽者六歧獲金鸚鵡於隴坻得三玉兔於鄆封馴象至而五嶺平瓊管族而白鹿出皆命製為旗章陳之望詔有司取自崇觀至今凡中外所上瑞應悉掇其尤殊者增製旗物上以丕承天貺下以聳動民瞻從之初宋制旗物尤盛中興後惟務簡約雖參用舊制然亦不無因革其太常青質夾羅惟繡日月星而無龍下有網鬚謂之茀而竿頭為龍首銜青結綬垂青旄緌十二謂之旒蓋幅下無斿而竿首垂旒抑又取古者注旄及羽於竿首之遺制竿用椆木護以剖竹膠以髹飾以藻玉輅建之大旂黃質九幅每幅繡升龍一側幅二下垂黃絲網緌九金輅建之大赤朱質七幅每幅繡鳥隼二側幅如之下垂朱絲網緌七象輅建之大白素質五幅每幅繡熊一虎一側幅如之下垂淺黃絲網緌五革輅建之大麾皂質四幅每幅繡五采龜蛇一側幅繡龜二下垂皂絲網緌四木輅建之其黃龍負圖旗建隆初創為大制有架旗力重以百九十人維之今用七十人其君王萬歲天下太平日月五星北斗招搖青龍朱雀白虎玄武等十旗皆以十七人維之其祥瑞旗八紹興二十五年所制也是歲適當郊祀而太廟生靈芝九莖贛州進太平瑞木道州連理木遂寧府嘉禾鎮江府瑞瓜南安軍雙蓮花嚴州兜率寺信州玉山芝草黎州甘露禮部侍郎王珉等請繪之華旗以紀盛美焉五牛旗依方色皆小輿上刻木為牛背插旗錯采為牛旗竿上有小盤盤衣及輿衣亦並繡牛形輿士各四人服繡五色牛衣自太祖時詔用之神宗熙寧七年太常寺言大駕鹵簿羊車本前代宮中所乘五牛旗蓋古之五時副車也以木牛載旗用人輿之失其本制宜省去從之牙門旗古者天子出建大牙今制赤質錯采為神人象中道前後各一門左右道五門門二旗蓋取周制樹旗表門及天子五門之制駕頭一名寶床正衙法坐也香木為之四足瑑山以龍卷之坐面用藤織雲龍四圍錯采繪走龍形微曲上加緋羅繡褥裹以緋羅繡帕每車駕出幸則使老內臣馬上擁之為前驅焉不設則以朱匣韜之幡本幟也貌幡幡然有告止傳教信幡皆絳帛錯采為字上有朱綠小蓋四角垂羅文佩繫龍頭竿上其錯采字下告止為雙鳳傳教為雙白虎信幡為雙龍又有絳引幡制頗同此作五色間暈無字兩角垂佩中興為六角蓋垂珠佩下有橫木板作碾玉文三幡亦以錯采篆書告止傳教信幡幢制如節而五層韜以袋繡四神隨方色朱漆柄取曲禮行前朱雀而後玄武左青龍而右白虎之義王公所給幢黑漆柄紫綾袋中興用生色袋皂纛本後魏纛頭之制唐衞尉器用纛居其一蓋旄頭之遺象制同旗無文采去鎞首六脚後志云今制皂邊皂斿斿為火焰之形金吾仗主之每纛一人持一人拓之乘輿行則陳於鹵簿左右各六絳麾如幢止三層紫羅囊蒙之王公麾以紫綾袋黃麾古有黃朱纁三色所以指麾也漢鹵簿有前黃麾護駕御史宋制絳帛為之如幡錯采成黃麾字下繡交龍朱漆竿金龍首上垂朱綠小蓋神宗元豐二年詳定朝會御殿儀注所言按周禮木輅建大麾以田鄭氏曰大麾不在九旗之中以正色言之則黑夏后氏所建禮記曰有虞氏之旂夏后氏緌鄭氏曰緌謂注旄牛尾於杠首所謂大麾書曰王右秉白旄以麾孔穎達曰虞世但注旄夏世始加旒縿西京雜記漢大駕有前黃麾崔豹古今注麾所以指麾乘輿以黃諸公以朱刺史二千石以纁開元禮義纂曰唐太宗法夏后之前制取中方之正色故制大麾色黃今禮有黃麾其制十二幅開寶通禮義纂曰黃中央之色此仗最近車輅故以應象取其居中導達四方含光大也今鹵簿黃麾以夏制言之則狀不類旗以漢制言之則色又不黃伏請製大麾一注麾於竿首則法夏后氏之制其色正黃則用漢制以十二幅為旗則取唐制以一旒為之則取今龍墀旗之制當元會陳仗衞建大黃麾一於當御廂之前以為表識其當御廂之後則建黃麾幡二幷上大黃麾黃麾旛制度神宗批曰黃麾制度考詳前志終是可疑今鑿而為之植於大庭中外共瞻之地或為博聞多識者所譏宜且闕之更俟討求黃麾幡仍舊氅本緝鳥毛為之唐有六色孔雀大小鵝毛雞毛之制後志云今制有青緋皂白黃五色上有朱蓋下垂帶帶繡禽羽末綴金鈴青則繡以孔雀五角蓋緋則繡以鳳六角蓋皂則繡以鵝六角蓋白亦以鵝四角蓋黃則以雞四角蓋每角綴垂佩揭以朱竿上如戟加橫木龍首以繫之金節隋制也黑漆竿上施圓盤周綴紅絲拂八層黃繡龍袋籠之王公以下皆有節制同金節韜以碧油繖古張帛避雨之制今有方繖大繖皆赤質紫表朱𩹉四角銅螭首六引內者其制差小哲宗元祐七年太常寺言開元禮大駕八角紫繖王公已下四角青繖今鹵簿圖但引紫繖而無青繖之文詔改用紹興十三年將郊詔繖扇如舊制拂扇等不以珠飾蓋本黃帝時有雲氣為花蘤之象因而作也宋有花蓋導蓋皆赤質如繖而圓瀝水繡花龍又有曲蓋差小惟乘輿用之人臣則親王或賜之而以青繒繡瑞草焉睥睨如華蓋而小扇筤緋羅繡扇二緋羅繡曲蓋一並內臣馬上執之駕頭在細仗前扇筤在乘輿後大駕法駕鸞駕常出並用之扇圓徑四尺二寸柄長八尺三寸黃茸繡團龍仍用金塗銅飾扇有朱團及雉尾四等朱團繡雲鳳或雜花黑漆柄金銅飾雉尾皆方繡雉尾之狀有三等大雉扇長五尺二寸闊三尺七寸中扇小扇遞減二寸下方上殺以緋羅繡雉尾之狀中有雙孔雀雜花下施黑漆橫木長柄以金塗銅飾乘輿出入必以前持鄣蔽凡朔望朝賀行冊禮皇帝升御坐必合扇坐定去扇禮畢駕退又索扇如初蓋謂天子升降俯仰衆人皆得見之非肅穆之容故必合扇以鄣焉象畢昴為天堦故為前引皆赤質金銅飾朱藤結網金獸面方上有二螭首銜紅絲拂圓如扇香鐙唐制也朱漆案緋繡花龍衣上設金塗香爐燭臺長竿二輿士八人金塗銀火鐐香匙副之大角黑漆畫龍紫繡龍袋長鳴次鳴大小橫吹五色衣旛緋掌畫交龍樂令三品已上緋掌畫蹲豹犦矟犦擊聲也一云象犦牛善鬬字從牛唐金吾將軍執之宋制如節有袋上加碧油常置朝堂車駕鹵簿出則八枚前導又四枚夾大將軍者名衞司犦矟矟長矛也木刃黑質畫雲氣又有細矟制同而差小戟有枝兵也木為刃赤質畫雲氣上垂交龍掌五色帶帶末綴銅鈴又鈒戟無掌而有小橫木鈒插也制本插車旁又小戟與鈒戟同殳叉戟之類殳無刃而短黑飾兩末叉青飾兩末並中白畫雲氣各綴朱絲拂槍矟也唐羽林所執制同矟而鐵刃上綴朱絲拂儀鍠鉞屬也秦漢有之唐用為儀仗刻木如斧塗以青柄以黃上綴小錦幡五色帶班劍本漢朝服帶劍晉以木代之亦曰象劍取裝飾斑斕之義鞘以黃質紫斑文金銅飾紫絲絛錔御刀晉宋以來有之黑鞘金花銀飾靶軛紫絲絛錔又儀刀制同此悉以銀飾王公亦給之刀盾刀本容刀也盾旁排也一人分持刀以木為之無鞘有環紫絲絛錔盾赤質畫異獸又朱藤絡盾制悉同唯綠藤綠質皆持執之幰弩漢京尹司隸前驅持弓以射窺者宋制每弩加箭二有畫雲氣仗內弩皆同弓箭每弓加箭二有同幰弩車輻棒也形如車輪輻宋制朱漆八稜白榦柯舒黑漆棒也制同車輻以金銅釘飾鐙杖黑漆弩柄也以金銅為鐙及飾其末紫絲絛繫之鳴鞭唐及五代有之周官條狼氏執鞭趨辟之遺法也內侍二人執之鞭鞘用紅絲而漬以蠟行幸則前騎而鳴之大祀禮畢還宮亦用焉視朝宴會則用於殿庭誕馬散馬也加金塗銀鬧裝鞍勒乘輿以紅繡韉六鞘王公以下用紫繡及剜花韉哲宗元祐七年太常寺言誕馬按鹵簿圖曰舊並施鞍韉景祐五年去之昨納后誕馬猶施鞍韉今欲乞除去仍依鹵簿圖用纓轡緋屜御馬鞍勒之制有金玉水晶金塗四等鬧裝鞢促結為坐龍碾鈒鏤塵沙面平面窪面方團寸節卷荷校具皆垂六鞘金銀裹鞍橋銜鐙朱黃絲絛轡鞦緋黃織繡或素圜韉襆用金銀綫織或緋黃絁鞭用紫竹紅黃絲鞘纓以紅黃犛牛尾金為鈌每日馬五匹供奉鞍用玉及金塗襆皆素行幸則十四匹加真金水晶之飾太宗至道二年詔先是御馬以織成帊覆鞍勒今後以廣絹代之馬珂之制銅面鵰翎鼻拂攀胸上綴銅杏葉紅絲拂又胸前及腹下皆有攀綴銅鈴後有塵錦包尾獨鹵簿中金吾衞將軍導駕者皆有之甲騎具裝甲人鎧也具裝馬鎧也甲以布為𩹉黃絁表之青綠畫為甲文紅錦褖青絁為下絳韋為絡金銅鈌長短至膝前膺為人面二自背連膺纏以錦騰蛇具裝如常馬甲加珂拂於前膺及後鞦毬杖金塗銀裹以供奉官騎執之分左右前導大禮用百人花脚幞頭紫繡袍襖常出三十人公服皆騎導鷄竿附竿為鷄形金飾首銜絳旛承以綵盤維以絳索揭以長竿募衞士先登爭得鷄者官給以纈襖子或取絳旛而已大禮畢麗正門肆赦則設之其義則鷄為巽神巽主號令故宣號令則象之陽用事則鷄鳴故布宣陽澤則象之一曰天鷄星動為有赦故王者以天鷄為度金鷄事六朝已有之或謂起于西京南渡後則自紹興十三年始也大駕鹵簿巾服之制金吾上將軍將軍六統軍千牛中郎將服花脚幞頭抹額紫繡袍佩牙刀珂馬諸衞大將軍將軍中郎將折衝果毅散手翊衞服平巾幘紫繡袍大口袴錦螣蛇銀帶佩橫刀執弓箭千牛將軍服平巾幘紫繡袍大口袴銀帶鞾靿橫刀執弓箭珂馬千牛服花脚幞頭緋繡袍抹額大口袴銀帶鞾靿前馬隊內折衝及執矟者服錦帽緋繡袍銀帶監門校尉六軍押仗服幞頭紫繡裲襠隊正服平巾幘緋繡袍大口袴諸衞主率都尉引駕騎持鈒隊內校尉旅帥執衞司殳仗犦矟金吾十六騎班劍儀刀隊親勳翊衞執大角人並服平巾幘緋繡裲襠大口袴佩橫刀執弓箭金吾押牙服金鵝帽紫繡袍銀帶儀刀金吾持纛者服烏紗帽皂衣袴㙐韈金吾押纛服幞頭皂繡衫大口袴銀帶烏皮鞾執金吾犦矟服錦袍帽臂銀帶烏皮鞾清遊隊佽飛執副仗矟服甲騎具裝錦臂韝橫刀執弓箭白袴朱雀隊執旗及執牙門旗執絳引旛黃麾旛者並服緋繡衫抹額大口袴銀帶執殳仗前後步隊真武隊執旗前後部黃麾執日月合璧等旗青龍白虎隊金吾細仗內執旗者並服五色繡袍抹額行縢銀帶執白榦棒人加銀褐捍腰執龍旗及前馬隊內執旗人服五色繡袍銀帶行縢大口袴執弓箭執龍旗副竿人服錦帽五色繡袍大口袴銀帶執弩弓箭人服錦帽青繡袍銀帶前後步隊人服五色鍪甲錦臂㙐韈袴銀帶朱雀隊內執弓箭弩矟虞候佽飛執長壽幢寶輿法物人並服平巾幘緋繡袍大口袴銀帶援寶執絳麾真武幢叉人並服武弁紫繡衫持鈒隊殿中黃麾繖扇腰輿香鐙華蓋指南進賢等車駕士相風鍾漏等輿輿士並服武弁緋繡衫駕羊車童子服垂耳髻青頭青繡大袖衫袴勒帛青耳履執引駕龍墀旗六軍旗者服錦帽五色繡衫錦臂銀帶引夾旗及執柯舒鐙仗者服帖金帽餘同上執花鳳飛黃吉利旗者服銀褐繡衣抹額銀帶夾轂隊服五色質鍪鎧錦臂白行縢紫帶㙐韈驍衞翊衞三隊服平巾幘緋繡袍大口袴錦螣蛇五輅副輅耕根車駕士服平巾幘青繡衫青履韈教馬官服幞頭紅繡抹額紫繡衫白袴銀帶掌輦主輦服武弁黃繡衫紫繡誕帶攏御馬者服帖金帽紫繡大袖衫銀帶執真武幢者服武弁皂繡衫紫繡誕帶五牛旗輿士服武弁五色繡衫大口袴銀帶掩後隊服黑鍪甲錦臂韝行縢鼓吹令丞服綠袴褶冠銀褐裙金銅革帶緋白大帶履韈太常寺府史典事司天令史服幞頭綠衫黃半臂太常主帥掆鼓金鉦節鼓人服平巾幘緋繡袍大口袴抹帶錦螣蛇歌拱宸管簫笳笛觱栗無螣蛇太常大鼓長鳴小鼓中鳴服黃雷花袍袴抹額抹帶太常鐃大橫吹服緋苣文袍袴抹額抹帶太常羽葆鼓小橫吹服青苣文袍袴抹額抹帶排列官令史府史服黑介幘緋衫白袴白勒帛司辰典事漏刻生服青袴褶冠革帶殿中少監奉御供奉排列官引駕仗內排列承直官大將金吾引駕押仗押旗服幞頭紫公服烏皮鞾尚輦奉御直長乘黃令丞千牛長史進馬四色官服幞頭綠公服白袴金銅帶烏皮鞾殿中職掌執繖扇人服幞頭碧襴金銅帶烏皮鞾舊衣黃太平興國六年幷內侍省並改服以碧凡繡文金吾衞以辟邪左右衞以瑞馬驍衞以雕虎屯衞以赤豹武衞以瑞鷹領軍衞以白澤監門衞以師子千牛衞以犀牛六軍以孔雀樂工以鸞耕根車駕士以鳳銜嘉禾進賢車以瑞麟明遠車以對鳳羊車以瑞羊指南車以孔雀記里鼓黃鉞車以對鵝白鷺車以翔鷺鸞旗車以瑞鸞崇德車以辟邪皮軒車以虎屬車以雲鶴豹尾車以立豹相風烏輿以烏五牛旗以五色牛餘皆以寶相花六引內巾服之制清道官服武弁緋繡衫革帶持幰弩車輻棒者服平巾赤幘緋繡衫赤袴銀帶青衣服平巾青幘青袴褶持戟繖扇刀盾者服黃繡衫抹額行縢銀帶持幡蓋者服繡衫抹額大口袴銀帶內告止幡曲蓋以緋傳教幡信幡絳引幡以黃執誕馬轡儀刀麾幢節夾矟大角者服平巾幘緋繡衫大口袴銀帶大駕鹵簿內執轡並錦絡衫帽持弓箭矟者服武弁緋繡衫白袴駕士服錦帽繡戎服大袍銀帶弓箭以青矟以紫持掆鼓者服平巾幘緋繡對鳳袍大口袴白抹帶錦螣蛇鐃吹部內服平巾幘緋繡袍白抹帶白袴餘悉同大駕前後部其繡衣文清道以雲鶴幰弩以辟邪車輻以白澤駕士司徒以瑞馬牧以隼御史大夫以獬豸兵部尚書以虎太常卿以鳳縣令以雉樂工以鸞餘悉以寶相花太祖建隆四年范質議按開元禮武官陪立大仗加螣蛇裲襠如袖無身以覆其膊胳蓋掖下縫也從肩領覆臂膊共一尺二寸又按釋文玉篇相傳云其一當胸其一當背謂之兩當今詳裲襠之制其領連所覆膊胳其一當左膊其一當右膊故謂之起膊今請兼存兩說擇而用之造裲襠用當胸當背之制宣和元年禮制局言鼓吹令丞冠又名袴褶冠今鹵簿既除袴褶冠名不當仍舊請依舊記如三禮圖委貌冠製從之
