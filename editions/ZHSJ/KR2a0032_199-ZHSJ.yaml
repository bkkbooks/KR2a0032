body:
  text: 宋史卷一百九十九志第一百五十二刑法一夫天有五氣以育萬物木德以生金德以殺亦甚盭矣而始終之序相成之道也先天有刑罰以糾其民則必溫慈惠和以行之蓋裁之以義推之以仁則震殺戮之威非求民之死所以求其生也書曰士制百姓于刑之中以教祗德言刑以弼教使之畏威遠罪導以之善爾唐虞之治固不能廢刑也惟禮以防之有弗及則刑以輔之而已王道陵遲禮制隳廢始專任法以罔其民於是作為刑書欲民無犯而亂獄滋豐由其本末無序不足相成故也宋興承五季之亂太祖太宗頗用重典以繩姦慝歲時躬自折獄慮囚務底明慎而以忠厚為本海內悉平文教寖盛士初試官皆習律令其君一以寬仁為治故立法之制嚴而用法之情恕獄有小疑覆奏輒得減宥觀夫重熙累洽之際天下之民咸樂其生重於犯法而致治之盛幾乎三代之懿元豐以來刑書益繁已而憸邪並進刑政紊矣國既南遷威柄下逮州郡之吏亦頗專行而刑之寬猛繫乎其人然累世猶知以愛民為心雖其失慈弱而祖宗之遺意蓋未泯焉今摭其實作刑法志宋法制因唐律令格式而隨時損益則有編敕一司一路一州一縣又別有敕建隆初詔判大理寺竇儀等上編敕四卷凡一百有六條詔與新定刑統三十卷並頒天下參酌輕重為詳世稱平允太平興國中增敕至十五卷淳化中倍之咸平中增至萬八千五百五十有五條詔給事中柴成務等芟其繁亂定可為敕者二百八十有六條準律分十二門總十一卷又為儀制令一卷當時便其簡易大中祥符間又增三十卷千三百七十四條又有農田敕五卷與敕兼行仁宗嘗問輔臣曰或謂先朝詔令不可輕改信然乎王曾曰此憸人惑上之言也咸平之所刪太宗詔令十存一二去其繁密以便於民何為不可於是詔中外言敕得失命官修定取咸平儀制令及制度約束之在敕者五百餘條悉附令後號曰附令敕天聖七年編敕成合農田敕為一書視祥符敕損百有餘條其麗于法者大辟之屬十有七流之屬三十有四徒之屬百有六杖之屬二百五十有八笞之屬七十有六又配隸之屬六十有三大辟而下奏聽旨者七十有一凡此皆在律令外者也既頒行因下詔曰敕令者治世之經而數動搖則衆聽滋惑何以訓迪天下哉自今有司毋得輒請刪改有未便者中書樞密院以聞然至慶曆又復刪定增五百條別為總例一卷後又修一司敕二千三百十有七條一路敕千八百二十有七條一州一縣敕千四百五十有一條其麗于法者大辟之屬總三十有一流之屬總二十有一徒之屬總百有五杖之屬總百六十有八笞之屬總十有二又配隸之屬總八十有一大辟而下奏聽旨者總六十有四凡此又在編敕之外者也嘉祐初因樞密使韓琦言內外吏兵奉祿無著令乃命類次為祿令三司以驛料名數著為驛令琦又言自慶曆四年距嘉祐二年敕增至四千餘條前後牴牾請詔中外使言敕得失如天聖故事七年書成總千八百三十四條視慶曆敕大辟增六十流增五十徒增六十有一杖增七十有三笞增三十有八又配隸增三十大辟而下奏聽旨者增四十有六又別為續附令敕三卷神宗以律不足以周事情凡律所不載者一斷以敕乃更其目曰敕令格式而律恆存乎敕之外熙寧初置局修敕詔中外言法不便者集議更定擇其可采者賞之元豐中始成書二十有六卷復下二府參訂然後頒行帝留意法令每有司進擬多所是正嘗謂法出於道人能體道則立法足以盡事又曰禁於已然之謂敕禁於未然之謂令設於此以待彼之謂格使彼效之之謂式修書者要當識此於是凡入笞杖徒流死自名例以下至斷獄十有二門麗刑名輕重者皆為敕自品官以下至斷獄三十五門約束禁止者皆為令命官之等十有七吏庶人之賞等七十有七又有倍全分釐之級凡五等有等級高下者皆為格表奏帳籍關牒符檄之類凡五卷有體制模楷者皆為式元祐初中丞劉摯言元豐編修敕令舊載敕者多移之令蓋違敕法重違令罪輕此足以見神宗仁厚之德而有司不能推廣增多條目離析舊制因一言一事輒立一法意苛文晦不足以該事物之情行之幾時蓋已屢變宜取慶曆嘉祐以來新舊敕參照去取刪正以成一代之典右諫議孫覺亦言煩細難以檢用乃詔摯等刊定哲宗親政不專用元祐近例稍復熙寧元豐之制自是用法以後衝前改更紛然而刑制紊矣崇寧元年臣僚言有司所守者法法所不載然後用例今引例破法非理也乃令各曹取前後所用例以類編修與法妨者去之尋下詔追復元豐法制凡元祐條例悉燬之徽宗每降御筆手詔變亂舊章靖康初羣臣言祖宗有一定之法因事改者則隨條貼說有司易於奉行蔡京當國欲快己私請降御筆出於法令之外前後牴牾宜令具錄付編修敕令所參用國初以來條法刪修成書詔從其請書不果成高宗播遷斷例散逸建炎以前凡所施行類出人吏省記三年四月始命取嘉祐條法與政和敕令對修而用之嘉祐法與見行不同者自官制役法外賞格從重條約從輕紹興元年書成號紹興敕令格式而吏胥省記者亦復引用監察御史劉一止言法令具在吏猶得以為姦今一切用其所省記欺蔽何所不至十一月乃詔左右司敕令所刊定省記之文頒之時在京通用敕內有已嘗衝改不該引用之文因大理正張柄言亦詔刪削十年右僕射秦檜上之然自檜專政率用都堂批狀指揮行事雜入吏部續降條冊之中修書者有所畏忌不敢刪削至與成法並立吏部尚書周麟之言非天子不議禮不制度不考文乃詔削去之至乾道時臣僚言紹興以來續降指揮無慮數千牴牾難以考據詔大理寺官詳難定其可否類申刑部以所隸事目分送六部長貳參詳六年刑部侍郎汪大猷等上其書號乾道敕令格式八年頒之當是時法令雖具然吏一切以例從事法當然而無例則事皆泥而不行甚至隱例以壞法賄賂既行乃為具例淳熙初詔除刑部許用乾道刑名斷例司勳許用獲盜推賞例幷乾道經置條例事指揮其餘並不得引例既而臣僚言乾道新書尚多牴牾詔戶部尚書蔡洸詳定之凡刪改九百餘條號淳熙敕令格式帝復以其書散漫用法之際官不暇徧閱吏因得以容姦令敕令所分門編類為一書名曰淳熙條法事類前此法令之所未有也四年七月頒之淳熙末議者猶以新書尚多遺闕有司引用間有便於人情者復令刑部詳定迄光宗之世未成慶元四年右丞相京鏜始上其書為百二十卷號慶元敕令格式理宗寶慶初敕令所言自慶元新書之行今二十九年前指揮殆非一事或舊法該括未盡文意未明須用續降參酌者或舊法元無而後因事立為成法者或已有舊法而續降不必引用者或一時權宜而不可為常法者條目滋繁無所遵守乞攷定之淳祐二年四月敕令所上其書名淳祐敕令格式十一年又取慶元法與淳祐新書刪潤其間修改者百四十條創入者四百條增入者五十條刪去者十七條為四百三十卷度宗以後遵而行之無所更定矣其餘一司一路一州一縣敕前後時有增損不可勝紀云五季衰亂禁罔煩密宋興削除苛峻累朝有所更定法吏寖用儒臣務存仁恕凡用法不悖而宜于時者著之太祖受禪始定折杖之制凡流刑四加役流脊杖二十配役三年流三千里脊杖二十二千五百里脊杖十八二千里脊杖十七並配役一年凡徒刑五徒三年脊杖二十徒二年半脊杖十八二年脊杖十七一年半脊杖十五一年脊杖十三凡杖刑五杖一百臀杖二十九十臀杖十八八十臀杖十七七十臀杖十五六十臀杖十三凡笞刑五笞五十臀杖十下四十三十臀杖八下二十十臀杖七下常行官杖如周顯德五年制長三尺五寸大頭闊不過二寸厚及小頭徑不得過九分徒流笞通用常行杖徒罪決而不役先是藩鎮跋扈專殺為威朝廷姑息率置不問刑部按覆之職廢矣建隆三年令諸州奏大辟案須刑部詳覆尋如舊制大理寺詳斷而後覆于刑部凡諸州獄則錄事參軍與司法掾參斷之自是內外折獄蔽罪皆有官以相覆察又懼刑部大理寺用法之失別置審刑院讞之吏一坐深或終身不進由是皆務持平唐建中令竊盜贓滿三匹者死武宗時竊盜贓滿千錢者死宣宗立乃罷之漢乾祐以來用法益峻民盜一錢抵極法周初深懲其失復遵建中之制帝猶以其太重嘗增為錢三千陌以八十為限既而詔曰禁民為非乃設法令臨下以簡必務哀矜竊盜之生本非巨𢀿近朝立制重於律文非愛人之旨也自今竊盜贓滿五貫足陌者死舊法強盜持杖雖不傷人皆棄市又詔但不傷人者止計贓論令諸州獲盜非狀驗明白未得掠治其當訊者先具白長吏得判乃訊之凡有司擅掠囚者論為私罪時天下甫定刑典弛廢吏不明習律令牧守又多武人率意用法金州防禦使仇超等坐故入死罪除名流海島自是人知奉法矣開寶二年五月帝以暑氣方盛深念縲繫之苦乃下手詔兩京諸州令長吏督獄掾五日一檢視洒掃獄戶洗滌杻械貧不能自存者給飲食病者給醫藥輕繫即時決遣毋淹滯自是每仲夏申敕官吏歲以為常帝每親錄囚徒專事欽恤凡御史大理官屬尤嚴選擇嘗謂侍御史知雜馮炳曰朕每讀漢書見張釋之于定國治獄天下無寃民此所望於卿也賜金紫以勉之八年廣州言前詔竊盜贓至死者奏裁嶺南遐遠覆奏稽滯請不俟報帝覽奏惻然曰海隅習俗貪獷穿窬固其常也因詔嶺南民犯竊盜贓滿五貫至十貫者決杖黥面配役十貫以上乃死太宗在御常躬聽斷在京獄有疑者多臨決之每能燭見隱微太平興國六年下詔曰諸州大獄長吏不親決胥吏旁緣為姦逮捕證佐滋蔓踰年而獄未具自今長吏每五日一慮囚情得者即決之復制聽獄之限大事四十日中事二十日小事十日不他逮捕而易決者毋過三日後又定令決獄違限準官書稽程律論踰四十日則奏裁事須證逮致稽緩者所在以其事聞然州縣禁繫往往猶以根窮為名追擾輒至破家因江西轉運副使張齊賢言令外縣罪人五日一具禁放數白州州獄別置曆長吏檢察三五日一引問疏理月具奏上刑部閱其禁多者命官即往決遣寃滯則降黜州之官吏會兩浙運司亦言部內州繫囚滿獄長吏輒隱落妄言獄空蓋懼朝廷詰其淹滯乃詔妄奏獄空及隱落囚數必加深譴募告者賞之先是諸州流罪人皆錮送闕下所在或寅緣細微道路非理死者十恆六七張齊賢又請凡罪人至京擇清強官慮問若顯負沈屈致罷官吏且令只遣正身家屬俟旨其干繫者免錮送迺詔諸犯徒流罪並配所在牢城勿復轉送闕下雍熙元年令諸州十日一具囚帳及所犯罪名繫禁日數以聞俾刑部專意糾舉帝閱諸州所奏獄狀有繫三百人者迺令門留寄禁取保在外幷邸店養疾者咸準禁數件析以聞其鞫獄違限及可斷不斷事小而禁繫者有司駁奏之開封女子李嘗擊登聞鼓自言無兒息身且病一旦死家業無所付詔本府隨所欲裁置之李無它親獨有父有司因繫之李又詣登聞訴父被縶帝駭曰此事豈當禁繫輦轂之下尚或如此又下至廣安得無枉濫乎朕恨不能親決四方之獄固不辭勞爾即日遣殿中侍御史李範等十四人分往江南兩浙四川荊湖嶺南審決刑獄吏之薥怠者劾其罪以聞其臨事明敏刑獄無滯者亦以名上始令諸州十日一慮囚帝嘗謂宰相曰御史臺閤門之前四方綱準之地頗聞臺中鞫獄御史多不躬親垂簾雍容以自尊大鞫按之任委在胥吏求無寃濫豈可得也乃詔御史決獄必躬親毋得專任胥吏又嘗諭宰臣曰每閱大理奏案節目小未備移文按覆動涉數千里外禁繫淹久甚可憐也卿等詳酌非人命所係即量罪區分勿須再鞫始令諸州笞杖罪不須證逮者長吏即決之勿復付所司羣臣受詔鞫獄獄既具騎置來上有司斷已復騎置下之州凡上疑獄詳覆之而無疑狀官吏並同違制之坐其應奏疑案亦騎置以聞二年令竊盜滿十貫者奏裁七貫決杖黥面隸牢城五貫配役三年三貫二年一貫一年它如舊制八月復分遣使臣按巡諸道帝曰朕於獄犴之寄夙夜焦勞慮有寃滯耳十月親錄京城繫囚遂至日旰近臣或諫勞苦過甚帝曰儻惠及無告使獄訟平允不致枉橈朕意深以為適何勞之有因謂宰相曰中外臣僚若皆留心政務天下安有不治者古人宰一邑守一郡使飛蝗避境猛虎渡河況能惠養黎庶申理寃滯豈不感召和氣乎朕每自勤不怠此志必無改易或云有司細故帝王不當親決朕意則異乎是若以尊極自居則下情不能上達矣自是祁寒盛暑或雨雪稍愆輒親錄繫囚多所原減諸道則遣官按決率以為常後世遵行不廢見各帝紀先是太祝刁衎上疏言古者投姦人於四裔今乃遠方囚人盡歸象闕配務役神京天子所居豈可使流囚於此聚役禮曰刑人于市與衆棄之則知黃屋紫宸之中非行法用刑之所望自今外處罪人勿許解送上京亦不留於諸務充役御前不行決罰之刑殿前引見司鉗黥法具敕杖皆以付御史廷尉京府或出中使或命法官具禮監科以重明刑謹法之意帝覽疏甚悅降詔褒答然不能從也三年始用儒士為司理判官令諸州訊囚不須衆官共視申長吏得判乃訊囚刑部張佖言官吏枉斷死罪者請稍峻條章以責其明慎始定制應斷獄失入死刑者不得以官減贖檢法官判官皆削一任而檢法仍贖銅十斤長吏則停任尋置刑部詳覆官六員專閱天下所上案牘勿復遣鞫獄吏置御史臺推勘官二十人皆以京朝官為之凡諸州有大獄則乘傳就鞫陛辭日帝必臨遣諭之曰無滋蔓無留滯咸賜以裝錢還必召問所推事狀著為定令自是大理寺杖罪以下須刑部詳覆又所駁天下案牘未具者亦令詳覆乃奏判刑部李昌齡言舊制大理定刑送部詳覆官入法狀主判官下斷語乃具奏至開寶六年闕法直官致兩司共斷定覆詞今宜令大理所斷案牘寺官印署送詳覆得當則送寺共奏否即疏駁以聞淳化初始置諸路提點刑獄司凡管內州府十日一報囚帳有疑獄未決即馳傳往視之州縣稽留不決按讞不實長吏則劾奏佐史小吏許便宜按劾從事帝又慮大理刑部吏舞文巧詆置審刑院於禁中以樞密直學士李昌齡知院事兼置詳議官六員凡獄上奏先達審刑院印訖付大理寺刑部斷覆以聞乃下審刑院詳議申覆裁決訖以付中書省當即下之其未允者宰相覆以聞始命論決蓋重慎之至也凡大理寺決天下案牘大事限二十五日中事二十日小事十日審刑院詳覆大事十五日中事十日小事五日三年詔御史臺鞫徒以上罪獄具令尚書丞郎兩省給舍以上一人親往慮問尋又詔獄無大小自中丞以下皆臨鞫問不得專責所司自端拱以來諸州司理參軍皆帝自選擇民有詣闕稱寃者亦遣臺使乘傳按鞫數年之間刑罰清省矣既而諸路提點刑獄司未嘗有所平反詔悉罷之歸其事轉運司至道二年帝聞諸州所斷大辟情可疑者懼為有司所駁不敢上其獄迺詔死事有可疑者具獄申轉運司擇部內詳練格律者令決之須奏者乃奏真宗性寬慈尤慎刑辟嘗謂宰相曰執法之吏不可輕授有不稱職者當責舉主以懲其濫審刑院舉詳議官就刑部試斷案三十二道取引用詳明者審刑院每奏案令先具事狀親覽之翌日乃候進止裁處輕重必當其罪咸平四年從黃州守王禹偁之請諸路置病囚院徒流以上有疾者處之餘責保于外景德元年詔諸道州軍斷獄內有宣敕不定刑名止言當行極斷者所在即寘大辟頗乖平允自今凡言處斷重斷極斷決配朝典之類未得論決具獄以聞四年復置諸路提點刑獄官先是帝出筆記六事其一曰勤恤民隱遴柬庶官朕無日不念也所慮四方刑獄官吏未盡得人一夫受寃即召災沴今軍民事務雖有轉運使且地遠無由周知先帝嘗選朝臣為諸路提點刑獄今可復置仍以使臣副之命中書樞密院擇官又曰河北陝西地控邊要尤必得人須性度平和有執守者親選太常博士陳綱李及自餘擬名以聞咸引對於長春殿遣之內出御前印紙為曆書其績效代還議功行賞如刑獄枉濫不能擿舉官吏曠薥不能彈奏務從畏避者寘以深罪知審刑院朱巽上言官吏因公事受財證左明白望論以枉法其罪至死者加役流從之御史臺嘗鞫殺人賊獄具知雜王隨請臠咼之帝曰五刑自有常制何為慘毒也入內供奉官楊守珍使陝西督捕盜賊因請擒獲強盜至死者望以付臣凌遲用戒凶惡詔捕賊送所屬依法論決毋用凌遲凌遲者先斷其支體乃抉其吭當時之極法也蓋真宗仁恕而慘酷之刑祖宗亦未嘗用初殿中侍御史趙湘嘗建言聖王行法必順天道漢制大辟之科盡冬月乃斷此古之善政當舉行之且十二月為承天節萬方祝頌之時而大辟決斷如故况十一月一陽始出其氣尚微議獄緩刑所以助陽抑陰也望以十一月十二月內天下大辟未結正者更令詳覆已結正者未令決斷所在厚加矜恤掃除獄房供給飲食薪炭之屬防護無致他故情可憫者奏聽敕裁合依法者盡冬月乃斷在京大辟人既當春孟之月亦行慶施惠之時伏望萬幾之暇臨軒躬覽情可憫者特從末減亦所以布聖澤於無窮况愚民之抵罪未斷兩月亦非淹延若用刑順於陰陽則四時之氣和氣和則百穀豐實水旱不作矣帝覽奏曰此誠嘉事然古今異制沿革不同行之慮有淹滯或因緣為姦矣天禧四年乃詔天下犯十惡劫殺謀殺故殺鬥殺放火強劫正枉法贓偽造符印厭魅咒詛造妖書妖言傳授妖術合造毒藥禁軍諸軍逃亡為盜罪至死者每遇十二月權住區斷過天慶節即決之餘犯至死者十二月及春夏未得區遣禁錮奏裁在仁宗時四方無事戶口蕃息而克自抑畏其於用刑尤慎即位之初詔內外官司聽獄決罪須躬自閱實毋枉濫淹滯刑部嘗薦詳覆官帝記其姓名曰是嘗失入人罪不得遷官者烏可任法吏舉者皆罰金獄疑者讞所從來久矣漢嘗詔讞而後不當讞者不為失所以廣聽察防繆濫也時奏讞之法廢初真宗嘗覽囚簿見天下斷死罪八百人憮然動容語宰執曰雜犯死罪條目至多官吏儻不盡心豈無枉濫故事死罪獄具三覆奏蓋甚重慎何代罷之遂命檢討革而有司終慮淹繫不果行至是刑部侍郎燕肅奏曰唐大辟罪令尚書九卿讞之凡決死刑京師五覆奏諸州三覆奏貞觀四年斷死罪二十九開元二十五年財五十八今天下生齒未加於唐而天聖三年斷大辟二千四百三十六視唐幾至百倍京師大辟雖一覆奏而州郡獄疑上請法寺多所舉駁率得不應奏之罪往往增飾事狀移情就法失朝廷欽恤之意望準唐故事天下死罪皆得覆奏議者必曰待報淹延漢律皆以季秋論囚唐自立春至秋分不決死刑未聞淹留以害漢唐之治也下其章中書王曾謂天下皆一覆奏則必死之人徒充滿狴犴而久不得決諸獄疑若情可矜者聽上請天聖四年遂下詔曰朕念生齒之蕃抵冒者衆法有高下情有輕重而有司巧避微文一切致之重辟豈稱朕好生之志哉其令天下死罪情理可矜及刑名疑慮者具案以聞有司毋得舉駁其後雖法不應奏吏當坐罪者審刑院貼奏率以恩釋為例名曰貼放吏始無所牽制請讞者多得減死矣先是天下旬奏獄狀雖杖笞皆申覆而徒流罪非繫獄乃不以聞六年集賢校理聶冠卿請罷覆杖笞而徒以上雖不繫獄皆附奏詔從其說自定折杖之制杖之長短廣狹皆有尺度而輕重無準官吏得以任情至是有司以為言詔毋過十五兩初真宗時以京師刑獄多滯寃置糾察司而御史臺獄亦移報之八年御史論以為非體遂詔勿報祖宗時重盜剝桑柘之禁枯者以尺計積四十二尺為一功三功以上抵死殿中丞于大成請得以減死論下法官議謂當如舊帝意欲寬之詔死者上請刑部分四按大辟居其一月覆大辟不下二百數而詳覆官纔一人明道二年令四按分覆大辟有能駁正死罪五人以上歲滿改官法直官與詳覆官分詳天下旬奏獄有重辟獄官毋預燕遊迎送凡上具獄大理寺詳斷大事期三十日小事第減十日審刑院詳議又各減半其不待期滿而斷者謂之急按凡集斷急按法官與議者並書姓名議刑有失則皆坐之至景祐二年判大理寺司徒昌運言斷獄有期日而炎暍之時繫囚淹久請自四月至六月減期日之半兩川廣南福建湖南如急按奏其後猶以斷獄淹滯又詔月上斷獄數列大中小事期日以相參考是歲改強盜法不持杖不得財徒二年得財為錢萬及傷人者死持杖而不得財流三千里得財為錢五千者死傷人者殊死不持杖得財為錢六千若持杖罪不至死者仍刺隸千里外牢城能告羣盜劫殺人者第賞之及十人者予錢十萬既而有司言竊盜不用威力得財為錢五千即刺為兵反重於強盜請減之遂詔至十千始刺為兵而京城持杖竊盜得財為錢四千亦刺為兵自是盜法惟京城加重餘視舊益寬矣慶曆五年詔罪殊死者若祖父母父母年八十及篤疾無期親者列所犯以聞承平日久天下生齒益蕃犯法者多歲斷大辟甚衆而有司未嘗上其數嘉祐五年判刑部李綖言一歲之中死刑無慮二千餘夫風俗之薄無甚於骨肉相殘衣食之窮莫急於盜賊今犯法者衆豈刑罰不足以止姦而教化未能導其為善歟願詔刑部類天下所斷大辟歲上朝廷以助觀省從之凡在京班直諸軍請糧斗斛不足出戍之家尤甚倉吏自以在官無祿恣為侵漁神宗謂非所以愛養將士之意於是詔三司始立諸倉丐取法而中書請主典役人歲增祿至一萬八千九百餘緡凡丐取不滿百錢徒一年每百錢則加一等千錢流二千里每千錢則加一等罪止流三千里其行貨及過致者減首罪二等徒者皆配五百里其賞百千流者皆配千里賞二百千滿十千為首者配沙門島賞三百千自首則除其罪凡更定約束十條行之其後內則政府外則監司多倣此法內外歲增吏祿至百餘萬緡皆取諸坊場河渡市利免行役剩息錢久之議臣欲稍緩倉法編敕所修立告捕獲倉法給賞條自一百千分等至三百千而按問者減半給之中書請依所定詔仍舊給全賞雖按問亦全給呂嘉問嘗請行貨者宜止以不應為坐之刑部始減其罪及哲宗初嘗罷重祿法而紹聖復仍舊熙寧四年立盜賊重法凡艹疎盜罪當死者籍其家貲以賞告人妻子編置千里遇赦若災傷減等者配遠惡地罪當徙流者配嶺表流罪會降者配三千里籍其家貲之半為賞妻子遞降等有差應編配者雖會赦不移不釋凡囊橐之家劫盜死罪情重者斬餘皆配遠惡地籍其家貲之半為賞盜罪當徒流者配五百里籍其家貲三之一為賞竊盜三犯杖配五百里或隣州雖非重法之地而囊橐重法之人以重法論其知縣捕盜官皆用舉者或武臣為尉盜發十人以上限內捕半不獲劾罪取旨若復殺官吏及累殺三人焚舍屋百間或羣行州縣之內劫掠江海船之中非重地亦以重論凡重法地嘉祐中始於開封府諸縣後稍及諸州以開封府東明考城長垣縣京西滑州淮南宿州河北澶州京東應天府濮齊徐濟單兗鄆沂州淮陽軍亦立重法著為令至元豐時河北京東淮南福建等路皆用重法郡縣寖益廣矣元豐敕重法地分劫盜五人以上凶惡者方論以重法紹聖後有犯即坐不計人數復立妻孥編管法至元符三年因刑部有請詔改依舊敕先是曾布建言盜情有重輕贓有多少今以贓論罪則劫貧家情雖重而以贓少減免劫富室情雖輕而以贓重論死是盜之生死係於主之貧富也至於傷人情狀亦殊以手足毆人偶傷肌體與夫兵刃湯火固有間矣而均謂之傷朝廷雖許奏裁而州郡或奏或否死生之分特幸與不幸爾不若一變舊法凡以贓定罪及傷人情狀不至切害者皆從罪止之法其用兵刃湯火情狀酷毒乃汙辱良家或入州縣鎮砦行劫若驅虜官吏巡防人等不以傷與不傷凡情不可貸者皆處以死刑則輕重不失其當矣及布為相始從其議詔有司改法未幾侍御史陳次升言祖宗仁政加於天下者甚廣刑法之重改而從輕者至多惟是強盜之法特加重者蓋以禁姦宄而惠良民也近朝廷改法詔以強盜計贓應絞者並增一倍贓滿不傷人及雖傷人而情輕者奏裁法行之後民受其弊被害之家以盜無必死之理不敢告官而鄰里亦不為之擒捕恐怨仇報復故賊益逞重法地分尤甚恐養成大寇以貽國家之患請復行舊法布罷相翰林學士徐勣復言其不便乃詔如舊法前詔勿行先是諸路經略鈐轄不得便宜斬配百姓趙抃嘗知成都乃言當獨許成都四路王安石執不可而中書樞密院同立法許之其後謝景初奏成都妄以便宜誅釋多不當於是中書復刪定敕文惟軍士犯罪及邊防機速許特斷及抃移成都又請立法御史劉孝孫亦為之請依舊便宜從事安石寢其奏武臣犯贓經赦復後更立年考升遷帝曰若此何以戒貪吏故命改法熙寧六年樞密都承旨曾孝寬等定議上之大概倣文臣法而少增損爾七年詔品官犯罪按察之官並奏劾聽旨毋得擅捕繫罷其職奉元豐二年成都府利路鈐轄言往時川峽絹匹為錢二千六百以此估贓兩鐵錢得比銅錢之一近絹匹不過千三百估贓二匹乃得一匹之罪多不至重法令法寺定以一錢半當銅錢之一元祐二年刑部大理寺定制凡斷讞奏獄每二十緡以上為大事十緡以上為中事不滿十緡為小事大事以十二日中事九日小事四日為限若在京八路大事十日中事五日小事三日臺察及刑部舉劾約法狀並十日三省樞密院再送各減半有故量展不得過五日凡公案日限大事以三十五日中事二十五日小事十日為限在京八路大事以三十日中事半之小事三之一臺察及刑部並三十日每十日斷用七日議用三日五年詔命官犯罪事干邊防軍政文臣申尚書省武臣申樞密院中丞蘇轍言舊制文臣吏民斷罪公案歸中書武臣軍士歸樞密而斷例輕重悉不相知元豐更定官制斷獄公案並由大理刑部申尚書省然後上中書省取旨自是斷獄輕重比例始得歸一天下稱明焉今復分隸樞密必有罪同斷異失元豐本意請並歸三省其事干邊防軍政者令樞密院同進取旨則事體歸一而兵政大臣各得其職六年乃詔文武官有犯同按干邊防軍政者刑部定斷仍三省樞密院同取旨刑部論佃客犯主加凡人一等主犯之杖以下勿論徒以上減凡人一等謀殺盜詐有所規求避免而犯者不減因毆致死者不刺面配鄰州情重者奏裁凡命士死於官或去位其送徒道亡則部轄將校節級與首率衆者徒一年情輕則杖百雖自首不免政和間詔品官犯罪三問不承即奏請追攝若情理重害而拒隱方許枷訊邇來有司廢法不原輕重枷訊與常人無異將使人有輕吾爵祿之心可申明條令以稱欽恤之意又詔宗子犯罪庭訓示辱比有去衣受杖傷膚敗體有惻朕懷其令大宗正司恪守條制違者以違御筆論又曰其情理重害別被處分若罪至徒流方許制勘餘止以衆證為定仍取伏辨無得輒加捶考其合庭訓者並送大宗正司以副朕敦睦九族之意中書省言律在官犯罪去官勿論蓋為命官立文其後相因掌典去官亦用去官免罪有犯則解役歸農幸免重罪詔改政和敕掌典解役從去官法左道亂法妖言惑衆先王之所不赦至宋尤重其禁凡傳習妖教夜聚曉散與夫殺人祭祀之類皆著于法訶察甚嚴故姦軌不逞之民無以動搖愚俗間有為之隨輒報敗其事不足紀也
