body:
  text: 宋史卷十九本紀第十九徽宗一徽宗體神合道駿烈遜功聖文仁德憲慈顯孝皇帝諱佶神宗第十一子也母曰欽慈皇后陳氏元豐五年十月丁巳生於宮中明年正月賜名十月授鎮寧軍節度使封寧國公哲宗即位封遂寧郡王紹聖三年以平江鎮江軍節度使封端王出就傅五年加司空改昭德彰信軍節度元符三年正月己卯哲宗崩皇太后垂簾哭謂宰臣曰家國不幸大行皇帝無子天下事須早定章惇厲聲對曰在禮律當立母弟簡王皇太后曰神宗諸子申王長而有目疾次則端王當立惇又曰以年則申王長以禮律則同母之弟簡王當立皇太后曰皆神宗子莫難如此分別於次端王當立知樞密院曾布曰章惇未嘗與臣等商議如皇太后聖諭極當尚書左丞蔡卞中書門下侍郎許將相繼曰合依聖旨皇太后又曰先帝嘗言端王有福壽且仁孝不同諸王於是惇為之默然乃召端王入即皇帝位皇太后權同處分軍國事庚辰赦天下常赦所不原者百官進秩一等賞諸軍遣宋淵告哀于遼辛巳尊先帝后為元符皇后癸未追尊母貴儀陳氏為皇太妃甲申命章惇為山陵使乙酉出先帝遺留物賜近臣丙戌以申王佖為太傅進封陳王賜贊拜不名丁亥進仁宗淑妃周氏神宗淑妃邢氏並為貴妃賢妃宋氏為德妃戊子以章惇為特進封申國公己丑進封莘王俁為衞王守太保簡王似為蔡王睦王偲為定王並守司徒罷增八廂邏卒二月己亥始聽政尊先帝妃朱氏為聖瑞皇太妃壬寅以南平王李乾德為檢校太師丁未立順國夫人王氏為皇后庚戌向宗回宗良遷節度使太后弟姪未仕者俱授以官癸丑初御紫宸殿庚申以吏部尚書韓忠彥為門下侍郎資政殿大學士黃履為尚書右丞辛酉名懿親宅潛邸曰龍德宮甲子毀承極殿丙寅遣吳安憲朱孝孫以遺留物遺遼國主三月戊辰朔詔宰臣執政侍從官各舉可任臺諫者庚午遣韓治曹譜告即位于遼辛未詔追封祖宗諸子光濟等三十三人為王女四十八人為公主甲申以西蕃王隴拶為河西軍節度使尋賜姓名曰趙懷德邈川首領瞎征為懷遠軍節度使己丑以日當食降德音于四京減囚罪一等流以下釋之庚寅錄趙普後辛卯詔求直言癸巳以寧遠軍節度觀察留後世雄為崇信軍節度使封安定郡王乙未却永興民王懷所進玉器夏四月丁酉朔日有食之己亥令監司分部決獄甲辰以韓忠彥為尚書右僕射兼中書侍郎禮部尚書李清臣為門下侍郎翰林學士蔣之奇同知樞密院事乙巳錄曹佾後丁未以帝生日為天寧節己酉長子亶生辛亥大赦天下應元符二年已前係官逋負悉蠲之癸丑鹿敏求等以應詔上書遷秩乙卯請大行皇帝謚于南郊丁巳詔范純仁等復官宮觀蘇軾等徙內郡居住癸亥罷編類臣僚章疏局乙丑賜禮部奏名進士及第出身五百五十八人五月丁卯朔罷理官失出之罰丙子詔復廢后孟氏為元祐皇后乙酉蔡卞罷己丑詔追復文彥博王珪司馬光呂公著呂大防劉摯等三十三人官辛卯還司馬光等致仕遺表恩癸巳河北河東陝西饑詔帥臣計度振恤六月丙申朔遼主遣蕭進忠蕭安世等來弔祭秋七月丙寅朔奉皇太后詔罷同聽政丁卯告哲宗欽文睿武昭孝皇帝謚于天地宗廟社稷戊辰上寶冊于福寧殿癸酉以皇太后還政減天下囚罪一等流以下釋之癸未遣陸佃李嗣徽報謝于遼罷管句陝西京西川路坑冶及江西廣東湖北夔梓成都路管句措置鹽事官辛卯封子亶為韓國公八月戊戌詔諸路遇民有疾委官監醫往視疾給藥庚子作景靈西宮奉安神宗神御建哲宗神御殿於其西辛丑出內庫金帛二百萬糴陝西軍儲壬寅葬哲宗皇帝于永泰陵丙午遣董敦逸賀遼主生辰呂仲甫賀正旦戊申高麗王王熙遣使奉表來慰庚戌詔以仁宗神宗廟永世不祧戊午以蔡王似為太保癸亥祔哲宗神主于太廟廟樂曰大成之舞九月甲子詔修哲宗實錄丙寅遼遣蕭穆來賀即位丁卯減兩京河陽鄭州囚罪一等民緣山陵役者蠲其賦己巳幸龍德宮辛未章惇罷丙子以陳王佖為太尉丁丑詔修神宗史己丑復均給職田冬十月乙未夏國入貢丙申蔡京出知永興軍貶章惇為武昌軍節度副使丁酉以韓忠彥為尚書左僕射兼門下侍郎壬寅以曾布為尚書右僕射兼中書侍郎乙卯升端州為興慶軍己未詔禁曲學偏見妄意改作以害國事者辛酉罷平準務十一月丁卯詔修六朝寶訓降德音于端州減囚罪一等徒以下釋之庚午詔改明年元戊寅以觀文殿學士安燾知樞密院事庚辰黃履罷己丑置春秋博士辛卯令陝西兼行銅鐵錢以禮部尚書范純禮為尚書右丞十二月甲午以皇太后不豫禱于宮觀祠廟嶽瀆戊戌出廩粟減價以濟民辛丑慮囚甲辰詔修國朝會要戊申降德音于諸路減囚罪一等流以下釋之戊午遼人來賀正旦是歲出宮女六十九人建中靖國元年春正月壬戌朔有赤氣起東北亙西南中函白氣將散復有黑祲在旁癸亥有星自西南入尾其光燭地癸酉范純仁薨甲戌皇太后崩遺誥追尊皇太妃陳氏為皇太后丁丑易大行皇太后園陵為山陵命曾布為山陵使己卯令河陝募人入粟免試注官二月丙申雨雹己亥汰秦鳳路土兵甲辰始聽政乙巳出內庫及諸路常平錢各百萬備河北邊儲丁巳貶章惇為雷州司戶參軍三月甲子始御紫宸殿乙丑遼使蕭恭來告其主洪基殂遣謝文瓘上官均等往弔祭黃寔賀其孫延禧立丁丑詔以河西軍節度使趙懷德知湟州壬午以日當食避殿減膳降天下囚罪一等流以下釋之夏四月辛卯朔日食不見甲午上大行皇太后謚曰欽聖憲肅乙未上追尊皇太后謚曰欽慈丁酉御殿復膳壬寅詔諸路疑獄當奏而不奏者科罪不當奏而輒奏者勿坐著為令五月辛酉朔大雨雹詔三省減吏員節冗費丙寅葬欽聖憲肅皇后欽慈皇后于永裕陵庚辰蘇頌薨丙戌祔欽聖憲肅皇后欽慈皇后神主于太廟戊子減兩京河陽鄭州囚罪一等民緣山陵役者蠲其賦六月庚寅朔以韓國公亶為開府儀同三司封京兆郡王戊申封向宗回為永陽郡王向宗良為永嘉郡王甲寅封吳王顥子孝騫為廣陵郡王頵子孝參為信都郡王戊午范純禮罷己未詔班鬬殺情理輕重格秋七月辛巳內郡置添差宗室闕丙戌安燾罷丁亥以蔣之奇知樞密院事吏部尚書陸佃為尚書右丞端明殿學士章楶同知樞密院事九月己巳詔諸路轉運提舉司及諸州軍有遺利可以講求及冗員浮費當裁損者詳議以聞丙戌子檉薨冬十月乙未李清臣罷丁酉天寧節羣臣及遼使初上壽于垂拱殿十一月庚申以陸佃為尚書左丞吏部尚書溫益為尚書右丞壬戌以西蕃賒羅撒為西平軍節度使邈川首領辛未出御製南郊親祀樂章戊寅朝獻景靈宮己卯饗太廟庚辰祀天地于圜丘赦天下改彰信軍為興仁軍昭德軍為隆德軍改明年元十二月壬辰賜陳王佖詔書不名癸卯進神宗昭儀武氏為賢妃丙午奉安神宗神御于景靈西宮大明殿丁未詣宮行禮己酉降德音于四京減囚罪一等徒以下釋之是歲遼人來獻遺留物河東地震京畿蝗江淮兩浙湖南福建旱崇寧元年春正月丁丑太原等十一郡地震詔死者家賜錢有差二月丙戌朔以聖瑞皇太妃疾慮囚甲午子亶改名烜以蔡確配饗哲宗廟庭戊戌詔士有懷抱道德久沈下僚及學行兼備可厲風俗者待制以上各舉所知二人奉議郎趙諗謀反伏誅庚子封子煥為魏國公辛丑聖瑞皇太妃薨追尊為皇太后庚戌追封孔鯉為泗水侯孔伋為沂水侯三月丁巳奉安哲宗神御于景靈西宮寶慶殿戊午詣宮行禮壬戌以定王偲為太保壬申幸定王第夏四月己亥上皇太后謚曰欽成五月丁巳熒惑入斗庚申韓忠彥罷己巳瞎征卒庚午降復太子太保司馬光為正議大夫太師文彥博為太子太保餘各以差奪官辛未詔待制以上舉能吏各二人乙亥黜後苑內侍請以箔金飾宮殿者丙子詔元祐諸臣各已削秩自今無所復問言者亦勿輒言戊寅葬欽成皇后于永裕陵己卯陸佃罷庚辰以許將為門下侍郎溫益為中書侍郎翰林學士承旨蔡京為尚書左丞吏部尚書趙挺之為尚書右丞六月己丑祔欽成皇后神主于太廟壬辰減西京河陽鄭州囚罪一等民緣山陵役者蠲其賦癸卯詔六曹尚書有事奏陳許獨員上殿己酉太白晝見壬子改渝州為恭州癸丑詔倣唐六典修神宗所定官制封伯夷為清惠侯叔齊為仁惠侯閏月甲寅朔更名哲宗神御殿曰重光辛酉慮囚壬戌曾布罷甲子詔諸路州縣官有治績最著者許監司帥臣各舉一人壬午追貶李清臣為武安軍節度副使癸未詔監司帥臣於本路小使臣以上及親民官內有智謀勇果可備將帥者各舉一人秋七月甲申朔建長生宮以祠熒惑丙戌詔省臺寺監及監司郡守並以三年成任戊子以蔡京為尚書右僕射兼中書侍郎己丑焚元祐法甲午詔於都省置講議司詔杭州明州置市舶司庚子章楶罷甲辰以雨水壞民廬舍詔開封府振恤壓溺者辛亥罷春秋博士八月乙卯子烜改名桓煥改名楷乙丑罷權侍郎官辛未置安濟坊養民之貧病者仍令諸郡縣並置甲戌詔天下興學貢士建外學于國南丙子詔司馬光等二十一人子弟毋得官京師己卯以趙挺之為尚書左丞翰林學士張商英為尚書右丞九月戊子京師置居養院以處魚眾寡孤獨仍以戶絕財產給養乙未詔中書籍元符三年臣僚章疏姓名為正上正中正下三等邪上邪中邪下三等丁酉治臣僚議復元祐皇后及謀廢元符皇后者罪降韓忠彥曾布官追貶李清臣為雷州司戶參軍黃履為祁州團練副使竄曾肇以下十七人己亥籍元祐及元符末宰相文彥博等侍從蘇軾等餘官秦觀等內臣張士良等武臣王獻可等凡百有二十人御書刻石端禮門庚子以元符末上書人鍾世美以下四十一人為正等悉加旌擢范柔中以下五百餘人為邪等降責有差時世美已卒詔贈官仍官其子一人壬寅貶曾布為武泰軍節度副使甲辰詔元符三年建中靖國元年責降臣僚已經牽復者其元責告命並繳納尚書省冬十月癸亥蔣之奇罷戊辰詔責降宮觀人不得同一州居住甲戌以御史錢遹石豫左膚及輔臣蔡京許將溫益趙挺之張商英等言罷元祐皇后之號復居瑤華宮丙子劉奉世等二十七人坐元符末黨與變法並罷祠祿戊寅以資政殿學士蔡卞知樞密院事十一月乙酉邵州言知溪洞徽州楊光銜內附戊子以婉儀鄭氏為賢妃辛卯置河北安濟坊癸巳置西南兩京宗正司及敦宗院戊戌置顯謨閣學士待制官戊申子楷為開府儀同三司封高密郡王己酉立卿監郎官三歲黜陟法十二月癸丑論棄湟州罪貶韓忠彥為崇信軍節度副使曾布為賀州別駕安燾為寧國軍節度副使范純禮分司南京庚申鑄當五錢辛酉贈哲宗子鄧王茂為皇太子謚獻愍丁丑詔諸邪說詖行非先聖賢之書及元祐學術政事並勿施用是歲京畿京東河北淮南蝗江浙熙河漳泉潭衡郴州興化軍旱辰沅州徭入寇出宮女七十六人二年春正月辛巳朔乙酉竄任伯雨陳瓘龔夬鄒浩于嶺南馬涓等九人分貶諸州知荊南舒亶平辰沅州徭賊復誠徽州改誠州為靖州徽州為蒔竹縣壬辰溫益卒乙巳以復荊湖疆土曲赦兩路丙午以沍寒令監司分部決獄丁未以蔡京為尚書左僕射兼門下侍郎二月辛亥安化蠻入寇廣西經略使程節敗之壬子遣官相度湖南北徭地取其材植入供在京營造甲寅進元符皇后為太后宮名崇恩辛酉置殿中監癸亥奉安哲宗御容于西京會聖宮及應天院丙子置諸路茶場三月壬午進仁宗充儀張氏為賢妃乙酉減西京囚罪一等詔黨人子弟毋得擅到闕下其應緣趨附黨人罷任在外指射差遣及得罪停替臣僚亦如之丁亥御集英殿策進士癸卯賜禮部奏名進士及第出身五百三十八人其嘗上書在正等者升甲邪等者黜之夏四月甲寅詔侍從官各舉所知二人乙卯于闐入貢丁卯詔毀呂公著司馬光呂大防范純仁劉摯范百祿梁燾王巖叟景靈西宮繪像己巳以初謁景靈宮赦天下乙亥詔毀刊行唐鑑并三蘇秦黃等文集戊寅以趙挺之為中書侍郎張商英為尚書左丞戶部尚書吳居厚為尚書右丞兵部尚書安惇同知樞密院事奪王珪贈謚追毀程頤出身文字其所著書令監司覺察五月辛巳以賢妃鄭氏為淑妃癸未以陳王佖為太師丙戌貶曾布為廉州司戶參軍己亥封子楫為楚國公丙午冊元符皇后劉氏為太后六月壬子冊王氏為皇后庚申詔元符末上書進士類多詆訕令州郡遣入新學依太學自訟齋法候及一年能革心自新者許將來應舉其不變者當屏之遠方壬戌慮囚是月中太一宮火復湟州秋七月己卯學士院火辛巳以復湟州進蔡京官三等蔡卞以下二等壬午白虹貫日甲申降德音于熙河蘭會路減囚罪一等流以下釋之庚寅曾肇責授濮州團練副使辛卯詔上書進士見充三舍生者罷歸丁酉詔自今戚里宗屬勿復為執政官著為令乙巳詔責降人子弟毋得任在京及府界差遣八月丁未朔再論棄湟州罪貶韓忠彥為磁州團練副使安燾為祁州團練副使范純禮為靜江軍節度副使削蔣之奇秩三等戊申張商英罷辛酉詔張商英入元祐黨籍九月辛巳詔宗室不得與元祐姦黨子孫為婚姻庚寅封子樞為吳國公詔上書邪等人知縣以上資序並與外祠選人不得改官及為縣令壬辰置醫學癸巳令天下郡皆建崇寧寺辛丑改吏部選人自承直郎至將仕郎七階令天下監司長吏廳各立元祐姦黨碑甲辰詔郡縣謹祀社稷冬十一月庚辰以元祐學術政事聚徒傳授者委監司察舉必罰無赦十二月癸亥祧宣祖皇帝昭憲皇后丙寅詔六曹長貳歲考郎官治狀分三等以聞是歲諸路蝗纂府蠻楊晟銅融州楊晟天邵州黃聰內附三年春正月己卯安化蠻降辛巳詔上書邪等人毋得至京師戊子鑄當十大錢壬辰增縣學弟子員甲午賜蔡京子攸進士出身癸卯太白晝見甲辰鑄九鼎二月丙午以淑妃鄭氏為貴妃以刊定元豐役法不當黜錢遹以下九人丁未置漏澤園己酉詔王珪章惇別為一籍如元祐黨詔自今御後殿許起居郎舍人侍立壬子以楚國公楫為開府儀同三司封南陽郡王庚申令天下坑冶金銀復盡輸內藏辛未雨雹三月辛巳置文繡院丁亥作圜土以居強盜貸死者甲午躋欽成皇后神主於欽慈皇后之上辛丑大內災夏四月乙巳以火災降德音于四京減囚罪一等流以下原之乙卯復鄯州建為隴右都護府辛酉徙封楫為樂安郡王復廓州乙丑罷講議司己巳曲赦陝西壬申楫薨五月戊寅罷開封權知府置牧尹少尹改定六曹以士戶儀兵刑工為序增其員數倣唐六典易胥吏之稱己卯以復鄯廓蔡京為守司空封嘉國公庚辰許將趙挺之吳居厚安惇蔡卞各轉三官甲申改鄯州為西寧州仍為隴右節度辛丑詔黜守臣進金助修宮庭者六月壬寅朔圖熙寧元豐功臣於顯謨閣癸卯以王安石配饗孔子廟丙午增諸州學未立者壬子置書畫算學占城入貢戊午詔重定元祐元符黨人及上書邪等者合為一籍通三百九人刻石朝堂餘並出籍自今毋得復彈奏辛酉復置太醫局癸亥慮囚乙丑詔內外官毋得越職論事僥倖奔競違者御史臺彈奏秋七月癸酉以婉儀王氏為德妃庚辰詔自今大禮不受尊號羣臣毋上表辛卯行方田法八月庚子詔諸路知州通判增入主管學事四字壬寅大雨壞民廬舍令收瘞死者甲辰蔡京上神宗史丙午許將罷九月乙亥以趙挺之為門下侍郎吳居厚為中書侍郎翰林學士承旨張康國為尚書左丞刑部尚書鄧洵武為尚書右丞壬辰詔諸路州學別置齋舍以養材武之士冬十月辛丑朔大雨雹丁未賢妃張氏薨丙辰命官編類六朝勳臣戊午夏人入涇原圍平夏城寇鎮戎軍庚申熙河蘭會路經略安撫使王厚言河西軍度使趙懷德等出降己巳立九廟復翼祖宣祖庚午貴妃邢氏薨十一月甲戌幸太學官論定之士十六人遂幸辟雍賜國子司業吳絪蔣靜四品服學官推恩有差丙戌封子嵵為冀國公丁亥詔取士並繇學校罷發解及省試法科場如故事癸巳更上神宗謚曰體元顯道帝德王功英文烈武欽仁聖孝皇帝加上哲宗謚曰憲元繼道顯德定功欽文睿武齊聖昭孝皇帝甲午朝獻景靈宮乙未饗太廟丙申祀昊天上帝于圜丘赦天下升興仁隆德軍為府還彰信昭德舊節十二月乙巳升通遠軍為鞏州戊午賜陳王佖入朝不趨是歲諸路蝗出宮女六十二人廣西黎洞楊晟免等內附
