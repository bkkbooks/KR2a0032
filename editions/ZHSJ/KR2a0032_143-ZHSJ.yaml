body:
  text: 宋史卷一百四十三志第九十六儀衞一殿庭立仗綦天下之貴一人而已是故環拱而居備物而動文謂之儀武謂之衞一以明制度示等威一以慎出入遠危疑也書載弁戈冕劉虎賁車輅周官旅賁王出入執盾以夾王車朝儀之制固已粲然降及秦漢始有周廬陛戟鹵簿金根大駕法駕千乘萬騎之盛歷代因之雖或損益然不過為尊大而已宋初因唐五代之舊講究修葺尤為詳備其殿庭之儀則有黃麾大仗黃麾半仗黃麾角仗黃麾細仗凡正旦冬至及五月一日大朝會大慶冊受賀受朝則設大仗月朔視朝則設半仗外國使來則設角仗發冊授寶則設細仗其鹵簿之等有四一曰大駕郊祀大饗用之二曰法駕方澤明堂宗廟籍田用之三曰小駕朝陵封祀奏謝用之四曰黃麾仗親征省方還京用之南渡之後務為簡省此其大較也若夫臨時增損用置不同則有國史會要禮書具在今取所載撮其凡為儀衞志殿庭立仗本充庭之制唐禮殿庭屯門皆列諸衞黃麾大仗宋興太祖增創錯繡諸旗幷幡氅等著于通禮正至五月一日御正殿則陳之青龍白虎旗各一分左右五嶽旗五在左五星旗五在右五方龍旗二十五在左五方鳳旗二十五在右紅門神旗二十八分左右朱雀真武旗各一分左右皁纛十二分左右以上金吾天一太一旗各一分左右攝提旗二分左右五辰旗五北斗旗一分左右木火北斗在左金水土在右二十八宿各一角宿至壁宿在左奎宿至軫宿在右風伯雨師旗各一分左右白澤馴象仙鹿玉兔馴犀金鸚鵡瑞麥孔雀野馬犛牛旗各二分左右日月合璧旗一在左五星連珠旗一在右雷公電母旗各一分左右軍公旗六分左右黃鹿飛麟兕騶牙白狼蒼烏辟邪網子貔旗各二分左右信幡二十二分左右傳教告止幡各十二分左右黃麾二分左右以上兵部日旗月旗各一分左右君王萬歲旗一在左天下太平旗一在右獅子旗二分左右金鸞金鳳旗各一分左右五方龍旗各一青赤在左黃白黑在右以上龍墀龍君虎君旗各五分左右赤豹黃羆旗各五分左右小黃龍旗一在左天馬旗一在右吏兵力士旗各五分左右天王旗四分左右太歲旗十二分左右天馬旗六分左右排闌旗六十分左右左右幡氅各五行行七十五大黃龍旗二分左右大神旗六分左右以上六軍神宗元豐二年詳定所言正旦御殿合用黃麾仗案唐開元禮冬至朝會及皇太子受冊加元服冊命諸王大臣朝宴外國亦皆用之故事皇帝受羣臣上尊號諸衞各率其屬勒所部屯門殿庭列仗衞今獨修正旦儀注而餘皆未及欲乞冬會等儀悉加詳定詔從之又言御殿儀仗有黃麾幡三而無黃麾請製大麾一注旄於干首以取夏制黃色以取漢制用十二幅以取唐制用一旒以取今龍墀旗之制建於當御廂之前以為表識其當御廂之後則建黃麾幡二上謂蔡確等曰黃麾制度終有可疑今鑿而為植於大庭夷夏共瞻或致博聞多識者譏議非善宜姑闕之乃止三年詳定所言昨定朝會圖於大慶殿橫街北止陳大輦逍遙平輦而輿未陳也當大輦之南增腰輿一小輿一古者扇翣皆編次雉羽或尾為之故於文從羽唐開元改為孔雀凡大朝會陳一百五十有六分居左右國朝復雉尾之名而四面略為羽毛之形中繡雙孔雀又有雙盤龍扇皆無所本遂改製偏扇團方扇為三等繡雉凡朝會平輦逍遙並陳於東西龍墀上徽宗政和三年議禮局上大慶殿大朝會儀衞黃麾大仗五千二十五人仗首左右廂各二部絳引幡十執各一人第一部左右領軍衞大將軍各一員第二部左右領軍衞折衝掌鼓一人帥兵官一十人次執儀刀部十二行每行持各十人後部並仗同第一行黃雞四角氅凡氅皆持以龍頭竿第二儀鍠五色幡第三青孔雀五角氅第四烏戟第五緋鳳六角氅第六細弓矢第七白鵝四角氅第八朱縢絡盾刀第九皁鵝六角氅第十細弓矢第十一矟第十二綠縢絡盾刀揭鼓二掌鼓二人後部同以上排列左右廂第一部各於軍員之南居次廂第一部稍前第二部於第一部之後並相向次廂左右各三部第一左右屯衞第二左右武衞並大將軍第三左右衞將軍各一員第一果毅第二第三折衝各一員於仗首左右廂第一部之南相向持黃麾幡二人在當御廂前分立當御廂左右各一部左右衞果毅各一人於玉輅之前分左右並北向次後廂左右各三部第一左右驍衞將軍第二左右領軍衞折衝第三左右領軍衞果毅各一員第一部分於當御廂之左右差後第二部左在金輅之後西偏右在象輅之後東偏第三部左在革輅之後西偏右在木輅之後東偏並北向次左右廂各三部第一左右武衞將軍第二左右屯衞將軍第三左右領軍衞折衝各一員各在網子鶡雞貔旗之前東西相向左右廂各步甲十二隊第一隊左右衞果毅第二左右衞第四左右驍衞第六左右武衞第八左右屯衞第十第十二左右領軍衞並折衝第三左右驍衞第五左右武衞第七左右屯衞第九第十一左右領軍衞並果毅各一員每隊旗一貔鶡雞仙鹿金鸚鵡瑞麥孔雀野馬犛牛甘露網子內第十二隊旗同第一隊刀盾弓矢相間分十二隊每隊三十人五重第一至第六隊在仗首第二部北第七至第十二隊在仗首第二部南東西相向左右廂後部各十二隊第一第二左右衞第五至第七左右武衞第十至第十二左右領軍衞並折衝第三第四左右驍衞第八第九左右屯衞並果毅每隊旗二角赤熊兕太平馴犀夋鳥月人丁騶牙蒼烏白狼龍馬金牛次弩五人為一列弓矢十人為二重矟二十人為四重以上在大慶殿門外第一至第四隊在前第五至第八隊在後第九至第十二隊又在後東西相向真武隊金吾折衝都尉一員仙童真武螣蛇神龜旗各一執各一人犦矟二人弩五人為一列弓矢二十人為四重矟二十五人為五重以上在大慶門外中道北向排列殿中省尚輦陳孔雀扇四十於簾外執各一人陳輦輿於龍墀大輦在東部押執擎人二百二十有二人腰輿在南一十有七人小輿又在南二十有五人皆西向平輦在西逍遙在南共三十七人皆東向設繖扇於沙墀方繖二分左右執繖將校四人團龍扇四分左右執扇都將四人方雉扇一百分繖扇之後為五行執扇長行一百人押當職掌二人各立團龍扇之北金吾引駕官二人分立團扇之南文德殿入閤之制唯殿中省細仗與兩省供奉官班於庭太宗淳化三年增黃麾仗二百五十人神宗熙寧三年修閤門儀制宋敏求言本朝惟入閤乃御文德殿視朝今既不用入閤儀即文德殿遂闕視朝之禮乞下兩制及太常禮院約唐御宣政殿制裁定以備朔望正衙視朝之禮詔學士院詳定學士韓維等上其儀朔前一日有司供張於文德殿庭東面左金吾引駕官一人四色官二人各帶儀刀被金甲天武官一人判殿中省一人排列官一人扇二方繖一金吾仗碧襴十二各執儀刀兵部儀仗排列職掌一人押隊員僚二人黃麾幡一告止幡傳教幡信幡各八龍頭竿戟各五十西面右金吾引駕官以下皆如東面天武官東西總百人門外立仗其東青龍旗一五嶽旗五五龍旗十其西白虎旗一五星旗五五鳳旗十御馬東西皆五匹每匹人員二人御龍官四人設御幄於殿後閤其日左右金吾將軍常服押本衞仗殿中省官押細仗東西對列俟皇帝受朝降坐放仗乃退徽宗政和三年議禮局上文德殿視朝之制黃麾半仗共二千二百六十五人殿內仗首左右廂各一部每部一百二十四人在金吾仗南東西相向絳引幡十執各一人分部之南北為五重當御廂左右部同左部在帥兵官東右部在帥兵官西各為十重左右領軍衞大將軍各一員居部之中次廂左右第一第二第三部同掌鼓一人次大將軍後次廂左右第一部幷當御廂左右部次果毅次廂左右第二第三部次折衝次後廂左右部次將軍帥兵官十人分部之南北為五重北在絳引幡之南南在絳引幡之北次廂左右第一第二第三部在部之南北當御廂次後廂左部在黃氅東右部在黃氅西執儀刀部十行行十人每色兩行為五重次廂左右第一第二第三部同當御廂次後廂左右部每色一行為十重左部以東為首右部以西為首並次帥兵官第一行龍頭竿黃雞四角氅凡氅皆持以龍頭竿第二儀鍠五色幡第三青孔雀五角氅第四烏戟第五緋鳳六角氅第六細弓矢第七白鵝四角氅第八朱縢絡盾刀第九皁鵝六角氅第十矟揭鼓二掌揭鼓二人分立緋氅烏戟後當中次廂左右第一第二第三部同當御廂次後廂並一在儀鍠青氅間一在弓矢白氅間與後行齊次廂左右各三部每部一百一十五人次左右廂仗首之南東西相向第一部左右屯衞大將軍及果毅各一員第二部左右武衞大將軍第三部左右衞將軍各一員折衝各一員黃麾幡二分立當御左右廂前中間北向當御廂左右各一部每部一百二十四人在殿門內中道分東西並北向次後廂左右部同大慶殿列於樂架之南左右衞果毅各一員左在部西右在部東次後左右廂將軍准此次後廂左右各一部每部一百一十四人次當御廂南左右驍衞將軍各一員左右廂各步軍六隊第一隊每隊三十三人第二至第六隊每隊各二十七人分東西在仗隊後第一左右衞第三左右武衞第五左右領軍衞並果毅各一員第二左右驍衞第四左右屯衞第六左右領軍衞並折衝各一員每隊旗二貔金鸚鵡瑞麥犛牛甘露鶡雞執各一人刀盾弓矢相間人數行列同前左右廂步軍殿門外左右廂後部各六隊每隊三十八人在部下親從後東西相向第一隊左右衞第三左右武衞第五左右領軍衞並折衝各一員第二左右驍衞第四第六左右屯衞並果毅各一員角太平馴犀騶牙白狼蒼烏等旗各二弩五人為一列弓矢十人為二重矟二十人為四重真武隊五十七人在端禮門內中道北向大慶殿於殿門外前有金吾折衝都尉一員仙童真武螣蛇神龜等旗各一犦矟二人弩五人為一列弓矢二十人為四重矟二十五人為五重排列仗隊職掌六人分立仗隊之間殿內四人殿外二人殿中省尚輦陳扇二十於簾外執扇殿侍二十人陳腰輿小輿於東西朵殿腰輿在東小輿在西人員都將各一人輦官共四十人陳繖扇於殿下方繖二團龍扇四並分左右夾繖執扇各一人將校或節級方雉扇六十作三重在繖扇之後輦官長行各一人金吾左右將軍各一員在繖扇之南稍前四色官四人二人立於將軍之南與繖扇一列宣敕放仗二人在引駕官南執儀刀引駕官二人在親從官後長行二十四人在四色官之南排列官二人在長行之南次金甲天武官二人在長行南以上並分東西相向立設旗於殿門之外青龍旗一在左五嶽神旗各一次之五方色龍旗各一次之五方色龍旗各一又次之白虎旗一在右五星神旗各一次之五方色鳳旗各一次之五方色鳳旗各一又次之詔頒行之大慶殿冊命諸王大臣黃麾仗準文德殿視朝政和中大祀饗立仗大黃龍負圖旗一執二百人陳于闕庭赤龍旗南少西大黃龍旗之北宣和冬祀陳于大內前大黃龍旗一執六十人陳于逐頓宮門外宣德門次大黃龍負圖旗之南宣和此旗下又有日月五星連珠北斗招搖蒼龍白虎朱雀玄武君王萬歲獅子金鸞金鳳五方龍天下太平等旗凡二十一正至受朝同龍墀旗陳於殿庭太廟在西櫺星門外路南次赤龍旗少北青城在泰禋門外夏祭大禮在明禋門外赤龍旗之南宗祀祫饗大禮不設大黃龍負圖旗大黃龍旗大神旗六執各九十人宣德門泰禋門並陳于大黃龍旗之南東西相望太廟陳于西櫺星門外大黃龍旗之西少南視赤龍旗為列南北相望龍墀旗執各十二人左右有日月旗各一次君王萬歲旗一宣德門泰禋門在