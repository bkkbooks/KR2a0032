body:
  text: 宋史卷三十一本紀第三十一高宗八二十三年春正月癸卯進韋淵太傅己酉復以李顯忠為寧國軍節度使二月癸亥幸玉津園遂幸延祥觀庚午臠虔州軍賊黃明等八人于都市辛未改虔州為贛州壬申申嚴冒貫請舉法癸未賞平贛盜功以李耕為金州觀察使將士進秩給賞有差三月丙午齊安郡王士薨于建州追封循王詔凡民認復軍莊營田者償開耕錢丁未禁州縣都監巡尉擅置刑獄戊申以前太府丞范彥輝謗訕除名荊門軍編管是春金主亮徙都燕京夏四月辛巳詔諸州編管羈管人遵舊法長吏月一驗視不許囚禁乙酉減利州歲鑄錢為九萬緡五月庚寅禁州縣以私意籍罪人貲產乙巳復以蕭振為四川制置使辛亥金遣紇石烈大雅等來賀天申節乙卯立淮南諸州舉人解額六月己卯潼川大水秋七月壬辰寬理平江府湖秀二州被水民夏稅戊戌從秦檜所請命台州取綦崇禮草檜罷相制所受墨敕庚戌禁諸軍瀕太湖擅作壩田八月乙丑士撙薨追封韶王丙寅左宣教郎王孝廉謀據成都叛事覺伏誅己卯賜秦檜建康府永豐圩田乙酉命敕令所編輯中興以後寬恤詔令九月甲午振潼川被水州縣仍蠲其賦庚子禁採鹿胎冬十月丁巳詔郡守年七十者聽自陳命主宮觀戊午遣吳石凾使金賀正旦施鉅賀金主生辰戊辰宋樸罷壬申以右諫議大夫史才簽書樞密院事兼權參知政事丁丑遣戶部郎官鍾世明修築宣州太平州圩田是月命大理鞫妖人孫士道獄十一月壬寅詔立張叔夜廟于信州甲辰班大宗正司條令乙巳以經筵終帙賜宰執講讀等官宴于祕書省為故事十二月丁巳詔州縣稅額少者罷其監官癸亥韋淵薨癸未禁民車服踰制閏月丙申命檢正都司官詳定郡守所上利病以聞辛丑命諸軍保任統制官在職十年無過者進秩庚戌金遣蔡松年等來賀明年正旦是歲減池州青陽縣田租萬七千石二十四年春正月辛未幸延祥觀癸酉初詔郡國同以八月十五日試舉人丙子封婉容劉氏為貴妃戊寅地震二月丁亥前左從政郎楊炬坐其弟煒嘗上書誹謗送邕州編管丙午加吳益太尉三月壬申楊再興復寇邊前軍統制李道討平之禽再興及其子正脩正拱檻送行在乙亥賜禮部進士張孝祥以下三百五十六人及第出身庚辰秦檜以私憾捃摭知建康府王循友詔大理鞫之是春始榷夔州路茶夏四月丙戌詔諸路招補三衙諸軍期三年課其殿最辛丑西南小張蕃貢方物己酉羅殿國貢名馬五月癸丑朔日有食之衢州民俞八作亂圍州城通判州事汪召錫拒卻之遂掠嚴州壽昌縣遣殿前司正將辛立討平之辛未金遣耶律安禮等來賀天申節六月癸巳史才罷甲午以御史中丞魏師遜簽書樞密院事兼權參知政事辛丑王循友貸死藤州安置癸卯詔嘗命四川州縣減免財物以寬民力尚慮未周令制置司總領所同共措置務在不妨軍食可以裕民尋遣鍾世明如四川同議以主管侍衞馬軍司成閔為慶遠軍節度使秋七月癸丑張俊薨勒停人王趯坐交通李光下大理獄乙卯臠徭人楊正脩正拱于市己未復置黎雅二州博易場三所壬戌詔捐四川茶馬司羨餘錢給軍費以寬民力甲子復落蕭振職池州居住乙丑以總領財賦符行中為四川制置使乙亥南丹州莫公晟及宜州界外諸蠻納土內附戊寅幸張俊第臨奠八月壬辰禁百官避免輪對甲午罷溫州市黃柑福州貢荔枝丙午追封張俊為循王以湘潭縣丞鄭嵵主簿賈子展嘲毀朝攻除名嵵容州子展德慶府編管九月辛亥朔李道如衡州措置盜賊丁巳賞平衢賊功升辛立領忠州團練使將士遷職給錢有差冬十月壬午蠲旱傷州縣租賦戊子遣沈虛中使金賀正旦張士襄賀金主生辰十一月乙丑魏師遜罷丁卯以權吏部侍郎施鉅參知政事鄭仲熊簽書樞密院事戊辰進秦熺少傅封嘉國公是月以通判武岡軍方疇通書胡銓及他罪除名永州編管十二月丙戌以故龍圖閣學士程瑀有論語講解秦檜疑其譏己知饒州洪興祖嘗為序京西轉運副使魏安行鏤版至是命毀之興祖昭州安行欽州編管瑀子孫亦論罪丁亥王趯除名辰州編管丁酉知鄞縣程緯為其丞王肇所告慢上無人臣禮除名貴州編管籍其貲壬寅刺諸路編管人充廂軍乙巳金遣白彥恭等來賀明年正旦二十五年春正月辛未賞討楊再興功保寧軍承宣使李道落階官加龍神衞四廂都指揮使將士進官賜錢有差二月乙酉以鎮江都統制劉寶為安慶軍節度使建康都統制王權為清遠軍節度使壬寅以通判常州沈長卿仁和縣尉芮燁作詩譏訕除名長卿化州燁武岡軍編管三月己酉右司郎中張士襄自金國使還坐奉使不肅罷官壬申地震夏四月乙酉施鉅罷以鄭仲熊兼權參知政事戊子命四川制置司許就類省試院校試刑法己亥減廣西路折米錢五月丁未朔日有食之太廟仁宗室柱生芝九莖戊申罷諸路免行錢歲百八萬緡癸丑以前知泉州宗室令衿譏訕秦檜遂坐交結罪人汀州居住乙丑金遣李通等來賀天申節壬申賜劉錡湖南田百頃六月庚辰鄭仲熊罷辛巳以禮部侍郎湯思退簽書樞密院事兼權參知政事癸卯以言者追譖岳飛改岳州為純州岳陽軍為華容軍是月安南入貢秋七月丙辰減四川絹估稅斛鹽酒等錢歲百六十餘萬緡蠲州縣積欠二百九十餘萬緡詔四川營田有占民田者常平司按驗給還甲戌封李天祚為南平王八月丁丑申嚴誣告加等法辛巳命大理鞫趙汾及令衿交通獄丙戌以吏部侍郎董德元參知政事蠲諸路身丁免丁錢一年壬辰建執政府九月丁巳秦檜上紹興寬恤詔令冬十月庚辰復置鴻臚寺壬午遣王岷使金賀正旦鄭柟賀金主生辰乙酉命大理鞫張祁附麗胡寅獄乙未幸秦檜第問疾夜檜諷右司員外郎林一飛臺諫徐嚞張扶等請拜熺為相丙申進封檜建康郡王熺為少師並致仕命湯思退兼權參知政事是夕檜薨丁酉檜姻黨戶部侍郎兼知臨安府曹泳停官新州安置朱敦儒薛仲邕王彥傅杜思旦皆罷命有司具上執政侍從官居外任及主宮觀與在謫籍者職位姓名辛丑徙殿中侍御史徐嚞右正言張扶皆出為他官十一月乙巳朔追封檜申王謚忠獻賜神道碑額為決策元功精忠全德戊申奪趙汾二官壬子以敷文閣直學士魏良臣參知政事癸亥合祀天地于圜丘大赦甲子幸秦檜第臨奠乙丑復洪皓官釋張祁獄丁卯罷大理寺官旬白庚午詔監司郡守事無巨細皆須奏聞裁決毋得止上尚書省臣僚薦舉人才必三人以上同薦封叔和州防禦使右監門衞大將軍士俴為崇慶軍節度使嗣濮王福建路提刑令為利州觀察使安定郡王辛未知建康府王會及列郡守臣王晌王鑄鄭僑年鄭震方滋俱以諂附貪冒罷真臘羅斛國貢馴象十二月甲戌朔詔曰臺諫風憲之地比用非其人黨於大臣濟其喜怒殊非耳目之寄朕今親除公正之士以革前弊繼此者宜盡心乃職毋合黨締交敗亂成法當謹茲戒毋自貽咎詔張浚折彥質万俟𪅂段拂聽自便量移李光郴州安置乙亥復以𪅂為資政殿學士提舉萬壽觀兼侍讀戊寅鄭億年責建武軍節度副使南安軍安置壬午詔監司守臣禁羨餘罷權攝戢苞苴節宴飲詔前後告訐者莫汲汪召錫陸升之等九人除名廣南諸州編管甲申召孟忠厚奉朝請命胡寅張九成等二十八人並令自便仍復其官乙酉董德元罷丙戌以劉錡知潭州辛卯命三省六部條具續降敕旨來上審詳施行甲午以敷文閣待制沈該參知政事乙未以王會恃權貪橫停官循州編管丙申復以蕭振為四川制置使復張浚折彥質趙汾葉三省王趯劉岑官移胡銓衡州丁酉禁閩浙川廣貢真珠文犀戒州縣加收耗糧己亥金遣耶律歸一等來賀明年正旦二十六年春正月壬子省諸州稅場以寬商賈甲子追復趙鼎孫近鄭剛中汪藻舊職乙丑詔選擇監司須七品以上清望官或經朝擢及治郡著績者丙寅曹泳吉陽軍編管封伯令衿明州觀察使安定郡王以其從弟令讓也戊辰除民事律蠲諸路積負及黃河竹索錢二月乙亥命四川州縣凡預借民賦稅分限理折己卯定諸州流寓士人解額庚辰罷進奏院定本朝報乙酉進士林東追諂秦檜上書狂妄英州編管右朝奉郎林一飛坐指使林東責監高州鹽稅庚寅三佛齊國入貢辛卯魏良臣罷庚子以左朝散大夫王曮為秦檜親黨直徽猷閣呂愿中貪虐附檜曮建昌軍居住愿中責果州團練副使封州安置三月甲寅以邊事已定罷宰相兼領樞密使丁巳詔兩淮邊民未復業者復其租十年己未以万俟𪅂參知政事癸亥加吳璘開府儀同三司乙丑以東平府進士梁勛伏闕上書言北事送千里外州軍編管丙寅詔曰講和之策斷自朕志秦檜但能贊朕而已豈以其存亡而渝定議耶近者無知之輩鼓倡浮言以惑衆聽至有偽撰詔命召用舊臣抗章公車妄議邊事朕甚駭之自今有此當重置典憲丁卯蠲閩浙諸州歲供軍器所物料三之一減諸州工匠千人己巳募四川民佃淮南京西閒田並邊復租稅十年次邊五年夏四月戊子增溫台等十六州解額命湖北路以增戶墾田為守令殿最庚寅遣陳誠之等賀金主尊號禮成癸巳置武學官及弟子員百人甲午禁州郡進祥瑞戊戌立六科以舉士加韋謙太尉詔大辟情犯無可矜憫者禁刑寺妄引例奏裁貸減罷鄉飲酒舉士法詔淮南京西占射官田踰二年未盡墾者募人更佃五月壬寅以沈該為尚書左僕射万俟𪅂為右僕射並同中書門下平章事湯思退知樞密院事丁未詔州軍教授毋兼他職丙辰蠲楚州盱眙軍民租十年己未金遣敬嗣暉等來賀天申節六月辛未朔罷諸路鬻戶絕田丁丑以端明殿學士程克俊參知政事戊寅復權要親族中第覆試法乙酉詔取士毋拘程頤王安石一家之說丁亥流星晝隕辛卯以秦檜既死命史館重修日曆秋七月辛丑詔三衙主帥舉武臣堪知州者壬寅蠲諸路丁絹一年為二十四萬匹丙午右奉議郎薛仲邕連州編管丁未彗出井避殿減膳辛亥詔諸州守貳考各縣丁籍依年格收除民間市物官戶勢家與編氓均科丙辰彗滅詔進士因事送諸州軍聽讀特放逐便仍許取應辛酉雨水銀八月戊寅班元豐崇寧學制于諸路革正前舉登第秦塤曹冠等九人出身以淮南提舉常平朱冠卿言秦檜挾私廢法塤等皆其子孫親戚門下憸人於是有官應試者所授階官易左為右白身者駁放占用省額復還後科庚辰裁州縣吏額己丑蠲建康府積欠內帑錢帛庚寅安南國遣使入貢辛卯程克俊罷甲子以吏部侍郎張綱參知政事九月乙巳以翰林學士陳誠之同知樞密院事丙午立互易薦舉坐罪法壬子詔成都潼川兩路漕臣同制置總領茶馬司審度四川財賦利害其實惠得以及民調度可以經久者條具以聞甲寅以天聖紹興真決贓吏指揮班示諸路丙寅增大理寺吏祿戊辰命吏刑二部修條例為成法冬十月己巳朔詔許秦檜在位之日無辜被罪者自陳釐正罷浙東常平司平準務乙亥詔四川監司帥臣制置總領茶馬司各舉可守郡者甲午蠲郴道永三州桂陽軍民身丁米乙未王會移瓊州編管以宋貺黨附秦檜責梅州安置丁酉以張浚上書論用兵依舊永州居住辛丑遣李琳使金賀正旦葛立方賀金主生辰閏月丙午罷廉州貢珠縱蛋丁自便己酉命離軍人願歸農者人給江淮湖廣荒田百畝復其租稅十年乙卯初置臨安府左右廂官分掌訟牒十一月甲戌命吏部侍郎陳康伯戶部侍郎王俁稽考國用歲中出納之數丙戌裁定六曹寺監百司吏額十二月辛丑命三省錄臺諫所言事報樞密院癸丑万俟𪅂上重修貢舉敕令格式甲寅罷諸路鑄錢司庚申賞應詔論事切當者壬戌三佛齊國入貢甲子金遣梁等來賀明年正旦二十七年春正月乙酉幸延祥觀戊子命侍從各薦宗室京朝官才識治行者二人二月丁酉朔復兼習經義詩賦法庚子楊政卒壬寅太廟仁宗英宗兩室柱芝草生戊午以御史中丞湯鵬舉參知政事庚申更定福建路鹽法癸亥加劉錡太尉三月己巳命京局改官人先除知縣乙酉赤氣出紫微垣丙戌賜禮部進士王十朋以下四百二十六人及第出身丁亥詔焚交趾所貢翠羽于通衢仍禁宮人服用銷金翠羽己丑減三川對糴米歲十六萬九千石夔路激賞絹五萬匹兩川絹估錢二十八萬緡及茶司引息虛額錢歲九十五萬緡辛卯万俟𪅂卒壬辰以符行中前在蜀恣橫南雄州安置甲午除耕牛稅五月癸未金遣耶律守素等來賀天申節辛卯復以五帝神州地祇等十三祭為大祀六月甲辰命臣僚轉對盡忠開陳毋摭細微以應故事戊申以湯思退為尚書右僕射同中書門下平章事庚戌復余深黃潛善並觀文殿大學士乙卯裁定離軍將士諸州添差數戊午初命太廟冬饗祭功臣臘饗祭七祀祫饗兼之己未進錢忱少傅增命官捕獲私茶鹽賞典秋七月己巳復饒贛韶三州鑄錢監癸酉戒監司郡守舉劾守令觀望徇私乙亥以龍圖閣學士李文會為四川安撫制置使丙子詔凡出命令先經兩省書讀如舊制八月乙未以湯鵬舉知樞密院事庚申復置提領諸路鑄錢司于行在以戶部侍郎榮薿領之九月癸酉張綱罷戊寅以吏部尚書陳康伯參知政事蠲淮南京西湖北積欠內藏錢帛丁亥校書郎葉謙亨言祀典散逸隆殺不當名稱或舛請敕禮官祕書酌景德故事取祭祀之式定為一書名曰紹興正祠錄以為恆制詔從之冬十月壬寅有赤氣隨日入癸卯築通泰楚三州捍海堰辛酉詔四川諸司察旱傷州縣捐其稅振其飢民十一月癸亥朔減福建鹽鈔錢歲八萬緡乙丑遣孫道夫使金賀正旦辛巳遣劉章賀金主生辰丁亥湯鵬舉罷戊子蠲廬州二稅及上供錢米一年十二月甲午詔廣南經略市舶司察蕃商假託入貢丙辰初命州縣置禁曆戊午金遣高思廉等來賀明年正旦二十八年春正月己巳申禁三衙彊刺平民為兵己卯幸延祥觀遂幸玉津園壬午禁諸路二稅折納增價癸未遣戶部郎中莫濛等檢視淮南浙西江東沙田蘆場甲申命臺諫侍從三人以上公薦監司治狀二月癸巳命史館重修徽宗大觀以前實錄丙申以陳誠之知樞密院戊戌禁沿海州軍博買乙巳以工部侍郎王綸同知樞密院事己酉命六曹長貳詳定差役舊法癸丑加楊存中少師謚張俊曰忠烈三月辛酉朔日有食之丙寅雪丁丑加田師中開府儀同三司戊寅詔自今用人選帥臣監司曾任郎官已上者為侍從監司郡守有政績者為卿監郎官朝官二年乃遷卿監郎官未歷監司者更迭補外戊子責秦檜黨宋樸徽州居住沈虛中筠州居住夏四月丙申復詔文武官非犯贓罪並許以致仕恩任子辛亥雨雹嚴州遂安賊江大明寇衢州官軍捕斬之五月金遣蕭恭等來賀天申節六月壬辰太白晝見癸巳流星晝隕甲寅增浙西江東淮東沙田蘆場租課置提領官田所掌之秋七月庚申立江西上供米綱賞格戊辰詔監司按發官吏不得送置司州軍推鞫所犯涉重即以奏聞命鄰路監司選官就鞫己卯命取公私銅器悉付鑄錢司民間不輸者罪之庚辰親製郊廟樂章乙酉復鬻沒官田八月戊子朔置國史院修神哲徽三朝正史己丑檢放風水災傷州縣苗稅仍振貸饑民乙未增四川十七州舉人解額戊戌湯思退等上徽宗實錄壬寅命戶部侍郎令提領諸路鑄錢甲寅地震九月辛未定銅錢出界罪賞甲戌詔以吏部七司舊制與續降參訂異同立為定法丁丑置殿前司虎翼水軍千人庚辰以中書舍人王剛中為四川安撫制置使辛巳封叔建州觀察使士輵為昭化軍節度使嗣濮王癸未蠲平江紹興湖州被水民逋賦冬十月丁亥朔遣沈介使金賀正旦黃中賀金主生辰辛丑禁監司帥守私役軍匠十一月己卯合祀天地于圜丘大赦壬午復命檢舉諸人因赦移放者告訐得罪者不預十二月庚寅安定郡王令衿薨辛丑修睦親宅建宮學丁未復李光官放自便戊申蠲楚州歸附民賦役五年壬子金遣蘇保衡等來賀明年正旦是歲興元都統制姚仲復籍興元府等五州義士得二萬餘人二十九年春正月丙辰朔以皇太后年八十詣慈寧殿行慶壽禮庚申濬平江三十六浦以泄水庚午振湖秀諸州饑民癸酉幸延祥觀遂幸玉津園庚辰禁諸州科賣倉鹽癸未蠲沙田蘆場為風水所侵者租之半是月金國罷沿邊榷場惟泗州如舊二月丙戌朔亦罷沿邊榷場存其在盱眙者加吳璘少保己丑禁海商假託風潮私往北界壬辰除臨安府歲供修內司錢三萬六千緡丁酉蠲四川折估糴本積欠錢三百四十萬緡戊戌大雪雨雹己亥禁貿易廣南羈縻州物貨命廣西教閱峒丁庚戌罷諸路斥候遞卒甲寅取具貶死臣僚姓名議加恩典三月丙子除州縣積欠錢三百九十七萬緡有奇及中下戶所欠入官錢物丁丑詔侍從臺諫帥臣監司歲舉可任將帥者二人限命官子孫制田減父祖之半併其詭名寄產者格外田畝同編戶科役己卯除湖州平江紹興流民公私逋負夏四月壬辰國子司業黃中自金國使還言金人將徙居汴京以見逼望早飭邊備宰相怒不聽己亥修三省法庚子增置帶御器械四員丙午禁內外將佐營造回易掊斂軍士辛亥命縣令有政績者諸司同薦不次升擢以風厲之五月甲寅朔罷鬻福建閃生沙田丁巳詔殿前司選統制官部兵千人戍江州彈壓盜賊每歲一易己未樁頓江浙四路折帛錢于三總領所及浙西提刑司以備軍用辛酉禁權要豪民舉錢軍中取息丁卯命印給三總領所見錢公據關子許商人入納己巳立監司守臣舉劾八條金遣王可道等來賀天申節六月甲辰朔遣王綸等為金國奉表稱謝使丁亥禁江淮私渡北人丙申陳誠之罷禁積錢民戶過萬緡官戶過二萬緡滿二年不易他物者沒入之丁酉申禁包苴請託己亥以陳康伯兼權樞密事辛丑李光卒壬寅以主管步軍司趙密為太尉己酉沈該以貪冒罷閏月甲寅益荊南戍卒千人守臣劉錡亦募效用三千人丁巳命江湖浙西五漕司增價糴米二百二十萬石赴沿江十郡自荊至常州以備振貸戊午罷成都府路隔槽酒務監官七十一員令民承買己未罷江浙淮東沙田蘆場所增租課甲子落沈該觀文殿大學士致仕罷福建安撫司官賣鹽戊辰大省淮西冗官辛未復置江淮荊浙福建廣南路提點坑冶鑄錢官秋七月丁亥以權吏部尚書賀允中參知政事癸巳封權戶部侍郎令為安定郡王戊戌福州大水己酉禁諸路抑買官田庚戌以四川經總制及田晟錢糧錢共百三十四萬緡充增招軍校費八月甲子募商人輸米行在諸倉願以茶鹽礬鈔等償直者聽丁卯除南雄英連三州經界復丁米舊額甲戌併史館歸秘書省玉牒所歸宗正寺九月甲申詔建炎以來使未還而後嗣無祿者與一子官乙酉王綸使還入見言金國和好無他丙戌湯思退等稱賀甲午以湯思退為尚書左僕射陳康伯為右僕射並同中書門下平章事乙未以皇太后不豫大赦不視朝丙申為太后祈福蠲中下戶所欠稅賦及江浙蝗潦州縣租丁酉減僧道免丁錢己亥蠲見監贓罰賞錢庚子皇太后韋氏崩癸卯遣周麟之等為金國奉表哀謝使冬十月甲寅以羣臣五上表始聽政命保康軍節度使吳益為欑宮總護使乙亥立諸路和糴募民運米賞格戊寅冊謚皇太后曰顯仁十一月丁亥遣賀允中等為金國遺留國信使丙午權欑顯仁皇后于永祐陵十二月甲寅諜言北界禁民妄傳起兵帝諭大臣當自治為安邊息民之計甲子祔顯仁皇后神主于太廟辛未以王綸知樞密院事壬申減三省樞密院激賞庫及諸書局歲用錢二十萬緡鼎州程昌𧜛所增蔡州官兵衣糧錢四之一西和州官賣鹽直之半蔣州上供經總制司無額錢如之丙子金遣施宜生等來賀明年正旦三十年春正月戊子給劉錡軍費錢六十萬緡丙申以吏部侍郎葉義問同知樞密院事廢御書院丁酉罷鈞容班樂工及甲庫酒局壬寅募人墾淮南荒田甲辰定御輦院三營兵額為九百人二月甲寅罷夔州路榷茶乙卯金遣大懷忠等來弔祭戊午遣葉義問為金國報謝使癸酉詔立普安郡王瑗為皇子更名瑋丙子進封建王三月辛巳復館職召試然後除擢免湖北京西宣撫司諸庫未輸錢八十九萬緡癸未以淮東茶鹽司錢十萬緡充募民墾田費乙酉加吳益少保趙密開府儀同三司以賞欑宮之勞丁酉初置金州御前諸軍都統制以知金州王彥為之癸卯賜禮部進士梁克家以下四百一十二人及第出身甲辰置牧馬監于潮惠二州丙午加恩平郡王璩開府儀同三司判大宗正事始稱皇姪夏四月己酉朔以孫㔶為蘄州防禦使愷貴州團練使惇榮州刺史丙辰以賀允中兼權同知樞密院事五月辛巳刺海賊罪不至死者為龍猛龍騎軍初置荊南府御前諸軍都統制以劉錡兼領之乙酉初置江州御前諸軍都統制以步軍司前軍都統制戚方為之詔諸路刺強盜貸死少壯者為兵丙戌定鑄錢司歲鑄五十萬緡辛卯臨安於潛安吉三縣大水海賊陳演添作亂掠高雷二州境上南恩州民林觀禽殺之命觀以官丙申金遣蕭榮等來賀天申節壬寅落沈該致仕復觀文殿大學士知明州丙午加吳蓋太尉六月庚戌復出諸軍見錢關子三百萬緡聽商賈以錢銀請買庚午王綸罷辛未以江西廣東湖南折帛經總制錢合六十萬緡江西米六萬石充江州軍費後益以四川利路經總制江西茶引合二十萬緡秋七月戊寅遣明州水軍三百戍崑山黃魚𣛀巡捕槽船之為盜者甲申詔諸路帥司春秋教閱禁兵弓弩手戊戌以葉義問知樞密院翰林學士周麟之同知院事御史中丞朱倬參知政事八月丙午朔日有食之壬子賀允中使還言金人必畔盟宜為之備癸丑允中致仕甲寅復以四川經總制錢五十萬緡給總領所增招兵士壬申淮東總管許世安奏金主亮至汴京起重兵五十餘萬屯宿泗州謀來攻九月庚寅以帶御器械李寶為浙西副總管提督海船駐平江丙申命劉寶招制勝軍千人丁酉罷內侍省冬十月丙午罷內侍官承受諸軍奏報文字丁未遣虞允文使金賀正旦徐度賀金主生辰庚戌雷辛酉鎮江都統制劉寶以專悍貪橫罷壬戌以劉錡為鎮江都統制荊南右軍統制李道為都統制癸亥日中無雲而雷癸酉蠲舒和蘄黃四州民附種田租十一月庚辰禁諸路折輸職田錢癸巳夜有白氣出入危昴間十二月乙巳朔湯思退罷初行會子于東南戊申夜白氣亙天海南黎賊王文滿平己酉罷招刺三衙及江上諸軍庚戌禁掠賣生口入溪峒癸丑命戶部立經總制錢十年中數為定額丁卯金遣僕散權等來賀明年正旦
