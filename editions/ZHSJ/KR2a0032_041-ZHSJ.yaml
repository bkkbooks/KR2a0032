body:
  text: 宋史卷四十一本紀第四十一理宗一理宗建道備德大功復興烈文仁武聖明安孝皇帝諱昀太祖十世孫父希追封榮王家于紹興府山陰縣母全氏以開禧元年正月癸亥生于邑中虹橋里第前一夕榮王夢一紫衣金帽人來謁比寤夜漏未盡十刻室中五采爛然赤光屬天如日正中既誕三日家人聞戶外車馬聲亟出無所睹幼嘗晝寢人忽見身隱隱如龍鱗是時寧宗弟沂靖惠王薨無嗣以宗室希瞿子賜名均為沂王後尋改賜名貴和嘉定十三年八月景獻太子薨寧宗以國本未立選太祖十世孫年十五以上者教育如高宗擇普安恩平故事遂以十四年六月丙寅立貴和為皇子改賜名竑而以帝嗣沂王六月乙亥補秉義郎八月甲子授右監門衞大將軍賜名貴誠十五年五月丁巳以竑為檢校少保進封濟國公己未以帝為邵州防禦使帝性凝重寡言潔修好學每朝參待漏或多笑語帝獨儼然出入殿庭矩度有常見者斂容會濟國公竑與丞相史彌遠有違言彌遠日謀媒蘖其失於寧宗屬意於帝而未遂十七年八月丙戌寧宗違豫自是不視朝壬辰疾篤彌遠稱詔以貴誠為皇子改賜名昀授武泰軍節度使封成國公閏月丙申寧宗疾甚丁酉崩于福寧殿彌遠使楊谷楊石入白楊皇后稱遺旨以皇子竑開府儀同三司進封濟陽郡王判寧國府命子昀嗣皇帝位大赦尊楊皇后曰皇太后同聽政封竑為濟王賜第湖州以醴泉觀使就第癸亥詔宮中自服三年喪九月乙亥詔褒表老儒以傅伯成為顯謨閣學士楊簡寶謨閣直學士並提舉南京鴻慶宮柴中行復元職授右文殿修撰主管南京鴻慶宮戊寅詔兄濟王妻衞國夫人吳氏封許國夫人己卯皇太后皇帝御便殿垂簾詔以先聖四十九代孫行可為迪功郎授判司簿尉以禮部侍郎程珌吏部侍郎朱著中書舍人真德秀兼侍讀工部侍郎葛洪起居郎喬行簡宗正少卿陳貴誼軍器監王塈兼侍講壬午葛洪權工部尚書升兼侍讀辛卯祀明堂大赦冬十月戊戌詔諸路提點刑獄以十一月按理囚徒己亥嗣秀王師喦薨壬子詔百官奉按月給十一月甲子右正言麋溧請承順東朝繼志述事壹以孝宗為法而新政之切者曰畏天悅親講學仁民上嘉納焉癸未以五月十六日為皇太后壽慶節丁亥詔改明年為寶慶元年戊子以葛洪為端明殿學士同簽書樞密院事己丑詔以生日為天基節十二月甲午雪寒免京城官私房賃地門稅等錢自是祥慶災異寒暑皆免癸丑開經筳詔輔臣觀講詔太后所居殿號曰慈明辛酉請大行皇帝謚號于南郊謚曰仁文哲武恭孝皇帝廟號曰寧宗寶慶元年春正月壬戌朔詔舉賢良庚午湖州盜潘壬潘丙潘甫謀立濟王竑竑聞變匿水竇中盜得之擁至州治以黃袍加其身守臣謝周卿率官屬入賀初壬等偽稱李全以精兵二十萬助討史彌遠擅廢立之罪比明視之皆太湖漁人及巡尉兵卒竑乃遣王元春告于朝而率州兵誅賊彌遠奏遣殿司將彭任討之至則盜平又遣其客秦天錫託宣醫治竑疾諭旨逼竑死尋詔貶為巴陵郡公辛未詔保寧軍節度使師彌為檢校少保詔以皇太后弟奉國軍節度使楊谷保寧節度楊石並開府儀同三司丙戌濟王竑訃聞特輟視朝己丑上寧宗謚冊寶二月甲午詔故太師武勝定國軍節度使鄂王岳飛謚忠武丙申詔師彌檢校少師嗣秀王丙辰楚州火戊午發廩振在京細民給犒馬步軍皇城司守衞軍有差三月癸酉葬寧宗于會稽永茂陵夏四月辛卯朔寧宗祔廟壬辰詔皇兄竑贈少師保靜鎮潼軍節度使直舍人院王塈等繳奏命遂寢丁酉皇太后手書多病自今免垂簾聽政壬寅帝兩請皇太后垂簾不允辛亥發廩振在京細民五月甲子詔內外文武大小之臣於國政有所見聞封章來上毋或有隱丙寅詔不熄為保康軍承宣使嗣濮王六月辛卯太白晝見丁未詔史彌遠為太師依前右丞相兼樞密使進封魏國公彌遠辭免太師秋七月丁丑滁州大水詔振恤之乙酉詔行大宋元寶錢八月壬寅以司農丞姚子才封事切直詔進一秩授秘書郎癸卯詔知袁州趙夫直秘閣福建提點刑獄以旌廉吏丙午詔侍從給諫卿監郎官幷在外前執政侍從帥臣監司各舉廉吏三人戊申詔侍從兩省臺諫三衙知閤御帶環衞官在外前執政侍從帥臣監司都副都統制及屯戍主將其各舉堪充將帥三人己酉地震壬子張九成贈太師追封崇國公謚文忠甲寅以程頤四世孫源為籍田令乙卯莫澤言真德秀舛論綱常簡節上語曲為濟王地詔德秀煥章閣待制提舉玉隆萬壽宮丁巳詔戒貪吏九月丙寅著作佐郎陶崇上保業慎獨謹微持久四事帝嘉納之冬十月癸巳有流星大如太白甲寅詔會稽欑宮所在稅賦盡免折科山陰縣權免三年十一月癸亥宣繒兼同知樞密院事薛極參知政事葛洪簽書樞密院事詔邵州潛藩可升為寶慶府筠州與御名音相近改為瑞州壬午雪寒在京諸軍給緡錢有差出戍之家倍之自是祥慶災異霪雨雪寒咸給甲申朱端常言魏了翁封章謗訕真德秀奏劄誣詆詔魏了翁落職奪三秩靖州居住真德秀落職罷祠十二月甲辰詔刪修敕令是歲兩浙路戶一百九十七萬五千九百九十六口二百八十二萬二千三十二福建路戶一百七十萬四千一百八十六口三百五十五萬三千七十九二年春正月癸亥詔贈沈煥陸九齡官煥謚端憲九齡謚文達錄張九成呂祖謙張栻陸九淵子孫官各有差癸酉召布衣李心傳赴闕戊寅熒惑入氐壬午太白歲星填星合于女二月辛卯監察御史梁成大言真德秀有大惡五僅褫職罷祠罰輕詔削二秩三月癸酉以久雨詔大理寺三衙兩浙運司臨安府諸屬縣榷酒所凡贓賞等錢罪已決者一切勿徵毋錮留妻子自是霖潦寒暑皆免戊寅詔太常寺建功臣閣以昭勳崇德為名己卯蘄州火夏四月己丑詔輔臣奉薄其以隆興格為制辛亥有流星大如太白六月丙申御後殿賜進士王會龍以下九百八十九人及第出身有差壬寅詔以孔子五十二代孫萬春襲封衍聖公秋七月戊辰雷電雨晝晦大風遂安休寧兩縣界山裂洪水壞公宇民居田疇八月乙巳濟王竑追降巴陵縣公辛亥衞涇薨九月庚申雷冬十月甲申詔寧宗御集閣以寶章為名仍置學士待制員辛丑又雷辛亥熒惑歲星填星合于女熒惑犯填星改湖州為安吉州十一月甲寅修祚德廟以嚴程嬰公孫杵臼之祀丙辰始御紫宸殿辛酉熒惑犯歲星丙子日南至上詣慈明殿十二月癸卯親享太廟三年春正月辛亥朔上壽明皇太后尊號冊寶于慈明殿壬子史彌遠進二秩辛酉以楊谷楊石並為少傅知楚州姚翀朝辭奏淮楚忠義軍事上曰南北皆吾赤子何分彼此卿其為朕撫定之己巳詔朕觀朱熹集註大學論語孟子中庸發揮聖賢蘊奧有補治道朕勵志講學緬懷典刑可特贈熹太師追封信國公三月庚戌朔詔郡縣長吏勸農桑抑末作戒苛擾工部侍郎朱在進對奏人主學問之要上曰先卿中庸序言之甚詳朕讀之不釋手恨不與同時辛亥以皇太后尊號冊寶禮成姪孫楊鳳孫以下推恩有差夏四月戊戌宣引前丞相謝深甫孫女謝氏詣慈明殿進見五月壬子詔岳珂戶部侍郎依前淮東總領兼制置使閏月己卯朔詔郡縣繫囚不實書曆未經結錄守臣輒行特判憲司其詳覆所部獄案歲月淹延者重置于憲六月戊申朔日有食之秋七月乙酉太陰犯心丁酉詔振贍被水郡縣其竹木等稅勿徵丙午史彌遠乞歸田里詔不允八月庚戌詔謝氏特封通義郡夫人癸亥詔凡試邑兩經罷黜更勿授知縣縣令甲戌太白熒惑合于翼丙子城太平州詔知州綦奎進中奉大夫餘推恩有差九月癸未故觀文殿大學士魏國公贈太師留正謚忠宣丙午追上寧宗徽號曰法天備道純德茂功仁文哲武聖睿恭孝皇帝冬十月甲子右監門衞大將軍與奭改賜名貴謙授宜州觀察使繼沂王後右千牛衞將軍孟杓改賜名乃裕授和州防禦使繼景獻太子後甲戌趙范江東提刑兼知池州節制防江水步軍池州都統司軍馬十一月戊寅奉上寧宗徽號冊寶于太廟辛巳日南至郊大赦改明年為紹定元年十二月己酉日旁有氣如珥壬申發廩振贍京城細民大元兵破關外諸隘四川制置鄭損棄三關紹定元年春正月丙子朔上壽明慈睿皇太后尊號冊寶于慈明殿楊谷楊石並升少師六月壬寅朔日有食之己酉流星晝隕秋七月戊戌熒惑犯南斗冬十月戊申熒惑犯壁壘陣星丁巳熒惑填星合于危甲子熒惑犯填星十一月癸酉熒惑入羽林庚辰雷丁酉詔申嚴皇城司給符之制照闌入法十二月辛亥以薛極知樞密院事兼參知政事葛洪參知政事袁韶同知樞密院事鄭清之端明殿學士簽書樞密院事二年春正月庚辰大理司直張衍上檢驗推鞠四事詔刑獄人命所關其令有司究行之丁亥熒惑歲星合于婁二月庚戌詔歲舉廉吏或犯姦贓保任同坐監司守臣其申嚴覺察三月辛卯詔郡縣繫囚多瘐死獄中憲司其具獄官姓名以聞黜罷之夏四月庚申詔郡縣官闕毋令藝術人豪民罷吏借補權攝五月詔成都潼川路歲旱民歉制司監司其亟振恤仍察郡縣奉令勤惰以聞辛巳賜進士黃朴以下五百五十七人及第出身有差詔戶絕者許立嗣毋妄籍沒六月丁巳詔通義郡夫人謝氏進封美人九月丁卯台州大水壬辰有流星大如太白冬十月壬戌詔台州水災除民田租及茶鹽酒酤諸雜稅郡縣抑納者監司察之十一月己丑熒惑入氐三年春正月甲申詔故皇子緝贈保信奉國軍節度使開府儀同三司追封永王謚沖安壬辰知棗陽軍史嵩之創置屯田以勞賞官兩轉二月丙申日有背氣戊戌詔汀贛吉建昌蠻獠竊發經擾郡縣復賦稅一年庚戌詔趙范起復依前知鎮江府節制防江水步幷本州在砦軍馬趙葵起復依前知滁州節制本州屯戍軍馬壬子詔故皇子繹賜忠正保寧軍節度使開府儀同三司追封昭王謚沖純閏月癸酉逃卒穆椿夜竊入皇城燒毀甲仗衞士捕得之詔磔于市乙酉太白歲星合于畢三月丁酉雨土戊申奉國軍節度使不薨贈少傅追封樂平郡王夏四月己卯漳州連城盜起知龍巖縣莊夢詵尉鍾自強不能效死守土詔各削二秩罷五月甲寅檢校少保李全授彰化保康軍節度使開府儀同三司京東鎮撫使依舊京東忠義諸軍都統制戊午李全左右金吾衞上將軍職任仍舊六月乙酉歲星入井秋七月丁酉汀州寧化縣曾氏寡婦晏給軍糧禦漳寇有功又全活鄉民數萬人詔封恭人賜冠帔官其子承信郎九月辛丑祀明堂大赦丙午美人謝氏進封貴妃冬十月己巳熒惑填星合于室十一月丁酉有星孛于天市垣丁未流星晝隕十二月庚申詔錄用孔子四十九代孫燦補官李全叛壬戌淮東官兵王青力戰死之贈右武大夫蘄州防禦使甲子詔逆賊李全反形日著今乃肆為不道已敕江淮制臣率兵進討有能擒斬全以降者加以不次之賞乙丑詔免明年元會禮以鄭清之參知政事兼簽書樞密院事喬行簡端明殿學士同簽書樞密院事詔史彌遠敷奏精敏氣體向安朕未欲勞以朝謁可十日一赴都堂治事丁卯冊命貴妃謝氏為皇后己卯慈明殿出緡錢百五十萬犒諸軍振贍在京細民癸未上壽明仁福慈睿皇太后尊號冊寶四年春正月戊子皇太后年七十有五上詣慈明殿行慶壽禮大赦史彌遠以下進秩有差賜李心傳同進士出身壬寅趙范趙葵等誅李全於新塘詔各進兩秩餘推恩有差二月戊午朔詔雄邊軍統制總轄范勝谷汝礪等誅逆著勞各官五轉將士立功者趣具等第姓名來上丙子詔起復孟珙從義郎京西路分棗陽軍駐劄夏四月戊辰趙范趙葵並進中大夫右文殿修撰賜紫章服金帶丁丑以鄭清之兼同知樞密院事喬行簡簽書樞密院事趙善湘兵部尚書江淮制置大使知建康府依舊安撫使趙范權兵部侍郎淮東安撫副使知揚州兼江淮制司參謀官趙葵換福州觀察使右驍衞大將軍淮東提刑知滁州兼大使司參議官五月丙午宗室司正檢校少傅安德軍節度使天水郡公加食邑五百戶貴謙承宣使乃裕觀察使六月己未詔魏了翁真德秀尤焴尤爚並復元官職祠祿七月己丑日生承氣丁酉賈涉女侍後宮詔封文安郡夫人庚戌葛洪資政殿學士知紹興府有流星大如太白八月己未大元兵破武休入興元攻仙人關辛酉洪咨夔復元官祠祿辛未文安郡夫人賈氏封才人九月丙戌夜臨安火延及太廟統制徐儀統領馬振遠坐救焚不力貶削有差上素服視朝減膳徹樂庚子建昌軍火甲辰流星晝隕冬十月戊午太常少卿度正國史院編修官李心傳各疏言宗廟之制未合於古茲緣災異宜舉行之詔兩省侍從臺諫集議以聞甲子以余天錫為戶部侍郎兼知臨安府浙西安撫使癸酉大元兵破蜀口諸郡御前中軍統制張宣戰青野原有功詔授沔州都統戊寅以李為煥章閣直學士四川制置使知成都府趙彥吶直龍圖閣四川安撫制置副使知興元府利路安撫使安癸仲戶部郎中總領四川財賦十一月乙酉詔忠義總管田遂力戰而歿贈武節大夫忠州刺史加封立廟十二月乙亥以史嵩之為大理少卿兼京湖制置副使五年春正月己丑以孟珙為京西路兵馬鈐轄棗陽軍駐劄庚寅詔李全之叛淮東提刑司檢法吳澄等出泰州城謁賊各追官勒停其不出見賊者高夢月劉賓雲循升二資罵賊而死者海陵簿吳嚞特贈朝奉郎官其一子將仕郎壬辰史嵩之進大理卿權刑部侍郎京湖安撫制置使知襄陽府壬寅新作太廟成二月癸丑帝謁太廟三月乙酉詔京城內外免征商三月丁酉日生抱氣承氣夏四月癸亥以寶章閣直學士桂如淵頃帥蜀日北兵攻城不能合謀死守而遁致軍民罹殃反以捷聞詔褫職罷祠丁卯起魏了翁以集英殿修撰知遂寧府五月己丑詔昨鬱攸為災延及太室罪在朕躬而二三執政引咎去職今宗廟崇成神御妥安薛極鄭清之喬行簡並復元官辛卯臣僚言積陰霖霪歷夏徂秋疑必有致咎之徵比聞蘄州進士馮杰本儒家都大坑冶司抑為鑪戶誅求日增杰妻以憂死其女繼之弟大聲因赴愬死于道路杰知不免毒其二子一妾舉火自經而死民寃至此豈不上干陰陽之和詔都大坑冶魏峴罷職癸巳太白經天晝見戊戌詔今後齊民有罪監司守臣毋輒籍沒其家必具聞俟命六月乙丑熒惑填星合于婁熒惑順行犯填星丙子詔諸獄官不理他務秋七月甲申詔近歲北兵再入利閬迫近順慶承奉郎胡元琰攝郡事能收散卒定居民諭叛將以全闔郡以功特轉官三資太白入井丙戌監楚州大軍倉富起宗軍變死難詔贈宣教郎官一子文林郎張煥同時被創害及其家詔轉官一資丁酉以吳潛為太府少卿總領淮西財賦陳貴誼端明殿學士同簽書樞密院事八月乙卯起真德秀為徽猷閣待制知泉州丁巳泗州路分劉虎副都統董琳焚斷盱泗橋遏金兵己未魏了翁以寶章閣待制潼川安撫使知瀘州乙丑賜進士徐元杰等四百九十三人及第出身有差壬申太白歲星合于張甲戌新作玉牒殿奉安累朝玉牒九月乙巳雨雹雷閏月己酉有流星大如太白庚戌彗星出于角戊辰史彌遠乞歸田里詔不允冬十月戊子以星變大赦金將以盱眙軍來降赦盱眙改為招信軍十一月己巳喬行簡累疏乞歸田詔不允十二月丙子朔進封才人賈氏為貴妃辛巳皇太后不豫壬午大赦皇太后崩癸卯羣臣凡七表請聽政從之詔外朝大典不敢輕改宮中自服三年喪時宋與大元兵合圍汴京金主奔歸德府尋奔蔡州大元再遣使議攻金史嵩之以鄒伸之報謝六年春正月己酉以少傅保寧軍節度使嗣秀王師彌判大宗正事趙善湘光祿大夫江淮制置大使兼知建康府行宮留守加食邑四百戶戊辰史彌遠加食邑千戶二月丁丑上大行皇太后謚曰恭聖仁烈皇后以趙范為工部侍郎兼中書門下省檢正公事趙葵祕書監兼侍講余天錫禮部侍郎兼侍讀癸卯熒惑犯東井三月丙辰大雨雹夏四月壬寅葬恭聖仁烈皇后于永茂陵五月庚戌太白熒惑合于柳鄧州移剌以城來降六月丁酉史嵩之刑部侍郎兼京湖安撫制置使兼知襄陽府秋七月敗武仙于浙江八月拔唐州九月壬寅朔日有食之辛亥祀明堂大赦辛酉經筵官請以御制敬天法祖事親齊家四十八條及緝熙殿榜殿記宣付史館冬十月江海領襄軍從大元兵合圍金主於蔡州甲申史宅之太府少卿史宇之將作少監並賜同進士出身丙戌史彌遠進太師左丞相兼樞密使魯國公加食邑一千戶鄭清之光祿大夫右丞相兼樞密使加食邑一千戶丁亥史彌遠保寧昭信軍節度使充醴泉觀使進封會稽郡王仍奉朝請加食邑封以薛極為樞密使喬行簡參知政事兼同知樞密院事陳貴誼參知政事兼簽書樞密院事詔史彌遠有定策大功勤勞王室今以疾解政宜加優禮長子宅之權戶部侍郎兼崇政殿說書次子宇之直華文閣樞密院副都承旨長孫同卿直寶章閣次孫紹卿良卿會卿晉卿並承事郎女夫趙汝禖軍器少監孫女夫趙崇官一轉己丑詔崔與之李鄭性之赴闕庚寅以顯謨閣待制知福州真德秀兼福建安撫使乙未史彌遠薨贈中書令追封衞王謚忠獻詔戒貪吏十一月乙巳給事中莫澤等言差提舉千秋鴻禧觀梁成大暴狠貪婪苟賤無恥詔奪成大祠祿丙午詔改明年為端平元年己未以魏了翁為華文閣待制知瀘州潼川安撫使賜金帶癸亥進趙葵兵部侍郎淮東制置使兼知揚州甲子臺臣劾刑部尚書莫澤貪淫忮害罷之丙寅權工部尚書趙范言宣和海上之盟厥初甚堅迄以取禍其事不可不鑑帝嘉納之丁卯詔趙葵任責防禦戊辰禮部郎中洪咨夔進對今日急務進君子退小人如真德秀魏了翁當聚之于朝帝是其言命咨夔洎王遂同為監察御史己巳趙葵入見帝問以金事對曰今國家兵力未贍姑從和議俟根本既壯雪二帝之恥以復中原十二月戊寅史宅之繳納賜第詔給賜本家仍奉家廟庚辰以薛極為觀文殿大學士知紹興府兼浙東安撫使甲申吳潛太府卿仍淮西總領財賦暫兼沿江制置知建康府戊申洪咨夔言資政殿學士提舉洞霄宮袁韶仇視善類諂附彌遠險忮傾危詔袁韶奪職罷祠祿壬辰臺臣言趙善湘陳鄭損納賂彌遠怙勢肆姦失江淮荊襄蜀漢人心罪狀顯著詔趙善湘有討李全功特寢免陳與祠鄭損落職與祠端平元年春正月庚子朔詔求直言侍從卿監郎官在外執政從官舉堪為監司守令者各二人三衙統帥知閤御帶環衞官在外總管軍帥舉堪為將帥者各二人鍾震陳公益李性傳張虙並兼侍讀徐清叟黃朴李大同葉味道並兼崇政殿說書辛丑趙范依前沿江制置副使權移司知黃州史嵩之權京湖安撫制置使兼知襄陽府陳韡華文閣待制仍知隆興府江西安撫使詔德安三關使彭哲去年十月北兵至棄關遁削二秩勒停乙巳賜故少傅權參知政事任希夷謚宣憲丙午詔趙范兼淮西制置副使任責防禦太白熒惑合在斗戊申金主完顏守緒傳位于宗室承麟己酉城破守緒自經死承麟為亂兵所殺執其參知政事張天綱丙寅詔太師中書令榮王已進王爵宜封三代曾祖子奭贈太師吳國公祖伯旿贈太師益國公父師意贈太師越國公戊辰以樞密院言詔京西忠順統制江海棗陽同統制郭勝向因所部兵行艹疎坐不發覺除名廣州拘管遇赦還軍前自効有功並復元受軍職史嵩之露布告金亡謹遣郭春按循故壤詣奉先縣汛掃祖宗諸陵還師屯信陽命王旻守隨州王安國守棗陽蔣成守光化楊恢守均並益兵飭備經理唐鄧屯田二月辛未監察御史洪咨夔言上親政之始斥逐李知孝梁成大其諂事權姦黨私罔上倡淫黷貨罪大罰輕詔李知孝削一秩罷祠梁成大削兩秩壬申以趙彥吶為四川安撫制置使兼知興元府丁亥詔端平元年正月以前諸命官貶竄物故者許令歸葬三月己酉以賈涉子似道為籍田令辛酉詔遣太常寺主簿朱揚祖閤門祗候林拓詣洛陽省謁八陵四月辛未詔遣朱復之詣八陵相度修奉丁丑詔比年宗親貧窶或致失所甚非國家睦族之意大宗正司南外西外宗正司其申嚴州郡以時贍給違者有刑監察御史王遂言史嵩之本不知兵矜功自侈謀身詭祕欺君誤國留之襄陽一日則有一日之憂不報戊寅歲星守太微垣上相星壬午監察御史洪咨夔言今殘金雖滅隣國方彊益嚴守備猶恐不逮豈可動色相賀渙然解體以重方來之憂上嘉納甲申日生赤暈丙戌以滅金獲其主完顏守緒遺骨告太廟其玉寶法物幷俘囚張天綱完顏好海等命有司審實以聞庚寅詔授孟珙帶御器械京襄部押官屬陳一薦江海官兩轉餘論功行賞金降人夾谷奴婢改姓同名鼎王聞顯呼延實來伯友石天瑞白華各授官有差丁酉臣僚言江淮荊襄諸路都大提點坑冶吳淵恃才貪虐籍人家貲以數百萬計掩為己有其弟潛違道干譽任用非類詔吳淵落右文殿修撰吳潛落祕閣修撰並放罷五月庚子薛極卒贈少師戊申太平州螟己酉太陰入氐乙卯詔李知孝瑞州居住梁成大潮州居住莫澤南康軍居住並再降授官尋盡追爵秩詔魏了翁赴闕丙辰以趙范為兩淮制置使節制軍馬兼沿江制置副使壬戌以崔與之為端明殿學士提舉西京嵩山崇福宮陳韡權工部尚書知隆興府江西安撫使丙寅詔黃幹李燔李道傳陳宓樓昉徐宣胡夢昱皆阨於權姦而各行其志沒齒無怨其賜謚復官優贈存恤仍各錄用其子以旌忠義戴埜其復元資以勵士風建陽縣盜發衆數千人焚艹疎邵武麻沙長平六月戊辰朔鄭清之等進奏選德殿柱有金書六字曰毋不敬思無邪上曰此坐右銘也庚午熒惑填星合于胃壬申詔蠲漳泉興化三州丁米錢丙子以李鳴復為侍御史兼侍講戊寅以喬行簡知樞密院事曾從龍參知政事鄭性之簽書樞密院事陳貴誼兼同知樞密院事己卯詔故巴陵縣公竑可盡復本身官爵有司其檢視墓域以時致祭妻吳昨自請為尼特賜慧淨法空大師紹興府月給衣資緡綫詔殿司選精銳千人命統制婁拱統領楊辛討捕建陽縣盜辛巳詔故端明殿學士開府儀同三司史彌遠贈資政殿大學士謚忠宣熒惑犯填星丙戌有流星大如太白戊子日暈不匝生格氣癸巳史嵩之進兵部尚書禁毀銅錢作器用幷貿易下海秋七月乙巳詔嘉興縣王臨年百二歲補迪功郎致仕八月癸酉詔河南新復郡縣久廢播種民甚艱食江淮制司其發米麥百萬石往濟歸附軍民仍榜諭開封應天河南三京甲戌朱揚祖林拓朝謁八陵回以圖進上問諸陵相去幾何及陵前澗水新復揚祖悉以對上忍涕太息乙亥以趙范為京河關陝宣撫使知開封府東京留守趙葵京河制置使知應天府南京留守全子才關陝制置使知河南府西京留守甲午權邵武軍王埜以平建陽寇有功官兩轉餘推賞有差九月庚子趙范依舊京西湖北安撫制置大使知襄陽府辛丑熒惑入井壬寅趙范言趙葵全子才輕遣偏師復西京趙楷劉子澄參贊失計師退無律致後陣敗覆趙葵削一秩措置河南京東營田邊備全子才削一秩措置唐鄧息營田邊備劉子澄趙楷並削三秩放罷又言楊義一軍之敗皆由徐敏子范用吉怠於赴援致不能支詔范用吉降武翼郎徐敏子削三秩放罷楊義削四秩勒停自效己酉真德秀言權臣罔上講筵官亦傅會其言今承其弊有當慮者五事幷及泉漳寇盜鹽法之弊帝嘉納之詔進士何霆編類朱熹解注文字有補經筵授上文學冬十月己卯真德秀進大學衍義辛卯陳貴誼薨贈少保十一月壬子京湖制司創鎮北軍詔以襄陽府駐劄御前忠衞軍為名壬戌太白經天十二月己卯大元遣王檝來戊子王檝辭于後殿辛卯遣鄒伸之李復禮喬仕安劉溥報謝各進二秩
