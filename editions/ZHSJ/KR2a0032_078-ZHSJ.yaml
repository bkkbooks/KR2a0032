行分後行分少損之後行分多益之為每日行度及分秒乃順加退減其星其段初日晨前夜半定星命之即每日夜半星行所在宿次徑求其日宿次置所求日減一半之以日差乘而加減初日行分後行分少減之後行分多加之算以所求日乘之為積度以順加退減其星其段初日夜半宿次即所求日夜半宿次求五星合見伏行差木火土三星以其段初日星行分減太陽行分為行差金水二星順行者以其段初日太陽行分減星行分為行差金水二星退行者以其段初日星行分幷太陽行分為行差內水星夕伏晨見直以太陽行分為行差求五星定合見伏汎用積木火土三星各以平合晨疾夕伏定積便為定合見伏汎用積金水二星各置其段盈縮定差內水星倍之以其段行差除之為日不滿退除為分在平合夕見晨伏者盈減縮加定積為定合見伏汎用積在退合夕伏晨見者盈加縮減定積為定合見伏汎用積求五星定合定積定星木火土三星以平合行差除其日盈縮分為距合差日以盈縮分減之為距合差度以差日差度盈減縮加其星定合汎用積為其星定合定積定星金水二星順合者以平合行差除其日盈縮分為距合差日以盈縮分加之為距合差度以差日差度盈加縮減其星定合汎用積為其星定合定積定星金水二星退合者以平合行差除其日盈縮分為距合差日以減盈縮減之分為距合差度以差日盈減縮加以差度盈加縮減再定合汎用積為其星再定合定積定星各以天正冬至大餘及約分加定積滿統法去之命甲子算外即得定合日辰以天正冬至加時黃道日度加定星依宿次去之即得定合所在宿次求五星定見伏定積木火土三星以汎用積晨加夕減一象如半周天已下自相乘已上覆減一周天餘亦自相乘七十五而一所得以其星伏見度乘之十五而一為差如其段行差除之為日不滿退除為分見加伏減汎用積為其星定見伏定積金水二星以行差除其日盈縮分為日在夕見晨伏盈加縮減汎用積為常用積夕伏晨見盈減縮加汎用積為常用積如常用積在半周天已下為冬至後已上去之餘為夏至後各在一象已下自相乘已上覆減一周天餘亦自相乘冬至後晨夏至後夕以十八而一冬至後夕夏至後晨以七十五而一所得以其星伏見度乘之十五而一為差如其段行差除之為日不滿退除為分冬至後晨見夕伏夏至後夕見晨伏以加常用積為其星定見伏定積冬至後夕見晨伏夏至後晨見夕伏以減常用積為其星定見伏定積加命如前即得定見伏日辰
