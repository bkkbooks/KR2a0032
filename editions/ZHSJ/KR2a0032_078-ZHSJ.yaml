body:
  text: 宋史卷七十八志第三十一律曆十一觀天曆步交會交終分三十二萬七千三百六十一秒九千九百四十四交終日二十七餘二千五百五十一秒九千九百四十四交中日一十三餘七千二百九十秒九千九百七十二朔差日二餘三千八百三十一秒五十六望策一十四餘九千二百六秒五千後限日一餘一千九百一十五秒五千二十八前限日一十二餘五千三百七十五秒四千九百四十四以上秒母同一萬交率一百八十三交數二千三百三十一交終度三百六十三分七十六交中度一百八十一分八十八交象度九十分九十四半交象度四十五分四十七陽曆食限四千九百定法四百九十陰曆食限七千九百定法七百九十求天正十一月經朔加時入交汎日置天正十一月經朔加時積分以交終分及秒去之不盡滿統法為日不滿為餘秒即天正十一月經朔加時入交汎日及餘秒求次朔及望加時入交汎日置天正經朔加時入交汎日及餘秒求次朔以朔差加之求望以望策加之滿交終日及餘秒去之即次朔及望加時入交汎日及餘秒若以經朔小餘減之餘為夜半入交汎日求定朔望夜半入交汎日置經朔望夜半入交汎日若定朔望大餘有進退者亦進退交日否則因經為定即定朔望夜半入交汎日及餘秒求次朔夜半入交汎日置定朔夜半入交汎日及餘秒大月加二日小月加一日餘皆加九千四百七十八秒五十六求次日累加一日滿交終日及餘秒去之即次定朔及每日夜半入交汎日及餘秒求朔望加時入交常日置經朔望入交汎日及餘秒以其朔望入盈縮限朏朒定數朏減朒加之即朔望加時入交常日及餘秒求朔望加時入交定日置其朔望入轉朏朒定數以交率乘之交數而一所得以朏減朒加入交常日及餘秒滿與不足進退其日即朔望加時入交定日及餘秒求月行入陰陽曆置其朔望入交定日及餘秒在交中已下為月行陽曆已上去之餘為月行陰曆求朔望加時月行入陰陽曆積度置月行入陰陽曆日及餘秒以統法通日內餘九而一為分分滿百為度即朔望加時月行入陰陽曆積度及分求朔望加時月去黃道度置入陰陽曆積度及分如交象已下為入少象已上覆減交中度餘為入老象皆列於上下列交中度相減相乘進位如一百二十八而一為汎差又視入老少象度如半交象已下為初已上去之餘為末皆二因退位初減末加汎差滿百為度即朔望加時月去黃道度及分求日月食甚定餘置定朔小餘如半統法已下與半統法相減相乘如三萬六千九十而一為時差以減如半統法已上減去半統法餘亦與半統法相減相乘如一萬八千四十五而一為時差午前以減午後以加皆加減定朔小餘為日食甚小餘與半法相減餘為午前後分其月食者以定望小餘為月食甚小餘求日月食甚辰刻各置食甚小餘倍之以辰法除之為辰數不滿五因滿刻法而一為刻不滿為分其辰數命子正算外即食甚辰刻及分若加半辰即命起子初求氣差置其朔盈縮限度及分自相乘進二位盈初縮末一百九十七而一盈末縮初二百一十九而一皆用減四千一十為氣汎差以乘午前後分如半晝分而一所得以減汎差為定差春分後交初以減交中以加秋分後交初以加交中以減如食在夜反用之求刻差置其朔盈縮限度及分與半周天相減相乘進二位二百九而一為刻汎差以乘午前後分如三千七百半而一為定差冬至後午前夏至後午後交初以加交中以減冬至後午後夏至後午前交初以減交中以加求日入食限交前後分置朔入交定日及餘秒以氣刻時三差各加減之如交中日已下為不食已上去之如後限已下為交後分前限已上覆減交中日餘為交前分求日食分置交前後分如陽曆食限已下為陽曆食定分已上用減一萬二千八百餘為陰曆食定分如不足減者日不食各如定法而一為大分不盡退除為小分小分半已上為半彊已下為半弱命大分以十為限即得日食之分求日食汎用分置日食定分退二位列於上在陽曆列九十八於下在陰曆列一百五十八於下各相減相乘陽以二百五十而一陰以六百五十而一各為日食汎用分求月入食限交前後分置望月行入陰陽曆日及餘秒如後限已下為交後分前限已上覆減交中日餘為交前分求月食分置交前後分如三千七百已下為食既已上覆減一萬一千七百不足減者為不食餘以八百而一為大分不盡退除為小分小分半已上為半強已下為半弱命大分以十為限即得月食之分求月食汎用分置望交前後分自相乘退二位交初以一千一百三十八而一用減一千二百三交中以一千二百六十四而一用減一千八十三各為月食汎用分求日月食定用分置日月食汎用分以一千三百三十七乘之以定朔望入轉算外轉定分而一所得為日月食定用分求日月食虧初復滿小餘置日月食甚小餘以定用分減之為虧初加之為復滿即各得所求小餘若求辰刻依食甚術入之求月食更籌法置望辰分四因退位為更法五除之為籌法求月食入更籌置虧初食甚復滿小餘在晨分已下加晨分昏分已上減去昏分皆以更法除之為更數不盡以籌法除之為籌數其更籌數命初更算外即各得所入更籌求日月食甚宿次置朔望之日晨前夜半黃道日度及分以統法約日月食甚小餘加之內月食更加半周天各依宿次去之即日月食甚所在宿次求月食既內外刻分置月食交前後分覆減三千七百如不足減者為食不既退二位列於上下列七十四相減相乘進位如三十七而一所得以定用分乘之如汎用分而一為既內分以減定用分餘為既外分求日月帶食出入所見之分各以食甚小餘與日出入分相減餘為帶食差其帶食差在定用分已上為不帶食出入以乘所食之分滿定用分而一若月食既者以既內分減帶食差餘乘所食之分如既外分而一所得以減既分如不足減者為帶食既出入以減所食之分餘為帶食出入所見之分求日食所起日在陽曆初起西南甚於正南復滿東南日在陰曆初起西北甚於正北復滿東北其食八分已上者皆起正西復滿正東此據午地而論之當審黃道斜正可知求月食所起月在陽曆初起東北甚於正北復滿西北月在陰曆初起東南甚於正南復滿西南其食八分已上者皆起正東復滿正西此據午地而論之當審黃道斜正可知步五星五星曆策一十五度約分二十一秒九十木星周率四百七十九萬八千五百二十六秒九十二周日三百九十八餘一萬五百八十六秒九十二歲差一百一十六秒七十二伏見度一十三半變目變日變度限度初行率晨伏一十七日三度七十五二度七十三二十三晨疾初二十八日六度二四度三十九二十三晨疾末二十八日五度六十四度八二十二晨遲初二十八日四度六十二三度三十七一十九晨遲末二十八日一度九十一度三十八一十四晨留二十四日晨退四十六日四十四五度七空度八十七空夕退四十六日四十四五度七空度八十七一十六夕留二十四日夕遲初二十八日一度九十一度三十八空夕遲末二十八日四度六十二三度三十七一十四夕疾初二十八日五度六十四度八一十九夕疾末二十八日六度二四度三十九二十一夕伏一十七日三度七十五二度七十五二十二木星盈縮曆策數損益率盈積度損益率縮積度初益一百七十二空益一百七十二空一益一百四十三一度七十二益一百四十三一度七十二二益一百一十四三度一十五益一百一十四三度一十五三益八十五四度二十九益八十五四度二十九四益五十四五度十四益五十四五度一十四五益二十二五度六十八益二十二五度六十八六損二十二五度九十損二十二五度九十七損五十四五度六十八損五十四五度六十八八損八十五五度一十四損八十五五度一十四九損一百一十四四度二十九損一百一十四四度二十九十損一百四十三三度一十五損一百四十三三度一十五十一損一百七十二一度七十二損一百七十二一度七十二火星周率九百三十八萬二千五百六十秒七十六周日七百七十九餘一萬一千一百九十秒七十六歲差一百一十六秒一十三伏見度一十八變目變日變度限度初行率晨伏六十八日五十度空分四十七度五十七十四晨疾初五十五日三十九度五三十七度九七十二晨疾末五十五日三十八度九十四三十七度空七十晨次疾初四十七日三十一度二三十九度四十六六十八晨次疾末四十七日二十八度二十一十六度七十九六十四晨遲初三十九日一十八度七十二一十七度七十八五十六晨遲末三十九日一十度空分九度五十四十晨留一十一日晨退二十八日九十六八度五十九二度二十二空夕退二十八日九十六八度五十九二度二十二四十五夕留一十一日夕遲初三十九日一十度空分九度五十空夕遲末三十九日一十八度七十二一十七度七十八四十夕次疾初四十七日二十八度二十二十六度七十九五十六夕次疾末四十七日三十一度二二十九度四十六六十四夕疾初五十五日三十八度九十四三十七度空分六十八夕疾末五十五日三十九度五三十七度九七十夕伏六十八日火星盈縮曆策數損益率盈積度損益率縮積度初益千一百六十空益四百四空一益八百八十一十一度六十益四百二十六四度四二益四百三十二十度四十益四百五十八度三十三益一百五十五二十四度七十益四百八十五一十二度八十四損五十二十六度二十五益三百八十五一十七度六十五五損一百二十二十五度七十五益三百五二十一度五十六損三百五二十四度五十五益一百二十二十四度五十五七損三百八十五二十一度五十益五十二十五度七十五八損四百八十五一十七度六十五損一百五十五二十六度二十五九損四百五十一十二度八十損四百三十二十四度七十十損四百二十六八度三十損八百八十二十度四十十一損四百四四度四損一千一百六十一十一度六十土星周率四百五十四萬八千四百三十一秒八十五周日三百七十八餘一千九十一秒八十五歲差一百一十六秒三十伏見度一十六半變目變日變度限度初行率晨伏十九日二度五十一度五十一十四晨疾初二十八日三度二十二一度九十三一十二晨疾末二十八日二度八十一度六十八一十一晨遲二十八日一度四十空度八十四九晨留三十六日晨退五十日四三度五十空度四十七空夕退五十日四三度五十空度四十七一十夕留三十六日夕遲二十八日一度四十空度八十五空夕疾初二十八日二度八十一度六十八九夕疾末二十八日三度二十二一度九十三一十一夕伏一十九日二度五十一度五十一十二土星盈縮曆策數損益率盈積度損益率縮積度初益二百二十空二度益二百二十空一益一百八十二度二十益一百八十二度二十二益一百四十四度益一百四十四度三益一百五度四十益一百五度四十四益六十六度四十益六十六度四十五益二十七度益二十七度六損二十七度二十損二十七度二十七損六十七度損六十七度八損一百六度四十損一百六度四十九損一百四十五度四十損一百四十五度四十十損一百八十四度損一百八十四度十一損二百二十二度二十損二百二十二度二十金星周率七百二萬四千三百二十一秒三十四周日五百八十三餘一萬八百三十一秒三十四歲差一百一十六秒六十九伏見度一十一半變目變日變度限度初行率夕伏三十八日五十