body:
  text: 宋史卷一百三十四志第八十七樂九樂章三太廟常享禘祫加上徽號郊前朝享皇后別廟建隆以來祀享太廟一十六首迎神禮安肅肅清廟奉祠來詣格思之靈如在之祭克謹威儀載嚴容衞降福孔皆以克永世皇帝行隆安工祝升階賓尸在位祗達孝思允修毖祀顯相有儀克恭乃事儼恪其容通此精意奠瓚用瑞木木符啟瑞著象成文於昭大號協應明君靈命有屬鴻禧洞分歌以升薦休嘉洽聞又馴象嘉彼馴象來歸帝鄉南州毓質中區效祥仁格巨獸德柔遐荒有感斯應神化無方又玉烏素烏爰止淳精允臧名符瑞牒色應金方潔白容與翹英奮揚孝思攸感皇德逾張奉俎豐安維犧維牲以炰以烹植其鞉鼓潔彼鉶羹孔碩茲俎於穆厥聲肅雍顯相福祿來成酌獻僖祖室大善湯湯洪河經啟長源鬱鬱嘉木挺生本根大哉崇基出乎慶門發祥垂裕永世貽孫順祖室大寧元鍾九千生於仲呂崇臺九層起於累土赫日之升明夷為主孝孫作帝式由祖武翼祖室大順明明我祖積德攸宜肇繼瓜瓞將隆本支爰資慶緒式昭帝基於穆清廟永洽重熙宣祖室大慶艱難積行緜長鍾慶同人之時得主乃定既宗祧乃修舞詠經武開先永昭丕命太祖室大定猗歟太祖受命于天化行區宇功溢簡編武威震耀文德昭宣開基垂統億萬斯年太宗室大盛赫赫皇運明明太宗四隩咸暨一變時雍睿文炳煥聖德溫恭千齡萬祀永播笙鏞飲福禧安嘉粟旨酒博腯牲牷神鑒孔昭享茲吉蠲夙夜毖祀孝以奉先永錫純嘏功格于天亞獻正安已象文治乃觀武成進退可度威儀克明終獻正安常武徂征詩人所稱總干山立厥象伊凝徹豆豐安肥腯之牲既析既薦鬱鬯之酒已酌已獻祝辭亦陳和奏斯徧享禮具舉徹其有踐攝事十三首降神理安肅肅清廟昭事祖禰粢盛苾芬四海來祭皇靈格思令容有睟降福孔皆以克永世太尉行正安祼鬯溥將賓尸在位帝德升聞孝思光被公卿庶正傅御師氏至誠感神福祿來暨奠瓚瑞安淳清育物瑞木成文元氣陶冶非煙郁氛玄貺昭格至和所熏登歌祼獻肸蠁如聞奉俎豐安麗碑割牲以炰以烹博碩肥腯薦羞神明祖考來格享于克誠如聞謦欬式燕以寧酌獻僖祖室大善肅肅藝祖肇基鴻源權輿光大燕翼貽孫載祀惟永慶流後昆威靈在天顧我思存順祖室大寧思文聖祖長發其祥錫羨蕃衍德厚流光眷命自天卜世聿昌祗肅孝享降福無疆翼祖室大順明明我祖積德累仁居晦匿曜邁種惟勤帝圖天錫輝光日新寢廟繹繹昭事同寅宣祖室大慶洸洸我祖時惟鷹揚潛德弗耀發源靈長肆類配天永思不忘來顧來享百福是將太祖室大定赫赫太祖受命于天赤符啟運威加八埏神武戡難功無間然翼翼丕承億萬斯年太宗室大盛穆穆太宗與天合德昧旦丕顯乾乾翼翼敷佑下民時帝之力永懷聖神孝思罔極真宗室大明煌煌真宗善繼善承經武耀德臻于治平封祀禮樂丕昭鴻名陟配文廟皇圖永寧徹豆豐安鼎俎既陳豆籩既設金石在庭工師就列備物有嚴著誠致潔孝惟時思禮以雍徹送神理安神之來兮風肅然神之去兮升九天排凌兢兮還恍惚羽旄紛兮蕭燔煙真宗御製二首奠瓚用萬國朝天鴻源濬發睿圖誕彰高明錫羨累洽延祥巍巍藝祖溥率賓王煌煌文考區宇大康珍符昭顯寶曆綿長物性茂遂民俗阜昌甫田多稼禾黍穰穰含生嘉育鳥獸蹌蹌八紘統域九服要荒沐浴惠澤祗畏典常隔谷分壤望斗辨方並襲冠帶來奉圭璋峨峨雙闕濟濟明堂諸侯執帛天后當陽何以辨等袞衣繡裳何以褒德輅車乘黃聲明煥赫雅頌汪洋啟茲丕緒祐我無疆大統斯集大樂斯揚俯隆宗祏仰繼穹蒼亞獻終獻用平晉樂五代衰替六合離封疆竊據兵甲競馳天顧黎獻塗炭可悲帝啟靈命濬哲應期皇祖丕變金鉞俄麾率土執贄獷俗來儀瞻彼大鹵竊此餘基獨迷文告莫畏天威神宗繼統璿圖有輝尚安蠢爾罔懷格思六飛夙駕萬旅奉辭徯來發詠不陣行師雲旗先路壺漿塞岐天臨日照宸慮通微前歌後舞人心悅隨要領自得智力何施風移僭冒政治淳熙書文混一盛德咸宜干戈倒載振振言歸誕昭七德永定九圍真宗告饗六首告受天書瑞安寶命自天鴻禧錫祚昭晰綠文氤氳黃素玄感荐彰靈休誕布寅奉珍符聿懷永慕太祖太宗加上尊謚顯安報貺陟封聿昭典禮讓德穹厚歸功祖禰丕顯尊稱盡善盡美寅威孝思以介蕃祉東封畢躬謝酌獻封安奕奕清廟錫羨詒謀升中神嶽顯允皇猷歸格藝祖昭報靈休奉先追遠盛德益修祀汾陰畢躬謝酌獻顯安於昭列聖休德清明威靈如在享于克誠報功厚載馨薦惟精歸格飲至禮備樂成聖祖降親告瑞安於赫聖祖景靈在天神遊來暨睟容穆然誨言昭示帝冑開先齊明欽若延鴻億年六室加謚顯安欽崇太霄肅奉徽冊大禮克誠鴻猷有赫令芳爰薦明靈斯格昭謝垂祥永懷何極景祐親享太廟二首迎神興安追養奉先納孝練主金奏鳳鳴關雎樂舞奠鬯恭神肥腯展俎積慶聰明降景寰宇酌獻真宗室大明於穆真皇宅心道粹和戎偃革煥乎文治操瑞拜圖封天祀地盛德為宗烝嘗萬世至和祫享三首迎神興安濡露降霜永懷孝思祫食諦再閏之期歌德詠功八音播之歆神惟始靈其格茲奠瓚嘉安昭穆親祖自室徂堂禮備樂成肅然祼將瑟瓚黃流條鬯芬芳氣達淵泉神孚來享送神興安四祖基慶三后在天薦侑備成靈娭其旋孝孫應嘏受福永年送之懷之明發惻然嘉祐祫享二首迎神懷安躬茲孝享禮備樂成神登于俎祝導于祊展牲肥腯奏格和平靈其昭格肅僾凝情送神懷安靈神歸止光景肅然福祥裕世明威在天孝孫有慶駿烈推先佑茲基緒彌萬斯年熙寧以後享廟五首酌獻英宗室大英在宋五世天子嗣昌躬發英斷若乾之剛聲容沄沄被于八荒垂千萬年永烈有光送神興安鍾鼓惟旅籩豆孔時衎我祖宗既右享之神亟來止孝孫之喜神保聿歸孝孫之思禘祫孟享臘享宗正卿升殿正安進退有容服章有儀匪亟匪遲降登孔時祫享仁宗大和於穆仁廟聖澤滂流華夷用乂動植蒙休徽名冠古奕世垂謀帝躬祼獻盛典昭修英宗大康赫赫英皇總提邦紀濬發神功恢張聖理仙馭雖遙鴻徽不弭永言孝思竭誠躬祀常祀五享三首迎神興安九變奕奕清廟昭穆定位霜露增感粢盛潔祭神靈來格福祉攸暨追孝奉先本支百世太尉奠瓚嘉安有秩時祀匪怠匪瀆有來宗工載祗載肅厥作祼將流黃瓚玉是享是宜永綏多福送神興安皇祖皇考配帝配天駿奔顯相神保言旋祝以孝告嘏以慈宣去來永慕宗事惟虔紹興以後時享二十五首迎神興安黃鍾為宮奉先嚴祀率禮大經時思致享肅薦芳馨竭誠備物樂奏和聲真馭來止熙事克成大呂為角聖靈在天九關崇深風馬雲車紛其顧臨擁祥儲休昭答孝心孝孫受祉萬福是膺太簇為徵嘉承和平秩祀為先乃練休辰祝史告虔內心齊明祀具吉蠲交際恍惚如在後前應鍾為羽道信於神神靈燕娭酒有嘉德物惟其時緩節安歌樂奏具宜欣欣樂康福祿綏之奉俎豐安王假有廟子孫保光奉牲以告玉俎膏香專精厲意神其迪嘗休承靈意申錫無疆初獻盥洗正安恪恭祀典涓選休成設洗致潔直于東榮嘉觴祗薦明德惟馨祖考來格享茲孝誠升殿正安冠佩雍容時惟上公享于清廟陟降彌恭籩豆靜嘉粢盛潔豐孝孫有慶萬福來同僖祖室酌獻基命於穆文獻自天發祥肇基明命錫羨無疆子孫千億宗社靈長神之格思如在洋洋宣祖室酌獻天元天啟炎曆集我大命長發其祥篤生上聖夷亂芟荒乾坤以定時祀聿修孝孫有慶太祖室酌獻皇武赫赫藝祖受天明命威加八紘德垂累聖祀事孔明有嚴笙磬對越在天延休錫慶太宗室酌獻大定明明在上時維太宗允武允文丕基紹隆於肅清廟昭報是豐皇靈格思福祿來同真宗室酌獻熙文於穆真皇維烈有光丕承二后奄奠萬方威加戎狄道格穹蒼歆時禋祀降福無疆仁宗室酌獻美成至哉帝德乃聖乃神恭己南面天下歸仁歷年長久垂裕後人祀修舊典寶命維新英宗室酌獻治隆炎基克鞏赫赫英宗紹休前烈仁化彌隆篤生聖子堯湯比蹤烝嘗萬世福祿來崇神宗室酌獻大明於昭神祖運撫明昌肇新百度克配三王遐荒底績聖武維揚永言執競上帝是皇哲宗室酌獻重光於皇濬哲遹駿有聲率時昭考丕顯儀刑功光大業道協三靈永綏厥後來燕來寧徽宗室酌獻承元天錫神聖徽柔懿恭垂衣拱手遵制揚功配天立極體道居中佑我烈考萬福攸同欽宗室端慶於皇欽宗道備德宏允恭允儉克類克明孝遵前烈仁翊函生歆茲肆祀永燕宗祊高宗室大德於皇時宋自天保定高宗受之再僕景命紹開中興翼善傳聖何千萬年永綏厥慶孝宗室大倫聖人之德無加於孝思皇孝宗履行立教始終純誠非曰笑貌於萬斯年是則是傚光宗室大和維宋洽熙帝繼于理萬姓厚生三辰順軌對時天休以燕翼子肅唱和聲神其有喜文舞退武舞進正安肅肅清廟於顯維德我祀孔時我奏有翼秉翟載駿有來干戚神之燕娭休祥允格亞終獻文安觀德宗祏奕世烈光有嚴祀典粵循舊章樂諧九變獻舉重觴燕娭如在戩穀穰穰徹豆恭安禮備樂成物稱誠竭相維辟公神人以說歌雍一章諸宰斯徹天子萬年無競維烈送神興安霜露既降時思展禋在天之御睠然顧歆樂成禮備言歸靡停既安既樂福祿來成祫享八首迎神興安黃鍾宮時維孟冬霜露既零合食盛禮以時以行孝心翼翼惟神來寧肅倡斯舉神具是聽大呂角於穆孝思嘉薦維時誠通茲格咸來燕娭神之聽之申錫蕃釐於萬斯年永保丕基太簇徵於昭孝治通乎神明寒暑不忒熙事備成牲牷孔碩黍稷惟馨以享以祀來燕來寧應鍾羽苾芬孝祀薦灌肅雍致力於神明信咸通靈之妥留惠我龐鴻廣被萬𧜛福祿攸同初獻順祖酌獻大寧於赫皇祖濬發其祥德盛流遠奕世彌昌孝孫有慶嘉薦令芳神保是享錫羨無疆翼祖酌獻興安上天眷命佑我丕基翼翼皇祖不耀其輝積厚流長福祿攸宜祀事孔時曾孫篤之光宗室酌獻大承於皇光宗握符御極昭哉嗣服惟仁與德勤施於民靡有暇逸萬年之思永奠宗祏送神興安合祭大事因時發天翼翼孝思三獻禮虔神兮樂康飈馭言旋永福後人於千萬年上仁宗英宗徽號一首入門升殿顯安於穆仁祖寵綏萬方執競英考迄用成康圖徽寶冊有烈其光庶幾億載與天無疆上英宗尊號一首入門正安在宋五世天子神明羣公奉冊迺揚鴻名金書煌煌遹昭厥成思皇多祜與天同聲增上神宗徽號一首哲宗朝製升殿顯安於惟禰廟乃聖乃神秉文之士作起惟新建宮稽古一視同仁庶幾備號以享天人紹興十四年奉上徽宗冊寶三首冊寶入門顯安於鑠徽考如天莫名迨茲丕揚擬純粹精溫玉鏤文來至于祊有嚴奕奕禮備樂成冊寶升殿顯安金字煌煌瑤光燦燦羣工奉之登此寶殿對越祖宗式遵成憲威靈在天來止來燕上徽號顯安惟精惟一乃聖乃神鴻名克揚茂實斯賓如禹之功如堯之仁孝思永慕用詔無垠淳熙十五年上高宗徽號三首冊寶入門顯安於穆高皇功德兼隆稱天以誄初謚未崇載稽禮典揚徽垂鴻涓日之良登進廟宮冊寶升殿顯安有瑑斯寶有編斯冊導以麾仗奏以金石祲威盛容煌煌赫赫臣工奉之高靈來格上徽號顯安中興之烈高掩商宗揖遜之美放勳比隆字十有六擬諸形容威靈在天裕後無窮慶元三年奉上孝宗徽號三首冊寶入門顯安巍巍孝廟聖德天通同符藝祖克紹高宗有儀有冊載推載崇鏤玉繩金登奉祏宮冊寶升殿顯安文金晶熒冊玉輝潤統紹乎堯德全于舜勤崇推高子孝孫順冠德百王萬年垂訓上徽號顯安金石充庭珩璜在列繪畫乾坤形容日月巍巍功德顯顯謨烈垂億萬年鴻徽昭揭高宗郊祀前朝享太廟三十首皇帝入門乾安後還前殿並同於皇我后祗戒專精假于有廟祖考是承趨進惟肅僾思惟誠神之聽之來燕來寧皇帝升殿乾安詣室降殿並同皇皇大宮丕顯於穆休德昭清元氣回復芝葉蔓茂桂華馮翼孝孫假斯受茲介福盥洗乾安維皇齊精鬷假于廟觀盥之初惟以潔告衎承祖宗恤祀昭孝誠心有孚介福斯報迎神興安秬鬯既將黃鍾具奏肅我祖考祗栗以俟監觀于茲雲車來下尚書奉俎豐安有碩其牲登于大房肅展以享庶幾迪嘗匪腯是告我民其康保艾爾後垂休無疆皇帝再盥洗乾安盥至于再潔誠愈孚帝用祗薦靈咸嘉虞騰歌臚歡會于軒朱觀厥顒若受福之符僖祖室酌獻基命思文僖祖基德之元皇武大之受命于天積厚流光不已其傳曾孫篤之於萬斯年翼祖室酌獻大順天命有開維仁是依迺睠冀邦于以顧之其顧伊何發祥肇基施于孫子虔奉孝思宣祖室天元昭哉皇祖源深流長雕戈圭瓚休有烈光天祐潛德繼世其昌永懷積累嘉薦令芳太祖室皇武為民請命皇祖赫臨天地並貺億萬同心造邦以德介福宜深挹彼惟旨真游居歆太宗室大定皇矣太宗嗣服平成益奮神旅再征不庭文武秉德仁孝克明以聖傳聖對越紫清真宗室熙文思文真宗體道之崇憺威赫靈遵制揚功真符鼎來告成登封盛德百世於昭無窮仁宗室美成徽宗御製仁德如天徧覆無偏功濟九有恩涵八埏齊民受康朝野晏然擊壤歌謠四十二年英宗室治隆穆穆英宗持盈守成世德作求是纘是承齊家睦族偃武恢文於薦清酤酌之欣欣神宗室大明烝哉維后繼明體神稽古行道文物一新潤色鴻業垂裕後人靈斿沛然來燕來寧哲宗室重光明哲煌煌照臨無疆紹述先志寔宣重光詒謀燕翼率由舊章苾芬孝祀降福穰穰徽宗室承元御製於皇烈考道化聖神堯聰舜孝文恬武忻命子出震遺駿上賓罔極之哀有古莫倫降殿乾安明德惟馨進止回復裼襲安恭嚴若惟谷誠意昭融羣工袂屬成此祲容生乎齊肅入小次乾安於皇我后祗戒專精躬製聲詩文思聰明雍容戾止玉立端誠神聽如在福祿來寧文舞退武舞進正安八音諧律綴兆充庭進旅退旅肅恭和平盛薦祖宗靈監昭升象功崇德遹觀厥成亞獻正安威神在天享于克誠申以貳觴式昭德馨籩豆孔嘉樂舞具陳庶幾是聽福祿來成終獻正安疏冪三舉誠意一純孰陪予祀公族振振神具醉止燕娭窈冥於萬斯年綏我思成皇帝出小次乾安夙戒告備禮節俯成妥侑惟乾氛氳夜澄有嚴有翼列聖靈承於穆清閟肅肅無聲皇帝再升殿詣飲福位乾安維皇親享至再至三禮備樂奏層陛森嚴粢盛芳潔酒醴旨甘雲車風馬從衞觀瞻飲福禧安赫赫明明維祖維宗鑒于文孫維德之同日靖四方亦同其功億萬斯年以承家邦還位乾安帝既臨享步武鳴鸞陟降規矩顒昂周旋登歌一再典禮莫愆神之聽之祉福緜緜尚書徹豆豐安熙事既成嘉籩告徹洋洋來臨藹藹布列配帝其功在天對越允集叢釐萬邦和悅送神興安神之來游風馬雲車淹留彷彿顧瞻欷歔神之還歸鈞天帝居監觀于下何福不除降殿乾安於皇上天欽哉成命集于沖人丕承列聖爰熙紫壇于廟告慶肸蠁潛通休祥荐應還大次乾安盛德豐功一祖六宗欽翼燕詒禋享是崇厲意齊精假廟惟恭率禮周旋福祿來同寧宗朝享三十五首皇帝入門乾安王假有廟四極駿奔鼎俎宵嚴虡簨雲屯積厚流廣德隆慶蕃是則是繩保我子孫升殿乾安於穆清宮奕奕孔碩芝莖蔓秀桂華馮翼八簋登列六瑚賁室皇代擁慶啟佑千億盥洗乾安天一以清地一以寧維皇精專承神明靈娥御墮津瀆祗揚溟盥事允嚴先祖是聽詣室乾安丹楹雲深芳勺宵奠樂華淳鬯禮文炳絢有容有儀載肅載見維時緝熙世世以燕還位乾安旅楹有閑人神允叶福以德昭饗以誠接六樂宣揚百禮煒燁對越在天流祚萬葉迎神興安九變黃鍾為宮咸英備樂簋席列斝詩歌安世聲叶皇雅翠旗羽蓋雲車風馬神其來兮以燕以下大呂為角勾陳旦闢閶闔夜分軫風挾月車駟凌雲瑞景晻靄神光耀熅神其來兮以留以忻太簇為徵穆穆紫幄璜璜清宮旱麓流詠鳧鷖叶工道閎詒燕業綿垂鴻神其來兮以康以崇應鍾為羽文以謨顯武以烈承聖訓之保祖武之繩有肅孝假式嚴衎烝神其來兮以宜以寧捧俎豐安簋豆薦牲鉶籩實饋其俎孔庶吉蠲為饎惟德達馨以忱以貴神既佑享祉貺來暨再詣盥洗乾安精粹象天明清鋻月再御茲盥益致其潔齊容顒若誠意洞徹百禮允洽率禮不越真宗室熙文天地熙泰躋時昇平闡符建壇聲容文明君臣賡載夷夏肅清本支百世持盈守成仁宗室美成在宋四世天子聖神用賢致治約己裕民海內富庶裔夷肅賓四十二年堯舜之仁英宗室治隆明明英后仁孝儉恭丕顯丕承增光祖宗繼志述事遵制揚功萬邦作孚盛德形容神宗室大明厲精基治大哉乾剛信賞必罰內修外攘禮樂法理號令文章作新之功度越百王哲宗室重光於皇我宋世有哲明元祐用人遹駿有聲紹述先志思監于成受天之祜王配于京徽宗室承元帝撫熙運晏粲協期禮明樂備文恬武嬉道光授受謀深燕詒駿命不易子孫保之欽宗室端慶顯顯令主輝光日新奉親以孝綏下以仁兢兢業業誕保庶民於穆不已之德之純高宗室大德昊天有命中興復古治定功成修文偃武德隆商宗業閎漢祖付託得人系堯之緒孝宗室大倫藝祖有孫聰睿神武紹興受禪歸尊于父行道襲爵百度修舉聖德曰孝光于千古光宗室大和維宋洽熙帝繼于理萬姓厚生三辰順軌對時天休以燕翼子肅唱和聲神其有喜還位乾安在周之庭設業設虡酒醴惟醹爾殽伊脯帝觴畢勺天步旋舉丕顯丕承念茲皇祖降殿乾安黼幄蟬蜎飈斿寧燕尊彝獻祼瑚簋陳薦眎儀天旋淳音韶變遹求厥寧福祿流羨入小次乾安皇容肅祗天步舒遲對越惟恭敬事不遺陟降蒞止永言孝思上帝臨女日監于茲文舞退武舞進正安明庭承神鞉磬柷敔玉梢飾歌佾綴維旅既肖厥文復象乃武祖德宗功惟帝時舉亞獻正安尊斝星陳罍冪雲舒來貳鸞觴玉佩瓊琚相予嚴祀秉德有初對揚王休何福不除終獻正安秉德翼翼顯相肅雝疏冪三舉誠意益恭光燭黼繡和流笙鏞子孫衆多福祿來從出小次乾安廟楹邃嚴夜景藻清文物炳彪禮儀熙成帷宮載敞珮珩有聲帝復對越將受厥明再升殿乾安明明維后詒厥孫謀系隆我漢陳錫哉周以孝以饗世德作求介以繁祉萬邦咸休飲福乾安玉瓚黃流有飶其香來假來享降福穰穰我應受之湯孫之將有百斯男福祿無疆還位乾安聖圖廣大宗祊光輝假于有廟帝命不違僾若有慕夙夜畏威嘉樂君子福祿祁祁徹豆豐安升饌有章卒食攸序庭鏘金奏凱收鉶筥其獻惟成其餕維旅禮洽慶流皇祖之祜送神興安珠幄熉黃神既燕娭監觀于下福祿來宜雲車風馬神保聿歸啟佑我後福祿來為降殿乾安聖有謨訓詒謀燕翼奉天酌祖萬世維則維皇孝熙乾乾夕惕禮既式旋惟福之錫還大次乾安王假有廟對越在天帷宮旋御率禮不愆泰畤展祠雲陽奉瑄齊居精明益用告虔理宗朝享三首皇帝升降乾安於皇祖宗清廟奕奕威靈在天不顯惟德垂裕鴻延詒謀燕翼孝孫格斯受祉罔極迎神興安九奏秬鬯既將黃鍾具奏瞻望真游僾若有慕於皇列聖在帝左右雲車具來以妥以侑寧宗室大安帝德之休恭儉淵懿三十一年謹終如始升祔在宮祖功並美民懷有仁何千萬世高宗祀明堂前朝享太廟二十一首皇帝入門乾安於皇我后祗戒專精齊肅有容祖考是承造次匪懈孝思純誠神聽有格福祿來寧升殿乾安肅哉清宮熉珠照幄神之來思八音振作赤舄龍章奉玉惟恪匪今斯今先民時若盥洗乾安於皇維后觀盥之初精意昭著既順既愉圭鬯承祀卿士咸趨目視心化四方其孚迎神興安涓選休成祖考是享夙夜專精求諸惚恍洋洋在上惟神之仰鬯矣清明應之如響捧俎豐安來相于庭鳴鋗鏘鏘奉牲而告登彼雕房非牲之備民庶是康神依民聽上帝斯皇僖祖室酌獻基命何慶之長實兆于商由商太戊子孫其昌皇基成命宋道用光詒厥孫謀膺受四方翼祖室大順上帝監觀維仁是依繼世修德皇心顧之其顧伊何在彼冀方施于子孫降福穰穰宣祖室酌獻天元昭哉皇祖駿發其祥雕戈圭瓚盛烈載揚天錫寶符俾熾而昌神聖應期赫然垂光太祖室皇武猗歟皇祖下民攸歸膺帝之命龍翔太微戎車雷動天地清夷峨峨奉璋萬世無違太宗室大定煌煌神武再御戎軒時惠南土旋定太原車書混同聲教布宣維天佑之億萬斯年真宗室熙文於皇真宗體道之崇游心物外應迹寰中四方既同化民以躬清淨無為盛德之容仁宗室曲同郊祀送神亦同英宗室治隆噫我大君嗣世修文維文維武諟繼虞勳天錫丕祚施于後昆於薦清酤酌之欣欣神宗室大明烝哉維后繼明體神憲章文武宜民宜人經世之道功格于天子孫嚴祀無窮之傳哲宗室重光明哲煌煌照臨無疆丕承先志嘉靖多方朝廷尊榮民庶樂康珍符來應錫茲重光徽宗室承元聖考巍巍光紹丕基禮隆樂備時維純熙天仁兼覆皇化無為功成弗處心潛希夷文舞退武舞進正安作樂合祖簴在庭衆奏具舉肅雝和鳴神靈來格庶幾是聽皦繹以終永觀厥成亞獻正安威神在天來格于誠既載清酤有聞無聲相予熙事時賴宗英肅肅雝雝允協思成終獻正安疏冪三舉誠意一純孰陪予祀公族振振明靈來娭樂舞具陳奉神所佑昭孝息民飲福禧安赫赫明明德與天通施于孫子福祿攸同日靖四方民和年豐有秩斯祜申錫無窮徹豆豐安歆我齊明威德如存牲牷是享圭玉其溫羣公執事亦既駿奔禮成告徹咸福黎元還大次乾安神明既交恍若有承欽翼齊莊福祿具膺王業是興祖武是繩佑我億年以莫不增孝宗明堂前享太廟三首徽宗室酌獻承元明明徽祖撫世升平制禮作樂發政施仁聖靈在天德澤在民億萬斯年保佑後人高宗室大德於皇時宋自天保定高宗受之再僕景命紹開中興翼善傳聖何千萬年永綏厥慶還大次乾安禮既行矣樂既成矣維祖維妣安且寧矣皇舉玉趾佩鏘鳴矣拜貺總章于厥明矣理宗明堂前朝享二首寧宗室奠幣定安皇矣昭考聖靈在天稱秩宗祀有嚴恭先奉幣以薦見之僾然仁深澤厚厥光以延酌獻考安假哉皇考必世後仁嘉靖我邦與物皆春之純之德克配穹旻餘慶淵如佑我後人皇后廟十五首迎神肅安閟宮翼翼雅樂洋洋牲器肅設几筵用張飾以明備秩其令芳神兮來格風動雲翔太尉行舒安服章觀象山龍是則容止蹌蹌威儀翼翼司徒捧俎豐安徹同恪恭奉祀祗薦犧牲九成爰奏有俎斯盈酌獻孝明皇后室惠安祀事孔明廟室惟肅鉶登籩豆金石絲竹既灌既薦允恭允穆奉神如在以介景福孝惠皇后室奉安初陽作配內助惟賢柔順中積英徽外宣神宮有侐明祀惟虔歆誠降祐於萬斯年孝章皇后室懿安猗那淑聖象應資生配天作合與日齊明椒宮垂範彤史揚名聿修毖祀永奉粢盛懿德皇后室順安王門稟慶帝族惟賢功存內治德協靜專流芳圖史垂範紘綖新廟有侐祀禮昭然淑德皇后室嘉安明明英媛德備椒庭籩豆有踐黍稷匪馨靜嘉致薦容與昭靈精意以達顧享來寧莊穆皇后室理安曾孫襲慶柔祇育德正位居體其儀不忒教被宮壼化行邦國祝史正辭垂裕無極莊懷皇后室永安淑德昭著至樂和平登豆在列膋香薦誠六變合禮八音諧聲穰穰景福佑我休明元德皇后廟興安為太宗后為天下母誕聖繼明膺乾作主玉振金相蘭芬桂芳於萬斯年永奉烝嘗飲福禧安彝尊鬯酒慶佑遂行介以純嘏允答明誠亞獻恭安宗臣率禮步玉鏘鏘吉蠲斯獻百祿是將終獻順安薦獻有終禮容斯穆以奉嘉觴以膺多福送神歸安明禋告畢靈輅難留升雲杳邈整馭優游誠深嘉栗禮罄欽修豐融垂佑以永洪休景祐以後樂章六首章獻明肅皇太后室奠瓚達安肅肅閟宮順時薦事鬱鬯馨香如見於位酌獻厚安祥標曾麓德合方儀萬邦展養九御蒙慈孝恭祊祏美播聲詩淑靈顧享申錫維祺章懿皇太后室奠瓚報安青金玉瓚祼將于京永懷罔極夙夜齊明酌獻衍安翊佐先朝章明壼教淑順謙勤徽音在劭樹風不止劬勞匪報黍稷令芳嘏茲乃告奉慈廟章惠皇太后室奠瓚翕安祼圭既陳酌鬯斯醇音容彷彿奠獻惟寅酌獻昌安內輔先猷夙昭壼則保祐之勞慈惠其德榮養有終芳風無極享獻閟宮載懷悽惻真宗汾陰禮畢親謝元德皇后室三首迎神肅安閟宮奕奕韶樂洋洋牲幣虔布几筵肅張醴泉淳美嘉肴潔香俟神來格降彼帝鄉奉俎豐安樂鏗金石俎奉犧牲九成斯奏五教爰行送神理安鸞驂復整鶴駕難留白雲縹緲紫府深幽廟雖載止神無不游垂佑皇宋以永鴻休元德皇后升祔一首顯安之曲顯矣皇妣德侔柔祇升祔太室協禮之宜耀彼寶冊列之尊彝惟誠是厚永佑慶基崇恩太后升祔十四首入門顯安俔天生德作配元符儀刑壼則輔佐帝圖登崇廟祏勒號璠璵烝嘗億載皇極之扶神主升殿顯安曰嬪于京天作之配進賢審官克勤其志於穆清廟本仁祖義億萬斯年神靈攸暨迎神興安四章黃鍾宮二奏閟宮有侐堂筵屹崇靈徽匪遐精誠感通苾芬維時登茲明祀泠然雲車有來其馭大呂角二奏羽旌風翔翠蕤飄舉儼其音徽登茲位處笙鏞始奏合止柷敔是享是宜永求伊祜太簇徵二奏枚枚閟宮鼎俎肆陳烝畀明靈登其嘉新鼓鍾既戒旨酒既醇攸介攸止純禧荐臻應鍾羽二奏旨酒嘉肴于登于豆是享是宜樂既合奏衎我懿德執事溫恭靈兮允格有翼其從罍洗嘉安列爵陳俎芬芳和羹摐金擊石洋洋和聲禮行伊始我德惟明既盥而往於昭斯誠升降殿熙安笙簫紛如陟彼廟庭鏘鏘佩玉懷茲先靈神保聿止音容杳冥繁禧是介萬年惟寧酌獻茲安雝雝玉佩清酤惟良粢盛具列有飶其香懷其徽範德洽無疆於茲燕止降福穰穰亞獻神安嬪于潛邸爰正坤儀關雎化被思齊名垂柔德益茂家邦以熙皇心追崇永羞牲粢退文舞進武舞昭安翩然干戚揚庭陳階文以經緯武以威懷其張其弛節與音諧迄茲獻享妥靈綏來終獻儀安珩璜之貴褘褕之尊天作之合內治慈溫元良鍾慶祉福乾坤以享以祀事亡如存徹豆成安鏘洋純繹於論鼓鍾周旋陟降齊莊肅容維罍既旨維籩伊豐歌徹以雍介福來崇送神興安黍稷維馨虡業充庭既欽既戒靈心是承顧予烝嘗言從之邁申錫無疆是用大介上冊寶十三首冊寶入門隆安威儀皇止庶尹在庭爰舉徽章遹觀厥成勒崇揚休寫之瓊瑛迄于萬祀發聞惟馨冊寶升殿崇安有猶有言順承天則聿崇號名再揚典冊朱英寶函左右翼翼千秋萬歲保茲無極迎神歆安黃鍾宮籩豆大房犧尊將將馨香既登明靈迪嘗其樂伊何吹笙鼓簧靈來燕娭降福無疆大呂角二奏吉蠲惟時禮儀既備奉璋峨峨羣公在位神之格思永錫爾類展彼令德於焉來暨太簇徵二奏雍雍在宮翼翼在庭顯相休嘉肅雍和鳴神嗜飲食明德惟馨綏我思成式燕以寧應鍾羽二奏犧牲既成籩豆有楚摐金擊石式歌且舞追懷懿德令聞令儀靈兮來格是享是宜罍洗嘉安嘉肴旨酒潔粢豐盛既盥而往以我齊明有孚顒若黍稷非馨神之格思享于克誠升降熙安佩玉鏘鏘其來雝雝陟降孔時步武有容恪茲祀事神罔時恫綏我邦家福祿來崇酌獻明安旨酒嘉栗有飶其香衎我淑靈歆此令芳德貽彤管號正椒房神具醉止降福穰穰退文舞進武舞昭安籥翟既陳干戚斯揚進旅退旅一弛一張其儀不忒容服有光以晏以娭德音不忘亞終獻和安望高六宮位應四星輔佐君子警戒相成褘衣褒崇琛冊追榮于以奠之有椒其馨徹豆成安濯濯其英殖殖其庭有來羣工賚我思成嘉肴既將旨酒既清雍徹不遲福祿來寧送神歆安禮儀既備神保聿歸洋洋在上不可度思神之來兮肸蠁之隨神之去兮休嘉是貽上欽成皇后冊寶六首入門升殿顯安上帝錫羨寔生婉淑輔佐神皇寵膺天祿誕育泰陵劬勞顧復於昭徽音久而彌郁迎神歆安於顯惟德徽柔懿明嬪于初載有聞惟馨肆我鼓鍾萬舞在庭神保是格來止來寧盥洗嘉安有煒柔儀率履不越惠于初終既明且達我將我享相盥乃登胡臭亶時攸介攸寧升降熙安苾苾其芳殽核維旅陟降孔時有秩斯所雍容內化維神之明明則不渝綏我思成酌獻明安天維顯思有相于內右賢去邪夙夜儆戒猗歟追冊重翟褘衣既右享之百世是儀亞終獻和安酌彼玉瓚有椒其馨鬷假無言雍容在庭生莫與崇於赫厥聲祀事孔明神格是聽上明達皇后冊寶五首迎神歆安恭儉宜家柔順承天德昭彤管憂在進賢寶冊褘翟追榮壽原四時祼享何千萬年酌獻明安清宮有嚴廣樂在庭鍾鼓筦磬九變既成縮茅以獻潔秬惟馨靈遊可想來燕來寧退文舞進武舞昭安秉翟竣事萬舞摐金總干揮戚節以鼓音禮容有煒肸蠁來歆淑靈是聽雅奏愔愔徹豆成安登獻罔愆俎豆斯徹神具醉止禮終樂闋御事既退珊珊佩玦介我繁祉歆此蠲潔送神歆安備成熙事虛徐翠楹神保聿歸雲車夙征鑒我休德神交惚恍留祉降祥千秋是享紹興別廟樂歌五首升殿崇安新廟肅肅蕆事以時陟降階墄雍容有儀鞠躬周旋罔敢不祗祝史正辭靈其格思奉俎肅安肇嚴廟祀爰圖遺芳物必稱德或陳或將有縟其儀有苾其香靈兮來下割烹是嘗懿節皇后室酌獻明安曾沙表慶正位椒庭徽音杳邈宮壼儀刑虔修祀事清酌惟馨縮以包茅昭格明靈亞終獻嘉安霄漢月墮郊原露晞徽音如在延佇來歸有酒既清累觴載祗神具醉止燕衎怡怡徹豆寧安仙馭弗返邈清都薦此嘉殽既豐既腴奠享有成鼓樂愉愉徹我豆籩率禮無踰乾道別廟樂歌三首詣廟乾安涓選休辰于秋之杪既齊既戒爰假祖廟有侐儀坤舊章是傚享祀奚為天子純孝升殿乾安宗祀九筵先薦閟宮陟自東階煌煌袞龍於穆聖善監茲禮容是享是宜介福無窮懿節皇后室酌獻歆安丕顯文母厚德維坤仙馭雖邈徽音固存瑟彼玉瓚酌此鬱尊簡簡穰穰裕我後昆紹熙別廟二首安穆皇后室酌獻歆安祥發俔天符彰夢日有懷慈容孝享廟室泰尊是酌旨酒嘉栗靈其格思祚以元吉安恭皇后室酌獻歆安美詠河洲德嬪媯汭徽音如存肇修祀事縮以包茅酌以醴齊靈來顧歆降福攸備紹興二十九年顯仁皇后祔廟一首酌獻歆安恭惟聖母躋祔孔時陳羞宗祏徼福坤儀鍾鼓惟序牲玉載祗於皇來格永介丕基開禧三年成肅皇后祔廟一首酌獻歆安天合重華內治昭融承承繼繼保佑恩隆歸從阜陵登祔太宮燕我後人福祿來崇
