body:
  text: 宋史卷八十四志第三十七律曆十七紹熙統天開禧成天曆附演紀上元甲子歲距紹熙五年甲寅歲積三千八百三十至慶元己未歲積三千八百三十五開禧上元甲子至開禧三年丁卯歲積七百八十四萬八千一百八十三成天上元甲子距咸淳七年辛未歲積七千一百七十五萬八千一百四十七步氣朔策法萬二千開禧日法一萬六千九百成天七千四百二十歲分四百三十八萬二千九百一十餘六萬二千九百一十開禧歲率六百一十七萬二千六百八成天二百七十一萬一百一氣策十五餘二千六百二十一少二十一分秒八十四開禧餘三千六百九十二成天餘一千六百二十秒七朔實三十五萬四千三百六十八開禧朔率四十九萬九千六十七成天二十一萬九千一百一十七朔策二十九餘六千三百六十八五十三分秒六開禧餘八千九百六十七成天餘三千九百三十七望策一十四餘九千一百八十四開禧餘一萬二千九百三十三半成天餘五千六百七十八秒四弦策七餘四千五百九十二開禧餘六千四百六十六太成天餘二千八百三十九秒二氣差二十三萬七千八百一十一閏差二萬一千七百四開禧歲閏一十八萬三千八百四又月閏一萬五千三百一十七閏限三十一萬五千二百六十三成天歲閏八萬六百九十七月閏六千七百二十四秒六閏限一十三萬八千四百二十斗分差百二十七沒限九千三百七十八太開禧一萬三千二百八成天五千七百九十九秒一滅限五千六百三十二紀實七十二萬開禧紀率一百一萬四千成天四十四萬五千二百紀策六十二曆同開禧又有中盈分七千三百八十四成天三千二百四十秒開禧朔虛分三千四百八十三求天正冬至置上元距所求年積算以歲分乘之減去氣差餘為氣汎積以積算與距算相減餘為距差以斗分差乘之萬約為躔差小分半已上從秒一復以距差乘之秒半已上從分一後皆準此以減氣汎積餘為氣定積如其年無竹替差及以距差乘竹替差不滿秒半已上者以汎為定滿紀實去之不滿如策法而一為大餘不盡為小餘其大餘命甲子算外即得日辰因求次氣以氣策累加之小餘滿策法從大餘大餘滿紀策去之命日辰如前如求已徑以竹替差加減歲餘距差乘之紀實去之餘以加減氣積差二十萬七千四百八十九如策法而一餘同上法其加減竹替差乘積算少如距算者加之多如距算者減之其加減氣積差即反用之求天正經朔置天正冬至氣定積以閏差減之滿朔實去之不滿為天正閏汎餘用減氣定積餘為天正十一月朔汎積以百五乘距差退位減之為朔定積積算少如距算者加之無距差可乘者以汎為定求轉交準此滿紀實去之不滿如策法而一為大餘不盡為小餘其大餘命甲子算外即得日辰因求弦望及次朔以弦策累加之求朔望以望策累加之去命如前開禧若在閏限已上者為其年有閏月用減朔率以月閏而一所得命天正十一月算外即得經閏月因求次年以閏歲加之命如前即得所求朔積分若滿四十七萬三千二百去之不滿如日法而一所得命起箕宿算外即得天正十一月經朔直日之星成天朔積若滿二十萬七千七百六十去之不滿如日法而一所得命箕宿算外即得天正十一月經朔直日之星步發斂候策五餘八百七十三太開禧餘一千二百三十秒一十成天餘五百四十秒三十五卦策六餘一千四十八半開禧餘一千四百七十六秒一十二成天餘六百四十八秒四十二土王策三餘五百二十四少開禧餘七百三十八秒六成天餘三百二十四秒二十一月閏一萬八百七十四辰法一千開禧四千二百二十五成天一千八百五十五半辰法五百開禧二千一百一十二半成天九百二十七半刻法一百二十開禧五百七成天一千一百一十三刻分法二十開禧八十四半成天一百八十五半求五行用事二十四氣七十二候六十四卦中氣去經朔發斂加時與前曆同此不載步日躔周天分四百三十八萬三千九十開禧周天率六百一十七萬二千八百五十九秒一成天二百七十一萬二百一十秒六十一周天差三十三萬八千九百二十周天度三百六十五餘一千九百一十秒六十一約分二十五秒七十五開禧餘四千三百五十九秒一約分二十五秒七十九成天餘一千九百一十秒六十一約分二十五秒七十五半周天度百八十二約分六十二秒八十七象限九十一約分三十一秒六開禧秒八成天秒七乘法三百八十開禧二百六成天三百二十五除法五千七百八十三開禧三千一百三十五成天四千九百四十六開禧又有歲差二百五十一秒一成天一百九秒一成天又有半象限四十五約分三十一秒七常氣中積日及餘盈縮分升降分損益率朏朒積統天盈七千升空益六百二十八朒初冬至空開禧盈初升七千四百四十五益九百四十一同成天盈初升七千二百一十五益四百同統天二千六百二十一盈五千八百四十升七千益五百二十四朒六百二十八開禧三千六百九十二二十一盈七千四百四十五升五千九百五十一益七百五十二朒九百四十一八十四小寒一十五成天一千六百二十秒七盈七千二百一十五升五千八百八十五益三百二十七朒四百統天三千四百四十二四十三盈四千六百三十升萬二千八百四十益四百十六朒一千一百五十一六十九開禧七千二百八十四盈一萬三千三百九十六升四千五百二十四益五百七十二朒一千六百九十三大寒三十成天三千二百四十一秒六盈一萬三千一百升四千五百六十八益二百五十四朒七百二十七統天七千八百六十三太六十五盈三千三百七十升一萬七千四百七十益三百二朒一千五百六十八五十三開禧一萬一千七十六盈一萬七千九百二十升