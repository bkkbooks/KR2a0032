body:
  text: 宋史卷六十志第十三天文十三流隕四建中靖國元年正月癸亥星出西南如盂東北急流入尾距星沒青黑無尾跡明燭地崇寧元年三月庚辰星出張如金星西南急流至濁沒赤黃有尾跡明燭地五月丁卯星出尾如杯西南慢流入濁沒青白有尾跡明燭地閏六月癸酉星出斗向西南慢流至建沒青白有尾跡數小星從之八月己未星出羽林軍如杯急流至濁沒青白有尾跡明燭地十月壬子星出天船如盂急流至五車沒青黑有尾跡聲隆隆然十二月己卯星出婁如金星西南慢流至外屏沒赤黃有尾跡明燭地二年正月戊申星出未位如金星急流至北河沒青白有尾跡明燭地六月戊午星出亢如金星西南急流入濁沒赤黃有尾跡明燭地九月辛巳星出牛如杯西南慢流至狗國沒青白有尾跡明燭地十一月甲辰星出參如金星西南急流至濁沒青白有尾跡明燭地十二月丁未星出大陵如金星至騰蛇沒赤黃有尾跡明燭地三年四月戊申星出軫如杯西北慢流入太微垣內屏星沒赤黃有尾跡明燭地又入太微又入屏星六月丙午星出氐如金星東北慢流入天市垣赤黃有尾跡明燭地八月己酉星出建如杯西南急流至鼈沒青白有尾跡明燭地十二月甲子星出天大將軍如盂西北急流入王良沒赤黃無尾跡明燭地四年正月甲申星出角如盂西南慢流入濁沒青白無尾跡閏二月壬申星出井如金星西北急流入五車沒青白有尾跡明燭地三月庚子星出紫微垣華蓋如杯至鈎陳大星沒赤黃有尾跡明燭地五月庚申星出河鼓如盂西北急流入濁沒青白無尾跡十二月甲午星出參如杯東南慢流入軍市沒赤黃有尾跡明燭地五年六月庚午星出西咸如金星東北急流入天市垣內沒青白有尾跡明燭地六月乙酉星出庫樓如杯向西急流入濁沒赤黃有尾跡明燭地九月癸卯星出天船如杯慢流至諸王沒青白有尾跡明燭地十二月壬戌星出奎向南急流入天倉沒青白有尾跡及三丈明燭地聲散如裂帛大觀元年二月丁卯星出參如杯西南急流入濁沒赤黃無尾跡明燭地四月辛未星出軫如盂向南慢流入濁沒青白有尾跡明燭地六月乙亥星出尾西南如杯西南慢流入濁沒青白有尾跡明燭地七月庚戌星出箕如杯西南急流入濁沒赤黃無尾跡照地明二年十二月癸卯星出奎如盂西北急流入造父沒青白有尾跡照地明有聲政和元年四月丙辰星出亢如盂西北急流至右攝提沒赤黃有尾跡照地明五月辛巳日未中星隕東南二年九月乙卯星出斗如杯西南急流入濁沒赤黃有尾跡照地明三年四月丙申星出心如盂西南急流至積卒沒青白有尾跡照地明四年九月庚子星出墳墓如盂東南急流入羽林軍沒青白有尾跡照地明七年十二月甲子星出胃東南如盂西北急流至天大將軍沒赤黃有尾跡照地明重和元年九月庚辰星出斗魁南如盂東南急流至天淵沒赤黃有尾跡照地明宣和元年三月丁卯星出柳如盂東北急流入太微垣赤黃有尾跡照地明十月戊子星出雲雨如盂西南慢流入羽林軍內沒青白照地明二年六月庚寅星出氐南如太白東北急流入天市垣無尾跡十二月辛巳星出奎西南如杯西南慢流至北沒赤黃有尾跡照地明三年七月癸未星出斗如太白東南急流入濁沒青白有尾跡照地明四年十一月丙寅星出王良北如杯急流至紫微垣內上輔北沒赤黃有尾跡照地明五年二月丙午星出北河東北如杯東南慢流至軫沒赤黃有尾跡照地明六年七月丁酉星出太陽守如盂東北急流入濁沒赤黃有尾跡照地明七年十一月戊子星出王良北如杯急流入紫微垣上輔北赤黃有尾跡照地明靖康元年二月丙辰星出張如太白東南急流至濁沒青白有尾跡照地明又星出北河如太白東南慢流至軫東沒赤黃有尾跡照地三月壬辰星出紫微垣內鈎陳東南如金星東北慢流至濁沒赤黃有尾跡照地五月乙未星出權東北如桃西北急流至濁沒青白有尾跡照地六月癸丑星流大如五斗器衆光隨之明照地起東南墜西北有聲如雷庚申星出紫微垣內華蓋東南如金星向北急流至左樞沒二年正月乙未大星出建向西南急流至濁沒赤黃有尾跡照地建炎四年六月乙酉星出紫微垣鈎陳十月辛未星出壁紹興元年四月甲戌星出東方晝隕七月乙未朔星出河鼓八月辛未星出羽林軍十一月庚戌星出婁宿西南丁巳星出天槍北十二月甲子朔星出大陵西北二年三月甲午星出紫微垣華蓋西南乙卯星出角丁巳星出紫微垣右樞星戊午星出軒轅大星西南閏四月乙巳星出太微垣西右執法北五月癸未星出河鼓五年十月壬戌星出室東南赤黃而大六年十月壬子星出壁西北七年八月壬寅星隕于汴八年十一月乙巳星出天囷東北九年五月癸未星出房宿東南十七年八月己未星出危宿慢流至貫索沒青白色有尾跡照地明大如太白二十六年六月丁亥星出東北方光明照地二十八年六月戊戌星晝隕有尾長三丈至西北沒二十九年八月戊寅星出紫微垣西南約長三尺赤黃色西南急流至鈎陳大星東北沒三十一年六月乙卯星出右攝提赤白色急流向東南沒有尾跡大如歲星丁巳星出青白色自東北急流向東南沒有尾跡大如盞口甲子星出氐赤黃色慢流至角宿天田沒初小後大如太白後有小星隨之九月壬午星晝隕約長三丈隆興元年六月丁丑星出尾宿青白色向東南慢流沒七月壬寅星出天市垣內赤色向西北慢流至右攝提西南沒炸散小星二十餘顆有聲尾跡大如太白丙午又出天市垣慢流至氐宿沒青白色微有尾跡小如填星癸丑星出織女急流向貫索西北沒青白色明大如土星照地丙辰星出輦道急流入天棓西南沒赤黃色有尾跡小如土星八月庚申星出羽林軍赤黃色向東南急流至濁沒戊辰星出虛宿赤黃色急流至牛宿西南沒壬申星出天市垣赤青色慢流至西咸西北沒癸酉星出壁宿赤黃色急流犯王良星沒如太白丙子星出羽林軍門青白色慢流委曲行至東南濁沒辛巳星出南斗赤黃色慢流入羽林軍沒有尾跡大如金星次有星一赤黃色有尾跡亦如金星出雲雨星慢流向西南至女宿之下沒戊子星出羽林軍門東南慢流至濁沒青白色有尾跡大如土星又星一青白色出天倉向東南急流有尾跡小如木星至濁沒九月庚戌星出紫微垣外坐赤黃色向西北急流抵紫微垣內坐尚書星沒十一月庚寅星出軫宿急流向東南騎官星沒赤黃色有尾跡大如木星丁未飛星出天船急流向紫微垣外坐內廚西北沒炸出二小星青白色有尾跡照地大如木星二年二月辛酉飛星出權星慢流至太微垣內五帝坐大星西南沒青白色微有尾跡大如歲星六月丁丑星出王良青白色急流犯天津西南沒己卯飛星出造父急流入紫微垣內鈎陳大星東南沒青白色大如填星辛亥星出天關急流貫入畢口西北沒有尾跡照地明大如太白赤黃色十月丙辰星出趙國向西南慢流犯趙東星沒有尾跡大如填星赤黃色十一月壬午朔星出卯位慢流至西南沒有尾跡照地明大如太白青白色癸未星出犯弧矢急流至天廟東南沒有尾跡大如太白青白色丁亥星出天苑向西南慢流至濁沒微有尾跡大如太白色赤黃癸卯星出羽林軍慢流向西南濁沒大如太白色赤黃辛亥星出南河向東南慢流至翼宿沒微有尾跡大如太白色赤黃十二月壬午星出弧矢向東南至濁沒有尾跡照地明大如太白色青白乾道元年三月丙辰星出周國急流至天雞沒微有尾跡大如歲星色黃白甲子星出張宿慢流向西南至濁沒有尾跡照地明大如太白色赤黃五月丁丑星出河鼓白色向東北慢流至濁沒有尾跡照地明大如太白六月甲辰星出東北慢流向西南沒有尾跡音聲大如太白色赤黃七月壬戌星出西南慢流至東南沒大如歲星色赤黃庚午星出代國慢流至趙國沒大如歲星色青白九月戊申星出王良慢流至尾宿沒十月癸未星出權星東南急流至太微垣沒有尾跡照地明如太白色青白二年二月庚子星出西北方急流至濁沒明大如歲星色青白六月丙子星出角宿急流至軫宿沒有尾跡大如太白色赤黃七月己巳星出織女急流至天市垣內宗星沒有尾跡大如歲星青白色十一月己未星出急流東南蒼黑雲間沒大如歲星色青白十二月星出天關急流至外屏星沒有二小星隨之赤黃色微有尾跡大如歲星三年九月甲午星出卷舌急流至婁宿沒有尾跡大如歲星黃白色又有星青白色出北斗急流至少宰西北沒大如歲星五年七月甲子星出宗正赤色慢流至女宿沒有尾跡照地明大如歲星九月丙辰星出赤黃色如蛇入天棓沒六年九月辛巳星出狼星入弧矢至濁沒微有尾跡大如填星赤黃色十月庚戌星出天囷急流至濁沒有尾跡大如歲星赤黃色七年七月戊戌星大如拳急流向西北方至濁沒有尾跡照地如電九月甲午透雲星出急流向西南方至濁沒高丈餘有尾跡照地明大如太白色青白淳熙三年正月辛未星出狼星急流至濁沒尾跡照地明大如太白四月戊戌星出角宿青白色五年八月乙巳星出狼星急流向東南沒微有尾跡大如太白青白色六年八月壬辰星出紫微垣鈎陳大星慢流至濁沒有尾跡大如盞口青白色七年五月乙亥星出天市垣內東海星慢流炸作三小星有尾跡照地大如盞口青白色八月丁未星出貫索大星西北急流至濁沒有尾跡照地明大如太白色青白十一年四月乙丑星出自中天慢流向東北方沒微有尾跡炸作小星相從有聲明大如太白色青白十五年二月辛未星出太尊大如盞口急流至濁沒色青白慶元二年九月甲午四年六月甲午星皆晝隕七月壬寅星出羽林軍下青白色大如椀九月丁巳星出奎宿向壁壘陣沒赤白色大如太白五年六月丁丑星出東北慢流至西南方沒大如歲星青白色九月壬子星出西南慢流向東北沒大如太白青白色嘉泰二年四月辛巳星出西北急流東北至濁沒色赤十月乙酉星出五車大如歲星四年十一月庚午星出天津急流入天市垣沒開禧元年正月庚子星出中天赤色大如太白向濁沒七月癸亥星出天津入斗宿東南沒色赤大如太白二年六月癸丑星出招搖入庫樓色赤大如太白嘉定元年六月辛未星出天津東北慢流向天市垣沒二年六月壬午星出織女東南慢流入天市垣沒色赤有尾跡照地明大如太白庚寅星出中天急流向東北至濁沒三年九月己酉星夕隕五年七月乙巳星出中天慢流向西南方至濁沒六年五月癸亥星晝隕九月癸卯星夕隕丁巳星晝隕十月戊戌星出昴宿西南慢流向天廩東南沒壬戌星出西南慢流至濁沒青白色十二月壬寅星晝隕七年三月壬午星出軫宿距星東南慢流至濁沒五月辛卯星出天津西南慢流向心宿西北沒八年七月癸未星出室宿距星東北急流向天倉星西北沒乙酉星出織女東南慢流向牛宿西北沒有尾跡照地明大如太白青白色八月甲辰星出天津西南慢流向河鼓東北沒十二月丙申星出五諸侯東北慢流向天關西南沒有聲及尾跡明照地赤黃色九年六月乙巳星出牛宿距星東北慢流至濁沒十年五月壬申星出尾宿距星西北慢流向牛宿距星東南沒十一年六月乙卯星出河鼓距星西南急流向正西至濁沒十二年十一月己亥星出昴宿東南急流至濁沒十三年十二月丁巳星出參旗東北慢流至濁沒赤黃色十四年二月壬午星出南河距星東南慢流向西南至濁沒赤黃色八月戊午星出房宿距星急流至濁沒有尾跡照地明大如太白赤黃色十一月甲申星出天倉距星西北慢流向東南方至濁沒赤黃色十六