body:
  text: 宋史卷一百八志第六十一禮十一吉禮十一時享薦新加上祖宗謚號廟諱時享太祖乾德六年十月判太常寺和峴上言按禮閣新儀唐天寶五年詔享太廟宜祭料外每室加常食一牙盤將來享廟欲每室加牙盤食禘祫時享亦準此制太宗太平興國六年十二月太常禮院言今月二十三日臘享太廟緣孟冬已行時享冬至又嘗親祀按禮每歲五享其禘祫之月即不行時享慮成煩數有爽恭虔今請罷臘日薦享之禮其孝惠別廟即如式從之淳化三年十月八日太常禮院言今年冬至親祀南郊前期朝享太廟及奏告宣祖太祖室常例每遇親祀設朔望兩祭乃是十一月內三祭太廟兩室又行奏告之禮煩則不恭又十一月二十日皇帝朝享去臘享日月相隔未為煩數欲望權停是月朔望之祭其臘享如常儀從之真宗景德三年正月畫日乙卯孟享太廟其日以鄆王外欑改用辛酉十月十日孟冬薦享其月明德皇后園陵有司言故事大祠與國忌日同日者其樂備而不作今請如例從之四年七月以莊穆皇后祔享權停孟享大中祥符三年十二月帝謂王旦等言來年正月十一日孟享太廟而有司擇八日宴已在享廟致齋中又七日上辛祀昊天上帝王欽若言若移宴日避祀事即自天慶節以來皆有所妨馮拯言上辛不可移薦享宗廟是有司擇日於禮無嫌帝曰當詢禮官終以契丹使發有常期又將西巡故不及改八年兼宗正卿趙安仁言準詔以太廟朔望上食品味令臣詳定望自今委御廚取親享廟日所上牙盤例參以四時珍膳選上局食手十人赴廟饌造上副聖心式表精売心詔所上食味委宮闈令監造訖安仁省視之神宗元豐三年十月詳定郊廟奉祀禮文所言祠禴嘗蒸之名春夏則物未成而祭薄秋冬則物成而祭備今太廟四時雖有薦新而孟享禮料無祠禴蒸嘗之別伏請春加韭卵夏加麥魚秋加䄡冬加稻鴈當饋熟之節薦於神主其籩豆於常數之外別加時物之薦豐約各因其時以應古禮從之六年十一月帝親祠南郊前期三日奉仁宗英宗徽號冊寶于太廟是日齋于大慶殿翌日薦享于景靈宮禮畢帝服通天冠絳紗袍乘玉輅至太廟宰臣百官班迎于廟門侍中跪請降輅帝却乘輿步入廟趍至齋宮翌日帝服鞾袍至大次有司奏中嚴外辦禮儀使跪奏請行事帝服袞冕以出至東門外殿中監進大圭帝執以入宮架樂作升東階樂止登歌樂作至位樂止太祝宮闈令奉諸室神主于坐禮儀使贊曰有司謹具請行事帝再拜詣罍洗登歌樂作降階樂止宮架樂作至洗南北向樂止帝搢圭盥帨洗瓚拭瓚訖執圭宮架樂作升堂樂止登歌樂作殿中監進鎮圭帝搢大圭執鎮圭詣僖祖室樂止登歌奏瑞安之曲至神坐前北向跪奠鎮圭于繅藉執大圭跪三上香執瓚祼地奠瓚奉幣奠訖執圭俛伏興出戶外北向再拜內侍舉鎮圭以授殿中監至次室行事皆如前儀帝還位登歌樂作至位樂止宮架興安之樂作文舞九成止禮部戶部尚書以次官奉逐室俎豆宮架豐安樂作奠訖樂止帝再詣罍洗登歌樂作降階樂止宮架樂作至洗南北向立樂止帝搢圭盥帨洗爵拭爵訖執圭宮架樂作帝升東階樂止登歌樂作至僖祖室樂止宮架樂作帝搢圭跪受爵祭酒三奠爵執圭俛伏興出戶外北向立樂止太祝讀冊文帝再拜詣次室皆如前儀帝還位登歌樂作至位樂止文舞退武舞進宮架正安之樂作亞獻以次行事如前儀樂止帝詣飲福位登歌樂作至位樂止宮架僖安樂作帝再拜搢圭跪受爵祭酒三啐酒奠爵受俎奠俎受摶奠豆再受爵飲福酒訖奠爵執圭俛伏興再拜樂止帝還位登歌樂作至位樂止太常博士徧祭七祀配享功臣戶部禮部尚書徹俎豆登歌豐安樂作徹訖樂止禮直官曰賜胙行事陪祠官皆再拜宮架興安樂作一成止太祝宮闈令奉神主入諸祏室禮儀使跪奏禮畢登歌樂作帝降階樂止宮架樂作出東門殿中監受大圭歸大次樂止有司奏解嚴轉仗赴南郊初國朝親享太廟儀物有制熙寧以來率循舊典元豐命官詳定始多損益元年詳定郊廟禮文所言古者納牲之時王親執鸞刀啟其毛而祝以血毛詔於室今請改正儀注諸太祝以毛血薦於神坐訖徹之而退唐崔沔議曰毛血盛於盤開元寶通禮及今儀注皆盛以豆禮以豆盛葅醢其薦毛血當盛以盤又言三牲骨體俎外當加牛羊腸胃豕膚俎各一又古者祭祀無迎神送神之禮其初祭及末皆不當拜又宜令戶部陳歲貢以充庭實如古禮仍以龜為前金次之玉帛又次之餘居後又周禮大宗伯之職凡享蒞玉鬯今以門下侍郎取瓚進皇帝侍中酌鬯進瓚皆未合禮請命禮部尚書奉瓚臨鬯禮部侍郎奉槃以次進皇帝酌鬯祼地訖侍郎受瓚幷槃而退又言皇帝至阼階乃令太祝宮闈令始奉神主置于坐行禮畢皇帝俟納神主然後降階並從之又言神坐當陳于室之奧東面當行事時皇帝立于戶內西向即拜于戶內有司攝事晨祼饋食亦立于戶內西向更不出戶而拜其堂上薦腥則設神坐于扆前南向皇帝立于中堂北向有司攝事同此詔俟廟制成取旨又請諸廟各設莞筵紛純加繅席畫純于戶內之東西面皇帝行三獻禮畢於此受嘏又言每室所用几席當如周禮改用莞筵紛純加繅席畫純加次席黼純左右玉几凡祭祀皆繅次各加一重幷莞筵一重為五重又言古者宗廟九獻皇及后各四諸臣一自漢以來為三獻后無入廟之事沿襲至今若時享則有事於室而無事於堂禘祫則有事於堂而無事於室室中神位不在奧堂上神位不當扆有饋食而無朝踐度今之宜以備古九獻之意請室中設神位于奧東面堂上設神位于戶外之西南面皇帝立于戶內西面祼鬯為一獻出戶立于扆前北向行朝踐薦腥之禮為再獻皇帝立于戶內西面行饋食薦熟之禮為三獻詔並候廟制成取旨又請三年親祠幷祫享及有司攝事每室並用太牢及制幣宗廟堂上羙蕭以求陽而有司行事羙茅香宜易用蕭灌鬯於地以求陰宜束茅沃酒以象神之飲凡幣皆埋于西階東冊則藏有司之匱又請除去殿下板位及小次而設皇帝板位于東階之上西向又請凡奏告祈禱報謝用牲牢祭饌並出帝后神主以明天地一體之義又古者祭祀兼薦上古中古及當世之食唐天寶中始詔薦享每室加常食一牙盤議者以為宴私之饌可薦寢宮而不可瀆於太廟宜罷之古者吉祭必以其妃配不特拜請奠副爵無特拜儀禮曰嗣舉奠請皇帝祭太廟既祼之後太祝以斝酌奠于鉶之南俟正祭嘏訖命皇子舉奠而飲又請命刑部尚書一員以奉太牲兵部尚書一員奉魚十有五仍令腥熟之薦朝享及四孟臘享皆設神位于戶內南向其祼將于室朝踐于堂饋熟于室則於奧設莞筵紛純加繅席畫純加次席黼純左右玉几當筵前設饋食之豆八加豆八以南為上鉶三設于豆之南南陳牛鉶居北羊鉶在牛鉶之南豕鉶在羊鉶之南羞豆二曰酏食糝食設于薦豆之北大羹湆盛以登設于羞豆之北九俎設于豆之東三三為列以南為上肵俎一當臘俎之北縱設之牲首俎在北下簠簋設于俎南西上籩十有八設于簠簋之南北上戶外之東設尊彝西上南肆胙階之東設六罍其三在西以盛玄酒其三在東以盛三酒堂下陳鼎之位在東序之南居洗之西皆西面北上匕皆加于鼎之東俎皆設于鼎之西西肆肵俎在北亦西肆若廟門外則陳鼎于東方各當其鑊而在其鑊之西皆北面北上又請既晨祼諸太祝入以血毛奠神坐太官令取肝以鸞刀制之洗于鬱鬯貫以膋燎于爐炭祝以肝膋入詔神于室又出以隋祭于戶外之左三祭于茅葅當饋熟之時祝取菹擩于醢祭于神坐前豆間三又取稷肺祭祭如初藉以白茅既祭宮闈令束而瘞之于西階東若郊祀天地則當進熟之時祝取菹及稷肺祭于正配神坐前各三祭畢郊社令束茅菹而燔瘞之祀天燔祭地瘞縮酒之茅或燔或瘞當與隋祭之菹同又言古者吉祭有配皆一尸其始祝洗酌奠奠于鉶南止有一爵及主人獻尸主婦亞獻賓長三獻亦止一爵請罷諸室奠副爵其祫享別廟皇后自如常禮應祠告天地宗廟社稷並用牲幣如唐置太廟局令以宗正丞充罷攝知廟少卿而宮闈令不預祠事又言晨祼之時皇帝先搢大圭上香祼鬯復位候作樂饋食畢再搢大圭執鎮圭奠於繅藉次奠幣執爵庶禮神並在降神之後從之八年太常寺言故事山陵前宗廟輟祭享朔望以內臣行薦食之禮俟祔廟畢仍舊今景靈宮神御殿已行上食太廟朔望薦食自當請罷從之元祐七年詔復用牙盤食舊制並於禮饌外設元豐中罷之禮官呂希純建議曰先王之祭皆備上古中古及今世之食所設禮饌即上古中古之食牙盤常食即今世之食議者乃以為宗廟牙盤原於秦漢陵寢上食殊不知三代以來自備古今之食請依祖宗舊制薦一牙盤從之乃更其名曰薦羞希純又請帝后各奠一爵后爵謂之副爵今帝后惟奠一爵共享瀆禮莫甚請設副爵亦如其儀大觀四年議禮局言太廟每享各設大尊二則是以追享朝享之尊施之於禴祠蒸嘗失禮尤甚請今四時之享不設大尊又言圭瓚之制親祀以塗金銀瓚有司行事以銅瓚其大小長短之制皆不如禮請改以應古制又言太廟圭瓚別廟璋瓚舊用珉石請改用玉又言新定太廟陳設之儀盡依周制籩豆各用二十有六簠簋各八以籩二十有六為四行以右為上羞籩二為第一行朝事籩八次之饋食籩八又次之加籩八又次之豆二十有六為四行以左為上羞豆二為第一行朝事豆八次之饋食豆八又次之加豆八又次之簠八為二行在籩之外簋八為二行在豆之外籩豆所實之物悉如周禮籩人醢人之制惟簠以稻粱簋以稷而茅俎以蓴蚳醢以蜂子代之又言宗廟之祭用太牢而三鉶實牛羊豕之羹固無可論者至於大羹止設一登以少牢饋食禮考之則少牢者羊豕之牲也佐食羞兩鉶司士進湆二豆三牲之祭鉶既設三則登亦如其數請太廟設三登實牛羊豕之湆以為太羹明堂亦如之高宗建炎三年奉安神主于溫州權用酒脯紹興五年臨安府建太廟始用特羊十年改用少牢其廟享之禮七年祀明堂于建康以徽宗之喪太常少卿吳表臣援熙寧故事謂當時英宗喪未除不廢景靈宮太廟之禮翰林學士朱震以為不然謂王制喪三年不祭惟天地社稷越紼行事孰謂三年之喪而可以見宗廟行吉禮乎吏部尚書孫近等言按春秋君薨卒哭而祔祔而作主特祀於寢蒸嘗禘於廟杜預謂新主既特祀於寢則宗廟常祀自當如舊又熙寧元年神宗諒闇用景德故事躬行郊廟之禮今明堂大禮已在以日易月服除之後皇帝合享太廟所有鹵簿鼓吹及樓前宮架諸軍音樂皆備而不作三十二年孝宗即位擇日朝享太廟禮部言牲牢禮料酒齊等物並如五享行之紹熙五年寧宗即位時有孝宗之喪閏十月浙東提舉李大性言自漢文帝以來皆即位而謁廟陛下龍飛已閱三月未嘗一至宗廟行禮鑾輿屢出過太廟門而不入揆之人情似為闕典乞早擇日恭謁太廟詔迺遵用三年之制吏部員外郎李謙請以來年正月上日躬行告廟之禮禮寺以為俟皇帝從吉討論施行理宗即位行三年之喪初行明堂朝享以大臣攝事即吉後始行親享之禮薦新太宗雍熙二年十一月宗正寺言準詔送兔十頭充享太廟按開寶通禮薦新之儀詣僖祖室戶前盥洗酌獻訖再拜次獻諸室如上禮遂詔曰夫順時蒐狩禮有舊章非樂畋遊將薦宗廟久隳前制闕孰甚焉爰遵時令暫狩近郊既躬獲禽用以薦俎其今月十一日畋獵親射所獲田禽並付所司以備太廟四時薦享著為令景祐二年宗正丞趙良規言通禮著薦新凡五十餘物今太廟祭享之外唯薦冰其餘薦新之禮皆寢不行宜以品物時新所司送宗正令尚食簡擇滋味與新物相宜者配以薦之於是禮官宗正條定逐室時薦以京都新物略依時訓協用典章請每歲春孟月薦蔬以韭以菘配以卵仲月薦冰季月薦蔬以筍果以含桃夏孟月嘗麥配以彘仲月薦果以瓜以來禽季月薦果以芡以菱秋孟月嘗粟嘗穄配以鷄果以棗以梨仲月嘗酒嘗稻蔬以茭筍季月嘗豆嘗蕎麥冬孟月羞以兔果以栗蔬以藷藇仲月羞以鴈以麞季月羞以魚凡二十八種所司烹治自彘以下令御廚於四時牙盤食烹饌卜日薦獻一如開寶通禮又太常禮院言自來薦冰惟薦太廟逐室帝主后主皆闕謹按朔望每室牙盤食帝后同薦又按禮有薦新如朔奠詳此獻祀帝后主別無異等之義今後前廟逐室后主欲乞四時薦新並如朔望牙盤例后廟奉慈廟如太廟之禮皇祐三年太常寺王洙言每內降新物有司皆擇吉日至涉三四日而物已損敗自今令禮部預為關報於次日薦之更不擇日元豐元年宗正寺奏據太常寺報選日薦新兔藷藇栗黃今三物久粥於市而廟猶未薦頗違禮意蓋節序有蚤晏品物有後先自當變通安能齊一又唐開元禮薦新不出神主今兩廟薦新及朔望上食並出神主請下禮官參定所宜詳定所言古者薦新于廟之寢無尸不卜日不出神主奠而不祭近時擇日而薦非也天子諸侯物熟則薦不以孟仲季為限呂氏月令一歲之間八薦新物開元禮加以五十餘品景祐中禮官議以呂紀簡而近薄唐令雜而不經於是更定四時所薦凡二十八物除依詩禮月令外又增多十有七品雖出一時之議然歲時登薦行之已久依於古則太略違於經則無法今欲稍加刊定取其間先王所嘗享用膳羞之物見於經者存之不經者去之請自今孟春薦韭以卵羞以葑仲春薦冰季春薦筍羞以含桃孟夏嘗麥以彘仲夏嘗雛以羞以瓜季夏羞以芡以菱孟秋嘗粟與稷羞以棗以梨仲秋嘗麻嘗稻羞以蒲季秋嘗菽羞以兔以栗孟冬羞以鴈仲冬羞以麕季冬羞以魚今春不薦鮪誠為闕典請季春薦鮪無則闕之舊有林檎蕎麥藷藇之類及季秋嘗酒並合刪去凡新物及時出者即日登獻既非正祭則不當卜日漢儀嘗韭之屬皆於廟而不在寢故韋玄成傳以為廟歲二十五祠而薦新在焉自漢至于隋唐因仍其失薦新雖在廟然皆不出神主今出神主失禮尤甚請依五禮精義但設神座仍候廟成薦新于寢詔依所定如鮪闕即以魴鯉代之既而知宗正丞趙彥若言禮院以仲秋茭萌不經易以蒲白今仲秋蒲無白改從春獻大觀禮局亦言薦新雖繫以月如櫻筍三月當進或萌實未成轉至孟夏之類自當隨時之宜取新以薦政和四年比部員外郎何天衢言祭不欲數數則煩祭不欲疏疏則怠先王建祭祀之禮必得疏數之中未聞一日之間遂行兩祭者也今太廟薦新有與朔祭同日者夫朔祭行於一月之首不可易也若夫薦新則未嘗卜日一月之內皆可薦也新物未備猶許次月薦之亦何必同朔日哉自是薦新偶與朔祭同日詔用次日焉中興仍舊制加上祖宗謚號太祖建隆元年九月太常禮院言謹按唐大中初追尊順宗憲宗謚號皇帝於宣政殿授玉冊遣宰臣以下持節奉冊赴太廟授冊日帝既御殿百僚拜訖降階跪授冊於太尉候太尉奉冊出宣政門然後升殿凡皇帝行禮皆太常卿贊導奉引奉可是月二十七日帝御崇元殿備禮遣使奉冊上四廟謚號皇帝高祖府君冊曰孝曾孫嗣皇帝臣某再拜稽首上言伏以昊天有命皇宋勃興括厚載以開階宅中區而撫運夷夏蠻貊罔不獻誠山川鬼神罔不受職非臣否德肇此丕圖實賴先正儲休上玄降鑒既虔膺於大寶乃眇覿於遐源敢遵歷代之規式薦配天之號謹遣使司空兼門下侍郎同中書門下平章事王溥副使兵部尚書李濤奉寶冊上尊謚曰文獻皇帝廟號僖祖皇帝高祖母崔氏曰文懿皇后皇曾祖府君冊曰伏以天命匪忱惟歸於有德人文設教必始於貽謀乘時既肇於興王報本敢稽於尊祖非隆徽稱則大享何以配神非鏤良珉則洪烈何由垂世方作猗那之頌永嚴昭穆之容謹遣使王溥副使李濤奉冊寶上尊謚曰惠元皇帝廟號順祖皇曾祖母桑氏曰惠明皇后皇祖驍衞府君冊曰伏以人瞻烏止運叶龍飛非發源之長析派不能通上漢非積基之厚嗣孫不能有中區今人紀肇脩孝思罔極酌百王之損益薦四廟之蒸嘗謹遣使王溥副使李濤奉寶冊上尊謚曰簡恭皇帝廟號翼祖皇祖母京兆郡太夫人劉氏曰簡穆皇后聖考太尉府君冊曰昔者流火開祥周發薦文王之號黃星應運曹丕揚魏祖之功咸因致孝之誠式展尊親之義爰遵大典亟上尊稱謹遣使王溥副使李濤奉冊寶上尊謚曰昭武皇帝廟號宣祖禮畢羣臣進表奉慰太宗太平興國二年正月甲戌上太祖英武聖文神德皇帝真宗大中祥符元年十一月二十七日帝於朝元殿備禮奉祖宗尊謚冊寶再拜授攝太尉王旦奉之以出安太祖冊寶於玉輅太宗冊寶於金輅詣太廟奉上太祖曰啟運立極英武聖文神德玄功大孝皇帝太宗曰至仁應道神功聖德文武大明廣孝皇帝禮畢親行朝享之禮天禧元年正月九日加上六室尊謚二字僖祖曰文獻睿和皇帝順祖曰惠元睿明皇帝翼祖曰簡恭睿德皇帝宣祖曰昭武睿聖皇帝太祖曰啟運立極英武睿文神德聖功至明大孝皇帝太宗曰至仁應道神功聖德睿烈大明廣孝皇帝禮畢羣臣拜表稱賀十一日帝行朝享之禮仁宗天聖二年十一月二十五日加上真宗謚曰文明武定章聖元孝皇帝慶曆七年十一月二十五日加上真宗謚曰膺符稽古成功讓德文明武定章聖元孝皇帝神宗元豐六年五月改加上尊謚作奉上徽號十一月二日奉上仁宗徽號曰體天法道極功全德神文聖武睿哲明孝皇帝又上英宗徽號曰體乾膺曆隆功盛德憲文肅武睿神宣孝皇帝哲宗紹聖二年正月帝謂輔臣曰祖宗謚號各加至十六字神宗皇帝今止初謚尚未增加宜考求典故以聞宰臣章惇等對曰祖宗加謚歲月不定真廟初加八字是天聖二年今神宗附廟已十年故事加徽號必在南郊前謹如聖旨討閱以聞四月二十七日詔加上神宗皇帝徽號於大禮前三日行禮九月十六日奉上冊寶曰神宗紹天法古運德建功英文烈武欽仁聖孝皇帝徽宗崇寧三年十一月二十三日更定神宗徽號曰體元顯道帝德王功英文烈武欽仁聖孝皇帝又奉哲宗徽號曰憲元繼道顯德定功欽文睿武齊聖昭孝皇帝大觀元年九月加上僖祖徽號為十六字曰立道肇基積德起功懿文憲武睿和至孝皇帝政和三年十一月五日加上神宗哲宗徽號前二日皇帝御大慶殿奉神宗冊寶授太師魯國公蔡京載以玉輅奉哲宗冊寶授少師太宰何執中載以金輅並詣太廟幄殿奉安以俟四日皇帝詣景靈宮行禮赴太廟宿齋五日服袞冕恭上神宗冊寶于本室曰體元顯道法古立憲帝德王功英文烈武欽仁聖孝皇帝又上哲宗冊寶于本室曰憲元繼道世德揚功欽文睿武齊聖昭孝皇帝次行朝享禮畢赴南郊青城宮紹興十二年十一月詔議加上徽宗徽號曰體神合道駿烈遜功聖文仁德憲慈顯孝皇帝十三年正月九日皇帝御文德殿命宰臣秦檜奏請太廟十日內殿宿齋文武百僚集於發冊寶殿門幕次次禮儀使閣門官太常博士禮直官分立御幄前次分引百僚入就殿下東西相向立定禮直官引奉冊寶使侍中中書令舉寶舉冊官詣殿下西階之西東向立俟齋室簾降皇帝服通天冠絳紗袍禮部侍郎奏中嚴外辦次禮直官太常博士引禮儀使當幄前俛伏跪奏禮儀使臣某言請皇帝行奉上徽宗皇帝發冊寶之禮奏訖俛伏興簾卷前導官前導皇帝出幄執大圭詣冊寶幄東褥位西向立禮儀使奏請再拜皇帝再拜三上香再拜在位官皆再拜前導還褥位西向立侍中中書令舉冊舉寶官升殿入冊寶幄舉冊寶官俱搢笏跪舉冊寶與侍中中書令奉冊寶進行皇帝後從降自西階至殿下褥位南向立禮儀使奏皇帝再拜舉冊官奉冊舉寶官奉寶皇帝搢大圭跪奉受冊寶使皇帝執大圭再拜在位官皆再拜持節者持節導冊寶進行出殿正門禮儀使奏禮畢皇帝釋大圭升自東階入齋室禮部郎中奏解嚴次冊寶出北宮門奉冊寶使以下騎從至太廟靈星門外下馬步從至太廟南神門外次日文武百僚集於太廟幕次分引詣殿下再拜冊寶使詣各室行奠獻禮次贊者引舉冊官舉冊舉寶官舉寶禮直官引侍中中書令前導冊寶入自南正門至殿西階下權置定各再拜次詣徽宗室冊寶使俛伏跪奏稱嗣皇帝臣某謹遣臣等奉徽號冊寶奏訖俛伏興舉冊官舉冊進中書令跪讀冊文舉寶官舉寶進侍中跪讀寶文冊寶使以下各再拜至冊寶幄安奉禮畢以次退次文武百僚奉表稱賀紹熙二年八月詔上高宗徽號曰受命中興全功至德聖神武文昭仁憲孝皇帝慶元三年上孝宗徽號曰紹統同道冠德昭功哲文神武明聖成孝皇帝嘉泰三年上光宗徽號曰循道憲仁明功茂德溫文順武聖哲慈孝皇帝寶慶三年上寧宗徽號曰法天備道純德茂功仁文哲武聖睿恭孝皇帝咸淳二年上理宗徽號曰建道備德大功復興烈文仁武聖明安孝皇帝並如紹興十三年儀注廟諱紹興二年十一月禮部太常寺言淵聖皇帝御名見於經傳義訓者或以威武為義或以回旋為義又為植立之象又為亭郵表名又為圭名又為姓氏又為木名當各以其義類求之以威武為義者今欲讀曰威以回旋為義者今欲讀曰旋以植立為義者今欲讀曰植若姓氏之類欲去木為亘又緣漢法邦之字曰國盈之字曰滿止是讀曰國曰滿其本字見於經傳者未嘗改易司馬遷漢人也作史記曰先王之制邦內畿服邦外侯服又曰盈而不持則傾於邦字盈字亦不改易今來淵聖皇帝御名欲定讀如前外其經傳本字即不當改易庶幾萬世之下有所考證推求義類別無未盡三十二年正月禮部太常寺言欽宗祔廟翼祖當遷於正月九日告遷翼祖皇帝簡穆皇后神主奉藏於夾室所有以後翼祖皇帝諱依禮不諱詔恭依紹熙元年四月詔今後臣庶命名並不許犯祧廟正諱如名字見有犯祧廟正諱者並合改易嘉定十三年十月司農寺丞岳珂言孝宗舊諱從伯從玉從宗攷國朝之制祖宗舊諱二字者皆著令不許並用又言欽宗舊諱二字其一從從旦其一從火從亘皆合回避乞併下禮寺討論頒降施行既而禮寺討論所有欽宗孝宗舊諱若二字連用並合回避宜從本官所請刊入施行從之
