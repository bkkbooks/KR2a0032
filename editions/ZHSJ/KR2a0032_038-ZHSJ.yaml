body:
  text: 宋史卷三十八本紀第三十八寧宗二嘉泰元年春正月戊午申嚴福建科鹽之禁壬戌謝深甫等薦士三十有五人詔籍名中書以待選擢丁卯命路鈐按閱諸州兵士毋受饋遺及擅招軍違者置諸法庚午以葛邲配饗光宗廟庭丙子金遣完顏充來弔祭二月戊子詔求明曆之士壬辰開資善堂遣俞烈使金報謝癸巳監察御史施康年劾少傅觀文殿大學士致仕周必大首倡偽學私植黨與詔降為少保修光宗實錄乙未續修吏部七司法己亥初置教官試于四川辛丑雨土三月丙寅雨雹戊辰復雨雹頒慶元寬恤詔令役法撮要己巳雨雹戊寅臨安大火四日乃滅夏四月辛巳詔有司振恤被災居民死者給錢瘞之壬午下詔自責詔樞密院覈禁衞班直及諸軍營柵焚燬之數癸未避正殿減膳甲申命臨安府察姦民縱火者治以軍法內降錢十六萬緡米六萬五千餘石振被災死亡之家辛卯龍州蕃部寇邊遣官軍討之詔以風俗侈靡災後官軍營造務遵法制內出銷金鋪翠焚之通衢禁民無或服用丁酉御正殿復膳戊戌以潛邸為開元宮丙午詔文武臣無寓居州任釐務官著為令五月戊午以旱禱于天地宗廟社稷詔大理三衙臨安府兩浙州縣決繫囚癸亥釋諸路杖以下囚除茶鹽賞錢丁卯命有司舉行寬恤之政十有六條乙亥監太平惠民局夏允中請用文彥博故事以韓侂冑平章軍國重事韓侂冑上疏請致仕不許免允中官丙子雨丁丑雨雹六月辛巳遣陳宗召賀金主生辰丙午太白經天秋七月乙卯何澹罷丁巳以旱復禱于天地宗廟社稷壬戌釋大理三衙臨安府及諸路闕雨州縣杖以下囚癸亥雨雹甲子以陳自強參知政事兼同知樞密院事張釜簽書樞密院事丁卯復振被火貧民己巳以吳曦為興州都統制兼知興州八月己卯減奏薦恩甲申張釜罷以陳自強兼知樞密院事給事中張巖參知政事右諫議大夫程松同知樞密院事丙戌復詔侍從臺諫兩省集議沿江八州行鐵錢利害九月辛亥遣朝臣二人決浙西圍田己未雨土辛未遣李景和使金賀正旦甲戌令禮官纂集孝宗一朝典禮冬十月甲申詔免瑞慶節諸道入貢丙戌起居郎王容請以韓侂冑定策事迹付史館從之甲午金遣徒單懷忠來賀瑞慶節甲辰編光宗御集十一月庚申蠲潭州民舊輸黃河鐵纜錢丙寅太白晝見十二月己卯太白經天庚寅復免臨安府民身丁錢三年辛丑雨土癸卯金遣紇石烈真來賀明年正旦是歲浙西江東兩淮利州路旱振之仍蠲其賦真里富國獻馴象二二年春正月癸亥以知閤門事蘇師旦兼樞密都承旨丁卯陳自強等上高宗實錄二月甲申追復趙汝愚資政殿學士丁亥修高宗正史寶訓戊子頒治縣十二事以風厲縣令癸巳禁行私史三月辛亥詔宰執各舉可守邊郡者二三人己未初命諸路提刑以五月按部理囚己巳詔諸路帥臣總領監司舉任將帥者與本軍主帥列上之夏四月庚寅雨雹五月甲辰朔日有食之己巳賜禮部進士傅行簡以下四百九十有七人及第出身六月丙子遣趙不艱賀金主生辰己卯臨安火壬午濬浙西運河辛卯禁都民以火說相驚者庚子大雨雹秋七月辛亥封子覿為安定郡王癸亥以旱釋諸路杖以下囚己巳命有司舉行寬恤之政七條庚午禱于天地宗廟社稷復行寬恤四事八月丙子以吏部尚書袁說友同知樞密院事癸未建寶謨閣以藏光宗御集己丑詔作壽慈宮請太皇太后還內甲午謝深甫等上慶元條法事類九月己酉朝壽慈宮甲寅修皇帝會要壬戌奉安光宗皇帝慈懿皇后神御于景靈宮萬壽觀丙寅嗣秀王伯圭薨追封崇王謚曰憲靖庚午臨安府野蠶成繭冬十月乙亥上壽成惠慈太皇太后尊號曰壽成惠聖慈祐太皇太后戊子金遣完顏瑭來賀瑞慶節乙未遣魯使金賀正旦是月追復朱熹煥章閣待制致仕十一月甲辰始御正殿乙巳重修吏部七司法庚戌以陳自強知樞密院事前同知樞密院事許及之參知政事丁巳右文殿楹生芝十二月甲戌日中有黑子率羣臣奉上壽成惠聖慈祐太皇太后冊寶于壽慈宮甲申立貴妃楊氏為皇后加韓侂冑太師庚寅大閱閏月丁未詔講官有當開釋者隨事開陳乙卯以福州觀察使曮為威武軍節度使封衞國公丁卯金遣徒單公弼來賀明年正旦是月復周必大少傅觀文殿大學士是冬子坰生未踰月薨追封華王謚沖穆是歲建寧府福汀南劍瀘四州水邵州旱振之三年春正月庚辰謝深甫罷壬午置湖南谿洞總首戊子龍州蕃部復寇邊遣官軍討之甲午張巖罷丙申以陳自強兼參知政事戊戌幸太學謁大成殿御化原堂命國子祭酒李寅仲講尚書周官篇遂幸武學謁武成殿監學官進秩一級諸生推恩賜帛有差以袁說友參知政事權翰林學士知制誥傅伯壽簽書樞密院事伯壽辭不拜二月乙巳御文德殿冊皇后以吏部尚書費士寅簽書樞密院事三月丁丑以久雨詔大理三衙臨安府決繫囚乙酉幸聚景園夏四月己亥朔日有食之壬寅福州瑞麥生丙午出封樁庫兩淮交子一百萬命轉運司收民間鐵錢乙卯陳自強等上徽宗玉牒孝宗光宗實錄辛酉詔宰執臺諫子孫毋就試五月戊寅以陳自強為右丞相許及之知樞密院事仍兼參知政事庚辰以旱詔大理三衙臨安府釋杖以下囚癸未命有司搜訪舊聞修三朝正史以書來上者賞之是月以蘇師旦為定江軍承宣使六月壬寅遣劉甲賀金主生辰己酉減大理三衙臨安府囚罪一等釋杖以下癸亥太白經天秋七月辛未頒慶元條法事類命殿前司造戰艦壬午權罷同安漢陽蘄春三監鑄錢白虹貫日癸未禁江浙州縣抑納逃賦乙未加光宗皇帝謚曰循道憲仁明功茂德溫文順武聖哲慈孝皇帝八月壬寅增置襄陽騎軍戊申置四川提舉茶馬二員分治茶馬事丙辰陳自強等上皇帝會要甲子詔刑部歲終比較諸路瘐死之數以為殿最九月庚午袁說友罷壬申以宗子希璂為莊文太子嗣更名搢授右千牛衞將軍癸酉命阬冶鉄冶司毋得毀私錢改鑄己丑詔南郊加祀感生帝太子庶子星宋星遣張孝曾使金賀正旦冬十月庚子詔宥呂祖泰癸卯以費士寅參知政事華文閣學士知鎮江府張孝伯同知樞密院事丙午命兩淮諸州以仲冬教閱民兵萬弩手丁未大風戊申龍州蕃部出降壬子金遣完顏奕來賀瑞慶節十一月壬申上光宗冊寶于太廟癸酉朝獻于景靈宮甲戌朝饗于太廟乙亥祀天地于圜丘大赦癸未大風己丑安定郡王子覿薨更定選人薦舉改官法庚寅復置福田居養院命諸路提舉常平司主之十二月丙辰命四川提舉茶馬通治茶馬事辛酉下詔戒敕將帥掊克金遣獨吉思忠來賀明年正旦是冬金國多難懼朝廷乘其隙沿邊聚粮增戍且禁襄陽榷場邊釁之開蓋自此始四年春正月乙亥大風濬天長縣濠癸未日中有黑子壬辰雨雹瓊州西浮洞逃軍作亂寇掠文昌縣遣兵討平之二月丁酉置莊文太子府小學教授辛亥命內外諸軍射鐵帖轉資壬子蠲臨安府逋負酒稅己未立試刑法避親格庚申夜有赤氣亙天三月丁卯臨安大火迫太廟權奉神主于景靈宮己巳避正殿庚午命臨安府振焚室辛未詔修太廟甲戌下詔罪己乙亥詔百官疏陳時政闕失庚寅復御正殿夏四月甲午朔立韓世忠廟于鎮江府命內外諸軍詳度純隊法甲辰許及之罷振恤江西水旱州縣乙巳以費士寅兼知樞密院事張孝伯參知政事吏部尚書錢象祖賜出身同知樞密院事丙辰詔革選舉之弊五月乙亥詔諸軍主帥各舉部內將材三人不如所舉者坐之癸未追封岳飛為鄂王六月癸巳遣張嗣古賀金主生辰丙申置諸軍帳前雄効以軍官子孫補之壬寅詔侍從臺諫兩省集議裁抑濫賞壬子詔諸路監司覈實諸州樁積錢米沿江四川軍帥簡練軍實丁巳增廬州強勇軍為千人秋七月甲子以旱詔大理三衙臨安府兩浙及諸路決繫囚戊辰禱于天地宗廟社稷己巳命諸路提刑從宜斷疑獄蠲內外諸軍逋負營運息錢辛未蠲兩浙闕雨州縣逋租戊子命諸路提刑提舉司措置保伍法八月己亥陳自強等上皇帝玉牒癸丑詔自今以恩賞進秩歲毋過二官蠲紹興府攢宮所在民身丁錢絹綿鹽丙辰除靜江府昭州折布錢戊午張孝伯罷九月乙丑得四圭有邸玉一詔藏于太常壬午遣鄧友龍使金賀正旦丙戌戒飭兩淮州縣遵守寬恤舊法冬十月庚子以資政殿大學士淮東安撫使張巖參知政事壬寅金遣完顏昌來賀瑞慶節十一月己未朔詔兩淮荊襄諸州值荒歉奏請不及者聽先發廩以聞庚午封伯栩為安定郡王壬申白氣亙天庚辰修六合縣城十二月癸巳詔總覈內外財賦以陳自強兼國用使費士寅張巖同知國用事己亥詔改明年為開禧元年壬寅禁州縣挾私籍沒民產甲辰再蠲臨安府民身丁錢三年乙卯金遣烏林答毅來賀明年正旦開禧元年春正月癸酉初置澉浦水軍壬午雨霾二月癸巳奪徐安國三官癸卯詔國用司立考覈財賦之法丙午蠲臨安府逋負酒稅三月庚申太白晝見辛未申嚴民間生子棄殺之禁仍令有司月給錢米收養辛巳以淮西安撫司所招軍為強勇軍癸未費士寅罷夏四月戊子朔以錢象祖參知政事兼同知樞密院事吏部尚書劉德秀簽書樞密院事辛卯以江陵副都統李奕為鎮江都統皇甫斌為江陵副都統兼知襄陽府戊戌修憲聖慈烈皇后聖德事迹辛丑日中有黑子甲寅武學生華岳上書諫朝廷不宜用兵恐啟邊釁以忤韓侂冑送建寧府編管乙卯大風五月己巳賜禮部進士毛自知以下四百三十有三人及第出身復淳熙薦舉改官法乙亥詔以衞國公曮為皇子進封榮王甲申鎮江都統戚拱遣忠義人朱裕結弓手李全焚漣水縣是月金國以邊民侵掠及增邊戍來責渝盟六月戊子罷廣東稅場八十一墟辛卯詔內外諸軍密為行軍之計戊戌命諸路安撫司教閱禁軍己亥遣李壁賀金主生辰庚子進程松資政殿大學士為四川制置使辛丑淮東安撫鄭挺坐擅納北人牛真及菍漣水軍事敗奪二官罷壬寅天鳴有聲復同安漢陽蘄春三監己巳熒惑犯太微右執法陳自強等上新修淳熙以後吏部七司法壬子陳自強及侍御史鄧友龍等請用本朝故事以韓侂冑平章軍國事減大理三衙臨安府囚罪一等釋杖以下秋七月庚申詔韓侂冑平章軍國事立班丞相上三日一朝赴都堂治事命興元都統司增招戰兵丙寅以蘇師旦為安遠軍節度使領閤門事丁卯詔侍從兩省臺諫在外待制學士已上及內外文武官各舉將帥邊守一二人戊辰贈趙汝愚少保己卯韓侂冑等上高宗御集壬午詔諸路提刑提舉司措置保甲癸未以韓侂冑兼國用使以旱詔大理三衙臨安府兩浙州縣及諸路決繫囚八月丙戌朔蠲兩浙闕雨州縣贓賞錢丁亥命湖北安撫司增招神勁軍癸巳雨乙巳以殿前副都指揮使郭倪為鎮江都統兼知揚州是月贈宇文虛中少保追封劉光世為鄜王閏月戊寅韓侂冑等上欽宗玉牒憲聖慈烈皇后聖德事迹九月丁亥劉德秀罷庚子詔官吏犯贓追還所受如舊法丁未遣陳景俊使金賀正旦庚戌大風冬十月甲子江州守臣陳鑄以歲旱圖獻瑞禾詔奪一官丙寅升嘉定府為嘉慶軍庚午金遣紇石烈子仁來賀瑞慶節復置和州馬監十一月乙酉置殿前司神武軍五千人屯揚州乙未申嚴告訐之禁十二月癸丑朔修孝宗光宗御集庚午詔兩淮京西監司帥守講行寬恤之政增刺馬軍司弩手癸酉詔永除兩浙身丁錢絹戊寅金遣趙之傑來賀明年正旦入見禮甚倨韓侂冑請帝還內詔使人更以正旦朝見著作郎朱質上書請斬金使不報是歲真里富國獻瑞象江浙福建二廣諸州旱兩淮京西湖北諸州水振之二年春正月癸未朔蠲兩浙路身丁紬綿癸巳再給軍士雪寒錢發米振給貧民以金使悖慢館伴使副以下奪官有差乙未增太學內舍生為百二十人辛丑更名國用司曰國用參計所己酉雷雨雹辛亥詔坑戶毀錢為銅者不赦仍籍其家著為令是月雅州蠻高吟師寇邊遣官軍討之二月癸丑壽慈宮火甲寅太皇太后移居大內車駕月四朝乙卯以火災避正殿徹樂丁巳以久雨詔大理三衙臨安府及諸路決繫囚己卯復御正殿三月癸巳以程松為四川宣撫使吳曦為宣撫副使甲午頒開禧重修七司法丁酉詔諸路監司歲十一月按部理囚如五月之制己亥從太皇太后幸聚景園乙巳錢象祖罷以張巖兼知樞密院事丙午以錢象祖懷姦避事奪二官信州居住己酉知處州徐邦憲入見請立太子因以肆赦弭兵侍御史徐柟劾罷之夏四月己未雅州蠻作亂焚碉門砦官軍失利庚申四川宣撫司復調御前大軍往討之甲子以薛叔似為兵部尚書湖北京西宣撫使鄧友龍為御史中丞兩淮宣撫使下納粟補官之令戊辰以吳曦兼陝西河東路招撫使己巳調三衙兵增戍淮東庚午追奪秦檜王爵命禮官改謚乙亥以郭倪兼山東京東路招撫使鄂州都統趙淳兼京西北路招撫使皇甫斌兼京西北路招撫副使丁丑吳曦遣其客姚淮源獻關外四州于金求封蜀王鎮江都統制陳孝慶復泗州江州統制許進復新息縣戊寅光州忠義人孫成復褒信縣五月辛巳朔陳孝慶復虹縣吳興郡王抦薨追封沂王謚曰靖惠癸未禁邊郡官吏擅離職守丙戌江州都統王大節引兵攻蔡州不克軍大潰丁亥下詔伐金癸巳以伐金告于天地宗廟社稷皇甫斌引兵攻唐州敗績興元都統秦世輔出師至城固縣軍大亂甲午賜宗室希瞿子名均命為沂王抦後補千牛衞將軍以池州副都統郭倬主管馬軍行司公事李汝翼會兵攻宿州敗績壬寅太白晝見簡荊襄兩淮田卒以備戰兵癸卯郭倬等還至蘄縣金人追而圍之倬執馬軍司統制田俊邁以與金人乃得免六月壬子王大節除名袁州安置尋徙封州癸丑建康都統李爽攻壽州敗績甲寅鄧友龍罷以江南東路安撫使丘䥩為刑部尚書兩淮宣撫使乙卯雅州蠻高吟師出降官軍殺之丁巳減大理三衙臨安府囚罪一等釋杖以下奪郭倬李汝翼三官辛酉奪皇甫斌三官甲子李爽罷丁卯曲赦泗州減雜犯死罪囚餘皆除之蠲其租稅三年建康副都統田琳復壽春府戊辰雅州蠻復寇邊甲戌奪李爽三官汀州居住再奪皇甫斌五官南安軍安置丙子奪鄧友龍三官興化軍居住戊寅蘇師旦罷是月命丘䥩至揚州部署諸將悉三衙江上軍分守江淮要害金人封吳曦為蜀王秋七月辛巳復紹興邊郡賞奪蘇師旦三官衡州居住仍籍其家罷旱傷州軍比較租賦一年詔侍從臺諫兩省卿監郎官監司郡守前宰執侍從各舉人材二三人壬午雅州蠻出降庚子蘇師旦除名韶州安置癸卯以張巖知樞密院事禮部尚書李壁參知政事乙巳置沂王府小學教授八月丙寅有司上開禧刑名斷例斬郭倬于鎮江戊辰再奪李爽三官南雄州安置辛未詔諸州無證有佐之獄毋奏裁壬申以淮東安撫司所招軍為御前強勇軍九月壬午金兵攻奪和尚原己丑朝獻于景靈宮庚寅朝饗于太廟辛卯合祭天地于明堂大赦乙巳賞復泗州功冬十月戊申朔詔內外軍帥各舉智勇可將帥者二人辛酉以將士暴露罷瑞慶節宴丙子金人自清河口渡淮遂圍楚州十一月庚辰命主管殿前司公事郭杲領兵駐真州以援兩淮辛巳金人破棗陽軍甲申以丘䥩簽書樞密院事督視江淮軍馬金人犯神馬坡江陵副都統魏友諒突圍趨襄陽乙酉趙淳焚樊城戊子金人犯廬州田琳拒退之癸巳以金人犯淮告于天地宗廟社稷乙未避正殿減膳以湖廣總領陳謙為湖北京西宣撫副使丙申金人去廬州丁酉金人犯舊岷州守將王喜遁去戊戌金人圍和州守將周虎拒之金人破信陽軍辛丑金人圍襄陽壬寅金人破隨州癸丑太皇太后賜錢一百萬緡犒賞軍士詔諸路招填禁軍以待調遣甲辰金人犯真州乙巳金人破西和州是月濠州安豐軍及邊屯皆為金人所破十二月戊申金人圍德安府守將李師尹拒之庚戌金人破成州守臣辛槱之遁去吳曦焚河池縣退屯青野原辛亥釋大理三衙臨安府杖以下囚癸丑金人去和州甲寅金人攻六合縣郭倪遣前軍統制郭僎救之遇于胥浦橋大敗倪棄揚州走丁巳金人破大散關戊午熒惑守太微癸亥魏友諒軍潰于花泉走江陵丁卯金人犯七方關興州中軍正將李好義拒卻之戊辰吳曦還興州金人自淮南退師留一軍據濠州己巳罷郭倪奪三官責授果州團練副使南康軍安置庚午薛叔似陳謙罷以荊湖北路安撫使吳獵為湖北京西宣撫使復兩浙圍田募兩淮流民耕種癸酉吳曦始自稱蜀王甲戌以鎮江副都統畢再遇為鎮江都統權山東京東路招撫司公事乙亥四川宣撫使程松遁三年春正月丁丑朔丘䥩罷己卯命知樞密院事張巖督視江淮軍馬庚辰以陳自強兼樞密使癸未金人破階州丁亥子圻生庚寅詔建康府給淮民裝錢遣歸業辛卯吳曦招通判興元府權大安軍事楊震仲震仲不屈死之癸巳命兩淮帥守監司招集流民甲午吳曦僭位于興州甲辰奪池州都統陳孝慶三官罷二月壬子以金師退御正殿復膳甲寅削奪福建路總管兼延祥水軍統制商榮官爵柳州安置己未罷程松四川宣撫使以成都府路安撫使楊輔為四川制置使沿江制置使葉適兼江淮制置使庚申以旱詔大理三衙臨安府決繫囚癸亥子圻薨追封順王謚沖懷甲子振給旱傷州縣貧民命諸路提刑司從宜斷疑獄丁卯罷江浙荊湖福建招軍戊辰子咵生庚午金人去襄陽辛未以旱禱于天地宗廟社稷命有司舉行寬恤之政八條蠲兩淮被兵諸州今年租賦乙亥釋兩浙路杖以下囚四川宣撫副使司隨軍轉運安丙及興州中軍正將李好義監四川總領所興州合江倉楊巨源等共誅吳曦傳首詣行在獻于廟社梟三日四川平倂誅曦妻子家屬徙嶺南奪其父挺官遷吳璘子孫出蜀存其廟祀玠子孫免連坐三月丙子朔蠲兩淮被兵州郡役錢丁丑斬偽四川都轉運使徐景望于利州壬辰興州將劉昌國引兵至階州金人退去癸巳李好義復西和州丁酉金人去成州庚子詔以楊輔為四川宣撫使安丙為端明殿學士四川宣撫副使起居舍人許奕為四川宣諭使落程松資政殿大學士奪六官筠州安置忠義統領張翼復鳳州辛丑曲赦四川減雜犯死罪囚釋杖以下壬寅責授程松順昌軍節度副使澧州安置夏四月戊申以吳獵兼四川宣諭使子咵薨追封申王謚沖懿癸丑赦兩淮湖北京西被兵諸州減雜犯死罪囚釋流以下蠲湖北京西諸郡今年租賦四川忠義人復大散關己未奉使金國通謝國信所參議官方信孺發行在庚申以兵部尚書宇文紹節知江陵府權湖北京西宣撫使壬戌詔吳獵與宣撫司議分興州都統司軍之半屯利州丁卯召楊輔詣行在以吳獵為四川制置使戊辰以資政殿學士錢象祖參知政事己巳改興州為沔州庚午贈楊震仲官仍官其子一人癸酉金人復破大散關甲戌赦西和階成鳳四州五月丁丑賞誅吳曦功戊寅用四川宣撫司奏吳曦黨人張伸之等一十六人除名編配兩廣及湖南諸州己丑以旱禱于天地宗廟社稷辛卯以太皇太后謝氏有疾赦是日崩四川宣撫副使司參贊軍事楊巨源與金人戰于長橋敗績戊戌詔四川宣撫制置司分治兵民庚子復置沔州副都統制以李好義為之辛丑李好義襲秦州敗還六月甲寅賞守襄陽功己未李好義遇毒死癸亥以林拱辰為金國通謝使遣富琯使金告哀劉彌正賀金主生辰癸酉安丙殺其參議官楊巨源秋七月己卯命不儔為嗣濮王乙酉以災傷下詔罪己八月己巳上大行太皇太后謚曰成肅皇后九月丁丑詔諸路帥臣申儆邊備辛巳召張巖詣行在壬午方信孺以忤韓侂冑坐用私覿物擅作大臣饋遺金將奪三官臨江軍居住甲申減極邊官吏舉主員乙酉權欑成肅皇后于永阜陵丙戌命淮西轉運司措置雄淮軍辛卯以趙淳為殿前副都指揮使兼江淮制置使乙未張巖罷辛丑遣王柟持書赴金國都副元帥府壬寅祔成肅皇后神主于太廟冬十月乙巳減臨安紹興二府囚罪一等蠲民緣欑宮役者賦丙午更殿前司純隊法乙卯復珍州遵義軍丙辰詔以邊事諭軍民十一月甲戌詔韓侂冑輕啟兵端罷平章軍國事陳自強阿附充位罷右丞相乙亥禮部侍郎史彌遠等以密旨命權主管殿前司公事夏震誅韓侂冑于玉津園以錢象祖兼知樞密院事李壁兼同知樞密院事以誅韓侂冑詔天下丁丑以夏震為福州觀察使主管殿前司公事將士行賞有差奪陳自強三官永州居住戊寅責授蘇師旦武泰軍節度副使韶州安置己卯斬之詔姦臣竄殛當首開言路以來忠讜中外臣僚各具所見以聞辛巳再奪鄧友龍五官南雄州安置尋除名徙循州乙酉置御前忠銳軍丙戌以御史中丞衞涇簽書樞密院事兼參知政事丁亥詔立皇子榮王曮為皇太子更名懤戊子郭倪除名梅州安置郭僎除名連州安置仍籍其家奪李壁二官撫州居住癸巳奪張巖二官徽州居住己亥以立皇太子大赦十二月癸卯以丘䥩為江淮制置大使罷山東京東招撫司以許奕為金國通問使乙巳太白晝見丁未罷京西北路招撫司己酉落葉適寶文閣待制蠲兩淮州軍稅一年庚戌奪許及之二官泉州居住奪薛叔似二官福州居住再奪皇甫斌五官英德府安置癸丑金人復破隨州辛酉以錢象祖為右丞相兼樞密使衞涇及給事中雷孝友並參知政事吏部尚書林大中簽書樞密院事乙丑以禮部尚書史彌遠同知樞密院事丙寅贈呂祖儉朝奉郎直祕閣官其子一人丁卯詔改明年為嘉定元年是歲浙西旱蝗沿江諸州水
