body:
  text: 宋史卷一百八十一志第一百三十四食貨下三會子鹽上會子交子之法蓋有取於唐之飛錢真宗時張詠鎮蜀患蜀人鐵錢重不便貿易設質劑之法一交一緡以三年為一界而換之六十五年為二十二界謂之交子富民十六戶主之後富民貲稍衰不能償所負爭訟不息轉運使薛田張若谷請置益州交子務以榷其出入私造者禁之仁宗從其議界以百二十五萬六千三百四十緡為額神宗熙寧初立偽造罪賞如官印文書法河東運鐵錢勞費公私苦之二年乃詔置交子務于潞州轉運司以其法行則鹽礬不售有害入中糧草遂奏罷之四年復行於陝西而罷永興軍鹽鈔場文彥博言其不便會張景憲出使延州還亦謂可行於蜀不可行於陝西未幾竟罷五年交子二十二界將易而後界給用已多詔更造二十五界者百二十五萬以償二十三界之數交子有兩界自此始時交子給多而錢不足致價太賤既而竟無實錢法不可行而措置熙河財利孫迥言商人買販牟利於官且損鈔價於是罷陝西交子法紹聖以後界率增造以給陝西沿邊糴買及募兵之用少者數十萬緡多者或至數百萬緡而成都乏用又請印造故每歲書放亦無定數崇寧三年置京西北路專切管幹通行交子所倣川峽路立偽造法通情轉用幷鄰人不告者皆罪之私造交子紙者罪以徒配四年令諸路更用錢引準新樣印製四川如舊法罷在京幷永興軍交子務在京官吏併歸買鈔所時錢引通行諸路惟閩浙湖廣不行趙挺之以為閩乃蔡京鄉里故得免焉明年尚書省言錢引本以代鹽鈔而諸路行之不通欲權罷印製在官者如舊法更印解鹽鈔民間者許貿易漸赴買鈔所如鈔法分數計給從之大觀元年詔改四川交子務為錢引務自用兵取湟廓西寧藉其法以助邊費較天聖一界逾二十倍而價愈損及更界年新交子一當舊者四故更張之以四十三界引準書放數仍用舊印行之使人不疑擾自後並更為錢引二年而陝西河東皆以舊錢引入成都換易故四川有壅遏之弊河陝有道途之艱豪家因得以損直斂取乃詔永興軍更置務納換陝西河東引仍遣文臣二人監之八月知威州張持奏本路引一千者今僅直十之一若出入無弊可直八百流通用之官吏奉舊並用引請稍給錢便用擢持為成都路轉運判官提舉川引後引價益賤不可用持復別用印押以給官吏他無印押者皆棄無用言者論其非法持坐遠謫三年詔錢引四十一界至四十三界毋收易自後止如天聖額書放銅錢地內勿用四年假四川提舉諸司封椿錢五十萬緡為成都務本侵移者準常平法政和元年戶部言成都漕司奏昨令輸官之引以十分為率三分用民戶所有而七分赴官場買納由是人以七分為疑請自今無計以三七分之數並許通用願買納者聽民間舊以本錢未至引價大損故州官官錢亦減數收市今本錢已足請勿減數以祛民惑又請四十三界引俟界滿勿換給自四十四界為改法之首而戶部詳度欲止行四十四界其四十五界勿印若通行及乏用聽於界內續增其新引給換之餘如舊鬻之或於給錢之所易錢儲以為本移用者如擅支封樁錢法詔可靖康元年令川引並如舊即成都府務納換以置務成都便利歲久至諸州則有料次交雜之弊故有是詔大凡舊歲造一界備本錢三十六萬緡新舊相因大觀中不蓄本錢而增造無藝至引一緡當錢十數及張商英秉政奉詔復循舊法宣和中商英錄奏當時所行以為自舊法之用至今引價復平高宗紹興元年有司因婺州屯兵請樁辦合用錢而路不通舟錢重難致乃造關子付婺州召商人入中執關於榷貨務請錢願得茶鹽香貨鈔引者聽於是州縣以關子充糴本未免抑配而榷貨務又止以日輸三分之一償之人皆嗟怨六年詔置行在交子務臣僚言朝廷措置見錢關子有司寖失本意改為交子官無本錢民何以信於是罷交子務令榷貨務儲見錢印造關子二十九年印公據關子付三路總領所淮西湖廣關子各八十萬緡淮東公據四十萬緡皆自十千至百千凡五等內關子作三年行使公據二年計錢銀中半入納三十年戶部侍郎錢端禮被旨造會子儲見錢於城內外流轉其合發官錢並許兌會子輸左藏庫明年詔會子務隸都茶場三十二年定偽造會子法犯人處斬賞錢千貫不願受者補進義校尉若徒中及庇匿者能告首免罪受賞願補官者聽當時會紙取於徽池續造於成都又造於臨安會子初行止於兩浙後通行於淮浙湖北京西除亭戶鹽本用錢其路不通舟處上供等錢許盡輸會子其沿流州軍錢會中半民間典賣田宅馬牛舟車等如之全用會子者聽孝宗隆興元年詔會子以隆興尚書戶部官印會子之印為文更造五百文會又造二百三百文會置江州會子務乾道二年以會子之弊出內庫及南庫銀一百萬收之三年以民間會子破損別造五百萬換給又詔損會貫百錢數可驗者並作上供錢入輸巨室以低價收者坐之四年以取到舊會毀抹付會子局重造三年立為一界界以一千萬貫為額隨界造新換舊以戶部尚書曾懷同共措置鑄提領措置會子庫印每道收靡費錢二十足零百半之凡舊會破損貫百字存印文可驗者即與兌換五年令行在榷貨務都茶場將請算茶鹽香礬鈔引權許收換第一界自後每界收換如之其州縣諸色綱錢以七分收錢三分收會九年定捕造偽會之賞淳熙元年詔左藏南上庫給會子二十五萬收買臨安平江紹興明秀州額外浮鹽其齎到鈔錢令榷貨務月終輸封樁庫以備循環換易會子三年詔第三界四界各展限三年令都茶場會子庫以第四界續印會子二百萬貯南庫當時戶部歲入一千二百萬其半為會子而南庫以金銀換收者四百萬流行於外者纔二百萬耳光宗紹熙元年詔第七第八界會子各展三年臣僚言會子界以三年為限今展至再則為九年何以示信於是詔造第十界立定年限慶元元年詔會子界以三千萬為額嘉定二年以三界會子數多稱提無策會十一界除已收換尚有一千三百六十萬餘貫十二界十三界除燒毀尚有一萬二百餘萬貫十二界四千七百萬餘貫十三界五千五百萬餘貫詔封樁庫撥金一十五萬兩兩為錢四十貫度牒七千道每道為錢一千貫官告綾紙乳香乳香每套一貫六百文湊成二千餘添貼臨安府官局收易舊會品搭入輸十一界會子二分十二十三界會子各四分以舊會之二易新會之一泉州守臣宋均南劍州守臣趙崇亢陳宓皆以稱提失職責降有差紹定五年兩界會子已及二億二千九百餘萬端平二年臣僚言兩界會子遠者曾未數載近者甫及朞年非有破壞塗汙之弊今當以所收之會付封樁庫貯之脫有緩急或可濟事有旨從之淳祐二年宗正丞韓祥奏壞楮幣者只緣變更救楮幣者無如收減自去年至今楮價粗定不至折閱者不變更之力也今已罷諸造紙局及諸州科買楮皮更多方收減則楮價有可增之理上曰善三年臣僚言今官印之數雖損而偽造之券愈增且以十五十六界會子言之其所入之數宜減於所出之數今收換之際元額既溢來者未已若非偽造其何能致多如是太抵前之二界盡用川紙物料既精工製不苟民欲為偽尚或難之迨十七界之更印已雜用川杜之紙至十八界則全用杜紙矣紙既可以自造價且五倍於前故昔之為偽者難今之為偽者易人心循利甚於畏法況利可立致而刑未即加者乎臣愚以為抄撩之際增添紙料寬假工程務極精緻使人不能為偽者上也禁捕之法厚為之勸厲為之防使人不敢為偽者次也七年以十八界與十七界會子更不立限永遠行使十一年以會價增減課其官吏景定四年以收買逾限之田復日增印會子一十五萬貫咸淳四年以近頒見錢關子貫作七百七十文足十八界每道作二百五十七文足三道準關子一貫同見錢轉使公私擅減者官以贓論吏則配籍五年復申嚴關子減落之禁七年以行在紙局所造關子紙不精命四川制司抄造輸送每歲以二千萬作四綱川引自張浚開宣府趙開為總餉以供糴本以給軍需增印日多莫能禁止七年川陝副帥吳玠請置銀會於河池不許蓋前宋時蜀交出放兩界每界一百二十餘萬今三界通行為三千七百八十餘萬至紹興末積至四千一百四十七萬餘貫所貯鐵錢僅及七十萬貫以鹽酒等陰為稱提是以餉臣王之望亦謂添印錢引以救目前不得不為朝廷遠慮詔添印三百萬之望止添印一百萬孝宗隆興二年餉臣趙沂添印二百萬淳熙五年以蜀引增至四千五百餘萬立額不令再增光宗紹熙二年詔川引展界行使寧宗嘉泰末兩界出放凡五千三百餘萬緡通三界出放益多矣開禧末餉臣陳咸以歲用不足嘗為小會卒不能行嘉定初每緡止直鐵錢四百以下咸乃出金銀度牒一千三百萬收回半界期以歲終不用然四川諸州去總所遠者千數百里期限已逼受給之際吏復為姦於是商賈不行民皆嗟怨一引之直僅售百錢制司乃諭人除易一千三百萬引三界依舊通行又檄總所取金銀就成都置場收兌民心稍定自後引直鐵錢五百有奇若關外用銅錢引直百七十錢而已嘉定三年春制總司收換九十一界二千九百餘萬緡其千二百萬緡以茶馬司羨餘錢及制司空名官告總所樁金銀度牒對鑿餘以九十三界錢引收兌又造九十四界錢引五百萬緡以收前宣撫程松所增之數凡民間輸者每引百貼八千其金銀品搭率用新引七分金銀三分其金銀品色官稱不無少虧每舊引百貼納二十引蓋自元年三年兩收舊引而引直遂復如故昔高宗因論四川交子最善沈該稱提之說謂官中常有錢百萬緡如交子價減官用錢買之方得無弊九年四川安撫制置大使司言川引每界舊例三年一易自開禧軍興以後用度不給展年收兌遂至兩界三界通使然率以三年界滿方出令展界以致民聽惶惑今欲以十年為一界著為定令則民旅不復懷疑從之寶祐四年臺臣奏川引銀會之弊皆因自印自用有出無收今當拘其印造之權歸之朝廷倣十八界會子造四川會子視淳祐之令作七百七十陌於四川州縣公私行使兩料川引並毀見在銀會姑存舊引既清新會有限則楮價不損物價自平公私俱便矣有旨從之咸淳五年復以會板發下成都運司掌之從制司抄紙發往運司印造畢功發回制司用總所印行使歲以五百萬為額紹興末會子未有兩淮湖廣之分其後會子太多而本錢不足遂致有弊乾道二年詔別印二百三百五百一貫交子三百萬止行用於兩淮其舊會聽對易凡入輸買賣並以交子及錢中半如往來不便詔給交子會子各二十萬付鎮江建康府榷貨務使淮人之過江江南人之渡淮者皆得對易循環以用然自紹興末年銅錢禁用於淮而易以鐵錢會子既用於淮而易以交子於是商賈不行淮民以困右司諫陳良祐言交子不便詔兩淮郡守漕臣條其利害皆謂所降交子數多而銅錢幷會子不過江是致民旅未便於是詔銅錢幷會子依舊過江行用民間交子許作見錢輸官凡官交盡數輸行在左藏庫三年詔造新交子一百三十萬付淮南漕司分給州軍對換行使不限以年其運司見儲交子先付南庫交收紹熙三年詔新造交子三百萬貫以二百萬付淮東一百萬付淮西每貫準鐵錢七百七十文足以三年為界慶元四年詔兩淮第二界會子限滿明年六月更展一界嘉定十一年造兩淮交子二百萬增印三百萬十三年印二百萬增印一百五十萬十四年十五年皆及三百萬自是其數日增價亦日損稱提無術但屢與展界而已初襄郢等處大軍支請以錢銀品搭孝宗隆興元年始措置於大軍庫儲見錢印造五百幷一貫直便會子發赴軍前並當見錢流轉印造之權既專印造之數日益且總所所給止行於本路而荊南水陸要衝商賈必由之地流通不便乾道三年收其會子印板四年以淮西總所關子二十萬都茶場鈔引八十萬付湖北漕司收換輸左藏庫又命降銀錢收之五年詔戶部給行在會子五十萬付荊南府兌換淳熙七年紹會子庫先造會子一百萬降付湖廣總所收換破會十一年臣僚言湖北會子創於隆興初迄今二十二年不曾兌易稱提不行詔湖廣總領同帥漕議經久利便帥漕總領言乞印給一貫五百例湖北會子二百萬貫收換舊會庶幾流轉通快經久可行從之十三年詔湖廣會子仍以三年為界紹熙元年詔湖廣總所將見行及樁貯新舊會取數倣行在例立界收換餉臣梁總奏自來不曾立界但破損者即行換易除累易外尚有五百四十餘萬見在民間行用乞別樣制作兩界印造收換從之嘉定五年湖廣餉臣王釜請以度牒茶引兌第五界舊會每度牒一道價千五百緡又貼搭茶引一千五百緡方許收買期以一月然京湖二十一州止置三場不便制臣劉光祖乃會總所以第六界新會五萬緡令軍民以舊楮二而易其一繼又令軍民以一楮半而易其一又請于朝添給新楮十萬軍民賴之十四年造湖廣會子三十萬易破會十七年造湖廣第六界會子二百萬嘉熙二年撥第七界湖會九百萬付督視參政行府寶祐二年撥第八界湖會三百萬貫付湖廣總所易兩界破會自後因仍行之鹽之類有二引池而成者曰顆鹽周官所謂盬鹽也鬻海鬻井鬻而成者曰末鹽周官所謂散鹽也宋自削平諸國天下鹽利皆歸縣官官鬻通商隨州郡所宜然亦變革不常而尤重私販之禁引池為鹽曰解州解縣安邑兩池墾地為畦引池水沃之謂之種鹽水耗則鹽成籍民戶為畦夫官廩給之復其家募巡邏之兵百人目為護寶都歲二月一日墾畦四月始種八月乃止安邑池每歲歲種鹽千席解池減二十席以給本州及三京京東之濟兗曹濮單鄆州廣濟軍京西之滑鄭陳潁汝許孟州陝西之河中府陝虢州慶成軍河東之晉絳慈隰州淮南之宿亳州河北之懷州及澶州諸縣之在河南者凡禁榷之地官立標識候望以曉民其通商之地京西則蔡襄鄧隨唐金房均郢州光化信陽軍陝西則京兆鳳翔府同華耀乾商涇原邠寧儀渭鄜坊丹延環慶秦隴鳳階成州保安鎮戎軍及澶州諸縣之在河北者顆末鹽皆以五斤為斗顆鹽之直每斤自四十四至三十四錢有三等至道二年兩池得鹽三十七萬三千五百四十五席席一百一十六斤半三年鬻錢七十二萬八千餘貫咸平中度支使梁鼎言陝西沿邊解鹽請勿通商官自鬻之詔以鼎為陝西制置使又以內殿崇班杜承睿同制置陝西青白鹽事承睿言鄜延環慶儀渭等州洎禁青鹽之後令商人入芻粟運解鹽於邊貨鬻其直與青鹽不至相懸是以民食賤鹽須至畏法而蕃部青鹽難售今聞運解鹽於邊欲與內地同價邊民必冒法圖利卻入蕃界私販青鹽是助寇資而結民怨矣繼又有上疏言其不便者鼎請候至邊部斡運及乘傳至解池即禁止商販旋運鹽赴邊公私大有煩費而邊民頓無入中物論紛擾於是命判鹽鐵勾院林特知永興軍張詠詳議以為公私非便請復舊商販詔切責鼎罷度支使大中祥符九年陝西轉運使張象中言兩池所貯鹽計直二千一百七十六萬一千八十貫慮尚有遺利望行條約真宗曰地利之阜此亦至矣過求增羨慮有時而闕不許先是五代時鹽法太峻建隆二年始定官鹽闌入法禁地貿易至十斤鬻鹽至三斤者乃坐死民所受蠶鹽以入城市三十斤以上者上請三年增闌入至三十斤鬻至十斤坐死蠶鹽入城市百斤以上奏裁自乾德四年後每詔優寬太平興國二年乃詔闌入至二百斤以上鬻及主吏盜販至百斤以上蠶鹽入城市五百斤以上並黥面送闕下至淳化五年改前所犯者止配本州牢城代州寶興軍之民私市契丹骨堆渡及桃山鹽雍熙四年詔犯者自一斤論罪有差五十斤加役流百斤以上部送闕下天聖以來兩池畦戶總三百八十以本州及旁州之民為之戶歲出夫二人人給米日二升歲給戶錢四萬為鹽歲百五十二萬六千四百二十九石石五十斤以席計為六十五萬五千一百二十席席百一十六斤禁榷之地皆官役鄉戶衙前及民夫謂之帖頭水陸漕運而通商州軍並邊秦延環慶渭原保安鎮戎德順又募人入中芻粟以鹽償之凡通商州軍在京西者為南鹽在陝西者為西鹽若禁鹽地則為東鹽各有經界以防侵越天聖初計置司議茶鹽利害因言兩池舊募商人售南鹽者入錢京師榷貨務乾興元年歲入纔二十三萬緡視天禧三年數損十四萬請一切罷之專令入中並邊芻粟及為之增約束申防禁以絕私販之弊久之復詔入錢京師從商人所便三京二十八州軍官自輦鹽百姓困於轉輸天聖八年上書者言縣官禁鹽得利微而為害博兩池積鹽為阜其上生木合抱數莫可較宜聽通商平估以售可以寬民力詔翰林學士盛度御史中丞王隨議更其制度因畫通商五利上之曰方禁商時伐木造船輦運兵民不勝疲勞今去其弊一利也陸運既差帖頭又役車戶貧人懼役連歲逋逃今悉罷之二利也船運有沉溺之患綱吏侵盜雜以泥沙硝石其味苦惡疾生重膇今皆得食真鹽三利也錢幣國之貨泉欲使通流富家多藏鏹不出民用益蹙今歲得商人出緡錢六十餘萬助經費四利也歲減監官兵卒畦夫傭作之給五利也十月詔罷三京二十八州軍榷法聽商人入錢若金銀京師榷貨務受鹽兩池行之一年視天聖七年增緡錢十五萬其後歲課減耗命翰林學士宋庠等以天聖九年至寶元二年新法較之視乾興至天聖八年舊法歲課損二百三十六萬緡康定元年詔京師南京及京東州軍淮南宿亳州皆禁如舊未幾復弛京師榷法幷詔三司議通淮南鹽給京東等八州於是兗鄆宿亳皆食淮南鹽矣自元昊反聚兵西鄙並邊入中芻粟者寡縣官急於兵食調發不足因聽入中芻粟予券趨京師榷貨務受錢若金銀入中它貨予券償以池鹽繇是羽毛筋角膠漆鐵炭瓦木之類一切以鹽易之猾商貪吏表𩹉為姦至入椽木二估錢千給鹽一大席為鹽二百二十斤虛費池鹽不可勝計鹽直益賤販者不行公私無利慶曆二年復京師榷法凡商人虛估受券及已受鹽未鬻者皆計直輸虧官錢內地州軍民間鹽悉收市入官官為置場增價出之復禁永興同華耀河中陝虢解晉絳慶成十一州軍商鹽官自輦運以衙前主之又禁商鹽私入蜀置折博務於永興鳳翔聽人入錢若蜀貨易鹽趨蜀中以售久之東南鹽地悉復禁榷兵民輦運不勝其苦州郡騷然所得鹽利不足以佐縣官之急並邊務誘人入中芻粟皆為虛估騰踊至數倍大耗京師錢幣帑藏益虛太常博士范祥關中人也熟其利害常謂兩池之利甚博而不能少助邊計者公私侵漁之害也儻一變法歲可省度支緡錢數十百萬乃畫策以獻是時韓琦為樞密副使與知制誥田況皆請用祥策四年詔祥馳傳與陝西都轉運使程戡議之而戡議與祥不合祥尋亦遭喪去八年祥復申其說乃以為陝西提點刑獄兼制置解鹽事使推行之其法舊禁鹽地一切通商聽鹽入蜀罷九州軍入中芻粟令入實錢償以鹽視入錢州軍遠近及所指東西南鹽第優其直東南鹽又聽入錢永興鳳翔河中歲課入錢總為鹽三十七萬五千大席授以要券即池驗券按數而出盡弛兵民輦運之役又以延慶環渭原保安鎮戎德順地近烏白池姦人私以青白鹽入塞侵利亂法乃募人入中池鹽予券優其估還以池鹽償之以所入鹽官自出鬻禁人私售峻青白鹽之禁並邊舊令入中錢炭瓦木之類皆重為法以絕之其先以虛估受券及已受鹽未鬻者悉計直使輸虧官錢又令三京及河中河陽陝虢解晉絳濮慶成廣濟官仍鬻鹽須商賈流通乃止以所入緡錢市並邊九州軍芻粟悉留榷貨務錢幣以實中都行之數年黠商貪賈無所僥倖關內之民得安其業公私便之皇祐元年侍御史知雜何郯復言改法非是明年遣三司戶部副使包拯馳視還言行之便第請商人入錢及延環等八州軍鬻鹽皆重損其直即入鹽八州軍者增直以售三京及河中等處禁官鬻鹽而三司謂京師商賈罕至則鹽貴請得公私並貿餘禁止皆聽之田況為三司使請久任祥俾專其事擢祥權陝西轉運使賜金紫服祥初言歲入緡錢可得二百三十萬皇祐三年入緡錢二百二十一萬四年二百一十五萬以四年數視慶曆六年增六十八萬視七年增二十萬又舊歲出榷貨務緡錢慶曆二年六百四十七萬六年四百八十萬至是榷貨務錢不復出其後歲入雖贏縮不常至五年猶及百七十八萬至和元年百六十九萬時祥已坐它罪貶命轉運使李參代之三年遂以元年入錢為歲課定率量入計出可助邊費十分之八久之並邊復聽入芻粟以當實錢而虛估之弊滋長券直亦從而賤歲損官課無慮百萬嘉祐三年三司使張方平及包拯請復用祥於是復以祥總鹽事祥請重禁入芻粟者其券在嘉祐三年已前每券別請輸錢一千然後予鹽又言商人持券若鹽鬻京師皆虧失本錢請置官京師蓄錢二十萬緡以待商人至者券若鹽估賤則官為售之券紙六千鹽席十千毋輒增損所以平其市估使不得為輕重詔以都鹽院監官兼領自是稍復舊未幾祥卒以轉運副使薛向繼之治平二年歲入百六十七萬初祥以法既通商恐失州縣征算乃計所歷所至合輸算錢併率以為入中之數自後州縣猶算如舊嘉祐六年向悉罷之幷奏減八州軍鬻鹽價兩池畦戶歲役解河中陝虢慶成之民官司旁緣侵剝民以為苦乃詔三歲一代嘗積逋課鹽至三百三十七萬餘席遂蠲其半中間以積鹽多特罷種鹽一歲或二歲三歲以寬其力後又減畦戶之半稍以傭夫代之五州之民始安青白鹽出烏白兩池西羌擅其利自李繼遷叛禁毋入塞未幾罷已而復禁乾興初嘗詔河東邊人犯青白鹽禁者如陝西法慶曆中元昊納款請歲入十萬石售縣官仁宗以其亂法不許自范祥議禁八州軍商鹽重青白鹽禁而官鹽估貴土人及蕃部販青白鹽者益衆往往犯法抵死而莫肯止至和中詔番部販青白鹽抵死者止投海島羣黨為民害者上請嘉祐赦書稍遷配徒者於近地自是禁法稍寬熙寧初詔淮南轉運使張靖究陝西鹽馬得失靖指向欺隱狀王安石右向靖竟得罪擢向為江淮等路發運使諫官范純仁言賞罰失當因數向五罪向任如初乃請即永興軍置賣鹽場又以邊費錢十萬緡儲永興軍為鹽鈔本繼又增二十萬四年詔陝西行蜀交子法罷市鈔或論其不便復舊七年中書議陝西鹽鈔出多虛鈔而鹽益輕以鈔折兌糧草有虛撎邊糴之患請用交子法使其數與見錢相當可濟緩急詔以皮公弼熊本宋迪分領其事趙瞻制置又以內藏錢二百萬緡假三司遣市易吏行四路請買鹽引仍令秦鳳永興鹽鈔歲以百八十萬為額八年中書奏陝西鹽鈔利害及立法八事大抵謂買鈔本錢有限而出鈔過多買不盡則鈔賤而糴貴故出鈔不可無限然商人欲變易見錢而官不為買即為兼幷所抑則鈔價益賤而邊境有急鈔未免多出故當置場以市價平之今當定買兩路實賣鹽二百二十萬緡以當用鈔數立額永興路八十一萬五千秦鳳路一百三十八萬五千內熙河路五十三萬七千永興軍遣官買鈔歲支轉運司錢十萬緡買西鹽鈔又用市易務賒請法募人賒鈔變易即民間鈔多而滯則送解池毀之詔從其請然有司給鈔溢額猶視其故九年乃詔御史劾陝西官吏止三司額外出鈔十年三司言鹽法之弊由熙河鈔溢額故價賤而芻糧貴又東西南三路通商郡邑榷賣官鹽故商旅不行今鹽法當改官賣當罷請先收舊鈔印識之舊鹽行加納之法官盡買舊鈔其已出鹽約期聽商人自言準新價增之印鹽席給符驗東南舊法鹽鈔席纔三千五百西鹽鈔席減一千官盡買先令解州場院驗商人鈔書之乃許賣已請鹽立限告賞聽商人自陳東南鹽席加錢二千五百西鹽席加三千為易舊符立期令賣罷兩處禁榷官賣提舉司賣鹽並用新價錢承買舊鈔商人願對行算請者聽官為印識如法應通商地各舉官一員其鹽席限十日自言乃令加納錢為印識給新引聽以舊鈔當加納錢皆行之而別定官賣鹽地市易司已買鹽亦加納錢舊制河南北曹濮以西秦鳳以東皆食解鹽自仁宗時解鹽通商官不復榷熙寧中市易司始榷開封曹濮等州八年大理寺丞張景溫提舉出賣解鹽於是開封府界陽武酸棗封丘考城東明白馬中牟陳留長垣胙城韋城曹濮澶懷濟單解州河中府等州縣皆官自賣未幾復用商人議以唐鄧襄均房商蔡郢隨金晉絳虢陳許汝潁隰州西京信陽軍通商畿縣及澶曹濮懷衞濟單解同華陝河中府南京河陽令提舉解鹽司運鹽貨鬻仍詔三司講求利害鹽價既增民不肯買乃課民買官鹽隨貧富作業為多少之差買賣私鹽聽人告重給賞以犯人家財給之買官鹽食不盡留經宿者同私鹽法於是民間騷怨鹽鈔舊法每席六緡至是二緡有餘商不入粟邊儲失備召陝西轉運使皮公弼入議公弼極言官賣不便沈括為三司使不能奪王安石主景溫括希安石意言通商歲失官賣緡錢二十餘萬安石去位括在三司乃言官賣當罷於是河陽同華解州河中陝府陳留雍丘襄邑中牟管城尉氏鄢陵扶溝太康咸平新鄭聽通商其入不及官賣者官復自賣澶濮濟單曹懷州南京陽武酸棗封丘考城東明白馬長垣胙城韋城九縣官賣如故詔商鹽入京悉賣之市易務每席毋得減千民鹽皆買之市易務私與商人為市許告沒其鹽皮公弼鹽法酌前後兩池所支鹽數歲以二百三十萬緡為額又令京師置七場買東南鹽鈔市易務計為錢五十九萬三千餘緡三司闕錢請頗還其鈔令賣之於西買者其三給錢其七準沿邊價給新引庶得民間舊鈔而新引易於變易詔用其議公弼請復范祥舊法平市價詔假三司錢三十萬緡市鈔於京師先是解鹽分東西西鹽賣有分域又並邊州軍市芻糧給鈔過多故鈔及鹽甚賤官價自分為二於是增西鹽價比東鹽以平鈔法歲約增十二萬緡毋復分東西悉廢西鹽約束解池鹽鈔舊以二百二十萬緡為額轉運使皮公弼請增十萬以助邊糴至是又為二百四十二萬商人已請西鹽令加納錢使與新法價平元豐三年三司舉張景溫賣解鹽息羨進官賜帛明年權陝西轉運使李稷言自新法未行鈔之貴賤視有司出之多寡新法已後鈔有定數起熙寧十年冬盡元豐三年通印給一百七十七萬餘席而鹽池所出纔一百一十七萬五千餘席餘鈔五十九萬有餘流布官私其勢不得不賤遂下三司住給五年戶部猶以鈔多難售歲給陝西軍儲鈔二百萬裁其半然鈔多卒不能平價元祐元年戶部及制置解鹽司議延慶渭原環鎮戎保安德順等八州軍皆官自鬻以萬五千五百席為額聽商旅入納於八州軍折博務算給交引如范祥舊法鹽價錢應償者以轉運司年額鹽鈔給之所鬻鹽錢以待轉運司糴買仍舉承務郎以上一員於在京置場以鹽鈔鬻見錢而輸之都鹽院庫遇給解鹽額鈔盡歸之本司毋更給轉運司他司皆毋得販易雖有專旨聽執奏其已買鈔自本司拘之若民間鈔少或給本路緡錢即上戶部議鬻其鈔詔皆從之既而又以商人入納解鹽減年額賣鹽費錢二萬七千餘緡增在京買鈔之本入中解鹽並効熙河鈔而價隨事增損以折澶懷滑州陽武鹽價定為錢八千二百時陝西民多以朴硝私煉成顆謂之倒硝頗與解鹽相亂紹聖三年制置使孫路以聞詔犯者減私鹽法一等坐之初神宗時官賣解鹽京西則通商有沈希顏者為轉運使更為榷法請假常平錢二十萬緡自買解鹽賣之本路民已買解鹽盡買入官掊克牟利商旅苦之哲宗即位殿中侍御史黃降劾希顏罪元祐元年京西始復舊制通商然猶官賣元符元年乃罷之永興軍渭河北高陵櫟陽涇陽等縣如同華等六州軍官仍自賣鹽而禁官司於折博務買解鹽販易規利俄以水壞解池聽河中府解州小池鹽同華等州私土鹽階州石鹽通遠軍岷州官井鹽鬻於本路而京東河北鹽亦通行焉三年詔陝西轉運副使兼制置解鹽使馬城提舉措置催促陝西河東木薛嗣昌提舉開修解州鹽池崇寧元年解州賈瓦南北圓池修治畦眼拍磨布種通得鹽百七十八萬二千七百餘斤初解梁東有大鹽澤綿亙百餘里歲得億萬計自元符初霖潦池壞至是乃議修復四年池成凡開二千四百餘畦百官皆賀內侍王仲千者董其役以課額敷溢為功然議者謂解池灌水盈尺暴以烈日鼓以南風須臾成鹽其利固博苟欲溢額不俟風日之便厚灌以水積水而成味苦不適口崇寧初言事者以鈔法屢變民聽疑惑公家失輕重之權商旅困往來之費乞復范祥舊法謹守而力行之無庸輕改雖可其請未幾蔡京建言河北京東末鹽客運至京及京西袋輸官錢六千而鹽本不及一千施行未久收息及二百萬緡如通至陝西其利必倍議遣韓敦立等分路提舉及鹽池已復京仍欲舊解鹽地客算東北末鹽令榷貨務入納見緡無窮以收己功乃令解鹽新鈔止行陝西五年詔鈔法用之民信已久飛錢裕國其利甚大比考前後法度頗究利害其別為號驗給解鹽換請新鈔先以五百萬緡赴陝西河東止給糴買聽商旅赴榷貨務換請東南鹽鈔貼輸見緡四分者在舊三分之上五分者在四分之上且帶行舊鈔輸四分者帶五分輸五分者帶六分若不願貼輸錢者依舊鈔價減二分先是患豪商擅利源輕重之柄率減鈔直使並邊糴價增高乃裁限之崇寧四年以鈔價雖裁其入中州郡復增糴價客持鈔算請坐牟大利乃詔陝西舊鈔易東南末鹽每百緡用見錢三分舊鈔七分後又詔減落鈔價踰五千者論以法及大觀四年張商英為相議復通行解鹽如舊法而東北鹽毋得與解鹽地相亂繼而有司議解池已復依舊法印鈔請商旅已買東北鹽隨處官司期三日盡籍輸官償其價隱匿者如私鹽法解鹽未到官鬻所得東北鹽解鹽到即止已請鈔已支者悉毀已支未請者聽別議在京仍通行其經由州縣鄭州中牟開封府祥符陽武縣境內亦許通放而王仲千所請通入京西北路陳潁蔡州信陽軍權止之商旅已算請東北鹽元指定東京未至者止令所至州軍批引其已入京未貨者都鹽院全袋拘買鬻之許坐賈請買碎賣政和元年詔陝西鈔依鈔面實價輒增減者以違制論未幾復以陝西通行鹽鈔舊雖約以銅錢六千為鈔面然鈔貴則入粟增多鈔平則入穀減少若限以六千陝西唯行鐵錢是鹽鈔一席得六千鐵錢斛斗矣深損公家其隨時增減聽之二年蔡京復用事法仍變改鈔不可用者悉同敗楮六年兩池漫生鹽募人倍力採取且議加賞繼生紅鹽百官皆賀制置解鹽使李百祿等第賞有差七年議復行解鹽時童貫宣撫關河實主之詔解鹽地見行東北鹽復盡收入官官給其直在京於平貨在外於市易務樁管如解鹽法鬻之不自陳如私鹽法重和元年詔復行解鹽舊法踰年榷貨歲虧數百萬貫又鈔價減落糴買不行三省趣講畫以聞貫遂請罷領解鹽俄而三省條奏舊東北鹽地客販解鹽立限盡鬻限竟鬻未盡者運往解鹽地踰者論如私鹽法京畿京西復置官提舉初崇寧中以鹽各利一方故解鹽止行本路東南鬻海利博行於數路既復行解鹽商旅苦於折閱即改如舊慮商旅疑惑遂詔諭諸路鈔法更不改易扇搖者論如法仍倍之靖康元年解鹽鈔入納算請並參照熙寧元豐以前舊法又增改解鹽及東北鹽地即商旅不願鹽則用鈔面請錢如舊法繼定每席鈔為八貫省盡收入鈔面其入納糧草者許直赴池請鹽省復入京批鈔之擾鬻海為鹽曰京東河北兩浙淮南福建廣南凡六路其鬻鹽之地曰亭場民曰亭戶或謂之竈戶戶有鹽丁歲課入官受錢或折租賦皆無常數兩浙又役軍士定課鬻焉諸路鹽場廢置皆視其利之厚薄價之贏縮亦未嘗有一定之制末鹽之直斤自四十七至八錢有二十一等至道三年鬻錢總一百六十三萬三千餘貫其在京東曰密州濤洛場一歲鬻三萬二千餘石以給本州及沂濰州唯登萊州則通商後增登州四場舊南京及曹濮濟兗單鄆廣濟七州軍食池鹽餘皆食二州鹽官自鬻之慶曆元年冬以淄濰青齊沂密徐淮陽八州軍仍歲凶菑乃詔弛禁聽人貿易官收其算而罷密登歲課第令戶輸租錢其後兗鄆皆以壤地相接罷食池鹽得通海鹽收算如淄濰等州自是諸州官不貯鹽而百姓蠶鹽歲皆罷給然使輸錢如故至和中始詔百姓輸錢以十分為率聽減三分元豐三年京東轉運副使李察言南京濟濮曹單行解鹽餘十有二州行海鹽請用今稅法置買賣鹽場其法盡竈戶所鬻鹽而官自賣重禁私為市者歲收錢二十七萬三千餘緡而息幾半之吳居厚為轉運判官承察後治鹽法利入益多六年較本路及河北買賣鹽場自改法抵今一年有半得息錢三十六萬緡察居厚皆進官加賜居厚三品服詔運賣鹽錢儲之北京令河北都轉運使蹇周輔判官李南公受法于居厚行之河北其在河北曰濱州場一歲𡞰二萬一千餘石以給本州及棣祁州雜支并京東之青淄齊州若大名真定府貝冀相衞邢洺深趙滄磁德博濱棣祁定保瀛莫雄霸州德清通利永靜乾寧定遠保定廣信永定安肅軍則通商後濱州分四務又增滄州三務歲課九千一百四十五石以給一路而京東之淄青齊既通商乃不復給自開寶以來河北鹽聽人貿易官收其算歲額為錢十五萬緡上封者嘗請禁榷以收遺利余靖時為諫官亟言前歲軍興河北點義勇強壯及諸科率數年之間未得休息臣嘗痛燕薊之地陷入契丹幾百年而民忘南顧心者大率契丹之法簡易鹽麴俱賤科役不煩故也昔太祖推恩河朔故許通商今若榷之價必騰踊民苟懷怨悔將何及河朔土多鹽鹵小民稅地不生五穀惟刮煎鹽以納二稅禁之必至逃亡鹽價若高犯法亦衆邊民怨望非國之福乞且仍舊通商其議遂寢慶曆六年三司使王拱辰復建議悉榷二州鹽入官以專其利都轉運使魚周詢以為不可且言商人販鹽與所過州縣吏交通為弊所算十無二三請敕州縣以十分算之聽商人至所鬻州軍併輸算錢歲可得緡錢七十餘萬三司奏用其策仁宗曰使人頓食貴鹽豈朕意哉於是三司更立榷法而未下張方平見上問曰河北再榷鹽何也上曰始議立法非再榷方平曰周世宗榷河北鹽犯輒處死世宗北伐父老遮道泣訴願以鹽課均之兩稅而弛其禁許之今兩稅鹽錢是也豈非再榷乎且今未榷而契丹盜販不已若榷則鹽貴契丹之鹽益售是為我斂怨而使契丹獲福也契丹鹽入益多非用兵莫能禁邊隙一開所得鹽利能補用兵之費乎上大悟曰其語宰相立罷之方平曰法雖未下民已戶知之當直以手詔罷不可自下出也上喜命方平密撰手詔下之河朔父老相率拜迎於澶州為佛老會七日以報上恩且刻詔北京後父老過其下必稽首流涕久之緡錢所入益耗皇祐中視舊額幾亡其半陝州錄事參軍王伯瑜監滄州鹽山務獻議商人受鹽滄濱二州以囊貯之囊毋過三石三斗斗為鹽六斤除三斗為耗勿算餘算其半予券為驗州縣驗券縱之聽至所鬻州軍併輸算錢即所貯過數予及受者皆罰商人私挾它鹽幷沒其貲時知滄州田京與伯瑜合議上聞詔試行之踰年歲課增三萬餘緡遂以為定制熙寧八年三司使章惇又請榷河北鹽召提舉河北京東鹽稅周革入議將施行焉文彥博論其不便乃詔仍舊
