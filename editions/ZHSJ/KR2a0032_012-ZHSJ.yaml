body:
  text: 宋史卷十二本紀第十二仁宗四二年春正月癸卯以歲饑罷上元觀燈壬子命近臣同三司較天下財賦出入之數二月甲申出內庫絹五十萬下河北陝西河東路以備軍賞三月戊子朔詔季秋有事于明堂己丑以大慶殿為明堂甲午遣官祈雨丁酉月犯軒轅大星戊戌詔明堂禮成羣臣毋上尊號庚子契丹遣使以伐夏師還來告丙午雨己酉詔兩浙流民聽人收養翰林學士趙㮣報使契丹夏五月丁亥朔新作明堂禮神玉己亥旌定州義民李能六月己未出新製明堂樂八曲丁卯以自製黃鐘五音五曲並肄于太常庚午定選舉縣令法壬申月犯填星癸未錄繫囚八月庚申熒惑入輿鬼犯積尸癸亥出內藏絹百萬市糴軍儲壬申深州大雨壞廬舍九月丁亥閱雅樂己酉朝饗景靈宮庚戌饗太廟辛亥大饗天地于明堂以太祖太宗真宗配如圜丘大赦百官進秩一等詔自今內降指揮百司執奏毋輒行敢因緣干請者諫官御史察舉之冬十月庚午熒惑犯太微上將乙亥宴京畿父老于錫慶院閏十一月己未詔后妃之家毋得除二府職任丙寅秀州地震有聲如雷丁卯詔中書門下省兩制及太常官詳定太樂河北水詔蠲民租出內藏錢四十萬緡絹四十萬匹付本路使措置是歲芻糧十二月甲申定三品以上家廟制唃廝囉西蕃瞎西南蕃龍光占城沙州來貢涇原路生戶都首領那龍男阿日丁內附三年春正月乙丑幸魏國大長公主第視疾二月丙戌宰臣文彥博等進皇祐大饗明堂記己亥復行河北沿邊州軍入中糧草見錢法三月庚申宋庠罷以劉沆參知政事癸酉儂智高表獻馴象及金銀卻之夏四月癸未詔河北流民相屬吏不加恤而乃飾廚傳交賂使客以取名譽自今非犒設兵校其一切禁之丙申太白晝見五月庚戌以恩冀州旱詔長吏決繫囚壬申置河渠司乙亥頒簡要濟衆方命州縣長吏按方劑以救民疾丁丑錄繫囚六月丁亥無為軍獻芝草帝命姑免知軍茹孝標罪戒州郡自今勿復獻秋七月癸丑詔少卿監以下年七十不任釐務者御史臺審官院以聞嘗任館閣臺諫及提刑者中書裁處待制以上能自引年則優加恩禮丙辰以孔氏子孫復知仙源縣事丁巳兩制禮官上大樂名曰大安辛酉河決大名府郭固口乙丑罷徙州縣長吏不任事者十有六人丙子減郴永州桂陽監丁身米歲十萬餘石八月丙戌遣使安撫京東淮南兩浙荊湖江南饑民辛卯詔諸路監司具所部長吏治狀能否以聞是月汴河絕流冬十月庚子文彥博罷以龐籍同中書門下平章事昭文館大學士高若訥為樞密使梁適參知政事王堯臣為樞密副使十一月辛亥減漳州泉州興化軍丁米十二月庚辰新作渾儀庚子詔文武官七十以上未致仕者更不考課遷官甲辰罷災傷州軍貢物是歲涇原樊家族密厮歌內附四年春正月己巳詔諸路貸民種乙亥塞大名府決河二月庚子蠲湖州民所貸官米三月己酉詔禮部貢舉丙辰蠲江南路民所貸種數十萬斛辛酉錄繫囚辛未詔宮禁市物給實直非所闕者毋市夏四月庚辰詔修河兵夫逃亡死傷會其數以議官吏之罰廣源州蠻儂智高反五月乙已朔智高陷邕州遂陷橫貴等八州圍廣州壬申命知桂州陳曙率兵討智高六月乙亥起前衞尉卿余靖為祕書監湖南安撫使知潭州前尚書屯田員外郎直史館楊畋體量安撫廣南提舉經制盜賊事庚辰改余靖為廣西安撫使知桂州命同提點廣東刑獄李樞與陳曙討智高廣東轉運鈐轄司發兵援之丁亥以狄青為樞密副使秋七月乙巳出內藏錢絹助河北軍儲丙午命余靖經制廣南盜賊事丁巳大風拔木壬戌智高引衆去廣州廣東兵馬鈐轄張忠知英州蘇緘邀擊于白田忠戰歿甲子廣東兵馬鈐轄蔣偕又敗于路田八月癸未詔開封府比大風雨民廬摧圮壓死者官為祭斂之辛卯命樞密直學士孫沔安撫湖南江西內侍押班石全斌副之九月丁巳命余靖提舉廣南兵甲經制賊盜事庚申廣西兵馬鈐轄王正倫討智高于昭州館門驛戰歿智高入昭州庚午以狄青為宣徽南院使宣撫荊湖路提舉廣南經制賊盜事是月智高襲殺蔣偕于太平場冬十月丙子太白犯南斗詔鄜延環慶涇原路擇蕃落廣銳軍各五千人赴廣南行營丁丑智高入賓州甲申復入邕州丁亥以諸路飢疫幷征徭科調之煩令轉運使提點刑獄親民官條陳救恤之術以聞十一月壬寅朔日有食之戊午詔免江西湖南廣南民供軍須者今年秋租十之三十二月壬申朔廣西兵馬鈐轄陳曙討智高兵戰于金城驛壬辰觀新樂乙未錄唐顏真卿後是歲河北路及鄜州水蠲河北民積年逋負鄜州民稅役五年春正月壬寅朔御大慶殿受朝庚戌以廣南用兵罷上元張燈白虹貫日丁巳會靈觀火戊午狄青敗智高于邕州斬首五千餘級智高遁去甲子遣使撫問廣南將校賜軍士緡錢二月癸未狄青復為樞密副使甲申赦廣南凡戰歿者給槥櫝護送還家無主者葬祭之賊所過郡縣免其田租一年死事家科徭二年貢舉人免解至禮部不預奏名者亦以名聞丙戌詔廣西都監蕭注等追捕智高丁亥下德音減江西湖南繫囚罪一等徒以下釋之丁壯饋運廣南軍須者減夏稅之半仍免差徭一年戊子詔百官遇南郊奏薦無子孫者聽奏期親一人乙未詔宗室通經者大宗正司以聞三月癸亥遣使奉安太祖御容于滁州太宗御容于幷州真宗御容于澶州是月賜禮部奏名進士諸科及第出身千四十二人夏四月甲午命劉沆梁適監議大樂五月乙巳詔輔臣凡有大政許復對後殿高若訥罷以狄青為樞密使丁未孫沔為樞密副使戊申詔轉運使毋取羨餘以助三司庚戌詔智高所至州無城壘若兵力不敵而棄城者奏裁壬子錄繫囚丁巳詔轉運司振邕州貧民戶貸米一石甲子詔諫官御史毋挾私以中善良及臣僚言機密事毋得漏泄六月乙亥御紫宸殿按大安樂觀宗廟祭器丙戌作集禧觀成乙未詔河北荐饑轉運使察州縣長吏能招輯勞來者上其狀不稱職者舉劾之秋七月乙巳詔荊湖北路民因災傷所貸常平倉米免償己酉詔薦舉非其人者令御史臺彈奏見任監司以上弗許薦論戊午詔太常定謚毋為溢美閏月戊辰詔廣南民逃未還者限一年歸業其復三歲壬申龐籍罷以陳執中同中書門下平章事昭文館大學士梁適同中書門下平章事集賢殿大學士乙亥詔武臣知州軍須與僚屬參議公事毋專決庚辰秦鳳路言總管劉煥等破蕃部斬首二千餘級八月丁酉朔詔民訴災傷而監司不受者聽州軍以狀聞辛酉策制舉武舉人壬戌詔南郊以太祖太宗真宗並配九月乙酉觀新樂冬十月丙申朔日有食之壬子作鎮國神寶丁巳詔以蝗旱令監司諭親民官上民間利害十一月丁卯朝饗景靈宮戊辰饗太廟奉慈廟己巳祀天地于圜丘大赦丁丑加恩百官戊子放天下逋負十二月戊午詔轉運官毋得進羨餘壬戌以曹陳許鄭滑州為輔郡隸畿內置京畿轉運使是歲占城國來貢至和元年春正月辛未詔京師大寒民多凍餒死者有司其瘞埋之壬申碎通天犀和藥以療民疫癸酉貴妃張氏薨輟視朝七日禁京城樂一月丁丑追冊為皇后賜謚溫成辛卯錄繫囚減三京輔郡雜犯死罪一等徒以下釋之二月庚子詔治河堤民有疫死者蠲戶稅一年無戶稅者給其家錢三千壬戌孫沔罷以田況為樞密副使三月己巳王貽永罷以王德用為樞密使辛未命曾公亮等同試入內醫官壬申賜邊臣攻守圖置京畿提點刑獄乙亥太史言日當食四月朔庚辰下德音改元減死罪一等流以下釋之癸未易服避正殿減常膳乙酉詔京西民飢宜令所在勸富人納粟以振之夏四月甲午朔日有食之用牲于社辛丑御正殿復常膳祥源觀火五月戊寅以河北流民稍復遣使安撫壬辰太白晝見秋七月丁卯以程戡參知政事立溫成園戊辰梁適罷己巳出御史馬遵呂景初吳中復八月丁酉詔前代帝王後嘗仕本朝官八品以下其祖父母父母妻子犯流以下罪聽贖未仕而嘗受朝廷賜者所犯非兇惡亦聽贖丙午以劉沆同中書門下平章事集賢殿大學士命修起居注官侍經筵九月乙亥契丹遣使來告夏國平辛巳遣三司使王拱辰報使契丹己丑太白晝見冬十月辛卯朔太白晝見壬辰詔士庶家毋得以嘗傭顧之人為姻違者離之丁酉葬溫成皇后丙午溫成皇后神主入廟戊午幸城北砲場觀發砲宴從臣賜衞士緡錢十一月甲子出太廟禘祫時饗及溫成皇后廟祭饗樂章肄于太常十二月丙午詔司天監天文算術官毋得出入臣僚家癸丑詔內侍傳宣令都知司劄報被旨者覆奏是歲融州大丘洞楊光朝內附二年春正月丁卯奉安真宗御容于萬壽觀減畿內輔郡囚罪一等徒以下釋之賜諸軍緡錢戊辰邕州言蘇茂州蠻內寇詔廣西發兵討之丁亥晏殊薨二月壬辰汾州團練推官郭固上車戰法既試之授衞尉丞三月丁卯詔修起居注立於講讀官之次丙子封孔子後為衍聖公是月以旱除畿內民逋芻及去年秋逋稅罷營繕諸役夏四月己亥契丹遣使賀乾元節以其主之命持本國三世畫像來求御容辛亥定差衙前法乙卯出米京城門下其價以濟流民五月己未錄繫囚辛酉詔中書公事並用祖宗故事戊寅詔戒百官務飭官守六月戊戌陳執中罷以文彥博同中書門下平章事昭文館大學士劉沆監修國史富弼同中書門下平章事集賢殿大學士乙巳儂智高母儂氏弟智光子繼宗繼封伏誅秋八月戊子減畿內輔郡囚罪一等徒以下釋之乙未置臺諫章奏簿壬子詔中書樞密院第宗姓服屬自明堂覃恩後及十年者咸與進官九月戊午契丹使來告其國主宗真殂帝為發哀成服于內東門幕次遣使祭奠弔慰及賀其子洪基立戊辰詔試醫官須引醫經本草以對每試十道以六通為合格辛巳罷輔臣宣徽節度使乾元節任子恩冬十月丙戌錄唐長孫無忌後己丑詔京畿毋領輔郡罷京畿轉運使提點刑獄癸丑下溪州蠻彭仕羲內寇詔湖北路發兵捕之十一月乙卯交趾來告李德政卒其子日尊上德政遺留物及馴象己未行並邊見錢和糴法十二月丁亥修六塔河丁酉詔武臣有贓濫者毋得轉橫行其立戰功者許之庚子契丹遣使致其主宗真遺留物及謝弔祭庚戌太白晝見壬子作醴泉觀成是歲西界阿訛等內附詔遣還龍賜州彭師黨以其族來歸大食國西蕃安化州蠻來貢嘉祐元年春正月甲寅朔御大慶殿受朝是日不豫辛酉輔臣禱祠于大慶殿齋宿殿廡近臣禱于寺觀及遣諸州長吏禱于嶽瀆諸祠壬戌御崇政殿癸亥賜在京諸軍緡錢甲子赦天下蠲被災田租及倚閣稅戊辰罷上元張燈辛未命輔臣禱天地宗廟社稷是月大雨雪木冰二月甲辰帝疾愈御延和殿三月丁巳詔禮部貢舉辛未司天監言自至和元年五月客星晨出東方守天關至是沒壬申遣官謝天地宗廟社稷寺觀諸祠癸酉契丹遣使來謝閏月癸未朔以王堯臣參知政事程戡為樞密副使詔前後殿間日視事夏四月壬子朔六塔河復決丙辰裁定補蔭選舉法甲戌錄繫囚是月大雨水注安上門門關折壞官私廬舍數萬區諸路言江河決溢河北尤甚六月辛亥朔詔雙日不御殿伏終如舊辛未免畿內京東西河北被水民賦租乙亥雨壞太社太稷壇戊寅遣使安撫河北己卯詔羣臣實封言時政闕失秋七月乙酉命京東西湖北監司分行水災州軍振飢蠲租丙戌賜河北流民米壓溺死者賜其家錢有差己丑出內藏銀絹三十萬振貸河北月入南斗乙巳貸被水災民麥種是月彗出紫微垣長丈餘環州小遇族叛知州張揆破降之八月庚戌朔日有食之癸亥狄青罷以韓琦為樞密使是夕彗滅甲子出恭謝樂章肄于太常乙亥朝謁景靈宮減京城繫囚徒罪一等杖笞釋之戊寅詔湖北招安彭仕羲九月庚寅命宰臣攝事于太廟辛卯恭謝天地于大慶殿大赦改元丁酉加恩百官庚子賜致仕卿監以上及曾任近侍之臣粟帛酒饌癸卯舉行御史遷次格自京至泗州置汴河木岸十一月辛巳王德用罷賈昌朝為樞密使十二月壬子劉沆罷以曾公亮參知政事甲子白虹貫日是歲西蕃磨角占城大食國來貢融桂州蠻楊克端等內附二年春二月己酉梓夔路三里村夷人寇淯井監庚戌錄繫囚降罪一等徒以下釋之遣使錄三京輔郡繫囚壬戌杜衍薨澧州羅城洞蠻內寇發兵擊走之癸酉王德用卒是月雄霸州地震三月戊寅振河北被災民乙未契丹使耶律防陳覬來求御容戊戌淮水溢遣張報使契丹癸卯狄青卒是月賜禮部奏名進士諸科及第出身八百七十七人親試舉人免黜落始此夏四月丁未以河北地數震遣使安撫丙寅幽州地大震壞城郭覆壓死者數萬人己巳邕州火峒蠻儂宗旦入寇癸酉以彭仕羲未降遣官安撫湖北五月庚辰管勾麟府軍馬公事郭恩為夏人所襲歿于斷道塢己亥詔舉行磨勘法六月戊午夏國主諒祚遣人來謝使弔祭戊辰以淑妃苗氏為賢妃秋七月辛巳詔河北諸道總管分遣兵官教閱所部軍辛卯命孫抃張磨勘轉運使及提點刑獄課績丁酉詔陝西河北諸路經略安撫舉文武官材堪將領者各一人八月己酉詔每歲賜諸道節鎮諸州錢有差命長吏選官和藥以救民疾壬子命富弼等詳定編敕庚申錄繫囚降罪一等徒以下釋之癸亥策制舉人丁卯置廣惠倉九月庚子契丹再使蕭扈吳湛來求御容冬十月乙巳遣胡宿報使契丹丙午班祿令十一月丙申詔三司使體量判官才否以聞十二月戊申詔自今間歲貢舉天下進士諸科解舊額之半置明經科罷說書舉人辛亥立內降關白二府法是歲西蕃瞎幷諸族西平州黔南道王石自品西南蕃鶼州來貢三年春正月戊戌鑿永通河二月癸卯契丹使來告其祖母哀輟視朝七日遣使祭奠弔慰癸丑錄繫囚降罪一等徒以下釋之三月甲戌詔禮部貢舉夏四月甲子吳育卒乙丑罷睦親宅祖宗神御殿丙辰詔守令或貪恣耄昏以弛為寬以苛為察以增賦斂為勞以出入刑罰為能而部使者莫之舉劾自今其各思率職毋撓權倖毋縱有罪以稱朕意五月壬申增國子監生員甲午契丹遣使致其祖母遺留物六月丙午文彥博賈昌朝罷以富弼為昭文館大學士韓琦同中書門下平章事集賢殿大學士宋庠田況為樞密使張為樞密副使甲寅詔學士院編國朝制誥丁卯交阯貢異獸秋七月丙子詔廣濟河溢原武縣河決遣官行視民田振恤被水害者癸巳以夔州路旱遣使安撫八月己亥朔日有食之己未王堯臣卒庚申彭仕羲率衆降九月癸酉議罷榷茶法己丑契丹遣使來謝冬十月癸亥除河北坊郭客戶乾食鹽錢十一月癸酉議減冗費己丑置都水監罷三司河渠司十二月己巳詔三司歲上天下稅賦之數三歲一會虧贏以聞閏月丁卯朔詔吏人及伎術官職毋得任知州軍提點刑獄自軍班出至正任者方得知邊要州軍丁丑詔裁定制科及進士高第人恩數庚辰詔明年正旦日食其自丁亥避正殿減常膳宴契丹使毋作樂壬午錄繫囚降三京囚罪一等徒以下釋之是歲安化上中下州北遐鎮蠻人來貢四年春正月丙申朔日有食之用牲于社辛丑御正殿復常膳以自冬雨雪不止遣官分行京城賜孤窮老疾錢畿縣委令佐為糜粥濟飢壬寅賜在京諸軍班緡錢頒嘉祐驛令二月己巳罷榷茶庚午廣南言交阯寇欽州乙亥以廣惠倉隸司農寺戊子白虹貫日三月戊戌命近臣同三司減定民間科率是月賜進士諸科及第出身三百三十九人夏四月丁卯詔孟冬大祫于太廟癸酉封柴氏後為崇義公給田十頃奉周室祀丙子復銀臺司封駮制癸未陳執中薨辛卯詔中外臣庶居室器用冠服妾媵有違常制必罰毋貸壬辰錄繫囚降罪一等徒以下釋之大震電雨雹五月戊戌詔兩制臣僚舊制不許詣執政私第執政嘗所舉薦不得用為御史今除其法庚子詔內臣員多權罷進養子入內壬子遣官經界河北牧地餘募民種藝六月己巳羣臣請加尊號曰大仁至治表五上不許癸酉詔諸路經略安撫轉運使提點刑獄各舉本部官有行實政事者三人以備升擢嘗任兩府者許舉內外官丁丑詔轉運司凡鄰州饑而輒閉糶者以違制論辛卯放宮女二百十四人秋七月丁未放宮女二百三十六人八月乙亥策制舉人冬十月壬申朝饗景靈宮癸酉大祫于太廟大赦詔諸路監司察士有學行為鄉里所推者同長吏以聞民父母年八十以上復其一丁復益州為成都府幷州為太原府戊寅加恩百官十一月庚子汝南郡王允讓薨十二月丁丑白虹貫日是歲唃廝囉來貢五年春正月辛卯朔白虹貫日太白犯歲星己亥錄劉繼元後二月壬戌錄繫囚三月壬辰詔禮部貢舉癸巳劉沆薨乙未歲星晝見壬子詔以蝗澇相仍敕轉運使提點刑獄督州縣振濟仍察不稱職者夏四月癸未程戡罷以孫抃為樞密副使丙戌命近臣同三司議均稅五月戊子朔京師民疫選醫給藥以療之己丑京師地震丁酉詔三司置寬恤民力司己酉王安石召入為三司度支判官丁巳錄繫囚降罪一等徒以下釋之六月乙丑詔戒上封告訐人罪或言赦前事及言事官彈劾小過不關政體者乙亥遣官分行天下訪寬恤民力事秋七月癸巳邕州言交阯與甲峒蠻合兵寇邊都巡檢宋士堯拒戰死之詔發諸州兵討捕丙申詔待制臺諫官正刺史以上各舉諸司使至三班使臣堪將領及行陣戰鬬者三人戊戌翰林學士歐陽脩上新修唐書庚戌詔中書門下采端實之士明進諸朝辨激巧偽者放黜之八月壬申詔求逸書庚辰置陝西估馬司乙酉罷諸路同提點刑獄使臣丙戌置江湖閩廣四川十一路轉運判官九月己丑太白晝見冬十月乙酉深州言野蠶成繭被于原野十一月辛卯罷內臣寄遷法辛丑宋庠罷以曾公亮為樞密使張孫抃為參知政事歐陽脩陳升之趙㮣為樞密副使十二月己卯蘇茂州蠻寇邕州辛巳補諸州父老百歲以上者十二人為州助教是歲大食國來貢六年春正月乙未許兩制與臺諫相見二月丁巳詔宗室賜名授官者須年及十五方許轉官乙丑詔良民子弟或為人誘隸軍籍自今兩月內父母訴官者還之丙寅錄繫囚降罪一等徒以下釋之三月己亥富弼以母喪去位庚子以富弼母喪罷大宴戊申給西京周廟祭享器服是月賜進士諸科及第同出身二百九十五人夏四月辛酉詔嶺南官吏死于儂賊而其家流落未能自歸者所在給食護送還鄉庚辰陳升之罷以包拯為樞密副使出諫官唐介趙抃御史范師道呂誨五月丙戌官諸路敦遣行義文學之士七人庚戌錄繫囚降罪一等徒以下釋之分命官錄三京繫囚六月壬子朔日有食之乙丑太白晝見壬申歲星晝見丙子以司馬光知諫院入對戊寅以王安石知制誥秋七月乙酉泗州淮水溢丙戌詔淮南江浙水災差官體量蠲稅戊子錄昭憲皇太后孝明孝惠孝章淑德皇后家子孫進秩授官者十有九人癸巳詔臺諫為耳目之官乃聽險陂之人興造飛語中傷善良非忠孝之行也中書門下其申儆百工務敦行實循而弗改者絀之八月乙亥策制舉人丁丑詔諸路刺舉之官未有以考其賢否比令有司詳定厥制其各務祗新書以稱朕意仍令考校轉運提刑課績院以新定條目施行戊寅詔州縣長吏有清白不擾而實惠及民者令本路監司保薦再任政迹尤異當加奬擢閏月乙酉復以成都府為劍南西川節度庚子以韓琦為昭文館大學士曾公亮同中書門下平章事集賢殿大學士張為樞密使辛丑以胡宿為樞密副使冬十月壬午定內侍磨勘法丙戌詔京西淮浙荊湖增置都同巡檢壬辰起復皇姪前右衞大將軍岳州團練使宗實為泰州防禦使知宗正寺辭以喪不拜十一月己巳許夏國用漢衣冠癸酉賜昭憲皇太后家信陵坊第戊寅許康州刺史李樞以己官封贈父母十二月丙戌復豐州庚寅命諸路總管集隨軍功過簿以備遷補是歲冬無冰占城國獻馴象安化州蠻來貢七年春正月辛未復命皇姪宗實為泰州防禦使知宗正寺乙亥詔南郊以太祖配為定制改溫成皇后廟為祠殿二月己卯朔更江西鹽法詔開封府市地于四郊給錢瘞民之不能葬者癸未錄繫囚命官錄被水諸州繫囚三月辛亥詔禮部貢舉乙卯孫抃罷以趙㮣參知政事吳奎為樞密副使甲子以旱罷大宴乙丑祈雨于西太一宮庚午謝雨壬申徐州彭城濠州鍾離地生十餘頃民皆取食夏四月壬午頒嘉祐編敕己丑夏國主諒祚進馬求賜書詔賜九經還其馬五月戊午太白晝見庚午包拯卒六月丙子朔歲星晝見秋七月戊申太白經天壬子詔季秋有事于明堂八月乙亥朔出明堂樂章肄于太常己卯詔以宗實為皇子癸未賜名曙丁亥奉安真宗御容于壽星觀庚子以立皇子告天地宗廟諸陵九月乙巳朔以皇子為齊州防禦使進封鉅鹿郡公己酉朝饗景靈宮庚戌饗太廟辛亥大饗明堂奉真宗配大赦己未加恩百官冬十月乙亥皇子表辭所除官賜詔不允丙戌白虹貫日乙未太白晝見丙申詔內藏庫三司共出緡錢一百萬助糴天下常平倉十二月甲午德妃沈氏為貴妃賢妃苗氏為德妃丙申幸龍圖天章閣召羣臣宗室觀祖宗御書又幸寶文閣為飛白書分賜從臣作觀書詩命韓琦等屬和遂宴羣玉殿庚子再召從臣于天章閣觀瑞物復宴羣玉殿是歲冬無冰占城來貢八年春正月辛亥交阯貢馴象九二月癸未帝不豫甲申下德音減天下囚罪一等徒以下釋之丙戌中書樞密奏事福寧殿之西閤三月戊申龐籍薨癸亥御內東門幄殿優賜諸軍緡錢甲子御延和殿賜進士諸科及第同出身三百四十一人辛未帝崩于福寧殿遺制皇子即皇帝位皇后為皇太后喪服以日易月山陵制度務從儉約謚曰神文聖武明孝皇帝廟號仁宗十月甲午葬永昭陵贊曰仁宗恭儉仁恕出於天性一遇水旱或密禱禁廷或跣立殿下有司請以玉清舊地為御苑帝曰吾奉先帝苑囿猶以為廣何以是為燕私常服澣濯帷帟衾裯多用繒絁宮中夜飢思膳燒羊戒勿宣索恐膳夫自此戕賊物命以備不時之須大辟疑者皆令上讞歲常活千餘吏部選人一坐失入死罪皆終身不遷每諭輔臣曰朕未嘗詈人以死況敢濫用辟乎至於夏人犯邊禦之出境契丹渝盟增以歲幣在位四十二年之間吏治若媮惰而任事蔑殘刻之人刑法似縱弛而決獄多平允之士國未嘗無弊倖而不足以累治世之體朝未嘗無小人而不足以勝善類之氣君臣上下惻怛之心忠厚之政有以培壅宋三百餘年之基子孫一矯其所為馴致於亂傳曰為人君止於仁帝誠無愧焉
