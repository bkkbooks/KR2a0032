body:
  text: 宋史卷一百五十八志第一百一十一選舉四銓法上太祖設官分職多襲五代之制稍損益之凡入仕有貢舉奏廕攝署流外從軍五等吏部銓惟注擬州縣官幕職兩京諸司六品以下官皆無選文臣少卿監以上中書主之京朝官則審官院主之武臣刺史副率以上內職樞密院主之使臣則三班院主之其後典選之職分為四文選曰審官東院曰流內銓武選曰審官西院曰三班院元豐定制而後銓注之法悉歸選部以審官東院為尚書左選流內銓為侍郎左選審官西院為尚書右選三班院為侍郎右選於是吏部有四選之法文臣寄祿官自朝議大夫職事官自大理正以下非中書省敕授者歸尚書左選武臣升朝官自皇城使職事官自金吾階衞仗司以下非樞密院宣授者歸尚書右選自初仕至州縣幕職官歸侍郎左選自借差監當至供奉官軍使歸侍郎右選凡應注擬升移復廕補封贈酬賞隨所分隸校勘合格團甲以上尚書省若中散大夫閤門使以上則列選之狀上中書省樞密院得畫旨給告身凡選人階官為七等其一曰三京府判官留守判官節度觀察判官即後來承直郎其二曰節度掌書記觀察支使防禦團練判官即後來儒林郎其三曰軍事判官京府留守節度觀察推官即後來文林郎其四曰防禦團練軍事推官軍監判官即後來從事郎其五曰縣令錄事參軍即後來從政郎其六曰試銜縣令知錄事即後來修職郎其七曰三京軍巡判官司理戶曹司戶法曹司法參軍主簿縣尉即後來迪功郎七階選人須三任六考用奏薦及功賞迺得升改凡改官留守兩府兩使判官進士授太常丞舊亦授正言監察或太常博士後多不除餘人太子中允舊亦授殿中丞支使掌書記防禦團練判官進士授太子中允或秘書郎餘人著作佐郎兩使推官軍事判官令錄事參軍進士授著作佐郎餘人大理寺丞初等職官知縣知錄事參軍防禦團練軍事推官軍監判官進士授大理寺丞餘人衞尉寺丞惟判司主簿縣尉七考進士授大理寺丞餘人衞尉寺丞自節察判官至簿尉考不及格者遞降等凡非登科及特旨者年二十五方注官凡三班院二十以上聽差使初任皆監當次任為監押巡檢知縣凡流外人三任七考有舉者六員移縣令通判有班行舉者三員與磨勘凡進納人六考有職官或縣令舉者四員移注四任十考有改官者五人舉之與磨勘初定四時參選之制凡本屬發選解並以四孟月十五日前達省自千里至五千里外為五等日期離本處若違限及不如式本判官罰五十直錄事參軍本曹官各殿一選諸州四時具員闕報吏部踰期及漏誤判官罰七十直錄事參軍以下殿一選在京百司發選解及送闕違期亦有罰諸歸司官奏年滿俟敕下準格取本司文解赴集流外銓則據其人自投狀申奏亦依四時取解參選凡州縣老疾不任事者許判官錄事參軍糺舉以聞判官錄事參軍則州長吏糺之藩郡監牧每遣朝臣攝守往往專恣太祖始削外權命文臣往蒞之由是內外所授官多非本職惟以差遣為資歷建隆四年詔選朝士分治劇邑以重其事大理正奚嶼知館陶監察御史王祐知魏楊應夢知永濟屯田員外郎于繼徽知臨清常參官宰縣自此始舊制畿內縣赤次赤畿外三千戶以上為望二千戶以上為緊一千戶以上為上五百戶以上為中不滿五百戶為中下有司請據諸道所具板圖之數升降天下縣以四千戶以上為望三千戶以上為緊二千戶以上為上千戶以上為中不滿千戶為中下自是注擬以為資又詔周廣順中應出選門州縣官於南曹投狀準格敕考校無礙與除官其復者刑部檢勘送銓先是選格未備乾德二年命陶穀等議凡拔萃制舉及進士九經判中者並入初等職官判下者依常選初入防禦團練軍事推官軍事判官者並授將仕郎試校書郎周三年得資即入留守兩府節度推官軍事判官並授承奉郎試大理評事又周三年得資即入掌書記防禦團練判官並授宣德郎試大理評事兼監察御史周二年得資即入留守兩府節度觀察判官並授朝散大夫試大理司直兼監察御史周一年入同類職事諸府少尹又周一年送名中書門下仍依官階分為四等已至兩使判官以上次任入同類職事者加檢校官或轉運憲銜凡觀察判官以上緋十五年乃賜紫每任以周三年為限閏月不預每周一年校成一考其常考依令錄例書中上公事闕遺曾經殿罰者即降考一等若校成殊考則南曹具功績請行酬奬或考滿未代更一周年與成第四考隨有罷者不赴集其奏授職事書校考第並準新格參選自是銓法漸有倫矣帝又慮銓曹惟用資歷而才傑或湛滯乃詔吏部取赴集選人歷任課績多而無闕失其材可副升擢者送中書引驗以聞時仕者愈衆頗委積不可遣開寶初令選人應格者到京即赴集不必限四時及成甲次又給限南曹八日銓司旬有五日門下省七日自磨勘注擬及點檢謝詞總毋踰一月若別論課績或負過名須考驗行遣如法及資考未合注擬者不在此限三年詔曰吏多難以求其治祿薄未可責其廉與其冗員重費不若省官益奉州縣官宜以戶口為率差減其員舊奉月增給五千西川管內諸州凡二萬戶依舊設曹官三員戶不滿二萬置錄事參軍司法參軍各一員司法兼司戶不滿萬戶止置司法司戶司戶兼錄事參軍戶不滿五千止置司戶兼司法及錄事參軍縣千戶以上依舊置令尉主簿凡三員戶不滿千置令尉縣令兼主簿事戶不滿四百止置主簿尉以主簿兼知縣事戶不滿二百止置主簿兼令尉諸道減員亦倣此制西川官考滿得代更不守選嶺表初平上以其民久困苛政思惠養之令吏部銓自襄荊以南州縣選見任年未五十者移為嶺南諸州通判得攜族之官以廣南偽署官送學士院試書判稍優則授上佐令錄簿尉初州縣有闕員差前資官承攝帝以其紊常制令所在即上闕員有司除注又謂諸道攝官或著吏能悉令罷去良可惜也有司按其歷任三攝無曠敗者以名聞六年從流內銓之請復四時選而引對者每季一時引對之時國家取荊衡克梁益下交廣闢土既遠吏多闕是以歲常放選選人南曹投狀判成送銓依次注擬其後選部闕官即特詔免解非時赴集謂之放選習以為常而取解季集之制漸廢是冬迺命參知政事盧多遜等以見行長定循資格及泛降制書乃正違異削去重複補其闕漏參校詳議取悠久可用者為書上之頒為永式而銓綜之職益有矣先是選人試判三道其二全通而文翰俱優為上一道全通而文翰稍堪為中三道俱不通為下判上者職事官加一階州縣官超一資判中依資判下入同類惟黃衣人降一資至是增為四等三道全次文翰無取者為中下用舊判下格全不通而文翰又紕繆為下殿一選太平興國六年詔京朝官除兩省御史臺自少卿監以下奉使從政於外受代而歸者令中書舍人郭贄膳部郎中兼侍御史知雜事滕中正戶部郎中雷德驤同考校勞績論量器材以中書所下闕員擬定引對以遣謂之差遣院蓋前代朝官自一品以下皆曰常參官其未常參者曰未常參官宋目常參者曰朝官秘書郎而下未常參者曰京官舊制京朝官有員數除授皆云替某官或云填見闕京官皆屬吏部每任滿三十月罷任則歲校其考第取解赴集太祖以來凡權知諸州若通判若監臨物務官無定員月限既滿有司住給奉料而見釐務者牒有司復文所釐務罷則已但不常參注授皆出中書不復由吏部至是與朝官悉差遣院主之凡吏部黃衣選人始許改為白衣選人太宗選用庶僚皆得引對觀其敷納可采者超擢之復慮因緣矯飾徼幸冒進迺詔應臨軒所選官吏並送中書門下考其履歷審取進止舊制州縣官南曹判成流內銓注擬其職事官中書除授然而歷任功過須經南曹考驗遂令幕府官罷任並歸銓曹其特除拜者聽朝旨又詔獄官關繫尤重新及第人為司理參軍固未精習令長吏察視不勝任者奏判司簿尉對易其官淳化四年選人以南郊赦免選悉集京師帝曰並放選則負罪者幸矣無罪者何以勸乃令經停殿者守常選又詔司理司法參軍在任有犯遇赦及書下考者止與免選更勿超資工部郎中張知白上言唐李嶠嘗云安人之方須擇郡守朝廷重內官輕外任望於臺閣選賢良分典大州共康庶績鳳閣侍郎韋嗣立因而請行遂以本官出領郡今江浙州郡方切擇人臣雖不肖願繼前脩帝曰知白請重親民之官良可嘉也然不允其請淳化以前資未一及是始定遷秩之制凡制舉進士九經出身者校書郎正字寺監主簿助教並轉大理評事評事轉本寺丞任太祝奉禮郎者轉諸寺監丞諸寺監丞轉著作佐郎或特遷太子中允秘書郎由大理寺丞轉殿中丞由著作佐郎轉秘書監丞資淺者或著作郎優遷者為太常丞由太子中允秘書郎轉太常丞三丞著作皆遷太常博士轉屯田員外郎優者為禮部工部祠部主客由屯田轉都官優者為戶部刑部度支金部由都官轉職方優者為吏部兵部司封司勳其轉郎中亦如之左右司員外郎太平興國中有之後罕除者左右司郎中惟待制以上當為少卿者即為之由前行郎中轉太常少卿秘書少監由此二官轉右諫議大夫或秘書監光祿卿諫議轉給事中資淺者或右轉左給事中轉工部禮部侍郎至兵部吏部轉左右丞由左右丞轉尚書自侍郎以上或歷曹或超曹皆繫特旨諸科及無出身者校書郎正字寺監主簿助教並轉太祝奉禮郎太祝奉禮郎轉大理評事評事轉諸寺監丞諸寺監丞轉大理寺丞大理寺丞轉中舍優者為左右贊善資淺者為洗馬由幕職為著作佐郎者轉太子中允由中允贊善中舍洗馬皆轉殿中丞殿中丞轉國子博士舊除五經者至春秋博士則轉國子博士後罕除由國子博士轉虞部員外郎優者為膳部由虞部轉比部優者為倉部由比部轉駕部優者為考功或由水部轉司門司門轉庫部為郎中亦如之至前行郎中轉少卿監或一轉或二三轉即為諸寺大卿監自大卿監特恩獎擢或入給諫焉其為臺省官則正言監察比太常博士殿中司諫比後行員外郎起居侍御史比中行員外郎起居轉兵部吏部員外郎侍御史轉職方員外郎優者為兵部司封知制誥由正言以上至郎中皆遷兩資中行郎中為左右司郎中若非次醻勞有遷三資或止一資者至左右司郎中為知制誥若翰林學士者遷中書舍人舊亦有自前行郎中除者後兵吏部止遷諫議由中書舍人轉禮部以上侍郎入丞郎即越一資以上內職學士待制亦如之御史中丞由諫議轉者遷工部侍郎由給事轉者遷禮部侍郎由丞郎改者約本資焉其學官司業視少卿祭酒視大卿其法官大理正視中允贊善凡正言監察以上皆特恩或被舉方除其任館閣三司王府職事開封府判官推官江淮發運諸路轉運使提點刑獄皆得優遷或以勤效特獎者亦如之兩制龍圖閣三館皆不帶御史臺官樞密直學士三司副使皆不帶御史臺官及兩省官待制以上不帶少卿監其內職自借職以上皆循資而遷至東頭供奉官者轉閤門祗候閤門祗候轉內殿崇班崇班轉承制承制轉諸司副使自副使以上或一資或五資七資或直為正使者至正使亦如之至皇城使者轉昭宣使昭宣使轉宣慶使宣慶使轉景福殿使其閤門祗候特恩轉通事舍人通事舍人轉西上閤門副使亦有加諸司副使兼通事者西上閤門副使轉東上東上轉引進引進轉客省客省轉西上閤門使自此以上亦如副使之遷惟至東上者又轉四方館使客省使轉內客省使內客省使轉宣徽使或出為觀察使自內客省使以上非特恩不授武班副率以上至上將軍其遷歷軍衞如諸司使副焉由牧伯內職改授則觀察使以上為上將軍團練使閤門使以上為大將軍刺史諸司使至崇班為將軍閤門祗候供奉官為率殿直以上為副率內侍省入內內侍省自小黃門至內供奉官皆歷級而轉至內東頭供奉官轉內殿崇班有轉內侍常侍者內常侍亦正轉崇班其銓選之制兩府司錄次赤令留守兩府節度觀察判官少尹一選兩府判司兩畿令掌書記支使防禦團練判官二選諸府司錄次畿令四赤簿尉軍事判官留守兩府節度觀察防禦團練軍事推官軍監判官進士制舉三選諸府司理判司望縣令九經四選輔州大都督府司理判司緊上州錄事參軍緊上縣令次赤兩畿簿尉五經三禮三傳三史通禮明法五選雄望州司理判司中州錄事參軍中縣令次畿簿尉六選緊上州司理判司下州中下州錄事參軍中下縣下縣令緊望縣簿尉學究七選中州中下州司理判司上縣簿尉八選下州司理判司中縣簿尉九選中下縣下縣簿尉十選太廟齋郎室長通理九年郊社齋郎掌坐通理十一年凡入官則進士入望州判司次畿簿尉九經入緊州判司望縣簿尉五經三禮通禮三傳三史明法入上州判司緊縣簿尉學究有出身人入中州判司上縣簿尉太廟齋郎入中下州判司中縣簿尉郊社齋郎試銜無出身人入下州判司中下縣簿尉諸司入流人入下州判司下縣簿尉仁宗初吏員猶簡吏部奏天下幕職州縣官期滿無代者八百餘員而川廣尤多未代帝曰此豈人情之所樂耶其亟代之帝御後殿視事或至旰食中書請如天禧舊制審官三班院流內銓日引見毋得過兩人詔弗許自真宗朝試身言書判者第推恩迺特詔曰國家詳覈吏治念其或淹常選而以四事程其能朕承統緒循用舊典爰命從臣精加詳考其令翰林學士李諮與吏部流內銓以成資闕為差擬於是咸得遷官率以為常後議者以身言書判為無益迺罷凡磨勘遷京官始增四考為六考舉者四人為五人曾犯過又加一考舉吏各有等數得被舉者須有本部監司長吏按察官乃得磨勘須到官一考方許薦任凡選人年二十五以上遇郊限半年赴銓試命兩制三員宀元攵試于尚書省糊名謄錄習辭業者試論試詩賦詞理可采不違程式為中格習經業者人專一經兼試律十而通五為中格聽預選七選以上經三試至選滿京朝官保任者三人補遠地判司簿尉無舉主者補司士參軍或不赴試亦無舉者永不預選京官年二十五以上歲首赴試于國子監考法如選人中格者調官兩任無私罪而有部使州守倅舉者五人入親民舉者三人惟與下等釐物務官初州郡多闕官縣令選尤猥下多為清流所鄙薄每不得調乃詔吏部選幕職官為知縣又立舉任法以重令選敕諸路察縣之不治者然被舉者日益衆有司無闕以待之中書奏罷舉縣令法未幾有言親民之任輕則有害於治法不宜廢復令指劇縣奏舉舉者二人必一人本部使既居任復有舉者始得遷否則如常選毋輒升補常參官已授外任勿奏舉然銓格煩密府史姦弊尤多而磨勘者待次外州或經三二歲乃得改官往往因緣薄勞求截甲引見有詔自是弗許神宗欲更制度建議之臣以為唐銓與今選殊異雜用其制則有留礙煩紊之弊始刊削舊條務從簡便因廢南曹而倂歸之于銓初審官西院與東院對掌文武尋改從吏部而左右選分焉祖宗以來中書有堂選百司郡縣有奏舉雖小大殊科然皆不隸于有司暨元豐罷奏舉闕屬之銓曹而堂選亦不領於中書一時更制必欲公天下而詒永久於是除免選之恩重出官之試定賞罰之則酌資廕之宜凡設試以待命士而入之銓注者自蔭補銓試之外有進士律義武臣呈試及試刑法官等而銓試所受為特廣中書言選人守選有及三年方遇恩放選者或適歸選而遽遇恩既為不均且蔭補免試注官以不習事多失職試者又止試詩豈足甄才已受任而無勞績舉薦及免試恩法須再試書判三道然亦虛文熙寧四年遂定銓試之制凡守選者歲以二月八月試斷按二或律令大義五或議三道後增試經義法官同銓曹撰式考試第為三等上等免選注官優等升資如判超格無出身者賜之出身自是不復試判仍去免選恩格若歷任有舉者五人自與免試注官任子年及二十聽赴銓試其試不中或不能試選人滿三歲許注官惟不得入縣令司理司法任子年及三十方許參注若年及二十授官已及三年出官亦不用試若秩入京朝即展任監當三年在任有二人薦之免展選人應改官必對便殿舊制五日一引不過二人至是待次者多有踰二年乃得引帝閔其留滯詔每甲引四人以便之帝因論郡守謂宰臣曰朕每思祖宗百戰得天下今州郡付之庸人常切痛心卿輩謂何如而得選任之要文彥博請擇監司而按察之陳升之曰取難治劇郡擇審官近臣而責以選才宜可得也初置審官西院磨勘武臣並如審官院格而舊審官曰東院御史中丞呂公著言英宗時文臣磨勘例展一年至少卿監止武臣橫行以上及使臣猶循舊制固未嘗如文臣有所節抑也又仁宗時嘗著令正任防禦團練以上非邊功不遷今及十年嘗歷外任即許轉亦未如少卿監之有限止也詔兩制詳定王珪等言文武兩選磨勘已皆均用四年請今自正任刺史以上轉官未滿十年若有顯效者自許特轉其非次恩惟許改易州鎮以示旌寵有過則比文臣展年從之知審官西院李壽朋言皇城使占籍者三十餘員多領遙郡而尚得從磨勘遷刺史團練防禦使每進一級增奉錢五萬廩粟雜給如之實為無名請於皇城使上別置二使名視前行郎中量給奉祿其遙郡刺史團練防禦使並從朝廷賞功擢用更不序遷詔遙郡刺史團練防禦使並以十年磨勘至觀察留後止應官止而有功若特恩遷者不以法諸司使副每磨勘皆用常制雖軍功亦無別異而閤門內侍輩轉皆七資帝謂左右近習非勳勞而得超躐至嘗立功者乃無優遷非制也使副嘗有軍功應轉許特超七資閤門通事舍人帶御器械兩省都知押班管幹御藥院使臣七資超轉法皆除之後客省引進四方館各置使二員東西上閤門共置使六員客省引進閤門副使共八員副使磨勘如諸司使法使有闕改官及五期者樞密院檢舉歷閤門職事有犯事理重者當遷日除他官閤門四方館使七年無私過未有闕可遷者加遙郡特旨與正任者引進四年轉團練使客省四年轉防禦使皆著為定制焉先是御史乞罷堂選曾公亮執不可王安石曰中書總庶務今通判亦該堂選徒留滯不能精擇宜歸之有司帝曰唐陸贄謂宰相當擇百官之長而百官之長擇百官今之審官苟得其人安有不能精擇百官者哉元豐四年堂選堂占悉罷初有司屬職卑者不在吏銓率命長吏舉奏都水監主簿李士良言沿河幹集使臣凡百六十餘員悉從水監奏舉往往不諳水事干請得之迺詔東西審官及三班院選差於是悉罷內外長吏舉官法明年令吏部始立定選格其法各隨所任職事以入仕功狀循格以俟擬注如選巡檢捕盜官則必因武舉武學或緣舉薦或從獻策得出身之人他皆倣此自官制行以舊少卿監為朝議大夫諸卿監為中散大夫秘書監為中大夫故事兩制不轉卿監官每至前行郎中即超轉諫議大夫前行郎中於階官為朝請大夫諫議大夫於階官為太中大夫帝謂磨勘者古考績之法所與百執事共之而禁近獨超轉非法也於是詔待制以下並三年一遷仍轉朝議中散中大夫三官自是遷平允凡開府儀同三司至通議大夫無磨勘法太中大夫至承務郎皆應磨勘待制以上六年遷兩官至太中大夫止承務郎以上四年遷一官至朝請大夫止朝議大夫以七十員為額有闕以次補之選人磨勘用吏部法遷京朝官則依新定之制除授職事官並以寄祿官品高下為法凡高一品以上者為行下一品者為守二品以下者為試品同者不用行守試哲宗時御史上官均言今仕籍合文武二萬八千餘員吏部逆用兩任闕次而仕者七年乃成一任當清其源宜加裁抑朝廷下其章議之司諫蘇轍議曰祖宗舊法凡任子年及二十五方許出官進士諸科初命及已任而應守選者非逢恩不得放選先朝患官吏不習律令欲誘之讀法乃減任子出官年數去守選之格概令試法通者隨得注官自是天下爭誦律令於事不為無補然人人習法則試無不中故蔭補者例減五年而選人無復選限吏部員今年已用後四年夏秋闕官冗至此亦極矣宜追復祖宗守選舊法而選滿之日兼行試法之科此亦今日之便也事報聞三省言舊經堂除選人惟嘗歷省府推官臺諫寺監長貳郎官監司外悉付吏部銓注凡格所應入遞升一等以優之被邊州軍其城砦巡檢都監監押砦主防巡諸路捕盜官及三萬緡以上課息場務凡舊應舉官員闕許仍奏舉時通議大夫以上有以特恩磨勘轉官而比之舊格或實轉兩官至三四官者右正言王覿謂非所以愛惜名器請官至太中大夫以上毋用磨勘遷轉詔待制太中大夫應磨勘者止於通議大夫餘官止中散大夫中散以上勞績酬獎合進官者止許回授子孫特命特遷不拘此制初武臣戰功得賞凡一資則從所居官遞遷一級於是以皇城使驟上遙刺或入橫行且閤門使以上等級相比而輕重絕遠因樞密院言乃詔閤門左藏庫副使得兩資客省皇城使得三資止許一轉減年者許回授親屬又小使臣磨勘轉崇班者歲毋過八十人內臣昭宣使以上無磨勘法惟押班以上則取裁餘理五年磨勘紹聖初改定銓試格凡攝官初歸選散官權官歸司若新賜第皆免試每試者百人惟取一人入優等中書奏裁二人為上等五人為中等崇寧以後又復元豐制而蔭補者須隸國學一年無過罰乃試銓若在學試嘗再入等即免試其公私試嘗居第一得比銓試推恩政和間著為令既而臣僚言進士中銓格者每二百人得優恩不過五七人又或闕上等不取而朝廷取隸國子試格用之銓注及今五年而得上等優恩者二百四十人免試者尚在其外是蔭補隸學者優於累試得第之人矣於是詔在學嘗魁一試者許如舊恩餘止令免試注官吏部侍郎彭汝礪乞稍責吏部甄別能否凡京朝官才能事效苟有可錄尚書暨郎官銓擇以聞三省分三年考察之高則引對次即試用下者還之本選若資歷舉薦應入高而才行不副許奏而降其等凡皆略許出法而加升黜歲各毋過三人初選人改官歲以百人為額元祐變法三人為甲月三引見積累至紹聖初待次者二百八十餘人詔依元豐五日而引一甲甲以三人歲毋過一百四十人俟待次不及百人別奏定又令歷任通及三考而資序已入幕職令錄方許舉之改官吏部言元豐選格經元祐多所紛更於是選集後先路分遠近資歷功過悉無區別踰等超資惟其所欲詔旨既復元豐舊制而辟舉一路尚存請盡復舊法以息僥倖乃罷辟舉崇寧元年詔吏部講求元豐本制酌以時宜刪成彝格使才能閥閱兩當其實吏部言堂選窠名及舉官員闕內外共約三千餘目元祐法選人得升資以上賞及參選射闕不許遣人代注今皆罷從元豐法所當損益者其知邊近蠻夷州如威茂黎瓊等及開封府曹掾平準務諸路屬官在京重課場務京城內外廂官戶部幹官麴院榷貨務將作監管幹公事黃河都大內外榷茶官凡干刑獄及筦庫繁劇皆不可罷舉若御史臺主簿檢法官協律郎豈可泛以格授諸如此類仍舊辟舉從之惟諸路毋得直牒差待闕得替官權攝初未改官制大率以職為階官如以吏部尚書為階官而同中書門下平章事則其職也至於選人則幕職令錄之屬為階官而以差遣為職名實混淆甚矣元豐未及革正崇寧二年刑部尚書鄧洵武極言之遂定選人七階曰承直郎曰儒林郎曰文林郎曰從事郎曰通仕郎曰登仕郎曰將仕郎政和間改通仕為從政登仕為修職將仕為迪功而專用通仕登仕將仕三階奏補未出官人承直至修職須六考迪功七考有官保任而職司居其一乃得磨勘坐愆犯則隨輕重加考及舉官有差時權姦柄國僥倖並進官員益濫銓法留礙臣僚言吏員增多蓋因入流日衆熙寧郊禮文武奏補總六百一十一員元豐六年選人磨勘改京朝官總一百三十有五員考之吏部政和六年郊恩奏補約一千四百六十有畸選人改官約三百七十有畸欲節其濫惟嚴守磨勘舊法而今之磨勘有局務減考第有川遠減舉官有用酬賞比類有因大人特舉有託事到闕不用滿任有約法違礙許先次而改凡皆棄法用例法不能束而例日益繁苟不裁之將又倍蓰而未可計也請詔三省若吏部舊有止法自當如故餘皆毋得用例迺詔惟川廣水土惡地許減舉如制餘悉用元豐法既而又言元豐進納官法多所裁抑應入令錄及因賞得職官止與監當該磨勘者換授降等使臣仍不免科率法意深矣邇者用兵東南民入金穀皆得補文武官理選如官戶與士大夫涇渭並流復其戶不受科輸是得數千緡於一日而失數萬斛於無窮也况大戶得復則移其科於下戶下戶重貧州縣緩急責辦何人此又弊之大者不聽初宗室無參選法祖宗時間選注一二不為常制徽宗欲優宗室多得出官一日參選即在合選名次之上而膏粱之習往往貪恣出任州縣黷貨虐民議者頗陳其害欽宗即位臣僚復以為言始令不注郡守縣令仍與在部人通理名次高宗建炎初行都置吏部時四選散亡名籍莫攷始下諸道州府軍監條具屬吏寓官之爵里年甲出身歷仕功過舉主到罷月日編而籍之然自兵難以來典籍散失吏緣為私申明繁苛承用踳駮保任滋衆阻會無期參選者苦之迺令凡文字有不應於今而桉牘參照明白從郎官審覆長貳予决小不完者聽行有狥私挾情則令御史糾之又詔京畿京東河北京西河東士夫在部注授雖銓未中而年及者皆聽注官二年命京官赴行在者令吏部審量非政和以後進書頌及直赴殿試之人乃聽參選在部知州軍通判僉判及京朝官知縣監當以三年為任者權改為二年以赴調者萃東南選法留滯故也又詔州縣久無正官者聽在選人申部審度牓闕差注紹興元年起居郎胡寅言今典章文物廢墜無幾百司庶府不可闕者莫如吏部姑置侍郎一員郎官二員胥吏三十人則所謂磨勘封奏薦常程之事可按而舉矣詔曰六官之長佐王理邦國者其惟銓衡乎亂離以來士大夫流徙有徒跣而赴行在者注授牓闕姦弊日滋寒士困苦甚可憫焉宜令三省議除其弊嚴立賞禁仍選能吏以主之御史臺常加糾察於是三省立八事曰注擬藏闕申請徼幸去失問難刷闕滅裂關會淹延審量疑似給付邀求保明退難令長貳機柅之又詔館職選人到任及一年通理四考並自陳改京官二年呂頤浩言近世堂除多侵部注士人失職宜倣祖宗故事外自監司郡守及舊格堂除通判內自察官省郎以上館職書局編修官外餘闕幷寺監丞法寺官六院等武臣自準備將領正副將以上其部將巡尉指使以下並歸部注從之又復文臣銓試以經義詩賦時議斷案律義為五場願試一場者聽牓首循一資武臣呈試合格者並聽參選三年右僕射朱勝非等上吏部七司敕令格式自渡江後文籍散佚會廣東轉運司以所錄元豐元祐吏部法來上乃以省記舊法及續降指揮詳定而成此書先是侍御史沈與求言今日矯枉太過賢愚同滯帝曰果有豪傑之士雖自布衣擢為輔相可也苟未能攷其實不若姑守資格迺命吏部注授縣令惟用合格之人五年詔凡注擬並選擇非老疾及未嘗犯贓與非緣民事被罪之人時建議者云親民莫如縣令今率限以資格雖貪懦之人一或應格則大官大邑得以自擇請詔監司郡守條上劇邑遴選清平廉察之人為之既而又詔知縣依舊法止用兩任關升通判資序明年侍御史周祕言今有無舉員考第因近臣薦對即改官升擢實長奔競望詔大臣自今惟賢德才能之人餘並依格注擬廷臣或請以前宰執所舉改官易以司馬光十科之目歲薦五員中書難之詔前宰執所舉京削不理職司而已三十二年吏部侍郎凌景夏言國家設銓選以聽羣吏之治其掌於七司著在令甲所守者法也今升降於胥吏之手有所謂例焉長貳有遷改郎曹有替移來者不可復知去者不能盡告索例而不獲雖有強明健敏之才不復致議引例而不當雖有至公盡理之事不復可伸貨賄公行姦弊滋甚嘗覩漢之公府有辭訟比尚書有決事比比之為言猶今之例今吏部七司宜置例冊凡換給之期限戰功之定處去失之保任書填之審實奏薦之限隔酬賞之用否凡經申請或堂白或取旨者每一事已命郎官以次擬定而長貳書之于冊永以為例每半歲上于尚書省仍關御史臺如是則巧吏無所施而銓平允矣有議減任子者孝宗以祖宗法令難於遽改令吏部嚴選試之法自是初官毋以恩例免試雖宰執亦不許自陳回授舊制任子降等補文學及恩科人皆免至是悉試焉凡未經銓中及呈試者勿堂除雖墨敕亦許執奏舊制宗室文資與外官文臣參注窠闕武資則不得與武臣參注但注添差至是始聽注釐務闕七年始命銓試不中年四十呈試不中年三十者令寫家狀讀律注官陳師正言請令宗室恩任子弟出官日量行銓試如士夫子弟之法多立其額而優為之制遂詔自今宗室曾經應舉得解者許參選餘並行銓試三人取二其三試終場不中人聽不拘年限調官淳熙元年參知政事龔茂良言官人之道在朝廷則當量人才在銓部則宜守成法法本無弊例實敗之法者公天下而為之者也例者因人而立以壞天下之公者也昔之患在於用例破法今之患在於因例立法諺稱吏部為例部今七司法自晏敦復裁定不無疏略然守之亦可以無弊而徇情廢法相師成風蓋用例破法其害小因例立法其害大法常靳例常寬今法令繁多官曹冗濫蓋繇此也望令裒集參附法及乾道續降申明重行攷定非大有牴牾者弗去凡涉寬縱者悉刊正之庶幾國家成法簡易明白賕謝之姦絕冒濫之門塞矣於是重修焉既而吏部尚書蔡洸以改官奏薦磨勘差注等條法分門編類名吏部條法總類十一月七司敕令格式申明成書淳熙三年中書舍人程大昌言舊制選人改秩後兩任關升通判通判兩任關升知州知州兩任即理提刑資序除授之際則又有別以知縣資序隔兩等而作州者謂之權發遣以通判資序隔一等而作州者謂之權知上而提刑轉運亦然隔等而授是擇材能也結銜有差是參用資格也今得材能資格俱應選者為上其次則擇第二任知縣以上有課績者許作郡初任通判以上許作監司第二任通判以上許作職司庶幾人法並用從之寧宗慶元中重定武臣關升格先是初改官人必作令謂之須入至是復命除殿試上三名南省元外並作邑後又命大理評事已改官未歷縣人並令親民一次著為令紹定元年臣僚上言銓曹之患員多闕少注擬甚難自乾道嘉定以來嘗命選部職官窠闕各於元出闕年限之上與展半年用闕歷年寖久入仕者多即今吏部參注之籍文臣選人武臣小使臣校尉以下不下二萬七千餘員大率三四人共注一闕宜其膠滯壅積而不可行乞命吏部錄參司理司法令丞監當酒官於元展限之上更展半年從之七年監察御史陳垓建言乞申戒飭銓法十弊一曰添差數多破法耗財謂倅貳幕職參議機宜總戎鈐轄監押之類二曰押差員衆州縣廢職謂監司帥守幕屬多差見任州縣他官權攝三曰攝局違法𢀿政害民謂監司帥守徇私差權幕屬等職四曰須入不行徼幸撓法謂初改官人必作知縣今多規免苟圖京局躐求倅貳遂使不曾歷縣之人冒當郡寄五曰奏辟不應奔競日甚謂在法未經任人不許奏辟今或以初任或以闕次遠而改辟見次者六曰改任巧捷紊亂官常謂在法已授差遣人不得干求換易今既授是官復謀他職辭卑居尊棄彼就此七曰薦舉不公多歸請託八曰借補繁多官資泛濫九曰瘝曠職守役心外求十曰匿過居官翫視國法謂曾經罪犯必俟赦宥今則既遭彈劾初未經赦者經營差遣舊制軍功補授之人自合從軍非老疾當汰無參部及就辟之法比年諸路奏功不實寅緣竄名許令到部及諸司紛然奏辟實礙銓法建炎兵興雜流補授者衆有曰上書獻策曰勤王曰守禦曰捕盜曰奉使其名不一皆閫帥假便宜承制之權以擅除擢有進士徑補京官者有素身冒名即為郎大夫者乃詔從軍應賞者第補右選以清流品又有民間願習射者籍其姓名守令月一試取藝優者如三路保甲法區用紹興初嘗以兵革經用不足有司請募民入貲補官帝難之參知政事張守曰祖宗時授以齋郎今之將仕郎是也知樞密院李回曰此猶愈科率於民乃許補承節郎承信郎諸州文學至進義副尉六等後又給通直郎修武郎秉義郎承直至迪功郎其注擬資考磨勘改轉蔭補封並依奏補出身法毋得注令錄及親民官和議之後立格購求遺書亦命以官凡歿於王事無遺表表致仕格法者聽奏補本宗異姓親子孫弟姪文臣將仕郎武臣承信郎餘親上州文學或進武校尉所以褒恤忠義也又以兩淮荊襄其土廣袤募民力田凡白身勸民墾田及七十五頃者與副尉五伯頃補承信郎孝宗即位命帥臣監司郡守嘗任兩府及朝官等遣親屬進貢等第補授登仕郎將仕郎推恩理為選限淳熙三年詔罷鬻爵除歉歲民願入粟賑饑有裕於衆聽補官餘皆停自是進納軍功不理選限登仕郎諸州助教不許出官止於贖罪及就轉運司請解而已
