body:
  text: 宋史卷三十四本紀第三十四孝宗二三年春正月甲辰詔廷尉大理官毋以獄情白宰執探刺旨意為輕重庚戌置三省戶房國用司初以國用匱乏罷江州屯駐軍馬至是復留之癸亥罷銅錢過江之禁裁定利州西路諸軍額二月壬申詔國用司月上宮禁及百司官吏三衙將士請給之數癸酉出龍大淵為江東總管曾覿為淮西總管甲戌大淵改浙東覿改福建乙亥罷成都潼川路轉運司輪年銓試以其事付制置司辛巳以端明殿學士虞允文知樞密院事癸未雨雹甲申為知陳州陳亨祖立廟于光州賜名愍忠丙戌以武經龜鑑孫子賜鎮江都統戚方建康都統劉源癸巳措置淮東山水砦丙申從太上皇太上皇后幸玉津園戊戌直秘閣前廣東提刑石敦義犯贓刺面配柳州籍其家三月甲辰從太上皇太上皇后幸聚景園辛亥詣德壽宮恭請裁定醫官員額丁巳詔四川宣撫司創招千人置司所在屯駐壬戌伯母秀王夫人張氏薨夏四月辛未蠲諸路州軍逋負癸酉為秀王王夫人成服于後苑百官進名奉慰丁丑合利州東西路為一戊寅以吳璘知興元府充利州路安撫使四川宣撫使五月癸卯葉顒等上三祖下仙源積慶圖及太宗真宗玉牒哲宗寶訓甲寅吳璘薨庚申命四川制置使汪應辰主管宣撫司事移司利州修揚州城壬戌大減三衙官屬六月己巳命汪應辰權節制利州路屯駐御前軍馬辛未復分利州東西路為二甲戌以虞允文為資政殿大學士四川宣撫使乙亥金遣使來取被俘人詔實俘在民間者還之軍中人及叛亡者不預戊寅復以虞允文為知樞密院事充宣撫使帝親書九事戒之罷淮西江東總領所營田募人耕佃壯丁各還本屯癃老存留減半請給甲申詔鎮江都統制戚方武鋒軍都統制陳敏各上清河口戰守之策追封吳璘為信王丁亥詔後省參攷理檢院典故辛卯皇后夏氏崩振泉州水災秋七月己亥立薦舉改官額壬寅以皇太子疾減雜犯死罪囚釋流以下乙巳皇太子薨謚曰莊文己酉東宮醫官杜楫除名昭州編管尋改瓊州閏月辛未詔諸軍復置副都統制文字與都統制連書軍馬調發從都統制違者奏劾戚方罷癸酉權欑安恭皇后于臨安修吉寺丁亥戚方落節鉞信州居住八月丁酉內侍陳瑜李宗回坐交結戚方受賂瑜除名決杖黥面配循州宗回除名筠州編管方責授果州團練副使潭州安置籍所盜庫金以犒軍甲寅以久雨命臨安府決繫囚丁巳葉顒等請罷不許蠲光濠廬三州壽春府賦一年戊午遣官分決滯獄壬戌以知建康府史正志兼沿江水軍制置使自鹽官至鄂州沿江南北及沿海十五州水軍悉隸之癸亥詔給舍討論考課舊法四川旱賜制置司度牒四百備振濟九月戊子太白晝見冬十月乙未朔占城入貢丁酉遣唐瑑等使金賀正旦戊戌修真州城以嗣濮王士輵為開府儀同三司庚子定內外薦舉改官人歲額癸卯詔歸正借補官資人充樞密院効士於指定州軍以官庫酒息贍之者毋罷其給乙卯金遣蒲察莎魯窩等來賀會慶節十一月丙寅合祀天地于圜丘大赦戊辰雷己巳詔戒飭武臣及百官癸酉以郊祀雷葉顒魏嵵並罷命陳俊卿為參知政事翰林學士劉珙同知樞密院事甲戌蔣芾陳俊卿請罷不許丁丑以雷發非時詔臺諫侍從兩省官指陳闕失辛巳詔侍從兩省臺諫卿監郎官舉堪郎官寺監丞監司郡守者癸巳罷川路馬船十二月丙申增修六合城己亥遣王瀹賀金主生辰乙巳置豐儲倉增印會子辛亥以吳益為太傅庚申金遣徒單忠衞等來賀明年正旦是歲兩浙水四川旱江東西湖南北路蝗振之四年春正月戊辰籍荊南義勇民兵增給衣甲遇農隙日番教壬午奪秦塤秦堪郊恩蔭補癸未雨雹甲申幸天竺寺遂幸玉津園辛卯罷吳益郊恩蔭補壬辰葉顒薨二月甲午朔罷福建路賣鈔鹽蠲轉運司歲發鈔鹽錢十五萬緡詔四川宣撫使虞允文集四路漕臣會計財賦所入對立兵額丁酉命湖北安撫司給田募辰沅靖三州刀弩手戊戌置和州鑄錢監己亥以蔣芾為尚書右僕射同中書門下平章事兼樞密使兼制國用使觀文殿大學士史浩為四川制置使浩辭不行庚子詔蔣芾常朝贊拜不名芾辭許之乙巳賜王炎出身簽書樞密院事癸丑五星皆見乙卯雪雨雹三月庚午以敷文閣待制晁公武為四川安撫制置使戊寅詔贈果州團練使韓崇岳立廟賜名忠勇宣州觀察使朱勇立廟賜名忠節己丑四方霧下若塵庚寅蠲楚州壯丁社民稅役謚陳亨伯曰愍節夏四月乙未置漢陽軍收發馬監詔公吏非犯公罪毋得引用併計案問法己亥置郢州轉般倉癸卯遣使撫邛蜀二州饑民為亂者己酉追封韓世忠為蘄王甲寅蔣芾等上欽宗帝紀實錄丙辰禮部員外郎李燾上所著續通鑑長編自建隆至治平一百八卷丁巳詔太史局參用新舊曆戊午詔販牛過淮者論如興販軍須之罪是月振綿漢等州饑五月癸亥出度牒千道續減四川科調乙丑太白晝見以邛州安仁縣荒旱失于蠲放致饑民擾亂守貳縣令降罷追停有差甲申謚趙鼎曰忠簡丙戌行乾道新曆丁亥以饒信二州建寧府饑民嘯聚遣官措置振濟是月西夏任敬德遣使至四川宣撫司約發兵攻西番六月辛卯朔太白晝見經天甲午詔罷廣西鈔鹽復官般官賣法歲減轉運司鈔錢十九萬緡其秋苗毋得科折戊戌蠲諸路逋負乾道元年二月和市折帛雜色錢辛丑龍大淵卒詔以為寧武軍節度使致仕五星皆見癸卯詔四川宣撫司增印錢引一百萬對償民間預借錢蠲邛蜀二州夏稅丁巳召興化軍布衣林彖赴行在戊午蔣芾以母喪去位秋七月壬戌以劉珙兼參知政事召建寧府布衣魏掞之赴行在申禁異服異樂癸亥徽州大水己巳罷沿江水軍制置司辛未衢州大水戊寅知衢州王悅以盛暑禱雨蔬食減膳憂勤致疾而死贈直龍圖閣丁亥以經總制餘剩錢二十一萬緡樁留邛蜀州以備振濟己丑以久雨御延和殿慮囚減臨安府三衙死罪以下囚釋杖以下是月西夏遣間使來八月乙未班祈雨雪之法于諸路己亥五星皆見丁未主管殿前司公事王琪傳旨不實擅興工役降三官放罷庚戌劉珙罷辛亥陳俊卿請罷政不許九月庚申立內外將佐升差審察法庚午從太上皇幸天竺寺限品官子孫名田是秋罷關外四州營田官兵募民耕佃冬十月壬辰遣鄭聞等使金賀正旦甲午禁歸正人藏匿金人者乙未臣僚言天下之事必歷而後知試而後見為縣令者必為丞簿為郡守者必為通判為監司者必為郡守皆有等差自今職事官及局務官必任滿方許求外未歷親民任使即未得擬州郡且授通判詔從之庚子蔣芾起復尚書左僕射陳俊卿右僕射並同中書門下平章事兼樞密使兼制國用使甲辰大閱己酉金遣移剌神獨斡等來賀會慶節庚戌大風十一月壬戌遣知無為軍徐子寅措置楚州官田招集歸正忠義人以耕甲戌嚴盜賊法乙亥詔峽州布衣郭雍赴行在壬申兩淮歸正忠義有田產者蠲役五年癸未岳陽軍節度使居廣封永陽郡王十二月丙申遣胡元質等賀金主生辰甲辰賜魏掞之同進士出身為太學錄蔣芾辭起復許之減兩浙江東西路明年夏稅和市之半甲寅金遣完顏仲仁等來賀明年正旦五年春正月甲戌措置兩淮屯田二月己丑申嚴太廟季點法乙未命楚州兵馬鈐轄羊滋專一措置沿淮海盜賊先是海州人時旺聚衆數千來請命旺尋為金人所獲其徒渡淮而南者甚衆故命滋彈壓之戊戌贈張浚太師謚忠獻壬寅以給事中梁克家簽書樞密院事癸卯大風甲辰以王炎參知政事兼同知樞密院事丙午雨雹辛亥詔自今詔令未經兩省書讀者毋輒行給舍駁正毋連銜同奏三月丁巳朔詔趣修廬和二州城己巳蠲成都府路民戶歲輸對糴米脚錢三十五萬緡乙亥以王炎為四川宣撫使仍參知政事召虞允文赴行在丙子賜禮部進士鄭僑以下三百九十有二人及第出身壬午賜郭雍號沖晦處士癸未罷利州路諸州營田官兵募民耕佃詔侍從監司帥臣管軍薦武舉出身人可將佐者夏四月己丑復置將作軍器少監壬辰以梁克家兼參知政事辛丑詔福建路貧民生子官給錢米庚戌修襄陽府城辛亥振恤衢婺饒信四州流民五月己巳帝以射弩弦斷傷目不視朝金牒取俘獲人王抃議盡遣時旺餘黨陳俊卿持不可帝然之六月庚寅太白晝見戊戌始視朝己酉以虞允文為樞密使秋七月乙丑召曾覿入見陳俊卿及虞允文請罷之不許覿至行在俊卿允文復言其不可留詔以覿為浙東總管八月甲申朔日有食之己丑以陳俊卿為尚書左僕射虞允文為尚書右僕射並同中書門下平章事兼樞密使兼制國用使辛亥命淮西路鑄小鐵錢九月己未罷淮東屯田官兵募民耕佃辛酉詔淮東諸州農隙教閱民丁甲子詔侍從臺諫集議欽宗配饗功臣壬申大風命淮西安撫司參議官許子中措置淮西山水砦招集歸正忠義人耕墾官田冬十月乙酉遣汪大猷等使金賀正旦戊子振溫台二州被水貧民以守臣監司失職降責有差戊戌大風己亥命饒信二州歲各留上供米三萬石以備振糶癸卯金遣高德基等來賀會慶節十一月癸丑朔復置淮東萬弩手名神勁軍庚申增置廣東水軍乙丑以孫擴為右千牛衞大將軍以明州定海縣水軍為御前水軍丙寅為岳飛立廟于鄂州己巳太白晝見辛未詔侍從臺諫兩省官各舉京朝官以上才堪監司郡守者三人壬申復成閔慶遠軍節度使鎮江諸軍都統制十二月己丑遺司馬伋等賀金主生辰辛卯大風丁酉置應城縣馬監復李顯忠威武軍節度使乙巳復置成都府廣惠倉戊申金遣完顏毅等來賀明年正旦六年春正月癸丑雅州沙平蠻寇邊焚碉門砦四川制置使晁公武調兵討之失利乙卯修楚州城丁巳復強盜舊法其四年十一月指揮勿行癸亥初降金字牌下四川宣撫司備邊奏乙丑增築豐儲倉庚午以奉國軍承宣使知廬州郭振為武泰軍節度使二月乙酉詔戶部侍郎二人分領諸路財賦丁亥復置舒州同安監鑄鐵錢辛卯王炎遣人約沙平蠻歸部稍捐邊稅與之丙申廣西路復行鈔鹽法仍增收通貨錢四十萬緡以備漕計壬寅詔諭大臣均役法嚴限田抑游手務農桑己酉置應城縣孳生監庚戌以曾覿為福州觀察使遣司農寺丞許子中詣淮西措置鐵錢三月癸丑用三省言兩淮守帥宜久其任二年後察其能否以行賞罰乙卯裁減樞密院吏額一百十有四人丁巳詔步軍司權以三萬五千人為額起復王抃知閤門事專一措置三衙揀選官兵贈彰國軍節度使大周仁為太尉庚申從太上皇太上皇后幸聚景園乙丑以晁公武王炎不協罷四川制置司歸宣撫司辛未從太上皇太上皇后幸聚景園甲戌裁減三省吏額七十人戊寅以知紹興府史浩為檢校少傅保寧軍節度使己卯詔兩淮州縣官以繁簡易其任復置江浙京湖淮廣福建等路都大發運使以新知成都府史正志為之夏四月辛巳朔罷鑄錢司歸發運司併淮東總領所歸淮西總領所以敷文閣直學士張震知成都府充本路安撫使乙未賜發運使史正志緡錢二百萬為均輸和糴之用吏部尚書汪應辰三上疏論發運司戊戌以應辰知平江府五月甲寅裁減六部吏額百五十人其餘百司三衙以是為差己未陳俊卿虞允文等上神宗哲宗徽宗欽宗四朝會要太上皇玉牒己巳陳俊卿以議遣使不合罷為觀文殿大學士知福州罷行在至鎮江征稅所比近者十有三甲戌詔戒飭百官丁丑知潮州曾造犯贓貸命南雄州編管籍其家戊寅詔給舍臺諫言事閏月壬午詔監司帥臣舉守令臧否失實依舉清要官法定罪甲申印給諸州上供綱目季申而歲校之以為殿最戊子遣范成大等使金求陵寢地且請更定受書禮辛卯吏部侍郎陳良祐論祈請使不當遣恐生邊釁詔以良祐妄興異論不忠不孝放罷送筠州居住癸巳增環衞官奉以梁克家為參知政事兼同知樞密院事壬寅以江東漕臣黃石不親按行水災州郡降二官甲辰辛次膺薨戊申復置武臣提刑六月壬子申嚴卿監郎官更迭補外之制壬申增武學生為百人癸酉置蘄州蘄春監黃州齊安監鑄鐵錢是月榮國公挻自東宮出居外第秋七月癸未詔以沙田蘆場歲收租稅六十餘萬緡入左藏南庫丙戌詔川廣監司郡守任滿奏事訖方調己丑置興國軍興國監甲午詔除郎官並引對畢供職辛丑復置御前弓馬子弟所命吳挺兼提舉賜岳飛廟曰忠烈八月庚戌虞允文請蚤建太子癸丑復置詳定一司敕令所丙寅置閤門舍人十員是月虞允文上乾道敕令格式九月壬辰賜蘇軾謚曰文忠辛丑沅州徭人相讐殺守臣孫叔傑出兵擊之失利徭人進迫州城安撫司諭解之叔傑尋抵罪是月范成大至自金金許以遷奉及歸欽廟梓宮而不易受書禮冬十月己酉以孫攄為左千牛衞大將軍丙辰詔發運使置司行在謚司馬朴曰忠潔辛酉遣呂正己等使金賀正旦丁卯金遣耶律子敬等來賀會慶節甲戌起居舍人趙雄請置局議恢復詔以雄為中書舍人十一月丁丑朔復置軍器監一員壬午合祀天地于圜丘大赦乙未復置神武中軍以吳挺為都統制召曾覿提舉佑神觀丁酉加上光堯壽聖太上皇帝尊號曰光堯壽聖憲天體道太上皇帝壽聖太上皇后尊號曰壽聖明慈太上皇后是月遣趙雄等賀金主生辰別函書請更受書之禮置左藏南上庫十二月戊申大閱甲子置江州廣寧監臨江軍豐餘監撫州裕國監鑄鐵錢壬申金遣蒲察愿等來賀明年正旦癸酉罷發運司以史正志奏課不實責為楚州團練副使永州安置是歲兩浙江東西福建水旱七年春正月丙子率羣臣奉上太上皇太上皇后冊寶于德壽宮庚辰虞允文復請建太子帝命允文擬詔以進壬寅命三省旬錄宣諭聖語及時政記同進是月復鑄錢司二月癸丑詔立子惇為皇太子大赦以慶王愷為雄武保寧軍節度使判寧國府進封魏王丁巳增置皇太子宮講讀官庚申罷會子庫仍賜戶部內藏南庫緡錢二百萬銀九十萬兩以增給官兵之奉甲子詔寺觀毋免稅役丁卯太傅大寧郡王吳益薨壬申大風三月乙亥朔趙雄至金金拒其請詔訓習水軍丙子立恭王夫人李氏為皇太子妃戊寅徙侍衞馬軍司戍建康己卯起復劉珙同知樞密院事以明州觀察使知閤門事兼樞密都承旨張說簽書樞密院事左司員外郎兼侍講張栻言說不宜執政乙酉立沿海州軍私齎銅錢下海船法丙戌復置將作監殿中侍御史李處全乞遣張說按行邊戍以息衆論中書舍人范成大乞不草詞戊子說罷為安慶軍節度使提舉萬壽觀庚寅遣使覈兩淮種麥丙申御大慶殿冊皇太子禮部侍郎鄭聞工部侍郎胡銓樞密院檢詳文字李衡祕書丞潘慈明並罷虞允文乞留銓乃以為寶文閣待制兼侍講己亥皇太子謝于紫宸殿宰相率百官赴東宮賀夏四月戊申以曾覿為安德軍承宣使庚申詔諸路增收無額錢物並輸南上庫壬戌從太上皇太上皇后幸聚景園甲子詔皇太子判臨安府己巳詔侍從臺諫兩省官舉任刑獄錢穀及有智略吏能者各二人辛未詔皇太子領臨安尹五月戊寅復置淮東總領所丁亥劉珙起復同知樞密院事為荊襄宣撫使珙辭不拜庚寅金人葬欽宗于鞏原丁酉詔廣西帥臣措置南丹州市馬是月遣知閤門事王抃點閱荊襄軍馬六月丙午復主管馬軍司公事李顯忠為太尉己巳賜吳璘謚曰武順壬申詔兩淮墾田毋創增稅賦秋七月庚子以王炎為樞密使四川宣撫使八月丙辰詔兩淮民丁充民兵者本名丁錢勿輸辛酉復修襄陽城九月壬申朔以江西湖南旱命募民為兵甲申從太上皇太上皇后幸東園戊子安定郡王令德薨冬十月丁未罷紹興宗正行司改恩平郡王璩判西外宗正己酉遣莫濛等使金賀正旦壬戌金遣烏林答天錫等來賀會慶節天錫要帝降榻問金主起居虞允文請帝還內命知閤門事王抃諭天錫以明日見天錫沮退癸亥會慶節金使隨班入見十一月甲戌御集英殿策試應賢良方正能直言極諫科李垕戊寅錫垕制科出身十二月丁未遣翟紱等賀金主生辰庚申詔閤門舍人依文臣館閣以次輪對癸亥罷太醫局丙寅金遣完顏宗寧等來賀明年正旦是歲湖南江東西路旱振之八年春正月庚午朔班乾道敕令格式丁酉朝獻景靈宮遂幸天竺寺玉津園二月乙巳詔改尚書左右僕射同中書門下平章事為左右丞相丙午詔六察分隸事有違戾許監察御史隨事具實狀糾劾以聞戊申遣姚憲等使金賀上尊號附請受書之事辛亥以虞允文為左丞相梁克家為右丞相並兼樞密使癸丑以安慶軍節度使張說吏部侍郎王之奇並簽書樞密院事侍御史李衡右正言王希呂交章論說不可為執政不報禮部侍郎兼直學士院周必大不草答詔權給事中莫濟封還錄黃詔並與在外宮觀丙辰詔罷王希呂與遠小監當尋詔與宮觀丁巳李衡罷為起居郎丙寅戶部尚書曾懷賜出身參知政事三月戊子詔省侍中中書尚書令員以左右丞相充其位夏四月庚子賜禮部進士黃定以下三百八十有九人及第出身己酉殿中侍御史蕭之敏劾虞允文擅權不公允文請罷政許之翼日復留出之敏提點江東刑獄甲子措置兩淮官田徐子寅等坐授田歸正人逃亡奪官有差乙丑詔再蠲兩淮二稅一年五月戊子福建鹽行鈔法丙申立宗室銓試法六月庚子以武德郎令為金州觀察使封安定郡王壬寅蠲兩淮歸正人撮收課子淮東巡尉有縱逸歸正戶口過淮者奪官有差壬子省監司薦舉員秋七月辛巳罷淮西屯田官兵募歸正人耕佃姚憲曾覿至自金金人拒其請癸未以覿為武泰軍節度使壬辰雨雹九月戊辰定江西四監鐵錢額乙亥詔王炎赴都堂治事戊寅以虞允文為少保武安軍節度使四川宣撫使封雍國公己丑賜允文家廟祭器壬辰允文入辭帝諭以決策親征令允文治兵俟報冬十月丁未遣馮撙等使金賀正旦丙辰金遣夾谷清臣等來賀會慶節罷借諸路職田十一月辛未遣官鬻江浙福建二廣湖南八路官田辛巳復四川諸州教授員庚寅進檢校少傅知福州史浩開府儀同三司十二月戊戌蠲兩淮明年租賦甲辰詔京西招集歸正人授田如兩淮甲寅命四川試武舉丙辰追封劉光世為安成郡王丁巳遣韓元吉等賀金主生辰庚申復置鑄錢司提點官二員辛酉金遣曹望之等來賀明年正旦是歲隆興府江筠州臨江興國軍大旱四川水九年春正月辛未王之奇罷為淮南安撫使王炎罷為觀文殿大學士提舉洞霄宮乙亥以張說同知樞密院事戶部侍郎沈夏簽書樞密院事戊寅遣官鬻兩浙營田及沒官田次及江東西四川如之以刑部尚書鄭聞簽書樞密院事乙酉福建鹽復官賣法是月以措置兩淮荊襄十六事敕安撫轉運使督諸州守臣月具所行事奏仍審擇臧否以議黜陟閏月戊申以久雨命大理三衙臨安府及兩浙州縣決繫囚減雜犯死罪以下一等釋杖以下乙卯修廬州城辛酉大風幸天竺寺玉津園二月壬申蠲江西旱傷五州逋負米乙亥青羌奴兒結寇安靜砦黎州推官黎商老戰死乙酉孫榮國公挻薨追封豫國公丁亥特贈蘇軾為太師三月甲午禁北界博易銀絹戊申從太上皇太上皇后幸聚景園癸丑復以進奏院隸門下後省丙辰復分淮南安撫司為東西路夏四月丁丑裁定武鋒軍軍額己丑皇太子解臨安尹事五月壬辰朔日有食之己未以迪功郎朱熹屢詔不起特改宣教郎主管台州崇道觀六月甲戌禁兩淮荊襄四川諸州籍民戶馬己丑戒飭監司守令勸農秋七月壬寅青羌奴兒結降辛亥吐蕃彌羌畜列陷安靜砦引兵深入黎州守臣誘邛部川蠻擊卻之八月丙子詔興修水利癸未合荊鄂二軍為一以吳挺充都統制九月丙申梁克家等上中興會要太上皇及皇帝玉牒庚子命盱眙軍以受書禮移牒泗州示金生辰使金使不從冬十月甲子遣留正等使金賀正旦右丞相梁克家與同知樞密院張說議使事不合乃求去辛未克家罷為觀文殿大學士知建寧府壬申矞雲見甲戌以曾懷為右丞相張說知樞密院事鄭聞參知政事沈夏同知樞密院事庚辰金遣完顏襄等來賀會慶節丁亥襄等入辭別函申議受書之禮仍示虞允文速為邊備十一月辛卯詔樞密院除授及財賦事關中書門下省其邊機軍政更不錄送戊戌合祀天地于圜丘大赦改明年為淳熙元年十二月己未朔戒敕沿邊諸軍毋輒遣間探招納叛亡甲子沈夏罷乙丑以御史中丞姚憲簽書樞密院事遣韓彥直等賀金主生辰辛未交阯入貢癸酉罷廣西客鈔鹽復官般官賣法甲戌遣使措置宜州市馬乙亥以嗣濮王士輵永陽郡王居廣並為少保乙酉金遣完顏璋等來賀明年正旦以議受書禮不合詔俟改日以太上皇有旨姑聽仍舊丁亥璋等入見是歲浙東江東西湖北旱淳熙元年春正月乙未禁淮西諸關採伐林木戊戌罷坐倉糴米賞庚子罷兩淮將帥權攝官丙午禁兩淮耕牛出境以交阯入貢詔賜國名安南封南平王李天祚為安南國王二月癸酉虞允文薨辛巳為郭浩立廟于金州三月戊子朔詔寄祿官及選人並去左右字丙申以鄭聞為資政殿大學士四川宣撫使戊申幸玉津園癸丑金遣梁肅等來計事夏四月戊辰從太上皇幸聚景園壬申許桂陽軍谿洞子弟入州學聽讀乙亥詔四川宣撫司教閱諸州將兵戊寅遣張子顏等使金報聘己卯以姚憲參知政事戶部尚書葉衡簽書樞密院事五月壬寅班鄭興裔所創檢驗格目六月丙辰朔詔禮官討論別建四祖廟正太祖東嚮位戊午以興州都統制吳挺為定江軍節度使癸酉改江陵府為荊南府戊寅曾懷罷癸未姚憲罷甲申落憲端明殿學士罷宮觀以葉衡參知政事秋七月丁亥以鄭聞參知政事罷四川宣撫司以成都府路安撫使薛良朋為四川安撫制置使戊子詔舉廉吏壬辰以曾懷為右丞相己酉姚憲南康軍居住八月己未張說罷為太尉提舉隆興府玉隆觀以徽猷閣學士楊倓為昭慶軍節度使簽書樞密院事九月乙酉朔以曾覿開府儀同三司壬寅幸玉津園宴射乙巳罷宜州市馬冬十月辛酉立金銀出界罪賞壬戌遣蔡洸使金賀正旦癸亥以積雨命中外決繫囚丙寅鄭聞薨乙亥金遣完顏讓等來賀會慶節戊寅占城入貢辛巳再蠲臨安府民身丁錢三年壬午以魏王愷判明州蠲郴州桂陽軍借貸常平米十一月甲申朔日有食之戊戌以禮部侍郎龔茂良參知政事楊倓罷以葉衡兼權知樞密院事丙午曾懷罷戊申以葉衡為右丞相兼樞密使十二月丁巳以吏部尚書李彥穎簽書樞密院事壬戌遣吳琚等賀金主生辰丙寅罷鐵錢改鑄銅錢庚午詔禮官論復魏悼王襲封壬申葉衡等上真宗玉牒金遣劉仲誨等來賀明年正旦以資政殿學士知江陵府沈夏升大學士為四川宣撫使仍命升差從主帥場務還軍中新四川制置使范成大改管內制置使二年春正月癸巳前宰相梁克家曾懷坐擅改堂除克家落觀文殿學士懷降為觀文殿學士甲午廢同安蘄春監丁未以兩淮諸莊歸正人安業徐子寅等行賞有差庚戌詔籍諸軍子弟為背嵬軍三月丙申以太上皇壽七十詔禮官討論慶壽典禮乙巳詔武舉第一人補秉義郎堂除諸軍計議官夏四月乙卯賜禮部進士詹騤以下四百二十有六人及第出身己巳幸玉津園是月茶寇賴文政起湖北轉入湖南江西官軍數為所敗命江州都統皇甫倜招之五月辛卯諭宰相以朝政闕失士民皆得獻言庚子命鄂州都統李川調兵捕茶寇乙巳詔知縣三年為任六月庚戌朔詔自今宰執侍從以下除外任非有功績者不除職名外任人非有勞效亦不除職以沈夏同知樞密院事辛酉罷四川宣撫司以倉部郎中辛棄疾為江西提刑節制諸軍討捕茶寇丁卯用左司諫湯邦彥言落蔣芾王炎觀文殿大學士張說落節度使芾建昌軍炎袁州說撫州並居住戊辰振濟湖南江西被寇州縣是月茶寇自湖南犯廣東秋七月辛丑有星孛于西方八月丙辰江西總管賈和仲以捕茶寇失律除名賀州編管甲子賜安南國王印丁卯蠲湖南江西被寇州縣租稅丁丑遣左司諫湯邦彥等使金申議九月乙卯朔湯邦彥請分揚廬州荊南襄陽府金州興元府興州為七路每路文臣一人充安撫使以治民武臣一人充都總管以治兵三載視其成以議誅賞從之乙酉振恤淮南水旱州縣乙未葉衡罷丁未沈夏罷贈趙鼎為太傅還其爵邑追封豐國公閏月丁巳以李彥穎參知政事翰林學士王淮簽書樞密院事甲子詔武臣從軍毋帶內職是月辛棄疾誘賴文政殺之茶寇平冬十月戊寅朔賞平茶寇功湖南江西廣東監帥黜陟有差庚辰大風壬午詣德壽宮加上光堯壽聖憲天體道太上皇帝尊號曰光堯壽聖憲天體道性仁誠德經武緯文太上皇帝壽聖明慈太上皇后尊號曰壽聖齊明廣慈太上皇后乙酉遣謝廓然等使金賀正旦戊戌金遣完顏禧等來賀會慶節十一月戊申朔奉上太上皇太上皇后冊寶于德壽宮庚戌麗正門內火癸丑大風戊午提點坑冶王揖進羨餘十萬緡詔却之十二月辛巳班淳熙吏部七司法遣張宗元等賀金主生辰甲午朝德壽宮行慶壽禮大赦文武官封父母賞諸軍議放天下苗稅三之一大臣言國用不足迺止丙申更定強盜贓法甲辰金遣完顏迨等來賀明年正旦三年春正月甲寅以常州旱寬其逋負之半刪犯贓蔭補法振淮東饑仍命貸貧民種乙丑振恤歸正人二月壬午蠲兩淮教閱民兵夏稅癸未以伯圭為安德軍節度使甲申詔四川監司帥守聞命之官毋候告敕賜韓世忠謚曰忠武是月罷諸路鬻沒官田三月丙午朔日有食之露雲不見辛亥上太上皇日曆于德壽宮己未置六部編敕司癸亥幸報恩寺遂幸聚景園己巳併左藏四庫為二辛未詔四川制置司歲擇梁洋義士材武者二人遣赴樞密院壬申立任子參選覆試法夏四月戊寅詔侍從臺諫兩省官歲舉監司郡守各五人辛巳靖州徭人寇邊遣兵討捕之丁亥雨雹己丑責授葉衡安德軍節度副使郴州安置丁酉湯邦彥陳雷奉使無狀除名邦彥新州雷永州編管己亥詔諸路提刑歲五月理囚五月癸丑合利州東西路為一安南國王李天祚卒戊午遣使弔祭壬申太白晝見六月乙酉減四川酒課四十七萬餘緡甲午以朱熹屢詔不起特命為秘書郎熹不就秋七月乙丑禁浙西圍田八月乙亥以王淮同知樞密院事禮部尚書趙雄簽書樞密院事詔六察官糾察庶務臺綱益振各進二官庚辰太上皇詔立貴妃謝氏為皇后壬午以久雨命中外決繫囚戊戌靖州徭寇平九月癸亥詔自今犯公罪至死者其蔭補具所犯奏裁著為令冬十月甲戌以久雨命中外決繫囚丙子御文德殿冊皇后丁丑命臨安守臣嚴禁踰侈庚辰詔自今非歉歲不許鬻爵癸未遣閻蒼舒等使金賀正旦壬辰金遣蒲察通等來賀會慶節十一月癸丑合祀天地于圜丘大赦庚午遣張子正等賀金主生辰十二月己丑黎州蠻寇邊官軍失利蠻亦遁去甲午詔職事官補外者復除職如故事追封吳玠為涪王丁酉定鑄錢司歲鑄額為十五萬緡戊戌金遣劉珫等來賀明年正旦是歲京西湖北諸州興元府金洋州旱紹興府台婺州水並振之四年春正月戊申詔自今內外諸軍歲一閱試庚申詔沿江諸軍歲再習水戰丙寅雨雹丁卯班淳熙曆二月乙亥幸太學祗謁先聖退御敦化堂命國子祭酒林光朝講中庸下詔遂幸武學謁武成王廟監學官進秩一等諸生推恩賜帛有差己卯詔諸軍毋以未補官人任軍職戊子立邊人逃入溪洞及告捕法癸巳立武臣授環衞官法戊戌以新知荊南府胡元質為四川安撫制置使兼知成都府三月乙巳以史浩為少保觀文殿大學士醴泉觀使兼侍讀進封永國公己酉龔茂良等上仁宗玉牒徽宗實錄皇帝玉牒庚戌幸玉津園宴射壬子貸隨郢二州饑民米詔李龍襲封安南國王甲寅修韶州城丙寅幸聚景園夏四月甲戌以魏王愷為荊南集慶軍節度使行江陵尹判明州如故乙亥參知政事龔茂良以曾覿從騎不避道杖之戊寅上奏乞罷政不許甲午給歸正官子孫田屋五月庚子朔幸佑聖觀罷四川和糴六月丁丑龔茂良罷己卯以王淮參知政事辛巳班幸學詔癸未升蜀州為崇慶府甲申詔自今宰執朝殿得旨事須覆奏乃行秋七月辛丑禁江上諸軍盜易戰馬振襄陽饑民壬寅立待補太學試法戊申班御史臺彈奏格乙酉罷臨川伯王雱從祀癸丑龔茂良責授寧遠軍節度副使英州安置甲寅申嚴四川入蕃茶禁甲子班淳熙重修敕令格式八月辛巳禁耕牛過淮九月丁酉朔日有食之己亥命修築海潮所壞塘岸辛丑免宰執以下會慶節進奉庚戌命禮官定開寶政和祀禮戊午閱蹴踘于選德殿冬十月丙子以久陰命中外決繫囚遣錢良臣等使金賀正旦丁丑詔監司守臣歲舉武臣堪知縣者各二人己卯詔將士智勇傑出者躐等升差丁亥金遣完顏忠等來賀會慶節十一月丁酉詔兩淮歸正人為強勇軍庚子以趙雄同知樞密院事壬戌太白晝見癸亥遣趙思等賀金主生辰十二月丁卯試四川所上義士二人官而遣之己巳詔行薦舉事實格法乙亥大閱辛巳蠲太平州民貸常平錢米壬辰金遣完顏炳等來賀明年正旦是歲福州建寧府南劍州水並振之
