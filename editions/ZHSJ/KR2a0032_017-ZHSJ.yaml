body:
  text: 宋史卷十七本紀第十七哲宗一哲宗憲元繼道顯德定功欽文睿武齊聖昭孝皇帝諱煦神宗第六子也母曰欽聖皇后朱氏熙寧九年十二月七日己丑生于宮中赤光照室初名傭授檢校太尉天平軍節度使封均國公元豐五年遷開府儀同三司彰武軍節度使進封延安郡王七年三月神宗宴羣臣于集英殿王侍立天表粹溫進止中度宰相而下再拜賀八年二月神宗寢疾宰相王珪乞早建儲為宗廟杜稷計又奏請皇太后權同聽政神宗首肯三月甲午朔皇太后垂簾于福寧殿諭珪等曰皇子性莊重從學穎悟自皇帝服藥手寫佛書為帝祈福因出以示珪等所書字極端謹珪等稱賀遂奉制立為皇太子初太子宮中常有赤光至是光益熾如火戊戌神宗崩太子即皇帝位己亥大赦天下常赦所不原者羣臣進秩賜賚諸軍遣使告哀于遼白虹貫日庚子尊皇太后曰太皇太后皇后曰皇太后德妃朱氏曰皇太妃命宰臣王珪為山陵使甲寅以羣臣固請始同太皇太后聽政己未賜叔雍王顥曹王頵贊拜不名令中外避太皇太后父遵甫名詔邊事稍重者樞密院與三省同議以進庚申尚書左僕射郇國公王珪進封岐國公顥進封揚王頵為荊王並加太保弟寧國公佶為遂寧郡王儀國公佖為大寧郡王成國公俁為咸寧郡王和國公似為普寧郡王高密郡王宗晟漢東郡王宗瑗華原郡王宗愈安康郡王宗隱建安郡王宗綽並為開府儀同三司太師潞國公文彥博為司徒濟陽郡王曹佾為太保特進王安石為司空餘進秩賜致仕服帶銀帛有差辛酉詔顏子孟子配享孔子廟庭夏四月丙寅初御紫宸殿辛未蠲元豐六年以前逋賦甲戌加李乾德同中書門下平章事董檢校太尉詔曰先皇帝臨御十有九年建立政事以澤天下而有司奏行失當幾於煩擾或苟且文具不能布宣實惠其申諭中外協心奉令以稱先帝惠安元元之意乙亥詔以太皇太后生日為坤成節丁丑召呂公著侍讀諭樞密中書通議事都堂詔遵先帝制遣官察舉諸路監司之法庚辰呂惠卿遣兵入西界破六砦斬首六百餘級辛巳遣使以先帝遺留物遺遼國及告即位甲申水部員外郎王諤非職言事坐罰金丙戌以蕃官高福戰死錄其子孫丁亥復蠲舊年逋賦五月丙申詔百官言朝政闕失資政殿學士司馬光過闕入見丁酉羣臣請以十二月八日為興龍節壬寅城熙蘭通遠軍賜李憲趙濟銀帛有差甲辰作受命寶丙午京師地震復置遼州庚戌王珪薨改命蔡確為山陵使丙辰賜禮部奏名進士諸科及第出身四百六十一人戊午以蔡確為尚書左僕射兼門下侍郎韓縝為尚書右僕射兼中書侍郎章惇知樞密院司馬光為門下侍郎六月庚午賜楚州孝子徐積絹米丁亥詔中外臣庶許直言朝政闕失民間疾苦秋七月戊戌以資政殿大學士呂公著為尚書左丞詔府界三路保甲罷團教丙午遼人來吊祭丙辰白虹貫日吏部侍郎熊本奏歸化儂智會異同坐罰金罷沅州增修堡砦八月乙丑詔按察官所至有才能顯著者以名聞己巳鎮江軍節度使韓絳進開府儀同三司癸酉遣使賀遼主生辰正旦乙亥以供奉王英戰死葭蘆錄其子九月戊戌以神宗英文烈武聖孝皇帝之謚告于天地宗廟社稷己亥上寶冊于福寧殿己酉遣使報謝于遼冬十月甲子夏國遣使進助山陵馬癸酉詔倣唐六典置諫官丁丑令侍從各舉諫官二人詔監察御史兼言事殿中侍御史兼察事罷義倉己卯詔均寬民力有司或致廢格者監司御史糾劾之河決大名乙酉葬神宗皇帝于永裕陵丙戌罷方田以夏國主母卒遣使吊祭十一月癸巳詔按問強盜欲舉自首者毋減丁酉祧翼祖祔神宗于太廟廟樂曰大明之舞辛丑減兩京河陽囚罪一等杖已下釋之民緣山陵役者蠲其賦己酉遼遣使賀即位十二月壬戌于闐進獅子詔卻之開經筵請魯論讀三朝寶訓罷太學保任同罪法丙寅夏人以其母遺留物馬白駝來獻辛未左僕射蔡確右僕射韓縝並遷秩加食邑揚王顥荊王頵並為太傅壬申章惇司馬光等進秩有差甲戌罷後苑西作院乙亥詔執政侍臣講讀戊寅罷增置鑄錢監十有四乙酉遼遣蕭睦等來賀正旦是歲日有五色雲者六高麗大食入貢元祐元年春正月庚寅朔改元丙午錄在京囚減死罪以下一等杖罪者釋之丁未詔回賜高麗王鞍馬服帶器幣有加罷陝西河東元豐四年後凡緣軍興添置官局丙辰久旱幸相國寺祈雨立神宗原廟戊午甘露降二月辛酉以河決大名壞民田民食者衆詔安撫使韓絳振之乙丑修神宗實錄丁卯詔左右侍從各舉堪任監司者二人舉非其人有罰庚午禁邊民與夏人為市辛未董卒以其子阿里骨襲河西軍節度使邈川首領庚辰夏人入貢辛巳刑部侍郎蹇周輔坐變鹽法落職閏月庚寅蔡確罷以司馬光為尚書左僕射門下侍郎詔韓維呂大防孫永范純仁詳定役法壬辰以呂公著為門下侍郎丙午守尚書右丞李清臣為尚書左丞試吏部尚書呂大防為尚書右丞白虹貫日丁未羣臣上太皇太后宮名曰崇慶殿曰崇慶壽康皇太后宮曰隆祐殿曰隆祐慈徽庚戌賜于闐國王服帶器幣辛亥章惇罷甲寅詔侍從御史國子司業各舉經明行修可為學官者二人乙卯以吏部尚書范純仁同知樞密院事丙辰掩京城暴骸罷諸州常平管勾官三月辛未詔毋以堂差衝在選已注官置訴理所許熙寧以來得罪者自言命太學公試司業博士主之如春秋補試法癸酉置開封府界提點刑獄一員乙亥罷熙河蘭會路經制財用司己卯復廣濟河輦運辛巳詔民間疾苦當議寬恤者監司具聞以程頤為崇政殿說書己酉許職事官帶職夏四月己丑韓縝罷辛卯詔諸路旱傷蠲其租壬辰以旱慮囚癸巳王安石薨辛丑詔執政大臣各舉可充館閣者三人壬寅以呂公著為尚書右僕射兼中書侍郎文彥博平章軍國重事乙巳詔戶部裁冗費著為令李憲等以用兵失利為劉摯所劾貶秩奉祠辛亥揚王顥荊王頵並特授太尉詔遇科舉令升朝官各舉經明行修之士一人俟登第日與升甲罷謁禁之制知誠州周士隆撫納溪洞民一千三百餘戶賜士隆銀帛癸丑定六曹郎官員數五月丁巳朔以資政殿大學士韓維為門下侍郎罷諸路重祿復熙寧前舊制庚申夏人來賀即位壬戌詔侍從臺官監司各舉縣令一人戊辰命程頤同修立國子監條制己巳幸揚王荊王第官其子九人癸酉復左右天坊壬午詔文彥博班宰相之上六月甲辰置春秋博士呂惠卿落職分司南京蘇州居住戊申以富弼配享神宗廟庭庚戌太白晝見甲寅詔正風俗修紀綱勿理隱疵細故復置通利軍程頤上疏論輔養君德秋七月丁巳置檢法官辛酉設十科舉士法劉恕同修資治通鑑未沾恩而卒詔官其子乙丑夏國主秉常卒庚午夏國遣使賀坤成節八月辛卯詔常平依舊法罷青苗錢壬辰封弟偲為祁國公甲午占城國遣使入貢壬子日傍有五色雲磁州穀異壟同穗九月丙辰朔司馬光薨己未朝獻景靈宮辛酉大享明堂以神宗配赦天下丁卯試中書舍人蘇軾為翰林學士知制誥己卯張璪罷冬十月丙戌改衍聖公為奉聖公庚寅太白晝見壬辰夏人來告哀庚子遣使吊祭十一月戊午以尚書左丞呂大防為中書侍郎御史中丞劉摯為尚書右丞乙亥于闐國遣使入貢庚辰蠲鹽井官溪錢十二月庚寅詔將來服除依元豐三年故事羣臣勿上尊號戊戌華州鄭縣小敷谷山崩戊申詔以冬溫無雪決繫囚是歲河北楚海諸州水二年春正月乙丑封秉常子乾順為夏國主戊辰詔舉人程試主司毋得於老莊列子書命題辛巳詔蘇轍劉攽編次神宗御製白虹貫日二月丁亥遣左司諫朱光庭使河北振民被災者詔施黔戎瀘等州保甲監司免歲閱丁酉加賜于闐國金帶錦袍器幣己亥命吏部選人改官歲以百人為額辛丑詔陝西河東行策應牽制法是月代州地震三月壬戌太皇太后手詔止就崇政殿受冊戊辰詔中外侍從歲舉郡守各一人令御史臺察民俗奢僭者夏人遣使入謝癸酉奉安神宗神御于景靈宮宣光殿庚辰詔內侍省供奉官以下百人為額夏四月丙戌交阯入貢丁亥鬼章子結咓齪寇洮東戊子慮囚己丑詔太師文彥博十日一議事都堂辛卯詔冬夏旱暵海內被災者廣避殿減膳責躬思過以圖消復丁酉以四方牒訴上尚書者或冤抑不得直令御史分察之己亥太皇太后以旱權罷受冊禮癸卯雨乙丑以徐州布衣陳師道為亳州司戶參軍丁未復制科戊申御殿復膳李清臣罷五月癸丑夏人圍南川砦丁卯以劉摯為尚書左丞兵部尚書王存為尚書右丞壬申于闐入貢丁丑詔御史官闕御史中丞翰林學士兩省諫議大夫以上雜舉六月辛丑以安燾知樞密院事壬寅有星如瓜出文昌丙午邈川首領結藥來降授三班奉職秋七月辛亥詔戶部修會計錄韓絳以司空致仕夏人寇鎮戎軍詔府界三路教閱保甲復課利場務虧額科罰丙辰罷諸州數外歲貢戊午以遼蕭德崇等賀坤成節曲宴垂拱殿始用樂庚申進封李乾德為南平王辛酉改誠州為渠陽軍辛未韓維罷八月辛巳程頤罷經筵權同管勾西京國子監癸未以西蕃寇洮河民被害者給錢粟死者賜帛其家詔復進納人改官舊法乙酉命呂大防為西京安奉神宗御容禮儀使庚寅西南蕃遣人入貢癸巳以夏國政亂主幼強臣乙逋等擅權逆命詔諸路帥臣嚴兵備之庚子授西蕃首領心牟欽銀州團練使溫溪心瓜州團練使辛丑涇原言夏人寇三川諸砦官軍敗之丁未岷州行營將种誼復洮州執蕃酋鬼章青宜結九月乙卯發太皇太后冊寶于大慶殿丙辰發皇太后皇太妃冊寶于文德殿己未夏人寇鎮戎軍丁卯禁私造金箔冬十月壬午奉安神宗御容于會聖宮及應天院癸未日有五色雲戊子恭謝景靈宮辛卯減西京囚罪一等杖已下釋之己亥西南龍張蕃遣人入貢庚子論復洮州功种誼等遷秩賜銀絹有差十一月丙辰復置漣水軍庚申獻鬼章于崇政殿以罪當死聽招其子及部屬歸以自贖乙亥大雪甚民凍多死詔加振恤死無親屬者官瘞之罷內殿承制試換文資格丙子決囚十二月乙酉賜諸軍及貧民錢丙戌興龍節初上壽于紫宸殿己丑大寒罷集英殿宴壬辰兀征聲延部族老幼萬人渡河南遣使廩食之仍諭聲延勿失河北地乙未白虹貫日壬寅頒元祐敕令式是冬始閉汴口三年春正月己酉朔不受朝庚戌復廣惠倉己未朝獻景靈宮庚申雪寒發京西穀五十餘萬石損其直以紓民辛酉詔廣南西路朱崖軍開示恩信許生黎悔過自新壬戌罷上元遊幸壬申阿里骨奉表詣闕謝罪令邊將無出兵仍罷招納甲戌決囚二月甲申罷修金明池橋殿乙酉德音減囚罪一等徒以下釋之工役權放一年流民饑貧量與應副丙戌詔河東苦寒量度存恤戍兵癸巳罷春宴乙未白虹貫日辛丑太白晝見乙巳廣東兵馬監童政坐擅殺無辜伏誅三月丙辰韓絳薨丁巳御集英殿策進士戊午策武舉己巳賜禮部奏名進士諸科及第出身一千一百二十二人乙亥夏人寇德靖砦將官張誠等敗之夏四月戊寅令諸路郡邑具役法利害以聞辛巳以呂公著為司空同平章軍國事呂大防為尚書左僕射兼門下侍郎范純仁為尚書右僕射兼中書侍郎壬午以觀文殿學士孫固為門下侍郎劉摯為中書侍郎王存為尚書左丞御史中丞胡宗愈為尚書右丞戶部侍郎趙瞻簽書樞密院事癸巳詔定職事官歲舉升陟人數丁酉阿里骨來貢庚子詔天下郡城以地里置壯城兵額禁勿他役五月癸亥漢東郡王宗瑗薨六月癸未詔司諫正言殿中監察御史倣故事以升朝官通判資序歷一年者為之辛丑夏人寇塞門砦甲辰五色雲見秋七月戊申荊王頵薨戊辰夜東北方明如晝俄成赤氣中有白氣經天辛未太白晝見癸酉忠州言臨江塗井鎮雨黑黍八月戊寅阿里骨入貢己卯進封揚王顥為徐王辛巳復置荊門軍丙戌罷吏試斷刑法丁酉渠陽蠻入寇辛丑降繫囚罪一等杖以下釋之九月庚申禁宗室聯姻內臣家乙丑阿里骨復遷職加封邑詔觀察使以上給永業田丁卯御集英殿策賢良方正能直言極諫科十月丙戌詔罷新創諸堡砦廢渠陽軍戊戌復南北宣徽院十一月甲辰遣吏部侍郎范百祿等行河丁卯大食麻囉拔國入貢詔歲以十月給巡城兵衣裘十二月丁酉渝州獠人寇小溪壬寅白虹貫日閏月癸卯朔頒元祐式甲辰范鎮定鑄律度量鍾磬等以進令禮部太常參定戊申減宰執賜予庚申置六曹尚書權官丙寅詔吏部詳定六曹重複利害以聞是歲三佛齊于闐西南蕃入貢天下上戶部主戶二百一十三萬四千七百三十三丁二千八百五十三萬三千九百三十四客戶六百一十五萬四千六百五十二丁三百六十二萬九千八十三斷大辟二千九百一十五人四年春正月壬申朔不受朝羣臣及遼使詣東上閤門內東門拜表賀丙子宴遼使于紫宸殿甲申以夏人通好詔邊將毋生事二月甲辰呂公著薨庚戌白虹貫日乙卯夏人來謝封冊三月己卯作渾天儀胡宗愈罷丁亥以不雨罷春宴己丑詔自今大禮毋上尊號辛卯晝有流星出東方癸巳錄囚乙未罷幸瓊林苑金明池夏四月乙巳呂大防等以久旱求罷不允丁未曹佾薨戊申罷大禮使及奏告執政加賜戊午立試進士四場法壬戌弛在京牧地與民五月癸酉詔自今侍讀以三人為額中丞李常侍御史盛陶坐不論蔡確改官辛巳貶觀文殿學士蔡確為光祿卿丁亥復貶確為英州別駕安置新州丁酉于闐國來貢六月甲辰范純仁王存罷丙午以趙瞻同知樞密院事戶部尚書韓忠彥為尚書左丞翰林學士許將為尚書右丞丁未夏國來貢癸丑邈黎國般次冷移四林栗迷等齎于闐國黑汗王及其國蕃王表章來貢秋七月丙子詔復外都水使者丁丑遼國使蕭寅等來賀坤成節曲宴垂拱殿庚辰安燾以母憂去位八月壬寅敕郡守貳以四善三最課縣令吏部歲上監司考察知州狀辛酉太皇太后詔今後明堂大禮毋令百官拜表稱賀九月戊寅致齋垂拱殿己卯朝獻景靈宮辛巳大饗明堂赦天下百官加恩賜賚士庶高年九十以上者乙酉加賜韓縝范純仁器幣有差乙未檢舉先朝文武七條戒諭百官遵守冬十月辛丑西南程蕃入貢丁未龍蕃入貢戊申翰林學士蘇轍上神宗御集藏寶文閣癸丑御邇英殿講官進講三朝寶訓十一月庚午敕朝請大夫以下進士為左餘為右溪洞彭儒武等進溪洞布癸未以孫固知樞密院事劉摯為門下侍郎吏部尚書傅堯俞為中書侍郎乙酉有星色赤黃尾跡燭地己丑太皇太后卻元日賀禮令百官拜表庚寅章惇買田不法降官辛卯改發運轉運提刑預妓樂宴會徒二年法十二月庚子遼使耶律常等賀興龍節曲宴垂拱殿癸丑更定朝儀二舞曰威加四海化成天下甲寅減鄜延等路戍兵歸營戊午以御史闕令中丞兩省各舉二人是歲夏國邈黎大食麻囉拔國入貢五年春正月丁卯朔御大慶殿視朝丁丑朝獻景靈宮二月丁酉罷諸州軍通判奏舉改官己亥夏人歸永樂所掠吏士百四十九人庚子加溪洞人田忠進等九十二人檢校官有差辛丑以旱罷修黃河癸卯禱雨嶽瀆罷浚京城壕丁未減天下囚罪杖以下釋之庚戌文彥博以太師充護國軍山南西道節度等使致仕令所司備禮冊命壬子彥博乞免冊禮從之甲子宴餞文彥博于玉津園三月丙寅朔趙瞻薨丁卯詔賜故孫覺家緡錢令給喪事壬申以韓忠彥同知樞密院事翰林學士承旨蘇頌為尚書左丞癸未罷春宴壬辰罷幸金明池瓊林苑夏四月癸卯詔鄭穆王巖叟等同舉監察御史二員甲辰呂大防等以旱求退不允丙午孫固薨癸丑詔講讀官御經筵退留二員奏對邇英閣丁巳詔以旱避殿減膳罷五月朔日文德殿視朝辛酉以保寧軍節度使馮京為檢校司空五月壬申詔差役法有未備者令王巖叟等具利害以聞乙亥雨已卯御殿復膳六月辛丑錄囚癸亥晝有五色雲七月壬申涇原路經略司言諸人違制典買蕃部田土許以免罪自二頃五十畝以下責其出刺弓箭手及買馬備邊用各有差乙酉夏人來議分畫疆界九月丁丑詔復置集賢院學士冬十月癸巳罷提舉修河司丁酉詔定州韓琦祠載祀典十二月辛卯朔許將罷安康郡王宗隱薨丙辰禁軍大閱賜以銀楪匹帛罷轉資是歲東北旱浙西水災賜宗室子授官者四十四人斷大辟四千二百六十有一高麗于闐龍蕃三佛齊阿里骨入貢六年春正月辛酉朔不受朝羣臣及遼使詣東上閤門內東門拜表賀癸酉詔祠祭游幸毋用羔二月辛卯以劉摯為尚書右僕射兼中書侍郎龍圖閣待制王巖叟簽書樞密院事癸巳以蘇轍為尚書右丞宗室士俔追封魏國公庚子拂箖國來貢丁丑授阿里骨男溪邦彪籛為化外庭州團練使三月癸亥呂大防上神宗實錄己巳御集英殿策進士庚午策武舉癸酉詔御史中丞舉殿中侍御史二人翰林學士至諫議大夫同舉監察御史二人丙子呂大防特授右正議大夫壬午賜禮部奏名進士諸科及第出身九百五十七人丁亥罷幸金明池瓊林苑夏四月乙未復置通禮科丙申詔恤刑辛丑詔大臣堂除差遣非行能卓異者不可輕授仍搜訪遺材以備擢任夏人寇熙河蘭岷鄜延路壬寅太白晝見壬子賜南平王李乾德袍帶金帛鞍馬五月己未朔日有食之罷文德殿視朝庚辰詔娶宗室女得官者毋過朝請大夫皇城使丁亥後省上元祐敕令格六月壬辰錄囚甲辰置國史院修撰官乙卯詔以田思利為銀青光祿大夫充溪洞都巡檢秋七月癸亥復張方平宣徽南院使致仕乙丑復制置解鹽使己卯振兩浙水災八月己丑三省進納后六禮儀制辛卯詔御史臺臣僚親亡十年不葬許依條彈奏及令吏部檢察己亥改宗正屬籍曰宗藩慶系錄令文武臣出入京城門書職位差遣姓名及所往己酉修神宗寶訓癸丑詔鄜延路都監李儀等以違旨夜出兵入界與夏人戰死不贈官餘官降等乙卯夏人寇懷遠砦閏月壬戌嚴飭陝西河東諸路邊備甲子太白晝見庚午詔御史中丞舉殿中侍御史二人翰林學士中書舍人給事中舉監察御史四人壬申太子太保致事張方平辭免宣徽使不允甲申刑部侍郎彭汝礪與執政爭獄事自乞貶逐詔改禮部侍郎九月丁亥夏人寇麟府二州壬辰詔州民為寇所掠廬舍焚蕩者給錢帛踐稼者振之失牛者官貸市之癸巳御集英殿策賢良方正能直言極諫科丁酉御試方正王普等遷官有差歲出內庫緡錢五十萬以備邊費甲辰幸上清儲祥宮壬子宮成減天下囚罪一等徒以下釋之癸丑以執政官行謁禁法非便詔有利害陳述勿禁冬十月丁卯有流星晝出東北庚午朝獻景靈宮還幸國子監賜祭酒豐稷三品服監學官賜帛有差庚辰令諸宮院建小學貴妃苗氏薨癸未編修神宗御製官轉秩加賞詔京西提刑司歲給錢物二十萬緡以奉陵寢十一月乙酉朔劉摯罷壬辰作元祐觀天曆尚書右丞蘇轍罷知絳州辛丑傅堯俞薨十二月戊辰開封府火壬申范純仁以前禦敵失策降官是歲兩浙水定州野蠶成繭高麗交阯三佛齊入貢七年春正月甲辰以遼使耶律迪卒輟朝一日乙巳張誠一以穿父墓取犀帶責授左武衞將軍提舉亳州明道宮二月丁卯詔陝西河東邊要進築守禦城砦三月己亥錄囚夏四月己未立皇后孟氏甲子命呂大防為皇后六禮使甲戌立考察縣令課績法五月戊戌御文德殿冊皇后庚子罷侍從官轉對丙午王巖叟罷知鄭州大食進火浣布六月辛酉以呂大防為右光祿大夫蘇頌為尚書右僕射兼中書侍郎韓忠彥知樞密院事蘇轍為門下侍郎翰林學士范百祿為中書侍郎翰林學士梁燾為尚書左丞御史中丞鄭雍為尚書右丞戶部尚書劉奉世簽書樞密院事甲子置廣文館解額戊辰渾天儀象成甲戌日旁五色雲見七月癸巳詔修神宗史復翰林侍講學士己酉詔諸路安撫鈐轄司及西京南京各賜資治通鑑一部庚戌宗室緦麻以上者禁析居八月丙辰罷監酒稅務增剩給賞法己未詔西邊諸將嚴備毋輕出兵乙亥戒邊將毋掊克軍士前陷交阯將吏蘇佐等十七人自拔來歸九月戊戌詔冬至日南郊宜依故事設皇地祇位禮畢別議方澤之儀以聞己酉永興軍蘭州鎮戎軍地震冬十月庚戌朔環州地震丁巳陝西有前代帝王陵廟處給民五家充守陵戶丁卯夏人寇環州十一月辛巳太白晝見甲申詔太中大夫以上許占永業田丙戌于闐入貢庚寅帝齋大慶殿辛卯朝獻景靈宮壬辰饗太廟癸巳祀天地于圜丘赦天下羣臣中外加恩罷南京榷酒民罹親喪者戶以差等與免徭辛丑賜徐王劍履上殿十二月辛亥阿里骨李乾德加食邑實封甲子罷飲福宴庚午祈雪是歲兗州僊源縣生瑞穀高麗占城西南蕃龍氏羅氏入貢八年春正月己卯朔不受朝甲申蔡確卒丁亥御邇英閣召宰臣讀寶訓庚寅詔復范純仁太中大夫壬辰幸太乙宮庚子詔頒高麗所獻黃帝鍼經于天下二月己酉詔西南蕃龍氏遷秩補官辛亥禮部尚書蘇軾言高麗使乞買歷代史及策府元龜等書宜卻其請不許省臣許之軾又疏陳五害極論其不可有旨書籍曾經買者聽壬子詔刑部不得分禁繫人數瘐死數多者申尚書省癸丑詔大寧郡王下出就外學三月甲申蘇頌罷辛卯范百祿罷庚子詔御試舉人復試賦詩論三題夏四月丁未朔夏人來謝罪願以蘭州易塞門砦不許癸丑詔恤刑甲寅令范祖禹依先朝故事止兼侍講丁巳詔南郊合祭天地罷禮部集官詳議五月癸未置蘄州羅田縣丁亥罷二廣鑄折二錢己丑錄囚辛卯監察御史董敦逸黃慶基以論蘇軾蘇轍罷為湖北福建轉運判官己亥祁國公偲為開府儀同三司六月戊午梁燾罷壬戌中書後省上元祐在京通用條貫秋七月丙子朔以觀文殿大學士范純仁為尚書右僕射兼中書侍郎戊寅令陝西沿邊鐵錢銅錢悉還近地八月丁未久雨禱山川辛酉以太皇太后疾帝不視事壬戌遣使按視京東西河南北淮南水災癸亥減京師囚罪一等徒以下釋之丁卯禱于嶽瀆宮觀祠廟戊辰赦天下庚午詔陝西復鑄小銅錢辛未禱于天地宗廟社稷乙亥禱于諸陵九月戊寅太皇太后崩己卯詔以太皇太后園陵為山陵庚辰遣使告哀于遼甲申命呂大防為山陵使壬辰詔山陵修奉從約諸道毋妄有進助冬十月戊申羣臣七上表請聽政戊辰徐王顥乞解官給喪詔不允庚午復內侍劉瑗等六人十一月丙子始御垂拱殿乙未以雪寒振京城民饑壬寅賜勞修奉山陵兵士十二月乙巳范純仁乞罷不允甲寅倣唐六典修官制丁巳遼人遣使來吊祭出錢粟十萬振流民己巳上太皇太后謚曰宣仁聖烈皇后是歲河入德清軍決內黃口
