body:
  text: 宋史卷七十七志第三十律曆十觀天曆元祐觀天曆演紀上元甲子距元祐七年壬申歲積五百九十四萬四千八百八算上考往古每年減一下驗將來每年加二步氣朔統法一萬二千三十歲周四百三十九萬三千八百八十歲餘六萬三千八十氣策一十五餘二千六百二十八秒一十二朔實三十五萬五千二百五十三朔策二十九餘六千三百八十三望策一十四餘九千二百六秒一十八弦策七餘四千六百三秒九歲閏一十三萬八百四十四中盈分五千二百五十六秒二十四朔虛分五千六百四十七沒限分九千四百二閏限三十四萬四千三百四十九秒一十二旬周七十二萬一千八百紀法六十以上秒母同三十六推天正冬至置距所求積年以歲周乘之為氣積分滿旬周去之不盡以統法約之為大餘不滿為小餘其大餘命甲子算外即所求年天正冬至日辰及餘求次氣置天正冬至大小餘以氣策及餘秒累加之秒盈秒法從小餘一小餘盈統法從大餘一大餘盈紀法去之命甲子算外即各得次氣日辰及餘秒推天正經朔置天正冬至氣積分以朔實去之不盡為閏餘以減天正冬至氣積分餘為天正十一月經朔加時積分滿旬周去之不盡以統法約之為大餘不滿為小餘其大餘命甲子算外即所求年天正十一月經朔日辰及餘求弦望及次朔經日置天正十一月經朔大小餘以弦策累加之去命如前即各得弦望及次朔經日及餘秒求沒日置有沒之氣小餘以三百六十乘之其秒進一位從之用減歲周餘滿歲餘除之為日不滿為餘其日命其氣初日日辰算外即為其氣沒日日辰凡氣小餘在沒限以上者為有沒之氣求滅日置有滅之朔小餘以三十乘之滿朔虛分除之為日不滿為餘其日命其月經朔初日日辰算外即為其月滅日日辰凡經朔小餘不滿朔虛分者為有滅之朔步發斂候策五餘八百七十六秒四卦策六餘一千五十一秒一十二土王策三餘五百二十五秒二十四月閏一萬九百三秒二十四辰法二千五半辰法一千二半刻法一千三百三秒母三十六推七十二候各因中節大小餘命之為初候以候策加之為次候又加之為末候求六十四卦各因中氣大小餘命之為初卦用事日以卦策加之為中卦用事日又加之得終卦用事日以土王策加諸侯內卦得十有二節之初外卦用事日又加之得大夫卦用事日復以卦策加之得卿卦用事日推五行用事各因四立之節大小餘命之即春木夏火秋金冬水首用事日以土王策減四季中氣大小餘命甲子算外為其月土始用事日求中氣去經朔置天正冬至閏餘以月閏累加之滿統法約之為日不盡為餘即各得每月中氣去經朔日及餘秒其閏餘滿閏限者為月內有閏也仍定其朔內無中氣者為閏月求卦候去經朔以卦候策累加減中氣去經朔日及餘中氣前減中氣後加即各得卦候去經朔日及餘秒求發斂加時倍所求小餘以辰法除之為辰數不滿五因之滿刻法為刻不滿為餘其辰數命子正算外即各得所求加時辰刻及分步日躔周天分四百三十九萬四千三十四秒五十七周天度三百六十五餘三千八十四秒五十七歲差一百五十四秒五十七二至限日一百八十二餘七千四百八十冬至後盈初夏至後縮末限日八十八餘一萬九百五十八夏至後縮初冬至後盈末限日九十三餘八千五百五十二求每日盈縮分置入二至後全日各在初限已下為初限已上用減二至限餘為末限列初末限日及分於上倍初末限日及約分於下相減相乘求盈縮分者在盈初縮末以三千二百九十四除之在盈末縮初以三千六百五十九除之皆為度不滿退除為分秒求朏朒積者各進二位在盈初縮末以三百六十六而一在盈末縮初以四百七而一各得所求以盈縮相減餘為升降分盈初縮末為升縮初盈末為降以朏朒積相減餘為損益率在初為益在末為損求經朔弦望入盈縮限置天正閏日及餘減縮末限日及餘為天正十一月經朔入縮末限日及餘以弦策累加之滿盈縮限日去之即各得弦望及次朔入盈縮限日及餘秒求經朔弦望朏朒定數各置所入盈縮限日小餘以其日下損益率乘之如統法而一所得損益其下朏朒積為定數求定氣冬夏二至以常氣為定氣自後以其氣限日下盈縮分盈加縮減常氣約餘即為所求之氣定日及分秒赤道宿度斗二十六牛八女十二虛十少秒六十四危十七室十六壁九北方七宿九十八度少秒六十四奎十六婁十二胃十四昴十一畢十七觜一參十西方七宿八十一度井三十三鬼三柳十五星七張十八翼十八軫十七南方七宿一百一十一度角十二亢九氐十五房五心五尾十八箕十一東方七宿七十五度前皆赤道宿度與古不同自大衍曆依渾儀測為定用紘帶天中儀極攸憑以格黃道推天正冬至加時赤道日度以歲差乘所求積年滿周天分去之不盡用減周天分餘以統法除之為度不滿為餘命起赤道虛宿四度外去之至不滿宿即為所求年天正冬至加時赤道日度及餘秒求夏至赤道日度置天正冬至加時赤道日度以二至限及餘加之滿赤道宿次去之即得夏至加時赤道日度及餘秒因求後昏後夜半赤道日度者以二至小餘減統法餘以加二至赤道日度之餘即二至初日昏後夜半赤道日度以每日累加一度去命如前各得所求求二十八宿赤道積度置二至加時日躔赤道全度以二至加時赤道日度及約分減之餘為距後度以赤道宿次累加之即得二十八宿赤道積度及分秒求二十八宿赤道積度入初末限各置赤道積度及分秒滿象限九十一度三十一分秒九即去之若在四十五度六十五分秒五十四半已下為初限已上用減象限餘為末限求二十八宿黃道度各置赤道宿入初末限度及分三之為限分用減四百餘以限分乘之一萬二千而一為度命曰黃赤道差至後以減分後以加赤道宿積度為黃道積度以前宿黃道積度減之餘為二十八宿黃道度及分其分就近約為太半少若二至之宿不足減者即加二至限然後減之餘依術算黃道宿度斗二十三半牛七半女十一半虛十少秒六十四危十七太室十七少壁九太北方七宿九十七度半秒六十四奎十七太婁十二太胃十四半昴十一太畢十六觜一參九少西方七宿八十二度井三十鬼二太柳十四少星七張十八太翼十九半軫十八太南方七宿一百一十一度角十三亢九半氐十五半房五心四太尾十七箕十東方七宿七十四度太前黃道宿度乃依今曆歲差變定若上考往古下驗將來當據歲差每移一度依曆推變然後可步七曜知其所在求天正冬至加時黃道日度置天正冬至加時赤道日度及約分三之為限分用減四百餘以限分乘之一萬二千而一為度命曰黃赤道差用減天正冬至加時赤道日度及分即為所求年天正冬至加時黃道日度及分夏至日度準此求之求二至初日晨前夜半黃道日度置一萬分以其日升降分升加降減之以乘二至小餘如統法而一所得以減二至加時黃道日度餘為二至初日晨前夜半黃道日度及分求每日晨前夜半黃道日度置二至初日晨前夜半黃道日度及分每日加一度百約其日下升降分升加降減之滿黃道宿次去之即各得二至後每日晨前夜半黃道日度及分求太陽過宮日時刻置黃道過宮宿度以其日晨前夜半黃道宿度及分減之餘以統法乘之如其太陽行分而一為加時小餘如發斂求之即得太陽過宮日時刻及分黃道過宮太史局吳澤等補治有此一段開封進士吳時舉國學進士程憙常州百姓張文進本並無之危宿十五度少入衞之分亥奎宿三度半入魯之分戌胃宿五度半入趙之分酉畢宿十度半入晉之分申井宿十二度入秦之分未柳宿七度半入周之分午張宿十七度少入楚之分巳軫宿十二度入鄭之分辰氐宿三度少入宋之分卯尾宿八度入燕之分寅斗宿九度入吳之分丑女宿六度少入齊之分子步月離轉周分三十三萬一千四百八十二秒三百八十九轉周日二十七餘六千六百七十二秒三百八十九朔差日一餘一萬一千七百四十秒九千六百一十一弦策七餘四千六百三秒二千五百望策一十四餘九千二百六秒五千以上秒母同一萬七日初數一萬六百九十初約八十九末數一千三百四十末約一十一十四日初數九千三百五十一初約七十八末數二千六百七十九末約二十二二十一日初數八千一十一初約六十七末數四千一十九末約三十三二十八日初數六千六百七十二初約五十五上弦九十一度三十一分秒四十一望一百八十二度六十二分秒八十二下弦二百七十三度九十四分秒二十三平行一十三度三十六分秒八十七半以上秒母同一百求天正十一月經朔加時入轉置天正十一月經朔加時積分以轉周分秒去之不盡以統法約之為日不滿為餘命日算外即得所求年天正十一月經朔加時入轉日及餘秒若以朔差日及餘秒加之滿轉周日及餘秒去之即次朔加時入轉日及餘秒各以其月經朔小餘減之餘為其月經朔夜半入轉求弦望入轉因天正十一月經朔加時入轉日及餘秒以弦策累加之去命如前即得弦望入轉日及餘秒轉日轉定分增減差遲疾度損益率朏朒積一日一千二百六增一百三十一遲空度益一千一百八十七朒空二日一千二百一十五增一百二十二遲一度益一千八十九朒一千一百八十七三十一三日一千二百三十二增一百四遲二度益九百四十五朒二千二百七十六五十三四日一千二百五十一增八十六遲三度益七百六十五朒三千二百二十一五十七五日一千二百七十五增六十二遲四度益五百六十朒三千九百八十六四十三六日一千三百一增三十六遲五度益三百二十二朒四千五百四十六五七日一千三百二十七初增一十遲五度初益九十九朒四千八百六十九末減四十一末損九八日一千三百五十四減一十七遲五度損一百五十四朒四千九百五十九五十一九日一千三百七十八減四十一遲五度損三百六十九朒四千八百五三十四十日一千四百三減六十一遲四度損五百九十四朒四千四百三十六九十三十一日一千四百二十七減九十遲四度損八百一十朒三千八百四十二二十七十二日一千四百四十六減一百九遲三度損九百七十九朒三千三十二三十七十三日一千四百五十七減一百二十二遲二度損一千九十九朒二千五十三二十八十四日一千四百七十三初減一百六遲一度初損九百五十四朒九百五十四末增三十六末益二百七十十五日一千四百六十六增一百二十九疾空度益一千一百六十一朏二百七十三十十六日一千四百五十四增一百一十七疾一度益一千五十二朏一千四百三十一五十九十七日一千四百三十七增一百疾二度益九百朏二千四百八十三七十六十八日一千四百一十六增七十九疾三度益七百一十一朏三千三百八十三七十六十九日一千三百九十四增五十七疾四度益五百一十二朏四千九十四五十五二十日一千三百六十八增三十一疾五度益二百七十九朏四千六百六一十二二十一日一千三百四十一初增九疾五度初益八十二朏四千八百八十五末減五四十三末損四十五二十二日一千三百一十五減二十二疾五度損一百九十八朏四千九百二十二四十七二十三日一千二百九十減四十七疾五度損四百二十三朏四千七百二十四二十五二十四日一千二百六十五減七十三疾四度損六百五十七朏四千三百一七十八二十五日一千二百四十三減九十四疾四度損八百四十六朏三千六百四十四五