body:
  text: 宋史卷三十九本紀第三十九寧宗三嘉定元年春正月戊寅右諫議大夫葉時等請梟韓侂冑首于兩淮以謝天下不報辛巳下詔求言壬午王柟還自河南持金人牒求韓侂冑首丙戌葉時等復請梟侂冑首于兩淮戊子安定郡王伯栩薨壬辰以史彌遠知樞密院事以許奕為金國通謝使二月戊申追復趙汝愚觀文殿大學士謚忠定詔史官改紹熙以來韓侂冑事迹壬子詔臨安府振給流民戊午責授程松果州團練副使賓州安置是月郴州黑風峒寇羅世傳作亂招降之三月癸酉以毛自知首論用兵奪進士第一人恩例戊子下詔戒飭內外羣臣復秦檜王爵贈謚己丑王柟自軍前再還行在議以韓侂冑函首易淮陝侵地辛卯詔梟侂冑首于兩淮是春子生夏四月丙辰詔後省科別羣臣奏疏可行者以聞贈彭龜年寶謨閣直學士落李沐寶文閣學士戊午再責授陳自強復州團練副使雷州安置仍籍其家閏月辛未置拘榷安邊錢物所壬申雨雹癸未子薨追封肅王謚冲靖詔大理三衙臨安府及諸路闕雨州縣决繫囚釋杖以下甲申詔自今視事令皇太子侍立乙酉以錢象祖兼太子少傅衞涇雷孝友林大中並兼太子賓客辛卯以旱禱于天地宗廟社稷癸巳減常膳乙未蠲兩浙闕雨州縣貧民逋賦命大理三衙臨安府兩浙州縣决繫囚丙申幸太乙宮明慶寺禱雨丁酉以旱詔求言五月辛酉賜禮部進士鄭自成以下四百二十有六人及第出身甲子太白經天乙丑以飛蝗為災減常膳丁卯詔侍從臺諫疏奏闕政監司守令條上民間利害六月庚午金人歸大散關辛未金人歸濠州乙亥衞涇罷丙子遣鄒應龍賀金主生辰甲申林大中薨乙酉以蝗禱于天地社稷丙戌詔侍從兩省臺諫舉沿邊守臣辛卯以史彌遠兼參知政事秋七月辛丑詔呂祖泰特補上州文學癸丑以丘䥩同知樞密院事壬戌以飛蝗為災詔三省疏奏寬恤未盡之事八月戊辰朔發米振貧民辛未丘䥩卒甲戌命侍從臺諫兩省詳議會子折閱利害辛巳以禮部尚書婁機同知樞密院事吏部尚書樓鑰簽書樞密院事丙戌詔禮部侍郎許奕起居舍人曾從龍攷訂監司守令所陳民間利害擇可行者以聞其未上者趣之甲午發米二十萬振糶江淮流民九月辛丑金使完顏侃喬宇入見壬子出安邊所錢一百萬緡命江淮制置大使司糴米振饑民己未詔以和議成諭天下甲子遣曾從龍使金賀正旦乙丑大風赦沿邊諸州冬十月丙子以錢象祖為左丞相史彌遠為右丞相雷孝友知樞密院事仍兼參知政事婁機參知政事樓鑰同知樞密院事己卯褒錄慶元上書楊宏中等六人庚辰封伯柷為安定郡王辛巳蔡璉除名配贛州牢城癸未金遣使來賀瑞慶節十一月丙辰金主璟殂戊午史彌遠以母憂去位十二月戊辰錢象祖罷庚午四川初行當五大錢升嘉興府為嘉興軍再奪李沐三官信州居住戊寅改命曾從龍使金弔祭己卯黎州蠻畜卜寇邊己丑遣宇文紹彭使金賀即位辛卯蠲兩淮州軍二稅一年是歲江淮制置司汰雄淮軍歸農淮東揀刺八千餘人以補鎮江大軍及武鋒軍之闕淮西揀刺二萬六千餘人以為御前定武軍二年春正月庚子詔內外有司疏陳節用之事辛丑金遣裴滿正來告哀丁巳以樓鑰參知政事御史中丞章良能同知樞密院事吏部尚書宇文紹節簽書樞密院事庚申金遣蒲察知剛來獻遺留物詔侍從兩省臺諫各舉監司郡守治行尤異者二三人二月己巳金遣使來告即位庚午黎州蠻寇邊壬午以會子折閱日甚詔侍從兩省以下各疏奏所見丁亥罷法科試經義復六場舊法戊子大風三月丙申雨雹己酉詔民以減會子之直籍沒家財者有司立還之戊午禁兩淮官吏私買民田庚申命浙西及沿江諸州給流民病者藥辛酉罷漳泉福三州興化軍賣廢寺田壬戌出內庫錢十萬緡為臨安貧民棺槥費夏四月乙丑詔諸路監司督州縣捕蝗戊辰江淮制置司言放廬濠二州忠義軍歸農甲申賜臨安諸軍死者棺錢戊子賜楊震仲謚曰節毅五月丙申史彌遠起復丁酉以旱詔諸路監司决繫囚劾守令之貪殘者戊戌借補訓武郎羅日愿謀為變伏誅庚子詔侍從兩省臺諫各舉監司郡守有政績才望者二人以補郎官之闕辛丑申命州縣捕蝗癸卯詔兩淮荊襄守令以戶口多寡為殿最乙卯釋大理三衙臨安府兩浙州縣杖以下囚除茶鹽賞錢己未以旱詔羣臣上封事庚申禱于天地宗廟社稷六月癸亥朔命浙西諸州諭民種麻豆毋督其租詔臺省及諸路監司速決滯獄戊辰奉安成肅皇后神御于景靈宮己巳遣俞應符賀金主生辰乙酉復禱雨于天地宗廟社稷己丑命江西福建二廣豐稔諸州糴運以給臨安仍償其費辛卯京湖制置司言放諸州新軍及忠義人歸農秋七月癸巳命有司舉行寬恤之政五條乙未詔荒歉州縣七歲以下男女聽異姓收養著為令己亥蠲信陽荊門漢陽軍民賦壬寅命兩淮轉運司給諸州民麥種癸卯募民以振饑免役八月甲子聽兩淮諸州民行鐵錢于沿江八州乙丑以安丙為四川制置大使罷宣撫司甲戌冊皇太子丁丑皇太子謁于太廟戊寅詔皇太子更名詢己卯黎州蠻復寇邊丙戌發米十萬石振兩淮飢民九月己亥朝獻于景靈宮庚子朝饗于太廟辛丑合祭天地于明堂大赦丙午增太學內舍生十員癸丑命吏部郎官劉爚等審定中外所陳會子利害上于朝己未遣費培使金賀正旦冬十月丁卯命京湖制置司募逃卒及放散忠義以補廂禁軍闕丁丑金遣使來賀瑞慶節己丑命兩淮轉運司給諸州民稻種減公私房廊白地錢什之三十一月辛卯朔沔州統制張林等謀作亂事覺貸死除名廣南羈管甲午詔浙西監司募飢民修水利乙未以歲饑罷雪宴是月郴州黑風峒寇李元礪作亂衆數萬連破吉郴諸縣詔遣荊鄂江池四州軍討之十二月甲子四川制置大使司調官軍討黎州蠻敗績己巳賜朱熹謚曰文乙亥詔諸州毋糴職田租丙戌金遣使來賀明年正旦是歲諸路旱蝗揚楚衡郴吉五州南安軍盜起三年春正月甲辰下詔招諭羣盜又詔戒飭監司郡守丙午雨土二月辛酉黎州蠻復寇邊庚午詔楚州武鋒軍歲給累重錢如大軍例壬午以工部侍郎王居安知隆興府督捕峒寇三月丁酉蠲都城及荒歉諸州民間逋負己亥以湖南轉運判官曹彥約知潭州督捕峒寇庚子賜彭龜年謚曰忠肅甲寅誅楚州渠賊胡海丙辰以久雨釋兩浙州縣繫囚夏四月癸亥李元礪犯南雄州官軍大敗乙丑決臨安繫囚釋杖以下丙寅詔監司守臣安集泰吉二州民經賊蹂踐者戊辰出內庫錢二十三萬緡賜臨安軍民己巳詔臨安府給細民病死者棺櫬五月乙未淮東賊悉平詔寬恤殘破州縣甲辰以去歲旱蝗百官應詔封事命兩省擇可行者以聞乙巳命沿海諸州督捕海寇戊申經理兩淮屯田庚戌以江陵忠勇軍為御前忠勇軍癸丑以久雨發米振貧民六月丁巳朔日有食之壬戌命有司舉行寬恤之政十有九條癸亥遣黃中賀金主生辰己卯加楊次山少保封永陽郡王詔三衙江上四川諸軍主帥核實軍籍欺冒者以贓論是月池州副都統許俊江州副都統劉元鼎與李元礪戰于江西皆不利知潭州曹彥約又與賊戰亦為所敗賊勢愈熾秋七月辛卯申嚴圍田增廣之禁癸卯定南班為三十員八月乙亥大風拔木是月臨安府蝗九月丙戌朔詔三衙江上諸軍升差將校必以材藝年勞其徇私者臺諫及制置總領劾之癸丑遣錢仲彪使金賀正旦冬十月壬申雷金遣使來賀瑞慶節丁丑推南雄州戰歿將士恩十一月癸巳賞楚州平賊功乙巳遣朝臣二人往兩浙路與提舉官議收浮鹽是月李元礪迫贛州南安軍詔以重賞募人討之十二月丙辰詔江淮諸司嚴飭守令安集流民戊午婁機罷丙寅湖南賊羅世傳縛李元礪以降峒寇悉平辛巳金遣使來賀明年正旦黎州蠻請降是歲臨安紹興二府嚴衢二州大水振之仍蠲其賦四年春正月己丑州蠻攻嘉定府利店砦陷之甲辰以四川鹽擔錢對減激賞絹一年丙午詔湖南江西諸州經賊蹂踐者監司守臣攷縣令安集之實第其能否以聞二月乙卯李元礪伏誅壬戌羅世傳補官尋復叛辛巳罷廣西諸州牛稅閏月丁未大風辛亥詔諸路帥臣監司守令格朝廷振恤之令及盜發不即捕者重罪之三月己未臨安府振給病民死者賜棺錢丙子沔州將劉世雄等謀據仙人原作亂伏誅夏四月甲申禁兩浙福建州縣科折鹽酒己丑以吳曦沒官田租代輸關外四州旱傷秋稅丙午賜黑風峒名曰效忠戊申出內庫錢瘞疫死者貧民是月四川制置大使司置安邊司以經制蠻事命成都路提刑李潼川路安撫許奕共領之五月乙亥賜禮部進士趙建大以下四百六十有五人及第出身六月丁亥遣余嶸賀金主生辰會金國有難不至而還減京畿囚罪一等釋杖以下辛丑更定四川諸軍軍額秋七月壬戌太白晝見丙寅詔四川官吏嘗受偽命者自今毋得用丁丑詔軍興以來爵賞冒濫者聽自陳除其罪九月辛酉州蠻寇邊乙亥羅世傳為其黨所殺丁丑遣程卓使金賀正旦詔附會開邊得罪之人自今毋得用冬十月甲辰以金國有難命江淮京湖四川制置司謹邊備十一月己酉朔日有食之癸丑賞平峒寇功甲戌申嚴諸軍升差之制十二月辛巳奉議郎張鎡坐扇搖國本除名象州羈管癸未以會子折閱不行遣官體訪江浙諸州乙巳金遣使來賀明年正旦是歲金國有難賀生辰使不至五年春正月己巳詔諸路通行兩浙倍役法著為令壬申賜李好義謚曰忠壯二月壬午罷兩淮軍興以來借補官三月庚戌四川制置司遣兵分道討州蠻其酋米在請降戊辰以久雨詔大理三衙臨安府兩浙州縣決繫囚甲戌以廣東湖南京西盜平監司帥臣進職有差夏五月癸酉安南國王李龍卒以其子昊旵為安南國王詔州縣見役人毋納免役錢役滿復輸六月癸未遣傅諴賀金主生辰乙酉禁銅錢過江秋七月庚申賞降州蠻功戊辰以雷雨毀太廟屋避正殿減膳八月甲戌朔御後殿復膳九月丙午太白晝見己酉有司上續編中興禮書庚戌遵義砦夷楊煥來獻馬辛未罷沿海諸州海船錢遣應武使金賀正旦冬十月辛巳詔諸路總領官歲舉堪將帥者二三人安撫提刑舉可備將材者各二人戊子金遣使來賀瑞慶節戊戌雷遣使弔祭安南十一月庚申朝獻于景靈宮辛酉朝饗于太廟壬戌祀天地于圜丘大赦十二月丁丑再蠲濠州租稅一年壬午詔蠲州縣橫增稅額己亥金遣使來賀明年正旦六年春正月庚申宇文紹節卒詔侍從臺諫兩省官帥守監司各舉實才二三人二月丁丑太白晝見丙戌有司上嘉定編修吏部條法總類乙未詔宗室毋與胥吏通姻著為令三月癸亥樓鑰罷夏四月丙子以章良能參知政事甲午復法科試經義法雜流進納人不預五月丁卯以旱命大理三衙臨安府決繫囚戊辰修慶元六年以來寬恤詔令六月乙亥詔刑部歲終上諸州未決之獄于尚書省擇其最久者罪之丁丑遣董居誼賀金主生辰會金國亂不至而還丁亥復監司臧否守令及監司郡守舉廉吏所知法丙申詔三衙江上諸軍主帥各舉堪將帥者二三人八月己巳朔詔諸路監司帥臣舉所部官吏之才行卓絕績用章著者庚午知思州田宗範謀作亂夔州路安撫司遣兵討平之是月金人弒其主允濟九月甲辰蠲京湖諸州逋負二十八萬餘緡閏月戊辰朔詔御史臺置考課監司簿丙戌以金主新立命四川謹邊備己丑詔湖北監司守令振恤旱傷癸巳雷甲午史彌遠等上三祖下七世仙源類譜高宗寶訓皇帝玉牒會要乙未大雷丙申以雷發非時下罪己詔冬十月丁酉朔申嚴互送之禁戊申遣真德秀賀金主即位會金國亂不至而還庚戌遣李使金賀正旦亦不至而還甲子金遣使來告即位十一月癸未虛恨蠻寇嘉定府之中鎮砦十二月壬寅蠲瓊州丁鹽錢癸亥金遣使來賀明年正旦是歲兩浙諸州大水振之七年春正月丁卯朔四川制置司遣提舉皂郊博馬務何九齡率諸將及金人戰于秦州城下敗還丁丑章良能薨壬午沔州都統王大才斬何九齡梟首境上以其事聞三月丁卯以安丙同知樞密院事成都府路安撫使董居誼為四川制置使庚辰金國來督二年歲幣戊子金人來止賀正旦使夏四月癸卯蠲福建沿海諸州貧民納鹽五月丁丑太白經天乙酉賜禮部進士袁甫以下五百四人及第出身六月辛丑以旱命諸路州軍禱雨甲辰詔諸路監司守臣速決滯訟丙午蠲兩浙路諸州贓賞錢壬子釋大理三衙及兩浙路杖以下囚丁巳置嘉定府邊丁二千人以備蠻秋七月甲子朔以左諫議大夫鄭昭先簽書樞密院事兼權參知政事戊辰詔省吏毋授參議官乙亥金人來告遷于南京庚寅以起居舍人真德秀奏罷金國歲幣是月夏人以書來四川議夾攻金人不報八月癸巳朔罷關外四州所增方田稅乙未罷四川宣制司所補官癸卯復建宗學置博士諭各一人弟子員百人金國復來督歲幣乙巳太白經天禁州縣沮壞義役戊申詔以安丙為觀文殿學士知潭州九月壬戌朔日有食之太白晝見乙丑史彌遠等上高宗中興經武要略戊寅調殿前司兵增戍天長縣丙戌以久雨釋大理三衙臨安府杖以下囚庚寅釋兩浙路杖以下囚除茶鹽賞錢冬十月壬辰朔出內帑錢振臨安府貧民十一月辛酉朔遣聶子述使金賀正旦刑部侍郎劉爚等及太學諸生上章言其不可不報丙戌命浙東監司發常平米振災傷州縣罷四川制置大使司所開鹽井十二月甲午復罷同安監鑄錢丁巳金遣使來賀明年正旦是歲黎州蠻畜卜始降八年春正月辛未命師禹嗣秀王詔侍從兩省臺諫各舉將材三人己卯遣丁焴賀金主生辰戊子申嚴銷金鋪翠之禁二月丙午雷孝友罷壬子蠲平江等五郡逋負米釋其繫囚己未雨土三月辛酉詔大郡歲舉廉吏二人小郡一人乙亥以旱命諸路州縣禱雨丙子蠲臨安府茶鹽賞錢釋兩浙諸州繫囚辛巳應賢良方正能直言極諫科何致坐妄造事端營惑衆聽配廣州牢城癸未安定郡王伯柷薨丙戌釋江淮闕雨州郡杖以下囚夏四月乙未幸太一宮明慶寺禱雨辛丑避正殿減膳壬寅禱雨于天地宗廟社稷癸卯詔中外臣民直言時政得失乙巳減臨安及諸路雜犯死罪以下囚釋杖以下五月辛未雨己卯命利州路安撫司招刺忠義人辛巳御正殿復膳癸未復命有司禱雨甲申詔贓吏毋得減年參選著為令乙酉發米振糶臨安府貧民六月丙辰詔兩浙江淮路諭民雜種粟麥麻豆有司毋收其賦田主毋責其租秋七月辛酉以鄭昭先參知政事禮部尚書曾從龍簽書樞密院事壬戌詔四川立楊巨源廟名曰褒忠戊辰蠲兩淮諸州今年秋稅倂極邊五州明年夏稅癸酉蠲臨安紹興二府貧民夏稅丙子發米三十萬石振糶江東飢民庚辰詔弟搢更名思正姪均更名貴和甲申詔職田蠲放如民田違者坐之八月己丑賜張栻謚曰宣庚子申嚴宗子訓名法丁未權罷旱傷州縣比較賞罰己酉禁州縣遏糴是月蘭州盜程彥暉求內附四川制置使董居誼卻之九月己巳朝獻于景靈宮庚午朝饗于太廟辛未合祭天地于明堂大赦乙亥申嚴兩浙圍田之禁甲申罷四川法科試冬十月乙未命六部各類赦書寬恤事下諸路監司推行壬寅金遣使來賀瑞慶節十一月丙辰朔封伯澤為安定郡王癸亥遣施累使金賀正旦十二月己丑詔楊巨源李好義子孫各進一官辛亥金遣使來賀明年正旦是歲兩浙江東西路旱蝗九年春正月乙丑賜呂祖謙謚曰成置馬軍司水軍乙亥遣留筠賀金主生辰丙子命諸州招填軍籍辛巳罷諸路旱蝗州縣和糴及四川關外科糴二月甲申朔日有食之辛亥東西兩川地大震三月乙卯又震甲子又震馬湖夷界山崩八十里江水不通丁卯又震壬申又震丁丑詔侍從臺諫兩省舉堪監司者各二人夏四月戊戌秦州人唐進與其徒何進等引衆十萬來歸四川制置使董居誼拒卻之五月癸酉太白晝見六月辛卯西川地震壬辰又震乙未又震黎州山崩戊申振恤浙西被水州縣寬其租稅秋七月戊辰詔邊縣擇才不拘常法其餘並遵三年之制九月甲申詔兩浙江東監司覈州縣被水最甚者蠲其租冬十月癸亥西川地震甲子又震丙寅金遣使來賀瑞慶節十一月庚寅遣陳伯震使金賀正旦癸卯以程彥暉攻圍鞏州迫及川界命利州副都統劉昌祖移駐西和州以備之十二月丁巳再給諸軍雪寒錢乙亥金遣使來賀明年正旦
