body:
  text: 宋史卷一百六十八志第一百二十一職官八合班之制建隆以後合班之制中書令侍中同中書門下平章事已上為宰相親王樞密使留守節度京尹兼中書令侍中同中書門下平章事已上並為使相尚書令太師太尉太傅太保司徒司空舊儀太師太傅太保為三師太尉司徒司空為三公太尉在太保下國朝以來自太傅除太尉今依此次序其三師三公之稱如舊儀制樞密使知樞密院事參知政事舊在樞密使下樞密副使舊在知院之上同知樞密院事宣徽南院北院使簽書樞密院事參政以下班位臨時取奏裁太子太師太傅太保左右僕射太子少師少傅少保諸府牧開封河南應天大名江陵興元真定江寧京兆鳳翔河中又有大都督大都護今皆領使無特為者御史大夫觀文殿大學士舊無此位六尚書吏兵戶刑禮工左右金吾衞左右衞上將軍門下中書侍郎舊在尚書下節度使泰寧武寧彰信鎮海天平安化武成忠武鎮海河陽山南東道武勝崇信昭化保康天雄成德鎮寧彰德永清安國威德靜難彰化雄武保大淮南忠正保信保靜集慶建康寧國鎮南昭信荊南寧海武昌安遠武安鎮東平江鎮江宣德保寧康國威武建寧益州安靜武信山南西道昭武安德武定寧海寧江武康清海靜江寧遠建武高州定南密州靜海涼州西河沙州歸義洮州保順應州彰國威城昌化豐州天德朔州振武雲州大同觀文殿學士舊曰文明殿若學士官尚書者自從本班資政殿大學士三司使與觀文資政班位臨時取裁玉清昭應宮景靈宮會靈觀副使與三司使翰林學士班位臨時取裁翰林學士承旨翰林學士資政殿學士翰林侍讀侍講學士龍圖閣學士天章閣學士樞密直學士龍圖直學士天章直學士左右散騎常侍舊在諸衞上將軍下六統軍左右龍武左右羽林左右神武諸衞上將軍左右驍衞左右武衞左右屯衞左右領軍衞左右千牛衞太子賓客太常宗正卿御史中丞權中丞立中丞塼位內殿起居日止立本官班左右丞諸行侍郎節度觀察留後給事中左右諫議大夫中書舍人知制誥龍圖閣待制天章閣待制觀察使秘書監光祿衞尉太僕大理鴻臚司農太府卿內客省使國子祭酒殿中少府將作監景福殿使延福宮使客省使開封河南應天大名尹太子詹事諸王傅司天監諸衞大將軍太子左右庶子引進使防禦使齊濟沂登萊鄭汝蔡潁均郢懷衞博磁洺棣深瀛雄霸莫代絳解龍和蘄舒復眉象陸果團練使單濮濰唐祁冀隰忻成鳳海鼎三司鹽鉄度支戶部副使官至諫議大夫已上從本官玉清昭應宮景靈宮會靈觀判官太常寺宗正少卿秘書少監光祿等寺七寺少卿宣慶使四方館使國子司業殿中少府將作少監開封河南應天大名少尹太子少詹事左右諭德太子家令太子率更令太子僕諸州刺史淄趙德濱保并汾澤遼憲嵐石虢坊丹階乾商寧原慶渭儀環楚泰泗濠光滁通黃真舒江池饒信太平吉袁撫筠岳澧峽歸辰衡永全郴邵常秀溫台衢睦處南劍汀漳綿漢彭邛蜀嘉簡黎雅維茂資榮昌普渠合戎瀘興劍文集壁巴蓬龍施萬開達涪渝昭循潮連梅英賀封南雄端新康恩春惠韶梧藤龔象潯貴賓橫融化竇高雷南儀欽鬱林廉瓊崖儋萬安諸王府長史司馬司天少監樞密都承旨如客省使以下充者依本職同班如閤門使充即在閤門使之上如自見任內客省使以下轉南班官充亦與同班仍在舊職之上如自客省副使以下轉南班官充者並在閤門使之上宣政使昭宣使東上西上閤門使樞密承旨樞密副都承旨諸軍衞將軍起居郎起居舍人知雜御史侍御史諸行郎中左右司吏部兵部司封司勳考功職方駕部庫部度支戶部金部倉部刑部都官比部司門禮部工部祠部主客膳部屯田虞部水部皇城以下諸司使皇城洛苑右騏驥尚食左騏驥御廚內藏庫軍器左藏儀鸞南作坊弓箭庫北作坊衣庫莊宅六宅文思東作坊內苑牛羊如京東綾錦香藥崇儀榷易西京左右藏氈毯西綾錦西京作坊鞍轡庫東染院酒坊西染院法酒庫禮賓翰林醫官供備庫樞密院副承旨諸房副承旨如帶南班官者在諸司使之下不帶南班官者在皇城副使之上殿中侍御史左右司諫諸行員外郎客省引進閤門副使左右正言監察御史太常博士皇城以下諸司副使諸次府少尹大都督府左右司馬兗徐潞陝揚杭越福通事舍人國子博士春秋禮記毛詩尚書周易博士都水使者開封祥符河南洛陽宋城縣令太常宗正秘書丞著作郎殿中丞內殿承制殿中省尚食尚藥尚衣尚舍尚乘尚輦奉御大理正太子中允左右贊善大夫內殿崇班閤門祗候太子中舍洗馬太子諸率府率左右衞左右監門左右清道左右司禦樞密院兵房吏房戶房禮房副承旨東頭西頭供奉官太子諸率府副率諸衞中郎將左右金吾左右衞左右千牛左右羽林郎將左右金吾左右衞左右侍禁諸王友諸王府諮議參軍官高者從本官司天春官夏官中官秋官冬官正節度行軍司馬副使秘書郎左右班殿直著作佐郎大埋寺丞諸寺監丞大理評事太學廣文博士太常太祝奉禮郎秘書省校書郎正字御史臺諸寺監主簿國子助教廣文太學四門書學算學博士律學助教書算學無助教司天靈臺郎保章正挈壺正三班奉職借職防禦團練副使留守京府節度觀察判官節度掌書記觀察支使防禦團練判官留守京府節度觀察推官軍事判官防禦團練軍事推官軍監判官諸軍別駕長史司馬司錄錄事參軍司理參軍三京府軍巡判官在諸曹參軍之下諸州諸司參軍軍巡判官諸縣令赤縣丞諸縣主簿尉諸軍文學參軍助教元豐以後合班之制諸太師舊制太尉為三公在太傅上政和改為三少太傅太保侍中中書令政和二年改左輔右弼靖康後復尚書令少師少傅少保舊太尉司徒司空政和二年改尚書左右僕射政和二年改太宰少宰靖康復舊元豐令王在左右僕射下開府儀同三司知樞密院事門下中書侍郎尚書左右丞同知樞密院事簽書樞密院事元豐罷元祐復置政和入雜壓太子太師太傅太保特進觀文殿大學士太尉舊為三公政和二年改為三少復以太尉為武選一品位節度使上太子少師少傅少保冀兗青徐揚荊豫梁雍州牧元祐復置政和入雜壓御史大夫觀文殿學士資政元豐令在節度使下保和政和五年置宣和殿大學士學士宣和元年改為保和學士待制同殿大學士吏部戶部禮部兵部刑部工部尚書金紫銀青光祿大夫左右金吾衞上將軍節度使翰林學士承旨翰林學士資政保和端明政和四年改為延康殿學士龍圖天章寶文元豐二年增置直學士待制同顯謨元豐元年增置徽猷崇寧二年增置閣學士左右散騎常侍御史中丞舊在直學士下元豐八年升開封尹崇寧三年升尚書列曹侍郎樞密直學士政和四年改為述古殿直學士龍圖天章寶文顯謨徽猷閣直學士宣奉元祐左光祿大夫正奉元祐右光祿大夫並大觀二年改置正議通奉大夫殿中監舊在秘書監下崇寧二年升大司成崇寧二年增置左右驍衞武衞屯衞領軍衞監門衞千牛衞上將軍太子賓客詹事給事中中書舍人通議大夫承宣使舊節度觀察留後政和七年始改左右諫議大夫保和殿待制龍圖天章寶文顯謨徽猷閣待制太中大夫太常卿大司樂崇寧二年增置宗正卿秘書監殿中少監崇寧二年升觀察使中大夫光祿衞尉太僕大理鴻臚司農太府卿中奉元祐左中散大夫大觀二年改中散通侍大夫舊內客省使政和二年改橫行正使副使大使臣小使臣並改樞密都承旨國子祭酒太常少卿典樂崇寧二年增置宗正少卿秘書少監正侍舊延福宮使政和二年改宣正履正協忠三階係政和六年增置中侍中亮大夫舊客省使太子左右庶子中衞舊引進使翊衞親衞大夫政和六年增置防禦團練使諸州刺史左右金吾以下諸衞大將軍駙馬都尉集英殿修撰政和八年置七寺少卿朝議奉直大夫元祐右朝議大夫大觀二年改置尚書左右司郎中右文殿修撰舊集賢殿修撰不入雜壓政和六年改增入國子辟雍司業崇寧元年增置少府將作軍器監都水使者入內內侍省都都知政和改知入內內侍省事內侍省都都知政和改知內侍省事拱衞大夫舊四方館使太子少詹事左右諭德入內內侍省副都知內侍省副都知政和並改同知省事左武右武大夫舊東西上閤門使入內內侍省押班內侍省押班政和並改簽書省事管幹殿中省尚舍尚藥尚醞尚輦尚衣尚食局崇寧二年增置樞密副都承旨起居郎起居舍人侍御史尚書左右司員外郎祕閣修撰政和六年增置開封少尹崇寧三年升尚書吏部司封司勳考功戶部度支金部倉部禮部祠部主客膳部兵部職方庫部駕部刑部都官比部司門工部屯田虞部水部郎中開封府司錄事舊錄參軍事在兩赤縣令之上崇寧三年升改直龍圖閣元豐元祐令並不入雜壓政和增入餘同朝請朝散朝奉大夫直天章閣政和六年增入殿中侍御史左右司諫左右正言舊在監察御史上政和升符寶郎大觀元年增置殿中省尚食尚藥尚醞尚輦尚衣尚舍典御崇寧三年增置內符寶郎大觀元年增置樞密副承旨元豐令有知上州在此下元祐以後並去武功舊皇城使自此以下並政和六年改武德舊宮苑左右騏驥內藏庫使和安成和成安成全舊翰林尚食軍器儀鸞使武顯舊左藏東西作坊使武節舊莊宅六宅文思使平和舊綾錦使初改保和政和五年以犯殿名改保痊宣和六年又改為平和武略舊內園洛苑如京崇儀使保安舊榷易使武經舊西京左藏庫使武義大夫舊西京作坊東西染院禮賓使翰林良醫舊翰林醫官使武翼大夫舊供備庫使尚書諸司員外郎直寶文閣政和六年增置開封府司六曹事崇寧三年增置樞密院諸房副承旨朝請朝散朝奉郎直顯謨閣政和六年增入少府將作軍器少監諸衞將軍太子侍讀侍講正侍宣正履正協忠自宣正至協忠並政和六年增置中侍中亮中衞翊衞親衞拱衞左武右武郎舊橫行副使政和六年改監察御史元豐令有知中州在此下殿中丞舊祕書丞下崇寧二年升直徽猷閣政和六年置承議郎武功至武義郎翰林醫正武翼郎諸司副使太子中舍太子舍人親王府翊善贊讀直講舊侍讀侍講政和改太常丞大晟樂令崇寧二年增置太醫令宗正大宗正祕書丞直祕閣政和六年置元豐令知下州在此下奉議郎大理正著作郎太史局令直翰林醫官局殿中省六尚奉御舊在大理正之上政和改太醫丞元祐增置閤門宣贊舍人舊閤門通事舍人政和六年改兩赤縣令太子左右衞司禦清道監門內率府率七寺丞祕書郎太常博士陵臺令元祐中增置著作佐郎殿中省主簿崇寧二年增置國子監丞辟雍丞崇寧二年增置宗子崇寧元年增置國子博士大理司直評事敦武舊內殿承制政和六年改下同通直郎修武郎內殿崇班內常侍元豐令上州通判在此下太史局正少府將作軍器都水監丞開封府參軍事崇寧三年增置太醫局正祕書省校書郎正字親王府記室元豐元祐令有參軍字政和三年除去太史局五官正御史臺檢法官主簿元豐令在監丞上元祐令在監丞下九寺大晟府崇寧三年增置主簿閤門祗候樞密院逐房副承旨元豐令中下州通判在此下供奉官舊內東頭供奉官政和六年改下同從義郎東頭供奉官左侍禁內西頭供奉官秉義郎西頭供奉官太子諸率府副率幹當左右廂公事崇寧中增入右侍禁左班殿直殿頭高品忠訓忠翊左右侍禁宣教郎舊宣德郎政和四年改太學辟雍崇寧元年增置武學律學開封府大觀元年置博士太常寺奉禮郎大晟府協律郎崇寧二年增置太常寺太祝郊社