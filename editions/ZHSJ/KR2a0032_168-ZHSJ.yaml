景德元年初置待制赴內朝其五日起居止叙本班大中祥符二年升侍知制誥仍在其下權三司使立知制誥上帶學士職者從本班三司副使立少卿監上官高者從本班並為內品職宮觀副使立學士班在翰林學士上其學士為者止本班判官立三司副使之下知制誥以上為者從本班給諫權御史中丞者令正衙立中丞塼位餘就本班凡起復皆如初授在本官之末亦有特旨令叙舊班者內客省使視七寺大卿景福殿使客省使視將作監引進使視庶子宣慶使四方館使視少卿宣政昭宣閤門使視少監客省等副使視員外郎皇城使以下諸司使視郎中副使視太常博士內殿承制視殿中丞崇班及閤門祗候視贊善大夫供奉官視諸衞率侍禁視副率殿直視著作佐郎奉職借職在諸州幕官上樞密都承旨在閤門使下副承旨諸房副承旨在諸司使下逐房副承旨在洗馬下金吾衞左右衞上將軍並在節度使上六統軍諸衞上將軍在常侍下乾德二年令上將軍在中書侍郎之下淳化四年升金吾左右衞在尚書之下仍於節度使之上叙大將軍在大監下將軍在少監下仍在閤門使之下金吾立本班上謂中郎將諸衞率副率在洗馬下凡內職視朝官者在其下視京官者在其上皇親之制開寶六年詔晉王位望俱崇親賢莫二宜位在宰相之上太平興國八年楚王廣平郡王出閤令宰相立親王之上天禧四年七月先天節羣臣上壽宰相闕命涇王元儼攝太尉景德中皇姪武信軍節度惟吉加同平章事時駙馬都尉石保吉先為使相史館引唐制宗室在同品官上遂升惟吉焉大中祥符元年正月有司上都亭驛酺宴位圖皇從姪孫內殿崇班守節與從姪右衞將軍惟叙等同一班上曰族子諸父安可同列乃命重行設位九年正月興州團練使德文言男侍禁承顯赴起居請在惟忠子從恪之上時從恪雖姪行而拜職在前遂詔宗正寺定宗室班圖以聞宗正言按公式令朝參行立職事同者先爵爵又同者先齒今請宗子官同而兄叔次弟姪者並虛一位而立天禧四年五月左正言知制誥張師德言奉詔知潁州緣皇弟德雍見任本州防禦使其署銜望降規式中書門下言據御史臺稱每大朝會立班皇親防禦團練刺史次節度使下稍退序立詔師德序署位德雍之下其外官制置發運轉運使副使不限官品著位並在提點刑獄之上舊止從官大中祥符七年詔定其制朝官知令錄在判官之上京官在判官之下推官之上長史司馬別駕在幕府官下錄事參軍上見長史庭參監當朝官殿直以下在通判都監之下判官之上其通判與都監並依官次京官奉職借職監當者依知令錄列在判官之下元豐制行參以寄祿官品高下更革既多別為班序其後元祐崇寧大觀政和復有增益更革者別附於其下云至道二年祠部員外郎主判都省郎官事王炳上言曰尚書省國家藏載籍典治教之府所以周知天下地理廣袤風土所宜民俗利害之事當成周之世治定制禮首建六官漢唐因之自唐末亂雜急於經營不遑治教故金穀之政主於三司曹名雖存而其實亡矣謹按吏部四司天官之職掌文官選舉周知天下吏功過能否考定陞降之類戶部四司司徒之職掌邦五教周知天下戶口之數禮部四司宗伯之職掌國五禮辨儀式制度周知天下祠典祠祀之類兵部四司司馬之職掌武人選舉周知天下兵馬器械之數刑部四司司寇之職掌國法令周知天下獄訟刑名徒隸之數工部四司司空之職掌國百工周知天下封疆城圻山澤草木川瀆津渡橋船陂池之數凡此二十四司所掌事務各封圖書具載名數藏之本曹謂之載籍所以周知天下事由中制外如指諸掌今職司久廢載籍散亡惟吏部四司官曹小具祠部有諸州僧道文帳職方有諸州閏年圖經刑部有詳覆諸州已決大辟案牘及勾禁奏狀此外多無舊式欲望令諸州每年造戶口稅租實行簿帳寫以長卷者別寫一本送尚書省藏於戶部以此推之其餘天下官吏民口廢置祠廟甲兵徒隸百工疆畎封洫之類亦可以籍其名數送尚書省分配諸司俾之緘掌候期歲之後文籍大備然後可以振舉官守興崇治教望選大僚數人博通治體者參取古今禮典及諸令式與三司所受金穀器械簿帳之類仍詳定諸州供送二十四司載籍之式如此則尚書省備藏天下事物名數之籍如祕閣藏圖書太學藏經典三館藏史傳皆其職也太宗覽奏嘉之詔尚書丞郎及五品以上集議吏部尚書宋琪等上奏曰王者六官法天地四時之柄百官之本典教所出望委崇文院檢討六曹所掌圖籍自何年不繫都省詳其廢置之始究其損益之源以期恢復既而其議亦寢大中祥符九年真宗與宰相語及尚書省制言事者屢請復二十四司之制楊礪嘗言行之不難但以郎官諸司使同領一職則漸可改作王旦曰唐設內諸司使悉擬尚書省如京倉部也莊宅屯田也皇城司門也禮賓主客也雖名品可效而事任不同唐朝諸司所領惟京邑內外耳諸道兵賦各歸藩鎮非南宮一郎中員外所能制也朝廷所得三分之一名曰上供其他留州留使之名皆藩臣所有今之三司即尚書省故事盡在但一毫所賦皆歸於縣官而仰給焉故蠲放則澤及下予賜則恩歸上此聖朝不易之制也咸平四年左司諫知制誥楊億上疏曰國家遵舊制並建羣司然徒有其名不舉其職只如尚書會府上法文昌治本是資政典攸出條目皆具可舉而行今之存者但吏部銓擬秩曹詳覆自餘租庸筦榷由別使以總領尺籍伍符非本司所校定職守雖在或事有所分綱領雖存或政非自出丞轄之名空設而無違可糾端揆之任雖重而無務可親周之六官於是廢矣且如寺監素司於掌執臺閣咸著於規程昭然軌儀布在方冊國家慮銓擬之不允故置審官之司憂議讞之或濫故設審刑之署恐命令之或失故建封駁之局臣以為在於紀綱植立不在於琴瑟更張若辨論官材歸於相府即審官之司可廢矣詳評刑辟屬於司寇即審刑之署可去矣出納詔命關於給事中即封駁之局可罷矣至於尚書二十四司各揚其職寺監臺閣悉復其舊按六典之法度振百官之遺墜在我而已夫豈為難如此則朝廷益尊堂陛益嚴品流益清端拱而天下治者由茲道也又以唐虞之時建官惟百夏商官倍秦漢益繁施及有唐六策咸在自三公之極貴九品之至微著於令文皆有員數傳云官不必備惟其人蓋闕之斯可矣若乃員外加置苟非其材故竈下羊頭形於嘲詠斗量車載播厥風謠國體所先尤須慎重竊覩班簿員外郎及三百餘人郎中亦及百數自餘太常國子博士殿中丞舍人洗馬俱不下數百人率為常參皆著引籍不知職業之所守多由恩澤而序遷欲乞按唐制應九品以上官並定員數又念昔者秦之開郡置守漢以天下為十三部命刺史以領之自後因郡為州以太守為刺史降及唐氏亦嘗變更曾未數年又仍舊貫今多命省署之職出為知州又設通判之官以為副貳此權宜之制耳豈可為經久之訓哉臣欲乞諸州並置刺史以戶口多少置其奉祿分下中上緊望雄之等級品秩之制率如舊章與常參官比視階資出入更踐省去通判之目但置從事之員建廉察之府以統臨按輿地之圖而區處昔者興國初詔廢支郡出於一時十國為連周法斯在一道署使唐制可尋至若號令之行風教之出先及於府府以及州州以及縣縣及鄉里自上而下由近及遠譬如身之使臂臂之使指提綱而衆目張振領而羣毛理由是言之支郡之不可廢也明矣臣欲乞復置支郡隸於大府量地里而分割如漕運之統臨名分有倫官業自舉又覩唐制內外官奉錢之外有祿米職田又給防閤庶僕親事帳內執衣白直門夫各以官品差定其數歲收其課以資於家本司又有公廨田食本錢以給公用自唐末離亂國用不充百官奉錢並減其半自餘別給一切權停今羣官於半奉之中已是除陌又於半奉三分之內其二以他物給之鬻於市廛十裁得其一二曾餬口之不及豈代耕之足云昔漢宣帝下詔云吏能勤事而奉祿薄欲其無侵漁百姓難矣遂加吏奉著於策書竊見今之結髮登朝陳力就列其奉也不能致九人之飽不及周之上農其祿也未嘗有百石之入不及漢之小吏若乃左右僕射百僚之師長位莫崇焉月奉所入不及軍中千夫之帥豈稽古之意哉欲乞今後百官奉祿雜給並循舊制既豐其稍入可責以廉隅官且限以常員理當減於舊費乃唐虞之制也凡預品官各設資考課其殿最歸于有司或歷階以升或越次而補國朝多以郊祀覃慶而稍遷官考功之黜陟不行士流之清濁無辨陛下深鑒其弊始務惟新昨有事於明禋但徧加於階爵雖矯前失未振舊規並乞依舊內外官各立考限復令考功修舉其職每歲置使考校以表盡公資秩改遷賞罰懲勸一遵典故以振滯淹又西漢以來用秦武功之爵惟列侯啟封或踰萬戶至關內侯或有食邑不過數百家自是因循以至唐室但食邑者率為虛設言實封者歲入有差迨及聖朝並無所給至於除拜之際猶名數未移空有食采之稱真同畫餅之妄欲乞依元和中所定實封條貫支給削去虛邑但行實食以寵勳臣又國家每屬嚴禋即覃大慶叙封追贈罔限彝章乃至太醫之微司曆之賤率荷蓼蕭之澤亦疏石窌之封恩雖出於殊常職不循於經制又官勳之設名品實繁今朝散銀青猶闕命服護軍柱國全是虛名欲乞自今常參官勳散俱至五品者許封贈官勳俱至三品者許立戟又五等之爵施于賢才雖有啟封之稱曾無胙土之實苴茅建社固不可以遽行翼子詒孫亦足稽於舊典內外官封至伯子男者許蔭子至公侯者許蔭孫封國公者許嫡子嫡孫一人襲封又當今功臣之稱始於德宗扈蹕將士並加奉天定難功臣之號因一時之賞典為萬世之通規近代以來將相大臣有加至十餘字者尤非經據不可遵行所宜削除以明憲度昔者講求典禮晉國以清考覈名實漢朝稱治當文化誕敷之際是舊章咸秩之時跂見太平正在今日矣論者嘉之然以因襲既久難於驟革既而言者繼請復二十四司之制神宗即位始命館閣校唐六典以摹本賜羣臣而置局詳定之於是凡省臺寺監領空名者一切易之以階元豐三年詳定所上寄祿格會明堂禮成即用新制遷近臣秩初新階尚少而轉行者得以易及元祐初朝議大夫六階以上始分左右紹聖中罷之崇寧初自承直至將仕郎凡換選人七階又增宣奉至奉直大夫四階政和末自從政至迪功郎又改選人三階文階始備而武階亦易正使為大夫副使為郎其橫班十二階使副亦然繼又增置宣正履正大夫郎凡十階通為橫班其後復更開封守臣為尹牧而內侍省悉倣機廷之號六尚局之修三衞郎之建及左輔右弼太宰少宰之稱員既濫冗名益紊雜由是官有視秩元豐之制至此大壞及宣和末王黼復請修官制格目而邊事起訖不果成初太平興國八年五月太宗作戒諭百官辭二通以付閤門一戒京朝官受任於外者一戒幕職州縣官朝辭對別日令舍人宣示之各繕寫歸所治奉以為訓焉大中祥符元年真宗以祥符降錫述大中清淨為治之道申誡百官又作誡諭辭二道易舊辭賜出使京朝官及幕職州縣官其後又作文武七條文賜京朝官任轉運使提點刑獄知州府軍監通判知縣者一曰清心謂平心待物不為喜怒愛憎之所遷則庶事自正二曰奉公謂公直潔己則民自畏服三曰修德謂以德化人不必專尚威猛四曰責實勿競虛譽五曰明察謂勤察民情勿使賦役不均刑罰不中六曰勸課謂勸諭下民勤於孝悌之行農桑之務七曰革弊謂求民疾苦而釐革之武條賜牧伯洎諸司使而下任部署鈐轄知州軍縣都監監押駐泊巡檢者一曰修身謂修飭其身使士卒有所法則二曰守職謂不越其職侵撓州縣民政三曰公平謂均撫士卒無有偏黨四曰訓習謂訓教士卒勸習武藝五曰簡閱謂察視士卒識其勤惰勇怯六曰存恤謂安撫士卒甘苦皆同當使齊心無令失所七曰威嚴謂制馭士卒無使越禁仍許所在刊石或書廳壁奉以為法又以禮記儒行篇賜親民釐務文臣其幕職州縣官使臣賜敕戒礪令崇文院刻板模印送閤門辭日分給之淳化元年國子祭酒孔維上言中外文武官稱呼假借踰越班制伏請一切禁斷太宗命翰林學士宋白等議之白等請自今文武臺省官及卿監郎中員外並呼本官太常博士大理評事並不得呼郎中諸司使諸衞將軍未領刺史者及諸司副使不得呼太保供奉官以下不得呼司徒校書郎以下令錄事不得呼員外郎判司簿尉不得呼侍御待詔醫官不得呼奉御其文武職事州縣官如有檢校兼試同正官者稱之太宗時郊祀行慶羣官率多進改真宗初右司諫孫何上言曰伏見國家撫有多方並建衆職外則郡將通守朝士代行關征榷酤使者兼掌下至幕府職掾之微或自朝廷選補而授用人既廣推擇難精貢部上名動踰千計門資入仕亦及百人稍著職勞即升京秩將命而出冗長尤多每躬祀圓丘誕敷霈澤無賢不肖並許叙遷至使評事寺丞纔數載而通閨籍贊善洗馬不十年而登臺郎竊計今之班簿臺省宮寺凡八百員玉石混淆名品猥濫異夫虞書考績周官計治之法也有唐舊制郊禋慶宥但進階勳而已今若十年之內肆赦相仍必恐京僚過於胥徒朝臣多於州縣豈惟連車平斗之刺亦有敗財假器之失況祿廩所賦皆自地征所來須從民力何必空竭公藏附益私人已授者朘削既難未遷者防閑宜峻古人所謂損無用之費罷不急之官正在此也伏願特降詔書自今郊祀羣官一例不得遷陟必若績用有聞才名夙著自可待之不次豈俟歷階而升至於省併吏員上繫與奪時左司諫耿望亦以為然故咸平二年親郊止加階勳命有司考其殿最而黜陟之然三年差遣受代率皆考課引對多獲進改罕有退黜而官籍浸增矣紹興以後合班之制諸太師太傅太保左丞相右丞相少師少傅少保王樞密使開府儀同三司知樞密院事參知政事同知樞密院事樞密副使簽書樞密院事太子太師太傅太保特進觀文殿大學士太尉太子少師少傅少保冀兗青徐揚荊豫梁雍州牧御史大夫觀文殿學士資政保和殿大學士吏部戶部禮部兵部刑部工部尚書金紫銀青光祿大夫光祿大夫左右金吾衞上將軍左右衞上將軍殿前都指揮使節度使翰林學士承旨翰林學士資政保和端明殿學士龍圖天章寶文顯謨徽猷敷文閣學士左右散騎常侍權六曹尚書御史中丞開封尹尚書列曹侍郎樞密直學士龍圖天章寶文顯謨徽猷敷文閣直學士宣奉正奉正議通奉大夫左右驍衞武衞屯衞領軍衞監門衞千牛衞上將軍太子賓客詹事給事中承宣使中書舍人通議大夫殿前副都指揮使左右諫議大夫保和殿待制龍圖天章寶文顯謨徽猷敷文閣待制權六曹侍郎太中大夫觀察使太常卿宗正卿祕書監馬軍都指揮使步軍都指揮使馬步副都指揮使中大夫光祿衞尉太僕大理鴻臚司農太府卿中奉中散大夫內客省使通侍大夫樞密都承旨國子祭酒太常少卿宗正少卿祕書少監正侍宣正履正協忠大夫中侍中亮大夫太子左右庶子中衞翊衞親衞大夫知閤門事殿前都虞候馬軍都虞候步軍都虞候防禦使捧日天武四廂都指揮使龍神衞四廂都指揮使團練使諸州刺史左右金吾以下諸衞大將軍駙馬都尉集英殿修撰七寺少卿朝議奉直大夫中書門下省檢正諸房公事尚書左右司郎中右文殿修撰國子司業少府將作軍器監都水使者入內內侍省內侍省都知宣政使拱衞大夫太子少詹事左右諭德入內內侍省內侍省副都知昭宣使左武大夫同知閤門事右武大夫入內內侍省內侍省押班樞密承旨樞密副都承旨起居郎起居舍人侍御史帶御器械尚書左右司員外郎樞密院檢詳諸房文字祕閣修撰開封少尹太子侍讀侍講尚書吏部司封司勳考功戶部度支金部倉部禮部祠部主客膳部兵部職方駕部庫部刑部都官比部司門工部屯田虞部水部郎中開封府判官推官直龍圖閣朝請朝散朝奉大夫直天章閣殿中侍御史左右司諫左右正言符寶郎內符寶郎樞密副承旨武功武德和安春官成和夏官成安中官成全秋官武顯武節平和冬官武略保安武經武義武翼大夫尚書諸司員外郎直寶文閣開封府司錄參軍事樞密院諸房副承旨朝請朝散朝奉郎直顯謨閣少府將作軍器少監諸衞將軍正侍宣正履正協忠中侍中亮中衞翊衞親衞拱衞左武右武郎監察御史直徽猷敷文閣承議郎中郎將翰林良醫武功武德和安成和成安成全武顯武節平和武略保安武經武義武翼郎太子中舍人太子舍人親王府翊善贊讀直講太常丞判太醫局宗正大宗正祕書丞直祕閣左右郎將奉議郎大理正著作郎閤門舍人宣贊舍人翰林醫官翰林醫效翰林醫痊兩赤縣令太子左右衞司禦清道監門內率府率七寺丞祕書郎太常博士樞密院計議編修官敕令所刪定官陵臺令著作佐郎國子監丞諸王宮大小學教授國子博士大理司直評事訓武通直修武郎內常侍少府將作軍器都水監丞監尚書六部門開封府功曹倉曹戶曹兵曹法曹士曹參軍事左右軍巡使判官主管太醫局祕書省校書郎正字親王府記室太史局五官正御史臺檢法官主簿九寺主簿閤門祗候樞密院逐房副承旨從義秉義郎太子諸率府副率幹辦左右廂公事忠訓忠翊宣教郎太學武學律學博士太常寺奉禮郎太祝郊社令籍田令光祿寺太官令五監主簿宣義成忠保義承事承奉承務郎國子太學正武學諭國子太學錄律學正太醫局丞京府判官京