body:
  text: 宋史卷二十九本紀第二十九高宗六八年春正月戊子朔帝在建康丙申減臨安府夏稅折輸錢戊戌張守罷辛丑偽齊知壽州宋超率兵民來歸蔡州提轄白安時殺金將兀魯執其守劉永壽來降詔以方議和好禁沿海州郡遣人過淮招納丁未大閱張俊軍戊申以兵部侍郎胡世將為四川安撫制置使二月戊午劉錡入見減建康府夏稅折輸錢蠲民戶逋租和市科調庚申日中有黑子以呂頤浩為江東安撫制置大使兼行宮留守壬戌岳飛乞增兵不許癸亥帝發建康丙寅以胡安國春秋傳成書進寶文閣直學士戊寅帝至臨安己卯以戶部尚書章誼為江東安撫制置大使兼行宮留守呂頤浩為醴泉觀使甲申減紹興府和市絹萬匹三月己丑以知南外宗正事仲儡嗣濮王庚寅以禮部尚書劉大中參知政事兵部尚書王庶為樞密副使壬辰復以秦檜為尚書右僕射同中書門下平章事兼樞密使甲午陳與義罷戊戌增夔州路路分都監一員修治關隘練義兵己亥蠲農器及牛稅以李天祚為靜海軍節度使交趾郡王壬寅定以故相韓忠彥配享徽宗廟廷丁未蠲所過州縣民積欠稅賦戊申蠲江西湖南諸州月樁錢各萬緡己酉命考覈川陝宣撫司便宜所授官冒濫尤甚者悉與裁減夏四月庚申初置戶部和糴場于臨安壬戌遣王庶巡視江淮邊防丁丑復置六路發運司癸未詔三衙管軍輪宿禁中五月庚戌詔鎮江府募橫江軍千人竄內侍羅亶于海島庚子禁貧民不舉子其不能育者給錢養之壬寅貶劉子羽為單州團練副使漳州安置丁未金國使烏陵思謀石慶充與王倫等偕來戊申以資政殿學士葉夢得為江東安撫制置大使己酉王庶至淮南檄張宗顏將兵七千屯廬州巨師古三千屯太平州分韓世忠軍屯泗州及天長縣六月壬戌賜衍聖公孔玠衢州田五頃奉先聖祠事癸亥趙鼎上重修哲宗實錄壬申賜禮部進士黃公度以下三百九十五人及第出身王庶自淮南還入見乙亥以中護軍統制張宗顏知廬州命劉錡率兵移屯鎮江府丁丑烏陵思謀石慶充入見秋七月乙酉朔復命王倫及藍公佐奉迎梓宮錄司馬光曾孫伋補承務郎辛亥彗出東方八月戊午詔日者遣使報聘鄰國期還梓宮尚慮邊臣未諭遂弛戎備以疑衆心其各嚴飭屬城明告部曲臨事必戒無忘扞禦甲子蠲江東路月樁錢萬三千緡有奇丁丑彗滅遣監察御史李寀宣諭江西措置盜賊冬十月丁巳劉大中罷甲戌趙鼎罷乙亥日中有黑子丁丑金國使張通古蕭哲與王倫偕來韓世忠乞奏事行在不許戊寅樞密副使王庶乞免簽書和議文字累疏求去不許十一月甲申以翰林學士承旨孫近參知政事丙戌遣大理寺丞薛倞朱斐詣廣南路決滯獄戊戌王倫入見己亥復以倫為國信計議使中書舍人蘇符副之符辭以疾庚子以孫近兼權同知樞密院事辛丑詔金國遣使入境欲朕屈己就和命侍從臺諫詳思條奏從官張燾晏敦復魏矼曾開李彌遜尹焞梁汝嘉樓炤蘇符薛徽言御史方廷實皆言不可甲辰王庶罷辛亥以樞密院編修官胡銓上書直諫斥和議除名昭州編管壬子改差監廣州都鹽倉十二月甲寅以趙鼎為醴泉觀使乙卯以宗正少卿馮檝為國信計議副使己未以吏部尚書李光參知政事戊辰王倫言金使稱詔諭江南其名不正秦檜以未見國書疑為封冊帝曰朕嗣守祖宗基業豈受金人封冊癸酉館職胡珵朱松張擴凌景夏常明范如圭上書極論不可和甲戌以端明殿學士韓肖冑簽書樞密院事乙亥命肖冑等為金國奉表報謝使丙子張通古蕭哲至行在言先歸河南地徐議餘事以監察御史施廷臣為侍御史權吏部尚書張燾侍郎晏敦復以廷臣主和議而升用執奏不行御史中丞勾龍如淵右諫議大夫李誼殿中侍御史鄭剛中凡再至都堂及宰執議取國書丁丑詔金國使來盡割河南陝西故地通好于我許還梓宮及母兄親族餘無需索令尚書省榜諭庚辰帝不御殿以方居諒陰難行吉禮命秦檜攝冢宰受書以進是月虛恨蠻犯嘉州忠鎮砦是歲始定都于杭九年春正月壬午朔帝在臨安丙戌以金國通和大赦河南新復州軍官吏並不易置蠲其民租稅三年徭役五年以王倫同簽書樞密院事充奉護梓宮迎請皇太后交割地界使戊子遣判大宗正事士兵部侍郎張燾詣河南修奉陵寢庚寅賜劉光世號和衆輔國功臣張俊加少傅安民靖難功臣韓世忠為少師張浚復左宣奉大夫辛卯以尹焞為徽猷閣待制提舉萬壽觀兼侍讀焞力辭不拜壬辰加岳飛吳玠並開府儀同三司楊沂中太尉癸巳建皇太后宮甲午金宿州守臣趙榮來歸丙申金主詔諭河南諸州以割地歸我之意改發運經制司為經制司命戶部長貳一人領使仍置副或判官戊戌以王倫為東京留守郭仲荀為副戶部侍郎梁汝嘉兼江淮荊浙閩廣路經制使司農卿霍蠡為判官己亥以吳玠為四川宣撫使二月癸丑以徽猷閣侍制周聿為陝西宣諭使監察御史方廷實宣諭三京淮北丁巳以郭仲荀為太尉東京同留守慕洧寇環州戊午以知金州郭浩為陝西宣撫判官壬戌以李綱為湖南路安撫大使張浚知褔州尋復資政殿大學士為褔建路安撫大使命周聿方廷實蒐訪隱士甲子均定諸州縣月樁錢己巳以郭浩為陝西宣諭使壬申命修徽宗實錄癸酉詔盜賊已經招安而復嘯聚者發兵加誅毋赦是月日中有黑子月餘乃沒江西統制官李貴以其軍歸楊沂中三月丁亥以和州防禦使璩為保大軍節度使封崇國公丙申王倫受地于金得東西南三京壽春宿亳曹單州及陝西京西之地兀朮還祁州己亥分河南為三路廢拱州辛丑以翰林學士樓炤簽書樞密院書甲辰偽齊知開封府鄭億年上表待罪召赴行在丁未正偽齊所改州縣名是春夏人陷府州夏四月庚戌朔呂頤浩薨辛亥命樓炤宣諭陝西諸路壬午金鄜延路經略使關師古上表待罪命知延安府癸丑落趙鼎奉國軍節度使為特進仍知泉州金陝西諸路節制使張中孚上表待罪命為檢校少保寧國軍節度使知永興軍節制陝西諸路軍馬甲子以觀文殿學士孟庾為西京留守資政殿學士路允迪南京留守丙寅金秦鳳經略使張中彥上表待罪命知渭州以孫近兼權同知樞密院事壬申移壽春府治淮北舊城癸酉詔新復諸路監司帥臣按劾官吏之殘民者韓世忠張俊入見五月庚寅奉迎東京欽先孝思殿累朝御容赴臨安辛卯復命江淮守臣二年為任乙未復置淮東提舉茶鹽司癸卯復召募耆長法丙午鄜延副將李世輔部兵三千自鳳翔來歸賜名顯忠六月庚戌皇后邢氏崩于五國城辛亥夏國主乾順卒壬子樓炤以東京見卒四千四百人為忠銳三將庚申盜入邵武軍壬戌以新復州縣官吏懷不自安降詔開諭己巳吳玠薨壬申樓炤承制以李顯忠為護國軍承宣使樞密行府前軍都統制率部兵及夏國招撫使王樞赴行在癸酉澧州軍事推官韓紃坐上書論講和非計送循州編管乙亥以孟庾兼東京留守王倫自東京赴金國議事樓炤承制以楊政為熙河經略使吳璘為秦鳳經略使仍並聽四川宣撫司節制郭浩為鄜延經略使同節制陝西軍馬丙子分宣撫司兵四萬人出屯熙秦六千人隸郭浩留吳玠精兵二萬人屯興元府興洋二州戊寅置錢引務于永興軍是月撫州鈐轄伍俊謀據桃源復叛湖北安撫薛弼召誅之秋七月甲申以文臣為新復諸縣令丙戌東京耆老李茂松寇璋等二百人奉表稱賀皆引見補官遣還復置都水南北丞各一員丁亥金人拘王倫于中山丙申命詳驗劉豫偽官換給告身乙巳給還偽齊所沒民間資產以胡世將兼權主管四川宣撫司八月己酉復淮南諸州學官庚戌賜陝西諸軍冬衣絹十五萬匹命前川陝宣撫司便宜所補官限一年自陳換給告身丙辰金國以撻懶主和割地疑其二心殺之壬戌蠲成都潼川路歲輸對糴等米五十四萬石水運錢七十九萬緡乙丑給新法度牒紫衣師號錢二百萬緡付陝西市軍儲己巳命陝西復行鐵錢庚午遣蘇符等使金賀正旦乙亥遣前知宿州趙榮知壽州王威俱還金國以關師古為行營中護軍前軍統制九月己卯命鄜延秦鳳熙河路招納蕃部熟戶及陷沒夏國軍民丙戌封叔士為齊安郡王庚寅罷經制司令提刑兼領常平事甲午名皇太后殿曰慈寧丙申以威州防禦使溫濟告韓世忠陰事勒停南劍州編管世忠又奏欲殺之詔移萬安軍己亥郭仲荀率東京兵五千至鎮江冬十月辛亥詔侍從官各舉所知二人王倫見金主于御林子被拘于河間遣其副藍公佐先歸甲寅王樞入見併其俘百九十人皆縱遣還夏國己未蠲階成岷鳳四州民稅之半戊辰慈寧宮成甲戌日中有黑子丙子賜李顯忠軍錢十萬緡是月岳飛入見十一月戊寅朔賜吳玠家錢三萬緡以其弟璘為龍神衞四廂都指揮使申命刑部大理官編次刑名斷例癸未嗣濮王仲儡薨己丑詔三省官屬詳覆在京通用令追復張所為直龍圖閣十二月甲寅命續編紹興因革禮甲子李光罷戊辰命續修元豐會要兀朮留蘇符等于東京謀復取河南十年春正月丙戌遣莫將等充迎護梓宮奉迎兩宮使辛卯李綱薨甲辰以顯謨閣直學士提舉醴泉觀鄭億年復資政殿學士奉朝請二月戊申命陝西復募蕃漢弓箭手詔贓吏罪抵死情犯甚者奏取旨辛亥雨雹以劉錡為東京副留守李顯忠南京副留守壬子命兩宗正官各舉所知宗室二人癸丑展省試期一年壬戌詔新復州軍蒐舉隱逸諸路經理屯田丁卯罷史館以日曆歸秘書省置監修國史官以孟庾知開封府為東京留守仇悆知河南府西京留守癸酉罷吏部審量宣和濫賞三月甲申封閼伯為商丘宣明王戊子增印錢引五百萬緡付宣撫司市軍儲川陝宣撫副使胡世將屢言金人必渝盟宜為備己丑罷諸路增置稅場韓世忠張俊入見始罷內教復營建康行宮丙申蘇符自東京還丁酉命川陝宣撫司軍事不及待報者聽隨宜措置己亥以郭浩知永興軍兼節制陝西諸路軍馬楊政徙知興元府是月命胡世將與夏人議入貢夏人不報夏四月丙午訪求亡逸曆書及精於星曆者辛酉以張中孚為醴泉觀使中彥提舉祐聖觀趙彬為兵部侍郎癸亥命部使者歲舉廉吏一人庚午復四川諸州學官壬申韓肖冑罷五月己卯金人叛盟兀朮等分四道來攻甲申名徽宗御制閣曰敷文乙酉兀朮入東京留守孟庾以城降知興仁府李師雄知淮寧府李正民及河南諸州繼降丙戌金人陷拱州守臣王慥死之撒离曷自河中趨永興軍陝西州縣官皆降丁亥金人陷南京留守路允迪降劉錡引兵至順昌府己丑金人陷西京留守李利用副總管孫暉皆棄城走鈐轄李興率兵拒戰不克辛卯胡世將自河池遣涇原經略使田晟以兵三千人迎敵金人京湖宣撫司忠義統領李寶敗金人于興仁府境上癸巳知亳州王彥先叛降于金金人陷永興軍趨鳳翔丁酉命胡世將移陝西之右護軍還屯蜀口以福建廣東盜起命兩路監司出境共討己亥命劉光世為三京招撫處置使以援劉錡庚子以吳璘同節制陝西諸路軍馬聽胡世將便宜黜陟處置軍事辛丑金人犯鳳翔府之石壁砦吳璘遣統制姚仲等拒卻之金人圍耀州郭浩遣兵救之金兵解去壬寅金人圍順昌府三路都統葛王褎以大軍繼至劉錡力戰敗之六月甲辰朔以韓世忠太保張俊少師岳飛少保並兼河南北諸路招討使乙巳劉錡遣將閻充戰敗金人于順昌之李村丙午命兩浙江東福建諸州團給弓弩手以仇悆為沿海制置使詔將佐士卒能立奇功者賞以使相節鉞官告臨軍給受丁未罷建康府行宮營繕戊申以劉錡為沿淮制置使己酉吳璘遣統制李師顏等戰敗金人于扶風拔之壬子兀朮及宋叛將孔彥舟酈瓊趙榮等帥衆十餘萬攻順昌府劉錡率將士殊死戰大敗之初秦檜奏命錡擇利班師錡不奉詔戰益力遂能以寡勝衆乙卯順昌圍解兀朮還以知平江府梁汝嘉兼浙西沿海制置使丙辰岳飛將牛皋及金人戰于京西敗之己未劉光世進軍和州郭浩遣統制鄭建充攻破金人于醴州復其城壬戌詔諸司錢物量留經費外悉發以贍軍樓炤以父喪去位甲子撒离曷攻青谿嶺鄜延經略使王彥率兵戰敗之撒离曷還屯鳳翔命士主奉濮王祠事張俊遣左護軍都統制王德援劉錡德暫至順昌值圍已解復還廬州遣司農少卿李若虛詣岳飛軍諭指班師飛不聽丙寅下詔撫諭順昌府官吏兵民庚午以劉錡為武泰軍節度使侍衞馬軍都虞候韓世忠遣統制王勝背嵬將成閔率兵至淮陽軍南與金人遇擊敗之是月金人圍慶陽府權守臣宋萬年固守金人不能下岳飛領兵援劉錡與金人戰于蔡州敗之復蔡州閏月癸酉朔張俊遣統制宋超敗金人于永城縣朱家村甲戌追孟庾路允迪官徙家屬遠郡丙子詔三衙管軍及觀察使已上各舉智略勇猛材堪將帥者二人金人犯涇州守臣曲汲棄城去經略使田晟率兵來救金人敗走甲申晟及金人再戰于涇州敗之金人引歸鳳翔乙酉降陝西雜犯死罪釋流以下囚丙戌以胡世將為端明殿學士吳璘為鎮西節度使楊政武當節度使郭浩奉國節度使王德攻金人于宿州夜破之降其守馬秦丁亥詔釋順昌府流以下囚再復租稅二年守禦官吏進官一等己丑永興軍鈐轄傅忠信等與金人戰于華陰縣敗之壬辰岳飛遣統制張憲擊金將韓常于潁昌府敗之復潁昌丙申張憲復淮寧府丁酉趙鼎分司興化軍居住岳飛遣統制郝晸等與金人戰于鄭州北復鄭州李興復汝州與金人戰于河清縣敗之復伊陽等八縣李成遁去韓世忠遣統制王勝王權攻海州克之執其守王山戊戌張俊率統制宋超等及王德兵會于城父縣酈瓊及葛王褎遁去遂復亳州己亥金人救海州王權等逆戰敗之復懷仁縣庚子張俊棄亳州引軍還壽春再貶趙鼎漳州居住又貶清遠軍節度副使潮州安置秋七月癸卯岳飛遣將張應韓清入西京會李興復永安軍丙午以御史中丞王次翁參知政事己酉岳飛及兀朮戰于郾城縣敗之庚戌曲赦海州永興軍統領辛鎮及金人戰于長安城下敗之癸丑以楊沂中為淮北宣撫副使劉錡為判官甲寅岳飛遣統制楊再興王蘭等擊金人于小商橋皆戰死乙卯金人攻潁昌岳飛遣將王貴姚政合兵力戰敗之壬戌飛以累奉詔班師遂自郾城還軍皆潰金人追之不及潁昌蔡鄭諸州皆復為金有甲子以釋奠文宣王為大祀乙丑增收州縣頭子錢為激賞費金人圍淮寧府趙秉淵棄城南歸辛未金人犯盩厔縣王俊逆戰于東洛谷卻之八月壬申朔以張九成喻樗陳剛中凌景夏樊光遠毛叔度元盥等七人嘗不主和議皆降黜之乙亥韓世忠圍淮陽軍不克庚辰金人及酈瓊合兵駐于千秋湖陵韓世忠遣統制劉寶等夜襲破之壬午李成犯西京李興擊卻之楊沂中軍于宿州丙戌以郭浩知夔州丁亥楊沂中自宿州夜襲柳子鎮軍潰遂自壽春府渡淮歸金人屠宿州甲午川陝宣撫司統領王喜等遇金人于陽縣敗之九月壬寅朔遣起居舍人李易諭韓世忠罷兵時秦檜專主和議諸大帥皆還鎮丁未楊政遣統制楊從儀夜襲金人于鳳翔府敗之戊申金人復入西京李興棄城去庚戌合祀天地于明堂大赦辛酉臨安火戊辰以郭浩知金州節制陝西河東軍馬兼措置河東忠義軍是秋知代州王忠植舉兵復石代等十一州冬十月癸酉復張浚觀文殿大學士甲戌以王忠植為建寧軍承宣使河東路經略安撫使戊寅秦檜上重修紹興在京通用敕令格式庚辰金人犯慶陽府守臣宋萬年以城降辛卯金人犯陝州吳琦率兵迎擊敗之庚子金人襲洮州攻鐵城堡統制孔文清惠逢擊敗之是月劉錡入見胡世將命王忠植救慶陽叛將趙惟清執之降于金忠植不屈而死十一月丁未金將合喜復犯陝州吳琦擊卻之又犯寶鷄縣統制楊從儀敗之壬子以令為保寧軍節度使是月宜章洞民駱科叛犯桂陽郴道連賀諸州命發大兵討之十二月壬午上皇太后冊寶于慈寧殿丁亥贈王忠植奉國軍節度使謚義節辛卯起諸路耆長役錢隸總制司專給軍用是月楊沂中引兵還行在十一年春正月癸卯鳳翔統制楊從儀敗金人于渭南庚戌張俊入見乙卯金人犯壽春府守臣孫暉統制雷仲合兵拒之丁巳壽春陷暉仲棄城去己未劉錡自太平州率兵二萬援淮西庚申金人渡淮辛酉雨雹乙丑劉錡至廬州還丙寅兀朮陷廬州戊辰金人陷商州守臣邵隆棄城去己巳命楊沂中引兵赴淮西岳飛進兵江州二月癸酉張俊遣王德渡江屯和州金人退屯昭關邵隆破金人于洪門復商州乙亥金人復來爭和州張俊敗之命韓世忠以兵援淮西丙子趣岳飛會兵蘄黃王德等敗金人于含山縣東己卯統制關師古李橫擊敗金人于巢縣復之庚辰岳飛發鄂州辛巳知泰州王碷兼通泰二州制置使癸未王德田師中等擊破金人復含山縣奪昭關劉錡自東關擊敗金人于青谿甲申金人復犯昭關王德等又敗之李顯忠遣統領崔皋擊敗金人于舒城縣丁亥楊沂中劉錡等大敗兀朮軍于柘皋己丑兀朮親率兵逆戰于店步沂中等又敗之乘勝逐北遂復廬州是月虔吉州盜賊悉平三月庚子朔張浚進鬻田及賣度牒錢六十三萬緡助軍用壬寅韓世忠引兵趨壽春癸卯復張浚特進金人圍濠州岳飛發舒州甲辰張俊楊沂中劉錡議班師乙巳沂中錡先行俊以輕兵留後丙午詔釋淮西雜犯死罪以下囚丁未金人陷濠州執守臣王進夷其城鈐轄邵青死之戊申張俊遣楊沂中王德入濠州遇金伏兵敗還己酉韓世忠至濠州不利而退辛亥岳飛次定遠縣聞金兵退還屯舒州楊沂中歸行在壬子金人渡淮北歸癸丑張俊歸建康府丁巳劉錡歸太平州甲子行營統制張彥及金人遇于陽之劉坊砦第八將張宏戰沒夏四月丙子復收免行錢己卯孫近罷辛巳以王次翁兼權同知樞密院事韓世忠張俊岳飛相繼入覲壬辰以世忠俊並為樞密使飛樞密副使命三省樞密院官復分班奏事乙未張俊請以所部兵隸御前罷三宣撫司改統制官為御前統制官各屯駐舊所丙申以廣西經略使胡舜陟節制廣東湖南兵趣討駱科慕容洧破新泉砦又攻會州將官朱勇破之五月辛丑置兩淮江東西湖廣京西三道總領軍馬錢糧官仍掌報發御前軍馬文字癸卯賻恤戰沒將士丁未遣張俊岳飛于楚州巡視邊防召劉光世赴行在甲寅命樞密行府置司鎮江令徧行巡歷措置庚申加楊沂中檢校少保開府儀同三司六月乙亥造克寸敵弓加秦檜特進進尚書左僕射同中書門下平章事兼樞密使癸未張俊岳飛至楚州俊以海州城不可守毀之遷其民統韓世忠軍還鎮江惟背嵬一軍赴行在甲申知河南府李興部兵至鄂州以興為左軍統制乙丑明州僧王法恩等謀反伏誅壬辰劉光世罷為萬壽觀使秋七月戊戌秦檜上徽宗實錄進修撰以下各一官庚子以翰林學士范同參知政事以旱減膳祈禱遣官決滯獄出繫囚丁未加秦檜少保甲寅罷劉錡兵命知荊南府乙卯詔優奬永興鳳翔秦隴等州縣官到任半年減磨勘任滿遷一官己未加張俊太傅癸亥大雨是月命張俊復如鎮江措置軍務留岳飛行在八月戊辰立祚德廟于臨安祀韓厥甲戌罷岳飛乙亥命諸王後各推年長一人權主祀事癸巳胡世將起復九月癸卯命軍器少監鮑琚如鄂州根括宣撫司錢穀鄂州前軍副統制王俊告副都統制張憲謀據襄陽為變張俊收憲屬吏以聞丁未坐監司不按贓吏罪辛亥吳璘拔秦州州將武誼降壬子璘率姚仲及金人戰于丁劉圈敗之楊政克隴州破岐下諸屯郭浩復華州入陝州甲寅建康大火丙申遣劉光遠等充金國通問使吳璘及金人戰于剡家灣大敗之遂圍臘家城癸亥璘自臘家城受詔班師楊政郭浩皆引軍還乙丑邵隆復虢州郝晸討禽駱科斬之冬十月丙寅朔金人陷泗州遂陷楚州丁卯命樞密都承旨鄭剛中宣諭川陝戊辰楊政及金人戰于寶鷄縣敗之禽通檢孛堇乙亥兀朮遣劉光遠等還戊寅詔修玉牒下岳飛張憲大理獄命御史中丞何鑄大理卿周三畏鞫之壬午遣魏良臣王公亮為金國稟議使乙酉虛恨蠻主歷階詣嘉州降癸巳韓世忠罷為醴泉觀使封福國公是月金人陷濠州邵隆復陝州十一月己亥范同罷責降李光為建寧軍節度副使藤州安置辛丑兀朮遣審議使蕭毅邢具瞻與魏良臣等偕來丁未范同分司筠州居住罷判大宗正事士同知宗正事士撙申嚴戚里宗室謁禁己酉雷壬子蕭毅等入見始定議和盟誓乙卯以何鑄簽書樞密院事充金國報謝進誓表使庚申命宰執及議誓撰文官告祭天地宗廟社稷辛酉以張浚為檢校少傅崇信軍節度使萬壽觀使是月與金國和議成立盟書約以淮水中流畫疆割唐鄧二州畀之歲奉銀二十五萬兩絹二十五萬匹休兵息民各守境土詔川陝宣撫司毋出兵生事招納叛亡駱科餘黨歐幻四等復叛桂陽藍山犯平陽縣遣江西兵馬都監程師回討平之十二月丁卯責降徽猷閣待制劉洪道為濠州團練副使柳州安置癸酉命尚書省置籍勾考諸路滯獄甲戌罷川陝宣撫司便宜行事乙亥兀朮遣何鑄等如會寧見金主且趣割陝西餘地遂命周聿莫將鄭剛中分畫京西唐鄧陝西地界壬午命州縣三歲一置產業簿籍民貲財田宅以定賦役禁受賕虧隱舊額丁亥立譏察海舶條法癸巳賜岳飛死于大理寺斬其子雲及張憲于市家屬徙廣南官屬于鵬等論罪有差
