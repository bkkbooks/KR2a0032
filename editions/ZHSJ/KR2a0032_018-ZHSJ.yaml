body:
  text: 宋史卷十八本紀第十八哲宗二紹聖元年春正月癸酉朔羣臣詣西上閤門進名奉慰丙申夏人來貢辛丑遣中書舍人呂希純等行河罷河東大銅錢二月丁未以戶部尚書李清臣為中書侍郎兵部尚書鄧潤甫為尚書右丞己酉葬宣仁聖烈皇后于永厚陵己未祔神主于太廟癸亥減兩京河陽鄭州囚罪一等民緣山陵役者蠲其賦甲子詔依章獻明肅皇后故事罷避高遵惠諱三月壬申朔日有食之乙亥呂大防罷庚辰詔大學合格上舍生推恩免省試附科場春榜乙酉御集英殿策進士丁亥策武舉戊子以徐王顥為太師徙封冀王癸巳詔振京東河北流民貸以穀麥種諭使還業蠲是年租稅丁酉賜禮部奏名進士諸科及第出身九百七十五人蘇轍罷夏四月乙巳朔阿里骨進獅子丙午以旱詔恤刑己酉詔中外決獄庚戌詔有司具醫藥治京師民疾壬子蘇軾坐前掌制命語涉譏訕落職知英州癸丑改元白虹貫日甲寅以王安石配饗神宗廟庭蔡確追復右正議大夫戊午復新城兩廂庚申減四京囚罪一等杖以下釋之壬戌以資政殿學士章惇為尚書左僕射兼門下侍郎范純仁罷丙寅罷五路經律通禮科丁卯詔諸路復元豐免役法戊辰同修國史蔡卞請重修神宗實錄閏月壬申復提舉常平官癸酉罷十科舉士法甲申以觀文殿學士安燾為門下侍郎丙戌復義倉丁亥詔神宗隨龍人趙世長等遷秩賜賚有差戊子詔在京諸司所受傳宣中批並候朝廷覆奏以行乙未西南張蕃遣人入貢丙申命左僕射章惇提舉修神宗國史丁酉詔添差徐州兵馬都監五月壬寅罷修官制局甲辰罷進士習試詩賦令專二經立宏詞科己酉修國史曾布請以王安石日錄載之神宗實錄太白晝見辛亥劉世罷癸丑詔中外學官非制科進士上舍生入官者並罷編類元祐群臣章疏及更改事條甲寅右正言張商英言先帝謂天地合祭非古詔禮部太常詳議以聞乙丑鄧潤甫卒丁卯嗣濮王宗暉薨六月甲戌來之邵等疏蘇軾詆斥先朝詔謫惠州丙子罷制置解鹽使壬午封高密郡王宗晟為嗣濮王癸未以翰林學士承旨曾布同知樞密院事甲申除進士引用王安石字說之禁秋七月丁巳以御史黃履周秩諫官張商英言奪司馬光呂公著贈謚王巖叟贈官貶呂大防為秘書監劉摯為光祿卿蘇轍為少府監並分司南京梁燾提舉舒州靈仙觀戊午詔大臣朋黨司馬光以下各輕重議罰布告天下餘悉不問議者亦勿復言八月丙戌召輔臣觀稼後苑日有五色雲壬辰應制科趙天啟以累上書狂妄黜九月癸卯遣御史劉拯按河北水災振饑民丙午御集英殿策賢良方正能直言極諫科庚戌罷制科罷廣惠倉癸丑令監司歲察守臣課績優者以聞甲寅知廣州唐義問坐棄渠陽砦責授舒州團練副使庚申太白晝見丁卯詔京東西河北振恤流民戊辰流星出紫微垣冬十月丙申三佛齊遣使入貢丁酉河北流斷絕十一月己亥朔復八路差官法壬子以冬溫無雪決繫囚蔡確特追復觀文殿大學士甲寅開封男子呂安斥乘輿當斬貸之丁巳詔河北振饑諸路恤流亡官吏有善狀才能顯著者以聞十二月辛未申嚴銅錢出外界法庚辰命諸路祈雪丙戌滑州浮橋火己丑漳河決溢浸洺磁等州令計置堙塞甲午范祖禹趙彥若黃庭堅坐史事責授散官永澧黔州安置是歲京師疫洛水溢太原地震河北水發京東粟振之二年春正月甲辰詔國史院增補先帝御集丙午立宏詞科己未遷奉太平興國寺三朝御容于天章閣乙丑殿前司奏獄空詔賜緡錢二月乙亥呂大防以監修史事貶秩分司南京安州居住辛巳出內庫錢帛二十萬助河北振饑甲午罷廣文館解額三月己亥宗晟薨己未試宏詞黃符等五人各循一資夏四月戊辰詔職事官罷帶職朝請大夫以下勿分左右易集賢院學士為集賢殿修撰直集賢院為直秘閣集賢校理為秘閣校理壬申封華容郡王宗愈為嗣濮王詔許將等七人不限資格各舉才行堪備任使者二人丁亥詔依元豐條置律學博士二員五月乙巳命蔡卞詳定國子監三學及外州州學制乙卯上皇太妃宮名曰聖瑞六月壬辰禁京城士人輿轎秋七月丙辰詔大理寺復置右治獄仍依元豐例添置官屬八月壬申命彰信軍節度使宗景為開府儀同三司封濟陰郡王甲申宗愈薨乙酉錄趙普後希莊為閤門祗候九月甲午以安定郡王宗綽為嗣濮王壬寅告遷神宗神御于景靈宮顯承殿癸卯詣景靈宮行奉安禮戊申加上神宗謚曰紹天法古運德建功英文烈武欽仁聖孝皇帝己酉朝獻景靈宮庚戌朝饗太廟辛亥大饗明堂赦天下冬十月甲子鄭雍罷癸酉告遷宣仁聖烈皇后神御于景靈宮徽音殿甲戌詣宮行奉安禮以吏部尚書許將為尚書左丞翰林學士蔡卞為尚書右丞辛巳進封冀王顥為楚王辛卯河南府地震十一月乙未安燾罷知河南府丙申太白晝見戊戌范鍔自轉運使入對言有捕盜功乞賜章服帝曰捕盜常職也何足言功黜知壽州甲寅梁惟簡除名全州安置丙辰贈蔡確為太師賜謚忠懷十二月乙丑復置監察御史三人分領六察不言事令翰林學士蔡京御史中丞黃履各舉御史二人壬申白虹貫日戊子詔如元豐例孟月朝獻景靈宮是歲蘇州夏秋地震桂陽監慶雲見出宮女九十一人交阯三佛齊韋蕃阿里骨入貢三年春正月庚子韓忠彥罷知真定府甲辰酌獻景靈宮遍詣諸殿如元豐禮庚戌引見蕃官包順包誠等賜賚有差詔鞫獄非本章所指而蔓求他罪者論如律乙卯詔戶部尚書勿領右曹戊午詔罷合祭間因大禮之歲夏至日躬祭地祇於北郊二月癸亥出元豐庫緡錢四百萬于陝西河東糴邊儲辛未復元豐恤孤幼令癸酉罷富弼配饗神宗廟庭癸未詔封濮王子未王者三人宗楚為南陽郡王宗祐為景城郡王並開府儀同三司宗漢為東陽郡王乙酉宗綽薨丙戌詔三歲一取旨遣郎官御史按察監司職事丁亥夏人寇義合砦三月壬辰以禁中屢火罷春宴及幸池苑不御垂拱殿三日癸巳夏人圍塞門砦丁酉尚書省火戊午劍南東川地震己亥封宗楚為嗣濮王辛亥封大寧郡王佖為申王遂寧郡王佶為端王丁巳幸申王端王府夏四月辛酉罷宣徽使丙子詔自今景靈宮四孟朝獻分為二日五月壬子太白晝見丙辰錄囚六月癸亥令真定立趙普廟乙酉立北郊齋宮於瑞聖園秋七月庚戌依元豐職事官以行守試三等定祿秩罷元祐所增聚議錢甲寅令熙河立王韶廟八月辛酉夏人寇寧順砦壬戌日上有五色暈下有五色氣己卯復置檢法官庚辰以范祖禹劉安世在元祐中構造誣謗祖禹責授昭州別駕賀州安置安世新州別駕英州安置九月己亥邈川首領阿里骨卒己酉滁沂二州地震壬子楚王顥薨乙卯廢皇后孟氏為華陽教主玉清妙靜仙師賜名冲真冬十月丁巳朔以楚王薨罷文德殿視朝壬戌夏人寇鄜延陷金明砦戊辰詔被邊諸路相度城砦要害增嚴守備辛未西南方雷聲雨雹癸酉鍾傳言築汝遮詔以為安西城十一月丁未章惇上神宗實錄庚戌宴修實錄官十二月辛酉宗景坐以立妾罔上罷開府儀同三司判大宗正司事癸酉置施州鑄錢廣積監甲戌蔡京上新修太學敕令式詳定重修敕令遺棄饑貧小兒三歲以下聽收養為真子孫是歲于闐大食龜茲師王國西南蕃龍氏羅氏入貢宗室子授官者四十六人四年春正月丙戌朔不受朝羣臣及遼使詣東上閤門拜表賀班內外學制庚寅以阿里骨子瞎征襲河西軍節度使邈川首領甲午涇原路鈐轄王文振敗夏人于沒煙峽庚戌李清臣罷二月己未以三省言追貶呂公著為建武軍節度副使司馬光為清遠軍節度副使王巖叟為雷州別駕奪趙瞻傅堯俞贈謚追韓維致仕及孫固范百祿胡宗愈遺表恩詔江淮巡檢依舊法招置土兵癸亥于闐來貢黑汗王攻夏人三州遣其子以聞丙寅夏人寇綏德城庚午詔國信使毋得以非例之物遺人使仍著條禁癸酉詔申王佖端王佶歲賜錢各六千五百緡丙子進神宗婉儀宋氏為賢妃己卯復元豐榷茶法庚辰罷春秋科癸未以三省言追貶呂大防為舒州團練副使劉摯為鼎州團練副使蘇轍為化州別駕梁燾為雷州別駕范純仁為武安軍節度副使安置于循新雷化永五州劉奉世為光祿少卿分司南京黜韓維以下三十人輕重有差甲申降文彥博為太子少保閏月丙戌朔張天說坐上書詆訕先朝處死壬寅以曾布知樞密院事許將為中書侍郎蔡卞為尚書左丞吏部尚書黃履為尚書右丞翰林學士林希同知樞密院事癸卯大雨雹甲辰蘇軾責授瓊州別駕移昌化軍安置范祖禹移賓州安置劉安世移高州安置己酉御集英殿策進士庚戌策武舉三月壬戌夏人犯麟州神堂堡出兵討之及進築胡山砦癸亥賜禮部奏名進士諸科及第出身六百九人甲子詔武舉謝師古等以遠人賜帛李惟岳以高年賜帛丁卯詔瀘南安撫司南平軍毋擅誘楊光榮獻納播州疆土庚午夏人大至葭盧城下知石州張構等擊走之甲戌幸金明池丙子剋胡山新砦成賜名平羌砦辛巳西上閤門使折克行破夏人于長波川斬首二千餘級獲牛馬倍之壬午命官編類司馬光等改廢法度論奏事狀夏四月丁亥令諸獄置氣樓涼窗設漿飲薦席杻械五日一浣繫囚以時沐浴遇寒給薪炭甲午熙河築金城關丙申詔發解省試添策一道丁酉進編臣僚章疏一百四十三帙己亥呂大防卒于虔州庚子知保安軍李沂伐夏國破洪州壬寅環慶鈐轄張存入鹽州俘戮甚衆及還夏人追襲之復多亡失甲辰置克戎砦平夏城置靈平砦丁未以西邊板築有勞曲赦陝西河東路追貶王珪為萬安軍司戶參軍己酉復文德殿侍從轉對五月丁巳文彥博薨辛酉以皇太妃服藥及亢旱決四京囚壬戌詔陝西添置蕃落馬軍十指揮丁卯廢衞州淇水第二馬監潁昌府單鎮馬監辛未韓縝薨丁丑貶韓維為崇信軍節度副使六月癸未朔日有食之丁亥太白犯太微垣戊子宗楚薨丙申詔翰林學士吏部尚書各舉監察御史二人丁酉環慶路安疆砦成詔防托蕃漢官賜帛有差甲辰熙河進築青石峽畢工賜名西平乙巳保寧軍觀察留後宗漢為開府儀同三司徙封安康郡王己酉太原地震太白晝見秋七月壬子朔太白晝見八月乙酉封湖州觀察使世開為安定郡王丙戌鄜延將王愍復宥州戊戌封宗祐為嗣濮王築威戎城己酉彗出西方九月壬子以星變避殿減膳罷秋宴詔公卿悉心修政以輔不逮求中外直言乙卯赦天下出元豐庫緡錢四百萬付陝西廣糴詔歸明人未給田者舍以官屋戊辰彗滅癸酉謁中太一宮為民祈福丙子御殿復膳命宗景為開府儀同三司己卯封婉儀劉氏為賢妃冬十月戊戌宗景薨壬寅廢安國安陽淇水監及洛陽原武監十一月丁卯詔諫議大夫以上各舉監察御史一人癸酉貶劉奉世為隰州團練副使郴州安置丁丑詔放歸田里程頤涪州編管十二月癸未劉摯卒甲申曲宴遼使于垂拱殿乙酉侍御史董敦逸坐奏對不實貶秩知興國軍是歲兩浙旱饑詔行荒政移粟振貸出宮女二十四人宣城民妻一產四男子于闐西南蕃羅氏入貢播州夷楊光榮等內附戶部主戶一千三百六萬八千七百四十一丁三千三十四萬四千二百七十四客戶六百三十六萬六千八百二十九丁三百六萬七千三百三十二大辟三千一百九十二人元符元年春正月庚戌朔不視朝丙寅咸陽民段義得玉印一紐甲戌幸瑞聖園觀北郊齋宮二月丙戌白虹貫日庚寅詔建五王外第壬辰復罷翰林侍讀侍講學士丁酉宗祐薨戊申知蘭州王舜臣討夏人于塞外築興平城三月壬子令三省樞密吏三歲一試刑法甲寅開楚州通漣河丙辰米脂砦成丁巳五王外第成賜名懿親宅戊午封宗漢為嗣濮王殺朱崖流人陳衍壬戌申王佖端王佶並為司空令太常寺與閤門修定刈麥儀乙丑詔翰林學士承旨蔡京等辯驗段義所獻玉璽定議以聞戊辰吏部郎中方澤等坐私謁后族宴聚罰金補外庚午幸申王府辛未幸端王府甲戌進封咸寧郡王俁為莘王普寧郡王似為簡王祁國公偲為永寧郡王丙子築熙河通會關夏四月庚辰世開薨甲申幸睿成宮及莘王簡王府丙戌章惇等進神宗帝紀梁燾卒于化州壬辰林希罷丙申建顯謨閤藏神宗御集庚子幸睿成宮壬寅學士院上寶璽靈光翔鶴樂章癸卯詔學官增習兩經丁未曾布上刪修軍馬敕例五月戊申朔御大慶殿受天授傳國受命寶行朝會禮己酉班德音于天下減囚罪一等徒以下釋之癸丑受寶恭謝景靈宮戊午宴紫宸殿庚申詔獻寶人段義為右班殿直賜絹二百匹六月戊寅朔改元丙戌遣官分詣鄜延涇原河東熙河按驗所築城砦甲午蔡京等上常平免役敕令秋七月乙卯詔增置大府丞一員乙丑敕大禮五使自今並差執政官定為令丁卯令學官試三經庚午詔范祖禹移化州安置劉安世梅州安置王巖叟朱光庭諸子並勒停不壬申京師地震八月丙子朔熙河蘭岷路復為熙河蘭會路庚辰詔自今三省樞密院進擬在京文臣開封推判官武臣橫班使副及諸路監司帥守並取旨召對丁亥詔侍從中書舍人以上各舉所知二人權侍郎以上舉一人仍指言所堪職任九月丁未以霖雨罷秋宴庚戌秦觀除名移雷州編管癸亥賜王安石第于京師冬十月乙未詔武官試換文資丁酉以河北京東河溢遣官振恤己亥夏人寇平夏城癸卯駙馬都尉張敦禮坐元祐初上疏譽司馬光奪留後授環衞官十一月壬戌朝獻景靈宮癸亥朝饗太廟甲子祀昊天上帝于圜丘赦天下是歲澶州河溢振恤河北京東被水者真定府祁州野蠶成繭涇原路禽夏國統軍嵬名阿埋等高麗瞎征西南蕃張氏羅氏程氏入貢西蕃首領李訛示里巴詘支呂承信等內附二年春正月甲辰朔御大慶殿以雪罷朝羣臣及遼使詣東上閤門拜表賀羣臣又詣內東門賀如儀丁卯出內金帛二百萬備陝西邊儲二月甲戌朔令監司舉本路學行優異者各二人韋蕃入貢己卯詔許高麗國王遣士賓貢辛巳增置神臂弓詔自今應被旨舉官所舉不當具舉主姓名以聞甲申夏人以國母卒遣使告哀且謝罪卻其使不納戊子鄜延鈐轄劉安敗夏人于神堆甲午大食入貢乙未詔吏部守令課績從御史臺考察黜其不實者三月丙辰遼人遣簽書樞密院事蕭德崇來為夏人請緩師仍獻玉帶築環慶路定邊城丁巳秦鳳經略司言吳名革率部族孳畜歸順詔名革補內殿承制首領李示里補右侍禁及賜錢帛有差庚申知府州折克行獲夏國鈐轄令王皆保乙丑祈雨己巳莘王俁為司空夏四月庚辰幸莘王府令廣西提點刑獄司兼領鹽事丙戌築鄜延河東路暖泉烏龍砦丁亥以旱減四京囚罪一等杖以下釋之辛卯詔鞫獄徒以上須結案及審錄覆奏然後斷遣不如令者坐之癸巳封永嘉郡王偲為睦王遣中書舍人郭知章報聘于遼丁酉築威羌城五月甲辰太白晝見庚戌築鄜延路金湯城癸亥奉遷真宗神御于萬壽觀延聖殿曲赦陝西河東路減囚罪一等流以下釋之建西安州及天都等砦乙丑進章惇官五等曾布三等許將蔡卞黃履皆二等辛未詔莘王俁睦王偲母進封婕妤六月庚辰賜蘭會州新砦名會川城甲午賜環慶路之字平曰清平關戊戌築定邊白豹城訖工閤門使張存等轉官賜金帛有差秋七月乙巳盛暑中外決繫囚丁未放在京工役庚戌河北河漲沒民田廬遣官振之甲子知環州种朴獲夏國監軍訛勃囉丙寅洮西安撫使王贍復邈川城西蕃首領欽彪阿成以城降八月癸酉章惇等進新修敕令式惇讀於帝前其間有元豐所無而用元祐敕令修立者帝曰元祐亦有可取乎惇等對曰取其善者甲戌太原地震戊寅皇子生辛巳降德音于諸路減囚罪一等流以下釋之乙酉賜熙河路緡錢百萬撫納部族丁亥修復會州癸巳太白晝見瞎征降甲午建葭蘆戍為晉寧軍丙申保寧軍節度呂惠卿特授檢校司空九月庚子朔夏人來謝罪癸卯命御史點檢三省樞密院並依元豐舊制甲辰幸儲祥宮乙巳幸醴泉觀丁未立賢妃劉氏為皇后己未青唐酋隴拶以城降壬戌雨罷秋宴甲子右正言鄒浩論劉氏不當立特除名勒停新州羈管丙寅御文德殿冊皇后閏月癸酉置律學博士員詔詳議廟制以青唐為鄯州隴右節度邈川為湟州宗哥城為龍支城俱隸隴右戊寅以廓州為寧砦城丙戌果州團練使仲忽進古方鼎誌曰魯公作文王尊彝甲午熒惑犯太微垣左執法己未越王茂薨冬十月壬子詔河北大名二十二州軍置馬步軍指揮以廣威保捷為名甲寅日有食之既十一月丁亥詔綏德城為綏德軍壬辰詔河北黃河退灘地聽民耕墾免租稅三年乙未詔諸州置教授者依太學三舍法考選生徒升補是月河中猗氏縣民妻一產四男子三年春正月辛未帝有疾不視朝丁丑奉安太宗皇帝御容于景靈宮大定殿戊寅大赦天下蠲民租己卯帝崩皇太后諭遺制立弟端王即位于柩前皇太后權同處分軍國事四月己未上謚曰欽文睿武昭孝皇帝廟號曰哲宗七月丁卯以謚號冊寶奏告天地宗廟社稷八月壬寅葬于永泰陵癸亥祔太廟崇寧三年七月加謚曰憲元繼道世德揚功欽文睿武齊聖昭孝皇帝政和三年改謚憲元繼道顯德定功欽文睿武齊聖昭孝皇帝贊曰哲宗以冲幼踐阼宣仁同政初年召用馬呂諸賢罷青苗復常平登俊良闢言路天下人心翕然向治而元祐之政庶幾仁宗奈何熙豐舊姦枿去未盡已而媒蘖復用卒假紹述之言務反前政報復善良馴致黨籍禍興君子盡斥而宋政益敝矣吁可惜哉
