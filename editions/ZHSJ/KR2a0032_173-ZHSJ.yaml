body:
  text: 宋史卷一百七十三志第一百二十六食貨上一農田昔武王克商訪箕子以治道箕子為之陳洪範九疇五行五事之次即曰農用八政八政之目即以食貨為先五行天道也五事人道也天人之道治而國家之政興焉是故食貨而下五卿之職備舉於是矣宗伯掌邦禮祀必有食貨而後儀物備賓必有食貨而後委積豐司空掌邦土民必有食貨而後可奠於厥居司徒掌邦教民必有食貨而後可興於禮義司寇掌邦禁民必有食貨而後可遠於刑罰司馬掌邦政兵必有食貨而後可用於征戍其曰農用八政農食貨之本也唐杜佑作通典首食貨而先田制其能推本洪範八政之意歟宋承唐五季之後太祖興削平諸國除藩鎮留州之法而粟帛錢幣咸聚王畿嚴守令勸農之條而稻粱桑枲務盡地力至於太宗國用殷實輕賦薄斂之制日與羣臣講求而行之傳至真宗內則升中告成之事舉外則和戎安邊之事滋由是食貨之議日盛一日仁宗之世契丹增幣夏國增賜養兵西陲費累百萬然帝性恭儉寡慾故取民之制不至掊克神宗欲伸中國之威革前代之弊王安石之流進售其強兵富國之術而青苗保甲之令行民始罹其害矣哲宗元祐更化斯民稍望休息紹聖而後章惇倡紹述之謀秕政復作徽宗既立蔡京為豐亨豫大之言苛征暴斂以濟多慾自速禍敗高宗南渡雖失舊物之半猶席東南地產之饒足以裕國然百五十年之間公私粗給而已考其祖宗立國初意以忠厚仁恕為基向使究其所為勉而進於王道亦孰能禦之哉然終宋之世享國不為不長其租稅征榷規𤨓節目煩簡疏密無以大異於前世何哉內則牽於繁文外則撓於強敵供億既多調度不繼勢不得已徵求於民謀國者處乎其間又多伐異而黨同易動而輕變殊不知大國之制用如巨商之理財不求近效而貴遠利宋臣於一事之行初議不審行之未幾即區區然較其失得尋議廢格後之所議未有以瘉於前其後數人者又復訾之如前使上之為君者莫之適從下之為民者無自信守因革紛紜非是貿亂而事弊日益以甚矣世謂儒者論議多於事功若宋人之言食貨大率然也又謂漢文景之殷富得諸黃老之清靜為黃老之學者大忌於紛更宋法果能然乎時有古今世有升降天地生財其數有限國家用財其端無窮歸於一是則生之者衆食之者寡為之者疾用之者舒之外無他技也宋舊史志食貨之法或驟試而輒已或亟言而未行仍之則徒重篇帙約之則不見其始末姑去其泰甚而存其可為鑒者焉篇次離為上下其一曰農田二曰方田三曰賦稅四曰布帛五曰和糴六曰漕運七曰屯田八曰常平義倉九曰課役十曰振恤或出或入動關民生國以民為本故列之上篇焉其一曰會計二曰銅鐵錢三曰會子四曰鹽五曰茶六曰酒七曰阬冶八曰礬九曰商稅十曰市易十一曰均輸十二曰互市舶法或損或益有係國體國不以利為利故列之下篇焉各疏其事二十有二目通為十有四卷云農田之制自五代以兵戰為務條章多闕周世宗始遣使均括諸州民田太祖即位循用其法建隆以來命官分詣諸道均田苛暴失實者輒譴黜申明周顯德三年之令課民種樹定民籍為五等第一等種雜樹百每等減二十為差桑棗半之男女十歲以上種韭一畦闊一步長十步乏井者鄰伍為鑿之令佐春秋巡視書其數秩滿第其課為殿最又詔所在長吏諭民有能廣植桑棗墾闢荒田者止輸舊租縣令佐能招徠勸課致戶口增羨野無曠土者議賞諸州各隨風土所宜量地廣狹土壤瘠埆不宜種藝者不須責課遇豐歲則諭民謹蓋藏節費用以備不虞民伐桑棗為薪者罪之剝桑三工以上為首者死從者流三千里不滿三工者減死配役從者徒三年太宗太平興國中兩京諸路許民共推練土地之宜明樹藝之法者一人縣補為農師令相視田畝肥瘠及五種所宜某家有種某戶有丁男某人有耕牛即同鄉三老里胥召集餘夫分畫曠土勸令種蒔候歲熟共取其利為農師者蠲稅免役民有飲博怠於農務者農師謹察之白州縣論罪以警游惰所墾田即為永業官不取其租其後以煩擾罷初農時太宗嘗令取畿內青苗觀之聽政之次出示近臣是歲畿內菽粟苗皆長數尺帝顧謂左右曰朕每念耕稼之勤苟非兵食所資固當盡復其租稅端拱初親耕籍田以勸農事然畿甸民苦稅重兄弟既壯乃析居其田畝聚稅於一家即棄去縣歲按所棄地除其租已而匿他舍冒名佃作帝聞而思革其弊會知封丘縣竇玭言之乃詔賜緋魚絹百匹擢太子中允知開封府司錄事俾按察京畿諸縣田租玭專務苛刻以求課最民實逃亡者亦搜索於鄰里親戚之家益造新籍甚為勞擾數月罷之時州縣之吏多非其人土地之利不盡出租稅減耗賦役不均上下相蒙積習成敝乃詔諸知州通判具如何均平賦稅招輯流亡惠恤孤貧窒塞姦幸凡民間未便事限一月附疾置以聞而比年多稼不登富者操奇贏之資貧者取倍稱之息一或小稔富家責償愈急稅調未畢資儲罄然遂令州縣戒里胥鄉老察視有取富民穀麥貲財出息不得踰倍未輸稅毋得先償私逋違者罪之言者謂江北之民雜植諸穀江南專種秔稻雖土風各有所宜至於參植以防水旱亦古之制於是詔江南兩浙荊湖嶺南福建諸州長吏勸民益種諸穀民乏粟麥黍豆種者於淮北州郡給之江北諸州亦令就水廣種秔稻並免其租淳化五年宋亳數州牛疫死者過半官借錢令就江淮市牛未至屬時雨霑足帝慮其耕稼失時太子中允武允成獻踏犂運以人力即分命祕書丞直史館陳堯叟等即其州依式製造給民凡州縣曠土許民請佃為永業蠲三歲租三歲外輸三分之一官吏勸民墾田悉書于印紙以俟旌賞至道二年太常博士直史館陳靖上言先王之欲厚生民莫先於積穀而務農鹽鐵榷酤斯為末矣按天下土田除江淮湖湘兩浙隴蜀河東諸路地里敻遠雖加勸督未遽獲利今京畿周環二十三州幅員數千里地之墾者十纔二三稅之入者又十無五六復有匿里舍而稱逃亡棄耕農而事游惰賦額歲減國用不充詔書累下許民復業蠲其租調寬以歲時然鄉縣擾之每一戶歸業則刺報所由朝耕尺寸之田暮入差徭之籍追胥責問繼踵而來雖蒙蠲其常租實無補於捐瘠況民之流徙始由貧困或避私債或逃公稅亦既亡遯則鄉里檢其資財至於室廬什器桑棗材木咸計其直或鄉官用以輸稅或債主取以償逋生計蕩然還無所詣以茲浮蕩絕意歸耕如授以閑曠之田廣募游惰誘之耕墾未計賦租許令別置版圖便宜從事酌民力豐寡農畝肥磽均配督課令其不倦其逃民歸業丁口授田煩碎之事並取大司農裁決耕桑之外令益樹雜木蔬果孳畜羊犬雞豚給授桑土潛擬井田營造室居使立保伍養生送死之具慶弔問遺之資並立條制候至三五年間生計成立即計戶定征量田輸稅若民力不足官借糴錢或以市餱糧或以營耕具凡此給受委於司農比及秋成乃令償直依時價折納以其成數關白戶部帝覽之喜令靖條奏以聞靖又言逃民復業及浮客請佃者委農官勘驗以給受田土收附版籍州縣未得議其差役乏糧種耕牛者令司農以官錢給借其田制為三品以膏沃而無水旱之患者為上品雖沃壤而有水旱之患埆瘠而無水旱之慮者為中品既埆瘠復患於水旱者為下品上田人授百畝中田百五十畝下田二百畝並五年後收其租亦只計百畝十收其三一家有三丁者請加授田如丁數五丁者從三丁之制七丁者給五丁十丁給七丁至二十三十丁者以十丁為限若寬鄉田多即委農官裁度以賦之其室廬蔬韭及桑棗榆柳種藝之地每戶十丁者給百五十畝七丁者百畝五丁者七十畝三丁者五十畝不及三丁者三十畝除桑功五年後計其租餘悉蠲其課宰相呂端謂靖所立田制多改舊法又大費資用以其狀付有司詔鹽鐵使陳恕等共議請如靖奏乃以靖為京西勸農使按行陳許蔡潁襄鄧唐汝等州勸民墾田以大理寺丞皇甫選光祿寺丞何亮副之選亮上言功難成願罷其事帝志在勉農猶詔靖經度未幾三司以費官錢數多萬一水旱恐致散失事遂寢真宗景德初詔諸州不堪牧馬閑田依職田例招主客戶多方種蒔以沃瘠分三等輸課河朔戎寇之後耕具頗闕牛多瘠死二年內出踏犂式詔河北轉運使詢於民間如可用則官造給之且令有司議市牛送河北又以兵罷民始務農創什器遂權除生熟鐵渡河之禁是歲命權三司使丁謂取戶稅條敕及臣民所陳農田利害與鹽鐵判官張若谷戶部判官王曾等參詳刪定成景德農田敕五卷三年正月上之謂等又取唐開元中宇文融請置勸農判官檢戶口田土偽濫且慮別置官煩擾而諸州長吏職當勸農乃請少卿監為刺史閤門使以上知州者並兼管內勸農使餘及通判並兼勸農事諸路轉運使副兼本路勸農使詔可大中祥符四年詔曰火田之禁著在禮經山林之間合順時令其或昆蟲未蟄草木猶蕃輒縱燎原則傷生類諸州縣人畬田並如鄉土舊例自餘焚燒野草須十月後方得縱火其行路野宿人所在檢察毋使延燔帝以江淮兩浙稍旱即水田不登遣使就福建取占城稻三萬斛分給三路為種擇民田高仰者蒔之蓋旱稻也內出種法命轉運使揭榜示民後又種於玉宸殿帝與近臣同觀畢刈又遣內侍持於朝堂示百官稻比中國者穗長而無芒粒差小不擇地而生六年免諸路農器之稅明年諸州牛疫又詔民買賣耕牛勿算繼令羣牧司選醫牛古方頒之天下天禧初詔諸路自今候登熟方奏豐稔或已奏豐稔而非時災沴者即須上聞違者重置其罪先是民訴水旱者夏以四月秋以七月荊湖淮南江浙川峽廣南水田不得過期過期者吏勿受令佐受訴即分行檢視白州遣官覆檢三司定分數蠲稅亦有朝旨特增免數及應輸者許其倚格京畿則特遣官覆檢太祖時亦或遣官往外州檢視不為常制傷甚有免覆檢者至是又以覆檢煩擾止遣官就田所閱視即定蠲數時久罷畋遊令開封府諭民京城四面禁圍草地許其耕牧二年詔民有孝弟力田儲蓄歲計者長吏倍存恤之初朝議置勸農之名然無職局四年始詔諸路提點刑獄朝臣為勸農使使臣為副使所至取民籍視其差等不如式者懲革之勸恤農民以時耕墾招集逃散檢括陷稅凡農田事悉領焉置局案鑄印給之凡奏舉親民之官悉令條析勸農之績以為殿最黜陟自景德以來四方無事百姓康樂戶口蕃庶田野日闢仁宗繼之益務約己愛人即位之初下詔曰今宿麥既登秋種向茂其令州縣諭民務謹蓋藏無或妄費上書者言賦役未均田制不立因詔限田公卿以下毋過三十頃牙前將吏應復役者毋過十五頃止一州之內過是者論如違制律以田賞告者既而三司言限田一州而卜葬者牽於陰陽之說至不敢舉事又聽數外置墓田五頃而任事者終以限田不便未幾即廢時又禁近臣置別業京師及寺觀毋得市田初真宗崩內遣中人持金賜玉帛山僧寺市田言為先帝植福後毋以為例繇是寺觀稍益市田明道二年殿中侍御史段少連言頃歲中人至漣水軍稱詔市民田給僧寺非舊制詔還民田收其直入官後承平寖久勢官富姓占田無限兼并冒偽習以成俗重禁莫能止焉帝敦本務農屢詔勸劭觀稼於郊歲一再出又躬耕籍田以先天下景祐初患百姓多去農為兵詔大臣條上兵農得失議更其法遣尚書職方員外郎沈厚載出懷衞磁相邢洺鎮趙等州教民種水田京東轉運司亦言濟兗間多閑田而青州兵馬都監郝仁禹知田事請命規度水利募民耕墾從之是秋詔曰仍歲饑歉民多失職今秋稼甫登方事斂穫州縣毋或追擾以妨農時刑獄須證逮者速決之帝每以水旱為憂寶元初詔諸州旬上雨雪著為令慶曆三年詔民犯法可矜者別為贖令鄉民以穀麥市人以錢帛謂民重穀帛免刑罰則農桑自勸然卒不果行參知政事范仲淹言古者三公兼六卿之職唐命相判尚書六曹或兼諸道鹽鐵轉運使請於職事中擇其要者以輔臣兼領於是以賈昌朝領農田未及施為而仲淹罷事遂止皇祐中於苑中作寶岐殿每歲召輔臣觀刈穀麥自是罕復出郊矣帝聞天下廢田尚多民罕土著或棄田流徙為閒民天聖初詔民流積十年者其田聽人耕三年而後收賦減舊額之半後又詔流民能自復者賦亦如之既而又與流民限百日復業蠲賦役五年減舊賦十之八期盡不至聽他人得耕至是每下赦令輒以招輯流亡募人耕墾為言民被災而流者又優其蠲復緩其期招之詔諸州長吏令佐能勸民修陂池溝洫之久廢者及墾闢荒田增稅二十萬已上議賞監司能督責部吏經畫賞亦如之久之天下生齒益蕃闢田益廣獨京西唐鄧間尚多曠土入草莽者十八九或請徙戶實之或議置屯田或欲遂廢唐州為縣嘉祐中唐守趙尚寬言土曠可闢民希可招而州不可廢得漢邵信臣故陂渠遺跡而修復之假牛犂種食以誘耕者勸課勞來歲餘流民自歸及淮南湖北之民至者二千餘戶引水溉田幾數萬頃變磽瘠為膏腴監司上其狀三司使包拯亦以為言遂留再任治平中歲滿當去英宗嘉其勤且倚以興輯特進一官賜錢二十萬復留再任時患守令數易詔察其有實課者增秩再任而尚寬應詔為天下倡後太守高賦繼之亦以能勸課被奬留再任天下墾田景德中丁謂著會計錄云總得一百八十六萬餘頃以是歲七百二十二萬餘戶計之是四戶耕田一頃繇是而知天下隱田多矣又川峽廣南之田頃畝不備第以五賦約之至天聖中國史則云開寶末墾田二百九十五萬二千三百二十頃六十畝至道二年三百一十二萬五千二百五十一頃二十五畝天禧五年五百二十四萬七千五百八十四頃三十二畝而開寶之數乃倍於景德則謂之所錄固未得其實皇祐治平三司皆有會計錄而皇祐中墾田二百二十八萬餘頃治平中四百四十萬餘頃其間相去不及二十年而墾田之數增倍以治平數視天禧則猶不及而治平錄者以謂此特計其賦租以知頃畝之數而賦租所不加者十居其七率而計之則天下墾田無慮三千餘萬頃是時累朝相承重於擾民未嘗窮按故莫得其實而廢田見於籍者猶四十八萬頃治平四年詔曰歲比不登今春時雨農民桑蠶穀麥衆作勤勞一歲之功併在此時其委安撫轉運司敕戒州縣吏省事息民無奪其時諸路逃田三十年者除其稅十四四十年以上十五五十年以上六分百年以上七分佃及十年輸五分二十年輸七分著為令神宗熙寧元年襄州宜城令朱紘復修木渠溉田六千頃詔遷一官權京西轉運使謝景溫言在法請田戶五年內科役皆免今汝州四縣客戶不一二年便為舊戶糾抉與之同役因此即又逃竄田土荒萊欲乞置墾田務差官專領籍四縣荒田召人請射更不以其人隸屬諸縣版籍須五年乃撥附則五年內自無差科如招及千戶以上者優奬詔不置務餘從所請明年分遣諸路常平官使專領農田水利吏民能知土地種植之法陂塘圩𣲵堤堰溝洫利害者皆得自言行之有效隨功利大小酬賞民占荒逃田若歸業者責相保任逃稅者保任為輸之已行新法縣分田土頃畝川港陂塘之類令佐受代具墾闢開修之數授諸代者令照籍有實乃代中書議勸民栽桑帝曰農桑衣食之本民不敢自力者正以州縣約以為貲升其戶等耳宜申條禁於是司農寺請立法先行之開封視可行頒於天下民種桑柘毋得增賦安肅廣信順安軍保州令民即其地植桑榆或所宜木因可限閡戎馬官計其活茂多寡得差減在戶租數活不及數者罰責之補種興修水利田起熙寧三年至九年府界及諸路凡一萬七百九十三處為田三十六萬一千一百七十八頃有奇神宗元豐元年詔開廢田興水利民力不能給役者貸以常平錢穀京西南路流民買耕牛者免征五年都水使者范子淵奏自大名抵乾寧跨十五州河徙地凡七千頃乞募人耕種從之哲宗即位宣仁太后臨朝首起司馬光為門下侍郎委之以政詔天下臣民皆得以封事言民間疾苦光抗疏曰四民之中惟農最苦寒耕熱耘霑體塗足戴日而作戴星而息蠶婦治繭績麻紡緯縷縷而積之寸寸而成之其勤極矣而又水旱霜雹蝗蜮間為之災幸而收成公私之債交爭互奪穀未離場帛未下機已非己有所食者糠籺而不足所衣者綈褐而不完直以世服田畝不知舍此之外有何可生之路耳而况聚斂之臣於租稅之外巧取百端以邀功賞青苗則彊散重斂給陳納新免役則刻剝窮民收養浮食保甲則勞於非業之作保馬則困於無益之費可不念哉今者濬發德音使畎畝之民得上封事雖其言辭鄙雜皆身受實患直貢其誠不可忽也初熙寧六年立法勸民栽桑有不趨令則倣屋粟里布為之罰然長民之吏不能究宣德意民以為病至是楚丘民胡昌等言其不便詔罷之且蠲所負罰金興平縣抑民田為牧地民亦自言詔悉還之元祐四年詔瀕河州縣積水冒田在任官能為民經畫疏導溝畎退出良田自百頃至千頃第賞崇寧中廣南東路轉運判官王覺以開闢荒田幾及萬頃詔遷一官其後知州部使者以能課民種桑棗者率優其第秩焉政和六年立管幹圩岸圍岸官法在官三年無隳損堙塞者賞之京畿提點刑獄王本言前任提舉常平根括諸縣天荒瘠鹵地一萬二千餘頃入稻田務已佃者五千三百餘頃尚慮令佐不肯究心詔比開墾地格推賞平江府興修圍田二千餘頃令佐而下以差減磨勘年八年權淮南江浙荊湖制置發運使任諒奏高郵軍有逃田四百四十六頃楚州九百七十四頃泰州五百二十七頃平江府四百九十七頃以六路計之何可勝數欲諸縣專選官按籍根括詔逃田可專委縣丞無丞處委他官餘並從之宣和二年臣僚上言監司守令官帶勸農莫副上意欲立四證驗之按田萊荒治之迹較戶產登降之籍驗米穀貴賤之價考租賦盈虧之數四證具則其實著矣命中書審定取旨五年詔江東轉運司根括到逃田一百六十頃一十六畝兩浙根括到四百五十六頃召人出租專充今年增屯戍兵衣糧初政和中品官限田一品百頃以差降殺至九品為十頃限外之數並同編戶差科七年又詔內外宮觀捨置田在京不得過五十頃在外不得過三十頃不免科差徭役支移雖奉御筆許執奏不行建炎元年五月高宗即位命有司招誘農民歸業者振貸之蠲欠租免耕牛稅三年廣州州學教授林勳獻本政書十三篇大略謂國朝兵農之政大抵因唐末之故今農貧而多失職兵驕而不可用是以饑民竄卒類為盜賊宜倣古井田之制使民一夫占田五十畝其有羨田之家毋得市田其無田與游惰末作者皆使為隸農以耕田之羨者雜紐錢穀以為什一之稅本朝二稅之數視唐增至七倍今本政之制每十六夫為一井提封百里為三千四百井率稅米五萬一千斛錢萬二千緡每井賦二兵一馬率為兵六千八百人馬三千四百匹此方百里之縣所出賦稅之數歲取五之一以為上番之額以給征役無事則又分為四番以直官府以給守衞是民凡三十五年而役始一徧也悉上則歲食米萬九千餘斛錢三千六百餘緡無事則減四分之三皆以一同之租稅供之匹婦之貢絹三尺綿一兩百里之縣歲收絹四千餘匹綿三千四百斤非蠶鄉則布六尺麻二兩所收視綿絹倍之行之十年則民之口算官之酒酤與凡茶鹽香礬之榷皆可弛以予民其說甚備尋以勳為桂州節度掌書記建炎以來內外用兵所在多逃絕之田紹興二年四月詔兩浙路收買牛具貸淮東人戶七月詔知興國軍王綯知永興縣陳升率先奉詔誘民墾田各增一秩三年九月戶部言百姓棄產已詔二年外許人請射十年內雖已請射及充職田者並聽歸業孤幼及親屬應得財產者守令驗實給還冒占者論如律州縣奉行不虔監司按劾從之先是臣僚言近詔州縣拘籍被虜百姓稅賦而苛酷之吏不考其實其間有父母被虜兒女存者有中道脫者有全家被虜而親屬偶歸者一概籍沒人情皇皇故有是命十月募佃江東西閑田三等定租上田畝輸米一斗五升中田一斗下田七升四年貸廬州民錢萬緡以買耕牛五年五月立守令墾田殿最格殘破州縣墾田增及一分郡守升三季名次增及九分遷一官虧及一分降三季名次虧及九分鐫一官縣令差減之增虧各及十分者取旨賞罸其後以兩淮荊湖等路民稍復業而曠土尚多戶部復立格上之每州增墾田千頃縣半之守宰各進一秩州虧五百頃縣虧五之一皆展磨勘年詔頒之諸路增謂荒田開墾者虧謂熟田不因災傷而致荒者又令縣具歸業民數及墾田多寡月上之州州季上轉運轉運歲上戶部戶部置籍以考之七月都督行府言潭鼎岳澧荊南歸業之民其田已佃者以附近閑田與之免三年租稅無產願受閑田者亦與之上諭輔臣曰淮北之民襁負而至亦可給田以廣招徠之意六年減江東諸路逃田稅額知平江府章誼言民所甚苦者催科無法稅役不均彊宗巨室阡陌相望而多無稅之田使下戶為之破產乞委通判一員均平賦役九年宗正少卿方庭實言中原士民奔迸南州十有四年出違十年之限及流徙僻遠卒未能歸者望詔有司別立限年戶部議自新復降赦日為始再期五年如期滿無理認者見佃人依舊承佃中原士民流寓東南往往有墳墓或官拘籍或民冒占便行給還從之十一年復買牛貸淮南農戶十二年左司員外郎李椿年言經界不正十害且言平江歲入昔七十萬有奇今按籍雖三十九萬斛然實入纔二十萬耳詢之土人皆欺隱也望考按覈實自平江始然後施之天下則經界正而仁政行矣上謂宰執曰椿年之論頗有條理秦檜亦言其說簡易可行程克俊曰比年百姓避役正緣經界不正行之乃公私之利以椿年為兩浙路轉運副使措置經界椿年請先往平江諸縣俟就緒即往諸州要在均平為民除害不增稅額十三年以提舉洪州玉隆觀胡思直顯謨閣徐林議沮經界停官遠徙以民田不上稅簿者沒官稅簿不謹書者罪官吏時量田不實者罪至徒流江山尉汪大猷白椿年曰法峻民未喻固有田少而供多者願許陳首追正椿年為之輕刑省費甚衆十四年以椿年權戶部侍郎措置經界尋以母憂去以兩浙轉運副使王鈇權戶部侍郎措置十五年詔戶部及所遣官委曲措置務使賦稅均而無擾又因興國軍守臣宋時言詔諸州縣違期歸業者其田已佃及官賣者即以官田之可耕者給還十六年王鈇以疾罷十七年復以李椿年權戶部侍郎措置經界先是真州兵燼之餘瘡痍未復洪興祖為守請復租一年明年又請復之自是流民寖歸十八年墾荒田至七萬餘畝十九年詔敕令所刪定官鄭克行四川經界法克頗峻責州縣所謂省莊田者雖蔬果桑柘莫不有征而邛蜀民田至什稅其伍通判嘉州楊承曰仁政而虐行之非法意也上不違令下不擾民則仁政得矣召諸邑令謂曰平易近民美成在久其謹行之無愧於心何畏焉事迄成為列郡最其後民有訴不均者殿中侍御史曹筠劾椿年罷之上謂秦檜曰若下田受重稅將無以輸檜曰臣已諭戶部侍郎宋貺有未均處亟與改正二十年詔兩淮沃壤宜穀置力田科募民就耕以廣官莊知資州楊師錫言有司奉行失當田畝不分腴瘠市居丈尺隙田亦充稅產於是降詔曰椿年乞行經界去民十害今聞寖失本意凡便民者依已行害民者與追正二十一年四月宋貺罷二十六年正月上謂輔臣曰經界事李椿年主之若推行就緒不為不善今諸路往往中輟願得一通曉經界者款曲議之會潼川府轉運判官王之望上書言蜀中經界利害甚悉明年以之望提點刑獄畢經界事三月戶部言蜀地狹人夥而京西淮南膏腴官田尚多乞許人承佃官貸牛種八年乃償並邊免租十年次邊半之滿三年與其業願往者給據津發上曰善但貧民乍請荒田安能便得牛種若不從官貸未免為虛文可令相度支給四月通判安豐軍王時升言淮南土皆膏腴然地未盡闢民不加多者緣豪強虛占良田而無徧耕之力流民襁負而至而無開耕之地望凡荒閑田許人剗佃戶部議期以二年未墾者即如所請京西路如之詔以時升為司農寺丞十月用御史中丞湯鵬舉言離軍添差之人授以江淮湖南荒田人一頃為世業所在郡以一歲奉充牛種費仍免租稅十年丁役二十年二十八年王之望言去年分遣官詣經界不均縣裁正今已迄事此後吏民尚敢扇搖以疑百姓者乞重寘于法從之二十九年知潭州魏良臣言本州歸業之民以熟田為荒不輸租今令結甲輸稅自明年始不實許人告以其田賞之戶部議期踰百日依匿稅法詔可三十年初令純州平江縣民實田輸稅畝輸米二升四合孝宗隆興元年詔凡百姓逃棄田宅出二十年無人歸認者依戶絕法乾道元年正月都省言淮民復業宜先勸課農桑令丞植桑三萬株至六萬株守倅部內植二十萬株以上並論賞有差二月三省樞密院言歸正人貧乏者散居兩淮去冬淮民種麥甚廣逃亡未歸無人收穫詔諸郡量口均給其已歸業者毋例擾之四年知鄂州李椿奏州雖在江南荒田甚多請佃者開墾未幾便起毛稅度田追呼不任其擾旋即逃去令欲召人請射免稅三年三年之後為世業三分為率輸苗一分更三年增一分又三年全輸歸業者別以荒田給之又詔楚州給歸正人田及牛具種糧錢五萬緡六年二月詔曰朕深惟治不加進思有以正其本者今欲均役法嚴限田抑游手務農桑凡是數者卿等二三大臣為朕任之十有二月監進奏院李結獻治田三議一曰務本二曰協力三曰因時大略謂浙西低田恃堤為固若堤岸高厚則水不能入乞於蘇湖常秀諸州水田塘浦要處官以錢米貸田主乘此農隙作堰增令高闊則堤成而水不為患方此饑饉俾食其力因其所利而利之秋冬旱涸涇浜斷流車畎修築尤為省力詔令胡堅常相度以聞其後戶部以三議切當但工力浩瀚欲曉有田之家各依鄉原畝步出錢米與租田之人更相修築庶官無所費民不告勞從之七年二月知揚州晁公武奏朝廷以沿淮荒殘之久未行租稅民復業與創戶者雖阡陌相望然聞之官者十纔二三咸懼後來稅重昔晚唐民務稼穡則增其租故播種少吳越民墾荒田而不加稅故無曠土望詔兩淮更不增賦庶民知勸詔可十月司馬伋請勸民種麥為來春之計於是詔江東西湖南北淮東西路帥漕官為借種及諭大姓假貸農民廣種依賑濟格推賞仍上已種頃畝議賞罰九年王之奇奏增定力田賞格募人開耕荒田給官告綾紙以備書填及官會十萬緡充農具等用以種糧不足又詔淮東總領所借給稻三萬石淳熙五年詔湖北佃戶開墾荒田止輸舊稅若包占頃畝未悉開耕詔下之日期以二年不能徧耕者拘作營田其增稅剗佃之令勿行六年五月提舉浙西常平茶鹽顏師魯奏設勸課之法欲重農桑廣種植也今鄉民於己田連接閒曠磽确之地墾成田園用力甚勤或以未陳起稅為人所訟即以盜耕罪之何以勸力田哉止宜實田起稅非特可戢告訐之風亦見盛世重農之意詔可十有一月臣僚奏比令諸路帥漕督守令勸諭種麥歲上所增頃畝然土有宜否湖南一路唯衡永等數郡宜麥餘皆文具望止諭民以時播種免其歲上增種之數庶得勸課之實七年復詔兩浙江淮湖南京西路帥漕臣督守令勸民種麥務要增廣自是每歲如之八年五月詔曰迺者得天之時蠶麥既登及命近甸取而視之則穟短繭薄非種植風厲之功有所未至歟朕將稽勤惰而詔賞罰焉是歲連雨下田被浸詔兩浙諸州軍與常平司措置再借種糧與下戶播種毋致失時十有一月輔臣奏田世雄言民有麥田雖墾無種若貸與貧民猶可種春麥臣僚亦言江浙旱田雖已耕亦無麥種於是詔諸路帥漕常平司以常平麥貸之先是知揚州鄭良嗣言兩淮民田廣至包占多未起稅朝廷累限展首今限滿適旱乞更展一年詔如其請九年著作郎袁樞振兩淮還奏豪民占田不知其數二稅既免止輸穀帛之課力不能墾則廢為荒地他人請佃則以疆界為詞官無稽考是以野不加闢戶不加多而郡縣之計益窘望詔州縣畫疆立券占田多而輸課少者隨畝增之其餘閑田給與佃人庶幾流民有可耕之地而田萊不至多荒紹熙元年初朱熹為泉之同安簿知三郡經界不行之害至是知漳州會臣僚請行閩中經界詔監司條具事下郡熹訪問講求纖悉備至乃奏言經界最為民間莫大之利紹興已推行處公私兩利獨泉漳汀未行臣不敢先一身之勞逸而後一州之利病切獨任其必可行也然必推擇官吏委任責成度量步畝算計精確畫圖造帳費從官給隨產均稅特許過鄉通縣均紐庶幾百里之內輕重齊同今欲每畝隨九等高下定計產錢而合一州租稅錢米之數以產錢為母每文輸米幾何錢幾何止於一倉一庫受納既輸之後却視元額分隸為省計為職田為學糧為常平各撥入諸倉庫版圖一定則民業有經矣但此法之行貧民下戶固所深喜然不能自達其情豪家猾吏實所不樂皆善為說辭以惑羣聽賢士大夫之喜安靜厭紛擾者又或不深察而望風沮怯此則不能無慮輔臣請行于漳州明年春詔漕臣陳公亮同熹協力奉行會農事方興熹益加講究冀來歲行之細民知其不擾而利於己莫不鼓舞而貴家豪右占田隱稅侵漁貧弱者胥為異論以搖之前詔遂格熹請祠去五年蠲廬州旱傷百姓貸稻種三萬二千一百石慶元元年二月上以歲凶百姓飢病詔曰朕德菲薄饑饉荐臻使民阽於死亡夙夜慘怛寧敢諉過於下耶顧使者守令所與朕分寄而共憂也乃涉春以來聞一二郡老稚乏食去南畝捐溝壑咎安在耶豈振給不盡及民歟得粟者未必饑饑者未必得歟偏聚於所近不能均濟歟官吏視成而不自省歟其各恪意措畫務使實惠不壅毋以虛文蒙上則朕汝嘉寧宗開禧元年夔路轉運判官范蓀言本路施黔等州荒遠綿亘山谷地曠人稀其占田多者須人耕墾富豪之家誘客戶舉室遷去乞將皇祐官莊客戶逃移之法校定凡為客戶者許役其身毋及其家屬凡典賣田宅聽其離業毋就租以充客戶凡貸錢止憑文約交還毋抑勒以為地客凡客戶身故其妻改嫁者聽其自便女聽其自嫁庶使深山窮谷之民得安生理刑部以皇祐逃移舊法輕重適中可以經久淳熙比附略人之法太重今後凡理訴官莊客戶並用皇祐舊法從之嘉定八年左司諫黃序奏雨澤愆期地多荒白知餘杭縣趙師恕請勸民雜種麻粟豆麥之屬蓋種稻則費少利多雜種則勞多獲少慮收成之日田主欲分官課責輸則非徒無益若使之從便雜種多寡皆為己有則不勸而勤民可無饑望如所陳下兩浙兩淮江東西等路凡有耕種失時者並令雜種主毋分其地利官毋取其秋苗庶幾農民得以續食官免振救之費從之知婺州趙𢥞夫行經界於其州整有倫緒而𢥞夫報罷士民相率請于朝乃命趙師喦繼之後二年魏豹文代師喦為守行之益力於是向之上戶析為貧下之戶實田隱為逃絕之田者粲然可考凡結甲冊戶產簿丁口簿魚鱗圖類姓簿二十三萬九千有奇創庫匱以藏之歷三年而後上其事于朝淳祐二年九月赦曰四川累經兵火百姓棄業避難官以其曠土權耕屯以給軍食及民歸業占據不還自今凡民有契券界至分明所在州縣屯官隨即歸還其有違戾許民越訴重罪之六年殿中侍御史兼侍講謝方叔言豪強兼幷之患至今日而極非限民名田有所不可是亦救世道之微權也國朝駐蹕錢塘百有二十餘年矣外之境土日荒內之生齒日繁權勢之家日盛兼幷之習日滋百姓日貧經制日壞上下煎迫若有不可為之勢所謂富貴操柄者若非人主之所得專識者懼焉夫百萬生靈資生養之具皆本於穀粟而穀粟之產皆出於田今百姓膏腴皆歸貴勢之家租米有及百萬石者小民百畝之田頻年差充保役官吏誅求百端不得已則獻其產於巨室以規免役小民田日減而保役不休大官田日增而保役不及以此弱之肉彊之食兼幷浸盛民無以遂其生於斯時也可不嚴立經制以為之防乎去年諫官嘗以限田為說朝廷付之悠悠不知今日國用邊餉皆仰和糴然權勢多田之家和糴不容以加之保役不容以及之敵人睥睨於外盜賊窺伺於內居此之時與其多田厚貲不可長保曷若捐金助國共紓目前在轉移而開導之耳乞諭二三大臣摭臣僚論奏而行之使經制以定兼幷以塞于以尊朝廷于以裕國計陛下勿牽貴近之言以搖初意大臣勿避仇怨之多而廢良策則天下幸甚從之十一年九月赦曰監司州縣不許非法估籍民產戒非不嚴而貪官暴吏往往不問所犯輕重不顧同居有分財產壹例估籍殃及平民或戶絕之家不與命繼或經陳訴許以給還輒假他名支破竟成乾沒或有典業不聽收贖遂使產主無辜失業違戾官吏重寘典憲是歲信常饒州嘉興府舉行經界景定元年九月赦曰州縣檢校孤幼財產往往便行侵用洎至年及陳乞多稱前官用過不即給還自今如尚違戾以吏業估償官論以違制不以去官赦降原減咸淳元年監察御史趙順孫言經界將以便民雖窮閻下戶之所深願而未必豪宗大姓之所盡樂自非有以深服其心則亦何以使其情意之悉孚哉且今之所謂推排非昔之所謂自實也推排者委之鄉都則徑捷而易行自實者責之於人戶則散漫而難集嘉定以來之經界時至近也官有正籍鄉都有副籍彪列昈分莫不具在為鄉都者不過按成牘而更業主之姓名若夫紹興之經界其時則遠矣其籍之存者寡矣因其鱗差櫛比而求焉由一而至百由百而至千由千而至萬稽其畝步訂其主佃亦莫如鄉都之便也朱熹所以主經界而闢自實者正謂是也州縣能守朝廷鄉都任責之令又隨諸州之便宜而為之區處當必人情之悉孚不令而行矣從之三年司農卿兼戶部侍郎季鏞言夫經界嘗議修明矣而修明卒不行嘗令自實矣而自實卒不竟豈非上之任事者每欲避理財之名下之不樂其成者又每倡為擾民之說故寧坐視邑政之壞而不敢詰猾吏姦民之欺寧忍取下戶之苛而不敢受豪家大姓之怨蓋經界之法必多差官吏必悉集都保必徧走阡陌必盡量步畝必審定等色必紐折計等姦弊轉生久不迄事乃若推排之法不過以縣統都以都統保選任才富公平者訂田畝稅色載之圖冊使民有定產產有定稅稅有定籍而已臣守吳門巳嘗見之施行今聞紹興亦漸就緒湖南漕臣亦以一路告成竊謂東南諸郡皆奉行惟謹其或田畝未實則令鄉局釐正之圖冊未備則令縣局程督之又必郡守察縣之稽違監司察郡之怠弛嚴其號令信其賞罰期之秋冬以竟其事責之年歲以課其成如周官日成月要歲會以綜核之於是詔諸路漕帥施行焉大抵南渡後水田之利富於中原故水利大興而諸籍沒田募民耕者皆仍私租舊額每失之重輸納之際公私事例迥殊私租額重而納輕承佃猶可公租額重而納重則佃不堪命州縣胥吏與倉庾百執事之人皆得為侵漁之道於耕者也季世金人乍和乍戰戰則軍需浩繁和則歲幣重大國用常苦不繼於是因民苦官租之重命有司括賣官田以給用其初弛其力役以誘之其終不免於抑配此官田之弊也嘉定以後又有所謂安邊所田收其租以助歲幣至其將亡又限民名田買其限外所有謂之公田初議欲省和糴以紓民力而其弊極多其租尤重宋亡遺患猶不息也凡水田官田之法公田見於史者彙其始末而悉載于篇有足鑒者焉紹興元年詔宣州太平州守臣修圩二年以修圩錢米及貸民種糧並於宣州常平義倉米撥借三年定州縣圩田租額充軍儲建康府永豐圩租米歲以三萬石為額圩四至相去皆五六十里有田九百五十餘頃近歲墾田不及三之一至是始立額五年江東帥臣李光言明越之境皆有陂湖大抵湖高於田田又高於江海旱則放湖水溉田澇則決田水入海故無水旱之災本朝慶曆嘉祐間始有盜湖為田者其禁甚嚴政和以來創為應奉始廢湖為田自是兩州之民歲被水旱之患餘姚上虞每縣收租不過數千斛而所失民田常賦動以萬計莫若先罷兩邑湖田其會稽之鑑湖鄞之廣德湖蕭山之湘湖等處尚多望詔漕臣盡廢之其江東西圩田蘇秀圍田令監司守令條上於是詔諸路漕臣議之其後議者雖稱合廢竟仍其舊初五代馬氏於潭州東二十里因諸山之泉築堤瀦水號曰龜塘溉田萬頃其後堤壞歲旱民皆阻飢七年守臣呂頤浩始募民修復以廣耕稼十六年知袁州張成己言江西良田多占山岡望委守令講陂塘灌溉之利其後比部員外郎李泳言淮西高原處舊有陂塘請給錢米以時修濬知江陰軍蔣及祖亦請濬治本軍五卸溝以洩水修復橫河支渠以溉旱乃並詔諸路常平司行之每季以施行聞二十三年諫議大夫史才言浙西民田最廣而平時無甚害者太湖之利也近年瀕湖之地多為兵卒侵據累土增高長堤彌望名曰壩田旱則據之以溉而民田不沾其利澇則遠近泛濫不得入湖而民田盡沒望盡復太湖舊迹使軍民各安田疇均利從之二十四年大理寺丞周環言臨安平江湖秀四州下田多為積水所浸緣溪山諸水併歸太湖自太湖分二派東南一派由松江入于海東北一派由諸浦注之江其沿江泄水惟白茅一浦最大今泥沙淤塞宜決浦故道俾水勢分派流暢實四州無窮之利詔兩浙漕臣視之二十八年兩浙轉運副使趙子潚知平江府蔣璨言太湖者數州之巨浸而獨洩以松江之一川宜其勢有所不逮是以昔人於常熟之北開二十四浦疏而導之江又於崑山之東開一十二浦分而納之海三十六浦後為潮汐沙積而開江之卒亦廢於是民田有淹沒之患天聖間漕臣張綸嘗於常熟崑山各開衆浦景祐間郡守范仲淹亦親至海浦濬開五河政和間提舉官趙霖復嘗開濬今諸浦湮塞又非前比計用工三百三十餘萬錢三十三萬餘緡米十萬餘斛於是詔監察御史任古復視之既而古至平江言常熟五浦通江誠便若依所請以五千功月餘可畢詔以激賞庫錢平江府上供米如數給之二十九年子潚又言父老稱福山塘與丁涇地勢等若不濬福山塘則水必倒注于丁涇乃命併濬之隆興二年八月詔江浙水利久不講修勢家圍田堙塞流水諸州守臣按視以聞於是知湖州鄭作肅知宣州許尹知秀州姚憲知常州劉唐稽並乞開圍田濬港瀆詔湖州委朱夏卿秀州委曾㔶平江府委陳彌作常州江陰軍委葉謙亨宣州太平州委沈樞措置九月刑部侍郎吳芾言昨守紹興嘗請開鑑湖廢田二百七十頃復湖之舊水無泛溢民田九千餘頃悉獲倍收今尚有低田二萬餘畝本亦湖也百姓交佃畝直纔兩三緡欲官給其半盡廢其田去其租戶部請符浙東常平司同紹興府守臣審細標遷從之乾道二年四月詔漕臣王炎開浙西勢家新圍田草蕩荷蕩菱蕩及陂湖溪港岸際旋築堘畦圍𩹉耕種者所至守令同共措置炎既開諸圍田凡租戶貸主家種糧債負並奏蠲之六月知秀州孫大雅代還言州有柘湖澱山湖當湖陳湖支港相貫西北可入于江東南可達于海旁海農家作壩以却鹹潮雖利及一方而水患實害鄰郡設疏導之則又害及旁海之田若於諸港浦置牐啟閉不惟可以洩水而旱亦獲利然工力稍大欲率大姓出錢下戶出力於農隙修治之於是以兩浙轉運副使姜詵與守臣視之詵尋與秀常州平江府江陰軍條上利便詔秀州華亭縣張涇牐幷澱山東北通陂塘港淺處俟今年十一月興修江陰軍常州蔡涇牐及申港明年春興修利港俟休役一年興修平江府姑緩之三年三月詵使還奏開濬畢功通洩積水久浸民田露出堘岸臣已諭民趁時耕種恐下戶闕本良田復荒望令浙西常平司貸給種糧又奏措置提督監修等官知江陰軍徐藏等減磨勘年有差四年以彭州守臣梁介修復三縣一十餘堰灌溉之利及於鄰邦詔介直祕閣利路轉運判官七年王炎言興元府山河堰世傳漢蕭曹所作本朝嘉祐中提舉史炤上堰法獲降敕書刻石堰上紹興以來戶口凋疏堰事荒廢遂委知興元府吳拱修復發卒萬人助役宣撫司及安撫都統司共用錢三萬一千餘緡盡修六堰濬大小渠六十五里凡溉南鄭褒城田二十三萬三千畝有奇詔奬諭拱九年戶部侍郎兼樞密都承旨葉衡言奉詔覈實寧國府太平州圩岸內寧國府惠民化成舊圩四十餘里新築九里餘太平州黃池鎮福定圩周四十餘里延福等五十四圩周一百五十餘里包圍諸圩在內蕪湖縣圩周二百九十餘里通當塗圩共四百八十餘里並高廣堅緻瀕水一岸種植榆柳足捍風濤詢之農民實為水利於是詔奬諭判寧國府魏王愷略曰大江之壖其地廣袤使水之蓄洩不病而皆為膏腴者圩之為利也然水土鬥齧從昔善壞卿聿修稼政巨防屹然有懷勤止深用歎嘉九年八月臣僚言江西連年荒旱不能預興水利為之備於是乃降詔曰朕惟旱乾水溢之災堯湯盛時有不能免民未告病者備先具也豫章諸郡縣但阡陌近水者苗秀而實高卬之地雨不時至苗輒就槁意水利不修失所以為旱備乎唐韋丹為江西觀察使治陂塘五百九十八所灌田萬二千頃此特施之一道其利如此矧天下至廣也農為生之本也泉流灌溉所以毓五穀也今諸道名山川原甚衆民未知其利然則通溝瀆瀦陂澤監司守令顧非其職歟其為朕相丘陵原隰之宜勉農桑盡地利平繇行水勿使失時雖有豐凶而力田者不至拱手受弊亦天人相因之理也朕將即勤惰而寓賞罰焉淳熙二年兩浙轉運判官陳峴言昨奉詔徧走平江府常州江陰軍諭民併力開濬利港諸處並已畢功始欲官給錢米歲不下數萬今皆百姓相率效力而成詔常熟知縣劉穎特增一秩餘論賞有差三年賜皇子判明州魏王愷詔曰陂湖川澤之利或通或塞存乎其人四明為州實治鄞鄞之鄉東西凡十四而錢湖之水實溉其東之七吏惰不虔葑菼蕪翳利失其舊農人病焉卿臨是邦乃能講求利便而濬治之遂使並湖七鄉之田無異時旱乾之患其為澤豈淺哉剡奏徹聞不忘嘉歎十年大理寺丞張抑言陂澤湖塘水則資之瀦洩旱則資之灌溉近者浙西豪宗每遇旱歲占湖為田築為長堤中植榆柳外捍茭蘆於是舊為田者始隔水之出入蘇湖常秀昔有水患今多旱災蓋出於此乞責縣令毋給據尉警捕監司覺察有圍裹者以違制論給據與失察者併坐之既而漕臣錢沖之請每圍立石以識之共一千四百八十九所令諸郡遵守焉紹熙二年詔守令到任半年後具水源湮塞合開修處以聞任滿日以興修水利圖進擇其勞效著明者賞之慶元二年戶部尚書袁說友等言浙西圍田相望皆千百畝陂塘漊瀆悉為田疇有水則無地可瀦有旱則無水可戽不嚴禁之後將益甚無復稔歲矣嘉泰元年以大理司直留佑賢宗正寺主簿李澄措置自淳熙十一年立石之後凡官民圍裹者盡開之又令知縣並以點檢圍田事入銜每歲三四月同尉點檢有無姦民圍裹狀上于州州聞于朝三年遣官審視及委臺諫察之二年二月佑賢澄使還奏追毀臨安平江嘉興湖常開掘戶元給佃據三月右正言施康年言近屬貴戚不體九重愛民之心止為一家營私之計公然投牒以沮成法乞戒飭自今有陳狀者指名奏劾必罰無赦開禧二年以淮農流移無田可耕詔兩浙州縣已開圍田許元主復圍專召淮農租種嘉定三年臣僚言竊聞豪民巨室並緣為姦加倍圍裹又影射包占水蕩有妨農民灌溉於是復詔浙西提舉司俟農隙開掘七年復臨安府西湖舊界盡蠲歲增租錢十七年臣僚言越之鑑湖溉田幾半會稽興化之木蘭陂民田萬頃歲飲其澤今官豪侵占填淤益狹宜戒有司每歲省視厚其瀦蓄去其壅底毋容侵占以妨灌溉皆次第行之寶慶元年以右諫議大夫朱端常奏除嘉泰間已開浙西圍田租錢蓋稅額尚存州縣迫民白納故也寶祐元年史館校勘黃國面對圍田自淳熙十一年識石者當存之復圍者合權其利害輕重而為之存毀其租或歸總所或隸安邊所或分隸諸郡上曰安邊所田近已撥歸本所國又奏自丁未已來創圍之田始因殿司獻草蕩任事者欲因以為功凡旱乾處悉圍之利少害多宜開掘以通水道上然之咸淳十年以江東水傷除九年圩田租減四分紹興二十七年趙子潚奉詔措置鎮江府沙田欲輕立租課令見佃者就耕如勢家占吝追日前所收租利詔速拘其田措置蠲其冒佃之租二十八年正月詔戶部員外郎莫濛同浙西江東淮南漕臣趙子潚鄧根孫藎視諸路沙田蘆場先是言者謂江淮間沙田蘆場為人冒占歲失官課至多故以命濛等既而殿中侍御史葉義問言奉行者不恤百姓名為經量實逼縣官按圖約紐惟務增數以希進用有力之家初無加損貧民下戶已受其害因小利擾之必致逃移坐失稅額因極論之二月詔沙田蘆場止為勢家詭名冒占其三等以下戶勿例根括六月以孫藎措置沙田滅裂罷之詔浙西江東沙田蘆場官戶十頃民戶二十頃以上並增租餘如舊置提領官田所掌之不隸戶部二十九年以莫濛經量沙田蘆場失實責監饒州景德鎮稅遂詔盡罷所增租三十二年九月趙子潚言浙西江東淮東沙田往年經量有不盡不實處為人戶包占期以今冬自陳給為己業與免租稅之半過期許人告以全戶所租田賞之其蘆場量立輕租詔以馮方措置十有一月方滋疏論沙田上問沙田或以為可取或以為可捐陳康伯等奏君子小人各從其類小人樂於生事不惜為國斂怨君子務存大體唯恐有傷仁政所以不同上然之命止前詔勿行乾道元年臣僚言浙西江東淮東路沙田蘆場頃畝浩瀚宜立租稅補助軍食詔復令梁俊彥與張津等措置二年輔臣奏俊彥所上沙田蘆場之稅或十取其一或取其二或取其三皆不分主客朝廷疑之六年以俊彥所括沙田蘆場二百八十餘萬畝其間或已充己業起稅不一及包占未起租者乞並估賣立租詔蔡洸梁俊彥行在置司措置八年七月詔提領官田所所催三路沙田蘆場租錢併歸戶部十月遣官實江淮沙田蘆場頃畝悉追正之建炎元年籍蔡京王黼等莊以為官田詔見佃者就耕歲減租二分三年凡天下官田令民依鄉例自陳輸租紹興元年以軍興用度不足詔盡鬻諸路官田五年詔諸官田比鄰田租召人請買佃人願買者聽佃及三十年以上者減價十之二六年詔諸路總領諭民投買戶絕沒官賊徒田舍及江漲沙田海退泥田七年以賊徒田舍及逃田充官莊其沒官田依舊出賣二十年凡沒官田城空田戶絕房廊及田並撥隸常平司轉運提刑茶鹽司沒入田亦如之二十一年以大理寺主簿丁仲京言凡學田為勢家侵佃者命提學官覺察又命撥僧寺常住絕產以贍學戶部議併撥無敕額庵院田詔可初閩以福建六郡之田分三等膏腴者給僧寺道院中下者給土著流寓自劉夔為福州始貿易取貲迨張守帥閩紹興二年秋上倚以拊循凋瘵存上等四十餘刹以待高僧餘悉令民請買歲入七八萬緡以助軍衣餘寬百姓雜科民皆便之二十六年以諸路賣官田錢七分上供三分充常平司糴本初盡鬻官田議者恐佃人失業未賣者失租侍御史葉義問言今盡鬻其田立為正稅田既歸民稅又歸官不獨絕欺隱之弊又可均力役之法浙東刑獄使者邵大受亦乞承買官田者免物力三年至十年一千貫以下免三年一千貫以上五年五千貫以上十年於是詔所在常平沒官戶絕田已佃未佃已添租未添租並拘賣二十九年初兩浙轉運司官莊田四萬二千餘畝歲收稻麥等四萬八千餘斛營田九十二萬六千餘畝歲收稻麥雜豆等十六萬七千餘斛充行在馬料及糴錢四月詔令出賣七月詔諸路提舉常平官督察欺弊申嚴賞罰分水令張升佐宜興令陳以賣田稽違各貶秩罷任九月浙東提舉常平都絜以賣田最多增一秩三十年詔承買荒田者免三年租乾道二年戶部侍郎曾懷言江西路營田四千餘頃已佃一千九百餘頃租錢五萬五百餘貫若出賣可得六萬五千餘貫及兩浙轉運司所括已佃九十餘萬畝合而言之為數浩瀚今欲遵元詔見佃願買者減價二分詔曾懷等提領出賣其錢輸左藏南庫別貯之四年四月江東路營田亦令見佃者減價承買期以三月賣絕八月住賣諸路未賣營田轉運司收租七年提舉浙西常平李結乞以見管營田撥歸本司同常平田立官莊梁克家亦奏戶部賣營田率為有力者下價取之稅入甚微不如置官莊歲可得五十萬斛八年以大理寺主簿薛季宣於黃岡麻城立官莊二十二所九年以司農寺丞葉翥等出賣浙東西路諸官田以監登聞檢院張孝賁等出賣江東西路諸官田以郎官薛元鼎拘催江浙閩廣賣官田錢四百餘萬緡淳熙元年臣僚言出賣官田二年之間三省戶部困於文移監司州郡疲於出賣上下督責不為不至始限一季繼限一年已賣者纔十三已輸者纔十二蓋買產之家無非大姓估價之初以上色之產輕立價貫揭榜之後率先投狀若中下之產無人屬意所立之價輕重不均莫若且令元佃之家著業輸租歲猶可得數十萬斛從之六年詔諸路轉運常平司凡沒官田營田沙田沙蕩之類復括數賣之紹熙四年以臣僚言住賣慶元元年八月江東轉運提舉司以紹熙四年住賣以後續沒官田依鄉價復召人承買以其錢充常平糴本十有一月余端禮鄭僑言福建地狹人稠無以贍養生子多不舉福建提舉宋之瑞乞免鬻建劍汀邵沒官田收其租助民舉子之費詔從之四年詔諸路召賣不行田覆實減價其沙礫不可耕處除之開禧三年韓侂冑既誅金人講解明年用廷臣言置安邊所凡侂冑與其他權倖沒入之田及圍田湖田之在官者皆隸焉輸米七十二萬二千七百斛有奇錢一百三十一萬五千緡有奇藉以給行人金繒之費迨與北方絕好軍需邊用每於此取之景定四年殿中侍御史陳堯道右正言曹孝慶監察御史虞虙張睎顏等言廩兵和糴造楮之弊乞依祖宗限田議自兩浙江東西官民戶踰限之田抽三分之一買充金田得一千萬畝之田則歲有六七百萬斛之入可以餉軍可以免糴可以重楮可以平物而安富一舉而五利具矣有旨從其言朝士有異議者丞相賈似道奏救楮之策莫切於住造楮住造楮莫切於免和糴免和糴莫切於買踰限田因歷詆異議者之非帝曰當一意行之浙西安撫魏克愚言取四路民田立限回買所以免和糴而益邦儲議者非不自以為公且忠也然未見其利而適見其害近給事中徐經孫奏記丞相言江西買田之弊甚詳若浙西之弊則尤有甚於經孫所言者因歷述其為害者八事疏奏不省六郡回買公田畝起租滿石者償二百貫九斗者償一百八十貫八斗者償一百六十貫七斗者償一百四十貫六斗者償一百二十貫五千畝以上以銀半分官告五分度牒二分會子二分半五千畝以下以銀半分官告三分度牒三分會子三分半千畝以下度牒會子各半五百畝至三百畝全以會子是歲田事成每石官給止四千貫而半是告牒民持之而不得售六郡騷然所遣劉良貴陳爻石趙與爻石廖邦傑成公策等推賞有差邦傑之在常州害民特甚民至有本無田而以歸併抑買自經者分置莊官催租州縣督莊官及時交收運發五年選官充官田所分司平江嘉興安吉各一員常州江陰鎮江共一員凡公田事悉以委之是歲七月彗見于東方下詔求言京學生蕭規葉李等三學六館皆上封章前祕書監高斯得亦應詔馳驛上封事力陳買田之失人心致天變謝枋得校文江東運司方山京校文天府皆指陳得失未幾蕭規等真決黥隸枋得山京相繼被劾斯得雖予郡尋罷之咸淳三年京師糴貴勒平江嘉興上戶運米入京鞭笞囚繫死於非命者十七八太常寺簿陸逵謂買田本以免和糴今勒其運米害甚於前似道怒出逵知台州未至怖死四年以差置莊官弊甚盡罷之令諸郡公租以三千石為一莊聽民於分司承佃盜易者以盜賣官田論其租於先減二分上更減一分德祐元年三月詔公田最為民害稔怨召禍十有餘年自今並給佃主令率其租戶為兵而宋祚訖矣
