body:
  text: 宋史卷一百七十七志第一百三十食貨上五役法上役法役出於民州縣皆有常數宋因前代之制以衙前主官物以里正戶長鄉書手課督賦稅以耆長弓手壯丁逐捕盜賊以承符人力手力散從官給使令縣曹司至押錄州曹司至孔目官下至雜職虞候揀搯等人各以鄉戶等第定差京百司補吏須不礙役乃聽建隆中詔文武官內諸司臺省寺監諸軍諸使不得占州縣課役戶州縣不得役道路居民為遞夫後又詔諸州職官不得私占役戶供課京西轉運使程能請定諸州戶為九等著于籍上四等量輕重給役餘五等免之後有貧富隨時升降詔加裁定淳化五年始令諸縣以第一等戶為里正第二等戶為戶長勿冒名以給役自餘衆役多調廂軍大中祥符五年提點刑獄府界段惟幾發中牟縣夫二百修馬監倉羣牧制置使代以卒因下詔禁之惟詔令有大興作而後調丁夫然役有輕重勞佚之不齊人有貧富彊弱之不一承平既久姦偽滋生命官形勢占田無限皆得復役衙前將吏得免里正戶長而應役之戶困於繁數偽為券售田於形勢之家假佃戶之名以避徭役乾興初始立限田法形勢敢挾他戶田者聽人告予所挾田三之一時州縣既廣徭役益衆太常博士范諷知廣濟軍因言軍地方四十里戶口不及一縣而差役與諸郡等願復為縣轉運司執不可因詔裁損役人自是數下詔書督州縣長吏與轉運使議蠲冗役以寬民力又令州縣錄丁產及所產役使前期揭示不實者民得自言役之重者自里正鄉戶為衙前主典府庫或輦運官物往往破產景祐中稍欲寬其法乃命募人充役初官八品以下死者子孫役同編戶至是詔特蠲之民避役者或竄名浮圖籍號為出家趙州至千餘人詔出家者須落髮為僧乃聽免役禁諸縣非捕盜毋擅役壯丁慶曆中令京東西河北陝西河東裁損役人即給使不足益以廂兵既而詔諸路轉運司條析州縣差徭賦斂之數委二府大臣裁減科役不均以鄉村坊郭戶均差時范仲淹執政謂天下縣多故役蕃而民瘠首廢河南諸縣欲以次及他州當時以為非未幾悉復王逵為荊湖轉運使率民輸錢免役得緡錢三十萬進為羨餘蒙詔奬繇是他路競為掊克以市恩皇祐中詔州縣里正押司錄事既代而令輸錢免役者論如違制律又禁役鄉戶為長名衙前初知并州韓琦上疏曰州縣生民之苦無重於里正衙前有孀母改嫁親族分居或棄田與人以免上等或非命求死以就單丁規圖百端苟免溝壑之患每鄉被差疎密與貲力高下不均假有一縣甲乙二鄉甲鄉第一等戶十五戶計貲為錢三百萬乙鄉第一等戶五戶計貲為錢五十萬番休遞役即甲鄉十五年一周乙鄉五年一周富者休息有餘貧者敗亡相繼豈朝廷為民父母意乎請罷里正衙前命轉運司以州軍見役人數為額令佐視五等簿通一縣計之籍皆在第一等選貲最高者一戶為鄉戶衙前後差人放此即甲縣戶少而役蕃聽差乙縣戶多而役簡者簿書未盡實聽換取他戶里正主督租賦請以戶長代之二年一易下其議京畿河北河東陝西京東西轉運司度利害皆以為便而知制誥韓絳蔡襄極論江南福建里正衙前之弊絳請行鄉戶五則之法襄請以產錢多少定役重輕至和中命絳襄與三司置司參定繼遣尚書都官員外郎吳幾復趨江東殿中丞蔡稟趨江西與長吏轉運使議可否因請行五則法凡差鄉戶衙前視貲產多寡置籍分為五則又第其役輕重放此假有第一等重役十當役十人列第一等戶百第二等重役五當役五人列第二等戶五十以備十番役使藏其籍通判治所遇差人長吏以下同按視之轉運使提點刑獄察其違慢遂更著淮南江南兩浙荊湖福建之法下三司頒焉自罷里正衙前民稍休息又詔諸路轉運司開封府界訪衙前之役有重為害者條奏之能件悉便利大去勞弊者議賞置寬恤民力司遣使四出自是州縣力役多所裁損凡二萬三千六百二十二人治平四年詔曰農天下之大本也間因水旱頗致流離殆州郡差役之法甚煩其詔中外臣庶條陳利害以聞先是三司使韓絳言聞京東民有父子二丁將為衙前役者其父告其子曰吾當求死使汝曹免於凍餒遂自縊而死又聞江南有嫁其祖母及與母析居以避役者又有鬻田減其戶等者田歸官戶不役之家而役并於同等見存之戶望博訪利害集議裁定使力役無偏重之害役法更議始此熙寧元年知諫院吳充言今鄉役之中衙前為重民間規避重役土地不敢多耕而避戶等骨肉不敢義聚而憚人丁故近年上戶寖少中下戶寖多役使頻仍生資不給則轉為工商不得已而為盜賊宜早定鄉役利害以時施行後帝閱內藏庫奏有衙前越千里輸金七錢庫吏邀乞踰年不得還者帝重傷之乃詔制置條例司講立役法二年遣劉彝謝卿材侯叔獻程顥盧秉王汝翼曾伉王廣廉八人行諸路相度農田水利稅賦科率徭役利害條例司檢詳文字蘇轍言役人之不可不用鄉戶猶官吏之不可不用士人也今遂欲兩稅之外別立一科謂之庸錢以備官雇不問戶之高低例使出錢上戶則便下戶實難轍以議不合罷條例司言使民出泉雇役即先王致民財以祿庶人在官者之意願以條目遣官分行天下博盡衆議於是條諭諸路曰衙前既用重難分數凡買撲酒稅坊場舊以酬衙前者從官自賣以其錢同役錢隨分數給之其廂鎮場務之類舊酬奬衙前不可令民買占者即用舊定分數為投名衙前酬奬如部水陸運及領倉驛場務公使庫之類其舊煩擾且使陪備者今當省使毋費承符散從官等舊苦重役償欠者今當改法除弊庶使無困凡有產業物力而舊無役者今當出泉以助役久之司農寺言今立役條所寬優者皆村鄉朴惷不能自達之窮甿所裁取者乃仕宦兼幷能致人言之豪右若經制一定則衙司縣吏無以施誅求巧舞之姦故新法之行尤所不便欲先自一兩州為始候其成就即令諸州軍倣視施行若實便百姓當特奬之詔可於是提點府界公事趙子幾奏上府界所在條目下之司農詔判寺鄧綰曾布更議之綰布言畿內鄉戶計產業若家資之貧富上下分為五等歲以夏秋隨等輸錢鄉戶自四等坊郭自六等以下勿輸兩縣有產業者上等各隨縣中等併一縣輸析居者隨所析而定降其等若官戶女戶寺觀未成丁減半輸皆用其錢募三等以上稅戶代役隨役重輕制祿開封縣戶二萬二千六百有奇歲輸錢萬二千九百緡以萬二百為祿贏其二千七百以備凶荒欠閣他縣倣此然輸錢計等高下而戶等著籍昔緣巧避失實乃詔責郡縣坊郭三年鄉村五年農隙集衆稽其物產考其貧富察其詐偽為之升降若故為高下者以違制論募法三人相任衙前仍供物產為抵弓手試武藝典吏試書計以三年或二年乃更為法既具揭示一月民無異辭著為令令下募者執役被差者得散去開封一府罷衙前八百三十人畿縣鄉役數千遂頒其法於天下天下土俗不同役重輕不一民貧富不等從所便為法凡當役人戶以等第出錢名免役錢其坊郭等第戶及未成丁單丁女戶寺觀品官之家舊無色役而出錢者名助役錢凡敷錢先視州若縣應用雇直多少隨戶等均取雇直既已用足又率其數增取二分以備水旱欠閣雖增毋得過二分謂之免役寬剩錢三年命集賢校理呂惠卿同判司農寺已而林旦曾布相繼典主其事四年罷許州衙前幹公使庫以軍校主之月給食錢三千後行於諸路人皆便之兩浙提點刑獄王庭老提舉常平張靚率民助役錢至七十萬薛向為帝言帝問王安石安石曰提舉官據數取之朝廷以恩惠科減於體為順御史中丞楊繪亦言靚等科配民輸錢多者一戶至三百千乞少裁損以安民心五月東明縣民數百詣開封府訴超升等第不受遂突入王安石私第安石諭以相府不知訴之御史臺臺不受訴諭令散去楊繪又言司農寺不用舊則自據戶數創立助役錢等第下縣令著之籍如酸棗縣升戶等皆失實帝乃命提點司究所從升降仍嚴升降之法畿民不願輸錢免役縣案所當供役歲月如期役之與免輸錢先是帝既知東明事及聞繪言兩降手敕問王安石曰酸棗既有自下戶升入上戶則四等有免輸役錢之名而無其實安石力言嘗取諸縣新舊籍對覆升降聞外間扇搖役法者謂輸多必有贏餘若羣訴必可免彼既聚衆僥倖苟受其訴與免輸錢當仍役之帝乃盡用其言中書孫迪張景溫體量不願出錢之民欲困以重役楊繪復論之而監察御史劉摯謂昨者團結保甲民方驚擾又作法使人均出緡錢非時升降戶等期會急迫人情惶駭因陳新法十害其要曰上戶常少中下戶常多故舊法上戶之役類皆數而重下戶之役率常簡而輕今不問上下戶概視物力以差出錢故上戶以為幸而下戶苦之歲有豐凶而役人有定數助錢歲不可闕則是賦稅有時減閣而助錢更無蠲損也役人必用鄉戶為其有常產則自重今既招雇恐止得浮浪姦偽之人則帑庾場務綱運不惟不能典幹竊恐不勝其盜用而冒法者衆至於弓手耆壯承符散從手力胥史之類恐遇寇則有縱逸因事輒為搔擾也司農新法衙前不差鄉戶其舊嘗願為長名者聽仍其舊却用官自召賣酒稅坊場幷州縣坊郭人戶助役錢數酬其重難惟此一法有若可行然坊郭十等戶緩急科率郡縣賴之難更使之均出助錢乞詔有司若坊場錢可足衙前雇直則詳究條目徐行而觀之帝因安石進呈役錢文字謂之曰民供稅斂已重坊郭及官戶等不須減稅戶升等事更與少裁之安石曰朝廷制法當斷以義豈須規規恤淺近之人議論耶於是提點趙子幾怒知東明縣賈蕃不能禁遏縣民來訟雜摭他事致蕃於理又使子幾自鞫之楊繪謂是希安石意指而致縣令於罪也即疏辨之曰子幾若劾蕃五月十日前事臣固無言若所劾後乎此日是以戊灭脅令佐使民不得赴愬得為便乎又言助役之利一而難行有五請先言其利假如民田有一家而百頃者亦有戶纔三頃者其等乃俱在第一以百頃而較三頃則已三十倍矣而受役月日均齊無異況如官戶則除耆長外皆應無役今例使均出雇錢則百頃所輸必三十倍於三頃者而又永無決射之訟此其利也然難行之說亦有五民惟種田而責其輸錢錢非田之所出一也近邊州軍就募者非土著姦細難防二也逐處田稅多少不同三也耆長雇人則盜賊難止四也衙前雇人則失陷官物五也乞先議防此五害然後著為定制仍先戒農寺無欲速就以祈恩賞提舉司無得多取於民以自為功如此則誰復妄議劉摯亦言趙子幾以他事捃摭賈蕃為過且變更役法意欲便民民苟以為有利害也安可禁其所欲言今因畿民有訴而刻薄之人反怒縣官不能禁遏臣恐四遠人情必疑朝廷欲鉗天下之口而職在主民者必皆視蕃為戒則天下休戚陛下何由知之子幾挾情之罪伏請付吏部施行於是同判司農寺曾布摭繪摯所言而條奏辨詰之其略曰畿內上等戶盡罷昔日衙前之役故今所輸錢比舊受役時其費十減四五中等人戶舊充弓手手力承符戶長之類今使上等及坊郭寺觀單丁官戶皆出錢以助之故其費十減六七下等人戶盡除前日冗役而專充壯丁且不輸一錢故其費十減八九大抵上戶所減之費少下戶所減之費多言者謂優上戶而虐下戶得聚斂之謗臣所未諭也提舉司以諸縣等第不實故首立品量升降之法開封府司農寺方奏議時蓋不知已嘗增減舊數然舊敕每三年一造簿書等第嘗有升降則今品量增減亦未為非又況方曉諭民戶苟有未便皆與釐正則凡所增減實未嘗行言者則以謂品量立等者蓋欲多斂雇錢升補上等以足配錢之數至於祥符等縣以上等人戶數多減充下等乃獨掩而不言此臣所未諭也凡州縣之役無不可募人之理今投名衙前半天下未嘗不典主倉庫場務綱運而承符手力之類舊法皆許雇人行之久矣惟耆長壯丁以今所措置最為輕役故但輪差鄉戶不復募人言者則以謂衙前雇人則失陷官物耆長雇人則盜賊難止又以謂近邊姦細之人應募則焚燒倉庫或守把城門則恐潛通外境此臣所未諭也免役或輸見錢或納斛斗皆從民便為法至此亦已周矣言者則謂直使輸錢則絲帛粟麥必賤若用他物準直為錢則又退揀乞索且為民害如此則當如何而可此臣所未諭也昔之徭役皆百姓所為雖凶荒饑饉未嘗罷役今役錢必欲稍有餘羨乃所以為凶年蠲減之備其餘又專以興田利增吏祿言者則以謂助錢非如稅賦有倚閣減放之期臣不知昔之衙前弓手承符手力之類亦嘗倚閣減放否此臣所未諭也兩浙一路戶一百四十餘萬所輸緡錢七十萬爾而畿內戶十六萬率緡錢亦十六萬是兩浙所輸纔半畿內然畿內用以募役所餘亦自無幾言者則以謂吏緣法意廣收大計如兩浙欲以羨錢徼幸司農欲以出剩為功此臣所未諭也賈蕃為令不受民訴使趨京師諠譁其意必有謂也誠令用心無他亦可謂不職矣蕃之不職不法其狀甚衆皆趙子幾所不得不問御史之言欲舍蕃而治子幾是不顧陛下之法陛下之民宜莫如蕃與御史也於是下其疏於繪摯使各言狀繪錄前後四奏以自辨摯言助役斂錢之法有大臣及御史主之於內有大臣親黨為監司提舉官而行之於諸路其勢順易矣然曠日彌年終未有定論為不順乎民心而已陛下以司農為是耶則事盡前奏可以覆視以臣言為非耶則貶黜而已雖復使臣言之亦不過所謂十害者而風憲之官豈當與有司較是非勝負耶詔繪知鄭州摯落館閣校勘監察御史𩹉行監衡州鹽倉遣察訪使徧行諸路促成役書改助役為免役不願就募而強之者論如律初詔監司各定所部助役錢數利路轉運使李瑜欲定四十萬判官鮮于侁曰利路民貧二十萬足矣議不合遂各為奏帝是侁議侍御史鄧綰言利路役歲須緡錢九萬餘而李瑜率取至三十三萬有奇提點刑獄周約亦占名無異辭詔責瑜約而擢侁為副使諸路役書既上之司農乃頒募役法于天下用免役錢祿內外胥吏有祿而贓者用倉法重其坐初京師賦吏祿歲僅四千緡至八年計緡錢三十八萬有奇京師吏舊有祿及外路吏祿又不在是焉時知長葛縣樂京稱助役之法不可久行常平司詢其故不答遂罷京西使者召知湖陽縣劉蒙會議蒙不肯議退而條上利害即投劾去而權江西提刑提舉金君卿首募受代官部錢帛綱趨京不差鄉戶衙前而費減十五六賜詔奬諭仍落權為真免役剩錢詔州縣用常平法給散收息添給吏人餐錢仍立為法京東免役錢以秋料起催若雇直多少役使重輕有未究者命監司詳具來上仍須熙寧七年乃行永興秦鳳比之他路民貧役重詔提舉司併省冗役次第蠲減常留二分寬剩以為水旱閣放之備七年詔役錢千別納頭子五錢凡修官舍作什器夫力輦運之類皆許取以供費不給以情輕贖銅錢足之諸路公人如弓箭手法給田募人為之凡逃絕監牧之田籍於轉運司者不許射買請佃提刑司以其田給應募者而覈其所直準一年雇役為錢幾何而歸其直於轉運司衢州西安縣用緡錢十二萬買田始足募一縣之役司農寺言不獨兩浙如此他路宜亦如之費多難贍乃欲改法遂詔自今用寬剩錢買募役田須先參會餘錢可以枝梧災傷方許給買若田價翔貴之地則已之時免役出錢或未均參知政事呂惠卿及其弟曲陽縣尉和卿皆請行手實法其法官為定立田產中價使民各以田畝多少高下隨價自占仍幷屋宅分有無蕃息立等凡居錢五當蕃息之錢一非用器田穀而輒隱落者許告有實以三分之一充賞將造簿預具式示民令依式為狀縣受而籍之以其價列定高下分為五等既該見一縣之民物產錢數乃參會通縣役錢本額而定所當輸明書其數示衆兩月使悉知之詔從其請司農寺乞廢戶長坊正令州縣坊郭擇相鄰戶三二十家排比成甲迭為甲頭督輸稅賦苗役一稅一替其後諸路皆言甲頭催稅未便遂詔耆戶長壯丁仍舊募充其保正甲頭承帖法並罷王安石言給田募役有害十餘八年罷給田募役法已就募人如舊闕者勿補官戶輸役錢免其半所免雖多各無過二十千兩縣以上有物產者通計之兩州兩縣以上有物產者隨所在輸錢等第不及者從一多處併之初手實法行言者多論其長告訐增煩擾至是惠卿罷政御史中丞鄧綰言其法不便罷之委司農寺再詳定以聞九年以荊湖兩路敷役錢太重較一歲入出寬剩錢數多詔權減二年尋詔自今寬剩役錢及買撲坊場錢更不以給役人歲具羨數上之司農餘物凡籍之常平司者常留一半侍御史周尹言募役錢數外留寬剩一分聞州縣希提舉司風旨廣敷民錢省役額損雇直而民間輸數一切如舊寬剩數多募直輕而倉法重役人多不願就募天下皆謂朝廷設法聚斂不無疑怨乞募耆長戶長及役人不可過減者悉復舊額約募錢足用其寬剩止留二分是歲諸路上司農寺歲收免役錢一千四十一萬四千五百五十三貫石匹兩金銀錢斛匹帛一千四十一萬四千三百五十二貫石匹兩絲綿二百一兩支金銀錢斛六百四十八萬七千六百八十八兩貫石匹應在銀錢斛匹帛二百六十九萬三千二十貫匹石兩見在八十七萬九千二百六十七貫石匹兩十年知彭州呂陶奏朝廷欲寬力役立法召募初無過斂民財之意有司奉行過當增添科出謂之寬剩自熙寧六年施行役法至今四年臣本州四縣已有寬剩錢四萬八千七百餘貫今歲又須科納一萬餘貫以成都一路計之無慮五六十萬推之天下見今約有六七百萬貫寬剩在官歲歲如此泉幣絕乏貨法不通商旅農夫最受其弊臣恐朝廷不知免役錢外有此寬剩數目乞契勘見在約支幾歲不至闕乏霈發德音特免數年或逐年限定不得過十分之一所貴民不重困不報王安石去位吳充為相沈括獻議莫若稍變役法雜以差徭為便御史知雜蔡確言括反覆貶括知宣州役錢立額浙東多以田稅錢數為則浙西多用物力至是詔令通物力稅錢互紐為數從便輸納淮東路估定物產如其實直以均敷取初許兩浙坊郭戶家產不及二百千鄉村戶不及五十千毋輸役錢已而鄉戶不及五十千亦不免輸元豐二年提舉司言坊郭戶免輸法太優乃詔如鄉戶法裁定所敷錢數提舉廣西常平劉誼言廣西一路戶口二十萬而民出役錢至十九萬緡先用稅錢敷出稅數不足又敷之田米田米不足復算於身丁夫廣西之民身之有丁既稅以錢又算以米是一身而輸二稅殆前世弊法今既未能蠲除而又益以役錢甚可憫也至於廣東西監司提舉司吏一月之給上同令錄下倍攝官乞裁損其數則兩路身丁田米亦可少寬遂詔吏輩月給錢遞減二千歲遂減役錢一千二百餘緡三年司農寺丞吳雍言議定淮浙役書減冗占千三百餘人裁省緡錢近二十九萬會定歲用寬剩錢一百四萬餘緡諸路役書多若此類乞先自近京三兩路修定下之諸路從之七年天下免役緡錢歲計一千八百七十二萬九千三百場務錢五百五萬九千穀帛石匹九十七萬六千六百五十七役錢較熙寧所入多三之一帝之力主免役也知民間通苦差役而衙投之任重行遠者尤甚特創免役雖均敷雇直不能不取之民然民得一意田畝實解前日困弊故羣議雜起意不為變顧其間采王安石策不正用雇直為額而展敷二分以備吏祿水旱之用羣臣每以為言屢疑屢詰而安石持之益堅此其為法既不究終防弊而聚斂小人又乘此增取帝雖數詔禁戒而不能盡止至是雇役不加多而歲入比前增廣則安石不能將順德意其流弊已見矣哲宗立宣仁后垂簾同聽政門下侍郎司馬光言按因差役破產者惟鄉戶衙前蓋山野愚戇之人不能幹事或因水火損敗官物或為上下侵欺乞取是致欠折備償不足有破產者至於長名衙前在公精熟每經重難別得優輕場務酬奬往往致富何破產之有又曏者役人皆上等戶為之其下等單丁女戶及品官僧道本來無役今使之一概輸錢則是賦斂愈重自行免役法以來富室差得自寬貧者困窮日甚監司守令之不仁者於雇役人之外多取羨餘或一縣至數萬貫以冀恩賞又青苗免役賦斂多責見錢錢非私家所鑄要須貿易豐歲追限尚失半價若值凶年無穀可糶賣田不售遂致殺牛賣肉伐桑鬻薪來年生計不暇復顧此農民所以重困也臣愚以為宜悉罷免役錢諸色役人並如舊制定差見雇役人皆罷遣之衙前先募人投充長名召募不足然後差鄉村人戶每經歷重難差遣依舊以優輕場務充酬奬所有見在役錢撥充州縣常平本錢以戶口為率存三年之蓄有餘則歸轉運司凡免役之法縱富彊應役之人征貧弱不役之戶利於富不利於貧及今耳目相接猶可復舊名若更年深富者安之民不可復差役矣於是始詔修定役書凡役錢惟元定額及額外寬剩二分已下許著為準餘並除之若寬剩元不及二分者自如舊則尋詔耆戶長壯丁皆仍舊募人供役保正甲頭承帖人並罷元祐元年侍御史劉摯言率戶賦錢有從來不預差役而概被斂取者有一戶而輸數百以至千緡者昔惟衙前一役有至破產者爾今天下坊場官收而官賣之歲計緡錢無慮數百萬自可足衙前雇募支酬之直則役之重者已無所事于農民矣外惟散從承符弓手手力耆戶長壯丁之類無大勞費宜並用祖宗差法自第一等而下通任之監察御史王巖叟請於衙前大役立本等相助法以盡變通之利借如一邑之中當應大役者百家而歲取十人則九十家出力為助明年易十戶復如之則大役無偏重之弊其於百色無名之差占一切非理之資陪悉用熙寧新法禁之雖不助猶可為也殿中侍御史劉次莊言近制許雇耆戶長須三等已上戶不知三等已上戶不願受雇既無願者則郡縣必陽循雇名陰用差法不若立法明差之為便戶部言詔凡耆戶長壯丁並募人供役竊慮耆戶長雇錢數少無應募者兼四等以下戶舊不敷役錢惟輪差壯丁今悉雇募用錢額廣提舉司必從人戶增敷蓋舊法役不盡雇亦有輪差輪募之處欲且如本法中書舍人蘇軾言先帝初行役法取寬剩錢不得過二分以備災傷有司奉行過當行之幾十六七年積而不用至三千餘萬貫石熙寧中行給田募役法大略如邊郡弓箭手臣知密州先募弓手民甚便之曾未半年此法復罷因列其五利王巖叟言蘇軾乞買田募役其五利難信而有十弊大指謂官市民田慮不當價民受田就募既非永業則鹵莽其耕又將轉而他之而其六弊特詳曰弓箭手雖名應募實與家居農民無異雖或番上及緩急不免點集實不廢田業非如州縣色役長在官寺則弓箭手之擾可知矣然猶聞闕額常難補招已就招者又時時竄去引以為比不切事情其七弊曰戶及三等以上皆能自足必不肯佃田供役今立法須二等以上戶方充弓手三等以上方得供散從官以下色役乃是用給田募役之名行揭簿定差之實既云百姓樂於應募何以戶降四等必須上二等戶保任任之而逃則勒任者就供田役此豈得云樂應也耶上官均亦陳五不可行軾議遂格司馬光復奏今免役之法其害有五上戶舊充役固有陪備而得番休今出錢比舊費特多年年無休息下戶元不充役今例使出錢舊日所差皆土著良民今皆浮浪之人應募無顧藉受賕侵陷官物又農民出錢難於出力若遇凶年則賣莊田牛具桑柘以錢納官提舉常平倉司惟務多斂役錢廣積寬剩此五害也今莫若直降敕命盡罷天下免役錢其諸色役人並依熙寧元年以前舊法人數委本縣令佐揭簿定差其人不願身自供役許擇可任者雇代有逋逃失陷雇者任之惟衙前一役最號重難固有因而破產者為此始作助役法自後色色優假禁止陪備別募命官將校部押遠綱遂不聞更有破產之人若今衙前仍行差法陪備既少當不至破家若猶矜其力難獨任即乞如舊法於官戶寺觀單丁女戶有屋產月收僦直可及十五千莊田中熟所收及百石以上者並隨貧富以差出助役錢自餘物產約此為準每州樁收候有重難役使即以支給尚慮役人利害四方不能齊同乞許監司守令審其可否可則亟行如先究盡縣許五日具措畫上之州州一月上轉運司轉運司季以聞朝廷委執政審定隨一路一州各為之敕務要曲盡然免役行之近二十年富戶習於優利一旦變更不能不懷異同又差役復行州縣不能不有小擾提舉官專以多斂役錢為功必競言免役錢不可罷當此之際願勿以人言輕壞良法知樞密院章惇取光所奏疎略未盡者駮奏之尚書左丞呂公著言惇專欲求勝不顧命令大體望選差近臣詳定右正言王覿奏光議初上惇嘗同奏待既施行方列光短其資小人不當寘腹心地於是詔以資政殿大學士韓維給事中范純仁等專切詳定以聞王覿又言近制改募為差用舊法人數為則而熙寧元年以後募數屢經裁減則舊數不可復用請悉準見額定差先是差法既復知開封府蔡京如敕五日內盡用開封祥符兩縣舊役人數差一千餘人以足舊額右司諫蘇轍言開封府亟用舊額盡差如壇子之類近例率用剩員今悉改差民戶故為煩擾以搖成法乞正其罪司馬光之始議差役中書舍人范百祿言于光曰熙寧免役法行百祿為咸平縣開封罷遣衙前數百人民皆欣幸其後有司求羨餘務刻剝乃以法為病今第減助免錢額以寬民力可也光雖不從及議州縣吏因差役受賕從重法加等配流百祿押刑房固執不可曰鄉民因徭為吏今日執事而受賕明日罷役復以財遺人若盡以重法繩之將見黥面赭衣充塞道路矣光曰微公言幾為民害遂已之蘇轍又言差役復行應議者有五其一曰舊差鄉戶為衙前破敗人家甚如兵火自新法行天下不復知有衙前之患然而天下反以為苦者農家歲出役錢為難及許人添剗見賣坊場遂有輸納不給者爾向使止用官賣坊場課入以雇衙前自可足辦而他色役人止如舊法則為利較然矣初疑衙前多是浮浪投雇不如鄉差稅戶可託然行之十餘年投雇者亦無大敗闕不足以易鄉差衙前之害今略計天下坊場錢一歲可得四百二十餘萬貫若立定中價不許添剗三分減一尚有二百八十餘萬貫而衙前支費及召募非泛綱運一歲共不過一百五十餘萬緡則是坊場之直自可了辨衙前百費何用更差鄉戶今制盡復差役知衙前若無陪備故以鄉戶為之至於坊場元無明降處分不知官自出賣耶抑仍用以酬奬衙前也若仍用以酬奬即召募部綱以何錢應用若不與之錢即舊名重難鄉戶衙前仍前自備為害不小其二坊郭人戶舊苦科配新法令與鄉戶並出役錢而免科配其法甚便但敷錢太重未為經久之法乞取坊郭官戶寺觀單丁女戶酌今役錢減定中數與坊場錢用以支雇衙前及召募非泛綱運外却令樁備募雇諸色役人之用其三乞用見今在役人數定差熙寧未減定前其數實冗不可遵用其四熙寧以前散從弓手手力諸役人常苦逆送自新法以來官吏皆請雇錢役人既便官亦不至闕事乞仍用雇法其五州縣胥吏並量支雇錢募充仍罷重法亦許以坊場坊郭錢為用不足用方差鄉戶鄉戶所出雇錢不得過官雇本數詔送看詳役法所詳定擇其要者先奏以行於是役人悉用見數為額惟衙前用坊場河渡錢雇募不足方許揭簿定差其餘役人惟該募者得募餘悉定差遂罷官戶寺觀單丁女戶出助役法其今夏役錢即免輸尋以衙前不皆有雇直遂改雇募為招募凡熙豐嘗立法禁以衙前及役人非理役使及令陪備圓融之類悉申行之耆壯依保正長法坊場河渡錢量添酒錢之類名色不一惟於法許用者支用外並樁備招募衙前支酬重難及應緣役事之用如一州錢不供用許移別州錢用之一路不足許從戶部通他路移用其或有餘毋得妄用其或不足毋得減募增置衙前最為重役若已招募足額上一等戶有虛閑不差者令供次等色役鄉差役人在職官如敢抑令別雇承符散從承代其役者轉運司劾奏重責時提舉常平司已罷置凡役事改隸提刑司殿中侍御史呂陶言天下版籍不齊或以稅錢貫百或以田地頃畝或以家之積財或以田之受種雖皆別為五等然有稅錢一貫占田一頃積財千緡受種十石而入之一等一等之上無等可加遂至稅緡田畝積財受種十倍於此亦不過同在一等憑此差役必不均平雖無今日納錢之勞反有昔時偏頗陪費之害莫若裁量新舊著為條約如稅錢一貫為第一等合於本等中差一役稅錢兩倍於一役者併差二役又倍即差三役雖稅錢更多不過三役並聽雇人或本縣戶多役少則上戶之役不須併差但可次休役年月遠近而均其勞逸假令甲充役後可閑五年乙稅錢兩倍於甲可閑三年丙又倍於乙可閑一年其以田土頃畝之類為等幷其餘同等多少不侔者並倣此又成梓兩路差役舊專以戶稅為差等熙寧初別定坊郭戶營運錢以助免役乃在稅產之外州縣抑認成額至今不減至有停閑居業移避鄉村猶不得免今方議法坊郭等第固不可偏廢然須參究虛實別行排定以寬民力並送詳定所蘇轍又言雇募衙前改為招募既非明以錢雇必無肯就招者勢須差撥不知歲收坊場河渡緡錢四百二十餘萬欲於何地用之熙寧以前諸路衙前多雇長名當役如西川全是長名淮南兩浙長名太半以上餘路亦不減半今坊場官既自賣必無願充長名則衙前並是鄉戶雖號招募而上戶利於免役方肯占名與差無異上戶既免衙前重役則凡役皆當均及以次人戶如此則下戶充役多如熙寧前矣
