body:
  text: 宋史卷十本紀第十仁宗二明道元年春二月癸卯呂夷簡上三朝寶訓丙午詔仕廣南者毋過兩任以防貪黷庚戌以張士遜同中書門下平章事集賢殿大學士戊午錄故宰臣孫並試將作監主簿甲子詔員外郎以上致仕者錄其子校書郎三丞以上齋郎丁卯以真宗順容李氏為宸妃是日妃薨三月戊子頒天聖編敕戊戌以江淮旱遣使與長吏錄繫囚流以下減一等杖笞釋之己亥除婺秀州丁身錢夏四月丙午錄繫囚戊午知棣州王涉坐冒請官地為職田配廣南牢城五月癸酉遣使點檢河北城池器甲密訪官吏能否壬午廢杭秀二州鹽場秋七月丙申詔諸路轉運使舉國子監講官丁酉王曙罷太白晝見彌月乃滅八月辛丑以晏殊為樞密副使丙午晏殊參知政事甲寅以楊崇勛為樞密副使辛酉授唃廝囉為寧遠大將軍愛州團練使壬戌大內火延八殿癸亥移御延福宮甲子以呂夷簡為修內使乙丑詔羣臣直言闕失丁卯大赦九月庚寅重作受命寶丙申皇太后出金銀器易左藏緡錢二十萬以助修內冬十月庚子黃白氣五貫紫微垣丁巳詔漢陽軍發廩粟以振飢民十一月甲戌以修內成恭謝天地于天安殿謁太廟大赦改元百官進秩優賞諸軍是日還宮己卯冬至率百官賀皇太后于文德殿御天安殿受朝壬辰延州言夏王趙德明卒癸巳以德明子元昊為定難軍節度使西平王十二月壬寅以楊崇勛為樞密使戊午詔獲劫盜者奏裁毋擅殺壬戌西北有蒼白氣亙天是歲京東淮南江東饑二年春正月己卯詔發運使以上供米百萬斛振江淮飢民遣使督視二月戊戌含譽星見東北方庚子詔江淮民飢死者官為之葬祭乙巳皇太后服衮衣儀天冠饗太廟皇太妃亞獻皇后終獻是日上皇太后尊號曰應元齊聖顯功崇德慈仁保壽皇太后丁未祀先農于東郊躬耕籍田大赦百官上尊號曰睿聖文武體天法道仁明孝德皇帝三月庚午加恩百官丁亥祈雨于會靈觀上清宮景德開寶寺庚寅以皇太后不豫大赦除常赦所不原者乾興以來貶死者復官謫者內徙甲午皇太后崩遺詔尊皇太妃為皇太后呂夷簡為山陵使夏四月丙申朔出大行皇太后遺留物賜近臣壬寅追尊宸妃李氏為皇太后至是帝始知為宸妃所生甲辰以大行皇太后山陵五使並兼追尊皇太后園陵使戊申聽政于崇政殿西廂己酉罷乾元節上壽壬子詔臣僚宗戚命婦毋得以進獻祈恩澤及緣親戚通表章罷創修寺觀帝始親政裁抑僥倖中外大悅癸丑召還宋綬范仲淹丙辰內侍江德明等並坐交通請謁黜己未呂夷簡張耆夏竦陳堯佐范雍趙稹晏殊皆罷以張士遜為昭文館大學士李迪同中書門下平章事集賢殿大學士王隨參知政事李諮為樞密副使王德用簽書樞密院事壬戌御紫宸殿以張士遜為山陵使兼園陵使癸亥上大行太后謚曰莊獻明肅追尊宸妃李氏為皇太后謚曰莊懿五月戊辰詔禮部貢舉癸酉詔中外勿輒言皇太后垂簾日事乙亥罷羣牧制置使丙子命宰臣張士遜撰謝太廟及躬耕籍田記檢討宋祁言皇太后謁廟非後世法乃止撰籍田記戊寅錄繫囚六月甲午朔日有食之壬寅錄周世宗及高季興李煜孟昶劉繼元劉鋹後癸卯命審刑大理詳定配隸刑名戊午減天下歲貢物秋七月丁丑詔知耀州富平縣事張龜年增秩再任以其治行風告天下戊子詔以蝗旱去尊號睿聖文武四字以告天地宗廟仍令中外直言闕政八月甲午朔契丹使來弔慰祭奠壬寅作奉慈廟甲辰詔中外毋避莊獻明肅太后父諱丁巳置端明殿學士九月甲戌幸洪福院臨莊懿太后梓宮丙子壬午臨如之冬十月癸巳朔太白犯南斗甲午禁登州民采金丁酉祔葬莊獻明肅皇太后莊懿皇太后于永定陵甲辰詔以兩川歲貢綾錦羅綺紗以三之二易為紬絹供軍須己酉祔莊獻明肅太后莊懿太后神主于奉慈廟癸丑下德音降東西京囚罪一等徒以下釋之緣二太后陵應奉民戶免租賦科役有差丙辰贈周王祐為皇太子戊午張士遜楊崇勛罷以呂夷簡為門下侍郎同中書門下平章事昭文館大學士王曙為樞密使王德用為樞密副使宋綬參知政事蔡齊為樞密副使十一月癸亥朔薛奎罷詔增宗室奉太白犯南斗乙丑追冊美人張氏為皇后甲戌贈寇準為中書令十二月丙申復置提點刑獄丁酉詔諸路轉運使副歲徧歷所部仍令州軍具所至月日以聞甲辰以京東飢出內藏絹二十萬代其民歲輸乙巳詔修周廟丁未詔臺官非中丞知雜保薦者勿任戊申出宮人二百乙卯廢皇后郭氏為淨妃玉京沖妙仙帥居長寧宮御史中丞孔道輔率諫官御史大呼殿門請對詔宰相告以皇后當廢狀丙辰出道輔及諫官范仲淹仍詔臺諫自今毋相率請對丁巳詔明年改元禁邊臣增置堡砦是歲畿內京東西河北河東陝西蝗淮南江東兩川飢遣使安撫除民租注輦國來貢景祐元年春正月甲子發江淮漕米振京東飢民丙寅詔開封府界諸縣作糜粥以濟飢民諸災傷州軍亦如之戊辰詔三司鑄景祐元寶錢甲戌詔執政大臣議兵農可更制者以聞詔募民掘蝗種給菽米癸未詔禮部所試舉人十取其二進士三舉諸科五舉嘗經殿試進士五舉年五十諸科六舉年六十及曾經先朝御試者皆以名聞甲申淮南飢出內藏絹二十萬代其民歲輸丁亥置崇政殿說書庚寅詔停淮南上供一年二月乙未罷書判拔萃科辛丑詔禮部貢院諸科舉人七舉者不限年並許特奏名甲辰權減江淮漕米二百萬石戊申詔麟府州振蕃漢飢民三月壬午免諸路災傷州軍今年夏稅癸未詔解州畦戶逋鹽蠲其半是月賜禮部奏名進士諸科及第出身七百八十三人夏四月丁酉開封府判官龐籍言尚美人遣內侍稱教旨免工人市租帝為杖內侍仍詔有司自今宮中傳命毋得輒受癸丑詔置殿中侍御史監察御史𩹉行五月辛酉出布十萬端易錢糴河北軍儲丁卯禁民間織錦刺繡為服飾西川歲織錦上供亦罷之癸酉詔臺諫未曾歷郡守者與郡壬午錄繫囚是月契丹主宗真之母還政於子出居慶陵六月壬辰交州民六百餘人內附庚子免畿內被災民稅之半己酉策制舉武舉人乙卯詔州縣官非理科決罪人至死者並奏聽裁閏月甲子泗州淮汴溢己巳常州無錫縣大風發屋乙亥毀天下無額寺院壬午罷造玳瑁龜筒器秋七月丙申賜壽州下蔡縣被溺之家錢有差己亥樞密使王曙加同平章事辛丑詔文武提刑毋得互相薦論壬子詔轉運使與長吏舉所部官專領常平倉粟甲寅河決澶州橫隴埽八月庚申薛奎卒壬戌有星孛于張翼癸亥王曙卒甲子月犯南斗戊辰帝不豫庚午以王曾為樞密使辛未以星變大赦避正殿減常膳輔臣奏事延和殿閤壬申詔淨妃郭氏出居于外美人尚氏入道楊氏安置別宅九月壬辰百官請隻日御前殿如先帝故事詔可丁酉帝康復御正殿復常膳甲辰詔立皇后曹氏丙午熒惑犯南斗冬十月庚申罷淮南江浙荊湖制置發運使詔淮南轉運兼發運事乙亥作郊廟景安興安祐安之曲十一月己丑冊曹氏為皇后癸丑作大安之曲以饗聖祖十二月癸酉賜西平王趙元昊佛經是歲南平王李德政獻馴象二詔還之開封府淄州蝗二年春正月癸丑置邇英延義二閣寫尚書無逸篇于屏二月戊午御延福宮觀大樂癸亥舊給事資善堂者皆推恩戊辰李迪罷以王曾為門下侍郎同中書門下平章事集賢殿大學士王隨李諮知樞密院事蔡齊盛度參知政事王德用韓億同知樞密院事三月戊申出內庫珠賜三司以助經費夏四月庚午詔天下有知樂者所在薦聞五月甲午徭獠寇雷化州詔桂廣會兵討之丙申錄繫囚庚子議太祖太宗真宗廟並萬世不遷南郊升侑上帝以太祖定配二宗迭配丙午降天下繫囚罪一等杖以下釋之丁未廣西言鎮寧州蠻入寇六月丁巳詔幕職官初任未成考毋薦乙亥頒一司一務及在京敕鎮寧蠻請降秋七月戊申廢西京採柴務以山林賦民官取十之一八月壬子朔詔輕強盜法甲寅宴紫宸殿初用樂甲戌幸安肅門砲場閱習戰己卯置提點銀銅坑冶鑄錢官九月壬寅按新樂己酉作睦親宅命中丞杜衍等汰三司胥吏宋綬上中書總例冬十月辛亥朔復置朝集院癸亥復羣牧制置使丁卯詔諸路歲輸緡錢福建二廣易以銀江東以帛庚午熒惑犯左執法十一月戊子廢后郭氏薨癸巳朝饗景靈宮甲午饗太廟奉慈廟乙未祀天地于圜丘大赦錄五代及諸國後宗室任諸司使以下至殿直者換西班官百官上尊號曰景祐體天法道欽文聰武聖神孝德皇帝丁未加恩百官十二月壬子加唃廝囉為保順軍留後丙子詔長吏能導民修水利闢荒田者賞之是歲以鎮戎軍荐飢貸弓箭手粟麥六萬石三年春正月壬辰追復郭氏為皇后丁酉葬皇后郭氏二月丙辰命官較太常鐘律壬戌詔兩制禮官詳定京師士民服用居室之制甲子以廣南兵民苦瘴毒為置醫藥丁卯修陝西三白渠三月癸巳復商賈以見錢算請官茶法乙未觀新定鐘律戊戌詔兩省卿監刺史閤門以上致仕給奉如分司官長吏歲時勞賜之改維州為威州夏五月庚辰購求館閣逸書丙申錄繫囚丙戌天章閣待制范仲淹坐譏刺大臣落職知饒州集賢校理余靖館閣校勘尹洙歐陽修並落職補外詔戒百官越職言事六月壬申虔吉州水溢壞城郭廬舍賜被溺家錢有差秋七月丁亥禁民間私寫編敕刑書乙未置大宗正司庚子大雨震電太平興國寺災辛丑降三京罪囚一等徒以下釋之八月己酉班民間冠服居室車馬器用犯制之禁乙卯月犯南斗九月庚辰幸睦親宅宴宗室癸巳熒惑犯南斗是月定申心喪解官法冬十月丁未命章得象等考課諸路提刑甲寅作朝集院十一月戊寅保慶皇太后楊氏崩辛卯上保慶太后謚曰莊惠十二月丙寅李諮卒丁卯王德用知樞密院事章得象同知樞密院事是歲南平王李德政西南蕃來貢南丹州莫淮戟內附四年春正月壬午詔均諸州解額二月己酉葬莊惠皇太后于永定陵己未祔神主于奉慈廟庚申德音降東西京及靈駕所過州縣囚罪一等徒以下釋之乙丑置赤帝像于宮中祈嗣三月甲戌置天章閣侍講戊寅詔禮部貢舉夏四月乙巳呂夷簡上景祐法寶新錄甲子呂夷簡王曾宋綬蔡齊罷以王隨為門下侍郎同中書門下平章事昭文館大學士陳堯佐同中書門下平章事集賢殿大學士盛度知樞密院事韓億程琳石中立參知政事王鬷同知樞密院事五月庚戌皇子生錄繫囚降死罪一等流以下釋之是日皇子薨乙卯以旱遣使決三京繫囚丙寅芝生化成殿楹六月乙亥杭州江潮壞隄遣使致祭戊子出神武祕略賜邊臣己丑奉安太祖御容于揚州建隆寺秋七月丁未詔河東河北州郡密嚴邊備戊申有星數百西南流至壁東大者其光燭地黑氣長丈餘出畢宿下八月甲戌越州水賜被溺民家錢有差甲午詔三司轉運司毋借常平錢穀冬十一月癸亥罷登萊買金場十二月甲申幷代忻州並言地震吏民壓死者三萬二千三百六人傷五千六百人畜擾死者五萬餘遣使撫存其民賜死傷之家錢有差是歲滑州民蠶成被長二丈五尺唃廝囉龜茲沙州來貢寶元元年春正月甲辰雷丙辰以地震及雷發不時詔轉運使提點刑獄按所部官吏除幷代忻州壓死民家去年秋糧二月壬申詔復日御前殿甲午安化蠻寇宜融州三月戊戌朔王隨陳堯佐韓億石中立罷以張士遜為門下侍郎同中書門下平章事昭文館大學士章得象同中書門下平章事集賢殿大學士王鬷李若谷並參知政事王博文陳執中同知樞密院事己亥發邵澧潭三州駐泊兵討安化州蠻是月賜禮部奏名進士諸科及第出身七百二十四人夏四月癸酉王博文卒乙亥以張觀同知樞密院事壬辰除宜融州夏稅五月乙巳錄繫囚六月戊寅罷舉童子己卯建州大水壞民廬舍賜死傷家錢有差其無主者官葬祭之甲申詔天下諸州月上雨雪狀秋七月壬戌策制舉人癸亥策武舉人八月丁卯復淮南江浙荊湖制置發運使庚辰熒惑犯南斗九月戊申詔應祀事已受誓戒而失虔恭者毋以赦原賜宜融州討蠻兵緡錢冬十月丙寅詔戒百官朋黨十一月甲辰詔廣西鈐轄進兵討安化蠻乙巳詔宜融州民嘗從軍役者免今夏稅運糧者免其半戊申朝饗景靈宮己酉饗太廟及奉慈廟庚戌祀天地于圜丘大赦改元百官上尊號曰寶元體天法道欽文聰武聖神孝德皇帝乙卯復奏舉縣令法王曾薨十二月癸亥朔加恩百官甲子京師地震丙寅鄜延路言趙元昊反甲戌禁邊人與元昊互市己卯奉寧軍節度使知永興軍夏竦兼涇原秦鳳路安撫使振武軍節度使知延州范雍兼鄜延環慶路安撫使是歲達州大水黎州蠻來貢二年春正月己酉王隨卒辛亥安化蠻平癸丑趙元昊表請稱帝改元三月丁未鑄皇宋通寶錢乙卯閱試衞士戊午賜陝西緣邊軍士緡錢夏四月癸亥授唃廝囉二子瞎磨角團練使乙丑放宮女二百七十人壬申免昭州運糧死蠻寇者家徭二年賦租一年丁亥募河東陝西民入粟實邊五月癸巳詔近臣舉方略材武之士各二人己亥禁皇族及諸命婦女冠尼等非時入內癸卯命近臣同三司議節省浮費丙午遣使體量安撫陝西河東己酉錄繫囚壬子王德用罷以夏守贇知樞密院事六月壬戌詔省浮費自乘輿服御及宮掖所須宜從簡約若吏兵祿賜毋概行裁減戊辰詔諸致仕官嘗犯贓者毋推恩子孫丁丑益州火焚廬舍三千餘區壬午削趙元昊官爵除屬籍秋七月丁巳詔宗室遇南郊及乾元節恩許官一子餘五歲授官戊午以夏竦知涇州兼涇原秦鳳路沿邊經略安撫使涇原路馬步軍都總管范雍兼鄜延環慶路沿邊經略安撫使鄜延路馬步軍都總管八月丁卯以篳篥城唃廝波補本族軍主甲戌皇子生丙子降三京囚罪一等徒以下釋之辛巳命輔臣報祠高禖九月壬寅詔河北轉運使兼都大制置營田屯田事乙卯出內庫銀四萬兩易粟振益梓利夔路飢民十月庚午賜麟府州及川陝軍士緡錢甲申詔兩川飢民出劍門關者勿禁十一月戊子朔出內庫珠易緡錢三十萬糴邊儲丁酉盛度程琳罷出御史中丞孔道輔壬寅以王鬷知樞密院事宋庠參知政事十二月庚申詔審刑院大理寺刑部毋通賓客壬申詔御史闕員朕自擇舉是歲曹濮單州蝗康定元年春正月丙辰朔日有食之壬戌賜國子監學田五十頃是月元昊寇延州執鄜延環慶兩路副都總管劉平鄜延副都總管石元孫詔陝西運使明鎬募強壯備邊二月丁亥以夏守贇為宣徽南院使陝西馬步軍都總管經略安撫使詔潼關設備辛卯月太白俱犯昴壬辰夏守贇兼沿邊招討使出內藏緡錢十萬賜戍邊禁兵之家知制誥韓琦安撫陝西白氣如繩貫日甲午括畿內京東西淮南陝西馬丙申詔諸路轉運使提刑訪知邊事者以聞丁酉詔樞密院同宰臣議邊事辛丑出內藏緡錢八十萬付陝西市糴軍儲丙午德音釋延州保安軍流以下罪寇所攻掠地除今夏稅戍兵及戰死者賜其家緡錢是日改元去尊號寶元字許中外臣庶上封章言事丁未詔陝西量民力蠲所科芻糧癸丑降范雍為尚書吏部侍郎知安州甲寅出內庫珠償民馬直三月丙辰詔大臣條陝西攻守策癸亥命韓琦治陝西城池乙丑閱虎翼軍習戰辛未詔延州錄戰沒軍士子孫月給糧丙子大風晝暝是夜有黑氣長數丈見東南丁丑罷大宴詔中外言闕政戊寅王鬷陳執中張觀罷以晏殊宋綬知樞密院事王貽永同知樞密院事詔按察官舉才堪將帥者庚辰詔參知政事同議邊事辛巳德音降天下囚罪一等徒以下釋之賜京師河北陝西河東諸軍緡錢蠲陝西夏稅十之二減河東所科粟夏四月丙戌省陝西沿邊堡砦癸巳詔諸戍邊軍月遣內侍存問其家病致醫藥死為斂葬之甲午遣使籍陝西強壯軍乙未契丹國母復遣使來賀乾元節乙巳增補河北強壯軍丙午鄜延路兵馬都監黃德和坐棄軍要斬丁未贈劉平石元孫官錄其子孫辛亥築延州金明栲栳砦五月甲寅朔詔前殿奏事毋過五班餘對後殿命大官賜食壬戌張士遜致事呂夷簡為門下侍郎同中書門下平章事昭文館大學士癸酉詔夏守贇進屯鄜州戊寅以夏竦為陝西馬步軍都總管兼招討使是月元昊陷塞門砦兵馬監押王繼元死之又陷安遠砦六月丙戌詔假日御崇政殿視事如前殿丁亥以夏守贇同知樞密院事甲午降三京囚罪一等徒以下釋之乙未南京鴻慶宮神御殿火壬寅遣使體量安撫京東西甲辰增置陝西河北河東京東西弓手秋七月乙丑遣使以討元昊告契丹庚午閱諸軍習戰戊寅皇子昕為忠正軍節度使封壽國公八月戊戌禁以金箔飾佛像癸卯遣尚書屯田員外郎劉渙使邈川戊申夏守贇罷以杜衍同知樞密院事辛亥詔范仲淹葛懷敏領兵驅逐塞門等砦蕃騎出境仍募弓箭手給地居之九月甲寅滑州河溢戊午李若谷罷以宋綬晁宗売心參知政事鄭戩同知樞密院事戊辰以晏殊為樞密使王貽永杜衍鄭戩並樞密副使甲戌詔使臣諸班諸軍有武藝者自陳辛巳閱諸軍習戰是月元昊寇三川砦都巡檢楊保吉死之又圍師子定川堡戰士死者五千餘人遂陷乾溝乾河趙福三堡環慶路兵馬副都總管任福破白豹城冬十月乙未製銅符木契傳信牌甲辰錄方略士六十一人授官有差十一月壬戌有大星流西南聲如雷者三十二月癸未出內藏庫絹一百萬助糴軍儲詔南京祠大火丙戌詔以常平緡錢助糴軍儲癸卯宋綬卒戊申鑄當十錢權助邊費
