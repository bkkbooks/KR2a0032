body:
  text: 宋史卷五十四志第七天文七月犯列舍下元祐元年正月丁酉犯畢庚子入井乙巳犯靈臺丙午犯右執法己酉犯亢丁卯入東井戊辰犯水位甲戌犯左執法乙亥犯進賢戊寅犯氐閏二月壬辰掩畢乙未入東井乙巳入氐三月壬申又入戊辰犯右執法戊寅犯羅堰四月癸巳犯軒轅御女辛丑犯罰甲辰犯建五月癸亥入太微丁卯入氐辛巳犯畢六月庚寅入太微辛亥入井七月戊午入太微壬戌入氐八月癸卯入畢犯畢大星九月辛酉犯建星丁丑犯軒轅少民戊寅犯上將又入太微己卯入太微十月丁酉犯天廩戊戌犯畢入畢內庚子犯井乙巳犯靈臺丙午入太微垣犯右執法丁未犯太微垣東扇上相星十一月戊辰入井癸酉行入太微甲戌犯左執法戊寅入氐十二月癸巳犯天高又犯附耳乙巳犯井丙申犯水位己亥犯軒轅左角辛丑入太微壬寅犯太微東扇上相乙巳入氐二年正月壬戌犯井戊辰入太微癸酉入氐犯東北星甲戌犯罰二月庚寅入井乙未犯太微上將庚子入氐三月丁巳入井戊午犯水位辛酉犯軒轅左角乙丑犯平道丁卯入氐壬申犯建四月戊子犯軒轅大星掩御女己丑犯靈臺庚寅入太微甲午入氐丙申犯罰星五月戊辰犯羅堰辛未犯壁壘陣六月乙酉入太微己丑入氐己亥犯壁壘陣甲辰犯附耳丙午入井七月丁巳犯氐庚午犯天廩辛未入犯畢癸酉犯井丁丑犯軒轅大星八月甲申入氐庚寅犯牛甲午犯壁壘陣乙丑犯天廩丙寅掩犯畢大星戊辰入井壬申犯軒轅左角少民癸酉犯上將甲戌入太微十月乙酉犯羅堰戊子犯壁壘陣辛丑入太微乙巳入氐十一月甲寅犯壁壘陣甲戌犯罰星十二月戊子犯畢乙未犯靈臺又犯上將入太微三年正月戊午入東井己未犯水位甲子入太微二月乙未入犯氐西北星三月壬子犯東井西扇北第二星丁巳犯靈臺南第三星庚申犯平道四月乙酉入太微犯內屏辛卯犯東咸甲午犯建丁酉犯壁壘陣五月壬子入太微垣辛酉犯建辛未犯天廩六月甲申入氐壬辰犯壁壘陣七月癸丑犯東咸己未犯壁壘陣丁卯犯天高己巳入東井庚午犯水位八月己卯入氐己丑犯壁壘陣庚寅犯天溷癸巳犯天廩甲午入畢乙未犯天關丙申犯東井北第二星戊戌犯鬼距星九月辛酉犯畢癸亥犯司怪甲子犯天罇十月甲申犯壁壘陣己丑犯天高辛卯入東井犯東扇北第三星壬辰犯水位丙申入太微十一月戊午入東井犯西扇北第二星己未犯天罇西北星庚申入鬼犯積尸氣癸亥入太微十二月辛卯又入之閏十二月辛未入畢癸丑犯東井西扇北第二星甲寅犯天罇戊午入太微犯內屏己未犯太微三公庚申犯平道四年正月丙戌入太微庚寅犯氐辛卯犯罰二月戊申入井壬子犯長垣癸丑入太微犯內屏甲寅犯三公乙卯犯平道東星丁巳入氐三月丙子犯天罇丁丑入鬼犯積尸氣庚辰入太微乙酉入氐丁亥犯天江四月戊申入太微壬子入犯氐乙卯犯天籥壬戌犯壁壘陣五月乙亥入太微丁丑犯平道己卯入氐六月癸卯入太微丙午入氐己未犯外屏壬戌犯畢甲子犯井乙丑犯天罇七月甲戌入氐乙亥犯罰癸未入羽林軍甲申犯壁壘陣八月辛丑入氐己未入井九月甲申犯畢丙戌入犯井戊子犯鬼辛卯入太微十月癸丑犯井鉞乙卯犯水位己未入太微十一月己卯犯畢辛巳入井丙戌入太微犯內屏十二月丙辰犯亢丁巳入氐五年正月丙子犯東井戊寅犯輿鬼辛巳入太微犯內屏乙酉入氐丙戌犯東咸丁亥犯天江二月癸卯犯鉞又犯東井戊申入太微辛亥犯亢癸丑犯鍵閉乙卯犯天籥三月己巳犯諸王庚午犯司怪丙子入太微犯內屏四月甲辰入太微犯三公乙巳犯平道庚戌犯天籥丙辰入羽林軍五月庚午入太微庚寅掩畢六月癸卯犯東咸乙巳犯南斗庚戌入犯羽林軍七月乙丑入太微丁卯犯平道己巳入氐犯壁壘陣丁亥入東井己丑犯輿鬼東北星八月丙申入氐癸卯犯壁壘陣壬子犯畢九月壬申犯羽林軍辛巳犯司怪丁亥入太微十月乙未犯南斗庚子入犯羽林軍辛丑犯壁壘陣己酉入東井庚戌犯五諸侯六年正月丙子入太微戊寅犯平道二月甲辰入太微犯內屏辛亥犯斗四月壬寅入氐五月丙寅入太微戊辰犯平道庚午入氐戊寅入羽林軍戊戌犯鍵閉乙巳入羽林軍七月戊辰犯斗癸酉入羽林軍甲戌犯壁壘陣八月庚子入羽林軍閏八月戊辰又入辛未犯外屏丙子犯司怪丁丑犯東井戊寅犯五諸侯壬午入太微九月甲午入羽林軍丙申犯壁壘陣戊戌犯外屏壬寅犯諸王庚戌入太微十月壬戌入羽林軍己巳犯天街乙亥犯軒轅大星丁丑入太微犯內屏庚辰犯亢辛巳入氐十一月己丑入犯羽林軍戊戌犯司怪庚子犯五諸侯甲辰犯太微次將丙午犯進賢戊申入氐十二月甲子犯諸王壬申入太微七年正月己亥入太微壬寅犯亢二月戊午犯月星壬戌犯五諸侯丁卯入太微戊辰犯進賢戊寅入羽林軍三月壬辰犯軒轅大星甲午入太微犯內屏乙未犯太微上相丁酉犯亢戊戌入氐四月壬戌入太微癸亥犯進賢乙丑犯氐距星癸酉入羽林軍內甲戌犯壁壘陣丙子犯外屏五月己丑入太微六月丙辰入太微犯內屏庚申入氐犯東南星壬戌犯天江戊辰入羽林軍甲戌犯月星七月辛卯入南斗壬寅犯諸王八月壬戌入羽林軍九月甲申犯天江戊子犯哭泣辛卯犯壁壘陣乙未犯天陰丙申犯月星戊戌犯司怪庚子犯五諸侯癸卯犯軒轅次北星乙巳入太微犯內屏十月丁巳入羽林軍甲子犯天街又犯諸王癸酉入太微丙子犯氐距星十一月甲申入羽林軍庚寅犯天陰癸巳犯司怪庚子入太微十二月癸丑犯壁壘陣戊午犯月星壬戌犯五諸侯乙丑犯軒轅次北星丁卯入太微犯內屏庚午犯亢壬申犯房八年正月甲午入太微丙申犯進賢己亥犯日星二月癸亥犯太微上相丁卯犯心大星三月甲申犯五諸侯丁亥犯軒轅大星北第一星己丑入太微犯內屏庚寅犯左執法乙未犯天江丙申犯箕辛丑入羽林軍壬寅犯壁壘陣東北星四月丙辰入太微五月丁亥犯亢甲午犯壁壘陣西南星六月乙酉犯軒轅甲子犯壁壘陣七月己卯入太微甲申犯心距星庚寅犯五諸侯西第三星九月壬午犯狗國庚寅犯天陰壬辰犯司怪乙未犯五諸侯庚子入太微十月辛亥犯壁壘陣乙卯犯外屏戊午犯天陰壬子入羽林軍壬戌犯五諸侯丁卯入太微犯上將十一月庚辰入羽林軍乙酉犯天陰己亥犯氐十二月壬子犯天陰乙卯犯司怪丁巳犯五諸侯壬戌入太微癸亥犯左執法紹聖元年正月丁亥犯長垣己丑犯太微上將二月庚戌犯坐旗庚申犯角距星甲子犯箕距星乙丑犯斗三月己卯犯五諸侯東第二星四月丙午犯五諸侯西第三星閏四月己卯入太微犯右執法甲申犯房距星丁亥入斗犯東第二星五月壬子犯心距星六月己卯犯房距星辛巳犯箕八月丙子犯箕東北星九月戊申入羽林軍丁巳犯五諸侯東第二星癸亥犯太微左執法十月甲戌入羽林軍壬辰犯角距星乙未犯房距星十一月壬寅入羽林軍乙巳犯外屏西第二星戊申犯昴西北星壬子犯五諸侯西第四星癸丑犯鬼東北星癸亥犯心大星十二月庚午入羽林軍己卯犯五諸侯西第三星甲申犯太微上將二年正月乙巳犯坐旗南第一星辛亥犯靈臺甲寅犯角距星丁巳犯日星二月庚午犯昴己卯入太微犯右執法乙酉犯心東星三月乙卯入斗己未入羽林軍四月癸酉犯太微西扇上將乙亥犯角南星己卯犯房南第二星五月甲辰犯天門東星己酉犯箕東北星六月甲戌犯房距星辛巳入羽林軍戊子犯五車東南星七月壬寅犯心東星戊申入羽林軍犯壁壘陣西第六星丙辰犯坐旗南星八月辛未犯箕北第一星戊寅犯外屏西第一星丙戌犯鬼東北星九月癸卯入羽林軍甲辰犯壁壘陣西第八星十月庚午犯屏西第一星丙子犯昴西北星乙巳犯五車東南星丁未犯五諸侯西第五星戊申犯輿鬼東北星辛亥犯靈臺南第二星戊午掩心宿後星三年正月乙未犯外屏戊戌犯昴乙巳犯軒轅左角二月庚午犯鬼西北星壬申掩軒轅大星癸酉犯靈臺四月丁卯犯軒轅左角甲戌犯日星又犯房距星庚辰犯代星辛巳犯壁壘陣五月乙未犯靈臺壬寅犯心宿東星乙巳犯南斗六月壬午犯昴七月丙午犯外屏癸丑犯五諸侯八月丁卯入犯南斗戊寅犯五車辛巳犯輿鬼甲申犯靈臺九月甲午犯南斗辛丑犯外屏甲辰犯昴丙午犯司怪戊申犯水位壬子犯明堂十月壬戌犯狗星十一月己亥犯昴癸卯犯輿鬼壬子犯日星十二月壬戌入犯雲雨庚午犯五諸侯辛未入輿鬼掩積尸氣四年正月戊戌犯鬼西北星入鬼辛丑犯靈臺南第一星二月乙亥犯心東星閏二月辛卯犯井東扇北第一星壬辰犯五諸侯西第五星癸巳入鬼又犯輿鬼乙未犯軒轅左角己亥犯天門東星乙巳入斗犯斗西第四星三月癸亥犯靈臺南第一星己巳犯日星又犯房距星壬申犯斗距星戊辰掩雲雨西南星四月己丑犯軒轅御女星丁酉犯心東星庚子犯狗西星庚戌犯昴西北星五月丁卯掩斗西第四星癸酉入犯雲雨六月甲午入斗乙未犯狗東星庚子犯雲雨西南星七月壬戌犯狗西星壬申掩犯昴西北星乙亥犯司怪北第二星丙子犯積薪八月己丑犯斗西第四星癸巳犯哭泣東星乙未掩犯雲雨東北星甲辰入犯鬼及犯積尸氣九月丙辰犯北距星己未犯秦西星十月甲午犯昴西北星丁酉入井犯東扇北第一星戊戌犯積薪又犯水位東第一星庚子犯軒轅御女星壬寅犯明堂南第三星十一月丁巳入犯雲雨星十二月辛卯犯司怪北第二星壬辰犯井東扇北第一星乙未犯軒轅太民丙申犯靈臺南第一星丁酉犯明堂壬寅犯心距星癸卯犯天江南第一星元符元年正月庚申犯天罇辛酉入犯鬼己巳犯日星又犯房距星二月丁亥犯天罇辛卯犯靈臺甲辰犯哭泣三月癸丑犯司怪己巳犯羅堰又犯牛癸酉犯雲雨四月癸未犯鬼距星甲申犯酒旗甲午犯斗五月己未犯心距星庚申犯天江戊辰犯雲雨六月乙未又犯庚子犯昴西北星八月壬午犯天江九月丙辰犯虛梁壬戌犯昴甲子犯司怪乙丑入井十月戊寅犯斗癸未犯虛梁西第二星己丑犯天陰癸巳犯天罇甲午犯鬼距星庚子犯天門十一月戊申犯羅堰壬子犯雲雨丁巳犯昴距星庚申入井庚午犯心大星十二月戊寅犯虛梁丁亥入井戊子犯水位庚寅犯酒旗又犯軒轅右角壬辰犯明堂戊戌犯天江二年正月甲寅犯司怪北第三星丙辰犯水位西第三星壬戌犯天門東星甲子犯日星又犯房距星己巳掩牛南第一星二月己卯犯昴距星壬午入井乙酉犯酒旗南第三星又犯軒轅右角丁亥犯明堂西南第二星壬辰犯心距星癸巳犯天江西南第二星己亥犯虛梁西第一星三月己酉犯井距星庚戌犯天罇南星丁巳犯天門東星庚申犯天江西南第一星甲子犯羅堰南星戊辰犯雲雨東北星四月丙子犯司怪北第三星丁丑入井又犯井東扇北第三星丁亥犯心距星辛卯犯牛南星甲午犯虛梁西第三星乙未犯雲雨西北星庚子犯天陰北星五月乙巳犯水位西第二星丙辰犯天籥下東星丁巳犯建星西第二星辛酉犯虛梁西南第一星六月辛巳犯日星丙戌犯牛南星又犯羅堰南第二星庚寅犯雲雨東北星丙寅犯天街東北星戊戌入井七月庚戌犯天江西南第四星壬子犯建星西第三星丙辰犯虛梁西第三星丁巳犯雲雨西北星壬戌犯天陰西北星乙丑犯司怪北第三星丙寅入井犯東扇北第三星八月癸未犯虛梁西第一星庚寅犯昴東南星辛巳犯諸王西第二星癸巳入井丙申犯酒旗南第三星九月丁巳犯天陰北星閏九月甲申犯天陰西北星辛卯犯軒轅右角十月辛丑犯建西第一星