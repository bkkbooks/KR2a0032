body:
  text: 宋史卷一百四十五志第九十八儀衞三國初鹵簿國初鹵簿太祖建隆四年將郊祀大禮使范質與鹵簿使張昭儀仗使劉溫叟同詳定大駕鹵簿之制惟得唐長興南郊鹵簿字圖校以令文頗有闊略違戾者禮儀使陶穀建議金吾及諸衞將軍導駕及押仗舊服紫衣請依開元禮各服本色繡袍金吾以辟邪左右衞以瑞馬驍衞以雕虎威衞以赤豹武衞以瑞鷹領軍衞以白澤監門衞以師子千牛衞以犀牛六軍以孔雀為文舊執仗軍士悉衣五色畫衣隨人數給之無有準式請以五行相生之色為次黑衣先之青衣次之赤黃白又次之大駕五輅各有副車近代寖廢請依令文增造又案明宗舊圖導駕三引而儀仗法物人數多周太祖鹵簿六引而人數少請準令文用六引其鹵簿各依本品以給從之舊清游隊有甲騎具裝亡其制度穀以其所記造之又作大輦皆率意定其制穀又取天文大角攝提列星之象作攝提旗及北斗旗二十八宿旗十二辰旗龍墀十三旗五方神旗五方鳳旗四瀆旗時有貢黃鸚鵡白兔及馴象自來又作金鸚鵡玉兔馴象旗太祖又詔別造大黃龍負圖旗一大神旗六日旗一月旗一君王萬歲旗一天下太平旗一師子旗二金鸞旗一金鳳旗一五龍旗五凡二十一旗皆有架南郊用之大黃龍負圖旗陳於明德門前餘二十旗悉立於宿頓宮前遇朝會冊禮亦皆陳於殿庭凡馬步儀仗共一萬一千二百二十二人悉用禁軍大將軍將軍以軍主都虞候攝事中郎將都尉以指揮使副指揮使攝事校尉主帥以軍使副兵馬使都頭副都頭十將攝事乾德三年蜀平命左拾遺孫逢吉收蜀法物其不中度者悉毀之是歲太祖親閱鹵簿四年始令改畫衣為繡衣至開寶三年而成謂之繡衣鹵簿其後郊祀皆用之軍衞羽儀自是寖甚每大祀命大禮禮儀儀仗鹵簿橋道頓遞五使鹵簿使專掌定字圖排列儀仗使糾督之大禮及餘使同按閱致齋日巡仗又命殿前大校管勾捧日奉宸隊侍衞大校勾當儀仗兵隊捧日天武廂主四人編排捧日奉宸隊及執仗人內諸司使副使三員同押儀仗別二員編排導引官六年詔節度使已下除在京巡檢及押儀仗外並令服袴褶衣導引太宗至道中令有司以絹畫為圖圖凡三幅中幅車輅六引及導駕官外兩幅儀衞其警場青城又別為圖圖成以藏祕閣凡仗內自行事官排列職掌并捧日奉宸散手天武外步騎一萬九千一百九十八人此極盛也真宗咸平五年詔南郊儀仗引駕官不得多帶從人宰臣親王樞密宣徽使參知政事樞密副使三司使各四人尚書節度使翰林學士侍讀侍講學士各三人給事諫議知制誥大卿監金吾大將軍樞密都承旨副承旨客省閤門使副使諸司使副使至內殿崇班各二人少卿監諸行郎中已下閤門祗候已下各一人又詔南郊引駕官中書樞密院一行在東親王一行在西餘依官次大中祥符元年改小駕為鸞駕自太祖易繡衣鹵簿後太宗真宗皆增益之仁宗即位儀典多襲前世宋綬定鹵簿為圖記十卷上之詔以付祕閣凡大駕用二萬六十一人大率以太僕寺主車輅殿中省主輿輦繖扇御馬金吾主纛矟十六騎引駕細仗牙門六軍主槍仗尚書兵部主六引諸隊大角五牛旗門下省主寶桉司天臺主鐘漏太常主鼓吹朝服法物庫出旗器名物衣冠幰蓋軍器庫出箙弩矢內弓箭庫出戎裝雜仗凡六引導駕太僕卿千牛將軍殿中侍御史司天監少府監僚佐局官乘黃令大將軍金吾上將軍將軍六統軍皆以京朝官內諸司使副使以下攝事仗內用禁軍諸班直捧日天武拱聖神勇宣武驍騎武勝寧朔虎翼兵大將軍將軍以軍主都虞候攝中郎將郎將都尉以指揮使副指揮使攝校尉主帥旅帥隊正以軍使副兵馬使都頭副都頭十將攝餘法駕鸞駕黃麾仗則遞減其數景祐五年賈昌朝言儀衞三事一曰南郊鹵簿車駕出宮詣郊廟日執毬杖供奉官於導駕官前分列迎引至於齋宮夫毬杖非古蓋唐世尚之以資玩樂其執之者皆服錦繡珠玉過於侈麗既不足以昭文物又不可以備軍容常時豫游或宜施用方今夙夜齋戒親奉大祀端冕顒昂鼓吹不作而乃陳戲賞之具參簪紳之列導迎法駕入于祠宮稽諸典儀未為允稱况導駕官兩省員數悉備何煩更有此色供奉官謂宜徹去毬杖俟禮畢還宮鼓吹振作即復使就列二曰大駕鹵簿有羊車前列臣案羊車本漢晉之代乘於後宮隋大業中增金寶之飾駕以小駟馭以童自是以來遂為法從唐制兼有輦車副車之名國朝因循尚未改革竊以郊祭天地廟見祖宗車服所陳動必由禮至於四望耕根之屬兼包歷代皆或有因豈容後宮所乘參陪五輅欲望大駕不用羊車所冀肅恭稽合典禮三曰南郊大駕鹵簿儀衞甚衆有司雖依典禮名物次第兵杖數目預先分布及五使量行案閱其如被差執掌吏員兵伍素不閑習行列先後多失次序所持名物亦或差互押當官但以行事為名從便趨進失其處守竊謂三載親郊國之大事旁陳象物仰法乾行四方之人觀禮於是宜詳制度以示光華請大駕鹵簿前後仗衞次第於致齋前命儀仗鹵簿使令有司執簿籍率押當官暨諸衞諸省執仗士卒將領者自殿門至郊廟分列之處詳視先後及器仗名品無令差忒詔禮儀使宋綬與太常禮院同詳定以奏綬奏鹵簿內有諸司供奉蓋資備物以奉乘輿今昌朝言宿齋之時不可陳玩樂之具請郊祀前一日應供奉官等令宿幕次俟皇帝行禮畢降壇導至青城由青城前導歸大內後漢劉熙釋名曰吂月馬凡車羊車各以所駕名之也隋禮儀志曰漢氏或以人牽或駕果下馬此乃漢代已有晉武偶取乘於後宮非特為掖庭制也况歷代載於輿服志自唐至今著之禮令宜且仍舊其鹵簿儀仗遇南郊前五使預閱素備願依昌朝所奏下儀仗鹵簿使加點閱使之齊肅皇祐二年將享明堂鹵簿使奏法駕減大駕三分之一而兵部亡字圖故本且文牘散逸雖粗有名數較之禮令未有以裁其中詔禮官與兵部加考正為圖以奏及上圖法駕鹵簿用萬有一千八十八人嘉祐二年祫享用禮儀使奏南郊仗金吾上將軍六統軍左右千牛皆服紫繡戎服珂珮騎而前節度使亦衣袴褶導駕如舊例是月禮官奏南郊還在禮當乘金輅而或詔乘大輦宜著于令常以大輦從六年幸睦親宅內侍抱駕頭墮馬駕頭壞御史中丞韓絳奏請嚴儀衞事下閤門太常禮院議遂合奏車駕出請以閤門祗候及內侍各二員扶駕頭左右次扇筤又以皇城親從兵二十人從其後神宗熙寧七年詔太常看詳兵部大駕鹵簿字圖遂奏言制器尚象有其數者必有其義後世車駕儀仗多雜秦漢制度當革其尤者周禮車僕凡師共革車各以其萃萃副車也諸輅之副宜次正輅羊車前代宮中所乘五牛旗蓋古之五時副車也以木牛載旗用人輿之失其本制宜除去從之元豐元年詳定所言大駕輿輦仗衞儀物兼取歷代所用其間情文訛舛甚衆或規摹苟簡而因循已久或事出一時而不足為法詔令更定於是請去二十八宿五星攝提旗所繪人形及龍虎仙童大神金鸚鵡黃鸚鵡網子螣蛇神龜等旗舊制親祠南郊皇帝自大次至版位內侍二人執翟羽前導號曰拂翟拂翟不出禮典乃漢乾祐中宮中導從之物不宜用諸郊廟詔可又禮文所言近制金輅不以金飾諸末象輅不以象飾諸末革輅不鞔木輅不漆請改飾四輅太常則繪三辰加升龍降龍大旂則繪交龍大赤鳥隼大白熊虎大麾龜蛇而去其雲龍使之應禮又古者五輅皆載旗謂之道德之車考工記車戟崇於殳酋矛崇於戟各四赤戟矛皆插車騎謂之兵車戰國尚武故增插四戟謂之闟戟則知德車武車固異用矣漢鹵簿前驅有鳳凰闟戟猶未施於五輅江左以來五輅乃加棨戟於車之右韜以黼繡之衣後周司輅左建旗右建闟戟闟戟方六尺而被之以黼皆戾於古請去五輅闟戟以應道德之稱而建太常於車後之中央升輅則由左又按周禮大馭掌馭玉輅以祀則祀乘玉輅也齋僕掌馭金輅齋右充金輅之右則齋乘金輅也齋祀之車異用而不相因國朝親祠太廟致齋文德殿翌日即進玉輅非制請進金輅俟太廟祠畢翌日御玉輅詣郊又周禮戎右職曰會同充革車儀禮曰貳車畢乘禮記曰乘君之乘車不敢曠左左必式蓋古者後車餘輅不敢曠空必使人乘之所以別曠左之嫌也自秦兼九國車服西漢因之大駕屬車八十一乘後漢志云尚書御史所載揚雄曰鴟夷國器託於屬車則是漢之屬車非獨載人又以載物亦儀禮所謂畢乘之義也國朝鹵簿車十二乘虛設於法駕之後實近曠左之嫌請令尚書御史乘之或以載乘輿服御又言法駕之行必有共輿者蓋以承清問周官有太僕齋僕道僕所以御車至參乘則其禮益重故道德之車則有齋右道右武車則有戎右皆以士大夫為之國朝之制乘輿有太僕而無參乘請增近臣一員立車右其後詔增製五輅及參乘玉輅建太常金輅建大旂象輅建大赤革輅建大白木輅建大麾諸輅之副各次正輅仍存闟戟焉時大駕鹵簿仗下官一百四十六員執仗押引從軍員職掌諸軍諸司二萬二千二百二十一人初玉輅自唐顯慶中傳之號顯慶輅神宗更製新玉輅六年正月御大慶殿受朝先夕陳諸庭夜半徹幕屋壓焉自是竟乘舊輅徽宗建中靖國元年太常寺狀具南郊儀仗人兵二萬一千五百七十五人政和四年禮制局言鹵簿六引儀仗信幡承以雙龍大角黑漆畫龍紫繡龍袋長鳴次鳴大小橫吹五色衣旛緋掌畫交龍按樂令三品以上緋掌畫蹲豹蓋唯乘輿器用並飾以龍今六引內係羣臣鹵簿而旗物通畫交龍非便合釐正七年兵部尚書蔣猷請令有司取天聖鹵簿圖記更加考正可否而因革之詔如其請宣和元年蔡攸被旨改修凡人物器服盡從古制飾以丹采三十有三卷高宗初至南京孟太后以乘輿服御及御輦儀仗來進建炎初詔東京所屬起發祭器法服儀仗赴行在所十一月帝郊於揚州儀仗用一千三百五十五人倉卒渡江皆為金兵所焚紹興十二年有司言天子起居當備法駕况太母回鑾將奉郊迎遂令工部尚書莫將等檢會本朝文德大慶殿舊儀下太常定用二千二百六十五人於是始備黃麾仗慶冊親饗皆用焉是年冬玉輅成明年郊準國初大駕之數一萬一千二百二十二人內舊用錦襖子者以纈繒代用銅革帶者以勒帛代而指揮使都頭仍舊用錦帽子錦臂袖者以方勝練鵲羅代用絁者以紬代禁衞班直服色用錦繡金銀真珠北珠者七百八十人以頭帽銀帶纈羅衫代旗物用繡者以錯采代車路院香鐙案衣褥睥睨御輦院華蓋曲蓋及仗內幢角等袋用繡者以生色代殿前司仗內金槍銀槍旗幹易以漆飾而拂扇坐褥以珠飾者去之帝曰事天貴質若惟事華麗非初意矣十月鹵簿器物及金象革木四輅大安輦皆成太常又奏前後六引鼓吹八百八十四人舊制騎今路狹擁遏欲止令步導從之十六年始增捧日奉宸隊合一萬五千五十人鹵簿之制備矣三十一年九月行明堂禮儀物視郊祀省三之一用一萬一千五人孝宗隆興二年正月以鹵簿勞民乃令有司條具其可省者次年郊祀止用六千八百八十九人蓋減紹興二十八年人數之半也乾道六年之郊雖仍備五輅大安輦六象而人數則如舊焉自後終宋之世雖微有因革大抵皆如乾道六年之制若明堂則四輅大安輦皆省止用三千三百十九人故事祀前二日詣景靈宮皆備大駕儀仗乘輅中興後以行都與東都不同前二日止乘輦次日自太廟詣青城始登輅設鹵簿自紹興十三年始也車駕遇雨玉輅施障從駕臣僚賜雨具中道遇晴則撤郊壇遇雨則就青城放御仗逍遙子還宮導駕官免步導大駕鹵簿象六中道分左右次六引中道第一開封令第二開