body:
  text: 宋史卷一百志第五十三禮三吉禮三北郊祈穀五方帝感生帝北郊宋初方丘在宮城之北十四里以夏至祭皇地祇別為壇於北郊以孟冬祭神州地祇建隆以來迭奉四祖崇配二壇太平興國以來但以宣祖太祖更配真宗乃以太宗配方丘宣祖配神州地祇皇祐初禮官言皇地祇壇四角再成面廣四丈九尺東西四丈六尺上成高四尺五寸下成高五尺方五丈三尺陛廣三尺五寸卑陋不應典禮請如唐制增廣之五年諸壇皆改嘉祐配位七十一加羊豕各五慶曆用犢羊豕各一既而諫官司馬光奏大行請謚于南郊而皇地祇止於望告失尊卑之序下禮院定非次祭告皇地祇請差官詣北郊行事其神州之壇方三丈一尺皇祐增高三尺廣四十八步內壝四面以青繩代之仍遣內臣降香有司攝事如儀神宗元豐元年二月郊廟奉祀禮文所言古者祀天於地上之圜丘在國之南祭地于澤中之方丘在國之北其牲幣禮樂亦皆不同所以順陰陽因高下而事之以其類也由漢以來乃有夫婦共牢合祭天地之說殆非所謂求神以類之意本朝親祀上帝即設皇地祇位稽之典禮有所未合遂詔詳定更改以聞於是陳襄王存李清臣張璪黃履陸佃何洵直楊完等議或以當郊之歲冬夏至日分祭南北郊各一日而祀徧或於圜丘之旁別營方丘而望祭或以夏至盛暑天子不可親祭改用十月或欲親郊圜丘之歲夏至日遣上公攝事於方丘議久未决三年翰林學士張璪言先王順陰陽之義以冬至祀天夏至祀地此萬世不可易之理議者乃欲改用他月無所據依必不得已宜即郊祀之歲於夏至之日盛禮容具樂舞遣冢宰攝事雖未能皆當於禮庶幾先王之遺意猶存焉於是禮官請如璪議設宮架樂文武二舞改製樂章用竹冊匏爵增配帝犢及捧俎分獻官廣壇壝齋宮脩定儀注上之既而曾肇言今冬至若罷合祭而夏至又以有司攝事則不復有親祭地祇之時於父天母地之義若有隆殺請遇親祀南郊之歲以夏至日備禮躬款北郊以存事地之義四年四月乃詔親祀北郊並依南郊之儀有故不行即以上公攝事六年禮部太常寺上親祀儀並如南郊其攝事唯改舞名及不備官其籩豆樂架玉幣之數盡如親祠是歲十一月甲辰冬至祀昊天上帝以太祖配始罷合祭不設皇地祇位哲宗初立未遑親祀有司攝事如元豐儀元祐五年夏至祭皇地祇命尚書右丞許將攝事將言王者父天母地三歲冬至天子親祠徧享宗廟祀天圜丘而夏至方澤之祭乃止遣上公則皇地祇遂永不在親祠之典此大闕禮也望博詔儒臣講求典故明正祀典為萬世法禮部尚書趙彥若請依元豐所定郊祀之歲親祀方丘及攝事已合禮之正更不須聚議禮部郎中崔公度請用陳薦議仍合祭天地從祀百神復詔尚書侍郎兩省及侍從臺諫禮官集議於是翰林學士顧臨等八人請合祭如故事竢將來親祠北郊則合祭可罷宋興一祖六宗皆合祭天地其不合祭者惟元豐六年一郊爾去所易而就所難虛地祇之大祭失今不定後必悔之吏部侍郎范純禮等二十二人皆主北郊之議中書舍人孔武仲又請以孟冬純陰之月詣北郊親祠如神州地祇之祭彭汝礪曾肇復上疏論合祭之非文多不載九月三省上顧臨等議太皇太后曰宜依仁宗皇帝故事呂大防言諸儒獻議欲南郊不設皇地祇位於祖宗之制未覩其可范百祿以圜丘無祭地之禮記曰有其廢之莫可舉也先帝所廢稽古據經未可輕改大防又言先帝因禮文所建議遂令諸儒定北郊祀地之禮然未經親行今皇帝臨御之始當親見天地而獨不設地祇位恐亦未安況祖宗以恩霈四方慶賚將士非三歲一行則國力有限今日宜為勉行權制俟北郊議定及太廟享禮行之未晚太皇太后以大防之言為是而蘇頌鄭雍皆以古者人君嗣位之初必郊見天地今皇帝初郊而不祀地恐未合古乃下詔曰國家郊廟特祀祖宗以來命官攝事惟三歲一親郊則先享清廟冬至合祭天地于圜丘元豐間有司援周制以合祭不應古義先帝乃詔定親祀北郊之儀未之及行是歲郊祀不設皇地祇位而宗廟之享率如權制朕方脩郊見天地之始其冬至日南郊宜依熙寧十年故事設皇地祇位以嚴並況之儀厥後躬行方澤之祀則脩元豐六年五月之制俟郊禮畢集官詳議典禮以聞十一月冬至親祠南郊遂合祭天地而詔罷飲福宴八年禮部尚書蘇軾復陳合祭六議令禮官集議以聞已而下詔依元佑七年故事合祭天地于南郊仍罷集議紹聖元年以右正言張商英言先帝制詳定禮文所謂合祭非古據經而正之元祐之臣乃復行合祭請再下禮官議御史中丞黃履謂南郊合祭因王莽諂事元后遂躋地位同席共牢迨先帝親郊大臣以宣仁同政復用莽意合祀瀆亂典禮帝以詢輔臣章惇曰北郊止可謂之社黃履曰郊者交於神明之義所以天地皆稱郊社者土之神爾豈有祭大祇亦可謂之社乎乃以履奏送禮部太常寺權禮部侍郎盛陶太常丞王誼等言宜用先帝北郊儀注以時躬行罷合祭禮已而三省言合祭既非禮典但盛夏祭地祇必難親行詔令兩省臺諫禮官同議可親祀北郊然後罷合祭之禮曾布錢勰范純禮韓宗師王古井亮采常安民李琮虞策劉定傅楫黃裳豐稷葉祖洽等言互有是否蔡京林希蔡卞黃履吳安持晁端彥翟思郭知章劉拯黃慶基董敦逸等請罷合祭詔從之然北郊親祀終帝之世未克舉云建中靖國元年命禮部太常寺詳定北郊儀制殿中侍御史彭汝霖又請改合祭之禮韓忠彥以為不可曾布力主北郊之說帝亦然之遂罷合祭政和三年詔禮制局議方壇制度是歲新壇成初元豐三年七月詔改北郊圜壇為方丘六年命禮部太常定北郊壇制哲宗紹聖三年權尚書侍郎黃裳等言南郊青城至壇所五百一十八步自瑞聖園至皇地祇壇之東壇五百五十六步相去不遠其壇係國初所建神靈顧享已久元豐間有司請地祇神州並為方壇壇之外為坎詔止改圜壇為方請下有司比類南郊增飾制度除治四面稍令低下以應澤中之制詔禮部再為詳定指畫興築至是禮制局言方壇舊制三成第一成高三尺第二成第三成皆高二尺五寸上廣八丈下廣十有六丈夫圜壇既則象於乾則方壇當效法於坤今議方壇定為再成一成廣三十六丈再成廣二十四丈每成崇十有八尺積三十六尺其廣與崇皆得六六之數以坤用六故也為四陛陛為級一百四十有四所謂坤之策百四十有四者也為再壝壝二十有四步取坤之策二十有四也成與壝俱再則兩地之義也齋宮大內門曰廣禋東偏門曰東秩西偏門曰西平正東門曰含光正西門曰咸亨正北門曰至順南內大殿門曰厚德東曰左景華西曰右景華正殿曰厚德便殿曰受福曰坤珍曰道光亭曰承休後又增四角樓為定式其神位崇寧初禮部員外郎陳暘言五行於四時有帝以為之主必有神以為之佐今五行之帝既從享於南郊第一成則五行之神亦當列於北郊第一成天莫尊於上帝而五帝次之地莫尊於大祇而嶽帝次之今尚與四鎮海瀆並列請升之於第一成至是議禮局上新儀皇地祇位於壇上北方南向席以秸太祖皇帝位於壇上東方西向席以蒲越木神勾芒東嶽於壇第一龕東鎮海瀆於第二龕東山林川澤於壇下東丘陵墳衍原隰於內壝之內皆在卯階之北以南為上神州地祇火神祝融南嶽於壇第一龕南鎮海瀆於第二龕南山林川澤於壇下南丘陵墳衍原隰於內壝之內皆在午階之東以西為上土神后土中嶽於壇第一龕中鎮於第二龕中山林川澤於壇下中丘陵墳衍原隰於內壝之內皆在午階之西以西為上金神蓐收西嶽於壇第一龕西鎮海瀆於第二龕崑崙西山林川澤於壇下西丘陵墳衍原隰於內壝之內皆在酉階之南以北為上水神玄冥北嶽於壇第一龕北鎮海瀆於第二龕北山林川澤於壇下北丘陵墳衍原隰於內壝之內皆在子階之西以東為上神州地祇席以秸餘以莞席皆內向其餘並如元豐儀壇壝之制其位板之制上帝位板長三尺取參天之數厚九寸取乾元用九之數廣尺二寸取天之備數書徽號以蒼色取蒼璧之義皇地祇位板長二尺取兩地之數厚六寸取坤元用六之數廣一尺取地之成數書徽號以黃色取黃琮之義皆以金飾配位板各如天地之制又言大禮格皇地祇玉用黃琮神州地祇五嶽以兩圭有邸今請二者並施於皇地祇求神以黃琮薦獻以兩圭有邸神州惟用圭邸餘不用玉琮之制當用坤數宜廣六寸為八方而不剡兩圭之長宜共五寸並宿一邸色與琮同牲幣如之又言常祭地祇配位各用冰鑑一今親祀盛暑請增正配及從祀位冰鑑四十一並從之四年五月夏至親祭地于方澤以皇弟燕王俁為亞獻越王偲為終獻皇帝散齋七日于別殿致齋七日于內殿一日於齋宮前一日告配太祖室其有司陳設及皇帝行事並如郊祀之儀是後七年至宣和二年五年親祀者凡四高宗紹興初惟用酒脯鹿臡行一獻禮二年太常少卿程瑀言皇地祇當一依祀天儀式詔從之又言國朝祀皇地祇設位於壇之北方南向政和四年設於南方北向今北面望祭北向為難且於經典無據請仍南向淳熙中朱熹為先朝南北郊之辯曰禮郊特牲而社稷太牢書用牲于郊牛二及社于新邑此明驗也本朝初分南北郊後復合而為一周禮亦只說祀昊天上帝不說祀后土故先儒言無北郊祭社即是祭地古者天地未必合祭日月山川百神亦無一時合祭共享之禮古之時禮數簡而儀從省必是天子躬親行事豈有祭天却將上下百神重沓累積併作一祭耶且郊壇陛級兩邊上下皆是神位中間恐不可行或問郊祀后稷以配天宗祀文王以配上帝帝即是天天即是帝却分祭何也曰為壇而祭故謂之天祭於屋下而以神祇祭之故謂之帝祈穀雩祀宋之祀天者凡四孟春祈穀孟夏大雩皆於圜丘或別立壇季秋大饗明堂惟冬至之郊則三歲一舉合祭天地焉開寶中太祖幸西京以四月有事南郊躬行大雩之禮淳化至道太宗亦以正月躬行祈穀之祀悉如圜丘之禮景德三年龍圖閣待制陳彭年言伏覩畫日來年正月三日上辛祈穀至十日始立春按月令正月元日注為祈穀郊祀昊天上帝春秋傳曰啟蟄而郊郊而後耕蓋春氣初至農事方興郊祀昊天以祈嘉穀當在建寅之月迎春之後自晉泰始二年始用上辛不擇立春之先後齊永明元年立春前郊議欲遷日王儉曰宋景平元年元嘉六年並立春前郊遂不遷日吳操之云應在立春前然則左氏所記乃三代彝章王儉所言乃後世變禮來年正月十日立春三日祈穀斯則襲王儉之末議違左氏之明文望以立春後上辛行祈穀禮因詔有司詳定諸祠祭祀有司言今年四月五日雩祀上帝十三日立夏祀赤帝按月令立夏之日天子迎夏于南郊注云為祀赤帝於南郊又云是月也大雩注云春秋傳曰龍見而雩龍星謂角亢也立夏後昏見於東方按五禮精義云自周以來歲星差度今之龍見或在五月以祈甘雨於時已晚但四月上旬卜日今則惟用改朔不待得節祭於立夏之前殊違舊禮之意苟或龍見於仲夏雩祀於季春相去遼闊於禮未周欲請並於立夏後卜日如立夏在三月則待改朔天禧元年十二月禮儀院言準畫日來年正月十七日祈穀前二日奏告太祖室緣歲以正月十五日朝拜玉清昭應宮景德四年以前祈穀止用上辛其後用立春後辛日蓋當時未有朝拜宮觀禮王儉啟云近代明例不以先郊後春為嫌又宋孝武朝有司奏魏代郊天值雨更用後辛或正月上辛事有相妨並許互用在於禮典固亦無嫌初祈穀大雩皆親祀上帝由熙寧迄靖康惟有司攝事而已元豐中禮官言慶曆大雩宗祀之儀皆用犢羊豕各一唯祈穀均祀昊天上帝止用犢一請依雩祀大享明堂牲牢儀用犢羊豕各一四年十月詳定郊廟奉祀禮文所言近詔宗祀明堂以配上帝其餘從祀羣神悉罷今祈穀大雩猶循舊制皆羣神從祀恐與詔旨相戾請孟春祈穀孟夏大雩惟祀上帝以太宗皇帝配餘從祀羣神悉罷又請改築雩壇於國南門以嚴祀事並從之五年七月禮部言雩壇當立於圜丘之左巳地其高一丈廣輪四丈周十二丈四出陛為三壝各二十五步周垣四門一如郊壇之制從之大觀四年二月禮局議以立春後上辛祈穀詔以今歲孟春上辛在丑次辛在亥遇丑不祈而祈於亥非禮也乃不果行政和祈穀儀前期降御札以來年正月上辛祈穀祀上帝前祀十日太宰讀誓於朝堂刑部尚書涖之少宰讀誓於太廟齋房刑部侍郎涖之皇帝散齋七日致齋三日前祀一日服通天冠絳紗袍乘玉輅詣青城祀日自齋殿服通天冠絳紗袍乘輿至大次服袞冕執圭入正門宮架儀安之樂作禮儀使奏請行事宮架作景安之樂帝臨降康之舞六成止太常升烟禮儀使奏請再拜盥洗升壇上登歌嘉安之樂作皇帝搢大圭執鎮圭詣上帝神位前北向奠鎮圭於繅藉執大圭俛伏興又奏請搢大圭跪受玉幣奠訖詣太宗神位前東向奠幣如上儀登歌作仁安之樂皇帝降階有司進熟禮儀使奏請執大圭升壇登歌歆安之樂作皇帝詣上帝神位前酌獻執爵祭酒讀冊文訖奏請皇帝再拜詣太宗神位前酌獻並如上儀登歌作紹安之樂皇帝降階入小次文舞退武舞進宮架容安之樂作亞獻酌獻宮架作隆安之樂神保錫羨之舞終獻如之禮儀使奏請皇帝詣飲福位宮架禧安之樂作皇帝受爵又請再拜有司徹俎登歌成安之樂作送神宮架景安之樂作皇帝詣望燎位禮畢還大次雩祀上帝儀亦如之惟太宗神位奠幣作獻安之樂酌獻作感安之樂南渡後以四祀二在南郊圜壇二在城西惠照院齋宮紹興十四年始具樂舞用政和儀增籩豆之數乾道五年太常少卿林栗乞四祭並即圜壇禮部侍郎鄭聞謂明堂當從屋祭不當在壇有司攝事當於望祭殿行禮從之淳熙十六年光宗受禪始奉高宗配焉五方帝宋因前代之制冬至祀昊天上帝于圜丘以五方帝日月五星以下諸神從祀又以四郊迎氣及土王日專祀五方帝以五人帝配五官三辰七宿從祀各建壇于國門之外青帝之壇其崇七尺方六步四尺赤帝之壇其崇六尺東西六步三尺南北六步二尺黃帝之壇其崇四尺方七步白帝之壇其崇七尺方七步黑帝之壇其崇五尺方三步七尺天聖中詔太常葺四郊宮少府監遣吏齎祭服就給祠官光祿進胙監祭封題慶曆用羊豕各一正位太尊著尊各二不用犧尊增山罍為二壇上簠簋俎各增為二皇祐定壇如唐郊祀錄各廣四丈其崇用五行八七五九六為尺數嘉祐加羊豕各二元祐六年知開封府范百祿言每歲迎氣於四郊祀五帝配以五神國之大祠也古者天子皆親帥三公九卿諸侯大夫以虔恭重事而導四時之和氣焉今吏部所差三獻皆常參官其餘執事贊相之人皆班品卑下不得視中祠行事者之例請下禮部與太常議宜以公卿攝事從之景德中南郊鹵簿使王欽若言五方帝位板如靈威仰赤熛怒含樞紐白招拒叶光紀恐是五帝之名理當恭避禮官言開寶通禮義纂五者皆是帝號漢書注自有名即蒼帝靈符赤帝文祖白帝顯紀黑帝玄矩黃帝神斗是也既為美稱不煩回避嘉祐元年以集賢校理丁諷言按春秋文耀勾為五帝之名始下太常去之其祀儀皇帝服袞冕祀黑帝則服裘被袞配位登歌作承安之樂餘並如祈穀禮立春祀青帝以帝太昊氏配勾芒氏歲星三辰七宿從祀勾芒位壇下卯階之南歲星析木大火壽星位壇下子階之東西上角亢氐房心尾箕宿位于壇下子階之西東上立夏祀赤帝以帝神農氏配祝融氏熒惑三辰七宿從祀祝融位壇下卯階之南熒惑鶉首鶉火鶉尾位子階之東西上井鬼柳星張翼軫宿位于壇下子階之西東上季夏祀黃帝以黃帝氏配后土鎮星從祀后土位壇下卯階之南鎮星位壇下子階之東立秋祀白帝以帝少昊氏配蓐收太白三辰七宿從祀蓐收位壇下卯階之南太白大梁降婁實沈位壇下子階之東西上奎婁胃昴畢觜參宿位于子階之西東上立冬祀黑帝以帝高陽氏配玄冥辰星三辰七宿從祀玄冥位壇下卯階之南辰星諏訾玄枵星紀位子階之東西上斗牛女虛危室壁宿位子階之西東上紹興仍舊制祀五帝于郊感生帝即五帝之一也帝王之興必感其一北齊隋唐皆祀之而隋唐以祖考升配宋因其制乾德元年太常博士聶崇義言皇帝以火德上承正統請奉赤帝為感生帝每歲正月別壇而祭以符火德事下尚書省集議請如崇義奏乃酌隋制為壇于南郊高七尺廣四丈日用上辛配以宣祖牲用騂犢二玉用四圭有邸幣如方色明年正月有司言上辛祀昊天上帝五方帝從祀今既奉赤帝為感生帝一日之內兩處俱祀似為煩數況同時並祀在禮非宜昊天從祀請不設赤帝坐從之乾興元年九月太常丞同判禮院謝絳言伏覩本院與崇文院檢討官詳定以宣祖配感生帝竊尋宣祖非受命開統義或未安唐武德初圜丘方丘雩祀並以景帝配祈穀大享並以元帝配太宗初奉高祖配圜丘明堂北郊元帝配感生帝高宗永徽二年祀高祖於圜丘祀太宗於明堂兼感生帝作主又以景帝元帝稱祖萬代不遷停配以符古義臣以為景帝厥初受封為唐始祖蓋與宣祖不侔宣祖於唐是為元帝之比唐有天下裁越三世而景元二祖已停配典有宋受命既自太祖于今四聖而宣祖侑祀未停恐非往典之意請依永徽故事停宣祖配仍用太宗故事宗祀真宗於明堂兼感生帝作主若據鄭氏說則曰五帝迭王王者因所感別祭尊於南郊以祖配之今若不用武德永徽故事請以太祖兼配正符鄭說詳鄭之意非受命始封之祖不得配故引周后稷配靈威仰之義為證惟太祖始造基業躬受符命配侑感帝據理甚明如恐祠日相妨當以太宗配祈穀太祖配雩祀亦不失尊嚴之旨臣以為宣廟非惟不遷而迭用配帝於古為疑禮祖有功宗有德但非受命之祖親盡必毀況配享乎翰林承旨李維等議按禮祭法正義曰郊謂夏正建寅之月祭感生帝於南郊此則崇配之文也竊惟感帝比祈穀禮秩差輕宣祖比太祖功業有異今以太祖配祈穀宣祖配感帝稱情立文於禮斯協詔從所定其祀儀皇帝散齋七日致齋三日太史設帝位於壇上北方南向席以秸配帝位于壇上東方西向席以蒲越配位奠幣作皇安之樂酌獻作肅安之樂餘如祈穀祀上帝儀紹興十八年臣僚言我朝祀赤帝為感生帝世以僖祖配之祖宗以來奉事尤謹故子孫衆多與天無極中興浸久祀秩咸脩惟感生帝有司因循尚淹小祀寓於招提酒脯而已宜詔有司升為大祀庶幾天意潛孚永錫蕃衍詔禮官議之遂躋大祀禮行三獻用籩豆十二設登歌樂舞望祭於齋宮
