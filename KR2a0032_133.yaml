body:
  text: 宋史卷一百三十三志第八十六樂八樂章二明堂大饗皇地祇神州地祇朝日夕月高禖九宮貴神景祐大享明堂二首真宗配位奠幣誠安思文聖考對越在天侑神作主奉幣申虔酌獻德安偃革興文封巒考瑞威烈巍巍允膺宗祀皇祐親享明堂六首降神誠安維聖享帝維孝嚴親肇圖世室躬展精禋鏞鼓既設籩豆既陳至誠攸感保格上神奠玉幣鎮安乾亨坤慶育函生路寢明堂致潔誠玉帛非馨期感格降康億載保登平酌獻慶安肅肅路寢相維明堂二儀鑒止三聖侑旁靈期欣合祠節齊莊至誠並貺降福無疆三聖配位奠幣信安祖功宗德啓隆熙嚴配交修太室祠圭幣薦誠知顧享本支錫羡固邦基酌獻孝安藝祖造邦二宗紹德肅雍孝享登配圜極先訓有開菲躬何力歆馨錫羡保民麗億送神誠安我將我享辟公顯助獻終豆徹禮成樂具飾駕上遊升煙高騖神保聿歸介茲景祚嘉祐親享明堂二首降神誠安燁燁房心下照重屋我嚴帝親匪配之瀆西皓沆碭夕景已肅靈其來娭嘉薦芳郁送神誠安明明合宮莫尊享帝禮樂熙成精與神契桂尊初闌羽駕倏逝遺我嘉祥於顯萬世熙寧享明堂二首英宗奠幣誠安於皇聖考克配上帝永言孝思昭薦嘉幣酌獻德安英聲邁古德施在民允秩宗祀賓延上神元符親享明堂十一首皇帝升降儀安嚴父配天孝乎明堂與奠升階降音以將天步有節帝容必莊辟公憲之禮無不臧上帝位奠玉幣鎮安聖能享帝孝克事親於皇宗祀盛節此陳何以薦虔二精有煒何以致祥上天鑒止神宗奠幣信安合宮禮備時維哲王堂筵四敞明德馨香聖考來格降福穰穰承承繼繼萬祀其昌奉俎禧安奕奕明堂天子即事奠我聖考配于上帝凡百有職疇敢不祗俎潔牲肥其登有儀上帝位酌獻慶安惟禮不瀆所以嚴親惟考不匱所以教民陟配文考享于大神重禧纍福祚裔無垠配位酌獻德安隆功駿德兩有烈光陟配宗祀惠我無疆退文舞迎武舞穆安舞以象功樂惟崇德文經萬邦武靖四國一張一弛其儀不忒神鑒孔昭孝思維則亞獻穆安於昭盛禮嚴父配天盡物盡誠莫匪吉蠲重觴既薦九奏相宣神介景福億萬斯年飲福胙安莫尊乎天莫親乎父既享既侑誠申禮舉戞擊堂上八音始具天子億齡飲神之胙徹豆欽安穆穆在堂肅肅在庭於顯辟公來相思成神既歆止有聞無聲錫我休嘉燕及羣生歸大次憩安有奕明堂萬方時會宗子聖考作帝之配樂酌虞典禮從周志釐事既成於皇來暨大觀宗祀明堂五首奠玉幣鎮安交于神明內心為貴外致其文亦效精意嘉玉既陳將以量幣肅肅雍雍惟帝之對有邦事神享帝為尊內心致德外示彌文嘉玉效珍薦以量幣恭欽伊何惟以宗祀配位奠幣信安肇祀明堂告成大報顒顒祗祗率見昭考涓選休辰齊明朝夕於惟皇王孝思罔極酌獻孝安若昔大猷孝思維則永言孝思丕承其德於昭明威侑于上帝賚我思成永綏福祉配位酌獻大明於昭皇考大明體神憲章文思宜民宜人嚴父之道陟配于天躬行孝告有孚于先紹興親享明堂二十六首皇帝入門儀安惟我有宋昊天子之三年卜祀百世承基施及沖眇奉牲以祠敢忘齋栗偏舉上儀升堂儀安於赫明堂肇稱禋祀祖宗來遊亦侑于帝九州駿奔百辟咸事斂時純休錫我萬也降神誠安噫神何親惟德是輔玉牲具陳誠則來顧我開明堂遵國之故尚蒙居歆以篤宗祜盥洗儀安肇開九筵維古之倣皇皇大神來顧來享庶儀交修百辟顯相微誠自中交際天壤上帝位奠玉幣鎮安皇皇后帝周覽四方眷我前烈燕娭此堂金支秀發黼帳高張世歆明祀曰宋是常皇地祇位奠玉幣嘉安至哉坤元持載萬物繼天神聖觀世治忽頌祇之堂薦以圭黻孰為邦休四海無拂太祖位奠幣廣安推尊太元重屋為盛誰其配之我祖齊聖開基握符正位凝命於萬斯年孝孫有慶太宗位奠幣化安帝神來格靡祀不從侑坐而食獨升祖宗在庭祗肅展采錯重三獻之禮百年之容徽宗位奠幣泰安於穆帝臨至矣元造克配其儀惟我文考仁恩廣覃奕葉永保宗祀惟初以揚孝道皇帝還位儀安耳聽鋗玉目瞻熉珠樂備周奏儀參漢圖神人並况天地同符亦既見帝王心則愈尚書捧俎禧安展牲登俎蕭韶在庭羞陳五室意徹三靈匪物斯享惟誠則馨永作祭主神其億寧昊天上帝位酌獻慶安日在東陸維時上辛肇開陽館恭禮尊神蒼玉輝夜紫煙煬晨祖宗並配天地同禋皇地祇位酌獻彰安地祀泰折歌同我將黝牲純潔絲竹發揚博厚而久含洪以光扶持宗社曰篤不忘太祖位酌獻孝安一德開基百年垂統中天禘郊薄海朝貢寶龜相承器鼎加重澤深慶綿帝復命宋太宗位酌獻韶安紹天承業繼世立功帷幄屢勝車書始同武掃氛霧文垂日虹遺澤所及孰知其終徽宗位酌獻成安欽惟合宮承神至尊祗戒專精儼然若存奠茲嘉觴茝蘭其芬發祉隤祥以子以孫皇帝還小次儀安匏尊既舉鞂席未移有德斯顧靡神不娭物情肅穆天宇清夷宅中受命永復邦基文舞退武舞進穆安神之欻至慶陰杳冥風馬雲車恍若有承備形聲容於昭文明庶幾嘉虞來享來寧亞獻穆安四阿有嚴神既戾止備物雖儀潔誠惟己有來振振相我熙事載酌陶匏以成毖祀終獻穆安誠一為專禮三而稱孰陪邦祠惟我同姓金絲屢調圭玉交映是謂熙成福來神聽皇帝飲福胙安孰謂天遠至誠則通孰謂地厚與天則同惠我純嘏克成大功握圖而治如日之中徹豆歆安工祝告休笙鏞云闋酒茅既除牲俎斯徹幽明罔恫中外咸悅禮成伊何天地同節送神誠安奕奕宗祀煌煌禮文高靈下墮精意升聞熙事既畢忽乘青雲敢拜明貺永清世氛望燎儀安載酌載獻以純以精歌傳夜誦物備秋成報本斯極聽卑則明願儲景貺福我羣生望瘞儀安禮協豐融誠交倣佛辟公受膰宗祀臨瘞貽我來牟以興嗣歲山川出雲天地同氣還大次憩安應天以實已事而竣氈案朝帝竹宮拜神靈光下燭協氣斯陳福祿時萬基圖日新紹興淳熙分命館職定撰十七首降神景安圜鍾為宮上直房心時惟明堂配天享親宗祀有常盛德在金日吉辰良享我克誠來格來康黃鍾為角合宮盛禮金商令時備成熙事搜揚上儀駿奔在庭精意肅祗來享嘉薦神靈燕娭太簇為徵休德孔昭靈承上帝孝極尊親嚴配于位嘉薦芬芳禮無不備神其格思享茲誠至姑洗為羽霜露既降孝思奉先陟降上帝禮隆九筵有馨黍稷有肥牲牷神來燕娭想像肅然盥洗正安禮經之重祭典為宗上公攝事進退彌恭庶品豐潔令儀肅雍百祥萃止惟吉之從升殿正安皇祖配帝歲祀明堂冕服陟降玉佩瑲瑲疾徐有節進止克莊維時右享日靖四方上帝位奠玉幣嘉安大享季秋百執揚厲明明太宗赫赫上帝祗薦忱誠式嚴圭幣祚我明德錫茲來裔太宗位奠幣宗安穆穆皇祖丕昭聖功聲律身度樂備禮隆祗薦量幣祀于合宮玉帛萬國歡心載同捧俎豐安備物昭陳工祝告具維羊維牛孔碩孔庶有嘉維馨加食宜飫斂時五福永膺豐胙上帝位酌獻嘉安燁彼房心明明有融維聖享帝禮行合宮祀事時止粢盛潔豐昭受申命萬福攸同太宗位酌獻德安受命溥將勳高百王寰宇大定聖治平康有嚴陟配宗祀明堂神保是格申錫無疆文舞退武舞進正安溫厚嚴凝於皇上帝文德武功列聖並配舞綴象成肅雍進退秉翟踆踆總干蹈厲亞終獻文安總章靈承維國之常禮樂宣鬯降升齊莊竭誠盡志薦茲纍觴於昭在上申錫無疆徹豆肅安於皇上帝肅然來臨恭薦芳俎以達高明烹飪既事享于克誠以介景福惟德之馨送神景安帝在合宮鑒觀盛禮黍稷惟馨神心則喜禮備樂成亦既歸止億萬斯年以貺多祉高宗位奠幣宗安赫赫高廟于堯有光覆被萬祀冠冕百王有量斯幣蠲潔是將在帝左右維時降康酌獻德安炎運中興蒼生載寧九秩燕豫三紀豐凝精祀上帝陟配威靈錫羡胙祉萬世承承孝宗親享明堂樂曲並同惟天地位奠幣酌獻及太祖酌獻皇帝入小次還大次亞獻送神等篇各有刪潤又以太祖奠幣曲改名廣安酌獻改名恭安太宗奠幣改名化安酌獻改名英安景德祀皇地祇三首降神靜安至哉厚德陟配天長沈潛剛克廣大無疆資生萬物神化含章同和八變神靈效祥奠玉幣酌獻嘉安於昭祀典致享坤儀備物咸秩柔祇格思功宣敏樹日益鴻禧持載品彙率土攸宜送神靜安妙用無方倏來忽逝蠲潔寅恭式終禋瘞景祐夏至祀皇地祇二首仁宗御製太祖奠幣恭安赫矣淳耀俶載帝基一戎以定萬國來儀寅恭潔祀博厚皇祇威靈攸在福祿如茨酌獻英安丕命惟皇萬物咸覩卜年邁周崇功冠禹有燁炎精大昌聖祚酌鬯祈年永錫繁祜熙寧祀皇地祇十二首迎神導安昭靈積厚混混坤輿配天作極陰慘陽舒齊明薦享百福其儲庶幾來止風馬雲車升降靖安有來穆穆臨此方丘其行風動其止霆收躬事匪懈豐盛潔羞百昌咸殖允矣神休奠幣釐安純誠昭融芳美嘉薦肅將二精以享以奠休光四充靈祇來燕其祥伊何永世錫羡太祖肇安於皇烈祖維帝所興光輝宗祀如日之升告靈作配孝享蒸蒸錫茲祉福百世其承司徒奉俎承安我修祀事於何致誠罔敢怠佚視茲碩牲納烹薦俎侑以和聲格哉休應世濟皇明酌獻和安猗嗟富媼博厚含弘發榮敷秀動植茲豐爰酌茲酒肸蠁交通衆祥萃止垂祜無窮太祖佑安光大含弘坤元之力海宇咸寧烈祖之德作配方壇不僭不忒子孫其承毋替厥則飲福禔安載登壇阼載酌尊彝牲酒嘉旨福祿純熙其福維何萬物咸宜其祿維何永承神禧退文舞迎武舞威安雍雍肅肅建我采旄舞以玉戚不吳不敖其將其肆脾臄嘉肴何以侑樂鍾鼓管簫亞終獻儀安折俎在籩胾羹在豆何以酌之酒醴是侑何以錫之貽爾眉壽何以格之永爾康阜徹豆豐安曳我黼黻履舄接武鏘我珩璜降升圉圉其將肆兮既曰不侮其終徹兮恭欽惟主送神阜安神兮來下享此苾芬酌獻雍雍執事孔勤神之還矣忽乘飛雲遺我祺祥物象欣欣常祀皇地祇五首迎神寧安八變坤元之德光大無疆一氣交感百物阜昌吉蠲致享精明是將介茲景福鼎祚靈長升降正安禮經之重祭典為宗上公攝事登降彌恭庶品豐潔令儀肅雍百祥萃止維吉之從奉俎豐安禮崇禋祀神鑒孔明牲牷博腯以炮以烹馨香蠲潔品物惟精錫以純嘏享茲至誠退文舞迎武舞威安進旅退旅載揚干揚不愆于儀容服有章式綏式侑神保是聽鼓之舞之神永安寧送神寧安物備百嘉樂周八變克誠是享明德斯薦神鑒孔昭蕃禧錫羡回馭飄然邈不可見紹興祀皇地祇十五首迎神寧安函鍾為宮至哉厚德物生是資直方維則翕闢攸宜於昭祀典致享坤儀禮罔不答神之格思太簇為角蕆事方丘舊典時式至誠感神馨非黍稷肸蠁來臨鑒茲明德永錫坤珍時萬時億姑洗為徵至哉坤元乃順承天厚德載物含洪八埏日北多暑祀儀吉蠲式昭毋事敢告恭虔南呂為羽蕆事方丘情文孔時名山大澤侑祭無遺牲陳黝犢樂備咸池柔祇皆出介我繁禧盥洗正安於穆盛禮肅肅在宮蕆事有初直于東榮滌濯是謹惟寅惟清祗薦柔嘉享茲克誠升殿正安景風應時聿嚴毖祀用事方丘鏘鏘濟濟登降有節三獻成禮神其格思錫我繁祉正位奠玉幣嘉安坤元博厚對越天明展事方澤亶惟顧歆嘉玉量幣祗薦純精錫我繁祉燕及函生太祖位奠幣定安毖祀泰折柔祇是承於赫藝祖道格三靈式嚴配侑厚德惟寧爰昭薦幣享于克誠捧俎豐安丕答靈貺蕆事方丘豆登在列鼎俎斯儔牲牷告具寅畏彌周柔祇昭格飈至雲流正位酌獻光安祗事坤元飭躬敢憚爰潔粢盛載嚴圭瓚清明內融嘉旨外粲介我繁釐時億時萬太祖位酌獻英安皇矣藝祖九圍是式至哉柔祇萬彙允殖保茲嘉邦介我黍稷酌鬯告虔作配無極文舞退武舞進正安於穆媼神德彼天我修毖祀以莫不虔肆陳時夏干羽相宣靈其來遊降福綿綿亞終獻文安禮有祈報國惟典常籩豆豐潔降升齊莊備物致志式薦纍觴昭格來享自天降康徹豆娛安承天效法其道貴誠牲羞黃犢薦德之馨芳俎告畢禮備樂盈既靜既安庶物霑生送神寧安至厚至深其動也剛精誠默通或出其藏神之言歸化斯有光相我炎圖萬世無疆宋初祀神州地祇三首降神靜安膴膴郊原茫茫𧜛縣畫野分疆禹功疏奠靈祇是臻豆籩祗薦幽贊皇圖視之不見奠玉幣酌獻嘉安肸蠁儲靈肅恭用幣鏘洋導和洪休允契嘉氣雲蒸浹于華裔式薦坤珍聿符明世送神靜安獻奠云畢純嘏祁祁威靈藏用邈矣何之景祐孟冬祭神州地祇二首太宗位奠幣化安削平偽邦嗣興鴻業禮樂交修仁德該洽柔祇薦享量幣攸攝侑坐延靈神休允答酌獻韶安有煒彌文克隆宏構貽此燕謀具膺多祐嶰律吹莩彝尊奠酒佐乃沈潛永祈豐楙元符祭神州地祇二首迎神寧安八變膴膴浚邦皇天是宅必有幽贊聰明正直布列籩豆考擊金石中外謐寧繄神之力送神寧安都邑浩穰民物富盛主以靈祇昭乃丕應玉帛牲牷鼓鍾管磬祗薦攸歆歸于至靜紹興祀神州地祇十六首迎神寧安函鍾為宮芒芒下土恢恢方儀富媼統攝潛運八維爰稱元祀告備吉時揭茲虔恭僾其格思太簇為角洪惟坤元道著品物上配紫旻厚載其德良月肇蕆祭器布列必先皇祇以迓景福姑洗為徵坱圠無垠磅罔測山盈川沖自生自殖其報惟何率禮靡忒億萬斯年功被無極南呂為羽翕闢以時協氣陶蒸播之金石鏘厥和聲冥冥眑眑孔享純誠是聽是娭邦基永寧盥洗正安晨煬致煙浡然四施飄飄風馬倣佛來斯祀事維清沃之盥之載涓載肅罔有愧辭升殿正安崇崇其壇屹矣層級佩約步趨降登中節左瞻右睨祥風藹集斿斾羽紛昭鑒翊翊神州地祇位奠玉幣嘉安璇璣諧序籍斂薦嘉昭答柔祇迭奏雅歌幣琮以侑儀腆氣和靈其溥臨容與燕嘉太宗位奠幣嘉安穆穆令聞溥博有容澤被萬宇靡不率從恭陳量幣明薦其衷禮亦宜之享德攸同奉俎豐安肅肅嘉承唯德其物工祝以告繄民之力神哉廣生孔蕃且碩奠于嘉壇吐之則弗神州地祇位酌獻嘉安恭承明祀嘉薦令芳亦有桂酒誠賣心是將瑟瓚以酌效歡厥觴庶乎燕享永懷不忘太宗位酌獻化安宗德含洪方祇可擬闢土開疆八埏同軌是用作配有永無紀祼獻以享茂格蕃祉文舞退武舞進文安奕奕綴兆咸池孔彰丕闡文德靡忘發揚進退有節乃容之常樂備爾奏燁燁榮光亞終獻文安縮酌以祼既旨且多三獻有序情文愈加黃祇臨享錫以休嘉廣茲靈祲覃及邇遐徹豆成安展牲告全乃登于俎竣事而徹侑以樂語奉釐宣室祚我神主斂敷庶民並受其祜送神寧安雲馭洋洋既歆既顧悠然聿歸曷求厥路欽想頌堂跛立以慕賚我肸蠁莫不懌豫望瘞正安神罔怨恫燕其有喜蕆事告成爰修瘞禮樂闋儀備休氣四起尚謹不愆念終如始景德朝日三首降神高安六變陽德之母羲御寅賓得天久照首茲三辰正辭備物肅肅振振淪精降監克享明禋奠玉幣酌獻嘉安醴齊良潔有牲斯純大采玄冕乃昭其文王宮定位粢盛苾芬民事以盛德升聞送神高安縣象著明照臨下土降神穰穰德施周普夕月三首降神高安六變凝陰稟粹照臨八埏麗天垂象繼日代明一氣資始四時運行靈祇昭格備物薦誠奠玉幣酌獻嘉安夕耀乘秋功存𧜛縣金奏在縣以時致薦祀事孔寅明靈降眷潔粢豐盛倉箱流衍送神高安夙陳籩豆潔誠致祈垂休保佑景祚巍巍大觀秋分夕月四首降神高安至陰之精虧而復盈輪高仙桂階應祥蓂玉兔影孤金莖露溢其駕星車顧于茲夕奠玉幣玉鈎初彎冰盤乍圓扇掩秋後烏飛枝邊精凝蟾蜍輝光嬋娟歆于明祀弭芳節焉酌獻名稽漢儀歌參唐宗往于卿少乘秋氣中周天而行如姊之崇可飛霞佩下琉璃宮送神四扉大開五雲車立霓裾娣從風翿童執搖曳胥來鏘洋爰集歆我嚴禋西面以揖紹興朝日十首降神高安圜鍾為宮玄鳥既至序屬春分朝于太陽厥典備存載嚴大采示民有尊揚光下燭煜爚東門黃鍾為角升暉麗天陽德之母率無頗偏兼燭下土恭事崇壇禮樂具舉頓御六龍裴回容與太簇為徵周祀及暗漢制中營肸蠁是屆禮神以兄我潔斯璧我肥斯牲神兮燕享鑒觀孔明姑洗為羽屹爾王宮泛臨翊翊惠此萬方豈惟五色以修陽政以習地德雲景杳冥施祥無極初獻升殿正安天宇四霽嘉壇聿崇肅祗嚴祀登降有容仰瞻曜靈位居其中既安既妥沛哉豐融奠玉幣嘉安物之備矣以交於神時惟炎精不忘顧歆經緯之文璆琳之質燦然相輝其儀秩秩奉俎豐安扶桑朝暾和氣肸飭奉此牲牢為俎孔碩芬馨進聞介我黍稷所將以誠茲用享德酌獻嘉安匏爵斯陳百味旨酒勺以獻之再拜稽首鍾鼓在列靈方安留眷然加薦惟時之休亞終獻文安禮罄沃盥誠意肅將包茅是縮冀畢重觴煥矣情文既具醉止熙事備成靈其有喜送神禮安羲和駕兮其容杲杲將安之兮言歸黃道光赫萬物無古無今人君之表咸仰照臨夕月十首降神高安圜鍾為宮金行告遒玉律分秋禮蕆西郊毖祀聿修精意潛達永孚于休神之聽之爰格飈斿黃鍾為角時維秋仲夜寂天清實嚴姊事用答陰靈壇壝斯設黍稷惟馨雲車來下庶歆厥誠太簇為徵遡日著明麗天作配潔誠以祠禮行肅拜光凝冕服氣肅環珮庶幾昭格祗而不懈姑洗為羽穆穆流輝太陰之精盈虧靡忒寒暑以均克禋克祀揆日涓辰牲碩酒旨來燕來寧升殿正安猗歟崇基右平左墄祗率典常屆茲秋夕陟降惟寅威儀抑抑神其鑒觀穰簡是集奠玉幣嘉安少采陳儀實曰坎祭禮備樂舉嚴恭將事于以奠之嘉玉量幣神兮昭受陰騭萬彙奉俎豐安穀旦其差有牲在滌工祝致告為俎孔碩肸蠁是期祚我明德備茲孝欽式和民則酌獻嘉安白藏在序享惟其時躬即明壇禮惟載祗斟以瑤爵神靈燕娭歆馨顧德錫我蕃釐亞終獻文安肅雍嚴祀聖治昭彰清酒既載或肆或將禮匝三獻終然允臧神具醉止其樂且康送神理安歌奏云闋式禮莫愆以我齊明罄其吉蠲神保聿歸降康自天蘿圖永固億萬斯年熙寧以後祀高禖六首降神高安六變容臺講禮禖宮立祠司分屆後帶韣陳儀嘉祥萃止靈馭來思皇支蕃衍永固邦基升降正安郊禖之應肇自生商誕膺寶命濬發其祥天材蕃衍德稱君王本支萬世與天無疆奠玉幣嘉安昔帝高辛先禖肇祀爰揆仲陽式祈嘉祉陳之犧牲授以弓矢敷祐皇宗施于孫子酌獻祐安昭薦精衷靈承端命青帝顧懷神禖儲慶祚以蕃昌協于熙盛螽斯衆多流于雅詠亞終獻文安赫赫高禖萬世所祀其德不回錫茲福祉蕃衍椒聊和平芣苡傳類降康世濟其美送神理安禮奠蠲衷祭儀竣事丕擁靈休蕃衍皇嗣紹興祀高禖十首降神高安圜鍾為宮聿分春氣施生在時禖宮肇啓精意以祠禮儀告備神其格思厥靈有赫錫我繁釐黃鍾為角眷此尊祀實惟仲春青圭束帛克祀克禋庶蒙嘉惠嗣續詵詵神之降鑒雲車來臻太簇為徵猗歟禖宮祀典所貴粵自艱難禮或弗備以迄于今始建壇壝願戒雲車歆此誠意姑洗為羽春氣肇分萬類滋榮惟此祀事皆象發生求神以類式昭至誠庶幾來格子孫繩繩升壇正安有奕禖宮在國之南壇壝既設威儀孔嚴登祀濟濟神兮顧瞻佑我皇祚宜百斯男奠玉幣嘉安青律載陽有鳦頡頏祈我繁祉立子生商三牲既薦玉帛是將克禋克祀有嘉其祥奉俎豐安祗祓禖壇潔蠲羊豕博碩肥腯爰具牲醴執事駿奔肅將俎几神其顧歆永錫多子青帝位酌獻祐安伏羲高辛酌獻並同瑞鳦至止祀事孔時酌以清酒祼獻載祗神具醉止介我蕃禧乃占吉夢維熊維羆亞終獻文安中春涓吉蕆事禖祠禮備樂作籩豆孔時二觴畢舉薦獻無違庶幾神惠祥啓熊羆送神理安嘉薦令芳有嚴禋祀神來燕娭亦既醉止風馭言還栗然歘起以祓以除錫我蕃祉景德祀九宮貴神三首降神高安倬彼垂象照臨下土躔次運行功德周普九宮既位惟德是輔神之至上皇皇斯覩奠玉幣酌獻嘉安靈禋既肅明神既秩在國之東協日之吉升歌有儀六變中律懷和萬靈降茲陰騭送神高安祗薦有常惟神無方回飈整馭垂休降祥元祐祀九宮貴神二首降神景安六變上天貴神九宮設位功德及物乃秩明祀望拜紫壇赫然靈氣奠玉薦幣歆之無愧送神景安天之貴神推移九宮厥位靡常降康則同來集于壇顧歆恪恭歌以送之飈靜旋穹紹興祀九宮貴神十首降神景安圜鍾為宮紫闕幽宏惟神靈尊輔成泰元贊役乃坤曰雨曰暘縕豫調紛享薦隕光蒙祉如屯黃鍾為角載陽衍德農祥孔昭賚茲元嘏穰穰黍苗象輿眇冥金奏遠姚無閼厥靈丹衷匪恌太簇為徵於赫九宮天神之貴煌煌彪列下土是蒞幽贊高穹陰騭萬類肅若舊典有嚴祗事姑洗為羽練時吉良聿崇明祀粢盛潔豐牲碩酒旨肅唱和聲來燕來止嘉承天休賚及含齒初獻升壇正安於昭毖祀周旋有容歷階將事趨進鞠躬改步如初沒階彌恭左墄右平陟降雍雍太一位奠玉幣嘉安煌煌九宮照臨下土陰騭庶類功施周普恪修祀典禮備樂舉嘉玉量幣馨非稷黍攝提權星招搖天符青龍咸池太陰天乙位樂曲並同奉俎豐安靈鑒匪遠誠心肅祗是蒸是享俎實孔時禮行樂奏肸蠁是期雲車風馬神其燕娭太一位酌獻嘉安惟天丕冒彪列九神財成元化陰騭下民有酒斯旨登薦苾芬昭哉降鑒茀祿來臻九位並同亞終獻文安均調大化陰騭下民駿功有赫誕舉明禋嘉觴中二執事惟寅清明鬯矣福祿攸臻送神景安薦獻有序降登無違禮樂備舉昭格燕娭雲車縹眇神曰還歸報以景貺翊我昌期
