body:
  text: 宋史卷一百一十六志第六十九禮十九賓禮一大朝會儀常朝儀周官司儀掌九儀賓客擯相詔王南鄉以朝諸侯大行人掌大賓之禮大客之儀以親諸侯蓋君臣之際體統雖嚴然而接以仁義攝以威儀實有賓主之道焉是以小雅鹿鳴燕其臣下皆以嘉賓稱之宋之朝儀政和詳定五禮列為賓禮今修宋史存其舊云大朝會宋承前代之制以元日五月朔冬至行大朝會之禮太祖建隆二年正月朔始受朝賀於崇元殿服兗冕設宮縣仗衞如儀仗退羣臣詣皇太后宮門奉賀帝常服御廣德殿羣臣上壽用教坊樂五月朔受朝賀於崇元殿帝服通天冠絳紗袍宮縣儀仗如元會儀乾德三年冬至受朝賀於文明殿四年於朝元殿賀畢常服御大明殿羣臣上壽始用雅樂登歌二舞羣臣酒五行罷太宗淳化三年正月朔命有司約開元禮定上壽儀皆以法服行禮設宮縣萬舞酒三行罷真宗咸平三年五月朔雨命放仗百官常服起居於長春殿退詣正衙立班宣制仁宗天聖四年十二月詔明年正月朔先率百官赴會慶殿上皇太后壽酒畢乃受朝天安殿仍令太常禮院修定儀制五年正月朔曉漏未盡三刻宰臣百官與遼使諸軍將校並常服班會慶殿內侍請皇太后出殿後幄鳴鞭升坐又詣殿後皇帝幄引皇帝出帝服鞾袍於簾內北向褥位再拜跪稱臣某言元正啟祚萬物惟新伏惟尊號皇太后陛下膺時納祐於天同休內常侍承旨答曰履新之祐與皇帝同之帝再拜詣皇太后御坐稍東內給事酌酒授內謁者監進帝跪進訖以盤興內謁者監承接之帝却就褥位跪奏曰臣某稽首言元正令節不勝大慶謹上千萬歲壽再拜內常侍宣答曰恭舉皇帝壽酒帝再拜執盤侍立教坊樂止皇帝受虛醆還幄通事舍人引百官橫行典儀贊再拜舞蹈起居太尉升自西階稱賀簾外降還位皆再拜舞蹈侍中承旨曰有制皆再拜宣曰履新之吉與公等同之皆再拜舞蹈閤門使簾外奏宰臣某以下進壽酒皆再拜太尉升自東階翰林使酌御酒盞授太尉執盞盤跪進簾外內謁者監跪接以進太尉跪奏曰元正令節臣等不勝慶抃謹上千萬歲壽降還位皆再拜宣徽使承旨曰舉公等觴皆再拜太尉升立簾外樂止內謁者監出簾授虛盞太尉降階橫行皆再拜舞蹈宣徽使承旨宣羣臣升殿再拜升及東西廂坐酒三行侍中奏禮畢退樞密使以下迎乘輿於長春殿起居稱賀百官就朝堂易朝服班天安殿朝賀帝服兗冕受朝禮官通事舍人引中書令門下侍郎各於案取所奏文詣褥位脫劍舄以次升分東西立諸方鎮表祥瑞案先置門外左右令史絳衣對舉給事中押祥瑞中書侍郎押表案入分詣東西階下對立既賀更服通天冠絳紗袍稱觴上壽止舉四爵乘輿還內恭謝太后如常禮神宗元豐元年詔龍圖閣直學士史館修撰宋敏求等詳定正殿御殿儀注敏求遂上朝會儀二篇令式四十篇詔頒行之其制元正冬至大朝會有司設御坐大慶殿東西房于御坐之左右少北東西閤于殿後百官宗室客使次于朝堂之內外五輅先陳于庭兵部設黃麾仗于殿之內外大樂令展宮架之樂于橫街南鼓吹令分置十二案于宮架外協律郎二人一位殿上西階之前楹一位宮架西北俱東向陳輿輦御馬于龍墀繖扇于沙墀貢物于宮架南冬至不設貢物餘則列大慶門外陳布將士于街左右金吾六軍諸衞勒所部列黃麾大仗于門及殿庭百僚客使等俱入朝文武常參官朝服陪位官公服近仗就陳于閤外大樂令樂工協律郎入就位中書侍郎以諸方鎮表案給事中以祥瑞案俟于大慶門外之左右冬至不設給事中位祥瑞案諸侍衞官各服其器服輦出至西閤降輦符寶郎奉寶詣閤門奉迎百官客使陪位官俱入就位侍中版奏中嚴又奏外辦殿上鳴鞭宮縣撞黃鐘之鐘右五鐘皆應內侍承旨索扇扇合帝服通天冠絳紗袍御輿出協律郎舉麾奏乾安樂鼓吹振作帝出自西房降輿即坐扇開殿下鳴鞭協律郎偃麾樂止爐煙升符寶郎奉寶置御坐前中書侍郎給事中押表案祥瑞案入詣東西階下對立百官宗室及遼使班分東西以次入正安樂作就位樂止押樂官歸本班起居畢復案位三師親王以下及御史臺外正任遼使俱就北向位典儀贊拜在位者皆再拜起居訖太尉將升中書令門下侍郎俱降至兩階下立凡太尉行則樂作至位樂止太尉詣西階下解劍脫升殿中書令門下侍郎各於案取所奏之文詣褥位解劍脫以次升分東西立以俟太尉詣御坐前北向跪奏文武百寮太尉具官臣某等言元正啟祚萬物咸新冬至易為晷運推移日南長至伏惟皇帝陛下應乾納祐與天同休俛伏興降階佩劍納舄餘官準此還位在位官俱再拜舞蹈三稱萬歲再拜侍中進當御坐前承旨退臨階西向稱制宣答曰履新之慶冬至易曰履長之慶與公等同之贊者曰拜舞蹈三稱萬歲橫行官分班立中書令門下侍郎升詣御坐前各奏諸方鎮表及祥瑞訖戶部尚書就承制位俛伏跪奏諸州貢物請付所司禮部尚書奏諸蕃貢物如之司天監奏雲物祥瑞請付史館皆如上儀侍中進當御坐前奏禮畢殿上承旨索扇殿下鳴鞭宮縣撞蕤賓之鐘左五鐘皆應協律郎舉麾宮縣奏乾安樂鼓吹振作帝降坐御輿入自東房扇開偃麾樂止侍中奏解嚴百官退還次客使陪位官並退有司設食案大樂令設登歌殿上二舞入立于架南預坐當升殿者位御坐之前文武相向異位重行以北為上非升殿者位于東西廊下尚食奉御設壽尊于殿東楹少南設坫于尊南加爵一有司設上下羣臣酒尊于殿下東西廂侍衞官及執事者各立其位仗衞仍立俟上壽百官立班如朝賀儀侍中版奏中嚴外辦聞鳴鞭索扇帝服通天冠絳紗袍御輿出東房樂作帝即坐扇開樂止贊拜畢光祿卿詣橫街南跪奏具官臣某言請允羣臣上壽興侍中承旨稱制可少退舍人曰拜光祿卿再拜訖復位三師以下就位贊者曰拜在位者皆拜舞三稱萬歲太尉升殿詣壽尊所北向尚食奉御酌御酒一爵授太尉搢笏執爵詣前跪進帝執爵太尉出笏俛伏興少退跪奏文武百寮太尉具官臣某等稽首言元正首祚臣等不勝大慶謹上千萬壽俛伏興降復位贊者曰拜在位者皆再拜三稱萬歲侍中承旨退西向宣曰舉公等觴贊者曰拜在位者皆再拜三稱萬歲北向班分東西序立太尉自東階侍立帝舉第一爵和安樂作飲畢樂止太尉受虛爵復於坫降階三師以下再拜舞蹈稱萬歲如上儀侍中進奏侍中具官臣某言請延公王等升殿俛伏興降復位侍中承旨退稱有制贊者曰拜在位者皆再拜宣曰延公王等升殿贊者曰拜在位者皆再拜公王等詣東西階升立於席後尚食奉御進酒殿中監省酒以進帝舉第二爵登歌作甘露之曲飲訖殿中監受爵樂止羣臣升殿就橫行位舍人曰各賜酒贊者曰拜羣官皆再拜三稱萬歲舍人曰就坐太官令行酒羣官搢笏受酒宮縣作正安之樂文舞入立宮架北觴行一周凡行酒訖並太官令奏巡周樂止尚食進食升階以次置御坐前又設羣官食訖太官令奏食徧太樂丞引盛德升聞之舞入作三變止出殿中監進第三爵羣官立席後登歌作瑞木成文之曲飲訖樂止殿中丞受虛爵舍人曰就坐羣官皆坐又行酒作樂進食如上儀太樂丞引天下大定之舞作三變止出殿中監進第四爵登歌奏嘉禾之曲如第三爵太官令行酒又一周樂止舍人曰可起百寮皆立席後侍中進御坐前跪奏禮畢俛伏興與羣官俱降階復位贊者曰拜皆再拜舞蹈三稱萬歲起分班立殿上索扇扇合殿下鳴鞭太樂令撞蕤賓之鐘左右鐘皆應協律郎俛伏舉麾太樂令令奏乾安之樂鼓吹振作帝降坐御輿入自東房扇開樂止侍中奏解嚴所司承旨放仗百寮再拜相次退舊制朝賀上壽帝執鎮圭至是始罷不用元祐八年太常博士陳祥道言貴人賤馬古今所同故覲禮馬在庭而侯氏升堂致命聘禮馬在庭而賓升堂私覿今元會儀御馬立於龍墀之上而特進以下立於庭是不稱尊賢才體羣臣之意請改儀注以御馬在庭於義為允舊制五月朔受朝熙寧二年詔罷之元符元年四月得傳國受命寶禮官言五月朔於故事當大朝會乞就是日行受寶之禮依上尊號寶冊儀前一日帝齋于殿內翼日服通天冠絳紗袍御大慶殿降坐受寶羣臣上壽稱賀其後徽宗以元日受八寶及定命寶冬至日受元圭皆于大慶殿行朝賀禮新儀成改元豐儀太尉為上公侍中為左輔中書令為右弼太樂令為大晟府盛德升聞為天下化成之舞天下大定為四夷來王之舞及增刑部尚書奏天下斷絕請付史館餘並如舊儀凡遇國恤則廢若無事不視朝則下敕云不御殿羣臣進表稱賀于閤門紹興十二年十月臣僚言竊以元正一歲之首冬至一陽之復聖人重之制為朝賀之禮焉自上世以來未之有改也漢高祖以五年即位而七年受朝于長樂宮我太祖皇帝以建隆元年即位受朝于崇元殿主上臨御十有六年正至朝賀初未嘗講艱難之際宜不遑暇茲者太母還宮國家大慶四方來賀亶惟其時欲望自今元正冬至舉行朝賀之禮以明天子之尊庶幾舊典不至廢墜禮部太常寺考定朝會之禮依國故事設黃麾大仗車輅法物樂舞等百寮服朝服再拜上壽宣王公升殿間飲三周詔自來年舉行十一月權禮部侍郎王賞等言朝會之制正旦冬至及大慶受朝受賀係御大慶殿其文德紫宸垂拱殿禮制各有不同月朔視朝則御文德殿謂之前殿正衙仍設黃麾半仗紫宸垂拱皆係側殿不設儀仗元正在近大慶殿之禮事務至多乞候來年冬至別行取旨詔從之明年閤門言依汴京故事遇行大禮則冬至及次年正旦朝會皆罷十四年九月有司言明年正旦朝會請權以文德殿為大慶殿合設黃麾大仗五千二十七人欲權減三分之一合設八寶於御坐之東西及登歌宮架樂舞諸州諸蕃貢物行在致仕官諸路貢士舉首並令立班詔從之十五年正旦御大慶殿受朝文武百官朝賀如儀常朝之儀唐以宣政為前殿謂之正衙即古之內朝也以紫宸為便殿謂之入閤即古之燕朝也而外又有含元殿含元非正至大朝會不御正衙則日見羣臣百官皆在謂之常參其後此禮漸廢後唐明宗始詔羣臣每五日一隨宰相入見謂之起居宋因其制皇帝日御垂拱殿文武官日赴文德殿正衙曰常參宰相一人押班其朝朔望亦於此殿五日起居則於崇德殿或長春殿中書門下為班首長春即垂拱也至元豐中官制行始詔侍從官而上日朝垂拱謂之常參官百司朝官以上每五日一朝紫宸為六參官在京朝官以上朔望一朝紫宸為朔參官望參官遂為定制正衙常參國朝之制兩省臺官文武百官每日赴文德殿立班宰臣一員押班常朝官有詔旨免常朝及勾當更番宿者不赴遇假併三日以上即橫行參假宰臣參知政事及免常朝者悉集事務急速赴橫行不及者牒報臺如遇親王使相過正衙則取別旨羣官見謝辭者皆赴正衙其日文武班尚書上將軍以下並先立於殿門之外東西相向文班一品二品不立正衙見謝辭官立於大班之南右巡使立正衙位南北向臺官大夫中丞三院御史各就揖班位再揖三院不全即不揖揖訖臺官與左巡使先入各就位左右巡使立鐘鼓樓下左巡使奏武班右巡使奏文班如只巡使一員即就入班南立單奏如俱闕即於臺官或員外郎以下差攝次兩班及右巡使入次見謝辭官入次兩省官入兩省官自殿西偏門入於右勤政門北偏門立候文武班將至循午階就位次文班一品二品入次宰臣出東上閤門就位通事舍人一員立於閤門外北向四色官立其後舍人通承旨奉敕不坐四色官應喏急趨至放班位宣敕在位官皆再拜而退其應橫行者班定通事舍人揖羣官轉班北向舍人揖再拜復位如常朝之儀兩省官幕次舊在中書門外近制就使權就朝堂門南上將軍幕次凡見謝辭官新受加恩出使到闕者宰臣親王使相俟班定引贊引出東上閤門至押班位西向立定先赴午階南中書門下正衙位再拜却還押班位樞密使副使知院同知院簽書院事參知政事宣徽使宗室節度使以下至刺史將軍俟班定四方館吏引出東上閤門至殿庭由東黃道赴正衙位北向以西為首將軍以東為首正衙畢宰臣樞密出西便門親王宗室入東上閤門觀文殿大學士資政殿大學士觀文殿學士三司使翰林資政侍講侍讀學士直學士知制誥待制直學士以上集丞郎幕次待制集上將軍幕次俟班定四方館吏引入殿西便門赴班於大夫中丞前出門下中書侍郎至正言四方館吏引先集勤政門北俟班定於一品二品官未就位前先就位放班訖由西偏門出御史大夫至御史序班如常朝三師三公僕射東宮三師三少班入殿門朝堂吏引入殿東便門赴班於兩省臺官前出尚書丞郎左右金吾上將軍至將軍序班如常朝節度使至刺史軍職四廂都指揮使以上三司副使文班京朝官武官郎將以上分司官樞密都承旨諸使副醫官帶正員官者並文東武西相向重行序立餘如常朝其權三司使開封府吏部銓祕書監修撰直館閣校理檢討三司判官主判官開封府判官推官宮僚內職軍校領郡者內客省使至通事舍人節度行軍司馬至團練副使幕職上佐州縣官諸司勒留官新受者京朝官改賜章服者致仕責授降授並謝行軍副使仍辭京朝官貢舉發解畢者亦見準儀制知貢舉官合謝辭近歲皆即時鎖宿故謝辭皆停垂拱殿起居則內侍省都知押班率內供奉官以下幷寄班等先起居次客省閤門使以下呈進目者次三班使臣節度觀察防禦團練刺史等子弟充供奉官侍禁殿直有旨令內朝起居者次內殿當直諸班殿前指揮使左右班都虞候以下內殿直散員散指揮散都頭金槍班等次長入祗候東西班殿侍次御前忠佐次殿前都指揮使率軍校至副指揮使次駙馬都尉任刺史以上者綴本班次諸王府僚次殿前諸軍使都頭次皇親將軍以下至殿直次行門指揮使率行門起居以上並內侍贊喝如傳宣前殿不坐即宰相樞密使文明殿學士三司使翰林樞密直學士中書舍人三司副使知起居注皇城內監庫藏朝官諸司使副內殿崇班供奉官侍禁殿直翰林醫官待詔等同班入次親王侍衞親軍馬步軍都指揮使率軍校至副都指揮使次使相次節度使次統軍次兩使留後觀察使次團練防禦使刺史次侍衞馬步軍使都頭起居畢見謝班入如御崇德殿即紫宸殿也即樞密使以下先就班候升坐諸司使副以下至殿直分東西對立餘皆北面長春殿皆北面宰相參知政事最後入以上並閤門贊喝日止再拜朔望及三日假樞密使以下皆舞蹈早朝則宰相樞密宣徽使起居畢升殿問聖體宰相奏事樞密宣徽使退候宰相對畢樞密使復入奏事次三司開封府審刑院及羣臣以次登殿大兩省以上領務京師有公事許即時請對自餘受使出入要切者欲回奏事則聽先進取旨其見謝辭官以次入于庭凡見者先之謝次之辭又次之出使閑慢或未升朝官或止拜於門外自祕書監上將軍觀察使內客省使以上得拜殿門階上及升殿止拜御坐前餘皆庭中班次惟宰相親王使相赴崇德殿即宣徽使通喚餘皆側立候通再拜舞蹈致辭即不舞蹈見即將相升殿問聖體其賜分物酒食及收進奉物皆舞蹈稱謝凡收進奉物皆入謝幕職州縣官謝辭即判銓官引對兼於殿門外宣辭戒勵凡國有大慶瑞及出師勝捷樞密使率內職軍校入賀致辭閤門使宣答宰相致辭宣徽使宣答如賜酒即預坐官後入作樂送酒如曲宴之儀晚朝則宰相樞密翰林學士當直者洎近侍執事之臣皆赴乾德六年九月始以旬假日御講武殿又名崇政近臣但赴早參宰相以下鞾笏諸司使以下繫帶其節假及大祀並令如式開寶九年四月詔旬休日不視事及太宗即位復如舊視朝退進食訖則易服御崇政殿先羣臣告謝次軍頭引見司奏事于殿下次三班審官院流內銓刑部及諸司引見官吏如假日起居辭見畢即移御坐臨軒視事既退復有奏事或閱器物之式者謂之後殿再坐淳化三年令有司申舉十五條常參文武官或有朝堂行私禮跪拜待漏行立失序談笑喧譁入正衙門執笏不端行立遲緩至班列行立不正趨拜失儀言語微喧穿班仗出閤門不即就班無故離位廊下食行坐失儀入朝及退朝不從正衙門出入非公事入中書犯者奪奉一月有司振舉拒不伏者錄奏貶降景德二年光祿寺丞錢易言竊覩文德殿常朝班不及三四十人蓋以凡掌職務止赴五日起居頗違舊章望令並赴朝參乃詔應三館祕書閣尚書省二十四司諸司寺監朝臣內殿起居外並赴文德殿常參其審刑院大理寺臺直官開封府判官推官司錄兩縣令司天監翰林天文監倉場庫務等仍免大中祥符二年御史知雜趙湘言伏見常參官每日趨朝多不整肅舊制並早赴待漏院候開內門齊入伏緣每日迨辰以朝以故後時方入又風雨寒暑即多稱疾宜令知班驅使官視其入晚者申奏疾者遣醫親視天禧四年十月中書門下言唐朝故事五日一開延英隻日視事雙日不坐方今中外晏寧政刑清簡望準舊事三日五日一臨軒聽政隻日視事雙日不坐至於刑章錢穀事務遣差臣僚除急切大事須面對外餘並令中書樞密院附奏詔禮儀院詳定雙日前後殿不坐隻日視事或於長春殿或於承明殿應內殿起居羣臣並依常日起居餘如中書門下之議俄又請隻日承明殿常朝依假日便服視事不鳴鞭詔可康定初詔中書樞密三司大節大忌給假一日小節旬休並後殿奏事前後毋得過五班餘聽後殿對御廚給食假日崇政殿辰漏上入內進食俟再坐復對神宗即位御史中丞王陶以皇祐編敕宰臣押班儀制移中書謂天子新即位大臣不應隳廢朝儀不報舊制祖宗以來日御垂拱殿待制諸司使以上俱赴而百官班文德殿曰常朝五日皆入曰起居平時宰相垂拱殿奏事畢赴文德殿押班或日昃未退則閤門傳宣放班多不復赴王陶以韓琦曾公亮違故事不押班為不恭劾之琦公亮上表待罪且言唐及五代會要月九開延英則餘日宰相當押正衙班及延英對日未御內殿前傳宣放班則宰相不押正衙班明矣自祖宗繼日臨朝宰相奏事至祥符初始詔循故事押文德班以妨職浸廢乃至今日請下太常禮院詳定陶坐絀司馬光代為中丞請令宰相遵國朝舊制押班不須詳定尋詔宰相春分辰初秋分辰正垂拱殿未退聽勿赴文德殿令御史臺放班光又言垂拱奏事畢春分以後鮮有不過辰初秋分以後鮮有不過辰正然則自今宰臣常不至文德殿押班請春分辰正秋分巳初奏事未畢即如今詔庶幾此禮不至遂廢迺詔春秋分率以辰正熙寧六年正月西上閤門副使張誠一言垂拱殿常朝先內侍唱內侍都知以下至宿衞行門計一十八班起居後通事舍人引宰執樞密使以下大班入次親王次侍衞馬步軍都指揮以下次皇親使相以下十班入方引見謝辭或遇百官起居日自行門後通事舍人引樞密以下次親王使相以下至刺史十班入方奏兩巡使起居立定方引兩省官入次閤門引宰臣以下大班入起居畢候百官出絕兩省班出次兩巡使出中書樞密方奏事已是日高況大班本不分別丞郎給諫臺省及常參官今獨使相以下曲為分別虛占時刻請遇垂拱殿百官起居日將親王以下十班合為四班親王為一班侍衞馬步軍都指揮使為一班皇親使相以下至刺史重行異位為兩班可減六班如垂拱殿常朝不係百官起居或紫宸殿百官起居其親王使相以下班並依舊儀序入起居從之九月引進使李端売心言近朔望御文德殿視朝祁寒盛暑數煩清蹕而紫宸之朝歲中罕御請朔日御文德既望坐紫宸庶幾正衙內殿朝儀並舉從之元豐八年二月詔諸三省御史臺寺監長貳開封府推判官六參職事官赤縣丞以上寄祿升朝官在京釐務者望參不釐務者朔參哲宗元祐四年十月以戶部尚書呂公孺言詔朔參官兼赴望參望參官兼赴六參五年詔權侍郎並日參紹聖四年十月御史臺言外任官到闕朝見訖並令赴朔望參尋又言元豐官制朝參班序有日參六參望參朔參已著為令元祐中改朔參兼赴望參望參兼赴六參有失先朝分別等差之意止依元豐儀令從之政和詳定五禮新儀有文德殿月朔視朝儀紫宸殿望參儀垂拱殿四參儀紫宸殿日參儀垂拱殿日參儀崇政殿再坐儀崇政殿假日起居儀其文不載中興仍舊制乾道二年九月閤門奏垂拱殿四參四參官謂宰執侍從武臣正任文臣卿監員郎監察御史已上皇帝坐先讀奏目知閤以下次御帶環衞官以下次忠佐殿前都指揮使以下次殿前司員僚次皇太子次行門已上逐班並常起居次樞密學士待制樞密都承旨以下知閤幷祗應武功大夫以下通班常起居次親王次馬步軍都指揮使次使相次馬步軍員僚已上逐班並常起居次殿中侍御史入側宣大起居訖歸侍立位次宰執以下並兩省官文武百官入相向立定通班面北立大起居訖凡常起居兩拜大起居七拜三省升殿侍立次兩省官出次殿中侍御史對揖出三省樞密院奏事次引見謝辭次引臣僚奏事訖皇帝起詔今後遇四參日分起居班次可移殿中侍御史及宰執以下百官班令次樞密以下班起居却令親王幷殿前都指揮使以下殿前司員僚逐班於宰執以下班後起居餘並從之淳熙七年九月詔自今垂拱殿日參宰臣特免宣名嘉定十二年正月臣僚奏竊見皇帝御正殿或御後殿固可間舉四參官亦有定日近者每日改常朝為後殿四參之禮亦多不講正殿後殿四參間免陛下臨朝之日固未嘗輟而外廷不知聖意或謂姑從簡便非所以肅百執事也常朝之禮止於從臣後殿之儀從臣不與四參止及卿郎而乃累月僅或一舉咫尺天威疏簡至此非所以尊君上而勵百辟也伏願陛下嚴常朝後殿四參之禮起羣下肅謹之心彰明時厲精之治豈不偉哉從之初羣臣見辭謝皆赴正衙淳化二年知雜御史張郁言正衙之設謂之外朝凡羣臣辭見及謝先詣正衙見訖御史臺具官位姓名以報閤門方許入對此國家舊制也自乾德後始詔先赴中謝後詣正衙而文武官中謝後次日並赴正衙內諸司遙領刺史閤門通事舍人以上新授者亦赴正衙辭謝出使急速免衙辭者亦具狀報臺違者罰奉一月其內諸司職官幷將校至刺史以上新授者欲望同百官例赴正衙謝從之元豐既定朝參之制侍御史知雜事滿中行上言文德正衙之制尚存常朝之虛名襲橫行之謬例有司失於申請未能釐正兩省臺官文武百官赴文德殿東西相向對立宰臣一員押班聞傳不坐則再拜而退謂之常朝遇休假併三日以上應內殿起居官畢集謂之橫行自宰臣親王以下應見謝辭者皆先赴文德殿謂之過正衙然在京釐務之官例以別敕免參宰臣押班近年已罷而武班諸衙本朝又不常置故今之赴常朝者獨御史臺官與審官待次階官而已今垂拱內殿宰臣以下既已日參而文德常朝仍復不廢舛謬倒置莫此為甚至於橫行參假與夫見謝辭官先過正衙雖沿唐之故事然必俟天子御殿之日行之可也詔下詳定官制所言今天子日聽政於垂拱以接執政官及內朝之臣而更於別殿宣敕不坐實為因習之誤兼有執事升朝官五日一赴起居而未有執事者反謂之參疏數之節尤為未當又辭見謝自已入見天子則前殿正衙對拜為虛文其連遇朝假則百官司赴大起居不當復有橫行參假宜如中行言於是常朝正衙橫行之儀俱罷
