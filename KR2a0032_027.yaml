body:
  text: 宋史卷二十七本紀第二十七高宗四二年春正月癸巳朔帝在紹興府率百官遙拜二帝不受朝賀甲午詔復置賢良方正直言極諫科丙申賜楊邦乂諡曰忠襄韓世忠圍建州丁酉蠲諸路元年逋稅庚子陝西叛將白常圍岷州關師古率兵破之辛丑韓世忠拔建州范汝為自焚死斬其二弟餘黨悉平壬寅帝發紹興曹成釋向子諲丙午帝至臨安府壬子遣韓世清捕石陂賊癸丑以張浚檢校少保定國軍節度使劉豫遣兵犯伊陽縣翟興及其將李恭合擊敗之曹成犯郴州永興縣己未修臨安城辛酉遣內侍任源撫問張浚江西副總管楊惟忠以楊勍雖就招安復謀作亂誘誅之二月甲子楊華復叛擾鼎澧潭三州詔立賞禽捕首領赦貸脅從丙寅命劉光世將鋭卒萬人屯揚州經理淮東庚午以李綱為觀文殿學士湖廣宣撫使仍命嶽飛率馬友李宏韓京吳錫等共討曹成諸盜甲戌以吏部尚書李光為淮西招撫使王副之乙亥雨雹丙子以施逵謝嚮陸棠黨范汝為逵除名婺州編管嚮棠械赴行在俱道死丁丑分崔增李捧邵青趙延壽李振單德忠徐文所部兵為七將名御前忠鋭軍隸步軍司非樞密奉旨不許調遣減淮南營田歲租三之二俟三年復舊己卯劉光世入見同執政對內殿諭以進屯揚州光世迄不行庚辰詔監司避本貫壬午程昌𧜛遣杜湛募兵攻賊周倫破之甲申以工部員外郎滕茂實死節于代州贈龍圖閣直學士丙戌初置著作官二員修日曆己丑復荊湖東西為荊湖南北路南路治潭北路仍治鄂申禁褔建路私有私造兵器是月知商州董先叛入劉豫金人陷慶陽府執楊可升降之三月壬辰朔命襄鄧鎮撫使桑仲收復陷沒諸郡仍命諸鎮撫使互相應援再貶徐秉哲惠州吳𠾱南雄州莫儔韶州並居住水賊翟進襲漢陽軍殺守臣趙令戣李光執韓世清于宣州以歸虔化縣賊李敦仁及其徒皆授官隸諸軍乙未復置江陰軍罷褔建路武尉戊戌葉夢得罷以李光為江東安撫大使兼滁濠等六州宣撫使罷江淮發運司桑仲如郢州調兵守將霍明以仲將謀逆殺之以其事聞庚子金人攻方山原陝西統制楊政援之金兵引去辛丑又犯隴安縣吳璘等擊走之淮南營田副使王實括間田三萬頃給六軍耕種丙午復置中書門下省檢正官省樞密院檢詳官己酉以神武右軍中部統制楊沂中為神武中軍統制癸丑河南鎮撫使翟興為部將楊偉所殺甲寅金人復自水洛城來攻楊政等又敗之庚申曹成寇賀州清水寨守臣劉全棄城去是月知壽春府陳卞及鈐轄陳寶等舉兵復順昌府尋引兵歸為偽齊所逐並壽春失之夏四月甲子曹成陷賀州陳顒圍循州焚龍川縣命江西安撫司遣將捕之丙寅賜禮部進士張九成以下二百五十九人及第出身庚午以翰林學士承旨翟汝文參知政事壬申釋褔建諸州雜犯死罪以下囚江西軍賊趙進寇瑞昌縣楊惟忠討降之戊寅偽齊統領王資率兵來歸富順監男子李勃偽稱徐王召赴行在壬午詔內外侍從監司守臣各舉中原流寓士大夫三二人以備任使癸未詔曰朕登庸二相倚遇惟均其所薦用之人不得偏私離間朋比害政諡孫傅曰忠定乙酉李綱始拜命置司褔州是夜太平州軍士陸德據城叛囚守臣張錞殺當塗縣令鍾大猷戌子命呂頤浩都督江淮荊浙諸軍事庚寅劉豫徙居汴京是月王彥大破董先于馬嶺關復商州閏月癸巳高麗遣使入貢乙未知池州王進討陸德誅之丙申嶽飛擊破曹成于賀州置都督府隨軍轉運司丁酉左朝奉郎孫覿坐前知臨安府贓污貸死除名象州羈管罷後苑工作辛丑韓世清以狂悖伏誅丙午嶽飛敗曹成于桂嶺縣成走連州遣統制張憲追擊破之又走郴州入邵州丁未賜褔建宣撫司賞軍錢十萬緡聽朱勝非自便乙卯詔諸鎮撫使非奉朝旨毋擅出兵劉光世聞父喪去官特命起復己未詔自今明堂專祀昊天上帝以太宗配是月張浚命利夔制置使王庶與知成都府王似兩易其職襄鄧副都統制李橫同副都統制李道合兵圍郢州霍明遁去五月辛酉以兵部尚書權邦彥簽書樞密院事以樞密將領趙琦所部兵為忠鋭第八將癸亥呂頤浩出師以神武後軍及忠鋭兩將從行百官班送甲子以霍明權襄鄧隨郢州鎮撫使詔觀察使已上各薦可備將帥者二人丁卯罷兩浙轉運司回易庫己巳廢紹興府餘姚上虞縣湖田為湖溉民田庚午詔修建康行宮辛未選宗室子稱之子伯琮育于禁中丙子呂頤浩總師至常州前軍將趙延壽兵叛于呂城鎮丁丑延壽犯金壇縣殺知縣胡思忠頤浩稱疾不進戊寅海州賊王山犯漣水軍總領蘇復副統制劉靖會兵擊敗之庚辰臨安府火癸未置御前軍器所甲申親慮囚自是歲如之罷行在權官乙酉劉光世遣王德追趙延壽叛兵至建平縣悉誅之丙戌置修政局命秦檜提舉詔侍從臺省寺監官監司守令條具省費裕國強兵息民之策丁亥以中書門下省檢正官仇悆為沿海制置使戊子手詔用建隆故事命百官日輪一人轉對兩浙轉運副使徐康國獻銷金屏障詔有司毀之奪康國二官蠲太平州被賊之家夏稅是月張浚以參贊軍事劉子羽知興元府黜王庶復以王似知成都府韓世忠至洪州遣董旻招曹成成聽命赴行在六月庚寅朔李宏引兵入潭州執馬友殺之甲午李綱領兵三千發褔州戊戌詔孟庾韓世忠班師嶽飛屯駐江州庚子以劉光世為寧武寧國軍節度使韓世忠為太尉移屯建康府辛丑以李橫為襄郢鎮撫使李道鄧隨鎮撫使壬寅翟汝文罷孔彥舟叛降偽齊乙巳以權邦彥兼權參知政事戊申仇悆兼制置褔建路辛亥免臺諫官輪對甲寅召呂頤浩赴行在令參謀官傅嵩卿權主管都督府事詔兩浙江淮守臣令存撫東北流寓人乙卯韓世忠遣統制解元巨振入潭州執李宏以歸秋七月辛酉悉蠲褔建諸州被兵之家田稅壬戌復置湖北提舉茶鹽司甲子罷福建提舉市舶司己巳起復翟琮為河南府孟汝唐州鎮撫使甲戌罷淮東路提點刑獄司丙子馬友黨郝通率兵五萬歸宣撫司戊寅知廬州王亨復安豐壽春縣己卯呂頤浩入見庚辰韓世忠討劉忠駐兵于嶽州之長樂渡大破之忠走淮西丁亥詔編次建炎以來譜牒八月壬辰以孟庾兼權同都督江淮荊浙諸軍事癸巳順昌縣賊余勝等作亂通判南劍州王元鼎捕殺之甲午安定郡王令話薨丙申詔郡守除罷赴闕皆得引對臨安府火以知江州劉紹先為沿淮防遏使戊戌命朱勝非提舉醴泉觀兼侍讀日赴朝堂議事沿海州縣籍民海舶每歲一更守海道險要振褔建飢民己亥停傅雱官英州羈管庚子詔孟庾韓世忠總大兵至建康進赴行在戊申給事中胡安國以論朱勝非罷宰執臺諫上疏留之皆不報江西統制傅樞討平南雄賊吳忠鄧慶劉軍一等己酉賜吳玠田甲寅秦檜罷給事中程瑀等坐論駁朱勝非疑其黨檜並落職主宮觀彗出胃乙卯減膳戒輔臣修闕政罷修建康行宮九月戊午朔落秦檜職己未罷修政局辛酉以彗出大赦許中外臣民直言時政陝西諸叛將許令自新壬戌王倫自金國使還入見遣潘致堯等為金國軍前通問使附茶藥金幣進兩宮甲子以直徽猷閣郭偉為淮西巡撫使乙丑復以朱勝非為尚書右僕射同中書門下平章事兼知樞密院事戊辰司空山賊李通出降以為都督府親軍統領癸酉以右朝請大夫呂源為浙東褔建沿海制置使治定海縣知建昌軍朱芾擊石陂賊余照禽斬之甲戌彗沒丙子復以郭仲荀為武泰軍節度使詔墨敕有不當者許三省樞密院奏稟給事中中書舍人繳駁臺諫論列有司申審庚辰命褔建提舉茶鹽官兼領市舶司辛巳以韓世忠為江南東西路宣撫使他帥臣稱宣撫使者並罷壬午遣監察御史明橐等五人宣諭江浙湖廣福建諸路仍降詔諭官吏以遣使按察勸懲誅賞之意癸未新作行宮南門成甲申提轄榷貨務張純峻立淮浙鹽法增其算總領四川財賦趙開初變四川鹽法盡榷之乙酉太白晝見丙戌以知興元府王似為川陝宣撫處置副使丁亥封右監門衛大將軍榮州防禦使令畤為安定郡王是月韓世忠遣統制解元襲擊劉忠于蘄陽大破之忠奔劉豫冬十月戊子朔置牧馬監于饒州庚寅李勃伏誅丙申初置江浙荊湖廣南福建路都轉運使甲辰潘致堯至楚州通判州事劉晏劫其禮幣奔劉豫守臣柴春戰死戊申以知平江府趙鼎為江東安撫大使丙辰禁溫台二州民結集社會班度量權衡于諸路禁私造者是月顏孝恭招降石陂餘賊李寶等十一月辛酉陳顒陷汀州武平縣犯梅循二州乙丑初榷明州鹵田鹽辛未議將撫師江上召侍從官條具利害甲戌命李綱劉洪道程昌𧜛解潛會兵捕討湖寇楊太戊寅范汝為餘黨范忠掠龍泉縣庚辰詔宣諭五使焚所至州縣建炎以前已蠲稅籍癸未臨安大火是月關師古敗偽齊兵于抹邦山馬友黨步諒詣李綱降綱入潭州其黨郝晸降王進吳錫禽王浚湖南盜賊悉平十二月丁亥朔命神武前軍統領申世景等討捕范忠己丑偽稱榮德帝姬易氏伏誅范忠犯處州巨師古引兵入廬州執王亨送行在甲午李綱罷臨安府火丙申振被火家罷浙東沿海制置司丁酉嶽飛遣統領徐慶王貴討禽萍鄉賊高聚己亥以胡舜陟為廬壽等州鎮撫使金人侵熙秦關師古擊敗之庚子遣駕部員外郎李願撫諭川陝江西兵馬副鈐轄張忠彥坐縱暴不法斬于潭州辛丑程昌𧜛遣杜湛討楊欽等敗之殺三千餘人癸卯川陝宣撫司類試陝西發解進士得周謨等十三人以便宜賜進士出身甲辰罷張浚宣撫處置使仍知樞密院以知夔州盧法原為川陝宣撫處置副使及王似同治司事己酉遣司封員外郎周隨亨同撫諭川陝庚戌孟庾自建康來朝辛亥金人犯商州守將邵隆退屯上津李橫敗偽齊兵復汝州甲寅命孟庾同都督江淮荊浙諸軍事詔都督府總治江東西湖北浙西帥臣經畫屯田張浚承制以歸州隸夔州路是冬金人犯和尚原將士乏食自潰吳璘拔寨棄去虔賊謝達犯惠州三年春正月丁巳朔帝在臨安率百官遙拜二帝不受朝賀江西將李宗諒誘戍兵叛寇筠州統領趙進擊卻之翟琮入西京禽偽齊留守孟邦雄命諸路憲臣兼提舉常平司庚申金人犯上津李橫破潁順軍偽齊知軍蘭和降壬戍金人犯金州洵陽縣以仇悆為褔建兩浙淮東路沿海制置使癸亥陳顒圍潮州不下引兵趨江西甲子李橫復潁昌府乙丑詔中外刑官各務仁平臺憲檢察月具所平反以聞歲終考察殿最金人陷金州鎮撫使王彥焚積聚退保西鄉庚午罷行在宗正司命嗣濮王仲湜兼判大宗正事辛未震電雨雹造渾天儀李通為其徒王全所殺壬申命西外宗正移司褔州癸酉復祭大火以湯東野為淮東安撫使乙亥以李橫為襄陽府鄧隨郢州鎮撫使丁丑登萊山寨統制范溫率部兵泛海來歸庚辰詔春秋望祭諸陵張浚論奏王似不可為副因引罪求罷不報癸未詔民復業者視墾田多寡定租額賦役乙酉減淮浙蠶鹽錢二月丁亥朔升桂州為靜江府己丑權邦彥薨浙東賊彭友犯龍泉縣辛卯李通餘黨劉德圍舒州吳玠遇金人于饒風關王彥自西鄉來會金人分兵攻關統制郭仲敗走丁酉饒風關破玠趣西縣彥奔達州四川大震張浚被罷職之命以諸軍方潰因祕不行復具奏審己亥金帥撒離曷入興元府經略使劉子羽焚其城走三泉縣吳玠退屯仙人關庚子以宗子伯琮為和州防禦使賜名瑗尋改貴州辛丑蠲廣東諸州被賊民家稅壬寅鄭州兵馬鈐轄牛皋彭率兵與李橫會橫以便宜命皋為蔡唐州鎮撫使知汝州乙巳翟琮遣統制李吉敗偽齊兵于伊陽又殲其將梁進之衆丁未王似始受宣撫副使之命戊申虔賊周十隆犯循梅汀州詔統制趙祥等合兵捕之庚戌以李橫為神武左軍副統制京西招撫使改胡舜陟為淮西安撫使辛亥以工部尚書席益參知政事翰林學士徐俯簽書樞密院事壬子王全犯廬州甲寅詔守臣至官半年具上民間利害或邊防五事李橫遣人奏潁昌之捷詔許橫便宜行事乙卯劉光世遣酈瓊等屯兵泗州為李橫聲援是月張浚復以王庶為參謀官往巴州措置時金兵深入至金牛鎮疑有伏由褒斜谷引兵還興元吳玠劉子羽追擊其後殺獲甚衆三月己未詔嶽飛捕虔賊壬戌申命統制巨師古部兵萬人屯揚州胡舜陟至廬州王全降甲子以趙鼎為江西安撫大使李橫傳檄諸軍收復東京己巳金人遣兵援劉豫李橫敗走潁昌復陷壬午以韓世忠為淮南東路宣撫使李綱遣兵擊降李宗諒詔戮于市夏四月丁亥朱勝非以母喪去位偽齊知虢州董震及其統制董先來歸以震權商虢陝州鎮撫使己丑詔江東西湖北浙西募民佃荒田蠲三年租辛卯以劉光世為檢校太傅江南東路宣撫使金人去興元壬辰徙都督府于鎮江嶽飛軍次虔州甲午偽齊知唐州胡安中來歸丙申偽齊李成攻陷虢州董先牛皋奔襄陽己亥改諡昭慈獻烈皇后為昭慈聖獻復舉五帝日月之祀庚子增文武小官奉辛丑荊南統制羅廣率兵至鼎州楊太衆益盛自號大聖天王立鍾相少子子義為太子廣等不克討而還丁未嶽飛遣統領張憲王貴擊彭友禽斬之劉忠為部下王林所殺傳首行在戊申以浙西兵馬鈐轄史康民所部兵為忠鋭等九將己酉張浚奏王庶王似盧法原威望素輕乞命劉子羽吳玠並為判官不報辛亥徐文叛奔偽齊五月丙辰以翟琮為河南府孟汝鄭州鎮撫使董先為副使丁巳遣樞密計議官任直清撫諭襄陽商虢河南諸鎮己未命楊沂中招捕嚴州盜賊辛酉建睦親宅以董先為商虢陝州鎮撫使徵河南布衣王忠民為宣教郎至行在辭不受壬戌潘致堯還言金人欲重臣通使以取信遂寢出師之議乙丑罷諸州在任守臣所辟通判丁卯以韓肖胄等充金國軍前通問使安化蠻犯邊廣西經略使許中發兵擊之戊辰楊沂中招降嚴州賊繆羅等捕斬其徒百人魔賊平庚午以嶽州數被兵免今年稅役壬申詔守令尉佐境內妖民聚集不能覺察致亂者並坐罪知建昌軍朱芾討南豐縣賊禽誅其魁黃琛乙亥以方與金國議和禁邊兵犯齊境丙子王彥復金州金兵棄均房去韓世忠請以大軍還鎮江己卯詔淮南統制解元戍泗州餘屯江北周隨亨李願宣押王似盧法原至閬州張浚始解使事時已論金牛之功以吳玠為利州路階成鳳州制置使劉子羽為寶文閣直學士王彥為保大軍承宣使僚屬將帥第賞有差庚辰浚及子羽王庶劉錫等赴行在詔李橫等收軍還鎮辛巳罷宣撫司便宜黜陟六月甲申朔統制巨師古坐違韓世忠節制除名廣州編管丙戌復置六部架閣庫丁亥禁諸路招納淮北人及中原軍來歸者戊子復元祐宰相呂大防官職贈諡庚寅詔降川陝死罪囚釋流以下賞吳玠關師古將士壬辰張浚至綿州復奏王似不可任甲午命王率諸軍討楊太己亥罷沿海制置司丁未置國子監及博士弟子員戊申以王林所部兵為忠鋭第十將己酉嶽飛自虔州班師辛亥發兵屯駐虔廣二州彈壓盜賊州各三千人是月金人圍方山原王似命吳玠發兵救之秋七月己未復置博學宏詞科初許任子就試甲子以久旱償州縣和市民物之直丁卯詔訪求纍朝勳臣曹彬等三百人子孫以備録用戊辰王以舟師發行在己巳詔減膳禁屠弛工役罷苛嬈命兩浙及諸路憲臣親按部録囚辛未蠲紹興二年和市絁帛癸酉呂頤浩等以旱乞罷政帝賜詔曰與其去位曷若同寅協恭交修不逮思所以克厭天心者頤浩等乃復視事乙亥朱勝非起復丙子泉州水溢壞城丁丑遣中使逆趣張浚于道是月四川霖雨地震八月己丑詔嶽飛赴行在留精兵萬人戍江州翟琮率兵突圍奔襄陽詔屯駐其地癸卯罷諸路輸禁軍闕額錢甲辰以雨暘不時蘇湖地震求直言乙巳復置史館修撰直館檢討官命郎官兼領著作郎及佐郎戊申罷都轉運司己酉詔湖南丁米三分之二均取于民田其一取之丁口辛亥孟庾自軍中來朝九月戊午呂頤浩罷詔凡遇水旱災異監司郡守即具奏毋隱庚申嶽飛自江州來朝川陝統領官吳勝敗偽齊兵于黃堆寨丙寅以趙鼎為江西安撫制置大使壬申詔中書舍人給事中凡制敕非軍期機速必先書押而後報行甲戌偽齊王彥先寇徐宿二州乙亥以劉光世為江東淮西宣撫使置司池州韓世忠為鎮江建康府淮南東路宣撫使置司鎮江府王為荊南府嶽鄂潭鼎澧黃州漢陽軍制置使置司鄂州嶽飛為江南西路舒蘄州制置使置司江州主管殿前司郭仲荀知明州兼沿海制置使神武中軍統制楊沂中兼權殿前司己卯吳勝克蓮花城冬十月癸未朱勝非上重修吏部七司敕令格式庚寅加吳玠檢校少保壬辰趣王進兵詔寬私鹽重法甲午卻大理國入貢丁酉殘破州縣視戶口增損立守令考課法己亥禁州縣擅增置稅場偽齊李成陷鄧州辛丑南丹蠻莫公晟圍觀州焚寶積監殺知監陳壬寅偽齊兵逼襄陽李橫以糧盡棄城奔荊南知隨州李道亦棄城去甲辰王討湖賊戰于鼎口不利偽齊陷郢州守臣李簡棄城去申禁私役戰士丁未命三省除銓曹姦弊戊辰罷諸路類省試統制石世達及杜湛合兵大破湖賊黃誠于龍陽洲庚戌復置宗正少卿及寺監諸丞是月王彥先引兵至北壽春將渡淮劉光世駐軍建康扼馬家渡又遣酈瓊駐無為軍為廬濠聲援賊乃還十一月己未以右文殿修撰王倫為都督府參議官癸亥詔監司帥守察內外宗子病民害政者以聞崔增吳全遇湖賊于陽武口死之甲子韓肖胄等使還乙丑禁沿淮諸寨兵擅侵齊境庚午臨安府火甲戌禁掠賣生口入蠻夷木岺洞及以銅錢出中國乙亥復元祐十科舉士法丁丑命賓橫宜觀四州市戰馬戊寅王自鼎州引兵還鄂留統領王渥等四軍聽程昌𧜛節制己卯蠲南劍州所負民間獻納錢十六萬緡省淮南州縣文武官十二月辛巳朔降敕書撫諭吳玠及川陝將士乙酉臨安府火戊子又火朱勝非以屢火求罷不允丙申王似承制廢通遠軍己酉金國元帥府遣李永壽王翊來見是歲海寇黎盛犯潮州焚民居毀城去四年春正月辛亥朔帝在臨安率百官遙拜二帝乙卯增淮浙路鹽鈔貼納錢遣章誼等為金國通問使己未程昌𧜛遣杜湛王渥攻楊太皮真寨破之己巳詔諭王似盧法原吳玠使之協和金人犯宕昌臨江寨及花石峽關師古遣統領劉戩分兵拒卻之庚午詔諸路將帥毋以兩國通使輒弛邊備淮南州郡津渡尤慎譏察甲戌罷州縣新置弓手乙亥蠲循梅潮惠四州被兵家租賦丙子申敕三省樞密院除官並遵舊制毋相侵紊除拜罷免皆明示黜陟之由戊寅金人犯神坌寨沿北嶺至大散關臨安府火己卯韓肖胄罷二月壬午詔贓罪至死者仍籍其資癸未作建康府行宮席益罷乙酉以徐俯兼參知政事丙戌禁川陝諸將招納北軍湖北軍賊檀成犯長陽縣解潛遣統領胡勉捕斬之羣盜田政自襄陽犯峽州己丑解潛遣統制王恪擊政斬之庚寅金人犯兩當縣乙未詔孟庾赴行在己亥詔三衙管軍及將帥觀察使以上舉忠勇智略可自代者一人辛丑金人犯仙人關癸卯詔權以射殿為景靈宮四時設位朝獻丙午張浚入見三月辛亥朔吳玠率楊政吳璘田晟王喜諸將與兀朮戰于仙人關大敗之兀朮遁去戊午雨雹以趙鼎參知政事壬戌孟庾至行在罷都督府以其兵屬張俊乙丑張浚以資政殿大學士罷尋落職奉祠褔州居住己巳蠲淮南州縣民租一年辛未日有青赤黃氣編次建炎以來詔旨頒諸路癸酉蠲興元府洋州被兵家稅役二年丙子以王似為資政殿學士川陝宣撫使盧法原為端明殿學士與吳玠並充副使關師古為熙河蘭廓路安撫制置使夏四月庚辰朔命趙開再任總領四川財賦詔諭川陝官吏兵民以張浚失措當示遠竄猶嘉其所用吳玠等能禦大敵許國一心止從薄責仍令宣撫司講求咨訪凡擾民咈衆之事速釐革之癸未劉子羽白州安置乙酉詔明堂用皇祐典禮兼祀天皇大帝神州地祇以下諸神丙戌吳玠敗金兵復鳳秦隴州詔特旨處死情法不相當者許大理奏審蠲淮南州軍上供錢一年庚寅置孳生牧馬監于臨安府甲午罷廣西提舉茶鹽司關師古叛以洮岷二州降偽齊吳玠併將師古軍乙未詔諸路歲上戶口丁酉罷諸州回易庫庚子命劉光世遣兵巡邊辛丑保靜州夷人入貢丙午徐俯罷是月王似承制廢符陽軍知壽春府羅興叛降偽齊五月庚戌朔以嶽飛兼黃復二州漢陽軍德安府制置使癸丑以范沖為宗正少卿兼直史館重修神宗哲宗正史實録甲寅詔淮南帥臣兼營田使守令以下兼管營田嶽飛復郢州斬偽齊守荊超甲子以孟庾兼權樞密院事乙丑賜李橫軍絹萬匹丙寅李成棄襄陽去嶽飛復取之金人攻金州鎮撫使王彥遣統制許青等與戰于漢陰敗之罷諸縣武尉壬申裁省三省樞密細務責六曹長二專決癸酉以國史日曆所為史館偽齊收李成餘衆益兵駐新野嶽飛與別將王萬夾擊復大敗之乙亥王彥數敗金兵于洵陽縣丙子復選宗室子彥之子伯玖育于禁中六月壬申復命川陝類試乙未太白晝見經天戊戌詔神武軍神武副軍統制統領官並隸樞密院庚子以霖雨罷不急之役壬寅詔三省樞密院凡奉干請墨敕許執奏不行置史館校勘官作明堂行禮殿于教場甲辰禁諸軍強刺平人為兵已刺者皆釋之吳玠乞宮觀不允是月熒惑犯南斗嶽飛將牛皋復隨州執偽齊守王嵩磔之秋七月戊申朔曲赦虔州以吏部尚書胡松年簽書樞密院事庚戌以湖南安撫席益為安撫制置大使建昌軍軍卒修達等作亂殺守臣劉滂江西制置使胡世將遣參謀侯賣心統制丘贇討之壬子命吳玠通信夏國癸丑湖賊楊欽等破社木寨官軍敗卻小將許筌戰歿丙辰賞仙人關之功以吳玠為檢校少師奉寧保靜軍節度使吳璘楊政以下論賞有差丁巳命左右司歲考郎官功過治狀以為賞罰庚申復曲端趙哲官壬戌嶽飛遣統制王貴張憲擊敗李成及金兵于鄧州之西復鄧州禽其將高仲丙寅侯賣心引兵入建昌軍執修達等十三人斬之罷建州臘茶綱詔江東安撫司招水軍千五百人己巳湖賊萬餘人詣鼎澧二州降劉光世來朝庚午王貴張憲破金齊兵復唐州及信陽軍襄漢悉平辛未章誼孫近使還入見粘罕致書約淮南毋得屯兵八月庚辰以趙鼎知樞密院事充川陝宣撫處置使湖賊夏誠等犯枝江縣解潛遣將蔣定舟與戰敗之辛巳吳玠遣統領姚仲攻隴城縣克之壬午王以討賊無功降光州觀察使戊子改命趙鼎都督川陝荊襄諸軍事乙未遣魏良臣等充金國通問使丙申毀王安石舒王告己亥周十隆出降為官軍所掠復遁去犯汀循州壬寅王似罷以嶽飛為清遠軍節度使湖北荊襄潭州制置使代王討湖賊癸卯以襄陽府隨郢唐鄧州信陽軍六郡為襄陽府路九月戊申減淮浙路鹽鈔所增貼納錢壬子夏誠遣將李全功犯公安軍解潛遣統制林閏等擊斬之安定郡王令畤薨辛酉合祭天地于明堂大赦蠲襄陽等六郡三年租稅庚午朱勝非罷金齊合兵自淮陽分道來犯壬申渡淮楚州守臣樊棄城去韓世忠自承州退保鎮江府癸酉以趙鼎為尚書右僕射同中書門下平章事兼知樞密院事吏部尚書沈與求參知政事冬十月丙子朔與趙鼎定策親征命張俊以軍援淮東劉光世移軍建康車駕擇日進發丁丑以孟庾為行宮留守留統制王進一軍及神武中軍五百人隸之百司不預軍旅之務者聽從便避兵己卯韓世忠自鎮江率兵復如揚州金人犯滁州以張俊為浙西江東宣撫使金人圍亳州席益遣統制吳錫率兵討徭賊楊再興大破之壬午偽齊兵犯安豐縣癸未復以張浚為資政殿學士提舉萬壽觀兼侍讀甲申復以王為建武軍承宣使江西沿江制置使丙戌命胡松年詣江上會諸將議進兵戊子韓世忠邀擊金人于大儀鎮敗之又遣將董旻敗之于天長縣鴉口橋己丑金人攻承州韓世忠遣將成閔解元合兵擊于北門敗之金人圍濠州甲午遣祕書正字楊晨持詔撫諭四川遣侍御史魏矼監察御史田如鼇詣劉光世張俊軍中計事光世始移軍太平州丙申命後宮自溫州泛海如泉州金人陷濠州守臣寇宏棄城走丁酉詔州縣團教弓手土兵戊戌帝御舟發臨安劉錫楊沂中以禁兵扈從己亥韓世忠捷奏至命收瘞戰死將士仍令胡松年致祭庚子張俊率兵發鎮江如建康壬寅帝次平江加贈陳東歐陽徹祕閣修撰官其子孫二人各賜田十頃且追咎汪伯彥落觀文殿學士黃潛善更不追復命韓世忠楊沂中分兵控扼沿海要地癸卯焚決淮東閘堰賜扈從諸軍錢乙巳仇悆遣將孫暉擊金人于壽春敗之復霍丘安豐二縣是月借江浙坊場錢一界以備軍費十一月戊申太白晝見庚戌賞承州水寨首領徐康等要擊金兵之功轉官有差仍蠲承楚泰州水寨民兵賦役十年置沿江烽火放浙東諸郡防城丁夫壬子始下詔聲劉豫逆罪諭親討之旨以厲六師吳玠遣統制楊從儀等率兵敗金人于臘家城癸丑玠乞納節贖劉子羽罪遂聽子羽自便金人入光州甲寅偽齊知光州許約破石額山寨遂據之乙卯韓世忠遣兵夜劫金人營于承州破之金人犯六合縣丙辰掠全椒縣三城湖丁巳戒諸路大小臣僚借貸催科縱吏姦擾民及務絶盜賊之伺隙者命董旻趙康直總領淮東水寨戊午以胡松年兼權參知政事金人陷滁州劉光世移軍建康韓世忠移軍鎮江張俊移軍常州己未復命張浚知樞密院事以其盡忠竭節詔諭中外庚申宴犒守江將士癸亥劉光世遣統制王德擊金人于滁州之桑根敗之揭黃榜招諭湖賊甲子命滁和諸州移治保聚乙丑金人犯滁口己巳劉光世遣統制王師晟等率兵夜入南壽春府襲金人敗之執偽齊知府王靖廣賊區稠圍韶州樂昌縣鈐轄韓京遣兵擊斬之詔張浚視師江上十二月乙亥朔魏良臣王繪還自泗州軍前入見戊寅命都督府右軍統制李貴部兵屯扼福山鎮辛巳命中軍統制王進屯兵泰州防拓通泰壬午以樞密都承旨馬擴為江西沿江制置副使丙戌吳倫遣兵攻臘家城破之丁亥聽兩淮避兵民耕種所在間田壬辰金齊兵逼廬州仇悆嬰城固守嶽飛所遣統制徐慶牛皋援兵適至敗走之劉光世亦遣統制靳賽戰于慎縣張俊遣統制張宗顏擊敗金人于六合詔江浙荊湖十四郡各募水軍五百人名橫江軍兩浙十郡沿江海州縣招捕巡檢土軍甲午程昌𧜛遣杜湛彭筠合擊楊欽破之己亥以來年正旦日食下詔修闕政求直言庚子金人退師辛丑詔葬祭浙西江東二軍之死事者壬寅省淮南轉運司遣胡松年往常熟縣江陰軍沿江計議軍事癸卯金人去滁州
