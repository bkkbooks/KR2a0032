body:
  text: 宋史卷九十三志第四十六河渠三黃河下汴河上元祐八年二月乙卯三省奉旨北流軟堰並依都水監所奏門下侍郎蘇轍奏臣嘗以謂軟堰不可施於北流利害甚明蓋東流本人力所開闊止百餘步冬月河流斷絶故軟堰可為今北流是大河正溜比之東流何止數倍見今河水行流不絶軟堰何由能立蓋水官之意欲以軟堰為名實作硬堰陰為回河之計耳朝廷既已覺其意則軟堰之請不宜復從趙稱亦上議曰臣竊謂河事大利害有三而言者互進其說或見近忘遠徼幸盜功或取此捨彼譸張昧理遂使大利不明大害不去上惑朝聽下滋民患橫役枉費殆無窮已臣切痛之所謂大利害者北流全河患水不能分也東流分水患水不能行也宗城河決患水不能閉也是三者去其患則為利未能去則為害今不謀此而議欲專閉北流止知一日可閉之利而不知異日既塞之患止知北流伏槽之水易為力而不知闞村方漲之勢未可併以入東流也夫欲合河以為利而不恤上下壅潰之害是皆見近忘遠徼幸盜功之事也有司欲斷北流而不執其咎乃引分水為說姑為軟堰知河衝之不可以軟堰禦則又為決堰之計臣恐枉有工費而以河為戲也請俟漲水伏槽觀大河之勢以治東流北流五月水官卒請進梁村上下約束狹河門既涉漲水遂壅而潰南犯德清西決內黃東淤梁村北出闞村宗城決口復行魏店北流因淤遂斷河水四出壞東郡浮梁十二月丙寅監察御史郭知章言臣比緣使事至河北自澶州入北京渡孫村口見水趨東者河甚闊而深又自北京往洺州過楊家淺口復渡見水之趨北者才十之二三然後知大河宜閉北行東乞下都水監相度於是吳安持復兼領都水即建言近準朝旨已堰斷魏店剌子向下北流一枝斷絶然東西未有堤岸若漲水稍大必披灘漫出則平流在北京恩州界為害愈甚乞塞梁村口縷張包口開青豐口以東雞爪河分殺水勢呂大防以其與己意合向之詔同北京留守相視時范純仁復為右相與蘇轍力以為不可遂降旨令都水監與本路安撫轉運提刑司共議可則行之有異議速以聞紹聖元年正月也是時轉運使趙稱深不以為然提刑上官均頗助之稱之言曰河自孟津初行平地必須全流乃成河道禹之治水自冀北抵滄棣始播為九河以其近海無患也今河自橫壠六塔商胡小吳百年之間皆從西決蓋河徙之常勢而有司置掃創約橫截河流回河不成因為分水初決南宮再決宗城三決內黃亦皆西決則地勢西下較然可見今欲弭息河患而逆地勢戾水性臣未見其能就功也請開闞村河門修平鄉巨鹿掃焦家等堤濬澶淵故道以備漲水大名安撫使許將言度今之利若舍故道止從北流則慮河下已湮而上流橫潰為害益廣若直閉北流東徙故道則復慮受水不盡而破隄為患竊謂宜因梁村之口以行東因內黃之口以行北而盡閉諸口以絶大名諸州之患俟春夏水大至乃觀故道足以受之則內黃之口可塞不足以受之則梁村之役可止定其成議則民心固而河之順復有時可以保其無害詔令吳安持同都水監丞鄭佑與本路安撫轉運提刑司官具圖狀保明聞奏即有未便亦具利害來上三月癸酉監察御史郭知章言河復故道水之趨東已不可遏近日遣使按視逐司議論未一臣謂水官朝夕從事河上望專委之乙亥呂大防罷相六月右正言張商英奏言元豐間河決南宮口講議纍年先帝歎曰神禹復生不能回此河矣乃敕自今後不得復議回河閉口蓋採用漢人之論俟其泛濫自定也元祐初文彥博呂大防以前敕非是拔吳安持為都水使者委以東流之事京東河北五百里內差夫五百里外出錢雇夫及支借常平倉司錢買梢草斬伐榆柳凡八年而無尺寸之效乃遷安持太僕卿王宗望代之宗望至則劉奉世猶以彥博大防餘意力主東流以梁村口吞納大河今則梁村口淤澱而開沙堤兩處決口以泄水矣前議纍七十里堤以障北流今則云俟霜降水落興工矣朝廷咫尺不應九年為水官蔽欺如此九年之內年年礬山水漲霜降水落豈獨今年始有漲水而待水落乃可以興工耶乞遣使按驗虛實取索回河以來公私費錢糧梢草依仁宗朝六塔河施行會七月辛丑廣武掃危急詔王宗望亟往救護壬寅帝謂輔臣曰廣武去洛河不遠須防漲溢下灌京師已遣中使視之輔臣出圖狀以奏曰此由黃河北岸生灘水趨南岸今雨止河必減落已下水官與洛口官同行按視為簽堤及去北岸嫩灘令河順直則無患矣八月丙子權工部侍郎吳安持等言廣武掃危急刷塌堤身二千餘步處地形稍高自鞏縣東七里店至見今洛口約不滿十里可以別開新河引導河水近南行流地步至少用功甚微王宗望行視並開井筒各稱利便外其南築大堤工力浩大乞下合屬官司躬往相度保明從之十月丁酉王宗望言大河自元豐潰決以來東北兩流利害極大頻年紛爭國論不決水官無所適從伏自奉詔凡九月上禀成算自闞村下至栲栳堤七節河門並皆閉塞築金堤七十里盡障北流使全河東還故道以除河患又自闞村下至海口補築新舊堤防增修疏濬河道之淤淺者雖盛夏漲潦不至壅決望付史官紀紹聖以來聖明獨斷致此成績詔宗望等具析修閉北流部役官等功力等第以聞然是時東流堤防未及繕固瀕河多被水患流民入京師往往泊御廊及僧舍詔給券諭令還本土以就振濟己酉安持又言準朝旨相度開濬澶州故道分減漲水按澶州本是河行舊道頃年曾乞開修時以東西地形高仰未可興工欲乞且行疏導燕家河仍令所屬先次計度合增修一十一掃所用工料詔令都水監候來年將及漲水月分先具利害以聞癸丑三省樞密院言元豐八年知澶州王令圖議乞修復大河故道元祐四年都水使者吳安持因紓南宮等掃危急遂就孫村口為回河之策及梁村進約東流孫村口窄狹德清軍等處皆被水患今春王宗望等雖於內黃下掃閉斷北流然至漲水之時猶有三分水勢而上流諸掃已多危急下至將陵掃決壞民田近又據宗望等奏大河自閉塞闞村而下及創築新堤七十餘里盡閉北流全河之水東還故道今訪聞東流向下地形已高水行不快既閉斷北流將來盛夏大河漲水全歸故道不惟舊堤損缺怯薄而闞村新堤亦恐未易枝梧兼京城上流諸處掃岸慮有壅滯衝決之患不可不豫為經畫詔權工部侍郎吳安持都水使者王宗望監丞鄭佑同北外監丞司自闞村而下直至海口逐一相視增修疏濬不致壅滯衝決丙辰張商英又言今年已閉北流都水監長二交章稱賀或乞付史官則是河水已歸故道止宜修緝堤掃防將來衝決而已近聞王宗望李仲却欲開澶州故道以分水吳安持乞候漲水前相度緣開澶州故道若不與今東流底平則才經水落立見淤塞若與底平則從初自合閉口回河何用九年費財動衆安持稱候漲水相度乃是悠悠之談前來漲水並今來漲水各至澶州德清軍界安持首尾九年豈得不見更欲延至明年乃是狡兔三穴自為潛身之計非公心為國事也况立春漸近調夫如是時不早定議又留後說邦財民力何以支持訪聞先朝水官孫民先元祐六年水官賈種民各有河議乞取索照會召前後本路監司及經歷河事之人與水官詣都堂反覆詰難務取至當經久可行定議歸一庶免以有限之財事無涯之功二年七月戊午詔沿黃河州軍河防決溢並即申奏元符二年二月乙亥北外都水丞李偉言相度大小河門乘此水勢衰弱並先修閉各立蛾眉掃鎮壓乞次於河北京東兩路差正夫三萬人其他夫數令修河官和雇三月丁巳偉又乞於澶州之南大河身內開小河一道以待漲水紓解大吳口下注北京一帶向著之患並從之六月末河決內黃口東流遂斷絶八月甲戌詔大河水勢十分北流其以河事付轉運司責州縣共力救護隄岸辛丑左司諫王祖道請正吳安持鄭佑李仲李偉之罪投之遠方以明先帝北流之志詔可三年正月己卯徽宗即位鄭佑吳安持輩皆用登極大赦次第牽復中書舍人張商英繳奏佑等昨主回河皆違神宗北流之意不聽商英又嘗論水官非其人治河當行其所無事一用堤障猶塞兒口止其啼也三月乃以商英為龍圖閣待制河北都轉運使兼專功提舉河事商英復陳五事一曰行古沙河口二曰復平恩四掃三曰引大河自古漳河浮河入海四曰築御河西堤而開東堤之積五曰開木門口泄徒駭河東流大要欲隨地勢疏濬入海會四月河決蘇村七月詔商英毋治河止釐本職其因河事差辟官吏並罷復置北外都水丞司建中靖國元年春尚書省言自去夏蘇村漲水後來全河漫流今已淤高三四尺宜立西堤詔都水使者魯君貺同北外丞司經度之於是左正言任伯雨奏河為中國患二千歲矣自古竭天下之力以事河者莫如本朝而徇衆人偏見欲屈大河之勢以從人者莫甚於近世臣不敢遠引祗如元祐末年小吳決溢議者乃譎謀異計欲立奇功以邀厚賞不顧地勢不念民力不惜國用力建東流之議當洪流中立馬頭設鋸齒梢芻材木耗費百倍力遏水勢使之東注陵虛駕空非特行地上而已增堤益防惴惴恐決澄沙淤泥久益高仰一旦決潰又復北流此非堤防之不固亦理勢之必至也昔禹之治水不獨行其所無事亦未嘗不因其變以導之蓋河流混濁泥沙相半流行既久迤邐淤澱則久而必決者勢不能變也或北而東或東而北亦安可以人力制哉為今之策正宜因其所向寬立堤防約欄水勢使不至大段漫流若恐北流淤澱塘泊亦祗宜因塘泊之岸增設堤防乃為長策風聞近日又有議者獻東流之計不獨比年災傷居民流散公私匱竭百無一有事勢窘急固不可為抑亦自高注下湍流奔猛潰決未久勢不可改設若興工公私徒耗殆非利民之舉實自困之道也崇寧三年十月臣僚言昨奉詔措置大河即由西路歷沿邊州軍回至武強縣循河堤至深州又北下衡水縣乃達冀又北渡河過遠來鎮及分遣屬僚相視恩州之北河流次第大抵水性無有不下引之就高決不可得况西山積水勢必欲下各因其勢而順導之則無壅遏之患詔開修直河以殺水勢四年二月工部言乞修蘇村等處運糧河堤為正堤以支漲水較修棄堤直堤可減工四十四萬料七十一萬有奇從之閏二月尚書省言大河北流合西山諸水在深州武強瀛州樂壽掃俯瞰雄霸莫州及沿邊塘濼萬一決溢為害甚大詔增二掃堤及儲蓄以備漲水是歲大河安流五年二月詔滑州繫浮橋於北岸仍築城壘置官兵守護之八月葺陽武副堤大觀元年二月詔於陽武上掃第五鋪開修直河至第十五鋪以分減水勢有司言河身當長三千四百四十步面闊八十尺底闊五丈深七尺計役十萬七千餘工用人夫三千五百八十二凡一月畢從之十二月工部員外郎趙霆言南北兩丞司合開直河者凡為里八十有七用緡錢八九萬異時成功可免河防之憂而省久遠之費詔從之二年五月霆上免夫之議大略謂黃河調發人夫修築掃岸每歲春首騷動數路常至敗家破産今春滑州魚池掃合起夫役嘗令送免夫之直用以買土增貼掃岸比之調夫反有贏餘乞詔有司應堤掃合調春夫並依此例立為永法詔曰河防夫工歲役十萬濱河之民困於調發可上戶出錢免夫下戶出力充役其相度條畫以聞丙申邢州言河決陷巨鹿縣詔遷縣於高地又以趙州隆平下濕亦遷之六月己卯都水使者吳玠言自元豐間小吳口決北流入御河下合西山諸水至清州獨流寨三叉口入海雖深得保固形勝之策而歲月寖久侵犯塘堤衝壞道路齧損城寨臣奉詔修治隄防禦捍漲溢然築八尺之堤當九河之尾恐不能敵若不遇有損缺逐旋增修即又至隳壞使與塘水相通於邊防非計也乞降旨修葺從之庚寅冀州河溢壞信都南宮兩縣三年八月詔沈純誠開撩兔源河兔源在廣武掃對岸分減掃下漲水也政和四年十一月都水使者孟昌齡言今歲夏秋漲水河流上下並行中道滑州浮橋不勞解拆大省歲費詔許稱賀官吏推恩有差昌齡又獻議導河大伾可置永遠浮橋謂河流自大伾之東而來直大伾山西而止數里方回南東轉而過復折北而東則又直至大伾山之東亦止不過十里耳視地形水勢東西相直徑易曾不十餘里間且地勢低下可以成河倚山可為馬頭又有中灘正如河陽若引使穿大伾大山及東北二小山分為兩股而過合於下流因是三山為趾以繫浮梁省費數十百倍可寬河朔諸路之役朝廷喜而從之五年置提舉修繫永橋所六月癸丑降德音于河北京東京西路其略曰鑿山釃渠循九河既道之迹為梁跨趾成萬世永賴之功役不踰時慮無愆素人絶往來之阻地無南北之殊靈祗懷柔黎庶呼舞眷言朔野爰暨近畿畚鍤繁興薪芻轉徙民亦勞止朕甚憫之宜推在宥之恩仍廣蠲除之惠應開河官吏令提舉所具功力等第聞奏又詔居山至大伾山浮橋屬濬州者賜名天成橋大伾山至汶子山浮橋屬滑州者賜名榮光橋俄改榮光曰聖功七月庚辰御製橋名磨崖以刻之方河之開也水流雖通然湍激猛暴遇山稍隘往往泛溢近寨民夫多被漂溺因亦及通利軍其後遂注成巨濼云是月昌齡遷工部侍郎八月己亥都水監言大河以就三山通流正在通利之東慮水溢為患乞移軍城於大伾山居山之間以就高仰從之十月丁巳中書省言冀州棗強掃決知州辛昌宗武臣不諳河事詔以王仲元代之十一月丙寅都水使者孟揆言大河連經漲淤灘面已高致河流傾側東岸今若修閉棗強上掃決口其費不資兼冬深難施人力縱使極力修閉東堤上下二百餘里必須盡行增築與水爭力未能全免決溢之患今漫水行流多醎鹵及積水之地又不犯州軍止經數縣地分迤邐纏御河歸納黃河欲自決口上恩州之地水堤為始增補舊堤接續御河東岸簽合大河從之乙亥臣僚言禹跡湮沒於數千載之遠陛下神智獨運一旦興復導河三山長堤盤固橫截巨浸依山為梁天造地設威示南北度越前古歲無解繫之費人無病涉之患大功既成願申飭有司以日繼月視水向著隨為隄防益加增固每遇漲水水官漕臣不輟巡視詔付昌齡六年四月辛卯高陽關路安撫使吳玠言冀州棗強縣黃河清詔許稱賀七月戊午太師蔡京請名三山橋銘閣曰纘禹繼文之閣門曰銘功之門十月辛卯蔡京等言冀州河清乞拜表稱賀七年五月丁巳臣僚言恩州寧化鎮大河之側地勢低下正當灣流衝激之處歲久堤岸怯薄沁水透堤甚多近鎮居民例皆移避方秋夏之交時雨霈然一失堤防則不惟東流莫測所向一隅生靈所係甚大亦恐妨阻大名河間諸州往來邊路乞付有司貼築固護從之六月癸酉都水使者孟揚言舊河陽南北兩河分流立中灘繫浮梁頃緣北河淤澱水不通行止於南河修繫一橋因此河項窄狹水勢衝激每遇漲水多致損壞欲措置開修北河如舊修繫南北兩橋從之九月丁未詔揚專一措置而令河陽守臣王序營辦錢糧督其工料重和元年三月己亥詔滑州濬州界萬年堤全藉林木固護堤岸其廣行種植以壯地勢五月甲辰詔孟州河陽縣第一掃自春以來河勢湍猛侵嚙民田迫近州城止二三里其令都水使者同漕臣河陽守臣措置固護是秋雨廣武掃危急詔內侍王仍相度措置宣和元年九月辛未蔡京等言南丞管下三十五掃今歲漲水之後岸下一例生灘河行中道實由聖德昭格神祇順助望宣付史館詔送祕書省十二月開修兔源河並直河畢工降詔奬諭二年九月己卯王黼言昨孟昌齡計議河事至滑州韓村掃檢視河流衝至寸金潭其勢就下未易禦遏近降詔旨令就畫定港灣對開直河方議開鑿忽自成直河一道寸金潭下水即安流在役之人聚首仰嘆乞付史館仍帥百官表賀從之三年六月河溢冀州信都十一月河決清河掃是歲水壞天成聖功橋官吏行罰有差四年四月壬子都水使者孟揚言奉詔修繫三山東橋凡役工十五萬七千八百今纍經漲水無虞詔因橋壞失職降秩者俱復之揚自正議大夫轉正奉大夫七年欽宗即位靖康元年二月乙卯御史中丞許翰言保和殿大學士孟昌齡延康殿學士孟揚龍圖閣直學士孟揆父子相繼領職二十年過惡山積妄設堤防之功多張梢樁之數窮竭民力聚斂金帛交結權要內侍王仍為之奧主超付名位不知紀極大河浮橋歲一造舟京西之民猶憚其役而昌齡首建三山之策回大河之勢頓取百年浮橋之費僅為數歲行路之觀漂沒生靈無慮萬計近輔郡縣蕭然破殘所辟官吏計金績富商大賈爭注名牒身不在公遙分爵賞每興一役乾沒無數省部御史莫能鈎考陛下方將澄清朝著建立事功不先誅竄昌齡父子無以昭示天下望籍其姦贓以正典刑詔並落職昌齡在外宮觀揚依舊權領都水監職事揆候措置橋船畢取旨翰復請鈎考簿書發其姦贓乃詔昌齡與中大夫揚揆與中奉大夫三月丁丑京西轉運司言本路歲科河防夫三萬溝河夫一萬八千緣連年不稔羣盜菍掠民力困弊乞量數減放詔減八千人汴河自隋大業初疏通濟渠引黃河通淮至唐改名廣濟宋都大梁以孟州河陰縣南為汴首受黃河之口屬于淮泗每歲自春及冬常於河口均調水勢止深六尺以通行重載為準歲漕江淮湖浙米數百萬及至東南之産百物衆寶不可勝計又下西山之薪炭以輸京師之粟以振河北之急內外仰給焉故於諸水莫此為重其淺深有度置官以司之都水監總察之然大河向背不常故河口歲易易則度地形相水勢為口以逆之遇春首輒調數州之民勞費不資役者多溺死吏又並緣侵漁而京師常有決溢之虞太祖建隆二年春導索水自旃然與須水合入于汴三年十月詔緣汴河州縣長吏常以春首課民夾岸植榆柳以固堤防太宗太平興國二年七月開封府言汴水溢壞開封大寧堤浸民田害稼詔發懷孟丁夫三千五百人塞之三年正月發軍士千人復汴口六月宋州言寧陵縣河溢堤決詔發宋亳丁夫四千五百人分遣使臣護役四年八月又決于宋城縣以本州諸縣人夫三千五百人塞之淳化二年六月汴水決浚儀縣帝乘步輦出乾元門宰相樞密迎謁帝曰東京養甲兵數十萬居人百萬家天下轉漕仰給在此一渠水朕安得不顧車駕入泥淖中行百餘步從臣震恐殿前都指揮使戴興叩頭懇請回馭遂捧輦出泥淖中詔興督步卒數千塞之日未旰水勢遂定帝始就次太官進膳親王近臣皆泥濘沾衣知縣宋炎亡匿不敢出特赦其罪是月汴又決于宋城縣發近縣丁夫二千人塞之至道元年九月帝以汴河歲運江淮米五七百萬斛以濟京師問侍臣汴水疏鑿之由令參知政事張洎講求其事以聞其言曰禹導河自積石至龍門南至華陰東至砥柱又東至于孟津東過洛汭至于大伾即今成皋是也或云黎陽山也禹以大河流泛中國為害最甚乃於貝丘疏二渠以分水勢一渠自舞陽縣東引入漯水其水東北流至千乘縣入海即今黃河是也一渠疏畎引傍西山以東北形高敝壞堤水勢不便流溢夾右碣石入于渤海書所謂北過降水至于大陸降水即濁漳大陸則邢州巨鹿澤播為九河同為逆河入于海河自魏郡貴鄉縣界分為九道下至滄州今為一河言逆河者謂與河水往復相承受也齊桓公塞以廣田居唯一河存焉今其東界至莽梧河是也禹又於滎澤下分大河為陰溝引注東南以通淮泗至大梁浚儀縣西北復分為二渠一渠元經陽武縣中牟臺下為官渡水一渠始皇疏鑿以灌魏郡謂之鴻溝莨菪渠自滎陽五出池口來注之其鴻溝即出河之溝亦曰莨菪渠漢明帝時樂浪人王景謁者王吳始作浚儀渠蓋循河溝故瀆也渠成流注浚儀故以浚儀縣為名靈帝建寧四年於敖城西北壘石為門以遏渠口故世謂之石門渠外東合濟水濟與河渠渾濤東注至敖山北渠水至此又兼邲之水即春秋晉楚戰于邲邲又音汳即汴字古人避反字改從汴字渠水又東經滎陽北旃然水自縣東流入汴水鄭州滎陽縣西二十里三皇山上有二廣武城二城相去百餘步汴水自兩城間小澗中東流而出而濟流自茲乃絶唯汴渠首受旃然水謂之鴻渠東晉太和中桓溫北伐前燕將通之不果義熙十三年劉裕西征姚秦復浚此渠始有湍流奔注而岸善潰塞裕更疏鑿而漕運焉隋煬帝大業三年詔尚書左丞相皇甫誼發河南男女百萬開汴水起滎澤入淮千餘里乃為通濟渠又發淮南兵夫十餘萬開溝自山陽淮至于揚子江三百餘里水面闊四十步而後行幸焉自後天下利於轉輸昔孝文時賈誼言漢以江淮為奉地謂魚鹽穀帛多出東南至五鳳中耿壽昌奏故事歲增關東穀四百萬斛以給京師亦多自此渠漕運唐初改通濟渠為廣濟渠開元中黃門侍郎平章事裴耀卿言江淮租船自長淮西北泝鴻溝轉相輸納於河陰含嘉太原等倉凡三年運米七百萬石實利涉於此開元末河南採訪使汴州刺史齊浣以江淮漕運經淮水波濤有損遂浚廣濟渠下流自泗州虹縣至楚州淮陰縣北八十里合于淮踰時畢功既而水流迅急行旅艱險尋乃廢停却由舊河德宗朝歲漕運江淮米四十萬石以益關中時叛將李正己田悅皆分軍守徐州臨渦口梁崇義阻兵襄鄧南北漕引皆絶於是水陸運使杜佑請改漕路自浚儀西十里疏其南涯引流入琵琶溝經蔡河至陳州合潁水是秦漢故道以官漕久不由此故填淤不通若畎流培岸則功用甚寡又廬壽之間有水道而平岡亘其中曰雞鳴山佑請疏其兩端皆可通舟其間登陸四十里而已則江湖黔嶺蜀漢之粟可方舟而下由是白沙趨東關經廬壽浮潁步蔡歷琵琶溝入汴河不復經泝淮之險徑於舊路二千里功寡利博朝議將行而徐州順命淮路乃通至國家膺圖受命以大梁四方所湊天下之樞可以臨制四海故卜京邑而定都漢高帝云吾以羽檄召天下兵未至孝文又云吾初即位不欲出虎符召郡國兵即知兵甲在外也唯有南北軍期門郎羽林孤兒以備天子扈從藩衛之用唐承隋制置十二衛府兵皆農夫也及罷府兵始置神武神策為禁軍不過三數萬人亦以備扈從藩衛而已故祿山犯關驅市人而戰德宗蒙塵扈駕四百餘騎兵甲皆在郡國額軍存而可舉者除河朔三鎮外太原青社各十萬人邠寧宣武各六萬人潞徐荊揚各五萬人襄宣壽鎮海各二萬人自餘觀察團練據要害之地者不下萬人今天下甲卒數十萬衆戰馬數十萬匹並萃京師悉集七亡國之士民於輦下比漢唐京邑民庶十倍甸服時有水旱不至艱歉者有惠民金水五丈汴水等四渠派引脈分咸會天邑舳艫相接贍給公私所以無匱乏唯汴水橫亘中國首承大河漕引江湖利盡南海半天下之財賦並山澤之百貨悉由此路而進然則禹力疏鑿以分水勢煬帝開甽以奉巡游雖數湮廢而通流不絶於百代之下終為國家之用者其上天之意乎真宗景德元年九月宋州言汴河決浸民田壞廬舍遣使護塞踰月功就三年六月京城汴水暴漲詔覘候水勢並工修補增起堤岸工畢復遣使致祭大中祥符二年八月汴水漲溢自京至鄭州浸道路詔選使乘傳減汴口水勢既而水減阻滯漕運復遣浚汴口八年六月詔自今後汴水添漲及七尺五寸即遣禁兵三千沿河防護八月太常少卿馬元方請浚汴河中流闊五丈深五尺可省修堤之費即詔遣使計度修浚使還上言泗州西至開封府界岸闊底平水勢薄不假開浚請止自泗州夾岡用功八十六萬五千四百三十八以宿亳丁夫充計減功七百三十一萬仍請於沿河作頭踏道劈岸其淺處為鋸牙以束水勢使其浚成河道止用河清下卸卒就未放春水前令逐州長吏令佐督役自今汴河淤澱可三五年一浚又於中牟滎澤縣各置開減水河並從之天禧三年十二月都官員外郎鄭希甫言汴河兩岸皆是陂水廣浸民田堤腳並無流泄之處今汴河南省自明河接澳入淮望詔轉運使規度以聞仁宗天聖三年汴流淺特遣使疏河注口四年大漲堤危衆情恟恟憂京城詔度京城西賈陂岡地泄之于護龍河六年勾當汴口康德輿言行視陽武橋萬勝鎮宜存斗門其梁固斗門三宜廢去祥符界北岸請為別竇分減溢流而勾當汴口王中庸欲增置孫村之石限悉從其請七年德輿言修河芟地為並灘農戶所侵詔限一月使自實檢括以還縣官皇祐二年命使詣中牟治堤明年八月河涸舟不通令河渠司自口浚治歲以為常舊制水增七尺五寸則京師集禁兵八作排岸兵負土列河上以防河滿五日賜錢以勞之曰特支而或數漲數防又不及五日而罷則軍士屢疲而賜豫不及是歲七月始制防河兵日給錢薄其數才比特支十分之一軍士便之明年遣使行河相利害嘉祐六年汴水淺澀常稽運漕都水奏河自應天府抵泗州直流湍駛無所阻惟應天府上至汴口或岸闊淺漫宜限以六十步闊於此則為木岸狹河扼束水勢令深駛梢伐岸木可足也遂下詔興役而衆議以為未便宰相蔡京奏祖宗時已嘗狹河矣俗好沮敗事宜勿聽役既半岸木不足募民出雜梢岸成而言者始息舊曲灘漫流多稽留覆溺處悉為駛直平夷操舟往來便之神宗熙寧四年創開訾家口日役夫四萬饒一月而成才三月已淺澱乃復開舊口役萬工四日而水稍順有應舜臣者獨謂新口在孤柏嶺下當河流之衝其便利可常用勿易水大則泄以斗門水小則為輔渠於下流以益之安石善其議五年先是宣徽北院使中太一宮使張方平嘗論汴河曰國家漕運以河渠為主國初浚河渠三道通京城漕運自後定立上供年額汴河斛斗六百萬石廣濟河六十二萬石惠民河六十萬石廣濟河所運止給太康咸平尉氏等縣軍糧而已惟汴河專運粳米兼以小麥此乃太倉蓄積之實今仰食于官廩者不惟三軍至于京師士庶以億萬計太半待飽于軍稍之餘故國家於漕事至急至重然則汴河乃建國之本非可與區區溝洫水利同言也近歲已罷廣濟河而惠民河斛斗不入太倉大衆之命惟汴河是賴今陳說利害以汴河為議者多矣臣恐議者不已屢作改更必致汴河日失其舊國家大計殊非小事願陛下特回聖鑒深賜省察留神遠慮以固基本方平之言為王安石發也六年夏都水監丞侯叔獻乞引汴水淤府界間田安石力主之水既數放或至絶流公私重舟不可蕩有閣折者帝以人情不安嘗下都水分析並詔三司同府界提點官往視十一月范子奇建議冬不閉汴口以外江綱運直入汴至京廢運般安石以為然詔汴口官吏相視卒用其說是後高麗入貢令泝汴赴闕七年春河水壅溢積潦敗堤八月御史盛陶謂汴河開兩口非便命同判都水監宋昌言視兩口水勢檄同提舉汴口官王珫珫言訾家口水三分輔渠七分昌言請塞訾家口而留輔渠時韓絳呂惠卿當國許之八年春安石再相叔獻言昨疏濬汴河自南京至泗州概深三尺至五尺惟虹縣以東有礓石三十里餘不可疏濬乞募民開修詔檢計工糧以聞七月叔獻又言歲開汴口作生河侵民田調夫役今惟用訾家口減人夫物料各以萬計乞減河清一指揮從之未幾汴水大漲至深一丈二尺於是復請權閉汴口九年十月詔都水度量疏濬汴河淺深仍記其地分十年范子淵請用濬川杷以六月興工自謂功利灼然請候今冬疏濬畢將杷具舟船等分給逐地分使臣於閉口之後檢量河道淤澱去處至春水接續疏導大抵皆無甚利已而清汴之役興
