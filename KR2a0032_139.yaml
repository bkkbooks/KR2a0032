body:
  text: 宋史卷一百三十九志第九十二樂十四樂章八恭上皇帝皇太后尊號下冊立皇后冊皇太子皇子冠鄉飲酒聞喜宴鹿鳴宴紹熙元年恭上壽聖皇太后至尊壽皇聖帝壽成皇后尊號冊寶十四首大慶殿發冊寶降殿正安帝受內禪紀元紹熙欽崇慈親孝心肅祗迺建顯號迺蕆丕儀發冊廣庭聲歌侑之中書令侍中奉三宮冊寶詣東階下用禮安鐘鼓交作文物咸備彤庭玉階天子是莅咨爾輔臣展采錯事輔臣稽首敢不率禮冊寶出門正安巍巍天宮洞開閶闔旗常葳蕤劍佩雜沓寶冊啟行法駕繼發鑠哉盛典快覩胥悅冊寶入重華宮正安仰止皇居九門載闢麗日重光非煙五色雷動萬乘雲從百辟咫尺重霄鞠躬屏息至尊壽皇聖帝升坐乾安降同玉璽瑤編禮容畢具穆穆至尊華殿是御德配有虞紹唐授禹於萬斯年受天之祜太傅中書令奉至尊壽皇聖帝冊升殿用聖安慈皇天臨睟表怡怡欽哉聖子親奉玉巵鼇抃嵩呼歡浹華夷邇臣捧冊是恪是祗太傅侍中奉至尊壽皇聖帝寶升殿用聖安瑟彼華玉篆魚鈕龍與冊並登咨爾上公詠以歌詩協之鼓鐘是陟是降靡有弗恭太傅中書令侍中奉壽聖皇太后冊寶升殿用聖安天祐皇家慶集重闈寶兮揚名冊兮流徽金支秀華盛容祲威詔我近弼相禮不違太傅中書令侍中奉壽成皇后冊寶升殿用聖安大哉乾元既極形容坤元德至實與比隆寶冊並登勒崇垂鴻相我縟儀肅肅雍雍皇帝從壽聖皇太后冊寶詣慈福宮用正安涓辰協吉時維春元上冊三殿曠古無前思齊重闈積慶有源是尊是崇帝心載虔壽聖皇太后出閤升坐坤安降同丕赫有宋三聖授受誰其助之繄我太母東朝受冊飲此春酒聖子神孫密侍左右內侍官舉壽聖皇太后冊寶詣讀冊寶位用聖安坤德益崇天壽平格慶流萬世子孫千億刻玉範金鋪張赫奕惟昔姜任則莫我匹皇帝詣壽成殿壽成皇后出閤升坐坤安降同鞠育保護母道備矣密贊親傳德其至矣綵服來朝慈容有喜既受鴻名又多受祉內侍官舉壽成皇后冊寶詣讀冊寶位用聖安仰瞻慈闈登進寶冊惟時御祗率厥職曰壽曰名母兮兼得儷我尊父億載無極紹熙四年加上壽聖皇太后尊號八首大慶殿發冊寶降殿正安德厚重闈沖澹粹穆何以名之惟慈惟福寶鏤精鏐冊鐫華玉物盛禮崇丕昭羣目中書令侍中奉壽聖皇太后冊寶詣東階下禮安於皇帝室休運貽孫重熙疊慶祗進號榮爰授茲冊必躬必親天子聖孝萬邦儀刑冊寶出門正安煌煌冊寶天子受之言徐其行肅展迺儀其儀維何劍佩黃麾鸞駕清蹕聳瞻九逵冊寶入慈福宮殿門正安熙辰禮備濟濟雍雍言奉斯冊重親之宮宮帷既敞協氣感通皇儀親展壽祉無窮太傅中書令侍中奉壽聖皇太后冊寶升殿聖安既肅琨庭載升金戺迺導迺陪威儀濟濟天步繼臨孝誠備矣聲容孔昭中外悅喜冊寶詣宮中正安琱輿彩仗祗詣慈宮寶冊前奉龍挾雲從言備茲禮于宮之中惟天子孝於昭祲容壽聖皇太后出閤升御坐坤安降同懿典大冊陳儀邃深怡怡愉愉寶坐是臨重綵儼侍展肅心三宮協慶永播徽音內侍官舉壽聖皇太后冊寶詣讀冊寶位用聖安寶冊既奉祗誦迺言仁深慶衍益顯益尊和聲協氣充溢乾坤並受伊嘏聖子神孫慶元二年恭上太皇太后皇太后太上皇帝太上皇后尊號二十四首冊寶降殿天擁帝家澤流子孫三宮燕胥四海崇尊聲諧韶濩輝燭瑤琨維皇緝熙耀德乾坤冊寶授太傅奉詣東階下祖后重壽親闈並崇駢慶聯休申景鋪鴻疊璧交輝多儀煥叢億萬斯年福祿攸同冊寶出門太任媚姜塗山翼禹慈祥曼衍鴻儀迭舉寶章奕奕祲宮俁俁帝用將之于彼宮所慈福宮寶冊入門東朝層邃端闈靖深列仗節鑾鏤玉繩金來奉來崇載祗載欽曾孫之慶世世徽音冊寶升殿純佑我宋母儀四朝擁翼孫謀如虞承堯仁覃函夏喜浮慶霄福祿萬年金玉孔昭冊寶詣宮中神人和懌天日淑清王母來燕必壽而名琨庭璈音五雲佩聲勉勉我皇遹昭厥成太皇太后出閤升坐曾孫致養五福駢臻太極所運兩儀三辰輝光日新啟佑後人永翼瑤圖億萬堯春冊寶詣讀冊寶位徽光宣華仁聲流文曠儀合沓泰和絪縕慈顏有喜祚我聖君珠宮含飴坐閱來雲太皇太后降坐歸閤縟儀既登寶冊既膺喜洽祥流雲烝川增天子萬年鳴玉慈庭惠我無疆詵詵繩繩壽慈宮冊寶入門新庭靖安祖后燕怡有開聖謀累崇天基典章文明聲容葳蕤御于邦家曰壽曰慈冊寶升殿三禮崇容八鑾警衞有來辰儀闡徽媯汭璇宮肅雍藻景澄霽文子文孫本支百世冊寶詣宮門堯門疊瑞姒幄齊輝重坤靖夷麗冊華徽天子仁聖禮文弗違福壽康寧同燕層闈皇太后出閤升坐文母曼壽載錫之光總集瑞命宜君宜王惠以仁顯慈以德彰保佑子孫受福無疆冊寶詣讀冊寶位華鸞編玉文螭液金頌德摛英揚徽嗣音紫幄天開翠華日臨歲歲年年如周太任皇太后降坐歸閤宋有明德天保佑之以壽繼壽以慈廣慈聲文宣昭福祉茂綏神孫之休燕及華夷壽康宮冊寶入門正安大安耽耽興慶崇崇維皇之尊與天比隆非心閒燕文命延鴻欲報之恩禮縟儀豐太上皇帝升御坐乾安上帝有赫百靈效祥儲祉垂恩錫年降康皇儀睟溫帝躬肅莊三宮齊懽地久天長太上皇帝冊寶升殿聖安夏典稽瑞禹玉含淳追琢有章溫潤孔純聖底于安壽綿於仁太上立德自天其申太上皇后冊寶升殿聖安父尊母親天涵地育燕我翼子景命有僕得名得壽如金如玉子孫千億成其厚福太上皇帝降御坐乾安天地清寧日月華光歸尊慈極嵩呼未央慶函百嘉壽躋八荒上皇萬歲俾熾俾昌冊寶詣宮中正安晨趨慈幄佳氣鬱蔥受帝之祉配天其崇璧華金精禮敷樂充天子是若懽聲融融太上皇后出閤升坐坤安文物流彩鑾輅靖陳龜瑞薦祉坤儀效珍比皇之壽翼帝以仁和氣致祥與物為春讀冊寶聖安黼黻其文金玉其相永壽於萬合德無疆福緒祥源厥後克昌天維格斯祚我聖皇太上皇后降坐歸閤坤安榮懷之慶莫盛於斯三宮四冊五葉一時德阜而豐福大而滋子子孫孫于時保之嘉泰二年恭上太皇太后尊號八首冊寶降殿思齊太任嬪于周京至哉坤元萬物資生不可儀測矧可強名鏤玉繩金昭哉號榮冊寶詣東階鼓鐘喤喤儀物載陳儀物陳矣爛其瑤琨咨爾上公相予文孫勿亟勿徐奉我重親冊寶出門蕩蕩天門金鋪玉戶采旄翠旌流蘇葆羽千官影從迺導迺輔都人縱觀填道呼舞壽慈宮冊寶入門煌煌寶書玉篆金縷曷為來哉自天子所自天子所以燕文母婉嬗祥雲日正當午冊寶升殿文物備矣三事其承崇牙高張樂充宮庭耽耽廣殿左墄右平敬爾威儀攝齊以登冊寶詣宮中維壽伊何聖德日新維慈伊何祐于後人迺范斯金迺鏤斯珉皇舉玉趾從于堯門太皇太后升御坐降同侍中版奏辦外嚴中出自玉房褘褕被躬我龍受之祲威盛容皇帝聖孝其樂融融冊寶詣讀冊寶位麟趾褭蹄我寶斯刻磩采緻載備斯冊眉壽萬年詒謀燕翼於赫湯孫克綿永福紹定三年壽明仁福慈睿皇太后冊寶九首文德殿冊寶降殿思齊聖母于周任體乾履坤博厚洪深七袠既啟萬壽自今昕庭發號式昭德音冊寶詣東階煌煌儀物繹繹鼓鐘奉茲寶冊至于階東上公相儀列辟盡恭拜手慈宸福如華嵩冊寶出門帝闕肅開天階坦履霓旌羽蓋導儀護衞匪誇雕瑑匪矜繁麗茲謂盛儀億載千歲慈明殿冊寶入門金堅玉純文郁禮縟來從帝所作瑞王國天開地闢日熙春燠茲謂盛事永燕茀祿冊寶升殿皇儀有煒綵舁次升沈沈邃殿穆穆天廷坤德隆皇圖永寧咨爾廷臣攝齊以登冊寶詣宮中壽為福先明燭物表仁沾動植福齊穹昊曰慈與睿並崇丕號演而申之萬世永保皇太后升御坐邇臣跪奏嚴辦必恭乃御褘褕升于殿中慈顏雍穆和氣沖融芳流清史傳之無窮冊寶詣讀冊寶位徽音孔昭寶傳斯刻金昭玉粹有燁斯冊載祈載祝以燕以翼寶之萬年與宋無極皇太后降御坐皇文既舉慶禮告虔肇自宮闈格于幅員子稱母壽母謂子賢陟降在茲隆名際天哲宗發皇后冊寶三首皇帝升坐乾安既登乃依如日之升有嚴有翼丕顯丕承天作之合家邦其興朱芾斯皇子孫繩繩降坐乾安我禮嘉成我駕言旋降坐而蹕奏鼓淵淵景命有僕保佑自天永錫祚嗣何千萬年太尉等奉冊寶出入正安宣哲維公就位肅莊冊寶具舉丕顯其光出于宸闈鼓鐘喤喤母儀天下萬壽無疆紹興十三年發皇后冊寶十三首皇帝升坐乾安天地奠位乾坤以分夫婦有別父子相親聖王之治禮重婚姻端冕從事是正大倫使副入門正安天子當陽羣工就列冊寶既陳鐘鼓備設上公奉事容莊心協克相盛禮光昭玉牒冊寶出門正安穆穆睟容如天之臨赫赫明命如玉之音虔恭出門禮容兢兢塗山生啟夏道以興皇帝降坐乾安朝陽已升薰風習至樂奏既成禮容亦備玉佩鏘鳴帝徐舉趾壼政穆宣以聽內治皇后出閤乾安猗歟賢后德本性成承天致順遡日為明作配儷極王化以行萬有千歲奉祀宗祊冊寶入門宜安款承祗事時惟肅雍跪奉冊寶陳于法宮以俯以仰有儀有容明神介之福祿來崇皇后降殿承安溫惠之德褘翟之衣行中采薺禮無或違降于丹陛有容有儀委委蛇蛇誰其似之皇后受冊寶成安鏤蒼玉兮盛德載揚鑄南金兮作鎮椒房虔受賜兮有燁有光宜室家兮朱芾斯皇皇后升坐和安禮既行兮厥位孔安母儀正兮容止可觀奉東朝兮常得其歡求淑女兮豈樂多般內命婦入門惠安素月澄輝衆星顯列炳為天文各有攸別椒房既正陰教斯設關雎麟趾應如響捷外命婦入門成安窈窕其容淑嫕其姿爛其如雲瞻我母儀曰天之妹作合惟宜粲然舞抃疇不肅祗皇后降坐徽安寶字煌煌冊書粲粲副笄加飾褘褕有爛祗若帝休委蛇樂衎億萬斯年永膺宸翰皇帝歸閤泰安太任徽音太姒是嗣則百斯男周室以熾天子萬年受茲女士如姒事任從以孫子淳熙三年發皇后冊寶十三首皇帝升坐乾安赫赫惟皇如日之光肅肅惟后如月之常禮行一時明照無疆天子莅止疇敢不莊冊寶入門正安卜月惟良練辰斯臧臣工在庭劍佩瑲瑲來汝疑丞明命是將有淑其儀無或怠遑冊寶出門正安刻簡以珉鑄寶以金持節伊誰時惟四鄰自我文德達之穆清委蛇委蛇往迄于成皇帝降坐乾安冊行何曏于門東偏禮備樂成合扇鳴鞭皇舉玉趾如天之旋燕及家邦億萬斯年皇后出閤坤安椒塗蘭馭河潤山容副笄在首褘衣被躬靜女其姝實翼實從自彼西閤聿來殿中冊寶入門宜安德隆位尊禮厚文縟乃篆斯金乃鏤斯玉羣公盈門執事有肅願言保之永鎮坤軸皇后降殿承安規殿沉沉叶氣旼旼明章婦順表正人倫躡是左墄暨于中庭尚宮顯相罔有弗欽皇后受冊寶成安備物典冊樂之鼓鐘拜而受之極其肅雍司言司寶各以職從行地有慶與天無窮皇后升坐和安容典既膺壼儀既正羽衞外列揚顏中映如帝如天以莊以靚六宮承式二南流詠內命婦入門惠安葛覃節用樛木逮下形為嬪則夙已心化茲臨長秋遂正諸夏以慶以祈百祥來迓外命婦入門咸安碩人其頎公侯之妻翟茀以朝象服是宜如星之共遡月之輝母儀既瞻羣心則夷皇后降坐徽安窈窕淑女備六服兮陟降多儀聳羣目兮內治允備陰教肅兮宜君宜王綏有福兮皇后歸閤泰安天監有周是生太任亦有太姒嗣其徽音孰如兩宮慈愛相承思齊之盛復見于今淳熙十六年皇后冊寶十三首皇帝升坐乾安乾位既正坤斯順承日麗于天月斯遡明惟帝受命惟帝並登黼扆尊臨典冊是行冊寶入門正安迺協良辰維春之宜迺詔近弼來汝相儀九門洞開文物華輝聲詩載歌于以侑之冊寶出門正安有璽範金有冊鏤瓊汝使汝介持節以行禮始文德達于穆清是恪是虔依我和聲皇帝降坐乾安鼓鐘喤喤磬筦鏘鏘劍佩充庭濟濟洋洋禮典告備皇心樂康於萬斯年受福無疆穆清殿受冊寶皇后出閤坤安懿範柔容如月斯輝駕厥翟輅被以褘衣九御從之如雲祁祁典冊是承心焉肅祗冊寶入門宜安華榱璧璫有馨椒殿備物來陳多儀式煥曰冊曰寶是刻是瑑並舉以行皇矣懿典皇后降殿承安褘褕盛服有恪其容是陟是降相以尚宮金殿玉階聿來于中展詩應律載詠肅雍皇后受冊寶成安帝有顯命稟于親慈后德克承拜而受之人倫既正王化是基億載萬年永祚坤儀皇后升坐和安帝慶三宮膺受寶冊御于中闈載欣載惕迺孚陰教迺明內則翼翼魚貫罔不承式內命婦入門惠安掖庭頒官于位有四嘒彼小星撫以德惠熙焉如春育焉如地慶禮聿成靡弗咸喜外命婦入門咸安魚軒鼎來象服是宜班于內庭率禮惟祗化以婦道時惟母儀是慶是類于胥樂兮皇后降坐徽安正位長秋容典備矣王假有家人倫至矣儷極俔天多受祉矣蟄蟄螽斯宜孫子矣皇后歸閤泰安維天佑宋盛事相仍崇號三宮甫茲浹辰肇正中闈縟禮載陳邦家之慶曠古無倫皇帝升坐乾安乾健坤順羣生首資日常月升四時叶熙帝嗣天歷后崇母儀黼黻承暉王化是基使副入門正安熛闕蟺蜎璧門雲龍烈文維輔翊奉有容典章煇明彝度肅雍蕆時縟儀登于璿宮冊寶出門正安金晶麗輝璧葉含春贊夏之翼繹虞之嬪樂序韶亮禮文藻新辟公相成物采彬彬皇帝降坐乾安帟旒雲舒金秀充庭璇衞鑾華蒨佩垂皇容熙備柔儀順承三宮齊懽萬福昭膺皇后出閤坤安驂翟崇容褘鞠陳衣戾止蘭殿夙興椒闈淑正宣華粹明騰煇欽若有承嗣音之徽冊寶入門宜安褘帟流光沙祥增衍編玉鏤德螭金溢篆粹猷藻黻徽文華顯二南聲詩于時昭闡皇后降殿承安翬珩煥采趨節風韶陟降墄陛奉將英瑤辟道承薰嬪儀揚翹是敬是祗德音孔昭皇后受冊寶成安帝奉太室后儀成之帝養三宮后志承之德如關雎盛如螽斯宜君宜王百世本支皇后升坐和安肅肅壼彝雍雍陰教險詖自防警戒是傚中闈端委列御胥告其思輔順永翼帝孝內命婦入門惠安天子九嬪王宮六寢有燁令儀載秩華品福履綏將節用躬儉矢其德音于以來諗外命婦入門咸安象服之文鵲巢之風化以婦道覲于內宮采蘋澗濱采藻澗中夙夜在公贊彼累功皇后降坐和安光佑晏寧惠慈燕喜壽仁並崇家邦均祉懿文交舉壼冊嗣美維億萬年愛敬惟似皇后歸閤泰安天心仁佑坤德世昭灼有慈範著于累朝儉以贊虞勤以承堯是用則傚共勵夙宵嘉泰三年皇后冊寶十三首皇帝升坐乾安茂建坤極容典聿新天命所贊慈訓是遵肅涓穀旦躬御紫宸鴻禧累福駢賚翕臻使副入門正安端門曉闢瑞氣雲凝有儼良輔踵武造廷肅肅王命是將是承登冊穆清萬歲永膺冊寶出門正安瑤冊玉寶爛然瑞輝旁翼絳節上承紫微璆鳴朝佩徐出獸扉登進坤極益彰典徽皇帝降坐乾安天臨黼扆雲集弁纓金石遞奏典禮備成玉趾緩步龍駕翼行言旋北極永燕西清皇后出閤乾安日薰椒屋雲靄璧門有華瑞節來自帝閽統天惟乾合德者坤我龍受之福祿永繁冊寶入門宜安虹輝燦爛雲篆綢繆絳節前導瑞光上浮瑤階玉扉既集長秋欽承天寵永荷帝休皇后降殿承安瑤殿清閟玉墄坦夷褘衣副珈陟降不遲寶冊聿至載肅載祗禮儀昭備福履永綏皇后受冊寶成安日月臨燭乾坤覆持明並二曜德合兩儀光媲宸極共恢化基膺受茂典億載永宜皇后升坐和安寶璽瑤冊既祗既承繡裀藻席載躋載升柔儀肅穆瑞命端凝永膺多福如川方增內命婦入門惠安服煥盛儀班分華緻九嬪婦職六寢內治參差荇菜求勤寤寐烝然來思相禮贊祭外命婦入門咸安婦榮於室通籍禁中班列有次車服有容佐我關雎鵲巢之風被之僮僮曷不肅雍皇后降坐徽安金石具舉典禮茂明淑慎其止遹觀厥成瓊琚微動鳳輦翼行儀光媲極德邁嬪京皇后歸閤泰安寶坐既興鳳輿戒行奏解嚴辦歸燕邃清問安壽慈奉齍宗祊彌千萬年內助聖明嘉定十五年皇帝受恭膺天命之寶三首恭膺天命之曲太蔟宮我祖受命恭膺于天爰作玉寶載祗載虔申錫無疆神聖有傳昭茲興運於萬斯年舊疆來歸之曲太蔟宮於穆我皇之德之純涵濡羣生矧我遺民連齊跨晉輸貢效珍土宇日闢一視同仁永清四海之曲太蔟宮我祖我宗德厚澤深於皇繼序益單厥心天人協扶一統有臨乾坤清夷振古斯今至道元年冊皇太子二首太子出入正安主鬯之重允屬賢明承華肇啟上嗣騰英禮修樂舉育德開榮一人元良萬邦以寧羣臣稱賀正安皇儲既建聖祚無疆鸞旌列雞戟分行前星有爛瑞日重光際天接聖溫文允臧天禧三年冊皇太子一首太子出入明安明離之象少陽之位固邦為本體天作貳儀範克溫禮章斯備丕宣令猷恭守宗器乾道元年冊皇太子四首皇帝升坐乾安宋受天命聖緒無疆惟懷永圖乃登元良涓選休辰冊書是將黼坐天臨穆穆皇皇太子入門明安於維皇儲玉潤金聲體震之洊重離之明冊寶具舉環佩鏘鳴守器承祧惟邦之榮太子出門明安樂備既奏和聲沖融玉簡金書翔鸞戲鴻下拜登受旋于青宮儀辰作貳垂休無窮皇帝降坐乾安我禮備成我駕言旋降坐而蹕奏鼓淵淵國本既定保佑自天克昌厥後何千萬年乾道七年冊皇太子四首皇帝升坐乾安建儲以賢闢宮于東典冊既備筮占既從濟濟卿士鏘鏘鼓鐘天子戾止盛哉禮容太子入門明安琱珉瑳瑳篆金煌煌對揚于庭是承是將星重其暉日重其光觀瞻以懌國有元良太子出門明安淵中象德玉裕凝姿進退周旋有肅其儀既定國本益隆慶基燕及兩宮福祿如茨皇帝降坐乾安儲副豫定器之公兮冊授孔時禮之隆兮天步遲遲旋九重兮壽祉萬年德無窮兮嘉定二年冊皇太子四首皇帝升坐於皇我宋受命于天升儲主鬯衍慶卜年典冊告備庭工載虔萬乘莅止端冕邃延太子入門受冊寶太極端御少陽肅祗珉簡斯鏤袞服孔宜式奏備樂迺陳盛儀下拜登受永言保之太子受冊寶出門明兩承曜作貳宣猷茂德金昭令譽川流豫定厥本永貽迺謀三朝致養問寢龍樓皇帝降坐震洊體象我儲明兮渙揚顯冊我禮成兮大駕言旋警蹕鳴兮燕祉無疆邦之榮兮寶祐二年皇子冠二十首皇帝將出文德殿隆安於皇帝德乃聖乃神本支百世立愛惟親敬共冠事以明人倫承天右序休命用申賓贊入門祗安豐艹巳詒謀建爾元子揆禮儀年筮賓敬事八音克諧嘉賓至止于以冠之成其福履賓贊出門祗安禮國之本冠禮之始賓升自西維賓之位于著於阼維子之義厥惟欽哉敬以從事皇帝降坐隆安路寢闢門黼坐恭己羣公在庭所重維禮正心齊家以燕翼子於萬斯年王心載喜皇子初行有來振振月重輪兮瑜玉在佩綦組明兮左徵右羽德結旌兮步中采薺矩彠循兮賓贊入門我有嘉賓直大以方亦既至止厥德用光冠而字之厥義孔彰表𩹉純備黃耉無疆皇子詣受制位吉圭休成其日南至天子有詔冠爾皇嗣為國之本隆邦之禮拜而受之式共敬止皇子升東階茲惟阼階厥義有在歷階而升敬謹將冠經訓昭昭邦儀粲粲正纚賓筵壽考未艾皇子升筵秩秩賓筵籩豆孔嘉帝子至止衿纓振華周旋陟降禮行三加成人有德匪驕匪奢初加帝子惟賢懋昭厥德跪冠于房玄冠有特鼓鐘喤喤威儀抑抑百禮既洽祚我王國初醮有賓在筵有尊在戶磬管將將醮禮時舉跪觴祝辭以永燕譽寶祚萬年磐石鞏固再冠復爻肇祥震維標德乃共皮弁其儀不忒體正色齊維民之則璇霄眷佑國壽箕翼再醮冠醮之義匪酬匪酌于戶之西敬共以恪金石相宣冠醮相錯帝祉之受施及家國三加善頌善禱三加彌尊爵弁介珪溫溫陽德方長成德允存燕及君親厥祉孔蕃三醮席于賓階禮義以興受爵執爵多福以膺匪惟服加德加愈升匪惟德加壽加愈增皇子降命服煌煌跬步中度慶輯皇闈化行海宇禮具樂成惕若戒懼寶璐厥躬有秩斯祜朝謁皇帝將出皇王烝哉令聞不已燕翼有謀冠醮有禮百僚在庭遹相厥事頌聲所同嘉受帝祉皇子再拜青社分封前星啟燄繁弱綏章厥光莫揜容稱其德蓄學之驗芳譽敷華大圭無玷皇子退玄袞黼裳垂徽永世勉勉成德是在元子胙土南賓厥旨孔懿充一忠字作百無愧皇帝降坐愛始於親聖盡倫兮元子冠字邦禮成兮天步舒徐皇心寧兮家人之吉億萬春兮淳化鄉飲酒三十三章鹿鳴呦呦命侶與儔宴樂嘉賓既獻且醻獻醻有序休祉無疆展矣君子邦家之光鹿鳴呦呦在彼中林宴樂嘉賓式昭德音德音愔愔既樂且湛允矣君子實慰我心鹿鳴呦呦在彼高岡宴樂嘉賓吹笙鼓簧幣帛戔戔禮儀蹡蹡樂只君子利用賓王鹿鳴相呼聚澤之蒲我樂嘉賓鼓瑟吹竽我命旨酒以燕以娛何以贈之玄纁粲如鹿鳴相邀聚場之苗我美嘉賓令名孔昭我命旨酒以歌以謠何以置之大君之朝鹿鳴相應聚山之荊我燕嘉賓鼓簧吹笙我命旨酒以逢以迎何以薦之揚于王庭右鹿鳴六章章八句瞻彼南陔時物嘉良有泉清泚有蘭馨香晨飲是汲夕膳是嘗慈顏未悅我心靡遑嬉嬉南陔眷眷慈顏和氣怡色奉甘與鮮事親是宜事君是思虔勖忠孝邦家之基右南陔二章章八句洋洋嘉魚佇以美罛君子有道嘉賓式燕以娛洋洋嘉魚佇以芳罟君子有德嘉賓式歌且舞我有宮沼龜龍擾之君子有禮嘉賓式貴表之我有宮藪麟鳳來思君子有樂嘉賓式慰勤思相彼嘉魚爰縱之壑我有旨酒嘉賓式燕以樂相彼嘉魚在漢之梁我有旨酒嘉賓式燕以康森森喬木美蔓縈之我有旨酒嘉賓式燕宜之喈喈黃鳥載飛載止我有旨酒嘉賓式燕且喜右嘉魚八章章四句崇丘動植斯屬高既自遂大亦自足和風斯扇膏雨斯沐我仁如天以亭以育崇丘巍巍動植其依高大之性各極爾宜王道坦坦皇猷熙熙仁壽之域烝民允躋右崇丘二章章八句關雎于飛洲渚之湄自家刑國樂且有儀郁郁芳蘭幽人擷之溫溫恭人哲后求之求之無斁寤寐所屬罄爾一心受天百祿郁郁芳蘭雨露滋之溫溫恭人圭組縻之郁郁芳蘭佩服珍之溫溫恭人福履綏之關雎蹌蹌集水之央好求賢輔同揚德光蘋蘩芳滋同誰掇之願言賢德靡日不思偶其賢德輔成己職永配玉音服之無斁潔其粢盛中心匪寧薦於宗廟助君德馨賢淑來思人之表儀風化天下何樂如之右關雎十章章四句彼鵲成巢爾類攸處之子有歸瓊瑤是祖彼鵲成巢爾類攸匹之子有行錦繡是飾彼鵲成巢爾類攸共之子有從蘭蓀是奉伊鵲成巢珍禽戾止婉彼佳人配于君子伊鵲營巢珍禽攸處內助賢侯弼于明主伊鵲營巢珍禽輯睦均養嘉雛致于蕃育右鵲巢六章章四句大觀聞喜宴六首狀元以下入門正安多士濟濟于彼西雍欽肅威儀亦有斯容烝然來思自西自東天畀爾祿惟王其崇初舉酒賓興賢能明明天子率由舊章思樂泮水光于四方薄采其芹用賓于王我有好爵寘彼周行再酌於樂辟雍樂只君子式燕又思服其命服攝以威儀鐘鼓既設一朝醻之德音是茂邦家之基三酌樂育英才聖謨洋洋綱紀四方烝我髦士觀國之光遐不作人而邦其昌以燕天子萬壽無疆四酌樂且有儀我求懿德烝然來思籩豆靜嘉式燕綏之溫溫其恭莫不令儀追琢其章髦士攸宜五酌正安思皇多士揚于王庭鐘鼓樂之肅雝和鳴威儀抑抑既安且寧天子萬壽永觀厥成政和鹿鳴宴五首初酌酒正安思樂泮水承流辟雍思皇多士賁然來從雝雝濟濟四方攸同登于天府維王是崇再酌樂育人才鐘鼓皇皇磬筦鏘鏘登降維時利用賓王髦士攸宜邦家之光媚于天子事舉言揚三酌賢賢好德鳴鹿呦呦載弁俅俅烝然來思旨酒思柔之子言邁泮渙爾游于彼西雍對揚王休四酌烝我髦士首善京師灼于四方烝我髦士金玉其相飲酒樂曲吹笙鼓簧勉戒徒御觀國之光五酌利用賓王遐不作人天下喜樂何以況之鳶飛魚躍既勸之駕獻酬交錯利用賓王縻以好爵
