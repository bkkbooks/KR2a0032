元曆細行此夕熒惑當退軫宿乃順行今止到角宿即順行得非曆差否奏曰今夕一鼓占熒惑在軫末角初順行也據曆法今月甲寅至軫十六度乙卯順行驗天差二度臣占熒惑明潤軌道兼前歲逆出太微垣按曆法差疾者八日此皆上天祐德之應非曆法之可測也至道元年昭晏又上言承詔考驗司天監丞王睿雍熙四年所上曆以十八事按驗所得者六所失者十二太宗嘉之謂宰相曰昭晏曆術用功考驗否臧昭然無隱由是賜昭晏金紫令兼知曆算二年屯田員外郎呂奉天上言按經史年曆自漢魏以降雖有編聯周秦以前多無甲子太史公司馬遷雖言歲次詳求朔閏則與經傳都不符合乃言周武王元年歲在乙酉唐兵部尚書王起撰五位圖言周桓王十年歲在甲子四月八日佛生常星不見又言孔子生於周靈王庚戌之歲卒於周悼王四十一年壬戌之歲皆非是也馬遷乃古之良史王起又近世名儒後人因循莫敢改易臣竊以史氏凡編一年則有一十二月月有晦朔氣閏則須與歲次合同苟不合同何名歲次本朝文教聿興禮樂咸備惟此一事久未刊詳臣探索百家用心十載乃知唐堯即位之年歲在丙子迄太平興國元年亦在丙子凡三千三百一年矣虞夏之間未有甲子可證成湯既沒太甲元年始有二月乙丑朔旦冬至伊尹祀于先王至武王伐商之年正月辛卯朔二十有八日戊午二月五日甲子昧爽又康王十二年六月戊辰朔三日庚午朏王命作冊畢自堯即位年距春秋魯隱公元年凡一千六百七年從隱公元年距今至道二年凡一千七百一十五年從太甲元年距今至道二年凡二千七百三十二年從魯莊公七年四月辛卯夜常星不見距今至道二年凡一千六百八十一年從周靈王二十年孔子生其年九月庚戌十月庚辰兩朔頻食距今至道二年凡一千五百四十五年從魯哀公十六年四月乙丑孔子卒距今至道二年凡一千四百七十二年以上並據經傳正文用古曆推校無不符合乃知史記及五位圖所編之年殊為闊略諸如此事觸類甚多若盡披陳恐煩聖覽臣耽研既久引證尤明起商王小甲七年二月甲申朔旦冬至自此之後每七十六年一得朔旦冬至此乃古曆一蔀每蔀積月九百四十積日二萬七千七百五十九率以為常直至春秋魯僖公五年正月辛亥朔旦冬至了無差爽用此為法以推經傳縱小有增減抑又經傳之誤皆可以發明也古曆到齊梁以來或差一日更用近曆校課亦得符合伏望聖慈許臣撰集不出百日其書必成儻有可觀願藏祕府詔許之書終不就又司天冬官正楊文鎰上言新曆甲子請以百二十年事下有司以其無所依據議寢不行太宗曰支干相承雖止於六十儻再周甲子成上壽之數使期頤之人得見所生之年不亦善乎遂詔新曆甲子所紀百二十歲國初有司上言國家受周禪周木德木生火則本朝運膺火德色當尚赤臘以戌日詔從之雍熙元年四月布衣趙垂慶上書言本朝當越五代而上承唐統為金德若梁繼唐傳後唐至本朝亦合為金德矧自國初符瑞色白者不可勝紀皆金德之應也望改正朔易車旗服色以承天統事下尚書省集議常侍徐鉉與百官奏議曰五運相承國家大事著於前載具有明文頃以唐末喪亂朱梁篡弒莊宗早編屬籍親雪國讎中興唐祚重新土運以梁室比羿浞王莽不為正統自後數姓相傳晉以金漢以水周以木天造有宋運膺火德況國初祀赤帝為感生帝于今二十五年豈可輕議改易又云梁至周不合迭居五運欲國家繼唐統為金德且五運迭遷親承曆數質文相次間不容髮豈可越數姓之上繼百年之運此不可之甚也按唐書天寶九載崔昌獻議自魏晉至周隋皆不得為正統欲唐遠繼漢統立周漢子孫為王者後備三恪之禮是時朝議是非相半集賢院學士衛包上言符同李林甫遂行其事至十二載林甫卒復以魏周隋之後為三恪崔昌衛包由是遠貶此又前載之甚明也伏請祗守舊章以承天祐從之大中祥符三年開封府功曹參軍張君房上言自唐室下衰土德隤圮朱梁氏彊稱金統而莊宗旋復舊邦則朱梁氏不入正統明矣晉氏又復稱金蓋謂乘于唐氏殊不知李建國于江南耳漢家二主共止三年紹晉而興是為水德洎廣順革命二主九年終于顯德以上三朝七主共止二十四年行運之間陰隱而難賾伏自太祖承周木德而王當於火行上繫于商開國在宋自是三朝迄今以為然矣愚臣詳而辨之若可疑者太祖禪周之歲歲在庚申夫庚者金也申亦金位納音是木蓋周氏稱木為二金所勝之象也太宗登極之後詔開金明池於金方之上此誰啓之乃天之靈符也陛下履極當彊圉之歲握符在作噩之春適宋道之隆興得金天之正氣臣試以瑞應言之則當年丹徒貢白鹿姑蘇進白龜條支之雀來潁川之雉至臣又聞當封禪之時魯郊貢白兔鄆上得金龜皆金符之至驗也願以臣章下三事大臣參定其事疏奏不報天禧四年光祿寺丞謝絳上書曰臣按古志凡帝王之興必推五行之盛德所以配天地而符陰陽也故神農氏以火德聖祖以土德夏以木德商以金德周以火德自漢之興王火德者以謂承堯之後且漢堯之裔也五帝之大莫大於堯漢能因之是不墜其緒而善繼其盛德也國家膺開光之慶執敦厚之德宜以土瑞而王天下然其推終始傳承周之木德而火當其次且朱梁不預正統者謂莊宗復興于後自石晉漢氏以及于周則李建國于江左而唐祚未絶是三代者亦不得正其統矣昔者秦祚促而德暴不入正統考諸五代之際亦是類矣國家誠能下黜五代紹唐之土德以繼聖祖亦猶漢之黜秦興周之火德以繼堯者也夫五行定位土德居中國家飛運于宋作京于汴誠萬國之中區矣傳曰土為羣物主故曰后土洪範曰土爰稼穡稼穡作甘方今四海給足嘉生蕃衍邇年京師甘露下泰山醴泉湧作甘之兆斯亦見矣矧靈木異卉資生於土千品萬類不可勝道非土德之驗乎臣又聞之太祖生于洛邑而胞絡惟黃鴻圖既建五緯聚於奎躔而鎮星是主及陛下升中之次日抱黃珥朝祀于太清宮有星曰含譽其色黃而潤澤斯皆凝命有表盛德攸屬天意人事響效之大者則土德之符在矣是故天心之在茲陛下拒而罔受民意之若是陛下謙而弗答氣壅未宣河決遂潰豈不神哉然則天淵之勃流水德之浸患考六府之厭鎮驗五行之勝剋亦宜興土之運禦時之災伏望順考符應詳習法度惟陛下時而行之大理寺丞董行父又上言曰在昔泰皇以萬物生於東至仁體乎木故德始於木木以生火神農受之為火德火以生土黃帝受之為土德土以生金少昊受之為金德金以生水顓頊受之為水德水以生木高辛受之為木德木以生火唐堯受之為火德火以生土虞舜傳之為土德土以生金夏為金德金以生水商為水德水以生木周為木德木以生火漢應圖讖為火德火以生土唐受曆運為土德陛下紹天之統受天之命固當上繼唐祚以金為德顯黃帝之嫡緒彰聖祖之丕烈臣又按聖祖先降於癸酉太祖受禪於庚申陛下即位於丁酉天書下降於戊申庚金也申酉皆金也天之體也陛下紹唐漢之運繼黃帝之後三世變道應天之統正金之德斯又順也詔兩制詳議既而獻議曰竊詳謝絳所述以聖祖得瑞宜承土德且引漢承堯緒為火德之比雖班彪漢祖之興有五其一曰帝堯之苗裔及序承正統乃越秦而繼周非用堯之行今國家或用土德即當越唐上承於隋彌以非順失其五德傳襲之序又據董行父請越五代紹唐為金德若其度越纍世上承百代之統則晉漢洎周咸帝中夏太祖實受終於周室而陟于元后豈可弗遵傳繼之序續於遐邈之統三聖臨御六十餘載登封告成昭姓紀號率循火行之運以輝炎靈之曜茲事體大非容輕議矧雍熙中徐鉉等議之詳矣其謝絳董行父等所請難以施行詔可
