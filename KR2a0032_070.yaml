body:
  text: 宋史卷七十志第二十三律曆三應天乾元儀天曆步五星歲星總七十九萬七千九百三十一秒五乾元率二十三萬四千五百三十五秒五千七百二十五儀天木星周率四百二萬八千五百八十七秒七千五百六十平合三百九十八日八千八百五十七秒二十八乾元餘二千五百五十五秒八千六百二十五約分八十七儀天餘八千七百八十七秒七千五百六十二曆平合皆謂之周日數同應天變差空秒一十六乾元差二十八秒九千四百二十三半秒母一萬儀天歲差九十八秒九千五百上限二百五度下限一百六十度二十五分秒六十三熒惑總一百五十六萬一百五十二秒三乾元率四十五萬八千五百九十二秒九千一百八十三十四儀天火星周率七百八十七萬七千一百九十一秒一千一百平合七百七十九日九千二百二秒一十八乾元餘二千七百四秒五千九百一十七約分九十二儀天餘九千二百九十一秒一千一百二曆平合皆謂之周日數同應天變差三秒空乾元差二十九秒一千一百三十五儀天歲差九十八餘三千八百上限一百九十六度八十下限一百六十八度四十五秒六十三鎮星總七十五萬六千三百一十一秒八十五乾元率二十二萬二千三百一十一秒二千一百六十四二十儀天土星周率三百八十一萬八千六百八秒三千五百平合三百七十八日八百六秒五十一乾元餘二百三十六秒八百三十一約分八儀天餘八百八秒三千五百二曆平合皆謂之周日數同應天變差五秒七十九乾元差二十八秒九千五百三儀天歲差一百秒一千一百上限一百八十二度六十三分秒八十一下限同上限太白總一百一十六萬八千三十二秒四十二乾元率三十四萬三千三百三十九秒一千五百四十七儀天金星周率五百八十九萬七千四百八十九秒五千四百平合五百八十三日八千九百九十六秒一十乾元餘二千六百七十六秒一千七百三十五約分九十一儀天餘九千一百八十九秒五千四百二曆平合皆謂之周日數同應天再合二百九十一日九千四百九十九秒五乾元儀天不立此法變差二秒三十六乾元差二十九秒一千七百九十八儀天歲差一百二十餘八千三百九上限一百九十七度一十六下限一百六十八度秒六十三辰星總二十三萬一千八百六秒四十二八十乾元率八萬八千一百三十七秒四千四百一十八十儀天水星周率一百一十七萬三百八十七秒二千八百平合一百一十五日八千八百二秒三十乾元餘二千五百八十七秒二千九十四約分八十八儀天餘八千八百八十七秒二千八百二曆平合皆謂之周日數同應天再合五十七日九千四百二秒一十五乾元儀天不立此法變差三秒七十八乾元差二十九秒一千一百三十八儀天歲差九十八秒三十上限一百八十三度六十二分下限一百八十二度六十二分秒六十三求五星天正冬至後加時平合日度分秒乾元謂之五星平合變日儀天謂之常合中日中度各以星總除元積為總數不盡者返減星總餘半而進位又置總數木火三之土如其數皆百而從之以元法收之為天正冬至後平合日度及分乾元置歲積分各以星率去之不盡用減星率餘以五因之滿元率收為日不滿退除為分儀天各以其星周率去歲積分不滿者返減其周率餘以宗法收為日不盡退除為分求平合入曆分乾元謂之入曆儀天謂之推五星常合入曆度分各以其星變差展所求積年滿三百六十五萬三千二百九十三秒一十九去之不盡以元法收為度不滿為分以減平合日為入曆度分乾元以積年乘星差以周天策去之不盡以元率收為度不滿退除為分用減平合變日為入曆分儀天各置其星歲差以積年乘之滿三百六十八萬九千八百八秒九千九百去之不盡以宗法收為度不滿退收為分求入陰陽變分在陽末變分以下為入陽曆以上去之餘為入陰曆置入陰陽曆分以陰陽變數去之不盡為入陰陽數及變分乾元歲星前限二萬五百五中限一萬二百四十八後限一萬六千二十熒惑前限一萬九千六百八十二中限六千五百六十四後限一萬六千八百四十四鎮星前限一萬八千二百六十二中限九千一百二十六後限同前限前後中皆半周天太白前限一萬九千七百一十六中限九千八百五十八後限一萬六千八百九辰星前中後與鎮星同又歲星前法一千七百八後法一千三百三十四熒惑前法一千六百四十一後法一千四百三鎮星辰星前後法皆一千五百二十二太白前法一千六百四十三後法一千四百二儀天各置常合入曆度分如在上限末數已下者為增數以上者減去上限末數下度分餘為入下限減數又各置所入上下限度分以上下限度分相近者減之餘為入次限下限度及分歲星陽變分損益率陽積陰變分損益率陰積初一千七百九損八十九陽六一千三百三十五損九十三陰一二一千四百一十七損八十九陽一百八十八二千六百七十損八十七陰九十三三五千一百二十六損九十二陽三百七十六四千六損八十五陰一百六十七四六千八百三十四損九十一陽五百一十三五千三百四十一損八十八陰四百六十七五八千五百四十三損九十六陽六百六十七六千六百七十六損九十四陰六百二十七六一萬二百五十二損九十八陽七百三十五八千一十一損九十四陰七百七七一萬一千九百六十益九十八陽七百六十九九千三百四十六損九十九陰七百五十四八一萬三千六百六十九益九十一陽七百三十五一萬六百八十二損九十九陰七百六十七九一萬五千三百七十七益九十五陽五百八十一一萬二千一十七益八十九陰七百八十十一萬七千八十六益八十九陽四百九十六一萬三千三百五十三益八十陰