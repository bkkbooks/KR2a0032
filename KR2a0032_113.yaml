body:
  text: 宋史卷一百一十三志第六十六禮十六嘉禮四宴饗游觀賜酺宴饗之設所以訓恭儉示惠慈也宋制嘗以春秋之季仲及聖節郊祀籍田禮畢巡幸還京凡國有大慶皆大宴遇大災大札則罷天聖後大宴率於集英殿次宴紫宸殿小宴垂拱殿若特旨則不拘常制凡大宴有司預於殿庭設山樓排場為羣仙隊仗六番進貢九龍五鳳之狀司天雞唱樓於其側殿上陳錦繡帷帟垂香毬設銀香獸前檻內藉以文茵設御茶床酒器於殿東北楹間羣臣盞斝於殿下幕屋設宰相使相樞密使知樞密院參知政事樞密副使同知樞密院宣徽使三師三公僕射尚書丞郎學士直學士御史大夫中丞三司使給諫舍人節度使兩使留後觀察團練使待制宗室遙郡團練使刺史上將軍統軍軍廂指揮使坐於殿上文武四品以上知雜御史郎中郎將禁軍都虞候坐於朵殿自餘升朝官諸軍副都頭以上諸蕃進奉使諸道進奉軍將以上分於兩廡宰臣使相坐以繡墩曲宴行幸用杌子參知政事以下用二蒲墩加罽毯曲宴樞密使副並同軍都指揮使以上用一蒲墩自朵殿而下皆緋緣氈條席殿上器用金餘以銀其日樞密使以下先起居訖當侍立者升殿宰相率百官入宣徽閣門通唱致辭訖宰相升殿進酒各就坐酒九行每上舉酒羣臣立侍次宰相次百官舉酒或傳旨命釂即搢笏起飲再拜曲宴多令不拜或上壽朝會止令滿酌不勸中飲更衣賜花有差宴訖蹈舞拜謝而退建隆元年大宴於廣德殿酒九行而罷乾德元年十一月南郊禮成大宴廣德殿謂之飲福是後三年開寶三年五年六年七年八年並設秋宴于大明殿以長春節在二月故也太平興國之後止設春宴在大明者十一在含光者六宴日親王樞密使副宣徽三司使駙馬都尉皆侍立軍校自龍武四廂都指揮使以上立於庭其宴契丹使亦於崇德殿但近臣及刺史郎中而上預焉淳化四年正月以南郊禮成大宴含光殿直史館陳靖上言古之饗宴者所以省禍福而觀威儀也故宴以禮成賓以賢序風雅之作茲為盛焉伏見近年內殿賜宴羣臣當坐於朵殿兩廊者拜舞方畢趨馳就席品列之序糾紛無別及至尊舉爵羣臣起立先後不整俯仰失節欲望自今令有司預依品位告諭其有踰越班次拜起失節喧譁過甚者並令糾舉又惟飫賜之典以寵武夫大烹之餘故為盛饌計一飯所費可數人之屬厭而將校輩或至終宴之時尚有欲炙之色蓋執事者失於察視不及潔豐而使然也伏望並申嚴制至道元年三月御史中丞李昌齡亦言廣宴之設以均飫賜得齒高會宜乎盡禮而有位之士鮮克致恭當糾其不恪又供事禁庭當定員數籍姓名以謹其出入酒殽之司或虧精潔望分命中使巡察並從之咸平三年二月大宴含光殿自是始備設春秋大宴五年御史臺言大宴起居舍人司諫正言三院使御史並坐于殿廊望自今移升朵殿自餘依舊十二月詔凡內宴宗正卿令升殿坐班次依合班儀翰林學士梁皓請以春秋大宴小宴賞花行幸次為四圖頒下閣門遵守從之景德二年九月詔曰朝會陳儀衣冠就列將以訓上下彰文物宜慎等威用符紀律況屢頒於條令宜自顧於典刑稍歷歲時漸成懈慢特申明制以警具僚自今宴會宜令御史臺預定位次各令端肅不得喧譁違者殿上委大夫中丞朵殿委知雜御史侍御史廊下委左右巡使察視彈奏內職殿直以上赴起居入殿庭行私禮者委閣門彈奏其軍員令殿前侍衛司各差都校一人提轄但虧失禮容即送所屬勘斷訖奏仍令閣門宣徽使互相察舉敢蔽匿者糾之大中祥符元年十二月詔宣徽院御史臺閣門殿前馬步軍司凡內宴臣僚軍員並祗候使臣等並以前後儀制曉諭務令遵稟違者密具名聞其軍員有因酒言詞失次及醉仆者即先扶出或遣殿前司量添巡檢軍士護送歸營又詔臣僚有託故請假不赴宴者御史臺糾奏天禧四年直集賢院祖士衡言大宴將更衣羣臣下殿然後更衣更衣後再坐則羣臣班于殿庭候上升坐起居謝賜花再拜升殿仁宗天聖三年監察御史朱諫言伏見大宴宗室先退允為得禮尚有文武臣僚父子兄弟者皆預再坐欲望自今內宴百官有父子兄弟叔姪同赴再坐時卑者先退慶曆七年御史言凡預大宴並御筵其所賜花並須戴歸私第不得更令僕從持戴違者糾舉熙寧二年正月閣門言準詔裁定集英殿宴入殿人數中書二十二人樞密院三十人宣徽院八人親王八人昭德軍節度使兼侍中曹佾三人皇親使相三人皇親正刺史已上至節度使並駙馬都尉各一人翰林司一百七十八人御廚六百人儀鸞司一百五十人祗候庫二十人內衣物庫七人新衣庫七人內弓箭庫三人鈐轄教坊所三人鐘鼓樓一十六人御藥院八人內物料庫九人法酒庫一十六人內酒坊八人入內內侍省前後行親事官共五人皇城司職員手分二人御史臺知班一十一人灑掃親從官人員已下一百人兩廊覷步親從官四十二人提舉司勾押官手分三人提舉火燭巡檢人員一十人快行親從官一十一人支散兩省花後苑造作所工匠等四人客省承授行首八人四方館職掌二人閣門承受行首已下一十八人是歲十一月以皇子生宴集英殿七年九月詔自今大宴親王皇親使相樞密使副使宣徽使駙馬都尉並於殿門外幕次就賜酒食舊制會食集英西廊之廡下喧卑為甚權發遣宣徽院吳充奏其事故有是命元豐七年三月大宴集英殿命皇子延安郡王侍立宰相王圭等率百官廷賀詔曰皇家慶事與卿等同之圭等再拜稱謝久之王乃退時王未出閣帝特令侍宴以見羣臣九年閣門言大宴不用兩軍妓女只用教坊小兒之舞王拱辰請以女童代之元祐八年詔罷獨看故事大宴前一日御殿閲百戲謂之獨看修國史范祖禹言是日進神宗紀草陛下覽先帝史冊甫畢即觀百戲理似未安故請罷之元祐二年九月經筵講論語徹章賜宰臣執政經筵官宴于東宮帝親書唐人詩分賜之三年六月罷春宴八月罷秋宴以魏王出殯翰林學士蘇軾不進教坊致語故也是後以時雨未足集英殿試舉人尚書省火禁中祈禳邠國公主未菆皆罷宴凡大宴有故而罷則賜預宴官酒饌于閣門朝堂升殿官雖假故不從游宴亦遣中使就第賜焉親王中書樞密宣徽三司使副學士步軍都虞候以上三師三公東宮三師三公以下曾任中書門下致仕者亦同凡外國使預宴者祥符中宴崇德殿夏使於西廊南赴坐交使以次歇空進奉押衙次交州契丹舍利從人則於東廊南赴坐四年又升甘州交州於朵殿夏州押衙於東廊南頭歇空坐七年龜茲進奉人使歇空坐於契丹舍利之下其後又令龜茲使副於西廊南赴坐進奉押衙重行於後瓜州沙州使副亦於西廊之南赴坐其餘大略以是為準大觀三年議禮局上集英殿春秋大宴儀其日預宴文武百僚詣殿庭東西相向立皇帝出御需雲殿閣門內侍管軍等起居皇帝降坐御集英殿鳴鞭殿中監已下通班起居殿中監少監升殿通喚閣門官升殿攝左右軍巡使鞾笏起居訖繫㙐執杖侍立餘非應奉官分出次鐘鼓樓節級就位四拜起居次舍人通喚訖分引羣官橫行北向東上閣門官贊大起居班首出班俯伏跪致辭訖俯伏興復位羣官再拜舞蹈又再拜贊各就坐再拜舍人分引升殿席前相向立朵殿兩廡官立於席後有遼使則舍人引大遼舍利西入大起居贊各就坐贊再拜贊就坐引升西廊次舍人傳事引從人分入四拜起居謝坐並同舍利儀教坊使以下通班大起居看盞人謝升殿再拜內侍進御茶床殿侍酹酒訖次贊天武門外祗候東上閣門官詣御坐奏班首姓名以下進酒舍人分引殿上臣僚橫行北向贊再拜舍人引班首稍前東上閣門官接引詣御坐東北向搢笏殿中監奉盤盞授班首少監啓盞以酒注之班首奉詣御前進訖少退虛跪興以槃授殿中監出笏東上閣門官引退舍人接引復位贊再拜舍人引班首稍前殿上臣僚席前相向立東上閣門官接引詣御坐東北向搢笏殿中監授槃奉詣御前西向立樂作皇帝飲訖舍人分引殿上臣僚橫行北向東上閣門引班首接盞退虛跪興授盞殿中監出笏引退舍人接引復位贊再拜贊各賜酒羣臣再拜贊各就坐羣臣皆立席後復贊就坐酒初行羣官搢笏受酒先宰相次百官皆作樂皇帝再舉酒並殿中監少監進羣臣俱立席後樂作飲訖贊各就坐復行羣臣酒飲訖皇帝三舉酒皆如第一之儀尚食典奉御進食太官設羣臣食樂作賜祗應臣僚酒食贊謝拜訖復位皇帝四舉酒並典御進酒樂工致語羣官皆立席後致語訖贊百官再拜就坐樂作皇帝五舉酒樂工奏樂庭下舞隊致詞樂作舞隊出東上閣門奏再坐時刻俟放隊訖內侍舉御茶床皇帝降坐鳴鞭羣臣退賜花再坐前二刻御史臺東上閣門催班羣臣戴花北向立內侍進班齊牌皇帝詣集英殿百官謝花再拜又再拜就坐內侍進御茶床皇帝舉酒殿上奏樂庭下作樂皇帝再舉酒殿上奏樂庭下舞隊前致語樂作出皇帝三舉酒四舉酒皆如上儀若宣示盞即隨所向閣門官以下揖稱宣示盞躬贊就坐若宣勸即立席後躬飲訖贊再拜內侍舉御茶床舍人引班首以下降階再拜舞蹈又再拜訖分班出閣門官側奏無公事皇帝降坐鳴鞭集英殿飲福大宴儀初大禮畢皇帝逐頓飲福餘酒封進入內宴日降出酒既三行泛賜預坐臣僚飲福酒各一盞羣臣飲訖宣勸各興立席後贊再拜謝訖復坐飲並如春秋大宴之儀紹興十三年三月三日詔宴殿陳設止用緋黃二色不用文繡令有司遵守更不制造五月閣門修立集英殿大宴儀注乾道八年十二月詔今後前宰相到闕如遇赴宴賜茶其合坐墩杌非特旨並依官品又行門禁衛諸色祗應人依紹興例並賜絹花自是惟正旦生辰郊祀及金使見辭各有宴然大宴視東京時則亦簡矣曲宴凡幸苑囿池觀稼畋獵所至設宴惟從官預謂之曲宴或宴大遼使副于紫宸殿則近臣及刺史正郎都虞候以上預暮春後苑賞花釣魚則三館祕閣皆預太祖建隆元年七月親征澤潞宴從臣于河陽行宮又宴韓令坤已下於禮賢講武殿賜襲衣器幣鞍馬以賞澤潞之功也四年四月宴從臣於玉津園乾德三年七月六日詔皇弟開封尹宰相樞密使翰林學士中書舍人泛舟後苑新池張樂宴飲極歡而罷是歲重陽宴近臣於長春殿太宗太平興國九年三月十五日詔宰相近臣賞花於後苑帝曰春氣暄和萬物暢茂四方無事朕以天下之樂為樂宜令侍從詞臣各賦詩帝習射于水心殿雍熙二年四月二日詔輔臣三司使翰林樞密直學士尚書省四品兩省五品以上三館學士宴于後苑賞花釣魚張樂賜飲命羣臣賦詩習射賞花曲宴自此始三年十二月一日大雨雪帝喜御玉華殿召宰臣及近臣謂曰春夏以來未嘗飲酒今得此嘉雪思與卿等同醉又出御製雪詩令侍臣屬和後凡曲宴不盡載真宗咸平元年二月二十二日宴羣臣于崇德殿不作樂二年八月七日再宴用樂三年二月晦賞花宴于後苑帝作中春賞花釣魚詩儒臣皆賦遂射于水殿盡歡而罷自是遂為定制四年十一月二十日御龍圖閣曲宴詔近臣觀太宗草行飛白篆籀八分書及畫景德二年十二月五日宴尚書省五品諸軍都指揮使以上契丹使于崇德殿不舉樂以明德太后喪制故也時契丹初來賀承天節擇膳夫五人齎本國異味就尚食局造食詔賜膳夫衣服銀帶器帛大中祥符六年七月二十九日詔輔臣觀粟于後苑御山子觀御製文閣御書及嘉禾圖賜飲是日皇子從游天禧四年七月十一日詔近臣及寇準馮拯觀內苑穀遂宴于玉宸殿十月二十九日詔皇太子宗室近臣諸帥赴玉宸殿翠芳亭觀稻賜宴仍以稻分賜之仁宗天聖二年既禫除百官五表請聽樂而秋燕用樂之半詔輔臣曰昨日宴宮中朕數四上勉皇太后聽樂王欽若以聞太后太后曰自先帝棄天下吾終身不欲聽樂皇帝再三為請其可重違乎明年上元節乃朝謁景靈上清宮啓聖院相國寺還御正陽門宴從官觀燈次日太后召命婦臨觀及春秋大宴歲為常夏觀南御莊刈麥秋瑞聖園刈穀並宴從官或射不為常皇祐五年後苑寶政殿刈麥謂輔臣曰朕新作此殿不欲植花歲以種麥庶知穡事不易也自是幸觀穀麥惟就後苑春夏賞花釣魚則歲為之嘉祐七年十二月特召兩府近臣三司副使臺諫官皇子宗室駙馬都尉管軍臣僚至龍圖天章閣觀三聖御書及寶文閣為飛白分賜下逮館閣官製觀書詩賜韓琦以下和進遂宴羣玉殿傳詔學士王圭撰詩序刊石于閣數日再會天章閣觀三朝瑞物復宴羣玉殿酒行上曰天下久無事今日之樂與卿等共之宜盡醉勿復辭因召韓琦至御榻前別賜一大巵出禁中名花金盤貯香藥令各持歸莫不霑醉至暮而罷熙寧元年四月御史中丞滕甫言臣聞君命召不俟駕此臣子所以恭其上也今錫宴而有託詞不至者甚非恭上之節也請自今宴設羣臣非大故與實有疾病無得託詞仍令御史臺察舉二年八月實録書成皆宴垂拱殿十月修定閣門儀制所言垂拱殿曲宴當直翰林學士與觀文資政龍圖寶文樞密直龍圖天章寶文閣直學士並赴坐而翰林學士兼他職者不預考之官制似未齊一請自今曲宴翰林學士與雜學士並赴從之元豐五年七月以兩朝國史書成宴于垂拱殿十一月宴景靈宮祠官于紫宸殿元祐二年九月經筵講論語徹章賜宰臣執政經筵官宴于東宮帝親書唐人詩賜之紹聖三年十一月以進神宗皇帝實録畢曲宴宰臣執政文臣試侍郎武臣觀察使以上並修國史官赴坐元符元年五月詔受寶畢宴于紫宸殿宰臣以下文臣職事官六曹員外郎監察御史以上武臣郎將諸軍副指揮使以上預坐政和二年三月上巳御筵詔令移用他日以國有故宰臣請罷宴故也大觀三年議禮局上垂拱殿曲宴儀皇帝視事畢東上閣門進呈坐圖舍人奏閣門無公事皇帝降坐鳴鞭入殿後閣諸司排設備東上閣門附內侍奏班齊皇帝出閣升坐鳴鞭三公直學士以上親王使相至觀察使以上分東西入詣殿庭橫行北向立定班首奏聖躬萬福舍人贊各就坐再拜訖分引詣東西階升殿席前相向立次教坊使以下常起居次看盞人謝升殿次內侍進御茶床殿侍酹酒訖閣門詣御坐躬奏班首姓名以下進酒舍人分引殿上臣僚橫行北向贊再拜班首奉酒躬進樂作皇帝飲訖舍人贊各賜酒羣官俱再拜贊各就坐羣官皆立席後復贊就坐酒初行先宰相次百官皆作樂後準此尚食典奉御進食太官令設羣官食酒五行若宣示盞即隨所向閣門揖稱宣示盞躬贊就坐若宣勸即立席後躬飲贊再拜內侍舉御茶床舍人引班首以下降階橫行北向再拜分班出皇帝降坐上巳重陽賜宴儀其日預宴官以下並赴宴所就次諸司排設備預宴官以下詣庭中望闕位立次中使詣班首之左稍前立中使宣曰有敕在位官皆再拜訖中使宣曰賜卿等御筵在位官皆再拜搢笏舞蹈又再拜中使退預宴官分東西升階就坐酒行樂作飲訖食畢樂止酒五行預宴官並興就次賜花有差少頃戴花畢與宴官詣望闕位立謝花再拜訖復升就坐酒行樂作飲訖食畢樂止酒四行而退游觀天子歲時游豫則上元幸集禧觀相國寺御宣德門觀燈首夏幸金明池觀水嬉瓊林苑宴射大祀禮成則幸太一宮集禧觀相國寺恭謝或詣諸寺觀焚香或至近郊閲武觀稼其事蓋不一焉太祖建隆元年四月幸玉津園是後凡十三臨幸九月幸宜春苑是後觀習水戰者二十有八幸大相國寺封禪寺者各五龍興寺及皇弟開封尹園各三幸太清觀建隆觀者再崇夏寺廣化寺等覺寺者各一觀水磑者八閲炮車觀水匱觀稼幸飛龍院幸開封府幸都亭驛幸禮賢院幸茶庫染院幸河倉幸金鳳園皆一再至焉太宗太平興國二年二月幸新鑿池賜役卒錢布有差六月幸飛龍院是後凡四幸三年四月觀刈麥九年正月六日幸景龍門外水磑帝臨水而坐召從臣觀之因謂曰此水出於山源清澄甘潔近河之地水味皆甘豈河潤所及乎宋琪等曰亦猶人性善惡染習致然帝曰卿言是也四月幸金明池習水戰帝御水殿召近臣觀之謂宰相曰水戰南方之事也今其地已定不復施用時習之示不忘戰耳因幸講武臺閲諸軍都試軍中之絶技者遞加賜賚遂登瓊林苑樓陳百戲擲金錢令樂人爭之極歡而罷五月二日出南薰門觀稼召從官列坐田中令民刈麥咸賜以錢帛回幸玉津園觀漁張樂習射既宴而歸明年五月幸城南觀麥賜田夫布帛有差雍熙四年四月幸金明池觀水嬉賜從官飲帝曰雨霽天涼中外無事宜勿惜醉因登苑中樓盡歡而罷淳化三年三月幸金明池命為競渡之戲擲銀甌於波間令人泅波取之因御船奏教坊樂岸上都人縱觀者萬計帝顧視高年皓首者就賜白金器皿九月幸潛龍園駐輦池東岸臨水謂近臣曰朕不至此已十年昔尹京日無事常痛飲池上今池邊之木已成林矣因顧教坊使郭守忠等數人曰汝等前日以樂童從我今亦皓首光陰迅速如此嗟嘆久之帝親引滿舉白羣臣盡醉真宗咸平元年八月幸諸王宮二年九月幸開寶寺福聖院是後二寺臨幸者凡十有四三年五月幸金明池觀水戲揚旗鳴鼓分左右翼植木繫綵以為標識方舟疾進先至者賜之移幸瓊林苑登露臺鈞容直奏樂臺下百戲競集從臣皆醉自是凡四臨幸九月幸大相國寺是後再幸者九幸上清宮者十有二幸玉津園者十幸太一宮玉清昭應宮各六餘不盡載大中祥符八年正月十九日中書門下上言伏覩今月十四日皇帝詣諸宮寺焚香總三十餘處過百拜以上臣等侍從倍增憂灼昨崇政殿已面奏陳臣聞尊事萬靈固先精意登用百禮乃貴時中在經久之從宜必裁正而惟允伏望特命攸司載詳定式自今車駕幸諸宮觀寺院正殿再拜及諸殿令羣臣以下分拜庶垂億載允叶通規乃詔禮儀院詳定差減焉仁宗景祐三年詔閣門詳定車駕幸宮觀寺院支賜茶絹等第哲宗紹聖四年三月八日詔自今遇車駕出新城令殿前馬步軍司取旨權差馬步軍赴新城外四面巡檢下祗應每壁馬軍二百人步軍三百人並於城外巡警三元觀燈本起於方外之說自唐以後常於正月望夜開坊市門然燈宋因之上元前後各一日城中張燈大內正門結綵為山樓影燈起露臺教坊陳百戲天子先幸寺觀行香遂御樓或御東華門及東西角樓飲從臣四夷蕃客各依本國歌舞列於樓下東華左右掖門東西角樓城門大道大宮觀寺院悉起山棚張樂陳燈皇城雉堞亦遍設之其夕開舊城門達旦縱士民觀後增至十七十八夜太祖建隆二年上元節御明德門樓觀燈召宰相樞密宣徽三司使端明翰林樞密直學士兩省五品以上官見任前任節度觀察使飲宴江南吳越朝貢使預焉四夷蕃客列坐樓下賜酒食勞之夜分而罷三年正月十三夜然燈罷內前排場戲樂以昭憲皇太后喪制故也太平興國二年七月中元節御東角樓觀燈賜從官宴飲五年十月下元節依中元例張燈三夜雍熙五年上元節不觀燈躬耕籍田故也後凡遇用兵及災變諸臣之喪皆真宗景德元年正月十四日賜大食三佛齊蒲端諸國進奉使緡錢令觀燈宴飲大中祥符元年十一月二十五日詔天慶節聽京城然燈一晝夜六年四月十六日先天降聖節亦如之天聖二年六月罷降聖節然燈政和三年正月詔放燈五日五年十二月二十九日詔景龍門預為元夕之具實欲觀民風察時態黼飾太平增光樂國非徒以遊豫為事特賜公師宰執以下宴及御製詩四韻賜太師蔡京六年正月七日御筆今歲閏餘候晚猶未春和晷短氣寒於宴集無舒緩之樂景靈宮朝獻移十四日東宮十五日西宮畢詣上清儲祥宮燒香十六日詣醴泉觀等處燒香上元節移於閏正月十四日為始宣和六年十二月二十四日賜太師蔡京以下應兩府赴睿謨殿宴景龍門觀燈續有旨宣太傅王黼赴宴七年正月十八日宴輔臣觀燈賜酺自秦始秦法三人以上會飲則罰金故因事賜酺吏民會飲過則禁之唐嘗一再舉行太宗雍熙元年十二月詔曰王者賜酺推恩與衆共樂所以表升平之盛事契億兆之歡心纍朝以來此事久廢蓋逢多故莫舉舊章今四海混同萬民康泰嚴禋始畢慶澤均行宜令士庶之情共慶休明之運可賜酺三日二十一日御丹鳳樓觀酺召侍臣賜飲自樓前至朱雀門張樂作山車旱船往來御道又集開封府諸縣及諸軍樂人列於御街音樂雜發觀者溢道縱士庶遊觀遷市肆百貨於道之左右召畿甸耆老列坐樓下賜之酒食明日賜羣臣宴於尚書省仍作詩以賜明日又宴羣臣獻歌詩賦頌者數十人真宗景德三年九月詔許羣臣士庶選勝宴樂御史臺皇城司毋得糾察四年二月甲申上御五鳳樓觀酺宗室近臣侍坐樓前露臺奏教坊樂召父老五百人列坐賜飲於樓下後二日上復御樓賜宗室文武百官宴於都亭驛賜諸班諸軍將校羊酒大中祥符元年正月詔應致仕官並令赴都亭驛酺宴御樓日合預坐者亦聽又詔朝臣已辭未見並聽赴會凡賜酺命內諸司使三人主其事於乾元樓前露臺上設教坊樂又駢繫方車四十乘上起綵樓者二分載鈞容直開封府樂復為棚車二十四每十二乘為之皆駕以牛被之錦繡縈以綵紖分載諸軍京畿伎樂又於中衢編木為欄處之徙坊市邸肆對列御道百貨駢布競以綵幄鏤版為飾上御乾元門召京邑父老分番列坐樓下傳旨問安否賜以衣服茶帛若五日則第一日近臣侍坐特召丞郎給諫上舉觴教坊樂二大車自升平橋而北又有旱船四挾之以進輣車由東西街交騖並往復日再焉東距望春門西連閶闔門百戲競作歌吹騰沸宗室親王近列牧伯洎舊臣宗室官為設綵棚於左右廊廡士庶縱觀車騎填溢歡呼震動第二日宴羣臣百官於都亭驛宗室於親王宮第三日宴宗室內職於都亭驛近臣於宰相第第四日宴百官於都亭驛宗室於外苑第五日復宴宗室內職於都亭驛近臣於外苑上多作詩賜令屬和及別為勸酒詩禁軍將校日會於殿前馬步軍之廨是歲東封泰山所過州府上御子城門樓設山車綵船載樂從臣侍坐本州父老進奉使蕃客悉預兗州駐蹕仍賜羣臣會於延壽寺所在改賜門名兗州曰回鑾覃慶鄆州曰升中延福濮州曰告成延慶澶州以行宮迫隘當衢結綵為殿名曰延禧幸汾陰亳州皆如東封路河中府門名曰詔畢宣恩陝州曰霈澤惠民鄭州曰回鑾慶賜西京將議改五鳳樓名上曰此太祖所建因瑞應不可更也華陰就行宮宴父老賜驛亭名曰宣澤至鄭州以太宗忌日甫過罷會賜與如例亳州曰奉元均慶南京曰重熙頒慶天禧五年以畿縣追集老人疲勞之故止召兩赤縣坊縣父老預會其不預名亦聽給以賜物天下賜酺各令州府會官屬父老邊州或遣中使就賜又詔開封府賜酺日罪人酗酒而不傷人者咸釋之再犯論如法後賜酺皆準此宋之繁庶於斯為盛後遂為定制云
