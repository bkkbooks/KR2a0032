body:
  text: 宋史卷九十四志第四十七河渠四汴河下洛河蔡河廣濟河金水河白溝河京畿溝渠白河三白渠鄧許諸渠附元豐元年五月西頭供奉官張從惠復言汴口歲開閉修堤防通漕才二百餘日往時數有建議引洛水入汴患黃河嚙廣武山須鑿山嶺十數丈以通汴渠功大不可為去年七月黃河暴漲水落而稍北距廣武山麓七里退灘高闊可鑿為渠引洛入汴范子淵知都水監丞畫十利以獻又言汜水出玉仙山索水出嵩渚山合洛水積其廣深得二千一百三十六尺視今汴流尚贏九百七十四尺以河洛湍緩不同得其贏餘可以相補猶慮不足則旁堤為塘滲取河水每百里置木閘一以限水勢兩旁溝湖陂濼皆可引以為助禁伊洛上源私引水者大約汴舟重載入水不過四尺今深五尺可濟漕運起鞏縣神尾山至士家堤築大堤四十七里以捍大河起沙谷至河陰縣十里店穿渠五十二里引洛水屬于汴渠疏奏上重其事遣使行視二年正月使還以為工費浩大不可為上復遣入內供奉宋用臣還奏可為請自任村沙谷口至汴口開河五十里引伊洛水入汴河每二十里置束水一以芻楗為之以節湍急之勢取水深一丈以通漕運引古索河為源注房家黃家孟家三陂及三十六陂高仰處瀦水為塘以備洛水不足則決以入河又自汜水關北開河五百五十步屬于黃河上下置閘啓閉以通黃汴二河船筏即洛河舊口置水通黃河以泄伊洛暴漲古索河等暴漲即以魏樓滎澤孔固三斗門泄之計工九十萬七千有餘仍乞修護黃河南堤掃以防侵奪新河從之三月庚寅以用臣都大提舉導洛通汴四月甲子興工遣禮官祭告河道侵民冢墓給錢徙之無主者官為瘞藏六月戊申清汴成凡用工四十五日自任村沙口至河陰縣瓦亭子並汜水關北通黃河接運河長五十一里兩岸為堤總長一百三里引洛水入汴七月甲子閉汴口徙官吏河清卒於新洛口戊辰遣禮官致祭十一月辛未詔差七千人赴汴口開修河道三年二月宋用臣言洛水入汴至淮河道漫闊多淺澀乞狹河六十里為二十一萬六千步詔四月興役五月癸亥罷草屯浮堰五年三月宋用臣言金水河透水槽阻礙上下汴舟宜廢撤從之十月狹河畢工六年八月范子淵又請於武濟山麓至河岸並嫩灘上修堤及壓掃堤又新河南岸築新堤計役兵六千人二百日成開展直河長六十三里廣一百尺深一丈役兵四萬七千有奇一月成從之十月都提舉司言汴水增漲京西四斗門不能分減致開決堤岸今近京惟孔固斗門可以泄水下入黃河若孫賈斗門雖可泄入廣濟然下尾窄狹不能盡吞宜於萬勝鎮舊減水河汴河北岸修立斗門開淘舊河創開生河一道下合入刁馬河役夫一萬三千六百四十三人一月畢工詔從其請仍作二年開修七年四月武濟河潰八月詔罷營閉縱其分流止護廣武三掃哲宗元祐元年閏二月辛亥右司諫蘇轍言近歲京城外創置水磨因此汴水淺澀阻隔官私舟船其東門外水磨下流汗漫無歸浸損民田一二百里幾敗漢高祖墳賴陛下仁聖惻怛親發德音令執政共議營救尋詔畿縣於黃河春夫外更調夫四萬開自盟河以疏泄水患計一月畢工然以水磨供給京城內外食茶等其水止得五日閉斷以此工役重大民間每夫日顧二百錢一月之費計二百四十萬貫而汴水渾濁易至填淤明年又存真須開淘民間歲歲不免此費聞水磨歲入不過四十萬貫前戶部侍郎李定以此課利惑誤朝聽依舊存留且水磨興置未久自前未有此錢國計何闕而小人淺陋妄有靳惜傷民辱國不以為愧况今水患近在國門而恬不為怪甚非陛下勤恤民物之意而又減耗汴水行船不便乞廢罷官磨任民磨茶三月轍又乞令汴口以東州縣各具水匱所占頃畝每歲有無除放二稅仍具水匱可與不可廢罷如決不可廢當如何給還民田以免怨望八月辛亥轍又言昨朝旨令都水監差官具括中牟管城等縣水匱元浸壓者幾何見今積水所占幾何退出頃畝幾何凡退出之地皆還本主水占者以官地還之無田可還即給元直聖恩深厚棄利與民所存甚遠然臣聞水所占地至今無可對還而退出之田亦以迫近水匱為雨水浸淫未得耕鑿知鄭州岑象求近奏稱自宋用臣興置水匱以來元未曾取以灌注清汴水流自足不廢漕運乞盡廢水匱以便失業之民十月遂罷水匱四年冬御史中丞梁燾言嘗求世務之急得導洛通汴之實始聞其說則可喜及考其事則可懼竊以廣武山之北即大河故道河常往來其間夏秋漲溢每抵山下舊來洛水至此流入於河後欲導以趨汴渠乃乘河未漲就嫩灘之上峻起東西堤闢大河於堤北攘其地以引洛水中間缺為斗門名通舟楫其實盜河以助洛之淺涸也洛水本清而今汴常黃流是洛不足以行汴而所以能行者附大河之餘波也增廣武三掃之備竭京西所有不足以為支費其失無慮數百萬計從來上下習為欺罔朝廷惑於安流之說稅屋之利恬不為慮而不知新沙疏弱力不能制悍河水勢一薄則爛熳潰散將使怒流循洛而下直冒京師是甘以數百萬日增之費養異時萬一之患亦已誤矣夫歲傾重費以坐待其患何若折其奔衝以終除其害哉為今之計宜復為汴口仍引大河一支啓閉以時還祖宗百年以來潤國養民之賜誠為得策汴口復成則免廣武傾注以長為京師之安省數百萬之費以紓京西生靈之困牽大河水勢以解河北決溢之災便東南漕運以蠲重載留滯之弊時節啓閉以除蹙凌打凌之苦通江淮八路商賈大舶以供京師之饒為甚大之利者六此不可忽也惟拆去兩岸舍屋盡廢僦錢為害者一而甚小所謂損小費以成大利也臣之所言特其大略爾至於考究本末措置畕悉在朝廷擇通習之臣付之無牽浮議責其成功又言臣聞開汴之時大河曠歲不決蓋汴口析其三分之水河流常行七分也自導洛而後頻年屢決雖洛口竊取其水率不過一分上下是河流常九分也猶幸流勢臥北故潰溢北出自去歲以來稍稍臥南此其可憂而洛口之作理須早計竊以開洛之役其功甚小不比大河之上但闢百餘步即可以通水三分既永為京師之福又減河北屢決之害兼水勢既已牽動在於回河尤為順便非獨孫村之功可成澶州故道亦有自然可復之理望出臣前章面詔大臣與本監及知水事者按地形水勢具圖以聞不報至五年十月癸巳乃詔導河水入汴紹聖元年帝親政復召宋用臣赴闕七月辛丑廣武掃危急壬寅帝語輔臣掃去洛河不遠須防漲溢下灌京師明日乃詔都水監丞馮忱之相度築欄水簽堤丁巳帝諭執政曰河掃久不修昨日報洛水又大溢注于河若廣武掃壞河洛為一則清汴不通矣京都漕運殊可憂宜亟命吳安持王宗望同力督作苟得不壞過此須圖久計丙寅吳安持言廣武第一掃危急決口與清汴絶近緣洛河之南去廣武山千餘步地形稍高自鞏縣東七里店至今洛口不滿十里可以別開新河導洛水近南行流地里至少用功甚微詔安持等再按視之十一月李偉言清汴導溫洛貫京都下通淮泗為萬世利自元祐以來屢危急而今歲特甚臣相視武濟山以下二十里名神尾山乃廣武掃首所起約置剌堰三里餘就武濟河下尾廢堤枯河基址增修疏導回截河勢東北行留舊掃作遙堤可以紓清汴下注京城之患詔宋用臣陳祐甫覆按以聞十二月甲午戶部尚書蔡京言本部歲計皆藉東南漕運今年上供物至者十無二三而汴口已閉臣責問提舉汴河堤岸司楊琰乃稱自元豐二年至元祐初八年之間未嘗塞也詔依元豐條例明年正月庚戌用臣亦言元豐間四月導洛通汴六月放水四時行流不絶遇冬有凍即督沿河官吏伐冰通流自元祐二年冬深輒閉塞致河流涸竭殊失開道清汴本意今欲卜日伐冰放水歸河永不閉塞及凍解止將京西五斗門減放以節水勢如惠民河行流自無壅遏之患從之三年正月戊申詔提舉河北西路常平李仲罷歸吏部仲在元祐中提舉汜水輦運建言西京鞏縣河陽汜水河陰縣界乃沿黃河地分北有太行南有廣武二山自古河流兩山之間乃緣禹跡昨自宋用臣創置導洛清汴於黃河沙灘上節次創置廣雄武等堤掃到今十餘年間屢經危急况諸掃在京城之上若不別為之計患起不測思之寒心今如棄去諸掃開展河道講究興復元豐二年以前防河事不惟省歲費寬民力河流且無壅遏決溢之患望遣諳河事官相視施行又乞復置汴口依舊以黃河水為節約之限罷去清汴閘口四年閏二月楊琰乞依元豐例減放洛水入京西界大白龍坑及三十六陂充水匱以助汴河行運詔賈種民同琰相度合占頃畝及所用功力以聞五月乙亥都提舉汴河堤岸賈種民言元豐改汴口為洛口名汴河為清汴者凡以取水於洛也復匱清水以備淺澀而助行流元祐間却於黃河撥口分引渾水令自上流入洛口比之清洛難以調節乞依元豐已修狹河身丈尺深淺檢計物力以復清汴立限修濬通放洛水及依舊置洛斗門通放西河官私舟船從之帝嘗謂知樞密院事曾布曰先帝作清汴又為天源河蓋有深意元祐中幾廢近賈種民奏若盡復清汴不用濁流乃當世靈長之慶布對曰先帝以天源河為國姓福地此衆人所知何可廢也十二月詔京城內汴河兩岸各留堤面丈有五尺禁公私侵牟元符三年徽宗即位無大改作汴渠稍湮則浚之大觀中言者論胡師文昨為發運使創開泗州直河及築簽堤阻遏汴水尋復淤澱遂行廢拆然後併役數郡兵夫其間疾苦竄歿無慮數千費錢穀纍百萬計狂妄生事誣奏罔功官員冒賞至四十五人師文由是自知州降充宮觀宣和元年五月都城無故大水浸城外官寺民居遂破汴堤汴渠將溢諸門皆城守起居郎李綱奏國家都汴百有六十餘載未嘗少有變故今事起倉猝遐邇驚駭誠大異也臣嘗躬詣郊外竊見積水之來自都城以西漫為巨浸東拒汴堤停蓄深廣湍悍浚激東南而流其勢未艾然或淹浸旬時因以風雨不可不慮夫變不虛發必有感召之因願詔廷臣各具所見擇其可採者施行之詔都城外積水緣有司失職隄防不修非災異也罷綱送吏部而募人決水下流由城北注五丈河下通梁山濼乃已七月壬子都提舉司言近因野水衝蕩沿汴堤岸及河道淤淺若止役河清功力不勝望俟農隙顧夫開修從之五年十二月庚寅詔沿汴州縣創添欄河鎖柵歲額公私不以為便其遵元豐舊制靖康而後汴河上流為盜所決者數處決口有至百步者塞久不合乾涸月餘綱運不通南京及京師皆乏糧責都水使者措置凡二十餘日而水復舊綱運呇來兩京糧始足又擇使臣八員為沿汴巡檢每兩員各將兵五百人自洛口至西水門分地防察決溢云洛水貫西京多暴漲漂壞橋梁建隆二年留守向拱重修天津橋成甃巨石為腳高數丈鋭其前以疏水勢石縱縫以鐵鼓絡之其制甚固四月具圖來上降詔褒美開寶九年郊祀西京詔發卒五千自洛城菜市橋鑿渠抵漕口三十五里饋運便之其後導以通汴蔡河貫京師為都人所仰兼閔水洧水潩水以通舟閔水自尉氏歷祥符開封合于蔡是為惠民河洧水自許田注鄢陵東南歷扶溝合于蔡潩水出鄭之大隗山注臨潁歷鄢陵扶溝合于蔡凡許鄭諸水合堅白鴈丈八溝京索合西河褚河湖河雙河欒霸河皆會焉猶以其淺涸故植木橫棧棧為水之節啓閉以時太祖建隆元年四月命中使浚蔡河設斗門節水自京距通許鎮二年詔發畿甸陳許丁夫數萬浚蔡水南入潁川乾德二年二月令陳承昭率丁夫數千鑿渠自長社引潩水至京師合閔水潩水本出密縣大隗山歷許田會春夏霖雨則泛溢民田至是渠成無水患閔河益通漕焉太宗淳化二年以潩水泛溢浸許州民田詔自長葛縣開小河導潩水分流二十里合于惠民河真宗咸平五年七月京師霖雨溝洫壅惠民河溢泛道路壞廬舍知開封府寇準治丁岡古河泄導之大中祥符元年六月開封府言尉氏縣惠民河決遣使督視完塞二年四月陳州言州地汙下苦積潦歲有水患請自許州長葛縣浚減水河及補棗村舊河以入蔡河從之九年知許州石普請於大流堰穿渠置二斗門引沙河以漕京師遣使按視四月詔遣中使至惠民河規畫置壩子以通舟運仁宗天聖二年二月崇儀副使巡護惠民河田承說獻議重修許州合流鎮大流堰斗門創開減水河通漕省迂路五百里詔遣使按視以聞五年八月都大巡護惠民河王克基言先準宣惠民京索河水淺小緣出源西京鄭許州界惠民河下合橫溝白鴈溝京索河下合西河湖河雙河欒霸河丈八溝各為民間截水蒔稻灌園宜令州縣巡察七年王克基言按舊制蔡河斗門棧板須依時啓閉調停水勢嘉祐三年正月開京城西葛家岡新河以有司言至和中大水入京城請自祥符縣界葛家岡開生河直城南好草陂北入惠民河分注魯溝以紓京城之患神宗熙寧四年七月程昉請開宋家等堤畎水以助漕運八月三班借職楊琰請增置上下壩閘蓄水以備淺涸詔琰掌其事六年九月戊辰將作監尚宗儒言議者請置蔡河木岸計功頗大詔修固土岸八年詔京西運米于河北於是侯叔獻請因丁字河故道鑿堤置閘引汴水入于蔡以通舟運河成舟不可行尋廢十月詔都水監展惠民河欲便修城也九年七月提轄修京城所請引霧澤陂水至咸豐門合京索河由京索簽入副堤河下合惠民都水監謂不若於順天門外簽直河身及於染院後簽入護龍河至咸豐門南復入京索河實為長利從之徽宗崇寧元年二月都水監言惠民河修簽河次下硬堰畢工詔立捕獲盜泄賞大觀元年十二月開潩河入蔡河從京畿都轉運使吳擇仁之請也政和元年十月己酉詔差水官同京畿監司視蔡河隄防及淤淺者來春併工治之廣濟河導菏水自開封歷陳留曹濟鄆其廣五丈歲漕上供米六十二萬石太祖建隆二年正月遣使往定陶規度發曹單丁夫數萬浚之三月幸新水門觀放水入河先是五丈河泥淤不利行舟遂詔左監門衛將軍陳承昭於京城之西夾汴水造斗門引京索蔡河水通城濠入斗門俾架流汴水之上東進於五丈河以便東北漕運公私咸利三年正月遣右龍武統軍陳承昭護修五丈河役車駕臨視賜承昭錢二十萬乾德三年京師引五丈河造西水磑太宗太平興國三年正月命發近縣丁夫浚廣濟河真宗景德二年六月開封府言京西沿汴萬勝鎮先置斗門以減河水今汴河分注濁水入廣濟河堙塞不利帝曰此斗門本李繼源所造屢詢利害以為始因京索河遇雨即泛流入汴遂置斗門以便通泄若遽壅塞復慮決溢因令多用巨石京置斗門水雖甚大而餘波亦可減去三年內侍趙守倫建議自京東分廣濟河由定陶至徐州入清河以達江湖漕路役既成遣使覆視繪圖來上帝以地有隆阜而水勢極淺雖置堰埭又歷呂梁灘磧之險非可漕運罷之仁宗天聖六年七月尚書駕部員外郎閻貽慶言五丈河下接濟州之合蔡鎮通利梁山濼近者天河決蕩溺民田壞道路合蔡而下漫散不通舟請治五丈河入夾黃河因詔貽慶與水官李守忠規度計功料以聞神宗熙寧七年趙濟言河淺廢運自此物賤傷農宜議興復以便公私詔張士澄楊琰修治八月都提舉汴河堤岸司言欲於通津門汴河岸東城𩹉三十步內開河下通廣濟以便行運從之八年又遣琰同陳祐甫因汴河置滲水塘又自孫賈斗門置虛堤八滲水入西賈陂由減水河注霧澤陂皆為河之上源九年詔依元額漕粟京東仍修壩閘為啓閉之節九年三月詔遣官修廣濟河壩閘元豐五年三月癸亥罷廣濟輦運司移上供物自淮陽軍界入汴以清河輦運司為名命張士澄都大提舉七月御史王植言廣濟安流而上與清河泝流入汴遠近險易較然廢之非是詔監司詳議七年八月都大提舉汴河堤岸司言京東地富穀粟可漕獨患河澀若因修京城令役兵近汴穴土使之成渠就引河水注之廣濟則漕舟可通是一舉而兩利也從之哲宗元祐元年詔斥祥符霧澤陂募民承佃增置水匱又即宣澤門外仍舊引京索源河置槽架水流入咸豐門皆以為廣濟淺澀之備三月三省言廣濟河輦運近因言者廢罷改置清河輦運迂遠不便詔知棣州王諤措置興復都水監亦言廣濟河以京索河為源轉漕京東歲計今欲依舊即令於宣澤門外置槽架水流入咸豐門𩹉由舊河道復廣濟河源以通漕運從之金水河一名天源本京水導自滎陽黃堆山其源曰祝龍泉太祖建隆二年春命左領軍衛上將軍陳承昭率水工鑿渠引水過中牟名曰金水河凡百餘里抵都城西架其水橫絶於汴設斗門入浚溝通城濠東匯于五丈河公私利焉乾德三年又引貫皇城歷後苑內庭池沼水皆至焉開寶九年帝步自左掖按地勢命水工引金水由承天門鑿渠為大輪激之南注晉王第真宗大中祥符二年九月詔供備庫使謝德權決金水自天波門並皇城至乾元門歷天街東轉繚太廟入后廟皆甃以甓植以芳木車馬所經又纍石為間梁作方井官寺民舍皆得汲用復引東由城下水竇入于濠京師便之神宗元豐五年金水河透水槽阻礙上下汴舟遣宋用臣按視請自板橋別為一河引水北入于汴後卒不行乃由副堤河入于蔡以源流深遠與永安青龍河相合故賜名曰天源先是舟至啓漕頗滯舟行既導洛通汴遂自城西超字坊引洛水由咸豐門立堤凡三千三十步水遂入禁中而槽廢然舊惟供灑掃至徽宗政和間容佐請於七里河開月河一道分減此水灌溉內中花竹命宋措置導引四年十一月畢工重和元年六月復命藍從熙孟揆等增堤岸置橋槽壩閘濬澄水道水入內內庭池既多患水不給又於西南水磨引索河一派架以石渠絶汴南北築堤導入天源河以助之白溝無山源每歲水潦甚則通流才勝百斛船踰月不雨即竭至道二年三月內殿崇班閻光澤國子博士刑用之上言請開白溝自京師抵彭城呂梁口凡六百里以通長淮之漕詔發諸州丁夫數萬治之以光澤護其役議者非之會宋州通判王矩上表極陳其不可且言用之田園在襄邑歲苦水潦私幸渠成遂罷其役咸平六年用之為度支員外郎又令自襄邑下流治白溝河導京師積水而民田無害神宗熙寧六年都水監丞侯叔獻請儲三十六陂及京索二水為源倣真楚州開平河置閘則四時可行舟因廢汴渠帝曰白溝功料易耳第汴渠歲運甚廣河北陝西資焉又京畿公私所用良材皆自汴口而至何可遽廢王安石曰此役苟成亦無窮之利也當別為漕河引黃河一支乃為經久馮京曰若白溝成與汴蔡皆通漕為利誠大恐汴終不可廢帝然之詔劉璯同叔獻覆視八月都水監言白溝自濉河至于淮八百里乞分三年興修其廢汴河俟白溝畢功別相視仍請發穀熟淤田司並京東汴河所隸河清兵赴役從之七年正月都水監言自盟河畎導汴南諸水近者失於疏浚為害甚大於是輟夫修治而白溝之役廢初王安石欲罷白溝修汴南水利帝曰人多以白溝不可為而卿獨見可為安石曰果不可為罷之誠宜若可為即俟時為之何必計校人言也徽宗政和二年十月都水監丞孟昌齡言開濬含暉門外白溝河開堰放水仍舊通流京畿溝洫汴都地廣平賴溝渠以行水潦真宗景德二年五月詔開京城濠以通舟楫毀官水磑三所三年分遣入內內侍八人督京城內外坊里開濬溝渠先是京都每歲春濬溝瀆而勢家豪族有不即施工者帝聞之遣使分視自是不復有稽遲者以至雨潦暴集無所壅遏都人賴之大中祥符三年遣供備庫使謝德權治溝洫導太一宮積水以抵陳留界入亳州渦河五年三月帝宣示宰臣曰京師所開溝渠雖屢鈐轄仍令內侍分察吏擾仁宗天聖元年八月東西八作司與內殿承制閣門祗候劉永崇等言內外八廂創置八字水口通流兩水入渠甚利慮所置處豪富及勢要阻抑乞下令巡察從之二年七月內殿崇班閣門祗候張君平等言準敕按視開封府界至南京宿亳諸州溝河形勢疏決利害凡八事一商度地形高下連屬開治水勢依尋古溝洫浚之州縣計力役均定置籍以主之二施工開治後按視不如元計狀及水壅不行有害民田者按官吏之罪令償其費三約束官吏毋斂取夫衆財貨入己四縣令佐州守倅有能勸課部民自用工開治不致水害者為勞績替日與家便官功績尤多別議旌賞五民或於古河渠中修築堰堨截水取魚漸至澱淤水潦暴集河流不通則致深害乞嚴禁之六開治工畢按行新舊廣深丈尺以校工力以所出土於溝河岸一步外築為堤埒七凡溝洫上廣一丈則底廣八尺其深四尺地形高處或至五六尺以此為率有廣狹不等處折計之則畢工之日易於覆視八古溝洫在民田中久已淤平今為賦籍而須開治者據所占地步為除其賦詔令頒行神宗熙寧元年三月都水監言畿內溝河至多而諸縣各役人夫開淘十才二三須二三年方可畢工請令府界提點司選官與縣官同定緊慢功料據合差夫數以五分夫役十分工依年分開淘提點司通行點校從之二年閏十一月詔以府界道路積水妨民輸納命都水監差官溝畎元豐五年詔開在京城濠闊五十步深一丈五尺地脈不及者至泉止徽宗大觀元年七月以京城霖雨水浸居民道路不通遣官分督疏導是月又詔自京至八角鎮積水妨行旅轉運司選官疏導修治橋梁毋使病涉白河在唐州南流入漢太平興國三年正月西京轉運使程能獻議請自南陽下向口置堰回水入石塘沙河合蔡河達于京師以通湘潭之漕詔發唐鄧汝潁許蔡陳鄭丁夫及諸州兵凡數萬人以弓箭庫使王文寶六宅使李繼隆內作坊副使李神祐劉承圭等護其役塹山𦝪谷歷博望羅渠少柘山凡百餘里月餘抵方城地勢高水不能至能獻復多役人以致水然不可通漕運會山水暴漲石堰壞河不克就卒𦝪廢焉端拱元年供奉官閣門祗候閻文遜苗忠俱上言開荊南城東漕河至師子口入漢江可通荊峽漕路至襄州又開古白河可通襄漢漕路至京詔八作使石全振往視之遂發丁夫治荊南漕河至漢江可勝二百斛重載行旅者頗便而古白河終不可開三白渠在京兆涇陽縣淳化二年秋縣民杜思淵上書言涇河內舊有石翣以堰水入白渠溉雍耀田歲收三萬斛其後多歷年所石翣壞三白渠水少溉田不足民頗艱食乾德中節度判官施繼業率民用梢穰笆籬棧木截河為堰壅水入渠緣渠之民頗獲其利然凡遇暑雨山水暴至則堰輒壞至秋治堰所用復取於民民煩數役終不能固乞依古制調丁夫修疊石翣可得數十年不撓所謂暫勞永逸矣詔從之遣將作監丞周約己等董其役以用功尤大不能就而止至道元年正月度支判官梁鼎陳堯叟上鄭白渠利害按舊史鄭渠元引涇水自仲山西抵瓠口並北山東注洛三百餘里溉田四萬頃畝收一鍾白渠亦引涇水起谷口入櫟陽注渭水長二百餘里溉田四千五百頃兩渠溉田凡四萬四千五百頃今所存者不及二千頃皆近代改修渠堰浸隳舊防繇是灌溉之利絶少於古矣鄭渠難為興工今請遣使先詣三白渠行視復修舊迹於是詔大理寺丞皇甫選光祿寺丞何亮乘傳經度選等使還言周覽鄭渠之制用功最大並仲山而東鑿斷岡阜首尾三百餘里連亙山足岸壁頽壞𦝪廢已久度其制置之始涇河平淺直入渠口暨年代浸遠涇河陡深水勢漸下與渠口相懸水不能至峻崖之處渠岸摧毀荒廢歲久實難致力其三白渠溉涇陽櫟陽高陵雲陽三原富平六縣田三千八百五十餘頃此渠衣食之源也望令增築堤堰以固護之舊設節水斗門一百七十有六皆壞請悉繕完渠口舊有六石門謂之洪門今亦隤圮若復議興置則其功甚大且欲就近度其岸勢別開渠口以通水道歲令渠官行視岸之缺薄水之淤填即時浚治嚴豪民盜水之禁涇河中舊有石堰修廣皆百步捍水雄壯謂之將軍翣廢壞已久杜思淵嘗請興修而功不克就其後止造木堰凡用梢樁萬一千三百餘數歲出於緣渠之民涉夏水潦木堰遽壞漂流散失至秋復率民以葺之數斂重困無有止息欲令自今溉田既畢命水工拆堰木置於岸側可充二三歲修堰之用所役緣渠之民計田出丁凡調萬三千人疏渠造堰各獲其利固不憚其勞也選能吏司其事置署於涇陽縣側以時行視往復甚便又言鄧許陳潁蔡宿亳七州之地有公私間田凡三百五十一處合二十二萬餘頃民力不能盡耕皆漢魏以來召信臣杜詩杜預任峻司馬宣王鄧艾等立制墾闢之地內南陽界鑿山開道疏通河水散入唐鄧襄三州以溉田又諸處陂塘防埭大者長三十里至五十里闊五丈至八丈高一丈五尺至二丈其溝渠大者長五十里至百里闊三丈至五丈深一丈至一丈五尺可行小舟臣等周行歷覽若皆增築陂堰勞費頗甚欲隄防未壞可興水利者先耕二萬餘頃他處漸圖建置時著作佐郎孫冕總監三白渠詔冕依選等奏行之後自仲山之南移治涇陽縣其七州之田令選於鄧州募民耕墾皆免賦入復令選等舉一人與鄧州通判同掌其事選與亮分路按察未幾而罷景德三年鹽鐵副使林特度支副使馬景盛陳關中河渠之利請遣官行鄭白渠興修古制乃詔太常博士尚賓乘傳經度率丁夫治之賓言鄭渠久廢不可復今自介公廟回白渠洪口直東南合舊渠以畎涇河灌富平櫟陽高陵等縣經久可以不竭工既畢而水利饒足民獲數倍
