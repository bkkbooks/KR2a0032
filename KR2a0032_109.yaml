body:
  text: 宋史卷一百九志第六十二禮十二吉禮十二后廟景靈宮神御殿功臣配侑羣臣家廟后廟之制建隆三年追冊會稽郡夫人賀氏曰孝惠皇后止就陵所置祠殿奉安神主薦常饌不設牙盤祭器乾德元年孝明皇后王氏崩始議置廟及二后先後之次太常博士和峴請共殿別室以孝明正位內朝請居上室孝惠緣改葬不造虞主與孝明同祔宜居次室禮院又言后廟祀事一準太廟亦當立戟及太祖祔廟有司言合奉一后配食按唐睿宗追諡肅明昭成二后至睿宗崩獨昭成以帝母之重升配肅明止享於儀坤廟近周世宗正惠宣懿二后並先崩正惠無位號宣懿居正位遂以配食今請以孝明皇后配忌日行香廢務其孝惠皇后享於別廟從之太平興國元年追冊越國夫人符氏為懿德皇后尹氏為淑德皇后並祔后廟至道三年孝章皇后宋氏祔享有司言孝章正位中壼宜居上室懿德追崇后號宜居其次詔孝章殿室居懿德下六月禮官議按太平興國中追冊定諡皆以懿德居上淳化初宗正少卿趙安易言別廟祭享懿德在淑德之上未測升降之由其時敕旨依舊懿德在上按江都集禮晉景帝即位夏侯夫人應合追尊散騎常侍任茂傅玄等議云夏侯夫人初歸景帝未有王基之道不及景帝統百揆而亡后妃之化未著遠邇追尊無經義可據今之所議正與此同且淑德配合之初潛躍之符未兆懿德輔佐之始藩邸之位已隆然未嘗正位中宮母臨天下豈可生無尊極之位沒升配享之崇於人情不安於典籍無據唐順宗祔廟後十一年始以莊憲皇后升配憲宗祔廟後二十五年始以懿安皇后升配今請虛位允協舊儀再詔尚書省集議及禮官同詳定上議曰淑德皇后生無位號沒始追崇況在初潛早已薨謝懿德皇后享封大國作配先朝雖不及臨御之期且夙彰賢懿之美若以升祔當歸懿德又詳周世宗正惠宣懿配食故事當時議以正惠追尊位號請以宣懿為配是時以太后在位疑宣懿祔廟之後立忌非便議者引晉哀帝時何太后在上尊所生周氏為太妃封其子為琅邪王及太妃薨帝奔喪琅邪第七月而葬此則奔喪行服尚不厭降即忌日廢務於理無嫌今禮官引唐順憲二宗廟享虛位之文夫既追冊二后即虛室亦為非便請奉懿德神主升配又按議者以周世宗神主祔廟必若宣懿同祔即正惠神主請加太字今升祔懿德請即加淑德太字仍舊別廟詔以懿德配享至於太者尊極之稱加于母后施之宗廟禮所未安乃不加太字仍別廟配享十二月追尊賢妃李氏為元德皇太后有司言按周禮春官大司樂之職奏夷則歌仲呂以享先妣謂姜嫄也是帝嚳之妃后稷之母特立廟曰閟宮晉簡文宣后以不配食築室於外歲時享祭唐先天元年始祔昭成肅明二后于儀坤廟又玄宗元獻楊后立廟於太廟之西稽於前文咸有明據望令宗正寺於后廟內修奉廟室為殿三間設神門齊房神廚以備薦享咸平元年判太常禮院李宗訥等言元德皇太后別建廟室淑德皇后亦在別廟同是帝母而無太字按唐穆宗三后除宣懿升祔正獻恭僖二后並立別廟各有太字又開元初太常議昭成皇太后請不除太字云入廟稱后義繫於夫在朝稱太后義繫於子如諡冊入陵神主入廟則當去太字按神主入廟之說蓋為祔享太廟以厭降故不加太字則本朝文懿諸后是也如別建廟室不可但稱皇后則唐正獻恭僖二太后是也淑德皇后亦請加太字既加之後望遷就元德新廟居第一室以元德次之仍遷莊懷又次之詔下中書集議兵部尚書張齊賢等奏宗廟神靈務乎安靜况懿德作合之始逮事舅姑躬執婦道祔享之禮宜從後先伏請仍舊又漢因秦制帝母稱皇太后檢詳去歲議狀請加淑德太字而詔不加之者緣當時元德皇太后未行追冊今冊命已畢望依禮官所言三年四月乙卯祔葬元德皇太后于永熙陵有司言元德神主祔廟準禮當行祔謁載稽前典有未安者伏以追薦尊稱奉加太字崇建別廟以備蒸嘗況當禘祫之時不預合食之列廟享之制與諸后不同俟神主還京即祔廟室薦獻安神更不行祔謁之禮每歲五享禘祫如太廟儀景德四年奉莊穆皇后郭氏神主謁太廟祔享于昭憲皇后享畢祔別廟殿室在莊懷之上帝祀汾陰謁廟畢親詣元德皇太后廟躬謝自門降輦步入酌獻如太廟設登歌兩省御史宗室防禦使以上班廟內餘班廟外遣官分告孝惠諸后廟詔太廟元德皇后廟享用犢諸后廟親享用犢攝事用羊豕五年龍圖閣直學士陳彭年言禘祫日孝惠淑德二后神主自別廟赴太廟祔簡穆皇后神主之下太祖神主之上此蓋用曲臺禮別廟皇后禘祫祔享太廟之說竊慮明靈合享神禮未安望詔禮官再加詳定有司言按曲臺禮載禘祫之儀則如皇后先祔別廟遇禘祫祔享於太廟如是昭后即坐於祖姑之下南向如是穆后即坐於祖姑之下北向又按博士殷盈孫議云別廟皇后禘祫於太廟祔於祖姑之下者此乃皇后先沒已造神主如昭成肅明之沒也睿宗在位元獻之沒也玄宗在位昭德之沒也德宗在位四后於太廟未有本室故創別廟當為太廟合食之主故禘祫乃奉以入享此明其後太廟有本室即當遷祔帝方在位故皇后暫立別廟禮本合食故禘祫乃升太廟以未有位故祔祖姑之下據開寶通禮與曲臺禮同今有司不達禮意遇禘祫歲尚以孝惠孝章淑德三后神主祔享祖姑之下乃在太祖太宗之上按禮稱婦祔姐姑謂既卒哭之明日此正禮也稱祖姑有三人則祔於親者注玄謂舅之母死而又有繼室二人親者謂舅所生然則祖姑有三人同在祖室明婦有數人亦當同在夫之本室不可久祔於祖姑也故開元禮但載肅明皇后別廟時享之儀而無禘祫之禮即知別廟時享及禘祫皆於本廟也孝惠孝章淑德禘祫既祔太廟則自今禘祫祔享本室次於正主庶協典禮六年升祔元德皇后太宗廟室詔以祔廟歲時為合享次序而位明德皇后之次明道二年判河南府錢惟演請以章獻章懿二后並祔真宗之室太常禮院議夏商以來父昭子穆皆有配坐每室一帝一后禮之正儀唐開元中昭成肅明二后始並祔於睿宗今惟演引唐武宗母韋太后升祔穆宗本朝孝明孝章祔太祖故事按穆宗惟韋后祔太祖未嘗以孝章配伏尋先帝以懿德配享太宗及明德園陵禮畢遂得升祔元德太后自追尊後凡十七年始克升配今章穆皇后著位長秋祔食真宗斯為正禮章獻太后母儀天下與明德例同若從古禮止應祀后廟若便升祔似非先帝慎重之意又況前代無同日並祔之比惟上裁之乃詔有司更議皆謂章穆位崇中壼與懿德有異已祔廟室自協一帝一后之文章獻輔政十年章懿誕育帝躬功德莫與為比退就后廟未厭衆心按周官大司樂職奏夷則歌小呂以享先妣者姜嫄也帝嚳之妃后稷之母特立廟曰閟宮宜別立新廟奉安二太后神主同殿異室歲時薦享用太廟儀別立廟名自為樂曲以崇世享忌前一日不御正殿百官奉慰著之令甲乃作新廟兩廟間名曰奉慈慶曆四年從呂公綽言先帝特諡二后莊懷莊穆及上真宗文明武定章聖元孝之諡郭后升祔當正徽號宜於郊禮前遣官先上寶冊改莊為章止告太廟更不改題遂如故事將郊所司導五后寶冊赴三廟各於神門外幄次以待奏告畢皆納於室俄又詔中書門下令禮官考故事升祔章懿神主禮院言章獻章懿宜序章穆之次章惠先朝遺制嘗踐太妃至明道中始加懿號與章懷頗同請序章懷之次太者生事之禮不當施於宗廟章獻以顧託之重臨御之勞欲稱別廟義無所嫌屬之配室禮或未順學士王堯臣等言章獻明肅盛烈丕功非一惠可舉諡告於廟冊藏於陵無容追減章惠擁祐帝躬並均顧復故景祐中膺保慶之冊義專繫子禮須別祠章穆升附歲月已深奉慈三室先後已定若再議升降則情有重輕請如舊制中書門下覆議成憲在前文考之意配食一體二慈之宜奉承無私陛下之孝請如禮官及學士議案祥符詔繫章聖特旨位先後乞聖制定數昭示無窮詔依所議十月文德殿奉安寶冊帝服通天冠絳紗袍執圭太常奏樂百官宿廟堂次日有司薦享諸廟寅時復詣正衙宰臣行事官贊導冊寶至大慶殿庭發冊出宣德門攝太尉賈昌朝陳執中受以赴奉慈廟上寶冊告遷二主皆塗太字祔於太廟至和元年七月有司奉詔立溫成皇后廟享祭器數視皇后廟後以諫官言改為祠殿歲時令宮臣薦以常饌治平元年同判太常寺呂公著言按喪服小記慈母不世祭章惠太后仁宗嘗以母稱故加保慶之號蓋生有慈保之勤故沒有廟享之報今於陛下恩有所止禮難承祀其奉慈廟乞依禮廢罷熙寧二年命攝太常卿張掞奉章惠太后神主瘞陵園元豐六年詳定所言按禮夫婦一體故昏則同牢合巹終則同穴祭則同几同祝饌未嘗有異廟者也惟周人以姜嫄為媒神而帝嚳無廟又不可下入子孫之廟乃以別廟而祭故魯頌謂之閟宮周禮謂之先妣可也自漢以來不祔不配者皆援姜嫄為比或以其微或以其繼而已蓋其間有天下者起於側微而其后不及正位中宮或以嘗正位矣有所不幸則當立繼以奉宗廟故有祖姑三人則祔於親者之說立繼之禮其來尚矣始微終顯皆嫡也前娶後繼皆嫡也後世乃以始微後繼置之別廟不得伸同几之義則非禮意恭惟太祖孝惠皇后太宗淑德皇后真宗章懷皇后實皆元妃而孝章則太祖繼后乃皆祭以別廟在禮未安請升祔太廟增四室以時配享七月遂自別廟升祔焉政和四年有司言政和元年孟冬祫享奉惠恭神主入太廟祔于祖姑之下今歲當祫而明達皇后神主奉安陵祠緣在城外三代之制未有即陵以為廟者今明達皇后追正典冊歲時薦享並同諸后宜就惠恭別廟增建殿室迎奉神主以祔又言明達神主祔謁日於英宗室增設宣仁聖烈皇后明達皇后二位及遍祭七祀配享功臣並別廟祔享惠恭明達二位紹興七年惠恭改諡為顯恭以上徽宗聖文仁德顯孝之諡故也十二年五月禮部侍郎施坰言懿節皇后神主候至卒哭擇日祔廟合依顯恭皇后禮於太廟內修建殿室以為別廟安奉又言將來祔廟其虞主合於本室後瘞埋緣別係行在祔廟欲於本室冊寶殿收奉候回京日依別廟故事從之七月有司行九虞之祭奉安三十二年禮部太常言故妃郭氏追冊為皇后合依懿節皇后祭于別廟所有廟殿見安懿節皇后神主行禮狹隘乞分為二室以西為上各置戶牖及劈截本廟齊宮權安懿節神主工畢還殿王普又請各置祏室並從之乾道三年閏七月安恭皇后神主祔于別廟為三室景靈宮創於大中祥符五年聖祖臨降為宮以奉之天聖元年詔修宮之萬壽殿以奉真宗署曰奉真明道二年又建廣孝殿奉安章懿皇后治平元年又詔就宮之西園建殿以奉仁宗署曰孝嚴奉安御容親行酌獻命大臣分詣諸神御代行禮翼日太后酌獻皇后大長公主以下內外命婦陪位于廷詔每歲下元朝謁如奉真殿儀有期以上喪或災異則命輔臣攝事名齊殿曰迎釐宮西門曰廣祐四年建英德殿奉英宗神御凡七十年間神御在宮者四寓寺觀者十有一元豐五年始就宮作十一殿悉迎在京寺觀神御入內盡合帝后奉以時王之禮十一月百官班于集英殿廷帝詣蘂珠凝華等殿行告遷廟禮禮儀使奉神御升綵輿出殿明日復行薦享如禮禮儀使奉神輿行帝出幄導至宣德門外親王使相宗室正任以上前引望參官及諸軍都虞候宗室副率以上陪位內侍省押班整儀衛以從奉安神御于十一殿明日帝詣宮朝獻先謁天興殿以次行禮並如四孟儀詔自今朝獻孟春用十一日孟夏擇日孟秋用中元日孟冬用下元日天子常服行事薦聖祖殿以素饌神御殿以膳羞器服儀物悉從今制天興殿門以奉天神不立戟諸神御門置親事官五百人立戟二十四纍朝文武執政官武臣節度使以上並圖形於兩廡凡執政官除拜赴宮恭謝其後南郊先詣宮行薦享禮並如太廟儀元祐元年太常寺言季秋有事于明堂其朝享景靈宮親享太廟當用三年不祭之禮遣大臣攝事禮部言景靈宮天興殿用天地之禮即非廟享於典禮無違詔明堂前二日朝享景靈宮天興殿明年奉安神宗神御于景靈宮如十一殿奉安之禮舊制車駕上元節以十一日詣興國寺啓聖院朝謁太祖太宗神宗神御下元節詣景靈宮朝拜天興殿朝謁真宗仁宗英宗神御至是詔分每歲四孟月拜謁之所自孟秋始其不當親獻則遣官分詣初詣天興殿保寧閣天元殿太始殿次詣皇武殿儷極殿大定殿輝德殿次詣熙文殿衍慶殿美成殿次詣治隆殿宣光殿宣光後改曰顯承徽宗又改大明殿仍自來年孟春為始皇太后崩三省請奉安神御于治隆殿以遵元祐初詔復以御史劉極之言特建原廟廟成名神御殿曰徽音山殿曰寧真紹聖二年奉安神宗神御于顯承殿元豐中每歲四孟月天子遍詣諸殿朝獻元祐初議者請以四孟分獻一歲而遍至是復用舊儀詔自今四孟朝獻分二日先日詣天興殿保寧閣天元太始皇武儷極大定輝德諸殿次日詣熙文衍慶美成繼仁治隆徽音顯承七殿三年十月帝詣天興諸殿朝獻翼日大雨詔差已致齊官分獻熙文七殿自是雨雪用為例云徽宗即位宰臣請特建景靈西宮奉安神宗于顯承殿為館御之首昭示萬世尊異之意建哲宗神御殿於西以東偏為齊殿乃給度僧牒紫衣牒千道為營造費戶牖工巧之物並置於荊湖北路已而右正言陳瓘言五不可且論蔡京矯誣不從建中靖國元年詔建欽聖憲肅皇后欽慈皇后神御殿于大明殿北名曰柔明尋改欽儀又改坤元又名哲宗神御殿曰觀成尋改重光詔自今景靈宮並分三日朝獻崇寧三年奉安欽成皇后神御坤元殿欽聖憲肅皇后之次欽慈皇后又次之政和三年奉安哲宗神御于重光殿昭懷皇后神御殿成詔名正殿曰柔儀山殿曰靈娭於是兩宮合為前殿九後殿八山殿十六閣一鍾樓一碑樓四經閣一齊殿三神廚二道院一及齊宮廊廡共為二千三百二十區初東京以來奉先之制太廟以奉神主歲五享宗室諸王行事朔祭而月薦新則太常卿行事景靈宮以奉塑像歲四孟皇帝親享帝后大忌則宰相率百官行香后妃繼之遇郊祀明堂大禮則先期二日親詣景靈宮行朝享禮紹興十三年二月臣僚言竊見元豐五年神宗始廣景靈宮以奉祖宗衣冠之游即漢之原廟也自艱難以來庶事草創始建宗廟而原廟神游猶寄永嘉乃者權時之宜四孟薦獻旋即便朝設位以享未副廣孝之意乞命有司擇爽塏之地倣景靈宮舊規隨宜建置俟告成有日迎還晬容奉安新廟庶幾四孟躬行獻禮用副罔極之恩從之初築三殿聖祖居前宣祖至祖宗諸帝居中殿元天大聖后與祖宗諸后居後掌宮內侍七人道士十人吏卒二百七十六人上元結燈樓寒食設鞦韆七夕設摩羅簾幕歲時一易歲用酌獻二百四十羊凡帝后忌辰用道釋作法事十八年增建道院初本劉光世賜第後以韓世忠第增築之天興殿五楹中殿七楹後殿十有七楹齊殿進食殿皆備焉神御殿古原廟也以奉安先朝之御容宣祖昭憲皇后於資福寺慶基殿太祖神御之殿七太平興國寺開先殿景靈宮應天禪院西院南京鴻慶宮永安縣會聖宮揚州建隆寺章武殿滁州大慶寺端命殿太宗神御之殿七啓聖禪院壽寧堂景福殿鳳翔上清太平宮並州崇聖寺統平殿及西院鴻慶宮會聖宮真宗神御之殿十有四景靈宮奉真殿玉清昭應宮安聖殿洪福院壽寧堂福聖殿崇先觀永崇殿萬壽觀延聖殿澶州信武殿西京崇福宮保祥殿華州雲臺觀集真殿及西院鴻慶宮會聖宮鳳翔太平宮仁宗英宗神宗哲宗四朝神御於景靈宮應天院章獻明肅皇后於慈孝寺彰德殿章懿皇后於景靈宮廣孝殿明德章穆二后於普安院重徽殿章惠太后於萬壽觀廣慶殿景德四年奉安太祖御容應天禪院以宰臣向敏中為奉安聖容禮儀使權安于文德殿百官班列帝行酌獻禮鹵簿導引升綵輿進發帝辭于正陽門外百官辭于瓊林苑門外遣官奏告昌陵畢羣臣稱賀皇祐中以滁州通判王靖請滁並澶三州建殿奉神御乃宣諭曰太祖擒皇甫暉于滁州是受命之端也大慶寺殿名曰端命以奉太祖太宗取劉繼元于並州是太平之統也即崇聖寺殿名曰統平以奉太宗真宗歸契丹于澶州是偃武之信也即舊寺殿名曰信武以奉真宗既而統平殿災諫官范鎮言並州素無火災自建神御殿未幾而輒焚天意若曰祖宗御容非郡國所宜奉安者近聞下並州復加崇建是徒事土木重困民力非所以答天意也自並州平七十七年故城父老不入新城宜寬其賦輸緩其徭役以除其患使河東之民不忘太宗之德則陛下孝思豈特建一神御殿比哉先是睦親廣親二宅並建神御殿翰林學士歐陽修言神御非人臣私家之禮下兩制臺諫禮官議以為漢用春秋之義罷郡國廟今睦親宅廣親宅所建神御殿不合典禮宜悉罷詔以廣親宅置已久唯罷修睦親宅熙寧二年奉安英宗御容於景靈宮帝親行酌獻仍詔歲以十月望朝享有期以上喪或災異則命輔臣攝事知大宗正丞事李德芻言禮法諸侯不得祖天子公廟不設於私家今宗室邸第並有帝后神御非所以明尊卑崇正統也望一切廢罷下禮官詳定請如所奏詔諸宗室宮院祖宗神御迎藏天章閣自是臣庶之家凡有御容悉取藏禁中元豐五年作景靈宮十一殿而在京宮觀寺院神御皆迎入禁中所存惟萬壽觀延聖廣愛寧華三殿而已宣和元年禮部奏太常寺參酌立到諸州府有祖宗御容所在朔日諸節序降到御封香表及下降香表行禮儀注朔日諸節序奉香表行禮儀注齊戒朝拜前一日朝拜官及讀表文官早赴齊所俟禮備禮生引讀表文官賫香表官集朝拜官聽執事者以香表呈視禮生請讀表文官稍前習讀表或密詞即讀封題訖禮生贊復位次以御封香禮饌等呈視訖各復齊所朝拜官用長吏闕以次官充讀表文亦以次官充執事者以有服色者充有司設香案時果牙盤食神御前又設奠醪茗之器於香案前之左置御封香表案上設朝拜官位於殿下西向讀表文官位於殿之南北向陪位官位於其後設焚表文位於殿庭東南向朝拜日質明前香火官先詣殿下北向拜訖升殿東向侍立有司陳設訖禮生先引陪位官入就位北向次引讀表文官入就位次引朝拜官就位西向立定禮生贊有司謹具請行事禮生贊再拜拜訖引讀表文官先升殿於香案之右東向立次引朝拜官詣香案前贊搢笏上香奠酒茗拜興少立禮生贊搢笏跪讀表文或密詞即讀封題執笏興降復位朝拜官再拜降復位禮生贊再拜訖引朝拜官讀表文官詣焚表文位南向立焚訖退一遇旦望諸節序下降香表薦獻行禮儀注一如上儀惟禮生引獻官上香訖跪執事者以所薦之物授薦獻官受獻訖復授執事者置於神御前興拜退一如上儀詔頒行之東京神御殿在宮中舊號欽先孝思殿建炎二年閏四月詔迎溫州神御赴闕先是神御於溫州開元寺暫行奉安章聖皇帝與后像皆以金鑄置外方弗便因愀然謂宰輔曰朕播遷至此不能以時薦享祖宗神御越在海隅念之坐不安席故有是命三年二月上覽禁中神御薦享禮物謂宰臣曰朕自省閲神御每位各用羊胃一須二十五羊祖宗仁厚豈欲多害物命謹以別味代之在天之靈亦必歆享呂頤浩曰陛下寅奉宗廟罔不盡禮而又仁愛及物天下幸甚紹興十五年秋復營建神御殿于崇政殿之東朔望節序帝后生辰皇帝皆親酌獻行香用家人禮其殿名徽宗曰承元欽宗曰端慶高宗曰皇德孝宗曰系隆光宗曰美明寧宗曰垂光理宗曰章熙度宗曰昭光功臣配享真宗咸平二年始詔以太師贈尚書令韓王趙普配享太祖廟庭繼以翰林承旨宋白等議又以故樞密使贈中書令濟陽郡王曹彬配享太祖以司空贈太尉中書令薛居正忠武軍節度使贈中書令潘美尚書右僕射贈侍中石熙載配享太宗廟庭仍奏告本室禘祫皆配之祀日有司先事設幄次布褥位於廟庭東門內道南當所配室西向設位板方七寸厚一寸半籩豆各二簠簋俎各一知廟卿奠爵再拜乾興元年詔從翰林禮官參議以右僕射贈太尉中書令李沆贈太師尚書令王旦忠武軍節度使贈中書令李繼隆配享真宗嘉祐八年詔以尚書右僕射贈尚書令王曾太尉贈尚書令呂夷簡彰武軍節度使贈侍中曹瑋配享仁宗熙寧八年詔以司徒兼侍中贈尚書令韓琦配享英宗元豐元年又以贈太師中書令曾公亮配焉熙寧末嘗詔太常禮院講求親祠太廟不及功臣禮例至是禘祫外親享太廟並以功臣與又從太常禮院請配享功臣以見贈官書板位元祐初從吏部尚書孫永等議以故司徒贈太尉富弼配享神宗紹聖初又以守司空贈太傅王安石配三年罷富弼配謂弼得罪於先帝也崇寧元年詔以觀文殿大學士贈太師蔡確配享哲宗五禮新儀配享功臣之位設於殿庭之次趙普曹彬位於橫街之南道西東向第一次薛居正石熙載潘美位于第二次李沆王旦李繼隆位於第三次俱北上王曾呂夷簡曹瑋位於橫街之南道東西向第一次韓琦曾公亮位於第二次王安石位於第三次蔡確位於第四次俱北上惟冬享祫享遍設祭位逮建炎初詔奪蔡確所贈太師汝南郡王追貶武泰軍節度副使更以左僕射贈太師司馬光配享哲宗既又罷王安石復以富弼配享神宗紹興八年以尚書左僕射贈太師韓忠彥配享徽宗十八年二月監登聞鼓院徐璉言國家原廟佐命配享當時輔弼勳勞之臣繪像廟庭以示不忘纍朝不過一十餘人今之臣僚與其家之子孫必有存其繪像者望詔有司尋訪復摹於景靈宮庭之壁非獨假寵諸臣之子孫所以增重祖宗之德業以為臣子勸遂下諸路轉運司委所管州軍尋訪各家韓王趙普周王曹彬太師薛居正石熙載鄭王潘美太師李沆王旦李繼隆王曾呂夷簡侍中曹瑋司徒韓琦太師曾公亮富弼司馬光韓忠彥各令摹寫貌像投納繪於景靈宮之壁乾道五年九月太常少卿林栗等言欽宗皇帝廟庭尚虛配享當時遭值艱難淪胥莫救罕可稱述而以身徇國名節暴著不無其人雖生前官品不應配享之科事變非常難拘定制乞特詔集議吏部尚書汪應辰奏當時死事之臣皆有次第褒贈若今配享欽廟典故所無如創行之又當訪究本末差次輕重有所取舍尤不可輕易竊謂配享功臣若依唐制各廟既無其人則當缺之乃罷集議欽宗一廟遂無配享淳熙中高宗祔廟翰林學士洪邁言配食功臣先期議定臣兩蒙宣諭欲用文武臣各兩人文臣故宰相贈太師秦國公諡忠穆呂頤浩特進觀文殿大學士諡忠簡趙鼎武臣太師蘄王諡忠武韓世忠太師魯王諡忠烈張俊此四人皆一時名將相合於天下公論議者皆以為宜遂從之祕書少監楊萬里獨謂丞相張浚不得配食為非爭之不得因去位焉紹熙五年十二月以左丞相贈太師魯國公陳康伯配享孝宗廟庭嘉泰元年正月以右丞相贈太師葛邲配享光宗廟庭嘉定十四年八月追封右丞相史浩為越王改諡忠定配享孝宗廟庭端平二年八月以太師趙汝愚配享寧宗廟庭初仁宗天聖中郊祀詔録故相李昉宋琪呂端張齊賢畢士安王旦執政李至王沔溫仲舒及陳洪進等子孫以官元豐中詔景靈宮繪像舊臣推恩本支下兩房以上取不食祿者均有無取齒長者若子孫亦繪像本房不食祿更不取別房紹聖初林希請稽考慶曆以後未經編次臣僚其子孫應録用者以次編定尋詔趙普社稷殊勳其諸孤有無食祿者各官其一子以長幼為序毋過三人崇寧初詔哲宗繪像文武臣僚並與子若孫一人初品官若子孫衆多無過家一人又録藝祖功臣呂餘慶族孫偉及司徒富弼孫直柔直道以官使奉其祀靖康初臣僚言司馬光之後再絶復立族子稹稹亦卒今雖有子而光遺表恩澤已五十年不可復奏請許移奏見存曾孫使之世祿從之羣臣家廟本於周制適士以上祭於廟庶士以下祭於寢唐原周制崇尚私廟五季之亂禮文大壞士大夫無襲爵故不建廟而四時寓祭室屋慶曆元年南郊赦書應中外文武官並許依舊式立家廟已而宋庠又以為言乃下兩制禮官詳定其制度官正一品平章事以上立四廟樞密使知樞密院事參知政事樞密副使同知樞密院事簽書院事見任前任同宣徽使尚書節度使東宮少保以上皆立三廟餘官祭於寢凡得立廟者許適子襲爵以主祭其襲爵世降一等死即不得作主祔廟別祭於寢自當立廟者即祔其主其子孫承代不計廟祭寢祭並以世數疏數遷祧始得立廟者不祧以比始封有不祧者通祭四廟五廟廟因衆子立而適長子在則祭以適長子主之嫡長子死即不傳其子而傳立廟者之長凡立廟聽於京師或所居州縣其在京師者不得於𩹉城及南郊御路之側仍別議襲爵之制既以有廟者之子孫或官微不可以承祭而朝廷又難盡推襲爵之恩事竟不行大觀二年議禮局言所有臣庶祭禮請參酌古今討論條上斷自聖衷於是議禮局議執政以上祭四廟餘通祭三廟古無祭四世者又侍從官以至士庶通祭三世無等差多寡之別豈禮意乎古者天子七世今太廟已增為九室則執政視古諸侯以事五世不為過矣先王制禮以齊有萬不同之情賤者不得僭貴者不得踰故事二世者雖有孝思追遠之心無得而越事五世者亦當跂以及焉今恐奪人之恩而使通祭三世徇流俗之情非先王制禮等差之義可文臣執政官武臣節度使以上祭五世文武升朝官祭三世餘祭二世應有私第者立廟於門內之左如狹隘聽於私第之側力所不及仍許隨宜又詔古者寢不踰廟禮之廢失久矣士庶堂寢踰度僭禮有七楹九楹者若一旦使就五世三世之數則當徹毀居宇以應禮制豈得為易行可自今立廟其間數視所祭世數寢間數不得踰廟事二世者寢聽用三間議禮局言禮記王制諸侯五廟二昭二穆與太祖之廟而五所謂太者蓋始封之祖不必五世又非臣下所可通稱今高祖以上一祖未有名稱欲乞稱五世祖其家廟祭器正一品每室籩豆各十有二簠簋各四壺尊罍鉶鼎俎篚各二尊罍加勺各一爵各一諸室共用胙俎罍洗一從一品籩豆簠簋降殺以兩正二品籩豆各八簠簋各二餘皆如正一品之數詔禮制局製造仍取旨以給賜之紹興十六年二月癸丑詔太師左僕射魏國公秦檜合建家廟命臨安守臣營之太常請建於其私第中門之左一堂五室五世祖居中東二昭西二穆堂飾以黝堊神板長一尺博四寸五分厚五寸八分大書某官某大夫之神坐貯以帛囊藏以漆函歲四享用孟月柔日行之具三獻有司言時享用常器常饌帝倣政和故事命製祭器賜之其後太傅昭慶節度平樂郡王韋淵太尉保慶節度吳益少傅寧遠節度楊存中並請建家廟賜以祭器隆興二年四月庚辰少師四川宣撫使吳璘請用存中例從之乾道八年九月詔有司賜少保武安節度四川宣撫使虞允文家廟祭器如故事淳熙五年七月戶部尚書韓彥古請以賜第進父世忠家廟如存中十二月少傅保寧節度衛國公史浩請建家廟量賜祭器嘉泰元年太傅永興節度平原郡王韓托胄奏曾祖琦效忠先朝奕世侑食家廟猶闕請下禮官考其制建之二年循忠烈王張俊開禧三年鄜武僖王劉光世子孫相繼有請皆從之嘉定十四年八月詔右丞相史彌遠賜第遵淳熙故事賜家廟命臨安守臣營之禮官討論祭器並如托胄之制彌遠請併生母齊國夫人周氏及祔妻魯國夫人潘氏於生母別廟皆下有司賜器景定三年詔丞相賈似道賜家廟命臨安守漕營度禮官討論賜祭器並如儀
