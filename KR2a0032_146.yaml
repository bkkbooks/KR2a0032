body:
  text: 宋史卷一百四十六志第九十九儀衛四政和大駕鹵簿并宣和增減小駕附政和大駕鹵簿象六分左右次六引開封令開封牧大司樂少傅御史大夫兵部尚書各用本品鹵簿次金吾纛矟左右皂纛各六執托各一人四人押衙四人並騎犦矟八執各一人本衛上將軍將軍各四人本衛大將軍二人並騎犦矟四夾大將軍執各一人夾二人並騎法駕犦矟減二本衛上將軍將軍各減二人次朱雀旗隊並騎金吾衛折衝都尉一人引隊犦矟二夾都尉執旗一人引夾各二人凡仗內引夾執人數準此弩四弓矢十六矟二十左右金吾衛果毅都尉二人押隊法駕弩減二弓矢減六矟減八宣和引隊改天武都指揮使押隊改天武指揮使次龍旗隊大將軍一員檢校騎引旗十二人並騎風伯雨師雷公電母旗各一五星旗五左右攝提旗二北斗旗一護旗十二人副竿二執人並騎法駕引旗護旗人各減四宣和檢校改左右衛大將軍雷公電母旗去公母二字次指南記里鼓車各一駕馬各四駕士各三十人白鷺鸞旗崇德皮軒車各一駕士各十八人法駕無白鷺崇德車宣和有青旌青雀鳴鳶飛鴻虎皮貔貅六車在記里鼓之下崇德之前減白鷺鸞旗皮軒三車駕士之數如前次金吾引駕騎本衛果毅都尉二人儀刀弩弓矢矟各減二宣和改都尉為神勇都指揮使次大晟府前部鼓吹令二人府史四人管押指揮使一人掆鼓金鉦各十二帥兵官八人領大鼓一百二十帥兵官二十人領長鳴一百二十帥兵官六人領鐃鼓十二帥兵官四人領歌工拱宸管簫笳各二十四大橫吹一百二十帥兵官十人領節鼓二笛簫觱篥笳桃皮觱篥各二十四掆鼓金鉦各十二帥兵官四人領小鼓中鳴各一百二十帥兵官八人領羽葆鼓十二帥兵官四人領歌工拱宸管簫笳各二十四法駕前後掆鼓金鉦各減四大鼓減四十長鳴減四十鐃鼓減四拱宸管後簫笳各減八大橫吹減四十節鼓後笛簫觱篥笳桃皮觱篥各減八小鼓中鳴各減四十羽葆鼓減四最後簫笳各減八帥兵共減十八人次太史相風行漏等輿太史令及令史各一人並騎相風烏輿一輿士四人交龍鉦鼓各一輿士各六人司辰典士各一人並騎漏刻生四人鼓樓鐘樓行漏輿各一輿士各一百人太史正一人清道二人十二神輿一輿士十四人法駕行漏輿一輿士減四十人神輿一輿士多大駕二人宣和鼓鐘樓並改為輿太史正前有捧日副指揮使二人捧日節級十人神輿輿士增十次持鈒前隊左右武衛果毅都尉二人引隊左右武衛校尉二人絳引幡一二人左右有金節十二執人並騎各一朱雀幢叉導蓋青龍白虎幢各一叉三執人並騎稱長一人鈒戟二百八十八左右武衛將軍二人檢校左右武衛校尉四人押隊法駕金節減四鈒戟減七十二宣和引隊改驍騎都指揮使武衛校尉改驍騎軍使增朱雀旗後之叉一去龍虎旗後之叉三檢校改用左右驍騎將軍次黃麾幡一執一人騎二人法駕前有殿中侍御史二員次六軍儀仗左右神武軍左右羽林軍左右龍武軍各有統軍二員都頭二人羽林又有節級二人押仗本軍旗各一排闌旗各二十合有吏兵力士旗各五掩尾天馬旗二羽林有赤豹黃熊旗龍武有龍君虎君旗各一白柯槍五十哥舒棒十鐙仗八法駕神武軍減排闌旗十羽林龍武軍各減四吏兵力士旗各減一宣和統軍改軍將神武軍旗改熊虎排闌旗改平列哥舒棒改戈戟鐙杖改矛戟羽林隊無節級黃熊旗改黃羆龍武旗改熊虎次引駕旗天王旗二排仗通直官二人押旗十二辰旗各一法駕同次龍墀旗天下太平旗一排仗大將二人夾旗五方龍旗各一金鸞金鳳旗各一師子旗二君王萬歲旗一日月旗各一法駕減鸞鳳師子旗次御馬二十四控馬每匹天武二人御馬直二人為十二重法駕減八為八重宣和御馬直改為習馭次中道隊大將軍一員檢校法駕同宣和大將軍改為左右驍衛大將軍次日月合璧旗一苣文旗二五星連珠旗一祥雲旗二長壽幢二宣和苣文改慶雲祥雲改祥光次金吾細仗青龍白虎旗各一五嶽神旗五方神旗五方龍旗五方鳳旗各五已上執各一人各三人法駕五方龍鳳旗各減二宣和改校尉為使臣五嶽神旗去神字次八寶鎮國神寶皇帝之寶皇帝行寶皇帝信寶在左受命寶天子之寶天子行寶天子信寶在右為四重香案八各以二列於寶輿之前碧襴二十四人符寶郎行於碧襴之間法駕減碧襴八人宣和增引寶職掌二人香案職掌六人援衛傳喝親從一百人奉寶輦官每寶二十八人節級一人奉寶一十二人舁香案行馬執燭籠各四人持席褥油衣共三人香案寶輿各九燭籠三十六碧襴之數同前次方繖二大雉尾扇四夾執繖扇各一人以下準此法駕同次金吾四色官六人押仗二人法駕減押仗次金甲二人宣和改為銅甲次太僕寺進馬四人並騎次引駕千牛衛上將軍一員千牛八人中郎將二人並乘珂馬千牛二人並騎宣和引駕改為千牛衛大將軍中郎將改為捧日都虞候次長史二人並騎宣和無次金吾引駕官四人並騎次導駕官執政以上人從六人待制諫議防禦使以上五人監察御史刺史諸衛將軍以上四人次繖扇輿輦大繖二中雉尾扇四夾腰輿一小雉尾扇四夾應奉人員一人十將將虞候節級二人長行十六人排列官二人中雉尾扇十二華蓋二執各二人香鐙一執擎八人小輿一應奉人逍遙平輦下人長行二十四人逍遙子一應奉人十將將虞候節級共九人長行二十六人平輦一應奉人員七人餘同上法駕排列官後中雉尾扇減四宣和去小雉尾扇四腰輿一添管押人員二人都將四人僉押小輿排列官二人小輿一奉輿二十四人都將九人逍遙子改為逍遙輦奉輦一十六人平輦一奉輦人同上後有上輦奉御二人騎小輿前又有大輅一駕馬六太僕卿御駕士一百二十人次駕前東第五班開道旗一皂纛旗十二引駕六十二人鈞容直三百人引駕回作樂五方色龍旗五門旗四十御龍四直步執門旗六十天武駕頭下一十二人茶酒班執從物一十一人御龍直仗劍六人天武把行門八人麋旗一殿前班擊鞭一十人簇輦龍旗八日月麟鳳旗四青白赤黑龍旗各一御龍直四十人踏路馬二夾輅大將軍二員進輅職掌二員部押二人教馬官二員法駕同宣和無鈞容直開道旗內增押班一人殿侍二人皂纛旗十二殿侍十二人執引駕人員二人長行六十人五方色吉字旗殿侍三人管押十人門旗殿侍二人管押四十人叉八門旗六十御龍直一十二人骨朵直十二人御龍弓箭直弩直各十八人御龍直仗劍六人執麋旗殿侍二人管押龍旗人員二人都知副都知各一人執骨朵殿侍十六人內大將軍改為千牛衛大將軍朝服步從將軍二人朝服陪乘掌輦四人皇帝乘玉輅駕青馬六駕士一百二十八人扶駕八人骨朵直一百三十四人行門三十五人分左右陪乘將軍二員法駕同宣和駕士增為二百三十四人次奉宸隊御龍直左廂骨朵子直右廂弓箭直弩直御龍四直並以逐班直所管人數列為五重天武骨朵大劍三百一十人次駕後東第五班大黃龍旗一鈞容直三十一人扇筤下天武二十人茶酒班簇輦三十一人招箭班三十三人法駕同宣和止用黃龍旗餘並無次副玉輅一駕青馬六駕士四十人法駕無宣和駕士一百人內人員二人次大輦一掌輦四人應奉人員十二人十將將虞候節級共十人長行三百五十五人尚輦奉御二人殿中少監供奉職官二員令史四人書令史四人法駕同宣和增奉輦為九十人次太僕御馬二十四為十二重法駕減八為八重宣和無太僕次持鈒後隊左右武衛旅帥二人法駕同宣和改為神勇都指揮使次重輪旗二大繖二大雉尾扇四小雉尾扇朱團扇各十二華蓋二叉二睥睨十二御刀六真武幢一絳麾二叉一細矟十二法駕小雉尾扇朱團扇睥睨矟各減四華蓋減一御刀減二宣和真武幢改為玄武次左右金吾衛果毅都尉二人並騎總領大角一百二十法駕減四十宣和改都尉為驍騎都指揮使次大晟府後部鼓吹丞二人典事四人管轄指揮使一人羽葆鼓十二帥兵官四人領歌工拱宸管簫笳各二十四帥兵官二人領鐃鼓十二帥兵官四人領歌工簫笳各二十四小橫吹一百二十帥兵官八人領笛簫觱篥笳桃皮觱篥各二十四法駕羽葆鼓減四簫笳笛觱篥桃皮觱篥各減八鐃鼓減四小橫吹減四十帥兵官並減二人宣和帥兵官改為天武神勇宣武虎翼四都頭次黃麾一執人數同前部法駕亦同有殿中侍御史二員在黃麾前芳亭輦一奉輦六十人鳳輦一奉輦五十人法駕去鳳輦宣和芳亭奉輦六十二人次金象革木四輅並有副輅金輅踏路赤馬二正副各駕赤馬六駕士六十人餘輅正副駕馬數同而色異象輅以赭白革輅以騮木輅以黑駕士各四十人法駕前副輅宣和駕馬之色又異金以騮象以赤革以赭白木以烏駕士正百五十人副一百人管押人員各二人耕根車一駕青馬六駕士四十人法駕同宣和無進賢車一駕士二十四人明遠車一駕士四人法駕無宣和各增駕馬四次屬車十二乘每乘駕牛三駕士十人法駕減四乘宣和增衙官二人管押節級一人次門下中書祕書殿中四省局官各二員法駕同次黃鉞車豹尾車各一各駕赤馬二駕士十五人法駕除進賢明遠車外並同宣和有黃鉞天武副都頭及神勇副都頭各一次掩後隊左右威衛折衝都尉二人領隊大戟刀盾弓矢矟各五十法駕各減十六宣和押隊改用宣武都指揮使二人次真武隊金吾衛折衝都尉一人犦矟二仙童旗一真武旗一螣蛇神龜旗各一矟二十五弓矢二十弩五法駕矟減六弓矢減五弩減一宣和改為玄武隊改真武為玄武又去仙童龜蛇旗改都尉為虎翼都指揮使政和大駕外仗清游隊次第六引外仗白澤旗二左右金吾衛折衝都尉二人弩八弓矢三十二矟四十法駕次第三引外仗弩減二弓矢減八矟減十宣和改都尉為捧日都指揮使左右金吾各十六騎帥兵官二人弩八弓矢矟各十二法駕金吾騎及弓矢矟各減四宣和改金吾為天武都頭次佽飛隊左右金吾衛果毅都尉二人分領並騎虞候佽飛四十八人並騎鐵甲佽飛二十四人並甲騎法駕前減十八人後減八人宣和改金吾衛為拱聖都指揮使改都尉為都指揮使次前隊殳仗左右領軍衛將軍二人檢校並騎犦矟四殳叉分五隊第一一百六十人第二八十人第三一百人第四第五各八十人逐隊有帥兵官左右領軍衛左右威衛左右武衛左右驍衛左右衛各四人法駕殳叉第一隊減六十第二第三各減三十第四第五各減二十宣和改檢校為左右衛將軍領軍衛為天武都頭威衛為神勇都頭武衛為宣武都頭驍衛為虎翼都頭殳叉第一隊減六十增第二隊至第五隊為一百次後隊殳仗殳叉分五隊第一第二八十人第三一百人第四八十人第五一百六十人帥兵官左右衛左右驍衛左右武衛左右威衛左右領軍衛凡前後隊殳仗前接中道北斗旗後盡鹵簿後隊法駕殳叉第一第二隊各減二十四第三第四各減三十第五減六十宣和殳叉各一百天武神勇宣武虎翼廣勇都頭次前部馬隊凡十二皆以都尉二人分領第一前左右金吾衛折衝領角亢斗牛宿旗四弩十弓矢二十矟四十第二氐房女虛宿旗四第三心危宿旗第四尾室宿旗各二以上四隊各以左右領軍衛果毅領第五箕壁宿旗第六奎井宿旗各二各以左右威衛折衝領第七婁鬼宿旗第八胃柳宿旗第九昴星宿旗各二各以左右武衛果毅領第十畢張宿旗第十一觜翼宿旗第十二參軫宿旗各二各以左右驍衛折衝領弩弓矢矟人數同第一隊法駕分二十八宿旗為十隊逐隊弩減四弓矢減六矟減二十宣和