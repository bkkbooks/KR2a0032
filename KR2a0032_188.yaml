各二陳留東明尉氏太康西京河陽濮鄆鞏河陰白波寧陵各一熙寧三年鄆川橋道改橋道隸順化清塞十二曹二鄭鄆滑通利鞏河陰白波汜水各一長葛二崇武崇寧三年置步軍京東西河東北崇威崇寧三年置步軍京東西河東北敢勇元祐七年詔河東陝西路諸帥府募敢勇以百人為額宣和四年詔越州招到敢勇三百人撥充兩浙提刑司捉殺差使靖安崇寧元年詔荊湖北路添置禁軍五指揮以靖安為名隸侍衛步軍司廣固崇寧三年詔添置廣固兵四指揮以備京城工役政和五年詔於四指揮各增置五百人入額自今更勿差客軍通濟政和六年詔增置通濟兵士二千人牽挽御前綱運自崇武至此六軍中興後無清衛宣和七年減清衛等軍令步軍司撥填一般軍分刀牌手崇寧中立廣西桂州徑勇壯武靜江自徑勇以下三軍舊隸廂軍中興後隸侍衛步軍振華五百人為一軍安遠奉先園四武寧威勇忠果雄節必勝六前軍右軍中軍左軍後軍自振華以下十三軍並中興後立御前忠佐將校並與建隆以來制同散員班一馬直指揮一步直指揮一熙寧四年馬步二直並廢撥隸殿前步軍司虎翼其有馬者補雲騎備軍一千九百六十人熙寧二年罷九百六十人皇城司親從官指揮四政和五年創置第五指揮以七百人為額親事官指揮三元豐五年增置一守奉景靈宮政和五年西京大內官一以五百五十人為額又增置內園司一以五百一十人為額入內院子五百人中興後二百人快行長行中興後置一百人司圊三人曹司中興置三十人將兵者熙寧之更制也先是太祖懲藩鎮之弊分遣禁旅戍守邊城立更戍法使往來道路以習勤苦均勞逸故將不得專其兵兵不至於驕墮淳化至道以來持循益謹雖無復難制之患而更戍交錯旁午道路議者以為徒使兵不知將將不知兵緩急恐不可恃神宗即位乃部分諸路將兵總隸禁旅使兵知其將將練其士平居知有訓厲而無番戍之勞有事而後遣焉庶不為無用矣熙寧七年始詔總開封府畿京東西河北路兵分置將副由河北始自第一將以下共十七將在河北四路自第十八將以下共七將在府畿自第二十五將以下共九將在京東自第三十四將以下共四將在京西凡三十有七而鄜延環慶涇原秦鳳熙河又自列將焉在鄜延者九在涇原者十一在環慶者八在秦鳳者五在熙河者九凡四十有二八年又詔增置馬軍十三指揮分為京東西兩路又募教閲忠果十指揮在京西額各五百人其六在唐鄧其四在蔡汝元豐二年又增置土兵勇捷兩指揮於京西額各四百人唐州方城為右第十一汝州襄城為左第十二凡馬軍十三指揮忠果及土軍共十二指揮四年又詔團結東南路諸軍亦如京畿之法共十三將自淮南始東路為第一西路為第二兩浙西路為第三東路為第四江南東路為第五西路為第六荊湖北路為第七南路潭州為第八全邵永州應援廣西為第九福建路為第十廣南東路為第十一西路桂州為第十二雍州為第十三總天下為九十二將而鄜延五路又有漢蕃弓箭手亦各附諸將而分隸焉凡諸路將各置副一人東南兵三千人以下唯置單將凡將副皆選內殿崇班以上嘗歷戰陳親民者充且詔監司奏舉又各以所將兵多寡置部將隊將押隊使臣各有差又置訓練官次諸將佐春秋都試擇武力士凡千人選十人皆以名聞而待旨解發其願留鄉里者勿強遣此將兵之法也六年熙河路經略制置李憲言本路雖有九將之名其實數目多闕緩急不給驅使又蕃漢雜為一軍嗜好言語不同部分居止悉皆不便今未出戰其害已多非李靖所謂蕃漢自為一法之意若將本路九將併為五軍各定立五軍將副及都同總領蕃兵將使正兵合漢弓箭手自為一軍其蕃兵亦各自為一軍臨敵之際首用蕃兵繼以漢兵必有成效兼可減併將副及部隊將員於事為便詔從之元祐元年司馬光言近歲災傷盜賊頗多州郡全無武備長吏侍衛單寡禁旅盡屬將官多與州郡爭衡長吏勢力遠出其下萬一有李順王倫王均王則之寇乘間竊發攻陷郡縣豈不為朝廷憂祖宗以來諸軍少曾在營常分番出戍蓋欲使之勞筋骨知艱難輕去其家習知山川險阻也自置將以來惟是全將起發然後與將官偕行其餘常在本營飲食嬉遊養成驕惰歲月滋久不可復用又每將下各有部隊將訓練官等一二十人而諸州又自有總管鈐轄都監監押設官重復虛破廩祿知兵者皆知其非臣愚欲乞盡罷諸路將官其禁軍各委本州長吏與總管鈐轄都監監押等如未置將已前使州郡平居武備有餘然後緩急可責以守死諫議大夫孫覺亦以為言於是詔陝西河東廣南將兵不出戍他路其餘河北差近𩹉一將更赴河東而諸路逐將與不隸將之兵並更互出戍稍省諸路鈐轄及都監員仍以將官兼州都監職事卒不能盡罷將副如光等言其年八月樞密院言近邊州軍及邊使經由道路而減本處兵官非是於是邊州及人使經由道路將官仍不兼都監至紹聖間樞密院言往時軍士犯法將官得專決遣故事無留滯自州縣官預軍事以來動多牽制不得自裁欲仍依舊法及諸軍除轉排補並隸將司州縣無得輒預其非屯駐所在當俟將副巡歷決之餘委訓練官行焉詔從之至是州縣一無關預兵愈驕無復可用矣元符元年章楶又請增置涇原第十二將宣和元年詔非救護水火收捕姦細妖人而輒差將兵者坐之後三年知婺州楊應誠言諸路屯戍當隸守臣兵民之任一然後號令不二不然將驕卒橫侵漁細民氣壓州郡有不勝其憂者於是詔自今令隸守臣無何復詔曰將兵遵將官條教除前隸守臣指揮其後江浙盜起攻陷州邑東南將兵望風逃潰無復能戰事平童貫奏言東南三將類皆孱弱全不知戰虛費糧廩驕墮自恣平時主領占差營私大半皆習工藝遂致寇盜橫行毒流一方重費經畫今事平之後當添將增兵鎮遏綏馭然南人怯弱素失訓練終不堪戰今欲於內郡別置三將並隨京畿將分接續排置使陝西軍更互戍守庶幾東南可得實戰之士於計為便詔從之其後南渡諸屯駐大軍即舊將兵之類而其駐劄之所則異於前矣今托建炎以後將兵列於屯駐大軍之次而建炎水軍亦附見焉建炎後諸屯駐大軍武鋒精鋭敢勇鎮淮強勇雄勝武定江都振武泰熙振武忠勇遊奕淮陰前軍副司左右軍移戍左軍淮東滁州雄勝安淮青平小雄邊淮東泰州鎮江左軍淮西廬州強勇前軍強勇右軍武定遊奕忠義雄邊全年淮西濠州武定選鋒軍武定後軍使效威勝遊擊義士諸軍定遠武定淮西安豐軍武定前軍武定右軍防城戍軍四色軍淮西無為軍巢縣池司右軍淮西黃州雄關飛虎軍臨安府屯駐諸軍雄節威果全捷龍騎歸遠金州駐劄都統司兵成都路安撫副司駐劄兵四川大制司帳前飛捷軍利州節制司諸軍金州忠義軍閬州節制司諸軍潼川府制帳踏白軍隆慶屯駐遊奕軍潼川安撫司忠定軍夔州節制司軍興元節制軍事利州都統司兵四川制司帳前信義兩軍興元都統司屯駐合州軍沔州乾道三年三百人沿江水軍建炎置明州水軍紹興置乾道元年二千人分左右兩將福州荻蘆延祥寨紹興置百五十人乾道七年添招凡五千人鎮江駐劄御前水軍乾道三年招三百人淳熙五年增招千五百人沿海水軍乾道六年置一千人潮州水軍乾道四年置二百人江陰水軍乾道四年置三百人廣東水軍乾道五年增至二千人平江許浦水軍乾道七年七千人淳熙五年增五百人江州水軍淳熙二年招一千人池州都統司水軍淳熙元年千人嘉定中增至三千人漳州水軍紹熙元年漳泉共六百人泉州水軍見上殿前澉浦水軍開禧元年一千五百人鄂州都統司水軍開禧十年置太平州采石駐劄御前水軍嘉定十四年五千人建康都統司靖安水軍元隸都統司嘉定中隸御前馬軍行司唐灣水軍元隸馬軍行司嘉定中隸御前通州水軍乾道五年置池州清溪鴈汊控海水軍建炎四年置百五十人兩淮水軍紹興元年置二千人隆興元年詔諸州斷配海賊刺隸
