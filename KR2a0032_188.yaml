body:
  text: 宋史卷一百八十八志第一百四十一兵二禁軍下熙寧以後之制騎軍殿前指揮使左右班二內殿直左右班四散員左右班四散指揮左右班四散都頭左右班二散祗候左右班二金槍班左右二元祐二年六月密院言元豐七年承旨司傳宣密院殿前指揮使左右班槍手可各以五分為額餘悉改充弓箭手切詳先為在京馬軍全廢槍手其諸班槍手有闕無人揀填遂有此宣旨近因殿前馬步軍司奏諸在京馬軍復置一分槍手諸班槍手並依舊教閲詔元豐七年宣旨更不施行東西班及弩手龍旗直招箭總十一中興後東凡五班西凡三班散直左右四熙寧九年併南散直隸北散直中興後名招箭班散直外殿直一熙寧五年廢銀槍班左右班二中興置茶酒舊班中興置茶酒新班中興置鈞容直國初一班中興因之後廢已上為諸班捧日并左射直弩手左第五軍總三十五京師三十三雍丘鄭各一熙寧五年捧日三十三併為二十二廢弩手隸左射餘留二十九元第一十月以左射隸天武二年廢左射直八月廢第五軍雍丘第二南京第一並改為新立驍捷九月詔勿改惟闕勿補俟其少廢併歸明渤海二京師元豐元年撥填拱聖一餘撥隸驍騎右四拱聖二十一京師熙寧六年併為十一廢左射中興後副指揮一員吐渾五治平中併為二熙寧二年併為一元豐元年廢中興後屬步軍驍騎二十二京師熙寧六年併為十四廢弩手上驍騎元豐元年撥在京驍騎左第一隸神勇驍勝十熙寧三年廢寧朔十京師尉氏各三雍丘滑河陽河陰各一熙寧二年併為七元豐元年在京第二第三並撥隸第一龍猛八熙寧三年併為六飛猛一熙寧二年廢契丹直三咸平棣昌壽各二熙寧九年廢神騎十八雍丘十三咸平五熙寧二年併為十中興後副指揮一員步鬥六尉氏太康各一蔡四元豐元年尉氏太康各一蔡州二皆撥隸步軍司虎翼十一月蔡州二改為新立驍捷其第二充擒戎第四等四尉氏三太康四第四充擒戎第五太康一元豐元年併尉氏第三隸第一太康第二改驍雄二年尉氏一勿填闕吐渾直三太原二潞一熙寧六年廢潞州一一年廢太原二元豐二年太原潞州各一勿填闕中興屬步軍安慶直四太原一潞三熙寧六年皆廢三部落一太原熙寧三年廢清朔四西京二潁昌汝各一擒戎五西京潁昌各二汝一元豐元年蔡州置二驍雄舊六治平四年併為四咸平陳各二熙寧初以驍猛第四改充一元豐六年咸平尉氏各一闕勿補其馬軍行司新軍目選鋒中興置神策選鋒軍左翼軍右翼軍摧鋒軍遊奕軍前軍右軍中軍左軍後軍護聖馬步軍中興置步軍御龍直左右二御龍骨朵子直左右二御龍弓箭直五御龍弩直五中興左右班二天武并寬衣直左射總三十四京師三十三咸平一熙寧二年併三十三為二十三九年廢左射元豐元年併陳留第七軍第一隸咸平第五軍第一十月廢寬衣天武二年廢第五軍咸平第一改雄武弩手九月詔勿改惟闕弗填四年廢直紹聖元年十一月引進副使宋球言自立殿前司以來有寬衣天武一指揮充駕出禁衛圍子常守把在內諸門熙寧中廢併禁圍只差天武皇城諸門更不差人乞復置寬衣一指揮或不欲添置乞將天武本軍內以一指揮為寬衣天武詔禁圍子合用天武人兵令殿前司今後並選定四十已上有行止無過犯不係新招揀到人充遇闕選填神勇并上神勇二十一京師熙寧六年併為十四廢上神勇孝宗初改為護聖軍廣勇四十三每十為一軍京師五陳留二十二咸平東明太康胙城南京各二襄邑陽武鄆各一滑三熙寧九年在京增置一元祐二年八月詔在京置左第三軍第一右第三軍第一神射五陳留三雍丘二熙寧三年廢龍騎二十分三軍京師四尉氏雍丘咸平鄭各二南京陳蔡河陽棣單宿白波各一熙寧二年併為十三熙寧一年在京第七隸第九雄勇八咸平三鄆二潁昌鄭滑各一元豐元年併咸平第二第三隸第一鄆州第五隸第四改曰雄威併管城第七白馬第八潁昌一闕勿補二年咸平一闕勿補宣威上下二咸平襄邑各一熙寧三年以咸平一隸廣捷以襄邑一隸威猛四年廢廣捷五十六陳留八咸平六雍丘四襄邑尉氏潁昌各三太康扶溝南京亳河陽潁寧陵各二陳五鄭滑曹鄧蔡廣濟穀熟永城襄城萊各一熙寧三年亳州一併廣勇永城縣一併隸亳州元豐元年併管城第四十隸本縣雄勇第七併白馬縣第二十五隸本縣雄勇第八廣德并揀中廣德總十咸平尉氏陽武河陽滄鞏白波各一西京三治平四年併十四為八熙寧六年廢揀中廣德尉氏揀中廣德第一陽武第二改為廣德雄威十考城襄邑陳留各一南京四陳三治平四年併十三為十元豐元年以南京第八分隸第三第四第七二年襄邑二闕勿補勝捷威勝威捷建炎初置隸殿前司全捷前軍右軍中軍左軍後軍自勝捷以下九軍並中興後置侍衛司侍衛親軍馬步軍都指揮使副都指揮使都虞候各一人馬軍都指揮使副都指揮使都虞候各一人步軍亦如之自馬步軍都虞候以上其員全闕即馬軍步軍都指揮使等各兼領其務馬步軍有龍衛神衛左右四廂都指揮使龍衛神衛左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使餘如殿前司之制其所領騎步軍之額如左騎軍員僚直左右四京師二恩冀各一熙寧二年併左直為一須人少撥隸如其軍省五年廢恩冀州左右直弗補六年撥隸龍衛元豐三年廢龍衛并直左射帶甲剩員四十四京師三十八雍丘尉氏河陽并揀中各一澶二熙寧元年以澶州右第四軍第四隸第三共并為一九年陳留併帶甲剩員二為一熙寧元年澶州河陽尉氏就糧四併隸別指揮六年三十九併為二十八年置帶甲剩員二十年廢亳州一元豐元年陳留帶甲剩員闕勿補二年五月廢直左射八月廢第十軍十月南京第十軍第一改新立驍捷左三六年廢帶甲剩員中興二十忠猛一定熙寧五年廢散員一定熙寧五年廢驍捷二十六尉氏新立及揀中各一恩十四冀十熙寧元年廢帶甲剩員三年廢揀中五年瀛州三撥隸本州雲翼冀州十恩州十四各併為五莫州二併為一十年併冀恩驍捷各五各為四元豐元年太康置新立驍捷一雲騎十五京師十一陳留南京各一鞏縣二熙寧二年併十五為十三年第一至十二併為七七月第八撥隸第一第二八年置帶甲剩員一元豐二年闕選雲捷第二軍補之十月雍丘帶甲剩員第一改為橫塞第十中興七武騎二十一京師雍丘各六尉氏三陳留考城咸平鄭各一西京二熙寧元年廢咸平帶甲剩員為剩員二年併二十作十五八年置帶甲剩員一九年以雍丘帶甲剩員一隸雲騎帶甲剩員共為一十二月在京四併為三尉氏二併為一考城一分隸雍丘寧朔在京二併為一十年廢帶甲剩員元豐元年併帶甲剩員亳州第一中興三驍鋭四莫三冀一熙寧五年莫州三併為二冀州第三虛其闕以存者補捷六年七月莫州第一第二冀州第三並改驍捷是月廢歸明神武馬一尉氏熙寧六年改新立驍捷七月廢飛捷四雍丘熙寧二年併為二元豐元年廢驍武左右二十北京七真定三定六相懷洛邢各一熙寧元年廢帶甲剩員二年北京七併為五五年真定府三併為二定州六併為四邢州雲翼各一須人少併為一十北京五併為四定州四須人少併為三元豐七年以忠猛一分入驍武第七第八第九廣鋭總四十四太原代并各三汾五石嵐岢嵐各二晉潞慈絳澤隰憲寧化威勝平定火山各一涇原鄜各二秦渭環邠寧各一元豐二年欣嵐州各一闕勿補三年涇州二以下一補上一闕五年置蘭州二中興二十三雲翼分左右廂左三十四右二十二總五十六真定雄瀛深趙永寧各三定冀各六保五滄北平永靜順安保定各二莫邢霸各一廣信安肅各四熙寧五年併滄州二為一冀州六為三真定府三為一趙州三為二定州六為四順安軍二為一永寧軍三為二北平軍二須其闕併為一安肅軍第一分隸第三深州三為二保州一分隸他軍十年莫州第十三分隸驍捷真定府第八分隸驍武定州四須其闕併為三安肅軍三須其闕併為二廣信軍四併為三元祐元年桂州二仍不廢中興三十三有馬徑勇七太原二代嵐各一磁三熙寧五年磁三併為一中興五騎捷五瀛三莫二熙寧六年廢廳子七定二相五熙寧五年併相廳子五為三定廳子馬二為一六年相州廳子三并改廳子馬十年相州廳子馬第三分隸驍武廳子馬中興四驍駿一太原熙寧六年廢無敵六定北平各二安肅廣信各一熙寧五年北平二須人少併為一撥隸雲翼三廣信軍一撥隸雲翼忠鋭一廣信熙寧五年廢威邊二定保各一熙寧五年廢克勝二潞飛騎二麟威遠二府克戎二并清塞一延安熙寧五年廢武清一晉熙寧六年廢萬捷七相冀趙各二滄一熙寧五年冀二併為一以隸雲翼相二須人少併為一中興七雲捷十二尉氏咸平西京北京澶各二汝懷各一橫塞七雍丘咸平考城襄邑寧陵各一衛二有馬安塞一熙寧五年廢蕃落八十三環五延慶各四秦併外寨十七原渭併外寨各十二德順併外寨七鎮戎併外寨十二鳳翔涇併外寨儀保安各二隴一熙寧三年併外寨九為七八月涇原路以新寨所減蕃落隸在州蕃落定額以三萬二千人五年隴州添置招馬軍蕃落一九年併陝西土蕃落渭州八為六原州秦州各五為四元豐四年環州下蕃落未排定指揮並為禁軍五年六月葭蘆寨主乞置一紹聖四年詔陝路增置馬軍十各五百人為額於永興河中鳳翔同華各置二元符元年詔涇原路新築西安州置馬軍一天都臨羌寨各置馬軍一六月詔永興軍等路創置十指揮二年定邊城增置馬軍二烏龍川北嶺新寨各置馬軍一崇寧五年新築安邊城置馬軍一並州騎射一熙寧六年太原騎射第一改克戎元豐七年成都府置馬軍騎射一中興後無有馬雄略三廣桂雍各一熙寧三年廣桂雍有馬雄略闕勿補十年以雍州住營兩指揮闕額移桂州依舊置紹聖元年沅州增置有馬一元符元年正月詔荊湖南路江南東路各增置有馬一中興二崇捷崇寧三年詔於京東京西河北河東開封府界創置馬步軍五萬人計一百七指揮馬軍三十五步軍七十二合三萬六千人馬軍以崇捷崇鋭為名步軍以崇武崇威為名崇鋭崇寧三年見上以上二軍中興後無清澗騎射二員僚剩員直以罪謫降者充立前軍右軍中軍左軍後軍以上七軍並中興後置步軍神衛並水軍總三十一京師熙寧二年併三十一為三十三年廢水軍元豐二年廢第九第十南京第一改雄武弩手中興四十六虎翼九十六京師九十併水軍一襄邑東明單各一長葛二熙寧二年除水軍一外併九十五為六十六年廢上虎翼元豐四年詔改差殿前虎翼右一四指揮為李憲親兵奉節並上奉節五京師熙寧二年殿上奉節九月上奉節兩指揮隸虎翼六年十月廢奉節步武六陳武衛七十一南京真定定淄各四北京澶相邢懷趙棣洺德祁通利乾廣濟各一青五鄆徐兗曹濮沂濟單萊濰登淮陽瀛博各二齊密滄各三熙寧四年帝諭文彥博等京東武衛軍素號精勇得力不減陝西兵彥博曰京東之人沈鷙精悍亦其性也五年併滄三為二真定府各四各為三趙州振武各一共為一六年詔岷州置一元豐三年河州武衛二為一雄武並雄武弩手床子弩雄武揀中雄武飛山雄武揀中歸明雄武總三十四京十三太原尉氏南京鄭汝寧陵各二咸平東明雍丘襄邑潁昌曹廣濟穀熟長葛各一熙寧五年廢揀中雄武閏七月併床子弩雄武飛山雄武各五為二六年廢雄武中興後加平海字飛虎三陳留二咸平一熙寧三年廢神鋭二十六太原六潞晉各三澤汾隰平