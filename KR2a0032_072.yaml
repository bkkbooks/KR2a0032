body:
  text: 宋史卷七十二志第二十五律曆五步日躔周天分三百八十六萬八千六十五秒二周天度三百六十五度虛分二千七百一十五秒二約分二十五秒六十四歲差一百二十五秒二乘法三十二除法四百八十七秒法一百常氣中積升降分盈縮分損益率朏朒積冬至空升七千三百四十七盈空益五百八十二朒空小寒一十五升六千草一盈七千三百四十七益四百七十七朒五百八十二二千三百十四六大寒三十升四千六百九十六盈一萬三千五百六十八益三百七十二朒一千五十九四千六百草八一十二立春四十五升三千三百九十六盈一萬八千六十四益二百六十九肭一千四百三十一六千九百四十二十八雨水六十升二千七十盈二萬一千四百六十益一百六十四朒一千七百九千二百五十六二十四驚蟄七十六升七百七十五盈二萬三千五百三十益六十朒一千八百六十四九百八十三三十春分九十一降七百五十七盈二萬四千二百八十七損六十朒一千九百草四三千二百九十五空清明一百六降二千七十盈二萬三千五百三十損一百六十四朒一千八百六十四五千六百九六穀雨一百草一降三千三百九十六盈二萬一千四百六十損二百六十九朒一千七百七千九百草三一十二立夏二百三十六降四千六百九十六盈一萬八千六十四損三百七十二朒一千四百三十一一萬二百草七十八小滿一百五十二降六千草一盈一萬三千三百六十七損四百七十七朒一千五十九一千九百六十二草四芒種一百六十七降七千三百四十七盈七千三百四十七損五百八十二朒五百八十二四千三百七十五三十夏至一百八十二降七千三百四十七縮空益五百八十二朏空六千五百九十空小暑一百九十七降六千草一縮七千三百四十七益四百七十七朏五百八十二八千九百四六大暑二百一十三降四千六百九十六縮一萬三千三百六十八益三百七十二朏一千五十九六百草八一十二立秋二百草八降三千三百九十六縮一萬八千六十四益二百六十九朏一千四百三十一二千九百四十二十八處暑二百四十三降二千七十縮二萬一千四百六十益一百六十四朏一千七百五千一百五十四草四白露二百五十八降七百五十七縮二萬三千五百三十益六十朏一千八百六十四七千五百七十三十秋分二百七十三升七百五十七縮二萬四千二百八十七損六十朏一千九百草四九千八百八十五空寒露二百八十九升二千七十縮二萬三千五百三十損一百六十四朏一千八百六十四一千六百九六霜降三百四升三千三百九十六縮二萬一千四百六十損二百六十九朏一千七百三千九百草三一十二立冬三百一十九升四千六百九十六縮一萬八千六十四損三百七十二朏一千四百三十一六千二百三十七一十八小雪三百三十四升六千草一縮一萬二千三百六十八損四百七十七朏一千五十九八千五百五十一草四大雪三百五十升七千三百四十七縮七千三百四十七損五百八十二朏五百八十二二百七十五三十求每日盈縮定數以乘法乘所入氣升降分如除法而一為其氣中平率與後氣中平率相減為差率半差率加減其氣中平率為其氣初末泛率至後加為初減為末分後減為初加為末又以乘法乘差率除法而一為日差半之加減初末泛率為初末定率至後減初加末分後加初減末以日差纍加減氣之定率為每日升降定率至後減分後加以每日升降定率冬至後升加降減夏至後升減降加其氣初日盈縮分為每日盈縮定數其分至前一氣先後率相減以前末泛率為其氣初泛率以半日差至前加之分前減之為其氣初日定率餘依本術求朏朒準此求經朔弦望入氣置天正閏日及餘如氣策及餘秒以下者以減氣策及餘秒為入大雪氣已上者去之餘以減氣策及餘秒為入小雪氣即得天正十一月經朔入大小雪氣日及餘秒求弦望及後朔入氣以弦策纍加之滿氣策及餘秒去之即得求定氣日冬夏二至以常氣為定餘即以其氣下盈縮分縮加盈減常氣約餘為定氣滿若不足進退大餘命甲子算外即定氣日及分求經朔弦望入氣朏朒定數各以所入氣小餘乘其日損益率如樞法而一即得求赤道宿度斗二十六度牛八度女十二度虛十度及分危十七度室十六度壁九度北方七宿九十八度虛分二千七百一十五秒二約分二十五秒六十四奎十六度婁十二度胃十四度昴十一度畢十七度觜一度參十度西方七宿八十一度井三十三度鬼三度柳十五度星七度張十八度翼十八度軫十七度南方七宿一百一十一度角十二度亢九度氐十五度房五度心五度尾十八度箕十一度東方七宿七十五度前皆赤道度其畢觜參及輿鬼四宿度數與古度不同自大衍曆依渾天儀以測定為用紘帶天中儀極是憑以格黃道推天正冬至赤道日度以歲差乘距所求積年滿周天分去之不盡用減周天分餘以樞法除之為度不盡為餘秒其度命以赤道虛宿七度外起算依宿次去之不滿者即得天正冬至加時赤道日躔所距宿度及餘秒其餘以樞法退除為分及秒各以一百為度求二十四氣赤道日度置天正冬至加時赤道日度及餘秒以氣策及餘秒纍加之先以三十六乘赤道秒以一百乘氣策秒然後加之即秒母皆同三千六百滿赤道宿次去之即各得二十四氣加時赤道日躔宿度及餘秒求二十四氣昏後夜半赤道日度各以其氣小餘減樞法其秒亦以一百乘然乃減之餘加其氣加時赤道日躔宿度及餘秒即其氣初日昏後夜半赤道日度及餘秒求次日纍加一度滿宿次去之各得所求求赤道宿積度置冬至加時日躔赤道宿全度以冬至加時日躔赤道宿度及約分秒減之餘為距後度及分秒以赤道宿度纍加距後度即得各赤道宿積度及分秒求赤道宿積度入初末限各置赤道宿積度及分秒滿九十一度三十一分秒一十一去之餘四十五度六十六分以下為入初之限已上者用減九十一度三十一分餘為入末限度及分秒求二十八宿黃道度各置赤道宿入初末限度及分用減一百二十五餘以初末限度及分乘之十二除為分分滿百為度命為黃赤道差度及分至後分前以減分後至前以加赤道宿積度為其宿黃道積度以前宿黃道積度減其宿黃道積度為其宿黃道度及分其分就近約為太半少黃道宿度斗二十三太牛七半女十一半虛十秒六十四危十七太室十七壁九少北方七宿九十七度半秒六十四奎十七半婁十二太胃十四太昴十一畢十六觜一參九少西方七宿八十二度井三十鬼二柳十四星七張十八太翼十九少軫十八南方七宿一百一十度角十三亢九半氐十五半房五心四尾十七箕十東方七宿七十四度求冬至加時黃道日躔宿次以冬至加時赤道日躔宿度用減一百二十五餘以冬至加時赤道度及分乘之十二除為分分滿百為度用減冬至加時赤道日度及分即冬至加時黃道日躔宿度及分求二十四氣初日加時黃道日躔宿次置所求年冬至日躔黃道赤道差以次年黃赤道差減之餘以所氣數乘之二十四而一所得以加其氣下中積及約分又以其氣初日盈縮分盈加縮減之用加冬時黃道日度依宿次命之即各得其氣初日加時黃道日躔所在宿度及分若其年冬至加時赤道日躔度空分秒在歲差已下者即如前宿全度乃求黃赤道差以次年冬至加時黃赤道差減之餘依本術各得所求此術以究算理之微亟求其當止以盈縮分加減中積以天正冬至加時黃道日度加而命之求二十四氣初日晨前夜半黃道日躔宿次置一百分分以一百約其氣初日升降分升加降減之一日所行之分乘其初日約分所得滿百為分分滿百為度不滿百分為秒以減其初日黃道加時日躔宿次即其日晨前夜半黃道日躔宿次求每日晨前夜半黃道日躔宿次各因二十四氣初日晨前夜半黃道日躔宿次日加一度以一百約每日升降為分秒升加降減之以黃道宿次命之即每日晨前夜半黃道日躔所距宿度及分步月離轉周分二十九萬一千八百三秒五百九十四轉周日二十七餘五千八百七十三秒五百九十四朔差日一餘一萬三百三十五秒九千四百六望差一十四餘八千一百四秒五千弦策七餘四千五十二秒二千五百七日初數九千四百四十一初約分八十九末數一千一百七十九末約分一十一十四日初數八千二百三十二初約分七十八末數二千三百五十八末約分二十二二十一日初數七千五十二初約分六十九末數三千五百三十八末約分二十三二十八日初數五千八百七十三初約分五十六已上秒法一萬上弦九十一度三十一分秒四十一望一百八十二度六十二分秒八十二下弦二百七十三度九十四分秒二十三平行一十三度三十六分秒八十七半已上秒母一百推天正十一月經朔入轉置天正十一月經朔積分以轉周分秒去之不盡以樞法除之為日不滿為餘秒命日算外即所求天正十一月經朔加時入轉日及餘秒若以朔差日及餘秒加之滿轉周日及餘秒去之即次日加時入轉求弦望入轉因天正十一月經朔加時入轉日及餘秒以弦策纍加之去命如前即上弦望及下弦加時入轉日及餘秒若以經朔弦望小餘減之各得其日夜半入轉日及餘秒求朔弦望入轉朏朒定數置所入轉餘乘其日損益率樞法而一所得以損益其下朏朒積為定數其四七日下餘如初數下以初率乘之初數而一以損益朏朒為定數若初數已上者以初數減之餘乘末率末數而一用減初率餘加朏朒各為定數其十四日下餘若在初數已上者初數減之餘乘末率末數而一為朏定數求朔望定日各以入氣入轉朏朒定數朏減朒加經朔弦望小餘滿若不足進退大餘命甲子算外各得定日及餘若定朔干名與後朔同名者大不同者小其月無中氣者為閏月凡注曆觀朔小餘如日入分已上者進一日朔或當定有食應見者其朔不進弦望定小餘不滿日出分退一日其望定小餘雖滿此數若有交食虧初起在日出已前者亦如之有月行九道遲疾曆有三大二小若行盈縮纍增損之則有四大三小理數然也若俯循常儀當察加時早晚隨其所近而進退之不過三大二小若正朔有加交時虧在晦二正見者消息前後一兩月以定大小求定朔弦望加時日所在度置定朔弦望約分副之以乘其日升降分一萬約之所得升加降減其副以加其日夜半日度命如前各得其日加時日躔黃道宿次推月行九道凡合朔所交冬在陰曆夏在陽曆月行青道冬夏至後青道半交在春分之宿當黃道東立冬立夏後青道半交在立春之宿當黃道東南至所衝之宿亦如之冬在陽曆夏在陰曆月行白道冬夏至後白道半交在秋分之宿當黃道西立冬立夏後白道半交在立秋之宿當黃道西北至所衝之宿亦如之春在陽曆秋在陰曆月行朱道春秋分後朱道半交在夏至之宿當黃道南立春立秋後朱道半交在立夏之宿當黃道西南至所衝之宿亦如之春在陰曆秋在陽曆月行黑道春秋分後黑道半交在冬至之宿當黃道北立春立秋後黑道半交在立冬之宿當黃道東北至所衝之宿亦如之四序月離雖為八節至陰陽之所交皆與黃道相會故月行有九道各視月所入正交積度滿象度及分去之入交積度及象度並在交會術中若在半象以下者為入初限已上者復減象度餘為入末限用減一百二十五餘以所入初末限度及分乘之滿二十四而一為分分滿百為度所得為月行與黃道差數距半交後正交前以差數為減距正交後半交前以差數為加此加減出入