body:
  text: 宋史卷一百九十四志第一百四十七兵八揀選之制廩給之制揀選之制建隆初令諸州召募軍士部送闕下至則軍頭司覆驗等第引對便坐而分隸諸軍焉其自廂軍而升禁兵禁兵而升上軍上軍而升班直者皆臨軒親閲非材勇絶倫不以應募餘皆自下選補咸平五年於環慶等州廂軍馬步軍六千餘人內選材勇者四千五百人付逐寨屯防以代禁兵景德二年宣示殿前侍衛司諸禁軍中老疾者衆蓋久從征戍失於揀練每抽替至京雖量加閲視亦止能去其尤者今多已抽還宜乘此息兵精加選揀雖議者恐其動衆亦當斷在必行昔太祖亦嘗患此遂盡行揀閲當時人情深以為懼其後果成精兵樞密使王繼英等曰今兵革休息不乘此時遴選實恐冗兵徒費廩食帝曰然近者契丹請盟夏人納款恐軍旅之情謂國家便謀去兵惜費乃命先於下軍選擇勇力者次補上軍其老疾者俟秋冬慎擇將臣令揀去之三年正月詔遣樞密都承旨韓崇訓等與殿前司侍衛馬步軍司揀閲諸軍兵士供備庫使帶御器械綦政敏等分往京東西路揀閲八月詔效順第一軍赴京揀閲以補虎翼名闕是軍皆河東人帝念其纍戍勞苦故升奬焉大中祥符二年四月詔曰江南廣東西路流配人等皆以自抵憲章從配隸念其遠地每用軫懷屬喬嶽之增封洽溥天之大慶不拘常例特示寬恩江南路宜差內殿崇班段守倫就升州洪州廣南東西路差殿直閣門祗候彭麟就桂州與本路轉運使同勾抽諸州雜犯配軍揀選移配淮南州軍牢城及本城有少壯堪披帶者即部送赴闕當議近上軍分安排如不願量移及赴闕者亦聽若地里遠處即與轉運使同乘傳就彼依此揀選五年正月帝諭知樞密院王欽若等在京軍校差充外處人員軍數不足有妨訓練可詔示殿前侍衛馬步軍司簡補禁軍逐指揮兵士內捧日上三軍要及三百人龍衛上四軍各二百五十人拱聖驍騎驍勝寧朔神騎雲武騎各三百五十人並於下次軍營升填須及得本額等樣及令軍頭司於諸處招揀到人內選填營在京者引見分配在外處者準此仍委逐司擘畫開坐以聞在京差出者候替回揀選九年十一月詔河北河東陝西諸州軍揀料本城兵五百人以上升為一指揮於本處置營教閲武藝升為禁軍天禧元年二月遣使分往諸州軍揀廂軍驍壯及等者升隸上軍六月召選天下廂兵遷隸禁軍者凡五千餘人天聖間嘗詔樞密院次禁軍選補法凡入上四軍者捧日天武弓以九斗龍衛神衛弓以七斗天武弩以二石七斗神衛弩以二石三斗為中格恩冀員僚直驍捷軍士選中四軍則不復閲試自餘招揀中者並引對凡員僚直闕則以選中上軍及龍衛等樣弓射七斗合格者充仍許如龍衛例選補班直凡選禁軍自奉錢三百已上弓射一石五斗弩跖三石五斗等樣及龍衛者並親閲以隸龍衛神衛凡騎御馬直闕小底則閲拱聖驍騎少壯善射者充凡弓手內殿直以下選補殿前指揮使射一石五斗御龍弓箭直選補御龍直御龍骨朵子直東西班帶甲殿侍選補長入祗候御龍諸直將虞候選補十將射皆一石四斗東西班散直選補內殿直捧日員僚直天武龍衛神衛親從選補諸班直御龍骨朵子直弓箭直將虞候選補十將御龍直長行選補將虞候射皆一石三斗員僚龍御騎御馬直小底選補散直射皆一石二斗凡弩手東西班帶甲殿侍選補長騎祗候射四石御龍弩直將虞候選補十將射三石八斗長行選補將虞候射三石五斗其捧日天武龍衛親從選補弩手班御龍弩直者亦如之其次別為一等減二斗自餘殿前指揮使諸班直以歲久若上名出補外職者所試弓弩斗力皆遽減自一石三斗至八斗弩自三石二斗至五斗各有差凡班直經上親閲隸籍者有司勿復按試其升軍額者或取少壯拳勇或旌邊有勞至於河清遽補牢城配軍亦間下詔選補蓋使給役者有時而進負罪者不終廢也其退老疾則以歲首或出軍回轉員皆揀汰上軍以三歲河北遇大閲亦如之景祐元年詔選教駿填拱聖諸軍退其老疾為剩員不任役者免為民三年詔選驍騎雲騎驍勝填拱聖武騎寧朔神騎填驍騎康定元年選御輦官為禁軍輦官二十六人遮輔臣喧訴斬其首二人餘黥隸嶺南卒選如初慶曆三年詔韓琦田况選京師奉錢五百已上禁軍武技精捷者營取五人樞密院籍記姓名以備驅使况因言今天下兵踰百萬視先朝幾三倍自昔養兵之冗未有若是且諸路宣毅廣勇等軍孱弱衆甚大不堪戰小不堪役宜分遣官選不堪戰者降為廂軍不堪役者釋之上然其言皇祐元年揀河北河東陝西京東西禁廂諸軍退其罷癃為半分甚者給糧遣還鄉里係化外若以罪隸軍或嘗有戰功者悉以剩員處之三年韓琦奏河北就糧諸軍願就上軍者許因大閲自言若等試中格舊無罪惡即部送闕量材升補乃詔四路都總管司自今春秋閲委主管選長五尺六寸已上弓一石五斗弩三石五斗者并家屬部送闕嘉祐二年詔神衛水軍等以五年諸司庫務役兵以三年一揀五年選京東西陝西河北河東本城牢城河清裝卸馬遞鋪卒長五尺三寸勝帶甲者補禁軍其嘗犯盜亡坐黥者配外州軍歸遠壯勇八年右正言王陶奏天下廂軍以歲首揀至於禁軍雖有駐劄還日揀法或不舉臣竊惟調發禁軍本籍精鋭軍出之時尤當揀練請下有司凡調發禁軍委當職官汰年六十已上將校年六十五已上衰老者如此則兵精而用省矣下其章殿前馬步軍司奏曰舊制遣戍陝西河北河東廣南被邊諸軍悉揀汰餘路則無令請自今諸軍調發悉從揀法詔可又詔凡選本城牢城軍士以補龍猛等軍者並案籍取嘗給奉錢五百及龍猛等者以配龍猛其不及等與嘗給奉錢四百以下若百姓黥隸及龍騎等者以配龍騎其龍騎軍士戍還即選填龍猛自今本城牢城悉三年一揀著為令治平元年閲親從官武技得百二十人以補諸班直乃詔自今親從官限年三十五以下者充又詔如聞三路就糧兵多老疾不勝鎧甲者可勿拘時揀年五十以上有子弟或異姓親屬等應樣者代之如無聽召外人是歲詔京畿并諸路揀龍騎壯勇歸遠本城牢城宣效六軍河清車營致遠窰務鑄錢監屯田務隸籍三十年勝鎧甲者部送京師填龍猛等軍其自廣南揀中者就填江西荊湖歸遠闕額仍詔每三年以龍猛等軍闕數聞又詔諸路有步射引弓兩石彍弩四石五斗已上者奏遣詣闕二年詔京東教閲補禁軍先是京東教閲本城自初置即番隸本路巡檢久不選補上聞其軍多勇壯可用者欲示激勸故有是詔治平四年五月揀選拱聖神勇以下軍分以補捧日天武龍神衛闕數元豐三年六月權主管馬步軍司燕達言內外就糧退軍二十一指揮八千餘人以禁軍小疾故揀退及武藝淺弱人配填既不訓練又免屯戍安居冗食耗𢀿軍儲若自今更不增補庶漸銷減候有闕依禁軍選募教習武藝不數年間退軍可盡變鋭士內奉錢七百者減為五百依五百奉錢軍等杖招揀從之仍詔上四軍退軍改作五百奉錢軍額八月殿前步軍司虎翼十指揮出戍歸營閔其勞苦詔並升補為神勇指揮廣西路經略司言雄略澄海指揮闕額請以諸路配送隸牢城卒所犯稍輕及少壯任披帶者選補從之四年四月提舉河北義勇保甲狄咨言舊制諸指揮兵級內有老疾年五十五已上有弟姪子孫及等杖者令承替名糧其間亦有不堪征役者乞年四十已上許令承替詔河北馬步諸軍依此十二月詔諸班直上四軍毋得簡常有罪改配人元祐二年七月詔諸路每歲於八月後解發試武藝人到闕殿前司限次年正月軍頭司限二月以前試驗推恩呈試武藝人同三年閏十二月樞密院言在京諸軍兵額多闕而京東西路就糧禁軍往往溢額詔差官往逐路同長吏揀選發遣以補其數大觀元年四月詔曰東南諸郡軍旅之事久失訓齊民雖浮弱而阻山帶江輕而易搖安必慮危誠不可忽其諸軍事藝生疏精熟不同非獨見將官訓練優劣實亦繫教頭能否樞密院請委逐路提舉訓練官妙選精熟教頭二年一替若能訓練精熟然後推賞從之至若省併之法凡軍各有營營各有額皇祐間馬軍以四百步軍以五百人為一營承平既久額存而兵闕馬一營或止數十騎兵一營或不滿一二百而將校猥多賜豫廩給十倍士卒遞遷如額不少損帝患之熙寧二年始議併廢陝西馬步軍營三百二十七併為二百七十馬軍額以三百人步軍以四百人其後凡撥併者馬步軍營五百四十五併為三百五十五而京師府界諸路及廂軍皆會總畸零各足其常額凡併營先為繕新其居室給遷徙費軍校員溢則以補他軍闕或隨所併兵入各指揮依職次高下同領帝嘗謂輔臣曰天下財用朝廷稍加意則所省不可勝計乃者銷併軍營計減軍校十將以下三千餘人除二節賜豫及傔從廩給外計一歲所省為錢四十五萬緡米四十萬石紬絹二十萬匹布三萬端馬䤝二百萬庶事若此邦財其可勝用哉初議併營大臣皆以兵驕已久遽併之必召亂不可帝不聽獨王安石贊決之時蘇軾言曰近者併軍搜卒之令猝然輕發甚於前日矣雖陛下不恤人言持之益堅而勢窮事礙終亦必變他日雖有良法美政陛下能復自信乎樞密使文彥博曰近多更張人情洶洶非一安石曰事合更張豈憚此輩紛紛邪帝用安石言卒併營之自熙寧以至元豐歲有併廢元符二年樞密院言已詔諸路併廢堡寨減罷兵將鄜延秦鳳路已減併餘路未見施行詔涇原熙河蘭會環慶河東路速議以聞三年罷都護府安撫使隸河蘭州以省餽運詔邊帥減額外戍兵建中靖國元年減放秦鳳路土兵大觀三年詔昨降處分措置東南利害深慮事力未辦應費不資其帥府望郡添置禁軍諸縣置弓手並罷其壯城兵士令帥府置一百人餘望郡置五十人舊多者自依舊沿邊州軍除舊有外罷增招壯城帥府望郡養馬并步人選充馬軍指揮及支常平錢收糴封樁斛斗指揮並罷已添置路分鈐轄路分都監許令任滿江南東西兩浙各共差走馬承受內臣一員帥府添置機宜文字去處並罷四年詔四輔州各減一將其軍兵仰京畿轉運司將未足額并未有人崇鋭崇威崇捷崇武內併廢四十四指揮已揀到人隨等杖撥填四輔見闕禁軍仍將逐輔係將不係將軍兵以住營遠近相度重別分隸排定及八將訓練駐劄去處疾速開具以聞河北河東崇鋭崇威河東十八指揮河北不隸將十三指揮併廢見管兵令總管司撥填本路禁軍闕額河北路撥不盡人發遣上京分填在京禁軍闕額河東撥不盡人並於本路禁軍額外收管宣和五年詔兩浙盜賊寧息其越州置捕盜指揮可均填江東淮東三路州軍闕額至神宗之世則又有簡汰退軍之令治平四年詔揀拱聖神勇以下軍補捧日天武龍衛神衛兵闕熙寧元年詔諸路監司察州兵招簡不如法者按之不任禁軍者降廂軍不任廂軍者免為民二年從陳升之議量減衛兵年四十以上稍不中程者請受呂公弼及龍圖閣直學士陳薦皆言退軍不便三年二月司馬光亦曰竊聞朝廷欲揀在京禁軍四十五以上微有呈切者盡減請給兼其妻子徙置淮南以就糧食若實有此議竊謂非宜何則在京禁軍及其家屬率皆生長京師親姻聯布安居樂業衣食縣官為日固久年四十五未為衰老微有呈切尚任征役一旦別無罪負減其請給徙之淮南是橫遭降配也且國家竭天下之財養長征兵士本欲備禦邊陲今淮南非用武之地而多屯禁軍坐費衣食是養無用之兵置諸無用之地又邊陲常無事則已異時或小有警急主兵之臣必爭求益兵京師之兵既少必須使使者四出大加召募廣為揀選將數倍多於今日所退之兵是棄已教閲經戰之兵而收市井畝之人本欲減冗兵而冗更多本欲省大費而費更廣非計之得也臣愚欲願朝廷且依舊法每歲揀禁軍有不任征戰者減充小分小分復不任執役者放令自便在京居止但勿使老病者尚占名籍虛費衣糧人情既安於所習國家又得其力冗兵既去大費自省此國家安危所繫不敢不言右正言李常亦以為言從之是年詔陝西就糧禁軍額十萬人方用兵之初其令陝西河東亟募士補其闕四年詔比選諸路配軍為陝西彊猛其以為禁軍給賜視壯勇為優隸步軍司役於逐路都監總管司詔廣東福建江西選本路配軍壯勇者合所募兵萬人以備征戍三月詔廣東路選雜犯配軍丁壯每五百人為一指揮屯廣州號新澄海如廣西之法七月手詔揀諸路小分年四十五以下勝甲者升以為大分五十已上願為民者聽舊制兵至六十一始免猶不即許至是免為民者甚衆冗兵由是大省十年遣官偕畿內京東西陝西荊湖長吏簡募軍士以補禁軍之闕元豐元年詔以馬軍選上軍上軍選諸班者並馬射弓一石力諸班直槍弩手闕選親從親事官餘並選捧日龍衛弓箭手二年雲騎軍闕二千一百以雲捷等軍補之六年騎兵年五十以下教武技不成而才可以肄習者並以為步軍元祐四年詔今後歲揀禁軍節級筋力未衰者年六十五始減充剩員八年涇原路經略司奏揀選諸將下剩員年六十以下精力不衰仍充軍以補闕額從之陝西諸路如之紹聖四年樞密院言龍騎係雜犯軍額闕數尚多今欲將禁軍犯徒兵及經斷者歲揀以填闕從之元符元年又言就糧禁軍闕額於廂軍內揀選年四十以下者填從之宣和七年詔京東西淮南兩浙帥司精選諸軍驍鋭發赴京畿輔郡兵馬制置使司靖康元年詔軍兵久失教習當汰冗濫精加揀擇然不能精也方兵盛時年五十已上皆汰為民及銷併之久軍額廢闕則六十已上復收為兵時政得失因可見矣中興以後兵不素練自軍校轉補之法行而揀選益精大抵有疾患則選有老弱則選藝能不精則選或由中軍揀補外軍或揀外邊精鋭以升禁衛考軍防令諸軍招簡等杖天武第一軍五尺有八寸捧日天武第二軍神衛五尺七寸三分龍衛五尺有七寸拱聖神勇勝捷驍捷龍猛清朔五尺六寸五分驍騎雲騎驍勝宣武殿前司虎翼殿前司虎翼水軍五尺有六寸武騎寧朔步軍司虎翼水軍揀中龍衛神騎廣勇龍騎驍猛雄勇吐渾擒戎新立驍捷驍武廣鋭雲翼有馬徑勇步武威捷武衛牀子弩雄武飛山雄武神鋭振武新招振武新置振武振華軍雄武弩手上威猛廳子無敵上招收冀州雄勝澄海水軍弩手五尺五寸廣捷威勝廣德克勝陝府雄勝驍雄雄威神虎保捷清邊弩手制勝清澗平海雄武龍德宮清衛寧遠安遠五尺四寸五分克戎萬捷雲捷橫塞捉生有馬雄略效忠宣毅建安威果全捷川效忠揀中雄勇懷順忠勇教閲忠節神威雄略下威猛五尺四寸亳州雄勝飛騎威遠蕃落懷恩勇捷上威武下威武忠節靖安川忠節歸遠壯勇宣效五尺三寸五分濟州雄勝騎射橋道清塞奉先奉國武寧威勇忠果徑勇下招收壯武雄節靜江武雄廣節澄海懷遠寧海刀牌手必勝五尺三寸揀中廣效武和武肅忠靖三路廂軍五尺二寸建炎三年詔江南江東兩浙諸州軍正兵土兵除鎮江越州委守臣兵官巡檢六分中選一分部轄人年四十五以下長行年三十五以下合用器甲候旨選擇赴行在有磱弱不堪年甲不應或占庇不如數選發其當職官有刑四年詔神武義軍統制王下閲到第三等軍兵一千六百六十人填廂禁軍其不任披帶者分填嚴州新禁軍紹興二年上謂輔臣曰邵青單德忠李捧三盜招安至臨安日久卿等其極揀汰呂浩秦檜得旨與張俊同閲視堪留者近七千人詔命張俊選精鋭得兵五千人詣行在二十年樞密院言都統吳玠選中護衛西兵千人詔隸殿司又統制楊政選西兵三百二十五人填步軍司二十四年詔御龍直見闕數可以殿步二司選拍試填諸班乾道二年詔王琪選三百人充馬軍慶元三年殿司言正額效用萬一千五百九十二人闕二百五十九人於雄效內及效用帶甲拍試一石力弓三石力弩合格人填闕額詔崇政殿祗候親從填班直人數特與免其三衙舊司官兵及御馬直合揀班人照闕額補嘉定十一年臣僚言今軍政所先莫如汰卒謂如千兵中有百人老弱遇敵先奔即千人皆廢矣乞嚴敕中外將帥務核其實其省併法自咸平始建炎以後臣僚屢言軍額有闕則併隸一等軍分足其舊額以便教閲而指揮制領將佐之屬亦或罷或省悉從其請蓋當多事之秋患兵之不足望增補以壯軍容事既寧息患其有餘必併省以核軍實意則在乎少蘇民力也嘉熙初臣僚言今日兵貧若此思變而通之於卒伍中取強勇者異其籍而厚其廩且如百人之中揀十人或二十或三十則是萬人中有三千兵矣時試之弓弩課之武藝暇則馳馬擊毬以為樂秋冬使之校獵其有材力精彊則厚賞賚之又於其中拔其尤者數愈少而廩愈厚待之如子弟倚之如腹心緩急可用蘇轍有言天子必有所私之將將軍必有所私之士又必申命主帥制領鼓動而精擇之假之統御之權嚴其階級之法將樂與士親士樂為將用則可以運動如意不必別移一軍別招新軍矣咸淳間招兵無虛日科降等下錢以萬計奈何任非其人白捕平民為兵召募無法揀選云乎哉廩祿之制為農者出租稅以養兵為兵者事征守以衛民其勢然也唐以天下之兵分置藩鎮天子府衛中外校卒不過十餘萬而國用不見其有餘宋懲五代之弊收天下甲兵數十萬悉萃京師而國用不見其不足者經制之有道出納之有節也國初太倉所儲才支三二歲承平既久歲漕江淮粟六百萬石而縑帛貨貝齒革百物之委不可勝用其後軍儲充溢常有餘羡內外乂安非偶然也凡上軍都校自捧日天武暨龍衛神衛左右廂都指揮使遙領團練使者月俸錢百千粟五十斛諸班直都虞候諸軍都指揮使遙領刺史者半之自餘諸班直將校自三十千至二千凡十二等諸軍將校自三十千至三百凡二十三等上者有傔廂軍將校自十五千至三百五十凡十七等有食鹽諸班直自五千至七百諸軍自一千至三百凡五等廂兵閲教者有月俸錢五百至三百凡三等下者給醬菜錢或食鹽而已自班直而下將士月給糧率稱是為差春冬賜衣有絹綿或加紬布緡錢凡軍士邊外率分口券或折月糧或從別給其支軍食糧料院先進樣三司定倉敖界分而以年月次之國初諸倉分給諸營營在國城西給糧于城東南北亦然相距有四十里者蓋恐士卒習墮使知負檐之勤久之有司乃取受輸年月界分以軍次高下給之凡三歲大祀有賜賚有優賜每歲寒食端午冬至有特支特支有大小差亦有非時給者邊戍季加給銀㙐邠寧環慶緣邊難於爨汲者兩月一給薪水錢苦寒或賜絮襦袴役兵勞苦季給錢戍嶺南者增月奉自川廣戍還者別與裝錢川廣遞鋪卒或給時服錢屨屯兵州軍官賜錢宴犒將校謂之旬設舊止待屯泊禁軍其後及于本城天聖七年法寺裁定諸軍衣裝騎兵春冬衣各七事步兵春衣七事冬衣六事敢質賣者重置之法景祐元年三司使程琳上疏論兵在精不在衆河北陝西軍儲數匱而召募不已且住營一兵之費可給屯駐三兵昔養萬兵者今三萬兵矣河北歲費芻糧千二十萬其賦入支十之三陝西歲費千五百萬其賦入支十之五自餘悉仰給京師自咸平逮今凡二邊所增馬步軍指揮百六十計騎兵一指揮所給歲約費緡錢四萬三千步兵所給歲約費緡錢三萬二千他給賜不預合新舊兵所費不啻千萬緡天地生財有限而用無紀極此國用所以日屈也今同華沿河州軍積粟至於紅腐而不知用沿邊入中粟價常踊貴而未嘗足誠願罷河北陝西募住營兵勿復增置遇闕即遷廂軍精鋭者補之仍漸徙營內郡以便糧餉無事時番戍于邊緩急即調發便近嚴戒封疆之臣毋得侵軼生事以覬恩賞違令者重置之法如此則疆埸無事而國用有餘矣帝嘉納之康定元年詔戰場士卒給奉終其身宰臣張士遜等言禁兵久戍邊其家在京師者或不能自給帝召內侍即殿隅條軍校而下為數等特出內藏庫緡錢十萬賜之慶曆五年詔湖南路發卒征蠻以給裝錢者毋得更豫帶甲錢七年帝因閲軍糧諭倉官曰自今後當足數給之初有司以糧漕自江淮積年而後支惟上軍所給斗升僅足中下軍率十得八九而已嘉祐八年殿前諸班請糧比進樣異輒不受散去御史中丞王疇以為言詔提點倉官自今往檢視有不如樣同坐之軍士不時請及有喧譁悉從軍法皇祐二年詔在外禁軍凡郊賚折色並給以實估之直五年詔廣南捕蠻諸軍歲滿歸營人賜錢二千月增奉錢二百度嶺陳亡及瘴癘物故者子孫或弟姪不以等樣收一人隸本營者支衣廩之半治平二年詔涇原勇敢軍揀為三等差給奉錢一千至五百為三等勿復置營以季集渭州按閲熙寧三年帝手詔倉使給軍糧例有虧減出軍之家侵牟益甚豈朕所以愛養將士意哉自今給糧毋損其數三司具為令於是嚴河倉乞取減刻之事四年詔付趙聞鄜延路諸軍數出至鬻衣裝以自給可密體量振恤之先是王安石言今士卒極窘至有衣紙而擐甲者此最為大憂而自來將帥不敢言振恤士卒恐成姑息以致兵驕臣愚以為親士卒如愛子故可與之俱死愛而不能令譬如驕子不可用也前陛下言郭進事臣案進傳言進知人疾苦所至人為立碑紀德士卒小有違令輒殺之惟其能犒賞存恤然後能殺違令者而人無怨今宜稍寬牽拘將帥之法使得用封樁錢物隨宜振恤然後可以責將帥得士卒死力也四年樞密院言不教閲廂軍撥併各帶舊請外今後招到者並乞依本指揮新定請受河北崇勝河東雄猛陝西保寧京東奉化京西壯武淮南寧淮各醬菜錢一百月糧二石春衣絹二匹布半匹錢一千冬衣絹二匹紬半匹錢一千綿十二兩兩浙崇節江東西效勇荊南北宣節福建保節廣東西清化除醬菜錢不支外餘如六路川四路克寧已上各小鐵錢一千糧二石春衣絹一匹小鐵錢十千冬衣絹一匹紬一匹綿八兩小鐵錢五千並從之七年增橋道清塞雄勝諸軍奉滿三百又詔今後募禁軍等賞給並減舊兵之半十年詔安南道死戰沒者所假衣奉咸蠲除之弓箭手民兵義勇等有貸於官者展償限一年又中外禁軍有定額而三司及諸路歲給諸軍亦有常數其闕額未補者會其歲給並封樁樞密承旨司簿其餘數輒移用論如法元豐二年詔荊南雄略軍十二營南戍瘴沒者衆其議優恤之軍校子孫降授職有疾及不願為兵若無子孫者加賜緡錢軍士子孫弟姪收為兵並給賻除籍後仍給糧兩月即父母年七十已上無子孫者給衣廩之半終其身哲宗即位悉依舊制徽宗崇寧四年詔諸軍料錢不多比聞支當十錢恐難分用自今可止給小平錢初蔡京謀逐王恩計不行欲陰結環衛及諸士卒乃奏皇城鋪兵月給食錢五百者日給一百五十自是每月頓增四貫五百欲因以市私恩也五年樞密院言自熙寧以來封樁隸樞密院比因創招廣勇崇捷崇武十萬人權撥封樁入尚書省緣禁軍見闕數多若專責戶部及轉運司應副恐致誤事詔尚書省候極足十萬人外理合撥還自今應禁軍闕額封樁錢仍隸樞密院宣和七年詔國家養兵衣食豐足近歲以來官不守法侵奪者多若軍司乞取及因事率斂刻剝分數反致不足又官吏冗占猥多修造役使違法差借雜役之兵食浮於禁旅假借之卒役重於廂軍近因整緝軍政深駭聽聞自今違戾如前者重置之法靖康元年詔諸路州軍二稅課利先行樁辦軍兵合支每月糧料春衣冬賜數足方許別行支散官吏請給等禁軍月糧並免坐倉自國初以來內則三司外則漕臺率以軍儲為急務故錢糧支賜歲有定數至於征戍調發之特支將士功勞之犒賞與夫諸軍闕額而收其奉廩以為上供之封樁者雖無定數而未嘗無權衡於其間也封樁纍朝皆有之而熙寧為盛其後雖有今後再不封樁之詔然軍司告乏則暫從其請稍或優足則封樁如舊蓋宰執得人則闕額用於朝廷樞管勢重則闕額歸之密院此政和軍政所以益不逮於崇寧大觀之間者由兩府之勢互有輕重而不能恪守祖宗之法也中興以後多遵舊制紹興四年御前軍器所言萬全雜役額五百戶部廩給有常法比申明裁減盡皆遁逃若依部所定月米五斗五升日不及二升麥四斗八升斗折錢二百日餐錢百實不足贍詔戶部裁定月米一石七斗增作一石九斗五年詔效用八資舊法內公據甲頭名稱未正其改公據為守闕進勇副尉日餐錢二百五十米二升甲頭為進勇副尉日餐錢三百米二升非帶甲入隊人自依舊法宣撫使韓世忠言本軍調發老幼隨行緣效用內有不調月糧不增給日請軍兵米二升半錢百效用米二升錢二百乞日增給贍米一升半庶幾戰士無家纍後顧憂齊心用命詔分屯日即陳請十三年詔殿司諸統領將官別無供給職田日贍不足差兵營運浸壞軍政可與月支供給統制副統制月一百五十千統領官百千正將同正將五十千副將四十千準備將三十千皆按月給既足其家可責後效若仍前差兵負販從私役禁軍法所販物計贓坐之必罰無赦州縣知而不舉同罪主管步軍司趙密言比定諸軍五等請給招填闕額要以屏革姦弊第數內招收白身效用填馬步軍使臣闕其五等請給例內馬軍效用依五人衙官例步軍效用依三人衙官例緣舊效用曾經帶甲出入日止餐錢二百米二升有少壯善射者既見初收效用廩給稍優因逃他軍以希厚請今擬五等招收白身效用與舊效用不以馬步軍論概增其給人日支錢二百米二升填使臣闕隆興二年殿前司言諸軍法兵級年六十將校年六十五減充剩員給請內有戰功亦止半給比來年及不與減落乞每營置籍鄉貫年甲招刺日月悉書之一留本營一留戶部一留總領以備開落乾道八年樞密院言二月為始諸軍七人例以上二分錢三分銀五分會子五人例三分錢四分銀三分會子軍兵折麥餐錢全支錢使臣折麥料錢統制軍佐供給分數仍舊淳熙三年樞密院言兵部定請受格效用一資守闕毅士二資毅士三資守闕效士月各錢三千折麥錢七百二十米一石五升春冬衣絹各二匹四資效士錢三千折麥錢九百七十二米一石一斗三升有奇衣絹各二匹五資守闕聽候使喚錢四千五百折麥錢一千八十米一石二斗絹三匹有半六資聽候使喚錢四千五百折麥錢一千二百六十米一石四斗七升絹五匹七資守闕聽候差使八資聽候差使錢四千五百折麥錢一千四百四十米一石六斗八升絹各五匹九資守闕準備使喚十資準備差使錢五千折麥錢一千四百四十米六石八升絹各五匹紹熙元年知常德府王銖言沿邊城寨之官以備疆埸不虞廩祿既薄給不以時孤寒小吏何以養廉致使熟視姦猾泄漏禁物公私庇蓋恬不加問從而狥私受賕者有矣弓手士軍戍卒傭直糧食纍月不支迫於饑寒侵漁蠻獠小則致訟爭大則啓邊釁乞嚴敕州軍按月廩給如其未支守倅即不得先請己奉庶俾城寨官兵有以存濟緩急之際得其宣力安邊弭盜莫此為急厥後弊日以滋逮至咸淳軍將往往虛立員以冒稍食以建康言之有神策二軍有游擊五軍有親兵二軍有制效二軍有靖安唐灣水軍有游擊采石水軍有精鋭破敵軍有效用防江軍原其初起惟騎戎兩司額耳後乃各創軍分額多而員少一統制月請以會子計之則成一萬五百千推之他軍概可見矣九年四川制司有言戍兵生券人月給會子六千蜀郡物賈翔貴請增人月給九千當是時財賦之出有限廩稍之給無涯浚民膏血盡充邊費金帛悉歸于二三大將之私帑國用益竭而宋亡矣臣僚嘗言古者兵與農一官無供億之煩國有備禦之責後世兵與農二竭國力以養兵奉之若驕子用之若傭人今守邊急務非兵農合一不可其說者有二曰屯田曰民兵川蜀屯田為先民兵次之淮襄民兵為先屯田次之此足食足兵之良策也其言厄于權姦竟不行
