body:
  text: 宋史卷九十志第四十三地理六廣南東路廣南西路燕山府路廣南東路府一肇慶州十四廣韶循潮連梅南雄英賀封新康南恩惠縣四十三南渡後府三肇慶德慶英德州十一廣韶循潮連封新南恩梅雄惠紹興三十二年戶五十一萬三千七百一十一口七十八萬四千七百七十四廣州中都督府南海郡清海軍節度開寶五年廢咸寧番禺蒙化遊水四縣大觀元年升為帥府舊領廣南東路兵馬鈐轄兼本路經略安撫使元豐戶一十四萬三千二百六十一貢胡椒石髮糖霜檀香肉豆蔻丁香母子零陵香補骨脂舶上茴香沒藥沒石子元豐貢沉香甲香詹糖香石斛龜殼水馬鼊皮藤簞縣八南海望隋縣後改常康開寶五年復番禺上開寶中廢入南海皇祐三年復置有銀爐鐵場增城中清遠中有大富銀場靜定鐵場錢紏鉛場懷集中有大利銀場東管中下開寶五年廢入增城六年復置有桂角等二銀場靜康等三鹽場海南黃田等三鹽柵新會下有千歲錫場海晏等六鹽場信安下本義寧縣開寶五年廢入新會六年復置太平興國初改信安熙寧五年省為鎮入新州新興縣元祐元年復為縣紹聖元年復省為鎮後復為縣還隸廣州南渡後無信安增縣一香山紹興二十二年以東管香山鎮為縣韶州中始興郡軍事元豐戶五萬七千四百三十八貢絹鍾乳縣五曲江望有永通錢監靈源等三銀場中子銅場翁源望有大湖銀場大富鉛場樂昌中有黃坑等二銀場太平鉛場仁化中開寶五年廢入樂昌咸平三年復置有大衆多田二鐵場多寶鉛場建福宣和三年以岑水場析曲江翁源地置縣南渡後無建福增縣一乳源乾道二年析曲江之崇信樂昌依化鄉於洲頭津置監一永通循州下海豐郡軍事元豐戶四萬七千一百九十二貢絹藤盤縣三龍川望有大有鉛場宣和三年改龍川曰雷鄉紹興元年復舊興寧望晉縣天禧三年移治長樂有夜明銀場長樂上熙寧四年析興寧縣置有羅翊等四錫場潮州下潮陽郡軍事元豐戶七萬四千六百八十二貢蕉布甲香鮫魚皮縣三海陽望有海門等三寨三河口鹽場豐濟銀場橫衡等二錫場潮陽中下本海陽縣地紹興二年廢入海陽八年復揭陽宣和三年割海陽三鄉置揭陽縣紹興二年廢入海陽八年復仍移治吉帛村是謂三陽連州下連山郡軍事元豐戶三萬六千九百四十三貢苧布官桂元豐貢鍾乳縣三桂陽望有同官銀場陽山中有銅坑銅場連山中紹興六年廢為鎮十八年復梅州下軍事本潮州程鄉縣南漢置恭州開寶四年改熙寧六年廢元豐五年復宣和二年賜郡名義安紹興六年廢州為程鄉縣仍帶程鄉軍事十四年復為州元豐戶一萬二千三百七十貢銀布縣一程鄉中有樂口銀場石坑鉛場龍坑鐵場南雄州下本雄州軍事開寶四年加南字宣和二年賜郡名保昌元豐戶二萬三百三十九貢絹縣二保昌望始興中舊隸韶州開寶四年來隸英德府下本英州軍事宣和二年賜郡名曰真陽慶元元年以寧宗潛邸升府元豐戶三千一十九貢紵布縣二真陽望有鍾洞銀場禮平銅場光上開寶四年自廣州隸連州六年自連州來隸有賢德等三銀場賀州下臨賀郡軍事開寶四年廢蕩山封陽馮乘三縣本屬東路大觀二年五月割屬西路戶四萬二百五貢銀縣三臨賀緊有太平銀場富川上桂嶺中南渡後屬廣西路封州望臨封郡軍事本下郡大觀元年升為望郡紹興七年省州以二縣隸德慶府十年復舊元豐戶二千七百七十九貢銀縣二封川下開建下開寶五年廢入封川六年復置肇慶府望高要郡肇慶軍節度本端州軍事元符三年升興慶軍節度大觀元年升下為望重和元年賜肇慶府名仍改軍額元豐戶二萬五千一百三貢銀石硯縣二高要中有沙利銀場浮蘆鐵場四會中舊隸廣州熙寧六年來屬有金場銀場新州下新興郡軍事開寶五年廢平興縣元豐戶一萬三千六百四十一貢銀縣一新興中咸平六年移治州城西德慶府望本康州晉康郡軍事開寶五年廢州及悅城晉康都城並入端溪以隸端州尋復為州大觀四年升為望郡紹興元年以高宗潛邸升為府十四年置永慶軍節度元豐戶八千九百七十九貢銀縣二端溪下有雲烈錫場瀧水下舊隸瀧州州廢以縣來隸有羅磨護洞二銀場南恩州下恩平郡軍事舊恩州開寶五年廢恩平杜陵二縣慶曆八年以河北路有恩州乃加南字元豐戶二萬七千二百一十四貢銀縣二陽江中有海口海陵博臘遂訓等四寨有鉛場陽春下熙寧六年廢春州併銅陵縣入陽春來隸有欖徑鐵場惠州下軍事宣和二年賜郡名博羅元豐戶六萬一千一百二十一貢甲香藤箱縣四歸善中有阜民錢監酉平流坑二銀場永吉信上永安三錫場三豐鐵場淡水鹽場海豐下有靈溪楊安勞謝三錫場古龍石橋二鹽場河源緊有立溪和溪永安三錫場博羅中有鐵場廣南西路大觀元年割融柳宜及平允從庭孚觀九州為黔南路融州為帥府宜州為望郡三年以黔南路併入廣西以廣西黔南路為名四年依舊稱廣南西路州二十五桂容雍融象昭梧藤龔潯柳貴宜賓橫化高雷欽白鬱林廉瓊平觀軍三昌化萬安朱崖縣六十五南渡後府二靜江慶遠州二十容雍象融昭梧藤潯貴柳賓橫化高雷欽廉賀瓊鬱林軍三南寧萬安吉陽紹興二十二年戶四十八萬八千六百五十五口一百三十四萬一千五百七十二靜江府本桂州始安郡靜江軍節度大觀元年為大都督府又升為帥府舊領廣南西路兵馬鈐轄兼本路經略安撫使紹興三年以高宗潛邸升府寶祐六年改廣西制置大使後四年廢復為廣西路經略安撫使元豐戶四萬六千三百四十三貢銀桂心縣十一臨桂緊嘉祐六年廢慕化縣入焉興安望唐全義縣晉置溥州乾德元年州廢太平興國初改今名靈川望荔浦望永福下修仁中熙寧四年廢修仁縣為鎮入荔浦元豐元年復義寧中下本義寧鎮馬氏奏置開寶五年廢入廣州新會六年復置理定下古下永寧中唐豐水縣熙寧四年廢為鎮入荔浦元祐元年復南渡後無永寧縣容州下都督府普寧郡寧遠軍節度開寶五年廢欣道渭龍陵城三縣元豐戶一萬三千七百七十六貢銀珠砂縣三普寧上開寶五年廢繡州以常林阿林羅繡三縣並入焉陸川中開寶五年廢順州省龍豪溫水龍化南河四縣入焉九年移治公平淳化五年又徙治於舊溫水縣北流中開寶五年廢禺州以石扶萊羅辨陵城四縣地入焉雍州下都督府永寧郡建武軍節度開寶五年廢朗寧封陵思龍三縣大觀元年升為望郡紹興三年置司市馬于橫山寨以本路經略安撫總州事同提點買馬專任武臣隆興後文武通差寶祐元年兼雍宜欽融鎮撫使元豐戶五千二百八十八貢銀縣二宣化下景祐二年廢如和縣入焉武緣下景祐二年廢樂昌縣入焉寨一太平舊領永平太平古萬橫山四寨元豐九域志止存太平一寨金場一鎮乃熙寧六年置羈縻州四十四縣五洞十一忠州凍州江州萬丞州思陵州左州思誠州談州渡州龍州七源州思明州西平州上思州祿州石西州思浪州思同州安平州員州廣源州勤州南源州西農州萬崖州覆利州溫弄州及武黎縣羅陽陀陵縣永康縣武盈洞古甑洞憑祥洞鐏洞卓洞龍英洞龍聳洞徊洞武德洞古佛洞八洞並屬左江道思恩州鶼州思城州勘州歸樂州武州倫州萬德州蕃州昆明州婪鳳州侯唐州歸恩州田州功饒州歸城州武籠州及龍川縣並屬右江道初安平州曰波州皇祐元年改元祐三年又改懷化洞為州融州融水郡清遠軍節度本軍事州大觀二年升為帥府三年罷帥府賜軍額又升為下都督府崇寧元年置武陽寨羅城堡二年置樂善寨廢羅城堡四年即融水縣王口寨置平州政和元年廢平州仍為王口寨與融江文村潯江臨溪四堡寨來隸尋復故紹興四年復廢平州為王口寨觀州為高峯寨元豐戶五千六百五十八貢金桂心縣一融水中開寶五年置羅城縣熙寧七年廢武陽羅城二縣為鎮來隸寨一融江南渡後增縣一懷遠下紹興四年州廢復為寨來隸十四年復為縣有臨溪文村潯江三堡高峯寨羈縻州一樂善州象州下象郡景德四年升防禦景定三年徙治來賓縣之蓬萊元豐戶八千七百一十七貢金藤器子縣四陽壽中下來賓中下舊隸嚴州州廢來屬開寶七年又以廢嚴州之歸化入焉武化下熙寧七年廢武化縣入來賓元祐元年復武仙下南渡後無武化縣昭州下平樂郡軍事開寶五年廢永平縣元豐戶一萬五千八百八十貢銀縣四平樂中大中祥符元年移治州城東立山中熙寧五年廢蒙州以東區蒙山二縣入焉龍平中開寶五年廢富州以縣來隸又以思勤馬江入焉熙寧八年又隸梧州元豐八年復來隸宣和中改昭平淳熙六年復今名恭城下太平興國元年徙治于北鄉龍渚市景定五年復舊梧州下蒼梧郡軍事元豐戶五千七百二十貢銀白石英縣一蒼梧下熙寧四年省戎城縣為鎮入蒼梧藤州下感義郡軍事開寶三年廢寧風感義義昌三縣元豐戶六千四百二十二貢銀縣二鐔津中岑溪下熙寧四年廢南儀州為縣隸州龔州下臨江郡軍事開寶五年廢陽川武林隨建大同四縣政和元年州廢隸潯州三年復紹興六年復廢仍隸潯州元豐戶八千三十九貢銀縣一平南中開寶五年以思明州之武郎來屬嘉祐二年廢武郎縣入焉潯州下潯江郡軍事開寶五年廢皇化縣俄又廢州以桂平隸貴州六年復置元豐戶六千一百四十一貢銀縣一桂平下柳州下龍城郡軍事咸淳元年徙治柳城縣之龍江元豐戶八千七百三十貢銀縣三馬平中洛容中嘉祐四年廢象縣入洛容柳城中梁龍城縣景德三年改貴州下懷澤郡軍事元豐戶七千四百六十貢銀縣一鬱林中下隋鬱平縣開寶四年改慶遠府下本宜州龍水郡慶遠軍節度舊軍事州景祐三年廢崖山縣宣和元年賜軍額河池縣不詳何年併省咸淳元年以度宗潛邸升慶遠府元豐戶一萬五千八百二十三貢生豆蔻草豆蔻元豐貢銀縣四龍水上淳化五年以柳州洛曹來隸嘉祐七年廢入龍水熙寧八年二月廢羈縻懷遠軍古陽縣為懷遠寨迷昆縣為鎮並思立寨並入焉有懷遠思立二寨後改宜山天河下大觀元年六月以天河縣並德謹寨堰江堡隸融州靖康元年九月復來隸有德謹一寨欣城中下慶曆三年以羈縻芝欣歸思等州地置縣思恩下熙寧八年自環州來隸徙治帶溪寨省鎮寧州禮丹縣入焉元豐六年復徙舊治有普義帶溪鎮寧三寨南渡後增縣一河池下有銀場羈縻州十軍一監二溫泉州環州鎮寧州領縣二蕃州金城州文州蘭州領縣三安化州領縣四迷昆州智州領縣五懷遠軍領縣一又有富仁富安二監舊領思順歸化二州慶曆四年併入柳州馬平縣賓州下安城郡軍事開寶五年廢州琅琊保城二縣以嶺方隸雍州六年以嶺方復置州元豐戶七千六百二十貢銀藤器縣三嶺方下遷江中本雍州羈縻州天禧四年置上林中下開寶五年自雍州來屬廢澄州止戈賀水無虞入焉橫州下寧浦郡軍事開寶五年廢樂山從化二縣又以廢巒州永定來屬元豐戶三千四百五十一貢銀縣二寧浦下永定下開寶六年廢巒州武靈羅竹二縣入焉熙寧四年省入寧浦元祐三年復置後更名永淳化州下陵水郡軍事本辨州太平興國五年改開寶中廢陵羅縣元豐戶九千三百七十三貢銀高良薑縣二石龍下吳川下本屬羅州州廢開寶五年來隸南渡後增縣一石城乾道三年析吳川西鄉置因石城岡為名高州下高涼郡軍事開寶五年廢良德縣景德元年併入竇州移治茂名三年復置以二縣還隸元豐戶一萬一千七百六十六貢銀縣三電白下信宜中下唐信儀縣太平興國初改信宜熙寧四年廢