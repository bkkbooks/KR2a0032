body:
  text: 宋史卷五十八志第十一天文十一流隕二熙寧元年正月辛卯星出張西南如太白速行入濁沒赤黃乙未星出左攝提西如太白東南急行至庫樓北沒赤黃有尾跡二月戊午星出常陳南如太白西慢行至軒轅東沒赤黃有尾跡辛酉星出北斗魁東如太白南急行至軒轅大星南沒赤黃有尾跡壬戌星出角東如太白西急行至翼沒赤黃有尾跡戊辰星出大角南如太白東南急行至氐沒赤黃有尾跡己巳星出天市垣內宦者如太白西南急流至氐沒青白有尾跡四月壬寅星出軒轅南如太白東南慢行至軫沒赤黃有尾跡己酉星出天市垣內宦者西如太白西南慢流至織女沒青白有尾跡壬戌星出天棓東如太白東北慢行至天津沒赤黃有尾跡五月乙亥星出天棓如太白東北急行至天津沒青白有尾跡照地明六月癸卯星出天槍南如太白西南速行至角沒赤黃有尾跡又星出平星南如太白西南急行入濁沒青白有尾跡乙巳星出軫東如太白緩行入濁沒青白有尾跡照地明丁未星出牽牛西如太白東南速行入濁沒赤黃戊申星出騎官北如太白南緩行入濁沒青白又星出壘壁陳如太白東南速行至濁沒戊午星出閣道北如歲星東北緩行入濁沒青白庚申星透雲出天棓西如太白北急行至天市垣西牆沒赤黃有尾跡壬戌星出王良南如歲星東北急行至天大將軍沒赤黃有尾跡有星出紫微垣內至鈎陳沒赤黃有尾跡又星出紫微垣內北極南如太白西北速行至西咸北沒赤黃有尾跡甲子星出尾北如杯口西緩行至平星沒赤黃有尾跡丙寅星出氐北如歲星西南急流入濁沒赤黃有尾跡七月乙亥星出虛南如歲星西急行至天市垣西牆沒赤黃色有尾跡丙子星出東壁東如太白東南急行入濁沒赤黃有尾跡丙戌星出天大將軍北如歲星東北慢行入濁沒青白乙未星出九坎北如太白西北緩行至牽牛分迸而沒赤黃又星出右旗如太白西緩行入濁沒青白有尾跡照地明己亥星出天廩北如太白南急行至天苑沒赤黃有尾跡照地明八月癸卯星出天棓東如太白北速行入濁沒赤黃有尾跡照地明甲辰星透雲出虛北如歲星北緩行至奎沒赤黃乙巳星出女牀東如杯口西北急流至天市垣牆河中沒赤黃有尾跡照地明又星出參北如太白東速行入濁沒赤黃有尾跡照地明又星出王良南如太白西南急行至天津沒赤黃有尾跡照地明丙午星出左攝提南如太白西北慢行至濁沒赤黃有尾跡丁未星出牽牛如杯口東南緩行入濁沒青白有尾跡癸亥星出壘壁陳如太白西南緩行至狗國沒赤黃有尾跡照地明乙丑星出壘壁陳北如太白西南速行至十二國沒赤黃有尾跡九月甲戌星出上台南如太白東北急行至內平星沒赤黃有尾跡照地明庚辰星出北斗魁中如歲星西北緩行入濁沒青白又星出弧矢西如太白西南急行至天社沒青白有尾跡照地明辛巳星出紫微垣內北極星北如太白北急行入濁沒赤黃有尾跡照地明癸未星出紫微垣南如太白北急行至北斗沒赤黃有尾跡戊子星出畢南如太白東南慢行入濁沒青白有尾跡照地明癸巳星出織女西如太白西南慢流入天市垣內沒赤黃有尾跡照地明甲午星出中台北如太白東南急流至下台沒青白照地明丙申星出天津北如歲星西北急流至女牀沒赤黃丁酉星出軒轅如太白西北慢流至紫微垣內北極沒赤黃有尾跡照地明十月庚子星出羽林軍東如太白東急行入濁沒赤黃有尾跡照地明又星出壘壁陳西如杯口西南速行入濁沒青白照地明壬寅星出鈎陳西如太白北急行至北斗沒赤黃有尾跡又星出東井北如歲星東北急行至柳沒赤黃有尾跡又星出扶筐如太白西北急行至濁沒赤黃有尾跡照地明甲辰星出壘壁陳東如太白南急行入濁沒赤黃有尾跡照地明又星出天津西如太白西北緩行入濁沒青白照地明又星出昴南如太白西南緩行至天囷沒赤黃有尾跡明燭地又星出郎位東如太白東北速行至右攝提沒赤黃明燭地庚戌星出婁南如歲星西南速行至昴沒青白有尾跡乙卯星出天市垣南牆西如太白西急行入濁沒青白壬戌星出軒轅西如太白東南急行至張沒赤黃有尾跡癸亥星出婁北如太白西急流至濁沒赤黃有尾跡十一月庚午星出鈎陳東如太白東北急流至北斗魁沒青白有尾跡照地明癸未星出營室東如太白西南急行至羽林軍沒赤黃有尾跡十二月己亥星出王良北如太白東慢行至五車沒赤黃有尾跡照地明庚子星出天倉東如太白東南急行至濁沒青白有尾跡辛酉星出太微垣東牆如太白速行至柳沒黃白有尾跡二年正月庚寅星透雲出紫微垣內鈎陳西如太白西慢行入濁沒青白二月甲辰星出平星南如太白南急行入濁沒赤黃有尾跡三月壬辰星出天市垣西牆東如太白北急行至天紀沒赤黃有尾跡癸巳星出貫索南如太白東南慢行至濁沒四月庚戌星出軒轅東如杯口北慢行至北斗沒赤黃有尾跡辛酉星出閣道西如太白東南速行至東壁沒青白有尾跡五月己丑星出太微垣內五帝坐如杯口東行至角宿沒青白有尾跡照地明六月己亥星出心西如歲星西南急行至庫樓沒赤黃有尾跡乙巳星出氐南如太白南緩行入濁沒赤黃有尾跡壬子星出天津如太白西北速行至天槍沒青白有尾跡辛酉晝有流星夕有星透雲出織女西南急行入濁沒赤黃有尾跡癸亥星出太微垣東牆如太白西急行入濁沒青白有尾跡甲子星出尾北如太白南急行入濁沒青白七月丁卯星出危南如太白西南急行至壘壁陳沒赤黃有尾跡辛未星出梗河東如太白西北速行至天槍沒赤黃有尾跡丁亥星出天船西如太白東北速行入濁沒赤黃有尾跡甲午星出天津西如太白西南緩行至心沒赤黃有尾跡八月丁酉星透雲出鈎陳西如太白西南急流至天棓沒赤黃有尾跡癸亥星出北斗魁北如太白北急流入濁沒青白有尾跡九月甲子星出婁北如歲星西北急行至王良沒青白有尾跡甲戌星出右旗如太白西南急行至天市垣西牆沒赤白有尾跡丁丑星出五車東如歲星東北速行至北河沒青白有尾跡十月乙未星出天苑南如太白速行入濁沒赤黃有尾跡甲辰星出畢東如太白南急行至濁沒赤黃有尾跡癸丑星出胃東如太白西南急流至天苑沒青白有尾跡甲寅星出卷舌西如歲星西南急行至婁沒青白有尾跡十一月丙寅星出織女北如太白西南急行至河鼓沒青白有尾跡照地明壬申星出羽林軍內如歲星西南急行至濁沒青白己卯星透雲出大陵北如太白西南急行至東壁沒青白有尾跡閏十一月辛酉星出天倉如歲星西南緩行至濁沒青白三年正月丙申星出右攝提如太白東北速行入濁沒赤黃有尾跡己未星出畢如杯西南緩行至濁沒青白有尾跡二月丁卯星出七星南如太白西南急行至濁沒青白己丑星出太微西扇上將南如盂西急行入濁沒赤黃有尾跡明燭地又星出文昌中如杯西北急行入濁沒赤黃有尾跡明燭地又星出北斗魁南如盂西北急行入濁沒赤黃有尾跡明燭地庚寅星出紫微垣西牆東如杯北慢流至濁沒赤黃有尾跡明燭地三月戊戌星出七公如杯速行入紫微垣中鈎陳沒青白有尾跡明燭地壬寅星出天市垣西牆東如杯東南急流至騎官沒青白有尾跡己未星出軫北如太白西北慢行至明堂沒赤黃有尾跡四月壬戌星出紫微垣內帝星南如太白北急行至鈎陳沒赤黃有尾跡癸未星出文昌南如杯西北慢行至濁沒青白有尾跡照地明甲申星出軒轅東如太白東南慢行至太微垣左執法赤黃六月己巳星出牽牛東如太白東急流至濁沒赤黃有尾跡壬申星出紫微垣西牆北如太白東北慢流至濁沒赤黃庚辰星出羽林軍東如杯東南急流入濁沒青白有尾跡七月庚子星透雲出紫微垣西牆如太白南慢行至天市垣西牆沒青白有尾跡八月丙戌星出紫微垣西牆如杯北急行至濁沒赤黃有尾跡九月己亥星出紫微垣西牆如太白西北慢流至濁沒青白有尾跡丁未星透雲出天船如太白西慢流至內階沒赤黃有尾跡庚戌星出紫微垣東牆如太白東北急流至鈎陳沒青白有尾跡十月己未星出奎西如太白南慢行至天倉南沒青白有尾跡戊辰星出天囷西如太白西南速行至土司空沒赤黃有尾跡十一月戊戌星出五車如太白西南緩行入濁沒赤黃有尾跡十二月甲子星出外屏如太白西南速行入濁沒赤黃有尾跡四年正月丙午星出五車西如杯南速行入濁沒赤黃照地明二月甲子星出昴西如杯西緩行入濁沒青白三月癸巳星出天市垣內斗星西如太白西北速行至貫索西沒赤黃有尾跡五月己亥星出左攝提如太白東北急行至濁沒赤黃有尾跡六月丁丑星出營室西如太白西南急流至壘壁陳沒赤黃有尾跡辛巳星出造父西如太白東南慢流至天棓沒青白有尾跡七月戊申星出天津東如太白西慢流至天棓沒赤黃有尾跡八月己未星出五諸侯西如太白東南慢流入濁沒青白有尾跡照地明辛酉星出天市垣西牆西如太白西急行入濁沒赤黃有尾跡癸亥星出北河西如太白西北急行至上台沒赤黃乙丑星出南斗北如太白西南緩行入濁沒赤黃九月甲午星出紫微垣西牆東如太白東北速行入濁沒赤黃有尾跡乙巳星出天廩如太白南緩行至天苑沒青白有尾跡照地明丙午星出北落師門南如太白南緩行至天苑沒青白有尾跡照地明又星出北落師門南如太白南緩行入濁沒青白有尾跡十月壬子星出紫微垣內北極北如太白東北緩行至紫微垣西牆沒青白有尾跡癸丑星出外屏北如太白東緩行至天囷沒赤黃有尾跡甲寅星出文昌西如杯北速行至紫微垣右樞沒青白有尾跡照地明乙卯星出牽牛如太白南速行入濁沒赤黃有尾跡庚申星出天苑南如太白東南慢行至濁沒赤黃有尾跡戊辰星出天囷東如杯東緩行至濁沒青白有尾跡癸酉星出五車東如太白東北急行至濁沒赤黃有尾跡照地明十一月壬辰星出天棓西如杯西北緩行至濁沒赤黃有尾跡庚子星出太微垣左執法南如太白東南慢行至角沒赤黃有尾跡五年七月己丑星出七公南如太白西南急行至天市垣西牆沒赤黃癸巳星出太微垣東如杯西急行入濁沒青白有尾跡如鈎南行十月戊寅星出紫微垣內後宮東如杯北慢行入濁沒赤黃照地明又星出文昌西如杯急行至卷舌沒赤黃有尾跡照地明甲申星出天雞南如杯西慢行至濁沒赤黃丁亥星出紫微垣東如杯北慢行至濁沒青白戊子星出羽林軍如太白西南急行至濁沒赤黃有尾跡乙巳星出婁南如杯西北急行至七公沒赤黃有尾跡照地明十一月甲寅星出七星南如杯西慢行至參旗沒青白有尾跡十二月辛卯星透雲出五車東如太白東北急行至文昌沒赤黃有尾跡壬辰星出招搖東如太白西北急行至濁沒青白丙申星出角南如太白南慢行至庫樓沒赤黃有尾跡六年正月庚申星出天市垣東如杯東南急行至濁沒青白三月庚午星出氐東如盂西慢行入濁沒赤黃照地明四月丙子星出貫索西如杯北慢行至紫微垣牆上宰沒青白照地明戊寅星出貫索西如太白西南急行至亢沒赤黃有尾跡己卯星出柳北如太白西南急行至南河沒赤黃有尾跡五月癸卯星出騰蛇西如杯西北慢行至濁沒青白照地明六月辛卯星出營室北如杯東南急行至壘壁陳沒赤黃有尾跡照地明庚子星出天市垣吳越東如杯東南急行至牽牛沒青白有尾跡照地明七月丙寅星出壘壁陳西如杯南緩行至濁沒青白有尾跡戊辰星出天關如杯東南緩行至東井內沒青白有尾跡照地明己巳星出天倉東