body:
  text: 宋史卷八十一志第三十四律曆十四中原既失禮樂淪亡高宗時胡銓著審律論曰臣聞司馬遷有言曰六律為萬事根本其於兵械尤所重望敵知吉凶聞聲效勝負百王不易之道也臣嘗深愛遷之言律於兵械為尤重而深惜後之談兵者止以戰鬥擊刺奇謀此律之所以汨陳而學者未嘗道也夫律度量衡古也淵源於馬遷濫觴於班固劉昭挹其流孟康京房錢樂之之徒汨其泥而揚其波遷之言曰黃鐘之實八十一以為宮而以九為法實如法得長一寸則黃鐘為九寸矣黃鐘之實十七萬七千一百四十七而以一萬九千六百八十三為法實如法亦得長一寸亦黃鐘為九寸也然則十七萬七千一百四十七與夫所謂八十一者雖多少之不同而其實一也萬九千六百八十三與夫所謂九者雖多少之不同而其法一也又曰丑二寅八卯十六辰六十四夫丑與卯陰律也寅與辰陽律也生陰律者皆二所謂下生者倍其實生陽律者皆四所謂上生者四其實遷之言財數百可謂簡矣而後之言律者祖焉是不亦淵源於馬遷乎固之言曰黃鐘之實八百一十分蓋遷意也然以林鐘之實五百四十而乃以為六百四十林鐘太蔟之實以其長自乘則聲雖有小同於黃鐘之宮耳然則魏柴玉製律而與黃鐘商徵不合其失兆此矣夫自子一分終於亥十七萬七千一百四十七分蓋遷術也而固亦曰太極元氣函三為一始動於子參之於丑歷十二辰之數而得黃鐘之實以為陰陽合德化生萬物其說蓋有本矣然其言三分蕤賓損一下生大呂而不言夫所謂濁倍之變何夫蕤賓之比於大呂則蕤賓清而大呂濁今又損二分之一以生大呂則大呂之聲乃清於蕤賓是不知夫倍大呂之濁然則蕭衍之論至於夾鐘而裁長三寸七分其失兆此矣是不亦濫觴於班固乎昭之言曰推林鐘之實至十一萬八千九十八太蔟之實至十五萬七千四百六十四二乘而三約之者為下生之實四乘而三約之者為上生之實此遷固之意昭則詳矣然以蕤賓為上生大呂而大呂乃下生夷則何也蓋昭之說陽生陰為下生陰生陽為上生今以蕤賓為上生大呂則是陽生陰乃上生也以大呂為下生夷則是陰生陽乃下生也其蔽亦由不知夫大呂有濁倍之變則其視遷固去本遠矣是不亦挹其流於劉昭乎若夫孟康京房錢樂之之徒則又大不然矣夫班固以八十一分為黃鐘之實起十二律之周徑度其長以容其實初未嘗有徑三圍九之說也康之徒惑於八十一分之實以一寸為九十分而不察方圜之異於是有徑三圍九之論興焉天律之形圜如以為徑三圍九則刓其四用之方而不足於九分之數以之容黍豈能至於千二百哉然則所謂圍九方分也何以知之知龠之方則知黃鐘之分亦方也固雖無明說其論洛下閎起曆之法曰律容一龠積八十一寸則一日之分也夫八十一寸者是乃八百一十分以千二百黍納之龠中則不搖而自滿是無異黃鐘之容也龠之制方寸而深八分一龠之方則黃鐘之分安得而不方哉圍九方分而圜之則徑不止於三分矣故夫徑三圍九之說孟康為之也然由律生呂數十有二止矣京氏演為六十錢樂之廣為三百六十則與黃帝之說悖矣蓋樂之用淮南之術一律而生五音十二律而為六十音而六之故三百六十音以當一歲之日以黃鐘太蔟姑洗林鐘南呂生三十有四以大呂夾鐘中呂蕤賓夷則無射生二十有七應鐘生二十有八始於包育而終於安運然由黃鐘迄于壯進百有五十則三分損一焉以下生由依行迄于億兆二百有九則三分益一焉以上生惟安運為終而不生其言與黃帝之法大相牴牾自遷固而下至是雜然莫適為主至五季王朴而後議少定沈括蔣之奇論之當矣是不亦汨其泥而揚其波乎嗚呼律也者固以實為本而法為末陛下修其實於上而有司方定其法於下以協天地中和之聲則夫數子者其說有可考焉臣敢輕議哉淳熙間建安布衣蔡元定著律呂新書朱熹稱其超然遠覽奮其獨見爬梳剔抉參互考尋推原本根比次條理管括機要闡究精微其言雖多出於近世之所未講而實無一字不本於古人之成法其書有律呂本原律呂證辨本原者黃鐘第一黃鐘之實第二黃鐘生十二律第三十二律之實第四變律第五律生五聲圖第六變聲第七八十四聲圖第八六十調圖第九候氣第十審度第十一嘉量第十二謹權量第十三證辨者造律第一律長短圍徑之數第二黃鐘之實第三三分損益上下相生第四和聲第五權臣既誣元定以偽學貶死舂陵雖有其書卒為空言嗚呼惜哉久之宜春歐陽之秀復著律通其自序曰自律呂之度數不見於經而釋經者反援漢志以為據蓋濫觴於管子呂氏春秋流衍於淮南子司馬遷之書而波助於劉歆京房之學班固漢志盡歆所出也司馬彪志盡房所出也後世協律者類皆執守以為定法歷代合樂不為無人而終不足以得天地陰陽之和聲所以不能追還於隆古之盛者大抵由三分損益之說拘之也夫律固不能舍損益之說以求之由其有損有益而後有上生下生之異至其專用三分以為損益之法則失之未免乎聲與數之不相合有非天成之自然耳蓋嘗因其損益上下生之義而去其專用三分之蔽乃多為分法以求之自黃鐘以往其下生者盈十而上生者止一而已此其數之或損或益出於自然而與舊法固不侔矣若謂相生之法一下必一上既上而復下則其法之窮也於蕤賓大呂間見之夫黃鐘而降轉以相生至於姑洗則下生應鐘而應鐘之上生蕤賓者法也今乃蕤賓之生大呂又從而上生焉此班志所載所以變其說為下生大呂而大呂之長遂用倍法矣夫律之相生而用倍法猶為有理獨專用三分以為損益則律之長短不中乎天地自然之數爾生律之分蓋不止於三分損益之一端以一律而分為三此生律之極數特一求徵聲之法耳苟以三分損益一下生而一上生則聲律殆無窮矣何至於十二而止也乎夫十二律之生也十律皆下生一律獨上生唯其下生者損之極也而後上生者益焉上生則律窮矣此窮上反下窮下反上之理也琴一弦之間具十二律皆用下生之法而末以上生法終之若以七弦而緊慢之為旋宮之法則應鐘一均之律宮聲之外多用倍法生一律矣此天地聲音自然而然不可拘於一而不知通變也故正律止於十二而已竊意十二律之度數當具於周禮之冬官如考工記鳧氏為鐘磬氏為磬之類各有一職然冬官一篇既亡則世無以考其度數之詳而三分損益之說散見於書傳者恐或得之目擊而不及識其全或得之口授而未能究其誤或求諸耳決而不能究其真因是遂著為定論夫人皆以為法之盡善矣豈知三分損益所生之律乃僅得其聲之近似而未真蓋非師曠之聰則耳不能齊其聲之近似者足以惑人之聽是以不復求其法之未盡善者此蔡邕所以不如耳決之明者亦不能盡信其法也後世之制樂者不知律法之固有未善而每患其聲音高下之不協以至取古昔遺亡之器而求之蓋亦不知本矣聲以數而傳數以聲而定二者皆有自然之則如侈者聲必咋弇者聲必鬱高者數必短下者數必長侈弇者數也未聞其聲而已知其有咋鬱之分高下者聲也未見其數已知其有長短之異故不得其自然之聲則數不可得而考不得其自然之數則聲不可得而言今之制律者不知出此而顧先區區於秬黍之縱橫古尺之修短斛斗之廣狹鐘磬之高下謀之是何足以得其聲之和哉邵雍曰世人所見者漢律曆耳然則三分損益之法為未善亦隱然矣近世蔡元定特著一書可謂究心然其說亦有可用與否其可用者多其所自得而又有證於古凡載於吾書者可見矣其否者皆由習熟於三分上下生之說而不於聲器之近似者察之也豈嘗察之而未有法以易之乎此律通之所以作也蓋律之所以長短不止乎三分損益之一端自四分以往推而至於有二十分之法管之所以廣狹必限於千二百黍之定數因其容受有方分圜分之異與黍體不相合而遂分辨其空龠有實積隙積之理其還相為宮之法有以推見其為一陰一陽相繼之道而非一上一下相生之謂也嗟乎觀吾書者能知其數之出於自然而然則知由先漢以前至于今日上下幾二千年凡史傳所述三分損益一定之說者可以刪而去之矣使其說之可用也則累世律可協樂可和何承天劉焯輩不改其法矣故京房六十律不足以和樂而況錢樂之衍為三百六十之非法徒增多而無用乎是其數非出於自然之無所加損而徒欲傅會於當期之日數云爾古之聖人所以定律止於十二者自然之理數也苟不因自然之理數則以三分損益之法衍之聲律殆不特三百六十而已也而況京房之六十乎且房之律吾意其自為之也而託言受之焦延壽以欺乎人以售其說使律法之善何必曰受諸人律法不善矣雖焦延壽何益哉所謂善不善者亦顧其法之可用與否耳曩者魏漢津嘗創用指尺以制律乃竊京房之故智上以取君之信下以遏人之議能行之於一日豈能使一世而用之乎今律通之作其數之損益可以互相生總為百四十四以為之體或變之又可得二百一十有六以為之用乾坤之策具矣世不用則已用則聲必和亦因古黃鐘九寸法審之以人物之聲而稍更定之耳或曰律止十二胡為復衍百四十四律乎應之曰十二者正聲也百四十四者變聲也使不為百四十四者何以見十二宮七聲長短之有定數而宮商角徵羽清濁之有定分乎其要主於和而已故有正聲則有變聲也通其變然後可與論律矣律通上下二篇十二律名數第一黃鐘起數第二生律分正法第三生律分變法第四正變生律分起算法第五十二宮百四十四律數第六律數傍通法第七律數傍通別法第八九分為寸法辨第九第十五十九律會同第十一空圍龠實辨第十二十二律分陰陽圖說第十三陽聲陰聲配乾坤圖第十四五聲配五行之序第十五七聲配五行之序第十六七聲分類第十七十二宮七聲倡和第十八六十調圖說第十九辨三律聲法第二十真德秀趙以夫皆盛稱之舒州桐城縣丞李如箎作樂書評司馬光范鎮所論律曰鎮得蜀人房庶言尺法庶言嘗得古本漢書云度起於黃鐘之長以子穀秬黍中者一黍之起積一千二百黍之廣度之九十分黃鐘之長一為一分今文脫去之起積一千二百黍八字故自前世累黍為之縱置之則太長橫置之則太短今新尺橫置之不能容一千二百黍則大其空徑四氂六毫是以樂聲太高皆由儒者誤以一黍為一分其法非是不若以千二百黍實管中隨其短長斷之以為黃鐘九寸之管九十分其長一為一分取三分以度空徑數合則律正矣鎮盛稱此論以為先儒用意皆不能到其意謂制律之法必以一千二百黍實黃鐘九寸之管九十分其管之長一為一分是度由律起也光則據漢書正本之度起於黃鐘之長以子穀秬黍中者一黍之廣度之九十分黃鐘之長一為一分本無之起積一千二百黍八字其意謂制律之法必以一黍之廣定為一分九十分則得黃鐘之長是律由度起也書云同律度量衡先言律而後及度量衡是度起於律信矣然則鎮之說是而光之說非也然庶之論積一千二百黍之廣之說則非必如其說則是律非起於度而起於量也光之說雖非先王作律之本而後之為律者不先定其分寸亦無以起律又其法本之漢志之文則光之說亦不得謂其非是也故嘗論之律者述氣之管也其候氣之法十有二月每月為管置於地中氣之來至有淺有深而管之入地者有短有長十二月之氣至各驗其當月之管氣至則灰飛也其為管之長短與其氣至之淺深或不相當則不驗上古之聖人制為十二管以候十二辰之氣而十二辰之音亦由之而出焉以十二管較之則黃鐘之管最長應鐘之管至短以林鐘比於黃鐘則短其三分之一以太蔟比之林鐘則長其三分之一其餘或長或短皆上下於三分之一之數其默符於聲氣自然之應者如此也當時惡睹所謂三分損益哉又惡睹夫一千二百黍為黃鐘容受之量與夫一黍之廣一為一分之說哉古之聖人既為律矣欲因之以起度量衡之法遂取秬黍之中者以實黃鐘之管滿龠傾而數之得黍一千有二百因以制量以一黍之廣而度之得黃鐘管九十分之一因以起度以一龠之黍之重而兩之因以生衡去古既遠先王作律之本始其法不傳而猶有所謂一千二百黍為一龠容受之量與夫一黍之廣一為一分者可考也推其容受而度其分寸則律可得而成也先王之本於律以起度量衡者自源而生流也後人以度量衡而起律者尋流而及源也光鎮爭論往復前後三十年不決大概言以律起度以度起律之不同鎮深闢光以度起律之說不知後世舍去度數安得如古聖人默符聲氣之驗自然而成律也哉至若庶之增益漢志八字以為脫誤及其他紛紛之議皆穿鑿以為新奇雖鎮力主之非至當之論有補於律法者也如箎書曰樂本曰樂章沙隨程迥著三器圖議曰體有長短所以起度也受有多寡所以生量也物有輕重所以用權也是器也皆準之上黨羊頭山之秬黍焉以之測幽隱之情以之達精微之理推三光之運則不失其度通八音之變則可召其和以辨上下則有品以分隆殺則有節凡朝廷之出治生民之日用未有頃刻不資焉者也古人以度定量以量定權必參相得然後黃鐘之律可求八音五聲從之而應也皇祐中阮逸胡瑗累黍定尺既大於周尺姑欲合其量也然竟於權不合乃謂黍稱二兩已得官稱一兩反疑史書之誤及韓琦丁度詳定知逸瑗之失亦莫能以三器參相攷也先是鎮上封事曰樂者和氣也發和氣者音聲也音聲生於無形故古人以有形之物傳其法俾後人參考之有形者何秬黍也律也尺也龠也鬴也斛也算數也權稱也鐘也磬也是十者必相合而不相戾而後為得也迥謂以黍定三器則十者無不該三者尺為之本周尺也者先儒攷其制脗合者不一至宋祁取隋書大業中歷代尺十五等獨以周尺為之本以攷諸尺韓琦嘉祐累黍尺二其一亦與周尺相近司馬備刻之於石光舊物也苟以是定尺又以是參定權量以合諸器如挈裘而振其領其順者不可勝數也迥博學好古朱熹深禮敬之其後江陵府學教授廬陵彭應龍既注漢律曆志設為問答著鐘律辨疑三卷至為精密發古人所未言者宋曆在東都凡八改曰應天乾元儀天崇天明天奉元觀天紀元星翁離散紀元曆亡紹興二年高宗重購得之六月甲午語輔臣曰曆官推步不精今曆差一日近得紀元曆自明年當改正協時月正日蓋非細事是歲始議製渾儀十一月工部言渾儀法要當以子午為正今欲定測樞極合差局官二員詔差李繼宗等充測驗定正官俟造畢進呈日同參詳指說制度官丁師仁李公謹入殿安設三年正月壬戌進呈渾儀木樣壬申太史局令丁師仁等言省識東都渾儀四座在測驗渾儀刻漏所曰至道儀在翰林天文局曰皇祐儀在太史局天文院曰熙寧儀在合臺曰元祐儀每座約銅二萬餘斤今若半之當萬餘斤且元祐製造有兩府提舉時都司覆實用銅八千四百斤詔工部置物料臨安府傭工匠仍令工部長貳提舉五年日官言正月朔旦日食九分半虧在辰正常州布衣陳得一言當食八分半虧在巳初其言卒驗侍御史張致遠言今歲正月朔日食太史所定不驗得一嘗為臣言皆有依據蓋患算造者不能通消息盈虛之奧進退遲疾之分致立朔有訛凡定朔小餘七千五百以上者進一日紹興四年十二月小餘七千六百八十太史不進故十一月小盡今年五月小餘七千一百八十少三百二十乃為進朔四月大盡建炎三年定十一月三十日甲戌為臘陰陽書曰臘者接也以故接新在十二月近大寒前後戌日定之若近大寒戌日在正月十一日若即用遠大寒戌日定之庶不出十二月如宣和五年十二月二十七日丙午大寒後四日庚戌雖近緣在六年正月一日此時以十九日戊戌為臘得一於歲旦日食嘗預言之不差氂刻願詔得一改造新曆委官專董其事仍盡取其書參校太史有無以補遺闕擇曆算子弟粗通了者授演撰之要庶幾日官無曠曆法不絕二月丙子詔祕書少監朱震即祕書省監視得一改造新曆八月曆成震請賜名統元從之詔翰林學士孫近為序以六年頒行遷震一秩賜得一通微處士官其一子道士裴伯壽等受賞有差得一等上推甲子之歲得十一月甲子朔夜半冬至日度起於虛中以為元著曆經七卷曆議二卷立成四卷考古春秋日食一卷七曜細行二卷氣朔入行草一卷詔付太史氏副藏祕府紹興九年史官重修神宗正史求奉元曆不獲詔陳得一裴伯壽赴闕補修之十四年太史局請製渾儀工部員外郎謝伋言臣嘗詢渾儀之法太史官生論議不同鑄作之工今尚闕焉臣愚以為宜先詢訪制度敷求通曉天文曆數之學者參訂是非斯合古制蘇頌之子應詔赴闕請訪求其父遺書考質制度宰相秦檜曰在廷之臣罕能通曉高宗曰此闕典也朕已就宮中製造範制雖小可用窺測日以晷度夜以樞星為則非久降出第當廣其尺寸爾於是命檜提舉時內侍邵諤善運思專令主之累年方成統元曆頒行雖久有司不善用之暗用紀元法推步而以統元為名乾道二年日官以紀元曆推三年丁亥歲十一月甲子朔將頒行裴伯壽詣禮部陳統元曆法當進作乙丑朔於是依統元曆法正之光州士人劉孝榮言統元曆交食先天六刻火星差天二度嘗自著曆期以半年可成願改造新曆禮部謂統元曆法用之十有五年紀元曆法經六十年日月交食有先天分數之差五星細行亦有二三度分之殊算造曆官拘於依經用法致朔日有進退氣節日分有誤于時宜改造伯壽言造曆必先立表測景驗氣庶幾精密判太史局吳澤私於孝榮且言銅表難成木表易壞以沮之迺詔禮部尚書周執羔提領改造新曆執羔亦謂測景驗氣經涉歲月孝榮乃采萬分曆作三萬分以為日法號七曜細行曆上之三年執羔以曆來上孝宗曰日月有盈縮須隨時修改執羔對曰舜協時月正日正為積久不能無差故協正之孝宗問曰今曆與古曆何如對曰堯時冬至日在牽牛今冬至日在斗一度孝榮七曜細行曆自謂精密且預定是年四月戊辰朔日食一分日官言食二分伯壽並非之既而精明不食孝榮又定八月庚戌望月食六分半候之止及五分又定戊子歲二月丁未望月食九分已上出地其光復滿伯壽言當食既復滿在戌正三刻侍御史單時言比年太史局以統元曆稍差而用紀元曆紀元寖差邇者劉孝榮議改曆四月朔日食不驗日官兩用統元紀元以定晦朔二曆之差歲益已甚非所以明天道正人事也如四月朔之日不食雖為差誤然一分之說猶為近焉八月望之月食五分新曆以為食六分亦為近焉聞欲以明年二月望月食為驗是夜或有陰晦風雨願令日官與孝榮所定七政躔度其說異同者俟其可驗之時以渾象測之察其稍近而屢中者從其說以定曆庶幾不致甚差詔從之十一月詔國子司業權禮部侍郎程大昌監察御史張敦實監太史局驗之時孝宗務知曆法疏密詔太史局以高宗所降小渾儀測驗造曆四年二月十四日丁未望月食生光復滿如伯壽言時等又言去年承詔十二月癸卯乙巳兩夜監測太陰太白新曆為近今年二月十四日望月食臣與大昌等以渾儀定其光滿則舊曆差近新曆差遠若遽以舊曆為是則去年所測四事皆新曆為近今者所定月食乃復稍差以是知天道之難測儒者莫肯究心一付之星翁曆家其說又不精密願令繼宗孝榮等更定三月一日內七政躔度之異同者仍令臣等往視測驗而造曆焉三月詔時與大昌同驗之太史局止用紀元曆與新曆測驗未嘗參以統元曆臣等先求判太史局李繼宗天文官劉孝榮等統元紀元新曆異同於三月初九日夜十一日早十四日夜二十日早詣太史局召三曆官上臺用銅儀窺管對測太陰木火土星昏晨度經歷度數參稽所供監視測驗初九日昏度舊曆太陰在黃道張宿十二度八十七分在赤道張宿十度新曆在黃道張宿十四度四十分在赤道張宿十五度太臣等驗得在赤道張宿十五度半今考之新曆稍密舊曆皆疏十一日早晨度木星在黃道室宿十五度七分在赤道室宿十三度少土星在黃道虛宿七度三分在赤道虛宿七度彊新曆木星在黃道室宿十五度四十四分在赤道室宿十四度少弱土星在黃道虛宿六度二十一分在赤道虛宿六度少弱臣等驗得五更三點土星在赤道虛宿六度弱五更五點木星在赤道室宿十四度今考之新曆稍密舊曆皆疏十二日都省令定驗統元紀元及新曆疏密統元曆昏度太陰在黃道氐宿初度九十四分在赤道氐宿三度少紀元曆在黃道氐宿初度八十三分在赤道氐宿二度太新曆在黃道亢宿八度七十一分在赤道亢宿九度少弱三曆官以渾儀由南數之其太陰北去角宿距星二十一度少弱新舊曆官稱昏度亢宿未見祗以窺管測定角宿距星復以曆書考東方七宿角占十二度亢占九度少既亢宿未見當除角宿十二度即太陰此時在赤道亢宿九度少弱今考之新曆全密紀元統元曆皆疏二十日早晨度統元曆太陰在黃道斗宿十一度九十一分在赤道斗宿十二度少火星在黃道危宿七度九十一分在赤道危宿七度少土星在黃道虛宿八度八十二分在赤道虛宿八度太彊紀元曆太陰在黃道斗宿十一度四十分在赤道斗宿十一度半火星在黃道危宿六度在赤道危宿六度太土星在黃道虛宿七度三十九分在赤道虛宿七度半弱新曆太陰在黃道斗宿十度六十一分在赤道斗宿十度少火星在黃道危宿七度二十分在赤道危宿六度土星在黃道虛宿六度五十三分在赤道虛宿六度半三曆官驗得太陰在赤道斗宿十度火星在赤道危宿六度彊土星在赤道虛宿六度半今考之太陰紀元曆疏火星新曆紀元曆全密統元曆疏土星新曆全密紀元統元曆疏又詔時與尚書禮部員外郎李燾同測驗時等言先究統元紀元新曆異同召三曆官上臺用銅儀窺管對測太陰土火木星晨度經歷度數參稽所供監視測驗二十四日早晨度統元曆太陰在黃道危宿十一度九十分在赤道危宿九度木星在黃道室宿十八度一十五分在赤道壁宿初度少火星在黃道危宿十度七十分在赤道危宿十度土星在黃道虛宿八度九十五分在赤道虛宿九度紀元曆太陰在赤道危宿十度五十三分在赤道危宿八度半木星在黃道室宿十七度六十八分在赤道室宿十六度少火星在黃道危宿九度八十四分在赤道危宿九度土星在黃道留在虛宿七度四十分在赤道虛宿七度半新曆太陰在黃道危宿十三度五分在赤道危宿十二度木星在黃道室宿十八度一十分在赤道室宿十六度半彊火星在黃道危宿十度八分在赤道危宿九度土星在黃道虛宿六度六十分始留在赤道虛宿六度半彊始留三曆官驗得太陰在赤道危宿十度木星在赤道室宿十六度太火星在赤道危宿九度半土星在赤道虛宿六度半弱今考之太陰統元曆精密紀元曆新曆皆疏木星新曆稍密紀元統元曆皆疏火星紀元新曆皆稍密統元曆疏土星新曆稍密紀元統元曆皆疏二十七日早晨度統元曆木星在黃道壁宿初度四十六分在赤道壁宿初度太彊火星在黃道危宿十二度九十二分在赤道危宿十二度彊土星留在黃道虛