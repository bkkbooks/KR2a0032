body:
  text: 宋史卷四十五本紀第四十五理宗五景定元年春正月丙子詔奬賈似道功庚辰歲星熒惑合在尾壬辰詔知涪州趙聚糧不運餉兵士遂為北有已削一秩罰輕再削兩秩乙朱潼川城侶山賈似道言高達守鄂州城凡三月大元師北還二月丙午詔賈似道以緡錢三千萬犒師幷示賞功之典己酉以高達為寧江軍承宣使右金吾衞上將軍賜緡錢五十萬呂文德賜緡錢百萬浙西良田百頃鄂州戰守將士賜緡錢三千萬王鑑孫虎臣蘇劉義等各官十轉高達遷湖北安撫副使知江陵府兼夔路策應使陳奕阮思聰並正任防禦使江西湖南帥司言大元兵破瑞州臨江軍城興國壽昌洪撫全永衡諸郡民皆被兵存者奔竄它所甲寅詔臨江守臣陳元桂死節官五轉贈寶章閣待制與一子京官一子選人恩澤給緡錢十萬治葬立廟死所謚曰正節瑞州守臣陳昌世治郡雖有善政兵至民擁之以逃以棄城失守削三秩勒停乙卯詔孫虎臣和州防禦使張世傑以下十三人各官五轉立功將士並補兩官資賜銀絹庚申雨雹辛酉大元遣偏師自大理由廣南抵衡州向士璧會合劉雄飛逆戰于道俘民獲還者甚衆詔雄飛升保康軍承宣使餘轉官賜銀錢賈似道賜金器千兩幣千匹命國子監主簿劉錫趣召赴闕向士璧遷兵部侍郎職任依舊呂文德高達陳奕等各賜金幣有差丙寅大元軍過分寧武寧二縣河湖砦都監權巡檢張興宗死之詔贈武翼郎官一子承信郎以緡錢三萬給其家湖南諸將溫和轉左武大夫帶行遙郡刺史李虎官三轉帶行閤門宣贊鄮進帶行復州團練使各賜銀絹旌其守禦之功三月戊辰朔日有食之庚午命夏貴兼黃壽策應使總舟師癸酉以橫山之戰將士效節多死行陣總管張世雄沈彥雄陳喜秦安李孝信鄭俊李安國各贈十官資賜緡錢萬恤其家甲戌賞夏貴鴻宿州白鹿磯戰功遷福州觀察使職任仍舊將士推賞乙亥詔全岳永衡柳象瑞興國南康隆興江州臨江潭州諸縣經兵農民失業應開慶元年以前二稅盡除之癸未賈似道奏蘱草坪大戰進至黃州乙酉詔范文虎轉左武大夫環衞官黃州武定諸軍都統制張世傑環衞官職任依舊鄂州統制張勝死于漢陽戰陣贈官五轉官其子煥進武校尉丙戌賈似道言自鄂趨黃與北朝回軍相遇諸將用命捍禦詔孫虎臣范文虎張世傑以下各賜金帛夏四月戊戌朔侍御史沈炎疏吳潛過失以忠王之立人心所屬潛獨不然章汝鈞對館職策乞為濟邸立後潛樂聞其論授汝鈞正字奸謀叵測請速詔賈似道正位鼎軸詔朱熠戴慶炣輪日判事大政則共議以聞己亥賈似道表言夏貴等戰新生洲進至白鹿磯皆身自督戰有功詔赴闕庚子以王堅為侍衞步軍司都指揮使戊申以劉整知瀘州兼潼川安撫副使己酉揚州大火吳潛以觀文殿大學士提舉臨安府洞霄宮癸丑進賈似道少師依前右丞相兼樞密使進封衞國公朱熠知樞密院事兼參知政事饒虎臣參知政事戴慶炣同知樞密院事兼參知政事皮龍榮端明殿學士簽書樞密院事己未以夏貴為保康軍承宣使左金吾衞上將軍知淮安州兼淮東安撫副使京東招撫使賜金器幣溧陽田三十頃壬戌進馬光祖資政殿大學士職任依舊癸亥以呂文德兼夔路策應使丙寅命馬光祖兼淮西總領財賦五月戊辰朔詔趙葵依舊少保兩淮宣撫使判揚州進封魯國公徐清叟觀文殿大學士知建寧府饒虎臣罷壬申李曾伯史岩之並落職解官曾伯坐嶺南閉城自守不能備禦岩之坐鄂州圍解大元兵已渡江北還然後出兵又命程芾任事以致敗績甲戌詔贈呂文信寧遠軍承宣使立廟賜額子師憲帶行閤職更與兩子承信郎輔周和州防禦使錄其白鹿磯死事乙亥詔李虎馭軍無律貸命追奪竄鬱林州丁丑賜賈似道玉帶庚辰戴慶炣卒贈資政殿大學士壬午熒惑犯斗癸未以皮龍榮兼權參知政事沈炎端明殿學士同簽書樞密院事馬堃鄂州都統制駐劄江陵府甲申祈雨戊子詔饒虎臣以資政殿學士提舉臨安府洞霄宮任便居住楊棟召赴闕壬辰以姚希得為敷文閣待制知慶元府兼沿海制置使乙未詔李庭芝起復祕閣修撰主管兩淮安撫制置司公事兼知揚州六月丁酉朔夏貴奏淮安戰功庚子竄丁大全于南康軍壬寅詔立皇子忠王為皇太子賜字長源戊申王埜卒壬子賜李遇龍金帶陳奕帶御器械依舊鎮江駐劄御前諸軍都統制賜田三十頃詔升巢縣為鎮巢軍甲寅楊棟葉夢鼎並太子詹事乙卯陳韡進一秩福建安撫使知福州徐清叟觀文殿學士知泉州秋七月丁卯朔皇太子入東宮行冊禮大赦壬申貴妃閻氏薨賜謚惠昭東南有星如太白丁亥命皇太子昕朝侍立戊子上謂宰執曰北朝使來事體當議賈似道奏和出彼謀豈容一切輕徇倘以交鄰國之道來當令入見己丑侍御史何夢然劾丁大全吳潛欺君無君之罪庚寅賈似道兼太子少師朱熠皮龍榮沈炎並兼賓客辛卯詔丁大全削三秩謫居南安軍吳潛奪觀文殿大學士罷祠削二秩謫居建昌軍癸巳詔舉孝廉八月壬寅以程元鳳為淮浙發運使判平江府己酉太陰犯填星詔皇太子受冊畢賈似道朱熠皮龍榮沈炎各進一秩東宮官吏諸軍兵等官一轉餘皆推恩壬子與薨贈少師謚忠憲太白犯房壬戌李曾伯史岩之各削二秩甲子饒虎臣削二秩奪資政殿學士罷祠九月癸酉守瀘州劉整以功來上丁丑知漳州節制屯戍軍馬洪天錫言援例創辟幹官一員報行軍機密文字奏可辛巳祀明堂大赦丙戌熒惑犯壁戊子李松壽犯淮安冬十月乙未朔詔申嚴邊防甲辰詔黨丁大全吳潛者臺諫其嚴覺察舉劾以聞當置于罪以為同惡相濟者之戒時似道專政臺諫何夢然孫附鳳桂錫孫劉應龍承順風指凡為似道所惡者無賢否皆斥帝弗悟其奸為下是詔戊申李松壽修南城詔趣淮閫調兵毀之壬子破李松壽兵于漣水城下夷南城舊址乙卯有星自東北急流向太陰壬戌竄吳潛于潮州十一月丙寅詔內侍何時修削二秩永罷不洪燾知臨安府兼浙西安撫使壬午以中軍統制知簡州馬千權興州都統兼知合州戊子熒惑與填星順行太陰犯房十二月甲午朔詔華亭奉宸莊其隸外廷助軍餉包恢復元官職知常州辛丑建陽縣嘉禾生一本十五穗詔改建陽為嘉禾縣甲寅呂文德上夔路戰功乙卯少師廬陵郡王思正薨謚簡惠印應雷直徽猷閣知江州主管江西安撫司公事節制蘄黃興國三郡庚申以監察御史桂錫孫言追寢全子才復之命二年春正月癸亥朔詔監司率半歲具劾去贓吏之數來上視多寡為殿最行賞罰守臣助監司所不及以一歲為殿最定賞罰本路州無所劾而臺諫論列則監司守臣皆以殿定罰有治狀廉聲者摭實以聞乙丑城安慶詔馬光祖進二秩丁丑命皇太子謁拜孔子于太學己卯福建安撫使陳韡累疏請老詔進一秩守觀文殿學士致仕以董槐判福州福建安撫使乙酉詔封張栻為華陽伯呂祖謙開封伯從祀孔子廟庭二月丙申孫虎臣戰邳州全師而歸癸卯詔諸路監司申嚴偽會賞罰之令甲寅進封周國公主三月壬戌朔日有食之乙亥故寧遠軍承宣使張祥都統制閻忠進以援蜀之功祥贈節度使忠進贈復州團練除恩澤外各更官一子承信郎賜緡錢二萬戊寅賈似道等上玉牒日曆會要經武要略及孝宗光宗寧宗實錄詔似道皮龍榮朱熠沈炎各進二秩夏四月癸巳朔余思忠追毀出身文字除名勒停竄新州乙未以皮龍榮參知政事沈炎同知樞密院事兼權參知政事何夢然簽書樞密院事俞興保康軍承宣使四川安撫制置使丙申呂文德超授太尉京湖安撫制置屯田使夔路策應使兼知鄂州李庭芝右文殿修撰樞密都承旨兩淮安撫制置副使知揚州己亥詔申嚴江防壬寅呂文德兼湖廣總領財賦乙巳馬天驥資政殿學士知福州福建安撫使呂文福帶御器械淮西安撫副使兼知廬州官一轉戊申馬光祖進觀文殿學士職任依舊乙卯竄吳潛于循州丙辰竄丁大全于貴州追削二秩丁巳楊鎮授左領軍衞將軍駙馬都尉高達知廬州淮西安撫副使五月癸亥賈似道請祠祿詔不允庚午謝方叔復觀文殿大學士致仕戊寅以劉雄飛知夔州夔路安撫使乙酉王堅遷左金吾衞上將軍湖北安撫使兼知江陵府六月乙未詔霖雨為沴避殿減膳徹樂乙巳詔近畿水災安吉為甚亟講行荒政辛亥以范文虎為左領軍衞大將軍主管侍衞步軍司兼馬軍司秋七月甲子蜀帥俞興奏守瀘州劉整率所部兵北降由興構隙致變也至是興移檄討整辛未制置使蒲擇之坐密通蠟書叛賊羅顯詔竄萬安軍太陰犯斗乙亥以厲文翁為資政殿學士沿海制置使知慶元府戊寅王惟忠家訟冤詔奪謝方叔合得恩數丁大全責授新州團練使貴州安置臺臣吳燧奪職罷祠陳大方胡大昌皆鐫官壬午陳韡卒贈少師謚忠肅丙戌吳潛責授化州團練使循州安置八月壬辰命韓宣兼常德辰沅澧靖五郡鎮撫使呂文德兼四川宣撫使范文虎以白鹿磯之功賞七官以五官轉行遙郡防禦使餘官給憑丁酉詔奪向士璧從官恩數窮竟侵盜掩匿之罪時以兵退遣官會計邊費似道忌功欲以汙衊一時閫臣士璧及趙葵史岩之杜庶皆責徵償信州謝枋得以趙葵檄給錢粟募民兵守禦至是自償萬緡壬寅築周國公主館于安濟橋乙巳以江萬里為端明殿學士同簽書樞密院事依執政恩數九月辛酉詔湖秀二郡水災守令其亟勸分監司申嚴荒政乙亥李庭芝言李松壽已遁大元使郝經久留真州帝趣與錫賚經之留謀出賈似道帝惑其言不悟蓋似道在鄂時值我世祖皇帝歸正大位撤兵似道自詭有再造之功諱言歲幣及講和之事故不使經入見冬十月癸巳呂文德言已復瀘州外堡擬即對江壘石為城以示持久之計從之戊戌雷電甲申詔申奬賈似道鄂州之功丙午以何夢然同知樞密院事兼參知政事癸丑程元鳳授特進觀文殿大學士醴泉觀使兼侍讀甲寅皇太子擇配帝詔其母族全昭孫之女擇日入見寶祐中昭孫沒于王事全氏見上上曰爾父死可念對曰臣妾父固可念淮湖石姓尤可念上曰即此語可母天下迨開慶丁大全用事以京尹顧喦女為議大全敗故有是命丙辰沈炎資政殿學士提舉臨安府洞霄宮任便居住十一月己未朔劉雄飛和州防禦使樞密副都承旨四川安撫制置副使兼知重慶府四川總領夔路轉運使庚申周國公主館成詔董宋臣李忠輔各官一轉甲戌資政殿學士致仕汝騰卒贈官四轉謚忠清安南國貢象二丁丑馬光祖提領戶部財用兼知臨安府浙西安撫使下嫁周國公主于楊鎮己卯以鎮為宜州觀察使賜玉帶尋升慶遠軍承宣使詔駙馬都尉楊鎮家合有賞典楊蕃孫官兩轉楊鐸楊鑑官一轉並直祕閣餘轉官進封有差癸未封全氏永嘉郡夫人十二月庚寅改竄蒲擇之于南康軍辛卯宰臣奏太子語臣等言近奉聖訓夫婦之道王化之基男女正位天地大義平日所講修身齊家之道當真履實踐勿為口耳之學請宣付史館永為世程法從之甲午以皮龍榮兼權知樞密院事何夢然參知政事兼太子賓客馬光祖同知樞密院事兼太子賓客知臨安府己亥太陰犯五車壬寅江萬里依舊端明殿學士提舉臨安府洞霄宮任便居住癸卯冊永嘉郡夫人全氏為皇太子妃三年春正月戊子朔詔申飭百官盡言詔量移丁大全吳潛黨人並永不錄用壬戌詔陳塏等耆年奉祠宜示崇奬陳塏端明殿學士林彬之寶章閣待制史季溫直華文閣丁仁直寶謨閣仍並予祠祿甲子福建路安撫使馬天驥進資政殿大學士職任依舊乙丑詔諭西蜀郡縣等官已授遇闕毋遙受虛批月日違期不赴丁卯以善諮嗣濮王戊辰周國公主進封周漢國公主庚午賜賈似道第宅于集芳園給緡錢百萬就建家廟甲戌詔權知梁山軍李鑑守城有功帶行閤門宣贊舍人就知梁山軍復瀘州改為江安軍呂文德進開府儀同三司二月丁亥朔臨安安吉嘉興屬邑水民溺死者衆詔守臣給槥瘞之詔奬諭制置司其立功參贊將士進秩升職犒給有差乃裕授檢校少保以皮龍榮為資政殿大學士知潭州湖南安撫使乙巳太陰入氐戊申詔省試中選士人覆試于御史臺為定制庚戌李瑹以漣海三城叛大元來歸獻山東郡縣詔改漣水為安東州授瑹保信寧武軍節度使督視京東河北等路軍馬齊郡王復其父李全官爵瑹即松壽三月乙丑以孫附鳳為端明殿學士簽書樞密院事兼太子賓客辛未詔升海州東海縣為東海軍丁丑汪立信升直華文閣知江州主管江西安撫司公事節制蘄黃興國三郡軍馬庚辰呂文福依舊職差知濠州兼淮西招撫使夏四月庚寅太白晝見庚子熒惑與歲星合在危甲辰有流星大如杯五月壬戌熒惑犯壁壘陣丙寅雨雹己巳詔廣西靜江屯田小試有效其邕欽宜融柳象潯諸州守臣任責措置經略安撫以課殿最仍條具來上辛未馬光祖以病請祠詔知福州兼福建安撫使丁丑賜禮部進士方山京以下六百三十七人及第出身庚辰夏貴上蘄縣戰功六月戊子詔李瑹受圍給銀五萬兩下益都府犒師遣青陽夢炎率師援之庚寅以孫附鳳兼權參知政事楊棟端明殿學士同簽書樞密院事兼太子賓客壬辰吳潛沒于循州詔許歸葬己亥董槐乞致仕詔授特進戊申詔青陽夢炎援李瑹不俟解圍輒提援兵南歸諭制置司劾之己酉有流星大如熒惑庚戌安南國王日煚上表乞世襲詔授檢校太師安南國王加食邑男威晃授靜海軍節度觀察處置使檢校太尉兼御史大夫上柱國安南國王効忠順化功臣仍賜金帶器幣鞍馬癸丑詔應謫臣僚終於貶所者許令歸葬秋七月丙辰詔州縣官廩祿不時給者御史臺覺察或以他物折支計贓論罪壬戌董槐薨贈少師謚文清庚午周漢國公主薨賜謚端孝壬申江州都統聶世興調遣入蜀託疾憚行詔奪二秩押往京湖制司自效戊寅侍御史范純父言前四川制置使俞興妬功啟戎罷任鐫秩罰輕乞更褫奪以紓衆怒奏可辛巳詔重修吏部七司條法癸未詔申嚴諸路郡縣苛取苗米之禁甲申夜有白氣亘天八月甲午海州石湫堰成詔知州張漢英帶行遙郡刺史馬步軍副總管帶行環衞官丁酉築蘄州城知州王益落階官正任高州刺史制置使汪立信上新城圖詔奬諭戊戌李瑹兵敗為大元所誅事聞詔沿邊諸郡嚴邊防汪立信升直敷文閣主管沿江制置司公事知江州主管江西安撫司公事癸卯太陰犯昴乙巳沿江制置使姚希得進寶章閣學士職任依舊九月壬申召陳奕赴樞密院禀議丙子有流星大如太白丁丑溫州布衣李元老讀書安貧不事科舉今已百四歲詔補迪功郎致仕本郡給奉閏九月甲申朔太白晝見丙戌流星透霞大如太白戊戌詔刑部長貳大理卿少卿歲終無評事可舉即舉在京三獄官庚子有流星大如太白丙午詔應知縣罪罷雖經赦毋注緊望闕著為令戊申詔紹興府火給貸居民錢今及二載民貧可憫悉除勿徵冬十月乙卯詔蠲四川制總州縣鹽酒榷額己未太陰犯歲星甲子以楊棟簽書樞密院事兼權參知政事兼太子賓客葉夢鼎端明殿學士同簽書樞密院事兼太子賓客丁卯呂文德言遣將校禦敵多逗遛不進且奏功失實具姓名上聞詔呂文煥王達趙真削兩秩馬堃王甫削一秩餘貶降有差太陰犯五車星庚午太白入氐甲戌歸化州岑從毅納土輸賦獻丁壯為王臣詔改歸化為來安州從毅進秩修武郎知州事令世襲丙子詔安豐六安縣升軍使十一月壬辰丁大全竄貴州招游手立將校置弓矢舟楫縱僕隸淫虐軍民詔奪大全貴州團練使移置新州癸巳馬光祖乞祠祿詔提舉臨安府洞霄宮任便居住丙申徐清叟薨贈少師謚忠簡丁酉資陽砦主萬戶小哥及其子衆家奴叛來降詔小哥賜姓王名永堅補武翼大夫夔路副總管重慶府駐劄戊戌以夏貴知廬州淮西安撫副使丁未皇孫容州觀察使封資國公焯薨贈保靜軍節度使廣國公熒惑填星合在婁十二月辛巳呂文德累疏辭兼四川宣撫詔仍兼四川策應使四年春正月壬午朔詔侍從臺諫給舍卿監郎官以上及制總監司各舉所知不拘員限不如所舉行連坐法戊子林希逸言蒲陽布衣林亦之陳藻有道之士林公遇幼承父澤奉親不仕詔林亦之陳藻贈迪功郎林公遇元官上進贈一官詔董宋臣同提舉奉安符寶所仍奉祠祿己亥嚴州火丙午詔革詞訴改送之弊二月癸丑詔吳潛丁大全黨人遷謫已久遠者量移近者還本貫並不復用丁大全溺死藤州詔許歸葬詔俞興往歲失陷瀘城更削一秩丁巳置官田所以劉良貴為提領陳爻石為檢閱戊午日暈周匝乙亥呂文德浚築鄂州常澧城池訖事詔奬之守臣韓宣轉遙郡承宣使蘇劉義吉州刺史三月丁亥以呂文德為寧武保康軍節度使職任依舊劉雄飛樞密都承旨四川安撫制置使兼知重慶府四川總領財賦夔路轉運使加授姚希得刑部尚書李庭芝兵部侍郎朱禩孫太府卿汪立信太府少卿並依舊任壬辰太陽赤黃暈丁酉以王堅知和州兼管內安撫使呂思望知濠州兼淮西招撫使庚子以何夢然兼權知樞密院事丁未詔知寧國府趙汝楳推行經界不擾而辦職事修舉升直華文閣依舊任戊申忠州防禦使貴傑授福州觀察使夏四月乙卯太陰犯權星丙寅官田所言知嘉興縣段浚知宜興縣葉哲佐買公田不遵元制詔罷之戊辰太陽赤黃暈不匝五月庚寅太陰入氐丁酉婺州布衣何基建寧府布衣徐幾皆得理學之傳詔各補迪功郎何基婺州教授兼麗澤書院山長徐幾建寧府教授兼建安書院山長戊戌四川制司言二月甲寅大元兵攻嘉定城馬堃出戰禦之詔馬堃援夔遷延削一秩令以所轉四官理作復流星出自角宿距星六月壬子祈雨乙卯京城火丙辰詔饒虎臣復元官依舊提舉太平興國宮庚申詔平江江陰安吉嘉興常州鎮江六郡已買公田三百五十餘萬畝今秋成在邇其荊湖江西諸道仍舊和糴丙寅詔公田竣事劉良貴官兩轉陳爻石廖邦傑洎六郡官進秩有差丁卯流星出自河鼓庚午宰執進玉牒日曆會要經武要略及徽宗長編寧宗實錄詔賈似道以下官兩轉秋七月壬辰敕令所進寧宗以來寬恤詔令戊戌以董宋臣為入內內侍省押班八月甲寅董宋臣以病乞收回恩命請祠詔賜告五月乙卯流星出自天倉星九月甲申詔趙汝楳為太府少卿淮東總領財賦辛卯祀明堂大赦甲午以何夢然知樞密院事兼參知政事楊棟同知樞密院事兼權參知政事葉夢鼎簽書樞密院事冬十月己未詔發緡錢百四十萬命浙西六郡置公田莊甲子命張王玉興元府駐劄御前諸軍都統制兼知合州十一月己亥福州火十二月丁未朔詔皇太子宮講官詹事以下日輪一員辰入酉出專講讀備咨問以稱輔導之實己未詔在京置窠柵私繫囚幷非法獄具臺憲其嚴禁戢違者有刑辛未太白歲星順行五年春正月丁丑朔詔崇經術考德行癸巳出奉宸庫珠香象犀等貨下務場貨易助收幣楮庚子太子右諭德湯漢三乞休致授祕閣修撰知福州福建安撫使二月壬戌流星出自畢甲子太陰犯房丁卯太陰犯斗辛未雨土三月辛巳王堅卒賜謚忠壯馬光祖依舊觀文殿學士沿江制置使知建康府江東安撫使行宮留守己丑日暈周匝夏四月丙午詔管景模妻孥陷沒效忠愈堅平時所得奉入率以撫恤將士遂至空乏特賜緡錢三十萬尋賜金帶丁未以夏貴為樞密都承旨四川安撫制置使兼知重慶府四川總領夔路轉運使辛亥詔郡邑行鄉飲酒禮癸丑太陰入太微垣乙卯信陽軍將領余元友等提兵防護春耕有功補轉兩官資戊午太白晝見乙丑何夢然馬天驥以臺臣劾罷己巳江萬里以資政殿學士知建寧府李曾伯以觀文殿學士知慶元府沿海制置使庚午太白歲星合于婁五月庚辰何夢然以資政殿大學士知建寧府辛卯以楊棟參知政事葉夢鼎同知樞密院事兼權參知政事姚希得端明殿學士同簽書樞密院事馬天驥提舉洞霄宮甲午流星出自河鼓大如太白乙未安南國奉表謝恩進方物詔却之仍賜金帛以奬恭順己亥太白經天晝見六月甲辰朔知衢州謝塈因寇焚掠常山縣𠫓廾城遁詔削三秩褫職不臺臣言衢州詹沔之變乃謝塈任都吏徐信苛取激之塈罪重罰輕詔斬信籍其家塈再削兩秩勒停丁未詔饒虎臣復資政殿學士依前通奉大夫差遣如故甲寅加授李庭芝寶章閣直學士依舊任朱禩孫右文殿修撰知靜江府廣西經略使汪立信祕閣修撰樞密副都承旨沿江制置副使兼知江州江西安撫使詔呂文德職事修舉與官一轉太陰犯心戊午祈雨太白犯天關星乙丑命董宋臣兼主管御前馬院御前酒庫戊辰熒惑歲星並行己巳太白太陰並行入井庚午太陽赤黃暈秋七月甲戌彗星出柳丁丑詔避殿減膳應中外臣僚許直言朝政闕失己卯流星出自右攝提星彗星退于鬼辛巳彗星退于井甲戌京城大火癸巳謝奕昌卒贈少保追封臨海郡王謚莊憲甲午填星守畢乙未馬天驥以臺臣劾其貪贓奪職罷祠其子時楙削一秩罷新任丙申知嘉定府洪濤言新繁縣御容殿前枯木再榮殿有畫太祖像又順化人楊嗣光等奉太宗真宗仁宗英宗神宗像來歸令櫝藏府中天慶觀詔本府選差武臣迎奉赴行在所嗣光補武階兩資祈雨臺臣言太子賓客楊棟指彗為蚩尤旗欺天罔君詔棟罷職予祠戊戌彗星退于參八月壬寅朔熒惑與填星合丙午以楊棟知建寧府戊午彗星消伏甲子彗星復見于參辛未彗星化為霞氣九月己丑日生格氣癸巳內侍李忠輔以臺臣劾其貪肆欺罔削兩秩放罷乙未建寧府教授謝枋得校文宣城及建康漕闈發策十餘問言權奸誤國趙氏必亡左司諫舒有開劾其怨望騰謗大不敬竄興國軍冬十月丙午太陰犯斗辛亥詔十七界會浸輕並以十八界會易之限一月止乙丑詔行關子銅錢法每百作七十七文足以一準十八界會之三帝有疾不視朝丙寅大赦丁卯帝崩遺詔皇太子即皇帝位咸淳元年三月甲申葬于會稽之永穆陵二年十二月丙戌謚曰建道備德大功復興烈文仁武聖明安孝皇帝廟號理宗贊曰理宗享國久長與仁宗同然仁宗之世賢相相繼理宗四十年之間若李宗勉崔與之吳潛之賢皆弗究于用而史彌遠丁大全賈似道竊弄威福與相始終治效之不及慶曆嘉祐宜也蔡州之役幸依大朝以定夾攻之策及函守緒遺骨俘宰臣天綱歸獻廟社亦可以刷會稽之恥復齊襄之讐矣顧乃貪地棄盟入洛之師事釁隨起兵連禍結境土日蹙郝經來使似道諱言其納幣請和蒙蔽抑塞拘留不報自速滅亡吁可惜哉由其中年嗜慾既多怠於政事權移奸臣經筵性命之講徒資虛談固無益也雖然宋嘉定以來正邪貿亂國是靡定自帝繼統首黜王安石孔廟從祀升濂洛九儒表章朱熹四書丕變士習視前朝奸黨之碑偽學之禁豈不大有徑庭也哉身當季運弗獲大效後世有以理學復古帝王之治者考論匡直輔翼之功實自帝始焉廟號曰理其殆庶乎
