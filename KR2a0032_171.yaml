body:
  text: 宋史卷一百七十一志第一百二十四職官十一奉祿制上奉祿匹帛職錢祿粟傔人衣糧料薪炭諸物奉祿自宰臣而下至嶽瀆廟令凡四十一等宰相樞密使月三百千春冬服各綾二十匹絹三十匹冬綿百兩樞密使帶使相侍中樞密使春冬衣同宰相節度使同中書門下平章事已上及帶宣徽使並前兩府除節度使及節度使移鎮樞密使副知院帶節度使四百千參知政事樞密副使知樞密院事同知樞密院事及宣徽使不帶節度使或檢校太保簽書樞密院事三司使二百千春冬各綾十匹春絹十匹冬二十匹綿五十兩自宰相而下春各加羅一匹檢校太保簽書者春冬絹二十匹綿五十兩節度觀察留後知樞密院事及充樞密副使同知樞密院事并帶宣徽使簽書樞密院事三百千綾絹羅綿同參知政事觀文殿大學士料錢衣賜隨本官資政殿大學士料錢衣賜隨本官翰林學士承旨學士龍圖天章閣直學士知制誥龍圖天章閣學士綾各五匹絹十七匹自承旨而下加羅一匹綿五十兩已上奉隨本官衣賜如本官例大即依本官例小即依逐等三師三公百二十千綾各十匹絹三十匹東宮三師僕射九十千綾各五匹絹二十匹東宮三少御史大夫尚書六十千門下中書侍郎太常宗正卿左右丞諸行侍郎御史中丞五十五千春冬各綾五匹絹十七匹惟中丞綾七匹絹二十匹權御史中丞者給本官奉太子賓客四十五千綾絹同中丞左右散騎常侍六十千給事中中書舍人大卿監國子祭酒太子詹事四十五千諫議四十千春冬綾各三匹絹十五匹舊志太常宗正卿左右丞侍郎充翰林承旨及侍讀侍講各綾七匹絹二十匹中書舍人若充翰林學士綾五匹絹十七匹他官充龍圖閣學士樞密直學士並準此龍圖閣學士知制誥同諫議之數權三司使並權發遣使公事料錢衣賜並同本官副使五十千春綾三匹冬綾五匹春冬絹各十五匹自三師以下春各加羅一匹冬綿五十兩權者同判官並權及發遣以至子司主判河渠勾當公事同管勾河渠公事料錢衣賜並同本官數左右諭德少卿監司業郎中三十五千左右庶子起居郎舍人侍御史知雜事同如正郎知雜即支本官奉料左右司諫殿中侍御史員外郎赤令三十千丞十五千如京朝官願請本官衣奉者仍支米麥少詹事二十九千春冬絹各十三匹惟赤縣令衣賜隨本官左右正言監察御史太常博士通事舍人國子五經博士太常宗正祕書殿中丞著作郎大理正二十千太子率更令中允贊善中舍洗馬殿中省六尚奉御十八千太常博士以上春冬絹各十匹諭德以下春加羅一匹冬綿三十兩餘各絹七匹太常博士著作洗馬舊各有增減司天五官正十三千春冬絹各五匹冬綿十五兩祕書郎著作佐郎十七千春冬絹各六匹冬綿各二十兩五官正以下春羅各一匹祕書郎舊無奉兼三館職事者給八十千至道二年令同著作佐郎給之大理寺丞十四千諸寺監丞十二千春冬絹各五匹大理評事十千春冬各絹三匹自大理寺丞以下冬綿各加十五兩諸寺監丞大理評事舊有增損不同太祝奉禮八千司天監丞五千春冬絹各五匹主簿五千春冬絹各三匹丞簿各綿十五兩靈臺郎三千保章正二千春冬絹各三匹惟靈臺郎冬隨衣錢三千節度使四百千管軍同如皇子充節度使兼侍中帶諸王皇族節度使同中書門下平章事並散節度使及帶王爵奉同節度使惟春冬加絹各百匹大綾各二十匹小綾各三十匹羅各十匹綿各五百兩節度觀察留後官制行改承宣使三百千管軍同兩省都知押班諸司使遙領者準此如皇族充留後及帶郡王同惟春加絹二十匹冬三十匹大小綾各十匹春羅一匹冬綿百兩觀察使二百千管軍同兩省都知押班諸司使並橫行遙領者奉準此春冬加絹各十匹綿五十兩如皇族充觀察者即三百千仍春冬加絹各十五匹綾十匹春羅一匹冬綿五十兩防禦使三百千管軍皇族同其皇族及兩省都知押班諸司使并橫行諸衛大將軍將軍遙領者百五十千皇族春冬加絹各十五匹綾十匹春羅一匹綿五十兩兩省都知押班並橫行諸衛大將軍領者春冬絹各十匹綿五十兩團練使百五十千管軍及皇族並軍班除充者同其皇族及兩省都知押班諸司使並橫行諸衛大將軍遙領者百千皇族春冬加絹各十五匹綾十匹春羅一匹綿五十兩兩省都知押班並橫行諸衛大將軍將軍領者春冬絹各十匹冬綿五十兩六軍統軍百千諸衛上將軍六十千春冬綾各五匹絹十匹綿五十兩如皇子充諸衛上將軍二百千春冬綾各十匹春絹十匹羅一匹冬絹二十匹綿五十兩左右金吾衛大將軍三十五千諸衛大將軍二十五千春冬綾各三匹絹七匹冬綿三十兩將軍二十千春冬綾各二匹絹五匹綿二十兩率府率副中郎將十三千春冬絹各五匹冬綿十五兩自諸衛上將軍以下春衣羅一匹內客省使六十千客省使三十七千延福宮景福殿宣慶引進四方館宣政昭宣閣門使二十七千皇城以下諸司使二十五千春絹各十匹冬十匹綿三十兩惟客省使春冬絹各一十匹客省及皇城以下諸司副使二十千內殿承制十七千崇班十四千春絹各五匹冬十匹綿三十兩帶閣門祗候並同供奉官十千帶閣門祗候者十二千春絹四匹冬五匹綿二十兩侍禁七千帶閣門祗候者一十千殿直五千帶閣門祗候者九千並春各絹各四匹冬綿十五兩三班奉職借職四千春冬絹各三匹錢二千下茶酒班殿侍一千春冬絹七匹冬綿十五兩下班殿侍七百春冬絹各五匹二項並蕃官並土人補充者皇親任諸衛大將軍領刺史八千將軍刺史六十千春冬綾七匹春絹十二匹冬十三匹綿五十兩舊志春冬綾十匹絹十五匹各加羅一匹將軍三十千春冬綾二匹絹五匹羅一匹冬綿四十兩率府率二十千副率十五千春冬綾各二匹絹五匹羅一匹綿四十兩舊志諸衛將軍有五十千四十千三十千三等一等春冬各綾五匹絹十匹一等綾二匹絹五匹春並加羅一匹冬並綿二十兩諸司使有四十千三十千二等副使以下與異姓同並給實錢自諸司使至殿直春冬各羅一匹綾二匹絹各五匹冬綿各四十兩入內內侍省都知副都知押班不帶遙郡諸司使充者二十五千春絹七匹冬十匹綿三十兩副使充者二十千春絹五匹冬七匹綿二十兩入內內侍省供奉官十二千春絹五匹冬七匹綿三十兩殿頭七千高品高班五千春絹各五匹冬六匹綿二十兩黃門三千春冬絹各五匹綿十五兩祗候殿頭祗候高品祗候高班內品祗候內品祗候小內品貼祗候內品入內內品後苑內品後苑散內品七百春冬絹各五匹綿十五兩雲韶部內品七百春冬絹各四匹綿十五兩入內內品管勾二千奉輦祗應一千五百打牧祗應一千春冬絹各五匹綿各十五兩內侍省內常侍供奉官十千春冬絹各五匹內常侍春加羅一匹冬綿十五兩供奉官冬止加綿二十兩殿頭五千高品高班三千春冬絹各四匹冬綿各二十兩黃門二千春冬絹各四匹冬綿十五兩殿頭內侍入內高品二千春冬絹各三匹錢二千高班內品一千五百衣糧帶舊黃門內品在京人事一千春冬各碧羅碧綾半匹黃絹生白絹各一匹綿八兩寄班小底二千春冬絹各十匹入內小黃門前殿祗候內品北班內品外處揀來並城北班後苑把門內品掃灑院子及西京內品依北班內品依舊在西京收管七百西京內品五百春冬絹各五匹綿各十五兩惟入內小黃門前殿祗候內品春冬絹各四匹郢唐復州內品三百春冬絹各二匹布半匹錢一千舊志載內官不詳奉料皆減少樞密都承旨四十千副都承旨副承旨樞密院諸房副承旨逐房副承旨已上如帶南班官同中書堂後官提點五房公事三十千都承旨以下春冬絹各十五匹春羅一匹逐房副承旨絹各十三匹都承旨承旨春加綾三匹冬五匹綿五十兩副都承旨以下綿各三十兩中書堂後官二十千特支五千已上如帶京朝官同中書樞密主事二十千録事令史十千春冬絹各十匹春羅一匹主事已上冬綿五十兩録事令史三十兩主書七千守當官書令史五千春冬絹各二匹主書書令史春錢三千冬綿十二兩錢一千守當官春錢一千自中書樞密並曾任兩府雖不帶職曾任兩府而致仕同宣徽三司觀文資政翰林端明翰林侍讀侍講龍圖天章學士樞密龍圖天章直學士知制誥中書舍人待制御史臺開封府節度使至刺史三館祕閣審刑院刑部大理寺諸王府記室翊善以下至諸王宮教授知審官院勾當三班院糾察刑獄判吏部銓南曹登聞檢院鼓院司農寺及國子監直講丞簿河北河東陝西轉運使皇子親王諸衛大將軍至率府副率兩省都知押班不帶遙郡諸司使副兩府供奉官以下至內品惟內品特給一分見錢及樞密都承旨以下並給見錢餘官並防禦使以下諸衛將軍橫行諸司使遙領者悉一分見錢二分他物其兩省都知副都知遙領刺史以上者即給一半見錢三司檢法官十千春冬絹各五匹冬綿十五兩願請前任請受者聽若轉京朝官隨本官料錢衣賜權知開封府並判官推官料錢衣賜並隨本官舊志云判官三十千推官二十千並給見錢司録二十千如差員外郎已上充隨本官料錢衣賜功曹法曹十二千倉戶士兵四曹十千差京朝官充隨本官料錢衣賜刑部檢法官法直官大理寺法直官副法直官十千春冬絹各五匹冬綿十五兩如轉京朝官隨本官料錢衣賜西京軍巡判官十五千內開封府轉至京官支本官衣奉西京南京北京留守判官河南應天大名府判官三十千春冬絹各十二匹冬綿二十兩節度觀察判官二十五千春冬絹各六匹冬綿十二兩半節度副使三十千行軍司馬二十五千如簽書本州公事衣奉依節察判官若監當即給一半折支衣賜廚料不給節度掌書記觀察支使二十千綿絹如推官留守推官府推官節度觀察推官十五千春冬絹各五匹冬綿十兩防禦團練副使二十千如監當即給一半折支防禦團練判官十五千兩朝志云奉給依本州録事參軍如無依倚郭縣令防禦團練軍事推官軍監判官七千軍事判官如本州録事參軍之數京府司録參軍二十千諸曹參軍十千以京官知者奉從多給景德三年詔司録六曹悉給春冬衣五萬戶已上州三京同録事參軍二十千司理司法十二千司戶十千三萬戶已上州録事十八千司理司法十二千司戶九千一萬戶已上州録事十五千司理司法十千司戶八千五千戶已上州録事十二千司理司法十千司戶七千不滿五千戶州録事司理司法十千司戶七千別駕長史司馬司士參軍如授士曹依司士文學參軍七千東京畿縣七千戶已上知縣朝官二十二千京官二十千五千戶已上知縣朝官二十千京官十八千三千戶已上知縣朝官十八千京官十五千三千戶已下知縣止命京官十二千已上衣賜並隨本官主簿尉十二千至七千有四等並給見錢河南府河南洛陽縣令三十千諸路州軍萬戶已上縣令二十千簿尉十二千七千戶已上令十八千簿尉十千五千戶已上令十五千簿尉八千三千戶已上令十二千簿尉七千不滿三千戶令十千簿尉六千京朝官及三班知縣者亦許給縣令奉本官奉多者以從多給兼監兵者止請本奉添給嶽瀆廟令十千丞主簿七千全折幕職州縣料錢諸路支一半見錢一半折支縣尉全給見錢廣東川峽並給見錢元豐制行宰相三百千衣賜綾絹綿皆如舊制然以左右僕射為宰相政和中以三公為真相靖康依舊制樞密使帶使相侍中樞密使節度使同中書門下平章事以上及帶宣徽使並前兩府除節度使移鎮樞密使副知院帶節度使四百千自治平末至元豐四年如文彥博呂公弼馮京吳充先後為使副