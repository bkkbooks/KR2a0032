body:
  text: 宋史卷一百六十六志第一百一十九職官六殿前司侍衞親軍環衞官皇城司三衞官客省引進四方館東西上閣門帶御器械入內內侍省內侍省開封府臨安府河南應天府次府節度使承宣觀察防禦等使殿前司都指揮使副都指揮使都虞候各一人掌殿前諸班直及步騎諸指揮之名籍凡統制訓練番衞戍守遷補賞罰皆總其政令而有都點檢副都點檢之名在都指揮之上後不復置入則侍衞殿陛出則扈從乘輿大禮則提點編排整肅禁衞鹵簿儀仗掌宿衞之事都指揮使以節度使為之而副都指揮使都虞候以刺史以上充資序淺則主管本司公事馬步軍亦如之備則通治闕則互攝凡軍事皆行以法而治其獄訟若情不中法則稟奏聽旨騎軍有殿前指揮使內殿直散員散指揮散都頭散祗候金鎗班東西班散直鈞容直及捧日以下諸軍指揮步軍有御龍直骨朵子直弓箭直弩直及天武以下諸軍指揮諸班有都都虞候指揮使都軍使都知副都知押班御龍諸直有四直都虞候本直各有都虞候指揮使副指揮使都頭副都頭十將將虞候騎軍步軍有捧日天武左右四廂都指揮使捧日天武左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使每都有軍使副兵馬使十將將虞候承局押官各以其職隸于殿前司元祐七年簽書樞密院王巖叟言祖宗以來三帥不曾闕兩人若殿帥闕難於從下超補姚麟係殿前都虞候合升作步軍副都指揮使紹聖三年詔殿前指揮使金鎗弩手班龍旗直所減人額及排定班分並依元豐詔旨政和四年詔殿前都指揮使在節度使之上殿前副都指揮使在正任承宣使之上殿前都虞候在正任防禦使之上渡江後都指揮間虛不除則以主管殿前司一員任其事其屬有幹辦公事主管禁衞二員準備差遣準備差使點檢醫藥飯食各一員書寫機宜文字一員本司掌諸班直禁旅扈衞之事捧日天武四廂隸焉訓齊其衆振飭其藝通輪內宿併宿衞親兵並聽節制其下有統制統領將佐等分任其事凡諸軍班直功賞轉補行門拍試換官閱實排連以詔于上諸殿侍差使年滿出職祗應參班覈其名籍以時教閱則謹鞍馬軍器衣甲之出入軍兵有獄訟則以法鞫治初渡江草創三衙之制未備稍稍招集填置三帥資淺者各有主管某司公事之稱又別置御營司擢王淵為都統制其後外州駐劄又有御前諸軍都統制之名又併入神武軍以舊統制統領改充殿前司統制統領官乾道中臣僚言三衙軍制名稱不正以舊制論之軍職大者凡八等除都指揮使或不常置外曰殿前副都指揮使馬軍副都指揮使步軍副都指揮使次各有都虞候次有捧日天武四廂都指揮使龍神衞四廂都指揮使秩秩有序若登第然降此而下則分營分廂各置副都指揮使邊境有事命將討捕則旋立總管鈐轄都監之名使各將其所部以出事已復初今以宿衞虎士而與在外諸軍同其名以統制統領為之長又使遙帶外路總管鈐轄皆非舊典所當法祖宗之舊正三衙之名改諸軍為諸廂改統制以下為都虞候指揮使要使宿衞之職預有差等士卒之心明有所係異時拜將必無一軍皆驚之舉時不果行淳熙以後四廂之職多虛而殿司職司有權管幹有時暫照管之號愈非乾道以前之比矣侍衞親軍馬軍都指揮使副都指揮使都虞候各一人掌馬軍諸指揮之名籍凡統制訓練番衞戍守遷補賞罰皆總其政令侍衞扈從及大禮宿衞所掌如殿前司官所領馬軍自龍衞而下有左右四廂都指揮使龍衞左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使每都有軍使副兵馬使十將將虞候承勾押官各以其職隸于馬軍司政和四年詔以馬軍都指揮使馬軍副都指揮使在正任觀察使之上馬軍都虞候在正任防禦使之上中興後置主管侍衞馬軍司一員其屬有幹辦公事準備差遣點檢醫藥飯食各一員掌出戍建康差主管機宜文字一員掌馬軍之政令凡出入扈衞守宿以奉上開收閱習轉補以勵下如殿前司凡名籍覈其在亡過則以法繩之有巡防敕應則糾率差撥龍衞四廂隸焉侍衞親軍步軍都指揮使副都指揮使都虞候各一人掌步軍諸指揮之名籍凡統制訓練番衞戍守遷補賞罰皆總其政令侍衞扈從及大禮宿衞如殿前司所領步軍自神衞而下有左右四廂都指揮使左右廂各有都指揮使每軍有都指揮使都虞候每指揮有指揮使副指揮使每都有都頭副都頭十將將虞候承勾押官各以其職隸于步軍司政和四年詔以步軍都指揮使步軍副都指揮使在正任觀察使之上都虞候在正任防禦使之上中興後置主管侍衞步軍司一員其屬有幹辦公事二員準備差遣點檢醫藥飯食各一員掌步軍之政令凡出入扈衞守宿以奉上開收閱習轉補以勵下如殿前司凡名籍校其在亡過則以法繩之有巡防敕應則糾率差撥神衞四廂隸焉環衞官左右金吾衞上將軍大將軍將軍中郎將郎將左右衞上將軍大將軍將軍中郎將郎將左右驍衞上將軍大將軍將軍左右武衞上將軍大將軍將軍左右屯衞上將軍大將軍將軍左右領軍衞上將軍大將軍將軍左右監門衞上將軍大將軍將軍左右千牛衞上將軍大將軍將軍中郎將郎將諸衞上將軍大將軍將軍並為環衞官無定員皆命宗室為之亦為武臣之贈典大將軍以下又為武官責降散官政和中改武臣官制而環衞如故蓋雖有四十八階別無所領故也靖康元年詔以武安軍節度使錢景臻等為左金吾衞上將軍保信軍節度使劉敷等為右金吾衞上將軍用御史中丞陳過庭言遵藝祖開寶初罷王彥超武行德等歸環衞故事也其禁兵分隸殿前及侍衞兩司所稱十二衞將軍皆空官無實中興多不除授隆興中始命學士洪遵等討論典故復置十六衞號環衞官其法節度使則領左右金吾衞上將軍承宣使則領左右衞上將軍在內則兼帶在外則不帶正任為上將軍遙郡為大將軍正親兄弟子孫試充又詔祖宗諸后自明肅至欽慈諸后及后妃嬪御之家各具本宗堪充諸衞官以名銜聞又詔三衞郎為三衞侍郎又詔博士並差文臣崇寧四年二月置五年正月罷皇城司幹當官七人以武功大夫以上及內侍都知押班充掌宮城出入之禁令凡周廬宿衞之事宮門啟閉之節皆隸焉每門給銅符二鐵牌一左符留門右符請鑰鐵牌則請鑰者自隨以時參驗而啟閉之總親從親事官名籍辨其宿衞之地以均其番直人物偽冒不應法則譏察以聞凡臣僚朝覲上下馬有定所自宰相親王以下所帶人從有定數揭牓以止其喧閧元豐六年詔幹當皇城司除兩省都知押班外取年深者減罷止留十員元祐元年詔幹當官閱三年無過者遷秩一等再任滿者減磨勘二年元符元年詔應宮城出入請納官物呈稟公事傳送文書并御廚翰林儀鸞司非次祗應聽於便門出入即不由所定門者論如闌入律應差辦人物入內及內諸司差人往他所應奉並前一日具名數與經歷諸門報皇城司二年詔皇城司任滿酬奬依熙寧五年指揮再任滿無遺闕取旨政和五年詔皇城司可創置親從弟五指揮以七百人為額親從官舊有四指揮元額共二千二百七十人仍以五尺九寸一分六釐使為將軍副使為中郎將使臣以下為左右郎將通以十員為額宗室不在此例除管軍則解或領閤門皇城之類則仍帶雖戚里子弟非戰功人不除批書印紙屬殿前司是時帝諭宰相以為如文臣館閣儲才之地紹熙初嘗欲留闕以儲將才循初意也嘉泰中復申明隆興之詔屏除貪得妄進以重環尹之官嘉定二年復因臣僚言專以曾為兵將有功績及名將子孫之有才略者充通前後觀之可以見環衞儲才之意三衞官三衞郎一員秩比太中大夫中郎為之貳文武各一員秩比朝議大夫博士二員主簿一員親衞府郎十員中郎十員勳衞府郎十員中郎十員翊衞府郎二十員中郎二十員文武各四十員三衞郎治其府之事率其屬日直于殿陛長在左立起居郎之前貳分左右文東武西立都承旨之後仗退治事于府博士掌教道校試三衞所習文武之藝親衞立于殿上兩旁勳衞立于朵殿翊衞立于兩階衞士之前三衞郎依給舍中郎依少卿餘依寺丞親衞官以后妃嬪御之家有服親及翰林學士并管軍正任觀察使以上子孫勳衞官以勳臣之世賢德之後有服親太中大夫以上及正任團練使遙郡觀察使以上翊衞官以卿監正任刺史遙郡團練使以上並以為等其將校十將節級等應合行事件比第四指揮及見行條貫六年三月應臣僚輒帶售雇人入宮門罪賞並依宗室法將帶過數止坐本官若兼領外局所定人從非隨本官輒入者依闌入法十一月詔嘉王楷差提舉皇城司整肅隨駕禁衞所靖康元年詔應入皇城門依法服本色輒衣便服及不裹頭帽入出者並科罪所隸官屬一冰井務掌藏冰以薦獻宗廟供奉禁庭及邦國之用若賜予臣下則以法式頒之中興初為行營禁衞所差主管官掌出入皇城宮殿門等敕號察其假冒車駕行幸則糾察導從紹興元年改稱行在皇城司提舉官一員提點官二員幹當官五員以諸司副使內侍都知押班充掌皇城宮殿門給三色牌號稽驗出入凡親從親事官五指揮入內院子守闕入內院子指揮總其名籍均其勞役察其功過而賞罰之凡諸門必謹所守蠲潔齋肅郊祀大禮則差撥隨從守衞有宴設則守門約闌每年春秋按賞親從逐指揮親事官第一指揮長行三色武藝弓弩槍手皇城周回或有墊陷移文修整嘉定間臣僚言皇城一司總率親從嚴護周廬參錯禁旅權亞殿巖乞專以知閣御帶兼領仍立定親從員額以革泛濫並從之客省引進使客省使副使各二人掌國信使見辭宴賜及四方進奉四夷朝覲貢獻之儀受其幣而賓禮之掌其饔餼飲食還則頒詔書授以賜予宰臣以下節物則視其品秩以為等若文臣中散大夫武臣橫行刺史以上還闕朝覲掌賜酒饌使闕則引進四方館閤門使副互權大觀元年詔客省四方館不隸臺察政和二年改定武選新階乃詔客省四方館引進司東西上閤門所掌職務格法並令尚書省具上又詔高麗已稱國信改隸客省靖康元年詔客省引進司四方館西上閤門為殿庭應奉與東上閤門一同隸中書省不隸臺察引進司使副各二人掌臣僚蕃國進奉禮物之事班四方館上使闕則客省四方館互兼四方館使二人掌進章表凡文武官朝見辭謝國忌賜香及諸道元日冬至朔旦慶賀起居章表皆受而進之郊祀大朝會則定外國使命及致仕未升朝官父老陪位之版進士道釋亦如之掌凡護葬賻贈朝拜之事客省四方館建炎初併歸東上閤門皆知閤總之東西上閤門東上閤門西上閤門使各三人副使各二人宣贊舍人十人舊名通事舍人政和中改祗候十有二人掌朝會宴幸供奉贊相禮儀之事使副承旨稟命舍人傳宣贊謁祗候分佐舍人凡文武官自宰臣宗室自親王外國自契丹使以下朝見謝辭皆掌之視其品秩以為引班班之次贊其拜舞之節而糾其違失若慶禮奉表則東上閤門掌之慰禮進名則西上閤門掌之月進班簿歲終一易分東西班揭貼以進自客省而下因事建官皆有定員遂立積考序遷之法聽其領職居外增置看班祗候六人由看班遷至使皆五年使以上七年遇闕乃遷無闕則加遙郡元豐七年詔客省四方館使副領本職外官最高者一員兼領閤門事元祐元年詔客省四方館閤門並以橫行通領職事紹聖三年詔看班祗候有闕令吏部選定尚書省呈人材中書省取旨差崇寧四年詔閤門依元豐法隸門下省大觀元年詔閤門依殿中省例不隸臺察政和六年詔宣贊播告直誦其辭靖康元年詔閤門並立員額監察御史胡舜陟奏閤門之職祖宗所重宣贊不過三五人熙寧間通事舍人十三員祗候六人當時議者猶以為多今舍人一百八員祗候七十六員看班四員內免職者二百三員由宦侍恩倖以求財朱勔父子交賣尤多富商豪子往往得之真宗時諸王夫人因聖節乞補閤門帝曰此職非可以恩澤授不許神宗即位之初用宮邸直省官郭昭選為閤門祗候司馬光言此祖宗以蓄養賢才在文臣為館職其重如此今豈可賣以求財乞賜裁省故有是詔舊制有東西上閤門多以處外戚勳貴建炎初元併省為一其引進司四方館併歸閤門客省循舊法非橫行不許知閤門紹興元年帝以宋籛孫藩邸舊人稍習儀注命轉行橫行一官主管閤門又曰藩邸舊人自內侍及使臣皆不與行在職任止與外任籛孫以閤門無諳練人故留之五年詔右武大夫以上並稱知閤門事兼客省四方館事官未至者即稱同知閤門事同兼客省四方館事以除授為序稱同知者在知閤門之下宣贊舍人任傳宣引贊之事與閤門祗候並為閤職間帶點檢閤門簿書公事紹興中許令供職注授內外合入差遣闕到然後免供職其後供職舍人員數稍冗裁定以四十員為額乾道六年上欲清閤門之選除宣贊舍人閤門祗候仍舊通掌贊引之職外置閤門舍人十員以待武舉之入官者掌諸殿覺察失儀兼侍立駕出行幸亦如之六參常朝後殿引親王起居倣儒臣館閤之制召試中書省然後命之又許轉對如職事官供職滿二年與邊郡淳熙間置看班祗候令忠訓郎以下充秉義郎以上始除閤門祗候又增重薦舉閤門祗候之制必廉幹有方略善弓馬兩任親民無遺闕及曾歷邊任者充紹熙以來立定員額慶元初申嚴閤門長官選擇其屬之令非右科前名之士不預召試蓋以為右列清選云帶御器械宋初選三班以上武幹親信者佩櫜鞬御劍或以內臣為之止名御帶咸平元年改為帶御器械景祐二年詔自今無得過六人慶曆元年詔遇闕員曾歷邊任有功者補之中興初諸將在外多帶職蓋假禁近之名為軍旅之重紹興七年樞密院言帶御器械官當帶插帝曰此官本以衞不虞今乃佩數笴骹箭不知何用方承平時至飾以珠玉車駕每出為觀美而已他日恢復此等事當盡去之二十九年詔中外舉薦武臣無闕可處增置帶御器械四員然近侍亦或得之乾道以來詔立班樞密院檢詳文字之上淳熙間凡正除軍中差遣或外任者不許銜內帶行又須供職一年方與解帶恩例於是屬鞬之職益加重焉入內內侍省內侍省宋初有內中高品班院淳化五年改入內內班院又改入內黃門班院又改內侍省入內內侍班院景德三年詔東門取索司可併隸內東門司餘入內都知司內東門都知司內侍省入內內侍班院可立為入內內侍省以諸司隸之宋初有內班院淳化五年改為黃門九月又改內侍省入內內侍省與內侍省號為前後省而入內省尤為親近通侍禁中役服近者隸入內內侍省拱侍殿中備洒掃之職役使雜品者隸內侍省入內內侍省有都都知都知副都知押班內東頭供奉官內西頭供奉官內侍殿頭內侍高品內侍高班內侍黃門內侍省有左班都知副都知右班都知副都知押班內東頭供奉官內西頭供奉官內侍殿頭內侍高品內侍高班內侍黃門自供奉官至黃門以一百八十人為定員凡內侍初補曰小黃門經恩遷補則為內侍黃門後省官闕則以前省官補押班次遷副都知次遷都都知遂為內臣之極品熙寧中入內內侍省內侍省都知押班遂省各以轉入先後相壓永為定式其官稱則有內客省使延福宮使宣政使宣慶使昭宣使元豐議改官制張誠一欲易都知押班之名置殿中監以易內侍省既而宰執進呈神宗曰祖宗為此名有深意豈可輕議政和二年始遂改焉以通侍大夫易內客省使正侍大夫易延福宮使中侍大夫易景福殿使中亮大夫易宣慶使中衞大夫易宣政使拱衞大夫易昭宣使供奉官易內東頭供奉官左侍禁易內西頭供奉官右侍禁易內侍殿頭左班殿直易內侍高品右班殿直易內侍高班而黃門之名如故其屬有御藥院勾當官四人以入內內侍充掌按驗方書修合藥劑以待進御及供奉禁中之用內東門司勾當官四人以入內內侍充掌宮禁人物出入周知其名數而譏察之合同憑由司監官二人掌禁中宣索之物給其要驗凡特旨賜予皆具名數憑由付有司準給管勾往來國信所管勾官二人以都知押班充掌契丹使介交聘之事後苑勾當官無定員以內侍充掌苑囿池沼臺殿種蓺雜飾以備游幸造作所掌造作禁中及皇屬婚娶之名物龍圖天章寶文閣勾當四人以入內內侍充掌藏祖宗文章圖籍及符瑞寶玩之物而安像設以崇奉之軍頭引見司勾當官五人以內侍省都知押班及閤門宣贊舍人以上充掌供奉便殿禁衞諸軍入見之事及馬步兩直軍員之名翰林院勾當官一員以內侍押班都知充總天文書藝圖畫醫官四局凡執伎以事上者皆在焉中興以來深懲內侍用事之弊嚴前後省使臣與兵將官往來之禁著內侍官不許出謁及接見賓客之令紹興三十年詔內侍省所掌職務不多徒有冗費可廢併歸入內內侍省舊制內侍遇聖節許進子年十二試以墨義即中程者候三年引見供職三十二年殿中侍御史張震言宦者員衆孝宗即命內侍省具見在人數免會慶節進子仍定以二百人為額乾道間以差赴德壽宮應奉闕人增置二百五十人紹熙三年依宰臣奏中官只令承受宮禁中事不許預聞他事嘉定初詔內侍省陳乞恩例親屬充寄班祗候以十年為限開封府牧尹不常置權知府一人以待制以上充掌尹正畿甸之事以教法導民而勸課之中都之獄訟皆受而聽焉小事則專決大事則稟奏若承旨已斷者刑部御史臺無輒糾察屏除寇盜有姦伏則戒所隸官捕治凡戶口賦役道釋之占京邑者頒其禁令會其帳籍大禮橋道頓遞則為之使仗內奉引則差官攝牧其屬有判官推官四人日視推鞫分事以治而佐其長領南司者一人督察使院非刑獄訟訴則主行之司錄參軍一人折戶婚之訟而通書六曹之案牒功曹倉曹戶曹兵曹法曹士曹參軍各一人視其官曹分職莅事左右軍巡使判官各二人分掌京城爭鬥及推鞫之事左右廂公事幹當官四人掌檢覆推問凡鬥訟事輕者聽論決領縣十有八鎮二十有四令佐訓練征榷監臨巡警之官知府事者率統隸焉分案六置吏六百開封典司轂下自建隆以來為要劇之任至熙寧間增給吏祿禁其受賕省衙前役以寬民力釐折獄訟歸於廂官而治事視前日損去十四元祐元年詔府界捕盜官吏隸本府與都大提舉司同管轄而掌其賞罰置新城內左右二廂三年以罷大理寺獄置軍巡院判官一員四年罷新置二廂六年王巖叟言左右廳推官公事詞狀初無通治明文請事繫朝省及奏請通治外餘並據號分治從之紹聖元年知府事錢勰言自祖宗以來並分左右廳置推官各一員近年止除推官元祐中並令分治請依故事分左右廳各除推官一員作兩廳共治職事又言熙寧中置舊城左右廂元祐初增置于新城內四年罷增置兩廂今請復置從之三年詔開封祥符知縣事自今選秩通判人充四年詔開封府所薦推判官並召對取旨崇寧三年蔡京奏乞罷權知府置牧一員尹一員專總府事少尹二員分左右貳府之政事牧以皇子領之尹以文臣充在六曹尚書之下侍郎之上少尹在左右司郎官之下列曹郎官之上以士戶儀兵刑工為六曹次序司錄二員六曹各二員參軍事八員開封祥符兩縣置案倣此易胥吏之稱略依唐六典制度又請移開封府治所於舊尚書省從之太宗真宗嘗任府尹自至道後知府者必帶權字蔡京乃以潛邸之號處臣下建置曹官以上凡十六員比舊增要官十一員五年詔開封府屬官參軍等並依舊員額大觀元年李孝壽乞增置府學博士一員從之詔開封六職閑劇不同如士曹之官唯主到罷批書而刑戶事繁自今凡士之婚田鬥訟皆在士曹餘曹倣此二年詔皇子領牧祿令如執政官又詔天下州郡並依開封府分曹置掾政和二年復置開封府學錢粮官一員五年盛章奏乞依尚書六部置架閣主管官一員宣和元年聶山奏司錄六曹官乞依省部少監封詔修入條令臨安府舊為杭州領浙西兵馬鈐轄建炎三年詔改為臨安府其守臣令帶浙西同安撫使時置帥在鎮江府紹興駐驆臨安遂正稱安撫使置知府一員通判二員簽書節度判官廳公事節度推官觀察推官觀察判官錄事參軍左司理參軍右司理參軍司戶參軍司法參軍各一員本府掌畿甸之事籍其戶口均其賦役頒其禁令城外內分南北左右廂各置廂官以聽民之訟訴廂官許奏辟京朝官親民資序人充後以臣僚言罷城內兩廂官惟城外置焉分使臣十員以緝捕在城盜賊立五酒務置監官以裕財分六都監界分差兵一百四十八鋪以巡防煙火置兩總轄承受御前朝旨文字凡御寶御批實封有所取索則供進凡省臺寺監監司符牒及管下諸縣及倉場等申到公事則受而理之凡大禮及國信隨事應辦祠祭共其禮料會聚陳其幄帟人使往來辨其舟楫皆先期飭于有司領縣九分士戶儀兵刑工六案內戶案分上中下案外有免役案常平案上下開拆司財賦司大禮局國信司排辦司修造司各治其事置吏點檢文字都孔目官副孔目官節度孔目官觀察孔目官各一名磨勘司主押官正開拆官副開拆官各一人下名開拆官二名押司官八人前後行守分二十一人貼司三十人乾道七年皇太子領尹事廢臨安府通判簽判職官置少尹一員日受民詞以白太子間日率僚屬詣宮稟事置判官二員推官三員有旨少尹比倣知府判官比通判推官比幕職官其統臨職分並照從來條例九年皇太子解尹事臨安府知通簽判推判官並依舊置既據保義郎趙禮之狀臨安府依條合置兵馬監押一員經任監當四員初任監當闕一員昨皇太子領府尹更不差注今既辭免乞將宗室添差員闕依舊從之淳熙三年詔罷備攝官惟緝捕使臣十二員聽候差使六員許令辟置嘉泰四年詔臨安府添差不釐務總管路鈐二十員州鈐轄路分都監副都監二十員正副將十五員安撫司準備將領十五員州都監以下十員共以八十員為額尋減總管路鈐五員開禧三年復省罷總管路分共六員河南應天府牧尹少尹司錄戶曹法曹士曹尹以下掌同開封府尹闕則置知府事一人以郎中以上充二品以上曰判府次府及節度州準此通判一人以朝官充判官推官各一人或以京朝官簽書使院牙職左右軍巡悉同開封而主典以下差減其數戶曹通掌府院戶籍考課稅賦法曹專掌讞議士曹或蔭起家不常置諸州府同至道初罷司理院州置司士取官吏強慢者為給簿尉奉助教有特恩而受者不釐務次府牧尹少尹司錄戶曹法曹士曹司理文學助教牧尹以下所掌並同開封大中祥符八年以楚王為興元牧其後又為京兆江陵牧自餘無為者尹闕則知府事一人以朝官及刺史以上或諸司使充通判一人以京朝官充乾德初諸州置通判統治軍州之政事得專達與長吏均禮大藩或置兩員戶少事簡有不置者正刺史以上州知州雖小處亦特置使院牙職事並同前節度使宋初無所掌其事務悉歸本州知州通判兼總之亦無定員恩數與執政同初除鎖院降麻其禮尤異以待宗室近屬外戚國壻年勞久次者若外任除殿帥始授此官亦止於一員或有功勳顯著任帥守於外及前宰執拜者尤不輕授又遵唐制以節度使兼中書令或侍中或中書門下平章事皆謂之使相以待勳賢故老及宰相久次罷政者隨其舊職或檢校官加節度使出判大藩通謂之使相元豐以新制始改為開府儀同三司舊制敕出中書門下故事之大者使相繫銜至是皆南省奉行而開府不預八年鎮江軍節度使檢校太傅韓絳為開府儀同三司判大名府元祐五年太師平章軍國重事文彥博為開府儀同三司守太師充護國軍山南西道節度使致仕自崇寧五年司空左僕射蔡京為開府儀同三司安遠軍節度使中太一宮使其後故相而除則有劉正夫余深前執政則有蔡攸梁子美外戚則有向宗回宗良鄭紳錢景臻殿帥則有高俅內侍則有童貫梁師成宣和末節度使至六十人議者以為濫親王皇子二十六人宗室十一人前執政二人大將四人外戚十人宦者恩澤計七人中興諸州升改節鎮凡十有二是時諸將勳名有兼兩鎮三鎮者實為希闊之典宋朝元臣拜兩鎮節度使者才三人韓琦文彥博中興後呂頤浩是也三公卒辭之而諸大將若韓張吳岳楊劉之流率至兩鎮節度使其後加至三鎮者三人韓世忠鎮南武安寧國張俊靜江寧武靜海劉錡護國寧武保靜其後相承宰執從官及后妃之族拜者不一然自建炎至嘉泰宰相特拜者六人呂頤浩張浚虞允文皆以勳史浩以舊趙雄葛邲以恩執政一人葉右丞夢得從官二人而已張端明澄楊敷學炎惟紹興中曹勛韓公裔乾道中曾覿嘉泰中姜特立譙令雍皆以攀附恩澤亦累官至焉非常制也承宣使無定員舊名節度觀察留後政和七年詔觀察留後乃五季藩鎮官以所親信留充後務之稱不可循用可冠以軍名改為承宣使唐有留後五代因之宋初留後觀察皆不得本州刺史大中祥符七年令有司檢討故事始復帶之觀察使無定員初沿唐制置諸州觀察使凡諸衞將軍及使遙領者資品並止本官政和中詔承宣觀察使仍不帶持節等防禦使團練使諸州刺史無定員靖康元年臣僚言遙郡正任恩數遼絕自遙郡遷正任者合次第轉行今自遙郡與落階官而授正任直超轉本等正官是皆姦巧希進躐取乞應遙郡承宣使有功勞除正任者止除正任刺史從之凡未落階官者為遙郡除落階官者為正任朝謁御宴惟正任預焉遙郡並止本官正任復次第轉行考之舊制梯級有差中興以後節度移鎮寖少後有一定不易徑遷太尉承宣觀察徑作一官及遙郡落階官又就除正任紹興末臣僚以為言雖復置檢校官餘未盡改
