body:
  text: 宋史卷二十四本紀第二十四高宗一高宗受命中興全功至德聖神武文昭仁憲孝皇帝諱構字德基徽宗第九子母曰顯仁皇后韋氏大觀元年五月乙巳生東京之大內赤光照室八月丁丑賜名授定武軍節度使檢校太尉封蜀國公二年正月庚申封廣平郡王宣和三年十二月壬子進封康王資性朗悟博學強記讀書日誦千餘言挽弓至一石五斗宣和四年始冠出就外第靖康元年春正月金人犯京師軍于城西北遣使入城邀親王宰臣議和軍中朝廷方遣同知樞密院事李梲等使金議割太原中山河間三鎮遣宰臣授地親王送大軍過河欽宗召帝諭指帝慷慨請行遂命少宰張邦昌為計議使與帝俱金帥斡離不留之軍中旬日帝意氣間暇二月會京畿宣撫司都統制姚平仲夜襲金人寨不克金人見責邦昌恐懼涕泣帝不為動斡離不異之更請肅王癸卯肅王至軍中許割三鎮地進邦昌為太宰留質軍中帝始得還金兵退復遣給事中王雲使金以租賦贖三鎮地又以蠟書結遼降將耶律余覩為金人所得八月金帥粘罕復引兵深入陷太原斡離不破真定冬十月王雲從吏自金先還言金人須帝再至乃議和雲歸言金人堅欲得地不然進兵取汴都十一月詔帝使河北奉衮冕玉輅尊金主為伯上尊號十八字被命即發京師以門下侍郎耿南仲主和議請與俱乃以其子中書舍人延禧為參議官偕行帝由滑濬至磁州守臣宗澤請曰肅王去不返金兵已迫復去何益請留磁磁人以雲將挾帝入金遂殺雲時粘罕斡離不已率兵渡河相繼圍京師從者以磁不可留知相州汪伯彥亦以蠟書請帝還相州閏月耿南仲馳至相見帝致辭以面受欽宗之旨盡起河北兵入衛帝乃同南仲募兵勤王初朝廷聞金兵渡河欲拜帝為元帥至是殿中侍御史胡唐老復申元帥之議尚書右僕射何石函擬詔書以進欽宗遣閣門祗候秦仔持蠟詔至相拜帝為河北兵馬大元帥知中山府陳亨伯為元帥汪伯彥宗澤為副元帥仔於頂髮中出詔帝讀之嗚咽兵民感動十二月壬戌朔帝開大元帥府有兵萬人分為五軍命武顯大夫陳淬都統制軍馬閣門祗候侯章齎蠟書至自京師詔帝盡發河北兵命守臣自將帝乃下令諸郡守與諸將議引兵渡河乙亥帝率兵離相州丙子履冰渡河丁丑次大名府宗澤以二千人先諸軍至知信德府梁揚祖以三千人繼至張俊苗傅楊沂中田師中皆在麾下兵威稍振會簽書樞密院事曹輔齎蠟詔至云金人登城不下方議和好可屯兵近甸毋輕動汪伯彥等皆信和議惟宗澤請直趨澶淵為壁次第解京城之圍伯彥南仲請移軍東平帝遂遣澤以萬人進屯澶淵揚言帝在軍中自是澤不復預府中謀議帝決意趨東平庚寅帝發大名建炎元年春正月癸巳帝至東平初帝軍在相州京城圍久中外莫知帝處及是陳請四集取決帥府壬寅高陽關路安撫使黃潛善總管楊惟忠亦部兵數千至東平命潛善進屯興仁留惟忠為元帥都統制金人聞帝在澶淵遣甲士及中書舍人張澄來召宗澤命壯士射之澄乃遁伯彥等請帝如濟州二月庚辰發東平癸未次濟州時帥府官軍及羣盜來歸者號百萬人分屯濟濮諸州府而諸路勤王兵不得進二帝已在金人軍中三月丁酉金人立張邦昌為帝稱大楚黃潛善以告帝慟哭僚屬欲奉帝駐軍宿州謀渡江左帝聞三軍籍籍遂輒承制以宗澤為徽猷閣待制丁巳斡離不退師徽宗北遷戊午承制以汪伯彥為顯謨閣待制充元帥潛善為徽猷閣待制充副元帥夏四月粘罕退師欽宗北遷癸亥邦昌尊元祐皇后為宋太后遣人至濟州訪帝又遣吏部尚書謝克家來迎耿南仲率幕僚勸進帝避席流涕遜辭不受伯彥等引天命人心為請且謂請康紀元為十二月立康之兆帝曰當更思之以知淮寧府趙子嵩為寶文閣學士元帥府參議官東南道總管統東南勤王兵邦昌遣閣門宣贊舍人蔣師愈等持書詣帝自言從權濟事及將歸寶避位之意帝亦貽諸帥書以未得至京已至者毋輒入聞資政殿大學士領開封府事李綱在湖北遣劉默持書訪之又諭宗澤等以受偽命之人義當誅討然慮事出權宜未可輕動澤復書謂邦昌篡亂蹤迹已無可疑宜早正天位興復社稷不可不斷門下侍郎呂好問亦以蠟書來言帝不自立恐有不當立而立者丁卯謝克家以大宋受命之寶至濟州帝慟哭跪受命克家還京師趣辦儀物戊辰濟州父老詣軍門言州四旁望見城中火光屬天請帝即位于濟會宗澤來言南京乃藝祖興王之地取四方中漕運尤易遂決意趨應天是夕邦昌手書上延福宮太后尊號曰元祐皇后入居禁中以尚書左丞馮澥為奉迎使皇后又遣兄子衛尉少卿孟忠厚持手書遺帝皇后垂簾聽政邦昌權尚書左僕射率在京百官上表勸進不許甲戌皇后手書告中外俾帝嗣統乙亥百官再上表又不許丁丑馮澥等至濟州百官三上表許以權聽國事戊寅命宗澤先勒兵分駐長垣韋城等縣以備非常東道副總管朱勝非至濟州宣撫司統制官韓世忠以兵來會庚辰帝發濟州鄜延副總管劉光世自陝州來會以光世為五軍都提舉辛巳次單州壬午次虞城縣西道都總管王襄自襄陽來會癸未至應天府皇后詔有司備法駕儀仗乙酉張邦昌至伏地慟哭請死帝慰撫之承制以汪伯彥為顯謨閣直學士黃潛善為徽猷閣直學士權吏部尚書王時雍等奉乘輿服御至羣臣勸進者益衆命有司築壇府門之左五月庚寅朔帝登壇受命禮畢慟哭遙謝二帝即位于府治改元建炎大赦常赦所不原者咸赦除之張邦昌及應干供奉金國之人一切不問命西京留守司修奉祖宗陵寢罷天下神霄宮住散青苗錢應死節及歿于王事者並推恩奉使未還者祿其家一年應選人並循資已係承直郎者改次等京官臣僚因亂去官者限一月還任潰兵羣盜咸許自新免係官欠負蠲南京及元帥府常駐軍一月以上州縣夏稅應天府特奏名舉人並與同進士出身免解人與免省試諸路特奏名三舉以上及宗室嘗預貢者並推恩應募兵勤王人以兵付州縣主兵官聽赴行在中外臣庶許言民間疾苦雖詆訐亦不加罪命官犯罪更不取特旨裁斷蔡京童貫朱勔李彥孟昌齡梁師成談稹及其子孫更不收內外大臣限十日各舉布衣有材略者一人餘如故事以黃潛善為中書侍郎汪伯彥同知樞密院事元祐皇后在東京是日徹簾辛卯遙尊乾龍皇帝為孝慈淵聖皇帝元祐皇后為元祐太后詔史官辨宣仁聖烈皇后誣謗築景靈宮于江寧府壬辰以張邦昌為太保奉國軍節度使同安郡王五日一赴都堂參決大事以河東北宣撫使范訥為京城留守癸巳遙尊帝母韋賢妃為宣和皇后遙立嘉國夫人邢氏為皇后耿南仲罷甲午以李綱為尚書右僕射兼中書侍郎趣赴行在楊惟忠為建武軍節度使主管殿前司公事罷諸盜及民兵之為統制者簡其士馬隸五軍乙未以生辰為天申節馮澥罷以兵部尚書呂好問為尚書右丞命中軍統制馬忠後軍統制張換率兵萬人趣河間府追襲金人丙申以呂好問兼門下侍郎丁酉以黃潛善兼御營使汪伯彥副之真定府路副總管王淵為都統制鄜延路副總管劉光世提舉一行事務王時雍黃州安置命統制官薛廣張瓊率兵六千人會河北山水寨義兵共復磁相戊戌以資政殿學士路允迪為京城撫諭使龍圖閣學士耿延禧副之贈吏部侍郎李若水觀文殿學士諡忠愍己亥召太學生陳東赴行在李綱至江寧誅叛卒周德等庚子詔以靖康大臣主和誤國責李邦彥為建寧軍節度副使潯州安置徙吳敏柳州蔡懋英州李梲宇文虛中鄭望之李鄴皆以使金請割地責廣南諸州並安置辛丑詔張邦昌知幾達變勳在社稷如文彥博例月兩赴都堂壬寅封後宮潘氏為賢妃以江淮發運使梁揚祖提領東南茶鹽事癸卯天申節罷百官上壽乙巳賜諸路勤王兵還營者錢人三千丙午以誣謗宣仁聖烈皇后追貶蔡確蔡卞邢恕蔡懋官以保靜軍節度使姚古知河南府金人陷河中府權府事郝仲連死之丁未徽宗至燕山府庚戌以宗澤為龍圖閣學士知襄陽府壬子進張邦昌太傅丙辰罷監察御史張所尋責江州安置丁巳詔成都京兆襄陽荊南江寧府鄧揚二州儲資糧修城壘以備巡幸以簽書樞密院事張叔夜嘗援京城力戰從徽宗北行遙命為觀文殿大學士醴泉觀使戊午右諫議大夫范宗尹罷遣太常少卿周望使河北軍前通問二帝西道總管王襄北道總管趙野坐勤王稽緩並分司襄陽府青州居住尋責襄永州野邵州並安置六月己未朔李綱入見上十議曰國是巡幸赦令僭逆偽命戰守本政責成修德以前殿前副都指揮使王宗濋引衛兵遁逃致都城失守責官邵州安置徽猷閣直學士徐秉哲假資政殿學士為大金通問使秉哲辭庚申封靖康軍節度使仲湜嗣濮王粘罕還屯雲中辛酉命新任郎官未經上殿者並引對御史中丞顏岐罷徐秉哲責官梅州安置詔河北京陝淮湖江浙州軍縣鎮募人修築城壁壬戌置登聞檢鼓院癸亥以黃潛善為門下侍郎兼權中書侍郎張邦昌坐僭逆責降昭化軍節度副使潭州安置及受偽命臣僚王時雍高州吳並永州莫儔全州李擢柳州孫覿歸州並安置顏博文王紹以下論罪有差以知懷州霍安國河東宣撫使劉韐死節贈安國延康殿學士韐資政殿大學士甲子命李綱兼御營使乙丑以龍神衛四廂都指揮使馬忠為河北經制使措置民兵洪芻罷左諫議大夫下臺獄丁卯以祠部員外郎喻汝礪為四川撫諭督漕計羡緡及常平錢物罷開封諸州軍府司録曹掾官州軍通判二員者省其一權減宰執奉賜三之一省諸路提舉常平司兩浙福建提舉巿舶司賊李孝忠寇襄陽守臣黃叔敖棄城遁立格買馬辛未以子敷生大赦籍天下神霄宮錢穀充經費拘天下職田錢隸提刑司還元祐黨籍及上書人恩數癸酉詔陝西山東諸路帥臣團結軍民互相應援乙亥增諸縣弓手置武尉領之宗室叔向以所募勤王兵屯京師或言為變命劉光世捕誅之戊寅以汪伯彥知樞密院事遣宣義郎傅雱使河東軍前通問二帝己卯置沿河沿淮沿江帥府十有九要郡三十九次要郡三十八帥守兼都總管守臣兼鈐轄都監總置軍九十六萬七千五百人別置水軍七十七將造舟江淮諸路置三省樞密院賞功司東京留守范訥落節鉞淄州居住庚辰以二帝未還禁州縣用樂辛巳置沿河巡察六使壬午以戶部尚書張賣心同知樞密院事兼提舉措置戶部財用癸未呂好問罷甲申併尚書戶部右曹所掌歸左曹命尚書總領乙酉以宗澤為東京留守杜充為北京留守罷監司州郡職田丙戌詔陝西河北京東西路募兵合十萬人更番入衛行在命京東西路造戰車丁亥以張所為河北西路招撫使括買官民馬勸出財助國戊子以錢蓋為陝西經制使封趙懷恩為安化郡王因召五路兵赴行在秋七月己丑朔以樞密副都承旨王為河東經制使庚寅詔王淵劉光世統制官張俊喬仲福韓世忠分討陳州軍賊杜用京東賊李昱及黎驛魚臺潰兵皆平之辛卯籍東南諸州神霄宮及贍學錢助國用叔右監門衛大將軍貴州團練使士珸以磁洺義兵復洺州乙未以溫州觀察使范瓊為定武軍承宣使御營司同都統制丙申賜諸路強壯巡社名為忠義巡社專隸安撫司戊戌欽宗至燕山府以欣州觀察使張換為河北制置使東都宣武卒杜林謀據成都叛伏誅己亥詔臺省寺監繁簡相兼學官館職減舊制之半辛丑復議吳幵莫儔等十一人罪並廣南江湖諸州安置餘遞貶有差壬寅詔奉元祐太后如東南六宮及衛士家屬從行朕當獨留中原與金人決戰以延康殿學士許翰為尚書右丞甲辰以右諫議大夫宋齊愈當金人謀立異姓書張邦昌姓名斬于都巿乙巳手詔京師未可往當巡幸東南丙午詔定議巡幸南陽以觀文殿學士范致虛知鄧州修城池繕宮室輸錢穀以實之丁未遣官詣京師迎奉太廟神主赴行在己酉罷四道都總管以尚書虞部員外郎張浚為殿中侍御史庚戌徵諸道兵期八月會行在丙辰徽宗自燕山密遣閣門宣贊舍人曹勛至賜帝絹半臂書其領曰便可即真來援父母帝泣以示輔臣張所傅亮軍發行在是月關中賊史斌犯興州僭號稱帝八月戊午朔洪芻等坐圍城日括金銀自盜及私納宮人芻及余大均陳沖貸死流沙門島餘五人罪有差勝捷軍校陳通作亂于杭州執帥臣葉夢得殺漕臣吳昉己未元祐太后發京師庚申以劉光世為奉國軍節度使韓世忠張俊皆進一官辛酉右司諫潘良貴罷壬戌以李綱為尚書左僕射兼門下侍郎黃潛善為右僕射兼中書侍郎張賣心兼御營副使癸亥命御營使副大閲五軍庚午更號元祐太后為隆祐太后辛未罷傅亮經制副使召赴行在壬申召布衣譙定赴行在命御營統制辛道宗討陳通是夕東北方有赤氣癸酉以耿南仲主和誤國南雄州安置乙亥用張浚言罷李綱左僕射丙子隆祐太后發南京命侍衛馬軍都指揮使郭仲荀護衛如江寧兼節制江淮荊浙閩廣諸州制置東南盜賊丁丑以龍圖閣直學士錢伯言知杭州節制兩浙淮東將兵及福建槍杖手討陳通庚辰降榜招諭杭州亂兵壬午用黃潛善議殺上書太學生陳東崇仁布衣歐陽徹乙酉遣兵部員外郎江端友等撫諭閩浙湖廣江淮京東西諸路及體訪官吏貪廉軍民利病許翰罷丁亥博州卒宮儀作亂犯萊州九月己丑建州軍校張員等作亂執守臣張動轉運副使毛奎判官曹仔為所殺嬰城自守范瓊捕斬李孝忠于復州壬辰以金人犯河陽汜水詔擇日巡幸淮甸鑄建炎通寶錢命淮浙沿海諸州增修城壁招訓民兵以備海道甲午命揚州守臣呂頤浩繕修城池宗澤往河北視師七日還是夜辛道宗兵潰于嘉興縣丁酉詔荊襄關陝江淮皆備巡幸戊戌罷買馬己亥以子敷為檢校少保集慶軍節度使封魏國公詔內外官司參用嘉祐元豐敕以俟新書庚子二帝徙居霫郡辛丑陳通劫提點刑獄周格營殺格執提點刑獄高士曈壬寅遣徽猷閣待制孟忠厚迎奉太廟神主赴揚州以直祕閣王圭為招撫判官代張所尋責所廣南安置乙巳宗澤表請車駕還闕戊申河北招撫司都統制王彥渡河擊金人破之復新鄉縣己酉以諜報金人欲犯江浙詔暫駐淮甸捍禦稍定即還京闕募民入資授官軍賊趙萬入常州執守臣何衮罷諸路經制招撫使庚戌始通當三大錢于淮浙荊湖諸路壬子命湖南撫諭官馬伸持詔賜張邦昌死于潭州併誅王時雍癸丑詔有敢妄議惑衆沮巡幸者許告而罪之不告者斬乙卯王彥及金人戰敗績奔太行山聚衆其裨將嶽飛引其部曲自為一軍趙萬陷鎮江府守臣趙子嵩棄城渡江保瓜洲是秋金人分兵據兩河州縣惟中山慶源府保莫邢洺冀磁絳相州久之乃陷冬十月丁巳朔帝登舟幸淮甸戊午太后至揚州己未罷諸路勸誘獻納錢物庚申罷諸路召募潰兵忠義等人及寄居官擅集勤王兵者癸亥募羣盜能併滅賊衆者官之甲子以張浚論李綱不已落綱觀文殿大學士止奉宮祠知秀州兼權浙西提點刑獄趙叔近入杭州招撫陳通乙丑罷帥府要郡次要郡新軍及水軍丁卯以王淵為杭州制置盜賊使統制官張俊從行庚午次泗州幸普照寺甲戌太白晝見己卯次楚州寶應縣後軍將孫琦等作亂逼左正言盧臣中墮水死庚辰命劉光世討鎮江叛兵辛巳以光世為滁和濠州江寧府界招捉盜賊制置使御營統制官苗傅為使司都統制朝請郎李棫提舉廣西左右兩江洞丁公事癸未至揚州禁內侍統兵官相見丙戌王淵張俊誘趙萬等悉誅之十一月戊子李綱鄂州居住真定軍賊張遇入池州守臣滕祐棄城遁己丑詔雜犯死罪有疑及情理可憫者撫諭官同提刑司酌情減降先斷後聞壬辰遣王倫等為金國通問使乙未以張賣心為尚書左丞工部尚書顏岐同知樞密院事丙申曲赦應天府亳宿揚泗楚州高郵軍丙午以張賣心為中書侍郎戊申以顏岐為尚書左丞兼權門下侍郎御史中丞許景衡為右丞刑部尚書郭三益同知樞密院事權密州趙野棄城遁軍校杜彥據州追野殺之辛亥命福建路增招弓手金人陷河間府是月軍賊丁進圍壽春府守臣康允之拒卻之十二月丙辰朔命從臣四員充講讀官就內殿講讀丁巳詔諸路提刑司選官即轉運司所在州類省試進士以待親策辛酉王淵入杭州執陳通等誅之壬戌青州敗將王定以兵作亂殺帥臣曾孝序癸亥粘罕犯汜水關西京留守孫昭遠遣將拒之戰歿昭遠引兵南遁尋命部將王仔奉啓運宮神御赴行在甲子改授后父徽猷閣待制邢煥為光州觀察使乙丑詔凡刑賞大政並經三省其干請墨敕行下者罪之丙寅張遇犯江州戊辰金人圍棣州守臣薑剛之固守金兵解去甲戌金人陷同州守臣鄭驤死之張遇犯黃州己卯金人陷汝州入西京庚辰金人陷華州辛巳破潼關河東經制使王自同州引兵遁入蜀丁進詣宗澤降乙酉增置廣西弓手以備邊以戶部尚書黃潛厚為延康殿學士同提舉措置財用
