body:
  text: 宋史卷二十一本紀第二十一徽宗三二年春正月甲子制上書邪等人並不除監司二月戊子朔蔡京復太師致仕賜第京師庚子以婉容崔氏為賢妃三月戊午朔定國公栱薨己巳御集英殿策進士己卯賜禮部奏名進士及第出身七百十三人夏四月己丑詔縣令以十二事勸農於境內躬行阡陌程督勤惰辛卯復行方田日中有黑子甲午宴蔡京等于太清樓乙巳以定國軍節度使仲忽為開府儀同三司庚戌以何執中為司空壬子賜張商英自便五月癸亥慮囚丁卯封子椿為慶國公己巳蔡京落致仕三日一至都堂議事六月己丑以資政殿學士余深為門下侍郎乙卯白虹貫日秋七月壬申訪天下遺書丙子置禮制局九月壬午改太尉以冠武階癸未正三公三孤官改侍中為左輔中書令為右弼左右僕射為太宰少宰罷尚書令冬十月乙巳得玉圭於民間十一月己未置知客省引進四方館東西上閣門事戊寅日南至受元圭于大慶殿赦天下辛巳蔡京進封魯國公以何執中為少傅太宰兼門下侍郎執政皆進秩十二月甲申行給地牧馬法乙酉以鄭居中為特進丙戌以武信軍節度使童貫為太尉乙巳定命婦名為九等丙午燕輔臣于延福宮辛亥封子楃為衛國公是歲成都府蘇州火出宮女三百八十三人高麗入貢成都路夷人董舜咨董彥博內附置祺亨二州三年春正月己未以定王桓嘉王楷並為太保庚申以廣平郡王構為檢校太保甲子詔以天錫元圭遣官册告永裕永泰陵丙寅以燕王俁為太傅癸酉追封王安石為舒王子雱為臨川伯配饗文宣王廟丁丑吳居厚罷以觀文殿學士鄭居中知樞密院事己卯以越王偲為太傅封子楗為韓國公二月甲申以德妃王氏為淑妃庚寅罷文臣勳官辛卯崇恩太后暴崩甲午以遼女真相持詔河北治邊防丁酉詔百官奉祠祿者並以三年為任乙巳增定六朝勳臣一百一十六人三月壬子朔日有食之戊辰進神宗淑妃宋氏為貴妃升永安縣為永安軍癸酉賜上舍生十九人及第夏四月戊子作保和殿庚寅以復溱播等州降德音于梓夔路癸巳鄧洵仁罷乙巳以福寧殿東建玉清和陽宮丙午升定州為中山府己酉以資政殿學士薛昂為尚書右丞庚戌班五禮新儀閏月丙辰改公主為帝姬戊午復置醫學辛酉上崇恩太后諡曰昭懷庚午慶國公椿薨五月乙酉慮囚丙申升蘇州為平江府庚子大盈倉火壬寅以築溱播進執政官一等丙午葬昭懷皇后于永泰陵丁未尚書內省分六司以掌外省六曹所上之事置內宰副宰內史治中等官及都事以下吏員己酉班新燕樂六月癸亥祔昭懷皇后神主于太廟戊辰降兩京河陽鄭州囚罪一等民緣園陵役者蠲其賦秋七月癸未升趙城縣為慶祚軍甲申還王圭孫固贈諡追復韓忠彥曾布安燾李清臣黃履等官職庚子貴妃劉氏薨壬寅復置白州八月甲戌以燕樂成進執政官一等丙子以何執中為少師丁丑升潤州為鎮江府戊寅封四鎮山為王九月庚寅詔大理寺開封府不得奏獄空其推恩支賜並罷戊戌追册貴妃劉氏為皇后諡曰明達冬十月乙丑閲新樂器于崇政殿出古器以示百官戊辰詔冬祀大禮及朝景靈宮並以道士百人執威儀前導冬十一月辛巳朝獻景靈宮壬午饗太廟加上神宗諡曰體元顯道法古立憲帝德王功英文烈武欽仁聖孝皇帝改上哲宗諡曰憲元繼道世德揚功欽文睿武齊聖昭孝皇帝癸未祀昊天上帝于圜丘大赦天下升端州為興慶府乙酉以天神降詔告在位作天真降臨示現記己丑以賢妃崔氏為德妃壬辰築祥州己亥詔有官人許舉八行十二月癸丑詔天下訪求道教仙經乙卯詔天下貢醫士辛酉太白晝見是歲江東旱溫封滋三州火出宮女二百七十有九人四年春正月戊寅朔置道階凡二十六等辛丑追封濮王子宗誼為祁王宗詠為萊王宗師為溫王宗輔為楚王宗博為蕭王宗沔為霍王宗藎為建王宗勝為袁王二月丁巳賜上舍生十七人及第癸亥改淯井監為長寧軍癸酉長子桓冠三月丙子朔以淑妃王氏為貴妃夏四月庚戌幸尚書省以手詔訓誡蔡京何執中各官遷秩吏賜帛有差癸丑閲太學辟雍諸生雅樂甲子改戎州為州五月丙戌始祭地于方澤以太祖配降德音于天下子機薨六月戊午慮囚壬申以廣西溪洞地置隆兌二州秋七月丁丑置保壽粹和館以養宮人有疾者戊寅焚苑東門所儲毒藥可以殺人者仍禁勿得復貢甲午祔明達皇后神主于別廟八月乙巳改端明殿學士為延康殿學士樞密直學士為述古殿直學士癸亥定武臣橫班以五十員為額九月己卯以安靜軍節度使王憲為開府儀同三司己亥詔諸路兵應役京師者並以十月朔遣歸冬十月乙巳復置拱州十一月丁丑封子梴為相國公十二月己酉以禁中神御殿成減天下囚罪一等癸丑定朝議奉直大夫以八十員為額己未詔廣南市舶司歲貢真珠犀角象齒是歲相州野蠶成繭出宮女六十八人五年春正月庚辰瀘南晏州夷反尋詔梓州路轉運使趙遹等督兵討平之己丑令諸州縣置醫學立貢額甲午改龍州為政州二月乙巳立定王桓為皇太子甲寅册皇太子赦天下庚午以童貫領六路邊事三月辛未朔太白晝見己卯御集英殿策進士甲申追論至和嘉祐定策功封韓琦為魏郡王復文彥博官丁亥詔以立皇太子見責降文武臣僚並與牽復甄凡千五百人壬辰升舒州為德慶軍癸巳賜禮部奏名進士出身六百七十人夏四月甲辰作葆真宮丁未詣景靈宮還幸祕書省進館職官一等庚戌改集賢殿為右文殿癸亥置宣和殿學士詔東宮講讀官罷讀史五月壬辰慮囚六月癸丑以修三山河橋降德音于河北京東京西路秋七月戊辰朔日有食之乙亥升汝州為陸海軍丁丑詔建明堂于寢殿之南甲申昭慶軍節度使蔡卞為開府儀同三司丁亥封子樾為瀛國公八月己酉以祕書省地為明堂辛亥升通利軍為濬州平川軍節度嗣濮王仲增薨九月己卯封仲御為嗣濮王丙戌封子楧為惠國公冬十月癸卯以嵩山道人王仔昔為沖隱處士戊午夏國入貢十一月癸酉録昭憲皇后杜氏之裔庚寅高麗遣子弟入學十二月己亥升遂州為遂寧府庚申以平晏夷曲赦四川癸亥置緣邊安撫司于瀘州是歲平江府常湖秀州水出宮女五十人六年春正月戊子以瀘南獻捷轉宰執一官以童貫宣撫陝西河北閏月壬寅升潁州為順昌府丁未置道學二月丁亥詔增廣天下學舍庚寅詔廣京城三月癸丑賜上舍生十一人及第夏四月乙丑會道士于上清寶籙宮辛未以何執中為太傅致仕朝朔望丁丑詔天寧諸節及壬戌日杖已下罪聽贖丙戌卻監司守臣進獻庚寅詔蔡京三日一朝正公相位總治三省事五月丁酉廢錫錢庚子以鄭居中為少保太宰兼門下侍郎劉正夫為特進少宰兼中書侍郎壬寅以保大軍節度使鄧洵武知樞密院事六月丙寅班中書官制格庚午慮囚甲戌詔堂吏遷官至奉直大夫止癸未皇太子納妃朱氏秋七月壬辰朔以震武城為震武軍甲午以德妃崔氏為貴妃辛亥以河陽三城節度使王薦為開府儀同三司諸盜晏州卜漏沅州黃安俊定邊軍李吪示里伏誅詔函首于甲庫壬子曲赦湖北己未解池生紅鹽辛酉改走馬承受公事為廉訪使者八月壬戌朔戒北邊帥臣毋生事壬午詔天下監司郡守搜訪巖谷之士雖恢詭譎怪自晦者悉以名聞丁亥幸蔡京第己丑升晉州為平陽壽州為壽春齊州為濟南府九月辛卯朔詣玉清和陽宮上太上開天執符御曆含真體道昊天玉皇上帝徽號寶册丙申赦天下令洞天福地修建宮觀塑造聖像以西內成曲赦京西己未以童貫為開府儀同三司冬十月乙丑太白晝見十一月丁酉朝獻景靈宮戊戌饗太廟己亥祀昊天上帝于圜丘赦天下庚子以禮部尚書白時中為尚書右丞辛丑魏國公材薨戊申以侯蒙為中書侍郎薛昂為尚書左丞己未徙封衛國公楃為鄆國公增橫班為十三階十二月己巳以婉儀劉氏為賢妃戊寅以熙河進築功成進執政一官乙酉奠九鼎于圜像徽調閣劉正夫為開府儀同三司致仕戊子以宗粹為開府儀同三司是歲冀州三山黃河清出宮女六百人高麗占城大食真臘大理夏國入貢茂州夷郅永壽內附七年春正月丁酉于闐入貢庚子以殿前都指揮使高俅為太尉二月癸亥以大理國主段和譽為雲南節度使大理國王甲子會道士二千餘人于上清寶籙宮詔通真先生林靈素諭以帝君降臨事丁卯御集英殿策高麗進士辛未改天下天寧萬壽觀為神霄玉清萬壽宮乙亥幸上清寶籙宮命林靈素講道經三月庚寅賜高麗祭器高麗進士權適等四人賜上舍及第乙未以童貫權領樞密院丙申升鼎州為常德軍夏四月庚申帝諷道籙院上章册己為教主道君皇帝止於教門章疏內用辛酉升溫州為應道軍五月戊子朔升慶州為慶陽軍渭州為平涼軍己丑如玉清和陽宮上承天效法厚德光大后土皇地祇徽號寶册辛卯命蔡攸提舉祕書省並左右街道籙院乙未詔權罷宮室修造辛丑祭地于方澤降德音于諸路以監司州縣共為姦贓令廉訪使者察奏仍許民徑赴尚書省陳訴癸卯改玉清和陽宮為玉清神霄宮六月戊午朔以明堂成進封蔡京為陳魯國公戊辰以嘉王楷為太傅改節度觀察留後為承宣使己巳蔡京辭兩國不拜詔官其親屬二人壬午詔禁巫覡丙戌貴妃宋氏薨秋七月壬辰熙河環慶涇原地震庚子詔八寶增定命寶八月癸亥詔明堂並祠五帝鄭居中以母憂去位九月戊子詔湖北民力未紓胡耳西道可罷進築辛卯大饗明堂赦天下乙未劉正夫卒丁酉西蕃王子益麻黨征降見于紫宸殿壬寅進宰執官一等甲辰以薛昂為特進癸丑貴妃王氏薨冬十月乙卯朔初御明堂班朔布政戊寅侯蒙罷十一月庚寅命蔡京五日一赴都堂治事辛卯鄭居中起復以余深為特進少宰兼中書侍郎白時中為中書侍郎壬辰復置醴州丙申何執中卒升石泉縣為軍十二月戊申朔有星如月丁巳以薛昂為門下侍郎戊辰詔天神降于坤寧殿刻石以紀之庚午以童貫領樞密院命戶部侍郎孟揆作萬歲山是歲三山河水清出宮女六十八人重和元年春正月甲申朔受定命寶于大慶殿戊子封孫諶為崇國公己丑赦天下應元符末上書邪中等人依無過人例乙巳封姪有奕為和義郡王庚戌以翰林學士承旨王黼為尚書左丞二月戊辰增諸路酒價庚午遣武義大夫馬政由海道使女真約夾攻遼甲戌升六安縣為六安軍丁丑詔監司輒以禁錢買物為苞苴饋獻論以大不恭三月丙戌詔監司郡守自今須滿三歲乃得代仍毋得通理癸巳令嘉王楷赴廷對丙申以茂州蕃族平曲赦四川丁酉知建昌陳並等改建神霄宮不虔及科決道士詔並勒停戊戌御集英殿策進士戊申賜禮部奏名進士及第出身七百八十三人有司以嘉王楷第一帝不欲楷先多士遂以王昂為榜首夏四月癸丑朔築靖夏城制戎城録呂餘慶後癸亥減捶刑己卯詔每歲以季秋親祠明堂如孟月朝獻禮以太上混元上德皇帝二月十五日生辰為貞元節五月壬午朔日有食之乙酉詔諸路選漕臣一員提舉本路神霄宮丁亥以林靈素為通真達靈元妙先生張虛白為通元沖妙先生壬辰班御製聖濟經以青華帝君八月九日生辰為元成節庚戌手敕兩浙漕司以權添酒錢盡給御前工作六月乙卯以賢妃劉氏為淑妃己巳以淮西盜平曲赦庚午慮囚甲戌以西邊獻捷曲赦陝西河東路秋七月壬午以西師有功加蔡京恩官其一子鄭居中為少傅余深為少保鄧洵武為特進進執政官一等己酉遣廉訪使者六人振濟東南諸路水災八月甲寅以童貫為太保辛酉詔班御注道德經壬申詔執政非入謝及丐去毋得獨留奏事癸酉封子椅為嘉國公乙亥升兗州為襲慶府九月辛巳大饗明堂壬午詔罷拘白地禁榷貨增方田稅添酒價取醋息河北加折耗米東南水災強糴等事丙戌詔太學辟雍各置內經道德經莊子列子博士二員己丑以歲當戌月當壬為元命降德音于天下庚寅薛昂罷以白時中為門下侍郎王黼為中書侍郎翰林學士承旨馮熙載為尚書左丞刑部尚書范致虛為尚書右丞壬辰禁州郡遏糴及邊將殺降以幸功賞者癸巳禁羣臣朋黨丁酉用蔡京言集古今道教事為紀志賜名道史辛丑鄭居中罷乞持餘服詔從之詔察縣令治行諸路監司能改正州縣事者較為殿最詔視中大夫林靈素視中奉大夫張虛白並特授本品真官閏月庚申詔江淮荊浙閩廣監司督責州縣還集流民丁卯進封楷為鄆王丙子詔周柴氏後已封崇義公復立恭帝後以為宣義郎監周陵廟世世為國三恪冬十月己卯朔太白晝見己亥改興慶軍為肇慶府甲辰置道官二十六等道職八等十一月己酉朔改元大赦天下辛亥日中有黑子丙辰以婉容王氏為賢妃辛酉補上書人安堯臣官己巳升梓州為潼川府十二月戊寅朔復京西錢監己丑置裕民局是歲江淮荊浙梓州水出宮女百七十八人黃巖民妻一産四男子于闐高麗入貢
