body:
  text: 宋史卷三十七本紀第三十七寧宗一寧宗法天備道純德茂功仁文哲武聖睿恭孝皇帝諱擴光宗第二子也母曰慈懿皇后李氏光宗為恭王慈懿夢日墜于庭以手承之已而有娠乾道四年十月丙午生于王邸五年五月賜今名十一月乙丑授右千牛衛大將軍七年光宗為皇太子淳熙五年十月戊午遷明州觀察使封英國公七年二月初就傅九年正月始冠十年九月己巳始預朝參十一年當出閣兩宮愛之不欲令居外乃建第東宮之側以十月甲戌遷焉十二年三月乙酉遷安慶軍節度使封平陽郡王八月辛酉納夫人韓氏十六年二月壬戌光宗受禪三月己亥拜少保武寧軍節度使進封嘉王帝自弱齡尊師重傅至是始置翊善以沈清臣為之紹熙元年春宰相留正請立帝為儲嗣五年六月戊戌孝宗崩光宗以疾不能出壬寅宰臣請太皇太后垂簾聽政不許請代行祭奠之禮從之丁未宰臣奏云皇子嘉王仁孝夙成宜正儲位以安人心越六日奏三上從之明日遂擬旨以進是夕御批付丞相云歷事歲久念欲退間七月辛酉留正以疾辭去知樞密院事趙汝愚見正去乃遣韓托胄因內侍張宗尹以禪位嘉王之意請于太皇太后不獲遇提舉重華宮關禮托胄因其問告之禮繼入內泣請于太皇太后太皇太后乃悟令諭托胄曰好為之托胄出告汝愚命殿帥郭杲夜分兵衛南北內翌日禫祭汝愚率百官詣大行柩前太皇太后垂簾汝愚率同列再拜奏皇帝疾不能執喪臣等乞立皇子嘉王為太子以安人心乃奉御批八字以奏太皇太后曰既有御筆卿當奉行汝愚曰內禪事重須議一指揮太皇太后允諾汝愚袖出所擬以進云皇帝以疾未能執喪曾有御筆欲自退間皇子嘉王擴可即皇帝位尊皇帝為太上皇皇后為太上皇后太皇太后覽畢曰甚善汝愚出以旨諭帝帝固辭曰恐負不孝名汝愚曰天子當以安社稷定國家為孝今中外憂亂萬一變生置太上皇何地衆扶入素幄披黃袍方却立未坐汝愚率同列再拜帝詣几筵殿哭盡哀須臾立仗訖催百官班帝衰服出就重華殿東廡素幄立內侍扶掖乃坐百官起居訖乃入行禫祭禮詔建泰安宮以奉太上皇太上皇后汝愚即喪次請召還留正乙丑太皇太后命立崇國夫人韓氏為皇后丙寅大赦百官進秩一級賞諸軍詔車駕五日一朝泰安宮百官月兩朝以即位告于天地宗廟社稷丁卯侍御史張叔椿劾留正擅去相位詔以叔椿為吏部侍郎戊辰詔求直言遣鄭湜使金告禪位己巳以趙汝愚兼參知政事庚午召祕閣修撰知潭州朱熹詣行在壬申建泰安宮乙亥以趙汝愚為右丞相參知政事陳騤知樞密院事余端禮參知政事仍兼同知樞密院事汝愚辭不拜賜前宰執侍從詔訪以得失丙子大風戊寅詔秋暑太上皇帝未須移御即以寢殿為泰安宮以殿前都指揮使郭杲為武康軍節度使庚辰率羣臣拜表于泰安宮辛巳以趙汝愚為樞密使保大軍節度使郭師禹為攢宮總護使壬午侍御史章穎等劾內侍林億年陳源楊舜卿詔億年源與在外宮觀舜卿在京宮觀韓托胄落階官為汝州防禦使癸未余端禮辭兼同知樞密院事甲申以兵部尚書羅點簽書樞密院事詔兩省官詳定應詔封事具要切者以聞戊子詔百官輪對罷楊舜卿在京宮觀林億年常州居住陳源撫州居住八月己丑朔安定郡王子濤薨辛卯初御行宮便殿聽政癸巳以朱熹為煥章閣待制兼侍講甲午增置講讀官以給事中黃裳中書舍人陳傅良彭龜年等為之丁酉以生日為天祐節己亥率羣臣朝泰安宮辛丑詔諸道舉廉吏糾污吏壬寅詔經筵官開陳經旨救正闕失進封弟許國公抦為徐國公癸卯加嗣濮王士歆少師郭師禹少傅夏執中少保乙巳詔晚講官坐講丁未復罷經筵坐講命三省議振恤諸路郡縣水旱乙卯加安南國王李龍思忠功臣詔歲減廣西鹽額十萬緡丙辰留正罷以觀文殿大學士判建康府以趙汝愚為右丞相丁巳詔侍從兩省臺諫各舉通亮公清不植黨與曾任知縣者二人九月己巳命趙汝愚朝獻景靈宮庚子命嗣秀王伯圭朝饗太廟是日羅點薨辛未合祭天地于明堂大赦壬申以刑部尚書京鏜簽書樞密院事甲戌下詔撫諭諸將改天祐節為瑞慶節冬十月己丑右諫議大夫張叔椿再劾留正擅去相位詔落正觀文殿大學士庚寅更泰安宮為壽康宮辛卯命四川制置司銓量諸州守臣癸巳雷乙未詔以陰陽謬盩雷電非時令臺諫侍從各疏朝政闕失以聞戊戌復許武舉人試換文資庚子以久雨命大理三衙臨安府兩浙州縣決繫囚釋杖以下辛丑減兩浙江東西路和市折帛錢蠲兩浙路丁鹽身丁錢一年雅州蠻寇邊土丁拒退之尋出降甲辰以朱熹言趣後省看詳應詔封事乙巳上大行至尊壽皇聖帝諡曰哲文神武成孝皇帝廟號孝宗丙午復以朱熹奏請卻瑞慶節賀表庚戌改上安穆皇后諡曰成穆皇后安恭皇后諡曰成恭皇后壬子遣曾三復使金賀正旦丙辰上孝宗皇帝冊寶于重華殿成穆皇后成恭皇后冊寶于本室是月建福寧殿閏月庚申以吏部尚書鄭僑等奏請祧僖宣二祖正太祖東嚮之位尋立僖祖別廟以藏順翼宣三祖之主乙丑遣林季友使金報謝戊辰金遣使來弔祭戊寅侍講朱熹以上疏忤韓托胄罷趙汝愚力諫不聽臺諫給舍交章請留朱熹亦不聽詔兩省臺諫侍從各舉宗室有文學器識者二人壬午詔改明年為慶元元年十一月甲午復加安南國王李龍濟美功臣丙午帝自重華宮還大內庚戌以宜州觀察使韓托胄兼樞密都承旨辛亥雨木冰詔行孝宗三年喪制命禮官條具典禮以聞升明州為慶元府乙卯權欑孝宗皇帝于永阜陵十二月丁巳朔禁民間妄言宮禁事乙丑吏部侍郎彭龜年上疏言韓托胄假託聲勢竊弄威福乞黜之以解天下之疑詔罷龜年進托胄一官與在京宮觀趙汝愚請留龜年不聽御史中丞謝深甫劾陳傅良罷之戊辰以陳康伯配饗孝宗廟庭己巳陳騤罷庚午以余端禮知樞密院事京鏜參知政事鄭僑同知樞密院事辛未監察御史劉德秀劾起居舍人劉光祖罷之癸酉金遣使來賀登位上孝宗廟樂曰大倫之舞甲戌祔孝宗神主于太廟丁丑減臨安紹興二府死罪以下囚釋杖以下蠲民緣欑宮役者賦戊寅加郭師禹少師進封永寧郡王癸未金遣使來賀明年正旦是歲兩浙淮南江東西路水旱振之仍蠲其賦慶元元年春正月丁巳朔蠲兩淮租稅壬寅黎州蠻寇邊官軍戰卻之乙巳蠲台嚴湖三州貧民身丁折帛錢一年詔兩浙淮南江東路荒歉諸州收養遺棄小兒辛亥以久雨振給臨安貧民丙辰白虹貫日二月丁巳朔詔兩淮諸州勸民墾闢荒田壬戌詔嗣秀王伯圭贊拜不名癸亥以久雨釋大理三衙臨安府兩浙路杖以下囚丁卯詔帥臣監司歲終考察郡守臧否以聞戊寅以右正言李沐言罷趙汝愚為觀文殿大學士知福州己卯雨土以余端禮兼參知政事庚辰兵部侍郎章穎以黨趙汝愚罷甲申謝深甫等再劾汝愚詔與宮觀三月丙戌朔日有食之庚寅太白經天辛亥詔四川歲發西兵詣行在如舊制癸丑命侍從臺諫兩省集議江南沿江諸州行鐵錢利害甲寅國子祭酒李祥博士楊簡以黨趙汝愚罷夏四月丁巳太府寺丞呂祖儉坐上疏留趙汝愚及論不當黜朱熹彭龜年等忤韓托胄送韶州安置己未以余端禮為右丞相京鏜知樞密院事鄭僑參知政事謝深甫簽書樞密院事庚申太學生楊宏中等六人以上書留趙汝愚章穎李祥楊簡請黜李沐詔宏中等各送五百里外編管中書舍人鄧馹上疏救之不聽戊辰臨安大疫出內帑錢為貧民醫藥棺斂費及賜諸軍疫死者家五月戊子呂祖儉改送吉州安置戊戌詔戒百官朋比丙午詔諸路提舉司置廣惠倉修胎養令辛亥減大理三衙臨安府雜犯死罪以下囚釋杖以下六月丁巳復留正觀文殿大學士充醴泉觀使右正言劉德秀請考核真僞以辨邪正己未遣汪義端賀金主生辰庚午詔三衙江上諸軍主帥將佐初除舉自代一人歲薦所知二人癸酉以韓托胄為保寧軍節度使提舉萬壽觀秋七月壬辰加周必大少傅丁酉落趙汝愚觀文殿大學士罷宮觀己亥太白晝見八月己巳詔內外諸軍主帥條奏武備邊防之策以聞九月壬午朔蠲臨安府水災貧民賦乙酉以久雨決繫囚丙戌熒惑入太微甲辰遣黃艾使金賀正旦己酉蠲台嚴湖三州被災民丁絹冬十月己卯詔三省樞密院條上合教諸軍例乙丑升秀州為嘉興府舒州為安慶府嘉州為嘉定府英州為英德府戊辰金遣吳鼎樞來賀瑞慶節壬申封子恭為安定郡王十一月己丑雨土庚寅以弟徐國公抦為昭慶軍節度使戊戌加上壽聖隆慈備福太皇太后尊號曰壽聖隆慈備福光佑太皇太后壽成皇太后曰壽成惠慈皇太后太上皇曰聖安壽仁太上皇太上皇后曰壽仁太上皇后丙午以監察御史胡紘言責授趙汝愚寧遠軍節度副使永州安置丁未命宰執大閲十二月癸亥置楚州弩手效用軍丙子命朱熹為煥章閣待制辭丁丑金遣紇石烈正來賀明年正旦二年春正月庚寅以余端禮為左丞相京鏜為右丞相鄭僑知樞密院事謝深甫參知政事御史中丞何淡同知樞密院事庚子趙汝愚卒于永州甲辰右諫議大夫劉德秀劾留正引用僞學之黨詔落正觀文殿大學士罷宮觀二月辛酉詔追復趙汝愚官許歸葬以中書舍人吳宗旦言罷之辛未再蠲臨安府民身丁錢三年三月丙申命諸軍射鐵簾己亥進封弟抦為吳興郡王丙午有司上慶元會計録夏四月甲子余端禮罷壬申以何淡參知政事吏部尚書葉翥簽書樞密院事乙亥增置監察御史一員五月辛巳以旱禱于天地宗廟社稷詔大理三衙臨安府兩浙州縣決繫囚乙酉申嚴獄囚瘐死之罰辛卯賜禮部進士鄒應龍以下四百九十有九人及第出身甲午減諸路和市折帛錢三年建華文閣以藏孝宗御集甲辰更慈福宮為壽慈宮六月庚戌遣吳宗旦賀金主生辰乙丑命監司帥守臧否縣令分三等丙子子埈生秋七月癸未饗于太廟丙戌減諸路死罪囚釋流以下戊子量徙流人呂祖儉等于內郡詔檢正都司考核諸路守臣便民五事以聞戊戌以韓托胄為開府儀同三司萬壽觀使八月癸丑奉安孝宗皇帝成穆皇后成恭皇后神御于景靈宮丙辰以太常少卿胡紘請權住進擬僞學之黨壬戌子埈薨追封兗王諡沖惠九月丁亥復分利州為東西路癸巳嗣濮王士歆薨追封韶王甲午流星晝隕丁酉遣張貴謨使金賀正旦冬十月戊申率羣臣奉上壽聖隆慈備福光佑太皇太后壽成惠慈皇太后聖安壽仁太上皇壽仁太上皇后冊寶于慈福壽康宮辛亥冊皇后壬戌金遣張嗣來賀瑞慶節甲戌大閲十一月庚寅詣壽康宮上太上皇帝寬恤詔令壬辰京鏜等上孝宗皇帝寬恤詔令癸卯賞宜州捕降峒寇功十二月辛未金遣完顏崇道來賀明年正旦是月監察御史沈繼祖劾朱熹詔落熹祕閣修撰罷宮觀竄處士蔡元定于道州三年春正月壬寅鄭僑罷癸卯以謝深甫兼知樞密院事二月己酉京鏜等上神宗玉牒高宗實録丁巳以大理司直邵褎然請大臣自今權臣僞學之黨勿除在內差遣詔下其章三月乙未建東華門庚子禁浙西州軍圍田壬寅詔自今有司奏讞死罪不當者論如律夏四月丙午雨土命不為嗣濮王壬子以旱禱于天地宗廟社稷乙丑雨雹六月戊辰頒淳熙寬恤詔令閏月甲戌內出銅器付尚書省毀之命申嚴私鑄銅器之禁乙亥遣衛涇賀金主生辰甲午詔留正分司西京邵州居住是夏廣東提舉茶鹽徐安國遣人捕私鹽于大奚山島民遂作亂秋七月庚午監察御史沈繼祖録淹囚四百餘條來上詔進二官八月戊子復置嚴州神泉監辛卯知廣州錢之望遣兵入大奚山盡殺島民甲午均諸路職田九月壬寅以四川旱詔蠲民賦辛酉遣曾炎使金賀正旦乙丑申嚴帥臣監司臧否郡守之制是月詔監司帥守薦舉改官勿用僞學之人冬十月癸酉雷丙戌金遣完顏愈來賀瑞慶節丙申以太皇太后違豫赦十一月辛丑加孝宗皇帝諡曰紹統同道冠德昭功哲文神武明聖成孝皇帝太皇太后吳氏崩壬寅朝獻于景靈宮癸卯朝饗于太廟甲辰祀天地于圜丘大赦乙巳詔為大行太皇太后服期丁未遣趙介使金告哀十二月丙子始御正殿丁丑以大行太皇太后欑宮蠲紹興府貧民明年身丁折帛綿絹庚辰罷文武官納官告綾紙錢甲申雷雨土乙未金遣奧屯忠孝來賀明年正旦丁酉以知綿州王沇請詔省部籍僞學姓名四年春正月己卯上欽宗皇后諡曰仁懷皇后丙寅以葉翥同知樞密院事丁卯詔有司寬恤兩浙江淮荊湖四川流民二月辛未詔兩省侍從臺諫各舉所知一二人毋薦宰執親黨丙子上大行太皇太后諡曰憲聖慈烈皇后三月甲子權欑憲聖慈烈皇后于永思陵乙丑金遣烏林答天益來弔祭夏四月丙戌祔仁懷皇后憲聖慈烈皇后神主于太廟己丑蠲臨安紹興二府租稅有差丙申始御正殿是月右諫議大夫張釜請下詔禁僞學遣湯碩使金報謝五月己亥加韓托胄少傅賜玉帶己酉詔禁僞學六月己巳遣楊王休賀金主生辰癸酉以弟吳興郡王抦為開府儀同三司秋七月辛酉葉翥罷八月丁卯朔以久雨決繫囚丙子以謝深甫知樞密院事兼參知政事吏部尚書許及之同知樞密院事庚辰白氣亙天丙戌詔以太上皇聖躬清復率羣臣上壽尋不克行九月壬寅太白晝見癸卯太白經天丁未頒慶元重修敕令格式庚申遣馬覺使金賀正旦是月詔造新曆冬十月戊子金遣孫鐸來賀瑞慶節十二月丙戌再蠲臨安府民身丁錢三年己丑金遣楊庭筠來賀明年正旦五年春正月庚子樞密院直省官蔡璉訴趙汝愚定策時有異謀詔下大理捕鞫彭龜年曾三聘等以實其事中書舍人范仲藝力爭之于韓托胄事遂寢張釜等復請窮治詔停龜年三聘官壬戌建玉堂二月癸酉白氣亙天乙酉張釜劾劉光祖附和僞學詔房州居住三月甲午罷監司臧否郡守之制夏五月壬辰朔新曆成賜名曰統天戊戌賜禮部進士曾從龍以下四百十有二人及第出身戊申以久雨民多疫命臨安府振恤之壬子詔諸路州學置武士齊選官按其武藝六月癸亥遣李大性賀金主生辰秋七月甲寅禁高麗日本商人博易銅錢八月乙亥白氣亙天辛巳太祖廟楹生芝率羣臣詣壽康宮上壽始見太上皇成禮而還甲申以過宮上壽禮成中外奉表稱賀丙戌詔減諸路流囚釋杖以下推恩如慶壽故事丁亥進京鏜等官一級戊子立沿邊諸州武舉取士法九月庚寅朔加韓托胄少師封平原郡王丙辰遣朱致知使金賀正旦冬十月庚申朔封郭師禹為廣陵郡王丙子金遣僕散琦來賀瑞慶節十一月己丑朔詔復右司一員十二月辛酉嗣濮王不薨庚午命廣東水土惡弱諸州建安仁宅惠濟倉庫給士大夫死不能歸者乙亥奉安仁懷皇后憲聖慈烈皇后神御于景靈宮甲申金遣范楫來賀明年正旦是歲饒信江撫嚴衢台七州建昌興國軍廣東諸州皆水振之六年春正月己亥子坦生二月戊辰減諸路雜犯死罪囚釋徒以下己巳雨土己卯率羣臣奉上聖安壽仁太上皇玉牒聖政日曆會要于壽康宮甲申封婕妤楊氏為貴妃閏月庚寅以京鏜為左丞相謝深甫為右丞相何淡知樞密院事兼參知政事乙巳復留正少保觀文殿大學士致仕丁未雨土辛亥以殿前副都指揮使吳曦為昭信軍節度使三月甲子朱熹卒辛未從壽成惠慈皇太后幸聚景園己卯安定郡王子恭薨夏四月己酉命不璺為嗣濮王五月丙辰以旱決中外繫囚除茶鹽賞錢有司上慶元寬恤詔令役法撮要癸亥避正殿減膳丙寅詔大理三衙臨安府及諸路闕雨州縣釋杖以下囚戊辰詔侍從臺諫兩省卿監郎官館職疏陳闕失及當今急務辛未以久不雨詔中外陳朝廷過失及時政利害壬申雨丁丑詔三省樞密院擇臣僚封事可行者以聞六月乙酉朔日有食之丁亥以太上皇后違豫赦戊子太上皇后李氏崩壬辰遣趙善義賀金主生辰吳旴使金告哀戊申許及之以母憂去位秋七月己未初御後殿丁卯以御史中丞陳自強簽書樞密院事八月庚寅以太上皇違豫赦辛卯太上皇崩甲午遣李寅仲使金告哀乙未日中有黑子丙申上大行太上皇后諡曰慈懿皇后丁酉京鏜薨壬寅子坦薨追封邠王諡沖溫癸卯權攢慈懿皇后于臨安府南山之修吉寺九月乙卯祔慈懿皇后神主于太廟甲子婺州布衣呂祖泰上書請誅韓托胄蘇師旦逐陳自強等以周必大代之詔杖祖泰配欽州牢城己巳命謝深甫朝獻景靈宮庚午命嗣濮王不璺朝饗太廟辛未合祭天地于明堂大赦丙子遣丁常任為金國遺留國信使冬十月丙戌加韓托胄太傅戊子遣林桷使金賀正旦庚子復加安南國王李龍保節功臣辛丑雨土十一月癸丑朔詔宗子與願更名曮為福州觀察使己未皇后韓氏崩癸亥子增生丙寅東北地震上大行太上皇諡曰憲仁聖哲慈孝皇帝廟號光宗乙亥上大行皇后諡曰恭淑皇后十二月癸未朔子增薨追封郢王諡沖英乙酉日中有黑子辛卯雨土權攢憲仁聖哲慈孝皇帝于永崇陵己亥金遣烏古論誼來弔祭壬寅權攢恭淑皇后于臨安府南山之廣教寺癸卯祔光宗皇帝神主于太廟遣虞儔使金報謝詔改明年為嘉泰元年乙巳日中黑子滅蠲臨安紹興二府民緣攢宮役者賦戊申金遣紇石烈忠定來賀明年正旦己酉加吳曦太尉庚戌祔恭淑皇后神主于太廟詔罷四川總領所所增關外四州營田租是歲建寧府徽嚴衢婺饒信南劍七州水建康府常潤楊楚通泰和七州江陰軍旱振之
