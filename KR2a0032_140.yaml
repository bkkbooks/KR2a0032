清夜寒月掩褕褘翠幰雕輪空反靈螭憩長岐嵩峯遠伊川渺瀰此時還帝里旌幡上下葆羽葳蕤天街迥垂楊依依過端闈閶闔正闢金扉觚稜射暖暉虞神寶篆散輕絲空涕洟望陵宮女嗟物是人非萬古千秋煙慘風悲虞主祔廟儀仗內導引一首輕輿小輦曾宴玉欄秋慶賞殿宸遊傷心處獸香散盡一夜入丹丘翠簾人靜月光浮但半捲銀鈎誰知道桂華今夜卻照鵲臺幽五年景靈宮神御殿成奉迎導引一首新宮翼翼巨麗冠神京金虬蟠繡楹都人瞻望洪紛處陸海湧蓬瀛仙輿縹眇下圓清彩仗擁天行熉黃珠幄承靈德錫羡永升平慈孝寺彰德殿遷章獻明肅皇后御容赴景靈宮衍慶殿奉安導引一首九清雲杳飈馭邈難追功化盛當時保扶仁聖成嘉靖彤管載音徽天都左界抗華榱仙仗下逶迤寶楹黼帳承神貺萬壽永無期八年神宗靈駕發引四首導引金殿晚注目望宮車忽聽受遺書白雲縹眇帝鄉去抱弓空慕龍湖瑤津風物勝蓬壺春色至望雕輿花飛人寂寂淒涼一夢清都六州炎圖盛六葉正協重光膺寶瑞更法度智勇軼超成湯昭回雲漢爛文章震揚威武懾多方生民帖泰擁殊祥封人祝頌萬壽與天長豈知丹鼎就龍下五雲旁飄然真馭游衍仙鄉泣彤裳伊洛洋洋嵩峯少室相望藏弓劍游衣冠雋功盛德難忘泉臺寂魚燭熒煌銀海深鳧鴈翺翔想像平居謾焚香望陵人散翠柏忽成行獨餘嵩峯月夜夜照幽堂千秋陳迹淒涼十二時珍符錫佑啓真人儲思在斯民勤勞日升萬物皆入陶鈞收威柄更法令鼎從新東風吹百卉上苑正青春流虹節近衣冠玉帛交奏嚴宸萬壽祝堯仁忽聽宮車晚出但號慕瞻雲路企龍鱗窮天英冠古精神杳然上傃人空望屬車巡虛仗星陳畫翣環擁龍輴泉宮掩帝鄉遠邈難親反雕輪飛羽蓋還渡天津霧迷朱服風搖細扇觸目悲辛列嬪嬙垂紅淚浥行塵相將問何日下青旻永裕陵歌升龍德當位富春秋受天球膺駿命玉帛走諸侯寶閣珠樓臨上苑百卉弄春柔隱約瀛洲旦旦想宸遊那知羽駕忽難留八馬入丹丘哀仗出神州笳聲凝咽旌斾去悠悠碧山頭真人地龜洛奧鳳臺幽繞伊流嵩峯岡勢結蛟虬皇堂一閉威顏杳寒霧帶天愁守陵嬪御想像奉龍輈牙盤赭案肅神休何日覿雲裘紅淚滴衣那堪風點綴柏城秋虞主回京四首導引上林寒早仙仗轉郊圻笳鼓入雲悲逶迤輦路過西池樓閣鎖參差都人瞻望意如疑猶想翠華歸玉京傳信杳無期空掩赭黃衣六州承聖緒垂意在升平驅貔虎策豪英號令肅天兵四方無復羽書征德澤浸羣生睿謀雄雋絀漢高狹陋慕三皇二帝登閎緝樂綴文明將升岱嶽告功成玉牒金繩騰寶飛聲事難評軒鼎就清都一夢俄頃飛霞佩乘龍馭羽衛入高清祥光浮動五色迎鸞鳳雜簫笙因山功就同軌人至銘旌畫翣行背重城楚笳凝咽漢儀雄盛攀慕傷情惟餘內傳知向蓬瀛十二時太平時御華夷躬聽斷破危疑春秋鼎盛絀聲樂遊嬉日升繁機長駕遠馭垂意在軒羲恢六典斥三垂有殊尤絶迹盛德旁魄周施方將綴緝聲詩擴皇綱明帝典紹纍聖重熙高拱無為事難知春色盛逼千秋嘉節忽聞憑玉几頒命彤闈厭世御雲歸翊翠鳳駕文螭縹眇難追侍臣宮女但攀慕號悲玉輪動指嵩伊龍鑣日益遠空游漢廟冠衣惟盛德巍巍鏤玉冊傳青史昭示無期虞神復土初明旌下儲胥回虛仗簫笳互奏旌斾隨驅豈知飈御在蓬壺道縈紆風日慘六馬躊躇留恨滿山隅不堪回首翠柏已扶疏帝城漸邇愁霧宀元攴天衢公卿百辟鱗集雲敷迓龍輿端門闢金碧凌虛此時還帝都嚴清廟入空畤升文物燦爛極嘉娛配三宗號稱神古所無帝德協唐虞九歌畢奏斐然殊會軒朱神具燕喜錫福集皇居更千萬祀佑啓邦圖神主祔廟導引一首歲華婉娩侍宴玉皇宮雕輦出房中豈知軒后丹成去望絶鼎湖龍壽原初掩九虞終歸蹕五雲重惟餘寶冊書鴻烈清廟配三宗政和三年追冊明達皇后導引一首來嬪初載令德冠層城柔範藹徽聲熊羆夢應芳蘭郁佳氣擁雕楹珠宮縹眇泛蓬瀛脫屣世緣輕空餘寶冊光瓊玖千古仰鴻名神主祔別廟導引一首柔容懿範蚤歲藹層闈蘭夢結芳時秋風一夜驚羅幕鸞扇影空回榮追褘翟盛威儀遺像掩瑤扉春來只有芭蕉葉依舊倚晴暉景靈西宮坤元殿奉安欽成皇后御容導引一首雲軿芝蓋仙路去難攀海浪濺三山重迎遺像臨馳道還似在人間西宮瑤殿指坤元璇榜聳飛鸞移升寶殿從新詔盛典永流傳別廟導引一首蓬萊邃館金碧照三山真境勝人間秋風又見芭蕉長遺迹在人寰雲軒一去杳難攀班竹彩輿還深宮舊監聞簫鼓悵望慘朱顏
