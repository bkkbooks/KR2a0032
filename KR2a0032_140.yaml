body:
  text: 宋史卷一百四十志第九十三樂十五鼓吹上鼓吹者軍樂也昔黃帝涿鹿有功命岐伯作凱歌以建威武揚德風厲士諷敵其曲有靈夔競鵰鶚爭石墜崖壯士怒之名周官所謂師有功則凱歌者也漢有朱鷺等十八曲短簫鐃歌序戰伐之事黃門鼓吹為享宴所用又有騎吹二曲說者謂列於殿庭者為鼓吹從行者為騎吹魏晉而下莫不沿尚始有鼓吹之名江左太常有鼓吹之樂梁用十二曲陳二十四曲後周亦十五曲唐制大駕法駕小駕及一品而下皆有焉宋初因之車駕前後部用金鉦節鼓掆鼓大鼓小鼓鐃鼓羽葆鼓中鳴大橫吹小橫吹觱栗桃皮觱栗簫笳笛歌導引一曲又皇太子及一品至三品皆有本品鼓吹凡大駕用一千五百三十人為五引司徒六十四人開封牧太常卿御史大夫兵部尚書各二十三人法駕三分減一用七百六十一人為二引開封牧御史大夫各一十六人小駕用八百一十六人太常鼓吹署樂工數少每大禮皆取之於諸軍一品已下喪葬則給之亦取於諸軍又大禮車駕宿齊所止夜設警場用一千二百七十五人奏嚴用金鉦大角大鼓樂用大小橫吹觱栗簫笳笛角手取於近畿諸州樂工亦取於軍中或追府縣樂工備數歌六州十二時每更三奏之大中祥符六年以其煩擾詔罷追集悉以禁兵充常隸太常閲集七年親享太廟登歌始作聞廟外奏嚴遂詔行禮之次權罷嚴警禮畢仍復故凡祀前一日上御青城門觀奏嚴若車駕巡幸則夜奏於行宮前人數減於大禮凡用八百八十人真宗崇奉聖祖亦設儀衛別作導引曲今附之兩朝志云大駕千七百九十三人法駕千三百五人小駕千三十四人人數多於前鑾駕九百二十五人迎奉祖宗御容或神主祔廟用小鑾駕三百二十五人上宗廟諡冊二百人其曲即隨時更製自天聖已來帝郊祀躬耕籍田皇太后恭謝宗廟悉用正宮降仙臺導引六州十二時凡四曲景祐二年郊祀減導引第二曲增奉禋歌初李照等撰警嚴曲請以振容為名帝以其義無取故更曰奉禋其後祫享太廟亦用之大享明堂用黃鐘宮增合宮歌凡山陵導引靈駕章獻章懿皇后用正平調仁宗用黃鐘羽增昭陵歌神主還宮用大石調增虞神歌凡迎奉祖宗御容赴宮觀寺院並神主祔廟悉用正宮惟仁宗御容赴景靈宮改用道調皆止一曲皇祐中大饗明堂帝謂輔臣曰明堂直端門而致齊於內奏嚴於外恐失靖恭之意詔禮官議之咸言警場本古之鼛鼓所謂夜戒守鼓者也王者師行吉行皆用之今乘輿宿齊本緣祀事則警場亦因以警衆非徒取觀聽之盛恐不可廢若以奏嚴之音去明堂近則請列於宣德門百步之外俟行禮時罷奏一嚴亦足以稱虔恭之意帝曰既不可廢則祀前一夕邇於接神宜罷之熙寧中親祠南郊曲五奏正宮導引奉禋降仙臺祠明堂曲四奏黃鐘宮導引合宮歌皆以六州十二時永厚陵導引警場及神主還宮皆四曲虞主祔廟奉安慈聖光獻皇后山陵亦如之諸后告遷升祔上仁宗英宗徽號迎太一宮神像亦以一曲導引率因事隨時定所屬宮調以律和之元豐中言者以鼓吹害雅樂欲調治之令與正聲相得楊傑言正樂者先王之德音所以感召和氣格降上神移變風俗而鼓吹者軍旅之樂耳蓋鼓角橫吹起於西域聖人存四夷之樂所以一天下也存軍旅之樂示不忘武備也鞮鞻氏掌夷樂與其聲歌祭祀則吹而歌之燕亦如之今大祀車駕所在則鼓吹與武嚴之樂陳於門而更奏之以備警嚴大朝會則鼓吹列於宮架之外其器既異先代之器而施設概與正樂不同國初以來奏大樂則鼓吹備而不作同名為樂而用實異雖其音聲間有符合而宮調稱謂不可淆混故大樂以十二律呂名之鼓吹之樂則曰正宮之類而已乾德中設鼓吹十二案制床十二為熊羆騰倚之狀每案設大鼓羽葆鼓金錞各一歌簫笳各二又有叉手笛名曰拱宸管考驗皆與雅音相應列於宮縣之籍編之令式若以律呂變易夷部宮調則名混同而樂相紊亂矣遂不復行元符三年七月學士院奏太常寺鼓吹局應奉大行皇帝山陵鹵簿鼓吹儀仗並嚴更警場歌詞樂章依例撰成靈駕發引至陵所仙呂調導引等九首已令樂工協比聲律從之政和七年三月議禮局言古者鐃歌鼓吹曲各易其名以紀功烈今所設鼓吹唯備警衛而已未有鐃歌之曲非所以彰休德揚偉績也乞詔儒臣討論撰述因事命名審協聲律播之鼓吹俾工師習之凡王師大獻則令鼓吹具奏以聳羣聽從之十二月詔六州改名崇明祀十二時改名稱吉禮導引改名熙事備成六引內者設而不作紹興十六年臣僚言國家大饗乘輿齊宿必設警場肅儀衛而嚴祀事樂工隸太常歌詞備三疊纍朝以來皆用之比者郊廟行事率代以鉦鼓取諸殿司夫軍旅祭祀事既異宜樂聲清濁用以殊尚鉦鼓鳴角列於鹵簿中所以示觀德之盛宜詔有司更製兼籍鼓吹樂工以時閲習遇熙事出而用之有司請下軍器所造節鼓一奏嚴鼓一百二十鳴角亦如之金鉦二十有四太常前後部振作通用一千八百五十七人而鼓吹益盛孝宗隆興二年兵部言奉明詔大禮乘輿服御除玉輅平輦等外所用人數並從省約內鼓吹合用八百四十一人止用五百八十八人警場合用二百七十五人止用一百三十人淳熙中大閲帝自祥曦殿戎服而出皇太子親王執政以下並從諸將皆介胄乘馬導駕軍器分衛前後奏隨軍鼓管大樂上尋易金甲乘馬升將臺殿帥舉黃旗諸軍呼拜奏發嚴中軍鳴角馬步簇隊連三鼓至四鼓舉白旗中軍鼓聲旗應乃變方陳別高一鼓馬步軍出陳別高一鼓各歸部隊五鼓舉黃旗變員陳又鼓舉赤旗變鋭陳青旗變直陳收鼓訖一金止重鼓鳴角簇隊放教此其凡也開寶元年南郊三首導引氣和玉燭睿化著鴻明緹管一陽生郊禋盛禮燔柴畢旋軫鳳凰城森羅儀衛振華纓載路溢歡聲皇圖大業超前古垂象泰階平歲時豐衍九土樂升平覩寰海澄清道高堯舜垂衣治日月並文明嘉禾甘露登歌薦雲物煥祥經兢兢惕惕持謙德未許禪云亭六州嚴夜警銅蓮漏遲遲清禁肅森陛戟羽衛儼皇闈角聲勵鉦鼓攸宜金管成雅奏逐吹逶迤薦蒼璧郊祀神祇屬景運純禧京坻豐衍羣材樂育諸侯述職盛德服蠻夷殊祥萃九苞丹鳳來儀膏露降和氣洽三秀煥靈芝鴻猷播史冊相輝張四維卜世永固丕基敷玄化蕩蕩無為合堯舜文思混並寰宇休牛歸馬銷金偃革蹈詠慶昌期十二時承寶運馴致隆平鴻慶被寰瀛時清俗阜治定功成遐邇詠由庚嚴郊祀文物聲明會天正星拱奏嚴更布羽儀簪纓宸心虔潔明德播惟馨動蒼冥神降享精誠燔柴半萬乘移天仗肅鑾輅旋衡千官雲擁羣后葵傾玉帛旅明庭韶濩薦金奏諧聲集休亨皇澤浹黎庶普率洽恩榮仰欽元后睿聖貫三靈萬邦寧景貺福千齡真宗封禪四首導引民康俗阜萬國樂升平慶海晏河清唐堯虞舜垂衣化詎比我皇明九天寶命垂丕貺雲物效祥英星羅羽衛登喬嶽親告禪云亭汾陰云星羅羽衛臨汾曲親享答資生我皇垂拱惠化洽文明盛禮慶重行登封降禪燔柴畢汾陰云告虔睢上皇儀畢天仗入神京雲雷布澤遍寰瀛遐邇振歡聲巍巍聖壽南山固千載賀承平六州良夜永玉漏正遲遲丹禁肅周廬列羽衛繞皇闈嚴鼓動畫角聲齊金管飄雅韻遠逐輕颸薦嘉玉躬祀神祇祈福為黔黎升中盛禮增高益厚登封檢玉時邁合周詩汾陰云方丘盛禮精嚴越古陳牲檢玉時邁展鴻儀玄文錫慶雲五色相隨甘露降醴泉涌汾陰云嘉禾合三秀發靈芝皇猷播史冊光輝受鴻禧萬年永固丕基吾君德蕩蕩巍巍邁堯舜文思從今寰宇休牛歸馬耕田鑿井鼓腹樂昌期十二時聖明代海縣澄清惠化洽寰瀛時康歲足治定武成遐邇賀升平嘉壇上昭事神靈薦明誠報本禪云亭汾陰云蠲潔答鴻寧俎豆列犧牲宸心蠲潔明德薦惟馨紀鴻名千載播天聲燔柴畢汾陰云親祀畢雲罕回仙仗慶鑾輅還京八神扈蹕四隩來庭嘉氣覆重城殊常禮曠古難行遇文明仁恩蘇品彙沛澤被簪纓祥符錫祚武庫永銷兵育羣生景運保千齡告廟導引明明我后至德合高穹祗翼勵精衷上真紫殿回飈馭示聖胄延鴻躬承寶訓表欽崇慶澤布寰中告虔備物朝清廟荷景福來同奉祀太清宮三首導引穹旻錫祐盛德日章明見地平天成垂衣恭己干戈偃億載祐黎氓羽旄飾駕當春候款謁屆殊庭精衷昭感膺多福夷夏保咸寧聖君御宇祗翼奉三靈已偃革休兵區中海外鴻禧浹恭館勵虔誠九斿七萃著聲明徯后徇輿情丕圖寶緒承繁祉率土仰隆平六州千載運寶業正遐昌欽至道崇明祀盛禮邁前王鑾輅動萬騎騰驤馳道紛綵仗瑞日煌煌奉祕檢玉羽羣翔非霧滿康莊躬朝真館齊心繹思順風俯拜奠酒蕭薌精衷達飈輪降格昭彰回羽斾駐雕輦舊地訪睢陽享清廟孝德輝光屆靈場星羅萬國圭璋陳牲幣金石鏘洋景福降穰穰垂衣法坐恩覃羣品慶均海𧜛聖壽保無疆十二時乾坤泰帝壽遐昌𧜛縣樂平康真遊降格寶誨昭彰宸蹕造仙鄉崇妙道精意齊莊款靈場潔豆薦芬芳備樂奏鏗鏘猶龍垂裕千古播休光極褒揚明號洽徽章朝修展春豫諧民望覩文物煌煌言旋羽衛肅設壇場報本達蕭薌申嚴祀禮備蒸嘗答穹蒼純禧霑品彙慶賚浹窮荒封人獻壽德化掩陶唐保綿長錫祐永無疆亳州回詣玉清昭應宮一首導引祕文鏤玉金閣奉安時旌蓋儼仙儀珠旒俯拜陳章奏精意達希夷卿雲郁郁曜晨曦玉羽拂華枝靈心報貺垂繁祉寶祚永隆熙親享太廟一首導引躬朝太室列聖大功宣綵仗耀甘泉祕文升輅空歌發一路覆祥煙珠旒薦獻極精虔列侍儼貂蟬穰穰降福均寰宇垂拱萬斯年南郊恭謝三首導引重熙纍盛睿化暢真風尊祖奉高穹林棼綵仗明初日瑞氣滿晴空玉鑾徐動出環宮虔鞏罄宸衷禮成均慶人神悅聖壽保無窮六州承天統聖主應昌辰寶籙降飈游至瑞命慶惟新崇大號仰奉高真獻歲當初吉天下皆春謁祕宇藻衛星陳薌靄極紛綸瓊編焜耀仙衣綷垂旒俯拜薦獻禮惟寅芬芳備精衷上達穹旻尊道祖享清廟助祭萬方臻升泰畤縟典彌文侍羣臣漢庭儒雅彬彬煙飛火舉畢嚴禋天地降氤氳高臨華闕恩覃動植慶延宗社聖壽比靈椿十二時亨嘉會萬𧜛歡康聖化邁陶唐元符錫命天鑒昭彰徽號奉琳房陳縟禮獻歲惟良耀旗章翠輦駐仙鄉睿意極齊莊仙衣渥彩玉冊共熒煌薦芬芳飈馭降靈場回雲罕尊祖趨仙宇金石韻鏘洋聿朝清廟躬奠瑤觴報本國之陽執籩豆列侍貂璫對穹蒼洪恩霈夷夏大慶浹家邦垂衣紫極聖壽保遐昌集祺祥地久與天長天書導引七首詣泰山我皇纘位覆燾合穹旻祕籙示靈文齊居紫殿膺玄貺降寶命氤氳奉符讓德事嚴禋檢玉陟天孫垂鴻紀號光前古邁八九為君汾陰云后祇坤德宅河汾瘞玉考前聞垂休紀績超唐漢光監格鴻勳靈臺偃武書軌慶同文奄六合居尊圓穹錫命垂真籙清曉降金門升中報本禪云云汾陰云方丘報本務精勤嚴祀事惟寅無為致治臻清淨見反朴還淳詣太清宮寶圖熙盛登格聖功全瑞命集靈篇欽修祀典成明察道祖降雲軿賴鄉真館宅真仙朝謁帝心虔尊崇教父膺鴻福綿亘萬斯年猶龍勝境真宇儼靈姿肅謁展皇儀寶符先路嘉祥應雲物煥金枝紛紜紫節間黃麾藻衛極葳蕤高穹報貺延休祉仁壽協昌期詣玉清昭應宮紫霄金闕重疊降元符億兆祚皇圖雲章焜耀傳溫玉寶閣起清都奉迎綵仗溢天衢觀者競歡呼明君欽翼承鴻蔭億載御中區寶符錫祚慶壽命惟新俄降格飈輪巍巍帝德增虔奉懿號薦穹旻精齊祕館奉嚴禋文物耀昌辰升煙太一修郊報鴻祉介蒸民詣南郊聖神纘緒赫奕帝圖昌寶籙降穹蒼宸心勵翼修郊報綵仗列康莊祥煙瑞