body:
  text: 宋史卷八十三志第三十六律曆十六紹興統元乾道淳熙會元曆演紀上元甲子距紹興五年乙卯歲積九千四百二十五萬一千五百九十一乾道上元甲子距乾道三年丁亥歲積九千一百六十四萬五千八百二十三淳熙上元甲子距淳熙三年丙申歲積五千二百四十二萬一千九百七十二會元上元甲子距紹熙二年辛亥歲積二千五百四十九萬四千七百六十七步氣朔元法六千九百三十乾道三萬淳熙五千六百四十會元統率三萬八千七百歲周二百五十三萬一千一百三十八歲周日三百六十五餘一千六百八十八乾道朞實一千九十五萬七千三百八歲周三百六十五餘七千三百八淳熙歲實二百五萬九千九百七十四歲周日三百六十五餘一千三百七十四會元氣率一千四百一十三萬四千九百三十二氣策一十五日餘一千五百一十四秒十五乾道餘六千五百五十四半淳熙餘一千二百三十二秒二十五會元餘八千四百五十五半朔實二十萬四千六百四十七乾道八十八萬五千九百一十七秒七十六淳熙一十六萬六千五百五十二秒五十六會元朔率一百一十四萬二千八百三十四歲閏七萬五千三百七十四乾道三十二萬六千二百九十四秒八十八又有閏限八十五萬八千七百二十六秒五十二月閏二萬七千一百九十一秒二十四會元四十二萬九百二十四又有閏限七十二萬一千九百一十乾道又有沒限二萬三千四百四十五半淳熙四千四百七秒七十五會元三萬二百四十四半朔策二十九日餘三萬六千七十七乾道餘一萬五千九百一十七秒七十六淳熙餘三千九百九十二秒五十六會元餘二萬五百三十四約分五十三秒五望策十四日餘五千三百三半乾道餘一萬二千九百五十八秒八十八淳熙餘四千三百一十六秒二十八會元餘二萬九千六百一十七弦策七日餘二千六百五十一太乾道餘一萬一千四百七十九秒四十四淳熙餘二千一百五十八秒一十四會元餘一萬四千八百八半中盈分三千三百二十八秒三十乾道一萬三千一百九淳熙二千四百六十四秒五十會元一萬六千九百一十一朔虛分三千二百五十三乾道一萬四千八十二秒二十四淳熙二千六百四十七秒四十四會元一萬八千一百六十六旬周四十一萬五千八百乾道一百八十萬淳熙三十三萬八千四百秒一會元二百三十二萬二千紀法六十三曆同推天正冬至置距所求積年以歲周乘之為氣積分以旬周去之不盡總法約之為大餘不滿為小餘大餘命甲子算外即得所求年天正冬至日辰及餘其小餘總法退除為約分即百為母求次氣置冬至大小餘以氣策及餘秒加之秒盈秒法從一小餘小餘滿總法從一大餘滿紀法去命甲子算外合得次氣日辰及餘秒求天正經朔置天正冬至氣積分以朔實去之不盡為閏餘以減冬至氣積分餘為天正十一月經朔加時朔積分以旬周去之不滿總法約之為大餘不滿為小餘命甲子算外即得所求年天正十一月經朔加時朔積分以旬周去之不滿總法約之為大餘不滿為小餘大餘命甲子算外即得所求天正十一月經朔日辰及餘求弦望及次朔經日置天正十一月經朔大小餘以弦策加之為上弦纍加之去命如前各得弦望及次月朔經日及餘也求沒日置有沒之氣小餘以一百八十乘之秒從之用減一百二十六萬五千五百六十九餘以一萬八千一百六十九除之為日不滿為餘命其氣初日算外即得其氣辰凡二十四氣小餘五千四百一十五秒一百六十五求滅日置有滅經朔小餘三十乘之滿朔虛分除為日不滿為餘命經朔初日算外即得其月滅日辰經朔小餘不滿朔虛分者為有滅之朔步發斂候策五日餘五百四秒一百二十五乾道餘二千一百八十四秒二十五淳熙餘四百一十秒七十五會元餘二千八百二十二秒五十卦策六日餘六百五秒一百一十四乾道餘二千六百二十一秒二十四淳熙餘四百九十二秒九十會元餘三千三百八十二秒二十土王策三日餘三百二秒一百四十七乾道餘二千三百一十秒二十七淳熙餘二百四十六秒四十五會元一千六百九十一秒一十辰法五百七十七半乾道二千五百淳熙四百七十會元三千二百二十五半辰法二百八十八太乾道一千二百五十淳熙二百三十五會元一千六百一十二半刻法六百九十三乾道三百淳熙五百六十四會元三百八十七秒法一百八十乾道三十淳熙會元同一百淳熙又有月閏五千一百一十一秒九十四求六十四卦五行用事日二十四氣七十二候四曆俱與前曆同此不載求發斂去經朔日置天正閏餘以中盈及朔虛分纍益之即每月閏餘滿總法除之為閏日不盡為小餘即各得其月中氣去經朔日辰因求卦候者各以卦候土王策依次纍加減之中氣前減中氣後加各得其月卦候去經朔日辰求發斂加時置所求小餘以辰法除之為辰數不滿進一位以刻法而一為刻不盡為刻分其辰數命子正算外各得加時所在辰刻及分加辰刻即命起子初步日躔周天分二百五十三萬一千二百二十六秒八十七乾道分一千九十五萬七千七百一十七秒五歲差八十八秒八十七乾道四百九秒五淳熙一萬一千五百一十三會元軌差五百二十五秒一十三周天度三百六十五約分二十五秒六十四三曆同乘法五十五乾道八十七淳熙一百一十九會元一百一十九除法八百三十七乾道一千三百二十四淳熙一千八百一十二會元一千八百一十一秒法一百三曆同乾道又有象限九十一度分三十一秒九淳熙會元同淳熙又有乾實三億九百萬七千六百一十三半周天一百八十二度分二十五秒七十二會元半周天度同分六十二秒八十六常氣中積及餘盈縮分升降差損益率朏朒積統元空升七