body:
  text: 宋史卷一百四十七志第一百儀衛五紹興鹵簿皇太后皇后鹵簿皇太子鹵簿妃附王公以下鹵簿紹興鹵簿宋初大駕用一萬一千二百二十二人宣和增用二萬六十一人建炎初裁定一千三百三十五人紹興初用宋初之數十六年以後遂用一萬五千五十人明堂三分省一用一萬一十五人孝宗用六千八百八十九人明堂用三千三百十九人以後並用孝宗之數紹興用象六副象一乾道用象一淳熙用象六而不設副紹熙如乾道慶元後不設六引第一引清道二人孝宗省之幰弩一人騎方繖一雜花扇二曲蓋一外仗青衣二人車輻棒二告止傳教信幡各二戟十第二引清道二人孝宗省之幰弩一人騎鼓一鉦一大鼓十節一矟二皆騎方繖一雜花扇四孝宗省為二曲蓋一幢一麾一皆騎大角四鐃一簫二笳二橫吹二笛一簫一觱栗一笳一外仗青衣四人孝宗省為二車輻棒四孝宗省為二告止傳教信幡各二儀刀十戟二十弓矢二十孝宗皆省為十六刀盾二十矟二十孝宗並省第三第四第五第六引並同第二引內花扇大角各二青衣二人孝宗朝第三第四第五第六引內大角省為二餘並同第二引已省之數金吾纛矟隊纛十二孝宗省為六押纛二人孝宗省為一押衙四人孝宗省為二上將軍四人將軍四人孝宗省之大將軍二人孝宗省為一犦矟十二並騎孝宗省為八朱雀隊朱雀旗一犦矟二弩四隊前後引押各天武都指揮使一人騎龍旗隊引旗一風師雨師雷旗電旗各一五星旗五攝提旗二北斗旗一護旗一左右衛大將軍一人金吾引駕騎神勇都指揮使次弩弓矢矟各四並騎太常前部鼓吹鼓吹令二府史四人管轄指揮使一人帥兵官三十六人孝宗省作十四人掆鼓十二金鉦十二孝宗鼓鉦並省為十大鼓六十孝宗省作二十四小鼓六十孝宗省作三十節鼓一鐃鼓六羽葆鼓六歌工二十四拱宸管二十四孝宗歌工管並省為十八簫笳各三十六孝宗朝簫十八笳二十四長鳴六十中鳴六十孝宗朝並省為十八大橫吹六十孝宗省為二十四笛十二孝宗增為十八觱栗十二桃皮觱栗十二持鈒前隊驍騎都指揮使一人將軍二人軍使四人並騎稱長一人靈芝旗二瑞瓜旗二雙蓮花旗二太平瑞木旗二朱雀旗一甘露旗二嘉禾旗二芝草旗二絳引幡一孝宗省之黃麾幡一青龍白虎幢各一金節十二各一叉一鈒戟五十孝宗省為四十八六軍儀仗第一隊軍將二卒長二騎熊虎旗二赤豹旗二吏兵旗力士旗二戈六矛四戟四鉞四白柯槍五十平列旗二十在仗外分夾旗槍第二隊軍將二卒長二騎龍君旗虎君旗各三黃熊旗四赤豹旗二吏兵旗力士旗各一戈六矛四戟四鉞四白柯槍四十平列旗二十分夾仗外第三隊軍將二卒長二騎通直官二吏兵旗力士旗各一熊虎旗二龍君旗虎君旗各一天王旗四十二辰旗各一戈六矛戟鉞各四白柯槍三十平列旗二十分夾仗外孝宗朝第一隊軍將卒長各一龍虎旗赤豹旗吏兵旗力士旗各二矛四戈四戟二鉞二白柯槍三十平列旗十四餘同第二隊軍將卒長各一龍君虎君黃熊赤豹旗同戟六鉞六戈四矛四白柯槍二十第三隊軍將卒長各一吏兵力士熊虎龍君虎君天王旗並同十二辰旗十二通直官二白柯槍十平列旗十二龍墀旗隊天下太平旗一排仗大將二人夾之五方龍旗各一為三重赤在前黃在中黑在後青左白右次金鸞旗一左金鳳旗一右獅子旗二君王萬歲旗一日旗一左月旗一右御馬十匹分左右為五重中道隊左右衛大將軍一人檢校騎日月合璧旗一慶雲旗二五星連珠旗一祥光旗長壽幢各一金吾牙門第一門牙門旗四次監門使臣六分左右騎孝宗省旗為二監門為三金吾細仗青龍旗一左白虎旗一右五嶽神旗五分前中後左右為三列五方神旗五陳列亦如之五方龍旗二十五相間為五隊每隊赤前黃中黑後青左白右五方鳳旗二十五相間為五隊陳列亦如之五嶽旗在左五方旗在右五龍旗在左五鳳旗在右四瀆旗江淮在左河濟在右押二人分左右騎孝宗五龍五鳳旗止各一隊共省四十旗餘同八寶輿鎮國神寶左受命之寶右皇帝之寶左天子之寶右皇帝信寶左天子信寶右皇帝行寶左天子行寶右為四列每寶一輿每輿一香案輿案前燭罩三十二引寶職掌八人侍寶官一人內外符寶郎各二人扈衛一百人碧襴二十人夾扈衛之外孝宗省碧襴為十二餘同殿中繖扇輿輦方繖二孝宗省一朱團扇四孝宗省二金吾四色官六人孝宗省為二押仗二人騎金甲二人執鉞進馬官四人騎千牛衛大將軍一人孝宗省之千牛衛將軍八人孝宗省為二金吾引駕官二人導駕官四人並騎導大繖二孝宗省一鳳扇四孝宗省二夾繖而行前同腰輿一鳳扇十六夾輿孝宗省為四華蓋二排列官一人香凳一火燎一小輿一逍遙子平輦駕前諸班直駕頭鳴鞭誕馬燭罩三百三十人孝宗省為二百一十人前驅都下親從官一百五十人孝宗省為四十五人東西班六人孝宗省為二十二人約攔殿前指揮使四十人東第三班長入祗候五十二人班直主首九人孝宗省為三人茶酒新舊班一百六人孝宗省為四十四人開道旗一纛一十二鈞容直二百七十人駕回則作樂孝宗乾道元年省之乾道六年以後再用吉利旗五五方龍旗五龍旗二十孝宗省之門旗六十孝宗省為三十殿前指揮使引駕骨朵子直四十人分左右夾門旗外駕頭駕頭下天武官二十二人孝宗省為十七人都下親從一十六人孝宗省為八人茶酒班執從物殿侍二十二人又都下親從二十二人孝宗省為十七人劍六人孝宗省為三人麋旗一人員一孝宗省之殿前指揮使行門二十二人鳴鞭十二人孝宗增為一十四人次御龍直百二十人孝宗省為八十六人快行五十人日月麟鳳旗各一青龍白龍赤龍黑龍旗四人員二引駕千牛上將軍一人玉輅奉宸隊分左右充禁衛圍子八重崇政殿親從圍子二百人為第一重從𩹉數出御龍直二百五十人為第二重崇政殿親從外圍子二百五十人為第三重御龍直骨朵子直二百五十人為第四重御龍弓箭直二百五十人為第五重御龍弩直二百五十人為第六重禁衛天武二百五十人為第七重都下親從圍子三百人為第八重孝宗以上並同天武約攔二百人孝宗省作百八十八人在禁衛圍子外編排禁衛行子二十一人快行五十九人孝宗省為四十二管押相視御龍四直八人孝宗省為四人照管行子御龍四直二十四人孝宗省為八人天武六人孝宗省之禁衛內攔前崇政殿親從三十二人孝宗省作二十五人駕後部扇筤大黃龍旗一駕後樂東西班三十六人鈞容直三十一人並騎孝宗此下增招箭班三十四人扇筤扇筤下天武二十二人孝宗省作一十七人都下親從十六人孝宗省作八人茶酒班執從物五十人騎孝宗省為三十人大輦輦下應奉並人員合六百一十四人分五番孝宗乾道元年省之六年以後復設御馬十匹為五重持鈒後隊神勇都指揮使二人騎重輪旗二人大繖二孝宗省為一朱團扇八孝宗省為四鳳扇二小雉扇二十二孝宗省鳳扇而減雉扇為六華蓋二孝宗省為一俾倪十二孝宗省為六御刀六玄武幢一絳麾二叉細矟十二孝宗省為六驍騎都指揮使一人騎總領大角大角四十孝宗省為二十太常後部鼓吹鼓吹丞二人典吏四人孝宗省為三人管轄指揮使一人羽葆鼓六歌工二十四拱宸管十二簫三十六笳二十四鐃鼓六小橫吹六十笛十二觱栗十二帥兵官十人孝宗歌工十八拱宸管十二簫十八笳二十四鐃鼓六笛十八節鼓一小橫吹三十觱栗十八桃皮觱栗十二羽葆鼓吹六帥兵官八人黃麾幡一中道金輅象輅革輅木輅各一每輅誕馬各六在輅前駕士各百五十四人乾道元年省之六年以後復用掩後隊中道宣武都指揮使二人大戟刀盾弓矢矟各十五金吾牙門第二門中道牙門旗四分左右孝宗省之監門使臣六分左右騎孝宗省為三玄武隊並騎中道虎翼都指揮使一人犦矟二玄武旗一矟弓矢各十孝宗並省為五弩五外仗分左右道以夾中道儀仗清遊隊並騎白澤旗二捧日指揮使二弩四弓矢十矟十六左右金吾十六騎天武都頭二人弩八弓矢十二矟十二孝宗弩弓矢矟並省為六佽飛隊並騎拱聖指揮使二虞候佽飛二十鐵甲佽飛十二前隊殳仗都頭六人騎殳叉六十後隊殳仗都頭四人騎殳叉四十前部馬隊第一隊捧日都指揮使二人角斗亢牛旗各一弩四弓矢十矟八第二隊捧日都指揮使二人氐女房虛旗各一弩弓矢矟如第一隊第三隊天武都指揮使二人心危旗各一弩弓矢矟如第二隊第四隊天武都指揮使二人尾室旗各一弩弓矢矟如三隊第五隊拱聖指揮使二人箕畢旗各一弩弓矢矟如第四隊第六隊拱聖都指揮使二人奎井旗各一弩弓矢矟如第五隊第七隊神勇都指揮使二人婁鬼旗各一弩弓矢矟如第六隊第八隊神勇都指揮使二人胃柳旗各一弩弓矢矟如第七隊第九隊驍騎都指揮使二人昴星旗各一弩弓矢矟如第八隊第十隊宣武都指揮使二人畢張旗各一弩弓矢矟如第九隊第十一隊虎翼都指揮使二人觜翼旗各一弩弓矢矟如第十隊第十二隊廣勇都指揮使二人參軫旗各一弩弓矢矟如第十一隊孝宗省為七隊二十八宿旗每隊四弓矢矟每隊六餘同步甲前隊第一隊捧日指揮使都頭各二人騎下同鶡雞旗二青鍪甲刀盾二十孝宗刀盾省為十二下並同第二隊捧日指揮使都頭貔旗朱鍪甲刀盾第三隊天武指揮使都頭萬年連理木旗黃鍪甲刀盾第四隊天武指揮使都頭芝禾並秀旗白鍪甲刀盾第五隊拱聖指揮使都頭祥鶴旗黑鍪甲刀盾第六隊拱聖指揮使都頭犀旗黃鍪甲刀盾孝宗改黃鍪甲為青鍪甲餘並同金吾左右道牙門第一門牙門旗四分左右監門使臣八人並騎孝宗旗省為二使臣省為四人步甲前隊第七隊神武指揮使都頭鶡雞旗青鍪甲刀盾第八隊神武指揮使都頭麟旗朱鍪甲刀盾第九隊驍騎指揮使都頭白狼旗黃鍪甲刀盾第十隊驍騎指揮使都頭蒼烏旗次白鍪甲刀盾第十一隊虎翼指揮使都頭鸚鵡旗黑鍪甲刀盾第十二隊廣勇指揮使都頭太平旗黃鍪甲刀盾自二至十二隊人旗刀盾數列如第一隊孝宗內去鶡雞旗麟旗而用慶雲旗瑞麥旗金吾左右道牙門第二門牙門旗四分左右監門使臣八人並騎孝宗旗省為二監門省為四人前部黃麾仗第一部殿中侍御史二員騎下同絳引幡二十孝宗省為十犦矟二捧日指揮使二都頭五並騎下同黃氅五十孝宗省為二十鼓四斧十戟弓矢二十矟三十孝宗省為二十弩十第二部殿中侍御史天武指揮使都頭青氅鼓斧戟弓矢矟弩第三部殿中御史拱聖指揮使都頭緋氅鼓斧戟弓矢矟弩孝宗省作三部第四部殿中御史神勇指揮使都頭黃氅鼓斧戟弓矢矟弩第五部殿中御史驍騎指揮使都頭白氅鼓斧戟弓矢矟弩第六部殿中御史廣勇指揮使都頭黑氅鼓斧戟弓矢矟弩自二至六部數列並如初部青龍白虎隊並騎青龍旗一白虎旗一虎翼都指揮使二弩四弓矢十矟八班劍儀刀隊並騎武衛將軍二人捧日天武拱聖神勇指揮使各二人班劍六十儀刀六十次驍騎驍勝宣武虎翼指揮使各二人班劍六十儀刀六十親勳散手驍衛翊衛隊並騎中衛郎四人翊衛郎二人親衛郎二人衛兵四十甲騎四十在衛兵外左右驍衛翊衛三隊並騎第一隊左右驍衛大將軍二人雙蓮花旗二弩四弓矢十孝宗減弓矢為六下同矟十六孝宗減矟為八下同第二隊廣勇指揮使二人吉利旗弩弓矢矟數如初隊金吾左右道牙門第三門牙門旗四分左右監門八人並騎孝宗旗減為二監門減