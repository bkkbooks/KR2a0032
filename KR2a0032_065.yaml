body:
  text: 宋史卷六十五志第十八五行三木曲直木之性也木失其性則為妖祥舊說以狂咎木冰恆雨服妖龜孽雞禍青眚青祥之類皆屬之木今從之太平興國六年正月瑞安縣民張度解木五片皆有天下太平字至道六年修昭應宮有木斷之文如點漆貫徹上下體若梵書十一月襄州民劉士家生木有文如龍魚鳳鶴之狀七年五月撫州修天慶觀解木有文如墨畫雲氣峯巒人物衣冠之狀七月彰明縣崇仙觀柱有文為道士形及北斗七星象大中祥符八年晉州慶唐觀古柏中別生槐長丈餘天聖元年二月河陽柳二本連理六月河陽樝棗各連理五年正月綿谷縣松柏同本異榦九年十月公井縣冬青木連理明道元年八月黃州橘木及柿木連枝康定元年十月始興縣柑兩本連理慶曆三年十二月澧州獻瑞木有文曰太平之道六年九月甲辰登州有巨木浮海而出者三千餘治平四年六月汀州進桐木板二有文曰天下太平熙寧元年三月簡州木連理是歲英州因雷震一山梓樹盡枯而為龍腦價為之賤至京師一兩纔直錢一千四百二年建州民楊緯言元年三月大雷雨所居之西有黃龍見下獲一木如龍而形未具七月大雷雨復有龍飛其下及霽木龍尾翼足皆具歸合舊木宛然一體圖象以進十年八月乙巳惠州柚木有文曰王帝萬年天下太平元豐元年五月劍州木連理三年六月己未饒州長山雨木子數畝狀類山芋子味香而辛土人以為桂子又曰菩提子明道中嘗有之是歲大稔十二月泌陽縣甘棠木連理六年五月衞真縣洞霄宮枯槐生枝葉元祐元年八月己丑杭州民俞舉慶七世同居家園木連理五年四月德州木連理元符元年八月施州李木連理二年九月眉山縣榿木二株異根同榦木枝相附崇寧四年正月襄城縣李梨木連理大觀元年三月湟州欄木生葉八月瑞州永興軍並木連理二年十二月岢嵐軍園池生瑞木政和三年七月玉華殿萬年枝木連理南雄州楓木連理十月武義縣木根有萬宋年歲四字四年建州木連理六月沅陵縣江漲流出楠木二十七可為明堂梁柱蔡京等拜表賀九月丙申彭城縣柏開華十二月辛丑元氏縣民王寘屋柱槐木再生枝葉高四十餘尺是歲邵州海棠木連理澤州台州槐木連理荊門軍紫薇木連理六年坊兗洪明夔徐新全隰太平州並木連理梅州枯木生枝宣和二年四月永州民劉思析薪有天下太平字紹興十四年四月虔州民毀欹屋析柱木理有文曰天下太平時守臣薛弼上之方大亂近木妖也二十年八月福州沖虛觀皁莢木翠葉再實二十一年建德縣定林寺桑生李實栗生桃實占曰木生異實國主殃二十五年十月贛州獻太平木時秦檜擅朝喜飾太平郡國多上草木之妖以為瑞紹興間漢陽軍有插榴枝於石罅秀茂成陰歲有華實者初郡獄有誣服孝婦殺姑婦不能自明屬行刑者插髻上華於石隙曰生則可以驗吾寃行刑者如其言後果生淳熙十六年三月揚州桑生瓜櫻桃生茄此草木互為妖也七月晉陵縣民析薪中有木字曰紹熙五年如是者二是時紹熙猶未改元其後果止五年此近木妖也紹熙四年富陽縣栗生來禽實五年行都雨木與唐志貞元陳留雨木同占木生于下而自上隕者將有上下易位之象嘉定六年五月己巳嚴州淳安遂安桐廬三縣大木自拔占曰木自拔國將亂景定四年五月成都太祖廟側大木仆忽起立生三芽德祐二年正月戊辰寶應縣民析薪中有天太下趙四字獻之制置使李庭芝賞以錢百千咸平六年十一月庚戌雨木冰大中祥符五年正月戊寅京師雨木冰天禧五年正月戊寅京師雨木冰慶曆三年十二月丁巳雪木冰占曰兵象也嘉祐元年正月雨木冰治平二年十月乙巳雨木冰熙寧三年十月八年正月九年正月京師雨木冰元祐八年二月京師大寒霰雪雨木冰宣和五年十月乙酉雨木冰靖康元年十月乙卯雨木冰二年正月丁酉雨木冰紹熙五年十一月辛亥雨木冰宣和六年御樓觀燈時開封尹設次以彈壓於西觀下帝從六宮於其上以觀天府之斷決者簾幕深密下無由知衆中忽有人躍出墨色布衣若寺僧童行狀以手畫簾出指斥語執于觀下帝怒甚令中使傳旨治之箠掠亂下又加炮烙詢其誰何略不一語亦無痛楚之狀又斷其足筋俄施刀臠血肉狼籍帝大不悅為罷一夕之懽竟不得其何人付獄盡之七年八月都城東門外鬻菜夫至宣德門下忽若迷罔釋荷檐向門戟手出悖詈語且曰太祖皇帝神宗皇帝使我來道尚宜速改也邏卒捕之下開封獄一夕方省則不知向之所為者乃於獄中盡之建炎二年十一月高宗在揚州郊祀後數日有狂人具衣冠執香爐攜絳囊拜于行宮門外自言天遣我為官家兒書于囊紙刻於右臂皆是語鞫之不得姓名高宗以其狂釋不問明年二月金人犯維揚三月有明受之變紹興元年四月庚辰閬州有狂僧衰絰哭于郡譙門曰今日佛下世且言且哭實隆祐太后上仙日云閬距行都萬里逾月而遺詔至淳熙十四年正月紹興府有狂人突入恩平郡王第升堂踐王坐曰我太上皇孫來赴郡鞫訊終不語亦狂咎也是冬高宗崩明年八月王薨紹熙二年十二月庚辰昧爽成都府有人衰服入帳門大呼閫帥京鏜姓名亦狂咎也建隆元年十月蔡州大霖雨道路行舟開寶二年八月帝駐潞州積雨累日未止九月京師大雨霖五年京師雨連旬不止河南河北諸州皆大霖雨九年秋大霖雨太平興國二年道州春夏霖雨不止平地二丈餘五年五月京師連旬雨不止七年六月齊州逮捕臨邑尉王坦等六人繫獄未具一夕大風雨壞獄戶王坦等六人並壓死雍熙二年八月京師大霖雨淳化元年六月隴城縣大雨壞官私廬舍殆盡溺死者百三十七人三年九月京師霖雨四年七月京師大雨十晝夜不止朱雀崇明門外積水尤甚軍營廬舍多壞是秋陳潁宋亳許蔡徐濮澶博諸州霖雨秋稼多敗五年秋開封府宋亳陳潁泗壽鄧蔡潤諸州雨水害稼咸平元年五月昭州大雨霖害民田溺死者百五十七人景德三年八月青州大雨壞鼓角樓門壓死者四人大中祥符二年八月無為軍大風雨折木壞城門軍營民舍壓溺千餘人十月兗州霖雨害稼三年四月昇州霖雨五月辛丑京師大雨平地數尺壞軍營民舍多壓者近畿積潦五年九月建安軍大霖雨害農事天禧四年七月京師連雨彌月甲子夜大雨流潦汎溢民舍軍營圮壞太半多壓死者自是頻雨及冬方止乾興元年二月蘇湖秀州雨壞民田天聖四年六月戊寅莫州大雨壞城壁七年自春涉夏雨不止明道二年六月癸丑京師雨壞軍營府庫景祐三年七月庚子大雨震電慶曆六年七月丁亥河東大雨壞忻代等州城壁皇祐二年八月深州大雨壞民廬舍四年八月癸未京城大風雨民廬摧圮至有壓死者嘉祐二年八月河北緣邊久雨瀕河之民多流移五月丁未晝夜大雨六月乙亥雨壞太社太稷壇三年八月霖雨害稼六年七月河北京西淮南兩浙江南東西霪雨為災閏八月京師久雨是歲頻雨及冬方止治平元年京師自夏歷秋久雨不止摧真宗及穆獻懿三后陵臺熙寧元年八月冀州大雨壞官私廬舍城壁七年六月陝州大雨漂溺陝平陸二縣元豐四年七月泰州海風駕大雨漂浸州城壞公私舍數千楹元祐二年七月丁卯以雨罷集英殿宴元符二年九月以久雨罷秋宴三年七月久雨哲宗大昇轝在道陷泥中建中靖國元年二月久雨時欽聖憲肅皇后欽慈皇后二陵方用工詔京西祈晴崇寧元年七月久雨壞京城廬舍民多壓溺而死者三年六月久雨四年五月京師久雨又自七月至九月所在霖雨傷稼十月始霽靖康元年四月京師大雨天氣清寒又自五月甲申至六月暴雨傷麥夏行秋令建炎二年春淫雨三年二月癸亥高宗初至杭州久霖雨占曰陰盛下有陰謀時苗傅劉正彥為亂五月霖雨夏寒紹興元年行都雨壞城三百八十丈是歲婺州雨城壞三年雨自正月朔至于二月七月四川霖雨至于明年正月四年六月淫雨害稼蘇湖二州為甚九月久雨時劉豫連金人入寇十月高宗親征而霽五年三月霖雨傷蠶麥行都雨甚九月雨至于明年正月六年五月久雨不止七年十月高宗如建康久雨八年三月積雨至于四月傷蠶麥害稼二十一年夏襄陽府大雨十餘日二十三年六月大雨壞軍壘民田三十年五月久雨傷蠶麥害稼八月施州大風雨三十二年六月浙西大霖雨隆興元年三月霖雨行都壞城三百三十餘丈二年六月陰雨七月浙西江東大雨害稼八月風雨踰月乾道元年二月行都及越湖常潤溫台明處九郡寒敗首種損蠶麥二年正月淫雨至于四月夏寒江浙諸郡損稼蠶麥不登三年五月丙午泉州大雨晝夜不止者旬日八月淫雨江浙淮閩禾麻菽麥粟多腐四年四月陰雨彌月六年五月連雨六十餘日十一月連雨辛巳郊祀雲開于圜丘百步外有澍雨八年四月四川陰雨七十餘日六月壬寅大雨徹晝夜至于己酉九年閏正月淫雨淳熙二年夏建康府霖雨壞城郭三年五月淮浙積雨損禾麥八月浙東西江東連雨癸未甲申行都大風雨九月久雨十月癸酉孝宗出手詔決獄援筆而風起開霽四年九月丁酉戊戌紹興府餘姚上虞二縣大風雨五年閏六月己亥階州暴雨至于戊申乙巳興化軍福州福清縣暴風雨夜作六年四月衢州霖雨九月連雨己巳將郊而霽八年四月雨腐禾麥五月久雨敗首種十年五月信州霖雨自甲戌至于辛巳八月福州大雨霖自己未至于九月乙丑吉州亦如之十一年四月淫雨戊寅建康府太平州大雨霖六月甲申處州龍泉縣暴雨十二年五月六月皆霖雨十三年秋利州路霖雨敗禾稼穜稑金洋階成岷鳳六州亦如之十五年五月荊淮郡國連雨戊午祁門縣霖雨十六年四月西和州霖雨害禾麥五月浙西湖北福建淮東利西諸道霖雨紹熙元年春久陰連雨至于三月夏階成岷鳳四州霖雨傷麥二年二月贛州霖雨連春夏不止壞城四百九十丈圮城樓敵樓凡十五所四月福建路霖雨至于五月七月利路久雨傷種麥癸亥興州暴雨連日八月行都久雨三年五月江東湖北路連雨常德府大雨徹晝夜自壬辰至于庚子寧國府池州廣德軍自己亥至于六月辛丑朔雨甚祁門縣至于庚戌七月壬申天台仙居二縣大雨連旬淮西路鎮江襄陽府皆害禾麥八月普州雨害稼四年四月霖雨至于五月浙東西江東湖北郡縣壞圩田害蠶麥蔬稑紹興寧國府尤甚鎮江府大雨自辛未至于丙子淮西郡縣自丙子至于戊寅五年八月霖雨畿縣浙東西皆害稼九月雨至于十月癸巳大雨三晝夜不止江東西福建郡縣皆苦雨慶元元年正月霖雨甲辰帝蔬食露禱丙午霽二月又雨至于三月傷麥五月霖雨七月雨至于八月二年六月壬申台州焱風暴雨連夕八月行都霖雨五十餘日三年七月雨連月四年八月久雨五年五月行都雨壞城夜壓附城民廬多死者六月浙東西霖雨至于八月六年五月庚午嚴州霖雨連五晝夜不止嘉泰二年六月福建路連雨至于七月丁未大風雨為災三年八月久雨開禧元年七月利路郡縣霖雨害稼閏月盱眙軍陰雨至于九月敗禾稑十月行都淫雨至于明年春二年春淫雨至于三月嘉定二年五月戊戌連州大雨連晝夜六月利閬成西和四州霖雨七月壬辰台州大風雨夜作三年三月陰雨六十餘日五月淫雨至于六月首種多敗蠶麥不登四年八月霖雨至于九月五年春淫雨至于三月傷蠶麥十一月雨雪積陰至于明年春六年春淫雨至于二月丁亥雨雪集霰五月陰雨經日辛酉嚴州霖雨六月戊子紹興府大風雨浙東西雨至于七月七年九月陰雨至于十月害禾麥九年四月六月大霖雨浙東西郡縣尤甚十年三月連雨至于四月十月霖雨害稼十一年六月霖雨浙西郡縣尤甚十二年六月霖雨彌月十五年七月浙東西霖雨為災十六年五月霖雨浙西湖北江東淮東尤甚八月大風雨害稼十七年八月霖雨乾德四年二月長春節甘露降江寧府報恩院五年二月甘露降江陵府玉泉寺松樹開寶元年十二月甘露降蔡州僧院柏樹太平興國三年正月甘露降壽州廨四年五月甘露降河東縣廨叢竹凡三夜七年四月丙戌知漢州安守亮獻柏葉上甘露一器九年三月丙子甘露降西京南太一宮新城雍熙三年四月庚子甘露降後院草木四年十二月甘露降興化軍羅漢峯前五松端拱二年二月甘露降壽州廨園柏及資聖寺檜淳化二年十二月資州廨及延壽觀德純寺甘露降松柏凡六日三年正月舒州二月衢州四月舒州四年六月舒州並甘露降至道二年四月蘄州三年五月泉州六月蘇州甘露降咸平元年四月甘露降平戎軍廨果樹凡九十餘本十一月甘露降亳州真觀靈寶柏樹二年五月太平州潯州三年二月泉州十一月潯州四年二月龔州五年正月桂州十一月許州並甘露降景德元年義寧縣二年正月鬱林州二月晉州及神山縣三年正月梓州四月遂州十二月榮州懷安軍甘露降大中祥符元年十二月上饒縣信陽軍二年正月信陽軍陳鄂二州三月陵昇梓三州三年二月柳州懷安軍閏二月富順監五月澤耀晉益四州四年正月梓州三月澤州四月常州五年四月遂州五月無為軍六月梓州七月真定府十一月榮州開元寺六年三月梓州六月鄜州八月遂州九月信州十月亳州太清宮十一月潯州十二月榮州南儀州七年二月鳳翔府天慶觀五月鄆州十月亳州太清宮十一月彭州天慶觀八年正月中江縣二月果州十月衢州九年十一月玉清昭應宮並甘露降天禧元年正月貴州天慶觀二月玉清昭應宮三月後苑四月會靈觀五月廬州通判廳及后土祠十二月昭州天慶觀二年十二月榮州開元寺懷安軍天慶觀三年四月舒州五月益州四年三月邵武軍十二月平泉縣五年三月泉州十月韶州並甘露降天聖元年正月柳州十一月河南府二年五月鳳州十月涇州四年榮州懷安軍六年太平州七年正月益州九年正月榮州並甘露降明道元年十一月韶州梓州甘露降景祐四年十二月成德軍慶曆四年正月桂州皇祐三年十二月吉州嘉祐七年三月眉州蓬州九月陵州並甘露降熙寧元年距元豐八年甘露降凡二十餘處元祐元年距元符三年亦如之大觀初甘露降于九成宮帝鼐室三年冬降于尚書省及六曹御製七言四韻詩賜執政已下其後內自禁中及宣和殿延福宮神霄宮下至三學開封府大理寺宰臣私第皆有之歲歲拜表稱賀建隆初蜀孟昶末年婦女競治髮為高髻號朝天髻未幾昶入朝京師江南李煜末年有衞士秦友登壽昌堂榻覆其㙐而坐訊之風狂不寤識者云㙐履也李氏將覆於此地而為秦所有乎履與李友與有同音趙與秦同祖也又煜宮中盛雨水染淺碧為衣號天水碧未幾為王師所克士女至京師猶有服之者天水國之姓望也淳化三年京師里巷婦人競剪黑光紙團靨又裝鏤魚腮中骨號魚媚子以飾面黑北方色魚水族皆陰類也面為六陽之首陰侵於陽將有水災明年京師秋冬積雨衢路水深數尺景德四年春京城小兒裂裳為小兒旗繫竿首相對揮颭兵鬥之象也是歲宜州卒陳進為亂出師討平之紹興二十一年行都豪貴競為小青蓋飾赤油火珠於蓋之頂出都門外傳呼于道珠者乘輿服御飾升龍用焉臣庶以加于小蓋近服妖亦僭咎也二十三年士庶家競以胎鹿皮製婦人冠山民採捕胎鹿無遺時去宣和未遠婦人服飾猶集翠羽為之近服妖也二十七年交阯貢翠羽數百命焚之通衢立法以禁紹熙元年里巷婦女以琉璃為首飾唐志琉璃釵釧有流離之兆亦服妖也後連年有流徙之厄理宗朝宮妃繫前後掩裙而長窣地名趕上裙梳高髻於頂曰不走落束足纖直名快上馬粉點眼角名淚妝剃削童髮必留大錢許於頂左名偏頂或留之頂前束以綵繒宛若博焦之狀或曰鵓角咸淳五年都人以碾玉為首飾有詩云京師禁珠翠天下盡琉璃太平興國三年二月鑿金明池既掘地有龜出殆踰萬數大中祥符二年四月有黑龜甚衆沿汴水而下至和元年二月信州貢綠毛龜大觀元年閏十月丙戌都水使者趙霆行河得兩首龜以為瑞蔡京信之曰此齊小白所謂象罔見之而霸者也鄭居中曰首豈容有二而京主之意殆不可測帝命棄龜金明池政和四年瑞州進六目龜五年博州進白龜紹興八年五月汴京太康縣大雷雨下冰龜數十里隨大小皆龜形具首足卦文乾道五年舒州民獻龜駢生二首不能伸縮郡守張棟縱之灊山近龜孽也嘉定十四年春楚州境上龜大小死者蔽野咸平三年八月黃州羣雞夜鳴至冬不止紹興初陳州民家雞忽人言近雞禍也松陽縣民家雞生三足縣治有雞伏卵毛生殼外近雞禍亦毛孽也乾道六年西安縣官塘有物雞首人身高丈餘晝見于野慶元三年饒州軍營雞卵出蛇近雞孽亦蛇孽也婺源縣張村民家雌雞化為雄烹之形冠距而腹卵孕同里洪氏家雄雞伏子中一雛三足咸淳五年常州雞羽生距建隆元年夏相金均房商五州鼠食苗二年五月商州鼠食苗乾德五年九月金州鼠食苗太平興國七年十月岳州鼠害稼紹興十六年清遠翁源真陽三縣鼠食稼千萬為羣時廣東久旱凡羽鱗皆化為鼠有獲鼠於田者腹猶蛇文漁者夜設網旦視皆鼠自夏徂秋為患數月方息歲為饑近鼠妖也乾道九年隆興府鼠千萬為羣害稼淳熙五年八月淮東通泰楚高郵黑鼠食禾既歲大饑時江陵府郭外羣鼠多至塞路其色黑白青黃各異為車馬踐死者不可勝計踰三月乃息紹熙四年饒州民家二小鼠食牛角三徙牛牢不免角穿肉瘠以斃近鼠妖也慶元元年六月番昜縣民家一猫帶數十鼠行止食息皆同如母子相哺者民殺猫而鼠其血鼠象盜猫職捕而反相與同處司盜廢職之象也與唐龍朔洛州猫鼠同占紹興三年八月辛亥尚書省後樓無故自壞慶元元年夏建昌軍民居木柱有聲如牛鳴者三日乃止咸淳九年丞相賈似道起復之日在越上私第方拜家廟忽聞內有裂帛聲衆賓愕然密詢左右知家廟棟裂皆逡巡而退
