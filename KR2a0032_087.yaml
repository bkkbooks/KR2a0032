青歸族一十五里宣威城舊名牛城崇寧三年改今名東至綏邊寨四十里西至寧西城界三十五里南至西寧州界二十五里北至南宗嶺九十里綏邊寨舊名宗谷崇寧三年建築後改今名東至龍支城界六十里西至宣威城界三十里南至西寧州界三十二里北至乳駱河界南一里懷和寨舊名丁令谷崇寧三年置寨賜名又隸積石軍東至廓州界八十五里西至青海一百三十餘里南至順通堡界一十三里北至清平寨界二十五里制羌寨政和八年賜名地名癿氈嶺屬西寧州震武軍政和六年進築古骨龍城賜名震武城未幾改為震武軍不見四至據童貫奏古骨龍元屬湟州通濟橋震武城浮橋政和六年賜名善治堡政和六年震武城通濟橋堡賜名大同堡本名古骨龍城應接堡政和六年賜名德通城本瞎令古城政和七年劉法既解震武軍圍進築賜名石門堡瞎令古城北地名石門子政和七年賜名積石軍本溪哥城元符間為吐蕃溪巴溫所據大觀二年臧征撲哥以城降即其地建軍東至廓州界八十里西至青海一百餘里南至蓋龍峗八十里北至西寧州界八十里懷和寨已見西寧州東至廓州界八十五里西至青海一百三十餘里南至順通堡界一十三里北至清平寨界二十五里順通堡東至臨松堡一十二里西至本軍一十八里南至臨松堡二十五里北至懷和寨界一十二里臨松堡東至廓州界五十里西至順通堡界一十二里南至把拶公原界約六十里北至黃河一十五里陝西路蓋禹貢雍梁冀豫四州之域而雍州全得焉當東井輿鬼之分西接羌戎東界潼陝南抵蜀漢北際朔方有銅鹽金鐵之産絲枲林木之饒其民慕農桑好稼穡鄠杜南山土地膏沃二渠灌溉兼有其利大抵夸尚氣勢多遊俠輕薄之風甚者好鬥輕死蒲解本隸河東故其俗頗純厚被邊之地以鞍馬射獵為事其人徑悍而質木梁泉少桑麻之利布泉鹽酪資於他郡上洛多淫祀申以科禁故其俗稍變秦隴儀渭涇原邠寧鄜延環慶等皆分兵屯守以備不虞云
