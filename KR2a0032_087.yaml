body:
  text: 宋史卷八十七志第四十地理三陝西陝西路慶曆元年分陝西沿邊為秦鳳涇原環慶鄜延四路熙寧五年以熙河洮岷州通遠軍為一路置馬步軍都總管經略安撫使又以熙河等五州軍為一路通舊鄜延等五路共三十四州軍後分永興保安軍河中陝府商解同華耀虢鄜延丹坊環慶邠寧州為永興軍等路轉運使於永興軍提點刑獄於河中府置司鳳翔府秦階隴鳳成涇原渭熙河洮岷州鎮戎德順通遠軍為秦鳳等路轉運使於秦州提點刑獄於鳳翔府置司仍以永興鄜延環慶秦鳳涇原熙河分六路各置經略安撫司永興軍路府二京兆河中州十五陝延同華耀邠鄜解慶虢商寧坊丹環軍一保安縣八十三其後延州慶州改為府又增銀州醴州及定邊綏德清平慶成四軍凡府四州十五軍五縣九十京兆府京兆郡永興軍節度本次府大觀元年升大都督府舊領永興軍路安撫使宣和二年詔永興軍守臣等銜不用軍額稱京兆府崇寧戶二十三萬四千六百九十九口五十三萬七千二百八十八貢鞾蠟席酸棗仁地骨皮縣十三長安次赤樊川次赤舊萬年縣宣和七年改鄠次畿藍田次畿咸陽次畿涇陽次畿櫟陽次畿高陽次畿興平次畿臨潼次畿唐昭應縣大中祥符改醴泉次畿武功次畿政和八年同醴泉撥入醴州乾祐次畿監二熙寧四年置鑄銅錢八年置鑄鐵錢河中府次府河東郡護國軍節度舊兼提舉解州慶成軍兵馬巡檢事大中祥符中以榮河為慶成軍崇寧戶七萬九千九百六十四口二十二萬七千三十貢五味子龍骨縣七河東次赤隋縣熙寧三年省河西縣六年省永樂縣為鎮入焉臨晉次畿猗氏次畿虞鄉次畿萬泉次畿龍門次畿元祐二年置鑄錢監二榮河次畿舊隸慶成軍熙寧元年廢以榮河隸府即縣治置軍使慶成軍見上解州中防禦崇寧戶三萬二千三百五十六口一十一萬三千三百二十一貢鹽花縣三解中聞喜望安邑緊陝州大都督府陝郡太平興國初改保平軍舊兼提舉商虢州兵馬巡檢事崇寧戶四萬七千八百六口一十三萬五千七百一貢紬絁括蔞根柏子仁縣七陝中熙寧六年省硤石縣為石壕鎮入焉平陸上夏上靈寶上熙寧四年省湖城縣入焉芮城中下湖城中下元豐元年復置縣閿鄉中下太平興國三年自虢州與湖城二縣來隸監二熙寧三年置鑄銅錢八年置鑄鐵錢商州望上洛郡軍事崇寧戶七萬三千一百二十九口一十六萬二千五百三十四貢麝香枳殼實縣五上洛中商洛中下洛南中下豐陽中上津中下虢州雄虢郡軍事崇寧戶二萬二千四百九十口四萬七千五百六十三貢麝香地骨皮硯縣四盧氏中熙寧二年以西京伊陽縣欒川冶鎮隸焉虢略中唐弘農縣建隆初改常農至道三年改今名熙寧四年省玉城縣為鎮入焉朱陽中乾德六年廢入常農太平興國七年復置欒川元祐二年以欒川冶為鎮崇寧三年改為縣同州望馮翊郡定國軍節度崇寧戶八萬一千一十一口二十三萬三千九百六十五貢白蒺藜生熟乾地黃縣六馮翊緊澄城緊朝邑緊郃陽上熙寧四年省夏陽縣為鎮入焉白水中韓城中元祐二年置鑄錢監監一沙苑華州望華陰郡建隆初為鎮國軍節度皇祐五年改鎮潼軍節度崇寧戶九萬四千七百五十口二十六萬九千三百八十貢茯苓細辛茯神縣五鄭上下邽望蒲城望唐奉先縣開寶四年改建隆中自京兆隸同州天禧四年自同州來隸華陰緊渭南上熙寧六年省為鎮入鄭元豐元年復為縣舊自京兆府來隸監二熙寧四年置鑄銅錢八年置鑄鐵錢耀州緊華原郡開寶五年為感義軍節度太平興國初改感德軍崇寧戶一十萬二千六百六十七口三十四萬七千五百三十五貢瓷器縣六華原上富平望三原望雲陽上同官上美原中清平軍本鳳翔府盩厔縣清平鎮大觀元年升為軍復置終南縣隸京兆府清平軍使兼知終南縣專管勾上清太平宮縣一終南延安府中都督府延安郡彰武軍節度本延州元祐四年升為府舊置鄜延路經略安撫使統延州鄜州丹州坊州保安軍四州一軍其後增置綏德軍又置銀州凡五州二軍銀州尋廢崇寧戶五萬九百二十六口一十六萬九千二百一十六貢黃蠟麝香縣七膚施中熙寧五年省豐林縣為鎮金明縣為寨並入焉有金明龍安二寨安塞一堡元豐四年又收復塞門寨宣和二年改龍安曰德安寨延川中熙寧八年省延水縣為鎮入焉有丹頭綏平懷寧順安白草永平六寨安定黑水二堡及永寧關元豐四年收復置細浮圖義合米脂三寨七年以米脂義合浮圖懷寧順安綏平六城寨隸綏德城元符二年廢順安白草丹頭三寨延長中門山中臨真中敷政中有招安萬安二寨元符二年廢招安寨為驛甘泉中下城二治平四年收復綏州熙寧中改為綏德城四年置囉兀城撫寧賓草二堡尋廢元豐五年置永樂城賜名銀川寨尋廢青澗城元符二年隸綏德城綏德城元符二年改為軍監一熙寧八年置鑄鐵錢塞門寨延州北蕃部舊寨至道後與蘆關石堡安遠寨俱廢元豐四年收復仍隸延州膚施縣東至殄羌寨五十里西至平戎寨六十里南至安塞堡四十里北至烏延口九十里平羌寨地本克胡山寨紹聖四年賜名東至安定堡六十里西至安塞堡三十五里南至龍安寨五十四里北至殄羌寨六十里威戎城地本升平塔紹聖四年賜名東至臨夏寨四十里西至威羌寨七十里南至黑水堡六十里北至界臺七十里平戎寨地本杏子河東山紹聖四年賜名東至塞門寨六十里西至順寧寨七十里南至園林堡五十一里北至杏子堡四十里開光堡紹聖四年修築元符元年賜名二年隸綏德城殄羌寨地名那娘山元符元年進築賜名東至威羌寨四十里西至塞門寨五十里南至平羌寨六十里北至御謀城三十五里威羌寨地名白洛觜元符元年進築賜名東至威戎城七十里西至殄羌寨四十里南至安定堡七十里北至蘆移堡七十里御謀城崇寧三年進築賜名東至蘆移堡三十五里西至界臺三十五里南至殄羌寨三十五里北至界臺二十里石堡寨崇寧三年進築賜名威德軍五年復為寨國初嘗置城至道後廢之地在延州北制戎城政和八年賜鄜延路天降山新城改今名新寨蘆移堡東至屈丁堡五十里西至御謀城三十五里南至威羌寨七十里北至界臺一十三里屈丁堡萬安堡東至威戎城六十里西至蘆移堡四十里南至威羌寨四十里北至屈丁堡五十一里丹頭堡青石崖堡窟囉堡鄜州上洛交郡保大軍節度崇寧戶三萬五千四百一口九萬二千四百一十五貢麝香今改貢蠟燭縣一宜川上後魏義川縣太平興國中改名以鄜州廢咸寧縣入焉熙寧三年省汾川縣七年省雲巖縣為鎮八年析同州韓城縣新封鄉並入焉坊州上中部郡軍事崇寧戶一萬三千四百八口四萬一百九十一貢弓弦麻席縣二中部緊宜君中熙寧元年省升平縣為鎮入焉有礬場保安軍同下州崇寧戶二千四十二口六千九百三十一貢毛段蓯蓉寨二德靖東至保安軍八十里西至慶州荔原堡六十里南至慶州平戎鎮五十里北至金湯城六十里順寧東至平戎寨七十里西至金湯城九十里南至保安軍四十里北至萬全寨四十里堡一園林東至安塞堡七十里西至保安軍四十里南至招安驛七里北至平戎堡五十一里金湯城舊金湯寨在德靖寨西南元符二年進築東至順寧寨九十里西至慶州白豹城四十里南至德靖寨六十里北至通慶城六十里威德軍保安軍之北兩界上有洑流名藏底河夏人近是築城為要害必爭之地政和三年賈炎乞進築不果七年知慶州姚古克之即威德軍綏德軍唐綏州熙寧二年收復廢為城隸延州在州東北三十里元豐七年以延州米脂義合浮圖懷寧順安綏平六城寨隸綏德城元符二年改為軍並將暖泉米脂開光義合懷寧克戎臨夏綏平寨青澗城永寧關白草順安寨並隸軍暖泉寨元符二年進築賜名東至河東烏龍寨二十里西至米脂寨四十五里南至義合寨八十里北至清邊寨七十里米脂寨本西夏寨元豐四年收復為米脂城後復為寨隸延州延川縣七年改隸綏德城元祐四年給賜夏人元符元年收復仍賜舊名東至暖泉寨四十五里西至克戎城六十里南至開光堡三十里北至嗣武城二十里開光堡紹聖四年修築元符元年賜名二年自延安府來屬東至暖泉寨六十里西至克戎寨五十里南至綏德軍三十里北至米脂寨三十里義合寨本夏人寨元豐四年收復隸延州延川縣七年改隸綏德城東至晉寧軍六十里西至綏德軍四十里南至順安驛六十里北至暖泉寨八十里懷寧寨延州延川縣舊寨東至綏德軍四十里西至綏平寨四十里南至青澗城七十里北至克戎寨六十里克戎寨本西人細浮圖寨元豐四年收復隸延州延川縣七年改隸綏德城元祐四年給賜夏人紹聖四年收復賜名東至綏德軍六十里西至臨夏寨三十里南至懷寧寨六十里北至鎮邊寨六十五里臨夏寨地名囉巖谷嶺元符元年築城賜今名東至克戎寨三十里西至威戎城四十里南至綏平寨六十里北至界堠八十二里綏平寨延州延川縣舊寨元符二年割隸綏德軍東至懷寧寨四十里南至黑水堡四十里西至丹頭驛四十里北至臨夏寨六十里青澗城延州舊城東至永寧縣七十里西至來平寨七十里南至延川縣四十里北至懷寧軍七十里永寧關延州延川縣舊關白草寨延州延川縣舊寨元符二年廢後復置順安寨延州延川縣舊寨元符二年廢後復置嗣武寨舊囉兀城屬延州元豐四年置尋廢崇寧三年修復賜名東至清邊寨二十里西至鎮邊寨二十里南至米脂寨三十里北至龍泉寨二十里龍泉寨宣和二年改名通泉尋復故東至清邊寨二十里西至鎮邊寨四十里南至嗣武城二十里北至中山堡八里清邊寨東至河東界五十里西至龍泉寨二十里南至暖泉寨七十里北至生界堠一十三里以下寨堡凡不書年月者皆未詳建置本末鎮邊寨東至龍泉寨四十里西至大蟲坑二十五里南至克戎寨六十五里北至生界堠二十五里龍安寨本屬延安府膚施縣不詳何年來屬東至安定堡八十里西至招安驛四十里南至金明驛三十五里北至御安堡四十里海末堡海末至柏林十六堡黑水安定安塞本延安舊堡窟兒堡大厥堡花佛嶺堡臨川堡定遠堡馬欄堡中山堡黑水堡安定堡佛堂堡唐推堡雙林堡安塞堡浮圖堡柏林堡銀州銀川郡領儒林撫寧真鄉開光四縣五代以來為西夏所有熙寧三年收復尋棄不守元豐四年收復五年即永樂小川築新城距故銀州二十五里前據銀州大川賜名銀川寨旋被西人陷沒崇寧四年收復仍為銀州五年廢為銀川城慶陽府中安化郡慶陽軍節度本慶州建隆元年升團練乾德元年復為軍事政和七年升為節度軍額曰慶陽宣和七年改慶州為府舊置環慶路經略安撫使統慶州環州邠州寧州乾州凡五州其後廢乾州置定邊軍已而復置醴州凡統三州一軍崇寧戶二萬七千八百五十三口九萬六千四百三十三貢紫茸白花麝香黃蠟縣三安化中有大順一城府城東谷柔遠人順四寨元豐四年廢府城寨金村堡平戎鎮五年收復礓詐寨賜名安疆寨元祐元年復平戎鎮合水望熙寧四年始置省華池樂蟠二縣為鎮七年改華池鎮為華池寨有東華池西華池二寨荔原一堡彭原熙寧三年自寧州來隸安疆寨本西人礓詐寨元豐五年收復賜名元祐四年給賜夏人紹聖四年修復東至德靖寨九十里西至東谷寨六十里南至大順城四十里北至白豹城四十里又隸定邊軍橫山寨地名西攃示里元符元年進築賜名東至東谷寨界攃示里四十五里西至寧羌寨七十里南至通塞堡三十里北至定