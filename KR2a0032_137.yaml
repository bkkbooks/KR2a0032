body:
  text: 宋史卷一百三十七志第九十樂十二樂章六祭太社太稷祭風雨雷師祭先農先蠶親耕藉田蠟祭釋奠文宣王武成王祭祚德廟祭司中司命景德祭社稷三首降神靜安百穀蕃滋麗乎下土聿崇明祀垂之千古育物惟茂粒民斯普報本攸宜國章咸覩奠玉幣酌獻嘉安於穆大祀功利相宣靈壇美報歷代昭然介以蕃祉祚以豐年土爰稼穡允協民天送神靜安制幣犧齊正辭無愧樂以送之畢其精意景祐祀社稷三首迎神寧安五祀之本百貨何極道著開闢惠周動植國崇美穀民資力穡奠獻惟寅神靈來格初獻升降正安太社后土太稷后稷奠玉幣並嘉安奉俎豐安同前亞終獻文安送神寧安神之來兮降茲下土神之去兮杳無處所壇壝肅然瘞幣徹俎乃粒之功冠于萬古奉俎豐安神州地祇皇地祇與社稷通用禮崇明禋維馨斯酒潔粢豐盛殺時犉牡齊莊嚴祗升燎于槱其報伊何如山如阜大觀祀社稷九首迎神寧安黃鐘二奏惟土之尊民食資焉陰祀昭格牲牢腥羶有功于民告其吉蠲神之來享雲車翩翩太簇角二奏惟穀之神函育無窮百嘉蕃殖民依厥功嚴飭壇壝威儀肅雍神之來享祈于登豐姑洗徵二奏猗歟那歟生養斯民家給人足時底熙純祗嚴明禋於薦苾芬粢盛豐潔神乃有聞南呂羽二奏籩豆斯陳三牲告幽報本之禮答神之休來歆芬香豐登於秋倉箱千萬治符成周初獻升降正安崇崇廣壇嚴恭祀事威儀孔時周旋進止鏘若環佩誠通于幽相于農植邦其咸休奠幣嘉安於嘻陰祀封土惟崇于時之吉歆豫鼓鍾柔靜化光人賴其功陳茲量幣百貨是隆酌獻嘉安坤元生物功利相宣蠲茲祀事美報致虔清酤芬如靈壇巋然酌尊奠觴神其格焉亞終獻文安薦嘉亶時洋洋來格載登茲壇齊明維敕神用居歆順成農穡其崇若墉其比如櫛送神寧安尊罍芬香威儀肅雍靈心嘉止洋洋交通神歸降禧年斯屢豐倉箱千萬慰豫三農紹興祀太社太稷十七首迎神用寧安函鍾為宮春社用五祀之本社稷有嚴芟柞伊始夫敢不虔吉日惟戊式薦豆籩神其來格用介有年函鍾為宮秋社臘用功烈在民誕受露雨良耜既歌乃揚帗舞是奉是尊厚禮斯舉相其豐年多稌多黍太簇為角是尊是奉茲率舊章樂音純繹薦溢圓方情文備矣神其迪嘗永觀錫羡多穡穰穰姑洗為徵穀資土養民賴穀生功利之博莫之與京式嚴祠壇因物薦誠禮具樂奏惟神顧歆南呂為羽國主社稷時祀有常肅若舊典報本不忘粢盛豐潔歌吟青黃尊神倏來百物賓將盥洗正安祭重齊肅神格專精沃洗于阼涓潔著誠清明鬯矣熙事備成以似以續如坻如京升壇正安神地之道粒食有先歲謹祈報禮嚴豆籩降登祼薦罔或不虔以似以續宜屢豐年太社位奠玉幣嘉安春秋太稷土正后稷通用土發而祭農祥是祈籩豆加篚典禮有彝惟茲圭幣用告肅祗神靈降鋻錫我繁釐太社位奠玉幣嘉安秋臘太稷土正后稷通用赫赫媼神稼穡是司方是藉斂報本攸宜嘉壇建祀玉帛陳儀明靈昭格以介蕃釐還位正安國主太祀地道聿神稷司百穀利育惟均練日新吉粢盛飶芬神燕娭矣福此下民捧俎豐安嘉承天和黍稷翼翼默相農功繄神之德俎實犧牲舊章是式嗣有豐年我庾維億太社位酌獻嘉安春社太稷土正后稷通用封土崇祀有烈在民千載不昧福此人羣洗爵奠斝有酒其芬神具醉止愷樂欣欣太社位酌獻嘉安秋社臘太稷土正后稷通用叶氣嘉生年穀順成萬億及秭如坻如京奉時犉牡告於神明歌此良耜於昭德馨亞終獻文安風雨時若自天降康稼穡滋殖自神發祥穀我婦子豐年穰穰報本嚴祀齊明允臧徹豆娭安報本之禮載于甲令靈壇昭告神既來聽徹彼豆籩精誠斯罄實惟豐年農夫之慶送神寧安乃粒蒸民功昭萬古國有常祀薦獻式肅肅雍雍舊章咸舉神保聿歸介我稷黍望瘞正安地載萬物民資乃功報本稱祀太稷攸同禮樂既備訖埋愈恭神其降嘏時和歲豐熙寧祭風師五首迎神欣安飄颻而來淅瀝而下爰張其旗爰整其駕有豆有登有兆有壇弭旌柅輈降止且安升降欽安盥帨于下有盤有匜饋酌于上有登有彝服容柔止進退優止即事寅恭神其休止奠幣容安育我嘉生神惠是仰載致斯幣庶幾用享鼓之舞之式繄爾神錫福無疆佑此下民亞終獻雍安栗栗壇坫載是豆觴醇烈氤氳普薦芬芳酌之維宜獻之維時民有報侑靈用安之送神欣安奠獻紛紛靈心欣欣超然而返衆御如雲其施伊何多黍多稌其祥伊何不愆厥大觀祭風師六首降神欣安羽旗雲車飄颻自天猗歟南箕歆嘉升煙牲餼粢盛俎簋鉶籩維神戾止從空泠然初獻升降欽安明昭惟馨威儀孔時鏘鏘鳴佩欽薦牲犧惟恭惟祗無愆無違周旋中禮肅恭委蛇奠幣容安吹噓于喁披拂氤氳衆竅咸作潛運化鈞恩大功豐酬神維恭嘉贈盈箱于物有容酌獻雍安犧尊斯陳清酤盈中芬芬苾苾馨香交通明靈來思歆我精衷維千萬祀品物芃芃亞終獻雍安清酤洋洋虔恭注茲條鬯敷宣神用歆之尊罍靜嘉金奏諧熙於皇肆祀休我羣黎送神欣安窈冥無窮肸蠁斯融來終嘉薦歸返遙空惟神之歸欣安導和惟神之澤于彼滂沱雨師五首迎神欣安神之無象亦可思索維雲陰陰維風莫莫降止壇宇來顧芳馨侑以鼓歌薦此明誠升降欽安佩玉璆如黼黻襜如承神不懈訖獲嘉虞聖皇命祀臣敢弗恭凡爾在位翼翼雍雍奠幣容安崇崇壇階靈既降止有嚴執奠承祀茲始明靈在天式顧庶察澤潤以時永拂荒札酌獻亞終獻雍安寅恭我神惟上之使俾成康年民徯休祉折俎既登酒既盈匪薦是專配以明誠送神欣安牲俎告徹嘉樂休成卒事有嚴燕虞高靈蕃我民人育我稷黍萬有千祀承神之祜紹興祭風師六首迎神欣安夫物絪縕神氣撓之誰歟其司維南之箕俶哉明庶我祀維時我心孔勞神其下來初獻升降盥洗欽安神哉沛矣厥靈載揚揚靈如何剡剡皇皇我其承之繩繩齊莊往從鬱人爰俠斯芳奠幣容安物之流形甚畏瘥癘八風平矣嘉生以遂絲縷之積有量斯幣惟本之報匪物之貴酌獻雍安我求於神無臭無聲神之燕饗惟時專精大磬在列槱燎在庭侑我桂酒娭其以聽亞終獻禮有三祀儀物視帝神臨消搖疇敢跛倚重觴載申百味孔旨神兮樂康答我以祉送神曲同迎神荃其止乎禗禗其容奄橫四海蹇莫之窮時不驟得禮焉有終荃其行乎余心雨師雷神七首迎神欣安衆萬之託動之潤之昭格孔時維神之依泠然後先肆我肯顧是耶非耶紛其來下初獻盥洗升降欽安言言祠宮爰考我禮維西有罍維東有洗爰潔爰滌載薦其醴神在何斯匪遠具邇奠幣容安霈兮隱兮蹶其陰威相我有終胡寧不知我幣有陳我邸斯圭豈維有陳于以奠之雨師位酌獻雍安山川出雲裔裔而縷載霪載濛其德乃溥自古有年胡然莫祖無簡我觴無怠我俎雷神位酌獻曲同雨師瞻彼南山有虺其出維蟄之奮惟癘之息眷焉顧饗在夏之日觴豆匪報皇忍忘德亞終獻曲同初獻作解之德形聲一兮爰展獻侑酌則三兮我興有假云胡有私下土是冒庶其遠而送神曲同迎神陰旄載旋鼓車其鞭問神安歸冥然而天皇有正命祀事孔蠲其臨其歸億萬斯年雍熙享先農六首餘同祈穀降神靜安先農播種九穀務滋靈壇致享良耜陳儀吉日惟亥運屬純熙樂之作矣神其格思奠玉幣敷安親耕展祀明靈來格九有駿奔百司庇職獻奠肅肅登降翼翼祈彼豐穰福流萬國奉俎豐安肅陳韶舞祗薦犧牲乃逆黃俎以率躬耕亞獻正安祀惟古典食乃民天歆茲潔祀以應祈年終獻正安式陳芳薦爰致虔誠神其降鑒永福黎氓送神靜安明禋紺壇靈風肅然登歌巳闋神馭將旋道光帝籍禮備公田鑒茲躬稼永賜豐年明道親享先農十首迎神靜安稼政之本民食惟天甫田兆歲后稷其先靈壇既祀黛耜攸虔乃聖能享億萬斯年皇帝升降隆安冕服在御壇壝有儀陟降左右天惟顯思奠玉幣嘉安將躬黛耜先陟靈壇嘉玉量幣樂舉禮殫神既至止福亦和安千斯積詠萬國多歡奉俎豐安將迎景福乃薦嘉牲籍于千畝用此精誠皇帝初獻禧安雲罍已實玉爵有舟薦于靈籍佇乃神休飲福禧安神既至饗福亦來酬申錫純嘏旨酒惟柔思文后稷貽我來牟子孫千億丕荷天休退文舞進武舞正安羽葆有奕文武交相周旋合度福祿無疆亞獻正安豆籩雖薦黍稷非馨惠我豐歲歆茲至誠終獻正安歆我嘉薦錫我蕃禧多黍多稌如京如坻送神靜安獻終豆徹禮備樂成祠容肅肅風馭冥冥三時務本一躬耕人祇胥悅祉福是膺景祐饗先農五首迎神凝安在昔神農首茲播殖無有污萊盡為稼穡乃粒斯民實惟帝力嘉薦令芳佇瞻來格升降同安居德之厚厥祀攸陳土膏初脈農事先春鏗然金奏儼若華紳陟降于阼福祿惟神奠幣明安農為政本食乃民天苾芬明祀藨蔉良田陳茲量幣望彼豐年茂介福祉來欽吉蠲酌獻成安農祥晨正平秩東作倬彼大田庤乃錢鎛酒醴盈尊金璆合樂期茲萬年充于六幕送神凝安務嗇之本恤祀惟馨神斯至止降福攸寧崇茲稼政合于禮經俎徹樂闋邈仰回靈先蠶六首迎神明安生民之朔衣皮而羣惟聖有作被冒以文禮樂以成貴賤以分欲報之德金石諧均升降翊安掩抑笙簫鏗谹金石神來宴娭嘉我休德奉祀之臣洗心翊翊錫茲福禧以惠四國奠幣娭安皇天降物屢化若神聖實先識躬以教民功被天下為萬世文幣以達志庶幾徹聞酌獻美安敻哉聖神成功微妙乃袞乃裳以供郊廟百末旨酒嘉觴自照靈徠宴饗不嚬以笑亞終獻惠安神之徠駕蹌蹌紫壇熙燭夜光會竽瑟鳴球琅薦旨酒雜蘭芳佑明德錫百祥送神祥安神之功兮四海所宗占五帝兮莫與比崇倏往來兮旌騎容容恭明祀兮萬世無窮紹興享先農十一首皇帝入內壝盥洗隆安大事在祀齊潔為先既盥而升奉以周旋下觀而化無敢不蠲惟神降格監厥精虔迎神靜安猗歟田祖粒食之宗世世仰德青壇載崇時惟后稷躬稼同功作配並祀以詔無窮神農后稷位奠幣嘉安制為量幣厚意是將求之以類各因其方于以奠之精誠允彰神其享止惠我無疆尚書奉俎豐安柔毛剛鬣或剝或烹為俎孔碩登薦厥誠酌獻禧安蠲滌盞斝巾帨而升挹彼注茲酒醴維清洋洋在上享于克誠神其孚佑以厚民生文舞退武舞進正安羽毛干戚張弛則殊進旅退旅匪棘匪舒亞獻正安顯相祀事濟濟鏘鏘舉斝酌醴神其允臧終獻正安殽核維旅酒醴維馨于再于三禮則有成飲福禧安幽明位異施報理同克恭明神降福乃豐我膺受之來燕來崇豈伊專饗于彼三農徹豆歆安莫重於祭非禮不成籩豆有踐爾殽既馨神具醉止薦以齊明贊徹孔時釐事斯成送神靜安神之來止風駛雲翔神之旋歸有迎有將歌以送之磬管鏘鏘何以惠民豐年穰穰親耕藉田七首皇帝出大次乾安勤勞稼穡必躬必親為藉千畝以教導民帝出乎震時惟上春天顏咫尺望之如雲親耕元辰既擇禮備樂成洪縻在手祗飾專精三推一端冕朱紘靡辭染屨以示黎氓升壇方壇屹立陛級而登玉色下照臨觀耦耕萬目咸覩如日之升成規成矩百祿是膺公卿耕藉羣公顯相奉事齋莊率時農夫舉耜載揚播厥百穀以佑我皇多黍多稌丕應農祥羣官耕藉畟畟良耜我田既臧土膏其動春日載陽執事有恪于此中邦農夫之慶棲畝餘糧降壇肇新帝藉率我農人三推終畝祗事咸均陟降孔時粲然有文受天之祜多稼如雲歸大次教民稼穡不令而行進退有度琚瑀鏘鳴言還熉幄禮則告成帝命率育明德惟馨紹興祀先農攝事七首迎神凝安青陽開動土膏脈起日練吉亥為農祈祉典秩增峻儀物具美幄光熉黃庶幾戾止初獻升殿同安盥洗同率職咸涖禮容睟然澡身端意陟降靡愆神心嘉虞饗茲潔蠲敷錫純佑屢登豐年奠幣明安靈斿載臨見先陳贄有嚴篚實式將純意肸蠁既接禮行有次神兮安留歆我禋祀神農位酌獻成安耒耜之教帝實開先致養垂利古今民天嘉薦報本于以祈年誠格和應神娭福延后稷位酌獻成安有周膺曆實起后稷相時豐功率由稼穡振古稱祀先農並食阜我昌我時萬時億亞終獻同安旨具百味酌備三疇二觴既畢禮洽意周庶幾嘉饗格神之幽相我穡事錫以有秋送神凝安熙事成兮始終潔齊籩豆徹兮撙節靡垂靈有嘉兮降福孔皆票然逝兮我心孔懷祀先蠶六首迎神明安功被寰宇蟲之靈有神司之以生以成典禮有初祀事講明孔蓋翠旌降集于庭初獻盥洗升殿翊安降同靈修戾止詔以毛血既盥而帨尊爵蠲潔金石諧宛登降有節宜顧宜饗情文不越奠幣娛安化日初長時當暮春蠶事方興惟后惟嬪絲纊御冬殘生濟人敢忘報本篚幣是陳酌獻美安盛服承祀出自公桑衣不羽皮利及萬方百味旨酒有飶其香神其歆止洋洋在傍亞終獻惠安日吉辰良禮備樂作精誠內孚俎豆交錯升歌清越侑此三爵黎民不寒幽顯同樂送神祥安神之來矣靈風肅然云胡不留歸旐有翩乃舉舊典歲以告虔降福我邦於萬斯年景德蠟祭百神三首降神高安百物蕃阜四方順成通其八蠟合乃嘉平旨酒斯醇大庖孔盈萬靈來格威儀以成奠玉幣酌獻嘉安肅肅靈壇昭昭上天潔粢豐盛以享以虔百神咸萃六樂斯縣介茲景福期於有年送神高安來顧來享禮成樂備靈馭翩翩雲行雨施熙寧蠟祭十三首東西郊降神熙安天錫康年四方順成乃通蠟祭索享于明金石四作羽旄翠旌神來宴娭澤被羣生升降肅安惟蠟有祭報神之功合聚萬物來享來宗承詔攝事不忘肅雍靈之格思福祿來崇奠幣欽安穰穰豐年繄侯休德帥承天和欽象古則嘉玉量幣奠容翼翼靈施暨民罔有終極奉俎承安禮崇明祀必先成民奉牲以告備腯其均炮炙芬芬俎豆莘莘錫之純嘏以佑斯人酌獻懌安秩秩禮文為壇四方嘉栗旨酒百神迪嘗敷與萬物既阜既昌伊樂厥福傳世無疆亞終獻慶安禮文備矣肅肅無譁金石諧節圭璧光華粢以告豐醴以告嘉錫茲福祉以澤幽遐送神宣安靈之來下擴景乘光靈之回御景龍以驤鑒我休德降嘏産祥大田多稼以惠無疆南北方迎神簡安美若休德民和歲豐稼穡雲施其積如墉惠我四國先嗇之功祭之百種來享來宗升降穆安皇皇靈德經緯萬方承詔攝事陟降以莊高冠岌長佩鏘洋嘉承神貺令聞不忘奠幣吉安於穆明祀莫如報功靈之利澤惠我無窮齋以滌志幣以達衷撫寧四極永錫登豐酌獻禔安英英禮文既備而全嚴嚴四郊屹屹紫壇百末旨酒其敷若蘭何以畀民既壽而安亞終獻曼安林林生民含哺而嬉教之稼穡實神之為圖報厚德萬祀無期以假以享錫我繁禧送神成安嘉薦芳美靈來宴娭斿車結雲若風馬馳既至而喜錫我蕃禧嘉承天貺曼壽無期大觀蠟祭二首東郊亞終獻慶安震乘春陽仁司生殖錫我歲豐襄我民力誰其尸之宗子先嗇億萬斯年懷神罔極南郊升降穆安穆如薰風敷舒文藻氣蒸消除豐豫黍稻神之聽之鍾鼓咸考於萬斯年惟皇之報紹興以後蠟祭四十二首東方百神降神熙安圜鍾為宮玄冥凌厲歲聿其周天地閉藏農且息休古大蠟禮伊耆肇修爰薦飶馨以迓飈遊黃鍾為角惟大明尊實首三辰功赫庶物光被廣輪歲方索饗咸秩羣神靈斿來下尸此明禋太簇為徵三時不害四方順成酬功報始以我齊明豳頌土鼓樂此嘉平降祥幅員惠于函生姑洗為羽日昱乎晝容光必照肸蠁之交惟人所召有監在下視茲升燎肅若其承雲駢星曜初獻升降肅安禮儀告具心儼容莊工歌屢奏聲和義章崇壇陟降濟濟蹌蹌靈光共仰嘉薦芬芳大明位奠玉幣欽安晨曦未融天宇澄穆有虔秉誠將以幣玉如在左右罔不祗肅神兮安留錫以祉福帝神農氏位奠幣曲同大明農為政本食乃民天神農氏作民始力田先嗇之配禮報則然有幣將之維以告虔后稷氏位奠幣曲同大明播種之功時惟后稷推以配天莫匪爾極崇侑清祀是為司嗇陳幣奠將永祚王國奉俎承安享以精禋馨非稷黍工祝致告孔碩為俎執事駿奔繩繩具舉神之嘉虞介福是與大明位酌獻擇安肇禋備祀教民美報時和歲豐奉醴以告惟照臨功等於載燾酌獻云初明神所勞神農位酌獻曲同大明惟酒欣欣惟神冥冥是顧是饗來燕來寧耒耜之利神所肇興萬世永賴無斁其承后稷位酌獻曲同大明釋之蒸之為酒為醴推本所由於焉洽禮周邦開基邰家是啓獻茲嘉觴拜下首稽亞終獻慶安申以二觴百味且旨禮告三終神具醉止旌容騎沓揚光紛委降福穰穰被大豐美送神宣安禮樂既成神保聿歸言歸何所地紀天維豈惟屢豐嗣歲所祈億萬斯年神來燕娭西方百神降神熙安圜鍾為宮玄冬肇祀始于伊耆歲事聿成庸答蕃釐眷言西顧匪神司之歸功爾神翩其下來黃鍾為角魄生自西照望太陽下暨諸神貺施萬方節適風雨富我囷箱共承嘉祀惟以迪嘗太簇為徵神罔小大奠方茲土祭列坊庸禮逮貓虎有功斯民祀乃其所非稷馨香厥福周溥姑洗為羽豐年穰穰美芳職職籩豆方圓其儀孔碩風馬在御雲車載飭來顧來饗維俟休德初獻升降肅安盥獻恭莊燎煙芬酷載陟載降禮容可度欽惟爾神上下肅肅成我稷黍鑒此牲玉夜明位奠玉幣欽安穆穆太陰禮嚴姊事璧玉華光推以裒對十二周天歲乃有終盡我備物莫報元功神農位奠幣曲同夜明耒耜肇興自神農氏稼穡滋殖為農者始作配明祀奠以告虔萬世佃漁帝功卓然后稷位奠幣曲同夜明明明周祖惟民之恤播種為教下民乃粒曾是索饗而匪先公萬物難報阡陌之功奉俎承安時和歲登物亡疾瘯實俎間膏報神之福匪神福之曷成且豐肥腯咸有惟神之功夜明位酌獻擇安除壇西郊坎其擊鼓百靈至止結璘作主秬鬯湛淡玉斝觩是謂嘉德神其安留神農位酌獻曲同夜明蕩蕩鴻明稱秩羣祀配以昔帝式重農事潔我圭瓚黃流在中靈其監茲肸蠁豐融后稷位酌獻曲同夜明歲十二月祀有常典祭列司嗇言反其本酌彼泰尊百末蘭生承神嘉虞繄此德馨亞終獻慶安歌磬臚歡膋蕭激香飈御奄留申以二觴相與震淡告靈其醉庶幾聽之成我熙事送神宣安禮備樂成淡然將歸其留消搖象輿已轙偃蹇欲驤羽毛紛委忽乘杳冥遺此福祉南方百神迎神簡安維物之精散乎太空維索之饗合聚而同乃擊土鼓于歲之終格彼幽矣肸蠁其通初獻盥洗升降穆安有帨其新有匜其潔言念清祀弗簡弗褻誠意既交品物斯列是用告虔靡神不説奠幣吉安百室機杼衣褐具宜民以卒歲神實惠之言舉祀典答神之釐有篚斯陳振古如茲神農位酌獻穆安肇降生民有不粒食維時神農乃為先嗇爾耒爾耨云誰之因酌以汙尊我思古人后稷位酌獻穆安維后之功配天其大祀而稷之萬世如在黃冠野服駿奔皇皇自古有年神其降康亞終獻曼安豐年孔多百禮以洽匪極神歡何以昭答載酌之酒用申其勤神具醉止與物交欣送神成安卒爵樂闋禮儀告備神保聿歸敢以辭致順成之方其蠟乃通自今以始八方攸同北方百神迎神簡安蕩蕩閫決氣清泬寥倣佛象輿麗于穹霄蹇其來下肅然風票神乎安留於焉消搖初獻盥洗升降穆安齊誠揭虔敬恭祀事維儼之容維潔之器雍雍樂成肅肅禮備神其燕娭錫祉庶類奠幣吉安配位同神宅于幽沈沈至和塞明考我德音神聽靜嘉儼乎若臨幣以薦誠敢有弗欽神農氏位酌獻禔安先嗇之功神實稱首以耜以耒俶載南畝列籍皇墳億世是守何以為報爰潔茲酒后稷氏位酌獻禔安煌煌后稷實配于天司嗇作稼民以有年匪神之私歲以醴告酌彼泰尊于德之報亞終獻曼安蘭生百末申以二觴神具醉止爛其容光遺我豐年萬億及秭俾民歡康以洽百禮送神成安靈之來兮虯龍沓沓下土光景憑陵閶闔靈之旋兮羽衛委蛇偃蹇高驤遺此蕃釐景祐祭文宣王廟六首迎神凝安大哉至聖文教之宗紀綱王化丕變民風常祀有秩備物有容神其格思是仰是崇初獻升降同安右文興化憲古師今明祀有典吉日惟丁豐犧在俎雅奏來庭周旋陟降福祉是膺奠幣明安一王垂法千古作程有儀可仰無德而名齊以滌志幣以達誠禮容合度黍稷非馨酌獻成安自天生聖垂範百王恪恭明祀陟降上庠酌彼醇旨薦此令芳三獻成禮率由舊章飲福綏安犧象在前豆籩在列以享以薦既芬既潔禮成樂備人和神悅祭則受福率遵無越兗國公配位酌獻成安哲宗朝增此一曲無疆之祀配侑可宗事舉以類與享其從嘉栗旨酒登薦惟恭降此遐福令儀肅雍送神凝安肅肅庠序祀事惟明大哉宣父將聖多能歆馨肸蠁回馭凌兢祭容斯畢百福是膺大觀三年釋奠六首迎神凝安仰之彌高鑽之彌堅於昭斯文被于萬年膠庠神其來止思款無窮敢忘于始升降同安生民以來道莫與京溫良恭儉惟神惟明我潔尊罍陳茲芹藻言升言旋式崇斯教奠幣明安於論鼓鍾于茲西雍粢盛肥碩有顯其容其容洋洋咸瞻像設幣以達誠歆我明潔酌獻成安道德淵源斯文之宗功名粳粃素王之風碩兮斯牲芬兮斯酒綏我無疆與天為久配位酌獻成安儼然冠纓崇然廟庭百王承祀涓辰惟丁于牲于醑其從豫享與聖為徒其德不爽送神凝安肅莊紳緌吉蠲牲犧於皇明祀薦登惟時神之來兮肸蠁之隨神之去兮休嘉之貽大晟府擬撰釋奠十四首迎神凝安黃鍾為宮大哉宣聖道德尊崇維持王化斯民是宗典祀有常精純並隆神其來格於昭盛容大呂為角生而知之有教無私成均之祀威儀孔時維茲初丁潔我盛粢永適其道萬世之師太簇為徵巍巍堂堂其道如天清明之象應物而然時維上丁備物薦誠維新禮典樂諧中聲應鍾為羽聖王生知闡乃儒規詩書文教萬世昭垂良日惟丁靈承不爽揭此精虔神其來饗初獻盥洗同安右文興化憲古師經明祀有典吉日惟丁豐犧在俎雅奏在庭周旋陟降福祉是膺升殿同安誕興斯文經天緯地功加于民實千萬世笙鏞和鳴粢盛豐備肅肅降登歆茲秩祀奠幣明安自生民來誰底其盛惟王神明度越前聖粢幣具成禮容斯稱黍稷非馨惟神之聽奉俎豐安道同乎天人倫之至有饗無窮其興萬世既潔斯牲粢明醑旨不懈以忱神之來暨文宣王位酌獻成安大哉聖王實天生德作樂以崇時祀無斁清酤惟馨嘉牲孔碩薦羞神明庶幾昭格兗國公位酌獻成安庶幾屢空淵源深矣亞聖宣猷百世宜祀吉蠲斯辰昭陳尊簋旨酒欣欣神其來止鄒國公位酌獻成安道之由興於皇宣聖惟公之傳人知趨正與饗在堂情文實稱萬年承休假哉天命亞終獻用文安百王宗師生民物軌瞻之洋洋神其寧止酌彼金罍惟清且旨登獻惟三於嘻成禮徹豆娛安犧象在前豆籩在列以饗以薦既芬既潔禮成樂備人和神悅祭則受福率遵無越送神凝安有嚴學宮四方來宗恪恭祀事威儀雍雍歆茲惟馨飈馭旋復明禋斯畢咸膺百福景祐釋奠武成王六首迎神凝安維師尚父四履分封靈神峻密祀事寅恭蕭薌祗薦飈馭排空如幾如式福祿來崇太尉升降同安上公攝事袞服斯皇禮容濟濟佩響鏘鏘靈斿惚恍嘉薦令芳神具醉止降福穰穰奠幣明安四嶽之裔涼彼武王發揚蹈厲周室用昌追封廟食簡册增芳升幣以奠磬管鏘鏘酌獻成安獵渭之陽理冥嘉應非龍非彪聿求元聖平易近民五月報政祀典之崇於斯為盛飲福綏安神機經武隆周之𧜛表海分封邁燕超魯耽耽廟貌俎豆有序薦福邦家維師尚父送神凝安聖朝稽古崇茲武經禮交樂舉于神之庭嘉栗旨酒既饗芳馨永嚴列象劍舄簪纓熙寧祀武成王一首初獻升降同安武德洸洸日靖四方百王所祀休有烈光命官攝事佩玉鏘鏘思皇多祜以惠無疆大觀祀武成王一首酌獻成安涼彼周王君臣相遇終謀其成諸侯來許洋洋神靈尊載酒醑新聲為侑笙簫備舉紹興釋奠武成王七首迎神凝安姑洗為宮於赫烈武光昭古今載嚴祀事敕備惟欽既潔其牲既諧其音神之格思來顧來歆初獻升殿同安肅肅廟中有嚴階墄匪棘匪徐進退可則冕服是儀環珮有節神之鑒觀率履不越奠幣明安祀率舊典禮崇駿功齊明衷正肸蠁豐融量幣肅備周旋鞠躬神其昭受幽贊無窮正位酌獻成安赫赫尚父時維鷹揚神潛韜略襟抱帝王談笑致主竹帛流芳國有嚴祀載稽典常留侯位酌獻眷彼留侯奇籌贊漢依乘風雲勒成功旦克配明禋儀刑有煥英氣如生來格來衎亞終獻正安道助文德言為世師功名不泯祀事無遺旨酒惟馨具醉在茲有嘉纍獻神其燕娭送神日惟上戊神顧精純禮備三獻樂成七均奄留洋洋流福無垠言還恍惚空想如存紹興祀祚德廟八首迎神凝安姑洗為宮匿孤立後惟義惟忠昔者神考追録乃功祀典載加進爵錫公神兮降格尚鑒褒崇初獻升降同安廟宇更新輪奐豐敞神靈如在英姿颯爽執事進趨降升俯仰威儀翼翼虔祈歆饗奠幣明安牲薦碩大幣致精純聿升祀事茲用兼陳箱篚既實奠獻惟寅饗我至意福祿來成強濟公位酌獻成安以身託孤實惟死友撫嫗長之若父若母潛授于韓克興厥後崇廟以獻德侈報厚英略公位酌獻成安立孤固難死亦匪易義輕一身開先趙嗣肅穆廟貌列有餘氣式旋嘉薦昭哉祀事啓佑公位酌獻成安於皇時宋永祚有基始繄覆護扶而立之敢忘昭答牲分酒釃靈其燕饗益相本支亞終獻用正安靈宇神安且翔三哲鼎峙中薦嘉觴若義氣千載彌光猗其祐之錫羡無疆送神凝安禮樂云備畢觴爾神翊翊音送轙輿若聞駕言歸兮靈斿結雲祚我千億介福來臻司中司命五首迎神欣安冠兮服章蕤蕤靈來下兮進止委蛇我涓我壇我潔我俎降輿卻旌於茲享御升降欽安紳緌舒舒佩環鏗鏗陟降上下壇燎光明有盥于罍有帨于巾不吳不敖庶以安神奠幣容安我誠既潔我豆既豐神來降斯有儼其容薦此嘉幣肅肅雍雍何以侑之於樂鼓鍾酌獻雍安酌茲旨酒既盈且芬式用來歆衎衎熏熏何以寧神薦有嘉籩何以錫民曰惟豐年送神欣安雲兮飄飄風兮稜稜飈馭返空杲日來升歸旆揚揚衆樂鏘鏘我神式歡惠我嘉祥五龍六首迎神禧安靈之智兮躍漢潛幽欲豢擾兮無董與劉陳金石兮佐侑牢羞庶燕享兮澤應民求升降雅安靈之至兮逸駕騰驤噓雲吸氣承祀日光展詩鳴律肅莊琳琅何以膺神貺惠無疆奠幣文安維靈德兮變化不常沛天澤兮周流八荒奠嘉幣兮肅雍不忘永佑民兮錫以豐穰酌獻愷安練吉日兮進神之堂牲既陳兮粢盛既香奠桂酒兮容與嘉觴靈安留兮錫我福祥亞終獻嘉安明明天子禮文咸秩矧神之功橫被九域雲施稱民物産滋殖嘉承惠和罔有終極送神登安靈之來下以雨先驅靈之旋馭五雲結車操環應夏發匣瑞虞真人在御來獻珍符
