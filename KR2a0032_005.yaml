body:
  text: 宋史卷五本紀第五太宗二二年春正月丙辰以德恭為左武衛大將軍判濟州封定安侯德隆為右武衛大將軍判沂州封長寧侯右補闕劉蒙叟通判濟州起居舍人韓儉通判沂州乙丑賜德恭德隆常奉外支錢三百萬二月戊寅權交州留後黎桓遣使來貢乙未夏州李繼遷誘殺汝州團練使曹光實己亥占城遣使來貢三月己未親試禮部舉人江南民饑許渡江自占夏四月乙亥朔遣使行江南諸州振饑民及察官吏能否戊寅遣忠武軍節度使潘美復屯三交口己卯詔以帝所生官舍作啓聖院己丑殿前承旨王著坐監資州兵為姦贓棄市庚子甘露降後苑辛丑夏州行營破西蕃息利族斬其代州刺史折羅遇並弟埋乞又破保洗兩族降五十餘族五月甲子幸城南觀麥賜田夫布帛天長軍蝝生六月甲戌朔河西行營言獲岌羅賦等十四族焚千餘帳戊子復禁鹽榷酤秋七月庚申詔諸道轉運使及長吏宜乘豐儲廩以防水旱八月癸酉朔遣使按問兩浙荊湖福建江南東西路淮南諸州刑獄仍察官吏勤惰以聞癸巳西南奉化王子以慈來貢是月瀛莫二州大水九月丙午以歲無兵凶除十惡官吏犯贓謀故劫殺外死罪減降流以下釋之及蠲江浙諸州民逋租庚戌重九賜近臣飲于李昉第召諸王節度使宴射苑中是夕楚王宮火辛亥廢楚王元佐為庶人均州安置丁巳羣臣請留元佐養疾京師許之己未西南蕃王遣使來貢己巳禁海賈閏月癸未太白入南斗甲申幸天駟監賜從臣馬乙未禁雍管殺人祭鬼及僧人置妻孥己亥坊州獻一角獸冬十月辛丑朔慮囚丙午以天竺僧天息災施護法天並為朝請大夫試鴻臚少卿己酉汴河主糧胥吏坐奪漕軍口糧斷腕徇于河畔三日斬之甲寅黎邛部蠻王子來貢十一月壬午狩于近郊以所獲獻太廟著為令戊子禱雪辛卯詔在官丁父母憂者並放離任十二月庚子朔日有食之癸卯南康軍言雪降三尺大江冰合可勝重載丁未遣中使賜緣邊戍卒襦袴丙辰門下侍郎兼刑部尚書平章事宋琪罷守本官三年春正月辛未右武衛大將軍長寧侯德隆薨以其弟德彝嗣侯仍知沂州庚辰夜漏一刻北方有赤氣如城至明不散己丑知雄州賀令圖等請伐契丹取燕薊故地庚寅北伐以天平軍節度使曹彬為幽州道行營前軍馬步水陸都部署河陽三城節度使崔彥進副之侍衛馬軍都指揮使彰化軍節度使米信為西北道都部署沙州觀察使杜彥圭副之以其衆出雄州侍衛步軍都指揮使靜難軍節度使田重進為定州路都部署出飛狐戊戌參知政事李至罷為禮部侍郎二月壬子以檢校太師忠武軍節度使潘美為雲應朔等州都部署雲州觀察使楊業副之出鴈門三月癸酉曹彬與契丹兵戰固安南克其城丁丑田重進戰飛狐北又破之潘美自西陘入與契丹兵遇追至寰州破之其刺史趙彥辛以城降辛巳曹彬克涿州潘美圍朔州其節度副使趙希贊以城降癸未田重進戰飛狐北獲其西南面招安使大鵬翼康州刺史馬頵馬軍指揮使何萬通乙酉曹彬敗契丹于涿州南殺其相賀斯丁亥潘美師至應州其節度副使艾正觀察判官宋雄以城降司門員外郎王延範與祕書丞陸坦戎城縣主簿田辨術士劉昂坐謀不軌棄市庚寅武寧軍節度使同平章事岐國公陳洪進卒辛卯田重進攻飛狐其守將呂行德張繼從劉知進等舉城降以其縣為飛狐軍占城國遣使來貢丙申進圍靈丘其守將穆超以城降夏四月辛丑潘美克雲州田重進戰飛狐北破其衆壬寅曹彬米信戰新城東北又破之己酉田重進再戰飛狐北再破之殺二將乙卯重進至蔚州其牙校李存璋許彥欽殺大將蕭啜理執其監城使同州節度使耿紹忠以城降五月庚午曹彬之師大敗于岐溝關收衆夜渡拒馬河退屯易州知幽州行府事劉保勳死之丙子召曹彬崔彥進米信歸闕命田重進屯定州潘美還代州徙雲應寰朔吏民及吐渾部族分置河東京西會契丹十萬衆復陷寰州楊業護送遷民遇之苦戰力盡為所禽守節而死六月戊戌朔日有食之甲辰以御史中丞辛仲甫為參知政事秋七月庚午貶曹彬為右驍衛上將軍崔彥進為右武衛上將軍米信為右屯衛上將軍杜彥圭為均州團練使應羣臣列校死事及陷敵者録其子孫壬午徙山後降民至河南府許汝等州丁亥以簽署樞密院事張齊賢為給事中知代州癸巳階州福津縣有大山飛來自龍帝峽壅江水逆流壞民田數百里甲午詔改陳王元祐為元僖韓王元休為元侃冀王元雋為元份八月丁酉朔以王沔張宏並為樞密副使丁未大雨遣使禱嶽瀆至夕雨止劍州民饑遣使振之因督捕諸州盜賊辛亥降潘美為檢校太保贈楊業太尉大同軍節度使九月丙寅朔減兩京諸州繫囚流以下一等杖罪釋之賜所徙寰應蔚等州民米升宣等十四州雍熙二年官所振貸並蠲之戊寅賜北征軍士陳亡者家三月糧冬十月甲辰以陳王元僖為開封尹壬子高麗國王遣使來貢庚申詔以權靜海軍留後黎桓為本軍節度十一月丙戌幸建隆觀相國寺祈雪十二月乙未朔大雨雪宴羣臣玉華殿己亥定州田重進入契丹界攻下岐溝關壬寅契丹敗劉廷讓軍於君子館執先鋒將賀令圖高陽關部署楊重進死之壬子建房州為保康軍以右衛上將軍劉繼元為節度使代州副部署盧漢贇敗契丹于土鐙堡斬獲甚衆殺監軍舍利二人是歲壽州大水濮州蝗四年春正月甲子朔不受朝羣臣詣閣拜表稱賀己卯遣使按問西川嶺南江浙等路刑獄丙戌詔應行營將士戰敗潰散者並釋不問緣邊城堡備禦有勞可紀者所在以聞瘞暴骸死事者廩給其家録死事文武官子孫蠲河北雍熙三年以前逋租敵所蹂踐者給復三年軍所過二年餘一年二月丙申以漢南國王錢俶為武勝軍節度使徙封南陽國王丁酉繕治河北諸州軍城隍甲寅錢俶改封許王三月庚辰詔申嚴考績夏四月癸巳朔以御史中丞趙昌言為右諫議大夫樞密副使乙未詔諸州郡暑月五日一滌囹圄給飲漿病者令醫治小罪即決之丁未幸金明池觀水嬉遂習射瓊林苑登樓擲金錢繒綵於樓下縱民取之併水陸發運為一司五月丙寅遣使市諸道民馬庚辰改殿前司日騎為捧日驍猛為拱辰雄勇為神勇上鐵林為殿前司虎翼腰弩為神射侍衛步軍司鐵林為侍衛司虎翼丁亥詔諸州送醫術人校業太醫署賜諸將陳圖六月丁酉以右驍衛上將軍劉廷讓為雄州都部署戊戌以彰國軍節度使駙馬都尉王承衍為貝冀都部署郭守文及郢州團練使田欽祚並為北面排陳使庚子定國軍節度使崔翰復為高陽關兵馬都部署是月鄜州獻馬前足如牛秋七月丙寅幸講武池觀魚是月置三班院八月庚子免諸州吏所逋京倉米二十六萬七千石九月癸亥校醫術人優者為翰林學生冬十月丙午流雄州都部署劉廷讓于商州壬子左僕射致仕沈倫薨十一月庚辰詔以實數給百官奉十二月壬寅幸建隆觀相國寺祈雪庚戌畋近郊丁巳大雨雪端拱元年春正月己未朔不受朝羣臣詣閣拜表稱賀乙亥親耕籍田還御丹鳳樓大赦改元除十惡官吏犯贓至殺人者不赦外民年七十以上賜爵一級癸未幸玉津園習射乙酉禁用酷刑是月澶州黃河清二月乙未改左右補闕為左右司諫左右拾遺為左右正言丙申禁諸州獻珍禽奇獸己亥詔瀛州民為敵所侵暴者賜三年租復其役五年庚子以籍田開封尹陳王元僖進封許王元侃襄王元份越王錢俶鄧王中書門下平章事李昉為尚書右僕射參知政事呂蒙正同中書門下平章事樞密使王顯加檢校太傅給事中許國公趙普守太保兼侍中參知政事辛仲甫加戶部侍郎樞密副使趙昌言加工部侍郎樞密副使王沔為參知政事御史中丞張宏為樞密副使餘內外並加恩甲辰升建州為建寧軍節度庚戌以子元偓為左衛上將軍徐國公元稱為右衛上將軍涇國公三月甲戌貶樞密副使趙昌言為崇信軍行軍司馬乙亥鄭州團練使侯莫陳利用坐不法配商州禁錮尋賜死癸未幸玉津園習射廢水陸發運司夏四月丁亥賜京城高年帛己丑加高麗國王治靜海軍節度使黎桓並檢校太尉五月辛酉置祕閣于崇文院辛未感德軍節度使李繼捧賜姓趙氏名保忠壬申以保忠為定難軍節度使閏五月辛卯以洺州防禦使劉福為高陽關兵馬都部署濮州防禦使楊贊為貝州兵馬都部署乙未賜諸州高年爵公士丁酉交州黎桓遣使來貢壬寅親試禮部進士及下第舉人六月丙辰朔右領軍衛大將軍陳廷山謀反伏誅丁丑改湖南節度為武安軍節度親試進士諸科舉人秋七月丙午除西川諸州鹽禁辛亥忠武軍節度使潘美知鎮州八月乙卯壽星見丙地甲子以宣徽南院使郭守文為鎮州路都部署戊寅太師鄧王錢俶薨追封秦國王諡忠懿庚辰幸太學命博士李覺講易賜帛遂幸玉津園習射是月鳳凰集廣州清遠縣廨合歡樹樹下生芝三莖九月乙酉朔以侍衛馬軍都指揮使李繼隆為定州都部署冬十月壬午以侍衛步軍都指揮使戴興為澶州都部署癸未詔罷游獵五方所畜鷹犬並放之諸州毋以為獻十一月甲申朔高麗王遣使來貢己丑郭守文破契丹于唐河十二月辛未以夏州蕃落使李繼遷為銀州刺史充洛苑使二年春正月癸未朔不受朝羣臣詣閣拜表稱賀壬辰以涪州觀察使柴禹錫為澶州兵馬部署癸巳詔議北伐二月壬子朔令河北東西路招置營田癸丑詔録將校官吏功及死事使臣官吏子孫士卒廩給其家三月平塞天威平定威虜靜戎保塞寧邊等軍祁易保定鎮邢趙等州民除雍熙四年正月丙戌詔給復外更給復二年霸代洺雄莫深等州平虜岢嵐軍更給復一年戊午罷乘傳銀牌復給樞密院牒以太倉粟貸京畿饑民癸亥作方田戊辰以國子監為國子學三月辛卯命高瓊為并代都部署壬寅親試禮部舉人夏四月丁巳置富順監辛未幸趙普第視疾五月戊戌以旱慮囚遣使決諸道獄是夕雨秋七月甲申以知代州張齊賢為刑部侍郎樞密副使鹽鐵使張遜為宣徽北院使簽署樞密院事戊子有彗出東井上避正殿減常膳辛丑契丹犯威虜軍崇儀使尹繼倫擊破之殺其相皮室大將于越遁去八月丙辰大赦是夕彗不見癸亥詔作開寶寺舍利塔成九月壬午邛部川山後百蠻來貢冬十月辛未以定難軍節度使趙保忠同平章事以歲旱彗星謫見詔曰朕以身為犧牲焚於烈火亦未足以答謝天譴當與卿等審刑政之闕失稼穡之艱難恤物安人以祈玄祐十二月辛亥置三司都磨勘官丙辰大雨雪庚申詔令四方所上表祗稱皇帝羣臣請復尊號不許辛酉上法天崇道文武皇帝詔去文武二字餘許之三佛齊國遣使來貢淳化元年春正月戊寅朔減京畿繫囚流罪以下一等改元內外文武官並加勳階爵邑中書舍人大將軍以上各賜一子官賜魚衆寡孤獨錢除逋負受尊號改乾明節為壽寧節戊子詔作清心殿二月丁未朔除江南兩浙淮西嶺南諸州漁禁己酉改大明殿為含光殿三月丙子朔乙未幸西京留守趙普第視疾夏四月庚戌遣中使詣五嶽禱雨慮囚遣使分決諸道獄甲寅詔尚書省四品兩省五品以上舉轉運使及知州通判五溪蠻田漢權來附戊午建婺州為保寧軍節度丙寅命殿前副都指揮使戴興為鎮州都部署五月甲午給致仕官半奉辛卯置詳覆推勘官六月丙午罷中元下元張燈庚午太白晝見秋七月丁丑太白復見是月吉洪江蘄河陽隴城大水開封陳留封丘酸棗鄢陵旱賜今年田租之半開封特給復一年京師貴糴遣使開廩減價分糶八月乙巳毀左藏庫金銀器皿己巳禁川峽嶺南湖南殺人祀鬼州縣察捕募告者賞之庚午西南蕃主使其子龍漢興來貢是月京兆長安八縣旱賜今年租十之六蠲舒州宿松等三處魚池稅九月辛巳熒惑入太微垣大宴崇政殿禁川峽民父母在出為贅壻是月蠲滄單汝三州今年租十之六冬十月甲辰交州黎桓遣使來貢乙巳熒惑陵左執法乙丑知白州蔣元振知須城縣姚益恭並以清幹聞下詔褒諭賜粟帛是月以乾鄭二州河南壽安等十四縣旱州蠲今年租十之四縣蠲其稅十一月戊戌太白晝見是月蠲大名府管內今年租十之七十二月乙巳占城遣使來貢乙卯高麗國遣使來貢辛酉詔中外所上書疏及面奏制可者並下中書樞密三司中覆頒行是歲洪吉江蘄諸州水河陽大水曹單二州有蝗不為災開封大名管內及許滄單汝乾鄭等州壽安長安天興等二十七縣旱深冀二州文登牟平兩縣饑二年春正月壬申朔不受朝羣臣詣閣拜表稱賀丙子遣商州團練使翟守素帥兵援趙保忠于夏州乙酉置內殿崇班左右侍禁改殿前承旨為三班奉職丙戌熒惑犯房己丑詔陝西諸州長吏設法招誘流亡復業者計口貸粟仍給復二年二月癸丑盡易宮殿彩繪以赭堊監察御史祖吉坐知晉州日為姦贓棄市乙丑斬夔州亂卒謝榮等百餘人於市閏月辛未朔日有食之戊寅禱雨丁亥詔內外諸軍除木槍弓弩矢外不得蓄他兵器己丑詔京城蒲博者開封府捕之犯者斬命近臣兼差遣院流內銓是月河水溢鄄城縣蝗汴河決三月乙卯幸金明池御龍舟遂幸瓊林苑宴射己巳以歲蝗旱禱雨弗應手詔宰相呂蒙正等朕將自焚以答天譴翌日而雨蝗盡死夏四月庚午罷端州貢硯辛巳以張齊賢陳恕並參知政事張遜兼樞密副使溫仲舒寇準並為樞密副使是月河水溢虞鄉等七縣民饑五月己亥朔詔減兩京諸州繫囚流以下一等杖罪釋之庚子置諸路提點刑獄官丙辰左正言謝泌以敢言擢右司諫賜金紫錢三十萬六月甲戌忠武軍節度使同平章事潘美卒命張永德為並代都部署乙酉以汴水決浚儀縣帝親督衛士塞之庚寅禁陝西緣邊諸州闌出生口是月楚丘鄄城淄川三縣蝗河水汴水溢秋七月己亥詔陝西緣邊諸州饑民鬻男女入近界部落者官贖之李繼遷奉表請降以為銀州觀察使賜國姓改名保吉是月乾寧軍蝗許雄嘉三州大水八月己卯置審刑院己丑雅州言登遼山崩九月丁酉朔戶部侍郎參知政事王沔給事中參知政事陳恕並罷守本官己亥中書侍郎兼戶部尚書平章事呂蒙正罷為吏部尚書以右僕射李昉參知政事張齊賢並平章事翰林學士賈黃中李沆並為給事中參知政事帝飛白書玉堂之署四字以賜翰林承旨蘇易簡壬寅邛部川蠻來貢癸卯罷樞密使王顯為崇信軍節度使甲辰以張遜知樞密院事溫仲舒寇準同知院事十一月丙申朔復百官次對乙巳罷京城內外力役土功己酉幸建隆觀相國寺祈雪十二月丙寅朔行入閣儀乙亥賜秦州童子談孺卿本科出身癸未保康軍節度使劉繼元卒追封彭城郡王大雨無冰是歲女真表請伐契丹詔不許自是遂屬契丹大名河中絳濮陝曹濟同淄單德徐晉輝磁博汝兗虢汾鄭亳慶許齊濱棣沂貝衛青霸等州旱三年春正月癸卯大雨雪乙巳詔常參官舉可任升朝官者丙午詔宰相侍從舉可任轉運使者二月乙丑朔日有食之三月乙未朔以趙普為太師封魏國公戊戌親試禮部舉人辛丑親試諸科舉人戊午以高麗賓貢進士四十人並為祕書省祕書郎遣還庚申帝幸金明池觀水戲縱京城觀者賜高年白金器皿夏四月丁丑詔江南兩浙荊湖吏民之配嶺南者還本郡禁錮癸未上作刑政稼穡詩賜近臣五月甲午朔御文德殿百官入閣壬寅詔御史府所斷徒罪以上獄具令尚書丞郎兩省給舍一人慮問丁未戶部郎中田錫通判殿中丞郭渭坐稽留刑獄並責州團練副使不簽署州事戊申詔太醫署良醫視京城病者賜錢五十萬具藥中黃門一人按視之己酉以旱遣使分行諸路決獄是夕雨辛亥置理檢司甲寅詔作祕閣六月丁丑大風晝晦京師疫解戊寅慮囚甲申飛蝗自東北來蔽天經西南而去是夕大雨蝗盡死庚寅以殿前都虞候王昭遠為並代兵馬都部署辛卯置常平倉秋七月己酉太師魏國公趙普薨追封真定王是月許汝兗單滄蔡齊貝八州蝗洛水溢八月戊辰以祕閣成賜近臣宴壬申召終南山隱士种放不至庚辰闍婆國遣使來貢丁丑釋嶺南東西路罰作荷校者九月丙申遣官祈晴京城諸寺觀甲寅幸天駟監賜從臣馬乙卯羣臣上尊號曰法天崇道明聖仁孝文武皇帝凡五表終不許冬十月辛酉朔折御卿進白花鷹放之詔勿復獻戊寅始置京朝幕職州縣官考課並校三班殿最戊子高麗西南蕃皆遣使來貢十一月己亥許王元僖薨甲申慮囚降徒流以下一等釋杖罪趙保忠貢鶻號海東青還之己未禁兩浙諸州巫師置三司主轄收支官是月蔡州建安大火十二月丁卯大雨雪己卯占城國王楊陀排遣使來貢是月雄州言大火是歲潤州丹徒縣饑死者三百戶四年春正月庚寅朔享太室羣臣詣齊宮拜表稱賀辛卯祀天地于圜丘以宣祖太祖配大赦乙未大雨雪高麗國遣使來貢乙巳藏才西族首領羅妹以良馬來獻二月己未朔日有食之壬戌召賜京城高年帛百歲者一人加賜塗金帶是日雨雪大寒再遣中使賜孤老貧窮人千錢米炭置昭宣使癸亥廢沿江榷貨八務乙丑加高麗國王王治檢校太師靜海軍節度使黎桓封交址郡王己卯詔以江浙淮陝饑遣使巡撫詔分遣近臣巡撫諸道有可惠民者得便宜行事吏罷軟苛刻者上之詔令有未便者附傳以聞丙戌置審官院考課院永康軍青城縣民王小波聚徒為寇殺眉州彭山縣令齊元振是月商州大雨雪三月壬子詔權停貢舉四月己卯諸司奉行公事不得輒稱聖旨五月戊申罷鹽鐵戶部度支等使置三司使六月戊午朔詔中丞已下皆親臨鞫獄丙寅吏部侍郎平章事張齊賢罷為尚書左丞壬申宣徽北院使知樞密院事張遜貶右領軍衛將軍右諫議大夫同知院事寇準罷守本官以涪州觀察使柴禹錫為宣徽北院使知樞密院事樞密直學士呂端參知政事劉昌言同知樞密院事戊寅初復給事中封駁七月丁酉大雨戊戌復沿江務置諸路茶鹽制置使八月丙辰朔日有食之癸酉以向敏中張詠始同知銀臺通進司視章奏案牘以稽出入九月丙申詔諸雜除禁錮人州縣有闕得次補以責效能自新勤幹者具聞再乙巳以給事中封駁隸銀臺通進司丙午命侍從舉任才堪五千戶以上縣令者二人自七月雨至是不止是月河水溢壞澶州江溢陷涪州詔溺死者給斂具澶人千錢涪人鐵錢三千仍發廩以振冬十月壬戌罷諸路提點刑獄司庚午始分天下州縣為十道兩京為左右計各署判官領之置三司使二員辛未右僕射平章事李昉給事中參知政事賈黃中李沆左諫議大夫同知樞密院事溫仲舒並罷守本官以吏部尚書呂蒙正平章事翰林學士蘇易簡為給事中參知政事樞密都承旨趙鎔為宣徽北院使樞密直學士向敏中為右諫議大夫並同知樞密院事丁丑以右諫議大夫趙昌言為給事中參知政事辛巳遣使按行畿縣民田被水者蠲其租是月河決澶州西北流入御河閏月辛卯幸水磑觀魚己酉置三司總計度使十一月丁巳萬安州獻六眸龜癸酉還隴西州所獻白鷹十二月辛丑大雨雪戊申西川都巡檢使張與王小波戰江原縣死之小波中流矢死衆推其黨李順為帥五年春正月甲寅朔不受朝羣臣詣閣拜表稱賀戊午李順陷漢州己未陷彭州乙丑慮囚流罪以下釋之己巳李順陷成都知府郭載奔梓州順入據之賊兵四出攻劫州縣遣使振宋亳陳潁州饑民別遣決諸路刑獄應因饑劫藏粟誅為首者餘減死癸酉以侍衛馬軍都指揮使李繼隆為河西行營都部署討李繼遷甲戌命昭宣使王繼恩為兩川招安使討李順詔諸州能出粟貸饑民者賜爵辛巳詔除兩京諸州淳化三年逋負二月乙未李順分攻劍州都監西京作坊副使上官正成都監軍供奉官宿翰合擊大破之斬馘殆盡丙午幸南御莊觀稼己酉以益王元傑為淮南鎮江等軍節度使徙封吳王辛亥詔除劍南東西川峽路諸州主吏民卒淳化五年以前逋負三月乙亥趙保忠為趙保吉所襲奔還夏州指揮使趙光嗣執之以獻李繼隆帥師入夏州交址郡王黎桓遣使來貢夏四月壬午朔詔除天下主吏逋負甲申削趙保吉所賜姓名丙戌置起居院初復起居注以國子學復為國子監辛卯慮囚大食國王遣使來貢戊戌赦諸州除十惡故劫殺官吏犯正贓外降死罪以下囚己亥王繼恩帥師過綿州賊潰走追殺及溺死者甚衆庚子復綿州內殿崇班曹習破賊于老溪復閬州綿州巡檢使胡正遠帥兵進擊復巴州壬寅西川行營擊賊于研口寨破之復劍州癸卯大雨五月丁巳西川行營破賊十萬衆斬首三萬級復成都獲賊李順其黨張餘復攻陷嘉戎瀘渝涪忠萬開八州開州監軍秦傳序死之丙寅河西行營送趙保忠至闕下釋其罪授右千牛衛上將軍封宥罪侯己巳以知梓州張雍都巡檢使盧斌嘗堅守却賊斌進擊解閬州圍遂平蓬州雍加給事中斌領成州刺史以少府監雷有終為諫議大夫知成都府庚午賊攻夔州峽路都大巡檢白繼贇夔州巡檢使解守顒大敗其衆于西津口斬首二萬級獲舟千餘艘辛未降成都府為益州壬申右僕射李昉以司空致仕甲戌詔利州興元府洋州西縣民並給復一年丙子磔李順黨八人于鳳翔市庚辰初伏帝親書綾扇賜近臣六月辛卯詔赦李順脅從詿誤是月都城大疫分遣醫官煮藥給病者賊攻施州指揮使黃希遜擊走之戊戌峽路行營破賊于廣安軍又破賊張罕二萬衆于嘉陵江口又破于合州西方溪俘斬甚衆戊申以侍衛步軍都指揮使高瓊為鎮州都部署賊攻陵州知州張旦擊破之高麗遣使以契丹來侵乞師秋七月辛亥朔賊攻眉州知州李簡等堅守踰月賊引去癸亥置江淮兩浙發運使丙寅除兩浙諸州民錢俶日逋負甲戌置威塞軍乙亥李繼遷遣使來貢八月甲申詔有司講求大射儀注癸巳以內班為黃門甲午置宣政使以宦者昭宣使王繼恩為之乙未詔釋劍南峽路諸州亡命戊戌以通遠軍復為環州置清遠軍庚子大雨貝州言驍捷卒劫庫兵為亂推都虞候趙咸雍為帥轉運使王嗣宗率屯兵擊敗之擒咸雍磔于市辛丑詔遣知益州張詠赴部得便宜從事癸卯以參知政事趙昌言為西川峽路招安馬步軍都部署尋詔昌言駐鳳翔遣內侍押班衛紹欽往行營指揮軍事峽路行營破賊帥張餘復雲安軍李繼遷使其弟奉表待罪九月庚戌朔戶部尚書辛仲甫以太子少保致仕甲寅賜三司錢百萬募能言司事之利便者量事賞之盡則再給以備賞己未罷諸州榷酤改黃門院為內侍省以黃門班院為內侍省內侍班院入內黃門班院為內侍省入內侍班院辛酉遣使分行宋亳陳潁泗壽鄧蔡等州按行民田被水及種蒔不及者並蠲其租壬申以襄王元侃為開封尹改封壽王大赦除十惡故謀劫鬬殺官吏犯正贓外諸官先犯贓罪配隸禁錮者放還乙亥以左諫議大夫寇準參知政事丁丑以蜀部漸平下詔罪己戊寅西川行營言衛紹欽破賊于學射山別將楊瓊復蜀州曹習等又破賊于安國鎮誅其帥馬太保冬十月庚辰詔釋殿前司逃軍親屬之禁錮者西川行營指揮使張嶙殺其將王文壽以叛遣使招撫其衆遂共斬嶙首以降乙未楊瓊等復邛州乙巳改青州平盧軍為鎮海軍杭州鎮海軍為寧海軍十一月庚戌遣使諭李繼遷賜以器幣茶藥衣服丙辰賜近臣飛白書庚申詔江南西路及荊湖南北路嶺南溪洞接連及蕃商外國使誘子女出境者捕之癸亥賊攻眉州崇儀使宿翰等擊敗之斬其僞中書令吳蘊丙寅幸國子監賜直講孫奭緋魚因幸武成王廟復幸國子監令奭講尚書賜以束帛大寒賜禁衛諸軍緡錢有差十二月戊寅朔日當食雲陰不見辛巳命樞密直學士張鑑西京作坊副使馮守規安撫西川丙戌命諸王畋近郊弛忠靖二州刑徒庚寅宿翰等引兵趨嘉州僞知州王文操以城降乙未祕書丞張樞坐知榮州降賊棄市辛丑以三司兩京十道復歸三部各置使一員每部置判官推官都監分勾院為三至道元年正月戊申朔改元赦京畿繫囚流罪以下遞降一等杖罪釋之蠲諸州逋租蠲陝西諸州去年秋稅之半丙辰詔作上清宮成丁巳涼州吐蕃當尊以良馬來獻戊午占城國王楊陀排遣使來貢辛酉上御乾元門觀燈癸亥契丹大將韓德威誘党項勒浪嵬族自振武犯邊永安節度使折御卿邀擊敗之于子河義勒浪等乘亂反擊德威遂殺其將突厥太尉司徒舍利等獲吐渾首領一人德威僅以身免戊辰以翰林學士錢若水為右諫議大夫同知樞密院事樞密副使劉昌言罷為給事中以宣祖舊第作洞真宮成甲戌李繼遷遣使以良馬橐駝來貢二月甲申命宰相禱雨令川峽諸州瘞暴骸戊戌以旱慮囚減流罪以下丙午雨嘉州函賊帥張餘首送西川行營餘黨悉平蠲襄唐均汝隨鄧歸峽等州去年逋租振亳州房州光化軍饑遣使貸之三月庚申詔求直言辛酉以會州觀察使知清遠軍田紹斌為靈州兵馬都部署己巳廢邵武軍歸化縣金坑夏四月癸未吏部尚書平章事呂蒙正罷為右僕射以參知政事呂端為戶部侍郎平章事宣徽北院使知樞密院事柴禹錫罷為鎮寧軍節度使參知政事蘇易簡為禮部侍郎以翰林學士張洎為給事中參知政事甲申以宣徽北院使同知樞密院事趙鎔知樞密院事乙酉契丹犯雄州知州何承矩擊敗之斬其鐵林大將一人辛丑遣使分決諸路刑獄劫賊止誅首惡降流罪以下一等壬寅慮囚甲辰大雨雷電開寶皇后宋氏崩六月乙酉購求圖書丙戌遣使諭李繼遷授以鄜州節度使繼遷不奉詔丁亥以銀州左都押衙張浦為銀青光祿大夫檢校工部尚書鄭州刺史兼御史大夫充本州團練使己亥許士庶工商服紫是月大熱民有暍死者秋七月丙寅除陳許等九州及光化軍今年夏稅八月壬辰詔立壽王元侃為皇太子改名恆兼判開封府大赦文武常參官子為父後見任官者賜勳一轉癸巳以尚書左丞李至禮部侍郎李沆並兼太子賓客癸卯禁西北緣邊諸州民與內屬戎人昏娶九月丙午西南蕃嚑諸蠻來貢詔封西南蕃主龍漢為歸化王丁卯御朝元殿冊皇太子庚午清遠軍言李繼遷入寇率兵擊走之冬十月甲戌朔皇太子讓宮僚稱臣許之乙丑陝西轉運使鄭文寶坐撓邊責授藍山縣令十一月己未閲武便殿是月以峯州團練使上官正右諫議大夫雷有終並為西川招安使召王繼恩歸闕十二月甲戌羣臣奉表加上尊號曰法天崇道上聖至仁皇帝凡五上不許契丹犯邊折御卿率兵禦之卒師斬馬步軍都軍頭孫贊于軍中庚辰新渾儀成二年春正月辛亥祀天地于圜丘大赦中外文武加恩丁卯廢諸州司理判官二月壬申朔司空致仕李昉薨戊寅以越王元份為杭州大都督兼領越州吳王元傑為揚州大都督兼領壽州己卯以徐國公元偓為洪州都督鎮南軍節度使涇國公元稱為鄂州都督武清軍節度使庚辰以御史中丞李昌齡為給事中參知政事辛巳以呂蒙正為左僕射宋琪為右僕射乙未定任子官制三月丙寅以京師旱遣中使禱雨戊辰命宰臣祀郊廟社稷禱雨夏四月甲戌命侍衛馬軍都指揮使李繼隆為環慶等州都部署殿前都虞候范廷召副之討李繼遷癸未雨五月癸卯李繼遷寇靈州六月戊戌黔州言蠻寇鹽井巡檢使王惟節戰死是月亳州蝗秋七月己亥朔命殿前都指揮使王超為夏綏麟府州都部署庚子詔作壽寧觀成丙寅給事中參知政事寇準罷守本官戊辰蠲峽路諸州民去年逋租是月汴水決穀熟縣許宿齊三州蝗抱草死閏月庚寅詔江浙福建民負人錢沒入男女者還其家敢匿者有罪八月辛丑密州言蝗不為災九月戊寅右僕射宋琪薨詔川峽諸州民家先藏兵器者限百日悉送官匿不以聞者斬己卯夏州延州行營言破李繼遷於烏白池獲未幕軍主吃囉指揮使等二十七人繼遷遁甲申會州觀察使環慶副都部署田紹斌貶右監門衛率府副率虢州安置丙戌秦晉諸州地晝夜十二震丙申詔廢衢州冶冬十月己未詔以池州新鑄錢監為永豐監十一月丁卯朔增司天新曆為一百二十甲子戊寅置簽署提點樞密宣徽院諸房公事辛卯許州羣盜劫郾城縣居民巡檢李昌習鬬死都巡檢使王正襲擊之獲賊首宋斌及餘黨皆斬于市甲午禁淮南通行鹽稅十二月命宰相以下百官詣諸寺觀禱雪甲寅雨雪大有年是歲處州稻再熟三年春正月丙子以戶部侍郎溫仲舒禮部侍郎王化基並參知政事給事中李惟清同知樞密院事參知政事張洎罷為刑部侍郎乙酉孝章皇后陪葬永昌陵辛卯以侍衛馬步軍都虞候傅潛為延州路都部署殿前都虞候王昭遠為靈州路都部署二月丙申朔靈州行營破李繼遷辛丑帝不豫甲辰降京畿死罪囚流以下釋之壬戌大食賓同隴國並來貢三月丁卯占城國來貢壬辰不視朝癸巳追班于萬歲殿宣詔令皇太子柩前即位是日崩年五十九在位二十二年殯于殿之西階羣臣上尊諡曰神功聖德文武皇帝廟號太宗十月己酉葬永熙陵贊曰帝沈謀英斷慨然有削平天下之志既即大位陳洪進錢俶相繼納土未幾取太原伐契丹繼有交州西夏之役干戈不息天災方行俘馘日至而民不知兵水旱螟蝗殆遍天下而民不思亂其故何也帝以慈儉為寶服浣濯之衣毀奇巧之器却女樂之獻悟畋遊之非絶遠物抑符瑞閔農事考治功講學以求多聞不罪狂悖以勸諫士哀矜惻怛勤以自勵日晏忘食至於欲自焚以答天譴欲盡除天下之賦以紓民力卒有五兵不試禾稼荐登之效是以青齊耆耋之叟願率子弟治道請登禪者接踵而至君子曰得乎丘民而為天子帝之謂乎故帝之功德炳煥史牒號稱賢君若夫太祖之崩不踰年而改元涪陵縣公之貶死武功王之自殺宋后之不成喪則後世不能無議焉
