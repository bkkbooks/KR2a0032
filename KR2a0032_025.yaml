body:
  text: 宋史卷二十五本紀第二十五高宗二二年春正月丙戌朔帝在揚州丁亥錄兩河流亡吏士沿河給流民官田牛種戊子金人陷鄧州安撫劉汲死之辛卯置行在榷貨務壬辰金人犯東京宗澤遣將擊卻之癸巳復明法新科甲午詣壽寧寺謁祖宗神主乙未金人破永興軍前河東經制副使傅亮以兵降經略使唐重副總管楊宗閔提舉軍馬陳迪轉運副使桑景詢判官曾謂提點刑獄郭忠孝經略司主管機宜文字王尚及其子建中俱死之東平府兵馬鈐轄孔彥舟叛渡淮犯黃州守臣趙令𡷫拒之丙申詔自今犯枉法自盜贓者中書籍其姓名罪至徒者永不錄用金人陷均州守臣楊彥明遁去丁酉金人陷房州己亥張遇焚真州祕閣修撰孫昭遠為亂兵所害庚子遣主客員外郎謝亮為陝西撫諭使兼宣諭使持詔賜夏國張遇陷鎮江府守臣錢伯言棄城走辛丑內侍邵成章坐輒言大臣除名南雄州編管金人陷鄭州通判趙伯振死之癸卯金帥窩里嗢陷濰州又陷青州尋棄去丁未詔諭流民潰兵之為盜賊者釋其罪己酉禁諸將引潰兵入蜀置大散關使以審驗之庚戌遣考功員外郎傅雱為淮東京東西撫諭使辛亥王淵招降張遇以所部萬人隸韓世忠改授顯謨閣直學士孟忠厚為常德軍承宣使詔凡后族毋任侍從官著為令金人焚鄧州是月以中奉大夫劉豫知濟南府金人陷潁昌府守臣孫默為所殺經制司僚屬王擇仁復永興軍金人陷秦州經略使李復降又犯熙河經略使張深遣兵馬都監劉惟輔與戰于新店敗之斬其帥黑鋒二月丙辰金人再犯東京宗澤遣統制閻中立等拒之中立戰死戊午移耿南仲于臨江軍金人陷唐州壬戌安化軍節度副使宇文虛中應詔使絕域復中大夫召赴行在癸亥罷巿易務甲子金人犯滑州宗澤遣張撝救之戰死乙丑澤遣判官范世延等表請帝還闕河北賊楊進等詣澤降丁卯復延康述古殿直學士為端明樞密直學士辛未詔自今犯枉法自盜贓罪至死者籍其貲壬申赦福州叛卒張員等癸酉金人陷蔡州執守臣閻孝忠丙子金人陷淮寧府守臣向子韶死之丁丑遣王貺等充金國軍前通問使戊寅責降知鎮江府趙子崧為單州團練副使南雄州安置己卯奪祕書正字胡珵官送梧州編管朝奉大夫劉正彥應詔使絕域授武德大夫威州刺史尋為御營右軍副統制庚申以王淵為嚮德軍節度使辛巳武功大夫和州防禦使馬擴奔真定五馬山砦聚兵得皇弟信王榛于民間奉之總制諸砦壬午詔京畿京東西河北淮南路置振華軍八萬人是月成都守臣盧法原修城成三月辛卯金人陷中山府壬辰詔諸路安撫使許便宜節制官吏丁酉初立大小使臣呈試弓馬出官格先閱試然後奏補粘罕焚西京去庚子河南統制官翟進復西京宗澤奏進為京西北路安撫制置使丙午遙授尚書右僕射何石凾為觀文殿大學士中書侍郎陳過庭為資政殿大學士同知樞密院事聶昌為資政殿大學士並主管宮觀時石凾已卒于金昌為人所殺朝廷未之知過庭亦在金軍中丁未罷內外權局官之不應法者遣楊應誠為大金高麗國信使己酉張員等復作亂擁衆突城出命本路提點刑獄李芘討捕之辛亥以范瓊權同主管侍衞步軍司公事屯真州是月金人陷鳳翔府守臣劉清臣棄城去又犯涇原經略使統制官曲端遣將拒戰敗之金兵走同華石壕尉李彥仙舉兵復陝州夏四月丙辰詔文臣從官至牧守武臣管軍至遙郡各舉所知二人戊午禁州縣責鄰保代輸逃戶稅役宗澤遣將趙世興復滑州乙丑翟進以兵襲金帥兀室于河南兵敗其子亮死之進又率御營統制韓世忠京城都巡檢使丁進等兵戰于文家寺又敗世忠收餘兵南歸兀室復入西京尋棄去隴右都護張嚴及金人戰于五里坡敗績死之丁卯金人入洺州壬辰軍賊孫琦焚隨州癸未入唐州信王榛遣馬擴來奏事是月以榛為河外兵馬都元帥擴為元帥府馬步軍都總管五月乙酉許景衡罷孫琦犯德安府丙戌命參酌元祐科舉條制立詩賦經義分試法戊子以翰林學士朱勝非為尚書右丞辛卯以金兵渡河遣韓世忠宗澤等逆戰甲午曲赦河北陝西京東路福建轉運判官謝如意執張員等六人誅之丙申復命宇文虛中為資政殿大學士充金國祈請使賊靳賽寇光山縣戊戌河北制置使王彥部兵渡河屯滑州之沙店癸卯張売心薨甲辰金帥婁宿陷絳州丁未復置兩浙福建提舉巿舶司己酉秀州卒徐明等作亂執守臣朱芾迎前守趙叔近復領州事命御營中軍統制張俊討之癸丑罷借諸路職田六月乙卯權罷邛州鑄錢增印錢引癸亥建州卒葉濃等作亂寇福州甲子親慮囚乙丑張俊至秀州殺趙叔近執徐明斬之甲戌葉濃陷福州丁丑詔江浙沿流州軍練水軍造戰艦京畿淮甸蝗是月以知延安府王庶節制陝西六路軍馬涇原經略使統制官曲端為節制司都統制永興軍經略使郭琰逐王擇仁擇仁奔興元秋七月甲申葉濃入寧德縣復還建州命張俊同兩浙提點刑獄趙哲率兵討之丙戌詔吏部審量京官非政和以後進書頌及直赴殿試人乃聽參選宗澤薨丁亥詔百官坐蔡京王黼擬授而廢者許自新復用戊子禁軍中抉目刳心之刑壬辰選江浙州軍正兵土兵六之一赴行在乙未以郭仲荀為京城副留守戊戌錄內外諸軍將士功辛丑以春霖夏旱蝗詔監司郡守條上闕政州郡災甚者蠲田賦甲辰以降授北京留守杜充復樞密直學士為開封尹東京留守八月甲寅初鑄御寶三甲戌御集英殿策試禮部進士罷殿中侍御史馬伸尋責濮州河北京東捉殺使李成叛辛巳犯宿州是月二帝徙居韓州九月甲申丁進叛復寇淮西庚寅賜禮部進士李易以下四百五十一人及第出身特奏名進士皆許調官壬辰召侍從所舉褚宗諤等二十一人驛赴行在癸巳金人陷冀州將官李政死之甲午金人再犯永興軍經略使郭琰棄城退保義谷辛丑陝西節制司兵官賀師範及金人戰于八公原敗績死之丙午復所減京官奉丁未東京留守統制官薛廣及金人戰于相州敗死己酉郭三益薨是秋窩里嗢撻懶破五馬山砦信王榛不知所終馬擴軍敗于北京之清平冬十月甲寅命揚州濬隍修城閱江淮州郡水軍楊應誠還自高麗戊午遣劉光世討李成壬戌禁江浙閉糴癸亥粘罕圍濮州遣韓世忠范瓊領兵至東平開德府分道拒戰又命馬擴援之甲子命孟忠厚奉隆祐太后幸杭州楊進復叛攻汝洛命翟進擊于鳴皋山翟進戰死丙子罷吏部審量崇寧大觀以來濫賞止令自陳是月劉正彥擊丁進降之十一月辛巳朔提舉嵩山崇福宮李綱責授單州團練副使萬安軍安置劉光世及李成戰于新息縣成敗走高麗國王王楷遣其臣尹彥頤入見金人圍陝州守臣李彥仙拒戰卻之壬辰金人陷延安府權知府劉選總管馬忠皆遁通判府事魏彥明死之癸巳趙哲大破葉濃于建州城下濃遁而降復謀為變張俊禽斬之乙未金人陷濮州執守臣楊粹中又陷開德府守臣王棣死之以魏行可充金國軍前通問使庚子詣壽寧寺朝饗祖宗神主壬寅冬至祀昊天上帝于圜丘以太祖配大赦金人陷相州守臣趙不試死之甲辰陷德州兵馬都監趙叔皎死之庚戌立士庶子弟習射補官法是月節制陝西軍馬王庶為都統制曲端所拘奪其印四川茶馬趙開罷官買賣茶給引通商如政和法金人犯晉寧軍守臣徐徽言拒卻之知府州折可求以城降金人陷淄州涇原兵馬都監吳玠襲斬史斌濱州賊蓋進陷棣州守臣姜剛之死之京東賊李民詣行在請降王淵殲其衆留民為將十二月乙卯太后至杭州扈從統制苗傅以其軍八千人駐奉國寺庚申金人犯東平府京東西路制置使權邦彥棄城去又犯濟南府守臣劉豫以城降甲子金人陷大名府提點刑獄郭永罵敵不屈死之轉運判官裴億降又陷襲慶府乙丑陷虢州丙寅初命修國史己巳以黃潛善為尚書左僕射兼門下侍郎汪伯彥右僕射兼中書侍郎顏岐門下侍郎朱勝非中書侍郎兵部尚書盧益同知樞密院事辛未金人犯青州丁丑特進致仕余深金紫光祿大夫致仕薛昂並分司進昌軍徽州居住耿南仲再責單州別駕唐恪追落觀文殿大學士戊寅以禮部侍郎張浚兼御營參贊軍事教習長兵是冬杜充決黃河自泗入淮以阻金兵三年春正月庚辰朔帝在揚州以京西北路兵馬鈐轄翟興為河南尹京西北路安撫制置兼招討使京西賊貴仲正陷岳州甲申以資政殿學士路允迪簽書樞密院事丁亥金人再陷青州又陷濰州焚城而去京東安撫劉洪道入青州守之己丑奉安西京會聖宮累朝御容于壽寧寺占城國入貢趣大金通問使李鄴周望宋彥通吳德休等往軍前辛卯陝州都統邵興及金人戰于潼關敗之復虢州乙未杜充遣岳飛桑仲討其叛將張用于城南其徒王善救之官軍敗績庚子張用王善寇淮寧府守臣馮長寧却之詔百官聞警遣家屬避兵致物情動搖者流丙午粘罕陷徐州守臣王復及子倚死之軍校趙立結鄉兵為興復計御營平寇左將軍韓世忠軍潰于沭陽其將張遇死世忠奔鹽城金兵執淮陽守臣李寬殺轉運副使李跋以騎兵三千取彭城間道趣淮甸戊申至泗州二月庚戌朔始聽士民從便避兵命劉正彥部兵衞皇子六宮如杭州江淮制置使劉光世阻淮拒金人敵未至自潰金人犯楚州守臣朱琳降辛亥金人陷天長軍壬子內侍鄺詢報金兵至帝被甲馳幸鎮江府是日金兵過楊子橋癸丑游騎至瓜洲太常少卿季陵奉太廟神主行金兵追之失太祖神主王淵請幸杭州命留朱勝非守鎮江以吏部尚書呂頤浩為資政殿大學士江淮制置使都巡檢使劉光世為殿前都指揮使充行在五軍制置使駐鎮江府控扼江口主管馬軍司楊惟忠節制江東軍馬駐江寧府是夕發鎮江次呂城鎮金人入真州甲寅次常州御營統制王亦謀據江寧不克而遁御營平寇前將軍范瓊自東平引兵至壽春其部兵殺守臣鄧紹密丙辰次平江府丁巳金人犯泰州守臣曾班以城降丁進縱兵剽掠王淵誘誅之戊午次吳江縣命朱勝非節制平江府秀州控扼軍馬禮部侍郎張浚副之又命勝非兼御營副使留王淵守平江以忠訓郎劉俊民為閤門祗候齎書使金軍詔錄用張邦昌親屬仍命俊民持邦昌貽金人約和書稿以行金人陷滄州守臣劉錫棄城走己未次秀州命呂頤浩往來經制長江以龍圖閣待制知江州陳彥文為沿江措置使庚申次崇德縣呂頤浩從行即拜同簽書樞密院事江淮兩浙制置使以兵二千還屯京口又命御營中軍統制張俊以兵八千守吳江吏部員郎鄭資之為沿江防托監察御史林之平為沿海防托募海舟守隘壬戌駐蹕杭州金人陷晉寧軍守臣徐徽言死之癸亥下詔罪己求直言令有司具舟常潤迎濟衣冠軍民家屬省儀物膳羞出宮人之無職掌者乙丑降德音赦雜犯死罪以下囚放還士大夫被竄斥者惟李綱罪在不赦更不放還蓋用黃潛善計罪綱以謝金人置江寧府榷貨務都茶場丁卯百官入見應迪功郎以上並赴朝參戊辰出米十萬斛即杭秀常湖州平江府損直以糶濟東北流寓之人金人焚揚州己巳用御史中丞張澂言罷黃潛善汪伯彥以戶部尚書葉夢得為尚書左丞澂為右丞庚午詔平江鎮江府常湖杭越州具寓居京朝官已上姓名以備簡拔分命浙西監司等官募土豪守千秋垂脚襄陽諸嶺以扼宣常諸州險要金人去揚州辛未詔御營使司唯掌行在五軍凡邊防經制並歸三省樞密金人過高郵軍守臣趙士瑗棄城走潰兵宋進犯泰州守臣曾班遁壬申罷軍期司掊斂民財者呂頤浩遣將陳彥渡江襲金餘兵復揚州癸酉靳賽犯通州韓世忠小校李在叛據高郵甲戌黃潛善汪伯彥並落職乙亥召朱勝非赴行在留張浚駐平江贈陳東歐陽澈承事郎官有服親一人恤其家召馬伸赴行在卒贈直龍圖閣丙子詔士民直言時政得失是月以王庶為陝西節制使知京兆府節制司都統制曲端為鄜延經略使知延安府張用據確山號張莽蕩三月己卯朔日中有黑子庚辰以朱勝非為尚書右僕射兼中書侍郎辛巳葉夢得罷以盧益為尚書左丞未拜復罷為資政殿學士御營都統制王淵同簽書樞密院事呂頤浩為江南東路安撫制置使知江寧府壬午詔王淵免進呈書押本院文字扈從統制苗傅忿王淵驟得君劉正彥怨招降劇盜而賞薄帝在揚州閹宦用事恣橫諸將多疾之癸未傅正彥等叛勒兵向闕殺王淵及內侍康履以下百餘人帝登樓以傅為慶遠軍承宣使御營使司都統制正彥渭州觀察使副都統制傅等迫帝遜位于皇子魏國公請隆祐太后垂簾同聽政是夕帝移御顯寧寺甲申尊帝為睿聖仁孝皇帝以顯寧寺為睿聖宮大赦以張澂兼中書侍郎韓世忠為御營使司提舉一行事務前軍統制張俊為秦鳳副總管分其衆隸諸軍丁亥以東京留守杜充為資政殿大學士節制京東西路殿前副都指揮使東京副留守郭仲荀進昭化軍節度使分竄內侍藍珪高邈張去為張旦曾擇陳永錫于嶺南諸州擇已行傅追還殺之呂頤浩至江寧戊子以端明殿學士王孝迪為中書侍郎盧益為尚書左丞張俊部衆八千至平江張浚諭以決策起兵問罪約呂頤浩劉光世招韓世忠來會己丑改元明受張浚奏乞睿聖皇帝親總要務庚寅百官始朝睿聖宮以苗傅為武當軍節度使劉正彥為武成軍節度使劉光世為太尉淮南制置使范瓊為慶遠軍節度湖北制置使楊惟忠加少保張浚為禮部尚書及呂頤浩並赴行在傅等以御營中軍統制吳湛主管步軍司黃潛善汪伯彥並分司衡永州居住王孝迪盧益為大金國信使進士黃大本吳時敏為先期告請使置行在都茶場呂頤浩奏請睿聖皇帝復大位金人陷鄜州癸巳張浚命節制司參議官辛道宗措置海舶遣布衣馮轓持書說傅正彥甲午有司請尊太后為太皇太后不許呂頤浩率勤王兵萬人發江寧乙未再貶黃潛善鎮東軍節度副使英州安置劉光世部兵會呂頤浩于丹陽丙申韓世忠自鹽城收散卒至平江張俊假兵二千戊戌赴行在辛丑傅等以世忠為定國軍節度使張俊為武寧軍節度使知鳳翔府張浚責黃州團練副使郴州安置俊等皆不受傅等遣軍駐臨平拒勤王兵壬寅日中黑子沒盧益罷呂頤浩至平江水賊邵青入泗州癸卯太后詔睿聖皇帝宜稱皇太弟天下兵馬大元帥康王皇帝稱皇太姪監國賜傅正彥鐵券呂頤浩張浚傳檄中外討傅正彥執黃大本下獄乙巳太后降旨睿聖皇帝處分兵馬重事張俊率兵發平江劉光世繼之丙午張浚同知樞密院事翰林學士李邴御史中丞鄭瑴並同簽書樞密院事呂頤浩張浚發平江丁未次吳江奏乞建炎皇帝還即尊位朱勝非召傅正彥至都堂議復辟傅等遂朝睿聖宮金人陷京東諸郡劉洪道棄青州去撻懶以劉豫知東平府節制河南州郡趙立復徐州夏四月戊申朔太后下詔還政皇帝復大位帝還宮與太后御前殿垂簾詔尊太后為隆祐皇太后己酉詔訪求太祖神主以苗傅為淮西制置使劉正彥副之庚戌復紀年建炎命張浚知樞密院事苗傅劉正彥並檢校少保呂頤浩張浚軍次臨平苗翊馬柔吉拒戰不勝傅正彥引兵二千夜遁辛亥皇太后撤簾呂頤浩等入見傅犯富陽新城二縣遣統制王德喬仲福追擊之癸未朱勝非顏岐王孝迪張澂路允迪俱罷以呂頤浩為尚書右僕射兼中書侍郎李邴尚書右丞鄭瑴簽書樞密院事甲寅以劉光世為太尉御營副使韓世忠為武勝軍節度使御前左軍都統制張俊為鎮西軍節度使御前右軍都統制勤王所僚屬將佐進官有差主管殿前司王元左言並責官英賀州安置樞密都承旨馬瑗停官永州居住吏部員外郎范仲熊浙西安撫司主管機宜文字時希孟並除名柳州吉陽軍編管斬中軍統制吳湛工部侍郎王世修于巿贈王淵開府儀同三司乙卯大赦舉行仁宗法度應嘉祐條制與今不同者自官制役法外賞格從重條約從寬罷上供不急之物元祐石刻黨人官職恩數追復未盡者令其家自陳許中外直言丁巳禁內侍交通主兵官及饋遺假貸借役禁兵干預朝政庚申詔尚書左右僕射並帶同中書門下平章事改門下中書侍郎為參知政事省尚書左右丞以李邴參知政事詔行在職事官各舉所知併省館學寺監等官苗傅犯衢州癸亥以給事中周望為江浙制置使丁卯帝發杭州留鄭瑴衞皇太后以韓世忠為江浙制置使及劉光世追討傅正彥己巳詔傅正彥苗瑀苗翊張逵不赦餘黨並原壬申立子魏國公旉為皇太子赦傅黨王鈞甫馬柔吉罪許其自歸丙子范瓊自光蘄引兵屯洪州是月劉文舜寇濠州西北賊薛慶襲據高郵軍五月戊寅朔帝次常州以張浚為宣撫處置使以川陝京西湖南北路隸之聽便宜黜陟庚辰苗傅統領官張翼斬王鈞甫馬柔吉降辛巳次鎮江府遣祭張売心陳東墓詔恤其家癸未以翰林學士滕康同簽書樞密院事乙酉至江寧府駐蹕神霄宮改府名建康起復朝散郎洪皓為大金通問使丁亥以徽猷閣直學士陳彥文提領水軍措置江浙防托召藍珪等速還朝己丑韓世忠追討傅正彥于浦城縣獲正彥傅遁走張浚撫諭薛慶于高郵為慶所留乙未浚罷以御營前軍統制王為淮南招撫使己亥復置中書門下省檢正官省左右司郎中二員苗傅裨將江池殺苗翊降于周望傅走建陽縣土豪詹標執之以獻辛丑張浚還自高郵復命知樞密院事是月翟興擊殺楊進餘黨復推其徒劉可拒官軍六月戊申朔以東京留守杜充引兵赴行在命兼宣撫處置副使節制淮南京東西路己酉以久雨召郎官已上言闕政呂頤浩請令實封以聞遂用司勳員外郎趙鼎言罷王安石配享神宗廟庭以司馬光配王善攻淮寧府不克轉寇宿州統領王冠戰敗之甲寅罷賞功司乙卯命恤死事者家且錄其後升浙西安撫使康允之為制置使丙辰劉光世招安苗傅將韓雋戊午命江浙淮南引塘濼開畎澮以阻金兵庚申皇太后至建康府辛酉以久陰下詔以四失罪己一曰昧經邦之大略二曰昧戡難之遠圖三曰無綏人之德四曰失馭臣之柄仍榜朝堂徧諭天下使知朕悔過之意以帶御器械李質權同主管殿前司乙丑以建康府路安撫使連南夫兼建康府宣徽太平等州制置使丁卯右司諫袁植請誅黃潛善及失守者權邦彥等九人詔朕方念咎責己豈可盡以過失歸於臣下遂罷植知池州以趙鼎為右司諫癸酉置樞密院檢詳官以右司郎中劉寧止為沿江措置副使甲戌移御行宮乙亥詔諭中外以迫近防秋請太后率宗室迎奉神主如江表百司庶府非軍旅之事者並令從行朕與輔臣宿將備禦寇敵應接中原官吏士民家屬南去者有司毋禁金人陷磁州是夏賊貴仲正降秋七月戊寅贈王復為資政殿學士己卯親慮囚辛巳苗傅劉正彥伏誅癸未進韓世忠檢校少保武勝昭慶軍節度使御營使司都統制范瓊自洪州入朝以瓊為御營使司提舉一行事務後軍統制辛企宗為都統制命學士院草夏國書大金國表本付張浚甲申詔以苗劉之變當軸大臣不能身衞社稷朱勝非顏岐路允迪並落職張澂衡州居住以知廬州胡舜陟為淮西制置使知江州權邦彥兼本路制置使金人犯山東安撫使劉洪道棄濰州遁萊州守將張成舉城降丁亥以范瓊跋扈無狀收下大理獄分其兵隸神武五軍皇太子薨謚元懿戊子鄭瑴薨己丑以資政殿大學士王綯參知政事兵部尚書周望同簽書樞密院事庚寅仙井監鄉貢進士李時雨上書乞選立宗子係屬人心帝怒斥還鄉里辛卯升杭州為臨安府壬辰言者又論范瓊逼遷徽宗及迎立張邦昌瓊辭伏賜死子弟皆流嶺南劉洪道復青州執金守向大猷乙未遣謝亮使夏國丁酉遣崔縱使金軍前庚子張浚發行在辛丑王與靳賽遇合戰敗績壬寅命李邴滕康權知三省樞密院事扈從太后如洪州楊惟忠將兵萬人以衞以杜充同知樞密院事兼宣撫處置副使乙巳詔江西閩廣荊湖諸路團教峒丁槍杖手山東賊郭仲威陷淮陽軍翟興引兵入汝州與賊王俊戰敗之八月己酉移浙西安撫司于鎮江府庚戌李邴罷壬子以吏部尚書劉王玉為端明殿學士權同知三省樞密院事甲寅王庶罷以徽猷閣直學士知慶陽府王似為陝西節制使劉文舜入舒州己未太后發建康丁卯遣杜時亮使金軍前閏八月丁丑朔以胡舜陟為沿江都制置使集英殿修撰王羲叔副之丁亥輔逵掠漣水軍殺軍使郝璘率衆降于王己丑以呂頤浩守尚書左僕射杜充守右僕射並同中書門下平章事庚寅起居郎胡寅上書言二十事呂頤浩不悅罷之辛卯命杜充兼江淮宣撫使守建康前軍統制王隸之韓世忠為浙西制置使守鎮江劉光世為江東宣撫使守太平池州並受充節制丁酉太后至洪州己亥減福建廣南歲上供銀三之一詔制置使唯用兵聽便宜餘事悉禁壬寅帝發建康復還浙西張俊辛企宗以其軍從甲辰次鎮江府賜陳東家金張浚次襄陽招官軍義兵分屯襄郢唐鄧以程千秋李允文節制是月知濟南府宮儀及金人數戰于密州兵潰儀及劉洪道俱奔淮南守將李逵以密州降金靳賽詣劉光世降九月丙午朔日有食之諜報金人治舟師將由海道窺江浙遣韓世忠控守圌山福山辛亥次平江府壬子金人陷單州興仁府遂陷南京執守臣凌唐佐降之癸丑以周望為兩浙荊湖等路宣撫使總兵守平江翰林學士張守同簽書樞密院事命劉光世移屯江州丙辰遣張邵等充金國軍前通問使金人陷沂州卻高麗入貢使張浚承制罷知潭州辛炳起復直龍圖閣向子諲代之丁巳蠲諸路青苗積欠錢辛酉知鼎州邢倞坐結耶律余覩再責汝州團練副使英州安置癸亥賜宿泗州都大提舉使李成軍絹二萬匹成尋復叛己巳以胡舜陟為兩浙宣撫司參謀官知鎮江府陳邦光為沿江都制置使庚午以工部侍郎湯東野知平江府兼浙西制置使辛未追復鄒浩龍圖閣待制壬申夜潭州禁卒作亂謀竄不果向子諲隨招安之甲戌金帥婁宿犯長安經略使郭琰棄城遁河北賊酈瓊圍光州冬十月丙子朔詔按察官歲上所發擿贓吏姓名以為殿最庚辰禁諸軍擅入川陝癸未帝至杭州復如浙東庚寅渡浙江郭仲威詣周望降望以仲威為本司統制辛卯李成陷滁州殺守臣向子伋壬辰帝至越州癸巳命提舉廣西峒丁李棫巿馬邕州置牧養務戊戌初命東南八路歲收經制五項錢輸行在張浚治兵于興元府金人陷壽春府庚子陷黃州守臣趙令𡷫死之辛丑張浚以同主管川陝茶馬趙開為隨軍轉運使專總四川財賦金人自黃州濟江劉光世引軍遁知江州韓梠棄城去金人自大冶縣趨洪州是月京西賊劉滿陷信陽軍殺守臣趙士負盜入宿州殺通判盛脩己十一月乙巳朔金人犯廬州守臣李會以城降王善叛降金金人執之丁未詔降雜犯死罪釋流以下囚聽李綱自便追復宋齊愈官貴仲正犯荊南兵馬鈐轄渠成與戰斬之戊申金帥兀朮犯和州守臣李儔以城降通判唐璟死之己酉張浚出行關陝兀朮陷無為軍守臣李知幾棄城走壬子太后退保虔州江西制置使王子獻棄洪州走丁巳金人陷臨江軍守臣吳將之遁戊午遣孫悟等充金國軍前致書使金人陷洪州權知州事李積中以城降撫袁二州守臣王仲山王仲嶷皆降淮賊劉忠犯蘄州韓世清逆戰破之忠入舒州殺通判孫知微庚申金人陷真州守臣向子忞棄城去辛酉太后至吉州壬戌金人犯建康府陷溧水縣尉潘振死之癸亥金人陷太平州主管步軍司閭勍自西京奉累朝御容至行在詔奉安于天慶觀尋命勍節制淮西軍馬以拒金人甲子杜充遣都統制陳淬岳飛等及金人戰于馬家渡王以軍先遁淬敗績死之乙丑以檢正諸房公事傅崧卿為浙東防遏使太后發吉州次太和縣護衞統制杜彥及後軍楊世雄率衆叛犯永豐縣知縣事趙訓之死之金人至太和縣太后自萬安陸行如虔州丁卯下詔回浙西迎敵金人犯吉州守臣楊淵棄城走又陷六安軍己巳帝發越州次錢清鎮庚午復還越州以周望同知樞密院事仍兼兩浙宣撫使守平江殿前都指揮使郭仲荀為副使守越州右軍都統制張俊為浙東制置使從行御史中丞范宗尹參知政事辛未兀朮入建康府守臣陳邦光戶部尚書李梲迎拜通判楊邦乂拒之癸酉帝如明州金人犯建昌軍兵馬監押蔡延世擊却之甲戌兀朮殺楊邦乂韓世忠自鎮江引兵之江陰軍江淮宣撫司潰卒李選攻陷鎮江淮西兵馬都監王宗望以濠州降于金是月張浚至秦州桑仲自唐州犯襄陽京西制置使程千秋敗走仲遂據襄陽十二月乙亥朔張浚承制廢積石軍丙子帝至明州丁丑江淮宣撫司準備將戚方擁衆叛犯鎮江府殺守臣胡唐老辛巳陷常州守臣周嵵遣赤心隊官劉晏擊走之金人陷廣德軍殺守臣周烈劉光世引兵趨南康軍壬午定議航海避兵禁卒張寶等憚行謀亂命呂頤浩等伏兵執寶等十七人斬之甲申張浚承制拜涇原經略使曲端為威武大將軍宣撫處置使司都統制乙酉兀朮犯臨安府守臣康允之棄城走錢塘縣令朱蹕死之己丑帝乘樓船次定海縣給行在諸軍雪寒錢辛卯留范宗尹趙鼎于明州以候金使癸巳帝次昌國縣乙未杜彥犯潭州殺通判孟彥卿趙民彥金人屠洪州戊戌金人犯越州安撫使李鄴以城降衞士唐琦袖巨石要擊金帥琶八不克死之郭仲荀棄軍奔溫州庚子移幸溫台癸卯黃潛善卒于英州李成自滁州引兵之淮西
