body:
  text: 宋史卷一百八十九志第一百四十二兵三廂兵廂兵者諸州之鎮兵也內總于侍衛司一軍之額有分隸數州者或一州之管兼屯數州者在京諸司之額五隸宣徽院以分給畜牧繕修之役而諸州則各以其事屬焉建隆初選諸州募兵之壯勇者部送京師以備禁衛餘留本城雖無戍更然罕教閲類多給役而已景德四年七月如京使何士宗言詔條禁軍將士依等級並行伏事之理違者按軍令其廂軍將士等未立條制欲望約前詔減一等定令帝曰禁衛兵士無他役使且廩給優厚欲其整肅有所廩畏故設此條禁今以廂軍約此施行恐難經久況尊卑相犯自有條律不行可也十二月詔廂軍及諸州本城犯所部決杖訖並移隸他軍內情理重及緣邊隨軍者奏裁大中祥符元年詔應諸道州府軍監廂軍及本城指揮自都指揮使已下至長行對本轄人員有犯階級者並於禁軍斬罪上減等從流三千里上定斷副兵馬使已上勘罪具案聞奏廂軍軍頭已下至長行準敕犯流免配役並徒三年上定斷只委逐處決訖節級已上配別指揮長行上名長行決訖配別指揮下名收管如本處別無軍分指揮即配鄰近州府軍監指揮收管內別犯重者自從重法其諸司庫務人員兵士有犯上件罪名者並依前項廂軍條例施行五年二月上諭王欽若等纍議老病之兵漸多在京者令逐司將臣外處者散差諸司使副揀選可指揮所揀殿前侍衛馬步軍司令先逐指揮自指揮使已下據見管兵士除堪任披帶征役外其自來懦弱教閲不出之人及老病不堪者籍其名供申次第管轄處各就逐營看詳定奪然後繳申逐司與差去使臣同共揀選如有協情不當即具始末以聞其廂軍都指揮使已下並當嚴斷外處揀就糧兵士亦如之又宣示外處就糧諸軍有捧日天武第七第九第十軍軍額皆是自上軍經兩三度揀選以其久處禁衛不欲便揀落特設上件軍額處之朕深慮揀兵臣僚軍頭等同諸軍例更揀配下軍可遍諭之老病者便放歸農內契丹渤海日本外國人恐無依倚特與收充本軍剩員又所差臣僚軍頭赴外處揀人緣軍分指揮及出入次第名目體例甚多令樞密院具合行條約及施行事件並畫一處分令遵守施行又殿前侍衛馬步軍司自來揀下披帶禁軍量減衣賜月糧充剩員並無定額散在逐營拘繫不獲營生官中所給歲計不少可乘此時一例揀選除老病者放歸農外據諸軍見管人數額定充看營剩員餘並撥併一處收管以備令赴諸處祇應既有定額必不敢多揀充剩員又詔承前遣使取內軍中疲老者咸給奉糧之半以隸剩員今可簡閲使歸農其合留者亦據逐營給役數外別為營舍處之內契丹渤海日本外國人慮無所歸且依舊仍令所至州郡並與總管鈐轄閲驗連書其狀具當去留之數及引視軍校之不任職者附驛以聞其當從隸軍額即就配近便州郡緣邊者徙于內地並與本州官吏移牒轉送當停者給與公驗止許居本州歲申上其籍並給次月奉糧裝錢日食遣之所簡馬但筋齒弱老病不療者件析以聞在京殿前馬步軍司有所升退即時具名籍申樞密院未當者悉改正之當徙者給裝錢在道只給糧當停者給一月奉糧勿復奏裁外州軍士當降以次軍分者所隸州郡聽自擇又詔廣南東西荊湖南北福建江南京西等七路諸州府軍監見管雜犯配隸軍人等各差使臣一人馳驛往逐處與轉運使副或提點臣僚知州通判鈐轄都監監押同共簡選就近體量人數分配側近州軍本城收管如年老病患委實久遠不任醫治充役者放令逐便其少壯者即差人管押赴闕引見當議選配近上軍分如不願量移及赴闕者亦聽其便仍於軍分量與遷改如地遠勾抽遲延即馳驛分路簡訖具析以聞七年詔今後軍回在京者且未編排依例引見內有老疾合配外處軍分及看倉庫草場神衛剩員並看營剩員等與限歇泊半月後編排引見訖限五日般移其外處軍回經過兵士並依此例仍見訖與假十日令移隸所配處八年詔諸路轉運司殿前侍衛馬步軍軍頭司三司宣徽院開封府諸司庫務等處人員兵士等如內有殺賊得功及諸般使喚得力者或因官中取索之時具詣實結罪供申所轄去處保明申奏天禧元年詔選天下廂兵遷隸禁軍者凡五千餘人二年詔河北禁軍疲老不任力役者委本路提點刑獄臣僚簡閲不得庇匿以費廩糧慶曆中招收廣南巡海水軍忠敢澄海雖曰廂軍皆豫旗鼓訓練備戰守之役皇祐中河北水災農民流入京東三十餘萬安撫使富弼募以為兵拔其尤壯者得九指揮教以武技雖廩以廂兵而得禁兵之用且無驕橫難制之患詔以其騎兵為教閲騎射威邊步兵為教閲壯武威勇分置青萊淄徐沂密淮陽七州軍征役同禁軍嘉祐四年復詔西路於鄆濮齊兗濟單州置步兵指揮六如東路法於是東南州軍多置教閲廂軍皆以威勇忠果壯武為號訓肄如禁軍免其他役治平初遣使分募河北河東陝西京東民為本城遇就糧禁軍闕即遣補又陝西州軍悉置壯城如河北以備繕完城壘之役景祐中本城四十三萬八千逮治平三年乃五十萬熙寧三年五月詔以禁軍分五都法檢治廂軍其後禁軍或降剩員或升補皆以備廂軍諸路力役之事間詔募增而京西轉運司所募多至三萬人陝西減額五千人亦至三萬人河朔流民寓京東者如舊制招募教閲以為忠果二十指揮分隸河北總管司以除盜恤飢而河北及熙河路修城壘河北所募兵五千人熙河亦三千人修京城以廢馬監兵置廣固保忠凡十指揮亦五千人湖南猺人平戎瀘軍興洮河轉漕又皆增置焉初樞密院言京師役兵不足歲取於諸路而江淮兵每飢凍道斃相屬略計歲所用外軍七千人調發增給不資請募東西八作司壯役指揮諸司雜犯罪人情輕者並配隸以次補雜役效役代諸路役兵從之又言諸路廂軍名額猥多自騎射至牢城其名凡二百二十三其間因事募人團立新額或因工作榷酤水陸運送通道山險橋梁郵傳馬牧隄防堰埭若此者事在而名未可廢及剩員直牢城皆待有罪配隸之人壯城專治城隍不給他役別為一軍而教閲廂軍亦自為額請以諸路不教閲廂軍併為一額餘從省廢其移併如禁軍法奏可遂下諸路轉運司以州大小高下為序始自某州為第一指揮差次至某州凡為若干指揮每指揮毋過五百人河北曰崇勝河東曰雄猛陝西曰保寧京東曰奉化京西曰徑武淮南曰寧淮兩浙曰崇節江南曰效勇荊湖曰宣節福建曰保節廣南曰清化川四路曰克寧八年詔欣代州諸寨以禁軍代廂軍元豐四年詔升南京青鄆鄧曹濟濮州有馬教閲廂軍及真定府北寨徑勇環州下蕃落未排定指揮並為禁軍五年三月以西邊用兵詔諸處役兵並罷令諸路轉運司剗刷京東西河東北淮南廂軍又令都水監刷河清及客軍共三萬餘人赴陝西團結十月詔諸路教閲廂軍於下禁軍內增入指揮名額排連並同禁軍於是馬步排定有馬廂軍二十二指揮無馬廂軍二百二十九指揮元豐之末總天下廂兵馬步指揮凡八百四十其為兵凡二十二萬七千六百二十七人而府界及諸司或因事募兵之額不與焉哲宗元祐二年太師文彥博言廂軍舊隸樞密院新制改隸兵部且本兵之府豈可無籍樞密院亦以為言乃詔本部自今進册以其副上樞密院三年詔京西路廂軍以三萬五百人為額又詔天下州郡以地理置壯城兵元符元年詔罪人應配五百里以上皆配陝西河東充廂軍諸路經略司各二千人止三年詔撥陝西保寧指揮入諸路廂軍額崇寧四年詔諸路廂軍不以等樣選少壯人招刺又詔廂軍工匠除上京修造外其餘路所差並放還休息之政和五年廣固四指揮各增五百人以備京城之役六年三月增置通濟兵士二千人備御前牽挽綱運於是工役日興增募益廣矣建炎而後兵制靡定逮乾道中四川廂軍二萬九百七十二人禁軍二萬七千九百九十二人厥後廢置損益隨時不同托其可考者以附見焉其將校則有馬步軍都指揮使有副都指揮使都虞候馬軍有都指揮使副都指揮使都虞候步軍亦如之馬步軍諸指揮有指揮使副指揮使每都有軍使副兵馬使都頭副都頭十將將虞候承局押官凡諸州騎兵步兵禁廂兵之類列如左其不同者分為建隆以來及熙寧以後之制云建隆以來之制馬軍騎射京東路南京青兗鄆曹徐齊濰淮陽京西路西京河陽陳許鄭潁滑河北路北京真定滄澶相恩冀陝西路永興鳳翔河中陝華秦涇鄜荊湖路江陵潭鄂嶽復安澧鼎永道郴邵桂陽內青淮陽係教閲威邊京東路南京青鄆密徐曹齊濮濟淄登萊沂單內登係教閲京西路西京河陽鄭蔡襄鄧滑潁汝郢均商隨唐信陽光化河北路瀛相邢祁濱霸磁衛趙莫洺乾寧廣信通利河東路澤遼陝西路永興鳳翔河中陝同華耀乾解虢淮南路亳廬宿荊湖路安昭武南京河中肅戎曹單勇單安武鄆齊必敵鄆陝邠決勝濟飛勇棣靜山兗宜勇敢沂密定邊蔡徐涇馬鬬永興宿安東登萊突陳延定乾懷廳直濟滄莫保雄霸定華保勝鄜光嵐歸恩鳳翔定戎涇安塞環慶遊奕許衙隊曹陳德永靜永隴儀峽武勝濠泗保忠滑輕騎邢順節真定敢勝深飛塞環保節陝西路州軍本城馬軍廣必勝慶定塞河北路州軍徑勇真定北寨係教閲下蕃落環外寨係教閲武清晉自此至招收凡十一軍兩朝志無飛騎麟振邊儀環威遠府本城廳子定克戎並清邊陝西忠烈河北鄉兵名神鋭後改是軍舊制老病者聽召人承補歸農承補者逃亡復取歸農者充役大中祥符四年詔罷之無敵保安肅廣信軍北平寨忠鋭廣濟招收河北河東舊又有定州揀中廳子易州靜塞並州咸聖後並廢飛將北京亳自此至揀中騎射凡三軍三朝志無保靜恩揀中騎射淮南路揚廬壽宿泗真蘄黃濠尤海和通舒滁漣水高郵無為江南路宣撫江吉筠袁歙太平池饒信廣德南康南安建昌臨江興國步軍武和開封武肅開封忠靖開封威勇定真定冀滄雄博深乾寧內青鄆淄密濟沂淮陽係教閲左衙南京鄆晉耀陝通安平難亳濠奉化京西路鄭許陳蔡滑河北路懷陝西路鳳翔淮南路揚亳廬壽宿濠和通泰楚舒真泗滁無為漣水高郵衙隊曹峽開武曹保寧濟衛開遠揚楚泗齊利劍安平齊靜邊棣六奇楚開山西京秦武勇濰泰懷安秦建安解府靜海徐淮陽通隨身宿隨唐商崇順青階忠略淄安海登水軍京東路登河東路潞保德陝西路秦陝淮南路揚廬壽光海和泰楚舒蘄黃泗漣水高郵無為江南路江寧洪袁虔宣歙饒信太平池江吉筠撫興國臨江南康廣德兩浙路州軍荊湖路江陵潭衡永郴邵鄂嶽復安澧峽鼎歸漢陽桂陽福建路福建漳泉邵武利州路興廣南路廣英賀封連康南雄春廉白雍寧濟萊永安西京耀武河陽鄧楚秦寧華橋道河陽澶壽興開道鄭雄猛絳定安河中開河河中定遠鳳復定邊涇壯武京東路青徐曹兗密濰濟濮登萊淮陽京西路西京陳蔡鄧襄潁汝光化陝西路鳳翔河中同耀華乾解陝保安淮南路揚廬壽黃光海和通蘄楚泰舒滁高郵荊湖路潭嶽安復內兗徐濟萊係教閲寧淮潁壽澶忠順潁壽崇寧汝嶽澄海韶循潮連梅南雄英賀封端南恩春惠桂容雍象昭龔蒙潯貴橫融化雷竇南儀白欽鬱林廉崖儋內廣廉高藤梧英賀新蒙龔儋係教閲保定均信陽懷寧定真定祁房宣節荊湖南路諸州軍監北路嶽澧鼎郢荊門諸監步捷金崇化光廣平虢勇勝永興清邊永興延渭鄜慶涇儀隴保安開廣原同建武密鄜環永清丹昭勝坊永寧潞永霸澤弓箭秦晉順安慈順霸隰崇勇成肅清乾懷節澶崇武懷廣霸北京興安北京制戎冀雄鋭真定定虜深招收汾遼澤石潞慈晉絳代欣威勝平定定和定保順滄清遠雄霸克勝瀛滄