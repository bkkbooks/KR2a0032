body:
  text: 宋史卷一百一十志第六十三禮十三嘉禮一上尊號儀高宗內禪儀上皇太后太妃冊寶儀舊史以飲食婚冠賓射饗宴脤膰慶賀之禮為嘉禮又以歲時朝會養老宣赦拜表臨軒命官附之今依政和禮分朝會為賓禮餘如其舊云尊號之典唐始載於禮官宋每大祀羣臣詣東上閣門拜表請上尊號或三上或五上多謙抑弗許如允所請即奏命大臣撰冊文及書冊寶其受冊多用祀禮畢日御正殿行禮禮畢有司以冊寶詣閣門奉進入內建隆四年羣臣三上表上尊號詔俟郊畢受冊前三日遣官奏告天地宗廟社稷遂為定制其儀有司宿設崇元殿仗衛文武百官並集朝堂之次攝太尉奉冊於案吏部侍郎一員押司徒奉寶於案禮部侍郎一員押以五品六品清資官充舉冊舉寶官皆承之以匣覆之以帊俱詣殿門外之東太尉之前太樂令帥工人入就位諸侍衛官及宰執兩制供奉官等立於殿階下香案前左右如常入閣儀侍中奏中嚴外辦所司承旨索扇扇上皇帝袞冕御輿出自西房樂作即御坐扇開樂止符寶郎奉寶如常儀禮直官通事舍人分引太尉以下文武羣官應北面位者各就橫行位太常卿於冊案前導至丹墀西階上少東北向置訖太尉司徒吏部禮部侍郎各入本班立定典儀贊百官再拜舞蹈三稱萬歲又再拜起居訖又再拜分班序立禮直官引太常卿隨行吏部侍郎押冊案以次序行太尉從之禮部侍郎次押寶案行司徒從之詣西階至解劍褥位其讀冊中書令讀寶侍中候冊案將至先升於前楹間第一柱北對立太尉解劍脫舄訖吏部侍郎押冊案先升太尉從升當御坐前太尉搢笏北面奉冊案稍前跪置訖俯伏興少退東向立中書令進當冊案前讀冊訖俯伏興又搢笏奉冊於褥東回冊函北向進跪置御坐前與舉冊官降還侍立位太尉亦降納舄帶劍禮部侍郎押寶案升司徒隨升北面跪置侍中讀寶訖置冊之南俱復位其納舄帶劍俯伏一如上儀典儀贊在位官皆再拜禮直官通事舍人引太尉至西階下解劍舄升當御坐前跪賀其詞中書門下撰賀訖復位皆再拜如讀冊寶儀侍中升至御坐前承旨退臨階西向稱有制典儀贊再拜訖宣曰朕以鴻儀昭舉保命會昌迫於羣情祗膺顯號退循寡昧惕懼增深所賀知宣訖復位典儀贊再拜舞蹈三稱萬歲又再拜訖侍中升階奏禮畢降復位扇上樂作帝降坐御輿入自東房扇開樂止侍中版奏解嚴中書侍郎帥奉案官升殿跪奉冊置於案次門下侍郎奉寶如奉冊禮通事舍人贊引詣東上閣門狀進所司承旨放仗百官再拜訖退如常儀自後受冊皆如之禮畢賜百官食于朝堂熙寧元年宰臣曾公亮等上表請加尊號詔不允先是翰林學士司馬光言尊號起唐武后中宗之世遂為故事先帝治平二年辭尊號不受天下莫不稱頌聖德其後佞臣建言國家與契丹常有往來書彼有尊號而中國獨無足為深恥於是羣臣復以非時上尊號論者甚為朝廷惜之今羣臣以故事上尊號臣愚以為陛下聰明睿知雖宜享有鴻名然踐祚未久又在亮陰之中考之事體似未宜受陛下誠能斷以聖意推而不居仍令更不得上表請則頌歎之聲將洋溢四海矣詔賜光曰覽卿來奏深諒忠誠朕方以頻日淫雨甲申地震天威彰著日虞傾禍被此鴻名有慚面目况在亮陰亦難當是盛典今已批降指揮可善為答辭使中外知朕至誠慚懼非欺衆邀名其後宰臣數上表請終不允徽宗內禪欽宗上尊號曰教主道君太上皇帝居龍德宮靖康元年正月朔朝賀畢車駕詣龍德宮賀百官班門外宰執進見如儀高宗內禪紹興三十二年六月十日御札皇太子可即皇帝位朕稱太上皇帝退處德壽宮皇后稱太上皇后應軍國事並聽嗣君處分十一日行內禪之禮有司設仗紫宸殿宰臣文武百僚立班皇帝出宮鳴鞭禁衛諸班直親從儀仗並內侍省執骨朵使臣等並迎駕自贊常起居皇帝升御坐知閣門官以下並內侍都知御帶以下一班起居次管軍一班起居次宰執以下常起居訖左僕射陳康伯知樞密院事葉義問參知政事汪徹同知樞密院事黃祖舜升殿奏曰臣等不才輔政纍年罪戾山積乃蒙容貸不賜誅責今陛下超然獨斷高蹈堯舜之舉臣等心實欽仰但自此不獲日望清光犬馬之情不勝依戀因再拜辭相與泣下幾至號慟帝亦為之流涕曰朕在位三十六年今老且病久欲間退此事斷自朕心非由臣下開陳卿等當悉力以輔嗣君康伯等復奏曰皇太子仁聖天下所共知似聞謙遜太過未肯便御正殿帝曰朕前此固嘗與之言早來禁中又面諭之即步行徑趨側殿門欲還東宮已再三敦勉邀留今在殿後矣宰執降階皇帝降坐鳴鞭還內宰臣文武百僚並退立班聽宣詔訖再拜舞蹈三稱萬歲再拜訖班權退復追班入詣殿下立班少頃新皇帝服履袍涕泣出宮禁衛諸班直親從儀仗等迎駕起居鳴鞭內侍扶掖皇帝至御榻涕泣再三不坐內侍傳太上皇帝聖旨請皇帝升御坐皇帝升御坐東側坐知閣門官以下一班起居稱賀次管軍官一班起居稱賀次文武百僚橫行北向立舍人當殿稱文武百僚宰臣陳康伯以下起居稱賀皇帝降御坐側身西向不坐俟宰臣以下再拜舞蹈三稱萬歲起居稱賀畢康伯等升殿奏臣等言願陛下即御坐以正南面上副太上皇帝傳授之意帝愀然曰君父之命出於獨斷此大位懼不敢當尚容辭避康伯等再奏茲者伏遇皇帝陛下應天順人龍飛寶位第以駑下之材恐不足以仰輔新政然依乘風雲千載之遇實與四海蒼生不勝幸慶再拜賀畢奏事而退宰執下殿皇帝還內鳴鞭宰執文武百僚赴祥曦殿候太上皇帝登輦扈從至德壽宮而退翌日詣德壽宮朝見前期儀鸞司設大次於德壽宮門內小次於殿東廊西向其日俟皇帝出即御坐從駕臣僚禁衛等起居如常儀皇帝降御坐乘輦至德壽宮文武百僚詣宮門外迎駕起居訖前導官太常卿閣門官太常博士禮直官先入詣大次前分左右立定俟皇帝降輦入次御史臺閣門太常寺報文武百僚入詣殿庭北向立定前導官導皇帝入小次簾降俟太上皇帝即御坐小次簾捲前導官導皇帝升殿東階詣殿上折檻前奏請拜皇帝再拜訖前導官導皇帝稍前躬奏聖躬萬福訖復位再拜訖導皇帝詣太上皇帝御坐之東西向立殿下在位官皆再拜搢笏三舞蹈三叩頭出笏就拜又再拜班首不離位奏聖躬萬福又再拜班退前導官以次退從駕官歸幕次以俟從駕太上皇帝駕興皇帝從入見太上皇后如宮中之儀皇帝還內如來儀每遇正旦冬至及朔望並依上儀十二日帝詣德壽宮以雨百僚免入見上就宮中行禮自後詣宮若行宮中禮即不集百官陪位十三日詔令宰臣率百官於初二日十六日詣德壽宮起居又詔朕欲每日一朝德壽宮修晨昏之禮面奉慈訓恐廢萬機勞煩羣下不蒙賜許禮官宜重定其期如前代朝朔望甚為疏闊朕不敢取於是禮部太常寺言漢書高皇帝五日一朝太上皇乞依此故事每五日一次詣德壽宮朝見如宮中禮帝始御後殿宰臣陳康伯等奏臣等朝德壽宮太上皇宣諭車駕每至宮必於門外降輦已再三勉諭既行家人之禮自宜至殿上降輦帝曰太上有旨不須五日一朝只朝朔望朕心未安宜令有司詳議如宮門降輦臣子禮所當然於是禮部太常言除朝朔望外乞於每月初八二十二日詣德壽宮起居如宮中儀自後皆遵此制如值雨盛暑祁寒臨期承太上特旨乃免十一月冬至上詣德壽宮稱賀上壽禮畢入見太后如宮中禮自後冬至並同隆興元年正月朔帝率百官詣德壽宮如冬至儀自後正旦並同乾道元年二月朔帝詣德壽宮恭請太上太后至延祥觀燒香太上與帝乘馬太后於後乘輿次幸聚景園次幸玉津園自後帝詣德壽宮恭請太上太后至南內或幸延祥觀靈隱寺天竺寺恭進太上聖政冊命皇太子起居稱謝遇游幸則宰執以下從駕至游幸所除管軍環衛官等俟駕還護從還內宰執以下並免護從先退淳熙十六年孝宗內禪皇太子即皇帝位紹熙五年光宗內禪皇子嘉王即皇帝位並如紹興三十二年故事太皇太后皇太后皇太妃冊禮建隆元年詔尊母南陽郡太夫人為皇太后仍令所司追冊四親廟後不果行至道三年四月尊太宗皇后李氏為皇太后宰臣等詣崇政殿門表賀皇帝又詣內東門表賀皇太后乾興元年真宗遺制尊皇后劉氏為皇太后淑妃楊氏為皇太妃亦不果行冊禮天聖二年宰臣王欽若等五表請上皇太后尊號十一月郊祀畢帝御天安殿受冊百官稱賀畢再序班侍中奏中嚴外辦禮儀使奏發冊寶帝服通天冠絳紗袍秉圭以出禮儀使閣門使導帝隨冊寶降自西階內臣奉至殿庭置橫街南東向褥位冊在北寶在南帝立殿庭北向褥位奉冊寶官奉冊寶案太常卿吏部禮部侍郎引置當中褥位禮儀使奏請皇帝再拜在位官皆再拜太尉司徒就冊寶位帝搢圭跪奉冊授太尉又奉寶授司徒皆搢笏東向跪受興奉冊寶案置於近東西向褥位禮儀使奏請皇帝歸御幄易常服乘輿赴文德殿後幄百官班退赴朝堂太尉司徒奉冊寶至文德殿外幄太尉以下各就次以俟侍中奏中嚴外辦太后服儀天冠袞衣以出奏隆安之樂行障步障方團扇侍衛垂簾即御坐南向樂止太常卿導冊案至殿西階下各歸班在位者皆再拜太尉押冊案司徒奉冊中書令讀冊訖侍中押寶案司徒奉寶侍中讀寶畢太尉司徒詣香案前分班東西序立尚宮贊引皇帝詣皇太后坐前帝服鞾袍簾內行稱賀禮跪曰嗣皇帝臣某言皇太后陛下顯崇徽號昭煥寰瀛伏惟與天同壽率土不勝欣抃俯伏興又再拜尚宮詣御坐承旨退西向稱皇太后答曰皇帝孝思至誠貫于天地受茲徽號感慰良深帝再拜尚宮引歸御幄太尉率百官稱賀奏隆安之樂太后降坐還幄樂止侍中奏解嚴所司放仗百官再拜退太后還內內外命婦稱賀太后皇帝於內殿在外命婦及兩京留司官並奉表稱賀自是上皇太后尊號禮皆如之熙寧二年神宗尊皇太后曹氏為太皇太后詣文德殿跪奉玉冊授攝太尉曾公亮金寶授攝司徒韓絳又跪奉皇太后高氏玉冊授攝太尉文彥博金寶授攝司徒趙抃禮畢百官稱賀哲宗即位詔尊太后高氏為太皇太后皇后向氏為皇太后德妃朱氏為皇太妃禮部議皇太妃生日節序物色其冠服之屬如皇后例稱慈旨慶賀用箋太皇太后皇太后於皇太妃稱賜皇帝稱奉百官不稱臣皇帝問皇太妃起居用箋皇太妃答皇帝用書宰臣請特建太皇太后宮曰崇慶殿曰崇慶曰壽康皇太后宮曰隆祐殿曰隆祐曰慈徽元祐二年詔太皇太后受冊依章獻明肅皇后故事皇太后受冊依熙寧二年故事皇太妃與皇太后同日受冊令太常禮官詳定儀注右諫議大夫梁燾請對文德殿太皇太后曰大臣欲行此禮豫意謂必難行燾對曰誠如聖慮願堅執勿許且母后權同聽政蓋出一時不得已之事乞速罷之中書舍人曾肇亦言太皇太后聽政以來止於延和殿受遼使朝見亦止於御崇政殿未嘗踐外朝今皇帝述仁祖故事以極崇奉之禮太皇太后儻以此時特下明詔發揚皇帝孝敬之誠而固執謙德止於崇政殿受冊則皇帝之孝愈顯太皇太后之德愈尊兩義俱得顧不美歟太皇太后欣然納之乃詔將來受冊止於崇政殿尋以天旱權罷未幾太師文彥博等以時雨溥澍秋稼有望請舉行冊禮凡三請乃從九月六日發太皇太后冊寶于大慶殿發皇太后太妃冊寶于文德殿行禮如儀紹聖元年詔奉太皇太后旨皇太妃特與立宮殿名坐六龍輿張繖出入由宣德正門有司請應宮中並依稱臣妾外命婦入內準此百官拜箋稱賀稱殿下徽宗即位加哲宗太妃號曰聖瑞既又御文德殿冊命元符皇后劉氏為太后並依皇后禮制建炎元年五月冊元祐皇后為隆祐太后令所司擇日奉上冊寶時方巡幸不克行禮遙尊韋賢妃為宣和皇后紹興七年三月詔略曰宣和皇后夙擁慶羡是生眇沖乃骨肉之至親偕父兄而時邁十年地阻懷陟岵凱風之思萬里使還奉上皇寧德之諱宜尊為皇太后令所司擇日奉上冊寶太常寺言請依祖宗故事俟三年之喪終制然後行禮時翰林學士朱震言唐德宗建中上太后沈氏尊號時沈太后莫知所在猶供張含元殿具袞冕出左序立東方再拜奉冊今太后聖體無恙信使相望豈可不舉揚前憲臣又聞三年之制惟天地社稷越紼行事德宗以大曆十四年即位明年改元建中時行易月之制故以冕服行事今陛下退朝之服盡如禮制謂當供張別殿遣三公奉冊冊藏于有司恭俟來歸願下禮官講明詔從之禮部太常言寶文欲乞以皇太后寶四字為文合差撰冊文官一員書冊文官一員書篆寶文官一員並差執政十年營建皇太后宮以慈寧為名十二月帝自常御殿詣慈寧殿遙賀皇太后奉上冊寶十二年八月皇太后還慈寧宮十月十八日奉進冊寶其日張設慈寧殿設坐殿中皇太后服褘衣即御坐本殿官設冊寶於殿下慈寧宮事務官並本殿官並朝服詣殿下再拜搢笏舉冊寶奉進先進冊次進寶進畢降坐易褘衣服常服皇帝詣慈寧殿賀如宮中儀次宰臣率百僚拜表稱賀三十二年六月詔上太上皇帝太上皇后尊號集議以聞左僕射陳康伯等言五帝之壽惟堯最高百王之聖惟堯獨冠今茲高世之舉視堯有光恭請上太上皇帝尊號曰光堯壽聖太上皇帝太上皇后尊號曰壽聖太上皇后詔恭依仍令禮部太常討論禮儀以聞左僕射陳康伯撰太上皇帝冊文兼禮儀使參政汪徹書冊文並篆寶知樞密院葉義問撰太上皇后冊文同知樞密院事黃祖舜書冊文八月十四日奉上冊寶是日陪位文武百僚太傅以下行事官並朝服入詣大慶殿下立班皇帝自內服履袍入御幄服通天冠絳紗袍出至大慶殿詣冊寶褥位前再拜在位官皆再拜訖皇帝行發冊寶授太傅之禮如儀禮畢皇帝還幄服履袍還內文武百僚退儀仗鼓吹備而不作護衛冊寶太傅以下行事官導從冊寶至德壽宮皇帝自祥曦殿服履袍乘輦至德壽宮大次降輦陪位文武官入殿庭立班定太傅以下行事官從冊寶入殿皇帝服通天冠絳紗袍升殿詣西向褥位立太上皇帝自宮服履袍即坐皇帝北向四拜起居訖次太傅以下皆四拜起居次行奉冊之禮中書令參知政事史浩讀冊攝侍中葉義問讀寶讀訖退復位皇帝再拜稱賀曰皇帝臣某稽首言伏惟光堯壽聖太上皇帝陛下冊寶告成鴻名肇正與天同壽率土均歡皇帝再拜次侍中承旨宣答曰皇帝孝通天地禮備古今勉受鴻名良深感慰皇帝再拜訖西向立次太傅以下再拜稱賀致詞曰攝太傅尚書左僕射臣康伯等稽首言伏惟光堯壽聖太上皇帝陛下肅臨寶位誕受丕稱獨推天父之尊普慰帝臣之願奏訖再拜舞蹈次侍中承旨宣答曰光堯壽聖太上皇帝聖旨倦勤滋久佚老是圖勉受嘉名但增感慰又再拜舞蹈次太上皇帝降坐入宮皇帝後從壽聖太上皇后冊寶入宮皇帝詣太上皇后坐前北向立太上皇后升坐皇帝四拜起居行奉上冊寶之禮讀冊官陳子常讀冊讀寶官梁康民讀寶讀訖復位皇帝再拜稱賀致詞曰皇帝臣某稽首言伏惟壽聖太上皇后殿下德茂坤元禮崇大號寶書翕受歡抃無疆皇帝再拜次宣答官承旨宣答曰壽聖太上皇后教旨皇帝祲容載蕆顯號來膺誠孝通天但深感惕皇帝再拜訖太上皇后降坐入宮次太傅以下文武百僚就德壽殿下拜箋稱賀以俟皇帝服履袍乘輦還內十六日宰臣率文武百僚詣文德殿拜表稱賀
