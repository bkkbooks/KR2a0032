body:
  text: 宋史卷二十六本紀第二十六高宗三四年春正月甲辰朔御舟碇海中乙巳金人犯明州張俊及守臣劉洪道擊卻之丙午帝次台州章安鎮己酉遣小校自海道如虔州問安太后庚戌金人再犯明州張俊引兵去浙東副總管張思政及劉洪道繼遁癸丑貶郭仲荀汝州團練副使廣州安置丙辰詔原兩浙州郡降金官吏丁巳婁宿陷陝州守臣李彥仙死之己未金人陷明州夜大雨震電乘勝破定海以舟師來襲御舟張公裕以大舶擊退之辛酉發章安鎮壬戌雷雨又作甲子泊溫州港口乙丑以中書舍人李正民為兩浙湖南江西撫諭使詣太后問安丁卯台州守臣朝公為棄城遁虔州衛兵及鄉兵相殺縱火肆掠三日劉可轉寇京西屢為桑仲所敗至是為其黨所殺復推劉超據荊門軍戊辰滕康劉王玉罷仍奪職己巳換給僧道度牒人輸錢十千辛未命臣僚條具兵退之後措置之策駐蹕之所是月金人攻楚州守臣趙立拒之金人犯邠州曲端遣涇原路副總管吳玠拒戰敗之于彭原又陷同州張浚遣謝亮使夏國至則其主乾順已稱制遂還二月甲戌朔酈瓊率衆降于劉光世叛將傅選詣虔州乞降乙亥奉安祖宗神御于福州詔復以盧益為資政殿學士李回端明殿學士並權知三省樞密院事金人陷潭州將吏王暕劉價趙聿之戰死向子諲率兵奪門亡去金兵大掠屠其城丙子金人自明州引兵還臨安癸未虔州鄉兵首領陳新率衆數萬圍城叛將胡友亦犯虔州與新戰破之新乃去甲申禁逃卒投刺別軍丙戌金人自臨安退兵命劉光世率兵追之丁亥金人陷汴京權留守上官悟出奔為盜所殺庚寅帝次溫州浙東防遏使傅嵩卿入越州辛卯金人陷秀州甲午知蔡州程昌𧜛棄城南歸鼎州民鍾相作亂自稱楚王乙未杜充罷丙申以金兵退肆赦張浚承制以陝西制置使王似知成都府罷諸路武臣提點刑獄李成入舒州金游騎至平江周望奔太湖守臣湯東野亦遁茶陵縣軍賊二千餘人犯郴州永興縣戊戌金人入平江縱兵焚掠辛丑白虹貫日鍾相陷澧州殺守臣黃宗權湖北制置使傅雱招諭孔彥舟彥舟聽命因以為湖南北捉殺使荊南守臣唐賣心棄城去金人陷醴州守臣王淑棄城去是月張浚自秦州引兵入援三月癸卯朔孔彥舟入鼎州金人去平江統制陳思恭以舟師邀敗其後軍于太湖呂頤浩請幸浙西丙午趙鼎言金兵去未遠遂緩其行丁未命發運司說諭兩浙富民助米以備巡幸辛亥遣兵部員外郎馮康國等撫諭荊湖南北廣南諸路壬子金人入常州守臣周嵵棄城去甲寅遣盧益及御營都統制辛企宗奉迎太后東還丙辰金人犯終南縣經略使鄭恩戰敗死之丁巳金人至鎮江府韓世忠屯焦山寺邀擊之詔侍從官各舉可充監司者一二人辛酉御舟發溫州宣撫司節制軍馬李允文部兵至鄂州御營前軍將楊勍叛甲子張浚請便宜辟官不許衝改戊辰孔彥舟擊敗鍾相禽相及其子子昂檻送行在己巳戚方陷廣德軍殺權通判王儔夏四月癸酉蠲江西州縣兵盜殘破民家夏稅戊寅吳玠及金人戰于邠州彭原店敗績部將楊晟死之己卯以觀文殿學士朱勝非為江西湖南北宣撫使是日張浚引兵至房州知金兵退乃還癸未帝駐越州甲申下詔親征巡幸浙西韓世忠駐軍揚子江要金人歸路屢敗之兀朮引軍走建康乙酉以御史中丞趙鼎為翰林學士鼎固辭不拜戚方圍宣州劉光世遣統制王德誘誅劉文舜于饒州丙申用趙鼎劾奏呂頤浩罷為鎮南軍節度使醴泉觀使命三省樞密院同班奏事韓世忠及兀朮再戰江中金人乘風縱火世忠敗績兀朮渡江屯六合縣丁酉復以趙鼎為御史中丞戊戌振明州被兵民家己亥以張俊為浙西江東制置使辛丑王德破妖賊王宗石于信州貴溪縣執其渠帥諸縣悉平是月金人犯江西者自荊門軍北歸留守司同統制牛皋潛軍寶豐擊敗之五月甲辰以范宗尹為尚書右僕射兼御營使辛亥統領赤心隊軍馬劉晏及戚方戰于宣州敗死壬子金人焚建康府執李梲陳邦光而去淮南宣撫司統制嶽飛邀擊于靜安鎮敗之是夜紫微垣內有赤雲亙天白氣貫其中癸丑詔臺諫等官各舉所知二人以張守參知政事趙鼎簽書樞密院事以白金三萬兩賜韓世忠軍贈戰歿將孫世詢嚴永吉張淵等官甲寅金人陷定遠縣執閭勍去勍不屈死之巨師古擊戚方于宣州數敗之方引去乙卯王綯罷丁巳命劉光世移軍捕戚方楊勍犯婺州戊午復置權尚書六部侍郎癸亥詔中原淮南流寓士人聽所在州郡附試甲子周望罷尋分司衡州居住置京畿淮南湖北京東西路鎮撫使乙丑升高郵軍為承州以翟興趙立劉位趙霖李成吳翊李彥先薛慶並為鎮撫使興河南府孟汝唐州立楚泗州漣水軍位滁濠州霖和州無為軍成舒蘄翊光黃州彥先海州淮陽軍慶承州天長軍丁卯慶及金人戰于承州城下纍敗之戊辰命江浙州縣祭戰死兵民分江東西為鄂州江州池州三路置安撫使罷諸路帥臣兼制置使諸州守臣兼管內安撫使是月劉超據荊南分兵犯峽州又合叛將彭筠犯復州淮西敗將崔增陷焦湖水寨河東北經制使王俊舉兵及金人戰于襄城縣敗之復潁昌府張浚承制以金房州隸利路六月辛未朔蠲紹興府三縣湖田米詔侍從臺諫諸將集議駐蹕事宜楊勍犯處州癸酉遣統制陳思恭討勍合江南兩路轉運為都轉運使再貶周望昭化軍節度副使連州安置甲戌罷御營司以范宗尹兼知樞密院事乙亥王遣統領林閏等追襲楊勍于東陽縣軍敗裨將李在死之丁丑以劉光世部兵為御前巡衛軍光世為都統制楊勍等焚建州戚方犯湖州安吉縣詔張俊捕之戊寅更御前五軍為神武軍御營五軍為神武副軍以知建康府權邦彥為淮南等路制置發運使滁濠鎮撫使劉位為賊張文孝所殺命其子綱襲職庚辰置鎮撫使六人陳規德安府復州漢陽軍解潛荊南府歸峽州荊門公安軍程昌𧜛鼎澧州陳求道襄陽府鄧隨郢州范之才金均房州馮長寧淮寧順昌府蔡州辛巳慮囚申命有司討論釐正崇寧以來濫賞罷諸州添差通判職官癸未召劉光世赴行在甲申嶽飛破戚方于廣德軍乙酉鍾相僞將胡源引兵入慈利縣執其黨陳誠來降丙戌以呂頤浩為建康路安撫大使劉光世為兩浙路安撫大使朱勝非為江州路安撫大使郭仲威為真揚州鎮撫使戚方詣張俊降庚寅召韓世忠率兵赴行在辛卯妖賊王宗石等伏誅壬辰權密州都巡檢徐文率部兵泛海來歸甲午置樞密院幹辦官四員乙未郭仲威犯鎮江府遣嶽飛擊之是月兀朮聞張浚在秦州將舉兵北伐自六合引兵趨陝西秋七月癸卯劉光世援宣撫使例乞便宜行事不許詔軍興以來諸州得便宜指揮者並罷乙巳馮長寧復順昌府張浚罷曲端都統制丁未以劉光世為集慶軍節度使開府儀同三司戊申以孔彥舟為辰沅靖州鎮撫使張浚獻黃金萬兩助軍用宣撫司遣統制官呂世存王俊復鄜州其餘州縣多迎降後軍將王闢叛陷歸州鈐轄田祐恭擊敗之己酉王闢犯房州守臣韋知幾棄城走庚戌楊勍受劉光世招安尋復叛去迫泉州癸丑崔增犯太平州守臣郭偉拒卻之乙卯金人徙二帝自韓州之五國城劉光世乞移司平江不許丙辰張俊合諸將戚方等兵萬餘赴行在丁巳申命元祐黨人子于州郡自陳盡還當得恩數韓世忠張俊並罷己未禁閩廣淮浙海舶商販山東慮為金人鄉導詔江浙福建州縣諭豪右募民兵據險立柵防遏外寇庚申以嶽飛為通泰州鎮撫使辛酉建州民范汝為作亂命統制李捧捕之乙丑復李邦彥以下十九人官職聽自便復李綱銀青光祿大夫許翰顏岐端明殿學士張浚貶曲端階州居住丁卯金人立劉豫為帝國號齊戊辰罷提領措置茶鹽司己巳詔王部兵屯信州程昌𧜛遣將杜湛禽李合戎于松滋縣是月張用據漢陽軍沿江措置副使李允文招降之以便宜徙鄂州路副總管以右軍統制馬友知漢陽軍八月辛未朔以禮部尚書謝克家參知政事壬申李成請降于江州詔撫納之張浚停程千秋官文州編管癸酉選神武中軍親兵六百人番直禁中甲戌詔侍從官日一員輪直進故事關治體者丁丑以韓世忠為檢校少師武成感德軍節度使張俊檢校少保寧武昭慶軍節度使贈監察御史常安民左司諫江公望為左諫議大夫録其後二人庚辰太后至自虔州薛慶及金人戰于揚州城下死之郭仲威奔興化縣辛巳侍御史沈與求戶部侍郎季陵以論宰相范宗尹皆黜宗尹復視事癸未盧益罷張浚復永興軍再貶曲端海州團練副使萬州安置甲申陳萬信餘黨雷進作亂乙酉焚慈利石門二縣以御營司參議官王擇仁權河東制置使山寨首領韋忠佺為都統制宋用臣馮賽同都統制丙戌命李成吳翊捍禦上流翊棄城去以成為四州鎮撫使命李捧便道過信州招捕靳賽戊子以饒信妖賊平赦二州徒以下囚蠲民今年役錢貶滕康永州劉王玉衡州並居住己丑詔嶽飛救楚州仍命劉光世遣兵往援辛卯杜湛渡江討羣賊復石首等五縣壬辰盜入梅州殺守臣沈同之大掠而去癸巳命福建安撫使程邁會兵討范汝為甲午知虢州邵興遣統制閻興及金人戰于解州東屢破之金人陷承州命陳思恭屯兵明州以防海道劉光世遣王德酈瓊以輕兵渡江乙未遇金游騎于召伯埭敗之戊戌以桑仲為襄陽鄧隨郢州鎮撫使是月罷提舉廣西峒丁孔彥舟入潭州宣撫司參議官王以寧率兵拒之以寧敗遁去宣撫司主管機宜文字傅雱在彥舟軍中承制以彥舟權湖南副總管劉綱以乏食率兵奔溧陽九月辛丑呂頤浩入見請益兵命王巨師古顏孝恭兵隸之分屯境內壬寅詔諸路決囚甲辰徽宗皇后鄭氏崩于五國城戊申命秦鳳將關師古領兵赴行在劉豫僭位于北京庚戌禁宣撫司僚屬便宜行事及京西湖南北路勿隸川陝宣撫司節制癸丑涇原同統制李彥琦及金人戰于洛河車渡敗之乙卯罷中書門下省檢正官桑仲陷均房州進犯白土關丙辰復增左右司郎官為四員金人攻楚州趙立死之丁巳趙霖復和州李成遣馬進犯興國軍戊午荊襄賊趙延壽犯德安府陳規拒卻之己未金均房安撫使王彥及桑仲戰于平麗縣敗之王闢詣彥降辛酉李捧擊范汝為于建州官軍皆潰捧遁去金人犯揚州統制靳賽逆戰于港河敗之金人陷延安府執呂世存又陷保安軍癸亥張浚遣都統制劉錫統五路兵及金將婁宿戰于富平縣浚駐邠州督戰官軍敗績丙寅給劉光世犒軍銀二萬兩絹二萬匹戊辰趙延壽焚郢州金人陷楚州鎮撫使李彥先來救兵敗死之冬十月庚午朔張浚斬環慶經略使趙哲于邠州貶劉錫合州安置命諸將各領兵歸本路浚退保秦州陝西大震辛未秦檜自楚州金將撻懶軍中歸于漣水軍丁祀水寨壬申命楊惟忠王討李成丙子以孔彥舟為鼎澧辰沅靖州鎮撫使戊寅鍾相餘黨楊華舉兵圍桃源縣己卯馬進犯江州癸未程昌𧜛入鼎州擊楊華破之甲申趣劉光世救楚州丁亥以李回同知樞密院事庚寅遣前御史臺檢法官謝嚮招范汝為召張浚以兵入援追復李邦彥觀文殿大學士辛卯虔州賊李敦仁及弟世雄舉兵破虔州石城縣甲午命楊惟忠率兵屯江州乙未嶽飛破金人于承州丙申詔劉光世節制諸鎮守禦通泰州伺便襲金人過淮是月馮長寧棄城去尋以淮寧附劉豫江東賊張琪犯建康府劉洪道招降之環慶路統制慕洧叛附于夏國涇原統制張中彥經略司幹辦趙彬叛降金人劉忠據嶽州平江縣白面山王善餘黨祝友擁衆為亂屯滁州龔家城十一月癸卯慕洧遂引金人圍環州呂頤浩復南康軍甲辰趙鼎罷乙巳秦檜入見丙午嶽飛棄泰州渡江丁未金人犯泰州飛退保江陰軍沙上以御史中丞富直柔簽書樞密院事秦檜為禮部尚書李允文殺嶽州守臣袁植呂頤浩會楊惟忠與馬進戰南康軍不利戊申頤浩遣巨師古救江州為進所敗師古奔洪州金人陷涇原經略使劉錡退屯瓦亭己酉以孔彥舟為湖南副總管部兵屯潭州庚戌命神武副軍都統制辛企宗討范汝為壬子日南至率百官遙拜二帝乙卯改樞密院幹辦官為計議官丙辰金人陷泰州丁巳通州守臣呂伸棄城去王彥攻桑仲于黃水破之房州平張浚以彥為金均房州鎮撫使崔增犯池州劉洪道遣統制李貴擊走之增以兵萬餘詣呂頤浩降甲子詔諸路守臣節制管內軍馬丙寅金房州賊郭希犯歸州田祐恭擊卻之命王部兵萬人速援呂頤浩祝友渡江大掠是月張浚退軍興州秦鳳副總管吳玠收餘兵保大散關東和尚原詔諸路轉運司括借寺觀田租蘆場三年十二月庚午安南請入貢卻之辛未遣度支員外郎韓球括饒信諸州錢糧凡江湖川廣上供皆拘之壬申命孔彥舟援江州丙子禁節制軍馬守臣便宜行事丁丑馬進分兵犯洪州乙丑李敦仁犯撫州崇仁縣命李山張忠彥討之壬辰金人犯熙州總管劉惟輔戰敗之殺五千餘人甲午再犯熙州惟輔軍潰被執死之乙未以張俊為江南招討使討李成丁酉范汝為降詔補民兵統領是月張浚承制復海州團練副使曲端左武大夫興州居住是歲宣撫處置司始令四川民歲輸激賞絹三十三萬匹有奇紹興元年春正月己亥朔帝在越州帥百官遙拜二帝不受朝賀下詔改元釋流以下囚復賢良方正直言極諫科蠲兩浙夏稅和買紬絹絲綿減閩中上供銀三分之一戊申改命張俊為江淮路招討使復江池路為江東西路分荊湖江南諸州為荊湖東西路置安撫司治池江鄂鼎州江南東西路各置轉運司荊湖東西路轉運司通掌兩路財賦以呂頤浩為江東路安撫大使朱勝非江西路安撫大使馬進陷江州守臣姚舜明棄城走端明殿學士王易簡等二百人皆遇害己酉嶽飛引兵之洪州金人犯揚州謝嚮率范汝為討平建陽賊劉時舉金人犯秦州吳玠擊敗之庚戌又犯西寧州守臣俱重迎降辛亥謝克家罷壬子詔京官知縣並堂除內外侍從各舉可任縣令者二人犯贓連坐自今不歷縣令者勿除監司郎官不歷外任者勿除侍從著為令張中孚以原州叛降于金癸丑李敦仁圍建昌軍蔡延世率鄉兵擊退之賊曹成入漢陽軍李允文招之成入鄂州復趨江西丁巳呂頤浩遣王崔增擊賊于湖口大敗之頤浩及楊惟忠引兵趨江州辛酉詔太祖創業垂統德被萬世神宗詔封子孫一人為安定郡王世世勿絶自宣和末至今未舉有司其上應襲封人名依故事舉行金人再圍環州是月張浚復曲端榮州刺史提舉江州太平觀閬州居住尋移恭州二月戊辰朔宜章縣民李冬至二作亂犯英連韶郴諸州祝友降劉光世分其軍以友知楚州庚午改行宮禁衛所為行在皇城司李成黨邵友犯筠州守臣王庭秀棄城去辛未犯臨江軍守臣康倬遁壬申初定歲祀天地社稷如奏告之禮癸酉桑仲自棗陽引兵還襄陽丁丑鄜延將李永琦叛犯慶陽府戊寅禁州郡統兵官擅招安亂軍盜賊己卯日中有黑子四日乃沒以辛企宗為福建制置使辛巳以秦檜參知政事壬午水賊張榮入通州癸未詔辛企宗及謝嚮罷遣范汝為兵汝為不聽命甲申詔王張俊掎角討捕馬進等賊丙戌復置祕書省己丑命孔彥舟呂頤浩張俊會兵討李成壬辰雨雹癸巳邵青寇宣州丙申詔諸路提刑司以八月類省試張浚亦以便宜合川陝舉人即置司類省試丁酉宣教郎范燾坐誣訟孟忠厚且及太后除名潮州編管是月李敦仁犯汀州馬友遣其黨犯鄂州總管張用拒卻之李允文以友權湖南招捉公事友大掠漢陽而去過嶽州守臣吳錫遁友據之三月戊戌朔以嚴衢二州守臣柳約李處勱有治效各進職一等呂頤浩遣崔增王合兵擊李成于湖口大敗之庚子張浚以富平之敗上疏待罪詔免壬寅禁諸路遏糴丙午張俊楊沂中嶽飛渡江擊馬進大敗之孔彥舟焚掠潭州趨衡州己酉李成犯饒州庚戌張俊楊沂中復擊馬進于筠河敗之復筠州進奔江州男子崔紹祖詐稱越王中子受上皇詔為天下兵馬大元帥趙霖以聞辛亥詔赴行在命劉光世兼淮南京東路宣撫使治揚州經畫屯田光世迄不行甲寅罷諸州免行錢乙卯金人破階州庚申劉超犯澧州統制杜湛率兵拒之甲子始下詔罪李成募人禽斬赦脅從者張俊追馬進至江州進戰敗遁去乙丑俊復江州楊沂中趙密引兵追擊進又大敗之成奔蘄州振淮南京東西流民荊湖東路安撫使向子諲說降馬友與共討李冬至二平之是月金人攻張榮縮頭湖水寨榮擊敗之來告捷劉光世以榮知泰州金人迫興州張浚退保閬州以端明殿學士張深為四川制置使及參議軍事劉子羽趨益昌參謀官王庶為龍圖閣待制知興元府兼利夔兩路制置使節制陝西諸路桑仲以其黨李道知隨州夏四月己巳張浚承制分利閬劍文政五州為利州路置經略安撫使庚午張琪復叛犯當塗縣金將撻懶渡淮屯宿遷縣馬樂湖壬申太白晝見乙亥劉光世復楚州階州統領杜肇復階州馬友引兵入潭州戊寅杜琪棄澧州劉超入據之己卯金涇原帥趙彬犯耀州守臣趙澄擊走之淮賊寇宏犯濠州庚辰隆祐皇太后崩癸未桑仲陷鄧州守將談兗棄城走河東招捉使王俊引兵來援仲執斬之以其黨李橫知州事乙酉為太后制期年服辛卯羣臣三上表始聽政癸巳命向子諲發兵及廣西安撫許中同扼險要防孔彥舟入廣仍許脅從自新以招諭之是月京西賊李忠陷商州守臣楊伯孫棄城走呂頤浩遣統制閻皋通判建昌軍蔡延世襲擊李敦仁禽其弟世雄世臣五月丙申朔蠲江西路被賊州縣賦稅丁酉詔呂頤浩朱勝非劉光世並兼淮南諸州宣撫使始奪李成官戊戌以張用為舒蘄鎮撫使癸卯作大宋中興寶成金人犯和尚原吳玠擊敗之丙午初復召試館職之制劉光世遣統制王德襲揚州執郭仲威以獻伏誅辛亥水軍統制邵青叛圍太平州趙彬及金人合兵圍慶陽府守臣楊可升擊敗之甲寅命知南外宗正事令選年幼宗子將育于宮中詔收耆戶長役錢己未詔州縣因軍期徵取民財物者立式榜示禁過數催擾庚申孔彥舟引衆過潭州馬友迎擊大敗之彥舟趨嶽州犯鄂州李允文以彥舟為湖東副總管屯漢陽辛酉以直祕閣宗綱為荊南鎮撫司措置營田官樊賓為副壬戌劉光世招降邵青趙延壽據分寧縣呂頤浩招降之是月張俊及李成戰于黃梅縣殺馬進成敗遁歸劉豫李忠談兗各率兵歸張浚浚命王庶分其兵張用復叛寇江西嶽飛招降之湖州進士吳木上書論宰執送徽州編管六月己巳始鬻承直修武郎以下官壬申冊諡皇太后曰昭慈獻烈甲戌張琪犯餘杭又犯宣州乙亥月犯心庚辰湖賊楊華楊廣犯鼎州程昌𧜛拒卻之上虞縣丞婁寅亮上書請選立繼嗣壬午權欑昭慈獻烈皇后于越州張琪犯徽州守臣郭東棄城去琪入據之癸未張俊引大兵至瑞昌縣之丁家洲李允文自鄂部兵歸俊俊並其兵護允文赴行在邵青率舟師至鎮江甲申復叛去丁亥崇安民廖公昭合范汝為餘黨熊志寧作亂衆既散志寧復與建陽民丁朝佐合兵陷二縣戊子慮囚己丑邵青犯江陰軍之福山遣海州鎮撫使李進彥中軍統制耿進率舟師會劉光世討之南安賊吳忠宋破壇劉洞天作亂庚寅江西提刑司遣官討之破壇洞天皆伏誅忠遁去癸巳熙河統制關師古洮東安撫郭玠同討熙州叛兵連敗之甲午廣賊鄧慶龔富圍南雄州守臣鄭成之率兵民以拒蠲建劍汀州邵武軍租是月知虢州邵興屯盧氏縣為河南統制董先所破走興元先遂取商虢二州張浚承制以吳玠為陝西諸路都統制時關隴六路盡陷止餘階成岷鳳洮五郡鳳翔之和尚原隴州之方山原粘罕既得陝西地悉與僞齊秋七月乙未朔以馬友權荊湖東路副總管趣討孔彥舟統制潘逵後軍將胡江等叛破玉山弋陽永豐三縣遣樞密院準備將領徐文討之戊戌吳錫復入邵州庚子以嶽飛為神武右副軍統制留軍洪州彈壓盜賊辛丑封伯右武衛大將軍令話為安定郡王壬寅虔州賊陳顒作亂命趣捕之甲辰詔祕書省長二通修日曆丙午劉光世遣將喬仲福擊邵青于常熟為所敗撻懶自宿遷北歸戊申韓世清追襲張琪復祁門縣庚戌張俊執傅雱赴行在張浚以曲端屬吏以武臣康隨提點夔路刑獄與王庶雜治之辛酉召呂頤浩赴行在張琪犯饒州頤浩遣閻皋擊敗之琪黨姚興降琪走徽州癸亥范宗尹罷是月濠州守臣李玠棄城去王彥數擊敗李忠趙彬來歸張浚承制以彬為陝西轉運使又以涇原兵馬都監李彥琪為本路副總管彥琪尋叛去八月丙寅以孔彥舟為蘄黃鎮撫使丁卯以知潭州吳敏為荊湖東西廣南路宣撫使張浚殺曲端于恭州獄張用部兵至瑞昌歸張俊俊以用為本軍統制戊辰張守等上紹興重修敕令格式癸酉復以汪伯彥為江東安撫大使乙亥呂頤浩遣將李鑄復舒州丁丑祔昭慈獻烈皇后神主于溫州太廟戊寅張守罷以李回參知政事富直柔同知樞密院事庚辰杜湛及劉超戰于彭山為所敗辛巳超及楊華楊廣合兵復寇鼎州程昌𧜛遣湛率舟師擊敗之遣辛企宗移軍福州討熊志寧胡江等諸賊韓世清及張琪戰世清敗琪復入祁門縣壬午命張俊遣兵捕之鑄紹興錢癸未詔許邵青張琪脅從徒黨自新乙酉以李成在順昌恐復謀亂遣使齎蠟書諭淮寧蔡州將士立賞格募人禽斬成丁亥以秦檜為尚書右僕射同中書門下平章事兼知樞密院事庚寅復李綱資政殿大學士募人往京東河南伺察金齊動止仍齎詔慰撫忠義保聚之人蔡州鎮撫使范福棄城去以土豪李祐代之辛卯蠲徽州被賊民家夏稅壬辰置三省樞密院賞功房是月知郢州曹成掠湖西犯沅州與知復州李宏合屯瀏陽既而攻宏宏奔潭州九月甲午朔張琪黨李捧犯宣州守臣李彥卿及韓世清擊却之詔江東西路安撫使復治建康府洪州以王知池州楊惟忠知江州並兼管內安撫使率部兵赴官丙申斬李世臣己亥以資政殿學士葉夢得為江南東路安撫大使兼壽春等六州宣撫使庚子張琪復陷宣州已乃遁去辛丑命王討琪丁未詔歲再遣使省謁諸陵因撫問河南將士命馬友移屯鄂州庚戌命宗室右監門衛大將軍士草巳朝饗溫州太廟辛亥合祭天地于明堂太祖太宗並配大赦罷諸州守臣節制軍馬録用元符末上書人子孫癸丑復以呂頤浩為尚書左僕射同中書門下平章事兼知樞密院事丁巳王彥破李忠于秦郊店忠奔歸劉豫戊午禁福建轉運司抑民出助軍錢落范宗尹觀文殿學士己未初措置河南諸鎮屯田以戶部尚書孟庾為江東西湖東等路宣諭制置使辛酉詔四方有建策能還兩宮者實封以聞有效者賞以王爵壬戌遣御史胡世將督捕福建盜賊是月長星見冬十月乙丑詔蔡京王黼門人實有才能者公舉擢李回罷丙寅朱勝非分司江州居住丁卯以李允文恣睢專殺賜死大理獄己巳王德招邵青降之庚午以孟庾參知政事徽猷閣直學士湯東野為江淮發運使劉洪道招降李捧華旺壬申置行在大宗正司癸酉兀朮攻和尚原吳玠及弟璘力戰大敗之兀朮僅以身免丁丑增置諸路武尉戊寅以張俊為太尉移屯婺州壬午初置見錢關子招人入中以給軍食范汝為復叛入建州守臣王浚明棄城走辛企宗退屯福州甲申劉超請降以超守光州戊子崔紹祖伏誅詔邵青以舟師赴行在己丑升越州為紹興府李成軍正李雱伏誅知承州王林禽張琪于楚州檻送行在壬辰録程頤孫易為分寧令癸巳范汝為犯邵武軍守臣吳必明統制李山率兵拒之衆潰退保光澤縣關師古復秦州獲郭振是月劉豫遣將王世冲寇廬州守臣王亨大破之斬世冲曹成及馬友戰于潭州成敗還攸縣王才遣將丁順圍濠州劉光世遣兵攻橫澗山順解圍去十一月乙未葉夢得至建康以詔招王才降之丙申遣內侍撫問孔彥舟桑仲丁酉榜諭福建江東羣盜赦其脅從者戊戌詔移蹕臨安以孟庾為福建江西荊湖宣撫使神武左軍都統制韓世忠副之仍命械謝嚮陸棠赴行在己亥以婁寅亮為監察御史范汝為犯光澤縣李山走信州辛丑續編紹興太常因革禮桑仲請正劉豫惡逆之罪詔進幸荊南乙巳以右司諫韓璜黨富直柔責監潯州稅張琪伏誅庚戌富直柔罷荊湖廣西宣撫使吳敏始受命置司柳州辛亥升康州為德慶府壬子詔內外侍從各舉所知三人丙辰程昌𧜛遣杜湛擊楊華敗之命張俊遣使持詔招曹成以所部赴行在己未楊華請降辛酉命吏部侍郎李光節制臨安府內外諸軍壬戌曹成犯安仁縣執安撫使向子諲進攻道州是月前知廓州李惟德以岷州來歸吳玠始遣人通書夏國十二月乙丑吳敏罷丙寅復置樞密院都承旨范汝為遣葉徹寇南劍州守臣張觷拒戰大破之己巳遣吏部侍郎傅嵩卿為淮東宣諭使甲戌遣江東安撫司統制郝晸顏孝恭討建昌軍賊乙亥辛企宗罷仍追三官率兵赴軍前自效丁丑蠲諸路在官積缺詔官戶名田過制者與民均科以嶽飛為神武副軍都統制部兵屯洪州曹成陷道州守臣向子忞棄城走戊寅以彗出求直言增行在職事官職錢遣駕部員外郎李願撫諭川陝己卯詔兩浙分東西路置提點刑獄庚辰桑仲遣兵寇復州守臣俎遹棄城去辛巳復置廣西提舉茶鹽司知海州薛安靖殺僞都巡檢使王企中率軍民以城來歸增諸路酒錢以備軍費甲申知龍州范綜統制雷仲舉兵復水洛城己丑起復陝西都統制吳玠為鎮西軍節度使詔江西安撫司趣兵討捕吳忠是月劉豫遣將王彥充攻壽春府桑仲遣李橫復寇金州王彥拒戰于馬郎嶺大破之均州平蔡州褒信縣弓手許約叛據光州階州安撫孫注復洮州龔富等圍南劍州
