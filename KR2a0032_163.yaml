耗則稽其版籍若貢賦征稅斂散移用則會其數而頒其政令焉凡四司所治之事侍郎為之二郎中員外郎參領之獨右曹事專隸所掌侍郎若事屬本曹郡縣監司不能直者受其訟焉大饗祀薦饌則尚書奉俎飲福則徹之朝會則奏貢物左曹分案五置吏四十右曹分案五置吏五十有六建炎兵興嘗以知樞密院張賣心提領措置戶部財用後遷中書侍郎仍兼之五年復以參知政事孟庾提領措置後罷專委戶部長二左曹分案三曰戶口掌凡諸路州縣戶口升降民間立戶分財科差人丁典賣屋業陳告戶絶索取妻男之訟曰農田掌農田及田訟務限奏豐稔驗水旱蟲蝗勸課農桑請佃地土令佐任滿賞罰繳奏諸州雨雪檢按災傷逃絶人戶曰檢法掌凡本部檢法之事設科有三曰二稅掌受納驅磨隱匿支移折變曰房地掌諸州樓店務房廊課利僧道免丁錢及土貢獻物曰課利掌諸軍酒課比較增虧知通等職位姓名人戶買撲鹽場酒務祖額酒息賣田投納牙契外有開拆知雜司右曹分案六曰常平掌常平農田水利及義倉振濟戶絶田産居養魚衆寡孤獨之事曰免役曰坊場曰平準各隨其名而任其事曰檢法曰知雜裁減吏額左曹四十人右曹三十人淳熙十年詔左藏南庫撥隸戶部舊制戶部侍郎二人中興初止除長二各一員或止除尚書若侍郎一員紹興四年七月詔戶部侍郎二員通治左右曹自此相承不改郎中左曹右曹員外郎掌分曹治事建炎三年詔省併郎曹惟戶部五司以職事煩劇不併仍各置一員紹興中專置提舉帳司總天下帳狀以戶部左曹郎官兼之右曹歲具常平錢物總數每秋季具冊以聞初置主管左右曹總稱戶部郎官紹興七年閻彥昭以太府寺丞兼左曹郎官紹興三十二年徐康正除左曹郎官自是相承不改是年又詔戶部事有可疑難裁決者許長二與衆郎官聚議文字皆令連書有定議然後付本曹行遣度支郎中員外郎參掌計度軍國之用量貢賦稅租之入以為出凡軍須邊備會其盈虛而通其有無若中外祿賜及大禮賞給皆前期以辦歲終則會諸路財用出入之數奏于上而以其副申尚書省凡小事則擬畫大事咨其長二應申請更改舉行勘審者則先檢詳供具分案六置吏五十有一凡上供有額封樁有數科買有期皆掌之有所漕運則計而給其直凡內外支供及奉給驛券賞賜衣物錢帛先期擬度時而豫之分案五曰度支曰發運曰支供曰賞賜曰知雜乾道四年置會稽都籍度支掌之裁減吏額置五十人淳熙十三年又減四人金部郎中員外郎參掌天下給納之泉幣計其歲之所輸歸于受藏之府以待邦國之用勾考平準市舶榷易商稅香茶鹽礬之數以周知其登耗視歲額增虧而為之賞罰凡綱運濡滯及負折者計程帳催理凡造度量權衡則頒其法式合同取索及奉給時賜審覆而供給之分案六曰左藏曰右藏曰錢帛曰榷易曰請給曰知雜裁減吏額共置六十人淳熙十三年又減四人倉部郎中員外郎參掌國之倉庾儲積及其給受之事凡諸路收糴折納以時舉行漕運上供封樁以時催理應供輸中都而有登耗則比較以聞歲以應用芻粟前期報度支均定支移折變之數其在河北陝西河東路者書其所支歲月季一會之若內外倉場帳籍供申愆期則以法究治分案六置吏二十有四元祐元年四月省郎官一員十月復置分案六曰倉場曰上供曰糶糴曰給納曰知雜曰開拆建炎三年罷司農寺歸倉部紹興四年復舊裁減吏額共置二十五人續又減二人禮部掌國之禮樂祭祀朝會宴饗學校貢舉之政令祭之名有三天神曰祀地祇曰祭宗廟曰饗又有大祀中祀小祀之別幣玉牲牢器服各從其等凡雅樂以六律六同合陰陽之聲為樂律金石絲竹匏土革木為樂器宮架八佾特架六佾分武文先後之序為樂舞其所歌為樂章若有事於南北郊明堂籍田禘祫太廟薦享景靈宮酌獻陵園及行朝貢慶賀宴樂之禮前期飭有司辦具閲所定儀注以舊章參考其當否上尚書省冊寶及封冊命禮亦如之凡禮樂制度有所損益小事則同太常寺大事則集侍從官祕書省長二或百官議定以聞凡天下選士具注於籍三歲貢舉與夫學校試補三舍生掌后妃親王以下推恩公主下嫁宗室冠婚喪葬之制及賜旌節章服冠帔門戟旌表孝行之法若印記圖書表疏之事皆掌焉大祥瑞則朝參官以上詣閣門表賀餘於歲終條奏舊屬禮儀院判院一人以樞密院使參知政事充知院以諸司三品以上充主吏無定數擇三司京朝百司胥史充禮部止設判部一人掌科舉補奏太廟郊社齊郎室長掌坐都省集議百官謝賀章表諸州申祥瑞出入內外牌印之事兼領貢院掌受諸州解發進士諸科名籍及其家保狀文卷考驗戶籍舉數年齒而藏之若朝廷遣官知舉則主判官罷事畢以知舉官卑者一員主判元豐官制行悉歸禮部其屬三曰祠部曰主客曰膳部設官十尚書侍郎各一人郎中員外郎四司各一人元祐初省祠部郎官一員以主客兼膳部紹聖改元主客膳部互置郎官兼領建炎以後並同尚書掌禮樂祭祀朝會宴享學校貢舉之政令侍郎為之二郎中員外郎參領之凡講議制度損益儀物則審覆有司所定之式以次咨決而質於尚書省大祭祀則省牲鼎鑊視滌濯薦腥則奉籩豆簠簋及飲福徹之祼則奉瓚臨鬯凡天地宗廟陵園之祀后妃親王將相封冊之命皇子加封公主降嫁稽其彝章以詔上下而舉行之朝廷慶會宴樂宗室冠婚喪祭蕃使去來宴賜與夫經筵史館賜書修書之禮例皆同奉常講求參酌而定其儀節三歲貢舉學校試補諸生皆總其政旌節章服之頒祥瑞表奏之進凡關於禮樂者皆掌之建炎三年詔鴻臚光祿寺併歸于禮部太常國子監亦隸焉分案五曰禮樂曰貢舉曰宗正奉使帳曰封冊表奏曰檢法各隨其名而治其事裁減吏額四十五人續又減四人侍郎奏中嚴外辦同省牲及視饌腥熟之節祼受瓚奉槃歲祀昊天上帝祭皇地祇與尚書迭為亞獻祭太社太稷神州地祇則迭為初獻祀九宮貴神五帝感生帝朝日夕月蠟祭東西方亦如之大朝會則尚書奏藩國貢物凡慶賀若謝則郎中員外郎分撰表文祠事與太常少卿祠部官迭為終獻或亞獻親郊自景靈宮朝獻太廟朝享至望燎禮畢乘輿還內皆奏解嚴分案十置吏三十有五南渡諸曹長二互置紹興七年禮部置侍郎二員隆興元年詔除尚書不常置外禮部侍郎置一員郎中員外郎元豐郎官員外郎參領禮樂祭祀朝會宴享學校貢舉之事有所損益則審訂以次咨決凡慶會若謝掌撰表文與祠部主客膳部並列為四建炎三年併省郎曹禮部領主客祠部領膳部隆興元年復詔禮部祠部一員兼領自是併行四司之事矣通置吏五十四人祠部郎中員外郎掌天下祀典道釋祠廟醫藥之政令月奏祠祭國忌休暇之日每歲大祀忌日大忌前一日皆不坐元日冬至寒食假各七日天慶先天降聖節各五日誕聖節正七月望夏至臘各三日天祺天貺節人日中和二社上巳端午三伏七夕授衣重九四立春秋分及每旬假各一日若神祠封進爵號則覆太常所定以上尚書省凡宮觀寺院道釋籍其名額應給度牒若空名者毋越常數初補醫生令有司試藝業歲終校全失而賞罰之分案五置吏二十有一主客郎中員外郎掌以賓禮待四夷之朝貢凡郊勞授館宴設賜豫辨其等而以式頒之至則圖其衣冠書其山川風俗有封爵禮命則承詔頒付掌嵩慶懿陵祭享崇義公承襲之事分案四置吏七元祐六年七月兵部言兵部格掌蕃夷官授官主客令蕃國進奉人陳乞轉授官職者取裁即舊應除轉官者報所屬看詳舊來無例創有陳乞曹部職掌未一久遠互失參驗自今不以曾未貢及例有無應緣進奉人陳乞授官加恩令主客關報兵部從之膳部郎中員外郎掌牲牢酒醴膳羞之事凡所用物前期計度以關度支若祭祀朝會宴享則同光祿寺官視其善否酒成則嘗而後進季冬命藏冰春分啓之以待供賜分案七置吏九兵部掌兵衛儀仗鹵簿武舉民兵廂軍土軍蕃軍四夷官封承襲之事輿馬器械之政天下地土之圖凡儀衛大朝會用黃麾大仗文德殿視朝及冊命王公大臣用黃麾半仗紫宸殿受外國使朝用黃麾角仗文德殿發冊用黃麾細仗鹵簿有大駕法駕小駕皆掌其數及行列先後之儀為圖以授有司凡武選之制倣貢舉之法凡聯其什伍而教之以戰為民兵材不中禁衛而足以執役為廂軍就其鄉井募以禦盜為土軍以老疾而裁其功力之半為剩員團結以禦戎為洞丁為義軍弩手屬羌分隸邊將為蕃兵籍其名數而頒其禁令大將出征奏捷則告于廟破賊則露布以聞凡招置廂禁軍及州郡屯營三衙遷補守戍軍吏轉補文武官白直宣借皆掌之其屬三曰職方曰駕部曰庫部舊判部事一人以兩制充掌三駕儀仗鹵簿圖春秋釋奠武成王廟及武舉歲終以義軍弓箭手戶數上于朝國初掌千牛備身殿中省進馬籍元豐設官十尚書侍郎各一四司郎中員外郎各一元祐初省駕部郎中一員以職方兼庫部紹興改元詔職方庫部互置郎官一員兼尚書掌兵衛武選車輦甲械牧之政令以天下郡縣之圖而周知其地域凡陳鹵簿設仗衛飭官吏整肅蕃夷除授奉行其制命凡軍兵以名籍統隸者閲習按試選募遷補及武舉校試之事皆總之侍郎為之二郎中員外郎參掌之大禮則尚書充鹵簿使大祀奉魚牲及俎視朝則侍郎執班簿對立小祀則郎中員外郎薦俎並徹分案九置吏四十有七凡蕃夷屬戶授官封襲之事皆掌之建炎三年併衛尉寺隸焉分案十曰賞功曰民兵衛曰廂兵曰人從看詳曰帳籍告身曰武舉曰蕃官曰開拆曰知雜曰檢法乾道裁減吏額共置三十人續詔將下班祗應並進義校尉守闕進義副尉進武校尉守闕進武副尉並隸兵部許於殿前司抽差下班祗應文字人吏六名赴部行遣侍郎掌二尚書之事南渡長二互置續置侍郎二員紹興常置一員郎中員外郎參掌本部長二之事建炎三年詔兵部兼職方駕部兼庫部隆興元年詔駕部兵部郎官共一員兼領自是四司合為一矣厥後間或並置若從軍或將命于外則假以為寵焉職方郎中員外郎掌天下圖籍以周知方域之廣袤及郡邑鎮寨道里之遠近凡土地所産風俗所尚具古今興廢之因州為之籍遇閏歲造圖以進四夷歸附則分隸諸州度田屋錢糧之數以給之分案三置吏五舊判司事一人以無職事朝官充掌受閏年圖經國初令天下每閏年造圖納儀鸞司淳化四年令再閏一造咸平四年令上職方轉運畫本路諸州圖十年一上紹熙三年職方駕部吏額通入兵部庫部併作四十二人駕部郎中員外郎掌輿輦車馬驛置牧之事大禮戒有司具五輅凡奉使之官赴闕視其職治給馬如格官文書則量其遲速以附步馬急遞總內外監牧籍其租入多寡孳産登耗凡市馬於四夷者溢歲額則賞之分案六置吏十有三建炎三年併太僕寺隸焉庫部郎中員外郎掌鹵簿儀仗戎器供帳之事國之武庫隸焉凡內外甲仗器械造作繕修皆有法式若御大慶文德殿應用鹵簿名數前期以戒有司祭祀喪葬則給以等差總衛尉寺金吾仗司兵匠之數考其功罪歲月而以法升降之分案四置吏九刑部掌刑法獄訟奏讞赦宥復之事凡斷獄本於律律所不該以敕令格式定之凡律之名十有二曰名例曰禁衛曰職制曰戶婚曰庫曰擅興曰盜賊曰鬥訟曰詐僞曰雜律曰捕亡曰斷獄禁於未然之謂令施於已然之謂敕設於此而使彼至之之謂格設於此而使彼效之之謂式其一司一路海行所不該者折而為專法若情可矜憫而法不中情者讞之皆閲其案狀傳例擬進應詔獄及案劾命官追命姦盜以程督之審覆京都辟囚在外已論決者摘案檢察凡大理開封殿前馬步司獄糾正其當否有辨訴以情法與奪赦宥降放雪若命官牽復則以朞數定之其屬三曰都官曰比部曰司門設官十有三尚書一人侍郎二人郎中員外郎刑部各二人都官比部司門各一人國初以刑部覆大辟案淳化二年增置審刑院知院事一人以郎官以上至兩省充詳議官以京朝官充掌詳讞大理所斷案牘而奏之凡獄具上先經大理斷讞既定報審刑然後知院與詳議官定成文草奏記上中書中書以奏天子論決大中祥符二年置糾察刑獄司糾察官二人以兩制以上充凡在京刑禁徒以上即時以報若理有未盡或置淹恤追覆其案詳正而駮奏之凡大辟皆録問熙寧三年詔詳議詳斷詳覆官初入以三年為任次以三十月為任欲出者聽前任滿半年指闕注官滿三任者堂除八年罷詳議詳斷官親書節案止令節略付吏仍減議官一斷官二元豐二年知院安燾言天下奏案益多於往時自熙寧八年減議官斷官力既不足故事多疏謬增詳議官一刑部增詳斷官一三年八月詔省審刑院歸刑部以知院官判刑部掌詳議詳覆司事刑部主判官為同判刑部掌詳斷司事審刑議官為刑部詳議官官制行悉罷歸刑部元祐元年省比部郎官一員以都官兼司門五月三省言舊制糾察在京刑獄以察違慢自罷歸刑部無復申明糾舉之制請以御史臺刑察兼領其御史臺刑獄令尚書省右司糾察從之刑部舊有詳覆案自官制行歸諸路提刑司至是復置四年併制勘體量為一案紹聖元年詔都官司門互置郎官一員崇寧二年十二月詔刑部尚書通治左右曹侍郎一治左曹一治右曹如獨員即通治餘並依官制格令尚書掌天下刑獄之政令凡麗于法者審其輕重平其枉直而侍郎為之二應定奪審覆除雪復移放則尚書專領之制勘體量奏讞糾察録問則長二治之而郎中員外郎分掌其事有司更定條法則覆議其當否凡聽訟獄或輕重失中有能駮正詔其賞罰若頒赦宥則糾官吏之稽違者大祀則尚書涖誓薦熟則奉牲大禮肆赦則侍郎授赦書付有司宣讀承旨釋囚分案十二置吏五十有二紹興後分案十三曰制勘掌凡根勘諸路公事曰體量掌凡體究之事曰定奪掌訴雪除落過名曰舉掌命官復曰糾察掌審問大辟曰檢法掌供檢條法曰頒降掌頒條法降赦曰追毀掌斷罰追毀宣敕曰會問掌批會過犯曰詳覆掌諸路大辟帳狀曰捕盜曰帳籍掌行在庫務理缺帳籍曰進擬掌進斷案刑名文書裁減吏額置三十五人侍郎舊制應定奪審覆除雪復移放尚書專領之若制勘體量奏讞糾察録問長二通治之南渡長二互置隆興常置一員淳熙十六年依崇寧專法奏獄及法令事請大理寺官赴部共議之用侍郎吳博古之說也郎中員外郎各二人分左右廳掌詳覆雪之事建炎三年刑部郎官以二員為額關掌職事初無分異紹興二十六年詔依元豐舊法分廳治事先是右司汪應辰言刑部郎官分為左右左以詳覆右以雪同僚異事祖宗有深意倘初無分異則有不當于理者孰為追改乞遵用舊制要使官各有守人各有見參而用之以稱欽恤之意從之仍令今後倣此都官郎中員外郎掌徒流配隸凡天下役人與在京百司吏職皆有籍以考其役放及增損廢置之數若定差副尉舊為軍大將則計其所歷而以役之輕重均其勞逸給印紙書其功過展減磨勘歲月元祐八年以綱運差使關歸吏部省副尉員三百紹聖間復其額及元豐押綱法歸都官崇寧二年二月復配隸案先是元豐中都官有吏籍配隸案元祐中罷之因刑部有請乃詔如舊六月侍郎劉賡奏副尉差遣有立定優重等第都官條雖特旨亦許執奏乞申嚴其禁從之分案四置吏十有八建炎三年詔比部兼司門隆興元年詔都官比部共置一員自此都官兼比部司門之事分案五曰差次曰磨勘曰吏籍曰配隸曰知雜各因其名而治其事裁減吏額置十二人淳熙十三年減三人比部郎中員外郎掌勾覆中外帳籍凡場務倉庫出納在官之物皆月計季考歲會從所隸監司檢察以上比部至則審覆其多寡登耗之數有陷失則理納鈎考百司經費有隱昧則會問同否而理其侵負舊帳案隸三司自治平中至熙寧初凡四年帳未鈎考者已踰十有二萬錢帛芻粟積虧不可勝計五年十一月曾布奏以四方財賦當有簿書文籍以鈎考其給納登耗多寡遂置提舉帳司選人吏二百人驅磨天下帳籍並選官吏審覆七年二月詔帳司每歲具天下財用日出入數以聞元豐初年詔諸路財賦出入自今三年一供著為令官制行釐其事歸比部元祐元年七月用司馬光奏悉總於戶部三年釐正倉部勾覆理缺憑由案及印發鈔引事歸比部政和六年詔寺監先期檢舉如庫務監官所造文帳委無未備方許批書違者御史臺奏劾用郎官梅執禮之請也分案五置吏百有一建炎以後或以都官兼比部司門之事司門郎中員外郎掌門關津梁道路之禁令及其廢置移復之事應官吏軍民輦道商販譏察其冒僞違縱者凡諸門啓閉之節及關梁餘禁以時舉行分案二置吏五工部掌天下城郭宮室舟車器械符印錢幣山澤苑囿河渠之政凡營繕歲計所用財物關度支和市其工料則飭少府將作監檢計其所用多寡之數凡百工其役有程而善否則有賞罰兵匠有闕則隨以緩急招募籍坑冶歲入之數若改用錢寶先具模製進御請書造度量權衡則關金部印記則關禮部凡道路津梁以時修治舊制判部事一人以兩制以上充元豐並歸工部其屬三曰屯田曰虞部曰水部設官十尚書侍郎各一人工部屯田虞部水部郎中員外郎各一人元祐元年省水部郎官一員紹聖元年詔屯田虞部互置郎官一員兼領尚書掌百工水土之政令稽其功緒以詔賞罰總四司之事侍郎為之二若制作營繕計置採伐所用財物按其程式以授有司郎中員外郎參掌之應官吏兵民緣本曹事有功賞罪罰則審實以上尚書省大祭祀則尚書薦俎與徹若諸監鼓鑄錢寶按年額而課其數因其登耗以詔賞罰凡車輦飭器印記之造則少府監文思院隸焉甲兵器械之制則軍器所隸焉有合支物料工價則申于朝以屬戶部建炎併將作少府軍器監並歸工部是時營繕未遑惟戎器方急紹興二年詔於行在別置作院造器甲令工部長二提點郎官逐旬點檢少府監既歸工部文思院上下界監官並從本部辟差又詔御前軍器所隸工部自是營造稍廣宰臣議戶部以給財為務工部以辦事為能誠非一體欲令戶工部兼領其事卒未能合隆興以後宮室器甲之造寖稀且各分職掌部務益簡特提其綱要焉分案六曰工作曰營造曰材料曰兵匠曰檢法曰知雜又專立一案以御前軍器案為名裁減吏額共置四十二人侍郎掌二尚書之事南渡初長二互置隆興詔各置一員郎中員外郎舊制凡制作營繕計置採伐材物按程式以授有司則參掌之建炎三年詔工部郎官兼虞部屯田郎官兼水部隆興元年詔工部屯田共一員兼領自此四司合為一矣淳熙九年以趙公廙為屯田員外郎自是不復省屯田郎中員外郎掌屯田營田職田學田官莊之政令及其租入種刈興修給納之事凡塘濼以時增減堤堰以時修葺升有司修葺種植之事以賞罰詔其長二而行之分案三置吏八虞部郎中員外郎掌山澤苑囿場冶之事辨其地産而為之厲禁凡金銀銅鐵鉛錫鹽礬皆計其所入登耗以詔賞罰分案四置吏七水部郎中員外郎掌溝洫津梁舟楫漕運之事凡堤防決溢疏導壅底以時約束而計度其歲用之物修治不如法者罰之規畫措置為民利者賞之分案六置吏十有三紹興纍減吏額四司通置三十三人軍器所隸工部提點官二員紹興三十二年詔於邊臣內差提轄監造官各二員幹辦受給監門官各一員掌鳩工聚材製造戎器之政令舊就軍器監置別差提舉官以內侍領之紹興中改隸工部罷提舉官日輪工部郎官軍器監官前去本所點驗監視後復以中人典領工部侍郎黃中以為言請復隸屬從之孝宗即位有旨增置提點官以內省都知李綽為之改稱提舉免隸工部後以御史張震力爭復隸工部後改隸步軍司尋復舊紹熙元年減省員額如上制文思院隸工部提轄官一員監官三員內置一員文臣京朝官充監門官一員掌金銀犀玉工巧及采繪裝鈿之飾凡儀物器仗權量輿服所以供上方給百司者於是出焉沿革附見榷貨務都茶場提轄官六部監門六部監門官一員掌司門鑰紹興二年置選升朝文臣有才力人充仍令六部踏逐奏差序位請給依寺監丞郎官有闕得兼之初從吏部尚書沈與求之請也主管架閣庫掌儲藏帳籍文案以備用擇選人有時望者為之舊有管幹架閣庫官宣和罷之紹興十五年復置吏戶部各差一員禮兵部共差一員刑工部共差一員以主管尚書某部架閣庫為名從大理寺丞周楙請也嘉定八年又置三省樞密院架閣官
