body:
  text: 宋史卷一百六十三志第一百一十六職官三吏部戶部禮部兵部刑部工部六部監門六部架閣吏部掌文武官吏選試擬注資任遷蔭補考課之政令封爵策勳賞罰殿最之法凡文階官之等三十武選官之等五十有六幕職州縣官之等七散官之等九皆以左右高下分屬於四選曰尚書左選文臣京朝官以上及職任非中書省除授者悉掌之曰尚書右選武臣升朝官以上及職任非樞密院除授者悉掌之自初任至幕職州縣官侍郎左選掌之自副尉以上至從義郎侍郎右選掌之若文武官雖不隸左右選而職任係中書省樞密院除授者其制命誥敕皆本部奉行凡應注擬升移復蔭補及酬賞封贈者所隸審驗格法上尚書省法例可否不決應取裁者亦如之若中散大夫左右武大夫以上合命詞者列其遷資級歲月功過上中書省樞密院畫旨給告通書本部長二及所隸郎官其屬有曰司封曰司勳曰考功凡官十有三尚書一人侍郎一人郎中員外郎尚書選二年侍郎選各一人司封司勳考功各一人舊制有三司尚書主其一侍郎二員各主其一分銓注擬事其後但存尚書銓餘東西銓印存而事廢淳化中又置考課院磨勘幕府州縣功過引對黜陟至道二年以其事歸流內銓判流內銓事二人以御史知雜以上充掌節度判官以下州府判司諸縣令佐擬注對揚磨勘功過之事判部事二人以帶職京朝官或無職事朝官充凡文吏班秩品命令一出於中書而小選院既不復置本曹但掌京朝官服章申請攝官訃吊祠祭及幕府州縣官格式闕簿辭謝拔萃舉人兼南曹甲庫之事流外銓掌考試附奏諸司人吏而已南曹掌考驗選人殿最成狀而送流內銓關試勾黃給曆之事甲庫掌受制敕黃關給籤符優牒選人改名廢置之事初淳化三年置磨勘京朝官院四年改太平興國中置差遣院至是併入審官院置知院二人以御史知雜以上充舊以朝官充掌考校京朝官殿最其爵秩而詔於朝分擬內外任使而奏之元豐官制行六曹尚書侍郎為長二郎官理郡守以上資任者為郎中通判以下資序者為員外郎除授皆視寄祿官高一品以上者為行下一品者為守下二品以下者為試品同者不用行守試餘職準此元祐初置權尚書奉賜依守侍郎班序在試尚書之下雜壓在左右常侍之下又置權侍郎如未歷給事中中書舍人及待制以上者並帶權字祿賜比諫議大夫郎官雖理知州資序未曾實歷知州及監司開封府推官者止除員外郎又詔職事官除去行字一等又以六曹職事間劇不等減定員數事簡者他司兼領司封司勳各減郎官一員紹聖初詔元豐法以行守試制祿三等元符元年吏部言元祐法小使臣只降宣劄但務從簡於理未安請自借職而上依元豐法給告從之崇寧元年詔大宗正丞大理正諸寺監丞太學武學律學博士太學正録諸宮院諸州教授堂除外其吏部闕不許占差已授未赴及初到任人二年詔十年不到部者依長定格與降一官二十年以上則除其籍靖康元年七月詔以吏部四選逐曹條例編集板行八月臣僚言祖宗時未有宗室參部之法神宗時始選擇差注一二崇寧初立法大優宗室參選之日在本部名次之上既壓年月深遠勞效顯著之人復著名州大郡優便豐厚之處議者頗欲懲革不注郡守縣令與在部人通理名次從之尚書掌文武二選之法而奉行其制命凡序位有品寓祿有階列爵有等賜勳有給分任有職選官有格考其功過計其歲月辨其位秩而以序進之凡文臣自京朝官武臣自大使臣以上舊內殿崇班以上選授封爵功賞課最之事所隸官分掌其事兼總於尚書驗實而後判成以天下職事員闕具注於籍月取其應選者揭而書之集官注擬考閥閲以定其可否若有疑不能決小事則申請大事則稟議於尚書省應論奏者與郎官同請對大祭祀則奉玉幣以授左僕射執爵以授左丞舊尚書為所遷官名班左丞上自釐正百司吏部以金紫光祿大夫戶禮兵刑工部以銀青光祿大夫換授而任六曹尚書者始實領職事左選分案八置吏三十右選分案六置吏十有六曰主事令史曰書令史曰守當官二十四司亦如之南渡初諸曹長二互置惟吏部備官紹興八年依元祐制六曹皆置權尚書以處未應資格之人其屬有侍郎二人分左右選尚書左右選各置郎中一人侍郎左右選各置郎中一人司封司勳考功各一人郎官分掌其事而兼總於尚書左選掌考校京朝官以上殿最其爵秩擬內外任使而奏授之分案十二曰六品曰七品曰八品曰九品曰注擬曰名籍曰掌闕曰催驅曰甲庫曰檢法曰知雜曰奏薦賞功司吏額主事一人令史二人書令史九人守當官一十一人正貼司一十六人私名一十二人楷書二人法司一人官告院六部監門隸焉右選掌大使臣以上差注材武人有格二十一及破格出闕較量功過奏薦諸軍賞功分案十曰大夫曰副使曰修武曰注擬掌闕曰奏薦賞功曰開拆曰名籍曰甲庫曰法司曰知雜吏額主事一人令史二人書令史九人守當官一十二人正貼司八人私名一十人法司一人紹熙三年左司諫謝源明言乾道九年詔旨六部應承三省密院批送勘當文字並令本部郎官長二按法裁決可否申上朝廷施行即不得持兩端如或事有疑難及生創無條例者令長二據所見申明將上取旨乞明詔六曹遵守從之侍郎分左右選左選掌文臣之未改官者凡始命而未應參部者皆試而後選若應格則具歲月歷任功罪及所舉官員數同郎官引見於便殿稟奏改官右選掌武臣之未升朝者舊自供奉官以上其職任自親民官至部隊將監當官皆掌其選授注擬之法凡初仕而試不中等及已入官而未應選者皆勿注正闕官制行尚書侍郎通治曹事奏事則同班惟吏部分領四選大祭祀則舉玉幣置諸案薦饌則進摶黍進熟則執匏爵以授右丞飲福則奉爵視朝則執文武班簿對立以待顧問左選分案十五置吏四十有三右選分案八置吏四十有七紹興四年吏部侍郎葉祖洽言侍郎左選準元豐朝旨類姓置簿左右選理宜一體右選亦乞置簿拘轄功過從之建炎四年五月詔六曹復置權侍郎如元祐故事滿二年為真補外者除待制未滿除修撰左選掌承直郎以下擬注州府判司諸縣令佐監當及磨勘功過之事分案十三乾道裁減吏額共置五十五人右選掌校副尉以上較試擬官行賞換官考其殿最分案十五乾道裁減吏額共置四十八人舊制吏部除侍郎二員分典左右選總稱吏部侍郎間命官兼攝惟稱左選侍郎或右選而已紹熙三年謝深甫張叔椿兼攝始有侍左侍郎侍右侍郎之稱既而林大中沈揆擢二尚書則侍左侍右徑入除目相承不改郎中員外郎尚左尚右侍左侍右舊主判二人以朝官充元豐官制行置吏部郎中主管尚書左右選及侍郎左右選各一員參掌選事而分治之凡郎官並用知府資序以上人充未及者為員外郎建炎四年詔權攝添差郎官並罷初進擬第云吏部郎官及擬告身細銜始直書尚書吏部郎中或員外郎主管尚書某選主管侍郎某選紹興八年呂希常以監六部門兼權侍右郎官紹興三十一年李端明正除尚右郎官既而何俌楊倓費行之除吏部郎官皆有侍左侍右尚左尚右之稱自此相承不改淳熙十六年光宗即位詔四選通差用尚書顏師魯之請也先是乾道元年詔今後非曾任監司守臣不除郎官著為令自是館學寺監臣拘礙資格遷除不行郎曹闕員但得兼攝旋即外補間有不次擢用者則自二著躐升二史以至從列其自外召至為郎則資級已高曾不數月必序進卿少而郎有正員者益少矣司封郎中員外郎掌官封贈承襲之事凡三師三公以下至升朝官褒贈祖考母妻親王郡王內外命婦以下保任宗屬封爵諸親皆因其位而為之等凡宗室當賜名訓具抄擬官凡庶姓孔氏柴氏折氏之後應承襲者辨其嫡庶列爵九等曰王曰郡王曰國公曰郡公曰縣公曰侯曰伯曰子曰男分國三等大國二十七次國二十小國二百二十內命婦之品五曰貴妃淑妃德妃賢妃曰大儀貴儀淑儀淑容順儀順容婉儀婉容昭儀昭容昭媛修儀修容修媛充儀充容充媛曰婕妤曰美人曰才人貴人外內命婦之號十有四曰大長公主曰長公主曰公主曰郡主曰縣主曰國夫人曰郡夫人曰淑人曰碩人曰令人曰恭人曰宜人曰安人曰孺人贈之制三公宰臣執政節度使三代金紫銀青光祿大夫二代餘官一代皆辨其位序以進之加食邑實封則視其品之高下以為戶數多寡之節凡事之可否與司勳通決於長二分案三設吏六元祐元年中書後省言臣僚封贈父母依舊制命詞太中大夫觀察使以上用專詞餘用海詞二年詔父及嫡母存不得請所生母封贈所生母未封亦不許先及其妻紹聖元年詔宗室換授文官身亡者通直郎以上贈三官元符元年以元祐間封贈紊前制詔並依元豐法二年詔寺監官雜壓在通直郎之上者雖係宣教郎遇大禮封贈政和二年詔封母則隨所封五等謂如封南陽縣開國男則隨其爵稱南陽縣男令人封魏國公則稱魏國公夫人之類應婦人不因夫子得封號謂命官非升朝而母年九十以上或士庶人婦女年百歲並特旨若回授者或因子孫得封贈其夫至升朝或非升朝應封贈者並孺人宣和二年臣僚言近年有京官任校書郎正字者得封贈今則監丞未升朝者亦乞依例蓋緣監丞雜壓在校書郎之上故引以為請甚無謂也不獨此爾又有小使臣偶因薄勞或磨勘轉官遂乞回授封贈父母實為太濫望降旨今後封贈並依舊法敢有擅更陳乞紊亂典章者置之典刑庶幾僥幸者息而名分正矣從之建炎以後並同司勳郎中員外郎參掌勳賞之事凡勳級十有二曰上柱國正二品曰柱國從二品曰上護軍正三曰護軍從三品曰上輕車都尉正四品曰輕車都尉從四品曰上騎都尉正五品曰騎都尉從五品曰驍騎尉正六品曰飛騎尉從六品曰雲騎尉正七品曰武騎尉從七品率三歲一遷必因其除授以加之凡賞有格若事應賞從其所隸之司考實以報則必審核其狀以格覆之謂之有法酬賞非格所載參酌輕重擬定以上尚書省謂之無法酬賞若功賞未酬而賞格改易者輕從舊格重從新格録用前代帝系及勳臣之後則考其族系而奉行其制命分案四置吏十有九元祐元年吏部言諸色人援引徼求入流太冗應工匠伎藝之屬無法入官者雖有勞績並止比類支賜未經酬奬者亦如之紹聖二年戶部言元豐官制司勳覆有法式酬賞無法式者定之元祐中有法式者止令所屬勘驗自後應干錢穀本部指定關司勳則是戶部兼司勳之職請依舊制從之四年應川峽人任本路差遣者酬奬減半政和四年詔司勳行下所屬將一司一路條制參照酬奬格法類集參用又詔以詳定國朝勳德臣僚職位姓名送吏部用工部尚書鄭允中所編傳也隆興元年省併以司封郎官兼領淳熙元年復以司農寺丞范仲芭兼司勳未幾改除復省裁減吏額主事一人令史一人書令史四人守當官三人正貼司四人私名三人考功郎中員外郎掌文武官選磨勘資任考課之政令凡命官隨所隸遷以其職事具注於曆給之於其屬州若司歲書其功過應升遷授者驗曆按法而進之有負殿則正其罪罰以七事考監司一曰舉官當否二曰勸課農桑增墾田疇三曰戶口增損四曰興利除害五曰事失案察六曰較正刑獄七曰盜賊多寡以四善三最考守令德義有聞清謹明著公平可稱恪勤匪懈為四善獄訟無寃催科不擾為治事之最農桑墾殖水利興修為勸課之最屏除姦盜人獲安處振恤困窮不致流移為撫養之最通善最分三等五事為上二事為中餘為下若能否尤著則別為優劣以詔黜陟凡內外官