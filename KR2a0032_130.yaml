body:
  text: 宋史卷一百三十志第八十三樂五高宗南渡經營多難其於稽古飾治之事時靡遑暇建炎元年首詔有司曰朕承祖宗遺澤獲託臣民之上扶顛持危夙夜痛悼况於聞樂以自為樂實增感于朕心二年復下詔曰朕方日極憂念屏遠聲樂不令過耳承平典故雖實廢名存亦所不忍悉從減罷是歲始據光武舊禮以建武二載創立郊祀乃十一月壬寅祀天配祖敕東京起奉大樂登歌法物等赴行在所就維揚江都築壇行事凡鹵簿樂舞之類率多未備嚴更警場至就取中軍金鼓權一時之用紹興元年始饗明堂時初駐會稽而渡江舊樂復皆燬散太常卿蘇遲等言國朝大禮作樂依儀合於壇殿上設登歌壇殿下設宮架今親祠登歌樂器尚闕宣和添用籥色未及頒降州郡無從可以創製宜權用望祭禮例止設登歌用樂工四十有七人乃訪舊工以備其數四年再饗國子丞王普言按書舜典命夔曰詩言志歌永言聲依永律和聲蓋古者既作詩從而歌之然後以聲律協和而成曲自歷代至于本朝雅樂皆先製樂章而後成譜崇寧以後乃先製譜後命詞於是詞律不相諧協且與俗樂無異乞復用古製又按周禮奏黃鍾歌大呂以祀天神黃鍾堂下之樂大呂堂上之樂也郊祀之禮皇帝版位在午階下故還位之樂當奏黃鍾明堂版位在阼階上則還位當歌大呂今明堂禮不下堂而襲郊祀還位例並奏黃鍾之樂於義未當尋皆如普議先是帝嘗以時難備物禮有從宜敕戒有司參酌損益務崇簡儉仍權依元年例令登歌通作宮架其押樂舉麾官及樂工器服等蠲省甚多既而國步漸安始以保境息民為務而禮樂之事寖以興矣十年太常卿蘇言將來明堂行禮除登歌大樂已備見闕宮架樂舞諸路州軍先有頒降登歌大樂乞行搜訪應用丞周執羔言大樂兼用文武二舞今殿前司將下任道係前大晟府二舞色長深知舞儀宜令赴寺教習卿陳桷言前期五使例合按閲仍詔應侍祠執事朝臣並作樂教習禮儀博士周林復言神位席地陳設至尊親行酌獻堂上下皆地坐作樂而鍾磬工乃設木小榻當教習日使立以考擊庶革循習簡陋之弊初上居諒暗臣僚有請罷明堂行禮奏樂受胙等事上諭禮官詳定太常寺檢照景德熙豐親郊典故除郊廟景靈宮並合用樂其鹵簿鼓吹及樓前宮架諸軍音樂皆備而不作每處警場止鳴金鉦鼓角而已即無去奏樂受胙之文大饗為民祈福為上帝宗廟而作樂禮不敢以卑廢尊書斂五福錫庶民况熙寧禮尤可考其赦文有曰六樂備舞祥祉來臻是也於是詔遵行之其後禮部侍郎施坰奏禮經蕃樂出於荒政蓋一時以示貶抑昨內外暫止用樂今徽考大事既畢慈寧又已就養其時節上壽理宜舉樂一如舊制禮部尋言太母還宮國家大慶四方來賀自今冬至元正舉行朝賀之禮依國朝故事合設大仗及用樂舞等庶幾明天子之尊舊典不至廢墜有詔俟來年舉行十有三年郊祀詔以祐陵深弓劍之藏長樂遂晨昏之養昭答神天就臨安行在所修建圓壇於是有司言大禮排設備樂宮架樂辦一料外登歌樂依在京夏祭例合用兩料其樂器登歌則用編鍾磐各一架柷敔二搏拊鼓二琴五色自一三五七至九絃各二瑟四笛四塤箎簫並二巢笙和笙各四並七星九曜閏餘匏笙各一麾幡一宮架則用編鍾編磬各十二架柷敔二琴五色各十瑟二十六巢笙及簫並一十四七星九曜閏餘匏笙各一竽笙十塤一十二箎一十八笛二十晉鼓一建鼓四麾幡一乃從太常下之兩浙江南福建州郡又下之廣東西荊湖南北括取舊管大樂上于行都有闕則下軍器所製造增修雅飾而樂器寖備矣其樂工詔依太常寺所請選擇行止畏謹之人合登歌宮架凡用四百四十人同日分詣太社太稷九宮貴神每祭各用樂正二人執色樂工掌事掌器三十六人三祭共一百一十四人文舞武舞計用一百二十八人就以文舞番充其二舞引頭二十四人皆召募補之樂工舞師照在京例分三等廩給其樂正掌事掌器自六月一日教習引舞色長文武舞頭舞師及諸樂工等自八月一日教習於是樂工漸集十四年太常寺言將來大禮見闕玉磬十六枚其所定聲律係於玉分厚薄取聲高下正聲凡十有二黃鍾厚八分進而為大呂太簇夾鍾姑洗仲呂蕤賓林鍾夷則南呂無射應鍾每律增一分至應鍾一寸九分而止清聲夾鍾厚二寸三分退而為太簇大呂黃鍾共四清聲各減一分至黃鍾二寸而止乃下之四川茶馬司寬數增分市易以供用太常博士張晟又言大樂所用武舞之飾以干配刀周禮司兵祭祀授舞者兵先儒謂授以朱干玉戚郊特牲朱干玉戚冕而舞大武乃從所請倣三禮圖令造玉戚以配舞干是歲始上徽宗徽號特製顯安之樂至於奉皇太后册寶于慈寧宮樂用聖安皇后受册寶于穆清殿樂用坤安亦皆先後參次而舉顯安以無射夾鍾為宮周大司樂饗先王奏無射而歌夾鍾夾鍾之六五上生無射之上九夾鍾卯之氣二月建焉而辰在降婁無射戌之氣九月建焉而辰在大火無射陽律之終夾鍾實為之合蓋取其相親合而萃祖考之精神于假廟也聖安純用大呂坤安純用中呂大呂陰律之首崇母儀也中呂陰律之次明婦順也明年正旦朝會始陳樂舞公卿奉觴獻壽據元豐朝會樂第一爵登歌奏和安之曲堂上之樂隨歌而發第二爵笙入乃奏瑞曲惟吹笙而餘樂不作第三爵奏瑞曲堂上歌堂下笙一歌一吹相間第四爵合樂仍奏瑞曲而上下之樂交作今悉倣舊典首奏和安次奏嘉木成文滄海澄清瑞粟呈祥三曲其樂專以太簇為宮太簇之律生氣湊達萬物於三統為人正於四時為孟春故元會用之時給事中段拂等討論景鍾制度按大晟樂書黃鍾者樂所自出而景鍾又黃鍾之本故為樂之祖惟天子郊祀上帝則用之自齋宮詣壇則擊之以召至陽之氣既至聲闋衆樂乃作祀事既畢升輦又擊之蓋天者羣物之祖今以樂之祖感之則天之百神可得而禮音韻清越拱以九龍立于宮架之中以為君圍環以四清聲鍾磬鎛鍾特磬以為臣圍編鍾編磬以為民圍內設寶鍾球玉外為龍虡鳳琴景鍾之高九尺其數九九實高八尺一寸垂則為鍾仰則為鼎鼎之大中於九斛退藏實八斛有一焉內出皇祐大樂中黍尺參以太常舊藏黃鍾律編鍾高適九寸正相吻合遂遵用黍尺製造鍾成命左僕射秦檜為之銘其文曰皇宋紹興十六年中興天子以好生大德既定寰宇乃作樂以暢天地之化以和神人維茲景鍾首出衆樂天子專用禋祀謹拜手稽首而獻銘其銘曰德純懿兮舜文繼躋壽域兮孰內外薦上帝兮偉茲器聲氣應兮同久視貽子孫兮彌萬世旋又命禮局造鎛鍾四十有八編磬一百八十七特磬四十八及添製編鍾等命軍器所造建鼓八雷鼓二晉鼓一雷鼗二柷敔各四尋製金鍾玉磬二架初元豐本虞庭鳴球及晉賀循采玉造磬之義命榮咨道肇造玉磬元祐親祠嘗一用之久藏樂府至政和加以磨俾協音律並造金鍾專用於明堂蓋堂上之樂歌鍾居左歌磬居右金玉稟氣於乾純精至貴故鍾必以金磬必以玉始備金聲玉振之全此中興所以繼作也於是帝諭輔臣以鍾磬音律其餘皆和惟黃鍾大呂猶未應律宜熟加考究詔禮官以鑄造鎛鍾更須詳審令聲和而律應乃可奉祀命太常前期按閲仍用皇祐進呈雅樂禮例皇帝御射殿召宰執侍從臺諫寺監館閣及武臣刺史以上閲視新造景鍾及禮器皇帝即御坐撞景鍾用正旦朝會三曲奏宮架之樂其製造官推恩有差添置景鍾樂正一鎛鍾樂工十有二特磬樂工亦如之次降下古制銅錞一增造其二古銅鐃一增造其六改造登歌夷則律玉磬降到長笛二十有四並付太常寺掌之專俟大禮施用既而刑部郎官許興古奏比歲休祥協應靈芝産於廟楹瑞麥秀於留都昔乾德六年嘗詔和峴作瑞木馴象及玉烏皓雀四瑞樂章以備登歌願依典故製為樂章登諸郊廟詔從其請命學士沈虛中作歌曲以薦于太廟圜丘明堂尋又內出御製郊祀大禮天地宗廟樂章乃詔宰執學士院兩省官刪修郊祀大禮樂章付太常肄習天子親祀南郊圜鍾為宮三奏樂凡六成歌景安用文德武功之舞饗明堂夾鍾為宮三奏樂凡九成歌誠安用佑文化俗威功睿德之舞前二日朝獻景靈宮圜鍾為宮三奏凡六成所奏樂與南郊同歌興安用發祥流慶降真觀德之舞前一日朝饗太廟黃鍾為宮三奏樂凡九成歌興安所用文武二舞與南郊同僖祖廟用基命之樂舞翼祖廟用大順之樂舞宣祖廟用天元之樂舞太祖廟用皇武之樂舞太宗廟用大定之樂舞真宗仁宗廟樂舞曰熙文曰美成英宗神宗廟樂舞曰治隆曰大明哲宗徽宗欽宗廟樂舞曰重光曰承元曰端慶皆以無射宮奏之每歲祀昊天上帝者凡四正月上辛祈穀孟夏雩祀季秋饗明堂冬至祀圜丘是也圜鍾為宮樂奏六成與南郊同乃用景安之歌帝臨嘉至神娭錫羡之舞祀地祇者二夏至祀皇地祇樂奏八成乃用寧安之歌儲靈錫慶嚴恭將事之舞立冬後祀神州地祇樂奏八成歌寧安與祀皇地祇同名而異曲用廣生儲祐厚載凝福之舞孟春上辛祀感生帝其歌大安其樂舞則與歲祀昊天同三年一祫及時饗太廟九成之樂興安之歌與大禮前事朝饗同而用孝熙昭德禮洽儲祥之舞太社太稷用寧安八成之樂與歲祀地祇同至於親製贊宣聖及七十二弟子以廣崇儒右文之聲親視學行酌獻定釋奠為大祀用凝安九成之樂郡邑行事則樂止三成他如親饗先農親祀高禖則敞壇壝奏樂舞按習於同文館法惠寺親耕籍田則據宣和舊制陳設大樂而引呈耒耜護衛耕根車儀仗鼓吹至以二千人為率先農樂用靜安高禖樂用景安皇帝親行三推禮樂用乾安其補苴軼典搜講彌文者至矣先朝凡雅樂皆以安名中興一遵用之南郊樂其宮圜鍾明堂樂其宮夾鍾圜鍾即夾鍾也夾鍾生於房心之氣實為天帝之堂故為天宮祭地祇其宮函鍾即林鍾也林鍾生於未之氣未為坤位而天社地神實在東井輿鬼之外故為地宮饗宗廟其宮用黃鍾黃鍾生於虛危之氣虛危為宗廟故為人宮此三者各用其聲類求之然天宮取律之相次圜鍾為陰聲第五陰將極而陽生故取黃鍾為角黃鍾陽聲之首也太簇陽聲之第二故太簇為徵姑洗陽聲之第三故姑洗為羽天道有自然之秩序乃取其相次者以為聲地宮取律之相生函鍾上生太簇故太簇為角太簇下生南呂南呂上生姑洗故南呂為徵姑洗為羽地道資生而不窮乃取其相生者以為聲人宮取律之相合黃鍾子大呂丑故黃鍾為宮大呂為角子合丑也太簇寅應鍾亥故太簇為徵應鍾為羽寅合亥也人道以合而相親乃取其合者以為聲周之降天神出地示禮人鬼樂之綱要實在於此獨商聲置而不用蓋商聲剛而主殺實鬼神之所畏也樂奏六成者即倣周之六變八成九成亦如之文武二舞皆用八佾國初始改崇德之舞曰文德改象成之舞曰武功其發祥流慶降真觀德則祥符所製以薦獻聖祖其佑文化俗威功睿德則皇祐所製以奉明禋其祀帝有司行事以帝臨嘉至神娭錫羡與夫獻太廟以孝熙昭德禮洽儲祥則製於元豐其廣生儲祐厚載凝福以祀方澤則製於宣和至紹興祀皇地祇皇以儲靈錫慶嚴恭將事而用宣和所製舞以分祀神州地祇轉相緝熙樂舞寖備至中興而賡續裁定實集其成中祀而下多有樂而無舞則在禮凡小祭祀不興舞之義也紹興三十一年有詔教坊日下蠲罷各令自便蓋建炎以來畏天敬祖虔恭祀事雖禮樂煥然一新然其始終常以天下為憂而未嘗以位為樂有足稱者孝宗初踐大位立班設仗于紫宸殿備陳雅樂禮官尋請車駕親行朝饗用登歌金玉大樂及綵繪宮架樂舞仗內鼓吹以欽宗喪制不用逮安穆皇后祔廟禮部侍郎黃中首言國朝故事神主升祔係用鼓吹導引前至太廟乃用樂舞行事宗廟薦享雖可用樂鼓吹施於道路情所未安請備而不作續下給舍詳議謂薦享宗廟為祖宗也故以大包小則別廟不嫌於用樂今祔廟之禮為安穆而行豈可與薦享同日語將來祔禮謁祖宗諸室當用樂舞至別廟奉安宜停而不用蓋用樂於前殿是不以欽宗而廢祖宗之禮停樂於別廟是安穆為欽宗喪禮而屈也如此則於禮順於義允遂俞其請既而右正言周操上言祖宗前殿尊無二上其於用樂無復有嫌然用之享廟行禮之日則可而用於今日之祔則不可蓋祔禮為安穆而設則其所用樂是為安穆而用雖曰停於別廟而為祔后用樂之名猶在也孰若前後殿樂俱不作為無可議哉詔從之隆興元年天申節率羣臣詣德壽宮上壽議者以欽宗服除當舉樂事下禮曹黃中復奏曰臣事君猶子事父也春秋賊未討不書葬以明臣子之責况欽宗實未葬而可遽作樂乎事遂寢乾道改元始郊見天地太常洪適奏聖上踐阼務崇乾德郊丘講禮專以誠意交於神明竊謂古今不相沿樂金石八音不入俗耳通國鮮習其藝而聽之則倦且寐獨以古樂嘗用之郊廟爾昔者竽工鼓員不應經法孔光何武嘗奏罷於漢代前史是之今樂工為數甚夥其鹵簿六引前後鼓吹有司已奏明詔三分減一惟是肄習尚踰三月之淹夫驅遊手之人摐金擊石安能盡中音律使鳳儀而獸舞而日給虛費總為緡錢近二巨萬若從裁酌用一月教習自可應聲合節不至闕事於是詔郊祀樂工令肄習一月太常寺復言郊祀合用節奏樂工登歌宮架樂工引舞舞工其分詣社稷及別廟並番輪應奉更不添置尋以禮官裁減壇下宮架二百七人省十之一琴二十人瑟十二人各省其半笙簫笛可省者十有八人箎塤可省者十人其分詣給祠凡一百十四止用八十人鍾磬凡四十八架止設三十有二人其宮架鍾磬仍舊排殿間慢樂色量省人數悉報如章禮部郎官蕭國梁又言議禮者嘗援紹興指揮時饗亞獻既入太室即引終獻行事雖便於有司侍祠免至跛倚而其流將至於簡宗廟用之郊饗尤為非宜蓋有獻必有樂卒爵而後樂闋今亞終獻樂舞雖同而其作有始其成有終不可亂也若使之相繼行事雜然於酌獻之間則其為樂舞者不知亞獻之樂耶終獻之樂耶詔從其請訂定淳熙六年始舉明堂禋禮命五使按雅樂並嚴更警場于貢院奉詔將樂器依堂上堂下儀制排設五使及應赴官僚從旁立觀按閲仍聽往來察視時大禮使趙雄言前例閲樂至皇帝詣飲福位一曲即五使以下皆立而每閲奠玉幣及酌獻等樂皆坐自如於禮未盡不當襲用前例故有是詔既而禮官討論自紹興以來凡五饗明堂禮畢還輦並未經用樂即無作樂節次可考乃參酌禮例成禮稱賀及肆赦用樂導駕並用皇祐大饗典故施行其南郊明堂儀注實述紹興成憲又命有司兼酌元豐大觀舊典為後世法程其用樂作止之節粲然可觀前三日太常設登歌樂於壇上稍南北向設宮架於壇南內壝之外立舞表於酇綴之間明堂登歌設於堂上前楹間宮架設於庭中前一日設協律郎位二一位壇上樂虡西北一於宮架西北押樂官位二太常丞於登歌樂虡北太常卿於宮架北省牲之夕押樂太常卿及丞入行樂架協律郎展視樂器祀之日樂正帥工人二舞以次入皇帝乘輿自青城齋殿出樂正撞景鍾降輿入大次景鍾止明堂不用景鍾服大裘袞冕自正門入協律郎跪俯伏舉麾興工鼓柷宮架乾安之樂作凡升降行止皆奏之明堂奏儀安至午階版位西向立協律郎偃麾戞敔樂止明堂至阼階下樂止凡樂皆協律郎舉麾而後作偃麾而後止禮儀使奏請行事宮架作景安之樂明堂作誠安文舞進左丞相等升詣神位前樂作六成止皇帝執大圭再拜內侍進御匜帨宮架樂作帨手畢樂止禮儀使前導升壇宮架樂作至壇下樂止升自午階明堂並升自阼階登歌樂作至壇上樂止登歌嘉安之樂作明堂至堂上作鎮安奠鎮圭奠玉幣于上帝樂止詣皇地祇太祖太宗神位前如上儀禮儀使導還版位登歌樂作降階樂止明堂降自阼階宮架樂作至版位樂止奉俎官入正門宮架豐安之樂作明堂作禧安跪奠俎訖樂止內侍以御匜帨進宮架樂作帨手拭爵樂止禮儀使導升壇宮架樂作至午階樂止升自午階登歌樂作至壇上樂止明堂無升壇登歌禧安之樂作明堂作慶安詣神位前三祭酒少立樂止讀册皇帝再拜每詣神位並如之禮儀使導還版位登歌樂作降階樂止宮架樂作至版位樂止奏請還小次宮架樂作入小次樂止武舞進宮架正安之樂作明堂作穆安舞者立定樂止亞獻升詣酌尊所西向立宮架正安之樂作明堂皇太子為亞獻作穆安三祭酒以次酌獻如上儀樂止終獻亦如之奏請詣飲福位宮架樂作至午階樂止升自午階登歌樂作將至位樂止登歌禧安之樂作明堂作胙安飲福禮畢樂止禮儀使導還版位登歌樂作降階樂止宮架樂作至版位樂止明堂不降階徹豆登歌熙安之樂作明堂作歆安送神宮架景安之樂作一成止明堂作誠安詣望燎望瘞位宮架樂作至位樂止明堂有燎無瘞燎瘞畢還大次宮架乾安之樂作明堂作安至大次樂止皇帝乘大輦出大次樂正撞景鍾明堂不用景鍾鼓吹振作降輦還齋殿景鍾止百官宗室班賀于端誠殿奏請聖駕進發軍樂導引至麗正門大樂正令奉采茨之樂入門樂止明堂就賀于紫宸殿不奏采茨乃御麗正門肆赦前期太常設宮架樂于門之前設鉦鼓于其西皇帝升門至御閣大樂正令撞黃鍾之鍾右五鍾皆應乾安之樂作升御坐樂止金雞立太常擊鼓囚集鼓聲止宣制畢大樂正令撞蕤賓之鍾左五鍾皆應皇帝還御幄樂止乘輦降門作樂導引至文德殿降輦樂止按大禮用樂凡三十有四色歌色一笛色二塤色三箎色四笙色五簫色六編鍾七編磬八鎛鍾九特磬十琴十一瑟十二柷敔十三搏拊十四晉鼓十五建鼓十六鞞應鼓十七雷鼓祀天神用十八雷鼗鼓同上一十九靈鼓祭地祇用二十靈鼗鼓同上二十一露鼓饗宗廟用二十二露鼗鼓同上二十三雅鼓二十四相鼓二十五單鼗鼓二十六旌纛二十七金鉦二十八金錞二十九單鐸三十雙鐸三十一鐃鐸三十二奏坐三十三麾幡三十四此國樂之用尤大者故具載于篇初紹興崇建皇儲詔有司備禮册命然在欽宗恤制未及製樂乾道初元詔立皇太子命禮部太常寺討論舊禮以聞受册日陳黃麾仗于大慶殿設宮架樂于殿庭皇帝升御坐作乾安之樂升用黃鍾宮降用蕤賓宮皇太子入殿門作明安之樂受册出殿門亦如之皆用應鍾宮至七年易應鍾而奏以姑洗古者太子生則太師吹管以度其聲觀所協之律有虞典樂教胄子自天子之元子皆以樂為教所以養其性情之正蕩滌邪穢消融查滓而和順於道德則陳金石雅奏以重元良册拜宜倣古誼式昭盛禮繇唐季世儲二罕定國家益多故而禮廢樂闕至于建隆定樂雖詔皇太子出入奏良安至道始册皇太子有司言太子受册宜奏正安之樂百年曠典至是舉行中外胥悅至天禧册命禮儀院復奏改正安之樂乾道之用明安實祖述天禧而以姑洗為宮則唐東宮軒垂奏樂舊貫云孝宗素恭儉每賀正使赴宴作樂多遇上辛齋禁有司條治平用樂典故以進及生辰使上壽適親郊散齋樞密副使陳俊卿請以禮諭北使毋用樂不得已則上壽之日設樂而宣旨罷之及宴使人然後用之庶存事天之誠上可其奏且曰宴殿雖進御酒亦勿用宰相葉顒魏嵵方主用樂之議以為樂奏於紫宸乃使客之禮俊卿獨奏曰適奉詔旨仰見聖學高明過古帝王遠甚彼初未嘗必欲用樂而我乃望風希意自為失禮以徇之他日輕侮何所不至尋詔垂拱上壽止樂正殿猶為北使權用後三年賀使當朝辭復值散齋上乃諭館伴以決意去樂及議所以處之者如使人必以作樂為言則移茶酒就驛管領遂有更不用樂之詔其後因雨澤愆期分禱天地宗廟精修雩祀按禮大雩帝用盛樂而唐開元祈雨雩壇謂之特祀乃不以樂薦於是太常朱時敏言通典載雩禮用舞僮歌雲漢晉蔡謨議謂雲漢之詩興於宣王歌之者取其修德禳災以和陰陽之義乞用舞僮六十四人衣玄衣歌雲漢之詩詔亟從之淳熙二年詔以上皇加上尊號立春日行慶壽禮有司尋言乾道加尊號用宮架三十六樂工共一百一十三人今來加號慶壽事體尤重合依大禮例用四十八架樂正樂工用一百八十八人庶得禮樂明備仍令分就太常寺貢院前五日教習前期太常設宮架之樂于大慶殿協律郎位於宮架西北東向押樂太常卿位於宮架之北北向皇太子及文武百僚並位於宮架之北東西相向又設宮架于德壽殿門外協律郎太常卿位如之及發册寶日儀仗鼓吹列于大慶殿門樂正師二人以次入贊者引押樂太常卿協律郎入就位奏中嚴外辦訖禮儀使奏請皇帝恭行發册寶之禮太常卿導册寶正安之樂作中書令奉寶侍中奉册進行禮安之樂作發寶册畢鼓吹振作儀衛等以次從行皇帝自祥曦殿輦至德壽宮行禮册寶入殿門作正安之樂上皇出宮作乾安之樂升御坐奉上册寶作聖安之樂降御坐作乾安之樂太后册寶進行用正安出閣升坐用坤安降坐入閣復作坤安之樂禮部尚書趙雄等言國朝舊制車駕出奏樂今慶典之行亘古未有自非禮儀詳備無以副中外歡愈之心請慶壽行禮日聖駕往還並用樂及簪花詔從之既而太常又言郊禋禮成宜進胙慈闈行上壽飲酒禮所有上壽合辦仙樓仍用樂其樂人照天申節禮例凡上詣德壽宮或恭請上皇遊幸或至南內或上皇命同宴遊或時序賞適過宮侍宴或聖節張樂珥花奉玉巵為上皇壽率從容竟日隆養至樂備極情文及高宗之喪孝宗力行三年之制有司雖未嘗別設樂禁而過期不忍聞樂金使以會慶節來賀稽之舊典引對使人或許上壽惟輟樂不舉孝宗斷以禮典卻其書幣就館遣行次年再至始用紹興故事移宴于館而不作樂高宗升祔太常言祔饗行禮當設登歌宮架樂舞晨祼饋食其用樂如朝饗之制於是高宗廟昉奏大德之樂舞禮部言今虞祔之行純用古禮導引神主自有衛仗及太常鼓吹而雜用道釋於禮非經乞行蠲免詔從其請既而大享明堂起居舍人鄭僑奏祭祀於事為大禮樂於用為急然先王處此有常變之不同各務當其禮而已昔舜居堯喪三載遏密後世既用漢文以日易月之文又用漢儒越紼行事之制循習既久不特用禮而又用樂去古愈遠聖主躬服通喪有司請舉大禮屈意從之且大饗之禮祭天地也聖主身親行之行禮作樂似不可廢其他官分獻與夫先期奏告例用樂者權宜蠲寢不亦可乎今若因明堂損益而裁定之亦足為將來法乃命太常討論始詔除降神奠玉幣奉俎酌獻換舞徹豆送神依典禮作樂外所有皇帝及獻官盥洗登降等樂皆備而不作云
