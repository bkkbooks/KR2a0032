水餘杭縣尤甚漂沒田廬死者無算安吉縣水平地丈餘平江鎮江寧國府明台溫嚴常州江陰軍皆水是秋武陵縣江溢圮田廬甚衆慶元元年六月壬申台州及屬縣大風雨山洪海濤並作漂沒田廬無算死者蔽川漂沉旬日至于七月甲寅黃巖縣水尤甚常平使者莫漳以緩於振恤坐免七月臨安府水二年秋浙東郡國大水三年九月紹興府屬縣二婺州屬縣二水害稼五年秋台溫衢婺水漂民廬人多溺死衢守張經以匿災口六振坐黜六年五月建寧府嚴衢婺饒信徽南劍州及江西郡縣皆大水自庚午至于甲戌漂民廬害稼嘉泰二年七月丙午上杭縣水圮田廬壞稼民多溺死建安縣漂軍民廬舍百二十餘山摧覆民廬七十七家溺壓死者六十餘丁未長溪縣漂民廬二百八十餘家古田縣漂官舍民廬甚衆溺死者二百七十劍浦縣圮三百五十餘家死者亦衆三年四月江南郡邑水害稼開禧元年九月丙戌漢淮水溢荊襄淮東郡國水楚州盱眙軍為甚圮民廬害稼二年五月庚寅東陽縣大水山千七百三十餘所同夕崩洪漂聚落五百四十餘所湮田二萬餘畝溺死者甚衆三年江浙淮郡邑水鄂州漢陽軍尤甚嘉定二年五月己亥連州大水敗城郭百餘丈沒官舍郡庠民廬壞田畝聚落甚多六月辛酉西和州水沒長道縣治倉庫丙子昭化縣水沒縣治漂民廬成州水入城圮壘舍同谷縣及遂寧府閬州皆水七月壬辰台州大風雨激海濤漂圮二千二百八十餘家溺死尤衆三年四月甲子新城縣大水五月嚴衢婺徽州富陽餘杭鹽官新城諸暨淳安大雨水溺死者衆圮田廬市郭首種皆腐行都大水浸廬舍五千三百禁旅壘舍之在城外者半沒西湖溢四年七月辛酉慈溪縣大水圮田廬人多溺者八月山陰縣海敗堤漂民田數十里斥地十萬畝五年五月庚戌嚴州水六月丁丑台州及建德諸暨會稽縣水壞田廬六年六月丁丑淳安縣山涌暴水陷清泉寺漂五鄉田廬百八十里溺死者無算巨木皆拔丁亥於潛縣大水戊子諸暨縣風雷大雨山涌暴作漂十鄉田廬溺死者尤多錢塘縣臨安餘杭於潛安吉縣皆水九年五月行都及紹興府嚴衢婺台處信饒褔漳泉州興化軍大水漂田廬害稼十年冬浙江濤溢圮廬舍覆舟溺死甚衆蜀漢二州江沒城郭十一年六月戊申武康吉安縣大水漂官舍民廬壞田稼人畜死者甚衆十二年鹽官縣海失故道潮汐衝平野三十餘里至是侵縣治廬州港瀆及上下管黃灣岡等場皆圮蜀山淪入海中聚落田疇失其半壞四郡田後六年始平十四年建康府大水十五年七月蕭山縣大水時久雨衢婺徽嚴暴流與江濤合圮田廬害稼十六年五月江浙淮荊蜀郡縣水平江府湖常秀池鄂楚太平州廣德軍為甚漂民廬害稼圮城郭隄防溺死者衆鄂州江湖合漲城市沈沒纍月不泄是秋江溢圮民廬餘杭錢塘仁和縣大水褔漳泉州興化軍水壞稼十五六十七年五月褔建大水漂水口鎮民廬皆盡候官縣甘蔗寨漂數百家人多溺死建寧府沒平政橋入城南劍州圮郡治城樓郡獄官舍城壞民避水樓上者皆死乙卯建昌軍大水城不沒者三板漂民廬圮官舍城郭橋梁害稼紹定二年天台仙居縣大水四年沿江水災端平三年三月辛酉蘄州大雨水漂民居是年英德府昭州及襄漢江皆大水嘉熙元年饒信州水二年浙江溢淳祐二年紹興府處婺州水七年褔建水十年嚴州水十一年八月甲辰汀州山水暴至漂人民九月江陵水是年江浙多水饒州亦水十二年六月建寧府嚴衢婺信台處南劍州邵武軍大水冒城郭漂室廬死者以萬數寶祐元年七月溫台處信饒州大水開慶元年五月己未婺州水漂民廬是歲滁嚴州水景定二年浙東水咸淳六年五月大雨水七月五月甲申諸暨縣大水漂廬舍是月重慶府江水泛溢者三漂城壁壞樓櫓十年三月廬州水四月紹興府大雨水八月臨安府水安吉武康縣水太平興國四年八月滑州黎陽縣河清端拱元年二月澶濮二州河清二百餘里大中祥符三年十一月丁酉陝西河清十二月乙巳河再清當汾水合流處清如汾水元豐四年十月環州河水變甘大觀元年八月乾寧軍河清二年十二月陝州河清同州韓城縣郃陽縣至清及百里涉春不變自是迄政和宣和諸路數奏河清輒遣郎官致祭宰臣等率百官拜表賀歲以為常大中祥符元年二月醴泉出蔡州汝陽鳳原鄉有疾者飲之皆愈八年十一月通州軍言醴泉出汶山下有疾者飲之皆愈熙寧元年五月京師開化坊醴泉出政和五年正月河陽臺醴泉出
