body:
  text: 宋史卷六十一志第十四五行一上水上天以陰陽五行化生萬物盈天地之間無非五行之妙用人得陰陽五行之氣以為形形生神知而五性動五性動而萬事出萬事出而休咎生和氣致祥乖氣致異莫不於五行見之中庸至誠之道可以前知國家將興必有禎祥國家將亡必有妖孽見乎蓍龜動乎四體禍褔將至善必先知之不善必先知之人之一身動作威儀猶見休咎人君以天地萬物為體禎祥妖孽之致豈無所本乎故由漢以來作史者皆志五行所以示人君之戒深矣自宋儒周惇頤太極圖説行世儒者之言五行原於理而究於誠其於洪範五行五事之學雖非所取然班固范曄志五行已推本之及歐陽修唐志亦采其説且於庶徵惟述災眚而休祥闕焉亦豈無所見歟舊史自太祖而嘉禾瑞麥甘露醴泉芝草之屬不絶於書意者諸褔畢至在治世為宜祥符宜和之代人君方務以符瑞文飾一時而丁謂蔡京之姦相與傅會而為欺其應果安在哉高宗渡南心知其非故宋史自建炎而後郡縣絶無以符瑞聞者而水旱札瘥一切咎徵前史所罕見皆屢書而無隱於是六主百五十年兢兢自保足以圖存易震之彖曰震來虩虩恐致褔也人君致褔之道有大於恐懼修省者乎昔禹致羣臣於會稽黃龍負舟而執玉帛者萬國孔甲好鬼神二龍降自天而諸侯相繼畔夏桑穀共生于朝雉升鼎耳而雊而大戊武丁復修成湯之政穆王得白狼白鹿而文武之業衰焉徐偃得朱弓矢宋湣有雀生鸇二國以霸亦以之亡大概徵之休咎猶卦之吉凶占者有德以勝之則凶可為吉無德以當之則吉乃為凶故德足勝妖則妖不足慮匪德致瑞則物之反常者皆足為妖妖不自作人實興之哉今因先後史氏所紀休咎之徵彙而輯之作五行志潤下水之性也水失其性則為災沴舊説以恆寒鼓妖魚孽豕禍雷電霜雪雨雹黑眚黑祥皆屬之水今從之醴泉河清雖為瑞應苟非其時未必不為異故雜附于編他如甘露嘉禾芝草一切祥瑞之物見于後者因其事而考其時則休咎自見故亦各以類相從云建隆元年十月棣州河決壞厭次商河二縣居民廬舍田疇二年宋州汴河溢孟州壞堤襄州漢水漲溢數丈四年八月齊州河決九月徐州水損田乾德二年四月廣陵揚子等縣潮水害民田七月泰山水壞民廬舍數百區牛畜死者甚衆三年二月全州大雨水七月蘄州大雨水壞民廬舍開封府河決溢陽武河中府孟州並河水漲孟州壞中灘軍營民舍數百區河壞隄岸石又溢于鄆州壞民田泰州潮水損鹽城縣民田淄州濟州並河溢害鄒平高苑縣民田四年東阿縣河溢損民田觀城縣河決壞居民廬舍注大名又靈河縣隄壞水東注衛南縣境及南華縣城七月滎澤縣河南北隄壞八月宿州汴水溢壞堤淄州清河水溢壞高苑縣城溺數百家及鄒平縣田舍泗洲淮溢衡州大雨水月餘五年衛州河溢毀州城沒溺者甚衆開寶元年六月州府二十三大雨水江河泛溢壞民田廬舍七月泰州潮水害稼八月集州霖雨河漲壞民廬舍及城壁公署二年七月下邑縣河決是歲青蔡宿淄宋諸州水真定澶滑博洺齊潁蔡陳亳宿許州水害秋苗三年鄭澶鄆淄濟虢蔡解徐嶽州水災害民田四年六月汴水決宋州穀熟縣濟陽鎮又鄆州河及汶清河皆溢注東阿縣及陳空鎮壞倉庫民舍鄭州河決原武縣蔡州淮及白露舒汝廬潁五水並漲壞廬舍民田七月青齊州水傷田五年河決澶州濮陽絳和廬壽諸州大水六月河又決開封府陽武縣之小劉村宋州鄭州並汴水決忠州江水漲二百尺六年鄆州河決楊劉口懷州河決獲嘉縣潁州淮卑水溢淹民舍田疇甚衆七月歷亭縣御河決單州濮州並大雨水壞州廨倉庫軍營民舍是秋大名府宋亳淄青汝澶滑諸州並水傷田七年四月衛亳州水泗州淮水暴漲入城壞民舍五百家安陽縣河漲壞居民廬舍百區八年五月京師大雨水濮州河決郭龍村六月澶州河決頓丘縣沂州大雨水入城壞居舍田苗九年三月京師大雨水淄州水害田太平興國二年六月孟州河溢壞溫縣堤七十餘步鄭州壞滎澤縣寧王村堤三十餘步又漲于澶州壞英公村堤三十步開封府汴水溢壞大寧堤浸害民田忠州江漲二十五丈興州江漲毀棧道四百餘間管城縣焦肇水暴漲踰京水濮州大水害民田凡五千七百四十三頃潁州潁水漲壞城門軍營民舍七月復州蜀漢江漲壞城及民田廬舍集州江漲泛嘉川縣三年五月懷州河決獲嘉縣北注又汴水決宋州寧陵縣境六月泗州淮漲入南城汴水又漲一丈塞州北門十月滑州靈河已塞復決四年三月河南府洛水漲七尺壞民舍泰州雨水害稼宋州河決宋城縣衛州河決汲縣壞新場堤八月梓州江漲壞閣道營舍九月澶州河漲鄆州清汶二水漲壞東阿縣民田復州沔陽縣湖皛漲壞民舍田稼五年五月潁州潁水溢壞堤及民舍徐州白溝河溢入州城七月復州江水漲毀民舍堤塘皆壞六年河中府河漲陷連堤溢入城壞軍營七所民舍百餘區鄜延寧州並三河水漲溢入州城鄜州壞軍營建武指揮使李海及老幼六十三人溺死延州壞倉庫軍民廬舍千六百區寧州壞州城五百餘步諸軍營軍民舍五百二十區七年三月京兆府渭水漲壞浮梁溺死五十四人四月耀密博衛常潤諸州水害稼六月均州溳水均水漢江並漲壞民舍人畜死者甚衆又河決臨邑縣漢陽軍江水漲五丈七月大名府御河漲壞范濟口南劍州江水漲壞居民舍一百四十餘區京兆府咸陽渭水漲壞浮梁工人溺死五十四人九月梧州江水漲三丈入城壞倉庫及民舍十月河決懷州武陟縣害民田八年五月河大決滑州房村徑澶濮曹濟諸州浸民田壞居民廬舍東南流入淮六月陝州河漲壞浮梁又永定澗水漲壞民舍軍營千餘區河南府澍雨洛水漲五丈餘壞鞏縣官署軍營民舍殆盡穀洛伊四水暴漲壞京城官署軍營寺觀祠廟民舍萬餘區溺死者以萬計又壞河清縣豐饒務倉庫軍營民舍百餘區雄州易水漲壞民廬舍鄜州河水漲溢入城壞官寺民舍四百餘區荊門軍長林縣山水暴漲壞民舍五十一區溺死五十六人八月徐州清河漲丈七尺溢出塞州三面門以禦之九月宿州睢水漲泛民舍六十里是夏及秋開封浚儀酸棗陽武封丘長垣中牟尉氏襄邑雍丘等縣河水害民田九年七月嘉州江水暴漲壞官署民舍溺者千餘人八月延州南北兩河漲溢入東西兩城壞官寺民舍淄州霖雨孝婦河漲溢壞官寺民田孟州河漲壞浮梁損民田雅州江水漲九丈壞民廬舍新州江漲入南寨壞軍營雍熙二年七月朗江溢害稼八月瀛莫州大水損民田三年六月壽州大水端拱元年二月博州水害民田五月英州江水漲五丈壞民田及廬舍數百區七月磁州漳滏二水漲淳化元年六月吉州大雨江漲漂壞民田廬舍黃梅縣堀口湖水漲壞民田廬舍皆盡江水漲二丈八尺洪州漲壞州城三十堵民廬舍二千餘區漂二千餘戶孟州河漲二年四月京兆府河漲陝州河漲壞大堤及五龍祠六月乙酉汴水溢于浚儀縣壞連堤浸民田上親臨視督衛士塞之辛卯又決于宋城縣博州大霖雨河漲壞民廬舍八百七十區亳州河溢東流泛民田廬舍七月齊州明水漲壞黎濟寨城百餘堵許州沙河溢雄州塘水溢害民田殆盡嘉州江漲溢入州城毀民舍復州蜀漢二江水漲壞民田廬舍泗州招信縣大雨山河漲漂浸民田廬舍死者二十一人八月藤州江水漲十餘丈入州城壞官署民田九月邛州蒲江等縣山水暴漲壞民舍七十區死者七十九人是秋荊湖北路江水注溢浸田畝甚衆三年七月河南府洛水漲壞七里鎮國二橋又山水暴漲壞豐饒務官舍民廬死者二百四十人十月上津縣大雨河水溢壞民舍溺者三十七人四年六月隴城縣大雨牛頭河漲二十丈沒溺居人廬舍九月澶州河漲衝陷北城壞居人廬舍官署倉庫殆盡民溺死者甚衆梓州玄武縣涪河漲二丈五尺壅下流入州城壞官私廬舍萬餘區溺死者甚衆十月澶州河決水西北流入御河浸大名府城知府趙昌言壅城門禦之至道元年四月甲辰京師大雨雷電道上水數尺五月虔州江水漲二丈九尺壞城流入深八尺毀城門二年六月河南澗洛三水漲壞鎮國橋七月建州溪水漲溢入州城壞倉庫民舍萬餘區鄆州河漲壞連堤四處宋州汴河決穀熟縣閏七月陝州河漲是月廣南諸州並大雨水咸平元年七月侍禁閣門祗候王壽永使彭州回至鳳翔府境山水暴漲家屬八人溺死齊州清黃河泛溢壞田廬二年十月漳州山水泛溢壞民舍千餘區民黃拏等十家溺死三年三月梓州江水漲壞民田五月河決鄆州王陵掃七月洋州漢水溢民有溺死者四年七月同州汙谷水溢夏陽縣溺死者數十人五年二月雄霸瀛莫深滄諸州乾寧軍水壞民田六月京師大雨漂壞廬舍民有壓死者積潦浸道路自朱雀門東抵宣化門尤甚皆注惠民河河復漲溢軍營景德元年九月宋州汴水決浸民田壞廬舍河決澶州橫隴掃二年六月寧州山水泛溢壞民舍軍營多溺死者三年七月應天府汴水決南注亳州合浪宕渠東入于淮八月青州山水壞石橋四年六月鄭州索水漲高四丈許漂滎陽縣居民四十二戶有溺死者鄧州江水暴漲南劍州山水泛溢漂溺居人七月河溢澶州壞王八掃八月橫州江漲壞營舍大中祥符元年六月開封府尉氏縣惠民河決二年七月徐濟青淄大水八月鳳州大水漂溺民居十月京畿惠民河決壞民田三年六月吉州臨江軍並江水泛溢害民田九月河決河中府白浮梁村四年七月洪江筠袁州江漲害民田壞州城八月河決通利軍大名府御河溢合流壞府城害田人多溺死九月河溢于孟州溫縣蘇州吳江泛溢壞廬舍十一月楚泰州潮水害田人多溺者五年正月河決棣州聶家口七月慶州淮安鎮山水暴漲漂溺居民六年六月保安軍積雨河溢浸城壘壞廬舍判官趙震溺死又兵民溺死凡六百五十人七年六月泗州水害民田河南府洛水漲秦州定西寨有溺死者八月河決澶州十月濱州河溢于安定鎮八年七月坊州大雨河溢民有溺死者九年六月秦州獨孤谷水壞長道縣鹽官鎮城橋及官廨民舍二百九十五區溺死六十七人七月延州洎定平安遠塞門栲栳四寨山水泛溢壞堤城九月雄霸州界河泛溢利州水漂棧閣萬二千八百間天禧三年六月河決滑州城西南漂沒公私廬舍死者甚衆歷澶州濮鄆濟單至徐州與清河合浸城壁不沒者四板明年既塞六月復決于西北隅乾興元年正月秀州水災民多艱食十月己酉夜滄州鹽山無棣二縣海潮溢壞公私廬舍溺死者甚衆是歲京東淮南路水災天聖初徐州仍歲水災三年十一月辛卯襄州漢水壞民田四年六月丁亥劍州邵武軍大水壞官私廬舍七千九百餘區溺死者百五十餘人是月河南府鄭州大水十月乙酉京山縣山水暴漲漂死者衆縣令唐用之溺焉是歲汴水溢決陳留堤又決京城西賈陂入護龍河以殺其勢五年三月襄潁許汝等州水七月辛丑泰州鹽官鎮大水民多溺死六年七月壬子江寧府揚真潤三州江水溢壞官私廬舍是月雄霸州大水八月甲戌臨潼縣山水暴漲民溺死者甚衆是月河決楚王掃七年六月河北大水壞澶州浮橋明道元年四月壬子大名府冠氏等八縣水浸民田景祐元年閏六月甲子泗州淮汴溢七月澶州河決橫隴掃八月庚午洪州分寧縣山水暴發漂溺居民二百餘家死者三百七十餘口三年六月虔吉諸州久雨江溢壞城廬人多溺死四年六月乙亥杭州大風雨江潮溢岸高六尺壞堤千餘丈八月甲戌越州大水漂溺居民寶元元年建州自正月雨至四月不止溪水大漲入州城壞民廬舍溺死者甚衆康定元年九月甲寅