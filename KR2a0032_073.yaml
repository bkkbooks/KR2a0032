body:
  text: 宋史卷七十三志第二十六律曆六崇天曆步交會交終分二十八萬八千一百七十七秒四千二百七十七交終日二十七餘二千二百四十七秒四千二百七十七交中日一十三餘六千四百一十八秒七百三十八半朔差日二餘三千三百七十一秒五千七百二十三後限日一餘一千六百八十五秒七千八百六十一半望策十四餘八千一百四秒五十前限日十二餘四千七百三十二秒九千二百七十七交率一百四十一交數一千七百九十六交終度三百六十三度七十六分交象九十度九十四半交一百八十一度八十八陽曆食限四千二百陽曆定法四百二十陰曆食限七千陰曆定法七百推天正十一月經朔加時入交置天正十一月朔積分以交終分秒去之不盡滿樞法為日不滿為餘秒即天正經朔加時入交泛日及餘秒求次朔及望入交因天正經朔加時入交泛日及餘秒求次朔以朔差日及餘秒加之求望以望策及餘秒加之滿交終日及餘秒皆去之即次朔及望加時所入若以經朔望小餘減之即各得朔望夜半入交泛日及餘秒求定朔夜半入交因經朔望夜半入交若定朔望大餘有進退者亦進退交日不則因經為定各得所求求次定朔夜半入交各因前定朔夜半入交大月加日二小月加日一餘皆加八千三百四十二秒五千七百二十三若求次日纍加一日滿交終日及餘秒皆去之即得次定朔及每日夜半入交泛日及餘秒求朔望加時入交常日置經朔望入交泛日及餘秒以其朔望入氣朏朒定數朏減朒加之即朔望入交常日及餘秒求朔望加時入交定日置其朔望入轉朏朒定數以交率乘之如交數而一所得以朏減朒加入交常日餘滿若不足進退其日即朔望加時入交定日及餘秒求月行入陰陽曆視其朔望入交定日及餘秒在中日及餘秒以下者為月在陽曆如中日及餘秒已上者減去之為月在陰曆凡入交定日陽初陰末為交初陰初陽末為交中求朔望加時月入陰陽曆積度置其月入陰陽曆日及餘其餘先以一百乘之樞法除為約分以九百九乘之六十八除為度不盡退除為分即朔望加時月入陰陽曆積度及分其月在陽曆即為入陽曆積度月在陰曆即為入陰曆積度求朔望加時月去黃道度置入陰陽曆積度及分如交象以下為在少象已上覆減半交餘為入老象置所入老少象度及分以五因之用減一千一十餘以老少象度及分乘之八十四而一列於上位又置所入老少象度及分如半象以下為在初限已上減去半象餘為入末限置初末限度及分於上列半象度及分於下以上減下餘以乘上四十而一所得初限以減末限以加上位滿百為度不滿為分即朔望加時月去黃道度數及分求食定餘置定朔小餘如半法以下覆加半法餘為午前分已上減去半法餘為午後分置午前後分於上列半法於下以上減下以下乘上午前以三萬一千七百七十除午後以一萬三千八百八十五除之各為時差午前以減午後以加定朔小餘各為食定小餘以時差加午前後分為午前後定分其月食直以定望小餘便為食定小餘求日月食甚辰刻置食定小餘以辰法除之為辰數不滿進一位刻法除之為刻不滿為刻分其辰數命子正算外即食甚辰刻及分求氣差置其朔中積滿二至限去之餘在一象以下為在初已上覆減二至限餘為在末皆自相乘進二位滿二百三十六除之用減三千五百三十三為氣差以乘距午定分半晝分而一所得以減氣差為定數春分後交初以減交中以加秋分後交初以加交中以減求刻差置其朔中積滿二至限去之餘列二至限於下以上減下餘以乘上進二位滿二百三十六除之為刻差以乘距午定分四因之樞法而一為定數冬至後食甚在午前夏至後食甚在午後交初以加交中以減冬至後食甚在午後夏至後食甚在午前交初以減交中以加求日入食限置入交定日及餘秒以氣刻時三差定數各加減之如中日及餘秒以下為不食已上者減去中日及餘秒如後限以下前限已上為入食限後限以下為交後分前限以上覆減中日餘為交前分求日食分置入交前後分如陽曆食限以下者為陽曆食定分已上者覆減一萬一千二百餘為陰曆食定分不足減者不食各如陰陽曆定法而一為食之大分不盡退除為小分半已上為半強半以下為半弱命大分以十為限得日食之分求日食泛用分置朔入陰陽曆食定分一百約之在陽曆者列八十四於下在陰曆者列一百四十於下各以上減下餘以乘上進二位陽曆以一百八十五除陰曆以五百一十四除各為日食泛用分求月入食限視月入陰陽曆日及餘如後限以下為交後分前限已上覆減中日為交前分求月食分置交前後分如三千二百以下者食既已上用減一萬二百不足減者不食餘以七百除之為大分不盡退除為小分小分半已上為半強半已下為半弱命大分以十為限得月食之分求月食泛用分置望入交前後分退一等自相乘交初以九百三十五除交中以一千一百五十六除之得數用減刻率交初以一千一百一十二為刻率交中以九百為刻率各得所求求日月食定用分置日月食泛用分以一千三百三十七乘之以所食日轉定分除之即得所求求日月食虧初復滿小餘各以定用分減食甚小餘為虧初加食甚小餘為復滿即各得虧初復滿小餘若求時刻者依食甚術入之求月食更籌定法置其望晨分四因之退一等為更法倍之退一等為籌法求月食入更籌置虧初食甚復滿小餘在晨分以下加晨分昏分已上減去昏分餘以更法除之為更數不滿以籌法除之為籌數其更數命初更算外即各得所入更籌求朔望食甚宿次置其經朔望入氣小餘以入氣入轉朏朒定數朏減朒加之乘其日升降分樞法而一加減其日盈縮分至後分前以加分後至前以減一百約之為分分滿百為度以盈加縮減其定朔望加時中積以天正冬至加時黃道日度及分加而命之即定朔望加時日躔宿次其望加半周天命如前即朔望食甚宿次求月食既內外刻分置月食交前後分覆減三千二百不及減者為食下既一百約之列六十四於下以上減下餘以乘上進二位交初以百九十三除交中以三百六十五除所得以定用分乘之如泛用分而一為月食既內刻分覆減定用分即既外刻分求日月帶食出入分數各以食定小餘與日出入分相減餘為帶食差其帶食差滿定用分已上者不帶食出入也以帶食差乘所食分滿定用分而一若月食既者以既內刻分減帶食差餘所食分以既外刻分而一不及減者為帶食既出入也各以減所食分即帶出入所見之分其朔日食甚在晝者晨為漸進之分昏為已退之分若食甚在夜者晨為已退之分昏為漸進之分其月食者見此可知也求日食所起日在陰曆初起西北甚於正北復於東北日在陽曆初起西南甚於正南復於東南其食八分已上者皆起正西復於正東此據午地而論之其餘方位審黃道斜正月行所向可知方向求月食所起月在陰曆初起東南甚於正南復於西南月在陽曆初起東北甚於正北復於西北其食八分已上皆起正東復於正西此亦據午地而論之其餘方位依日食所向即知既虧復滿步五星五星會策十五度二十一分秒九十木星周率四百二十二萬四千五十八秒三十二周日三百九十八餘九千二百三十八秒三十二歲差一百三秒六伏見度一十三變目變日變度限度初行率前伏一十六日八十三度八十二度八十五二十二前疾初二十八日六度六十四度五十五二十二前疾末二十八日五度五十二四度一十五二十二前遲初二十八日四度四十一三度三十三一十八前遲末二十八日二度二十二一度六十五一十三前留二十四日前退四十六日六十四五度一十八空度二十九空後退四十六日六十四五度一十八空度二十九一十六後留二十四日後遲初二十八日二度二十一一度六十六空後遲末二十八日四度四十一三度三十二一十三後疾初二十八日五度五十二四度一十五一十八後疾末二十八日六度六十四度五十五二十後伏一十六日八十三度八十二度八十五二十二木星盈縮曆會數損益率盈積度會數損益率縮積度初益一百六十三盈空初益二百縮空一益一百四十九盈一度一益一百八十四縮空一二益一百二十六盈三度一十三二益一百五十九縮三度八十五三益九十五盈四度三十八三益一百二十七縮五度四十五四益五十五盈五度三十三四益八十八縮六度七十一五益二十二盈五度八十八五益三十八縮七度五十七六損三十九盈六度一十六損一十五縮七度九十五七損六十五盈五度七十一七損七十三縮七度八十八損九十六盈五度六八損一百二十六縮七度七九損一百二十盈四度一十九損一百六十七縮五度八十一十損一百三十九盈二度九十十損一百九十八縮四度一十四十一損一百五十一盈一度五十一十一損二百一十六縮二度一十六火星周率八百二十五萬九千三百六十六秒五十九周日七百七十九餘九千七百五十六秒五十九歲差一百三秒五十三伏見度二十變目變日變度限度初行率前伏六十九日四十九度空四十六度四十六七十一前疾初六十一日四十二度五十四十一度二十三七十一前疾末四十三日五十三十度一十二十八度五十六七十前次疾初四十三日五十二十九度三二十七度五十二六十八前次疾末四十三日五十二十六度九十二二十五度五十四六十三前遲初四十三日五十二十二度七十二二十一度五十四五十七前遲末四十三日五十一十四度二十八一十三度五十五四十三前留一十三日前退二十八日九十六八度二十一二度九十二空後退二十八日九十六八度二十一二度九十二二十九後留一十三日後遲初四十三日五十一十四度二十八一十三度五十五空後遲末四十三日五十二十二度七十二二十一度五十四四十三後次疾初四十三日五十二十六度九十二二十五度五十四五十七後次疾末四十三日五十二十九度三二十七度五十二六十三後疾初四十三日五十三十度一十二十八度五十六六十八後疾末六十一日五十四十三度五十四十三度二十五七十後伏六十九日四十九度空四十六度四十六七十一火星盈縮曆會數損益率盈積度會數損益率縮積度初益一千一百三十五盈空初益四百一十二縮空一益八百七十六盈一十一度一益四百三十三縮四度一十二二益四百一十七盈二十度十一二益四百五十五縮八度四十五三益一百四十五盈二十四度二十八三益四百六十七縮十三度空四損二十四盈二十五度七十三四益四百一縮十七度六十七五損一百四十六盈二十五度四十九五益三百四縮二十一度六十八六損二百九十六盈二十四度三六益一百五十二縮二十四度七十二七損三百八十八盈二十一度七七益二十六縮二十六度草四八損四百五十八盈一十一度一十九八損一百五十二縮二十六度五十九損四百四十五盈一十二度六十一九損四百三十八縮二十四度九十八十損四百二十盈八度一十六十損九百縮二十度六十十一損三百九十六盈三度九十六十一損一千一百六十縮一十一度六十土星周率四百萬三千八百七十二秒三十九周日三百七十八餘八百五十二秒三十九歲差一百三秒七十八伏見度一十六變目變日變度限度初行率前伏一十八日三十四二度三十四一度四十六一十二前疾二十八日三度二十九二度五一十二前次疾二十八日二度七十三一度七