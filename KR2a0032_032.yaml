body:
  text: 宋史卷三十二本紀第三十二高宗九三十一年春正月甲戌朔以日食不受朝丁丑雷丁亥免湖州增丁所輸絹夜風雷雨雪交作辛卯詔江浙官民戶均輸和市絁帛壬辰劉寶落節鉞福建路居住丙申大雨雪給三衙衛士行在貧民錢及薪炭命常平振給輔郡細民諸路監司決獄己亥放張浚胡銓自便庚子禁淮南拘籍戶馬二月戊申復置邛州惠民監癸丑以趙密領殿前都指揮使甲寅罷楊存中殿前都指揮使進太傅為醴泉觀使封同安郡王丙辰置行在會子務乙丑復鬻僧道度牒詔分經義詩賦為兩科丙寅詔通進司承受內降文字並囊封送三省樞密院辛未秦熺卒贈太傅三月甲戌朔命破敵軍統制陳敏部兵屯太平州己卯官勳臣魏仁浦馬知節余靖寇瑊諸孫各一人選文臣宗室主西南外兩宗司庚辰禁兩淮抑民附種以利州西路御前諸軍都統制吳拱知襄陽府部兵三千戍之壬午以兵部尚書楊椿參知政事丁亥奪秦熺贈官及遺表恩賞庚寅以陳康伯為尚書左僕射朱倬右僕射並同中書門下平章事辛卯復李光左中大夫官其子孫二人壬辰地震庚子以前徽猷閣待制張宇發死節贈四官録其子孫夏四月丁巳以久雨傷蠶麥盜賊間發命侍從臺諫條上弭災除盜之策出天申節銀十萬兩加充戶部糴本辛未遣周麟之使金賀遷都壬申權減荊南上供錢銀絹絲米之半用招填禁軍是月金主亮率文武羣臣如汝洛五月癸酉朔給兩淮民兵荒田乙亥增築禁城戊寅詔吳拱視緩急退守荊南己丑命沿淮州郡毋納北人辛卯金遣高景山王全來賀天申節全揚言無禮致其主亮語求淮漢地及指取將相近臣計事且以欽宗皇帝訃聞壬辰選兩浙江東福建諸州禁軍弓弩手之半部送樞密院按試甲午宰執召同安郡王楊存中及三衙帥趙密等至都堂議舉兵詔以王全語諭諸路統制帥守監司隨宜應變毋失機會是日為欽宗皇帝發喪特詔持斬衰三年乙未以吳璘為四川宣撫使仍命制置使王剛中同處置軍事丙申命主管馬軍司成閔部兵三萬人戍鄂州庚子命兩浙江湖福建諸州起禁軍弓弩手部送明州平江府江池太平三州荊南府軍前殿中侍御史陳俊卿言內侍張去為竊權撓政乞斬之以作士氣六月乙巳以羣臣三上表始聽政丙午劉錡乞即日移軍渡江詔錡進發騎兵屯揚州丁未出宮女三百九十人蠲臨安府禁軍闕額錢五年己酉以御史中丞汪徹為湖北京西宣諭使辛亥金主亮遣大懷正至盱眙語送伴使呂廣問云將以六月遷汴京令其歸奏癸丑罷教坊併敕令所歸刑部乙卯以劉錡為淮南江東西浙西制置使戊午命帶御器械劉炎同提舉措置沿淮盜賊庚申彗出角遣步軍司都統制戚方提總江上諸軍策應軍馬聽劉錡節制諭吳拱嚴備襄陽視緩急合田師中成閔兵以援之甲子始御正殿乙丑放女樂二百餘人丙寅聽淮南諸州移治清野戊辰以周麟之辭使北命樞密都承旨徐嚞代行淮北民兵崔唯夫董臻等率衆萬餘來歸秋七月丙子命兩浙江東濱海諸州預備敵兵詔諸路帥臣教閲土兵弓手戊寅命雷州守臣節制高容廉化四州軍馬時雷州軍賊凌鐵作亂東南第十二將高居辨會五州巡尉官兵討平之戊子周麟之分司筠州居住辛卯振給淮南歸正人壬辰徐嚞等至盱眙金主亮以非所指取之人諭遣亟還癸巳詔四川財賦自當專任總領所如遇警急調發不及申奏則令宣制司隨宜措置先舉後聞乙未行新造會子于淮浙湖北京西諸州是月金主亮徙都汴京命其臣劉萼由唐鄧瞰荊襄張中彥王彥章據秦鳳窺巴蜀蘇保衡完顏鄭家奴由海道趨兩浙八月辛丑朔忠義人魏勝復海州李寶承制以勝知州事丙午蠲諸路逋缺經總制錢江浙等路上供米丁未以婉容劉氏妄預國政廢于家蠲淮南京西湖北民秋稅之半辛亥以劉婉容事連坐昭慶軍承宣使王繼先福州居住停子孫官籍其資甲寅李寶率舟師三千發江陰大風退泊明州關澳聚兵復進乙卯劉錡引兵屯揚州遣統制王剛以兵五千屯寶應丁巳召田師中赴行在尋以吳拱為鄂州諸軍都統制壬戌復用資政殿學士張燾落致仕知建康府癸亥分處歸正人於淮南諸州能自存者從便願為兵者籍之乙丑詔便宜選補戰功人後勿遞減丙寅出內帑錢七萬緡犒戍兵之家仍悉除軍債己巳起復成閔為湖北京西制置使節制兩路軍馬九月庚午朔命大臣朝饗太廟辛未宗祀徽宗于明堂以配上帝大赦甲戌金人犯黃牛堡守將李彥堅拒卻之金兵遂扼大散關吳璘駐青野原遣將高松等援之庚辰以給事中黃祖舜同知樞密院事壬午流星晝隕乙酉詔劉錡王權李顯忠戚方嚴備清河潁河渦河口丁亥成閔渡江屯應城縣遣吳拱戍郢州博州民王友直聚兵大名自稱河北安撫制置使以其徒王任為副遣軍師馮穀入朝奏事吳璘遣將彭青至寶雞渭河夜劫金人橋頭寨破之庚寅成閔遣統制趙撙部兵五千駐德安辛卯金國趣使臣書至楚州守臣以聞其辭多悖慢壬辰監盱眙軍淮河渡夏俊復泗州癸巳金人犯通化軍守將張超拒卻之甲午冊諡大行皇帝曰恭文順德仁孝皇帝廟號欽宗吳璘遣將劉海復秦州金守將蕭濟降乙未金人犯信陽軍丙申吳璘遣將曹復洮州戊戌劉錡發揚州詔以金人背盟降敕榜招諭中原軍民己亥蘭州漢軍千戶王宏殺其刺史溫敦烏也來降吳璘遣將彭青復隴州是月金主亮以尚書右丞李通為大都督造浮梁于淮水之上遂自將來攻兵號百萬遠近大震冬十月庚子朔詔將親征魏勝攻沂州敗還海州金人圍之李寶以舟師至東海縣金人解圍去寶遂入海州辛丑金人自渦口渡淮癸卯以吳璘兼陝西河東招討使劉錡兼京東河北東路招討使成閔兼京西河北西路招討使金人陷蔣州李顯忠遣統制孔福與金人戰于大人洲敗之乙巳金人復犯海州魏勝李寶擊卻之劉錡引兵次淮陰金人將自清河口入淮錡列兵于運河岸以扼之丁未命宣撫制置司傳檄契丹西夏高麗渤海諸國及河北河東陝西京東河南諸路諭出師共討金人是日金人立其東京留守葛王褎為皇帝改元大定戊申王權聞金兵大至自廬州引兵遁屯昭關己酉知均州武巨招納北界杜海等二萬人來歸庚戌復置機速房知廬州龔濤聞金兵將至棄城走辛亥金將蕭琦陷滁州守臣陸廉棄城走壬子改建王瑋為鎮南軍節度使劉錡遣統制王剛等擊敗金人于清河口金人復來戰剛失利吳拱遣將侯俊郝敦書復唐州癸丑借江浙荊湖等路坊場淨利錢三百八十萬緡以備賞軍金人圍廬州都監權州事楊春率兵突陳出守水寨金人又攻海州李寶力戰敗之解圍去甲寅金人攻樊城吳拱遣守將翟貴王進與戰貴進俱戰死金兵亦退劉錡遣兵渡淮及金人戰死者十七八金主亮以大軍至廬州城北之五里築土城以居戚方遣將張寶復蔣州乙卯以金人渝盟告于天地宗廟社稷命州縣諭富民捐資助國劉錡聞王權遁自淮陰引兵歸揚州丙辰金主亮入廬州王權自昭關遁金人追至尉子橋破敵軍統制姚興戰死權退保和州金州都統制王彥遣統制任天錫出洵陽復豐陽縣丁巳帝聞王權敗召楊存中同宰執議于內殿陳康伯贊帝定議親征武巨遣將荀琛復鄧州戊午任天錫復商洛縣命吳璘趣出兵漢中葉義問督視江淮軍馬中書舍人虞允文參謀軍事金人犯真州步軍司統制邵宏淵逆戰于胥浦橋兵敗真州陷金人不入城遂犯揚州己未任天鍚復商州執其守完顏守能趙撙引兵渡淮庚申以楊存中為御營宿衛使趙撙復褒信縣王權自和州遁歸屯于東采石辛酉復湯思退觀文殿大學士充醴泉觀使兼侍讀分行在官吏三之一扈從餘留行遣常事金人陷和州壬戌以將士勞於征討避殿減膳劉錡退軍瓜州鎮金人陷揚州淮東安撫使劉澤棄城奔泰州以戶部侍郎劉岑為御營隨軍都轉運使李顯忠為御營先鋒都統制屯蕪湖主管步軍司李捧為前軍都統制趙撙復新蔡縣癸亥募諸州豪民招槍仗弓箭手赴行在金人入揚州王權自采石夜還建康尋復如采石甲子復張浚觀文殿大學士判潭州吳璘遣統制吳挺向起等及金人戰于德順軍之治平寨敗之趙撙復平興縣乙丑金人趨瓜州劉錡遣統領員琦拒之于皂角林大敗之斬其統軍高景山丙寅李寶遇金舟師于膠西縣陳家島大敗之斬完顏鄭家奴等五人劉錡還鎮江府趙撙復蔡州斬其總管楊寓分御營宿衛為五軍金人攻秦州向起吳挺擊卻之丁卯葉義問至鎮江詔起江浙福建諸州彊丁赴江上諸軍武巨復虢州盧氏縣任天錫復朱陽縣戊辰殿中侍御史杜莘老劾內侍張去為帝不悅去為致仕出莘老知遂寧府十一月己巳朔邵宏淵遣統領崔皋及金人戰于定山敗之任天錫復虢州守將蕭信遁去庚午通州守臣崔邦弼棄城去辛未成閔引兵發應城縣援淮西遣權吏部侍郎汪應辰詣浙東措置海道壬申以張浚判建康府召王權赴行在以李顯忠代將邵宏淵為池州都統制金人犯瓜州鎮江中軍統制劉汜戰敗走權都統制李橫亦遁金人鐵騎奄至江上統制魏俊王方死之葉義問惶怖欲退走復趨建康金人游騎至無為軍守臣韓髦棄城走癸酉淮寧府民陳亨祖執同知完顏耶魯以其城來歸趙撙引兵去蔡州復陷甲戌池州統制官崔定等復入無為軍乙亥金主亮臨江築壇刑馬祭天期以翌日南渡丙子虞允文督建康諸軍統制官張振王琪時俊戴皋等以舟師拒金主亮于東采石戰勝卻之崔定復巢縣任天錫復上津商洛二縣丁丑虞允文遣水軍統制盛新以舟師擊金人于楊林河口又敗之金主亮焚其舟而去戊寅王彥遣將楊堅復欒川縣己卯以湯思退為行宮留守虛恨蠻犯嘉州籠蓬堡官軍大敗副將鄭祥等為所殺庚辰金主亮引軍趨淮東癸未吳璘病自仙人原還興州留姚仲節制軍事虞允文自采石率李捧一軍及戈船如鎮江備敵甲申贈姚興魏俊王方官金主亮至揚州乙酉貸劉汜死英州編管江州統制李貴忠義首領孟俊復順昌府金州將邢進復華州丙戌賜戰士帛給其家薪炭任天錫復陝州丁亥劉錡以疾罷以御營宿衛中軍統制劉鋭權鎮江都統制成閔自京西還建康遂如鎮江戊子吳璘復力疾上仙人原己丑王權貸死瓊州編管李寶泛海南歸金人復攻陝州任天錫破走之復犯襄陽統制官李勝等拒卻之復通化軍王彥遣將楊堅党清至西京長水縣及金人戰敗之庚寅復長水縣癸巳以成閔為鎮江都統制淮東制置使京東西路河北東路淮北泗宿州招討使李顯忠為淮西制置使京畿河北西路淮北壽亳州招討使吳拱為湖北京西制置使京西北路招討使甲午武巨遣鄉兵總轄杜隱等復嵩州乙未金人陷泰州是日金人弒其主亮于揚州龜山寺戊戌金都督府遣人持檄詣鎮江軍中議和十二月己亥朔趙撙夜襲蔡州復入其城王彥遣兵復福昌縣庚子楊存中及虞允文渡江至瓜州察金兵金人犯漢南之茨湖鄂州軍士史俊登其舟獲一將諸軍繼進遂擊卻之楊春夜攻金人殺其帥高定山復廬州辛丑以李寶為靖海軍節度使浙西通泰海州沿海制置使京東東路招討使金統軍劉萼聞茨湖敗亦退師王彥遣將閻復澠池縣壬寅天有白氣以趙密為行宮在城都總管成閔渡江之揚州癸卯命諸路招討司率兵進討互相應援沿江諸大帥條陳恢復事宜復嶽州舊名右軍統領沙世堅入泰州甲辰虞允文自鎮江入見均州統領咱朝復鄧州乙巳張浚至慈湖命李顯忠引兵渡江丙午淮東統制王選復楚州丁未杜隱等入河南府吳拱遣統領牛宏入汝州戊申帝發臨安建王從行庚戌金人渡淮北去壬子次平江罷督視府虞允文還至鎮江癸丑淮東統制劉鋭陳敏引兵入泗州鄂州統制楊欽以舟師追敗金人于洪澤鎮乙卯江北金兵盡去李顯忠復入和州吳璘遣將復水洛城金人復破汝州牛宏敗走戊午次鎮江府庚申吳璘遣將拔金人治平寨壬戌曲赦新復州軍甲子降淮南京西湖北雜犯死罪以下囚賞采石功進統制張振時俊等官金潁壽二州巡檢高顯以壽春府來降丁卯命諸道籍鄉兵初王友直王任聚兵嘗命友直為天雄軍節度使任為天平軍節度使金主褎既立下令散其衆友直等自壽春來歸是月金主知亮已死遂趨燕京三十二年春正月戊辰朔日有食之帝在鎮江己巳金人犯壽春府忠義將劉泰戰死金兵引去庚午發鎮江府壬申至建康府張浚入見丙子祧翼祖主于夾室己卯李顯忠引兵還建康庚辰罷郡守年七十者壬午金人復犯蔡州趙撙力戰卻之乙酉權知東平府耿京遣其將賈瑞掌書記辛棄疾來奏事己丑金主遣其臣高忠建等來告嗣位以耿京為天平軍節度使知東平府庚寅詔新復州縣搜訪仗節死義之士丙申以楊存中為江淮荊襄路宣撫使虞允文副之給事中金安節中書舍人劉珙繳奏再上乃改命存中措置兩淮二月戊戌朔罷借兩浙江淮坊場淨利錢以虞允文為兵部尚書川陝宣諭使措置招軍市馬及與吳璘議事庚子興州統領惠逢等復河州振兩淮饑民壬寅金人犯汝州守將王宣逆戰敗之癸卯帝發建康惠逢復積石軍又克來羌城丁未劉錡薨己酉王宣及金人再戰于汝州庚戌金人全師來攻宣敗績棄去辛亥金人復犯順昌府孟新拒卻之尋亦棄去壬子賞蔡州功趙撙等進官有差乙卯至臨安府興元都統制姚仲攻鞏州不下退守甘谷城遂引兵圍德順軍丙辰金人犯蔡州趙撙擊卻之戊午復引兵來攻撙又敗之金兵遁去王彥遣將馬貴斷河中南橋金兵來攻貴戰敗之壬戌詔軍士戰死者祿其家一年傷重而死於營者半之乙丑王宣及右軍副將汲靖敗金人于蔡州確山縣趙撙棄蔡州丙寅金人復取之姚仲遣副將趙銓攻下鎮戎軍金同知渭州秦弼及其子嵩來歸王彥遣兵救陝州遇金人于虢州東敗之金兵引去丁卯吳珙遣將復永安軍永寧福昌長水三縣閏月癸酉金人破河州屠其城乙亥命楊存中李顯忠固守新復州軍量度進討丙子姚仲遣將復原州戊寅祔欽宗主于太廟癸未振淮南歸正人金人犯虢州吳璘遣楊從儀等攻拔大散關分兵據和尚原金人走寶雞丙戌給張浚錢十九萬緡造沿江諸軍戰艦庚寅王剛破金人于海州辛卯楊椿罷壬辰姚仲攻德順軍敗金人于瓦亭寨新店是月張安國等攻殺耿京李寶將王世隆攻破安國執之以獻三月壬寅更定金使入境接伴館伴舊儀癸卯成閔遣統制杜彥救淮寧擊敗金人于項城縣甲辰罷扈從官吏賞典乙巳録商虢之功加吳璘少傅王彥為保平軍節度使戊申吳璘復德順軍又遣將嚴忠取環州辛亥命兵部侍郎陳俊卿工部侍郎許尹經畫兩淮堡寨屯田癸丑金人圍淮寧府守臣陳亨祖死之甲寅吳璘自德順軍復還河池金人犯鎮戎軍丁巳遣洪邁等賀金主即位戊午忠義軍統制知蘭州王宏拔會州金人陷淮寧府統領戴規戰死成閔歸自淮東辛酉金人攻原州丙寅詔舉賢良夏四月丁卯朔姚仲遣兵救原州己巳命侍從臺諫條上防秋足食足民策遣左武大夫都飛虎結約河東壬申賞御營宿衛將士四萬餘人進官有差癸酉蠲淮東殘破州軍上供銀絹米麥及經總制錢一年蒙城縣民倪震率丁口數千來歸甲戌募民耕淮東荒田蠲其徭役及租稅七年戊寅以御史中丞汪徹參知政事金人圍海州戊子洪邁等辭行報聘書用敵國禮是月大雨淮水暴溢數百里漂沒廬舍人畜死者甚衆五月戊戌吳璘自河池如鳳翔巡邊姚仲遣兵救原州數敗金人庚子復置提舉秦州買馬監命四川總領官兼權其職壬寅姚仲及金人戰于原州北嶺敗績戊申復以楊存中為醴泉觀使奉朝請罷御營宿衛司辛亥鎮江都統制張子蓋救海州遇金人于石湫堰大敗之金人解去甲寅命張浚專一措置兩淮事務兼節制淮東西沿江州郡軍馬乙卯知順昌軍孟昭率部曲來歸己未吳璘遣將復熙州壬戌禁諸軍互招逃亡加鄭藻太尉振東北流民命張浚置御前萬弩營募淮民為之甲子詔立建王瑋為皇太子更名加成閔太尉主管殿前司李顯忠為太尉主管馬軍司籍諸州歸正人願為農者給官田復租十年願為兵者赴軍中六月丙寅朔吳璘次大幽嶺檄召姚仲至軍前下河池獄命夔路安撫使李師顏代將其兵戊辰名新宮曰德壽庚午以吳珙主管步軍司罷三招討司甲戌加贈兄子稱為太師中書令追封秀王諡安僖妻張氏封王夫人乙亥朱倬罷丙子詔皇太子即皇帝位帝稱太上皇帝退處德壽宮皇后稱太上皇后孝宗即位纍上尊號曰光堯壽聖憲天體道性仁誠德經武緯文紹業興統明謨盛烈太上皇帝淳熙十四年十月乙亥崩于德壽殿年八十一諡曰聖神武文憲孝皇帝廟號高宗十六年三月丙寅欑于會稽之永思陵光宗紹熙二年加諡受命中興全功至德聖神武文昭仁憲孝皇帝贊曰昔夏后氏傳五世而后羿篡少康復立而祀夏周傳九世而厲王死于彘宣王復立而繼周漢傳十有一世而新莽竊位光武復立而興漢晉傳四世有懷愍之禍元帝正位於建鄴唐傳六世有安史之難肅宗即位于靈武宋傳九世而徽欽陷于金高宗纘圖于南京六君者史皆稱為中興而有異同焉夏經羿浞周歷共和漢間新室更始晉唐宋則歲月相續者也蕭王琅琊皆出疏屬少康宣王肅宗高宗則父子相承者也至於克復舊物則晉元與宋高宗視四君者有餘責焉高宗恭儉仁厚以之繼體守文則有餘以之撥亂反正則非其才也況時危勢逼兵弱財匱而事之難處又有甚於數君者乎君子於此蓋亦有憫高宗之心而重傷其所遭之不幸也然當其初立因四方勤王之師內相李綱外任宗澤天下之事宜無不可為者顧乃播遷窮僻重以苗劉羣盜之亂權宜立國確呼艱哉其始惑於汪黃其終制於姦檜恬墮猥懦坐失事機甚而趙鼎張浚相繼竄斥嶽飛父子竟死於大功垂成之秋一時有志之士為之扼腕切齒帝方偷安忍恥匿怨忘親卒不免於來世之誚悲夫
