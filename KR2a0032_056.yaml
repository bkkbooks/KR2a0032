body:
  text: 宋史卷五十六志第九天文九歲星晝見太白晝見經天五緯相犯老人星景星彗星客星歲星晝見嘉祐五年三月乙未歲星晝見六年六月壬申晝見七年六月丙子晝見八年七月癸亥晝見治平元年六月壬戌晝見元符二年八月癸未晝見太白晝見經天開寶元年六月丁丑太白晝見戊寅復見淳化元年六月庚午七月丁丑十一月戊戌皆晝見咸平三年六月己未晝見四年十二月丙寅晝見在南斗六年五月甲午八月庚午皆晝見景德元年十一月辛亥晝見二年四月甲辰晝見三年七月乙巳晝見庚申又見十二月癸酉又見大中祥符元年七月庚申晝見四年六月丙午八月乙巳皆晝見六年四月壬午晝見七年七月癸卯晝見九年五月庚午晝見天禧三年六月辛卯復見四年七月丁巳晝見五年六月丙午晝見乾興元年十一月壬辰又見天聖三年六月壬戌十二月戊寅皆晝見五年五月壬寅晝見明道元年七月晝見三十日慶曆三年八月甲寅晝見皇祐三年四月丙午晝見至和元年五月壬辰九月己丑十月辛卯皆晝見三年四月己丑晝見嘉祐二年六月己未晝見四年正月庚寅晝見七月辛丑晝見五年九月庚寅晝見六年六月乙丑晝見七年五月戊午晝見七月己酉經天復見十月乙未晝見治平元年正月戊戌晝見六月辛酉晝見二年七月丁丑晝見十二月辛亥又見四年二月丁酉晝見閏三月癸未晝見五月辛巳晝見七月癸卯八月丁未晝見熙寧元年十一月癸酉晝見二年六月壬戌晝見三年五月癸巳九月壬子五年二月癸亥五月丙午八年三月戊午七月戊寅皆晝見九年十月乙酉晝見十年五月甲戌晝見元豐元年四月癸亥晝見三年七月戊子晝見四年七月己丑晝見六年八月己卯晝見七年十月乙卯晝見元祐元年六月庚戌晝見十月庚寅晝見三年二月辛丑晝見七月辛未又見六年四月壬寅晝見閏八月乙丑又見七年十一月辛巳晝見八年四月己未晝見紹聖元年五月己酉晝見九月庚申又見二年十一月丙申晝見三年五月壬子晝見四年六月己酉晝見元符二年五月甲辰晝見八月癸巳又見崇寧元年六月己酉晝見三年正月癸卯晝見大觀二年十一月丁未晝見四年十月戊戌又見政和三年十二月辛酉晝見六年十月乙丑晝見七年三月辛未晝見重和元年十月己卯晝見宣和二年六月丁丑晝見六年十一月丙子晝見建炎元年十月甲戌紹興元年四月壬申晝見四年六月庚子十一月戊申晝見經天六年正月壬辰晝見經天十七年七月辛巳晝見二十八年六月壬辰晝見隆興元年七月丙申經天晝見二年六月戊辰晝見七月庚子經天晝見乾道元年三月甲寅晝見乙亥晝見經天二年四月甲申晝見五月甲寅經天晝見庚午晝見三年九月戊子四年五月乙丑晝見與日爭明六月辛卯經天五年六月庚寅晝見十一月甲子晝見庚午晝見淳熙三年五月癸酉經天晝見四年十一月壬戌又見六年七月乙丑晝見癸未經天九年六月庚申晝見甲子經天九月癸巳十一年五月乙卯十二年六月戊寅晝見七月丁酉經天晝見至八月壬申始滅十四年六月辛卯晝見七月辛丑經天紹熙元年五月丙子晝見與日爭明四年七月乙丑十一月甲戌晝見慶元元年三月庚寅經天晝見七月己亥晝見四年九月壬寅晝見癸卯經天嘉泰元年六月丙午經天晝見十一月己巳晝見十二月己卯經天晝見三年六月癸亥經天晝見開禧元年三月庚申二年五月壬寅三年十二月乙巳晝見與日爭明嘉定元年五月甲子四年七月壬戌五年九月丙午六年二月丁丑晝見七年五月丁丑八月乙巳九月壬戌晝見九年五月癸酉十年五月乙丑晝見癸酉經天十一月庚辰晝見戊戌經天十二年二月庚子晝見三月丁亥經天晝見六月辛未晝見辛亥經天晝見十三年九月甲午十四年三月甲午十五年五月庚戌九月辛未晝見十七年六月丁卯晝見經天寶慶元年六月辛卯晝見紹定五年四月丁丑晝見五月癸巳經天端平元年十一月壬戌經天二年四月丁亥七月戊戌晝見經天嘉熙元年二月己酉二年五月辛巳八月辛酉晝見經天三年十二月辛酉四年二月丁未淳祐元年六月庚寅晝見十月戊戌晝見乙巳經天二年十二月壬戌晝見三年七月己亥四年八月壬辰五年二月辛卯晝見經天六年四月辛酉八月壬子晝見九月戊辰晝見經天七年十月辛巳九年十二月戊申十一年二月乙卯七月癸亥寶祐二年九月丁卯三年十月甲戌四年五月丁未五年七月己未開慶元年六月壬寅景定三年四月庚寅閏九月甲申五年四月戊午晝見五月乙亥咸淳元年七月丁酉四年九月癸酉德祐元年七月丙子晝見五緯相犯建隆元年正月甲子太白犯熒惑于婁十月壬申又相犯于軫三年十一月甲戌熒惑犯歲星于房乾德四年六月甲辰太白犯熒惑于張開寶四年十月甲辰太白犯熒惑于牽牛太平興國八年三月乙巳熒惑犯歲星端拱二年正月丁亥辰星犯歲星于須女十一日壬辰熒惑犯歲星淳化二年三月癸丑太白犯歲星于婁五年六月丙午太白歲星相犯于柳十一月丙子太白犯辰星于虛至道元年五月戊午熒惑犯填星于奎咸平元年二月甲寅太白犯填星三年四月癸亥辰星掩太白六年正月庚戌太白犯填星景德二年六月己亥太白犯歲星三年七月戊辰辰星犯歲星己酉太白犯歲星四年七月癸巳熒惑犯歲星八月乙未熒惑又犯歲星大中祥符元年九月壬申太白犯填星二年十一月癸亥熒惑犯歲星四年十一月庚午太白犯填星辛未辰星犯填星五年正月壬午熒惑犯歲星七年三月乙巳熒惑犯歲星九年六月甲戌熒惑犯歲星天禧元年四月壬辰太白犯歲星二年六月戊午太白犯歲星七月癸酉辰星犯太白五年九月庚子太白犯