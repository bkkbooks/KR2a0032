body:
  text: 宋史卷一百八十三志第一百三十六食貨下五鹽下茶上其在福建曰福州長清場歲𡞰十萬三百石以給本路天聖以來福漳泉州興化軍皆𡞰鹽歲視舊額增四萬八千九百八石熙寧十年有廖恩者起為盜聚黨掠州郡恩既平御史中丞鄧潤甫言閩越山林險阻連亘數千里無賴姦民比他路為多大抵盜販鹽耳恩平遂不為備安知無躡恩之跡而起者乃詔福建路蹇周輔度利害周輔言建劍汀州邵武軍官賣鹽價苦高漳泉福州興化軍𡞰鹽價賤故盜多販賣於鹽貴之地異時建州嘗計民産賦錢買鹽而民憚求有司徒出錢或不得鹽今請罷去頗減建劍汀邵武鹽價募上戶為鋪戶官給券定月所賣從官場買之如是則民易得鹽盜販不能規厚利又稍興復舊倉選吏增兵立法若盜販知情囊橐之者不以赦原三犯杖編管鄰州已編管復犯者杖配犯處本城皆行之歲增賣二十三萬餘斤而鹽官數外售者不預焉元豐二年提舉鹽事賈青請自諸州改法酌三年之中數立額又請捕盜官獲私鹽多者論賞不限常法三年青上所部賣鹽官吏歲課比舊額增羡詔曰周輔承命創法青相繼奉行期年有成課增盜止東南賴之時周輔已擢三司副使監司已次被賞者凡二十人哲宗即位御史中丞黃履奏福建多以鹽抑民詔去歲先帝已立分遣御史郎官察舉監司之法福建遣御史黃降江西遣御史陳次升按之繼又以命吏部郎中張汝賢併察舉周輔所立鹽法降言福州緣王氏之舊每産錢一當餘州之十其科納以此為率餘隨均定鹽額亦當五倍而實減半焉昨王子京奏立産鹽法失於詳究遂概以額增多寡之間遼遠絶殊遠民久無以伸詔付汝賢明年按察司盡以所察事狀聞於是福建轉運副使賈青王子京皆坐掊克謫監湖南鹽酒稅刑部侍郎蹇周輔坐議江西鹽法掊克誕謾削職知和州郟亶坐倡議運廣鹽江西張士澄坐附會推行周輔之法肆志抑擾並黜官閩清縣尹徐壽獨用鹽法初行能守官不撓民以故不多受課言於朝加賞焉汝賢請定福建産賣鹽額詔從其請凡抑民為鹽戶及願退不為行者以徒一年坐之提舉鹽事官知而不舉論如其罪已而殿中侍御史呂陶奏朝廷以福建江西湖南等路鹽法之弊流毒生靈遣使按視譴黜聚斂之吏以慰困窮之民天下皆知公議之不可廢也然湖南江西運賣廣鹽添額之害京東河北榷鹽皆章惇所倡願付有司根治其罪使賊民罔上之臣少知所畏監察御史孫升繼言江西湖南鹽法之害兩路之民殘虐塗炭甚於兵火獨提舉官劉誼乃能上言極其利害誼坐奪官勒停詔復誼官起守韶州崇寧以後蔡京用事鹽法屢變獨福建鹽於政和初斤增錢七用熙寧法聽商人轉廊算請依六路所算末鹽錢每百千留十之一輸請鹽處為鹽本錢建炎間淮浙之商不通而閩廣之鈔法行未幾淮浙之商既通而閩廣之鈔法遂罷舊法閩之上四州建劍汀邵行官賣鹽法閩之下四州福泉漳化行産鹽法隨稅輸鹽也官賣之法既革産鹽之法亦弊鈔法一行弊若可革而民俗又有不便故當時轉運提舉司請上四州依上法下四州且令從舊及鈔法既罷歲令漕司認鈔錢二十萬緡輸行在所榷貨務自後或減或增卒為二十二萬緡二十七年常平提舉張汝楫復申明鈔法上以問宰執陳誠之奏曰建劍山溪之險細民冒法私販雖官賣鹽猶不能革若使民自賣其能免私販乎私販既多鈔額必虧上曰中間曾用鈔法未幾復罷若可行祖宗已行之矣大抵法貴從俗不然不可經久淳熙五年詔泰寧尤溪兩縣計産買鹽之令更不施行八年福建市舶陳峴言福建自元豐二年轉運使王子京建運鹽之法不免有侵盜科擾之弊且天下州縣皆行鈔法獨福建膺運鹽之害紹興初趙不已嘗措置鈔法而終不可行者蓋漕司則藉鹽綱為增鹽錢州縣則藉鹽綱以為歲計官員則有賣鹽食錢縻費錢胥吏則有發遣交納常例錢公私齟齬無怪乎不可行也鈔法未成倫序而綱運遽罷百姓率無食鹽故漕運乘此以為不便請抱引錢而罷鈔法鈔法罷而綱運興官價高私價賤民多食私鹽而官不售科抑之弊生矣於是詔峴措置峴請從榷貨務自五千斤至百斤分為五等造大小鈔給買仍預措置賣鈔先以本錢畀三倉買鹽以備商旅請買九年正月以福建鹽自來運賣近為鈔法敷擾害民於是詔福建轉運司諸州鹽綱依舊官般官賣三月詔轉運傅自得楊由義廉察官賣鹽未便者措置以聞淳熙十三年四川安撫制置趙汝愚言汀州民貧而官鹽抑配視他州尤甚乞以汀州為客鈔事下提舉應孟明及汀州守臣議孟明等言上四州軍有去産鹽之地甚邇者官不賣鹽則私禁不嚴民食私鹽則客鈔不售既無翻鈔之地則客賣銷折所以鈔法屢行而屢罷四川闊遠猶不可翻鈔汀州將何所往故鈔法雖良不可行於汀州惟裁減本州并諸縣合輸內錢而嚴科鹽之禁庶幾汀民有瘳矣復下轉運趙彥操等措置裁減以歲運二百萬四千斤會之總減三萬九千三十八緡有奇又免其分隸諸司則汀州六邑歲減於民者三萬九千緡有奇減於官者一萬緡有奇所補州用又在外蓋上四州財賦絶少所恃者官賣鹽耳又瀕海諸郡計産輸錢官給之鹽以供食其後遂為常賦而民不復請鹽矣此又下四州産鹽之弊也寧宗嘉定六年臣僚嘗極言之於是下轉運司將福之下四州軍凡二十文産以下合輸鹽五斤之家盡免其析戶産錢僅及二十文者不輸鹽錢寶慶二年監察御史梁成大言福建州縣半係瀕海産鹽之地利權專屬漕臣乃其職也鹽産於福州興化而運於劍建汀邵四郡二十二縣之民食焉福建提舉司主常平茶事而鹽不預漕司與認淨鏹以助用近來越職營利多取綱運分委屬縣縣邑既為漕司措辦鹽課今又增提舉司之額其勢必盡敷於民殆甚於青苗之害望將運鹽盡歸漕司提舉司不得越職庶幾事權歸一民瘼少蘇矣從之景定元年九月明堂赦曰福建上四州縣倚鹽為課其間有招趁失時月解拖缺其缺在寶祐五年以前者並與除放尚敢違法計口科抑者監司按劾以聞三年臣僚言福建上四州山多田少稅賦不足州縣上供等錢銀官吏宗子官兵支遣悉取辦於賣鹽轉運司雖拘榷鹽綱實不自賣近年創例自運鹽兩綱後或歲運十綱至二十綱與上四州縣所運歲額相妨而綱吏搭帶之數不預焉州縣被其攙奪發泄不行上供常賦無從趁辦不免敷及民戶其害有不可勝言者有旨福建轉運司視自來鹽法毋致違戾建寧府南劍州汀州邵武軍依此施行廣州東管靜康等十三場歲鬻二萬四千餘石以給本路及西路之昭桂州江南之南安軍廉州白石石康二場歲鬻三萬石以給本州及容白欽化蒙龔藤象宜柳雍潯貴賓梧橫南儀鬱林州又高竇春雷融瓊崖儋萬安州各鬻以給本州無定額天聖以後東西海場十三皆領於廣州歲鬻五十一萬三千六百八十六石以給東西二路而瓊崖諸州其地荒阻賣鹽不售類抑配衙前前後官此者或擅增鹽數煎鹽戶力不給有破産者元豐三年朱初平奏蠲鹽之不售者又約所賣數定為煎額以惠遠民久之廣西漕司奏民戶逋鹽稅其縣令監官雖已代並住奉勒催須足乃罷而廣東漕臣復奏嶺外依六路法以逐州管幹官為鹽官提點刑獄兼提舉鹽事考較賞罰如之瓊崖等州復請賦鹽於民斤重視其戶等而民滋困矣南渡二廣之鹽皆屬於漕司量諸州歲用而給之鹽然廣東俗富猶可通商廣西地廣莫而雕瘁食鹽有限商賈難行自東廣而出乘大水無灘磧其勢甚易自西廣而出水小多灘磧其勢甚難建炎末鬻鈔未幾復止然官般客鈔亦屢有更革東西兩漕屢有分合紹興元年三月南恩州陽江縣土生鹹募民墾之置竈六十七産鹽七十萬八千四百斤收息錢三萬餘緡十有二月復置廣西茶鹽司八年詔廣西鹽歲以十分為率二分令欽廉雷化高五州官賣餘八分行鈔法尋又詔廣東鹽九分行鈔法一分産鹽州縣出賣廣南去中州絶遠土曠民貧賦入不給故漕司鬻鹽以其息什四為州用可以粗給而民無加賦昭州歲收買鹽錢三萬六千緡以七千緡代潯貴州上供赴經略司買馬餘為州用及罷官賣遂科七千緡於民戶謂之縻費錢焉九年罷廣東官賣行客鈔法以其錢助鄂兵之費孝宗乾道四年罷鹽鈔令廣西漕司自認漕錢二十萬且廣西之鹽乃漕司出賣自乾道元年因曾連請併歸廣東於是度支唐琢言廣西鹽引錢缺幾八千萬緡緣向來二廣鹽事分東西兩司而西路鹽常為東路所侵昔廣西自作一司故鹽課不至於虧減今既罷西司併入東路則廣東之鹽無復禁止廣西坐失一路所入故有是命既而宰執進蔣芾之奏鹽利舊屬漕司給諸州歲計自賣鈔鹽之後漕司遂以苗米高價折錢今朝廷更不降鹽鈔只令漕司認發歲額則漕司自獲鹽息折米招糴之弊皆去矣九年詔廣州復行官般官賣法淳熙三年詔廣西轉運司歲收官鹽息錢三分撥諸州七分充漕計從經略張栻請也栻去而漕臣趙公浣增鹽直斤百錢為百六十欽州歲賣鹽千斛而五增之六年侍御史江溥以為言上黜公浣詔閩廣賣鹽自有舊額定直自今毋得擅增九年詔遣浙西撫幹胡庭直訪求利害與帥漕提舉詳議以聞使還尋以庭直提舉廣東同措置廣西鹽事十年詔曰廣南在數千里外疾痛艱於上聞朕憫之尤切蓋鹽者民資以食向也官利其贏轉而自鬻久為民疾朕為之更令俾通販而杜官鬻民固以為利矣然利於民者官不便焉必胥動以浮言且朕知恤民而已浮言奚恤矧置監司守令以為民朕有美意弗廣其推顧撓而壞之可乎自今如或有此必置之法於是命詹儀之知靜江府併廣東西鹽事為一司其兩路賣鹽歲以十六萬五千籮為額儀之等言兩路鹽且以十萬籮為額俟三數年視其增虧乃增其額所有客鈔東西路通貨錢與免以便商販十六年經略應孟明言廣中自行鈔法五六年間州縣率以鈔抑售於民其害有甚於官般詔孟明朱晞顏與提舉廣南鹽事王光祖從長措置經久利便毋致再有科抑之弊寶慶元年以廣州安撫司水軍大為興販罷其統領尹椿統轄黃受各降一官鬻為鹽曰并州永利監歲鬻十二萬五千餘石以給本州及欣代石嵐憲遼澤潞麟府州威勝岢嵐火山平定寧化保德軍許商人販鬻不得出境仁宗時分永利東西兩監東隸并州西隸汾州籍州民之有土者為鐺戶戶歲輸鹽於官謂之課鹽餘則官以錢售之謂之中賣鹽法亦與海鹽同歲鬻視舊額減三千四百三十七石河東唯晉絳慈隰食池鹽餘皆食永利鹽其入官斤為八錢或六錢出為錢三十六歲課緡錢十八萬九千有奇自咸平以來聽商人輦鹽過河西麟府州濁輪寨貿易官為下其價豫之後積鹽益多康定初罷東監鬻鹽三年皇祐中又權罷西監鬻鹽俟鹽少復故時議者請募商人入芻粟麟府州火山軍豫券償以鹽從之既而芻粟虛估高券直千錢為鹽商所抑才售錢四百有餘而出官鹽五十斤蠹耗縣官或請罷入芻粟第令入實錢轉運司議以為非便而止大抵土或厚或薄薄則利微鐺戶破産不能足其課至和初韓琦請戶滿三歲地利盡得自言摘他戶代之明年又詔鐺戶輸歲課以分數為率蠲復有差遇水災又聽摘他戶代役百姓便之河北陝西亦有𡞰為鹽者然其利薄明道初嘗詔廢河中府慶成軍場禁民𡞰鹽以侵池鹽之利熙寧八年三司使章惇言兩監舊額歲課二十五萬餘緡自許商人並邊入中糧草增饒給鈔支鹽商人得鈔千錢售價半之縣官陰有所亡坐賈獲利不資又私鹽不禁歲課日減今才十萬四千餘緡若計糧草虛估官才得實錢五萬餘緡視舊虧十之八請如解鹽例募商人入錢請買或官自運鬻於本路重私販之禁歲課且大增並邊市糧草一用見錢詔如所奏官自運鬻於本路元豐元年三司戶部副使陳安石言永利東西監鹽請如慶曆前商人輸錢於麟府豐代嵐憲欣岢嵐寧化保德火山等州軍本州軍給券於東西監請鹽以除加饒折糴之弊仍令商人自占所賣地即鹽已運至場務者商人買之加運費如是則官鹽價平而商販通遂行其說用安石為河東都轉運使安石請犯西北青白鹽者以皇祐敕論罪首從皆編配又青白入河東犯者罪至流所歷官司不察者罪之四年安石自言治鹽歲有羡餘及增收欣州地鐺戶馬城池鹽課詔安石遷官賞其屬元祐元年右司諫蘇轍言異時河東除食解鹽餘仰東西永利鹽未嘗闕元豐三年後前宰相蔡確兄礪等始議創增河東欣州馬城池鹽夾硝味苦民不願買乞下轉運司苟無妨闕即止勿收詔從之四年陳安石坐為河東轉運使附會時論興置鹽井害及一路降知鄭州先是熙寧中議收熙河蕃部包順鹽井或以為非宜王安石謂邊將苟自以情得之何害議者不能奪焉六年詔代州賣鹽年額酌以中數以八十五萬斤為額部內多少均裁之紹聖元年河東復行官賣法崇寧三年以河東三路鈔無定估本路尤賤害於糴買罷給三路鈔止給見錢鈔他如河北新降鈔法四年詔河東永利兩監土鹽仍官收見緡鬻之聽商人入納算請定往河東州軍罷客販東北鹽入河東者𡞰井為鹽曰益梓夔利凡四路益州路一監九十八井歲𡞰八萬四千五百二十二石梓州路二監三百八十五井十四萬一千七百八十石夔州路三監二十井八萬四千八百八十石利州路一百二十九井一萬二千二百石各以給本路大為監小為井監則官掌井則土民幹鬻如其數輸課聽往旁境販賣唯不得出川峽初川峽承舊制官自鬻鹽開寶七年詔斤減十錢令幹鬻者有羡利但輸十之九太平興國二年右拾遺郭泌上言劍南諸州官糶鹽斤為錢七十鹽井濬深𡞰鹽極苦樵薪益貴輦之甚艱加之風水之虞或至漂喪豪民黠吏相與為姦賤市於官貴糶於民至有斤獲錢數百官虧歲額民食貴鹽望稍增舊價為百五十文則豪猾無以規利民有以給食從之有司言昌州歲收虛額鹽萬八千五百餘斤乃開寶中知州李佩掊斂以希課最廢諸井薪錢歲額外課部民𡞰鹽民不習其事甚以為苦至破産不能償其數多流入他部而積年之征不可免詔悉除之其舊額二萬七千六十斤如故端拱元年七月西川食鹽不足許商販階文州青白鹽峽路井鹽永康軍崖鹽勿收算川峽諸州自李順叛後增屯兵乃募人入粟以鹽償之景德二年權三司使丁謂言川峽糧儲充足請以鹽易絲帛詔諸州軍食及二年近溪洞州三年者從其請大中祥符元年詔瀘州南井竈戶遇正至寒食各給假三日所收日額仍與除放三年減瀘州淯井監課鹽三之一仁宗時成都梓夔三路六監與宋初同而成都增井三十九歲課減五萬六千五百九十七石梓州路增井二十八歲課減十一萬一十九石利州路井增十四歲課減四百九十二石三斗有奇夔州路井增十五歲課減三千一百八十四石各以給一路夔州則并給諸蠻計所入鹽直歲輸緡錢五分銀紬絹五分又募人入錢貨諸州即産鹽厚處取鹽而施黔並邊諸州并募人入米康定元年淮南提點刑獄郭維言川峽素不産銀而募人以銀易鹽又鹽酒場主者亦以銀折歲課故販者趨京師及陝西市銀以歸而官得銀復輦置京師公私勞費請聽入銀京師榷貨務或陝西並邊州軍給券受鹽於川峽或以折鹽酒歲課願入錢二千當銀一兩詔行之既而入銀陝西者少議鹽百斤加二十斤豫之并募入中鳳翔永興會西方用兵軍食不足又詔入芻粟並邊俟有備而止芻粟虛估高鹽直賤商賈利之西方既無事猶入中如故夔州轉運使蔣賁以為入中十餘年虛費夔鹽計直二十餘萬緡今陝西用池鹽之利軍儲有備請如初詔許之先是益利鹽入最薄故并食大寧監解池鹽商賈轉販給之慶曆中令商人入錢貨益州以射大寧監鹽者萬斤增小錢千緡小錢十當大錢一販者滋少蜀中鹽踊貴斤為小錢二千二百知益州文彥博以為言詔皆復故四路鹽課縣官之所仰給然井源或發或微而積課如舊任事者多務增課為功往往貽患後人時方切於除民疾苦尤以遠人為意有司上言輒為蠲減初鹽課聽以五分折銀紬絹鹽一斤計錢二十至三十銀一兩紬絹一匹折錢六百至一千二百後詔以課利折金帛者從時估荊湖之歸峽二州州二井歲課二千八百二十石亦各以給本州熙寧中蜀鹽私販者衆禁不能止欲盡實私井運解鹽以足之議未決神宗以問修起居注沈括對曰私井既容其撲買則不得無私易一切實之而運解鹽使一出於官售此亦省刑罰籠遺利之一端然忠萬戎瀘間夷界小井尤多止之實難若列候加警恐所得不酬所費議遂寢九年劉佐入蜀經度茶事嘗歲運解鹽十萬席侍御史周尹奏成都府路素仰東川産鹽昨轉運司商度賣陵井場遂止東鹽及閉卓筒井失業者衆言利之臣復運解鹽道險續運甚艱成都鹽踊貴東川鹽賤驅民冒法乞東鹽仍入成都勿閉卓筒井罷官運解鹽詔商販仍舊賣解鹽依客商例禁抑配於民未幾官運解鹽竟罷元祐元年詔委成都提點刑獄郭概體量鹽事右司諫蘇轍劾概觀望阿附奏不以實且言四川數州賣邛州蒲江井官鹽斤為錢百二十近歲鹹泉減耗多雜沙土而梓夔路客鹽及民間販小井白鹽價止七八十官司遂至抑配概不念民朝夕食此貴鹽詔遂罷概令黃廉體量以聞上封事者言有司於稅課外歲令井輸五十緡謂之官溪錢詔付廉悉蠲之詔自今溪有鹽井輸課利鹽稅外毋得更增以租崇寧二年川峽利洋興劍蓬閬巴綿漢興元府等州並通行東北鹽四年梓遂夔綿漢州大寧監等鹽仍鬻於蜀惟禁侵解鹽地紹興二年四川總領趙開初變鹽法倣大觀法置合同場收引稅錢大抵與茶法相類而嚴密過之斤輸引錢二十有五土産稅及增添約九錢四分所過稅錢七分住稅一錢有半引別輸提勘錢六十其後又增貼輸等錢凡四川四千九百餘井歲産鹽約六千餘萬斤引法初行百斤為一檐又許增十斤勿算以優之其後遞增至四百餘萬緡二十九年減西和州賣鹽直之半孝宗淳熙六年四川制置胡元質總領程價言推排四路鹽井二千三百七十五場四百五除井一千一百七十四場一百五十依舊額煎輸其自陳或糾決增額者井一百二十五場二十四并今渲淘舊井亦願入籍者四百七十九其無鹽之井即與剗除不敷而抱輸者即與量減共減錢引四十萬九千八百八十八道而增收錢引十三萬七千三百四十九道庶井戶免困重額七年元質又言鹽井推排所以增有餘減不足有司務求贏餘盈者過取涸者略減盡出私心今後凡遇推排以增補虧不得踰已減之數十一年以京西轉運副使江溥言金州帥司置場拘買商鹽高價科賣致商旅坐困民食貴鹽詔金州依法聽商人從便買賣不得置場拘催初趙開之立榷法也令商人入錢請引井戶但如額𡞰鹽輸土産稅而已然鹹脈有盈縮月額有登耗間以虛鈔付之而收其算引法由是大壞井戶既為商人所要因增其斤重豫之每檐有增至百六十斤者又逃絶之井許增額承認小民利於得井界增其額而不能售其引息土産之輸無所從出由是刎縊相尋公私病之光宗紹熙三年吏部尚書趙汝愚言紹興間趙開所議鹽法諸井皆不立額惟禁私賣而諸州縣鎮皆置合同場以招商販其鹽之斤重遠近皆平準之使彼此均一而無相傾奪貴賤以時而為之翕張今其法盡廢宜下四川總所視舊法施行時楊輔為總計去虛額閉廢井申嚴合同場法禁斤重之踰格者而重私販之罰鹽直於是頓昂輔又請罷利州東路安撫司所置鹽店六及津渡所收鹽錢與西路興州鹽店後總領陳曄又盡除官井所增之額焉五年戶部言潼川府鹽酒為蜀重害鹽既收其土産錢給賣官引又從而征之矧州縣額外收稅如買酒錢到岸錢榻地錢之類皆是創增於是申禁成都潼川利路諸司寧宗嘉定七年詔四川鹽井專隸總所既而宣撫使安丙言防秋藉此以助軍興乃復奪之茶宋榷茶之制擇要會之地曰江陵府曰真州曰海州曰漢陽軍曰無為軍曰蘄州之蘄口為榷貨務六初京城建安襄復州皆置務後建安襄復州務廢京城務雖存但會給交鈔往還而不積茶貨在淮南則蘄黃廬舒光壽六州官自為場置吏總之謂之山場者十三六州采茶之民皆隸焉謂之園戶歲課作茶輸租餘則官悉市之其售於官者皆先受錢而後入茶謂之本錢又民歲輸稅願折茶者謂之折稅茶總為歲課八百六十五萬餘斤其出鬻皆就本場在江南則宣歙江池饒信洪撫筠袁十州廣德興國臨江建昌南康五軍兩浙則杭蘇明越婺處溫台湖常衢睦十二州荊湖則江陵府潭澧鼎鄂嶽歸峽七州荊門軍福建則建劍二州歲如山場輸租折稅總為歲課江南千二十七萬餘斤兩浙百二十七萬九千餘斤荊湖二百四十七萬餘斤福建三十九萬三千餘斤悉送六榷務鬻之茶有二類曰片茶曰散茶片茶蒸造實棬摸中串之唯建劍則既而研編竹為格置焙室中最為精潔他處不能造有龍鳳石乳白乳之類十二等以充歲貢及邦國之用其出虔袁饒池光歙潭嶽辰澧州江陵府興國臨江軍有仙芝玉津先春緑芽之類二十六等兩浙及宣江鼎州又以上中下或第一至第五為號散茶出淮南歸州江南荊湖有龍溪雨前雨後之類十一等江浙又有以上中下或第一至第五為號者買臘茶斤自二十錢至一百九十錢有十六等片茶大片自六十五錢至二百五錢有五十五等散茶斤自十六錢至三十八錢五分有五十九等鬻臘茶斤自四十七錢至四百二十錢有十二等片茶自十七錢至九百一十七錢有六十五等散茶自十五錢至一百二十一錢有一百九等民之欲茶者售於官其給日用者謂之食茶出境則給券商賈貿易入錢若金帛京師榷貨務以射六務十三場茶給券隨所射與之願就東南入錢若金帛者聽計直豫茶如京師至道末鬻錢二百八十五萬二千九百餘貫天禧末增四十五萬餘貫天下茶皆禁唯川峽廣南聽民自買賣禁其出境凡民茶折稅外匿不送官及私販鬻者沒入之計其直論罪園戶輒毀敗茶樹者計所出茶論如法舊茶園荒薄采造不充其數者蠲之當以茶代稅而無茶者許輸他物主吏私以官茶貿易及一貫五百者死自後定法務從輕減太平興國二年主吏盜官茶販鬻錢三貫以上黥面送闕下淳化三年論直十貫以上黥面配本州牢城巡防卒私販茶依本條加一等論凡結徒持仗販易私茶遇官司擒捕抵拒者皆死太平興國四年詔鬻僞茶一斤杖一百二十斤以上棄市雍熙二年民造溫桑僞茶比犯真茶計直十分論二分之罪淳化五年有司以侵損官課言加犯私茶一等非禁法州縣者如太平興國詔條論決茶之為利甚博商賈轉致於西北利嘗至數倍雍熙後用兵切於饋餉多令商人入芻糧塞下酌地之遠近而為其直取市價而厚增之授以要券謂之交引至京師給以緡錢又移文江淮荊湖給以茶及顆末鹽端拱二年置折中倉聽商人輸粟京師優其直給茶鹽于江淮淳化三年監察御史薛映祕書丞劉式等請罷諸榷務令商人就出茶州軍官場算買既大省輦運又商人皆得新茶詔以三司鹽鐵副使雷有終為諸路茶鹽制置使左司諫張觀與映副之四年二月廢沿江八務大減茶價詔下商人頗以江路回遠非便有司又以損直虧課為言七月復置八務罷制置使副至道初劉式猶固執前議西京作坊使楊允恭言商人市諸州茶新陳相糅兩河陝西諸州風土各有所宜非參以多品則少利罷榷務令就茶山買茶不可行太宗欲究其利害之說命宰相召鹽鐵使陳恕等與式允恭定議召問商人皆願如淳化所減之價不然即望仍舊有司職出納難於減損皆同允恭之說式議遂寢即以允恭為江南淮南兩浙發運兼制置茶鹽使二年從允恭等請禁淮南十二州軍鹽官鬻之商人先入金帛京師及揚州折博務者悉償以茶自是鬻鹽得實錢茶無滯積歲課增五十萬八千餘貫允恭等皆被賞初商人以鹽為急趨者甚衆及禁江淮鹽又增用茶如百千又有官耗增十千場耗隨所在饒益其輸邊粟者持交引詣京師有坐賈置鋪隸名榷貨務懷交引者湊之若行商則鋪賈為保任詣京師榷務給錢南州給茶若非行商則鋪賈自售之轉鬻與茶賈及南北和好罷兵邊儲稍緩物價差減而交引虛錢未改既以茶代鹽而買茶所入不補其給交引停積故商旅所得茶指期於數年之外京師交引愈賤至有裁得所入芻粟之實價官私俱無利是年定監買官虧額自一釐以上罰奉降差遣之制景德二年命鹽鐵副使林特崇儀副使李溥等就三司悉索舊制詳定而召茶商論議別為新法其於京師入金銀綿帛實直錢五十千者給百貫實茶若須海州茶者入見緡五十五千河北緣邊入金帛芻粟如京師之制而茶增十千次邊增五千河東緣邊次邊亦然而所增有八千六千之差陝西緣邊亦如之而增十五千須海州茶者納物實直五十二千次邊所增如河北緣邊之制其三路近地所入所給皆如京師河北次邊河東緣邊次邊皆不得射海州茶茶商所過當輸算令記録候至京師併輸之仍約束山場僅其出納議奏三司皆以為便五月以溥為淮南制置發運副使委成其事行之一年真宗慮未盡其要三年命樞密直學士李濬等比較新舊法利害時新法方行商人頗眩惑特等請罷比較從之有司上歲課元年用舊法得五百六十九萬貫二年用新法得四百一十萬貫三年二百八萬貫特言所增益官本少而有利乃實課也所虧虛錢耳四年秋特等皆遷官仍詔三司行新法不得輒有改更大中祥符二年特溥等上編成茶法條貫並課利總數二十三策自新法之行舊有交引而未給者已給而未至京師者已至而未磨者悉差定分數折納入官大約商人有舊引千貫者令依新法歲入二百千候五歲則新舊皆給足官府有以茶充公費者慮其價賤亂法悉改以他物山場節其出耗所過商稅嚴其覺舉諸榷務所受茶皆均第配給場務以交引至先後為次大商刺知精好之處日夜走僮使齎券詣官率多先焉初禁淮南鹽小商已困至是益不能行六年申監買官賞罰之式凡買到入算茶及租額遞年送榷務交足而有羡餘者即理為課績其不入算者雖多不在此限大中祥符五年歲課二百餘萬貫六年至三百萬貫七年又增九十萬貫八年才百六十萬貫是時數年間有司以京師切須錢商人舊執交引至場務即付物時或特給程限踰限未至者每十分復令別輸二分見緡謂之貼納豪商率能及限小商或不即知或無貼納則賤鬻於豪商有司徒知移用之便至有一歲之內文移小改至十數者商人惑之顧望不進乃詔刑部尚書馮拯翰林學士王曾詳定拯等深以慎重敦信為言而上封者猶競陳改法之弊九年乃命翰林學士李迪權御史中丞凌策侍御史知雜呂夷簡與三司同議條制時以茶多不精給商人罕有饒益行商利薄陝西交引愈賤鬻於市才八千知秦州曹瑋請於永興鳳翔河中府官出錢市之詔可迪等以入中緡錢金帛舊從商人所有受之至是請令十分輸緡錢四五又定加饒貼納之差然凡有條奏多令李溥裁酌溥務執前制罕所變革天禧二年太常博士李垂請放行茶貨左諫議大夫孫奭言茶法屢改商人不便非示信之道望重定經久之制即詔奭與三司詳定務從寬簡未幾奭出知河陽事遂止三司言陝西入中芻糧請依河北例斗束量增其直計實錢給鈔入京以見錢買之願受茶貨交引給依實錢數令榷貨務並依時價納緡錢支茶不得更用芻糧文鈔貼納茶貨詔每入百千增五千茶與之餘從其請時陝西交引益賤京師裁直五千有司惜其費茶五年出內庫錢五十萬貫令閣門祗候李德明於京師市而毀之乾興以來西北兵費不足募商人入中芻粟如雍熙法給券以茶償之後又益以東南緡錢香藥犀齒謂之三說至塞下急於兵食欲廣儲偫不愛虛估入中者以虛錢得實利人競趨焉及其法既敝則虛估日益高茶日益賤入實錢金帛日益寡而入中者非盡行商多其土人既不知茶利厚薄且急於售錢得券則轉鬻於茶商或京師交引鋪獲利無幾茶商及交引鋪或以券取茶或收蓄貿易以射厚利由是虛估之利皆入豪商巨賈券之滯積雖二三年茶不足以償而入中者以利薄不趨邊備日蹙茶法大壞初景德中丁謂為三司使嘗計其得失以謂邊糴才及五十萬而東南三百六十餘萬茶利盡歸商賈當時以為至論厥後雖屢變法以救之然不能亡敝天聖元年命三司使李咨等較茶鹽礬稅歲入登耗更定其法遂置計置司以樞密副使張士遜參知政事呂夷簡魯宗道總之首考茶法利害奏言十三場茶歲課緡錢五十萬天禧五年才及緡錢二十三萬每券直錢十萬鬻之售錢五萬五千總為緡錢實十三萬除九萬餘緡為本錢歲才得息錢三萬餘緡而官吏廩給雜費不預是則虛數多而實利寡請罷三說行貼射法其法以十三場茶買賣本息併計其數罷官給本錢使商人與園戶自相交易一切定為中估而官收其息如鬻舒州羅源場茶斤售錢五十有六其本錢二十有五官不復給但使商人輸息錢三十有一而已然必輦茶入官隨商人所指豫之給券為驗以防私售故有貼射之名若歲課貼射不盡或無人貼射則官市之如舊園戶過期而輸不足者計所負數如商人入息舊輸茶百斤益以二十斤至三十五斤謂之耗茶亦皆罷之其入錢以射六務茶者如舊制先是天禧中詔京師入錢八萬給海州荊南茶入錢七萬四千有奇給真州無為蘄口漢陽並十三場茶皆直十萬所以饒裕商人而海州荊南茶善而易售商人願得之故入錢之數厚於他州其入錢者聽輸金帛十之六至是既更為十三場法又募入錢六務而海州荊南增為八萬六千真州無為蘄口漢陽增為八萬商人入芻粟塞下者隨所在實估度地里遠近量增其直以錢一萬為率遠者增至七百近者三百給券至京一切以緡錢償之謂之見錢法願得金帛若他州錢或茶鹽香藥之類者聽大率使茶與邊糴各以實錢出納不得相為輕重以絶虛估之敝朝廷皆用其說行之期年豪商大賈不能為輕重而論者謂邊糴償以見錢恐京師府藏不足以繼爭言其不便會江淮制置司言茶有滯積壞敗者請一切焚棄朝廷疑變法之敝下書責計置司又遣官行視茶積咨等因條上利害且言嘗遣官視陝西河北以鎮戎軍定州為率鎮戎軍入粟直二萬八千定州入粟直四萬五千給茶皆直十萬以蘄州市茶本錢視鎮戎軍粟直反亡本錢三之一得不償失敝在茶與邊糴相須為用故更今法以新舊二法較之乾興元年用三說法每券十萬茶售錢五萬一千至六萬二千香藥象齒售錢四萬一千有奇東南緡錢售錢八萬三千而京師實入緡錢五十七萬有奇邊儲芻二百五萬餘圍粟二百九十八萬石天聖元年用新法至二年茶及香藥東南緡錢每給直十萬茶入實錢七萬四千有奇至八萬香藥象齒入錢七萬二千有奇東南緡錢入錢十萬五百而京師實入緡錢增一百四萬有奇邊儲芻增一千一百六十九萬餘圍粟增二百一十三萬餘石舊以虛估給券者至京師為出錢售之或折為實錢給茶貴賤從其市估其先賤售於茶商者券錢十萬使別輸實錢五萬共給天禧五年茶直十五萬小商百萬以下免輸錢每券十萬給茶直七萬至七萬五千天禧茶盡則給乾興以後茶仍增別輸錢五萬者為七萬並給耗如舊俟舊券盡而止如此又省合給茶及香藥象齒東南緡錢總直緡錢一百七十一萬二府大臣亦言所省及增收計為緡錢六百五十餘萬時邊儲有不足以給一歲者至是多者有四年少者有二年之蓄而東南茶亦無滯積之弊其制置司請焚棄者特纍年壞敗不可用者爾推行新法功緒已見蓋積年侵蠹之源一朝閉塞商賈利於復故欲有以動搖而論者不察其實助為游說願力行之毋為流言所易於是詔有司榜諭商賈以推行不變之意賜典吏銀絹有差然論者猶不已
