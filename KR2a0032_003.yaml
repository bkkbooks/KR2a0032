body:
  text: 宋史卷三本紀第三太祖三五年春正月壬辰朔雨雪不御殿禁鐵鑄浮屠及佛像庚子前盧氏縣尉鄢陵許永年七十有五自言父瓊年九十九兩兄皆八十餘乞一官以便養因召瓊厚賜之授永鄢陵令壬寅省州縣小吏及直力人乙巳罷襄州歲貢魚二月丙子詔沿河十七州各置河隄判官一員庚辰以鳳州七房銀冶為開寶監庚寅以兵部侍郎劉熙古參知政事閏月壬辰禮部試進士安守亮等諸科共三十八人召對講武殿始放榜庚戌升密州為安化軍節度三月庚午賜潁州龍騎指揮使仇興及兵士錢辛未占城國王波美稅遣使來獻方物壬申幸教船池習戰乙酉殿中侍御史張穆坐贓棄市夏四月庚寅朔三佛齊國主釋利烏耶遣使來獻方物丙午遣使檢視水災田丙寅遣使諸州捕虎五月庚申賜恩赦侯劉鋹錢一百五十萬乙丑命近臣祈晴併廣南州十三縣三十九丙寅罷嶺南採珠媚川都卒為靜江軍辛未河決濮陽命潁州團練使曹翰往塞之甲戌以霖雨出後宮五十餘人賜予以遣之丁亥河南北淫雨澶滑濟鄆曹濮六州大水六月己丑河決陽武汴決穀熟丁酉詔淫雨河決沿河民田有為水害者有司具聞除租戊申修陽武隄秋七月己未右拾遺張恂坐贓棄市癸未邕容等州獠人作亂八月庚寅高麗國王王昭遺使獻方物己亥廣州行營都監朱憲大破獠賊於容州癸卯升宿州為保靜軍節度罷密州仍為防禦九月丁巳朔日有食之癸酉李崇矩以鎮國軍節度使罷冬十月庚子幸河陽節度使張仁超第視疾甲辰試道流不才者勒歸俗十一月己未李繼明藥繼清大破獠賊於英州癸亥禁僧道習天文地理己巳禁舉人寄應庚辰命參知政事薛居正呂餘慶兼淮湖嶺蜀轉運使十二月乙酉朔祈雪己亥畋近郊開封尹光義暴疾遂如其第視之甲寅內班董延諤坐監務盜芻粟杖殺之詔合入令錄者引見後方注乙卯大雨雪是歲大饑六年春正月丙辰朔不御殿置蜀水陸轉運計度使癸酉修魏縣河二月丙戌朔棣州兵馬監押殿直傅延翰謀反伏誅丙申曹州饑漕太倉米二萬石振之己亥吳越國進銀裝花舫金香師子三月乙卯朔周鄭王殂于房州上素服發哀輟朝十日謚曰恭帝命還葬慶陵之側陵曰順陵己未復密州為安化軍節度庚申覆試進士於講武殿賜宋準及下第徐士廉等諸科百二十七人及第乙亥賜宋準等宴錢二十萬大食國遣使來獻翰林學士知貢舉李昉坐試人失當責授太常少卿試朝臣死王事者子陸坦等賜進士出身丙子幸相國寺觀新修塔夏四月丁亥召開封尹光義天平軍節度使石守信等賞花習射於苑中辛丑遣盧多遜為江南國信使甲辰占城國王悉利陀盤印茶遣使來獻方物丙午黎州保塞蠻來歸戊申詔修五代史五月庚申劉熙古以戶部尚書致仕詔中書吏擅權多姦贓兼用流內州縣官己巳交州丁璉遣使貢方物幸玉津園觀刈麥辛巳殺右拾遺馬適六月辛卯閱在京百司吏黜為農者四百人癸巳占城國遣使獻方物隰州巡檢使李謙溥拔北漢七砦癸卯雷有鄰告宰相趙普黨堂吏胡贊等不法贊及李可度並杖籍沒庚戌詔參知政事與宰相趙普分知印押班奏事秋七月壬子朔詔諸州府置司寇參軍以進士明經者為之丙辰減廣南無名率錢八月乙酉罷成都府偽蜀嫁裝稅辛卯賜布衣王澤方同學究出身丁酉泗州推官侯濟坐試判假手杖除名甲辰趙普罷為河陽三城節度使同平章事辛酉幸都亭驛九月丁卯餘慶以尚書左丞罷己巳封光義為晉王兼侍中德昭同中書門下平章事薛居正為門下侍郎同平章政事戶部侍郎樞密副使沈義倫為中書侍郎同平章事石守信兼侍中盧多遜中書舍人參知政事壬申詔晉王光義班宰相上冬十月甲申葬周恭帝不視朝丁亥幸玉津園觀稼戊子流星出文昌北斗甲辰特赦諸官吏姦贓十一月癸丑詔常參官進士及第者各舉文學一人十二月壬午命近臣祈雪丙午前中書舍人參知政事多遜起復視事行開寶通禮限度僧法諸州僧帳及百人歲許度一人七年春正月庚戌不御殿庚申占城國王波美稅遣使獻方物齊州野蠶成繭癸亥左拾遺秦亶太子中允呂鵠並坐贓宥死杖除名二月庚辰朔日有食之丙戌日有二黑子癸卯命近臣祈雨詔詩書易三經學究依三經三傳資入官乙巳太子中舍胡德沖坐隱官錢棄市三月乙丑三佛齊國王遣使獻方物夏四月丙午遣使檢嶺南民田五月戊申朔殿中侍御史李瑩坐受南唐餽遺責授右贊善大夫甲寅以布衣齊得一為章丘主簿乙丑詔市二價者以枉法論丙寅幸講武池觀習水戰丙子又幸講武池遂幸玉津園六月丙申河中府饑發粟三萬石振之己亥淮溢入泗州城壬寅安陽河溢皆壞民居秋七月壬子幸講武池觀習水戰遂幸玉津園丙辰南丹州溪洞酋帥莫洪燕內附詔減成都府鹽錢庚午太子中允李仁友坐不法棄市八月戊寅吳越國王遣使來朝貢丁亥諭吳越伐江南戊子陳州貢芝草一本四十九莖己丑幸講武池賜習水戰軍士錢戊戌殿中丞趙象坐擅稅除名甲辰幸講武池觀習水戰遂幸玉津園九月癸亥命宣徽南院使義成軍節度使曹彬為西南路行營馬步軍戰櫂都部署山南東道節度使潘美為都監潁州團練使曹翰為先鋒都指揮使將兵十萬出荊南以伐江南將行召曹彬潘美戒之曰城陷之日慎無殺戮設若困鬬則李煜一門不可加害丁卯以知制誥李穆為江南國信使冬十月甲申幸迎春苑登汴隄觀戰艦東下丙戌又幸迎春苑登汴隄觀諸軍習戰遂幸東水門發戰櫂東下江南進絹數萬御衣金帶器用數百事壬辰曹彬等將舟師步騎發江陵水陸並進丁酉命吳越王錢俶為昇州東南行營招撫制置使己亥曹彬收下峽口獲指揮使王仁震王宴錢興閏月己酉克池州丁巳敗江南軍于銅陵庚申命宰相參知政事更知日曆壬戌彬等拔蕪湖當塗兩縣駐軍采石癸亥詔減湖南新製茶甲子薛居正等上新編五代史賜器幣有差丁卯彬敗江南軍于采石擒兵馬部署楊收都監孫震等千人為浮梁以濟十一月癸未黥李從善部下及江南水軍一千三百九十人為歸化軍甲申詔省劍南山南等道屬縣主簿丁亥秦晉旱免蒲陝晉絳同解六州逋賦關西諸州免其半己丑知漢陽軍李恕敗江南水軍于鄂甲午曹彬敗江南軍於新林砦辛丑命知雄州孫全興答涿州修好書壬寅大食國遣使獻方物十二月己酉彬敗江南軍於白鷺洲辛亥命近臣祈雪甲子吳越王帥兵圍常州獲其人馬尋拔利城砦丙寅彬敗江南軍於新林港己巳左拾遺劉祺坐受賂黥面杖配沙門島庚午北漢寇晉州守臣武守琦敗之於洪洞壬申吳越王敗江南軍於常州北界八年春正月甲戌朔以出師不御殿丙子知池州樊若水敗江南軍於州界田欽祚敗江南軍於溧水斬其都統使李雄乙酉御長春殿謂宰相曰朕觀為臣者比多不能有終豈忠孝薄而無以享厚福耶宰相居正等頓首謝庚寅曹彬拔昇州城南水砦二月癸丑彬敗江南軍於白鷺洲乙卯拔昇州關城丁巳太子中允徐昭文坐抑人售物除籍甲子知揚州侯陟敗江南軍於宣化鎮戊辰覆試進士於講武殿賜王嗣宗等三十一人諸科紀自成等三十四人及第三月乙酉賜王嗣宗等宴錢二十萬己丑命祈雨庚寅彬敗江南軍於江中己亥契丹遣使克沙骨慎思以書來講和知潞州藥繼能拔北漢鷹澗堡辛丑召契丹使於講武殿觀習射壬寅遣內侍王繼恩領兵赴昇州大食國遣使來朝獻夏四月乙巳幸東水磑癸丑幸都亭驛閱新戰船丁巳吳越王拔常州壬戌彬等敗江南軍於秦淮北戊辰幸玉津園觀種稻遂幸講武池觀習水戰庚午詔嶺南盜贓滿十貫以上者死幸西水磑五月壬申朔以吳越國王錢俶守太師尚書令益食邑知桂陽監張侃發前官隱沒羨銀追罪兵部郎中董樞右贊善大夫孔璘殺之太子洗馬趙瑜杖配海島侃受賞遷屯田員外郎辛巳祈晴甲申江南寧遠軍及沿江砦並降乙酉詔武岡長沙等十縣民為賊鹵掠者蠲其逋租仍給復一年甲午安南都護丁璉遣使來貢辛丑河決濮州六月壬寅曹彬等遣使言敗江南軍於其城下丁未宋州觀察判官崔絢錄事參軍馬德休並坐贓棄市辛亥河決澶州頓丘甲子彗出柳長四丈辰見東方秋七月辛未朔日有食之庚辰遣閤門使郝崇信太常丞呂端使契丹癸未西天東印土王子穰結說囉來朝獻甲申詔吳越王班師己亥山後兩林鬼主懷化將軍勿尼等來朝獻八月乙卯幸東水磑觀魚遂幸北園辛酉詔權停今年貢舉壬戌契丹遣左衞大將軍耶律霸德等致御衣玉帶名馬西南蕃順化王子若廢等來獻名馬癸亥丁德裕敗潤州兵於城下九月壬申狩近郊逐兔馬蹶墜地因引佩刀刺馬殺之既而悔之曰吾為天下主輕事畋獵又何罪馬哉自是遂不復獵戊寅潤州降冬十月己亥朔江南主遣徐鉉周惟簡來乞緩師辛亥詔郡國令佐察民有孝悌力田奇材異行或文武可用者遣詣闕丁巳修西京宮闕江南主貢銀五萬兩絹五萬匹乞緩師戊午改潤州鎮海軍節度為鎮江軍節度幸晉王北園己未曹彬遣都虞候劉遇破江南軍於皖口擒其將朱令贇王暉十一月辛未江南主遣徐鉉等再奉表乞緩師不報甲申曹彬夜敗江南軍於城下丙戌以校書郎宋準殿直邢文慶充賀契丹正旦使乙未曹彬克昇州俘其國主煜江南平凡得州十九軍三縣一百八十戶六十五萬五千六十臨視新龍興寺十二月庚子幸惠民河觀築堰辛丑赦江南復一歲兵戈所經二歲戊申三佛齊遣使來獻方物己酉幸龍興寺辛亥免開封府諸縣今年秋租十之三己未以恩赦侯劉鋹為彭城郡公甲子契丹遣使耶律烏正來賀正旦丁卯吳越國王乞以長春節朝覲從之九年春正月辛未御明德門見李煜于樓下不用獻俘儀壬申大赦減死罪一等乙亥封李煜為違命侯子弟臣僚班爵有差己卯江南昭武軍節度使留後盧絳焚掠州縣庚辰詔郊西京癸巳晉王率文武上尊號不允二月癸卯三上表不允庚戌以曹彬為樞密使辛亥命德昭迎勞吳越國王錢俶於宋州契丹遣使耶律延以御衣玉帶名馬散馬白鶻來賀長春節乙卯吳越王奏內客省使丁德裕貪很貶房州刺史丁巳觀禮賢宅戊午以盧多遜為吏部侍郎仍參知政事己未吳越國王錢俶偕子惟濬等朝於崇德殿進銀絹以萬計賜俶衣帶鞍馬遂以禮賢宅居之宴於長安殿壬戌錢俶進賀平昇州銀絹乳香吳綾紬綿錢茶犀象香藥皆億萬計甲子召晉王吳越國王幷其子等射於苑中俶進御衣壽星通犀帶及金器丁卯幸禮賢宅賜俶金器及銀絹倍萬三月己巳俶進助南郊銀絹乳香以萬計庚午賜俶劍履上殿詔書不名癸酉以皇子德芳為檢校太保貴州防禦使中書侍郎同平章事沈義倫為大內都部署右衞大將軍王仁贍權判留司三司兼知開封府事丙子幸西京己卯次鞏縣拜安陵號慟隕絕者久之庚辰賜河南府民今年田租之半奉陵戶復一年辛巳至洛陽庚寅大雨分命近臣詣諸祠廟祈晴辛卯幸廣化寺開無畏三藏塔夏四月己亥雨霽庚子有事圜丘迴御五鳳樓大赦十惡故殺者不原貶降責免者量移用諸流配及逋欠悉放諸官未贈恩者悉覃賞壬寅大宴賜親王近臣列校襲衣金帶鞍馬器幣有差丙午駕還辛亥上至自洛丁巳曹翰拔江州屠之擒牙校宋德明胡則等詔益晉王食邑光美德昭並加開府儀同三司德芳益食邑薛居正沈義倫加光祿大夫樞密使曹彬宣徽北院使潘美加特進吳越國王錢俶益食邑內外文武臣僚咸進階封己未著令旬假為休沐丙寅大食國王珂黎拂遣使蒲希密來獻方物五月己巳幸東水磑遂幸飛龍院觀漁金水河甲戌遣司勳員外郎和峴往江南路採訪殺盧絳庚辰幸講武池遂幸玉津園觀稼宋州大風壞城樓官民舍幾五千間甲申以閤門副使田守奇等充賀契丹生辰使晉州以北漢嵐石憲三州巡檢使王洪武等來獻六月庚子步至晉王邸命作機輪輓金水河注邸中為池癸卯吳越王進銀絹綿以倍萬計乙卯熒惑入南斗秋七月戊辰幸晉王第觀新池丙子幸京兆尹光美第視疾戊寅再幸光美第泉州節度使陳洪進乞朝覲丙戌命近臣祈晴丁亥命修先代帝王及五嶽四瀆祠廟庚寅幸光美第八月乙未朔吳越國王進射火箭軍士己亥幸新龍興寺辛丑太子中允郭思齊坐贓棄市乙巳幸等覺院遂幸東染院賜工人錢又幸控鶴營觀習射賜帛有差又幸開寶寺觀藏經丁未遣侍衞馬軍都指揮使党進宣徽北院使潘美伐北漢丙辰遣使率兵分五道入太原九月甲子幸綾錦院庚午權高麗國事王伷遣使來朝獻党進敗北漢軍於太原城北辛巳命忻代行營都監郭進遷山後諸州民庚寅幸城南池亭遂幸禮賢宅又幸晉王第冬十月甲午朔旦賜文武百官衣有差丁酉兵馬監押馬繼恩率兵入河東界焚蕩四十餘砦己亥幸西教場庚子鎮州巡檢郭進焚壽陽縣俘九千人辛丑晉隰巡檢穆彥璋入河東俘二千餘人党進敗北漢軍於太原城北己酉吳越王獻馴象癸丑夕帝崩於萬歲殿年五十殯于殿西階謚曰英武聖文神德皇帝廟號太祖太平興國二年四月乙卯葬永昌陵大中祥符元年加上尊謚曰啟運立極英武睿文神德聖功至明大孝皇帝帝性孝友節儉質任自然不事矯飾受禪之初頗好微行或諫其輕出曰帝王之興自有天命周世宗見諸將方面大耳者皆殺之我終日侍側不能害也既而微行愈數有諫輒語之曰有天命者任自為之不汝禁也一日罷朝坐便殿不樂者久之左右請其故曰爾謂為天子容易耶早作乘快誤決一事故不樂耳汴京新宮成御正殿坐令洞開諸門謂左右曰此如我心少有邪曲人皆見之吳越錢俶來朝自宰相以下咸請留俶而取其地帝不聽遣俶歸國及辭取羣臣留俶章疏數十軸封識遺俶戒以塗中密觀俶屆途啟視皆留己不遣之章也俶自是感懼江南平遂乞納土南漢劉鋹在其國好置酖以毒臣下既歸朝從幸講武池帝酌巵酒賜鋹鋹疑有毒捧杯泣曰臣罪在不赦陛下既待臣以不死願為大梁布衣觀太平之盛未敢飲此酒帝笑而謂之曰朕推赤心於人腹中寧肯爾耶即取鋹酒自飲別酌以賜鋹王彥昇擅殺韓通雖預佐命終身不與節鉞王全斌入蜀貪恣殺降雖有大功即加貶絀宮中葦簾緣用青布常服之衣澣濯至再魏國長公主襦飾翠羽戒勿復用又教之曰汝生長富貴當念惜福見孟昶寶裝溺器摏而碎之曰汝以七寶飾此當以何器貯食所為如是不亡何待晚好讀書嘗讀二典歎曰堯舜之罪四凶止從投竄何近代法網之密乎謂宰相曰五代諸侯跋扈有枉法殺人者朝廷置而不問人命至重姑息藩鎮當若是耶自今諸州決大辟錄案聞奏付刑部覆視之遂著為令乾德改元先諭宰相曰年號須擇前代所未有者三年蜀平蜀宮人入內帝見其鏡背有志乾德四年鑄者召竇儀等詰之儀對曰此必蜀物蜀主嘗有此號乃大喜曰作相須讀書人由是大重儒者受命杜太后傳位太宗太宗嘗病亟帝往視之親為灼艾太宗覺痛帝亦取艾自灸每對近臣言太宗龍行虎步生時有異他日必為太平天子福德吾所不及云贊曰昔者堯舜以禪代湯武以征伐皆南面而有天下四聖人者往世道升降否泰推移當斯民塗炭之秋皇天眷求民主亦惟責其濟斯世而已使其必得四聖人之才而後以行其事畀之則生民平治之期殆無日也五季亂極宋太祖起介冑之中踐九五之位原其得國視晉漢周亦豈甚相絕哉及其發號施令名藩大將俯首聽命四方列國次第削平此非人力所易致也建隆以來釋藩鎮兵權繩贓吏重法以塞濁亂之源州郡司牧下至令錄幕職躬自引對務農興學慎罰薄斂與世休息迄於丕平治定功成制禮作樂在位十有七年之間而三百餘載之基傳之子孫世有典則遂使三代而降考論聲明文物之治道德仁義之風宋於漢唐蓋無讓焉嗚呼創業垂統之君規模若是亦可謂遠也已矣
