body:
  text: 宋史卷八十六志第三十九地理二河北路河東路河北路舊分東西兩路後併為一路熙寧六年再分為兩路東路府三大名開德河間州十一滄冀博棣莫雄霸德濱恩清軍五德清保順永靜信安保定縣五十七大名府魏郡慶曆二年建為北京八年始置大名府路安撫使統北京澶懷衞德博濱棣通利保順軍熙寧以來並因之六年分屬河北東路崇寧戶一十五萬五千二百五十三口五十六萬八千九百七十六貢花紬綿紬平紬紫草縣十二元城赤熙寧六年省大名縣為鎮入焉莘畿大名次赤熙寧六年省入元城紹聖三年復政和六年徙治南樂鎮內黃畿成安畿熙寧六年省洹水縣為鎮入焉魏次畿館陶畿熙寧五年省永濟縣為鎮入焉尋復舊臨清次畿夏津畿清平畿宋初自博州來隸熙寧二年又割博平縣明靈砦隸焉本縣移置明靈冠氏畿宗城畿熙寧五年省臨清縣為鎮入焉當年復舊尋以永濟隸臨清熙寧六年又省經城縣為鎮入焉開德府上澶淵郡鎮寧軍節度本澶州崇寧四年建為北輔五年升為府宣和二年罷輔郡仍隸河北東路崇寧戶三萬一千八百七十八口八萬二千八百二十六貢莨莠蓆南粉縣七濮陽中觀城望皇祐元年省入濮陽頓丘四年復置臨河緊清豐中慶曆四年徙清豐縣治德清軍即縣置軍使隸州熙寧六年省頓丘縣入清豐衞南中朝城畿舊隸大名府崇寧四年與南樂來隸南樂畿德清軍見上滄州上景城郡橫海軍節度崇寧戶六萬五千八百五十二口一十一萬八千二百一十八貢大絹大柳箱縣五清池望熙寧四年省饒安縣為鎮入清池有乾符巷姑三女泥姑小南河五砦政和三年改巷姑曰海清三女曰三河泥姑曰河平無棣望治平中徙無棣縣治保順軍即縣治置軍使隸州鹽山緊樂陵緊熙寧二年徙治咸平鎮南皮中熙寧六年省臨津縣入焉保順軍周置軍於滄州無棣縣南二十里開寶三年又以滄棣二州界保順吳橋二鎮之地益焉仍隸滄州冀州上信都郡舊團練慶曆八年升安武軍節度崇寧戶六萬六千二百四十四口一十萬一千三十貢絹縣六信都望蓨上南宮上皇祐四年升新河鎮為縣廢南宮六年省新河為鎮入焉棗強上熙寧元年省為鎮入信都十年復置武邑上衡水中河間府上河間郡瀛海軍節度至道三年以高陽隸順安軍舊名關南太平興國七年改名高陽關慶曆八年始置高陽關路安撫使統瀛莫雄貝冀滄永靜保定乾寧信安一十州軍本瀛州防禦大觀二年升為府賜軍額崇寧戶三萬一千九百三十口六萬二百六貢絹縣三河間望雍熙中即縣西置平虜砦景德二年改為肅寧城樂壽望至道三年自深州來隸熙寧六年省景城為鎮入焉束城上熙寧六年省為鎮入河間元祐元年復博州上博平郡防禦淳化三年河決移治於孝武渡西崇寧戶四萬六千四百九十二口九萬一千三百二十三貢平絹縣四聊城望高唐望堂邑望博平緊熙寧二年割明靈砦隸北京清平棣州上樂安郡防禦建隆二年升為團練俄為防禦大中祥符八年移治陽信縣界八方寺崇寧戶三萬九千一百三十七口五萬七千二百三十四貢絹縣三厭次上商河中陽信下莫州上文安郡防禦熙寧六年省長豐縣為鎮又省莫縣入任丘元祐二年復莫縣尋又罷為鎮崇寧戶一萬四千五百六十口三萬一千九百九十二貢綿縣一任丘上有馬村王家二砦政和三年改馬村砦曰定安王家砦曰定平雄州中防禦本唐涿州瓦橋關政和三年賜郡名曰易陽崇寧戶一萬三千一十三口五萬二千九百六十七貢紬縣二歸信中有張家木場三橋雙柳大渦七姑垣紅城新垣八砦容城中建隆四年復置霸州中防禦本唐幽州永清縣地後置益津關周置霸州以莫之文安瀛州之大城來屬政和三年賜郡名曰永清崇寧戶一萬五千九百一十八口二萬一千五百一十六貢絹縣二文安上景祐二年廢永清縣入焉有劉家渦刁魚莫金口阿翁雁頭黎陽喜渦鹿角八砦元豐四年割鹿角砦隸信安軍政和三年改劉家渦砦曰安平阿翁曰仁孝雁頭曰和寧喜渦曰喜安大城上德州上平原郡軍事宋初省歸化縣景祐二年廢安陵縣入將陵後割屬永靜軍熙寧六年省德平縣為鎮入安德崇寧戶四萬四千五百九十一口八萬二千二十五貢絹縣二安德望平原緊濱州上軍事大觀二年賜渤海郡名大中祥符五年廢蒲臺縣崇寧戶四萬九千九百九十一口一十一萬四千九百八十四貢絹縣二渤海望招安上慶曆二年升招安鎮為縣熙寧六年省為鎮入渤海元豐二年復為縣恩州下清河郡軍事唐貝州晉永清軍節度周為防禦宋初復為節度慶曆八年改州名罷節度崇寧戶五萬一千三百四十二口八萬五千九百八十六貢絹白縣三清河望端拱元年徙治永寧鎮淳化五年徙今治熙寧四年省清陽縣入焉武城望歷亭緊至和元年廢漳南縣入焉永靜軍同下州唐景州太平興國六年以軍直屬京淳化元年以冀州阜城來屬景德元年改軍名崇寧戶三萬四千一百九十三口三萬九千二十二貢簟絹縣三東光緊將陵望景祐元年移治于長河鎮阜城中嘉祐八年省為鎮入東光熙寧十年復為縣清州下本乾寧軍幽州蘆臺軍之地晉陷契丹周平三關置永安縣屬滄州太平興國七年置軍改縣曰乾寧隸焉大觀二年升為州政和三年賜郡名曰乾寧崇寧戶六千六百一十九口一萬二千七十八貢絹縣一乾寧熙寧六年省為鎮元符二年復崇寧三年再省政和五年又復砦六釣臺獨流北獨流東當城沙渦百萬信安軍同下州太平興國六年以霸州淤口砦建破虜軍景德二年改為信安崇寧戶七百一十五口一千四百三十七貢絹砦七周河刁魚田家狼城佛聖渦鹿角李詳元豐四年覇州鹿角砦始隸軍保定軍同下州太平興國六年以涿州新鎮建平戎軍景德元年改為保定軍景祐元年析霸州文安大城二縣五百戶隸軍宣和七年廢保定軍為保定縣隸莫州知縣事仍兼軍使尋依舊崇寧戶一千二十九口二千四百八十四貢絁砦二桃花父母政和三年改父母砦曰安寧西路府四真定中山信德慶源州九相濬懷衞洺深磁祁保軍六天威北平安肅永寧廣信順安縣六十五真定府次府常山郡唐成德軍節度本鎮州漢以趙州之元氏欒城二縣來屬開寶六年廢九門石邑二縣端拱初以鼓城隸祁州淳化元年以束鹿隸深州慶曆八年初置真定府路安撫使統真定府磁相邢趙洺六州崇寧戶九萬二千三百五十三口一十六萬三千一百九十七貢羅縣九真定次赤城次畿欒城次畿元氏次畿井陘次畿熙寧六年省入獲鹿平山八年復置徙治天威軍即縣治置軍使隸府有天威軍小作口王家谷三砦獲鹿次畿平山次畿有甘泉嵐州沂州檀明夫婦柏嶺黃岡烘山赤箭抱兒石虎中子雕栱東臨山西臨山十五砦行唐次畿靈壽次畿熙寧六年省為鎮入行唐八年復有赤陘飛吳二砦砦一北砦咸平二年置熙寧八年析行唐縣二鄉隸砦天威軍見上相州望鄴郡彰德軍節度崇寧戶三萬六千三百四十口七萬一千六百三十五貢暗花牡丹花紗知母胡粉絹縣四安陽緊熙寧五年省永和縣入焉湯陰緊宣和二年以湯陰縣隸濬州尋復來隸臨漳緊熙寧五年省鄴縣入焉林慮中中山府次府博陵郡建隆元年以易北平並來屬太平興國初改定武軍節度本定州慶曆八年始置定州路安撫使統定保深祁廣信安肅順安永寧八州政和三年升為府改賜郡名曰中山崇寧戶六萬五千九百三十五口一十八萬六千三百五貢羅大花綾縣七安喜緊無極緊曲陽上唐上望都中新樂中北平中下砦一軍城隸曲陽縣北平軍慶曆二年以北平砦建軍四年復隸州即北平縣治置軍使隸州信德府次府鉅鹿郡後唐安國軍節度本邢州宣和元年升為府崇寧戶五萬三千六百一十三口九萬五千五百五十二貢絹白磁盞解玉砂縣八邢臺上宣和二年改龍岡縣為邢臺沙河上任中堯山中平鄉上熙寧六年省平鄉縣為鎮入鉅鹿元祐元年復內丘上熙寧六年省堯山縣入焉元祐元年復南和中熙寧五年省任縣為鎮入焉元祐元年復鉅鹿上濬州平川軍節度本通利軍端拱元年以滑州黎陽縣為軍天聖元年改通利為安利四年以衞州衞縣隸軍熙寧三年廢為縣隸衞州元祐元年復為軍政和五年升為州號濬川軍節度改今額崇寧戶三千一百七十六口三千二百二縣二衞上熙寧六年廢為鎮入黎陽後復黎陽中懷州雄河內郡防禦建隆元年升為團練俄為防禦崇寧戶三萬二千三百一十一口八萬八千一百八十五貢牛膝皂角縣三河內緊熙寧六年省武德縣為鎮入焉修武上熙寧六年省為鎮入武陟元祐元年復武陟中衞州望汲郡防禦崇寧戶二萬三千二百四口四萬六千三百六十五貢絹綿縣四汲中新鄉緊熙寧六年廢為鎮入汲元祐二年復獲嘉上天聖四年自懷州來隸共城中監一黎陽熙寧七年置鑄銅錢洺州望廣平郡建隆元年升為防禦熙寧三年省曲周縣為鎮入雞澤六年省臨洺縣為鎮入永年元祐二年曲周臨洺復為縣尋復為鎮四年曲周雞澤依舊別為兩縣崇寧戶三萬八千八百一十七口七萬三千六百貢紬縣五永年上肥鄉望平恩緊雞澤中曲周中深州望饒陽郡防禦雍熙四年廢陸澤縣崇寧戶三萬八千三十六口八萬三千七百一十貢絹縣五靜安望本漢下博縣周置靜安軍以縣隸俄復焉太平興國七年又隸靜安軍雍熙二年軍廢還屬三年廢四年復置改今名束鹿望淳化中自真定來屬安平望饒陽望武強望磁州上滏陽郡團練舊名慈政和三年改作磁崇寧戶三萬六千四百九十一口九萬六千九百二十二貢磁石縣三滏陽上熙寧六年省昭德縣為鎮入焉邯鄲上武安上有固鎮永安黃澤梅回四砦祁州中蒲陰郡團練端拱初以鎮州鼓城來屬景德元年移治於定州蒲陰以無極隸定熙寧六年省深澤縣為鎮入鼓城元祐元年復崇寧戶二萬四千四百八十四口四萬九千九百七十五貢花絁縣三蒲陰望鼓城緊深澤中慶源府望趙郡慶源軍節度本趙州軍事大觀三年升為大藩崇寧四年賜軍額宣和元年升為府崇寧戶三萬四千一百四十一口六萬一百三十七貢絹綿縣七平棘望寧晉望臨城上唐縣熙寧六年省隆平縣為鎮入焉元祐元年復高邑中熙寧五年省柏鄉贊皇二縣為鎮入焉元祐元年皆復隆平中柏鄉中贊皇下保州下軍事本莫州清苑縣建隆初置保塞軍太平興國六年建為州政和三年賜郡名曰清苑崇寧戶二萬七千四百五十六口二十三萬二百三十四貢絹縣一保塞望太平興國六年析易州滿城之南境入焉安肅軍同下州本易州遂城縣太平興國六年建為靜戎軍析易州遂城三鄉置靜戎縣隸焉景德元年併縣改安肅軍宣和七年廢軍為安肅縣知縣事仍兼軍使尋依舊崇寧戶七千一百九十七口一萬四千七百五十一貢素絁縣一安肅中永寧軍同下州雍熙四年以定州博野縣建寧邊軍景德元年改永寧軍宣和七年廢為博野縣知縣事仍兼軍使尋依舊縣一博野望廣信軍同下州太平興國六年改易州遂城縣為威勇軍景德元年改廣信軍崇寧戶四千四百四十五口八千七百三十八貢紬栗縣一遂城中順安軍同下州本瀛州高陽關砦太平興國七年置唐興砦淳化三年建為順安軍至道三年以瀛州高陽來屬熙寧六年省高陽縣為鎮十年復為縣崇寧戶八千六百五口一萬六千五百七十八貢絹縣一高陽中河北路蓋禹貢兗冀青三州之域而冀兗為多當畢昴室東壁尾箕之分南濱大河北際幽朔東瀕海西壓上黨繭絲織之所出人性質厚少文多專經術大率氣勇義號為強忮土平而近邊習尚戰鬬有河漕