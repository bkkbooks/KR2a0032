body:
  text: 宋史卷十四本紀第十四神宗一神宗紹天法古運德建功英文烈武欽仁聖孝皇帝諱頊英宗長子母曰宣仁聖烈皇后高氏慶曆八年四月戊寅生于濮王宮祥光照室羣鼠吐五色氣成雲八月賜名仲針授率府副率三遷至右千牛衛將軍嘉祐八年侍英宗入居慶寧宮嘗夢神人捧之登天英宗即位授安州觀察使封光國公是年五月壬戌受經于東宮帝隆準龍顏動止皆有常度而天性好學請問至日晏忘食英宗常遣內侍止之帝正衣冠拱手雖大暑未嘗用扇侍講王陶入侍帝率弟皓拜之九月加忠武軍節度使同中書門下平章事封淮陽郡王改今諱治平元年六月進封潁王三年三月納故相向敏中孫女為夫人十月英宗不豫帝引仁宗故事請兩日一御邇英閣講讀以安人心十二月壬寅立為皇太子四年正月丁巳英廟崩帝即皇帝位戊午赦天下常赦所不原者遣馮行己告哀于遼己未尊皇太后曰太皇太后皇后曰皇太后命宰相韓琦為山陵使辛酉遣孫坦等告即位于遼以大行皇帝詔賜夏國主及西蕃唃廝囉丙寅羣臣表三上始御迎陽門幄殿聽政內醫侍先帝疾者皆坐不謹貶之詔東平郡王允弼襄陽郡王允良朝朔望以吳奎終喪復授樞密副使戊辰以韓琦守司空兼侍中曾公亮行門下侍郎兼吏部尚書進封英國公文彥博行尚書左僕射檢校司徒兼中書令富弼改武寧軍節度使進封鄭國公曹佾改昭慶軍節度使檢校太傅張改河陽三城節度使宗諤同中書門下平章事改集慶軍節度使檢校尚書左僕射歐陽修趙概並加尚書左丞仍參知政事陳升之為戶部侍郎呂公弼為刑部侍郎允弼允良並加守太保弟東陽郡王皓進封昌王鄠國公頵進封樂安郡王羣臣進秩有差二月乙酉初御紫宸殿立向氏為皇后丁亥詔入內內侍省皇城司合覆奏事並執條覆奏戊子進封交址郡王李日尊為南平王加邈川首領董檢校太保詔山陵所須應委三司轉運司計置毋輒擾民詔提舉醫官院試堪診御脈者六人庚寅以四月十日為同天節辛卯白虹貫日壬辰詔公主下嫁者行見舅姑禮甲辰西蕃首領拽羅鉢鳩令結二人誘蕃部三百餘帳投夏國捕獲斬之以徇三月壬子曹佾加檢校太尉兼侍中賜禮部進士及第出身四百六十一人甲寅陝西宣撫使郭逵討蕃部黨令征等平之賜昌王皓公使錢歲萬緡半給之丙辰昌王皓樂安郡王頵乞解官行服不許癸亥詔入內內侍省官已經壽聖節任子者同天節權罷奏薦壬申歐陽修罷知亳州癸酉吳奎參知政事乙亥允良薨閏月癸未太白晝見甲申夏國主諒祚遣使謝罪辛卯詔齊密登華邠耀鄜絳潤婺海宿饒歙吉建汀潮等十八州知州慶渭秦延四州通判其選並從中書毋以恩例奏授乙未張以太子太師致仕庚子詔求直言御史中丞王陶乞許舉知縣資序人為御史𩹉行從之癸卯王安石出知江寧府甲辰詔諸路帥臣及副總管或有移易依慶曆故事乙巳詔以孟夏農勞之時令監司戒飭州縣省事勸民力田民有艱食者振之夏四月庚戌請大行皇帝諡于南郊辛酉詔內外所上封事令張方平司馬光詳定以聞丙寅録囚御史中丞王陶侍御史吳申呂景以過毀大臣陶出知陳州申景各罰銅二十斤吳奎罷知青州遣使循行陝西河北京東京西路體量安撫壬申奎復位罷州郡歲貢飲食果藥癸酉詔陝西河東經略轉運司察主兵臣僚怯懦老病者以聞五月辛巳以久旱命宰臣禱雨乙巳寶文閣成置學士直學士待制官六月己酉遼遣蕭餘慶等來弔祭己未振河北流民辛未詔天下官吏有能知徭役利病可議寬減者以聞乙亥詔中書樞密細務歸之有司秋七月庚辰詔察富民與妃嬪家昏因夤緣得官者甲申石蕃來貢己丑命尚書戶部郎中趙抃刑部郎中陳薦同詳定中外封事辛卯告英宗憲文肅武宣孝皇帝諡于天地宗廟社稷壬辰上寶册于福寧殿丙午文州曲水縣令宇文之邵上書指陳得失八月丁未朔太白晝見戊午復西夏和市己巳京師地震癸酉葬英宗于永厚陵九月丁丑詔減諸路逃田稅額壬午祧僖祖及文懿皇后乙酉祔英宗神主于太廟樂曰大英之舞戊子減兩京畿內鄭孟州囚罪一等民役山陵者蠲其賦辛卯徙封皓為岐王頵為高密郡王富弼為尚書左僕射遣孫思恭等報謝于遼且賀生辰正旦壬辰録周世宗從曾孫貽廓為三班奉職甲午遼遣耶律好謀等來賀即位戊戌以王安石為翰林學士辛丑韓琦罷為司徒鎮安武勝軍節度使判相州吳奎陳升之罷樞密副使呂公弼為樞密使張方平趙抃並參知政事邵亢為樞密副使壬寅以曾公亮為尚書左僕射文彥博為司空潮州地震癸卯以權御史中丞司馬光為翰林學士冬十月丙午漳泉諸州地震丁未富弼罷判河陽戊申建州邵武興化軍地震己酉初御邇英閣召侍臣講讀經史以右諫議大夫權御史中丞滕甫考諸路監司課績張方平以父憂去位庚戌給陝西轉運司度僧牒令糴穀振霜旱州縣癸丑詔翰林學士御史中丞侍御史知雜事舉材堪御史者各二人詔將作監主簿常秩赴闕甲寅製資治通鑑序賜司馬光癸酉知青澗城种諤復綏州十一月丁丑詔近臣各舉才行可任使者一人戊寅詔求直言丙戌詔二府各舉所知丁亥令考課院詳定諸州所上縣令治狀戊子分命宰臣祈雪置馬監于河東交城縣庚寅詔近臣以舉官不當經三劾者中書別奏取旨乙未詔令內外文武官各舉有材德行能者十二月丙辰西南龍蕃來貢辛酉以來歲日食正旦自乙丑避殿減膳罷朝賀壬戌詔起居日增轉對官二人丙寅詔州縣吏並緣為姦致獄多瘐死歲終會死者多寡以制其罪著為令己巳遼遣蕭傑等來賀正旦熙寧元年春正月甲戌朔日有食之詔改元丁丑以旱減天下囚罪一等杖以下釋之壬午令州縣掩暴骸丁亥命宰臣曾公亮等極言闕失庚寅御殿復膳壬辰幸寺觀祈雨丙申趙概罷知徐州三司使唐介參知政事丁酉詔修英宗實録壬寅增太學生百人二月辛亥令諸路每季上雨雪乙卯孔若蒙襲封衍聖公壬戌貸河東飢民粟三月庚辰夏主諒祚卒遣使來告哀丙戌詔恤刑戊子作太皇太后慶壽宮皇太后寶慈宮丁酉簡州木連理潭州雨毛夏四月乙巳詔翰林學士王安石越次入對戊申命宰臣禱雨以樞密直學士李參為尚書右丞判西京留守司御史臺辛亥同天節羣臣及遼使初上壽于紫宸殿五月甲戌募飢民補廂軍庚辰詔兩制及國子監舉諸王宮學官戊戌廢慶成軍六月癸卯録唐魏徵狄仁傑後丁未占城來貢辛亥詔諸路興水利乙亥河決棗強縣丙寅命司馬光滕甫裁定國用秋七月癸酉詔謀殺已傷案問欲舉自首者從謀殺減二等乙亥名秦州新築大甘谷口寨曰甘谷城丁丑詔諸路帥臣監司及兩制知雜御史已上各舉武勇謀略三班使臣二名賜布衣王安國進士及第己卯羣臣三表請上奉元憲道文武仁孝之號不許陳升之知樞密院事給濮州雷澤縣堯陵守戶壬午以恩冀州河決賜水死家緡錢及下戶粟甲申京師地震乙酉又震大雨辛卯以河朔地大震命沿邊安撫司及雄州刺史候遼人動息以聞賜壓死者緡錢京師地再震壬辰遣御史中丞滕甫知制誥吳充安撫河北癸巳疏深州溢水甲午減河北路囚罪一等丁酉賜河北安撫司空名誥敕募民入粟己亥回鶻來貢八月壬寅詔京東西路存恤河北流民京師地震甲辰又震乙卯賜河東及鄜延路轉運司空名誥敕募民入粟實邊甲子詔中書門下考屬近行尊者一人王之丙寅罷宗諤平章事丁卯遣張宗益等賀遼主生辰正旦九月辛未太祖曾孫舒國公從式進封安定郡王丁亥減后妃臣僚薦奏推恩戊子莫州地震有聲如雷丁酉詔三司裁定宗室月料嫁娶生日郊禮給賜冬十月辛丑給天下繫囚衣食薪炭乙卯出奉宸庫珠付河北買馬戊辰禁銷金服飾十一月癸酉太白晝見癸未命宰臣禱雪丙戌朝饗太廟遂齋于郊宮廢青城後苑丁亥祀天地于圜丘大赦羣臣進秩有差乙未京師及莫州地震十二月己亥朔命宰臣禱雪癸卯瀛州地大震庚戌賜夏國主秉常詔許納塞門安遠二寨歸其綏州辛亥録唐段秀實後癸丑禱雪于郊廟社稷庚申以判汝州富弼為集禧觀使詔乘驛赴闕壬戌雪甲子遼遣耶律公質等來賀正旦二年春正月甲午奉安英宗神御于景靈宮英德殿二月己亥以富弼同中書門下平章事庚子以王安石參知政事命翰林學士呂公著修英宗實録乙巳帝以災變避正殿減膳徹樂甲子陳升之王安石創置三司條例議行新法三月乙酉詔漕運鹽鐵等官各具財用利害以聞丙戌命宰臣禱雨戊子秉常上誓表納塞門安遠二寨乞綏州詔許之乙未以旱慮囚四月丁酉朔羣臣再上尊號不許戊戌省內外土木工壬寅遼遣耶律昌等來賀同天節丁未唐介薨臨其喪戊申宰臣富弼曾公亮以旱上表待罪詔不允癸丑命曾公亮為西京奉安仁宗英宗御容禮儀使丁巳遣使諸路察農田水利賦役戊午外任大使臣年七十以上令監司體量直除致仕者更不與子孫推恩甲子御殿復膳免河北歸業流民夏稅五月辛未宴紫宸殿初用樂己卯賜河北役兵特支錢癸未翰林學士鄭獬罷知杭州宣徽北院使王拱辰罷判應天府知制誥錢公輔罷知江寧府丁亥奉安仁宗英宗御容于會聖宮及應天院甲午減西京囚罪一等台州民延贊等九人年各百歲以上並授本州助教六月丁巳右諫議大夫御史中丞呂誨以論王安石罷知鄧州以翰林學士呂公著為御史中丞命龍圖閣直學士張掞兼編排録用勳臣子孫壬戌太白晝見秋七月乙丑朔日當食雲陰不見庚午詔御史中丞舉推直官及可兼權御史者甲戌東平郡王允弼薨辛巳立淮浙江湖六路均輸法壬午振恤被水州軍仍蠲竹木稅及酒課癸未詔自今文臣換右職者須實有謀勇曾著績效即得取旨甲申日下有五色雲己丑韓琦上仁宗實録曾公亮上英宗實録八月癸卯侍御史劉琦貶監處州鹽酒務御史𩹉行錢顗貶監衢州鹽稅亦以論安石故乙巳殿中侍御史孫昌齡以論新法貶通判蘄州丙午同修起居注范純仁以言事多忤安石罷同知諫院戊申河徙東行夏國請從舊蕃儀詔許之己酉范純仁知河中府甲寅朝神御殿辛酉以祕書省著作佐郎程皓王子韶並為太子中允權監察御史𩹉行壬戌侍御史知雜事劉述同判刑部丁諷坐受刑名敕不即下述貶知江州諷貶通判復州審刑院詳議官王師元坐言許遵所議刑名不當貶監安州稅九月甲子朔交州來貢乙丑以古勿洞效順首領儂智會為右千牛衛大將軍丁卯立常平給斂法戊辰出內庫緡錢百萬糴河北常平粟丁丑遣孫固等賀遼主生辰正旦辛卯廢奉慈廟壬辰以祕書省著作佐郎呂惠卿為太子中允崇政殿説書冬十月丙申富弼罷為武寧軍節度使判亳州曾公亮陳升之並同中書門下平章事城綏州命郭逵選將置守具逵遣趙𪅂交夏人所納安遠塞門二寨就定地界夏人渝初盟𪅂請城綏州不以易二寨因改名綏德城戊戌以蕃官禮賓使折繼世為忠州刺史左監門衛將軍嵬名山為供備庫使仍賜姓名趙懷順丙辰詔御史請對並許直由閣門上殿戊午宗諤復平章事己未夏人來謝封册辛酉録楊承信曾孫立田重進曾孫章為三班借職十一月乙丑命韓絳制置三司條例甲戌詔祖宗之後世襲補外官非袒免親罷賜名授官丙子罷諸路提刑武臣頒農田水利約束壬午御邇英閣聽講賜汴口役兵錢己丑減天下囚罪一等徒以下釋之閏月庚子濬御河壬子置交子務是月差官提舉諸路常平廣惠倉兼管勾農田水利差役事十二月癸亥朔復減后妃公主及臣僚推恩癸酉增失入死罪法丙戌增三京留司御史臺國子監及宮觀官以處卿監監司知州之老者戊子遼遣蕭惟禧來賀正旦是歲交州來貢
