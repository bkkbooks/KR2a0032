body:
  text: 宋史卷一百四志第五十七禮七吉禮七封禪汾陰后土朝謁太清宮天書九鼎封禪太宗即位之八年泰山父老千餘人詣闕請東封帝謙讓未遑厚賜以遣之明年宰臣宋琪率文武官僧道耆壽三上表以請乃詔以十一月二十一日有事于泰山命翰林學士扈蒙等詳定儀注既而乾元文明二殿災詔停封禪而以是日有事于南郊真宗大中祥符元年兗州父老呂良等千二百八十七人及諸道貢舉之士八百四十六人詣闕陳請而宰臣王旦等又率百官諸軍將校州縣官吏蕃夷僧道父老二萬四千三百七十人五上表請始詔今年十月有事于泰山遣官告天地宗廟社稷太一宮及在京祠廟嶽瀆命翰林太常禮院詳定儀注知樞密院王欽若參知政事趙安仁為封禪經度制置使並判兗州三司使丁謂計度糧草引進使曹利用宣政使李神福修行宮道路皇城使劉承圭等計度發運詔禁緣路採捕及車騎蹂踐田稼以行宮側官舍佛寺為百官宿頓之所調兗鄆兵充山下丁役行宮除前後殿外並張幕為屋覆以油帊仍增自京至泰山驛馬令三司沿汴蔡御河入廣濟河運儀仗什物赴兗州發上供木由黃河浮筏至鄆州給置頓費用省輦送之役以王旦為大禮使王欽若為禮儀使參知政事馮拯為儀仗使知樞密院陳堯叟為鹵簿使趙安仁為橋道頓遞使仍鑄五使印及經度制置使印給之遣使詣嶽州采三脊茅三十束有老人黃皓識之補州助教賜以粟帛初太平興國中有得唐玄宗社首玉册蒼璧至是令瘞於舊所其前代封禪壇址摧圯者命修完之山上置圜臺徑五丈高九尺四陛上飾以青四面如其方色一壝廣一丈圍以青繩三周燎壇在其東南高丈二尺方一丈開上南出戶方六尺山下封祀壇四成十二陛如圜丘制上飾以玄四面如方色外為三壝燎壇如山上壇制社首壇八角三成每等高四尺上闊十六步八陛上等廣八尺中等廣一丈下等廣一丈二尺三壝四門如方丘制又為瘞坎於壬地外壝之內以玉為五牒牒各長尺二寸廣五寸厚一寸刻字而填以金聯以金繩緘以玉匱置石叟金脆難用以金塗繩代之正坐配坐用玉册六副每簡長一尺二寸廣一寸二分厚三分簡數量文多少匱長一尺三寸檢長如匱厚二寸闊五寸纏金繩五周當纏繩處刻為五道而封以金泥泥和金粉乳香為之印以受命寶封匱當寶處刻深二分用石叟藏之其叟用石再纍各方五尺厚一尺鑿中廣深令容玉匱叟旁施檢處皆刻深七寸闊一尺南北各三東西各二去隅皆七寸纏繩處皆刻三道廣一寸五分深三分為石檢十以叟皆長三尺闊一尺厚七寸刻三道廣深如纏繩其當封處刻深二寸取足容寶皆有小石蓋與封刻相應其檢立叟旁當刻處又為金繩三以纏叟皆五周徑三分為石泥封叟泥用石末和方色土為之用金鑄寶曰天下同文如御前寶以封叟際距石十二分距四隅皆闊二尺厚一尺長一丈斜刻其道與叟隅相應皆再纍為五色土圜封叟上徑一丈二尺下徑三丈九尺命直史館劉鍇內侍張承素領徒封圜臺石叟直集賢院宋臯內侍郝昭信封社首石叟並先往規度之詳定所言朝覲壇在行宮南方九丈六尺高九尺四陛陛南面兩陛餘三面各一陛一壝二分在南一分在北又按唐封禪備法駕準故事乘輿出京並用法駕所過州縣不備儀仗其圜臺上設登歌鍾磬各一虡封祀壇宮架二十虡四隅立建鼓二舞社首壇設登歌如圜臺壇下宮架二舞如封祀壇朝覲壇宮架二十虡不用熊羆十二案又按六典南郊合祀天地服袞冕垂白珠十有二黝衣纁裳十二章欲望封禪日依南郊例洎禮畢御朝覲壇諸州所貢方物陳列如元正儀令尚書戶部告示並先集泰山下仍詔出京日具小駕儀仗太常寺三百二十五人兵部五百六十六人殿中省九十一人太僕寺二百九十九人六軍諸衛四百六十八人左右金吾仗各一百七十六人司天監三十七人有司言南郊惟昊天皇地祇配帝日月五方神州各用幣內官而下別設六十六段分充按開寶通禮嶽鎮海瀆幣從方色即明皆有制幣今請封祀壇內官至外官三百一十八位社首壇嶽鎮以下一十八位並用方色幣又南郊牲正坐配坐用犢五方帝日月神州共用羊豕二十二從祀七百三十七位仍以前數分充今請神州而上十二位用犢其舊供羊豕改充從祀牲又景德中升天皇北極在第一等今請亦於從祀牲內體薦舊制郊祀正坐配坐褥以黃皇帝拜褥以緋至是詔配坐以緋拜褥以紫又以靈山清潔命祀官差減其數或令兼攝有期喪未滿餘服未卒哭者不得預祭內侍諸司官除掌事宿衛外從升者裁二十四人諸司職掌九十三人其文武官升山者皆公服詳定所言漢書八神與歷代封禪帝王及所禪山並於前祀七日遣官致祭以太牢祀泰山少牢祀社首九月詔審刑院開封府毋奏大辟案帝習儀于崇德殿初禮官言無帝王親習之文帝曰朕以達寅恭之意豈憚勞也既畢帝見禮文有未便諭宰臣與禮官再議於是詳定所言按開寶禮則燔燎畢封册開元故事則封叟後燔燎今如不對神封册則未稱寅恭或封叟後送神則併為喧瀆欲望俟終獻畢皇帝升壇封玉匱置叟中泥印訖復位飲福送神樂止舉燎火次天書降次金匱降禮儀使奏禮畢皇帝還大次俟封叟畢皇帝再升壇省視緣祀禮已畢更不舉樂省訖降壇仍詔山上亞獻終獻登歌作樂十月戊子朔禁天下屠殺一月帝自告廟即屏葷蔬食自進發至行禮前並禁音樂有司請登封日圜臺立黃麾仗至山下壇設權火將行禮然炬相屬又出朱字漆牌遣執仗者傳付山下牌至公卿就位皇帝就望燎位山上傳呼萬歲下即舉燎皇帝還大次解嚴又傳呼而下祀官始退社首瘞坎亦設權火三為準遣司天設漏壺山之上下命中官覆校日景復於壇側擊板相應自太平頂天門黃峴嶺岱嶽觀各豎長竿揭籠燈下照以相參候辛卯發京師以玉輅載天書先行次日如之至鄆州令從官衛士蔬食丁未次奉高宮戊申齋于穆清殿諸升山者官給衣令祀日沐浴服之庚戌帝服通天冠絳紗袍乘金輅備法駕至山門幄次改服鞾袍乘步輦登山鹵簿儀衛列山下天書仗不上山與法駕仗間立知制誥朱巽奉玉册牒及圜臺行事官先升且以回馬嶺至天門路峻絶人給橫板二長三尺許繫綵兩端施於背膺選從卒推引而上衛士皆給釘㙐供奉馬止於中路自山趾盤道至太平頂凡兩步一人綵繡相間樹當道者不伐止縈以繒帝每經險必降輦徒步亞獻寧王元偓終獻舒王元稱鹵簿使陳堯叟從祀官點饌習儀於圜壇是夕山下罷警場辛亥設昊天上帝位于圜臺奉天書于坐左太祖太宗並配西北側向帝服袞冕升臺奠獻悉去侍衛拂翟止於壝門籠燭前導亦徹之玉册文曰嗣天子臣某敢昭告于昊天上帝臣嗣膺景命昭事上穹昔太祖揖讓開基太宗憂勤致治廓清寰宇混一車書固抑升中以延積慶元符錫祚衆寶效祥異域咸懷豐年屢應虔修封祀祈福黎元謹以玉帛犧牲粢盛庶品備茲禋燎式薦至誠皇伯考太祖皇帝皇考太宗皇帝配神作主尚饗玉牒文曰有宋嗣天子臣某敢昭告于昊天上帝啓運大同惟宋受命太祖肇基功成治定太宗膺圖重熙纍盛粵惟沖人丕承列聖寅恭奉天憂勤聽政一紀于茲四隩來暨丕貺殊尤元符章示儲慶發祥清淨可致時和年豐羣生咸遂仰荷顧懷敢忘繼志僉議大封聿申昭事躬陟喬嶽對越上天率禮祗肅備物吉蠲以仁守位以孝奉先祈福逮下侑神昭德惠綏黎元懋建皇極天祿無疆靈休允迪萬葉其昌永保純錫命羣官享五方帝及諸神於山下封祀壇上飲福酒攝中書令王旦跪稱曰天賜皇帝太一神策周而復始永綏兆人三獻畢封金玉匱王旦奉玉匱置於石叟攝太殿馮拯奉金匱以降將作監領徒封叟帝登圜臺閲視訖還御幄宰臣率從官稱賀山下傳呼萬歲聲動山谷即日仗還奉高宮百官奉迎于谷口帝復齋于穆清殿壬子禪祭皇地祇于社首山奉天書升壇以祖宗配玉册文曰嗣天子臣某敢昭告于皇地祇無私垂祐有宋肇基命惟天啓慶賴坤儀太祖神武威震萬𧜛太宗聖文德綏九土臣恭膺寶命纂承丕緒穹昊降祥靈符下付景祚延鴻祕文昭著八表以寧五兵不試九穀豐穰百姓親比方輿所資涼德是愧溥率同詞搢紳協議因以時巡亦既肆類躬陳典禮祗事厚載致孝祖宗潔誠嚴配以伸大報聿修明祀本支百世黎元受祉謹以玉帛犧牲粢盛庶品備茲禋瘞式薦至誠皇伯考太祖皇帝皇考太宗皇帝配神作主尚饗帝至山下服鞾袍步出大次癸丑有司設仗衛宮縣于壇下帝服袞冕御封禪壇上之壽昌殿受朝賀大赦天下文武遞進官勳減免賦稅工役各有差改乾封縣曰奉符縣宴百官卿監以上于穆清殿泰山父老于殿門甲寅發奉符始進常膳帝之巡祭也往還四十七日未嘗遇雨雪嚴冬之候景氣恬和祥應紛委前祀之夕陰雺風徑不可以燭及行事風頓止天宇澄霽燭焰凝然封叟訖紫氣蒙壇黃光如帛繞天書匣悉縱四方所獻珍鳥異獸山下法駕還奉高宮日重輪五色雲見鼓吹振作觀者塞路歡呼動天地改奉高宮曰會真宮九天司命上卿加號保生天尊青帝加號廣生帝君天齊王加號仁聖各遣使祭告詔王旦撰封祀壇頌王欽若撰社首壇頌陳堯叟撰朝覲壇頌圜臺奉祀官並於山上刻名封祀九宮社首壇奉祀官並於社首頌碑陰刻名扈從升朝官及內殿崇班軍校領刺史以上與蕃夷酋長並於朝覲頌碑陰刻名明年二月詔知兗州李迪京東轉運使馬元方等同修圜封以呂良首請命攝兗州助教政和三年兗鄆耆壽道釋等及知開德府張為等五十二人表請東封優詔不允六年知兗州宋康年請下祕閣檢尋祥符東封典故付臣經畫時蔡京當國將講封禪以文太平預具金繩玉檢及他物甚備造舟四千艘雨具亦千萬計迄不能行汾陰后土真宗東封之又明年河中府言進士薛南及父老僧道千二百人列狀乞赴闕請親祠后土詔不允已而南又請河南尹寧王元偓亦表請文武百僚詣東上閣門三表以請詔明年春有事於汾陰后土命知樞密院陳堯叟為祀汾陰經度制置使翰林學士李宗諤副之樞密直學士戚綸昭宣使劉承圭計度發運河北轉運使李士衡鹽鐵副使林特計度糧草龍圖閣待制王曙西京左藏庫使張景宗供備庫使藍繼宗修治行宮道路宰臣王旦為大禮使知樞密院王欽若為禮儀使參知政事馮拯為儀仗使趙安仁為鹵簿使陳堯叟為橋道頓遞使又以旦為天書儀衛使欽若安仁副之丁謂為扶侍使藍繼宗為扶侍都監內侍周懷政皇甫繼明為夾侍發陝西河東兵五千人赴汾陰給役出馬增傳置命翰林禮院詳定儀注造玉册祭器先令堯叟詣后土祠祭告分遣常參官告天地廟社嶽鎮海瀆詳定所言祀汾陰后土請如封禪以太祖太宗並配其方丘之制八角三成每等高四尺上闊十六步八陛上陛廣八尺中廣一丈下廣一丈二尺三重壝四面開門為瘞坎於壇之壬地外壝之內方深取足容物其后土壇別無方色正坐玉册玉匱一副配坐玉册金匱二副金泥金繩所用石匱並蓋三層方廣五尺下層高二尺上開牙縫一周闊四寸深五寸中容玉匱其闊一尺長一尺六寸匱刻金繩道三周各相去五寸每纏繩處闊一寸深五分上層厚一尺仍於上四角更刻牙縫長八寸深四寸每纏金繩處深四寸方三寸五分取容封寶先即廟庭規地為坎深五尺闊容石匱及封固者先以金繩三道南北絡石匱候祀畢封匱訖中書侍郎奉匱至廟與太尉同置石匱中將作監加蓋繫金繩畢各填以石泥印以天下同文之寶如社首封叟制帝省視後將作監率執事更加盝頂石蓋然後封固如法上為小壇如方丘狀廣厚皆五尺經度制置使詣脽上築壇如方丘廟北古雙柏旁有堆阜即其地為之有司請祭前七日遣祀河中府境內伏羲神農帝舜成湯周文武漢文帝周公廟及於脽下祭漢唐六帝四年正月帝習儀于崇德殿丁酉法駕發京師二月丙辰至寶鼎縣奉祇宮戊午致齋己未遣入內都知鄧永遷詣祠上衣服供具庚申百官宿祀所是夜一鼓扶侍使奉天書升玉輅先至脽上二鼓帝乘金輅法駕詣壇夾路設燎火盤道回曲周以黃麾仗初路出廟南帝以未修謁不欲乘輿輦過其前令鑿路由廟後至壇次翼日帝服袞冕登壇祀后土地祇備三獻奉天書於神坐之左次以太祖太宗配侑册文曰維大中祥符四年歲次辛亥二月乙巳朔十七日辛酉嗣天子臣某敢昭告于后土地祇恭惟位配穹旻化敷品彙瞻言分壤是宅景靈備禮親祠抑惟令典肇啓皇宋混一方輿祖禰紹隆承平茲久眇躬纘嗣勵翼靡遑厚德資生綿區允穆清寧孚祐戴履蒙休申錫寶符震以珍物虔遵時邁已建天封明察禮均有所未答櫛沐祇事用致其恭夷夏駿奔瑄牲以薦肅然鄈上對越坤元式祈年豐楙昭政本兆民樂育百福蕃滋介祉無疆敢忘祇畏恭以琮幣犧牲粢盛庶品備茲瘞禮皇伯考太祖皇帝皇考太宗皇帝侑神作主尚饗親封玉册正坐於玉匱配坐於金匱攝太尉奉之以降置於石匱將作監封固之帝還次改服通天冠絳紗袍乘輦謁后土廟設登歌奠獻遣官分奠諸神至庭中視所封石匱還奉祇宮鈞容樂太常鼓吹始振作是日詔改奉祇曰太寧宮壬戌御朝覲壇受朝賀肆赦宴羣臣于穆清殿父老于宮門穆清殿奉祇宮之前殿也詔五使從臣刻名碑陰謁西嶽廟從官皆刻名廟中仗衛儀物大略如東封之制命薛南試將作監主簿以首請祠汾陰故也太清宮大中祥符六年亳州父老道釋舉人三千三百十六人詣闕請車駕朝謁太清宮宰臣帥百官表請詔以明年春親行朝謁禮命參知政事丁謂為奉祀經度制置使判亳州翰林學士陳彭年副之權三司使林特計度糧草禮儀院言按唐太清宮令奠獻用碧幣同人靈故不用玉今詳太上老君宜同天神用玉昨薦獻聖祖大帝用四圭有邸詔用蒼璧太清宮用竹册一副丁謂言太清宮封藏太上老君寶册請用玉匱各一副長廣一尺高如之檢厚一寸二分長廣如匱刻金繩道五封處深二分方取容受命寶石匱三層各長五尺三寸闊四尺二寸下層高二尺中容玉匱鑿深尺二寸長二尺五寸闊尺三寸中層高一尺南北刻金繩道三相距各五寸闊一寸深五分繫金繩處各深四分方取容天下同文寶上層為盝頂蓋以王旦為奉祀大禮使向敏中為儀仗使王欽若為禮儀使陳堯叟為鹵簿使丁謂為橋道頓遞使又以王旦為天書儀衛使王欽若同儀衛使丁謂副之兵部侍郎趙安仁為扶侍使入內副都知張繼能為扶侍都監帝朝謁玉清昭應宮賜亳州真源縣行宮名曰奉元殿曰迎禧七年正月十五日發京師十九日至奉元宮齋于迎禧殿二十一日帝服通天冠絳紗袍奉上太上老君混元上德皇帝加號册寶夜漏上五刻天書扶侍使奉天書赴太清宮二鼓帝乘玉輅駐大次三鼓奉天書升殿改服袞冕行朝謁之禮相王元偓為亞獻榮王元儼為終獻帝還大次太尉奉册寶于玉匱纏以金繩封以金泥印以受命之寶納於醮壇石匱將作監加石蓋其上羣臣稱賀於大次分命輔臣薦獻諸殿改奉元宮曰明道宮奉安玉皇大帝像改真源曰衛真縣車駕次亳州城西詣新立聖祖殿朝拜至應天府朝拜聖祖殿詔號曰鴻慶宮仍奉安太祖太宗像駕至自亳州百官迎對于太一宮西之幄殿有司以衛真靈芝二百輿洎白鹿前導天書而入帝服鞾袍乘大輦備儀衛還宮先是大中祥符元年正月乙丑帝謂輔臣曰朕去年十一月二十七日夜將半方就寢忽室中光曜見神人星冠絳衣告曰來月三日宜於正殿建黃籙道場一月將降天書大中祥符三篇朕竦然起對已復無見命筆識之自十二月朔即齋戒於朝元殿建道場以佇神貺適皇城司奏左承天門屋南角有黃帛曳鴟尾上帛長二丈許緘物如書卷纏以青縷三道封處有字隱隱蓋神人所謂天降之書也王旦等皆再拜稱賀帝即步至承天門瞻望再拜遣二內臣升屋奉之下旦跪奉而進帝再拜受之親奉安輿導至道場付陳堯叟啓封帛上有文曰趙受命興於宋付於居其器守於正世七百九九定緘書甚密抉以利刀方起帝跪受復授堯叟讀之其書黃字三幅詞類書洪範老子道德經始言帝能以至孝至道紹世次諭以清淨簡儉終述世祚延永之意讀訖帝復跪奉蘊以所緘帛盛以金匱旦等稱賀於殿之北廡丙寅羣臣入賀於崇政殿賜宴帝與輔臣皆蔬食遣官奏告天地宗廟社稷及京城祠廟丁卯有司設大次朝元殿之西廊黃麾仗宮縣登歌文武官陪列帝服鞾袍升殿酌獻三清天書禮畢步導入內戊辰大赦改元百官並加恩改左承天門為左承天祥符四月辛卯朔天書再降內中功德閣六月八日封祀制置使王欽若言泰山西南垂刀山上有紅紫雲氣漸成華蓋至地而散其日木工董祚於靈液亭北見黃素書曳林木之上有字不能識言於皇城使王居正居正覩上有御名馳告欽若遂迎至官舍授中使捧詣闕帝御崇正殿趣召輔臣曰朕五月丙子夜復夢鄉者神人言來月上旬當賜天書於泰山宜齋戒祇受朕雖荷降告未敢宣露惟密諭王欽若等凡有祥異即上聞朕今得其奏果與夢協上天眷佑惟懼不稱王旦等曰陛下至德動天感應昭著臣等不勝大慶再拜稱賀己亥迎導天書安於含芳園之正殿辛丑帝致齋翼日備法駕詣殿再拜受授陳堯叟啓封其文曰汝崇孝奉吾育民廣福錫爾嘉瑞黎庶咸知祕守斯言善解吾意國祚延永壽歷遐歲讀訖復奉以升殿九月甲子告太廟奉安天書朝元殿建道場扶侍使上香庭中奏法曲將行禮詣幄殿酌獻訖奉以玉輅中設几褥夾侍立旁周以黃麾仗前後部鼓吹道門威儀扶侍使以下前導封禪日皆奉以升壇置正位之東自是凡舉大禮皆如此制於是製行殿供物定儀仗千六百人每歲元日召宰臣宗室至禁中朝拜前一日卻去葷茹帝自製誓文刻石置玉清昭應宮寶符閣下摹刻天書奉安昭應宮刻玉殿行酌獻禮令刻玉使日赴殿行香副使已下日蒞事焉天禧元年正月詔以十五日行宣讀天書之禮前二日齋于長春殿以王欽若為宣讀天書禮儀使有司設次天安殿中位玉皇像置録本天書於東聖祖板位于西建金籙道場三晝夜其日三鼓帝服通天冠絳紗袍詣道場焚香再拜西向立百官朝服升殿攝中書令任中正跪奏嗣天子臣某謹與宰臣等宣讀天書講求聖意虔思睿訓撫育生民儀衛使王旦跪取左承天門天書置案上攝殿中監張景宗張繼能捧案攝司徒王曾攝司空張知白跪展天書攝太尉向敏中宣讀每句已即詳繹其旨言上天訓諭之意攝中書令王欽若録之宣讀畢攝侍中張旻跪奏嗣天子臣某敢不虔遵天命儀衛使受天書跪納匣中又取功德閣天書泰山天書宣讀如上儀王欽若跪進所録天書帝跪受之登歌酌獻禮畢奉天書還內帝自作欽承寶訓述以示中外是月之朔又奉天書升太初殿恭上玉皇大天帝聖號寶册袞服焉帝於大中祥符五年十月語輔臣曰朕夢先降神人傳玉皇之命云先令汝祖趙某授汝天書令再見汝如唐朝恭奉玄元皇帝翼日復夢神人傳天尊言吾坐西斜設六位以候是日即於延恩殿設道場五鼓一籌先聞異香頃之黃光滿殿蔽燈燭覩靈仙儀衛天尊至朕再拜殿下俄黃霧起須臾霧散由西陛升見侍從在東陛天尊就坐有六人揖天尊而後坐朕欲拜六人天尊止令揖命朕前曰吾人皇九人中一人也是趙之始祖再降乃軒轅皇帝凡世所知少典之子非也母感電夢天人生於壽丘後唐時奉玉帝命七月一日下降總治下方主趙氏之族今已百年皇帝善為撫育蒼生無怠前志即離坐乘雲而去王旦等皆再拜稱賀即召旦等至延恩殿歷觀臨降之所並布告天下命參知政事丁謂翰林學士李宗諤龍圖閣待制陳彭年與禮官修崇奉儀注閏十月制九天司命保生天尊號曰聖祖上靈高道九天司命保生天尊大帝聖祖母號曰元天大聖后遣官就南郊設昊天及四位告之七年九月即滋福殿設玉皇像奉聖號匣安於朝元殿後天書刻玉幄次詔以來年正月上玉帝聖號帝親撰文及天書下亦以此日奏告仍定儀式班之以王旦為奏告大禮使向敏中為儀仗使寇準為鹵簿使丁謂為禮儀使王嗣宗為橋道頓遞使八年正月朔駕詣玉清昭應宮奉表奏告上玉皇大帝聖號曰太上開天執符御曆含真體道玉皇大天帝奉刻玉天書安於寶符閣以帝御容侍立于側升閣酌獻復朝拜明慶二聖殿禮畢還宮易常服御崇德殿百官稱賀九年詔以來年正月朔詣玉清昭應宮上玉皇聖號寶册二日詣景靈宮上聖祖天尊大帝徽號十二月己亥奉寶册仙衣安于文德殿乃齋于天安殿後室四鼓帝詣天安殿酌獻天書畢大駕赴玉清昭應宮袞冕升太初殿奉册訖奠玉幣薦饌三獻飲福登歌二舞望燎如祀昊天上帝儀畢詣二聖殿奉上絳紗袍奉幣進酒分遣攝殿中監上紫微大帝絳紗袍七元輔弼真君紅綃衣翊聖保德真君皂袍帝改服鞾袍詣紫微殿寶符閣焚香羣臣詣集禧殿門表賀是日天書赴景靈宮大駕次至齋于明福殿二日帝服袞冕詣天興殿奉上聖祖天尊大帝册寶仙衣薦獻如上儀乃改服詣保寧閣焚香還宮羣臣入賀于崇德殿命諸州設羅天大醮先建道場二十七日命王旦為兗州太極觀奉上寶册使趙安仁副之遣官攝中書侍郎殿中監押當册寶仙衣二月丁亥帝齋于長春殿翼日有司設聖母板位文德殿行酌獻禮拜授册寶于王旦仙衣于趙安仁以升金輅具鹵簿儀衛所過禁屠宰三月乙巳旦等詣觀奉册上懿號曰聖祖母元天大聖后其日帝不視朝禮畢羣臣入賀賜飲崇德殿徽宗政和六年九月朔復奉玉册玉寶上玉帝尊號曰太上開天執符御曆含真體道昊天玉皇上帝蓋以論者析玉皇大天帝昊天上帝言之不能致一故也又詔以王者父天母地乃者祇率萬邦黎庶強為之名以玉册玉寶昭告上帝而地祇未有稱謂謹上徽號曰承天效法厚德光大后土皇地祇明年五月詣玉清和陽宮奉上寶册所用之禮以瘞坎易燎柴設望瘞位玉以黃琮及兩圭有邸幣以黃舞以八成其餘並如奉上玉皇尊號之儀徽宗崇尚道教制郊祀大禮以方士百人威儀前引分列兩序立於壇下政和三年十一月五日恭上神宗哲宗徽號于太廟翌日祀昊天上帝于圜丘太師蔡京奏天神降格實為大慶乞付史館帝出手詔播告天下羣臣詣東上閣門拜表稱賀御製天真示現記尋以天神降日為天應節即其地建迎真宮明年夏至躬祀方丘又製神應記略云羽衛多士奉輦武夫與陪祝官顧瞻中天有形有象若人若鬼持矛執戟列於空際見者駭愕仍遣使奏告陵廟詔天下又用方士魏漢津之説備百物之象鑄鼎九於中太一宮南為殿奉安之各周以垣上施埤堄墁如方色外築垣環之曰九成宮中央曰帝鼐其色黃祭以土王日為大祠幣用黃樂用宮架北方曰寶鼎其色黑祭以冬至幣用皂東北方曰牡鼎其色青祭以立春幣用皂東方曰蒼鼎其色碧祭以春分幣用青東南曰岡鼎其色緑祭以立夏幣用緋南方曰彤鼎其色紫祭以夏至幣用緋西南曰阜鼎其色黑祭以立秋幣用白西方曰皛鼎其色赤祭以秋分幣用白西北曰魁鼎其色白祭以立冬幣用皂八鼎皆為中祠樂用登歌享用素饌復於帝鼐之宮立大角鼎星祠崇寧四年八月奉安九鼎以蔡京為定鼎禮儀使帝幸九成宮酌獻九月朔百官稱賀于大慶殿如大朝會儀鄭居中言亳州太清宮道士王與之進黃帝崇天祀鼎儀訣皆本於天元玉册九宮太一合於漢津所授上帝錫夏禹隱文同修為祭鼎儀範修成鼎書十七卷祭鼎儀範六卷先是詔曰九鼎以奠九州以禦神姦其用有法後失其傳閲王與之所上祀儀推鼎之意施於有用蓋非今人所能作去古綿邈文字雜糅可擇其當理合經修為定制班付有司至是書成並以每歲祀鼎常典付有司行之又詔以鑄鼎之地作寶成宮總屋七十一區中置殿曰神靈以祠黃帝東廡殿曰成功祀夏后氏西廡殿曰持盈祠周成王及周公召公後置堂曰昭應祀唐李良及隱士嘉成侯魏漢津太常禮部言每歲欲於大樂告成崇政殿元進樂日秋八月二十七日舉祀事祀黃帝依感生帝神州地祇為大祠幣用黃樂用宮架祝文依祀聖祖稱嗣皇帝臣名其成功持盈二殿禮用中祀幣各用白昭應堂禮用小祀並以素饌從之政和六年用方士王仔昔議定鼎閣於天章閣自九成宮徙九鼎奉安之又詔改帝鼐為隆鼐正南彤鼎為明鼎西南阜鼎為順鼎正西皛鼎為蘊鼎西北魁鼎為健鼎正北寶鼎如舊東北牡鼎為和鼎正東蒼鼎為育鼎東南岡鼎為潔鼎鼎閣為圜象徽調之閣閣上神像左周鼎星君中帝席星君右大角星君閣下鼎鼐神像各守逐鼎布列亦用仔昔議也駕詣鼎閣奉安神像明日復詣閣行香百僚陪位其後又詔九鼎新名乃狂人妄改皆無依據宜復舊名惟圜象徽調閣仍舊八年用方士言鑄神霄九鼎成曰太極飛雲洞劫之鼐蒼壺祀天貯醇酒之鼎山嶽五神之鼎精明洞淵之鼎天地陰陽之鼎混沌之鼎浮光洞天之鼎靈光晃耀煉神之鼎蒼龜火蛇蟲魚金輪之鼎奉安於上清寶籙宮神霄殿與魏漢津所鑄凡十八鼎焉
