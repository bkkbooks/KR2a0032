body:
  text: 宋史卷九十二志第四十五河渠二黃河中熙寧四年七月辛卯北京新堤第四第五掃決漂溺館陶永濟清陽以北遣茂則乘驛相視八月河溢澶州曹村十月溢衛州王供時新堤凡六掃而決者二下屬恩冀貫御河奔衝為一帝憂之自秋迄冬數遣使經營是時人爭言導河之利茂則等謂二股河地最下而舊防可因今堙塞者才三十餘里若度河之湍浚而逆之又存清水鎮河以析其勢則捍者可回決者可塞帝然之十二月令河北轉運司開修二股河上流並修塞第五掃決口五年二月甲寅興役四月丁卯二股河成深十一尺廣四百尺方浚河則稍障其決水至是水入于河而決口亦塞六月河溢北京夏津閏七月辛卯帝語執政聞京東調夫修河有壞産者河北調急夫尤多若河復決奈何且河決不過占一河之地或西或東若利害無所校聽其所趨如何王安石曰北流不塞占公私田至多又水散漫久復澱塞昨修二股費至少而公私田皆出向之潟鹵俱為沃壤庸非利乎況急夫已減於去歲若復葺理堤防則河北歲夫愈減矣六年四月始置疏濬黃河司先是有選人李公義者獻鐵龍爪揚泥車法以濬河其法用鐵數斤為爪形以繩繫舟尾而沈之水篙工急櫂乘流相繼而下一再過水已深數尺宦官黃懷信以為可用而患其太輕王安石請令懷信公義同議增損乃別制濬川杷其法以巨木長八尺齒長二尺列於木下如杷狀以石壓之兩旁繫大繩兩端矴大船相距八十步各用滑車絞之去來撓蕩泥沙已又移船而濬或謂水深則杷不能及底雖數往來無益水淺則齒礙沙泥曳之不動卒乃反齒向上而曳之人皆知不可用惟安石善其法使懷信先試之以濬二股又謀鑿直河數里以觀其效且言於帝曰開直河則水勢分其不可開者以近河每開數尺即見水不容施功爾今第見水即以杷濬之水當隨杷改趨直河苟置數千杷則諸河淺澱皆非所患歲可省開濬之費幾百千萬帝曰果爾甚善聞河北小軍壘當起夫五千計合境之丁僅及此數一夫至用錢八緡故歐陽修嘗謂開河如放火不開如失火與其勞人不如勿開安石曰勞人以除害所謂毒天下之民而從之者帝乃許春首興工而賞懷信以度僧牒十五道公義與堂除以杷法下北京令虞部員外郎都大提舉大名府界金堤范子淵與通判知縣共試驗之皆言不可用會子淵以事至京師安石問其故子淵意附會遽曰法誠善第同官議不合耳安石大悅至是乃置濬河司將自衛州濬至海口差子淵都大提舉公義為之屬許不拘常制舉使臣等人船木鐵工匠皆取之諸掃官吏給視都水監丞司行移與監司敵體當是時北流閉已數年水或橫決散漫常虞壅遏十月外監丞王令圖獻議於北京第四第五掃等處開修直河使大河還二股故道乃命范子淵及朱仲立領其事開直河深八尺又用杷疏濬二股及清水鎮河凡退背魚肋河則塞之王安石乃盛言用杷之功若不輟工雖二股河上流可使行地中七年都水監丞劉璯言自開直河閉魚肋水勢增漲行流湍急漸塌河岸而許家港清水鎮河極淺漫幾於不流雖二股深快而蒲泊已東下至四界首退出之田略無固護設遇漫水出岸牽回河頭將復成水患宜候霜降水落閉清水鎮河築縷河堤一道以遏漲水使大河復循故道又退出良田數萬頃俾民耕種而博州界堂邑等退背七掃歲減修護之費公私兩濟從之是秋判大名文彥博言河溢壞民田多者六十村戶至萬七千少者九村戶至四千六百願蠲租稅從之又命都水詰官吏不以水災聞者外都水監丞程昉以憂死十月安石去位吳充為相十年五月滎澤河堤急詔判都水監俞光往治之是歲七月河復溢衛州王供及汲縣上下掃懷州黃沁滑州韓村己丑遂大決於澶州曹村澶淵北流斷絶河道南徙東匯于梁山張澤濼分為二派一合南清河入于淮一合北清河入于海凡灌郡縣四十五而濮齊鄆徐尤甚壞田逾三十萬頃遣使修閉八月又決鄭州滎澤於是文彥博言臣正月嘗奏德州河底淤澱泄水稽滯上流必至壅遏又河勢變移四散漫流兩岸俱被水患若不預為經制必溢魏博恩澶等州之境而都水略無施設止固護東流北岸而已適纍年河流低下官吏希省費之賞未嘗增修堤岸大名諸掃皆可憂虞謂如曹村一掃自熙寧八年至今三年雖每計春料當培低怯而有司未嘗如約其掃兵又皆給他役實在者十有七八今者果大決溢此非天災實人力不至也臣前論此並乞審擇水官今河朔京東州縣人被患者莫知其數籲天上軫聖念而水官不能自訟猶汲汲希賞臣前論所陳出於至誠本圖補報非敢激訐也元豐元年四月丙寅決口塞詔改曹村掃曰靈平五月甲戌新堤成閉口斷流河復歸北初議塞河也故道堙而高水不得下議者欲自夏津縣東開簽河入董固以護舊河袤七十里九十步又自張村掃直東築堤至龐家莊古堤袤五十里二百步詔樞密都承旨韓縝相視縝言漲水衝刷新河已成河道河勢變移無常雖開河就堤及於河身創立生堤枉費功力惟增修新河乃能經久詔可十一月都水監言自曹村決溢諸掃無復儲蓄乞給錢二十萬緡下諸路以時市梢草封樁詔給十萬緡非朝旨及掃岸危急毋得擅用二年七月戊子范子淵言因護黃河岸畢工乞中分為兩掃詔以廣武上下掃為名三年七月澶州孫村陳掃及大吳小吳掃決詔外監丞司速修閉初河決澶州也北外監丞陳祐甫謂商胡決三十餘年所行河道填淤漸高堤防歲增未免泛濫今當修者有三商胡一也橫壠二也禹舊迹三也然商胡橫壠故道地勢高平土性疏惡皆不可復復亦不能持久惟禹故瀆尚存在大伾太行之間地卑而勢固故祕閣校理李垂與今知深州孫民先皆有修復之議望召民先同河北漕臣一員自衛州王供掃按視訖于海口從之四年四月小吳掃復大決自澶注入御河恩州危甚六月戊午詔東流已填淤不可復將來更不修閉小吳決口候見大河歸納應合修立堤防令李立之經畫以聞帝謂輔臣曰河之為患久矣後世以事治水故常有礙夫水之趨下乃其性也以道治水則無違其性可也如能順水所向遷徙城邑以避之復有何患雖神禹復生不過如此輔臣皆曰誠如聖訓河北東路提點刑獄劉定言王莽河一徑水自大名界下合大流注冀州及臨清徐曲御河決口恩州趙村埧子決口兩徑水亦注冀州城東若遂成河道即大流難以西傾全與李垂孫民先所論違背望早經制詔送李立之八月壬午立之言臣自決口相視河流至乾寧軍分入東西兩塘次入界河於劈地口入海通流無阻宜修立東西堤詔覆計之而言者又請自王供掃上添修南岸於小吳口北創修遙提候將來礬山水下決王供掃使直河注東北於滄州界或南或北從故道入海不從九月庚子立之又言北京南樂館陶宗城魏縣淺口永濟延安鎮瀛州景城鎮在大河兩堤之間乞相度遷於堤外於是用其說分立東西兩堤五十九掃定三等向著河勢正著堤身為第一河勢順流堤下為第二河離堤一里內為第三退背亦三等堤去河最遠為第一次遠者為第二次近一里以上為第三立之在熙寧初已主立堤今竟行其言五年正月己丑詔立之凡為小吳決口所立堤防可按視河勢向背應置掃處毋虛設巡河官毋橫費工料六月河溢北京內黃掃七月決大吳掃堤以紓靈平下掃危急八月河決鄭州原武掃溢入利津陽武溝刀馬河歸納梁山濼詔曰原武決口已引奪大河四分以上不大治之將貽朝廷巨憂其輟修汴河堤岸司兵五千併力築堤修閉都水復言兩馬頭墊落水面闊二十五步天寒乞候來春施工至臘月竟塞云九月河溢滄州南皮上下掃又溢清池掃又溢永靜軍阜城下掃十月辛亥提舉汴河堤岸司言洛口廣武掃大河水漲塌岸壞下閘斗門萬一入汴人力無以枝梧密邇都城可不深慮詔都水監官速往護之丙辰廣武上下掃危急詔救護尋獲安定七年七月河溢元城掃決橫堤破北京帥臣王拱辰言河水暴至數十萬衆號叫求救而錢穀稟轉運常平歸提舉軍器工匠隸提刑掃岸物料兵卒即屬都水監逐司在遠無一得專倉卒何以濟民望許不拘常制詔事干機速奏覆牒稟所屬不及者如所請戊申命拯護陽武掃十月冀州王令圖奏大河行流散漫河內殊無緊流旋生灘磧宜近澶州相視水勢使還復故道會明年春宮車晏駕大抵熙寧初專欲導東流閉北流元豐以後因河決而北議者始欲復禹故迹神宗愛惜民力思順水性而水官難其人王安石力主程昉范子淵故二人尤以河事自任帝雖藉其才然每抑之其後元祐元年子淵已改司農少卿御史呂陶劾其修堤開河縻費巨萬護堤壓掃之人溺死無數元豐六年興役至七年功用不成乞行廢放於是黜知兗州尋降知峽州其制略曰汝以有限之材興必不可成之役驅無辜之民置之必死之地中書舍人蘇軾詞也八年三月哲宗即位宣仁聖烈皇后垂簾河流雖北而孫村低下夏秋霖雨漲水往往東出小吳之決既未塞十月又決大名之小張口河北諸郡皆被水災知澶州王令圖建議濬迎陽掃舊河又於孫村金堤置約復故道本路轉運使范子奇仍請於大吳北岸修進鋸牙劈約河勢於是回河東流之議起元祐元年二月乙丑詔未得雨澤權罷修河放諸路兵夫九月丁丑詔祕書監張問相度河北水事十月庚寅又以王令圖領都水同問行河十一月丙子問言臣至滑州決口相視迎陽掃至大小吳水勢低下舊河淤仰故道難復請於南樂大名掃開直河並簽河分引水勢入孫村口以解北京向下水患令圖亦以為然於是減水河之議復起既從之矣會北京留守韓絳奏引河近府非是詔問別相視二年二月令圖問欲必行前說朝廷又從之三月令圖死以王孝先代領都水亦請如令圖議右司諫王覿言河北人戶轉徙者多朝廷責郡縣以安集空倉廩以振濟又遣專使察視之恩德厚矣然耕耘是時而流轉於道路者不已二麥將熟而寓食於四方者未還其故何也盍亦治其本矣今河之為患三泛濫渟滀漫無涯涘吞食民田未見窮已一也緣邊漕運獨賴御河今御河淤澱轉輸艱梗二也塘泊之設以限南北濁水所經即為平陸三也欲治三患在遴擇都水轉運而責成耳今轉運使范子奇反覆求合都水使者王孝先暗繆望別擇人時知樞密院事安燾深以東流為是兩疏言朝廷久議回河獨憚勞費不顧大患蓋自小吳未決以前河入海之地雖屢變移而盡在中國故京師恃以北限彊敵景德澶淵之事可驗也且河決每西則河尾每北河流既益西決固已北抵境上若復不止則南岸遂屬遼界彼必為橋梁守以州郡如慶曆中因取河南熟戶之地遂築軍以窺河外已然之效如此蓋自河而南地勢平衍直抵京師長慮却顧可為寒心又朝廷捐東南之利半以宿河北重兵備預之意深矣使敵能至河南則邈不相及今欲便於治河而緩於設險非計也王巖叟亦言朝廷知河流為北道之患日深故遣使命水官相視便利欲順而導之以拯一路生靈於墊溺甚大惠也然昔者專使未還不知何疑而先罷議專使反命不知何所取信而議復興既敕都水使者總護役事調兵起工有定日矣已而復罷數十日間變議者再三何以示四方今有大害七不可不早為計北塞之所恃以為險者在塘泊黃河堙之猝不可濬浸失北塞險固之利一也橫遏西山之水不得順流而下蹙溢於千里使百萬生齒居無廬耕無田流散而不復二也乾寧孤壘危絶不足道而大名深冀腹心郡縣皆有終不自保之勢三也滄州扼北敵海道自河不東流滄州在河之南直抵京師無有限隔四也並吞御河邊城失轉輸之便五也河北轉運司歲耗財用陷租賦以百萬計六也六七月之間河流交漲占沒西路阻絶遼使進退不能兩朝以為憂七也非此七害委之可緩而未治可也且去歲之患已甚前歲今歲又甚焉則奈何望深詔執政大臣早決河議而責成之太師文彥博中書侍郎呂大防皆主其說中書舍人蘇轍謂右僕射呂公著曰河決而北先帝不能回而諸公欲回之是自謂智勇勢力過先帝也盍因其舊而修其未備乎公著唯唯於是三省奏自河北決恩冀以下數州被患至今未見開修的確利害致妨興工乃詔河北轉運使副限兩月同水官講議聞奏十一月講議官皆言令圖問相度開河取水入孫村口還復故道處測量得流分尺寸取引不過其說難行十二月張景先復以問說為善果欲回河惟北京已上滑州而下為宜仍於孫村濬治橫河舊堤止用逐掃人兵物料並年例客軍春天漸為之可也朝廷是其說三年六月戊戌乃詔黃河未復故道終為河北之患王孝先等所議已嘗興役不可中罷宜接續工料向去決要回復故道三省樞密院速與商議施行右相范純仁言聖人有三寶曰慈曰儉曰不敢為天下先蓋天下大勢惟人君所向羣下競趨如川流山摧小失其道非一言一力可回故居上者不可不謹也今聖意已有所向而為天下先矣乞諭執政前日降出文字却且進入免希合之臣妄測聖意輕舉大役尚書王存等亦言使大河決可東回而北流遂斷何惜勞民費財以成經久之利今孝先等自未有必然之論但僥幸萬一以冀成功又預求免責若遂聽之將有噬臍之悔乞望選公正近臣及忠實內侍覆行按視審度可否興工未晚庚子三省樞密院奏事延和殿文彥博呂大防安燾等謂河不東則失中國之險為契丹之利范純仁王存胡宗愈則以虛費勞民為憂存謂今公私財力困匱惟朝廷未甚知者賴先帝時封樁錢物可用耳外路往往空乏奈何起數千萬物料兵夫圖不可必成之功且御契丹得其道則自景德至今八九十年通好如一家設險何與焉不然如石晉末耶律德光犯闕豈無黃河為阻況今河流未必便衝過北界耶太后曰且熟議明日純仁又畫四不可之說且曰北流數年未為大患而議者恐失中國之利先事回改正如頃西夏本不為邊患而好事者以為不取恐失機會遂興靈武之師也臣聞孔子論為政曰先有司今水官未嘗保明而先示決欲回河之旨他日敗事是使之得以藉口也存宗愈亦奏昨親聞德音更令熟議然纍日猶有未同或令建議者結罪任責臣等本謂建議之人思慮有所未逮故乞差官覆按若但使之結罪彼所見不過如此後或誤事加罪何益臣非不知河決北流為患非一淤沿邊塘泊斷御河漕運失中國之險遏西山之流若能全回大河使由孫村故道豈非上下通願但恐不能成功為患甚於今日故欲選近臣按視若孝先之說決可成則積聚物料接續興役如不可為則令沿河踏行自恩魏以北塘泊以南別求可以疏導歸海去處不必專主孫村此亦三省共曾商量望賜詳酌存又奏自古惟有導河並塞河導河者順水勢自高導令就下塞河者為河堤決溢修塞令入河身不聞斡引大河令就高行流也於是收回戊戌詔書戶部侍郎蘇轍中書舍人曾肇各三上疏轍大略言黃河西流議復故道事之經歲役兵二萬聚梢樁等物三十餘萬方河朔災傷困弊而興必不可成之功吏民竊歎今回河大議雖寢然聞議者固執來歲開河分水之策今小吳決口入地已深而孫村所開丈尺有限不獨不能回河亦必不能分水況黃河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理縱使兩河並行未免各立隄防其費又倍矣今建議者其說有三臣請折之一曰御河湮滅失饋運之利昔大河在東御河自懷衛經北京漸歷邊郡饋運既便商賈通行自河西流御河湮滅失此大利天實使然今河自小吳北行占壓御河故地雖使自北京以南折而東行則御河湮滅已一二百里何由復見此御河之說不足聽也二曰恩冀以北漲水為害公私損耗臣聞河之所行利害相半蓋水來雖有敗田破稅之害其去亦有淤厚宿麥之利況故道已退之地桑麻千里賦役全復此漲水之說不足聽也三曰河徙無常萬一自契丹界入海邊防失備按河昔在東自河以西郡縣與契丹接境無山河之限邊臣建為塘水以捍契丹之衝今河既西則西山一帶契丹可行之地無幾邊防之利不言可知然議者尚恐河復北徙則海口出契丹界中造舟為梁便於南牧臣聞契丹之河自北南注以入于海蓋地形北高河無北徙之道而海口深浚勢無徙移此邊防之說不足聽也臣又聞謝卿材到闕昌言黃河自小吳決口乘高注北水勢奔決上流隄防無復決怒之患朝廷若以河事付臣不役一夫不費一金十年保無河患大臣以其異己罷歸而使王孝先俞瑾張景先三人重畫回河之計蓋由元老大臣重於改過故假契丹不測之憂以取必於朝廷雖已遣百祿等出按利害然未敢保其不觀望風旨也願亟回收買梢草指揮來歲勿調開河役兵使百祿等明知聖意無所偏係不至阿附以誤國計肇之言曰數年以來河北京東淮南災傷今歲河北並邊稍熟而近南州軍皆旱京東西淮南饑殍瘡痍若來年雖未大興河役止令修治舊堤開減水河亦須調發丁夫本路不足則及鄰路鄰路不足則及淮南民力果何以堪民力未堪則雖有回河之策及梢草先具將安施乎會百祿等行視東西二河亦以為東流高仰北流順下決不可回即奏曰往者王令圖張問欲開引水簽河導水入孫村口還復故道議者疑焉故置官設屬使之講議既開撅井筒折量地形水面尺寸高下顧臨王孝先張景先唐義問陳祐之皆謂故道難復而孝先獨叛其說初乞先開減水河俟行流通快新河勢緩人工物料豐備徐議閉塞北流已而召赴都堂則又請以二年為期及朝廷詰其成功遽云來年取水入孫村口若河流順快工料有備便可閉塞回復故道是又不俟新河勢緩矣回河事大寧容異同如此蓋孝先俞瑾等知合用物料五千餘萬未有指擬見買數計經歲未及毫釐度事理終不可為故為大言又云若失此時或河勢移背豈獨不可減水即永無回河之理臣等竊謂河流轉徙乃其常事水性就下固無一定若假以五年休養數路民力沿河積材漸濬故道葺舊堤一旦流勢改變審議事理釃為二渠分派行流均減漲水之害則勞費不大功力易施安得謂之一失此時永無回河之理也四年正月癸未百祿等使回入對復言修減水河役過兵夫六萬三千餘人計五百三十萬工費錢糧三十九萬二千九百餘貫石匹兩收買物料錢七十五萬三百餘緡用過物料二百九十餘萬條束官員使臣軍大將凡一百一十餘員請給不預焉願罷有害無利之役那移工料繕築西堤以護南決口未報己亥乃詔罷回河及修減水河四月戊午尚書省言大河東流為中國之要險自大吳決後由界河入海不惟淤壞塘濼兼濁水入界河向去淺澱則河必北流若河尾直注北界入海則中國全失險阻之限不可不為深慮詔范百祿趙君錫條畫以聞百祿等言臣等昨按行黃河獨流口至界河又東至海口熟觀河流形勢並緣界河至海口鋪寨地分使臣各稱界河未經黃河行流已前闊一百五十步下至五十步深一丈五尺下至一丈自黃河行流之後今闊至五百四十步次亦三二百步深者三丈五尺次亦二丈乃知水性就下行疾則自刮除成空而稍深與前漢書大司馬史張戎之論正合自元豐四年河出大吳一向就下衝入界河行流勢如傾建經今八年不捨晝夜衝刷界河兩岸日漸開闊連底成空趨海之勢甚迅雖遇元豐七年八年元祐元年泛漲非常而大吳以上數百里終無決溢之害此乃下流歸納處河流深快之驗也塘濼有限遼之名無禦遼之實今之塘水又異昔時淺足以褰裳而涉深足以維舟而濟冬寒冰堅尤為坦途如滄州等處商胡之決即已澱淤今四十二年迄無邊警亦無人言以為深憂自回河之議起首以此動煩聖聽殊不思大吳初決水未有歸猶不北去今入海湍迅界河益深尚復何慮藉令有此則中國據上游契丹豈不慮乘流擾之乎自古朝那蕭關雲中朔方定襄鴈門上郡太原右北平之間南北往來之衝豈塘濼界河之足限哉臣等竊謂本朝以來未有大河安流合於禹迹如此之利便者其界河向去只有深闊加以朝夕海潮往來渲蕩必無淺澱河尾安得直注北界中國亦無全失險阻之理且河遇平壤灘漫行流稍遲則泥沙留淤若趨深走下湍激奔騰惟有刮除無由淤積不至上煩聖慮七月己巳朔冀州南宮等五掃危急詔撥提舉修河司物料百萬與之甲午都水監言河為中國患久矣自小吳決後泛濫未著河槽前後遣官相度非一終未有定論以為北流無患則前二年河決南宮下掃去三年決上掃今四年決宗城中掃豈是北流可保無虞以為大河臥東則南宮宗城皆在西岸以為臥西則冀州信都恩州清河武邑或決皆在東岸要是大河千里未見歸納經久之計所以昨相度第三第四鋪分決漲水少紓目前之急繼又宗城決溢向下包蓄不定雖欲不為東流之計不可得也河勢未可全奪故為二股之策今相視新開第一口水勢湍猛發泄不及已不候工畢更撥沙河隄第二口泄減漲水因而二股分行以紓下流之患雖未保冬夏常流已見有可為之勢必欲經久遂作二股仍較今所修利害孰為輕重有司具析保明以聞八月丁未翰林學士蘇轍言夏秋之交暑雨頻併河流暴漲出岸由孫村東行蓋每歲常事而李偉與河掃使臣因此張皇以分水為名欲發回河之議都水監從而和之河事一興求無不可況大臣以其符合己說而樂聞乎臣聞河道西行孫村側左大約入地二丈以來今所報漲水出岸由新開口地東入孫村不過六七尺欲因六七尺漲水而奪入地二丈河身雖三尺童子知其難矣然朝廷遂為之遣都水使者興兵功開河道進鋸牙欲約之使東方河水盛漲其西行河道若不斷流則遏之東行實同兒戲臣願急命有司徐觀水勢所向依纍年漲水舊例因其東溢引入故道以紓北京朝夕之憂故道隄防壞決者第略加修葺免其決溢而已至於開河進約等事一切毋得興功俟河勢稍定然後議不過一月漲水既落則西流之勢決無移理兼聞孫村出岸漲水今已斷流河上官吏未肯奏知耳是時吳安持與李偉力主東流而謝卿材謂近歲河流稍行地中無可回之理上河議一編召赴政事堂會議大臣不以為然癸丑三省樞密院言繼日霖雨河上之役恐煩聖慮太后曰訪之外議河水已東復故道矣乙丑李偉言已開撥北京南沙河直堤第三鋪放水入孫村口故道通行又言大河已分流即更不須開淘因昨來一決之後東流自是順快渲刷漸成港道見今已為二股約奪大河三分以來若得夫二萬於九月興工至十月寒凍時可畢因引導河勢豈止為二股通行而已亦將遂為回奪大河之計今來既因劈拶東流修全鋸牙當迤邐增進一掃而取一掃之利比至來年春夏之交遂可全復故道朝廷今日當極力必閉北流乃為上策若不明詔有司即令回河深恐上下遷延議終不決觀望之間遂失機會乞復置修河司從之五年正月丁亥梁燾言朝廷治河東流北流本無一偏之私今東流未成邊北之州縣未至受患其役可緩北流方悍邊西之州縣日夕可憂其備宜急今傾半天下之力專事東流而不加一夫一草於北流之上得不誤國計乎去年屢決之害全由堤防無備臣願嚴責水官修治北流掃岸使二方均被惻隱之恩二月己亥詔開修減水河辛丑乃詔三省樞密院去冬愆雪今未得雨外路旱暵闊遠宜權罷修河戊申蘇轍言臣去年使契丹過河北見州縣官吏訪以河事皆相視不敢正言及今年正月還自契丹所過吏民方舉手相慶皆言近有朝旨罷回河大役命下之日北京之人歡呼鼓舞惟減水河役遷延不止耗蠹之事十存四五民間竊議意大臣業已為此勢難遽回既為聖鑒所臨要當迤邐盡罷今月六日果蒙聖旨以旱災為名權罷修黃河候今秋取旨大臣覆奏盡罷黃河東北流及諸河功役民方憂旱聞命踊躍實荷聖恩然臣竊詳聖旨上合天意下合民心因水之性功力易就天語激切中外聞者或至泣下而大臣奉行不得其平由此觀之則是大臣所欲雖害物而必行陛下所為雖利民而不聽至於委曲回避巧為之說僅乃得行君權已奪國勢倒植臣所謂君臣之間逆順之際大為不便者此事是也黃河既不可復回則先罷修河司只令河北轉運司盡將一道兵功修貼北流堤岸罷吳安持李偉都水監差遣正其欺罔之罪使天下曉然知聖意所在如此施行不獨河事就緒天下臣庶自此不敢以虛誑欺朝廷弊事庶幾漸去矣八月甲辰提舉東流故道李偉言大河自五月後日益暴漲始由北京南沙堤第七鋪決口水出於第三第四鋪並清豐口一併東流故道河槽深三丈至一丈以上比去年尤為深快頗減北流橫溢之患然今已秋深水當減落若不稍加措置慮致斷絶即東流遂成淤澱望下所屬官司輕畫沙堤等口分水利害免淤故道上誤國事詔吳安持與本路監司北外丞司及李偉按視具合措置事連書以聞九月中丞蘇轍言修河司若不罷李偉若不去河水終不得順流河朔生靈終不得安居乞速罷修河司及檢舉六年四月庚子敕竄責李偉七年三月以吏部郎中趙稱權河北轉運使稱素與安持等議不協嘗上河議其略曰自頃有司回河幾三年功費騷動半天下復為分水又四年矣故所謂分水者因河流相地勢導而分之今乃橫截河流置掃約以扼之開濬河門徒為淵潭其狀可見況故道千里其間又有高處故纍歲漲落輒復自斷夫河流有逆順地勢有高下非朝廷可得而見職在有司朝廷任之亦信矣患有司不自信耳臣謂當繕大河北流兩堤復修宗城棄堤閉宗城口廢上下約開闞村河門使河流湍直以成深道聚三河工費以治一河一二年可以就緒而河患庶幾息矣願以河事並都水條例一付轉運司而總以工部罷外丞司使措置歸一則職事可舉弊事可去四月詔南北外兩丞司管下河掃今後令河北京西轉運使副判官府界提點分認界至內河北仍於銜內帶兼管南北外都水公事十月辛酉以大河東流賜都水使者吳安持三品服北都水監丞李偉再任
